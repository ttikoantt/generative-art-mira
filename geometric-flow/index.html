<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Geometric Flow - 幾何学模様の流れ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        h1 {
            color: #fff;
            font-size: clamp(1.5rem, 4vw, 3rem);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
        }

        .subtitle {
            color: #88ccff;
            font-size: clamp(0.8rem, 2vw, 1.2rem);
            margin-bottom: 20px;
        }

        #canvas {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(100, 200, 255, 0.2);
            max-width: 100%;
            touch-action: none;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: clamp(0.9rem, 2vw, 1rem);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            color: #aaddff;
            font-size: clamp(0.75rem, 1.5vw, 0.9rem);
            margin-top: 15px;
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4);
        }

        .fullscreen-btn:hover {
            box-shadow: 0 6px 20px rgba(240, 147, 251, 0.6);
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            h1 {
                margin-bottom: 8px;
            }

            .subtitle {
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Geometric Flow</h1>
        <p class="subtitle">幾何学模様が美しく流れるアート</p>

        <canvas id="canvas"></canvas>

        <div class="controls">
            <button onclick="changeSpeed()">速度変更</button>
            <button onclick="changePattern()">模様変更</button>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
        </div>

        <p class="info">🖱️ マウス/タッチで動きをコントロール</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Canvas size
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 1000);
            const maxHeight = Math.min(window.innerHeight - 250, 600);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Geometric shapes
        class GeometricShape {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 40 + 20;
                this.sides = Math.floor(Math.random() * 4) + 3; // 3-6 sides
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.05;
                this.hue = Math.random() * 360;
                this.alpha = Math.random() * 0.5 + 0.3;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
            }

            update(speed) {
                this.x += this.vx * speed;
                this.y += this.vy * speed;
                this.rotation += this.rotationSpeed * speed;
                this.hue += 0.3 * speed;

                // Wrap around edges
                if (this.x < -this.size) this.x = canvas.width + this.size;
                if (this.x > canvas.width + this.size) this.x = -this.size;
                if (this.y < -this.size) this.y = canvas.height + this.size;
                if (this.y > canvas.height + this.size) this.y = -this.size;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                ctx.beginPath();
                for (let i = 0; i < this.sides; i++) {
                    const angle = (i / this.sides) * Math.PI * 2;
                    const x = Math.cos(angle) * this.size;
                    const y = Math.sin(angle) * this.size;
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.closePath();

                // Gradient fill
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 60%, ${this.alpha})`);
                gradient.addColorStop(1, `hsla(${this.hue + 30}, 80%, 40%, 0)`);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Glow effect
                ctx.shadowColor = `hsla(${this.hue}, 80%, 60%, 0.5)`;
                ctx.shadowBlur = 15;
                ctx.strokeStyle = `hsla(${this.hue}, 80%, 70%, ${this.alpha})`;
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.restore();
            }
        }

        // Create shapes
        let shapes = [];
        const numShapes = 30;

        function createShapes() {
            shapes = [];
            for (let i = 0; i < numShapes; i++) {
                shapes.push(new GeometricShape());
            }
        }
        createShapes();

        // Speed and pattern
        let speed = 1;
        const speeds = [0.5, 1, 1.5, 2];
        let speedIndex = 1;

        function changeSpeed() {
            speedIndex = (speedIndex + 1) % speeds.length;
            speed = speeds[speedIndex];
        }

        function changePattern() {
            shapes.forEach(shape => {
                shape.sides = Math.floor(Math.random() * 4) + 3;
                shape.size = Math.random() * 40 + 20;
            });
        }

        // Mouse/touch interaction
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            mouseX = touch.clientX - rect.left;
            mouseY = touch.clientY - rect.top;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            mouseX = touch.clientX - rect.left;
            mouseY = touch.clientY - rect.top;
        });

        // Animation loop
        function animate() {
            // Clear with trail effect
            ctx.fillStyle = 'rgba(10, 10, 20, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update and draw shapes
            shapes.forEach(shape => {
                // Attract to mouse/touch
                const dx = mouseX - shape.x;
                const dy = mouseY - shape.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 200) {
                    shape.vx += dx * 0.001;
                    shape.vy += dy * 0.001;
                }

                shape.update(speed);
                shape.draw();
            });

            requestAnimationFrame(animate);
        }

        // Fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        animate();
    </script>
</body>
</html>
