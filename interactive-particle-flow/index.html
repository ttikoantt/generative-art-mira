<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Interactive Particle Flow - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .controls button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .controls button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .controls button.active {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 15px;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            z-index: 100;
        }

        @media (max-width: 768px) {
            .controls {
                flex-wrap: wrap;
                justify-content: center;
                bottom: 10px;
            }

            .controls button {
                padding: 8px 12px;
                font-size: 10px;
            }

            .info {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <div>🎨 Interactive Particle Flow</div>
        <div>Tap/Drag to create particles</div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <div class="controls">
        <button onclick="setMode('vortex')" id="btn-vortex">🌀 Vortex</button>
        <button onclick="setMode('explosion')" id="btn-explosion">💥 Explosion</button>
        <button onclick="setMode('trail')" id="btn-trail">✨ Trail</button>
        <button onclick="setMode('rain')" id="btn-rain">🌧️ Rain</button>
        <button onclick="clearCanvas()">🗑️ Clear</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let mode = 'vortex';
        let hue = 0;
        let mouse = { x: 0, y: 0, active: false };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor(x, y, mode) {
                this.x = x;
                this.y = y;
                this.mode = mode;
                this.life = 1;
                this.hue = hue;
                this.init();
            }

            init() {
                switch(this.mode) {
                    case 'vortex':
                        this.vx = (Math.random() - 0.5) * 4;
                        this.vy = (Math.random() - 0.5) * 4;
                        this.size = Math.random() * 3 + 1;
                        this.decay = 0.005;
                        break;
                    case 'explosion':
                        const angle = Math.random() * Math.PI * 2;
                        const speed = Math.random() * 8 + 2;
                        this.vx = Math.cos(angle) * speed;
                        this.vy = Math.sin(angle) * speed;
                        this.size = Math.random() * 5 + 2;
                        this.decay = 0.008;
                        break;
                    case 'trail':
                        this.vx = (Math.random() - 0.5) * 2;
                        this.vy = (Math.random() - 0.5) * 2;
                        this.size = Math.random() * 4 + 2;
                        this.decay = 0.01;
                        break;
                    case 'rain':
                        this.vx = 0;
                        this.vy = Math.random() * 5 + 3;
                        this.size = Math.random() * 2 + 1;
                        this.decay = 0.003;
                        break;
                }
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;

                switch(this.mode) {
                    case 'vortex':
                        if (mouse.active) {
                            const dx = mouse.x - this.x;
                            const dy = mouse.y - this.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < 200) {
                                const force = (200 - dist) / 200;
                                this.vx += (dx / dist) * force * 0.5;
                                this.vy += (dy / dist) * force * 0.5;
                            }
                        }
                        this.vx *= 0.99;
                        this.vy *= 0.99;
                        break;

                    case 'explosion':
                        this.vy += 0.1;
                        this.vx *= 0.99;
                        break;

                    case 'trail':
                        this.vx *= 0.98;
                        this.vy *= 0.98;
                        break;

                    case 'rain':
                        if (this.y > height) {
                            this.y = 0;
                            this.x = Math.random() * width;
                            this.life = 1;
                        }
                        break;
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = `hsl(${this.hue}, 100%, 60%)`;
                ctx.shadowBlur = 15;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 60%)`;

                if (this.mode === 'trail') {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
                }

                ctx.restore();
            }
        }

        function createParticles(x, y, count) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, mode));
            }
        }

        function setMode(newMode) {
            mode = newMode;
            document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${newMode}`).classList.add('active');
        }

        function clearCanvas() {
            particles = [];
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            hue += 0.5;

            particles = particles.filter(p => p.life > 0);

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            if (mouse.active && mode !== 'rain') {
                createParticles(mouse.x, mouse.y, 3);
            }

            if (mode === 'rain' && particles.length < 500) {
                createParticles(Math.random() * width, 0, 5);
            }

            requestAnimationFrame(animate);
        }

        // Event listeners
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousedown', (e) => {
            mouse.active = true;
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            createParticles(e.clientX, e.clientY, 20);
        });

        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener('mouseup', () => {
            mouse.active = false;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouse.active = true;
            const touch = e.touches[0];
            mouse.x = touch.clientX;
            mouse.y = touch.clientY;
            createParticles(touch.clientX, touch.clientY, 20);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouse.x = touch.clientX;
            mouse.y = touch.clientY;
        });

        canvas.addEventListener('touchend', () => {
            mouse.active = false;
        });

        // Initialize
        resize();
        setMode('vortex');
        animate();
    </script>
</body>
</html>
