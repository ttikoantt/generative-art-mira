<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Particle Visualizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 12px 24px;
            font-size: 14px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        button:active {
            transform: translateY(0);
        }
        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            max-width: 250px;
        }
        .info h1 {
            font-size: 18px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10;
            padding: 10px 15px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <h1>🎵 Music Particles</h1>
        <p>クリックでパーティクルを生成</p>
        <p>音楽のような動きを表現</p>
    </div>

    <div class="controls">
        <button id="burst">💥 バースト</button>
        <button id="rain">🌧️ レイン</button>
        <button id="spiral">🌀 スパイラル</button>
        <button id="clear">🗑️ クリア</button>
    </div>

    <button class="fullscreen-btn" id="fullscreen">⛶ 全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let hue = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        class Particle {
            constructor(x, y, type = 'burst') {
                this.x = x;
                this.y = y;
                this.type = type;
                this.size = Math.random() * 8 + 2;
                this.hue = hue;
                this.life = 1;
                this.decay = Math.random() * 0.01 + 0.005;

                switch(type) {
                    case 'burst':
                        const angle = Math.random() * Math.PI * 2;
                        const speed = Math.random() * 8 + 2;
                        this.vx = Math.cos(angle) * speed;
                        this.vy = Math.sin(angle) * speed;
                        break;
                    case 'rain':
                        this.vx = (Math.random() - 0.5) * 2;
                        this.vy = Math.random() * 5 + 3;
                        break;
                    case 'spiral':
                        this.angle = 0;
                        this.radius = 1;
                        this.speed = Math.random() * 0.2 + 0.1;
                        this.centerX = x;
                        this.centerY = y;
                        break;
                }
            }

            update() {
                this.hue += 2;
                this.life -= this.decay;

                switch(this.type) {
                    case 'burst':
                        this.x += this.vx;
                        this.y += this.vy;
                        this.vy += 0.1;
                        this.vx *= 0.99;
                        this.size *= 0.99;
                        break;
                    case 'rain':
                        this.x += this.vx;
                        this.y += this.vy;
                        this.vx += Math.sin(this.y * 0.01) * 0.3;
                        break;
                    case 'spiral':
                        this.angle += this.speed;
                        this.radius += 0.5;
                        this.x = this.centerX + Math.cos(this.angle) * this.radius;
                        this.y = this.centerY + Math.sin(this.angle) * this.radius;
                        this.speed += 0.001;
                        break;
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;

                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 70%, 1)`);
                gradient.addColorStop(0.5, `hsla(${this.hue + 30}, 100%, 50%, 0.5)`);
                gradient.addColorStop(1, `hsla(${this.hue + 60}, 100%, 30%, 0)`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        function createBurst(x, y) {
            for (let i = 0; i < 50; i++) {
                particles.push(new Particle(x, y, 'burst'));
            }
        }

        function createRain() {
            for (let i = 0; i < 5; i++) {
                particles.push(new Particle(
                    Math.random() * canvas.width,
                    -10,
                    'rain'
                ));
            }
        }

        function createSpiral() {
            const x = canvas.width / 2;
            const y = canvas.height / 2;
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    particles.push(new Particle(x, y, 'spiral'));
                }, i * 50);
            }
        }

        canvas.addEventListener('click', (e) => {
            createBurst(e.clientX, e.clientY);
            hue += 30;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createBurst(touch.clientX, touch.clientY);
            hue += 30;
        });

        document.getElementById('burst').addEventListener('click', () => {
            createBurst(canvas.width / 2, canvas.height / 2);
            hue += 30;
        });

        document.getElementById('rain').addEventListener('click', () => {
            for (let i = 0; i < 20; i++) {
                setTimeout(createRain, i * 100);
            }
        });

        document.getElementById('spiral').addEventListener('click', createSpiral);

        document.getElementById('clear').addEventListener('click', () => {
            particles = [];
        });

        document.getElementById('fullscreen').addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles = particles.filter(p => p.life > 0);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            hue += 0.5;
            requestAnimationFrame(animate);
        }

        // 初期演出
        setTimeout(() => {
            createBurst(canvas.width / 2, canvas.height / 2);
        }, 500);

        animate();
    </script>
</body>
</html>
