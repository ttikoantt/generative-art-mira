<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字の彫刻 - Text Sculpture</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        .info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">文字の彫刻 - マウスを動かすと彫刻が変化します</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let mouseX = 0, mouseY = 0;
        let time = 0;

        const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const numParticles = 50;

        class TextParticle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.baseSize = 20 + Math.random() * 60;
                this.char = characters[Math.floor(Math.random() * characters.length)];
                this.rotationSpeed = (Math.random() - 0.5) * 0.05;
                this.rotation = Math.random() * Math.PI * 2;
                this.hueOffset = Math.random() * 360;
                this.phase = Math.random() * Math.PI * 2;
                this.speed = 0.5 + Math.random() * 1.5;
            }

            update() {
                // マウスの影響
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const influence = Math.max(0, 1 - dist / 400);

                // 回転
                this.rotation += this.rotationSpeed + influence * 0.02;

                // 色相の変化
                this.hueOffset += 0.5;

                // 動き
                this.x += Math.sin(this.phase + time * this.speed) * (1 + influence * 2);
                this.y += Math.cos(this.phase + time * this.speed) * (1 + influence * 2);

                // 境界チェック
                if (this.x < -50 || this.x > width + 50 || this.y < -50 || this.y > height + 50) {
                    this.reset();
                }

                // 時々文字を変える
                if (Math.random() < 0.01) {
                    this.char = characters[Math.floor(Math.random() * characters.length)];
                }
            }

            draw() {
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const influence = Math.max(0, 1 - dist / 400);

                const size = this.baseSize * (1 + influence);
                const hue = (this.hueOffset + time * 20) % 360;
                const alpha = 0.3 + influence * 0.5;

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // グロー効果
                ctx.shadowBlur = 20 + influence * 30;
                ctx.shadowColor = `hsla(${hue}, 80%, 60%, ${alpha})`;

                ctx.fillStyle = `hsla(${hue}, 80%, 60%, ${alpha})`;
                ctx.font = `bold ${size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.char, 0, 0);

                ctx.restore();
            }
        }

        let particles = [];

        function init() {
            resize();
            particles = [];
            for (let i = 0; i < numParticles; i++) {
                particles.push(new TextParticle());
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function animate() {
            // 背景を少し残す
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            time += 0.016;

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // 中心に小さなグロー
            const gradient = ctx.createRadialGradient(
                width / 2, height / 2, 0,
                width / 2, height / 2, 300
            );
            gradient.addColorStop(0, `hsla(${time * 30}, 60%, 20%, 0.02)`);
            gradient.addColorStop(1, 'transparent');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        window.addEventListener('touchmove', (e) => {
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        init();
        animate();
    </script>
</body>
</html>
