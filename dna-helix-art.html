<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DNA Helix Art - Generative Art by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        h1 {
            color: #00ff88;
            font-size: clamp(1.5rem, 5vw, 3rem);
            margin: 1rem 0;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            text-align: center;
        }

        .canvas-container {
            position: relative;
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
        }

        .controls {
            background: rgba(0, 0, 0, 0.8);
            padding: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            align-items: center;
            width: 100%;
            border-top: 1px solid rgba(0, 255, 136, 0.3);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            min-width: 120px;
        }

        label {
            color: #00ff88;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="range"] {
            width: 100%;
            accent-color: #00ff88;
        }

        .value {
            color: #fff;
            font-size: 0.7rem;
            text-align: right;
        }

        button {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #000;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: rgba(0, 255, 136, 0.2);
            border: 2px solid #00ff88;
            color: #00ff88;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 136, 0.4);
        }

        @media (max-width: 600px) {
            .controls {
                padding: 0.5rem;
            }
            .control-group {
                min-width: 100px;
            }
        }
    </style>
</head>
<body>
    <h1>🧬 DNA Helix Art</h1>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="canvas-container">
        <canvas id="dnaCanvas"></canvas>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Rotation Speed</label>
            <input type="range" id="rotationSpeed" min="0.1" max="3" step="0.1" value="1">
            <span class="value" id="rotationSpeedValue">1.0x</span>
        </div>
        <div class="control-group">
            <label>Helix Length</label>
            <input type="range" id="helixLength" min="10" max="40" step="1" value="25">
            <span class="value" id="helixLengthValue">25</span>
        </div>
        <div class="control-group">
            <label>Particle Count</label>
            <input type="range" id="particleCount" min="5" max="20" step="1" value="12">
            <span class="value" id="particleCountValue">12</span>
        </div>
        <button onclick="regenerate()">🔄 Regenerate</button>
    </div>

    <script>
        const canvas = document.getElementById('dnaCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let time = 0;
        let particles = [];
        let colorScheme = 0;
        let rotationSpeed = 1;
        let helixLength = 25;
        let particleCount = 12;

        const colorSchemes = [
            [
                '#FF6B6B', '#4ECDC4',
                '#45B7D1', '#FFA07A',
                '#98D8C8', '#F7DC6F',
                '#BB8FCE', '#85C1E2',
                '#F8B739', '#52B788',
                '#E76F51', '#2A9D8F'
            ],
            [
                '#00FF88', '#00CCFF',
                '#FF00FF', '#FFFF00',
                '#FF6600', '#00FF00',
                '#00FFFF', '#FF0099',
                '#CCFF00', '#9900FF',
                '#FF3300', '#00FFCC'
            ],
            [
                '#E74C3C', '#3498DB',
                '#2ECC71', '#F39C12',
                '#9B59B6', '#1ABC9C',
                '#E67E22', '#34495E',
                '#16A085', '#27AE60',
                '#2980B9', '#8E44AD'
            ]
        ];

        class BasePair {
            constructor(index, total) {
                this.index = index;
                this.total = total;
                this.phase = (index / total) * Math.PI * 4;
            }

            update(t, speed) {
                this.phase += 0.02 * speed;
            }

            draw(cx, cy, scale) {
                const t = this.phase;
                const baseY = ((this.index / this.total) - 0.5) * helixLength * scale * 20;

                // Double helix structure
                const x1 = Math.cos(t) * 80 * scale;
                const z1 = Math.sin(t) * 80 * scale;
                const x2 = Math.cos(t + Math.PI) * 80 * scale;
                const z2 = Math.sin(t + Math.PI) * 80 * scale;

                // Perspective projection
                const perspective = 300;
                const scale1 = perspective / (perspective + z1);
                const scale2 = perspective / (perspective + z2);

                const screenX1 = cx + x1 * scale1;
                const screenY1 = cy + baseY * scale1;
                const screenX2 = cx + x2 * scale2;
                const screenY2 = cy + baseY * scale2;

                // Draw base pair connection
                const gradient = ctx.createLinearGradient(screenX1, screenY1, screenX2, screenY2);
                const color1 = colorSchemes[colorScheme][this.index % colorSchemes[colorScheme].length];
                const color2 = colorSchemes[colorScheme][(this.index + 1) % colorSchemes[colorScheme].length];
                gradient.addColorStop(0, color1 + '80');
                gradient.addColorStop(0.5, '#ffffff40');
                gradient.addColorStop(1, color2 + '80');

                ctx.beginPath();
                ctx.moveTo(screenX1, screenY1);
                ctx.lineTo(screenX2, screenY2);
                ctx.strokeStyle = gradient;
                ctx.lineWidth = 2 * Math.min(scale1, scale2);
                ctx.stroke();

                // Draw nucleotides (circles at ends)
                this.drawNucleotide(screenX1, screenY1, color1, scale1);
                this.drawNucleotide(screenX2, screenY2, color2, scale2);
            }

            drawNucleotide(x, y, color, scale) {
                const size = 8 * scale;

                // Glow effect
                const glowGradient = ctx.createRadialGradient(x, y, 0, x, y, size * 2);
                glowGradient.addColorStop(0, color + '60');
                glowGradient.addColorStop(1, color + '00');
                ctx.beginPath();
                ctx.arc(x, y, size * 2, 0, Math.PI * 2);
                ctx.fillStyle = glowGradient;
                ctx.fill();

                // Main circle
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();

                // Highlight
                ctx.beginPath();
                ctx.arc(x - size * 0.3, y - size * 0.3, size * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff80';
                ctx.fill();
            }
        }

        function init() {
            resize();
            createParticles();
            animate();
        }

        function createParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new BasePair(i, particleCount));
            }
        }

        function resize() {
            const container = document.querySelector('.canvas-container');
            width = canvas.width = container.clientWidth;
            height = canvas.height = container.clientHeight;
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, width, height);

            const cx = width / 2;
            const cy = height / 2;
            const scale = Math.min(width, height) / 800;

            time += 0.01;

            // Sort particles by z-index for proper depth rendering
            const sortedParticles = [...particles].sort((a, b) => {
                const zA = Math.sin(a.phase) * 80 * scale;
                const zB = Math.sin(b.phase) * 80 * scale;
                return zA - zB;
            });

            sortedParticles.forEach(particle => {
                particle.update(time, rotationSpeed);
                particle.draw(cx, cy, scale);
            });

            // Draw connecting helix strands
            drawHelixStrands(cx, cy, scale);

            requestAnimationFrame(animate);
        }

        function drawHelixStrands(cx, cy, scale) {
            const gradient1 = ctx.createLinearGradient(0, cy - helixLength * scale * 10, 0, cy + helixLength * scale * 10);
            gradient1.addColorStop(0, '#00ff8840');
            gradient1.addColorStop(0.5, '#00ff88');
            gradient1.addColorStop(1, '#00ff8840');

            particles.forEach((p, i) => {
                const t = p.phase;
                const baseY = ((i / particles.length) - 0.5) * helixLength * scale * 20;

                // Strand 1
                const x1 = Math.cos(t) * 80 * scale;
                const z1 = Math.sin(t) * 80 * scale;
                const perspective = 300;
                const scale1 = perspective / (perspective + z1);
                const screenX1 = cx + x1 * scale1;
                const screenY1 = cy + baseY * scale1;

                if (i > 0) {
                    const prev = particles[i - 1];
                    const prevT = prev.phase;
                    const prevBaseY = ((prev.index / particles.length) - 0.5) * helixLength * scale * 20;
                    const prevX1 = Math.cos(prevT) * 80 * scale;
                    const prevZ1 = Math.sin(prevT) * 80 * scale;
                    const prevScale1 = perspective / (perspective + prevZ1);
                    const prevScreenX1 = cx + prevX1 * prevScale1;
                    const prevScreenY1 = cy + prevBaseY * prevScale1;

                    ctx.beginPath();
                    ctx.moveTo(prevScreenX1, prevScreenY1);
                    ctx.lineTo(screenX1, screenY1);
                    ctx.strokeStyle = gradient1;
                    ctx.lineWidth = 3 * Math.min(scale1, prevScale1);
                    ctx.stroke();
                }

                // Strand 2
                const x2 = Math.cos(t + Math.PI) * 80 * scale;
                const z2 = Math.sin(t + Math.PI) * 80 * scale;
                const scale2 = perspective / (perspective + z2);
                const screenX2 = cx + x2 * scale2;
                const screenY2 = cy + baseY * scale2;

                if (i > 0) {
                    const prev = particles[i - 1];
                    const prevT = prev.phase;
                    const prevBaseY = ((prev.index / particles.length) - 0.5) * helixLength * scale * 20;
                    const prevX2 = Math.cos(prevT + Math.PI) * 80 * scale;
                    const prevZ2 = Math.sin(prevT + Math.PI) * 80 * scale;
                    const prevScale2 = perspective / (perspective + prevZ2);
                    const prevScreenX2 = cx + prevX2 * prevScale2;
                    const prevScreenY2 = cy + prevBaseY * prevScale2;

                    ctx.beginPath();
                    ctx.moveTo(prevScreenX2, prevScreenY2);
                    ctx.lineTo(screenX2, screenY2);
                    ctx.strokeStyle = gradient1;
                    ctx.lineWidth = 3 * Math.min(scale2, prevScale2);
                    ctx.stroke();
                }
            });
        }

        function regenerate() {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
            time = 0;
            ctx.fillStyle = 'rgba(10, 10, 10, 1)';
            ctx.fillRect(0, 0, width, height);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Event listeners
        window.addEventListener('resize', resize);

        document.getElementById('rotationSpeed').addEventListener('input', (e) => {
            rotationSpeed = parseFloat(e.target.value);
            document.getElementById('rotationSpeedValue').textContent = rotationSpeed.toFixed(1) + 'x';
        });

        document.getElementById('helixLength').addEventListener('input', (e) => {
            helixLength = parseInt(e.target.value);
            document.getElementById('helixLengthValue').textContent = helixLength;
        });

        document.getElementById('particleCount').addEventListener('input', (e) => {
            particleCount = parseInt(e.target.value);
            document.getElementById('particleCountValue').textContent = particleCount;
            createParticles();
        });

        // Initialize
        init();
    </script>
</body>
</html>
