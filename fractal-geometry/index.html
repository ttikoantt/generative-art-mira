<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Geometry - Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 1.5rem;
            text-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
            z-index: 10;
        }

        #canvas {
            border: 2px solid rgba(138, 43, 226, 0.3);
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.3);
            max-width: 95vw;
            max-height: 70vh;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 10;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            color: rgba(255, 255, 255, 0.6);
            margin-top: 15px;
            font-size: 0.85rem;
            text-align: center;
            max-width: 600px;
            z-index: 10;
        }

        #fullscreenBtn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.2rem;
                padding: 0 20px;
            }

            button {
                padding: 10px 20px;
                font-size: 0.85rem;
            }

            .info {
                font-size: 0.75rem;
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
    <h1>🔮 Fractal Geometry</h1>
    <canvas id="canvas" width="800" height="800"></canvas>
    <div class="controls">
        <button onclick="generate()">🎲 新しいパターン</button>
        <button onclick="toggleAnimation()">▶️ アニメーション</button>
        <button id="fullscreenBtn" onclick="toggleFullscreen()">📺 全画面</button>
    </div>
    <p class="info">クリエイティブで美しい幾何学パターンが自動生成されます</p>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let animationId = null;
        let isAnimating = false;
        let rotation = 0;
        let scale = 1;
        let scaleDirection = 1;
        let hue = 0;

        // パターンタイプ
        const patterns = ['spiral', 'flower', 'star', 'mandala', 'wave'];
        let currentPattern = patterns[0];

        // パラメータ
        let params = {};

        function generateParams() {
            currentPattern = patterns[Math.floor(Math.random() * patterns.length)];

            params = {
                iterations: Math.floor(Math.random() * 4) + 5,
                branches: Math.floor(Math.random() * 8) + 5,
                depth: Math.floor(Math.random() * 4) + 4,
                spread: Math.random() * 0.5 + 0.3,
                lineWidth: Math.random() * 2 + 0.5,
                baseHue: Math.random() * 360
            };
        }

        function drawFractalPattern(cx, cy, size, depth, angleOffset, alpha) {
            if (depth <= 0 || size < 2) return;

            const currentHue = (params.baseHue + hue + depth * 20) % 360;
            ctx.strokeStyle = `hsla(${currentHue}, 70%, 60%, ${alpha})`;
            ctx.lineWidth = Math.max(0.5, params.lineWidth * depth / params.depth);

            switch (currentPattern) {
                case 'spiral':
                    drawSpiral(cx, cy, size, depth, angleOffset, alpha);
                    break;
                case 'flower':
                    drawFlower(cx, cy, size, depth, angleOffset, alpha);
                    break;
                case 'star':
                    drawStar(cx, cy, size, depth, angleOffset, alpha);
                    break;
                case 'mandala':
                    drawMandala(cx, cy, size, depth, angleOffset, alpha);
                    break;
                case 'wave':
                    drawWave(cx, cy, size, depth, angleOffset, alpha);
                    break;
            }
        }

        function drawSpiral(cx, cy, size, depth, angleOffset, alpha) {
            const branches = params.branches;

            for (let i = 0; i < branches; i++) {
                const angle = (Math.PI * 2 * i / branches) + angleOffset + rotation;

                ctx.beginPath();
                ctx.moveTo(cx, cy);

                for (let j = 0; j < 20; j++) {
                    const r = (size * j / 20) * scale;
                    const theta = angle + j * 0.2;
                    const x = cx + r * Math.cos(theta);
                    const y = cy + r * Math.sin(theta);
                    ctx.lineTo(x, y);
                }

                ctx.stroke();

                const nextSize = size * params.spread;
                const nextAngle = angleOffset + (Math.PI / params.branches);
                drawFractalPattern(cx, cy, nextSize, depth - 1, nextAngle, alpha * 0.9);
            }
        }

        function drawFlower(cx, cy, size, depth, angleOffset, alpha) {
            const petals = params.branches;

            for (let i = 0; i < petals; i++) {
                const angle = (Math.PI * 2 * i / petals) + angleOffset + rotation;

                ctx.beginPath();
                ctx.ellipse(
                    cx + (size * 0.6) * Math.cos(angle) * scale,
                    cy + (size * 0.6) * Math.sin(angle) * scale,
                    size * 0.3 * scale,
                    size * 0.15 * scale,
                    angle,
                    0,
                    Math.PI * 2
                );
                ctx.stroke();

                drawFractalPattern(
                    cx + (size * 0.4) * Math.cos(angle) * scale,
                    cy + (size * 0.4) * Math.sin(angle) * scale,
                    size * params.spread * 0.6,
                    depth - 1,
                    angleOffset + 0.1,
                    alpha * 0.85
                );
            }
        }

        function drawStar(cx, cy, size, depth, angleOffset, alpha) {
            const points = params.branches;

            ctx.beginPath();
            for (let i = 0; i <= points * 2; i++) {
                const r = (i % 2 === 0) ? size : size * 0.4;
                const angle = (Math.PI * i / points) + angleOffset + rotation;
                const x = cx + r * Math.cos(angle) * scale;
                const y = cy + r * Math.sin(angle) * scale;

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.closePath();
            ctx.stroke();

            drawFractalPattern(cx, cy, size * params.spread * 0.7, depth - 1, angleOffset + 0.15, alpha * 0.8);
        }

        function drawMandala(cx, cy, size, depth, angleOffset, alpha) {
            const segments = params.branches * 2;

            for (let i = 0; i < segments; i++) {
                const angle = (Math.PI * 2 * i / segments) + angleOffset + rotation;

                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(
                    cx + size * Math.cos(angle) * scale,
                    cy + size * Math.sin(angle) * scale
                );
                ctx.stroke();

                // 装飾円
                const midX = cx + (size * 0.6) * Math.cos(angle) * scale;
                const midY = cy + (size * 0.6) * Math.sin(angle) * scale;
                ctx.beginPath();
                ctx.arc(midX, midY, size * 0.15 * scale, 0, Math.PI * 2);
                ctx.stroke();

                drawFractalPattern(midX, midY, size * params.spread * 0.5, depth - 1, angle + 0.1, alpha * 0.85);
            }
        }

        function drawWave(cx, cy, size, depth, angleOffset, alpha) {
            const waves = params.branches;

            for (let i = 0; i < waves; i++) {
                const baseAngle = (Math.PI * 2 * i / waves) + angleOffset + rotation;

                ctx.beginPath();
                for (let j = 0; j <= 50; j++) {
                    const r = (size * j / 50) * scale;
                    const wave = Math.sin(j * 0.3 + rotation * 2) * (size * 0.15 * scale);
                    const angle = baseAngle;
                    const x = cx + (r + wave) * Math.cos(angle);
                    const y = cy + (r + wave) * Math.sin(angle);

                    if (j === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.stroke();

                drawFractalPattern(cx, cy, size * params.spread * 0.8, depth - 1, angleOffset + 0.05, alpha * 0.9);
            }
        }

        function draw() {
            // 背景をクリア（半透明でトレイル効果）
            ctx.fillStyle = 'rgba(10, 10, 20, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const size = Math.min(canvas.width, canvas.height) * 0.4;

            drawFractalPattern(centerX, centerY, size, params.depth, 0, 1);

            if (isAnimating) {
                rotation += 0.005;
                hue += 0.2;
                scale += 0.001 * scaleDirection;

                if (scale > 1.1 || scale < 0.9) {
                    scaleDirection *= -1;
                }

                animationId = requestAnimationFrame(draw);
            }
        }

        function generate() {
            if (animationId) {
                cancelAnimationFrame(animationId);
            }

            generateParams();

            // 背景を完全にクリア
            ctx.fillStyle = 'rgba(10, 10, 20, 1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            rotation = 0;
            scale = 1;
            hue = 0;

            draw();
        }

        function toggleAnimation() {
            isAnimating = !isAnimating;

            if (isAnimating) {
                draw();
            } else {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                }
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                canvas.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // 初期生成
        generate();

        // タッチ操作対応
        let touchStartX = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });

        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const diff = touchEndX - touchStartX;

            if (Math.abs(diff) > 50) {
                generate();
            }
        });

        // キーボードショートカット
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                generate();
            } else if (e.code === 'KeyA') {
                toggleAnimation();
            } else if (e.code === 'KeyF') {
                toggleFullscreen();
            }
        });
    </script>
</body>
</html>
