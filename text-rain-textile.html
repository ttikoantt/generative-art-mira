<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Rain Textile - Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 10;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">
        Text Rain Textile | Move mouse to interact
    </div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let mouseX = 0, mouseY = 0;

        // Text characters to rain
        const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%^&*()_+-=[]{}|;:,.<>?';

        // Falling text particles
        class TextDrop {
            constructor() {
                this.reset();
                this.y = Math.random() * height; // Start at random positions
            }

            reset() {
                this.x = Math.random() * width;
                this.y = -50 - Math.random() * 500;
                this.speed = 1 + Math.random() * 3;
                this.char = characters[Math.floor(Math.random() * characters.length)];
                this.size = 12 + Math.random() * 20;
                this.opacity = 0.1 + Math.random() * 0.5;
                this.color = this.getRandomColor();
                this.oscillation = Math.random() * Math.PI * 2;
                this.oscillationSpeed = 0.02 + Math.random() * 0.03;
                this.swayAmount = 20 + Math.random() * 40;
                this.baseX = this.x;
                this.trail = [];
                this.maxTrail = 5 + Math.floor(Math.random() * 8);
            }

            getRandomColor() {
                const colors = [
                    'rgba(0, 255, 136, ',    // Green
                    'rgba(0, 255, 255, ',    // Cyan
                    'rgba(255, 0, 255, ',    // Magenta
                    'rgba(255, 255, 0, ',    // Yellow
                    'rgba(255, 136, 0, ',    // Orange
                    'rgba(136, 0, 255, ',    // Purple
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                // Store trail positions
                this.trail.unshift({ x: this.x, y: this.y, char: this.char, opacity: this.opacity });
                if (this.trail.length > this.maxTrail) {
                    this.trail.pop();
                }

                // Update position with physics
                this.y += this.speed;
                this.oscillation += this.oscillationSpeed;

                // Cloth-like swaying motion
                const swayX = Math.sin(this.oscillation) * this.swayAmount;

                // Mouse interaction
                const dx = this.baseX + swayX - mouseX;
                const dy = this.y - mouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const interactionRadius = 150;

                let mouseOffsetX = 0;
                let mouseOffsetY = 0;

                if (dist < interactionRadius) {
                    const force = (interactionRadius - dist) / interactionRadius;
                    mouseOffsetX = (dx / dist) * force * 100;
                    mouseOffsetY = (dy / dist) * force * 50;
                }

                this.x = this.baseX + swayX + mouseOffsetX;

                // Add wind effect
                const time = Date.now() * 0.001;
                const wind = Math.sin(time * 0.5 + this.baseX * 0.01) * 30;

                // Wave effect from left
                const wave = Math.sin(time * 0.3 + this.y * 0.01) * 20;

                this.x += wind * 0.02;
                this.x += wave * 0.01;

                // Occasionally change character
                if (Math.random() < 0.01) {
                    this.char = characters[Math.floor(Math.random() * characters.length)];
                }

                // Reset if below screen
                if (this.y > height + 50) {
                    this.reset();
                }
            }

            draw() {
                // Draw trail
                this.trail.forEach((pos, i) => {
                    const trailOpacity = pos.opacity * (1 - i / this.trail.length) * 0.5;
                    ctx.font = `${this.size * 0.8}px 'Courier New'`;
                    ctx.fillStyle = this.color + trailOpacity + ')';
                    ctx.fillText(pos.char, pos.x, pos.y);
                });

                // Draw main character
                ctx.font = `${this.size}px 'Courier New'`;
                ctx.fillStyle = this.color + this.opacity + ')';
                ctx.fillText(this.char, this.x, this.y);
            }
        }

        let drops = [];

        function init() {
            resize();
            drops = [];
            const numDrops = Math.floor((width * height) / 5000);
            for (let i = 0; i < numDrops; i++) {
                drops.push(new TextDrop());
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function animate() {
            // Semi-transparent black for trail effect
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, width, height);

            drops.forEach(drop => {
                drop.update();
                drop.draw();
            });

            requestAnimationFrame(animate);
        }

        // Mouse move
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // Touch support
        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });

        window.addEventListener('resize', () => {
            resize();
            init();
        });

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        init();
        animate();
    </script>
</body>
</html>
