<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Field Particles - Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .controls button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            border-radius: 4px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .controls button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            border-radius: 4px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: rgba(255, 255, 255, 0.6);
            font-family: 'Courier New', monospace;
            font-size: 12px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }

        @media (max-width: 768px) {
            .controls {
                bottom: 10px;
                left: 10px;
                right: 10px;
            }

            .controls button {
                padding: 8px 16px;
                font-size: 12px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 12px;
            }

            .info {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        Flow Field Particles #859<br>
        Particles: <span id="particleCount">2000</span>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="controls">
        <button onclick="reset()">リセット</button>
        <button onclick="toggleTrails()">トレイル</button>
        <button onclick="changeColorScheme()">色変更</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let flowField = [];
        let cols, rows;
        let scale = 20;
        let time = 0;
        let showTrails = true;
        let colorScheme = 0;

        const colorSchemes = [
            // Rainbow
            (t) => {
                const r = Math.sin(t * 0.3) * 127 + 128;
                const g = Math.sin(t * 0.3 + 2) * 127 + 128;
                const b = Math.sin(t * 0.3 + 4) * 127 + 128;
                return `rgb(${r}, ${g}, ${b})`;
            },
            // Ocean
            (t) => {
                const r = Math.sin(t * 0.2) * 50;
                const g = Math.sin(t * 0.2 + 1) * 100 + 100;
                const b = Math.sin(t * 0.2 + 2) * 55 + 200;
                return `rgb(${r}, ${g}, ${b})`;
            },
            // Sunset
            (t) => {
                const r = Math.sin(t * 0.25) * 55 + 200;
                const g = Math.sin(t * 0.25 + 1.5) * 80 + 50;
                const b = Math.sin(t * 0.25 + 3) * 50 + 50;
                return `rgb(${r}, ${g}, ${b})`;
            },
            // Neon
            (t) => {
                const r = Math.sin(t * 0.4) * 127 + 128;
                const g = Math.sin(t * 0.4 + 2.094) * 127 + 128;
                const b = Math.sin(t * 0.4 + 4.188) * 127 + 128;
                return `rgb(${r}, ${g}, ${b})`;
            },
            // Fire
            (t) => {
                const r = Math.sin(t * 0.3) * 55 + 200;
                const g = Math.sin(t * 0.3 + 1) * 100;
                const b = Math.sin(t * 0.3 + 2) * 50;
                return `rgb(${r}, ${g}, ${b})`;
            }
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            cols = Math.ceil(width / scale);
            rows = Math.ceil(height / scale);
            initFlowField();
        }

        function initFlowField() {
            flowField = [];
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    flowField.push(0);
                }
            }
        }

        function updateFlowField() {
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const index = x + y * cols;
                    const angle = Math.cos(x * 0.1) + Math.sin(y * 0.1) + time * 0.5;
                    flowField[index] = angle;
                }
            }
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = 0;
                this.vy = 0;
                this.life = Math.random() * 200 + 100;
                this.maxLife = this.life;
                this.hue = Math.random() * 360;
            }

            update() {
                const col = Math.floor(this.x / scale);
                const row = Math.floor(this.y / scale);
                const index = col + row * cols;

                if (index >= 0 && index < flowField.length) {
                    const angle = flowField[index];
                    this.vx += Math.cos(angle) * 0.1;
                    this.vy += Math.sin(angle) * 0.1;
                }

                this.vx *= 0.99;
                this.vy *= 0.99;

                this.x += this.vx;
                this.y += this.vy;

                this.life--;

                if (this.life <= 0 ||
                    this.x < 0 || this.x > width ||
                    this.y < 0 || this.y > height) {
                    this.reset();
                }
            }

            draw() {
                const alpha = this.life / this.maxLife;
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                const color = colorSchemes[colorScheme](time + this.hue * 0.1);

                ctx.save();
                ctx.globalAlpha = alpha * 0.6;
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, Math.min(speed * 0.5 + 1, 3), 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function initParticles() {
            particles = [];
            const numParticles = Math.min(2000, (width * height) / 500);
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle());
            }
            document.getElementById('particleCount').textContent = numParticles;
        }

        function animate() {
            if (showTrails) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                ctx.fillRect(0, 0, width, height);
            } else {
                ctx.clearRect(0, 0, width, height);
            }

            updateFlowField();

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            time += 0.01;
            requestAnimationFrame(animate);
        }

        function reset() {
            time = 0;
            initParticles();
            ctx.clearRect(0, 0, width, height);
        }

        function toggleTrails() {
            showTrails = !showTrails;
        }

        function changeColorScheme() {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
        }

        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        }

        // Mouse interaction
        let mouseX = -1000, mouseY = -1000;

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            // Add turbulence around mouse
            const col = Math.floor(mouseX / scale);
            const row = Math.floor(mouseY / scale);

            for (let dy = -2; dy <= 2; dy++) {
                for (let dx = -2; dx <= 2; dx++) {
                    const x = col + dx;
                    const y = row + dy;
                    if (x >= 0 && x < cols && y >= 0 && y < rows) {
                        const index = x + y * cols;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        flowField[index] += (Math.random() - 0.5) * (3 - dist);
                    }
                }
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;

            const col = Math.floor(mouseX / scale);
            const row = Math.floor(mouseY / scale);

            for (let dy = -2; dy <= 2; dy++) {
                for (let dx = -2; dx <= 2; dx++) {
                    const x = col + dx;
                    const y = row + dy;
                    if (x >= 0 && x < cols && y >= 0 && y < rows) {
                        const index = x + y * cols;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        flowField[index] += (Math.random() - 0.5) * (3 - dist);
                    }
                }
            }
        }, { passive: false });

        window.addEventListener('resize', resize);
        resize();
        initParticles();
        animate();
    </script>
</body>
</html>
