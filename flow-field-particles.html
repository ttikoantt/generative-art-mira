<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Field Particles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        #canvas {
            border: 2px solid #2a2a3a;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(100, 200, 255, 0.3);
        }

        .info {
            color: #8a8aaa;
            font-size: 12px;
            margin-top: 15px;
            text-align: center;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(100, 200, 255, 0.2);
            border: 1px solid #64c8ff;
            color: #64c8ff;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(100, 200, 255, 0.3);
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    <canvas id="canvas"></canvas>
    <div class="info">パーティクルが流れ場に沿って動きます | クリックで再生成</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // 設定
        const config = {
            width: Math.min(window.innerWidth - 40, 800),
            height: Math.min(window.innerHeight - 150, 600),
            particleCount: 2000,
            noiseScale: 0.005,
            speed: 1.5,
            trailOpacity: 0.05,
            colorBase: 200  // HSLの色相
        };

        // キャンバスサイズ設定
        canvas.width = config.width;
        canvas.height = config.height;

        // シンプレックスノイズ（簡易版）
        class SimplexNoise {
            constructor() {
                this.perm = new Array(512);
                const p = new Array(256);
                for (let i = 0; i < 256; i++) p[i] = i;
                for (let i = 255; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [p[i], p[j]] = [p[j], p[i]];
                }
                for (let i = 0; i < 512; i++) this.perm[i] = p[i & 255];
            }

            noise2D(x, y) {
                const F2 = 0.5 * (Math.sqrt(3) - 1);
                const G2 = (3 - Math.sqrt(3)) / 6;
                const s = (x + y) * F2;
                const i = Math.floor(x + s);
                const j = Math.floor(y + s);
                const t = (i + j) * G2;
                const X0 = i - t;
                const Y0 = j - t;
                const x0 = x - X0;
                const y0 = y - Y0;
                const i1 = x0 > y0 ? 1 : 0;
                const j1 = x0 > y0 ? 0 : 1;
                const x1 = x0 - i1 + G2;
                const y1 = y0 - j1 + G2;
                const x2 = x0 - 1 + 2 * G2;
                const y2 = y0 - 1 + 2 * G2;
                const ii = i & 255;
                const jj = j & 255;
                const grad = (hash, x, y) => {
                    const h = hash & 7;
                    const u = h < 4 ? x : y;
                    const v = h < 4 ? y : x;
                    return ((h & 1) ? -u : u) + ((h & 2) ? -2 * v : 2 * v);
                };
                let n0 = 0, n1 = 0, n2 = 0;
                let t0 = 0.5 - x0 * x0 - y0 * y0;
                if (t0 >= 0) {
                    t0 *= t0;
                    n0 = t0 * t0 * grad(this.perm[ii + this.perm[jj]], x0, y0);
                }
                let t1 = 0.5 - x1 * x1 - y1 * y1;
                if (t1 >= 0) {
                    t1 *= t1;
                    n1 = t1 * t1 * grad(this.perm[ii + i1 + this.perm[jj + j1]], x1, y1);
                }
                let t2 = 0.5 - x2 * x2 - y2 * y2;
                if (t2 >= 0) {
                    t2 *= t2;
                    n2 = t2 * t2 * grad(this.perm[ii + 1 + this.perm[jj + 1]], x2, y2);
                }
                return 70 * (n0 + n1 + n2);
            }
        }

        // ノイズ生成
        const noise = new SimplexNoise();

        // パーティクルクラス
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * config.width;
                this.y = Math.random() * config.height;
                this.vx = 0;
                this.vy = 0;
                this.life = Math.random() * 500 + 500;
                this.hue = config.colorBase + Math.random() * 60;
            }

            update() {
                // ノイズから角度を計算
                const angle = noise.noise2D(
                    this.x * config.noiseScale,
                    this.y * config.noiseScale
                ) * Math.PI * 4;

                // 速度を角度に合わせて更新
                this.vx += Math.cos(angle) * 0.2;
                this.vy += Math.sin(angle) * 0.2;

                // 速度制限
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > config.speed) {
                    this.vx = (this.vx / speed) * config.speed;
                    this.vy = (this.vy / speed) * config.speed;
                }

                // 位置更新
                this.x += this.vx;
                this.y += this.vy;

                // 寿命減少
                this.life--;

                // 境界チェック or 寿命切れでリセット
                if (this.x < 0 || this.x > config.width ||
                    this.y < 0 || this.y > config.height ||
                    this.life <= 0) {
                    this.reset();
                }
            }

            draw() {
                const alpha = this.life / 1000;
                ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // パーティクル配列
        let particles = [];

        // 初期化
        function init() {
            particles = [];
            for (let i = 0; i < config.particleCount; i++) {
                particles.push(new Particle());
            }
        }

        // アニメーション
        function animate() {
            // トレイル効果
            ctx.fillStyle = `rgba(10, 10, 15, ${config.trailOpacity})`;
            ctx.fillRect(0, 0, config.width, config.height);

            // パーティクル更新・描画
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // クリックで再生成
        canvas.addEventListener('click', () => {
            config.colorBase = Math.random() * 360;
            particles.forEach(p => {
                p.reset();
                p.hue = config.colorBase + Math.random() * 60;
            });
        });

        // 開始
        init();
        animate();
    </script>
</body>
</html>
