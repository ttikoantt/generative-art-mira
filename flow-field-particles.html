<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flow Field Particles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        #canvas {
            border: 1px solid #1a1a2e;
            touch-action: none;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px;
            background: rgba(10, 10, 15, 0.9);
            border-radius: 10px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            z-index: 100;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="info">Flow Field Particles | Touch/Drag to interact</div>
    <canvas id="canvas"></canvas>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    <div class="controls">
        <button onclick="reset()">🔄 Reset</button>
        <button onclick="changePalette()">🎨 Colors</button>
        <button onclick="toggleTrails()">✨ Trails</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let flowField = [];
        let cols, rows;
        const scale = 20;
        let showTrails = true;

        const palettes = [
            ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#4facfe'],
            ['#00f260', '#0575e6', '#e100ff', '#7f00ff', '#00dbde'],
            ['#ff9a9e', '#fecfef', '#fecfef', '#a18cd1', '#fbc2eb'],
            ['#a8edea', '#fed6e3', '#d299c2', '#fef9d7', '#89f7fe'],
            ['#f857a6', '#ff5858', '#fa709a', '#fee140', '#f9d423']
        ];

        let currentPalette = 0;
        let mouseX = -1000, mouseY = -1000;

        function resize() {
            width = canvas.width = Math.min(window.innerWidth - 20, 800);
            height = canvas.height = Math.min(window.innerHeight - 150, 600);
            cols = Math.floor(width / scale);
            rows = Math.floor(height / scale);
            initFlowField();
        }

        function initFlowField() {
            flowField = [];
            let yoff = 0;
            for (let y = 0; y < rows; y++) {
                let row = [];
                let xoff = 0;
                for (let x = 0; x < cols; x++) {
                    const angle = (Math.cos(xoff) + Math.sin(yoff)) * Math.PI * 2;
                    row.push(angle);
                    xoff += 0.1;
                }
                flowField.push(row);
                yoff += 0.1;
            }
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = 0;
                this.vy = 0;
                this.speed = Math.random() * 2 + 1;
                this.size = Math.random() * 2 + 1;
                this.color = palettes[currentPalette][Math.floor(Math.random() * palettes[currentPalette].length)];
                this.life = Math.random() * 200 + 100;
                this.maxLife = this.life;
            }

            update() {
                const col = Math.floor(this.x / scale);
                const row = Math.floor(this.y / scale);

                if (col >= 0 && col < cols && row >= 0 && row < rows) {
                    const angle = flowField[row][col];
                    this.vx += Math.cos(angle) * 0.1;
                    this.vy += Math.sin(angle) * 0.1;
                }

                // Mouse interaction
                const dx = this.x - mouseX;
                const dy = this.y - mouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 100) {
                    const force = (100 - dist) / 100;
                    this.vx += (dx / dist) * force * 0.5;
                    this.vy += (dy / dist) * force * 0.5;
                }

                this.vx *= 0.95;
                this.vy *= 0.95;

                this.x += this.vx * this.speed;
                this.y += this.vy * this.speed;
                this.life--;

                if (this.life <= 0 || this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                    this.reset();
                }
            }

            draw() {
                const alpha = this.life / this.maxLife;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color + Math.floor(alpha * 255).toString(16).padStart(2, '0');
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < 500; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            if (showTrails) {
                ctx.fillStyle = 'rgba(10, 10, 15, 0.05)';
            } else {
                ctx.fillStyle = 'rgba(10, 10, 15, 1)';
            }
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        function reset() {
            initFlowField();
            init();
        }

        function changePalette() {
            currentPalette = (currentPalette + 1) % palettes.length;
            particles.forEach(p => {
                p.color = palettes[currentPalette][Math.floor(Math.random() * palettes[currentPalette].length)];
            });
        }

        function toggleTrails() {
            showTrails = !showTrails;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Touch/Mouse events
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            mouseX = e.touches[0].clientX - rect.left;
            mouseY = e.touches[0].clientY - rect.top;
        });

        canvas.addEventListener('mouseleave', () => {
            mouseX = -1000;
            mouseY = -1000;
        });

        canvas.addEventListener('touchend', () => {
            mouseX = -1000;
            mouseY = -1000;
        });

        window.addEventListener('resize', resize);
        resize();
        init();
        animate();
    </script>
</body>
</html>
