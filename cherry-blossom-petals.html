<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桜の花びら - Cherry Blossom Petals</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>
    <div class="info">桜の花びら - 春の夜空を舞う<br>Click & Touch for More Petals</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let petals = [];

        // 桜の色のパレット
        const petalColors = [
            'rgba(255, 192, 203, 0.8)',  // Pink
            'rgba(255, 182, 193, 0.8)',  // Light Pink
            'rgba(255, 209, 220, 0.8)',  // Very Light Pink
            'rgba(250, 170, 190, 0.8)',  // Rose
        ];

        class Petal {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || -20;
                this.size = Math.random() * 15 + 10;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = Math.random() * 2 + 1;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.oscillation = Math.random() * Math.PI * 2;
                this.oscillationSpeed = Math.random() * 0.05 + 0.02;
                this.color = petalColors[Math.floor(Math.random() * petalColors.length)];
                this.opacity = Math.random() * 0.3 + 0.5;
            }

            update() {
                // 回転
                this.rotation += this.rotationSpeed;

                // 振動運動
                this.oscillation += this.oscillationSpeed;
                this.x += this.speedX + Math.sin(this.oscillation) * 1.5;

                // 重力
                this.speedY += 0.01;
                this.speedY = Math.min(this.speedY, 4);
                this.y += this.speedY;

                // 風の影響
                this.x += Math.sin(Date.now() * 0.001) * 0.5;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.opacity;

                // 桜の花びらの形
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(0, -this.size);
                ctx.bezierCurveTo(
                    this.size * 0.5, -this.size * 0.5,
                    this.size * 0.5, this.size * 0.5,
                    0, this.size
                );
                ctx.bezierCurveTo(
                    -this.size * 0.5, this.size * 0.5,
                    -this.size * 0.5, -this.size * 0.5,
                    0, -this.size
                );
                ctx.fill();

                // 花びらの中央の線
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(0, -this.size * 0.8);
                ctx.lineTo(0, this.size * 0.8);
                ctx.stroke();

                ctx.restore();
            }

            isOffScreen() {
                return this.y > height + 50;
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function init() {
            resize();
            // 初期の花びらを生成
            for (let i = 0; i < 30; i++) {
                petals.push(new Petal(Math.random() * width, Math.random() * height));
            }
        }

        function animate() {
            // 半透明の背景でトレイル効果
            ctx.fillStyle = 'rgba(26, 26, 46, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 既存の花びらを更新
            petals = petals.filter(petal => !petal.isOffScreen());
            petals.forEach(petal => {
                petal.update();
                petal.draw();
            });

            // 新しい花びらを追加
            if (Math.random() < 0.1) {
                petals.push(new Petal());
            }

            requestAnimationFrame(animate);
        }

        function addPetals(x, y, count = 5) {
            for (let i = 0; i < count; i++) {
                petals.push(new Petal(
                    x + (Math.random() - 0.5) * 50,
                    y + (Math.random() - 0.5) * 50
                ));
            }
        }

        // マウス/タッチイベント
        canvas.addEventListener('click', (e) => {
            addPetals(e.clientX, e.clientY, 10);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            addPetals(touch.clientX, touch.clientY, 10);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            addPetals(touch.clientX, touch.clientY, 3);
        });

        window.addEventListener('resize', resize);

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        init();
        animate();
    </script>
</body>
</html>
