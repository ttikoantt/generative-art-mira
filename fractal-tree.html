<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Tree - ジェネレーティブアート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1rem;
            color: #888;
        }

        .canvas-container {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 255, 136, 0.2);
        }

        canvas {
            display: block;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            border: none;
            border-radius: 8px;
            color: #1a1a2e;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 255, 136, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
        }

        .info {
            margin-top: 20px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            max-width: 600px;
            text-align: center;
            color: #aaa;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌳 Fractal Tree</h1>
        <p class="subtitle">再帰的なフラクタル木</p>
    </div>

    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <button onclick="regenerate()">🔄 新しい木を生成</button>
        <button onclick="animateGrowth()">🌱 成長アニメーション</button>
        <button onclick="addTree()">➕ 木を追加</button>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">📺 全画面</button>
    </div>

    <div class="info">
        キャンバスをクリックすると新しい木が植えられます<br>
        フラクタルの美しさをお楽しみください
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // 設定
        const config = {
            width: Math.min(800, window.innerWidth - 40),
            height: Math.min(600, window.innerHeight - 250),
            bgColor: '#0a0a0f',
            trunkColor: '#8B4513',
            leafColors: ['#228B22', '#32CD32', '#00FF00', '#90EE90', '#98FB98']
        };

        // キャンバスサイズ設定
        function setupCanvas() {
            canvas.width = config.width;
            canvas.height = config.height;
        }

        // 色の生成
        function randomLeafColor() {
            return config.leafColors[Math.floor(Math.random() * config.leafColors.length)];
        }

        // 枝の色のグラデーション
        function getBranchColor(depth, maxDepth) {
            const ratio = depth / maxDepth;
            const r = Math.floor(139 - ratio * 100);
            const g = Math.floor(69 + ratio * 100);
            const b = Math.floor(19 + ratio * 50);
            return `rgb(${r}, ${g}, ${b})`;
        }

        // フラクタル木を描画
        function drawTree(startX, startY, length, angle, depth, maxDepth) {
            if (depth === 0) {
                // 葉を描画
                ctx.beginPath();
                ctx.arc(startX, startY, 3, 0, Math.PI * 2);
                ctx.fillStyle = randomLeafColor();
                ctx.fill();

                // 小さな花を描く
                if (Math.random() > 0.7) {
                    ctx.beginPath();
                    ctx.arc(startX, startY, 2, 0, Math.PI * 2);
                    ctx.fillStyle = Math.random() > 0.5 ? '#FFB6C1' : '#FFD700';
                    ctx.fill();
                }
                return;
            }

            // 枝の終点を計算
            const endX = startX + length * Math.cos(angle);
            const endY = startY + length * Math.sin(angle);

            // 枝を描画
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = getBranchColor(maxDepth - depth, maxDepth);
            ctx.lineWidth = depth * 1.5;
            ctx.lineCap = 'round';
            ctx.stroke();

            // 再帰的に枝を描画
            const branchCount = 2 + Math.floor(Math.random() * 2); // 2-3本
            for (let i = 0; i < branchCount; i++) {
                const newLength = length * (0.6 + Math.random() * 0.2); // 60-80%
                const angleOffset = (Math.random() - 0.5) * 1.2; // -0.5 ~ 0.5 ラジアン
                const newAngle = angle + angleOffset;
                drawTree(endX, endY, newLength, newAngle, depth - 1, maxDepth);
            }
        }

        // 木を生成
        function generateTree(x, y) {
            const depth = 8 + Math.floor(Math.random() * 3); // 8-10
            const length = 60 + Math.random() * 30; // 60-90
            drawTree(x, y, length, -Math.PI / 2, depth, depth);
        }

        // 全体を再描画
        function regenerate() {
            ctx.fillStyle = config.bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 複数の木を生成
            const treeCount = 3 + Math.floor(Math.random() * 3); // 3-5本
            for (let i = 0; i < treeCount; i++) {
                const x = (canvas.width / (treeCount + 1)) * (i + 1);
                const y = canvas.height - 20;
                generateTree(x, y);
            }
        }

        // 成長アニメーション
        function animateGrowth() {
            ctx.fillStyle = config.bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let currentDepth = 1;
            const maxDepth = 10;
            const x = canvas.width / 2;
            const y = canvas.height - 20;

            function animate() {
                if (currentDepth > maxDepth) return;

                ctx.fillStyle = config.bgColor;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                drawTree(x, y, 80, -Math.PI / 2, currentDepth, maxDepth);
                currentDepth++;

                setTimeout(() => requestAnimationFrame(animate), 200);
            }

            animate();
        }

        // 木を追加
        function addTree() {
            const x = Math.random() * canvas.width;
            const y = canvas.height - 20;
            generateTree(x, y);
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                canvas.requestFullscreen();
            }
        }

        // クリックで木を追加
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = canvas.height - 20;
            generateTree(x, y);
        });

        // 初期化
        setupCanvas();
        regenerate();
    </script>
</body>
</html>
