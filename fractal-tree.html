<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fractal Tree</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050505;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      touch-action: none;
    }
    canvas { display: block; }
    .info {
      position: absolute;
      top: 16px;
      left: 16px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
      pointer-events: none;
      user-select: none;
    }
    .fullscreen-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: background 0.2s;
    }
    .fullscreen-btn:hover { background: rgba(255, 255, 255, 0.2); }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="info">Drag to change • Scroll to zoom</div>
  <button class="fullscreen-btn" onclick="toggleFullscreen()">Full</button>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    let w, h;
    let mx = 0.5, my = 0.5;
    let scale = 1;
    let trees = [];

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }

    function hueGradient(y, maxDepth) {
      return Math.floor((y / maxDepth) * 360 + 180);
    }

    function drawTree(x, y, len, angle, depth, maxDepth) {
      if (depth <= 0 || len < 2) return;

      const endX = x + len * Math.cos(angle);
      const endY = y + len * Math.sin(angle);

      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(endX, endY);
      ctx.strokeStyle = `hsl(${hueGradient(maxDepth - depth, maxDepth)}, 70%, ${50 + depth * 3}%)`;
      ctx.lineWidth = depth * 0.8;
      ctx.stroke();

      const angleVar = 0.3 + mx * 0.8;
      const lenMult = 0.65 + my * 0.15;

      const branch1Angle = angle - angleVar + (Math.random() - 0.5) * 0.2;
      const branch1Len = len * lenMult * (0.8 + Math.random() * 0.4);
      drawTree(endX, endY, branch1Len, branch1Angle, depth - 1, maxDepth);

      const branch2Angle = angle + angleVar + (Math.random() - 0.5) * 0.2;
      const branch2Len = len * lenMult * (0.8 + Math.random() * 0.4);
      drawTree(endX, endY, branch2Len, branch2Angle, depth - 1, maxDepth);

      if (depth > maxDepth * 0.6 && Math.random() < 0.4) {
        const branch3Angle = angle + (Math.random() - 0.5) * 0.3;
        drawTree(endX, endY, len * 0.5, branch3Angle, depth - 2, maxDepth);
      }
    }

    function generate() {
      ctx.fillStyle = '#050505';
      ctx.fillRect(0, 0, w, h);

      const maxDepth = 11;
      const startX = w / 2;
      const startY = h - 20;
      const initialLen = Math.min(w, h) * 0.18 * scale;

      drawTree(startX, startY, initialLen, -Math.PI / 2, maxDepth, maxDepth);
    }

    let isDragging = false;

    canvas.addEventListener('mousedown', (e) => { isDragging = true; updateFromEvent(e); });
    canvas.addEventListener('mousemove', (e) => { if (isDragging) updateFromEvent(e); });
    canvas.addEventListener('mouseup', () => isDragging = false);
    canvas.addEventListener('mouseleave', () => isDragging = false);

    canvas.addEventListener('touchstart', (e) => { isDragging = true; updateFromEvent(e.touches[0]); e.preventDefault(); }, {passive: false});
    canvas.addEventListener('touchmove', (e) => { if (isDragging) updateFromEvent(e.touches[0]); e.preventDefault(); }, {passive: false});
    canvas.addEventListener('touchend', () => isDragging = false);

    canvas.addEventListener('wheel', (e) => {
      scale = Math.max(0.5, Math.min(2, scale - e.deltaY * 0.001));
      generate();
    });

    function updateFromEvent(e) {
      mx = Math.max(0, Math.min(1, e.clientX / w));
      my = Math.max(0, Math.min(1, e.clientY / h));
      generate();
    }

    window.addEventListener('resize', () => { resize(); generate(); });

    function toggleFullscreen() {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    }

    resize();
    generate();

    setInterval(() => {
      generate();
    }, 6000);
  </script>
</body>
</html>
