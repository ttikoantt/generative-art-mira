<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Tree - Generative Art by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff;
            overflow: hidden;
        }

        h1 {
            position: absolute;
            top: 20px;
            font-size: 1.5rem;
            color: #7dd3fc;
            text-shadow: 0 0 20px rgba(125, 211, 252, 0.5);
            z-index: 10;
        }

        canvas {
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(125, 211, 252, 0.2);
        }

        .controls {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        button {
            background: rgba(125, 211, 252, 0.2);
            border: 1px solid rgba(125, 211, 252, 0.5);
            color: #7dd3fc;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        button:hover {
            background: rgba(125, 211, 252, 0.4);
            transform: translateY(-2px);
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1rem;
                top: 10px;
            }

            button {
                padding: 8px 16px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <h1>🌳 Fractal Tree</h1>

    <canvas id="canvas"></canvas>

    <div class="controls">
        <button onclick="regenerate()">🎲 Regenerate</button>
        <button onclick="toggleWind()">🌬️ Wind: OFF</button>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let windEnabled = false;
        let windAngle = 0;
        let animationId;

        function resize() {
            width = Math.min(window.innerWidth - 40, 800);
            height = Math.min(window.innerHeight - 120, 800);
            canvas.width = width;
            canvas.height = height;
        }

        function drawBranch(x, y, length, angle, depth, maxDepth) {
            if (depth > maxDepth || length < 2) return;

            const endX = x + Math.cos(angle) * length;
            const endY = y - Math.sin(angle) * length;

            // 色をグラデーション
            const hue = 120 + (depth / maxDepth) * 60; // 緑から青へ
            const lightness = 70 - (depth / maxDepth) * 20;
            ctx.strokeStyle = `hsl(${hue}, 80%, ${lightness}%)`;
            ctx.lineWidth = Math.max(1, (maxDepth - depth) * 0.8);

            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.stroke();

            // 風の効果
            const windEffect = windEnabled ? Math.sin(windAngle + depth * 0.5) * 0.05 : 0;

            // 再帰的に枝を描く
            const numBranches = 2 + Math.floor(Math.random() * 2); // 2-3本の枝
            for (let i = 0; i < numBranches; i++) {
                const newAngle = angle + (Math.random() - 0.5) * 0.8 + windEffect;
                const newLength = length * (0.65 + Math.random() * 0.15);
                drawBranch(endX, endY, newLength, newAngle, depth + 1, maxDepth);
            }
        }

        function draw() {
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, width, height);

            const startLength = height * 0.25;
            const maxDepth = 8 + Math.floor(Math.random() * 3); // 8-10階層

            // 複数の木を描く
            const numTrees = 1 + Math.floor(Math.random() * 3);
            for (let t = 0; t < numTrees; t++) {
                const xOffset = (width / (numTrees + 1)) * (t + 1);
                drawBranch(xOffset, height, startLength, Math.PI / 2, 0, maxDepth);
            }

            // 花びらや葉を追加
            addParticles();
        }

        function addParticles() {
            const numParticles = 30 + Math.floor(Math.random() * 50);
            for (let i = 0; i < numParticles; i++) {
                const x = Math.random() * width;
                const y = Math.random() * height;
                const size = Math.random() * 3 + 1;
                const alpha = Math.random() * 0.5 + 0.2;

                ctx.fillStyle = `rgba(255, 182, 193, ${alpha})`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function regenerate() {
            draw();
        }

        function toggleWind() {
            windEnabled = !windEnabled;
            const btn = event.target;
            btn.textContent = windEnabled ? '🌬️ Wind: ON' : '🌬️ Wind: OFF';

            if (windEnabled) {
                animate();
            } else {
                cancelAnimationFrame(animationId);
            }
        }

        function animate() {
            windAngle += 0.03;
            draw();
            if (windEnabled) {
                animationId = requestAnimationFrame(animate);
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        window.addEventListener('resize', () => {
            resize();
            draw();
        });

        resize();
        draw();

        // タッチ操作
        let touchStartX = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });

        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const diff = touchStartX - touchEndX;

            if (Math.abs(diff) > 50) {
                regenerate();
            }
        });
    </script>
</body>
</html>
