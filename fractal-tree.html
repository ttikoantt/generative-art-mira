<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Tree - フラクタルツリー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            z-index: 10;
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 3rem);
            font-weight: 700;
            background: linear-gradient(90deg, #00ff88, #00d4ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: clamp(0.8rem, 2vw, 1rem);
            color: #888;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            justify-content: center;
            z-index: 10;
        }

        .control-group {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 200px;
        }

        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #aaa;
        }

        .control-group input[type="range"] {
            width: 100%;
            margin-bottom: 5px;
        }

        .value {
            font-size: 0.85rem;
            color: #00ff88;
        }

        button {
            background: linear-gradient(90deg, #00ff88, #00d4ff);
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            color: #000;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            padding: 10px 15px;
            font-size: 0.9rem;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 70vh;
            min-height: 400px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .info {
            margin-top: 20px;
            text-align: center;
            font-size: 0.85rem;
            color: #666;
            max-width: 600px;
        }

        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .control-group {
                min-width: auto;
            }

            #canvas-container {
                height: 60vh;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 12px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="header">
        <h1>🌳 Fractal Tree</h1>
        <div class="subtitle">フラクタル幾何学の美しさ - 自然のパターンを再帰的に描画</div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>枝の角度: <span class="value" id="angle-value">25°</span></label>
            <input type="range" id="angle" min="10" max="50" value="25">
        </div>

        <div class="control-group">
            <label>枝の長さ: <span class="value" id="length-value">120</span></label>
            <input type="range" id="length" min="50" max="180" value="120">
        </div>

        <div class="control-group">
            <label>再帰の深さ: <span class="value" id="depth-value">10</span></label>
            <input type="range" id="depth" min="5" max="14" value="10">
        </div>

        <div class="control-group">
            <label>風の強さ: <span class="value" id="wind-value">2</span></label>
            <input type="range" id="wind" min="0" max="5" value="2">
        </div>

        <button onclick="randomize()">🎲 ランダム</button>
    </div>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div class="info">
        フラクタルツリーは自然の成長パターンを数学的に表現したものです。<br>
        再帰的な自己相似性が美しい樹木の形を作り出します。
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');

        let angle = 25;
        let length = 120;
        let depth = 10;
        let windStrength = 2;

        let animationFrame;
        let time = 0;

        function resize() {
            const rect = container.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
        }

        function drawBranch(x, y, len, angle, currentDepth) {
            if (currentDepth === 0 || len < 2) return;

            const endX = x + len * Math.cos(angle * Math.PI / 180);
            const endY = y - len * Math.sin(angle * Math.PI / 180);

            // 色のグラデーション
            const hue = 120 + (depth - currentDepth) * 15;
            const lightness = 30 + (depth - currentDepth) * 5;
            ctx.strokeStyle = `hsl(${hue}, 70%, ${lightness}%)`;
            ctx.lineWidth = Math.max(0.5, currentDepth * 0.8);
            ctx.lineCap = 'round';

            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.stroke();

            const newLen = len * 0.75;
            const wind = Math.sin(time * 0.02 + currentDepth) * windStrength * (depth - currentDepth) * 0.5;

            drawBranch(endX, endY, newLen, angle - angle + wind, currentDepth - 1);
            drawBranch(endX, endY, newLen, angle + angle + wind, currentDepth - 1);
        }

        function draw() {
            const rect = container.getBoundingClientRect();
            ctx.clearRect(0, 0, rect.width, rect.height);

            // 背景のグラデーション
            const gradient = ctx.createLinearGradient(0, 0, 0, rect.height);
            gradient.addColorStop(0, '#0a0a0a');
            gradient.addColorStop(1, '#1a1a2e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, rect.width, rect.height);

            // 地面
            ctx.fillStyle = '#0a3d0a';
            ctx.fillRect(0, rect.height - 20, rect.width, 20);

            // ツリーを描画
            drawBranch(rect.width / 2, rect.height - 20, length, 90, depth);

            time++;
            animationFrame = requestAnimationFrame(draw);
        }

        function randomize() {
            angle = Math.random() * 40 + 10;
            length = Math.random() * 130 + 50;
            depth = Math.floor(Math.random() * 10) + 5;
            windStrength = Math.random() * 5;

            document.getElementById('angle').value = angle;
            document.getElementById('length').value = length;
            document.getElementById('depth').value = depth;
            document.getElementById('wind').value = windStrength;

            updateValues();
        }

        function updateValues() {
            document.getElementById('angle-value').textContent = Math.round(angle) + '°';
            document.getElementById('length-value').textContent = Math.round(length);
            document.getElementById('depth-value').textContent = Math.round(depth);
            document.getElementById('wind-value').textContent = Math.round(windStrength);
        }

        document.getElementById('angle').addEventListener('input', (e) => {
            angle = parseFloat(e.target.value);
            updateValues();
        });

        document.getElementById('length').addEventListener('input', (e) => {
            length = parseFloat(e.target.value);
            updateValues();
        });

        document.getElementById('depth').addEventListener('input', (e) => {
            depth = parseInt(e.target.value);
            updateValues();
        });

        document.getElementById('wind').addEventListener('input', (e) => {
            windStrength = parseFloat(e.target.value);
            updateValues();
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', resize);

        // 初期化
        resize();
        draw();
    </script>
</body>
</html>
