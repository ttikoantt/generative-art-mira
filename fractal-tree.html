<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>フラクタルツリージェネレーター</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
        }

        h1 {
            color: #fff;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin-bottom: 10px;
            text-align: center;
            text-shadow: 0 0 20px rgba(138, 43, 226, 0.8);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            margin-bottom: 20px;
            text-align: center;
        }

        .canvas-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        canvas {
            display: block;
            border-radius: 10px;
            max-width: 100%;
            height: auto;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 15px;
            width: 100%;
            max-width: 600px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        label {
            color: #fff;
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            text-align: center;
        }

        input[type="range"] {
            width: clamp(120px, 30vw, 150px);
            height: 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.8);
        }

        .buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            font-family: 'Courier New', monospace;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }

        .btn-generate:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.6);
        }

        .btn-random {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
        }

        .btn-random:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(245, 87, 108, 0.6);
        }

        .btn-fullscreen {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #fff;
        }

        .btn-fullscreen:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(79, 172, 254, 0.6);
        }

        .fullscreen-mode {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            z-index: 1000;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .fullscreen-mode h1,
        .fullscreen-mode .subtitle,
        .fullscreen-mode .controls,
        .fullscreen-mode .buttons {
            display: none;
        }

        .fullscreen-mode .canvas-container {
            margin: 0;
            padding: 10px;
        }

        .info {
            color: rgba(255, 255, 255, 0.6);
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>🌳 フラクタルツリージェネレーター</h1>
    <p class="subtitle">自然界の美しいパターンを再帰的に生成</p>

    <div class="controls">
        <div class="control-group">
            <label>深さ: <span id="depth-value">10</span></label>
            <input type="range" id="depth" min="4" max="14" value="10">
        </div>
        <div class="control-group">
            <label>角度: <span id="angle-value">25</span>°</label>
            <input type="range" id="angle" min="10" max="45" value="25">
        </div>
        <div class="control-group">
            <label>枝の長さ: <span id="length-value">120</span></label>
            <input type="range" id="branch-length" min="80" max="160" value="120">
        </div>
        <div class="control-group">
            <label>枝の太さ: <span id="width-value">10</span></label>
            <input type="range" id="branch-width" min="5" max="20" value="10">
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="canvas" width="600" height="500"></canvas>
    </div>

    <div class="buttons">
        <button class="btn-generate" onclick="generate()">🎨 生成</button>
        <button class="btn-random" onclick="randomize()">🎲 ランダム</button>
        <button class="btn-fullscreen" onclick="toggleFullscreen()">📺 全画面</button>
    </div>

    <p class="info">スライダーを調整して、自分だけの木を創造してください</p>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // レスポンシブキャンバス
        function resizeCanvas() {
            const container = canvas.parentElement;
            const maxWidth = Math.min(600, window.innerWidth - 40);
            canvas.width = maxWidth;
            canvas.height = maxWidth * 0.83;
            generate();
        }

        // フラクタルツリーを描画
        function drawTree(startX, startY, length, angle, branchWidth, depth) {
            ctx.beginPath();
            ctx.save();
            ctx.translate(startX, startY);
            ctx.rotate(angle * Math.PI / 180);

            // 色を深さに応じて変化
            const hue = (120 - depth * 8) % 360;
            const saturation = 60 + depth * 3;
            const lightness = 40 + depth * 2;
            ctx.strokeStyle = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
            ctx.lineWidth = branchWidth;
            ctx.lineCap = 'round';

            ctx.moveTo(0, 0);
            ctx.lineTo(0, -length);
            ctx.stroke();

            if (depth > 0) {
                // 左の枝
                ctx.save();
                ctx.translate(0, -length);
                const angleOffset = parseFloat(document.getElementById('angle').value);
                const newLength = length * 0.75;
                const newWidth = branchWidth * 0.7;
                drawTree(0, 0, newLength, -angleOffset, newWidth, depth - 1);
                ctx.restore();

                // 右の枝
                ctx.save();
                ctx.translate(0, -length);
                drawTree(0, 0, newLength, angleOffset, newWidth, depth - 1);
                ctx.restore();
            }

            ctx.restore();
        }

        // ツリーを生成
        function generate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const depth = parseInt(document.getElementById('depth').value);
            const length = parseFloat(document.getElementById('branch-length').value);
            const width = parseFloat(document.getElementById('branch-width').value);

            // 地面を描画
            const gradient = ctx.createLinearGradient(0, canvas.height - 50, 0, canvas.height);
            gradient.addColorStop(0, '#2d5016');
            gradient.addColorStop(1, '#1a3009');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);

            // ツリーを描画
            drawTree(canvas.width / 2, canvas.height - 50, length * canvas.width / 600, 0, width * canvas.width / 600, depth);
        }

        // ランダム設定
        function randomize() {
            document.getElementById('depth').value = Math.floor(Math.random() * 5) + 8;
            document.getElementById('angle').value = Math.floor(Math.random() * 25) + 15;
            document.getElementById('branch-length').value = Math.floor(Math.random() * 50) + 90;
            document.getElementById('branch-width').value = Math.floor(Math.random() * 10) + 8;
            updateLabels();
            generate();
        }

        // ラベル更新
        function updateLabels() {
            document.getElementById('depth-value').textContent = document.getElementById('depth').value;
            document.getElementById('angle-value').textContent = document.getElementById('angle').value;
            document.getElementById('length-value').textContent = document.getElementById('branch-length').value;
            document.getElementById('width-value').textContent = document.getElementById('branch-width').value;
        }

        // 全画面切り替え
        let isFullscreen = false;
        function toggleFullscreen() {
            isFullscreen = !isFullscreen;
            if (isFullscreen) {
                document.body.classList.add('fullscreen-mode');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            } else {
                document.body.classList.remove('fullscreen-mode');
                resizeCanvas();
            }
            generate();
        }

        // イベントリスナー
        document.querySelectorAll('input[type="range"]').forEach(input => {
            input.addEventListener('input', () => {
                updateLabels();
                generate();
            });
        });

        window.addEventListener('resize', () => {
            if (isFullscreen) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                generate();
            } else {
                resizeCanvas();
            }
        });

        // 初期化
        resizeCanvas();
        updateLabels();
    </script>
</body>
</html>
