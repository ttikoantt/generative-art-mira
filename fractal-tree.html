<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フラクタル木 - Interactive Fractal Tree</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: white;
        }

        h1 {
            margin-bottom: 10px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            text-align: center;
            margin-bottom: 20px;
            opacity: 0.9;
            font-size: 14px;
        }

        .canvas-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            margin-bottom: 20px;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .controls {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            max-width: 600px;
            width: 100%;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        .control-group label {
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .control-group input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.3);
            outline: none;
            -webkit-appearance: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .value-display {
            margin-top: 5px;
            font-size: 12px;
            opacity: 0.8;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-random {
            background: white;
            color: #667eea;
        }

        .btn-random:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-animate {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-animate:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
        }

        @media (max-width: 600px) {
            h1 { font-size: 24px; }
            .controls { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <h1>🌳 フラクタル木</h1>
    <p class="subtitle">インタラクティブな数学的アート</p>

    <div class="canvas-container">
        <canvas id="fractalCanvas"></canvas>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>分岐角度: <span id="angleValue">25°</span></label>
            <input type="range" id="angleSlider" min="5" max="60" value="25">
        </div>

        <div class="control-group">
            <label>深さ: <span id="depthValue">10</span></label>
            <input type="range" id="depthSlider" min="3" max="14" value="10">
        </div>

        <div class="control-group">
            <label>枝の長さ: <span id="lengthValue">120</span></label>
            <input type="range" id="lengthSlider" min="50" max="200" value="120">
        </div>

        <div class="control-group">
            <label>分岐率: <span id="ratioValue">0.7</span></label>
            <input type="range" id="ratioSlider" min="50" max="85" value="70">
        </div>
    </div>

    <div class="buttons">
        <button class="btn-random" onclick="randomize()">🎲 ランダム</button>
        <button class="btn-animate" onclick="toggleAnimation()">✨ アニメーション</button>
    </div>

    <div class="info">
        🖱️ キャンバスをクリックで位置を調整 | スライダーでリアルタイムに変化
    </div>

    <script>
        const canvas = document.getElementById('fractalCanvas');
        const ctx = canvas.getContext('2d');

        // キャンバスサイズ設定
        function resizeCanvas() {
            const maxWidth = Math.min(800, window.innerWidth - 40);
            const maxHeight = Math.min(600, window.innerHeight - 400);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
            draw();
        }

        // パラメータ
        let angle = 25;
        let depth = 10;
        let trunkLength = 120;
        let lengthRatio = 0.7;
        let startX;
        let startY;
        let isAnimating = false;
        let animationId = null;
        let animationAngle = 0;

        // 初期位置設定
        function setStartPosition() {
            startX = canvas.width / 2;
            startY = canvas.height;
        }

        // HSVをRGBに変換
        function hsvToRgb(h, s, v) {
            let r, g, b;
            const i = Math.floor(h * 6);
            const f = h * 6 - i;
            const p = v * (1 - s);
            const q = v * (1 - f * s);
            const t = v * (1 - (1 - f) * s);

            switch (i % 6) {
                case 0: r = v; g = t; b = p; break;
                case 1: r = q; g = v; b = p; break;
                case 2: r = p; g = v; b = t; break;
                case 3: r = p; g = q; b = v; break;
                case 4: r = t; g = p; b = v; break;
                case 5: r = v; g = p; b = q; break;
            }

            return `rgb(${Math.floor(r * 255)}, ${Math.floor(g * 255)}, ${Math.floor(b * 255)})`;
        }

        // フラクタル木を描画
        function drawBranch(x, y, length, angle, currentDepth, maxDepth) {
            if (currentDepth > maxDepth || length < 2) return;

            const endX = x + length * Math.sin(angle * Math.PI / 180);
            const endY = y - length * Math.cos(angle * Math.PI / 180);

            // 色を計算（深さに応じてグラデーション）
            const hue = (currentDepth / maxDepth) * 0.3 + 0.1; // 茶色から緑へ
            const saturation = 0.7 + (currentDepth / maxDepth) * 0.3;
            const value = 0.4 + (currentDepth / maxDepth) * 0.4;
            ctx.strokeStyle = hsvToRgb(hue, saturation, value);

            // 太さを計算
            ctx.lineWidth = Math.max(0.5, (maxDepth - currentDepth) * 1.2);
            ctx.lineCap = 'round';

            // 枝を描画
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.stroke();

            // 葉を描画（最後の分岐）
            if (currentDepth === maxDepth) {
                const leafSize = 4 + Math.random() * 4;
                const leafHue = 0.2 + Math.random() * 0.2; // 緑色
                ctx.fillStyle = hsvToRgb(leafHue, 0.8, 0.6);
                ctx.beginPath();
                ctx.arc(endX, endY, leafSize, 0, Math.PI * 2);
                ctx.fill();
            }

            // 再帰的に分岐
            const newLength = length * lengthRatio;
            const leftAngle = angle - (isAnimating ? angle + Math.sin(animationAngle) * 10 : angle);
            const rightAngle = angle + (isAnimating ? angle + Math.sin(animationAngle) * 10 : angle);

            drawBranch(endX, endY, newLength, leftAngle, currentDepth + 1, maxDepth);
            drawBranch(endX, endY, newLength, rightAngle, currentDepth + 1, maxDepth);
        }

        // メイン描画関数
        function draw() {
            ctx.fillStyle = '#fafafa';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 背景にグラデーション
            const gradient = ctx.createRadialGradient(
                canvas.width / 2, canvas.height, 0,
                canvas.width / 2, canvas.height, canvas.height
            );
            gradient.addColorStop(0, '#ffffff');
            gradient.addColorStop(1, '#f0f0f0');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            setStartPosition();
            drawBranch(startX, startY, trunkLength, 0, 0, depth);
        }

        // スライダーイベント
        document.getElementById('angleSlider').addEventListener('input', (e) => {
            angle = parseFloat(e.target.value);
            document.getElementById('angleValue').textContent = angle + '°';
            if (!isAnimating) draw();
        });

        document.getElementById('depthSlider').addEventListener('input', (e) => {
            depth = parseInt(e.target.value);
            document.getElementById('depthValue').textContent = depth;
            if (!isAnimating) draw();
        });

        document.getElementById('lengthSlider').addEventListener('input', (e) => {
            trunkLength = parseInt(e.target.value);
            document.getElementById('lengthValue').textContent = trunkLength;
            if (!isAnimating) draw();
        });

        document.getElementById('ratioSlider').addEventListener('input', (e) => {
            lengthRatio = parseFloat(e.target.value) / 100;
            document.getElementById('ratioValue').textContent = lengthRatio.toFixed(2);
            if (!isAnimating) draw();
        });

        // ランダム化
        function randomize() {
            angle = 10 + Math.random() * 40;
            depth = 6 + Math.floor(Math.random() * 6);
            trunkLength = 80 + Math.random() * 80;
            lengthRatio = 0.55 + Math.random() * 0.25;

            document.getElementById('angleSlider').value = angle;
            document.getElementById('depthSlider').value = depth;
            document.getElementById('lengthSlider').value = trunkLength;
            document.getElementById('ratioSlider').value = lengthRatio * 100;

            document.getElementById('angleValue').textContent = Math.round(angle) + '°';
            document.getElementById('depthValue').textContent = depth;
            document.getElementById('lengthValue').textContent = Math.round(trunkLength);
            document.getElementById('ratioValue').textContent = lengthRatio.toFixed(2);

            if (!isAnimating) draw();
        }

        // アニメーション
        function toggleAnimation() {
            isAnimating = !isAnimating;
            const btn = document.querySelector('.btn-animate');

            if (isAnimating) {
                btn.textContent = '⏹️ 停止';
                animationAngle = 0;
                animate();
            } else {
                btn.textContent = '✨ アニメーション';
                if (animationId) {
                    cancelAnimationFrame(animationId);
                }
                draw();
            }
        }

        function animate() {
            animationAngle += 0.05;
            draw();
            if (isAnimating) {
                animationId = requestAnimationFrame(animate);
            }
        }

        // キャンバスクリックイベント
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;
            if (!isAnimating) draw();
        });

        // 初期化
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>
