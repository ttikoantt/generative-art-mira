<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Tree Generator | Generative Art by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: #e94560;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-align: center;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        .subtitle {
            color: #a8a8b3;
            font-size: 1rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .canvas-container {
            position: relative;
            margin-bottom: 20px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        #fractalCanvas {
            display: block;
            background: #0a0a0f;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
        }

        .control-group {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .control-group label {
            display: block;
            color: #e94560;
            font-size: 0.9rem;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .control-group input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(233, 69, 96, 0.2);
            outline: none;
            -webkit-appearance: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #e94560;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }

        .control-group input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #e94560;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }

        .value-display {
            color: #a8a8b3;
            font-size: 0.85rem;
            text-align: right;
            margin-top: 5px;
        }

        .buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(233, 69, 96, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #e94560;
            border: 2px solid #e94560;
        }

        .btn-secondary:hover {
            background: rgba(233, 69, 96, 0.1);
            transform: translateY(-2px);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(233, 69, 96, 0.9);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 1000;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: #ff6b6b;
            transform: scale(1.05);
        }

        .info {
            color: #a8a8b3;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 20px;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 15px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全画面</button>

    <div class="container">
        <h1>🌳 Fractal Tree Generator</h1>
        <p class="subtitle">フラクタル幾何学で生成される美しい木々</p>

        <div class="canvas-container">
            <canvas id="fractalCanvas"></canvas>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>分岐角度</label>
                <input type="range" id="angle" min="10" max="60" value="25">
                <div class="value-display" id="angleValue">25°</div>
            </div>

            <div class="control-group">
                <label>枝の長さ</label>
                <input type="range" id="length" min="50" max="200" value="120">
                <div class="value-display" id="lengthValue">120px</div>
            </div>

            <div class="control-group">
                <label>再帰の深さ</label>
                <input type="range" id="depth" min="5" max="14" value="10">
                <div class="value-display" id="depthValue">10</div>
            </div>

            <div class="control-group">
                <label>枝の太さ</label>
                <input type="range" id="width" min="1" max="20" value="8">
                <div class="value-display" id="widthValue">8px</div>
            </div>
        </div>

        <div class="buttons">
            <button class="btn-primary" onclick="generateTree()">🔄 新しく生成</button>
            <button class="btn-secondary" onclick="toggleAnimation()">▶️ アニメーション</button>
            <button class="btn-secondary" onclick="randomize()">🎲 ランダム</button>
        </div>

        <p class="info">
            パラメータを調整して、独自のフラクタル木を生成してください。<br>
            アニメーションで成長する様子も楽しめます。
        </p>
    </div>

    <script>
        const canvas = document.getElementById('fractalCanvas');
        const ctx = canvas.getContext('2d');

        // Canvasサイズ設定
        function resizeCanvas() {
            const container = canvas.parentElement;
            const size = Math.min(container.clientWidth, window.innerHeight * 0.6);
            canvas.width = size;
            canvas.height = size;
            generateTree();
        }

        // パラメータ
        let angle, length, depth, width;
        let animationId = null;
        let isAnimating = false;
        let currentDepth = 0;

        // 色相（カラフルなグラデーション）
        function getColor(d, maxDepth) {
            const hue = (d / maxDepth) * 360;
            return `hsl(${hue}, 80%, ${50 + (d / maxDepth) * 30}%)`;
        }

        // フラクタル木を描画（再帰関数）
        function drawBranch(x, y, len, angle, d, maxDepth) {
            if (d === 0 || len < 2) return;

            const endX = x + len * Math.cos(angle);
            const endY = y + len * Math.sin(angle);

            // 枝を描画
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = getColor(maxDepth - d, maxDepth);
            ctx.lineWidth = Math.max(1, (d / maxDepth) * width);
            ctx.lineCap = 'round';
            ctx.stroke();

            // グロー効果
            ctx.shadowBlur = 10;
            ctx.shadowColor = getColor(maxDepth - d, maxDepth);

            // 再帰的に分岐
            const newLen = len * 0.7;
            const angleRad = (angle * Math.PI) / 180;

            drawBranch(endX, endY, newLen, angle - angleRad, d - 1, maxDepth);
            drawBranch(endX, endY, newLen, angle + angleRad, d - 1, maxDepth);

            ctx.shadowBlur = 0;
        }

        // 木を生成
        function generateTree() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }

            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // パラメータ取得
            angle = parseFloat(document.getElementById('angle').value);
            length = parseFloat(document.getElementById('length').value);
            depth = parseInt(document.getElementById('depth').value);
            width = parseFloat(document.getElementById('width').value);

            // 根元から描画
            const startX = canvas.width / 2;
            const startY = canvas.height;
            const startAngle = -90 * (Math.PI / 180); // 上向き

            drawBranch(startX, startY, length, startAngle, depth, depth);
        }

        // アニメーション付きで生成
        function animateGrowth() {
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // パラメータ取得
            angle = parseFloat(document.getElementById('angle').value);
            length = parseFloat(document.getElementById('length').value);
            depth = parseInt(document.getElementById('depth').value);
            width = parseFloat(document.getElementById('width').value);

            currentDepth = 1;

            function animate() {
                if (currentDepth > depth) {
                    isAnimating = false;
                    return;
                }

                ctx.fillStyle = '#0a0a0f';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const startX = canvas.width / 2;
                const startY = canvas.height;
                const startAngle = -90 * (Math.PI / 180);

                drawBranch(startX, startY, length, startAngle, currentDepth, depth);

                currentDepth++;
                animationId = requestAnimationFrame(animate);
            }

            animate();
        }

        // アニメーショントグル
        function toggleAnimation() {
            if (isAnimating) {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                isAnimating = false;
            } else {
                isAnimating = true;
                animateGrowth();
            }
        }

        // ランダム設定
        function randomize() {
            document.getElementById('angle').value = Math.random() * 50 + 10;
            document.getElementById('length').value = Math.random() * 150 + 50;
            document.getElementById('depth').value = Math.floor(Math.random() * 9) + 5;
            document.getElementById('width').value = Math.random() * 19 + 1;
            updateDisplays();
            generateTree();
        }

        // 値表示更新
        function updateDisplays() {
            document.getElementById('angleValue').textContent = document.getElementById('angle').value + '°';
            document.getElementById('lengthValue').textContent = document.getElementById('length').value + 'px';
            document.getElementById('depthValue').textContent = document.getElementById('depth').value;
            document.getElementById('widthValue').textContent = document.getElementById('width').value + 'px';
        }

        // 全画面トグル
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        document.getElementById('angle').addEventListener('input', () => {
            updateDisplays();
            generateTree();
        });

        document.getElementById('length').addEventListener('input', () => {
            updateDisplays();
            generateTree();
        });

        document.getElementById('depth').addEventListener('input', () => {
            updateDisplays();
            generateTree();
        });

        document.getElementById('width').addEventListener('input', () => {
            updateDisplays();
            generateTree();
        });

        window.addEventListener('resize', resizeCanvas);

        // 初期化
        resizeCanvas();
        updateDisplays();
    </script>
</body>
</html>
