<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Tree - Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 20px;
            z-index: 10;
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #888;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .canvas-container {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }

        canvas {
            display: block;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0a 100%);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            max-width: 600px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 120px;
        }

        label {
            font-size: 0.8rem;
            color: #00ff88;
        }

        input[type="range"] {
            width: 150px;
            accent-color: #00ff88;
        }

        .value {
            font-size: 0.75rem;
            color: #888;
        }

        .buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            background: linear-gradient(135deg, #00ff88 0%, #00ccff 100%);
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        button:active {
            transform: scale(0.98);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .info {
            text-align: center;
            color: #888;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .controls {
                padding: 15px;
            }

            input[type="range"] {
                width: 120px;
            }

            button {
                padding: 8px 16px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🌳 Fractal Tree</h1>
        <p class="subtitle">再帰的なフラクタルツリー</p>
    </header>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>分岐角度</label>
                <input type="range" id="angle" min="0" max="90" value="25">
                <span class="value" id="angleValue">25°</span>
            </div>

            <div class="control-group">
                <label>枝の長さ</label>
                <input type="range" id="length" min="50" max="200" value="120">
                <span class="value" id="lengthValue">120</span>
            </div>

            <div class="control-group">
                <label>再帰レベル</label>
                <input type="range" id="depth" min="5" max="14" value="10">
                <span class="value" id="depthValue">10</span>
            </div>

            <div class="control-group">
                <label>枝の太さ</label>
                <input type="range" id="thickness" min="1" max="20" value="10">
                <span class="value" id="thicknessValue">10</span>
            </div>
        </div>

        <div class="buttons">
            <button onclick="randomize()">🎲 ランダム</button>
            <button onclick="animateTree()">🌱 アニメーション</button>
            <button onclick="saveImage()">💾 保存</button>
        </div>

        <p class="info">マウスを動かしてツリーを操作</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Controls
        const angleSlider = document.getElementById('angle');
        const lengthSlider = document.getElementById('length');
        const depthSlider = document.getElementById('depth');
        const thicknessSlider = document.getElementById('thickness');

        // Set canvas size
        function resizeCanvas() {
            const container = canvas.parentElement;
            const size = Math.min(window.innerWidth - 40, 700);
            canvas.width = size;
            canvas.height = size * 0.9;
            draw();
        }

        // Draw fractal tree
        function drawTree(x, y, len, angle, depth, maxDepth) {
            if (depth === 0) return;

            // Calculate color based on depth
            const hue = 120 + (maxDepth - depth) * 15; // Green to cyan
            const lightness = 40 + (maxDepth - depth) * 5;
            ctx.strokeStyle = `hsl(${hue}, 80%, ${lightness}%)`;
            ctx.lineWidth = Math.max(0.5, depth * thicknessSlider.value / 10);
            ctx.lineCap = 'round';

            // Draw branch
            ctx.beginPath();
            ctx.moveTo(x, y);

            const endX = x + len * Math.sin(angle * Math.PI / 180);
            const endY = y - len * Math.cos(angle * Math.PI / 180);

            ctx.lineTo(endX, endY);
            ctx.stroke();

            // Recursive calls
            const branchAngle = parseFloat(angleSlider.value);
            const lengthRatio = 0.75;

            drawTree(endX, endY, len * lengthRatio, angle + branchAngle, depth - 1, maxDepth);
            drawTree(endX, endY, len * lengthRatio, angle - branchAngle, depth - 1, maxDepth);
        }

        // Main draw function
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw gradient background
            const gradient = ctx.createRadialGradient(
                canvas.width / 2, canvas.height / 2, 0,
                canvas.width / 2, canvas.height / 2, canvas.width / 2
            );
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(1, '#0a0a0a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const startX = canvas.width / 2;
            const startY = canvas.height - 50;
            const length = parseFloat(lengthSlider.value);
            const depth = parseInt(depthSlider.value);

            drawTree(startX, startY, length, 0, depth, depth);
        }

        // Update values display
        function updateValues() {
            document.getElementById('angleValue').textContent = angleSlider.value + '°';
            document.getElementById('lengthValue').textContent = lengthSlider.value;
            document.getElementById('depthValue').textContent = depthSlider.value;
            document.getElementById('thicknessValue').textContent = thicknessSlider.value;
        }

        // Event listeners
        angleSlider.addEventListener('input', () => {
            updateValues();
            draw();
        });

        lengthSlider.addEventListener('input', () => {
            updateValues();
            draw();
        });

        depthSlider.addEventListener('input', () => {
            updateValues();
            draw();
        });

        thicknessSlider.addEventListener('input', () => {
            updateValues();
            draw();
        });

        // Mouse interaction
        let isMouseDown = false;

        canvas.addEventListener('mousedown', () => isMouseDown = true);
        canvas.addEventListener('mouseup', () => isMouseDown = false);
        canvas.addEventListener('mouseleave', () => isMouseDown = false);

        canvas.addEventListener('mousemove', (e) => {
            if (!isMouseDown) return;

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / canvas.width;
            const y = (e.clientY - rect.top) / canvas.height;

            angleSlider.value = Math.floor(x * 90);
            lengthSlider.value = Math.floor(100 + y * 100);

            updateValues();
            draw();
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isMouseDown = true;
        });

        canvas.addEventListener('touchend', () => isMouseDown = false);

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isMouseDown) return;

            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = (touch.clientX - rect.left) / canvas.width;
            const y = (touch.clientY - rect.top) / canvas.height;

            angleSlider.value = Math.floor(x * 90);
            lengthSlider.value = Math.floor(100 + y * 100);

            updateValues();
            draw();
        });

        // Randomize
        function randomize() {
            angleSlider.value = Math.floor(Math.random() * 60) + 10;
            lengthSlider.value = Math.floor(Math.random() * 100) + 80;
            depthSlider.value = Math.floor(Math.random() * 5) + 7;
            thicknessSlider.value = Math.floor(Math.random() * 10) + 5;

            updateValues();
            draw();
        }

        // Animation
        let animationId = null;
        let animAngle = 0;

        function animateTree() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
                return;
            }

            let time = 0;
            function animate() {
                time += 0.02;
                angleSlider.value = 20 + Math.sin(time) * 15;
                updateValues();
                draw();

                animationId = requestAnimationFrame(animate);
            }
            animate();
        }

        // Save image
        function saveImage() {
            const link = document.createElement('a');
            link.download = 'fractal-tree.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        // Fullscreen
        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        }

        // Initialize
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        updateValues();
    </script>
</body>
</html>
