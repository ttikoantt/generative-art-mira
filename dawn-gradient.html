<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夜明けのグラデーション | Dawn Gradient</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        .info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 25px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }

        .info h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #ff9a9e, #fecfef, #fecfef);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .info p {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .time-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="canvas"></canvas>

        <div class="time-badge" id="timeBadge">夜明け進行中...</div>

        <button class="fullscreen-btn" id="fullscreenBtn">
            ⛶ 全画面
        </button>

        <div class="info">
            <h1>夜明けのグラデーション</h1>
            <p>Dawn Gradient - 星が消え、空が明るくなる</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let time = 0;
        let dawnProgress = 0;

        // 星の配列
        let stars = [];

        // 設定
        const config = {
            starCount: 150,
            dawnDuration: 1000, // 夜明けの進行速度
        };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initStars();
        }

        function initStars() {
            stars = [];
            for (let i = 0; i < config.starCount; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height * 0.7,
                    size: Math.random() * 2 + 0.5,
                    twinkle: Math.random() * Math.PI * 2,
                    twinkleSpeed: Math.random() * 0.05 + 0.02,
                    opacity: Math.random() * 0.5 + 0.5,
                });
            }
        }

        function getSkyColors(progress) {
            // progress: 0 = 夜, 1 = 完全な朝
            const nightColors = {
                top: [10, 10, 35],
                middle: [20, 15, 50],
                bottom: [40, 20, 60],
            };

            const dawnColors = {
                top: [135, 150, 200],
                middle: [255, 180, 150],
                bottom: [255, 220, 180],
            };

            const dayColors = {
                top: [135, 180, 255],
                middle: [200, 220, 255],
                bottom: [255, 240, 220],
            };

            let colors;
            if (progress < 0.5) {
                // 夜 → 夜明け
                const t = progress * 2;
                colors = {
                    top: lerpColor(nightColors.top, dawnColors.top, t),
                    middle: lerpColor(nightColors.middle, dawnColors.middle, t),
                    bottom: lerpColor(nightColors.bottom, dawnColors.bottom, t),
                };
            } else {
                // 夜明け → 朝
                const t = (progress - 0.5) * 2;
                colors = {
                    top: lerpColor(dawnColors.top, dayColors.top, t),
                    middle: lerpColor(dawnColors.middle, dayColors.middle, t),
                    bottom: lerpColor(dawnColors.bottom, dayColors.bottom, t),
                };
            }

            return colors;
        }

        function lerpColor(c1, c2, t) {
            return [
                Math.round(c1[0] + (c2[0] - c1[0]) * t),
                Math.round(c1[1] + (c2[1] - c1[1]) * t),
                Math.round(c1[2] + (c2[2] - c1[2]) * t),
            ];
        }

        function colorToString(c) {
            return `rgb(${c[0]}, ${c[1]}, ${c[2]})`;
        }

        function drawGradient(colors) {
            const gradient = ctx.createLinearGradient(0, 0, 0, height);

            gradient.addColorStop(0, colorToString(colors.top));
            gradient.addColorStop(0.5, colorToString(colors.middle));
            gradient.addColorStop(1, colorToString(colors.bottom));

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }

        function drawStars(starOpacity) {
            stars.forEach(star => {
                star.twinkle += star.twinkleSpeed;
                const twinkleFactor = Math.sin(star.twinkle) * 0.3 + 0.7;

                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);

                const alpha = star.opacity * twinkleFactor * starOpacity;
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fill();

                // 星の光り
                if (star.size > 1.5) {
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size * 2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.2})`;
                    ctx.fill();
                }
            });
        }

        function drawSun(progress) {
            if (progress < 0.3) return;

            const sunProgress = (progress - 0.3) / 0.7;
            const sunY = height * 0.8 - sunProgress * height * 0.4;
            const sunSize = 40 + sunProgress * 20;

            // 太陽の光り
            const glowGradient = ctx.createRadialGradient(
                width / 2, sunY, 0,
                width / 2, sunY, sunSize * 4
            );
            glowGradient.addColorStop(0, 'rgba(255, 200, 100, 0.4)');
            glowGradient.addColorStop(0.5, 'rgba(255, 150, 50, 0.1)');
            glowGradient.addColorStop(1, 'rgba(255, 100, 0, 0)');

            ctx.fillStyle = glowGradient;
            ctx.fillRect(0, 0, width, height);

            // 太陽本体
            ctx.beginPath();
            ctx.arc(width / 2, sunY, sunSize, 0, Math.PI * 2);

            const sunGradient = ctx.createRadialGradient(
                width / 2, sunY, 0,
                width / 2, sunY, sunSize
            );
            sunGradient.addColorStop(0, '#fff8e0');
            sunGradient.addColorStop(0.3, '#ffdd88');
            sunGradient.addColorStop(0.7, '#ffaa44');
            sunGradient.addColorStop(1, '#ff7722');

            ctx.fillStyle = sunGradient;
            ctx.fill();
        }

        function draw() {
            time++;

            // 夜明けの進行（サイクル）
            dawnProgress = (Math.sin(time * 0.002) + 1) / 2;

            const colors = getSkyColors(dawnProgress);
            drawGradient(colors);

            // 星の透明度（夜明けが進むと消える）
            const starOpacity = Math.max(0, 1 - dawnProgress * 1.5);
            if (starOpacity > 0) {
                drawStars(starOpacity);
            }

            // 太陽
            drawSun(dawnProgress);

            // バッジ更新
            const badge = document.getElementById('timeBadge');
            if (dawnProgress < 0.2) {
                badge.textContent = '🌙 深夜';
            } else if (dawnProgress < 0.4) {
                badge.textContent = '⭐ 夜明け前';
            } else if (dawnProgress < 0.6) {
                badge.textContent = '🌅 夜明け';
            } else if (dawnProgress < 0.8) {
                badge.textContent = '☀️ 朝';
            } else {
                badge.textContent = '🌞 朝焼け';
            }

            requestAnimationFrame(draw);
        }

        // 全画面ボタン
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // 初期化
        window.addEventListener('resize', resize);
        resize();
        draw();
    </script>
</body>
</html>
