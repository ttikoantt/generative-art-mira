<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night Sky Meteors</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a3a 50%, #0a0a2a 100%);
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">Night Sky Meteors - Click to create shooting star</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // Stars (background)
        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 0.5;
                this.twinkleSpeed = Math.random() * 0.02 + 0.01;
                this.twinkleOffset = Math.random() * Math.PI * 2;
                this.brightness = Math.random() * 0.5 + 0.5;
            }

            update(time) {
                const twinkle = Math.sin(time * this.twinkleSpeed + this.twinkleOffset) * 0.3 + 0.7;
                return this.brightness * twinkle;
            }

            draw(ctx, brightness) {
                ctx.fillStyle = `rgba(255, 255, 255, ${brightness})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();

                // Glow effect for brighter stars
                if (brightness > 0.8) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${brightness * 0.2})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        // Shooting stars (meteors)
        class Meteor {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height * 0.3;
                this.length = Math.random() * 100 + 80;
                this.speed = Math.random() * 8 + 6;
                this.angle = Math.PI / 4 + (Math.random() - 0.5) * 0.2; // 45 degrees with slight variation
                this.opacity = 1;
                this.decay = Math.random() * 0.01 + 0.008;
                this.trail = [];
                this.hue = Math.random() * 60 + 180; // Blue to cyan range
            }

            update() {
                // Store previous positions for trail
                this.trail.unshift({ x: this.x, y: this.y, opacity: this.opacity });
                if (this.trail.length > this.length / 10) {
                    this.trail.pop();
                }

                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                this.opacity -= this.decay;

                return this.opacity > 0 && this.x < width + 100 && this.y < height + 100;
            }

            draw(ctx) {
                // Draw trail
                for (let i = 0; i < this.trail.length; i++) {
                    const point = this.trail[i];
                    const trailOpacity = point.opacity * (1 - i / this.trail.length) * 0.6;

                    ctx.fillStyle = `hsla(${this.hue}, 80%, 70%, ${trailOpacity})`;
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, 2, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Draw head
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 8);
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 90%, ${this.opacity})`);
                gradient.addColorStop(0.3, `hsla(${this.hue}, 80%, 70%, ${this.opacity * 0.8})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 60%, 50%, 0)`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 8, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Initialize stars
        const stars = [];
        for (let i = 0; i < 200; i++) {
            stars.push(new Star());
        }

        // Meteors array
        let meteors = [];

        // Auto-spawn meteors periodically
        setInterval(() => {
            if (meteors.length < 5 && Math.random() > 0.5) {
                meteors.push(new Meteor());
            }
        }, 2000);

        // Click to create meteor
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            meteors.push(new Meteor(x - 200, y - 200));
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            meteors.push(new Meteor(x - 200, y - 200));
        });

        let time = 0;
        function animate() {
            // Semi-transparent black for trail effect
            ctx.fillStyle = 'rgba(10, 10, 26, 0.2)';
            ctx.fillRect(0, 0, width, height);

            time++;

            // Draw stars
            stars.forEach(star => {
                const brightness = star.update(time);
                star.draw(ctx, brightness);
            });

            // Update and draw meteors
            meteors = meteors.filter(meteor => {
                meteor.draw(ctx);
                return meteor.update();
            });

            requestAnimationFrame(animate);
        }

        animate();

        // Handle resize
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;

            // Reinitialize stars
            stars.length = 0;
            for (let i = 0; i < 200; i++) {
                stars.push(new Star());
            }
        });
    </script>
</body>
</html>
