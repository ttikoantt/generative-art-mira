<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generative Pattern Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
            cursor: pointer;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>
    <div class="info">クリックで新しいパターンを生成</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let width, height, centerX, centerY;
        let animationId;
        let time = 0;
        let currentPattern = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        window.addEventListener('resize', resize);
        resize();

        // パターン生成関数
        function getPatternType() {
            const patterns = ['spiral', 'waves', 'circles', 'stars', 'fractal'];
            return patterns[currentPattern % patterns.length];
        }

        function spiralPattern() {
            const arms = 8;
            const points = 500;

            for (let i = 0; i < points; i++) {
                const angle = (i / points) * Math.PI * 2 * arms + time * 0.5;
                const radius = (i / points) * Math.min(width, height) * 0.45;
                
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;

                const hue = (i / points * 360 + time * 50) % 360;
                const size = 2 + Math.sin(time + i * 0.1) * 1;

                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${hue}, 80%, 60%)`;
                ctx.fill();
            }
        }

        function wavesPattern() {
            const waveCount = 10;
            const points = 100;

            for (let w = 0; w < waveCount; w++) {
                ctx.beginPath();
                
                for (let i = 0; i <= points; i++) {
                    const x = (i / points) * width;
                    const yOffset = (w - waveCount / 2) * 50;
                    const y = centerY + yOffset + 
                              Math.sin(i * 0.1 + time * 2 + w * 0.5) * 50 +
                              Math.sin(i * 0.05 + time) * 30;

                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }

                const hue = (w / waveCount * 180 + time * 30) % 360;
                ctx.strokeStyle = `hsl(${hue}, 70%, 50%)`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        function circlesPattern() {
            const circleCount = 15;

            for (let i = 0; i < circleCount; i++) {
                const baseRadius = 30 + i * 20;
                const pulse = Math.sin(time * 2 + i * 0.3) * 10;
                const radius = baseRadius + pulse;

                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsl(${(i / circleCount * 360 + time * 20) % 360}, 75%, 55%)`;
                ctx.lineWidth = 2;
                ctx.stroke();

                // 回転する点
                const dotCount = 8;
                for (let j = 0; j < dotCount; j++) {
                    const angle = (j / dotCount) * Math.PI * 2 + time + i * 0.1;
                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;

                    ctx.beginPath();
                    ctx.arc(x, y, 3, 0, Math.PI * 2);
                    ctx.fillStyle = `hsl(${(j / dotCount * 360) % 360}, 80%, 60%)`;
                    ctx.fill();
                }
            }
        }

        function starsPattern() {
            const starCount = 50;

            for (let i = 0; i < starCount; i++) {
                const angle = (i / starCount) * Math.PI * 2 + time * 0.2;
                const distance = 100 + Math.sin(time + i * 0.2) * 50;
                
                const x = centerX + Math.cos(angle) * distance;
                const y = centerY + Math.sin(angle) * distance;

                const rotation = time + i * 0.1;
                const size = 15 + Math.sin(time * 2 + i * 0.3) * 5;

                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rotation);

                // 星を描画
                ctx.beginPath();
                for (let j = 0; j < 5; j++) {
                    const a = (j / 5) * Math.PI * 2 - Math.PI / 2;
                    const b = a + Math.PI / 5;
                    
                    const px = Math.cos(a) * size;
                    const py = Math.sin(a) * size;
                    const qx = Math.cos(b) * size * 0.4;
                    const qy = Math.sin(b) * size * 0.4;

                    if (j === 0) {
                        ctx.moveTo(px, py);
                    } else {
                        ctx.lineTo(px, py);
                    }
                    ctx.lineTo(qx, qy);
                }
                ctx.closePath();

                const hue = (i / starCount * 360 + time * 40) % 360;
                ctx.fillStyle = `hsl(${hue}, 80%, 55%)`;
                ctx.fill();

                ctx.restore();
            }
        }

        function fractalPattern() {
            function drawBranch(x, y, length, angle, depth) {
                if (depth === 0 || length < 2) return;

                const endX = x + Math.cos(angle) * length;
                const endY = y + Math.sin(angle) * length;

                const hue = (depth * 40 + time * 30) % 360;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = `hsl(${hue}, 70%, ${50 + depth * 5}%)`;
                ctx.lineWidth = depth * 0.8;
                ctx.stroke();

                const angleOffset = Math.sin(time * 0.5) * 0.3 + 0.4;
                const lengthRatio = 0.7;

                drawBranch(endX, endY, length * lengthRatio, angle - angleOffset, depth - 1);
                drawBranch(endX, endY, length * lengthRatio, angle + angleOffset, depth - 1);
            }

            drawBranch(centerX, height, 120, -Math.PI / 2, 8);
        }

        function draw() {
            // 半透明の黒でフェード効果
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            const pattern = getPatternType();

            switch (pattern) {
                case 'spiral':
                    spiralPattern();
                    break;
                case 'waves':
                    wavesPattern();
                    break;
                case 'circles':
                    circlesPattern();
                    break;
                case 'stars':
                    starsPattern();
                    break;
                case 'fractal':
                    fractalPattern();
                    break;
            }

            time += 0.02;
            animationId = requestAnimationFrame(draw);
        }

        // クリックでパターン変更
        canvas.addEventListener('click', () => {
            currentPattern++;
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
        });

        // 全画面切り替え
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // タッチ操作
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            currentPattern++;
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
        });

        draw();
    </script>
</body>
</html>
