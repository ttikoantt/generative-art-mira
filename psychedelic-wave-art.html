<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psychedelic Wave Art - ジェネレーティブ・アート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">Psychedelic Wave Art - 複数の波形が織りなす美しい模様</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        // 波形の設定
        const waves = [
            { frequency: 0.01, amplitude: 100, speed: 0.02, offset: 0 },
            { frequency: 0.02, amplitude: 80, speed: 0.03, offset: 1 },
            { frequency: 0.015, amplitude: 120, speed: 0.025, offset: 2 },
            { frequency: 0.008, amplitude: 90, speed: 0.035, offset: 3 },
            { frequency: 0.012, amplitude: 70, speed: 0.028, offset: 4 },
            { frequency: 0.018, amplitude: 110, speed: 0.032, offset: 5 }
        ];

        function drawWave(wave, hueShift) {
            ctx.beginPath();
            ctx.moveTo(0, height / 2);

            for (let x = 0; x < width; x++) {
                const y = height / 2 +
                    Math.sin(x * wave.frequency + time * wave.speed + wave.offset) * wave.amplitude +
                    Math.sin(x * wave.frequency * 0.5 + time * wave.speed * 1.2) * wave.amplitude * 0.3;

                ctx.lineTo(x, y);
            }

            // グラデーション
            const gradient = ctx.createLinearGradient(0, 0, width, 0);
            const baseHue = (time * 10 + hueShift) % 360;
            gradient.addColorStop(0, `hsla(${baseHue}, 80%, 60%, 0.8)`);
            gradient.addColorStop(0.5, `hsla(${(baseHue + 60) % 360}, 90%, 65%, 0.9)`);
            gradient.addColorStop(1, `hsla(${(baseHue + 120) % 360}, 80%, 60%, 0.8)`);

            ctx.strokeStyle = gradient;
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        function animate() {
            // 半透明の黒でフェード効果
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // すべての波形を描画
            waves.forEach((wave, index) => {
                drawWave(wave, index * 30);
            });

            time += 1;
            requestAnimationFrame(animate);
        }

        animate();

        // 全画面表示切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // タッチデバイスでのダブルタップ拡大を防止
        document.addEventListener('touchstart', function(e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(e) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
    </script>
</body>
</html>
