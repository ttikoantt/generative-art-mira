<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桜吹雪インタラクティブ - 春の訪れ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(180deg, #ffebee 0%, #ffcdd2 50%, #f8bbd9 100%);
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        #canvas {
            display: block;
            touch-action: none;
        }

        .info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #d81b60;
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="info">桜吹雪インタラクティブ - マウスやタッチで楽しんでください</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Canvasサイズを設定
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // マウス/タッチの位置
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;

        // 桜の花びらクラス
        class SakuraPetal {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.z = Math.random() * 3 + 1; // 深度（奥行き）
                this.size = (Math.random() * 15 + 10) * this.z;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = Math.random() * 2 + 1;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.05;
                this.opacity = Math.random() * 0.3 + 0.7;
                this.color = this.getRandomColor();
                this.oscillation = Math.random() * Math.PI * 2;
                this.oscillationSpeed = Math.random() * 0.02 + 0.01;
                this.oscillationAmount = Math.random() * 2 + 1;
            }

            getRandomColor() {
                const colors = [
                    'rgba(255, 192, 203,', // ピンク
                    'rgba(255, 182, 193,', // ライトピンク
                    'rgba(255, 209, 220,', // もっと薄いピンク
                    'rgba(255, 240, 245,', // ラベンダーブッシュ
                    'rgba(255, 228, 225,', // ミスティローズ
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                // 基本的な動き
                this.x += this.speedX + Math.sin(this.oscillation) * this.oscillationAmount;
                this.y += this.speedY;
                this.rotation += this.rotationSpeed;
                this.oscillation += this.oscillationSpeed;

                // マウス/タッチの影響
                const dx = this.x - mouseX;
                const dy = this.y - mouseY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < 200) {
                    const force = (200 - distance) / 200;
                    this.x += dx * force * 0.02;
                    this.y += dy * force * 0.02;
                    this.rotation += force * 0.1;
                }

                // 画面外に出たらリセット
                if (this.y > canvas.height + 50 || this.x < -50 || this.x > canvas.width + 50) {
                    this.reset();
                    this.y = -50;
                    this.x = Math.random() * canvas.width;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // 花びらの形
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(
                    this.size * 0.3, -this.size * 0.3,
                    this.size * 0.6, -this.size * 0.1,
                    this.size, 0
                );
                ctx.bezierCurveTo(
                    this.size * 0.6, this.size * 0.1,
                    this.size * 0.3, this.size * 0.3,
                    0, 0
                );
                ctx.bezierCurveTo(
                    -this.size * 0.3, this.size * 0.3,
                    -this.size * 0.6, this.size * 0.1,
                    -this.size, 0
                );
                ctx.bezierCurveTo(
                    -this.size * 0.6, -this.size * 0.1,
                    -this.size * 0.3, -this.size * 0.3,
                    0, 0
                );

                ctx.fillStyle = this.color + this.opacity + ')';
                ctx.fill();

                // 花びらの中心線
                ctx.beginPath();
                ctx.moveTo(-this.size * 0.8, 0);
                ctx.lineTo(this.size * 0.8, 0);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 0.5;
                ctx.stroke();

                ctx.restore();
            }
        }

        // 花びらの配列
        const petals = [];
        const numPetals = 80;

        for (let i = 0; i < numPetals; i++) {
            petals.push(new SakuraPetal());
        }

        // イベントリスナー
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        });

        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        });

        // アニメーションループ
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 背景のグラデーション
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, 'rgba(255, 235, 238, 0.3)');
            gradient.addColorStop(1, 'rgba(255, 205, 210, 0.3)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 花びらを描画（奥から手前へ）
            petals.sort((a, b) => a.z - b.z);
            petals.forEach(petal => {
                petal.update();
                petal.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();

        // 全画面表示ボタン（モバイル）
        if (document.documentElement.requestFullscreen && window.innerWidth < 768) {
            const fullscreenBtn = document.createElement('button');
            fullscreenBtn.textContent = '⛶ 全画面';
            fullscreenBtn.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: rgba(216, 27, 96, 0.8);
                color: white;
                border: none;
                padding: 10px 20px;
                border-radius: 25px;
                font-size: 14px;
                cursor: pointer;
                z-index: 1000;
            `;

            fullscreenBtn.addEventListener('click', async () => {
                try {
                    if (!document.fullscreenElement) {
                        await document.documentElement.requestFullscreen();
                        fullscreenBtn.textContent = '✕ 閉じる';
                    } else {
                        await document.exitFullscreen();
                        fullscreenBtn.textContent = '⛶ 全画面';
                    }
                } catch (err) {
                    console.log('Fullscreen error:', err);
                }
            });

            document.body.appendChild(fullscreenBtn);
        }
    </script>
</body>
</html>
