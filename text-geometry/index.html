<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>文字列幾何学パターン | Text Geometry Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            color: #fff;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            text-align: center;
            text-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
            margin-bottom: 10px;
        }

        .subtitle {
            color: #a0a0ff;
            font-size: clamp(0.8rem, 2vw, 1rem);
            text-align: center;
            margin-bottom: 20px;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.3);
        }

        #artCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 600px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            outline: none;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.3);
        }

        input[type="text"]::placeholder {
            color: #888;
        }

        button {
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8a2be2 0%, #4b0082 100%);
            color: #fff;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.5);
        }

        .preset-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .preset-btn {
            padding: 10px 20px;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.1);
            color: #a0a0ff;
            border: 1px solid rgba(138, 43, 226, 0.3);
            border-radius: 25px;
        }

        .preset-btn:hover {
            background: rgba(138, 43, 226, 0.2);
            border-color: rgba(138, 43, 226, 0.5);
        }

        .info {
            color: #888;
            font-size: 0.85rem;
            text-align: center;
            max-width: 500px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .canvas-container {
                max-width: 100%;
            }

            .input-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>文字列幾何学パターン</h1>
        <p class="subtitle">Text Geometry Art Generator</p>

        <div class="canvas-container">
            <canvas id="artCanvas"></canvas>
        </div>

        <div class="controls">
            <div class="input-group">
                <input type="text" id="textInput" placeholder="テキストを入力..." maxlength="50">
                <button class="btn-primary" id="generateBtn">生成</button>
            </div>

            <div class="preset-buttons">
                <button class="preset-btn" data-text="Mira">✨ Mira</button>
                <button class="preset-btn" data-text="Creative Art">🎨 Art</button>
                <button class="preset-btn" data-text="Geometry">📐 Geometry</button>
                <button class="preset-btn" data-text="Beautiful Day">🌟 Beautiful</button>
                <button class="preset-btn" data-text="Dream Big">💭 Dream</button>
            </div>

            <p class="info">
                テキストを入力すると、文字列を基に美しい幾何学パターンが生成されます。<br>
                各文字のユニコード値がパラメータとして反映されます。
            </p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('artCanvas');
        const ctx = canvas.getContext('2d');
        const textInput = document.getElementById('textInput');
        const generateBtn = document.getElementById('generateBtn');

        let currentText = '';
        let time = 0;
        let animationId = null;
        let particles = [];
        let shapes = [];

        // Resize canvas
        function resizeCanvas() {
            const container = canvas.parentElement;
            const size = Math.min(container.offsetWidth, container.offsetHeight);
            canvas.width = size;
            canvas.height = size;
        }

        // Hash string to numbers
        function textToSeed(text) {
            let seed = 0;
            for (let i = 0; i < text.length; i++) {
                seed = (seed << 5) - seed + text.charCodeAt(i);
                seed = seed & seed;
            }
            return Math.abs(seed);
        }

        // Get color from character
        function getCharColor(char, index, total) {
            const charCode = char.charCodeAt(0);
            const hue = (charCode * 137.5 + index * (360 / total)) % 360;
            const saturation = 60 + (charCode % 30);
            const lightness = 45 + (charCode % 25);
            return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
        }

        // Generate shape from text
        function generateShapes(text) {
            shapes = [];
            const seed = textToSeed(text);
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const maxLength = Math.min(centerX, centerY) * 0.8;

            // Create layers of shapes
            for (let layer = 0; layer < text.length; layer++) {
                const char = text[layer];
                const charCode = char.charCodeAt(0);
                const progress = layer / text.length;

                // Generate shape parameters from character
                const shapeType = charCode % 4; // 0: circle, 1: polygon, 2: star, 3: spiral
                const numPoints = 3 + (charCode % 8);
                const radius = maxLength * (0.2 + progress * 0.8);
                const rotationSpeed = 0.0005 + (charCode % 100) * 0.00005;
                const color = getCharColor(char, layer, text.length);

                shapes.push({
                    type: shapeType,
                    points: numPoints,
                    radius: radius,
                    rotation: (seed + layer * 1000) * 0.01,
                    rotationSpeed: rotationSpeed,
                    color: color,
                    char: char,
                    layer: layer,
                    thickness: 1 + (charCode % 3)
                });
            }

            // Generate particles
            particles = [];
            for (let i = 0; i < text.length * 5; i++) {
                const char = text[i % text.length];
                const charCode = char.charCodeAt(0);
                const angle = (seed + i * 137.5) * 0.01;
                const distance = (charCode % 100) * 2 + 50;

                particles.push({
                    x: centerX + Math.cos(angle) * distance,
                    y: centerY + Math.sin(angle) * distance,
                    targetX: centerX + Math.cos(angle) * distance,
                    targetY: centerY + Math.sin(angle) * distance,
                    size: 1 + (charCode % 4),
                    color: getCharColor(char, i, text.length * 5),
                    speed: 0.001 + (charCode % 50) * 0.0001,
                    angle: angle,
                    distance: distance
                });
            }
        }

        // Draw shape
        function drawShape(shape) {
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate(shape.rotation);
            ctx.strokeStyle = shape.color;
            ctx.lineWidth = shape.thickness;
            ctx.shadowBlur = 15;
            ctx.shadowColor = shape.color;

            ctx.beginPath();

            switch (shape.type) {
                case 0: // Circle
                    ctx.arc(0, 0, shape.radius, 0, Math.PI * 2);
                    break;

                case 1: // Polygon
                    for (let i = 0; i <= shape.points; i++) {
                        const angle = (i / shape.points) * Math.PI * 2;
                        const x = Math.cos(angle) * shape.radius;
                        const y = Math.sin(angle) * shape.radius;
                        if (i === 0) {
                            ctx.moveTo(x, y);
                        } else {
                            ctx.lineTo(x, y);
                        }
                    }
                    break;

                case 2: // Star
                    const innerRadius = shape.radius * 0.5;
                    for (let i = 0; i <= shape.points * 2; i++) {
                        const angle = (i / (shape.points * 2)) * Math.PI * 2;
                        const radius = i % 2 === 0 ? shape.radius : innerRadius;
                        const x = Math.cos(angle) * radius;
                        const y = Math.sin(angle) * radius;
                        if (i === 0) {
                            ctx.moveTo(x, y);
                        } else {
                            ctx.lineTo(x, y);
                        }
                    }
                    break;

                case 3: // Spiral
                    for (let i = 0; i <= 360; i += 2) {
                        const angle = (i * Math.PI) / 180;
                        const r = (i / 360) * shape.radius;
                        const x = Math.cos(angle * shape.points) * r;
                        const y = Math.sin(angle * shape.points) * r;
                        if (i === 0) {
                            ctx.moveTo(x, y);
                        } else {
                            ctx.lineTo(x, y);
                        }
                    }
                    break;
            }

            ctx.stroke();
            ctx.restore();
        }

        // Draw particle
        function drawParticle(particle) {
            ctx.beginPath();
            ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
            ctx.fillStyle = particle.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = particle.color;
            ctx.fill();
        }

        // Animation loop
        function animate() {
            ctx.fillStyle = 'rgba(15, 15, 35, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            time += 0.016;

            // Update and draw shapes
            shapes.forEach(shape => {
                shape.rotation += shape.rotationSpeed;
                drawShape(shape);
            });

            // Update and draw particles
            particles.forEach(particle => {
                const pulse = Math.sin(time * 2 + particle.angle) * 0.5 + 0.5;
                particle.x = canvas.width / 2 + Math.cos(particle.angle + time * particle.speed) * (particle.distance + pulse * 20);
                particle.y = canvas.height / 2 + Math.sin(particle.angle + time * particle.speed) * (particle.distance + pulse * 20);
                drawParticle(particle);
            });

            // Draw text in center
            if (currentText) {
                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.font = `bold ${Math.min(canvas.width, canvas.height) * 0.05}px Arial`;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 20;
                ctx.shadowColor = 'rgba(138, 43, 226, 0.8)';
                ctx.fillText(currentText, 0, 0);
                ctx.restore();
            }

            animationId = requestAnimationFrame(animate);
        }

        // Generate new art
        function generateArt() {
            const text = textInput.value.trim() || 'Mira';
            currentText = text;

            // Clear canvas
            ctx.fillStyle = 'rgba(15, 15, 35, 1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Generate new shapes
            generateShapes(text);
        }

        // Event listeners
        generateBtn.addEventListener('click', generateArt);

        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                generateArt();
            }
        });

        document.querySelectorAll('.preset-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                textInput.value = btn.dataset.text;
                generateArt();
            });
        });

        window.addEventListener('resize', () => {
            resizeCanvas();
            if (currentText) {
                generateArt();
            }
        });

        // Initialize
        resizeCanvas();
        textInput.value = 'Mira';
        generateArt();
        animate();
    </script>
</body>
</html>
