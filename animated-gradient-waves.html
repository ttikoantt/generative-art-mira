<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Gradient Waves - Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }

        .container {
            text-align: center;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        canvas {
            flex: 1;
            width: 100%;
            height: 100%;
        }

        .info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .info h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .info p {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .control-group {
            margin-bottom: 10px;
        }

        .control-group label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 5px;
            color: rgba(255, 255, 255, 0.8);
        }

        .control-group input {
            width: 150px;
            accent-color: #4ecdc4;
        }

        @media (max-width: 768px) {
            .info {
                bottom: 10px;
                padding: 10px 15px;
            }

            .info h1 {
                font-size: 1.2rem;
            }

            .info p {
                font-size: 0.8rem;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 15px;
                font-size: 0.8rem;
            }

            .controls {
                top: 10px;
                left: 10px;
                padding: 10px;
                max-height: 200px;
                overflow-y: auto;
            }

            .control-group input {
                width: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="canvas"></canvas>

        <div class="controls">
            <div class="control-group">
                <label>波の速度</label>
                <input type="range" id="speed" min="0.1" max="3" step="0.1" value="1">
            </div>
            <div class="control-group">
                <label>波の数</label>
                <input type="range" id="waves" min="3" max="15" step="1" value="7">
            </div>
            <div class="control-group">
                <label>振幅</label>
                <input type="range" id="amplitude" min="20" max="150" step="10" value="80">
            </div>
        </div>

        <div class="info">
            <h1>🌊 Animated Gradient Waves</h1>
            <p>グラデーションが波のように踊る</p>
        </div>

        <button class="fullscreen-btn" id="fullscreenBtn">📺 全画面</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let time = 0;

        // Settings
        let settings = {
            speed: 1,
            waveCount: 7,
            amplitude: 80
        };

        // Wave colors (gradient stops)
        const colorPalettes = [
            ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7'],
            ['#a29bfe', '#fd79a8', '#fdcb6e', '#6c5ce7', '#00cec9'],
            ['#ff7675', '#fd79a8', '#a29bfe', '#00b894', '#fdcb6e'],
            ['#e17055', '#fdcb6e', '#00b894', '#0984e3', '#6c5ce7'],
            ['#00cec9', '#6c5ce7', '#fd79a8', '#e17055', '#fdcb6e']
        ];

        let currentPalette = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function drawWave(yOffset, phase, color, amplitude, frequency, time) {
            ctx.beginPath();

            const baseY = height / 2 + yOffset;

            for (let x = 0; x <= width; x += 2) {
                const y = baseY + Math.sin(x * frequency + time + phase) * amplitude
                              + Math.sin(x * frequency * 2 + time * 1.5 + phase) * (amplitude * 0.5);

                if (x === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }

            ctx.lineTo(width, height);
            ctx.lineTo(0, height);
            ctx.closePath();

            // Create gradient for this wave
            const gradient = ctx.createLinearGradient(0, baseY - amplitude, width, baseY + amplitude);
            gradient.addColorStop(0, color);
            gradient.addColorStop(0.5, color + '80');
            gradient.addColorStop(1, color + '20');

            ctx.fillStyle = gradient;
            ctx.fill();
        }

        function draw() {
            // Clear with fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            const palette = colorPalettes[currentPalette];

            // Draw multiple waves
            for (let i = 0; i < settings.waveCount; i++) {
                const progress = i / (settings.waveCount - 1);
                const yOffset = (progress - 0.5) * settings.amplitude * 2;
                const phase = i * 0.8;
                const frequency = 0.003 + progress * 0.002;
                const color = palette[i % palette.length];

                drawWave(
                    yOffset,
                    phase,
                    color,
                    settings.amplitude * (0.5 + progress * 0.5),
                    frequency,
                    time * settings.speed
                );
            }

            time += 0.02;
            requestAnimationFrame(draw);
        }

        // Controls
        document.getElementById('speed').addEventListener('input', (e) => {
            settings.speed = parseFloat(e.target.value);
        });

        document.getElementById('waves').addEventListener('input', (e) => {
            settings.waveCount = parseInt(e.target.value);
        });

        document.getElementById('amplitude').addEventListener('input', (e) => {
            settings.amplitude = parseInt(e.target.value);
        });

        // Fullscreen
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // Change palette periodically
        setInterval(() => {
            currentPalette = (currentPalette + 1) % colorPalettes.length;
        }, 8000);

        // Touch support for mobile
        let touchStartX = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });

        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const diff = touchEndX - touchStartX;

            if (Math.abs(diff) > 50) {
                if (diff > 0) {
                    settings.speed = Math.max(0.1, settings.speed - 0.2);
                } else {
                    settings.speed = Math.min(3, settings.speed + 0.2);
                }
                document.getElementById('speed').value = settings.speed;
            }
        });

        // Initialize
        resize();
        window.addEventListener('resize', resize);
        draw();
    </script>
</body>
</html>
