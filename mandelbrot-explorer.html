<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mandelbrot Explorer | マンデルブロ集合探索</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        #ui {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #0ff;
            border-radius: 8px;
            padding: 12px 16px;
            color: #0ff;
            font-size: 12px;
            backdrop-filter: blur(10px);
        }

        .control h3 {
            margin-bottom: 8px;
            font-size: 14px;
            text-shadow: 0 0 10px #0ff;
        }

        .control p {
            margin: 4px 0;
            font-size: 11px;
            opacity: 0.9;
        }

        #info {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #0ff;
            border-radius: 8px;
            padding: 10px 14px;
            color: #0ff;
            font-size: 11px;
            backdrop-filter: blur(10px);
            text-shadow: 0 0 5px #0ff;
        }

        #fullscreen {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #0ff;
            border-radius: 8px;
            padding: 10px 16px;
            color: #0ff;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            text-shadow: 0 0 10px #0ff;
        }

        #fullscreen:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 20px #0ff;
        }

        .highlight {
            color: #ff0;
            text-shadow: 0 0 5px #ff0;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <div class="control">
            <h3>🌀 Mandelbrot Explorer</h3>
            <p>• <span class="highlight">Scroll</span>: ズーム</p>
            <p>• <span class="highlight">Drag</span>: 移動</p>
            <p>• <span class="highlight">Click</span>: 色変更</p>
        </div>
    </div>

    <div id="info">
        <div>Zoom: <span id="zoom-level" class="highlight">1.0x</span></div>
        <div>Center: <span id="center-pos">0.0 + 0.0i</span></div>
    </div>

    <button id="fullscreen">⛶ 全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let zoom = 1;
        let offsetX = 0;
        let offsetY = 0;
        let maxIterations = 100;

        // Color palettes
        const palettes = [
            { name: 'Classic', colors: ['#000033', '#000066', '#0033cc', '#0066ff', '#00ccff', '#00ffff'] },
            { name: 'Fire', colors: ['#000000', '#330000', '#660000', '#cc3300', '#ff6600', '#ffcc00', '#ffff66'] },
            { name: 'Neon', colors: ['#000022', '#110033', '#220066', '#4400aa', '#8800ff', '#cc66ff', '#ffccff'] },
            { name: 'Ocean', colors: ['#000011', '#002233', '#004466', '#0066aa', '#0099cc', '#00ccff', '#66ffff'] },
            { name: 'Rainbow', colors: ['#000000', '#330000', '#663300', '#996600', '#cc9900', '#ffcc00', '#ffff66', '#ffffff'] }
        ];

        let currentPalette = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            render();
        }

        function getColor(t) {
            const palette = palettes[currentPalette].colors;
            const pos = t * (palette.length - 1);
            const i = Math.floor(pos);
            const f = pos - i;

            if (i >= palette.length - 1) return palette[palette.length - 1];
            if (i < 0) return palette[0];

            const c1 = hexToRgb(palette[i]);
            const c2 = hexToRgb(palette[i + 1]);

            return `rgb(${Math.round(c1.r + (c2.r - c1.r) * f)}, ${Math.round(c1.g + (c2.g - c1.g) * f)}, ${Math.round(c1.b + (c2.b - c1.b) * f)})`;
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 0, g: 0, b: 0 };
        }

        function mandelbrot(cx, cy) {
            let x = 0, y = 0;
            let iteration = 0;

            while (x * x + y * y <= 4 && iteration < maxIterations) {
                const xtemp = x * x - y * y + cx;
                y = 2 * x * y + cy;
                x = xtemp;
                iteration++;
            }

            return iteration;
        }

        function render() {
            const imageData = ctx.createImageData(width, height);
            const data = imageData.data;

            const scale = 3 / (zoom * Math.min(width, height));

            for (let py = 0; py < height; py++) {
                for (let px = 0; px < width; px++) {
                    const x0 = (px - width / 2) * scale + offsetX;
                    const y0 = (py - height / 2) * scale + offsetY;

                    const iteration = mandelbrot(x0, y0);
                    const t = iteration / maxIterations;
                    const color = getColor(t);

                    const rgb = hexToRgb(color.startsWith('rgb') ? color : color);

                    const idx = (py * width + px) * 4;
                    data[idx] = rgb.r;
                    data[idx + 1] = rgb.g;
                    data[idx + 2] = rgb.b;
                    data[idx + 3] = 255;
                }
            }

            ctx.putImageData(imageData, 0, 0);
            updateInfo();
        }

        function updateInfo() {
            document.getElementById('zoom-level').textContent = zoom.toFixed(1) + 'x';
            document.getElementById('center-pos').textContent = `${offsetX.toFixed(6)} ${offsetY >= 0 ? '+' : ''}${offsetY.toFixed(6)}i`;
        }

        // Mouse wheel zoom
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const scale = 3 / (zoom * Math.min(width, height));
            const worldX = (mouseX - width / 2) * scale + offsetX;
            const worldY = (mouseY - height / 2) * scale + offsetY;

            const zoomFactor = e.deltaY > 0 ? 0.8 : 1.25;
            zoom *= zoomFactor;

            const newScale = 3 / (zoom * Math.min(width, height));
            offsetX = worldX - (mouseX - width / 2) * newScale;
            offsetY = worldY - (mouseY - height / 2) * newScale;

            if (zoom > 1000) {
                maxIterations = Math.min(500, Math.floor(100 + zoom / 10));
            } else {
                maxIterations = 100;
            }

            requestAnimationFrame(render);
        });

        // Mouse drag
        let isDragging = false;
        let lastX, lastY;

        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const dx = e.clientX - lastX;
                const dy = e.clientY - lastY;
                const scale = 3 / (zoom * Math.min(width, height));

                offsetX -= dx * scale;
                offsetY -= dy * scale;

                lastX = e.clientX;
                lastY = e.clientY;

                requestAnimationFrame(render);
            }
        });

        canvas.addEventListener('mouseup', () => {
            isDragging = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
        });

        // Touch support
        let lastTouchDist = 0;

        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                lastTouchDist = getTouchDistance(e.touches);
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();

            if (e.touches.length === 1 && isDragging) {
                const dx = e.touches[0].clientX - lastX;
                const dy = e.touches[0].clientY - lastY;
                const scale = 3 / (zoom * Math.min(width, height));

                offsetX -= dx * scale;
                offsetY -= dy * scale;

                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;

                requestAnimationFrame(render);
            } else if (e.touches.length === 2) {
                const dist = getTouchDistance(e.touches);
                if (lastTouchDist > 0) {
                    const factor = dist / lastTouchDist;
                    zoom *= factor;
                    if (zoom > 1000) {
                        maxIterations = Math.min(500, Math.floor(100 + zoom / 10));
                    } else {
                        maxIterations = 100;
                    }
                }
                lastTouchDist = dist;
                requestAnimationFrame(render);
            }
        });

        canvas.addEventListener('touchend', () => {
            isDragging = false;
            lastTouchDist = 0;
        });

        function getTouchDistance(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        // Click to change palette
        canvas.addEventListener('click', (e) => {
            if (!isDragging) {
                currentPalette = (currentPalette + 1) % palettes.length;
                requestAnimationFrame(render);
            }
        });

        // Fullscreen
        document.getElementById('fullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
