<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Heart Beat | 心臓の鼓動</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff3366;
            font-size: 12px;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 0 10px #ff3366;
            z-index: 10;
        }

        .heart-rate {
            position: fixed;
            top: 20px;
            right: 20px;
            color: #ff3366;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 20px #ff3366;
            z-index: 10;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 51, 102, 0.2);
            border: 1px solid #ff3366;
            color: #ff3366;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 12px;
            border-radius: 5px;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 51, 102, 0.4);
        }

        @media (max-width: 768px) {
            .fullscreen-btn {
                top: auto;
                bottom: 50px;
                left: 50%;
                transform: translateX(-50%);
            }

            .info {
                bottom: 10px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="heart-rate">BPM: <span id="bpm">60</span></div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    <div class="info">クリック/タップで鼓動が加速 | Fractal Heart Beat</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const bpmDisplay = document.getElementById('bpm');

        let width, height, centerX, centerY;
        let time = 0;
        let bpm = 60;
        let targetBpm = 60;
        let lastHeartbeat = 0;
        let isBeating = false;
        let beatIntensity = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        window.addEventListener('resize', resize);
        resize();

        // 心拍イベント
        function triggerHeartbeat() {
            isBeating = true;
            beatIntensity = 1;
            setTimeout(() => {
                isBeating = false;
            }, 100);
        }

        // BPMから心拍間隔を計算
        function getHeartbeatInterval() {
            return 60000 / bpm; // ms
        }

        // フラクタルツリーを描画
        function drawFractalTree(x, y, length, angle, depth, intensity) {
            if (depth === 0) return;

            const endX = x + length * Math.cos(angle);
            const endY = y + length * Math.sin(angle);

            // 心拍の強さに応じて色と太さを変える
            const hue = 340 + depth * 5 + intensity * 20;
            const saturation = 80 + intensity * 20;
            const lightness = 50 + intensity * 30 + beatIntensity * 20;
            const alpha = 0.8 - depth * 0.05;
            const lineWidth = depth * 0.8 + beatIntensity * 2;

            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = `hsla(${hue}, ${saturation}%, ${lightness}%, ${alpha})`;
            ctx.lineWidth = lineWidth;
            ctx.lineCap = 'round';
            ctx.stroke();

            // 心拍に合わせて揺れる
            const sway = Math.sin(time * 0.05) * 0.1 * (1 + beatIntensity * 0.5);

            // 分岐
            const newLength = length * 0.67;
            const spread = 0.5 + Math.sin(time * 0.03) * 0.1;

            drawFractalTree(
                endX,
                endY,
                newLength,
                angle - spread + sway,
                depth - 1,
                intensity
            );
            drawFractalTree(
                endX,
                endY,
                newLength,
                angle + spread + sway,
                depth - 1,
                intensity
            );
        }

        // 心臓の形を描画
        function drawHeart(x, y, size, intensity) {
            const hue = 340 + beatIntensity * 30;
            const lightness = 50 + beatIntensity * 30;

            ctx.save();
            ctx.translate(x, y);

            // グロー効果
            const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, size);
            gradient.addColorStop(0, `hsla(${hue}, 100%, ${lightness}%, ${0.8 + beatIntensity * 0.2})`);
            gradient.addColorStop(0.5, `hsla(${hue}, 100%, ${lightness}%, ${0.4 + beatIntensity * 0.3})`);
            gradient.addColorStop(1, `hsla(${hue}, 100%, ${lightness}%, 0)`);

            ctx.fillStyle = gradient;
            ctx.beginPath();

            // 心臓の形
            for (let t = 0; t < Math.PI * 2; t += 0.01) {
                const px = 16 * Math.pow(Math.sin(t), 3);
                const py = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                const scale = size / 20 * (1 + beatIntensity * 0.3);

                if (t === 0) {
                    ctx.moveTo(px * scale, py * scale);
                } else {
                    ctx.lineTo(px * scale, py * scale);
                }
            }

            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        // 光のパーティクル
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.angle = Math.random() * Math.PI * 2;
                this.distance = Math.random() * 200 + 100;
                this.speed = Math.random() * 2 + 1;
                this.size = Math.random() * 3 + 1;
                this.alpha = Math.random() * 0.5 + 0.5;
            }

            update() {
                // 心拍に合わせて加速
                const boost = 1 + beatIntensity * 3;
                this.distance += this.speed * boost;

                if (this.distance > Math.max(width, height) / 2 + 100) {
                    this.reset();
                }
            }

            draw() {
                const x = centerX + Math.cos(this.angle) * this.distance;
                const y = centerY + Math.sin(this.angle) * this.distance;

                const hue = 340 + beatIntensity * 30;
                const lightness = 60 + beatIntensity * 40;

                ctx.beginPath();
                ctx.arc(x, y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue}, 100%, ${lightness}%, ${this.alpha})`;
                ctx.fill();
            }
        }

        const particles = Array.from({ length: 50 }, () => new Particle());

        // メインループ
        function animate(timestamp) {
            // BPMの変化
            bpm += (targetBpm - bpm) * 0.05;
            bpmDisplay.textContent = Math.round(bpm);

            // 心拍チェック
            if (timestamp - lastHeartbeat > getHeartbeatInterval()) {
                triggerHeartbeat();
                lastHeartbeat = timestamp;
            }

            // beatIntensityの減衰
            beatIntensity *= 0.92;

            // 背景をフェード
            ctx.fillStyle = 'rgba(10, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // パーティクル更新
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // フラクタルツリー描画（4方向）
            const treeSize = Math.min(width, height) * 0.25;
            const depth = 8;

            drawFractalTree(centerX, centerY, treeSize, -Math.PI / 2, depth, beatIntensity);
            drawFractalTree(centerX, centerY, treeSize, 0, depth, beatIntensity);
            drawFractalTree(centerX, centerY, treeSize, Math.PI / 2, depth, beatIntensity);
            drawFractalTree(centerX, centerY, treeSize, Math.PI, depth, beatIntensity);

            // 中心の心臓
            drawHeart(centerX, centerY, 30 + beatIntensity * 20, beatIntensity);

            time++;
            requestAnimationFrame(animate);
        }

        // クリック/タッチでBPM上昇
        function increaseBPM() {
            targetBpm = Math.min(180, targetBpm + 20);
            setTimeout(() => {
                targetBpm = Math.max(60, targetBpm - 20);
            }, 2000);
        }

        canvas.addEventListener('click', increaseBPM);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            increaseBPM();
        });

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 開始
        animate(0);
    </script>
</body>
</html>
