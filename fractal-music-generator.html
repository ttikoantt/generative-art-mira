<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fractal Music Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f23 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            text-align: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(100, 200, 255, 0.2);
        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            background: linear-gradient(90deg, #00d4ff, #7b2ff7, #ff006e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-top: 5px;
        }

        .visualizer-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            min-height: 200px;
        }

        #visualizer {
            width: 100%;
            height: 100%;
            max-height: 300px;
            border: 1px solid rgba(100, 200, 255, 0.3);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin: 10px 0;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-group label {
            font-size: 0.75rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            font-family: inherit;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .play-btn {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: white;
        }

        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .play-btn.playing {
            background: linear-gradient(135deg, #ff6b6b, #cc0000);
        }

        input[type="range"] {
            width: 120px;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(100, 200, 255, 0.3);
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #00d4ff;
            border-radius: 50%;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: #00d4ff;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .info {
            text-align: center;
            padding: 10px;
            font-size: 0.9rem;
            color: #00d4ff;
            min-height: 40px;
        }

        .fractal-info {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
            padding: 10px;
            font-size: 0.8rem;
            color: #888;
        }

        .fractal-info span {
            background: rgba(100, 200, 255, 0.1);
            padding: 5px 10px;
            border-radius: 5px;
        }

        @media (max-width: 600px) {
            .controls {
                gap: 8px;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }

            input[type="range"] {
                width: 100px;
            }

            .info {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎵 Fractal Music Generator</h1>
            <p class="subtitle">数学から生まれる音楽 • Fractal Structure → Sound</p>
        </header>

        <div class="visualizer-container">
            <canvas id="visualizer"></canvas>
        </div>

        <div class="info" id="info">準備完了 - PLAYでフラクタル音楽を生成</div>

        <div class="controls">
            <button class="play-btn" id="playBtn">▶ PLAY</button>

            <div class="control-group">
                <label>Complexity</label>
                <input type="range" id="complexity" min="3" max="8" value="5">
            </div>

            <div class="control-group">
                <label>Tempo</label>
                <input type="range" id="tempo" min="60" max="180" value="120">
            </div>

            <div class="control-group">
                <label>Scale</label>
                <input type="range" id="scale" min="0" max="4" value="0">
            </div>
        </div>

        <div class="fractal-info">
            <span id="depthDisplay">深さ: 5</span>
            <span id="noteCount">ノート: 0</span>
            <span id="patternDisplay">パターン: 準備中</span>
        </div>
    </div>

    <script>
        // Audio Context
        let audioCtx = null;
        let isPlaying = false;
        let currentTimeout = null;

        // Canvas
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        let animationId = null;
        let waveform = [];

        // Parameters
        let complexity = 5;
        let tempo = 120;
        let currentScale = 0;

        // Musical scales
        const scales = [
            [0, 2, 4, 5, 7, 9, 11], // Major
            [0, 2, 3, 5, 7, 8, 10], // Minor
            [0, 2, 4, 6, 8, 10], // Whole tone
            [0, 3, 5, 6, 7, 10], // Blues
            [0, 2, 3, 5, 7, 9, 10] // Dorian
        ];

        const scaleNames = ['Major', 'Minor', 'Whole Tone', 'Blues', 'Dorian'];

        // Fractal music generation using recursive patterns
        function generateFractalMelody(depth, baseNote = 60) {
            if (depth === 0) {
                return [baseNote];
            }

            const pattern = [];
            const divisions = Math.floor(Math.random() * 3) + 2; // 2-4 divisions

            for (let i = 0; i < divisions; i++) {
                const octaveShift = Math.floor(Math.random() * 3) - 1; // -1, 0, or +1 octave
                const noteOffset = (Math.random() > 0.5 ? 1 : -1) * Math.floor(Math.random() * 5);

                const newBase = baseNote + octaveShift * 12 + noteOffset;
                const subPattern = generateFractalMelody(depth - 1, newBase);
                pattern.push(...subPattern);
            }

            return pattern;
        }

        // Convert to scale notes
        function toScale(note) {
            const scale = scales[currentScale];
            const octave = Math.floor(note / 12);
            const degree = note % 12;
            const scaleDegree = scale[degree % scale.length];
            return octave * 12 + scaleDegree;
        }

        // Play a note
        function playNote(frequency, duration, startTime) {
            if (!audioCtx) return;

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(frequency, startTime);

            gainNode.gain.setValueAtTime(0, startTime);
            gainNode.gain.linearRampToValueAtTime(0.3, startTime + 0.01);
            gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + duration);

            oscillator.start(startTime);
            oscillator.stop(startTime + duration);

            // Add to waveform
            const timeInWave = Math.floor((startTime - audioCtx.currentTime) * 1000);
            for (let i = 0; i < duration * 1000; i += 10) {
                waveform.push({
                    time: timeInWave + i,
                    value: Math.sin(i / 10) * 0.5 + Math.sin(i / 5) * 0.3
                });
            }
        }

        // Play melody
        function playMelody(melody, tempo) {
            if (!audioCtx || !isPlaying) return;

            const noteDuration = 60 / tempo;
            let noteCount = 0;

            melody.forEach((note, index) => {
                const scaledNote = toScale(note);
                const frequency = 440 * Math.pow(2, (scaledNote - 69) / 12);

                const startTime = audioCtx.currentTime + index * noteDuration * 0.5;
                playNote(frequency, noteDuration * 0.4, startTime);

                noteCount++;
            });

            document.getElementById('noteCount').textContent = `ノート: ${noteCount}`;

            // Schedule next melody
            const totalDuration = melody.length * noteDuration * 0.5;
            currentTimeout = setTimeout(() => {
                if (isPlaying) {
                    playMelody(melody, tempo);
                }
            }, totalDuration * 1000);
        }

        // Draw visualization
        function draw() {
            const width = canvas.width = canvas.offsetWidth * 2;
            const height = canvas.height = canvas.offsetHeight * 2;

            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, width, height);

            if (waveform.length > 0) {
                ctx.strokeStyle = `hsl(${Date.now() / 50 % 360}, 100%, 50%)`;
                ctx.lineWidth = 2;
                ctx.beginPath();

                const sliceWidth = width / 500;
                let x = 0;

                for (let i = 0; i < Math.min(waveform.length, 500); i++) {
                    const y = (height / 2) + (waveform[i].value * height / 3);

                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }

                    x += sliceWidth;
                }

                ctx.stroke();
            }

            // Remove old waveform data
            if (waveform.length > 500) {
                waveform = waveform.slice(-500);
            }

            animationId = requestAnimationFrame(draw);
        }

        // Start/Stop
        document.getElementById('playBtn').addEventListener('click', () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            if (isPlaying) {
                isPlaying = false;
                document.getElementById('playBtn').textContent = '▶ PLAY';
                document.getElementById('playBtn').classList.remove('playing');
                document.getElementById('info').textContent = '停止中';
                if (currentTimeout) clearTimeout(currentTimeout);
            } else {
                isPlaying = true;
                document.getElementById('playBtn').textContent = '⏸ STOP';
                document.getElementById('playBtn').classList.add('playing');

                const melody = generateFractalMelody(complexity);
                document.getElementById('patternDisplay').textContent = `パターン: ${melody.length}ノート`;
                document.getElementById('info').textContent = 'フラクタル音楽生成中...';

                playMelody(melody, tempo);
            }
        });

        // Parameter controls
        document.getElementById('complexity').addEventListener('input', (e) => {
            complexity = parseInt(e.target.value);
            document.getElementById('depthDisplay').textContent = `深さ: ${complexity}`;
        });

        document.getElementById('tempo').addEventListener('input', (e) => {
            tempo = parseInt(e.target.value);
        });

        document.getElementById('scale').addEventListener('input', (e) => {
            currentScale = parseInt(e.target.value);
        });

        // Start visualization
        draw();

        // Handle resize
        window.addEventListener('resize', () => {
            const width = canvas.width = canvas.offsetWidth * 2;
            const height = canvas.height = canvas.offsetHeight * 2;
        });
    </script>
</body>
</html>
