<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光の粒子の流れ - Light Particles Flow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 100;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            pointer-events: none;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid rgba(0, 255, 255, 0.5);
            color: #0ff;
            font-size: 14px;
            cursor: pointer;
            z-index: 100;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                top: 10px;
                left: 10px;
            }

            .fullscreen-btn {
                padding: 8px 15px;
                font-size: 12px;
                top: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="info">
        <div>🌟 光の粒子の流れ</div>
        <div style="margin-top: 5px; font-size: 12px;">マウスを動かして光を操る</div>
    </div>
    
    <button class="fullscreen-btn" id="fullscreenBtn">全画面表示</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // マウスの位置
        let mouse = {
            x: width / 2,
            y: height / 2
        };

        // 粒子の配列
        const particles = [];
        const particleCount = 300;

        // 色相
        let hue = 0;

        // 粒子クラス
        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 3 + 1;
                this.speedX = 0;
                this.speedY = 0;
                this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
                this.life = 1;
                this.decay = Math.random() * 0.01 + 0.005;
            }

            update() {
                // マウスに向かって加速
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                // 距離に応じて加速
                const force = Math.max(0, (500 - distance) / 500);
                this.speedX += (dx / distance) * force * 0.5;
                this.speedY += (dy / distance) * force * 0.5;

                // 摩擦
                this.speedX *= 0.95;
                this.speedY *= 0.95;

                // 位置を更新
                this.x += this.speedX;
                this.y += this.speedY;

                // 色を時間とともに変化
                this.color = `hsl(${(hue + distance * 0.5) % 360}, 100%, 60%)`;

                // 寿命を減らす
                this.life -= this.decay;

                // 寿命が尽きたらリセット
                if (this.life <= 0) {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.speedX = 0;
                    this.speedY = 0;
                    this.life = 1;
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // 粒子を初期化
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        // アニメーション
        function animate() {
            // 半透明の黒で上書き（トレイル効果）
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // 色相を更新
            hue += 0.5;

            // 粒子を更新・描画
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // 粒子同士の線を描画（近い粒子同士）
            ctx.strokeStyle = `hsla(${hue}, 100%, 50%, 0.1)`;
            ctx.lineWidth = 0.5;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 80) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        // マウスの移動
        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        // タッチの移動
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouse.x = touch.clientX;
            mouse.y = touch.clientY;
        }, { passive: false });

        // 全画面表示
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // リサイズ対応
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // アニメーション開始
        animate();
    </script>
</body>
</html>
