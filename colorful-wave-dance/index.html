<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Colorful Wave Dance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        #fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        #fullscreen-btn:active {
            transform: scale(0.95);
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <button id="fullscreen-btn">⛶ 全画面</button>
    <div class="info">Colorful Wave Dance - 色とりどりの波が踊る</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreen-btn');

        let width, height;
        let time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        // 全画面ボタン
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                fullscreenBtn.textContent = '⛶ 解除';
            } else {
                document.exitFullscreen();
                fullscreenBtn.textContent = '⛶ 全画面';
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                fullscreenBtn.textContent = '⛶ 全画面';
            }
        });

        // 波の設定
        const waves = [
            { frequency: 0.01, amplitude: 50, speed: 0.02, phase: 0, color: 'rgba(255, 100, 150, 0.6)' },
            { frequency: 0.015, amplitude: 40, speed: 0.03, phase: 1, color: 'rgba(100, 200, 255, 0.6)' },
            { frequency: 0.008, amplitude: 60, speed: 0.015, phase: 2, color: 'rgba(150, 255, 150, 0.6)' },
            { frequency: 0.02, amplitude: 35, speed: 0.025, phase: 1.5, color: 'rgba(255, 200, 100, 0.6)' },
            { frequency: 0.012, amplitude: 45, speed: 0.018, phase: 0.5, color: 'rgba(200, 100, 255, 0.6)' },
        ];

        function drawWave(wave, time) {
            ctx.beginPath();
            ctx.strokeStyle = wave.color;
            ctx.lineWidth = 3;

            for (let x = 0; x < width; x++) {
                // 複数の正弦波を重ね合わせて有機的な動きを作る
                let y = height / 2 +
                    Math.sin(x * wave.frequency + time * wave.speed + wave.phase) * wave.amplitude +
                    Math.sin(x * wave.frequency * 2 + time * wave.speed * 1.5 + wave.phase) * wave.amplitude * 0.3 +
                    Math.cos(x * wave.frequency * 0.5 + time * wave.speed * 0.8) * wave.amplitude * 0.2;

                if (x === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }

            ctx.stroke();

            // グロー効果
            ctx.strokeStyle = wave.color.replace('0.6', '0.1');
            ctx.lineWidth = 15;
            ctx.stroke();
        }

        function animate() {
            // 半透明の黒で前のフレームをフェードさせる（トレイル効果）
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // 色を時間とともに変化させる
            waves.forEach((wave, i) => {
                const hue = (time * 10 + i * 72) % 360;
                wave.color = `hsla(${hue}, 80%, 60%, 0.6)`;
                drawWave(wave, time);
            });

            time++;
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
