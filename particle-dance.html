<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Dance - インタラクティブ・パーティクル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #canvas {
            display: block;
            cursor: crosshair;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                bottom: 10px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        マウスを動かす / タッチでパーティクルを踊らせよう
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">
        全画面表示
    </button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let mouse = { x: width / 2, y: height / 2 };
        let particles = [];
        const particleCount = 150;

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.baseX = this.x;
                this.baseY = this.y;
                this.size = Math.random() * 3 + 1;
                this.speedX = 0;
                this.speedY = 0;
                this.hue = Math.random() * 360;
                this.life = 0;
                this.maxLife = Math.random() * 200 + 100;
            }

            update() {
                // マウスへの距離を計算
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                // マウスに近いパーティクルは逃げる
                const maxDistance = 200;
                if (distance < maxDistance) {
                    const force = (maxDistance - distance) / maxDistance;
                    const angle = Math.atan2(dy, dx);
                    this.speedX -= Math.cos(angle) * force * 2;
                    this.speedY -= Math.sin(angle) * force * 2;

                    // 色を変化
                    this.hue = (this.hue + 5) % 360;
                }

                // 慣性を適用
                this.speedX *= 0.95;
                this.speedY *= 0.95;

                // 元の位置に戻ろうとする力
                const homeDx = this.baseX - this.x;
                const homeDy = this.baseY - this.y;
                this.speedX += homeDx * 0.02;
                this.speedY += homeDy * 0.02;

                // 位置を更新
                this.x += this.speedX;
                this.y += this.speedY;

                // ライフを更新
                this.life++;
                if (this.life > this.maxLife) {
                    this.life = 0;
                    this.hue = Math.random() * 360;
                }
            }

            draw() {
                const alpha = Math.sin(this.life / this.maxLife * Math.PI) * 0.8;
                const saturation = 70 + Math.sin(this.life * 0.05) * 30;
                const lightness = 50 + Math.sin(this.life * 0.03) * 20;

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, ${saturation}%, ${lightness}%, ${alpha})`;
                ctx.fill();

                // グロー効果
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, ${saturation}%, ${lightness}%, ${alpha * 0.3})`;
                ctx.fill();
            }
        }

        // パーティクルを初期化
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        // 近くのパーティクル同士を線で結ぶ
        function connectParticles() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 100) {
                        const alpha = (1 - distance / 100) * 0.3;
                        ctx.beginPath();
                        ctx.strokeStyle = `hsla(${particles[i].hue}, 70%, 60%, ${alpha})`;
                        ctx.lineWidth = 1;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // アニメーションループ
        function animate() {
            // 背景を半透明で塗ってトレイル効果
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // パーティクルを更新・描画
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // 線で結ぶ
            connectParticles();

            requestAnimationFrame(animate);
        }

        // マウス移動
        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        // タッチ対応
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        }, { passive: false });

        // ウィンドウリサイズ
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;

            // パーティクルの基底位置を再設定
            particles.forEach(particle => {
                particle.baseX = Math.random() * width;
                particle.baseY = Math.random() * height;
            });
        });

        // 全画面表示トグル
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // アニメーション開始
        animate();
    </script>
</body>
</html>
