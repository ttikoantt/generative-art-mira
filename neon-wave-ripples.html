<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Wave Ripples - Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        #canvas {
            display: block;
            touch-action: none;
        }

        #info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            pointer-events: none;
            z-index: 10;
        }

        #fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        #fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        #fullscreen-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div id="info">
        <div>🌊 Neon Wave Ripples</div>
        <div style="font-size: 12px; opacity: 0.7;">Tap or Click</div>
    </div>
    <button id="fullscreen-btn">全画面</button>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreen-btn');

        let width, height;
        let ripples = [];
        let hue = 0;

        // Resize
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        // Ripple class
        class Ripple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.max(width, height) * 0.4;
                this.speed = 3;
                this.alpha = 1;
                this.hue = hue;
                this.lineWidth = 8;
                this.decay = 0.008;
            }

            update() {
                this.radius += this.speed;
                this.alpha -= this.decay;
                this.lineWidth *= 0.99;
                
                // Deceleration
                this.speed *= 0.995;
                if (this.speed < 0.5) this.speed = 0.5;
            }

            draw() {
                if (this.alpha <= 0) return;

                ctx.save();
                
                // Outer glow
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 100%, 60%, ${this.alpha * 0.3})`;
                ctx.lineWidth = this.lineWidth + 20;
                ctx.stroke();

                // Main ring
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 100%, 70%, ${this.alpha})`;
                ctx.lineWidth = this.lineWidth;
                ctx.stroke();

                // Inner highlight
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 100%, 90%, ${this.alpha * 0.5})`;
                ctx.lineWidth = this.lineWidth * 0.5;
                ctx.stroke();

                ctx.restore();
            }

            isDead() {
                return this.alpha <= 0;
            }
        }

        // Create ripple
        function createRipple(x, y) {
            ripples.push(new Ripple(x, y));
            hue = (hue + 30) % 360;
        }

        // Touch/Mouse events
        canvas.addEventListener('click', (e) => {
            createRipple(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let touch of e.touches) {
                createRipple(touch.clientX, touch.clientY);
            }
        });

        // Animation loop
        function animate() {
            // Semi-transparent black for trail effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // Update and draw ripples
            ripples = ripples.filter(ripple => !ripple.isDead());
            ripples.forEach(ripple => {
                ripple.update();
                ripple.draw();
            });

            // Auto-create ripple occasionally
            if (Math.random() < 0.01) {
                createRipple(
                    Math.random() * width,
                    Math.random() * height
                );
            }

            requestAnimationFrame(animate);
        }

        // Fullscreen
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Start
        animate();

        // Initial ripple
        setTimeout(() => {
            createRipple(width / 2, height / 2);
        }, 500);
    </script>
</body>
</html>
