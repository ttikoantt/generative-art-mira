<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Borealis - Celestial Light Curtains</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(200, 255, 200, 0.7);
            font-size: 12px;
            text-shadow: 0 0 10px rgba(100, 255, 100, 0.5);
            z-index: 100;
            pointer-events: none;
        }

        .title {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(150, 255, 200, 0.6);
            font-size: 14px;
            text-align: center;
            text-shadow: 0 0 20px rgba(100, 255, 150, 0.5);
            z-index: 100;
            pointer-events: none;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="info">
        Aurora Borealis<br>
        Move mouse to influence the wind<br>
        Click to create cosmic bursts
    </div>
    <div class="title">✦ AURORA BOREALIS ✦</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let mouseX = width / 2;
        let mouseY = height / 2;
        let targetMouseX = mouseX;
        let targetMouseY = mouseY;

        // Aurora curtain system
        class AuroraCurtain {
            constructor(x, baseY, color, waveOffset) {
                this.x = x;
                this.baseY = baseY;
                this.color = color;
                this.waveOffset = waveOffset;
                this.segments = 100;
                this.waves = [];

                // Initialize wave parameters
                for (let i = 0; i < 5; i++) {
                    this.waves.push({
                        amplitude: 30 + Math.random() * 70,
                        frequency: 0.002 + Math.random() * 0.005,
                        speed: 0.001 + Math.random() * 0.002,
                        phase: Math.random() * Math.PI * 2
                    });
                }
            }

            update(time, windX, windY) {
                this.waves.forEach(wave => {
                    wave.phase += wave.speed;
                    // Wind influence
                    wave.phase += windX * 0.0001;
                    wave.amplitude = 30 + Math.abs(windY) * 0.5;
                });
            }

            draw(ctx, time) {
                ctx.beginPath();

                let startX = this.x;
                let startY = height;

                ctx.moveTo(startX, startY);

                for (let i = 0; i <= this.segments; i++) {
                    let t = i / this.segments;
                    let x = this.x;
                    let y = this.baseY - t * (this.baseY - 100);

                    // Apply multiple wave layers
                    let waveY = 0;
                    this.waves.forEach((wave, index) => {
                        const layerOffset = index * 0.5;
                        waveY += Math.sin(
                            x * wave.frequency + time * wave.speed + wave.phase + layerOffset
                        ) * wave.amplitude * (1 - t * 0.3);
                    });

                    // Add secondary oscillation
                    waveY += Math.sin(x * 0.01 + time * 0.0005) * 20;

                    x += Math.sin(time * 0.0003 + this.waveOffset) * 15;
                    y += waveY;

                    ctx.lineTo(x, y);
                }

                ctx.lineTo(this.x, 100);

                // Create gradient fill
                const gradient = ctx.createLinearGradient(
                    this.x, height,
                    this.x, 100
                );

                gradient.addColorStop(0, 'transparent');
                gradient.addColorStop(0.2, this.color.replace('1)', '0.1)'));
                gradient.addColorStop(0.5, this.color.replace('1)', '0.3)'));
                gradient.addColorStop(0.8, this.color.replace('1)', '0.2)'));
                gradient.addColorStop(1, 'transparent');

                ctx.fillStyle = gradient;
                ctx.fill();

                // Draw curtain lines
                ctx.strokeStyle = this.color.replace('1)', '0.4)');
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        // Star particle system
        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 0.7;
                this.size = Math.random() * 2 + 0.5;
                this.twinkleSpeed = Math.random() * 0.02 + 0.005;
                this.twinklePhase = Math.random() * Math.PI * 2;
                this.brightness = Math.random();
            }

            update(time) {
                this.brightness = 0.3 + Math.sin(time * this.twinkleSpeed + this.twinklePhase) * 0.7;
            }

            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.brightness})`;
                ctx.fill();

                // Add glow for bright stars
                if (this.brightness > 0.8) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(200, 220, 255, ${0.1 * this.brightness})`;
                    ctx.fill();
                }
            }
        }

        // Cosmic burst particle
        class BurstParticle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 3 + 1;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1;
                this.decay = 0.005 + Math.random() * 0.01;
                this.size = Math.random() * 3 + 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.02; // slight gravity
                this.life -= this.decay;
            }

            draw(ctx) {
                if (this.life <= 0) return;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = this.color.replace('1)', `${this.life})`);
                ctx.fill();
            }
        }

        // Initialize systems
        const curtains = [];
        const colors = [
            'rgba(100, 255, 150, 1)',   // Green
            'rgba(150, 255, 100, 1)',   // Light Green
            'rgba(100, 200, 255, 1)',   // Blue
            'rgba(150, 100, 255, 1)',   // Purple
            'rgba(255, 150, 200, 1)',   // Pink
            'rgba(100, 255, 200, 1)',   // Cyan
        ];

        const curtainCount = 15;
        for (let i = 0; i < curtainCount; i++) {
            const x = (width / (curtainCount - 1)) * i;
            const color = colors[i % colors.length];
            curtains.push(new AuroraCurtain(x, height * 0.7, color, i * 0.3));
        }

        const stars = Array.from({ length: 150 }, () => new Star());
        let burstParticles = [];

        // Mouse events
        canvas.addEventListener('mousemove', (e) => {
            targetMouseX = e.clientX;
            targetMouseY = e.clientY;
        });

        canvas.addEventListener('click', (e) => {
            const color = colors[Math.floor(Math.random() * colors.length)];
            for (let i = 0; i < 30; i++) {
                burstParticles.push(new BurstParticle(e.clientX, e.clientY, color));
            }
        });

        // Handle resize
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;

            // Recreate curtains
            curtains.length = 0;
            for (let i = 0; i < curtainCount; i++) {
                const x = (width / (curtainCount - 1)) * i;
                const color = colors[i % colors.length];
                curtains.push(new AuroraCurtain(x, height * 0.7, color, i * 0.3));
            }
        });

        // Animation loop
        let lastTime = 0;
        function animate(currentTime) {
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            // Smooth mouse movement
            mouseX += (targetMouseX - mouseX) * 0.05;
            mouseY += (targetMouseY - mouseY) * 0.05;

            // Calculate wind
            const windX = (mouseX - width / 2) * 0.1;
            const windY = (mouseY - height / 2) * 0.1;

            // Clear with fade effect
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // Draw night sky gradient
            const skyGradient = ctx.createLinearGradient(0, 0, 0, height);
            skyGradient.addColorStop(0, 'rgba(5, 5, 20, 0.3)');
            skyGradient.addColorStop(0.5, 'rgba(10, 10, 30, 0.2)');
            skyGradient.addColorStop(1, 'rgba(15, 15, 35, 0.1)');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, width, height);

            // Update and draw stars
            stars.forEach(star => {
                star.update(currentTime);
                star.draw(ctx);
            });

            // Draw aurora curtains
            curtains.forEach(curtain => {
                curtain.update(currentTime, windX, windY);
                curtain.draw(ctx, currentTime);
            });

            // Update and draw burst particles
            burstParticles = burstParticles.filter(p => p.life > 0);
            burstParticles.forEach(particle => {
                particle.update();
                particle.draw(ctx);
            });

            // Add atmospheric glow
            const glowGradient = ctx.createRadialGradient(
                width / 2, height * 0.6, 0,
                width / 2, height * 0.6, height * 0.5
            );
            glowGradient.addColorStop(0, 'rgba(100, 200, 150, 0.05)');
            glowGradient.addColorStop(0.5, 'rgba(50, 100, 100, 0.02)');
            glowGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = glowGradient;
            ctx.fillRect(0, 0, width, height);

            requestAnimationFrame(animate);
        }

        animate(0);
    </script>
</body>
</html>
