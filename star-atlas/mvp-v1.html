<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>365日の星図 — 365-Day Star Atlas</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050a18;font-family:'Hiragino Mincho ProN','Yu Mincho','Noto Serif JP',serif}
.scene{width:100%;height:100%;perspective:1200px;display:flex;align-items:center;justify-content:center}
.card{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform 1.2s cubic-bezier(.4,.0,.2,1);cursor:pointer;-webkit-tap-highlight-color:transparent}
.card.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:0;overflow:hidden}
.face--front{background:#050a18}
.face--back{transform:rotateY(180deg);background:linear-gradient(160deg,#0a0e2a 0%,#0f1438 40%,#1a0f3a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
canvas{display:block;width:100%;height:100%}
.back-content{max-width:560px;text-align:center;color:#c8bfa0}
.back-content .day{font-size:.85rem;letter-spacing:.35em;color:#8a7e60;margin-bottom:2.5rem;text-transform:uppercase}
.back-content .day span{color:#d4a84b;font-weight:600}
.back-content .poem{font-size:1.15rem;line-height:2.4;color:#b8ad8e;letter-spacing:.08em;margin-bottom:2.5rem}
.back-content .poem .em{color:#d4a84b}
.back-content .attribution{font-size:.75rem;color:#5a5445;letter-spacing:.25em}
.hint{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);color:rgba(200,191,160,.35);font-size:.7rem;letter-spacing:.2em;pointer-events:none;animation:fadeHint 4s ease-in-out infinite alternate}
.card.flipped~.hint{color:rgba(200,191,160,.15)}
@keyframes fadeHint{0%{opacity:.3}100%{opacity:.7}}
</style>
</head>
<body>
<div class="scene">
  <div class="card" id="card">
    <div class="face face--front">
      <canvas id="canvas"></canvas>
    </div>
    <div class="face face--back">
      <div class="back-content">
        <div class="day">第 <span>1</span> 日 — Day <span>I</span></div>
        <div class="poem">
          名もなき庭の<br>
          <span class="em">星明かり</span>だけが道しるべ<br><br>
          旅人は知らない<br>
          この空が<span class="em">何度も</span>巡るものだと<br><br>
          一歩、また一歩<br>
          夜の<span class="em">庭</span>はどこまでも続く
        </div>
        <div class="attribution">365日の星図 — 三六五日の星図</div>
      </div>
    </div>
  </div>
  <div class="hint">tap to flip</div>
</div>
<script>
(function(){
"use strict";

/* ── Card Flip ── */
const card = document.getElementById("card");
card.addEventListener("click", function(){ card.classList.toggle("flipped"); });

/* ── Canvas Setup ── */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let W, H, dpr;

function resize(){
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = canvas.clientWidth;
  H = canvas.clientHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  initStars();
  initShooters();
  initVines();
}
window.addEventListener("resize", resize);

/* ── Color Palette ── */
const C = {
  deep:     "#050a18",
  navy:     "#0b1130",
  purple:   "#1a0f3a",
  gold:     "#d4a84b",
  goldDim:  "#8a7340",
  star:     "#ffe8c0",
  starBlue: "#a0c4ff",
  starPink: "#ffc0d0",
  vine:     "#1a3a2a",
  vineGlow: "#2a6a4a",
};

/* ── Stars ── */
let stars = [];
function initStars(){
  stars = [];
  const count = Math.floor(W * H / 600);
  for(let i = 0; i < count; i++){
    const hue = Math.random();
    let color;
    if(hue < 0.6) color = C.star;
    else if(hue < 0.8) color = C.starBlue;
    else if(hue < 0.92) color = C.starPink;
    else color = C.gold;
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.8 + 0.3,
      color,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.8 + 0.3,
      glow: Math.random() > 0.85,
    });
  }
}

function drawStars(t){
  for(const s of stars){
    const twinkle = 0.5 + 0.5 * Math.sin(t * s.speed + s.phase);
    const alpha = 0.3 + 0.7 * twinkle;
    if(s.glow && s.r > 0.8){
      const gr = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 6);
      gr.addColorStop(0, s.color + hexAlpha(alpha * 0.35));
      gr.addColorStop(1, s.color + "00");
      ctx.fillStyle = gr;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * 6, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = alpha;
    ctx.fillStyle = s.color;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
    /* Cross sparkle for bright stars */
    if(s.r > 1.3 && twinkle > 0.7){
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 0.5;
      ctx.globalAlpha = alpha * 0.5;
      const len = s.r * 4 * twinkle;
      ctx.beginPath();
      ctx.moveTo(s.x - len, s.y); ctx.lineTo(s.x + len, s.y);
      ctx.moveTo(s.x, s.y - len); ctx.lineTo(s.x, s.y + len);
      ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;
}

function hexAlpha(a){
  const v = Math.round(Math.max(0, Math.min(1, a)) * 255);
  return v.toString(16).padStart(2, "0");
}

/* ── Shooting Stars ── */
let shooters = [];
function initShooters(){ shooters = []; }

function spawnShooter(){
  const angle = Math.PI * 0.15 + Math.random() * Math.PI * 0.2;
  shooters.push({
    x: Math.random() * W * 0.8,
    y: Math.random() * H * 0.3,
    vx: Math.cos(angle) * (3 + Math.random() * 4),
    vy: Math.sin(angle) * (3 + Math.random() * 4),
    life: 1,
    decay: 0.012 + Math.random() * 0.008,
    len: 40 + Math.random() * 60,
  });
}

function drawShooters(){
  for(const s of shooters){
    const tx = s.x - s.vx * s.len / 5;
    const ty = s.y - s.vy * s.len / 5;
    const gr = ctx.createLinearGradient(tx, ty, s.x, s.y);
    gr.addColorStop(0, "rgba(255,232,192,0)");
    gr.addColorStop(1, "rgba(255,232,192," + s.life + ")");
    ctx.strokeStyle = gr;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.lineTo(s.x, s.y);
    ctx.stroke();
    s.x += s.vx;
    s.y += s.vy;
    s.life -= s.decay;
  }
  shooters = shooters.filter(s => s.life > 0);
}

/* ── Organic Vines (Bottom) ── */
let vines = [];
function initVines(){
  vines = [];
  const count = Math.floor(W / 120) + 2;
  for(let i = 0; i < count; i++){
    const baseX = (i / count) * W + (Math.random() - 0.5) * 80;
    vines.push({
      points: generateVine(baseX, H, 8 + Math.floor(Math.random() * 6)),
      phase: Math.random() * Math.PI * 2,
      speed: 0.2 + Math.random() * 0.3,
      width: 1.2 + Math.random() * 1.5,
    });
  }
}

function generateVine(baseX, baseY, segments){
  const pts = [];
  let x = baseX, y = baseY;
  for(let i = 0; i <= segments; i++){
    pts.push({ x, y });
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * 1.2;
    const dist = 20 + Math.random() * 35;
    x += Math.cos(angle) * dist;
    y += Math.sin(angle) * dist;
  }
  return pts;
}

function drawVines(t){
  for(const v of vines){
    ctx.strokeStyle = C.vine;
    ctx.lineWidth = v.width;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.beginPath();
    const pts = v.points;
    for(let i = 0; i < pts.length; i++){
      const sway = Math.sin(t * v.speed + v.phase + i * 0.5) * 4;
      const px = pts[i].x + sway;
      const py = pts[i].y;
      if(i === 0) ctx.moveTo(px, py);
      else {
        const prev = pts[i - 1];
        const prevSway = Math.sin(t * v.speed + v.phase + (i - 1) * 0.5) * 4;
        const cx = (prev.x + prevSway + px) / 2;
        const cy = (prev.y + py) / 2;
        ctx.quadraticCurveTo(prev.x + prevSway, prev.y, cx, cy);
      }
    }
    ctx.stroke();
    /* Subtle glow */
    ctx.strokeStyle = C.vineGlow + "18";
    ctx.lineWidth = v.width + 4;
    ctx.stroke();
  }
}

/* ── Nebula Clouds ── */
let nebulae = [];
function initNebulae(){
  nebulae = [];
  const count = 4 + Math.floor(Math.random() * 3);
  for(let i = 0; i < count; i++){
    const colors = ["rgba(26,15,58,", "rgba(15,30,80,", "rgba(40,15,60,", "rgba(10,25,50,"];
    nebulae.push({
      x: Math.random() * W,
      y: Math.random() * H,
      rx: 80 + Math.random() * 200,
      ry: 60 + Math.random() * 150,
      color: colors[Math.floor(Math.random() * colors.length)],
      alpha: 0.15 + Math.random() * 0.2,
      phase: Math.random() * Math.PI * 2,
      speed: 0.1 + Math.random() * 0.15,
    });
  }
}

function drawNebulae(t){
  for(const n of nebulae){
    const ox = Math.sin(t * n.speed + n.phase) * 20;
    const oy = Math.cos(t * n.speed * 0.7 + n.phase) * 15;
    const gr = ctx.createRadialGradient(n.x + ox, n.y + oy, 0, n.x + ox, n.y + oy, Math.max(n.rx, n.ry));
    gr.addColorStop(0, n.color + n.alpha + ")");
    gr.addColorStop(0.5, n.color + (n.alpha * 0.4) + ")");
    gr.addColorStop(1, n.color + "0)");
    ctx.fillStyle = gr;
    ctx.beginPath();
    ctx.ellipse(n.x + ox, n.y + oy, n.rx, n.ry, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

/* ── Fireflies ── */
let fireflies = [];
function initFireflies(){
  fireflies = [];
  const count = Math.floor(W * H / 15000);
  for(let i = 0; i < count; i++){
    fireflies.push({
      x: Math.random() * W,
      y: H * 0.5 + Math.random() * H * 0.5,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.2,
      phase: Math.random() * Math.PI * 2,
      speed: 0.5 + Math.random() * 1,
      size: 1.5 + Math.random() * 2,
    });
  }
}

function drawFireflies(t){
  for(const f of fireflies){
    f.x += f.vx + Math.sin(t * 0.3 + f.phase) * 0.2;
    f.y += f.vy + Math.cos(t * 0.25 + f.phase) * 0.15;
    if(f.x < -20) f.x = W + 20;
    if(f.x > W + 20) f.x = -20;
    if(f.y < H * 0.4) f.y = H;
    if(f.y > H + 20) f.y = H * 0.4;
    const pulse = 0.3 + 0.7 * Math.max(0, Math.sin(t * f.speed + f.phase));
    const gr = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.size * 5);
    gr.addColorStop(0, "rgba(212,168,75," + (pulse * 0.6) + ")");
    gr.addColorStop(0.3, "rgba(180,140,50," + (pulse * 0.2) + ")");
    gr.addColorStop(1, "rgba(180,140,50,0)");
    ctx.fillStyle = gr;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.size * 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "rgba(255,232,180," + pulse + ")";
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.size * 0.6, 0, Math.PI * 2);
    ctx.fill();
  }
}

/* ── Main Loop ── */
let lastShooter = 0;

function frame(ts){
  const t = ts * 0.001;
  /* Sky gradient */
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, "#050a18");
  bg.addColorStop(0.4, "#0b1130");
  bg.addColorStop(0.7, "#12183d");
  bg.addColorStop(1, "#0a1025");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  drawNebulae(t);
  drawStars(t);
  drawVines(t);
  drawFireflies(t);

  /* Spawn shooting stars occasionally */
  if(t - lastShooter > 3 + Math.random() * 5){
    spawnShooter();
    lastShooter = t;
  }
  drawShooters();

  requestAnimationFrame(frame);
}

/* ── Init ── */
resize();
initNebulae();
initFireflies();
requestAnimationFrame(frame);

})();
</script>
</body>
</html>
