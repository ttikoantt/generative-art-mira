<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>365日の星図 — 365-Day Star Atlas</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050a18;font-family:'Hiragino Mincho ProN','Yu Mincho','Noto Serif JP',serif;-webkit-user-select:none;user-select:none;touch-action:none}

/* ── Views ── */
.view{position:absolute;inset:0;transition:opacity .5s ease,transform .5s ease}
.view.hidden{opacity:0;pointer-events:none;transform:translateY(20px)}

/* ── Card View ── */
.card-view{display:flex;align-items:center;justify-content:center}
.card-container{position:relative;width:100%;height:calc(100% - 60px);perspective:1200px}
.card{position:absolute;inset:0;transform-style:preserve-3d;transition:transform 1.2s cubic-bezier(.4,.0,.2,1);cursor:pointer;-webkit-tap-highlight-color:transparent}
.card.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden}
.face--front{background:#050a18}
.face--back{transform:rotateY(180deg);background:linear-gradient(160deg,#0a0e2a 0%,#0f1438 40%,#1a0f3a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.face canvas{display:block;width:100%;height:100%}
.back-content{max-width:560px;text-align:center;color:#c8bfa0}
.back-content .day{font-size:.85rem;letter-spacing:.35em;color:#8a7e60;margin-bottom:2.5rem}
.back-content .day span{color:#d4a84b;font-weight:600}
.back-content .poem{font-size:1.15rem;line-height:2.4;color:#b8ad8e;letter-spacing:.08em;margin-bottom:2.5rem}
.back-content .poem .em{color:#d4a84b}
.back-content .attribution{font-size:.75rem;color:#5a5445;letter-spacing:.25em}

/* ── Navigation Arrows ── */
.nav-arrow{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;border:none;background:rgba(200,191,160,.08);color:rgba(200,191,160,.5);font-size:1.4rem;border-radius:50%;cursor:pointer;z-index:10;transition:background .3s,color .3s;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center}
.nav-arrow:hover,.nav-arrow:active{background:rgba(200,191,160,.18);color:rgba(200,191,160,.8)}
.nav-arrow.left{left:12px}
.nav-arrow.right{right:12px}
.nav-arrow:disabled{opacity:.2;pointer-events:none}

/* ── Day Counter ── */
.day-counter{position:absolute;top:16px;left:50%;transform:translateX(-50%);color:rgba(200,191,160,.4);font-size:.75rem;letter-spacing:.3em;z-index:10;pointer-events:none}
.day-counter span{color:rgba(212,168,75,.6)}

/* ── Hint ── */
.hint{position:absolute;bottom:72px;left:50%;transform:translateX(-50%);color:rgba(200,191,160,.3);font-size:.65rem;letter-spacing:.2em;pointer-events:none;animation:fadeHint 4s ease-in-out infinite alternate;z-index:10}
.card.flipped~.hint{opacity:.1}
@keyframes fadeHint{0%{opacity:.3}100%{opacity:.6}}

/* ── Grid View ── */
.grid-view{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:70px 16px 80px}
.grid-header{text-align:center;color:#8a7e60;font-size:.8rem;letter-spacing:.4em;margin-bottom:1.5rem}
.grid-header span{color:#d4a84b}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;max-width:800px;margin:0 auto}
.grid-item{position:relative;aspect-ratio:3/4;border-radius:8px;overflow:hidden;cursor:pointer;transition:transform .3s ease,box-shadow .3s ease;border:1px solid rgba(200,191,160,.06)}
.grid-item:hover,.grid-item:active{transform:scale(1.03);box-shadow:0 4px 20px rgba(212,168,75,.12)}
.grid-item canvas{width:100%;height:100%;display:block}
.grid-item .day-label{position:absolute;bottom:0;left:0;right:0;padding:6px 0;text-align:center;background:linear-gradient(transparent,rgba(5,10,24,.85));color:rgba(200,191,160,.6);font-size:.65rem;letter-spacing:.25em}
.grid-item .day-label span{color:rgba(212,168,75,.7)}

/* ── Star Map View ── */
.starmap-view{overflow:hidden;touch-action:none}
#starmapCanvas{display:block;width:100%;height:100%;cursor:grab}
#starmapCanvas:active{cursor:grabbing}
.starmap-label{position:absolute;top:16px;left:50%;transform:translateX(-50%);color:rgba(200,191,160,.35);font-size:.7rem;letter-spacing:.4em;pointer-events:none;z-index:5}
.starmap-hint{position:absolute;bottom:72px;left:50%;transform:translateX(-50%);color:rgba(200,191,160,.2);font-size:.6rem;letter-spacing:.15em;pointer-events:none;z-index:5;animation:fadeHint 4s ease-in-out infinite alternate}

/* ═══════════════════════════════════════════
   ── STORY MODE ──
   ═══════════════════════════════════════════ */

/* Phase 1: Wave flip overlay */
.story-wave-overlay{position:fixed;inset:0;z-index:200;background:#050a18;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .6s ease}
.story-wave-overlay.active{opacity:1;pointer-events:auto}

.wave-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:500px;width:90%;padding:20px}
.wave-card{perspective:800px;aspect-ratio:3/4}
.wave-card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transform:rotateY(0deg);transition:transform .8s cubic-bezier(.4,.0,.2,1)}
.wave-card-inner.flipped{transform:rotateY(180deg)}
.wave-card-front,.wave-card-back{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:6px;overflow:hidden}
.wave-card-front{background:#0a0e2a}
.wave-card-front canvas{width:100%;height:100%;display:block}
.wave-card-back{transform:rotateY(180deg);background:linear-gradient(160deg,#0a0e2a,#1a0f3a);display:flex;align-items:center;justify-content:center}
.wave-card-back .mini-day{color:#d4a84b;font-size:1.4rem;letter-spacing:.2em;font-weight:600}
.wave-card-back .mini-text{color:#8a7e60;font-size:.55rem;letter-spacing:.15em;margin-top:4px;text-align:center;padding:0 6px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}

/* Ambient stars on wave overlay */
.wave-stars{position:absolute;inset:0;pointer-events:none}

/* Phase 2: Story scroll view */
.story-view{overflow:hidden;background:#050a18}
.story-scroll{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 80px 0;scroll-behavior:smooth}
.story-scroll::-webkit-scrollbar{width:3px}
.story-scroll::-webkit-scrollbar-track{background:transparent}
.story-scroll::-webkit-scrollbar-thumb{background:rgba(212,168,75,.15);border-radius:3px}

/* Story header */
.story-header{padding:60px 24px 40px;text-align:center;position:relative}
.story-header h1{font-size:1.6rem;letter-spacing:.4em;color:rgba(212,168,75,.7);font-weight:400;animation:storyTitleGlow 4s ease-in-out infinite alternate}
.story-header .subtitle{font-size:.7rem;color:rgba(200,191,160,.25);letter-spacing:.5em;margin-top:12px}
@keyframes storyTitleGlow{0%{text-shadow:0 0 20px rgba(212,168,75,.1)}100%{text-shadow:0 0 40px rgba(212,168,75,.25)}}

/* Story ambient stars canvas */
#storyAmbientCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}

/* Story fragment */
.story-fragment{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:30px 28px;text-align:center;opacity:0;transform:translateY(30px);transition:opacity .8s ease,transform .8s ease}
.story-fragment.visible{opacity:1;transform:translateY(0)}

.story-fragment .frag-day{font-size:.7rem;letter-spacing:.5em;color:rgba(138,126,96,.5);margin-bottom:16px}
.story-fragment .frag-day span{color:rgba(212,168,75,.6);font-weight:600;font-size:.8rem}

.story-fragment .frag-art{width:100%;aspect-ratio:3/4;max-width:320px;margin:0 auto 28px;border-radius:8px;overflow:hidden;box-shadow:0 4px 30px rgba(0,0,0,.4),0 0 60px rgba(212,168,75,.05)}
.story-fragment .frag-art canvas{width:100%;height:100%;display:block}

.story-fragment .frag-poem{font-size:1.05rem;line-height:2.6;color:rgba(184,173,142,.75);letter-spacing:.1em}
.story-fragment .frag-poem .em{color:#d4a84b}

/* Separator between fragments */
.story-separator{display:flex;align-items:center;justify-content:center;padding:10px 0;max-width:400px;margin:0 auto;position:relative;z-index:1}
.story-separator .sep-line{flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(212,168,75,.12),transparent)}
.story-separator .sep-star{width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:rgba(212,168,75,.2);font-size:.5rem;margin:0 12px}

/* Story footer */
.story-footer{padding:40px 24px 60px;text-align:center;position:relative;z-index:1}
.story-footer .footer-text{font-size:.65rem;color:rgba(138,126,96,.3);letter-spacing:.4em}
.story-footer .footer-star{color:rgba(212,168,75,.15);font-size:.9rem;margin-bottom:12px;display:block;letter-spacing:.6em}

/* ── Bottom Nav ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(5,10,24,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;gap:20px;z-index:100;border-top:1px solid rgba(200,191,160,.06)}
.nav-btn{background:none;border:none;color:rgba(200,191,160,.4);font-size:.6rem;letter-spacing:.12em;cursor:pointer;padding:8px 12px;transition:color .3s;display:flex;flex-direction:column;align-items:center;gap:4px}
.nav-btn svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.active{color:#d4a84b}

/* ── Responsive ── */
@media(min-width:600px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:16px}
  .wave-grid{grid-template-columns:repeat(4,1fr);gap:14px;max-width:600px}
  .story-fragment .frag-poem{font-size:1.1rem}
}
@media(min-width:900px){
  .grid{grid-template-columns:repeat(4,1fr);max-width:900px}
  .wave-grid{grid-template-columns:repeat(4,1fr);max-width:700px}
}
</style>
</head>
<body>

<!-- Card View -->
<div class="view card-view" id="cardView">
  <div class="day-counter" id="dayCounter">第 <span id="dayNum">1</span> 日 — Day <span id="dayNumRoman">I</span></div>
  <div class="card-container" id="cardContainer"></div>
  <button class="nav-arrow left" id="prevBtn" onclick="navigateCard(-1)">‹</button>
  <button class="nav-arrow right" id="nextBtn" onclick="navigateCard(1)">›</button>
  <div class="hint">tap to flip</div>
</div>

<!-- Grid View -->
<div class="view grid-view hidden" id="gridView">
  <div class="grid-header">365日の星図 — <span>三六五日</span>の星図</div>
  <div class="grid" id="grid"></div>
</div>

<!-- Star Map View -->
<div class="view starmap-view hidden" id="starmapView">
  <div class="starmap-label">365日の星図 — <span style="color:rgba(212,168,75,.4)">星図</span></div>
  <canvas id="starmapCanvas"></canvas>
  <div class="starmap-hint">drag to pan · pinch to zoom · tap a star</div>
</div>

<!-- Story View -->
<div class="view story-view hidden" id="storyView">
  <canvas id="storyAmbientCanvas"></canvas>
  <div class="story-scroll" id="storyScroll"></div>
</div>

<!-- Story Wave Flip Overlay -->
<div class="story-wave-overlay" id="storyWaveOverlay">
  <canvas class="wave-stars" id="waveStarsCanvas"></canvas>
  <div class="wave-grid" id="waveGrid"></div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <button class="nav-btn active" id="navCard" onclick="switchView('card')">
    <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2.5"/></svg>
    Card
  </button>
  <button class="nav-btn" id="navGrid" onclick="switchView('grid')">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7.5" height="7.5" rx="1.5"/><rect x="13.5" y="3" width="7.5" height="7.5" rx="1.5"/><rect x="3" y="13.5" width="7.5" height="7.5" rx="1.5"/><rect x="13.5" y="13.5" width="7.5" height="7.5" rx="1.5"/></svg>
    Grid
  </button>
  <button class="nav-btn" id="navMap" onclick="switchView('map')">
    <svg viewBox="0 0 24 24"><circle cx="6" cy="7" r="1.3"/><circle cx="18" cy="5" r="1.3"/><circle cx="12" cy="14" r="1.3"/><circle cx="5" cy="19" r="1.3"/><circle cx="19" cy="18" r="1.3"/><line x1="6" y1="7" x2="12" y2="14"/><line x1="12" y1="14" x2="18" y2="5"/><line x1="12" y1="14" x2="5" y2="19"/><line x1="12" y1="14" x2="19" y2="18"/></svg>
    Map
  </button>
  <button class="nav-btn" id="navStory" onclick="enterStoryMode()">
    <svg viewBox="0 0 24 24"><path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h6v6h-6z" fill="currentColor" opacity=".3" stroke="none"/><path d="M7 3v18M17 3v18M3 7h18M3 17h18" stroke-width="1"/></svg>
    Story
  </button>
</div>

<script>
(function(){
"use strict";

/* ── Card Data ── */
const CARDS = [
  { day: 1, seed: 42, story: '名もなき庭の\n<span class="em">星明かり</span>だけが道しるべ\n\n旅人は知らない\nこの空が<span class="em">何度も</span>巡るものだと\n\n一歩、また一歩\n夜の<span class="em">庭</span>はどこまでも続く' },
  { day: 2, seed: 137, story: '二度目の夜明けは<span class="em">訪れない</span>\nただ星が少しだけ\n<span class="em">近づいた</span>気がした\n\n足元には名前のない<span class="em">花</span>\n誰も見たことのない色で\n静かに<span class="em">咲いていた</span>' },
  { day: 3, seed: 256, story: '水の音が<span class="em">聞こえる</span>\n見えない泉がどこかで\n<span class="em">歌っている</span>\n\n旅人は<span class="em">目を閉じる</span>\n暗闇の中に\n無数の<span class="em">光の道</span>が浮かぶ' },
  { day: 4, seed: 389, story: '四日目の<span class="em">庭</span>で\n古い<span class="em">石碑</span>を見つけた\n\n何千年もの<span class="em">星の記録</span>\n読めない文字の中に\n誰かの<span class="em">祈り</span>が刻まれている' },
  { day: 5, seed: 512, story: '<span class="em">星座</span>が語りかける\n「ここが<span class="em">始まり</span>だ」と\n\n旅人は<span class="em">手を伸ばす</span>\n指先に触れた光は\n<span class="em">温かく</span>、そして<span class="em">遠い</span>' },
  { day: 6, seed: 723, story: '六つの<span class="em">月</span>が浮かぶ夜\nそれぞれが違う<span class="em">色</span>で\n庭を<span class="em">照らしている</span>\n\n影が<span class="em">踊る</span>\n風が<span class="em">囁く</span>\nここは時間の<span class="em">境界</span>' },
  { day: 7, seed: 888, story: '七日目の<span class="em">朝</span>\n初めて<span class="em">空が明るくなった</span>\n\nでも星は<span class="em">消えない</span>\n夜の庭の記憶が\nずっと<span class="em">輝き続ける</span>\n\n旅人は<span class="em">微笑む</span>\nまた<span class="em">夜</span>が来ることを知っているから' },
];

const ROMAN = ['','I','II','III','IV','V','VI','VII','VIII','IX','X'];

/* ── Seeded Random ── */
function mulberry32(a){
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function hexAlpha(a){
  const v = Math.round(Math.max(0, Math.min(1, a)) * 255);
  return v.toString(16).padStart(2, "0");
}

/* ── State ── */
let currentView = 'card';
let currentDay = 0;
let cardElements = [];
let gridRendered = false;
let mapInitialized = false;
let mapAnimId = null;
let storyModeActive = false;
let storyAnimId = null;
let storyBuilt = false;

/* ── Card Art Engine (seeded) ── */
function renderArt(canvas, seed, animated){
  const ctx = canvas.getContext("2d");
  const W = canvas.clientWidth;
  const H = canvas.clientHeight;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const rng = mulberry32(seed);
  const palettes = [
    { n1:"rgba(26,15,58,", n2:"rgba(15,30,80,", n3:"rgba(40,15,60,", n4:"rgba(10,25,50," },
    { n1:"rgba(15,40,60,", n2:"rgba(20,25,70,", n3:"rgba(50,20,50,", n4:"rgba(10,35,45," },
    { n1:"rgba(30,10,50,", n2:"rgba(10,20,65,", n3:"rgba(45,10,55,", n4:"rgba(5,30,55," },
    { n1:"rgba(20,25,65,", n2:"rgba(35,15,55,", n3:"rgba(10,35,60,", n4:"rgba(25,10,45," },
  ];
  const pal = palettes[Math.floor(rng() * palettes.length)];

  const starCount = Math.floor(W * H / 600);
  const stars = [];
  const starColors = ["#ffe8c0","#a0c4ff","#ffc0d0","#d4a84b"];
  for(let i = 0; i < starCount; i++){
    const hue = rng();
    let color;
    if(hue < 0.6) color = starColors[0];
    else if(hue < 0.8) color = starColors[1];
    else if(hue < 0.92) color = starColors[2];
    else color = starColors[3];
    stars.push({ x: rng() * W, y: rng() * H, r: rng() * 1.8 + 0.3, color, phase: rng() * Math.PI * 2, speed: rng() * 0.8 + 0.3, glow: rng() > 0.85 });
  }

  const nebulae = [];
  const nebCount = 4 + Math.floor(rng() * 3);
  const nebColors = [pal.n1, pal.n2, pal.n3, pal.n4];
  for(let i = 0; i < nebCount; i++){
    nebulae.push({ x: rng() * W, y: rng() * H, rx: 80 + rng() * 200, ry: 60 + rng() * 150, color: nebColors[Math.floor(rng() * nebColors.length)], alpha: 0.15 + rng() * 0.2, phase: rng() * Math.PI * 2, speed: 0.1 + rng() * 0.15 });
  }

  const vines = [];
  const vineCount = Math.floor(W / 120) + 2;
  const vineBaseColors = ["#1a3a2a","#1a2a3a","#2a1a3a","#1a3a3a"];
  const vineGlowColors = ["#2a6a4a","#2a4a6a","#4a2a6a","#2a6a6a"];
  for(let i = 0; i < vineCount; i++){
    const baseX = (i / vineCount) * W + (rng() - 0.5) * 80;
    const pts = [];
    let x = baseX, y = H;
    const segs = 8 + Math.floor(rng() * 6);
    for(let j = 0; j <= segs; j++){
      pts.push({ x, y });
      const angle = -Math.PI / 2 + (rng() - 0.5) * 1.2;
      const dist = 20 + rng() * 35;
      x += Math.cos(angle) * dist;
      y += Math.sin(angle) * dist;
    }
    vines.push({ points: pts, phase: rng() * Math.PI * 2, speed: 0.2 + rng() * 0.3, width: 1.2 + rng() * 1.5, color: vineBaseColors[Math.floor(rng() * vineBaseColors.length)], glow: vineGlowColors[Math.floor(rng() * vineGlowColors.length)] + "18" });
  }

  const fireflies = [];
  const ffCount = Math.floor(W * H / 15000);
  for(let i = 0; i < ffCount; i++){
    fireflies.push({ x: rng() * W, y: H * 0.5 + rng() * H * 0.5, vx: (rng() - 0.5) * 0.3, vy: (rng() - 0.5) * 0.2, phase: rng() * Math.PI * 2, speed: 0.5 + rng() * 1, size: 1.5 + rng() * 2 });
  }

  function drawFrame(t){
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, "#050a18"); bg.addColorStop(0.4, "#0b1130"); bg.addColorStop(0.7, "#12183d"); bg.addColorStop(1, "#0a1025");
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);
    for(const n of nebulae){
      const ox = Math.sin(t * n.speed + n.phase) * 20, oy = Math.cos(t * n.speed * 0.7 + n.phase) * 15;
      const gr = ctx.createRadialGradient(n.x + ox, n.y + oy, 0, n.x + ox, n.y + oy, Math.max(n.rx, n.ry));
      gr.addColorStop(0, n.color + n.alpha + ")"); gr.addColorStop(0.5, n.color + (n.alpha * 0.4) + ")"); gr.addColorStop(1, n.color + "0)");
      ctx.fillStyle = gr;
      ctx.beginPath(); ctx.ellipse(n.x + ox, n.y + oy, n.rx, n.ry, 0, 0, Math.PI * 2); ctx.fill();
    }
    for(const s of stars){
      const twinkle = 0.5 + 0.5 * Math.sin(t * s.speed + s.phase);
      const alpha = 0.3 + 0.7 * twinkle;
      if(s.glow && s.r > 0.8){
        const gr = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 6);
        gr.addColorStop(0, s.color + hexAlpha(alpha * 0.35)); gr.addColorStop(1, s.color + "00");
        ctx.fillStyle = gr; ctx.beginPath(); ctx.arc(s.x, s.y, s.r * 6, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = alpha; ctx.fillStyle = s.color; ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
      if(s.r > 1.3 && twinkle > 0.7){
        ctx.strokeStyle = s.color; ctx.lineWidth = 0.5; ctx.globalAlpha = alpha * 0.5;
        const len = s.r * 4 * twinkle;
        ctx.beginPath(); ctx.moveTo(s.x - len, s.y); ctx.lineTo(s.x + len, s.y); ctx.moveTo(s.x, s.y - len); ctx.lineTo(s.x, s.y + len); ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;
    for(const v of vines){
      ctx.strokeStyle = v.color; ctx.lineWidth = v.width; ctx.lineCap = "round"; ctx.lineJoin = "round";
      ctx.beginPath();
      const pts = v.points;
      for(let i = 0; i < pts.length; i++){
        const sway = Math.sin(t * v.speed + v.phase + i * 0.5) * 4;
        const px = pts[i].x + sway, py = pts[i].y;
        if(i === 0) ctx.moveTo(px, py);
        else { const prev = pts[i-1]; const prevSway = Math.sin(t * v.speed + v.phase + (i-1) * 0.5) * 4; ctx.quadraticCurveTo(prev.x + prevSway, prev.y, (prev.x + prevSway + px) / 2, (prev.y + py) / 2); }
      }
      ctx.stroke(); ctx.strokeStyle = v.glow; ctx.lineWidth = v.width + 4; ctx.stroke();
    }
    for(const f of fireflies){
      f.x += f.vx + Math.sin(t * 0.3 + f.phase) * 0.2; f.y += f.vy + Math.cos(t * 0.25 + f.phase) * 0.15;
      if(f.x < -20) f.x = W + 20; if(f.x > W + 20) f.x = -20; if(f.y < H * 0.4) f.y = H; if(f.y > H + 20) f.y = H * 0.4;
      const pulse = 0.3 + 0.7 * Math.max(0, Math.sin(t * f.speed + f.phase));
      const gr = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.size * 5);
      gr.addColorStop(0, "rgba(212,168,75," + (pulse * 0.6) + ")"); gr.addColorStop(0.3, "rgba(180,140,50," + (pulse * 0.2) + ")"); gr.addColorStop(1, "rgba(180,140,50,0)");
      ctx.fillStyle = gr; ctx.beginPath(); ctx.arc(f.x, f.y, f.size * 5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "rgba(255,232,180," + pulse + ")"; ctx.beginPath(); ctx.arc(f.x, f.y, f.size * 0.6, 0, Math.PI * 2); ctx.fill();
    }
    if(animated) return requestAnimationFrame(drawFrame);
  }

  if(animated){ return requestAnimationFrame(drawFrame); }
  else { drawFrame(0); drawFrame(1.5); return null; }
}


/* ═══════════════════════════════════════════
   ── STAR MAP ──
   ═══════════════════════════════════════════ */

const MAP_WIDTH = 2400;
const MAP_HEIGHT = 1800;

const mapNodes = [
  { day: 1, wx: 400,  wy: 350 },
  { day: 2, wx: 580,  wy: 480 },
  { day: 3, wx: 1200, wy: 280 },
  { day: 4, wx: 900,  wy: 850 },
  { day: 5, wx: 1100, wy: 750 },
  { day: 6, wx: 350,  wy: 1200 },
  { day: 7, wx: 1500, wy: 1100 },
];

const constellationLines = [
  [0, 1], [0, 5], [3, 4], [2, 4], [4, 6], [5, 3],
];

let mapState = {
  cx: MAP_WIDTH / 2, cy: MAP_HEIGHT / 2, zoom: 1,
  dragging: false, dragStartX: 0, dragStartY: 0, dragStartCx: 0, dragStartCy: 0,
  pinchStartDist: 0, pinchStartZoom: 1, pinchStartCx: 0, pinchStartCy: 0,
  touchStart: null, bgStars: [], thumbnails: [], thumbnailsReady: false,
};

function initMapBgStars(){
  const rng = mulberry32(9999);
  mapState.bgStars = [];
  for(let i = 0; i < 600; i++){
    mapState.bgStars.push({ x: rng() * MAP_WIDTH, y: rng() * MAP_HEIGHT, r: rng() * 1.2 + 0.2, phase: rng() * Math.PI * 2, speed: 0.3 + rng() * 0.6, alpha: 0.15 + rng() * 0.35 });
  }
}

function generateMapThumbnails(){
  mapState.thumbnails = [];
  const size = 80;
  CARDS.forEach(function(data){
    const c = document.createElement('canvas');
    c.style.width = size + 'px'; c.style.height = size + 'px';
    c.width = size * 2; c.height = size * 2;
    const ctx = c.getContext('2d');
    ctx.setTransform(2, 0, 0, 2, 0, 0);
    const rng = mulberry32(data.seed);
    const bg = ctx.createLinearGradient(0, 0, 0, size);
    bg.addColorStop(0, '#050a18'); bg.addColorStop(0.5, '#0b1130'); bg.addColorStop(1, '#0a1025');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, size, size);
    const sc = Math.floor(size * size / 400);
    const colors = ['#ffe8c0','#a0c4ff','#ffc0d0','#d4a84b'];
    for(let i = 0; i < sc; i++){
      ctx.globalAlpha = 0.3 + rng() * 0.6;
      ctx.fillStyle = colors[Math.floor(rng() * colors.length)];
      ctx.beginPath(); ctx.arc(rng() * size, rng() * size, rng() * 1.2 + 0.2, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 0.15;
    const nebColors = ['rgba(80,40,120,','rgba(30,60,120,','rgba(100,30,80,'];
    for(let i = 0; i < 2; i++){
      const nc = nebColors[Math.floor(rng() * nebColors.length)];
      const nx = rng() * size, ny = rng() * size, nr = 15 + rng() * 25;
      const gr = ctx.createRadialGradient(nx, ny, 0, nx, ny, nr);
      gr.addColorStop(0, nc + '0.3)'); gr.addColorStop(1, nc + '0)');
      ctx.fillStyle = gr; ctx.beginPath(); ctx.arc(nx, ny, nr, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    const maskC = document.createElement('canvas');
    maskC.width = size * 2; maskC.height = size * 2;
    const mctx = maskC.getContext('2d');
    mctx.setTransform(2, 0, 0, 2, 0, 0);
    mctx.beginPath(); mctx.arc(size / 2, size / 2, size / 2 - 2, 0, Math.PI * 2); mctx.clip();
    mctx.drawImage(c, 0, 0, size, size);
    mapState.thumbnails.push(maskC);
  });
  mapState.thumbnailsReady = true;
}

function worldToScreen(wx, wy, canvasW, canvasH){
  return { sx: (wx - mapState.cx) * mapState.zoom + canvasW / 2, sy: (wy - mapState.cy) * mapState.zoom + canvasH / 2 };
}

function screenToWorld(sx, sy, canvasW, canvasH){
  return { wx: (sx - canvasW / 2) / mapState.zoom + mapState.cx, wy: (sy - canvasH / 2) / mapState.zoom + mapState.cy };
}

function drawStarMap(time){
  const canvas = document.getElementById('starmapCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.clientWidth; const H = canvas.clientHeight;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  if(canvas.width !== W * dpr || canvas.height !== H * dpr){ canvas.width = W * dpr; canvas.height = H * dpr; }
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const bgGrad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H));
  bgGrad.addColorStop(0, '#080e24'); bgGrad.addColorStop(1, '#030610');
  ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, W, H);
  const z = mapState.zoom;
  for(const s of mapState.bgStars){
    const { sx, sy } = worldToScreen(s.x, s.y, W, H);
    if(sx < -10 || sx > W + 10 || sy < -10 || sy > H + 10) continue;
    const twinkle = 0.5 + 0.5 * Math.sin(time * s.speed + s.phase);
    ctx.globalAlpha = s.alpha * twinkle; ctx.fillStyle = '#c8bfa0';
    ctx.beginPath(); ctx.arc(sx, sy, Math.max(0.3, s.r * z * 0.5), 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  for(const line of constellationLines){
    const a = mapNodes[line[0]], b = mapNodes[line[1]];
    const pa = worldToScreen(a.wx, a.wy, W, H); const pb = worldToScreen(b.wx, b.wy, W, H);
    const pulse = 0.3 + 0.15 * Math.sin(time * 0.5);
    ctx.strokeStyle = 'rgba(212,168,75,' + (pulse * 0.12) + ')'; ctx.lineWidth = 8 * z; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(pa.sx, pa.sy); ctx.lineTo(pb.sx, pb.sy); ctx.stroke();
    ctx.strokeStyle = 'rgba(212,168,75,' + (pulse * 0.25) + ')'; ctx.lineWidth = 3 * z;
    ctx.beginPath(); ctx.moveTo(pa.sx, pa.sy); ctx.lineTo(pb.sx, pb.sy); ctx.stroke();
    ctx.strokeStyle = 'rgba(212,168,75,' + (pulse * 0.5) + ')'; ctx.lineWidth = 1 * z;
    ctx.beginPath(); ctx.moveTo(pa.sx, pa.sy); ctx.lineTo(pb.sx, pb.sy); ctx.stroke();
  }
  const nodeRadius = 32;
  for(let i = 0; i < mapNodes.length; i++){
    const node = mapNodes[i];
    const { sx, sy } = worldToScreen(node.wx, node.wy, W, H);
    const r = nodeRadius * z;
    if(sx < -r * 3 || sx > W + r * 3 || sy < -r * 3 || sy > H + r * 3) continue;
    const pulse = 0.6 + 0.4 * Math.sin(time * 0.8 + i * 1.1);
    const glowR = r * 2.5;
    const glow = ctx.createRadialGradient(sx, sy, r * 0.5, sx, sy, glowR);
    glow.addColorStop(0, 'rgba(212,168,75,' + (0.15 * pulse) + ')');
    glow.addColorStop(0.5, 'rgba(212,168,75,' + (0.05 * pulse) + ')');
    glow.addColorStop(1, 'rgba(212,168,75,0)');
    ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(sx, sy, glowR, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(212,168,75,' + (0.4 * pulse) + ')'; ctx.lineWidth = 1.5 * z;
    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = 'rgba(8,14,36,0.85)'; ctx.beginPath(); ctx.arc(sx, sy, r - 1, 0, Math.PI * 2); ctx.fill();
    if(mapState.thumbnailsReady && mapState.thumbnails[i]){
      ctx.save(); ctx.beginPath(); ctx.arc(sx, sy, r - 2, 0, Math.PI * 2); ctx.clip();
      ctx.drawImage(mapState.thumbnails[i], sx - r, sy - r, r * 2, r * 2); ctx.restore();
    }
    ctx.fillStyle = 'rgba(200,191,160,' + (0.6 + 0.3 * pulse) + ')';
    ctx.font = (11 * z) + 'px "Hiragino Mincho ProN","Yu Mincho",serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText('第' + node.day + '日', sx, sy + r + 6 * z);
  }
  mapAnimId = requestAnimationFrame(function(ts){ drawStarMap(ts / 1000); });
}

function hitTestNode(sx, sy, canvasW, canvasH){
  const hitR = 32 * mapState.zoom + 10;
  for(let i = 0; i < mapNodes.length; i++){
    const { sx: nx, sy: ny } = worldToScreen(mapNodes[i].wx, mapNodes[i].wy, canvasW, canvasH);
    const dx = sx - nx, dy = sy - ny;
    if(dx * dx + dy * dy < hitR * hitR) return i;
  }
  return -1;
}

function initStarMap(){
  if(mapInitialized) return;
  mapInitialized = true;
  initMapBgStars(); generateMapThumbnails();
  const canvas = document.getElementById('starmapCanvas');
  mapState.cx = MAP_WIDTH / 2; mapState.cy = MAP_HEIGHT / 2;
  const W = canvas.clientWidth, H = canvas.clientHeight;
  const fitZoom = Math.min(W / (MAP_WIDTH * 1.2), H / (MAP_HEIGHT * 1.2));
  mapState.zoom = Math.max(0.4, fitZoom);
  canvas.addEventListener('mousedown', function(e){
    mapState.dragging = true; mapState.dragStartX = e.clientX; mapState.dragStartY = e.clientY;
    mapState.dragStartCx = mapState.cx; mapState.dragStartCy = mapState.cy;
    mapState.touchStart = { x: e.clientX, y: e.clientY, time: Date.now() };
  });
  window.addEventListener('mousemove', function(e){
    if(!mapState.dragging) return;
    mapState.cx = mapState.dragStartCx - (e.clientX - mapState.dragStartX) / mapState.zoom;
    mapState.cy = mapState.dragStartCy - (e.clientY - mapState.dragStartY) / mapState.zoom;
  });
  window.addEventListener('mouseup', function(e){
    if(mapState.dragging && mapState.touchStart){
      const dx = e.clientX - mapState.touchStart.x, dy = e.clientY - mapState.touchStart.y;
      if(Math.sqrt(dx*dx+dy*dy) < 10 && Date.now() - mapState.touchStart.time < 300){
        const rect = document.getElementById('starmapCanvas').getBoundingClientRect();
        const hit = hitTestNode(e.clientX - rect.left, e.clientY - rect.top, rect.width, rect.height);
        if(hit >= 0){ currentDay = hit; switchView('card'); }
      }
    }
    mapState.dragging = false; mapState.touchStart = null;
  });
  canvas.addEventListener('wheel', function(e){
    e.preventDefault();
    const rect = canvas.getBoundingClientRect(); const mx = e.clientX - rect.left; const my = e.clientY - rect.top;
    const before = screenToWorld(mx, my, rect.width, rect.height);
    mapState.zoom = Math.max(0.3, Math.min(3, mapState.zoom * (e.deltaY < 0 ? 1.1 : 0.9)));
    const after = screenToWorld(mx, my, rect.width, rect.height);
    mapState.cx += before.wx - after.wx; mapState.cy += before.wy - after.wy;
  }, { passive: false });
  let touches = [];
  canvas.addEventListener('touchstart', function(e){
    e.preventDefault(); touches = Array.from(e.touches);
    if(touches.length === 1){
      mapState.dragging = true; mapState.dragStartX = touches[0].clientX; mapState.dragStartY = touches[0].clientY;
      mapState.dragStartCx = mapState.cx; mapState.dragStartCy = mapState.cy;
      mapState.touchStart = { x: touches[0].clientX, y: touches[0].clientY, time: Date.now() };
    } else if(touches.length === 2){
      mapState.dragging = false;
      const dx = touches[0].clientX - touches[1].clientX, dy = touches[0].clientY - touches[1].clientY;
      mapState.pinchStartDist = Math.sqrt(dx*dx+dy*dy); mapState.pinchStartZoom = mapState.zoom;
      mapState.dragStartCx = mapState.cx; mapState.dragStartCy = mapState.cy;
      mapState.pinchStartCx = (touches[0].clientX + touches[1].clientX) / 2;
      mapState.pinchStartCy = (touches[0].clientY + touches[1].clientY) / 2;
    }
  }, { passive: false });
  canvas.addEventListener('touchmove', function(e){
    e.preventDefault(); touches = Array.from(e.touches);
    if(touches.length === 1 && mapState.dragging){
      mapState.cx = mapState.dragStartCx - (touches[0].clientX - mapState.dragStartX) / mapState.zoom;
      mapState.cy = mapState.dragStartCy - (touches[0].clientY - mapState.dragStartY) / mapState.zoom;
    } else if(touches.length === 2){
      const dx = touches[0].clientX - touches[1].clientX, dy = touches[0].clientY - touches[1].clientY;
      mapState.zoom = Math.max(0.3, Math.min(3, mapState.pinchStartZoom * Math.sqrt(dx*dx+dy*dy) / Math.max(1, mapState.pinchStartDist)));
      const midX = (touches[0].clientX + touches[1].clientX) / 2, midY = (touches[0].clientY + touches[1].clientY) / 2;
      mapState.cx = mapState.dragStartCx - (midX - mapState.pinchStartCx) / mapState.zoom;
      mapState.cy = mapState.dragStartCy - (midY - mapState.pinchStartCy) / mapState.zoom;
    }
  }, { passive: false });
  canvas.addEventListener('touchend', function(e){
    if(touches.length === 1 && mapState.touchStart){
      const dx = touches[0].clientX - mapState.touchStart.x, dy = touches[0].clientY - mapState.touchStart.y;
      if(Math.sqrt(dx*dx+dy*dy) < 15 && Date.now() - mapState.touchStart.time < 400){
        const rect = canvas.getBoundingClientRect();
        const hit = hitTestNode(touches[0].clientX - rect.left, touches[0].clientY - rect.top, rect.width, rect.height);
        if(hit >= 0){ currentDay = hit; switchView('card'); }
      }
    }
    touches = Array.from(e.touches); mapState.dragging = false; mapState.touchStart = null;
  }, { passive: false });
}

function startMapAnimation(){ if(mapAnimId) return; mapAnimId = requestAnimationFrame(function(ts){ drawStarMap(ts / 1000); }); }
function stopMapAnimation(){ if(mapAnimId){ cancelAnimationFrame(mapAnimId); mapAnimId = null; } }

function showCard(idx){
  cardElements.forEach(function(c, i){
    if(i === idx){
      c.el.classList.remove("hidden-card"); c.el.style.display = "";
      if(!c.animId) c.animId = renderArt(c.canvas, CARDS[idx].seed, true);
    } else {
      c.el.classList.add("hidden-card");
      if(c.animId){ cancelAnimationFrame(c.animId); c.animId = null; }
    }
  });
  document.getElementById("dayNum").textContent = CARDS[idx].day;
  document.getElementById("dayNumRoman").textContent = ROMAN[CARDS[idx].day] || CARDS[idx].day;
  document.getElementById("prevBtn").disabled = idx === 0;
  document.getElementById("nextBtn").disabled = idx === CARDS.length - 1;
}

window.navigateCard = function(dir){
  var next = currentDay + dir;
  if(next < 0 || next >= CARDS.length) return;
  cardElements[currentDay].el.classList.remove("flipped");

  showCard(currentDay);

var touchStartX = 0, touchStartY = 0;

container.addEventListener("touchend", function(e){

/* Compute wave delay for grid position — diagonal wave from top-left */
function getWaveDelay(index, total){
  /* For 7 cards in a 4-col grid: row 0 = [0,1,2,3], row 1 = [4,5,6] */
  var cols = 4;
  var row = Math.floor(index / cols);
  var col = index % cols;
  /* Diagonal distance from top-left corner */
  var diag = row + col;
  /* Max diagonal for staggering */
  var maxDiag = Math.ceil(total / cols) + cols - 2;
  var delay = (diag / maxDiag) * 1200; /* 0 to 1200ms stagger */
  return delay;
}

/* Get plain text from story HTML */
function getPlainStory(html){
  var tmp = document.createElement('div'); tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || '';
}

/* Render ambient stars on the story background */
var storyAmbientStars = [];
function initStoryAmbient(){
  var rng = mulberry32(7777);
  storyAmbientStars = [];
  for(var i = 0; i < 200; i++){
    storyAmbientStars.push({
      x: rng() * window.innerWidth,
      y: rng() * window.innerHeight * 5, /* cover full scroll height approx */
      r: rng() * 1 + 0.2,
      phase: rng() * Math.PI * 2,
      speed: 0.2 + rng() * 0.5,
      alpha: 0.05 + rng() * 0.15,
    });
  }
}

function drawStoryAmbient(time){
  var canvas = document.getElementById('storyAmbientCanvas');
  if(!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = window.innerWidth;
  var H = window.innerHeight;
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  if(canvas.width !== W * dpr || canvas.height !== H * dpr){
    canvas.width = W * dpr; canvas.height = H * dpr;
  }
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);

  /* Get scroll offset to move stars slightly for parallax */
  var scrollEl = document.getElementById('storyScroll');
  var scrollY = scrollEl ? scrollEl.scrollTop : 0;
  var parallax = scrollY * 0.02;

  for(var i = 0; i < storyAmbientStars.length; i++){
    var s = storyAmbientStars[i];
    var sy = ((s.y - parallax) % (H * 2) + H * 2) % (H * 2) - H * 0.2;
    var twinkle = 0.5 + 0.5 * Math.sin(time * s.speed + s.phase);
    ctx.globalAlpha = s.alpha * twinkle;
    ctx.fillStyle = '#c8bfa0';
    ctx.beginPath(); ctx.arc(s.x, sy, s.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  if(storyModeActive){
    storyAnimId = requestAnimationFrame(function(ts){ drawStoryAmbient(ts / 1000); });
  }
}

/* Wave overlay stars */
function drawWaveStars(time){
  var canvas = document.getElementById('waveStarsCanvas');
  if(!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.clientWidth, H = canvas.clientHeight;
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  if(canvas.width !== W * dpr || canvas.height !== H * dpr){
    canvas.width = W * dpr; canvas.height = H * dpr;
  }
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);

  var rng = mulberry32(1234);
  for(var i = 0; i < 150; i++){
    var x = rng() * W, y = rng() * H;
    var r = rng() * 0.8 + 0.2;
    var phase = rng() * Math.PI * 2;
    var speed = 0.3 + rng() * 0.5;
    var twinkle = 0.3 + 0.7 * Math.sin(time * speed + phase);
    ctx.globalAlpha = 0.1 + 0.15 * twinkle;
    ctx.fillStyle = '#c8bfa0';
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

var waveAnimId = null;
function startWaveAnim(){
  function loop(ts){ drawWaveStars(ts / 1000); waveAnimId = requestAnimationFrame(loop); }
  waveAnimId = requestAnimationFrame(loop);
}
function stopWaveAnim(){ if(waveAnimId){ cancelAnimationFrame(waveAnimId); waveAnimId = null; } }

/* Build story scroll content */
function buildStoryContent(){
  var scroll = document.getElementById('storyScroll');
  scroll.innerHTML = '';

  /* Header */
  var header = document.createElement('div');
  header.className = 'story-header';
  header.innerHTML = '<h1>三 六 五 日 の 星 図</h1><div class="subtitle">— 物語 —</div>';
  scroll.appendChild(header);

  /* First separator */
  scroll.appendChild(createSeparator());

  /* Story fragments */
  CARDS.forEach(function(data, idx){
    var frag = document.createElement('div');
    frag.className = 'story-fragment';
    frag.dataset.index = idx;

    var dayLabel = document.createElement('div');
    dayLabel.className = 'frag-day';
    dayLabel.innerHTML = '第 <span>' + data.day + '</span> 日 — Day <span>' + (ROMAN[data.day] || data.day) + '</span>';
    frag.appendChild(dayLabel);

    /* Art thumbnail */
    var artWrap = document.createElement('div');
    artWrap.className = 'frag-art';
    var artCanvas = document.createElement('canvas');
    artCanvas.style.width = '100%';
    artCanvas.style.height = '100%';
    artWrap.appendChild(artCanvas);
    frag.appendChild(artWrap);

    /* Poem */
    var poem = document.createElement('div');
    poem.className = 'frag-poem';
    poem.innerHTML = data.story.replace(/\n/g, '<br>');
    frag.appendChild(poem);

    scroll.appendChild(frag);

    /* Render static art */
    requestAnimationFrame(function(){
      artCanvas.style.width = artCanvas.clientWidth + 'px';
      artCanvas.style.height = artCanvas.clientHeight + 'px';
      renderArt(artCanvas, data.seed, false);
    });

    /* Separator between fragments (not after last) */
    if(idx < CARDS.length - 1){
      scroll.appendChild(createSeparator());
    }
  });

  /* Footer */
  var footer = document.createElement('div');
  footer.className = 'story-footer';
  footer.innerHTML = '<div class="footer-star">✦ ✦ ✦</div><div class="footer-text">365日の星図 — 三六五日の星図</div>';
  scroll.appendChild(footer);

  storyBuilt = true;

  /* Setup intersection observer for fade-in */
  setupStoryObserver();
}

function createSeparator(){
  var sep = document.createElement('div');
  sep.className = 'story-separator';
  sep.innerHTML = '<div class="sep-line"></div><div class="sep-star">✦</div><div class="sep-line"></div>';
  return sep;
}

function setupStoryObserver(){
  var frags = document.querySelectorAll('.story-fragment');
  if(!('IntersectionObserver' in window)){
    /* Fallback: show all */
    frags.forEach(function(f){ f.classList.add('visible'); });
    return;
  }
  var observer = new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if(entry.isIntersecting){
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.15, rootMargin: '0px 0px -50px 0px' });
  frags.forEach(function(f){ observer.observe(f); });
}

/* Enter story mode — the main entry point */
window.enterStoryMode = function(){
  if(storyModeActive) return;

  /* Show wave overlay */
  var overlay = document.getElementById('storyWaveOverlay');
  var waveGrid = document.getElementById('waveGrid');
  waveGrid.innerHTML = '';

  /* Build wave cards */
  CARDS.forEach(function(data, idx){
    var waveCard = document.createElement('div');
    waveCard.className = 'wave-card';

    var inner = document.createElement('div');
    inner.className = 'wave-card-inner';
    inner.id = 'waveCardInner' + idx;

    /* Front — mini art */
    var front = document.createElement('div');
    front.className = 'wave-card-front';
    var fCanvas = document.createElement('canvas');
    fCanvas.style.width = '100%';
    fCanvas.style.height = '100%';
    front.appendChild(fCanvas);

    /* Back — day number + story hint */
    var back = document.createElement('div');
    back.className = 'wave-card-back';
    var plainStory = getPlainStory(data.story).substring(0, 40);
    back.innerHTML = '<div><div class="mini-day">第' + data.day + '日</div><div class="mini-text">' + plainStory + '…</div></div>';

    inner.appendChild(front);
    inner.appendChild(back);
    waveCard.appendChild(inner);
    waveGrid.appendChild(waveCard);

    /* Render mini art on front */
    requestAnimationFrame(function(){
      fCanvas.style.width = fCanvas.clientWidth + 'px';
      fCanvas.style.height = fCanvas.clientHeight + 'px';
      renderArt(fCanvas, data.seed, false);
    });
  });

  /* Show overlay */
  overlay.classList.add('active');
  startWaveAnim();

  /* Staggered wave flip */
  CARDS.forEach(function(data, idx){
    var delay = getWaveDelay(idx, CARDS.length);
    setTimeout(function(){
      var inner = document.getElementById('waveCardInner' + idx);
      if(inner) inner.classList.add('flipped');
    }, 400 + delay);
  });

  /* After all flips + pause, transition to story scroll */
  var totalDelay = 400 + 1200 + 800; /* initial wait + max stagger + flip animation time */
  setTimeout(function(){
    stopWaveAnim();
    overlay.classList.remove('active');

    /* Switch to story view */
    currentView = 'story';
    storyModeActive = true;

    /* Hide all other views */
    document.getElementById('cardView').classList.add('hidden');
    document.getElementById('gridView').classList.add('hidden');
    document.getElementById('starmapView').classList.add('hidden');

    /* Stop other animations */
    stopMapAnimation();
    cardElements.forEach(function(c){ if(c.animId){ cancelAnimationFrame(c.animId); c.animId = null; } });

    /* Update nav */
    document.getElementById('navCard').classList.remove('active');
    document.getElementById('navGrid').classList.remove('active');
    document.getElementById('navMap').classList.remove('active');
    document.getElementById('navStory').classList.add('active');

    /* Show story view */
    document.getElementById('storyView').classList.remove('hidden');

    /* Build content if needed */
    if(!storyBuilt) buildStoryContent();

    /* Init ambient stars */
    initStoryAmbient();
    storyAnimId = requestAnimationFrame(function(ts){ drawStoryAmbient(ts / 1000); });

    /* Scroll to top */
    document.getElementById('storyScroll').scrollTop = 0;
  }, totalDelay);
};


/* ═══════════════════════════════════════════
   ── VIEW SWITCHING ──
   ═══════════════════════════════════════════ */

window.switchView = function(view){
  if(view === currentView) return;

  /* If leaving story mode */
  if(storyModeActive){
    storyModeActive = false;
    if(storyAnimId){ cancelAnimationFrame(storyAnimId); storyAnimId = null; }
  }

  currentView = view;

  var cardView = document.getElementById("cardView");
  var gridView = document.getElementById("gridView");
  var mapView = document.getElementById("starmapView");
  var storyView = document.getElementById("storyView");
  var navCard = document.getElementById("navCard");
  var navGrid = document.getElementById("navGrid");
  var navMap = document.getElementById("navMap");
  var navStory = document.getElementById("navStory");

  if(view !== 'map') stopMapAnimation();
  if(view !== 'card'){
    cardElements.forEach(function(c){ if(c.animId){ cancelAnimationFrame(c.animId); c.animId = null; } });
  }

  cardView.classList.add("hidden");
  gridView.classList.add("hidden");
  mapView.classList.add("hidden");
  storyView.classList.add("hidden");
  navCard.classList.remove("active");
  navGrid.classList.remove("active");
  navMap.classList.remove("active");
  navStory.classList.remove("active");

  if(view === 'card'){
    cardView.classList.remove("hidden"); navCard.classList.add("active"); showCard(currentDay);
  } else if(view === 'grid'){
    gridView.classList.remove("hidden"); navGrid.classList.add("active"); buildGrid();
  } else if(view === 'map'){
    mapView.classList.remove("hidden"); navMap.classList.add("active");
    if(!mapInitialized) initStarMap(); startMapAnimation();
  } else if(view === 'story'){
    /* Direct story mode entry via nav (not wave animation) */
    storyModeActive = true;
    storyView.classList.remove("hidden"); navStory.classList.add("active");
    if(!storyBuilt) buildStoryContent();
    initStoryAmbient();
    storyAnimId = requestAnimationFrame(function(ts){ drawStoryAmbient(ts / 1000); });
    document.getElementById('storyScroll').scrollTop = 0;
  }
};


/* ── Keyboard ── */
document.addEventListener("keydown", function(e){
  if(currentView !== 'card') return;
  if(e.key === 'ArrowLeft') navigateCard(-1);
  if(e.key === 'ArrowRight') navigateCard(1);
});

/* ── Init ── */
buildCards();

})();
</script>
