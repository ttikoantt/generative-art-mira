<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethereal Geometry Symphony - by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        canvas {
            display: block;
        }
        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">Ethereal Geometry Symphony | Move mouse to interact</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let mouseX = width / 2;
        let mouseY = height / 2;
        let time = 0;

        // Geometry layers
        class GeometryLayer {
            constructor(radius, sides, rotationSpeed, colorBase) {
                this.radius = radius;
                this.sides = sides;
                this.rotationSpeed = rotationSpeed;
                this.colorBase = colorBase;
                this.rotation = 0;
                this.pulsePhase = Math.random() * Math.PI * 2;
            }

            update() {
                this.rotation += this.rotationSpeed;
                this.pulsePhase += 0.02;
            }

            draw(ctx, centerX, centerY, influence) {
                const pulseRadius = this.radius + Math.sin(this.pulsePhase) * 20;
                const influencedRadius = pulseRadius + influence * 50;

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(this.rotation);

                ctx.beginPath();
                for (let i = 0; i <= this.sides; i++) {
                    const angle = (i / this.sides) * Math.PI * 2;
                    const x = Math.cos(angle) * influencedRadius;
                    const y = Math.sin(angle) * influencedRadius;
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.closePath();

                const hue = (this.colorBase + Math.sin(this.pulsePhase) * 30) % 360;
                ctx.strokeStyle = `hsla(${hue}, 70%, 60%, ${0.3 + influence * 0.4})`;
                ctx.lineWidth = 2;
                ctx.stroke();

                // Inner glow
                ctx.shadowColor = `hsla(${hue}, 80%, 50%, 0.5)`;
                ctx.shadowBlur = 15 + influence * 10;
                ctx.stroke();
                ctx.shadowBlur = 0;

                ctx.restore();
            }
        }

        // Particle system
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.hue = Math.random() * 60 + 180;
                this.life = 1;
                this.decay = Math.random() * 0.005 + 0.002;
            }

            update(mouseInfluence) {
                this.x += this.speedX + mouseInfluence.x * 2;
                this.y += this.speedY + mouseInfluence.y * 2;
                this.life -= this.decay;

                if (this.life <= 0 || 
                    this.x < 0 || this.x > width || 
                    this.y < 0 || this.y > height) {
                    this.reset();
                }
            }

            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 70%, ${this.life * 0.6})`;
                ctx.fill();
            }
        }

        // Connection lines
        class ConnectionLine {
            constructor() {
                this.angle = Math.random() * Math.PI * 2;
                this.length = Math.random() * 100 + 50;
                this.speed = (Math.random() - 0.5) * 0.02;
                this.hue = Math.random() * 60 + 200;
            }

            update(centerX, centerY) {
                this.angle += this.speed;
                this.length = 100 + Math.sin(time * 0.001) * 50;
            }

            draw(ctx, centerX, centerY) {
                const endX = centerX + Math.cos(this.angle) * this.length;
                const endY = centerY + Math.sin(this.angle) * this.length;

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = `hsla(${this.hue}, 70%, 60%, 0.2)`;
                ctx.lineWidth = 1;
                ctx.stroke();

                // Particle at end
                ctx.beginPath();
                ctx.arc(endX, endY, 2, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 70%, 0.6)`;
                ctx.fill();
            }
        }

        // Initialize
        const geometryLayers = [
            new GeometryLayer(80, 6, 0.005, 0),
            new GeometryLayer(120, 8, -0.003, 60),
            new GeometryLayer(160, 10, 0.004, 120),
            new GeometryLayer(200, 12, -0.002, 180),
            new GeometryLayer(240, 16, 0.003, 240),
            new GeometryLayer(280, 20, -0.001, 300),
        ];

        const particles = Array.from({ length: 150 }, () => new Particle());
        const connectionLines = Array.from({ length: 30 }, () => new ConnectionLine());

        // Mouse interaction
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        // Animation loop
        function animate() {
            time++;

            // Clear with trail effect
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // Calculate mouse influence
            const dx = (mouseX - width / 2) / (width / 2);
            const dy = (mouseY - height / 2) / (height / 2);
            const distance = Math.sqrt(dx * dx + dy * dy);
            const influence = Math.min(distance, 1);

            // Draw connection lines
            connectionLines.forEach(line => {
                line.update(width / 2, height / 2);
                line.draw(ctx, width / 2, height / 2);
            });

            // Draw geometry layers
            geometryLayers.forEach(layer => {
                layer.update();
                layer.draw(ctx, width / 2, height / 2, influence);
            });

            // Draw particles
            particles.forEach(particle => {
                particle.update({ x: dx * 0.5, y: dy * 0.5 });
                particle.draw(ctx);
            });

            // Central glow
            const gradient = ctx.createRadialGradient(
                width / 2, height / 2, 0,
                width / 2, height / 2, 300 + influence * 100
            );
            gradient.addColorStop(0, `hsla(${(time * 0.5) % 360}, 80%, 60%, 0.1)`);
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            requestAnimationFrame(animate);
        }

        // Handle resize
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        animate();
    </script>
</body>
</html>
