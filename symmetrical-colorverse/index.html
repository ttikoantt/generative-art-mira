<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シンメトリカル・カラーバース</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        #canvas {
            display: block;
            cursor: crosshair;
        }

        .ui {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .ui h1 {
            font-size: 18px;
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .ui p {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .ui button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 10px;
            transition: transform 0.2s;
        }

        .ui button:hover {
            transform: scale(1.05);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            z-index: 100;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="ui">
        <h1>シンメトリカル・カラーバース</h1>
        <p>ドラッグで対称パターンを描画</p>
        <p>クリックで新しいパレット</p>
        <button id="clear">クリア</button>
    </div>

    <button class="fullscreen-btn" id="fullscreen">⛶</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        let isDrawing = false;
        let lastX = 0, lastY = 0;
        let hue = 0;
        let symmetry = 12;
        let particles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        function generatePalette() {
            hue = Math.random() * 360;
        }

        function drawSymmetric(x, y, lastX, lastY, hue) {
            const angleStep = (Math.PI * 2) / symmetry;

            for (let i = 0; i < symmetry; i++) {
                const angle = angleStep * i;

                // 座標を回転
                const cos = Math.cos(angle);
                const sin = Math.sin(angle);

                const rotatedLastX = lastX * cos - lastY * sin;
                const rotatedLastY = lastX * sin + lastY * cos;
                const rotatedX = x * cos - y * sin;
                const rotatedY = x * sin + y * cos;

                // 線を描画
                ctx.beginPath();
                ctx.moveTo(centerX + rotatedLastX, centerY + rotatedLastY);
                ctx.lineTo(centerX + rotatedX, centerY + rotatedY);
                ctx.strokeStyle = `hsl(${(hue + i * 30) % 360}, 100%, 60%)`;
                ctx.lineWidth = 2 + Math.sin(i * 0.5) * 1;
                ctx.lineCap = 'round';
                ctx.stroke();

                // 鏡像パターン
                ctx.beginPath();
                ctx.moveTo(centerX - rotatedLastX, centerY - rotatedLastY);
                ctx.lineTo(centerX - rotatedX, centerY - rotatedY);
                ctx.strokeStyle = `hsl(${(hue + i * 30 + 180) % 360}, 100%, 60%)`;
                ctx.lineWidth = 2 + Math.sin(i * 0.5) * 1;
                ctx.lineCap = 'round';
                ctx.stroke();

                // パーティクルを追加
                if (Math.random() < 0.3) {
                    particles.push({
                        x: centerX + rotatedX,
                        y: centerY + rotatedY,
                        vx: (Math.random() - 0.5) * 2,
                        vy: (Math.random() - 0.5) * 2,
                        hue: (hue + i * 30) % 360,
                        life: 1
                    });
                }
            }
        }

        function animate() {
            // 背景をフェード
            ctx.fillStyle = 'rgba(0, 0, 0, 0.02)';
            ctx.fillRect(0, 0, width, height);

            // パーティクルを更新
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;

                ctx.beginPath();
                ctx.arc(p.x, p.y, 2 * p.life, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${p.hue}, 100%, 60%, ${p.life})`;
                ctx.fill();

                return p.life > 0;
            });

            requestAnimationFrame(animate);
        }

        // イベントハンドラー
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            lastX = e.clientX - centerX;
            lastY = e.clientY - centerY;
            hue = Math.random() * 360;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;

            const x = e.clientX - centerX;
            const y = e.clientY - centerY;

            drawSymmetric(x, y, lastX, lastY, hue);

            lastX = x;
            lastY = y;
            hue += 0.5;
        });

        canvas.addEventListener('mouseup', () => {
            isDrawing = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isDrawing = false;
        });

        canvas.addEventListener('click', () => {
            generatePalette();
        });

        // タッチイベント
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            isDrawing = true;
            lastX = touch.clientX - centerX;
            lastY = touch.clientY - centerY;
            hue = Math.random() * 360;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isDrawing) return;

            const touch = e.touches[0];
            const x = touch.clientX - centerX;
            const y = touch.clientY - centerY;

            drawSymmetric(x, y, lastX, lastY, hue);

            lastX = x;
            lastY = y;
            hue += 0.5;
        });

        canvas.addEventListener('touchend', () => {
            isDrawing = false;
        });

        document.getElementById('clear').addEventListener('click', () => {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
        });

        document.getElementById('fullscreen').addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // 初期化
        window.addEventListener('resize', resize);
        resize();
        generatePalette();
        animate();
    </script>
</body>
</html>
