<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Ball Interaction | Interactive Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
        }
        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #888;
            font-size: 12px;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .title {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #4a9eff;
            font-size: 14px;
            text-align: right;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(74, 158, 255, 0.5);
        }
        .fullscreen-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(74, 158, 255, 0.2);
            border: 1px solid rgba(74, 158, 255, 0.5);
            color: #4a9eff;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            transition: all 0.3s ease;
        }
        .fullscreen-btn:hover {
            background: rgba(74, 158, 255, 0.4);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">Click to create particle balls</div>
    <div class="title">Particle Ball Interaction<br>Move mouse to interact</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let mouse = { x: width / 2, y: height / 2 };
        let balls = [];

        // Ball class
        class Ball {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.baseX = x;
                this.baseY = y;
                this.radius = Math.random() * 30 + 20;
                this.baseRadius = this.radius;
                this.hue = Math.random() * 60 + 180; // Blue to cyan range
                this.particles = [];
                this.angle = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                this.pulseSpeed = Math.random() * 0.02 + 0.01;
                this.pulseOffset = Math.random() * Math.PI * 2;
                this.time = 0;

                // Create particles around the ball
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    this.particles.push({
                        angle: angle,
                        distance: this.radius * 1.5,
                        size: Math.random() * 3 + 1,
                        speed: Math.random() * 0.02 + 0.01,
                        hue: this.hue + Math.random() * 30 - 15
                    });
                }
            }

            update() {
                this.time += 0.016;

                // Pulse effect
                this.radius = this.baseRadius + Math.sin(this.time * this.pulseSpeed * 60 + this.pulseOffset) * 5;

                // Attraction to mouse
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 300) {
                    const force = (300 - dist) / 300;
                    this.x += dx * force * 0.02;
                    this.y += dy * force * 0.02;
                }

                // Return to base position slowly
                this.x += (this.baseX - this.x) * 0.01;
                this.y += (this.baseY - this.y) * 0.01;

                // Update particles
                this.particles.forEach(p => {
                    p.angle += p.speed;
                    p.distance = this.radius * 1.5 + Math.sin(this.time * 2 + p.angle) * 10;
                });

                // Rotation
                this.angle += this.rotationSpeed;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                // Draw glow
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius * 2);
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 60%, 0.3)`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 80%, 50%, 0.1)`);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius * 2, 0, Math.PI * 2);
                ctx.fill();

                // Draw main ball
                ctx.rotate(this.angle);
                const ballGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius);
                ballGradient.addColorStop(0, `hsla(${this.hue}, 80%, 70%, 0.8)`);
                ballGradient.addColorStop(0.7, `hsla(${this.hue}, 80%, 50%, 0.5)`);
                ballGradient.addColorStop(1, `hsla(${this.hue}, 80%, 40%, 0.2)`);
                ctx.fillStyle = ballGradient;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // Draw orbiting particles
                this.particles.forEach(p => {
                    const px = Math.cos(p.angle) * p.distance;
                    const py = Math.sin(p.angle) * p.distance;

                    ctx.fillStyle = `hsla(${p.hue}, 80%, 60%, 0.8)`;
                    ctx.beginPath();
                    ctx.arc(px, py, p.size, 0, Math.PI * 2);
                    ctx.fill();

                    // Draw trail
                    ctx.strokeStyle = `hsla(${p.hue}, 80%, 50%, 0.3)`;
                    ctx.lineWidth = p.size * 0.5;
                    ctx.beginPath();
                    ctx.arc(0, 0, p.distance, p.angle - 0.3, p.angle + 0.1);
                    ctx.stroke();
                });

                ctx.restore();
            }
        }

        // Create initial balls
        function createInitialBalls() {
            const cols = 4;
            const rows = 3;
            const spacingX = width / (cols + 1);
            const spacingY = height / (rows + 1);

            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const x = spacingX * (i + 1);
                    const y = spacingY * (j + 1);
                    balls.push(new Ball(x, y));
                }
            }
        }

        createInitialBalls();

        // Mouse move
        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        // Touch move
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        // Click to add ball
        canvas.addEventListener('click', (e) => {
            if (balls.length < 20) {
                balls.push(new Ball(e.clientX, e.clientY));
            }
        });

        // Resize
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // Fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Animation loop
        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            balls.forEach(ball => {
                ball.update();
                ball.draw();
            });

            // Draw connections between nearby balls
            ctx.strokeStyle = 'rgba(74, 158, 255, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    const dx = balls[i].x - balls[j].x;
                    const dy = balls[i].y - balls[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 200) {
                        ctx.beginPath();
                        ctx.moveTo(balls[i].x, balls[i].y);
                        ctx.lineTo(balls[j].x, balls[j].y);
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
