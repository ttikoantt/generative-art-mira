<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>桜吹雪 - Cherry Blossom Fall</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 182, 193, 0.8);
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
        }

        .fullscreen-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 182, 193, 0.2);
            border: 1px solid rgba(255, 182, 193, 0.5);
            color: rgba(255, 182, 193, 0.8);
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 10;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 182, 193, 0.4);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">🌸 桜吹雪 - Sakura Fall</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        // 桜の花びらクラス
        class SakuraPetal {
            constructor() {
                this.reset();
                this.y = Math.random() * height; // 初期位置をランダムに
            }

            reset() {
                this.x = Math.random() * width;
                this.y = -20;
                this.size = Math.random() * 8 + 5;
                this.speedX = Math.random() * 1.5 - 0.75;
                this.speedY = Math.random() * 1.5 + 0.5;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = Math.random() * 0.05 - 0.025;
                this.opacity = Math.random() * 0.3 + 0.5;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = Math.random() * 0.03 + 0.01;
                this.wobbleAmplitude = Math.random() * 30 + 20;

                // 桜の色のバリエーション
                const colors = [
                    { r: 255, g: 182, b: 193 }, // ピンク
                    { r: 255, g: 192, b: 203 }, // 薄いピンク
                    { r: 255, g: 209, b: 220 }, // もっと薄いピンク
                    { r: 255, g: 240, b: 245 }, // 白っぽいピンク
                ];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.wobble += this.wobbleSpeed;
                this.x += this.speedX + Math.sin(this.wobble) * 0.5;
                this.y += this.speedY + Math.cos(this.wobble * 0.7) * 0.3;
                this.rotation += this.rotationSpeed;

                // 画面外に出たらリセット
                if (this.y > height + 20 || this.x < -50 || this.x > width + 50) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.opacity;

                // 花びらの形を描画
                ctx.beginPath();
                ctx.moveTo(0, -this.size / 2);
                ctx.bezierCurveTo(
                    this.size, -this.size / 3,
                    this.size, this.size / 3,
                    0, this.size / 2
                );
                ctx.bezierCurveTo(
                    -this.size, this.size / 3,
                    -this.size, -this.size / 3,
                    0, -this.size / 2
                );

                ctx.fillStyle = `rgb(${this.color.r}, ${this.color.g}, ${this.color.b})`;
                ctx.fill();

                // 花びらの中心線
                ctx.beginPath();
                ctx.moveTo(0, -this.size / 2);
                ctx.lineTo(0, this.size / 2);
                ctx.strokeStyle = `rgba(${this.color.r * 0.8}, ${this.color.g * 0.8}, ${this.color.b * 0.8}, 0.3)`;
                ctx.lineWidth = 0.5;
                ctx.stroke();

                ctx.restore();
            }
        }

        // 花びらを作成
        const petalCount = 150;
        const petals = [];

        for (let i = 0; i < petalCount; i++) {
            petals.push(new SakuraPetal());
        }

        // 背景の木々（シルエット）
        function drawBackground() {
            // グラデーション背景
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(0.5, '#16213e');
            gradient.addColorStop(1, '#1f1f3a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // 月
            const moonGradient = ctx.createRadialGradient(
                width * 0.8, height * 0.15, 0,
                width * 0.8, height * 0.15, 40
            );
            moonGradient.addColorStop(0, 'rgba(255, 240, 245, 0.9)');
            moonGradient.addColorStop(0.5, 'rgba(255, 240, 245, 0.3)');
            moonGradient.addColorStop(1, 'rgba(255, 240, 245, 0)');
            ctx.fillStyle = moonGradient;
            ctx.fillRect(width * 0.75, height * 0.1, 80, 80);

            // 遠くの桜の木のシルエット
            ctx.fillStyle = 'rgba(20, 20, 40, 0.8)';

            // 左の木
            drawTree(width * 0.1, height * 0.7, 80, 0);
            // 右の木
            drawTree(width * 0.85, height * 0.75, 70, 0);
            // 中央左の小さい木
            drawTree(width * 0.3, height * 0.85, 50, 0);
            // 中央右の小さい木
            drawTree(width * 0.6, height * 0.82, 55, 0);
        }

        function drawTree(x, y, size, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);

            // 幹
            ctx.beginPath();
            ctx.moveTo(-size * 0.1, 0);
            ctx.quadraticCurveTo(-size * 0.05, -size * 0.5, 0, -size);
            ctx.quadraticCurveTo(size * 0.05, -size * 0.5, size * 0.1, 0);
            ctx.fill();

            // 枝
            for (let i = 0; i < 5; i++) {
                const branchAngle = (i - 2) * 0.3;
                const branchSize = size * (0.3 + Math.random() * 0.2);
                ctx.save();
                ctx.rotate(branchAngle);
                ctx.translate(0, -size * 0.3);
                ctx.beginPath();
                ctx.moveTo(-branchSize * 0.05, 0);
                ctx.lineTo(0, -branchSize);
                ctx.lineTo(branchSize * 0.05, 0);
                ctx.fill();
                ctx.restore();
            }

            // 花の塊（ピンクの雲）
            ctx.globalAlpha = 0.15;
            ctx.fillStyle = 'rgba(255, 182, 193, 1)';

            for (let i = 0; i < 15; i++) {
                const flowerX = (Math.random() - 0.5) * size * 1.5;
                const flowerY = -size * 0.5 - Math.random() * size * 0.8;
                const flowerSize = 10 + Math.random() * 20;

                ctx.beginPath();
                ctx.arc(flowerX, flowerY, flowerSize, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.restore();
        }

        // アニメーションループ
        function animate() {
            drawBackground();

            // 花びらを更新・描画
            petals.forEach(petal => {
                petal.update();
                petal.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('全画面エラー:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // タッチ・クリックで新しい花びらを追加
        canvas.addEventListener('click', (e) => {
            for (let i = 0; i < 10; i++) {
                const petal = new SakuraPetal();
                petal.x = e.clientX;
                petal.y = e.clientY;
                petals.push(petal);
            }

            // 配列が大きくなりすぎたら古いのを削除
            if (petals.length > 200) {
                petals.splice(0, 10);
            }
        });

        // タッチ対応
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            for (let i = 0; i < 10; i++) {
                const petal = new SakuraPetal();
                petal.x = touch.clientX;
                petal.y = touch.clientY;
                petals.push(petal);
            }

            if (petals.length > 200) {
                petals.splice(0, 10);
            }
        }, { passive: false });
    </script>
</body>
</html>
