<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Fractal Tree - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        h1 {
            color: #fff;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(138, 43, 226, 0.8);
        }

        .subtitle {
            color: #a0a0c0;
            font-size: clamp(0.8rem, 2vw, 1rem);
            margin-bottom: 20px;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(138, 43, 226, 0.3);
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: radial-gradient(ellipse at center, #1a1a3a 0%, #0a0a1a 100%);
            cursor: move;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #a0a0c0;
            font-size: clamp(0.75rem, 2vw, 0.9rem);
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 120px;
            height: 6px;
            background: rgba(138, 43, 226, 0.3);
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #8a2be2, #9370db);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.5);
        }

        button {
            background: linear-gradient(135deg, #8a2be2, #9370db);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: clamp(0.8rem, 2vw, 0.9rem);
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(138, 43, 226, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(138, 43, 226, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #4a90d9, #5ba0e9);
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            #canvas-container {
                max-width: 100%;
            }

            .controls {
                gap: 10px;
            }

            input[type="range"] {
                width: 100px;
            }

            button {
                padding: 8px 16px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌳 Interactive Fractal Tree</h1>
        <p class="subtitle">マウスを動かすと風のように揺れます • Click to change colors</p>

        <div id="canvas-container">
            <canvas id="canvas" width="900" height="600"></canvas>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>Depth:</label>
                <input type="range" id="depth" min="5" max="12" value="10">
            </div>

            <div class="control-group">
                <label>Branch Angle:</label>
                <input type="range" id="angle" min="10" max="45" value="25">
            </div>

            <div class="control-group">
                <label>Wind:</label>
                <input type="range" id="wind" min="0" max="100" value="30">
            </div>

            <button onclick="resetTree()">🔄 Reset</button>
            <button onclick="randomize()">🎲 Randomize</button>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">📺 Fullscreen</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        let time = 0;
        let colorScheme = 0;
        
        const colorSchemes = [
            { base: [138, 43, 226], leaf: [147, 112, 219] },   // Purple
            { base: [0, 255, 127], leaf: [50, 205, 50] },      // Green
            { base: [255, 165, 0], leaf: [255, 218, 185] },    // Orange
            { base: [255, 105, 180], leaf: [255, 192, 203] },  // Pink
            { base: [0, 191, 255], leaf: [135, 206, 250] }     // Blue
        ];

        function interpolate(color1, color2, factor) {
            const r = Math.round(color1[0] + (color2[0] - color1[0]) * factor);
            const g = Math.round(color1[1] + (color2[1] - color1[1]) * factor);
            const b = Math.round(color1[2] + (color2[2] - color1[2]) * factor);
            return `rgb(${r}, ${g}, ${b})`;
        }

        function drawTree(x, y, length, angle, depth, maxDepth) {
            if (depth === 0) return;

            const scheme = colorSchemes[colorScheme];
            const progress = 1 - (depth / maxDepth);
            const color = interpolate(scheme.base, scheme.leaf, progress);
            
            ctx.strokeStyle = color;
            ctx.lineWidth = depth * 0.8;
            ctx.lineCap = 'round';
            
            // Calculate wind effect based on mouse position
            const dx = (mouseX - canvas.width / 2) / canvas.width;
            const windStrength = parseInt(document.getElementById('wind').value) / 100;
            const windAngle = Math.sin(time * 0.02 + depth * 0.5) * windStrength + dx * windStrength * 2;
            
            const endX = x + Math.cos(angle + windAngle) * length;
            const endY = y + Math.sin(angle + windAngle) * length;
            
            // Glow effect for tips
            if (depth <= 2) {
                ctx.shadowBlur = 10;
                ctx.shadowColor = color;
            } else {
                ctx.shadowBlur = 0;
            }
            
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.stroke();
            
            const branchAngle = parseInt(document.getElementById('angle').value) * Math.PI / 180;
            const newLength = length * 0.72;
            
            // Recursive branches with variation
            drawTree(endX, endY, newLength, angle - branchAngle + windAngle * 0.5, depth - 1, maxDepth);
            drawTree(endX, endY, newLength, angle + branchAngle + windAngle * 0.5, depth - 1, maxDepth);
            
            // Add flowers at tips
            if (depth <= 2) {
                ctx.fillStyle = interpolate(scheme.leaf, [255, 255, 255], 0.3);
                ctx.beginPath();
                ctx.arc(endX, endY, 3 * depth, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.shadowBlur = 0;
            const depth = parseInt(document.getElementById('depth').value);
            
            time++;
            drawTree(canvas.width / 2, canvas.height, 120, -Math.PI / 2, depth, depth);
            
            requestAnimationFrame(animate);
        }

        function resetTree() {
            ctx.fillStyle = 'rgb(10, 10, 26)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            time = 0;
        }

        function randomize() {
            document.getElementById('depth').value = Math.floor(Math.random() * 4) + 7;
            document.getElementById('angle').value = Math.floor(Math.random() * 30) + 15;
            document.getElementById('wind').value = Math.floor(Math.random() * 60) + 20;
            resetTree();
        }

        function toggleFullscreen() {
            const container = document.getElementById('canvas-container');
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => {
                    console.log('Fullscreen failed:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Mouse tracking
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouseX = (e.clientX - rect.left) * scaleX;
            mouseY = (e.clientY - rect.top) * scaleY;
        });

        // Touch support
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouseX = (e.touches[0].clientX - rect.left) * scaleX;
            mouseY = (e.touches[0].clientY - rect.top) * scaleY;
        }, { passive: false });

        // Click to change colors
        canvas.addEventListener('click', () => {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
        });

        // Initial setup
        resetTree();
        animate();
    </script>
</body>
</html>
