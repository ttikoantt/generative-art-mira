<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typography Art Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 3px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient 3s ease infinite;
            background-size: 200% 200%;
        }

        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .controls {
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            background: rgba(255,255,255,0.03);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-group input[type="text"],
        .control-group select {
            padding: 12px 16px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #1a1a1a;
            color: #fff;
            font-size: 1rem;
            min-width: 200px;
        }

        .control-group input[type="range"] {
            width: 200px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #00d4ff);
            color: #fff;
            margin-top: 20px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.4);
        }

        .btn-secondary {
            background: #333;
            color: #fff;
        }

        .btn-secondary:hover {
            background: #444;
        }

        .canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            min-height: 500px;
        }

        #artCanvas {
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .fullscreen-btn.active {
            background: rgba(124, 58, 237, 0.5);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5rem;
            }

            .controls {
                padding: 15px;
            }

            .control-group input[type="text"],
            .control-group select {
                min-width: 150px;
            }

            .canvas-container {
                padding: 20px 10px;
                min-height: 400px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">全画面表示</button>

    <header class="header">
        <h1>✦ TYPOGRAPHY ART ✦</h1>
    </header>

    <div class="controls">
        <div class="control-group">
            <label>テキスト</label>
            <input type="text" id="textInput" value="CREATE">
        </div>

        <div class="control-group">
            <label>スタイル</label>
            <select id="styleSelect">
                <option value="wave">ウェーブ</option>
                <option value="spiral">スパイラル</option>
                <option value="explosion">爆発</option>
                <option value="matrix">マトリックス</option>
                <option value="rainbow">レインボー</option>
            </select>
        </div>

        <div class="control-group">
            <label>フォントサイズ</label>
            <input type="range" id="fontSizeSlider" min="20" max="100" value="50">
        </div>

        <div class="control-group">
            <label>密度</label>
            <input type="range" id="densitySlider" min="5" max="30" value="15">
        </div>

        <button class="btn btn-primary" id="generateBtn">生成</button>
    </div>

    <div class="canvas-container">
        <canvas id="artCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('artCanvas');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const generateBtn = document.getElementById('generateBtn');

        let isFullscreen = false;

        function resizeCanvas() {
            const container = document.querySelector('.canvas-container');
            const maxWidth = Math.min(1200, window.innerWidth - 40);
            const maxHeight = isFullscreen ? window.innerHeight - 100 : 800;

            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }

        function generateArt() {
            const text = document.getElementById('textInput').value || 'CREATE';
            const style = document.getElementById('styleSelect').value;
            const fontSize = parseInt(document.getElementById('fontSizeSlider').value);
            const density = parseInt(document.getElementById('densitySlider').value);

            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            switch(style) {
                case 'wave':
                    drawWave(text, fontSize, density);
                    break;
                case 'spiral':
                    drawSpiral(text, fontSize, density);
                    break;
                case 'explosion':
                    drawExplosion(text, fontSize, density);
                    break;
                case 'matrix':
                    drawMatrix(text, fontSize, density);
                    break;
                case 'rainbow':
                    drawRainbow(text, fontSize, density);
                    break;
            }
        }

        function drawWave(text, fontSize, density) {
            const chars = text.split('');
            const cols = Math.floor(canvas.width / density);
            const rows = Math.floor(canvas.height / (fontSize * 0.6));

            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const charIndex = (col + row) % chars.length;
                    const char = chars[charIndex];

                    const x = col * density;
                    const y = row * fontSize * 0.6 + fontSize;

                    const waveOffset = Math.sin(col * 0.2 + row * 0.1) * 50;
                    const hue = (col * 5 + row * 3 + waveOffset) % 360;
                    const alpha = Math.abs(Math.sin(col * 0.1 + row * 0.1)) * 0.7 + 0.3;

                    ctx.font = `${fontSize * (0.5 + Math.sin(col * 0.1 + row * 0.05) * 0.3)}px Arial`;
                    ctx.fillStyle = `hsla(${hue}, 80%, 60%, ${alpha})`;
                    ctx.fillText(char, x, y + waveOffset);
                }
            }
        }

        function drawSpiral(text, fontSize, density) {
            const chars = text.split('');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const maxRadius = Math.min(canvas.width, canvas.height) * 0.45;

            let angle = 0;
            let radius = 0;
            let charIndex = 0;

            while (radius < maxRadius) {
                const char = chars[charIndex % chars.length];
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;

                const hue = (angle * 30 + radius * 0.5) % 360;
                const size = fontSize * (0.3 + (radius / maxRadius) * 0.7);

                ctx.font = `bold ${size}px Arial`;
                ctx.fillStyle = `hsl(${hue}, 80%, 60%)`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(char, x, y);

                angle += density * 0.02;
                radius += density * 0.3;
                charIndex++;
            }
        }

        function drawExplosion(text, fontSize, density) {
            const chars = text.split('');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            const numRays = 36;
            const numPerRay = Math.floor(Math.min(canvas.width, canvas.height) / (density * 2));

            for (let ray = 0; ray < numRays; ray++) {
                const angle = (ray / numRays) * Math.PI * 2;

                for (let i = 0; i < numPerRay; i++) {
                    const char = chars[(ray + i) % chars.length];
                    const distance = i * density * 1.5 + fontSize;

                    const x = centerX + Math.cos(angle) * distance;
                    const y = centerY + Math.sin(angle) * distance;

                    const hue = (ray * 10 + i * 5) % 360;
                    const alpha = 1 - (i / numPerRay) * 0.7;
                    const size = fontSize * (1 - (i / numPerRay) * 0.5);

                    ctx.font = `bold ${size}px Arial`;
                    ctx.fillStyle = `hsla(${hue}, 90%, 60%, ${alpha})`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(char, x, y);
                }
            }
        }

        function drawMatrix(text, fontSize, density) {
            const chars = text.split('');
            const cols = Math.floor(canvas.width / density);

            const columns = Array(cols).fill(0).map(() => Math.random() * canvas.height);

            ctx.font = `${fontSize * 0.6}px monospace`;

            for (let i = 0; i < 300; i++) {
                const col = Math.floor(Math.random() * cols);
                const char = chars[Math.floor(Math.random() * chars.length)];

                const x = col * density;
                const y = columns[col];

                const hue = 120 + Math.random() * 40;
                const alpha = Math.random() * 0.8 + 0.2;

                ctx.fillStyle = `hsla(${hue}, 100%, 50%, ${alpha})`;
                ctx.fillText(char, x, y);

                columns[col] += fontSize * 0.6;

                if (columns[col] > canvas.height && Math.random() > 0.98) {
                    columns[col] = 0;
                }
            }
        }

        function drawRainbow(text, fontSize, density) {
            const chars = text.split('');
            const cols = Math.floor(canvas.width / density);
            const rows = Math.floor(canvas.height / (fontSize * 0.8));

            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const char = chars[(col + row) % chars.length];

                    const x = col * density;
                    const y = row * fontSize * 0.8 + fontSize;

                    const hue = (col / cols) * 360;
                    const saturation = 80 + Math.sin(row * 0.2) * 20;
                    const lightness = 50 + Math.cos(row * 0.1) * 10;
                    const alpha = 0.6 + Math.sin(col * 0.1 + row * 0.1) * 0.4;

                    const size = fontSize * (0.5 + Math.abs(Math.sin(col * 0.05 + row * 0.05)) * 0.5);

                    ctx.font = `bold ${size}px Arial`;
                    ctx.fillStyle = `hsla(${hue}, ${saturation}%, ${lightness}%, ${alpha})`;
                    ctx.fillText(char, x, y);
                }
            }
        }

        function toggleFullscreen() {
            isFullscreen = !isFullscreen;

            if (isFullscreen) {
                document.documentElement.requestFullscreen?.() ||
                document.documentElement.webkitRequestFullscreen?.();
                fullscreenBtn.textContent = '全画面解除';
                fullscreenBtn.classList.add('active');
            } else {
                document.exitFullscreen?.() ||
                document.webkitExitFullscreen?.();
                fullscreenBtn.textContent = '全画面表示';
                fullscreenBtn.classList.remove('active');
            }

            setTimeout(() => {
                resizeCanvas();
                generateArt();
            }, 100);
        }

        fullscreenBtn.addEventListener('click', toggleFullscreen);
        generateBtn.addEventListener('click', generateArt);

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                isFullscreen = false;
                fullscreenBtn.textContent = '全画面表示';
                fullscreenBtn.classList.remove('active');
                resizeCanvas();
                generateArt();
            }
        });

        window.addEventListener('resize', () => {
            resizeCanvas();
            generateArt();
        });

        // 初期化
        resizeCanvas();
        generateArt();

        // 自動アニメーション
        setInterval(() => {
            generateArt();
        }, 3000);
    </script>
</body>
</html>
