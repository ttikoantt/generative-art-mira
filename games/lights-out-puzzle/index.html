<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lights Out Puzzle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
            overflow: hidden;
        }

        h1 {
            color: #fff;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            color: #fff;
            font-size: 16px;
        }

        .stats div {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .cell {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 24px;
        }

        .cell.on {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 0 20px rgba(240, 147, 251, 0.6);
        }

        .cell.off {
            background: rgba(0, 0, 0, 0.3);
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .cell:hover {
            transform: scale(1.05);
        }

        .cell:active {
            transform: scale(0.95);
        }

        .buttons {
            display: flex;
            gap: 15px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.8);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .win-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .win-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            animation: scaleIn 0.5s ease;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .win-content h2 {
            color: #fff;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .win-content p {
            color: #fff;
            font-size: 20px;
            margin-bottom: 20px;
        }

        .win-content button {
            background: #fff;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .win-content button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 22px;
            }

            .stats {
                font-size: 14px;
                gap: 10px;
            }

            .cell {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }

            .grid {
                gap: 5px;
                padding: 10px;
            }

            .win-content {
                padding: 30px 40px;
            }

            .win-content h2 {
                font-size: 24px;
            }

            .win-content p {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <h1>💡 Lights Out</h1>

    <div class="stats">
        <div>移動: <span id="moves">0</span></div>
        <div>ベスト: <span id="best">-</span></div>
    </div>

    <div class="game-container">
        <div class="grid" id="grid"></div>

        <div class="buttons">
            <button class="btn" onclick="resetGame()">リセット</button>
            <button class="btn" onclick="newGame()">新しいゲーム</button>
        </div>
    </div>

    <div class="win-overlay" id="winOverlay">
        <div class="win-content">
            <h2>🎉 クリア！</h2>
            <p>移動数: <span id="finalMoves">0</span></p>
            <button onclick="newGame()">次のゲーム</button>
        </div>
    </div>

    <script>
        const GRID_SIZE = 5;
        let grid = [];
        let moves = 0;
        let bestMoves = localStorage.getItem('lightsOutBest') || null;

        const gridElement = document.getElementById('grid');
        const movesElement = document.getElementById('moves');
        const bestElement = document.getElementById('best');
        const winOverlay = document.getElementById('winOverlay');
        const finalMovesElement = document.getElementById('finalMoves');

        function initGrid() {
            grid = [];
            for (let i = 0; i < GRID_SIZE; i++) {
                grid[i] = [];
                for (let j = 0; j < GRID_SIZE; j++) {
                    grid[i][j] = false;
                }
            }
        }

        function toggleCell(row, col) {
            if (row >= 0 && row < GRID_SIZE && col >= 0 && col < GRID_SIZE) {
                grid[row][col] = !grid[row][col];
            }
        }

        function handleClick(row, col) {
            moves++;
            movesElement.textContent = moves;

            // セルと上下左右を反転
            toggleCell(row, col);
            toggleCell(row - 1, col);
            toggleCell(row + 1, col);
            toggleCell(row, col - 1);
            toggleCell(row, col + 1);

            renderGrid();
            checkWin();
        }

        function renderGrid() {
            gridElement.innerHTML = '';

            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    const cell = document.createElement('button');
                    cell.className = grid[i][j] ? 'cell on' : 'cell off';
                    cell.textContent = grid[i][j] ? '💡' : '⚫';
                    cell.onclick = () => handleClick(i, j);

                    // タッチ対応（高速タップ）
                    cell.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        handleClick(i, j);
                    });

                    gridElement.appendChild(cell);
                }
            }
        }

        function checkWin() {
            const allOff = grid.every(row => row.every(cell => !cell));

            if (allOff) {
                finalMovesElement.textContent = moves;

                if (!bestMoves || moves < bestMoves) {
                    bestMoves = moves;
                    localStorage.setItem('lightsOutBest', bestMoves);
                    bestElement.textContent = bestMoves;
                }

                setTimeout(() => {
                    winOverlay.style.display = 'flex';
                }, 300);
            }
        }

        function newGame() {
            winOverlay.style.display = 'none';
            moves = 0;
            movesElement.textContent = moves;

            initGrid();

            // ランダムな初期配置を作成
            const numToggles = Math.floor(Math.random() * 15) + 10;
            for (let i = 0; i < numToggles; i++) {
                const row = Math.floor(Math.random() * GRID_SIZE);
                const col = Math.floor(Math.random() * GRID_SIZE);
                toggleCell(row, col);
                toggleCell(row - 1, col);
                toggleCell(row + 1, col);
                toggleCell(row, col - 1);
                toggleCell(row, col + 1);
            }

            renderGrid();
        }

        function resetGame() {
            // 元の状態に戻すため、初期状態を保存
            const initialState = JSON.parse(JSON.stringify(grid));
            initGrid();

            // 逆操作を適用
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    if (initialState[i][j]) {
                        toggleCell(i, j);
                    }
                }
            }

            moves = 0;
            movesElement.textContent = moves;
            renderGrid();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        if (bestMoves) {
            bestElement.textContent = bestMoves;
        }

        newGame();
    </script>
</body>
</html>
