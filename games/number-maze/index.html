<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字迷路 - Number Maze Puzzle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #00f5ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header p {
            font-size: 0.9rem;
            color: #888;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }
        
        .stat {
            background: rgba(0, 245, 255, 0.1);
            padding: 8px 15px;
            border-radius: 5px;
            border: 1px solid rgba(0, 245, 255, 0.3);
        }
        
        .game-container {
            position: relative;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.3);
        }
        
        canvas {
            display: block;
            touch-action: none;
            cursor: pointer;
        }
        
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        button {
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            background: linear-gradient(135deg, #00f5ff, #0080ff);
            border: none;
            border-radius: 5px;
            color: #000;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 245, 255, 0.4);
        }
        
        .fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 8px 12px;
            font-size: 0.8rem;
            background: rgba(0, 245, 255, 0.2);
            border: 1px solid #00f5ff;
            border-radius: 5px;
            color: #00f5ff;
            cursor: pointer;
            z-index: 1000;
        }
        
        .info {
            margin-top: 15px;
            text-align: center;
            font-size: 0.8rem;
            color: #666;
            max-width: 600px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #2a2a4e);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #00f5ff;
            max-width: 90%;
        }
        
        .modal-content h2 {
            margin-bottom: 15px;
            color: #00f5ff;
        }
        
        .modal-content p {
            margin-bottom: 20px;
            color: #ccc;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.2rem;
            }
            
            .stats {
                gap: 10px;
                font-size: 0.8rem;
            }
            
            button {
                padding: 8px 15px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    
    <div class="header">
        <h1>数字迷路</h1>
        <p>Number Maze Puzzle</p>
    </div>
    
    <div class="stats">
        <div class="stat">レベル: <span id="level">1</span></div>
        <div class="stat">移動: <span id="moves">0</span></div>
        <div class="stat">合計: <span id="target">0</span></div>
    </div>
    
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>
    
    <div class="controls">
        <button onclick="newGame()">新しいゲーム</button>
        <button onclick="nextLevel()">次のレベル</button>
        <button onclick="showHelp()">ヘルプ</button>
    </div>
    
    <div class="info">
        数字をタップして、ターゲットの合計値を作ろう！
    </div>
    
    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2>🎉 クリア！</h2>
            <p id="winMessage">素晴らしい！</p>
            <button onclick="nextLevel()">次のレベル</button>
        </div>
    </div>
    
    <div class="modal" id="helpModal">
        <div class="modal-content">
            <h2>📖 遊び方</h2>
            <p style="text-align: left; line-height: 1.8;">
                1. スタート(S)からゴール(G)まで移動しよう<br>
                2. タップした数字の合計がターゲット値になるように選択<br>
                3. 上下左右に隣接するマスのみ移動可能<br>
                4. 同じマスは2回まで通れる<br>
                5. ゴールに到達して合計値がターゲットならクリア！
            </p>
            <button onclick="closeHelp()">閉じる</button>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Canvas size
        const width = Math.min(500, window.innerWidth - 40);
        const height = Math.min(500, window.innerWidth - 40);
        canvas.width = width;
        canvas.height = height;
        
        // Game settings
        const gridSize = 6;
        const cellSize = width / gridSize;
        
        let level = 1;
        let moves = 0;
        let targetSum = 0;
        let currentSum = 0;
        let grid = [];
        let path = [];
        let startPos = { x: 0, y: 0 };
        let endPos = { x: gridSize - 1, y: gridSize - 1 };
        
        function generateLevel() {
            grid = [];
            path = [];
            moves = 0;
            currentSum = 0;
            
            // Generate grid with random numbers
            for (let y = 0; y < gridSize; y++) {
                grid[y] = [];
                for (let x = 0; x < gridSize; x++) {
                    // Numbers based on level difficulty
                    const maxNum = 5 + level * 2;
                    grid[y][x] = Math.floor(Math.random() * maxNum) + 1;
                }
            }
            
            // Set start and end
            startPos = { x: 0, y: 0 };
            endPos = { x: gridSize - 1, y: gridSize - 1 };
            
            // Calculate target sum (sum of all numbers in optimal path)
            // For simplicity, use a formula based on level
            targetSum = (gridSize * 2) * (3 + level);
            
            path = [{ x: startPos.x, y: startPos.y }];
            currentSum = grid[startPos.y][startPos.x];
            
            updateUI();
            draw();
        }
        
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
            
            for (let y = 0; y < gridSize; y++) {
                for (let x = 0; x < gridSize; x++) {
                    const cellX = x * cellSize;
                    const cellY = y * cellSize;
                    
                    // Check if in path
                    const inPath = path.some(p => p.x === x && p.y === y);
                    const isStart = x === startPos.x && y === startPos.y;
                    const isEnd = x === endPos.x && y === endPos.y;
                    
                    // Draw cell background
                    if (isStart) {
                        ctx.fillStyle = 'rgba(0, 255, 0, 0.3)';
                    } else if (isEnd) {
                        ctx.fillStyle = 'rgba(255, 0, 255, 0.3)';
                    } else if (inPath) {
                        ctx.fillStyle = 'rgba(0, 245, 255, 0.2)';
                    } else {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                    }
                    
                    ctx.fillRect(cellX + 2, cellY + 2, cellSize - 4, cellSize - 4);
                    
                    // Draw cell border
                    ctx.strokeStyle = inPath ? '#00f5ff' : 'rgba(255, 255, 255, 0.1)';
                    ctx.lineWidth = inPath ? 2 : 1;
                    ctx.strokeRect(cellX + 2, cellY + 2, cellSize - 4, cellSize - 4);
                    
                    // Draw number
                    ctx.fillStyle = isEnd ? '#ff00ff' : (isStart ? '#00ff00' : '#fff');
                    ctx.font = `bold ${cellSize * 0.5}px Courier New`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    
                    if (isStart) {
                        ctx.fillText('S', cellX + cellSize / 2, cellY + cellSize / 2);
                    } else if (isEnd) {
                        ctx.fillText('G', cellX + cellSize / 2, cellY + cellSize / 2);
                    } else {
                        ctx.fillText(grid[y][x], cellX + cellSize / 2, cellY + cellSize / 2);
                    }
                }
            }
            
            // Draw path lines
            if (path.length > 1) {
                ctx.strokeStyle = '#00f5ff';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(
                    path[0].x * cellSize + cellSize / 2,
                    path[0].y * cellSize + cellSize / 2
                );
                
                for (let i = 1; i < path.length; i++) {
                    ctx.lineTo(
                        path[i].x * cellSize + cellSize / 2,
                        path[i].y * cellSize + cellSize / 2
                    );
                }
                
                ctx.stroke();
            }
        }
        
        function handleClick(e) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / cellSize);
            const y = Math.floor((e.clientY - rect.top) / cellSize);
            
            if (x < 0 || x >= gridSize || y < 0 || y >= gridSize) return;
            
            const lastPos = path[path.length - 1];
            
            // Check if adjacent
            const dx = Math.abs(x - lastPos.x);
            const dy = Math.abs(y - lastPos.y);
            
            if (!((dx === 1 && dy === 0) || (dx === 0 && dy === 1))) {
                return; // Not adjacent
            }
            
            // Check if visited too many times
            const visitCount = path.filter(p => p.x === x && p.y === y).length;
            if (visitCount >= 2) {
                return; // Already visited twice
            }
            
            // Add to path
            path.push({ x, y });
            currentSum += grid[y][x];
            moves++;
            
            // Check win condition
            if (x === endPos.x && y === endPos.y) {
                if (currentSum === targetSum) {
                    showWin();
                }
            }
            
            updateUI();
            draw();
        }
        
        function updateUI() {
            document.getElementById('level').textContent = level;
            document.getElementById('moves').textContent = moves;
            document.getElementById('target').textContent = `${currentSum} / ${targetSum}`;
        }
        
        function showWin() {
            const message = `レベル${level}をクリア！\n移動数: ${moves}`;
            document.getElementById('winMessage').textContent = message;
            document.getElementById('winModal').classList.add('show');
        }
        
        function newGame() {
            level = 1;
            generateLevel();
        }
        
        function nextLevel() {
            document.getElementById('winModal').classList.remove('show');
            level++;
            generateLevel();
        }
        
        function showHelp() {
            document.getElementById('helpModal').classList.add('show');
        }
        
        function closeHelp() {
            document.getElementById('helpModal').classList.remove('show');
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                canvas.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }
        
        // Event listeners
        canvas.addEventListener('click', handleClick);
        
        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleClick({ clientX: touch.clientX, clientY: touch.clientY });
        });
        
        // Initialize
        generateLevel();
    </script>
</body>
</html>
