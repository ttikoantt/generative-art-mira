<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Sequence - 数列パズル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .score {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .high-score {
            color: #ffd700;
            font-size: 0.9rem;
        }

        .sequence {
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .number {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 1.5rem;
            font-weight: bold;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .question {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .option {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 15px;
            font-size: 1.8rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            touch-action: manipulation;
        }

        .option:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }

        .option:active {
            transform: scale(0.95);
        }

        .option.correct {
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            border-color: #00b894;
            animation: pulse 0.5s ease-out;
        }

        .option.wrong {
            background: linear-gradient(135deg, #d63031 0%, #e17055 100%);
            border-color: #d63031;
            animation: shake 0.5s ease-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .message {
            color: #fff;
            font-size: 1.3rem;
            margin-bottom: 15px;
            min-height: 30px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .message.show {
            opacity: 1;
        }

        .message.correct {
            color: #00b894;
        }

        .message.wrong {
            color: #d63031;
        }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: #fff;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 12px 20px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 8px;
            z-index: 200;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        @media (max-width: 600px) {
            .option {
                padding: 12px;
                font-size: 1.5rem;
            }
            .number {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="score">スコア: <span id="score">0</span></div>
            <div class="high-score">🏆 ハイスコア: <span id="highScore">0</span></div>
        </div>

        <div class="sequence" id="sequence"></div>

        <div class="question" id="question"></div>

        <div class="options" id="options"></div>

        <div class="message" id="message"></div>

        <div class="buttons">
            <button class="btn" onclick="newGame()">新しいゲーム</button>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全画面</button>

    <script>
        let score = 0;
        let highScore = localStorage.getItem('numberSequenceHighScore') || 0;
        let currentSequence = [];
        let correctAnswer = 0;
        let canAnswer = true;

        document.getElementById('highScore').textContent = highScore;

        const patterns = [
            // 足し算
            { name: '足し算', generate: () => {
                const start = Math.floor(Math.random() * 10) + 1;
                const diff = Math.floor(Math.random() * 5) + 1;
                return [start, start + diff, start + diff * 2, start + diff * 3];
            }},
            // 掛け算
            { name: '掛け算', generate: () => {
                const start = Math.floor(Math.random() * 5) + 1;
                const mult = Math.floor(Math.random() * 3) + 2;
                return [start, start * mult, start * mult * mult, start * mult * mult * mult];
            }},
            // フィボナッチ
            { name: 'フィボナッチ', generate: () => {
                const start = Math.floor(Math.random() * 5) + 1;
                const start2 = Math.floor(Math.random() * 5) + 1;
                return [start, start2, start + start2, (start + start2) + start2];
            }},
            // 二乗
            { name: '二乗', generate: () => {
                const start = Math.floor(Math.random() * 3) + 1;
                return [start, start * start, start * start * start, start * start * start * start];
            }},
            // 交互
            { name: '交互', generate: () => {
                const base = Math.floor(Math.random() * 10) + 1;
                const offset = Math.floor(Math.random() * 10) + 1;
                return [base, base + offset, base + offset * 2, base + offset * 3];
            }}
        ];

        function generateQuestion() {
            const pattern = patterns[Math.floor(Math.random() * patterns.length)];
            currentSequence = pattern.generate();
            correctAnswer = currentSequence[3];

            // シーケンスを表示
            const sequenceDiv = document.getElementById('sequence');
            sequenceDiv.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const numDiv = document.createElement('div');
                numDiv.className = 'number';
                numDiv.textContent = currentSequence[i];
                sequenceDiv.appendChild(numDiv);
            }

            // 質問を表示
            document.getElementById('question').textContent = '次の数字は？';

            // 選択肢を生成
            const options = [correctAnswer];
            while (options.length < 3) {
                const wrong = correctAnswer + (Math.floor(Math.random() * 20) - 10);
                if (wrong > 0 && !options.includes(wrong)) {
                    options.push(wrong);
                }
            }

            // シャッフル
            for (let i = options.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [options[i], options[j]] = [options[j], options[i]];
            }

            // 選択肢を表示
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            options.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.textContent = option;
                btn.onclick = () => checkAnswer(option, btn);
                optionsDiv.appendChild(btn);
            });
        }

        function checkAnswer(answer, btn) {
            if (!canAnswer) return;
            canAnswer = false;

            const messageDiv = document.getElementById('message');
            const options = document.querySelectorAll('.option');

            options.forEach(opt => {
                opt.style.pointerEvents = 'none';
            });

            if (answer === correctAnswer) {
                btn.classList.add('correct');
                score++;
                messageDiv.textContent = '🎉 正解！';
                messageDiv.className = 'message show correct';
            } else {
                btn.classList.add('wrong');
                // 正解をハイライト
                options.forEach(opt => {
                    if (parseInt(opt.textContent) === correctAnswer) {
                        opt.classList.add('correct');
                    }
                });
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('numberSequenceHighScore', highScore);
                    document.getElementById('highScore').textContent = highScore;
                }
                score = 0;
                messageDiv.textContent = `❌ 不正解！正解は ${correctAnswer}`;
                messageDiv.className = 'message show wrong';
            }

            document.getElementById('score').textContent = score;

            setTimeout(() => {
                messageDiv.className = 'message';
                canAnswer = true;
                generateQuestion();
            }, 1500);
        }

        function newGame() {
            score = 0;
            document.getElementById('score').textContent = score;
            generateQuestion();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ゲーム開始
        newGame();
    </script>
</body>
</html>
