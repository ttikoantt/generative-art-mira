<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Sequence - Puzzle Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: #fff;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .stat {
            color: #0ff;
            font-size: 18px;
        }

        .stat-value {
            font-weight: bold;
            color: #fff;
        }

        .sequence-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .number {
            width: 50px;
            height: 50px;
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #0ff;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #0ff;
            font-size: 20px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .number.missing {
            background: rgba(255, 255, 0, 0.1);
            border-color: #ff0;
            color: #ff0;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .option {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #0ff;
            border-radius: 10px;
            padding: 15px;
            color: #0ff;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .option:hover {
            background: rgba(0, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .option:active {
            transform: scale(0.95);
        }

        .option.correct {
            background: rgba(0, 255, 0, 0.3);
            border-color: #0f0;
            color: #0f0;
        }

        .option.wrong {
            background: rgba(255, 0, 0, 0.3);
            border-color: #f00;
            color: #f00;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .feedback {
            height: 30px;
            color: #0ff;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .feedback.correct {
            color: #0f0;
        }

        .feedback.wrong {
            color: #f00;
        }

        .fullscreen-btn {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #0ff;
            color: #0ff;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 20px #0ff;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 22px;
            }

            .number {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }

            .option {
                padding: 12px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔢 Number Sequence</h1>
        <div class="subtitle">Find the missing number in the pattern</div>

        <div class="stats">
            <div class="stat">Score: <span class="stat-value" id="score">0</span></div>
            <div class="stat">Round: <span class="stat-value" id="round">1</span></div>
            <div class="stat">Best: <span class="stat-value" id="best">0</span></div>
        </div>

        <div class="sequence-container" id="sequence">
            <!-- Numbers will be generated here -->
        </div>

        <div class="options" id="options">
            <!-- Options will be generated here -->
        </div>

        <div class="feedback" id="feedback"></div>

        <button class="fullscreen-btn" onclick="toggleFullscreen()">Fullscreen</button>
    </div>

    <script>
        let score = 0;
        let round = 1;
        let best = parseInt(localStorage.getItem('numberSequenceBest')) || 0;
        let currentAnswer = 0;
        let canAnswer = true;

        document.getElementById('best').textContent = best;

        const patterns = [
            // Arithmetic progression
            {
                name: 'Add +1',
                generate: () => {
                    const start = Math.floor(Math.random() * 10) + 1;
                    return [start, start + 1, start + 2, start + 3, start + 4];
                }
            },
            {
                name: 'Add +2',
                generate: () => {
                    const start = Math.floor(Math.random() * 5) + 1;
                    return [start, start + 2, start + 4, start + 6, start + 8];
                }
            },
            {
                name: 'Add +3',
                generate: () => {
                    const start = Math.floor(Math.random() * 4) + 1;
                    return [start, start + 3, start + 6, start + 9, start + 12];
                }
            },
            // Multiplication
            {
                name: 'Multiply ×2',
                generate: () => {
                    const start = Math.floor(Math.random() * 3) + 1;
                    return [start, start * 2, start * 4, start * 8, start * 16];
                }
            },
            {
                name: 'Multiply ×3',
                generate: () => {
                    const start = Math.floor(Math.random() * 2) + 1;
                    return [start, start * 3, start * 9, start * 27, start * 81];
                }
            },
            // Fibonacci-like
            {
                name: 'Add previous two',
                generate: () => {
                    const a = Math.floor(Math.random() * 5) + 1;
                    const b = Math.floor(Math.random() * 5) + 1;
                    return [a, b, a + b, a + b + b, a + b + b + a + b];
                }
            },
            // Squares
            {
                name: 'Squares',
                generate: () => {
                    const start = Math.floor(Math.random() * 3) + 1;
                    return [start, start * start, start * start * start, start * start * start * start, start * start * start * start * start];
                }
            },
            // Mixed pattern
            {
                name: 'Add then multiply',
                generate: () => {
                    const start = Math.floor(Math.random() * 5) + 1;
                    return [start, start + 2, (start + 2) * 2, (start + 2) * 2 + 2, ((start + 2) * 2 + 2) * 2];
                }
            },
            // Alternating
            {
                name: 'Alternating +1, +2',
                generate: () => {
                    const start = Math.floor(Math.random() * 5) + 1;
                    return [start, start + 1, start + 3, start + 4, start + 6];
                }
            }
        ];

        function generateSequence() {
            const pattern = patterns[Math.floor(Math.random() * patterns.length)];
            let sequence = pattern.generate();
            currentAnswer = sequence[sequence.length - 1];

            // Remove random position
            const missingPos = Math.floor(Math.random() * 5);
            currentAnswer = sequence[missingPos];
            sequence[missingPos] = null;

            return sequence;
        }

        function generateOptions(correct) {
            const options = [correct];

            while (options.length < 4) {
                const wrong = correct + Math.floor(Math.random() * 10) - 5;
                if (wrong !== correct && wrong > 0 && !options.includes(wrong)) {
                    options.push(wrong);
                }
            }

            return options.sort(() => Math.random() - 0.5);
        }

        function displaySequence(sequence) {
            const container = document.getElementById('sequence');
            container.innerHTML = '';

            sequence.forEach((num, index) => {
                const div = document.createElement('div');
                div.className = 'number' + (num === null ? ' missing' : '');
                div.textContent = num === null ? '?' : num;
                container.appendChild(div);
            });
        }

        function displayOptions(options) {
            const container = document.getElementById('options');
            container.innerHTML = '';

            options.forEach(option => {
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = option;
                div.onclick = () => checkAnswer(option, div);
                container.appendChild(div);
            });
        }

        function checkAnswer(answer, element) {
            if (!canAnswer) return;

            canAnswer = false;
            const feedback = document.getElementById('feedback');

            if (answer === currentAnswer) {
                element.classList.add('correct');
                feedback.textContent = '✓ Correct!';
                feedback.className = 'feedback correct';
                score += 10;

                if (score > best) {
                    best = score;
                    localStorage.setItem('numberSequenceBest', best);
                    document.getElementById('best').textContent = best;
                }
            } else {
                element.classList.add('wrong');
                feedback.textContent = `✗ Wrong! It was ${currentAnswer}`;
                feedback.className = 'feedback wrong';
                score = Math.max(0, score - 5);
            }

            document.getElementById('score').textContent = score;
            round++;
            document.getElementById('round').textContent = round;

            setTimeout(() => {
                newRound();
            }, 1500);
        }

        function newRound() {
            const feedback = document.getElementById('feedback');
            feedback.textContent = '';
            feedback.className = 'feedback';

            const sequence = generateSequence();
            const options = generateOptions(currentAnswer);

            displaySequence(sequence);
            displayOptions(options);

            canAnswer = true;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        newRound();
    </script>
</body>
</html>
