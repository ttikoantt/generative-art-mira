<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Sequence - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
        }
        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
        }
        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #4ecca3;
        }
        .game-area {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .message {
            color: white;
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
        }
        .number-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .number-btn {
            width: 80px;
            height: 80px;
            border: none;
            border-radius: 15px;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .number-btn:hover {
            transform: scale(1.1);
        }
        .number-btn:active {
            transform: scale(0.95);
        }
        .number-btn.hidden {
            background: rgba(255, 255, 255, 0.1);
            color: transparent;
        }
        .number-btn.correct {
            background: linear-gradient(135deg, #4ecca3 0%, #45b793 100%);
        }
        .number-btn.wrong {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
        }
        .start-btn {
            padding: 15px 50px;
            font-size: 20px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #4ecca3 0%, #45b793 100%);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        .start-btn:hover {
            transform: scale(1.05);
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        @media (max-width: 500px) {
            .number-btn {
                width: 70px;
                height: 70px;
                font-size: 28px;
            }
            .number-grid {
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <div class="header">
            <h1>🔢 Number Sequence</h1>
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">Level</div>
                    <div class="stat-value" id="level">1</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Score</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Best</div>
                    <div class="stat-value" id="best">0</div>
                </div>
            </div>
        </div>

        <div class="game-area">
            <div class="message" id="message">数字の順序を覚えて！</div>
            <div class="number-grid" id="grid"></div>
            <button class="start-btn" id="startBtn" onclick="startGame()">スタート</button>
        </div>
    </div>

    <script>
        let level = 1;
        let score = 0;
        let best = parseInt(localStorage.getItem('numberSequenceBest')) || 0;
        let sequence = [];
        let currentIndex = 0;
        let gamePhase = 'idle'; // idle, memorize, input, gameover

        document.getElementById('best').textContent = best;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function generateSequence(length) {
            const nums = Array.from({ length }, (_, i) => i + 1);
            return shuffle(nums);
        }

        function renderGrid(numbers, hidden = false) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            numbers.forEach((num, index) => {
                const btn = document.createElement('button');
                btn.className = 'number-btn';
                btn.textContent = num;
                btn.dataset.number = num;
                btn.dataset.index = index;

                if (hidden) {
                    btn.classList.add('hidden');
                }

                btn.onclick = () => handleNumberClick(num, btn);
                grid.appendChild(btn);
            });
        }

        function startGame() {
            level = 1;
            score = 0;
            updateStats();
            startLevel();
        }

        function startLevel() {
            gamePhase = 'memorize';
            currentIndex = 0;

            const length = 3 + level - 1;
            sequence = generateSequence(length);

            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('message').textContent = `Level ${level}: 数字の順番を覚えて！`;

            renderGrid(sequence, false);

            setTimeout(() => {
                gamePhase = 'input';
                renderGrid(sequence, true);
                document.getElementById('message').textContent = '順番通りにタップ！';
            }, 1500 + level * 200);
        }

        function handleNumberClick(num, btn) {
            if (gamePhase !== 'input') return;

            const expectedNum = sequence[currentIndex];

            if (num === expectedNum) {
                btn.classList.add('correct');
                btn.classList.remove('hidden');
                currentIndex++;

                if (currentIndex >= sequence.length) {
                    score += level * 10;
                    level++;
                    updateStats();
                    gamePhase = 'memorize';
                    document.getElementById('message').textContent = '正解！次のレベルへ...';

                    setTimeout(() => {
                        startLevel();
                    }, 1000);
                }
            } else {
                btn.classList.add('wrong');
                btn.classList.remove('hidden');
                gameOver();
            }
        }

        function gameOver() {
            gamePhase = 'gameover';
            document.getElementById('message').textContent = `ゲームオーバー！Score: ${score}`;

            if (score > best) {
                best = score;
                localStorage.setItem('numberSequenceBest', best);
                updateStats();
            }

            // 全ての数字を表示
            const btns = document.querySelectorAll('.number-btn');
            btns.forEach((btn, index) => {
                btn.classList.remove('hidden');
                if (index > currentIndex) {
                    btn.style.opacity = '0.5';
                }
            });

            setTimeout(() => {
                document.getElementById('startBtn').style.display = 'block';
                document.getElementById('startBtn').textContent = 'もう一度';
            }, 1500);
        }

        function updateStats() {
            document.getElementById('level').textContent = level;
            document.getElementById('score').textContent = score;
            document.getElementById('best').textContent = best;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
