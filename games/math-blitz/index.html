<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Blitz - Speed Calculation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #ffffff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* Start Screen */
        .start-screen h1 {
            font-size: 3em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 4px 20px rgba(240, 147, 251, 0.3);
        }

        .start-screen .subtitle {
            font-size: 1.1em;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        /* Game Screen */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.8em;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            margin-top: 5px;
        }

        .timer-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            transition: width 0.1s linear;
        }

        .problem-display {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .equation {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .hint {
            font-size: 0.9em;
            opacity: 0.6;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .answer-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 20px;
            border-radius: 15px;
            font-size: 2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(5px);
        }

        .answer-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .answer-btn:active {
            transform: translateY(0);
        }

        .answer-btn.correct {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border-color: #38ef7d;
            animation: correctPulse 0.5s ease;
        }

        .answer-btn.wrong {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            border-color: #f45c43;
            animation: wrongShake 0.5s ease;
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Result Screen */
        .result-screen h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .final-stats {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .final-stat {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .final-stat:last-child {
            border-bottom: none;
        }

        .final-stat-label {
            font-size: 1.1em;
            opacity: 0.8;
        }

        .final-stat-value {
            font-size: 1.3em;
            font-weight: bold;
        }

        /* Buttons */
        .btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
            box-shadow: 0 5px 20px rgba(240, 147, 251, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(240, 147, 251, 0.5);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .difficulty-select {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .difficulty-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 25px;
            border-radius: 20px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .difficulty-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .difficulty-btn.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-color: transparent;
        }

        /* Streak Display */
        .streak-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4em;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }

        .streak-display.show {
            animation: streakPop 0.8s ease;
        }

        @keyframes streakPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        /* Combo Fire */
        .combo-fire {
            position: absolute;
            top: -50px;
            right: -50px;
            font-size: 3em;
            animation: fireSpin 1s linear infinite;
            display: none;
        }

        .combo-fire.show {
            display: block;
        }

        @keyframes fireSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Fullscreen Button */
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        @media (max-width: 600px) {
            .game-container {
                padding: 15px;
            }

            .start-screen h1 {
                font-size: 2.2em;
            }

            .equation {
                font-size: 2.2em;
            }

            .answer-btn {
                padding: 15px;
                font-size: 1.6em;
            }

            .stat-value {
                font-size: 1.4em;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="game-container">
        <!-- Start Screen -->
        <div class="screen start-screen active" id="startScreen">
            <h1>Math Blitz</h1>
            <p class="subtitle">計算スピード勝負！</p>

            <div class="difficulty-select">
                <button class="difficulty-btn active" data-difficulty="easy">
                    Easy
                    <br><small>足し算・引き算</small>
                </button>
                <button class="difficulty-btn" data-difficulty="medium">
                    Medium
                    <br><small>かけ算も</small>
                </button>
                <button class="difficulty-btn" data-difficulty="hard">
                    Hard
                    <br><small>割り算も</small>
                </button>
            </div>

            <button class="btn" onclick="startGame()">Game Start!</button>
        </div>

        <!-- Game Screen -->
        <div class="screen game-screen" id="gameScreen">
            <div class="stats-bar">
                <div class="stat">
                    <div class="stat-label">Score</div>
                    <div class="stat-value" id="scoreDisplay">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Streak</div>
                    <div class="stat-value" id="streakDisplay">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Time</div>
                    <div class="stat-value" id="timeDisplay">60</div>
                </div>
            </div>

            <div class="timer-bar">
                <div class="timer-fill" id="timerFill"></div>
            </div>

            <div class="problem-display" style="position: relative;">
                <div class="combo-fire" id="comboFire">🔥</div>
                <div class="equation" id="equation">2 + 3 = ?</div>
                <div class="hint" id="hint">正解を選ぼう！</div>
            </div>

            <div class="answers-grid" id="answersGrid">
                <!-- Answers will be generated here -->
            </div>

            <div class="streak-display" id="streakDisplay">🔥 x3</div>
        </div>

        <!-- Result Screen -->
        <div class="screen result-screen" id="resultScreen">
            <h2>Game Over!</h2>

            <div class="final-stats">
                <div class="final-stat">
                    <span class="final-stat-label">最終スコア</span>
                    <span class="final-stat-value" id="finalScore">0</span>
                </div>
                <div class="final-stat">
                    <span class="final-stat-label">正解数</span>
                    <span class="final-stat-value" id="finalCorrect">0</span>
                </div>
                <div class="final-stat">
                    <span class="final-stat-label">最大ストリーク</span>
                    <span class="final-stat-value" id="finalStreak">0</span>
                </div>
                <div class="final-stat">
                    <span class="final-stat-label">平均回答時間</span>
                    <span class="final-stat-value" id="finalAvgTime">0.0s</span>
                </div>
                <div class="final-stat">
                    <span class="final-stat-label">正答率</span>
                    <span class="final-stat-value" id="finalAccuracy">0%</span>
                </div>
            </div>

            <button class="btn" onclick="restartGame()">Play Again</button>
            <button class="btn btn-secondary" onclick="goToStart()">Change Difficulty</button>
        </div>
    </div>

    <script>
        // Game State
        let gameState = {
            difficulty: 'easy',
            score: 0,
            streak: 0,
            maxStreak: 0,
            correct: 0,
            wrong: 0,
            timeLeft: 60,
            currentAnswer: 0,
            isPlaying: false,
            timerInterval: null,
            responseTimes: [],
            problemStartTime: 0
        };

        // Difficulty Settings
        const difficulties = {
            easy: {
                operations: ['+', '-'],
                maxNumber: 20,
                timeLimit: 60
            },
            medium: {
                operations: ['+', '-', '×'],
                maxNumber: 12,
                timeLimit: 60
            },
            hard: {
                operations: ['+', '-', '×', '÷'],
                maxNumber: 12,
                timeLimit: 60
            }
        };

        // DOM Elements
        const screens = {
            start: document.getElementById('startScreen'),
            game: document.getElementById('gameScreen'),
            result: document.getElementById('resultScreen')
        };

        const displays = {
            score: document.getElementById('scoreDisplay'),
            streak: document.getElementById('streakDisplay'),
            time: document.getElementById('timeDisplay'),
            equation: document.getElementById('equation'),
            hint: document.getElementById('hint'),
            timerFill: document.getElementById('timerFill'),
            answersGrid: document.getElementById('answersGrid'),
            comboFire: document.getElementById('comboFire'),
            streakPopup: document.getElementById('streakDisplay')
        };

        const results = {
            score: document.getElementById('finalScore'),
            correct: document.getElementById('finalCorrect'),
            streak: document.getElementById('finalStreak'),
            avgTime: document.getElementById('finalAvgTime'),
            accuracy: document.getElementById('finalAccuracy')
        };

        // Difficulty Selection
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                gameState.difficulty = btn.dataset.difficulty;
            });
        });

        function showScreen(screenName) {
            Object.values(screens).forEach(screen => screen.classList.remove('active'));
            screens[screenName].classList.add('active');
        }

        function generateProblem() {
            const settings = difficulties[gameState.difficulty];
            const operation = settings.operations[Math.floor(Math.random() * settings.operations.length)];
            
            let num1, num2, answer;

            switch (operation) {
                case '+':
                    num1 = Math.floor(Math.random() * settings.maxNumber) + 1;
                    num2 = Math.floor(Math.random() * settings.maxNumber) + 1;
                    answer = num1 + num2;
                    break;
                case '-':
                    num1 = Math.floor(Math.random() * settings.maxNumber) + 1;
                    num2 = Math.floor(Math.random() * num1);
                    answer = num1 - num2;
                    break;
                case '×':
                    num1 = Math.floor(Math.random() * settings.maxNumber) + 1;
                    num2 = Math.floor(Math.random() * settings.maxNumber) + 1;
                    answer = num1 * num2;
                    break;
                case '÷':
                    num2 = Math.floor(Math.random() * (settings.maxNumber - 1)) + 2;
                    answer = Math.floor(Math.random() * settings.maxNumber) + 1;
                    num1 = num2 * answer;
                    break;
            }

            gameState.currentAnswer = answer;
            gameState.problemStartTime = Date.now();

            displays.equation.textContent = `${num1} ${operation} ${num2} = ?`;
            displays.hint.textContent = '正解を選ぼう！';

            generateAnswers(answer);
        }

        function generateAnswers(correctAnswer) {
            const answers = [correctAnswer];
            
            while (answers.length < 4) {
                let wrongAnswer = correctAnswer + Math.floor(Math.random() * 21) - 10;
                if (wrongAnswer >= 0 && wrongAnswer !== correctAnswer && !answers.includes(wrongAnswer)) {
                    answers.push(wrongAnswer);
                }
            }

            // Shuffle answers
            for (let i = answers.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [answers[i], answers[j]] = [answers[j], answers[i]];
            }

            displays.answersGrid.innerHTML = '';
            answers.forEach(answer => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.textContent = answer;
                btn.addEventListener('click', () => checkAnswer(answer, btn));
                displays.answersGrid.appendChild(btn);
            });
        }

        function checkAnswer(selected, buttonElement) {
            if (!gameState.isPlaying) return;

            const responseTime = (Date.now() - gameState.problemStartTime) / 1000;
            gameState.responseTimes.push(responseTime);

            const allButtons = displays.answersGrid.querySelectorAll('.answer-btn');
            allButtons.forEach(btn => btn.style.pointerEvents = 'none');

            if (selected === gameState.currentAnswer) {
                // Correct
                gameState.correct++;
                gameState.streak++;
                gameState.maxStreak = Math.max(gameState.maxStreak, gameState.streak);
                
                const baseScore = 100;
                const streakBonus = Math.min(gameState.streak * 10, 100);
                const speedBonus = Math.max(0, Math.floor((3 - responseTime) * 20));
                const totalScore = baseScore + streakBonus + speedBonus;
                
                gameState.score += totalScore;

                buttonElement.classList.add('correct');
                displays.hint.textContent = `+${totalScore}点! (${streakBonus > 0 ? `Streak+${streakBonus}` : ''})`;

                // Show streak popup
                if (gameState.streak >= 3) {
                    displays.streakPopup.textContent = `🔥 x${gameState.streak}`;
                    displays.streakPopup.classList.add('show');
                    setTimeout(() => displays.streakPopup.classList.remove('show'), 800);
                }

                // Show combo fire
                if (gameState.streak >= 5) {
                    displays.comboFire.classList.add('show');
                }

            } else {
                // Wrong
                gameState.wrong++;
                gameState.streak = 0;
                buttonElement.classList.add('wrong');
                displays.hint.textContent = '間違い！';
                displays.comboFire.classList.remove('show');

                // Highlight correct answer
                allButtons.forEach(btn => {
                    if (parseInt(btn.textContent) === gameState.currentAnswer) {
                        btn.classList.add('correct');
                    }
                });
            }

            updateDisplays();

            setTimeout(() => {
                if (gameState.isPlaying) {
                    generateProblem();
                }
            }, 500);
        }

        function updateDisplays() {
            displays.score.textContent = gameState.score;
            displays.streak.textContent = gameState.streak;
            displays.time.textContent = Math.ceil(gameState.timeLeft);

            const timerPercent = (gameState.timeLeft / difficulties[gameState.difficulty].timeLimit) * 100;
            displays.timerFill.style.width = `${timerPercent}%`;
        }

        function startGame() {
            gameState = {
                difficulty: gameState.difficulty,
                score: 0,
                streak: 0,
                maxStreak: 0,
                correct: 0,
                wrong: 0,
                timeLeft: difficulties[gameState.difficulty].timeLimit,
                currentAnswer: 0,
                isPlaying: true,
                timerInterval: null,
                responseTimes: [],
                problemStartTime: 0
            };

            displays.comboFire.classList.remove('show');
            showScreen('game');
            updateDisplays();
            generateProblem();

            gameState.timerInterval = setInterval(() => {
                gameState.timeLeft -= 0.1;
                updateDisplays();

                if (gameState.timeLeft <= 0) {
                    endGame();
                }
            }, 100);
        }

        function endGame() {
            gameState.isPlaying = false;
            clearInterval(gameState.timerInterval);

            const avgTime = gameState.responseTimes.length > 0
                ? (gameState.responseTimes.reduce((a, b) => a + b, 0) / gameState.responseTimes.length).toFixed(1)
                : '0.0';
            
            const totalAttempts = gameState.correct + gameState.wrong;
            const accuracy = totalAttempts > 0
                ? Math.round((gameState.correct / totalAttempts) * 100)
                : 0;

            results.score.textContent = gameState.score;
            results.correct.textContent = gameState.correct;
            results.streak.textContent = gameState.maxStreak;
            results.avgTime.textContent = `${avgTime}s`;
            results.accuracy.textContent = `${accuracy}%`;

            showScreen('result');
        }

        function restartGame() {
            startGame();
        }

        function goToStart() {
            showScreen('start');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
