<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Dodge Game | Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .score-display {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 24px;
            text-shadow: 0 0 10px #0ff;
        }

        .high-score {
            position: fixed;
            top: 55px;
            left: 20px;
            color: #ff0;
            font-size: 14px;
            opacity: 0.8;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            display: none;
            pointer-events: auto;
        }

        .game-over h2 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #f00;
        }

        .game-over p {
            font-size: 24px;
            margin-bottom: 30px;
        }

        .btn {
            background: rgba(0, 255, 255, 0.2);
            border: 2px solid #0ff;
            color: #fff;
            padding: 15px 40px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
            pointer-events: auto;
        }

        .btn:hover {
            background: rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }

        .start-screen {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            pointer-events: auto;
        }

        .start-screen h1 {
            font-size: 36px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #0ff;
        }

        .start-screen p {
            font-size: 14px;
            margin-bottom: 30px;
            opacity: 0.7;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 101;
            pointer-events: auto;
        }

        .lives {
            position: fixed;
            top: 20px;
            right: 120px;
            color: #f00;
            font-size: 24px;
            text-shadow: 0 0 10px #f00;
        }

        @media (max-width: 600px) {
            .score-display {
                font-size: 18px;
            }
            .game-over h2 {
                font-size: 32px;
            }
            .start-screen h1 {
                font-size: 24px;
            }
            .lives {
                right: 90px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="ui">
        <div class="score-display">
            Score: <span id="score">0</span>
        </div>
        <div class="high-score">
            Best: <span id="highScore">0</span>
        </div>
        <div class="lives" id="lives">❤️❤️❤️</div>

        <div class="start-screen" id="startScreen">
            <h1>🌀 Sonic Dodge</h1>
            <p>音のリズムに合わせて障害物を避けろ！</p>
            <p style="font-size: 12px;">マウス/タッチで移動</p>
            <button class="btn" id="startBtn">スタート</button>
        </div>

        <div class="game-over" id="gameOver">
            <h2>Game Over</h2>
            <p>Score: <span id="finalScore">0</span></p>
            <button class="btn" id="restartBtn">もう一度</button>
        </div>
    </div>

    <button class="btn fullscreen-btn" id="fullscreenBtn">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const highScoreDisplay = document.getElementById('highScore');
        const finalScoreDisplay = document.getElementById('finalScore');
        const livesDisplay = document.getElementById('lives');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOver');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let width, height;
        let gameRunning = false;
        let score = 0;
        let highScore = localStorage.getItem('sonicDodgeHighScore') || 0;
        let lives = 3;
        let difficulty = 1;

        let player = { x: 0, y: 0, radius: 15 };
        let obstacles = [];
        let particles = [];
        let audioContext, oscillator, gainNode, analyser;
        let beatTime = 0;
        let beatInterval = 500; // ms
        let hue = 0;

        // Load high score
        highScoreDisplay.textContent = highScore;

        // Resize
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            player.x = width / 2;
            player.y = height / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        // Initialize audio
        function initAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;

            // Create beat
            oscillator = audioContext.createOscillator();
            gainNode = audioContext.createGain();

            oscillator.type = 'square';
            oscillator.frequency.setValueAtTime(100, audioContext.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);

            oscillator.connect(gainNode);
            gainNode.connect(analyser);
            analyser.connect(audioContext.destination);
            oscillator.start();

            // Create beat pattern
            createBeat();
        }

        function createBeat() {
            if (!gameRunning) return;

            const now = audioContext.currentTime;
            gainNode.gain.setValueAtTime(0.3, now);
            gainNode.gain.exponentialDecayTo = 0.01;
            gainNode.gain.setValueAtTime(0.01, now + 0.1);

            // Spawn obstacles on beat
            spawnObstacles();

            setTimeout(createBeat, beatInterval);
        }

        // Obstacle class
        class Obstacle {
            constructor() {
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.max(width, height) * 0.6;
                this.x = width / 2 + Math.cos(angle) * distance;
                this.y = height / 2 + Math.sin(angle) * distance;
                this.radius = Math.random() * 20 + 10;
                this.speed = (2 + Math.random() * 2) * difficulty;
                this.angle = Math.atan2(height / 2 - this.y, width / 2 - this.x);
                this.hue = Math.random() * 360;
                this.type = Math.random() > 0.8 ? 'bonus' : 'obstacle';
            }

            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
            }

            draw() {
                ctx.save();
                if (this.type === 'bonus') {
                    ctx.fillStyle = '#0f0';
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#0f0';
                } else {
                    ctx.fillStyle = `hsl(${this.hue}, 100%, 50%)`;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = `hsl(${this.hue}, 100%, 50%)`;
                }
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            isOffScreen() {
                return (
                    this.x < -50 ||
                    this.x > width + 50 ||
                    this.y < -50 ||
                    this.y > height + 50
                );
            }

            collidesWith(p) {
                const dx = this.x - p.x;
                const dy = this.y - p.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                return distance < this.radius + p.radius;
            }
        }

        // Particle class
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1;
                this.color = color;
                this.size = Math.random() * 5 + 2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.02;
                this.vx *= 0.98;
                this.vy *= 0.98;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function spawnObstacles() {
            const count = Math.floor(1 + difficulty * 0.5);
            for (let i = 0; i < count; i++) {
                obstacles.push(new Obstacle());
            }
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function checkCollision() {
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                if (obs.collidesWith(player)) {
                    if (obs.type === 'bonus') {
                        score += 50;
                        createExplosion(obs.x, obs.y, '#0f0');
                    } else {
                        lives--;
                        createExplosion(player.x, player.y, '#f00');
                        updateLives();
                        if (lives <= 0) {
                            endGame();
                            return;
                        }
                    }
                    obstacles.splice(i, 1);
                }
            }
        }

        function updateLives() {
            livesDisplay.textContent = '❤️'.repeat(Math.max(0, lives));
        }

        function endGame() {
            gameRunning = false;
            if (oscillator) {
                oscillator.stop();
            }
            finalScoreDisplay.textContent = score;
            gameOverScreen.style.display = 'block';
            startScreen.style.display = 'none';

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('sonicDodgeHighScore', highScore);
                highScoreDisplay.textContent = highScore;
            }
        }

        function startGame() {
            gameRunning = true;
            score = 0;
            lives = 3;
            difficulty = 1;
            obstacles = [];
            particles = [];
            beatInterval = 500;
            scoreDisplay.textContent = '0';
            updateLives();
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            player.x = width / 2;
            player.y = height / 2;
            initAudio();
        }

        // Mouse/touch controls
        let mouseX = width / 2;
        let mouseY = height / 2;

        canvas.addEventListener('mousemove', (e) => {
            if (gameRunning) {
                mouseX = e.clientX;
                mouseY = e.clientY;
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            if (gameRunning) {
                e.preventDefault();
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            if (gameRunning) {
                e.preventDefault();
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        }, { passive: false });

        // Update player position
        function updatePlayer() {
            const dx = mouseX - player.x;
            const dy = mouseY - player.y;
            player.x += dx * 0.1;
            player.y += dy * 0.1;
        }

        // Draw player
        function drawPlayer() {
            ctx.save();
            ctx.fillStyle = '#0ff';
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#0ff';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();

            // Inner glow
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius * 0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        // Draw background
        function drawBackground() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // Subtle grid
            ctx.save();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            const gridSize = 50;
            for (let x = 0; x < width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            for (let y = 0; y < height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
            ctx.restore();
        }

        // Main game loop
        function gameLoop() {
            drawBackground();

            if (gameRunning) {
                updatePlayer();

                // Update obstacles
                obstacles = obstacles.filter(obs => !obs.isOffScreen());
                obstacles.forEach(obs => {
                    obs.update();
                    obs.draw();
                });

                // Update particles
                particles = particles.filter(p => p.life > 0);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });

                checkCollision();

                // Update score
                score += 1;
                scoreDisplay.textContent = score;

                // Increase difficulty
                difficulty = 1 + Math.floor(score / 500) * 0.2;
                beatInterval = Math.max(200, 500 - Math.floor(score / 500) * 50);

                drawPlayer();
            }

            requestAnimationFrame(gameLoop);
        }

        // Event listeners
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // Start game loop
        gameLoop();
    </script>
</body>
</html>
