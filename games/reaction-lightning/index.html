<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Lightning - 反応速度ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #game {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            transition: background 0.05s;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        #game.waiting {
            background: #1a1a2e;
        }
        #game.ready {
            background: #e94560;
            animation: flash 0.1s;
        }
        #game.too-early {
            background: #ff6b6b;
        }
        @keyframes flash {
            0%, 100% { background: #e94560; }
            50% { background: #ff6b6b; }
        }
        @keyframes lightning {
            0% { background: #e94560; }
            25% { background: #fff; }
            50% { background: #e94560; }
            75% { background: #fff; }
            100% { background: #0a0a0f; }
        }
        .lightning {
            animation: lightning 0.3s ease-out;
        }
        #message {
            font-size: clamp(24px, 8vw, 64px);
            color: #fff;
            text-align: center;
            z-index: 10;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 10px;
            color: #fff;
            font-size: clamp(12px, 3vw, 18px);
            z-index: 100;
            pointer-events: none;
        }
        #stats {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 10px;
            color: #fff;
            font-size: clamp(12px, 3vw, 16px);
            z-index: 100;
            pointer-events: none;
        }
        .time {
            font-size: clamp(48px, 15vw, 120px);
            font-weight: bold;
            color: #fff;
        }
        .good { color: #4ade80; }
        .great { color: #facc15; }
        .excellent { color: #f97316; }
        .perfect { color: #ef4444; }
    </style>
</head>
<body>
    <div id="game">
        <div id="info">Round 1/5 | Best: --</div>
        <div id="message">Click to Start</div>
        <div id="stats">Average: -- ms</div>
    </div>
    <script>
        const game = document.getElementById('game');
        const message = document.getElementById('message');
        const info = document.getElementById('info');
        const stats = document.getElementById('stats');

        const state = {
            mode: 'start', // start, waiting, ready, result
            round: 0,
            maxRounds: 5,
            times: [],
            bestTime: Infinity,
            startTime: 0,
            timeoutId: null
        };

        function getRandomDelay() {
            return Math.random() * 3000 + 1000; // 1-4秒
        }

        function getRating(ms) {
            if (ms < 180) return { text: 'PERFECT!', class: 'perfect' };
            if (ms < 220) return { text: 'Excellent!', class: 'excellent' };
            if (ms < 280) return { text: 'Great!', class: 'great' };
            if (ms < 350) return { text: 'Good', class: 'good' };
            return { text: `${ms} ms`, class: '' };
        }

        function updateUI() {
            const avg = state.times.length > 0 
                ? Math.round(state.times.reduce((a, b) => a + b, 0) / state.times.length)
                : '--';
            
            info.textContent = `Round ${state.round + 1}/${state.maxRounds} | Best: ${state.bestTime === Infinity ? '--' : state.bestTime + ' ms'}`;
            stats.textContent = `Average: ${avg} ms`;
        }

        function startGame() {
            state.round = 0;
            state.times = [];
            state.bestTime = Infinity;
            startRound();
        }

        function startRound() {
            if (state.round >= state.maxRounds) {
                endGame();
                return;
            }

            state.mode = 'waiting';
            game.className = 'waiting';
            message.innerHTML = 'Wait for it...';
            updateUI();

            state.timeoutId = setTimeout(() => {
                state.mode = 'ready';
                state.startTime = performance.now();
                game.className = 'ready lightning';
                message.innerHTML = 'CLICK NOW!';
            }, getRandomDelay());
        }

        function handleClick() {
            if (state.mode === 'start') {
                startGame();
            } else if (state.mode === 'waiting') {
                clearTimeout(state.timeoutId);
                state.mode = 'too-early';
                game.className = 'too-early';
                message.innerHTML = 'Too Early!<br>Click to retry';
                state.round = 0;
                state.times = [];
                updateUI();
            } else if (state.mode === 'ready') {
                const reactionTime = Math.round(performance.now() - state.startTime);
                const rating = getRating(reactionTime);
                
                state.times.push(reactionTime);
                if (reactionTime < state.bestTime) {
                    state.bestTime = reactionTime;
                }
                state.round++;
                state.mode = 'result';
                
                game.className = '';
                message.innerHTML = `<span class="time ${rating.class}">${reactionTime}</span><br>${rating.text}`;
                updateUI();

                setTimeout(() => {
                    if (state.round < state.maxRounds) {
                        startRound();
                    } else {
                        endGame();
                    }
                }, 1500);
            } else if (state.mode === 'too-early' || state.mode === 'result') {
                startGame();
            }
        }

        function endGame() {
            state.mode = 'start';
            game.className = '';
            
            const avg = Math.round(state.times.reduce((a, b) => a + b, 0) / state.times.length);
            let rating = '';
            if (avg < 200) rating = '🏆 Legendary!';
            else if (avg < 250) rating = '⚡ Incredible!';
            else if (avg < 300) rating = '🔥 Great!';
            else if (avg < 350) rating = '👍 Good';
            else rating = 'Keep practicing!';
            
            message.innerHTML = `
                Game Over!<br><br>
                Average: <span class="time">${avg}</span> ms<br>
                ${rating}<br><br>
                <small>Click to play again</small>
            `;
            state.round = 0;
            state.times = [];
            updateUI();
        }

        game.addEventListener('click', handleClick);
        game.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick();
        });

        // キーボード対応（スペースでクリック）
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleClick();
            }
        });

        // 初期表示
        updateUI();
    </script>
</body>
</html>
