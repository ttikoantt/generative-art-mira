<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音楽回避 - リズムゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 100vh;
            max-height: 800px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 0;
            overflow: hidden;
        }

        @media (min-width: 600px) {
            .game-container {
                border-radius: 20px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            }
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .ui-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .title {
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            text-align: center;
        }

        .subtitle {
            font-size: 18px;
            color: #888;
            margin-bottom: 40px;
            text-align: center;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            margin: 10px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .score-display {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            z-index: 5;
        }

        .high-score {
            font-size: 14px;
            color: #888;
            margin-top: 5px;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .game-over-text {
            font-size: 36px;
            color: #ff6b6b;
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 24px;
            color: #fff;
            margin-bottom: 40px;
        }

        .instructions {
            color: #888;
            font-size: 14px;
            margin-top: 20px;
            text-align: center;
            line-height: 1.6;
        }

        @media (max-width: 600px) {
            .title {
                font-size: 36px;
            }

            .score-display {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>

        <div class="score-display">
            <div>Score: <span id="score">0</span></div>
            <div class="high-score">Best: <span id="highScore">0</span></div>
        </div>

        <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

        <div class="ui-overlay" id="startScreen">
            <div class="title">音楽回避</div>
            <div class="subtitle">リズムに合わせて音符を避けろ！</div>
            <button class="btn" onclick="startGame()">ゲーム開始</button>
            <div class="instructions">
                ← → またはタップで左右移動<br>
                音符に当たらないように避けよう！
            </div>
        </div>

        <div class="ui-overlay hidden" id="gameOverScreen">
            <div class="game-over-text">ゲームオーバー</div>
            <div class="final-score">Score: <span id="finalScore">0</span></div>
            <button class="btn" onclick="startGame()">もう一度</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ゲーム状態
        let gameRunning = false;
        let score = 0;
        let highScore = localStorage.getItem('rhythmDodgeHighScore') || 0;
        let animationId;
        let lastTime = 0;

        // プレイヤー
        const player = {
            x: 0,
            y: 0,
            width: 50,
            height: 50,
            speed: 8,
            targetX: 0,
            color: '#667eea'
        };

        // 障害物（音符）
        let obstacles = [];
        let obstacleSpawnTimer = 0;
        let obstacleSpawnInterval = 1000;

        // パーティクル
        let particles = [];

        // 音楽生成（Web Audio API）
        let audioContext;
        let nextNoteTime = 0;
        let noteIndex = 0;
        const tempo = 120;
        const noteDuration = 60 / tempo;

        // スケール
        const scales = {
            C: [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88],
            D: [293.66, 329.63, 369.99, 392.00, 440.00, 493.88, 554.37],
            E: [329.63, 369.99, 415.30, 440.00, 493.88, 554.37, 622.25]
        };

        let currentScale = scales.C;

        function initAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playNote(frequency, time) {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = frequency;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, time);
            gainNode.gain.exponentialRampToValueAtTime(0.01, time + noteDuration);

            oscillator.start(time);
            oscillator.stop(time + noteDuration);
        }

        function scheduleNotes() {
            if (!gameRunning) return;

            const currentTime = audioContext.currentTime;

            while (nextNoteTime < currentTime + 0.1) {
                const note = currentScale[noteIndex % currentScale.length];
                playNote(note, nextNoteTime);

                // 音符に合わせて障害物を生成
                if (Math.random() < 0.3) {
                    spawnObstacle();
                }

                noteIndex++;
                nextNoteTime += noteDuration;
            }
        }

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;

            // プレイヤーの位置をリセット
            player.y = canvas.height - player.height - 50;
            player.x = canvas.width / 2 - player.width / 2;
            player.targetX = player.x;
        }

        function spawnObstacle() {
            const size = 30 + Math.random() * 30;
            obstacles.push({
                x: Math.random() * (canvas.width - size),
                y: -size,
                width: size,
                height: size,
                speed: 3 + Math.random() * 3 + score * 0.01,
                color: `hsl(${Math.random() * 360}, 70%, 60%)`,
                rotation: 0,
                rotationSpeed: (Math.random() - 0.5) * 0.1
            });
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1,
                    color: color
                });
            }
        }

        function update(deltaTime) {
            // プレイヤーの移動（スムーズに）
            const dx = player.targetX - player.x;
            player.x += dx * 0.15;

            // 境界チェック
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) {
                player.x = canvas.width - player.width;
            }
            player.targetX = player.x;

            // 障害物の更新
            obstacles.forEach((obstacle, index) => {
                obstacle.y += obstacle.speed;
                obstacle.rotation += obstacle.rotationSpeed;

                // 画面外に出たら削除
                if (obstacle.y > canvas.height) {
                    obstacles.splice(index, 1);
                    score += 10;
                    document.getElementById('score').textContent = score;
                }

                // 衝突判定
                if (checkCollision(player, obstacle)) {
                    gameOver();
                }
            });

            // パーティクルの更新
            particles.forEach((particle, index) => {
                particle.x += particle.vx;
                particle.y += particle.vy;
                particle.life -= 0.02;

                if (particle.life <= 0) {
                    particles.splice(index, 1);
                }
            });

            // 音楽のスケジューリング
            if (audioContext) {
                scheduleNotes();
            }
        }

        function checkCollision(a, b) {
            return a.x < b.x + b.width &&
                   a.x + a.width > b.x &&
                   a.y < b.y + b.height &&
                   a.y + a.height > b.y;
        }

        function draw() {
            // クリア
            ctx.fillStyle = 'rgba(26, 26, 46, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 背景のグリッド
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            const gridSize = 50;
            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // プレイヤーの描画
            ctx.save();
            ctx.translate(player.x + player.width / 2, player.y + player.height / 2);

            // グロー効果
            ctx.shadowColor = player.color;
            ctx.shadowBlur = 20;

            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.arc(0, 0, player.width / 2, 0, Math.PI * 2);
            ctx.fill();

            // 内部のパターン
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, player.width / 3, 0, Math.PI * 2);
            ctx.stroke();

            ctx.restore();

            // 障害物の描画
            obstacles.forEach(obstacle => {
                ctx.save();
                ctx.translate(obstacle.x + obstacle.width / 2, obstacle.y + obstacle.height / 2);
                ctx.rotate(obstacle.rotation);

                ctx.shadowColor = obstacle.color;
                ctx.shadowBlur = 15;

                ctx.fillStyle = obstacle.color;
                ctx.beginPath();
                ctx.arc(0, 0, obstacle.width / 2, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            });

            // パーティクルの描画
            particles.forEach(particle => {
                ctx.globalAlpha = particle.life;
                ctx.fillStyle = particle.color;
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function gameLoop(timestamp) {
            if (!gameRunning) return;

            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;

            update(deltaTime);
            draw();

            animationId = requestAnimationFrame(gameLoop);
        }

        function startGame() {
            // リセット
            score = 0;
            obstacles = [];
            particles = [];
            noteIndex = 0;
            nextNoteTime = 0;
            player.x = canvas.width / 2 - player.width / 2;
            player.targetX = player.x;

            document.getElementById('score').textContent = score;
            document.getElementById('highScore').textContent = highScore;

            // UIを非表示
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');

            // オーディオ初期化
            if (!audioContext) {
                initAudio();
            }

            // スケールをランダムに選択
            const scaleKeys = Object.keys(scales);
            currentScale = scales[scaleKeys[Math.floor(Math.random() * scaleKeys.length)]];

            // ゲーム開始
            gameRunning = true;
            lastTime = performance.now();
            gameLoop(lastTime);
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);

            // ハイスコア更新
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('rhythmDodgeHighScore', highScore);
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('highScore').textContent = highScore;
            document.getElementById('gameOverScreen').classList.remove('hidden');

            // 衝突エフェクト
            createParticles(player.x + player.width / 2, player.y + player.height / 2, player.color);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;

            if (e.key === 'ArrowLeft' || e.key === 'a') {
                player.targetX -= 50;
            } else if (e.key === 'ArrowRight' || e.key === 'd') {
                player.targetX += 50;
            }
        });

        // タッチ操作
        let touchStartX = 0;
        canvas.addEventListener('touchstart', (e) => {
            if (!gameRunning) return;
            touchStartX = e.touches[0].clientX;
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!gameRunning) return;
            e.preventDefault();
            const touchX = e.touches[0].clientX;
            const rect = canvas.getBoundingClientRect();
            player.targetX = touchX - rect.left - player.width / 2;
        });

        canvas.addEventListener('touchend', (e) => {
            if (!gameRunning) return;
            const touchEndX = e.changedTouches[0].clientX;
            const diff = touchEndX - touchStartX;

            if (Math.abs(diff) > 50) {
                if (diff > 0) {
                    player.targetX += 50;
                } else {
                    player.targetX -= 50;
                }
            }
        });

        // マウス操作
        canvas.addEventListener('mousemove', (e) => {
            if (!gameRunning) return;
            const rect = canvas.getBoundingClientRect();
            player.targetX = e.clientX - rect.left - player.width / 2;
        });

        // 初期化
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        document.getElementById('highScore').textContent = highScore;
    </script>
</body>
</html>
