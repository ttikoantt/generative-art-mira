<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shuffle Puzzle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 20px;
        }

        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 28px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 15px;
            color: #fff;
            font-size: 14px;
            backdrop-filter: blur(10px);
        }

        .stat span {
            font-weight: bold;
            font-size: 18px;
            margin-left: 5px;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
        }

        .tile {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .tile.empty {
            background: rgba(255, 255, 255, 0.05);
            box-shadow: none;
            cursor: default;
        }

        .tile:not(.empty):hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .tile:not(.empty):active {
            transform: scale(0.95);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(240, 147, 251, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .win-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .win-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .win-overlay h2 {
            color: #fff;
            font-size: 48px;
            margin-bottom: 20px;
            animation: bounce 0.5s ease-out;
        }

        .win-overlay p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 18px;
            margin-bottom: 30px;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 24px;
            }

            .tile {
                font-size: 24px;
            }

            .stats {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <h1>🔢 Shuffle Puzzle</h1>

    <div class="stats">
        <div class="stat">時間: <span id="time">00:00</span></div>
        <div class="stat">手数: <span id="moves">0</span></div>
    </div>

    <div class="game-board" id="board"></div>

    <div class="controls">
        <button onclick="startGame()">新しいゲーム</button>
        <button onclick="showNumbers()">数字表示</button>
    </div>

    <div class="win-overlay" id="winOverlay">
        <h2>🎉 クリア！</h2>
        <p id="winStats"></p>
        <button onclick="startGame()">もう一度</button>
    </div>

    <script>
        const board = document.getElementById('board');
        const timeDisplay = document.getElementById('time');
        const movesDisplay = document.getElementById('moves');
        const winOverlay = document.getElementById('winOverlay');
        const winStats = document.getElementById('winStats');

        let tiles = [];
        let emptyIndex = 15;
        let moves = 0;
        let seconds = 0;
        let timerInterval = null;
        let gameStarted = false;
        let showNums = true;

        function createBoard() {
            board.innerHTML = '';
            tiles.forEach((num, index) => {
                const tile = document.createElement('div');
                tile.className = num === 0 ? 'tile empty' : 'tile';
                if (num !== 0) {
                    tile.textContent = showNums ? num : '';
                    tile.addEventListener('click', () => moveTile(index));
                    tile.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        moveTile(index);
                    });
                }
                board.appendChild(tile);
            });
        }

        function moveTile(index) {
            if (!gameStarted) return;

            const emptyRow = Math.floor(emptyIndex / 4);
            const emptyCol = emptyIndex % 4;
            const tileRow = Math.floor(index / 4);
            const tileCol = index % 4;

            // Check if adjacent
            const isAdjacent = (
                (Math.abs(emptyRow - tileRow) === 1 && emptyCol === tileCol) ||
                (Math.abs(emptyCol - tileCol) === 1 && emptyRow === tileRow)
            );

            if (isAdjacent) {
                // Swap
                [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
                emptyIndex = index;
                moves++;
                movesDisplay.textContent = moves;
                createBoard();

                if (checkWin()) {
                    endGame();
                }
            }
        }

        function shuffle() {
            // Shuffle by making random valid moves
            for (let i = 0; i < 200; i++) {
                const emptyRow = Math.floor(emptyIndex / 4);
                const emptyCol = emptyIndex % 4;
                const neighbors = [];

                if (emptyRow > 0) neighbors.push(emptyIndex - 4);
                if (emptyRow < 3) neighbors.push(emptyIndex + 4);
                if (emptyCol > 0) neighbors.push(emptyIndex - 1);
                if (emptyCol < 3) neighbors.push(emptyIndex + 1);

                const randomIndex = neighbors[Math.floor(Math.random() * neighbors.length)];
                [tiles[randomIndex], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[randomIndex]];
                emptyIndex = randomIndex;
            }
        }

        function checkWin() {
            for (let i = 0; i < 15; i++) {
                if (tiles[i] !== i + 1) return false;
            }
            return tiles[15] === 0;
        }

        function startGame() {
            tiles = Array.from({ length: 16 }, (_, i) => (i + 1) % 16);
            emptyIndex = 15;
            moves = 0;
            seconds = 0;
            gameStarted = true;

            movesDisplay.textContent = '0';
            timeDisplay.textContent = '00:00';
            winOverlay.classList.remove('show');

            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                timeDisplay.textContent = `${mins}:${secs}`;
            }, 1000);

            shuffle();
            createBoard();
        }

        function endGame() {
            gameStarted = false;
            clearInterval(timerInterval);

            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            const timeText = mins > 0 ? `${mins}分${secs}秒` : `${secs}秒`;

            winStats.textContent = `🎯 手数: ${moves}手 | ⏱️ タイム: ${timeText}`;
            winOverlay.classList.add('show');
        }

        function showNumbers() {
            showNums = !showNums;
            createBoard();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        startGame();
    </script>
</body>
</html>
