<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shuffle Puzzle - Sliding Tile Puzzle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
            color: #e94560;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 20px;
            color: #a0a0a0;
            font-size: 14px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #a0a0a0;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #e94560;
        }

        .puzzle-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            aspect-ratio: 1;
        }

        .tile {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }

        .tile:hover:not(.empty) {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4);
        }

        .tile.empty {
            background: transparent;
            box-shadow: none;
            cursor: default;
        }

        .tile.correct {
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .difficulty {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .difficulty-btn {
            padding: 8px 15px;
            border: 2px solid rgba(233, 69, 96, 0.5);
            border-radius: 20px;
            background: transparent;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .difficulty-btn:hover,
        .difficulty-btn.active {
            background: rgba(233, 69, 96, 0.3);
            border-color: #e94560;
        }

        .win-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .win-modal.show {
            display: flex;
        }

        .win-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            border: 2px solid #e94560;
        }

        .win-content h2 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #e94560;
        }

        .win-stats {
            margin: 20px 0;
            color: #a0a0a0;
        }

        .win-stats p {
            margin: 10px 0;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
            border: 1px solid rgba(233, 69, 96, 0.5);
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(233, 69, 96, 0.4);
        }

        @media (max-width: 600px) {
            .tile {
                font-size: 20px;
            }

            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧩 Shuffle Puzzle</h1>
        <p class="subtitle">タイルをスライドして順番に並べよう</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">移動回数</div>
                <div class="stat-value" id="moves">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">タイム</div>
                <div class="stat-value" id="time">00:00</div>
            </div>
            <div class="stat">
                <div class="stat-label">ベスト</div>
                <div class="stat-value" id="best">--</div>
            </div>
        </div>

        <div class="difficulty">
            <button class="difficulty-btn active" data-size="3">3×3</button>
            <button class="difficulty-btn" data-size="4">4×4</button>
            <button class="difficulty-btn" data-size="5">5×5</button>
        </div>

        <div class="puzzle-board" id="board"></div>

        <div class="controls">
            <button class="btn btn-primary" id="shuffleBtn">🔀 シャッフル</button>
            <button class="btn btn-secondary" id="resetBtn">🔄 リセット</button>
        </div>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">🖥️ 全画面</button>

    <div class="win-modal" id="winModal">
        <div class="win-content">
            <h2>🎉 クリア！</h2>
            <div class="win-stats">
                <p>移動回数: <strong id="finalMoves">0</strong></p>
                <p>タイム: <strong id="finalTime">00:00</strong></p>
            </div>
            <button class="btn btn-primary" id="playAgainBtn">もう一度プレイ</button>
        </div>
    </div>

    <script>
        const board = document.getElementById('board');
        const movesEl = document.getElementById('moves');
        const timeEl = document.getElementById('time');
        const bestEl = document.getElementById('best');
        const winModal = document.getElementById('winModal');

        let gridSize = 3;
        let tiles = [];
        let emptyIndex;
        let moves = 0;
        let seconds = 0;
        let timerInterval;
        let isPlaying = false;
        let bestTimes = {
            3: Infinity,
            4: Infinity,
            5: Infinity
        };

        // Initialize board
        function initBoard() {
            board.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            tiles = [];

            const totalTiles = gridSize * gridSize;
            for (let i = 1; i < totalTiles; i++) {
                tiles.push(i);
            }
            tiles.push(0); // Empty tile
            emptyIndex = totalTiles - 1;

            renderBoard();
        }

        // Render board
        function renderBoard() {
            board.innerHTML = '';
            tiles.forEach((tile, index) => {
                const div = document.createElement('div');
                div.className = 'tile';

                if (tile === 0) {
                    div.classList.add('empty');
                } else {
                    div.textContent = tile;
                    div.addEventListener('click', () => handleTileClick(index));

                    // Check if tile is in correct position
                    if (tile === index + 1) {
                        div.classList.add('correct');
                    }
                }

                board.appendChild(div);
            });
        }

        // Handle tile click
        function handleTileClick(index) {
            if (!isPlaying) return;

            const emptyRow = Math.floor(emptyIndex / gridSize);
            const emptyCol = emptyIndex % gridSize;
            const tileRow = Math.floor(index / gridSize);
            const tileCol = index % gridSize;

            // Check if adjacent
            const rowDiff = Math.abs(emptyRow - tileRow);
            const colDiff = Math.abs(emptyCol - tileCol);

            if ((rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1)) {
                // Swap
                [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
                emptyIndex = index;
                moves++;
                movesEl.textContent = moves;

                renderBoard();

                // Check win
                if (checkWin()) {
                    handleWin();
                }
            }
        }

        // Check win condition
        function checkWin() {
            for (let i = 0; i < tiles.length - 1; i++) {
                if (tiles[i] !== i + 1) return false;
            }
            return true;
        }

        // Shuffle board
        function shuffleBoard() {
            isPlaying = false;
            clearInterval(timerInterval);

            // Perform random valid moves
            const shuffleCount = gridSize * gridSize * 20;
            for (let i = 0; i < shuffleCount; i++) {
                const validMoves = getValidMoves();
                const randomMove = validMoves[Math.floor(Math.random() * validMoves.length)];

                [tiles[randomMove], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[randomMove]];
                emptyIndex = randomMove;
            }

            moves = 0;
            seconds = 0;
            movesEl.textContent = '0';
            timeEl.textContent = '00:00';

            renderBoard();
            startGame();
        }

        // Get valid moves
        function getValidMoves() {
            const moves = [];
            const emptyRow = Math.floor(emptyIndex / gridSize);
            const emptyCol = emptyIndex % gridSize;

            if (emptyRow > 0) moves.push(emptyIndex - gridSize); // Up
            if (emptyRow < gridSize - 1) moves.push(emptyIndex + gridSize); // Down
            if (emptyCol > 0) moves.push(emptyIndex - 1); // Left
            if (emptyCol < gridSize - 1) moves.push(emptyIndex + 1); // Right

            return moves;
        }

        // Start game
        function startGame() {
            isPlaying = true;
            timerInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                timeEl.textContent = `${mins}:${secs}`;
            }, 1000);
        }

        // Handle win
        function handleWin() {
            isPlaying = false;
            clearInterval(timerInterval);

            // Update best time
            if (seconds < bestTimes[gridSize]) {
                bestTimes[gridSize] = seconds;
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                bestEl.textContent = `${mins}:${secs}`;
            }

            // Show win modal
            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('finalTime').textContent = timeEl.textContent;
            winModal.classList.add('show');
        }

        // Reset to solved state
        function resetBoard() {
            isPlaying = false;
            clearInterval(timerInterval);

            tiles = [];
            for (let i = 1; i < gridSize * gridSize; i++) {
                tiles.push(i);
            }
            tiles.push(0);
            emptyIndex = gridSize * gridSize - 1;

            moves = 0;
            seconds = 0;
            movesEl.textContent = '0';
            timeEl.textContent = '00:00';

            renderBoard();
        }

        // Difficulty buttons
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                gridSize = parseInt(btn.dataset.size);

                // Update best time display
                const best = bestTimes[gridSize];
                if (best === Infinity) {
                    bestEl.textContent = '--';
                } else {
                    const mins = Math.floor(best / 60).toString().padStart(2, '0');
                    const secs = (best % 60).toString().padStart(2, '0');
                    bestEl.textContent = `${mins}:${secs}`;
                }

                resetBoard();
            });
        });

        // Control buttons
        document.getElementById('shuffleBtn').addEventListener('click', shuffleBoard);
        document.getElementById('resetBtn').addEventListener('click', resetBoard);
        document.getElementById('playAgainBtn').addEventListener('click', () => {
            winModal.classList.remove('show');
            shuffleBoard();
        });

        // Fullscreen
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Initialize
        initBoard();
        shuffleBoard();
    </script>
</body>
</html>
