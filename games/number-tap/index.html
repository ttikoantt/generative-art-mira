<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Tap - 数字タップ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #fff;
            font-size: 1.8rem;
            font-weight: bold;
        }

        .game-area {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 400px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            margin: 0 auto 20px;
            overflow: hidden;
        }

        .number-btn {
            position: absolute;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: 3px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            user-select: none;
            -webkit-user-select: none;
        }

        .number-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(100, 100, 255, 0.5);
        }

        .number-btn:active {
            transform: scale(0.95);
        }

        .number-btn.correct {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            animation: correctPulse 0.5s ease;
        }

        .number-btn.wrong {
            background: linear-gradient(135deg, #eb3349, #f45c43);
            animation: wrongShake 0.5s ease;
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            z-index: 10;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .overlay p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 25px;
            max-width: 300px;
            line-height: 1.6;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: #fff;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(100, 100, 255, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.2);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 15px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2rem;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .difficulty-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .difficulty-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 8px 20px;
            font-size: 0.9rem;
        }

        .difficulty-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: #fff;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            .game-area {
                height: 350px;
            }

            .number-btn {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }

            .stats {
                flex-direction: column;
                align-items: center;
            }

            .stat-box {
                width: 100%;
                max-width: 200px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <h1>🔢 Number Tap</h1>
        <p class="subtitle">数字を順番にタップしよう！</p>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">次の数字</div>
                <div class="stat-value" id="nextNumber">1</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">最高記録</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>

        <div class="difficulty-selector">
            <button class="difficulty-btn active" data-difficulty="easy" onclick="setDifficulty('easy')">
                😊 EASY (1-10)
            </button>
            <button class="difficulty-btn" data-difficulty="medium" onclick="setDifficulty('medium')">
                😐 NORMAL (1-20)
            </button>
            <button class="difficulty-btn" data-difficulty="hard" onclick="setDifficulty('hard')">
                😈 HARD (1-30)
            </button>
        </div>

        <div class="game-area" id="gameArea">
            <div class="overlay" id="overlay">
                <h2 id="overlayTitle">🎮 数字タップ</h2>
                <p id="overlayText">1から順番に数字をタップして、できるだけ早くクリアしよう！</p>
                <button onclick="startGame()">スタート</button>
            </div>
        </div>

        <div class="controls">
            <button onclick="startGame()">🔄 もう一度</button>
            <button class="secondary" onclick="showInstructions()">❓ ルール</button>
        </div>
    </div>

    <script>
        let score = 0;
        let nextNumber = 1;
        let highScore = 0;
        let gameActive = false;
        let difficulty = 'easy';
        let maxNumber = 10;
        let startTime = null;
        let numbers = [];

        const gameArea = document.getElementById('gameArea');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlayText = document.getElementById('overlayText');

        function setDifficulty(diff) {
            difficulty = diff;
            const difficulties = {
                'easy': 10,
                'medium': 20,
                'hard': 30
            };
            maxNumber = difficulties[diff];

            // ボタンのアクティブ状態を更新
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.difficulty === diff) {
                    btn.classList.add('active');
                }
            });

            // 最高記録を更新
            updateHighScore();
        }

        function updateHighScore() {
            const saved = localStorage.getItem(`numberTapHighScore_${difficulty}`);
            highScore = saved ? parseInt(saved) : 0;
            document.getElementById('highScore').textContent = highScore;
        }

        function saveHighScore() {
            if (score > highScore) {
                highScore = score;
                localStorage.setItem(`numberTapHighScore_${difficulty}`, highScore);
                document.getElementById('highScore').textContent = highScore;
            }
        }

        function startGame() {
            score = 0;
            nextNumber = 1;
            gameActive = true;
            startTime = Date.now();
            numbers = [];

            document.getElementById('score').textContent = score;
            document.getElementById('nextNumber').textContent = nextNumber;
            overlay.classList.add('hidden');

            // 数字を生成
            generateNumbers();
        }

        function generateNumbers() {
            // 既存の数字をクリア
            const existingBtns = gameArea.querySelectorAll('.number-btn');
            existingBtns.forEach(btn => btn.remove());

            numbers = [];
            for (let i = 1; i <= maxNumber; i++) {
                numbers.push(i);
            }

            // 数字を配置
            numbers.forEach(num => {
                const btn = document.createElement('div');
                btn.className = 'number-btn';
                btn.textContent = num;
                btn.dataset.number = num;

                // ランダムな位置に配置（重ならないように）
                let x, y, overlap;
                let attempts = 0;
                do {
                    x = Math.random() * (gameArea.offsetWidth - 70);
                    y = Math.random() * (gameArea.offsetHeight - 70);
                    overlap = checkOverlap(x, y);
                    attempts++;
                } while (overlap && attempts < 50);

                btn.style.left = x + 'px';
                btn.style.top = y + 'px';

                btn.addEventListener('click', () => handleNumberClick(num, btn));
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    handleNumberClick(num, btn);
                });

                gameArea.appendChild(btn);
            });
        }

        function checkOverlap(x, y) {
            const buttons = gameArea.querySelectorAll('.number-btn');
            for (let btn of buttons) {
                const bx = parseFloat(btn.style.left);
                const by = parseFloat(btn.style.top);
                const distance = Math.sqrt((x - bx) ** 2 + (y - by) ** 2);
                if (distance < 70) {
                    return true;
                }
            }
            return false;
        }

        function handleNumberClick(num, btn) {
            if (!gameActive) return;

            if (num === nextNumber) {
                // 正解！
                btn.classList.add('correct');
                setTimeout(() => btn.remove(), 300);

                score++;
                nextNumber++;

                document.getElementById('score').textContent = score;
                document.getElementById('nextNumber').textContent = nextNumber > maxNumber ? '✓' : nextNumber;

                if (nextNumber > maxNumber) {
                    // クリア！
                    gameActive = false;
                    saveHighScore();
                    showGameComplete();
                }
            } else {
                // 間違い！
                btn.classList.add('wrong');
                setTimeout(() => btn.classList.remove('wrong'), 500);
            }
        }

        function showGameComplete() {
            const timeTaken = ((Date.now() - startTime) / 1000).toFixed(1);

            overlayTitle.textContent = '🎉 クリア！';
            overlayText.innerHTML = `
                おめでとうございます！<br><br>
                タイム: ${timeTaken}秒<br>
                難易度: ${difficulty.toUpperCase()}
            `;
            overlay.classList.remove('hidden');
        }

        function showInstructions() {
            gameActive = false;
            overlayTitle.textContent = '📖 ルール';
            overlayText.innerHTML = `
                1から順番に数字をタップしよう！<br><br>
                ⚠️ 間違えると揺れるよ<br>
                ⏱️ できるだけ早くクリアを目指そう<br>
                🏆 最高記録に挑戦だ！
            `;
            overlay.classList.remove('hidden');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        updateHighScore();
    </script>
</body>
</html>
