<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Number Tap - 数字タップゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            z-index: 10;
        }

        h1 {
            color: #ffffff;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: clamp(0.75rem, 2.5vw, 1rem);
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            z-index: 10;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .stat-label {
            font-size: 0.8em;
            opacity: 0.8;
            margin-right: 5px;
        }

        .game-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 500px;
            position: relative;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            width: 100%;
            aspect-ratio: 1;
        }

        .tile {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: bold;
            color: #667eea;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .tile:active {
            transform: scale(0.95);
        }

        .tile.tapped {
            background: rgba(255, 255, 255, 0.3);
            color: rgba(102, 126, 234, 0.3);
            animation: tapSuccess 0.3s ease;
        }

        .tile.wrong {
            background: rgba(255, 82, 82, 0.8);
            color: white;
            animation: shake 0.5s ease;
        }

        .tile.correct {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #2d5016;
        }

        @keyframes tapSuccess {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            animation: fadeIn 0.3s ease;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay-title {
            color: white;
            font-size: clamp(2rem, 8vw, 3.5rem);
            margin-bottom: 20px;
            text-align: center;
        }

        .overlay-score {
            color: rgba(255, 255, 255, 0.9);
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            margin-bottom: 30px;
            text-align: center;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #2d5016;
            font-size: clamp(1rem, 3.5vw, 1.3rem);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            margin: 10px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        @media (max-width: 400px) {
            .grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔢 Number Tap</h1>
        <p class="subtitle">1から順番にタップ！</p>
    </div>

    <div class="stats">
        <div class="stat">
            <span class="stat-label">次:</span>
            <span id="nextNumber">1</span>
        </div>
        <div class="stat">
            <span class="stat-label">タイム:</span>
            <span id="timer">0.0s</span>
        </div>
        <div class="stat">
            <span class="stat-label">ベスト:</span>
            <span id="bestTime">-</span>
        </div>
    </div>

    <div class="game-container">
        <div class="grid" id="grid"></div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="overlay" id="startOverlay">
        <div class="overlay-title">🔢 Number Tap</div>
        <div class="overlay-score">1から25まで順番にタップしよう！<br>最速でクリアを目指せ！</div>
        <button class="btn" onclick="startGame()">スタート</button>
    </div>

    <div class="overlay hidden" id="endOverlay">
        <div class="overlay-title" id="endTitle">🎉 完成！</div>
        <div class="overlay-score" id="endScore">タイム: 0.0秒</div>
        <button class="btn" onclick="startGame()">もう一度</button>
        <button class="btn btn-secondary" onclick="showStart()">メニュー</button>
    </div>

    <script>
        const GRID_SIZE = 25;
        let nextNumber = 1;
        let startTime = null;
        let timerInterval = null;
        let bestTime = localStorage.getItem('numberTapBest') || null;
        let tiles = [];

        function shuffle(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            tiles = [];

            const numbers = shuffle([...Array(GRID_SIZE)].map((_, i) => i + 1));

            numbers.forEach((num, index) => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.textContent = num;
                tile.dataset.number = num;
                tile.style.animationDelay = `${index * 0.02}s`;
                tile.addEventListener('click', () => handleTileClick(tile));
                tile.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    handleTileClick(tile);
                });
                grid.appendChild(tile);
                tiles.push(tile);
            });
        }

        function handleTileClick(tile) {
            if (!startTime || tile.classList.contains('tapped')) return;

            const number = parseInt(tile.dataset.number);

            if (number === nextNumber) {
                tile.classList.add('tapped', 'correct');
                nextNumber++;

                if (nextNumber > GRID_SIZE) {
                    endGame();
                } else {
                    document.getElementById('nextNumber').textContent = nextNumber;
                }
            } else {
                tile.classList.add('wrong');
                setTimeout(() => tile.classList.remove('wrong'), 500);
            }
        }

        function startGame() {
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('endOverlay').classList.add('hidden');

            nextNumber = 1;
            document.getElementById('nextNumber').textContent = '1';
            document.getElementById('timer').textContent = '0.0s';

            if (bestTime) {
                document.getElementById('bestTime').textContent = `${bestTime}s`;
            }

            createGrid();

            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 100);
        }

        function updateTimer() {
            if (!startTime) return;
            const elapsed = (Date.now() - startTime) / 1000;
            document.getElementById('timer').textContent = `${elapsed.toFixed(1)}s`;
        }

        function endGame() {
            clearInterval(timerInterval);
            const finalTime = ((Date.now() - startTime) / 1000).toFixed(1);

            if (!bestTime || parseFloat(finalTime) < parseFloat(bestTime)) {
                bestTime = finalTime;
                localStorage.setItem('numberTapBest', bestTime);
                document.getElementById('bestTime').textContent = `${bestTime}s`;
                document.getElementById('endTitle').textContent = '🏆 新記録！';
            } else {
                document.getElementById('endTitle').textContent = '🎉 完成！';
            }

            document.getElementById('endScore').textContent = `タイム: ${finalTime}秒`;
            document.getElementById('endOverlay').classList.remove('hidden');
        }

        function showStart() {
            document.getElementById('startOverlay').classList.remove('hidden');
            document.getElementById('endOverlay').classList.add('hidden');
        }

        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        }

        // Initialize
        if (bestTime) {
            document.getElementById('bestTime').textContent = `${bestTime}s`;
        }
    </script>
</body>
</html>
