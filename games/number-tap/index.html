<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Tap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 25px;
            border-radius: 20px;
            color: white;
            font-size: 1.1em;
        }
        .stat span {
            font-weight: bold;
            color: #00d4ff;
        }
        .game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 500px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
        }
        .number {
            position: absolute;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s ease;
            user-select: none;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }
        .number:active {
            transform: scale(0.95);
        }
        .number.correct {
            animation: correctPop 0.3s ease;
        }
        .number.wrong {
            animation: wrongShake 0.3s ease;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
        }
        @keyframes correctPop {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 10;
        }
        .overlay h2 {
            font-size: 2em;
            margin-bottom: 20px;
        }
        .overlay p {
            font-size: 1.2em;
            margin-bottom: 10px;
        }
        .overlay button {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 1.2em;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .overlay button:hover {
            transform: scale(1.05);
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            z-index: 100;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .hidden {
            display: none !important;
        }
        @media (max-width: 600px) {
            .header h1 {
                font-size: 2em;
            }
            .game-container {
                height: 400px;
            }
            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="header">
        <h1>Number Tap</h1>
        <p>数字を順番にタップ！</p>
    </div>

    <div class="stats">
        <div class="stat">スコア: <span id="score">0</span></div>
        <div class="stat">次: <span id="next">1</span></div>
        <div class="stat">時間: <span id="time">30</span>s</div>
    </div>

    <div class="game-container" id="gameContainer">
        <div class="overlay" id="startOverlay">
            <h2>Number Tap</h2>
            <p>1から順番にタップ！</p>
            <p>間違えるとゲームオーバー</p>
            <button onclick="startGame()">スタート</button>
        </div>
        <div class="overlay hidden" id="gameOverlay">
            <h2>ゲームオーバー</h2>
            <p>スコア: <span id="finalScore">0</span></p>
            <p>ハイスコア: <span id="highScore">0</span></p>
            <button onclick="startGame()">もう一度</button>
        </div>
    </div>

    <script>
        let score = 0;
        let nextNumber = 1;
        let timeLeft = 30;
        let gameInterval;
        let timerInterval;
        let numbers = [];
        let highScore = localStorage.getItem('numberTapHighScore') || 0;

        const gameContainer = document.getElementById('gameContainer');
        const scoreEl = document.getElementById('score');
        const nextEl = document.getElementById('next');
        const timeEl = document.getElementById('time');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverlay = document.getElementById('gameOverlay');
        const finalScoreEl = document.getElementById('finalScore');
        const highScoreEl = document.getElementById('highScore');

        function startGame() {
            score = 0;
            nextNumber = 1;
            timeLeft = 30;
            numbers = [];

            scoreEl.textContent = score;
            nextEl.textContent = nextNumber;
            timeEl.textContent = timeLeft;

            startOverlay.classList.add('hidden');
            gameOverlay.classList.add('hidden');

            clearNumbers();
            spawnNumbers(3);

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timeEl.textContent = timeLeft;
                if (timeLeft <= 0) {
                    gameOver();
                }
            }, 1000);
        }

        function clearNumbers() {
            const existing = gameContainer.querySelectorAll('.number');
            existing.forEach(n => n.remove());
        }

        function spawnNumbers(count) {
            const containerRect = gameContainer.getBoundingClientRect();
            const size = Math.min(60, containerRect.width / 5);

            for (let i = 0; i < count; i++) {
                const number = document.createElement('div');
                number.className = 'number';
                number.textContent = nextNumber + numbers.length;
                number.style.width = size + 'px';
                number.style.height = size + 'px';
                number.style.fontSize = (size * 0.4) + 'px';

                const maxX = containerRect.width - size;
                const maxY = containerRect.height - size;
                const x = Math.random() * maxX;
                const y = Math.random() * maxY;

                number.style.left = x + 'px';
                number.style.top = y + 'px';

                number.addEventListener('click', () => handleNumberClick(number, parseInt(number.textContent)));
                number.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    handleNumberClick(number, parseInt(number.textContent));
                });

                gameContainer.appendChild(number);
                numbers.push(parseInt(number.textContent));
            }
        }

        function handleNumberClick(element, number) {
            if (number === nextNumber) {
                element.classList.add('correct');
                setTimeout(() => element.remove(), 300);
                score++;
                nextNumber++;
                scoreEl.textContent = score;
                nextEl.textContent = nextNumber;

                if (numbers.indexOf(number) === numbers.length - 1) {
                    spawnNumbers(Math.min(5, 3 + Math.floor(score / 10)));
                }
            } else {
                element.classList.add('wrong');
                setTimeout(() => gameOver(), 500);
            }
        }

        function gameOver() {
            clearInterval(timerInterval);
            finalScoreEl.textContent = score;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('numberTapHighScore', highScore);
            }
            highScoreEl.textContent = highScore;

            gameOverlay.classList.remove('hidden');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
