<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cosmic Memory - 宇宙記憶ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0c0c1e 0%, #1a1a3e 50%, #0c0c1e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            text-align: center;
            z-index: 1;
            padding: 20px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(102, 126, 234, 0.2);
            padding: 15px 30px;
            border-radius: 10px;
            border: 2px solid rgba(102, 126, 234, 0.5);
        }

        .stat-label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 500px;
            margin: 0 auto 30px;
        }

        .card {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1a1a3e, #2a2a5e);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            transition: all 0.3s ease;
            border: 2px solid rgba(102, 126, 234, 0.3);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.2);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 30px rgba(102, 126, 234, 0.5);
        }

        .card.flipped {
            background: linear-gradient(135deg, #667eea, #764ba2);
            transform: rotateY(180deg);
            border-color: #f093fb;
            box-shadow: 0 0 40px rgba(240, 147, 251, 0.6);
        }

        .card.matched {
            opacity: 0.5;
            cursor: default;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border-color: #f5576c;
        }

        .card-back {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: rgba(102, 126, 234, 0.5);
        }

        .card-content {
            display: none;
        }

        .card.flipped .card-back {
            display: none;
        }

        .card.flipped .card-content {
            display: block;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 30px rgba(102, 126, 234, 0.7);
        }

        .btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(102, 126, 234, 0.3);
            color: #fff;
            border: 2px solid rgba(102, 126, 234, 0.5);
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 24px;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(102, 126, 234, 0.5);
        }

        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 200;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .game-over.show {
            display: flex;
        }

        .game-over h2 {
            font-size: 3em;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-over p {
            font-size: 1.5em;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .game-board {
                grid-template-columns: repeat(4, 1fr);
                gap: 10px;
            }

            .card {
                width: 60px;
                height: 60px;
                font-size: 30px;
            }

            .stats {
                gap: 15px;
            }

            .stat {
                padding: 10px 20px;
            }

            .stat-value {
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            .card {
                width: 50px;
                height: 50px;
                font-size: 24px;
            }

            h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <canvas class="stars" id="stars"></canvas>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <h1>🌌 Cosmic Memory</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">移動回数</div>
                <div class="stat-value" id="moves">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">マッチ</div>
                <div class="stat-value" id="matches">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">タイム</div>
                <div class="stat-value" id="time">0:00</div>
            </div>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="buttons">
            <button class="btn" onclick="restartGame()">🔄 再開</button>
            <button class="btn" onclick="changeDifficulty()">⚙️ 難易度変更</button>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>🎉 クリア！</h2>
        <p>移動回数: <span id="finalMoves">0</span></p>
        <p>タイム: <span id="finalTime">0:00</span></p>
        <button class="btn" onclick="restartGame()">🔄 もう一度</button>
    </div>

    <script>
        // Stars background
        const starsCanvas = document.getElementById('stars');
        const starsCtx = starsCanvas.getContext('2d');
        let stars = [];

        function initStars() {
            starsCanvas.width = window.innerWidth;
            starsCanvas.height = window.innerHeight;
            stars = [];

            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * starsCanvas.width,
                    y: Math.random() * starsCanvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5 + 0.1,
                    brightness: Math.random()
                });
            }
        }

        function animateStars() {
            starsCtx.fillStyle = 'rgba(12, 12, 30, 0.1)';
            starsCtx.fillRect(0, 0, starsCanvas.width, starsCanvas.height);

            stars.forEach(star => {
                star.brightness += 0.02;
                const alpha = Math.abs(Math.sin(star.brightness));

                starsCtx.beginPath();
                starsCtx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                starsCtx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                starsCtx.fill();

                star.y += star.speed;
                if (star.y > starsCanvas.height) {
                    star.y = 0;
                    star.x = Math.random() * starsCanvas.width;
                }
            });

            requestAnimationFrame(animateStars);
        }

        initStars();
        animateStars();

        window.addEventListener('resize', () => {
            initStars();
        });

        // Game logic
        const cosmicEmojis = ['🚀', '🛸', '⭐', '🌙', '🌍', '🪐', '☄️', '🌟', '🌌', '💫', '🔭', '👽'];

        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let timer = null;
        let seconds = 0;
        let isProcessing = false;
        let currentDifficulty = 'easy';

        const difficulties = {
            easy: { pairs: 6, gridSize: 3 },  // 12 cards (3x4)
            medium: { pairs: 8, gridSize: 4 },  // 16 cards (4x4)
            hard: { pairs: 12, gridSize: 4 }  // 24 cards (4x6)
        };

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initGame() {
            const difficulty = difficulties[currentDifficulty];
            const numPairs = difficulty.pairs;

            // Stop timer
            if (timer) clearInterval(timer);

            // Reset stats
            matchedPairs = 0;
            moves = 0;
            seconds = 0;
            flippedCards = [];
            isProcessing = false;

            updateStats();
            startTimer();

            // Create cards
            const selectedEmojis = shuffleArray([...cosmicEmojis]).slice(0, numPairs);
            const cardPairs = [...selectedEmojis, ...selectedEmojis];
            shuffleArray(cardPairs);

            // Render board
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(${difficulty.gridSize}, 1fr)`;

            cards = cardPairs.map((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-back">❓</div>
                    <div class="card-content">${emoji}</div>
                `;
                card.dataset.index = index;
                card.dataset.emoji = emoji;
                card.addEventListener('click', () => flipCard(card));
                board.appendChild(card);
                return card;
            });
        }

        function flipCard(card) {
            if (isProcessing) return;
            if (card.classList.contains('flipped')) return;
            if (card.classList.contains('matched')) return;
            if (flippedCards.length >= 2) return;

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                moves++;
                updateStats();
                checkMatch();
            }
        }

        function checkMatch() {
            isProcessing = true;
            const [card1, card2] = flippedCards;

            if (card1.dataset.emoji === card2.dataset.emoji) {
                // Match!
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    matchedPairs++;
                    flippedCards = [];
                    isProcessing = false;

                    updateStats();

                    const difficulty = difficulties[currentDifficulty];
                    if (matchedPairs === difficulty.pairs) {
                        endGame();
                    }
                }, 500);
            } else {
                // No match
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    isProcessing = false;
                }, 1000);
            }
        }

        function updateStats() {
            document.getElementById('moves').textContent = moves;
            document.getElementById('matches').textContent = matchedPairs;
        }

        function startTimer() {
            timer = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                document.getElementById('time').textContent =
                    `${mins}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function endGame() {
            clearInterval(timer);
            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('finalTime').textContent = document.getElementById('time').textContent;
            document.getElementById('gameOver').classList.add('show');
        }

        function restartGame() {
            document.getElementById('gameOver').classList.remove('show');
            initGame();
        }

        function changeDifficulty() {
            const difficulties_list = ['easy', 'medium', 'hard'];
            const currentIndex = difficulties_list.indexOf(currentDifficulty);
            currentDifficulty = difficulties_list[(currentIndex + 1) % difficulties_list.length];
            restartGame();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Start game
        initGame();
    </script>
</body>
</html>
