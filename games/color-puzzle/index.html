<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Color Pop - 色ブロックパズル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container {
            text-align: center;
            color: white;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .score {
            font-size: 1.5rem;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 30px;
            border-radius: 25px;
            display: inline-block;
        }

        #game-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            margin: 0 auto;
        }

        .cell {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.2);
        }

        .cell:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.3);
        }

        .cell:active {
            transform: scale(0.95);
        }

        .cell.popped {
            animation: pop 0.3s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: white;
            border: none;
            color: #667eea;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9rem;
        }

        .combo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
            animation: comboAnim 0.8s ease-out forwards;
            pointer-events: none;
            z-index: 1000;
        }

        @keyframes comboAnim {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        @media (max-width: 500px) {
            .cell {
                width: 35px;
                height: 35px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">📺 全画面</button>
    
    <div class="container">
        <h1>🎨 Color Pop</h1>
        <div class="score">スコア: <span id="score">0</span></div>
        
        <div id="game-board"></div>
        
        <div class="controls">
            <button onclick="initGame()">🔄 新規ゲーム</button>
        </div>
        
        <p class="info">💡 同じ色のブロックを3つ以上繋げて消そう！</p>
    </div>

    <script>
        const COLORS = [
            '#FF6B6B', // 赤
            '#4ECDC4', // 水色
            '#45B7D1', // 青
            '#FFA07A', // オレンジ
            '#98D8C8', // 緑
            '#F7DC6F', // 黄色
        ];

        const BOARD_SIZE = 8;
        let board = [];
        let score = 0;
        let combo = 0;

        // ゲーム初期化
        function initGame() {
            board = [];
            score = 0;
            combo = 0;
            document.getElementById('score').textContent = score;
            
            const gameBoard = document.getElementById('game-board');
            gameBoard.innerHTML = '';
            
            // ボード作成
            for (let i = 0; i < BOARD_SIZE; i++) {
                board[i] = [];
                for (let j = 0; j < BOARD_SIZE; j++) {
                    board[i][j] = Math.floor(Math.random() * COLORS.length);
                }
            }
            
            renderBoard();
        }

        // ボード描画
        function renderBoard() {
            const gameBoard = document.getElementById('game-board');
            gameBoard.innerHTML = '';
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.style.backgroundColor = COLORS[board[i][j]];
                    cell.dataset.row = i;
                    cell.dataset.col = j;
                    
                    if (board[i][j] !== -1) {
                        cell.addEventListener('click', () => handleClick(i, j));
                    }
                    
                    gameBoard.appendChild(cell);
                }
            }
        }

        // クリック処理
        function handleClick(row, col) {
            const color = board[row][col];
            if (color === -1) return;
            
            // 連続したブロックを検索
            const connected = getConnectedBlocks(row, col, color);
            
            if (connected.length >= 3) {
                // コンボ計算
                combo++;
                const points = connected.length * 10 * combo;
                score += points;
                document.getElementById('score').textContent = score;
                
                // コンボ表示
                if (combo >= 2) {
                    showCombo(combo);
                }
                
                // ブロックを消す
                connected.forEach(({row, col}) => {
                    const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
                    if (cell) {
                        cell.classList.add('popped');
                    }
                    board[row][col] = -1;
                });
                
                // 落下処理
                setTimeout(() => {
                    dropBlocks();
                    fillBoard();
                    renderBoard();
                }, 300);
            } else {
                combo = 0;
            }
        }

        // 連続ブロック検索
        function getConnectedBlocks(row, col, color, visited = new Set()) {
            const key = `${row},${col}`;
            if (visited.has(key)) return [];
            if (row < 0 || row >= BOARD_SIZE || col < 0 || col >= BOARD_SIZE) return [];
            if (board[row][col] !== color) return [];
            
            visited.add(key);
            let connected = [{row, col}];
            
            // 上下左右をチェック
            connected = connected.concat(getConnectedBlocks(row - 1, col, color, visited));
            connected = connected.concat(getConnectedBlocks(row + 1, col, color, visited));
            connected = connected.concat(getConnectedBlocks(row, col - 1, color, visited));
            connected = connected.concat(getConnectedBlocks(row, col + 1, color, visited));
            
            return connected;
        }

        // ブロック落下
        function dropBlocks() {
            for (let col = 0; col < BOARD_SIZE; col++) {
                let emptyRow = BOARD_SIZE - 1;
                
                for (let row = BOARD_SIZE - 1; row >= 0; row--) {
                    if (board[row][col] !== -1) {
                        if (row !== emptyRow) {
                            board[emptyRow][col] = board[row][col];
                            board[row][col] = -1;
                        }
                        emptyRow--;
                    }
                }
            }
        }

        // ボード埋める
        function fillBoard() {
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (board[i][j] === -1) {
                        board[i][j] = Math.floor(Math.random() * COLORS.length);
                    }
                }
            }
        }

        // コンボ表示
        function showCombo(count) {
            const comboDiv = document.createElement('div');
            comboDiv.className = 'combo';
            comboDiv.textContent = `${count} COMBO!`;
            document.body.appendChild(comboDiv);
            
            setTimeout(() => {
                comboDiv.remove();
            }, 800);
        }

        // 全画面
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ゲーム開始
        initGame();
    </script>
</body>
</html>
