<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Color Gradient Puzzle - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 20px;
            overflow: hidden;
        }
        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .level-info {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .grid {
            display: grid;
            gap: 8px;
            margin-bottom: 20px;
        }
        .grid-3x3 {
            grid-template-columns: repeat(3, 1fr);
        }
        .grid-4x4 {
            grid-template-columns: repeat(4, 1fr);
        }
        .tile {
            aspect-ratio: 1;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }
        .tile:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        .tile.selected {
            outline: 4px solid #333;
            outline-offset: -4px;
        }
        .tile.correct {
            animation: pulse 0.5s;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .controls button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .controls button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        .controls button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .moves {
            text-align: center;
            color: #333;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            color: #333;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 100;
        }
        .instructions {
            background: rgba(102, 126, 234, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #555;
            line-height: 1.6;
        }
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .success-overlay.show {
            display: flex;
        }
        .success-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.5s;
        }
        @keyframes popIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        .success-content h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 32px;
        }
        .success-content p {
            color: #666;
            margin-bottom: 20px;
            font-size: 18px;
        }
        .target-gradient {
            display: flex;
            gap: 2px;
            height: 30px;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .target-swatch {
            flex: 1;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="game-container">
        <h1>🎨 Color Gradient Puzzle</h1>
        <div class="level-info">Level: <span id="level">1</span></div>

        <div class="instructions">
            🎯 タイルをクリックして選択、スワップして色のグラデーションを完成させて！
        </div>

        <div class="target-gradient" id="targetGradient"></div>

        <div class="moves">手数: <span id="moves">0</span></div>

        <div class="grid grid-3x3" id="grid"></div>

        <div class="controls">
            <button onclick="resetLevel()">リセット</button>
            <button onclick="shuffle()">シャッフル</button>
        </div>
    </div>

    <div class="success-overlay" id="successOverlay">
        <div class="success-content">
            <h2>🎉 クリア！</h2>
            <p>Level <span id="clearedLevel">1</span> を <span id="finalMoves">0</span> 手でクリア！</p>
            <button onclick="nextLevel()">次のレベルへ</button>
        </div>
    </div>

    <script>
        let gridSize = 3;
        let tiles = [];
        let selectedTile = null;
        let moves = 0;
        let level = 1;
        let correctColors = [];

        function generateGradient() {
            const hue = Math.random() * 360;
            const colors = [];
            const count = gridSize * gridSize;

            for (let i = 0; i < count; i++) {
                const lightness = 30 + (i / (count - 1)) * 40;
                const saturation = 70;
                colors.push(`hsl(${hue}, ${saturation}%, ${lightness}%)`);
            }

            return colors;
        }

        function createTiles() {
            const grid = document.getElementById('grid');
            grid.className = `grid grid-${gridSize}x${gridSize}`;
            grid.innerHTML = '';
            tiles = [];
            selectedTile = null;

            correctColors = generateGradient();
            const shuffled = [...correctColors].sort(() => Math.random() - 0.5);

            for (let i = 0; i < gridSize * gridSize; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.style.backgroundColor = shuffled[i];
                tile.dataset.index = i;
                tile.dataset.correctIndex = correctColors.indexOf(shuffled[i]);
                tile.addEventListener('click', () => selectTile(tile));
                grid.appendChild(tile);
                tiles.push(tile);
            }

            updateTargetGradient();
        }

        function updateTargetGradient() {
            const targetGradient = document.getElementById('targetGradient');
            targetGradient.innerHTML = '';
            correctColors.forEach(color => {
                const swatch = document.createElement('div');
                swatch.className = 'target-swatch';
                swatch.style.backgroundColor = color;
                targetGradient.appendChild(swatch);
            });
        }

        function selectTile(tile) {
            if (selectedTile === tile) {
                tile.classList.remove('selected');
                selectedTile = null;
                return;
            }

            if (selectedTile) {
                // Swap colors
                const temp = selectedTile.style.backgroundColor;
                selectedTile.style.backgroundColor = tile.style.backgroundColor;
                tile.style.backgroundColor = temp;

                selectedTile.classList.remove('selected');
                selectedTile = null;
                moves++;
                document.getElementById('moves').textContent = moves;

                checkWin();
            } else {
                selectedTile = tile;
                tile.classList.add('selected');
            }
        }

        function checkWin() {
            const currentColors = tiles.map(tile => tile.style.backgroundColor);
            const isCorrect = currentColors.every((color, i) => {
                // RGB to HSL comparison for better accuracy
                return colorsMatch(color, correctColors[i]);
            });

            if (isCorrect) {
                setTimeout(() => {
                    showSuccess();
                }, 300);
            }
        }

        function colorsMatch(color1, color2) {
            // Simple string comparison for now
            return color1 === color2;
        }

        function showSuccess() {
            document.getElementById('clearedLevel').textContent = level;
            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('successOverlay').classList.add('show');
        }

        function resetLevel() {
            moves = 0;
            document.getElementById('moves').textContent = moves;
            createTiles();
        }

        function shuffle() {
            moves = 0;
            document.getElementById('moves').textContent = moves;
            const colors = tiles.map(tile => tile.style.backgroundColor);
            const shuffled = colors.sort(() => Math.random() - 0.5);

            tiles.forEach((tile, i) => {
                tile.style.backgroundColor = shuffled[i];
            });
        }

        function nextLevel() {
            document.getElementById('successOverlay').classList.remove('show');
            level++;
            document.getElementById('level').textContent = level;
            moves = 0;
            document.getElementById('moves').textContent = moves;

            if (level % 3 === 1 && gridSize < 5) {
                gridSize = Math.min(gridSize + 1, 5);
            }

            createTiles();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        createTiles();
    </script>
</body>
</html>
