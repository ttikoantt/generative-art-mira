<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Sprint - 計算スプリント</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 10px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            flex: 1;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #4ade80;
            font-size: 24px;
            font-weight: bold;
        }

        .problem {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
        }

        .problem-text {
            color: #fff;
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .timer {
            color: #f87171;
            font-size: 14px;
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 15px;
            color: #fff;
            font-size: 24px;
            text-align: center;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #4ade80;
        }

        button {
            background: #4ade80;
            color: #0a0a0f;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #22c55e;
            transform: scale(1.05);
        }

        .feedback {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            min-height: 30px;
        }

        .feedback.correct {
            color: #4ade80;
        }

        .feedback.wrong {
            color: #f87171;
        }

        .start-screen {
            text-align: center;
        }

        .start-screen p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .start-btn {
            width: 100%;
            font-size: 20px;
            padding: 20px;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .problem-text {
                font-size: 36px;
            }

            .stat-value {
                font-size: 20px;
            }

            input {
                font-size: 20px;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Math Sprint 💨</h1>

        <div id="start-screen" class="start-screen">
            <p>簡単な計算問題を素早く解いてスコアを稼ごう！</p>
            <p>制限時間は60秒。間違えるとペナルティ！</p>
            <button class="start-btn" onclick="startGame()">スタート</button>
        </div>

        <div id="game-screen" class="hidden">
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">スコア</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">時間</div>
                    <div class="stat-value" id="time">60</div>
                </div>
                <div class="stat">
                    <div class="stat-label">連続正解</div>
                    <div class="stat-value" id="streak">0</div>
                </div>
            </div>

            <div class="problem">
                <div class="problem-text" id="problem">2 + 3 = ?</div>
                <div class="timer" id="timer"></div>
            </div>

            <div class="input-area">
                <input type="number" id="answer" placeholder="答え" onkeypress="handleEnter(event)">
                <button onclick="checkAnswer()">送信</button>
            </div>

            <div class="feedback" id="feedback"></div>
        </div>

        <div id="end-screen" class="hidden" style="text-align: center;">
            <p style="color: rgba(255, 255, 255, 0.7); margin-bottom: 20px;">タイムアップ！</p>
            <div class="stat" style="margin-bottom: 20px;">
                <div class="stat-label">最終スコア</div>
                <div class="stat-value" id="final-score">0</div>
            </div>
            <button class="start-btn" onclick="startGame()">もう一度</button>
        </div>
    </div>

    <script>
        let score = 0;
        let timeLeft = 60;
        let streak = 0;
        let currentAnswer = 0;
        let timerInterval;
        let gameActive = false;

        function generateProblem() {
            const operations = ['+', '-', '×'];
            const operation = operations[Math.floor(Math.random() * operations.length)];
            let a, b;

            if (operation === '+') {
                a = Math.floor(Math.random() * 50) + 1;
                b = Math.floor(Math.random() * 50) + 1;
                currentAnswer = a + b;
            } else if (operation === '-') {
                a = Math.floor(Math.random() * 50) + 10;
                b = Math.floor(Math.random() * a);
                currentAnswer = a - b;
            } else {
                a = Math.floor(Math.random() * 12) + 1;
                b = Math.floor(Math.random() * 12) + 1;
                currentAnswer = a * b;
            }

            document.getElementById('problem').textContent = `${a} ${operation} ${b} = ?`;
        }

        function checkAnswer() {
            if (!gameActive) return;

            const userAnswer = parseInt(document.getElementById('answer').value);
            const feedback = document.getElementById('feedback');

            if (userAnswer === currentAnswer) {
                streak++;
                const bonus = Math.floor(streak / 3);
                score += 10 + bonus;
                feedback.textContent = `正解！+${10 + bonus}点 (連続${streak}回)`;
                feedback.className = 'feedback correct';
            } else {
                streak = 0;
                score = Math.max(0, score - 5);
                feedback.textContent = `間違い！-5点 答えは${currentAnswer}`;
                feedback.className = 'feedback wrong';
            }

            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('answer').value = '';

            generateProblem();
        }

        function handleEnter(event) {
            if (event.key === 'Enter') {
                checkAnswer();
            }
        }

        function updateTimer() {
            timeLeft--;
            document.getElementById('time').textContent = timeLeft;

            if (timeLeft <= 10) {
                document.getElementById('timer').textContent = '⏰ 残り時間わずか！';
            }

            if (timeLeft <= 0) {
                endGame();
            }
        }

        function startGame() {
            score = 0;
            timeLeft = 60;
            streak = 0;
            gameActive = true;

            document.getElementById('score').textContent = score;
            document.getElementById('time').textContent = timeLeft;
            document.getElementById('streak').textContent = streak;
            document.getElementById('feedback').textContent = '';
            document.getElementById('timer').textContent = '';

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');

            generateProblem();
            document.getElementById('answer').focus();

            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);

            document.getElementById('final-score').textContent = score;
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
