<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Speed Game - #834</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', monospace;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .game-container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
      width: 90%;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    .stats {
      display: flex;
      justify-content: space-around;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .stat {
      background: rgba(255,255,255,0.1);
      padding: 0.8rem 1.5rem;
      border-radius: 10px;
      backdrop-filter: blur(10px);
    }

    .stat-label {
      font-size: 0.8rem;
      opacity: 0.8;
      margin-bottom: 0.3rem;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: bold;
    }

    .word-display {
      background: rgba(255,255,255,0.15);
      padding: 2rem;
      border-radius: 15px;
      margin-bottom: 1.5rem;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
    }

    #word {
      font-size: 2.5rem;
      letter-spacing: 2px;
    }

    #input {
      width: 100%;
      padding: 1rem;
      font-size: 1.5rem;
      font-family: 'Courier New', monospace;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.9);
      color: #333;
      text-align: center;
      margin-bottom: 1rem;
    }

    #input:focus {
      outline: none;
      box-shadow: 0 0 20px rgba(255,255,255,0.3);
    }

    .correct {
      color: #4ade80 !important;
      text-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
    }

    .incorrect {
      color: #f87171 !important;
      animation: shake 0.3s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .btn {
      background: #fff;
      color: #1e3c72;
      border: none;
      padding: 1rem 2rem;
      font-size: 1.1rem;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      margin: 0.5rem;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    .message {
      font-size: 1.2rem;
      margin-top: 1rem;
      min-height: 1.5rem;
      opacity: 0.9;
    }

    .difficulty {
      margin-bottom: 1rem;
    }

    .difficulty button {
      background: rgba(255,255,255,0.2);
      color: #fff;
      border: 2px solid rgba(255,255,255,0.3);
      padding: 0.5rem 1rem;
      margin: 0.2rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .difficulty button.active {
      background: #fff;
      color: #1e3c72;
      border-color: #fff;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.5rem; }
      #word { font-size: 2rem; }
      .stat-value { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <h1>⌨️ Typing Speed Game</h1>

    <div class="difficulty">
      <button onclick="setDifficulty('easy')" class="active" id="btn-easy">Easy</button>
      <button onclick="setDifficulty('medium')" id="btn-medium">Medium</button>
      <button onclick="setDifficulty('hard')" id="btn-hard">Hard</button>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">SCORE</div>
        <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">WPM</div>
        <div class="stat-value" id="wpm">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">STREAK</div>
        <div class="stat-value" id="streak">0</div>
      </div>
    </div>

    <div class="word-display">
      <div id="word">Click Start!</div>
    </div>

    <input type="text" id="input" placeholder="Type here..." disabled>

    <div>
      <button class="btn" onclick="startGame()">Start Game</button>
      <button class="btn" onclick="resetGame()">Reset</button>
    </div>

    <div class="message" id="message"></div>
  </div>

  <script>
    const words = {
      easy: [
        'cat', 'dog', 'sun', 'run', 'jump', 'blue', 'red', 'green',
        'tree', 'book', 'play', 'game', 'code', 'type', 'fast', 'slow',
        'happy', 'smile', 'world', 'hello', 'start', 'stop', 'open', 'close'
      ],
      medium: [
        'keyboard', 'screen', 'mouse', 'window', 'program', 'function',
        'variable', 'syntax', 'compile', 'execute', 'browser', 'website',
        'network', 'server', 'client', 'database', 'algorithm', 'debug',
        'framework', 'library', 'interface', 'component', 'module', 'class'
      ],
      hard: [
        'asynchronous', 'synchronization', 'encapsulation', 'polymorphism',
        'authentication', 'authorization', 'cryptocurrency', 'blockchain',
        'machinelearning', 'virtualization', 'microservices', 'containerization',
        'responsiveness', 'accessibility', 'optimization', 'parallelization',
        'decentralization', 'interoperability', 'scalability', 'maintainability'
      ]
    };

    let currentWord = '';
    let score = 0;
    let streak = 0;
    let maxStreak = 0;
    let correctCount = 0;
    let startTime = null;
    let gameActive = false;
    let difficulty = 'easy';
    let wordList = words.easy;

    const wordEl = document.getElementById('word');
    const inputEl = document.getElementById('input');
    const scoreEl = document.getElementById('score');
    const wpmEl = document.getElementById('wpm');
    const streakEl = document.getElementById('streak');
    const messageEl = document.getElementById('message');

    function setDifficulty(level) {
      difficulty = level;
      wordList = words[level];

      // Update button styles
      document.querySelectorAll('.difficulty button').forEach(btn => {
        btn.classList.remove('active');
      });
      document.getElementById(`btn-${level}`).classList.add('active');

      messageEl.textContent = `Difficulty: ${level.charAt(0).toUpperCase() + level.slice(1)}`;
    }

    function getRandomWord() {
      return wordList[Math.floor(Math.random() * wordList.length)];
    }

    function startGame() {
      gameActive = true;
      score = 0;
      streak = 0;
      correctCount = 0;
      startTime = Date.now();
      inputEl.disabled = false;
      inputEl.value = '';
      inputEl.focus();
      updateStats();
      showNewWord();
      messageEl.textContent = 'Type the word!';
    }

    function showNewWord() {
      currentWord = getRandomWord();
      wordEl.textContent = currentWord;
      wordEl.className = '';
    }

    function updateStats() {
      scoreEl.textContent = score;
      streakEl.textContent = streak;

      // Calculate WPM
      if (startTime && correctCount > 0) {
        const minutes = (Date.now() - startTime) / 60000;
        const wpm = Math.round(correctCount / minutes);
        wpmEl.textContent = wpm;
      }
    }

    function resetGame() {
      gameActive = false;
      score = 0;
      streak = 0;
      correctCount = 0;
      startTime = null;
      inputEl.disabled = true;
      inputEl.value = '';
      wordEl.textContent = 'Click Start!';
      wordEl.className = '';
      updateStats();
      messageEl.textContent = '';
      wpmEl.textContent = '0';
    }

    inputEl.addEventListener('input', (e) => {
      if (!gameActive) return;

      const typed = inputEl.value.toLowerCase();

      if (typed === currentWord.toLowerCase()) {
        // Correct!
        score += 10 + (streak * 2);
        streak++;
        correctCount++;
        wordEl.className = 'correct';
        messageEl.textContent = `✓ Perfect! +${10 + ((streak - 1) * 2)} points`;

        setTimeout(() => {
          showNewWord();
          inputEl.value = '';
          wordEl.className = '';
          updateStats();
        }, 300);
      } else if (!currentWord.toLowerCase().startsWith(typed)) {
        // Wrong!
        wordEl.className = 'incorrect';
        streak = 0;
        messageEl.textContent = '✗ Try again!';
        updateStats();
      } else {
        // Partial match
        wordEl.className = '';
      }
    });

    // Enter key to clear input if wrong
    inputEl.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && inputEl.value) {
        inputEl.value = '';
      }
    });

    console.log('🎮 Typing Speed Game - #834');
    console.log('Type the words as fast as you can!');
  </script>
</body>
</html>
