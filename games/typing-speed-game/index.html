<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Speed Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            gap: 10px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 10px;
            min-width: 100px;
        }

        .stat-label {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #00d9ff;
        }

        .word-display {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .word-display .current {
            color: #00ff88;
            text-decoration: underline;
        }

        .word-display .typed {
            color: rgba(255, 255, 255, 0.3);
        }

        .word-display .remaining {
            color: white;
        }

        .input-container {
            margin: 20px 0;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2em;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-align: center;
            outline: none;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            border-color: #00d9ff;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .start-btn {
            background: linear-gradient(45deg, #00d9ff, #00ff88);
            color: #1a1a2e;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 217, 255, 0.5);
        }

        .reset-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .reset-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .message {
            font-size: 1.2em;
            margin: 15px 0;
            min-height: 30px;
        }

        .message.success {
            color: #00ff88;
        }

        .message.error {
            color: #ff6b6b;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }

            .word-display {
                font-size: 1.5em;
                padding: 20px;
            }

            .stat-value {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>

    <div class="container">
        <h1>⌨️ Typing Speed</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">正解</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">WPM</div>
                <div class="stat-value" id="wpm">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">時間</div>
                <div class="stat-value" id="time">0s</div>
            </div>
        </div>

        <div class="word-display" id="wordDisplay">
            スタートボタンを押してね
        </div>

        <div class="input-container">
            <input type="text" id="input" placeholder="ここにタイプ..." disabled>
        </div>

        <div class="message" id="message"></div>

        <div class="buttons">
            <button class="start-btn" id="startBtn">スタート</button>
            <button class="reset-btn" id="resetBtn">リセット</button>
        </div>
    </div>

    <script>
        const words = [
            'apple', 'banana', 'cherry', 'grape', 'orange', 'peach', 'melon', 'berry',
            'house', 'mouse', 'computer', 'keyboard', 'screen', 'button', 'window',
            'summer', 'winter', 'spring', 'autumn', 'sunny', 'rainy', 'cloudy',
            'coffee', 'pizza', 'burger', 'sushi', 'pasta', 'bread', 'cheese',
            'happy', 'smile', 'laugh', 'dream', 'hope', 'love', 'peace', 'friend',
            'music', 'dance', 'guitar', 'piano', 'drum', 'violin', 'song', 'rhythm',
            'planet', 'star', 'moon', 'sun', 'earth', 'mars', 'galaxy', 'universe',
            'ocean', 'river', 'mountain', 'forest', 'flower', 'tree', 'grass', 'sky',
            'tiger', 'lion', 'elephant', 'monkey', 'panda', 'rabbit', 'cat', 'dog',
            'japan', 'tokyo', 'osaka', 'kyoto', 'america', 'china', 'korea', 'india',
            'soccer', 'tennis', 'baseball', 'basketball', 'swimming', 'running',
            'reading', 'writing', 'drawing', 'painting', 'singing', 'playing',
            'morning', 'evening', 'night', 'midnight', 'noon', 'afternoon',
            'yellow', 'green', 'purple', 'orange', 'white', 'black', 'blue', 'red',
            'beautiful', 'wonderful', 'amazing', 'awesome', 'fantastic', 'great',
            'quickly', 'slowly', 'carefully', 'happily', 'sadly', 'angrily', 'calmly',
            'program', 'code', 'function', 'variable', 'array', 'object', 'string'
        ];

        let currentWord = '';
        let score = 0;
        let timer = null;
        let seconds = 0;
        let gameActive = false;

        const wordDisplay = document.getElementById('wordDisplay');
        const input = document.getElementById('input');
        const scoreDisplay = document.getElementById('score');
        const wpmDisplay = document.getElementById('wpm');
        const timeDisplay = document.getElementById('time');
        const message = document.getElementById('message');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        function getRandomWord() {
            return words[Math.floor(Math.random() * words.length)];
        }

        function updateWordDisplay(typed = '') {
            const current = currentWord[typed.length];
            const typedChars = currentWord.slice(0, typed.length);
            const remaining = currentWord.slice(typed.length + 1);

            wordDisplay.innerHTML = `
                <span class="typed">${typedChars}</span>
                <span class="current">${current}</span>
                <span class="remaining">${remaining}</span>
            `;
        }

        function updateWPM() {
            const minutes = seconds / 60;
            const wpm = minutes > 0 ? Math.round((score / minutes)) : 0;
            wpmDisplay.textContent = wpm;
        }

        function startGame() {
            gameActive = true;
            score = 0;
            seconds = 0;
            scoreDisplay.textContent = '0';
            wpmDisplay.textContent = '0';
            timeDisplay.textContent = '0s';
            message.textContent = '';
            message.className = 'message';
            input.disabled = false;
            input.value = '';
            input.focus();
            startBtn.disabled = true;

            currentWord = getRandomWord();
            updateWordDisplay();

            timer = setInterval(() => {
                seconds++;
                timeDisplay.textContent = `${seconds}s`;
                updateWPM();
            }, 1000);
        }

        function resetGame() {
            gameActive = false;
            clearInterval(timer);
            score = 0;
            seconds = 0;
            scoreDisplay.textContent = '0';
            wpmDisplay.textContent = '0';
            timeDisplay.textContent = '0s';
            wordDisplay.textContent = 'スタートボタンを押してね';
            input.value = '';
            input.disabled = true;
            message.textContent = '';
            message.className = 'message';
            startBtn.disabled = false;
        }

        function checkWord() {
            const typed = input.value.trim().toLowerCase();

            if (typed === currentWord.toLowerCase()) {
                score++;
                scoreDisplay.textContent = score;
                message.textContent = '🎉 正解！';
                message.className = 'message success';
                input.value = '';
                currentWord = getRandomWord();
                updateWordDisplay();
                updateWPM();
            } else {
                updateWordDisplay(typed);
                message.textContent = '';
                message.className = 'message';
            }
        }

        input.addEventListener('input', checkWord);
        startBtn.addEventListener('click', startGame);
        resetBtn.addEventListener('click', resetGame);

        // 全画面切り替え
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // キーボードショートカット
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && gameActive) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
