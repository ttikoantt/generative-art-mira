<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Memory Pattern - Memory Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #7dd3fc;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            color: #c084fc;
            font-size: 14px;
        }
        
        .stat {
            padding: 10px 20px;
            background: rgba(192, 132, 252, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(192, 132, 252, 0.3);
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #a855f7;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .tile {
            aspect-ratio: 1;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            border: 3px solid transparent;
            position: relative;
            overflow: hidden;
        }
        
        .tile::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.1);
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .tile:hover::before {
            opacity: 1;
        }
        
        .tile.active {
            transform: scale(1.1);
            box-shadow: 0 0 30px currentColor;
            z-index: 10;
        }
        
        .tile.red { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .tile.blue { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .tile.green { background: linear-gradient(135deg, #22c55e, #16a34a); }
        .tile.yellow { background: linear-gradient(135deg, #eab308, #ca8a04); }
        
        .message {
            color: #7dd3fc;
            font-size: 18px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(125, 211, 252, 0.1);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid rgba(125, 211, 252, 0.3);
            margin-bottom: 20px;
        }
        
        .btn {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(125, 211, 252, 0.2);
            border: 1px solid #7dd3fc;
            color: #7dd3fc;
            padding: 10px 15px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }
        
        .fullscreen-btn:hover {
            background: rgba(125, 211, 252, 0.4);
        }
        
        .instructions {
            color: rgba(125, 211, 252, 0.7);
            font-size: 12px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
    
    <div class="container">
        <h1>🎯 Memory Pattern</h1>
        
        <div class="stats">
            <div class="stat">
                <div>Level</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div>High Score</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>
        
        <div class="grid">
            <div class="tile red" data-color="red"></div>
            <div class="tile blue" data-color="blue"></div>
            <div class="tile green" data-color="green"></div>
            <div class="tile yellow" data-color="yellow"></div>
        </div>
        
        <div class="message" id="message">
            Press Start to begin!
        </div>
        
        <button class="btn" id="startBtn" onclick="startGame()">Start Game</button>
        
        <div class="instructions">
            Watch the pattern, then repeat it!
        </div>
    </div>
    
    <script>
        const tiles = document.querySelectorAll('.tile');
        const message = document.getElementById('message');
        const levelDisplay = document.getElementById('level');
        const highScoreDisplay = document.getElementById('highScore');
        const startBtn = document.getElementById('startBtn');
        
        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let highScore = parseInt(localStorage.getItem('memoryPatternHighScore')) || 0;
        let isPlaying = false;
        let isShowingSequence = false;
        
        highScoreDisplay.textContent = highScore;
        
        const colors = ['red', 'blue', 'green', 'yellow'];
        const colorMap = {
            red: { freq: 329.63 },
            blue: { freq: 392.00 },
            green: { freq: 440.00 },
            yellow: { freq: 523.25 }
        };
        
        function playTone(freq, duration = 0.3) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.frequency.value = freq;
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + duration);
            } catch (e) {
                console.log('Audio not supported');
            }
        }
        
        function highlightTile(color, duration = 400) {
            const tile = document.querySelector(`.tile.${color}`);
            tile.classList.add('active');
            playTone(colorMap[color].freq);
            
            setTimeout(() => {
                tile.classList.remove('active');
            }, duration);
        }
        
        function addToSequence() {
            sequence.push(colors[Math.floor(Math.random() * colors.length)]);
        }
        
        async function showSequence() {
            isShowingSequence = true;
            message.textContent = `Level ${level} - Watch carefully!`;
            startBtn.disabled = true;
            
            await new Promise(resolve => setTimeout(resolve, 500));
            
            for (let i = 0; i < sequence.length; i++) {
                await new Promise(resolve => setTimeout(resolve, 300));
                highlightTile(sequence[i]);
                await new Promise(resolve => setTimeout(resolve, 500));
            }
            
            isShowingSequence = false;
            message.textContent = 'Your turn! Repeat the pattern';
        }
        
        function handleTileClick(color) {
            if (!isPlaying || isShowingSequence) return;
            
            highlightTile(color, 200);
            playerSequence.push(color);
            
            const currentIndex = playerSequence.length - 1;
            
            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                gameOver();
                return;
            }
            
            if (playerSequence.length === sequence.length) {
                level++;
                levelDisplay.textContent = level;
                
                if (level > highScore) {
                    highScore = level;
                    highScoreDisplay.textContent = highScore;
                    localStorage.setItem('memoryPatternHighScore', highScore);
                }
                
                playerSequence = [];
                message.textContent = '✓ Correct! Get ready...';
                
                setTimeout(() => {
                    addToSequence();
                    showSequence();
                }, 1500);
            }
        }
        
        function gameOver() {
            isPlaying = false;
            message.textContent = `Game Over! You reached Level ${level}`;
            startBtn.textContent = 'Play Again';
            startBtn.disabled = false;
            
            tiles.forEach(tile => {
                tile.style.opacity = '0.5';
            });
            
            setTimeout(() => {
                tiles.forEach(tile => {
                    tile.style.opacity = '1';
                });
            }, 1000);
        }
        
        function startGame() {
            sequence = [];
            playerSequence = [];
            level = 1;
            isPlaying = true;
            
            levelDisplay.textContent = level;
            startBtn.textContent = 'Playing...';
            
            tiles.forEach(tile => {
                tile.style.opacity = '1';
            });
            
            addToSequence();
            showSequence();
        }
        
        tiles.forEach(tile => {
            tile.addEventListener('click', () => {
                handleTileClick(tile.dataset.color);
            });
            
            tile.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleTileClick(tile.dataset.color);
            });
        });
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
