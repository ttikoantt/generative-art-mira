<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Chain Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 10px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .game-area {
            margin-bottom: 20px;
        }

        .last-word {
            text-align: center;
            padding: 20px;
            background: #f5f7fa;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .last-word-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .last-word-text {
            font-size: 32px;
            font-weight: bold;
            color: #764ba2;
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 15px 20px;
            font-size: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: #667eea;
        }

        button {
            padding: 15px 30px;
            font-size: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .message {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
        }

        .history {
            max-height: 200px;
            overflow-y: auto;
            padding: 15px;
            background: #f5f7fa;
            border-radius: 10px;
        }

        .history-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }

        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .history-word {
            padding: 5px 12px;
            background: white;
            border-radius: 20px;
            font-size: 14px;
            color: #667eea;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #667eea;
            color: #667eea;
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            border-radius: 25px;
            z-index: 100;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 24px;
            }

            .last-word-text {
                font-size: 24px;
            }

            .input-area {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🔤 Word Chain Game</h1>
        <div class="subtitle">しりとりゲーム - 前の言葉の最後の文字で始まる言葉を入力</div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">連鎖</div>
                <div class="stat-value" id="chain">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">最高記録</div>
                <div class="stat-value" id="best">0</div>
            </div>
        </div>

        <div class="game-area">
            <div class="last-word">
                <div class="last-word-label">最後の言葉</div>
                <div class="last-word-text" id="lastWord">-</div>
            </div>

            <div class="input-area">
                <input type="text" id="wordInput" placeholder="ひらがなで入力..." maxlength="20">
                <button onclick="submitWord()">送信</button>
            </div>

            <div class="message" id="message"></div>

            <div class="controls">
                <button onclick="resetGame()" style="flex: 1;">リセット</button>
                <button onclick="giveHint()" style="flex: 1;">ヒント</button>
            </div>
        </div>

        <div class="history">
            <div class="history-label">単語履歴</div>
            <div class="history-list" id="history"></div>
        </div>
    </div>

    <script>
        let score = 0;
        let chain = 0;
        let bestScore = parseInt(localStorage.getItem('wordChainBest')) || 0;
        let lastWord = '';
        let usedWords = [];

        const hintWords = {
            'あ': 'あめ', 'い': 'いぬ', 'う': 'うさぎ', 'え': 'えび', 'お': 'おにぎり',
            'か': 'かめ', 'き': 'きつね', 'く': 'くま', 'け': 'けいたい', 'こ': 'こども',
            'さ': 'さくら', 'し': 'しろう', 'す': 'すし', 'せ': 'せんせい', 'そ': 'そら',
            'た': 'たこ', 'ち': 'ちゅうりっぷ', 'つ': 'つき', 'て': 'てぶくろ', 'と': 'とり',
            'な': 'なつ', 'に': 'にわとり', 'ぬ': 'ぬいぐるみ', 'ね': 'ねこ', 'の': 'のりもの',
            'は': 'はな', 'ひ': 'ひと', 'ふ': 'ふね', 'へ': 'へや', 'ほ': 'ほん',
            'ま': 'まど', 'み': 'みず', 'む': 'むし', 'め': 'めがね', 'も': 'もり',
            'や': 'やま', 'ゆ': 'ゆき', 'よ': 'よる',
            'ら': 'らいねん', 'り': 'りんご', 'る': 'るすばん', 'れ': 'れいぞうこ', 'ろ': 'ろうそく',
            'わ': 'わに', 'を': '', 'ん': ''
        };

        document.getElementById('best').textContent = bestScore;

        const input = document.getElementById('wordInput');
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                submitWord();
            }
        });

        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message show ${type}`;
            setTimeout(() => {
                messageEl.classList.remove('show');
            }, 2000);
        }

        function isValidHiragana(text) {
            return /^[\u3040-\u309F]+$/.test(text);
        }

        function submitWord() {
            const word = input.value.trim();

            if (!word) {
                showMessage('単語を入力してください', 'error');
                return;
            }

            if (!isValidHiragana(word)) {
                showMessage('ひらがなで入力してください', 'error');
                return;
            }

            if (word.length < 2) {
                showMessage('2文字以上の単語を入力してください', 'error');
                return;
            }

            if (word.endsWith('ん')) {
                showMessage('「ん」で終わる単語は禁止です！', 'error');
                chain = 0;
                updateStats();
                return;
            }

            if (usedWords.includes(word)) {
                showMessage='この単語は既に使われています', 'error');
                return;
            }

            if (lastWord && lastWord[lastWord.length - 1] !== word[0]) {
                showMessage(`「${lastWord[lastWord.length - 1]}」で始まる単語を入力してください`, 'error');
                return;
            }

            // Valid word
            usedWords.push(word);
            lastWord = word;
            chain++;
            score += word.length * 10;

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('wordChainBest', bestScore);
            }

            updateUI();
            showMessage(`+${word.length * 10}点！`, 'success');
            input.value = '';
            input.focus();
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('chain').textContent = chain;
            document.getElementById('best').textContent = bestScore;
            document.getElementById('lastWord').textContent = lastWord || '-';

            const historyEl = document.getElementById('history');
            historyEl.innerHTML = usedWords.map(word => 
                `<span class="history-word">${word}</span>`
            ).join('');
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('chain').textContent = chain;
        }

        function resetGame() {
            score = 0;
            chain = 0;
            lastWord = '';
            usedWords = [];
            updateUI();
            showMessage('ゲームをリセットしました', 'success');
            input.focus();
        }

        function giveHint() {
            const lastChar = lastWord ? lastWord[lastWord.length - 1] : null;
            if (lastChar && hintWords[lastChar]) {
                showMessage(`ヒント: 「${hintWords[lastChar]}」`, 'success');
            } else if (!lastWord) {
                showMessage('ヒント: 最初は何でもOK！', 'success');
            } else {
                showMessage('ヒント: この文字で始まる単語を考えてみて...)', 'success');
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
