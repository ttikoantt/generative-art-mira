<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Tap Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #canvas {
            display: block;
            cursor: pointer;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        #targetColor {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 20px 40px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        #targetColor .label {
            font-size: 16px;
            color: #333;
            font-weight: bold;
        }

        #targetColor .color {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 4px solid #333;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }

        #overlay.hidden {
            display: none;
        }

        #overlay h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #overlay .finalScore {
            font-size: 72px;
            font-weight: bold;
            margin: 20px 0;
            color: #ffd700;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
        }

        #overlay p {
            font-size: 20px;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.8);
        }

        #startBtn {
            margin-top: 30px;
            padding: 20px 60px;
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            pointer-events: all;
        }

        #startBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        #startBtn:active {
            transform: translateY(-1px);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 12px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            z-index: 200;
            pointer-events: all;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            #overlay h1 {
                font-size: 32px;
            }

            .finalScore {
                font-size: 48px !important;
            }

            #startBtn {
                padding: 15px 40px;
                font-size: 20px;
            }

            .stat {
                padding: 10px 15px;
                font-size: 14px;
            }

            #targetColor {
                top: 60px;
                padding: 15px 25px;
            }

            #targetColor .color {
                width: 40px;
                height: 40px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="canvas"></canvas>

        <div id="ui">
            <div class="stat">Score: <span id="score">0</span></div>
            <div class="stat">Time: <span id="time">60</span>s</div>
        </div>

        <div id="targetColor">
            <span class="label">Tap this color:</span>
            <div class="color" id="colorDisplay"></div>
        </div>

        <div id="overlay">
            <h1>🎨 Color Tap Challenge</h1>
            <p>Tap the balls that match the target color!</p>
            <p>⏱️ You have 60 seconds</p>
            <p>🎯 +10 points for correct taps</p>
            <p>❌ -5 points for wrong taps</p>
            <button id="startBtn">Start Game</button>
        </div>

        <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const timeEl = document.getElementById('time');
        const colorDisplay = document.getElementById('colorDisplay');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('startBtn');

        let width, height;
        let balls = [];
        let score = 0;
        let timeLeft = 60;
        let gameRunning = false;
        let timerInterval;
        let colors = [
            { name: 'Red', value: '#e74c3c' },
            { name: 'Blue', value: '#3498db' },
            { name: 'Green', value: '#2ecc71' },
            { name: 'Yellow', value: '#f1c40f' },
            { name: 'Purple', value: '#9b59b6' },
            { name: 'Orange', value: '#e67e22' },
            { name: 'Pink', value: '#e91e63' },
            { name: 'Cyan', value: '#00bcd4' }
        ];
        let targetColor;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function getRandomColor() {
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function setNewTargetColor() {
            targetColor = getRandomColor();
            colorDisplay.style.backgroundColor = targetColor.value;
        }

        class Ball {
            constructor() {
                this.radius = 30 + Math.random() * 30;
                this.x = this.radius + Math.random() * (width - this.radius * 2);
                this.y = this.radius + Math.random() * (height - this.radius * 2);
                this.dx = (Math.random() - 0.5) * 3;
                this.dy = (Math.random() - 0.5) * 3;
                this.color = getRandomColor();
                this.scale = 0;
                this.targetScale = 1;
            }

            update() {
                if (this.scale < this.targetScale) {
                    this.scale += 0.1;
                }

                this.x += this.dx;
                this.y += this.dy;

                // Bounce off walls
                if (this.x - this.radius < 0 || this.x + this.radius > width) {
                    this.dx *= -1;
                }
                if (this.y - this.radius < 0 || this.y + this.radius > height) {
                    this.dy *= -1;
                }

                // Keep in bounds
                this.x = Math.max(this.radius, Math.min(width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(height - this.radius, this.y));
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.scale, this.scale);

                // Ball
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color.value;
                ctx.fill();

                // Highlight
                ctx.beginPath();
                ctx.arc(-this.radius * 0.3, -this.radius * 0.3, this.radius * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.fill();

                // Shadow
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.2)';
                ctx.lineWidth = 3;
                ctx.stroke();

                ctx.restore();
            }

            contains(x, y) {
                const dist = Math.sqrt((x - this.x) ** 2 + (y - this.y) ** 2);
                return dist < this.radius;
            }
        }

        function spawnBall() {
            if (balls.length < 15) {
                balls.push(new Ball());
            }
        }

        function updateGame() {
            ctx.clearRect(0, 0, width, height);

            balls.forEach(ball => {
                ball.update();
                ball.draw();
            });

            if (gameRunning) {
                requestAnimationFrame(updateGame);
            }
        }

        function handleClick(e) {
            if (!gameRunning) return;

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            for (let i = balls.length - 1; i >= 0; i--) {
                if (balls[i].contains(x, y)) {
                    if (balls[i].color.name === targetColor.name) {
                        // Correct!
                        score += 10;
                        balls.splice(i, 1);
                        spawnBall();
                        setNewTargetColor();
                    } else {
                        // Wrong!
                        score = Math.max(0, score - 5);
                    }
                    scoreEl.textContent = score;
                    break;
                }
            }
        }

        function startGame() {
            score = 0;
            timeLeft = 60;
            balls = [];
            gameRunning = true;

            scoreEl.textContent = score;
            timeEl.textContent = timeLeft;
            overlay.classList.add('hidden');

            // Spawn initial balls
            for (let i = 0; i < 10; i++) {
                spawnBall();
            }

            setNewTargetColor();

            // Start timer
            timerInterval = setInterval(() => {
                timeLeft--;
                timeEl.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // Spawn new ball every 2 seconds
            setInterval(() => {
                if (gameRunning) {
                    spawnBall();
                }
            }, 2000);

            updateGame();
        }

        function endGame() {
            gameRunning = false;
            clearInterval(timerInterval);

            overlay.innerHTML = `
                <h1>⏰ Time's Up!</h1>
                <p>Your final score:</p>
                <div class="finalScore">${score}</div>
                <p>${getScoreMessage()}</p>
                <button id="startBtn">Play Again</button>
            `;
            overlay.classList.remove('hidden');

            document.getElementById('startBtn').addEventListener('click', startGame);
        }

        function getScoreMessage() {
            if (score >= 200) return '🏆 Amazing! You\'re a color master!';
            if (score >= 150) return '🌟 Excellent! Great reflexes!';
            if (score >= 100) return '👍 Good job! Keep practicing!';
            if (score >= 50) return '😊 Nice try! You can do better!';
            return '💪 Keep practicing!';
        }

        canvas.addEventListener('click', handleClick);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick(e);
        });

        startBtn.addEventListener('click', startGame);

        window.addEventListener('resize', resize);

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        resize();
    </script>
</body>
</html>
