<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Rain Defense - ワードレイン防衛</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 2px solid rgba(100, 200, 255, 0.3);
        }

        .stats {
            display: flex;
            gap: 20px;
            color: #64c8ff;
            font-size: 16px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
        }

        .game-area {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .input-area {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.5);
            border-top: 2px solid rgba(100, 200, 255, 0.3);
        }

        #wordInput {
            width: 100%;
            padding: 15px 20px;
            font-size: 18px;
            font-family: 'Courier New', monospace;
            background: rgba(100, 200, 255, 0.1);
            border: 2px solid rgba(100, 200, 255, 0.5);
            border-radius: 10px;
            color: #fff;
            outline: none;
            transition: all 0.3s;
        }

        #wordInput:focus {
            border-color: rgba(100, 200, 255, 0.8);
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.3);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay-title {
            color: #64c8ff;
            font-size: 32px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
        }

        .overlay-score {
            color: #fff;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .start-btn {
            padding: 15px 40px;
            font-size: 18px;
            font-family: 'Courier New', monospace;
            background: rgba(100, 200, 255, 0.3);
            border: 2px solid rgba(100, 200, 255, 0.6);
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }

        .start-btn:hover {
            background: rgba(100, 200, 255, 0.5);
            box-shadow: 0 0 30px rgba(100, 200, 255, 0.5);
            transform: scale(1.05);
        }

        .fullscreen-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: rgba(100, 200, 255, 0.2);
            border: 1px solid rgba(100, 200, 255, 0.5);
            color: rgba(255, 255, 255, 0.9);
            padding: 8px 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 5px;
            z-index: 50;
        }

        .fullscreen-btn:hover {
            background: rgba(100, 200, 255, 0.4);
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
        }

        @media (max-width: 768px) {
            .game-header {
                padding: 10px 15px;
            }

            .stats {
                gap: 15px;
                font-size: 14px;
            }

            .stat-value {
                font-size: 18px;
            }

            .input-area {
                padding: 10px 15px;
            }

            #wordInput {
                padding: 12px 15px;
                font-size: 16px;
            }

            .overlay-title {
                font-size: 24px;
            }

            .overlay-score {
                font-size: 20px;
            }

            .start-btn {
                padding: 12px 30px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="game-header">
        <div class="stats">
            <div class="stat">
                <span class="stat-label">スコア</span>
                <span class="stat-value" id="score">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">ライフ</span>
                <span class="stat-value" id="lives">❤️❤️❤️</span>
            </div>
            <div class="stat">
                <span class="stat-label">レベル</span>
                <span class="stat-value" id="level">1</span>
            </div>
            <div class="stat">
                <span class="stat-label">連鎖</span>
                <span class="stat-value" id="combo">0</span>
            </div>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-area">
        <canvas id="gameCanvas"></canvas>

        <div class="overlay" id="startOverlay">
            <div class="overlay-title">Word Rain Defense</div>
            <div style="color: rgba(255, 255, 255, 0.8); margin-bottom: 30px; font-size: 14px;">
                落ちてくる単語をタイプして防衛せよ！
            </div>
            <button class="start-btn" onclick="startGame()">ゲーム開始</button>
        </div>

        <div class="overlay hidden" id="gameOverOverlay">
            <div class="overlay-title">ゲームオーバー</div>
            <div class="overlay-score">スコア: <span id="finalScore">0</span></div>
            <button class="start-btn" onclick="startGame()">もう一度</button>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="wordInput" placeholder="単語を入力..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let words = [];
        let particles = [];
        let score = 0;
        let lives = 3;
        let level = 1;
        let combo = 0;
        let maxCombo = 0;
        let gameRunning = false;
        let lastSpawnTime = 0;
        let spawnInterval = 2000;

        const wordList = [
            'apple', 'banana', 'cherry', 'dragon', 'elephant', 'flower', 'guitar', 'harmony',
            'island', 'jungle', 'knight', 'lunar', 'meteor', 'nebula', 'ocean', 'phoenix',
            'quantum', 'rainbow', 'sonic', 'tempo', 'ultra', 'vortex', 'wonder', 'xenon',
            'yellow', 'zenith', 'adventure', 'breeze', 'crystal', 'discovery', 'energy',
            'festival', 'galaxy', 'horizon', 'infinity', 'journey', 'kingdom', 'legend',
            'mystery', 'network', 'orbit', 'paradise', 'quest', 'rhythm', 'spectrum',
            'twilight', 'universe', 'voltage', 'whisper', 'explore', 'yesterday', 'zone',
            'cascade', 'digital', 'emerald', 'fusion', 'gravity', 'harmonic', 'impulse',
            'kinetic', 'luminous', 'momentum', 'neural', 'optical', 'plasma', 'quantum',
            'resonance', 'stellar', 'turbine', 'universal', 'velocity', 'waveform'
        ];

        const colors = [
            { r: 100, g: 200, b: 255 },
            { r: 255, g: 100, b: 200 },
            { r: 100, g: 255, b: 200 },
            { r: 255, g: 200, b: 100 },
            { r: 200, g: 100, b: 255 },
            { r: 255, g: 150, b: 100 }
        ];

        class FallingWord {
            constructor(text) {
                this.text = text;
                this.x = Math.random() * (width - 200) + 100;
                this.y = -30;
                this.speed = 0.5 + (level * 0.2) + (Math.random() * 0.3);
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.matched = '';
                this.fontSize = 20;
            }

            update() {
                this.y += this.speed;
            }

            draw() {
                ctx.font = `${this.fontSize}px 'Courier New', monospace`;
                ctx.textAlign = 'center';

                // マッチした部分
                const matchedWidth = ctx.measureText(this.matched).width;
                const startX = this.x - matchedWidth / 2;

                // マッチしていない部分（グレー）
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.fillText(this.text.substring(this.matched.length), this.x + matchedWidth / 2, this.y);

                // マッチした部分（カラー）
                if (this.matched.length > 0) {
                    ctx.fillStyle = `rgb(${this.color.r}, ${this.color.g}, ${this.color.b})`;
                    ctx.fillText(this.matched, startX + ctx.measureText(this.matched) / 2, this.y);
                }
            }

            isOffScreen() {
                return this.y > height + 30;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8 - 2;
                this.color = color;
                this.life = 1;
                this.decay = 0.02;
                this.size = Math.random() * 4 + 2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.1;
                this.life -= this.decay;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.life})`;
                ctx.fill();
            }
        }

        function resize() {
            width = canvas.width = canvas.offsetWidth;
            height = canvas.height = canvas.offsetHeight;
        }

        function spawnWord() {
            const text = wordList[Math.floor(Math.random() * wordList.length)];
            words.push(new FallingWord(text));
        }

        function createParticles(x, y, color, count = 20) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = '❤️'.repeat(Math.max(0, lives));
            document.getElementById('level').textContent = level;
            document.getElementById('combo').textContent = combo;
        }

        function checkInput(input) {
            const lowerInput = input.toLowerCase().trim();

            for (let i = 0; i < words.length; i++) {
                const word = words[i];
                if (word.text.toLowerCase().startsWith(lowerInput) && lowerInput.length > word.matched.length) {
                    word.matched = lowerInput;

                    if (word.matched === word.text.toLowerCase()) {
                        // 完全マッチ
                        const points = word.text.length * 10 * (1 + combo * 0.1);
                        score += Math.floor(points);
                        combo++;
                        maxCombo = Math.max(maxCombo, combo);

                        createParticles(word.x, word.y, word.color, 30);
                        words.splice(i, 1);

                        // レベルアップ
                        if (score >= level * 500) {
                            level++;
                            spawnInterval = Math.max(500, 2000 - level * 100);
                        }

                        updateUI();
                        return true;
                    }
                }
            }

            // 完全マッチなしでコンボリセット
            return false;
        }

        function update() {
            if (!gameRunning) return;

            // 背景をクリア
            ctx.fillStyle = 'rgba(26, 26, 46, 0.3)';
            ctx.fillRect(0, 0, width, height);

            const now = Date.now();

            // 単語をスポーン
            if (now - lastSpawnTime > spawnInterval) {
                spawnWord();
                lastSpawnTime = now;
            }

            // 単語を更新
            for (let i = words.length - 1; i >= 0; i--) {
                words[i].update();
                words[i].draw();

                if (words[i].isOffScreen()) {
                    words.splice(i, 1);
                    lives--;
                    combo = 0;
                    updateUI();

                    if (lives <= 0) {
                        gameOver();
                    }
                }
            }

            // パーティクルを更新
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();

                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(update);
        }

        function startGame() {
            score = 0;
            lives = 3;
            level = 1;
            combo = 0;
            words = [];
            particles = [];
            spawnInterval = 2000;
            gameRunning = true;
            lastSpawnTime = Date.now();

            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('wordInput').value = '';
            document.getElementById('wordInput').focus();

            updateUI();
            update();
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        window.addEventListener('resize', resize);

        document.getElementById('wordInput').addEventListener('input', (e) => {
            if (!gameRunning) return;

            const input = e.target.value;
            checkInput(input);

            // 完全マッチしたら入力をクリア
            for (const word of words) {
                if (word.matched === word.text.toLowerCase()) {
                    e.target.value = '';
                    break;
                }
            }

            // 入力がどの単語にもマッチしない場合はクリア
            const hasMatch = words.some(w => w.text.toLowerCase().startsWith(input.toLowerCase()));
            if (!hasMatch && input.length > 0) {
                e.target.value = '';
                combo = 0;
                updateUI();
            }
        });

        // ゲーム開始時にフォーカス
        document.getElementById('startOverlay').querySelector('.start-btn').addEventListener('click', () => {
            setTimeout(() => {
                document.getElementById('wordInput').focus();
            }, 100);
        });

        // 初期化
        resize();
        updateUI();
    </script>
</body>
</html>
