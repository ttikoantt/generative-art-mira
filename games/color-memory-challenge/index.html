<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Color Memory Challenge | 色記憶チャレンジ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #fff;
            font-size: clamp(20px, 5vw, 32px);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 10px 20px;
            color: #fff;
            font-size: clamp(14px, 3vw, 18px);
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: clamp(10px, 2.5vw, 12px);
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: clamp(20px, 4vw, 28px);
            font-weight: bold;
            text-shadow: 0 0 10px currentColor;
        }

        .level { color: #ffd700; }
        .score { color: #00ff88; }
        .lives { color: #ff6b6b; }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px auto;
            max-width: 400px;
            aspect-ratio: 1;
        }

        .color-card {
            aspect-ratio: 1;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            border: 3px solid rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .color-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .color-card:hover::before {
            opacity: 1;
        }

        .color-card:active {
            transform: scale(0.95);
        }

        .color-card.correct {
            animation: correctPulse 0.5s ease-out;
            border-color: #00ff88;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.8);
        }

        .color-card.wrong {
            animation: wrongShake 0.5s ease-out;
            border-color: #ff6b6b;
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.8);
        }

        .color-card.hidden {
            background: rgba(255, 255, 255, 0.1) !important;
            border-color: rgba(255, 255, 255, 0.2);
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .message {
            color: #fff;
            font-size: clamp(16px, 4vw, 24px);
            margin: 20px 0;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: #fff;
            padding: 15px 40px;
            font-size: clamp(16px, 4vw, 20px);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            margin: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.6);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .preview-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .preview-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .preview-color {
            width: 200px;
            height: 200px;
            border-radius: 30px;
            margin: 20px;
            box-shadow: 0 0 50px currentColor;
            animation: previewPulse 1s ease-in-out infinite;
        }

        @keyframes previewPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .preview-text {
            color: #fff;
            font-size: clamp(18px, 4vw, 24px);
            text-align: center;
        }

        .combo-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(40px, 10vw, 80px);
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            pointer-events: none;
            opacity: 0;
            z-index: 100;
        }

        .combo-display.show {
            animation: comboShow 1s ease-out forwards;
        }

        @keyframes comboShow {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
        }

        @media (max-width: 600px) {
            .game-board {
                gap: 10px;
            }

            .color-card {
                border-radius: 15px;
            }

            .stats {
                gap: 10px;
            }

            .stat {
                padding: 8px 15px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="game-container">
        <h1>🎨 色記憶チャレンジ</h1>

        <div class="stats">
            <div class="stat level">
                <div class="stat-label">レベル</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat score">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat lives">
                <div class="stat-label">ライフ</div>
                <div class="stat-value" id="lives">❤️❤️❤️</div>
            </div>
        </div>

        <div class="message" id="message">
            「スタート」ボタンを押して始めよう！
        </div>

        <div class="game-board" id="gameBoard"></div>

        <button class="btn" id="startBtn" onclick="startGame()">スタート</button>
    </div>

    <div class="preview-overlay" id="previewOverlay">
        <div class="preview-text" id="previewText">この色を覚えて！</div>
        <div class="preview-color" id="previewColor"></div>
    </div>

    <div class="combo-display" id="comboDisplay"></div>

    <script>
        // ゲーム状態
        let gameState = {
            level: 1,
            score: 0,
            lives: 3,
            combo: 0,
            targetColor: null,
            colors: [],
            isPlaying: false,
            canClick: false
        };

        // 色パレット
        const colorPalettes = [
            ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E2', '#F8B500'],
            ['#E74C3C', '#3498DB', '#2ECC71', '#F39C12', '#9B59B6', '#1ABC9C', '#E67E22', '#34495E', '#16A085'],
            ['#FF0080', '#00FF80', '#8000FF', '#FF8000', '#0080FF', '#80FF00', '#FF0040', '#40FF00', '#0040FF'],
            ['#FEB2B2', '#B2FEB2', '#B2B2FE', '#FEFEB2', '#B2FEFE', '#FEB2FE', '#FFD700', '#FF69B4', '#00CED1']
        ];

        // 色の類似度を計算（二乗平均平方根）
        function colorDistance(color1, color2) {
            const r1 = parseInt(color1.slice(1, 3), 16);
            const g1 = parseInt(color1.slice(3, 5), 16);
            const b1 = parseInt(color1.slice(5, 7), 16);
            
            const r2 = parseInt(color2.slice(1, 3), 16);
            const g2 = parseInt(color2.slice(3, 5), 16);
            const b2 = parseInt(color2.slice(5, 7), 16);
            
            return Math.sqrt(
                Math.pow(r1 - r2, 2) +
                Math.pow(g1 - g2, 2) +
                Math.pow(b1 - b2, 2)
            );
        }

        // 色を生成
        function generateColors() {
            const palette = colorPalettes[Math.floor(Math.random() * colorPalettes.length)];
            const numColors = Math.min(3 + Math.floor(gameState.level / 2), 9);
            const gridSize = Math.ceil(Math.sqrt(numColors));
            
            // ターゲット色を選択
            gameState.targetColor = palette[Math.floor(Math.random() * palette.length)];
            
            // 類似色を生成
            gameState.colors = [gameState.targetColor];
            
            while (gameState.colors.length < numColors) {
                let baseColor = palette[Math.floor(Math.random() * palette.length)];
                
                // ターゲット色に近い色を生成
                let newColor = baseColor;
                let distance = colorDistance(newColor, gameState.targetColor);
                
                // 難易度に応じて類似度を調整
                const minDistance = Math.max(30, 100 - gameState.level * 5);
                const maxDistance = Math.max(50, 150 - gameState.level * 5);
                
                if (distance < minDistance || distance > maxDistance) {
                    // 色を少し調整
                    const r = parseInt(baseColor.slice(1, 3), 16);
                    const g = parseInt(baseColor.slice(3, 5), 16);
                    const b = parseInt(baseColor.slice(5, 7), 16);
                    
                    const adjust = () => {
                        const offset = Math.floor(Math.random() * 40) - 20;
                        return Math.max(0, Math.min(255, offset));
                    };
                    
                    newColor = `#${((r + adjust()) * 65536 + (g + adjust()) * 256 + (b + adjust())).toString(16).padStart(6, '0')}`;
                }
                
                // 重複チェック
                if (!gameState.colors.includes(newColor)) {
                    gameState.colors.push(newColor);
                }
            }
            
            // シャッフル
            gameState.colors.sort(() => Math.random() - 0.5);
            
            return gridSize;
        }

        // ゲームボードを描画
        function drawBoard() {
            const board = document.getElementById('gameBoard');
            const gridSize = generateColors();
            
            board.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            
            gameState.colors.forEach((color, index) => {
                const card = document.createElement('div');
                card.className = 'color-card';
                card.style.backgroundColor = color;
                card.dataset.index = index;
                card.onclick = () => selectColor(index);
                board.appendChild(card);
            });
        }

        // プレビュー表示
        function showPreview() {
            const overlay = document.getElementById('previewOverlay');
            const previewColor = document.getElementById('previewColor');
            const previewText = document.getElementById('previewText');
            
            previewColor.style.backgroundColor = gameState.targetColor;
            previewText.textContent = `レベル ${gameState.level}: この色を覚えて！`;
            
            overlay.classList.add('active');
            
            // 表示時間はレベルによって短くなる
            const showTime = Math.max(1000, 3000 - gameState.level * 150);
            
            setTimeout(() => {
                overlay.classList.remove('active');
                
                // 色を隠す
                const cards = document.querySelectorAll('.color-card');
                cards.forEach(card => {
                    card.classList.add('hidden');
                });
                
                gameState.canClick = true;
                updateMessage('同じ色を選んでね！');
            }, showTime);
        }

        // 色を選択
        function selectColor(index) {
            if (!gameState.isPlaying || !gameState.canClick) return;
            
            gameState.canClick = false;
            const cards = document.querySelectorAll('.color-card');
            const selectedCard = cards[index];
            const selectedColor = gameState.colors[index];
            
            // 色を表示
            cards.forEach(card => {
                card.classList.remove('hidden');
            });
            
            if (selectedColor === gameState.targetColor) {
                // 正解
                selectedCard.classList.add('correct');
                gameState.combo++;
                const comboBonus = Math.min(gameState.combo, 10);
                gameState.score += 10 * comboBonus;
                
                if (gameState.combo >= 3) {
                    showCombo(gameState.combo);
                }
                
                updateMessage(`🎉 正解！ +${10 * comboBonus}ポイント`);
                
                setTimeout(() => {
                    gameState.level++;
                    drawBoard();
                    showPreview();
                }, 1000);
            } else {
                // 不正解
                selectedCard.classList.add('wrong');
                gameState.lives--;
                gameState.combo = 0;
                
                // 正解のカードをハイライト
                cards.forEach(card => {
                    if (gameState.colors[card.dataset.index] === gameState.targetColor) {
                        setTimeout(() => {
                            card.classList.add('correct');
                        }, 300);
                    }
                });
                
                updateMessage(`❌ 間違い！ライフ残り: ${gameState.lives}`);
                
                if (gameState.lives <= 0) {
                    setTimeout(() => {
                        endGame();
                    }, 1500);
                } else {
                    setTimeout(() => {
                        drawBoard();
                        showPreview();
                    }, 1500);
                }
            }
            
            updateStats();
        }

        // コンボ表示
        function showCombo(combo) {
            const comboDisplay = document.getElementById('comboDisplay');
            comboDisplay.textContent = `${combo} COMBO!`;
            comboDisplay.classList.add('show');
            
            setTimeout(() => {
                comboDisplay.classList.remove('show');
            }, 1000);
        }

        // ゲーム開始
        function startGame() {
            gameState = {
                level: 1,
                score: 0,
                lives: 3,
                combo: 0,
                targetColor: null,
                colors: [],
                isPlaying: true,
                canClick: false
            };
            
            document.getElementById('startBtn').style.display = 'none';
            updateStats();
            drawBoard();
            showPreview();
        }

        // ゲーム終了
        function endGame() {
            gameState.isPlaying = false;
            
            const message = `
                ゲームオーバー！🎮
                
                最終スコア: ${gameState.score}
                到達レベル: ${gameState.level}
            `;
            
            updateMessage(message);
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('startBtn').textContent = 'もう一度プレイ';
        }

        // ステータス更新
        function updateStats() {
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('lives').textContent = '❤️'.repeat(Math.max(0, gameState.lives));
        }

        // メッセージ更新
        function updateMessage(text) {
            document.getElementById('message').innerHTML = text.replace(/\n/g, '<br>');
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        drawBoard();
    </script>
</body>
</html>
