<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Rhythm - 絵文字リズムゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #game-container {
            width: 100%;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        #track {
            flex: 1;
            position: relative;
            margin: 0 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .lane {
            position: absolute;
            width: 25%;
            height: 100%;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .lane:last-child {
            border-right: none;
        }

        .target {
            position: absolute;
            bottom: 20px;
            width: 60px;
            height: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid rgba(102, 126, 234, 0.5);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            z-index: 10;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }

        .target.hit {
            background: rgba(102, 234, 153, 0.3);
            border-color: #66ea99;
            animation: hit 0.2s ease;
        }

        .target.miss {
            background: rgba(234, 102, 102, 0.3);
            border-color: #ea6666;
            animation: miss 0.2s ease;
        }

        @keyframes hit {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.3); }
        }

        @keyframes miss {
            0%, 100% { transform: translateX(-50%) translateX(0); }
            25% { transform: translateX(-50%) translateX(-10px); }
            75% { transform: translateX(-50%) translateX(10px); }
        }

        .emoji {
            position: absolute;
            font-size: 40px;
            z-index: 5;
            transition: transform 0.1s ease;
            filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.5));
        }

        .hit-effect {
            position: absolute;
            font-size: 60px;
            pointer-events: none;
            animation: hitEffect 0.5s ease forwards;
            z-index: 20;
        }

        @keyframes hitEffect {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(2) translateY(-50px);
            }
        }

        .score-panel {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 15px;
            display: flex;
            gap: 30px;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .score-item {
            text-align: center;
            color: white;
        }

        .score-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .combo {
            color: #ffd700 !important;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        #start-screen, #game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            text-align: center;
            padding: 20px;
        }

        #game-over-screen {
            display: none;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 18px;
            opacity: 0.7;
            margin-bottom: 40px;
        }

        .instructions {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 40px;
            line-height: 1.8;
        }

        .key-hint {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 8px;
            margin: 0 5px;
            font-family: monospace;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        button {
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 600;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.6);
        }

        .final-score {
            font-size: 64px;
            font-weight: bold;
            margin: 20px 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            gap: 40px;
            margin-bottom: 40px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10;
            width: 45px;
            height: 45px;
            padding: 0;
            border-radius: 50%;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .mobile-controls {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 15px;
            z-index: 50;
        }

        .mobile-btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mobile-btn:active {
            background: rgba(102, 126, 234, 0.3);
            border-color: #667eea;
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 32px;
            }

            .instructions {
                font-size: 14px;
            }

            .score-panel {
                top: 10px;
                padding: 10px 20px;
                gap: 20px;
            }

            .score-value {
                font-size: 18px;
            }

            .mobile-controls {
                display: flex;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                width: 40px;
                height: 40px;
            }

            #track {
                margin: 0 10px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="score-panel">
            <div class="score-item">
                <div class="score-label">Score</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">Combo</div>
                <div class="score-value combo" id="combo">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">Accuracy</div>
                <div class="score-value" id="accuracy">100%</div>
            </div>
        </div>

        <div id="track">
            <div class="lane" data-lane="0">
                <div class="target">🎵</div>
            </div>
            <div class="lane" data-lane="1">
                <div class="target">🎶</div>
            </div>
            <div class="lane" data-lane="2">
                <div class="target">🎼</div>
            </div>
            <div class="lane" data-lane="3">
                <div class="target">🎹</div>
            </div>
        </div>

        <div class="mobile-controls">
            <button class="mobile-btn" data-lane="0">🎵</button>
            <button class="mobile-btn" data-lane="1">🎶</button>
            <button class="mobile-btn" data-lane="2">🎼</button>
            <button class="mobile-btn" data-lane="3">🎹</button>
        </div>

        <button class="fullscreen-btn" id="fullscreen">⛶</button>
    </div>

    <div id="start-screen">
        <h1>🎵 Emoji Rhythm</h1>
        <div class="subtitle">絵文字リズムゲーム</div>
        <div class="instructions">
            PC: <span class="key-hint">D</span> <span class="key-hint">F</span> <span class="key-hint">J</span> <span class="key-hint">K</span><br>
            モバイル: 下のボタンをタップ<br><br>
            絵文字がターゲットに重なったら押せ！
        </div>
        <button id="start-btn">Start Game</button>
    </div>

    <div id="game-over-screen">
        <h1>Game Over</h1>
        <div class="final-score" id="final-score">0</div>
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">Max Combo</div>
                <div class="stat-value" id="max-combo">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Perfect</div>
                <div class="stat-value" id="perfect-count">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Great</div>
                <div class="stat-value" id="great-count">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Miss</div>
                <div class="stat-value" id="miss-count">0</div>
            </div>
        </div>
        <button id="restart-btn">Play Again</button>
    </div>

    <script>
        const track = document.getElementById('track');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');

        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let perfectCount = 0;
        let greatCount = 0;
        let missCount = 0;
        let totalNotes = 0;

        let gameRunning = false;
        let emojis = [];
        let gameSpeed = 3;
        let spawnRate = 60; // frames
        let frameCount = 0;

        const laneEmojis = ['🎵', '🎶', '🎼', '🎹'];
        const keyMap = { 'd': 0, 'f': 1, 'j': 2, 'k': 3, 'D': 0, 'F': 1, 'J': 2, 'K': 3 };

        class Emoji {
            constructor(lane) {
                this.lane = lane;
                this.element = document.createElement('div');
                this.element.className = 'emoji';
                this.element.textContent = laneEmojis[lane];
                this.y = -50;
                this.speed = gameSpeed;
                this.hit = false;

                const laneEl = document.querySelector(`.lane[data-lane="${lane}"]`);
                laneEl.appendChild(this.element);

                this.updatePosition();
            }

            update() {
                if (!this.hit) {
                    this.y += this.speed;
                    this.updatePosition();
                }
            }

            updatePosition() {
                this.element.style.top = `${this.y}px`;
                this.element.style.left = '50%';
                this.element.style.transform = 'translateX(-50%)';
            }

            checkHit() {
                const targetY = track.offsetHeight - 50;
                const distance = Math.abs(this.y - targetY);

                if (distance < 30) {
                    return 'perfect';
                } else if (distance < 60) {
                    return 'great';
                }
                return null;
            }

            remove() {
                this.element.remove();
            }
        }

        function spawnEmoji() {
            const lane = Math.floor(Math.random() * 4);
            emojis.push(new Emoji(lane));
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;
            
            const accuracy = totalNotes > 0 ? Math.round(((perfectCount + greatCount) / totalNotes) * 100) : 100;
            document.getElementById('accuracy').textContent = `${accuracy}%`;
        }

        function showHitEffect(lane, type) {
            const laneEl = document.querySelector(`.lane[data-lane="${lane}"]`);
            const target = laneEl.querySelector('.target');
            
            const effect = document.createElement('div');
            effect.className = 'hit-effect';
            effect.textContent = type === 'perfect' ? '✨' : '💫';
            effect.style.left = '50%';
            effect.style.top = '70%';
            effect.style.transform = 'translateX(-50%)';
            
            laneEl.appendChild(effect);
            
            setTimeout(() => effect.remove(), 500);

            target.classList.add(type === 'perfect' ? 'hit' : 'hit');
            setTimeout(() => target.classList.remove('hit', 'miss'), 200);
        }

        function hitLane(lane) {
            if (!gameRunning) return;

            const targetEmoji = emojis.find(e => e.lane === lane && !e.hit && e.y > track.offsetHeight - 150);
            
            if (targetEmoji) {
                const hitType = targetEmoji.checkHit();
                
                if (hitType) {
                    targetEmoji.hit = true;
                    targetEmoji.remove();
                    emojis = emojis.filter(e => e !== targetEmoji);

                    if (hitType === 'perfect') {
                        perfectCount++;
                        score += 100 + combo * 10;
                    } else {
                        greatCount++;
                        score += 50 + combo * 5;
                    }

                    combo++;
                    maxCombo = Math.max(maxCombo, combo);
                    totalNotes++;

                    showHitEffect(lane, hitType);
                } else {
                    miss();
                }
            } else {
                // Empty lane hit - small penalty
                combo = 0;
            }

            updateScore();
        }

        function miss() {
            combo = 0;
            missCount++;
            totalNotes++;

            const target = document.querySelector('.target');
            target.classList.add('miss');
            setTimeout(() => target.classList.remove('miss'), 200);

            updateScore();

            if (missCount >= 10) {
                endGame();
            }
        }

        function gameLoop() {
            if (!gameRunning) return;

            frameCount++;

            if (frameCount % spawnRate === 0) {
                spawnEmoji();
                
                // Gradually increase difficulty
                if (frameCount % 600 === 0 && spawnRate > 30) {
                    spawnRate -= 5;
                }
                if (frameCount % 600 === 0 && gameSpeed < 6) {
                    gameSpeed += 0.2;
                }
            }

            emojis.forEach(emoji => {
                if (!emoji.hit) {
                    emoji.update();
                    emoji.speed = gameSpeed;

                    // Miss if goes off screen
                    if (emoji.y > track.offsetHeight) {
                        emoji.remove();
                        emoji.hit = true;
                        miss();
                    }
                }
            });

            emojis = emojis.filter(e => !e.hit || e.element.parentElement);

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            gameRunning = true;
            score = 0;
            combo = 0;
            maxCombo = 0;
            perfectCount = 0;
            greatCount = 0;
            missCount = 0;
            totalNotes = 0;
            gameSpeed = 3;
            spawnRate = 60;
            frameCount = 0;

            emojis.forEach(e => e.remove());
            emojis = [];

            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';

            updateScore();
            gameLoop();
        }

        function endGame() {
            gameRunning = false;

            document.getElementById('final-score').textContent = score;
            document.getElementById('max-combo').textContent = maxCombo;
            document.getElementById('perfect-count').textContent = perfectCount;
            document.getElementById('great-count').textContent = greatCount;
            document.getElementById('miss-count').textContent = missCount;

            gameOverScreen.style.display = 'flex';
        }

        // Event Listeners
        document.addEventListener('keydown', (e) => {
            if (keyMap.hasOwnProperty(e.key)) {
                hitLane(keyMap[e.key]);
            }
        });

        document.querySelectorAll('.mobile-btn').forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const lane = parseInt(btn.dataset.lane);
                hitLane(lane);
            });

            btn.addEventListener('click', () => {
                const lane = parseInt(btn.dataset.lane);
                hitLane(lane);
            });
        });

        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', startGame);

        document.getElementById('fullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });
    </script>
</body>
</html>
