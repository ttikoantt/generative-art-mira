<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rhythm Matrix | リズムマトリックス</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0f0f23 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: white;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 20px;
        }

        .stat {
            text-align: center;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 5px;
        }

        .matrix {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.1s ease;
            position: relative;
            overflow: hidden;
        }

        .cell::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.3) 0%, transparent 70%);
            transition: transform 0.3s ease;
        }

        .cell.active {
            transform: scale(0.95);
        }

        .cell.active::before {
            transform: translate(-50%, -50%) scale(1);
        }

        .cell.hit {
            background: linear-gradient(135deg, #00ffff, #0088ff);
            border-color: #00ffff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }

        .cell.miss {
            background: linear-gradient(135deg, #ff4444, #ff0088);
            border-color: #ff4444;
            animation: shake 0.3s ease;
        }

        .cell.perfect {
            background: linear-gradient(135deg, #ffff00, #ff8800);
            border-color: #ffff00;
            box-shadow: 0 0 40px rgba(255, 255, 0, 0.7);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ffff, #ff00ff);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .combo {
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
            min-height: 30px;
        }

        .combo-count {
            font-weight: bold;
            color: #ffff00;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 26, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(20px);
        }

        .overlay.hidden {
            display: none;
        }

        .overlay-title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay-subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
            text-align: center;
            max-width: 400px;
            line-height: 1.6;
        }

        .btn {
            padding: 15px 40px;
            font-size: 18px;
            background: linear-gradient(135deg, #00ffff, #0088ff);
            border: none;
            border-radius: 30px;
            color: #0a0a1a;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 255, 255, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            pointer-events: none;
            animation: feedback 0.5s ease forwards;
            z-index: 50;
        }

        @keyframes feedback {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .fullscreen:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            .matrix {
                gap: 10px;
            }

            .cell {
                border-radius: 15px;
            }

            .overlay-title {
                font-size: 36px;
            }

            .stats {
                gap: 10px;
            }

            .stat {
                padding: 10px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">SCORE</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="highScore">0</div>
                <div class="stat-label">HIGH SCORE</div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="combo">
            <span class="combo-count" id="comboCount"></span>
            <span id="comboText"></span>
        </div>

        <div class="matrix" id="matrix"></div>
    </div>

    <div class="overlay" id="startOverlay">
        <div class="overlay-title">RHYTHM MATRIX</div>
        <div class="overlay-subtitle">
            光るマスがリズムに合わせて点灯します。<br>
            タイミングよくタップしてハイスコアを目指そう！
        </div>
        <button class="btn" id="startBtn">▶ スタート</button>
    </div>

    <div class="overlay hidden" id="gameOverOverlay">
        <div class="overlay-title">GAME OVER</div>
        <div class="overlay-subtitle">
            フィニッシュ！<br><br>
            スコア: <span id="finalScore">0</span><br>
            ハイスコア: <span id="finalHighScore">0</span>
        </div>
        <button class="btn" id="restartBtn">↻ もう一度</button>
        <button class="btn btn-secondary" id="backBtn">← 戻る</button>
    </div>

    <button class="fullscreen" id="fullscreenBtn">⛶</button>

    <script>
        // Game state
        let score = 0;
        let highScore = parseInt(localStorage.getItem('rhythmMatrixHighScore')) || 0;
        let combo = 0;
        let maxCombo = 0;
        let gameActive = false;
        let gamePhase = 'waiting'; // waiting, active, ending
        let beatCount = 0;
        const totalBeats = 64;
        let lastBeatTime = 0;
        let bpm = 100;
        let activeCell = null;
        let activeStartTime = 0;
        const perfectWindow = 100; // ms
        const goodWindow = 200;

        // DOM elements
        const matrixEl = document.getElementById('matrix');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const comboCountEl = document.getElementById('comboCount');
        const comboTextEl = document.getElementById('comboText');
        const progressFill = document.getElementById('progressFill');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScoreEl = document.getElementById('finalScore');
        const finalHighScoreEl = document.getElementById('finalHighScore');

        // Initialize matrix
        const cells = [];
        for (let i = 0; i < 16; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.index = i;
            cell.addEventListener('click', () => handleCellClick(i));
            cell.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleCellClick(i);
            });
            matrixEl.appendChild(cell);
            cells.push(cell);
        }

        // Update high score display
        highScoreEl.textContent = highScore;

        function startGame() {
            score = 0;
            combo = 0;
            maxCombo = 0;
            beatCount = 0;
            gameActive = true;
            gamePhase = 'active';
            bpm = 100;

            scoreEl.textContent = '0';
            updateComboDisplay();
            updateProgress();

            startOverlay.classList.add('hidden');
            gameOverOverlay.classList.add('hidden');

            lastBeatTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameActive = false;
            gamePhase = 'ending';

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('rhythmMatrixHighScore', highScore);
                highScoreEl.textContent = highScore;
            }

            finalScoreEl.textContent = score;
            finalHighScoreEl.textContent = highScore;

            setTimeout(() => {
                gameOverOverlay.classList.remove('hidden');
            }, 1000);
        }

        function handleCellClick(index) {
            if (!gameActive || gamePhase !== 'active') return;
            if (activeCell === null || activeCell !== index) {
                // Miss - wrong cell or no active cell
                showFeedback('MISS', '#ff4444');
                combo = 0;
                updateComboDisplay();
                return;
            }

            const now = performance.now();
            const elapsed = now - activeStartTime;

            let hitType, color, points;

            if (elapsed <= perfectWindow) {
                hitType = 'PERFECT!';
                color = '#ffff00';
                points = 100 + combo * 10;
                cells[index].classList.add('perfect');
            } else if (elapsed <= goodWindow) {
                hitType = 'GOOD!';
                color = '#00ffff';
                points = 50 + combo * 5;
                cells[index].classList.add('hit');
            } else {
                hitType = 'MISS';
                color = '#ff4444';
                points = 0;
                cells[index].classList.add('miss');
                combo = 0;
            }

            if (points > 0) {
                combo++;
                if (combo > maxCombo) maxCombo = combo;
                score += points;
                scoreEl.textContent = score;
            }

            updateComboDisplay();
            showFeedback(hitType, color);

            setTimeout(() => {
                cells[index].classList.remove('hit', 'miss', 'perfect');
            }, 200);

            activeCell = null;
        }

        function activateRandomCell() {
            // Clear previous active cell
            if (activeCell !== null) {
                cells[activeCell].classList.remove('active');
                // Miss if not clicked in time
                combo = 0;
                updateComboDisplay();
            }

            // Activate new cell
            activeCell = Math.floor(Math.random() * 16);
            activeStartTime = performance.now();
            cells[activeCell].classList.add('active');

            // Gradually increase BPM
            if (beatCount % 8 === 0 && bpm < 180) {
                bpm += 5;
            }
        }

        function updateComboDisplay() {
            if (combo > 0) {
                comboCountEl.textContent = combo + ' COMBO';
                comboTextEl.textContent = getComboText(combo);
            } else {
                comboCountEl.textContent = '';
                comboTextEl.textContent = '';
            }
        }

        function getComboText(combo) {
            if (combo >= 30) return '🔥 UNSTOPPABLE!';
            if (combo >= 20) return '💫 AMAZING!';
            if (combo >= 10) return '✨ GREAT!';
            if (combo >= 5) return '👍 NICE!';
            return '';
        }

        function updateProgress() {
            const progress = (beatCount / totalBeats) * 100;
            progressFill.style.width = progress + '%';
        }

        function showFeedback(text, color) {
            const feedback = document.createElement('div');
            feedback.className = 'feedback';
            feedback.textContent = text;
            feedback.style.color = color;
            document.body.appendChild(feedback);

            setTimeout(() => {
                feedback.remove();
            }, 500);
        }

        function gameLoop(timestamp) {
            if (!gameActive) return;

            const beatInterval = 60000 / bpm;

            if (timestamp - lastBeatTime >= beatInterval) {
                lastBeatTime = timestamp;
                beatCount++;

                if (beatCount > totalBeats) {
                    endGame();
                    return;
                }

                activateRandomCell();
                updateProgress();
            }

            requestAnimationFrame(gameLoop);
        }

        // Event listeners
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        document.getElementById('backBtn').addEventListener('click', () => {
            gameOverOverlay.classList.add('hidden');
            startOverlay.classList.remove('hidden');
        });

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Prevent context menu on long press
        document.addEventListener('contextmenu', e => e.preventDefault());

        // Handle visibility change
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && gameActive) {
                // Pause game when tab is hidden
                gameActive = false;
            }
        });
    </script>
</body>
</html>
