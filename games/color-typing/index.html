<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Typing - カラータイピングゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.8em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 25px;
            font-size: 0.9em;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .stat {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 15px 25px;
            border-radius: 12px;
            min-width: 120px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.85em;
            color: #666;
            margin-top: 5px;
        }

        .game-area {
            margin: 25px 0;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .color-word {
            font-size: 4em;
            font-weight: bold;
            margin: 20px 0;
            transition: all 0.2s ease;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .input-area {
            margin: 20px 0;
        }

        input[type="text"] {
            font-size: 1.5em;
            padding: 15px 25px;
            border: 3px solid #ddd;
            border-radius: 12px;
            width: 100%;
            max-width: 300px;
            text-align: center;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #667eea;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.3);
        }

        input[type="text"].correct {
            border-color: #4caf50;
            background: rgba(76, 175, 80, 0.1);
            animation: pulse 0.5s ease;
        }

        input[type="text"].wrong {
            border-color: #f44336;
            background: rgba(244, 67, 54, 0.1);
            animation: shake 0.5s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .timer-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.1s linear;
        }

        .instructions {
            background: #f5f7fa;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 0.9em;
            color: #555;
            line-height: 1.6;
        }

        .instructions strong {
            color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            margin: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .game-over {
            display: none;
        }

        .game-over.show {
            display: block;
        }

        .game-area.hidden {
            display: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1000;
            padding: 10px 15px;
            font-size: 12px;
        }

        .combo-display {
            font-size: 1.5em;
            font-weight: bold;
            color: #ff6b6b;
            margin: 10px 0;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .combo-display.show {
            opacity: 1;
        }

        .hint {
            font-size: 0.9em;
            color: #888;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🎨 Color Typing</h1>
        <p class="subtitle">カラータイピング - ストループ効果に挑戦！</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">スコア</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="combo">0</div>
                <div class="stat-label">コンボ</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="highScore">0</div>
                <div class="stat-label">ハイスコア</div>
            </div>
        </div>

        <div class="game-area" id="gameArea">
            <div class="timer-bar">
                <div class="timer-fill" id="timerFill"></div>
            </div>

            <div class="color-word" id="colorWord">準備...</div>

            <div class="combo-display" id="comboDisplay">🔥 コンボ x2!</div>

            <div class="input-area">
                <input type="text" id="answerInput" placeholder="色名を入力..." autocomplete="off">
            </div>

            <p class="hint">例: あか, あお, きいろ, みどり...</p>
        </div>

        <div class="game-over" id="gameOver">
            <h2>🎮 ゲームオーバー！</h2>
            <p style="font-size: 1.2em; margin: 20px 0;">
                スコア: <strong id="finalScore">0</strong>
            </p>
            <p style="color: #666; margin-bottom: 20px;">
                ハイスコア: <strong id="finalHighScore">0</strong>
            </p>
            <button onclick="startGame()">もう一度プレイ</button>
        </div>

        <div id="startScreen">
            <div class="instructions">
                <strong>🎯 ルール：</strong><br>
                画面に表示される<strong>色の文字色</strong>に合わせた色名を入力してください。<br><br>
                例：文字が「あお」で<strong>赤色</strong>で表示されている → 「あか」と入力<br><br>
                ⚡ <strong>速く正解</strong>するとコンボが増えて高得点！<br>
                ⏱️ タイマーが切れるとゲームオーバー
            </div>
            <button onclick="startGame()">ゲーム開始</button>
        </div>
    </div>

    <script>
        // 色定義
        const COLORS = [
            { name: 'あか', display: 'あか', color: '#e74c3c', rgb: '231, 76, 60' },
            { name: 'あお', display: 'あお', color: '#3498db', rgb: '52, 152, 219' },
            { name: 'きいろ', display: 'きいろ', color: '#f1c40f', rgb: '241, 196, 15' },
            { name: 'みどり', display: 'みどり', color: '#2ecc71', rgb: '46, 204, 113' },
            { name: 'むらさき', display: 'むらさき', color: '#9b59b6', rgb: '155, 89, 182' },
            { name: 'オレンジ', display: 'オレンジ', color: '#e67e22', rgb: '230, 126, 34' },
            { name: 'ピンク', display: 'ピンク', color: '#e91e63', rgb: '233, 30, 99' },
            { name: 'しろ', display: 'しろ', color: '#ecf0f1', rgb: '236, 240, 241' },
            { name: 'くろ', display: 'くろ', color: '#2c3e50', rgb: '44, 62, 80' }
        ];

        // ゲーム状態
        let score = 0;
        let combo = 0;
        let highScore = parseInt(localStorage.getItem('colorTypingHighScore')) || 0;
        let currentWord = null;
        let currentAnswer = null;
        let timer = 0;
        let maxTime = 100;
        let gameRunning = false;
        let timerInterval = null;

        // DOM要素
        const scoreEl = document.getElementById('score');
        const comboEl = document.getElementById('combo');
        const highScoreEl = document.getElementById('highScore');
        const colorWordEl = document.getElementById('colorWord');
        const answerInput = document.getElementById('answerInput');
        const timerFillEl = document.getElementById('timerFill');
        const gameAreaEl = document.getElementById('gameArea');
        const gameOverEl = document.getElementById('gameOver');
        const startScreenEl = document.getElementById('startScreen');
        const comboDisplayEl = document.getElementById('comboDisplay');
        const finalScoreEl = document.getElementById('finalScore');
        const finalHighScoreEl = document.getElementById('finalHighScore');

        // 初期化
        highScoreEl.textContent = highScore;

        // 新しい言葉を生成
        function generateWord() {
            const wordColor = COLORS[Math.floor(Math.random() * COLORS.length)];
            const textColor = COLORS[Math.floor(Math.random() * COLORS.length)];

            currentWord = wordColor;
            currentAnswer = textColor;

            colorWordEl.style.color = textColor.color;
            colorWordEl.textContent = wordColor.display;
        }

        // ゲーム開始
        function startGame() {
            score = 0;
            combo = 0;
            timer = maxTime;
            gameRunning = true;

            scoreEl.textContent = '0';
            comboEl.textContent = '0';
            comboDisplayEl.classList.remove('show');

            startScreenEl.style.display = 'none';
            gameOverEl.classList.remove('show');
            gameAreaEl.classList.remove('hidden');

            answerInput.value = '';
            answerInput.focus();
            answerInput.disabled = false;

            generateWord();

            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 100);
        }

        // タイマー更新
        function updateTimer() {
            if (!gameRunning) return;

            timer -= 1;
            timerFillEl.style.width = `${timer}%`;

            // タイマーの色を変化
            if (timer < 20) {
                timerFillEl.style.background = 'linear-gradient(90deg, #f44336 0%, #e91e63 100%)';
            } else if (timer < 50) {
                timerFillEl.style.background = 'linear-gradient(90deg, #ff9800 0%, #ff5722 100%)';
            }

            if (timer <= 0) {
                endGame();
            }
        }

        // 入力チェック
        function checkAnswer() {
            if (!gameRunning) return;

            const input = answerInput.value.trim().toLowerCase();

            if (input === currentAnswer.name.toLowerCase()) {
                // 正解
                combo++;
                const baseScore = 10;
                const comboBonus = Math.min(combo, 10) * 5;
                const timeBonus = Math.floor(timer / 10);
                const totalScore = baseScore + comboBonus + timeBonus;

                score += totalScore;

                scoreEl.textContent = score;
                comboEl.textContent = combo;

                // コンボ表示
                if (combo >= 2) {
                    comboDisplayEl.textContent = `🔥 コンボ x${combo}!`;
                    comboDisplayEl.classList.add('show');
                    setTimeout(() => {
                        comboDisplayEl.classList.remove('show');
                    }, 800);
                }

                // タイマー回復
                timer = Math.min(maxTime, timer + 8);

                // エフェクト
                answerInput.classList.add('correct');
                setTimeout(() => {
                    answerInput.classList.remove('correct');
                }, 500);

                answerInput.value = '';
                generateWord();
            } else if (input.length > 0) {
                // 不正解（長すぎる入力の場合）
                if (input.length >= currentAnswer.name.length) {
                    combo = 0;
                    comboEl.textContent = '0';

                    answerInput.classList.add('wrong');
                    setTimeout(() => {
                        answerInput.classList.remove('wrong');
                    }, 500);

                    answerInput.value = '';
                }
            }
        }

        // ゲーム終了
        function endGame() {
            gameRunning = false;
            if (timerInterval) clearInterval(timerInterval);

            answerInput.disabled = true;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('colorTypingHighScore', highScore);
                highScoreEl.textContent = highScore;
            }

            finalScoreEl.textContent = score;
            finalHighScoreEl.textContent = highScore;

            gameAreaEl.classList.add('hidden');
            gameOverEl.classList.add('show');
        }

        // イベントリスナー
        answerInput.addEventListener('input', () => {
            const input = answerInput.value.trim().toLowerCase();

            // 入力が正解と一致したら即座にチェック
            if (input === currentAnswer.name.toLowerCase()) {
                checkAnswer();
            }
        });

        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // タッチデバイス対応
        answerInput.addEventListener('touchstart', (e) => {
            e.target.focus();
        });
    </script>
</body>
</html>
