<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Rush | Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            color: #00d9ff;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(0, 217, 255, 0.1);
            border: 2px solid rgba(0, 217, 255, 0.3);
            border-radius: 15px;
            padding: 15px 25px;
            color: #00d9ff;
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .game-area {
            position: relative;
            width: 100%;
            height: 400px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(0, 217, 255, 0.3);
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .number-btn {
            position: absolute;
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 50%;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .number-btn:hover {
            transform: scale(1.1);
        }

        .number-btn:active {
            transform: scale(0.95);
        }

        .number-btn.next-target {
            animation: pulse 0.8s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.8);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button.control-btn {
            background: linear-gradient(135deg, #00d9ff, #0099cc);
            color: #1a1a2e;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button.control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 217, 255, 0.4);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 217, 255, 0.3);
            color: #00d9ff;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 13px;
            z-index: 20;
        }

        .overlay h2 {
            color: #00d9ff;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .overlay p {
            color: #ffffff;
            margin-bottom: 10px;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }
            
            .game-area {
                height: 350px;
            }

            .number-btn {
                width: 50px;
                height: 50px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">🎮 Fullscreen</button>

    <div class="container">
        <h1>🔢 Number Rush</h1>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-label">Next</div>
                <div class="stat-value" id="nextNumber">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">Time</div>
                <div class="stat-value" id="timer">0.00s</div>
            </div>
            <div class="stat">
                <div class="stat-label">Best</div>
                <div class="stat-value" id="bestTime">--</div>
            </div>
        </div>

        <div class="game-area" id="gameArea">
            <div class="overlay" id="startOverlay">
                <h2>Number Rush</h2>
                <p>Tap numbers from 1 to 25 as fast as you can!</p>
                <button class="control-btn" onclick="startGame()">Start Game</button>
            </div>
            <div class="overlay hidden" id="endOverlay">
                <h2>🎉 Finished!</h2>
                <p id="finalTime">Your time: 0.00s</p>
                <p id="bestMessage"></p>
                <button class="control-btn" onclick="startGame()">Play Again</button>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn" onclick="restartGame()">🔄 Restart</button>
        </div>
    </div>

    <script>
        const gameArea = document.getElementById('gameArea');
        const nextNumberDisplay = document.getElementById('nextNumber');
        const timerDisplay = document.getElementById('timer');
        const bestTimeDisplay = document.getElementById('bestTime');
        const startOverlay = document.getElementById('startOverlay');
        const endOverlay = document.getElementById('endOverlay');

        let numbers = [];
        let nextNumber = 1;
        let totalNumbers = 25;
        let startTime = null;
        let timerInterval = null;
        let bestTime = parseFloat(localStorage.getItem('numberRushBest')) || null;
        let isPlaying = false;

        if (bestTime) {
            bestTimeDisplay.textContent = bestTime.toFixed(2) + 's';
        }

        function getRandomColor() {
            const hue = Math.random() * 60 + 170; // Cyan to blue range
            return `hsl(${hue}, 80%, 55%)`;
        }

        function createNumbers() {
            // Clear existing numbers
            const existingBtns = gameArea.querySelectorAll('.number-btn');
            existingBtns.forEach(btn => btn.remove());

            numbers = [];
            const areaWidth = gameArea.clientWidth;
            const areaHeight = gameArea.clientHeight;

            for (let i = 1; i <= totalNumbers; i++) {
                const btn = document.createElement('button');
                btn.className = 'number-btn';
                btn.textContent = i;
                btn.dataset.number = i;
                
                // Random position
                const maxX = areaWidth - 70;
                const maxY = areaHeight - 70;
                const x = Math.random() * maxX;
                const y = Math.random() * maxY;
                
                btn.style.left = x + 'px';
                btn.style.top = y + 'px';
                btn.style.backgroundColor = getRandomColor();
                btn.style.color = '#1a1a2e';

                btn.addEventListener('click', handleNumberClick);
                btn.addEventListener('touchstart', handleNumberClick, { passive: true });

                gameArea.appendChild(btn);
                numbers.push({ element: btn, number: i });
            }

            updateNextTarget();
        }

        function updateNextTarget() {
            numbers.forEach(n => {
                if (n.number === nextNumber) {
                    n.element.classList.add('next-target');
                } else {
                    n.element.classList.remove('next-target');
                }
            });
        }

        function handleNumberClick(e) {
            e.preventDefault();
            if (!isPlaying) return;

            const clickedNumber = parseInt(e.target.dataset.number);

            if (clickedNumber === nextNumber) {
                // Correct number
                e.target.style.opacity = '0';
                e.target.style.transform = 'scale(0)';
                setTimeout(() => {
                    e.target.style.display = 'none';
                }, 200);

                nextNumber++;
                nextNumberDisplay.textContent = nextNumber;

                if (nextNumber > totalNumbers) {
                    endGame();
                } else {
                    updateNextTarget();
                }
            } else {
                // Wrong number - visual feedback
                e.target.style.animation = 'none';
                e.target.offsetHeight; // Trigger reflow
                e.target.style.animation = 'shake 0.3s ease-in-out';
            }
        }

        function startGame() {
            startOverlay.classList.add('hidden');
            endOverlay.classList.add('hidden');

            nextNumber = 1;
            nextNumberDisplay.textContent = '1';
            isPlaying = true;
            startTime = Date.now();

            createNumbers();

            timerInterval = setInterval(() => {
                const elapsed = (Date.now() - startTime) / 1000;
                timerDisplay.textContent = elapsed.toFixed(2) + 's';
            }, 10);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(timerInterval);

            const finalTime = (Date.now() - startTime) / 1000;
            document.getElementById('finalTime').textContent = `Your time: ${finalTime.toFixed(2)}s`;

            let message = '';
            if (!bestTime || finalTime < bestTime) {
                bestTime = finalTime;
                localStorage.setItem('numberRushBest', bestTime);
                bestTimeDisplay.textContent = bestTime.toFixed(2) + 's';
                message = '🏆 New Best Time!';
            } else {
                const diff = (finalTime - bestTime).toFixed(2);
                message = `Best: ${bestTime.toFixed(2)}s (+${diff}s)`;
            }
            document.getElementById('bestMessage').textContent = message;

            endOverlay.classList.remove('hidden');
        }

        function restartGame() {
            clearInterval(timerInterval);
            timerDisplay.textContent = '0.00s';
            startGame();
        }

        // Add shake animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                75% { transform: translateX(10px); }
            }
        `;
        document.head.appendChild(style);

        // Fullscreen
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });
    </script>
</body>
</html>
