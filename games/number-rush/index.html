<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Number Rush - 1から順にタップ！</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            color: white;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
        }

        .stats div {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
            gap: 12px;
            max-width: 600px;
            width: 100%;
            margin-bottom: 20px;
        }

        .number-btn {
            aspect-ratio: 1;
            border: none;
            border-radius: 15px;
            background: white;
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .number-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .number-btn:active {
            transform: translateY(0);
        }

        .number-btn.correct {
            background: #10b981;
            color: white;
            animation: correct 0.3s ease;
        }

        .number-btn.wrong {
            background: #ef4444;
            color: white;
            animation: wrong 0.3s ease;
        }

        @keyframes correct {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes wrong {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .target {
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            text-align: center;
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background: white;
            color: #667eea;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            backdrop-filter: blur(10px);
            border: 2px solid white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-content h2 {
            font-size: 32px;
            color: #667eea;
            margin-bottom: 20px;
        }

        .modal-content p {
            font-size: 18px;
            margin-bottom: 15px;
            color: #333;
        }

        .modal-content .time {
            font-size: 48px;
            font-weight: bold;
            color: #10b981;
            margin: 20px 0;
        }

        .instructions {
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            color: white;
            text-align: center;
            backdrop-filter: blur(10px);
            max-width: 600px;
        }

        .instructions h3 {
            margin-bottom: 10px;
            font-size: 20px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            .game-board {
                grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
                gap: 8px;
            }

            .number-btn {
                font-size: 20px;
                border-radius: 12px;
            }

            .header h1 {
                font-size: 24px;
            }

            .target {
                font-size: 36px;
            }

            .stats {
                font-size: 16px;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="header">
        <h1>🔢 Number Rush</h1>
        <div class="stats">
            <div>次の数字: <span id="next-number">1</span></div>
            <div>タイム: <span id="timer">0.00</span>秒</div>
        </div>
    </div>

    <div class="instructions">
        <h3>📖 遊び方</h3>
        <p>1から順番に数字をタップして、最後まで早押し競争！</p>
    </div>

    <div class="target">
        <span id="target-display">1</span> を探して！
    </div>

    <div class="game-board" id="game-board"></div>

    <div class="controls">
        <button class="btn btn-primary" onclick="startGame()">スタート</button>
        <button class="btn btn-secondary" onclick="resetGame()">リセット</button>
    </div>

    <div class="modal" id="result-modal">
        <div class="modal-content">
            <h2>🎉 クリア！</h2>
            <p>あなたの記録</p>
            <div class="time" id="final-time">0.00秒</div>
            <p id="rank-message"></p>
            <button class="btn btn-primary" onclick="closeModal()">もう一度</button>
        </div>
    </div>

    <script>
        const MAX_NUMBER = 25;
        let currentNumber = 1;
        let startTime = null;
        let timerInterval = null;
        let gameActive = false;
        let shuffledNumbers = [];

        function shuffleNumbers() {
            shuffledNumbers = [];
            for (let i = 1; i <= MAX_NUMBER; i++) {
                shuffledNumbers.push(i);
            }
            // Fisher-Yates シャッフル
            for (let i = shuffledNumbers.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledNumbers[i], shuffledNumbers[j]] = [shuffledNumbers[j], shuffledNumbers[i]];
            }
        }

        function createBoard() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';

            shuffledNumbers.forEach(num => {
                const btn = document.createElement('button');
                btn.className = 'number-btn';
                btn.textContent = num;
                btn.dataset.number = num;
                btn.addEventListener('click', () => handleNumberClick(num, btn));
                board.appendChild(btn);
            });
        }

        function handleNumberClick(number, btn) {
            if (!gameActive) return;

            if (number === currentNumber) {
                // 正解
                btn.classList.add('correct');
                btn.style.opacity = '0.5';
                btn.style.pointerEvents = 'none';

                currentNumber++;

                if (currentNumber > MAX_NUMBER) {
                    gameWin();
                } else {
                    document.getElementById('next-number').textContent = currentNumber;
                    document.getElementById('target-display').textContent = currentNumber;
                }
            } else {
                // 不正解
                btn.classList.add('wrong');
                setTimeout(() => btn.classList.remove('wrong'), 300);
            }
        }

        function startGame() {
            resetGame();
            gameActive = true;
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 10);
        }

        function resetGame() {
            gameActive = false;
            currentNumber = 1;
            clearInterval(timerInterval);
            document.getElementById('next-number').textContent = '1';
            document.getElementById('target-display').textContent = '1';
            document.getElementById('timer').textContent = '0.00';

            shuffleNumbers();
            createBoard();
        }

        function updateTimer() {
            const elapsed = (Date.now() - startTime) / 1000;
            document.getElementById('timer').textContent = elapsed.toFixed(2);
        }

        function gameWin() {
            gameActive = false;
            clearInterval(timerInterval);

            const finalTime = document.getElementById('timer').textContent;
            document.getElementById('final-time').textContent = finalTime + '秒';

            // ランク判定
            const time = parseFloat(finalTime);
            let message = '';
            if (time < 10) {
                message = '⚡ 伝説級のスピード！';
            } else if (time < 15) {
                message = '🚀 超人的な反応速度！';
            } else if (time < 20) {
                message = '😎 とても速い！';
            } else if (time < 30) {
                message = '👍 いいスコア！';
            } else {
                message = '💪 頑張れ！';
            }
            document.getElementById('rank-message').textContent = message;

            setTimeout(() => {
                document.getElementById('result-modal').classList.add('show');
            }, 500);
        }

        function closeModal() {
            document.getElementById('result-modal').classList.remove('show');
            resetGame();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        shuffleNumbers();
        createBoard();
    </script>
</body>
</html>
