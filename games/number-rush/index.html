<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Number Rush - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .header h1 {
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .stats {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .stat {
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        .stat-value {
            color: #FEE440;
            font-size: 24px;
        }

        .game-container {
            position: relative;
            width: 90vw;
            max-width: 500px;
            height: 70vh;
            max-height: 500px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .number-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            width: 100%;
            height: 100%;
        }

        .number-btn {
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            border: none;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 50px;
        }

        .number-btn:active {
            transform: scale(0.95);
        }

        .number-btn.clicked {
            background: linear-gradient(145deg, #4ECDC4, #44A08D);
            color: white;
            opacity: 0.3;
            pointer-events: none;
        }

        .number-btn.wrong {
            background: linear-gradient(145deg, #FF6B6B, #EE5A5A);
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .controls {
            position: fixed;
            bottom: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            backdrop-filter: blur(10px);
        }

        .overlay-content {
            background: linear-gradient(145deg, #667eea, #764ba2);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .overlay-content h2 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        .overlay-content p {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .overlay-content .big-number {
            font-size: 48px;
            font-weight: bold;
            color: #FEE440;
            margin: 20px 0;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 480px) {
            .game-container {
                width: 95vw;
                height: 60vh;
            }

            .number-btn {
                font-size: 18px;
                min-height: 40px;
            }

            .header h1 {
                font-size: 16px;
            }

            .stat {
                font-size: 14px;
            }

            .stat-value {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔢 Number Rush</h1>
        <div class="stats">
            <div class="stat">
                Target: <span class="stat-value" id="target">1</span>
            </div>
            <div class="stat">
                Time: <span class="stat-value" id="time">0.0</span>s
            </div>
        </div>
    </div>

    <div class="game-container">
        <div class="number-grid" id="grid"></div>
    </div>

    <div class="controls">
        <button class="btn" onclick="startGame()">🔄 New Game</button>
        <button class="btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    </div>

    <div class="overlay" id="overlay">
        <div class="overlay-content">
            <h2 id="overlay-title">Number Rush</h2>
            <p id="overlay-message">Tap numbers from 1 to 25 in order!</p>
            <button class="btn" onclick="startGame()">▶ Start</button>
        </div>
    </div>

    <script>
        let numbers = [];
        let currentTarget = 1;
        let startTime = null;
        let timerInterval = null;
        let gameActive = false;

        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayMessage = document.getElementById('overlay-message');
        const grid = document.getElementById('grid');
        const targetDisplay = document.getElementById('target');
        const timeDisplay = document.getElementById('time');

        function generateNumbers() {
            numbers = [];
            for (let i = 1; i <= 25; i++) {
                numbers.push(i);
            }
            // Fisher-Yates shuffle
            for (let i = numbers.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [numbers[i], numbers[j]] = [numbers[j], numbers[i]];
            }
        }

        function createGrid() {
            grid.innerHTML = '';
            numbers.forEach(num => {
                const btn = document.createElement('button');
                btn.className = 'number-btn';
                btn.textContent = num;
                btn.dataset.number = num;
                btn.addEventListener('click', () => handleClick(num, btn));
                grid.appendChild(btn);
            });
        }

        function handleClick(number, btn) {
            if (!gameActive) return;

            if (number === currentTarget) {
                btn.classList.add('clicked');
                currentTarget++;
                targetDisplay.textContent = currentTarget;

                if (currentTarget > 25) {
                    endGame();
                }
            } else {
                btn.classList.add('wrong');
                setTimeout(() => btn.classList.remove('wrong'), 300);
            }
        }

        function startGame() {
            generateNumbers();
            createGrid();
            currentTarget = 1;
            targetDisplay.textContent = currentTarget;
            timeDisplay.textContent = '0.0';
            startTime = Date.now();
            gameActive = true;

            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 100);

            overlay.classList.add('hidden');
        }

        function updateTimer() {
            if (!gameActive || !startTime) return;
            const elapsed = (Date.now() - startTime) / 1000;
            timeDisplay.textContent = elapsed.toFixed(1);
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);
            const finalTime = ((Date.now() - startTime) / 1000).toFixed(1);

            overlayTitle.textContent = '🎉 Complete!';
            overlayMessage.innerHTML = `Your time: <span class="big-number">${finalTime}s</span>`;
            overlay.classList.remove('hidden');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
