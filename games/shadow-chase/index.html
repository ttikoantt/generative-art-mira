<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Shadow Chase - ミラの自律実験</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
        }

        .ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            pointer-events: none;
        }

        .score {
            color: #0ff;
            font-size: 24px;
            text-shadow: 0 0 10px #0ff;
        }

        .high-score {
            color: #f0f;
            font-size: 14px;
            text-shadow: 0 0 10px #f0f;
            margin-top: 5px;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
        }

        .game-over.show {
            display: block;
        }

        .game-over h1 {
            color: #f00;
            font-size: 48px;
            text-shadow: 0 0 20px #f00;
            margin-bottom: 20px;
        }

        .game-over p {
            color: #fff;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .btn {
            background: linear-gradient(135deg, #0ff, #f0f);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            pointer-events: all;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .start-screen h1 {
            color: #0ff;
            font-size: 36px;
            text-shadow: 0 0 20px #0ff;
            margin-bottom: 20px;
        }

        .start-screen p {
            color: #fff;
            font-size: 14px;
            margin-bottom: 30px;
            opacity: 0.7;
        }

        .start-screen.hidden {
            display: none;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 255, 0.1);
            color: #0ff;
            border: 1px solid #0ff;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="ui">
        <div class="score">SCORE: <span id="score">0</span></div>
        <div class="high-score">BEST: <span id="highScore">0</span></div>
    </div>

    <div class="start-screen" id="startScreen">
        <h1>SHADOW CHASE</h1>
        <p>影から逃げろ！タップして移動</p>
        <button class="btn" onclick="startGame()">START</button>
    </div>

    <div class="game-over" id="gameOver">
        <h1>CAUGHT!</h1>
        <p>Score: <span id="finalScore">0</span></p>
        <button class="btn" onclick="restartGame()">RETRY</button>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // Game state
        let gameRunning = false;
        let score = 0;
        let highScore = localStorage.getItem('shadowChaseHighScore') || 0;
        let gameSpeed = 1;

        // Player
        const player = {
            x: width / 2,
            y: height / 2,
            targetX: width / 2,
            targetY: height / 2,
            size: 20,
            speed: 0.1,
            trail: []
        };

        // Shadow (enemy)
        const shadow = {
            x: width / 4,
            y: height / 4,
            size: 25,
            speed: 2,
            trail: []
        };

        // Collectibles
        let collectibles = [];
        const collectibleCount = 5;

        // Particles
        let particles = [];

        function initCollectibles() {
            collectibles = [];
            for (let i = 0; i < collectibleCount; i++) {
                spawnCollectible();
            }
        }

        function spawnCollectible() {
            collectibles.push({
                x: Math.random() * (width - 100) + 50,
                y: Math.random() * (height - 100) + 50,
                size: 10,
                angle: Math.random() * Math.PI * 2
            });
        }

        function createParticles(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    size: Math.random() * 3 + 1,
                    color,
                    life: 1
                });
            }
        }

        function update() {
            if (!gameRunning) return;

            // Update player
            player.x += (player.targetX - player.x) * player.speed;
            player.y += (player.targetY - player.y) * player.speed;

            // Player trail
            player.trail.unshift({ x: player.x, y: player.y });
            if (player.trail.length > 20) player.trail.pop();

            // Update shadow (chases player)
            const dx = player.x - shadow.x;
            const dy = player.y - shadow.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist > 0) {
                shadow.x += (dx / dist) * shadow.speed * gameSpeed;
                shadow.y += (dy / dist) * shadow.speed * gameSpeed;
            }

            // Shadow trail
            shadow.trail.unshift({ x: shadow.x, y: shadow.y });
            if (shadow.trail.length > 15) shadow.trail.pop();

            // Check collision with shadow
            const collisionDist = player.size + shadow.size;
            if (dist < collisionDist * 0.7) {
                gameOver();
                return;
            }

            // Update collectibles
            for (let i = collectibles.length - 1; i >= 0; i--) {
                const c = collectibles[i];
                c.angle += 0.05;

                const cdx = player.x - c.x;
                const cdy = player.y - c.y;
                const cdist = Math.sqrt(cdx * cdx + cdy * cdy);

                if (cdist < player.size + c.size) {
                    // Collected!
                    collectibles.splice(i, 1);
                    score += 10;
                    document.getElementById('score').textContent = score;

                    // Increase speed
                    gameSpeed += 0.05;

                    // Spawn new collectible
                    spawnCollectible();

                    // Particles
                    createParticles(c.x, c.y, '#0ff', 15);
                }
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.95;
                p.vy *= 0.95;
                p.life -= 0.02;

                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function draw() {
            // Clear with fade effect
            ctx.fillStyle = 'rgba(10, 10, 15, 0.2)';
            ctx.fillRect(0, 0, width, height);

            // Draw grid
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            const gridSize = 50;
            for (let x = 0; x < width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            for (let y = 0; y < height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }

            // Draw collectibles
            collectibles.forEach(c => {
                ctx.save();
                ctx.translate(c.x, c.y);
                ctx.rotate(c.angle);

                // Glow
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, c.size * 2);
                gradient.addColorStop(0, 'rgba(0, 255, 255, 0.8)');
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(0, 0, c.size * 2, 0, Math.PI * 2);
                ctx.fill();

                // Core
                ctx.fillStyle = '#0ff';
                ctx.beginPath();
                ctx.arc(0, 0, c.size, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            });

            // Draw shadow trail
            shadow.trail.forEach((pos, i) => {
                const alpha = 1 - i / shadow.trail.length;
                const size = shadow.size * (1 - i / shadow.trail.length);

                ctx.fillStyle = `rgba(255, 0, 0, ${alpha * 0.3})`;
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw shadow
            const shadowGradient = ctx.createRadialGradient(
                shadow.x, shadow.y, 0,
                shadow.x, shadow.y, shadow.size * 2
            );
            shadowGradient.addColorStop(0, 'rgba(255, 0, 0, 0.8)');
            shadowGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = shadowGradient;
            ctx.beginPath();
            ctx.arc(shadow.x, shadow.y, shadow.size * 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#f00';
            ctx.beginPath();
            ctx.arc(shadow.x, shadow.y, shadow.size, 0, Math.PI * 2);
            ctx.fill();

            // Draw player trail
            player.trail.forEach((pos, i) => {
                const alpha = 1 - i / player.trail.length;
                const size = player.size * (1 - i / player.trail.length);

                ctx.fillStyle = `rgba(0, 255, 255, ${alpha * 0.3})`;
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw player
            const playerGradient = ctx.createRadialGradient(
                player.x, player.y, 0,
                player.x, player.y, player.size * 2
            );
            playerGradient.addColorStop(0, 'rgba(0, 255, 255, 0.8)');
            playerGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = playerGradient;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size * 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#0ff';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fill();

            // Draw particles
            particles.forEach(p => {
                ctx.fillStyle = `rgba(0, 255, 255, ${p.life})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOver').classList.remove('show');

            // Reset
            player.x = width / 2;
            player.y = height / 2;
            player.targetX = player.x;
            player.targetY = player.y;
            player.trail = [];

            shadow.x = width / 4;
            shadow.y = height / 4;
            shadow.trail = [];
            shadow.speed = 2;

            score = 0;
            gameSpeed = 1;
            particles = [];

            document.getElementById('score').textContent = score;
            document.getElementById('highScore').textContent = highScore;

            initCollectibles();
            gameRunning = true;
        }

        function gameOver() {
            gameRunning = false;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('shadowChaseHighScore', highScore);
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.add('show');

            createParticles(player.x, player.y, '#0ff', 30);
        }

        function restartGame() {
            startGame();
        }

        // Event listeners
        canvas.addEventListener('click', (e) => {
            if (gameRunning) {
                player.targetX = e.clientX;
                player.targetY = e.clientY;
                createParticles(e.clientX, e.clientY, '#0ff', 5);
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning) {
                player.targetX = e.touches[0].clientX;
                player.targetY = e.touches[0].clientY;
                createParticles(player.targetX, player.targetY, '#0ff', 5);
            }
        });

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        document.getElementById('highScore').textContent = highScore;
        gameLoop();
    </script>
</body>
</html>
