<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Falling Notes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
            margin: 0 auto;
        }

        .start-screen, .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 10, 26, 0.95);
            z-index: 10;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            color: #fff;
            font-size: clamp(28px, 6vw, 48px);
            margin-bottom: 10px;
            text-align: center;
            text-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
        }

        .subtitle {
            color: #888;
            font-size: clamp(14px, 3vw, 18px);
            margin-bottom: 30px;
            text-align: center;
        }

        .btn {
            padding: 15px 50px;
            font-size: clamp(18px, 4vw, 24px);
            background: linear-gradient(135deg, #8a2be2, #4169e1);
            border: none;
            border-radius: 50px;
            color: #fff;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: bold;
            margin: 10px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.6);
        }

        .stats {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: clamp(16px, 4vw, 24px);
            font-weight: bold;
            text-shadow: 0 0 10px rgba(138, 43, 226, 0.5);
            z-index: 5;
            display: flex;
            gap: 30px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 25px;
            cursor: pointer;
            z-index: 5;
            font-size: 14px;
            transition: background 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .final-score {
            font-size: clamp(36px, 8vw, 64px);
            color: #8a2be2;
            margin: 20px 0;
            text-shadow: 0 0 30px rgba(138, 43, 226, 0.5);
        }

        .high-score {
            color: #ffd700;
            font-size: clamp(18px, 4vw, 24px);
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="start-screen" id="startScreen">
        <h1>🎵 Falling Notes</h1>
        <p class="subtitle">タップして落ちてくる音符をキャッチ！</p>
        <button class="btn" id="startBtn">スタート</button>
    </div>

    <div class="game-over-screen hidden" id="gameOverScreen">
        <h1>ゲームオーバー</h1>
        <div class="final-score" id="finalScore">0</div>
        <div class="high-score" id="highScore">ハイスコア: 0</div>
        <button class="btn" id="restartBtn">もう一度</button>
    </div>

    <div class="stats" id="stats">
        <div>スコア: <span id="score">0</span></div>
        <div>ライフ: <span id="lives">3</span></div>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const finalScoreEl = document.getElementById('finalScore');
        const highScoreEl = document.getElementById('highScore');

        let gameState = 'start'; // start, playing, gameover
        let score = 0;
        let lives = 3;
        let highScore = localStorage.getItem('fallingNotesHighScore') || 0;
        let notes = [];
        let particles = [];
        let spawnTimer = 0;
        let spawnInterval = 60;
        let gameSpeed = 1;

        const lanes = 4;
        const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4'];

        function resize() {
            const maxWidth = 600;
            const maxHeight = 800;

            let width = Math.min(window.innerWidth, maxWidth);
            let height = window.innerHeight;

            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('resize', resize);
        resize();

        class Note {
            constructor() {
                this.lane = Math.floor(Math.random() * lanes);
                this.laneWidth = canvas.width / lanes;
                this.x = this.lane * this.laneWidth + this.laneWidth / 2;
                this.y = -30;
                this.size = Math.min(canvas.width, canvas.height) * 0.08;
                this.speed = (3 + Math.random() * 2) * gameSpeed;
                this.color = colors[this.lane];
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.shape = Math.floor(Math.random() * 3); // 0: circle, 1: square, 2: triangle
            }

            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 20;

                const size = this.size;

                if (this.shape === 0) {
                    // Circle
                    ctx.beginPath();
                    ctx.arc(0, 0, size / 2, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.shape === 1) {
                    // Square (rotated diamond)
                    ctx.beginPath();
                    ctx.moveTo(0, -size / 2);
                    ctx.lineTo(size / 2, 0);
                    ctx.lineTo(0, size / 2);
                    ctx.lineTo(-size / 2, 0);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    // Triangle
                    ctx.beginPath();
                    ctx.moveTo(0, -size / 2);
                    ctx.lineTo(size / 2, size / 2);
                    ctx.lineTo(-size / 2, size / 2);
                    ctx.closePath();
                    ctx.fill();
                }

                ctx.restore();

                // Lane highlight
                ctx.fillStyle = this.color + '10';
                ctx.fillRect(this.lane * this.laneWidth, 0, this.laneWidth, canvas.height);
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 8 + 4;
                this.speedX = (Math.random() - 0.5) * 8;
                this.speedY = (Math.random() - 0.5) * 8;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.02;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += 0.2;
                this.life -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function spawnNote() {
            notes.push(new Note());
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function handleTap(e) {
            if (gameState !== 'playing') return;

            const rect = canvas.getBoundingClientRect();
            let x, y;

            if (e.type === 'touchstart') {
                x = e.touches[0].clientX - rect.left;
                y = e.touches[0].clientY - rect.top;
            } else {
                x = e.clientX - rect.left;
                y = e.clientY - rect.top;
            }

            const laneWidth = canvas.width / lanes;
            const tappedLane = Math.floor(x / laneWidth);

            // Find bottom-most note in tapped lane
            let caughtNote = null;
            let highestY = -Infinity;

            for (let note of notes) {
                if (note.lane === tappedLane && note.y > canvas.height * 0.6) {
                    if (note.y > highestY) {
                        highestY = note.y;
                        caughtNote = note;
                    }
                }
            }

            if (caughtNote) {
                // Catch the note
                createParticles(caughtNote.x, caughtNote.y, caughtNote.color);
                notes = notes.filter(n => n !== caughtNote);
                score += 10;
                scoreEl.textContent = score;

                // Increase difficulty
                if (score % 50 === 0) {
                    gameSpeed += 0.1;
                    spawnInterval = Math.max(20, spawnInterval - 2);
                }
            }
        }

        function update() {
            if (gameState !== 'playing') return;

            spawnTimer++;
            if (spawnTimer >= spawnInterval) {
                spawnNote();
                spawnTimer = 0;
            }

            // Update notes
            for (let i = notes.length - 1; i >= 0; i--) {
                notes[i].update();

                // Check if note fell off screen
                if (notes[i].y > canvas.height + 50) {
                    notes.splice(i, 1);
                    lives--;
                    livesEl.textContent = lives;

                    if (lives <= 0) {
                        endGame();
                    }
                }
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw lane dividers
            const laneWidth = canvas.width / lanes;
            ctx.strokeStyle = 'rgba(138, 43, 226, 0.2)';
            ctx.lineWidth = 2;
            for (let i = 1; i < lanes; i++) {
                ctx.beginPath();
                ctx.moveTo(i * laneWidth, 0);
                ctx.lineTo(i * laneWidth, canvas.height);
                ctx.stroke();
            }

            // Draw catch zone indicator
            ctx.fillStyle = 'rgba(138, 43, 226, 0.1)';
            ctx.fillRect(0, canvas.height * 0.6, canvas.width, canvas.height * 0.4);

            // Draw notes
            notes.forEach(note => note.draw());

            // Draw particles
            particles.forEach(particle => particle.draw());
        }

        function gameLoop() {
            update();
            draw();

            if (gameState === 'playing') {
                requestAnimationFrame(gameLoop);
            }
        }

        function startGame() {
            gameState = 'playing';
            score = 0;
            lives = 3;
            gameSpeed = 1;
            spawnInterval = 60;
            notes = [];
            particles = [];
            spawnTimer = 0;

            scoreEl.textContent = score;
            livesEl.textContent = lives;

            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');

            gameLoop();
        }

        function endGame() {
            gameState = 'gameover';

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('fallingNotesHighScore', highScore);
            }

            finalScoreEl.textContent = score;
            highScoreEl.textContent = `ハイスコア: ${highScore}`;

            gameOverScreen.classList.remove('hidden');
        }

        // Event listeners
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        canvas.addEventListener('touchstart', handleTap);
        canvas.addEventListener('click', handleTap);

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // Prevent scrolling on mobile
        document.body.addEventListener('touchmove', (e) => {
            if (gameState === 'playing') {
                e.preventDefault();
            }
        }, { passive: false });

        // Initial draw
        draw();
    </script>
</body>
</html>
