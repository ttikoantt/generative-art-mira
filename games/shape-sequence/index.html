<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Shape Sequence Memory - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .game-container {
            text-align: center;
            padding: 20px;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #fff;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        
        .stat-label {
            color: #aaa;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-value {
            color: #667eea;
            font-size: 24px;
            font-weight: bold;
            margin-top: 5px;
        }
        
        .game-area {
            background: rgba(15, 15, 25, 0.8);
            border-radius: 20px;
            padding: 40px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .shapes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 300px;
        }
        
        .shape {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        .shape:active {
            transform: scale(0.95);
        }
        
        .shape.correct {
            animation: correctPulse 0.5s;
        }
        
        .shape.wrong {
            animation: wrongShake 0.5s;
            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
        }
        
        .shape.highlight {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.8);
        }
        
        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        }
        
        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .message {
            color: #fff;
            font-size: 18px;
            margin-bottom: 20px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .start-btn:hover {
            transform: scale(1.05);
        }
        
        .start-btn:active {
            transform: scale(0.95);
        }
        
        .lives {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin-top: 10px;
        }
        
        .life {
            width: 25px;
            height: 25px;
            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
            border-radius: 50%;
            transition: opacity 0.3s;
        }
        
        .life.lost {
            opacity: 0.2;
        }
        
        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(15, 15, 25, 0.9);
            border: none;
            color: #fff;
            padding: 12px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 22px;
            }
            
            .shape {
                width: 70px;
                height: 70px;
                font-size: 30px;
            }
            
            .game-area {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎯 Shape Sequence Memory</h1>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-label">Level</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Combo</div>
                <div class="stat-value" id="combo">0</div>
            </div>
        </div>
        
        <div class="game-area">
            <div id="gameContent">
                <p class="message" id="message">Watch the sequence carefully!</p>
                <div class="shapes-grid" id="shapesGrid"></div>
            </div>
        </div>
        
        <div class="lives" id="lives"></div>
        
        <button class="start-btn" id="startBtn" onclick="startGame()">▶ Start Game</button>
    </div>
    
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    
    <script>
        const shapes = ['🔴', '🔵', '🟢', '🟡', '🟣', '🟠', '⭐', '💎', '🌟'];
        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let score = 0;
        let combo = 0;
        let lives = 3;
        let isShowing = false;
        let maxLives = 3;
        
        function initShapes() {
            const grid = document.getElementById('shapesGrid');
            grid.innerHTML = '';
            
            shapes.forEach((shape, index) => {
                const div = document.createElement('div');
                div.className = 'shape';
                div.textContent = shape;
                div.dataset.index = index;
                div.onclick = () => handleShapeClick(index);
                grid.appendChild(div);
            });
        }
        
        function updateLives() {
            const livesDiv = document.getElementById('lives');
            livesDiv.innerHTML = '';
            
            for (let i = 0; i < maxLives; i++) {
                const life = document.createElement('div');
                life.className = 'life' + (i >= lives ? ' lost' : '');
                livesDiv.appendChild(life);
            }
        }
        
        function generateSequence() {
            const length = Math.min(level + 2, 10);
            sequence = [];
            
            for (let i = 0; i < length; i++) {
                sequence.push(Math.floor(Math.random() * shapes.length));
            }
        }
        
        async function showSequence() {
            isShowing = true;
            document.getElementById('message').textContent = 'Watch carefully...';
            
            const shapeElements = document.querySelectorAll('.shape');
            
            await sleep(500);
            
            for (let i = 0; i < sequence.length; i++) {
                const index = sequence[i];
                shapeElements[index].classList.add('highlight');
                
                await sleep(600);
                
                shapeElements[index].classList.remove('highlight');
                
                await sleep(200);
            }
            
            isShowing = false;
            document.getElementById('message').textContent = 'Your turn! Repeat the sequence';
        }
        
        function handleShapeClick(index) {
            if (isShowing || playerSequence.length >= sequence.length) return;
            
            const shapeElement = document.querySelectorAll('.shape')[index];
            playerSequence.push(index);
            
            const currentIndex = playerSequence.length - 1;
            
            if (playerSequence[currentIndex] === sequence[currentIndex]) {
                shapeElement.classList.add('correct');
                setTimeout(() => shapeElement.classList.remove('correct'), 500);
                
                if (playerSequence.length === sequence.length) {
                    // Sequence complete!
                    combo++;
                    const bonus = combo * 10;
                    score += 100 + bonus;
                    
                    document.getElementById('message').textContent = `Perfect! +${100 + bonus} points (Combo x${combo})`;
                    
                    setTimeout(() => {
                        level++;
                        playerSequence = [];
                        generateSequence();
                        updateStats();
                        showSequence();
                    }, 1500);
                }
            } else {
                shapeElement.classList.add('wrong');
                setTimeout(() => shapeElement.classList.remove('wrong'), 500);
                
                combo = 0;
                lives--;
                updateLives();
                updateStats();
                
                if (lives <= 0) {
                    gameOver();
                } else {
                    document.getElementById('message').textContent = `Wrong! ${lives} lives left. Try again!`;
                    playerSequence = [];
                    
                    setTimeout(() => {
                        showSequence();
                    }, 1500);
                }
            }
            
            updateStats();
        }
        
        function startGame() {
            level = 1;
            score = 0;
            combo = 0;
            lives = maxLives;
            playerSequence = [];
            
            updateStats();
            updateLives();
            initShapes();
            generateSequence();
            
            document.getElementById('startBtn').style.display = 'none';
            
            showSequence();
        }
        
        function gameOver() {
            document.getElementById('message').innerHTML = `
                <div>
                    <div style="font-size: 24px; margin-bottom: 10px;">🎮 Game Over!</div>
                    <div style="font-size: 16px;">Final Score: ${score}</div>
                    <div style="font-size: 14px; color: #aaa;">Level Reached: ${level}</div>
                </div>
            `;
            
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('startBtn').textContent = '🔄 Play Again';
        }
        
        function updateStats() {
            document.getElementById('level').textContent = level;
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;
        }
        
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        // Initialize
        initShapes();
        updateLives();
    </script>
</body>
</html>
