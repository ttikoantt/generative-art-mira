<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silent Clicker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: #e94560;
            font-size: clamp(24px, 5vw, 48px);
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .score-display {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 60px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .score-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(14px, 3vw, 18px);
            margin-bottom: 10px;
        }

        .score {
            color: #fff;
            font-size: clamp(48px, 10vw, 72px);
            font-weight: bold;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            transition: transform 0.1s;
        }

        .score.bump {
            transform: scale(1.2);
        }

        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #e94560;
            font-size: 24px;
            font-weight: bold;
        }

        .click-button {
            background: linear-gradient(135deg, #e94560 0%, #c23a51 100%);
            border: none;
            color: white;
            padding: 20px 60px;
            font-size: clamp(18px, 4vw, 24px);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.3);
            font-weight: bold;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .click-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }

        .click-button:active::before {
            width: 300px;
            height: 300px;
        }

        .click-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(233, 69, 96, 0.4);
        }

        .click-button:active {
            transform: translateY(2px) scale(0.98);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.3);
        }

        .level-badge {
            background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%);
            color: #1a1a2e;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 20px;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .progress-bar {
            width: 100%;
            max-width: 400px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin: 20px auto;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560 0%, #ff6b6b 100%);
            border-radius: 4px;
            transition: width 0.3s;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, rgba(233, 69, 96, 0.8) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.3;
            }
            50% {
                transform: translateY(-20px) rotate(180deg);
                opacity: 0.7;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <h1>SILENT CLICKER</h1>

        <div class="level-badge" id="levelBadge">Level 1</div>

        <div class="score-display">
            <div class="score-label">SCORE</div>
            <div class="score" id="score">0</div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">LEVEL</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">CLICKS</div>
                <div class="stat-value" id="clicks">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">NEXT</div>
                <div class="stat-value" id="nextLevel">10</div>
            </div>
        </div>

        <button class="click-button" id="clickButton">TAP!</button>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        let score = 0;
        let clicks = 0;
        let level = 1;
        let scorePerClick = 1;
        let nextLevelScore = 10;

        const scoreElement = document.getElementById('score');
        const clicksElement = document.getElementById('clicks');
        const levelElement = document.getElementById('level');
        const levelBadge = document.getElementById('levelBadge');
        const nextLevelElement = document.getElementById('nextLevel');
        const progressFill = document.getElementById('progressFill');
        const clickButton = document.getElementById('clickButton');

        function createParticles(x, y) {
            for (let i = 0; i < 5; i++) {
                const particle = document.createElement('div');
                particle.style.cssText = `
                    position: fixed;
                    width: ${Math.random() * 10 + 5}px;
                    height: ${Math.random() * 10 + 5}px;
                    background: radial-gradient(circle, rgba(233, 69, 96, 0.8) 0%, transparent 70%);
                    border-radius: 50%;
                    left: ${x}px;
                    top: ${y}px;
                    pointer-events: none;
                    z-index: 1000;
                `;
                document.body.appendChild(particle);

                const angle = (Math.PI * 2 / 5) * i;
                const velocity = Math.random() * 100 + 50;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity;

                let posX = x;
                let posY = y;
                let opacity = 1;
                let scale = 1;

                function animate() {
                    posX += vx * 0.02;
                    posY += vy * 0.02;
                    opacity -= 0.02;
                    scale -= 0.01;

                    particle.style.left = posX + 'px';
                    particle.style.top = posY + 'px';
                    particle.style.opacity = opacity;
                    particle.style.transform = `scale(${scale})`;

                    if (opacity > 0) {
                        requestAnimationFrame(animate);
                    } else {
                        particle.remove();
                    }
                }

                requestAnimationFrame(animate);
            }
        }

        function checkLevelUp() {
            if (score >= nextLevelScore) {
                level++;
                scorePerClick = Math.floor(1 + level * 0.5);
                nextLevelScore = Math.floor(nextLevelScore * 1.5);

                levelElement.textContent = level;
                levelBadge.textContent = `Level ${level}`;
                nextLevelElement.textContent = nextLevelScore;

                levelBadge.style.animation = 'none';
                levelBadge.offsetHeight;
                levelBadge.style.animation = 'pulse 0.5s ease-in-out 3';
            }

            const progress = (score / nextLevelScore) * 100;
            progressFill.style.width = Math.min(progress, 100) + '%';
        }

        function handleClick(e) {
            score += scorePerClick;
            clicks++;

            scoreElement.textContent = score.toLocaleString();
            clicksElement.textContent = clicks.toLocaleString();

            scoreElement.classList.add('bump');
            setTimeout(() => scoreElement.classList.remove('bump'), 100);

            const rect = clickButton.getBoundingClientRect();
            const x = e.clientX || (rect.left + rect.width / 2);
            const y = e.clientY || (rect.top + rect.height / 2);
            createParticles(x, y);

            checkLevelUp();

            if (navigator.vibrate) {
                navigator.vibrate(10);
            }
        }

        clickButton.addEventListener('click', handleClick);
        clickButton.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick(e);
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Create background particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 3 + 's';
            particle.style.width = (Math.random() * 15 + 5) + 'px';
            particle.style.height = particle.style.width;
            particlesContainer.appendChild(particle);
        }

        checkLevelUp();
    </script>
</body>
</html>
