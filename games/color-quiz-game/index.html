<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Quiz - 色当てクイズ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .stat {
            text-align: center;
            color: #fff;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #4ecdc4;
        }

        .color-display {
            background: #fff;
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
        }

        .question {
            color: #fff;
            text-align: center;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 18px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            font-weight: 600;
        }

        .option-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .option-btn:active {
            transform: scale(0.95);
        }

        .option-btn.correct {
            background: #2ecc71 !important;
            border-color: #27ae60 !important;
        }

        .option-btn.wrong {
            background: #e74c3c !important;
            border-color: #c0392b !important;
        }

        .result {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: bold;
            animation: slideIn 0.3s;
        }

        .result.correct {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }

        .result.wrong {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 480px) {
            .game-container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .color-display {
                padding: 30px;
            }

            .option-btn {
                padding: 15px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <h1>🎨 Color Quiz</h1>
        <p class="subtitle">この色は何色？</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">問題</div>
                <div class="stat-value" id="questionNum">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">正解率</div>
                <div class="stat-value" id="accuracy">0%</div>
            </div>
        </div>

        <div class="color-display" id="colorDisplay"></div>

        <div class="question" id="questionText">何色でしょう？</div>

        <div class="options" id="options"></div>

        <div id="result"></div>
    </div>

    <script>
        // 色の定義
        const colors = [
            { name: 'レッド', value: '#e74c3c', names: ['RED', 'RED', 'レッド'] },
            { name: 'ブルー', value: '#3498db', names: ['BLUE', 'ブルー'] },
            { name: 'グリーン', value: '#2ecc71', names: ['GREEN', 'グリーン', '緑'] },
            { name: 'イエロー', value: '#f1c40f', names: ['YELLOW', 'イエロー', '黄色'] },
            { name: 'パープル', value: '#9b59b6', names: ['PURPLE', 'パープル', '紫'] },
            { name: 'オレンジ', value: '#e67e22', names: ['ORANGE', 'オレンジ'] },
            { name: 'ピンク', value: '#fd79a8', names: ['PINK', 'ピンク'] },
            { name: 'シアン', value: '#00cec9', names: ['CYAN', 'シアン', '水色'] },
            { name: 'マゼンタ', value: '#e84393', names: ['MAGENTA', 'マゼンタ', '赤紫'] },
            { name: 'ライム', value: '#aaff00', names: ['LIME', 'ライム', '黄緑'] },
            { name: 'ターコイズ', value: '#1abc9c', names: ['TURQUOISE', 'ターコイズ', '青緑'] },
            { name: 'インディゴ', value: '#34495e', names: ['INDIGO', 'インディゴ', '藍色'] },
            { name: 'ゴールド', value: '#daa520', names: ['GOLD', 'ゴールド', '金色'] },
            { name: 'シルバー', value: '#c0c0c0', names: ['SILVER', 'シルバー', '銀色'] },
            { name: 'ブロンズ', value: '#cd7f32', names: ['BRONZE', 'ブロンズ', '青銅色'] },
            { name: 'コーラル', value: '#ff7f50', names: ['CORAL', 'コーラル', 'サンゴ色'] },
            { name: 'ラベンダー', value: '#e6e6fa', names: ['LAVENDER', 'ラベンダー', '薄紫'] },
            { name: 'ミント', value: '#98ff98', names: ['MINT', 'ミント', '薄荷色'] },
            { name: 'サクラ', value: '#ffd1dc', names: ['SAKURA', 'サクラ', '桜色'] },
            { name: 'コバルト', value: '#0047ab', names: ['COBALT', 'コバルト', '群青'] },
            { name: 'ブラウン', value: '#8b4513', names: ['BROWN', 'ブラウン', '茶色'] },
            { name: 'グレー', value: '#808080', names: ['GRAY', 'グレー', '灰色'] },
            { name: 'ベージュ', value: '#f5f5dc', names: ['BEIGE', 'ベージュ'] },
            { name: 'アズキ', value: '#9d1c34', names: ['AZUKI', 'アズキ', '小豆色'] },
            { name: 'ウグイス', value: '#8a9a5b', names: ['UGUISU', 'ウグイス', '鶯色'] },
            { name: 'カキ', value: '#e85d3a', names: ['KAKI', 'カキ', '柿色'] },
            { name: 'タンポポ', value: '#ffc0cb', names: ['DANDELION', 'タンポポ'] },
            { name: 'ヒース', value: '#bcafb2', names: ['HEATHER', 'ヒース', '石楠花'] },
            { name: 'モーブ', value: '#9932cc', names: ['MAUVE', 'モーブ', '紫紺'] },
            { name: 'エメラルド', value: '#50c878', names: ['EMERALD', 'エメラルド', '翠玉色'] }
        ];

        // ゲーム状態
        let score = 0;
        let questionNum = 1;
        let totalQuestions = 0;
        let correctAnswers = 0;
        let currentColor = null;
        let canAnswer = true;

        // DOM要素
        const colorDisplay = document.getElementById('colorDisplay');
        const optionsContainer = document.getElementById('options');
        const resultDiv = document.getElementById('result');
        const scoreDisplay = document.getElementById('score');
        const questionNumDisplay = document.getElementById('questionNum');
        const accuracyDisplay = document.getElementById('accuracy');

        // 色をシャッフル
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // 新しい問題を生成
        function generateQuestion() {
            // 正解の色を選択
            currentColor = colors[Math.floor(Math.random() * colors.length)];

            // 色を表示
            colorDisplay.style.backgroundColor = currentColor.value;

            // 選択肢を生成（正解+3つのダミー）
            let options = [currentColor];
            const otherColors = colors.filter(c => c !== currentColor);
            const shuffledOthers = shuffleArray(otherColors);
            options = options.concat(shuffledOthers.slice(0, 3));

            // 選択肢をシャッフル
            options = shuffleArray(options);

            // 選択肢ボタンを作成
            optionsContainer.innerHTML = '';
            options.forEach(color => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = color.name;
                btn.onclick = () => checkAnswer(color, btn);
                optionsContainer.appendChild(btn);
            });

            // 結果をクリア
            resultDiv.textContent = '';
            resultDiv.className = '';
            canAnswer = true;
        }

        // 回答をチェック
        function checkAnswer(selectedColor, btn) {
            if (!canAnswer) return;
            canAnswer = false;

            totalQuestions++;
            const isCorrect = selectedColor.name === currentColor.name;

            if (isCorrect) {
                correctAnswers++;
                score += 100;
                btn.classList.add('correct');
                resultDiv.textContent = '🎉 正解！';
                resultDiv.className = 'result correct';
            } else {
                btn.classList.add('wrong');
                // 正解を表示
                const buttons = optionsContainer.querySelectorAll('.option-btn');
                buttons.forEach(b => {
                    if (b.textContent === currentColor.name) {
                        b.classList.add('correct');
                    }
                });
                resultDiv.textContent = `残念！正解は「${currentColor.name}」`;
                resultDiv.className = 'result wrong';
            }

            // 統計を更新
            updateStats();

            // 次の問題へ
            setTimeout(() => {
                questionNum++;
                generateQuestion();
            }, 1500);
        }

        // 統計を更新
        function updateStats() {
            scoreDisplay.textContent = score;
            questionNumDisplay.textContent = questionNum;
            const accuracy = totalQuestions > 0
                ? Math.round((correctAnswers / totalQuestions) * 100)
                : 0;
            accuracyDisplay.textContent = accuracy + '%';
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ゲーム開始
        generateQuestion();
    </script>
</body>
</html>
