<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quantum Jump - 量子ジャンプ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #gameContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        #gameCanvas {
            border: 2px solid #4ecdc4;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(78, 205, 196, 0.3);
            max-width: 100%;
            touch-action: none;
        }

        .ui {
            text-align: center;
            margin-bottom: 20px;
            color: #4ecdc4;
        }

        .ui h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(78, 205, 196, 0.5);
        }

        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            font-size: 18px;
            margin-top: 10px;
        }

        .stat {
            background: rgba(78, 205, 196, 0.1);
            padding: 10px 20px;
            border-radius: 5px;
            border: 1px solid rgba(78, 205, 196, 0.3);
        }

        .stat span {
            font-weight: bold;
            color: #ff6b6b;
        }

        .controls {
            margin-top: 20px;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        #gameOverScreen {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 26, 0.95);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #ff6b6b;
            text-align: center;
            z-index: 100;
        }

        #gameOverScreen h2 {
            color: #ff6b6b;
            font-size: 32px;
            margin-bottom: 20px;
        }

        #gameOverScreen p {
            color: #4ecdc4;
            font-size: 20px;
            margin-bottom: 20px;
        }

        #gameOverScreen button {
            background: linear-gradient(135deg, #4ecdc4, #45b7d1);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #gameOverScreen button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.5);
        }

        @media (max-width: 768px) {
            .ui h1 {
                font-size: 24px;
            }

            .stats {
                flex-direction: column;
                gap: 10px;
            }

            .controls {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="ui">
            <h1>⚛️ Quantum Jump</h1>
            <div class="stats">
                <div class="stat">Score: <span id="scoreDisplay">0</span></div>
                <div class="stat">High Score: <span id="highScoreDisplay">0</span></div>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="controls">
            <p>Tap/Space to Jump • Avoid obstacles</p>
        </div>
    </div>

    <div id="gameOverScreen">
        <h2>⚛️ Game Over</h2>
        <p>Score: <span id="finalScore">0</span></p>
        <button onclick="restartGame()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // キャンバスサイズ設定
        function setCanvasSize() {
            const maxWidth = Math.min(window.innerWidth - 40, 600);
            const maxHeight = Math.min(window.innerHeight - 200, 400);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }

        setCanvasSize();
        window.addEventListener('resize', setCanvasSize);

        // ゲーム変数
        let gameState = {
            score: 0,
            highScore: parseInt(localStorage.getItem('quantumJumpHighScore')) || 0,
            isRunning: true,
            speed: 3
        };

        // プレイヤークラス
        class Player {
            constructor() {
                this.x = 80;
                this.y = canvas.height / 2;
                this.velocity = 0;
                this.gravity = 0.5;
                this.jumpForce = -8;
                this.size = 30;
                this.trail = [];
            }

            update() {
                this.velocity += this.gravity;
                this.y += this.velocity;

                // トレイル追加
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 20) {
                    this.trail.shift();
                }

                // 境界チェック
                if (this.y < this.size) {
                    this.y = this.size;
                    this.velocity = 0;
                }
                if (this.y > canvas.height - this.size) {
                    this.y = canvas.height - this.size;
                    this.velocity = 0;
                    gameOver();
                }
            }

            jump() {
                this.velocity = this.jumpForce;
            }

            draw() {
                // トレイル描画
                this.trail.forEach((pos, index) => {
                    const alpha = index / this.trail.length * 0.3;
                    ctx.fillStyle = `rgba(78, 205, 196, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(pos.x - (this.trail.length - index) * 2, pos.y, this.size * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                });

                // プレイヤー描画（量子効果）
                const time = Date.now() * 0.01;

                // 外側の光
                ctx.shadowColor = '#4ecdc4';
                ctx.shadowBlur = 20 + Math.sin(time) * 10;

                // 本体
                ctx.fillStyle = '#4ecdc4';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();

                // 内側の光
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(this.x - 5, this.y - 5, this.size * 0.3, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowBlur = 0;
            }
        }

        // 障害物クラス
        class Obstacle {
            constructor() {
                this.x = canvas.width;
                this.size = 30 + Math.random() * 30;
                this.y = Math.random() * (canvas.height - this.size * 2) + this.size;
                this.type = Math.random() > 0.5 ? 'top' : 'bottom';
                this.passed = false;
            }

            update() {
                this.x -= gameState.speed;
            }

            draw() {
                const time = Date.now() * 0.01;

                ctx.shadowColor = '#ff6b6b';
                ctx.shadowBlur = 15;

                // 回転する障害物
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(time * 0.02);

                ctx.fillStyle = '#ff6b6b';
                ctx.beginPath();

                if (this.type === 'top') {
                    // 上向き三角形
                    ctx.moveTo(0, -this.size);
                    ctx.lineTo(-this.size * 0.7, this.size * 0.7);
                    ctx.lineTo(this.size * 0.7, this.size * 0.7);
                } else {
                    // 下向き三角形
                    ctx.moveTo(0, this.size);
                    ctx.lineTo(-this.size * 0.7, -this.size * 0.7);
                    ctx.lineTo(this.size * 0.7, -this.size * 0.7);
                }

                ctx.closePath();
                ctx.fill();

                ctx.restore();
                ctx.shadowBlur = 0;
            }

            checkCollision(player) {
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                return dist < player.size + this.size * 0.7;
            }
        }

        // 背景パーティクル
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speed = Math.random() * 2 + 1;
                this.alpha = Math.random() * 0.5;
            }

            update() {
                this.x -= this.speed;
                if (this.x < 0) {
                    this.reset();
                    this.x = canvas.width;
                }
            }

            draw() {
                ctx.fillStyle = `rgba(78, 205, 196, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ゲームオブジェクト
        let player = new Player();
        let obstacles = [];
        let particles = [];
        let frameCount = 0;
        let spawnRate = 120;

        // 背景パーティクル初期化
        for (let i = 0; i < 50; i++) {
            particles.push(new Particle());
        }

        // スコア更新
        function updateScore() {
            document.getElementById('scoreDisplay').textContent = gameState.score;
            document.getElementById('highScoreDisplay').textContent = gameState.highScore;
        }

        // ゲームオーバー
        function gameOver() {
            gameState.isRunning = false;

            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
                localStorage.setItem('quantumJumpHighScore', gameState.highScore);
            }

            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('gameOverScreen').style.display = 'block';
        }

        // ゲーム再開
        function restartGame() {
            player = new Player();
            obstacles = [];
            gameState.score = 0;
            gameState.isRunning = true;
            gameState.speed = 3;
            frameCount = 0;
            document.getElementById('gameOverScreen').style.display = 'none';
            updateScore();
        }

        // 入力処理
        function handleInput() {
            if (gameState.isRunning) {
                player.jump();
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleInput();
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInput();
        });

        canvas.addEventListener('click', handleInput);

        // メインループ
        function gameLoop() {
            // 背景クリア
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 背景パーティクル
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            if (gameState.isRunning) {
                frameCount++;

                // プレイヤー更新
                player.update();

                // 障害物生成
                if (frameCount % spawnRate === 0) {
                    obstacles.push(new Obstacle());
                }

                // 障害物更新
                obstacles.forEach((obs, index) => {
                    obs.update();

                    // 衝突判定
                    if (obs.checkCollision(player)) {
                        gameOver();
                    }

                    // 通過判定
                    if (!obs.passed && obs.x < player.x) {
                        obs.passed = true;
                        gameState.score++;
                        updateScore();

                        // 速度上昇
                        if (gameState.score % 10 === 0) {
                            gameState.speed += 0.5;
                            spawnRate = Math.max(60, spawnRate - 5);
                        }
                    }

                    // 画面外に出たら削除
                    if (obs.x < -50) {
                        obstacles.splice(index, 1);
                    }
                });
            }

            // 描画
            obstacles.forEach(obs => obs.draw());
            player.draw();

            requestAnimationFrame(gameLoop);
        }

        // 開始
        updateScore();
        gameLoop();
    </script>
</body>
</html>
