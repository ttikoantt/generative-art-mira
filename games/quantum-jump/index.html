<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Quantum Jump</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: manipulation;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 100vh;
            max-height: 600px;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 18px;
            text-shadow: 0 0 10px rgba(100, 200, 255, 0.8);
            pointer-events: none;
        }

        .title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.8);
            pointer-events: none;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            display: none;
        }

        .game-over h2 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 100, 100, 0.8);
        }

        .game-over p {
            font-size: 24px;
            margin-bottom: 30px;
        }

        .restart-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: rgba(100, 200, 255, 0.2);
            border: 2px solid rgba(100, 200, 255, 0.8);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
        }

        .restart-btn:hover {
            background: rgba(100, 200, 255, 0.4);
            transform: scale(1.05);
        }

        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .game-container {
                max-height: 100vh;
            }

            .title {
                font-size: 20px;
                top: 10px;
            }

            .ui {
                font-size: 14px;
                top: 10px;
                left: 10px;
            }

            .game-over h2 {
                font-size: 32px;
            }

            .game-over p {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="canvas"></canvas>
        <div class="title">Quantum Jump</div>
        <div class="ui">
            <div>スコア: <span id="score">0</span></div>
            <div>ハイスコア: <span id="highScore">0</span></div>
        </div>
        <div class="game-over" id="gameOver">
            <h2>GAME OVER</h2>
            <p>スコア: <span id="finalScore">0</span></p>
            <button class="restart-btn" onclick="restart()">再挑戦</button>
        </div>
        <div class="instructions">画面タップでジャンプ</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');

        let width, height;
        let player, obstacles, particles;
        let score, highScore, gameRunning, gameSpeed;
        let lastTime = 0;
        let spawnTimer = 0;

        // LocalStorageからハイスコアを読み込み
        highScore = parseInt(localStorage.getItem('quantumJumpHighScore')) || 0;
        highScoreEl.textContent = highScore;

        function resize() {
            const container = canvas.parentElement;
            width = canvas.width = container.clientWidth;
            height = canvas.height = container.clientHeight;
        }

        resize();
        window.addEventListener('resize', resize);

        class Player {
            constructor() {
                this.x = 100;
                this.y = height / 2;
                this.velocity = 0;
                this.gravity = 0.6;
                this.jumpForce = -12;
                this.radius = 15;
                this.trail = [];
                this.color = '#00d4ff';
            }

            jump() {
                this.velocity = this.jumpForce;
                this.createJumpParticles();
            }

            createJumpParticles() {
                for (let i = 0; i < 10; i++) {
                    particles.push(new Particle(
                        this.x,
                        this.y,
                        (Math.random() - 0.5) * 4,
                        (Math.random() - 0.5) * 4,
                        this.color
                    ));
                }
            }

            update() {
                this.velocity += this.gravity;
                this.y += this.velocity;

                // 地面と天井
                if (this.y > height - this.radius) {
                    this.y = height - this.radius;
                    this.velocity = 0;
                }
                if (this.y < this.radius) {
                    this.y = this.radius;
                    this.velocity = 0;
                }

                // 軌跡を記録
                this.trail.unshift({ x: this.x, y: this.y });
                if (this.trail.length > 20) {
                    this.trail.pop();
                }
            }

            draw() {
                // 軌跡を描画
                this.trail.forEach((pos, i) => {
                    const alpha = (1 - i / this.trail.length) * 0.3;
                    const size = this.radius * (1 - i / this.trail.length);
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 212, 255, ${alpha})`;
                    ctx.fill();
                });

                // 本体
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius
                );
                gradient.addColorStop(0, '#ffffff');
                gradient.addColorStop(0.3, this.color);
                gradient.addColorStop(1, 'rgba(0, 212, 255, 0)');

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // グロウ
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius + 5, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(0, 212, 255, 0.3)';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        class Obstacle {
            constructor() {
                this.x = width + 50;
                this.width = 30;
                this.gap = 200;
                this.topHeight = Math.random() * (height - this.gap - 100) + 50;
                this.speed = 5;
                this.passed = false;
                this.color = '#ff0080';
            }

            update() {
                this.x -= this.speed + gameSpeed;
            }

            draw() {
                // 上の障害物
                const topGradient = ctx.createLinearGradient(this.x, 0, this.x + this.width, 0);
                topGradient.addColorStop(0, 'rgba(255, 0, 128, 0.8)');
                topGradient.addColorStop(1, 'rgba(255, 0, 128, 0.4)');
                ctx.fillStyle = topGradient;
                ctx.fillRect(this.x, 0, this.width, this.topHeight);

                // 下の障害物
                const bottomGradient = ctx.createLinearGradient(this.x, 0, this.x + this.width, 0);
                bottomGradient.addColorStop(0, 'rgba(255, 0, 128, 0.4)');
                bottomGradient.addColorStop(1, 'rgba(255, 0, 128, 0.8)');
                ctx.fillStyle = bottomGradient;
                ctx.fillRect(this.x, this.topHeight + this.gap, this.width, height - this.topHeight - this.gap);

                // グロウ効果
                ctx.strokeStyle = 'rgba(255, 0, 128, 0.6)';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, 0, this.width, this.topHeight);
                ctx.strokeRect(this.x, this.topHeight + this.gap, this.width, height - this.topHeight - this.gap);
            }

            collidesWith(player) {
                // 上の障害物との衝突
                if (player.x + player.radius > this.x &&
                    player.x - player.radius < this.x + this.width &&
                    player.y - player.radius < this.topHeight) {
                    return true;
                }

                // 下の障害物との衝突
                if (player.x + player.radius > this.x &&
                    player.x - player.radius < this.x + this.width &&
                    player.y + player.radius > this.topHeight + this.gap) {
                    return true;
                }

                return false;
            }
        }

        class Particle {
            constructor(x, y, vx, vy, color) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.life = 1;
                this.color = color;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.02;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = this.color.replace(')', `, ${this.life})`).replace('rgb', 'rgba');
                ctx.fill();
            }
        }

        function init() {
            player = new Player();
            obstacles = [];
            particles = [];
            score = 0;
            gameSpeed = 0;
            gameRunning = true;
            scoreEl.textContent = score;
            gameOverEl.style.display = 'none';
        }

        function spawnObstacle() {
            obstacles.push(new Obstacle());
        }

        function gameOver() {
            gameRunning = false;
            gameOverEl.style.display = 'block';
            finalScoreEl.textContent = score;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('quantumJumpHighScore', highScore);
                highScoreEl.textContent = highScore;
            }
        }

        function restart() {
            init();
        }

        function handleInput(e) {
            if (e.type === 'keydown' && e.code !== 'Space') return;
            e.preventDefault();

            if (gameRunning) {
                player.jump();
            }
        }

        // イベントリスナー
        window.addEventListener('keydown', handleInput);
        canvas.addEventListener('click', handleInput);
        canvas.addEventListener('touchstart', handleInput);

        function update(deltaTime) {
            if (!gameRunning) return;

            player.update();

            // 障害物をスポーン
            spawnTimer += deltaTime;
            if (spawnTimer > 1500) {
                spawnObstacle();
                spawnTimer = 0;
            }

            // 障害物を更新
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].update();

                // 衝突判定
                if (obstacles[i].collidesWith(player)) {
                    gameOver();
                    return;
                }

                // スコア加算
                if (!obstacles[i].passed && obstacles[i].x + obstacles[i].width < player.x) {
                    obstacles[i].passed = true;
                    score++;
                    scoreEl.textContent = score;

                    // スピードアップ
                    gameSpeed = Math.min(score * 0.1, 5);

                    // スコアパーティクル
                    for (let j = 0; j < 20; j++) {
                        particles.push(new Particle(
                            player.x,
                            player.y,
                            (Math.random() - 0.5) * 8,
                            (Math.random() - 0.5) * 8,
                            'rgb(0, 255, 128)'
                        ));
                    }
                }

                // 画面外に出たら削除
                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                }
            }

            // パーティクルを更新
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function draw() {
            // 背景をクリア（残像効果）
            ctx.fillStyle = 'rgba(10, 10, 46, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // 背景の量子フィールド
            for (let i = 0; i < 50; i++) {
                const x = (Date.now() * 0.05 + i * 100) % (width + 100) - 50;
                const y = (Math.sin(Date.now() * 0.001 + i) * 0.5 + 0.5) * height;
                const size = Math.sin(Date.now() * 0.002 + i) * 2 + 3;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(100, 200, 255, ${Math.sin(Date.now() * 0.002 + i) * 0.2 + 0.1})`;
                ctx.fill();
            }

            // 障害物を描画
            obstacles.forEach(obstacle => obstacle.draw());

            // パーティクルを描画
            particles.forEach(particle => particle.draw());

            // プレイヤーを描画
            player.draw();
        }

        function gameLoop(timestamp) {
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;

            update(deltaTime);
            draw();

            requestAnimationFrame(gameLoop);
        }

        init();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
