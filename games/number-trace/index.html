<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Number Trace - 数字なぞりゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            font-size: clamp(24px, 5vw, 36px);
            font-weight: 300;
            margin-bottom: 20px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 4px;
        }

        .grid-container {
            position: relative;
            margin: 20px 0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .cell {
            width: clamp(50px, 13vw, 70px);
            height: clamp(50px, 13vw, 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(24px, 5vw, 32px);
            font-weight: bold;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        .cell::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent,
                rgba(255, 255, 255, 0.1),
                transparent
            );
            transform: rotate(45deg);
            transition: all 0.5s ease;
        }

        .cell:hover::before {
            left: 100%;
        }

        .cell.visited {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
            transform: scale(0.95);
        }

        .cell.current {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-color: #f093fb;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(240, 147, 251, 0.5);
        }

        .cell.start {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            border-color: #43e97b;
        }

        .cell.end {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            border-color: #fa709a;
        }

        .cell.error {
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .target-display {
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            min-width: 150px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .target-display.current {
            transform: scale(1.1);
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3) 0%, rgba(118, 75, 162, 0.3) 100%);
        }

        .btn {
            padding: 14px 32px;
            font-size: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 25px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            font-weight: 500;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 16px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .instructions {
            font-size: 14px;
            opacity: 0.7;
            text-align: center;
            margin-top: 20px;
            max-width: 400px;
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 30px 50px;
            font-size: 32px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 20px;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .message.show {
            opacity: 1;
        }

        .message.success {
            background: linear-gradient(135deg, rgba(67, 233, 123, 0.9) 0%, rgba(56, 249, 215, 0.9) 100%);
        }

        @media (max-width: 768px) {
            .stats {
                gap: 20px;
            }

            .stat-value {
                font-size: 24px;
            }

            .grid {
                gap: 8px;
                padding: 15px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 12px;
                font-size: 12px;
            }

            .instructions {
                font-size: 12px;
                padding: 0 10px;
            }
        }

        .confetti {
            position: fixed;
            pointer-events: none;
            z-index: 150;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">⛶ 全画面</button>

    <div class="game-container">
        <h1>Number Trace</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">スコア</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="level">1</div>
                <div class="stat-label">レベル</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="combo">0</div>
                <div class="stat-label">コンボ</div>
            </div>
        </div>

        <div class="target-display" id="targetDisplay">1</div>

        <div class="grid-container">
            <div class="grid" id="grid"></div>
        </div>

        <div class="instructions">
            数字を順番になぞって消そう！<br>
            間違えるとコンボがリセットされます
        </div>
    </div>

    <div class="message" id="message"></div>

    <script>
        const grid = document.getElementById('grid');
        const targetDisplay = document.getElementById('targetDisplay');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const comboEl = document.getElementById('combo');
        const messageEl = document.getElementById('message');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let numbers = [];
        let currentIndex = 0;
        let score = 0;
        let level = 1;
        let combo = 0;
        let maxNumber = 10;
        let isProcessing = false;
        let visited = new Set();

        function initGame() {
            numbers = generateNumbers(maxNumber);
            currentIndex = 0;
            visited.clear();
            renderGrid();
            updateTarget();
            updateStats();
        }

        function generateNumbers(count) {
            const nums = [];
            for (let i = 1; i <= count; i++) {
                nums.push(i);
            }
            return shuffleArray(nums);
        }

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function renderGrid() {
            grid.innerHTML = '';
            numbers.forEach((num, index) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = num;
                cell.dataset.number = num;
                cell.dataset.index = index;

                if (index === 0) cell.classList.add('start');
                if (index === numbers.length - 1) cell.classList.add('end');

                cell.addEventListener('click', () => handleCellClick(num, index, cell));
                cell.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    handleCellClick(num, index, cell);
                });

                grid.appendChild(cell);
            });
        }

        function handleCellClick(num, index, cell) {
            if (isProcessing) return;

            const expectedNumber = currentIndex + 1;

            if (num === expectedNumber) {
                // 正解
                visited.add(index);
                cell.classList.add('visited');
                if (currentIndex === 0) {
                    cell.classList.add('start');
                }
                currentIndex++;
                combo++;

                if (currentIndex >= numbers.length) {
                    // レベル完了
                    levelComplete();
                } else {
                    updateTarget();
                    updateStats();
                }
            } else if (!visited.has(index)) {
                // 不正解
                cell.classList.add('error');
                combo = 0;
                updateStats();
                showMessage('ミス！', 'error');

                setTimeout(() => {
                    cell.classList.remove('error');
                }, 500);
            }
        }

        function updateTarget() {
            const target = currentIndex + 1;
            targetDisplay.textContent = target;
            targetDisplay.classList.add('current');

            setTimeout(() => {
                targetDisplay.classList.remove('current');
            }, 300);
        }

        function updateStats() {
            scoreEl.textContent = score;
            levelEl.textContent = level;
            comboEl.textContent = combo;
        }

        function levelComplete() {
            isProcessing = true;

            const bonus = combo * 10;
            score += 100 + bonus;

            showMessage(`レベル${level}クリア！+${100 + bonus}`, 'success');
            createConfetti();

            setTimeout(() => {
                level++;
                maxNumber = Math.min(10 + level * 2, 25);
                initGame();
                isProcessing = false;
            }, 2000);
        }

        function showMessage(text, type = 'info') {
            messageEl.textContent = text;
            messageEl.className = 'message show ' + type;

            setTimeout(() => {
                messageEl.classList.remove('show');
            }, 1500);
        }

        function createConfetti() {
            const colors = ['#667eea', '#764ba2', '#f093fb', '#43e97b', '#38f9d7', '#fa709a', '#fee140'];

            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.cssText = `
                    position: fixed;
                    width: 10px;
                    height: 10px;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                    left: ${Math.random() * 100}vw;
                    top: -10px;
                    border-radius: ${Math.random() > 0.5 ? '50%' : '0'};
                    animation: fall ${2 + Math.random() * 2}s linear forwards;
                `;
                document.body.appendChild(confetti);

                setTimeout(() => confetti.remove(), 4000);
            }

            // アニメーションを追加
            if (!document.getElementById('confetti-style')) {
                const style = document.createElement('style');
                style.id = 'confetti-style';
                style.textContent = `
                    @keyframes fall {
                        to {
                            transform: translateY(100vh) rotate(720deg);
                            opacity: 0;
                        }
                    }
                `;
                document.head.appendChild(style);
            }
        }

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // ゲーム開始
        initGame();
    </script>
</body>
</html>
