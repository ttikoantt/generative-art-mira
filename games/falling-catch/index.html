<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falling Catch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .game-container {
            text-align: center;
            z-index: 1;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            color: #fff;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 1rem;
            color: #fff;
            font-size: 1.1rem;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
        }

        canvas {
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            background: linear-gradient(180deg, #0a0a0a, #1a1a2e);
            display: block;
            margin: 0 auto;
            max-width: 100vw;
        }

        .controls {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(245, 87, 108, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            z-index: 1000;
            font-size: 0.9rem;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .instructions {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            margin-top: 1rem;
            padding: 0 1rem;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            z-index: 100;
            display: none;
        }

        .game-over h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #f5576c;
        }

        .game-over p {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <h1>🧺 Falling Catch</h1>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">LEVEL</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">LIVES</div>
                <div class="stat-value" id="lives">3</div>
            </div>
        </div>

        <canvas id="canvas"></canvas>

        <div class="controls">
            <button onclick="startGame()">スタート</button>
            <button onclick="resetGame()">リセット</button>
        </div>

        <p class="instructions">
            ← → または画面をタッチしてバスケットを動かす<br>
            落ちてくるアイテムをキャッチ！
        </p>
    </div>

    <div class="game-over" id="gameOver">
        <h2>Game Over!</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button onclick="resetGame()">もう一度</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Set canvas size
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth * 0.9, 600);
            const maxHeight = Math.min(window.innerHeight * 0.6, 500);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game state
        let score = 0;
        let level = 1;
        let lives = 3;
        let gameRunning = false;
        let basketX = canvas.width / 2;
        const basketWidth = 80;
        const basketHeight = 15;
        const basketSpeed = 8;

        // Falling objects
        const objects = [];
        const objectTypes = [
            { emoji: '⭐', points: 10, speed: 2 },
            { emoji: '💎', points: 25, speed: 3 },
            { emoji: '🍎', points: 15, speed: 2.5 },
            { emoji: '🎁', points: 50, speed: 4 },
            { emoji: '💀', points: -20, speed: 2 }
        ];

        // Keyboard controls
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                e.preventDefault();
            }
        });
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Touch controls
        let touchX = null;
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            touchX = e.touches[0].clientX - rect.left;
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            touchX = e.touches[0].clientX - rect.left;
        });
        canvas.addEventListener('touchend', () => {
            touchX = null;
        });

        function createFallingObject() {
            const type = objectTypes[Math.floor(Math.random() * objectTypes.length)];
            const speedMultiplier = 1 + (level - 1) * 0.2;
            return {
                x: Math.random() * (canvas.width - 30) + 15,
                y: -30,
                ...type,
                speed: type.speed * speedMultiplier,
                size: 25
            };
        }

        function drawBasket() {
            // Basket body
            ctx.fillStyle = '#8b4513';
            ctx.fillRect(basketX - basketWidth / 2, canvas.height - basketHeight - 10, basketWidth, basketHeight);

            // Basket weave pattern
            ctx.strokeStyle = '#654321';
            ctx.lineWidth = 2;
            for (let i = 0; i < basketWidth; i += 10) {
                ctx.beginPath();
                ctx.moveTo(basketX - basketWidth / 2 + i, canvas.height - basketHeight - 10);
                ctx.lineTo(basketX - basketWidth / 2 + i + 5, canvas.height - 10);
                ctx.stroke();
            }

            // Basket rim
            ctx.fillStyle = '#a0522d';
            ctx.fillRect(basketX - basketWidth / 2 - 5, canvas.height - basketHeight - 12, basketWidth + 10, 4);
        }

        function drawObject(obj) {
            ctx.font = `${obj.size}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(obj.emoji, obj.x, obj.y);
        }

        function updateBasket() {
            // Keyboard movement
            if (keys['ArrowLeft']) {
                basketX -= basketSpeed;
            }
            if (keys['ArrowRight']) {
                basketX += basketSpeed;
            }

            // Touch movement
            if (touchX !== null) {
                const diff = touchX - basketX;
                if (Math.abs(diff) > 5) {
                    basketX += diff > 0 ? basketSpeed : -basketSpeed;
                }
            }

            // Keep basket in bounds
            basketX = Math.max(basketWidth / 2, Math.min(canvas.width - basketWidth / 2, basketX));
        }

        function updateObjects() {
            for (let i = objects.length - 1; i >= 0; i--) {
                const obj = objects[i];
                obj.y += obj.speed;

                // Check collision with basket
                if (obj.y + obj.size / 2 >= canvas.height - basketHeight - 10 &&
                    obj.y - obj.size / 2 <= canvas.height - 10 &&
                    obj.x >= basketX - basketWidth / 2 &&
                    obj.x <= basketX + basketWidth / 2) {

                    score += obj.points;
                    if (obj.points < 0) {
                        lives--;
                    }
                    objects.splice(i, 1);

                    // Level up every 100 points
                    level = Math.floor(score / 100) + 1;
                    updateStats();
                    continue;
                }

                // Remove objects that fall off screen
                if (obj.y > canvas.height + 30) {
                    if (obj.points > 0) {
                        lives--;
                    }
                    objects.splice(i, 1);
                    updateStats();
                }
            }
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lives').textContent = lives;

            if (lives <= 0) {
                gameOver();
            }
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }

        let lastObjectTime = 0;
        const objectInterval = 1500;

        function gameLoop(timestamp) {
            if (!gameRunning) return;

            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Update basket
            updateBasket();

            // Spawn objects
            if (timestamp - lastObjectTime > objectInterval / (1 + level * 0.1)) {
                objects.push(createFallingObject());
                lastObjectTime = timestamp;
            }

            // Update objects
            updateObjects();

            // Draw everything
            drawBasket();
            objects.forEach(drawObject);

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            if (gameRunning) return;
            gameRunning = true;
            document.getElementById('gameOver').style.display = 'none';
            lastObjectTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            gameRunning = false;
            score = 0;
            level = 1;
            lives = 3;
            objects.length = 0;
            basketX = canvas.width / 2;
            updateStats();
            document.getElementById('gameOver').style.display = 'none';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBasket();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        updateStats();
        drawBasket();
    </script>
</body>
</html>
