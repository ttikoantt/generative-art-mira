<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falling Catch | Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        h1 {
            color: #fff;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin-bottom: 5px;
            text-align: center;
        }

        .subtitle {
            color: #888;
            font-size: clamp(0.8rem, 2vw, 1rem);
            margin-bottom: 15px;
            text-align: center;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 70vh;
            max-height: 500px;
            margin: 0 auto 15px;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            background: linear-gradient(180deg, #0f0f23 0%, #1a1a3e 100%);
            touch-action: none;
        }

        .score-display {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 600px;
        }

        .score-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
        }

        .score-label {
            color: #888;
            font-size: clamp(0.7rem, 1.8vw, 0.9rem);
            margin-bottom: 5px;
        }

        .score-value {
            color: #fff;
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: bold;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
            width: 100%;
            max-width: 600px;
        }

        button {
            background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: clamp(0.8rem, 2vw, 1rem);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 180, 219, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            color: #666;
            font-size: clamp(0.7rem, 1.8vw, 0.9rem);
            text-align: center;
            max-width: 600px;
            line-height: 1.6;
        }

        #fullscreen-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        #fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px 40px;
            border-radius: 16px;
            text-align: center;
            display: none;
        }

        #game-over h2 {
            color: #fff;
            font-size: clamp(1.5rem, 4vw, 2rem);
            margin-bottom: 20px;
        }

        #game-over p {
            color: #888;
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            margin-bottom: 20px;
        }

        #game-over button {
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            padding: 15px 30px;
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            #canvas-container {
                height: 60vh;
                margin-bottom: 10px;
            }

            .score-display {
                gap: 15px;
            }

            button {
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>
    <h1>🎯 Falling Catch</h1>
    <p class="subtitle">落ちてくるアイテムをキャッチ！</p>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
        <button id="fullscreen-btn">⛶ 全画面</button>
        <div id="game-over">
            <h2>ゲームオーバー！</h2>
            <p>スコア: <span id="final-score">0</span></p>
            <button id="restart-btn">🔄 もう一度プレイ</button>
        </div>
    </div>

    <div class="score-display">
        <div class="score-box">
            <div class="score-label">スコア</div>
            <div class="score-value" id="score">0</div>
        </div>
        <div class="score-box">
            <div class="score-label">ハイスコア</div>
            <div class="score-value" id="high-score">0</div>
        </div>
        <div class="score-box">
            <div class="score-label">ライフ</div>
            <div class="score-value" id="lives">3</div>
        </div>
    </div>

    <div class="controls">
        <button id="start-btn">▶️ スタート</button>
        <button id="pause-btn">⏸️ 一時停止</button>
    </div>

    <p class="info">
        🎮 操作: 左右キー、タップ、またはドラッグで移動<br>
        ✨ 青=+10点、🔴 赤=-1ライフ、⭐ 黄色=+50点
    </p>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');

        let width, height;
        let player = { x: 0, width: 60, height: 15, speed: 8 };
        let items = [];
        let score = 0;
        let lives = 3;
        let highScore = parseInt(localStorage.getItem('fallingCatchHighScore')) || 0;
        let gameRunning = false;
        let gamePaused = false;
        let spawnTimer = 0;
        let spawnInterval = 60;
        let difficulty = 1;

        // アイテムの種類
        const itemTypes = [
            { type: 'good', color: '#00b4db', score: 10, probability: 0.6 },
            { type: 'bad', color: '#ff4757', score: 0, damage: 1, probability: 0.3 },
            { type: 'special', color: '#ffd700', score: 50, probability: 0.1 }
        ];

        function resize() {
            const rect = container.getBoundingClientRect();
            width = canvas.width = rect.width * window.devicePixelRatio;
            height = canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            width = rect.width;
            height = rect.height;
            player.x = width / 2 - player.width / 2;
        }

        function spawnItem() {
            const rand = Math.random();
            let cumulative = 0;
            let selectedType = itemTypes[0];

            for (const type of itemTypes) {
                cumulative += type.probability;
                if (rand < cumulative) {
                    selectedType = type;
                    break;
                }
            }

            items.push({
                x: Math.random() * (width - 30),
                y: -30,
                size: 25,
                speed: (2 + Math.random() * 2) * difficulty,
                ...selectedType
            });
        }

        function update() {
            if (!gameRunning || gamePaused) return;

            spawnTimer++;
            if (spawnTimer >= spawnInterval) {
                spawnItem();
                spawnTimer = 0;
            }

            // 難度上昇
            difficulty = 1 + Math.floor(score / 100) * 0.2;
            spawnInterval = Math.max(20, 60 - Math.floor(score / 50) * 5);

            // アイテム更新
            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                item.y += item.speed;

                // プレイヤーとの衝突判定
                if (item.y + item.size >= height - player.height - 20 &&
                    item.y <= height - 20 &&
                    item.x + item.size >= player.x &&
                    item.x <= player.x + player.width) {
                    
                    if (item.type === 'bad') {
                        lives -= item.damage;
                        updateLives();
                        if (lives <= 0) {
                            gameOver();
                        }
                    } else {
                        score += item.score;
                        updateScore();
                    }
                    items.splice(i, 1);
                    continue;
                }

                // 画面外に出たアイテム
                if (item.y > height) {
                    items.splice(i, 1);
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // プレイヤー
            const gradient = ctx.createLinearGradient(player.x, height - player.height - 20, player.x, height - 20);
            gradient.addColorStop(0, '#00b4db');
            gradient.addColorStop(1, '#0083b0');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.roundRect(player.x, height - player.height - 20, player.width, player.height, 8);
            ctx.fill();

            // プレイヤーの装飾
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(player.x + 5, height - player.height - 15, player.width - 10, 3);

            // アイテム
            items.forEach(item => {
                ctx.save();
                
                if (item.type === 'good') {
                    ctx.fillStyle = item.color;
                    ctx.shadowColor = item.color;
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.arc(item.x + item.size / 2, item.y + item.size / 2, item.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                } else if (item.type === 'bad') {
                    ctx.fillStyle = item.color;
                    ctx.shadowColor = item.color;
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.moveTo(item.x + item.size / 2, item.y);
                    ctx.lineTo(item.x + item.size, item.y + item.size * 0.8);
                    ctx.lineTo(item.x + item.size * 0.2, item.y + item.size * 0.8);
                    ctx.closePath();
                    ctx.fill();
                } else if (item.type === 'special') {
                    ctx.fillStyle = item.color;
                    ctx.shadowColor = item.color;
                    ctx.shadowBlur = 20;
                    drawStar(item.x + item.size / 2, item.y + item.size / 2, 5, item.size / 2, item.size / 4);
                }
                
                ctx.restore();
            });

            // 一時停止オーバーレイ
            if (gamePaused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, width, height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 32px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('一時停止', width / 2, height / 2);
            }

            requestAnimationFrame(draw);
        }

        function drawStar(cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);

            for (let i = 0; i < spikes; i++) {
                ctx.lineTo(cx + Math.cos(rot) * outerRadius, cy + Math.sin(rot) * outerRadius);
                rot += step;
                ctx.lineTo(cx + Math.cos(rot) * innerRadius, cy + Math.sin(rot) * innerRadius);
                rot += step;
            }

            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            ctx.fill();
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            if (score > highScore) {
                highScore = score;
                document.getElementById('high-score').textContent = highScore;
                localStorage.setItem('fallingCatchHighScore', highScore);
            }
        }

        function updateLives() {
            document.getElementById('lives').textContent = lives;
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('final-score').textContent = score;
            document.getElementById('game-over').style.display = 'block';
        }

        function startGame() {
            score = 0;
            lives = 3;
            items = [];
            difficulty = 1;
            spawnInterval = 60;
            gameRunning = true;
            gamePaused = false;
            updateScore();
            updateLives();
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('start-btn').textContent = '🔄 リスタート';
        }

        function togglePause() {
            if (!gameRunning) return;
            gamePaused = !gamePaused;
            document.getElementById('pause-btn').textContent = gamePaused ? '▶️ 続ける' : '⏸️ 一時停止';
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (!gameRunning || gamePaused) return;
            
            if (e.key === 'ArrowLeft' || e.key === 'a') {
                player.x = Math.max(0, player.x - player.speed);
            } else if (e.key === 'ArrowRight' || e.key === 'd') {
                player.x = Math.min(width - player.width, player.x + player.speed);
            } else if (e.key === ' ' || e.key === 'Escape') {
                togglePause();
            }
        });

        // タッチ操作
        let touchStartX = 0;
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!gameRunning || gamePaused) return;
            
            const touchX = e.touches[0].clientX;
            const rect = canvas.getBoundingClientRect();
            const relativeX = touchX - rect.left;
            player.x = Math.max(0, Math.min(width - player.width, relativeX - player.width / 2));
        });

        canvas.addEventListener('click', (e) => {
            if (!gameRunning) return;
            
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            player.x = Math.max(0, Math.min(width - player.width, clickX - player.width / 2));
        });

        // ボタン
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('pause-btn').addEventListener('click', togglePause);
        document.getElementById('restart-btn').addEventListener('click', startGame);
        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                container.requestFullscreen();
            }
        });

        window.addEventListener('resize', resize);

        // ゲームループ
        setInterval(update, 1000 / 60);

        resize();
        draw();
        updateLives();
        document.getElementById('high-score').textContent = highScore;
    </script>
</body>
</html>
