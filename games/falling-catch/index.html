<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falling Catch - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #e0e0e0;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 20px 0;
            background: linear-gradient(135deg, #f093fb, #f5576c, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }

        .score-panel {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 500px;
            margin: 15px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .score-item {
            text-align: center;
        }

        .score-label {
            font-size: 0.8rem;
            color: #a0a0a0;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #f093fb;
        }

        .game-wrapper {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(240, 147, 251, 0.3);
            margin: 15px 0;
        }

        #gameCanvas {
            display: block;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(240, 147, 251, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .info {
            text-align: center;
            color: #a0a0a0;
            margin: 15px 0;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: rgba(240, 147, 251, 0.8);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            z-index: 1000;
            font-size: 1.5rem;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(240, 147, 251, 1);
            transform: scale(1.1);
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .game-over-overlay.show {
            display: flex;
        }

        .game-over-text {
            font-size: 2rem;
            color: #f5576c;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .final-score {
            font-size: 1.2rem;
            color: #e0e0e0;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .game-wrapper {
                width: 100% !important;
                max-width: 100%;
            }

            #gameCanvas {
                width: 100% !important;
                height: auto !important;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <h1>⭐ Falling Catch ⭐</h1>

        <div class="score-panel">
            <div class="score-item">
                <div class="score-label">SCORE</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">HIGH SCORE</div>
                <div class="score-value" id="highScore">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">LIVES</div>
                <div class="score-value" id="lives">3</div>
            </div>
        </div>

        <div class="game-wrapper">
            <canvas id="gameCanvas"></canvas>
            <div class="game-over-overlay" id="gameOverOverlay">
                <div class="game-over-text">GAME OVER</div>
                <div class="final-score" id="finalScore">Score: 0</div>
                <button class="btn" onclick="restartGame()">Play Again</button>
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="startGame()">▶ Start</button>
            <button class="btn" onclick="togglePause()">⏸ Pause</button>
        </div>

        <p class="info">
            🎮 操作方法<br>
            PC: 左右矢印キーで移動<br>
            Mobile: 画面の左右をタップ
        </p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Canvasサイズ設定
        function resizeCanvas() {
            const wrapper = document.querySelector('.game-wrapper');
            const maxWidth = Math.min(window.innerWidth - 40, 500);
            const height = Math.min(window.innerHeight - 400, 600);

            canvas.width = maxWidth;
            canvas.height = height;
            wrapper.style.width = maxWidth + 'px';
            wrapper.style.height = height + 'px';
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ゲーム状態
        let gameState = {
            score: 0,
            highScore: parseInt(localStorage.getItem('fallingCatchHighScore')) || 0,
            lives: 3,
            isRunning: false,
            isPaused: false,
            level: 1
        };

        // プレイヤー
        let player = {
            x: canvas.width / 2 - 40,
            y: canvas.height - 60,
            width: 80,
            height: 15,
            speed: 8,
            color: '#f093fb'
        };

        // 落下するオブジェクト
        let fallingObjects = [];
        const objectTypes = [
            { emoji: '⭐', points: 10, color: '#ffd200', good: true },
            { emoji: '💎', points: 25, color: '#00d4ff', good: true },
            { emoji: '🍀', points: 15, color: '#4ade80', good: true },
            { emoji: '❤️', points: 5, color: '#f5576c', good: true },
            { emoji: '💀', points: -1, color: '#8b5cf6', good: false }
        ];

        // パーティクル
        let particles = [];

        // 入力
        let keys = {
            left: false,
            right: false
        };

        // キーボードイベント
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') keys.left = true;
            if (e.key === 'ArrowRight') keys.right = true;
            if (e.key === ' ' && !gameState.isRunning) startGame();
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') keys.left = false;
            if (e.key === 'ArrowRight') keys.right = false;
        });

        // タッチイベント
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;

            if (x < canvas.width / 2) {
                keys.left = true;
                keys.right = false;
            } else {
                keys.right = true;
                keys.left = false;
            }
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            keys.left = false;
            keys.right = false;
        });

        // オブジェクト生成
        function spawnObject() {
            if (!gameState.isRunning || gameState.isPaused) return;

            const type = objectTypes[Math.floor(Math.random() * objectTypes.length)];
            const obj = {
                x: Math.random() * (canvas.width - 40),
                y: -40,
                width: 40,
                height: 40,
                speed: 2 + (gameState.level * 0.3) + Math.random() * 2,
                ...type
            };

            fallingObjects.push(obj);
        }

        // パーティクル生成
        function createParticles(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 30,
                    color: color
                });
            }
        }

        // ゲーム開始
        function startGame() {
            gameState.score = 0;
            gameState.lives = 3;
            gameState.level = 1;
            gameState.isRunning = true;
            gameState.isPaused = false;

            player.x = canvas.width / 2 - player.width / 2;
            fallingObjects = [];
            particles = [];

            document.getElementById('gameOverOverlay').classList.remove('show');
            updateUI();

            if (!gameLoop.running) {
                gameLoop.running = true;
                gameLoop();
            }
        }

        // 一時停止切り替え
        function togglePause() {
            if (!gameState.isRunning) return;
            gameState.isPaused = !gameState.isPaused;
        }

        // ゲームオーバー
        function gameOver() {
            gameState.isRunning = false;

            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
                localStorage.setItem('fallingCatchHighScore', gameState.highScore);
            }

            document.getElementById('finalScore').textContent = `Score: ${gameState.score}`;
            document.getElementById('gameOverOverlay').classList.add('show');
            updateUI();
        }

        // 再開
        function restartGame() {
            startGame();
        }

        // UI更新
        function updateUI() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('highScore').textContent = gameState.highScore;
            document.getElementById('lives').textContent = gameState.lives;
        }

        // 描画
        function draw() {
            // クリア
            ctx.fillStyle = 'rgba(26, 26, 46, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // プレイヤー
            const gradient = ctx.createLinearGradient(player.x, player.y, player.x + player.width, player.y);
            gradient.addColorStop(0, '#f093fb');
            gradient.addColorStop(1, '#f5576c');

            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.roundRect(player.x, player.y, player.width, player.height, 8);
            ctx.fill();

            // グロー効果
            ctx.shadowColor = '#f093fb';
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0;

            // 落下オブジェクト
            ctx.font = '30px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            fallingObjects.forEach(obj => {
                ctx.fillText(obj.emoji, obj.x + obj.width / 2, obj.y + obj.height / 2);
            });

            // パーティクル
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 30;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        // 更新
        function update() {
            if (!gameState.isRunning || gameState.isPaused) return;

            // プレイヤー移動
            if (keys.left && player.x > 0) {
                player.x -= player.speed;
            }
            if (keys.right && player.x < canvas.width - player.width) {
                player.x += player.speed;
            }

            // オブジェクト更新
            fallingObjects.forEach((obj, index) => {
                obj.y += obj.speed;

                // 衝突判定
                if (obj.y + obj.height > player.y &&
                    obj.y < player.y + player.height &&
                    obj.x + obj.width > player.x &&
                    obj.x < player.x + player.width) {

                    if (obj.good) {
                        gameState.score += obj.points;
                        createParticles(obj.x + obj.width / 2, obj.y + obj.height / 2, obj.color);

                        // レベルアップ
                        if (gameState.score > gameState.level * 100) {
                            gameState.level++;
                        }
                    } else {
                        gameState.lives--;
                        createParticles(obj.x + obj.width / 2, obj.y + obj.height / 2, obj.color);

                        if (gameState.lives <= 0) {
                            gameOver();
                        }
                    }

                    fallingObjects.splice(index, 1);
                    updateUI();
                }

                // 画面外
                if (obj.y > canvas.height) {
                    if (obj.good && obj.points > 15) {
                        // ゲッターを逃したとペナルティ
                        gameState.lives--;
                        if (gameState.lives <= 0) {
                            gameOver();
                        }
                        updateUI();
                    }
                    fallingObjects.splice(index, 1);
                }
            });

            // パーティクル更新
            particles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) {
                    particles.splice(index, 1);
                }
            });
        }

        // ゲームループ
        let spawnTimer = 0;
        gameLoop.running = false;

        function gameLoop() {
            if (!gameLoop.running) return;

            update();
            draw();

            spawnTimer++;
            if (spawnTimer > Math.max(30, 60 - gameState.level * 5)) {
                spawnObject();
                spawnTimer = 0;
            }

            requestAnimationFrame(gameLoop);
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                canvas.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期描画
        updateUI();

        // スタート画面
        ctx.fillStyle = '#e0e0e0';
        ctx.font = '24px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('Press START to play!', canvas.width / 2, canvas.height / 2);
    </script>
</body>
</html>
