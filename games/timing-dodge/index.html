<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Timing Dodge Challenge - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }

        canvas {
            display: block;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 100;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h1 {
            font-size: 2em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .overlay p {
            font-size: 1.2em;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .overlay button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: #fff;
            padding: 15px 40px;
            font-size: 1.2em;
            cursor: pointer;
            border-radius: 50px;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .overlay button:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .score {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 2em;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            z-index: 50;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 15px;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .controls-mobile {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 20px;
            z-index: 50;
        }

        .controls-mobile button {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 20px 40px;
            font-size: 2em;
            cursor: pointer;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            user-select: none;
        }

        @media (min-width: 769px) {
            .controls-mobile {
                display: none;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="score" id="score">Score: 0</div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="overlay" id="startScreen">
        <h1>⚡ Timing Dodge</h1>
        <p>Tap left/right or use arrow keys to dodge!</p>
        <button onclick="startGame()">Start Game</button>
    </div>

    <div class="overlay hidden" id="gameOverScreen">
        <h1>Game Over!</h1>
        <p>Score: <span id="finalScore">0</span></p>
        <button onclick="startGame()">Play Again</button>
    </div>

    <div class="controls-mobile" id="mobileControls">
        <button ontouchstart="moveLeft()" onmousedown="moveLeft()">←</button>
        <button ontouchstart="moveRight()" onmousedown="moveRight()">→</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let player;
        let obstacles = [];
        let score = 0;
        let gameRunning = false;
        let gameSpeed = 3;
        let moveDirection = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Player {
            constructor() {
                this.width = 50;
                this.height = 50;
                this.x = width / 2 - this.width / 2;
                this.y = height - this.height - 20;
                this.speed = 8;
            }

            update() {
                if (moveDirection === -1 && this.x > 0) {
                    this.x -= this.speed;
                }
                if (moveDirection === 1 && this.x < width - this.width) {
                    this.x += this.speed;
                }
            }

            draw() {
                ctx.save();
                
                // Glow effect
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#fff';
                
                // Player body
                const gradient = ctx.createLinearGradient(this.x, this.y, this.x + this.width, this.y);
                gradient.addColorStop(0, '#00f260');
                gradient.addColorStop(1, '#0575e6');
                ctx.fillStyle = gradient;
                
                ctx.beginPath();
                ctx.roundRect(this.x, this.y, this.width, this.height, 10);
                ctx.fill();

                // Inner design
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.arc(this.x + this.width / 2, this.y + this.height / 2, 10, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        class Obstacle {
            constructor() {
                this.width = Math.random() * 80 + 40;
                this.height = 20;
                this.x = Math.random() * (width - this.width);
                this.y = -this.height;
                this.speed = gameSpeed + Math.random() * 2;
                this.hue = Math.random() * 360;
            }

            update() {
                this.y += this.speed;
            }

            draw() {
                ctx.save();
                
                ctx.shadowBlur = 15;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 50%)`;
                ctx.fillStyle = `hsl(${this.hue}, 100%, 60%)`;
                
                ctx.beginPath();
                ctx.roundRect(this.x, this.y, this.width, this.height, 5);
                ctx.fill();

                ctx.restore();
            }

            isOffScreen() {
                return this.y > height;
            }

            collidesWith(player) {
                return this.x < player.x + player.width &&
                       this.x + this.width > player.x &&
                       this.y < player.y + player.height &&
                       this.y + this.height > player.y;
            }
        }

        function moveLeft() {
            moveDirection = -1;
        }

        function moveRight() {
            moveDirection = 1;
        }

        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            
            player = new Player();
            obstacles = [];
            score = 0;
            gameSpeed = 3;
            gameRunning = true;
            moveDirection = 0;
            
            updateScore();
            animate();
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        function updateScore() {
            document.getElementById('score').textContent = `Score: ${score}`;
        }

        function spawnObstacle() {
            if (Math.random() < 0.02 + score * 0.0001) {
                obstacles.push(new Obstacle());
            }
        }

        function animate() {
            if (!gameRunning) return;

            // Clear with trail effect
            ctx.fillStyle = 'rgba(102, 126, 234, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // Update player
            player.update();
            player.draw();

            // Spawn and update obstacles
            spawnObstacle();

            obstacles = obstacles.filter(obstacle => {
                obstacle.update();
                obstacle.draw();

                if (obstacle.collidesWith(player)) {
                    gameOver();
                    return false;
                }

                if (obstacle.isOffScreen()) {
                    score += 10;
                    updateScore();
                    
                    // Increase difficulty
                    if (score % 100 === 0) {
                        gameSpeed += 0.5;
                    }
                    
                    return false;
                }

                return true;
            });

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                moveDirection = -1;
            } else if (e.key === 'ArrowRight') {
                moveDirection = 1;
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' && moveDirection === -1) {
                moveDirection = 0;
            } else if (e.key === 'ArrowRight' && moveDirection === 1) {
                moveDirection = 0;
            }
        });

        // Touch controls - stop moving when not touching
        document.addEventListener('touchend', () => {
            moveDirection = 0;
        });

        document.addEventListener('mouseup', () => {
            moveDirection = 0;
        });

        // Initialize
        resize();
        window.addEventListener('resize', resize);
    </script>
</body>
</html>
