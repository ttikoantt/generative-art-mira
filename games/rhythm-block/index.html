<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Block | リズムブロック</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        .game-container {
            position: relative;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 20px;
            border: 3px solid #0ff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: #0ff;
            font-size: 24px;
            font-weight: bold;
        }
        .stats {
            display: flex;
            gap: 30px;
        }
        .stat {
            text-align: center;
        }
        .stat-label {
            font-size: 12px;
            opacity: 0.7;
        }
        .stat-value {
            font-size: 28px;
        }
        canvas {
            border-radius: 10px;
            background: #0a0a1a;
        }
        .rhythm-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            border: 3px solid #0ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .rhythm-indicator.beat {
            background: #0ff;
            transform: translateX(-50%) scale(1.2);
            transition: transform 0.1s;
        }
        .controls {
            position: fixed;
            bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            background: transparent;
            border: 2px solid #0ff;
            color: #0ff;
            padding: 15px 30px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            transition: all 0.3s;
        }
        button:hover {
            background: #0ff;
            color: #000;
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            padding: 10px 15px;
            font-size: 16px;
        }
        .instructions {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #0ff;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #0ff;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: #0ff;
        }
        .overlay.hidden {
            display: none;
        }
        .overlay h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #0ff;
        }
        .overlay p {
            font-size: 18px;
            margin-bottom: 30px;
            text-align: center;
            max-width: 500px;
        }
        .combo-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            font-weight: bold;
            color: #ff0;
            text-shadow: 0 0 20px #ff0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .combo-display.show {
            opacity: 1;
            animation: comboAnim 0.5s ease-out;
        }
        @keyframes comboAnim {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    
    <div class="instructions">
        <div>🎵 Rhythm Block</div>
        <div>リズムに合わせてタップ！</div>
        <div>Perfect: +100 pts | Good: +50 pts</div>
    </div>
    
    <div class="game-container">
        <div class="header">
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">SCORE</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">COMBO</div>
                    <div class="stat-value" id="combo">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">HIGH</div>
                    <div class="stat-value" id="highScore">0</div>
                </div>
            </div>
        </div>
        <canvas id="canvas"></canvas>
        <div class="rhythm-indicator" id="rhythmIndicator"></div>
        <div class="combo-display" id="comboDisplay"></div>
    </div>
    
    <div class="controls">
        <button onclick="startGame()">▶️ Start</button>
        <button onclick="resetGame()">🔄 Reset</button>
    </div>
    
    <div class="overlay" id="overlay">
        <h1>🎵 Rhythm Block</h1>
        <p>リズムインジケーターが円に重なった瞬間にタップ！<br>Perfectでコンボを繋げてハイスコアを目指そう！</p>
        <button onclick="startGame()">▶️ Start Game</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Game settings
        const GRID_SIZE = 5;
        let CELL_SIZE;
        let BLOCK_SIZE;
        
        // Game state
        let score = 0;
        let combo = 0;
        let highScore = parseInt(localStorage.getItem('rhythmBlockHighScore')) || 0;
        let gameRunning = false;
        let blocks = [];
        let highlightedBlock = null;
        let rhythmPhase = 0;
        let rhythmSpeed = 0.08;
        let lastBeatTime = 0;
        let beatInterval = 1250; // ms per beat (BPM-based)
        
        function resize() {
            const maxWidth = Math.min(window.innerWidth * 0.9, 500);
            const maxHeight = Math.min(window.innerHeight * 0.6, 500);
            const size = Math.min(maxWidth, maxHeight);
            
            canvas.width = size;
            canvas.height = size;
            CELL_SIZE = size / GRID_SIZE;
            BLOCK_SIZE = CELL_SIZE * 0.8;
        }
        
        class Block {
            constructor(x, y) {
                this.gridX = x;
                this.gridY = y;
                this.x = x * CELL_SIZE + CELL_SIZE / 2;
                this.y = y * CELL_SIZE + CELL_SIZE / 2;
                this.hue = (x + y) * 30;
                this.active = false;
                this.pulsePhase = Math.random() * Math.PI * 2;
            }
            
            draw() {
                const pulse = Math.sin(this.pulsePhase + rhythmPhase * 5) * 0.1 + 1;
                const size = BLOCK_SIZE * (this.active ? pulse : 1);
                
                // Glow effect for active blocks
                if (this.active) {
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = `hsl(${this.hue}, 100%, 50%)`;
                }
                
                // Block body
                ctx.fillStyle = this.active 
                    ? `hsl(${this.hue}, 100%, 60%)` 
                    : `hsl(${this.hue}, 70%, 30%)`;
                ctx.fillRect(
                    this.x - size / 2,
                    this.y - size / 2,
                    size,
                    size
                );
                
                // Border
                ctx.strokeStyle = this.active 
                    ? `hsl(${this.hue}, 100%, 80%)` 
                    : `hsl(${this.hue}, 50%, 50%)`;
                ctx.lineWidth = 3;
                ctx.strokeRect(
                    this.x - size / 2,
                    this.y - size / 2,
                    size,
                    size
                );
                
                ctx.shadowBlur = 0;
            }
            
            contains(px, py) {
                return px >= this.gridX * CELL_SIZE &&
                       px < (this.gridX + 1) * CELL_SIZE &&
                       py >= this.gridY * CELL_SIZE &&
                       py < (this.gridY + 1) * CELL_SIZE;
            }
        }
        
        function initBlocks() {
            blocks = [];
            for (let x = 0; x < GRID_SIZE; x++) {
                for (let y = 0; y < GRID_SIZE; y++) {
                    blocks.push(new Block(x, y));
                }
            }
        }
        
        function selectRandomBlock() {
            blocks.forEach(b => b.active = false);
            const available = blocks.filter(b => !b.active);
            if (available.length > 0) {
                const randomBlock = available[Math.floor(Math.random() * available.length)];
                randomBlock.active = true;
                highlightedBlock = randomBlock;
            }
        }
        
        function handleInput(gridX, gridY) {
            if (!gameRunning || !highlightedBlock) return;
            
            const block = blocks.find(b => b.gridX === gridX && b.gridY === gridY);
            if (block && block.active) {
                // Check timing
                const now = Date.now();
                const timeSinceBeat = now - lastBeatTime;
                const timingWindow = 200; // ms
                const perfectWindow = 100;
                
                let points = 0;
                let text = '';
                
                if (timeSinceBeat < perfectWindow) {
                    points = 100;
                    combo++;
                    text = 'PERFECT!';
                } else if (timeSinceBeat < timingWindow) {
                    points = 50;
                    combo++;
                    text = 'GOOD!';
                } else {
                    points = 10;
                    combo = 0;
                    text = 'OK';
                }
                
                score += points * (1 + combo * 0.1);
                updateStats();
                
                // Show combo
                if (combo > 1) {
                    showCombo(combo);
                }
                
                selectRandomBlock();
            }
        }
        
        function showCombo(count) {
            const display = document.getElementById('comboDisplay');
            display.textContent = `${count} COMBO!`;
            display.classList.remove('show');
            void display.offsetWidth; // Trigger reflow
            display.classList.add('show');
        }
        
        function updateStats() {
            document.getElementById('score').textContent = Math.floor(score);
            document.getElementById('combo').textContent = combo;
            
            if (score > highScore) {
                highScore = Math.floor(score);
                localStorage.setItem('rhythmBlockHighScore', highScore);
            }
            document.getElementById('highScore').textContent = highScore;
        }
        
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid lines
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }
            
            // Draw blocks
            blocks.forEach(block => block.draw());
        }
        
        function updateRhythm() {
            const now = Date.now();
            
            // Beat detection
            if (now - lastBeatTime >= beatInterval) {
                lastBeatTime = now;
                
                // Beat visual feedback
                const indicator = document.getElementById('rhythmIndicator');
                indicator.classList.add('beat');
                setTimeout(() => indicator.classList.remove('beat'), 100);
                
                // Increase difficulty
                if (beatInterval > 500) {
                    beatInterval -= 10;
                }
            }
            
            rhythmPhase += rhythmSpeed;
        }
        
        function gameLoop() {
            if (gameRunning) {
                updateRhythm();
                draw();
            }
            requestAnimationFrame(gameLoop);
        }
        
        function startGame() {
            document.getElementById('overlay').classList.add('hidden');
            
            if (!gameRunning) {
                score = 0;
                combo = 0;
                beatInterval = 1250;
                initBlocks();
                selectRandomBlock();
                updateStats();
                gameRunning = true;
                lastBeatTime = Date.now();
            }
        }
        
        function resetGame() {
            gameRunning = false;
            score = 0;
            combo = 0;
            beatInterval = 1250;
            initBlocks();
            updateStats();
            draw();
            document.getElementById('overlay').classList.remove('hidden');
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        // Input handling
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const gridX = Math.floor(x / CELL_SIZE);
            const gridY = Math.floor(y / CELL_SIZE);
            handleInput(gridX, gridY);
        });
        
        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            const gridX = Math.floor(x / CELL_SIZE);
            const gridY = Math.floor(y / CELL_SIZE);
            handleInput(gridX, gridY);
        });
        
        // Initialize
        window.addEventListener('resize', () => {
            resize();
            initBlocks();
        });
        
        resize();
        initBlocks();
        updateStats();
        gameLoop();
    </script>
</body>
</html>
