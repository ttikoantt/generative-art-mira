<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Target Reflex - 反射神経ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
        }

        .game-info {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .score-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            color: white;
            pointer-events: all;
        }

        .score-panel h2 {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
        }

        .score-panel .score {
            font-size: 32px;
            font-weight: bold;
            color: #00ff88;
        }

        .combo-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            color: white;
            text-align: center;
            pointer-events: all;
        }

        .combo-panel .combo {
            font-size: 24px;
            font-weight: bold;
        }

        .combo-panel .multiplier {
            font-size: 14px;
            color: #ffdd00;
            margin-top: 5px;
        }

        .time-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            color: white;
            text-align: right;
            pointer-events: all;
        }

        .time-panel h2 {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
        }

        .time-panel .time {
            font-size: 32px;
            font-weight: bold;
            color: #ff6b6b;
        }

        .target {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .target:hover {
            transform: scale(1.1);
        }

        .target.special {
            animation: specialPulse 0.5s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
        }

        @keyframes specialPulse {
            0%, 100% {
                transform: scale(1) rotate(0deg);
            }
            50% {
                transform: scale(1.15) rotate(180deg);
            }
        }

        .start-screen, .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            color: white;
        }

        .start-screen h1, .game-over-screen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .start-screen p, .game-over-screen p {
            font-size: 18px;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.8);
        }

        .btn {
            background: linear-gradient(45deg, #00ff88, #00d4ff);
            color: #1a1a2e;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
        }

        .final-score {
            font-size: 64px;
            font-weight: bold;
            color: #00ff88;
            margin: 20px 0;
        }

        .stats {
            display: flex;
            gap: 40px;
            margin: 20px 0;
        }

        .stat {
            text-align: center;
        }

        .stat .value {
            font-size: 32px;
            font-weight: bold;
            color: #00d4ff;
        }

        .stat .label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 5px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .hit-effect {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: hitEffect 0.5s ease-out forwards;
        }

        @keyframes hitEffect {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        .miss-effect {
            position: absolute;
            color: #ff6b6b;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            animation: missEffect 0.5s ease-out forwards;
        }

        @keyframes missEffect {
            0% {
                transform: translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-50px);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <div class="game-info">
            <div class="score-panel">
                <h2>スコア</h2>
                <div class="score" id="score">0</div>
            </div>
            <div class="combo-panel">
                <div class="combo" id="combo">0 コンボ</div>
                <div class="multiplier" id="multiplier">×1</div>
            </div>
            <div class="time-panel">
                <h2>時間</h2>
                <div class="time" id="time">60</div>
            </div>
        </div>

        <button class="fullscreen-btn" id="fullscreenBtn">🖥️ 全画面</button>
    </div>

    <div class="start-screen" id="startScreen">
        <h1>🎯 Target Reflex</h1>
        <p>現れるターゲットをクリックしてスコアを稼ごう！<br>連続で当てるほどコンボボーナス！</p>
        <button class="btn" id="startBtn">ゲーム開始</button>
    </div>

    <div class="game-over-screen" id="gameOverScreen" style="display: none;">
        <h1>🎮 ゲーム終了</h1>
        <div class="final-score" id="finalScore">0</div>
        <div class="stats">
            <div class="stat">
                <div class="value" id="finalHits">0</div>
                <div class="label">ヒット</div>
            </div>
            <div class="stat">
                <div class="value" id="finalMisses">0</div>
                <div class="label">ミス</div>
            </div>
            <div class="stat">
                <div class="value" id="finalAccuracy">0%</div>
                <div class="label">精度</div>
            </div>
        </div>
        <button class="btn" id="restartBtn">もう一度</button>
    </div>

    <script>
        const gameContainer = document.getElementById('gameContainer');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const scoreEl = document.getElementById('score');
        const comboEl = document.getElementById('combo');
        const multiplierEl = document.getElementById('multiplier');
        const timeEl = document.getElementById('time');
        const finalScoreEl = document.getElementById('finalScore');
        const finalHitsEl = document.getElementById('finalHits');
        const finalMissesEl = document.getElementById('finalMisses');
        const finalAccuracyEl = document.getElementById('finalAccuracy');

        let score = 0;
        let combo = 0;
        let hits = 0;
        let misses = 0;
        let timeLeft = 60;
        let gameActive = false;
        let gameInterval;
        let spawnInterval;
        let targetCount = 0;

        const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7', '#dfe6e9', '#fd79a8', '#a29bfe'];

        function startGame() {
            score = 0;
            combo = 0;
            hits = 0;
            misses = 0;
            timeLeft = 60;
            targetCount = 0;
            gameActive = true;

            updateUI();
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';

            // Clear existing targets
            document.querySelectorAll('.target').forEach(t => t.remove());

            // Start game loop
            gameInterval = setInterval(gameLoop, 1000);
            spawnInterval = setInterval(spawnTarget, 800);

            // Spawn initial targets
            for (let i = 0; i < 3; i++) {
                setTimeout(() => spawnTarget(), i * 200);
            }
        }

        function gameLoop() {
            timeLeft--;
            timeEl.textContent = timeLeft;

            if (timeLeft <= 0) {
                endGame();
            }

            // Increase difficulty over time
            if (timeLeft % 10 === 0 && spawnInterval) {
                clearInterval(spawnInterval);
                const newInterval = Math.max(400, 800 - (60 - timeLeft) * 8);
                spawnInterval = setInterval(spawnTarget, newInterval);
            }
        }

        function endGame() {
            gameActive = false;
            clearInterval(gameInterval);
            clearInterval(spawnInterval);

            // Clear all targets
            document.querySelectorAll('.target').forEach(t => t.remove());

            // Show game over screen
            finalScoreEl.textContent = score;
            finalHitsEl.textContent = hits;
            finalMissesEl.textContent = misses;
            const accuracy = hits + misses > 0 ? Math.round((hits / (hits + misses)) * 100) : 0;
            finalAccuracyEl.textContent = accuracy + '%';
            gameOverScreen.style.display = 'flex';
        }

        function spawnTarget() {
            if (!gameActive) return;

            const target = document.createElement('div');
            target.className = 'target';

            const size = Math.random() * 40 + 40;
            const x = Math.random() * (window.innerWidth - size - 100) + 50;
            const y = Math.random() * (window.innerHeight - size - 150) + 100;

            const color = colors[Math.floor(Math.random() * colors.length)];
            const isSpecial = Math.random() < 0.1;

            target.style.width = size + 'px';
            target.style.height = size + 'px';
            target.style.left = x + 'px';
            target.style.top = y + 'px';
            target.style.background = `radial-gradient(circle, ${color} 0%, ${color}dd 100%)`;
            target.style.boxShadow = `0 0 20px ${color}`;

            if (isSpecial) {
                target.classList.add('special');
                target.textContent = '⭐';
                target.dataset.points = '50';
                target.dataset.time = '5000';
            } else {
                target.textContent = Math.floor(Math.random() * 10);
                target.dataset.points = '10';
                target.dataset.time = (Math.random() * 2000 + 2000).toString();
            }

            target.addEventListener('click', (e) => {
                e.stopPropagation();
                hitTarget(target);
            });

            gameContainer.appendChild(target);

            // Auto-remove after time
            setTimeout(() => {
                if (target.parentNode && !target.dataset.hit) {
                    missTarget(target);
                }
            }, parseInt(target.dataset.time));

            targetCount++;
        }

        function hitTarget(target) {
            if (target.dataset.hit) return;
            target.dataset.hit = 'true';

            const points = parseInt(target.dataset.points);
            const multiplier = Math.min(10, 1 + Math.floor(combo / 5));
            const earned = points * multiplier;

            score += earned;
            combo++;
            hits++;

            // Create hit effect
            const effect = document.createElement('div');
            effect.className = 'hit-effect';
            effect.style.left = target.style.left;
            effect.style.top = target.style.top;
            effect.style.width = target.style.width;
            effect.style.height = target.style.height;
            effect.style.background = target.style.background;
            gameContainer.appendChild(effect);
            setTimeout(() => effect.remove(), 500);

            // Show score popup
            const popup = document.createElement('div');
            popup.textContent = '+' + earned;
            popup.style.cssText = `
                position: absolute;
                left: ${target.style.left};
                top: ${target.style.top};
                color: #00ff88;
                font-size: 24px;
                font-weight: bold;
                pointer-events: none;
                animation: missEffect 1s ease-out forwards;
                z-index: 150;
            `;
            gameContainer.appendChild(popup);
            setTimeout(() => popup.remove(), 1000);

            target.remove();
            updateUI();
        }

        function missTarget(target) {
            if (target.dataset.hit) return;

            combo = 0;
            misses++;

            // Create miss effect
            const effect = document.createElement('div');
            effect.className = 'miss-effect';
            effect.textContent = 'MISS';
            effect.style.left = target.style.left;
            effect.style.top = target.style.top;
            gameContainer.appendChild(effect);
            setTimeout(() => effect.remove(), 500);

            target.remove();
            updateUI();
        }

        function updateUI() {
            scoreEl.textContent = score;
            comboEl.textContent = combo + ' コンボ';
            const multiplier = Math.min(10, 1 + Math.floor(combo / 5));
            multiplierEl.textContent = '×' + multiplier;
            timeEl.textContent = timeLeft;
        }

        // Miss on background click
        gameContainer.addEventListener('click', (e) => {
            if (gameActive && e.target === gameContainer) {
                combo = 0;
                misses++;
                updateUI();
            }
        });

        // Touch support
        gameContainer.addEventListener('touchstart', (e) => {
            if (gameActive && e.target === gameContainer) {
                e.preventDefault();
                combo = 0;
                misses++;
                updateUI();
            }
        });

        // Start button
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        // Fullscreen
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });
    </script>
</body>
</html>
