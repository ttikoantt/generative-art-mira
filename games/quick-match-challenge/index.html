<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quick Match Challenge - クイックマッチチャレンジ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        #game-container {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .header {
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 28px;
            color: #1e3c72;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            color: white;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
        }

        #timer-container {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        #timer {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ffa500, #4ecdc4);
            transition: width 0.1s linear;
        }

        #instruction {
            font-size: 32px;
            font-weight: bold;
            color: #1e3c72;
            margin-bottom: 25px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .option {
            padding: 30px 20px;
            font-size: 48px;
            background: white;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 120px;
        }

        .option:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
            border-color: #667eea;
        }

        .option:active {
            transform: scale(0.95);
        }

        .option.correct {
            background: #4caf50;
            border-color: #4caf50;
            color: white;
        }

        .option.wrong {
            background: #f44336;
            border-color: #f44336;
            color: white;
        }

        #message {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            min-height: 30px;
        }

        #message.success {
            color: #4caf50;
        }

        #message.error {
            color: #f44336;
        }

        #start-screen, #game-over-screen {
            text-align: center;
        }

        .btn {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            #game-container {
                width: 95%;
                padding: 20px;
            }

            .header h1 {
                font-size: 22px;
            }

            #instruction {
                font-size: 24px;
            }

            .option {
                font-size: 36px;
                padding: 20px 15px;
                min-height: 100px;
            }

            .stat-value {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Start Screen -->
        <div id="start-screen">
            <h1>⚡ Quick Match Challenge</h1>
            <p style="font-size: 16px; color: #666; margin: 20px 0;">
                指示に従って素早くタップ！<br>
                正解でポイント、コンボでボーナス！
            </p>
            <button class="btn" onclick="startGame()">スタート</button>
            <div style="margin-top: 30px; padding: 15px; background: #f5f5f5; border-radius: 10px;">
                <p style="font-size: 14px; color: #888;">🏆 ハイスコア</p>
                <p id="high-score-display" style="font-size: 28px; font-weight: bold; color: #1e3c72;">0</p>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="hidden">
            <div class="header">
                <h1>⚡ Quick Match</h1>
            </div>

            <div class="stats">
                <div class="stat">
                    <div class="stat-label">スコア</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">コンボ</div>
                    <div class="stat-value" id="combo">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">レベル</div>
                    <div class="stat-value" id="level">1</div>
                </div>
            </div>

            <div id="timer-container">
                <div id="timer"></div>
            </div>

            <div id="instruction"></div>

            <div id="options"></div>

            <div id="message"></div>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="hidden">
            <h1 style="font-size: 32px; margin-bottom: 20px;">🎮 ゲームオーバー</h1>
            <div style="margin: 20px 0;">
                <p style="font-size: 16px; color: #666;">スコア</p>
                <p id="final-score" style="font-size: 48px; font-weight: bold; color: #1e3c72;">0</p>
            </div>
            <div style="margin: 20px 0;">
                <p style="font-size: 16px; color: #666;">最大コンボ</p>
                <p id="final-combo" style="font-size: 32px; font-weight: bold; color: #764ba2;">0</p>
            </div>
            <div style="margin: 20px 0; padding: 15px; background: #f5f5f5; border-radius: 10px;">
                <p style="font-size: 14px; color: #888;">🏆 ハイスコア</p>
                <p id="final-high-score" style="font-size: 28px; font-weight: bold; color: #1e3c72;">0</p>
            </div>
            <button class="btn" onclick="startGame()">もう一度</button>
        </div>
    </div>

    <script>
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let level = 1;
        let timeLeft = 5000;
        let timerInterval;
        let currentAnswer = null;
        let isProcessing = false;

        const instructions = [
            { type: 'color', text: '🔴 赤色をタップ！', color: 'red' },
            { type: 'color', text: '🔵 青色をタップ！', color: 'blue' },
            { type: 'color', text: '🟢 緑色をタップ！', color: 'green' },
            { type: 'color', text: '🟡 黄色をタップ！', color: 'yellow' },
            { type: 'number', text: '最大の数字をタップ！', compare: 'max' },
            { type: 'number', text: '最小の数字をタップ！', compare: 'min' },
            { type: 'number', text: '偶数をタップ！', check: 'even' },
            { type: 'number', text: '奇数をタップ！', check: 'odd' },
            { type: 'shape', text: '⭕ 丸い形をタップ！', shape: 'circle' },
            { type: 'shape', text: '⬜ 四角い形をタップ！', shape: 'square' },
            { type: 'shape', text: '🔺 三角形をタップ！', shape: 'triangle' }
        ];

        const colors = [
            { name: 'red', display: '🔴', hex: '#ff4444' },
            { name: 'blue', display: '🔵', hex: '#4444ff' },
            { name: 'green', display: '🟢', hex: '#44ff44' },
            { name: 'yellow', display: '🟡', hex: '#ffff44' },
            { name: 'purple', display: '🟣', hex: '#aa44ff' },
            { name: 'orange', display: '🟠', hex: '#ff8844' }
        ];

        const shapes = [
            { name: 'circle', display: '⭕' },
            { name: 'square', display: '⬜' },
            { name: 'triangle', display: '🔺' },
            { name: 'star', display: '⭐' },
            { name: 'heart', display: '❤️' },
            { name: 'diamond', display: '💎' }
        ];

        function loadHighScore() {
            const saved = localStorage.getItem('quickMatchHighScore');
            return saved ? parseInt(saved) : 0;
        }

        function saveHighScore(score) {
            const current = loadHighScore();
            if (score > current) {
                localStorage.setItem('quickMatchHighScore', score.toString());
                return true;
            }
            return false;
        }

        function updateHighScoreDisplay() {
            const highScore = loadHighScore();
            document.getElementById('high-score-display').textContent = highScore;
        }

        function startGame() {
            score = 0;
            combo = 0;
            maxCombo = 0;
            level = 1;
            timeLeft = 5000;

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');

            updateStats();
            generateQuestion();
            startTimer();
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;
            document.getElementById('level').textContent = level;
        }

        function startTimer() {
            const totalTime = Math.max(3000, 5000 - (level - 1) * 200);
            timeLeft = totalTime;

            if (timerInterval) clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                timeLeft -= 100;
                const percentage = (timeLeft / totalTime) * 100;
                document.getElementById('timer').style.width = percentage + '%';

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    gameOver();
                }
            }, 100);
        }

        function generateQuestion() {
            isProcessing = false;

            const instruction = instructions[Math.floor(Math.random() * instructions.length)];
            document.getElementById('instruction').textContent = instruction.text;
            document.getElementById('message').textContent = '';
            document.getElementById('message').className = '';

            const options = [];
            const correctIndex = Math.floor(Math.random() * 4);

            if (instruction.type === 'color') {
                const availableColors = [...colors].filter(c => c.name !== instruction.color);
                const correctColor = colors.find(c => c.name === instruction.color);

                for (let i = 0; i < 4; i++) {
                    if (i === correctIndex) {
                        options.push({ type: 'color', value: correctColor, correct: true });
                    } else {
                        const randomColor = availableColors[Math.floor(Math.random() * availableColors.length)];
                        options.push({ type: 'color', value: randomColor, correct: false });
                        availableColors.splice(availableColors.indexOf(randomColor), 1);
                    }
                }
            } else if (instruction.type === 'number') {
                const nums = [];
                for (let i = 0; i < 4; i++) {
                    nums.push(Math.floor(Math.random() * 90) + 10);
                }

                for (let i = 0; i < 4; i++) {
                    let isCorrect = false;
                    if (instruction.compare === 'max') {
                        isCorrect = nums[i] === Math.max(...nums);
                    } else if (instruction.compare === 'min') {
                        isCorrect = nums[i] === Math.min(...nums);
                    } else if (instruction.check === 'even') {
                        isCorrect = nums[i] % 2 === 0 && nums.filter(n => n % 2 === 0).length === 1;
                        if (nums.filter(n => n % 2 === 0).length !== 1) {
                            isCorrect = i === correctIndex;
                            nums[i] = isCorrect ? (nums[(i + 1) % 4] % 2 === 0 ? nums[i] : nums[i] + 1) : nums[i];
                        }
                    } else if (instruction.check === 'odd') {
                        isCorrect = nums[i] % 2 === 1 && nums.filter(n => n % 2 === 1).length === 1;
                        if (nums.filter(n => n % 2 === 1).length !== 1) {
                            isCorrect = i === correctIndex;
                            nums[i] = isCorrect ? (nums[(i + 1) % 4] % 2 === 1 ? nums[i] : nums[i] + 1) : nums[i];
                        }
                    }
                    options.push({ type: 'number', value: nums[i], correct: isCorrect });
                }
            } else if (instruction.type === 'shape') {
                const availableShapes = [...shapes].filter(s => s.name !== instruction.shape);
                const correctShape = shapes.find(s => s.name === instruction.shape);

                for (let i = 0; i < 4; i++) {
                    if (i === correctIndex) {
                        options.push({ type: 'shape', value: correctShape, correct: true });
                    } else {
                        const randomShape = availableShapes[Math.floor(Math.random() * availableShapes.length)];
                        options.push({ type: 'shape', value: randomShape, correct: false });
                        availableShapes.splice(availableShapes.indexOf(randomShape), 1);
                    }
                }
            }

            displayOptions(options);
        }

        function displayOptions(options) {
            const container = document.getElementById('options');
            container.innerHTML = '';

            options.forEach((option, index) => {
                const button = document.createElement('div');
                button.className = 'option';
                button.dataset.index = index;

                if (option.type === 'color') {
                    button.style.background = option.value.hex;
                    button.style.color = option.value.hex === '#ffff44' ? '#333' : 'white';
                    button.textContent = option.value.display;
                } else if (option.type === 'number') {
                    button.textContent = option.value;
                } else if (option.type === 'shape') {
                    button.textContent = option.value.display;
                }

                button.addEventListener('click', () => handleAnswer(index, option, button));
                container.appendChild(button);
            });

            currentAnswer = options;
        }

        function handleAnswer(index, option, button) {
            if (isProcessing) return;
            isProcessing = true;

            const buttons = document.querySelectorAll('.option');

            if (option.correct) {
                button.classList.add('correct');
                combo++;
                maxCombo = Math.max(maxCombo, combo);

                const basePoints = 10;
                const comboBonus = Math.min(combo * 2, 20);
                const points = basePoints + comboBonus;
                score += points;

                document.getElementById('message').textContent = `+${points} ポイント！`;
                document.getElementById('message').className = 'success';

                if (score >= level * 100) {
                    level++;
                    document.getElementById('message').textContent += ` レベルアップ！`;
                }
            } else {
                button.classList.add('wrong');
                buttons.forEach(btn => {
                    if (currentAnswer[parseInt(btn.dataset.index)].correct) {
                        btn.classList.add('correct');
                    }
                });

                combo = 0;
                timeLeft = Math.max(0, timeLeft - 1000);

                document.getElementById('message').textContent = '不正解！';
                document.getElementById('message').className = 'error';
            }

            updateStats();

            setTimeout(() => {
                if (timeLeft > 0) {
                    generateQuestion();
                    startTimer();
                }
            }, 500);
        }

        function gameOver() {
            const isNewHighScore = saveHighScore(score);
            const highScore = loadHighScore();

            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.remove('hidden');

            document.getElementById('final-score').textContent = score;
            document.getElementById('final-combo').textContent = maxCombo;
            document.getElementById('final-high-score').textContent = highScore;

            if (isNewHighScore && score > 0) {
                document.getElementById('final-high-score').textContent += ' 🎉';
            }
        }

        // Initialize
        updateHighScoreDisplay();
    </script>
</body>
</html>
