<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Timing Master - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            text-align: center;
            color: white;
            padding: 20px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
            font-size: 18px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #4ecdc4;
        }

        .game-area {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 30px auto;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .circle:active {
            transform: scale(0.95);
        }

        .target {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid rgba(255, 255, 255, 0.3);
        }

        .shrinking {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, #ff6b6b 0%, #c92a2a 100%);
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
        }

        .message {
            font-size: 24px;
            margin: 20px 0;
            min-height: 30px;
            font-weight: bold;
        }

        .message.perfect { color: #ffd93d; }
        .message.great { color: #6bcb77; }
        .message.good { color: #4ecdc4; }
        .message.miss { color: #ff6b6b; }

        .btn {
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .instructions {
            font-size: 14px;
            opacity: 0.7;
            margin-top: 20px;
            max-width: 300px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏱️ Timing Master</h1>

        <div class="stats">
            <div class="stat">
                <span class="stat-label">Score</span>
                <span class="stat-value" id="score">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Best</span>
                <span class="stat-value" id="best">0</span>
            </div>
        </div>

        <div class="game-area">
            <div class="circle target"></div>
            <div class="circle shrinking" id="shrinking"></div>
        </div>

        <div class="message" id="message">Tap to Start!</div>

        <button class="btn" id="startBtn" onclick="startGame()">Start Game</button>

        <p class="instructions">
            Tap when the shrinking circle<br>
            matches the target circle size!<br>
            Perfect timing = more points!
        </p>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        let score = 0;
        let bestScore = 0;
        let gameActive = false;
        let shrinkingSize = 250;
        let targetSize = 80;
        let isShrinking = false;
        let shrinkSpeed = 2;
        let animationId = null;
        let direction = -1;

        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const messageEl = document.getElementById('message');
        const shrinkingEl = document.getElementById('shrinking');
        const startBtn = document.getElementById('startBtn');

        // Load best score
        const saved = localStorage.getItem('timingMasterBest');
        if (saved) {
            bestScore = parseInt(saved);
            bestEl.textContent = bestScore;
        }

        function startGame() {
            score = 0;
            scoreEl.textContent = '0';
            gameActive = true;
            startBtn.style.display = 'none';
            messageEl.textContent = '';
            messageEl.className = 'message';

            startRound();
        }

        function startRound() {
            shrinkingSize = 250;
            direction = -1;
            shrinkSpeed = 2 + Math.random() * 1.5;
            isShrinking = true;

            updateCircle();
            animate();
        }

        function animate() {
            if (!gameActive || !isShrinking) return;

            shrinkingSize += shrinkSpeed * direction;

            // Bounce between sizes
            if (shrinkingSize <= 30 || shrinkingSize >= 250) {
                direction *= -1;
            }

            updateCircle();
            animationId = requestAnimationFrame(animate);
        }

        function updateCircle() {
            shrinkingEl.style.width = shrinkingSize + 'px';
            shrinkingEl.style.height = shrinkingSize + 'px';
        }

        function handleTap() {
            if (!gameActive) {
                startGame();
                return;
            }

            if (!isShrinking) return;

            cancelAnimationFrame(animationId);
            isShrinking = false;

            // Calculate accuracy
            const diff = Math.abs(shrinkingSize - targetSize);
            let points = 0;
            let text = '';
            let className = '';

            if (diff < 5) {
                points = 100;
                text = '🌟 PERFECT! +100';
                className = 'perfect';
            } else if (diff < 15) {
                points = 50;
                text = '✨ Great! +50';
                className = 'great';
            } else if (diff < 30) {
                points = 20;
                text = '👍 Good! +20';
                className = 'good';
            } else {
                points = 0;
                text = '❌ Miss! Game Over';
                className = 'miss';
                endGame();
            }

            score += points;
            scoreEl.textContent = score;

            messageEl.textContent = text;
            messageEl.className = 'message ' + className;

            if (points > 0) {
                // Continue with next round
                setTimeout(() => {
                    if (gameActive) {
                        startRound();
                    }
                }, 1000);
            }
        }

        function endGame() {
            gameActive = false;
            startBtn.style.display = 'inline-block';
            startBtn.textContent = 'Play Again';

            if (score > bestScore) {
                bestScore = score;
                bestEl.textContent = bestScore;
                localStorage.setItem('timingMasterBest', bestScore);
            }
        }

        // Event listeners
        shrinkingEl.addEventListener('mousedown', (e) => {
            e.preventDefault();
            handleTap();
        });

        shrinkingEl.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleTap();
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault();
                handleTap();
            }
        });
    </script>
</body>
</html>
