<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timing Master - タイミングマスター</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
        }
        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #start-overlay.hidden {
            display: none;
        }
        .start-content {
            text-align: center;
            color: #fff;
        }
        .start-content h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .start-content p {
            font-size: 1.1em;
            margin-bottom: 15px;
            color: #aaa;
            line-height: 1.6;
        }
        .start-btn {
            padding: 15px 40px;
            font-size: 1.2em;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            border-radius: 50px;
            color: #fff;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(78, 205, 196, 0.4);
        }
        #hud {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            text-align: center;
            z-index: 50;
        }
        #score {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #combo {
            font-size: 1.2em;
            color: #4ecdc4;
        }
        #message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2em;
            color: #fff;
            text-shadow: 0 0 20px rgba(78, 205, 196, 0.8);
            pointer-events: none;
            z-index: 60;
            opacity: 0;
            transition: opacity 0.2s;
        }
        #message.show {
            opacity: 1;
        }
        #fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 25px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            z-index: 50;
            backdrop-filter: blur(10px);
        }
        #fullscreen-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        #high-score {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 14px;
            z-index: 50;
            background: rgba(0,0,0,0.5);
            padding: 10px 15px;
            border-radius: 10px;
        }
        #high-score span {
            color: #4ecdc4;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="start-overlay">
        <div class="start-content">
            <h1>⏱️ Timing Master</h1>
            <p>回転する円がターゲットエリアに入ったらタップ！</p>
            <p>タイミングを合わせてハイスコアを目指そう</p>
            <button class="start-btn" id="start-btn">🎮 スタート</button>
        </div>
    </div>

    <div id="game-container">
        <canvas id="canvas"></canvas>
    </div>

    <div id="hud">
        <div id="score">0</div>
        <div id="combo">Combo: 0</div>
    </div>

    <div id="message"></div>

    <div id="high-score">
        ハイスコア: <span id="high-score-value">0</span>
    </div>

    <button id="fullscreen-btn">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const startOverlay = document.getElementById('start-overlay');
        const scoreDisplay = document.getElementById('score');
        const comboDisplay = document.getElementById('combo');
        const messageDisplay = document.getElementById('message');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const highScoreDisplay = document.getElementById('high-score-value');

        let width, height;
        let rotationAngle = 0;
        let rotationSpeed = 0.03;
        let score = 0;
        let combo = 0;
        let highScore = parseInt(localStorage.getItem('timingMasterHighScore')) || 0;
        let isRunning = false;
        let gameStarted = false;
        let targetAngle = 0;
        let targetWidth = Math.PI / 3; // ターゲットエリアの幅
        let circleRadius, ballRadius, ballDistance;

        highScoreDisplay.textContent = highScore;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            circleRadius = Math.min(width, height) * 0.3;
            ballRadius = circleRadius * 0.15;
            ballDistance = circleRadius * 0.7;
        }
        resize();
        window.addEventListener('resize', resize);

        function draw() {
            // クリア
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, width, height);

            const centerX = width / 2;
            const centerY = height / 2;

            // 円軌道
            ctx.save();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(centerX, centerY, ballDistance, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();

            // ターゲットエリア（グロー付き）
            ctx.save();
            const targetGradient = ctx.createRadialGradient(
                centerX, centerY, ballDistance - 30,
                centerX, centerY, ballDistance + 30
            );
            targetGradient.addColorStop(0, 'rgba(78, 205, 196, 0)');
            targetGradient.addColorStop(0.5, 'rgba(78, 205, 196, 0.3)');
            targetGradient.addColorStop(1, 'rgba(78, 205, 196, 0)');
            
            ctx.fillStyle = targetGradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, ballDistance + 30, 
                    targetAngle - targetWidth / 2, 
                    targetAngle + targetWidth / 2);
            ctx.arc(centerX, centerY, ballDistance - 30, 
                    targetAngle + targetWidth / 2, 
                    targetAngle - targetWidth / 2, 
                    true);
            ctx.closePath();
            ctx.fill();

            // ターゲットエリアの境界線
            ctx.strokeStyle = 'rgba(78, 205, 196, 0.8)';
            ctx.lineWidth = 4;
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(78, 205, 196, 0.8)';
            ctx.beginPath();
            ctx.arc(centerX, centerY, ballDistance, 
                    targetAngle - targetWidth / 2, 
                    targetAngle + targetWidth / 2);
            ctx.stroke();
            ctx.restore();

            // ボール
            const ballX = centerX + Math.cos(rotationAngle) * ballDistance;
            const ballY = centerY + Math.sin(rotationAngle) * ballDistance;

            ctx.save();
            // ボールのグロー
            ctx.shadowBlur = 20;
            ctx.shadowColor = 'rgba(255, 107, 107, 0.8)';
            
            // ボールのグラデーション
            const ballGradient = ctx.createRadialGradient(
                ballX, ballY, 0,
                ballX, ballY, ballRadius
            );
            ballGradient.addColorStop(0, '#ff6b6b');
            ballGradient.addColorStop(1, '#ee5a6f');
            
            ctx.fillStyle = ballGradient;
            ctx.beginPath();
            ctx.arc(ballX, ballY, ballRadius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // 中心の装飾
            ctx.save();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 20, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }

        function showMessage(text, color = '#4ecdc4') {
            messageDisplay.textContent = text;
            messageDisplay.style.color = color;
            messageDisplay.style.textShadow = `0 0 20px ${color}`;
            messageDisplay.classList.add('show');
            setTimeout(() => {
                messageDisplay.classList.remove('show');
            }, 500);
        }

        function checkTiming() {
            // 角度の差を計算（-π〜πの範囲）
            let angleDiff = rotationAngle - targetAngle;
            while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
            while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

            const absDiff = Math.abs(angleDiff);

            if (absDiff < targetWidth / 2) {
                // 成功！
                const accuracy = 1 - (absDiff / (targetWidth / 2));
                const points = Math.floor(accuracy * 100) + combo * 10;
                score += points;
                combo++;

                if (accuracy > 0.8) {
                    showMessage('PERFECT!', '#ff6b6b');
                } else if (accuracy > 0.5) {
                    showMessage('GREAT!', '#4ecdc4');
                } else {
                    showMessage('GOOD!', '#ffd93d');
                }

                // 難易度アップ
                rotationSpeed = Math.min(0.1, 0.03 + score * 0.0001);

                // ターゲットエリアを移動
                targetAngle = Math.random() * Math.PI * 2;
            } else {
                // 失敗
                combo = 0;
                showMessage('MISS', '#888');
            }

            scoreDisplay.textContent = score;
            comboDisplay.textContent = `Combo: ${combo}`;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('timingMasterHighScore', highScore);
                highScoreDisplay.textContent = highScore;
            }
        }

        function update() {
            if (!isRunning) return;

            rotationAngle += rotationSpeed;
            if (rotationAngle > Math.PI * 2) {
                rotationAngle -= Math.PI * 2;
            }

            draw();
            requestAnimationFrame(update);
        }

        function startGame() {
            gameStarted = true;
            isRunning = true;
            score = 0;
            combo = 0;
            rotationSpeed = 0.03;
            rotationAngle = 0;
            targetAngle = 0;
            scoreDisplay.textContent = '0';
            comboDisplay.textContent = 'Combo: 0';
            startOverlay.classList.add('hidden');
            update();
        }

        startBtn.addEventListener('click', startGame);

        // タップ/クリックでタイミングチェック
        canvas.addEventListener('click', checkTiming);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            checkTiming();
        });

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // 初期描画
        draw();
    </script>
</body>
</html>
