<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timing Master</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            color: #ffffff;
            overflow: hidden;
            touch-action: manipulation;
        }
        
        .game-container {
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }
        
        h1 {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .score-display {
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
        }
        
        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .stat-label {
            color: #888;
            font-size: 0.8em;
        }
        
        .stat-value {
            color: #667eea;
            font-weight: bold;
        }
        
        .combo-display {
            font-size: clamp(1.5rem, 4vw, 2rem);
            color: #f093fb;
            margin: 10px 0;
            height: 40px;
        }
        
        #game-area {
            position: relative;
            width: 100%;
            max-width: 350px;
            height: 350px;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        canvas {
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(102, 126, 234, 0.4);
            cursor: pointer;
            touch-action: none;
        }
        
        .message {
            position: absolute;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: bold;
            pointer-events: none;
            animation: fadeOut 0.5s ease-out forwards;
        }
        
        @keyframes fadeOut {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-30px) scale(1.2);
            }
        }
        
        .perfect {
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88;
        }
        
        .good {
            color: #667eea;
            text-shadow: 0 0 15px #667eea;
        }
        
        .miss {
            color: #ff4757;
            text-shadow: 0 0 15px #ff4757;
        }
        
        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        
        button {
            padding: 14px 28px;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 8px;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(102, 126, 234, 0.6);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .fullscreen-btn {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }
        
        .fullscreen-btn:hover {
            box-shadow: 0 0 25px rgba(240, 147, 251, 0.6);
        }
        
        .instructions {
            margin-top: 20px;
            padding: 15px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 8px;
            font-size: clamp(0.8rem, 2vw, 0.95rem);
            line-height: 1.6;
        }
        
        .instructions strong {
            color: #667eea;
        }
        
        @media (max-width: 600px) {
            .game-container {
                padding: 10px;
            }
            
            #game-area {
                height: 280px;
            }
            
            button {
                padding: 12px 20px;
                font-size: 0.9rem;
            }
            
            .instructions {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>⏱️ Timing Master</h1>
        
        <div class="score-display">
            <span id="score">0</span> pts
        </div>
        
        <div class="stats">
            <div class="stat">
                <span class="stat-label">Best Combo</span>
                <span class="stat-value" id="best-combo">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">High Score</span>
                <span class="stat-value" id="high-score">0</span>
            </div>
        </div>
        
        <div class="combo-display" id="combo"></div>
        
        <div id="game-area">
            <canvas id="canvas"></canvas>
        </div>
        
        <div class="controls">
            <button onclick="startGame()">▶️ Start</button>
            <button onclick="resetGame()">🔄 Reset</button>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">📺 全画面</button>
        </div>
        
        <div class="instructions">
            <strong>遊び方:</strong><br>
            青い円が緑色のターゲットに重なった瞬間にタップ！<br>
            • 完璧なタイミング: +100pts (PERFECT!)<br>
            • ちょっと早い/遅い: +50pts (GOOD)<br>
            • 外す: コンボリセット (MISS)
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let score = 0;
        let combo = 0;
        let bestCombo = 0;
        let highScore = parseInt(localStorage.getItem('timingMasterHighScore')) || 0;
        let gameRunning = false;
        let animationId;
        
        // Circle properties
        const CANVAS_SIZE = 300;
        const TARGET_SIZE = 60;
        const SHRINKING_CIRCLE_START_SIZE = 180;
        let currentShrinkingSize = SHRINKING_CIRCLE_START_SIZE;
        let shrinkingSpeed = 1.5;
        let direction = -1; // -1 for shrinking
        
        // Target position (random)
        let targetAngle = Math.random() * Math.PI * 2;
        let targetDistance = 50;
        
        function initCanvas() {
            canvas.width = CANVAS_SIZE;
            canvas.height = CANVAS_SIZE;
        }
        
        function updateDisplay() {
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo > 1 ? `${combo}x COMBO!` : '';
            document.getElementById('best-combo').textContent = bestCombo;
            document.getElementById('high-score').textContent = highScore;
        }
        
        function showMessage(text, type) {
            const gameArea = document.getElementById('game-area');
            const message = document.createElement('div');
            message.className = `message ${type}`;
            message.textContent = text;
            gameArea.appendChild(message);
            
            setTimeout(() => {
                message.remove();
            }, 500);
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // Draw background circle
            ctx.beginPath();
            ctx.arc(centerX, centerY, SHRINKING_CIRCLE_START_SIZE / 2, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(102, 126, 234, 0.3)';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Draw target circle
            const targetX = centerX + Math.cos(targetAngle) * targetDistance;
            const targetY = centerY + Math.sin(targetAngle) * targetDistance;
            
            ctx.beginPath();
            ctx.arc(targetX, targetY, TARGET_SIZE / 2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 255, 136, 0.2)';
            ctx.fill();
            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Draw shrinking circle
            ctx.beginPath();
            ctx.arc(centerX, centerY, currentShrinkingSize / 2, 0, Math.PI * 2);
            
            // Create gradient
            const gradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, currentShrinkingSize / 2
            );
            gradient.addColorStop(0, 'rgba(102, 126, 234, 0.3)');
            gradient.addColorStop(1, 'rgba(118, 75, 162, 0.6)');
            
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 4;
            ctx.stroke();
            
            // Update shrinking circle
            if (gameRunning) {
                currentShrinkingSize += shrinkingSpeed * direction;
                
                if (currentShrinkingSize <= TARGET_SIZE || currentShrinkingSize >= SHRINKING_CIRCLE_START_SIZE) {
                    // Missed the target
                    if (currentShrinkingSize <= TARGET_SIZE) {
                        combo = 0;
                        showMessage('MISS', 'miss');
                        
                        // Reset for next round
                        targetAngle = Math.random() * Math.PI * 2;
                    }
                    
                    direction *= -1;
                    currentShrinkingSize = direction === -1 ? SHRINKING_CIRCLE_START_SIZE : TARGET_SIZE;
                    shrinkingSpeed = 1.5 + Math.random() * 0.5; // Randomize speed
                }
            }
            
            updateDisplay();
            animationId = requestAnimationFrame(draw);
        }
        
        function checkTiming() {
            if (!gameRunning) return;
            
            const sizeDiff = Math.abs(currentShrinkingSize - TARGET_SIZE);
            const targetThreshold = 15;
            
            if (sizeDiff <= targetThreshold) {
                // Perfect or Good
                const isPerfect = sizeDiff <= 5;
                const points = isPerfect ? 100 : 50;
                const type = isPerfect ? 'perfect' : 'good';
                const text = isPerfect ? 'PERFECT!' : 'GOOD';
                
                score += points * (1 + combo * 0.1);
                combo++;
                bestCombo = Math.max(bestCombo, combo);
                
                showMessage(text, type);
                
                // Reset for next round
                currentShrinkingSize = SHRINKING_CIRCLE_START_SIZE;
                direction = -1;
                targetAngle = Math.random() * Math.PI * 2;
                shrinkingSpeed = 1.5 + Math.random() * 0.5;
            } else {
                // Miss
                combo = 0;
                showMessage('MISS', 'miss');
            }
            
            // Update high score
            if (score > highScore) {
                highScore = Math.floor(score);
                localStorage.setItem('timingMasterHighScore', highScore);
            }
        }
        
        function startGame() {
            if (gameRunning) return;
            
            gameRunning = true;
            score = 0;
            combo = 0;
            currentShrinkingSize = SHRINKING_CIRCLE_START_SIZE;
            direction = -1;
            targetAngle = Math.random() * Math.PI * 2;
            shrinkingSpeed = 1.5;
        }
        
        function resetGame() {
            gameRunning = false;
            score = 0;
            combo = 0;
            currentShrinkingSize = SHRINKING_CIRCLE_START_SIZE;
            direction = -1;
            targetAngle = Math.random() * Math.PI * 2;
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }
        
        // Event listeners
        canvas.addEventListener('click', checkTiming);
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            checkTiming();
        }, { passive: false });
        
        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault();
                checkTiming();
            }
        });
        
        // Initialize
        initCanvas();
        document.getElementById('high-score').textContent = highScore;
        draw();
    </script>
</body>
</html>
