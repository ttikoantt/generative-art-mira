<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>タイミングマスター</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .header {
            margin-bottom: 30px;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(90deg, #00f5ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .score {
            font-size: 48px;
            font-weight: bold;
            color: #00f5ff;
            text-shadow: 0 0 20px rgba(0, 245, 255, 0.5);
        }

        .combo {
            font-size: 24px;
            color: #ff00ff;
            margin-top: 5px;
            min-height: 30px;
        }

        .combo.active {
            animation: pulse 0.3s ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .game-area {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 30px;
        }

        .target-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            border: 4px solid #00f5ff;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
        }

        .shrinking-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border: 4px solid #ff00ff;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
            transition: width 0.016s linear, height 0.016s linear;
        }

        .feedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .feedback.show {
            animation: feedbackAnim 0.5s ease-out;
        }

        @keyframes feedbackAnim {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1) translateY(-50px);
            }
        }

        .feedback.perfect { color: #00ff00; }
        .feedback.great { color: #00f5ff; }
        .feedback.good { color: #ffff00; }
        .feedback.miss { color: #ff0000; }

        .tap-button {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00f5ff, #ff00ff);
            border: none;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.5);
            transition: all 0.1s;
            margin: 0 auto;
            display: block;
        }

        .tap-button:active {
            transform: scale(0.95);
            box-shadow: 0 0 50px rgba(0, 245, 255, 0.8);
        }

        .tap-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            .title { font-size: 24px; }
            .score { font-size: 36px; }
            .combo { font-size: 18px; }
            .game-area { width: 250px; height: 250px; }
            .target-ring { width: 120px; height: 120px; }
            .shrinking-ring { width: 200px; height: 200px; }
            .tap-button { width: 150px; height: 150px; font-size: 20px; }
            .fullscreen-btn { top: 10px; right: 10px; padding: 8px 16px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <div class="header">
            <div class="title">⏱️ タイミングマスター</div>
            <div class="score" id="score">0</div>
            <div class="combo" id="combo"></div>
        </div>

        <div class="game-area">
            <div class="target-ring"></div>
            <div class="shrinking-ring" id="shrinkingRing"></div>
            <div class="feedback" id="feedback"></div>
        </div>

        <button class="tap-button" id="tapButton" onclick="handleTap()">TAP!</button>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">Perfect</div>
                <div class="stat-value" id="perfectCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Great</div>
                <div class="stat-value" id="greatCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Max Combo</div>
                <div class="stat-value" id="maxCombo">0</div>
            </div>
        </div>
    </div>

    <script>
        // Game state
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let perfectCount = 0;
        let greatCount = 0;

        // Ring state
        let ringSize = 250;
        let isShrinking = true;
        let speed = 1.5;
        let gameStarted = false;

        // Target ring size
        const targetSize = 150;

        // DOM elements
        const scoreEl = document.getElementById('score');
        const comboEl = document.getElementById('combo');
        const perfectCountEl = document.getElementById('perfectCount');
        const greatCountEl = document.getElementById('greatCount');
        const maxComboEl = document.getElementById('maxCombo');
        const shrinkingRing = document.getElementById('shrinkingRing');
        const feedback = document.getElementById('feedback');
        const tapButton = document.getElementById('tapButton');

        // Show feedback
        function showFeedback(text, type) {
            feedback.textContent = text;
            feedback.className = `feedback show ${type}`;

            setTimeout(() => {
                feedback.className = 'feedback';
            }, 500);
        }

        // Update combo display
        function updateCombo() {
            if (combo > 1) {
                comboEl.textContent = `${combo} Combo!`;
                comboEl.classList.add('active');
                setTimeout(() => comboEl.classList.remove('active'), 300);
            } else {
                comboEl.textContent = '';
            }
        }

        // Handle tap
        function handleTap() {
            if (!gameStarted) {
                gameStarted = true;
            }

            const diff = Math.abs(ringSize - targetSize);
            const tolerance = 30;

            if (diff <= tolerance) {
                // Hit!
                if (diff <= 10) {
                    // Perfect
                    score += 100 + combo * 10;
                    combo++;
                    perfectCount++;
                    showFeedback('PERFECT!', 'perfect');
                } else {
                    // Great
                    score += 50 + combo * 5;
                    combo++;
                    greatCount++;
                    showFeedback('GREAT!', 'great');
                }

                if (combo > maxCombo) {
                    maxCombo = combo;
                }

                // Reset ring
                ringSize = 250;
                speed = Math.min(1.5 + score / 500, 4);
            } else {
                // Miss
                combo = 0;
                showFeedback('MISS', 'miss');
            }

            // Update display
            scoreEl.textContent = score;
            updateCombo();
            perfectCountEl.textContent = perfectCount;
            greatCountEl.textContent = greatCount;
            maxComboEl.textContent = maxCombo;
        }

        // Game loop
        function gameLoop() {
            if (isShrinking) {
                ringSize -= speed;

                if (ringSize <= 0) {
                    // Ring completely shrunk - miss
                    combo = 0;
                    showFeedback('MISS', 'miss');
                    updateCombo();
                    ringSize = 250;
                }

                // Update ring size
                shrinkingRing.style.width = `${ringSize}px`;
                shrinkingRing.style.height = `${ringSize}px`;
            }

            requestAnimationFrame(gameLoop);
        }

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Prevent zoom on double tap
        document.addEventListener('touchend', (e) => {
            e.preventDefault();
        }, { passive: false });

        // Start game loop
        gameLoop();
    </script>
</body>
</html>
