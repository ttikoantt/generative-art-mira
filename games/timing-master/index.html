<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Timing Master</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        h1 {
            color: #fff;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 15px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
        }

        .game-area {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 30px;
        }

        .target-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
        }

        .target-zone {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.3);
            border: 3px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .target-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.6);
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .target-dot:active {
            transform: translate(-50%, -50%) scale(0.9);
        }

        .tap-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .feedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            pointer-events: none;
            opacity: 0;
            animation: feedbackPop 0.5s ease-out forwards;
        }

        @keyframes feedbackPop {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1) translateY(-30px);
            }
        }

        .perfect {
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
        }

        .good {
            color: #4ecdc4;
            text-shadow: 0 0 30px rgba(78, 205, 196, 0.8);
        }

        .miss {
            color: #ff6b6b;
            text-shadow: 0 0 30px rgba(255, 107, 107, 0.8);
        }

        .combo-display {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .combo-display.show {
            opacity: 1;
        }

        #fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        #fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .start-screen, .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .start-screen h2, .game-over-screen h2 {
            color: #fff;
            font-size: 36px;
            margin-bottom: 20px;
        }

        .start-screen p, .game-over-screen p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            margin-bottom: 30px;
            max-width: 300px;
            text-align: center;
        }

        .start-btn, .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 50px;
            border-radius: 30px;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .start-btn:active, .restart-btn:active {
            transform: scale(0.95);
        }

        .hidden {
            display: none !important;
        }

        .final-score {
            color: #ffd700;
            font-size: 64px;
            font-weight: bold;
            margin: 20px 0;
        }

        .final-stats {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <button id="fullscreen-btn">⛶ 全画面</button>

    <div class="start-screen" id="start-screen">
        <h2>🎯 Timing Master</h2>
        <p>ターゲットが白い円に重なった瞬間にタップ！<br>完璧なタイミングを目指せ！</p>
        <button class="start-btn" id="start-btn">スタート</button>
    </div>

    <div class="game-over-screen hidden" id="game-over-screen">
        <h2>🎮 ゲームオーバー</h2>
        <div class="final-score" id="final-score">0</div>
        <div class="final-stats" id="final-stats"></div>
        <button class="restart-btn" id="restart-btn">もう一度</button>
    </div>

    <div class="container">
        <h1>⏱️ Timing Master</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">ライフ</div>
                <div class="stat-value" id="lives">3</div>
            </div>
        </div>

        <div class="game-area">
            <div class="target-ring"></div>
            <div class="target-zone"></div>
            <div class="target-dot" id="target-dot"></div>
            <div class="combo-display" id="combo-display">0 Combo</div>
            <div class="tap-area" id="tap-area"></div>
        </div>
    </div>

    <script>
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const tapArea = document.getElementById('tap-area');
        const targetDot = document.getElementById('target-dot');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const comboDisplay = document.getElementById('combo-display');
        const finalScoreEl = document.getElementById('final-score');
        const finalStatsEl = document.getElementById('final-stats');
        const gameArea = document.querySelector('.game-area');

        let score = 0;
        let lives = 3;
        let combo = 0;
        let gameRunning = false;
        let angle = 0;
        let speed = 0.03;
        let animationId = null;
        let perfectCount = 0;
        let goodCount = 0;
        let missCount = 0;

        // 全画面ボタン
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                fullscreenBtn.textContent = '⛶ 解除';
            } else {
                document.exitFullscreen();
                fullscreenBtn.textContent = '⛶ 全画面';
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                fullscreenBtn.textContent = '⛶ 全画面';
            }
        });

        function startGame() {
            score = 0;
            lives = 3;
            combo = 0;
            angle = 0;
            speed = 0.03;
            perfectCount = 0;
            goodCount = 0;
            missCount = 0;
            gameRunning = true;

            updateDisplay();
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            comboDisplay.classList.add('show');

            animate();
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);

            finalScoreEl.textContent = score;
            finalStatsEl.textContent = `Perfect: ${perfectCount} | Good: ${goodCount} | Miss: ${missCount}`;
            gameOverScreen.classList.remove('hidden');
        }

        function updateDisplay() {
            scoreEl.textContent = score;
            livesEl.textContent = lives;
            comboDisplay.textContent = combo > 0 ? `${combo} Combo` : '';

            if (combo > 0) {
                comboDisplay.classList.add('show');
            } else {
                comboDisplay.classList.remove('show');
            }
        }

        function showFeedback(type) {
            const feedback = document.createElement('div');
            feedback.className = `feedback ${type}`;

            switch(type) {
                case 'perfect':
                    feedback.textContent = 'PERFECT!';
                    break;
                case 'good':
                    feedback.textContent = 'GOOD!';
                    break;
                case 'miss':
                    feedback.textContent = 'MISS';
                    break;
            }

            gameArea.appendChild(feedback);

            setTimeout(() => {
                feedback.remove();
            }, 500);
        }

        function checkTiming() {
            if (!gameRunning) return;

            // 角度を0-360度に変換（0度が下、90度が右）
            const degrees = (angle * 180 / Math.PI) % 360;
            const normalizedDegrees = degrees < 0 ? degrees + 360 : degrees;

            // ターゲットゾーンは下（0度）、許容範囲は±20度
            const targetAngle = 0;
            const tolerance = 25;

            const diff = Math.abs(normalizedDegrees - targetAngle);
            const distance = Math.min(diff, 360 - diff);

            if (distance <= tolerance * 0.4) {
                // Perfect
                score += 100 + combo * 10;
                combo++;
                perfectCount++;
                showFeedback('perfect');
                speed = Math.min(speed + 0.002, 0.08);
            } else if (distance <= tolerance) {
                // Good
                score += 50 + combo * 5;
                combo++;
                goodCount++;
                showFeedback('good');
            } else {
                // Miss
                lives--;
                combo = 0;
                missCount++;
                showFeedback('miss');

                if (lives <= 0) {
                    gameOver();
                    return;
                }
            }

            updateDisplay();
        }

        function animate() {
            if (!gameRunning) return;

            angle += speed;

            // ターゲットドットの位置を計算
            const radius = 70;
            const x = Math.cos(angle + Math.PI / 2) * radius;
            const y = Math.sin(angle + Math.PI / 2) * radius;

            targetDot.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;

            animationId = requestAnimationFrame(animate);
        }

        tapArea.addEventListener('click', (e) => {
            e.preventDefault();
            checkTiming();
        });

        tapArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            checkTiming();
        });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
