<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Timing Master</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }
        .game-container {
            text-align: center;
            position: relative;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .score-display {
            color: #fff;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            margin-bottom: 10px;
        }
        .combo-display {
            color: #ffd700;
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        .game-area {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto;
        }
        .target-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.3);
        }
        .shrink-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            transition: none;
        }
        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }
        .tap-btn {
            width: 300px;
            height: 300px;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 0;
            border-radius: 50%;
        }
        .tap-btn:active {
            transform: translateX(-50%) scale(0.95);
        }
        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            pointer-events: none;
            animation: popup 0.5s ease-out forwards;
        }
        @keyframes popup {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1) translateY(-50px);
            }
        }
        .perfect {
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 1);
        }
        .great {
            color: #00ff88;
        }
        .good {
            color: #00d4ff;
        }
        .miss {
            color: #ff6b6b;
        }
        .high-score {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-top: 20px;
        }
        .fullscreen {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
        }
        .btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .start-screen, .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 12, 41, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            border-radius: 20px;
        }
        .start-screen h1, .game-over-screen h1 {
            color: #fff;
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        .start-screen p, .game-over-screen p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            margin-bottom: 30px;
        }
        .start-btn, .restart-btn {
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            border: none;
            color: #0f0c29;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            transition: all 0.3s ease;
        }
        .start-btn:hover, .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
        }
        .final-score {
            color: #ffd700;
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
        }
        .instructions {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="score-display" id="score">0</div>
        <div class="combo-display" id="combo"></div>

        <div class="game-area" id="gameArea">
            <div class="target-ring">
                <div class="shrink-ring" id="shrinkRing"></div>
                <div class="center-dot"></div>
            </div>
            <button class="tap-btn" id="tapBtn"></button>
        </div>

        <div class="high-score">
            ハイスコア: <span id="highScore">0</span>
        </div>

        <div class="instructions">
            リングが中心の点に重なった瞬間にタップ！
        </div>

        <div class="start-screen" id="startScreen">
            <h1>⏱️ Timing Master</h1>
            <p>完璧なタイミングを狙え！</p>
            <button class="start-btn" onclick="startGame()">スタート</button>
        </div>

        <div class="game-over-screen" id="gameOverScreen" style="display: none;">
            <h1>ゲームオーバー</h1>
            <div class="final-score" id="finalScore">0</div>
            <p>コンボ: <span id="finalCombo">0</span></p>
            <button class="restart-btn" onclick="startGame()">もう一度</button>
        </div>
    </div>

    <div class="fullscreen">
        <button class="btn" onclick="toggleFullscreen()">全画面</button>
    </div>

    <script>
        let score = 0;
        let combo = 0;
        let highScore = localStorage.getItem('timingMasterHighScore') || 0;
        let gameActive = false;
        let animationId = null;
        let startTime = 0;
        let ringSize = 100;
        let direction = -1;
        let speed = 0.5;
        let canTap = true;
        let lives = 3;
        let level = 1;

        const shrinkRing = document.getElementById('shrinkRing');
        const scoreDisplay = document.getElementById('score');
        const comboDisplay = document.getElementById('combo');
        const highScoreDisplay = document.getElementById('highScore');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const gameArea = document.getElementById('gameArea');
        const tapBtn = document.getElementById('tapBtn');

        highScoreDisplay.textContent = highScore;

        function startGame() {
            score = 0;
            combo = 0;
            lives = 3;
            level = 1;
            speed = 0.5;
            gameActive = true;
            canTap = true;

            scoreDisplay.textContent = '0';
            comboDisplay.textContent = '';
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';

            animate();
        }

        function animate() {
            if (!gameActive) return;

            ringSize += speed * direction;

            if (ringSize <= 0 || ringSize >= 100) {
                // リングが外側または完全に縮小したらミス
                if (ringSize <= 0) {
                    miss();
                }
                ringSize = 100;
                direction = -1;
                speed = 0.3 + (level * 0.1);
            }

            shrinkRing.style.transform = `scale(${ringSize / 100})`;

            // 色を変化
            const hue = (ringSize * 3.6) % 360;
            shrinkRing.style.borderColor = `hsl(${hue}, 80%, 60%)`;
            shrinkRing.style.boxShadow = `0 0 ${20 - ringSize / 5}px hsl(${hue}, 80%, 60%)`;

            animationId = requestAnimationFrame(animate);
        }

        function tap() {
            if (!gameActive || !canTap) return;

            canTap = false;
            setTimeout(() => canTap = true, 100);

            const accuracy = Math.abs(ringSize - 0);
            let points = 0;
            let message = '';
            let messageClass = '';

            if (accuracy < 3) {
                // Perfect
                points = 100 * level;
                combo++;
                message = 'PERFECT!';
                messageClass = 'perfect';
                showMessage(message, messageClass);
            } else if (accuracy < 8) {
                // Great
                points = 50 * level;
                combo++;
                message = 'GREAT!';
                messageClass = 'great';
                showMessage(message, messageClass);
            } else if (accuracy < 15) {
                // Good
                points = 20 * level;
                combo = Math.max(0, combo - 1);
                message = 'GOOD';
                messageClass = 'good';
                showMessage(message, messageClass);
            } else {
                // Miss
                combo = 0;
                message = 'MISS';
                messageClass = 'miss';
                showMessage(message, messageClass);
            }

            if (points > 0) {
                score += points + (combo * 10);
                scoreDisplay.textContent = score;

                // レベルアップ
                if (score >= level * 500) {
                    level++;
                }

                if (combo > 1) {
                    comboDisplay.textContent = `${combo} コンボ！`;
                    comboDisplay.style.transform = 'scale(1.2)';
                    setTimeout(() => comboDisplay.style.transform = 'scale(1)', 100);
                } else {
                    comboDisplay.textContent = '';
                }
            }

            // リングをリセット
            ringSize = 100;
            direction = -1;
        }

        function miss() {
            combo = 0;
            comboDisplay.textContent = '';
            showMessage('MISS', 'miss');
        }

        function showMessage(text, className) {
            const existingMessage = document.querySelector('.message');
            if (existingMessage) {
                existingMessage.remove();
            }

            const message = document.createElement('div');
            message.className = `message ${className}`;
            message.textContent = text;
            gameArea.appendChild(message);

            setTimeout(() => message.remove(), 500);
        }

        tapBtn.addEventListener('click', tap);
        tapBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            tap();
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
