<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タイミングマスター</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            position: relative;
        }

        h1 {
            color: #0ff;
            font-size: clamp(24px, 5vw, 36px);
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-label {
            color: #888;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #0ff;
            font-size: 28px;
            font-weight: bold;
        }

        #gameCanvas {
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            cursor: pointer;
            touch-action: none;
        }

        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        .message.perfect {
            color: #0f0;
            animation: perfectAnim 0.5s ease-out;
        }

        .message.good {
            color: #ff0;
            animation: goodAnim 0.5s ease-out;
        }

        .message.miss {
            color: #f00;
            animation: missAnim 0.5s ease-out;
        }

        @keyframes perfectAnim {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        @keyframes goodAnim {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        @keyframes missAnim {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        .instructions {
            color: #888;
            margin-top: 30px;
            font-size: 14px;
            max-width: 400px;
            line-height: 1.6;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .restart-btn {
            position: fixed;
            top: 70px;
            right: 20px;
            background: rgba(0, 255, 255, 0.2);
            color: #fff;
            border: 1px solid rgba(0, 255, 255, 0.4);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .restart-btn:hover {
            background: rgba(0, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .game-over.show {
            display: flex;
        }

        .game-over h2 {
            color: #f00;
            font-size: 48px;
            margin-bottom: 30px;
        }

        .game-over .final-score {
            color: #0ff;
            font-size: 64px;
            margin-bottom: 20px;
        }

        .game-over .final-combo {
            color: #ff0;
            font-size: 36px;
            margin-bottom: 40px;
        }

        .game-over button {
            background: #0ff;
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .game-over button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>
    <button class="restart-btn" id="restartBtn">リスタート</button>

    <div class="game-container">
        <h1>⏱️ タイミングマスター</h1>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">ライフ</div>
                <div class="stat-value" id="lives">3</div>
            </div>
            <div class="stat">
                <div class="stat-label">コンボ</div>
                <div class="stat-value" id="combo">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">レベル</div>
                <div class="stat-value" id="level">1</div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
        <div class="message" id="message"></div>

        <div class="instructions">
            回転する青い点が緑色のエリアに入った時にクリック！<br>
            完璧なタイミングでクリックするとコンボが増えます
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>GAME OVER</h2>
        <div class="final-score" id="finalScore">0</div>
        <div class="final-combo" id="finalCombo">MAX COMBO: 0</div>
        <button id="retryBtn">もう一度挑戦</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const restartBtn = document.getElementById('restartBtn');
        const messageEl = document.getElementById('message');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const comboEl = document.getElementById('combo');
        const levelEl = document.getElementById('level');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const finalComboEl = document.getElementById('finalCombo');
        const retryBtn = document.getElementById('retryBtn');

        let score = 0;
        let lives = 3;
        let combo = 0;
        let maxCombo = 0;
        let level = 1;
        let angle = 0;
        let speed = 0.03;
        let rotation = 0;
        let gameOver = false;

        const size = Math.min(window.innerWidth * 0.8, 400);
        canvas.width = size;
        canvas.height = size;
        const centerX = size / 2;
        const centerY = size / 2;
        const radius = size * 0.4;
        const targetWidth = Math.PI * 0.15; // ターゲットの幅

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, size, size);

            // 外円
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 3;
            ctx.stroke();

            // ターゲットエリア（緑色）
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, -targetWidth / 2, targetWidth / 2);
            ctx.strokeStyle = '#0f0';
            ctx.lineWidth = 8;
            ctx.stroke();

            // 回転する点
            const dotX = centerX + Math.cos(angle) * radius;
            const dotY = centerY + Math.sin(angle) * radius;

            // 点の軌跡
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius - 10, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.2)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 青い点
            ctx.beginPath();
            ctx.arc(dotX, dotY, 12, 0, Math.PI * 2);
            ctx.fillStyle = '#0ff';
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 点の光る効果
            ctx.beginPath();
            ctx.arc(dotX, dotY, 18, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 255, 255, 0.3)';
            ctx.fill();

            // 速度インジケーター
            ctx.fillStyle = '#888';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(`Speed: ${(speed * 100).toFixed(1)}`, centerX, size - 20);
        }

        function update() {
            if (gameOver) return;

            angle += speed;
            if (angle > Math.PI * 2) {
                angle -= Math.PI * 2;
            }

            rotation += 0.01;
        }

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = 'message ' + type;
            setTimeout(() => {
                messageEl.className = 'message';
            }, 500);
        }

        function checkTiming() {
            if (gameOver) return;

            // 正規化された角度（0〜2π）
            let normalizedAngle = angle % (Math.PI * 2);
            if (normalizedAngle < 0) normalizedAngle += Math.PI * 2;

            // ターゲットは0ラジアンの周り
            const targetStart = (Math.PI * 2 - targetWidth / 2) % (Math.PI * 2);
            const targetEnd = (targetWidth / 2) % (Math.PI * 2);

            // ターゲットエリアに含まれるかチェック
            const inTarget = normalizedAngle <= targetEnd || normalizedAngle >= targetStart;

            if (inTarget) {
                // 完璧なタイミング（中心に近いほど良い）
                const distance = Math.min(
                    Math.abs(normalizedAngle),
                    Math.abs(normalizedAngle - Math.PI * 2)
                );
                
                const perfectThreshold = targetWidth * 0.3;
                const goodThreshold = targetWidth * 0.7;

                if (distance < perfectThreshold) {
                    // PERFECT
                    combo++;
                    if (combo > maxCombo) maxCombo = combo;
                    const points = 100 * (1 + Math.floor(combo / 5));
                    score += points;
                    showMessage('PERFECT! +' + points, 'perfect');
                } else if (distance < goodThreshold) {
                    // GOOD
                    combo++;
                    if (combo > maxCombo) maxCombo = combo;
                    const points = 50 * (1 + Math.floor(combo / 10));
                    score += points;
                    showMessage('GOOD! +' + points, 'good');
                } else {
                    // OK
                    const points = 20;
                    score += points;
                    showMessage('OK +' + points, 'good');
                }

                // レベルアップチェック
                if (score >= level * 500) {
                    level++;
                    speed += 0.005;
                    showMessage('LEVEL ' + level + '!', 'perfect');
                }
            } else {
                // MISS
                combo = 0;
                lives--;
                showMessage('MISS!', 'miss');
                
                if (lives <= 0) {
                    endGame();
                }
            }

            updateStats();
        }

        function updateStats() {
            scoreEl.textContent = score;
            livesEl.textContent = lives;
            comboEl.textContent = combo;
            levelEl.textContent = level;
        }

        function endGame() {
            gameOver = true;
            finalScoreEl.textContent = score;
            finalComboEl.textContent = 'MAX COMBO: ' + maxCombo;
            gameOverEl.classList.add('show');
        }

        function resetGame() {
            score = 0;
            lives = 3;
            combo = 0;
            maxCombo = 0;
            level = 1;
            angle = 0;
            speed = 0.03;
            gameOver = false;
            gameOverEl.classList.remove('show');
            updateStats();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // イベントリスナー
        canvas.addEventListener('click', checkTiming);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            checkTiming();
        });

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        restartBtn.addEventListener('click', resetGame);
        retryBtn.addEventListener('click', resetGame);

        // ゲーム開始
        gameLoop();
    </script>
</body>
</html>
