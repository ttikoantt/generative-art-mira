<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>タイミングマスター</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #1a1a2e;
            overflow: hidden;
            touch-action: manipulation;
        }

        #gameCanvas {
            display: block;
            touch-action: none;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(26, 26, 46, 0.95);
            z-index: 10;
        }

        .overlay.hidden {
            display: none;
        }

        h1 {
            font-size: 32px;
            color: #fff;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
            text-align: center;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover, .btn:active {
            transform: scale(1.05);
        }

        .stats {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 5;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
        }

        .stat-label {
            color: #888;
            font-size: 11px;
            font-weight: 400;
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 6;
        }

        .message.show {
            opacity: 1;
        }

        .message.perfect {
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .message.good {
            color: #4ecdc4;
        }

        .message.miss {
            color: #ff6b6b;
        }

        .message.show {
            transform: translate(-50%, -50%) scale(1.2);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tutorial {
            font-size: 14px;
            color: #aaa;
            text-align: center;
            max-width: 300px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="stats">
        <div class="stat">
            <div class="stat-label">SCORE</div>
            <span id="score">0</span>
        </div>
        <div class="stat">
            <div class="stat-label">BEST</div>
            <span id="best">0</span>
        </div>
        <div class="stat">
            <div class="stat-label">LEVEL</div>
            <span id="level">1</span>
        </div>
    </div>

    <div class="message" id="message"></div>

    <div class="overlay" id="startOverlay">
        <h1>🎯 タイミングマスター</h1>
        <p class="tutorial">
            回転するターゲットが<br>
            上のマーカーに来た時にタップ！<br><br>
            完璧なタイミングで高得点を目指そう
        </p>
        <button class="btn" id="startBtn">スタート</button>
    </div>

    <div class="overlay hidden" id="gameOverOverlay">
        <h1>ゲームオーバー</h1>
        <p class="subtitle">スコア: <span id="finalScore">0</span></p>
        <button class="btn" id="restartBtn">もう一度</button>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">⛶</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let score = 0;
        let bestScore = 0;
        let level = 1;
        let lives = 3;
        let rotation = 0;
        let rotationSpeed = 2;
        let isPlaying = false;
        let animationId = null;

        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        const radius = Math.min(window.innerWidth, window.innerHeight) * 0.25;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 背景グラデーション
            const gradient = ctx.createRadialGradient(
                canvas.width / 2, canvas.height / 2, 0,
                canvas.width / 2, canvas.height / 2, canvas.width
            );
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(1, '#16213e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (!isPlaying) return;

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const r = Math.min(canvas.width, canvas.height) * 0.25;

            // 回転する円のベース
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(102, 126, 234, 0.3)';
            ctx.lineWidth = 3;
            ctx.stroke();

            // マーカー（上部）
            const markerAngle = -Math.PI / 2;
            const markerSize = 0.2;

            ctx.beginPath();
            ctx.arc(
                cx + r * Math.cos(markerAngle),
                cy + r * Math.sin(markerAngle),
                r * markerSize,
                0, Math.PI * 2
            );
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(
                cx + r * Math.cos(markerAngle),
                cy + r * Math.sin(markerAngle),
                r * markerSize * 0.6,
                0, Math.PI * 2
            );
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.fill();

            // 回転するターゲット
            const targetAngle = (rotation * Math.PI / 180) - Math.PI / 2;
            const targetX = cx + r * Math.cos(targetAngle);
            const targetY = cy + r * Math.sin(targetAngle);

            // ターゲットのグロー
            const glowGradient = ctx.createRadialGradient(targetX, targetY, 0, targetX, targetY, r * 0.15);
            glowGradient.addColorStop(0, 'rgba(118, 75, 162, 0.6)');
            glowGradient.addColorStop(1, 'rgba(118, 75, 162, 0)');
            ctx.fillStyle = glowGradient;
            ctx.fillRect(targetX - r * 0.15, targetY - r * 0.15, r * 0.3, r * 0.3);

            // ターゲット
            ctx.beginPath();
            ctx.arc(targetX, targetY, r * 0.1, 0, Math.PI * 2);
            ctx.fillStyle = '#764ba2';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(targetX, targetY, r * 0.06, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();

            // 中央の装飾
            ctx.beginPath();
            ctx.arc(cx, cy, r * 0.15, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(102, 126, 234, 0.3)';
            ctx.fill();

            // 回転を更新
            rotation = (rotation + rotationSpeed) % 360;

            animationId = requestAnimationFrame(draw);
        }

        function checkTiming() {
            const targetRotation = rotation % 360;
            const markerRotation = 0;

            let diff = Math.abs(targetRotation - markerRotation);
            if (diff > 180) diff = 360 - diff;

            if (diff < 5) {
                showMessage('PERFECT!', 'perfect');
                score += 100 * level;
                playSound('perfect');
            } else if (diff < 15) {
                showMessage('GOOD!', 'good');
                score += 50 * level;
                playSound('good');
            } else {
                showMessage('MISS...', 'miss');
                lives--;
                playSound('miss');
            }

            updateStats();

            if (lives <= 0) {
                gameOver();
            } else {
                // レベルアップ
                if (score >= level * 500) {
                    level++;
                    rotationSpeed += 0.5;
                    updateStats();
                }
            }
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message show ' + type;

            setTimeout(() => {
                msg.className = 'message';
            }, 500);
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('best').textContent = bestScore;
            document.getElementById('level').textContent = level;
        }

        function playSound(type) {
            // Web Audio API for simple sounds
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'perfect') {
                oscillator.frequency.value = 880;
                oscillator.type = 'sine';
            } else if (type === 'good') {
                oscillator.frequency.value = 660;
                oscillator.type = 'sine';
            } else {
                oscillator.frequency.value = 220;
                oscillator.type = 'sawtooth';
            }

            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        function startGame() {
            score = 0;
            level = 1;
            lives = 3;
            rotation = 0;
            rotationSpeed = 2;
            isPlaying = true;

            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');

            updateStats();
            draw();
        }

        function gameOver() {
            isPlaying = false;
            cancelAnimationFrame(animationId);

            if (score > bestScore) {
                bestScore = score;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
            updateStats();
        }

        // イベントリスナー
        canvas.addEventListener('click', () => {
            if (isPlaying) {
                checkTiming();
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (isPlaying) {
                checkTiming();
            }
        });

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        // 全画面ボタン
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        });

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && isPlaying) {
                e.preventDefault();
                checkTiming();
            }
        });

        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
