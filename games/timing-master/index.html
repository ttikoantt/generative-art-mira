<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timing Master</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation;
        }
        .game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .score-display {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
            z-index: 100;
        }
        .combo-display {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #FFD700;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }
        .combo-display.active {
            opacity: 1;
        }
        .game-area {
            position: relative;
            width: 300px;
            height: 300px;
        }
        .circle-track {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 8px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .target-zone {
            position: absolute;
            width: 60px;
            height: 60px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0,255,136,0.5);
        }
        .rotating-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .player-dot {
            position: absolute;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(255,107,107,0.6);
            top: 0;
            left: 50%;
            transform: translateX(-50%);
        }
        .feedback {
            position: fixed;
            font-size: 72px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 30px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 200;
            animation: feedbackAnim 0.5s ease-out forwards;
        }
        @keyframes feedbackAnim {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }
        .fullscreen-btn:active {
            transform: scale(0.95);
        }
        .start-screen {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 300;
        }
        .start-screen h1 {
            color: white;
            font-size: 56px;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(102,126,234,0.8);
        }
        .start-screen p {
            color: rgba(255,255,255,0.8);
            font-size: 24px;
            margin-bottom: 40px;
        }
        .start-btn {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            border: none;
            color: white;
            padding: 20px 60px;
            font-size: 28px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(0,255,136,0.4);
            transition: all 0.3s ease;
        }
        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 50px rgba(0,255,136,0.5);
        }
        .start-btn:active {
            transform: translateY(0);
        }
        .instructions {
            color: rgba(255,255,255,0.6);
            font-size: 16px;
            margin-top: 40px;
            text-align: center;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <div class="score-display" id="scoreDisplay">0</div>
        <div class="combo-display" id="comboDisplay">COMBO x0</div>

        <div class="game-area" id="gameArea">
            <div class="circle-track"></div>
            <div class="target-zone" id="targetZone"></div>
            <div class="rotating-circle" id="rotatingCircle">
                <div class="player-dot" id="playerDot"></div>
            </div>
        </div>

        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

        <div class="start-screen" id="startScreen">
            <h1>🎯 Timing Master</h1>
            <p>タイミングを合わせてタップ！</p>
            <button class="start-btn" onclick="startGame()">スタート</button>
            <div class="instructions">
                回転する赤い円が<br>
                緑色のターゲットエリアに来たら<br>
                タップまたはクリック！<br><br>
                完璧なタイミングで高得点を目指せ！
            </div>
        </div>
    </div>

    <script>
        let score = 0;
        let combo = 0;
        let rotation = 0;
        let baseSpeed = 2;
        let currentSpeed = baseSpeed;
        let gameStarted = false;
        let animationId = null;

        const rotatingCircle = document.getElementById('rotatingCircle');
        const playerDot = document.getElementById('playerDot');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const comboDisplay = document.getElementById('comboDisplay');
        const startScreen = document.getElementById('startScreen');
        const gameContainer = document.getElementById('gameContainer');

        function startGame() {
            gameStarted = true;
            score = 0;
            combo = 0;
            currentSpeed = baseSpeed;
            rotation = 0;
            updateScore();
            startScreen.style.display = 'none';
            animate();
        }

        function animate() {
            if (!gameStarted) return;

            rotation += currentSpeed;
            rotatingCircle.style.transform = `translate(-50%, -50%) rotate(${rotation}deg)`;

            animationId = requestAnimationFrame(animate);
        }

        function checkTiming() {
            if (!gameStarted) return;

            // Calculate angle difference (0-360)
            let normalizedRotation = rotation % 360;
            if (normalizedRotation < 0) normalizedRotation += 360;

            // Target is at 270 degrees (top of circle, which is -90 or 270)
            const targetAngle = 270;
            let angleDiff = Math.abs(normalizedRotation - targetAngle);
            if (angleDiff > 180) angleDiff = 360 - angleDiff;

            // Convert to degrees for easier threshold
            const angleThreshold = 15; // degrees

            let points = 0;
            let feedback = '';
            let feedbackColor = '';

            if (angleDiff <= 3) {
                // Perfect!
                points = 100;
                feedback = 'PERFECT!';
                feedbackColor = '#FFD700';
                combo++;
            } else if (angleDiff <= angleThreshold) {
                // Good
                points = 50;
                feedback = 'GOOD!';
                feedbackColor = '#00ff88';
                combo++;
            } else {
                // Miss
                points = 0;
                feedback = 'MISS!';
                feedbackColor = '#ff6b6b';
                combo = 0;
            }

            // Update score
            score += points + (combo > 0 ? combo * 10 : 0);
            updateScore();

            // Show feedback
            showFeedback(feedback, feedbackColor);

            // Increase speed gradually
            if (combo > 0 && combo % 5 === 0) {
                currentSpeed = Math.min(currentSpeed + 0.2, 8);
            }
        }

        function updateScore() {
            scoreDisplay.textContent = score;
            if (combo > 1) {
                comboDisplay.textContent = `COMBO x${combo}`;
                comboDisplay.classList.add('active');
            } else {
                comboDisplay.classList.remove('active');
            }
        }

        function showFeedback(text, color) {
            const feedback = document.createElement('div');
            feedback.className = 'feedback';
            feedback.textContent = text;
            feedback.style.color = color;
            feedback.style.left = '50%';
            feedback.style.top = '50%';
            feedback.style.transform = 'translate(-50%, -50%)';
            gameContainer.appendChild(feedback);

            setTimeout(() => {
                feedback.remove();
            }, 500);
        }

        // Event listeners
        gameContainer.addEventListener('click', checkTiming);
        gameContainer.addEventListener('touchstart', (e) => {
            e.preventDefault();
            checkTiming();
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && gameStarted) {
                e.preventDefault();
                checkTiming();
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
