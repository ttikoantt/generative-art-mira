<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timing Master</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #score {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            z-index: 100;
        }
        #combo {
            position: fixed;
            top: 20px;
            right: 20px;
            color: #ffd700;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            z-index: 100;
        }
        #gameCanvas {
            touch-action: manipulation;
        }
        #startScreen, #gameOverScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            color: white;
        }
        #startScreen.hidden, #gameOverScreen.hidden {
            display: none;
        }
        .title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
            text-align: center;
            padding: 0 20px;
        }
        .startBtn {
            padding: 20px 60px;
            font-size: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .startBtn:hover, .startBtn:active {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }
        .finalScore {
            font-size: 72px;
            font-weight: bold;
            margin: 20px 0;
            color: #ffd700;
        }
        .maxCombo {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
        }
        #fullscreenBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            cursor: pointer;
            z-index: 50;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        #fullscreenBtn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .rating {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            pointer-events: none;
            z-index: 150;
            animation: ratingPop 0.5s ease-out forwards;
        }
        @keyframes ratingPop {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1) translateY(-50px);
            }
        }
        .perfect { color: #ffd700; text-shadow: 0 0 20px #ffd700; }
        .great { color: #00ff88; text-shadow: 0 0 20px #00ff88; }
        .good { color: #00aaff; text-shadow: 0 0 20px #00aaff; }
        .miss { color: #ff4444; text-shadow: 0 0 20px #ff4444; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="score">Score: 0</div>
        <div id="combo"></div>
        <canvas id="gameCanvas"></canvas>
        <button id="fullscreenBtn">⛶ 全画面</button>
    </div>

    <div id="startScreen">
        <div class="title">🎯 Timing Master</div>
        <div class="subtitle">
            サークルが中央の円に重なった瞬間にタップ！<br>
            完璧なタイミングを目指せ！
        </div>
        <button class="startBtn" id="startBtn">スタート</button>
    </div>

    <div id="gameOverScreen" class="hidden">
        <div class="title">ゲームオーバー</div>
        <div class="finalScore" id="finalScore">0</div>
        <div class="maxCombo" id="maxCombo">最大コンボ: 0</div>
        <button class="startBtn" id="restartBtn">もう一度</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const scoreEl = document.getElementById('score');
        const comboEl = document.getElementById('combo');
        const finalScoreEl = document.getElementById('finalScore');
        const maxComboEl = document.getElementById('maxCombo');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let score = 0;
        let combo = 0;
        let maxComboCount = 0;
        let lives = 3;
        let gameRunning = false;
        let circles = [];
        let lastSpawnTime = 0;
        let spawnInterval = 1500;
        let baseSpeed = 2;
        let gameStartTime = 0;

        const TARGET_RADIUS = 60;
        const CIRCLE_RADIUS = 40;
        const PERFECT_WINDOW = 15;
        const GREAT_WINDOW = 30;
        const GOOD_WINDOW = 50;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        class TargetCircle {
            constructor() {
                this.angle = Math.random() * Math.PI * 2;
                this.distance = Math.min(canvas.width, canvas.height) * 0.35;
                this.speed = baseSpeed + Math.random() * 0.5;
                this.active = true;
                this.clicked = false;
                this.hue = Math.random() * 360;
            }

            update() {
                this.distance -= this.speed;
                if (this.distance < TARGET_RADIUS - CIRCLE_RADIUS) {
                    this.active = false;
                    if (!this.clicked) {
                        handleMiss();
                    }
                }
            }

            draw() {
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;

                const x = centerX + Math.cos(this.angle) * this.distance;
                const y = centerY + Math.sin(this.angle) * this.distance;

                // Draw outer glow
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, CIRCLE_RADIUS * 1.5);
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 60%, 0.3)`);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(x, y, CIRCLE_RADIUS * 1.5, 0, Math.PI * 2);
                ctx.fill();

                // Draw circle
                ctx.beginPath();
                ctx.arc(x, y, CIRCLE_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${this.hue}, 80%, 60%)`;
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 3;
                ctx.stroke();

                // Draw inner ring
                ctx.beginPath();
                ctx.arc(x, y, CIRCLE_RADIUS * 0.6, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            checkClick(x, y) {
                if (!this.active || this.clicked) return null;

                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;

                const circleX = centerX + Math.cos(this.angle) * this.distance;
                const circleY = centerY + Math.sin(this.angle) * this.distance;

                const dist = Math.sqrt((x - circleX) ** 2 + (y - circleY) ** 2);

                if (dist <= CIRCLE_RADIUS * 1.2) {
                    const targetDist = Math.abs(this.distance - TARGET_RADIUS);

                    this.clicked = true;
                    this.active = false;

                    if (targetDist <= PERFECT_WINDOW) {
                        return 'PERFECT';
                    } else if (targetDist <= GREAT_WINDOW) {
                        return 'GREAT';
                    } else if (targetDist <= GOOD_WINDOW) {
                        return 'GOOD';
                    } else {
                        return 'MISS';
                    }
                }
                return null;
            }
        }

        function spawnCircle() {
            circles.push(new TargetCircle());
        }

        function handleRating(rating) {
            showRating(rating);

            switch (rating) {
                case 'PERFECT':
                    score += 100 * (1 + combo * 0.1);
                    combo++;
                    break;
                case 'GREAT':
                    score += 75 * (1 + combo * 0.1);
                    combo++;
                    break;
                case 'GOOD':
                    score += 50 * (1 + combo * 0.1);
                    combo++;
                    break;
                case 'MISS':
                    handleMiss();
                    break;
            }

            maxComboCount = Math.max(maxComboCount, combo);
            updateUI();
        }

        function handleMiss() {
            combo = 0;
            lives--;
            updateUI();

            if (lives <= 0) {
                gameOver();
            }
        }

        function showRating(rating) {
            const ratingEl = document.createElement('div');
            ratingEl.className = `rating ${rating.toLowerCase()}`;
            ratingEl.textContent = rating;
            document.body.appendChild(ratingEl);

            setTimeout(() => {
                ratingEl.remove();
            }, 500);
        }

        function updateUI() {
            scoreEl.textContent = `Score: ${Math.floor(score)}`;
            if (combo > 1) {
                comboEl.textContent = `${combo} Combo!`;
            } else {
                comboEl.textContent = '';
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // Draw target circle
            ctx.beginPath();
            ctx.arc(centerX, centerY, TARGET_RADIUS, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 4;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(centerX, centerY, TARGET_RADIUS * 0.8, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Draw center dot
            ctx.beginPath();
            ctx.arc(centerX, centerY, 8, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.fill();

            // Draw circles
            circles.forEach(circle => circle.draw());

            // Draw lives
            for (let i = 0; i < lives; i++) {
                ctx.beginPath();
                ctx.arc(20 + i * 30, 60, 10, 0, Math.PI * 2);
                ctx.fillStyle = '#ff4444';
                ctx.fill();
            }
        }

        function gameLoop(timestamp) {
            if (!gameRunning) return;

            // Spawn circles
            if (timestamp - lastSpawnTime > spawnInterval) {
                spawnCircle();
                lastSpawnTime = timestamp;

                // Increase difficulty
                if (spawnInterval > 800) {
                    spawnInterval -= 10;
                }
                baseSpeed += 0.02;
            }

            // Update circles
            circles.forEach(circle => circle.update());
            circles = circles.filter(circle => circle.active);

            // Draw
            draw();

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            score = 0;
            combo = 0;
            maxComboCount = 0;
            lives = 3;
            circles = [];
            spawnInterval = 1500;
            baseSpeed = 2;
            lastSpawnTime = 0;
            gameRunning = true;
            gameStartTime = Date.now();

            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            updateUI();

            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false;
            finalScoreEl.textContent = Math.floor(score);
            maxComboEl.textContent = `最大コンボ: ${maxComboCount}`;
            gameOverScreen.classList.remove('hidden');
        }

        // Event listeners
        function handleInput(e) {
            if (!gameRunning) return;

            const rect = canvas.getBoundingClientRect();
            let x, y;

            if (e.type === 'touchstart') {
                x = e.touches[0].clientX - rect.left;
                y = e.touches[0].clientY - rect.top;
            } else {
                x = e.clientX - rect.left;
                y = e.clientY - rect.top;
            }

            for (let circle of circles) {
                const rating = circle.checkClick(x, y);
                if (rating) {
                    handleRating(rating);
                    break;
                }
            }
        }

        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInput(e);
        }, { passive: false });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // Fullscreen
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fullscreenBtn.textContent = '✕ 全画面解除';
            } else {
                fullscreenBtn.textContent = '⛶ 全画面';
            }
        });

        // Initial draw
        draw();
    </script>
</body>
</html>
