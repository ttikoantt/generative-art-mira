<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Timing Master</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 500px;
            width: 100%;
        }

        .title {
            font-size: 28px;
            color: white;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .score-board {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .score {
            font-size: 48px;
            color: white;
            font-weight: bold;
            margin: 10px 0;
        }

        .combo {
            font-size: 20px;
            color: #ffd700;
            font-weight: bold;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .tap-area {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px 60px;
            margin: 20px 0;
            border: 3px solid rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.1s;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .tap-area:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.3);
        }

        .tap-text {
            font-size: 24px;
            color: white;
            font-weight: bold;
        }

        .feedback {
            height: 60px;
            margin: 10px 0;
        }

        .feedback-text {
            font-size: 32px;
            font-weight: bold;
            animation: pop 0.3s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .perfect { color: #ffd700; }
        .good { color: #00ff88; }
        .miss { color: #ff4444; }

        .progress-bar {
            background: rgba(255, 255, 255, 0.3);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            height: 100%;
            transition: width 0.1s linear;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .game-over {
            display: none;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .game-over-content {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .game-over-title {
            font-size: 32px;
            color: white;
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 64px;
            color: #ffd700;
            font-weight: bold;
            margin: 20px 0;
        }

        .restart-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .stats {
            color: rgba(255, 255, 255, 0.8);
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">🔳 全画面</button>

    <div class="container">
        <div class="title">⏱️ Timing Master</div>

        <div class="score-board">
            <div class="score" id="score">0</div>
            <div class="combo" id="combo"></div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress"></div>
            </div>
        </div>

        <div class="tap-area" id="tapArea">
            <div class="tap-text" id="tapText">TAP!</div>
        </div>

        <div class="feedback">
            <div class="feedback-text" id="feedback"></div>
        </div>

        <div class="stats">
            <div>Perfect: <span id="perfectCount">0</span></div>
            <div>Good: <span id="goodCount">0</span></div>
            <div>Miss: <span id="missCount">0</span></div>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <div class="game-over-content">
            <div class="game-over-title">🎮 Game Over!</div>
            <div class="final-score" id="finalScore">0</div>
            <div style="color: white; margin: 10px 0;">
                Max Combo: <span id="maxCombo">0</span>
            </div>
            <div style="color: rgba(255,255,255,0.8); font-size: 14px; margin: 20px 0;">
                Perfect: <span id="finalPerfect">0</span> |
                Good: <span id="finalGood">0</span> |
                Miss: <span id="finalMiss">0</span>
            </div>
            <button class="restart-btn" onclick="restart()">再挑戦</button>
        </div>
    </div>

    <script>
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let perfectCount = 0;
        let goodCount = 0;
        let missCount = 0;

        let targetTime = 0;
        let gameActive = false;
        let speed = 1000;
        let lives = 3;

        const scoreEl = document.getElementById('score');
        const comboEl = document.getElementById('combo');
        const feedbackEl = document.getElementById('feedback');
        const progressEl = document.getElementById('progress');
        const tapArea = document.getElementById('tapArea');
        const tapText = document.getElementById('tapText');
        const gameOverEl = document.getElementById('gameOver');

        function startGame() {
            gameActive = true;
            score = 0;
            combo = 0;
            maxCombo = 0;
            perfectCount = 0;
            goodCount = 0;
            missCount = 0;
            speed = 1000;
            lives = 3;

            updateUI();
            nextRound();
        }

        function nextRound() {
            if (!gameActive) return;

            targetTime = Date.now() + speed;
            speed = Math.max(400, speed - 20);

            tapText.textContent = '...';
            tapArea.style.borderColor = 'rgba(255, 255, 255, 0.4)';

            setTimeout(() => {
                if (!gameActive) return;
                tapText.textContent = 'NOW!';
                tapArea.style.borderColor = '#ffd700';
            }, speed - 300);
        }

        function handleTap() {
            if (!gameActive) {
                startGame();
                return;
            }

            const now = Date.now();
            const diff = Math.abs(now - targetTime);

            let feedback = '';
            let feedbackClass = '';

            if (diff < 100) {
                perfectCount++;
                combo++;
                score += 100 + (combo * 10);
                feedback = 'PERFECT! ✨';
                feedbackClass = 'perfect';
                tapArea.style.background = 'rgba(255, 215, 0, 0.3)';
            } else if (diff < 200) {
                goodCount++;
                combo++;
                score += 50 + (combo * 5);
                feedback = 'GOOD! 👍';
                feedbackClass = 'good';
                tapArea.style.background = 'rgba(0, 255, 136, 0.3)';
            } else {
                missCount++;
                combo = 0;
                lives--;
                feedback = 'MISS... 💔';
                feedbackClass = 'miss';
                tapArea.style.background = 'rgba(255, 68, 68, 0.3)';

                if (lives <= 0) {
                    endGame();
                    return;
                }
            }

            maxCombo = Math.max(maxCombo, combo);
            showFeedback(feedback, feedbackClass);
            updateUI();

            setTimeout(() => {
                tapArea.style.background = 'rgba(255, 255, 255, 0.2)';
            }, 200);

            setTimeout(nextRound, 500);
        }

        function showFeedback(text, className) {
            feedbackEl.textContent = text;
            feedbackEl.className = 'feedback-text ' + className;

            setTimeout(() => {
                feedbackEl.className = 'feedback-text';
            }, 300);
        }

        function updateUI() {
            scoreEl.textContent = score;
            comboEl.textContent = combo > 1 ? `🔥 ${combo} Combo!` : '';
            document.getElementById('perfectCount').textContent = perfectCount;
            document.getElementById('goodCount').textContent = goodCount;
            document.getElementById('missCount').textContent = missCount;

            const progress = ((speed - 400) / 600) * 100;
            progressEl.style.width = progress + '%';
        }

        function endGame() {
            gameActive = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('maxCombo').textContent = maxCombo;
            document.getElementById('finalPerfect').textContent = perfectCount;
            document.getElementById('finalGood').textContent = goodCount;
            document.getElementById('finalMiss').textContent = missCount;
            gameOverEl.style.display = 'flex';
        }

        function restart() {
            gameOverEl.style.display = 'none';
            startGame();
        }

        tapArea.addEventListener('click', handleTap);
        tapArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleTap();
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Start game after a short delay
        setTimeout(startGame, 500);
    </script>
</body>
</html>
