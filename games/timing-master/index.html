<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Timing Master - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 2em;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .score-display {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .score-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .score-label {
            color: #888;
            font-size: 0.8em;
            margin-bottom: 5px;
        }

        .score-value {
            color: #fff;
            font-size: 1.8em;
            font-weight: bold;
        }

        #gameCanvas {
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.3);
            max-width: 100%;
            touch-action: none;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            min-width: 150px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .info {
            color: #aaa;
            margin-top: 15px;
            font-size: 0.9em;
        }

        .feedback {
            position: absolute;
            font-size: 2em;
            font-weight: bold;
            pointer-events: none;
            animation: feedback 0.5s ease-out forwards;
        }

        @keyframes feedback {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px) scale(1.5);
            }
        }

        .perfect { color: #ffd700; text-shadow: 0 0 20px #ffd700; }
        .great { color: #00ff88; text-shadow: 0 0 20px #00ff88; }
        .good { color: #00aaff; text-shadow: 0 0 20px #00aaff; }
        .miss { color: #ff4444; text-shadow: 0 0 20px #ff4444; }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5em;
            }

            .score-display {
                gap: 15px;
            }

            .score-item {
                padding: 10px 15px;
            }

            .score-value {
                font-size: 1.3em;
            }

            button {
                width: 100%;
                max-width: 250px;
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎯 Timing Master</h1>

        <div class="score-display">
            <div class="score-item">
                <div class="score-label">スコア</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">コンボ</div>
                <div class="score-value" id="combo">0</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="controls">
            <button id="tapBtn">🎯 TAP!</button>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">📺 全画面</button>
        </div>

        <p class="info">✨ ターゲットエリアでタイミングよくタップ！</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const tapBtn = document.getElementById('tapBtn');

        let score = 0;
        let combo = 0;
        let needleAngle = 0;
        let needleSpeed = 0.03;
        let targetStart = 0;
        let targetSize = Math.PI / 6;
        let isPlaying = true;
        let lastFeedback = null;

        const colors = {
            perfect: '#ffd700',
            great: '#00ff88',
            good: '#00aaff',
            miss: '#ff4444'
        };

        function resizeCanvas() {
            const container = document.querySelector('.game-container');
            const maxWidth = Math.min(400, container.clientWidth - 40);
            canvas.width = maxWidth;
            canvas.height = maxWidth;
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = Math.min(canvas.width, canvas.height) * 0.35;

            // Draw target zone
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, targetStart, targetStart + targetSize);
            ctx.lineWidth = 30;
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.3)';
            ctx.stroke();

            // Draw target zone highlight
            const gradient = ctx.createRadialGradient(centerX, centerY, radius - 20, centerX, centerY, radius + 20);
            gradient.addColorStop(0, 'rgba(0, 255, 136, 0)');
            gradient.addColorStop(0.5, 'rgba(0, 255, 136, 0.5)');
            gradient.addColorStop(1, 'rgba(0, 255, 136, 0)');

            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, targetStart, targetStart + targetSize);
            ctx.lineWidth = 25;
            ctx.strokeStyle = gradient;
            ctx.stroke();

            // Draw circle track
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.lineWidth = 2;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.stroke();

            // Draw needle
            const needleX = centerX + Math.cos(needleAngle) * radius;
            const needleY = centerY + Math.sin(needleAngle) * radius;

            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(needleX, needleY);
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#fff';
            ctx.stroke();

            // Needle glow
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(needleX, needleY);
            ctx.lineWidth = 8;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.stroke();

            // Center point
            ctx.beginPath();
            ctx.arc(centerX, centerY, 10, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();

            // Needle tip
            ctx.beginPath();
            ctx.arc(needleX, needleY, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#667eea';
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Combo display
            if (combo > 1) {
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(`${combo} COMBO!`, centerX, 30);
            }
        }

        function update() {
            if (!isPlaying) return;

            needleAngle += needleSpeed;

            // Increase speed gradually
            if (needleSpeed < 0.08) {
                needleSpeed += 0.00005;
            }

            // Move target zone occasionally
            if (Math.random() < 0.002) {
                targetStart = Math.random() * Math.PI * 2;
            }

            draw();
            requestAnimationFrame(update);
        }

        function checkTiming() {
            if (!isPlaying) return;

            let distance = Math.abs(needleAngle - (targetStart + targetSize / 2));

            // Handle wrap-around
            if (distance > Math.PI) {
                distance = Math.PI * 2 - distance;
            }

            if (distance < targetSize / 6) {
                showFeedback('PERFECT!', 'perfect');
                score += 100 * (1 + combo * 0.1);
                combo++;
            } else if (distance < targetSize / 4) {
                showFeedback('GREAT!', 'great');
                score += 50 * (1 + combo * 0.1);
                combo++;
            } else if (distance < targetSize / 2) {
                showFeedback('GOOD', 'good');
                score += 20;
                combo = 0;
            } else {
                showFeedback('MISS', 'miss');
                combo = 0;
            }

            document.getElementById('score').textContent = Math.floor(score);
            document.getElementById('combo').textContent = combo;
        }

        function showFeedback(text, type) {
            const feedback = document.createElement('div');
            feedback.className = `feedback ${type}`;
            feedback.textContent = text;

            const canvas = document.getElementById('gameCanvas');
            const rect = canvas.getBoundingClientRect();
            feedback.style.left = rect.left + rect.width / 2 + 'px';
            feedback.style.top = rect.top + rect.height / 2 + 'px';
            feedback.style.transform = 'translateX(-50%)';

            document.body.appendChild(feedback);

            setTimeout(() => {
                feedback.remove();
            }, 500);
        }

        function resetGame() {
            score = 0;
            combo = 0;
            needleAngle = 0;
            needleSpeed = 0.03;
            isPlaying = true;

            document.getElementById('score').textContent = '0';
            document.getElementById('combo').textContent = '0';
        }

        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        }

        // Event listeners
        tapBtn.addEventListener('click', checkTiming);
        canvas.addEventListener('click', checkTiming);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            checkTiming();
        });

        // Initialize
        resizeCanvas();
        update();
        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
