<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match - 記憶ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        h1 {
            color: white;
            margin-bottom: 10px;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            color: white;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 400px;
            width: 100%;
        }

        .card {
            aspect-ratio: 1;
            background: linear-gradient(145deg, #ffffff 0%, #f0f0f0 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: relative;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .card.flipped {
            background: linear-gradient(145deg, #ffd700 0%, #ffb700 100%);
            transform: rotateY(180deg);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .card.matched {
            background: linear-gradient(145deg, #4ade80 0%, #22c55e 100%);
            transform: rotateY(180deg);
            opacity: 0.6;
            pointer-events: none;
        }

        .card-content {
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            backface-visibility: hidden;
            background: linear-gradient(145deg, #8b5cf6 0%, #7c3aed 100%);
            border-radius: 15px;
            color: white;
        }

        .card-front {
            transform: rotateY(180deg);
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: rgba(255, 255, 255, 0.9);
            color: #667eea;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        button:active {
            transform: translateY(0);
        }

        .win-message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 30px 50px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .win-message.show {
            display: block;
            animation: popIn 0.5s ease;
        }

        @keyframes popIn {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .win-message h2 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .win-message p {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }

            .stats {
                font-size: 1rem;
            }

            .game-board {
                gap: 8px;
            }

            .card {
                font-size: 2rem;
            }

            .card-back {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 380px) {
            .game-board {
                gap: 5px;
            }

            .card {
                font-size: 1.5rem;
                border-radius: 10px;
            }

            .card-back {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <h1>🧠 Memory Match</h1>

    <div class="stats">
        <div class="stat">手数: <span id="moves">0</span></div>
        <div class="stat">ペア: <span id="pairs">0</span>/8</div>
        <div class="stat">時間: <span id="timer">00:00</span></div>
    </div>

    <div class="game-board" id="board"></div>

    <div class="buttons">
        <button onclick="restartGame()">🔄 最初から</button>
        <button onclick="toggleFullscreen()">全画面</button>
    </div>

    <div class="win-message" id="winMessage">
        <h2>🎉 クリア！</h2>
        <p id="winStats"></p>
        <button onclick="restartGame()">もう一度遊ぶ</button>
    </div>

    <script>
        const emojis = ['🎮', '🎨', '🎭', '🎪', '🎯', '🎲', '🎸', '🎹'];
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let gameStarted = false;
        let timerInterval;
        let seconds = 0;

        function shuffle(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function createBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';

            cards = shuffle([...emojis, ...emojis]);
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            gameStarted = false;
            seconds = 0;

            document.getElementById('moves').textContent = moves;
            document.getElementById('pairs').textContent = matchedPairs;
            document.getElementById('timer').textContent = '00:00';
            document.getElementById('winMessage').classList.remove('show');

            clearInterval(timerInterval);

            cards.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;
                card.dataset.emoji = emoji;

                card.innerHTML = `
                    <div class="card-back">❓</div>
                    <div class="card-content card-front">${emoji}</div>
                `;

                card.addEventListener('click', () => flipCard(card));
                board.appendChild(card);
            });
        }

        function flipCard(card) {
            if (flippedCards.length >= 2) return;
            if (card.classList.contains('flipped')) return;
            if (card.classList.contains('matched')) return;

            if (!gameStarted) {
                gameStarted = true;
                startTimer();
            }

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;

                checkMatch();
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            const match = card1.dataset.emoji === card2.dataset.emoji;

            if (match) {
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    flippedCards = [];
                    matchedPairs++;
                    document.getElementById('pairs').textContent = matchedPairs;

                    if (matchedPairs === 8) {
                        endGame();
                    }
                }, 500);
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                }, 1000);
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('timer').textContent = `${mins}:${secs}`;
            }, 1000);
        }

        function endGame() {
            clearInterval(timerInterval);
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            const timeText = mins > 0 ? `${mins}分${secs}秒` : `${secs}秒`;

            document.getElementById('winStats').textContent =
                `${moves}手でクリア！${timeText}かかりました`;
            document.getElementById('winMessage').classList.add('show');
        }

        function restartGame() {
            createBoard();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        createBoard();
    </script>
</body>
</html>
