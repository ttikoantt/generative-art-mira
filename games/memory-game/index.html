<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 10px;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .stat {
            text-align: center;
            color: #fff;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .card {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: relative;
            transform-style: preserve-3d;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched {
            opacity: 0;
            transform: scale(0);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }

        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transform: rotateY(180deg);
        }

        .card-back {
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
        }

        .card:hover:not(.flipped):not(.matched) {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.2);
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            background: #fff;
            color: #667eea;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .message {
            text-align: center;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            color: #fff;
            font-size: 1.2rem;
            backdrop-filter: blur(10px);
            display: none;
        }

        .message.show {
            display: block;
            animation: popIn 0.3s;
        }

        @keyframes popIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .difficulty {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .difficulty-btn {
            padding: 8px 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: transparent;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }

        .difficulty-btn:hover {
            border-color: rgba(255, 255, 255, 0.6);
        }

        .difficulty-btn.active {
            background: rgba(255, 255, 255, 0.2);
            border-color: #fff;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #fff;
            border: none;
            color: #667eea;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            transform: scale(1.1);
        }

        @media (max-width: 480px) {
            .game-board {
                gap: 8px;
            }

            .card {
                font-size: 2rem;
            }

            h1 {
                font-size: 1.5rem;
            }
        }

        .score-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            color: #667eea;
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 3rem;
            font-weight: bold;
            z-index: 1000;
            animation: scorePop 0.5s;
            pointer-events: none;
        }

        @keyframes scorePop {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Memory Match</h1>
        <p class="subtitle">同じ絵柄のカードをペアにしよう | by Mira</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="moves">0</div>
                <div class="stat-label">手数</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="matches">0</div>
                <div class="stat-label">ペア</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="time">00:00</div>
                <div class="stat-label">時間</div>
            </div>
        </div>

        <div class="difficulty">
            <button class="difficulty-btn active" data-size="4">イージー (4x4)</button>
            <button class="difficulty-btn" data-size="6">ノーマル (6x6)</button>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="message" id="message"></div>

        <div class="actions">
            <button class="btn btn-primary" id="newGameBtn">新しいゲーム</button>
            <button class="btn btn-secondary" id="hintBtn">ヒント</button>
        </div>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">⛶</button>

    <script>
        const EMOJIS = ['🎨', '🎭', '🎪', '🎢', '🎡', '🎠', '🎪', '🎯', '🎮', '🎲', '🎸', '🎹', '🎺', '🎻', '🎤', '🎧', '🎬', '🎞️', '📷', '📸', '🎥', '📹', '📺', '📻'];

        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let gameSize = 4;
        let timer = null;
        let seconds = 0;
        let canFlip = true;

        const gameBoard = document.getElementById('gameBoard');
        const movesEl = document.getElementById('moves');
        const matchesEl = document.getElementById('matches');
        const timeEl = document.getElementById('time');
        const messageEl = document.getElementById('message');
        const newGameBtn = document.getElementById('newGameBtn');
        const hintBtn = document.getElementById('hintBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        // Initialize game
        function initGame() {
            const numPairs = (gameSize * gameSize) / 2;
            const selectedEmojis = EMOJIS.slice(0, numPairs);
            const cardPairs = [...selectedEmojis, ...selectedEmojis];

            // Shuffle
            for (let i = cardPairs.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cardPairs[i], cardPairs[j]] = [cardPairs[j], cardPairs[i]];
            }

            cards = cardPairs;
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            seconds = 0;
            canFlip = true;

            clearInterval(timer);
            timer = setInterval(updateTimer, 1000);

            renderBoard();
            updateStats();
            messageEl.classList.remove('show');
        }

        // Render board
        function renderBoard() {
            gameBoard.innerHTML = '';
            gameBoard.style.gridTemplateColumns = `repeat(${gameSize}, 1fr)`;

            cards.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;
                card.innerHTML = `
                    <div class="card-face card-back">?</div>
                    <div class="card-face card-front">${emoji}</div>
                `;
                card.addEventListener('click', () => flipCard(card, index));
                gameBoard.appendChild(card);
            });
        }

        // Flip card
        function flipCard(card, index) {
            if (!canFlip) return;
            if (flippedCards.length >= 2) return;
            if (flippedCards.includes(index)) return;
            if (card.classList.contains('matched')) return;

            card.classList.add('flipped');
            flippedCards.push(index);

            if (flippedCards.length === 2) {
                moves++;
                updateStats();
                checkMatch();
            }
        }

        // Check match
        function checkMatch() {
            canFlip = false;
            const [index1, index2] = flippedCards;
            const card1 = gameBoard.children[index1];
            const card2 = gameBoard.children[index2];

            if (cards[index1] === cards[index2]) {
                // Match!
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    matchedPairs++;
                    updateStats();
                    showScorePopup('+100', card1);
                    flippedCards = [];
                    canFlip = true;

                    const totalPairs = (gameSize * gameSize) / 2;
                    if (matchedPairs === totalPairs) {
                        endGame();
                    }
                }, 500);
            } else {
                // No match
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    canFlip = true;
                }, 1000);
            }
        }

        // Update stats
        function updateStats() {
            movesEl.textContent = moves;
            matchesEl.textContent = matchedPairs;
        }

        // Update timer
        function updateTimer() {
            seconds++;
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            timeEl.textContent = `${mins}:${secs}`;
        }

        // End game
        function endGame() {
            clearInterval(timer);
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');

            messageEl.innerHTML = `
                🎉 おめでとう！<br>
                手数: ${moves} | 時間: ${mins}:${secs}
            `;
            messageEl.classList.add('show');
        }

        // Show score popup
        function showScorePopup(text, element) {
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.textContent = text;
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 500);
        }

        // Hint
        hintBtn.addEventListener('click', () => {
            if (flippedCards.length > 0 || !canFlip) return;

            const unmatchedCards = [];
            cards.forEach((emoji, index) => {
                const card = gameBoard.children[index];
                if (!card.classList.contains('matched')) {
                    unmatchedCards.push(index);
                }
            });

            // Find a pair
            for (let i = 0; i < unmatchedCards.length; i++) {
                for (let j = i + 1; j < unmatchedCards.length; j++) {
                    if (cards[unmatchedCards[i]] === cards[unmatchedCards[j]]) {
                        const card1 = gameBoard.children[unmatchedCards[i]];
                        const card2 = gameBoard.children[unmatchedCards[j]];
                        card1.style.transform = 'scale(1.1)';
                        card2.style.transform = 'scale(1.1)';
                        setTimeout(() => {
                            card1.style.transform = '';
                            card2.style.transform = '';
                        }, 500);
                        return;
                    }
                }
            }
        });

        // New game
        newGameBtn.addEventListener('click', initGame);

        // Difficulty buttons
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                gameSize = parseInt(btn.dataset.size);
                initGame();
            });
        });

        // Fullscreen
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Start game
        initGame();
    </script>
</body>
</html>
