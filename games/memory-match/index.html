<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match - カードめくりゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
            min-width: 100px;
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 500px;
            width: 100%;
        }

        .card {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .card:hover:not(.flipped):not(.matched) {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .card.flipped {
            background: rgba(255, 255, 255, 0.95);
            transform: rotateY(180deg);
        }

        .card.matched {
            background: rgba(255, 255, 255, 0.3);
            animation: match 0.5s ease;
        }

        @keyframes match {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.95);
            color: #667eea;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            z-index: 1000;
            color: #667eea;
        }

        .fullscreen-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.4);
        }

        .win-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
            z-index: 1001;
            backdrop-filter: blur(5px);
        }

        .win-modal.show {
            display: flex;
        }

        .win-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            max-width: 90%;
            width: 400px;
        }

        .win-content h2 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .win-stats {
            margin: 20px 0;
            font-size: 1.1rem;
            line-height: 1.8;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }

            .game-board {
                gap: 8px;
            }

            .card {
                font-size: 2rem;
                border-radius: 8px;
            }

            .fullscreen-btn {
                bottom: 15px;
                right: 15px;
                width: 45px;
                height: 45px;
            }
        }

        @media (min-width: 768px) {
            .game-board {
                gap: 15px;
                max-width: 600px;
            }

            .card {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎴 Memory Match</h1>
        <p class="subtitle">カードをめくってペアを見つけよう！</p>
    </div>

    <div class="stats">
        <div class="stat">
            <div class="stat-label">移動回数</div>
            <div class="stat-value" id="moves">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">ペア</div>
            <div class="stat-value"><span id="pairs">0</span>/8</div>
        </div>
        <div class="stat">
            <div class="stat-label">タイム</div>
            <div class="stat-value" id="timer">00:00</div>
        </div>
    </div>

    <div class="game-board" id="gameBoard">
        <!-- カードはJavaScriptで生成 -->
    </div>

    <div class="controls">
        <button onclick="newGame()">🔄 新しいゲーム</button>
        <button onclick="shuffleCards()">🔀 シャッフル</button>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()" title="全画面">
        ⛶
    </button>

    <div class="win-modal" id="winModal">
        <div class="win-content">
            <h2>🎉 クリアおめでとう！</h2>
            <div class="win-stats">
                移動回数: <span id="finalMoves">0</span><br>
                タイム: <span id="finalTime">00:00</span>
            </div>
            <button onclick="newGame()">🔄 もう一度遊ぶ</button>
        </div>
    </div>

    <script>
        const emojis = ['🎨', '🎮', '🎵', '🎬', '🎭', '🎪', '🎯', '🎲'];
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let gameStarted = false;
        let timerInterval = null;
        let startTime = 0;
        let canFlip = true;

        // ゲームボード
        const gameBoard = document.getElementById('gameBoard');

        // 新しいゲーム
        function newGame() {
            // リセット
            cards = [];
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            gameStarted = false;
            canFlip = true;

            // タイマー停止
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }

            // モーダルを非表示
            document.getElementById('winModal').classList.remove('show');

            // 統計リセット
            document.getElementById('moves').textContent = '0';
            document.getElementById('pairs').textContent = '0';
            document.getElementById('timer').textContent = '00:00';

            // カードを生成
            const pairs = [...emojis, ...emojis];
            cards = shuffleArray(pairs);

            // ボードをクリア
            gameBoard.innerHTML = '';

            // カードを作成
            cards.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;
                card.addEventListener('click', () => flipCard(card));
                gameBoard.appendChild(card);
            });
        }

        // シャッフル
        function shuffleCards() {
            if (flippedCards.length > 0 || matchedPairs > 0) {
                if (!confirm('ゲーム中です。本当にシャッフルしますか？')) {
                    return;
                }
            }
            newGame();
        }

        // 配列シャッフル
        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        // カードをめくる
        function flipCard(card) {
            if (!canFlip) return;
            if (card.classList.contains('flipped')) return;
            if (card.classList.contains('matched')) return;
            if (flippedCards.length >= 2) return;

            // ゲーム開始
            if (!gameStarted) {
                gameStarted = true;
                startTime = Date.now();
                timerInterval = setInterval(updateTimer, 100);
            }

            // カードをめくる
            card.classList.add('flipped');
            card.textContent = cards[card.dataset.index];
            flippedCards.push(card);

            // 2枚めくったらチェック
            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }

        // マッチチェック
        function checkMatch() {
            const [card1, card2] = flippedCards;
            const emoji1 = cards[card1.dataset.index];
            const emoji2 = cards[card2.dataset.index];

            if (emoji1 === emoji2) {
                // マッチ！
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    flippedCards = [];
                    matchedPairs++;
                    document.getElementById('pairs').textContent = matchedPairs;

                    // クリアチェック
                    if (matchedPairs === emojis.length) {
                        setTimeout(showWin, 500);
                    }
                }, 300);
            } else {
                // マッチ失敗
                canFlip = false;
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    card1.textContent = '';
                    card2.textContent = '';
                    flippedCards = [];
                    canFlip = true;
                }, 1000);
            }
        }

        // タイマー更新
        function updateTimer() {
            const elapsed = Date.now() - startTime;
            const minutes = Math.floor(elapsed / 60000);
            const seconds = Math.floor((elapsed % 60000) / 1000);
            document.getElementById('timer').textContent =
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        // ウィンモーダル表示
        function showWin() {
            clearInterval(timerInterval);

            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('finalTime').textContent = document.getElementById('timer').textContent;
            document.getElementById('winModal').classList.add('show');
        }

        // 全画面トグル
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ゲーム開始
        newGame();
    </script>
</body>
</html>
