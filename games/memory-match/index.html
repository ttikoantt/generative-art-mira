<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match | Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            color: #fff;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .header p {
            font-size: 14px;
            color: #888;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 16px;
            color: #fff;
        }

        .stats span {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 400px;
            width: 100%;
        }

        .card {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            position: relative;
            transform-style: preserve-3d;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(102, 126, 234, 0.4);
        }

        .card.flipped {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-color: #fff;
            transform: rotateY(180deg);
        }

        .card.matched {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            opacity: 0.6;
            cursor: not-allowed;
            transform: scale(0.95);
        }

        .card-content {
            display: none;
        }

        .card.flipped .card-content,
        .card.matched .card-content {
            display: block;
            transform: rotateY(180deg);
        }

        .card-back {
            display: block;
        }

        .card.flipped .card-back,
        .card.matched .card-back {
            display: none;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: #fff;
            padding: 12px 24px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            border-radius: 25px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .win-message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 30px 40px;
            border-radius: 15px;
            text-align: center;
            z-index: 1000;
            border: 2px solid #4facfe;
            box-shadow: 0 0 30px rgba(79, 172, 254, 0.5);
        }

        .win-message.show {
            display: block;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            from {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0;
            }
            to {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .win-message h2 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #4facfe;
        }

        .win-message p {
            font-size: 16px;
            margin-bottom: 20px;
        }

        .info {
            margin-top: 15px;
            font-size: 11px;
            color: #666;
            text-align: center;
        }

        @media (max-width: 480px) {
            .game-board {
                gap: 8px;
                max-width: 320px;
            }

            .card {
                font-size: 24px;
            }

            .stats {
                font-size: 14px;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧠 MEMORY MATCH</h1>
        <p>カードをめくってペアを見つけよう</p>
    </div>

    <div class="stats">
        <span>⏱️ 時間: <span id="timer">0</span>秒</span>
        <span>🔄 回数: <span id="moves">0</span></span>
        <span>✅ ペア: <span id="pairs">0</span>/8</span>
    </div>

    <div class="game-board" id="gameBoard"></div>

    <div class="controls">
        <button onclick="startGame()">🔄 新しいゲーム</button>
        <button onclick="toggleFullscreen()">📺 全画面</button>
    </div>

    <div class="info">
        <p>ゲーム #834 | Created by Mira</p>
    </div>

    <div class="win-message" id="winMessage">
        <h2>🎉 クリア！</h2>
        <p>おめでとうございます！</p>
        <p>時間: <span id="finalTime"></span>秒 | 回数: <span id="finalMoves"></span>回</p>
        <button onclick="startGame()">もう一度プレイ</button>
    </div>

    <script>
        const emojis = ['🎮', '🎨', '🎭', '🎪', '🎢', '🎡', '🎠', '🎪'];
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let timer = 0;
        let timerInterval = null;
        let canClick = true;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function createCards() {
            const pairs = [...emojis, ...emojis];
            return shuffleArray(pairs);
        }

        function renderBoard() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';

            cards.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;
                card.onclick = () => flipCard(card, index);

                const back = document.createElement('div');
                back.className = 'card-back';
                back.textContent = '❓';

                const content = document.createElement('div');
                content.className = 'card-content';
                content.textContent = emoji;

                card.appendChild(back);
                card.appendChild(content);
                board.appendChild(card);
            });
        }

        function flipCard(card, index) {
            if (!canClick) return;
            if (card.classList.contains('flipped')) return;
            if (card.classList.contains('matched')) return;
            if (flippedCards.length >= 2) return;

            // タイマー開始
            if (timer === 0) {
                startTimer();
            }

            card.classList.add('flipped');
            flippedCards.push({ card, index, emoji: cards[index] });

            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            canClick = false;
            const [first, second] = flippedCards;

            if (first.emoji === second.emoji) {
                // マッチ！
                setTimeout(() => {
                    first.card.classList.add('matched');
                    second.card.classList.add('matched');
                    first.card.classList.remove('flipped');
                    second.card.classList.remove('flipped');
                    matchedPairs++;
                    document.getElementById('pairs').textContent = matchedPairs;
                    flippedCards = [];
                    canClick = true;

                    if (matchedPairs === 8) {
                        endGame();
                    }
                }, 500);
            } else {
                // マッチ失敗
                setTimeout(() => {
                    first.card.classList.remove('flipped');
                    second.card.classList.remove('flipped');
                    flippedCards = [];
                    canClick = true;
                }, 1000);
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timer++;
                document.getElementById('timer').textContent = timer;
            }, 1000);
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('finalTime').textContent = timer;
            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('winMessage').classList.add('show');
        }

        function startGame() {
            // リセット
            clearInterval(timerInterval);
            cards = [];
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            timer = 0;
            canClick = true;

            document.getElementById('timer').textContent = '0';
            document.getElementById('moves').textContent = '0';
            document.getElementById('pairs').textContent = '0';
            document.getElementById('winMessage').classList.remove('show');

            // 新しいゲーム開始
            cards = createCards();
            renderBoard();
        }

        function toggleFullscreen() {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            } else if (document.documentElement.msRequestFullscreen) {
                document.documentElement.msRequestFullscreen();
            }
        }

        // ゲーム開始
        startGame();
    </script>
</body>
</html>
