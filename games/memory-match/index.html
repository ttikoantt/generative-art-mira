<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            color: #fff;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            color: #fff;
            text-align: center;
            flex: 1;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .card {
            aspect-ratio: 1;
            background: linear-gradient(145deg, #2d2d44, #1a1a2e);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(145deg, #3d3d5c, #2a2a3e);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .card:hover::before {
            transform: scale(1.05);
        }

        .card.flipped::before,
        .card.matched::before {
            background: linear-gradient(145deg, #4a4a6a, #3a3a5e);
            transform: rotateY(180deg);
        }

        .card-content {
            position: relative;
            z-index: 1;
            opacity: 0;
            transform: scale(0);
            transition: all 0.3s ease;
        }

        .card.flipped .card-content,
        .card.matched .card-content {
            opacity: 1;
            transform: scale(1);
        }

        .card.matched {
            background: linear-gradient(145deg, #0f4c3a, #0a3228);
        }

        .card.matched::before {
            background: linear-gradient(145deg, #1a7c5a, #0f4c3a);
        }

        .card-back {
            position: absolute;
            z-index: 2;
            font-size: 24px;
            opacity: 0.5;
            transition: all 0.3s ease;
        }

        .card.flipped .card-back,
        .card.matched .card-back {
            opacity: 0;
            transform: scale(0);
        }

        .buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(145deg, #00d4ff, #0099cc);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(145deg, #2d2d44, #1a1a2e);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: #fff;
            max-width: 400px;
            width: 90%;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        .modal p {
            font-size: 18px;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .modal .btn {
            margin-top: 20px;
        }

        @media (max-width: 480px) {
            .grid {
                gap: 8px;
            }

            .header h1 {
                font-size: 24px;
            }

            .stat-value {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 Memory Match</h1>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">MOVES</div>
                <div class="stat-value" id="moves">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">MATCHES</div>
                <div class="stat-value" id="matches">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">TIME</div>
                <div class="stat-value" id="time">00:00</div>
            </div>
        </div>

        <div class="grid" id="grid"></div>

        <div class="buttons">
            <button class="btn btn-primary" onclick="startGame()">🔄 New Game</button>
        </div>
    </div>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2>🎉 You Win!</h2>
            <p>Moves: <span id="finalMoves">0</span></p>
            <p>Time: <span id="finalTime">00:00</span></p>
            <button class="btn btn-primary" onclick="startGame()">Play Again</button>
        </div>
    </div>

    <script>
        // Game state
        let cards = [];
        let flipped = [];
        let matched = 0;
        let moves = 0;
        let gameStarted = false;
        let timerInterval = null;
        let seconds = 0;

        // Emojis for cards
        const emojis = ['🎮', '🎨', '🎯', '🎲', '🎭', '🎪', '🎢', '🎡'];

        // Initialize game
        function initGame() {
            // Create pairs
            const pairs = [...emojis, ...emojis];
            
            // Shuffle
            for (let i = pairs.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pairs[i], pairs[j]] = [pairs[j], pairs[i]];
            }

            // Create card objects
            cards = pairs.map((emoji, index) => ({
                id: index,
                emoji: emoji,
                flipped: false,
                matched: false
            }));

            flipped = [];
            matched = 0;
            moves = 0;
            gameStarted = false;
            seconds = 0;

            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }

            renderGrid();
            updateStats();
        }

        // Render grid
        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            cards.forEach(card => {
                const cardEl = document.createElement('div');
                cardEl.className = 'card';
                cardEl.dataset.id = card.id;
                cardEl.onclick = () => flipCard(card.id);

                // Card back
                const back = document.createElement('div');
                back.className = 'card-back';
                back.textContent = '❓';

                // Card content
                const content = document.createElement('div');
                content.className = 'card-content';
                content.textContent = card.emoji;

                cardEl.appendChild(back);
                cardEl.appendChild(content);
                grid.appendChild(cardEl);
            });
        }

        // Flip card
        function flipCard(id) {
            const card = cards[id];

            // Can't flip if already flipped, matched, or two cards already flipped
            if (card.flipped || card.matched || flipped.length >= 2) {
                return;
            }

            // Start timer on first flip
            if (!gameStarted) {
                gameStarted = true;
                startTimer();
            }

            // Flip the card
            card.flipped = true;
            flipped.push(id);

            // Update UI
            const cardEl = document.querySelector(`[data-id="${id}"]`);
            cardEl.classList.add('flipped');

            // Check for match when two cards are flipped
            if (flipped.length === 2) {
                moves++;
                updateStats();
                checkMatch();
            }
        }

        // Check for match
        function checkMatch() {
            const [id1, id2] = flipped;
            const card1 = cards[id1];
            const card2 = cards[id2];

            if (card1.emoji === card2.emoji) {
                // Match!
                card1.matched = true;
                card2.matched = true;
                matched++;

                setTimeout(() => {
                    document.querySelector(`[data-id="${id1}"]`).classList.add('matched');
                    document.querySelector(`[data-id="${id2}"]`).classList.add('matched');
                }, 300);

                flipped = [];

                // Check for win
                if (matched === emojis.length) {
                    setTimeout(() => showWin(), 500);
                }
            } else {
                // No match - flip back
                setTimeout(() => {
                    card1.flipped = false;
                    card2.flipped = false;
                    document.querySelector(`[data-id="${id1}"]`).classList.remove('flipped');
                    document.querySelector(`[data-id="${id2}"]`).classList.remove('flipped');
                    flipped = [];
                }, 1000);
            }
        }

        // Update stats
        function updateStats() {
            document.getElementById('moves').textContent = moves;
            document.getElementById('matches').textContent = matched;
        }

        // Start timer
        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('time').textContent = `${mins}:${secs}`;
            }, 1000);
        }

        // Show win modal
        function showWin() {
            clearInterval(timerInterval);
            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('finalTime').textContent = document.getElementById('time').textContent;
            document.getElementById('winModal').classList.add('show');
        }

        // Start game
        function startGame() {
            document.getElementById('winModal').classList.remove('show');
            initGame();
        }

        // Initialize on load
        initGame();
    </script>
</body>
</html>
