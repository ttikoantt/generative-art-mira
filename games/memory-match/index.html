<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Memory Match - Card Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
            user-select: none;
        }

        h1 {
            color: #fff;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #4fc3f7;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 500px;
            width: 100%;
        }

        .card {
            aspect-ratio: 1;
            background: linear-gradient(145deg, #2a2a4a, #1a1a3a);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            position: relative;
            transform-style: preserve-3d;
        }

        .card.flipped {
            transform: rotateY(180deg);
            background: linear-gradient(145deg, #4a4a7a, #3a3a6a);
        }

        .card.matched {
            background: linear-gradient(145deg, #2d5a27, #1d4a17);
            animation: matchPulse 0.5s ease;
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            backface-visibility: hidden;
            border-radius: 12px;
        }

        .card-front {
            background: linear-gradient(145deg, #2a2a4a, #1a1a3a);
        }

        .card-back {
            transform: rotateY(180deg);
            background: linear-gradient(145deg, #4a4a7a, #3a3a6a);
        }

        .card:hover:not(.flipped) {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(76, 195, 247, 0.3);
        }

        @keyframes matchPulse {
            0%, 100% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
        }

        #fullscreen {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
        }

        #fullscreen:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .restart-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #4fc3f7, #29b6f6);
            border: none;
            border-radius: 25px;
            color: #1a1a2e;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(79, 195, 247, 0.4);
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 195, 247, 0.6);
        }

        .win-message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
            animation: fadeIn 0.5s ease;
        }

        .win-message.show {
            display: block;
        }

        .win-message h2 {
            color: #4fc3f7;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .win-message p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 18px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 22px;
            }

            .game-board {
                gap: 8px;
            }

            .card {
                font-size: 28px;
            }

            .stats {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <h1>🎴 Memory Match</h1>
    <div class="stats">
        <div class="stat">
            <div>Moves</div>
            <div class="stat-value" id="moves">0</div>
        </div>
        <div class="stat">
            <div>Matches</div>
            <div class="stat-value" id="matches">0</div>
        </div>
        <div class="stat">
            <div>Time</div>
            <div class="stat-value" id="time">0:00</div>
        </div>
    </div>
    <div class="game-board" id="gameBoard"></div>
    <button class="restart-btn" id="restartBtn">Restart Game</button>
    <button id="fullscreen">⛶ Fullscreen</button>

    <div class="win-message" id="winMessage">
        <h2>🎉 You Win!</h2>
        <p id="winStats"></p>
    </div>

    <script>
        const emojis = ['🎨', '🎮', '🚀', '💎', '🌟', '🎵', '🔥', '💡'];
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let gameStarted = false;
        let startTime = 0;
        let timerInterval = null;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function createCards() {
            const pairs = [...emojis, ...emojis];
            shuffle(pairs);

            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';
            cards = [];

            pairs.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;
                card.dataset.emoji = emoji;

                const cardFront = document.createElement('div');
                cardFront.className = 'card-front';
                cardFront.textContent = '?';

                const cardBack = document.createElement('div');
                cardBack.className = 'card-back';
                cardBack.textContent = emoji;

                card.appendChild(cardFront);
                card.appendChild(cardBack);

                card.addEventListener('click', () => flipCard(card));
                gameBoard.appendChild(card);
                cards.push(card);
            });
        }

        function flipCard(card) {
            if (!gameStarted) {
                gameStarted = true;
                startTime = Date.now();
                startTimer();
            }

            if (
                flippedCards.length >= 2 ||
                card.classList.contains('flipped') ||
                card.classList.contains('matched')
            ) {
                return;
            }

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            const match = card1.dataset.emoji === card2.dataset.emoji;

            if (match) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;
                document.getElementById('matches').textContent = matchedPairs;
                flippedCards = [];

                if (matchedPairs === emojis.length) {
                    setTimeout(showWin, 500);
                }
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                }, 1000);
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                document.getElementById('time').textContent =
                    `${minutes}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function showWin() {
            clearInterval(timerInterval);
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;

            document.getElementById('winStats').textContent =
                `${moves} moves • ${minutes}:${seconds.toString().padStart(2, '0')}`;
            document.getElementById('winMessage').classList.add('show');
        }

        function restartGame() {
            clearInterval(timerInterval);
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            gameStarted = false;
            startTime = 0;

            document.getElementById('moves').textContent = '0';
            document.getElementById('matches').textContent = '0';
            document.getElementById('time').textContent = '0:00';
            document.getElementById('winMessage').classList.remove('show');

            createCards();
        }

        // イベント
        document.getElementById('restartBtn').addEventListener('click', restartGame);

        document.getElementById('fullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // 初期化
        createCards();
    </script>
</body>
</html>
