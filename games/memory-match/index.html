<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match - カードめくりゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1rem;
            color: #888;
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .stat {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }

        .stat-label {
            color: #888;
            font-size: 0.9rem;
        }

        .stat-value {
            font-weight: bold;
            color: #00ff88;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-width: 500px;
            perspective: 1000px;
        }

        .card {
            width: 80px;
            height: 80px;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched {
            opacity: 0.5;
            cursor: default;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 2rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .card-back {
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            color: #1a1a2e;
        }

        .card-front {
            background: linear-gradient(135deg, #2d3436, #636e72);
            transform: rotateY(180deg);
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            border: none;
            border-radius: 8px;
            color: #1a1a2e;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 255, 136, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
        }

        .message {
            margin-top: 20px;
            padding: 15px 30px;
            background: rgba(0, 255, 136, 0.2);
            border-radius: 8px;
            font-size: 1.2rem;
            display: none;
        }

        .message.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 500px) {
            .game-board {
                gap: 8px;
            }

            .card {
                width: 60px;
                height: 60px;
            }

            .card-face {
                font-size: 1.5rem;
            }

            h1 {
                font-size: 1.8rem;
            }

            .stats {
                gap: 15px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎴 Memory Match</h1>
        <p class="subtitle">カードをめくってペアを探そう！</p>
    </div>

    <div class="stats">
        <div class="stat">
            <div class="stat-label">スコア</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">ターン</div>
            <div class="stat-value" id="turns">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">ペア</div>
            <div class="stat-value" id="pairs">0/8</div>
        </div>
    </div>

    <div class="game-board" id="gameBoard"></div>

    <div class="message" id="message">
        🎉 クリアおめでとう！
    </div>

    <div class="controls">
        <button onclick="restartGame()">🔄 リプレイ</button>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">📺 全画面</button>
    </div>

    <script>
        // カードの絵文字
        const emojis = ['🍎', '🍊', '🍋', '🍇', '🍓', '🍑', '🍒', '🥝'];

        // ゲーム状態
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let score = 0;
        let turns = 0;
        let isLocked = false;

        // カードをシャッフル
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // ゲームボードを作成
        function createBoard() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';

            // カードペアを作成
            const cardPairs = [...emojis, ...emojis];
            shuffle(cardPairs);

            // カード要素を作成
            cardPairs.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;
                card.dataset.emoji = emoji;

                card.innerHTML = `
                    <div class="card-face card-back">?</div>
                    <div class="card-face card-front">${emoji}</div>
                `;

                card.addEventListener('click', () => flipCard(card));
                board.appendChild(card);
                cards.push(card);
            });
        }

        // カードをめくる
        function flipCard(card) {
            // ロックされている、既にめくられている、マッチ済みの場合は無視
            if (isLocked || card.classList.contains('flipped') || card.classList.contains('matched')) {
                return;
            }

            // カードをめくる
            card.classList.add('flipped');
            flippedCards.push(card);

            // 2枚めくった場合はチェック
            if (flippedCards.length === 2) {
                turns++;
                document.getElementById('turns').textContent = turns;
                checkMatch();
            }
        }

        // マッチチェック
        function checkMatch() {
            isLocked = true;
            const [card1, card2] = flippedCards;
            const match = card1.dataset.emoji === card2.dataset.emoji;

            if (match) {
                // マッチした場合
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;
                score += 100;
                document.getElementById('pairs').textContent = `${matchedPairs}/8`;
                document.getElementById('score').textContent = score;

                flippedCards = [];
                isLocked = false;

                // 全てマッチしたかチェック
                if (matchedPairs === 8) {
                    setTimeout(showWinMessage, 500);
                }
            } else {
                // マッチしなかった場合
                score = Math.max(0, score - 10);
                document.getElementById('score').textContent = score;

                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    isLocked = false;
                }, 1000);
            }
        }

        // 勝利メッセージ表示
        function showWinMessage() {
            const message = document.getElementById('message');
            message.innerHTML = `
                🎉 クリアおめでとう！<br>
                スコア: ${score} | ターン: ${turns}
            `;
            message.classList.add('show');
        }

        // ゲームをリスタート
        function restartGame() {
            // リセット
            cards = [];
            flippedCards = [];
            matchedPairs = 0;
            score = 0;
            turns = 0;
            isLocked = false;

            // UI更新
            document.getElementById('score').textContent = '0';
            document.getElementById('turns').textContent = '0';
            document.getElementById('pairs').textContent = '0/8';
            document.getElementById('message').classList.remove('show');

            // ボードを再作成
            createBoard();
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        }

        // 初期化
        createBoard();
    </script>
</body>
</html>
