<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match - ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: 'Arial', sans-serif;
            color: #fff;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 500px;
            width: 100%;
            perspective: 1000px;
        }

        .card {
            aspect-ratio: 1;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.5s;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched {
            transform: rotateY(180deg) scale(0.95);
            opacity: 0.7;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transform: rotateY(180deg);
        }

        .card-back {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .card-back::after {
            content: '?';
            font-size: 2rem;
            opacity: 0.5;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .btn {
            background: linear-gradient(45deg, #f093fb, #f5576c);
            border: none;
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            display: none;
            backdrop-filter: blur(10px);
        }

        .message.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .message h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .message p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .game-board {
                gap: 8px;
                max-width: 100%;
            }

            .card-face {
                font-size: 2rem;
            }

            .stats {
                font-size: 0.9rem;
                gap: 10px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="header">
        <h1>🎴 Memory Match</h1>
        <div class="stats">
            <div class="stat">⏱️ <span id="time">00:00</span></div>
            <div class="stat">🔄 <span id="moves">0</span></div>
            <div class="stat">✨ <span id="matches">0</span>/8</div>
        </div>
    </div>

    <div class="game-board" id="gameBoard"></div>

    <div class="controls">
        <button class="btn" onclick="initGame()">🔄 リセット</button>
    </div>

    <div class="message" id="message">
        <h2>🎉 クリア！</h2>
        <p>おめでとうございます！</p>
        <p>タイム: <span id="finalTime"></span></p>
        <p>手数: <span id="finalMoves"></span></p>
        <button class="btn" onclick="initGame(); hideMessage();">🔄 もう一度</button>
    </div>

    <script>
        // 絵文字のペア
        const emojis = ['🎨', '🎭', '🎪', '🎢', '🎡', '🎠', '🎪', '🎭'];

        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let gameStarted = false;
        let timer = null;
        let seconds = 0;
        let canFlip = true;

        // ゲーム初期化
        function initGame() {
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';

            // カードをシャッフル
            const shuffledEmojis = [...emojis, ...emojis].sort(() => Math.random() - 0.5);
            cards = shuffledEmojis.map((emoji, index) => ({
                id: index,
                emoji: emoji,
                flipped: false,
                matched: false
            }));

            // カードを描画
            cards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.className = 'card';
                cardElement.innerHTML = `
                    <div class="card-face card-front">${card.emoji}</div>
                    <div class="card-face card-back"></div>
                `;
                cardElement.onclick = () => flipCard(card.id);
                gameBoard.appendChild(cardElement);
            });

            // 状態リセット
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            gameStarted = false;
            canFlip = true;
            seconds = 0;

            if (timer) clearInterval(timer);

            updateStats();
        }

        // カードをめくる
        function flipCard(cardId) {
            if (!canFlip) return;

            const card = cards[cardId];
            if (card.flipped || card.matched) return;

            // タイマー開始
            if (!gameStarted) {
                gameStarted = true;
                timer = setInterval(() => {
                    seconds++;
                    updateStats();
                }, 1000);
            }

            // カードをめくる
            card.flipped = true;
            flippedCards.push(card);

            const cardElement = document.getElementById('gameBoard').children[cardId];
            cardElement.classList.add('flipped');

            // 2枚めくったらチェック
            if (flippedCards.length === 2) {
                canFlip = false;
                moves++;
                updateStats();

                setTimeout(() => {
                    checkMatch();
                }, 600);
            }
        }

        // マッチングチェック
        function checkMatch() {
            const [card1, card2] = flippedCards;

            if (card1.emoji === card2.emoji) {
                // マッチ！
                card1.matched = true;
                card2.matched = true;
                matchedPairs++;

                const element1 = document.getElementById('gameBoard').children[card1.id];
                const element2 = document.getElementById('gameBoard').children[card2.id];
                element1.classList.add('matched');
                element2.classList.add('matched');

                // クリアチェック
                if (matchedPairs === emojis.length) {
                    clearInterval(timer);
                    setTimeout(() => showMessage(), 500);
                }
            } else {
                // マッチ失敗
                card1.flipped = false;
                card2.flipped = false;

                const element1 = document.getElementById('gameBoard').children[card1.id];
                const element2 = document.getElementById('gameBoard').children[card2.id];
                element1.classList.remove('flipped');
                element2.classList.remove('flipped');
            }

            flippedCards = [];
            canFlip = true;
        }

        // 統計更新
        function updateStats() {
            const minutes = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('time').textContent = `${minutes}:${secs}`;
            document.getElementById('moves').textContent = moves;
            document.getElementById('matches').textContent = matchedPairs;
        }

        // メッセージ表示
        function showMessage() {
            const minutes = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('finalTime').textContent = `${minutes}:${secs}`;
            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('message').classList.add('show');
        }

        function hideMessage() {
            document.getElementById('message').classList.remove('show');
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ゲーム開始
        initGame();
    </script>
</body>
</html>
