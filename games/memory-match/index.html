<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match - カードマッチングゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            padding: 20px;
            overflow-x: hidden;
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
            color: #fff;
        }

        .game-header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #9c27b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            color: #fff;
        }

        .stat-label {
            font-size: 0.8em;
            opacity: 0.7;
            display: block;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 600px;
            width: 100%;
            perspective: 1000px;
        }

        .card {
            aspect-ratio: 3/4;
            background: transparent;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched {
            animation: matchPulse 0.6s ease-out;
        }

        @keyframes matchPulse {
            0%, 100% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transform: rotateY(180deg);
        }

        .card-back {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .card-back::before {
            content: "?";
            font-size: 2em;
            color: rgba(255, 255, 255, 0.8);
            font-weight: bold;
        }

        .restart-btn, .fullscreen-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.1em;
            font-family: inherit;
            margin-top: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.4);
        }

        .restart-btn:hover, .fullscreen-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.6);
        }

        .restart-btn:active, .fullscreen-btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 0.9em;
            margin: 0;
            z-index: 100;
        }

        .win-message {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.5s ease-out;
        }

        .win-message.show {
            display: flex;
        }

        .win-content {
            text-align: center;
            color: #fff;
            padding: 40px;
        }

        .win-content h2 {
            font-size: 3em;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #00d4ff, #9c27b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .win-content p {
            font-size: 1.5em;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .game-header h1 {
                font-size: 1.8em;
            }

            .game-board {
                gap: 10px;
                max-width: 100%;
            }

            .card-face {
                font-size: 2em;
            }

            .stats {
                gap: 15px;
            }

            .stat {
                padding: 8px 15px;
            }

            .stat-value {
                font-size: 1.2em;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 15px;
                font-size: 0.8em;
            }

            .win-content h2 {
                font-size: 2em;
            }

            .win-content p {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">
        全画面
    </button>

    <div class="game-header">
        <h1>🧠 Memory Match</h1>
        <div class="stats">
            <div class="stat">
                <span class="stat-label">移動数</span>
                <span class="stat-value" id="moves">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">マッチ</span>
                <span class="stat-value" id="matches">0/8</span>
            </div>
            <div class="stat">
                <span class="stat-label">タイム</span>
                <span class="stat-value" id="timer">00:00</span>
            </div>
        </div>
    </div>

    <div class="game-board" id="gameBoard"></div>

    <button class="restart-btn" onclick="initGame()">
        🔄 もう一度
    </button>

    <div class="win-message" id="winMessage">
        <div class="win-content">
            <h2>🎉 クリア！</h2>
            <p>おめでとうございます！</p>
            <p>移動数: <span id="finalMoves">0</span></p>
            <p>タイム: <span id="finalTime">00:00</span></p>
            <button class="restart-btn" onclick="initGame()">
                🔄 もう一度
            </button>
        </div>
    </div>

    <script>
        // カードの絵文字
        const emojis = ['🎮', '🎲', '🎯', '🎨', '🎭', '🎪', '🎢', '🎡'];

        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let gameTimer = null;
        let seconds = 0;
        let isProcessing = false;

        // カードをシャッフル
        function shuffleCards() {
            const deck = [...emojis, ...emojis];
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
            return deck.map((emoji, index) => ({
                id: index,
                emoji: emoji,
                isFlipped: false,
                isMatched: false
            }));
        }

        // ゲームを初期化
        function initGame() {
            // 状態をリセット
            cards = shuffleCards();
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            seconds = 0;
            isProcessing = false;

            // タイマーをリセット
            if (gameTimer) {
                clearInterval(gameTimer);
            }
            gameTimer = setInterval(updateTimer, 1000);

            // UIを更新
            document.getElementById('moves').textContent = '0';
            document.getElementById('matches').textContent = '0/8';
            document.getElementById('timer').textContent = '00:00';
            document.getElementById('winMessage').classList.remove('show');

            // ゲームボードを描画
            renderBoard();
        }

        // ゲームボードを描画
        function renderBoard() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';

            cards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.className = 'card';
                cardElement.dataset.id = card.id;

                cardElement.innerHTML = `
                    <div class="card-face card-front">${card.emoji}</div>
                    <div class="card-face card-back"></div>
                `;

                cardElement.addEventListener('click', () => handleCardClick(card.id));
                board.appendChild(cardElement);
            });
        }

        // カードをクリック
        function handleCardClick(cardId) {
            if (isProcessing) return;

            const card = cards[cardId];
            const cardElement = document.querySelector(`[data-id="${cardId}"]`);

            // 既にめくられているカードやマッチしたカードは無視
            if (card.isFlipped || card.isMatched) return;
            if (flippedCards.length >= 2) return;

            // カードをめくる
            card.isFlipped = true;
            cardElement.classList.add('flipped');
            flippedCards.push(card);

            // 2枚めくったらチェック
            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }

        // マッチをチェック
        function checkMatch() {
            isProcessing = true;
            const [card1, card2] = flippedCards;

            if (card1.emoji === card2.emoji) {
                // マッチ成功
                setTimeout(() => {
                    card1.isMatched = true;
                    card2.isMatched = true;

                    document.querySelector(`[data-id="${card1.id}"]`).classList.add('matched');
                    document.querySelector(`[data-id="${card2.id}"]`).classList.add('matched');

                    matchedPairs++;
                    document.getElementById('matches').textContent = `${matchedPairs}/8`;

                    flippedCards = [];
                    isProcessing = false;

                    // 全マッチでクリア
                    if (matchedPairs === 8) {
                        setTimeout(showWinMessage, 500);
                    }
                }, 600);
            } else {
                // マッチ失敗
                setTimeout(() => {
                    card1.isFlipped = false;
                    card2.isFlipped = false;

                    document.querySelector(`[data-id="${card1.id}"]`).classList.remove('flipped');
                    document.querySelector(`[data-id="${card2.id}"]`).classList.remove('flipped');

                    flippedCards = [];
                    isProcessing = false;
                }, 1000);
            }
        }

        // タイマーを更新
        function updateTimer() {
            seconds++;
            const minutes = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${minutes}:${secs}`;
        }

        // ウィンメッセージを表示
        function showWinMessage() {
            clearInterval(gameTimer);

            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('finalTime').textContent = document.getElementById('timer').textContent;
            document.getElementById('winMessage').classList.add('show');
        }

        // 全画面表示トグル
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ゲームを開始
        initGame();
    </script>
</body>
</html>
