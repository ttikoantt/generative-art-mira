<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Memory Match - 神経衰弱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .game-header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }
        .game-header h1 {
            font-size: 1.8em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .game-stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            font-size: 1.1em;
        }
        .stat {
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 400px;
            width: 100%;
        }
        .card {
            aspect-ratio: 1;
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            user-select: none;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        .card.flipped {
            background: linear-gradient(145deg, #f0f0f0, #ffffff);
            transform: rotateY(180deg);
        }
        .card.matched {
            background: linear-gradient(145deg, #a8e6cf, #88d8b0);
            opacity: 0.7;
            cursor: default;
        }
        .card-content {
            display: none;
        }
        .card.flipped .card-content,
        .card.matched .card-content {
            display: block;
        }
        .card-back {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        .card.flipped .card-back,
        .card.matched .card-back {
            display: none;
        }
        .buttons {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        button {
            background: rgba(255,255,255,0.9);
            color: #667eea;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        button:hover {
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }
        .win-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95);
            padding: 30px 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 50px rgba(0,0,0,0.3);
            display: none;
            z-index: 100;
        }
        .win-message.show {
            display: block;
            animation: popIn 0.5s ease;
        }
        .win-message h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.8em;
        }
        .win-message p {
            color: #666;
            margin-bottom: 20px;
            font-size: 1.1em;
        }
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        @media (max-width: 400px) {
            .grid {
                gap: 8px;
            }
            .card {
                font-size: 1.5em;
            }
            .game-header h1 {
                font-size: 1.4em;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-header">
        <h1>🧠 Memory Match</h1>
        <div class="game-stats">
            <div class="stat">🎯 <span id="moves">0</span></div>
            <div class="stat">⏱️ <span id="time">00:00</span></div>
            <div class="stat">✅ <span id="pairs">0</span>/8</div>
        </div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="buttons">
        <button onclick="initGame()">🔄 新規ゲーム</button>
    </div>

    <div class="win-message" id="winMessage">
        <h2>🎉 クリア！</h2>
        <p>おめでとうございます！</p>
        <p>手順: <span id="finalMoves">0</span> | 時間: <span id="finalTime">00:00</span></p>
        <button onclick="initGame()">もう一度プレイ</button>
    </div>

    <script>
        const emojis = ['🌟', '🎨', '🎭', '🎪', '🎯', '🎲', '🎸', '🎹'];
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let gameStarted = false;
        let timerInterval = null;
        let seconds = 0;
        let canFlip = true;

        function shuffle(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function createCard(emoji, index) {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.index = index;
            card.dataset.emoji = emoji;

            const back = document.createElement('div');
            back.className = 'card-back';
            back.textContent = '❓';

            const content = document.createElement('div');
            content.className = 'card-content';
            content.textContent = emoji;

            card.appendChild(back);
            card.appendChild(content);
            card.addEventListener('click', () => flipCard(card));

            return card;
        }

        function initGame() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            cards = [];
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            gameStarted = false;
            canFlip = true;

            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            seconds = 0;
            updateStats();

            document.getElementById('winMessage').classList.remove('show');

            const cardPairs = [...emojis, ...emojis];
            const shuffled = shuffle(cardPairs);

            shuffled.forEach((emoji, index) => {
                const card = createCard(emoji, index);
                cards.push(card);
                grid.appendChild(card);
            });
        }

        function startTimer() {
            if (gameStarted) return;
            gameStarted = true;
            timerInterval = setInterval(() => {
                seconds++;
                updateStats();
            }, 1000);
        }

        function flipCard(card) {
            if (!canFlip) return;
            if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
            if (flippedCards.length >= 2) return;

            startTimer();

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                moves++;
                updateStats();
                checkMatch();
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            const match = card1.dataset.emoji === card2.dataset.emoji;

            if (match) {
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    matchedPairs++;
                    updateStats();
                    flippedCards = [];

                    if (matchedPairs === emojis.length) {
                        endGame();
                    }
                }, 500);
            } else {
                canFlip = false;
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    canFlip = true;
                }, 1000);
            }
        }

        function updateStats() {
            document.getElementById('moves').textContent = moves;
            document.getElementById('pairs').textContent = matchedPairs;

            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('time').textContent = `${mins}:${secs}`;
        }

        function endGame() {
            clearInterval(timerInterval);

            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');

            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('finalTime').textContent = `${mins}:${secs}`;
            document.getElementById('winMessage').classList.add('show');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ゲーム開始
        initGame();
    </script>
</body>
</html>
