<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Memory Match - カードめくりゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            font-size: 1.1rem;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-right: 5px;
        }

        .stat-value {
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 500px;
            width: 100%;
        }

        .card {
            aspect-ratio: 1;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            transition: transform 0.3s, background 0.3s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: relative;
            transform-style: preserve-3d;
        }

        .card.flipped {
            background: #ffd700;
            transform: rotateY(180deg);
        }

        .card.matched {
            background: #4ecdc4;
            transform: rotateY(180deg);
            animation: match-pulse 0.5s ease-out;
        }

        @keyframes match-pulse {
            0%, 100% {
                transform: rotateY(180deg) scale(1);
            }
            50% {
                transform: rotateY(180deg) scale(1.1);
            }
        }

        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            backface-visibility: hidden;
        }

        .card-front {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            backface-visibility: hidden;
            transform: rotateY(180deg);
        }

        .card:not(.flipped):not(.matched) .card-front {
            display: none;
        }

        .card.flipped .card-back,
        .card.matched .card-back {
            display: none;
        }

        .controls {
            margin-top: 20px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.3);
            color: white;
            border: 2px solid white;
            padding: 12px 30px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            z-index: 100;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .victory-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .victory-overlay.show {
            display: flex;
            animation: fade-in 0.5s ease-out;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .victory-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: bounce-in 0.5s ease-out;
        }

        @keyframes bounce-in {
            0% {
                transform: scale(0);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        .victory-content h2 {
            font-size: 2rem;
            color: #667eea;
            margin-bottom: 20px;
        }

        .victory-stats {
            margin-bottom: 20px;
            color: #333;
        }

        .victory-stats p {
            margin: 10px 0;
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5rem;
            }

            .game-board {
                gap: 8px;
            }

            .card {
                font-size: 2rem;
            }

            .card-front {
                font-size: 2rem;
            }

            .stats {
                gap: 10px;
            }

            .stat {
                padding: 8px 15px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 400px) {
            .game-board {
                gap: 5px;
            }

            .card-front {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="header">
        <h1>🎴 Memory Match</h1>
        <div class="stats">
            <div class="stat">
                <span class="stat-label">ターン:</span>
                <span class="stat-value" id="turns">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">時間:</span>
                <span class="stat-value" id="time">00:00</span>
            </div>
            <div class="stat">
                <span class="stat-label">ペア:</span>
                <span class="stat-value" id="pairs">0/8</span>
            </div>
        </div>
    </div>

    <div class="game-board" id="game-board"></div>

    <div class="controls">
        <button class="btn" onclick="initGame()">リセット</button>
    </div>

    <div class="victory-overlay" id="victory-overlay">
        <div class="victory-content">
            <h2>🎉 クリア！</h2>
            <div class="victory-stats">
                <p>ターン数: <span id="final-turns">0</span></p>
                <p>クリア時間: <span id="final-time">00:00</span></p>
            </div>
            <button class="btn" onclick="closeVictory()">もう一度</button>
        </div>
    </div>

    <script>
        // ゲーム状態
        const emojis = ['🌟', '🎨', '🎮', '🎵', '🌈', '🎭', '🎪', '🎢'];
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let turns = 0;
        let gameStarted = false;
        let gameTimer = null;
        let gameSeconds = 0;
        let isProcessing = false;

        // ゲームボードを初期化
        function initGame() {
            // リセット
            cards = [];
            flippedCards = [];
            matchedPairs = 0;
            turns = 0;
            gameStarted = false;
            gameSeconds = 0;
            isProcessing = false;

            if (gameTimer) {
                clearInterval(gameTimer);
                gameTimer = null;
            }

            // カードを生成
            const cardPairs = [...emojis, ...emojis];
            shuffleArray(cardPairs);

            const gameBoard = document.getElementById('game-board');
            gameBoard.innerHTML = '';

            cardPairs.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;
                card.dataset.emoji = emoji;

                card.innerHTML = `
                    <div class="card-back">❓</div>
                    <div class="card-front">${emoji}</div>
                `;

                card.addEventListener('click', () => flipCard(card));
                gameBoard.appendChild(card);
                cards.push(card);
            });

            updateStats();
            document.getElementById('victory-overlay').classList.remove('show');
        }

        // カードをめくる
        function flipCard(card) {
            if (isProcessing) return;
            if (card.classList.contains('flipped')) return;
            if (card.classList.contains('matched')) return;
            if (flippedCards.length >= 2) return;

            // タイマー開始
            if (!gameStarted) {
                gameStarted = true;
                startTimer();
            }

            // カードをめくる
            card.classList.add('flipped');
            flippedCards.push(card);

            // 2枚目のカード
            if (flippedCards.length === 2) {
                turns++;
                updateStats();
                checkMatch();
            }
        }

        // マッチ確認
        function checkMatch() {
            isProcessing = true;

            const [card1, card2] = flippedCards;
            const emoji1 = card1.dataset.emoji;
            const emoji2 = card2.dataset.emoji;

            if (emoji1 === emoji2) {
                // マッチ！
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    matchedPairs++;
                    flippedCards = [];
                    isProcessing = false;
                    updateStats();

                    if (matchedPairs === 8) {
                        showVictory();
                    }
                }, 500);
            } else {
                // マッチ失敗
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    isProcessing = false;
                }, 1000);
            }
        }

        // 統計更新
        function updateStats() {
            document.getElementById('turns').textContent = turns;
            document.getElementById('pairs').textContent = `${matchedPairs}/8`;
        }

        // タイマー
        function startTimer() {
            gameTimer = setInterval(() => {
                gameSeconds++;
                updateTimer();
            }, 1000);
        }

        function updateTimer() {
            const minutes = Math.floor(gameSeconds / 60);
            const seconds = gameSeconds % 60;
            document.getElementById('time').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        // 勝利表示
        function showVictory() {
            clearInterval(gameTimer);

            const minutes = Math.floor(gameSeconds / 60);
            const seconds = gameSeconds % 60;
            const timeStr = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            document.getElementById('final-turns').textContent = turns;
            document.getElementById('final-time').textContent = timeStr;
            document.getElementById('victory-overlay').classList.add('show');
        }

        function closeVictory() {
            document.getElementById('victory-overlay').classList.remove('show');
            initGame();
        }

        // シャッフル
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        initGame();
    </script>
</body>
</html>
