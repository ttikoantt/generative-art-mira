<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>マトリックス・ジャンプ - Matrix Jump</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            touch-action: none;
        }

        #game {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .score-display {
            color: #0f0;
            font-size: 24px;
            text-shadow: 0 0 10px #0f0;
        }

        .target-display {
            color: #0ff;
            font-size: 32px;
            text-shadow: 0 0 10px #0ff;
        }

        #playArea {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .falling-number {
            position: absolute;
            color: #0f0;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 0 0 10px #0f0;
            animation: glow 1s ease-in-out infinite alternate;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #0f0; }
            to { text-shadow: 0 0 20px #0f0, 0 0 30px #0f0; }
        }

        .collected {
            animation: collect 0.3s ease-out forwards;
        }

        @keyframes collect {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .missed {
            animation: miss 0.5s ease-out forwards;
        }

        @keyframes miss {
            0% { color: #0f0; }
            100% { color: #f00; opacity: 0.5; }
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: #0f0;
            text-align: center;
            padding: 20px;
        }

        #overlay.hidden {
            display: none;
        }

        .title {
            font-size: 32px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #0f0;
        }

        .subtitle {
            font-size: 18px;
            margin-bottom: 30px;
            color: #0ff;
        }

        .final-score {
            font-size: 48px;
            margin: 20px 0;
            text-shadow: 0 0 30px #0f0;
        }

        .button {
            background: transparent;
            border: 2px solid #0f0;
            color: #0f0;
            padding: 15px 40px;
            font-size: 20px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            transition: all 0.3s;
            text-shadow: 0 0 10px #0f0;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
            margin: 10px;
        }

        .button:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.8);
        }

        .button:active {
            transform: scale(0.95);
        }

        #combo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            color: #ff0;
            text-shadow: 0 0 30px #ff0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 50;
        }

        #combo.show {
            opacity: 1;
            animation: comboPop 0.5s ease-out;
        }

        @keyframes comboPop {
            0% { transform: translate(-50%, -50%) scale(0.5); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        .stats {
            margin: 20px 0;
            font-size: 16px;
            line-height: 1.8;
        }

        /* モバイル最適化 */
        @media (max-width: 768px) {
            .title { font-size: 24px; }
            .final-score { font-size: 36px; }
            .falling-number { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div id="game">
        <div id="header">
            <div class="score-display">Score: <span id="score">0</span></div>
            <div class="target-display">Target: <span id="target">?</span></div>
        </div>
        <div id="playArea"></div>
        <div id="combo"></div>
    </div>

    <div id="overlay">
        <div class="title">マトリックス・ジャンプ</div>
        <div class="subtitle">Matrix Jump</div>
        <div class="stats">
            数字をタップして集めよう！<br>
            ターゲットの数字を集めるほど高得点<br>
            間違った数字をタップするとライフ減少
        </div>
        <button class="button" onclick="startGame()">START</button>
    </div>

    <script>
        let score = 0;
        let lives = 3;
        let combo = 0;
        let targetNumber = 0;
        let gameActive = false;
        let spawnInterval;
        let difficultyInterval;
        let difficulty = 1;

        const playArea = document.getElementById('playArea');
        const scoreEl = document.getElementById('score');
        const targetEl = document.getElementById('target');
        const overlay = document.getElementById('overlay');
        const comboEl = document.getElementById('combo');

        function startGame() {
            score = 0;
            lives = 3;
            combo = 0;
            difficulty = 1;
            gameActive = true;

            updateScore();
            newTarget();
            clearNumbers();

            overlay.classList.add('hidden');

            spawnInterval = setInterval(spawnNumber, 1500 / difficulty);
            difficultyInterval = setInterval(increaseDifficulty, 10000);
        }

        function newTarget() {
            targetNumber = Math.floor(Math.random() * 10);
            targetEl.textContent = targetNumber;
            targetEl.style.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
        }

        function spawnNumber() {
            if (!gameActive) return;

            const number = document.createElement('div');
            number.className = 'falling-number';
            number.textContent = Math.floor(Math.random() * 10);

            const x = Math.random() * (playArea.clientWidth - 60) + 30;
            number.style.left = x + 'px';
            number.style.top = '-50px';

            const duration = 3000 + Math.random() * 2000 - difficulty * 200;
            number.style.transition = `top ${duration}ms linear`;

            playArea.appendChild(number);

            setTimeout(() => {
                number.style.top = (playArea.clientHeight + 50) + 'px';
            }, 50);

            setTimeout(() => {
                if (number.parentNode && !number.classList.contains('collected')) {
                    number.classList.add('missed');
                    if (parseInt(number.textContent) === targetNumber) {
                        combo = 0;
                        showCombo('MISS!');
                    }
                    setTimeout(() => {
                        if (number.parentNode) {
                            number.remove();
                        }
                    }, 500);
                }
            }, duration);

            number.addEventListener('click', () => collectNumber(number));
            number.addEventListener('touchstart', (e) => {
                e.preventDefault();
                collectNumber(number);
            });
        }

        function collectNumber(element) {
            if (!gameActive || element.classList.contains('collected')) return;

            const value = parseInt(element.textContent);
            element.classList.add('collected');

            if (value === targetNumber) {
                combo++;
                const points = 10 * combo * difficulty;
                score += points;
                showCombo(`+${points} x${combo}`);
                newTarget();
            } else {
                combo = 0;
                lives--;
                showCombo('MISS!');
                element.style.color = '#f00';
                if (lives <= 0) {
                    gameOver();
                }
            }

            updateScore();
            setTimeout(() => element.remove(), 300);
        }

        function showCombo(text) {
            comboEl.textContent = text;
            comboEl.classList.remove('show');
            void comboEl.offsetWidth;
            comboEl.classList.add('show');
            setTimeout(() => comboEl.classList.remove('show'), 500);
        }

        function updateScore() {
            scoreEl.textContent = score;
        }

        function clearNumbers() {
            const numbers = playArea.querySelectorAll('.falling-number');
            numbers.forEach(n => n.remove());
        }

        function increaseDifficulty() {
            if (difficulty < 5) {
                difficulty += 0.5;
                clearInterval(spawnInterval);
                spawnInterval = setInterval(spawnNumber, 1500 / difficulty);
            }
        }

        function gameOver() {
            gameActive = false;
            clearInterval(spawnInterval);
            clearInterval(difficultyInterval);

            overlay.innerHTML = `
                <div class="title">GAME OVER</div>
                <div class="final-score">${score}</div>
                <div class="stats">
                    最高コンボ: x${combo}<br>
                    難易度: ${difficulty.toFixed(1)}
                </div>
                <button class="button" onclick="startGame()">RETRY</button>
            `;
            overlay.classList.remove('hidden');
        }

        // 初期状態ではオーバーレイを表示
        overlay.classList.remove('hidden');
    </script>
</body>
</html>
