<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Timing Tap Master #834</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: #fff;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #00f260, #0575e6, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 242, 96, 0.3);
        }

        .subtitle {
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
            margin-bottom: 20px;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 242, 96, 0.3);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 400px;
            margin-bottom: 15px;
            color: #fff;
        }

        .stat {
            text-align: center;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(90deg, #00f260, #0575e6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .combo {
            color: #f093fb;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .feedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: bold;
            pointer-events: none;
            animation: feedbackAnim 0.5s ease-out forwards;
            text-shadow: 0 0 20px currentColor;
        }

        @keyframes feedbackAnim {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            color: #fff;
            z-index: 100;
            display: none;
        }

        .game-over.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .game-over h2 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #f5576c;
        }

        .game-over p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 0.75rem;
            }

            .stat-value {
                font-size: 1.2rem;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⏱️ Timing Tap Master</h1>
        <p class="subtitle">ゲーム#834 | 完璧なタイミングでタップ！</p>
    </div>

    <div class="stats">
        <div class="stat">
            <div class="stat-label">スコア</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">コンボ</div>
            <div class="stat-value combo" id="combo">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">最高スコア</div>
            <div class="stat-value" id="highScore">0</div>
        </div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="game-over" id="gameOver">
            <h2>ゲームオーバー！</h2>
            <p>最終スコア: <span id="finalScore">0</span></p>
            <button onclick="restartGame()">もう一度プレイ</button>
        </div>
    </div>

    <div class="controls">
        <button onclick="restartGame()">リスタート</button>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameOverDiv = document.getElementById('gameOver');

        let score = 0;
        let combo = 0;
        let highScore = parseInt(localStorage.getItem('timingTapHighScore')) || 0;
        let gameState = 'playing'; // playing, gameover

        // Circle properties
        let circleRadius = 100;
        const maxRadius = 100;
        const minRadius = 20;
        let shrinking = true;
        let shrinkSpeed = 0.8;
        let hue = 0;

        // Setup canvas
        function setupCanvas() {
            const container = canvas.parentElement;
            const size = Math.min(container.offsetWidth, 400);
            canvas.width = size;
            canvas.height = size;
            circleRadius = maxRadius;
        }

        setupCanvas();
        window.addEventListener('resize', setupCanvas);

        // Update stats display
        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;
            document.getElementById('highScore').textContent = highScore;
        }

        // Show feedback
        function showFeedback(text, color) {
            const feedback = document.createElement('div');
            feedback.className = 'feedback';
            feedback.textContent = text;
            feedback.style.color = color;
            canvas.parentElement.appendChild(feedback);

            setTimeout(() => {
                feedback.remove();
            }, 500);
        }

        // Draw game
        function draw() {
            // Clear canvas with fade effect
            ctx.fillStyle = 'rgba(10, 10, 10, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // Draw outer circle (target)
            ctx.beginPath();
            ctx.arc(centerX, centerY, minRadius, 0, Math.PI * 2);
            ctx.strokeStyle = `hsl(${hue}, 100%, 50%)`;
            ctx.lineWidth = 3;
            ctx.shadowBlur = 20;
            ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
            ctx.stroke();

            // Draw shrinking circle
            ctx.beginPath();
            ctx.arc(centerX, centerY, circleRadius, 0, Math.PI * 2);
            const gradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, circleRadius
            );
            gradient.addColorStop(0, `hsla(${hue}, 100%, 60%, 0.8)`);
            gradient.addColorStop(1, `hsla(${hue + 30}, 100%, 40%, 0.3)`);
            ctx.fillStyle = gradient;
            ctx.fill();

            // Draw border
            ctx.strokeStyle = `hsl(${hue}, 100%, 70%)`;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Reset shadow
            ctx.shadowBlur = 0;

            // Update hue
            hue = (hue + 1) % 360;
        }

        // Update game state
        function update() {
            if (gameState !== 'playing') return;

            // Shrink circle
            if (shrinking) {
                circleRadius -= shrinkSpeed;
                if (circleRadius <= minRadius) {
                    // Miss!
                    showFeedback('MISS!', '#ff4444');
                    combo = 0;
                    updateStats();

                    if (score <= 0) {
                        // Game over
                        gameState = 'gameover';
                        document.getElementById('finalScore').textContent = score;
                        gameOverDiv.classList.add('show');
                        if (score > highScore) {
                            highScore = score;
                            localStorage.setItem('timingTapHighScore', highScore);
                            updateStats();
                        }
                    } else {
                        score = Math.max(0, score - 10);
                        // Reset circle
                        circleRadius = maxRadius;
                    }
                }
            }
        }

        // Game loop
        function gameLoop() {
            if (gameState === 'playing') {
                update();
                draw();
            }
            requestAnimationFrame(gameLoop);
        }

        // Handle tap/click
        function handleTap(e) {
            if (gameState !== 'playing') return;

            e.preventDefault();

            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;

            if (e.type === 'touchstart') {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const tapX = clientX - rect.left;
            const tapY = clientY - rect.top;

            const distance = Math.sqrt(
                Math.pow(tapX - centerX, 2) + Math.pow(tapY - centerY, 2)
            );

            const difference = Math.abs(circleRadius - minRadius);

            if (difference < 15) {
                // Perfect!
                const points = 50 + (combo * 10);
                score += points;
                combo++;
                showFeedback('PERFECT! +' + points, '#00ff88');
                shrinkSpeed = Math.min(2.5, shrinkSpeed + 0.05);
            } else if (difference < 30) {
                // Good
                const points = 20 + (combo * 5);
                score += points;
                combo++;
                showFeedback('GOOD! +' + points, '#00f260');
            } else if (difference < 50) {
                // OK
                const points = 5 + combo;
                score += points;
                combo++;
                showFeedback('OK! +' + points, '#feca57');
            } else {
                // Too early!
                showFeedback('早すぎた！', '#ff6b6b');
                combo = 0;
            }

            // Reset circle
            circleRadius = maxRadius;
            updateStats();
        }

        // Event listeners
        canvas.addEventListener('mousedown', handleTap);
        canvas.addEventListener('touchstart', handleTap, { passive: false });

        // Control functions
        function restartGame() {
            score = 0;
            combo = 0;
            circleRadius = maxRadius;
            shrinkSpeed = 0.8;
            gameState = 'playing';
            gameOverDiv.classList.remove('show');
            updateStats();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        updateStats();
        gameLoop();
    </script>
</body>
</html>
