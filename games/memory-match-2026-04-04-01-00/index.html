<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メモリマッチ - 2026-04-04</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .stats {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px 30px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .card {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .card:hover:not(.flipped):not(.matched) {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.3);
        }

        .card.flipped {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            transform: rotateY(180deg);
        }

        .card.matched {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            animation: matchPulse 0.5s ease;
        }

        @keyframes matchPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            background: rgba(255, 255, 255, 0.9);
            color: #667eea;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            color: #667eea;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: white;
            transform: scale(1.05);
        }

        .win-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
            transition: transform 0.3s ease;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .win-message.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .win-message h2 {
            color: #667eea;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .win-message p {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .stats {
                padding: 10px 20px;
                font-size: 1rem;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            .game-board {
                gap: 8px;
            }

            .card {
                font-size: 2.5rem;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 15px;
                font-size: 0.9rem;
            }

            .win-message {
                padding: 30px 40px;
            }

            .win-message h2 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🎴 メモリマッチ</h1>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">移動数</div>
                <div class="stat-value" id="moves">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">マッチ</div>
                <div class="stat-value" id="matches">0/8</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">タイム</div>
                <div class="stat-value" id="timer">00:00</div>
            </div>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="buttons">
            <button class="btn" onclick="restartGame()">🔄 リスタート</button>
        </div>
    </div>

    <div class="win-message" id="winMessage">
        <h2>🎉 クリア！</h2>
        <p>おめでとうございます！</p>
        <p id="finalStats"></p>
        <button class="btn" onclick="restartGame()">もう一度プレイ</button>
    </div>

    <script>
        // 絵文字のペア
        const emojis = ['🎮', '🎨', '🎭', '🎪', '🎯', '🎲', '🎸', '🎺'];

        // ゲーム状態
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let gameStarted = false;
        let timerInterval = null;
        let seconds = 0;
        let canFlip = true;

        // ゲームボードの初期化
        function initGame() {
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';

            // カードのペアを作成
            const cardPairs = [...emojis, ...emojis];
            
            // シャッフル（Fisher-Yates）
            for (let i = cardPairs.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cardPairs[i], cardPairs[j]] = [cardPairs[j], cardPairs[i]];
            }

            // カードの生成
            cards = [];
            cardPairs.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;
                card.dataset.emoji = emoji;
                card.textContent = '❓';
                card.addEventListener('click', () => flipCard(card));
                gameBoard.appendChild(card);
                cards.push(card);
            });

            // 状態リセット
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            gameStarted = false;
            canFlip = true;
            seconds = 0;

            // UI更新
            updateStats();
            document.getElementById('winMessage').classList.remove('show');

            // タイマー停止
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        // カードをひっくり返す
        function flipCard(card) {
            if (!canFlip) return;
            if (card.classList.contains('flipped')) return;
            if (card.classList.contains('matched')) return;
            if (flippedCards.length >= 2) return;

            // タイマー開始
            if (!gameStarted) {
                gameStarted = true;
                startTimer();
            }

            // カードをひっくり返す
            card.classList.add('flipped');
            card.textContent = card.dataset.emoji;
            flippedCards.push(card);

            // 2枚めくったらチェック
            if (flippedCards.length === 2) {
                moves++;
                updateStats();
                checkMatch();
            }
        }

        // マッチチェック
        function checkMatch() {
            canFlip = false;
            const [card1, card2] = flippedCards;
            const match = card1.dataset.emoji === card2.dataset.emoji;

            if (match) {
                // マッチした
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    matchedPairs++;
                    updateStats();

                    flippedCards = [];
                    canFlip = true;

                    // ゲームクリアチェック
                    if (matchedPairs === emojis.length) {
                        setTimeout(showWinMessage, 500);
                    }
                }, 500);
            } else {
                // マッチしなかった
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    card1.textContent = '❓';
                    card2.textContent = '❓';
                    flippedCards = [];
                    canFlip = true;
                }, 1000);
            }
        }

        // タイマー開始
        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                updateTimer();
            }, 1000);
        }

        // タイマー更新
        function updateTimer() {
            const minutes = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${minutes}:${secs}`;
        }

        // 統計更新
        function updateStats() {
            document.getElementById('moves').textContent = moves;
            document.getElementById('matches').textContent = `${matchedPairs}/${emojis.length}`;
        }

        // 勝利メッセージ表示
        function showWinMessage() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }

            const minutes = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');

            document.getElementById('finalStats').textContent =
                `移動数: ${moves} | タイム: ${minutes}:${secs}`;
            document.getElementById('winMessage').classList.add('show');
        }

        // リスタート
        function restartGame() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            initGame();
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ゲーム開始
        initGame();
    </script>
</body>
</html>
