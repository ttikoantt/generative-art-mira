<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反射神経テスト</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #ffffff;
            padding: 20px;
        }

        .container {
            text-align: center;
            z-index: 10;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #00d4ff 0%, #9d4edd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 0.875rem;
            color: #888;
            margin-bottom: 2rem;
        }

        .game-area {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 3rem 2rem;
            margin-bottom: 2rem;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .game-area.waiting {
            background: rgba(255, 193, 7, 0.1);
            border-color: rgba(255, 193, 7, 0.3);
        }

        .game-area.ready {
            background: rgba(0, 212, 255, 0.2);
            border-color: rgba(0, 212, 255, 0.5);
            animation: pulse 0.5s ease-in-out;
        }

        .game-area.too-early {
            background: rgba(255, 0, 110, 0.2);
            border-color: rgba(255, 0, 110, 0.5);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .symbol {
            font-size: 8rem;
            font-weight: 700;
            user-select: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .symbol:active {
            transform: scale(0.95);
        }

        .message {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .message.waiting {
            color: #ffc107;
        }

        .message.ready {
            color: #00d4ff;
            font-size: 10rem;
            animation: popIn 0.3s ease-out;
        }

        .message.too-early {
            color: #ff006e;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .sub-message {
            font-size: 1rem;
            color: #a0a0a0;
        }

        .button {
            background: linear-gradient(135deg, #00d4ff 0%, #9d4edd 100%);
            border: none;
            color: white;
            padding: 1rem 2.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
            margin: 0.5rem;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.5);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.secondary {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .button.secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 1rem;
            text-align: center;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 0.25rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff 0%, #9d4edd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .rank {
            font-size: 4rem;
            font-weight: 700;
            margin: 1rem 0;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .rank.S { color: #ffd700; }
        .rank.A { color: #c0c0c0; }
        .rank.B { color: #cd7f32; }
        .rank.C { color: #00d4ff; }
        .rank.D { color: #888; }

        .attempts {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .attempt-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .attempt-dot.completed {
            background: linear-gradient(135deg, #00d4ff 0%, #9d4edd 100%);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.875rem;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .hidden {
            display: none !important;
        }

        .touch-area {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>

    <div class="container">
        <h1>⚡ 反射神経テスト</h1>
        <p class="subtitle">シンボルが表示されたらすぐにタップ！</p>

        <div class="stats" id="stats">
            <div class="stat-item">
                <div class="stat-label">今回</div>
                <div class="stat-value" id="currentTime">-</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">平均</div>
                <div class="stat-value" id="averageTime">-</div>
            </div>
        </div>

        <div class="attempts" id="attempts">
            <div class="attempt-dot"></div>
            <div class="attempt-dot"></div>
            <div class="attempt-dot"></div>
            <div class="attempt-dot"></div>
            <div class="attempt-dot"></div>
            <div class="attempt-dot"></div>
            <div class="attempt-dot"></div>
            <div class="attempt-dot"></div>
            <div class="attempt-dot"></div>
            <div class="attempt-dot"></div>
        </div>

        <div class="game-area" id="gameArea">
            <div class="message" id="message">スタートボタンを押してね</div>
            <div class="sub-message" id="subMessage"></div>
            <div class="touch-area" id="touchArea"></div>
        </div>

        <div class="controls" id="controls">
            <button class="button" id="startBtn">🎮 スタート</button>
        </div>

        <div class="controls hidden" id="restartControls">
            <button class="button" id="restartBtn">🔄 もう一度</button>
            <button class="button secondary" id="backBtn">🏠 トップに戻る</button>
        </div>
    </div>

    <script>
        const gameArea = document.getElementById('gameArea');
        const message = document.getElementById('message');
        const subMessage = document.getElementById('subMessage');
        const touchArea = document.getElementById('touchArea');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const backBtn = document.getElementById('backBtn');
        const controls = document.getElementById('controls');
        const restartControls = document.getElementById('restartControls');
        const currentTimeEl = document.getElementById('currentTime');
        const averageTimeEl = document.getElementById('averageTime');
        const attemptsEl = document.getElementById('attempts');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let gameState = 'idle'; // idle, waiting, ready, tooEarly, finished
        let startTime = 0;
        let timeoutId = null;
        let attempts = [];
        const totalAttempts = 10;
        let currentAttempt = 0;
        const symbols = ['●', '■', '▲', '◆', '★', '⬟', '⬡', '⯃'];

        function updateAttempts() {
            const dots = attemptsEl.querySelectorAll('.attempt-dot');
            dots.forEach((dot, index) => {
                if (index < currentAttempt) {
                    dot.classList.add('completed');
                } else {
                    dot.classList.remove('completed');
                }
            });
        }

        function getRandomSymbol() {
            return symbols[Math.floor(Math.random() * symbols.length)];
        }

        function getRank(avgTime) {
            if (avgTime < 200) return { rank: 'S', class: 'S' };
            if (avgTime < 250) return { rank: 'A', class: 'A' };
            if (avgTime < 300) return { rank: 'B', class: 'B' };
            if (avgTime < 400) return { rank: 'C', class: 'C' };
            return { rank: 'D', class: 'D' };
        }

        function startGame() {
            gameState = 'waiting';
            currentAttempt = 0;
            attempts = [];

            controls.classList.add('hidden');
            restartControls.classList.add('hidden');
            updateAttempts();

            nextRound();
        }

        function nextRound() {
            if (currentAttempt >= totalAttempts) {
                finishGame();
                return;
            }

            gameState = 'waiting';
            gameArea.className = 'game-area waiting';
            message.className = 'message waiting';
            message.textContent = '待機中...';
            subMessage.textContent = `(${currentAttempt + 1}/${totalAttempts})`;

            const delay = 1000 + Math.random() * 4000;

            timeoutId = setTimeout(() => {
                gameState = 'ready';
                gameArea.className = 'game-area ready';
                message.className = 'message ready';
                message.textContent = getRandomSymbol();
                subMessage.textContent = '';
                startTime = Date.now();
            }, delay);
        }

        function handleClick() {
            if (gameState === 'waiting') {
                // Too early!
                clearTimeout(timeoutId);
                gameState = 'tooEarly';
                gameArea.className = 'game-area too-early';
                message.className = 'message too-early';
                message.textContent = '⚠️ 早すぎ！';
                subMessage.textContent = 'シンボルが出てからタップしてね';

                setTimeout(() => {
                    if (gameState === 'tooEarly') {
                        nextRound();
                    }
                }, 1500);
            } else if (gameState === 'ready') {
                // Success!
                const reactionTime = Date.now() - startTime;
                attempts.push(reactionTime);
                currentAttempt++;

                currentTimeEl.textContent = reactionTime + 'ms';

                const avgTime = Math.round(attempts.reduce((a, b) => a + b, 0) / attempts.length);
                averageTimeEl.textContent = avgTime + 'ms';

                updateAttempts();

                gameState = 'waiting';
                message.textContent = '✅ ' + reactionTime + 'ms';
                message.className = 'message';
                subMessage.textContent = 'すばらしい！';

                setTimeout(() => {
                    nextRound();
                }, 1000);
            }
        }

        function finishGame() {
            gameState = 'finished';
            gameArea.className = 'game-area';

            const avgTime = Math.round(attempts.reduce((a, b) => a + b, 0) / attempts.length);
            const bestTime = Math.min(...attempts);
            const { rank, class: rankClass } = getRank(avgTime);

            message.innerHTML = `
                <div class="rank ${rankClass}">${rank}</div>
                <div style="font-size: 1.5rem; margin-top: 1rem;">平均 ${avgTime}ms</div>
                <div style="font-size: 1rem; color: #888; margin-top: 0.5rem;">ベスト: ${bestTime}ms</div>
            `;
            message.className = 'message';
            subMessage.textContent = '';

            restartControls.classList.remove('hidden');
        }

        function resetGame() {
            gameState = 'idle';
            currentAttempt = 0;
            attempts = [];

            currentTimeEl.textContent = '-';
            averageTimeEl.textContent = '-';

            updateAttempts();

            gameArea.className = 'game-area';
            message.className = 'message';
            message.textContent = 'スタートボタンを押してね';
            subMessage.textContent = '';

            controls.classList.remove('hidden');
            restartControls.classList.add('hidden');
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);
        backBtn.addEventListener('click', resetGame);
        touchArea.addEventListener('click', handleClick);
        touchArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick();
        });

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // Prevent context menu on long press
        gameArea.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });
    </script>
</body>
</html>
