<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数を当てろ | Number Guessing Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .game-area {
            margin-bottom: 30px;
        }

        .message {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
            min-height: 36px;
        }

        .message.too-high { color: #f56565; }
        .message.too-low { color: #4299e1; }
        .message.correct { color: #48bb78; }

        .attempts {
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            font-size: 24px;
            padding: 15px;
            border: 3px solid #e2e8f0;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            font-size: 16px;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .new-game {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            width: 100%;
        }

        .history {
            font-size: 14px;
            color: #999;
            margin-top: 20px;
            min-height: 20px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 14px;
            background: rgba(255,255,255,0.9);
            color: #667eea;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .message {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>

    <div class="container">
        <h1>🔢 数を当てろ</h1>
        <p class="subtitle">1から100までの数を当ててみよう！</p>

        <div class="game-area">
            <div class="message" id="message">スタート！</div>
            <div class="attempts">試行回数: <span id="attempts">0</span></div>

            <div class="input-group">
                <input type="number" id="guess" min="1" max="100" placeholder="?" autofocus>
                <button id="guessBtn">当てる！</button>
            </div>

            <button class="new-game" id="newGameBtn">新しいゲーム</button>

            <div class="history" id="history"></div>
        </div>
    </div>

    <script>
        const target = Math.floor(Math.random() * 100) + 1;
        let attempts = 0;
        const guessHistory = [];

        const messageEl = document.getElementById('message');
        const attemptsEl = document.getElementById('attempts');
        const guessInput = document.getElementById('guess');
        const guessBtn = document.getElementById('guessBtn');
        const newGameBtn = document.getElementById('newGameBtn');
        const historyEl = document.getElementById('history');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        function checkGuess() {
            const guess = parseInt(guessInput.value);

            if (isNaN(guess) || guess < 1 || guess > 100) {
                messageEl.textContent = '1〜100の数字を入力してね！';
                messageEl.className = 'message';
                guessInput.value = '';
                guessInput.focus();
                return;
            }

            attempts++;
            attemptsEl.textContent = attempts;
            guessHistory.push(guess);
            historyEl.textContent = `履歴: ${guessHistory.join(', ')}`;

            if (guess === target) {
                messageEl.textContent = '🎉 正解！すごい！';
                messageEl.className = 'message correct';
                guessInput.disabled = true;
                guessBtn.disabled = true;
            } else if (guess > target) {
                messageEl.textContent = '⬇️ もっと小さい！';
                messageEl.className = 'message too-high';
            } else {
                messageEl.textContent = '⬆️ もっと大きい！';
                messageEl.className = 'message too-low';
            }

            guessInput.value = '';
            guessInput.focus();
        }

        function newGame() {
            location.reload();
        }

        guessBtn.addEventListener('click', checkGuess);
        newGameBtn.addEventListener('click', newGame);

        guessInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkGuess();
            }
        });

        // Fullscreen
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        guessInput.focus();
    </script>
</body>
</html>
