<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reflex Rush - 反応ラッシュ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 18px;
            opacity: 0.9;
        }

        .stats {
            display: flex;
            gap: 40px;
            margin-bottom: 30px;
        }

        .stat {
            text-align: center;
            color: white;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .game-area {
            width: 100%;
            max-width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s;
        }

        .game-area:active {
            transform: scale(0.98);
        }

        .circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: #ff4757;
            box-shadow: 0 0 60px rgba(255, 71, 87, 0.6);
            transition: all 0.2s;
        }

        .circle.waiting {
            background: #3742fa;
            box-shadow: 0 0 60px rgba(55, 66, 250, 0.6);
        }

        .circle.success {
            animation: success 0.3s;
        }

        .circle.fail {
            animation: fail 0.3s;
        }

        @keyframes success {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes fail {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .message {
            position: absolute;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .overlay-content {
            text-align: center;
            color: white;
        }

        .overlay-content h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        .overlay-content p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .hidden {
            display: none !important;
        }

        .instructions {
            color: white;
            text-align: center;
            margin-top: 30px;
            font-size: 16px;
            opacity: 0.8;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 32px;
            }

            .game-area {
                height: 300px;
            }

            .circle {
                width: 150px;
                height: 150px;
            }

            .stat-value {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="header">
            <h1>⚡ Reflex Rush</h1>
            <p>色が変わった瞬間にタップ！</p>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">ベスト</div>
                <div class="stat-value" id="best">0</div>
            </div>
        </div>

        <div class="game-area" id="game-area">
            <div class="circle waiting" id="circle"></div>
            <div class="message" id="message">タップしてスタート</div>
        </div>

        <div class="instructions">
            青いときは待って、赤くなったらタップ！<br>
            早すぎると失敗だよ
        </div>

        <div class="overlay" id="start-overlay">
            <div class="overlay-content">
                <h2>Reflex Rush</h2>
                <p>反応速度を競うゲーム</p>
                <button class="btn" id="start-btn">スタート</button>
            </div>
        </div>

        <div class="overlay hidden" id="gameover-overlay">
            <div class="overlay-content">
                <h2>ゲームオーバー</h2>
                <p>スコア: <span id="final-score">0</span></p>
                <button class="btn" id="restart-btn">もう一度</button>
            </div>
        </div>
    </div>

    <script>
        const gameArea = document.getElementById('game-area');
        const circle = document.getElementById('circle');
        const message = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        const bestDisplay = document.getElementById('best');
        const startOverlay = document.getElementById('start-overlay');
        const gameoverOverlay = document.getElementById('gameover-overlay');
        const finalScoreDisplay = document.getElementById('final-score');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');

        let score = 0;
        let bestScore = parseInt(localStorage.getItem('reflex-rush-best')) || 0;
        let gameState = 'idle'; // idle, waiting, ready, gameover
        let waitTimeout = null;
        let startTime = 0;

        bestDisplay.textContent = bestScore;

        function startGame() {
            score = 0;
            scoreDisplay.textContent = score;
            startOverlay.classList.add('hidden');
            gameoverOverlay.classList.add('hidden');
            startRound();
        }

        function startRound() {
            gameState = 'waiting';
            circle.className = 'circle waiting';
            message.textContent = '待って...';

            // ランダムな待ち時間（1〜4秒）
            const waitTime = 1000 + Math.random() * 3000;

            waitTimeout = setTimeout(() => {
                gameState = 'ready';
                circle.className = 'circle';
                message.textContent = 'タップ！';
                startTime = Date.now();
            }, waitTime);
        }

        function handleClick() {
            if (gameState === 'idle') {
                return;
            }

            if (gameState === 'waiting') {
                // 早すぎる！
                clearTimeout(waitTimeout);
                gameOver();
            } else if (gameState === 'ready') {
                // 成功！
                const reactionTime = Date.now() - startTime;
                score++;
                scoreDisplay.textContent = score;

                circle.classList.add('success');
                message.textContent = `${reactionTime}ms`;

                setTimeout(() => {
                    circle.classList.remove('success');
                    startRound();
                }, 500);
            }
        }

        function gameOver() {
            gameState = 'gameover';
            circle.className = 'circle fail';
            message.textContent = '早すぎた！';

            setTimeout(() => {
                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('reflex-rush-best', bestScore);
                    bestDisplay.textContent = bestScore;
                }

                finalScoreDisplay.textContent = score;
                gameoverOverlay.classList.remove('hidden');
            }, 500);
        }

        // イベントリスナー
        gameArea.addEventListener('click', handleClick);
        gameArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick();
        });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState === 'idle') {
                    startGame();
                } else {
                    handleClick();
                }
            }
        });
    </script>
</body>
</html>
