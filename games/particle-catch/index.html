<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パーティクルキャッチ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .score {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .lives {
            display: flex;
            gap: 5px;
        }

        .heart {
            font-size: 24px;
            filter: drop-shadow(0 0 5px rgba(255, 0, 0, 0.5));
        }

        .fullscreen-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h1 {
            color: #fff;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .overlay p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 18px;
            margin-bottom: 30px;
            text-align: center;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: #fff;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        .game-over-stats {
            color: rgba(255, 255, 255, 0.9);
            font-size: 24px;
            margin-bottom: 30px;
        }

        .combo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            pointer-events: none;
            opacity: 0;
            transition: all 0.3s;
            z-index: 150;
        }

        .combo.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.2);
        }

        @media (max-width: 768px) {
            .overlay h1 {
                font-size: 32px;
            }
            
            .score {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="ui">
        <div class="score">スコア: <span id="score">0</span></div>
        <div class="lives" id="lives"></div>
        <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>
    </div>

    <div class="combo" id="combo"></div>

    <div class="overlay" id="startOverlay">
        <h1>✨ パーティクルキャッチ</h1>
        <p>落ちてくる光の粒子をキャッチ！<br>赤い粒子は避けてね</p>
        <button class="start-btn" id="startBtn">スタート</button>
    </div>

    <div class="overlay hidden" id="gameOverOverlay">
        <h1>ゲームオーバー</h1>
        <div class="game-over-stats">
            スコア: <span id="finalScore">0</span>
        </div>
        <button class="start-btn" id="restartBtn">もう一度</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let particles = [];
        let player;
        let score = 0;
        let lives = 3;
        let gameRunning = false;
        let combo = 0;
        let comboTimeout;
        let spawnRate = 60;
        let frameCount = 0;
        let difficulty = 1;

        const goodColors = ['#00ffff', '#ff00ff', '#ffff00', '#00ff00'];
        const badColor = '#ff0000';

        class Player {
            constructor() {
                this.width = 80;
                this.height = 15;
                this.x = width / 2 - this.width / 2;
                this.y = height - 50;
                this.speed = 8;
                this.targetX = this.x;
                this.glow = 20;
            }

            update() {
                // スムーズな移動
                this.x += (this.targetX - this.x) * 0.15;
                
                // 画面内に制限
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > width) this.x = width - this.width;
            }

            draw() {
                ctx.save();
                
                // 光の効果
                ctx.shadowBlur = this.glow;
                ctx.shadowColor = '#fff';
                
                // グラデーション
                const gradient = ctx.createLinearGradient(this.x, this.y, this.x, this.y + this.height);
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
                gradient.addColorStop(1, 'rgba(200, 200, 255, 0.6)');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(this.x, this.y, this.width, this.height, 8);
                ctx.fill();
                
                ctx.restore();
            }
        }

        class Particle {
            constructor() {
                this.radius = Math.random() * 15 + 10;
                this.x = Math.random() * (width - this.radius * 2) + this.radius;
                this.y = -this.radius;
                this.speed = (Math.random() * 2 + 1) * difficulty;
                this.isBad = Math.random() < 0.2;
                this.color = this.isBad ? badColor : goodColors[Math.floor(Math.random() * goodColors.length)];
                this.glow = 15;
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
            }

            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;
                return this.y < height + this.radius;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                // 光の効果
                ctx.shadowBlur = this.glow;
                ctx.shadowColor = this.color;
                
                // 粒子
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius);
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
                gradient.addColorStop(0.5, this.color);
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }

        function spawnParticle() {
            particles.push(new Particle());
        }

        function checkCollisions() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                
                // プレイヤーとの衝突
                if (p.y + p.radius >= player.y && 
                    p.y - p.radius <= player.y + player.height &&
                    p.x >= player.x && 
                    p.x <= player.x + player.width) {
                    
                    if (p.isBad) {
                        // 悪い粒子
                        lives--;
                        combo = 0;
                        updateLives();
                        
                        if (lives <= 0) {
                            gameOver();
                        }
                    } else {
                        // 良い粒子
                        combo++;
                        score += 10 * combo;
                        updateScore();
                        showCombo();
                    }
                    
                    particles.splice(i, 1);
                    continue;
                }
                
                // 画面外に出た
                if (p.y - p.radius > height) {
                    if (!p.isBad) {
                        combo = 0;
                    }
                    particles.splice(i, 1);
                }
            }
        }

        function showCombo() {
            if (combo >= 3) {
                const comboEl = document.getElementById('combo');
                comboEl.textContent = `${combo} COMBO!`;
                comboEl.classList.add('show');
                
                clearTimeout(comboTimeout);
                comboTimeout = setTimeout(() => {
                    comboEl.classList.remove('show');
                }, 500);
            }
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        function updateLives() {
            const livesEl = document.getElementById('lives');
            livesEl.innerHTML = '';
            for (let i = 0; i < lives; i++) {
                livesEl.innerHTML += '<span class="heart">❤️</span>';
            }
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        function startGame() {
            score = 0;
            lives = 3;
            combo = 0;
            difficulty = 1;
            spawnRate = 60;
            particles = [];
            player = new Player();
            
            updateScore();
            updateLives();
            
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');
            
            gameRunning = true;
            animate();
        }

        function animate() {
            if (!gameRunning) return;

            // 背景
            ctx.fillStyle = 'rgba(26, 26, 46, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // プレイヤー
            player.update();
            player.draw();

            // 粒子の生成
            frameCount++;
            if (frameCount >= spawnRate) {
                spawnParticle();
                frameCount = 0;
            }

            // 難易度上昇
            if (score > 0 && score % 100 === 0) {
                difficulty = 1 + Math.floor(score / 100) * 0.1;
                spawnRate = Math.max(20, 60 - Math.floor(score / 100) * 5);
            }

            // 粒子の更新・描画
            particles = particles.filter(p => p.update());
            particles.forEach(p => p.draw());

            // 衝突判定
            checkCollisions();

            requestAnimationFrame(animate);
        }

        // イベントリスナー
        canvas.addEventListener('mousemove', (e) => {
            if (player) {
                player.targetX = e.clientX - player.width / 2;
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (player) {
                const touch = e.touches[0];
                player.targetX = touch.clientX - player.width / 2;
            }
        });

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            if (player) {
                player.y = height - 50;
            }
        });

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // 初期化
        player = new Player();
        updateLives();
    </script>
</body>
</html>
