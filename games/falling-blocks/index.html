<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Falling Blocks Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            touch-action: manipulation;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 1.8rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .score {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 15px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        #gameCanvas {
            border: 3px solid #fff;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background: #1a1a2e;
            max-width: 100%;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: rgba(255,255,255,0.2);
            color: #fff;
            border: 2px solid #fff;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            font-weight: bold;
        }

        button:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            border: 2px solid #fff;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            z-index: 100;
        }

        .info {
            color: rgba(255,255,255,0.8);
            margin-top: 15px;
            font-size: 0.85rem;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.4rem;
            }

            .score {
                font-size: 1rem;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }

            .controls {
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <h1>🎮 Falling Blocks</h1>
        <p class="score">スコア: <span id="score">0</span></p>
        <canvas id="gameCanvas" width="300" height="400"></canvas>
        
        <div class="controls">
            <button onclick="startGame()">▶ スタート</button>
            <button onmousedown="moveLeft()" ontouchstart="moveLeft()">⬅ 左</button>
            <button onmousedown="moveRight()" ontouchstart="moveRight()">➡ 右</button>
            <button onmousedown="rotate()" ontouchstart="rotate()">🔄 回転</button>
            <button onmousedown="drop()" ontouchstart="drop()">⬇ 落下</button>
        </div>
        
        <p class="info">PC: 矢印キーで操作<br>モバイル: ボタンをタップ</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;

        // テトリミノ
        const TETROMINOES = [
            [[1,1,1,1]],                    // I
            [[1,1],[1,1]],                  // O
            [[0,1,0],[1,1,1]],              // T
            [[1,0,0],[1,1,1]],              // L
            [[0,0,1],[1,1,1]],              // J
            [[0,1,1],[1,1,0]],              // S
            [[1,1,0],[0,1,1]]               // Z
        ];

        const COLORS = [
            '#00f5ff', // Cyan (I)
            '#ffff00', // Yellow (O)
            '#a855f7', // Purple (T)
            '#ff9500', // Orange (L)
            '#3b82f6', // Blue (J)
            '#22c55e', // Green (S)
            '#ef4444'  // Red (Z)
        ];

        let board = [];
        let currentPiece = null;
        let currentX = 0;
        let currentY = 0;
        let score = 0;
        let gameRunning = false;
        let gameLoop = null;

        // ボード初期化
        function initBoard() {
            board = [];
            for (let row = 0; row < ROWS; row++) {
                board[row] = [];
                for (let col = 0; col < COLS; col++) {
                    board[row][col] = 0;
                }
            }
        }

        // 新しいピースを生成
        function newPiece() {
            const index = Math.floor(Math.random() * TETROMINOES.length);
            currentPiece = TETROMINOES[index].map(row => [...row]);
            currentX = Math.floor(COLS / 2) - Math.floor(currentPiece[0].length / 2);
            currentY = 0;

            if (!isValidPosition(currentX, currentY, currentPiece)) {
                gameOver();
            }
        }

        // 位置チェック
        function isValidPosition(x, y, piece) {
            for (let row = 0; row < piece.length; row++) {
                for (let col = 0; col < piece[row].length; col++) {
                    if (piece[row][col]) {
                        const newX = x + col;
                        const newY = y + row;

                        if (newX < 0 || newX >= COLS || newY >= ROWS) {
                            return false;
                        }

                        if (newY >= 0 && board[newY][newX]) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }

        // 回転
        function rotatePiece(piece) {
            const rows = piece.length;
            const cols = piece[0].length;
            const rotated = [];

            for (let col = 0; col < cols; col++) {
                rotated[col] = [];
                for (let row = rows - 1; row >= 0; row--) {
                    rotated[col][rows - 1 - row] = piece[row][col];
                }
            }

            return rotated;
        }

        // ピースを固定
        function lockPiece() {
            const colorIndex = TETROMINOES.findIndex(t => 
                JSON.stringify(t) === JSON.stringify(currentPiece)
            );

            for (let row = 0; row < currentPiece.length; row++) {
                for (let col = 0; col < currentPiece[row].length; col++) {
                    if (currentPiece[row][col]) {
                        if (currentY + row >= 0) {
                            board[currentY + row][currentX + col] = colorIndex + 1;
                        }
                    }
                }
            }

            clearLines();
            newPiece();
        }

        // ライン消去
        function clearLines() {
            let linesCleared = 0;

            for (let row = ROWS - 1; row >= 0; row--) {
                if (board[row].every(cell => cell !== 0)) {
                    board.splice(row, 1);
                    board.unshift(Array(COLS).fill(0));
                    linesCleared++;
                    row++;
                }
            }

            if (linesCleared > 0) {
                score += linesCleared * 100 * linesCleared;
                document.getElementById('score').textContent = score;
            }
        }

        // 描画
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // グリッド
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 0.5;
            for (let row = 0; row <= ROWS; row++) {
                ctx.beginPath();
                ctx.moveTo(0, row * BLOCK_SIZE);
                ctx.lineTo(canvas.width, row * BLOCK_SIZE);
                ctx.stroke();
            }
            for (let col = 0; col <= COLS; col++) {
                ctx.beginPath();
                ctx.moveTo(col * BLOCK_SIZE, 0);
                ctx.lineTo(col * BLOCK_SIZE, canvas.height);
                ctx.stroke();
            }

            // ボード上のブロック
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    if (board[row][col]) {
                        ctx.fillStyle = COLORS[board[row][col] - 1];
                        ctx.fillRect(
                            col * BLOCK_SIZE + 1,
                            row * BLOCK_SIZE + 1,
                            BLOCK_SIZE - 2,
                            BLOCK_SIZE - 2
                        );

                        // 光沢効果
                        ctx.fillStyle = 'rgba(255,255,255,0.2)';
                        ctx.fillRect(
                            col * BLOCK_SIZE + 1,
                            row * BLOCK_SIZE + 1,
                            BLOCK_SIZE - 2,
                            5
                        );
                    }
                }
            }

            // 現在のピース
            if (currentPiece) {
                const colorIndex = TETROMINOES.findIndex(t => 
                    JSON.stringify(t) === JSON.stringify(currentPiece)
                );

                for (let row = 0; row < currentPiece.length; row++) {
                    for (let col = 0; col < currentPiece[row].length; col++) {
                        if (currentPiece[row][col]) {
                            ctx.fillStyle = COLORS[colorIndex];
                            ctx.fillRect(
                                (currentX + col) * BLOCK_SIZE + 1,
                                (currentY + row) * BLOCK_SIZE + 1,
                                BLOCK_SIZE - 2,
                                BLOCK_SIZE - 2
                            );

                            // 光沢効果
                            ctx.fillStyle = 'rgba(255,255,255,0.2)';
                            ctx.fillRect(
                                (currentX + col) * BLOCK_SIZE + 1,
                                (currentY + row) * BLOCK_SIZE + 1,
                                BLOCK_SIZE - 2,
                                5
                            );
                        }
                    }
                }
            }
        }

        // ゲームループ
        function update() {
            if (!gameRunning) return;

            if (isValidPosition(currentX, currentY + 1, currentPiece)) {
                currentY++;
            } else {
                lockPiece();
            }

            draw();
        }

        // ゲーム開始
        function startGame() {
            initBoard();
            score = 0;
            document.getElementById('score').textContent = score;
            gameRunning = true;

            newPiece();
            draw();

            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, 1000);
        }

        // ゲームオーバー
        function gameOver() {
            gameRunning = false;
            if (gameLoop) clearInterval(gameLoop);

            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 24px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Game Over!', canvas.width / 2, canvas.height / 2 - 20);
            ctx.font = '18px sans-serif';
            ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
            ctx.font = '14px sans-serif';
            ctx.fillText('タップでリスタート', canvas.width / 2, canvas.height / 2 + 50);

            canvas.onclick = () => {
                canvas.onclick = null;
                startGame();
            };
        }

        // 移動
        function moveLeft() {
            if (gameRunning && isValidPosition(currentX - 1, currentY, currentPiece)) {
                currentX--;
                draw();
            }
        }

        function moveRight() {
            if (gameRunning && isValidPosition(currentX + 1, currentY, currentPiece)) {
                currentX++;
                draw();
            }
        }

        function rotate() {
            if (gameRunning) {
                const rotated = rotatePiece(currentPiece);
                if (isValidPosition(currentX, currentY, rotated)) {
                    currentPiece = rotated;
                    draw();
                }
            }
        }

        function drop() {
            if (gameRunning) {
                while (isValidPosition(currentX, currentY + 1, currentPiece)) {
                    currentY++;
                }
                lockPiece();
                draw();
            }
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) {
                if (e.code === 'Space') startGame();
                return;
            }

            switch(e.code) {
                case 'ArrowLeft':
                    moveLeft();
                    break;
                case 'ArrowRight':
                    moveRight();
                    break;
                case 'ArrowUp':
                    rotate();
                    break;
                case 'ArrowDown':
                    drop();
                    break;
            }
        });

        // 全画面
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期描画
        initBoard();
        draw();

        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 24px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Falling Blocks', canvas.width / 2, canvas.height / 2 - 20);
        ctx.font = '16px sans-serif';
        ctx.fillText('スタートを押してね', canvas.width / 2, canvas.height / 2 + 20);
    </script>
</body>
</html>
