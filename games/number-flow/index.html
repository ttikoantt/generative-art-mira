<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Flow - Number Puzzle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .game-header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, #e94560, #f39c12, #1dd1a1);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 3s ease infinite;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-label {
            font-size: 0.75rem;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #4ecdc4;
        }

        #timer {
            color: #e94560;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            max-width: 500px;
            width: 100%;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .number-btn {
            aspect-ratio: 1;
            border: none;
            border-radius: 12px;
            font-size: 2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .number-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .number-btn:hover::before {
            opacity: 1;
        }

        .number-btn:active {
            transform: scale(0.95);
        }

        .number-btn.active {
            animation: pulse 0.3s ease;
        }

        .number-btn.correct {
            background: linear-gradient(135deg, #1dd1a1, #10ac84) !important;
            animation: correctPulse 0.5s ease;
        }

        .number-btn.wrong {
            animation: shake 0.5s ease;
        }

        .number-btn.clicked {
            opacity: 0.3;
            cursor: not-allowed;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes correctPulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(29, 209, 161, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(29, 209, 161, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(29, 209, 161, 0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .target-number {
            text-align: center;
            margin-bottom: 20px;
        }

        .target-number span {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        .target-number strong {
            font-size: 3rem;
            font-weight: 700;
            color: #f39c12;
            margin-left: 10px;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-btn {
            padding: 12px 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            letter-spacing: 1px;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.1);
        }

        .control-btn.primary {
            background: linear-gradient(135deg, #e94560, #f39c12);
            border: none;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #e94560, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .overlay p {
            font-size: 1.5rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .overlay .score-display {
            font-size: 4rem;
            font-weight: 700;
            color: #4ecdc4;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .game-board {
                gap: 8px;
                padding: 15px;
            }

            .number-btn {
                font-size: 1.5rem;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            .overlay h2 {
                font-size: 2rem;
            }

            .overlay .score-display {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-header">
            <h1>NUMBER FLOW</h1>
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">Score</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Time</div>
                    <div class="stat-value" id="timer">60</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Level</div>
                    <div class="stat-value" id="level">1</div>
                </div>
            </div>
        </div>

        <div class="target-number">
            <span>Find:</span><strong id="targetNum">1</strong>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="controls">
            <button class="control-btn primary" onclick="startGame()">Start Game</button>
            <button class="control-btn" onclick="resetGame()">Reset</button>
            <button class="control-btn" onclick="fullscreen()">⛶ Full</button>
        </div>
    </div>

    <div class="overlay hidden" id="overlay">
        <h2 id="overlayTitle">Game Over</h2>
        <div class="score-display" id="finalScore">0</div>
        <p id="overlayMessage">Great job!</p>
        <button class="control-btn primary" onclick="closeOverlay()">Play Again</button>
    </div>

    <script>
        let numbers = [];
        let currentNumber = 1;
        let score = 0;
        let level = 1;
        let timeLeft = 60;
        let timerInterval = null;
        let gameActive = false;
        let gridSize = 5;

        const colors = [
            'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
            'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
            'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
            'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
            'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
            'linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)',
            'linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)',
            'linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)',
            'linear-gradient(135deg, #ff0844 0%, #ffb199 100%)',
            'linear-gradient(135deg, #30cfd0 0%, #330867 100%)'
        ];

        function generateNumbers() {
            const count = gridSize * gridSize;
            numbers = [];
            for (let i = 1; i <= count; i++) {
                numbers.push(i);
            }
            shuffleArray(numbers);
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function renderBoard() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;

            numbers.forEach((num, index) => {
                const btn = document.createElement('button');
                btn.className = 'number-btn';
                btn.textContent = num;
                btn.style.background = colors[index % colors.length];
                btn.onclick = () => handleNumberClick(num, btn);
                board.appendChild(btn);
            });
        }

        function handleNumberClick(num, btn) {
            if (!gameActive) return;

            if (num === currentNumber) {
                btn.classList.add('correct');
                btn.classList.add('clicked');

                const baseScore = 10;
                const levelBonus = level * 2;
                score += baseScore + levelBonus;

                document.getElementById('score').textContent = score;

                if (currentNumber === gridSize * gridSize) {
                    levelUp();
                } else {
                    currentNumber++;
                    document.getElementById('targetNum').textContent = currentNumber;
                }
            } else {
                btn.classList.add('wrong');
                score = Math.max(0, score - 5);
                document.getElementById('score').textContent = score;
                setTimeout(() => btn.classList.remove('wrong'), 500);
            }
        }

        function levelUp() {
            level++;
            timeLeft = Math.min(timeLeft + 30, 120);
            document.getElementById('level').textContent = level;

            if (level % 3 === 0 && gridSize < 6) {
                gridSize++;
            }

            currentNumber = 1;
            generateNumbers();
            renderBoard();
            document.getElementById('targetNum').textContent = currentNumber;
        }

        function startGame() {
            if (gameActive) return;

            gameActive = true;
            score = 0;
            level = 1;
            timeLeft = 60;
            gridSize = 5;
            currentNumber = 1;

            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('timer').textContent = timeLeft;
            document.getElementById('targetNum').textContent = currentNumber;

            generateNumbers();
            renderBoard();

            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function resetGame() {
            gameActive = false;
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }

            score = 0;
            level = 1;
            timeLeft = 60;
            gridSize = 5;
            currentNumber = 1;

            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('timer').textContent = timeLeft;
            document.getElementById('targetNum').textContent = currentNumber;

            generateNumbers();
            renderBoard();
        }

        function endGame() {
            gameActive = false;
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('overlayTitle').textContent = 'Game Over';
            document.getElementById('overlayMessage').textContent = score > 500 ? 'Amazing!' : score > 300 ? 'Great job!' : 'Keep practicing!';
            document.getElementById('overlay').classList.remove('hidden');
        }

        function closeOverlay() {
            document.getElementById('overlay').classList.add('hidden');
            resetGame();
        }

        function fullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        generateNumbers();
        renderBoard();
    </script>
</body>
</html>
