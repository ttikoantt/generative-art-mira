<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Timing Master</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .rhythm-circle {
            width: 280px;
            height: 280px;
            margin: 20px auto;
            position: relative;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3),
                        inset 0 0 60px rgba(255, 255, 255, 0.1);
        }

        .rhythm-circle:active {
            transform: scale(0.95);
        }

        .beat-indicator {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.8);
            animation: none;
        }

        .beat-indicator.beat {
            animation: beatPulse 0.3s ease-out;
        }

        @keyframes beatPulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(1.3);
                opacity: 0;
            }
        }

        .center-circle {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .feedback {
            position: absolute;
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            animation: feedbackPop 0.5s ease-out forwards;
        }

        @keyframes feedbackPop {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            50% {
                transform: scale(1.2);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 0;
            }
        }

        .feedback.perfect {
            color: #ffd700;
        }

        .feedback.great {
            color: #00ff88;
        }

        .feedback.good {
            color: #00ccff;
        }

        .feedback.miss {
            color: #ff4444;
        }

        .instructions {
            color: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            margin-top: 20px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .combo {
            position: absolute;
            font-size: 16px;
            color: #ffd700;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .game-over.show {
            display: flex;
        }

        .game-over-content {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .game-over h2 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 48px;
            font-weight: bold;
            color: #764ba2;
            margin-bottom: 10px;
        }

        .final-max-combo {
            font-size: 24px;
            color: #666;
            margin-bottom: 30px;
        }

        .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .restart-btn:hover {
            transform: scale(1.05);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .lives {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .heart {
            font-size: 24px;
            filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.3));
        }

        .heart.lost {
            opacity: 0.2;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎵 Rhythm Timing Master</h1>

        <div class="lives">
            <span class="heart" id="heart1">❤️</span>
            <span class="heart" id="heart2">❤️</span>
            <span class="heart" id="heart3">❤️</span>
        </div>

        <div class="stats">
            <div class="stat">
                <div id="score">0</div>
                <div style="font-size: 14px; margin-top: 5px;">SCORE</div>
            </div>
            <div class="stat">
                <div id="combo">0</div>
                <div style="font-size: 14px; margin-top: 5px;">COMBO</div>
            </div>
        </div>

        <div class="rhythm-circle" id="rhythmCircle">
            <div class="beat-indicator" id="beatIndicator"></div>
            <div class="center-circle" id="centerCircle">
                TAP!
            </div>
            <div class="combo" id="comboDisplay" style="display: none;"></div>
        </div>

        <div class="instructions">
            ⚡ 円のエッジが光るタイミングでタップ！<br>
            BPM: <span id="bpmDisplay">100</span>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-over" id="gameOver">
        <div class="game-over-content">
            <h2>🎵 ゲームオーバー 🎵</h2>
            <div class="final-score" id="finalScore">0</div>
            <div class="final-max-combo" id="finalMaxCombo">Max Combo: 0</div>
            <div style="margin-bottom: 20px; color: #666;" id="accuracyDisplay"></div>
            <button class="restart-btn" onclick="restartGame()">もう一度プレイ</button>
        </div>
    </div>

    <script>
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let lives = 3;
        let bpm = 100;
        let beatInterval = 60000 / bpm;
        let lastBeatTime = 0;
        let tapTimes = [];
        let totalTaps = 0;
        let perfectHits = 0;
        let greatHits = 0;
        let goodHits = 0;
        let missHits = 0;
        let gameRunning = true;
        let audioContext = null;

        const rhythmCircle = document.getElementById('rhythmCircle');
        const beatIndicator = document.getElementById('beatIndicator');
        const centerCircle = document.getElementById('centerCircle');
        const scoreDisplay = document.getElementById('score');
        const comboDisplay = document.getElementById('combo');
        const comboCircleDisplay = document.getElementById('comboDisplay');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScore = document.getElementById('finalScore');
        const finalMaxCombo = document.getElementById('finalMaxCombo');
        const accuracyDisplay = document.getElementById('accuracyDisplay');
        const bpmDisplay = document.getElementById('bpmDisplay');

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playBeatSound() {
            initAudio();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 440;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.1);
        }

        function playHitSound(rating) {
            initAudio();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            const frequencies = {
                'perfect': 880,
                'great': 660,
                'good': 550,
                'miss': 220
            };

            oscillator.frequency.value = frequencies[rating] || 440;
            oscillator.type = rating === 'miss' ? 'sawtooth' : 'sine';

            gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.15);
        }

        function showBeat() {
            if (!gameRunning) return;

            beatIndicator.classList.remove('beat');
            void beatIndicator.offsetWidth;
            beatIndicator.classList.add('beat');

            playBeatSound();
            lastBeatTime = Date.now();
        }

        function startBeat() {
            showBeat();
            setInterval(showBeat, beatInterval);
        }

        function getTimingAccuracy() {
            const now = Date.now();
            const timeSinceBeat = now - lastBeatTime;
            const timeToNextBeat = beatInterval - timeSinceBeat;
            const closestBeat = Math.min(timeSinceBeat, timeToNextBeat);

            if (closestBeat <= 50) return 'perfect';
            if (closestBeat <= 100) return 'great';
            if (closestBeat <= 150) return 'good';
            return 'miss';
        }

        function showFeedback(rating) {
            const feedback = document.createElement('div');
            feedback.className = `feedback ${rating}`;

            const texts = {
                'perfect': '🌟 PERFECT!',
                'great': '✨ GREAT!',
                'good': '👍 GOOD',
                'miss': '💨 MISS'
            };

            feedback.textContent = texts[rating];

            const rect = rhythmCircle.getBoundingClientRect();
            feedback.style.left = rect.left + rect.width / 2 - 50 + 'px';
            feedback.style.top = rect.top + rect.height / 2 - 30 + 'px';

            document.body.appendChild(feedback);

            setTimeout(() => {
                feedback.remove();
            }, 500);
        }

        function updateLives() {
            for (let i = 1; i <= 3; i++) {
                const heart = document.getElementById(`heart${i}`);
                if (i <= lives) {
                    heart.classList.remove('lost');
                } else {
                    heart.classList.add('lost');
                }
            }
        }

        function handleTap() {
            if (!gameRunning) return;

            initAudio();

            const rating = getTimingAccuracy();
            totalTaps++;

            playHitSound(rating);
            showFeedback(rating);

            switch(rating) {
                case 'perfect':
                    score += 100 * (1 + combo * 0.1);
                    combo++;
                    perfectHits++;
                    centerCircle.style.background = '#ffd700';
                    break;
                case 'great':
                    score += 75 * (1 + combo * 0.1);
                    combo++;
                    greatHits++;
                    centerCircle.style.background = '#00ff88';
                    break;
                case 'good':
                    score += 50 * (1 + combo * 0.05);
                    combo++;
                    goodHits++;
                    centerCircle.style.background = '#00ccff';
                    break;
                case 'miss':
                    combo = 0;
                    lives--;
                    missHits++;
                    centerCircle.style.background = '#ff4444';
                    break;
            }

            if (combo > maxCombo) {
                maxCombo = combo;
            }

            setTimeout(() => {
                centerCircle.style.background = 'white';
            }, 100);

            scoreDisplay.textContent = Math.floor(score);
            comboDisplay.textContent = combo;

            if (combo >= 5) {
                comboCircleDisplay.style.display = 'block';
                comboCircleDisplay.textContent = `${combo} COMBO!`;
            } else {
                comboCircleDisplay.style.display = 'none';
            }

            updateLives();

            // 10点ごとにBPMを上げる
            if (totalTaps % 10 === 0 && bpm < 180) {
                bpm += 5;
                beatInterval = 60000 / bpm;
                bpmDisplay.textContent = bpm;
            }

            if (lives <= 0) {
                endGame();
            }
        }

        function endGame() {
            gameRunning = false;
            finalScore.textContent = Math.floor(score);
            finalMaxCombo.textContent = `Max Combo: ${maxCombo}`;

            const accuracy = totalTaps > 0 ?
                ((perfectHits + greatHits + goodHits) / totalTaps * 100).toFixed(1) : 0;
            accuracyDisplay.textContent =
                `Accuracy: ${accuracy}% (Perfect: ${perfectHits}, Great: ${greatHits}, Good: ${goodHits}, Miss: ${missHits})`;

            gameOverScreen.classList.add('show');
        }

        function restartGame() {
            score = 0;
            combo = 0;
            maxCombo = 0;
            lives = 3;
            bpm = 100;
            beatInterval = 60000 / bpm;
            totalTaps = 0;
            perfectHits = 0;
            greatHits = 0;
            goodHits = 0;
            missHits = 0;
            gameRunning = true;

            scoreDisplay.textContent = '0';
            comboDisplay.textContent = '0';
            bpmDisplay.textContent = bpm;
            comboCircleDisplay.style.display = 'none';
            gameOverScreen.classList.remove('show');

            updateLives();

            // Reset beat timing
            lastBeatTime = 0;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        rhythmCircle.addEventListener('click', handleTap);
        rhythmCircle.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleTap();
        }, { passive: false });

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault();
                handleTap();
            }
        });

        // ゲーム開始
        setTimeout(startBeat, 1000);
    </script>
</body>
</html>
