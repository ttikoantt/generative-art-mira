<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Avoidance - Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            z-index: 10;
        }

        #gameCanvas {
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            cursor: none;
        }

        .info {
            color: #fff;
            margin-top: 1rem;
            font-size: 0.9rem;
            opacity: 0.7;
            z-index: 10;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <h1>Mouse Avoidance</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <p class="info">マウスを動かして敵を回避！</p>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Canvasサイズ調整
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 800);
            const maxHeight = Math.min(window.innerHeight - 200, 600);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // プレイヤー
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 15,
            color: '#4ecdc4',
            speed: 0
        };

        // 敵の配列
        let enemies = [];
        let spawnRate = 120; // フレーム数
        let frameCount = 0;
        let score = 0;
        let gameOver = false;
        let maxEnemies = 8;

        // 敵クラス
        class Enemy {
            constructor() {
                // ランダムな位置にスポーン（プレイヤーから離れた場所）
                let spawnX, spawnY;
                const minDistance = 200;

                do {
                    spawnX = Math.random() * canvas.width;
                    spawnY = Math.random() * canvas.height;
                } while (Math.hypot(spawnX - player.x, spawnY - player.y) < minDistance);

                this.x = spawnX;
                this.y = spawnY;
                this.radius = Math.random() * 15 + 10;
                this.speed = Math.random() * 2 + 1;
                this.hue = Math.random() * 60 + 200; // 青系
                this.angle = 0;
            }

            update() {
                // プレイヤーを追跡
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance > 0) {
                    this.x += (dx / distance) * this.speed;
                    this.y += (dy / distance) * this.speed;
                }

                this.angle += 0.05;
                this.draw();
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // 敵の体
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius);
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 60%, 1)`);
                gradient.addColorStop(1, `hsla(${this.hue}, 70%, 40%, 0.8)`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                // スパイク形状
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const innerRadius = this.radius * 0.5;
                    const x = Math.cos(angle) * this.radius;
                    const y = Math.sin(angle) * this.radius;
                    const innerX = Math.cos(angle + Math.PI / 8) * innerRadius;
                    const innerY = Math.sin(angle + Math.PI / 8) * innerRadius;

                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                    ctx.lineTo(innerX, innerY);
                }
                ctx.closePath();
                ctx.fill();

                // 目
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(-5, -5, 3, 0, Math.PI * 2);
                ctx.arc(5, -5, 3, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(-5, -5, 1.5, 0, Math.PI * 2);
                ctx.arc(5, -5, 1.5, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        // プレイヤーを描画
        function drawPlayer() {
            ctx.save();

            // グロー
            ctx.shadowColor = player.color;
            ctx.shadowBlur = 20;

            // プレイヤーの体
            const gradient = ctx.createRadialGradient(
                player.x, player.y, 0,
                player.x, player.y, player.radius
            );
            gradient.addColorStop(0, '#4ecdc4');
            gradient.addColorStop(1, '#44a399');

            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();

            // ハイライト
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.beginPath();
            ctx.arc(player.x - 5, player.y - 5, 5, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // スコアを描画
        function drawScore() {
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`Score: ${score}`, 20, 40);
            ctx.font = '16px Arial';
            ctx.fillText(`Enemies: ${enemies.length}`, 20, 70);
        }

        // ゲームオーバー画面
        function drawGameOver() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 50);

            ctx.font = '24px Arial';
            ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2 + 20);

            ctx.font = '18px Arial';
            ctx.fillStyle = '#aaa';
            ctx.fillText('クリックで再起動', canvas.width / 2, canvas.height / 2 + 70);
        }

        // 衝突検知
        function checkCollision(enemy) {
            const dx = player.x - enemy.x;
            const dy = player.y - enemy.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < player.radius + enemy.radius;
        }

        // ゲームループ
        function gameLoop() {
            if (gameOver) {
                drawGameOver();
                return;
            }

            // 背景
            ctx.fillStyle = 'rgba(15, 12, 41, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // スコア更新
            score++;
            frameCount++;

            // 敵をスポーン
            if (frameCount % spawnRate === 0 && enemies.length < maxEnemies) {
                enemies.push(new Enemy());
                // 徐々に難易度アップ
                if (spawnRate > 60) spawnRate--;
            }

            // 敵を更新
            enemies.forEach(enemy => {
                enemy.update();

                if (checkCollision(enemy)) {
                    gameOver = true;
                }
            });

            // プレイヤーを描画
            drawPlayer();

            // スコアを描画
            drawScore();

            requestAnimationFrame(gameLoop);
        }

        // マウス追跡
        canvas.addEventListener('mousemove', (e) => {
            if (gameOver) return;

            const rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left;
            player.y = e.clientY - rect.top;
        });

        // タッチ対応
        canvas.addEventListener('touchmove', (e) => {
            if (gameOver) return;
            e.preventDefault();

            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            player.x = touch.clientX - rect.left;
            player.y = touch.clientY - rect.top;
        });

        // 再起動
        canvas.addEventListener('click', () => {
            if (gameOver) {
                restart();
            }
        });

        // 再起動関数
        function restart() {
            enemies = [];
            score = 0;
            gameOver = false;
            spawnRate = 120;
            frameCount = 0;
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            gameLoop();
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ゲーム開始
        gameLoop();
    </script>
</body>
</html>
