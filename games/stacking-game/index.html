<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Stack - ネオンスタック</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', 'Arial Black', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            text-align: center;
            position: relative;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .score {
            font-size: 48px;
            color: #00f7ff;
            text-shadow: 0 0 20px #00f7ff, 0 0 40px #00f7ff;
            margin-bottom: 10px;
        }

        .high-score {
            font-size: 16px;
            color: #ff6b9d;
            text-shadow: 0 0 10px #ff6b9d;
            margin-bottom: 20px;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        canvas {
            border: 3px solid #00f7ff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 247, 255, 0.5),
                        inset 0 0 30px rgba(0, 247, 255, 0.1);
            background: rgba(0, 0, 0, 0.5);
            max-width: 100%;
        }

        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            color: white;
            text-shadow: 0 0 20px #ff6b9d;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            text-align: center;
            width: 100%;
        }

        .message.show {
            opacity: 1;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 247, 255, 0.2);
            border: 2px solid #00f7ff;
            color: #00f7ff;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
            z-index: 100;
            text-transform: uppercase;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 247, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 247, 255, 0.5);
        }

        .instructions {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .score {
                font-size: 36px;
            }

            .high-score {
                font-size: 14px;
            }

            .fullscreen-btn {
                padding: 8px 16px;
                font-size: 12px;
                top: 10px;
                right: 10px;
            }

            .instructions {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <div class="score" id="score">0</div>
        <div class="high-score">BEST: <span id="highScore">0</span></div>

        <div class="canvas-container">
            <canvas id="canvas" width="300" height="400"></canvas>
            <div class="message" id="message"></div>
        </div>

        <div class="instructions">
            タップでブロックをストック！<br>
            完美なタイミングで積み上げろ
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const messageEl = document.getElementById('message');

        const COLORS = [
            '#FF6B9D', '#C44DFF', '#4D79FF', '#4DFFFF',
            '#4DFFB8', '#FFE84D', '#FF6B4D', '#FF4DFF'
        ];

        let stack = [];
        let currentBlock = null;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('neonStackHighScore')) || 0;
        let gameOver = false;
        let direction = 1;
        let speed = 3;
        let baseWidth = 200;
        let blockHeight = 30;

        highScoreEl.textContent = highScore;

        function init() {
            stack = [];
            score = 0;
            gameOver = false;
            speed = 3;
            direction = 1;
            scoreEl.textContent = '0';

            // 基礎ブロック
            stack.push({
                x: (canvas.width - baseWidth) / 2,
                y: canvas.height - blockHeight,
                width: baseWidth,
                height: blockHeight,
                color: COLORS[0]
            });

            createNewBlock();
            requestAnimationFrame(gameLoop);
        }

        function createNewBlock() {
            const lastBlock = stack[stack.length - 1];
            currentBlock = {
                x: direction === 1 ? -lastBlock.width : canvas.width,
                y: lastBlock.y - blockHeight,
                width: lastBlock.width,
                height: blockHeight,
                color: COLORS[stack.length % COLORS.length]
            };

            if (currentBlock.y < blockHeight) {
                endGame(true);
            }
        }

        function update() {
            if (gameOver || !currentBlock) return;

            currentBlock.x += speed * direction;

            if (currentBlock.x + currentBlock.width > canvas.width) {
                direction = -1;
            } else if (currentBlock.x < 0) {
                direction = 1;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // スタックを描画
            stack.forEach(block => {
                drawBlock(block);
            });

            // 現在のブロックを描画
            if (currentBlock && !gameOver) {
                drawBlock(currentBlock);
            }
        }

        function drawBlock(block) {
            // ネオン効果
            ctx.shadowBlur = 20;
            ctx.shadowColor = block.color;

            // グラデーション
            const gradient = ctx.createLinearGradient(
                block.x, block.y,
                block.x, block.y + block.height
            );
            gradient.addColorStop(0, block.color);
            gradient.addColorStop(1, shadeColor(block.color, -30));

            ctx.fillStyle = gradient;
            ctx.fillRect(block.x, block.y, block.width, block.height);

            // ハイライト
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(block.x, block.y, block.width, 3);

            // ボーダー
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 1;
            ctx.strokeRect(block.x, block.y, block.width, block.height);
        }

        function shadeColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt;
            const G = (num >> 8 & 0x00FF) + amt;
            const B = (num & 0x0000FF) + amt;
            return '#' + (0x1000000 +
                (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
                (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
                (B < 255 ? B < 1 ? 0 : B : 255)
            ).toString(16).slice(1);
        }

        function placeBlock() {
            if (gameOver || !currentBlock) return;

            const lastBlock = stack[stack.length - 1];
            const overlap = Math.min(
                currentBlock.x + currentBlock.width,
                lastBlock.x + lastBlock.width
            ) - Math.max(
                currentBlock.x,
                lastBlock.x
            );

            if (overlap <= 0) {
                endGame(false);
                return;
            }

            // 完璧な配置
            if (Math.abs(currentBlock.x - lastBlock.x) < 3) {
                currentBlock.x = lastBlock.x;
                showMessage('PERFECT!', '#00f7ff');
            }

            // オーバーラップ部分をカット
            currentBlock.width = overlap;
            if (currentBlock.x < lastBlock.x) {
                currentBlock.x = lastBlock.x;
            }

            stack.push({...currentBlock});
            score++;
            scoreEl.textContent = score;

            // スピードアップ
            if (score % 5 === 0) {
                speed += 0.5;
            }

            createNewBlock();
        }

        function showMessage(text, color) {
            messageEl.textContent = text;
            messageEl.style.color = color;
            messageEl.style.textShadow = `0 0 20px ${color}`;
            messageEl.classList.add('show');
            setTimeout(() => {
                messageEl.classList.remove('show');
            }, 500);
        }

        function endGame(won) {
            gameOver = true;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('neonStackHighScore', highScore);
                highScoreEl.textContent = highScore;
                showMessage('NEW HIGH SCORE!', '#ffe84d');
            } else if (won) {
                showMessage('YOU WIN!', '#4dff88');
            } else {
                showMessage('GAME OVER', '#ff6b9d');
            }

            setTimeout(() => {
                init();
            }, 2000);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        canvas.addEventListener('click', placeBlock);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            placeBlock();
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                placeBlock();
            }
        });

        init();
    </script>
</body>
</html>
