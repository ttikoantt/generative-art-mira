<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tile Breaker | Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            color: #fff;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
        }

        .stat {
            text-align: center;
            color: #fff;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .stat-label {
            font-size: 0.8rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .tile {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        .tile::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent,
                rgba(255, 255, 255, 0.1),
                transparent
            );
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .tile:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .tile:active {
            transform: scale(0.95);
        }

        .tile.breaking {
            animation: break 0.3s ease-out forwards;
        }

        @keyframes break {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.2);
                opacity: 0.5;
            }
            100% {
                transform: scale(0);
                opacity: 0;
            }
        }

        .tile.special {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .tile.golden {
            background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%);
            animation: glow 0.5s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
            to { box-shadow: 0 0 30px rgba(255, 215, 0, 0.8); }
        }

        .combo-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            pointer-events: none;
            z-index: 100;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .combo-display.show {
            opacity: 1;
            animation: comboPopup 0.5s ease-out;
        }

        @keyframes comboPopup {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        .timer {
            text-align: center;
            color: #fff;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 200;
            color: #fff;
        }

        .game-over.show {
            display: flex;
        }

        .game-over h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 4rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            margin-bottom: 30px;
        }

        .new-record {
            color: #f5576c;
            font-size: 1.5rem;
            margin-bottom: 20px;
            animation: pulse 1s ease-in-out infinite;
        }

        .tap-effect {
            position: absolute;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.8) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: tapEffect 0.3s ease-out forwards;
        }

        @keyframes tapEffect {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(3);
                opacity: 0;
            }
        }

        .score-popup {
            position: absolute;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
            pointer-events: none;
            animation: scorePopup 0.5s ease-out forwards;
        }

        @keyframes scorePopup {
            0% {
                transform: translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-30px);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreen-btn">⛶ 全画面</button>

    <div class="game-container">
        <div class="header">
            <h1>🔨 Tile Breaker</h1>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="score">0</div>
                    <div class="stat-label">Score</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="combo">0</div>
                    <div class="stat-label">Combo</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="high-score">0</div>
                    <div class="stat-label">Best</div>
                </div>
            </div>
        </div>

        <div class="timer" id="timer">Time: 60s</div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>

        <div class="game-board" id="game-board"></div>

        <div class="controls">
            <button class="btn btn-primary" id="start-btn">▶ Start Game</button>
        </div>
    </div>

    <div class="combo-display" id="combo-display"></div>

    <div class="game-over" id="game-over">
        <h2>Game Over!</h2>
        <div class="new-record" id="new-record">🎉 New Record!</div>
        <div class="final-score" id="final-score">0</div>
        <button class="btn btn-primary" id="restart-btn">Play Again</button>
    </div>

    <script>
        const gameBoard = document.getElementById('game-board');
        const scoreDisplay = document.getElementById('score');
        const comboDisplay = document.getElementById('combo');
        const highScoreDisplay = document.getElementById('high-score');
        const timerDisplay = document.getElementById('timer');
        const progressFill = document.getElementById('progress');
        const comboPopup = document.getElementById('combo-display');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreDisplay = document.getElementById('final-score');
        const newRecordDisplay = document.getElementById('new-record');
        const fullscreenBtn = document.getElementById('fullscreen-btn');

        let tiles = [];
        let score = 0;
        let combo = 0;
        let highScore = parseInt(localStorage.getItem('tileBreakerHighScore')) || 0;
        let gameTime = 60;
        let currentTime = 0;
        let gameInterval = null;
        let comboTimeout = null;
        let isPlaying = false;

        const tileValues = [1, 2, 3, 5, 8, 13];
        const tileEmojis = ['💎', '⭐', '🔥', '💫', '🌟', '✨'];

        function init() {
            highScoreDisplay.textContent = highScore;
            createTiles();
        }

        function createTiles() {
            gameBoard.innerHTML = '';
            tiles = [];

            for (let i = 0; i < 16; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';

                const valueIndex = Math.floor(Math.random() * tileValues.length);
                const value = tileValues[valueIndex];

                tile.dataset.value = value;
                tile.dataset.index = i;
                tile.textContent = tileEmojis[valueIndex];

                const isSpecial = Math.random() < 0.1;
                const isGolden = Math.random() < 0.05;

                if (isGolden) {
                    tile.classList.add('golden');
                    tile.dataset.value = value * 5;
                    tile.textContent = '👑';
                } else if (isSpecial) {
                    tile.classList.add('special');
                    tile.dataset.value = value * 3;
                }

                tile.addEventListener('click', handleTileClick);
                tile.addEventListener('touchstart', handleTileClick, { passive: true });

                gameBoard.appendChild(tile);
                tiles.push(tile);
            }
        }

        function handleTileClick(e) {
            if (!isPlaying) return;
            if (e.target.classList.contains('breaking')) return;

            e.preventDefault();
            const tile = e.target;
            const value = parseInt(tile.dataset.value);

            // Clear combo timeout
            if (comboTimeout) clearTimeout(comboTimeout);

            // Increment combo
            combo++;
            comboDisplay.textContent = combo;

            // Calculate score with combo multiplier
            const comboMultiplier = 1 + (combo - 1) * 0.1;
            const points = Math.floor(value * comboMultiplier);
            score += points;
            scoreDisplay.textContent = score;

            // Show combo popup
            if (combo > 1) {
                showComboPopup(combo);
            }

            // Show tap effect
            showTapEffect(e.clientX || e.touches[0].clientX, e.clientY || e.touches[0].clientY);
            showScorePopup(e.target, points);

            // Break tile animation
            tile.classList.add('breaking');

            // Reset combo timeout
            comboTimeout = setTimeout(() => {
                combo = 0;
                comboDisplay.textContent = combo;
            }, 1500);

            // Check if all tiles are broken
            setTimeout(() => {
                if (tiles.every(t => t.classList.contains('breaking'))) {
                    createTiles();
                }
            }, 350);
        }

        function showComboPopup(combo) {
            comboPopup.textContent = `${combo}x Combo!`;
            comboPopup.classList.remove('show');
            void comboPopup.offsetWidth;
            comboPopup.classList.add('show');
        }

        function showTapEffect(x, y) {
            const effect = document.createElement('div');
            effect.className = 'tap-effect';
            effect.style.left = `${x - 10}px`;
            effect.style.top = `${y - 10}px`;
            document.body.appendChild(effect);

            setTimeout(() => effect.remove(), 300);
        }

        function showScorePopup(element, points) {
            const rect = element.getBoundingClientRect();
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.textContent = `+${points}`;
            popup.style.left = `${rect.left + rect.width / 2}px`;
            popup.style.top = `${rect.top}px`;
            document.body.appendChild(popup);

            setTimeout(() => popup.remove(), 500);
        }

        function startGame() {
            score = 0;
            combo = 0;
            currentTime = gameTime;
            isPlaying = true;

            scoreDisplay.textContent = score;
            comboDisplay.textContent = combo;
            startBtn.textContent = 'Playing...';
            startBtn.disabled = true;
            startBtn.style.opacity = '0.5';

            createTiles();
            updateTimer();

            gameInterval = setInterval(() => {
                currentTime--;
                updateTimer();

                if (currentTime <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameInterval);

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('tileBreakerHighScore', highScore);
                highScoreDisplay.textContent = highScore;
                newRecordDisplay.style.display = 'block';
            } else {
                newRecordDisplay.style.display = 'none';
            }

            finalScoreDisplay.textContent = score;
            gameOverScreen.classList.add('show');
            startBtn.textContent = '▶ Start Game';
            startBtn.disabled = false;
            startBtn.style.opacity = '1';
        }

        function updateTimer() {
            timerDisplay.textContent = `Time: ${currentTime}s`;
            const progress = (currentTime / gameTime) * 100;
            progressFill.style.width = `${progress}%`;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                fullscreenBtn.textContent = '⛶ 元に戻す';
            } else {
                document.exitFullscreen();
                fullscreenBtn.textContent = '⛶ 全画面';
            }
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', () => {
            gameOverScreen.classList.remove('show');
            startGame();
        });
        fullscreenBtn.addEventListener('click', toggleFullscreen);

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                fullscreenBtn.textContent = '⛶ 全画面';
            }
        });

        init();
    </script>
</body>
</html>
