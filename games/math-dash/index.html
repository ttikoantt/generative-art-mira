<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Math Dash - 計算ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 15px;
            min-width: 100px;
        }

        .stat-label {
            font-size: 0.75rem;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .combo {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            color: #ff6b6b;
            animation: pulse 0.5s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .problem {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            padding: 40px;
            border-radius: 20px;
            margin: 20px 0;
            font-size: 3rem;
            font-weight: bold;
            color: #333;
        }

        .answers {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .answer-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 25px;
            border-radius: 15px;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .answer-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .answer-btn:active {
            transform: translateY(0);
        }

        .answer-btn.correct {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%);
        }

        .answer-btn.wrong {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }

        .start-screen, .end-screen {
            display: none;
        }

        .start-screen.active, .end-screen.active {
            display: block;
        }

        .game-screen {
            display: none;
        }

        .game-screen.active {
            display: block;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .problem {
                font-size: 2.2rem;
                padding: 25px;
            }

            .answer-btn {
                font-size: 1.4rem;
                padding: 20px;
            }

            .stat {
                min-width: 80px;
                padding: 10px 15px;
            }

            .stat-value {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Start Screen -->
        <div class="start-screen active" id="startScreen">
            <h1>🧮 Math Dash</h1>
            <p style="color: #666; margin-bottom: 30px;">60秒で何問解けるか？</p>
            <button class="btn" onclick="startGame()">🚀 スタート</button>
            <button class="btn fullscreen-btn" onclick="toggleFullscreen()">📺 全画面</button>
        </div>

        <!-- Game Screen -->
        <div class="game-screen" id="gameScreen">
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">スコア</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">残り時間</div>
                    <div class="stat-value" id="timer">60</div>
                </div>
                <div class="stat combo" id="comboStat" style="display: none;">
                    <div class="stat-label">コンボ</div>
                    <div class="stat-value" id="combo">0</div>
                </div>
            </div>

            <div class="problem" id="problem">1 + 1 = ?</div>

            <div class="answers" id="answers">
                <!-- Answers will be generated here -->
            </div>
        </div>

        <!-- End Screen -->
        <div class="end-screen" id="endScreen">
            <h1>🎉 終了！</h1>
            <div class="problem">
                <div style="font-size: 1.5rem; margin-bottom: 10px;">最終スコア</div>
                <div id="finalScore">0</div>
            </div>
            <p style="color: #666; margin: 20px 0;">
                正解数: <span id="correctCount">0</span> / <span id="totalCount">0</span><br>
                最高コンボ: <span id="maxCombo">0</span>
            </p>
            <button class="btn" onclick="startGame()">🔄 もう一回</button>
            <button class="btn fullscreen-btn" onclick="toggleFullscreen()">📺 全画面</button>
        </div>
    </div>

    <script>
        let score = 0;
        let timeLeft = 60;
        let currentAnswer = 0;
        let combo = 0;
        let maxCombo = 0;
        let correctCount = 0;
        let totalCount = 0;
        let timerInterval = null;
        let gameActive = false;

        function generateProblem() {
            const num1 = Math.floor(Math.random() * 10) + 1;
            const num2 = Math.floor(Math.random() * 10) + 1;
            currentAnswer = num1 + num2;

            document.getElementById('problem').textContent = `${num1} + ${num2} = ?`;

            // Generate answers
            let answers = [currentAnswer];
            while (answers.length < 4) {
                const wrong = currentAnswer + Math.floor(Math.random() * 10) - 5;
                if (wrong !== currentAnswer && wrong >= 0 && !answers.includes(wrong)) {
                    answers.push(wrong);
                }
            }

            // Shuffle answers
            answers.sort(() => Math.random() - 0.5);

            const answersContainer = document.getElementById('answers');
            answersContainer.innerHTML = '';

            answers.forEach(answer => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.textContent = answer;
                btn.onclick = () => checkAnswer(answer, btn);
                answersContainer.appendChild(btn);
            });
        }

        function checkAnswer(answer, btn) {
            if (!gameActive) return;

            totalCount++;
            btn.disabled = true;

            if (answer === currentAnswer) {
                // Correct
                combo++;
                correctCount++;
                if (combo > maxCombo) maxCombo = combo;

                const comboBonus = Math.floor(combo / 3) * 10;
                score += 10 + comboBonus;

                btn.classList.add('correct');
                showCombo(combo);
            } else {
                // Wrong
                combo = 0;
                btn.classList.add('wrong');
                hideCombo();
            }

            updateStats();

            setTimeout(() => {
                if (gameActive) {
                    generateProblem();
                }
            }, 300);
        }

        function showCombo(count) {
            const comboStat = document.getElementById('comboStat');
            document.getElementById('combo').textContent = count;
            if (count >= 2) {
                comboStat.style.display = 'block';
                comboStat.style.animation = 'none';
                setTimeout(() => comboStat.style.animation = 'pulse 0.5s ease', 10);
            }
        }

        function hideCombo() {
            document.getElementById('comboStat').style.display = 'none';
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
        }

        function startGame() {
            score = 0;
            timeLeft = 60;
            combo = 0;
            maxCombo = 0;
            correctCount = 0;
            totalCount = 0;
            gameActive = true;

            updateStats();
            hideCombo();

            document.getElementById('startScreen').classList.remove('active');
            document.getElementById('endScreen').classList.remove('active');
            document.getElementById('gameScreen').classList.add('active');

            generateProblem();

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);

            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('endScreen').classList.add('active');

            document.getElementById('finalScore').textContent = score;
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('totalCount').textContent = totalCount;
            document.getElementById('maxCombo').textContent = maxCombo;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
