<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bounce Master</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            touch-action: manipulation;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 3/4;
            background: #0f0f1e;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        #score {
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        #fullscreenBtn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        #fullscreenBtn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 15, 30, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
        }

        #overlay h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
        }

        #overlay p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        #overlay button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        #overlay button:hover {
            transform: scale(1.05);
        }

        #overlay button:active {
            transform: scale(0.95);
        }

        .hidden {
            display: none !important;
        }

        #finalScore {
            font-size: 32px;
            color: #667eea;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="canvas"></canvas>
        <div id="ui">
            <div id="score">0</div>
            <button id="fullscreenBtn">Fullscreen</button>
        </div>
        <div id="overlay">
            <h1>BOUNCE MASTER</h1>
            <p>Tap to bounce the ball through obstacles</p>
            <button id="startBtn">START</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('startBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let width, height;
        let gameRunning = false;
        let score = 0;
        let animationId;

        // Ball
        const ball = {
            x: 0,
            y: 0,
            radius: 20,
            vy: 0,
            gravity: 0.5,
            bounceForce: -12,
            baseX: 0
        };

        // Obstacles
        let obstacles = [];
        const obstacleSpeed = 3;
        let spawnTimer = 0;
        const spawnInterval = 100;

        // Particles
        let particles = [];

        function resize() {
            const container = document.getElementById('gameContainer');
            width = canvas.width = container.clientWidth;
            height = canvas.height = container.clientHeight;

            if (!gameRunning) {
                resetGame();
            }
        }

        function resetGame() {
            score = 0;
            scoreEl.textContent = score;
            ball.x = width * 0.3;
            ball.y = height * 0.5;
            ball.vy = 0;
            ball.baseX = width * 0.3;
            obstacles = [];
            particles = [];
            spawnTimer = 0;
        }

        function spawnObstacle() {
            const gap = 150;
            const gapY = Math.random() * (height - gap - 100) + 50;

            obstacles.push({
                x: width,
                width: 50,
                gapY: gapY,
                gapHeight: gap,
                passed: false
            });
        }

        function bounce() {
            ball.vy = ball.bounceForce;

            // Add particles
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: ball.x,
                    y: ball.y + ball.radius,
                    vx: (Math.random() - 0.5) * 5,
                    vy: Math.random() * 3,
                    radius: Math.random() * 5 + 2,
                    life: 1,
                    hue: Math.random() * 60 + 200
                });
            }
        }

        function update() {
            // Update ball
            ball.vy += ball.gravity;
            ball.y += ball.vy;

            // Keep ball at base X position
            ball.x = ball.baseX;

            // Spawn obstacles
            spawnTimer++;
            if (spawnTimer >= spawnInterval) {
                spawnObstacle();
                spawnTimer = 0;
            }

            // Update obstacles
            obstacles.forEach((obs, index) => {
                obs.x -= obstacleSpeed;

                // Check if passed
                if (!obs.passed && obs.x + obs.width < ball.x) {
                    obs.passed = true;
                    score++;
                    scoreEl.textContent = score;
                }

                // Check collision
                if (ball.x + ball.radius > obs.x && ball.x - ball.radius < obs.x + obs.width) {
                    // In gap
                    if (ball.y - ball.radius < obs.gapY || ball.y + ball.radius > obs.gapY + obs.gapHeight) {
                        gameOver();
                    }
                }

                // Remove off-screen obstacles
                if (obs.x + obs.width < 0) {
                    obstacles.splice(index, 1);
                }
            });

            // Update particles
            particles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1;
                p.life -= 0.02;

                if (p.life <= 0) {
                    particles.splice(index, 1);
                }
            });

            // Check boundaries
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > height) {
                gameOver();
            }
        }

        function draw() {
            // Clear
            ctx.fillStyle = '#0f0f1e';
            ctx.fillRect(0, 0, width, height);

            // Draw obstacles
            obstacles.forEach(obs => {
                ctx.fillStyle = '#667eea';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#667eea';

                // Top obstacle
                ctx.fillRect(obs.x, 0, obs.width, obs.gapY);

                // Bottom obstacle
                ctx.fillRect(obs.x, obs.gapY + obs.gapHeight, obs.width, height - obs.gapY - obs.gapHeight);

                ctx.shadowBlur = 0;
            });

            // Draw particles
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${p.hue}, 80%, 60%, ${p.life})`;
                ctx.fill();
            });

            // Draw ball
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            const gradient = ctx.createRadialGradient(ball.x - 5, ball.y - 5, 0, ball.x, ball.y, ball.radius);
            gradient.addColorStop(0, '#ff6b6b');
            gradient.addColorStop(1, '#ee5a5a');
            ctx.fillStyle = gradient;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff6b6b';
            ctx.fill();
            ctx.shadowBlur = 0;

            // Ball shine
            ctx.beginPath();
            ctx.arc(ball.x - 5, ball.y - 5, 5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.fill();
        }

        function gameLoop() {
            if (!gameRunning) return;

            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);

            overlay.innerHTML = `
                <h1>GAME OVER</h1>
                <div id="finalScore">Score: ${score}</div>
                <button id="restartBtn">PLAY AGAIN</button>
            `;
            overlay.classList.remove('hidden');

            document.getElementById('restartBtn').addEventListener('click', startGame);
        }

        function startGame() {
            overlay.classList.add('hidden');
            resetGame();
            gameRunning = true;
            gameLoop();
        }

        // Input handlers
        function handleInput(e) {
            if (e.type === 'keydown' && e.code !== 'Space') return;
            e.preventDefault();

            if (gameRunning) {
                bounce();
            }
        }

        document.addEventListener('keydown', handleInput);
        canvas.addEventListener('click', handleInput);
        canvas.addEventListener('touchstart', handleInput);

        // Start button
        startBtn.addEventListener('click', startGame);

        // Fullscreen
        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
