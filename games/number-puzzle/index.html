<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Puzzle - 数字パズル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        h1 {
            color: white;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 15px;
            color: white;
            font-size: 1.1rem;
            backdrop-filter: blur(10px);
        }

        .puzzle-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .cell {
            width: 70px;
            height: 70px;
            border: 2px solid #ddd;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }

        .cell:hover {
            background: #f0f0f0;
        }

        .cell.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
            transform: scale(1.05);
        }

        .cell.fixed {
            background: #f0f0f0;
            color: #333;
            cursor: not-allowed;
        }

        .cell.error {
            background: #ff6b6b;
            color: white;
            animation: shake 0.3s;
        }

        .cell.correct {
            background: #51cf66;
            color: white;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .numbers {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .number-btn {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 10px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transition: all 0.2s;
        }

        .number-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .number-btn:active {
            transform: scale(0.95);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .control-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .fullScreenBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
        }

        .fullScreenBtn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 30px 50px;
            border-radius: 20px;
            font-size: 1.5rem;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        .message.show {
            opacity: 1;
        }

        @media (max-width: 400px) {
            .cell {
                width: 60px;
                height: 60px;
                font-size: 1.5rem;
            }

            .number-btn {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullScreenBtn" onclick="toggleFullScreen()">全画面</button>

    <h1>🔢 Number Puzzle</h1>

    <div class="stats">
        <div class="stat">⏱️ 時間: <span id="time">0:00</span></div>
        <div class="stat">🎯 レベル: <span id="level">1</span></div>
    </div>

    <div class="puzzle-container">
        <div class="grid" id="grid"></div>
        <div class="numbers" id="numbers"></div>
    </div>

    <div class="controls">
        <button class="control-btn" onclick="newGame()">🔄 新しいゲーム</button>
        <button class="control-btn" onclick="checkSolution()">✅ チェック</button>
    </div>

    <div class="message" id="message"></div>

    <script>
        let selectedCell = null;
        let puzzle = [];
        let solution = [];
        let level = 1;
        let startTime = null;
        let timerInterval = null;

        // 初期化
        function init() {
            createGrid();
            createNumbers();
            newGame();
        }

        // グリッドを作成
        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let i = 0; i < 16; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => selectCell(i));
                grid.appendChild(cell);
            }
        }

        // 数字ボタンを作成
        function createNumbers() {
            const numbers = document.getElementById('numbers');
            numbers.innerHTML = '';
            for (let i = 1; i <= 4; i++) {
                const btn = document.createElement('button');
                btn.className = 'number-btn';
                btn.textContent = i;
                btn.addEventListener('click', () => inputNumber(i));
                numbers.appendChild(btn);
            }
        }

        // 新しいゲームを開始
        function newGame() {
            level = 1;
            document.getElementById('level').textContent = level;
            generatePuzzle();
            startTimer();
        }

        // パズルを生成（簡易版）
        function generatePuzzle() {
            // 完全な解を生成
            solution = generateCompleteSolution();

            // パズルを作成（一部を空白に）
            puzzle = [...solution];
            const emptyCount = 8 + level; // レベルに応じて難易度アップ
            const indices = [];
            for (let i = 0; i < 16; i++) indices.push(i);

            for (let i = 0; i < emptyCount; i++) {
                const idx = Math.floor(Math.random() * indices.length);
                puzzle[indices[idx]] = 0;
                indices.splice(idx, 1);
            }

            renderPuzzle();
        }

        // 完全な解を生成
        function generateCompleteSolution() {
            const sol = [];
            
            // 行と列に一意性を持たせる
            const rows = [
                [1, 2, 3, 4],
                [3, 4, 1, 2],
                [2, 1, 4, 3],
                [4, 3, 2, 1]
            ];

            // シャッフル
            for (let i = rows.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [rows[i], rows[j]] = [rows[j], rows[i]];
            }

            for (const row of rows) {
                sol.push(...row);
            }

            return sol;
        }

        // パズルを描画
        function renderPuzzle() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, index) => {
                cell.className = 'cell';
                cell.textContent = puzzle[index] || '';
                
                if (puzzle[index] !== 0) {
                    cell.classList.add('fixed');
                }
            });
            selectedCell = null;
        }

        // セルを選択
        function selectCell(index) {
            const cells = document.querySelectorAll('.cell');
            
            if (puzzle[index] !== 0) return; // 固定セルは選択不可

            cells.forEach(c => c.classList.remove('selected'));
            
            if (selectedCell === index) {
                selectedCell = null;
            } else {
                selectedCell = index;
                cells[index].classList.add('selected');
            }
        }

        // 数字を入力
        function inputNumber(num) {
            if (selectedCell === null) return;

            puzzle[selectedCell] = num;
            const cells = document.querySelectorAll('.cell');
            cells[selectedCell].textContent = num;

            // 自動チェック（オプション）
            // checkSolution();
        }

        // 解答をチェック
        function checkSolution() {
            const cells = document.querySelectorAll('.cell');
            let correct = true;

            for (let i = 0; i < 16; i++) {
                if (puzzle[i] !== solution[i]) {
                    cells[i].classList.add('error');
                    correct = false;
                } else if (puzzle[i] !== 0) {
                    cells[i].classList.add('correct');
                }
            }

            if (correct) {
                showMessage('🎉 完成！おめでとう！');
                setTimeout(() => {
                    level++;
                    document.getElementById('level').textContent = level;
                    generatePuzzle();
                }, 2000);
            }

            setTimeout(() => {
                cells.forEach(c => {
                    c.classList.remove('error', 'correct');
                });
            }, 1000);
        }

        // メッセージを表示
        function showMessage(text) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.classList.add('show');
            setTimeout(() => {
                msg.classList.remove('show');
            }, 2000);
        }

        // タイマー
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            startTime = Date.now();
            
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                document.getElementById('time').textContent = 
                    `${minutes}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        init();
    </script>
</body>
</html>
