<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Puzzle - 数字並べ替えパズル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .game-info {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 20px;
            color: white;
        }

        .info-item {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .info-label {
            font-size: 0.8rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .puzzle-container {
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        .puzzle-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            max-width: 350px;
        }

        .tile {
            width: 75px;
            height: 75px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            user-select: none;
        }

        .tile:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }

        .tile:active {
            transform: scale(0.95);
        }

        .tile.empty {
            background: rgba(255,255,255,0.1);
            cursor: default;
            box-shadow: none;
        }

        .tile.correct {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .buttons {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            background: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        .win-message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95);
            padding: 40px 50px;
            border-radius: 20px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.3);
            z-index: 1000;
            text-align: center;
        }

        .win-message.show {
            display: block;
            animation: popIn 0.5s ease;
        }

        @keyframes popIn {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .win-message h2 {
            font-size: 2rem;
            color: #764ba2;
            margin-bottom: 15px;
        }

        .win-message p {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }
            .tile {
                width: 65px;
                height: 65px;
                font-size: 1.5rem;
            }
            .puzzle-grid {
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">🖥️ 全画面</button>

    <div class="container">
        <h1>🔢 Number Puzzle</h1>
        <p class="subtitle">1-15を順番に並べよう！</p>

        <div class="game-info">
            <div class="info-item">
                <div class="info-label">手数</div>
                <div class="info-value" id="moves">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">時間</div>
                <div class="info-value" id="timer">00:00</div>
            </div>
        </div>

        <div class="puzzle-container">
            <div class="puzzle-grid" id="grid"></div>
        </div>

        <div class="buttons">
            <button class="btn primary" onclick="shuffle()">🔄 シャッフル</button>
            <button class="btn" onclick="solveHint()">💡 ヒント</button>
        </div>
    </div>

    <div class="win-message" id="winMessage">
        <h2>🎉 クリア！</h2>
        <p id="winStats">手数: 0 | 時間: 00:00</p>
        <button class="btn primary" onclick="closeWin(); shuffle();">もう一度</button>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const movesDisplay = document.getElementById('moves');
        const timerDisplay = document.getElementById('timer');
        const winMessage = document.getElementById('winMessage');
        const winStats = document.getElementById('winStats');

        let tiles = [];
        let emptyPos = { row: 3, col: 3 };
        let moves = 0;
        let seconds = 0;
        let timerInterval = null;
        let gameStarted = false;

        // タイルを作成
        function createTiles() {
            tiles = [];
            for (let i = 1; i <= 15; i++) {
                tiles.push(i);
            }
            tiles.push(null); // 空白
        }

        // グリッドを描画
        function render() {
            grid.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    const index = i * 4 + j;
                    const value = tiles[index];
                    const tile = document.createElement('div');
                    tile.className = 'tile';

                    if (value === null) {
                        tile.classList.add('empty');
                    } else {
                        tile.textContent = value;
                        tile.onclick = () => handleClick(i, j);

                        // 正しい位置なら色を変える
                        const correctPos = value - 1;
                        if (index === correctPos) {
                            tile.classList.add('correct');
                        }
                    }

                    grid.appendChild(tile);
                }
            }
        }

        // タイルをクリック
        function handleClick(row, col) {
            // 空白と隣接しているか確認
            const rowDiff = Math.abs(row - emptyPos.row);
            const colDiff = Math.abs(col - emptyPos.col);

            if ((rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1)) {
                // タイマー開始
                if (!gameStarted) {
                    gameStarted = true;
                    startTimer();
                }

                // タイルを移動
                const fromIndex = row * 4 + col;
                const toIndex = emptyPos.row * 4 + emptyPos.col;
                tiles[toIndex] = tiles[fromIndex];
                tiles[fromIndex] = null;
                emptyPos = { row, col };
                moves++;
                movesDisplay.textContent = moves;
                render();
                checkWin();
            }
        }

        // シャッフル
        function shuffle() {
            resetGame();
            createTiles();

            // ランダムに移動を繰り返してシャッフル
            for (let i = 0; i < 1000; i++) {
                const neighbors = getNeighbors(emptyPos.row, emptyPos.col);
                const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
                const fromIndex = randomNeighbor.row * 4 + randomNeighbor.col;
                const toIndex = emptyPos.row * 4 + emptyPos.col;
                tiles[toIndex] = tiles[fromIndex];
                tiles[fromIndex] = null;
                emptyPos = randomNeighbor;
            }

            render();
        }

        // 隣接するタイルを取得
        function getNeighbors(row, col) {
            const neighbors = [];
            if (row > 0) neighbors.push({ row: row - 1, col });
            if (row < 3) neighbors.push({ row: row + 1, col });
            if (col > 0) neighbors.push({ row, col: col - 1 });
            if (col < 3) neighbors.push({ row, col: col + 1 });
            return neighbors;
        }

        // タイマー
        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                timerDisplay.textContent = `${mins}:${secs}`;
            }, 1000);
        }

        // ゲームリセット
        function resetGame() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            gameStarted = false;
            moves = 0;
            seconds = 0;
            movesDisplay.textContent = '0';
            timerDisplay.textContent = '00:00';
            emptyPos = { row: 3, col: 3 };
        }

        // 勝利チェック
        function checkWin() {
            for (let i = 0; i < 15; i++) {
                if (tiles[i] !== i + 1) return false;
            }
            if (tiles[15] !== null) return false;

            // クリア！
            clearInterval(timerInterval);
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            winStats.textContent = `手数: ${moves} | 時間: ${mins}:${secs}`;
            winMessage.classList.add('show');
            return true;
        }

        // 勝利メッセージを閉じる
        function closeWin() {
            winMessage.classList.remove('show');
        }

        // ヒント
        function solveHint() {
            // 最初に間違っているタイルをハイライト
            const tiles_ = document.querySelectorAll('.tile:not(.empty)');
            for (const tile of tiles_) {
                if (!tile.classList.contains('correct')) {
                    tile.style.background = '#f5576c';
                    tile.style.color = 'white';
                    setTimeout(() => {
                        tile.style.background = '';
                        tile.style.color = '';
                    }, 1000);
                    break;
                }
            }
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        createTiles();
        render();
    </script>
</body>
</html>
