<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Puzzle - Sort the Numbers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 1rem;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .stat-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
        }

        .game-board {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .numbers {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            min-height: 300px;
            align-content: center;
        }

        .number {
            width: clamp(60px, 15vw, 80px);
            height: clamp(60px, 15vw, 80px);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 15px;
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .number:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .number:active {
            transform: translateY(-2px);
        }

        .number.selected {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.5);
        }

        .number.correct {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            animation: correctPulse 0.5s ease;
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-restart {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: #fff;
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(250, 112, 154, 0.4);
        }

        .fullscreen-btn {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .message {
            margin-top: 20px;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            font-size: 1.1rem;
            color: #667eea;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fullscreen-active .fullscreen-btn {
            display: none;
        }

        .fullscreen-active .game-board {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            max-width: 90vw;
        }

        @media (max-width: 768px) {
            .game-board {
                padding: 20px;
            }

            .numbers {
                gap: 10px;
            }

            .number {
                width: clamp(50px, 18vw, 70px);
                height: clamp(50px, 18vw, 70px);
                font-size: clamp(1.2rem, 5vw, 1.5rem);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔢 Number Puzzle</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">Moves</div>
                <div class="stat-value" id="moves">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Best</div>
                <div class="stat-value" id="best">-</div>
            </div>
        </div>

        <div class="game-board">
            <div class="numbers" id="numbers"></div>
        </div>

        <div id="message" class="message" style="display: none;"></div>

        <div class="buttons">
            <button class="btn-restart" id="restartBtn">🔄 New Game</button>
            <button class="fullscreen-btn" id="fullscreenBtn">⛶ Fullscreen</button>
        </div>
    </div>

    <script>
        const numbersContainer = document.getElementById('numbers');
        const movesDisplay = document.getElementById('moves');
        const bestDisplay = document.getElementById('best');
        const messageDisplay = document.getElementById('message');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let numbers = [];
        let selectedNumber = null;
        let moves = 0;
        let bestScore = localStorage.getItem('numberPuzzleBest') || null;
        let gameOver = false;

        // Initialize game
        function initGame() {
            // Generate numbers 1-10
            numbers = Array.from({ length: 10 }, (_, i) => i + 1);

            // Shuffle
            shuffleArray(numbers);

            // Reset state
            selectedNumber = null;
            moves = 0;
            gameOver = false;
            updateMoves();
            updateBest();
            hideMessage();

            // Render
            renderNumbers();
        }

        // Shuffle array
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Render numbers
        function renderNumbers() {
            numbersContainer.innerHTML = '';
            numbers.forEach((num, index) => {
                const btn = document.createElement('button');
                btn.className = 'number';
                btn.textContent = num;

                if (selectedNumber === index) {
                    btn.classList.add('selected');
                }

                btn.addEventListener('click', () => handleNumberClick(index));
                numbersContainer.appendChild(btn);
            });
        }

        // Handle number click
        function handleNumberClick(index) {
            if (gameOver) return;

            if (selectedNumber === null) {
                // First selection
                selectedNumber = index;
                renderNumbers();
            } else if (selectedNumber === index) {
                // Deselect
                selectedNumber = null;
                renderNumbers();
            } else {
                // Swap
                swapNumbers(selectedNumber, index);
                selectedNumber = null;
                moves++;
                updateMoves();
                checkWin();
            }
        }

        // Swap numbers
        function swapNumbers(i, j) {
            [numbers[i], numbers[j]] = [numbers[j], numbers[i]];
            renderNumbers();
        }

        // Update moves display
        function updateMoves() {
            movesDisplay.textContent = moves;
        }

        // Update best display
        function updateBest() {
            bestDisplay.textContent = bestScore ? bestScore : '-';
        }

        // Check win condition
        function checkWin() {
            const isSorted = numbers.every((num, index) => num === index + 1);

            if (isSorted) {
                gameOver = true;

                // Highlight all numbers
                const buttons = numbersContainer.querySelectorAll('.number');
                buttons.forEach((btn, index) => {
                    setTimeout(() => {
                        btn.classList.add('correct');
                    }, index * 50);
                });

                // Update best score
                if (!bestScore || moves < bestScore) {
                    bestScore = moves;
                    localStorage.setItem('numberPuzzleBest', bestScore);
                    updateBest();
                }

                showMessage(`🎉 Congratulations! Sorted in ${moves} moves!`);
            }
        }

        // Show message
        function showMessage(text) {
            messageDisplay.textContent = text;
            messageDisplay.style.display = 'block';
        }

        // Hide message
        function hideMessage() {
            messageDisplay.style.display = 'none';
        }

        // Restart game
        restartBtn.addEventListener('click', () => {
            // Add animation
            const buttons = numbersContainer.querySelectorAll('.number');
            buttons.forEach(btn => {
                btn.style.transform = 'scale(0)';
            });

            setTimeout(() => {
                initGame();
            }, 300);
        });

        // Fullscreen
        fullscreenBtn.addEventListener('click', () => {
            document.body.classList.toggle('fullscreen-active');
            if (document.body.classList.contains('fullscreen-active')) {
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });

        // Exit fullscreen on ESC
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                document.body.classList.remove('fullscreen-active');
            }
        });

        // Initialize
        initGame();
    </script>
</body>
</html>
