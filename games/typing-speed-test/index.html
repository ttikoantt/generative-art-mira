<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Speed Test | Games by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            color: #fff;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            text-align: center;
            font-size: clamp(0.8rem, 2vw, 1rem);
            opacity: 0.8;
            margin-bottom: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.15);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .text-display {
            background: rgba(0, 0, 0, 0.3);
            padding: 25px;
            border-radius: 10px;
            font-size: clamp(1rem, 3vw, 1.3rem);
            line-height: 1.8;
            margin-bottom: 20px;
            min-height: 120px;
            position: relative;
            overflow: hidden;
        }

        .text-display .word {
            display: inline-block;
            margin: 0 5px;
            padding: 2px 4px;
            border-radius: 3px;
            transition: all 0.2s ease;
        }

        .text-display .word.correct {
            color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
        }

        .text-display .word.incorrect {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            text-decoration: underline;
        }

        .text-display .word.current {
            background: rgba(255, 215, 0, 0.3);
            animation: pulse 1s infinite;
        }

        .text-display .letter {
            display: inline-block;
        }

        .text-display .letter.correct {
            color: #00ff88;
        }

        .text-display .letter.incorrect {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.3);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .input-area {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            font-family: 'Courier New', monospace;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-area:focus {
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1rem;
            font-family: 'Courier New', monospace;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #333;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.5);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .difficulty-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .difficulty-btn {
            padding: 8px 16px;
            font-size: 0.85rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
        }

        .difficulty-btn.active {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #333;
        }

        .result-screen {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .result-screen.show {
            display: block;
        }

        .result-score {
            font-size: 4rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
            margin: 20px 0;
            animation: scoreAppear 0.5s ease;
        }

        @keyframes scoreAppear {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .result-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .result-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
        }

        .result-label {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .result-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00ff88;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            font-size: 0.9rem;
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid #ffd700;
            color: #ffd700;
            border-radius: 20px;
            font-family: 'Courier New', monospace;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00d9ff);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">🖥️ 全画面</button>

    <div class="container">
        <h1>⌨️ Typing Speed Test</h1>
        <p class="subtitle">タイピング速度を測定しよう</p>

        <div class="difficulty-selector">
            <button class="difficulty-btn active" data-difficulty="easy">😊 簡単</button>
            <button class="difficulty-btn" data-difficulty="medium">😐 普通</button>
            <button class="difficulty-btn" data-difficulty="hard">😈 難しい</button>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">⏱️ 時間</div>
                <div class="stat-value" id="timeLeft">60</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">📝 WPM</div>
                <div class="stat-value" id="wpm">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">✅ 正確性</div>
                <div class="stat-value" id="accuracy">100%</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">🎯 スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="text-display" id="textDisplay">
            <p>「開始」ボタンをクリックしてスタート！</p>
        </div>

        <input
            type="text"
            class="input-area"
            id="inputArea"
            placeholder="ここにタイピング..."
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            disabled
        >

        <div class="controls">
            <button id="startBtn">▶️ 開始</button>
            <button id="restartBtn" disabled>🔄 リセット</button>
        </div>

        <div class="result-screen" id="resultScreen">
            <h2>🎉 テスト完了！</h2>
            <div class="result-score" id="finalWpm">0 WPM</div>
            <div class="result-details">
                <div class="result-item">
                    <div class="result-label">正確性</div>
                    <div class="result-value" id="finalAccuracy">0%</div>
                </div>
                <div class="result-item">
                    <div class="result-label">正しい文字</div>
                    <div class="result-value" id="finalCorrect">0</div>
                </div>
                <div class="result-item">
                    <div class="result-label">間違った文字</div>
                    <div class="result-value" id="finalIncorrect">0</div>
                </div>
                <div class="result-item">
                    <div class="result-label">スコア</div>
                    <div class="result-value" id="finalScore">0</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const textDisplay = document.getElementById('textDisplay');
        const inputArea = document.getElementById('inputArea');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const timeLeftEl = document.getElementById('timeLeft');
        const wpmEl = document.getElementById('wpm');
        const accuracyEl = document.getElementById('accuracy');
        const scoreEl = document.getElementById('score');
        const progressFill = document.getElementById('progressFill');
        const resultScreen = document.getElementById('resultScreen');
        const difficultyBtns = document.querySelectorAll('.difficulty-btn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        const texts = {
            easy: [
                "cat dog run jump play happy sun moon star",
                "red blue green yellow pink purple orange",
                "hello world good morning have a nice day",
                "apple banana orange grape mango peach",
                "book pen paper desk chair computer phone"
            ],
            medium: [
                "The quick brown fox jumps over the lazy dog in the sunny garden",
                "Programming is fun and challenging at the same time for everyone",
                "JavaScript and Python are popular programming languages today",
                "Learning to type fast can improve your productivity significantly",
                "The internet has changed how we communicate and work together"
            ],
            hard: [
                "The juxtaposition of quantum mechanics and general relativity presents profound theoretical challenges",
                "Sophisticated algorithms optimize computational efficiency in distributed systems architecture",
                "Electroencephalography measures electrical activity in the brain through electrode placement",
                "Phenomenological investigation requires meticulous empirical data collection and analysis",
                "Cryptocurrency blockchain technology revolutionizes decentralized financial transaction systems"
            ]
        };

        let currentText = "";
        let currentWordIndex = 0;
        let currentLetterIndex = 0;
        let correctChars = 0;
        let incorrectChars = 0;
        let totalTime = 60;
        let timeRemaining = 60;
        let timer = null;
        let isRunning = false;
        let difficulty = "easy";
        let words = [];
        let completedWords = 0;

        // 全画面
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // 難易度選択
        difficultyBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                if (isRunning) return;
                difficultyBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                difficulty = btn.dataset.difficulty;
                totalTime = difficulty === 'hard' ? 90 : 60;
                timeRemaining = totalTime;
                timeLeftEl.textContent = timeRemaining;
            });
        });

        // テキスト生成
        function generateText() {
            const textList = texts[difficulty];
            const shuffled = textList.sort(() => Math.random() - 0.5);
            words = shuffled[0].split(' ');
            displayWords();
        }

        // 単語表示
        function displayWords() {
            textDisplay.innerHTML = words.map((word, index) => {
                let letters = word.split('').map((letter, letterIndex) => {
                    let classes = 'letter';
                    if (index < currentWordIndex) {
                        classes += ' correct';
                    } else if (index === currentWordIndex && letterIndex < currentLetterIndex) {
                        classes += ' correct';
                    } else if (index === currentWordIndex && letterIndex === currentLetterIndex) {
                        classes += ' current';
                    }
                    return `<span class="${classes}">${letter}</span>`;
                }).join('');

                let classes = 'word';
                if (index < currentWordIndex) {
                    classes += ' correct';
                } else if (index === currentWordIndex) {
                    classes += ' current';
                }

                return `<span class="${classes}">${letters}</span>`;
            }).join(' ');
        }

        // 開始
        startBtn.addEventListener('click', () => {
            startGame();
        });

        function startGame() {
            correctChars = 0;
            incorrectChars = 0;
            currentWordIndex = 0;
            currentLetterIndex = 0;
            completedWords = 0;
            timeRemaining = totalTime;
            isRunning = true;

            startBtn.disabled = true;
            restartBtn.disabled = false;
            inputArea.disabled = false;
            resultScreen.classList.remove('show');

            inputArea.value = '';
            inputArea.focus();

            generateText();
            updateStats();

            timer = setInterval(() => {
                timeRemaining--;
                timeLeftEl.textContent = timeRemaining;
                progressFill.style.width = ((totalTime - timeRemaining) / totalTime * 100) + '%';

                if (timeRemaining <= 0) {
                    endGame();
                }
            }, 1000);
        }

        // 入力処理
        inputArea.addEventListener('input', (e) => {
            if (!isRunning) return;

            const inputValue = inputArea.value;
            const currentWord = words[currentWordIndex];

            if (inputValue.endsWith(' ')) {
                // 単語完了
                const typedWord = inputValue.trim();
                if (typedWord === currentWord) {
                    correctChars += currentWord.length;
                } else {
                    for (let i = 0; i < Math.min(typedWord.length, currentWord.length); i++) {
                        if (typedWord[i] === currentWord[i]) {
                            correctChars++;
                        } else {
                            incorrectChars++;
                        }
                    }
                    incorrectChars += Math.abs(typedWord.length - currentWord.length);
                }

                currentWordIndex++;
                currentLetterIndex = 0;
                completedWords++;
                inputArea.value = '';

                if (currentWordIndex >= words.length) {
                    generateText();
                    currentWordIndex = 0;
                }

                displayWords();
                updateStats();
            } else {
                // リアルタイムチェック
                const typedChars = inputValue.split('');
                currentLetterIndex = typedChars.length;

                // 文字単位のチェック
                const wordElements = textDisplay.querySelectorAll('.word');
                if (wordElements[currentWordIndex]) {
                    const letterElements = wordElements[currentWordIndex].querySelectorAll('.letter');
                    letterElements.forEach((letterEl, index) => {
                        letterEl.classList.remove('current', 'correct', 'incorrect');
                        if (index < typedChars.length) {
                            if (typedChars[index] === currentWord[index]) {
                                letterEl.classList.add('correct');
                            } else {
                                letterEl.classList.add('incorrect');
                            }
                        } else if (index === typedChars.length) {
                            letterEl.classList.add('current');
                        }
                    });
                }
            }
        });

        // 統計更新
        function updateStats() {
            const timeElapsed = totalTime - timeRemaining;
            const minutes = timeElapsed / 60;
            const wordsTyped = completedWords;
            const wpm = minutes > 0 ? Math.round((wordsTyped / minutes)) : 0;
            const totalTyped = correctChars + incorrectChars;
            const accuracy = totalTyped > 0 ? Math.round((correctChars / totalTyped) * 100) : 100;
            const score = Math.round(wpm * accuracy / 10);

            wpmEl.textContent = wpm;
            accuracyEl.textContent = accuracy + '%';
            scoreEl.textContent = score;
        }

        // ゲーム終了
        function endGame() {
            isRunning = false;
            clearInterval(timer);

            const timeElapsed = totalTime;
            const minutes = timeElapsed / 60;
            const wpm = Math.round((completedWords / minutes));
            const totalTyped = correctChars + incorrectChars;
            const accuracy = totalTyped > 0 ? Math.round((correctChars / totalTyped) * 100) : 100;
            const score = Math.round(wpm * accuracy / 10);

            document.getElementById('finalWpm').textContent = wpm + ' WPM';
            document.getElementById('finalAccuracy').textContent = accuracy + '%';
            document.getElementById('finalCorrect').textContent = correctChars;
            document.getElementById('finalIncorrect').textContent = incorrectChars;
            document.getElementById('finalScore').textContent = score;

            resultScreen.classList.add('show');
            startBtn.disabled = false;
            restartBtn.disabled = true;
            inputArea.disabled = true;
        }

        // リセット
        restartBtn.addEventListener('click', () => {
            clearInterval(timer);
            isRunning = false;
            timeRemaining = totalTime;
            currentWordIndex = 0;
            currentLetterIndex = 0;
            correctChars = 0;
            incorrectChars = 0;
            completedWords = 0;

            startBtn.disabled = false;
            restartBtn.disabled = true;
            inputArea.disabled = true;
            resultScreen.classList.remove('show');

            timeLeftEl.textContent = timeRemaining;
            wpmEl.textContent = '0';
            accuracyEl.textContent = '100%';
            scoreEl.textContent = '0';
            progressFill.style.width = '0%';
            inputArea.value = '';

            textDisplay.innerHTML = '<p>「開始」ボタンをクリックしてスタート！</p>';
        });
    </script>
</body>
</html>
