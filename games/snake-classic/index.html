<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Classic - ヘビゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 10px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            color: #4ecca3;
            font-size: 1.8rem;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(78, 204, 163, 0.5);
        }

        .score {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        #score {
            color: #4ecca3;
            font-weight: bold;
        }

        canvas {
            background: #0f0f23;
            border: 3px solid #4ecca3;
            border-radius: 10px;
            display: block;
            margin: 0 auto 15px;
            box-shadow: 0 0 30px rgba(78, 204, 163, 0.3);
            max-width: 100%;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 15px;
        }

        button {
            background: linear-gradient(135deg, #4ecca3 0%, #45b390 100%);
            color: #1a1a2e;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(78, 204, 163, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(78, 204, 163, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .mobile-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 200px;
            margin: 0 auto;
        }

        .mobile-controls button {
            width: 60px;
            height: 60px;
            padding: 0;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .info {
            color: #888;
            font-size: 0.8rem;
            margin-top: 15px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.4rem;
            }
            
            .mobile-controls {
                display: grid;
            }
        }

        @media (min-width: 769px) {
            .mobile-controls {
                display: none;
            }
        }

        .game-over {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(26, 26, 46, 0.95);
            padding: 30px;
            border-radius: 20px;
            border: 3px solid #e94560;
            z-index: 100;
            text-align: center;
        }

        .game-over h2 {
            color: #e94560;
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .game-over p {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Snake Classic</h1>
        <div class="score">スコア: <span id="score">0</span></div>
        
        <canvas id="gameCanvas"></canvas>
        
        <div class="controls">
            <button onclick="startGame()">スタート</button>
            <button onclick="togglePause()">一時停止</button>
        </div>
        
        <div class="mobile-controls">
            <div></div>
            <button onclick="setDirection('up')">↑</button>
            <div></div>
            <button onclick="setDirection('left')">←</button>
            <button onclick="setDirection('down')">↓</button>
            <button onclick="setDirection('right')">→</button>
        </div>
        
        <p class="info">矢印キーまたはボタンで操作</p>
    </div>

    <div class="game-over" id="gameOver">
        <h2>💀 Game Over!</h2>
        <p>スコア: <span id="finalScore">0</span></p>
        <button onclick="restartGame()">もう一度</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Canvasサイズ設定
        function resizeCanvas() {
            const size = Math.min(400, window.innerWidth - 40);
            canvas.width = size;
            canvas.height = size;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        const gridSize = 20;
        let tileCount;
        
        function updateTileCount() {
            tileCount = Math.floor(canvas.width / gridSize);
        }
        updateTileCount();
        
        let snake = [];
        let food = {};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameLoop;
        let gameRunning = false;
        let gamePaused = false;
        let speed = 100;
        
        // ゲーム初期化
        function initGame() {
            updateTileCount();
            const startX = Math.floor(tileCount / 2);
            const startY = Math.floor(tileCount / 2);
            snake = [
                {x: startX, y: startY},
                {x: startX - 1, y: startY},
                {x: startX - 2, y: startY}
            ];
            dx = 1;
            dy = 0;
            score = 0;
            speed = 100;
            document.getElementById('score').textContent = score;
            spawnFood();
        }
        
        // 餌を生成
        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            
            // 餌がヘビの体と重ならないように
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    spawnFood();
                    return;
                }
            }
        }
        
        // ゲーム描画
        function draw() {
            // 背景
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // グリッド
            ctx.strokeStyle = '#1a1a3e';
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
            
            // 餌
            ctx.fillStyle = '#e94560';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#e94560';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // ヘビ
            snake.forEach((segment, index) => {
                const hue = (index * 5) % 360;
                ctx.fillStyle = index === 0 ? '#4ecca3' : `hsl(${hue}, 70%, 50%)`;
                
                if (index === 0) {
                    // 頭
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#4ecca3';
                } else {
                    ctx.shadowBlur = 0;
                }
                
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
                
                // 頭に目を描画
                if (index === 0) {
                    ctx.fillStyle = '#fff';
                    const eyeSize = 3;
                    const eyeOffset = 5;
                    
                    if (dx === 1) {
                        ctx.fillRect(segment.x * gridSize + gridSize - eyeOffset, segment.y * gridSize + 5, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + gridSize - eyeOffset, segment.y * gridSize + gridSize - 8, eyeSize, eyeSize);
                    } else if (dx === -1) {
                        ctx.fillRect(segment.x * gridSize + eyeOffset - eyeSize, segment.y * gridSize + 5, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + eyeOffset - eyeSize, segment.y * gridSize + gridSize - 8, eyeSize, eyeSize);
                    } else if (dy === 1) {
                        ctx.fillRect(segment.x * gridSize + 5, segment.y * gridSize + gridSize - eyeOffset, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + gridSize - 8, segment.y * gridSize + gridSize - eyeOffset, eyeSize, eyeSize);
                    } else if (dy === -1) {
                        ctx.fillRect(segment.x * gridSize + 5, segment.y * gridSize + eyeOffset - eyeSize, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + gridSize - 8, segment.y * gridSize + eyeOffset - eyeSize, eyeSize, eyeSize);
                    }
                }
            });
            ctx.shadowBlur = 0;
        }
        
        // ゲーム更新
        function update() {
            if (!gameRunning || gamePaused) return;
            
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // 壁との衝突
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }
            
            // 自己衝突
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }
            
            snake.unshift(head);
            
            // 餌を食べた
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                spawnFood();
                
                // スピードアップ
                if (score % 50 === 0 && speed > 50) {
                    speed -= 10;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, speed);
                }
            } else {
                snake.pop();
            }
            
            draw();
        }
        
        function gameStep() {
            update();
        }
        
        // ゲームオーバー
        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        // ゲーム開始
        function startGame() {
            initGame();
            gameRunning = true;
            gamePaused = false;
            document.getElementById('gameOver').style.display = 'none';
            draw();
            gameLoop = setInterval(gameStep, speed);
        }
        
        // 再スタート
        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            startGame();
        }
        
        // 一時停止
        function togglePause() {
            if (!gameRunning) return;
            gamePaused = !gamePaused;
        }
        
        // 方向設定
        function setDirection(direction) {
            if (!gameRunning || gamePaused) return;
            
            switch(direction) {
                case 'up':
                    if (dy === 0) { dx = 0; dy = -1; }
                    break;
                case 'down':
                    if (dy === 0) { dx = 0; dy = 1; }
                    break;
                case 'left':
                    if (dx === 0) { dx = -1; dy = 0; }
                    break;
                case 'right':
                    if (dx === 0) { dx = 1; dy = 0; }
                    break;
            }
        }
        
        // キーボードイベント
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                    e.preventDefault();
                    setDirection('up');
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    setDirection('down');
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    setDirection('left');
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    setDirection('right');
                    break;
                case ' ':
                    e.preventDefault();
                    if (!gameRunning) {
                        startGame();
                    } else {
                        togglePause();
                    }
                    break;
            }
        });
        
        // 初期描画
        initGame();
        draw();
    </script>
</body>
</html>
