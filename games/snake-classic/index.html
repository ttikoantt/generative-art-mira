<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake Classic - クラシックスネークゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            padding: 10px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            color: #4ade80;
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
        }

        .subtitle {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 15px;
        }

        .score-item {
            text-align: center;
        }

        .score-label {
            color: #888;
            font-size: 0.75rem;
            margin-bottom: 5px;
        }

        .score-value {
            color: #4ade80;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
        }

        #game-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            max-width: 400px;
            margin: 0 auto;
            background: #0f0f23;
            border: 3px solid #4ade80;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.3);
        }

        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 15, 35, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #overlay.hidden {
            display: none;
        }

        #overlay h2 {
            color: #4ade80;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        #overlay p {
            color: #ccc;
            font-size: 1rem;
            margin-bottom: 30px;
        }

        button {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: #0f0f23;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.5);
        }

        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 200px;
            margin-left: auto;
            margin-right: auto;
        }

        .control-btn {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: #0f0f23;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.3);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .control-btn.empty {
            background: transparent;
            box-shadow: none;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }

            .score-value {
                font-size: 1.2rem;
            }

            #game-container {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Snake Classic</h1>
        <p class="subtitle">矢印キーまたはボタンで操作</p>

        <div class="score-board">
            <div class="score-item">
                <div class="score-label">スコア</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">ハイスコア</div>
                <div class="score-value" id="high-score">0</div>
            </div>
        </div>

        <div id="game-container">
            <canvas id="game-canvas"></canvas>
            <div id="overlay">
                <h2>🐍 Snake</h2>
                <p>矢印キーまたはボタンで操作</p>
                <button onclick="startGame()">▶ スタート</button>
            </div>
        </div>

        <div class="controls">
            <div class="control-btn empty"></div>
            <button class="control-btn" onclick="changeDirection('up')">↑</button>
            <div class="control-btn empty"></div>
            <button class="control-btn" onclick="changeDirection('left')">←</button>
            <button class="control-btn" onclick="changeDirection('down')">↓</button>
            <button class="control-btn" onclick="changeDirection('right')">→</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('high-score');

        const gridSize = 20;
        let tileCount;
        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop;
        let gameSpeed = 120;

        highScoreEl.textContent = highScore;

        function resize() {
            const container = document.getElementById('game-container');
            const size = Math.floor(container.clientWidth / gridSize) * gridSize;
            canvas.width = size;
            canvas.height = size;
            tileCount = size / gridSize;
        }

        function startGame() {
            resize();
            snake = [
                { x: Math.floor(tileCount / 2), y: Math.floor(tileCount / 2) }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            scoreEl.textContent = score;
            spawnFood();
            overlay.classList.add('hidden');
            
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, gameSpeed);
        }

        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function changeDirection(dir) {
            switch(dir) {
                case 'up':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'down':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'left':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'right':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        }

        document.addEventListener('keydown', (e) => {
            if (overlay.classList.contains('hidden')) {
                switch(e.key) {
                    case 'ArrowUp': changeDirection('up'); e.preventDefault(); break;
                    case 'ArrowDown': changeDirection('down'); e.preventDefault(); break;
                    case 'ArrowLeft': changeDirection('left'); e.preventDefault(); break;
                    case 'ArrowRight': changeDirection('right'); e.preventDefault(); break;
                }
            } else if (e.key === ' ' || e.key === 'Enter') {
                startGame();
                e.preventDefault();
            }
        });

        function update() {
            direction = { ...nextDirection };

            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            if (head.x < 0 || head.x >= tileCount ||
                head.y < 0 || head.y >= tileCount ||
                snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                spawnFood();
                
                if (score % 50 === 0 && gameSpeed > 60) {
                    gameSpeed -= 5;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(update, gameSpeed);
                }
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < tileCount; y++) {
                for (let x = 0; x < tileCount; x++) {
                    if ((x + y) % 2 === 0) {
                        ctx.fillStyle = 'rgba(74, 222, 128, 0.03)';
                        ctx.fillRect(x * gridSize, y * gridSize, gridSize, gridSize);
                    }
                }
            }

            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    0,
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    gridSize
                );

                if (index === 0) {
                    gradient.addColorStop(0, '#4ade80');
                    gradient.addColorStop(1, '#22c55e');
                } else {
                    const alpha = 1 - (index / snake.length) * 0.5;
                    gradient.addColorStop(0, `rgba(74, 222, 128, ${alpha})`);
                    gradient.addColorStop(1, `rgba(34, 197, 94, ${alpha})`);
                }

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    4
                );
                ctx.fill();

                if (index === 0) {
                    ctx.fillStyle = '#0f0f23';
                    ctx.beginPath();
                    ctx.arc(
                        segment.x * gridSize + gridSize / 2 + direction.x * 3,
                        segment.y * gridSize + gridSize / 2 + direction.y * 3,
                        3, 0, Math.PI * 2
                    );
                    ctx.fill();
                }
            });

            const foodGradient = ctx.createRadialGradient(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                0,
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2
            );
            foodGradient.addColorStop(0, '#ef4444');
            foodGradient.addColorStop(1, '#dc2626');

            ctx.fillStyle = foodGradient;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0, Math.PI * 2
            );
            ctx.fill();

            ctx.fillStyle = 'rgba(239, 68, 68, 0.3)';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 + 2,
                0, Math.PI * 2
            );
            ctx.fill();
        }

        function gameOver() {
            clearInterval(gameLoop);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreEl.textContent = highScore;
            }

            overlay.innerHTML = `
                <h2>💀 Game Over</h2>
                <p>スコア: ${score}</p>
                <button onclick="startGame()">🔄 もう一度</button>
            `;
            overlay.classList.remove('hidden');
        }

        window.addEventListener('resize', () => {
            if (overlay.classList.contains('hidden')) {
                resize();
                draw();
            }
        });

        resize();
    </script>
</body>
</html>
