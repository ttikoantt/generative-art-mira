<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brick Breaker - ブロック崩し</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
            z-index: 10;
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 700;
            background: linear-gradient(90deg, #ff00ff, #00ffff, #ff0080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: clamp(0.75rem, 2vw, 0.9rem);
            color: #888;
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #666;
            margin-bottom: 3px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #00ff88;
        }

        .lives {
            color: #ff0080;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 70vh;
            min-height: 400px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid rgba(255, 0, 255, 0.3);
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.1);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.3s;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .overlay h2 {
            font-size: clamp(1.5rem, 5vw, 3rem);
            margin-bottom: 20px;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay p {
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            color: #aaa;
            margin-bottom: 30px;
            text-align: center;
            padding: 0 20px;
        }

        .btn {
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #000;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 0, 255, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            padding: 10px 15px;
            font-size: 0.9rem;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            border: none;
            border-radius: 20px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
        }

        .controls-hint {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #666;
            text-align: center;
        }

        @media (max-width: 768px) {
            #game-container {
                height: 60vh;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 12px;
                font-size: 0.8rem;
            }

            .controls-hint {
                font-size: 0.75rem;
            }
        }

        .mobile-controls {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            justify-content: center;
            gap: 20px;
            z-index: 50;
        }

        @media (max-width: 768px) {
            .mobile-controls {
                display: flex;
            }
        }

        .mobile-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 0, 255, 0.3);
            border: 2px solid rgba(255, 0, 255, 0.5);
            color: #fff;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .mobile-btn:active {
            background: rgba(255, 0, 255, 0.5);
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="header">
        <h1>🧱 Brick Breaker</h1>
        <div class="subtitle">ネオンスタイルのブロック崩し</div>
    </div>

    <div class="stats">
        <div class="stat">
            <div class="stat-label">スコア</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">レベル</div>
            <div class="stat-value" id="level">1</div>
        </div>
        <div class="stat">
            <div class="stat-label">ライフ</div>
            <div class="stat-value lives" id="lives">❤️❤️❤️</div>
        </div>
    </div>

    <div id="game-container">
        <canvas id="canvas"></canvas>

        <div class="overlay" id="start-overlay">
            <h2>🧱 Brick Breaker</h2>
            <p>パドルを操作してボールを打ち返し、全てのブロックを壊そう！</p>
            <button class="btn" onclick="startGame()">スタート</button>
        </div>

        <div class="overlay hidden" id="gameover-overlay">
            <h2>ゲームオーバー</h2>
            <p>スコア: <span id="final-score">0</span></p>
            <button class="btn" onclick="restartGame()">もう一度</button>
        </div>

        <div class="overlay hidden" id="win-overlay">
            <h2>クリア！🎉</h2>
            <p>すばらしい！スコア: <span id="win-score">0</span></p>
            <button class="btn" onclick="nextLevel()">次のレベルへ</button>
        </div>

        <div class="mobile-controls">
            <button class="mobile-btn" id="left-btn">◀</button>
            <button class="mobile-btn" id="right-btn">▶</button>
        </div>
    </div>

    <div class="controls-hint">
        💡 マウス/タッチでパドルを移動 | スペースでボール発射 | 全画面ボタンで没入体験
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('game-container');

        // ゲーム状態
        let score = 0;
        let level = 1;
        let lives = 3;
        let gameRunning = false;
        let ballLaunched = false;

        // パドル
        const paddle = {
            width: 100,
            height: 15,
            x: 0,
            y: 0,
            speed: 8,
            dx: 0
        };

        // ボール
        const ball = {
            x: 0,
            y: 0,
            radius: 8,
            speed: 5,
            dx: 0,
            dy: 0
        };

        // ブロック
        const bricks = [];
        const brickRowCount = 6;
        const brickColumnCount = 8;
        const brickWidth = 70;
        const brickHeight = 20;
        const brickPadding = 8;
        const brickOffsetTop = 50;
        const brickOffsetLeft = 35;

        // パワーアップ
        const powerUps = [];
        const powerUpTypes = [
            { type: 'expand', color: '#00ff00', label: '＋幅' },
            { type: 'shrink', color: '#ff0000', label: '－幅' },
            { type: 'fast', color: '#ffff00', label: '＋速' },
            { type: 'slow', color: '#00ffff', label: '－速' }
        ];

        let animationId;
        let lastTime = 0;

        function resize() {
            const rect = container.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';

            // パドルの位置をリセット
            paddle.y = canvas.height / dpr - 40;
            if (!ballLaunched) {
                paddle.x = (canvas.width / dpr - paddle.width) / 2;
                ball.x = paddle.x + paddle.width / 2;
                ball.y = paddle.y - ball.radius;
            }
        }

        function initBricks() {
            bricks.length = 0;
            const colors = ['#ff0080', '#ff00ff', '#8000ff', '#0080ff', '#00ffff', '#00ff80'];
            
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    const hits = r < 2 ? 2 : 1; // 上の2行は2回当たらないと壊れない
                    bricks.push({
                        x: c * (brickWidth + brickPadding) + brickOffsetLeft,
                        y: r * (brickHeight + brickPadding) + brickOffsetTop,
                        width: brickWidth,
                        height: brickHeight,
                        hits: hits,
                        maxHits: hits,
                        color: colors[r],
                        visible: true
                    });
                }
            }
        }

        function resetBall() {
            ballLaunched = false;
            ball.x = paddle.x + paddle.width / 2;
            ball.y = paddle.y - ball.radius;
            ball.dx = 0;
            ball.dy = 0;
        }

        function launchBall() {
            if (ballLaunched) return;
            ballLaunched = true;
            const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.5;
            ball.dx = Math.cos(angle) * ball.speed;
            ball.dy = Math.sin(angle) * ball.speed;
        }

        function drawPaddle() {
            const gradient = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.height);
            gradient.addColorStop(0, '#ff00ff');
            gradient.addColorStop(1, '#ff0080');
            
            ctx.fillStyle = gradient;
            ctx.shadowColor = '#ff00ff';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 8);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawBall() {
            const gradient = ctx.createRadialGradient(ball.x, ball.y, 0, ball.x, ball.y, ball.radius);
            gradient.addColorStop(0, '#ffffff');
            gradient.addColorStop(0.5, '#00ffff');
            gradient.addColorStop(1, '#0080ff');
            
            ctx.fillStyle = gradient;
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawBricks() {
            bricks.forEach(brick => {
                if (!brick.visible) return;
                
                const alpha = brick.hits / brick.maxHits;
                ctx.globalAlpha = alpha;
                
                const gradient = ctx.createLinearGradient(brick.x, brick.y, brick.x, brick.y + brick.height);
                gradient.addColorStop(0, brick.color);
                gradient.addColorStop(1, adjustColor(brick.color, -30));
                
                ctx.fillStyle = gradient;
                ctx.shadowColor = brick.color;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.roundRect(brick.x, brick.y, brick.width, brick.height, 4);
                ctx.fill();
                
                if (brick.maxHits > 1) {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                    ctx.font = 'bold 12px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(brick.hits, brick.x + brick.width / 2, brick.y + brick.height / 2);
                }
                
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            });
        }

        function adjustColor(color, amount) {
            const num = parseInt(color.slice(1), 16);
            const r = Math.max(0, Math.min(255, (num >> 16) + amount));
            const g = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amount));
            const b = Math.max(0, Math.min(255, (num & 0x0000FF) + amount));
            return `#${(1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1)}`;
        }

        function movePaddle() {
            paddle.x += paddle.dx;
            
            if (paddle.x < 0) paddle.x = 0;
            const rect = container.getBoundingClientRect();
            const maxX = rect.width - paddle.width;
            if (paddle.x > maxX) paddle.x = maxX;
        }

        function moveBall() {
            if (!ballLaunched) {
                ball.x = paddle.x + paddle.width / 2;
                ball.y = paddle.y - ball.radius;
                return;
            }

            ball.x += ball.dx;
            ball.y += ball.dy;

            const rect = container.getBoundingClientRect();

            // 壁との衝突
            if (ball.x + ball.radius > rect.width || ball.x - ball.radius < 0) {
                ball.dx *= -1;
            }
            if (ball.y - ball.radius < 0) {
                ball.dy *= -1;
            }

            // パドルとの衝突
            if (ball.y + ball.radius > paddle.y &&
                ball.y - ball.radius < paddle.y + paddle.height &&
                ball.x > paddle.x &&
                ball.x < paddle.x + paddle.width) {
                
                const hitPos = (ball.x - paddle.x) / paddle.width;
                const angle = (hitPos - 0.5) * Math.PI * 0.7;
                const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
                
                ball.dx = Math.sin(angle) * speed;
                ball.dy = -Math.abs(Math.cos(angle) * speed);
                ball.y = paddle.y - ball.radius;
            }

            // ブロックとの衝突
            bricks.forEach(brick => {
                if (!brick.visible) return;
                
                if (ball.x + ball.radius > brick.x &&
                    ball.x - ball.radius < brick.x + brick.width &&
                    ball.y + ball.radius > brick.y &&
                    ball.y - ball.radius < brick.y + brick.height) {
                    
                    brick.hits--;
                    if (brick.hits <= 0) {
                        brick.visible = false;
                        score += 10 * level;
                        updateStats();
                        
                        // パワーアップをドロップ
                        if (Math.random() < 0.15) {
                            dropPowerUp(brick.x + brick.width / 2, brick.y);
                        }
                    }
                    
                    // ボールの反転
                    const overlapLeft = ball.x + ball.radius - brick.x;
                    const overlapRight = brick.x + brick.width - (ball.x - ball.radius);
                    const overlapTop = ball.y + ball.radius - brick.y;
                    const overlapBottom = brick.y + brick.height - (ball.y - ball.radius);
                    
                    const minOverlapX = Math.min(overlapLeft, overlapRight);
                    const minOverlapY = Math.min(overlapTop, overlapBottom);
                    
                    if (minOverlapX < minOverlapY) {
                        ball.dx *= -1;
                    } else {
                        ball.dy *= -1;
                    }
                }
            });

            // ボールが落ちた
            if (ball.y - ball.radius > rect.height) {
                lives--;
                updateStats();
                
                if (lives <= 0) {
                    gameOver();
                } else {
                    resetBall();
                }
            }

            // クリアチェック
            if (bricks.every(b => !b.visible)) {
                win();
            }
        }

        function dropPowerUp(x, y) {
            const type = powerUpTypes[Math.floor(Math.random() * powerUpTypes.length)];
            powerUps.push({
                x: x,
                y: y,
                width: 30,
                height: 15,
                dy: 2,
                type: type.type,
                color: type.color,
                label: type.label
            });
        }

        function updatePowerUps() {
            const rect = container.getBoundingClientRect();
            
            for (let i = powerUps.length - 1; i >= 0; i--) {
                const pu = powerUps[i];
                pu.y += pu.dy;
                
                // パドルとの衝突
                if (pu.y + pu.height > paddle.y &&
                    pu.x + pu.width > paddle.x &&
                    pu.x < paddle.x + paddle.width) {
                    
                    applyPowerUp(pu.type);
                    powerUps.splice(i, 1);
                    continue;
                }
                
                // 画面外
                if (pu.y > rect.height) {
                    powerUps.splice(i, 1);
                }
            }
        }

        function applyPowerUp(type) {
            switch (type) {
                case 'expand':
                    paddle.width = Math.min(200, paddle.width + 30);
                    break;
                case 'shrink':
                    paddle.width = Math.max(50, paddle.width - 20);
                    break;
                case 'fast':
                    ball.speed = Math.min(10, ball.speed + 1);
                    break;
                case 'slow':
                    ball.speed = Math.max(3, ball.speed - 1);
                    break;
            }
        }

        function drawPowerUps() {
            powerUps.forEach(pu => {
                ctx.fillStyle = pu.color;
                ctx.shadowColor = pu.color;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.roundRect(pu.x, pu.y, pu.width, pu.height, 4);
                ctx.fill();
                
                ctx.fillStyle = '#000';
                ctx.font = 'bold 10px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(pu.label, pu.x + pu.width / 2, pu.y + pu.height / 2);
                ctx.shadowBlur = 0;
            });
        }

        function update() {
            movePaddle();
            moveBall();
            updatePowerUps();
        }

        function draw() {
            const rect = container.getBoundingClientRect();
            ctx.clearRect(0, 0, rect.width, rect.height);
            
            // 背景
            const gradient = ctx.createLinearGradient(0, 0, 0, rect.height);
            gradient.addColorStop(0, '#0a0a0a');
            gradient.addColorStop(1, '#1a1a2e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, rect.width, rect.height);
            
            drawBricks();
            drawPaddle();
            drawBall();
            drawPowerUps();
        }

        function gameLoop(timestamp) {
            if (!gameRunning) return;
            
            const deltaTime = timestamp - lastTime;
            
            if (deltaTime >= 16) {
                update();
                draw();
                lastTime = timestamp;
            }
            
            animationId = requestAnimationFrame(gameLoop);
        }

        function startGame() {
            document.getElementById('start-overlay').classList.add('hidden');
            gameRunning = true;
            score = 0;
            level = 1;
            lives = 3;
            paddle.width = 100;
            ball.speed = 5;
            
            initBricks();
            resetBall();
            updateStats();
            
            resize();
            lastTime = performance.now();
            gameLoop(lastTime);
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            document.getElementById('final-score').textContent = score;
            document.getElementById('gameover-overlay').classList.remove('hidden');
        }

        function win() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            document.getElementById('win-score').textContent = score;
            document.getElementById('win-overlay').classList.remove('hidden');
        }

        function restartGame() {
            document.getElementById('gameover-overlay').classList.add('hidden');
            startGame();
        }

        function nextLevel() {
            document.getElementById('win-overlay').classList.add('hidden');
            level++;
            lives = Math.min(lives + 1, 3);
            ball.speed += 0.5;
            
            initBricks();
            resetBall();
            updateStats();
            
            gameRunning = true;
            lastTime = performance.now();
            gameLoop(lastTime);
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lives').textContent = '❤️'.repeat(lives);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            paddle.x = mouseX - paddle.width / 2;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touchX = e.touches[0].clientX - rect.left;
            paddle.x = touchX - paddle.width / 2;
        }, { passive: false });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                launchBall();
            }
            if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
                if (e.code === 'ArrowLeft') paddle.dx = -paddle.speed;
                if (e.code === 'ArrowRight') paddle.dx = paddle.speed;
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
                paddle.dx = 0;
            }
        });

        // モバイルコントロール
        const leftBtn = document.getElementById('left-btn');
        const rightBtn = document.getElementById('right-btn');

        leftBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            paddle.dx = -paddle.speed;
        });
        leftBtn.addEventListener('touchend', () => paddle.dx = 0);

        rightBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            paddle.dx = paddle.speed;
        });
        rightBtn.addEventListener('touchend', () => paddle.dx = 0);

        canvas.addEventListener('click', () => {
            if (gameRunning && !ballLaunched) {
                launchBall();
            }
        });

        window.addEventListener('resize', () => {
            if (gameRunning) {
                resize();
            }
        });

        // 初期化
        resize();
    </script>
</body>
</html>
