<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brick Breaker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
        }

        .hud {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            color: #fff;
            font-size: 16px;
            z-index: 100;
        }

        .hud span {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            text-align: center;
            z-index: 100;
        }

        .message h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px currentColor;
        }

        .message p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .message button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 30px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .message button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 50px;
            height: 50px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 50%;
            z-index: 100;
        }

        .powerup-indicator {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .powerup-indicator span {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        @media (max-width: 768px) {
            .hud {
                font-size: 12px;
                gap: 15px;
                top: 10px;
            }

            .hud span {
                padding: 8px 12px;
            }

            .message h1 {
                font-size: 32px;
            }

            .message p {
                font-size: 14px;
            }

            .message button {
                padding: 12px 30px;
                font-size: 16px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="hud">
        <span>Score: <span id="score">0</span></span>
        <span>Lives: <span id="lives">3</span></span>
        <span>Level: <span id="level">1</span></span>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="powerup-indicator" id="powerupIndicator"></div>

    <div class="message" id="startScreen">
        <h1>Brick Breaker</h1>
        <p>Break all the bricks!</p>
        <button onclick="startGame()">Start Game</button>
    </div>

    <div class="message" id="gameOverScreen" style="display: none;">
        <h1>Game Over</h1>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button onclick="startGame()">Play Again</button>
    </div>

    <div class="message" id="winScreen" style="display: none;">
        <h1>You Win!</h1>
        <p>Score: <span id="winScore">0</span></p>
        <button onclick="nextLevel()">Next Level</button>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let animationId;
        let score = 0;
        let lives = 3;
        let level = 1;
        let gameRunning = false;
        let balls = [];
        let bricks = [];
        let paddle;
        let powerUps = [];
        let particles = [];
        let activePowerUps = [];

        // Brick colors by row
        const brickColors = [
            '#FF6B6B', '#FFA07A', '#FFD93D', '#6BCF7F', '#4ECDC4', '#45B7D1', '#96CEB4', '#DDA0DD'
        ];

        class Ball {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 8;
                this.dx = (Math.random() > 0.5 ? 4 : -4);
                this.dy = -4;
                this.speed = 4;
                this.trail = [];
            }

            update() {
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 10) this.trail.shift();

                this.x += this.dx;
                this.y += this.dy;

                if (this.x + this.radius > width || this.x - this.radius < 0) {
                    this.dx = -this.dx;
                }

                if (this.y - this.radius < 0) {
                    this.dy = -this.dy;
                }

                if (this.y + this.radius > height) {
                    return true;
                }

                return false;
            }

            draw() {
                // Draw trail
                this.trail.forEach((pos, i) => {
                    const alpha = i / this.trail.length;
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, this.radius * alpha * 0.8, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(102, 126, 234, ${alpha * 0.5})`;
                    ctx.fill();
                });

                // Draw ball
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#667eea';
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class Paddle {
            constructor() {
                this.width = 100;
                this.height = 15;
                this.x = (width - this.width) / 2;
                this.y = height - 40;
                this.speed = 8;
                this.targetX = this.x;
            }

            update() {
                const diff = this.targetX - this.x;
                this.x += diff * 0.15;

                if (this.x < 0) this.x = 0;
                if (this.x + this.width > width) this.x = width - this.width;
            }

            draw() {
                ctx.beginPath();
                ctx.roundRect(this.x, this.y, this.width, this.height, 8);
                ctx.fillStyle = '#667eea';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#667eea';
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            expand() {
                this.width = Math.min(this.width + 30, 200);
            }

            shrink() {
                this.width = Math.max(this.width - 20, 60);
            }
        }

        class Brick {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.width = 70;
                this.height = 25;
                this.color = color;
                this.alive = true;
                this.hitPoints = Math.floor(Math.random() * 2) + 1;
            }

            draw() {
                if (!this.alive) return;

                const alpha = this.hitPoints / 2;
                ctx.beginPath();
                ctx.roundRect(this.x, this.y, this.width, this.height, 4);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = 0.5 + alpha * 0.5;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;

                if (this.hitPoints > 1) {
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }

            hit() {
                this.hitPoints--;
                if (this.hitPoints <= 0) {
                    this.alive = false;
                    return true;
                }
                return false;
            }
        }

        class PowerUp {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 15;
                this.dy = 2;
                this.type = Math.random() > 0.5 ? 'expand' : 'multiball';
                this.color = this.type === 'expand' ? '#6BCF7F' : '#FFD93D';
            }

            update() {
                this.y += this.dy;
                return this.y > height;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.type === 'expand' ? '↔' : '●●', this.x, this.y);
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.dx = (Math.random() - 0.5) * 8;
                this.dy = (Math.random() - 0.5) * 8;
                this.radius = Math.random() * 3 + 2;
                this.color = color;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.02;
            }

            update() {
                this.x += this.dx;
                this.y += this.dy;
                this.dy += 0.1;
                this.alpha -= this.decay;
                return this.alpha <= 0;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.alpha;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function init() {
            resize();
            createBricks();
            paddle = new Paddle();
            balls = [new Ball(width / 2, height - 60)];
            powerUps = [];
            particles = [];
            activePowerUps = [];
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function createBricks() {
            bricks = [];
            const rows = Math.min(4 + level, 8);
            const cols = Math.floor((width - 40) / 80);
            const startX = (width - cols * 80) / 2;

            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const x = startX + col * 80;
                    const y = 60 + row * 35;
                    const color = brickColors[row % brickColors.length];
                    bricks.push(new Brick(x, y, color));
                }
            }
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function checkCollision(ball, brick) {
            return ball.x + ball.radius > brick.x &&
                   ball.x - ball.radius < brick.x + brick.width &&
                   ball.y + ball.radius > brick.y &&
                   ball.y - ball.radius < brick.y + brick.height;
        }

        function update() {
            if (!gameRunning) return;

            paddle.update();

            // Update balls
            for (let i = balls.length - 1; i >= 0; i--) {
                const ball = balls[i];
                const lost = ball.update();

                if (lost) {
                    balls.splice(i, 1);
                    continue;
                }

                // Paddle collision
                if (ball.y + ball.radius > paddle.y &&
                    ball.y - ball.radius < paddle.y + paddle.height &&
                    ball.x > paddle.x &&
                    ball.x < paddle.x + paddle.width) {
                    
                    const hitPos = (ball.x - paddle.x) / paddle.width;
                    ball.dx = (hitPos - 0.5) * 10;
                    ball.dy = -Math.abs(ball.dy);
                    ball.y = paddle.y - ball.radius;
                }

                // Brick collision
                for (const brick of bricks) {
                    if (brick.alive && checkCollision(ball, brick)) {
                        const destroyed = brick.hit();

                        if (destroyed) {
                            score += 10 * level;
                            createExplosion(brick.x + brick.width / 2, brick.y + brick.height / 2, brick.color);

                            // Drop power-up
                            if (Math.random() > 0.8) {
                                powerUps.push(new PowerUp(brick.x + brick.width / 2, brick.y + brick.height / 2));
                            }
                        }

                        ball.dy = -ball.dy;
                        break;
                    }
                }
            }

            // Check if all balls lost
            if (balls.length === 0) {
                lives--;
                if (lives <= 0) {
                    gameOver();
                } else {
                    balls = [new Ball(width / 2, height - 60)];
                }
            }

            // Update power-ups
            for (let i = powerUps.length - 1; i >= 0; i--) {
                const powerUp = powerUps[i];
                const lost = powerUp.update();

                if (lost) {
                    powerUps.splice(i, 1);
                    continue;
                }

                // Paddle collision
                if (powerUp.y + powerUp.radius > paddle.y &&
                    powerUp.y - powerUp.radius < paddle.y + paddle.height &&
                    powerUp.x > paddle.x &&
                    powerUp.x < paddle.x + paddle.width) {
                    
                    applyPowerUp(powerUp.type);
                    powerUps.splice(i, 1);
                }
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                if (particles[i].update()) {
                    particles.splice(i, 1);
                }
            }

            // Check win
            if (bricks.every(b => !b.alive)) {
                win();
            }

            updateHUD();
        }

        function applyPowerUp(type) {
            if (type === 'expand') {
                paddle.expand();
                setTimeout(() => paddle.shrink(), 10000);
            } else if (type === 'multiball') {
                const newBalls = [];
                for (const ball of balls) {
                    if (balls.length + newBalls.length < 5) {
                        const newBall = new Ball(ball.x, ball.y);
                        newBall.dx = -ball.dx;
                        newBall.dy = ball.dy;
                        newBalls.push(newBall);
                    }
                }
                balls.push(...newBalls);
            }
        }

        function draw() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, width, height);

            bricks.forEach(brick => brick.draw());
            paddle.draw();
            balls.forEach(ball => ball.draw());
            powerUps.forEach(pu => pu.draw());
            particles.forEach(p => p.draw());
        }

        function animate() {
            update();
            draw();
            animationId = requestAnimationFrame(animate);
        }

        function updateHUD() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('level').textContent = level;
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('winScreen').style.display = 'none';
            
            score = 0;
            lives = 3;
            level = 1;
            gameRunning = true;
            
            init();
            animate();
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').style.display = 'block';
        }

        function win() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            document.getElementById('winScore').textContent = score;
            document.getElementById('winScreen').style.display = 'block';
        }

        function nextLevel() {
            document.getElementById('winScreen').style.display = 'none';
            level++;
            gameRunning = true;
            
            init();
            animate();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Mouse/Touch controls
        canvas.addEventListener('mousemove', (e) => {
            if (paddle) {
                paddle.targetX = e.clientX - paddle.width / 2;
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (paddle) {
                paddle.targetX = e.touches[0].clientX - paddle.width / 2;
            }
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (paddle) {
                paddle.targetX = e.touches[0].clientX - paddle.width / 2;
            }
        }, { passive: false });

        window.addEventListener('resize', () => {
            if (gameRunning) {
                resize();
                if (paddle) {
                    paddle.y = height - 40;
                }
            }
        });

        resize();
    </script>
</body>
</html>
