<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brick Breaker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            font-family: 'Arial', sans-serif;
            touch-action: none;
        }
        
        .game-container {
            text-align: center;
            padding: 20px;
        }
        
        canvas {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            max-width: 100%;
            touch-action: none;
        }
        
        .score {
            color: #00ffff;
            font-size: 24px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        
        .fullscreen-btn {
            margin-top: 15px;
            background: rgba(0, 255, 255, 0.2);
            border: 2px solid rgba(0, 255, 255, 0.5);
            color: #00ffff;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .fullscreen-btn:hover {
            background: rgba(0, 255, 255, 0.3);
            transform: scale(1.05);
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 100;
        }
        
        .game-over h2 {
            color: #ff6b6b;
            font-size: 36px;
            margin-bottom: 20px;
        }
        
        .game-over p {
            color: #fff;
            font-size: 24px;
            margin-bottom: 30px;
        }
        
        .game-over button {
            background: linear-gradient(135deg, #00ffff, #0080ff);
            border: none;
            color: #fff;
            padding: 15px 40px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
        }
        
        .game-over button:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="score">Score: <span id="score">0</span></div>
        <canvas id="canvas"></canvas>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    </div>
    
    <div class="game-over" id="gameOver">
        <h2>Game Over!</h2>
        <p>Score: <span id="finalScore">0</span></p>
        <button onclick="restartGame()">Restart</button>
    </div>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverElement = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');
        
        // Canvasサイズ設定
        const width = canvas.width = 400;
        const height = canvas.height = 600;
        
        let score = 0;
        let gameRunning = true;
        
        // パドル
        const paddle = {
            width: 80,
            height: 10,
            x: width / 2 - 40,
            y: height - 30,
            speed: 8
        };
        
        // ボール
        const ball = {
            x: width / 2,
            y: height - 50,
            radius: 8,
            dx: 4,
            dy: -4,
            speed: 4
        };
        
        // ブリック設定
        const brickRowCount = 5;
        const brickColumnCount = 7;
        const brickWidth = 50;
        const brickHeight = 20;
        const brickPadding = 5;
        const brickOffsetTop = 50;
        const brickOffsetLeft = 15;
        
        // ブリック色
        const brickColors = [
            '#ff6b6b', '#feca57', '#48dbfb', '#1dd1a1', '#ff9ff3'
        ];
        
        // ブリック配列
        let bricks = [];
        
        function initBricks() {
            bricks = [];
            for (let c = 0; c < brickColumnCount; c++) {
                bricks[c] = [];
                for (let r = 0; r < brickRowCount; r++) {
                    bricks[c][r] = { 
                        x: c * (brickWidth + brickPadding) + brickOffsetLeft,
                        y: r * (brickHeight + brickPadding) + brickOffsetTop,
                        status: 1,
                        color: brickColors[r]
                    };
                }
            }
        }
        
        // キーボード制御
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        // タッチ制御
        let touchX = null;
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            touchX = touch.clientX - rect.left;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (touchX !== null) {
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                touchX = touch.clientX - rect.left;
            }
        });
        
        canvas.addEventListener('touchend', () => {
            touchX = null;
        });
        
        function movePaddle() {
            // キーボード
            if (keys['ArrowLeft'] || keys['a']) {
                paddle.x -= paddle.speed;
            }
            if (keys['ArrowRight'] || keys['d']) {
                paddle.x += paddle.speed;
            }
            
            // タッチ
            if (touchX !== null) {
                const targetX = touchX - paddle.width / 2;
                const diff = targetX - paddle.x;
                paddle.x += diff * 0.2;
            }
            
            // 境界チェック
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > width) paddle.x = width - paddle.width;
        }
        
        function moveBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;
            
            // 壁との衝突
            if (ball.x + ball.radius > width || ball.x - ball.radius < 0) {
                ball.dx = -ball.dx;
            }
            if (ball.y - ball.radius < 0) {
                ball.dy = -ball.dy;
            }
            
            // パドルとの衝突
            if (ball.y + ball.radius > paddle.y &&
                ball.x > paddle.x &&
                ball.x < paddle.x + paddle.width) {
                
                // パドルのどこに当たったかで角度を変える
                const hitPoint = (ball.x - paddle.x) / paddle.width;
                const angle = hitPoint * Math.PI - Math.PI / 2;
                const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
                
                ball.dx = Math.cos(angle) * speed;
                ball.dy = -Math.abs(Math.sin(angle) * speed);
                
                // 少し加速
                ball.dx *= 1.02;
                ball.dy *= 1.02;
            }
            
            // ブリックとの衝突
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    const brick = bricks[c][r];
                    if (brick.status === 1) {
                        if (ball.x > brick.x &&
                            ball.x < brick.x + brickWidth &&
                            ball.y > brick.y &&
                            ball.y < brick.y + brickHeight) {
                            
                            ball.dy = -ball.dy;
                            brick.status = 0;
                            score += 10;
                            scoreElement.textContent = score;
                            
                            // すべてのブリックを消したらリセット
                            if (score % (brickRowCount * brickColumnCount * 10) === 0) {
                                initBricks();
                            }
                        }
                    }
                }
            }
            
            // ゲームオーバー
            if (ball.y + ball.radius > height) {
                gameOver();
            }
        }
        
        function draw() {
            ctx.clearRect(0, 0, width, height);
            
            // ブリック描画
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    const brick = bricks[c][r];
                    if (brick.status === 1) {
                        ctx.fillStyle = brick.color;
                        ctx.shadowColor = brick.color;
                        ctx.shadowBlur = 10;
                        ctx.fillRect(brick.x, brick.y, brickWidth, brickHeight);
                        ctx.shadowBlur = 0;
                    }
                }
            }
            
            // パドル描画
            ctx.fillStyle = '#00ffff';
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 15;
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
            ctx.shadowBlur = 0;
            
            // ボール描画
            ctx.fillStyle = '#ffffff';
            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        function gameOver() {
            gameRunning = false;
            finalScoreElement.textContent = score;
            gameOverElement.style.display = 'block';
        }
        
        function restartGame() {
            score = 0;
            scoreElement.textContent = score;
            ball.x = width / 2;
            ball.y = height - 50;
            ball.dx = 4;
            ball.dy = -4;
            paddle.x = width / 2 - 40;
            initBricks();
            gameRunning = true;
            gameOverElement.style.display = 'none';
            gameLoop();
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            
            movePaddle();
            moveBall();
            draw();
            
            requestAnimationFrame(gameLoop);
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        // 初期化
        initBricks();
        gameLoop();
    </script>
</body>
</html>
