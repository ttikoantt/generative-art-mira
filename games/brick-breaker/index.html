<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Brick Breaker - ブロック崩し</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a1a;
            font-family: 'Arial', sans-serif;
            touch-action: manipulation;
            overflow: hidden;
        }
        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        #game-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 600px;
            margin-bottom: 15px;
            color: #fff;
        }
        .info-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        #score, #lives {
            font-size: 18px;
            font-weight: bold;
        }
        #canvas {
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.5);
        }
        #fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 1000;
        }
        #fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }
        #start-btn, #restart-btn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        #start-btn:hover, #restart-btn:hover {
            transform: scale(1.05);
        }
        #message {
            margin-top: 20px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        #controls {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <button id="fullscreen-btn">全画面表示</button>
    
    <div id="game-container">
        <div id="game-info">
            <div class="info-box">
                <span>スコア: </span><span id="score">0</span>
            </div>
            <div class="info-box">
                <span>ライフ: </span><span id="lives">3</span>
            </div>
        </div>
        
        <canvas id="canvas"></canvas>
        
        <div id="message"></div>
        <div id="controls">
            ← → またはドラッグでパドルを動かす
        </div>
        <button id="start-btn">スタート</button>
        <button id="restart-btn" style="display: none;">再スタート</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const scoreDisplay = document.getElementById('score');
        const livesDisplay = document.getElementById('lives');
        const messageDisplay = document.getElementById('message');

        // キャンバスサイズ設定
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 600);
            const maxHeight = Math.min(window.innerHeight - 200, 700);
            
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ゲーム変数
        let ball, paddle, bricks, score, lives, gameRunning, gameStarted;

        // ゲーム初期化
        function initGame() {
            ball = {
                x: canvas.width / 2,
                y: canvas.height - 50,
                radius: 8,
                dx: 4,
                dy: -4,
                speed: 4
            };

            paddle = {
                width: 100,
                height: 15,
                x: canvas.width / 2 - 50,
                speed: 8
            };

            score = 0;
            lives = 3;
            gameRunning = false;
            gameStarted = false;

            // ブロック作成
            createBricks();
            updateDisplay();
        }

        // ブロック作成
        function createBricks() {
            bricks = [];
            const rows = 5;
            const cols = 8;
            const padding = 10;
            const offsetTop = 50;
            const offsetLeft = 30;
            const brickWidth = (canvas.width - offsetLeft * 2 - padding * (cols - 1)) / cols;
            const brickHeight = 25;

            const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#1dd1a1', '#ff9ff3'];

            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    bricks.push({
                        x: offsetLeft + col * (brickWidth + padding),
                        y: offsetTop + row * (brickHeight + padding),
                        width: brickWidth,
                        height: brickHeight,
                        visible: true,
                        color: colors[row % colors.length]
                    });
                }
            }
        }

        // パドル移動
        let keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // タッチ操作
        let touchStartX = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touchX = e.touches[0].clientX;
            const diff = touchX - touchStartX;
            paddle.x += diff * 0.8;
            touchStartX = touchX;

            // 境界チェック
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;
        });

        // ボール移動
        function moveBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // 壁に当たった
            if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
                ball.dx *= -1;
            }
            if (ball.y - ball.radius < 0) {
                ball.dy *= -1;
            }

            // 底に落ちた
            if (ball.y + ball.radius > canvas.height) {
                lives--;
                if (lives <= 0) {
                    gameOver();
                } else {
                    resetBall();
                }
            }

            // パドルに当たった
            if (ball.y + ball.radius > canvas.height - paddle.height - 10 &&
                ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
                
                // パドルの位置によって反射角度を変える
                const hitPos = (ball.x - paddle.x) / paddle.width;
                const angle = (hitPos - 0.5) * Math.PI / 3;
                
                ball.dx = ball.speed * Math.sin(angle);
                ball.dy = -ball.speed * Math.cos(angle);
            }

            // ブロックに当たった
            bricks.forEach(brick => {
                if (brick.visible &&
                    ball.x > brick.x && ball.x < brick.x + brick.width &&
                    ball.y > brick.y && ball.y < brick.y + brick.height) {
                    
                    ball.dy *= -1;
                    brick.visible = false;
                    score += 10;
                    
                    // 全部消した
                    if (bricks.every(b => !b.visible)) {
                        gameWin();
                    }
                }
            });
        }

        // パドル移動
        function movePaddle() {
            if (keys['ArrowLeft'] || keys['a']) {
                paddle.x -= paddle.speed;
            }
            if (keys['ArrowRight'] || keys['d']) {
                paddle.x += paddle.speed;
            }

            // 境界チェック
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;
        }

        // ボールリセット
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height - 50;
            ball.dx = 4 * (Math.random() > 0.5 ? 1 : -1);
            ball.dy = -4;
        }

        // ゲームオーバー
        function gameOver() {
            gameRunning = false;
            messageDisplay.textContent = 'ゲームオーバー！';
            messageDisplay.style.color = '#ff6b6b';
            restartBtn.style.display = 'block';
        }

        // ゲームクリア
        function gameWin() {
            gameRunning = false;
            messageDisplay.textContent = 'クリア！おめでとう！';
            messageDisplay.style.color = '#1dd1a1';
            restartBtn.style.display = 'block';
        }

        // 表示更新
        function updateDisplay() {
            scoreDisplay.textContent = score;
            livesDisplay.textContent = lives;
        }

        // 描画
        function draw() {
            // クリア
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // ブロック
            bricks.forEach(brick => {
                if (brick.visible) {
                    ctx.fillStyle = brick.color;
                    ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
                    
                    // グロー効果
                    ctx.shadowColor = brick.color;
                    ctx.shadowBlur = 10;
                    ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
                    ctx.shadowBlur = 0;
                }
            });

            // パドル
            ctx.fillStyle = '#fff';
            ctx.shadowColor = '#fff';
            ctx.shadowBlur = 15;
            ctx.fillRect(paddle.x, canvas.height - paddle.height - 10, paddle.width, paddle.height);
            ctx.shadowBlur = 0;

            // ボール
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.shadowColor = '#fff';
            ctx.shadowBlur = 20;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // ゲームループ
        function gameLoop() {
            if (!gameRunning) return;

            movePaddle();
            moveBall();
            updateDisplay();
            draw();

            requestAnimationFrame(gameLoop);
        }

        // ゲーム開始
        function startGame() {
            initGame();
            gameRunning = true;
            gameStarted = true;
            messageDisplay.textContent = '';
            startBtn.style.display = 'none';
            restartBtn.style.display = 'none';
            gameLoop();
        }

        // イベントリスナー
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // 全画面表示
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                fullscreenBtn.textContent = '全画面解除';
            } else {
                document.exitFullscreen();
                fullscreenBtn.textContent = '全画面表示';
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                fullscreenBtn.textContent = '全画面表示';
            }
        });

        // 初期描画
        initGame();
        draw();
    </script>
</body>
</html>
