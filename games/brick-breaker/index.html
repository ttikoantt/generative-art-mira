<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Brick Breaker - Neon Arcade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 4/5;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #0a0a0f;
        }

        .ui {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
        }

        .ui div {
            text-shadow: 0 0 20px currentColor;
        }

        .score { color: #00d2d3; }
        .lives { color: #ff6b6b; }
        .level { color: #feca57; }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 15, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h1 {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.7;
        }

        .overlay button {
            padding: 15px 50px;
            font-size: 20px;
            background: linear-gradient(45deg, #00d2d3, #54a0ff);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 30px rgba(0, 210, 211, 0.5);
        }

        .overlay button:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 40px rgba(0, 210, 211, 0.7);
        }

        .fullscreen-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        @media (max-width: 600px) {
            .overlay h1 { font-size: 36px; }
            .overlay p { font-size: 16px; }
            .overlay button { padding: 12px 40px; font-size: 18px; }
            .ui { font-size: 18px; padding: 0 15px; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="canvas"></canvas>

        <div class="ui">
            <div class="score">0</div>
            <div class="level">LVL 1</div>
            <div class="lives">❤️3</div>
        </div>

        <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

        <div class="overlay" id="overlay">
            <h1>BRICK BREAKER</h1>
            <p>Touch & Drag to move paddle</p>
            <button onclick="startGame()">START</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const scoreEl = document.querySelector('.score');
        const livesEl = document.querySelector('.lives');
        const levelEl = document.querySelector('.level');

        let width, height;
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let level = 1;

        const paddle = {
            width: 120,
            height: 15,
            x: 0,
            speed: 8
        };

        const ball = {
            x: 0,
            y: 0,
            size: 10,
            dx: 5,
            dy: -5,
            speed: 5
        };

        let bricks = [];
        const brickRows = 5;
        const brickCols = 8;
        const brickWidth = 50;
        const brickHeight = 20;
        const brickPadding = 10;
        const brickOffsetTop = 60;
        const brickOffsetLeft = 35;

        const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff'];

        function resize() {
            const container = document.querySelector('.game-container');
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            width = canvas.width;
            height = canvas.height;

            paddle.x = width / 2 - paddle.width / 2;

            if (!gameRunning) {
                resetBall();
            }
        }

        function createBricks() {
            bricks = [];
            const cols = Math.floor((width - 60) / (brickWidth + brickPadding));
            const offsetX = (width - cols * (brickWidth + brickPadding) + brickPadding) / 2;

            for (let row = 0; row < brickRows; row++) {
                for (let col = 0; col < cols; col++) {
                    bricks.push({
                        x: offsetX + col * (brickWidth + brickPadding),
                        y: brickOffsetTop + row * (brickHeight + brickPadding),
                        width: brickWidth,
                        height: brickHeight,
                        color: colors[row % colors.length],
                        hits: row < 2 ? 2 : 1
                    });
                }
            }
        }

        function resetBall() {
            ball.x = width / 2;
            ball.y = height - 50;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * ball.speed;
            ball.dy = -ball.speed;
        }

        function drawPaddle() {
            ctx.beginPath();
            ctx.roundRect(paddle.x, height - 30, paddle.width, paddle.height, 5);
            const gradient = ctx.createLinearGradient(paddle.x, 0, paddle.x + paddle.width, 0);
            gradient.addColorStop(0, '#00d2d3');
            gradient.addColorStop(1, '#54a0ff');
            ctx.fillStyle = gradient;
            ctx.fill();

            // Glow
            ctx.shadowColor = '#00d2d3';
            ctx.shadowBlur = 20;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();

            // Glow
            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawBricks() {
            bricks.forEach(brick => {
                ctx.beginPath();
                ctx.roundRect(brick.x, brick.y, brick.width, brick.height, 3);

                if (brick.hits === 2) {
                    ctx.fillStyle = brick.color;
                    ctx.globalAlpha = 1;
                } else {
                    ctx.fillStyle = brick.color;
                    ctx.globalAlpha = 0.7;
                }

                ctx.fill();
                ctx.globalAlpha = 1;

                ctx.shadowColor = brick.color;
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        }

        function update() {
            if (!gameRunning) return;

            // Ball movement
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Wall collision
            if (ball.x - ball.size < 0 || ball.x + ball.size > width) {
                ball.dx *= -1;
            }
            if (ball.y - ball.size < 0) {
                ball.dy *= -1;
            }

            // Bottom - lose life
            if (ball.y + ball.size > height) {
                lives--;
                livesEl.textContent = '❤️' + lives;

                if (lives <= 0) {
                    gameOver();
                } else {
                    resetBall();
                }
            }

            // Paddle collision
            if (ball.y + ball.size > height - 30 &&
                ball.y - ball.size < height - 30 + paddle.height &&
                ball.x > paddle.x &&
                ball.x < paddle.x + paddle.width) {

                ball.dy = -Math.abs(ball.dy);

                // Angle based on hit position
                const hitPos = (ball.x - paddle.x) / paddle.width;
                ball.dx = (hitPos - 0.5) * 10;
            }

            // Brick collision
            bricks.forEach((brick, index) => {
                if (ball.x + ball.size > brick.x &&
                    ball.x - ball.size < brick.x + brick.width &&
                    ball.y + ball.size > brick.y &&
                    ball.y - ball.size < brick.y + brick.height) {

                    ball.dy *= -1;
                    brick.hits--;

                    if (brick.hits <= 0) {
                        bricks.splice(index, 1);
                        score += 10;
                        scoreEl.textContent = score;
                    }
                }
            });

            // Level complete
            if (bricks.length === 0) {
                level++;
                levelEl.textContent = 'LVL ' + level;
                ball.speed += 0.5;
                createBricks();
                resetBall();
            }
        }

        function draw() {
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, width, height);

            drawBricks();
            drawPaddle();
            drawBall();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            overlay.classList.add('hidden');
            gameRunning = true;
            score = 0;
            lives = 3;
            level = 1;
            ball.speed = 5;
            scoreEl.textContent = '0';
            livesEl.textContent = '❤️3';
            levelEl.textContent = 'LVL 1';
            createBricks();
            resetBall();
        }

        function gameOver() {
            gameRunning = false;
            overlay.querySelector('h1').textContent = 'GAME OVER';
            overlay.querySelector('p').textContent = 'Score: ' + score;
            overlay.querySelector('button').textContent = 'PLAY AGAIN';
            overlay.classList.remove('hidden');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Controls
        let touchStartX = 0;

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            paddle.x = x - paddle.width / 2;
            paddle.x = Math.max(0, Math.min(width - paddle.width, paddle.x));
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left;
            paddle.x = x - paddle.width / 2;
            paddle.x = Math.max(0, Math.min(width - paddle.width, paddle.x));
        });

        window.addEventListener('resize', resize);
        resize();
        gameLoop();
    </script>
</body>
</html>
