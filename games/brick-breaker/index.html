<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brick Breaker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        .game-container {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: #fff;
        }
        .header h1 {
            font-size: 24px;
            text-shadow: 0 0 20px rgba(255, 100, 100, 0.5);
        }
        .stats {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }
        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 8px;
        }
        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 11px;
        }
        .stat-value {
            color: #fff;
            font-size: 18px;
            font-weight: bold;
        }
        canvas {
            display: block;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
        }
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            color: #fff;
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.3);
        }
        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 100;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            z-index: 10;
        }
        .overlay.hidden {
            display: none;
        }
        .overlay h2 {
            color: #fff;
            font-size: 32px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 100, 100, 0.5);
        }
        .overlay p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            margin-bottom: 30px;
        }
        .instructions {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
        }
        @media (max-width: 768px) {
            .game-container {
                padding: 15px;
                margin: 10px;
            }
            .header h1 {
                font-size: 20px;
            }
            .stats {
                gap: 10px;
            }
            .stat {
                padding: 6px 10px;
            }
            .stat-value {
                font-size: 16px;
            }
            .fullscreen-btn {
                bottom: 15px;
                right: 15px;
                width: 45px;
                height: 45px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🧱 Brick Breaker</h1>
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">SCORE</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">LIVES</div>
                    <div class="stat-value" id="lives">3</div>
                </div>
                <div class="stat">
                    <div class="stat-label">LEVEL</div>
                    <div class="stat-value" id="level">1</div>
                </div>
            </div>
        </div>
        
        <canvas id="canvas"></canvas>
        
        <div class="controls">
            <button class="btn-primary" onclick="startGame()">Start Game</button>
            <button class="btn-secondary" onclick="togglePause()">Pause</button>
        </div>
        
        <div class="instructions">
            Use ← → arrow keys or touch to move the paddle
        </div>
        
        <div class="overlay" id="overlay">
            <h2 id="overlayTitle">Brick Breaker</h2>
            <p id="overlayMessage">Break all the bricks!</p>
            <button class="btn-primary" onclick="startGame()">Start</button>
        </div>
    </div>
    
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Game settings
        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 600;
        const PADDLE_WIDTH = 100;
        const PADDLE_HEIGHT = 15;
        const BALL_RADIUS = 8;
        const BRICK_ROWS = 5;
        const BRICK_COLS = 10;
        const BRICK_WIDTH = 70;
        const BRICK_HEIGHT = 25;
        const BRICK_PADDING = 5;
        const BRICK_OFFSET_TOP = 50;
        const BRICK_OFFSET_LEFT = 35;
        
        // Game state
        let gameState = {
            score: 0,
            lives: 3,
            level: 1,
            paused: false,
            gameStarted: false,
            gameOver: false,
            won: false
        };
        
        // Paddle
        let paddle = {
            x: CANVAS_WIDTH / 2 - PADDLE_WIDTH / 2,
            y: CANVAS_HEIGHT - 30,
            width: PADDLE_WIDTH,
            height: PADDLE_HEIGHT,
            speed: 8,
            dx: 0
        };
        
        // Ball
        let ball = {
            x: CANVAS_WIDTH / 2,
            y: CANVAS_HEIGHT - 50,
            radius: BALL_RADIUS,
            speed: 5,
            dx: 4,
            dy: -4
        };
        
        // Bricks
        let bricks = [];
        
        // Particles
        let particles = [];
        
        // Brick colors by row
        const brickColors = [
            { fill: '#ff6b6b', stroke: '#ff8787' },
            { fill: '#ffa502', stroke: '#ffb732' },
            { fill: '#ffd93d', stroke: '#ffe066' },
            { fill: '#6bcb77', stroke: '#8bdb89' },
            { fill: '#4d96ff', stroke: '#74abff' }
        ];
        
        function initCanvas() {
            // Set canvas size
            const maxWidth = Math.min(CANVAS_WIDTH, window.innerWidth - 40);
            const scale = maxWidth / CANVAS_WIDTH;
            canvas.width = CANVAS_WIDTH * scale;
            canvas.height = CANVAS_HEIGHT * scale;
            ctx.scale(scale, scale);
        }
        
        function createBricks() {
            bricks = [];
            for (let row = 0; row < BRICK_ROWS; row++) {
                for (let col = 0; col < BRICK_COLS; col++) {
                    bricks.push({
                        x: BRICK_OFFSET_LEFT + col * (BRICK_WIDTH + BRICK_PADDING),
                        y: BRICK_OFFSET_TOP + row * (BRICK_HEIGHT + BRICK_PADDING),
                        width: BRICK_WIDTH,
                        height: BRICK_HEIGHT,
                        color: brickColors[row],
                        hits: row < 2 ? 2 : 1, // Top 2 rows need 2 hits
                        visible: true
                    });
                }
            }
        }
        
        function createParticles(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    radius: Math.random() * 3 + 1,
                    color: color,
                    alpha: 1
                });
            }
        }
        
        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.02;
                return p.alpha > 0;
            });
        }
        
        function drawParticles() {
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color.replace(')', `, ${p.alpha})`).replace('rgb', 'rgba');
                ctx.fill();
            });
        }
        
        function drawPaddle() {
            const gradient = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.height);
            gradient.addColorStop(0, '#4d96ff');
            gradient.addColorStop(1, '#6bcb77');
            
            ctx.beginPath();
            ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 8);
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // Glow effect
            ctx.shadowColor = '#4d96ff';
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        function drawBall() {
            // Glow
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius + 5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.fill();
            
            // Ball
            const gradient = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 0, ball.x, ball.y, ball.radius);
            gradient.addColorStop(0, '#fff');
            gradient.addColorStop(1, '#ffd93d');
            
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
        }
        
        function drawBricks() {
            bricks.forEach(brick => {
                if (!brick.visible) return;
                
                const gradient = ctx.createLinearGradient(brick.x, brick.y, brick.x, brick.y + brick.height);
                gradient.addColorStop(0, brick.color.stroke);
                gradient.addColorStop(1, brick.color.fill);
                
                ctx.beginPath();
                ctx.roundRect(brick.x, brick.y, brick.width, brick.height, 4);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // Show crack for damaged bricks
                if (brick.hits === 1) {
                    ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(brick.x + brick.width * 0.3, brick.y);
                    ctx.lineTo(brick.x + brick.width * 0.5, brick.y + brick.height * 0.5);
                    ctx.lineTo(brick.x + brick.width * 0.4, brick.y + brick.height);
                    ctx.stroke();
                }
            });
        }
        
        function movePaddle() {
            paddle.x += paddle.dx;
            
            // Wall collision
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > CANVAS_WIDTH) paddle.x = CANVAS_WIDTH - paddle.width;
        }
        
        function moveBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;
            
            // Wall collision
            if (ball.x - ball.radius < 0 || ball.x + ball.radius > CANVAS_WIDTH) {
                ball.dx = -ball.dx;
            }
            if (ball.y - ball.radius < 0) {
                ball.dy = -ball.dy;
            }
            
            // Bottom - lose life
            if (ball.y + ball.radius > CANVAS_HEIGHT) {
                gameState.lives--;
                updateStats();
                
                if (gameState.lives <= 0) {
                    endGame(false);
                } else {
                    resetBall();
                }
            }
            
            // Paddle collision
            if (ball.y + ball.radius > paddle.y &&
                ball.y - ball.radius < paddle.y + paddle.height &&
                ball.x > paddle.x &&
                ball.x < paddle.x + paddle.width) {
                
                // Calculate hit position for angle
                const hitPos = (ball.x - paddle.x) / paddle.width;
                const angle = (hitPos - 0.5) * Math.PI * 0.7;
                
                const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
                ball.dx = Math.sin(angle) * speed;
                ball.dy = -Math.abs(Math.cos(angle) * speed);
                
                // Create particles
                createParticles(ball.x, ball.y, 'rgb(77, 150, 255)');
            }
            
            // Brick collision
            bricks.forEach(brick => {
                if (!brick.visible) return;
                
                if (ball.x + ball.radius > brick.x &&
                    ball.x - ball.radius < brick.x + brick.width &&
                    ball.y + ball.radius > brick.y &&
                    ball.y - ball.radius < brick.y + brick.height) {
                    
                    ball.dy = -ball.dy;
                    brick.hits--;
                    
                    if (brick.hits <= 0) {
                        brick.visible = false;
                        gameState.score += 10 * gameState.level;
                        createParticles(brick.x + brick.width / 2, brick.y + brick.height / 2, brick.color.fill);
                    } else {
                        createParticles(ball.x, ball.y, 'rgb(255, 255, 255)');
                    }
                    
                    updateStats();
                    
                    // Check win
                    if (bricks.every(b => !b.visible)) {
                        endGame(true);
                    }
                }
            });
        }
        
        function resetBall() {
            ball.x = paddle.x + paddle.width / 2;
            ball.y = paddle.y - ball.radius - 5;
            ball.dx = 4 * (Math.random() > 0.5 ? 1 : -1);
            ball.dy = -4;
        }
        
        function updateStats() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('lives').textContent = gameState.lives;
            document.getElementById('level').textContent = gameState.level;
        }
        
        function startGame() {
            gameState.score = 0;
            gameState.lives = 3;
            gameState.level = 1;
            gameState.gameStarted = true;
            gameState.gameOver = false;
            gameState.won = false;
            gameState.paused = false;
            
            paddle.x = CANVAS_WIDTH / 2 - PADDLE_WIDTH / 2;
            
            createBricks();
            resetBall();
            updateStats();
            
            document.getElementById('overlay').classList.add('hidden');
            
            if (!animationRunning) {
                animationRunning = true;
                animate();
            }
        }
        
        function endGame(won) {
            gameState.gameOver = true;
            gameState.won = won;
            
            const overlay = document.getElementById('overlay');
            const title = document.getElementById('overlayTitle');
            const message = document.getElementById('overlayMessage');
            
            if (won) {
                title.textContent = '🎉 You Win!';
                message.textContent = `Score: ${gameState.score} | Lives: ${gameState.lives}`;
            } else {
                title.textContent = '💀 Game Over';
                message.textContent = `Final Score: ${gameState.score}`;
            }
            
            overlay.classList.remove('hidden');
        }
        
        function togglePause() {
            if (!gameState.gameStarted || gameState.gameOver) return;
            
            gameState.paused = !gameState.paused;
            document.querySelector('.btn-secondary').textContent = gameState.paused ? 'Resume' : 'Pause';
            
            if (!gameState.paused && !animationRunning) {
                animationRunning = true;
                animate();
            }
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        let animationRunning = false;
        
        function animate() {
            if (!gameState.gameStarted || gameState.paused) {
                animationRunning = false;
                return;
            }
            
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            if (!gameState.gameOver) {
                movePaddle();
                moveBall();
            }
            
            drawBricks();
            drawPaddle();
            drawBall();
            updateParticles();
            drawParticles();
            
            requestAnimationFrame(animate);
        }
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                paddle.dx = -paddle.speed;
            } else if (e.key === 'ArrowRight') {
                paddle.dx = paddle.speed;
            } else if (e.key === ' ' && gameState.gameStarted && !gameState.gameOver) {
                togglePause();
            }
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' && paddle.dx < 0) {
                paddle.dx = 0;
            } else if (e.key === 'ArrowRight' && paddle.dx > 0) {
                paddle.dx = 0;
            }
        });
        
        // Touch controls
        let touchStartX = 0;
        
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            e.preventDefault();
        });
        
        canvas.addEventListener('touchmove', (e) => {
            const touchX = e.touches[0].clientX;
            const diff = touchX - touchStartX;
            
            paddle.x += diff * 0.5;
            
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > CANVAS_WIDTH) paddle.x = CANVAS_WIDTH - paddle.width;
            
            touchStartX = touchX;
            e.preventDefault();
        });
        
        // Initialize
        initCanvas();
        createBricks();
        drawBricks();
        drawPaddle();
        drawBall();
        
        window.addEventListener('resize', initCanvas);
    </script>
</body>
</html>
