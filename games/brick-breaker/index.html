<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Brick Breaker | ブロック崩し</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            margin: 0 auto;
        }

        #ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 100;
        }

        #score, #level, #lives {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        #score span, #level span, #lives span {
            color: #f39c12;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            color: white;
            text-align: center;
        }

        #overlay.hidden {
            display: none;
        }

        #overlay h1 {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #overlay p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        #overlay button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px 50px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            pointer-events: all;
        }

        #overlay button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        #overlay button:active {
            transform: scale(0.95);
        }

        #fullscreenBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: all;
        }

        #fullscreenBtn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.1);
        }

        .combo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            font-weight: bold;
            color: #f39c12;
            text-shadow: 0 0 20px rgba(243, 156, 18, 0.8);
            pointer-events: none;
            z-index: 150;
            animation: comboAnim 0.5s ease-out forwards;
        }

        @keyframes comboAnim {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui">
        <div id="score">Score: <span>0</span></div>
        <div id="level">Level: <span>1</span></div>
        <div id="lives">Lives: <span>3</span></div>
    </div>

    <button id="fullscreenBtn">⛶</button>

    <div id="overlay">
        <h1>Brick Breaker</h1>
        <p>ブロック崩し - パドルを動かしてボールを跳ね返せ！</p>
        <p style="font-size: 14px; opacity: 0.6;">マウス/タッチでパドルを操作</p>
        <button id="startBtn">Start Game</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let gameRunning = false;
        let animationId;

        // Game state
        let score = 0;
        let level = 1;
        let lives = 3;
        let combo = 0;
        let lastHitTime = 0;

        // Paddle
        const paddle = {
            width: 120,
            height: 15,
            x: 0,
            y: 0,
            speed: 8,
            dx: 0
        };

        // Ball
        const ball = {
            x: 0,
            y: 0,
            radius: 8,
            speed: 5,
            dx: 0,
            dy: 0
        };

        // Bricks
        const bricks = [];
        const brickRowCount = 6;
        const brickColumnCount = 10;
        const brickWidth = 70;
        const brickHeight = 25;
        const brickPadding = 8;
        const brickOffsetTop = 80;
        const brickOffsetLeft = 35;

        // Brick colors by row
        const brickColors = [
            { fill: '#e74c3c', stroke: '#c0392b', points: 60 },
            { fill: '#e67e22', stroke: '#d35400', points: 50 },
            { fill: '#f39c12', stroke: '#e67e22', points: 40 },
            { fill: '#2ecc71', stroke: '#27ae60', points: 30 },
            { fill: '#3498db', stroke: '#2980b9', points: 20 },
            { fill: '#9b59b6', stroke: '#8e44ad', points: 10 }
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;

            // Center paddle
            paddle.x = width / 2 - paddle.width / 2;
            paddle.y = height - 50;
        }

        function initBricks() {
            bricks.length = 0;

            const totalWidth = brickColumnCount * (brickWidth + brickPadding) - brickPadding;
            const startX = (width - totalWidth) / 2;

            for (let row = 0; row < brickRowCount; row++) {
                for (let col = 0; col < brickColumnCount; col++) {
                    bricks.push({
                        x: startX + col * (brickWidth + brickPadding),
                        y: brickOffsetTop + row * (brickHeight + brickPadding),
                        width: brickWidth,
                        height: brickHeight,
                        color: brickColors[row],
                        visible: true,
                        health: row < 2 ? 2 : 1 // Top 2 rows need 2 hits
                    });
                }
            }
        }

        function resetBall() {
            ball.x = width / 2;
            ball.y = paddle.y - 30;
            ball.speed = 5 + level * 0.5;
            const angle = (Math.random() * 60 + 60) * Math.PI / 180;
            ball.dx = ball.speed * Math.cos(angle) * (Math.random() > 0.5 ? 1 : -1);
            ball.dy = -ball.speed * Math.sin(angle);
        }

        function startGame() {
            score = 0;
            level = 1;
            lives = 3;
            combo = 0;

            updateUI();
            initBricks();
            resetBall();

            gameRunning = true;
            document.getElementById('overlay').classList.add('hidden');
            animate();
        }

        function nextLevel() {
            level++;
            initBricks();
            resetBall();
            updateUI();
        }

        function loseLife() {
            lives--;
            combo = 0;
            updateUI();

            if (lives <= 0) {
                gameOver();
            } else {
                resetBall();
            }
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);

            document.getElementById('overlay').classList.remove('hidden');
            document.querySelector('#overlay h1').textContent = 'Game Over';
            document.querySelector('#overlay p').innerHTML = `Final Score: <span style="color: #f39c12;">${score}</span><br>Level: ${level}`;
            document.getElementById('startBtn').textContent = 'Play Again';
        }

        function showCombo(text) {
            const comboEl = document.createElement('div');
            comboEl.className = 'combo';
            comboEl.textContent = text;
            document.body.appendChild(comboEl);

            setTimeout(() => comboEl.remove(), 500);
        }

        function updateUI() {
            document.querySelector('#score span').textContent = score;
            document.querySelector('#level span').textContent = level;
            document.querySelector('#lives span').textContent = lives;
        }

        function update() {
            // Move paddle
            paddle.x += paddle.dx;

            // Paddle bounds
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > width) paddle.x = width - paddle.width;

            // Move ball
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Ball wall collision
            if (ball.x - ball.radius < 0 || ball.x + ball.radius > width) {
                ball.dx = -ball.dx;
            }
            if (ball.y - ball.radius < 0) {
                ball.dy = -ball.dy;
            }

            // Ball paddle collision
            if (ball.y + ball.radius > paddle.y &&
                ball.y - ball.radius < paddle.y + paddle.height &&
                ball.x > paddle.x &&
                ball.x < paddle.x + paddle.width) {

                // Calculate bounce angle based on hit position
                const hitPos = (ball.x - paddle.x) / paddle.width;
                const angle = (hitPos * 120 + 30) * Math.PI / 180;

                ball.dx = ball.speed * Math.cos(angle);
                ball.dy = -ball.speed * Math.sin(angle);
                ball.y = paddle.y - ball.radius;

                // Add some speed
                ball.speed = Math.min(ball.speed * 1.02, 12);
            }

            // Ball brick collision
            let bricksRemaining = 0;
            const now = Date.now();

            bricks.forEach(brick => {
                if (!brick.visible) return;

                bricksRemaining++;

                if (ball.x + ball.radius > brick.x &&
                    ball.x - ball.radius < brick.x + brick.width &&
                    ball.y + ball.radius > brick.y &&
                    ball.y - ball.radius < brick.y + brick.height) {

                    brick.health--;

                    if (brick.health <= 0) {
                        brick.visible = false;

                        // Combo system
                        if (now - lastHitTime < 500) {
                            combo++;
                            if (combo >= 3) {
                                const comboBonus = combo * 10;
                                score += comboBonus;
                                showCombo(`${combo}x Combo! +${comboBonus}`);
                            }
                        } else {
                            combo = 1;
                        }
                        lastHitTime = now;

                        score += brick.color.points;
                    } else {
                        // Flash white when damaged but not destroyed
                        score += Math.floor(brick.color.points / 2);
                    }

                    // Determine bounce direction
                    const overlapLeft = ball.x + ball.radius - brick.x;
                    const overlapRight = brick.x + brick.width - (ball.x - ball.radius);
                    const overlapTop = ball.y + ball.radius - brick.y;
                    const overlapBottom = brick.y + brick.height - (ball.y - ball.radius);

                    const minOverlapX = Math.min(overlapLeft, overlapRight);
                    const minOverlapY = Math.min(overlapTop, overlapBottom);

                    if (minOverlapX < minOverlapY) {
                        ball.dx = -ball.dx;
                    } else {
                        ball.dy = -ball.dy;
                    }

                    updateUI();
                }
            });

            // Check level complete
            if (bricksRemaining === 0) {
                nextLevel();
            }

            // Ball out of bounds
            if (ball.y - ball.radius > height) {
                loseLife();
            }
        }

        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, width, height);

            // Draw bricks
            bricks.forEach(brick => {
                if (!brick.visible) return;

                // Glow effect
                ctx.shadowBlur = 15;
                ctx.shadowColor = brick.color.fill;

                // Brick body
            const gradient = ctx.createLinearGradient(
                    brick.x, brick.y,
                    brick.x, brick.y + brick.height
                );
                gradient.addColorStop(0, brick.color.fill);
                gradient.addColorStop(1, brick.color.stroke);

                ctx.fillStyle = gradient;
                ctx.fillRect(brick.x, brick.y, brick.width, brick.height);

                // Brick border
                ctx.strokeStyle = brick.color.stroke;
                ctx.lineWidth = 2;
                ctx.strokeRect(brick.x, brick.y, brick.width, brick.height);

                // Health indicator for multi-hit bricks
                if (brick.health > 1) {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                    ctx.font = 'bold 14px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(brick.health, brick.x + brick.width / 2, brick.y + brick.height / 2);
                }

                ctx.shadowBlur = 0;
            });

            // Draw paddle
            const paddleGradient = ctx.createLinearGradient(
                paddle.x, paddle.y,
                paddle.x, paddle.y + paddle.height
            );
            paddleGradient.addColorStop(0, '#667eea');
            paddleGradient.addColorStop(1, '#764ba2');

            ctx.shadowBlur = 20;
            ctx.shadowColor = '#667eea';
            ctx.fillStyle = paddleGradient;
            ctx.beginPath();
            ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 8);
            ctx.fill();

            // Draw ball
            const ballGradient = ctx.createRadialGradient(
                ball.x - 2, ball.y - 2, 0,
                ball.x, ball.y, ball.radius
            );
            ballGradient.addColorStop(0, '#ffffff');
            ballGradient.addColorStop(1, '#667eea');

            ctx.shadowBlur = 15;
            ctx.shadowColor = '#667eea';
            ctx.fillStyle = ballGradient;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 0;
        }

        function animate() {
            if (!gameRunning) return;

            update();
            draw();
            animationId = requestAnimationFrame(animate);
        }

        // Event listeners
        document.getElementById('startBtn').addEventListener('click', startGame);

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Mouse/Touch controls
        function movePaddle(clientX) {
            const rect = canvas.getBoundingClientRect();
            const x = clientX - rect.left;
            paddle.x = x - paddle.width / 2;

            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > width) paddle.x = width - paddle.width;
        }

        canvas.addEventListener('mousemove', (e) => {
            if (gameRunning) {
                movePaddle(e.clientX);
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            if (gameRunning) {
                e.preventDefault();
                movePaddle(e.touches[0].clientX);
            }
        }, { passive: false });

        window.addEventListener('resize', () => {
            resize();
            if (!gameRunning) {
                initBricks();
            }
        });

        // Initialize
        resize();
        initBricks();
    </script>
</body>
</html>
