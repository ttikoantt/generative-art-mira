<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brick Breaker - Arcade Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .game-container {
            text-align: center;
            width: 100%;
            max-width: 800px;
        }

        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 2em;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .score-display {
            color: #0ff;
            font-size: 1.5em;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .lives-display {
            color: #f0f;
            font-size: 1.2em;
            margin-bottom: 15px;
        }

        canvas {
            background: #000;
            border: 2px solid #0ff;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            display: block;
            margin: 0 auto;
            max-width: 100%;
            touch-action: none;
        }

        .controls {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
        }

        .btn {
            background: linear-gradient(135deg, #0ff, #00f);
            color: #fff;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            margin: 10px 5px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5em;
            }

            .score-display {
                font-size: 1.2em;
            }

            .lives-display {
                font-size: 1em;
            }

            .controls {
                font-size: 0.8em;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">
        Fullscreen
    </button>

    <div class="game-container">
        <h1>🎮 Brick Breaker</h1>
        <div class="score-display">Score: <span id="score">0</span></div>
        <div class="lives-display">Lives: <span id="lives">❤️❤️❤️</span></div>
        <canvas id="game"></canvas>
        <div class="controls">
            <p>🖱️ Move mouse or touch to control paddle</p>
            <button class="btn" onclick="startGame()">Start Game</button>
            <button class="btn" onclick="resetGame()">Reset</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        // Set canvas size
        function resizeCanvas() {
            const maxWidth = Math.min(800, window.innerWidth - 40);
            const ratio = 600 / 800;
            canvas.width = maxWidth;
            canvas.height = maxWidth * ratio;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game variables
        let score = 0;
        let lives = 3;
        let gameRunning = false;
        let animationId;

        // Paddle
        const paddle = {
            width: 100,
            height: 15,
            x: 0,
            y: 0,
            speed: 8
        };

        // Ball
        const ball = {
            x: 0,
            y: 0,
            radius: 8,
            dx: 4,
            dy: -4,
            speed: 4
        };

        // Bricks
        const brickConfig = {
            rows: 5,
            cols: 10,
            width: 70,
            height: 25,
            padding: 5,
            offsetTop: 50,
            offsetLeft: 35
        };

        let bricks = [];

        // Brick colors (neon style)
        const brickColors = [
            '#ff006e', // Pink
            '#fb5607', // Orange
            '#ffbe0b', // Yellow
            '#3a86ff', // Blue
            '#8338ec'  // Purple
        ];

        // Initialize game
        function init() {
            paddle.x = canvas.width / 2 - paddle.width / 2;
            paddle.y = canvas.height - 30;

            ball.x = canvas.width / 2;
            ball.y = paddle.y - ball.radius - 5;
            ball.dx = 4 * (Math.random() > 0.5 ? 1 : -1);
            ball.dy = -4;

            createBricks();
        }

        function createBricks() {
            bricks = [];
            const brickWidth = (canvas.width - brickConfig.offsetLeft * 2 - brickConfig.padding * (brickConfig.cols - 1)) / brickConfig.cols;

            for (let row = 0; row < brickConfig.rows; row++) {
                for (let col = 0; col < brickConfig.cols; col++) {
                    bricks.push({
                        x: brickConfig.offsetLeft + col * (brickWidth + brickConfig.padding),
                        y: brickConfig.offsetTop + row * (brickConfig.height + brickConfig.padding),
                        width: brickWidth,
                        height: brickConfig.height,
                        color: brickColors[row],
                        visible: true,
                        points: (brickConfig.rows - row) * 10
                    });
                }
            }
        }

        // Draw functions
        function drawPaddle() {
            ctx.fillStyle = '#0ff';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#0ff';
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
            ctx.shadowBlur = 0;
        }

        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#fff';
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.closePath();
        }

        function drawBricks() {
            bricks.forEach(brick => {
                if (brick.visible) {
                    ctx.fillStyle = brick.color;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = brick.color;
                    ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
                    ctx.shadowBlur = 0;

                    // Border
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(brick.x, brick.y, brick.width, brick.height);
                }
            });
        }

        // Update functions
        function updatePaddle(clientX) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            let mouseX = (clientX - rect.left) * scaleX;

            paddle.x = mouseX - paddle.width / 2;

            // Keep paddle within bounds
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;
        }

        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Wall collision
            if (ball.x - ball.radius < 0 || ball.x + ball.radius > canvas.width) {
                ball.dx = -ball.dx;
            }
            if (ball.y - ball.radius < 0) {
                ball.dy = -ball.dy;
            }

            // Paddle collision
            if (ball.y + ball.radius > paddle.y &&
                ball.y - ball.radius < paddle.y + paddle.height &&
                ball.x > paddle.x &&
                ball.x < paddle.x + paddle.width) {
                
                ball.dy = -ball.dy;
                ball.y = paddle.y - ball.radius;

                // Add some angle based on where ball hits paddle
                const hitPos = (ball.x - paddle.x) / paddle.width;
                ball.dx = (hitPos - 0.5) * 8;
            }

            // Brick collision
            bricks.forEach(brick => {
                if (brick.visible) {
                    if (ball.x + ball.radius > brick.x &&
                        ball.x - ball.radius < brick.x + brick.width &&
                        ball.y + ball.radius > brick.y &&
                        ball.y - ball.radius < brick.y + brick.height) {
                        
                        brick.visible = false;
                        ball.dy = -ball.dy;
                        score += brick.points;
                        updateScore();
                    }
                }
            });

            // Bottom boundary (lose life)
            if (ball.y - ball.radius > canvas.height) {
                lives--;
                updateLives();

                if (lives <= 0) {
                    gameOver();
                } else {
                    resetBall();
                }
            }

            // Check win condition
            if (bricks.every(brick => !brick.visible)) {
                gameWin();
            }
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = paddle.y - ball.radius - 5;
            ball.dx = 4 * (Math.random() > 0.5 ? 1 : -1);
            ball.dy = -4;
        }

        // UI updates
        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        function updateLives() {
            const hearts = '❤️'.repeat(lives);
            document.getElementById('lives').textContent = hearts || '💔';
        }

        // Game states
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);

            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ff006e';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);

            ctx.fillStyle = '#fff';
            ctx.font = '24px Arial';
            ctx.fillText(`Final Score: ${score}`, canvas.width / 2, canvas.height / 2 + 40);
        }

        function gameWin() {
            gameRunning = false;
            cancelAnimationFrame(animationId);

            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0ff';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('YOU WIN!', canvas.width / 2, canvas.height / 2);

            ctx.fillStyle = '#fff';
            ctx.font = '24px Arial';
            ctx.fillText(`Final Score: ${score}`, canvas.width / 2, canvas.height / 2 + 40);
        }

        // Game loop
        function gameLoop() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBricks();
            drawPaddle();
            drawBall();

            updateBall();

            animationId = requestAnimationFrame(gameLoop);
        }

        // Event listeners
        canvas.addEventListener('mousemove', (e) => {
            if (gameRunning) {
                updatePaddle(e.clientX);
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            if (gameRunning) {
                e.preventDefault();
                updatePaddle(e.touches[0].clientX);
            }
        });

        // Control functions
        function startGame() {
            if (!gameRunning) {
                gameRunning = true;
                if (lives <= 0 || bricks.every(brick => !brick.visible)) {
                    resetGame();
                }
                gameLoop();
            }
        }

        function resetGame() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            score = 0;
            lives = 3;
            updateScore();
            updateLives();
            init();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBricks();
            drawPaddle();
            drawBall();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initial draw
        init();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBricks();
        drawPaddle();
        drawBall();
    </script>
</body>
</html>
