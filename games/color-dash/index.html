<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Color Dash - 色を合わせて走れ！</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            touch-action: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .score-display {
            text-align: center;
            color: white;
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .target-display {
            width: 150px;
            height: 150px;
            margin: 0 auto 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .target-display.correct {
            animation: correct 0.5s;
        }

        @keyframes correct {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); box-shadow: 0 0 30px rgba(255,255,255,0.8); }
        }

        .target-display.wrong {
            animation: wrong 0.5s;
        }

        @keyframes wrong {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .color-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .color-btn {
            width: 100%;
            height: 80px;
            border: none;
            border-radius: 15px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .color-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .color-btn:active {
            transform: translateY(0);
        }

        .game-over {
            display: none;
            text-align: center;
            color: white;
        }

        .game-over.show {
            display: block;
        }

        .game-over h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 48px;
            margin-bottom: 30px;
        }

        .restart-btn {
            background: white;
            color: #764ba2;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .restart-btn:hover {
            transform: scale(1.1);
        }

        .timer-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ecdc4, #44a08d);
            transition: width 0.1s linear;
        }

        .instructions {
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .combo-display {
            text-align: center;
            color: #ffd93d;
            font-size: 18px;
            font-weight: bold;
            min-height: 27px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="score-display">
            <div>スコア: <span id="score">0</span></div>
        </div>

        <div class="timer-bar">
            <div class="timer-fill" id="timer-fill"></div>
        </div>

        <div class="combo-display" id="combo-display"></div>

        <div class="target-display" id="target-display">🎯</div>

        <div class="instructions">ターゲットの色に合うボタンを押せ！</div>

        <div class="color-buttons" id="color-buttons"></div>

        <div class="game-over" id="game-over">
            <h2>ゲームオーバー！</h2>
            <div class="final-score" id="final-score">0</div>
            <button class="restart-btn" id="restart-btn">もう一度</button>
        </div>
    </div>

    <script>
        const COLORS = [
            { name: 'RED', emoji: '🔴', bg: 'linear-gradient(135deg, #ff6b6b, #ee5a6f)' },
            { name: 'BLUE', emoji: '🔵', bg: 'linear-gradient(135deg, #4ecdc4, #44a08d)' },
            { name: 'GREEN', emoji: '🟢', bg: 'linear-gradient(135deg, #96e6a1, #76c476)' },
            { name: 'YELLOW', emoji: '🟡', bg: 'linear-gradient(135deg, #ffd93d, #f9ca24)' }
        ];

        let score = 0;
        let combo = 0;
        let timeLeft = 100;
        let currentTarget = null;
        let gameActive = true;
        let difficulty = 1;

        const targetDisplay = document.getElementById('target-display');
        const colorButtons = document.getElementById('color-buttons');
        const scoreDisplay = document.getElementById('score');
        const finalScoreDisplay = document.getElementById('final-score');
        const gameOverScreen = document.getElementById('game-over');
        const restartBtn = document.getElementById('restart-btn');
        const timerFill = document.getElementById('timer-fill');
        const comboDisplay = document.getElementById('combo-display');

        function initGame() {
            score = 0;
            combo = 0;
            timeLeft = 100;
            gameActive = true;
            difficulty = 1;
            gameOverScreen.classList.remove('show');
            updateScore();
            updateCombo();
            createColorButtons();
            setNewTarget();
            gameLoop();
        }

        function createColorButtons() {
            colorButtons.innerHTML = '';
            COLORS.forEach(color => {
                const btn = document.createElement('button');
                btn.className = 'color-btn';
                btn.style.background = color.bg;
                btn.textContent = color.emoji;
                btn.onclick = () => checkAnswer(color);
                colorButtons.appendChild(btn);
            });
        }

        function setNewTarget() {
            currentTarget = COLORS[Math.floor(Math.random() * COLORS.length)];
            targetDisplay.style.background = currentTarget.bg;
            targetDisplay.textContent = currentTarget.emoji;
        }

        function checkAnswer(selectedColor) {
            if (!gameActive) return;

            if (selectedColor.name === currentTarget.name) {
                // Correct!
                combo++;
                const timeBonus = Math.min(10, combo * 2);
                const difficultyBonus = Math.floor(difficulty * 5);
                score += 10 + timeBonus + difficultyBonus;

                targetDisplay.classList.add('correct');
                setTimeout(() => targetDisplay.classList.remove('correct'), 500);

                // Add time
                timeLeft = Math.min(100, timeLeft + 5);

                // Increase difficulty
                if (score > 0 && score % 100 === 0) {
                    difficulty += 0.5;
                }
            } else {
                // Wrong!
                combo = 0;
                timeLeft = Math.max(0, timeLeft - 15);

                targetDisplay.classList.add('wrong');
                setTimeout(() => targetDisplay.classList.remove('wrong'), 500);
            }

            updateScore();
            updateCombo();
            setNewTarget();
        }

        function updateScore() {
            scoreDisplay.textContent = score;
        }

        function updateCombo() {
            if (combo >= 3) {
                comboDisplay.textContent = `🔥 ${combo} コンボ！`;
            } else {
                comboDisplay.textContent = '';
            }
        }

        function gameLoop() {
            if (!gameActive) return;

            // Decrease time
            const decreaseRate = 0.3 * difficulty;
            timeLeft -= decreaseRate;

            timerFill.style.width = `${timeLeft}%`;

            // Change color based on time
            if (timeLeft < 30) {
                timerFill.style.background = 'linear-gradient(90deg, #ff6b6b, #ee5a6f)';
            } else if (timeLeft < 60) {
                timerFill.style.background = 'linear-gradient(90deg, #ffd93d, #f9ca24)';
            } else {
                timerFill.style.background = 'linear-gradient(90deg, #4ecdc4, #44a08d)';
            }

            if (timeLeft <= 0) {
                endGame();
                return;
            }

            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameActive = false;
            finalScoreDisplay.textContent = score;
            gameOverScreen.classList.add('show');
        }

        restartBtn.onclick = initGame;

        // Start the game
        initGame();
    </script>
</body>
</html>
