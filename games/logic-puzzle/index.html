<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Logic Puzzle 4x4</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            backdrop-filter: blur(10px);
        }

        .stat span {
            font-weight: bold;
            font-size: 1.2rem;
        }

        .grid-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            margin: 0 auto 20px;
            display: inline-block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 70px);
            grid-template-rows: repeat(4, 70px);
            gap: 5px;
        }

        .cell {
            width: 70px;
            height: 70px;
            background: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .cell:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .cell.selected {
            background: #667eea;
            color: #fff;
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }

        .cell.fixed {
            background: #e0e0e0;
            color: #333;
            cursor: not-allowed;
        }

        .cell.fixed:hover {
            transform: none;
        }

        .cell.error {
            background: #ff6b6b;
            color: #fff;
            animation: shake 0.3s ease;
        }

        .cell.correct {
            background: #51cf66;
            color: #fff;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .number-pad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 300px;
            margin: 0 auto 20px;
        }

        .number-btn {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #667eea;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .number-btn:hover {
            transform: scale(1.1);
            background: #fff;
        }

        .number-btn:active {
            transform: scale(0.95);
        }

        .number-btn.clear {
            background: rgba(255, 107, 107, 0.9);
            color: #fff;
        }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #667eea;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            transform: scale(1.05);
            background: #fff;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.98);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            text-align: center;
            z-index: 1000;
            display: none;
        }

        .message.show {
            display: block;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .message h2 {
            color: #667eea;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .message p {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        @media (max-width: 500px) {
            .grid {
                grid-template-columns: repeat(4, 60px);
                grid-template-rows: repeat(4, 60px);
            }

            .cell {
                width: 60px;
                height: 60px;
                font-size: 1.5rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 0.9rem;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">📺 全画面</button>

    <div class="container">
        <h1>🧩 Logic Puzzle 4x4</h1>
        <p class="subtitle">行と列に1-4の数字を重複なく配置しよう</p>

        <div class="stats">
            <div class="stat">⏱️ <span id="timer">00:00</span></div>
            <div class="stat">🎯 <span id="moves">0</span></div>
        </div>

        <div class="grid-container">
            <div class="grid" id="grid"></div>
        </div>

        <div class="number-pad">
            <button class="number-btn" onclick="enterNumber(1)">1</button>
            <button class="number-btn" onclick="enterNumber(2)">2</button>
            <button class="number-btn" onclick="enterNumber(3)">3</button>
            <button class="number-btn" onclick="enterNumber(4)">4</button>
            <button class="number-btn clear" onclick="clearCell()">🗑️</button>
        </div>

        <div class="buttons">
            <button class="btn" onclick="newGame()">🔄 新しいゲーム</button>
            <button class="btn" onclick="showHint()">💡 ヒント</button>
        </div>
    </div>

    <div class="message" id="message">
        <h2>🎉 クリア！</h2>
        <p id="messageText"></p>
        <button class="btn" onclick="newGame(); hideMessage()">新しいゲーム</button>
    </div>

    <script>
        let grid = [];
        let solution = [];
        let selectedCell = null;
        let moves = 0;
        let startTime = Date.now();
        let timerInterval = null;

        function initGrid() {
            solution = generateSolution();
            grid = createPuzzle(solution);
            renderGrid();
            moves = 0;
            startTime = Date.now();
            document.getElementById('moves').textContent = moves;
            startTimer();
        }

        function generateSolution() {
            const sol = [];
            for (let i = 0; i < 4; i++) {
                sol[i] = [];
                for (let j = 0; j < 4; j++) {
                    sol[i][j] = 0;
                }
            }

            fillGrid(sol, 0, 0);
            return sol;
        }

        function fillGrid(sol, row, col) {
            if (row === 4) return true;
            if (col === 4) return fillGrid(sol, row + 1, 0);

            const numbers = shuffle([1, 2, 3, 4]);

            for (const num of numbers) {
                if (isValidMove(sol, row, col, num)) {
                    sol[row][col] = num;
                    if (fillGrid(sol, row, col + 1)) return true;
                    sol[row][col] = 0;
                }
            }

            return false;
        }

        function isValidMove(sol, row, col, num) {
            // 行チェック
            for (let j = 0; j < 4; j++) {
                if (sol[row][j] === num) return false;
            }

            // 列チェック
            for (let i = 0; i < 4; i++) {
                if (sol[i][col] === num) return false;
            }

            return true;
        }

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function createPuzzle(solution) {
            const puzzle = [];
            const cellsToRemove = 8;

            for (let i = 0; i < 4; i++) {
                puzzle[i] = [];
                for (let j = 0; j < 4; j++) {
                    puzzle[i][j] = { value: solution[i][j], fixed: true };
                }
            }

            let removed = 0;
            while (removed < cellsToRemove) {
                const row = Math.floor(Math.random() * 4);
                const col = Math.floor(Math.random() * 4);

                if (puzzle[row][col].fixed) {
                    puzzle[row][col] = { value: 0, fixed: false };
                    removed++;
                }
            }

            return puzzle;
        }

        function renderGrid() {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';

            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (grid[i][j].fixed) cell.classList.add('fixed');
                    if (selectedCell && selectedCell.row === i && selectedCell.col === j) {
                        cell.classList.add('selected');
                    }
                    cell.textContent = grid[i][j].value || '';
                    cell.addEventListener('click', () => selectCell(i, j));
                    gridEl.appendChild(cell);
                }
            }
        }

        function selectCell(row, col) {
            if (grid[row][col].fixed) return;

            selectedCell = { row, col };
            renderGrid();
        }

        function enterNumber(num) {
            if (!selectedCell) return;

            const { row, col } = selectedCell;
            grid[row][col].value = num;
            moves++;
            document.getElementById('moves').textContent = moves;
            renderGrid();
            checkWin();
        }

        function clearCell() {
            if (!selectedCell) return;

            const { row, col } = selectedCell;
            grid[row][col].value = 0;
            moves++;
            document.getElementById('moves').textContent = moves;
            renderGrid();
        }

        function checkWin() {
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (grid[i][j].value !== solution[i][j]) {
                        return false;
                    }
                }
            }

            clearInterval(timerInterval);
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;

            showMessage(
                `🎊 おめでとうございます！\n\n` +
                `⏱️ タイム: ${minutes}分${seconds}秒\n` +
                `🎯 手数: ${moves}回`
            );
            return true;
        }

        function showHint() {
            if (!selectedCell) {
                alert('セルを選択してください');
                return;
            }

            const { row, col } = selectedCell;
            if (grid[row][col].fixed) return;

            grid[row][col].value = solution[row][col];
            moves++;
            document.getElementById('moves').textContent = moves;
            renderGrid();
            checkWin();
        }

        function newGame() {
            selectedCell = null;
            initGrid();
        }

        function showMessage(text) {
            document.getElementById('messageText').textContent = text;
            document.getElementById('message').classList.add('show');
        }

        function hideMessage() {
            document.getElementById('message').classList.remove('show');
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
                const seconds = (elapsed % 60).toString().padStart(2, '0');
                document.getElementById('timer').textContent = `${minutes}:${seconds}`;
            }, 1000);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (e.key >= '1' && e.key <= '4') {
                enterNumber(parseInt(e.key));
            } else if (e.key === 'Backspace' || e.key === 'Delete') {
                clearCell();
            }
        });

        // 初期化
        initGrid();
    </script>
</body>
</html>
