<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Math Challenge | 計算チャレンジ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .game-header {
            text-align: center;
            margin-bottom: 30px;
            color: #fff;
        }

        .game-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .game-area {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .game-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
        }

        .difficulty-selector {
            margin-bottom: 20px;
        }

        .difficulty-btn {
            padding: 10px 20px;
            margin: 5px;
            border: 2px solid #764ba2;
            background: transparent;
            color: #764ba2;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .difficulty-btn.active, .difficulty-btn:hover {
            background: #764ba2;
            color: #fff;
            transform: scale(1.05);
        }

        .question {
            font-size: 3rem;
            font-weight: bold;
            color: #333;
            margin: 30px 0;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .option-btn {
            padding: 20px;
            font-size: 1.8rem;
            font-weight: bold;
            border: 3px solid #e0e0e0;
            background: #fff;
            color: #333;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover {
            border-color: #764ba2;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .option-btn.correct {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: #fff;
            border-color: #11998e;
            animation: pulse 0.5s ease;
        }

        .option-btn.wrong {
            background: linear-gradient(135deg, #fa709a, #fee140);
            color: #fff;
            border-color: #fa709a;
            animation: shake 0.5s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .timer-bar {
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            margin-top: 20px;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.1s linear;
            border-radius: 3px;
        }

        .game-over, .start-screen {
            text-align: center;
        }

        .game-over h2, .start-screen h2 {
            font-size: 2rem;
            color: #764ba2;
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 4rem;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
            animation: countUp 0.5s ease;
        }

        @keyframes countUp {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .play-again-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .play-again-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .combo {
            position: absolute;
            top: 10px;
            right: 10px;
            background: linear-gradient(135deg, #fa709a, #fee140);
            color: #fff;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .game-header h1 {
                font-size: 2rem;
            }

            .question {
                font-size: 2.5rem;
            }

            .option-btn {
                font-size: 1.5rem;
                padding: 15px;
            }

            .stats {
                gap: 15px;
            }

            .stat {
                padding: 8px 15px;
            }

            .stat-value {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <div class="game-header">
            <h1>🧮 Math Challenge</h1>
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">スコア</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">コンボ</div>
                    <div class="stat-value" id="comboDisplay">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">最高</div>
                    <div class="stat-value" id="highScore">0</div>
                </div>
            </div>
        </div>

        <div class="game-area">
            <!-- Start Screen -->
            <div id="startScreen" class="start-screen">
                <h2>計算チャレンジ</h2>
                <p style="margin-bottom: 20px; color: #666;">難易度を選択してスタート！</p>
                <div class="difficulty-selector">
                    <button class="difficulty-btn active" data-difficulty="easy">簡単</button>
                    <button class="difficulty-btn" data-difficulty="medium">普通</button>
                    <button class="difficulty-btn" data-difficulty="hard">難しい</button>
                </div>
                <button class="play-again-btn" onclick="startGame()">スタート</button>
            </div>

            <!-- Game Screen -->
            <div id="gameScreen" class="hidden">
                <div id="comboBadge" class="combo hidden">🔥 x<span id="comboValue">0</span></div>
                <div class="question" id="question">1 + 1 = ?</div>
                <div class="options" id="options"></div>
                <div class="timer-bar">
                    <div class="timer-fill" id="timerFill"></div>
                </div>
            </div>

            <!-- Game Over Screen -->
            <div id="gameOverScreen" class="game-over hidden">
                <h2>ゲームオーバー</h2>
                <p>最終スコア</p>
                <div class="final-score" id="finalScore">0</div>
                <p id="newRecord" class="hidden" style="color: #f5576c; font-weight: bold;">🎉 新記録！</p>
                <button class="play-again-btn" onclick="showStartScreen()">もう一度</button>
            </div>
        </div>
    </div>

    <script>
        let currentDifficulty = 'easy';
        let score = 0;
        let combo = 0;
        let highScore = localStorage.getItem('mathChallengeHighScore') || 0;
        let timeLeft = 10;
        let maxTime = 10;
        let timerInterval = null;
        let currentAnswer = 0;

        const difficulties = {
            easy: { operations: ['+', '-'], max: 10, time: 15, bonus: 1 },
            medium: { operations: ['+', '-', '×'], max: 20, time: 12, bonus: 2 },
            hard: { operations: ['+', '-', '×', '÷'], max: 50, time: 10, bonus: 3 }
        };

        document.getElementById('highScore').textContent = highScore;

        // Difficulty selection
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDifficulty = btn.dataset.difficulty;
            });
        });

        function showStartScreen() {
            document.getElementById('startScreen').classList.remove('hidden');
            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
        }

        function startGame() {
            score = 0;
            combo = 0;
            updateScore();
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            generateQuestion();
        }

        function generateQuestion() {
            const diff = difficulties[currentDifficulty];
            let a, b, operation, answer;

            operation = diff.operations[Math.floor(Math.random() * diff.operations.length)];

            switch (operation) {
                case '+':
                    a = Math.floor(Math.random() * diff.max) + 1;
                    b = Math.floor(Math.random() * diff.max) + 1;
                    answer = a + b;
                    break;
                case '-':
                    a = Math.floor(Math.random() * diff.max) + 1;
                    b = Math.floor(Math.random() * a);
                    answer = a - b;
                    break;
                case '×':
                    a = Math.floor(Math.random() * Math.min(diff.max, 12)) + 1;
                    b = Math.floor(Math.random() * Math.min(diff.max, 12)) + 1;
                    answer = a * b;
                    break;
                case '÷':
                    b = Math.floor(Math.random() * Math.min(diff.max, 12)) + 1;
                    answer = Math.floor(Math.random() * Math.min(diff.max, 12)) + 1;
                    a = b * answer;
                    break;
            }

            currentAnswer = answer;
            document.getElementById('question').textContent = `${a} ${operation} ${b} = ?`;

            // Generate options
            const options = generateOptions(answer);
            displayOptions(options);

            // Reset timer
            timeLeft = diff.time;
            maxTime = diff.time;
            startTimer();
        }

        function generateOptions(correctAnswer) {
            const options = [correctAnswer];
            const diff = difficulties[currentDifficulty];

            while (options.length < 4) {
                let offset = Math.floor(Math.random() * 10) - 5;
                let wrongAnswer = correctAnswer + offset;
                
                if (wrongAnswer !== correctAnswer && wrongAnswer >= 0 && !options.includes(wrongAnswer)) {
                    options.push(wrongAnswer);
                }
            }

            // Shuffle options
            return options.sort(() => Math.random() - 0.5);
        }

        function displayOptions(options) {
            const container = document.getElementById('options');
            container.innerHTML = '';

            options.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option;
                btn.onclick = () => checkAnswer(option, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selected, btn) {
            const isCorrect = selected === currentAnswer;
            
            if (isCorrect) {
                btn.classList.add('correct');
                combo++;
                const diff = difficulties[currentDifficulty];
                const points = 10 + (combo * diff.bonus);
                score += points;
                updateScore();
                
                setTimeout(() => {
                    generateQuestion();
                }, 500);
            } else {
                btn.classList.add('wrong');
                // Highlight correct answer
                document.querySelectorAll('.option-btn').forEach(b => {
                    if (parseInt(b.textContent) === currentAnswer) {
                        b.classList.add('correct');
                    }
                });
                
                setTimeout(() => {
                    gameOver();
                }, 1000);
            }
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            document.getElementById('comboDisplay').textContent = combo;
            
            const comboBadge = document.getElementById('comboBadge');
            if (combo >= 3) {
                comboBadge.classList.remove('hidden');
                document.getElementById('comboValue').textContent = combo;
            } else {
                comboBadge.classList.add('hidden');
            }
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                const percentage = (timeLeft / maxTime) * 100;
                document.getElementById('timerFill').style.width = percentage + '%';

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    gameOver();
                }
            }, 100);
        }

        function gameOver() {
            clearInterval(timerInterval);

            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('finalScore').textContent = score;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('mathChallengeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
                document.getElementById('newRecord').classList.remove('hidden');
            } else {
                document.getElementById('newRecord').classList.add('hidden');
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        showStartScreen();
    </script>
</body>
</html>
