<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Challenge - 脳トレ計算ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 500px;
        }
        .game-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }
        .stat {
            text-align: center;
            padding: 15px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 12px;
            flex: 1;
            margin: 0 5px;
        }
        .stat-label {
            color: #888;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .stat-value {
            color: #667eea;
            font-size: 1.8rem;
            font-weight: bold;
        }
        .problem {
            text-align: center;
            font-size: 3rem;
            color: #fff;
            margin-bottom: 30px;
            font-weight: bold;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .timer-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.1s linear;
        }
        .answers {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .answer-btn {
            padding: 25px;
            font-size: 1.8rem;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            background: rgba(102, 126, 234, 0.2);
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
        }
        .answer-btn:hover {
            transform: translateY(-3px);
            background: rgba(102, 126, 234, 0.4);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        .answer-btn:active {
            transform: translateY(0);
        }
        .answer-btn.correct {
            background: rgba(0, 200, 100, 0.5) !important;
        }
        .answer-btn.wrong {
            background: rgba(200, 50, 50, 0.5) !important;
        }
        .start-screen, .game-over-screen {
            text-align: center;
            padding: 20px 0;
        }
        .start-screen h2, .game-over-screen h2 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 2rem;
        }
        .start-screen p, .game-over-screen p {
            color: #888;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn {
            padding: 15px 40px;
            font-size: 1.1rem;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            font-size: 0.9rem;
            z-index: 1000;
            background: rgba(102, 126, 234, 0.3);
            border: 1px solid rgba(102, 126, 234, 0.5);
        }
        .hidden {
            display: none;
        }
        @media (max-width: 480px) {
            .problem {
                font-size: 2.5rem;
            }
            .answer-btn {
                padding: 20px;
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <div class="game-card">
            <h1>🧮 Math Challenge</h1>
            <p class="subtitle">脳トレ計算ゲーム</p>

            <!-- スタート画面 -->
            <div id="startScreen" class="start-screen">
                <h2>準備はいい？</h2>
                <p>簡単な計算問題に挑戦！<br>制限時間は15秒/問</p>
                <button class="btn" onclick="startGame()">🚀 スタート</button>
            </div>

            <!-- ゲーム画面 -->
            <div id="gameScreen" class="hidden">
                <div class="stats">
                    <div class="stat">
                        <div class="stat-label">スコア</div>
                        <div class="stat-value" id="score">0</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">連続正解</div>
                        <div class="stat-value" id="streak">0</div>
                    </div>
                </div>

                <div class="timer-bar">
                    <div class="timer-fill" id="timerFill"></div>
                </div>

                <div class="problem" id="problem">5 + 3 = ?</div>

                <div class="answers" id="answers">
                    <!-- 答えボタン -->
                </div>
            </div>

            <!-- ゲームオーバー画面 -->
            <div id="gameOverScreen" class="game-over-screen hidden">
                <h2>🎯 ゲーム終了！</h2>
                <p>
                    スコア: <strong id="finalScore">0</strong><br>
                    最大連続正解: <strong id="maxStreak">0</strong>
                </p>
                <button class="btn" onclick="startGame()">🔄 もう一度</button>
            </div>
        </div>
    </div>

    <script>
        let score = 0;
        let streak = 0;
        let maxStreak = 0;
        let currentAnswer = 0;
        let timer = null;
        let timeLeft = 15;
        let totalTime = 15;

        function startGame() {
            score = 0;
            streak = 0;
            maxStreak = 0;

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');

            updateStats();
            generateProblem();
        }

        function generateProblem() {
            const operations = ['+', '-', '×'];
            const operation = operations[Math.floor(Math.random() * operations.length)];

            let num1, num2, answer;
            const difficulty = Math.min(Math.floor(score / 5), 3); // 徐々に難しく

            switch(operation) {
                case '+':
                    num1 = Math.floor(Math.random() * (10 + difficulty * 5)) + 1;
                    num2 = Math.floor(Math.random() * (10 + difficulty * 5)) + 1;
                    answer = num1 + num2;
                    break;
                case '-':
                    num1 = Math.floor(Math.random() * (10 + difficulty * 5)) + 5;
                    num2 = Math.floor(Math.random() * num1);
                    answer = num1 - num2;
                    break;
                case '×':
                    num1 = Math.floor(Math.random() * (5 + difficulty * 2)) + 1;
                    num2 = Math.floor(Math.random() * (5 + difficulty * 2)) + 1;
                    answer = num1 * num2;
                    break;
            }

            currentAnswer = answer;
            document.getElementById('problem').textContent = `${num1} ${operation} ${num2} = ?`;

            // 選択肢生成
            const answers = generateAnswers(answer);
            displayAnswers(answers);

            // タイマーリセット
            timeLeft = 15;
            totalTime = 15;
            startTimer();
        }

        function generateAnswers(correctAnswer) {
            const answers = [correctAnswer];

            while (answers.length < 4) {
                const offset = Math.floor(Math.random() * 21) - 10;
                const wrongAnswer = correctAnswer + offset;
                if (wrongAnswer >= 0 && wrongAnswer !== correctAnswer && !answers.includes(wrongAnswer)) {
                    answers.push(wrongAnswer);
                }
            }

            return shuffle(answers);
        }

        function shuffle(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function displayAnswers(answers) {
            const container = document.getElementById('answers');
            container.innerHTML = '';

            answers.forEach(answer => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.textContent = answer;
                btn.onclick = () => checkAnswer(answer, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selected, btn) {
            clearInterval(timer);

            const allBtns = document.querySelectorAll('.answer-btn');
            allBtns.forEach(b => b.disabled = true);

            if (selected === currentAnswer) {
                btn.classList.add('correct');
                streak++;
                score += 1 + Math.floor(streak / 5); // ボーナスポイント
                if (streak > maxStreak) maxStreak = streak;
            } else {
                btn.classList.add('wrong');
                // 正解を表示
                allBtns.forEach(b => {
                    if (parseInt(b.textContent) === currentAnswer) {
                        b.classList.add('correct');
                    }
                });
                streak = 0;
            }

            updateStats();

            setTimeout(() => {
                generateProblem();
            }, 1000);
        }

        function startTimer() {
            clearInterval(timer);
            updateTimerBar();

            timer = setInterval(() => {
                timeLeft -= 0.1;
                updateTimerBar();

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    streak = 0;
                    updateStats();

                    const allBtns = document.querySelectorAll('.answer-btn');
                    allBtns.forEach(b => {
                        b.disabled = true;
                        if (parseInt(b.textContent) === currentAnswer) {
                            b.classList.add('correct');
                        }
                    });

                    setTimeout(() => {
                        generateProblem();
                    }, 1000);
                }
            }, 100);
        }

        function updateTimerBar() {
            const percentage = (timeLeft / totalTime) * 100;
            document.getElementById('timerFill').style.width = percentage + '%';
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
        }

        function gameOver() {
            clearInterval(timer);
            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('finalScore').textContent = score;
            document.getElementById('maxStreak').textContent = maxStreak;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
