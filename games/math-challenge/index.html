<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Math Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
            touch-action: manipulation;
        }

        #game-container {
            width: 90%;
            max-width: 500px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #question {
            font-size: 3rem;
            font-weight: bold;
            text-align: center;
            margin: 30px 0;
            padding: 40px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #answer {
            width: 100%;
            padding: 20px;
            font-size: 2rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            color: white;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        #answer:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(255, 255, 255, 0.15);
        }

        #answer.correct {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.2);
        }

        #answer.wrong {
            border-color: #ff4444;
            background: rgba(255, 68, 68, 0.2);
        }

        #submit {
            width: 100%;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff 0%, #00ff88 100%);
            border: none;
            border-radius: 15px;
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        #submit:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        #submit:active {
            transform: scale(0.98);
        }

        #feedback {
            text-align: center;
            font-size: 1.2rem;
            min-height: 30px;
            margin-top: 10px;
        }

        #feedback.correct {
            color: #00ff88;
        }

        #feedback.wrong {
            color: #ff4444;
        }

        #fullscreen-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
            z-index: 100;
        }

        #fullscreen-btn:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        #difficulty {
            width: 100%;
            padding: 15px;
            font-size: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            margin-bottom: 20px;
            cursor: pointer;
        }

        #difficulty option {
            background: #1a1a2e;
        }

        @media (max-width: 768px) {
            #game-container {
                width: 95%;
                padding: 20px;
            }

            #question {
                font-size: 2.5rem;
            }

            #answer {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <button id="fullscreen-btn">⛶ 全画面</button>

    <div id="game-container">
        <div id="stats">
            <div class="stat">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">STREAK</div>
                <div class="stat-value" id="streak">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">BEST</div>
                <div class="stat-value" id="best">0</div>
            </div>
        </div>

        <select id="difficulty">
            <option value="easy">😊 EASY (加減算)</option>
            <option value="medium" selected>😐 MEDIUM (乗除算)</option>
            <option value="hard">😈 HARD (混合)</option>
        </select>

        <div id="question">2 + 2 = ?</div>

        <input type="number" id="answer" placeholder="答えを入力" autocomplete="off">
        
        <button id="submit">答える</button>
        
        <div id="feedback"></div>
    </div>

    <script>
        const questionEl = document.getElementById('question');
        const answerEl = document.getElementById('answer');
        const submitBtn = document.getElementById('submit');
        const feedbackEl = document.getElementById('feedback');
        const scoreEl = document.getElementById('score');
        const streakEl = document.getElementById('streak');
        const bestEl = document.getElementById('best');
        const difficultyEl = document.getElementById('difficulty');
        const fullscreenBtn = document.getElementById('fullscreen-btn');

        let score = 0;
        let streak = 0;
        let bestStreak = 0;
        let currentAnswer = 0;
        let currentDifficulty = 'medium';

        function generateQuestion() {
            let num1, num2, operator;
            const difficulty = difficultyEl.value;

            switch (difficulty) {
                case 'easy':
                    num1 = Math.floor(Math.random() * 50) + 1;
                    num2 = Math.floor(Math.random() * 50) + 1;
                    operator = Math.random() > 0.5 ? '+' : '-';
                    
                    if (operator === '-' && num1 < num2) {
                        [num1, num2] = [num2, num1];
                    }
                    currentAnswer = operator === '+' ? num1 + num2 : num1 - num2;
                    break;

                case 'medium':
                    const mediumOp = Math.random();
                    if (mediumOp < 0.4) {
                        // Multiplication
                        num1 = Math.floor(Math.random() * 12) + 1;
                        num2 = Math.floor(Math.random() * 12) + 1;
                        operator = '×';
                        currentAnswer = num1 * num2;
                    } else if (mediumOp < 0.7) {
                        // Division with integer result
                        num2 = Math.floor(Math.random() * 12) + 1;
                        currentAnswer = Math.floor(Math.random() * 12) + 1;
                        num1 = num2 * currentAnswer;
                        operator = '÷';
                    } else {
                        // Addition/subtraction with larger numbers
                        num1 = Math.floor(Math.random() * 100) + 1;
                        num2 = Math.floor(Math.random() * 100) + 1;
                        operator = Math.random() > 0.5 ? '+' : '-';
                        if (operator === '-' && num1 < num2) {
                            [num1, num2] = [num2, num1];
                        }
                        currentAnswer = operator === '+' ? num1 + num2 : num1 - num2;
                    }
                    break;

                case 'hard':
                    const hardOp = Math.random();
                    if (hardOp < 0.3) {
                        // Complex multiplication
                        num1 = Math.floor(Math.random() * 20) + 5;
                        num2 = Math.floor(Math.random() * 20) + 5;
                        operator = '×';
                        currentAnswer = num1 * num2;
                    } else if (hardOp < 0.5) {
                        // Division with decimals
                        num2 = Math.floor(Math.random() * 10) + 2;
                        const quotient = Math.floor(Math.random() * 20) + 1;
                        num1 = num2 * quotient;
                        operator = '÷';
                        currentAnswer = quotient;
                    } else if (hardOp < 0.7) {
                        // Mixed operations (simple)
                        num1 = Math.floor(Math.random() * 30) + 10;
                        const offset = Math.floor(Math.random() * 20) + 5;
                        currentAnswer = num1 - offset;
                        questionEl.textContent = `${num1} - ? = ${currentAnswer}`;
                        return;
                    } else {
                        // Squares and powers
                        num1 = Math.floor(Math.random() * 15) + 2;
                        operator = '²';
                        currentAnswer = num1 * num1;
                        questionEl.textContent = `${num1}² = ?`;
                        return;
                    }
                    break;
            }

            questionEl.textContent = `${num1} ${operator} ${num2} = ?`;
        }

        function checkAnswer() {
            const userAnswer = parseInt(answerEl.value);

            if (isNaN(userAnswer)) {
                feedbackEl.textContent = '⚠️ 数字を入力してください';
                feedbackEl.className = 'wrong';
                return;
            }

            if (userAnswer === currentAnswer) {
                // Correct
                streak++;
                score += 10 * streak;
                
                if (streak > bestStreak) {
                    bestStreak = streak;
                    bestEl.textContent = bestStreak;
                }

                scoreEl.textContent = score;
                streakEl.textContent = streak;

                feedbackEl.textContent = `🎉 正解！ +${10 * streak}ポイント`;
                feedbackEl.className = 'correct';
                answerEl.className = 'correct';

                // Next question after short delay
                setTimeout(() => {
                    answerEl.value = '';
                    answerEl.className = '';
                    feedbackEl.textContent = '';
                    generateQuestion();
                }, 800);
            } else {
                // Wrong
                streak = 0;
                streakEl.textContent = streak;

                feedbackEl.textContent = `❌ 間違い！正解は ${currentAnswer}`;
                feedbackEl.className = 'wrong';
                answerEl.className = 'wrong';

                // Next question after longer delay
                setTimeout(() => {
                    answerEl.value = '';
                    answerEl.className = '';
                    feedbackEl.textContent = '';
                    generateQuestion();
                }, 1500);
            }
        }

        function handleSubmit() {
            checkAnswer();
        }

        submitBtn.addEventListener('click', handleSubmit);
        answerEl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleSubmit();
            }
        });

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                fullscreenBtn.textContent = '⛶ 退出';
            } else {
                document.exitFullscreen();
                fullscreenBtn.textContent = '⛶ 全画面';
            }
        });

        // Initialize
        answerEl.focus();
        generateQuestion();
    </script>
</body>
</html>
