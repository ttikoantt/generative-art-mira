<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Challenge - Games by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            max-width: 600px;
            width: 90%;
            padding: 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .timer-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00d9ff);
            transition: width 0.1s linear;
        }

        .question {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
        }

        .answers {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .answer-btn {
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.2), rgba(0, 255, 136, 0.2));
            border: 2px solid rgba(0, 217, 255, 0.5);
            color: #fff;
            padding: 20px;
            font-size: 1.8rem;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .answer-btn:hover {
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.4), rgba(0, 255, 136, 0.4));
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.3);
        }

        .answer-btn:active {
            transform: translateY(0);
        }

        .answer-btn.correct {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            border-color: #00ff88;
        }

        .answer-btn.wrong {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            border-color: #ff6b6b;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .game-over h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #ff6b6b;
        }

        .game-over p {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        .restart-btn {
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            border: none;
            color: #000;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.3s ease;
        }

        .restart-btn:hover {
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .question {
                font-size: 2.5rem;
            }

            .answers {
                gap: 10px;
            }

            .answer-btn {
                padding: 15px;
                font-size: 1.5rem;
            }

            .fullscreen-btn {
                padding: 8px 12px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <div class="game-container">
        <h1>🧮 Math Challenge</h1>

        <div class="stats">
            <div class="stat">Score: <span id="score">0</span></div>
            <div class="stat">Level: <span id="level">1</span></div>
        </div>

        <div class="timer-bar">
            <div class="timer-fill" id="timerFill"></div>
        </div>

        <div class="question" id="question">2 + 2 = ?</div>

        <div class="answers" id="answers">
            <button class="answer-btn" onclick="checkAnswer(4)">4</button>
            <button class="answer-btn" onclick="checkAnswer(5)">5</button>
            <button class="answer-btn" onclick="checkAnswer(3)">3</button>
            <button class="answer-btn" onclick="checkAnswer(6)">6</button>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>Game Over!</h2>
        <p>Your Score: <span id="finalScore">0</span></p>
        <button class="restart-btn" onclick="restartGame()">Play Again</button>
    </div>

    <script>
        let score = 0;
        let level = 1;
        let timeLeft = 100;
        let correctAnswer = 0;
        let gameRunning = true;
        let timerInterval;

        function generateQuestion() {
            const operations = ['+', '-', '×'];
            const operation = operations[Math.floor(Math.random() * operations.length)];

            let num1, num2;

            switch (operation) {
                case '+':
                    num1 = Math.floor(Math.random() * (10 * level)) + 1;
                    num2 = Math.floor(Math.random() * (10 * level)) + 1;
                    correctAnswer = num1 + num2;
                    break;
                case '-':
                    num1 = Math.floor(Math.random() * (10 * level)) + 10;
                    num2 = Math.floor(Math.random() * num1);
                    correctAnswer = num1 - num2;
                    break;
                case '×':
                    num1 = Math.floor(Math.random() * (5 * level)) + 1;
                    num2 = Math.floor(Math.random() * (5 * level)) + 1;
                    correctAnswer = num1 * num2;
                    break;
            }

            document.getElementById('question').textContent = `${num1} ${operation} ${num2} = ?`;

            // 答えの選択肢を生成
            const answers = new Set([correctAnswer]);
            while (answers.size < 4) {
                let wrong = correctAnswer + Math.floor(Math.random() * 20) - 10;
                if (wrong !== correctAnswer && wrong >= 0) {
                    answers.add(wrong);
                }
            }

            // シャッフル
            const shuffled = Array.from(answers).sort(() => Math.random() - 0.5);

            // ボタンを更新
            const buttons = document.querySelectorAll('.answer-btn');
            buttons.forEach((btn, index) => {
                btn.textContent = shuffled[index];
                btn.className = 'answer-btn';
                btn.onclick = () => checkAnswer(shuffled[index]);
            });
        }

        function checkAnswer(answer) {
            if (!gameRunning) return;

            const buttons = document.querySelectorAll('.answer-btn');

            if (answer === correctAnswer) {
                // 正解
                score += 10 * level;
                document.getElementById('score').textContent = score;

                // ボタンを緑に
                buttons.forEach(btn => {
                    if (parseInt(btn.textContent) === correctAnswer) {
                        btn.classList.add('correct');
                    }
                });

                setTimeout(() => {
                    // レベルアップ
                    if (score >= level * 50) {
                        level++;
                        document.getElementById('level').textContent = level;
                        timeLeft = Math.min(timeLeft + 20, 100);
                    }
                    generateQuestion();
                }, 300);
            } else {
                // 不正解
                buttons.forEach(btn => {
                    if (parseInt(btn.textContent) === answer) {
                        btn.classList.add('wrong');
                    }
                    if (parseInt(btn.textContent) === correctAnswer) {
                        btn.classList.add('correct');
                    }
                });

                timeLeft -= 10;
                setTimeout(() => {
                    if (timeLeft <= 0) {
                        endGame();
                    } else {
                        generateQuestion();
                    }
                }, 500);
            }
        }

        function updateTimer() {
            if (!gameRunning) return;

            timeLeft -= 0.5;
            document.getElementById('timerFill').style.width = `${timeLeft}%`;

            if (timeLeft <= 0) {
                endGame();
            }
        }

        function endGame() {
            gameRunning = false;
            clearInterval(timerInterval);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'flex';
        }

        function restartGame() {
            score = 0;
            level = 1;
            timeLeft = 100;
            gameRunning = true;

            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('gameOver').style.display = 'none';

            generateQuestion();
            timerInterval = setInterval(updateTimer, 50);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ゲーム開始
        generateQuestion();
        timerInterval = setInterval(updateTimer, 50);

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;

            const key = parseInt(e.key);
            if (!isNaN(key) && key >= 1 && key <= 4) {
                const buttons = document.querySelectorAll('.answer-btn');
                buttons[key - 1].click();
            }
        });
    </script>
</body>
</html>
