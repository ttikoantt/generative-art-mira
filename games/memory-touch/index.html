<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暗記タッチ - Memory Touch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .subtitle {
            color: #aaa;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .info-label {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #4ecdc4;
        }

        #game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
            aspect-ratio: 1;
        }

        .card {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #2d3436 0%, #000000 100%);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .card:hover::before {
            left: 100%;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(78, 205, 196, 0.3);
        }

        .card.flipped {
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            transform: rotateY(180deg);
        }

        .card.matched {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%);
            opacity: 0.6;
            cursor: default;
        }

        .card.matched:hover {
            transform: none;
            box-shadow: none;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: rgba(78, 205, 196, 0.2);
            border: 2px solid #4ecdc4;
            color: #ffffff;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            background: #4ecdc4;
            color: #1a1a2e;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(78, 205, 196, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            font-size: 1.1rem;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .message.success {
            background: rgba(86, 171, 47, 0.3);
            color: #a8e063;
        }

        .level-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }

        .level-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        .level-btn.active {
            background: #4ecdc4;
            border-color: #4ecdc4;
            color: #1a1a2e;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            #game-board {
                gap: 5px;
            }

            .card {
                font-size: 1.8rem;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 暗記タッチ</h1>
        <p class="subtitle">Memory Touch - 記憶力を試すゲーム</p>

        <div class="game-info">
            <div class="info-item">
                <span class="info-label">レベル</span>
                <span class="info-value" id="level">1</span>
            </div>
            <div class="info-item">
                <span class="info-label">スコア</span>
                <span class="info-value" id="score">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">ターン</span>
                <span class="info-value" id="turns">0</span>
            </div>
        </div>

        <div id="game-board"></div>

        <div class="controls">
            <button onclick="startGame()">🔄 新規ゲーム</button>
            <button onclick="showHint()">💡 ヒント</button>
        </div>

        <div class="level-buttons">
            <button class="level-btn active" onclick="setDifficulty('easy')">簡単</button>
            <button class="level-btn" onclick="setDifficulty('medium')">普通</button>
            <button class="level-btn" onclick="setDifficulty('hard')">難しい</button>
        </div>

        <div class="message" id="message">
            カードをタップしてゲームスタート！
        </div>
    </div>

    <script>
        const emojis = ['🌟', '🎯', '🎨', '🎭', '🎪', '🎢', '🎡', '🎠', '🎪', '🎭', '🎨', '🎯'];
        const difficulties = {
            easy: { pairs: 6, cols: 3 },
            medium: { pairs: 8, cols: 4 },
            hard: { pairs: 12, cols: 4 }
        };

        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let totalPairs = 6;
        let score = 0;
        let turns = 0;
        let level = 1;
        let currentDifficulty = 'easy';
        let isLocked = false;
        let hintUsed = 0;

        const gameBoard = document.getElementById('game-board');
        const messageEl = document.getElementById('message');
        const scoreEl = document.getElementById('score');
        const turnsEl = document.getElementById('turns');
        const levelEl = document.getElementById('level');

        function setDifficulty(difficulty) {
            currentDifficulty = difficulty;
            document.querySelectorAll('.level-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            startGame();
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function createCards() {
            const difficulty = difficulties[currentDifficulty];
            totalPairs = difficulty.pairs;

            const selectedEmojis = shuffle([...emojis]).slice(0, totalPairs);
            const cardPairs = [...selectedEmojis, ...selectedEmojis];
            cards = shuffle(cardPairs);

            gameBoard.innerHTML = '';
            gameBoard.style.gridTemplateColumns = `repeat(${difficulty.cols}, 1fr)`;

            cards.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;
                card.dataset.emoji = emoji;
                card.textContent = '?';
                card.addEventListener('click', () => flipCard(card));
                gameBoard.appendChild(card);
            });

            matchedPairs = 0;
            flippedCards = [];
            isLocked = false;
        }

        function flipCard(card) {
            if (isLocked || card.classList.contains('flipped') || card.classList.contains('matched')) {
                return;
            }

            card.classList.add('flipped');
            card.textContent = card.dataset.emoji;
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                turns++;
                turnsEl.textContent = turns;
                checkMatch();
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            const match = card1.dataset.emoji === card2.dataset.emoji;

            if (match) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;
                score += 10 - hintUsed;
                hintUsed = 0;
                scoreEl.textContent = score;

                if (matchedPairs === totalPairs) {
                    levelComplete();
                }
            } else {
                isLocked = true;
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    card1.textContent = '?';
                    card2.textContent = '?';
                    isLocked = false;
                }, 1000);
            }

            flippedCards = [];
        }

        function levelComplete() {
            messageEl.textContent = `🎉 レベル ${level} クリア！ スコア: ${score}`;
            messageEl.classList.add('success');

            setTimeout(() => {
                level++;
                levelEl.textContent = level;
                messageEl.classList.remove('success');
                startGame();
            }, 2000);
        }

        function showHint() {
            if (isLocked) return;

            const unflippedCards = Array.from(gameBoard.children).filter(
                card => !card.classList.contains('flipped') && !card.classList.contains('matched')
            );

            if (unflippedCards.length < 2) return;

            hintUsed = Math.min(hintUsed + 1, 5);

            const randomCard = unflippedCards[Math.floor(Math.random() * unflippedCards.length)];
            randomCard.classList.add('flipped');
            randomCard.textContent = randomCard.dataset.emoji;

            setTimeout(() => {
                if (!randomCard.classList.contains('matched')) {
                    randomCard.classList.remove('flipped');
                    randomCard.textContent = '?';
                }
            }, 1500);
        }

        function startGame() {
            score = 0;
            turns = 0;
            scoreEl.textContent = score;
            turnsEl.textContent = turns;
            levelEl.textContent = level;

            messageEl.textContent = 'カードをタップしてペアを探そう！';
            messageEl.classList.remove('success');

            createCards();
        }

        startGame();
    </script>
</body>
</html>
