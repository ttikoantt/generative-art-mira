<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Letter Catcher - 文字キャッチャー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
            border: 3px solid #4a9eff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(74, 158, 255, 0.3);
            background: #0a0a1a;
            touch-action: none;
            cursor: none;
        }

        .info-panel {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 25px;
            border-radius: 10px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            z-index: 100;
            border: 2px solid #4a9eff;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-label {
            color: #4a9eff;
            font-size: 14px;
        }

        .info-value {
            font-size: 24px;
        }

        .btn {
            background: #4a9eff;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
            margin: 5px;
        }

        .btn:hover {
            background: #2a7eef;
            color: #fff;
            transform: scale(1.05);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h1 {
            color: #4a9eff;
            font-size: 42px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(74, 158, 255, 0.5);
        }

        .overlay p {
            color: #fff;
            font-size: 18px;
            margin-bottom: 15px;
            text-align: center;
            max-width: 400px;
            line-height: 1.6;
        }

        .overlay .stats {
            color: #4a9eff;
            font-size: 24px;
            margin: 20px 0;
            font-weight: bold;
        }

        .btn-fullscreen {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            font-size: 14px;
            padding: 10px 20px;
        }

        .combo-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            pointer-events: none;
            opacity: 0;
            transition: all 0.3s;
            z-index: 150;
        }

        .combo-display.show {
            opacity: 1;
            animation: comboPop 0.5s ease-out;
        }

        @keyframes comboPop {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }

        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            animation: particleFade 0.5s ease-out forwards;
        }

        @keyframes particleFade {
            to {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }
    </style>
</head>
<body>
    <div class="info-panel">
        <div class="info-item">
            <span class="info-label">SCORE</span>
            <span class="info-value" id="score">0</span>
        </div>
        <div class="info-item">
            <span class="info-label">COMBO</span>
            <span class="info-value" id="combo">x0</span>
        </div>
        <div class="info-item">
            <span class="info-label">BEST</span>
            <span class="info-value" id="bestScore">0</span>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <button class="btn btn-fullscreen" onclick="toggleFullscreen()">⛶ 全画面</button>

    <div class="combo-display" id="comboDisplay"></div>

    <!-- スタート画面 -->
    <div class="overlay" id="startOverlay">
        <h1>📮 Letter Catcher</h1>
        <p>落ちてくる文字をキャッチしよう！</p>
        <p>マウス/タッチで左右に移動</p>
        <p>連続でキャッチするとコンボボーナス！</p>
        <button class="btn" onclick="startGame()">🎮 スタート</button>
    </div>

    <!-- ゲームオーバー画面 -->
    <div class="overlay hidden" id="gameOverOverlay">
        <h1>💫 Game Over</h1>
        <div class="stats">
            <div>SCORE: <span id="finalScore">0</span></div>
            <div>MAX COMBO: <span id="maxCombo">0</span></div>
            <div>BEST: <span id="finalBest">0</span></div>
        </div>
        <button class="btn" onclick="startGame()">🔄 もう一度</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let gameRunning = false;
        let animationId;

        // ゲーム状態
        let gameState = {
            score: 0,
            combo: 0,
            maxCombo: 0,
            bestScore: 0,
            letters: [],
            particles: [],
            player: {
                x: 0,
                y: 0,
                width: 80,
                height: 15,
                speed: 8
            },
            spawnTimer: 0,
            spawnInterval: 60,
            difficulty: 1
        };

        // ターゲットの文字（日本語・英語・数字）
        const targetChars = 'あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをんABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';

        // 初期化
        function init() {
            resize();
            loadBestScore();
        }

        function resize() {
            const maxWidth = Math.min(window.innerWidth - 40, 800);
            const maxHeight = Math.min(window.innerHeight - 200, 600);

            canvas.width = maxWidth;
            canvas.height = maxHeight;
            canvas.style.width = maxWidth + 'px';
            canvas.style.height = maxHeight + 'px';

            width = canvas.width;
            height = canvas.height;

            gameState.player.x = width / 2 - gameState.player.width / 2;
            gameState.player.y = height - 40;
        }

        function loadBestScore() {
            const saved = localStorage.getItem('letterCatcherBest');
            if (saved) {
                gameState.bestScore = parseInt(saved);
                document.getElementById('bestScore').textContent = gameState.bestScore;
            }
        }

        function saveBestScore() {
            localStorage.setItem('letterCatcherBest', gameState.bestScore.toString());
        }

        function startGame() {
            gameState.score = 0;
            gameState.combo = 0;
            gameState.maxCombo = 0;
            gameState.letters = [];
            gameState.particles = [];
            gameState.spawnTimer = 0;
            gameState.spawnInterval = 60;
            gameState.difficulty = 1;

            updateUI();
            resize();

            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');

            gameRunning = true;
            animate();
        }

        function endGame() {
            gameRunning = false;
            cancelAnimationFrame(animationId);

            if (gameState.score > gameState.bestScore) {
                gameState.bestScore = gameState.score;
                saveBestScore();
            }

            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('maxCombo').textContent = gameState.maxCombo;
            document.getElementById('finalBest').textContent = gameState.bestScore;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        function spawnLetter() {
            const char = targetChars[Math.floor(Math.random() * targetChars.length)];
            const x = Math.random() * (width - 40) + 20;

            gameState.letters.push({
                x: x,
                y: -30,
                char: char,
                speed: 2 + Math.random() * 2 + gameState.difficulty * 0.5,
                size: 24 + Math.random() * 12,
                rotation: (Math.random() - 0.5) * 0.1,
                color: `hsl(${Math.random() * 60 + 180}, 80%, 60%)`
            });
        }

        function updatePlayer() {
            // マウス/タッチ位置にプレイヤーを移動
            // マウス/タッチイベントで処理
        }

        function update() {
            // 文字をスポーン
            gameState.spawnTimer++;
            if (gameState.spawnTimer >= gameState.spawnInterval) {
                spawnLetter();
                gameState.spawnTimer = 0;

                // 難度を徐々に上げる
                if (gameState.spawnInterval > 20) {
                    gameState.spawnInterval -= 0.1;
                }
                gameState.difficulty += 0.01;
            }

            // 文字を更新
            for (let i = gameState.letters.length - 1; i >= 0; i--) {
                const letter = gameState.letters[i];
                letter.y += letter.speed;
                letter.rotation += (Math.random() - 0.5) * 0.02;

                // プレイヤーとの衝突判定
                if (letter.y + letter.size / 2 >= gameState.player.y &&
                    letter.y - letter.size / 2 <= gameState.player.y + gameState.player.height &&
                    letter.x + letter.size / 2 >= gameState.player.x &&
                    letter.x - letter.size / 2 <= gameState.player.x + gameState.player.width) {

                    // キャッチ！
                    gameState.combo++;
                    if (gameState.combo > gameState.maxCombo) {
                        gameState.maxCombo = gameState.combo;
                    }

                    // コンボボーナス
                    const comboBonus = Math.floor(gameState.combo / 5);
                    const points = 10 + comboBonus * 5;
                    gameState.score += points;

                    // パーティクル
                    createParticles(letter.x, letter.y, letter.color);

                    // コンボ表示
                    if (gameState.combo % 5 === 0) {
                        showCombo(gameState.combo);
                    }

                    updateUI();
                    gameState.letters.splice(i, 1);
                    continue;
                }

                // 画面外に出たらミス
                if (letter.y > height + 50) {
                    gameState.combo = 0;
                    updateUI();
                    gameState.letters.splice(i, 1);

                    // ミスのペナルティ（ライフ制なし、コンボリセットのみ）
                }
            }

            // パーティクルを更新
            for (let i = gameState.particles.length - 1; i >= 0; i--) {
                const p = gameState.particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                p.life -= 0.02;

                if (p.life <= 0) {
                    gameState.particles.splice(i, 1);
                }
            }
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 10; i++) {
                gameState.particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10 - 3,
                    size: Math.random() * 6 + 2,
                    color: color,
                    life: 1
                });
            }
        }

        function showCombo(combo) {
            const display = document.getElementById('comboDisplay');
            display.textContent = `x${combo} COMBO!`;
            display.classList.remove('show');
            void display.offsetWidth;
            display.classList.add('show');
        }

        function draw() {
            // 背景
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, width, height);

            // グリッド（デコレーション）
            ctx.strokeStyle = 'rgba(74, 158, 255, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i < width; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, height);
                ctx.stroke();
            }
            for (let i = 0; i < height; i += 40) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(width, i);
                ctx.stroke();
            }

            // パーティクル
            for (const p of gameState.particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fill();
                ctx.globalAlpha = 1;
            }

            // 文字
            for (const letter of gameState.letters) {
                ctx.save();
                ctx.translate(letter.x, letter.y);
                ctx.rotate(letter.rotation);

                ctx.font = `bold ${letter.size}px Arial`;
                ctx.fillStyle = letter.color;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                // グロー効果
                ctx.shadowColor = letter.color;
                ctx.shadowBlur = 15;
                ctx.fillText(letter.char, 0, 0);

                ctx.restore();
            }

            // プレイヤー
            const gradient = ctx.createLinearGradient(
                gameState.player.x,
                gameState.player.y,
                gameState.player.x + gameState.player.width,
                gameState.player.y + gameState.player.height
            );
            gradient.addColorStop(0, '#4a9eff');
            gradient.addColorStop(1, '#2a7eef');

            ctx.fillStyle = gradient;
            ctx.shadowColor = '#4a9eff';
            ctx.shadowBlur = 20;

            // 丸みを帯びた長方形
            const radius = 8;
            ctx.beginPath();
            ctx.moveTo(gameState.player.x + radius, gameState.player.y);
            ctx.lineTo(gameState.player.x + gameState.player.width - radius, gameState.player.y);
            ctx.quadraticCurveTo(
                gameState.player.x + gameState.player.width,
                gameState.player.y,
                gameState.player.x + gameState.player.width,
                gameState.player.y + radius
            );
            ctx.lineTo(gameState.player.x + gameState.player.width, gameState.player.y + gameState.player.height - radius);
            ctx.quadraticCurveTo(
                gameState.player.x + gameState.player.width,
                gameState.player.y + gameState.player.height,
                gameState.player.x + gameState.player.width - radius,
                gameState.player.y + gameState.player.height
            );
            ctx.lineTo(gameState.player.x + radius, gameState.player.y + gameState.player.height);
            ctx.quadraticCurveTo(
                gameState.player.x,
                gameState.player.y + gameState.player.height,
                gameState.player.x,
                gameState.player.y + gameState.player.height - radius
            );
            ctx.lineTo(gameState.player.x, gameState.player.y + radius);
            ctx.quadraticCurveTo(
                gameState.player.x,
                gameState.player.y,
                gameState.player.x + radius,
                gameState.player.y
            );
            ctx.closePath();
            ctx.fill();

            ctx.shadowBlur = 0;
        }

        function updateUI() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('combo').textContent = `x${gameState.combo}`;
            document.getElementById('bestScore').textContent = gameState.bestScore;
        }

        function animate() {
            if (!gameRunning) return;

            update();
            draw();
            animationId = requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        window.addEventListener('resize', () => {
            if (gameRunning) {
                resize();
            }
        });

        // マウス操作
        canvas.addEventListener('mousemove', (e) => {
            if (!gameRunning) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const x = (e.clientX - rect.left) * scaleX;

            gameState.player.x = x - gameState.player.width / 2;

            // 画面内に制限
            gameState.player.x = Math.max(0, Math.min(width - gameState.player.width, gameState.player.x));
        });

        // タッチ操作
        canvas.addEventListener('touchmove', (e) => {
            if (!gameRunning) return;
            e.preventDefault();

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const touch = e.touches[0];
            const x = (touch.clientX - rect.left) * scaleX;

            gameState.player.x = x - gameState.player.width / 2;
            gameState.player.x = Math.max(0, Math.min(width - gameState.player.width, gameState.player.x));
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            if (!gameRunning) return;
            e.preventDefault();

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const touch = e.touches[0];
            const x = (touch.clientX - rect.left) * scaleX;

            gameState.player.x = x - gameState.player.width / 2;
            gameState.player.x = Math.max(0, Math.min(width - gameState.player.width, gameState.player.x));
        }, { passive: false });

        // 初期化
        init();
    </script>
</body>
</html>
