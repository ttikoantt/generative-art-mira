<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>パーティクルコレクター | Particle Collector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }

        .ui {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 100;
        }

        .score {
            font-size: 36px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .combo {
            font-size: 18px;
            margin-top: 5px;
            opacity: 0.8;
        }

        .time {
            font-size: 24px;
            margin-top: 10px;
            opacity: 0.9;
        }

        .start-screen, .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 15, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .start-screen h1, .game-over-screen h1 {
            font-size: 36px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .start-screen p, .game-over-screen p {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.6;
            padding: 0 20px;
        }

        .final-score {
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
            color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            z-index: 100;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="ui">
        <div class="score">Score: <span id="score">0</span></div>
        <div class="combo">Combo: <span id="combo">0</span>x</div>
        <div class="time">Time: <span id="time">60</span></div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="start-screen" id="startScreen">
        <h1>パーティクルコレクター</h1>
        <p>マウスでプレイヤーを動かしてパーティクルを集めよう！<br>赤いパーティクルに触れるとゲームオーバー</p>
        <button onclick="startGame()">スタート</button>
    </div>

    <div class="game-over-screen hidden" id="gameOverScreen">
        <h1>ゲームオーバー</h1>
        <div class="final-score" id="finalScore">0</div>
        <p>最高コンボ: <span id="maxCombo">0</span>x</p>
        <button onclick="startGame()">もう一度</button>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let gameRunning = false;
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let timeLeft = 60;
        let lastTime = 0;

        let player = { x: 0, y: 0, radius: 30 };
        let mouse = { x: 0, y: 0 };
        let particles = [];
        let enemies = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            player.x = width / 2;
            player.y = height / 2;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.radius = Math.random() * 8 + 4;
                this.hue = Math.random() * 60 + 200; // 青〜紫
                this.alpha = 1;
                this.collected = false;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 70%, 60%, ${this.alpha})`;
                ctx.fill();

                // グロー
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 2
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 70%, 60%, 0.3)`);
                gradient.addColorStop(1, `hsla(${this.hue}, 70%, 60%, 0)`);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        class Enemy {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.radius = Math.random() * 10 + 8;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 50, 50, 0.8)';
                ctx.fill();

                // グロー
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 2
                );
                gradient.addColorStop(0, 'rgba(255, 50, 50, 0.3)');
                gradient.addColorStop(1, 'rgba(255, 50, 50, 0)');
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        function spawnParticles() {
            while (particles.length < 20) {
                particles.push(new Particle());
            }
        }

        function spawnEnemies() {
            while (enemies.length < Math.min(5 + Math.floor(score / 50), 15)) {
                enemies.push(new Enemy());
            }
        }

        function updatePlayer() {
            const dx = mouse.x - player.x;
            const dy = mouse.y - player.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist > 5) {
                player.x += dx * 0.1;
                player.y += dy * 0.1;
            }
        }

        function drawPlayer() {
            // 本体
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            const gradient = ctx.createRadialGradient(
                player.x, player.y, 0,
                player.x, player.y, player.radius
            );
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
            gradient.addColorStop(1, 'rgba(102, 126, 234, 0.3)');
            ctx.fillStyle = gradient;
            ctx.fill();

            // 外枠
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function checkCollisions() {
            // パーティクル収集
            particles.forEach((p, index) => {
                if (p.collected) return;

                const dx = player.x - p.x;
                const dy = player.y - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < player.radius + p.radius) {
                    p.collected = true;
                    combo++;
                    if (combo > maxCombo) maxCombo = combo;
                    score += 10 * combo;

                    particles.splice(index, 1);
                    updateUI();
                }
            });

            // 敵との衝突
            enemies.forEach(e => {
                const dx = player.x - e.x;
                const dy = player.y - e.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < player.radius + e.radius) {
                    gameOver();
                }
            });
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('maxCombo').textContent = maxCombo;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        function animate(currentTime) {
            if (!gameRunning) return;

            const deltaTime = (currentTime - lastTime) / 1000;
            lastTime = currentTime;

            // タイマー更新
            timeLeft -= deltaTime;
            if (timeLeft <= 0) {
                timeLeft = 0;
                gameOver();
                return;
            }
            document.getElementById('time').textContent = Math.ceil(timeLeft);

            // クリア
            ctx.fillStyle = 'rgba(10, 10, 15, 0.2)';
            ctx.fillRect(0, 0, width, height);

            // コンボタイムアウト
            if (combo > 0) {
                combo = Math.max(0, combo - deltaTime * 0.5);
                updateUI();
            }

            // 更新
            updatePlayer();
            spawnParticles();
            spawnEnemies();

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            enemies.forEach(e => {
                e.update();
                e.draw();
            });

            drawPlayer();
            checkCollisions();

            requestAnimationFrame(animate);
        }

        function startGame() {
            score = 0;
            combo = 0;
            maxCombo = 0;
            timeLeft = 60;
            particles = [];
            enemies = [];
            gameRunning = true;
            lastTime = performance.now();

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            updateUI();

            mouse.x = width / 2;
            mouse.y = height / 2;
            player.x = width / 2;
            player.y = height / 2;

            animate(performance.now());
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベント
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        // 初期化
        resize();
        mouse.x = width / 2;
        mouse.y = height / 2;
    </script>
</body>
</html>
