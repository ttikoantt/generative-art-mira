<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Particle Collector | パーティクル・コレクター</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            color: white;
            overflow: hidden;
            touch-action: none;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
            cursor: crosshair;
        }

        .hud {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px 20px 0 0;
            pointer-events: none;
        }

        .score, .time, .level {
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .score span, .time span, .level span {
            color: #ffd700;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            z-index: 100;
        }

        .overlay h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #ffd700;
        }

        .overlay p {
            font-size: 1rem;
            margin: 5px 0;
            opacity: 0.9;
        }

        .overlay .final-score {
            font-size: 3rem;
            font-weight: bold;
            color: #ffd700;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            margin-top: 20px;
            pointer-events: auto;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            margin-left: 10px;
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        .btn-secondary:hover {
            box-shadow: 0 8px 20px rgba(245, 87, 108, 0.6);
        }

        .hidden {
            display: none !important;
        }

        .combo-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .combo-display.show {
            opacity: 1;
            animation: comboPop 0.5s ease-out;
        }

        @keyframes comboPop {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }

        .controls-info {
            margin-top: 15px;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            backdrop-filter: blur(10px);
            z-index: 1000;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullScreen()" title="全画面">⛶</button>

    <div class="game-container">
        <canvas id="gameCanvas"></canvas>

        <div class="hud">
            <div class="score">スコア: <span id="scoreDisplay">0</span></div>
            <div class="level">レベル: <span id="levelDisplay">1</span></div>
            <div class="time">時間: <span id="timeDisplay">60</span></div>
        </div>

        <div class="combo-display" id="comboDisplay"></div>

        <!-- Start Screen -->
        <div class="overlay" id="startScreen">
            <h2>✨ パーティクル・コレクター</h2>
            <p>Particle Collector</p>
            <p style="margin-top: 20px;">飛び交うパーティクルを集めよう！</p>
            <p>同じ色を続けて集めるとコンボボーナス</p>
            <button class="btn" onclick="startGame()">スタート</button>
        </div>

        <!-- Game Over Screen -->
        <div class="overlay hidden" id="gameOverScreen">
            <h2>ゲームオーバー</h2>
            <p>最終スコア</p>
            <div class="final-score" id="finalScore">0</div>
            <p>最高コンボ: <span id="maxCombo" style="color: #ffd700;">0</span></p>
            <div>
                <button class="btn" onclick="startGame()">もう一度</button>
                <button class="btn btn-secondary" onclick="showStartScreen()">メニュー</button>
            </div>
        </div>
    </div>

    <div class="controls-info">
        タップ/クリック: パーティクルをキャッチ | 全画面ボタンで拡大
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Set canvas size
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game state
        let score = 0;
        let level = 1;
        let timeLeft = 60;
        let gameRunning = false;
        let particles = [];
        let combo = 0;
        let maxCombo = 0;
        let lastColor = null;
        let gameTimer = null;
        let spawnTimer = null;

        // Particle colors
        const colors = [
            '#FF6B6B', // Red
            '#4ECDC4', // Teal
            '#45B7D1', // Blue
            '#96CEB4', // Green
            '#FFEAA7', // Yellow
            '#DDA0DD', // Plum
            '#98D8C8', // Mint
            '#F7DC6F'  // Gold
        ];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = 15 + Math.random() * 15;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.vx = (Math.random() - 0.5) * (2 + level * 0.5);
                this.vy = (Math.random() - 0.5) * (2 + level * 0.5);
                this.points = Math.floor(this.radius);
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.05 + Math.random() * 0.05;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Bounce off walls
                if (this.x - this.radius < 0 || this.x + this.radius > canvas.width) {
                    this.vx *= -1;
                    this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                }
                if (this.y - this.radius < 0 || this.y + this.radius > canvas.height) {
                    this.vy *= -1;
                    this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));
                }

                // Pulse effect
                this.pulsePhase += this.pulseSpeed;
            }

            draw() {
                const pulseRadius = this.radius + Math.sin(this.pulsePhase) * 3;

                // Outer glow
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, pulseRadius * 1.5
                );
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(0.5, this.color + '80');
                gradient.addColorStop(1, 'transparent');

                ctx.beginPath();
                ctx.arc(this.x, this.y, pulseRadius * 1.5, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.globalAlpha = 0.3;
                ctx.fill();

                // Main particle
                ctx.beginPath();
                ctx.arc(this.x, this.y, pulseRadius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = 0.9;
                ctx.fill();

                // Inner highlight
                ctx.beginPath();
                ctx.arc(this.x - pulseRadius * 0.3, this.y - pulseRadius * 0.3, pulseRadius * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.globalAlpha = 0.6;
                ctx.fill();

                ctx.globalAlpha = 1;
            }

            containsPoint(px, py) {
                const dx = px - this.x;
                const dy = py - this.y;
                return dx * dx + dy * dy <= this.radius * this.radius * 1.5;
            }
        }

        function spawnParticle() {
            if (particles.length < 10 + level * 2) {
                particles.push(new Particle());
            }
        }

        function showCombo(comboCount) {
            const comboDisplay = document.getElementById('comboDisplay');
            const messages = ['Nice!', 'Great!', 'Awesome!', 'Amazing!', 'Incredible!', 'LEGENDARY!'];
            const messageIndex = Math.min(comboCount - 2, messages.length - 1);

            comboDisplay.textContent = `${comboCount} Combo! ${messages[messageIndex]}`;
            comboDisplay.classList.remove('show');
            void comboDisplay.offsetWidth; // Trigger reflow
            comboDisplay.classList.add('show');
        }

        function handleClick(e) {
            if (!gameRunning) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;

            // Find clicked particle
            for (let i = particles.length - 1; i >= 0; i--) {
                if (particles[i].containsPoint(x, y)) {
                    const particle = particles[i];

                    // Check combo
                    if (lastColor === particle.color) {
                        combo++;
                        if (combo > maxCombo) maxCombo = combo;
                        showCombo(combo);
                    } else {
                        combo = 1;
                        lastColor = particle.color;
                    }

                    // Calculate score with combo bonus
                    const comboBonus = Math.pow(1.2, combo - 1);
                    const points = Math.floor(particle.points * comboBonus);
                    score += points;

                    // Remove particle
                    particles.splice(i, 1);

                    // Update display
                    updateDisplay();

                    // Level up every 500 points
                    const newLevel = Math.floor(score / 500) + 1;
                    if (newLevel > level) {
                        level = newLevel;
                        document.getElementById('levelDisplay').textContent = level;
                    }

                    break;
                }
            }
        }

        canvas.addEventListener('click', handleClick);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleClick({ clientX: touch.clientX, clientY: touch.clientY });
        });

        function updateDisplay() {
            document.getElementById('scoreDisplay').textContent = score;
        }

        function gameLoop() {
            // Clear canvas
            ctx.fillStyle = 'rgba(26, 26, 46, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update and draw particles
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // Draw combo indicator if combo > 1
            if (combo > 1) {
                ctx.fillStyle = 'rgba(255, 215, 0, 0.9)';
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(`${combo}x Combo!`, canvas.width / 2, 30);
            }

            if (gameRunning) {
                requestAnimationFrame(gameLoop);
            }
        }

        function startGame() {
            // Reset game state
            score = 0;
            level = 1;
            timeLeft = 60;
            particles = [];
            combo = 0;
            maxCombo = 0;
            lastColor = null;
            gameRunning = true;

            // Update display
            updateDisplay();
            document.getElementById('levelDisplay').textContent = level;
            document.getElementById('timeDisplay').textContent = timeLeft;

            // Hide overlays
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');

            // Spawn initial particles
            for (let i = 0; i < 10; i++) {
                particles.push(new Particle());
            }

            // Start timers
            gameTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('timeDisplay').textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            spawnTimer = setInterval(spawnParticle, 1000);

            // Start game loop
            gameLoop();
        }

        function endGame() {
            gameRunning = false;

            // Stop timers
            clearInterval(gameTimer);
            clearInterval(spawnTimer);

            // Show game over screen
            document.getElementById('finalScore').textContent = score;
            document.getElementById('maxCombo').textContent = maxCombo;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        function showStartScreen() {
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');

            // Clear canvas
            ctx.fillStyle = 'rgba(26, 26, 46, 1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Initial canvas draw
        ctx.fillStyle = 'rgba(26, 26, 46, 1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    </script>
</body>
</html>
