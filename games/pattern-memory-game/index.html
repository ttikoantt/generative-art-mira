<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Memory Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        h1 {
            color: #00ff88;
            text-align: center;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .subtitle {
            color: #888;
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            background: rgba(0, 255, 136, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            color: #00ff88;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .stat-label {
            color: #888;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .cell {
            aspect-ratio: 1;
            background: #222;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .cell::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 0;
            height: 0;
            background: currentColor;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .cell.active::before {
            width: 80%;
            height: 80%;
        }

        .cell.show {
            animation: pulse 0.5s ease;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 20px currentColor;
            }
            50% {
                transform: scale(1.1);
                box-shadow: 0 0 40px currentColor;
            }
        }

        .cell.correct {
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .cell.wrong {
            border-color: #ff4444;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .message {
            text-align: center;
            padding: 15px;
            background: rgba(0, 255, 136, 0.1);
            border-radius: 10px;
            margin-bottom: 20px;
            color: #00ff88;
            font-size: 1.1rem;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            border: none;
            border-radius: 10px;
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .level-indicator {
            text-align: center;
            color: #00ff88;
            font-size: 1.2rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        @media (max-width: 400px) {
            .game-board {
                gap: 5px;
            }

            .cell {
                border-radius: 5px;
            }

            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Pattern Memory</h1>
        <div class="subtitle">パターンを覚えて再現しよう！</div>

        <div class="level-indicator">
            Level: <span id="level">1</span>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">スコア</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="bestScore">0</div>
                <div class="stat-label">ベスト</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="lives">3</div>
                <div class="stat-label">ライフ</div>
            </div>
        </div>

        <div class="message" id="message">
            スタートボタンを押してね！
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="buttons">
            <button id="startBtn">スタート</button>
            <button id="resetBtn" disabled>リセット</button>
        </div>
    </div>

    <script>
        const gameBoard = document.getElementById('gameBoard');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const messageEl = document.getElementById('message');
        const scoreEl = document.getElementById('score');
        const bestScoreEl = document.getElementById('bestScore');
        const livesEl = document.getElementById('lives');
        const levelEl = document.getElementById('level');

        // ゲーム設定
        const GRID_SIZE = 16;
        const COLORS = [
            '#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4',
            '#ffeaa7', '#dfe6e9', '#fd79a8', '#a29bfe',
            '#00b894', '#e17055', '#0984e3', '#6c5ce7',
            '#fdcb6e', '#e84393', '#00cec9', '#fab1a0'
        ];

        let gameState = {
            sequence: [],
            playerSequence: [],
            score: 0,
            bestScore: parseInt(localStorage.getItem('patternMemoryBest')) || 0,
            lives: 3,
            level: 1,
            isShowing: false,
            gameStarted: false
        };

        // ゲームボードを初期化
        function initBoard() {
            gameBoard.innerHTML = '';
            for (let i = 0; i < GRID_SIZE; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', handleCellClick);
                gameBoard.appendChild(cell);
            }
            bestScoreEl.textContent = gameState.bestScore;
        }

        // パターンを生成
        function generatePattern() {
            const count = Math.min(3 + gameState.level, 8);
            const pattern = [];
            const used = new Set();

            while (pattern.length < count) {
                const index = Math.floor(Math.random() * GRID_SIZE);
                if (!used.has(index)) {
                    used.add(index);
                    pattern.push({
                        index,
                        color: COLORS[Math.floor(Math.random() * COLORS.length)]
                    });
                }
            }

            return pattern;
        }

        // パターンを表示
        async function showPattern() {
            gameState.isShowing = true;
            gameState.playerSequence = [];
            messageEl.textContent = 'パターンを覚えてね！';
            
            const cells = document.querySelectorAll('.cell');

            // すべてのセルをリセット
            cells.forEach(cell => {
                cell.classList.remove('active', 'show', 'correct', 'wrong');
                cell.style.color = '';
            });

            await sleep(500);

            // パターンを順番に表示
            for (const item of gameState.sequence) {
                const cell = cells[item.index];
                cell.classList.add('active', 'show');
                cell.style.color = item.color;
                
                await sleep(600);

                cell.classList.remove('show');
                await sleep(200);
            }

            // 表示後にすべて消す
            await sleep(500);
            cells.forEach(cell => {
                cell.classList.remove('active');
                cell.style.color = '';
            });

            gameState.isShowing = false;
            messageEl.textContent = '同じパターンをクリック！';
        }

        // セルクリック処理
        function handleCellClick(e) {
            if (gameState.isShowing || !gameState.gameStarted) return;

            const index = parseInt(e.currentTarget.dataset.index);
            gameState.playerSequence.push(index);

            const currentStep = gameState.playerSequence.length - 1;
            const targetItem = gameState.sequence[currentStep];

            const cell = e.currentTarget;
            cell.classList.add('active');
            cell.style.color = targetItem.color;

            if (index !== targetItem.index) {
                // 間違い
                cell.classList.add('wrong');
                gameState.lives--;
                livesEl.textContent = gameState.lives;

                if (gameState.lives <= 0) {
                    gameOver();
                } else {
                    messageEl.textContent = `間違い！残りライフ: ${gameState.lives}`;
                    setTimeout(() => {
                        cell.classList.remove('active', 'wrong');
                        cell.style.color = '';
                        gameState.playerSequence = [];
                    }, 1000);
                }
                return;
            }

            // 正解のチェック
            if (gameState.playerSequence.length === gameState.sequence.length) {
                // 全部正解
                cell.classList.add('correct');
                gameState.score += gameState.level * 10;
                scoreEl.textContent = gameState.score;

                if (gameState.score > gameState.bestScore) {
                    gameState.bestScore = gameState.score;
                    bestScoreEl.textContent = gameState.bestScore;
                    localStorage.setItem('patternMemoryBest', gameState.bestScore);
                }

                messageEl.textContent = '正解！次のレベルへ！';

                setTimeout(() => {
                    nextLevel();
                }, 1500);
            }
        }

        // 次のレベルへ
        function nextLevel() {
            gameState.level++;
            levelEl.textContent = gameState.level;
            gameState.sequence = generatePattern();
            
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.classList.remove('active', 'correct');
                cell.style.color = '';
            });

            setTimeout(() => {
                showPattern();
            }, 500);
        }

        // ゲームオーバー
        function gameOver() {
            gameState.gameStarted = false;
            startBtn.disabled = false;
            resetBtn.disabled = true;
            
            messageEl.textContent = `ゲームオーバー！スコア: ${gameState.score}`;

            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.classList.remove('active', 'correct');
                cell.style.color = '';
            });
        }

        // ゲーム開始
        function startGame() {
            gameState.score = 0;
            gameState.lives = 3;
            gameState.level = 1;
            gameState.gameStarted = true;
            gameState.sequence = generatePattern();

            scoreEl.textContent = 0;
            livesEl.textContent = 3;
            levelEl.textContent = 1;

            startBtn.disabled = true;
            resetBtn.disabled = false;

            showPattern();
        }

        // リセット
        function resetGame() {
            gameState.gameStarted = false;
            gameState.score = 0;
            gameState.lives = 3;
            gameState.level = 1;

            scoreEl.textContent = 0;
            livesEl.textContent = 3;
            levelEl.textContent = 1;

            startBtn.disabled = false;
            resetBtn.disabled = true;

            messageEl.textContent = 'スタートボタンを押してね！';

            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.classList.remove('active', 'show', 'correct', 'wrong');
                cell.style.color = '';
            });
        }

        // ユーティリティ
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // イベントリスナー
        startBtn.addEventListener('click', startGame);
        resetBtn.addEventListener('click', resetGame);

        // 初期化
        initBoard();
    </script>
</body>
</html>
