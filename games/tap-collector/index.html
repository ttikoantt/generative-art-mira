<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tap Collector - タップコレクター</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        #gameCanvas {
            display: block;
            cursor: pointer;
        }

        .ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .score-panel {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 12px;
            color: #fff;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .score-panel .label {
            font-size: 12px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-panel .value {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #00d9ff 0%, #00ff88 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .timer-panel {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 12px;
            color: #fff;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .timer-panel .label {
            font-size: 12px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .timer-panel .value {
            font-size: 32px;
            font-weight: bold;
            color: #ff6b6b;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #00d9ff 0%, #00ff88 100%);
            color: #1a1a2e;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            z-index: 100;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0, 217, 255, 0.4);
            pointer-events: all;
        }

        .fullscreen-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 217, 255, 0.6);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(10px);
        }

        .overlay.hidden {
            display: none;
        }

        .modal {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
            width: 90%;
        }

        .modal h1 {
            font-size: 36px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00d9ff 0%, #00ff88 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal h2 {
            font-size: 28px;
            margin-bottom: 20px;
        }

        .modal p {
            margin: 10px 0;
            opacity: 0.8;
        }

        .modal .final-score {
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
            background: linear-gradient(135deg, #00d9ff 0%, #00ff88 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn {
            background: linear-gradient(135deg, #00d9ff 0%, #00ff88 100%);
            color: #1a1a2e;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0, 217, 255, 0.4);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 217, 255, 0.6);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .items-info {
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }

        .items-info .item {
            display: inline-flex;
            align-items: center;
            margin: 5px 10px;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="ui">
        <div class="score-panel">
            <div class="label">Score</div>
            <div class="value" id="score">0</div>
        </div>
        <div class="timer-panel">
            <div class="label">Time</div>
            <div class="value" id="timer">30</div>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">🖥️ 全画面</button>

    <div class="overlay" id="startOverlay">
        <div class="modal">
            <h1>💎 Tap Collector</h1>
            <p>アイテムをタップして集めよう！</p>
            <div class="items-info">
                <div class="item">💎 +10点</div>
                <div class="item">⭐ +25点</div>
                <div class="item">🌟 +50点</div>
            </div>
            <p>⚠️ 💣 をタップすると-50点！</p>
            <button class="btn" onclick="startGame()">スタート</button>
        </div>
    </div>

    <div class="overlay hidden" id="endOverlay">
        <div class="modal">
            <h2>🎉 ゲーム終了！</h2>
            <p>最終スコア</p>
            <div class="final-score" id="finalScore">0</div>
            <p id="highScoreText"></p>
            <button class="btn" onclick="startGame()">もう一度プレイ</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // ゲーム状態
        let gameRunning = false;
        let score = 0;
        let timeLeft = 30;
        let items = [];
        let particles = [];
        let highScore = parseInt(localStorage.getItem('tapCollectorHighScore')) || 0;
        let gameTimer;
        let spawnTimer;

        // アイテム設定
        const itemTypes = [
            { emoji: '💎', points: 10, size: 50, weight: 50 },
            { emoji: '⭐', points: 25, size: 40, weight: 30 },
            { emoji: '🌟', points: 50, size: 35, weight: 15 },
            { emoji: '💣', points: -50, size: 45, weight: 10 }
        ];

        // アイテムクラス
        class Item {
            constructor() {
                // 重みに基づいてアイテムタイプを選択
                const totalWeight = itemTypes.reduce((sum, item) => sum + item.weight, 0);
                let random = Math.random() * totalWeight;
                let typeIndex = 0;

                for (let i = 0; i < itemTypes.length; i++) {
                    random -= itemTypes[i].weight;
                    if (random <= 0) {
                        typeIndex = i;
                        break;
                    }
                }

                this.type = itemTypes[typeIndex];
                this.size = this.type.size;
                this.x = Math.random() * (width - this.size * 2) + this.size;
                this.y = Math.random() * (height - this.size * 2) + this.size;
                this.scale = 0;
                this.maxScale = 1;
                this.life = 2000 + Math.random() * 1000; // 2-3秒で消える
                this.created = Date.now();
                this.bobOffset = Math.random() * Math.PI * 2;
            }

            update(time) {
                const elapsed = Date.now() - this.created;

                // 出現アニメーション
                if (elapsed < 300) {
                    this.scale = (elapsed / 300) * this.maxScale;
                }

                // 消えるアニメーション
                if (elapsed > this.life - 300) {
                    this.scale = ((this.life - elapsed) / 300) * this.maxScale;
                }

                // 浮遊アニメーション
                this.bobOffset += 0.05;

                return elapsed < this.life;
            }

            draw(time) {
                const bobY = Math.sin(this.bobOffset) * 5;
                const currentSize = this.size * this.scale;

                ctx.save();
                ctx.translate(this.x, this.y + bobY);
                ctx.scale(this.scale, this.scale);

                // グロー効果
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                ctx.fill();

                // 絵文字
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.type.emoji, 0, 0);

                ctx.restore();
            }

            isClicked(x, y) {
                const dx = x - this.x;
                const dy = y - this.y;
                return Math.sqrt(dx * dx + dy * dy) < this.size;
            }
        }

        // パーティクルクラス（スコア表示用）
        class ScoreParticle {
            constructor(x, y, text, color) {
                this.x = x;
                this.y = y;
                this.text = text;
                this.color = color;
                this.life = 1;
                this.vy = -2;
            }

            update() {
                this.y += this.vy;
                this.vy *= 0.95;
                this.life -= 0.02;
                return this.life > 0;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.font = 'bold 24px Arial';
                ctx.fillStyle = this.color;
                ctx.textAlign = 'center';
                ctx.fillText(this.text, this.x, this.y);
                ctx.restore();
            }
        }

        // ウィンドウサイズ変更
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // タップ/クリック処理
        function handleTap(x, y) {
            if (!gameRunning) return;

            let hit = false;

            for (let i = items.length - 1; i >= 0; i--) {
                if (items[i].isClicked(x, y)) {
                    const item = items[i];
                    score += item.points;
                    hit = true;

                    // スコアパーティクル
                    const color = item.points > 0 ? '#00ff88' : '#ff6b6b';
                    const text = item.points > 0 ? `+${item.points}` : `${item.points}`;
                    particles.push(new ScoreParticle(x, y, text, color));

                    items.splice(i, 1);
                    break;
                }
            }

            document.getElementById('score').textContent = score;
        }

        canvas.addEventListener('click', (e) => {
            handleTap(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleTap(touch.clientX, touch.clientY);
        });

        // ゲーム開始
        function startGame() {
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('endOverlay').classList.add('hidden');

            gameRunning = true;
            score = 0;
            timeLeft = 30;
            items = [];
            particles = [];

            document.getElementById('score').textContent = '0';
            document.getElementById('timer').textContent = '30';

            // タイマー開始
            gameTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // アイテムスポーン
            spawnTimer = setInterval(() => {
                if (items.length < 10) {
                    items.push(new Item());
                }
            }, 500);

            // 最初のアイテム
            for (let i = 0; i < 5; i++) {
                items.push(new Item());
            }
        }

        // ゲーム終了
        function endGame() {
            gameRunning = false;
            clearInterval(gameTimer);
            clearInterval(spawnTimer);

            // ハイスコア更新
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('tapCollectorHighScore', highScore);
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('highScoreText').textContent =
                `ハイスコア: ${highScore}`;
            document.getElementById('endOverlay').classList.remove('hidden');
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ゲームループ
        let lastTime = 0;
        function gameLoop(time) {
            ctx.clearRect(0, 0, width, height);

            if (gameRunning) {
                // アイテム更新・描画
                items = items.filter(item => item.update(time));
                items.forEach(item => item.draw(time));

                // パーティクル更新・描画
                particles = particles.filter(p => p.update());
                particles.forEach(p => p.draw());
            }

            requestAnimationFrame(gameLoop);
        }

        gameLoop(0);
    </script>
</body>
</html>
