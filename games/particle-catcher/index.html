<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Particle Catcher - パーティクルキャッチャー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            touch-action: none;
        }

        canvas {
            display: block;
        }

        .ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .score {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 150, 255, 0.5);
        }

        .combo {
            color: #ffcc00;
            font-size: 18px;
            margin-left: 15px;
        }

        .fullscreen-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            pointer-events: auto;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            z-index: 200;
            display: none;
        }

        .game-over h2 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 2px 20px rgba(255, 100, 100, 0.8);
        }

        .game-over p {
            font-size: 24px;
            margin-bottom: 30px;
        }

        .restart-btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #0096ff, #00d4ff);
            border: none;
            color: white;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 150, 255, 0.4);
        }

        .restart-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 150, 255, 0.6);
        }

        .restart-btn:active {
            transform: scale(0.95);
        }

        .instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="ui">
        <div>
            <div class="score">Score: <span id="score">0</span></div>
            <div class="combo" id="combo"></div>
        </div>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>
    </div>

    <div class="game-over" id="gameOver">
        <h2>Game Over!</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button class="restart-btn" onclick="restartGame()">再プレイ</button>
    </div>

    <div class="instructions">タップしてパーティクルをキャッチ！赤いパーティクルは避けて！</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // ゲーム状態
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let lives = 3;
        let gameRunning = true;
        let difficulty = 1;

        // キャッチャー
        const catcher = {
            x: width / 2,
            y: height - 100,
            radius: 50,
            targetX: width / 2
        };

        // パーティクル配列
        const particles = [];
        const particleSpeed = 3;
        let spawnRate = 60;
        let frameCount = 0;

        // 色設定
        const colors = {
            good: ['#0096ff', '#00d4ff', '#00ff88', '#ffff00'],
            bad: '#ff0066'
        };

        class Particle {
            constructor() {
                this.x = Math.random() * (width - 40) + 20;
                this.y = -20;
                this.vy = (Math.random() * 2 + particleSpeed) * difficulty;
                this.radius = Math.random() * 8 + 12;
                this.angle = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.2;
                this.isBad = Math.random() < 0.2; // 20%が悪いパーティクル

                if (this.isBad) {
                    this.color = colors.bad;
                    this.glow = '#ff0066';
                } else {
                    this.color = colors.good[Math.floor(Math.random() * colors.good.length)];
                    this.glow = this.color;
                }

                this.alpha = 1;
                this.pulse = 0;
            }

            update() {
                this.y += this.vy;
                this.angle += this.rotationSpeed;
                this.pulse += 0.1;

                // パルス効果
                this.currentRadius = this.radius + Math.sin(this.pulse) * 2;

                // キャッチャーとの衝突判定
                const dx = this.x - catcher.x;
                const dy = this.y - catcher.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < this.currentRadius + catcher.radius) {
                    return this.catch();
                }

                // 画面外に出た
                if (this.y > height + 50) {
                    if (!this.isBad) {
                        // 良いパーティクルを逃した
                        combo = 0;
                        updateCombo();
                    }
                    return true;
                }

                return false;
            }

            catch() {
                if (this.isBad) {
                    // 悪いパーティクルをキャッチ
                    lives--;
                    combo = 0;
                    updateCombo();

                    if (lives <= 0) {
                        gameOver();
                    }
                } else {
                    // 良いパーティクルをキャッチ
                    combo++;
                    if (combo > maxCombo) {
                        maxCombo = combo;
                    }

                    // スコア計算（コンボボーナス）
                    const comboBonus = Math.min(combo, 10);
                    score += 10 * comboBonus;
                    updateScore();
                    updateCombo();

                    // 難易度上昇
                    if (score % 100 === 0) {
                        difficulty += 0.1;
                        spawnRate = Math.max(20, 60 - Math.floor(score / 50));
                    }
                }

                return true;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // グロー効果
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.currentRadius * 2);
                gradient.addColorStop(0, this.glow);
                gradient.addColorStop(0.5, this.color + '80');
                gradient.addColorStop(1, 'transparent');

                ctx.beginPath();
                ctx.arc(0, 0, this.currentRadius * 2, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // 本体
                ctx.beginPath();
                ctx.arc(0, 0, this.currentRadius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();

                // ハイライト
                ctx.beginPath();
                ctx.arc(-this.currentRadius * 0.3, -this.currentRadius * 0.3, this.currentRadius * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.fill();

                ctx.restore();
            }
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        function updateCombo() {
            const comboEl = document.getElementById('combo');
            if (combo >= 2) {
                comboEl.textContent = `Combo: ${combo}🔥`;
                comboEl.style.opacity = '1';
            } else {
                comboEl.textContent = '';
                comboEl.style.opacity = '0';
            }
        }

        function drawCatcher() {
            // グロー
            const gradient = ctx.createRadialGradient(
                catcher.x, catcher.y, 0,
                catcher.x, catcher.y, catcher.radius * 1.5
            );
            gradient.addColorStop(0, 'rgba(0, 150, 255, 0.3)');
            gradient.addColorStop(1, 'transparent');

            ctx.beginPath();
            ctx.arc(catcher.x, catcher.y, catcher.radius * 1.5, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();

            // 本体
            const bodyGradient = ctx.createRadialGradient(
                catcher.x - 10, catcher.y - 10, 0,
                catcher.x, catcher.y, catcher.radius
            );
            bodyGradient.addColorStop(0, '#00d4ff');
            bodyGradient.addColorStop(1, '#0096ff');

            ctx.beginPath();
            ctx.arc(catcher.x, catcher.y, catcher.radius, 0, Math.PI * 2);
            ctx.fillStyle = bodyGradient;
            ctx.fill();

            // ハイライト
            ctx.beginPath();
            ctx.arc(catcher.x - 15, catcher.y - 15, 15, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fill();

            // ライフ表示
            for (let i = 0; i < lives; i++) {
                ctx.beginPath();
                ctx.arc(catcher.x - 20 + i * 20, catcher.y - 30, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#ff0066';
                ctx.fill();
            }
        }

        function animate() {
            if (!gameRunning) return;

            // 残像効果
            ctx.fillStyle = 'rgba(10, 10, 15, 0.2)';
            ctx.fillRect(0, 0, width, height);

            // キャッチャー移動
            catcher.x += (catcher.targetX - catcher.x) * 0.15;

            // パーティクル生成
            frameCount++;
            if (frameCount >= spawnRate) {
                particles.push(new Particle());
                frameCount = 0;
            }

            // パーティクル更新・描画
            for (let i = particles.length - 1; i >= 0; i--) {
                if (particles[i].update()) {
                    particles.splice(i, 1);
                } else {
                    particles[i].draw();
                }
            }

            // キャッチャー描画
            drawCatcher();

            requestAnimationFrame(animate);
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }

        function restartGame() {
            score = 0;
            combo = 0;
            maxCombo = 0;
            lives = 3;
            difficulty = 1;
            spawnRate = 60;
            gameRunning = true;
            particles.length = 0;

            updateScore();
            updateCombo();
            document.getElementById('gameOver').style.display = 'none';

            animate();
        }

        // イベントリスナー
        canvas.addEventListener('mousemove', (e) => {
            catcher.targetX = e.clientX;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            catcher.targetX = e.touches[0].clientX;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            catcher.targetX = e.touches[0].clientX;
        });

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            catcher.y = height - 100;
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ゲーム開始
        animate();
    </script>
</body>
</html>
