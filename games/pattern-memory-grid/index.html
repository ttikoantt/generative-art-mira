<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Memory Grid</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            color: white;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .grid-container {
            display: grid;
            gap: 10px;
            margin: 20px auto;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .grid-cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .grid-cell:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.4);
        }

        .grid-cell.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-color: white;
            box-shadow: 0 0 20px rgba(240, 147, 251, 0.5);
            animation: pulse 0.5s ease;
        }

        .grid-cell.correct {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border-color: white;
        }

        .grid-cell.wrong {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            animation: shake 0.5s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .message {
            font-size: 1.3rem;
            margin: 20px 0;
            min-height: 60px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            margin: 10px;
        }

        .btn-start {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 0, 0, 0.9);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            transition: width 0.3s ease;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .stats {
                gap: 15px;
                font-size: 1rem;
            }

            .grid-container {
                gap: 8px;
                padding: 15px;
            }

            .btn {
                padding: 12px 30px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🎮 Pattern Memory Grid</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">レベル</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">ハイスコア</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>

        <div class="grid-container" id="grid"></div>

        <div class="message" id="message">
            スタートボタンを押してゲーム開始！
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>

        <button class="btn btn-start" id="startBtn" onclick="startGame()">
            🚀 ゲーム開始
        </button>
    </div>

    <script>
        let gridSize = 3;
        let pattern = [];
        let playerPattern = [];
        let level = 1;
        let score = 0;
        let highScore = localStorage.getItem('patternMemoryHighScore') || 0;
        let isShowingPattern = false;
        let canClick = false;

        document.getElementById('highScore').textContent = highScore;

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;

            for (let i = 0; i < gridSize * gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                cell.dataset.index = i;
                cell.addEventListener('click', handleCellClick);
                grid.appendChild(cell);
            }
        }

        function generatePattern() {
            const cellCount = Math.min(level + 2, gridSize * gridSize);
            pattern = [];

            const available = Array.from({ length: gridSize * gridSize }, (_, i) => i);

            for (let i = 0; i < cellCount; i++) {
                const randomIndex = Math.floor(Math.random() * available.length);
                pattern.push(available[randomIndex]);
                available.splice(randomIndex, 1);
            }
        }

        async function showPattern() {
            isShowingPattern = true;
            canClick = false;
            playerPattern = [];

            document.getElementById('message').textContent = 'パターンを覚えて！';
            document.getElementById('progress').style.width = '0%';

            const cells = document.querySelectorAll('.grid-cell');
            const duration = Math.max(2000 - level * 100, 1000);

            // パターンを表示
            for (let i = 0; i < pattern.length; i++) {
                await sleep(duration / pattern.length);
                cells[pattern[i]].classList.add('active');
                await sleep(duration / pattern.length / 2);
                cells[pattern[i]].classList.remove('active');
            }

            await sleep(500);
            isShowingPattern = false;
            canClick = true;
            document.getElementById('message').textContent = '同じパターンをクリック！';
        }

        function handleCellClick(e) {
            if (!canClick || isShowingPattern) return;

            const cell = e.target;
            const index = parseInt(cell.dataset.index);

            if (playerPattern.includes(index)) return;

            playerPattern.push(index);

            if (pattern.includes(index)) {
                cell.classList.add('correct');

                if (playerPattern.length === pattern.length) {
                    // レベルクリア
                    canClick = false;
                    score += level * 10;
                    level++;
                    updateStats();
                    document.getElementById('message').textContent = '🎉 正解！次のレベルへ...';

                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('patternMemoryHighScore', highScore);
                        updateStats();
                    }

                    setTimeout(() => {
                        if (level % 3 === 1 && gridSize < 6) {
                            gridSize++;
                            createGrid();
                        }
                        nextLevel();
                    }, 1500);
                }
            } else {
                // 間違い
                cell.classList.add('wrong');
                canClick = false;
                document.getElementById('message').textContent = `❌ 間違い！ゲームオーバー (スコア: ${score})`;

                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('patternMemoryHighScore', highScore);
                    updateStats();
                }

                document.getElementById('startBtn').textContent = '🔄 もう一度';
                document.getElementById('startBtn').style.display = 'inline-block';
            }
        }

        function nextLevel() {
            document.getElementById('progress').style.width = '100%';
            generatePattern();
            showPattern();
        }

        function startGame() {
            gridSize = 3;
            level = 1;
            score = 0;
            createGrid();
            updateStats();
            document.getElementById('startBtn').style.display = 'none';
            nextLevel();
        }

        function updateStats() {
            document.getElementById('level').textContent = level;
            document.getElementById('score').textContent = score;
            document.getElementById('highScore').textContent = highScore;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        createGrid();
    </script>
</body>
</html>
