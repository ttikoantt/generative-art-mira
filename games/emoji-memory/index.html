<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Memory Match</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .game-container {
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .stat {
            text-align: center;
            color: white;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            perspective: 1000px;
        }

        .card {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.9);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            transform-style: preserve-3d;
            transition: transform 0.5s;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched {
            transform: rotateY(180deg) scale(0.95);
            opacity: 0.6;
            cursor: default;
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }

        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-size: 2rem;
        }

        .card-back {
            background: white;
            transform: rotateY(180deg);
        }

        @keyframes match {
            0%, 100% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
        }

        .card.matched .card-back {
            animation: match 0.5s ease;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        button {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 1.2rem;
            background: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            color: #667eea;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0,0,0,0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .win-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .win-message.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .win-message h2 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .win-message p {
            color: #764ba2;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        @media (max-width: 480px) {
            .grid {
                gap: 8px;
            }
            .card {
                font-size: 2rem;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎮 Emoji Memory Match</h1>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="moves">0</div>
                <div class="stat-label">ムーブ</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="pairs">0</div>
                <div class="stat-label">ペア</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="time">0:00</div>
                <div class="stat-label">タイム</div>
            </div>
        </div>

        <div class="grid" id="grid"></div>

        <button onclick="initGame()">リセット</button>
    </div>

    <div class="win-message" id="winMessage">
        <h2>🎉 クリア！</h2>
        <p id="finalStats"></p>
        <button onclick="initGame()">もう一度遊ぶ</button>
    </div>

    <script>
        const emojis = ['🎮', '🎨', '🎭', '🎪', '🎢', '🎡', '🎠', '🎪'];
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let gameStarted = false;
        let startTime;
        let timerInterval;

        // 絵文字ペアを作成
        function createPairs() {
            const pairs = [...emojis, ...emojis];
            return pairs.sort(() => Math.random() - 0.5);
        }

        // カードを作成
        function createCard(emoji, index) {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.index = index;
            card.innerHTML = `
                <div class="card-front">❓</div>
                <div class="card-back">${emoji}</div>
            `;
            card.addEventListener('click', flipCard);
            return card;
        }

        // カードをひっくり返す
        function flipCard() {
            if (!gameStarted) {
                gameStarted = true;
                startTimer();
            }

            const card = this;
            
            // すでに2枚ひっくり返っている場合
            if (flippedCards.length >= 2) return;
            
            // すでにひっくり返されているカード
            if (flippedCards.includes(card)) return;
            
            // すでにマッチしたカード
            if (card.classList.contains('matched')) return;

            // カードをひっくり返す
            card.classList.add('flipped');
            flippedCards.push(card);

            // 2枚ひっくり返したらチェック
            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }

        // マッチチェック
        function checkMatch() {
            const [card1, card2] = flippedCards;
            const match = card1.querySelector('.card-back').textContent === 
                         card2.querySelector('.card-back').textContent;

            if (match) {
                // マッチした場合
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    matchedPairs++;
                    document.getElementById('pairs').textContent = matchedPairs;
                    flippedCards = [];

                    // 全てマッチしたらクリア
                    if (matchedPairs === emojis.length) {
                        setTimeout(showWin, 500);
                    }
                }, 300);
            } else {
                // マッチしなかった場合
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                }, 1000);
            }
        }

        // タイマー開始
        function startTimer() {
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);
        }

        // タイマー更新
        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            document.getElementById('time').textContent = 
                `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        // タイマー停止
        function stopTimer() {
            clearInterval(timerInterval);
        }

        // クリアメッセージ表示
        function showWin() {
            stopTimer();
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            const timeStr = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            
            document.getElementById('finalStats').textContent = 
                `ムーブ: ${moves}回 | タイム: ${timeStr}`;
            document.getElementById('winMessage').classList.add('show');
        }

        // ゲーム初期化
        function initGame() {
            // リセット
            matchedPairs = 0;
            moves = 0;
            flippedCards = [];
            gameStarted = false;
            
            clearInterval(timerInterval);
            document.getElementById('moves').textContent = '0';
            document.getElementById('pairs').textContent = '0';
            document.getElementById('time').textContent = '0:00';
            document.getElementById('winMessage').classList.remove('show');

            // カードを作成
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            cards = createPairs();
            
            cards.forEach((emoji, index) => {
                const card = createCard(emoji, index);
                grid.appendChild(card);
            });
        }

        // ゲーム開始
        initGame();
    </script>
</body>
</html>
