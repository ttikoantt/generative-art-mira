<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gem Catcher - Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            font-size: 18px;
            color: white;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
        }

        .game-area {
            flex: 1;
            position: relative;
            background: rgba(0, 0, 0, 0.2);
            margin: 10px 20px;
            border-radius: 15px;
            overflow: hidden;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        .overlay p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .play-btn {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
        }

        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
            z-index: 10;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .controls {
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
        }

        .controls p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .touch-controls {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 50;
        }

        .touch-btn {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 30px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .touch-btn:active {
            background: rgba(255, 255, 255, 0.4);
        }

        @media (max-width: 768px) {
            .touch-controls {
                display: flex;
            }

            .header h1 {
                font-size: 22px;
            }

            .stats {
                gap: 15px;
            }

            .stat-item {
                padding: 8px 15px;
            }

            .stat-value {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

        <div class="header">
            <h1>💎 Gem Catcher</h1>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-label">SCORE</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">TIME</div>
                    <div class="stat-value" id="time">30</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">HIGH</div>
                    <div class="stat-value" id="highScore">0</div>
                </div>
            </div>
        </div>

        <div class="game-area">
            <canvas id="gameCanvas"></canvas>

            <div class="overlay" id="startOverlay">
                <h2>💎 Gem Catcher</h2>
                <p>落ちてくる宝石をキャッチしよう！<br>矢印キーかタップで操作</p>
                <button class="play-btn" onclick="startGame()">▶ START</button>
            </div>

            <div class="overlay hidden" id="gameOverOverlay">
                <h2>GAME OVER</h2>
                <p>スコア: <span id="finalScore">0</span></p>
                <button class="play-btn" onclick="startGame()">↻ REPLAY</button>
            </div>
        </div>

        <div class="controls">
            <p>← → 矢印キーかタップでバスケットを動かす</p>
        </div>

        <div class="touch-controls">
            <button class="touch-btn" id="leftBtn">◀</button>
            <button class="touch-btn" id="rightBtn">▶</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let basketX, basketWidth = 80, basketHeight = 15;
        let gems = [];
        let score = 0;
        let timeLeft = 30;
        let highScore = 0;
        let gameRunning = false;
        let gameLoop;
        let timerInterval;
        let keys = {};

        const gemTypes = [
            { emoji: '💎', points: 10, speed: 3, color: '#48dbfb' },
            { emoji: '💠', points: 15, speed: 4, color: '#ff6b6b' },
            { emoji: '⭐', points: 20, speed: 5, color: '#feca57' },
            { emoji: '🌟', points: 25, speed: 6, color: '#ff9ff3' }
        ];

        function resize() {
            const rect = canvas.parentElement.getBoundingClientRect();
            width = canvas.width = rect.width;
            height = canvas.height = rect.height;
            basketX = width / 2 - basketWidth / 2;
        }

        function createGem() {
            const type = gemTypes[Math.floor(Math.random() * gemTypes.length)];
            gems.push({
                x: Math.random() * (width - 30),
                y: -30,
                type: type,
                speed: type.speed + Math.random() * 2,
                size: 25 + Math.random() * 10
            });
        }

        function drawBasket() {
            // バスケットの影
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(basketX + 5, height - basketHeight - 10 + 5, basketWidth, basketHeight);

            // バスケット本体
            const gradient = ctx.createLinearGradient(basketX, 0, basketX + basketWidth, 0);
            gradient.addColorStop(0, '#ff6b6b');
            gradient.addColorStop(0.5, '#feca57');
            gradient.addColorStop(1, '#ff6b6b');

            ctx.fillStyle = gradient;
            ctx.fillRect(basketX, height - basketHeight - 10, basketWidth, basketHeight);

            // バスケットの縁
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.strokeRect(basketX, height - basketHeight - 10, basketWidth, basketHeight);

            // キラキラエフェクト
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.fillRect(basketX + 10, height - basketHeight - 8, 10, 3);
            ctx.fillRect(basketX + basketWidth - 20, height - basketHeight - 8, 10, 3);
        }

        function drawGems() {
            gems.forEach(gem => {
                ctx.font = `${gem.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(gem.type.emoji, gem.x + gem.size / 2, gem.y + gem.size / 2);

                // 光るエフェクト
                ctx.shadowColor = gem.type.color;
                ctx.shadowBlur = 10;
                ctx.fillText(gem.type.emoji, gem.x + gem.size / 2, gem.y + gem.size / 2);
                ctx.shadowBlur = 0;
            });
        }

        function update() {
            if (keys['ArrowLeft'] || keys['left']) {
                basketX = Math.max(0, basketX - 8);
            }
            if (keys['ArrowRight'] || keys['right']) {
                basketX = Math.min(width - basketWidth, basketX + 8);
            }

            gems = gems.filter(gem => {
                gem.y += gem.speed;

                // 衝突判定
                const basketTop = height - basketHeight - 10;
                const basketBottom = height - 10;

                if (gem.y + gem.size >= basketTop &&
                    gem.y <= basketBottom &&
                    gem.x + gem.size >= basketX &&
                    gem.x <= basketX + basketWidth) {
                    score += gem.type.points;
                    document.getElementById('score').textContent = score;
                    return false;
                }

                return gem.y < height;
            });

            // 新しい宝石を生成
            if (Math.random() < 0.03) {
                createGem();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // 背景の星
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            for (let i = 0; i < 50; i++) {
                const x = (i * 123) % width;
                const y = (i * 456) % height;
                ctx.fillRect(x, y, 2, 2);
            }

            drawGems();
            drawBasket();
        }

        function gameUpdate() {
            update();
            draw();

            if (gameRunning) {
                gameLoop = requestAnimationFrame(gameUpdate);
            }
        }

        function startGame() {
            resize();

            score = 0;
            timeLeft = 30;
            gems = [];
            basketX = width / 2 - basketWidth / 2;

            document.getElementById('score').textContent = score;
            document.getElementById('time').textContent = timeLeft;
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');

            gameRunning = true;
            gameUpdate();

            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('time').textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameRunning = false;
            clearInterval(timerInterval);
            cancelAnimationFrame(gameLoop);

            if (score > highScore) {
                highScore = score;
                document.getElementById('highScore').textContent = highScore;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (['ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // タッチ操作
        document.getElementById('leftBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            keys['left'] = true;
        });
        document.getElementById('leftBtn').addEventListener('touchend', () => {
            keys['left'] = false;
        });
        document.getElementById('rightBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            keys['right'] = true;
        });
        document.getElementById('rightBtn').addEventListener('touchend', () => {
            keys['right'] = false;
        });

        window.addEventListener('resize', () => {
            if (gameRunning) {
                resize();
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        window.addEventListener('load', () => {
            resize();
            draw();
        });
    </script>
</body>
</html>
