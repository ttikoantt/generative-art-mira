<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Reaction - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .hud {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 100;
        }

        .hud-left {
            background: rgba(10, 10, 15, 0.9);
            padding: 15px 20px;
            border-radius: 10px;
            border: 2px solid #00ffcc;
            color: #00ffcc;
            min-width: 150px;
        }

        .hud-right {
            background: rgba(10, 10, 15, 0.9);
            padding: 15px 20px;
            border-radius: 10px;
            border: 2px solid #ff0066;
            color: #ff0066;
            text-align: right;
            min-width: 150px;
        }

        .score-label {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 0 10px currentColor;
        }

        .combo-display {
            margin-top: 10px;
            font-size: 18px;
            color: #ffcc00;
            text-shadow: 0 0 10px #ffcc00;
        }

        .timer-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, #00ffcc, #ff0066);
            transition: width 0.1s linear;
            z-index: 101;
        }

        .target {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            touch-action: manipulation;
            transform: translate(-50%, -50%);
            animation: pulse 0.5s ease-out;
            box-shadow: 0 0 20px currentColor;
            transition: transform 0.05s;
        }

        .target:active {
            transform: translate(-50%, -50%) scale(0.9);
        }

        @keyframes pulse {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        @keyframes hit {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(2);
                opacity: 0;
            }
        }

        .hit-effect {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: hit 0.3s ease-out forwards;
        }

        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 10, 15, 0.95);
            z-index: 200;
        }

        .screen.hidden {
            display: none;
        }

        .screen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #00ffcc, #ff0066);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 255, 204, 0.5);
        }

        .screen p {
            color: #888;
            margin-bottom: 30px;
            font-size: 16px;
            max-width: 400px;
            text-align: center;
            line-height: 1.6;
        }

        .btn {
            background: linear-gradient(45deg, #00ffcc, #00ccff);
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-family: inherit;
            font-weight: bold;
            color: #0a0a0f;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.5);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 30px 0;
            max-width: 400px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-box .label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-box .value {
            font-size: 24px;
            color: #00ffcc;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 255, 204, 0.2);
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            z-index: 150;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 204, 0.4);
        }

        @media (max-width: 768px) {
            .screen h1 {
                font-size: 32px;
            }

            .hud-left, .hud-right {
                padding: 10px 15px;
                min-width: 120px;
            }

            .score-value {
                font-size: 24px;
            }

            .btn {
                padding: 12px 30px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="timer-bar" id="timerBar"></div>

    <div class="hud">
        <div class="hud-left">
            <div class="score-label">SCORE</div>
            <div class="score-value" id="score">0</div>
            <div class="combo-display" id="combo"></div>
        </div>
        <div class="hud-right">
            <div class="score-label">TIME</div>
            <div class="score-value" id="time">60</div>
        </div>
    </div>

    <div id="gameContainer"></div>

    <div class="screen" id="startScreen">
        <h1>NEON REACTION</h1>
        <p>
            ターゲットを素早くタップ！<br>
            連続ヒットでコンボボーナス<br>
            制限時間60秒でハイスコア目指せ
        </p>
        <button class="btn" onclick="startGame()">START</button>
    </div>

    <div class="screen hidden" id="gameOverScreen">
        <h1>GAME OVER</h1>
        <div class="stats-grid">
            <div class="stat-box">
                <div class="label">SCORE</div>
                <div class="value" id="finalScore">0</div>
            </div>
            <div class="stat-box">
                <div class="label">BEST COMBO</div>
                <div class="value" id="bestCombo">0</div>
            </div>
            <div class="stat-box">
                <div class="label">HITS</div>
                <div class="value" id="totalHits">0</div>
            </div>
            <div class="stat-box">
                <div class="label">ACCURACY</div>
                <div class="value" id="accuracy">0%</div>
            </div>
        </div>
        <button class="btn" onclick="startGame()">PLAY AGAIN</button>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        const container = document.getElementById('gameContainer');
        const timerBar = document.getElementById('timerBar');

        // Game state
        let score = 0;
        let combo = 0;
        let bestCombo = 0;
        let timeLeft = 60;
        let totalHits = 0;
        let totalClicks = 0;
        let gameRunning = false;
        let gameTimer = null;
        let spawnTimer = null;

        const colors = [
            '#00ffcc',
            '#ff0066',
            '#ffcc00',
            '#00ccff',
            '#ff00ff'
        ];

        function createTarget() {
            if (!gameRunning) return;

            const target = document.createElement('div');
            target.className = 'target';

            const size = 50 + Math.random() * 50;
            const x = 60 + Math.random() * (window.innerWidth - 120);
            const y = 100 + Math.random() * (window.innerHeight - 160);
            const color = colors[Math.floor(Math.random() * colors.length)];

            target.style.width = size + 'px';
            target.style.height = size + 'px';
            target.style.left = x + 'px';
            target.style.top = y + 'px';
            target.style.backgroundColor = color;
            target.style.color = color;

            target.onclick = (e) => {
                e.stopPropagation();
                hitTarget(target, x, y, color);
            };

            container.appendChild(target);

            // Remove target after 2 seconds
            setTimeout(() => {
                if (target.parentNode && gameRunning) {
                    target.remove();
                    combo = 0;
                    updateCombo();
                }
            }, 2000);

            // Spawn next target
            const nextSpawn = 500 + Math.random() * 500;
            spawnTimer = setTimeout(createTarget, nextSpawn);
        }

        function hitTarget(target, x, y, color) {
            if (!gameRunning) return;

            // Play hit effect
            const effect = document.createElement('div');
            effect.className = 'hit-effect';
            effect.style.width = target.style.width;
            effect.style.height = target.style.height;
            effect.style.left = x + 'px';
            effect.style.top = y + 'px';
            effect.style.border = `3px solid ${color}`;
            container.appendChild(effect);
            setTimeout(() => effect.remove(), 300);

            // Remove target
            target.remove();

            // Update stats
            totalHits++;
            combo++;
            if (combo > bestCombo) bestCombo = combo;

            // Score calculation
            const baseScore = 100;
            const comboBonus = Math.floor(combo * 10);
            const points = baseScore + comboBonus;
            score += points;

            updateScore();
            updateCombo();
        }

        function missTarget() {
            if (!gameRunning) return;
            totalClicks++;
            combo = 0;
            updateCombo();
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        function updateCombo() {
            const comboDisplay = document.getElementById('combo');
            if (combo > 1) {
                comboDisplay.textContent = `${combo}x COMBO!`;
            } else {
                comboDisplay.textContent = '';
            }
        }

        function updateTime() {
            document.getElementById('time').textContent = timeLeft;
            timerBar.style.width = (timeLeft / 60 * 100) + '%';
        }

        function startGame() {
            // Reset game state
            score = 0;
            combo = 0;
            bestCombo = 0;
            timeLeft = 60;
            totalHits = 0;
            totalClicks = 0;
            gameRunning = true;

            // Clear existing targets
            container.innerHTML = '';

            // Update UI
            updateScore();
            updateCombo();
            updateTime();

            // Hide screens
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');

            // Start game loop
            gameTimer = setInterval(() => {
                timeLeft--;
                updateTime();

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // Start spawning targets
            createTarget();

            // Miss handler
            container.onclick = missTarget;
        }

        function endGame() {
            gameRunning = false;
            clearInterval(gameTimer);
            clearTimeout(spawnTimer);

            // Show game over screen
            document.getElementById('finalScore').textContent = score;
            document.getElementById('bestCombo').textContent = bestCombo;
            document.getElementById('totalHits').textContent = totalHits;

            const accuracy = totalClicks > 0
                ? Math.round((totalHits / (totalHits + totalClicks)) * 100)
                : 0;
            document.getElementById('accuracy').textContent = accuracy + '%';

            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
