<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Pulse</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 1000;
        }
        #fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        #game-container {
            text-align: center;
            color: #fff;
        }
        #score-display {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        #pulse-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.2) 100%);
            margin: 0 auto 30px;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #pulse-circle:active {
            transform: scale(0.9);
        }
        #pulse-circle.hit {
            background: radial-gradient(circle, rgba(100,255,100,0.8) 0%, rgba(100,255,100,0.2) 100%);
        }
        #pulse-circle.miss {
            background: radial-gradient(circle, rgba(255,100,100,0.8) 0%, rgba(255,100,100,0.2) 100%);
        }
        #instructions {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 20px;
        }
        #combo {
            font-size: 24px;
            margin-top: 10px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        #start-btn {
            padding: 15px 30px;
            font-size: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        #start-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            animation: ripple 1s ease-out;
        }
        @keyframes ripple {
            0% {
                width: 0;
                height: 0;
                opacity: 1;
            }
            100% {
                width: 300px;
                height: 300px;
                opacity: 0;
                margin-left: -150px;
                margin-top: -150px;
            }
        }
        @media (max-width: 768px) {
            #pulse-circle {
                width: 150px;
                height: 150px;
                font-size: 20px;
            }
            #score-display {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <button id="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    <div id="game-container">
        <h1 style="margin-bottom: 20px;">Rhythm Pulse</h1>
        <div id="score-display">0</div>
        <div id="combo"></div>
        <div id="pulse-circle">TAP!</div>
        <div id="instructions">円が光ったらタップ！</div>
        <button id="start-btn">スタート</button>
    </div>

    <script>
        const scoreDisplay = document.getElementById('score-display');
        const pulseCircle = document.getElementById('pulse-circle');
        const comboDisplay = document.getElementById('combo');
        const startBtn = document.getElementById('start-btn');
        const instructions = document.getElementById('instructions');

        let score = 0;
        let combo = 0;
        let gameActive = false;
        let pulseInterval;
        let pulseActive = false;
        let pulseTimeout;
        let baseSpeed = 1500;
        let currentSpeed = baseSpeed;

        function startGame() {
            score = 0;
            combo = 0;
            currentSpeed = baseSpeed;
            gameActive = true;
            updateDisplay();
            startBtn.style.display = 'none';
            instructions.textContent = '円が光ったらタップ！';
            startPulse();
        }

        function startPulse() {
            if (!gameActive) return;

            pulseActive = true;
            pulseCircle.style.boxShadow = '0 0 50px rgba(255, 255, 255, 0.8)';
            pulseCircle.style.transform = 'scale(1.1)';

            // ミスタイムアウト（反応がない場合）
            pulseTimeout = setTimeout(() => {
                if (pulseActive) {
                    miss();
                }
            }, currentSpeed / 2);
        }

        function createRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 1000);
        }

        function hit(e) {
            if (!gameActive || !pulseActive) {
                if (gameActive && !pulseActive) {
                    miss();
                }
                return;
            }

            clearTimeout(pulseTimeout);
            pulseActive = false;

            // ヒットエフェクト
            pulseCircle.classList.add('hit');
            pulseCircle.style.boxShadow = '0 0 30px rgba(100, 255, 100, 0.8)';
            pulseCircle.style.transform = 'scale(0.95)';

            if (e) {
                const rect = pulseCircle.getBoundingClientRect();
                createRipple(rect.left + rect.width / 2, rect.top + rect.height / 2);
            }

            // スコア計算
            combo++;
            const comboBonus = Math.floor(combo / 5);
            score += 10 + comboBonus;

            // スピードアップ
            if (combo % 10 === 0 && currentSpeed > 500) {
                currentSpeed -= 50;
            }

            updateDisplay();

            setTimeout(() => {
                pulseCircle.classList.remove('hit');
                pulseCircle.style.transform = 'scale(1)';
                setTimeout(startPulse, 200);
            }, 200);
        }

        function miss() {
            if (!gameActive) return;

            pulseActive = false;
            clearTimeout(pulseTimeout);

            pulseCircle.classList.add('miss');
            pulseCircle.style.boxShadow = '0 0 30px rgba(255, 100, 100, 0.8)';

            combo = 0;
            updateDisplay();

            setTimeout(() => {
                pulseCircle.classList.remove('miss');
                if (gameActive) {
                    setTimeout(startPulse, 200);
                }
            }, 300);
        }

        function updateDisplay() {
            scoreDisplay.textContent = score;
            if (combo > 1) {
                comboDisplay.textContent = `Combo: ${combo}`;
            } else {
                comboDisplay.textContent = '';
            }
        }

        pulseCircle.addEventListener('click', hit);
        pulseCircle.addEventListener('touchstart', (e) => {
            e.preventDefault();
            hit(e);
        });

        startBtn.addEventListener('click', startGame);

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
