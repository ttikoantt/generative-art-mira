<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Pulse</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0a0a2a 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: manipulation;
        }

        #gameCanvas {
            display: block;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(100, 200, 255, 0.3);
        }

        .ui-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            z-index: 100;
        }

        .stat {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 25px;
            border-radius: 15px;
            border: 2px solid rgba(100, 200, 255, 0.3);
            text-align: center;
            min-width: 100px;
        }

        .stat-label {
            color: #64c8ff;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(100, 200, 255, 0.8);
        }

        .combo {
            color: #ffcc00 !important;
        }

        #startScreen, #gameOverScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        #gameOverScreen {
            display: none;
        }

        h1 {
            color: #64c8ff;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.8);
            text-align: center;
        }

        .instructions {
            color: #aaa;
            font-size: 16px;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1.8;
        }

        .btn {
            background: linear-gradient(135deg, #64c8ff, #4a9ccf);
            border: none;
            padding: 20px 50px;
            border-radius: 30px;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(100, 200, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(100, 200, 255, 0.6);
        }

        .final-score {
            color: #64c8ff;
            font-size: 36px;
            margin-bottom: 10px;
        }

        .final-combo {
            color: #ffcc00;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(100, 200, 255, 0.2);
            border: 1px solid rgba(100, 200, 255, 0.5);
            color: #64c8ff;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(100, 200, 255, 0.4);
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
        }

        .tap-zone {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(100, 200, 255, 0.3), rgba(100, 200, 255, 0.1));
            border: 3px solid rgba(100, 200, 255, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #64c8ff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
            z-index: 50;
            text-transform: uppercase;
            letter-spacing: 2px;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .tap-zone:active {
            transform: translateX(-50%) scale(0.95);
            background: radial-gradient(circle, rgba(100, 200, 255, 0.5), rgba(100, 200, 255, 0.2));
        }

        .tap-zone.pulse {
            animation: pulse 0.15s ease-out;
        }

        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); }
            100% { transform: translateX(-50%) scale(1); }
        }

        @media (max-width: 768px) {
            h1 { font-size: 32px; }
            .stat { padding: 10px 15px; min-width: 70px; }
            .stat-value { font-size: 20px; }
            .tap-zone { width: 150px; height: 150px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="ui-container">
        <div class="stat">
            <div class="stat-label">Score</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Combo</div>
            <div class="stat-value combo" id="combo">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Lives</div>
            <div class="stat-value" id="lives">❤️❤️❤️</div>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">Full Screen</button>

    <canvas id="gameCanvas"></canvas>

    <div class="tap-zone" id="tapZone">TAP</div>

    <div id="startScreen">
        <h1>🎵 Rhythm Pulse</h1>
        <div class="instructions">
            Tap when the circle reaches the center!<br>
            Build combos for higher scores!<br>
            Don't miss - you have 3 lives!
        </div>
        <button class="btn" onclick="startGame()">Start Game</button>
    </div>

    <div id="gameOverScreen">
        <h1>Game Over</h1>
        <div class="final-score">Score: <span id="finalScore">0</span></div>
        <div class="final-combo">Max Combo: <span id="finalCombo">0</span></div>
        <button class="btn" onclick="startGame()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const tapZone = document.getElementById('tapZone');

        let width, height, centerX, centerY;
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let lives = 3;
        let gameRunning = false;
        let circles = [];
        let lastTapTime = 0;
        let tapCount = 0;

        const BASE_BPM = 120;
        const SPAWN_INTERVAL = 600;
        let lastSpawn = 0;
        let difficulty = 1;

        function resize() {
            width = canvas.width = Math.min(window.innerWidth - 20, 600);
            height = canvas.height = Math.min(window.innerHeight - 300, 500);
            centerX = width / 2;
            centerY = height / 2;
        }

        class RhythmCircle {
            constructor() {
                this.radius = Math.min(width, height) / 2 - 30;
                this.targetRadius = 30;
                this.speed = (1 + Math.random() * 0.5) * difficulty;
                this.hue = Math.random() * 360;
                this.active = true;
                this.spawnTime = Date.now();
            }

            update() {
                this.radius -= this.speed;

                if (this.radius <= this.targetRadius) {
                    this.active = false;
                    missCircle();
                }

                this.hue = (this.hue + 1) % 360;
            }

            draw() {
                const alpha = this.radius / (Math.min(width, height) / 2);

                // Outer circle
                ctx.beginPath();
                ctx.arc(centerX, centerY, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 100%, 60%, ${alpha})`;
                ctx.lineWidth = 4;
                ctx.stroke();

                // Glow effect
                ctx.beginPath();
                ctx.arc(centerX, centerY, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 100%, 60%, ${alpha * 0.3})`;
                ctx.lineWidth = 10;
                ctx.stroke();

                // Inner fill
                ctx.beginPath();
                ctx.arc(centerX, centerY, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${alpha * 0.1})`;
                ctx.fill();
            }

            checkTap() {
                const diff = Math.abs(this.radius - this.targetRadius);
                const perfectZone = 10;
                const goodZone = 25;
                const okZone = 40;

                if (diff <= perfectZone) {
                    return 'PERFECT';
                } else if (diff <= goodZone) {
                    return 'GREAT';
                } else if (diff <= okZone) {
                    return 'OK';
                } else if (diff <= okZone + 20) {
                    return 'EARLY';
                }
                return null;
            }
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';

            score = 0;
            combo = 0;
            maxCombo = 0;
            lives = 3;
            difficulty = 1;
            circles = [];
            gameRunning = true;
            lastSpawn = Date.now();

            updateUI();
            resize();
            gameLoop();
        }

        function spawnCircle() {
            circles.push(new RhythmCircle());
        }

        function handleTap(e) {
            if (!gameRunning) return;

            e.preventDefault();
            tapZone.classList.add('pulse');
            setTimeout(() => tapZone.classList.remove('pulse'), 150);

            let tapped = false;
            let bestResult = null;
            let bestCircle = null;

            // Find closest circle to target
            for (let i = circles.length - 1; i >= 0; i--) {
                const result = circles[i].checkTap();
                if (result && (!bestResult || 
                    (result === 'PERFECT') || 
                    (result === 'GREAT' && bestResult !== 'PERFECT'))) {
                    bestResult = result;
                    bestCircle = circles[i];
                    tapped = true;
                }
            }

            if (tapped && bestCircle) {
                hitCircle(bestResult);
                circles = circles.filter(c => c !== bestCircle);
            }

            tapCount++;
            const now = Date.now();
            if (now - lastTapTime < 200) {
                // Rapid tapping detection
            }
            lastTapTime = now;
        }

        function hitCircle(result) {
            let points = 0;

            switch (result) {
                case 'PERFECT':
                    points = 100;
                    combo++;
                    showFeedback('PERFECT!', '#64c8ff');
                    break;
                case 'GREAT':
                    points = 75;
                    combo++;
                    showFeedback('GREAT!', '#00ff88');
                    break;
                case 'OK':
                    points = 50;
                    combo++;
                    showFeedback('OK', '#ffcc00');
                    break;
                case 'EARLY':
                    points = 25;
                    combo = Math.max(0, combo - 1);
                    showFeedback('EARLY', '#ff8844');
                    break;
            }

            const comboMultiplier = Math.min(5, 1 + Math.floor(combo / 10) * 0.5);
            points = Math.floor(points * comboMultiplier);
            score += points;

            if (combo > maxCombo) {
                maxCombo = combo;
            }

            // Gradually increase difficulty
            if (score > 0 && score % 500 === 0) {
                difficulty = Math.min(2.5, difficulty + 0.1);
            }

            updateUI();
        }

        function missCircle() {
            combo = 0;
            lives--;
            showFeedback('MISS!', '#ff4444');
            updateUI();

            if (lives <= 0) {
                gameOver();
            }
        }

        function showFeedback(text, color) {
            const feedback = document.createElement('div');
            feedback.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                color: ${color};
                font-size: 48px;
                font-weight: bold;
                text-shadow: 0 0 20px ${color};
                z-index: 150;
                animation: feedbackPop 0.5s ease-out forwards;
                pointer-events: none;
            `;
            feedback.textContent = text;
            document.body.appendChild(feedback);

            setTimeout(() => feedback.remove(), 500);
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalCombo').textContent = maxCombo;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;
            document.getElementById('lives').textContent = '❤️'.repeat(lives);
        }

        function gameLoop() {
            if (!gameRunning) return;

            const now = Date.now();

            // Spawn new circles
            if (now - lastSpawn > SPAWN_INTERVAL / difficulty) {
                spawnCircle();
                lastSpawn = now;
            }

            // Clear canvas
            ctx.fillStyle = 'rgba(10, 10, 26, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // Draw target circle
            ctx.beginPath();
            ctx.arc(centerX, centerY, 30, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(100, 200, 255, 0.5)';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Draw target glow
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 30);
            gradient.addColorStop(0, 'rgba(100, 200, 255, 0.2)');
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fill();

            // Update and draw circles
            circles.forEach(circle => {
                circle.update();
                circle.draw();
            });

            // Remove inactive circles
            circles = circles.filter(c => c.active);

            requestAnimationFrame(gameLoop);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Event listeners
        tapZone.addEventListener('click', handleTap);
        tapZone.addEventListener('touchstart', handleTap);
        canvas.addEventListener('click', handleTap);
        canvas.addEventListener('touchstart', handleTap);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && gameRunning) {
                e.preventDefault();
                handleTap(e);
            }
        });

        window.addEventListener('resize', resize);

        // Add CSS animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes feedbackPop {
                0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
                50% { transform: translate(-50%, -50%) scale(1.2); }
                100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // Initialize
        resize();
    </script>
</body>
</html>
