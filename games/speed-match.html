<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Match Challenge | スピード・マッチ・チャレンジ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
            overflow: hidden;
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
        }

        .timer-bar {
            width: 100%;
            max-width: 400px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            transition: width 0.1s linear;
        }

        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .target-card {
            width: 150px;
            height: 150px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            box-shadow: 0 8px 32px rgba(255, 107, 107, 0.3);
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .instruction {
            font-size: 1.2rem;
            color: #feca57;
            font-weight: bold;
            text-transform: uppercase;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .card {
            width: 120px;
            height: 120px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .card:active {
            transform: translateY(0);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .overlay p {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 30px;
            text-align: center;
            max-width: 400px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: #000;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .combo {
            font-size: 1.5rem;
            color: #feca57;
            margin-top: 10px;
            font-weight: bold;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }

            .target-card {
                width: 120px;
                height: 120px;
                font-size: 2.5rem;
            }

            .card {
                width: 100px;
                height: 100px;
                font-size: 2rem;
            }

            .stats {
                gap: 20px;
            }

            .stat-value {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-header">
        <h1>⚡ Speed Match Challenge</h1>
        <p class="subtitle">スピード・マッチ・チャレンジ</p>
    </div>

    <div class="stats">
        <div class="stat">
            <div class="stat-value" id="score">0</div>
            <div class="stat-label">スコア</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="combo">0</div>
            <div class="stat-label">コンボ</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="highScore">0</div>
            <div class="stat-label">ハイスコア</div>
        </div>
    </div>

    <div class="timer-bar">
        <div class="timer-fill" id="timerBar"></div>
    </div>

    <div class="game-area">
        <div class="target-card" id="targetCard"></div>
        <div class="instruction" id="instruction">同じ色をタップ！</div>
        <div class="cards-container" id="cardsContainer"></div>
        <div class="combo" id="comboText"></div>
    </div>

    <div class="overlay" id="startOverlay">
        <h2>🎮 Speed Match</h2>
        <p>表示されたターゲットと同じ色や形のカードを素早くタップ！<br><br>正解でスコア獲得、コンボでボーナス！</p>
        <button class="btn" onclick="startGame()">スタート</button>
    </div>

    <div class="overlay hidden" id="gameOverOverlay">
        <h2>ゲームオーバー</h2>
        <p>スコア: <span id="finalScore">0</span></p>
        <button class="btn" onclick="startGame()">もう一度</button>
    </div>

    <script>
        // ゲーム状態
        let score = 0;
        let combo = 0;
        let highScore = parseInt(localStorage.getItem('speedMatchHighScore')) || 0;
        let timeLeft = 60;
        let gameInterval;
        let targetProperty = 'color'; // 'color' または 'shape'

        // 色と形のデータ
        const colors = [
            { name: '赤', bg: 'linear-gradient(135deg, #ff6b6b, #ee5a5a)' },
            { name: '青', bg: 'linear-gradient(135deg, #4ecdc4, #44a08d)' },
            { name: '黄', bg: 'linear-gradient(135deg, #feca57, #ff9f43)' },
            { name: '紫', bg: 'linear-gradient(135deg, #a29bfe, #6c5ce7)' }
        ];

        const shapes = ['●', '■', '▲', '◆'];

        // DOM要素
        const scoreEl = document.getElementById('score');
        const comboEl = document.getElementById('combo');
        const highScoreEl = document.getElementById('highScore');
        const timerBarEl = document.getElementById('timerBar');
        const targetCardEl = document.getElementById('targetCard');
        const instructionEl = document.getElementById('instruction');
        const cardsContainerEl = document.getElementById('cardsContainer');
        const comboTextEl = document.getElementById('comboText');
        const startOverlayEl = document.getElementById('startOverlay');
        const gameOverOverlayEl = document.getElementById('gameOverOverlay');
        const finalScoreEl = document.getElementById('finalScore');

        // 初期化
        highScoreEl.textContent = highScore;

        function startGame() {
            score = 0;
            combo = 0;
            timeLeft = 60;
            updateStats();

            startOverlayEl.classList.add('hidden');
            gameOverOverlayEl.classList.add('hidden');

            generateRound();

            gameInterval = setInterval(() => {
                timeLeft--;
                updateTimer();

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function generateRound() {
            // ターゲットをランダムに選択
            targetProperty = Math.random() > 0.5 ? 'color' : 'shape';

            const targetColor = colors[Math.floor(Math.random() * colors.length)];
            const targetShape = shapes[Math.floor(Math.random() * shapes.length)];

            // ターゲットカードを設定
            targetCardEl.style.background = targetColor.bg;
            targetCardEl.textContent = targetShape;

            // インストラクションを更新
            instructionEl.textContent = targetProperty === 'color' ? '同じ色をタップ！' : '同じ形をタップ！';

            // 選択肢カードを生成
            cardsContainerEl.innerHTML = '';
            const cards = [];

            // 正解カードを追加
            cards.push({
                color: targetColor,
                shape: targetProperty === 'color' ? shapes[Math.floor(Math.random() * shapes.length)] : targetShape,
                isCorrect: true
            });

            // 間違ったカードを追加
            while (cards.length < 4) {
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                const randomShape = shapes[Math.floor(Math.random() * shapes.length)];

                // 正解と重複しないようにチェック
                const isDuplicate = cards.some(card =>
                    card.color.bg === randomColor.bg && card.shape === randomShape
                );

                // 正解と同じプロパティを持つカードを除外
                const isSameProperty = targetProperty === 'color' ?
                    randomColor.bg === targetColor.bg :
                    randomShape === targetShape;

                if (!isDuplicate && !isSameProperty) {
                    cards.push({
                        color: randomColor,
                        shape: randomShape,
                        isCorrect: false
                    });
                }
            }

            // シャッフル
            cards.sort(() => Math.random() - 0.5);

            // カードを描画
            cards.forEach(card => {
                const cardEl = document.createElement('div');
                cardEl.className = 'card';
                cardEl.style.background = card.color.bg;
                cardEl.textContent = card.shape;
                cardEl.onclick = () => selectCard(card.isCorrect);
                cardsContainerEl.appendChild(cardEl);
            });
        }

        function selectCard(isCorrect) {
            if (isCorrect) {
                combo++;
                const baseScore = 100;
                const comboBonus = Math.min(combo * 10, 200);
                const earnedScore = baseScore + comboBonus;
                score += earnedScore;

                if (combo > 1) {
                    comboTextEl.textContent = `🔥 ${combo} コンボ！ +${earnedScore}`;
                }

                updateStats();
                generateRound();
            } else {
                combo = 0;
                comboTextEl.textContent = '❌ ミス！';
                updateStats();
            }
        }

        function updateStats() {
            scoreEl.textContent = score;
            comboEl.textContent = combo;
        }

        function updateTimer() {
            const percentage = (timeLeft / 60) * 100;
            timerBarEl.style.width = percentage + '%';

            if (timeLeft <= 10) {
                timerBarEl.style.background = 'linear-gradient(90deg, #ff4757, #ff6348)';
            }
        }

        function endGame() {
            clearInterval(gameInterval);

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('speedMatchHighScore', highScore);
                highScoreEl.textContent = highScore;
            }

            finalScoreEl.textContent = score;
            gameOverOverlayEl.classList.remove('hidden');
        }
    </script>
</body>
</html>
