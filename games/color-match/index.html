<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Match - カラーマッチ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            letter-spacing: 3px;
        }

        .subtitle {
            color: #a0a0a0;
            font-size: 1rem;
            margin-bottom: 30px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 25px;
            border-radius: 15px;
            color: white;
            flex: 1;
            min-width: 120px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #a0a0a0;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-area {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
        }

        .color-word {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            text-shadow: 0 0 30px currentColor;
        }

        .timer-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.1s linear;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 30px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            font-weight: bold;
            min-width: 150px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        button.correct {
            background: linear-gradient(135deg, #00ff87 0%, #60efff 100%);
        }

        button.wrong {
            background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            z-index: 1000;
            font-size: 0.9rem;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .game-over-content {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
        }

        .game-over h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 4rem;
            font-weight: bold;
            margin: 20px 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .color-word {
                font-size: 2.5rem;
            }

            .buttons {
                flex-direction: column;
                gap: 15px;
            }

            button {
                width: 100%;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🎨 Color Match 🎨</h1>
        <p class="subtitle">色と文字が一致しているかどうかを判定！</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">ハイスコア</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>

        <div class="game-area">
            <div class="timer-bar">
                <div class="timer-fill" id="timerFill"></div>
            </div>

            <div class="color-word" id="colorWord">赤</div>

            <div class="buttons">
                <button id="matchBtn" onclick="answer(true)">⭕ 一致</button>
                <button id="noMatchBtn" onclick="answer(false)">❌ 不一致</button>
            </div>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <div class="game-over-content">
            <h2>ゲームオーバー！</h2>
            <p>最終スコア</p>
            <div class="final-score" id="finalScore">0</div>
            <button onclick="restartGame()">もう一度遊ぶ</button>
        </div>
    </div>

    <script>
        // Game state
        let score = 0;
        let highScore = localStorage.getItem('colorMatchHighScore') || 0;
        let timeLeft = 100;
        let gameInterval;
        let isGameOver = false;
        let currentMatch = false;

        // Color data (Japanese)
        const colors = [
            { name: '赤', color: '#ff0844' },
            { name: '青', color: '#3a7bd5' },
            { name: '緑', color: '#00ff87' },
            { name: '黄', color: '#f6d365' },
            { name: '紫', color: '#764ba2' },
            { name: 'オレンジ', color: '#ff9a9e' },
            { name: 'ピンク', color: '#f093fb' },
            { name: '水色', color: '#00d2ff' }
        ];

        // Initialize
        document.getElementById('highScore').textContent = highScore;

        function generateQuestion() {
            const wordColor = colors[Math.floor(Math.random() * colors.length)];
            const textColor = colors[Math.floor(Math.random() * colors.length)];

            const colorWord = document.getElementById('colorWord');
            colorWord.textContent = wordColor.name;
            colorWord.style.color = textColor.color;

            // Check if word and color match
            currentMatch = (wordColor.name === textColor.name ||
                          (wordColor.name === '赤' && textColor.color === '#ff0844') ||
                          (wordColor.name === '青' && textColor.color === '#3a7bd5') ||
                          (wordColor.name === '緑' && textColor.color === '#00ff87') ||
                          (wordColor.name === '黄' && textColor.color === '#f6d365') ||
                          (wordColor.name === '紫' && textColor.color === '#764ba2') ||
                          (wordColor.name === 'オレンジ' && textColor.color === '#ff9a9e') ||
                          (wordColor.name === 'ピンク' && textColor.color === '#f093fb') ||
                          (wordColor.name === '水色' && textColor.color === '#00d2ff'));

            // Simplified matching logic
            currentMatch = (wordColor === textColor);
        }

        function answer(userAnswer) {
            if (isGameOver) return;

            const matchBtn = document.getElementById('matchBtn');
            const noMatchBtn = document.getElementById('noMatchBtn');

            if (userAnswer === currentMatch) {
                // Correct
                score += 10;
                timeLeft = Math.min(100, timeLeft + 5);
                document.getElementById('score').textContent = score;

                // Visual feedback
                matchBtn.classList.add('correct');
                noMatchBtn.classList.add('correct');
                setTimeout(() => {
                    matchBtn.classList.remove('correct');
                    noMatchBtn.classList.remove('correct');
                }, 200);
            } else {
                // Wrong
                timeLeft -= 10;
                matchBtn.classList.add('wrong');
                noMatchBtn.classList.add('wrong');
                setTimeout(() => {
                    matchBtn.classList.remove('wrong');
                    noMatchBtn.classList.remove('wrong');
                }, 200);
            }

            generateQuestion();
        }

        function startTimer() {
            gameInterval = setInterval(() => {
                if (isGameOver) return;

                timeLeft -= 0.5;
                document.getElementById('timerFill').style.width = timeLeft + '%';

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 50);
        }

        function endGame() {
            isGameOver = true;
            clearInterval(gameInterval);

            // Update high score
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('colorMatchHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }

            // Show game over
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'flex';
        }

        function restartGame() {
            score = 0;
            timeLeft = 100;
            isGameOver = false;
            document.getElementById('score').textContent = score;
            document.getElementById('timerFill').style.width = '100%';
            document.getElementById('gameOver').style.display = 'none';

            generateQuestion();
            startTimer();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Start game
        generateQuestion();
        startTimer();

        // Touch support
        document.getElementById('matchBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            answer(true);
        });

        document.getElementById('noMatchBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            answer(false);
        });
    </script>
</body>
</html>
