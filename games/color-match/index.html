<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Color Match - カラーマッチ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            padding: 20px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .stat {
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #fff;
            font-size: 1.8rem;
            font-weight: bold;
        }

        .target-color {
            width: 200px;
            height: 200px;
            border-radius: 20px;
            margin: 20px auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 4px solid rgba(255,255,255,0.1);
        }

        .target-color.pop {
            animation: pop 0.3s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .question {
            color: #fff;
            font-size: 1.3rem;
            margin: 20px 0;
            font-weight: 500;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .option {
            width: 100%;
            aspect-ratio: 1;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .option:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .option:active {
            transform: translateY(0);
        }

        .timer-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ecdc4, #44a08d);
            transition: width 0.1s linear;
            border-radius: 3px;
        }

        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .game-over.show {
            display: flex;
        }

        .game-over-content {
            text-align: center;
            color: #fff;
            padding: 40px;
        }

        .game-over h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 4rem;
            font-weight: bold;
            margin: 20px 0;
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .restart-btn {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
            box-shadow: 0 5px 20px rgba(78, 205, 196, 0.3);
        }

        .restart-btn:hover {
            transform: scale(1.05);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 100;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="location.href='../index.html'">← ゲーム一覧</button>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>

    <div class="game-container">
        <h1>🎨 Color Match</h1>
        <p class="subtitle">色を記憶して同じ色を選ぼう！</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">ハイスコア</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>

        <div class="timer-bar">
            <div class="timer-fill" id="timerFill"></div>
        </div>

        <div class="target-color" id="targetColor"></div>

        <p class="question" id="question">この色と同じ色を選んで！</p>

        <div class="options" id="options">
            <!-- オプションはJSで生成 -->
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <div class="game-over-content">
            <h2>🎮 ゲームオーバー</h2>
            <p>あなたのスコア</p>
            <div class="final-score" id="finalScore">0</div>
            <button class="restart-btn" onclick="restartGame()">もう一度プレイ</button>
        </div>
    </div>

    <script>
        let score = 0;
        let highScore = parseInt(localStorage.getItem('colorMatchHighScore')) || 0;
        let currentTargetColor = '';
        let timeLeft = 100;
        let gameActive = true;
        let difficulty = 1;

        const targetColorEl = document.getElementById('targetColor');
        const optionsEl = document.getElementById('options');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const timerFillEl = document.getElementById('timerFill');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');

        highScoreEl.textContent = highScore;

        // 色生成関数
        function generateColor(saturation = 70, lightness = 50) {
            const hue = Math.random() * 360;
            return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
        }

        // 類似色生成
        function generateSimilarColor(baseColor, variation = 15) {
            const match = baseColor.match(/hsl\((\d+\.?\d*),\s*(\d+)%,\s*(\d+)%\)/);
            if (!match) return generateColor();

            let h = parseFloat(match[1]) + (Math.random() - 0.5) * variation;
            let s = parseInt(match[2]) + (Math.random() - 0.5) * 20;
            let l = parseInt(match[3]) + (Math.random() - 0.5) * 20;

            h = (h + 360) % 360;
            s = Math.max(30, Math.min(90, s));
            l = Math.max(30, Math.min(70, l));

            return `hsl(${h}, ${s}%, ${l}%)`;
        }

        // 新しいラウンド開始
        function startNewRound() {
            if (!gameActive) return;

            // ターゲット色を生成
            currentTargetColor = generateColor();

            // アニメーション
            targetColorEl.classList.add('pop');
            setTimeout(() => targetColorEl.classList.remove('pop'), 300);

            // オプション生成（正解＋類似色3つ）
            const options = [currentTargetColor];

            for (let i = 0; i < 3; i++) {
                options.push(generateSimilarColor(currentTargetColor, 15 - difficulty));
            }

            // シャッフル
            options.sort(() => Math.random() - 0.5);

            // 表示
            targetColorEl.style.background = currentTargetColor;

            // 少し遅れて色を隠す（難易度によって変化）
            setTimeout(() => {
                if (gameActive) {
                    targetColorEl.style.background = '#2a2a3e';
                }
            }, Math.max(500, 2000 - difficulty * 150));

            // オプションボタン生成
            optionsEl.innerHTML = '';
            options.forEach(color => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.style.background = color;
                btn.onclick = () => checkAnswer(color);
                optionsEl.appendChild(btn);
            });

            // タイマーリセット
            timeLeft = 100;
        }

        // 回答チェック
        function checkAnswer(selectedColor) {
            if (!gameActive) return;

            const isCorrect = selectedColor === currentTargetColor;

            if (isCorrect) {
                score++;
                scoreEl.textContent = score;

                if (score > highScore) {
                    highScore = score;
                    highScoreEl.textContent = highScore;
                    localStorage.setItem('colorMatchHighScore', highScore);
                }

                // 難易度上昇
                if (score % 3 === 0) {
                    difficulty = Math.min(8, difficulty + 0.5);
                }

                startNewRound();
            } else {
                gameOver();
            }
        }

        // タイマー
        function updateTimer() {
            if (!gameActive) return;

            timeLeft -= 0.3;
            timerFillEl.style.width = `${timeLeft}%`;

            if (timeLeft <= 0) {
                gameOver();
            } else {
                requestAnimationFrame(updateTimer);
            }
        }

        // ゲームオーバー
        function gameOver() {
            gameActive = false;
            finalScoreEl.textContent = score;
            gameOverEl.classList.add('show');
        }

        // リスタート
        function restartGame() {
            score = 0;
            difficulty = 1;
            gameActive = true;
            scoreEl.textContent = '0';
            gameOverEl.classList.remove('show');
            startNewRound();
            updateTimer();
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ゲーム開始
        startNewRound();
        updateTimer();
    </script>
</body>
</html>
