<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Color Match Reaction | 心理色ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            overflow: hidden;
        }

        .game-container {
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            color: white;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
        }

        .color-word {
            font-size: 60px;
            font-weight: bold;
            margin: 30px 0;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            transition: transform 0.3s ease;
        }

        .color-word.correct {
            animation: correct 0.3s ease;
        }

        .color-word.wrong {
            animation: wrong 0.3s ease;
        }

        @keyframes correct {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes wrong {
            0%, 25%, 75%, 100% { transform: translateX(0); }
            12.5%, 62.5% { transform: translateX(-10px); }
            37.5%, 87.5% { transform: translateX(10px); }
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        .option {
            padding: 25px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .option:active {
            transform: scale(0.95);
        }

        .option:hover {
            transform: scale(1.05);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: white;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h1 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        .overlay p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .overlay button {
            padding: 20px 40px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .overlay button:active {
            transform: scale(0.95);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            z-index: 50;
        }

        @media (max-width: 480px) {
            .color-word {
                font-size: 40px;
                padding: 20px;
            }

            .option {
                padding: 20px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">残り時間</div>
                <div class="stat-value" id="timer">5:00</div>
            </div>
            <div class="stat">
                <div class="stat-label">連続</div>
                <div class="stat-value" id="combo">0</div>
            </div>
        </div>

        <div class="color-word" id="colorWord"></div>

        <div class="options" id="options"></div>
    </div>

    <div class="overlay" id="startOverlay">
        <h1>🎨 Color Match</h1>
        <p>表示される文字の「色」を選んでください！<br>文字の内容に惑わされないで...</p>
        <button onclick="startGame()">スタート</button>
    </div>

    <div class="overlay hidden" id="endOverlay">
        <h1>🎉 終了！</h1>
        <p>スコア: <span id="finalScore">0</span></p>
        <p>ハイスコア: <span id="highScore">0</span></p>
        <button onclick="startGame()">もう一度</button>
    </div>

    <script>
        const colors = [
            { name: '赤', color: '#ff4444' },
            { name: '青', color: '#4444ff' },
            { name: '緑', color: '#44ff44' },
            { name: '黄', color: '#ffff44' },
            { name: '紫', color: '#ff44ff' },
            { name: '橙', color: '#ff8844' }
        ];

        let score = 0;
        let combo = 0;
        let timeLeft = 300;
        let gameInterval;
        let currentColorIndex;

        const colorWordEl = document.getElementById('colorWord');
        const optionsEl = document.getElementById('options');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const comboEl = document.getElementById('combo');
        const startOverlay = document.getElementById('startOverlay');
        const endOverlay = document.getElementById('endOverlay');
        const finalScoreEl = document.getElementById('finalScore');
        const highScoreEl = document.getElementById('highScore');

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function generateQuestion() {
            const wordIndex = Math.floor(Math.random() * colors.length);
            const colorIndex = Math.floor(Math.random() * colors.length);
            currentColorIndex = colorIndex;

            colorWordEl.textContent = colors[wordIndex].name;
            colorWordEl.style.color = colors[colorIndex].color;
            colorWordEl.className = 'color-word';

            const shuffledOptions = shuffle([...colors]);
            optionsEl.innerHTML = '';

            shuffledOptions.forEach(color => {
                const button = document.createElement('button');
                button.className = 'option';
                button.style.background = color.color;
                button.textContent = color.name;
                button.onclick = () => checkAnswer(colorIndex);
                optionsEl.appendChild(button);
            });
        }

        function checkAnswer(selectedIndex) {
            if (selectedIndex === currentColorIndex) {
                score += 10 + combo * 2;
                combo++;
                colorWordEl.classList.add('correct');
                setTimeout(() => generateQuestion(), 200);
            } else {
                combo = 0;
                colorWordEl.classList.add('wrong');
                setTimeout(() => generateQuestion(), 300);
            }
            updateStats();
        }

        function updateStats() {
            scoreEl.textContent = score;
            comboEl.textContent = combo;

            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerEl.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        function startGame() {
            score = 0;
            combo = 0;
            timeLeft = 300;

            startOverlay.classList.add('hidden');
            endOverlay.classList.add('hidden');

            updateStats();
            generateQuestion();

            gameInterval = setInterval(() => {
                timeLeft--;
                updateStats();

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            clearInterval(gameInterval);

            const highScore = localStorage.getItem('colorMatchHighScore') || 0;
            if (score > highScore) {
                localStorage.setItem('colorMatchHighScore', score);
            }

            finalScoreEl.textContent = score;
            highScoreEl.textContent = Math.max(score, highScore);
            endOverlay.classList.remove('hidden');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
