<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Beacon Chase - Generative Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .ui {
            position: fixed;
            pointer-events: none;
            z-index: 10;
        }

        .score-display {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            font-weight: bold;
            color: #0ff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            letter-spacing: 4px;
        }

        .combo-display {
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            color: #ff0;
            text-shadow: 0 0 10px rgba(255, 255, 0, 0.5);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .combo-display.active {
            opacity: 1;
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 100;
        }

        .game-over.active {
            display: flex;
        }

        .game-over h1 {
            font-size: 36px;
            color: #ff0;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 0, 0.5);
        }

        .game-over .final-score {
            font-size: 72px;
            color: #0ff;
            margin-bottom: 30px;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }

        .game-over .stats {
            font-size: 18px;
            color: #888;
            margin-bottom: 40px;
            text-align: center;
        }

        .game-over .stats div {
            margin: 10px 0;
        }

        .game-over .stats span {
            color: #fff;
        }

        .game-over button {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #000;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            pointer-events: auto;
        }

        .game-over button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }

        .game-over button:active {
            transform: scale(0.95);
        }

        .fullscreen-btn {
            top: 20px;
            right: 20px;
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid #0ff;
            color: #0ff;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            pointer-events: auto;
            transition: background 0.2s;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 212, 255, 0.4);
        }

        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            pointer-events: auto;
        }

        .start-screen.hidden {
            display: none;
        }

        .start-screen h1 {
            font-size: 42px;
            color: #0ff;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            text-align: center;
        }

        .start-screen .subtitle {
            font-size: 18px;
            color: #888;
            margin-bottom: 40px;
        }

        .start-screen .instructions {
            font-size: 14px;
            color: #666;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1.8;
        }

        .start-screen .instructions span {
            color: #0ff;
        }

        .start-screen button {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #000;
            border: none;
            padding: 20px 60px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 24px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .start-screen button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.5);
        }

        @media (max-width: 768px) {
            .score-display {
                font-size: 36px;
                top: 15px;
            }

            .combo-display {
                font-size: 18px;
                top: 60px;
            }

            .game-over h1 {
                font-size: 28px;
            }

            .game-over .final-score {
                font-size: 56px;
            }

            .game-over .stats {
                font-size: 16px;
            }

            .start-screen h1 {
                font-size: 32px;
            }

            .start-screen .instructions {
                font-size: 12px;
                padding: 0 20px;
            }

            .fullscreen-btn {
                display: none;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="ui score-display" id="score">0</div>
    <div class="ui combo-display" id="combo">COMBO x1</div>

    <button class="ui fullscreen-btn" id="fullscreen">⛶ Fullscreen</button>

    <div class="start-screen" id="startScreen">
        <h1>⚡ BEACON CHASE</h1>
        <p class="subtitle">Chase the Light</p>
        <p class="instructions">
            <span>Tap or click</span> the beacons before they fade<br>
            Build <span>combos</span> for bonus points<br>
            Don't let the <span>timer</span> run out!
        </p>
        <button id="startBtn">▶ START</button>
    </div>

    <div class="game-over" id="gameOver">
        <h1>⏰ TIME'S UP!</h1>
        <div class="final-score" id="finalScore">0</div>
        <div class="stats">
            <div>Beacons Caught: <span id="statCaught">0</span></div>
            <div>Max Combo: <span id="statCombo">0</span></div>
            <div>Best Time: <span id="statBest">0.0s</span></div>
        </div>
        <button id="restartBtn">🔄 PLAY AGAIN</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let totalCaught = 0;
        let bestTime = Infinity;
        let gameTime = 30;
        let timeLeft = gameTime;
        let isPlaying = false;
        let lastTime = 0;

        let beacons = [];
        let particles = [];
        let comboTimeout = null;

        class Beacon {
            constructor() {
                this.reset();
            }

            reset() {
                const margin = 80;
                this.x = margin + Math.random() * (width - margin * 2);
                this.y = margin + Math.random() * (height - margin * 2);
                this.maxLife = 2000 + Math.random() * 1500;
                this.life = this.maxLife;
                this.baseRadius = 25 + Math.random() * 20;
                this.hue = Math.random() * 360;
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.points = Math.floor(100 + Math.random() * 100);
            }

            update(dt) {
                this.life -= dt;
                this.pulsePhase += dt * 0.005;
            }

            draw(ctx) {
                const alpha = Math.max(0, this.life / this.maxLife);
                const pulse = Math.sin(this.pulsePhase) * 0.3 + 1;
                const radius = this.baseRadius * pulse;

                // Outer glow
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, radius * 3
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 60%, ${alpha * 0.5})`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 100%, 50%, ${alpha * 0.2})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 100%, 50%, 0)`);

                ctx.beginPath();
                ctx.arc(this.x, this.y, radius * 3, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Inner core
                ctx.beginPath();
                ctx.arc(this.x, this.y, radius * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 80%, ${alpha})`;
                ctx.fill();

                // Ring
                ctx.beginPath();
                ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 100%, 70%, ${alpha})`;
                ctx.lineWidth = 3;
                ctx.stroke();

                // Timer ring
                const timerAngle = (this.life / this.maxLife) * Math.PI * 2;
                ctx.beginPath();
                ctx.arc(this.x, this.y, radius + 5, -Math.PI / 2, -Math.PI / 2 + timerAngle);
                ctx.strokeStyle = `hsla(${this.hue}, 100%, 50%, ${alpha * 0.5})`;
                ctx.lineWidth = 4;
                ctx.stroke();
            }

            contains(x, y) {
                const dx = x - this.x;
                const dy = y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                return distance < this.baseRadius * 1.5;
            }

            isDead() {
                return this.life <= 0;
            }
        }

        class Particle {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1;
                this.hue = hue;
                this.size = Math.random() * 5 + 2;
            }

            update(dt) {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= dt * 0.002;
            }

            draw(ctx) {
                if (this.life <= 0) return;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${this.life})`;
                ctx.fill();
            }

            isDead() {
                return this.life <= 0;
            }
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        function spawnBeacon() {
            if (beacons.length < 5 && Math.random() < 0.03) {
                beacons.push(new Beacon());
            }
        }

        function createExplosion(x, y, hue) {
            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(x, y, hue));
            }
        }

        function handleClick(x, y) {
            if (!isPlaying) return;

            let caught = false;
            for (let i = beacons.length - 1; i >= 0; i--) {
                if (beacons[i].contains(x, y)) {
                    const beacon = beacons[i];
                    const timeBonus = Math.floor((beacon.life / beacon.maxLife) * 50);
                    const comboBonus = combo * 10;
                    const points = beacon.points + timeBonus + comboBonus;

                    score += points;
                    combo++;
                    totalCaught++;

                    if (combo > maxCombo) {
                        maxCombo = combo;
                    }

                    const catchTime = gameTime - timeLeft;
                    if (catchTime < bestTime) {
                        bestTime = catchTime;
                    }

                    createExplosion(beacon.x, beacon.y, beacon.hue);
                    beacons.splice(i, 1);
                    caught = true;

                    // Reset combo timeout
                    clearTimeout(comboTimeout);
                    comboTimeout = setTimeout(() => {
                        combo = 0;
                        updateCombo();
                    }, 2000);

                    updateScore();
                    updateCombo();
                    break;
                }
            }

            if (!caught) {
                combo = 0;
                updateCombo();
            }
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        function updateCombo() {
            const comboDisplay = document.getElementById('combo');
            if (combo > 1) {
                comboDisplay.textContent = `COMBO x${combo}`;
                comboDisplay.classList.add('active');
            } else {
                comboDisplay.classList.remove('active');
            }
        }

        function gameOver() {
            isPlaying = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('statCaught').textContent = totalCaught;
            document.getElementById('statCombo').textContent = maxCombo;
            document.getElementById('statBest').textContent = bestTime === Infinity ? '0.0s' : bestTime.toFixed(1) + 's';
            document.getElementById('gameOver').classList.add('active');
        }

        function startGame() {
            score = 0;
            combo = 0;
            maxCombo = 0;
            totalCaught = 0;
            bestTime = Infinity;
            timeLeft = gameTime;
            beacons = [];
            particles = [];
            isPlaying = true;

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOver').classList.remove('active');
            updateScore();
            updateCombo();

            lastTime = performance.now();
        }

        function update(currentTime) {
            const dt = currentTime - lastTime;
            lastTime = currentTime;

            if (!isPlaying) return;

            // Update timer
            timeLeft -= dt / 1000;
            if (timeLeft <= 0) {
                timeLeft = 0;
                gameOver();
                return;
            }

            // Spawn beacons
            spawnBeacon();

            // Update beacons
            beacons.forEach(beacon => beacon.update(dt));
            beacons = beacons.filter(beacon => !beacon.isDead());

            // Update particles
            particles.forEach(particle => particle.update(dt));
            particles = particles.filter(particle => !particle.isDead());
        }

        function draw() {
            // Clear with trail effect
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // Draw particles
            particles.forEach(particle => particle.draw(ctx));

            // Draw beacons
            beacons.forEach(beacon => beacon.draw(ctx));

            // Draw timer bar
            if (isPlaying) {
                const barWidth = width * 0.8;
                const barHeight = 4;
                const barX = (width - barWidth) / 2;
                const barY = height - 30;
                const progress = timeLeft / gameTime;

                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.fillRect(barX, barY, barWidth, barHeight);

                const gradient = ctx.createLinearGradient(barX, barY, barX + barWidth, barY);
                if (progress > 0.5) {
                    gradient.addColorStop(0, '#0ff');
                    gradient.addColorStop(1, '#00f');
                } else if (progress > 0.2) {
                    gradient.addColorStop(0, '#ff0');
                    gradient.addColorStop(1, '#f00');
                } else {
                    gradient.addColorStop(0, '#f00');
                    gradient.addColorStop(1, '#f00');
                }

                ctx.fillStyle = gradient;
                ctx.fillRect(barX, barY, barWidth * progress, barHeight);
            }
        }

        function gameLoop(currentTime) {
            update(currentTime);
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Event listeners
        window.addEventListener('resize', resize);

        canvas.addEventListener('click', (e) => {
            handleClick(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleClick(touch.clientX, touch.clientY);
        }, { passive: false });

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        document.getElementById('fullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Initialize
        resize();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
