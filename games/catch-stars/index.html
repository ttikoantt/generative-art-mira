<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch the Stars - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #0a0a2e, #1a1a4e);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: none;
        }

        canvas {
            display: block;
        }

        .ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .score-display {
            color: white;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .lives-display {
            color: #ff6b6b;
            font-size: 24px;
        }

        .fullscreen-btn {
            pointer-events: all;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 14px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            color: white;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .overlay p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .overlay button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 10px;
            transition: transform 0.2s;
        }

        .overlay button:hover {
            transform: scale(1.05);
        }

        .final-score {
            font-size: 32px;
            color: #ffd700;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="ui">
        <div class="score-display">⭐ <span id="score">0</span></div>
        <div class="lives-display">❤️ <span id="lives">3</span></div>
        <button class="fullscreen-btn" id="fullscreenBtn">🖥️ 全画面</button>
    </div>

    <div class="overlay" id="startOverlay">
        <h1>⭐ Catch the Stars ⭐</h1>
        <p>タップして落ちてくる星をキャッチ！</p>
        <button id="startBtn">ゲーム開始</button>
    </div>

    <div class="overlay hidden" id="gameOverOverlay">
        <h1>ゲームオーバー</h1>
        <div class="final-score">スコア: <span id="finalScore">0</span></div>
        <button id="restartBtn">もう一度</button>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let score = 0;
        let lives = 3;
        let gameRunning = false;
        let stars = [];
        let particles = [];
        let basketX = 0;
        let basketWidth = 80;
        let basketHeight = 60;
        let spawnRate = 60;
        let spawnTimer = 0;
        let difficulty = 1;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            basketX = width / 2;
        }

        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * (width - 40) + 20;
                this.y = -30;
                this.size = Math.random() * 15 + 15;
                this.speed = (Math.random() * 2 + 2) * difficulty;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.points = Math.floor(this.size);
                this.hue = Math.random() * 60 + 40; // Gold to yellow
            }

            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;

                if (this.y > height + 30) {
                    this.reset();
                    lives--;
                    updateLives();
                    if (lives <= 0) {
                        gameOver();
                    }
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // 星の形
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const angle = (i * Math.PI * 2) / 5 - Math.PI / 2;
                    const x = Math.cos(angle) * this.size;
                    const y = Math.sin(angle) * this.size;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);

                    const innerAngle = angle + Math.PI / 5;
                    const innerX = Math.cos(innerAngle) * (this.size * 0.4);
                    const innerY = Math.sin(innerAngle) * (this.size * 0.4);
                    ctx.lineTo(innerX, innerY);
                }
                ctx.closePath();

                // グラデーション
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 80%, 1)`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 100%, 60%, 0.8)`);
                gradient.addColorStop(1, `hsla(${this.hue}, 100%, 50%, 0.6)`);

                ctx.fillStyle = gradient;
                ctx.fill();

                // グロー効果
                ctx.shadowColor = `hsla(${this.hue}, 100%, 60%, 0.8)`;
                ctx.shadowBlur = 15;
                ctx.fill();

                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.size = Math.random() * 5 + 2;
                this.life = 1;
                this.decay = Math.random() * 0.03 + 0.02;
                this.hue = hue;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2; // 重力
                this.life -= this.decay;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 70%, ${this.life})`;
                ctx.fill();
            }
        }

        function createParticles(x, y, hue, count = 10) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, hue));
            }
        }

        function drawBasket() {
            ctx.save();
            ctx.translate(basketX, height - basketHeight - 10);

            // バスケットの本体
            const gradient = ctx.createLinearGradient(-basketWidth/2, 0, basketWidth/2, basketHeight);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(1, '#764ba2');

            ctx.beginPath();
            ctx.moveTo(-basketWidth/2, 0);
            ctx.lineTo(-basketWidth/3, basketHeight);
            ctx.lineTo(basketWidth/3, basketHeight);
            ctx.lineTo(basketWidth/2, 0);
            ctx.closePath();

            ctx.fillStyle = gradient;
            ctx.fill();

            // バスケットの縁
            ctx.beginPath();
            ctx.ellipse(0, 0, basketWidth/2, 10, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#9d7cd4';
            ctx.fill();

            ctx.restore();
        }

        function checkCollisions() {
            stars.forEach(star => {
                const basketTop = height - basketHeight - 10;
                const basketLeft = basketX - basketWidth/2;
                const basketRight = basketX + basketWidth/2;

                if (star.y + star.size >= basketTop &&
                    star.y - star.size <= basketTop + basketHeight &&
                    star.x >= basketLeft &&
                    star.x <= basketRight) {

                    score += star.points;
                    updateScore();
                    createParticles(star.x, star.y, star.hue, 15);
                    star.reset();

                    // 難易度上昇
                    if (score % 50 === 0) {
                        difficulty += 0.1;
                        spawnRate = Math.max(20, spawnRate - 5);
                    }
                }
            });
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        function updateLives() {
            document.getElementById('lives').textContent = lives;
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        function startGame() {
            score = 0;
            lives = 3;
            difficulty = 1;
            spawnRate = 60;
            gameRunning = true;
            stars = [];
            particles = [];

            // 初期の星を生成
            for (let i = 0; i < 3; i++) {
                const star = new Star();
                star.y = Math.random() * (height / 2);
                stars.push(star);
            }

            updateScore();
            updateLives();

            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);

            // 背景の星
            if (Math.random() < 0.1) {
                particles.push(new Particle(
                    Math.random() * width,
                    -10,
                    Math.random() * 60 + 200,
                    0
                ));
            }

            if (gameRunning) {
                // 星の生成
                spawnTimer++;
                if (spawnTimer >= spawnRate) {
                    spawnTimer = 0;
                    stars.push(new Star());
                }

                // 星の更新と描画
                stars.forEach(star => {
                    star.update();
                    star.draw();
                });

                // パーティクルの更新と描画
                particles = particles.filter(p => p.life > 0);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });

                // 衝突判定
                checkCollisions();

                // バスケットの描画
                drawBasket();
            }

            requestAnimationFrame(animate);
        }

        // Event Listeners
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            basketX = e.clientX;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            basketX = e.touches[0].clientX;
        }, { passive: false });

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Initialize
        resize();
        animate();
    </script>
</body>
</html>
