<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch the Falling Stars</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 100%);
            color: #fff;
            overflow: hidden;
            touch-action: none;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        canvas {
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            box-shadow: 0 0 60px rgba(255, 200, 100, 0.3);
            background: linear-gradient(180deg, #0a0a2a 0%, #1a1a4a 100%);
        }

        .title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.8rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(255, 200, 100, 0.5);
        }

        .score-display {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            color: rgba(255, 200, 100, 0.9);
            font-weight: 600;
            pointer-events: none;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid rgba(255, 200, 100, 0.3);
            backdrop-filter: blur(10px);
            display: none;
        }

        .game-over.show {
            display: block;
        }

        .game-over h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #ff8800;
        }

        .game-over p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.8);
        }

        .game-over .final-score {
            font-size: 3rem;
            color: #ffaa44;
            margin-bottom: 30px;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(255, 200, 100, 0.8);
        }

        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 20px;
        }

        .btn {
            padding: 12px 24px;
            background: rgba(255, 200, 100, 0.2);
            border: 1px solid rgba(255, 200, 100, 0.4);
            color: #fff;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            background: rgba(255, 200, 100, 0.3);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .lives-display {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1rem;
            color: rgba(255, 100, 100, 0.9);
            pointer-events: none;
        }

        .start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid rgba(255, 200, 100, 0.3);
            backdrop-filter: blur(10px);
        }

        .start-screen h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            color: #ffaa44;
        }

        .start-screen .emoji {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .start-screen p {
            font-size: 1rem;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
        }

        .start-btn {
            padding: 15px 40px;
            background: rgba(255, 200, 100, 0.3);
            border: 2px solid rgba(255, 200, 100, 0.5);
            color: #fff;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            background: rgba(255, 200, 100, 0.4);
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            .title {
                font-size: 1.3rem;
                top: 15px;
            }

            .score-display {
                font-size: 1rem;
                top: 55px;
            }

            .lives-display {
                font-size: 0.9rem;
                top: 80px;
            }

            .controls {
                bottom: 20px;
                gap: 10px;
            }

            .btn {
                padding: 10px 18px;
                font-size: 0.8rem;
            }

            .fullscreen-btn {
                width: 45px;
                height: 45px;
                top: 15px;
                right: 15px;
                font-size: 1.2rem;
            }

            .game-over {
                padding: 30px;
            }

            .game-over h2 {
                font-size: 1.5rem;
            }

            .game-over .final-score {
                font-size: 2.5rem;
            }

            .start-screen {
                padding: 30px;
            }

            .start-screen h1 {
                font-size: 1.6rem;
            }

            .start-screen .emoji {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">⭐ Catch the Falling Stars</h1>
        <p class="score-display">Score: <span id="score">0</span></p>
        <p class="lives-display">❤️ <span id="lives">3</span></p>
        <canvas id="canvas"></canvas>

        <div class="start-screen" id="startScreen">
            <div class="emoji">⭐</div>
            <h1>Catch the Stars</h1>
            <p>バスケットを動かして落ちてくる星をキャッチ！<br>タップ・ドラッグで操作</p>
            <button class="start-btn" onclick="startGame()">🚀 Start Game</button>
        </div>

        <div class="game-over" id="gameOver">
            <h2>🎮 Game Over</h2>
            <p>Your Final Score</p>
            <div class="final-score" id="finalScore">0</div>
            <button class="btn" onclick="restartGame()">🔄 Play Again</button>
        </div>

        <div class="controls">
            <button class="btn" onclick="restartGame()">🔄 Restart</button>
        </div>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // キャンバスサイズ設定
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 500);
            const maxHeight = Math.min(window.innerHeight - 250, 700);
            const ratio = 3 / 4;

            let width = maxWidth;
            let height = width / ratio;

            if (height > maxHeight) {
                height = maxHeight;
                width = height * ratio;
            }

            canvas.width = width;
            canvas.height = height;
        }

        resizeCanvas();
        window.addEventListener('resize', () => {
            resizeCanvas();
            initBasket();
        });

        // ゲーム変数
        let score = 0;
        let lives = 3;
        let gameRunning = false;
        let stars = [];
        let particles = [];
        let spawnTimer = 0;
        let spawnInterval = 60;
        let difficulty = 1;

        // バスケット
        const basket = {
            width: 80,
            height: 50,
            x: 0,
            y: 0,
            targetX: 0
        };

        function initBasket() {
            basket.y = canvas.height - 70;
            basket.x = canvas.width / 2 - basket.width / 2;
            basket.targetX = basket.x;
        }

        // 星クラス
        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * (canvas.width - 40) + 20;
                this.y = -30;
                this.size = 15 + Math.random() * 15;
                this.speed = (2 + Math.random() * 3) * difficulty;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.type = Math.random() > 0.9 ? 'bonus' : 'normal';
                this.points = this.type === 'bonus' ? 50 : 10;
            }

            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // 星の形
                ctx.beginPath();
                const spikes = 5;
                const outerRadius = this.size;
                const innerRadius = this.size / 2;

                for (let i = 0; i < spikes * 2; i++) {
                    const radius = i % 2 === 0 ? outerRadius : innerRadius;
                    const angle = (i * Math.PI) / spikes - Math.PI / 2;
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;

                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }

                ctx.closePath();

                // 色設定
                if (this.type === 'bonus') {
                    ctx.fillStyle = '#ff6b6b';
                    ctx.shadowColor = '#ff6b6b';
                } else {
                    ctx.fillStyle = '#ffd700';
                    ctx.shadowColor = '#ffd700';
                }

                ctx.shadowBlur = 15;
                ctx.fill();
                ctx.restore();
            }

            isOffScreen() {
                return this.y > canvas.height + 50;
            }

            collidesWith(basket) {
                return (
                    this.x > basket.x &&
                    this.x < basket.x + basket.width &&
                    this.y + this.size > basket.y &&
                    this.y < basket.y + basket.height
                );
            }
        }

        // パーティクルクラス
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 5 + 2;
                this.speedX = (Math.random() - 0.5) * 8;
                this.speedY = (Math.random() - 0.5) * 8;
                this.color = color;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.02;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= this.decay;
                this.speedY += 0.2; // 重力
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            isDead() {
                return this.alpha <= 0;
            }
        }

        // 星を生成
        function spawnStar() {
            stars.push(new Star());
        }

        // パーティクルを生成
        function createParticles(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        // バスケットを描画
        function drawBasket() {
            // バスケットの本体
            const gradient = ctx.createLinearGradient(basket.x, basket.y, basket.x, basket.y + basket.height);
            gradient.addColorStop(0, 'rgba(139, 90, 43, 0.9)');
            gradient.addColorStop(1, 'rgba(101, 67, 33, 0.9)');

            ctx.fillStyle = gradient;
            ctx.fillRect(basket.x, basket.y, basket.width, basket.height);

            // バスケットの縁
            ctx.strokeStyle = 'rgba(255, 200, 100, 0.6)';
            ctx.lineWidth = 3;
            ctx.strokeRect(basket.x, basket.y, basket.width, basket.height);

            // バスケットの柄
            ctx.fillStyle = 'rgba(255, 200, 100, 0.4)';
            ctx.fillRect(basket.x - 10, basket.y + 10, 10, basket.height - 20);
            ctx.fillRect(basket.x + basket.width, basket.y + 10, 10, basket.height - 20);
        }

        // 背景を描画
        function drawBackground() {
            // グラデーション背景
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a0a2a');
            gradient.addColorStop(1, '#1a1a4a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 星を散りばめる
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            for (let i = 0; i < 50; i++) {
                const x = (i * 37) % canvas.width;
                const y = (i * 23) % canvas.height;
                const size = Math.sin(Date.now() / 1000 + i) * 0.5 + 1;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ゲームループ
        function gameLoop() {
            if (!gameRunning) return;

            // 背景を描画
            drawBackground();

            // スポーン
            spawnTimer++;
            if (spawnTimer >= spawnInterval) {
                spawnStar();
                spawnTimer = 0;

                // 難易度上昇
                if (spawnInterval > 20) {
                    spawnInterval -= 0.5;
                }
                difficulty = 1 + (score / 500);
            }

            // 星を更新
            for (let i = stars.length - 1; i >= 0; i--) {
                const star = stars[i];
                star.update();
                star.draw();

                // 衝突判定
                if (star.collidesWith(basket)) {
                    score += star.points;
                    document.getElementById('score').textContent = score;
                    createParticles(star.x, star.y, star.type === 'bonus' ? '#ff6b6b' : '#ffd700');
                    stars.splice(i, 1);
                    continue;
                }

                // 画面外に出た
                if (star.isOffScreen()) {
                    lives--;
                    document.getElementById('lives').textContent = lives;
                    stars.splice(i, 1);

                    if (lives <= 0) {
                        gameOver();
                        return;
                    }
                }
            }

            // パーティクルを更新
            for (let i = particles.length - 1; i >= 0; i--) {
                const particle = particles[i];
                particle.update();
                particle.draw();

                if (particle.isDead()) {
                    particles.splice(i, 1);
                }
            }

            // バスケットを移動
            basket.x += (basket.targetX - basket.x) * 0.2;
            basket.x = Math.max(0, Math.min(canvas.width - basket.width, basket.x));

            // バスケットを描画
            drawBasket();

            requestAnimationFrame(gameLoop);
        }

        // ゲーム開始
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            resetGame();
            gameRunning = true;
            gameLoop();
        }

        // ゲームオーバー
        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.add('show');
        }

        // リセット
        function resetGame() {
            score = 0;
            lives = 3;
            stars = [];
            particles = [];
            spawnTimer = 0;
            spawnInterval = 60;
            difficulty = 1;

            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('gameOver').classList.remove('show');

            initBasket();
        }

        // 再スタート
        function restartGame() {
            document.getElementById('gameOver').classList.remove('show');
            document.getElementById('startScreen').style.display = 'none';
            resetGame();
            gameRunning = true;
            gameLoop();
        }

        // 入力処理
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            basket.targetX = x - basket.width / 2;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left;
            basket.targetX = x - basket.width / 2;
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left;
            basket.targetX = x - basket.width / 2;
        }, { passive: false });

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        initBasket();
    </script>
</body>
</html>
