<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tile Match 3D | 3Dタイルマッチ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #fff;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            color: #fff;
            font-size: clamp(0.9rem, 3vw, 1.2rem);
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .stat-value {
            font-weight: bold;
            color: #64d2ff;
            font-size: 1.2em;
        }

        .board-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
            perspective: 1000px;
        }

        .board {
            position: absolute;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 3px;
            transform-style: preserve-3d;
            transform: rotateX(10deg);
            transition: transform 0.3s;
        }

        .tile {
            position: relative;
            background: linear-gradient(145deg, #2a2a4a, #1a1a3a);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            cursor: pointer;
            transition: all 0.2s;
            transform-style: preserve-3d;
            box-shadow:
                0 4px 8px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .tile.empty {
            background: rgba(255, 255, 255, 0.05);
            cursor: default;
        }

        .tile.selected {
            transform: translateZ(20px);
            box-shadow:
                0 8px 16px rgba(100, 200, 255, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .tile.matched {
            animation: matchAnim 0.5s forwards;
        }

        @keyframes matchAnim {
            0% {
                transform: scale(1) rotateZ(0deg);
                opacity: 1;
            }
            50% {
                transform: scale(1.2) rotateZ(180deg);
                opacity: 0.8;
            }
            100% {
                transform: scale(0) rotateZ(360deg);
                opacity: 0;
            }
        }

        .tile.hint {
            animation: hintAnim 0.5s ease-in-out infinite;
        }

        @keyframes hintAnim {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 10px rgba(255, 255, 0, 0.5);
            }
            50% {
                transform: scale(1.1);
                box-shadow: 0 0 20px rgba(255, 255, 0, 0.8);
            }
        }

        .tile-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            backface-visibility: hidden;
        }

        .tile-front {
            background: linear-gradient(145deg, #2a2a4a, #1a1a3a);
        }

        .tile-back {
            background: linear-gradient(145deg, #3a3a5a, #2a2a4a);
            transform: rotateY(180deg);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #64d2ff 0%, #4a9eff 100%);
            border: none;
            color: #fff;
            padding: 12px 24px;
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(100, 200, 255, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(100, 200, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #2a2a4a, #1a1a3a);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: #fff;
            max-width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .modal-content h2 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin-bottom: 20px;
            color: #64d2ff;
        }

        .modal-content p {
            font-size: clamp(1rem, 3vw, 1.2rem);
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .game-container {
                padding: 10px;
            }

            .board {
                gap: 2px;
            }

            button {
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎮 Tile Match 3D</h1>

        <div class="stats">
            <div class="stat">
                スコア: <span class="stat-value" id="score">0</span>
            </div>
            <div class="stat">
                移動: <span class="stat-value" id="moves">0</span>
            </div>
            <div class="stat">
                時間: <span class="stat-value" id="timer">0:00</span>
            </div>
        </div>

        <div class="board-container">
            <div class="board" id="board"></div>
        </div>

        <div class="controls">
            <button onclick="newGame()">🔄 新規ゲーム</button>
            <button onclick="showHint()">💡 ヒント</button>
            <button onclick="toggleSound()">🔊 音</button>
        </div>
    </div>

    <div class="modal" id="gameOverModal">
        <div class="modal-content">
            <h2>🎉 クリア！</h2>
            <p>
                スコア: <span id="finalScore">0</span><br>
                移動: <span id="finalMoves">0</span><br>
                時間: <span id="finalTime">0:00</span>
            </p>
            <button onclick="newGame()">🔄 もう一度</button>
        </div>
    </div>

    <script>
        const boardSize = 5;
        const symbols = ['🍎', '🍊', '🍋', '🍇', '🍓', '🍒', '🥝', '🍑', '🍌', '🫐'];

        let board = [];
        let selectedTile = null;
        let score = 0;
        let moves = 0;
        let matches = 0;
        let startTime = null;
        let timerInterval = null;
        let soundEnabled = true;
        let hints = 3;

        function init() {
            newGame();
        }

        function newGame() {
            score = 0;
            moves = 0;
            matches = 0;
            selectedTile = null;
            hints = 3;
            updateStats();

            if (timerInterval) {
                clearInterval(timerInterval);
            }
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);

            document.getElementById('gameOverModal').classList.remove('show');
            generateBoard();
        }

        function generateBoard() {
            // ペアを作成
            const pairsNeeded = Math.floor((boardSize * boardSize) / 2);
            let tiles = [];

            for (let i = 0; i < pairsNeeded; i++) {
                const symbol = symbols[i % symbols.length];
                tiles.push(symbol, symbol);
            }

            // シャッフル
            for (let i = tiles.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
            }

            // ボードに配置
            board = [];
            let index = 0;
            for (let row = 0; row < boardSize; row++) {
                board[row] = [];
                for (let col = 0; col < boardSize; col++) {
                    if (index < tiles.length) {
                        board[row][col] = {
                            symbol: tiles[index],
                            matched: false,
                            element: null
                        };
                    } else {
                        board[row][col] = { symbol: null, matched: true, element: null };
                    }
                    index++;
                }
            }

            renderBoard();
        }

        function renderBoard() {
            const boardElement = document.getElementById('board');
            boardElement.innerHTML = '';

            for (let row = 0; row < boardSize; row++) {
                for (let col = 0; col < boardSize; col++) {
                    const tileData = board[row][col];
                    const tile = document.createElement('div');
                    tile.className = 'tile';

                    if (tileData.matched) {
                        tile.classList.add('empty');
                    } else {
                        tile.textContent = tileData.symbol;
                        tile.onclick = () => selectTile(row, col);
                    }

                    board[row][col].element = tile;
                    boardElement.appendChild(tile);
                }
            }
        }

        function selectTile(row, col) {
            const tileData = board[row][col];
            if (tileData.matched) return;

            const tile = tileData.element;

            if (selectedTile === null) {
                // 最初の選択
                selectedTile = { row, col };
                tile.classList.add('selected');
                playSound('select');
            } else if (selectedTile.row === row && selectedTile.col === col) {
                // 同じタイルをクリック - 選択解除
                tile.classList.remove('selected');
                selectedTile = null;
            } else {
                // 2つ目のタイル
                const prevTile = board[selectedTile.row][selectedTile.col];
                const prevElement = prevTile.element;

                if (prevTile.symbol === tileData.symbol) {
                    // マッチ！
                    prevTile.matched = true;
                    tileData.matched = true;
                    prevElement.classList.add('matched');
                    tile.classList.add('matched');

                    score += 100;
                    moves++;
                    matches++;

                    playSound('match');

                    setTimeout(() => {
                        prevElement.classList.add('empty');
                        prevElement.classList.remove('matched', 'selected');
                        tile.classList.add('empty');
                        tile.classList.remove('matched');

                        if (matches >= Math.floor((boardSize * boardSize) / 2)) {
                            gameOver();
                        }
                    }, 500);
                } else {
                    // マッチ失敗
                    prevElement.classList.add('shake');
                    tile.classList.add('shake');
                    moves++;
                    playSound('wrong');

                    setTimeout(() => {
                        prevElement.classList.remove('selected', 'shake');
                        tile.classList.remove('shake');
                    }, 300);
                }

                selectedTile = null;
                updateStats();
            }
        }

        function showHint() {
            if (hints <= 0) return;

            // 未マッチのタイルを探す
            const unmatched = [];
            for (let row = 0; row < boardSize; row++) {
                for (let col = 0; col < boardSize; col++) {
                    if (!board[row][col].matched) {
                        unmatched.push({ row, col, symbol: board[row][col].symbol });
                    }
                }
            }

            // ペアを探す
            for (let i = 0; i < unmatched.length; i++) {
                for (let j = i + 1; j < unmatched.length; j++) {
                    if (unmatched[i].symbol === unmatched[j].symbol) {
                        // ヒントを表示
                        const tile1 = board[unmatched[i].row][unmatched[i].col].element;
                        const tile2 = board[unmatched[j].row][unmatched[j].col].element;
                        tile1.classList.add('hint');
                        tile2.classList.add('hint');

                        setTimeout(() => {
                            tile1.classList.remove('hint');
                            tile2.classList.remove('hint');
                        }, 2000);

                        hints--;
                        return;
                    }
                }
            }
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('moves').textContent = moves;
        }

        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            document.getElementById('timer').textContent =
                `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        function gameOver() {
            clearInterval(timerInterval);
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;

            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('finalTime').textContent =
                `${minutes}:${seconds.toString().padStart(2, '0')}`;
            document.getElementById('gameOverModal').classList.add('show');

            playSound('win');
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
        }

        function playSound(type) {
            if (!soundEnabled) return;

            // Web Audio APIでシンプルな音を生成
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            const sounds = {
                select: { freq: 800, duration: 0.1 },
                match: { freq: 1200, duration: 0.2 },
                wrong: { freq: 200, duration: 0.3 },
                win: { freq: 1000, duration: 0.5 }
            };

            const sound = sounds[type] || { freq: 440, duration: 0.1 };

            oscillator.frequency.value = sound.freq;
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(
                0.01,
                audioContext.currentTime + sound.duration
            );

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + sound.duration);
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                newGame();
            } else if (e.key === 'h' || e.key === 'H') {
                showHint();
            }
        });

        // 初期化
        init();
    </script>
</body>
</html>
