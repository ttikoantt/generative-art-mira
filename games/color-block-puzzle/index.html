<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Block Puzzle - 色ブロックパズル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #fff;
            padding: 10px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #f472b6, #7c3aed, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .score-display {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #00d4ff;
        }

        .description {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 10px;
            text-align: center;
            max-width: 400px;
        }

        #game-board {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
        }

        .block {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            user-select: none;
        }

        .block:hover {
            transform: scale(1.1);
            z-index: 1;
        }

        .block:active {
            transform: scale(0.95);
        }

        .block.selected {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            animation: pulse 0.3s ease;
        }

        .block.removing {
            animation: remove 0.4s ease forwards;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @keyframes remove {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            font-size: 0.9rem;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border: none;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #f472b6, #7c3aed);
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .game-over.show {
            opacity: 1;
            pointer-events: all;
        }

        .game-over h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #f472b6, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-over p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.2rem;
            }

            .score-display {
                font-size: 1rem;
            }

            .description {
                font-size: 0.75rem;
            }

            #game-board {
                gap: 4px;
                padding: 10px;
            }

            .block {
                width: 42px;
                height: 42px;
                font-size: 0.8rem;
            }

            button {
                padding: 8px 16px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <h1>🧩 Color Block Puzzle</h1>
    <div class="score-display">スコア: <span id="score">0</span></div>
    <p class="description">同じ色のブロックを3個以上選んで消そう！</p>

    <div id="game-board"></div>

    <div class="controls">
        <button onclick="resetGame()">リセット</button>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    </div>

    <div class="game-over" id="game-over">
        <h2>🎉 ゲームオーバー</h2>
        <p>最終スコア: <span id="final-score">0</span></p>
        <button onclick="resetGame()">もう一度プレイ</button>
    </div>

    <script>
        const BOARD_SIZE = 6;
        const COLORS = [
            { bg: 'linear-gradient(135deg, #f472b6, #ec4899)', text: '#fff', name: 'pink' },
            { bg: 'linear-gradient(135deg, #7c3aed, #8b5cf6)', text: '#fff', name: 'purple' },
            { bg: 'linear-gradient(135deg, #00d4ff, #0ea5e9)', text: '#fff', name: 'blue' },
            { bg: 'linear-gradient(135deg, #22c55e, #16a34a)', text: '#fff', name: 'green' },
            { bg: 'linear-gradient(135deg, #fbbf24, #f59e0b)', text: '#000', name: 'yellow' },
            { bg: 'linear-gradient(135deg, #f97316, #ea580c)', text: '#fff', name: 'orange' }
        ];

        let board = [];
        let score = 0;
        let selectedBlocks = [];
        let isProcessing = false;

        const gameBoard = document.getElementById('game-board');
        const scoreDisplay = document.getElementById('score');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreDisplay = document.getElementById('final-score');

        function initBoard() {
            board = [];
            for (let row = 0; row < BOARD_SIZE; row++) {
                board[row] = [];
                for (let col = 0; col < BOARD_SIZE; col++) {
                    board[row][col] = Math.floor(Math.random() * COLORS.length);
                }
            }
            score = 0;
            updateScore();
            renderBoard();
        }

        function renderBoard() {
            gameBoard.innerHTML = '';
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    const block = document.createElement('div');
                    block.className = 'block';
                    block.dataset.row = row;
                    block.dataset.col = col;

                    if (board[row][col] !== null) {
                        const colorIndex = board[row][col];
                        const color = COLORS[colorIndex];
                        block.style.background = color.bg;
                        block.style.color = color.text;
                        block.textContent = '●';
                        block.addEventListener('click', () => handleBlockClick(row, col));
                        block.addEventListener('touchstart', (e) => {
                            e.preventDefault();
                            handleBlockClick(row, col);
                        });
                    } else {
                        block.style.background = 'transparent';
                        block.style.opacity = '0.3';
                    }

                    gameBoard.appendChild(block);
                }
            }
        }

        function handleBlockClick(row, col) {
            if (isProcessing || board[row][col] === null) return;

            const colorIndex = board[row][col];
            const connected = findConnectedBlocks(row, col, colorIndex);

            if (connected.length >= 3) {
                removeBlocks(connected);
            } else {
                // 足りない場合はフィードバック
                const blocks = document.querySelectorAll('.block');
                connected.forEach(({ row: r, col: c }) => {
                    const index = r * BOARD_SIZE + c;
                    const block = blocks[index];
                    block.classList.add('selected');
                    setTimeout(() => block.classList.remove('selected'), 300);
                });
            }
        }

        function findConnectedBlocks(row, col, colorIndex, visited = new Set()) {
            const key = `${row},${col}`;
            if (visited.has(key)) return [];
            if (row < 0 || row >= BOARD_SIZE || col < 0 || col >= BOARD_SIZE) return [];
            if (board[row][col] !== colorIndex) return [];

            visited.add(key);
            const connected = [{ row, col }];

            // 4方向チェック
            const directions = [
                [-1, 0], [1, 0], [0, -1], [0, 1]
            ];

            directions.forEach(([dr, dc]) => {
                const result = findConnectedBlocks(row + dr, col + dc, colorIndex, visited);
                connected.push(...result);
            });

            return connected;
        }

        function removeBlocks(blocks) {
            isProcessing = true;

            // アニメーション用にクラス追加
            const domBlocks = document.querySelectorAll('.block');
            blocks.forEach(({ row, col }) => {
                const index = row * BOARD_SIZE + col;
                domBlocks[index].classList.add('removing');
            });

            setTimeout(() => {
                // スコア計算（消した数の2乗）
                const points = blocks.length * blocks.length * 10;
                score += points;
                updateScore();

                // ブロックを削除
                blocks.forEach(({ row, col }) => {
                    board[row][col] = null;
                });

                // ブロックを落とす
                dropBlocks();

                // 左に詰める
                shiftLeft();

                // 再描画
                renderBoard();

                // ゲームオーバーチェック
                checkGameOver();

                isProcessing = false;
            }, 400);
        }

        function dropBlocks() {
            for (let col = 0; col < BOARD_SIZE; col++) {
                let emptyRow = BOARD_SIZE - 1;
                for (let row = BOARD_SIZE - 1; row >= 0; row--) {
                    if (board[row][col] !== null) {
                        if (row !== emptyRow) {
                            board[emptyRow][col] = board[row][col];
                            board[row][col] = null;
                        }
                        emptyRow--;
                    }
                }
            }
        }

        function shiftLeft() {
            for (let row = 0; row < BOARD_SIZE; row++) {
                let emptyCol = 0;
                for (let col = 0; col < BOARD_SIZE; col++) {
                    if (board[row][col] !== null) {
                        if (col !== emptyCol) {
                            board[row][emptyCol] = board[row][col];
                            board[row][col] = null;
                        }
                        emptyCol++;
                    }
                }
            }
        }

        function checkGameOver() {
            // まだ消せるブロックがあるかチェック
            let hasValidMove = false;

            for (let row = 0; row < BOARD_SIZE && !hasValidMove; row++) {
                for (let col = 0; col < BOARD_SIZE && !hasValidMove; col++) {
                    if (board[row][col] !== null) {
                        const colorIndex = board[row][col];
                        const connected = findConnectedBlocks(row, col, colorIndex);
                        if (connected.length >= 3) {
                            hasValidMove = true;
                        }
                    }
                }
            }

            if (!hasValidMove) {
                setTimeout(() => {
                    finalScoreDisplay.textContent = score;
                    gameOverScreen.classList.add('show');
                }, 500);
            }
        }

        function updateScore() {
            scoreDisplay.textContent = score;
        }

        function resetGame() {
            gameOverScreen.classList.remove('show');
            initBoard();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ゲーム開始
        initBoard();
    </script>
</body>
</html>
