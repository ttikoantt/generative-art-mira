<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cosmic Pop | ミラのゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0c0c1e 0%, #1a1a3e 50%, #0c0c1e 100%);
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        #gameCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .ui {
            position: fixed;
            z-index: 10;
            pointer-events: none;
        }

        .score {
            top: 20px;
            left: 20px;
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }

        .timer {
            top: 20px;
            right: 20px;
            font-size: 2rem;
            font-weight: bold;
            color: #ff6b6b;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.8);
        }

        .combo {
            top: 70px;
            left: 20px;
            font-size: 1.5rem;
            color: #feca57;
            text-shadow: 0 0 15px rgba(254, 202, 87, 0.8);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .combo.active {
            opacity: 1;
        }

        .start-screen, .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(12, 12, 30, 0.95);
            z-index: 100;
            pointer-events: all;
        }

        .game-over-screen {
            display: none;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient 3s ease infinite;
            background-size: 200% 200%;
        }

        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: #888;
            margin-bottom: 40px;
        }

        .btn {
            padding: 20px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            margin: 10px;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .final-score {
            font-size: 4rem;
            font-weight: bold;
            margin: 30px 0;
            color: #feca57;
            text-shadow: 0 0 30px rgba(254, 202, 87, 0.8);
        }

        .stats {
            display: flex;
            gap: 30px;
            margin: 20px 0;
            font-size: 1.2rem;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #48dbfb;
        }

        .stat-label {
            color: #888;
            font-size: 0.9rem;
        }

        .difficulty {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }

        .difficulty-btn {
            padding: 15px 30px;
            font-size: 1rem;
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .difficulty-btn:hover, .difficulty-btn.active {
            background: rgba(255, 255, 255, 0.2);
            border-color: #fff;
            transform: scale(1.05);
        }

        .instructions {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            max-width: 400px;
            text-align: center;
        }

        .instructions p {
            margin: 10px 0;
            color: #aaa;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        @media (max-width: 768px) {
            .score, .timer {
                font-size: 1.5rem;
            }

            .combo {
                font-size: 1.2rem;
            }

            h1 {
                margin-bottom: 10px;
            }

            .btn {
                padding: 15px 40px;
                font-size: 1.2rem;
            }

            .stats {
                flex-direction: column;
                gap: 15px;
            }
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.3);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s ease;
            pointer-events: all;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <canvas id="particles" class="particles"></canvas>

    <div class="ui score">スコア: <span id="score">0</span></div>
    <div class="ui timer">残り: <span id="timer">30</span>秒</div>
    <div class="ui combo" id="combo">コンボ x<span id="comboCount">0</span>!</div>

    <div class="start-screen" id="startScreen">
        <h1>🌌 Cosmic Pop</h1>
        <p class="subtitle">宇宙の泡を割ってスコアを稼げ！</p>

        <div class="difficulty">
            <button class="difficulty-btn active" data-difficulty="easy">かんたん</button>
            <button class="difficulty-btn" data-difficulty="normal">ふつう</button>
            <button class="difficulty-btn" data-difficulty="hard">むずかしい</button>
        </div>

        <button class="btn" onclick="startGame()">🚀 スタート</button>

        <div class="instructions">
            <p>🎯 泡をタップして割る</p>
            <p>⚡ 連続で割るとコンボボーナス</p>
            <p>💎 レアな泡は高得点</p>
            <p>⏱️ 30秒でハイスコア目指せ！</p>
        </div>
    </div>

    <div class="game-over-screen" id="gameOverScreen">
        <h1>🎉 ゲームオーバー！</h1>
        <div class="final-score" id="finalScore">0</div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="maxCombo">0</div>
                <div class="stat-label">最大コンボ</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="bubblesPopped">0</div>
                <div class="stat-label">割った数</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="accuracy">0%</div>
                <div class="stat-label">命中率</div>
            </div>
        </div>

        <button class="btn" onclick="restartGame()">🔄 もう一度</button>
        <button class="btn" onclick="backToTitle()">🏠 タイトルへ</button>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const particlesCanvas = document.getElementById('particles');
        const particlesCtx = particlesCanvas.getContext('2d');

        let bubbles = [];
        let particles = [];
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let timeLeft = 30;
        let gameRunning = false;
        let bubblesPopped = 0;
        let totalClicks = 0;
        let gameLoop;
        let timerLoop;
        let spawnRate = 1000;
        let bubbleSpeed = 1;
        let difficulty = 'easy';

        // キャンバスサイズ
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particlesCanvas.width = window.innerWidth;
            particlesCanvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 難易度設定
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                difficulty = btn.dataset.difficulty;

                switch(difficulty) {
                    case 'easy':
                        spawnRate = 1000;
                        bubbleSpeed = 1;
                        break;
                    case 'normal':
                        spawnRate = 700;
                        bubbleSpeed = 1.5;
                        break;
                    case 'hard':
                        spawnRate = 500;
                        bubbleSpeed = 2;
                        break;
                }
            });
        });

        // 泡クラス
        class Bubble {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 50;
                this.radius = 30 + Math.random() * 30;
                this.speed = bubbleSpeed * (0.5 + Math.random() * 0.5);
                this.type = this.getType();
                this.alpha = 0;
                this.maxAlpha = 0.6 + Math.random() * 0.3;
                this.popping = false;
                this.popProgress = 0;
            }

            getType() {
                const rand = Math.random();
                if (rand < 0.05) return 'rare';
                if (rand < 0.15) return 'gold';
                if (rand < 0.30) return 'fast';
                return 'normal';
            }

            getPoints() {
                const basePoints = Math.floor(this.radius);
                const comboBonus = Math.floor(combo * 5);
                switch(this.type) {
                    case 'rare': return basePoints * 10 + comboBonus;
                    case 'gold': return basePoints * 5 + comboBonus;
                    case 'fast': return basePoints * 2 + comboBonus;
                    default: return basePoints + comboBonus;
                }
            }

            getColor() {
                switch(this.type) {
                    case 'rare': return { r: 255, g: 0, b: 255 };
                    case 'gold': return { r: 255, g: 215, b: 0 };
                    case 'fast': return { r: 255, g: 100, b: 100 };
                    default: return { r: 100, g: 200, b: 255 };
                }
            }

            update() {
                if (this.popping) {
                    this.popProgress += 0.1;
                    this.alpha -= 0.1;
                    return this.popProgress < 1;
                }

                this.y -= this.speed;
                if (this.alpha < this.maxAlpha) {
                    this.alpha += 0.05;
                }
                return this.y + this.radius > -50;
            }

            draw() {
                const color = this.getColor();
                const currentRadius = this.popping ? this.radius * (1 + this.popProgress) : this.radius;

                // グラデーション
                const gradient = ctx.createRadialGradient(
                    this.x - currentRadius * 0.3,
                    this.y - currentRadius * 0.3,
                    0,
                    this.x,
                    this.y,
                    currentRadius
                );

                gradient.addColorStop(0, `rgba(255, 255, 255, ${this.alpha * 0.8})`);
                gradient.addColorStop(0.5, `rgba(${color.r}, ${color.g}, ${color.b}, ${this.alpha * 0.5})`);
                gradient.addColorStop(1, `rgba(${color.r}, ${color.g}, ${color.b}, ${this.alpha * 0.1})`);

                ctx.beginPath();
                ctx.arc(this.x, this.y, currentRadius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // キラキラエフェクト
                if (!this.popping && Math.random() < 0.1) {
                    ctx.beginPath();
                    const sparkleX = this.x + (Math.random() - 0.5) * currentRadius;
                    const sparkleY = this.y + (Math.random() - 0.5) * currentRadius;
                    ctx.arc(sparkleX, sparkleY, 2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                    ctx.fill();
                }
            }

            contains(x, y) {
                const dx = x - this.x;
                const dy = y - this.y;
                return dx * dx + dy * dy < this.radius * this.radius;
            }

            pop() {
                this.popping = true;
                createPopParticles(this.x, this.y, this.getColor());
            }
        }

        // パーティクルクラス
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.radius = 2 + Math.random() * 3;
                this.color = color;
                this.alpha = 1;
                this.decay = 0.02 + Math.random() * 0.02;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2;
                this.alpha -= this.decay;
                return this.alpha > 0;
            }

            draw() {
                particlesCtx.beginPath();
                particlesCtx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                particlesCtx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha})`;
                particlesCtx.fill();
            }
        }

        function createPopParticles(x, y, color) {
            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function spawnBubble() {
            if (!gameRunning) return;
            bubbles.push(new Bubble());
        }

        function handleInput(x, y) {
            if (!gameRunning) return;

            totalClicks++;
            let hit = false;

            for (let i = bubbles.length - 1; i >= 0; i--) {
                if (bubbles[i].contains(x, y) && !bubbles[i].popping) {
                    const bubble = bubbles[i];
                    bubble.pop();
                    score += bubble.getPoints();
                    combo++;
                    maxCombo = Math.max(maxCombo, combo);
                    bubblesPopped++;
                    hit = true;

                    updateUI();
                    break;
                }
            }

            if (!hit) {
                combo = 0;
                updateUI();
            }
        }

        canvas.addEventListener('click', (e) => {
            handleInput(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let touch of e.touches) {
                handleInput(touch.clientX, touch.clientY);
            }
        });

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('timer').textContent = timeLeft;
            document.getElementById('comboCount').textContent = combo;

            const comboEl = document.getElementById('combo');
            if (combo > 1) {
                comboEl.classList.add('active');
                comboEl.style.transform = `scale(${1 + Math.min(combo * 0.05, 0.5)})`;
            } else {
                comboEl.classList.remove('active');
            }
        }

        function gameUpdate() {
            // 背景クリア
            ctx.fillStyle = 'rgba(12, 12, 30, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 背景の星
            if (Math.random() < 0.1) {
                ctx.beginPath();
                ctx.arc(
                    Math.random() * canvas.width,
                    Math.random() * canvas.height,
                    1,
                    0,
                    Math.PI * 2
                );
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.5})`;
                ctx.fill();
            }

            // 泡を更新・描画
            bubbles = bubbles.filter(bubble => {
                const alive = bubble.update();
                if (alive) bubble.draw();
                return alive;
            });

            // パーティクルを更新・描画
            particlesCtx.clearRect(0, 0, particlesCanvas.width, particlesCanvas.height);
            particles = particles.filter(particle => {
                const alive = particle.update();
                if (alive) particle.draw();
                return alive;
            });

            if (gameRunning) {
                requestAnimationFrame(gameUpdate);
            }
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';

            // リセット
            bubbles = [];
            particles = [];
            score = 0;
            combo = 0;
            maxCombo = 0;
            timeLeft = 30;
            bubblesPopped = 0;
            totalClicks = 0;
            gameRunning = true;

            updateUI();

            // ゲームループ開始
            gameUpdate();

            // 泡のスポーン
            spawnBubble();
            const spawnInterval = setInterval(() => {
                if (!gameRunning) {
                    clearInterval(spawnInterval);
                    return;
                }
                spawnBubble();
            }, spawnRate);

            // タイマー
            timerLoop = setInterval(() => {
                timeLeft--;
                updateUI();

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameRunning = false;
            clearInterval(timerLoop);

            document.getElementById('finalScore').textContent = score;
            document.getElementById('maxCombo').textContent = maxCombo;
            document.getElementById('bubblesPopped').textContent = bubblesPopped;
            document.getElementById('accuracy').textContent = totalClicks > 0 
                ? Math.round((bubblesPopped / totalClicks) * 100) + '%' 
                : '0%';

            setTimeout(() => {
                document.getElementById('gameOverScreen').style.display = 'flex';
            }, 500);
        }

        function restartGame() {
            startGame();
        }

        function backToTitle() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期背景
        function drawInitialBackground() {
            ctx.fillStyle = '#0c0c1e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < 100; i++) {
                ctx.beginPath();
                ctx.arc(
                    Math.random() * canvas.width,
                    Math.random() * canvas.height,
                    Math.random() * 2,
                    0,
                    Math.PI * 2
                );
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.5})`;
                ctx.fill();
            }
        }

        drawInitialBackground();
    </script>
</body>
</html>
