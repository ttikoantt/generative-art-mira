<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cosmic Pop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: manipulation;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .orb {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            user-select: none;
            animation: float 2s ease-in-out infinite;
        }

        .orb:active {
            transform: scale(0.9);
        }

        .orb.normal {
            background: radial-gradient(circle at 30% 30%, #ffd700, #ff8c00);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .orb.special {
            background: radial-gradient(circle at 30% 30%, #ff69b4, #ff1493);
            box-shadow: 0 0 25px rgba(255, 105, 180, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .orb.bomb {
            background: radial-gradient(circle at 30% 30%, #ff4444, #cc0000);
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.6), inset 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .orb.time {
            background: radial-gradient(circle at 30% 30%, #00ffff, #0099ff);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.3);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .pop {
            animation: pop 0.3s ease-out forwards;
        }

        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); }
            100% { transform: scale(0); opacity: 0; }
        }

        .score-popup {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            animation: scoreUp 0.8s ease-out forwards;
            text-shadow: 0 0 10px currentColor;
        }

        @keyframes scoreUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
        }

        .hud {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 30px;
            border-radius: 15px;
            color: white;
            font-size: 18px;
            z-index: 100;
            border: 2px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            gap: 30px;
        }

        .hud-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hud-label {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .hud-value {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px currentColor;
        }

        .score-value { color: #ffd700; }
        .time-value { color: #00ffff; }
        .combo-value { color: #ff69b4; }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            backdrop-filter: blur(10px);
        }

        .overlay h1 {
            font-size: 48px;
            color: #ffd700;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
        }

        .overlay p {
            color: white;
            font-size: 18px;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .overlay .final-score {
            font-size: 36px;
            color: #00ffff;
            margin: 20px 0;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
        }

        .overlay button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .overlay button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        .overlay button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            z-index: 100;
            font-size: 14px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .orb {
                width: 60px;
                height: 60px;
                font-size: 25px;
            }

            .hud {
                padding: 10px 20px;
                font-size: 14px;
                gap: 15px;
            }

            .hud-value {
                font-size: 18px;
            }

            .overlay h1 {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="stars" id="stars"></div>

        <div class="hud">
            <div class="hud-item">
                <div class="hud-label">SCORE</div>
                <div class="hud-value score-value" id="score">0</div>
            </div>
            <div class="hud-item">
                <div class="hud-label">TIME</div>
                <div class="hud-value time-value" id="timer">30</div>
            </div>
            <div class="hud-item">
                <div class="hud-label">COMBO</div>
                <div class="hud-value combo-value" id="combo">0</div>
            </div>
        </div>

        <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

        <div class="overlay" id="startOverlay">
            <h1>🌌 Cosmic Pop</h1>
            <p>Tap the orbs to score points!</p>
            <p>🌟 Normal: +10pts | 💎 Special: +50pts</p>
            <p>⏰ Time: +5sec | 💣 Bomb: -100pts</p>
            <p>Build combos for bonus points!</p>
            <button onclick="startGame()">START GAME</button>
        </div>

        <div class="overlay hidden" id="gameOverOverlay">
            <h1>GAME OVER</h1>
            <div class="final-score" id="finalScore">Score: 0</div>
            <p id="finalStats"></p>
            <button onclick="startGame()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        let score = 0;
        let timeLeft = 30;
        let combo = 0;
        let gameRunning = false;
        let gameLoop;
        let spawnLoop;
        let orbs = [];

        const container = document.getElementById('gameContainer');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const comboDisplay = document.getElementById('combo');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');

        // 星を生成
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
        }

        // Orbを生成
        function spawnOrb() {
            if (!gameRunning) return;

            const orb = document.createElement('div');
            orb.className = 'orb';

            // ランダムなタイプ
            const rand = Math.random();
            let type, emoji, points;

            if (rand < 0.7) {
                type = 'normal';
                emoji = '🌟';
                points = 10;
            } else if (rand < 0.85) {
                type = 'special';
                emoji = '💎';
                points = 50;
            } else if (rand < 0.95) {
                type = 'time';
                emoji = '⏰';
                points = 0;
            } else {
                type = 'bomb';
                emoji = '💣';
                points = -100;
            }

            orb.classList.add(type);
            orb.innerHTML = emoji;
            orb.dataset.type = type;
            orb.dataset.points = points;

            // 位置（端を避ける）
            const maxX = window.innerWidth - 80;
            const maxY = window.innerHeight - 80;
            orb.style.left = (Math.random() * (maxX - 40) + 40) + 'px';
            orb.style.top = (Math.random() * (maxY - 40) + 40) + 'px';

            // クリック/タッチイベント
            const handleTap = (e) => {
                e.preventDefault();
                popOrb(orb, e.clientX || e.touches[0].clientX, e.clientY || e.touches[0].clientY);
            };

            orb.addEventListener('mousedown', handleTap);
            orb.addEventListener('touchstart', handleTap);

            container.appendChild(orb);
            orbs.push(orb);

            // 自動消去
            setTimeout(() => {
                if (orb.parentNode && !orb.classList.contains('pop')) {
                    combo = 0;
                    updateHUD();
                    orb.remove();
                    orbs = orbs.filter(o => o !== orb);
                }
            }, 2000);
        }

        function popOrb(orb, x, y) {
            if (!gameRunning || orb.classList.contains('pop')) return;

            orb.classList.add('pop');

            const type = orb.dataset.type;
            const points = parseInt(orb.dataset.points);

            // スコア計算
            let earnedPoints = points;
            if (type !== 'bomb' && type !== 'time') {
                combo++;
                earnedPoints += Math.floor(combo / 5) * 5; // コンボボーナス
            } else if (type === 'bomb') {
                combo = 0;
            } else if (type === 'time') {
                timeLeft += 5;
            }

            score += earnedPoints;
            updateHUD();

            // スコアポップアップ
            showScorePopup(x, y, earnedPoints, type);

            setTimeout(() => {
                orb.remove();
                orbs = orbs.filter(o => o !== orb);
            }, 300);
        }

        function showScorePopup(x, y, points, type) {
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.textContent = (points >= 0 ? '+' : '') + points;
            popup.style.left = x + 'px';
            popup.style.top = y + 'px';

            if (type === 'bomb') {
                popup.style.color = '#ff4444';
            } else if (type === 'special') {
                popup.style.color = '#ff69b4';
            } else if (type === 'time') {
                popup.style.color = '#00ffff';
            } else {
                popup.style.color = '#ffd700';
            }

            container.appendChild(popup);
            setTimeout(() => popup.remove(), 800);
        }

        function updateHUD() {
            scoreDisplay.textContent = score;
            timerDisplay.textContent = timeLeft;
            comboDisplay.textContent = combo;
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            combo = 0;
            gameRunning = true;
            orbs = [];

            // 既存のorbを削除
            document.querySelectorAll('.orb').forEach(o => o.remove());
            document.querySelectorAll('.score-popup').forEach(p => p.remove());

            updateHUD();
            startOverlay.classList.add('hidden');
            gameOverOverlay.classList.add('hidden');

            // ゲームループ
            gameLoop = setInterval(() => {
                timeLeft--;
                updateHUD();

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // スポーンループ
            spawnLoop = setInterval(spawnOrb, 600);
        }

        function endGame() {
            gameRunning = false;
            clearInterval(gameLoop);
            clearInterval(spawnLoop);

            // 残りのorbを削除
            orbs.forEach(orb => orb.remove());
            orbs = [];

            document.getElementById('finalScore').textContent = 'Score: ' + score;
            document.getElementById('finalStats').textContent =
                `Max Combo: ${combo} | Time Bonus: ${timeLeft * 10}`;

            gameOverOverlay.classList.remove('hidden');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        createStars();
    </script>
</body>
</html>
