<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timing Reflex Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 500px;
        }

        .title {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 1.5rem;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px 25px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #4ecca3;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .reaction-area {
            width: 100%;
            height: 300px;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .reaction-area.waiting {
            background: linear-gradient(135deg, #e94560 0%, #c23a51 100%);
        }

        .reaction-area.ready {
            background: linear-gradient(135deg, #4ecca3 0%, #3db892 100%);
        }

        .reaction-area.early {
            background: linear-gradient(135deg, #ff9f43 0%, #ee8c2e 100%);
        }

        .reaction-area.result {
            background: linear-gradient(135deg, #54a0ff 0%, #2e86de 100%);
        }

        .message {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 600;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .time-display {
            color: #fff;
            font-size: 3rem;
            font-weight: 700;
        }

        .button {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .button:active {
            transform: scale(0.95);
        }

        .hidden {
            display: none;
        }

        .highscore {
            color: #ffd700;
            font-size: 1rem;
            margin-top: 10px;
        }

        @media (max-width: 480px) {
            .title {
                font-size: 1.5rem;
            }

            .reaction-area {
                height: 250px;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            .time-display {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1 class="title">⚡ Timing Reflex</h1>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">平均反応時間</div>
                <div class="stat-value" id="avgTime">-</div>
            </div>
        </div>

        <div class="highscore">🏆 ベスト: <span id="bestTime">-</span>ms</div>

        <div class="reaction-area waiting" id="reactionArea">
            <div class="message" id="message">タップしてスタート</div>
        </div>

        <button class="button hidden" id="startButton">もう一度</button>
    </div>

    <script>
        const reactionArea = document.getElementById('reactionArea');
        const message = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        const avgTimeDisplay = document.getElementById('avgTime');
        const bestTimeDisplay = document.getElementById('bestTime');
        const startButton = document.getElementById('startButton');

        let gameState = 'idle'; // idle, waiting, ready, early, result
        let startTime = 0;
        let timeoutId = null;
        let score = 0;
        let reactionTimes = [];
        let bestTime = localStorage.getItem('bestReflexTime') || null;

        if (bestTime) {
            bestTimeDisplay.textContent = bestTime;
        }

        function updateStats() {
            scoreDisplay.textContent = score;

            if (reactionTimes.length > 0) {
                const avg = Math.round(reactionTimes.reduce((a, b) => a + b, 0) / reactionTimes.length);
                avgTimeDisplay.textContent = avg + 'ms';
            }
        }

        function setState(state, msg, className) {
            gameState = state;
            message.textContent = msg;
            reactionArea.className = 'reaction-area ' + className;
        }

        function startGame() {
            score = 0;
            reactionTimes = [];
            updateStats();
            startButton.classList.add('hidden');
            startWaiting();
        }

        function startWaiting() {
            setState('waiting', '待って...', 'waiting');

            const delay = 2000 + Math.random() * 3000; // 2-5秒

            timeoutId = setTimeout(() => {
                setState('ready', 'タップ！', 'ready');
                startTime = Date.now();
            }, delay);
        }

        function handleClick() {
            if (gameState === 'idle' || gameState === 'result') {
                startGame();
                return;
            }

            if (gameState === 'waiting') {
                clearTimeout(timeoutId);
                setState('early', '早すぎ！', 'early');
                score = 0;
                updateStats();
                startButton.classList.remove('hidden');
                return;
            }

            if (gameState === 'ready') {
                const reactionTime = Date.now() - startTime;
                reactionTimes.push(reactionTime);

                if (reactionTime < 200) {
                    score += 100;
                } else if (reactionTime < 300) {
                    score += 80;
                } else if (reactionTime < 400) {
                    score += 60;
                } else if (reactionTime < 500) {
                    score += 40;
                } else {
                    score += 20;
                }

                updateStats();

                // ベストタイム更新
                if (!bestTime || reactionTime < bestTime) {
                    bestTime = reactionTime;
                    localStorage.setItem('bestReflexTime', bestTime);
                    bestTimeDisplay.textContent = bestTime;
                }

                setState('result', reactionTime + 'ms', 'result');

                setTimeout(() => {
                    startWaiting();
                }, 1500);
            }
        }

        reactionArea.addEventListener('click', handleClick);
        reactionArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick();
        });

        startButton.addEventListener('click', startGame);
        startButton.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startGame();
        });
    </script>
</body>
</html>
