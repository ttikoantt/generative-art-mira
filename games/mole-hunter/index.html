<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mole Hunter - by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: clamp(0.7rem, 1.5vw, 0.85rem);
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 700;
            color: #ffd93d;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            max-width: 400px;
            width: 100%;
        }

        .hole {
            aspect-ratio: 1;
            background: linear-gradient(180deg, #2d4a3e 0%, #1a2e27 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.1s ease;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .hole:active {
            transform: scale(0.95);
        }

        .hole::before {
            content: '';
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 30%;
            background: radial-gradient(ellipse at center, #1a2e27 0%, transparent 70%);
            border-radius: 0 0 12px 12px;
        }

        .mole {
            font-size: clamp(2rem, 6vw, 3.5rem);
            position: absolute;
            transition: all 0.15s ease;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
            z-index: 10;
        }

        .mole.hidden {
            transform: translateY(100%);
        }

        .mole.visible {
            transform: translateY(0);
        }

        .mole.hit {
            transform: scale(1.2);
            filter: drop-shadow(0 2px 8px rgba(255, 215, 61, 0.8));
        }

        .mole.bonus {
            filter: drop-shadow(0 0 10px rgba(255, 107, 107, 0.8));
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: clamp(0.9rem, 2vw, 1rem);
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            color: #1a1a2e;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(255, 215, 61, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .info {
            margin-top: 15px;
            font-size: clamp(0.75rem, 1.5vw, 0.9rem);
            opacity: 0.6;
            text-align: center;
        }

        .combo-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 900;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            pointer-events: none;
            opacity: 0;
            z-index: 1000;
        }

        .combo-display.show {
            animation: comboAnim 0.5s ease-out;
        }

        @keyframes comboAnim {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 107, 107, 0.9);
            border: none;
            color: #1a1a2e;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: #ffd93d;
            transform: scale(1.1);
        }

        @media (max-width: 600px) {
            .game-board {
                gap: 10px;
                padding: 15px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <h1>🔨 Mole Hunter</h1>
    <p class="subtitle">出てくるモグラを叩こう！</p>

    <div class="stats">
        <div class="stat">
            <div class="stat-label">SCORE</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">TIME</div>
            <div class="stat-value" id="time">30</div>
        </div>
        <div class="stat">
            <div class="stat-label">HIGH</div>
            <div class="stat-value" id="highScore">0</div>
        </div>
    </div>

    <div class="game-board" id="gameBoard">
        <!-- 9つの穴が生成される -->
    </div>

    <div class="controls">
        <button id="startBtn">START</button>
        <button id="resetBtn">RESET</button>
    </div>

    <p class="info">タップでモグラを叩く | 🐭通常 🦊ボーナス(3点)</p>

    <div class="combo-display" id="comboDisplay"></div>
    <button class="fullscreen-btn" id="fullscreenBtn" title="全画面">⛶</button>

    <script>
        const gameBoard = document.getElementById('gameBoard');
        const scoreEl = document.getElementById('score');
        const timeEl = document.getElementById('time');
        const highScoreEl = document.getElementById('highScore');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const comboDisplay = document.getElementById('comboDisplay');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let score = 0;
        let timeLeft = 30;
        let gameInterval;
        let moleInterval;
        let isPlaying = false;
        let highScore = parseInt(localStorage.getItem('moleHighScore')) || 0;
        let combo = 0;
        let lastHitTime = 0;

        highScoreEl.textContent = highScore;

        const moles = [];
        const holeCount = 9;

        // ゲームボードを初期化
        for (let i = 0; i < holeCount; i++) {
            const hole = document.createElement('div');
            hole.className = 'hole';
            hole.dataset.index = i;

            const mole = document.createElement('div');
            mole.className = 'mole hidden';
            mole.textContent = '🐭';
            mole.dataset.index = i;

            hole.appendChild(mole);
            gameBoard.appendChild(hole);
            moles.push(mole);

            hole.addEventListener('click', () => hitMole(i));
            hole.addEventListener('touchstart', (e) => {
                e.preventDefault();
                hitMole(i);
            }, { passive: false });
        }

        function getRandomHole() {
            const available = moles.filter(m => m.classList.contains('hidden'));
            if (available.length === 0) return null;
            return available[Math.floor(Math.random() * available.length)];
        }

        function showMole() {
            const mole = getRandomHole();
            if (!mole) return;

            const isBonus = Math.random() < 0.2; // 20%の確率でボーナス
            mole.textContent = isBonus ? '🦊' : '🐭';
            mole.classList.remove('hidden', 'bonus');
            mole.classList.add('visible');
            if (isBonus) mole.classList.add('bonus');

            // 表示時間は徐々に短くなる
            const showTime = Math.max(800, 2000 - score * 20);
            setTimeout(() => {
                if (mole.classList.contains('visible')) {
                    mole.classList.add('hidden');
                    mole.classList.remove('visible');
                    combo = 0; // ミスでコンボリセット
                }
            }, showTime);
        }

        function hitMole(index) {
            if (!isPlaying) return;

            const mole = moles[index];
            if (!mole.classList.contains('visible')) return;

            const isBonus = mole.classList.contains('bonus');
            const points = isBonus ? 3 : 1;

            // コンボ計算
            const now = Date.now();
            if (now - lastHitTime < 1500) {
                combo++;
            } else {
                combo = 1;
            }
            lastHitTime = now;

            // コンボボーナス
            const comboBonus = combo >= 3 ? Math.floor(combo / 3) : 0;
            const totalPoints = points + comboBonus;

            score += totalPoints;
            scoreEl.textContent = score;

            // ヒットエフェクト
            mole.classList.add('hit');
            setTimeout(() => mole.classList.remove('hit'), 150);

            mole.classList.add('hidden');
            mole.classList.remove('visible', 'bonus');

            // コンボ表示
            if (combo >= 3) {
                showCombo(`${combo} COMBO! +${totalPoints}`);
            }

            // ハイスコア更新
            if (score > highScore) {
                highScore = score;
                highScoreEl.textContent = highScore;
                localStorage.setItem('moleHighScore', highScore);
            }
        }

        function showCombo(text) {
            comboDisplay.textContent = text;
            comboDisplay.classList.remove('show');
            void comboDisplay.offsetWidth; // リフロー
            comboDisplay.classList.add('show');
        }

        function startGame() {
            if (isPlaying) return;

            score = 0;
            timeLeft = 30;
            combo = 0;
            scoreEl.textContent = '0';
            timeEl.textContent = '30';
            isPlaying = true;
            startBtn.disabled = true;

            // モグラ出現
            moleInterval = setInterval(() => {
                const moleCount = Math.min(3, 1 + Math.floor(score / 10));
                for (let i = 0; i < moleCount; i++) {
                    setTimeout(() => showMole(), i * 200);
                }
            }, 1000);

            // タイマー
            gameInterval = setInterval(() => {
                timeLeft--;
                timeEl.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameInterval);
            clearInterval(moleInterval);
            startBtn.disabled = false;

            // 全モグラを隠す
            moles.forEach(mole => {
                mole.classList.add('hidden');
                mole.classList.remove('visible');
            });

            showCombo(`GAME OVER! SCORE: ${score}`);
        }

        function resetGame() {
            if (isPlaying) {
                endGame();
            }
            score = 0;
            scoreEl.textContent = '0';
            timeEl.textContent = '30';
            combo = 0;
        }

        startBtn.addEventListener('click', startGame);
        resetBtn.addEventListener('click', resetGame);

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });
    </script>
</body>
</html>
