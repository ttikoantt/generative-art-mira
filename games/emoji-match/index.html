<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Emoji Match | 絵文字マッチ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
            touch-action: manipulation;
        }

        h1 {
            color: #fff;
            font-size: 24px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 16px;
            color: #fff;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 400px;
            margin-bottom: 20px;
        }

        .card {
            width: 70px;
            height: 70px;
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 4px 4px 8px rgba(0,0,0,0.2);
            user-select: none;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card.flipped {
            background: linear-gradient(145deg, #ffecd2, #fcb69f);
            transform: rotateY(180deg);
        }

        .card.matched {
            background: linear-gradient(145deg, #a8edea, #fed6e3);
            animation: pulse 0.5s;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .buttons {
            display: flex;
            gap: 10px;
        }

        button {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 4px 4px 10px rgba(0,0,0,0.3);
        }

        #fullscreen {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        #game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            display: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 100;
        }

        #game-over h2 {
            color: #667eea;
            margin-bottom: 15px;
        }

        #game-over p {
            color: #333;
            margin: 8px 0;
            font-size: 16px;
        }

        @media (max-width: 400px) {
            .card {
                width: 60px;
                height: 60px;
                font-size: 28px;
            }

            h1 {
                font-size: 20px;
            }

            .stats {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <button id="fullscreen">⛶ 全画面</button>

    <h1>🎮 Emoji Match</h1>

    <div class="stats">
        <div class="stat">⏱️ 時間: <span id="time">0</span>秒</div>
        <div class="stat">🎯 ターン: <span id="moves">0</span></div>
        <div class="stat">⭐ スコア: <span id="score">0</span></div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="buttons">
        <button onclick="restartGame()">🔄 リスタート</button>
    </div>

    <div id="game-over">
        <h2>🎉 クリア！</h2>
        <p>⏱️ タイム: <span id="final-time">0</span>秒</p>
        <p>🎯 ターン数: <span id="final-moves">0</span></p>
        <p>⭐ スコア: <span id="final-score">0</span></p>
        <button onclick="restartGame()">🔄 もう一度遊ぶ</button>
    </div>

    <script>
        const emojis = ['🎨', '🎮', '🎯', '🎲', '🎸', '🎺', '🎻', '🎹'];
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let score = 0;
        let time = 0;
        let timerInterval;
        let canFlip = true;

        function initGame() {
            // Create pairs
            cards = [...emojis, ...emojis];
            
            // Shuffle
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }

            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            score = 0;
            time = 0;
            canFlip = true;

            updateStats();
            renderGrid();
            startTimer();
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            cards.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;
                card.innerHTML = '❓';
                card.addEventListener('click', () => flipCard(index, card));
                grid.appendChild(card);
            });
        }

        function flipCard(index, cardElement) {
            if (!canFlip) return;
            if (flippedCards.length >= 2) return;
            if (flippedCards.includes(index)) return;
            if (cardElement.classList.contains('matched')) return;

            cardElement.innerHTML = cards[index];
            cardElement.classList.add('flipped');
            flippedCards.push(index);

            if (flippedCards.length === 2) {
                moves++;
                updateStats();
                checkMatch();
            }
        }

        function checkMatch() {
            canFlip = false;
            const [first, second] = flippedCards;
            const cards = document.querySelectorAll('.card');

            if (cards[first].innerHTML === cards[second].innerHTML) {
                // Match!
                setTimeout(() => {
                    cards[first].classList.add('matched');
                    cards[second].classList.add('matched');
                    matchedPairs++;
                    score += Math.max(100 - time, 10);
                    updateStats();

                    if (matchedPairs === emojis.length) {
                        endGame();
                    }

                    flippedCards = [];
                    canFlip = true;
                }, 500);
            } else {
                // No match
                setTimeout(() => {
                    cards[first].innerHTML = '❓';
                    cards[second].innerHTML = '❓';
                    cards[first].classList.remove('flipped');
                    cards[second].classList.remove('flipped');
                    flippedCards = [];
                    canFlip = true;
                }, 1000);
            }
        }

        function updateStats() {
            document.getElementById('time').textContent = time;
            document.getElementById('moves').textContent = moves;
            document.getElementById('score').textContent = score;
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                time++;
                updateStats();
            }, 1000);
        }

        function endGame() {
            clearInterval(timerInterval);
            
            const timeBonus = Math.max(0, 300 - time * 2);
            const moveBonus = Math.max(0, 200 - moves * 5);
            score += timeBonus + moveBonus;
            updateStats();

            document.getElementById('final-time').textContent = time;
            document.getElementById('final-moves').textContent = moves;
            document.getElementById('final-score').textContent = score;
            document.getElementById('game-over').style.display = 'block';
        }

        function restartGame() {
            document.getElementById('game-over').style.display = 'none';
            clearInterval(timerInterval);
            initGame();
        }

        document.getElementById('fullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        initGame();
    </script>
</body>
</html>
