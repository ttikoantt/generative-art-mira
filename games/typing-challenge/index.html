<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Speed Challenge - タイピングスピードチャレンジ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 10px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            flex: 1;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #4ecdc4;
            font-size: 24px;
            font-weight: bold;
        }

        .text-display {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 100px;
            font-size: 18px;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.9);
        }

        .text-display .correct {
            color: #4ecdc4;
        }

        .text-display .incorrect {
            color: #ff6b6b;
            text-decoration: underline;
        }

        .text-display .current {
            background: rgba(78, 205, 196, 0.3);
            border-radius: 3px;
        }

        .input-area {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
        }

        .input-area::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .input-area:focus {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(78, 205, 196, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .result {
            text-align: center;
            padding: 20px;
            background: rgba(78, 205, 196, 0.2);
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .result h2 {
            color: #4ecdc4;
            margin-bottom: 15px;
            font-size: 24px;
        }

        .result p {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 5px;
            font-size: 16px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ecdc4, #44a08d);
            transition: width 0.3s;
            border-radius: 3px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 22px;
            }

            .stats {
                flex-wrap: wrap;
            }

            .stat-box {
                min-width: calc(50% - 5px);
            }

            .text-display {
                font-size: 16px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">🔳 全画面</button>

    <div class="container">
        <h1>⌨️ Typing Speed Challenge</h1>
        <p class="subtitle">表示されたテキストをできるだけ速く正確に入力</p>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">WPM</div>
                <div class="stat-value" id="wpm">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">正確性</div>
                <div class="stat-value" id="accuracy">100%</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">時間</div>
                <div class="stat-value" id="time">0s</div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>

        <div class="text-display" id="textDisplay">
            開始ボタンを押してスタート！
        </div>

        <input
            type="text"
            class="input-area"
            id="input"
            placeholder="ここに入力..."
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
        >

        <button class="btn btn-primary" id="startBtn" onclick="startGame()">🎮 スタート</button>
        <button class="btn btn-secondary" id="resetBtn" onclick="resetGame()" style="display: none;">🔄 リセット</button>
    </div>

    <script>
        const texts = [
            "技術の進化は常に私たちを驚かせてくれる。人工知能の発展により、日常生活が大きく変わりつつある。",
            "美しい自然風景を見ると心が洗われるような気持ちになる。山々の緑、青い空、清らかな水。",
            "プログラミングは現代の魔法だ。数行のコードで世界中の人々を助けることができる。",
            "創造性は限られた資源の中から無限の可能性を見出す力だ。芸術、科学、技術すべてに必要。",
            "時間は最も貴重な資源だ。一度使った時間は二度と戻ってこないから大切に使おう。",
            "学ぶことは一生続く旅だ。新しい知識を得るたびに世界が広がり、視野が開ける。",
            "音楽は言葉を超えた universal language だ。国境や文化を超えて人々の心をつなぐ。",
            "優れたデザインは見えない。存在感がありすぎず、かといってなさすぎず、ちょうどいい。",
            "チームワークは個人の力を乗算する。一人ではできないことを集団の力で成し遂げる。",
            "成功は失敗の積み重ねだ。何度も転んでも立ち上がり続ける人が最後に勝つ。"
        ];

        let currentText = "";
        let currentIndex = 0;
        let startTime = null;
        let timer = null;
        let correctChars = 0;
        let totalChars = 0;
        let isGameActive = false;

        const textDisplay = document.getElementById('textDisplay');
        const input = document.getElementById('input');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const wpmDisplay = document.getElementById('wpm');
        const accuracyDisplay = document.getElementById('accuracy');
        const timeDisplay = document.getElementById('time');
        const progressBar = document.getElementById('progress');

        function getRandomText() {
            return texts[Math.floor(Math.random() * texts.length)];
        }

        function displayText() {
            let html = "";
            for (let i = 0; i < currentText.length; i++) {
                if (i < currentIndex) {
                    html += `<span class="correct">${currentText[i]}</span>`;
                } else if (i === currentIndex) {
                    html += `<span class="current">${currentText[i]}</span>`;
                } else {
                    html += currentText[i];
                }
            }
            textDisplay.innerHTML = html;
        }

        function updateStats() {
            const elapsed = (Date.now() - startTime) / 1000 / 60; // 分
            const wpm = Math.round((correctChars / 5) / elapsed) || 0;
            const accuracy = totalChars > 0 ? Math.round((correctChars / totalChars) * 100) : 100;
            const progress = (currentIndex / currentText.length) * 100;

            wpmDisplay.textContent = wpm;
            accuracyDisplay.textContent = accuracy + "%";
            timeDisplay.textContent = Math.floor((Date.now() - startTime) / 1000) + "s";
            progressBar.style.width = progress + "%";
        }

        function startGame() {
            currentText = getRandomText();
            currentIndex = 0;
            startTime = Date.now();
            correctChars = 0;
            totalChars = 0;
            isGameActive = true;

            displayText();
            input.value = "";
            input.focus();
            input.disabled = false;

            startBtn.style.display = "none";
            resetBtn.style.display = "block";

            timer = setInterval(updateStats, 100);
        }

        function endGame() {
            isGameActive = false;
            clearInterval(timer);

            const elapsed = (Date.now() - startTime) / 1000 / 60;
            const wpm = Math.round((correctChars / 5) / elapsed);
            const accuracy = totalChars > 0 ? Math.round((correctChars / totalChars) * 100) : 100;

            textDisplay.innerHTML = `
                <div class="result">
                    <h2>🎉 完成です！</h2>
                    <p>WPM: <strong>${wpm}</strong></p>
                    <p>正確性: <strong>${accuracy}%</strong></p>
                    <p>時間: <strong>${Math.floor((Date.now() - startTime) / 1000)}秒</strong></p>
                </div>
            `;

            input.disabled = true;
            startBtn.style.display = "block";
            startBtn.textContent = "🔄 もう一度";
            resetBtn.style.display = "none";
        }

        function resetGame() {
            clearInterval(timer);
            isGameActive = false;
            input.value = "";
            input.disabled = true;
            textDisplay.innerHTML = "開始ボタンを押してスタート！";
            wpmDisplay.textContent = "0";
            accuracyDisplay.textContent = "100%";
            timeDisplay.textContent = "0s";
            progressBar.style.width = "0%";
            startBtn.style.display = "block";
            startBtn.textContent = "🎮 スタート";
            resetBtn.style.display = "none";
        }

        input.addEventListener('input', () => {
            if (!isGameActive) return;

            const inputValue = input.value;
            totalChars++;

            if (inputValue === currentText[currentIndex]) {
                correctChars++;
                currentIndex++;

                if (currentIndex >= currentText.length) {
                    endGame();
                    return;
                }

                input.value = "";
                displayText();
            } else {
                // 間違った文字を入力した場合のフィードバック
                textDisplay.innerHTML = textDisplay.innerHTML.replace(
                    '<span class="current">' + currentText[currentIndex] + '</span>',
                    '<span class="incorrect">' + currentText[currentIndex] + '</span>'
                );
                setTimeout(() => {
                    if (currentIndex < currentText.length) {
                        displayText();
                    }
                }, 500);
            }

            updateStats();
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期状態
        input.disabled = true;
    </script>
</body>
</html>
