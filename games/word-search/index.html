<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Search Puzzle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
            color: #fff;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .category-select {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
        }

        .category-select option {
            background: #764ba2;
            color: #fff;
        }

        .score {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .game-area {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .grid-container {
            flex: 1;
            min-width: 300px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 3px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
        }

        .cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 5px;
            font-size: clamp(0.8rem, 2.5vw, 1.2rem);
            font-weight: bold;
            color: #333;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
        }

        .cell:hover {
            transform: scale(1.1);
            background: #fff;
        }

        .cell.selected {
            background: #ffd700;
            transform: scale(1.1);
        }

        .cell.found {
            background: #00ff00;
            color: #fff;
            animation: pulse 0.5s;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .word-list {
            flex: 0 0 200px;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
        }

        .word-list h3 {
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .words {
            list-style: none;
        }

        .word {
            padding: 8px;
            margin-bottom: 5px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            transition: all 0.3s;
        }

        .word.found {
            background: #00ff00;
            text-decoration: line-through;
            opacity: 0.7;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #fff;
            color: #fff;
            border-radius: 10px;
            cursor: pointer;
            z-index: 1000;
            font-size: 0.9rem;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: modalIn 0.5s;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-content h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .modal-content p {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        @media (max-width: 600px) {
            .game-area {
                flex-direction: column;
            }

            .word-list {
                flex: none;
                width: 100%;
            }

            .grid {
                gap: 2px;
                padding: 5px;
            }

            .cell {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🔍 Word Search Puzzle</h1>

        <div class="game-info">
            <select class="category-select" id="categorySelect" onchange="changeCategory()">
                <option value="animals">🐾 動物</option>
                <option value="fruits">🍎 果物</option>
                <option value="sports">⚽ スポーツ</option>
                <option value="colors">🎨 色</option>
            </select>
            <div class="score">
                見つけた単語: <span id="foundCount">0</span> / <span id="totalWords">8</span>
            </div>
        </div>

        <div class="game-area">
            <div class="grid-container">
                <div class="grid" id="grid"></div>
            </div>

            <div class="word-list">
                <h3>📝 探す単語</h3>
                <ul class="words" id="wordList"></ul>
            </div>
        </div>

        <div class="controls">
            <button onclick="newGame()">新しいゲーム</button>
            <button onclick="showHint()">ヒント</button>
        </div>
    </div>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2>🎉 クリア！</h2>
            <p>全ての単語を見つけました！</p>
            <button onclick="closeModal(); newGame();">次のゲーム</button>
        </div>
    </div>

    <script>
        const GRID_SIZE = 10;
        const gridElement = document.getElementById('grid');
        const wordListElement = document.getElementById('wordList');
        const foundCountElement = document.getElementById('foundCount');
        const totalWordsElement = document.getElementById('totalWords');
        const winModal = document.getElementById('winModal');

        // Word categories
        const categories = {
            animals: ['CAT', 'DOG', 'BIRD', 'FISH', 'LION', 'TIGER', 'BEAR', 'WOLF'],
            fruits: ['APPLE', 'BANANA', 'ORANGE', 'GRAPE', 'MANGO', 'PEACH', 'LEMON', 'BERRY'],
            sports: ['SOCCER', 'TENNIS', 'BASEBALL', 'HOCKEY', 'RUGBY', 'GOLF', 'BOXING', 'JUDO'],
            colors: ['RED', 'BLUE', 'GREEN', 'YELLOW', 'PURPLE', 'ORANGE', 'PINK', 'BLACK']
        };

        let currentCategory = 'animals';
        let grid = [];
        let words = [];
        let foundWords = [];
        let selectedCells = [];
        let isSelecting = false;

        // Initialize game
        function initGame() {
            words = [...categories[currentCategory]];
            foundWords = [];
            foundCountElement.textContent = '0';
            totalWordsElement.textContent = words.length;

            createGrid();
            placeWords();
            fillEmptyCells();
            renderGrid();
            renderWordList();
        }

        // Create empty grid
        function createGrid() {
            grid = [];
            for (let i = 0; i < GRID_SIZE; i++) {
                grid[i] = [];
                for (let j = 0; j < GRID_SIZE; j++) {
                    grid[i][j] = '';
                }
            }
        }

        // Place words in grid
        function placeWords() {
            const directions = [
                { dx: 1, dy: 0 },   // Horizontal
                { dx: 0, dy: 1 },   // Vertical
                { dx: 1, dy: 1 },   // Diagonal down-right
                { dx: 1, dy: -1 }   // Diagonal up-right
            ];

            for (const word of words) {
                let placed = false;
                let attempts = 0;

                while (!placed && attempts < 100) {
                    const dir = directions[Math.floor(Math.random() * directions.length)];
                    const startRow = Math.floor(Math.random() * GRID_SIZE);
                    const startCol = Math.floor(Math.random() * GRID_SIZE);

                    if (canPlaceWord(word, startRow, startCol, dir)) {
                        placeWord(word, startRow, startCol, dir);
                        placed = true;
                    }
                    attempts++;
                }
            }
        }

        // Check if word can be placed
        function canPlaceWord(word, row, col, dir) {
            for (let i = 0; i < word.length; i++) {
                const newRow = row + i * dir.dy;
                const newCol = col + i * dir.dx;

                if (newRow < 0 || newRow >= GRID_SIZE || newCol < 0 || newCol >= GRID_SIZE) {
                    return false;
                }

                if (grid[newRow][newCol] !== '' && grid[newRow][newCol] !== word[i]) {
                    return false;
                }
            }
            return true;
        }

        // Place word in grid
        function placeWord(word, row, col, dir) {
            for (let i = 0; i < word.length; i++) {
                grid[row + i * dir.dy][col + i * dir.dx] = word[i];
            }
        }

        // Fill empty cells with random letters
        function fillEmptyCells() {
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    if (grid[i][j] === '') {
                        grid[i][j] = letters[Math.floor(Math.random() * letters.length)];
                    }
                }
            }
        }

        // Render grid
        function renderGrid() {
            gridElement.innerHTML = '';
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.textContent = grid[i][j];
                    cell.dataset.row = i;
                    cell.dataset.col = j;

                    cell.addEventListener('mousedown', startSelection);
                    cell.addEventListener('mouseenter', continueSelection);
                    cell.addEventListener('touchstart', handleTouchStart);
                    cell.addEventListener('touchmove', handleTouchMove);

                    gridElement.appendChild(cell);
                }
            }

            document.addEventListener('mouseup', endSelection);
            document.addEventListener('touchend', endSelection);
        }

        // Render word list
        function renderWordList() {
            wordListElement.innerHTML = '';
            for (const word of words) {
                const li = document.createElement('li');
                li.className = 'word' + (foundWords.includes(word) ? ' found' : '');
                li.textContent = word;
                li.dataset.word = word;
                wordListElement.appendChild(li);
            }
        }

        // Start cell selection
        function startSelection(e) {
            isSelecting = true;
            selectedCells = [e.target];
            e.target.classList.add('selected');
        }

        // Continue cell selection
        function continueSelection(e) {
            if (!isSelecting) return;

            const row = parseInt(e.target.dataset.row);
            const col = parseInt(e.target.dataset.col);

            if (selectedCells.length > 0) {
                const firstCell = selectedCells[0];
                const firstRow = parseInt(firstCell.dataset.row);
                const firstCol = parseInt(firstCell.dataset.col);

                // Calculate direction
                const dRow = row - firstRow;
                const dCol = col - firstCol;

                // Check if selection is valid (horizontal, vertical, or diagonal)
                if (dRow === 0 || dCol === 0 || Math.abs(dRow) === Math.abs(dCol)) {
                    // Clear previous selection
                    selectedCells.forEach(cell => cell.classList.remove('selected'));
                    selectedCells = [];

                    // Select cells along the line
                    const steps = Math.max(Math.abs(dRow), Math.abs(dCol));
                    const stepRow = dRow === 0 ? 0 : dRow / Math.abs(dRow);
                    const stepCol = dCol === 0 ? 0 : dCol / Math.abs(dCol);

                    for (let i = 0; i <= steps; i++) {
                        const cellRow = firstRow + i * stepRow;
                        const cellCol = firstCol + i * stepCol;
                        const cell = document.querySelector(`[data-row="${cellRow}"][data-col="${cellCol}"]`);
                        if (cell) {
                            cell.classList.add('selected');
                            selectedCells.push(cell);
                        }
                    }
                }
            }
        }

        // Touch event handlers
        function handleTouchStart(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            if (target && target.classList.contains('cell')) {
                startSelection({ target: target });
            }
        }

        function handleTouchMove(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            if (target && target.classList.contains('cell')) {
                continueSelection({ target: target });
            }
        }

        // End selection and check word
        function endSelection() {
            if (!isSelecting) return;
            isSelecting = false;

            if (selectedCells.length < 2) {
                selectedCells.forEach(cell => cell.classList.remove('selected'));
                selectedCells = [];
                return;
            }

            // Build word from selected cells
            let selectedWord = '';
            let reversedWord = '';
            selectedCells.forEach(cell => {
                selectedWord += cell.textContent;
            });
            reversedWord = selectedWord.split('').reverse().join('');

            // Check if word is in the list
            const foundWord = words.find(w => w === selectedWord || w === reversedWord);

            if (foundWord && !foundWords.includes(foundWord)) {
                foundWords.push(foundWord);

                // Mark cells as found
                selectedCells.forEach(cell => {
                    cell.classList.add('found');
                });

                // Update word list
                const wordElement = document.querySelector(`[data-word="${foundWord}"]`);
                if (wordElement) {
                    wordElement.classList.add('found');
                }

                // Update score
                foundCountElement.textContent = foundWords.length;

                // Check win condition
                if (foundWords.length === words.length) {
                    setTimeout(() => {
                        winModal.classList.add('show');
                    }, 500);
                }
            } else {
                // Clear selection
                selectedCells.forEach(cell => {
                    cell.classList.remove('selected');
                });
            }

            selectedCells = [];
        }

        // New game
        function newGame() {
            winModal.classList.remove('show');
            initGame();
        }

        // Change category
        function changeCategory() {
            currentCategory = document.getElementById('categorySelect').value;
            newGame();
        }

        // Show hint
        function showHint() {
            const unfoundWords = words.filter(w => !foundWords.includes(w));
            if (unfoundWords.length > 0) {
                const hintWord = unfoundWords[0];

                // Find the word in the grid
                for (let i = 0; i < GRID_SIZE; i++) {
                    for (let j = 0; j < GRID_SIZE; j++) {
                        if (grid[i][j] === hintWord[0]) {
                            const cell = document.querySelector(`[data-row="${i}"][data-col="${j}"]`);
                            if (cell) {
                                cell.style.background = '#ff6b6b';
                                setTimeout(() => {
                                    cell.style.background = '';
                                }, 2000);
                            }
                        }
                    }
                }
            }
        }

        // Close modal
        function closeModal() {
            winModal.classList.remove('show');
        }

        // Toggle fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Start game
        initGame();
    </script>
</body>
</html>
