<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Search - 単語探しパズル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 15px;
            color: white;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
        }

        .game-area {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .grid-container {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 3px;
            background: #f0f0f0;
            padding: 10px;
            border-radius: 10px;
        }

        .cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .cell:hover {
            background: #e0e0e0;
        }

        .cell.selected {
            background: #667eea;
            color: white;
        }

        .cell.found {
            background: #4caf50;
            color: white;
            animation: pulse 0.5s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .word-list {
            width: 150px;
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
        }

        .word-list h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .word-item {
            padding: 5px 10px;
            margin: 5px 0;
            background: white;
            border-radius: 5px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .word-item.found {
            background: #4caf50;
            color: white;
            text-decoration: line-through;
        }

        .buttons {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .new-game {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .new-game:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .fullscreen-btn {
            background: rgba(255, 255, 255, 0.9);
            color: #667eea;
        }

        .fullscreen-btn:hover {
            background: white;
            transform: scale(1.02);
        }

        .win-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .win-overlay.show {
            display: flex;
        }

        .win-message {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: bounceIn 0.5s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .win-message h2 {
            color: #4caf50;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .win-message p {
            color: #666;
            font-size: 18px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Word Search</h1>
        <p class="subtitle">単語を探してタップしよう！</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">見つけた単語</div>
                <div class="stat-value" id="foundCount">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">タイム</div>
                <div class="stat-value" id="timer">0:00</div>
            </div>
        </div>

        <div class="game-area">
            <div class="grid-container" id="grid"></div>
            <div class="word-list">
                <h3>探す単語</h3>
                <div id="wordList"></div>
            </div>
        </div>

        <div class="buttons">
            <button class="new-game" onclick="newGame()">🎮 新しいゲーム</button>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">🖥️ 全画面</button>
        </div>
    </div>

    <div class="win-overlay" id="winOverlay">
        <div class="win-message">
            <h2>🎉 クリア！</h2>
            <p>全ての単語が見つかりました！</p>
            <p id="finalTime"></p>
            <button class="new-game" onclick="newGame()">🎮 もう一度</button>
        </div>
    </div>

    <script>
        const GRID_SIZE = 8;
        const WORDS = [
            ['STAR', 'MOON', 'SUN'],
            ['CAT', 'DOG', 'BIRD'],
            ['RED', 'BLUE', 'GREEN'],
            ['FIRE', 'WATER', 'EARTH']
        ];

        let grid = [];
        let currentWords = [];
        let foundWords = [];
        let selectedCells = [];
        let selecting = false;
        let startTime;
        let timerInterval;
        let wordSetIndex = 0;

        function init() {
            createGrid();
            newGame();
        }

        function createGrid() {
            const gridContainer = document.getElementById('grid');
            gridContainer.innerHTML = '';
            gridContainer.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 1fr)`;

            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('mousedown', startSelection);
                cell.addEventListener('mouseenter', continueSelection);
                cell.addEventListener('mouseup', endSelection);
                cell.addEventListener('touchstart', handleTouchStart);
                cell.addEventListener('touchmove', handleTouchMove);
                cell.addEventListener('touchend', endSelection);
                gridContainer.appendChild(cell);
            }

            document.addEventListener('mouseup', endSelection);
        }

        function handleTouchStart(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const cell = document.elementFromPoint(touch.clientX, touch.clientY);
            if (cell && cell.classList.contains('cell')) {
                startSelection.call(cell, e);
            }
        }

        function handleTouchMove(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const cell = document.elementFromPoint(touch.clientX, touch.clientY);
            if (cell && cell.classList.contains('cell')) {
                continueSelection.call(cell, e);
            }
        }

        function startSelection(e) {
            e.preventDefault();
            selecting = true;
            selectedCells = [parseInt(this.dataset.index)];
            updateSelection();
        }

        function continueSelection(e) {
            if (!selecting) return;

            const newIndex = parseInt(this.dataset.index);
            if (!selectedCells.includes(newIndex)) {
                const lastIndex = selectedCells[selectedCells.length - 1];
                if (isAdjacent(lastIndex, newIndex)) {
                    selectedCells.push(newIndex);
                    updateSelection();
                }
            }
        }

        function isAdjacent(index1, index2) {
            const row1 = Math.floor(index1 / GRID_SIZE);
            const col1 = index1 % GRID_SIZE;
            const row2 = Math.floor(index2 / GRID_SIZE);
            const col2 = index2 % GRID_SIZE;

            const rowDiff = Math.abs(row2 - row1);
            const colDiff = Math.abs(col2 - col1);

            // 上下左右と斜めのみ
            return (rowDiff <= 1 && colDiff <= 1) && !(rowDiff === 0 && colDiff === 0);
        }

        function updateSelection() {
            document.querySelectorAll('.cell').forEach(cell => {
                cell.classList.remove('selected');
            });

            selectedCells.forEach(index => {
                document.querySelectorAll('.cell')[index].classList.add('selected');
            });
        }

        function endSelection(e) {
            if (!selecting) return;
            selecting = false;

            const word = selectedCells.map(i => grid[i]).join('');
            const reversedWord = word.split('').reverse().join('');

            let foundWord = null;
            if (currentWords.includes(word)) {
                foundWord = word;
            } else if (currentWords.includes(reversedWord)) {
                foundWord = reversedWord;
            }

            if (foundWord && !foundWords.includes(foundWord)) {
                foundWords.push(foundWord);
                markFound(foundWord);
                updateWordList();
                checkWin();
            }

            clearSelection();
        }

        function clearSelection() {
            document.querySelectorAll('.cell').forEach(cell => {
                cell.classList.remove('selected');
            });
            selectedCells = [];
        }

        function markFound(word) {
            // 該当するセルをすべて探す
            for (let i = 0; i <= grid.length - word.length; i++) {
                let found = false;
                let indices = [];

                // 順方向チェック
                for (let j = 0; j < word.length; j++) {
                    if (grid[i + j] === word[j]) {
                        indices.push(i + j);
                    }
                }
                if (indices.length === word.length) {
                    indices.forEach(idx => {
                        document.querySelectorAll('.cell')[idx].classList.add('found');
                    });
                    found = true;
                    break;
                }
            }
        }

        function updateWordList() {
            const wordList = document.getElementById('wordList');
            wordList.innerHTML = '';

            currentWords.forEach(word => {
                const item = document.createElement('div');
                item.className = 'word-item';
                if (foundWords.includes(word)) {
                    item.classList.add('found');
                }
                item.textContent = word;
                wordList.appendChild(item);
            });

            document.getElementById('foundCount').textContent = foundWords.length;
        }

        function checkWin() {
            if (foundWords.length === currentWords.length) {
                clearInterval(timerInterval);
                setTimeout(() => {
                    document.getElementById('finalTime').textContent = `タイム: ${document.getElementById('timer').textContent}`;
                    document.getElementById('winOverlay').classList.add('show');
                }, 500);
            }
        }

        function newGame() {
            // 単語セットをローテーション
            wordSetIndex = (wordSetIndex + 1) % WORDS.length;
            currentWords = [...WORDS[wordSetIndex]];
            foundWords = [];

            // グリッド初期化
            grid = new Array(GRID_SIZE * GRID_SIZE).fill('');

            // 単語を配置
            currentWords.forEach(word => {
                placeWord(word);
            });

            // 空マスを埋める
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            for (let i = 0; i < grid.length; i++) {
                if (grid[i] === '') {
                    grid[i] = chars[Math.floor(Math.random() * chars.length)];
                }
            }

            // グリッドを表示
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, i) => {
                cell.textContent = grid[i];
                cell.classList.remove('found', 'selected');
            });

            updateWordList();
            document.getElementById('winOverlay').classList.remove('show');

            // タイマー開始
            clearInterval(timerInterval);
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);
        }

        function placeWord(word) {
            const directions = [
                [0, 1],   // 右
                [1, 0],   // 下
                [1, 1],   // 右下
                [1, -1]   // 左下
            ];

            let placed = false;
            let attempts = 0;

            while (!placed && attempts < 100) {
                const direction = directions[Math.floor(Math.random() * directions.length)];
                const row = Math.floor(Math.random() * GRID_SIZE);
                const col = Math.floor(Math.random() * GRID_SIZE);

                if (canPlaceWord(word, row, col, direction)) {
                    for (let i = 0; i < word.length; i++) {
                        const index = (row + i * direction[0]) * GRID_SIZE + (col + i * direction[1]);
                        grid[index] = word[i];
                    }
                    placed = true;
                }
                attempts++;
            }
        }

        function canPlaceWord(word, row, col, direction) {
            for (let i = 0; i < word.length; i++) {
                const newRow = row + i * direction[0];
                const newCol = col + i * direction[1];

                if (newRow >= GRID_SIZE || newCol >= GRID_SIZE || newCol < 0) {
                    return false;
                }

                const index = newRow * GRID_SIZE + newCol;
                if (grid[index] !== '' && grid[index] !== word[i]) {
                    return false;
                }
            }
            return true;
        }

        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            document.getElementById('timer').textContent =
                `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        init();
    </script>
</body>
</html>
