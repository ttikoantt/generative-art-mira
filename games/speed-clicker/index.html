<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Speed Clicker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            color: white;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            color: white;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px 25px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
        }

        .game-area {
            position: relative;
            width: 100%;
            height: 400px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            margin-bottom: 20px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .target {
            position: absolute;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            user-select: none;
            -webkit-user-select: none;
        }

        .target:active {
            transform: scale(0.9);
        }

        .target.clicked {
            animation: clickEffect 0.3s ease-out;
        }

        @keyframes clickEffect {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.3);
                opacity: 0.5;
            }
            100% {
                transform: scale(0);
                opacity: 0;
            }
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 15px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .start-btn {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #333;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(132, 250, 176, 0.4);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            z-index: 10;
        }

        .game-over-overlay.show {
            display: flex;
        }

        .game-over-overlay h2 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .game-over-overlay p {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .game-area {
                height: 300px;
            }

            .target {
                width: 60px;
                height: 60px;
                font-size: 1.5rem;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            button {
                padding: 12px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <h1>🎯 Speed Clicker</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">残り時間</div>
                <div class="stat-value" id="timer">30</div>
            </div>
            <div class="stat">
                <div class="stat-label">コンボ</div>
                <div class="stat-value" id="combo">0</div>
            </div>
        </div>

        <div class="game-area" id="gameArea">
            <div class="game-over-overlay" id="gameOverOverlay">
                <h2>🎉 ゲーム終了!</h2>
                <p>最終スコア: <span id="finalScore">0</span></p>
                <button class="start-btn" onclick="startGame()">もう一度遊ぶ</button>
            </div>
        </div>

        <div class="controls">
            <button class="start-btn" id="startBtn" onclick="startGame()">スタート</button>
        </div>
    </div>

    <script>
        let score = 0;
        let timeLeft = 30;
        let combo = 0;
        let gameInterval;
        let timerInterval;
        let isPlaying = false;
        let currentTarget = null;

        const gameArea = document.getElementById('gameArea');
        const scoreElement = document.getElementById('score');
        const timerElement = document.getElementById('timer');
        const comboElement = document.getElementById('combo');
        const startBtn = document.getElementById('startBtn');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScoreElement = document.getElementById('finalScore');

        const emojis = ['🎯', '⭐', '💎', '🔥', '⚡', '🌟', '💫', '🎪'];

        function startGame() {
            score = 0;
            timeLeft = 30;
            combo = 0;
            isPlaying = true;

            scoreElement.textContent = score;
            timerElement.textContent = timeLeft;
            comboElement.textContent = combo;

            gameOverOverlay.classList.remove('show');
            startBtn.disabled = true;

            // ターゲットを生成
            spawnTarget();

            // タイマー開始
            timerInterval = setInterval(() => {
                timeLeft--;
                timerElement.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function spawnTarget() {
            if (!isPlaying) return;

            // 前のターゲットを削除
            if (currentTarget) {
                currentTarget.remove();
            }

            // 新しいターゲットを作成
            const target = document.createElement('div');
            target.className = 'target';
            target.textContent = emojis[Math.floor(Math.random() * emojis.length)];

            // ランダムな位置
            const maxX = gameArea.clientWidth - 80;
            const maxY = gameArea.clientHeight - 80;
            const x = Math.random() * maxX;
            const y = Math.random() * maxY;

            target.style.left = x + 'px';
            target.style.top = y + 'px';

            // クリックイベント
            target.addEventListener('click', () => {
                if (!isPlaying) return;

                target.classList.add('clicked');

                // スコア計算（コンボボーナス付き）
                combo++;
                const bonus = Math.min(combo, 10);
                score += 10 + bonus;

                scoreElement.textContent = score;
                comboElement.textContent = combo;

                // 次のターゲットを生成
                setTimeout(() => {
                    spawnTarget();
                }, 200);
            });

            gameArea.appendChild(target);
            currentTarget = target;
        }

        function endGame() {
            isPlaying = false;
            clearInterval(timerInterval);

            if (currentTarget) {
                currentTarget.remove();
            }

            finalScoreElement.textContent = score;
            gameOverOverlay.classList.add('show');
            startBtn.disabled = false;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
