<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouldering Climb - ボルダリングゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 500px;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            border-left: 10px solid #8B4513;
            border-right: 10px solid #8B4513;
            overflow: hidden;
        }

        .mountain {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100%;
            background: linear-gradient(135deg, #696969 0%, #808080 50%, #A9A9A9 100%);
        }

        #gameCanvas {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .ui {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
            color: #1a1a2e;
        }

        .score {
            font-size: 48px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .label {
            font-size: 16px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .timer {
            font-size: 32px;
            margin-top: 10px;
            color: #e74c3c;
            font-weight: bold;
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            color: white;
        }

        .game-over.active {
            display: flex;
        }

        .game-over h2 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .game-over p {
            font-size: 24px;
            margin-bottom: 30px;
        }

        .game-over button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .game-over button:hover {
            transform: scale(1.05);
        }

        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .start-screen.hidden {
            display: none;
        }

        .start-screen h1 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        .start-screen p {
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .start-screen button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            z-index: 150;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="mountain"></div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="ui">
        <div class="label">高さ</div>
        <div class="score" id="score">0m</div>
        <div class="timer" id="timer">60s</div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="start-screen" id="startScreen">
        <h1>🧗 Bouldering Climb</h1>
        <p>
            ホールドをタップして登ろう！<br>
            60秒でどこまで登れるかな？
        </p>
        <button onclick="startGame()">スタート</button>
    </div>

    <div class="game-over" id="gameOver">
        <h2>🎉 完了！</h2>
        <p>登れた高さ: <span id="finalScore">0</span>m</p>
        <button onclick="restartGame()">もう一度</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreDisplay = document.getElementById('finalScore');

        let width, height;
        let player = { x: 0, y: 0, radius: 20 };
        let holds = [];
        let score = 0;
        let timeLeft = 60;
        let gameRunning = false;
        let timerInterval;

        function resize() {
            const container = document.getElementById('gameContainer');
            width = canvas.width = container.clientWidth;
            height = canvas.height = container.clientHeight;
        }

        function generateHolds() {
            holds = [];
            const holdCount = 30 + Math.floor(Math.random() * 20);
            const minDistance = 60;
            const maxDistance = 150;

            let lastHold = {
                x: width / 2,
                y: height - 80,
                radius: 30
            };
            holds.push(lastHold);

            player.x = lastHold.x;
            player.y = lastHold.y;

            for (let i = 1; i < holdCount; i++) {
                let newHold;
                let attempts = 0;
                const maxAttempts = 50;

                do {
                    const angle = Math.random() * Math.PI * 2;
                    const distance = minDistance + Math.random() * (maxDistance - minDistance);

                    newHold = {
                        x: lastHold.x + Math.cos(angle) * distance,
                        y: lastHold.y - (20 + Math.random() * 40),
                        radius: 25 + Math.random() * 15
                    };

                    newHold.x = Math.max(newHold.radius + 10, Math.min(width - newHold.radius - 10, newHold.x));
                    newHold.y = Math.max(newHold.radius + 10, Math.min(height - 100, newHold.y));

                    attempts++;
                } while (attempts < maxAttempts && (newHold.y > height - 120 || newHold.y < 50));

                holds.push(newHold);
                lastHold = newHold;

                if (lastHold.y < 80) break;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // ホールドを描画
            holds.forEach((hold, index) => {
                const gradient = ctx.createRadialGradient(
                    hold.x - hold.radius * 0.3,
                    hold.y - hold.radius * 0.3,
                    0,
                    hold.x,
                    hold.y,
                    hold.radius
                );
                gradient.addColorStop(0, '#4a90d9');
                gradient.addColorStop(0.7, '#2c5aa0');
                gradient.addColorStop(1, '#1a3a6e');

                ctx.beginPath();
                ctx.arc(hold.x, hold.y, hold.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 3;
                ctx.stroke();

                // ハイライト
                ctx.beginPath();
                ctx.arc(hold.x - hold.radius * 0.3, hold.y - hold.radius * 0.3, hold.radius * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.fill();
            });

            // プレイヤーを描画
            const playerGradient = ctx.createRadialGradient(
                player.x - player.radius * 0.3,
                player.y - player.radius * 0.3,
                0,
                player.x,
                player.y,
                player.radius
            );
            playerGradient.addColorStop(0, '#ff6b6b');
            playerGradient.addColorStop(0.7, '#ee5a5a');
            playerGradient.addColorStop(1, '#c0392b');

            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = playerGradient;
            ctx.fill();

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 3;
            ctx.stroke();

            // プレイヤーの目
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(player.x - 5, player.y - 3, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(player.x + 5, player.y - 3, 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath();
            ctx.arc(player.x - 5, player.y - 3, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(player.x + 5, player.y - 3, 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function handleClick(e) {
            if (!gameRunning) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // 最も近いホールドを探す
            let closestHold = null;
            let closestDistance = Infinity;

            holds.forEach(hold => {
                const distance = Math.sqrt((x - hold.x) ** 2 + (y - hold.y) ** 2);
                if (distance < closestDistance && distance < hold.radius + 20) {
                    closestDistance = distance;
                    closestHold = hold;
                }
            });

            // 現在の位置からの距離をチェック
            if (closestHold) {
                const distanceFromPlayer = Math.sqrt(
                    (closestHold.x - player.x) ** 2 +
                    (closestHold.y - player.y) ** 2
                );

                // 到達可能な距離かチェック
                if (distanceFromPlayer < 200) {
                    // プレイヤーを移動
                    player.x = closestHold.x;
                    player.y = closestHold.y;

                    // スコアを更新（高さ）
                    const heightMeters = Math.max(0, Math.floor((height - player.y - 50) / 20));
                    score = Math.max(score, heightMeters);
                    scoreDisplay.textContent = score + 'm';

                    draw();
                }
            }
        }

        function updateTimer() {
            timeLeft--;
            timerDisplay.textContent = timeLeft + 's';

            if (timeLeft <= 0) {
                endGame();
            } else if (timeLeft <= 10) {
                timerDisplay.style.color = '#e74c3c';
                timerDisplay.style.fontSize = '40px';
            }
        }

        function startGame() {
            startScreen.classList.add('hidden');
            gameOverScreen.classList.remove('active');
            score = 0;
            timeLeft = 60;
            scoreDisplay.textContent = '0m';
            timerDisplay.textContent = '60s';
            timerDisplay.style.color = '#e74c3c';
            timerDisplay.style.fontSize = '32px';
            gameRunning = true;

            resize();
            generateHolds();
            draw();

            timerInterval = setInterval(updateTimer, 1000);
        }

        function endGame() {
            gameRunning = false;
            clearInterval(timerInterval);
            finalScoreDisplay.textContent = score;
            gameOverScreen.classList.add('active');
        }

        function restartGame() {
            startGame();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        canvas.addEventListener('click', handleClick);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleClick(touch);
        });

        window.addEventListener('resize', () => {
            resize();
            if (gameRunning) draw();
        });

        resize();
    </script>
</body>
</html>
