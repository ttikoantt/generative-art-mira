<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timing Perfect - Game 834</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        
        canvas {
            display: block;
        }
        
        .ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 16px;
            pointer-events: none;
        }
        
        .score {
            font-size: 24px;
            font-weight: bold;
        }
        
        .combo {
            font-size: 20px;
            color: #ffdd00;
        }
        
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            pointer-events: auto;
        }
        
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .message.show {
            opacity: 1;
        }
        
        .tutorial {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="ui">
        <div class="score">Score: <span id="score">0</span></div>
        <div class="combo" id="combo"></div>
    </div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    <div class="message" id="message"></div>
    <div class="tutorial">タップで円が止まるタイミングを合わせて！</div>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const comboEl = document.getElementById('combo');
        const messageEl = document.getElementById('message');
        
        let width, height;
        let circles = [];
        let score = 0;
        let combo = 0;
        let gameActive = true;
        let spawnTimer = 0;
        let spawnInterval = 120;
        
        const MESSAGES = {
            perfect: 'PERFECT!',
            great: 'GREAT!',
            good: 'GOOD',
            miss: 'MISS'
        };
        
        const COLORS = {
            perfect: '#ffdd00',
            great: '#00ff88',
            good: '#00aaff',
            miss: '#ff4444'
        };
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        class Circle {
            constructor() {
                this.maxRadius = Math.min(width, height) * 0.35;
                this.x = width / 2;
                this.y = height / 2;
                this.radius = this.maxRadius;
                this.shrinkSpeed = 2;
                this.targetRadius = this.maxRadius * 0.1;
                this.hue = Math.random() * 360;
                this.active = true;
                this.pulsePhase = 0;
            }
            
            update() {
                if (!this.active) return;
                
                this.radius -= this.shrinkSpeed;
                this.pulsePhase += 0.1;
                
                if (this.radius <= this.targetRadius) {
                    this.active = false;
                    showMessage('miss', COLORS.miss);
                    combo = 0;
                    updateUI();
                }
            }
            
            draw() {
                if (!this.active) return;
                
                const pulse = Math.sin(this.pulsePhase) * 5;
                const ratio = this.radius / this.maxRadius;
                
                // Outer circle (shrinking)
                ctx.beginPath();
                ctx.strokeStyle = `hsla(${this.hue}, 70%, 60%, 0.8)`;
                ctx.lineWidth = 3;
                ctx.arc(this.x, this.y, this.radius + pulse, 0, Math.PI * 2);
                ctx.stroke();
                
                // Target circle
                ctx.beginPath();
                ctx.strokeStyle = `hsla(${(this.hue + 180) % 360}, 70%, 60%, 0.5)`;
                ctx.lineWidth = 2;
                ctx.arc(this.x, this.y, this.targetRadius, 0, Math.PI * 2);
                ctx.stroke();
                
                // Perfect zone indicator
                const perfectZone = this.targetRadius * 1.2;
                ctx.beginPath();
                ctx.strokeStyle = `hsla(${this.hue}, 80%, 70%, ${0.3 + (1 - ratio) * 0.3})`;
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 5]);
                ctx.arc(this.x, this.y, perfectZone, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
                
                // Fill with gradient
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 70%, 60%, 0.1)`);
                gradient.addColorStop(1, `hsla(${this.hue}, 70%, 40%, 0.05)`);
                
                ctx.beginPath();
                ctx.fillStyle = gradient;
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
            
            checkTap() {
                if (!this.active) return null;
                
                const diff = Math.abs(this.radius - this.targetRadius);
                const tolerance = this.targetRadius * 0.5;
                
                this.active = false;
                
                if (diff < tolerance * 0.2) {
                    return 'perfect';
                } else if (diff < tolerance * 0.5) {
                    return 'great';
                } else if (diff < tolerance) {
                    return 'good';
                } else {
                    return 'miss';
                }
            }
        }
        
        function showMessage(text, color) {
            messageEl.textContent = text;
            messageEl.style.color = color;
            messageEl.classList.add('show');
            
            setTimeout(() => {
                messageEl.classList.remove('show');
            }, 500);
        }
        
        function updateUI() {
            scoreEl.textContent = score;
            comboEl.textContent = combo > 1 ? `Combo: ${combo}` : '';
        }
        
        function handleTap() {
            if (!gameActive) return;
            
            if (circles.length > 0) {
                const circle = circles[0];
                const result = circle.checkTap();
                
                if (result === 'perfect') {
                    score += 100 * (1 + combo * 0.1);
                    combo++;
                    showMessage('PERFECT!', COLORS.perfect);
                } else if (result === 'great') {
                    score += 50 * (1 + combo * 0.05);
                    combo++;
                    showMessage('GREAT!', COLORS.great);
                } else if (result === 'good') {
                    score += 25;
                    combo++;
                    showMessage('GOOD', COLORS.good);
                } else {
                    combo = 0;
                    showMessage('MISS', COLORS.miss);
                }
                
                updateUI();
            }
        }
        
        function spawnCircle() {
            if (circles.length < 3) {
                circles.push(new Circle());
            }
        }
        
        function animate() {
            // Clear with trail effect
            ctx.fillStyle = 'rgba(10, 10, 15, 0.3)';
            ctx.fillRect(0, 0, width, height);
            
            // Spawn circles
            spawnTimer++;
            if (spawnTimer >= spawnInterval) {
                spawnCircle();
                spawnTimer = 0;
                
                // Gradually increase difficulty
                if (spawnInterval > 60) {
                    spawnInterval -= 0.5;
                }
            }
            
            // Update and draw circles
            circles.forEach(circle => {
                circle.update();
                circle.draw();
            });
            
            // Remove inactive circles
            circles = circles.filter(c => c.active || c.radius > c.targetRadius);
            
            requestAnimationFrame(animate);
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        // Event listeners
        canvas.addEventListener('click', handleTap);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleTap();
        });
        
        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleTap();
            }
        });
        
        // Initialize
        resize();
        window.addEventListener('resize', resize);
        
        // Start game
        setTimeout(() => {
            spawnCircle();
        }, 1000);
        
        animate();
    </script>
</body>
</html>
