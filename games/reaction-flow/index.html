<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Reaction Flow - 反応の流れ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            touch-action: manipulation;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .title {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .score {
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .high-score {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-top: 5px;
        }

        .game-area {
            position: relative;
            width: min(400px, 90vw);
            height: min(400px, 90vw);
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .circle:active {
            transform: scale(0.95);
        }

        .target-ring {
            position: absolute;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5),
                        inset 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .center-circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, #ff6b6b, #ee5a24);
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.8),
                        inset 0 0 20px rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .center-circle:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(255, 107, 107, 1),
                        inset 0 0 20px rgba(255, 255, 255, 0.7);
        }

        .center-circle.success {
            background: radial-gradient(circle, #26de81, #20bf6b);
            box-shadow: 0 0 40px rgba(38, 222, 129, 1),
                        inset 0 0 20px rgba(255, 255, 255, 0.7);
        }

        .center-circle.miss {
            background: radial-gradient(circle, #eb4d4b, #c23616);
            box-shadow: 0 0 40px rgba(235, 77, 75, 1),
                        inset 0 0 20px rgba(0, 0, 0, 0.3);
        }

        .timer-bar {
            width: min(400px, 90vw);
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 30px;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #26de81, #20bf6b);
            border-radius: 3px;
            transition: width 0.1s linear;
        }

        .timer-fill.warning {
            background: linear-gradient(90deg, #feca57, #ff9f43);
        }

        .timer-fill.danger {
            background: linear-gradient(90deg, #ff6b6b, #ee5a24);
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 100;
        }

        .message.show {
            opacity: 1;
        }

        .combo {
            position: fixed;
            top: 150px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            font-weight: bold;
            color: #feca57;
            text-shadow: 0 0 10px rgba(254, 202, 87, 0.8);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .combo.show {
            opacity: 1;
            transform: translateX(-50%) scale(1.2);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay h2 {
            font-size: 3rem;
            color: white;
            margin-bottom: 20px;
        }

        .overlay p {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
        }

        .start-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .instructions {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            text-align: center;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 1.5rem;
            }
            .score {
                font-size: 2.5rem;
            }
            .overlay h2 {
                font-size: 2rem;
            }
            .overlay p {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="title">⚡ Reaction Flow</div>
            <div class="score" id="score">0</div>
            <div class="high-score">Best: <span id="highScore">0</span></div>
        </div>

        <div class="game-area" id="gameArea">
            <div class="target-ring" id="targetRing"></div>
            <div class="center-circle" id="centerCircle"></div>
        </div>

        <div class="timer-bar">
            <div class="timer-fill" id="timerFill"></div>
        </div>

        <div class="combo" id="combo"></div>

        <div class="message" id="message"></div>

        <div class="instructions">
            🎯 円が重なった瞬間にタップ！<br>
            速いほど高得点！
        </div>
    </div>

    <div class="overlay" id="overlay">
        <h2 id="overlayTitle">Game Over</h2>
        <p id="overlayScore">Score: 0</p>
        <button class="start-btn" id="startBtn">Start Game</button>
    </div>

    <script>
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const gameArea = document.getElementById('gameArea');
        const targetRing = document.getElementById('targetRing');
        const centerCircle = document.getElementById('centerCircle');
        const timerFill = document.getElementById('timerFill');
        const message = document.getElementById('message');
        const comboEl = document.getElementById('combo');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlayScore = document.getElementById('overlayScore');
        const startBtn = document.getElementById('startBtn');

        let score = 0;
        let highScore = parseInt(localStorage.getItem('reactionFlowHighScore')) || 0;
        let combo = 0;
        let gameRunning = false;
        let animationId = null;
        let currentRadius = 0;
        let targetRadius = 100;
        let shrinkSpeed = 0.8;
        let maxTime = 100;
        let currentTime = 0;
        let phase = 'waiting'; // waiting, shrinking, expanding
        let audioCtx = null;

        highScoreEl.textContent = highScore;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'success') {
                oscillator.type = 'sine';
                const freq = 440 + (combo * 20);
                oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(freq * 1.5, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                oscillator.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'miss') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                oscillator.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'gameover') {
                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.5);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                oscillator.stop(audioCtx.currentTime + 0.5);
            }

            oscillator.start();
        }

        function showMessage(text) {
            message.textContent = text;
            message.classList.add('show');
            setTimeout(() => message.classList.remove('show'), 500);
        }

        function showCombo() {
            if (combo >= 2) {
                comboEl.textContent = `${combo}x Combo!`;
                comboEl.classList.add('show');
                setTimeout(() => comboEl.classList.remove('show'), 800);
            }
        }

        function updateTimer() {
            const percentage = (currentTime / maxTime) * 100;
            timerFill.style.width = percentage + '%';

            timerFill.classList.remove('warning', 'danger');
            if (percentage < 30) {
                timerFill.classList.add('danger');
            } else if (percentage < 60) {
                timerFill.classList.add('warning');
            }
        }

        function startGame() {
            initAudio();
            score = 0;
            combo = 0;
            gameRunning = true;
            currentTime = maxTime;
            shrinkSpeed = 0.8;
            scoreEl.textContent = score;
            overlay.classList.remove('show');

            currentRadius = gameArea.offsetWidth / 2 - 20;
            targetRadius = gameArea.offsetWidth / 2 - 20;
            phase = 'shrinking';
            currentTime = maxTime;

            gameLoop();
        }

        function endGame() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            playSound('gameover');

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('reactionFlowHighScore', highScore);
                highScoreEl.textContent = highScore;
                overlayTitle.textContent = '🎉 New High Score!';
            } else {
                overlayTitle.textContent = 'Game Over';
            }

            overlayScore.textContent = `Score: ${score}`;
            overlay.classList.add('show');
        }

        function checkHit() {
            const ringRadius = targetRadius;
            const circleRadius = currentRadius;
            const difference = Math.abs(ringRadius - circleRadius);
            const tolerance = 20;

            if (difference < tolerance) {
                // Success
                const points = Math.floor((tolerance - difference) * 10) + 10;
                score += points + (combo * 5);
                combo++;
                scoreEl.textContent = score;

                showMessage(`+${points + (combo * 5)}`);
                showCombo();
                playSound('success');
                centerCircle.classList.add('success');
                setTimeout(() => centerCircle.classList.remove('success'), 200);

                // Increase difficulty
                currentTime = Math.min(currentTime + 5, maxTime);
                shrinkSpeed = Math.min(shrinkSpeed + 0.05, 2.5);

                // Reset
                currentRadius = gameArea.offsetWidth / 2 - 20;
                phase = 'shrinking';
            } else {
                // Miss
                combo = 0;
                showMessage('Miss!');
                playSound('miss');
                centerCircle.classList.add('miss');
                setTimeout(() => centerCircle.classList.remove('miss'), 200);
            }
        }

        function handleClick() {
            if (!gameRunning) return;

            if (phase === 'shrinking') {
                checkHit();
            }
        }

        function gameLoop() {
            if (!gameRunning) return;

            const gameWidth = gameArea.offsetWidth;
            const gameHeight = gameArea.offsetHeight;
            const centerX = gameWidth / 2;
            const centerY = gameHeight / 2;

            // Update target ring
            targetRing.style.width = (targetRadius * 2) + 'px';
            targetRing.style.height = (targetRadius * 2) + 'px';
            targetRing.style.left = (centerX - targetRadius) + 'px';
            targetRing.style.top = (centerY - targetRadius) + 'px';

            // Update center circle
            centerCircle.style.width = (currentRadius * 2) + 'px';
            centerCircle.style.height = (currentRadius * 2) + 'px';
            centerCircle.style.left = (centerX - currentRadius) + 'px';
            centerCircle.style.top = (centerY - currentRadius) + 'px';

            // Shrink logic
            if (phase === 'shrinking') {
                currentRadius -= shrinkSpeed;
                currentTime -= 0.1;
                updateTimer();

                if (currentRadius <= 0 || currentTime <= 0) {
                    // Missed the timing
                    combo = 0;
                    currentTime -= 10;
                    playSound('miss');

                    if (currentTime <= 0) {
                        endGame();
                        return;
                    }

                    // Reset
                    currentRadius = gameWidth / 2 - 20;
                }
            }

            animationId = requestAnimationFrame(gameLoop);
        }

        // Event listeners
        centerCircle.addEventListener('click', handleClick);
        centerCircle.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick();
        });

        startBtn.addEventListener('click', startGame);

        // Initial setup
        const gameWidth = gameArea.offsetWidth;
        const gameHeight = gameArea.offsetHeight;

        targetRadius = gameWidth / 2 - 20;
        currentRadius = gameWidth / 2 - 20;

        targetRing.style.width = (targetRadius * 2) + 'px';
        targetRing.style.height = (targetRadius * 2) + 'px';
        targetRing.style.left = (gameWidth / 2 - targetRadius) + 'px';
        targetRing.style.top = (gameHeight / 2 - targetRadius) + 'px';

        centerCircle.style.width = (currentRadius * 2) + 'px';
        centerCircle.style.height = (currentRadius * 2) + 'px';
        centerCircle.style.left = (gameWidth / 2 - currentRadius) + 'px';
        centerCircle.style.top = (gameHeight / 2 - currentRadius) + 'px';

        // Show start overlay
        overlayTitle.textContent = '⚡ Reaction Flow';
        overlayScore.textContent = 'Click Start to Play';
        overlay.classList.add('show');
    </script>
</body>
</html>
