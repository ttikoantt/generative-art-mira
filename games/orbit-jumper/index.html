<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Orbit Jumper - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            touch-action: manipulation;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            height: 100vh;
            max-width: 600px;
            display: flex;
            flex-direction: column;
        }

        #gameCanvas {
            flex: 1;
            display: block;
            background: radial-gradient(circle at center, #1a1a3e 0%, #0a0a1e 100%);
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .score-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .fullscreen-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            pointer-events: auto;
        }

        .fullscreen-btn:hover, .fullscreen-btn:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        #gameOverScreen {
            display: none;
        }

        .title {
            font-size: 48px;
            font-weight: bold;
            color: white;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.8);
            text-align: center;
        }

        .subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
            text-align: center;
        }

        .start-btn, .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            pointer-events: auto;
        }

        .start-btn:hover, .start-btn:active,
        .restart-btn:hover, .restart-btn:active {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.6);
        }

        .instructions {
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            font-size: 14px;
            line-height: 1.6;
        }

        .final-score {
            font-size: 36px;
            color: #667eea;
            margin: 20px 0;
            font-weight: bold;
        }

        .high-score {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>

        <div id="ui">
            <div class="score-container">🌟 <span id="score">0</span></div>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
        </div>

        <div id="startScreen">
            <div class="title">🪐 Orbit Jumper</div>
            <div class="subtitle">重力圏を飛び越えろ！</div>
            <button class="start-btn" onclick="startGame()">スタート</button>
            <div class="instructions">
                タップでジャンプ<br>
                重力圏の間を飛び移ろう<br>
                隕石にぶつかるな！
            </div>
        </div>

        <div id="gameOverScreen">
            <div class="title">ゲームオーバー</div>
            <div class="final-score">スコア: <span id="finalScore">0</span></div>
            <div class="high-score">🏆 ハイスコア: <span id="highScore">0</span></div>
            <button class="restart-btn" onclick="restartGame()">もう一度</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let score = 0;
        let highScore = localStorage.getItem('orbitJumperHighScore') || 0;
        let gameRunning = false;
        let gameSpeed = 1;
        let lastTime = 0;

        // プレイヤー
        let player = {
            x: 100,
            y: 0,
            vy: 0,
            radius: 15,
            rotation: 0
        };

        // 重力定数
        const GRAVITY = 0.3;
        const JUMP_FORCE = -10;
        const MAX_FALL = 12;

        // 重力圏
        let gravityZones = [];
        let zoneSpawnTimer = 0;

        // 隕石
        let meteors = [];
        let meteorSpawnTimer = 0;

        // 星
        let stars = [];
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * 1000,
                y: Math.random() * 1000,
                radius: Math.random() * 1.5 + 0.5,
                speed: Math.random() * 0.5 + 0.2
            });
        }

        function resize() {
            const container = document.getElementById('gameContainer');
            width = canvas.width = container.clientWidth;
            height = canvas.height = container.clientHeight;
            player.y = height / 2;
        }

        window.addEventListener('resize', resize);
        resize();

        function spawnGravityZone() {
            const gap = 120 + Math.random() * 100;
            const topHeight = Math.random() * (height - gap - 100) + 50;

            gravityZones.push({
                x: width + 50,
                topHeight: topHeight,
                bottomY: topHeight + gap,
                width: 60,
                type: Math.random() > 0.5 ? 'attract' : 'repel'
            });
        }

        function spawnMeteor() {
            meteors.push({
                x: width + 50,
                y: Math.random() * (height - 100) + 50,
                radius: 10 + Math.random() * 15,
                speed: 3 + Math.random() * 2,
                rotation: 0,
                rotationSpeed: (Math.random() - 0.5) * 0.2
            });
        }

        function resetGame() {
            player.x = 100;
            player.y = height / 2;
            player.vy = 0;
            player.rotation = 0;

            gravityZones = [];
            meteors = [];
            score = 0;
            gameSpeed = 1;
            zoneSpawnTimer = 0;
            meteorSpawnTimer = 0;

            document.getElementById('score').textContent = '0';
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            resetGame();
            gameRunning = true;
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function restartGame() {
            startGame();
        }

        function gameOver() {
            gameRunning = false;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('orbitJumperHighScore', highScore);
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('highScore').textContent = highScore;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        function jump() {
            if (!gameRunning) return;
            player.vy = JUMP_FORCE;
        }

        // タッチ操作
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });

        canvas.addEventListener('click', () => {
            jump();
        });

        // スペースキー
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameRunning) {
                    jump();
                } else {
                    startGame();
                }
            }
        });

        function update(deltaTime) {
            const dt = deltaTime / 16.67; // 60fps基準

            // プレイヤー更新
            player.vy += GRAVITY * dt;
            player.vy = Math.min(player.vy, MAX_FALL * dt);
            player.y += player.vy * dt;
            player.rotation += player.vy * 0.02 * dt;

            // 境界チェック
            if (player.y - player.radius < 0) {
                player.y = player.radius;
                player.vy = 0;
            }
            if (player.y + player.radius > height) {
                player.y = height - player.radius;
                player.vy = 0;
            }

            // 重力圏生成
            zoneSpawnTimer += deltaTime;
            if (zoneSpawnTimer > 2000 / gameSpeed) {
                spawnGravityZone();
                zoneSpawnTimer = 0;
            }

            // 重力圏更新
            for (let i = gravityZones.length - 1; i >= 0; i--) {
                const zone = gravityZones[i];
                zone.x -= 3 * gameSpeed * dt;

                // 重力の影響
                const dx = player.x - (zone.x + zone.width / 2);
                const dy = player.y - (zone.topHeight + zone.bottomY) / 2;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 150) {
                    const force = (150 - dist) / 150 * 0.3;
                    if (zone.type === 'attract') {
                        player.vy += dy * force * 0.01 * dt;
                    } else {
                        player.vy -= dy * force * 0.01 * dt;
                    }
                }

                // スコア更新
                if (!zone.passed && zone.x + zone.width < player.x) {
                    zone.passed = true;
                    score += 10;
                    document.getElementById('score').textContent = score;
                    gameSpeed = 1 + score * 0.005;
                }

                // 削除
                if (zone.x + zone.width < 0) {
                    gravityZones.splice(i, 1);
                }
            }

            // 隕石生成
            meteorSpawnTimer += deltaTime;
            if (meteorSpawnTimer > 3000 / gameSpeed) {
                spawnMeteor();
                meteorSpawnTimer = 0;
            }

            // 隕石更新
            for (let i = meteors.length - 1; i >= 0; i--) {
                const meteor = meteors[i];
                meteor.x -= meteor.speed * gameSpeed * dt;
                meteor.rotation += meteor.rotationSpeed * dt;

                // 衝突判定
                const dx = player.x - meteor.x;
                const dy = player.y - meteor.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < player.radius + meteor.radius - 5) {
                    gameOver();
                    return;
                }

                // 削除
                if (meteor.x + meteor.radius < 0) {
                    meteors.splice(i, 1);
                }
            }

            // 星更新
            for (let star of stars) {
                star.x -= star.speed * gameSpeed * dt;
                if (star.x < 0) {
                    star.x = width;
                    star.y = Math.random() * height;
                }
            }
        }

        function draw() {
            // クリア
            ctx.clearRect(0, 0, width, height);

            // 星
            ctx.fillStyle = 'white';
            for (let star of stars) {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fill();
            }

            // 重力圏
            for (let zone of gravityZones) {
                // 上部
                const topGradient = ctx.createRadialGradient(
                    zone.x + zone.width / 2, 0, 0,
                    zone.x + zone.width / 2, 0, zone.topHeight
                );
                if (zone.type === 'attract') {
                    topGradient.addColorStop(0, 'rgba(100, 200, 255, 0.4)');
                    topGradient.addColorStop(1, 'rgba(100, 200, 255, 0)');
                } else {
                    topGradient.addColorStop(0, 'rgba(255, 100, 150, 0.4)');
                    topGradient.addColorStop(1, 'rgba(255, 100, 150, 0)');
                }
                ctx.fillStyle = topGradient;
                ctx.fillRect(zone.x, 0, zone.width, zone.topHeight);

                // 下部
                const bottomGradient = ctx.createRadialGradient(
                    zone.x + zone.width / 2, height, 0,
                    zone.x + zone.width / 2, height, height - zone.bottomY
                );
                if (zone.type === 'attract') {
                    bottomGradient.addColorStop(0, 'rgba(100, 200, 255, 0.4)');
                    bottomGradient.addColorStop(1, 'rgba(100, 200, 255, 0)');
                } else {
                    bottomGradient.addColorStop(0, 'rgba(255, 100, 150, 0.4)');
                    bottomGradient.addColorStop(1, 'rgba(255, 100, 150, 0)');
                }
                ctx.fillStyle = bottomGradient;
                ctx.fillRect(zone.x, zone.bottomY, zone.width, height - zone.bottomY);
            }

            // 隕石
            for (let meteor of meteors) {
                ctx.save();
                ctx.translate(meteor.x, meteor.y);
                ctx.rotate(meteor.rotation);

                // 本体
                const meteorGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, meteor.radius);
                meteorGradient.addColorStop(0, '#ff6b6b');
                meteorGradient.addColorStop(0.5, '#c92a2a');
                meteorGradient.addColorStop(1, '#641e16');
                ctx.fillStyle = meteorGradient;
                ctx.beginPath();
                ctx.arc(0, 0, meteor.radius, 0, Math.PI * 2);
                ctx.fill();

                // クレーター
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.beginPath();
                ctx.arc(meteor.radius * 0.3, -meteor.radius * 0.2, meteor.radius * 0.2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(-meteor.radius * 0.2, meteor.radius * 0.3, meteor.radius * 0.15, 0, Math.PI * 2);
                ctx.fill();

                // トレイル
                ctx.fillStyle = 'rgba(255, 150, 50, 0.3)';
                ctx.beginPath();
                ctx.arc(meteor.radius * 1.5, 0, meteor.radius * 0.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(meteor.radius * 2.2, 0, meteor.radius * 0.3, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }

            // プレイヤー
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.rotation);

            // 本体
            const playerGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, player.radius);
            playerGradient.addColorStop(0, '#74b9ff');
            playerGradient.addColorStop(0.7, '#0984e3');
            playerGradient.addColorStop(1, '#2d3436');
            ctx.fillStyle = playerGradient;
            ctx.beginPath();
            ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
            ctx.fill();

            // 目
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(5, -3, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#2d3436';
            ctx.beginPath();
            ctx.arc(6, -3, 2, 0, Math.PI * 2);
            ctx.fill();

            // 光沢
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.beginPath();
            ctx.arc(-3, -3, 3, 0, Math.PI * 2);
            ctx.fill();

            // ジェット
            if (Math.abs(player.vy) > 1) {
                const jetLength = Math.abs(player.vy) * 2;
                const jetGradient = ctx.createLinearGradient(0, player.radius, 0, player.radius + jetLength);
                jetGradient.addColorStop(0, 'rgba(255, 200, 50, 0.8)');
                jetGradient.addColorStop(1, 'rgba(255, 100, 50, 0)');
                ctx.fillStyle = jetGradient;
                ctx.beginPath();
                ctx.moveTo(-5, player.radius);
                ctx.lineTo(0, player.radius + jetLength);
                ctx.lineTo(5, player.radius);
                ctx.fill();
            }

            ctx.restore();
        }

        function gameLoop(currentTime) {
            if (!gameRunning) return;

            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            update(deltaTime);
            draw();

            requestAnimationFrame(gameLoop);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期描画
        resize();
        draw();
    </script>
</body>
</html>
