<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Orbit Jumper - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        canvas {
            display: block;
        }

        .ui {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 100;
        }

        .score {
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.8);
        }

        .high-score {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 5px;
        }

        .instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            text-align: center;
            z-index: 100;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            z-index: 100;
            display: none;
        }

        .game-over h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(255, 100, 100, 0.8);
        }

        .game-over p {
            font-size: 20px;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.8);
        }

        .game-over button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .game-over button:hover {
            transform: scale(1.05);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="ui">
        <div class="score" id="score">0</div>
        <div class="high-score" id="highScore">High Score: 0</div>
    </div>

    <div class="instructions" id="instructions">Tap or press SPACE to jump between orbits</div>

    <div class="game-over" id="gameOver">
        <h1>Game Over</h1>
        <p>Score: <span id="finalScore">0</span></p>
        <button onclick="restartGame()">Play Again</button>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        let score = 0;
        let highScore = localStorage.getItem('orbitJumperHighScore') || 0;
        let gameOver = false;
        let gameStarted = false;

        // Orbits
        const orbits = [];
        const orbitCount = 3;
        let currentOrbit = 0; // 0 = innermost

        // Player
        const player = {
            angle: 0,
            speed: 0.02,
            radius: 15,
            color: '#64c8ff'
        };

        // Obstacles
        const obstacles = [];
        let obstacleSpawnTimer = 0;

        // Particles
        const particles = [];

        // Resize
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;

            // Recalculate orbits
            orbits.length = 0;
            const baseRadius = Math.min(width, height) * 0.15;
            for (let i = 0; i < orbitCount; i++) {
                orbits.push(baseRadius * (i + 1));
            }
        }
        resize();
        window.addEventListener('resize', resize);

        // Particle class
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.02;
                this.size = 3 + Math.random() * 4;
                this.color = color;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = this.color.replace(')', `, ${this.life})`).replace('rgb', 'rgba');
                ctx.fill();
            }
        }

        // Create explosion
        function createExplosion(x, y, color) {
            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        // Spawn obstacle
        function spawnObstacle() {
            const orbit = Math.floor(Math.random() * orbitCount);
            const angle = Math.random() * Math.PI * 2;
            obstacles.push({
                orbit: orbit,
                angle: angle,
                radius: 20,
                speed: 0.01 + Math.random() * 0.02,
                color: '#ff6b6b'
            });
        }

        // Jump to next orbit
        function jump() {
            if (gameOver) return;

            if (!gameStarted) {
                gameStarted = true;
                document.getElementById('instructions').style.display = 'none';
            }

            currentOrbit = (currentOrbit + 1) % orbitCount;

            // Create jump effect
            const playerX = centerX + Math.cos(player.angle) * orbits[currentOrbit];
            const playerY = centerY + Math.sin(player.angle) * orbits[currentOrbit];
            createExplosion(playerX, playerY, 'rgb(100, 200, 255)');
        }

        // Check collision
        function checkCollision() {
            const playerRadius = orbits[currentOrbit];

            for (let obstacle of obstacles) {
                if (obstacle.orbit === currentOrbit) {
                    const angleDiff = Math.abs(player.angle - obstacle.angle);
                    const minDiff = Math.min(angleDiff, Math.PI * 2 - angleDiff);

                    if (minDiff < 0.15) {
                        return true;
                    }
                }
            }
            return false;
        }

        // Game over
        function endGame() {
            gameOver = true;

            const playerX = centerX + Math.cos(player.angle) * orbits[currentOrbit];
            const playerY = centerY + Math.sin(player.angle) * orbits[currentOrbit];
            createExplosion(playerX, playerY, 'rgb(255, 100, 100)');

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('orbitJumperHighScore', highScore);
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }

        // Restart game
        function restartGame() {
            score = 0;
            gameOver = false;
            gameStarted = false;
            currentOrbit = 0;
            player.angle = 0;
            obstacles.length = 0;
            particles.length = 0;
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('instructions').style.display = 'block';
            document.getElementById('score').textContent = '0';
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameOver) {
                    restartGame();
                } else {
                    jump();
                }
            }
        });

        canvas.addEventListener('click', () => {
            if (gameOver) {
                restartGame();
            } else {
                jump();
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameOver) {
                restartGame();
            } else {
                jump();
            }
        });

        // Fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Update high score display
        document.getElementById('highScore').textContent = `High Score: ${highScore}`;

        // Game loop
        function update() {
            if (gameOver) {
                // Update particles only
                for (let i = particles.length - 1; i >= 0; i--) {
                    particles[i].update();
                    if (particles[i].life <= 0) {
                        particles.splice(i, 1);
                    }
                }
                return;
            }

            if (!gameStarted) return;

            // Update player
            player.angle += player.speed;

            // Spawn obstacles
            obstacleSpawnTimer++;
            if (obstacleSpawnTimer > 100 - Math.min(score, 60)) {
                spawnObstacle();
                obstacleSpawnTimer = 0;
            }

            // Update obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].angle += obstacles[i].speed;

                // Remove old obstacles
                if (obstacles[i].angle > Math.PI * 2) {
                    obstacles.splice(i, 1);
                    score++;
                    document.getElementById('score').textContent = score;
                }
            }

            // Check collision
            if (checkCollision()) {
                endGame();
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function draw() {
            // Clear
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, width, height);

            // Draw orbits
            for (let i = 0; i < orbits.length; i++) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, orbits[i], 0, Math.PI * 2);
                ctx.strokeStyle = i === currentOrbit ? 'rgba(100, 200, 255, 0.3)' : 'rgba(100, 200, 255, 0.1)';
                ctx.lineWidth = i === currentOrbit ? 3 : 2;
                ctx.stroke();
            }

            // Draw obstacles
            for (let obstacle of obstacles) {
                const x = centerX + Math.cos(obstacle.angle) * orbits[obstacle.orbit];
                const y = centerY + Math.sin(obstacle.angle) * orbits[obstacle.orbit];

                ctx.beginPath();
                ctx.arc(x, y, obstacle.radius, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, obstacle.radius);
                gradient.addColorStop(0, '#ff8a8a');
                gradient.addColorStop(1, '#ff4444');
                ctx.fillStyle = gradient;
                ctx.fill();

                // Glow
                ctx.shadowColor = '#ff4444';
                ctx.shadowBlur = 20;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // Draw player
            if (!gameOver) {
                const playerX = centerX + Math.cos(player.angle) * orbits[currentOrbit];
                const playerY = centerY + Math.sin(player.angle) * orbits[currentOrbit];

                ctx.beginPath();
                ctx.arc(playerX, playerY, player.radius, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(playerX, playerY, 0, playerX, playerY, player.radius);
                gradient.addColorStop(0, '#96dcff');
                gradient.addColorStop(1, '#64c8ff');
                ctx.fillStyle = gradient;
                ctx.fill();

                // Glow
                ctx.shadowColor = '#64c8ff';
                ctx.shadowBlur = 25;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // Draw particles
            for (let particle of particles) {
                particle.draw();
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
