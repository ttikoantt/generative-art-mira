<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Color Reflex - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .instruction {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 400px;
            width: 100%;
        }

        .color-btn {
            aspect-ratio: 1;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .color-btn:active {
            transform: scale(0.95);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .color-btn.correct {
            animation: correct 0.5s ease;
        }

        .color-btn.wrong {
            animation: wrong 0.5s ease;
        }

        @keyframes correct {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); box-shadow: 0 0 30px rgba(255,255,255,0.8); }
        }

        @keyframes wrong {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .stats {
            display: flex;
            gap: 30px;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 32px;
        }

        .timer-bar {
            width: 100%;
            max-width: 400px;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #00f260, #0575e6);
            transition: width 0.1s linear;
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 100;
        }

        .game-over h1 {
            color: white;
            font-size: 48px;
        }

        .game-over p {
            color: white;
            font-size: 24px;
        }

        .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .restart-btn:hover {
            transform: scale(1.1);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            z-index: 50;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <div class="game-container">
        <div class="instruction" id="instruction">Tap RED!</div>
        <div class="timer-bar">
            <div class="timer-fill" id="timer-fill"></div>
        </div>
        <div class="color-grid" id="color-grid"></div>
        <div class="stats">
            <div class="stat">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">BEST</div>
                <div class="stat-value" id="best">0</div>
            </div>
        </div>
    </div>

    <div class="game-over hidden" id="game-over">
        <h1>Game Over!</h1>
        <p>Score: <span id="final-score">0</span></p>
        <button class="restart-btn" onclick="restartGame()">Play Again</button>
    </div>

    <script>
        const colors = [
            { name: 'RED', hex: '#e74c3c' },
            { name: 'BLUE', hex: '#3498db' },
            { name: 'GREEN', hex: '#2ecc71' },
            { name: 'YELLOW', hex: '#f1c40f' },
            { name: 'PURPLE', hex: '#9b59b6' },
            { name: 'ORANGE', hex: '#e67e22' },
            { name: 'PINK', hex: '#e91e63' },
            { name: 'CYAN', hex: '#00bcd4' }
        ];

        let score = 0;
        let bestScore = parseInt(localStorage.getItem('colorReflexBest')) || 0;
        let timeLeft = 100;
        let gameInterval;
        let currentTargetColor;
        let isPlaying = false;

        const instructionEl = document.getElementById('instruction');
        const colorGridEl = document.getElementById('color-grid');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const timerFillEl = document.getElementById('timer-fill');
        const gameOverEl = document.getElementById('game-over');
        const finalScoreEl = document.getElementById('final-score');

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function getRandomColors(count) {
            const shuffled = shuffleArray([...colors]);
            return shuffled.slice(0, count);
        }

        function startGame() {
            score = 0;
            timeLeft = 100;
            isPlaying = true;
            scoreEl.textContent = '0';
            bestEl.textContent = bestScore;
            gameOverEl.classList.add('hidden');

            gameInterval = setInterval(() => {
                timeLeft -= 0.5;
                timerFillEl.style.width = timeLeft + '%';

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 50);

            generateColors();
        }

        function generateColors() {
            if (!isPlaying) return;

            const buttonColors = getRandomColors(4);
            currentTargetColor = buttonColors[Math.floor(Math.random() * buttonColors.length)];

            instructionEl.textContent = `Tap ${currentTargetColor.name}!`;
            instructionEl.style.color = currentTargetColor.hex;

            colorGridEl.innerHTML = '';

            buttonColors.forEach(color => {
                const btn = document.createElement('button');
                btn.className = 'color-btn';
                btn.style.background = color.hex;
                btn.textContent = color.name;
                btn.onclick = () => handleTap(color, btn);
                colorGridEl.appendChild(btn);
            });
        }

        function handleTap(color, btn) {
            if (!isPlaying) return;

            if (color.name === currentTargetColor.name) {
                // Correct
                score++;
                scoreEl.textContent = score;
                timeLeft = Math.min(100, timeLeft + 5);
                btn.classList.add('correct');
                setTimeout(() => {
                    btn.classList.remove('correct');
                    generateColors();
                }, 200);
            } else {
                // Wrong
                btn.classList.add('wrong');
                setTimeout(() => {
                    btn.classList.remove('wrong');
                    endGame();
                }, 500);
            }
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameInterval);

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('colorReflexBest', bestScore);
            }

            finalScoreEl.textContent = score;
            gameOverEl.classList.remove('hidden');
        }

        function restartGame() {
            startGame();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Start game
        bestEl.textContent = bestScore;
        startGame();
    </script>
</body>
</html>
