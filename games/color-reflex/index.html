<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>カラーリフレックス - Color Reflex</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .header {
            color: #fff;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 15px;
        }
        .stat {
            background: rgba(255,255,255,0.1);
            padding: 15px 20px;
            border-radius: 10px;
            color: #fff;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        .game-area {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 40px 20px;
            margin-bottom: 20px;
        }
        .color-word {
            font-size: 64px;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
            transition: transform 0.2s;
        }
        .color-word.pop {
            transform: scale(1.1);
        }
        .timer-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ecdc4, #44a08d);
            transition: width 0.1s linear;
        }
        .timer-fill.danger {
            background: linear-gradient(90deg, #ff6b6b, #ee5a6f);
        }
        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            flex: 1;
            min-width: 120px;
            padding: 20px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            color: #fff;
            text-transform: uppercase;
        }
        .btn-yes {
            background: linear-gradient(135deg, #11998e, #38ef7d);
        }
        .btn-yes:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(56, 239, 125, 0.4);
        }
        .btn-no {
            background: linear-gradient(135deg, #eb3349, #f45c43);
        }
        .btn-no:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(244, 92, 67, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .overlay-content {
            text-align: center;
            color: #fff;
            padding: 40px;
        }
        .overlay h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }
        .overlay p {
            font-size: 18px;
            margin-bottom: 30px;
            color: #888;
        }
        .overlay .score {
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .start-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .start-btn:hover {
            transform: scale(1.05);
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            border: 1px solid #333;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            z-index: 1000;
        }
        .fullscreen-btn:hover {
            background: rgba(78, 205, 196, 0.3);
        }
        .hidden {
            display: none;
        }
        .combo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            pointer-events: none;
            opacity: 0;
            transition: all 0.3s;
            z-index: 100;
        }
        .combo.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.2);
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <div class="header">
            <h1>🎨 カラーリフレックス</h1>
            <p style="color: #888; font-size: 14px;">色と言葉が一致してる？</p>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">スコア</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="level">1</div>
                <div class="stat-label">レベル</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="combo">0</div>
                <div class="stat-label">コンボ</div>
            </div>
        </div>

        <div class="game-area">
            <div class="timer-bar">
                <div class="timer-fill" id="timerFill"></div>
            </div>
            <div class="color-word" id="colorWord">準備</div>
            <div class="buttons">
                <button class="btn btn-yes" id="btnYes" onclick="answer(true)" disabled>✓ 一致</button>
                <button class="btn btn-no" id="btnNo" onclick="answer(false)" disabled>✗ 不一致</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="startOverlay">
        <div class="overlay-content">
            <h2>🎨 カラーリフレックス</h2>
            <p>色の名前と実際の色が一致しているか<br>素早く判定しよう！</p>
            <button class="start-btn" onclick="startGame()">スタート</button>
        </div>
    </div>

    <div class="overlay hidden" id="gameOverOverlay">
        <div class="overlay-content">
            <h2>ゲームオーバー</h2>
            <p>最終スコア</p>
            <div class="score" id="finalScore">0</div>
            <p>最高連続コンボ: <span id="maxCombo">0</span></p>
            <button class="start-btn" onclick="startGame()">もう一度</button>
        </div>
    </div>

    <div class="combo" id="comboDisplay"></div>

    <script>
        const colors = [
            { name: 'あか', color: '#ff6b6b' },
            { name: 'あお', color: '#4ecdc4' },
            { name: 'きいろ', color: '#ffe66d' },
            { name: 'みどり', color: '#95e1d3' },
            { name: 'むらさき', color: '#a8e6cf' },
            { name: 'ピンク', color: '#fd79a8' },
            { name: 'オレンジ', color: '#fdcb6e' },
            { name: 'しろ', color: '#dfe6e9' }
        ];

        let score = 0;
        let level = 1;
        let combo = 0;
        let maxCombo = 0;
        let currentMatch = true;
        let timeLeft = 100;
        let timerInterval = null;
        let gameActive = false;

        function getRandomColor() {
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function generateRound() {
            const text = getRandomColor();
            let display;

            if (Math.random() > 0.5) {
                // 一致
                display = text;
                currentMatch = true;
            } else {
                // 不一致
                do {
                    display = getRandomColor();
                } while (display.name === text.name);
                currentMatch = false;
            }

            const colorWord = document.getElementById('colorWord');
            colorWord.textContent = text.name;
            colorWord.style.color = display.color;
            colorWord.classList.add('pop');
            setTimeout(() => colorWord.classList.remove('pop'), 200);

            // レベル上がるほど速く
            const baseTime = 30 - (level - 1) * 2;
            timeLeft = Math.max(baseTime, 10);
        }

        function startGame() {
            score = 0;
            level = 1;
            combo = 0;
            maxCombo = 0;
            gameActive = true;

            updateDisplay();
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');

            document.getElementById('btnYes').disabled = false;
            document.getElementById('btnNo').disabled = false;

            generateRound();
            startTimer();
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                if (!gameActive) return;

                timeLeft -= 0.5;
                updateTimer();

                if (timeLeft <= 0) {
                    gameOver();
                }
            }, 50);
        }

        function updateTimer() {
            const fill = document.getElementById('timerFill');
            fill.style.width = timeLeft + '%';

            if (timeLeft < 30) {
                fill.classList.add('danger');
            } else {
                fill.classList.remove('danger');
            }
        }

        function answer(userSaysMatch) {
            if (!gameActive) return;

            const correct = (userSaysMatch === currentMatch);

            if (correct) {
                combo++;
                if (combo > maxCombo) maxCombo = combo;

                const points = 10 * combo;
                score += points;

                if (combo % 5 === 0) {
                    level++;
                    showCombo('LEVEL UP!');
                }

                updateDisplay();
                generateRound();
            } else {
                combo = 0;
                updateDisplay();
                showCombo('MISS!');
            }
        }

        function showCombo(text) {
            const display = document.getElementById('comboDisplay');
            display.textContent = text;
            display.classList.add('show');
            setTimeout(() => display.classList.remove('show'), 500);
        }

        function updateDisplay() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('combo').textContent = combo;
        }

        function gameOver() {
            gameActive = false;
            clearInterval(timerInterval);

            document.getElementById('btnYes').disabled = true;
            document.getElementById('btnNo').disabled = true;

            document.getElementById('finalScore').textContent = score;
            document.getElementById('maxCombo').textContent = maxCombo;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            if (e.key === 'ArrowLeft' || e.key === 'a') answer(false);
            if (e.key === 'ArrowRight' || e.key === 'd') answer(true);
        });
    </script>
</body>
</html>
