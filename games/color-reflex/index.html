<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Color Reflex - 色の反射神経</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .score-display {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .score-item {
            background: #f0f0f0;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
        }

        .score-label {
            color: #666;
            font-size: 14px;
        }

        .score-value {
            color: #333;
            font-size: 24px;
        }

        .color-word {
            font-size: 48px;
            font-weight: bold;
            margin: 30px 0;
            padding: 20px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }

        .color-word.pop {
            transform: scale(1.2);
        }

        .timer-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            transition: width 0.1s linear;
        }

        .timer-fill.warning {
            background: linear-gradient(90deg, #ff9800, #ffc107);
        }

        .timer-fill.danger {
            background: linear-gradient(90deg, #f44336, #ff5722);
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .color-btn {
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .color-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .color-btn:active {
            transform: translateY(0);
        }

        .btn-red { background: linear-gradient(135deg, #f44336, #e53935); }
        .btn-blue { background: linear-gradient(135deg, #2196F3, #1976D2); }
        .btn-green { background: linear-gradient(135deg, #4CAF50, #388E3C); }
        .btn-yellow { background: linear-gradient(135deg, #FFEB3B, #FBC02D); color: #333; }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 90%;
            width: 350px;
        }

        .modal h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 32px;
        }

        .modal p {
            color: #666;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .modal .score {
            font-size: 48px;
            font-weight: bold;
            color: #764ba2;
            margin: 20px 0;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .start-btn:hover {
            transform: scale(1.05);
        }

        .combo {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: #ff9800;
            pointer-events: none;
            animation: comboFade 0.5s ease-out;
        }

        @keyframes comboFade {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
        }

        @media (max-width: 480px) {
            .game-container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .color-word {
                font-size: 36px;
            }

            .color-btn {
                padding: 15px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Color Reflex</h1>

        <div class="score-display">
            <div class="score-item">
                <div class="score-label">スコア</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">コンボ</div>
                <div class="score-value" id="combo">0</div>
            </div>
        </div>

        <div class="color-word" id="colorWord"></div>

        <div class="timer-bar">
            <div class="timer-fill" id="timerFill"></div>
        </div>

        <div class="buttons">
            <button class="color-btn btn-red" data-color="red">RED</button>
            <button class="color-btn btn-blue" data-color="blue">BLUE</button>
            <button class="color-btn btn-green" data-color="green">GREEN</button>
            <button class="color-btn btn-yellow" data-color="yellow">YELLOW</button>
        </div>
    </div>

    <div class="overlay" id="startOverlay">
        <div class="modal">
            <h2>Color Reflex</h2>
            <p>文字の<strong>色</strong>を選んでください！</p>
            <p>（文字の内容ではありません）</p>
            <button class="start-btn" onclick="startGame()">スタート</button>
        </div>
    </div>

    <div class="overlay" id="gameOverOverlay">
        <div class="modal">
            <h2>ゲームオーバー</h2>
            <p>スコア</p>
            <div class="score" id="finalScore">0</div>
            <p>最高コンボ: <span id="maxCombo">0</span></p>
            <button class="start-btn" onclick="startGame()">もう一度</button>
        </div>
    </div>

    <script>
        const colors = {
            red: '#f44336',
            blue: '#2196F3',
            green: '#4CAF50',
            yellow: '#FFEB3B'
        };

        const colorNames = ['red', 'blue', 'green', 'yellow'];
        const colorLabels = {
            red: 'RED',
            blue: 'BLUE',
            green: 'GREEN',
            yellow: 'YELLOW'
        };

        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let timeLeft = 100;
        let gameInterval;
        let targetColor;
        let isGameRunning = false;

        const colorWord = document.getElementById('colorWord');
        const scoreDisplay = document.getElementById('score');
        const comboDisplay = document.getElementById('combo');
        const timerFill = document.getElementById('timerFill');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScore = document.getElementById('finalScore');
        const maxComboDisplay = document.getElementById('maxCombo');

        function getRandomColor() {
            return colorNames[Math.floor(Math.random() * colorNames.length)];
        }

        function showCombo() {
            const comboEl = document.createElement('div');
            comboEl.className = 'combo';
            comboEl.textContent = `+${combo} コンボ!`;
            comboEl.style.left = '50%';
            comboEl.style.top = '40%';
            comboEl.style.transform = 'translateX(-50%)';
            document.body.appendChild(comboEl);

            setTimeout(() => comboEl.remove(), 500);
        }

        function generateWord() {
            const textColor = getRandomColor();
            const textLabel = getRandomColor();

            targetColor = textColor;
            colorWord.textContent = colorLabels[textLabel];
            colorWord.style.color = colors[textColor];

            // Pop animation
            colorWord.classList.remove('pop');
            void colorWord.offsetWidth;
            colorWord.classList.add('pop');
        }

        function startGame() {
            score = 0;
            combo = 0;
            maxCombo = 0;
            timeLeft = 100;
            isGameRunning = true;

            scoreDisplay.textContent = '0';
            comboDisplay.textContent = '0';
            timerFill.style.width = '100%';
            timerFill.classList.remove('warning', 'danger');

            startOverlay.classList.remove('active');
            gameOverOverlay.classList.remove('active');

            generateWord();

            clearInterval(gameInterval);
            gameInterval = setInterval(() => {
                if (!isGameRunning) return;

                timeLeft -= 0.5;

                timerFill.style.width = `${timeLeft}%`;

                if (timeLeft <= 30) {
                    timerFill.classList.add('danger');
                } else if (timeLeft <= 50) {
                    timerFill.classList.add('warning');
                }

                if (timeLeft <= 0) {
                    gameOver();
                }
            }, 50);
        }

        function gameOver() {
            isGameRunning = false;
            clearInterval(gameInterval);

            finalScore.textContent = score;
            maxComboDisplay.textContent = maxCombo;
            gameOverOverlay.classList.add('active');
        }

        function handleColorClick(selectedColor) {
            if (!isGameRunning) return;

            if (selectedColor === targetColor) {
                combo++;
                if (combo > maxCombo) maxCombo = combo;

                const points = 10 + (combo * 2);
                score += points;

                scoreDisplay.textContent = score;
                comboDisplay.textContent = combo;

                if (combo >= 3) {
                    showCombo();
                }

                // Bonus time
                timeLeft = Math.min(100, timeLeft + 5);

                generateWord();
            } else {
                combo = 0;
                comboDisplay.textContent = '0';

                // Penalty
                timeLeft -= 10;

                // Shake effect
                colorWord.style.transform = 'translateX(10px)';
                setTimeout(() => {
                    colorWord.style.transform = 'translateX(-10px)';
                    setTimeout(() => {
                        colorWord.style.transform = 'translateX(0)';
                    }, 50);
                }, 50);
            }
        }

        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                handleColorClick(btn.dataset.color);
            });
        });

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;

            const keyMap = {
                '1': 'red',
                '2': 'blue',
                '3': 'green',
                '4': 'yellow'
            };

            if (keyMap[e.key]) {
                handleColorClick(keyMap[e.key]);
            }
        });

        // Show start screen
        startOverlay.classList.add('active');
    </script>
</body>
</html>
