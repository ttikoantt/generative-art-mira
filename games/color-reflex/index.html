<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Color Reflex - カラーリフレックス</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            padding: 20px;
        }

        .game-container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .header {
            color: #eee;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 10px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            color: #eee;
            font-size: 1.1em;
            flex: 1;
        }

        .stat-label {
            font-size: 0.8em;
            color: #aaa;
            margin-bottom: 5px;
        }

        .stat-value {
            font-weight: bold;
            font-size: 1.3em;
        }

        .color-display {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px 20px;
            margin-bottom: 30px;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .color-word {
            font-size: 4em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
        }

        .color-word.correct {
            animation: pulse-green 0.3s;
        }

        .color-word.wrong {
            animation: shake 0.3s;
        }

        @keyframes pulse-green {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); text-shadow: 0 0 30px #00ff88; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 20px;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-match {
            background: linear-gradient(135deg, #00c853 0%, #00e676 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 200, 83, 0.4);
        }

        .btn-match:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 200, 83, 0.6);
        }

        .btn-match:active {
            transform: translateY(0);
        }

        .btn-nomatch {
            background: linear-gradient(135deg, #ff5252 0%, #ff1744 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 82, 82, 0.4);
        }

        .btn-nomatch:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 82, 82, 0.6);
        }

        .btn-nomatch:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .timer-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            transition: width 0.1s linear;
        }

        .fullscreen-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .game-over.show {
            display: flex;
        }

        .game-over h2 {
            font-size: 3em;
            color: #ff5252;
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 2em;
            color: #eee;
            margin-bottom: 30px;
        }

        .final-score span {
            color: #00d4ff;
            font-weight: bold;
        }

        .restart-btn {
            padding: 15px 40px;
            font-size: 1.2em;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.5em;
            }

            .color-word {
                font-size: 2.5em;
            }

            .stats {
                flex-direction: column;
                gap: 5px;
            }

            .btn {
                padding: 15px;
                font-size: 1em;
            }
        }

        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .start-screen.hide {
            display: none;
        }

        .start-screen h1 {
            font-size: 2.5em;
            color: #eee;
            margin-bottom: 20px;
            text-align: center;
        }

        .start-screen p {
            color: #aaa;
            margin-bottom: 10px;
            max-width: 400px;
            text-align: center;
            line-height: 1.6;
        }

        .start-btn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.3em;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        .example {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .example-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 10px 0;
            font-size: 1.2em;
        }

        .example-word {
            font-weight: bold;
            font-size: 1.3em;
        }

        .example-label {
            color: #00e676;
            font-weight: bold;
        }

        .example-label.wrong {
            color: #ff5252;
        }
    </style>
</head>
<body>
    <div class="start-screen" id="startScreen">
        <h1>🎨 Color Reflex</h1>
        <p>ストループ効果で脳をトレーニング！</p>
        <p>文字の色と、書かれている色の名前が一致しているか素早く判断してください。</p>

        <div class="example">
            <div class="example-item">
                <span class="example-word" style="color: #ff0000;">赤</span>
                <span class="example-label">→ 一致（◯ボタン）</span>
            </div>
            <div class="example-item">
                <span class="example-word" style="color: #0000ff;">赤</span>
                <span class="example-label wrong">→ 不一致（✕ボタン）</span>
            </div>
        </div>

        <button class="start-btn" onclick="startGame()">スタート</button>
    </div>

    <div class="game-container">
        <div class="header">
            <h1>🎨 Color Reflex</h1>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">問題</div>
                <div class="stat-value" id="question">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">連続正解</div>
                <div class="stat-value" id="streak">0</div>
            </div>
        </div>

        <div class="timer-bar">
            <div class="timer-fill" id="timerFill"></div>
        </div>

        <div class="color-display">
            <div class="color-word" id="colorWord">準備中...</div>
        </div>

        <div class="buttons">
            <button class="btn btn-match" id="btnMatch" onclick="checkAnswer(true)">
                一致 ◯
            </button>
            <button class="btn btn-nomatch" id="btnNomatch" onclick="checkAnswer(false)">
                不一致 ✕
            </button>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>ゲームオーバー</h2>
        <div class="final-score">
            最終スコア: <span id="finalScore">0</span>
        </div>
        <button class="restart-btn" onclick="restartGame()">もう一度</button>
    </div>

    <script>
        const colors = [
            { name: '赤', color: '#ff0000' },
            { name: '青', color: '#0000ff' },
            { name: '緑', color: '#00ff00' },
            { name: '黄', color: '#ffff00' },
            { name: '紫', color: '#9900ff' },
            { name: '橙', color: '#ff9900' },
            { name: '桃', color: '#ff69b4' },
            { name: '水', color: '#00ffff' }
        ];

        let score = 0;
        let questionCount = 0;
        let streak = 0;
        let currentColor = null;
        let currentWord = null;
        let timerInterval = null;
        let timeLeft = 0;
        let maxTime = 3000;
        let gameActive = false;

        const scoreEl = document.getElementById('score');
        const questionEl = document.getElementById('question');
        const streakEl = document.getElementById('streak');
        const colorWordEl = document.getElementById('colorWord');
        const timerFillEl = document.getElementById('timerFill');
        const btnMatch = document.getElementById('btnMatch');
        const btnNomatch = document.getElementById('btnNomatch');
        const startScreen = document.getElementById('startScreen');
        const gameOver = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');

        function startGame() {
            startScreen.classList.add('hide');
            score = 0;
            questionCount = 0;
            streak = 0;
            maxTime = 3000;
            gameActive = true;
            updateUI();
            nextQuestion();
        }

        function nextQuestion() {
            if (!gameActive) return;

            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            const randomWord = colors[Math.floor(Math.random() * colors.length)];

            currentColor = randomColor.color;
            currentWord = randomWord.name;

            const isMatch = randomColor.name === randomWord.name;

            colorWordEl.textContent = currentWord;
            colorWordEl.style.color = currentColor;
            colorWordEl.className = 'color-word';

            btnMatch.disabled = false;
            btnNomatch.disabled = false;

            questionCount++;
            updateUI();

            const difficultyMultiplier = Math.max(0.5, 1 - (questionCount * 0.02));
            const questionTime = maxTime * difficultyMultiplier;
            timeLeft = questionTime;

            const startTime = Date.now();

            if (timerInterval) clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                timeLeft = Math.max(0, questionTime - elapsed);
                timerFillEl.style.width = `${(timeLeft / questionTime) * 100}%`;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleTimeout();
                }
            }, 16);
        }

        function checkAnswer(userSaysMatch) {
            if (!gameActive) return;

            clearInterval(timerInterval);
            btnMatch.disabled = true;
            btnNomatch.disabled = true;

            const isMatch = colors.find(c => c.name === currentWord).color === currentColor;
            const correct = (userSaysMatch && isMatch) || (!userSaysMatch && !isMatch);

            if (correct) {
                score += 10 + Math.floor(streak / 3) * 5;
                streak++;
                colorWordEl.classList.add('correct');
            } else {
                score = Math.max(0, score - 5);
                streak = 0;
                colorWordEl.classList.add('wrong');

                setTimeout(() => {
                    endGame();
                    return;
                }, 500);
            }

            updateUI();

            if (gameActive) {
                setTimeout(() => {
                    nextQuestion();
                }, 500);
            }
        }

        function handleTimeout() {
            if (!gameActive) return;

            btnMatch.disabled = true;
            btnNomatch.disabled = true;
            streak = 0;
            updateUI();

            setTimeout(() => {
                endGame();
            }, 500);
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);
            finalScoreEl.textContent = score;
            gameOver.classList.add('show');
        }

        function restartGame() {
            gameOver.classList.remove('show');
            startGame();
        }

        function updateUI() {
            scoreEl.textContent = score;
            questionEl.textContent = questionCount;
            streakEl.textContent = streak;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        document.addEventListener('keydown', (e) => {
            if (!gameActive) return;

            if (e.key === 'ArrowLeft' || e.key === 'z') {
                checkAnswer(true);
            } else if (e.key === 'ArrowRight' || e.key === '/') {
                checkAnswer(false);
            }
        });
    </script>
</body>
</html>
