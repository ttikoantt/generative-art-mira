<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Color Reflex - 色彩反射</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: #fff;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            font-size: 18px;
        }

        .stat {
            color: #00ffff;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
        }

        .color-display {
            width: 200px;
            height: 200px;
            border-radius: 20px;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .color-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
            max-width: 400px;
            width: 100%;
        }

        .color-btn {
            width: 100%;
            height: 80px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .color-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .color-btn:active {
            transform: scale(0.95);
        }

        .color-btn.red {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
        }

        .color-btn.blue {
            background: linear-gradient(135deg, #4dabf7 0%, #339af0 100%);
        }

        .color-btn.green {
            background: linear-gradient(135deg, #51cf66 0%, #40c057 100%);
        }

        .color-btn.yellow {
            background: linear-gradient(135deg, #ffd43b 0%, #fab005 100%);
        }

        .feedback {
            height: 30px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            margin: 10px 0;
        }

        .feedback.correct {
            color: #51cf66;
            text-shadow: 0 0 10px #51cf66;
        }

        .feedback.wrong {
            color: #ff6b6b;
            text-shadow: 0 0 10px #ff6b6b;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h1 {
            color: #fff;
            font-size: 36px;
            margin-bottom: 20px;
        }

        .overlay p {
            color: #ccc;
            font-size: 16px;
            margin-bottom: 30px;
            text-align: center;
            max-width: 400px;
        }

        .start-btn {
            padding: 15px 50px;
            font-size: 20px;
            background: linear-gradient(135deg, #00ffff 0%, #0099cc 100%);
            border: none;
            border-radius: 30px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }

        .start-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.8);
        }

        .final-score {
            color: #00ffff;
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #00ffff;
            color: #00ffff;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            z-index: 50;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 20px #00ffff;
        }

        .combo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            font-weight: bold;
            color: #ffd43b;
            text-shadow: 0 0 30px #ffd43b;
            pointer-events: none;
            opacity: 0;
            z-index: 200;
        }

        .combo.show {
            animation: comboAnim 0.5s ease-out;
        }

        @keyframes comboAnim {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @media (max-width: 768px) {
            .title {
                font-size: 24px;
            }

            .stats {
                gap: 15px;
                font-size: 16px;
            }

            .stat-value {
                font-size: 20px;
            }

            .color-display {
                width: 150px;
                height: 150px;
                font-size: 24px;
            }

            .color-btn {
                height: 70px;
                font-size: 16px;
            }

            .overlay h1 {
                font-size: 28px;
            }

            .final-score {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <div class="header">
            <div class="title">Color Reflex</div>
            <div class="stats">
                <div class="stat">スコア: <span class="stat-value" id="score">0</span></div>
                <div class="stat">時間: <span class="stat-value" id="time">60</span></div>
                <div class="stat">コンボ: <span class="stat-value" id="combo">0</span></div>
            </div>
        </div>

        <div class="color-display" id="colorDisplay"></div>
        <div class="feedback" id="feedback"></div>

        <div class="color-buttons">
            <button class="color-btn red" onclick="checkAnswer('red')">RED</button>
            <button class="color-btn blue" onclick="checkAnswer('blue')">BLUE</button>
            <button class="color-btn green" onclick="checkAnswer('green')">GREEN</button>
            <button class="color-btn yellow" onclick="checkAnswer('yellow')">YELLOW</button>
        </div>
    </div>

    <div class="combo" id="comboDisplay"></div>

    <div class="overlay" id="startOverlay">
        <h1>Color Reflex</h1>
        <p>
            表示された<strong style="color: #00ffff;">色</strong>と同じ色のボタンを押してください！<br><br>
            文字の色ではなく、表示されている色を見て判断します。<br><br>
            60秒以内にハイスコアを目指そう！
        </p>
        <button class="start-btn" onclick="startGame()">スタート</button>
    </div>

    <div class="overlay hidden" id="endOverlay">
        <h1>ゲーム終了！</h1>
        <div class="final-score" id="finalScore">0</div>
        <p>最高コンボ: <span id="maxCombo">0</span></p>
        <p>正解率: <span id="accuracy">0</span>%</p>
        <button class="start-btn" onclick="startGame()">もう一度</button>
    </div>

    <script>
        let score = 0;
        let timeLeft = 60;
        let combo = 0;
        let maxCombo = 0;
        let correctAnswers = 0;
        let totalAnswers = 0;
        let gameInterval;
        let timerInterval;
        let currentColor = '';

        const colors = [
            { name: 'red', color: '#ff6b6b' },
            { name: 'blue', color: '#4dabf7' },
            { name: 'green', color: '#51cf66' },
            { name: 'yellow', color: '#ffd43b' }
        ];

        const colorDisplay = document.getElementById('colorDisplay');
        const feedback = document.getElementById('feedback');
        const scoreDisplay = document.getElementById('score');
        const timeDisplay = document.getElementById('time');
        const comboDisplay = document.getElementById('combo');
        const startOverlay = document.getElementById('startOverlay');
        const endOverlay = document.getElementById('endOverlay');
        const finalScore = document.getElementById('finalScore');
        const maxComboDisplay = document.getElementById('maxCombo');
        const accuracyDisplay = document.getElementById('accuracy');
        const comboPopup = document.getElementById('comboDisplay');

        function startGame() {
            score = 0;
            timeLeft = 60;
            combo = 0;
            maxCombo = 0;
            correctAnswers = 0;
            totalAnswers = 0;

            updateDisplay();
            startOverlay.classList.add('hidden');
            endOverlay.classList.add('hidden');

            nextColor();

            gameInterval = setInterval(() => {
                nextColor();
            }, 1000);

            timerInterval = setInterval(() => {
                timeLeft--;
                timeDisplay.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function nextColor() {
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            const textColor = colors[Math.floor(Math.random() * colors.length)];

            currentColor = randomColor.name;
            colorDisplay.style.background = `linear-gradient(135deg, ${randomColor.color} 0%, ${adjustColor(randomColor.color, -20)} 100%)`;
            colorDisplay.textContent = textColor.name.toUpperCase();
            colorDisplay.style.color = textColor.color;
        }

        function adjustColor(color, amount) {
            const hex = color.replace('#', '');
            const r = Math.max(0, Math.min(255, parseInt(hex.substr(0, 2), 16) + amount));
            const g = Math.max(0, Math.min(255, parseInt(hex.substr(2, 2), 16) + amount));
            const b = Math.max(0, Math.min(255, parseInt(hex.substr(4, 2), 16) + amount));
            return `rgb(${r}, ${g}, ${b})`;
        }

        function checkAnswer(selectedColor) {
            if (timeLeft <= 0) return;

            totalAnswers++;

            if (selectedColor === currentColor) {
                // 正解
                combo++;
                correctAnswers++;
                if (combo > maxCombo) {
                    maxCombo = combo;
                }

                // コンボボーナス
                const basePoints = 10;
                const comboBonus = Math.min(combo * 5, 50);
                const points = basePoints + comboBonus;
                score += points;

                feedback.textContent = `+${points}`;
                feedback.className = 'feedback correct';

                if (combo > 1) {
                    showComboPopup(combo);
                }

                // 正解の時も次の色へ
                setTimeout(() => {
                    if (timeLeft > 0) {
                        nextColor();
                    }
                }, 100);
            } else {
                // 不正解
                combo = 0;
                feedback.textContent = 'Miss!';
                feedback.className = 'feedback wrong';
            }

            updateDisplay();
        }

        function showComboPopup(combo) {
            comboPopup.textContent = `${combo} COMBO!`;
            comboPopup.className = 'combo show';

            setTimeout(() => {
                comboPopup.className = 'combo';
            }, 500);
        }

        function updateDisplay() {
            scoreDisplay.textContent = score;
            comboDisplay.textContent = combo;
        }

        function endGame() {
            clearInterval(gameInterval);
            clearInterval(timerInterval);

            finalScore.textContent = score;
            maxComboDisplay.textContent = maxCombo;
            const accuracy = totalAnswers > 0 ? Math.round((correctAnswers / totalAnswers) * 100) : 0;
            accuracyDisplay.textContent = accuracy;

            endOverlay.classList.remove('hidden');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Fullscreen error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // タッチ操作のサポート
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                btn.click();
            });
        });
    </script>
</body>
</html>
