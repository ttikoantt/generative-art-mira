<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Color Reflex</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      touch-action: manipulation;
    }

    .screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .start-screen h1 {
      font-size: clamp(28px, 8vw, 48px);
      margin-bottom: 20px;
      text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
    }

    .start-screen p {
      font-size: clamp(14px, 4vw, 18px);
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 40px;
      text-align: center;
      max-width: 300px;
    }

    .start-btn {
      padding: 16px 48px;
      font-size: clamp(16px, 5vw, 20px);
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 50px;
      color: #fff;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4);
    }

    .start-btn:hover { transform: scale(1.05); }
    .start-btn:active { transform: scale(0.95); }

    .game-screen { display: none; }

    .game-header {
      position: absolute;
      top: 20px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 30px;
      font-size: clamp(18px, 5vw, 24px);
      font-weight: 600;
    }

    .target-color-box {
      width: clamp(60px, 20vw, 100px);
      height: clamp(60px, 20vw, 100px);
      border-radius: 16px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      transition: background 0.2s;
    }

    .game-area {
      width: 100%;
      max-width: 500px;
      height: 60%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      padding: 20px;
    }

    .color-item {
      border-radius: 16px;
      cursor: pointer;
      transition: transform 0.1s;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
    }

    .color-item:active { transform: scale(0.9); }

    .end-screen { display: none; }

    .end-screen h2 {
      font-size: clamp(32px, 10vw, 56px);
      margin-bottom: 10px;
    }

    .end-screen .score {
      font-size: clamp(48px, 15vw, 80px);
      font-weight: bold;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
    }

    .end-screen .high-score {
      font-size: clamp(14px, 4vw, 18px);
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 40px;
    }

    .fullscreen-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: background 0.2s;
    }

    .fullscreen-btn:hover { background: rgba(255, 255, 255, 0.2); }
  </style>
</head>
<body>
  <div class="screen start-screen" id="startScreen">
    <h1>Color Reflex</h1>
    <p>指定された色と同じアイテムをタップ！<br>45秒間で何点取れるか？</p>
    <button class="start-btn" onclick="startGame()">Start Game</button>
  </div>

  <div class="screen game-screen" id="gameScreen">
    <button class="fullscreen-btn" onclick="toggleFullscreen()">Full</button>
    <div class="game-header">
      <span id="timer">45</span>
      <div class="target-color-box" id="targetColor"></div>
      <span id="score">0</span>
    </div>
    <div class="game-area" id="gameArea"></div>
  </div>

  <div class="screen end-screen" id="endScreen">
    <h2>Game Over!</h2>
    <div class="score" id="finalScore">0</div>
    <div class="high-score">Best: <span id="highScore">0</span></div>
    <button class="start-btn" onclick="startGame()">Play Again</button>
  </div>

  <script>
    const COLORS = [
      '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A',
      '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E2',
      '#F8B739', '#52B788', '#FF6F91', '#6C5CE7'
    ];

    let score = 0;
    let highScore = parseInt(localStorage.getItem('colorReflexHigh')) || 0;
    let timeLeft = 45;
    let targetColor = '';
    let gameInterval;
    let spawnTimeout;

    const startScreen = document.getElementById('startScreen');
    const gameScreen = document.getElementById('gameScreen');
    const endScreen = document.getElementById('endScreen');
    const timerEl = document.getElementById('timer');
    const scoreEl = document.getElementById('score');
    const targetColorEl = document.getElementById('targetColor');
    const gameArea = document.getElementById('gameArea');
    const finalScoreEl = document.getElementById('finalScore');
    const highScoreEl = document.getElementById('highScore');

    function shuffle(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function setNewTarget() {
      targetColor = COLORS[Math.floor(Math.random() * COLORS.length)];
      targetColorEl.style.background = targetColor;
      spawnGrid();
    }

    function spawnGrid() {
      gameArea.innerHTML = '';
      const colors = shuffle([...COLORS]);
      colors.forEach(color => {
        const item = document.createElement('div');
        item.className = 'color-item';
        item.style.background = color;
        item.onclick = () => handleTap(color);
        gameArea.appendChild(item);
      });
    }

    function handleTap(color) {
      if (color === targetColor) {
        score++;
        scoreEl.textContent = score;
        setNewTarget();
      } else {
        score = Math.max(0, score - 1);
        scoreEl.textContent = score;
      }
    }

    function startGame() {
      score = 0;
      timeLeft = 45;
      scoreEl.textContent = '0';
      timerEl.textContent = '45';

      startScreen.style.display = 'none';
      endScreen.style.display = 'none';
      gameScreen.style.display = 'flex';

      setNewTarget();
      gameInterval = setInterval(() => {
        timeLeft--;
        timerEl.textContent = timeLeft;
        if (timeLeft <= 0) endGame();
      }, 1000);
    }

    function endGame() {
      clearInterval(gameInterval);
      gameScreen.style.display = 'none';
      endScreen.style.display = 'flex';
      finalScoreEl.textContent = score;
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('colorReflexHigh', highScore);
      }
      highScoreEl.textContent = highScore;
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    }
  </script>
</body>
</html>
