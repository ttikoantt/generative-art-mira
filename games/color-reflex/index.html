<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Color Reflex - 色反射ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        h1 {
            color: #fff;
            font-size: 2em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            color: #fff;
        }

        .stat {
            font-size: 1.2em;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #4fc3f7;
        }

        .color-display {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .color-word {
            font-size: 4em;
            font-weight: bold;
            margin-bottom: 20px;
            transition: all 0.3s;
            text-shadow: 0 0 30px currentColor;
        }

        .question {
            color: #fff;
            font-size: 1.5em;
            margin-bottom: 20px;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            padding: 20px 40px;
            font-size: 1.3em;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn-yes {
            background: linear-gradient(135deg, #4caf50, #45a049);
            color: #fff;
        }

        .btn-no {
            background: linear-gradient(135deg, #f44336, #da190b);
            color: #fff;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .timer-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #4fc3f7, #29b6f6);
            transition: width 0.1s linear;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            color: #fff;
            font-size: 3em;
            margin-bottom: 20px;
        }

        .overlay p {
            color: #fff;
            font-size: 1.5em;
            margin-bottom: 30px;
        }

        .overlay .btn {
            padding: 15px 40px;
            font-size: 1.2em;
        }

        .start-btn {
            background: linear-gradient(135deg, #9c27b0, #7b1fa2);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.5em;
            }

            .color-word {
                font-size: 3em;
            }

            .btn {
                padding: 15px 30px;
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">Fullscreen</button>

    <div class="game-container">
        <h1>🎨 Color Reflex</h1>

        <div class="stats">
            <div class="stat">
                <div>Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div>Streak</div>
                <div class="stat-value" id="streak">0</div>
            </div>
            <div class="stat">
                <div>High Score</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>

        <div class="timer-bar">
            <div class="timer-fill" id="timerFill"></div>
        </div>

        <div class="color-display">
            <div class="color-word" id="colorWord">RED</div>
            <div class="question">文字と色は一致してる？</div>
        </div>

        <div class="buttons">
            <button class="btn btn-yes" onclick="answer(true)">✓ 一致</button>
            <button class="btn btn-no" onclick="answer(false)">✗ 不一致</button>
        </div>
    </div>

    <div class="overlay" id="overlay">
        <h2>🎨 Color Reflex</h2>
        <p>文字の色と実際の色が一致しているか<br>素早く判断しよう！</p>
        <button class="btn start-btn" onclick="startGame()">Start Game</button>
    </div>

    <div class="overlay hidden" id="gameOver">
        <h2>Game Over</h2>
        <p>Score: <span id="finalScore">0</span></p>
        <p>High Score: <span id="finalHighScore">0</span></p>
        <button class="btn start-btn" onclick="startGame()">Play Again</button>
    </div>

    <script>
        const colors = [
            { name: 'RED', color: '#ff4444' },
            { name: 'BLUE', color: '#4488ff' },
            { name: 'GREEN', color: '#44cc44' },
            { name: 'YELLOW', color: '#ffcc00' },
            { name: 'PURPLE', color: '#9944ff' },
            { name: 'ORANGE', color: '#ff8844' },
            { name: 'PINK', color: '#ff66cc' },
            { name: 'CYAN', color: '#44ccff' }
        ];

        let score = 0;
        let streak = 0;
        let highScore = parseInt(localStorage.getItem('colorReflexHighScore')) || 0;
        let currentMatch = false;
        let timeLeft = 60;
        let timerInterval;
        let gameActive = false;

        document.getElementById('highScore').textContent = highScore;

        function getRandomColor() {
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function generateQuestion() {
            const wordColor = getRandomColor();
            const textColor = getRandomColor();

            currentMatch = (wordColor.name === textColor.name);

            const colorWord = document.getElementById('colorWord');
            colorWord.textContent = wordColor.name;
            colorWord.style.color = textColor.color;
        }

        function answer(userAnswer) {
            if (!gameActive) return;

            const correct = (userAnswer === currentMatch);

            if (correct) {
                score += 10 + streak * 2;
                streak++;
            } else {
                streak = 0;
                timeLeft -= 5; // Penalty
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    endGame();
                    return;
                }
            }

            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;

            generateQuestion();
        }

        function startGame() {
            score = 0;
            streak = 0;
            timeLeft = 60;
            gameActive = true;

            document.getElementById('score').textContent = '0';
            document.getElementById('streak').textContent = '0';
            document.getElementById('overlay').classList.add('hidden');
            document.getElementById('gameOver').classList.add('hidden');

            generateQuestion();
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                timeLeft -= 0.1;

                const percentage = (timeLeft / 60) * 100;
                document.getElementById('timerFill').style.width = percentage + '%';

                // Change color based on time
                if (percentage < 30) {
                    document.getElementById('timerFill').style.background =
                        'linear-gradient(90deg, #f44336, #da190b)';
                } else if (percentage < 60) {
                    document.getElementById('timerFill').style.background =
                        'linear-gradient(90deg, #ff9800, #f57c00)';
                }

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 100);
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('colorReflexHighScore', highScore);
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalHighScore').textContent = highScore;
            document.getElementById('highScore').textContent = highScore;
            document.getElementById('gameOver').classList.remove('hidden');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (!gameActive) {
                if (e.key === 'Enter' || e.key === ' ') {
                    startGame();
                }
                return;
            }

            if (e.key === 'ArrowLeft' || e.key === 'a') {
                answer(false);
            } else if (e.key === 'ArrowRight' || e.key === 'd') {
                answer(true);
            }
        });

        // Touch/Click support for larger tap areas
        document.querySelector('.btn-yes').addEventListener('touchstart', (e) => {
            e.preventDefault();
            answer(true);
        });

        document.querySelector('.btn-no').addEventListener('touchstart', (e) => {
            e.preventDefault();
            answer(false);
        });
    </script>
</body>
</html>
