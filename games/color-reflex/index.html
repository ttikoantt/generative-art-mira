<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Color Reflex - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: white;
            font-size: 32px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 15px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }

        .game-area {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .word-display {
            font-size: 64px;
            font-weight: 800;
            margin: 30px 0;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.1);
        }

        .question {
            font-size: 20px;
            color: #666;
            margin-bottom: 15px;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .option-btn {
            padding: 20px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .option-btn:active {
            transform: scale(0.95);
        }

        .option-btn.yes {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #2d5016;
        }

        .option-btn.no {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: #8b1e3f;
        }

        .result {
            display: none;
            margin-top: 20px;
            padding: 15px;
            border-radius: 15px;
            font-weight: 600;
            animation: slideIn 0.3s ease;
        }

        .result.correct {
            background: rgba(132, 250, 176, 0.3);
            color: #2d5016;
        }

        .result.wrong {
            background: rgba(250, 112, 154, 0.3);
            color: #8b1e3f;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .start-screen, .game-over-screen {
            text-align: center;
        }

        .start-screen h2, .game-over-screen h2 {
            color: white;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .start-screen p, .game-over-screen p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .play-btn {
            background: white;
            color: #667eea;
            padding: 15px 50px;
            font-size: 20px;
            font-weight: 700;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .play-btn:hover, .play-btn:active {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .final-score {
            font-size: 72px;
            font-weight: 800;
            color: white;
            margin: 20px 0;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .time-bar {
            width: 100%;
            height: 8px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 20px;
        }

        .time-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #84fab0, #8fd3f4);
            transition: width 0.1s linear;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            z-index: 100;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover, .fullscreen-btn:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .hidden {
            display: none;
        }

        .timer {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <!-- Start Screen -->
        <div id="startScreen" class="start-screen">
            <h1>🎨 Color Reflex</h1>
            <p>
                表示される<strong>色の名前</strong>と、<br>
                実際に表示されている<strong>色</strong>が<br>
                一致しているかどうかを素早く判定！
            </p>
            <p style="font-size: 14px; opacity: 0.8;">
                例：「<span style="color: red;">あか</span>」と表示されたら、<br>
                文字が<span style="color: red;">赤色</span>なら YES
            </p>
            <button class="play-btn" onclick="startGame()">▶ ゲームスタート</button>
        </div>

        <!-- Game Screen -->
        <div id="gameScreen" class="game-area hidden">
            <div class="stats">
                <div class="stat">スコア: <span id="score">0</span></div>
                <div class="stat">連鎖: <span id="combo">0</span></div>
            </div>

            <div class="timer">⏱ <span id="timeLeft">30</span>秒</div>

            <div class="question">この色は正しい？</div>

            <div id="wordDisplay" class="word-display">あか</div>

            <div class="options">
                <button class="option-btn yes" onclick="answer(true)">⭕ YES</button>
                <button class="option-btn no" onclick="answer(false)">❌ NO</button>
            </div>

            <div id="result" class="result"></div>

            <div class="time-bar">
                <div id="timeBarFill" class="time-bar-fill"></div>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverScreen" class="game-over-screen hidden">
            <h1>🎨 Color Reflex</h1>
            <h2>ゲームオーバー！</h2>
            <div class="final-score" id="finalScore">0</div>
            <p>
                最大コンボ: <strong id="maxCombo">0</strong><br>
                正解率: <strong id="accuracy">0%</strong>
            </p>
            <button class="play-btn" onclick="startGame()">🔄 もう一度</button>
        </div>
    </div>

    <script>
        const colors = [
            { name: 'あか', color: '#e74c3c' },
            { name: 'あお', color: '#3498db' },
            { name: 'きいろ', color: '#f1c40f' },
            { name: 'みどり', color: '#2ecc71' },
            { name: 'むらさき', color: '#9b59b6' },
            { name: 'オレンジ', color: '#e67e22' },
            { name: 'ピンク', color: '#e91e63' }
        ];

        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let totalQuestions = 0;
        let correctAnswers = 0;
        let timeLeft = 30;
        let currentQuestion = null;
        let timerInterval = null;
        let gameActive = false;

        function startGame() {
            score = 0;
            combo = 0;
            maxCombo = 0;
            totalQuestions = 0;
            correctAnswers = 0;
            timeLeft = 30;
            gameActive = true;

            updateUI();

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');

            generateQuestion();
            startTimer();
        }

        function generateQuestion() {
            const isMatch = Math.random() > 0.5;
            const nameIndex = Math.floor(Math.random() * colors.length);
            const nameColor = colors[nameIndex];

            let colorIndex;
            if (isMatch) {
                colorIndex = nameIndex;
            } else {
                do {
                    colorIndex = Math.floor(Math.random() * colors.length);
                } while (colorIndex === nameIndex);
            }

            const textColor = colors[colorIndex];

            currentQuestion = {
                name: nameColor.name,
                color: textColor.color,
                isMatch: isMatch
            };

            const wordDisplay = document.getElementById('wordDisplay');
            wordDisplay.textContent = currentQuestion.name;
            wordDisplay.style.color = currentQuestion.color;

            document.getElementById('result').style.display = 'none';
        }

        function answer(userSaidYes) {
            if (!gameActive) return;

            totalQuestions++;
            const correct = (currentQuestion.isMatch === userSaidYes);

            if (correct) {
                combo++;
                correctAnswers++;
                const bonus = combo > 1 ? Math.floor(combo / 3) : 0;
                score += 10 + bonus * 5;
                showResult('正解！+' + (10 + bonus * 5), true);
            } else {
                maxCombo = Math.max(maxCombo, combo);
                combo = 0;
                score = Math.max(0, score - 5);
                showResult('不正解！-5', false);
            }

            if (combo > maxCombo) {
                maxCombo = combo;
            }

            updateUI();

            setTimeout(() => {
                if (gameActive) {
                    generateQuestion();
                }
            }, 300);
        }

        function showResult(message, isCorrect) {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = message;
            resultDiv.className = 'result ' + (isCorrect ? 'correct' : 'wrong');
            resultDiv.style.display = 'block';
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;
            document.getElementById('timeLeft').textContent = timeLeft;

            const percentage = (timeLeft / 30) * 100;
            document.getElementById('timeBarFill').style.width = percentage + '%';

            if (timeLeft <= 5) {
                document.getElementById('timeBarFill').style.background =
                    'linear-gradient(90deg, #fa709a, #fee140)';
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                updateUI();

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);

            const accuracy = totalQuestions > 0 ?
                Math.round((correctAnswers / totalQuestions) * 100) : 0;

            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.remove('hidden');

            document.getElementById('finalScore').textContent = score;
            document.getElementById('maxCombo').textContent = maxCombo;
            document.getElementById('accuracy').textContent = accuracy + '%';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (!gameActive) return;

            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'z') {
                answer(false);
            } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'm') {
                answer(true);
            }
        });
    </script>
</body>
</html>
