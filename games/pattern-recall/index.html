<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pattern Recall</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            text-align: center;
            padding: 20px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #e94560;
            font-size: clamp(24px, 6vw, 36px);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 10px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #fff;
            font-size: clamp(24px, 5vw, 32px);
            font-weight: bold;
        }

        .pattern-display {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px auto;
            max-width: 300px;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .cell::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 80%;
            height: 80%;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border-radius: 50%;
            transition: transform 0.3s ease;
        }

        .cell.active::before {
            transform: translate(-50%, -50%) scale(1);
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.8);
        }

        .cell.correct {
            background: rgba(76, 175, 80, 0.3);
            border-color: #4caf50;
        }

        .cell.wrong {
            background: rgba(244, 67, 54, 0.3);
            border-color: #f44336;
        }

        .cell.correct::before {
            background: linear-gradient(135deg, #4caf50, #8bc34a);
        }

        .cell.wrong::before {
            background: linear-gradient(135deg, #f44336, #ff9800);
        }

        .message {
            color: #fff;
            font-size: clamp(16px, 4vw, 20px);
            margin: 20px 0;
            min-height: 30px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .button {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: clamp(16px, 4vw, 20px);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
            margin: 10px;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.6);
        }

        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        @media (max-width: 768px) {
            .game-container {
                padding: 15px;
            }

            .pattern-display {
                gap: 8px;
                max-width: 280px;
            }

            .stats {
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <h1>🎮 Pattern Recall</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">レベル</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">ハイスコア</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>

        <div class="message" id="message">スタートボタンを押してね</div>

        <div class="pattern-display" id="pattern">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button class="button" id="startBtn" onclick="startGame()">スタート</button>
    </div>

    <script>
        let currentPattern = [];
        let playerPattern = [];
        let level = 1;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('patternRecallHighScore')) || 0;
        let isShowing = false;
        let canClick = false;

        document.getElementById('highScore').textContent = highScore;

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function generatePattern(length) {
            const pattern = [];
            const used = new Set();
            while (pattern.length < length) {
                const index = Math.floor(Math.random() * 9);
                if (!used.has(index)) {
                    used.add(index);
                    pattern.push(index);
                }
            }
            return pattern;
        }

        function showMessage(text) {
            document.getElementById('message').textContent = text;
        }

        function updateStats() {
            document.getElementById('level').textContent = level;
            document.getElementById('score').textContent = score;
            document.getElementById('highScore').textContent = highScore;
        }

        async function showPattern() {
            isShowing = true;
            canClick = false;

            showMessage('パターンを覚えてね');

            await sleep(500);

            for (const index of currentPattern) {
                const cell = document.querySelector(`[data-index="${index}"]`);
                cell.classList.add('active');
                await sleep(600);
                cell.classList.remove('active');
                await sleep(200);
            }

            showMessage('同じパターンをタップしてね');
            isShowing = false;
            canClick = true;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function startGame() {
            level = 1;
            score = 0;
            currentPattern = generatePattern(3);
            playerPattern = [];
            updateStats();
            showPattern();
            document.getElementById('startBtn').style.display = 'none';
        }

        function handleCellClick(index) {
            if (!canClick || isShowing) return;

            const cell = document.querySelector(`[data-index="${index}"]`);
            cell.classList.add('active');

            playerPattern.push(index);

            setTimeout(() => {
                cell.classList.remove('active');
            }, 200);

            const currentStep = playerPattern.length - 1;

            if (playerPattern[currentStep] !== currentPattern[currentStep]) {
                // 間違った
                cell.classList.add('wrong');
                canClick = false;
                showMessage('ゲームオーバー！');
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('patternRecallHighScore', highScore);
                    updateStats();
                }
                setTimeout(() => {
                    document.getElementById('startBtn').style.display = 'inline-block';
                    document.getElementById('startBtn').textContent = 'もう一度';
                    cell.classList.remove('wrong');
                }, 1500);
                return;
            }

            // 正しい
            cell.classList.add('correct');
            setTimeout(() => {
                cell.classList.remove('correct');
            }, 300);

            if (playerPattern.length === currentPattern.length) {
                // クリア
                canClick = false;
                score += level * 10;
                level++;
                updateStats();
                showMessage('正解！次のレベルへ');
                setTimeout(() => {
                    currentPattern = generatePattern(Math.min(3 + level - 1, 9));
                    playerPattern = [];
                    showPattern();
                }, 1500);
            }
        }

        document.querySelectorAll('.cell').forEach(cell => {
            cell.addEventListener('click', () => {
                const index = parseInt(cell.dataset.index);
                handleCellClick(index);
            });

            cell.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const index = parseInt(cell.dataset.index);
                handleCellClick(index);
            });
        });
    </script>
</body>
</html>
