<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Merge | ネオンマージ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #00f5ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }

        .stats {
            display: flex;
            gap: 2rem;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        .stats span {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 245, 255, 0.3);
            max-width: 95vw;
            max-height: 70vh;
            aspect-ratio: 1;
        }

        .cell {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .cell::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.5s;
        }

        .cell:hover::before {
            left: 100%;
        }

        .cell.selected {
            transform: scale(1.05);
            box-shadow: 0 0 20px currentColor;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px currentColor; }
            50% { box-shadow: 0 0 30px currentColor, 0 0 40px currentColor; }
        }

        .cell.merging {
            animation: merge 0.3s ease-out;
        }

        @keyframes merge {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .cell[data-value="0"] {
            background: rgba(255, 255, 255, 0.05);
        }

        .cell[data-value="1"] { background: linear-gradient(135deg, #ff6b6b, #ff8e8e); color: #fff; }
        .cell[data-value="2"] { background: linear-gradient(135deg, #feca57, #ffdd85); color: #333; }
        .cell[data-value="3"] { background: linear-gradient(135deg, #48dbfb, #a0e9ff); color: #333; }
        .cell[data-value="4"] { background: linear-gradient(135deg, #ff9ff3, #ffb8f7); color: #333; }
        .cell[data-value="5"] { background: linear-gradient(135deg, #54a0ff, #7ec5ff); color: #fff; }
        .cell[data-value="6"] { background: linear-gradient(135deg, #5f27cd, #8854d0); color: #fff; }
        .cell[data-value="7"] { background: linear-gradient(135deg, #00d2d3, #4ddddd); color: #333; }
        .cell[data-value="8"] { background: linear-gradient(135deg, #ff6348, #ff8a75); color: #fff; }
        .cell[data-value="9"] { background: linear-gradient(135deg, #ff9f43, #ffb975); color: #fff; }
        .cell[data-value="10"] { background: linear-gradient(135deg, #00f5ff, #ff00ff); color: #fff; animation: rainbow 2s linear infinite; }

        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .cell[data-value="11"] { background: linear-gradient(135deg, #ffd700, #ffed4e); color: #333; animation: sparkle 1s linear infinite; }
        .cell[data-value="12"] { background: linear-gradient(135deg, #c0c0c0, #e8e8e8); color: #333; animation: sparkle 1s linear infinite; }

        @keyframes sparkle {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .controls {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 15px;
            font-size: 0.9rem;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .instructions {
            text-align: center;
            color: #aaa;
            font-size: 0.9rem;
            margin-top: 1rem;
            max-width: 400px;
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .game-over h2 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ff0000, #ff6600);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-over p {
            font-size: 1.5rem;
            margin-bottom: 2rem;
        }

        .game-over button {
            font-size: 1.2rem;
            padding: 15px 40px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">🔲 全画面</button>

    <h1>🎮 Neon Merge</h1>

    <div class="stats">
        <span>🏆 スコア: <strong id="score">0</strong></span>
        <span>🎯 最大: <strong id="maxTile">0</strong></span>
    </div>

    <div class="game-board" id="board"></div>

    <div class="controls">
        <button onclick="game.newGame()">🔄 新しいゲーム</button>
    </div>

    <p class="instructions">
        同じ数字のタイルを選んでマージ！<br>
        最大の数字を目指そう！
    </p>

    <div class="game-over hidden" id="gameOver">
        <h2>Game Over!</h2>
        <p>最終スコア: <span id="finalScore">0</span></p>
        <button onclick="game.newGame()">🔄 もう一度</button>
    </div>

    <script>
        class NeonMergeGame {
            constructor() {
                this.size = 5;
                this.board = [];
                this.score = 0;
                this.maxTile = 0;
                this.selectedCell = null;
                this.boardElement = document.getElementById('board');
                this.scoreElement = document.getElementById('score');
                this.maxTileElement = document.getElementById('maxTile');
                this.gameOverElement = document.getElementById('gameOver');
                this.finalScoreElement = document.getElementById('finalScore');

                this.init();
            }

            init() {
                this.board = Array(this.size * this.size).fill(0);
                this.score = 0;
                this.maxTile = 0;
                this.selectedCell = null;
                this.spawnTile();
                this.spawnTile();
                this.render();
            }

            spawnTile() {
                const emptyCells = [];
                for (let i = 0; i < this.board.length; i++) {
                    if (this.board[i] === 0) {
                        emptyCells.push(i);
                    }
                }

                if (emptyCells.length > 0) {
                    const randomIndex = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                    this.board[randomIndex] = Math.random() < 0.8 ? 1 : 2;
                }
            }

            render() {
                this.boardElement.innerHTML = '';

                for (let i = 0; i < this.board.length; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.index = i;
                    cell.dataset.value = this.board[i];

                    if (this.board[i] > 0) {
                        cell.textContent = this.board[i];
                    }

                    if (this.selectedCell === i) {
                        cell.classList.add('selected');
                    }

                    cell.addEventListener('click', () => this.handleCellClick(i));
                    this.boardElement.appendChild(cell);
                }

                this.scoreElement.textContent = this.score;
                this.maxTileElement.textContent = this.maxTile;
            }

            handleCellClick(index) {
                if (this.board[index] === 0) return;

                if (this.selectedCell === null) {
                    // 最初の選択
                    this.selectedCell = index;
                    this.render();
                } else if (this.selectedCell === index) {
                    // 同じセルをクリックして選択解除
                    this.selectedCell = null;
                    this.render();
                } else if (this.board[this.selectedCell] === this.board[index]) {
                    // 同じ数字のマージ
                    this.merge(this.selectedCell, index);
                } else {
                    // 異なる数字を選択
                    this.selectedCell = index;
                    this.render();
                }
            }

            merge(fromIndex, toIndex) {
                const value = this.board[fromIndex];
                const newValue = value + 1;

                // スコア計算
                this.score += Math.pow(2, newValue);

                // マージ実行
                this.board[fromIndex] = 0;
                this.board[toIndex] = newValue;

                if (newValue > this.maxTile) {
                    this.maxTile = newValue;
                }

                // マージアニメーション
                const cells = this.boardElement.querySelectorAll('.cell');
                cells[fromIndex].classList.add('merging');
                cells[toIndex].classList.add('merging');

                this.selectedCell = null;

                setTimeout(() => {
                    this.spawnTile();
                    this.render();
                    this.checkGameOver();
                }, 150);
            }

            checkGameOver() {
                // 空きセルがあるかチェック
                if (this.board.includes(0)) {
                    return;
                }

                // 隣接する同じ数字があるかチェック
                for (let i = 0; i < this.board.length; i++) {
                    const row = Math.floor(i / this.size);
                    const col = i % this.size;

                    // 右のセル
                    if (col < this.size - 1 && this.board[i] === this.board[i + 1]) {
                        return;
                    }

                    // 下のセル
                    if (row < this.size - 1 && this.board[i] === this.board[i + this.size]) {
                        return;
                    }
                }

                // ゲームオーバー
                this.gameOverElement.classList.remove('hidden');
                this.finalScoreElement.textContent = this.score;
            }

            newGame() {
                this.gameOverElement.classList.add('hidden');
                this.init();
            }
        }

        const game = new NeonMergeGame();

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });
    </script>
</body>
</html>
