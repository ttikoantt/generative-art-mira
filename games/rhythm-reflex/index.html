<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Reflex - リズム反射ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h1 {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #f0f, #0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay p {
            font-size: 18px;
            margin-bottom: 30px;
            color: #aaa;
        }

        .btn {
            background: linear-gradient(45deg, #f0f, #0ff);
            border: none;
            color: #fff;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.5);
        }

        .hud {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            z-index: 50;
            pointer-events: none;
        }

        .hud-item {
            text-align: center;
        }

        .hud-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }

        .hud-value {
            font-size: 28px;
            font-weight: bold;
            color: #0ff;
        }

        .combo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 64px;
            font-weight: bold;
            color: #f0f;
            text-shadow: 0 0 20px rgba(255, 0, 255, 0.8);
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 60;
            pointer-events: none;
        }

        .combo.show {
            opacity: 1;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 0, 255, 0.2);
            border: 1px solid #f0f;
            color: #f0f;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            z-index: 50;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 0, 255, 0.4);
        }

        .instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #666;
            z-index: 50;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .overlay h1 {
                font-size: 32px;
            }

            .hud {
                gap: 20px;
            }

            .hud-value {
                font-size: 20px;
            }

            .combo {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="hud">
        <div class="hud-item">
            <div class="hud-label">SCORE</div>
            <div class="hud-value" id="score">0</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">COMBO</div>
            <div class="hud-value" id="comboCount">0</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">HIGH SCORE</div>
            <div class="hud-value" id="highScore">0</div>
        </div>
    </div>

    <div class="combo" id="comboDisplay"></div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="instructions">タップしてリズムに合わせて！</div>

    <div class="overlay" id="startOverlay">
        <h1>🎵 Rhythm Reflex</h1>
        <p>リズムに合わせてタップ！<br>完璧なタイミングでスコアアップ</p>
        <button class="btn" onclick="startGame()">スタート</button>
    </div>

    <div class="overlay hidden" id="gameOverOverlay">
        <h1>Game Over</h1>
        <p>スコア: <span id="finalScore">0</span></p>
        <button class="btn" onclick="startGame()">もう一度</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;

        // ゲーム状態
        let gameRunning = false;
        let score = 0;
        let combo = 0;
        let highScore = localStorage.getItem('rhythmReflexHighScore') || 0;
        let bpm = 120;
        let lastBeatTime = 0;
        let beatInterval = 60000 / bpm;

        // ターゲット
        let targetRadius = 80;
        let targetPulse = 0;
        let lastTapTime = 0;
        let windowSize = 150; // タイミングウィンドウ（ms）

        // 視覚効果
        let rippleEffect = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
            targetRadius = Math.min(width, height) * 0.15;
        }

        function drawBackground() {
            // 薄いグリッド
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            const gridSize = 50;
            for (let x = 0; x < width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            for (let y = 0; y < height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
        }

        function drawTarget() {
            const time = Date.now();
            const timeSinceBeat = time - lastBeatTime;
            const beatProgress = timeSinceBeat / beatInterval;

            // メインターゲット（中央）
            const pulse = Math.sin(beatProgress * Math.PI) * 20;

            // 外円
            ctx.beginPath();
            ctx.arc(centerX, centerY, targetRadius + pulse, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 0, 255, 0.5)';
            ctx.lineWidth = 3;
            ctx.stroke();

            // 内円
            ctx.beginPath();
            ctx.arc(centerX, centerY, targetRadius * 0.6 + pulse * 0.5, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.8)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // ビートインジケーター（リズム視覚化）
            const indicatorRadius = targetRadius + 40;
            ctx.beginPath();
            ctx.arc(centerX, centerY, indicatorRadius, -Math.PI / 2, -Math.PI / 2 + beatProgress * Math.PI * 2);
            ctx.strokeStyle = `hsla(${time * 0.1 % 360}, 80%, 60%, 0.8)`;
            ctx.lineWidth = 4;
            ctx.stroke();

            // 中央のドット
            const dotPulse = Math.sin(time * 0.01) * 5;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 15 + dotPulse, 0, Math.PI * 2);
            ctx.fillStyle = `hsla(${time * 0.1 % 360}, 80%, 60%, 0.9)`;
            ctx.fill();
        }

        function drawRipple(x, y, color) {
            rippleEffect.push({ x, y, radius: 0, alpha: 1, color });
        }

        function updateRipples() {
            for (let i = rippleEffect.length - 1; i >= 0; i--) {
                const ripple = rippleEffect[i];
                ripple.radius += 8;
                ripple.alpha -= 0.05;

                if (ripple.alpha <= 0) {
                    rippleEffect.splice(i, 1);
                }
            }
        }

        function drawRipples() {
            rippleEffect.forEach(ripple => {
                ctx.beginPath();
                ctx.arc(ripple.x, ripple.y, ripple.radius, 0, Math.PI * 2);
                ctx.strokeStyle = ripple.color.replace('1)', `${ripple.alpha})`);
                ctx.lineWidth = 3;
                ctx.stroke();
            });
        }

        function drawTimingFeedback() {
            const time = Date.now();
            const timeSinceBeat = time - lastBeatTime;
            const beatProgress = timeSinceBeat / beatInterval;

            // パーフェクトタイミングインジケーター
            if (beatProgress > 0.4 && beatProgress < 0.6) {
                const intensity = 1 - Math.abs(beatProgress - 0.5) * 10;
                ctx.beginPath();
                ctx.arc(centerX, centerY, targetRadius * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 255, 255, ${intensity * 0.5})`;
                ctx.fill();
            }
        }

        function updateHUD() {
            document.getElementById('score').textContent = score;
            document.getElementById('comboCount').textContent = combo;
            document.getElementById('highScore').textContent = highScore;
        }

        function showCombo(points) {
            const comboDisplay = document.getElementById('comboDisplay');
            if (combo > 1) {
                comboDisplay.textContent = `${combo} COMBO!`;
                comboDisplay.className = 'combo show';
                setTimeout(() => {
                    comboDisplay.className = 'combo';
                }, 500);
            }
        }

        function handleTap(x, y) {
            if (!gameRunning) return;

            const time = Date.now();
            const timeSinceBeat = time - lastBeatTime;
            const beatProgress = timeSinceBeat / beatInterval;

            let points = 0;
            let feedback = '';

            // ビートに近いほど高得点
            if (beatProgress < 0.5) {
                // 次のビートを待つ
                return;
            }

            const timing = Math.abs(beatProgress - 0.5);
            const timingMs = timing * beatInterval;

            if (timingMs < 30) {
                points = 100;
                combo++;
                feedback = 'PERFECT!';
                drawRipple(x, y, 'rgba(255, 0, 255, 1)');
            } else if (timingMs < 60) {
                points = 75;
                combo++;
                feedback = 'GREAT!';
                drawRipple(x, y, 'rgba(0, 255, 255, 1)');
            } else if (timingMs < windowSize) {
                points = 50;
                combo++;
                feedback = 'GOOD';
                drawRipple(x, y, 'rgba(255, 255, 0, 1)');
            } else {
                combo = 0;
                feedback = 'MISS';
                drawRipple(x, y, 'rgba(255, 0, 0, 1)');
            }

            score += points * (1 + combo * 0.1);
            showCombo(points);

            // 難易度上昇
            if (score > 0 && score % 500 === 0) {
                bpm = Math.min(bpm + 5, 180);
                beatInterval = 60000 / bpm;
            }
        }

        function gameLoop() {
            if (!gameRunning) return;

            ctx.fillStyle = 'rgba(10, 10, 10, 0.3)';
            ctx.fillRect(0, 0, width, height);

            drawBackground();
            drawRipples();
            drawTarget();
            drawTimingFeedback();
            updateRipples();
            updateHUD();

            // ビート更新
            const time = Date.now();
            if (time - lastBeatTime >= beatInterval) {
                lastBeatTime = time;
            }

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');

            gameRunning = true;
            score = 0;
            combo = 0;
            bpm = 120;
            beatInterval = 60000 / bpm;
            lastBeatTime = Date.now();
            rippleEffect = [];

            resize();
            gameLoop();
        }

        function endGame() {
            gameRunning = false;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('rhythmReflexHighScore', highScore);
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        // イベントリスナー
        canvas.addEventListener('click', (e) => {
            handleTap(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleTap(touch.clientX, touch.clientY);
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', resize);

        // 初期化
        resize();
        document.getElementById('highScore').textContent = highScore;

        // ゲームオーバー判定（ミスが続いた場合）
        setInterval(() => {
            if (gameRunning && Date.now() - lastTapTime > 5000 && score > 0) {
                endGame();
            }
        }, 1000);
    </script>
</body>
</html>
