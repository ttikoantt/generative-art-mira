<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Time - 反応速度ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            transition: background 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .game-container {
            text-align: center;
            padding: 20px;
        }

        .title {
            font-size: 32px;
            font-weight: bold;
            color: white;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .message {
            font-size: 48px;
            font-weight: bold;
            color: white;
            margin: 40px 0;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
            min-height: 60px;
        }

        .time {
            font-size: 64px;
            font-weight: bold;
            color: white;
            margin: 20px 0;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
        }

        .stats {
            margin-top: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .stats p {
            font-size: 20px;
            color: white;
            margin: 10px 0;
        }

        .stats span {
            font-weight: bold;
            color: #4CAF50;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        /* 状態別背景色 */
        .waiting {
            background: #ce2636;
        }

        .ready {
            background: #ce2636;
        }

        .go {
            background: #4bdb6a;
        }

        .result {
            background: #4bd5db;
        }
    </style>
</head>
<body class="waiting">
    <button class="fullscreen-btn" onclick="toggleFullscreen()">
        全画面表示
    </button>

    <div class="game-container">
        <h1 class="title">⚡ REACTION TIME</h1>
        
        <div class="message" id="message">クリックでスタート</div>
        
        <div class="time" id="time" style="display: none;">0ms</div>
        
        <div class="stats" id="stats" style="display: none;">
            <p>ベストタイム: <span id="bestTime">--</span></p>
            <p>平均タイム: <span id="avgTime">--</span></p>
            <p>試行回数: <span id="attempts">0</span></p>
        </div>
    </div>

    <script>
        const body = document.body;
        const messageEl = document.getElementById('message');
        const timeEl = document.getElementById('time');
        const statsEl = document.getElementById('stats');
        const bestTimeEl = document.getElementById('bestTime');
        const avgTimeEl = document.getElementById('avgTime');
        const attemptsEl = document.getElementById('attempts');

        let gameState = 'waiting'; // waiting, ready, go, result
        let startTime;
        let timeout;
        let times = [];
        let bestTime = null;

        function setState(state) {
            gameState = state;
            body.className = state;
        }

        function startGame() {
            setState('ready');
            messageEl.textContent = '待機...';
            timeEl.style.display = 'none';
            
            const delay = Math.random() * 3000 + 2000; // 2-5秒
            
            timeout = setTimeout(() => {
                setState('go');
                messageEl.textContent = '！！タップ！！';
                startTime = Date.now();
            }, delay);
        }

        function handleClick() {
            if (gameState === 'waiting' || gameState === 'result') {
                startGame();
            } else if (gameState === 'ready') {
                clearTimeout(timeout);
                setState('waiting');
                messageEl.textContent = '早すぎる！もう一度';
            } else if (gameState === 'go') {
                const reactionTime = Date.now() - startTime;
                
                setState('result');
                messageEl.textContent = '素晴らしい！';
                timeEl.textContent = reactionTime + 'ms';
                timeEl.style.display = 'block';
                statsEl.style.display = 'block';
                
                times.push(reactionTime);
                
                if (bestTime === null || reactionTime < bestTime) {
                    bestTime = reactionTime;
                }
                
                updateStats();
            }
        }

        function updateStats() {
            bestTimeEl.textContent = bestTime + 'ms';
            
            const avg = Math.round(times.reduce((a, b) => a + b, 0) / times.length);
            avgTimeEl.textContent = avg + 'ms';
            
            attemptsEl.textContent = times.length;
        }

        // イベントリスナー
        document.addEventListener('click', handleClick);
        document.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick();
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
