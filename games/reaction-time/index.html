<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反応速度 | Games by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #333;
        }
        .game-container {
            max-width: 600px;
            width: 100%;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }
        .game-area {
            width: 100%;
            height: 300px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            margin-bottom: 30px;
            font-size: 1.5rem;
            font-weight: 600;
            position: relative;
            overflow: hidden;
        }
        .game-area:active {
            transform: scale(0.98);
        }
        .waiting {
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white;
        }
        .ready {
            background: linear-gradient(135deg, #28a745, #218838);
            color: white;
        }
        .start-screen {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .best-time {
            color: #ffc107;
            -webkit-text-fill-color: #ffc107;
        }
        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        .btn:active {
            transform: translateY(0);
        }
        .info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #666;
            line-height: 1.6;
        }
        .reaction-result {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 10px 0;
        }
        .rating {
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 10px;
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.95);
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fullscreen-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        .history {
            margin-top: 20px;
            text-align: left;
        }
        .history-title {
            font-size: 0.9rem;
            color: #999;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .history-item {
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #667eea;
        }
        @media (max-width: 768px) {
            .card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.6rem;
            }
            .game-area {
                height: 250px;
                font-size: 1.3rem;
            }
            .stats {
                flex-wrap: wrap;
                gap: 20px;
            }
        }
        /* Animation */
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .pulse {
            animation: pulse 0.5s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .shake {
            animation: shake 0.3s ease-in-out;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()" title="全画面表示">⛶</button>

    <div class="game-container">
        <div class="card">
            <h1>⚡ 反応速度</h1>
            <p class="subtitle">画面が緑色になったらタップ！</p>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-label">今回</div>
                    <div class="stat-value" id="currentTime">-</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">ベスト</div>
                    <div class="stat-value best-time" id="bestTime">-</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">平均</div>
                    <div class="stat-value" id="avgTime">-</div>
                </div>
            </div>

            <div class="game-area start-screen" id="gameArea">
                <div>
                    <div>スタート</div>
                    <div style="font-size: 1rem; margin-top: 10px; font-weight: 400;">タップして開始</div>
                </div>
            </div>

            <div class="info">
                <strong>遊び方：</strong><br>
                1. 「スタート」をタップ<br>
                2. 赤色の間待つ...<br>
                3. 緑色になったら即タップ！
            </div>

            <div class="history">
                <div class="history-title">最近の記録</div>
                <div class="history-list" id="historyList">
                    <span style="color: #999;">まだプレイしていません</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const gameArea = document.getElementById('gameArea');
        const currentTimeEl = document.getElementById('currentTime');
        const bestTimeEl = document.getElementById('bestTime');
        const avgTimeEl = document.getElementById('avgTime');
        const historyListEl = document.getElementById('historyList');

        let gameState = 'start'; // start, waiting, ready, result
        let startTime = 0;
        let timeoutId = null;
        let bestTime = Infinity;
        let times = [];

        function getRandomDelay() {
            return Math.random() * 3000 + 2000; // 2-5 seconds
        }

        function startGame() {
            gameState = 'waiting';
            gameArea.className = 'game-area waiting';
            gameArea.innerHTML = '<div>待て...</div>';

            const delay = getRandomDelay();
            timeoutId = setTimeout(() => {
                if (gameState === 'waiting') {
                    gameState = 'ready';
                    startTime = Date.now();
                    gameArea.className = 'game-area ready';
                    gameArea.innerHTML = '<div>タップ！</div>';
                }
            }, delay);
        }

        function handleClick() {
            if (gameState === 'start' || gameState === 'result') {
                startGame();
            } else if (gameState === 'waiting') {
                // Too early!
                clearTimeout(timeoutId);
                gameState = 'result';
                gameArea.className = 'game-area start-screen';
                gameArea.innerHTML = '<div style="font-size: 1.2rem;">早すぎ！❌<br><span style="font-size: 1rem; font-weight: 400;">もう一度タップ</span></div>';
                gameArea.classList.add('shake');
                setTimeout(() => gameArea.classList.remove('shake'), 300);
            } else if (gameState === 'ready') {
                // Success!
                const reactionTime = Date.now() - startTime;
                gameState = 'result';

                // Update stats
                currentTimeEl.textContent = reactionTime + 'ms';
                times.push(reactionTime);

                if (reactionTime < bestTime) {
                    bestTime = reactionTime;
                    bestTimeEl.textContent = reactionTime + 'ms';
                }

                const avgTime = Math.round(times.reduce((a, b) => a + b, 0) / times.length);
                avgTimeEl.textContent = avgTime + 'ms';

                // Show result
                const rating = getRating(reactionTime);
                gameArea.className = 'game-area start-screen';
                gameArea.innerHTML = `
                    <div>
                        <div class="reaction-result">${reactionTime}ms</div>
                        <div class="rating">${rating}</div>
                        <div style="font-size: 1rem; margin-top: 15px; font-weight: 400;">もう一度タップ</div>
                    </div>
                `;
                gameArea.classList.add('pulse');
                setTimeout(() => gameArea.classList.remove('pulse'), 500);

                // Update history
                updateHistory();
            }
        }

        function getRating(time) {
            if (time < 150) return '⚡ 超人的！';
            if (time < 200) return '🔥 すごい！';
            if (time < 250) return '👍 いいね！';
            if (time < 300) return '😊 普通';
            if (time < 400) return '🐢 少し遅め...';
            return '😴 眠い？';
        }

        function updateHistory() {
            if (times.length === 0) {
                historyListEl.innerHTML = '<span style="color: #999;">まだプレイしていません</span>';
                return;
            }

            const recentTimes = times.slice(-10).reverse();
            historyListEl.innerHTML = recentTimes
                .map(t => `<span class="history-item">${t}ms</span>`)
                .join('');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Event listeners
        gameArea.addEventListener('click', handleClick);
        gameArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick();
        });

        // Prevent context menu on long press
        gameArea.addEventListener('contextmenu', (e) => e.preventDefault());

        // Load best time from localStorage
        const savedBest = localStorage.getItem('reactionTimeBest');
        if (savedBest) {
            bestTime = parseInt(savedBest);
            bestTimeEl.textContent = bestTime + 'ms';
        }
    </script>
</body>
</html>
