<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Maze Adventure - Generative Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }

        h1 {
            color: #fff;
            font-size: 24px;
            text-align: center;
            text-shadow: 0 0 10px rgba(100, 200, 255, 0.5);
        }

        .stats {
            display: flex;
            gap: 20px;
            color: #fff;
            font-size: 14px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        canvas {
            border: 2px solid rgba(100, 200, 255, 0.3);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(100, 200, 255, 0.2);
            background: #0a0a1a;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: rgba(100, 200, 255, 0.2);
            border: 1px solid rgba(100, 200, 255, 0.4);
            color: white;
            padding: 12px 24px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            border-radius: 8px;
        }

        button:hover {
            background: rgba(100, 200, 255, 0.3);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .mobile-controls {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin-top: 10px;
        }

        .mobile-btn {
            width: 60px;
            height: 60px;
            background: rgba(100, 200, 255, 0.2);
            border: 1px solid rgba(100, 200, 255, 0.4);
            color: white;
            font-size: 24px;
            cursor: pointer;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }

        .mobile-btn:active {
            background: rgba(100, 200, 255, 0.4);
        }

        .mobile-btn.empty {
            background: transparent;
            border: none;
        }

        .win-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .win-overlay.show {
            display: flex;
        }

        .win-content {
            background: rgba(30, 30, 60, 0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            border: 2px solid rgba(100, 200, 255, 0.5);
            box-shadow: 0 0 50px rgba(100, 200, 255, 0.3);
        }

        .win-content h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #64c8ff;
        }

        .win-content p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 12px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            border-radius: 8px;
            font-size: 12px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 20px;
            }

            .stats {
                flex-wrap: wrap;
                justify-content: center;
            }

            canvas {
                max-width: 100%;
            }

            .mobile-controls {
                display: grid;
            }
        }

        @media (min-width: 601px) {
            .mobile-controls {
                display: none;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreen">⛶ Fullscreen</button>

    <div class="game-container">
        <h1>🌀 Maze Adventure</h1>

        <div class="stats">
            <div class="stat">Level: <span id="level">1</span></div>
            <div class="stat">Moves: <span id="moves">0</span></div>
            <div class="stat">Time: <span id="time">0:00</span></div>
        </div>

        <canvas id="maze" width="400" height="400"></canvas>

        <div class="mobile-controls">
            <div class="mobile-btn empty"></div>
            <div class="mobile-btn" data-dir="up">↑</div>
            <div class="mobile-btn empty"></div>
            <div class="mobile-btn" data-dir="left">←</div>
            <div class="mobile-btn empty"></div>
            <div class="mobile-btn" data-dir="right">→</div>
            <div class="mobile-btn empty"></div>
            <div class="mobile-btn" data-dir="down">↓</div>
            <div class="mobile-btn empty"></div>
        </div>

        <div class="controls">
            <button id="newGame">🔄 New Game</button>
            <button id="easy">Easy</button>
            <button id="medium">Medium</button>
            <button id="hard">Hard</button>
        </div>
    </div>

    <div class="win-overlay" id="winOverlay">
        <div class="win-content">
            <h2>🎉 You Win!</h2>
            <p>Maze cleared in <span id="finalMoves">0</span> moves and <span id="finalTime">0:00</span>!</p>
            <button id="nextLevel">Next Level →</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('maze');
        const ctx = canvas.getContext('2d');

        const CELL_SIZE = 20;
        let COLS, ROWS;
        let maze = [];
        let player = { x: 0, y: 0 };
        let goal = { x: 0, y: 0 };
        let moves = 0;
        let level = 1;
        let difficulty = 'medium';
        let startTime;
        let gameWon = false;

        const DIFFICULTY_SETTINGS = {
            easy: { size: 15 },
            medium: { size: 20 },
            hard: { size: 25 }
        };

        function initMaze() {
            const size = DIFFICULTY_SETTINGS[difficulty].size + Math.floor(level / 3);
            COLS = Math.min(size, 30);
            ROWS = Math.min(size, 30);

            canvas.width = COLS * CELL_SIZE;
            canvas.height = ROWS * CELL_SIZE;

            // Initialize maze grid
            maze = [];
            for (let y = 0; y < ROWS; y++) {
                maze[y] = [];
                for (let x = 0; x < COLS; x++) {
                    maze[y][x] = {
                        visited: false,
                        walls: { top: true, right: true, bottom: true, left: true }
                    };
                }
            }

            // Generate maze using depth-first search
            generateMaze(0, 0);

            // Set player and goal positions
            player = { x: 0, y: 0 };
            goal = { x: COLS - 1, y: ROWS - 1 };

            // Reset game state
            moves = 0;
            gameWon = false;
            startTime = Date.now();
            updateStats();
        }

        function generateMaze(x, y) {
            maze[y][x].visited = true;

            const directions = [
                { dx: 0, dy: -1, wall: 'top', opposite: 'bottom' },
                { dx: 1, dy: 0, wall: 'right', opposite: 'left' },
                { dx: 0, dy: 1, wall: 'bottom', opposite: 'top' },
                { dx: -1, dy: 0, wall: 'left', opposite: 'right' }
            ];

            // Shuffle directions
            for (let i = directions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [directions[i], directions[j]] = [directions[j], directions[i]];
            }

            for (const dir of directions) {
                const nx = x + dir.dx;
                const ny = y + dir.dy;

                if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && !maze[ny][nx].visited) {
                    maze[y][x].walls[dir.wall] = false;
                    maze[ny][nx].walls[dir.opposite] = false;
                    generateMaze(nx, ny);
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw maze walls
            ctx.strokeStyle = '#64c8ff';
            ctx.lineWidth = 2;

            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    const cell = maze[y][x];
                    const px = x * CELL_SIZE;
                    const py = y * CELL_SIZE;

                    ctx.beginPath();
                    if (cell.walls.top) {
                        ctx.moveTo(px, py);
                        ctx.lineTo(px + CELL_SIZE, py);
                    }
                    if (cell.walls.right) {
                        ctx.moveTo(px + CELL_SIZE, py);
                        ctx.lineTo(px + CELL_SIZE, py + CELL_SIZE);
                    }
                    if (cell.walls.bottom) {
                        ctx.moveTo(px, py + CELL_SIZE);
                        ctx.lineTo(px + CELL_SIZE, py + CELL_SIZE);
                    }
                    if (cell.walls.left) {
                        ctx.moveTo(px, py);
                        ctx.lineTo(px, py + CELL_SIZE);
                    }
                    ctx.stroke();
                }
            }

            // Draw goal with glow effect
            const goalX = goal.x * CELL_SIZE + CELL_SIZE / 2;
            const goalY = goal.y * CELL_SIZE + CELL_SIZE / 2;

            const goalGlow = ctx.createRadialGradient(goalX, goalY, 0, goalX, goalY, CELL_SIZE);
            goalGlow.addColorStop(0, 'rgba(0, 255, 128, 0.8)');
            goalGlow.addColorStop(1, 'transparent');
            ctx.fillStyle = goalGlow;
            ctx.beginPath();
            ctx.arc(goalX, goalY, CELL_SIZE, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#00ff80';
            ctx.beginPath();
            ctx.arc(goalX, goalY, CELL_SIZE / 3, 0, Math.PI * 2);
            ctx.fill();

            // Draw player with glow effect
            const playerX = player.x * CELL_SIZE + CELL_SIZE / 2;
            const playerY = player.y * CELL_SIZE + CELL_SIZE / 2;

            const playerGlow = ctx.createRadialGradient(playerX, playerY, 0, playerX, playerY, CELL_SIZE);
            playerGlow.addColorStop(0, 'rgba(255, 100, 200, 0.8)');
            playerGlow.addColorStop(1, 'transparent');
            ctx.fillStyle = playerGlow;
            ctx.beginPath();
            ctx.arc(playerX, playerY, CELL_SIZE, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#ff64c8';
            ctx.beginPath();
            ctx.arc(playerX, playerY, CELL_SIZE / 3, 0, Math.PI * 2);
            ctx.fill();
        }

        function movePlayer(dx, dy) {
            if (gameWon) return;

            const newX = player.x + dx;
            const newY = player.y + dy;

            if (newX < 0 || newX >= COLS || newY < 0 || newY >= ROWS) return;

            // Check walls
            const currentCell = maze[player.y][player.x];
            if (dx === 1 && currentCell.walls.right) return;
            if (dx === -1 && currentCell.walls.left) return;
            if (dy === 1 && currentCell.walls.bottom) return;
            if (dy === -1 && currentCell.walls.top) return;

            player.x = newX;
            player.y = newY;
            moves++;
            updateStats();
            draw();

            // Check win
            if (player.x === goal.x && player.y === goal.y) {
                gameWon = true;
                showWinScreen();
            }
        }

        function updateStats() {
            document.getElementById('level').textContent = level;
            document.getElementById('moves').textContent = moves;

            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            document.getElementById('time').textContent = `${minutes}:${String(seconds).padStart(2, '0')}`;
        }

        function showWinScreen() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;

            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('finalTime').textContent = `${minutes}:${String(seconds).padStart(2, '0')}`;
            document.getElementById('winOverlay').classList.add('show');
        }

        function nextLevel() {
            level++;
            document.getElementById('winOverlay').classList.remove('show');
            initMaze();
            draw();
        }

        // Event Listeners
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    movePlayer(0, -1);
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    movePlayer(0, 1);
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    movePlayer(-1, 0);
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    movePlayer(1, 0);
                    break;
            }
        });

        // Mobile controls
        document.querySelectorAll('.mobile-btn[data-dir]').forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const dir = btn.dataset.dir;
                switch (dir) {
                    case 'up': movePlayer(0, -1); break;
                    case 'down': movePlayer(0, 1); break;
                    case 'left': movePlayer(-1, 0); break;
                    case 'right': movePlayer(1, 0); break;
                }
            });

            btn.addEventListener('click', (e) => {
                const dir = btn.dataset.dir;
                switch (dir) {
                    case 'up': movePlayer(0, -1); break;
                    case 'down': movePlayer(0, 1); break;
                    case 'left': movePlayer(-1, 0); break;
                    case 'right': movePlayer(1, 0); break;
                }
            });
        });

        document.getElementById('newGame').addEventListener('click', () => {
            level = 1;
            initMaze();
            draw();
        });

        document.getElementById('easy').addEventListener('click', () => {
            difficulty = 'easy';
            level = 1;
            initMaze();
            draw();
        });

        document.getElementById('medium').addEventListener('click', () => {
            difficulty = 'medium';
            level = 1;
            initMaze();
            draw();
        });

        document.getElementById('hard').addEventListener('click', () => {
            difficulty = 'hard';
            level = 1;
            initMaze();
            draw();
        });

        document.getElementById('nextLevel').addEventListener('click', nextLevel);

        document.getElementById('fullscreen').addEventListener('click', function() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
                this.textContent = '⛶ Fullscreen';
            } else {
                document.documentElement.requestFullscreen();
                this.textContent = '⛶ Exit';
            }
        });

        // Update timer
        setInterval(() => {
            if (!gameWon) {
                updateStats();
            }
        }, 1000);

        // Initialize game
        initMaze();
        draw();
    </script>
</body>
</html>
