<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Number Sequencer #834</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 10px;
            color: white;
            font-weight: bold;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }

        .sequence-display {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .sequence-numbers {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            letter-spacing: 8px;
            margin-bottom: 10px;
        }

        .question {
            font-size: 18px;
            color: #667eea;
            font-weight: bold;
        }

        .answer-input {
            width: 100%;
            padding: 15px;
            font-size: 24px;
            border: 3px solid #ddd;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
            transition: border-color 0.3s;
        }

        .answer-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .submit-btn:hover {
            transform: scale(1.02);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .feedback {
            text-align: center;
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
            min-height: 30px;
        }

        .feedback.correct {
            color: #10b981;
        }

        .feedback.incorrect {
            color: #ef4444;
        }

        .hint {
            text-align: center;
            color: #6b7280;
            font-size: 14px;
            margin-top: 15px;
            font-style: italic;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 10;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .game-over {
            display: none;
            text-align: center;
        }

        .game-over.active {
            display: block;
        }

        .final-score {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }

        .restart-btn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .restart-btn:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container" id="game-container">
        <h1>🔢 Number Sequencer</h1>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">スコア</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="streak">0</div>
                <div class="stat-label">連続正解</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="lives">3</div>
                <div class="stat-label">ライフ</div>
            </div>
        </div>

        <div class="sequence-display">
            <div class="sequence-numbers" id="sequence"></div>
            <div class="question">次の数は？</div>
        </div>

        <input type="number" class="answer-input" id="answer-input" placeholder="答えを入力">

        <button class="submit-btn" onclick="checkAnswer()">回答</button>

        <div class="feedback" id="feedback"></div>
        <div class="hint" id="hint"></div>
    </div>

    <div class="game-over" id="game-over">
        <div class="game-container">
            <h1>ゲームオーバー</h1>
            <div class="final-score" id="final-score">0</div>
            <p>最高スコア: <span id="high-score">0</span></p>
            <button class="restart-btn" onclick="restartGame()">もう一度プレイ</button>
        </div>
    </div>

    <script>
        // ゲーム状態
        let score = 0;
        let streak = 0;
        let lives = 3;
        let highScore = localStorage.getItem('numberSequencerHighScore') || 0;
        let currentSequence = [];
        let correctAnswer = 0;

        // 数列パターン
        const patterns = [
            // 等差数列
            (start) => {
                const diff = Math.floor(Math.random() * 5) + 2;
                const seq = [start, start + diff, start + diff * 2, start + diff * 3];
                return { sequence: seq, answer: start + diff * 4, hint: `+${diff} ずつ増えています` };
            },
            // 等比数列
            (start) => {
                const ratio = Math.floor(Math.random() * 2) + 2;
                const seq = [start, start * ratio, start * ratio * ratio];
                return { sequence: seq, answer: start * ratio * ratio * ratio, hint: `×${ratio} ずつ増えています` };
            },
            // フィボナッチ数列風
            (start) => {
                const seq = [start, start + 1, start * 2 + 1, start * 3 + 2];
                return { sequence: seq, answer: start * 5 + 3, hint: `前の2つの数を足しています` };
            },
            // 平方数
            (start) => {
                const seq = [start * start, (start + 1) * (start + 1), (start + 2) * (start + 2)];
                return { sequence: seq, answer: (start + 3) * (start + 3), hint: `平方数の数列です` };
            },
            // 交互のパターン
            (start) => {
                const seq = [start, start + 3, start + 6, start + 7, start + 10];
                return { sequence: seq, answer: start + 13, hint: `+3, +3, +1, +3, +3...` };
            }
        ];

        // 新しい数列を生成
        function generateSequence() {
            const start = Math.floor(Math.random() * 5) + 1;
            const patternIndex = Math.floor(Math.random() * patterns.length);
            const result = patterns[patternIndex](start);

            currentSequence = result.sequence;
            correctAnswer = result.answer;

            document.getElementById('sequence').textContent = result.sequence.join(', ');
            document.getElementById('hint').textContent = result.hint;
        }

        // 回答をチェック
        function checkAnswer() {
            const input = document.getElementById('answer-input');
            const userAnswer = parseInt(input.value);
            const feedback = document.getElementById('feedback');

            if (isNaN(userAnswer)) {
                feedback.textContent = '数字を入力してください';
                feedback.className = 'feedback incorrect';
                return;
            }

            if (userAnswer === correctAnswer) {
                // 正解
                streak++;
                const bonus = streak >= 3 ? streak : 1;
                score += 10 * bonus;

                feedback.textContent = `正解！ +${10 * bonus}ポイント`;
                feedback.className = 'feedback correct';

                setTimeout(() => {
                    feedback.textContent = '';
                    input.value = '';
                    generateSequence();
                }, 1000);
            } else {
                // 不正解
                lives--;
                streak = 0;

                feedback.textContent = `残念！正解は ${correctAnswer}`;
                feedback.className = 'feedback incorrect';

                setTimeout(() => {
                    feedback.textContent = '';
                    input.value = '';

                    if (lives <= 0) {
                        endGame();
                    } else {
                        generateSequence();
                    }
                }, 1500);
            }

            updateStats();
        }

        // ステータス更新
        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('lives').textContent = lives;
        }

        // ゲーム終了
        function endGame() {
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('game-over').classList.add('active');
            document.getElementById('final-score').textContent = score;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('numberSequencerHighScore', highScore);
            }

            document.getElementById('high-score').textContent = highScore;
        }

        // ゲーム再開
        function restartGame() {
            score = 0;
            streak = 0;
            lives = 3;

            document.getElementById('game-container').style.display = 'block';
            document.getElementById('game-over').classList.remove('active');
            document.getElementById('answer-input').value = '';

            updateStats();
            generateSequence();
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Enterキーで回答
        document.getElementById('answer-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        // ゲーム開始
        generateSequence();
    </script>
</body>
</html>
