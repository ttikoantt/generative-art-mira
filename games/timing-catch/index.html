<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timing Catch - タイミングキャッチ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            cursor: crosshair;
        }

        #ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .score-display {
            color: #fff;
            font-size: 18px;
            font-weight: bold;
        }

        .score-display span {
            color: #00ff88;
            font-size: 24px;
        }

        #gameOver {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 30, 0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: #fff;
            z-index: 200;
            display: none;
            border: 2px solid #00ff88;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.3);
        }

        #gameOver h2 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #00ff88;
        }

        #gameOver p {
            font-size: 18px;
            margin: 10px 0;
        }

        #gameOver .final-score {
            font-size: 48px;
            color: #00ff88;
            margin: 20px 0;
        }

        #restartBtn {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #restartBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.4);
        }

        #startScreen {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 30, 0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: #fff;
            z-index: 200;
            border: 2px solid #00ff88;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.3);
        }

        #startScreen h1 {
            font-size: 36px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #startScreen p {
            font-size: 14px;
            color: #aaa;
            margin: 15px 0;
            line-height: 1.6;
        }

        #startBtn {
            margin-top: 20px;
            padding: 12px 40px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #startBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.4);
        }

        #fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 150;
            padding: 8px 16px;
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid #00ff88;
            color: #00ff88;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        #fullscreen:hover {
            background: rgba(0, 255, 136, 0.3);
        }

        .combo-display {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.8);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .combo-display.active {
            opacity: 1;
            animation: comboPulse 0.3s ease-out;
        }

        @keyframes comboPulse {
            0% { transform: translateX(-50%) scale(0.5); opacity: 0; }
            50% { transform: translateX(-50%) scale(1.2); opacity: 1; }
            100% { transform: translateX(-50%) scale(1); opacity: 1; }
        }

        .catch-zone-indicator {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 150px;
            background: linear-gradient(to top, rgba(0, 255, 136, 0.1), transparent);
            border-top: 2px dashed rgba(0, 255, 136, 0.3);
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(0, 255, 136, 0.5);
            font-size: 14px;
        }

        .catch-zone-indicator::after {
            content: "CATCH ZONE";
            letter-spacing: 4px;
        }

        .timer-bar {
            position: fixed;
            top: 70px;
            left: 20px;
            right: 20px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00ccff);
            transition: width 0.1s linear;
        }

        .hit-effect {
            position: fixed;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.8), transparent);
            pointer-events: none;
            animation: hitExpand 0.4s ease-out forwards;
        }

        @keyframes hitExpand {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .score-popup {
            position: fixed;
            color: #00ff88;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            animation: scoreFloat 0.8s ease-out forwards;
        }

        @keyframes scoreFloat {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui">
        <div class="score-display">スコア: <span id="score">0</span></div>
        <div class="score-display">ライフ: <span id="lives">3</span></div>
    </div>

    <div class="timer-bar">
        <div class="timer-fill" id="timerFill"></div>
    </div>

    <div class="combo-display" id="comboDisplay"></div>
    <div class="catch-zone-indicator"></div>

    <button id="fullscreen" onclick="toggleFullscreen()">全画面</button>

    <div id="startScreen">
        <h1>🎯 Timing Catch</h1>
        <p>落ちてくるボールを<br>キャッチゾーンでキャッチ！</p>
        <p>タイミングよくキャッチして<br>コンボを稼ごう！</p>
        <button id="startBtn">スタート</button>
    </div>

    <div id="gameOver">
        <h2>ゲームオーバー</h2>
        <p>最終スコア</p>
        <div class="final-score" id="finalScore">0</div>
        <p>最大コンボ: <span id="maxCombo">0</span></p>
        <button id="restartBtn">もう一度</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let balls = [];
        let particles = [];
        let score = 0;
        let lives = 3;
        let combo = 0;
        let maxCombo = 0;
        let gameRunning = false;
        let spawnTimer = 0;
        let spawnInterval = 60;
        let difficultyTimer = 0;

        const CATCH_ZONE_HEIGHT = 150;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Ball {
            constructor() {
                this.radius = 20 + Math.random() * 15;
                this.x = Math.random() * (width - this.radius * 2) + this.radius;
                this.y = -this.radius;
                this.speed = 2 + Math.random() * 2 + (difficultyTimer * 0.01);
                this.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.caught = false;
                this.trail = [];
            }

            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;

                // Trail effect
                this.trail.push({ x: this.x, y: this.y, alpha: 1 });
                if (this.trail.length > 10) {
                    this.trail.shift();
                }
                this.trail.forEach(t => t.alpha -= 0.1);
            }

            draw() {
                // Draw trail
                this.trail.forEach((t, i) => {
                    const trailRadius = this.radius * (i / this.trail.length);
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, trailRadius, 0, Math.PI * 2);
                    ctx.fillStyle = this.color.replace('60%)', `60%, ${t.alpha * 0.3})`);
                    ctx.fill();
                });

                // Draw ball
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);

                const gradient = ctx.createRadialGradient(
                    this.x - this.radius * 0.3,
                    this.y - this.radius * 0.3,
                    0,
                    this.x,
                    this.y,
                    this.radius
                );
                gradient.addColorStop(0, 'white');
                gradient.addColorStop(0.3, this.color);
                gradient.addColorStop(1, this.color.replace('60%)', '40%)'));

                ctx.fillStyle = gradient;
                ctx.fill();

                // Glow effect
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 20;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            isInCatchZone() {
                return this.y > height - CATCH_ZONE_HEIGHT;
            }

            isOffScreen() {
                return this.y > height + this.radius;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.radius = Math.random() * 5 + 2;
                this.color = color;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.02;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2;
                this.alpha -= this.decay;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color.replace('60%)', `60%, ${this.alpha})`);
                ctx.fill();
            }

            isDead() {
                return this.alpha <= 0;
            }
        }

        function createParticles(x, y, color, count = 15) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function showHitEffect(x, y) {
            const effect = document.createElement('div');
            effect.className = 'hit-effect';
            effect.style.left = (x - 30) + 'px';
            effect.style.top = (y - 30) + 'px';
            document.body.appendChild(effect);
            setTimeout(() => effect.remove(), 400);
        }

        function showScorePopup(x, y, points) {
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.textContent = '+' + points;
            popup.style.left = x + 'px';
            popup.style.top = y + 'px';
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 800);
        }

        function updateCombo() {
            const comboDisplay = document.getElementById('comboDisplay');
            if (combo > 1) {
                comboDisplay.textContent = combo + ' COMBO!';
                comboDisplay.classList.add('active');
                setTimeout(() => comboDisplay.classList.remove('active'), 300);
            }
        }

        function handleClick(e) {
            if (!gameRunning) return;

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            for (let i = balls.length - 1; i >= 0; i--) {
                const ball = balls[i];
                const dx = x - ball.x;
                const dy = y - ball.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < ball.radius + 20 && ball.isInCatchZone()) {
                    // Caught!
                    const basePoints = Math.floor(ball.radius);
                    const comboBonus = Math.floor(combo * 5);
                    const points = basePoints + comboBonus;

                    score += points;
                    combo++;
                    maxCombo = Math.max(maxCombo, combo);

                    createParticles(ball.x, ball.y, ball.color, 20);
                    showHitEffect(ball.x, ball.y);
                    showScorePopup(ball.x, ball.y, points);
                    updateCombo();

                    document.getElementById('score').textContent = score;

                    balls.splice(i, 1);
                    return;
                }
            }

            // Missed click - reset combo
            if (combo > 0) {
                combo = 0;
                updateCombo();
            }
        }

        function update() {
            if (!gameRunning) return;

            difficultyTimer++;

            // Spawn balls
            spawnTimer++;
            const currentInterval = Math.max(20, spawnInterval - Math.floor(difficultyTimer / 300));
            if (spawnTimer >= currentInterval) {
                balls.push(new Ball());
                spawnTimer = 0;
            }

            // Update balls
            for (let i = balls.length - 1; i >= 0; i--) {
                balls[i].update();

                if (balls[i].isOffScreen()) {
                    // Missed ball
                    lives--;
                    combo = 0;
                    document.getElementById('lives').textContent = lives;
                    updateCombo();

                    balls.splice(i, 1);

                    if (lives <= 0) {
                        gameOver();
                    }
                }
            }

            // Update particles
            particles = particles.filter(p => {
                p.update();
                return !p.isDead();
            });
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = 'rgba(26, 26, 46, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // Draw balls
            balls.forEach(ball => ball.draw());

            // Draw particles
            particles.forEach(p => p.draw());

            if (gameRunning) {
                requestAnimationFrame(() => {
                    update();
                    draw();
                });
            }
        }

        function startGame() {
            score = 0;
            lives = 3;
            combo = 0;
            maxCombo = 0;
            gameRunning = true;
            balls = [];
            particles = [];
            spawnTimer = 0;
            difficultyTimer = 0;

            document.getElementById('score').textContent = '0';
            document.getElementById('lives').textContent = '3';
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';

            draw();
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('maxCombo').textContent = maxCombo;
            document.getElementById('gameOver').style.display = 'block';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Event listeners
        window.addEventListener('resize', resize);

        canvas.addEventListener('click', handleClick);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick(e);
        }, { passive: false });

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        // Initialize
        resize();
    </script>
</body>
</html>
