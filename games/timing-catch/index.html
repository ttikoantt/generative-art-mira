<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timing Catch - Game by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            text-align: center;
            width: 100%;
            padding: 10px;
        }

        h1 {
            color: #00d9ff;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .stat {
            color: #fff;
            font-size: clamp(1rem, 2vw, 1.3rem);
        }

        .stat-value {
            color: #00d9ff;
            font-weight: bold;
            font-size: clamp(1.3rem, 3vw, 1.8rem);
        }

        canvas {
            border: 3px solid #00d9ff;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.3);
            background: rgba(0, 0, 0, 0.6);
            max-width: 95vw;
            max-height: 60vh;
            display: block;
            margin: 0 auto;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: rgba(0, 217, 255, 0.1);
            color: #00d9ff;
            border: 2px solid #00d9ff;
            padding: 12px 24px;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            cursor: pointer;
            border-radius: 8px;
            font-family: 'Arial', sans-serif;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            background: rgba(0, 217, 255, 0.3);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.4);
        }

        .fullscreen-btn {
            background: rgba(255, 105, 180, 0.1);
            color: #ff69b4;
            border-color: #ff69b4;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 105, 180, 0.3);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.4);
        }

        .message {
            color: #ff69b4;
            font-size: clamp(1rem, 2vw, 1.3rem);
            margin-top: 10px;
            min-height: 30px;
            font-weight: bold;
        }

        .info {
            color: #888;
            margin-top: 10px;
            font-size: clamp(0.8rem, 1.5vw, 1rem);
        }

        @media (max-width: 768px) {
            h1 {
                margin-bottom: 8px;
            }

            canvas {
                max-height: 55vh;
            }

            button {
                padding: 10px 18px;
                font-size: 0.95rem;
            }

            .stats {
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏱️ Timing Catch ⏱️</h1>
        <div class="stats">
            <div class="stat">スコア: <span id="score" class="stat-value">0</span></div>
            <div class="stat">ハイスコア: <span id="highScore" class="stat-value">0</span></div>
            <div class="stat">ライフ: <span id="lives" class="stat-value">3</span></div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="message" id="message"></div>
        <div class="controls">
            <button onclick="startGame()">🎮 スタート</button>
            <button onclick="toggleFullscreen()" class="fullscreen-btn">📺 全画面</button>
        </div>
        <div class="info">
            スペースキー/タップでキャッチ！タイミングが命！
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Resize canvas
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth * 0.95, 600);
            const maxHeight = Math.min(window.innerHeight * 0.6, 500);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game state
        let score = 0;
        let highScore = parseInt(localStorage.getItem('timingCatchHighScore')) || 0;
        let lives = 3;
        let isPlaying = false;
        let animationId;
        let ball = null;
        let catcher = { x: 0, y: 0, width: 100, height: 15, speed: 8 };
        let balls = [];

        // Update displays
        function updateDisplays() {
            document.getElementById('score').textContent = score;
            document.getElementById('highScore').textContent = highScore;
            document.getElementById('lives').textContent = lives;
        }

        // Initialize catcher position
        function initCatcher() {
            catcher.x = canvas.width / 2 - catcher.width / 2;
            catcher.y = canvas.height - 40;
        }

        // Create ball
        function createBall() {
            const size = 20 + Math.random() * 15;
            balls.push({
                x: Math.random() * (canvas.width - size),
                y: -size,
                size: size,
                speed: 2 + Math.random() * 2 + score * 0.1,
                color: `hsl(${Math.random() * 360}, 70%, 50%)`
            });
        }

        // Draw catcher
        function drawCatcher() {
            const gradient = ctx.createLinearGradient(catcher.x, catcher.y, catcher.x, catcher.y + catcher.height);
            gradient.addColorStop(0, '#00d9ff');
            gradient.addColorStop(1, '#0099cc');

            ctx.fillStyle = gradient;
            ctx.shadowColor = '#00d9ff';
            ctx.shadowBlur = 15;
            ctx.fillRect(catcher.x, catcher.y, catcher.width, catcher.height);
            ctx.shadowBlur = 0;

            // Glow effect
            ctx.strokeStyle = 'rgba(0, 217, 255, 0.5)';
            ctx.lineWidth = 2;
            ctx.strokeRect(catcher.x - 2, catcher.y - 2, catcher.width + 4, catcher.height + 4);
        }

        // Draw balls
        function drawBalls() {
            balls.forEach(ball => {
                const gradient = ctx.createRadialGradient(
                    ball.x + ball.size / 2, ball.y + ball.size / 2, 0,
                    ball.x + ball.size / 2, ball.y + ball.size / 2, ball.size / 2
                );
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(0.5, ball.color);
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0.3)');

                ctx.beginPath();
                ctx.arc(ball.x + ball.size / 2, ball.y + ball.size / 2, ball.size / 2, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.shadowColor = ball.color;
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        }

        // Update game
        function update() {
            if (!isPlaying) return;

            // Update balls
            balls.forEach((ball, index) => {
                ball.y += ball.speed;

                // Check catch
                if (ball.y + ball.size >= catcher.y &&
                    ball.y <= catcher.y + catcher.height &&
                    ball.x + ball.size >= catcher.x &&
                    ball.x <= catcher.x + catcher.width) {

                    balls.splice(index, 1);
                    score++;
                    updateDisplays();
                    showMessage('Nice catch! +1', '#00ff88');

                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('timingCatchHighScore', highScore);
                        updateDisplays();
                    }
                }

                // Miss ball
                if (ball.y > canvas.height) {
                    balls.splice(index, 1);
                    lives--;
                    updateDisplays();
                    showMessage('Miss!', '#ff4444');

                    if (lives <= 0) {
                        gameOver();
                    }
                }
            });

            // Spawn new balls
            if (Math.random() < 0.02 + score * 0.001) {
                createBall();
            }
        }

        // Draw game
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Background
            const bgGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bgGradient.addColorStop(0, 'rgba(10, 10, 30, 0.95)');
            bgGradient.addColorStop(1, 'rgba(20, 20, 50, 0.95)');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid pattern
            ctx.strokeStyle = 'rgba(0, 217, 255, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 30) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 30) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            drawCatcher();
            drawBalls();
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        // Start game
        function startGame() {
            score = 0;
            lives = 3;
            balls = [];
            isPlaying = true;
            updateDisplays();
            initCatcher();
            showMessage('Go!', '#00d9ff');

            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            gameLoop();

            // Create initial balls
            setTimeout(() => createBall(), 500);
            setTimeout(() => createBall(), 1500);
        }

        // Game over
        function gameOver() {
            isPlaying = false;
            showMessage(`Game Over! Score: ${score}`, '#ff69b4');
        }

        // Show message
        function showMessage(text, color) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.style.color = color;
            setTimeout(() => {
                if (messageEl.textContent === text) {
                    messageEl.textContent = '';
                }
            }, 1500);
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!isPlaying) {
                    startGame();
                }
            }

            if (!isPlaying) return;

            if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
                catcher.x = Math.max(0, catcher.x - catcher.speed * 2);
            }
            if (e.code === 'ArrowRight' || e.code === 'KeyD') {
                catcher.x = Math.min(canvas.width - catcher.width, catcher.x + catcher.speed * 2);
            }
        });

        // Touch controls
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!isPlaying) {
                startGame();
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isPlaying) return;

            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;

            catcher.x = Math.max(0, Math.min(canvas.width - catcher.width, x - catcher.width / 2));
        });

        // Mouse controls
        canvas.addEventListener('click', () => {
            if (!isPlaying) {
                startGame();
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isPlaying) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;

            catcher.x = Math.max(0, Math.min(canvas.width - catcher.width, x - catcher.width / 2));
        });

        // Toggle fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        updateDisplays();
        initCatcher();
        draw();
    </script>
</body>
</html>
