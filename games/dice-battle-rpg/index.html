<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Battle RPG - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .battle-area {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 20px;
        }

        .character {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .character.hit {
            animation: shake 0.3s ease;
            background: rgba(255, 0, 0, 0.2);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .character.heal {
            animation: heal 0.5s ease;
            background: rgba(0, 255, 0, 0.2);
        }

        @keyframes heal {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .character-name {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .character-emoji {
            font-size: 48px;
            text-align: center;
            margin-bottom: 10px;
        }

        .hp-bar {
            background: rgba(0, 0, 0, 0.3);
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        .hp-fill.low {
            background: linear-gradient(90deg, #ff6b6b, #feca57);
        }

        .hp-text {
            font-size: 12px;
            color: #888;
            text-align: center;
        }

        .level-info {
            text-align: center;
            font-size: 11px;
            color: #666;
            margin-top: 5px;
        }

        .battle-log {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            height: 150px;
            overflow-y: auto;
            font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .log-entry {
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .log-entry.damage {
            color: #ff6b6b;
        }

        .log-entry.heal {
            color: #00ff88;
        }

        .log-entry.info {
            color: #888;
        }

        .log-entry.enemy {
            color: #feca57;
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .action-btn {
            padding: 20px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .action-btn.attack {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: #fff;
        }

        .action-btn.attack:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
        }

        .action-btn.power {
            background: linear-gradient(135deg, #feca57, #ff9f43);
            color: #000;
        }

        .action-btn.power:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(254, 202, 87, 0.4);
        }

        .action-btn.heal {
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            color: #000;
        }

        .action-btn.heal:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }

        .action-desc {
            font-size: 10px;
            color: rgba(0, 0, 0, 0.6);
            margin-top: 5px;
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .game-over.hidden {
            display: none;
        }

        .game-over h2 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .game-over.win h2 {
            color: #00ff88;
        }

        .game-over.lose h2 {
            color: #ff6b6b;
        }

        .game-over p {
            font-size: 18px;
            color: #888;
            margin-bottom: 30px;
        }

        .restart-btn {
            padding: 15px 40px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            color: #000;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 30px rgba(0, 212, 255, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
            font-size: 20px;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 212, 255, 0.3);
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 22px;
            }

            .battle-area {
                flex-direction: column;
                gap: 15px;
            }

            .character {
                padding: 15px;
            }

            .character-emoji {
                font-size: 36px;
            }

            .actions {
                grid-template-columns: 1fr;
            }

            .action-btn {
                padding: 15px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <h1>🎲 Dice Battle RPG</h1>

        <div class="battle-area">
            <div class="character" id="player">
                <div class="character-name">Player</div>
                <div class="character-emoji">🧙</div>
                <div class="hp-bar">
                    <div class="hp-fill" id="playerHpBar"></div>
                </div>
                <div class="hp-text"><span id="playerHp">100</span> / <span id="playerMaxHp">100</span></div>
                <div class="level-info">Lv.<span id="playerLevel">1</span> | XP: <span id="playerXp">0</span>/<span id="playerXpNeeded">100</span></div>
            </div>

            <div class="character" id="enemy">
                <div class="character-name">Enemy</div>
                <div class="character-emoji" id="enemyEmoji">👹</div>
                <div class="hp-bar">
                    <div class="hp-fill" id="enemyHpBar"></div>
                </div>
                <div class="hp-text"><span id="enemyHp">50</span> / <span id="enemyMaxHp">50</span></div>
            </div>
        </div>

        <div class="battle-log" id="battleLog"></div>

        <div class="actions">
            <button class="action-btn attack" onclick="playerAction('attack')" id="attackBtn">
                Attack
                <div class="action-desc">ダイス1-6</div>
            </button>
            <button class="action-btn power" onclick="playerAction('power')" id="powerBtn">
                Power
                <div class="action-desc">ダイス1-12 (50%)</div>
            </button>
            <button class="action-btn heal" onclick="playerAction('heal')" id="healBtn">
                Heal
                <div class="action-desc">回復1-6</div>
            </button>
        </div>
    </div>

    <div class="game-over hidden" id="gameOver">
        <h2 id="gameOverTitle">Game Over</h2>
        <p id="gameOverText">You were defeated...</p>
        <button class="restart-btn" onclick="restart()">Restart</button>
    </div>

    <script>
        // ゲーム状態
        let player = {
            hp: 100,
            maxHp: 100,
            level: 1,
            xp: 0,
            xpNeeded: 100
        };

        let enemy = {
            hp: 50,
            maxHp: 50,
            attack: 8,
            emoji: '👹'
        };

        const enemies = [
            { emoji: '👹', name: 'Ogre', hp: 50, attack: 8 },
            { emoji: '🐉', name: 'Dragon', hp: 80, attack: 12 },
            { emoji: '👻', name: 'Ghost', hp: 40, attack: 6 },
            { emoji: '🤖', name: 'Robot', hp: 70, attack: 10 },
            { emoji: '👾', name: 'Alien', hp: 60, attack: 9 },
            { emoji: '💀', name: 'Skeleton', hp: 45, attack: 7 }
        ];

        let isPlayerTurn = true;
        let battleCount = 0;

        // UI更新
        function updateUI() {
            // Player HP
            const playerHpPercent = (player.hp / player.maxHp) * 100;
            document.getElementById('playerHpBar').style.width = playerHpPercent + '%';
            document.getElementById('playerHpBar').classList.toggle('low', playerHpPercent < 30);
            document.getElementById('playerHp').textContent = player.hp;
            document.getElementById('playerMaxHp').textContent = player.maxHp;
            document.getElementById('playerLevel').textContent = player.level;
            document.getElementById('playerXp').textContent = player.xp;
            document.getElementById('playerXpNeeded').textContent = player.xpNeeded;

            // Enemy HP
            const enemyHpPercent = (enemy.hp / enemy.maxHp) * 100;
            document.getElementById('enemyHpBar').style.width = enemyHpPercent + '%';
            document.getElementById('enemyHpBar').classList.toggle('low', enemyHpPercent < 30);
            document.getElementById('enemyHp').textContent = enemy.hp;
            document.getElementById('enemyMaxHp').textContent = enemy.maxHp;
            document.getElementById('enemyEmoji').textContent = enemy.emoji;
        }

        function addLog(message, type = '') {
            const log = document.getElementById('battleLog');
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + type;
            entry.textContent = message;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function rollDice(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function spawnEnemy() {
            const template = enemies[Math.floor(Math.random() * enemies.length)];
            const levelBonus = Math.floor(battleCount / 3);
            enemy = {
                hp: template.hp + levelBonus * 10,
                maxHp: template.hp + levelBonus * 10,
                attack: template.attack + levelBonus * 2,
                emoji: template.emoji,
                name: template.name
            };
            addLog(`A wild ${enemy.name} appeared!`, 'enemy');
        }

        function playerAction(action) {
            if (!isPlayerTurn) return;

            isPlayerTurn = false;
            disableButtons(true);

            let damage = 0;
            let hit = true;

            switch (action) {
                case 'attack':
                    damage = rollDice(1, 6);
                    addLog(`You attack! Rolled ${damage} damage.`, 'damage');
                    break;
                case 'power':
                    hit = Math.random() < 0.5;
                    if (hit) {
                        damage = rollDice(1, 12);
                        addLog(`Power attack hits! Rolled ${damage} damage!`, 'damage');
                    } else {
                        addLog(`Power attack missed!`, 'info');
                    }
                    break;
                case 'heal':
                    const healAmount = rollDice(1, 6);
                    player.hp = Math.min(player.maxHp, player.hp + healAmount);
                    addLog(`You heal ${healAmount} HP!`, 'heal');
                    document.getElementById('player').classList.add('heal');
                    setTimeout(() => document.getElementById('player').classList.remove('heal'), 500);
                    break;
            }

            if (damage > 0) {
                enemy.hp -= damage;
                document.getElementById('enemy').classList.add('hit');
                setTimeout(() => document.getElementById('enemy').classList.remove('hit'), 300);
            }

            updateUI();

            if (enemy.hp <= 0) {
                victory();
            } else {
                setTimeout(enemyTurn, 1000);
            }
        }

        function enemyTurn() {
            const damage = rollDice(1, enemy.attack);
            player.hp -= damage;
            addLog(`${enemy.name} attacks! ${damage} damage!`, 'enemy');
            document.getElementById('player').classList.add('hit');
            setTimeout(() => document.getElementById('player').classList.remove('hit'), 300);

            updateUI();

            if (player.hp <= 0) {
                gameOver();
            } else {
                isPlayerTurn = true;
                disableButtons(false);
            }
        }

        function victory() {
            const xpGain = rollDice(20, 40);
            player.xp += xpGain;
            addLog(`Victory! Gained ${xpGain} XP!`, 'heal');

            // レベルアップチェック
            while (player.xp >= player.xpNeeded) {
                player.xp -= player.xpNeeded;
                player.level++;
                player.maxHp += 10;
                player.hp = player.maxHp;
                player.xpNeeded = Math.floor(player.xpNeeded * 1.5);
                addLog(`Level up! Now level ${player.level}!`, 'heal');
            }

            updateUI();

            // 次の敵
            battleCount++;
            setTimeout(() => {
                spawnEnemy();
                updateUI();
                isPlayerTurn = true;
                disableButtons(false);
            }, 1500);
        }

        function gameOver() {
            document.getElementById('gameOver').classList.remove('hidden');
            document.getElementById('gameOver').classList.add('lose');
            document.getElementById('gameOverTitle').textContent = 'Game Over';
            document.getElementById('gameOverText').textContent = `You reached level ${player.level}!`;
        }

        function restart() {
            player = {
                hp: 100,
                maxHp: 100,
                level: 1,
                xp: 0,
                xpNeeded: 100
            };
            battleCount = 0;
            document.getElementById('battleLog').innerHTML = '';
            document.getElementById('gameOver').classList.add('hidden');
            spawnEnemy();
            updateUI();
            isPlayerTurn = true;
            disableButtons(false);
            addLog('Battle started!', 'info');
        }

        function disableButtons(disabled) {
            document.getElementById('attackBtn').disabled = disabled;
            document.getElementById('powerBtn').disabled = disabled;
            document.getElementById('healBtn').disabled = disabled;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        spawnEnemy();
        updateUI();
        addLog('Battle started!', 'info');
    </script>
</body>
</html>
