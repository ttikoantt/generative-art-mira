<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Pop Chain - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            z-index: 10;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            font-size: 18px;
            margin-top: 10px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat span {
            font-weight: bold;
            color: #4fc3f7;
        }

        .game-container {
            position: relative;
            z-index: 10;
        }

        #gameCanvas {
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            touch-action: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            color: white;
            font-size: 42px;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(76, 175, 80, 0.8);
        }

        .overlay p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 18px;
            margin-bottom: 30px;
        }

        .overlay button {
            background: linear-gradient(135deg, #4caf50, #45a049);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
        }

        .overlay button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(76, 175, 80, 0.6);
        }

        .moves-info {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 22px;
            }
            .stats {
                gap: 15px;
                font-size: 14px;
            }
            .stat {
                padding: 6px 15px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="header">
        <h1>🫧 Bubble Pop Chain</h1>
        <div class="stats">
            <div class="stat">Level: <span id="level">1</span></div>
            <div class="stat">Moves: <span id="moves">5</span></div>
            <div class="stat">Bubbles: <span id="bubbles">0</span></div>
        </div>
        <div class="moves-info">Pop all bubbles using limited moves!</div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="overlay hidden" id="startOverlay">
        <h2>🫧 Bubble Pop Chain</h2>
        <p>Click bubbles to start chain reactions</p>
        <p>Pop all bubbles within the move limit!</p>
        <button onclick="startGame()">Start Game</button>
    </div>

    <div class="overlay hidden" id="winOverlay">
        <h2>🎉 Level Complete!</h2>
        <p>Bubbles popped: <span id="winBubbles">0</span></p>
        <p>Excellent chain reaction!</p>
        <button onclick="nextLevel()">Next Level</button>
    </div>

    <div class="overlay hidden" id="loseOverlay">
        <h2>😢 Out of Moves</h2>
        <p>Bubbles remaining: <span id="remainingBubbles">0</span></p>
        <button onclick="restartLevel()">Try Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let bubbles = [];
        let particles = [];
        let level = 1;
        let movesLeft = 5;
        let totalBubbles = 0;
        let poppedBubbles = 0;
        let isAnimating = false;
        let gameStarted = false;

        const GRID_SIZE = 50;
        const BUBBLE_RADIUS = 18;
        const COLORS = [
            '#ff6b6b', // Red
            '#4ecdc4', // Teal
            '#45b7d1', // Blue
            '#f9ca24', // Yellow
            '#6c5ce7', // Purple
            '#a29bfe', // Light Purple
            '#fd79a8', // Pink
            '#00b894', // Green
        ];

        function resize() {
            const maxWidth = Math.min(window.innerWidth - 40, 600);
            const maxHeight = Math.min(window.innerHeight - 200, 600);
            width = canvas.width = maxWidth;
            height = canvas.height = maxHeight;
        }

        class Bubble {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = BUBBLE_RADIUS;
                this.popped = false;
                this.scale = 1;
                this.popProgress = 0;
            }

            draw() {
                if (this.popped) return;

                const gradient = ctx.createRadialGradient(
                    this.x - 5, this.y - 5, 0,
                    this.x, this.y, this.radius * this.scale
                );
                gradient.addColorStop(0, '#ffffff');
                gradient.addColorStop(0.3, this.color);
                gradient.addColorStop(1, this.darkenColor(this.color, 30));

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * this.scale, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Shine
                ctx.beginPath();
                ctx.arc(this.x - 6, this.y - 6, 4 * this.scale, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.fill();
            }

            darkenColor(color, percent) {
                const num = parseInt(color.replace('#', ''), 16);
                const amt = Math.round(2.55 * percent);
                const R = Math.max((num >> 16) - amt, 0);
                const G = Math.max((num >> 8 & 0x00FF) - amt, 0);
                const B = Math.max((num & 0x0000FF) - amt, 0);
                return `rgb(${R}, ${G}, ${B})`;
            }

            async pop() {
                if (this.popped) return;
                this.popped = true;

                // Create particles
                for (let i = 0; i < 8; i++) {
                    particles.push(new Particle(this.x, this.y, this.color));
                }

                // Animate pop
                while (this.popProgress < 1) {
                    this.popProgress += 0.1;
                    this.scale = 1 + this.popProgress * 0.5;
                    await sleep(30);
                }

                poppedBubbles++;
                updateUI();
            }

            contains(px, py) {
                if (this.popped) return false;
                const dx = this.x - px;
                const dy = this.y - py;
                return dx * dx + dy * dy < this.radius * this.radius;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 3 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.radius = Math.random() * 3 + 2;
                this.life = 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.1; // Gravity
                this.life -= 0.02;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * this.life, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function generateLevel() {
            bubbles = [];
            const cols = Math.floor((width - 40) / GRID_SIZE);
            const rows = Math.floor((height - 40) / GRID_SIZE);

            const offsetX = (width - cols * GRID_SIZE) / 2 + GRID_SIZE / 2;
            const offsetY = (height - rows * GRID_SIZE) / 2 + GRID_SIZE / 2;

            const colorCount = Math.min(3 + Math.floor(level / 2), COLORS.length);

            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const x = offsetX + col * GRID_SIZE;
                    const y = offsetY + row * GRID_SIZE;
                    const color = COLORS[Math.floor(Math.random() * colorCount)];
                    bubbles.push(new Bubble(x, y, color));
                }
            }

            totalBubbles = bubbles.length;
            poppedBubbles = 0;
            movesLeft = Math.max(5, Math.ceil(totalBubbles / 15));
            updateUI();
        }

        function getNeighbors(bubble) {
            const neighbors = [];
            for (let other of bubbles) {
                if (other === bubble || other.popped) continue;
                const dx = other.x - bubble.x;
                const dy = other.y - bubble.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < GRID_SIZE * 1.2 && other.color === bubble.color) {
                    neighbors.push(other);
                }
            }
            return neighbors;
        }

        async function popChain(startBubble) {
            if (startBubble.popped || isAnimating) return;
            isAnimating = true;

            const toPop = [startBubble];
            const visited = new Set();

            while (toPop.length > 0) {
                const bubble = toPop.shift();
                if (bubble.popped || visited.has(bubble)) continue;
                visited.add(bubble);

                await bubble.pop();

                // Add same-color neighbors
                const neighbors = getNeighbors(bubble);
                for (let neighbor of neighbors) {
                    if (!visited.has(neighbor) && !neighbor.popped) {
                        toPop.push(neighbor);
                    }
                }

                await sleep(100);
            }

            movesLeft--;
            updateUI();

            // Check win/lose
            await sleep(500);
            checkGameState();

            isAnimating = false;
        }

        function checkGameState() {
            const remaining = bubbles.filter(b => !b.popped).length;

            if (remaining === 0) {
                document.getElementById('winBubbles').textContent = poppedBubbles;
                document.getElementById('winOverlay').classList.remove('hidden');
            } else if (movesLeft <= 0) {
                document.getElementById('remainingBubbles').textContent = remaining;
                document.getElementById('loseOverlay').classList.remove('hidden');
            }
        }

        function updateUI() {
            document.getElementById('level').textContent = level;
            document.getElementById('moves').textContent = movesLeft;
            document.getElementById('bubbles').textContent = `${poppedBubbles}/${totalBubbles}`;
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // Draw bubbles
            for (let bubble of bubbles) {
                bubble.draw();
            }

            // Draw particles
            particles = particles.filter(p => p.life > 0);
            for (let particle of particles) {
                particle.update();
                particle.draw();
            }

            requestAnimationFrame(draw);
        }

        function handleClick(e) {
            if (isAnimating || !gameStarted) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            for (let bubble of bubbles) {
                if (bubble.contains(x, y)) {
                    popChain(bubble);
                    break;
                }
            }
        }

        function startGame() {
            document.getElementById('startOverlay').classList.add('hidden');
            gameStarted = true;
            level = 1;
            generateLevel();
        }

        function nextLevel() {
            document.getElementById('winOverlay').classList.add('hidden');
            level++;
            generateLevel();
        }

        function restartLevel() {
            document.getElementById('loseOverlay').classList.add('hidden');
            generateLevel();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Event listeners
        window.addEventListener('resize', () => {
            resize();
            if (gameStarted) {
                generateLevel();
            }
        });

        canvas.addEventListener('click', handleClick);

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            handleClick({
                clientX: touch.clientX,
                clientY: touch.clientY
            });
        }, { passive: false });

        // Initialize
        resize();
        document.getElementById('startOverlay').classList.remove('hidden');
        draw();
    </script>
</body>
</html>
