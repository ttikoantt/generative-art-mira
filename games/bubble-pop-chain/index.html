<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bubble Pop Chain - 泡パズル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e22ce 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 10px;
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .subtitle {
            color: #e0e0ff;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
            gap: 10px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 15px;
            color: #fff;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .stat-box .label {
            font-size: 0.75rem;
            opacity: 0.8;
            display: block;
        }

        .stat-box .value {
            font-size: 1.5rem;
            margin-top: 5px;
        }

        #gameCanvas {
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            background: rgba(0, 0, 0, 0.2);
            cursor: pointer;
            touch-action: none;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .combo-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            pointer-events: none;
            opacity: 0;
            z-index: 999;
        }

        .combo-text.show {
            animation: comboAnim 1s ease-out;
        }

        @keyframes comboAnim {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.5);
            }
        }

        .info {
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .stats {
                flex-wrap: wrap;
            }

            .stat-box {
                padding: 8px 15px;
                min-width: 80px;
            }

            .stat-box .value {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()" title="全画面">⛶</button>

    <div class="container">
        <h1>🫧 Bubble Pop Chain</h1>
        <p class="subtitle">泡パズル - 連鎖反応を目指せ！</p>

        <div class="stats">
            <div class="stat-box">
                <span class="label">スコア</span>
                <span class="value" id="score">0</span>
            </div>
            <div class="stat-box">
                <span class="label">コンボ</span>
                <span class="value" id="combo">0</span>
            </div>
            <div class="stat-box">
                <span class="label">残り泡</span>
                <span class="value" id="remaining">0</span>
            </div>
            <div class="stat-box">
                <span class="label">最高コンボ</span>
                <span class="value" id="maxCombo">0</span>
            </div>
        </div>

        <canvas id="gameCanvas" width="400" height="500"></canvas>

        <div class="controls">
            <button onclick="resetGame()">🔄 新規ゲーム</button>
            <button onclick="addBubbles()">➕ 泡追加</button>
        </div>

        <div class="info">
            <p>同じ色の泡をタップして連鎖反応を起こそう！</p>
            <p>3個以上つながると消えるよ</p>
        </div>
    </div>

    <div class="combo-text" id="comboText"></div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let bubbles = [];
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let popping = [];
        let animationId = null;

        const COLORS = [
            '#ff6b6b', // 赤
            '#4ecdc4', // シアン
            '#ffe66d', // 黄
            '#95e1d3', // ミント
            '#f38181', // ピンク
            '#aa96da', // 紫
        ];

        const BUBBLE_COUNT = 80;
        const BUBBLE_SIZE = 20;

        function resizeCanvas() {
            const container = canvas.parentElement;
            const maxWidth = Math.min(400, window.innerWidth - 40);
            const maxHeight = Math.min(500, window.innerHeight - 300);

            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }

        function createBubbles(count) {
            const newBubbles = [];
            for (let i = 0; i < count; i++) {
                let x, y, overlapping;
                let attempts = 0;

                do {
                    x = BUBBLE_SIZE + Math.random() * (canvas.width - BUBBLE_SIZE * 2);
                    y = BUBBLE_SIZE + Math.random() * (canvas.height - BUBBLE_SIZE * 2);
                    overlapping = false;

                    for (const bubble of newBubbles) {
                        const dx = x - bubble.x;
                        const dy = y - bubble.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < BUBBLE_SIZE * 2.2) {
                            overlapping = true;
                            break;
                        }
                    }
                    attempts++;
                } while (overlapping && attempts < 50);

                if (!overlapping) {
                    newBubbles.push({
                        x,
                        y,
                        color: COLORS[Math.floor(Math.random() * COLORS.length)],
                        radius: BUBBLE_SIZE,
                        popped: false,
                        scale: 0,
                        targetScale: 1,
                        popScale: 1,
                        velocity: { x: 0, y: 0 }
                    });
                }
            }
            return newBubbles;
        }

        function findConnectedBubbles(startBubble, color, visited = new Set()) {
            const key = `${Math.round(startBubble.x)},${Math.round(startBubble.y)}`;
            if (visited.has(key)) return [];
            visited.add(key);

            const connected = [startBubble];
            const neighbors = bubbles.filter(b => {
                if (b === startBubble || b.popped || b.color !== color) return false;
                const dx = b.x - startBubble.x;
                const dy = b.y - startBubble.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                return dist < BUBBLE_SIZE * 2.5;
            });

            for (const neighbor of neighbors) {
                connected.push(...findConnectedBubbles(neighbor, color, visited));
            }

            return connected;
        }

        function popBubbles(bubblesToPop) {
            if (bubblesToPop.length < 3) return;

            const points = bubblesToPop.length * 10 * (1 + combo * 0.1);
            score += Math.floor(points);
            combo++;
            maxCombo = Math.max(maxCombo, combo);

            // コンボテキスト表示
            if (combo >= 2) {
                const comboText = document.getElementById('comboText');
                comboText.textContent = `${combo} COMBO!`;
                comboText.classList.remove('show');
                void comboText.offsetWidth; // リフロー
                comboText.classList.add('show');
            }

            bubblesToPop.forEach((bubble, index) => {
                setTimeout(() => {
                    bubble.popped = true;
                    bubble.popAnimation = true;
                    popping.push({
                        x: bubble.x,
                        y: bubble.y,
                        radius: bubble.radius,
                        color: bubble.color,
                        scale: 1,
                        alpha: 1
                    });
                }, index * 50);
            });

            updateStats();
        }

        function handleClick(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const x = clientX - rect.left;
            const y = clientY - rect.top;

            for (const bubble of bubbles) {
                if (bubble.popped) continue;
                const dx = x - bubble.x;
                const dy = y - bubble.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < bubble.radius) {
                    const connected = findConnectedBubbles(bubble, bubble.color);
                    if (connected.length >= 3) {
                        popBubbles(connected);
                    } else {
                        combo = 0;
                        updateStats();
                    }
                    break;
                }
            }
        }

        function addBubbles() {
            const count = 20;
            const newBubbles = createBubbles(count);
            bubbles = bubbles.concat(newBubbles);
            updateStats();
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;
            document.getElementById('remaining').textContent = bubbles.filter(b => !b.popped).length;
            document.getElementById('maxCombo').textContent = maxCombo;
        }

        function draw() {
            ctx.fillStyle = 'rgba(30, 60, 114, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // ポップアニメーション
            popping = popping.filter(p => {
                p.scale += 0.1;
                p.alpha -= 0.05;

                if (p.alpha <= 0) return false;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius * p.scale, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.alpha;
                ctx.fill();
                ctx.globalAlpha = 1;

                return true;
            });

            // 泡を描画
            bubbles.forEach(bubble => {
                if (bubble.popped) return;

                // 出現アニメーション
                if (bubble.scale < bubble.targetScale) {
                    bubble.scale += 0.05;
                }

                const radius = bubble.radius * bubble.scale;

                // 光沢効果
                const gradient = ctx.createRadialGradient(
                    bubble.x - radius * 0.3,
                    bubble.y - radius * 0.3,
                    0,
                    bubble.x,
                    bubble.y,
                    radius
                );
                gradient.addColorStop(0, '#ffffff');
                gradient.addColorStop(0.3, bubble.color);
                gradient.addColorStop(1, bubble.color);

                ctx.beginPath();
                ctx.arc(bubble.x, bubble.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // ハイライト
                ctx.beginPath();
                ctx.arc(bubble.x - radius * 0.3, bubble.y - radius * 0.3, radius * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.fill();
            });

            animationId = requestAnimationFrame(draw);
        }

        function resetGame() {
            score = 0;
            combo = 0;
            maxCombo = 0;
            popping = [];
            bubbles = createBubbles(BUBBLE_COUNT);
            updateStats();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        canvas.addEventListener('click', handleClick);
        canvas.addEventListener('touchstart', handleClick, { passive: false });

        window.addEventListener('resize', resizeCanvas);

        // 初期化
        resizeCanvas();
        resetGame();
        draw();
    </script>
</body>
</html>
