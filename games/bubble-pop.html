<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Pop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 15px;
        }

        .score-item {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .score-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        .score-value {
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
        }

        #gameCanvas {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            cursor: pointer;
            touch-action: none;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 0.9rem;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            background: rgba(255, 200, 100, 0.3);
            border-color: rgba(255, 200, 100, 0.4);
        }

        .info {
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
        }

        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-over.show {
            display: flex;
        }

        .game-over-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .game-over h2 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .game-over p {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .game-over button {
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.5rem;
            }

            .score-board {
                gap: 15px;
            }

            .score-value {
                font-size: 1.2rem;
            }

            .controls {
                gap: 8px;
            }

            button {
                padding: 10px 18px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🫧 Bubble Pop</h1>
        
        <div class="score-board">
            <div class="score-item">
                <div class="score-label">スコア</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">時間</div>
                <div class="score-value" id="time">30</div>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="500" height="400"></canvas>
        
        <div class="controls">
            <button onclick="startGame()">🎮 スタート</button>
            <button onclick="resetGame()" class="fullscreen-btn">🔄 リセット</button>
            <button onclick="toggleFullscreen()" class="fullscreen-btn">🖥️ 全画面</button>
        </div>
        
        <p class="info">泡をタップして割ろう！ • 大きい泡ほど高得点</p>
    </div>

    <div class="game-over" id="gameOver">
        <div class="game-over-content">
            <h2>🎉 ゲームオーバー！</h2>
            <p>スコア: <span id="finalScore">0</span></p>
            <p>割った泡: <span id="finalPops">0</span></p>
            <button onclick="startGame()">もう一度プレイ</button>
            <button onclick="closeGameOver()">閉じる</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let bubbles = [];
        let score = 0;
        let timeLeft = 30;
        let gameRunning = false;
        let gameInterval;
        let timeInterval;
        let poppedCount = 0;

        const bubbleColors = [
            'rgba(255, 107, 107, 0.8)',
            'rgba(78, 205, 196, 0.8)',
            'rgba(255, 230, 109, 0.8)',
            'rgba(170, 111, 255, 0.8)',
            'rgba(255, 154, 162, 0.8)',
            'rgba(250, 208, 196, 0.8)'
        ];

        function createBubble() {
            const radius = 20 + Math.random() * 35;
            return {
                x: radius + Math.random() * (canvas.width - radius * 2),
                y: canvas.height + radius,
                radius: radius,
                color: bubbleColors[Math.floor(Math.random() * bubbleColors.length)],
                speed: 1 + Math.random() * 2,
                wobble: Math.random() * Math.PI * 2,
                wobbleSpeed: 0.02 + Math.random() * 0.03,
                points: Math.floor(60 - radius)
            };
        }

        function drawBubble(bubble) {
            // Main bubble
            ctx.beginPath();
            ctx.arc(bubble.x, bubble.y, bubble.radius, 0, Math.PI * 2);
            ctx.fillStyle = bubble.color;
            ctx.fill();

            // Shine effect
            ctx.beginPath();
            ctx.arc(
                bubble.x - bubble.radius * 0.3,
                bubble.y - bubble.radius * 0.3,
                bubble.radius * 0.2,
                0,
                Math.PI * 2
            );
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.fill();

            // Border
            ctx.beginPath();
            ctx.arc(bubble.x, bubble.y, bubble.radius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function drawParticles(particles) {
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
                ctx.fill();
            });
        }

        let particles = [];

        function createPopParticles(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    radius: 2 + Math.random() * 3,
                    alpha: 1,
                    color: color
                });
            }
        }

        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.03;
                return p.alpha > 0;
            });
        }

        function updateBubbles() {
            bubbles.forEach(bubble => {
                bubble.y -= bubble.speed;
                bubble.wobble += bubble.wobbleSpeed;
                bubble.x += Math.sin(bubble.wobble) * 0.5;
            });

            // Remove bubbles that are off screen
            bubbles = bubbles.filter(b => b.y + b.radius > -50);

            // Add new bubbles
            if (gameRunning && Math.random() > 0.95) {
                bubbles.push(createBubble());
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw bubbles
            bubbles.forEach(drawBubble);

            // Draw particles
            drawParticles(particles);
        }

        function gameLoop() {
            if (!gameRunning) return;

            updateBubbles();
            updateParticles();
            draw();

            requestAnimationFrame(gameLoop);
        }

        function handleClick(e) {
            if (!gameRunning) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);

            if (!clientX || !clientY) return;

            const x = (clientX - rect.left) * scaleX;
            const y = (clientY - rect.top) * scaleY;

            for (let i = bubbles.length - 1; i >= 0; i--) {
                const bubble = bubbles[i];
                const distance = Math.sqrt((x - bubble.x) ** 2 + (y - bubble.y) ** 2);

                if (distance < bubble.radius) {
                    // Pop!
                    score += bubble.points;
                    poppedCount++;
                    document.getElementById('score').textContent = score;

                    createPopParticles(bubble.x, bubble.y, bubble.color);
                    bubbles.splice(i, 1);

                    break;
                }
            }
        }

        canvas.addEventListener('click', handleClick);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick(e);
        });

        function startGame() {
            score = 0;
            timeLeft = 30;
            poppedCount = 0;
            bubbles = [];
            particles = [];
            gameRunning = true;

            document.getElementById('score').textContent = score;
            document.getElementById('time').textContent = timeLeft;
            document.getElementById('gameOver').classList.remove('show');

            // Start with some bubbles
            for (let i = 0; i < 5; i++) {
                bubbles.push(createBubble());
            }

            // Start timers
            gameInterval = setInterval(() => {
                if (Math.random() > 0.7) {
                    bubbles.push(createBubble());
                }
            }, 500);

            timeInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('time').textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            gameLoop();
        }

        function endGame() {
            gameRunning = false;
            clearInterval(gameInterval);
            clearInterval(timeInterval);

            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalPops').textContent = poppedCount;
            document.getElementById('gameOver').classList.add('show');
        }

        function resetGame() {
            gameRunning = false;
            clearInterval(gameInterval);
            clearInterval(timeInterval);

            score = 0;
            timeLeft = 30;
            bubbles = [];
            particles = [];

            document.getElementById('score').textContent = score;
            document.getElementById('time').textContent = timeLeft;
            document.getElementById('gameOver').classList.remove('show');

            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function closeGameOver() {
            document.getElementById('gameOver').classList.remove('show');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initial draw
        draw();
    </script>
</body>
</html>
