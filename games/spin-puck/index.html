<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spin Puck - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
        }

        .score-board {
            text-align: center;
            color: white;
        }

        .score-board h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .score-board p {
            font-size: 18px;
            opacity: 0.8;
        }

        .power-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: white;
        }

        .power-bar {
            width: 200px;
            height: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .power-fill {
            height: 100%;
            background: linear-gradient(90deg, #00f260, #0575e6);
            transition: width 0.05s;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 12, 41, 0.95);
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            color: white;
            display: none;
            pointer-events: auto;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .game-over h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        .game-over p {
            font-size: 24px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .fullscreen-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 24px;
            pointer-events: auto;
            transition: transform 0.2s;
        }

        .fullscreen-btn:hover {
            transform: scale(1.1);
        }

        .instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 12, 41, 0.9);
            padding: 30px 40px;
            border-radius: 15px;
            text-align: center;
            color: white;
            pointer-events: auto;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .instructions h3 {
            font-size: 24px;
            margin-bottom: 15px;
        }

        .instructions p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            .score-board h1 {
                font-size: 36px;
            }

            .score-board p {
                font-size: 14px;
            }

            .power-bar {
                width: 150px;
            }

            .game-over {
                padding: 30px 40px;
            }

            .game-over h2 {
                font-size: 28px;
            }

            .game-over p {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="canvas"></canvas>

        <div class="ui-overlay">
            <div class="score-board">
                <h1 id="score">0</h1>
                <p>Spin Puck</p>
            </div>

            <div class="power-indicator">
                <div class="power-bar">
                    <div class="power-fill" id="powerFill"></div>
                </div>
                <p id="powerText">Click/Tap to Spin!</p>
            </div>

            <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
        </div>

        <div class="game-over" id="gameOver">
            <h2>Game Over!</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button class="btn btn-primary" onclick="startGame()">Play Again</button>
        </div>

        <div class="instructions" id="instructions">
            <h3>🎯 Spin Puck</h3>
            <p>Click/Tap to spin the puck!</p>
            <p>Stop in the target zone to score!</p>
            <p>3 lives - Good luck!</p>
            <br>
            <button class="btn btn-primary" onclick="startGame()">Start Game</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        let gameState = 'instructions';
        let score = 0;
        let lives = 3;

        // Puck
        let puck = {
            x: 0,
            y: 0,
            radius: 30,
            angle: 0,
            angularVelocity: 0,
            isSpinning: false
        };

        // Target zone
        let target = {
            startAngle: 0,
            endAngle: Math.PI / 3,
            hue: 0
        };

        // Power
        let power = 0;
        let powerDirection = 1;

        // Particles
        let particles = [];

        function resize() {
            const container = document.getElementById('gameContainer');
            width = canvas.width = Math.min(600, window.innerWidth - 40);
            height = canvas.height = Math.min(600, window.innerHeight - 40);
            centerX = width / 2;
            centerY = height / 2;
        }

        function init() {
            resize();
            window.addEventListener('resize', resize);
            canvas.addEventListener('click', handleClick);
            canvas.addEventListener('touchstart', handleTouch);
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            gameState = 'playing';
            score = 0;
            lives = 3;
            puck.x = centerX;
            puck.y = centerY;
            puck.angle = 0;
            puck.angularVelocity = 0;
            puck.isSpinning = false;
            power = 0;
            particles = [];
            newTarget();
            document.getElementById('instructions').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('score').textContent = score;
        }

        function newTarget() {
            target.startAngle = Math.random() * Math.PI * 2;
            target.endAngle = target.startAngle + Math.PI / 4 + Math.random() * Math.PI / 4;
            target.hue = Math.random() * 360;
        }

        function handleClick() {
            if (gameState !== 'playing') return;
            spin();
        }

        function handleTouch(e) {
            e.preventDefault();
            if (gameState !== 'playing') return;
            spin();
        }

        function spin() {
            if (puck.isSpinning) return;

            puck.isSpinning = true;
            puck.angularVelocity = power * 0.3;
            power = 0;

            // Spawn particles
            for (let i = 0; i < 20; i++) {
                particles.push({
                    x: puck.x,
                    y: puck.y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1,
                    hue: Math.random() * 60 + 200
                });
            }
        }

        function update() {
            if (gameState !== 'playing') return;

            // Update power
            if (!puck.isSpinning) {
                power += 0.02 * powerDirection;
                if (power >= 1) {
                    power = 1;
                    powerDirection = -1;
                } else if (power <= 0) {
                    power = 0;
                    powerDirection = 1;
                }
            }

            // Update puck
            if (puck.isSpinning) {
                puck.angle += puck.angularVelocity;
                puck.angularVelocity *= 0.99;

                // Check if stopped
                if (Math.abs(puck.angularVelocity) < 0.001) {
                    puck.isSpinning = false;
                    checkScore();
                }
            }

            // Update particles
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                return p.life > 0;
            });

            // Update UI
            document.getElementById('powerFill').style.width = (power * 100) + '%';
            document.getElementById('powerText').textContent = puck.isSpinning ? 'Spinning...' : 'Click to Spin!';
        }

        function checkScore() {
            let normalizedAngle = puck.angle % (Math.PI * 2);
            if (normalizedAngle < 0) normalizedAngle += Math.PI * 2;

            let targetStart = target.startAngle % (Math.PI * 2);
            let targetEnd = target.endAngle % (Math.PI * 2);

            let inTarget = false;
            if (targetStart < targetEnd) {
                inTarget = normalizedAngle >= targetStart && normalizedAngle <= targetEnd;
            } else {
                inTarget = normalizedAngle >= targetStart || normalizedAngle <= targetEnd;
            }

            if (inTarget) {
                score += 100;
                document.getElementById('score').textContent = score;
                newTarget();

                // Success particles
                for (let i = 0; i < 30; i++) {
                    const angle = (i / 30) * Math.PI * 2;
                    particles.push({
                        x: centerX,
                        y: centerY,
                        vx: Math.cos(angle) * 8,
                        vy: Math.sin(angle) * 8,
                        life: 1,
                        hue: target.hue
                    });
                }
            } else {
                lives--;
                if (lives <= 0) {
                    gameOver();
                }
            }
        }

        function gameOver() {
            gameState = 'gameover';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // Draw track
            ctx.beginPath();
            ctx.arc(centerX, centerY, 150, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Draw target zone
            ctx.beginPath();
            ctx.arc(centerX, centerY, 150, target.startAngle, target.endAngle);
            ctx.strokeStyle = `hsl(${target.hue}, 70%, 60%)`;
            ctx.lineWidth = 20;
            ctx.lineCap = 'round';
            ctx.stroke();

            // Draw puck position indicator
            const puckX = centerX + Math.cos(puck.angle) * 150;
            const puckY = centerY + Math.sin(puck.angle) * 150;

            ctx.beginPath();
            ctx.arc(puckX, puckY, puck.radius, 0, Math.PI * 2);
            const gradient = ctx.createRadialGradient(puckX, puckY, 0, puckX, puckY, puck.radius);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(1, '#764ba2');
            ctx.fillStyle = gradient;
            ctx.fill();

            // Draw center
            ctx.beginPath();
            ctx.arc(centerX, centerY, 20, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.fill();

            // Draw particles
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${p.hue}, 70%, 60%, ${p.life})`;
                ctx.fill();
            });

            // Draw lives
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(`Lives: ${lives}`, centerX, height - 30);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        init();
    </script>
</body>
</html>
