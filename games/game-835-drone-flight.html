<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Flight - 障害物回避ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
        }
        
        .container {
            text-align: center;
            padding: 20px;
        }
        
        h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 15px;
            color: #fff;
        }
        
        .stat {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: #a0a0a0;
        }
        
        #canvas-container {
            position: relative;
            margin: 0 auto;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        canvas {
            display: block;
            cursor: pointer;
        }
        
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 10;
        }
        
        .overlay.hidden {
            display: none;
        }
        
        .overlay h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .overlay p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #a0a0a0;
        }
        
        button {
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .controls {
            margin-top: 20px;
            color: #a0a0a0;
            font-size: 0.9rem;
        }
        
        .fullscreen-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            border-radius: 5px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 12px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 5;
        }
        
        .fullscreen-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }
            
            canvas {
                max-width: 100%;
            }
            
            .stats {
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚁 Drone Flight</h1>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">スコア</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="best">0</div>
                <div class="stat-label">ベスト</div>
            </div>
        </div>
        
        <div id="canvas-container">
            <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
            <canvas id="canvas" width="600" height="700"></canvas>
            
            <div id="startOverlay" class="overlay">
                <h2>🚁 Drone Flight</h2>
                <p>タップして飛行開始！<br>障害物を避けながら飛び続けよう</p>
                <button onclick="startGame()">スタート</button>
            </div>
            
            <div id="gameOverOverlay" class="overlay hidden">
                <h2>Game Over</h2>
                <p>スコア: <span id="finalScore">0</span></p>
                <button onclick="restartGame()">再挑戦</button>
            </div>
        </div>
        
        <p class="controls">タップ/クリックで上昇、離すと下降</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let gameState = 'start'; // start, playing, gameOver
        let score = 0;
        let bestScore = localStorage.getItem('droneBest') || 0;
        let gameSpeed = 3;
        
        document.getElementById('best').textContent = bestScore;
        
        // Drone
        const drone = {
            x: 100,
            y: canvas.height / 2,
            width: 40,
            height: 30,
            velocity: 0,
            gravity: 0.4,
            lift: -8,
            rotation: 0
        };
        
        // Obstacles
        let obstacles = [];
        
        // Particles
        let particles = [];
        
        class Obstacle {
            constructor() {
                this.x = canvas.width;
                this.width = 60;
                this.gap = 180;
                this.topHeight = Math.random() * (canvas.height - this.gap - 100) + 50;
                this.passed = false;
                this.color = `hsl(${Math.random() * 60 + 10}, 70%, 50%)`;
            }
            
            update() {
                this.x -= gameSpeed;
            }
            
            draw() {
                // Top obstacle
                const topGradient = ctx.createLinearGradient(this.x, 0, this.x + this.width, 0);
                topGradient.addColorStop(0, this.color);
                topGradient.addColorStop(1, '#1a1a2e');
                
                ctx.fillStyle = topGradient;
                ctx.fillRect(this.x, 0, this.width, this.topHeight);
                
                // Bottom obstacle
                const bottomY = this.topHeight + this.gap;
                ctx.fillStyle = topGradient;
                ctx.fillRect(this.x, bottomY, this.width, canvas.height - bottomY);
            }
            
            isOffScreen() {
                return this.x + this.width < 0;
            }
            
            collidesWith(obj) {
                return (
                    obj.x + obj.width > this.x &&
                    obj.x < this.x + this.width &&
                    (obj.y < this.topHeight || obj.y + obj.height > this.topHeight + this.gap)
                );
            }
        }
        
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 4 + 2;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * 2 - 1;
                this.life = 1;
                this.decay = 0.02;
                this.color = `hsl(${Math.random() * 60 + 10}, 70%, 50%)`;
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= this.decay;
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        function spawnObstacle() {
            obstacles.push(new Obstacle());
        }
        
        function createParticles(x, y, count = 5) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y));
            }
        }
        
        function resetGame() {
            drone.y = canvas.height / 2;
            drone.velocity = 0;
            drone.rotation = 0;
            obstacles = [];
            particles = [];
            score = 0;
            gameSpeed = 3;
            document.getElementById('score').textContent = score;
        }
        
        function startGame() {
            resetGame();
            gameState = 'playing';
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');
            
            // Start spawning obstacles
            setTimeout(() => {
                if (gameState === 'playing') {
                    spawnObstacle();
                    setInterval(() => {
                        if (gameState === 'playing') {
                            spawnObstacle();
                        }
                    }, 2000);
                }
            }, 1000);
            
            gameLoop();
        }
        
        function restartGame() {
            startGame();
        }
        
        function gameOver() {
            gameState = 'gameOver';
            
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('droneBest', bestScore);
                document.getElementById('best').textContent = bestScore;
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }
        
        function update() {
            if (gameState !== 'playing') return;
            
            // Update drone
            drone.velocity += drone.gravity;
            drone.y += drone.velocity;
            drone.rotation = Math.min(Math.max(drone.velocity * 3, -30), 30);
            
            // Create particles
            createParticles(drone.x, drone.y + drone.height / 2, 2);
            
            // Check boundaries
            if (drone.y < 0 || drone.y + drone.height > canvas.height) {
                gameOver();
                return;
            }
            
            // Update obstacles
            obstacles.forEach((obstacle, index) => {
                obstacle.update();
                
                // Check collision
                if (obstacle.collidesWith(drone)) {
                    gameOver();
                    return;
                }
                
                // Check if passed
                if (!obstacle.passed && obstacle.x + obstacle.width < drone.x) {
                    obstacle.passed = true;
                    score++;
                    document.getElementById('score').textContent = score;
                    
                    // Increase difficulty
                    if (score % 5 === 0) {
                        gameSpeed += 0.5;
                    }
                }
            });
            
            // Remove off-screen obstacles
            obstacles = obstacles.filter(obs => !obs.isOffScreen());
            
            // Update particles
            particles.forEach((particle, index) => {
                particle.update();
                if (particle.life <= 0) {
                    particles.splice(index, 1);
                }
            });
        }
        
        function draw() {
            // Clear canvas with gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(1, '#16213e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw stars
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            for (let i = 0; i < 50; i++) {
                const x = (i * 37) % canvas.width;
                const y = (i * 23) % canvas.height;
                ctx.beginPath();
                ctx.arc(x, y, Math.random() * 2, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Draw particles
            particles.forEach(particle => particle.draw());
            
            // Draw obstacles
            obstacles.forEach(obstacle => obstacle.draw());
            
            // Draw drone
            ctx.save();
            ctx.translate(drone.x + drone.width / 2, drone.y + drone.height / 2);
            ctx.rotate(drone.rotation * Math.PI / 180);
            
            // Body
            ctx.fillStyle = '#667eea';
            ctx.fillRect(-drone.width / 2, -drone.height / 2, drone.width, drone.height);
            
            // Rotors
            ctx.fillStyle = '#764ba2';
            const rotorOffset = Date.now() * 0.02;
            
            // Front rotor
            ctx.beginPath();
            ctx.ellipse(drone.width / 2, -drone.height / 2 - 5, 12, 3, rotorOffset, 0, Math.PI * 2);
            ctx.ellipse(drone.width / 2, -drone.height / 2 - 5, 12, 3, rotorOffset + Math.PI / 2, 0, Math.PI * 2);
            ctx.fill();
            
            // Back rotor
            ctx.beginPath();
            ctx.ellipse(-drone.width / 2, -drone.height / 2 - 5, 12, 3, -rotorOffset, 0, Math.PI * 2);
            ctx.ellipse(-drone.width / 2, -drone.height / 2 - 5, 12, 3, -rotorOffset + Math.PI / 2, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }
        
        function gameLoop() {
            if (gameState === 'playing') {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }
        }
        
        // Input handling
        function handleInput(e) {
            if (gameState === 'playing') {
                e.preventDefault();
                drone.velocity = drone.lift;
            }
        }
        
        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', handleInput);
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.getElementById('canvas-container').requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        // Responsive
        function resizeCanvas() {
            const container = document.getElementById('canvas-container');
            const maxWidth = Math.min(window.innerWidth - 40, 600);
            const ratio = canvas.height / canvas.width;
            
            if (window.innerWidth < 768) {
                canvas.style.width = maxWidth + 'px';
                canvas.style.height = (maxWidth * ratio) + 'px';
            } else {
                canvas.style.width = '600px';
                canvas.style.height = '700px';
            }
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        // Initial draw
        draw();
    </script>
</body>
</html>
