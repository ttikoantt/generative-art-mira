<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Falling Shapes #833</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        canvas {
            display: block;
        }

        .score {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            pointer-events: none;
            z-index: 10;
        }

        .lives {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .heart {
            font-size: 28px;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h1 {
            color: white;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .overlay p {
            color: rgba(255,255,255,0.8);
            font-size: 18px;
            margin-bottom: 30px;
            text-align: center;
            max-width: 300px;
        }

        .overlay .final-score {
            color: #ffd700;
            font-size: 64px;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 4px 20px rgba(255,215,0,0.5);
        }

        .start-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            color: white;
            padding: 15px 50px;
            font-size: 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(240, 147, 251, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(240, 147, 251, 0.5);
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        .fullscreen-btn {
            position: fixed;
            top: 70px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 50;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .overlay h1 {
                font-size: 36px;
            }
            .score {
                font-size: 24px;
            }
            .heart {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="score">0</div>
        <div class="lives" id="lives"></div>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

        <div class="overlay" id="startOverlay">
            <h1>🎯 Falling Shapes</h1>
            <p>バスケットを動かして落ちてくる図形をキャッチ！<br>赤い図形は避けてね！</p>
            <button class="start-btn" onclick="startGame()">スタート</button>
        </div>

        <div class="overlay hidden" id="gameOverOverlay">
            <h1>ゲームオーバー</h1>
            <p>スコア</p>
            <div class="final-score" id="finalScore">0</div>
            <button class="start-btn" onclick="startGame()">もう一度</button>
        </div>

        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // Game state
        let score = 0;
        let lives = 3;
        let gameRunning = false;
        let shapes = [];
        let particles = [];
        let difficulty = 1;

        // Basket
        const basket = {
            width: 100,
            height: 60,
            x: width / 2,
            y: height - 100,
            speed: 8,
            targetX: width / 2
        };

        // Shape types
        const shapeTypes = [
            { type: 'circle', points: 10, color: '#4facfe', dangerous: false },
            { type: 'square', points: 15, color: '#43e97b', dangerous: false },
            { type: 'triangle', points: 20, color: '#fa709a', dangerous: false },
            { type: 'star', points: 30, color: '#feca57', dangerous: false },
            { type: 'diamond', points: 25, color: '#a55eea', dangerous: false },
            { type: 'bomb', points: -1, color: '#ff4757', dangerous: true }
        ];

        // Shape class
        class Shape {
            constructor() {
                this.y = -50;
                this.x = Math.random() * (width - 60) + 30;
                this.size = Math.random() * 20 + 25;
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.speed = (Math.random() * 2 + 2) * difficulty;

                const typeInfo = shapeTypes[Math.floor(Math.random() * shapeTypes.length)];
                this.type = typeInfo.type;
                this.points = typeInfo.points;
                this.color = typeInfo.color;
                this.dangerous = typeInfo.dangerous;
            }

            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 15;

                switch(this.type) {
                    case 'circle':
                        ctx.beginPath();
                        ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
                        ctx.fill();
                        break;

                    case 'square':
                        ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                        break;

                    case 'triangle':
                        ctx.beginPath();
                        ctx.moveTo(0, -this.size/2);
                        ctx.lineTo(this.size/2, this.size/2);
                        ctx.lineTo(-this.size/2, this.size/2);
                        ctx.closePath();
                        ctx.fill();
                        break;

                    case 'star':
                        this.drawStar(0, 0, 5, this.size/2, this.size/4);
                        break;

                    case 'diamond':
                        ctx.beginPath();
                        ctx.moveTo(0, -this.size/2);
                        ctx.lineTo(this.size/2, 0);
                        ctx.lineTo(0, this.size/2);
                        ctx.lineTo(-this.size/2, 0);
                        ctx.closePath();
                        ctx.fill();
                        break;

                    case 'bomb':
                        ctx.beginPath();
                        ctx.arc(0, 0, this.size/2, 0, Math.PI * 2);
                        ctx.fill();

                        // Fuse
                        ctx.strokeStyle = '#ffd700';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(0, -this.size/2);
                        ctx.quadraticCurveTo(5, -this.size/2 - 8, 10, -this.size/2 - 5);
                        ctx.stroke();

                        // Spark
                        ctx.fillStyle = '#ff6b6b';
                        ctx.beginPath();
                        ctx.arc(10, -this.size/2 - 5, 3, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                }

                ctx.restore();
            }

            drawStar(cx, cy, spikes, outerRadius, innerRadius) {
                let rot = Math.PI / 2 * 3;
                let x = cx;
                let y = cy;
                let step = Math.PI / spikes;

                ctx.beginPath();
                ctx.moveTo(cx, cy - outerRadius);

                for (let i = 0; i < spikes; i++) {
                    x = cx + Math.cos(rot) * outerRadius;
                    y = cy + Math.sin(rot) * outerRadius;
                    ctx.lineTo(x, y);
                    rot += step;

                    x = cx + Math.cos(rot) * innerRadius;
                    y = cy + Math.sin(rot) * innerRadius;
                    ctx.lineTo(x, y);
                    rot += step;
                }

                ctx.lineTo(cx, cy - outerRadius);
                ctx.closePath();
                ctx.fill();
            }
        }

        // Particle class for effects
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10 - 3;
                this.size = Math.random() * 6 + 2;
                this.color = color;
                this.life = 1;
                this.decay = Math.random() * 0.03 + 0.02;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2;
                this.life -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // Create particles
        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        // Draw basket
        function drawBasket() {
            ctx.save();
            ctx.translate(basket.x, basket.y);

            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.beginPath();
            ctx.ellipse(0, basket.height/2 + 5, basket.width/2, 10, 0, 0, Math.PI * 2);
            ctx.fill();

            // Basket body
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(-basket.width/2, 0, basket.width, basket.height);

            // Basket weave pattern
            ctx.strokeStyle = '#654321';
            ctx.lineWidth = 2;
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.moveTo(-basket.width/2, i * 12);
                ctx.lineTo(basket.width/2, i * 12);
                ctx.stroke();
            }

            // Basket rim
            ctx.fillStyle = '#A0522D';
            ctx.fillRect(-basket.width/2 - 5, 0, basket.width + 10, 8);

            ctx.restore();
        }

        // Update basket position
        function updateBasket() {
            basket.x += (basket.targetX - basket.x) * 0.15;

            // Keep basket in bounds
            if (basket.x < basket.width/2) basket.x = basket.width/2;
            if (basket.x > width - basket.width/2) basket.x = width - basket.width/2;
        }

        // Check collision
        function checkCollision(shape) {
            const dx = Math.abs(shape.x - basket.x);
            const dy = Math.abs(shape.y - basket.y);

            return dx < (basket.width/2 + shape.size/2) && dy < (basket.height/2 + shape.size/2);
        }

        // Update lives display
        function updateLives() {
            const livesContainer = document.getElementById('lives');
            livesContainer.innerHTML = '';
            for (let i = 0; i < lives; i++) {
                const heart = document.createElement('span');
                heart.className = 'heart';
                heart.textContent = '❤️';
                livesContainer.appendChild(heart);
            }
        }

        // Game over
        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        // Start game
        function startGame() {
            score = 0;
            lives = 3;
            difficulty = 1;
            shapes = [];
            particles = [];
            gameRunning = true;

            document.querySelector('.score').textContent = score;
            updateLives();
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');
        }

        // Spawn shapes
        function spawnShape() {
            if (!gameRunning) return;
            shapes.push(new Shape());

            // Spawn faster as difficulty increases
            const spawnRate = Math.max(500, 1500 - difficulty * 100);
            setTimeout(spawnShape, spawnRate);
        }

        // Game loop
        function gameLoop() {
            // Clear canvas
            ctx.fillStyle = 'rgba(102, 126, 234, 0.3)';
            ctx.fillRect(0, 0, width, height);

            if (gameRunning) {
                updateBasket();
                drawBasket();

                // Update and draw shapes
                for (let i = shapes.length - 1; i >= 0; i--) {
                    shapes[i].update();
                    shapes[i].draw();

                    // Check collision with basket
                    if (checkCollision(shapes[i])) {
                        const shape = shapes[i];

                        if (shape.dangerous) {
                            // Hit a bomb!
                            createParticles(shape.x, shape.y, '#ff4757', 20);
                            lives--;
                            updateLives();

                            if (lives <= 0) {
                                gameOver();
                            }
                        } else {
                            // Caught a good shape!
                            score += shape.points;
                            document.querySelector('.score').textContent = score;
                            createParticles(shape.x, shape.y, shape.color, 10);

                            // Increase difficulty gradually
                            difficulty = Math.min(3, 1 + score / 200);
                        }

                        shapes.splice(i, 1);
                        continue;
                    }

                    // Remove if off screen
                    if (shapes[i].y > height + 50) {
                        shapes.splice(i, 1);
                    }
                }
            }

            // Update and draw particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();

                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(gameLoop);
        }

        // Mouse/Touch controls
        canvas.addEventListener('mousemove', (e) => {
            basket.targetX = e.clientX;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            basket.targetX = e.touches[0].clientX;
        }, { passive: false });

        // Resize handler
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            basket.y = height - 100;
        });

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Start game loop
        gameLoop();
        spawnShape();
    </script>
</body>
</html>
