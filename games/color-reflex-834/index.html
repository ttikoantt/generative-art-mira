<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Color Reflex - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            padding: 12px 15px;
            background: rgba(0,0,0,0.9);
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(45deg, #ff6b9d, #c44ce3, #6b9dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stats {
            display: flex;
            gap: 15px;
            font-size: 12px;
        }
        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .stat-label {
            color: #888;
            font-size: 10px;
        }
        .stat-value {
            color: #6b9dff;
            font-weight: 700;
            font-size: 16px;
        }
        #timer {
            color: #ff6b9d;
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .game-info {
            text-align: center;
            margin-bottom: 30px;
        }
        .instruction {
            color: #888;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .level-info {
            color: #4ecdc4;
            font-size: 12px;
            margin-top: 5px;
        }
        .target-color-container {
            margin: 20px 0 30px;
        }
        .target-color-label {
            text-align: center;
            color: #888;
            font-size: 12px;
            margin-bottom: 10px;
        }
        #target-color {
            width: 150px;
            height: 150px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(107, 157, 255, 0.5);
            transition: all 0.3s;
            margin: 0 auto;
        }
        #target-color.correct {
            animation: correct-pulse 0.5s;
        }
        #target-color.wrong {
            animation: wrong-shake 0.5s;
        }
        @keyframes correct-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); box-shadow: 0 0 80px rgba(78, 205, 196, 0.8); }
        }
        @keyframes wrong-shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-20px); }
            75% { transform: translateX(20px); }
        }
        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 350px;
        }
        .color-option {
            aspect-ratio: 1;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            border: 3px solid transparent;
        }
        .color-option:hover {
            transform: scale(1.05);
            border-color: #fff;
        }
        .color-option:active {
            transform: scale(0.95);
        }
        #start-screen, #game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        #game-over-screen {
            display: none;
        }
        .screen-title {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(45deg, #ff6b9d, #c44ce3, #6b9dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        .screen-subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
            text-align: center;
            padding: 0 20px;
        }
        .final-score {
            font-size: 48px;
            font-weight: 700;
            color: #6b9dff;
            margin-bottom: 10px;
        }
        .final-stats {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .btn-start, .btn-restart {
            padding: 15px 50px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, #ff6b9d, #c44ce3);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-start:hover, .btn-restart:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(196, 76, 227, 0.6);
        }
        #fullscreen-btn {
            padding: 6px 12px;
            font-size: 11px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
        }
        .combo-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: 700;
            color: #ffca3a;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }
        .combo-display.show {
            opacity: 1;
            animation: combo-pop 0.5s;
        }
        @keyframes combo-pop {
            0% { transform: translate(-50%, -50%) scale(0); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <header>
        <h1>🎨 Color Reflex</h1>
        <div class="stats">
            <div class="stat">
                <span class="stat-label">SCORE</span>
                <span class="stat-value" id="score">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">TIME</span>
                <span class="stat-value" id="timer">60</span>
            </div>
            <div class="stat">
                <span class="stat-label">COMBO</span>
                <span class="stat-value" id="combo">0</span>
            </div>
            <button id="fullscreen-btn">📺</button>
        </div>
    </header>

    <main>
        <div class="game-info">
            <div class="instruction">同じ色を選んでください！</div>
            <div class="level-info">Level <span id="level">1</span></div>
        </div>

        <div class="target-color-container">
            <div class="target-color-label">この色と同じ色を選ぼう</div>
            <div id="target-color"></div>
        </div>

        <div class="options" id="options"></div>
    </main>

    <div id="start-screen">
        <div class="screen-title">🎨 Color Reflex</div>
        <div class="screen-subtitle">色の感覚を鍛えよう！<br>制限時間内に同じ色をできるだけ多く選択しよう</div>
        <button class="btn-start" onclick="startGame()">スタート</button>
    </div>

    <div id="game-over-screen">
        <div class="screen-title">ゲームオーバー！</div>
        <div class="final-score" id="final-score">0</div>
        <div class="final-stats" id="final-stats"></div>
        <button class="btn-restart" onclick="restartGame()">もう一度</button>
    </div>

    <div class="combo-display" id="combo-display"></div>

    <script>
        // ゲーム状態
        let score = 0;
        let combo = 0;
        let level = 1;
        let timeLeft = 60;
        let gameInterval = null;
        let timerInterval = null;
        let targetColor = '';
        let optionCount = 2;
        let correctAnswers = 0;
        let totalAnswers = 0;

        // 色生成ヘルパー
        function generateColor() {
            // HSLで自然な色を生成
            const h = Math.floor(Math.random() * 360);
            const s = 60 + Math.floor(Math.random() * 40);
            const l = 40 + Math.floor(Math.random() * 30);
            return `hsl(${h}, ${s}%, ${l}%)`;
        }

        function generateSimilarColor(baseColor) {
            // 同じ色相で少し明度や彩度を変えた色
            const h = parseInt(baseColor.match(/\d+/)[0]);
            const newH = (h + (Math.random() - 0.5) * 10 + 360) % 360;
            const s = 60 + Math.floor(Math.random() * 40);
            const l = 40 + Math.floor(Math.random() * 30);
            return `hsl(${newH}, ${s}%, ${l}%)`;
        }

        // ゲーム開始
        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            score = 0;
            combo = 0;
            level = 1;
            timeLeft = 60;
            correctAnswers = 0;
            totalAnswers = 0;
            optionCount = 2;

            updateUI();
            nextRound();

            // タイマー
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        // 次のラウンド
        function nextRound() {
            // レベルに応じて選択肢を増やす
            optionCount = Math.min(2 + Math.floor(level / 3), 6);

            // ターゲット色を生成
            targetColor = generateColor();
            document.getElementById('target-color').style.background = targetColor;

            // 選択肢を生成
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';

            // 正解の位置
            const correctIndex = Math.floor(Math.random() * optionCount);

            for (let i = 0; i < optionCount; i++) {
                const option = document.createElement('div');
                option.className = 'color-option';

                if (i === correctIndex) {
                    // 正解（元の色と同じ）
                    option.style.background = targetColor;
                    option.dataset.correct = 'true';
                } else {
                    // 不正解（似た色）
                    option.style.background = generateSimilarColor(targetColor);
                    option.dataset.correct = 'false';
                }

                option.addEventListener('click', () => selectColor(option));
                optionsContainer.appendChild(option);
            }
        }

        // 色選択
        function selectColor(option) {
            const isCorrect = option.dataset.correct === 'true';
            const targetElement = document.getElementById('target-color');

            totalAnswers++;

            if (isCorrect) {
                correctAnswers++;
                combo++;

                // スコア計算（コンボボーナス付き）
                const baseScore = 100;
                const comboBonus = Math.min(combo * 10, 100);
                const levelBonus = (level - 1) * 20;
                const roundScore = baseScore + comboBonus + levelBonus;
                score += roundScore;

                // 正解アニメーション
                targetElement.classList.add('correct');
                setTimeout(() => targetElement.classList.remove('correct'), 500);

                // コンボ表示
                if (combo >= 3) {
                    showCombo(combo);
                }

                // レベルアップ
                if (correctAnswers % 5 === 0) {
                    level++;
                    timeLeft += 10; // ボーナスタイム
                }

                // 次のラウンド
                setTimeout(() => {
                    nextRound();
                    updateUI();
                }, 300);
            } else {
                combo = 0;

                // 不正解アニメーション
                targetElement.classList.add('wrong');
                setTimeout(() => targetElement.classList.remove('wrong'), 500);

                // ペナルティ（時間減少）
                timeLeft = Math.max(0, timeLeft - 5);
                updateUI();
            }
        }

        // コンボ表示
        function showCombo(comboCount) {
            const display = document.getElementById('combo-display');
            display.textContent = `COMBO x${comboCount}!`;
            display.classList.add('show');
            setTimeout(() => display.classList.remove('show'), 1000);
        }

        // UI更新
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;
            document.getElementById('level').textContent = level;
        }

        // ゲーム終了
        function endGame() {
            clearInterval(timerInterval);

            const accuracy = totalAnswers > 0 ? Math.round((correctAnswers / totalAnswers) * 100) : 0;

            document.getElementById('final-score').textContent = score;
            document.getElementById('final-stats').innerHTML = `
                正解率: ${accuracy}%<br>
                最高コンボ: ${combo}<br>
                到達レベル: ${level}
            `;
            document.getElementById('game-over-screen').style.display = 'flex';
        }

        // リスタート
        function restartGame() {
            document.getElementById('game-over-screen').style.display = 'none';
            startGame();
        }

        // 全画面切り替え
        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // キーボード操作（1-6キーで選択）
        document.addEventListener('keydown', (e) => {
            const key = parseInt(e.key);
            if (key >= 1 && key <= optionCount) {
                const options = document.querySelectorAll('.color-option');
                if (options[key - 1]) {
                    options[key - 1].click();
                }
            }
        });
    </script>
</body>
</html>
