<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quick Tap Challenge #834</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: none;
        }

        #gameArea {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .target {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
            animation: pulse 0.5s ease-in-out infinite alternate;
        }

        .target:active {
            transform: scale(0.9);
        }

        @keyframes pulse {
            from {
                box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            }
            to {
                box-shadow: 0 0 40px rgba(255, 255, 255, 1);
            }
        }

        .pop {
            animation: pop 0.3s ease-out forwards;
        }

        @keyframes pop {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        #timer {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        #startScreen, #resultScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            z-index: 100;
        }

        #startScreen h1, #resultScreen h1 {
            font-size: 36px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        #startScreen p, #resultScreen p {
            font-size: 18px;
            margin-bottom: 30px;
            text-align: center;
            padding: 0 20px;
        }

        button {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: absolute;
            top: 60px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 8px 16px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            z-index: 50;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .hidden {
            display: none !important;
        }

        .final-score {
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <div id="gameArea">
        <div id="score">スコア: 0</div>
        <div id="timer">時間: 30</div>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    </div>

    <div id="startScreen">
        <h1>Quick Tap Challenge</h1>
        <p>出現するターゲットをタップしてスコアを稼げ！<br>制限時間は30秒</p>
        <button onclick="startGame()">スタート</button>
    </div>

    <div id="resultScreen" class="hidden">
        <h1>ゲーム終了！</h1>
        <div class="final-score" id="finalScore">0</div>
        <p id="resultMessage">お疲れ様！</p>
        <button onclick="startGame()">もう一度</button>
    </div>

    <script>
        let score = 0;
        let timeLeft = 30;
        let gameInterval;
        let spawnInterval;
        let isPlaying = false;

        const gameArea = document.getElementById('gameArea');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const startScreen = document.getElementById('startScreen');
        const resultScreen = document.getElementById('resultScreen');
        const finalScoreDisplay = document.getElementById('finalScore');
        const resultMessage = document.getElementById('resultMessage');

        const colors = [
            '#ff6b6b',
            '#4ecdc4',
            '#ffe66d',
            '#95e1d3',
            '#f38181',
            '#aa96da',
            '#fcbad3'
        ];

        function getRandomColor() {
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function createTarget() {
            if (!isPlaying) return;

            const target = document.createElement('div');
            target.className = 'target';
            target.style.backgroundColor = getRandomColor();

            const maxX = window.innerWidth - 60;
            const maxY = window.innerHeight - 60;

            target.style.left = Math.random() * maxX + 'px';
            target.style.top = Math.random() * maxY + 'px';

            target.addEventListener('click', (e) => {
                if (!isPlaying) return;
                e.stopPropagation();

                score += 10;
                scoreDisplay.textContent = `スコア: ${score}`;

                // ポップエフェクト
                target.classList.add('pop');
                setTimeout(() => target.remove(), 300);
            });

            target.addEventListener('touchstart', (e) => {
                if (!isPlaying) return;
                e.stopPropagation();

                score += 10;
                scoreDisplay.textContent = `スコア: ${score}`;

                target.classList.add('pop');
                setTimeout(() => target.remove(), 300);
            });

            gameArea.appendChild(target);

            // 自動的に消える
            setTimeout(() => {
                if (target.parentNode && !target.classList.contains('pop')) {
                    target.remove();
                }
            }, 2000);
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            isPlaying = true;

            scoreDisplay.textContent = `スコア: ${score}`;
            timerDisplay.textContent = `時間: ${timeLeft}`;

            startScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');

            // 既存のターゲットを削除
            document.querySelectorAll('.target').forEach(t => t.remove());

            // タイマー開始
            gameInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = `時間: ${timeLeft}`;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // ターゲット生成
            spawnInterval = setInterval(createTarget, 500);

            // 最初のターゲット
            createTarget();
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameInterval);
            clearInterval(spawnInterval);

            finalScoreDisplay.textContent = score;

            if (score >= 200) {
                resultMessage.textContent = 'すごい！速い！';
            } else if (score >= 100) {
                resultMessage.textContent = 'いい感じ！';
            } else {
                resultMessage.textContent = 'まだまだ頑張れる！';
            }

            resultScreen.classList.remove('hidden');

            // 全ターゲット削除
            document.querySelectorAll('.target').forEach(t => t.remove());
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ゲームエリア外のクリックでペナルティ
        gameArea.addEventListener('click', (e) => {
            if (isPlaying && e.target === gameArea) {
                score = Math.max(0, score - 5);
                scoreDisplay.textContent = `スコア: ${score}`;
            }
        });
    </script>
</body>
</html>
