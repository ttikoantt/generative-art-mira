<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quick Tap Challenge - クイックタップチャレンジ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            color: #00d9ff;
        }
        
        .subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
        }
        
        .game-area {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        
        .stat {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #00ff88;
        }
        
        .target-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
        }
        
        .target {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
            animation: pulse 1s ease-in-out infinite;
        }
        
        .target:active {
            transform: scale(0.9);
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .target.active {
            animation: none;
            box-shadow: 0 0 30px currentColor;
        }
        
        .start-screen, .result-screen {
            display: none;
        }
        
        .start-screen.active, .result-screen.active {
            display: block;
        }
        
        .game-screen {
            display: none;
        }
        
        .game-screen.active {
            display: block;
        }
        
        .btn {
            background: linear-gradient(135deg, #00d9ff 0%, #00ff88 100%);
            color: #1a1a2e;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.3);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .result-title {
            font-size: 36px;
            margin-bottom: 20px;
            color: #00ff88;
        }
        
        .result-score {
            font-size: 64px;
            font-weight: bold;
            color: #00d9ff;
            margin-bottom: 10px;
        }
        
        .result-detail {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
        }
        
        .high-score {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 217, 255, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(0, 217, 255, 0.3);
        }
        
        .high-score-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        
        .high-score-value {
            font-size: 28px;
            font-weight: bold;
            color: #ffcc00;
        }
        
        .combo {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: bold;
            color: #ffcc00;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .combo.show {
            opacity: 1;
            animation: comboPop 0.3s ease-out;
        }
        
        @keyframes comboPop {
            0% { transform: translateX(-50%) scale(0.5); }
            50% { transform: translateX(-50%) scale(1.2); }
            100% { transform: translateX(-50%) scale(1); }
        }
        
        .time-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .time-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88 0%, #00d9ff 100%);
            transition: width 0.1s linear;
        }
        
        .instructions {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>QUICK TAP CHALLENGE</h1>
        <p class="subtitle">現れるターゲットを素早くタップ！</p>
        
        <div class="game-area">
            <div class="start-screen active" id="startScreen">
                <div class="instructions">
                    制限時間30秒で、現れるターゲットを素早くタップしてください。<br>
                    連続で正解するとコンボボーナス！
                </div>
                <button class="btn" onclick="startGame()">スタート</button>
            </div>
            
            <div class="game-screen" id="gameScreen">
                <div class="time-bar">
                    <div class="time-bar-fill" id="timeBar"></div>
                </div>
                
                <div class="stats">
                    <div class="stat">
                        <div class="stat-label">スコア</div>
                        <div class="stat-value" id="score">0</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">コンボ</div>
                        <div class="stat-value" id="combo">0</div>
                    </div>
                </div>
                
                <div class="target-container">
                    <div class="combo" id="comboDisplay"></div>
                    <div class="target" id="target"></div>
                </div>
            </div>
            
            <div class="result-screen" id="resultScreen">
                <div class="result-title">TIME'S UP!</div>
                <div class="result-score" id="finalScore">0</div>
                <div class="result-detail" id="resultDetail"></div>
                <button class="btn" onclick="startGame()">もう一度</button>
                <div class="high-score">
                    <div class="high-score-label">HIGH SCORE</div>
                    <div class="high-score-value" id="highScore">0</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // ゲーム状態
        let score = 0;
        let combo = 0;
        let timeLeft = 30;
        let isPlaying = false;
        let highScore = localStorage.getItem('quickTapHighScore') || 0;
        let gameTimer;
        let targetTimer;
        
        // DOM要素
        const startScreen = document.getElementById('startScreen');
        const gameScreen = document.getElementById('gameScreen');
        const resultScreen = document.getElementById('resultScreen');
        const scoreEl = document.getElementById('score');
        const comboEl = document.getElementById('combo');
        const comboDisplay = document.getElementById('comboDisplay');
        const target = document.getElementById('target');
        const timeBar = document.getElementById('timeBar');
        const finalScoreEl = document.getElementById('finalScore');
        const resultDetailEl = document.getElementById('resultDetail');
        const highScoreEl = document.getElementById('highScore');
        
        // 色設定
        const colors = [
            '#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', 
            '#ffeaa7', '#dfe6e9', '#fd79a8', '#00b894'
        ];
        
        // ハイスコア表示
        highScoreEl.textContent = highScore;
        
        function startGame() {
            // リセット
            score = 0;
            combo = 0;
            timeLeft = 30;
            isPlaying = true;
            
            // UI更新
            scoreEl.textContent = '0';
            comboEl.textContent = '0';
            timeBar.style.width = '100%';
            
            // 画面切り替え
            startScreen.classList.remove('active');
            resultScreen.classList.remove('active');
            gameScreen.classList.add('active');
            
            // ターゲット生成開始
            spawnTarget();
            
            // タイマー開始
            gameTimer = setInterval(() => {
                timeLeft -= 0.1;
                timeBar.style.width = `${(timeLeft / 30) * 100}%`;
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 100);
        }
        
        function spawnTarget() {
            if (!isPlaying) return;
            
            // ランダムな位置とサイズ
            const size = Math.random() * 40 + 30;
            const x = Math.random() * (200 - size);
            const y = Math.random() * (200 - size);
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            target.style.width = `${size}px`;
            target.style.height = `${size}px`;
            target.style.left = `${x}px`;
            target.style.top = `${y}px`;
            target.style.backgroundColor = color;
            target.style.display = 'block';
            target.classList.add('active');
            
            // 次のターゲットまでの時間（難易度上昇）
            const delay = Math.max(400, 1500 - score * 10);
            targetTimer = setTimeout(() => {
                // タイムアウトでコンボリセット
                if (isPlaying) {
                    combo = 0;
                    comboEl.textContent = '0';
                    spawnTarget();
                }
            }, delay);
        }
        
        target.addEventListener('click', () => {
            if (!isPlaying) return;
            
            clearTimeout(targetTimer);
            
            // スコア計算（コンボボーナス付き）
            const basePoints = 10;
            const comboBonus = Math.min(combo * 5, 50);
            const points = basePoints + comboBonus;
            
            score += points;
            combo++;
            
            // UI更新
            scoreEl.textContent = score;
            comboEl.textContent = combo;
            
            // コンボ表示
            if (combo >= 3) {
                comboDisplay.textContent = `${combo} COMBO!`;
                comboDisplay.classList.add('show');
                setTimeout(() => {
                    comboDisplay.classList.remove('show');
                }, 500);
            }
            
            // 次のターゲット
            spawnTarget();
        });
        
        function endGame() {
            isPlaying = false;
            clearInterval(gameTimer);
            clearTimeout(targetTimer);
            
            // ハイスコア更新
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('quickTapHighScore', highScore);
                highScoreEl.textContent = highScore;
            }
            
            // 結果表示
            finalScoreEl.textContent = score;
            resultDetailEl.textContent = `最大コンボ: ${combo}`;
            
            // 画面切り替え
            gameScreen.classList.remove('active');
            resultScreen.classList.add('active');
        }
        
        // タッチサポート
        target.addEventListener('touchstart', (e) => {
            e.preventDefault();
            target.click();
        });
    </script>
</body>
</html>
