<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Tap Challenge - Reflex Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            font-size: 18px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .play-area {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .target {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            position: absolute;
            cursor: pointer;
            transition: transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 14px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .target:active {
            transform: scale(0.95);
        }

        .target.tap {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
        }

        .target.wait {
            background: linear-gradient(135deg, #4ecdc4, #44bd32);
            cursor: not-allowed;
        }

        .target.miss {
            background: linear-gradient(135deg, #a55eea, #8854d0);
        }

        .message {
            text-align: center;
            color: #333;
            font-size: 20px;
            font-weight: 600;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 25px rgba(0, 0, 0, 0.3);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 24px;
            font-size: 14px;
            border-radius: 25px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .combo-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #ff6b6b;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
        }

        .combo-display.show {
            animation: comboPopup 0.5s ease-out;
        }

        @keyframes comboPopup {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 22px;
            }
            .stats {
                gap: 15px;
                font-size: 14px;
            }
            .target {
                width: 60px;
                height: 60px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>⚡ Quick Tap Challenge</h1>
            <div class="stats">
                <div class="stat">Score: <span id="score">0</span></div>
                <div class="stat">Time: <span id="timer">30</span>s</div>
                <div class="stat">Best: <span id="best">0</span></div>
            </div>
        </div>

        <div class="play-area" id="playArea">
            <div class="message">
                Tap "TAP NOW!" as fast as you can!<br>
                Wait for "WAIT..."
            </div>
        </div>

        <div style="text-align: center;">
            <button class="start-btn" id="startBtn">Start Game</button>
        </div>
    </div>

    <div class="combo-display" id="comboDisplay"></div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        const playArea = document.getElementById('playArea');
        const startBtn = document.getElementById('startBtn');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const bestDisplay = document.getElementById('best');
        const comboDisplay = document.getElementById('comboDisplay');

        let score = 0;
        let timeLeft = 30;
        let gameActive = false;
        let combo = 0;
        let bestScore = localStorage.getItem('quickTapBest') || 0;
        bestDisplay.textContent = bestScore;

        let currentTarget = null;
        let timeoutId = null;
        let timerInterval = null;

        const messages = {
            tap: ['TAP NOW!', 'QUICK!', 'HIT!', 'GO!'],
            wait: ['WAIT...', 'HOLD...', 'NOT YET...', 'STOP...']
        };

        function createTarget(type) {
            const target = document.createElement('div');
            target.className = `target ${type}`;

            const msgList = type === 'tap' ? messages.tap : messages.wait;
            target.textContent = msgList[Math.floor(Math.random() * msgList.length)];

            const padding = 70;
            const maxX = playArea.clientWidth - padding * 2;
            const maxY = playArea.clientHeight - padding * 2;

            target.style.left = `${padding + Math.random() * maxX}px`;
            target.style.top = `${padding + Math.random() * maxY}px`;

            return target;
        }

        function showTarget() {
            if (!gameActive) return;

            playArea.innerHTML = '';

            const isTapTarget = Math.random() > 0.3; // 70% chance of tap target
            currentTarget = createTarget(isTapTarget ? 'tap' : 'wait');

            currentTarget.addEventListener('mousedown', handleTap);
            currentTarget.addEventListener('touchstart', handleTap, { passive: false });

            playArea.appendChild(currentTarget);

            // Auto-remove after random time (1-3 seconds)
            const delay = 1000 + Math.random() * 2000;
            timeoutId = setTimeout(() => {
                if (gameActive && currentTarget) {
                    if (currentTarget.classList.contains('tap')) {
                        // Missed tap target
                        combo = 0;
                    }
                    showTarget();
                }
            }, delay);
        }

        function handleTap(e) {
            e.preventDefault();
            if (!gameActive) return;

            clearTimeout(timeoutId);

            if (currentTarget.classList.contains('tap')) {
                // Correct tap
                combo++;
                score += 10 + (combo * 2);
                scoreDisplay.textContent = score;

                if (combo > 1 && combo % 5 === 0) {
                    showCombo(combo);
                }

                // Show success feedback
                currentTarget.style.background = 'linear-gradient(135deg, #00b894, #00cec9)';
            } else if (currentTarget.classList.contains('wait')) {
                // Wrong tap
                combo = 0;
                score = Math.max(0, score - 50);
                scoreDisplay.textContent = score;

                currentTarget.style.background = 'linear-gradient(135deg, #d63031, #e17055)';
                showCombo('MISS!');

                setTimeout(() => {
                    if (gameActive) showTarget();
                }, 500);
                return;
            }

            setTimeout(() => {
                if (gameActive) showTarget();
            }, 100);
        }

        function showCombo(text) {
            comboDisplay.textContent = typeof text === 'number' ? `${text}x COMBO!` : text;
            comboDisplay.classList.remove('show');
            void comboDisplay.offsetWidth; // Trigger reflow
            comboDisplay.classList.add('show');
        }

        function startGame() {
            score = 0;
            combo = 0;
            timeLeft = 30;
            gameActive = true;

            scoreDisplay.textContent = score;
            timerDisplay.textContent = timeLeft;

            startBtn.style.display = 'none';

            showTarget();

            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);
            clearTimeout(timeoutId);

            playArea.innerHTML = `
                <div class="message">
                    <h2 style="font-size: 32px; margin-bottom: 20px;">🎉 Time's Up!</h2>
                    <p style="font-size: 24px; margin-bottom: 10px;">Score: ${score}</p>
                    <p style="font-size: 18px; color: #666;">Best: ${bestScore}</p>
                </div>
            `;

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('quickTapBest', bestScore);
                bestDisplay.textContent = bestScore;

                setTimeout(() => {
                    showCombo('NEW BEST!');
                }, 500);
            }

            startBtn.textContent = 'Play Again';
            startBtn.style.display = 'inline-block';
        }

        startBtn.addEventListener('click', startGame);

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
