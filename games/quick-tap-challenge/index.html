<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quick Tap Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            touch-action: manipulation;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .title {
            font-size: 2em;
            font-weight: bold;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        
        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.2em;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-label {
            font-size: 0.8em;
            opacity: 0.7;
        }
        
        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #4ecca3;
        }
        
        .game-area {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        
        .target {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: bold;
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        
        .target:active {
            transform: scale(0.95);
        }
        
        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 1.5em;
            text-align: center;
            pointer-events: none;
        }
        
        .start-btn {
            background: linear-gradient(135deg, #4ecca3 0%, #45b393 100%);
            border: none;
            color: #fff;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(78, 204, 163, 0.3);
            transition: all 0.3s;
        }
        
        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(78, 204, 163, 0.4);
        }
        
        .start-btn:active {
            transform: translateY(0);
        }
        
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
        }
        
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .combo {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2em;
            font-weight: bold;
            color: #ffd93d;
            text-shadow: 0 2px 10px rgba(255, 217, 61, 0.5);
            opacity: 0;
            transition: all 0.3s;
        }
        
        .combo.show {
            opacity: 1;
            transform: translateX(-50%) scale(1.2);
        }
        
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border-radius: 20px;
        }
        
        .game-over.show {
            display: flex;
        }
        
        .final-score {
            font-size: 3em;
            font-weight: bold;
            color: #4ecca3;
            margin: 20px 0;
        }
        
        @media (max-width: 600px) {
            .title {
                font-size: 1.5em;
            }
            
            .stats {
                gap: 20px;
            }
            
            .game-area {
                height: 350px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    <div class="combo" id="combo"></div>
    
    <div class="container">
        <div class="header">
            <div class="title">Quick Tap Challenge</div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">スコア</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">時間</div>
                    <div class="stat-value" id="time">30</div>
                </div>
                <div class="stat">
                    <div class="stat-label">ハイスコア</div>
                    <div class="stat-value" id="highScore">0</div>
                </div>
            </div>
        </div>
        
        <div class="game-area" id="gameArea">
            <div class="message" id="message">
                <button class="start-btn" onclick="startGame()">スタート</button>
            </div>
            <div class="game-over" id="gameOver">
                <div class="title">ゲームオーバー!</div>
                <div class="final-score" id="finalScore">0</div>
                <button class="start-btn" onclick="startGame()">もう一度</button>
            </div>
        </div>
    </div>
    
    <script>
        let score = 0;
        let timeLeft = 30;
        let highScore = parseInt(localStorage.getItem('quickTapHighScore')) || 0;
        let gameRunning = false;
        let gameTimer = null;
        let targetTimer = null;
        let combo = 0;
        let comboTimeout = null;
        
        const scoreEl = document.getElementById('score');
        const timeEl = document.getElementById('time');
        const highScoreEl = document.getElementById('highScore');
        const gameArea = document.getElementById('gameArea');
        const messageEl = document.getElementById('message');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const comboEl = document.getElementById('combo');
        
        highScoreEl.textContent = highScore;
        
        function startGame() {
            score = 0;
            timeLeft = 30;
            combo = 0;
            gameRunning = true;
            
            scoreEl.textContent = '0';
            timeEl.textContent = '30';
            messageEl.style.display = 'none';
            gameOverEl.classList.remove('show');
            
            // タイマー開始
            gameTimer = setInterval(() => {
                timeLeft--;
                timeEl.textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
            
            spawnTarget();
        }
        
        function spawnTarget() {
            if (!gameRunning) return;
            
            // 既存のターゲットを削除
            const existing = gameArea.querySelector('.target');
            if (existing) existing.remove();
            
            // 新しいターゲットを作成
            const target = document.createElement('div');
            target.className = 'target';
            
            const size = Math.random() * 40 + 40; // 40-80px
            const maxX = gameArea.offsetWidth - size;
            const maxY = gameArea.offsetHeight - size;
            
            target.style.width = size + 'px';
            target.style.height = size + 'px';
            target.style.left = Math.random() * maxX + 'px';
            target.style.top = Math.random() * maxY + 'px';
            target.style.background = `radial-gradient(circle at 30% 30%, ${getRandomColor()}, ${getRandomColor()})`;
            
            target.addEventListener('click', hitTarget);
            target.addEventListener('touchstart', (e) => {
                e.preventDefault();
                hitTarget(e);
            });
            
            gameArea.appendChild(target);
            
            // 次のターゲット予約（プレッシャー）
            if (targetTimer) clearTimeout(targetTimer);
            targetTimer = setTimeout(() => {
                const current = gameArea.querySelector('.target');
                if (current && gameRunning) {
                    current.remove();
                    combo = 0;
                    hideCombo();
                    spawnTarget();
                }
            }, 2000 - Math.min(score * 10, 1000)); // スコアが上がると短くなる
        }
        
        function hitTarget(e) {
            if (!gameRunning) return;
            
            const target = e.currentTarget;
            target.remove();
            
            score++;
            combo++;
            scoreEl.textContent = score;
            
            // コンボ表示
            showCombo();
            
            if (comboTimeout) clearTimeout(comboTimeout);
            comboTimeout = setTimeout(() => {
                combo = 0;
                hideCombo();
            }, 2000);
            
            spawnTarget();
        }
        
        function showCombo() {
            if (combo >= 3) {
                comboEl.textContent = `${combo} Combo!`;
                comboEl.classList.add('show');
            }
        }
        
        function hideCombo() {
            comboEl.classList.remove('show');
        }
        
        function endGame() {
            gameRunning = false;
            
            if (gameTimer) clearInterval(gameTimer);
            if (targetTimer) clearTimeout(targetTimer);
            
            // ターゲットを削除
            const target = gameArea.querySelector('.target');
            if (target) target.remove();
            
            // ハイスコア更新
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('quickTapHighScore', highScore);
                highScoreEl.textContent = highScore;
            }
            
            finalScoreEl.textContent = score;
            gameOverEl.classList.add('show');
        }
        
        function getRandomColor() {
            const colors = [
                '#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4',
                '#ffd93d', '#6c5ce7', '#a29bfe', '#fd79a8'
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
