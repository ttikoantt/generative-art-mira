<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Chaser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
        }

        .game-container {
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .timer-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            transition: width 0.1s linear;
        }

        .word-display {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .target-word {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .letter-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .letter-btn {
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.3), rgba(0, 255, 136, 0.3));
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .letter-btn:hover:not(:disabled) {
            transform: scale(1.05);
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.5), rgba(0, 255, 136, 0.5));
        }

        .letter-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .letter-btn.correct {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            animation: pulse 0.3s ease;
        }

        .letter-btn.wrong {
            background: linear-gradient(135deg, #ff4757, #ff3344);
            animation: shake 0.3s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button.primary-btn {
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            border: none;
            color: #1a1a2e;
            font-size: 1rem;
            font-weight: bold;
            padding: 15px 40px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button.primary-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .overlay p {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .target-word { font-size: 1.5rem; }
            .letter-btn { padding: 12px; font-size: 1.2rem; }
            .letter-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="game-container">
        <h1>🔤 Word Chaser</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Streak</div>
                <div class="stat-value" id="streak">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Best</div>
                <div class="stat-value" id="best">0</div>
            </div>
        </div>

        <div class="timer-bar">
            <div class="timer-fill" id="timerFill"></div>
        </div>

        <div class="word-display">
            <div class="target-word" id="targetWord">READY</div>
            <div class="letter-grid" id="letterGrid"></div>
        </div>

        <div class="controls">
            <button class="primary-btn" onclick="startGame()">Start Game</button>
        </div>
    </div>

    <div class="overlay" id="gameOverOverlay">
        <h2>⏰ Time's Up!</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button class="primary-btn" onclick="startGame()">Play Again</button>
    </div>

    <script>
        const words = [
            'APPLE', 'BEACH', 'CLOUD', 'DREAM', 'EARTH', 'FLAME', 'GRAPE', 'HOUSE',
            'IMAGE', 'JUICE', 'KNIFE', 'LEMON', 'MANGO', 'NIGHT', 'OCEAN', 'PIANO',
            'QUEEN', 'RIVER', 'STORM', 'TIGER', 'UNITY', 'VOICE', 'WATER', 'YOUTH',
            'ZEBRA', 'BRAVE', 'CATCH', 'DANCE', 'EAGLE', 'FROST', 'GLOWN', 'HEART',
            'INPUT', 'JOKER', 'KAYAK', 'LUNAR', 'MAGIC', 'NOBLE', 'ONION', 'PEACE',
            'QUICK', 'ROBOT', 'SHEEP', 'TRAIN', 'UPPER', 'VIVID', 'WHEAT', 'XEROX',
            'YOUNG', 'ZESTY', 'ACTIVE', 'BRIGHT', 'CALM', 'DELTA', 'ELITE', 'FRESH',
            'GENTLE', 'HAPPY', 'IMMUNE', 'JOYFUL', 'KIND', 'LUCKY', 'MERRY', 'NICE'
        ];

        let score = 0;
        let streak = 0;
        let bestScore = parseInt(localStorage.getItem('wordChaserBest')) || 0;
        let currentWord = '';
        let currentIndex = 0;
        let timeLeft = 30;
        let timerInterval = null;
        let isPlaying = false;

        function init() {
            document.getElementById('best').textContent = bestScore;
        }

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function startGame() {
            score = 0;
            streak = 0;
            timeLeft = 30;
            isPlaying = true;

            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('gameOverOverlay').classList.add('hidden');

            nextWord();
            startTimer();
        }

        function nextWord() {
            currentWord = words[Math.floor(Math.random() * words.length)];
            currentIndex = 0;

            document.getElementById('targetWord').textContent = currentWord;

            // シャッフルされた文字グリッドを作成
            const letters = shuffle(currentWord.split(''));
            const grid = document.getElementById('letterGrid');
            grid.innerHTML = '';

            letters.forEach(letter => {
                const btn = document.createElement('button');
                btn.className = 'letter-btn';
                btn.textContent = letter;
                btn.onclick = () => checkLetter(btn, letter);
                grid.appendChild(btn);
            });
        }

        function checkLetter(btn, letter) {
            if (!isPlaying || btn.disabled) return;

            const expected = currentWord[currentIndex];

            if (letter === expected) {
                // 正解
                btn.classList.add('correct');
                btn.disabled = true;
                currentIndex++;

                if (currentIndex >= currentWord.length) {
                    // 単語完了
                    streak++;
                    const bonus = Math.min(streak, 10);
                    score += 10 + bonus;
                    timeLeft = Math.min(timeLeft + 2, 30);

                    document.getElementById('score').textContent = score;
                    document.getElementById('streak').textContent = streak;

                    setTimeout(nextWord, 300);
                }
            } else {
                // 不正解
                btn.classList.add('wrong');
                streak = 0;
                document.getElementById('streak').textContent = streak;

                setTimeout(() => {
                    btn.classList.remove('wrong');
                }, 300);
            }
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                const percentage = (timeLeft / 30) * 100;
                document.getElementById('timerFill').style.width = percentage + '%';

                if (timeLeft <= 0) {
                    gameOver();
                }
            }, 100);
        }

        function gameOver() {
            isPlaying = false;
            clearInterval(timerInterval);

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('wordChaserBest', bestScore);
                document.getElementById('best').textContent = bestScore;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        init();
    </script>
</body>
</html>
