<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>カラーブラスト | Color Blast</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 800px;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #fff;
            font-size: 1.8em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 10px;
        }

        .stat {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.2em;
            font-weight: bold;
        }

        .stat-value {
            color: #f093fb;
            font-size: 1.4em;
        }

        #gameCanvas {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 0;
            cursor: pointer;
        }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 10;
        }

        .game-over h2 {
            font-size: 3em;
            margin-bottom: 20px;
            color: #f093fb;
        }

        .game-over p {
            font-size: 1.5em;
            margin: 10px 0;
        }

        .game-over button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.2em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .game-over button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .hidden {
            display: none !important;
        }

        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 10;
            padding: 20px;
            text-align: center;
        }

        .start-screen h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .start-screen p {
            font-size: 1.1em;
            line-height: 1.6;
            margin: 15px 0;
            color: rgba(255, 255, 255, 0.8);
            max-width: 400px;
        }

        .start-screen button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.2em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .start-screen button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 0.9em;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5em;
            }

            .stat {
                font-size: 1em;
            }

            .stat-value {
                font-size: 1.2em;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 15px;
            }

            h1 {
                font-size: 1.3em;
            }

            .stats {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div id="gameContainer">
        <div class="header">
            <h1>🎨 カラーブラスト</h1>
            <div class="stats">
                <div class="stat">スコア: <span class="stat-value" id="score">0</span></div>
                <div class="stat">ライフ: <span class="stat-value" id="lives">3</span></div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div class="start-screen" id="startScreen">
            <h2>🎨 カラーブラスト</h2>
            <p>落ちてくるボールを同じ色のバケットに入れてください！</p>
            <p>ボールをタップして左右に誘導</p>
            <p>間違えるとライフが減ります</p>
            <button onclick="startGame()">スタート</button>
        </div>

        <div class="game-over hidden" id="gameOver">
            <h2>ゲームオーバー</h2>
            <p>最終スコア: <span id="finalScore">0</span></p>
            <button onclick="startGame()">もう一度</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Colors for balls and buckets
        const COLORS = [
            { name: 'red', hex: '#ff6b6b' },
            { name: 'blue', hex: '#4ecdc4' },
            { name: 'yellow', hex: '#ffe66d' }
        ];

        let gameState = {
            score: 0,
            lives: 3,
            balls: [],
            particles: [],
            isPlaying: false,
            speed: 2,
            spawnRate: 1500,
            lastSpawn: 0
        };

        // Resize canvas
        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            const header = document.querySelector('.header');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight - header.offsetHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Ball class
        class Ball {
            constructor() {
                this.radius = 25;
                this.x = Math.random() * (canvas.width - 2 * this.radius) + this.radius;
                this.y = -this.radius;
                this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                this.vx = 0;
                this.vy = gameState.speed;
                this.gravity = 0.15;
            }

            update() {
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;

                // Bounce off walls
                if (this.x - this.radius < 0 || this.x + this.radius > canvas.width) {
                    this.vx *= -0.8;
                    this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                }
            }

            draw() {
                // Ball shadow
                ctx.beginPath();
                ctx.arc(this.x + 3, this.y + 3, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.fill();

                // Ball gradient
                const gradient = ctx.createRadialGradient(
                    this.x - this.radius * 0.3,
                    this.y - this.radius * 0.3,
                    0,
                    this.x,
                    this.y,
                    this.radius
                );
                gradient.addColorStop(0, '#ffffff');
                gradient.addColorStop(0.3, this.color.hex);
                gradient.addColorStop(1, this.darkenColor(this.color.hex));

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Glow effect
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color.hex;
                ctx.strokeStyle = this.color.hex;
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            darkenColor(hex) {
                const num = parseInt(hex.slice(1), 16);
                const amt = -40;
                const R = Math.max(0, (num >> 16) + amt);
                const G = Math.max(0, ((num >> 8) & 0x00FF) + amt);
                const B = Math.max(0, (num & 0x0000FF) + amt);
                return `#${(1 << 24 | R << 16 | G << 8 | B).toString(16).slice(1)}`;
            }
        }

        // Particle class for effects
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 8 + 4;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.life = 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.3;
                this.life -= 0.03;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        // Draw buckets
        function drawBuckets() {
            const bucketWidth = canvas.width / 3;
            const bucketHeight = 80;

            COLORS.forEach((color, index) => {
                const x = index * bucketWidth;
                const y = canvas.height - bucketHeight;

                // Bucket background
                const gradient = ctx.createLinearGradient(x, y, x, y + bucketHeight);
                gradient.addColorStop(0, color.hex + 'cc');
                gradient.addColorStop(1, color.hex + '66');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.moveTo(x + 20, y);
                ctx.lineTo(x + bucketWidth - 20, y);
                ctx.lineTo(x + bucketWidth - 10, y + bucketHeight);
                ctx.lineTo(x + 10, y + bucketHeight);
                ctx.closePath();
                ctx.fill();

                // Bucket border
                ctx.strokeStyle = color.hex;
                ctx.lineWidth = 3;
                ctx.stroke();

                // Glow
                ctx.shadowBlur = 20;
                ctx.shadowColor = color.hex;
                ctx.stroke();
                ctx.shadowBlur = 0;
            });
        }

        // Check ball-bucket collision
        function checkCollisions() {
            const bucketWidth = canvas.width / 3;
            const bucketHeight = 80;

            gameState.balls = gameState.balls.filter(ball => {
                if (ball.y - ball.radius > canvas.height - bucketHeight) {
                    const bucketIndex = Math.floor(ball.x / bucketWidth);

                    if (bucketIndex >= 0 && bucketIndex < COLORS.length) {
                        const bucketColor = COLORS[bucketIndex];

                        if (ball.color.name === bucketColor.name) {
                            // Correct!
                            gameState.score += 10;
                            createParticles(ball.x, ball.y, ball.color.hex);

                            // Speed up
                            if (gameState.score % 50 === 0) {
                                gameState.speed += 0.3;
                                gameState.spawnRate = Math.max(500, gameState.spawnRate - 100);
                            }

                            return false; // Remove ball
                        } else {
                            // Wrong!
                            gameState.lives--;
                            createParticles(ball.x, ball.y, '#ff0000');

                            if (gameState.lives <= 0) {
                                gameOver();
                            }

                            return false; // Remove ball
                        }
                    }

                    return false; // Remove ball if out of bounds
                }

                return true; // Keep ball
            });
        }

        // Create particles
        function createParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                gameState.particles.push(new Particle(x, y, color));
            }
        }

        // Update particles
        function updateParticles() {
            gameState.particles = gameState.particles.filter(p => {
                p.update();
                return p.life > 0;
            });
        }

        // Draw particles
        function drawParticles() {
            gameState.particles.forEach(p => p.draw());
        }

        // Game loop
        function gameLoop(timestamp) {
            if (!gameState.isPlaying) return;

            // Clear canvas
            ctx.fillStyle = 'rgba(15, 23, 42, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Spawn balls
            if (timestamp - gameState.lastSpawn > gameState.spawnRate) {
                gameState.balls.push(new Ball());
                gameState.lastSpawn = timestamp;
            }

            // Update and draw balls
            gameState.balls.forEach(ball => {
                ball.update();
                ball.draw();
            });

            // Update and draw particles
            updateParticles();
            drawParticles();

            // Draw buckets
            drawBuckets();

            // Check collisions
            checkCollisions();

            // Update UI
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('lives').textContent = gameState.lives;

            requestAnimationFrame(gameLoop);
        }

        // Touch/click handler
        function handleInput(e) {
            if (!gameState.isPlaying) return;

            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

            // Find clicked ball and push it
            gameState.balls.forEach(ball => {
                const dx = x - ball.x;
                const dy = y - ball.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < ball.radius * 3) {
                    // Push ball away from tap
                    ball.vx = dx * 0.1;
                    ball.vy = Math.min(ball.vy, -5);
                }
            });
        }

        canvas.addEventListener('click', handleInput);
        canvas.addEventListener('touchstart', handleInput);

        // Start game
        function startGame() {
            gameState = {
                score: 0,
                lives: 3,
                balls: [],
                particles: [],
                isPlaying: true,
                speed: 2,
                spawnRate: 1500,
                lastSpawn: 0
            };

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOver').classList.add('hidden');

            requestAnimationFrame(gameLoop);
        }

        // Game over
        function gameOver() {
            gameState.isPlaying = false;
            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('gameOver').classList.remove('hidden');
        }

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
