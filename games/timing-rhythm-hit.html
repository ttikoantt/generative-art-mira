<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timing Rhythm Hit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        .game-container {
            text-align: center;
            position: relative;
        }
        #canvas {
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.2);
            background: rgba(0, 0, 0, 0.5);
        }
        .score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #00ff88;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        .combo {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffcc00;
            font-size: 18px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .combo.show { opacity: 1; }
        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid rgba(0, 255, 136, 0.4);
            color: #00ff88;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .fullscreen-btn:hover {
            background: rgba(0, 255, 136, 0.4);
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 30px 50px;
            border-radius: 12px;
            text-align: center;
            display: none;
        }
        .game-over.show { display: block; }
        .game-over h2 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #ff4444;
        }
        .game-over p {
            font-size: 18px;
            margin-bottom: 20px;
        }
        .restart-btn {
            background: #00ff88;
            border: none;
            color: #1a1a2e;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .restart-btn:hover {
            transform: scale(1.05);
        }
        @media (max-width: 768px) {
            .score { font-size: 20px; }
            .combo { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="canvas"></canvas>
        <div class="score">Score: <span id="scoreValue">0</span></div>
        <div class="combo" id="combo"></div>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
        <div class="game-over" id="gameOver">
            <h2>GAME OVER</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button class="restart-btn" onclick="restartGame()">再挑戦</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let score = 0;
        let combo = 0;
        let gameRunning = true;
        let targets = [];
        let lastSpawnTime = 0;
        let spawnInterval = 1500;
        let difficulty = 1;

        function resize() {
            width = canvas.width = Math.min(window.innerWidth * 0.9, 600);
            height = canvas.height = Math.min(window.innerHeight * 0.8, 600);
        }

        class Target {
            constructor() {
                this.radius = 40;
                this.x = Math.random() * (width - this.radius * 2) + this.radius;
                this.y = Math.random() * (height - this.radius * 2) + this.radius;
                this.maxRadius = this.radius;
                this.radius = 0;
                this.growing = true;
                this.shrinkSpeed = 0.5 * difficulty;
                this.color = `hsl(${Math.random() * 60 + 150}, 80%, 50%)`;
                this.spawnTime = Date.now();
                this.lifetime = 2000 / difficulty;
            }

            update() {
                const age = Date.now() - this.spawnTime;

                if (this.growing) {
                    this.radius += 2;
                    if (this.radius >= this.maxRadius) {
                        this.growing = false;
                    }
                } else {
                    this.radius -= this.shrinkSpeed;
                }

                return this.radius > 0 && age < this.lifetime;
            }

            draw() {
                const alpha = this.radius / this.maxRadius;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color.replace(')', `, ${alpha})`).replace('hsl', 'hsla');
                ctx.fill();

                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Inner circle
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.6, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.stroke();
            }

            isHit(x, y) {
                const dx = x - this.x;
                const dy = y - this.y;
                return Math.sqrt(dx * dx + dy * dy) < this.radius;
            }
        }

        function spawnTarget() {
            targets.push(new Target());
        }

        function updateScore(points, perfect) {
            score += points;
            combo++;
            document.getElementById('scoreValue').textContent = score;

            const comboEl = document.getElementById('combo');
            if (combo >= 3) {
                comboEl.textContent = `${combo} COMBO!`;
                comboEl.classList.add('show');
            }

            if (perfect) {
                showFeedback('PERFECT!', '#ffcc00');
            } else if (points > 0) {
                showFeedback('+' + points, '#00ff88');
            }
        }

        function showFeedback(text, color) {
            ctx.save();
            ctx.font = 'bold 24px Arial';
            ctx.fillStyle = color;
            ctx.textAlign = 'center';
            ctx.fillText(text, width / 2, height / 2);
            ctx.restore();
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.add('show');
        }

        function restartGame() {
            score = 0;
            combo = 0;
            gameRunning = true;
            targets = [];
            difficulty = 1;
            spawnInterval = 1500;
            document.getElementById('scoreValue').textContent = '0';
            document.getElementById('combo').classList.remove('show');
            document.getElementById('gameOver').classList.remove('show');
            requestAnimationFrame(gameLoop);
        }

        function handleClick(x, y) {
            if (!gameRunning) return;

            let hit = false;
            for (let i = targets.length - 1; i >= 0; i--) {
                if (targets[i].isHit(x, y)) {
                    const target = targets[i];
                    const accuracy = target.radius / target.maxRadius;
                    let points = 0;
                    let perfect = false;

                    if (accuracy > 0.8) {
                        points = 100 * (1 + combo * 0.1);
                        perfect = true;
                    } else if (accuracy > 0.5) {
                        points = 50 * (1 + combo * 0.1);
                    } else {
                        points = 25 * (1 + combo * 0.1);
                    }

                    updateScore(Math.floor(points), perfect);
                    targets.splice(i, 1);
                    hit = true;
                    break;
                }
            }

            if (!hit) {
                combo = 0;
                document.getElementById('combo').classList.remove('show');
            }
        }

        function gameLoop() {
            if (!gameRunning) return;

            // Clear canvas
            ctx.fillStyle = 'rgba(26, 26, 46, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // Spawn targets
            const now = Date.now();
            if (now - lastSpawnTime > spawnInterval) {
                spawnTarget();
                lastSpawnTime = now;

                // Increase difficulty
                difficulty += 0.02;
                spawnInterval = Math.max(600, 1500 - difficulty * 100);
            }

            // Update and draw targets
            for (let i = targets.length - 1; i >= 0; i--) {
                if (!targets[i].update()) {
                    targets.splice(i, 1);
                    combo = 0;
                    document.getElementById('combo').classList.remove('show');
                } else {
                    targets[i].draw();
                }
            }

            // Check for game over
            if (targets.length > 8) {
                gameOver();
                return;
            }

            requestAnimationFrame(gameLoop);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            handleClick(x, y);
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            handleClick(x, y);
        });

        window.addEventListener('resize', resize);
        resize();
        gameLoop();
    </script>
</body>
</html>
