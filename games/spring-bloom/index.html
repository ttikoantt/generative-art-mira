<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spring Bloom - 春の花</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(180deg, 
                #87CEEB 0%, 
                #98D8C8 50%, 
                #F7DC6F 100%);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }
        
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .score-board {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 30px;
            border-radius: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            z-index: 100;
        }
        
        .score-board h2 {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .score-board .score {
            font-size: 32px;
            font-weight: bold;
            color: #FF6B9D;
        }
        
        .flower-container {
            position: relative;
            width: 300px;
            height: 400px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        
        .stem {
            position: absolute;
            bottom: 0;
            width: 8px;
            height: 0;
            background: linear-gradient(180deg, #4CAF50, #2E7D32);
            border-radius: 4px;
            transition: height 0.5s ease-out;
        }
        
        .flower {
            position: absolute;
            bottom: 0;
            transform: scale(0);
            transition: all 0.5s ease-out;
        }
        
        .petal {
            position: absolute;
            width: 40px;
            height: 60px;
            background: radial-gradient(circle, #FFB6C1, #FF69B4);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: 0 2px 10px rgba(255, 105, 180, 0.3);
        }
        
        .petal:nth-child(1) { transform: rotate(0deg) translateY(-50px); }
        .petal:nth-child(2) { transform: rotate(72deg) translateY(-50px); }
        .petal:nth-child(3) { transform: rotate(144deg) translateY(-50px); }
        .petal:nth-child(4) { transform: rotate(216deg) translateY(-50px); }
        .petal:nth-child(5) { transform: rotate(288deg) translateY(-50px); }
        
        .center {
            position: absolute;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, #FFD700, #FFA500);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 2px 10px rgba(255, 215, 0, 0.5);
        }
        
        .leaf {
            position: absolute;
            width: 30px;
            height: 50px;
            background: linear-gradient(45deg, #66BB6A, #43A047);
            border-radius: 0 50% 50% 50%;
            transform-origin: bottom center;
        }
        
        .leaf.left {
            left: -20px;
            transform: rotate(-30deg);
        }
        
        .leaf.right {
            right: -20px;
            transform: rotate(30deg) scaleX(-1);
        }
        
        .water-btn {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #64B5F6, #2196F3);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(33, 150, 243, 0.4);
            transition: all 0.3s;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .water-btn:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 8px 25px rgba(33, 150, 243, 0.5);
        }
        
        .water-btn:active {
            transform: translateX(-50%) scale(0.95);
        }
        
        .water-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .water-drops {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
        }
        
        .water-drop {
            position: absolute;
            width: 10px;
            height: 15px;
            background: radial-gradient(circle, rgba(100, 181, 246, 0.8), rgba(33, 150, 243, 0.6));
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: fall 1s ease-in forwards;
        }
        
        @keyframes fall {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(300px) scale(0.5);
            }
        }
        
        .bloom-effect {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.8), transparent);
            animation: bloom 0.5s ease-out forwards;
            pointer-events: none;
        }
        
        @keyframes bloom {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(3);
                opacity: 0;
            }
        }
        
        .level-up {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #FF6B9D;
            text-shadow: 0 4px 20px rgba(255, 107, 157, 0.5);
            animation: levelUp 1s ease-out forwards;
            pointer-events: none;
            z-index: 1000;
        }
        
        @keyframes levelUp {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }
        
        .progress-bar {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 10px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 5px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FF6B9D, #FFB6C1);
            border-radius: 5px;
            transition: width 0.3s;
        }
        
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            font-size: 24px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 100;
        }
        
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(1.1);
        }
        
        .sun {
            position: fixed;
            top: 60px;
            right: 80px;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #FFD700, #FFA500);
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.6);
            animation: pulse 3s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .cloud {
            position: fixed;
            background: white;
            border-radius: 50px;
            opacity: 0.9;
        }
        
        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        
        .cloud1 {
            width: 100px;
            height: 40px;
            top: 80px;
            left: 10%;
            animation: float 20s linear infinite;
        }
        
        .cloud1::before {
            width: 50px;
            height: 50px;
            top: -25px;
            left: 15px;
        }
        
        .cloud1::after {
            width: 40px;
            height: 40px;
            top: -20px;
            left: 50px;
        }
        
        .cloud2 {
            width: 80px;
            height: 30px;
            top: 120px;
            left: 60%;
            animation: float 25s linear infinite reverse;
        }
        
        .cloud2::before {
            width: 40px;
            height: 40px;
            top: -20px;
            left: 10px;
        }
        
        .cloud2::after {
            width: 30px;
            height: 30px;
            top: -15px;
            left: 40px;
        }
        
        @keyframes float {
            0% { transform: translateX(-100px); }
            100% { transform: translateX(calc(100vw + 100px)); }
        }
        
        .message {
            position: fixed;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%);
            color: #666;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="sun"></div>
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    
    <div class="score-board">
        <h2>🌸 Bloom Score</h2>
        <div class="score" id="score">0</div>
    </div>
    
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
    
    <div class="game-container">
        <div class="flower-container">
            <div class="stem" id="stem"></div>
            <div class="leaf left" id="leafLeft"></div>
            <div class="leaf right" id="leafRight"></div>
            <div class="flower" id="flower">
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="center"></div>
            </div>
        </div>
    </div>
    
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    
    <div class="message">💧 Tap to water the flower</div>
    
    <button class="water-btn" id="waterBtn">💧 Water</button>
    
    <div class="water-drops" id="waterDrops"></div>
    
    <script>
        let score = 0;
        let waterCount = 0;
        let growth = 0;
        const maxGrowth = 100;
        const clicksPerLevel = 5;
        
        const scoreEl = document.getElementById('score');
        const waterBtn = document.getElementById('waterBtn');
        const stem = document.getElementById('stem');
        const flower = document.getElementById('flower');
        const leafLeft = document.getElementById('leafLeft');
        const leafRight = document.getElementById('leafRight');
        const progressFill = document.getElementById('progressFill');
        const waterDrops = document.getElementById('waterDrops');
        const message = document.querySelector('.message');
        
        // 花の色のバリエーション
        const flowerColors = [
            ['#FFB6C1', '#FF69B4'], // ピンク
            ['#DDA0DD', '#BA55D3'], // 紫
            ['#FFD700', '#FFA500'], // 黄色
            ['#FF6B6B', '#FF4444'], // 赤
            ['#87CEEB', '#4FC3F7'], // 青
            ['#98D8C8', '#4DB6AC'], // ミント
        ];
        
        let currentColorIndex = 0;
        
        function updateGrowth() {
            // 茎の成長
            const stemHeight = Math.min(growth * 2.5, 250);
            stem.style.height = stemHeight + 'px';
            
            // 花の位置
            flower.style.bottom = stemHeight + 'px';
            
            // 花のサイズ
            const flowerScale = Math.max(0, (growth - 30) / 70);
            flower.style.transform = `scale(${flowerScale})`;
            
            // 葉の成長
            if (growth >= 20) {
                const leafScale = Math.min(1, (growth - 20) / 30);
                leafLeft.style.transform = `rotate(-30deg) scale(${leafScale})`;
                leafRight.style.transform = `rotate(30deg) scaleX(-1) scale(${leafScale})`;
            }
            
            // プログレスバー
            progressFill.style.width = (growth % clicksPerLevel / clicksPerLevel * 100) + '%';
        }
        
        function createWaterDrops() {
            const rect = waterBtn.getBoundingClientRect();
            
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    const drop = document.createElement('div');
                    drop.className = 'water-drop';
                    drop.style.left = (rect.left + Math.random() * rect.width) + 'px';
                    drop.style.top = rect.top + 'px';
                    waterDrops.appendChild(drop);
                    
                    setTimeout(() => drop.remove(), 1000);
                }, i * 50);
            }
        }
        
        function createBloomEffect() {
            const container = document.querySelector('.flower-container');
            const rect = container.getBoundingClientRect();
            
            const effect = document.createElement('div');
            effect.className = 'bloom-effect';
            effect.style.left = (rect.left + rect.width / 2 - 50) + 'px';
            effect.style.top = (rect.top + rect.height - 50) + 'px';
            document.body.appendChild(effect);
            
            setTimeout(() => effect.remove(), 500);
        }
        
        function showLevelUp() {
            const levelUp = document.createElement('div');
            levelUp.className = 'level-up';
            levelUp.textContent = '🌸 Bloom! 🌸';
            document.body.appendChild(levelUp);
            
            setTimeout(() => levelUp.remove(), 1000);
        }
        
        function changeFlowerColor() {
            currentColorIndex = (currentColorIndex + 1) % flowerColors.length;
            const colors = flowerColors[currentColorIndex];
            
            const petals = document.querySelectorAll('.petal');
            petals.forEach(petal => {
                petal.style.background = `radial-gradient(circle, ${colors[0]}, ${colors[1]})`;
            });
        }
        
        function water() {
            if (growth >= maxGrowth) {
                // リセットして次のレベルへ
                growth = 0;
                changeFlowerColor();
                message.textContent = '💧 Keep watering!';
            }
            
            waterCount++;
            growth = Math.min(growth + maxGrowth / clicksPerLevel, maxGrowth);
            score += 10;
            
            scoreEl.textContent = score;
            updateGrowth();
            createWaterDrops();
            
            if (waterCount % clicksPerLevel === 0) {
                createBloomEffect();
                showLevelUp();
                score += 50; // ボーナス
                scoreEl.textContent = score;
                
                if (growth >= maxGrowth) {
                    message.textContent = '🎉 Perfect! Tap for next flower!';
                }
            }
            
            // ボタンの一時的な無効化
            waterBtn.disabled = true;
            setTimeout(() => waterBtn.disabled = false, 200);
        }
        
        waterBtn.addEventListener('click', water);
        
        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        // 初期化
        updateGrowth();
    </script>
</body>
</html>
