<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gravity Maze</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }
        
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            overflow: hidden;
        }
        
        canvas {
            display: block;
            margin: 0 auto;
        }
        
        .ui {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            z-index: 100;
        }
        
        .score {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        
        .level {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 5px;
        }
        
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 15px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 5px;
            z-index: 100;
        }
        
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            z-index: 200;
            display: none;
        }
        
        .game-over h2 {
            font-size: 32px;
            margin-bottom: 20px;
        }
        
        .game-over p {
            font-size: 18px;
            margin-bottom: 20px;
        }
        
        .game-over button {
            background: #e94560;
            border: none;
            color: white;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .game-over button:hover {
            background: #ff6b6b;
        }
        
        .instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="ui">
        <div class="score">Score: <span id="score">0</span></div>
        <div class="level">Level: <span id="level">1</span></div>
    </div>
    
    <button class="fullscreen-btn" onclick="toggleFullscreen()">Fullscreen</button>
    
    <div class="game-over" id="gameOver">
        <h2>Game Over!</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button onclick="restartGame()">Play Again</button>
    </div>
    
    <div class="instructions">Tilt device or drag to control ball</div>
    
    <canvas id="canvas"></canvas>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let score = 0;
        let level = 1;
        let gameOver = false;
        
        // Ball
        let ball = {
            x: 0,
            y: 0,
            radius: 15,
            vx: 0,
            vy: 0,
            speed: 0.5
        };
        
        // Goal
        let goal = {
            x: 0,
            y: 0,
            radius: 20,
            pulse: 0
        };
        
        // Obstacles
        let obstacles = [];
        
        // Controls
        let gravity = { x: 0, y: 0 };
        let touchStart = null;
        
        function resize() {
            width = canvas.width = Math.min(window.innerWidth, 600);
            height = canvas.height = window.innerHeight;
            
            if (!gameOver) {
                resetLevel();
            }
        }
        
        function generateLevel() {
            obstacles = [];
            
            const numObstacles = 3 + level * 2;
            
            for (let i = 0; i < numObstacles; i++) {
                let obstacle;
                let attempts = 0;
                
                do {
                    obstacle = {
                        x: Math.random() * (width - 100) + 50,
                        y: Math.random() * (height - 200) + 100,
                        width: 30 + Math.random() * 40,
                        height: 30 + Math.random() * 40,
                        vx: (Math.random() - 0.5) * (1 + level * 0.2),
                        vy: (Math.random() - 0.5) * (1 + level * 0.2),
                        rotation: Math.random() * Math.PI * 2,
                        rotationSpeed: (Math.random() - 0.5) * 0.05
                    };
                    attempts++;
                } while (attempts < 50 && (
                    distance(obstacle.x, obstacle.y, ball.x, ball.y) < 100 ||
                    distance(obstacle.x, obstacle.y, goal.x, goal.y) < 100
                ));
                
                if (attempts < 50) {
                    obstacles.push(obstacle);
                }
            }
        }
        
        function distance(x1, y1, x2, y2) {
            return Math.sqrt((x2-x1)**2 + (y2-y1)**2);
        }
        
        function resetLevel() {
            ball.x = width / 2;
            ball.y = height - 100;
            ball.vx = 0;
            ball.vy = 0;
            
            goal.x = width / 2;
            goal.y = 80;
            
            generateLevel();
        }
        
        function setup() {
            resize();
            resetLevel();
            animate();
        }
        
        function update() {
            if (gameOver) return;
            
            // Apply gravity to ball
            ball.vx += gravity.x * ball.speed;
            ball.vy += gravity.y * ball.speed;
            
            // Friction
            ball.vx *= 0.98;
            ball.vy *= 0.98;
            
            // Update position
            ball.x += ball.vx;
            ball.y += ball.vy;
            
            // Wall collision
            if (ball.x - ball.radius < 0) {
                ball.x = ball.radius;
                ball.vx *= -0.8;
            }
            if (ball.x + ball.radius > width) {
                ball.x = width - ball.radius;
                ball.vx *= -0.8;
            }
            if (ball.y - ball.radius < 0) {
                ball.y = ball.radius;
                ball.vy *= -0.8;
            }
            if (ball.y + ball.radius > height) {
                ball.y = height - ball.radius;
                ball.vy *= -0.8;
            }
            
            // Update obstacles
            for (let obs of obstacles) {
                obs.x += obs.vx;
                obs.y += obs.vy;
                obs.rotation += obs.rotationSpeed;
                
                // Bounce off walls
                if (obs.x - obs.width/2 < 0 || obs.x + obs.width/2 > width) {
                    obs.vx *= -1;
                }
                if (obs.y - obs.height/2 < 0 || obs.y + obs.height/2 > height) {
                    obs.vy *= -1;
                }
                
                // Check collision with ball
                if (checkCollision(ball, obs)) {
                    endGame();
                    return;
                }
            }
            
            // Goal pulse
            goal.pulse += 0.1;
            
            // Check if reached goal
            if (distance(ball.x, ball.y, goal.x, goal.y) < ball.radius + goal.radius) {
                score += level * 100;
                level++;
                document.getElementById('score').textContent = score;
                document.getElementById('level').textContent = level;
                resetLevel();
            }
        }
        
        function checkCollision(ball, obs) {
            // Simple box-circle collision
            const closestX = Math.max(obs.x - obs.width/2, Math.min(ball.x, obs.x + obs.width/2));
            const closestY = Math.max(obs.y - obs.height/2, Math.min(ball.y, obs.y + obs.height/2));
            
            const dx = ball.x - closestX;
            const dy = ball.y - closestY;
            
            return (dx * dx + dy * dy) < (ball.radius * ball.radius);
        }
        
        function draw() {
            // Clear
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, width, height);
            
            // Draw goal
            const pulseSize = Math.sin(goal.pulse) * 5;
            ctx.beginPath();
            ctx.arc(goal.x, goal.y, goal.radius + pulseSize, 0, Math.PI * 2);
            ctx.fillStyle = '#00ff88';
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(goal.x, goal.y, goal.radius * 0.6, 0, Math.PI * 2);
            ctx.fillStyle = '#00cc66';
            ctx.fill();
            
            // Draw obstacles
            for (let obs of obstacles) {
                ctx.save();
                ctx.translate(obs.x, obs.y);
                ctx.rotate(obs.rotation);
                
                ctx.fillStyle = '#e94560';
                ctx.fillRect(-obs.width/2, -obs.height/2, obs.width, obs.height);
                
                ctx.strokeStyle = '#ff6b6b';
                ctx.lineWidth = 2;
                ctx.strokeRect(-obs.width/2, -obs.height/2, obs.width, obs.height);
                
                ctx.restore();
            }
            
            // Draw ball
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            const gradient = ctx.createRadialGradient(
                ball.x - ball.radius/3, ball.y - ball.radius/3, 0,
                ball.x, ball.y, ball.radius
            );
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(1, '#764ba2');
            ctx.fillStyle = gradient;
            ctx.fill();
            
            ctx.strokeStyle = '#a78bfa';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        
        function animate() {
            update();
            draw();
            requestAnimationFrame(animate);
        }
        
        function endGame() {
            gameOver = true;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function restartGame() {
            score = 0;
            level = 1;
            gameOver = false;
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('gameOver').style.display = 'none';
            resetLevel();
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        // Device orientation for mobile
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (e) => {
                gravity.x = (e.gamma || 0) / 45;
                gravity.y = (e.beta || 0) / 45;
            });
        }
        
        // Mouse/touch for desktop
        canvas.addEventListener('mousedown', (e) => {
            touchStart = { x: e.clientX, y: e.clientY };
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (touchStart) {
                gravity.x = (e.clientX - touchStart.x) / 100;
                gravity.y = (e.clientY - touchStart.y) / 100;
            }
        });
        
        canvas.addEventListener('mouseup', () => {
            touchStart = null;
            gravity.x = 0;
            gravity.y = 0;
        });
        
        canvas.addEventListener('touchstart', (e) => {
            touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        });
        
        canvas.addEventListener('touchmove', (e) => {
            if (touchStart) {
                gravity.x = (e.touches[0].clientX - touchStart.x) / 50;
                gravity.y = (e.touches[0].clientY - touchStart.y) / 50;
            }
        });
        
        canvas.addEventListener('touchend', () => {
            touchStart = null;
            gravity.x = 0;
            gravity.y = 0;
        });
        
        window.addEventListener('resize', resize);
        
        setup();
    </script>
</body>
</html>
