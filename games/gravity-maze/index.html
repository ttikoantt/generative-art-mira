<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gravity Maze - 重力迷路</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            color: white;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            text-align: center;
        }

        .game-info {
            color: rgba(255, 255, 255, 0.9);
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            margin-bottom: 20px;
            text-align: center;
        }

        .canvas-container {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        canvas {
            display: block;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 15px 30px;
            border-radius: 50px;
            font-size: clamp(1rem, 3vw, 1.2rem);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1000;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .level-indicator {
            color: rgba(255, 255, 255, 0.9);
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            margin-top: 15px;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: clamp(0.7rem, 2vw, 0.9rem);
        }

        .win-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .win-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .win-overlay p {
            margin-bottom: 20px;
        }

        /* 全画面時 */
        .fullscreen .canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border-radius: 0;
        }

        .fullscreen canvas {
            width: 100%;
            height: 100%;
        }

        .fullscreen .controls,
        .fullscreen .level-indicator,
        .fullscreen h1,
        .fullscreen .game-info {
            display: none;
        }
    </style>
</head>
<body>
    <div class="fullscreen-btn" onclick="toggleFullscreen()">⛶</div>

    <div class="container">
        <h1>Gravity Maze</h1>
        <p class="game-info">スワイプ/矢印キーで重力方向を変えてゴールへ</p>
        <div class="canvas-container">
            <canvas id="canvas"></canvas>
            <div class="win-overlay" id="winOverlay">
                <p>🎉 Clear! 🎉</p>
                <button class="btn" onclick="nextLevel()">Next Level</button>
            </div>
        </div>
        <div class="controls">
            <button class="btn" onclick="setGravity(0, -1)">↑</button>
            <button class="btn" onclick="setGravity(1, 0)">→</button>
            <button class="btn" onclick="setGravity(0, 1)">↓</button>
            <button class="btn" onclick="setGravity(-1, 0)">←</button>
            <button class="btn" onclick="resetLevel()">Reset</button>
        </div>
        <p class="level-indicator">Level: <span id="levelNum">1</span></p>
    </div>

    <div class="info">スワイプ/矢印キー/ボタンで重力方向を変更</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const winOverlay = document.getElementById('winOverlay');

        // キャンバスサイズ設定
        const GRID_SIZE = 40;
        const GRID_WIDTH = 12;
        const GRID_HEIGHT = 10;

        function resizeCanvas() {
            const container = canvas.parentElement;
            const maxWidth = Math.min(window.innerWidth - 40, 600);
            const size = Math.min(maxWidth, window.innerHeight - 300);

            canvas.width = GRID_WIDTH * GRID_SIZE;
            canvas.height = GRID_HEIGHT * GRID_SIZE;

            const scale = size / Math.max(canvas.width, canvas.height);
            canvas.style.width = canvas.width * scale + 'px';
            canvas.style.height = canvas.height * scale + 'px';
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ゲーム状態
        let currentLevel = 0;
        let ball = { x: 1, y: 1 };
        let gravity = { x: 1, y: 0 };
        let isMoving = false;
        let hasWon = false;

        // レベルデータ
        const levels = [
            {
                start: { x: 1, y: 1 },
                goal: { x: 10, y: 8 },
                walls: [
                    { x: 3, y: 0, w: 1, h: 5 },
                    { x: 6, y: 3, w: 1, h: 7 },
                    { x: 8, y: 0, w: 1, h: 6 },
                ]
            },
            {
                start: { x: 1, y: 1 },
                goal: { x: 10, y: 8 },
                walls: [
                    { x: 2, y: 2, w: 6, h: 1 },
                    { x: 6, y: 4, w: 1, h: 4 },
                    { x: 8, y: 1, w: 1, h: 5 },
                    { x: 4, y: 6, w: 5, h: 1 },
                ]
            },
            {
                start: { x: 1, y: 5 },
                goal: { x: 10, y: 4 },
                walls: [
                    { x: 3, y: 0, w: 1, h: 6 },
                    { x: 6, y: 4, w: 1, h: 6 },
                    { x: 8, y: 0, w: 1, h: 5 },
                    { x: 4, y: 2, w: 3, h: 1 },
                    { x: 5, y: 6, w: 4, h: 1 },
                ]
            },
            {
                start: { x: 1, y: 1 },
                goal: { x: 10, y: 8 },
                walls: [
                    { x: 2, y: 1, w: 1, h: 4 },
                    { x: 4, y: 3, w: 1, h: 5 },
                    { x: 6, y: 1, w: 1, h: 4 },
                    { x: 8, y: 3, w: 1, h: 5 },
                    { x: 3, y: 5, w: 3, h: 1 },
                ]
            },
            {
                start: { x: 1, y: 8 },
                goal: { x: 10, y: 1 },
                walls: [
                    { x: 3, y: 2, w: 6, h: 1 },
                    { x: 3, y: 6, w: 6, h: 1 },
                    { x: 5, y: 3, w: 1, h: 3 },
                    { x: 7, y: 3, w: 1, h: 3 },
                ]
            }
        ];

        // レベル読み込み
        function loadLevel(levelIndex) {
            const level = levels[levelIndex];
            ball = { ...level.start };
            gravity = { x: 1, y: 0 };
            isMoving = false;
            hasWon = false;
            winOverlay.classList.remove('show');
            document.getElementById('levelNum').textContent = levelIndex + 1;
        }

        // 重力設定
        function setGravity(x, y) {
            if (!isMoving && !hasWon) {
                gravity = { x, y };
                isMoving = true;
                moveBall();
            }
        }

        // ボール移動
        function moveBall() {
            let moved = true;
            const moveInterval = setInterval(() => {
                if (hasWon) {
                    clearInterval(moveInterval);
                    return;
                }

                const newX = ball.x + gravity.x;
                const newY = ball.y + gravity.y;

                // 壁判定
                if (checkCollision(newX, newY)) {
                    isMoving = false;
                    clearInterval(moveInterval);
                    return;
                }

                // 境界判定
                if (newX < 0 || newX >= GRID_WIDTH || newY < 0 || newY >= GRID_HEIGHT) {
                    isMoving = false;
                    clearInterval(moveInterval);
                    return;
                }

                ball.x = newX;
                ball.y = newY;

                // ゴール判定
                const level = levels[currentLevel];
                if (ball.x === level.goal.x && ball.y === level.goal.y) {
                    hasWon = true;
                    isMoving = false;
                    clearInterval(moveInterval);
                    winOverlay.classList.add('show');
                }
            }, 100);
        }

        // 壁衝突判定
        function checkCollision(x, y) {
            const level = levels[currentLevel];
            for (let wall of level.walls) {
                if (x >= wall.x && x < wall.x + wall.w &&
                    y >= wall.y && y < wall.y + wall.h) {
                    return true;
                }
            }
            return false;
        }

        // リセット
        function resetLevel() {
            loadLevel(currentLevel);
        }

        // 次のレベル
        function nextLevel() {
            currentLevel = (currentLevel + 1) % levels.length;
            loadLevel(currentLevel);
        }

        // 描画
        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const level = levels[currentLevel];

            // 壁描画
            for (let wall of level.walls) {
                ctx.fillStyle = '#4a5568';
                ctx.fillRect(wall.x * GRID_SIZE, wall.y * GRID_SIZE,
                             wall.w * GRID_SIZE, wall.h * GRID_SIZE);
                ctx.strokeStyle = '#718096';
                ctx.lineWidth = 2;
                ctx.strokeRect(wall.x * GRID_SIZE, wall.y * GRID_SIZE,
                              wall.w * GRID_SIZE, wall.h * GRID_SIZE);
            }

            // ゴール描画
            ctx.fillStyle = '#48bb78';
            ctx.beginPath();
            ctx.arc(level.goal.x * GRID_SIZE + GRID_SIZE / 2,
                   level.goal.y * GRID_SIZE + GRID_SIZE / 2,
                   GRID_SIZE / 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#68d391';
            ctx.lineWidth = 3;
            ctx.stroke();

            // ボール描画
            const ballGradient = ctx.createRadialGradient(
                ball.x * GRID_SIZE + GRID_SIZE / 2,
                ball.y * GRID_SIZE + GRID_SIZE / 2,
                0,
                ball.x * GRID_SIZE + GRID_SIZE / 2,
                ball.y * GRID_SIZE + GRID_SIZE / 2,
                GRID_SIZE / 2
            );
            ballGradient.addColorStop(0, '#ffd700');
            ballGradient.addColorStop(1, '#ff8c00');

            ctx.fillStyle = ballGradient;
            ctx.beginPath();
            ctx.arc(ball.x * GRID_SIZE + GRID_SIZE / 2,
                   ball.y * GRID_SIZE + GRID_SIZE / 2,
                   GRID_SIZE / 3, 0, Math.PI * 2);
            ctx.fill();

            // 重力方向インジケーター
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(30, 30, 20, 0, Math.PI * 2);
            ctx.stroke();

            const arrowX = 30 + gravity.x * 12;
            const arrowY = 30 + gravity.y * 12;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.beginPath();
            ctx.moveTo(30, 30);
            ctx.lineTo(arrowX, arrowY);
            ctx.stroke();

            requestAnimationFrame(draw);
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':
                    setGravity(0, -1);
                    break;
                case 'ArrowDown':
                    setGravity(0, 1);
                    break;
                case 'ArrowLeft':
                    setGravity(-1, 0);
                    break;
                case 'ArrowRight':
                    setGravity(1, 0);
                    break;
                case 'r':
                case 'R':
                    resetLevel();
                    break;
            }
        });

        // スワイプ操作
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;

            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                if (deltaX > 50) setGravity(1, 0);
                else if (deltaX < -50) setGravity(-1, 0);
            } else {
                if (deltaY > 50) setGravity(0, 1);
                else if (deltaY < -50) setGravity(0, -1);
            }
        });

        // 全画面切り替え
        function toggleFullscreen() {
            document.body.classList.toggle('fullscreen');
            const btn = document.querySelector('.fullscreen-btn');
            btn.textContent = document.body.classList.contains('fullscreen') ? '✕' : '⛶';
        }

        // 初期化
        loadLevel(0);
        draw();
    </script>
</body>
</html>
