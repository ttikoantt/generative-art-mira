<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Whack-a-Mole Classic - もぐらたたき</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        
        #game-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }
        
        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 10px;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        #stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            color: #fff;
        }
        
        .stat {
            text-align: center;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }
        
        #mole-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .hole {
            aspect-ratio: 1;
            background: radial-gradient(ellipse at center, #2d2d44 0%, #1a1a2e 100%);
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.5),
                        0 2px 5px rgba(255, 255, 255, 0.1);
            transition: transform 0.1s;
        }
        
        .hole:active {
            transform: scale(0.95);
        }
        
        .mole {
            position: absolute;
            bottom: -100%;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 80%;
            background: linear-gradient(135deg, #8b4513 0%, #654321 100%);
            border-radius: 50% 50% 40% 40%;
            transition: bottom 0.15s ease-out;
            box-shadow: inset 0 -10px 20px rgba(0, 0, 0, 0.3),
                        0 5px 10px rgba(0, 0, 0, 0.3);
        }
        
        .mole::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 30%;
            background: #d2691e;
            border-radius: 50%;
        }
        
        .mole::after {
            content: '👀';
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
        }
        
        .mole.active {
            bottom: 10%;
        }
        
        .mole.hit {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            animation: hit 0.3s ease-out;
        }
        
        .mole.hit::after {
            content: '😵';
        }
        
        @keyframes hit {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.3); }
            100% { transform: translateX(-50%) scale(1); }
        }
        
        #timer-bar {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        #timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            border-radius: 5px;
            transition: width 0.1s linear;
        }
        
        #timer-fill.warning {
            background: linear-gradient(90deg, #ff9800, #ffc107);
        }
        
        #timer-fill.danger {
            background: linear-gradient(90deg, #f44336, #ff5722);
        }
        
        #controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        button {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        #start-btn {
            background: linear-gradient(135deg, #4CAF50, #8BC34A);
            color: white;
        }
        
        #start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }
        
        #fullscreen-btn {
            background: linear-gradient(135deg, #2196F3, #03A9F4);
            color: white;
        }
        
        #fullscreen-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(33, 150, 243, 0.4);
        }
        
        #game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        #game-over.show {
            display: flex;
        }
        
        #game-over-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        
        #game-over h2 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #ffd700;
        }
        
        #final-score {
            font-size: 48px;
            font-weight: bold;
            color: #4CAF50;
            margin-bottom: 20px;
        }
        
        #final-stats {
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        #play-again {
            padding: 15px 40px;
            font-size: 18px;
            background: linear-gradient(135deg, #4CAF50, #8BC34A);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        #play-again:hover {
            transform: scale(1.05);
        }
        
        #combo-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        #combo-display.show {
            opacity: 1;
            animation: comboPopup 0.5s ease-out;
        }
        
        @keyframes comboPopup {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>🔨 Whack-a-Mole</h1>
        
        <div id="stats">
            <div class="stat">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">COMBO</div>
                <div class="stat-value" id="combo">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">TIME</div>
                <div class="stat-value" id="time">30</div>
            </div>
        </div>
        
        <div id="timer-bar">
            <div id="timer-fill"></div>
        </div>
        
        <div id="mole-grid">
            <div class="hole" data-index="0"><div class="mole"></div></div>
            <div class="hole" data-index="1"><div class="mole"></div></div>
            <div class="hole" data-index="2"><div class="mole"></div></div>
            <div class="hole" data-index="3"><div class="mole"></div></div>
            <div class="hole" data-index="4"><div class="mole"></div></div>
            <div class="hole" data-index="5"><div class="mole"></div></div>
            <div class="hole" data-index="6"><div class="mole"></div></div>
            <div class="hole" data-index="7"><div class="mole"></div></div>
            <div class="hole" data-index="8"><div class="mole"></div></div>
        </div>
        
        <div id="controls">
            <button id="start-btn">START</button>
            <button id="fullscreen-btn">全画面</button>
        </div>
    </div>
    
    <div id="combo-display"></div>
    
    <div id="game-over">
        <div id="game-over-content">
            <h2>🎉 Game Over!</h2>
            <div id="final-score">0</div>
            <div id="final-stats"></div>
            <button id="play-again">もう一度遊ぶ</button>
        </div>
    </div>
    
    <script>
        // ゲーム状態
        let score = 0;
        let combo = 0;
        let timeLeft = 30;
        let gameRunning = false;
        let gameTimer = null;
        let moleTimer = null;
        let activeMoles = new Set();
        
        // DOM要素
        const holes = document.querySelectorAll('.hole');
        const moles = document.querySelectorAll('.mole');
        const scoreDisplay = document.getElementById('score');
        const comboDisplay = document.getElementById('combo');
        const timeDisplay = document.getElementById('time');
        const timerFill = document.getElementById('timer-fill');
        const startBtn = document.getElementById('start-btn');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreDisplay = document.getElementById('final-score');
        const finalStatsDisplay = document.getElementById('final-stats');
        const playAgainBtn = document.getElementById('play-again');
        const comboPopup = document.getElementById('combo-display');
        
        // 効果音（Web Audio API）
        let audioCtx = null;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function playSound(type) {
            if (!audioCtx) return;
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'hit') {
                oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'combo') {
                oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.15);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.15);
            }
        }
        
        // もぐらを表示
        function showMole() {
            if (!gameRunning) return;
            
            // ランダムな穴を選択
            const availableHoles = Array.from({ length: 9 }, (_, i) => i)
                .filter(i => !activeMoles.has(i));
            
            if (availableHoles.length === 0) return;
            
            const holeIndex = availableHoles[Math.floor(Math.random() * availableHoles.length)];
            const mole = moles[holeIndex];
            
            activeMoles.add(holeIndex);
            mole.classList.add('active');
            
            // もぐらを隠すタイマー
            const hideTime = 1000 + Math.random() * 1000;
            setTimeout(() => {
                if (mole.classList.contains('active')) {
                    mole.classList.remove('active');
                    activeMoles.delete(holeIndex);
                    combo = 0;
                    updateDisplay();
                }
            }, hideTime);
            
            // 次のもぐらを表示
            const nextMoleTime = 500 + Math.random() * 700;
            moleTimer = setTimeout(showMole, nextMoleTime);
        }
        
        // もぐらを叩く
        function whackMole(index) {
            if (!gameRunning) return;
            
            const mole = moles[index];
            
            if (!mole.classList.contains('active') || mole.classList.contains('hit')) {
                // ミスでコンボリセット
                combo = 0;
                updateDisplay();
                return;
            }
            
            // ヒット処理
            mole.classList.add('hit');
            mole.classList.remove('active');
            
            // コンボ計算
            combo++;
            const points = 10 + combo * 5;
            score += points;
            
            // 効果音
            initAudio();
            playSound(combo > 1 ? 'combo' : 'hit');
            
            // コンボ表示
            if (combo > 1) {
                showComboPopup(combo);
            }
            
            // バイブレーション
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
            
            activeMoles.delete(index);
            updateDisplay();
            
            // ヒットアニメーション後にリセット
            setTimeout(() => {
                mole.classList.remove('hit');
            }, 300);
        }
        
        // コンボポップアップ
        function showComboPopup(comboCount) {
            comboPopup.textContent = `${comboCount} COMBO!`;
            comboPopup.classList.add('show');
            
            setTimeout(() => {
                comboPopup.classList.remove('show');
            }, 500);
        }
        
        // 表示更新
        function updateDisplay() {
            scoreDisplay.textContent = score;
            comboDisplay.textContent = combo;
            timeDisplay.textContent = timeLeft;
            
            // タイマーバー
            const percentage = (timeLeft / 30) * 100;
            timerFill.style.width = percentage + '%';
            
            timerFill.classList.remove('warning', 'danger');
            if (percentage < 30) {
                timerFill.classList.add('danger');
            } else if (percentage < 60) {
                timerFill.classList.add('warning');
            }
        }
        
        // ゲーム開始
        function startGame() {
            score = 0;
            combo = 0;
            timeLeft = 30;
            gameRunning = true;
            activeMoles.clear();
            
            // 全てのもぐらをリセット
            moles.forEach(mole => {
                mole.classList.remove('active', 'hit');
            });
            
            updateDisplay();
            
            startBtn.disabled = true;
            startBtn.textContent = 'PLAYING...';
            
            // タイマー開始
            gameTimer = setInterval(() => {
                timeLeft--;
                updateDisplay();
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
            
            // もぐらを開始
            showMole();
        }
        
        // ゲーム終了
        function endGame() {
            gameRunning = false;
            
            clearInterval(gameTimer);
            clearTimeout(moleTimer);
            
            // 全てのもぐらを隠す
            moles.forEach(mole => {
                mole.classList.remove('active', 'hit');
            });
            activeMoles.clear();
            
            startBtn.disabled = false;
            startBtn.textContent = 'START';
            
            // 結果表示
            finalScoreDisplay.textContent = score;
            finalStatsDisplay.textContent = `最大コンボ: ${combo}回`;
            gameOverScreen.classList.add('show');
        }
        
        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        // イベントリスナー
        holes.forEach((hole, index) => {
            hole.addEventListener('click', () => whackMole(index));
            hole.addEventListener('touchstart', (e) => {
                e.preventDefault();
                whackMole(index);
            });
        });
        
        startBtn.addEventListener('click', startGame);
        fullscreenBtn.addEventListener('click', toggleFullscreen);
        playAgainBtn.addEventListener('click', () => {
            gameOverScreen.classList.remove('show');
            startGame();
        });
        
        // 初期化
        updateDisplay();
    </script>
</body>
</html>
