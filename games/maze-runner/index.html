<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Runner - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        .game-header {
            margin-bottom: 20px;
        }

        h1 {
            color: #00ff88;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 15px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 8px;
            color: #fff;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #00ff88;
        }

        canvas {
            background: #0a0a0a;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            display: block;
            margin: 0 auto;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #000;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.4);
        }

        .instructions {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 136, 0.2);
            border: 2px solid #00ff88;
            color: #00ff88;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 136, 0.4);
        }

        .mobile-controls {
            display: none;
            margin-top: 20px;
        }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
        }

        .d-btn {
            background: rgba(0, 255, 136, 0.2);
            border: 2px solid #00ff88;
            color: #00ff88;
            font-size: 24px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .d-btn:active {
            background: rgba(0, 255, 136, 0.5);
        }

        .d-btn.empty {
            background: transparent;
            border: none;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 22px;
            }

            .stats {
                gap: 15px;
            }

            .stat {
                padding: 8px 15px;
            }

            .stat-value {
                font-size: 20px;
            }

            .mobile-controls {
                display: block;
            }

            .controls button {
                padding: 10px 20px;
                font-size: 14px;
            }
        }

        .win-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .win-overlay.show {
            display: flex;
        }

        .win-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            border: 2px solid #00ff88;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.3);
        }

        .win-content h2 {
            color: #00ff88;
            font-size: 36px;
            margin-bottom: 20px;
        }

        .win-content p {
            color: #fff;
            font-size: 18px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <div class="game-header">
            <h1>🏃 Maze Runner</h1>

            <div class="stats">
                <div class="stat">
                    <div class="stat-label">Level</div>
                    <div class="stat-value" id="level">1</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Steps</div>
                    <div class="stat-value" id="steps">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Time</div>
                    <div class="stat-value" id="time">0:00</div>
                </div>
            </div>
        </div>

        <canvas id="canvas"></canvas>

        <div class="controls">
            <button onclick="newGame()">🔄 New Game</button>
            <button onclick="generateMaze()">⬆️ Next Level</button>
        </div>

        <div class="mobile-controls">
            <div class="d-pad">
                <div class="d-btn empty"></div>
                <div class="d-btn" ontouchstart="movePlayer(0, -1)" onclick="movePlayer(0, -1)">↑</div>
                <div class="d-btn empty"></div>
                <div class="d-btn" ontouchstart="movePlayer(-1, 0)" onclick="movePlayer(-1, 0)">←</div>
                <div class="d-btn empty"></div>
                <div class="d-btn" ontouchstart="movePlayer(1, 0)" onclick="movePlayer(1, 0)">→</div>
                <div class="d-btn empty"></div>
                <div class="d-btn" ontouchstart="movePlayer(0, 1)" onclick="movePlayer(0, 1)">↓</div>
                <div class="d-btn empty"></div>
            </div>
        </div>

        <div class="instructions">
            Use Arrow Keys or WASD to move • Reach the green exit
        </div>
    </div>

    <div class="win-overlay" id="winOverlay">
        <div class="win-content">
            <h2>🎉 Level Complete!</h2>
            <p id="winMessage">You reached the exit!</p>
            <button onclick="generateMaze()">Next Level →</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let cellSize;
        let maze = [];
        let player = { x: 0, y: 0 };
        let exit = { x: 0, y: 0 };
        let level = 1;
        let steps = 0;
        let startTime;
        let timerInterval;

        const mazeWidth = 15;
        const mazeHeight = 15;

        function resize() {
            const maxWidth = Math.min(window.innerWidth * 0.9, 600);
            const maxHeight = Math.min(window.innerHeight * 0.5, 600);

            cellSize = Math.floor(Math.min(maxWidth / mazeWidth, maxHeight / mazeHeight));
            width = cellSize * mazeWidth;
            height = cellSize * mazeHeight;

            canvas.width = width;
            canvas.height = height;
        }

        function generateMaze() {
            // Initialize maze with walls
            maze = [];
            for (let y = 0; y < mazeHeight; y++) {
                maze[y] = [];
                for (let x = 0; x < mazeWidth; x++) {
                    maze[y][x] = 1; // 1 = wall
                }
            }

            // Recursive backtracking maze generation
            const stack = [];
            const startX = 1;
            const startY = 1;

            maze[startY][startX] = 0;
            stack.push({ x: startX, y: startY });

            while (stack.length > 0) {
                const current = stack[stack.length - 1];
                const neighbors = [];

                // Check all four directions
                const directions = [
                    { dx: 0, dy: -2 },
                    { dx: 2, dy: 0 },
                    { dx: 0, dy: 2 },
                    { dx: -2, dy: 0 }
                ];

                for (const dir of directions) {
                    const nx = current.x + dir.dx;
                    const ny = current.y + dir.dy;

                    if (nx > 0 && nx < mazeWidth - 1 && ny > 0 && ny < mazeHeight - 1 && maze[ny][nx] === 1) {
                        neighbors.push({ x: nx, y: ny, wx: current.x + dir.dx / 2, wy: current.y + dir.dy / 2 });
                    }
                }

                if (neighbors.length > 0) {
                    const next = neighbors[Math.floor(Math.random() * neighbors.length)];
                    maze[next.wy][next.wx] = 0;
                    maze[next.y][next.x] = 0;
                    stack.push({ x: next.x, y: next.y });
                } else {
                    stack.pop();
                }
            }

            // Set player position
            player = { x: 1, y: 1 };

            // Set exit position (bottom right area)
            let exitSet = false;
            for (let y = mazeHeight - 2; y > 0 && !exitSet; y--) {
                for (let x = mazeWidth - 2; x > 0 && !exitSet; x--) {
                    if (maze[y][x] === 0) {
                        exit = { x, y };
                        exitSet = true;
                    }
                }
            }

            // Reset stats
            steps = 0;
            document.getElementById('steps').textContent = steps;
            document.getElementById('winOverlay').classList.remove('show');

            // Start timer
            startTime = Date.now();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);

            draw();
        }

        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            document.getElementById('time').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // Draw maze
            for (let y = 0; y < mazeHeight; y++) {
                for (let x = 0; x < mazeWidth; x++) {
                    if (maze[y][x] === 1) {
                        // Wall
                        ctx.fillStyle = '#1a1a2e';
                        ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);

                        // Wall border
                        ctx.strokeStyle = '#00ff88';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(x * cellSize, y * cellSize, cellSize, cellSize);
                    } else {
                        // Path
                        ctx.fillStyle = '#0a0a0a';
                        ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                    }
                }
            }

            // Draw exit
            ctx.fillStyle = '#00ff88';
            ctx.fillRect(exit.x * cellSize + 4, exit.y * cellSize + 4, cellSize - 8, cellSize - 8);

            // Exit glow
            ctx.shadowColor = '#00ff88';
            ctx.shadowBlur = 15;
            ctx.fillStyle = '#00ff88';
            ctx.fillRect(exit.x * cellSize + 8, exit.y * cellSize + 8, cellSize - 16, cellSize - 16);
            ctx.shadowBlur = 0;

            // Draw player
            const centerX = player.x * cellSize + cellSize / 2;
            const centerY = player.y * cellSize + cellSize / 2;
            const radius = cellSize / 3;

            // Player glow
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 15;

            // Player circle
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fill();

            // Player inner circle
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius / 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 0;
        }

        function movePlayer(dx, dy) {
            const newX = player.x + dx;
            const newY = player.y + dy;

            // Check bounds and walls
            if (newX >= 0 && newX < mazeWidth && newY >= 0 && newY < mazeHeight && maze[newY][newX] === 0) {
                player.x = newX;
                player.y = newY;
                steps++;
                document.getElementById('steps').textContent = steps;
                draw();

                // Check win condition
                if (player.x === exit.x && player.y === exit.y) {
                    clearInterval(timerInterval);
                    document.getElementById('winMessage').textContent =
                        `Steps: ${steps} | Time: ${document.getElementById('time').textContent}`;
                    document.getElementById('winOverlay').classList.add('show');
                }
            }
        }

        function newGame() {
            level = 1;
            document.getElementById('level').textContent = level;
            generateMaze();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    movePlayer(0, -1);
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    movePlayer(0, 1);
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    movePlayer(-1, 0);
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    movePlayer(1, 0);
                    break;
            }
        });

        // Initialize
        window.addEventListener('resize', () => {
            resize();
            draw();
        });

        resize();
        generateMaze();
    </script>
</body>
</html>
