<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Runner - プロシージャル迷路パズル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }

        .subtitle {
            font-size: clamp(0.8rem, 2vw, 1rem);
            color: #888;
            margin-bottom: 20px;
            text-align: center;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(255, 107, 107, 0.3);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.5);
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            font-size: 1rem;
            color: #feca57;
        }

        .info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 0.9rem;
            text-align: center;
            max-width: 500px;
        }

        .info strong {
            color: #ff6b6b;
        }

        .difficulty {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .difficulty button {
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        #game-container.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            max-width: none;
            z-index: 1000;
            border-radius: 0;
        }

        .exit-fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
            padding: 10px 20px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: none;
        }

        .exit-fullscreen.show {
            display: block;
        }

        .win-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .win-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .win-overlay h2 {
            font-size: 2rem;
            color: #feca57;
            margin-bottom: 20px;
        }

        .win-overlay p {
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            button {
                width: 100%;
            }

            .difficulty {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <h1>🏃 Maze Runner</h1>
    <p class="subtitle">プロシージャル迷路パズル</p>

    <div id="game-container">
        <canvas id="canvas"></canvas>
        <div class="win-overlay" id="winOverlay">
            <h2>🎉 ゴール！</h2>
            <p id="winText">迷路をクリアしました！</p>
            <button onclick="newGame()">新しい迷路</button>
        </div>
    </div>

    <button class="exit-fullscreen" id="exitFullscreen">退出</button>

    <div class="stats">
        <div>🚶 ステップ: <span id="steps">0</span></div>
        <div>⏱️ 時間: <span id="time">00:00</span></div>
    </div>

    <div class="controls">
        <button onclick="newGame()">🔄 新しい迷路</button>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">🖥️ 全画面</button>
    </div>

    <div class="difficulty">
        <button onclick="setDifficulty(10)">😊 簡単</button>
        <button onclick="setDifficulty(15)">🤔 普通</button>
        <button onclick="setDifficulty(25)">😈 難しい</button>
    </div>

    <div class="info">
        <strong>操作方法：</strong>矢印キーまたはスワイプで移動。🟢がスタート、🔴がゴールです。
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('game-container');

        let width, height;
        let maze = [];
        let mazeSize = 15;
        let cellSize;
        let player = { x: 0, y: 0 };
        let goal = { x: 0, y: 0 };
        let steps = 0;
        let startTime = null;
        let timerInterval = null;
        let gameWon = false;

        function resize() {
            const rect = container.getBoundingClientRect();
            width = canvas.width = rect.width * window.devicePixelRatio;
            height = canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            cellSize = (rect.width / mazeSize);
            draw();
        }

        window.addEventListener('resize', resize);

        // 深さ優先探索で迷路を生成
        function generateMaze(size) {
            // 壁で初期化（1: 壁、0: 道）
            const maze = Array(size).fill().map(() => Array(size).fill(1));

            const stack = [];
            const startX = 1;
            const startY = 1;

            maze[startY][startX] = 0;
            stack.push({ x: startX, y: startY });

            const directions = [
                { dx: 0, dy: -2 }, // 上
                { dx: 2, dy: 0 },  // 右
                { dx: 0, dy: 2 },  // 下
                { dx: -2, dy: 0 }  // 左
            ];

            while (stack.length > 0) {
                const current = stack[stack.length - 1];

                // シャッフル
                const shuffled = [...directions].sort(() => Math.random() - 0.5);
                let found = false;

                for (const dir of shuffled) {
                    const nx = current.x + dir.dx;
                    const ny = current.y + dir.dy;

                    if (nx > 0 && nx < size - 1 && ny > 0 && ny < size - 1 && maze[ny][nx] === 1) {
                        maze[ny][nx] = 0;
                        maze[current.y + dir.dy / 2][current.x + dir.dx / 2] = 0;
                        stack.push({ x: nx, y: ny });
                        found = true;
                        break;
                    }
                }

                if (!found) {
                    stack.pop();
                }
            }

            return maze;
        }

        function newGame() {
            gameWon = false;
            document.getElementById('winOverlay').classList.remove('show');

            // 迷路サイズは奇数にする
            mazeSize = Math.max(11, Math.min(mazeSize, 31));

            maze = generateMaze(mazeSize);
            player = { x: 1, y: 1 };
            goal = { x: mazeSize - 2, y: mazeSize - 2 };
            steps = 0;
            startTime = Date.now();

            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);

            resize();
        }

        function updateTimer() {
            if (gameWon || !startTime) return;
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const seconds = (elapsed % 60).toString().padStart(2, '0');
            document.getElementById('time').textContent = `${minutes}:${seconds}`;
        }

        function draw() {
            const rect = container.getBoundingClientRect();
            ctx.clearRect(0, 0, rect.width, rect.height);

            // 背景
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, rect.width, rect.height);

            // 迷路を描画
            for (let y = 0; y < mazeSize; y++) {
                for (let x = 0; x < mazeSize; x++) {
                    const px = x * cellSize;
                    const py = y * cellSize;

                    if (maze[y][x] === 1) {
                        // 壁
                        ctx.fillStyle = '#2d3436';
                        ctx.fillRect(px, py, cellSize + 1, cellSize + 1);

                        // 壁のハイライト
                        ctx.fillStyle = '#636e72';
                        ctx.fillRect(px, py, cellSize, 2);
                    } else {
                        // 道
                        ctx.fillStyle = '#0a0a0a';
                        ctx.fillRect(px, py, cellSize, cellSize);
                    }
                }
            }

            // ゴール
            const goalX = goal.x * cellSize + cellSize / 2;
            const goalY = goal.y * cellSize + cellSize / 2;
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(goalX, goalY, cellSize / 3, 0, Math.PI * 2);
            ctx.fill();

            // プレイヤー
            const playerX = player.x * cellSize + cellSize / 2;
            const playerY = player.y * cellSize + cellSize / 2;
            ctx.fillStyle = '#2ecc71';
            ctx.beginPath();
            ctx.arc(playerX, playerY, cellSize / 3, 0, Math.PI * 2);
            ctx.fill();

            // プレイヤーの輝き
            ctx.shadowColor = '#2ecc71';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function movePlayer(dx, dy) {
            if (gameWon) return;

            const newX = player.x + dx;
            const newY = player.y + dy;

            if (newX >= 0 && newX < mazeSize && newY >= 0 && newY < mazeSize && maze[newY][newX] === 0) {
                player.x = newX;
                player.y = newY;
                steps++;
                document.getElementById('steps').textContent = steps;
                draw();

                // ゴールチェック
                if (player.x === goal.x && player.y === goal.y) {
                    winGame();
                }
            }
        }

        function winGame() {
            gameWon = true;
            clearInterval(timerInterval);
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            document.getElementById('winText').textContent =
                `${steps}歩、${minutes}分${seconds}秒でクリア！`;
            document.getElementById('winOverlay').classList.add('show');
        }

        function setDifficulty(size) {
            mazeSize = size;
            newGame();
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':
                    movePlayer(0, -1);
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    movePlayer(0, 1);
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    movePlayer(-1, 0);
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    movePlayer(1, 0);
                    e.preventDefault();
                    break;
            }
        });

        // タッチ操作
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            const minSwipeDistance = 30;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > minSwipeDistance) {
                    movePlayer(1, 0);
                } else if (dx < -minSwipeDistance) {
                    movePlayer(-1, 0);
                }
            } else {
                if (dy > minSwipeDistance) {
                    movePlayer(0, 1);
                } else if (dy < -minSwipeDistance) {
                    movePlayer(0, -1);
                }
            }
        });

        function toggleFullscreen() {
            container.classList.toggle('fullscreen');
            document.getElementById('exitFullscreen').classList.toggle('show');
            if (container.classList.contains('fullscreen')) {
                resize();
            }
        }

        document.getElementById('exitFullscreen').addEventListener('click', () => {
            container.classList.remove('fullscreen');
            document.getElementById('exitFullscreen').classList.remove('show');
            resize();
        });

        // 初期化
        setTimeout(newGame, 100);
    </script>
</body>
</html>
