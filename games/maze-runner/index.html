<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Runner - 迷路パズル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 10px;
        }

        h1 {
            color: #00d9ff;
            font-size: 1.8rem;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(0, 217, 255, 0.5);
        }

        .info {
            color: #b8b8d1;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .stat {
            background: rgba(0, 217, 255, 0.1);
            padding: 8px 15px;
            border-radius: 8px;
            color: #00d9ff;
            font-size: 0.9rem;
            border: 1px solid rgba(0, 217, 255, 0.3);
        }

        #gameCanvas {
            border: 2px solid rgba(0, 217, 255, 0.5);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.3);
            max-width: 95vw;
            max-height: 60vh;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: #00d9ff;
            color: #0f0c29;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover {
            background: #00ffff;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 217, 255, 0.8);
            color: #0f0c29;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            z-index: 1000;
        }

        .win-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 12, 41, 0.95);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #00d9ff;
            text-align: center;
            z-index: 1000;
            display: none;
        }

        .win-message h2 {
            color: #00d9ff;
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .win-message p {
            color: #b8b8d1;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .difficulty {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .difficulty button {
            padding: 8px 15px;
            font-size: 0.8rem;
        }

        .difficulty button.active {
            background: #00ffff;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <h1>🏃 Maze Runner</h1>
    <p class="info">矢印キーまたはスワイプで移動 - ゴールを目指せ！</p>

    <div class="stats">
        <div class="stat">⏱️ 時間: <span id="time">0</span>秒</div>
        <div class="stat">👣 移動: <span id="moves">0</span></div>
        <div class="stat">🏆 レベル: <span id="level">1</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="controls">
        <button onclick="newGame()">新しい迷路</button>
        <div class="difficulty">
            <button onclick="setDifficulty(11)" class="difficulty-btn">簡単</button>
            <button onclick="setDifficulty(15)" class="difficulty-btn active">普通</button>
            <button onclick="setDifficulty(21)" class="difficulty-btn">難しい</button>
        </div>
    </div>

    <div class="win-message" id="winMessage">
        <h2>🎉 クリア！</h2>
        <p>ゴールに到達しました！</p>
        <button onclick="nextLevel()">次のレベルへ</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let maze = [];
        let mazeWidth = 15;
        let mazeHeight = 15;
        let cellSize;
        let player = { x: 1, y: 1 };
        let goal = { x: 0, y: 0 };
        let moves = 0;
        let startTime;
        let gameWon = false;
        let level = 1;

        function resize() {
            const maxSize = Math.min(window.innerWidth * 0.95, window.innerHeight * 0.6);
            canvas.width = maxSize;
            canvas.height = maxSize;
            cellSize = Math.floor(maxSize / mazeWidth);
            draw();
        }

        function generateMaze(width, height) {
            // 迷路を壁で初期化
            const maze = Array(height).fill().map(() => Array(width).fill(1));

            // 深さ優先探索で迷路生成
            function carve(x, y) {
                maze[y][x] = 0;

                const directions = [
                    [0, -2], [0, 2], [-2, 0], [2, 0]
                ].sort(() => Math.random() - 0.5);

                for (const [dx, dy] of directions) {
                    const nx = x + dx;
                    const ny = y + dy;

                    if (nx > 0 && nx < width - 1 && ny > 0 && ny < height - 1 && maze[ny][nx] === 1) {
                        maze[y + dy / 2][x + dx / 2] = 0;
                        carve(nx, ny);
                    }
                }
            }

            carve(1, 1);
            return maze;
        }

        function initGame() {
            maze = generateMaze(mazeWidth, mazeHeight);
            player = { x: 1, y: 1 };
            goal = { x: mazeWidth - 2, y: mazeHeight - 2 };
            moves = 0;
            startTime = Date.now();
            gameWon = false;
            document.getElementById('winMessage').style.display = 'none';
            updateStats();
            draw();
            gameLoop();
        }

        function draw() {
            ctx.fillStyle = '#0f0c29';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const offsetX = (canvas.width - mazeWidth * cellSize) / 2;
            const offsetY = (canvas.height - mazeHeight * cellSize) / 2;

            // 迷路を描画
            for (let y = 0; y < mazeHeight; y++) {
                for (let x = 0; x < mazeWidth; x++) {
                    const posX = offsetX + x * cellSize;
                    const posY = offsetY + y * cellSize;

                    if (maze[y][x] === 1) {
                        // 壁
                        ctx.fillStyle = '#302b63';
                        ctx.fillRect(posX, posY, cellSize, cellSize);
                        ctx.strokeStyle = '#24243e';
                        ctx.strokeRect(posX, posY, cellSize, cellSize);
                    } else {
                        // 通路
                        ctx.fillStyle = '#1a1a2e';
                        ctx.fillRect(posX, posY, cellSize, cellSize);
                    }
                }
            }

            // ゴールを描画
            ctx.fillStyle = '#00ff88';
            ctx.beginPath();
            ctx.arc(
                offsetX + goal.x * cellSize + cellSize / 2,
                offsetY + goal.y * cellSize + cellSize / 2,
                cellSize / 3,
                0,
                Math.PI * 2
            );
            ctx.fill();

            // プレイヤーを描画
            ctx.fillStyle = '#00d9ff';
            ctx.beginPath();
            ctx.arc(
                offsetX + player.x * cellSize + cellSize / 2,
                offsetY + player.y * cellSize + cellSize / 2,
                cellSize / 3,
                0,
                Math.PI * 2
            );
            ctx.fill();
        }

        function move(dx, dy) {
            if (gameWon) return;

            const newX = player.x + dx;
            const newY = player.y + dy;

            if (newX >= 0 && newX < mazeWidth && newY >= 0 && newY < mazeHeight && maze[newY][newX] === 0) {
                player.x = newX;
                player.y = newY;
                moves++;
                updateStats();
                draw();

                if (player.x === goal.x && player.y === goal.y) {
                    win();
                }
            }
        }

        function win() {
            gameWon = true;
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            document.querySelector('#winMessage p').textContent =
                `時間: ${elapsed}秒 | 移動: ${moves}回`;
            document.getElementById('winMessage').style.display = 'block';
        }

        function updateStats() {
            const elapsed = gameWon ? 
                Math.floor((Date.now() - startTime) / 1000) :
                Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('time').textContent = elapsed;
            document.getElementById('moves').textContent = moves;
            document.getElementById('level').textContent = level;
        }

        function gameLoop() {
            if (!gameWon) {
                updateStats();
                requestAnimationFrame(gameLoop);
            }
        }

        function newGame() {
            initGame();
        }

        function nextLevel() {
            level++;
            initGame();
        }

        function setDifficulty(size) {
            mazeWidth = size;
            mazeHeight = size;
            level = 1;

            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            initGame();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    move(0, -1);
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    move(0, 1);
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    move(-1, 0);
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    move(1, 0);
                    break;
            }
        });

        // タッチ操作
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            if (Math.abs(dx) > Math.abs(dy)) {
                move(dx > 0 ? 1 : -1, 0);
            } else {
                move(0, dy > 0 ? 1 : -1);
            }
        });

        window.addEventListener('resize', resize);

        // 初期化
        resize();
        initGame();
    </script>
</body>
</html>
