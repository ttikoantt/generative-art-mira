<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Maze Runner - 迷路パズル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        h1 {
            color: #00f5ff;
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 245, 255, 0.5);
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .info-panel {
            display: flex;
            gap: 30px;
            color: #fff;
            font-size: 14px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .info-label {
            color: #888;
            font-size: 12px;
        }

        .info-value {
            font-size: 24px;
            font-weight: bold;
            color: #00f5ff;
        }

        #maze {
            border: 3px solid #00f5ff;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
        }

        .controls {
            margin-top: 20px;
        }

        .control-buttons {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            border: 2px solid #00f5ff;
            background: rgba(0, 245, 255, 0.1);
            color: #00f5ff;
            border-radius: 10px;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            user-select: none;
            -webkit-user-select: none;
        }

        .control-btn:hover, .control-btn:active {
            background: rgba(0, 245, 255, 0.3);
            transform: scale(0.95);
        }

        .control-btn.up { grid-column: 2; grid-row: 1; }
        .control-btn.left { grid-column: 1; grid-row: 2; }
        .control-btn.down { grid-column: 2; grid-row: 2; }
        .control-btn.right { grid-column: 3; grid-row: 2; }

        .new-game-btn {
            padding: 15px 40px;
            border: 2px solid #00f5ff;
            background: rgba(0, 245, 255, 0.2);
            color: #00f5ff;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .new-game-btn:hover {
            background: rgba(0, 245, 255, 0.4);
            transform: scale(1.05);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(0, 245, 255, 0.2);
            border: 1px solid #00f5ff;
            color: #00f5ff;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
        }

        .win-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 200;
        }

        .win-overlay.show {
            display: flex;
        }

        .win-overlay h2 {
            color: #00ff88;
            font-size: 36px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .win-overlay p {
            color: #fff;
            font-size: 18px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 18px;
                margin-bottom: 10px;
            }

            .info-panel {
                gap: 15px;
                font-size: 12px;
            }

            .info-value {
                font-size: 18px;
            }

            .control-buttons {
                grid-template-columns: repeat(3, 50px);
                grid-template-rows: repeat(3, 50px);
            }

            .control-btn {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }

            .new-game-btn {
                padding: 12px 30px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreen">全画面</button>

    <h1>🏃 Maze Runner</h1>

    <div class="game-container">
        <div class="info-panel">
            <div class="info-item">
                <span class="info-label">レベル</span>
                <span class="info-value" id="level">1</span>
            </div>
            <div class="info-item">
                <span class="info-label">タイム</span>
                <span class="info-value" id="timer">00:00</span>
            </div>
            <div class="info-item">
                <span class="info-label">ベスト</span>
                <span class="info-value" id="best">--:--</span>
            </div>
        </div>

        <canvas id="maze" width="400" height="400"></canvas>

        <div class="controls">
            <div class="control-buttons">
                <button class="control-btn up" data-dir="up">↑</button>
                <button class="control-btn left" data-dir="left">←</button>
                <button class="control-btn down" data-dir="down">↓</button>
                <button class="control-btn right" data-dir="right">→</button>
            </div>
        </div>

        <button class="new-game-btn" id="newGame">新しい迷路</button>
    </div>

    <div class="win-overlay" id="winOverlay">
        <h2>🎉 クリア！</h2>
        <p>タイム: <span id="finalTime">00:00</span></p>
        <button class="new-game-btn" id="playAgain">次のレベルへ</button>
    </div>

    <script>
        const canvas = document.getElementById('maze');
        const ctx = canvas.getContext('2d');

        const CELL_SIZE = 20;
        let mazeWidth, mazeHeight;
        let maze = [];
        let player = { x: 0, y: 0 };
        let goal = { x: 0, y: 0 };
        let level = 1;
        let startTime = Date.now();
        let timerInterval = null;
        let bestTimes = {};
        let gameWon = false;

        // 迷路生成（深さ優先探索）
        function generateMaze(width, height) {
            // 全壁で初期化
            const maze = [];
            for (let y = 0; y < height; y++) {
                maze[y] = [];
                for (let x = 0; x < width; x++) {
                    maze[y][x] = {
                        visited: false,
                        walls: { top: true, right: true, bottom: true, left: true }
                    };
                }
            }

            // DFSで迷路生成
            const stack = [];
            const start = { x: 0, y: 0 };
            maze[start.y][start.x].visited = true;
            stack.push(start);

            while (stack.length > 0) {
                const current = stack[stack.length - 1];
                const neighbors = getUnvisitedNeighbors(current.x, current.y, width, height, maze);

                if (neighbors.length > 0) {
                    const next = neighbors[Math.floor(Math.random() * neighbors.length)];
                    removeWall(current, next, maze);
                    maze[next.y][next.x].visited = true;
                    stack.push(next);
                } else {
                    stack.pop();
                }
            }

            return maze;
        }

        function getUnvisitedNeighbors(x, y, width, height, maze) {
            const neighbors = [];
            const dirs = [
                { dx: 0, dy: -1 }, // 上
                { dx: 1, dy: 0 },  // 右
                { dx: 0, dy: 1 },  // 下
                { dx: -1, dy: 0 }  // 左
            ];

            for (const dir of dirs) {
                const nx = x + dir.dx;
                const ny = y + dir.dy;

                if (nx >= 0 && nx < width && ny >= 0 && ny < height && !maze[ny][nx].visited) {
                    neighbors.push({ x: nx, y: ny });
                }
            }

            return neighbors;
        }

        function removeWall(current, next, maze) {
            const dx = next.x - current.x;
            const dy = next.y - current.y;

            if (dx === 1) {
                maze[current.y][current.x].walls.right = false;
                maze[next.y][next.x].walls.left = false;
            } else if (dx === -1) {
                maze[current.y][current.x].walls.left = false;
                maze[next.y][next.x].walls.right = false;
            } else if (dy === 1) {
                maze[current.y][current.x].walls.bottom = false;
                maze[next.y][next.x].walls.top = false;
            } else if (dy === -1) {
                maze[current.y][current.x].walls.top = false;
                maze[next.y][next.x].walls.bottom = false;
            }
        }

        function initGame() {
            // レベルに応じて迷路サイズを増やす
            const baseSize = 10;
            const sizeIncrement = Math.floor((level - 1) / 2);
            mazeWidth = baseSize + sizeIncrement;
            mazeHeight = baseSize + sizeIncrement;

            // キャンバスサイズ調整
            const maxCanvasSize = Math.min(window.innerWidth - 40, 400);
            canvas.width = maxCanvasSize;
            canvas.height = maxCanvasSize;

            // セルサイズ計算
            const cellSize = Math.floor(maxCanvasSize / mazeWidth);
            ctx.cellSize = cellSize;

            // 迷路生成
            maze = generateMaze(mazeWidth, mazeHeight);

            // プレイヤーとゴール設定
            player = { x: 0, y: 0 };
            goal = { x: mazeWidth - 1, y: mazeHeight - 1 };

            // タイマーリセット
            startTime = Date.now();
            gameWon = false;
            document.getElementById('winOverlay').classList.remove('show');

            // タイマー開始
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 100);

            draw();
        }

        function updateTimer() {
            if (gameWon) return;

            const elapsed = Date.now() - startTime;
            const minutes = Math.floor(elapsed / 60000);
            const seconds = Math.floor((elapsed % 60000) / 1000);
            document.getElementById('timer').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function draw() {
            const cellSize = ctx.cellSize;

            // 背景
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 迷路描画
            for (let y = 0; y < mazeHeight; y++) {
                for (let x = 0; x < mazeWidth; x++) {
                    const cell = maze[y][x];
                    const px = x * cellSize;
                    const py = y * cellSize;

                    // セル背景
                    ctx.fillStyle = '#16213e';
                    ctx.fillRect(px, py, cellSize, cellSize);

                    // 壁描画
                    ctx.strokeStyle = '#00f5ff';
                    ctx.lineWidth = 2;
                    ctx.beginPath();

                    if (cell.walls.top) {
                        ctx.moveTo(px, py);
                        ctx.lineTo(px + cellSize, py);
                    }
                    if (cell.walls.right) {
                        ctx.moveTo(px + cellSize, py);
                        ctx.lineTo(px + cellSize, py + cellSize);
                    }
                    if (cell.walls.bottom) {
                        ctx.moveTo(px, py + cellSize);
                        ctx.lineTo(px + cellSize, py + cellSize);
                    }
                    if (cell.walls.left) {
                        ctx.moveTo(px, py);
                        ctx.lineTo(px, py + cellSize);
                    }

                    ctx.stroke();
                }
            }

            // ゴール描画
            ctx.fillStyle = '#00ff88';
            ctx.fillRect(
                goal.x * cellSize + 3,
                goal.y * cellSize + 3,
                cellSize - 6,
                cellSize - 6
            );

            // プレイヤー描画
            ctx.fillStyle = '#ff0080';
            ctx.beginPath();
            ctx.arc(
                player.x * cellSize + cellSize / 2,
                player.y * cellSize + cellSize / 2,
                cellSize / 3,
                0,
                Math.PI * 2
            );
            ctx.fill();
        }

        function movePlayer(dx, dy) {
            if (gameWon) return;

            const cell = maze[player.y][player.x];
            let canMove = false;

            if (dx === 0 && dy === -1 && !cell.walls.top) canMove = true;
            if (dx === 1 && dy === 0 && !cell.walls.right) canMove = true;
            if (dx === 0 && dy === 1 && !cell.walls.bottom) canMove = true;
            if (dx === -1 && dy === 0 && !cell.walls.left) canMove = true;

            if (canMove) {
                player.x += dx;
                player.y += dy;
                draw();

                // ゴール判定
                if (player.x === goal.x && player.y === goal.y) {
                    winGame();
                }
            }
        }

        function winGame() {
            gameWon = true;
            clearInterval(timerInterval);

            const elapsed = Date.now() - startTime;
            const minutes = Math.floor(elapsed / 60000);
            const seconds = Math.floor((elapsed % 60000) / 1000);
            const timeStr = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            // ベストタイム更新
            if (!bestTimes[level] || elapsed < bestTimes[level]) {
                bestTimes[level] = elapsed;
                const bestMinutes = Math.floor(bestTimes[level] / 60000);
                const bestSeconds = Math.floor((bestTimes[level] % 60000) / 1000);
                document.getElementById('best').textContent = 
                    `${bestMinutes.toString().padStart(2, '0')}:${bestSeconds.toString().padStart(2, '0')}`;
            }

            document.getElementById('finalTime').textContent = timeStr;
            document.getElementById('winOverlay').classList.add('show');
        }

        function nextLevel() {
            level++;
            document.getElementById('level').textContent = level;

            // ベストタイム表示
            if (bestTimes[level]) {
                const bestMinutes = Math.floor(bestTimes[level] / 60000);
                const bestSeconds = Math.floor((bestTimes[level] % 60000) / 1000);
                document.getElementById('best').textContent = 
                    `${bestMinutes.toString().padStart(2, '0')}:${bestSeconds.toString().padStart(2, '0')}`;
            } else {
                document.getElementById('best').textContent = '--:--';
            }

            initGame();
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    movePlayer(0, -1);
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    movePlayer(0, 1);
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    movePlayer(-1, 0);
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    movePlayer(1, 0);
                    e.preventDefault();
                    break;
            }
        });

        // タッチ操作（スワイプ）
        let touchStartX, touchStartY;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        canvas.addEventListener('touchend', (e) => {
            if (!touchStartX || !touchStartY) return;

            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            const minSwipe = 30;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > minSwipe) movePlayer(1, 0);
                else if (dx < -minSwipe) movePlayer(-1, 0);
            } else {
                if (dy > minSwipe) movePlayer(0, 1);
                else if (dy < -minSwipe) movePlayer(0, -1);
            }

            touchStartX = null;
            touchStartY = null;
        }, { passive: true });

        // コントロールボタン
        document.querySelectorAll('.control-btn').forEach(btn => {
            const dir = btn.dataset.dir;

            // クリック
            btn.addEventListener('click', () => {
                switch (dir) {
                    case 'up': movePlayer(0, -1); break;
                    case 'down': movePlayer(0, 1); break;
                    case 'left': movePlayer(-1, 0); break;
                    case 'right': movePlayer(1, 0); break;
                }
            });

            // タッチ
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                switch (dir) {
                    case 'up': movePlayer(0, -1); break;
                    case 'down': movePlayer(0, 1); break;
                    case 'left': movePlayer(-1, 0); break;
                    case 'right': movePlayer(1, 0); break;
                }
            }, { passive: false });
        });

        // ボタン
        document.getElementById('newGame').addEventListener('click', () => {
            level = 1;
            document.getElementById('level').textContent = level;
            initGame();
        });

        document.getElementById('playAgain').addEventListener('click', nextLevel);

        document.getElementById('fullscreen').addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // ウィンドウリサイズ
        window.addEventListener('resize', () => {
            initGame();
        });

        // 初期化
        initGame();
    </script>
</body>
</html>
