<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Maze Runner - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        #gameCanvas {
            display: block;
            margin: 0 auto;
            background: #1a1a2e;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .ui {
            position: fixed;
            color: white;
            font-size: 16px;
            z-index: 100;
        }

        .top-left {
            top: 20px;
            left: 20px;
        }

        .top-right {
            top: 20px;
            right: 20px;
            text-align: right;
        }

        .level {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .timer {
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: grid;
            grid-template-columns: repeat(3, 60px);
            gap: 10px;
            z-index: 100;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .control-btn:active {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0.95);
        }

        .control-btn.empty {
            background: transparent;
            border: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .modal-content h2 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        .modal-content p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .modal-content button {
            background: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .modal-content button:hover {
            transform: scale(1.05);
        }

        @media (min-width: 768px) {
            .controls {
                display: none;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全画面</button>

    <div class="ui top-left">
        <div class="level">Level <span id="level">1</span></div>
    </div>

    <div class="ui top-right">
        <div class="timer">⏱ <span id="timer">0.0</span>s</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="controls">
        <div class="control-btn empty"></div>
        <div class="control-btn" ontouchstart="movePlayer(0, -1)">↑</div>
        <div class="control-btn empty"></div>
        <div class="control-btn" ontouchstart="movePlayer(-1, 0)">←</div>
        <div class="control-btn" ontouchstart="movePlayer(0, 1)">↓</div>
        <div class="control-btn" ontouchstart="movePlayer(1, 0)">→</div>
    </div>

    <div id="winModal" class="modal">
        <div class="modal-content">
            <h2>🎉 Clear!</h2>
            <p>Level <span id="winLevel">1</span></p>
            <p>Time: <span id="winTime">0.0</span>s</p>
            <button onclick="nextLevel()">Next Level →</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ゲーム設定
        const CELL_SIZE = 30;
        let MAZE_WIDTH = 15;
        let MAZE_HEIGHT = 15;

        let maze = [];
        let player = { x: 1, y: 1 };
        let goal = { x: MAZE_WIDTH - 2, y: MAZE_HEIGHT - 2 };
        let level = 1;
        let startTime = Date.now();
        let gameWon = false;

        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 600);
            const maxHeight = window.innerHeight - 200;

            MAZE_WIDTH = Math.floor(maxWidth / CELL_SIZE);
            MAZE_HEIGHT = Math.floor(maxHeight / CELL_SIZE);

            // 奇数に調整
            if (MAZE_WIDTH % 2 === 0) MAZE_WIDTH--;
            if (MAZE_HEIGHT % 2 === 0) MAZE_HEIGHT--;

            canvas.width = MAZE_WIDTH * CELL_SIZE;
            canvas.height = MAZE_HEIGHT * CELL_SIZE;

            generateMaze();
        }

        function generateMaze() {
            // 迷路初期化（全て壁）
            maze = [];
            for (let y = 0; y < MAZE_HEIGHT; y++) {
                maze[y] = [];
                for (let x = 0; x < MAZE_WIDTH; x++) {
                    maze[y][x] = 1; // 1 = 壁
                }
            }

            // 深さ優先探索で迷路生成
            function carve(x, y) {
                maze[y][x] = 0; // 0 = 通路

                const directions = [
                    [0, -2], // 上
                    [2, 0],  // 右
                    [0, 2],  // 下
                    [-2, 0]  // 左
                ];

                // シャッフル
                for (let i = directions.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [directions[i], directions[j]] = [directions[j], directions[i]];
                }

                for (const [dx, dy] of directions) {
                    const nx = x + dx;
                    const ny = y + dy;

                    if (nx > 0 && nx < MAZE_WIDTH - 1 && ny > 0 && ny < MAZE_HEIGHT - 1 && maze[ny][nx] === 1) {
                        maze[y + dy / 2][x + dx / 2] = 0;
                        carve(nx, ny);
                    }
                }
            }

            carve(1, 1);

            // プレイヤーとゴールの位置
            player = { x: 1, y: 1 };
            goal = { x: MAZE_WIDTH - 2, y: MAZE_HEIGHT - 2 };

            // ゴールが壁なら調整
            while (maze[goal.y][goal.x] === 1) {
                goal.x--;
                if (goal.x <= 1) {
                    goal.x = MAZE_WIDTH - 2;
                    goal.y--;
                }
            }
        }

        function draw() {
            // 背景
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 迷路描画
            for (let y = 0; y < MAZE_HEIGHT; y++) {
                for (let x = 0; x < MAZE_WIDTH; x++) {
                    if (maze[y][x] === 1) {
                        ctx.fillStyle = '#16213e';
                        ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                        ctx.strokeStyle = '#0f3460';
                        ctx.strokeRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                    }
                }
            }

            // ゴール
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(
                goal.x * CELL_SIZE + CELL_SIZE / 2,
                goal.y * CELL_SIZE + CELL_SIZE / 2,
                CELL_SIZE / 3,
                0,
                Math.PI * 2
            );
            ctx.fill();

            // プレイヤー
            ctx.fillStyle = '#00ff88';
            ctx.beginPath();
            ctx.arc(
                player.x * CELL_SIZE + CELL_SIZE / 2,
                player.y * CELL_SIZE + CELL_SIZE / 2,
                CELL_SIZE / 2.5,
                0,
                Math.PI * 2
            );
            ctx.fill();

            // タイマー更新
            if (!gameWon) {
                const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                document.getElementById('timer').textContent = elapsed;
            }

            requestAnimationFrame(draw);
        }

        function movePlayer(dx, dy) {
            if (gameWon) return;

            const newX = player.x + dx;
            const newY = player.y + dy;

            // 移動可能チェック
            if (newX >= 0 && newX < MAZE_WIDTH && newY >= 0 && newY < MAZE_HEIGHT && maze[newY][newX] === 0) {
                player.x = newX;
                player.y = newY;

                // ゴールチェック
                if (player.x === goal.x && player.y === goal.y) {
                    winGame();
                }
            }
        }

        function winGame() {
            gameWon = true;
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);

            document.getElementById('winLevel').textContent = level;
            document.getElementById('winTime').textContent = elapsed;
            document.getElementById('winModal').classList.add('active');
        }

        function nextLevel() {
            level++;
            document.getElementById('level').textContent = level;
            document.getElementById('winModal').classList.remove('active');

            // レベルが上がると迷路が大きくなる
            if (level % 2 === 0) {
                resizeCanvas();
            } else {
                generateMaze();
            }

            startTime = Date.now();
            gameWon = false;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    movePlayer(0, -1);
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    movePlayer(0, 1);
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    movePlayer(-1, 0);
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    movePlayer(1, 0);
                    break;
            }
        });

        // スワイプ操作
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30) movePlayer(1, 0);
                else if (dx < -30) movePlayer(-1, 0);
            } else {
                if (dy > 30) movePlayer(0, 1);
                else if (dy < -30) movePlayer(0, -1);
            }
        });

        window.addEventListener('resize', resizeCanvas);

        // 初期化
        resizeCanvas();
        draw();
    </script>
</body>
</html>
