<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bubble Shooter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            position: relative;
            max-width: 100%;
            max-height: 100vh;
        }

        canvas {
            display: block;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            cursor: pointer;
        }

        .ui-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .score, .level {
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            border: 2px solid #00f260;
        }

        .game-over h2 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 32px;
        }

        .game-over p {
            color: #00f260;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            pointer-events: auto;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00f260, #0575e6);
            color: white;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 255, 255, 0.3);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #00f260;
        }

        .start-screen h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 36px;
        }

        .start-screen p {
            color: #ccc;
            font-size: 16px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .score, .level {
                font-size: 14px;
            }

            .start-screen h1 {
                font-size: 24px;
            }

            .start-screen p {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">🔳 全画面</button>

    <div class="game-container">
        <canvas id="gameCanvas"></canvas>

        <div class="ui-overlay">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="level">Level: <span id="level">1</span></div>
        </div>

        <div class="start-screen" id="startScreen">
            <h1>🫧 Bubble Shooter</h1>
            <p>タップしてバブルを発射！<br>同色3つ以上で消せるよ</p>
            <button class="btn btn-primary" id="startBtn">🎮 Start Game</button>
        </div>

        <div class="game-over" id="gameOver">
            <h2>Game Over!</h2>
            <p>Score: <span id="finalScore">0</span></p>
            <button class="btn btn-primary" id="restartBtn">🔄 Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const levelDisplay = document.getElementById('level');
        const finalScoreDisplay = document.getElementById('finalScore');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOver');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        // Game settings
        const BUBBLE_RADIUS = 20;
        const COLS = 11;
        const ROWS = 10;
        const COLORS = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F'];

        let bubbles = [];
        let shooter = { x: 0, y: 0, color: COLORS[0] };
        let projectiles = [];
        let particles = [];
        let score = 0;
        let level = 1;
        let gameRunning = false;
        let nextBubbleColor = COLORS[0];

        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 20, 500);
            const maxHeight = Math.min(window.innerHeight - 100, 700);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
            shooter.x = canvas.width / 2;
            shooter.y = canvas.height - BUBBLE_RADIUS - 10;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function initGame() {
            bubbles = [];
            projectiles = [];
            particles = [];
            score = 0;
            level = 1;
            scoreDisplay.textContent = score;
            levelDisplay.textContent = level;

            // Create initial bubbles
            for (let row = 0; row < 5; row++) {
                for (let col = 0; col < COLS; col++) {
                    const offset = row % 2 === 0 ? 0 : BUBBLE_RADIUS;
                    bubbles.push({
                        x: col * BUBBLE_RADIUS * 2 + BUBBLE_RADIUS + offset,
                        y: row * BUBBLE_RADIUS * 1.7 + BUBBLE_RADIUS,
                        color: COLORS[Math.floor(Math.random() * 4)],
                        matched: false
                    });
                }
            }

            nextBubbleColor = COLORS[Math.floor(Math.random() * 4)];
            shooter.color = nextBubbleColor;
            nextBubbleColor = COLORS[Math.floor(Math.random() * 4)];
        }

        function drawBubbles() {
            bubbles.forEach(bubble => {
                if (bubble.matched) return;

                // Bubble body
                const gradient = ctx.createRadialGradient(
                    bubble.x - 5, bubble.y - 5, 0,
                    bubble.x, bubble.y, BUBBLE_RADIUS
                );
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(0.3, bubble.color);
                gradient.addColorStop(1, shadeColor(bubble.color, -30));

                ctx.beginPath();
                ctx.arc(bubble.x, bubble.y, BUBBLE_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Highlight
                ctx.beginPath();
                ctx.arc(bubble.x - 5, bubble.y - 5, BUBBLE_RADIUS * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.fill();
            });
        }

        function drawShooter() {
            const gradient = ctx.createRadialGradient(
                shooter.x - 5, shooter.y - 5, 0,
                shooter.x, shooter.y, BUBBLE_RADIUS
            );
            gradient.addColorStop(0, '#fff');
            gradient.addColorStop(0.3, shooter.color);
            gradient.addColorStop(1, shadeColor(shooter.color, -30));

            ctx.beginPath();
            ctx.arc(shooter.x, shooter.y, BUBBLE_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();

            ctx.beginPath();
            ctx.arc(shooter.x - 5, shooter.y - 5, BUBBLE_RADIUS * 0.3, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.fill();

            // Aim line
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(shooter.x, shooter.y);
            ctx.lineTo(shooter.x, 0);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawProjectiles() {
            projectiles.forEach(proj => {
                const gradient = ctx.createRadialGradient(
                    proj.x - 5, proj.y - 5, 0,
                    proj.x, proj.y, BUBBLE_RADIUS
                );
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(0.3, proj.color);
                gradient.addColorStop(1, shadeColor(proj.color, -30));

                ctx.beginPath();
                ctx.arc(proj.x, proj.y, BUBBLE_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            });
        }

        function drawParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                p.life -= 0.02;

                if (p.life <= 0) return false;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fill();
                ctx.globalAlpha = 1;

                return true;
            });
        }

        function shadeColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt;
            const G = (num >> 8 & 0x00FF) + amt;
            const B = (num & 0x0000FF) + amt;
            return '#' + (0x1000000 +
                (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
                (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
                (B < 255 ? B < 1 ? 0 : B : 255)
            ).toString(16).slice(1);
        }

        function shoot() {
            projectiles.push({
                x: shooter.x,
                y: shooter.y,
                vy: -8,
                color: shooter.color
            });

            // Switch to next bubble
            shooter.color = nextBubbleColor;
            nextBubbleColor = COLORS[Math.floor(Math.random() * 4)];
        }

        function checkCollisions() {
            projectiles.forEach((proj, projIndex) => {
                // Check collision with bubbles
                for (let i = 0; i < bubbles.length; i++) {
                    const bubble = bubbles[i];
                    if (bubble.matched) continue;

                    const dx = proj.x - bubble.x;
                    const dy = proj.y - bubble.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < BUBBLE_RADIUS * 2) {
                        // Snap to grid
                        const newRow = Math.floor((bubble.y - BUBBLE_RADIUS) / (BUBBLE_RADIUS * 1.7));
                        const newCol = Math.floor((bubble.x - BUBBLE_RADIUS) / (BUBBLE_RADIUS * 2));
                        const offset = newRow % 2 === 0 ? 0 : BUBBLE_RADIUS;

                        bubbles.push({
                            x: newCol * BUBBLE_RADIUS * 2 + BUBBLE_RADIUS + offset,
                            y: newRow * BUBBLE_RADIUS * 1.7 + BUBBLE_RADIUS,
                            color: proj.color,
                            matched: false
                        });

                        projectiles.splice(projIndex, 1);

                        // Check for matches
                        checkMatches();

                        break;
                    }
                }

                // Check if out of bounds
                if (proj.y < BUBBLE_RADIUS) {
                    projectiles.splice(projIndex, 1);
                }
            });
        }

        function checkMatches() {
            const newBubbles = bubbles.map(b => ({ ...b, visited: false }));
            let matchFound = false;

            bubbles.forEach((bubble, index) => {
                if (bubble.matched || newBubbles[index].visited) return;

                const matches = findMatches(bubble.color, index, newBubbles);

                if (matches.length >= 3) {
                    matchFound = true;
                    matches.forEach(matchIndex => {
                        bubbles[matchIndex].matched = true;
                        createParticles(bubbles[matchIndex].x, bubbles[matchIndex].y, bubbles[matchIndex].color);
                    });

                    score += matches.length * 10;
                    scoreDisplay.textContent = score;

                    // Check for level up
                    if (score >= level * 500) {
                        level++;
                        levelDisplay.textContent = level;
                    }
                }
            });

            // Remove matched bubbles
            if (matchFound) {
                bubbles = bubbles.filter(b => !b.matched);

                // Check game over
                if (bubbles.length === 0) {
                    initGame();
                    level++;
                    levelDisplay.textContent = level;
                }

                // Check if bubbles reached bottom
                const lowestBubble = Math.max(...bubbles.map(b => b.y));
                if (lowestBubble > canvas.height - BUBBLE_RADIUS * 3) {
                    endGame();
                }
            }
        }

        function findMatches(color, index, visitedBubbles) {
            const matches = [index];
            const queue = [index];
            visitedBubbles[index].visited = true;

            while (queue.length > 0) {
                const currentIndex = queue.shift();
                const currentBubble = bubbles[currentIndex];

                bubbles.forEach((bubble, i) => {
                    if (bubble.matched || visitedBubbles[i].visited || bubble.color !== color) return;

                    const dx = currentBubble.x - bubble.x;
                    const dy = currentBubble.y - bubble.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < BUBBLE_RADIUS * 2.5) {
                        visitedBubbles[i].visited = true;
                        matches.push(i);
                        queue.push(i);
                    }
                });
            }

            return matches;
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 10; i++) {
                const angle = (Math.PI * 2 / 10) * i;
                const speed = Math.random() * 3 + 2;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: Math.random() * 3 + 2,
                    color: color,
                    life: 1
                });
            }
        }

        function endGame() {
            gameRunning = false;
            finalScoreDisplay.textContent = score;
            gameOverScreen.style.display = 'block';
        }

        function gameLoop() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBubbles();
            drawShooter();
            drawProjectiles();
            drawParticles();
            checkCollisions();

            requestAnimationFrame(gameLoop);
        }

        // Event listeners
        canvas.addEventListener('click', (e) => {
            if (!gameRunning) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const angle = Math.atan2(canvas.height - e.clientY + rect.top, x - shooter.x);

            // Update projectile direction
            if (projectiles.length === 0) {
                projectiles.push({
                    x: shooter.x,
                    y: shooter.y,
                    vx: Math.cos(angle) * 8,
                    vy: Math.sin(angle) * 8,
                    color: shooter.color
                });

                shooter.color = nextBubbleColor;
                nextBubbleColor = COLORS[Math.floor(Math.random() * 4)];
            }
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            if (!gameRunning) return;
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const angle = Math.atan2(canvas.height - touch.clientY + rect.top, x - shooter.x);

            if (projectiles.length === 0) {
                projectiles.push({
                    x: shooter.x,
                    y: shooter.y,
                    vx: Math.cos(angle) * 8,
                    vy: Math.sin(angle) * 8,
                    color: shooter.color
                });

                shooter.color = nextBubbleColor;
                nextBubbleColor = COLORS[Math.floor(Math.random() * 4)];
            }
        });

        startBtn.addEventListener('click', () => {
            startScreen.style.display = 'none';
            initGame();
            gameRunning = true;
            gameLoop();
        });

        restartBtn.addEventListener('click', () => {
            gameOverScreen.style.display = 'none';
            initGame();
            gameRunning = true;
            gameLoop();
        });

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                canvas.requestFullscreen();
            }
        });

        // Update projectile movement
        setInterval(() => {
            if (!gameRunning) return;

            projectiles.forEach(proj => {
                proj.x += proj.vx;
                proj.y += proj.vy;
            });
        }, 16);
    </script>
</body>
</html>
