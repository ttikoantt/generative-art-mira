<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Tap Rush - タップラッシュ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            touch-action: manipulation;
            min-height: 100vh;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: #fff;
            margin-bottom: 20px;
        }

        .score-display {
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .time-display {
            font-size: 24px;
            margin-top: 10px;
            color: #ffd700;
        }

        .game-area {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 400px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .target {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #ee5a5a);
            border: 4px solid #fff;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s ease;
            animation: pulse 1s ease-in-out infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }

        .target:active {
            transform: scale(0.95);
        }

        .target.tapped {
            animation: explode 0.3s ease-out forwards;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .tap-effect {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.8), transparent);
            pointer-events: none;
            animation: ripple 0.5s ease-out forwards;
        }

        @keyframes ripple {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .score-popup {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }

        .start-screen, .end-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            z-index: 100;
        }

        .start-screen h1, .end-screen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
        }

        .start-screen p, .end-screen p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .btn {
            padding: 15px 50px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .final-score {
            font-size: 72px;
            font-weight: bold;
            color: #ffd700;
            margin: 20px 0;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            z-index: 50;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .combo {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <div class="header">
            <div class="score-display">スコア: <span id="score">0</span></div>
            <div class="time-display">残り時間: <span id="time">30</span>秒</div>
        </div>

        <div class="game-area" id="gameArea">
            <div class="start-screen" id="startScreen">
                <h1>🎯 Tap Rush</h1>
                <p>円をタップしてスコアを稼ごう！<br>コンボで高得点！</p>
                <button class="btn" onclick="startGame()">スタート</button>
            </div>

            <div class="end-screen" id="endScreen" style="display: none;">
                <h1>🎉 終了！</h1>
                <div class="final-score" id="finalScore">0</div>
                <p>最大コンボ: <span id="maxCombo">0</span></p>
                <button class="btn" onclick="startGame()">もう一度</button>
            </div>

            <div class="combo" id="comboDisplay" style="display: none;">
                コンボ: <span id="comboCount">0</span>
            </div>
        </div>
    </div>

    <script>
        let score = 0;
        let timeLeft = 30;
        let combo = 0;
        let maxCombo = 0;
        let gameInterval;
        let spawnInterval;
        let targetCount = 0;

        function startGame() {
            score = 0;
            timeLeft = 30;
            combo = 0;
            maxCombo = 0;
            targetCount = 0;

            document.getElementById('score').textContent = score;
            document.getElementById('time').textContent = timeLeft;
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('endScreen').style.display = 'none';
            document.getElementById('comboDisplay').style.display = 'block';
            document.getElementById('comboCount').textContent = combo;

            clearTargets();

            gameInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('time').textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            spawnTarget();
            spawnInterval = setInterval(spawnTarget, 800);
        }

        function endGame() {
            clearInterval(gameInterval);
            clearInterval(spawnInterval);

            document.getElementById('finalScore').textContent = score;
            document.getElementById('maxCombo').textContent = maxCombo;
            document.getElementById('endScreen').style.display = 'flex';
            document.getElementById('comboDisplay').style.display = 'none';

            clearTargets();
        }

        function clearTargets() {
            const targets = document.querySelectorAll('.target');
            targets.forEach(t => t.remove());
        }

        function spawnTarget() {
            if (timeLeft <= 0) return;

            const gameArea = document.getElementById('gameArea');
            const target = document.createElement('div');
            target.className = 'target';

            const maxX = gameArea.offsetWidth - 80;
            const maxY = gameArea.offsetHeight - 80;

            target.style.left = Math.random() * maxX + 'px';
            target.style.top = Math.random() * maxY + 'px';

            target.onclick = (e) => handleTap(e, target);
            target.ontouchstart = (e) => {
                e.preventDefault();
                handleTap(e, target);
            };

            gameArea.appendChild(target);
            targetCount++;

            // 古いターゲットを削除
            const targets = document.querySelectorAll('.target');
            if (targets.length > 10) {
                targets[0].remove();
                targetCount--;
                combo = 0; // コンボリセット
                document.getElementById('comboCount').textContent = combo;
            }
        }

        function handleTap(e, target) {
            if (target.classList.contains('tapped')) return;

            target.classList.add('tapped');

            combo++;
            if (combo > maxCombo) maxCombo = combo;
            document.getElementById('comboCount').textContent = combo;

            // スコア計算（コンボボーナス付き）
            const points = 10 + Math.floor(combo / 5) * 5;
            score += points;
            document.getElementById('score').textContent = score;

            // エフェクト
            createTapEffect(e.clientX || e.touches[0].clientX, e.clientY || e.touches[0].clientY);
            createScorePopup(target, points);

            setTimeout(() => {
                target.remove();
                targetCount--;
            }, 300);
        }

        function createTapEffect(x, y) {
            const effect = document.createElement('div');
            effect.className = 'tap-effect';
            effect.style.left = (x - 50) + 'px';
            effect.style.top = (y - 50) + 'px';
            document.body.appendChild(effect);

            setTimeout(() => effect.remove(), 500);
        }

        function createScorePopup(target, points) {
            const rect = target.getBoundingClientRect();
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.textContent = '+' + points;
            popup.style.left = rect.left + rect.width / 2 + 'px';
            popup.style.top = rect.top + 'px';
            document.body.appendChild(popup);

            setTimeout(() => popup.remove(), 800);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
