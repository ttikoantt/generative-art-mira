<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Hunt Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: white;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .target-color {
            font-size: 3em;
            font-weight: bold;
            color: white;
            margin: 20px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #764ba2;
        }

        .timer-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff87, #60efff);
            transition: width 0.1s linear;
            border-radius: 4px;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .color-tile {
            aspect-ratio: 1;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            border: 3px solid white;
            position: relative;
            overflow: hidden;
        }

        .color-tile:active {
            transform: scale(0.95);
        }

        .color-tile.correct {
            animation: correctPulse 0.5s;
        }

        .color-tile.wrong {
            animation: wrongShake 0.5s;
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); box-shadow: 0 0 20px rgba(255, 255, 255, 0.8); }
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .color-name {
            position: absolute;
            bottom: 5px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.8em;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            padding: 5px;
            background: rgba(0, 0, 0, 0.3);
        }

        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .game-over.show {
            display: flex;
        }

        .game-over-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            animation: slideIn 0.5s;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .game-over h2 {
            color: #764ba2;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 4em;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }

        .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .restart-btn:hover {
            transform: scale(1.05);
        }

        .fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid white;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            z-index: 10;
        }

        .combo-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4em;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            pointer-events: none;
            opacity: 0;
            z-index: 50;
        }

        .combo-display.show {
            animation: comboPop 0.8s;
        }

        @keyframes comboPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8em; }
            .target-color { font-size: 2em; }
            .color-grid { gap: 10px; }
            .stat-value { font-size: 1.5em; }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <div class="container">
        <h1>🎨 Color Hunt</h1>
        <div class="target-color" id="targetColor">赤</div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Combo</div>
                <div class="stat-value" id="combo">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">High Score</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>

        <div class="timer-bar">
            <div class="timer-fill" id="timerFill"></div>
        </div>

        <div class="color-grid" id="colorGrid"></div>
    </div>

    <div class="combo-display" id="comboDisplay"></div>

    <div class="game-over" id="gameOver">
        <div class="game-over-content">
            <h2>Game Over!</h2>
            <div class="final-score" id="finalScore">0</div>
            <p style="color: #666; margin-bottom: 20px;">Great job! 🎉</p>
            <button class="restart-btn" onclick="restartGame()">Play Again</button>
        </div>
    </div>

    <script>
        // Color definitions
        const colors = [
            { name: '赤', color: '#FF6B6B' },
            { name: '青', color: '#4ECDC4' },
            { name: '緑', color: '#95E1D3' },
            { name: '黄', color: '#FFD93D' },
            { name: '紫', color: '#C44569' },
            { name: 'オレンジ', color: '#FF8B94' },
            { name: 'ピンク', color: '#FCBAD3' },
            { name: '水色', color: '#A8E6CF' },
            { name: '茶色', color: '#8B7355' },
            { name: '灰色', color: '#95A5A6' },
            { name: '黒', color: '#2C3E50' },
            { name: '白', color: '#ECF0F1' }
        ];

        // Game state
        let score = 0;
        let combo = 0;
        let highScore = parseInt(localStorage.getItem('colorHuntHighScore')) || 0;
        let timeLeft = 60;
        let maxTime = 60;
        let targetColorIndex = 0;
        let gameInterval;
        let timerInterval;

        // DOM elements
        const scoreEl = document.getElementById('score');
        const comboEl = document.getElementById('combo');
        const highScoreEl = document.getElementById('highScore');
        const targetColorEl = document.getElementById('targetColor');
        const colorGridEl = document.getElementById('colorGrid');
        const timerFillEl = document.getElementById('timerFill');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const comboDisplayEl = document.getElementById('comboDisplay');

        // Initialize
        highScoreEl.textContent = highScore;
        startNewRound();

        function startNewRound() {
            // Generate new color grid
            colorGridEl.innerHTML = '';

            // Select target color (ensure it's in the grid)
            targetColorIndex = Math.floor(Math.random() * colors.length);
            const targetColor = colors[targetColorIndex];
            targetColorEl.textContent = targetColor.name;
            targetColorEl.style.color = targetColor.color;

            // Create color tiles
            const gridColors = [];
            gridColors.push(targetColor); // Always include target

            // Add random colors
            while (gridColors.length < 9) {
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                gridColors.push(randomColor);
            }

            // Shuffle
            for (let i = gridColors.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [gridColors[i], gridColors[j]] = [gridColors[j], gridColors[i]];
            }

            // Create tiles
            gridColors.forEach((colorObj, index) => {
                const tile = document.createElement('div');
                tile.className = 'color-tile';
                tile.style.background = colorObj.color;
                tile.innerHTML = `<span class="color-name">${colorObj.name}</span>`;
                tile.onclick = () => selectColor(colorObj, tile);
                colorGridEl.appendChild(tile);
            });
        }

        function selectColor(selectedColor, tileElement) {
            const targetColor = colors[targetColorIndex];

            if (selectedColor.name === targetColor.name) {
                // Correct!
                combo++;
                const points = 10 + (combo * 2);
                score += points;

                // Show combo
                if (combo > 1) {
                    showCombo(`${combo}x COMBO!`);
                }

                // Bonus time
                timeLeft = Math.min(timeLeft + 2, maxTime);

                // Visual feedback
                tileElement.classList.add('correct');
                setTimeout(() => {
                    tileElement.classList.remove('correct');
                    startNewRound();
                }, 300);

            } else {
                // Wrong!
                combo = 0;
                timeLeft -= 5; // Penalty
                if (timeLeft < 0) timeLeft = 0;

                // Visual feedback
                tileElement.classList.add('wrong');
                setTimeout(() => {
                    tileElement.classList.remove('wrong');
                }, 500);
            }

            updateUI();
        }

        function showCombo(text) {
            comboDisplayEl.textContent = text;
            comboDisplayEl.classList.remove('show');
            void comboDisplayEl.offsetWidth; // Trigger reflow
            comboDisplayEl.classList.add('show');
        }

        function updateUI() {
            scoreEl.textContent = score;
            comboEl.textContent = combo;

            const percentage = (timeLeft / maxTime) * 100;
            timerFillEl.style.width = percentage + '%';

            // Change color based on time
            if (percentage < 20) {
                timerFillEl.style.background = 'linear-gradient(90deg, #ff6b6b, #ee5a6f)';
            } else if (percentage < 50) {
                timerFillEl.style.background = 'linear-gradient(90deg, #ffd93d, #f9ca24)';
            } else {
                timerFillEl.style.background = 'linear-gradient(90deg, #00ff87, #60efff)';
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                updateUI();

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 100);
        }

        function endGame() {
            clearInterval(timerInterval);

            // Update high score
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('colorHuntHighScore', highScore);
            }

            finalScoreEl.textContent = score;
            gameOverEl.classList.add('show');
        }

        function restartGame() {
            score = 0;
            combo = 0;
            timeLeft = maxTime;
            gameOverEl.classList.remove('show');

            highScore = parseInt(localStorage.getItem('colorHuntHighScore')) || 0;
            highScoreEl.textContent = highScore;

            updateUI();
            startNewRound();
            startTimer();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Start the game timer
        startTimer();
        updateUI();
    </script>
</body>
</html>
