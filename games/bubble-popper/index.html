<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bubble Popper #834</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: manipulation;
        }

        #gameCanvas {
            display: block;
            touch-action: none;
        }

        .ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        .score-container {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 25px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .timer-container {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 25px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h1 {
            color: white;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .overlay p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 20px;
            margin-bottom: 30px;
        }

        .overlay .final-score {
            color: #ffd700;
            font-size: 64px;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
            pointer-events: auto;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            z-index: 10;
            font-size: 14px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }

        .combo {
            position: fixed;
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            animation: comboFade 0.5s ease-out forwards;
            z-index: 50;
        }

        @keyframes comboFade {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px) scale(1.5);
            }
        }

        .pop-score {
            position: fixed;
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            animation: scoreFade 0.8s ease-out forwards;
            z-index: 50;
        }

        @keyframes scoreFade {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-80px);
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="ui">
        <div class="score-container">
            スコア: <span id="score">0</span>
        </div>
        <div class="timer-container">
            残り: <span id="timer">30</span>秒
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div id="startOverlay" class="overlay">
        <h1>🫧 Bubble Popper</h1>
        <p>浮かぶ泡をタップして割れ！</p>
        <button class="btn" onclick="startGame()">スタート</button>
    </div>

    <div id="gameOverOverlay" class="overlay hidden">
        <h1>ゲーム終了！</h1>
        <p>最終スコア</p>
        <div class="final-score" id="finalScore">0</div>
        <button class="btn" onclick="startGame()">もう一度</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let bubbles = [];
        let score = 0;
        let timeLeft = 30;
        let gameRunning = false;
        let gameTimer = null;
        let bubbleSpawnTimer = null;
        let combo = 0;
        let lastPopTime = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Bubble {
            constructor() {
                this.radius = Math.random() * 40 + 30;
                this.x = Math.random() * (width - this.radius * 2) + this.radius;
                this.y = height + this.radius;
                this.speed = Math.random() * 2 + 1.5;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = Math.random() * 0.05 + 0.02;
                this.hue = Math.random() * 60 + 180; // Blue-cyan range
                this.alpha = 0;
                this.fadeIn = true;
                this.popped = false;
                this.particles = [];
            }

            update() {
                this.wobble += this.wobbleSpeed;
                this.y -= this.speed;

                // Fade in
                if (this.fadeIn) {
                    this.alpha += 0.05;
                    if (this.alpha >= 0.7) {
                        this.alpha = 0.7;
                        this.fadeIn = false;
                    }
                }

                // Update particles if popped
                if (this.popped) {
                    this.particles.forEach(p => {
                        p.x += p.vx;
                        p.y += p.vy;
                        p.vy += 0.2;
                        p.life -= 0.02;
                    });
                    this.particles = this.particles.filter(p => p.life > 0);
                }
            }

            draw() {
                if (this.popped && this.particles.length === 0) return;

                if (!this.popped) {
                    ctx.save();
                    ctx.globalAlpha = this.alpha;

                    // Bubble body
                    const gradient = ctx.createRadialGradient(
                        this.x - this.radius * 0.3,
                        this.y - this.radius * 0.3,
                        0,
                        this.x,
                        this.y,
                        this.radius
                    );
                    gradient.addColorStop(0, `hsla(${this.hue}, 70%, 95%, 0.9)`);
                    gradient.addColorStop(0.5, `hsla(${this.hue}, 60%, 70%, 0.6)`);
                    gradient.addColorStop(1, `hsla(${this.hue}, 50%, 50%, 0.3)`);

                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fill();

                    // Shine
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                    ctx.beginPath();
                    ctx.arc(
                        this.x - this.radius * 0.3,
                        this.y - this.radius * 0.3,
                        this.radius * 0.2,
                        0,
                        Math.PI * 2
                    );
                    ctx.fill();

                    // Border
                    ctx.strokeStyle = `hsla(${this.hue}, 60%, 60%, 0.5)`;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.stroke();

                    ctx.restore();
                }

                // Draw particles
                this.particles.forEach(p => {
                    ctx.save();
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = `hsl(${p.hue}, 70%, 70%)`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                });
            }

            contains(px, py) {
                if (this.popped) return false;
                const dx = px - this.x;
                const dy = py - this.y;
                return Math.sqrt(dx * dx + dy * dy) < this.radius;
            }

            pop() {
                if (this.popped) return;
                this.popped = true;

                // Create particles
                for (let i = 0; i < 15; i++) {
                    const angle = (Math.PI * 2 / 15) * i;
                    const speed = Math.random() * 4 + 2;
                    this.particles.push({
                        x: this.x,
                        y: this.y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        size: Math.random() * 4 + 2,
                        hue: this.hue + Math.random() * 30,
                        life: 1
                    });
                }

                // Play sound effect (visual feedback)
                createPopEffect(this.x, this.y);
            }

            isOffScreen() {
                return this.y < -this.radius || (this.popped && this.particles.length === 0);
            }
        }

        function createBubble() {
            bubbles.push(new Bubble());
        }

        function createPopEffect(x, y) {
            // Visual pop effect
            const effect = document.createElement('div');
            effect.className = 'pop-score';
            effect.textContent = '+' + Math.floor(10 + (1 / bubbles[0].radius) * 100);
            effect.style.left = x + 'px';
            effect.style.top = y + 'px';
            document.body.appendChild(effect);
            setTimeout(() => effect.remove(), 800);
        }

        function showCombo(x, y) {
            if (combo < 2) return;
            const effect = document.createElement('div');
            effect.className = 'combo';
            effect.textContent = combo + ' Combo!';
            effect.style.left = x + 'px';
            effect.style.top = y + 'px';
            document.body.appendChild(effect);
            setTimeout(() => effect.remove(), 500);
        }

        function handleInput(x, y) {
            if (!gameRunning) return;

            for (let i = bubbles.length - 1; i >= 0; i--) {
                if (bubbles[i].contains(x, y)) {
                    const bubble = bubbles[i];
                    bubble.pop();

                    const now = Date.now();
                    if (now - lastPopTime < 1000) {
                        combo++;
                    } else {
                        combo = 1;
                    }
                    lastPopTime = now;

                    const baseScore = Math.floor(100 - bubble.radius);
                    const comboBonus = combo > 1 ? combo * 10 : 0;
                    const points = baseScore + comboBonus;
                    score += points;

                    document.getElementById('score').textContent = score;
                    showCombo(x, y);

                    break;
                }
            }
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            combo = 0;
            bubbles = [];
            gameRunning = true;

            document.getElementById('score').textContent = score;
            document.getElementById('timer').textContent = timeLeft;
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');

            // Start spawning bubbles
            bubbleSpawnTimer = setInterval(() => {
                if (gameRunning) {
                    createBubble();
                    if (Math.random() > 0.7) {
                        createBubble();
                    }
                }
            }, 800);

            // Start game timer
            gameTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameRunning = false;
            clearInterval(gameTimer);
            clearInterval(bubbleSpawnTimer);

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);

            bubbles = bubbles.filter(b => !b.isOffScreen());
            bubbles.forEach(bubble => {
                bubble.update();
                bubble.draw();
            });

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        }

        // Event listeners
        window.addEventListener('resize', resize);

        canvas.addEventListener('click', (e) => {
            handleInput(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleInput(touch.clientX, touch.clientY);
        });

        // Initial setup
        resize();
        animate();
    </script>
</body>
</html>
