<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falling Stars Catch Game - 落下キャッチゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a0a2e 0%, #2a1a4e 50%, #1a0a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 1.8rem;
            text-shadow: 0 0 20px rgba(255, 255, 100, 0.5);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .score-box, .lives-box {
            color: #fff;
            font-size: 1.1rem;
        }

        .score-box span, .lives-box span {
            font-weight: bold;
            color: #ffd700;
        }

        #canvas {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
            max-width: 100%;
            touch-action: none;
            display: block;
            margin: 0 auto;
        }

        .info {
            color: rgba(255, 255, 255, 0.5);
            margin-top: 15px;
            font-size: 0.8rem;
        }

        .fullscreen-btn {
            margin-top: 15px;
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.4rem;
            }

            .game-header {
                font-size: 0.9rem;
                padding: 8px 12px;
            }

            .fullscreen-btn {
                padding: 12px 28px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⭐ Falling Stars</h1>
        <p class="subtitle">落下する星をキャッチ！</p>

        <div class="game-header">
            <div class="score-box">スコア: <span id="score">0</span></div>
            <div class="lives-box">ライフ: <span id="lives">3</span></div>
        </div>

        <canvas id="canvas" width="500" height="600"></canvas>
        <p class="info">左右にスワイプ/マウスで移動</p>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');

        let basketX = canvas.width / 2 - 40;
        let basketWidth = 80;
        let basketHeight = 20;
        let score = 0;
        let lives = 3;
        let gameOver = false;
        let fallingObjects = [];
        let mouseX = canvas.width / 2;

        const basketColor = '#ffd700';
        const starColor = '#ffff00';

        class FallingObject {
            constructor() {
                this.x = Math.random() * (canvas.width - 20);
                this.y = -20;
                this.size = Math.random() * 15 + 10;
                this.speed = Math.random() * 2 + 2 + (score / 50); // Speed increases with score
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.2;
                this.isStar = Math.random() > 0.2; // 80% stars, 20% bombs
            }

            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                if (this.isStar) {
                    // Draw star
                    ctx.fillStyle = starColor;
                    ctx.shadowColor = '#ffff00';
                    ctx.shadowBlur = 15;
                    this.drawStar(0, 0, 5, this.size, this.size / 2);
                } else {
                    // Draw bomb
                    ctx.fillStyle = '#ff4444';
                    ctx.shadowColor = '#ff0000';
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            }

            drawStar(cx, cy, spikes, outerRadius, innerRadius) {
                let rot = Math.PI / 2 * 3;
                let x = cx;
                let y = cy;
                const step = Math.PI / spikes;

                ctx.beginPath();
                ctx.moveTo(cx, cy - outerRadius);

                for (let i = 0; i < spikes; i++) {
                    x = cx + Math.cos(rot) * outerRadius;
                    y = cy + Math.sin(rot) * outerRadius;
                    ctx.lineTo(x, y);
                    rot += step;

                    x = cx + Math.cos(rot) * innerRadius;
                    y = cy + Math.sin(rot) * innerRadius;
                    ctx.lineTo(x, y);
                    rot += step;
                }

                ctx.lineTo(cx, cy - outerRadius);
                ctx.closePath();
                ctx.fill();
            }
        }

        function drawBasket() {
            ctx.fillStyle = basketColor;
            ctx.shadowColor = '#ffa500';
            ctx.shadowBlur = 20;
            ctx.fillRect(basketX, canvas.height - 40, basketWidth, basketHeight);

            // Basket detail
            ctx.strokeStyle = '#ffa500';
            ctx.lineWidth = 2;
            ctx.strokeRect(basketX, canvas.height - 40, basketWidth, basketHeight);
        }

        function spawnObject() {
            if (!gameOver && Math.random() < 0.03 + (score / 1000)) {
                fallingObjects.push(new FallingObject());
            }
        }

        function checkCollisions() {
            fallingObjects = fallingObjects.filter(obj => {
                // Check if caught by basket
                if (obj.y + obj.size / 2 >= canvas.height - 40 &&
                    obj.y - obj.size / 2 <= canvas.height - 20 &&
                    obj.x >= basketX &&
                    obj.x <= basketX + basketWidth) {

                    if (obj.isStar) {
                        score += 10;
                        scoreEl.textContent = score;
                    } else {
                        lives--;
                        livesEl.textContent = lives;
                        if (lives <= 0) {
                            endGame();
                        }
                    }
                    return false;
                }

                // Check if missed
                if (obj.y > canvas.height) {
                    if (obj.isStar) {
                        lives--;
                        livesEl.textContent = lives;
                        if (lives <= 0) {
                            endGame();
                        }
                    }
                    return false;
                }

                return true;
            });
        }

        function endGame() {
            gameOver = true;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Game Over!', canvas.width / 2, canvas.height / 2 - 40);

            ctx.font = '24px Arial';
            ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2 + 10);

            ctx.font = '18px Arial';
            ctx.fillStyle = '#ffd700';
            ctx.fillText('タップでリスタート', canvas.width / 2, canvas.height / 2 + 60);

            setTimeout(() => {
                canvas.addEventListener('click', restartGame, { once: true });
                canvas.addEventListener('touchstart', restartGame, { once: true });
            }, 1000);
        }

        function restartGame() {
            score = 0;
            lives = 3;
            gameOver = false;
            fallingObjects = [];
            scoreEl.textContent = score;
            livesEl.textContent = lives;
            gameLoop();
        }

        function gameLoop() {
            if (gameOver) return;

            // Clear canvas
            ctx.fillStyle = 'rgba(26, 10, 46, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw stars background
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            for (let i = 0; i < 50; i++) {
                const x = (i * 37) % canvas.width;
                const y = (i * 23 + Date.now() / 50) % canvas.height;
                ctx.fillRect(x, y, 2, 2);
            }

            // Draw basket
            drawBasket();

            // Update and draw objects
            fallingObjects.forEach(obj => {
                obj.update();
                obj.draw();
            });

            // Check collisions
            checkCollisions();

            // Spawn new objects
            spawnObject();

            requestAnimationFrame(gameLoop);
        }

        // Mouse move
        canvas.addEventListener('mousemove', (e) => {
            if (gameOver) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            mouseX = (e.clientX - rect.left) * scaleX;
            basketX = Math.max(0, Math.min(canvas.width - basketWidth, mouseX - basketWidth / 2));
        });

        // Touch support
        canvas.addEventListener('touchmove', (e) => {
            if (gameOver) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const touch = e.touches[0];
            const x = (touch.clientX - rect.left) * scaleX;
            basketX = Math.max(0, Math.min(canvas.width - basketWidth, x - basketWidth / 2));
        });

        canvas.addEventListener('touchstart', (e) => {
            if (gameOver) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const touch = e.touches[0];
            const x = (touch.clientX - rect.left) * scaleX;
            basketX = Math.max(0, Math.min(canvas.width - basketWidth, x - basketWidth / 2));
        });

        // Resize handler
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 500);
            const maxHeight = Math.min(window.innerHeight - 200, 600);
            canvas.style.width = maxWidth + 'px';
            canvas.style.height = maxHeight + 'px';
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Start game
        gameLoop();
    </script>
</body>
</html>
