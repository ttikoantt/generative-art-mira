<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Confusion - ストロープ効果ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: white;
            font-size: 32px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .score-board {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-around;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .score-item span {
            display: block;
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .question-text {
            font-size: 64px;
            font-weight: bold;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .question-instruction {
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
        }

        .timer-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #8bc34a);
            transition: width 0.1s linear;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .option-btn {
            padding: 25px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .option-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .option-btn:active {
            transform: translateY(0);
        }

        .start-screen, .game-over-screen {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .start-screen h2, .game-over-screen h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #667eea;
        }

        .start-screen p, .game-over-screen p {
            font-size: 16px;
            color: #666;
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .start-btn, .restart-btn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .start-btn:hover, .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .hidden {
            display: none;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 24px;
            }

            .question-text {
                font-size: 48px;
            }

            .options {
                grid-template-columns: 1fr;
            }

            .option-btn {
                padding: 20px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🎨 Color Confusion</h1>

        <!-- スタート画面 -->
        <div id="startScreen" class="start-screen">
            <h2>ストロープ効果ゲーム</h2>
            <p>表示される<strong>色の名前</strong>ではなく、<strong>実際の色</strong>を選んでください！</p>
            <p>例: 「<strong style="color: blue;">赤</strong>」と表示されていても、<br>文字が<strong>青色</strong>なら「青」を選びます</p>
            <p>⏱️ 制限時間: 2秒/問</p>
            <p>❌ 3回間違えたらゲームオーバー</p>
            <button class="start-btn" onclick="startGame()">スタート</button>
        </div>

        <!-- ゲーム画面 -->
        <div id="gameScreen" class="hidden">
            <div class="score-board">
                <div class="score-item">
                    <span>スコア</span>
                    <div id="score">0</div>
                </div>
                <div class="score-item">
                    <span>ハイスコア</span>
                    <div id="highScore">0</div>
                </div>
                <div class="score-item">
                    <span>残機</span>
                    <div id="lives">❤️❤️❤️</div>
                </div>
            </div>

            <div class="question-card">
                <div class="timer-bar">
                    <div class="timer-fill" id="timerFill"></div>
                </div>
                <div class="question-instruction">この文字の<strong>色</strong>を選んで！</div>
                <div class="question-text" id="questionText">赤</div>
            </div>

            <div class="options" id="options"></div>
        </div>

        <!-- ゲームオーバー画面 -->
        <div id="gameOverScreen" class="game-over-screen hidden">
            <h2>ゲームオーバー！</h2>
            <p>スコア: <strong id="finalScore">0</strong></p>
            <p>ハイスコア: <strong id="finalHighScore">0</strong></p>
            <p id="newRecord" class="hidden" style="color: #ff6b6b; font-size: 20px; margin: 10px 0;">🎉 新記録達成！</p>
            <button class="restart-btn" onclick="startGame()">もう一度</button>
        </div>
    </div>

    <script>
        const COLORS = [
            { name: '赤', color: '#ff4444', english: 'red' },
            { name: '青', color: '#4444ff', english: 'blue' },
            { name: '緑', color: '#44ff44', english: 'green' },
            { name: '黄', color: '#ffff44', english: 'yellow' },
            { name: '紫', color: '#aa44ff', english: 'purple' },
            { name: 'オレンジ', color: '#ff8844', english: 'orange' }
        ];

        let score = 0;
        let highScore = localStorage.getItem('colorConfusionHighScore') || 0;
        let lives = 3;
        let currentQuestion = null;
        let timer = null;
        let timeLeft = 2000;
        let maxTime = 2000;

        function shuffle(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function generateQuestion() {
            // ランダムに色を選択
            const textColor = COLORS[Math.floor(Math.random() * COLORS.length)];
            const actualColor = COLORS[Math.floor(Math.random() * COLORS.length)];

            // 異なる色になるように
            while (textColor.english === actualColor.english) {
                actualColor = COLORS[Math.floor(Math.random() * COLORS.length)];
            }

            // 選択肢を生成（正解 + 3つのダミー）
            const options = [actualColor];
            while (options.length < 4) {
                const randomColor = COLORS[Math.floor(Math.random() * COLORS.length)];
                if (!options.includes(randomColor)) {
                    options.push(randomColor);
                }
            }

            return {
                text: textColor.name,
                textColor: actualColor.color,
                correctAnswer: actualColor,
                options: shuffle(options)
            };
        }

        function displayQuestion() {
            currentQuestion = generateQuestion();

            const questionText = document.getElementById('questionText');
            questionText.textContent = currentQuestion.text;
            questionText.style.color = currentQuestion.textColor;

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';

            currentQuestion.options.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.style.background = option.color;
                btn.textContent = option.name;
                btn.onclick = () => checkAnswer(option);
                optionsDiv.appendChild(btn);
            });

            startTimer();
        }

        function startTimer() {
            timeLeft = maxTime;
            updateTimer();

            if (timer) clearInterval(timer);
            timer = setInterval(() => {
                timeLeft -= 100;
                updateTimer();

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    handleTimeout();
                }
            }, 100);
        }

        function updateTimer() {
            const percentage = (timeLeft / maxTime) * 100;
            const timerFill = document.getElementById('timerFill');
            timerFill.style.width = percentage + '%';

            // 色を変える
            if (percentage < 30) {
                timerFill.style.background = '#ff4444';
            } else if (percentage < 60) {
                timerFill.style.background = '#ffaa44';
            } else {
                timerFill.style.background = 'linear-gradient(90deg, #4caf50, #8bc34a)';
            }
        }

        function checkAnswer(selected) {
            clearInterval(timer);

            if (selected.english === currentQuestion.correctAnswer.english) {
                // 正解
                score += 10;
                document.getElementById('score').textContent = score;
                displayQuestion();
            } else {
                // 不正解
                lives--;
                updateLives();
                
                if (lives <= 0) {
                    gameOver();
                } else {
                    displayQuestion();
                }
            }
        }

        function handleTimeout() {
            lives--;
            updateLives();
            
            if (lives <= 0) {
                gameOver();
            } else {
                displayQuestion();
            }
        }

        function updateLives() {
            const livesDiv = document.getElementById('lives');
            livesDiv.textContent = '❤️'.repeat(lives) + '🖤'.repeat(3 - lives);
        }

        function gameOver() {
            clearInterval(timer);

            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.remove('hidden');

            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalHighScore').textContent = highScore;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('colorConfusionHighScore', highScore);
                document.getElementById('newRecord').classList.remove('hidden');
                document.getElementById('finalHighScore').textContent = highScore;
            } else {
                document.getElementById('newRecord').classList.add('hidden');
            }
        }

        function startGame() {
            score = 0;
            lives = 3;
            
            document.getElementById('score').textContent = score;
            document.getElementById('highScore').textContent = highScore;
            updateLives();

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');

            displayQuestion();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
