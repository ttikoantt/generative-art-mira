<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letter Rain - 文字キャッチゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 600px;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
            cursor: pointer;
        }

        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        .start-screen, .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            border-radius: 10px;
            z-index: 100;
        }

        .start-screen h1, .game-over-screen h1 {
            font-size: 32px;
            margin-bottom: 20px;
            text-align: center;
            color: #667eea;
        }

        .start-screen p, .game-over-screen p {
            font-size: 16px;
            margin-bottom: 30px;
            text-align: center;
            max-width: 80%;
        }

        .start-btn {
            background: linear-gradient(to right, #667eea, #764ba2);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 25px;
            transition: transform 0.2s;
            pointer-events: auto;
        }

        .start-btn:hover {
            transform: scale(1.1);
        }

        .fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #0f3460;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 10px 15px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 5px;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: #667eea;
            color: #fff;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>

        <div class="hud">
            <div>スコア: <span id="score">0</span></div>
            <div>ライフ: <span id="lives">3</span></div>
        </div>

        <div class="start-screen" id="startScreen">
            <h1>Letter Rain</h1>
            <p>落ちてくる文字をクリックしてキャッチ！<br>同じ文字を連続でキャッチするとボーナス！</p>
            <button class="start-btn" onclick="startGame()">スタート</button>
        </div>

        <div class="game-over-screen hidden" id="gameOverScreen">
            <h1>ゲームオーバー</h1>
            <p>スコア: <span id="finalScore">0</span></p>
            <button class="start-btn" onclick="startGame()">再挑戦</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let letters = [];
        let particles = [];
        let score = 0;
        let lives = 3;
        let gameRunning = false;
        let lastLetter = null;
        let combo = 0;
        let spawnRate = 1000;
        let lastSpawn = 0;
        let difficulty = 1;

        const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

        class Letter {
            constructor() {
                this.char = characters[Math.floor(Math.random() * characters.length)];
                this.x = Math.random() * (canvas.width - 60) + 30;
                this.y = -40;
                this.size = 40;
                this.speed = 2 + Math.random() * 2 + difficulty;
                this.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
                this.rotation = (Math.random() - 0.5) * 0.2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
            }

            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;
                return this.y < canvas.height + 50;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.fillStyle = this.color;
                ctx.font = `bold ${this.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.char, 0, 0);
                ctx.restore();
            }

            contains(x, y) {
                const dx = x - this.x;
                const dy = y - this.y;
                return Math.sqrt(dx * dx + dy * dy) < this.size;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1;
                this.color = color;
                this.size = Math.random() * 8 + 4;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.3;
                this.life -= 0.02;
                return this.life > 0;
            }

            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function spawnLetter() {
            letters.push(new Letter());
        }

        function handleInput(x, y) {
            if (!gameRunning) return;

            const rect = canvas.getBoundingClientRect();
            const canvasX = (x - rect.left) * (canvas.width / rect.width);
            const canvasY = (y - rect.top) * (canvas.height / rect.height);

            for (let i = letters.length - 1; i >= 0; i--) {
                if (letters[i].contains(canvasX, canvasY)) {
                    const letter = letters[i];

                    if (letter.char === lastLetter) {
                        combo++;
                    } else {
                        combo = 1;
                        lastLetter = letter.char;
                    }

                    const points = 10 * combo;
                    score += points;

                    createParticles(letter.x, letter.y, letter.color);
                    letters.splice(i, 1);

                    updateHUD();
                    return;
                }
            }
        }

        canvas.addEventListener('click', (e) => {
            handleInput(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleInput(touch.clientX, touch.clientY);
        });

        function updateHUD() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
        }

        function gameLoop(timestamp) {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 新しい文字をスポーン
            if (timestamp - lastSpawn > spawnRate) {
                spawnLetter();
                lastSpawn = timestamp;
            }

            // 文字を更新
            letters = letters.filter(letter => {
                const alive = letter.update();
                if (!alive) {
                    lives--;
                    combo = 0;
                    lastLetter = null;
                    updateHUD();
                    if (lives <= 0) {
                        gameOver();
                    }
                }
                return alive;
            });

            // 文字を描画
            letters.forEach(letter => letter.draw());

            // パーティクルを更新
            particles = particles.filter(particle => {
                const alive = particle.update();
                if (alive) particle.draw();
                return alive;
            });

            // 難易度を徐々に上げる
            difficulty = 1 + Math.floor(score / 100) * 0.1;
            spawnRate = Math.max(400, 1000 - Math.floor(score / 50) * 50);

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            letters = [];
            particles = [];
            score = 0;
            lives = 3;
            gameRunning = true;
            lastLetter = null;
            combo = 0;
            spawnRate = 1000;
            difficulty = 1;

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            updateHUD();

            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert('全画面表示がサポートされていません');
                });
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        updateHUD();
    </script>
</body>
</html>
