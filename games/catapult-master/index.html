<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catapult Master</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: #fff;
        }

        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 900px;
        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 107, 107, 0.3);
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: bold;
        }

        .info-item span {
            color: #00d9ff;
        }

        #gameCanvas {
            width: 100%;
            max-width: 800px;
            height: 500px;
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(255, 107, 107, 0.2);
            background: linear-gradient(180deg, #1a1a2e 0%, #0f3460 100%);
            cursor: crosshair;
            touch-action: none;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .power-control {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .power-control label {
            font-weight: bold;
        }

        input[type="range"] {
            width: 200px;
            height: 10px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            cursor: pointer;
            border: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 0.85rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: none;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .instructions {
            margin-top: 15px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
        }

        @media (max-width: 768px) {
            #gameCanvas {
                height: 350px;
            }

            button {
                padding: 12px 24px;
                font-size: 0.9rem;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 0.75rem;
            }

            input[type="range"] {
                width: 150px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">📺 全画面</button>

    <div class="container">
        <h1>🎯 Catapult Master</h1>

        <div class="game-info">
            <div class="info-item">スコア: <span id="score">0</span></div>
            <div class="info-item">ラウンド: <span id="round">1</span>/10</div>
            <div class="info-item">ライフ: <span id="lives">5</span></div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div class="controls">
            <button id="fireBtn">🔥 発射！</button>
            <button id="resetBtn">🔄 リセット</button>
        </div>

        <div class="power-control">
            <label for="angle">角度: <span id="angleValue">45</span>°</label>
            <input type="range" id="angle" min="10" max="80" value="45">

            <label for="power">力: <span id="powerValue">15</span></label>
            <input type="range" id="power" min="5" max="25" value="15">
        </div>

        <p class="instructions">角度と力を調整して的を狙おう！的を当てると+10点、外すとライフ-1</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game state
        let score = 0;
        let round = 1;
        let lives = 5;
        let gameOver = false;
        let projectile = null;
        let target = null;
        let animationId = null;

        // Canvas size
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Controls
        const angleSlider = document.getElementById('angle');
        const powerSlider = document.getElementById('power');
        const angleValue = document.getElementById('angleValue');
        const powerValue = document.getElementById('powerValue');
        const fireBtn = document.getElementById('fireBtn');
        const resetBtn = document.getElementById('resetBtn');

        angleSlider.addEventListener('input', () => {
            angleValue.textContent = angleSlider.value;
            draw();
        });

        powerSlider.addEventListener('input', () => {
            powerValue.textContent = powerSlider.value;
            draw();
        });

        // Catapult position
        const catapult = {
            x: 80,
            y: 0, // Will be set based on canvas height
            width: 60,
            height: 40
        };

        // Initialize game
        function initGame() {
            score = 0;
            round = 1;
            lives = 5;
            gameOver = false;
            projectile = null;

            catapult.y = canvas.height / window.devicePixelRatio - 80;
            spawnTarget();

            updateUI();
            draw();
        }

        // Spawn new target
        function spawnTarget() {
            const width = canvas.width / window.devicePixelRatio;
            const height = canvas.height / window.devicePixelRatio;

            const targetSize = 30 + Math.random() * 30;
            target = {
                x: width / 2 + Math.random() * (width / 2 - targetSize - 50),
                y: 100 + Math.random() * (height / 2),
                size: targetSize,
                points: Math.floor(100 - targetSize) + 10
            };
        }

        // Fire projectile
        function fire() {
            if (gameOver || projectile) return;

            const angle = (parseInt(angleSlider.value) * Math.PI) / 180;
            const power = parseInt(powerSlider.value);

            projectile = {
                x: catapult.x + catapult.width,
                y: catapult.y,
                vx: Math.cos(angle) * power,
                vy: -Math.sin(angle) * power,
                radius: 8,
                trail: []
            };

            fireBtn.disabled = true;
            animate();
        }

        // Animation loop
        function animate() {
            if (!projectile) {
                draw();
                return;
            }

            const width = canvas.width / window.devicePixelRatio;
            const height = canvas.height / window.devicePixelRatio;

            // Add trail
            projectile.trail.push({ x: projectile.x, y: projectile.y });
            if (projectile.trail.length > 20) {
                projectile.trail.shift();
            }

            // Physics
            projectile.x += projectile.vx;
            projectile.y += projectile.vy;
            projectile.vy += 0.4; // Gravity

            // Check target hit
            const dx = projectile.x - (target.x + target.size / 2);
            const dy = projectile.y - (target.y + target.size / 2);
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < projectile.radius + target.size / 2) {
                // Hit!
                score += target.points;
                round++;

                if (round > 10) {
                    endGame(true);
                } else {
                    projectile = null;
                    spawnTarget();
                    fireBtn.disabled = false;
                    updateUI();
                    draw();
                }
                return;
            }

            // Check boundaries
            if (projectile.x > width || projectile.y > height) {
                // Miss
                lives--;
                projectile = null;

                if (lives <= 0) {
                    endGame(false);
                } else if (round > 10) {
                    endGame(true);
                } else {
                    fireBtn.disabled = false;
                    updateUI();
                    draw();
                }
                return;
            }

            // Continue animation
            draw();
            animationId = requestAnimationFrame(animate);
        }

        // Draw everything
        function draw() {
            const width = canvas.width / window.devicePixelRatio;
            const height = canvas.height / window.devicePixelRatio;

            // Clear
            ctx.fillStyle = 'rgba(26, 26, 46, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // Draw stars background
            drawStars(width, height);

            // Draw ground
            ctx.fillStyle = '#2d3436';
            ctx.fillRect(0, height - 40, width, 40);

            // Draw catapult
            drawCatapult();

            // Draw target
            if (target) {
                drawTarget();
            }

            // Draw projectile trail
            if (projectile && projectile.trail.length > 1) {
                ctx.strokeStyle = 'rgba(255, 107, 107, 0.5)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(projectile.trail[0].x, projectile.trail[0].y);
                for (let i = 1; i < projectile.trail.length; i++) {
                    ctx.lineTo(projectile.trail[i].x, projectile.trail[i].y);
                }
                ctx.stroke();
            }

            // Draw projectile
            if (projectile) {
                const gradient = ctx.createRadialGradient(
                    projectile.x, projectile.y, 0,
                    projectile.x, projectile.y, projectile.radius
                );
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(0.5, '#ff6b6b');
                gradient.addColorStop(1, '#c0392b');

                ctx.fillStyle = gradient;
                ctx.shadowColor = '#ff6b6b';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(projectile.x, projectile.y, projectile.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // Draw game over
            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, width, height);

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 48px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(lives > 0 ? '🎉 クリア！' : '💀 ゲームオーバー', width / 2, height / 2 - 30);

                ctx.font = 'bold 24px Arial';
                ctx.fillText(`最終スコア: ${score}`, width / 2, height / 2 + 20);
            }
        }

        // Draw stars
        const stars = [];
        for (let i = 0; i < 50; i++) {
            stars.push({
                x: Math.random(),
                y: Math.random(),
                size: Math.random() * 2,
                opacity: Math.random()
            });
        }

        function drawStars(width, height) {
            stars.forEach(star => {
                ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                ctx.beginPath();
                ctx.arc(star.x * width, star.y * height, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // Draw catapult
        function drawCatapult() {
            const x = catapult.x;
            const y = catapult.y;

            // Base
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(x - 20, y + 20, 80, 20);

            // Arm
            const angle = (parseInt(angleSlider.value) * Math.PI) / 180;
            const armLength = 50;

            ctx.strokeStyle = '#A0522D';
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(x + 20, y + 20);
            ctx.lineTo(x + 20 + Math.cos(angle) * armLength, y + 20 - Math.sin(angle) * armLength);
            ctx.stroke();

            // Spoon
            ctx.fillStyle = '#8B4513';
            ctx.beginPath();
            ctx.arc(x + 20 + Math.cos(angle) * armLength, y + 20 - Math.sin(angle) * armLength, 10, 0, Math.PI);
            ctx.fill();
        }

        // Draw target
        function drawTarget() {
            const x = target.x;
            const y = target.y;
            const size = target.size;

            // Outer ring
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(x + size / 2, y + size / 2, size / 2, 0, Math.PI * 2);
            ctx.fill();

            // Middle ring
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(x + size / 2, y + size / 2, size / 3, 0, Math.PI * 2);
            ctx.fill();

            // Inner ring
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(x + size / 2, y + size / 2, size / 6, 0, Math.PI * 2);
            ctx.fill();
        }

        // Update UI
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('round').textContent = round;
            document.getElementById('lives').textContent = lives;
        }

        // End game
        function endGame(won) {
            gameOver = true;
            fireBtn.disabled = true;
            draw();
        }

        // Event listeners
        fireBtn.addEventListener('click', fire);
        resetBtn.addEventListener('click', () => {
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            initGame();
        });

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !gameOver) {
                e.preventDefault();
                fire();
            }
            if (e.code === 'KeyR') {
                resetBtn.click();
            }
        });

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Start game
        initGame();
    </script>
</body>
</html>
