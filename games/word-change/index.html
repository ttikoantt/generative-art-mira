<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ワードチェンジ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
            color: #e0e0ff;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(26, 26, 46, 0.9);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #a0a0c0;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 15px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 15px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #a0a0c0;
        }

        .word-display {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        .current-word {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 3px;
            color: #e0e0ff;
        }

        .word-hint {
            font-size: 1rem;
            color: #a0a0c0;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .option {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: #e0e0ff;
        }

        .option:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            border-color: rgba(102, 126, 234, 0.6);
        }

        .option:active {
            transform: translateY(0);
        }

        .option.correct {
            background: linear-gradient(135deg, rgba(0, 206, 172, 0.3) 0%, rgba(0, 184, 148, 0.3) 100%);
            border-color: rgba(0, 206, 172, 0.6);
        }

        .option.wrong {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.3) 0%, rgba(239, 71, 58, 0.3) 100%);
            border-color: rgba(255, 107, 107, 0.6);
        }

        .message {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 20px;
            min-height: 30px;
            color: #e0e0ff;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(102, 126, 234, 0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(118, 75, 162, 0.9);
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .current-word {
                font-size: 2rem;
            }

            .options {
                grid-template-columns: 1fr;
            }

            .option {
                padding: 15px;
                font-size: 1.1rem;
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <h1>🔄 ワードチェンジ</h1>
        <p class="subtitle">1文字変えて新しい単語を作ろう！</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">スコア</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="streak">0</div>
                <div class="stat-label">連続正解</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="level">1</div>
                <div class="stat-label">レベル</div>
            </div>
        </div>

        <div class="word-display">
            <div class="current-word" id="currentWord">準備中...</div>
            <div class="word-hint" id="wordHint"></div>
        </div>

        <div class="message" id="message"></div>

        <div class="options" id="options"></div>

        <div class="controls">
            <button class="btn" onclick="skipQuestion()">スキップ</button>
            <button class="btn" onclick="resetGame()">リセット</button>
        </div>
    </div>

    <script>
        // Word chain data (Japanese)
        const wordChains = [
            { start: 'ねこ', options: ['ねこ', 'いぬ', 'ぬこ', 'せこ'], correct: 'ぬこ', hint: 'ねこ→1文字変えて...' },
            { start: 'さくら', options: ['さくら', 'さくらい', 'さくらん', 'さくな'], correct: 'さくらん', hint: '果物の名前' },
            { start: 'やま', options: ['やま', 'らま', 'さま', 'かま'], correct: 'さま', hint: '敬称' },
            { start: 'かわ', options: ['かわ', 'さわ', 'がわ', 'あわ'], correct: 'がわ', hint: '川の読み方を変えて' },
            { start: 'たけ', options: ['たけ', 'かけ', 'さけ', 'ぬけ'], correct: 'かけ', hint: '時計をする' },
            { start: 'ひと', options: ['ひと', 'いと', 'こと', 'うと'], correct: 'こと', hint: 'ことばの一部' },
            { start: 'つき', options: ['つき', 'さき', 'ぬき', 'おき'], correct: 'さき', hint: '月曜日のつきを変えて' },
            { start: 'みず', options: ['みず', 'かず', 'ひず', 'ぬず'], correct: 'かず', hint: '数字' },
            { start: 'かぜ', options: ['かぜ', 'かぞ', 'きぜ', 'さぜ'], correct: 'かぞ', hint: '家族のぞ' },
            { start: 'ほし', options: ['ほし', 'ぬし', 'かし', 'まし'], correct: 'ぬし', hint: '主' },
            { start: 'あめ', options: ['あめ', 'うめ', 'いめ', 'おめ'], correct: 'うめ', hint: '梅の実' },
            { start: 'ゆき', options: ['ゆき', 'きき', 'ぬき', 'さき'], correct: 'きき', hint: '聞く' },
            { start: 'くも', options: ['くも', 'ぐも', 'こも', 'つも'], correct: 'こも', hint: 'こもると...' },
            { start: 'そら', options: ['そら', 'ごら', 'ほら', 'あら'], correct: 'ほら', hint: 'ほら！見て！' },
            { start: 'うみ', options: ['うみ', 'うめ', 'うむ', 'うも'], correct: 'うめ', hint: '梅干し' },
            { start: 'いし', options: ['いし', 'うし', 'きし', 'しし'], correct: 'うし', hint: '動物' },
            { start: 'かさ', options: ['かさ', 'かそ', 'かき', 'かた'], correct: 'かた', hint: 'かた〜な' },
            { start: 'くつ', options: ['くつ', 'くず', 'くず', 'くず'], correct: 'くず', hint: '崩れる' },
            { start: 'ふね', options: ['ふね', 'ふた', 'ふな', 'ふの'], correct: 'ふた', hint: '蓋' },
            { start: 'とり', options: ['とり', 'どり', 'のり', 'おり'], correct: 'のり', hint: '海藻' },
        ];

        let score = 0;
        let streak = 0;
        let level = 1;
        let currentQuestion = 0;
        let usedQuestions = [];
        let canAnswer = true;

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function getRandomQuestion() {
            if (usedQuestions.length >= wordChains.length) {
                usedQuestions = [];
            }

            let available = wordChains.filter((_, index) => !usedQuestions.includes(index));
            let randomIndex = Math.floor(Math.random() * available.length);
            let questionIndex = wordChains.indexOf(available[randomIndex]);
            usedQuestions.push(questionIndex);

            return wordChains[questionIndex];
        }

        function displayQuestion() {
            const question = getRandomQuestion();
            document.getElementById('currentWord').textContent = question.start;
            document.getElementById('wordHint').textContent = question.hint;
            document.getElementById('message').textContent = '';
            document.getElementById('message').className = 'message';

            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';

            const shuffledOptions = shuffleArray(question.options);

            shuffledOptions.forEach(option => {
                const button = document.createElement('button');
                button.className = 'option';
                button.textContent = option;
                button.onclick = () => checkAnswer(option, question.correct, button);
                optionsContainer.appendChild(button);
            });

            canAnswer = true;
        }

        function checkAnswer(selected, correct, button) {
            if (!canAnswer) return;
            canAnswer = false;

            const buttons = document.querySelectorAll('.option');
            buttons.forEach(btn => {
                btn.onclick = null;
                if (btn.textContent === correct) {
                    btn.classList.add('correct');
                } else if (btn === button && selected !== correct) {
                    btn.classList.add('wrong');
                }
            });

            if (selected === correct) {
                const points = 10 + (streak * 5);
                score += points;
                streak++;
                level = Math.floor(score / 50) + 1;
                document.getElementById('score').textContent = score;
                document.getElementById('streak').textContent = streak;
                document.getElementById('level').textContent = level;
                document.getElementById('message').textContent = `🎉 正解！ +${points}ポイント`;
                document.getElementById('message').style.color = '#00ceac';
            } else {
                streak = 0;
                document.getElementById('streak').textContent = streak;
                document.getElementById('message').textContent = `❌ 不正解... 正解は「${correct}」`;
                document.getElementById('message').style.color = '#ff6b6b';
            }

            setTimeout(() => {
                displayQuestion();
            }, 1500);
        }

        function skipQuestion() {
            if (!canAnswer) return;
            streak = 0;
            document.getElementById('streak').textContent = streak;
            displayQuestion();
        }

        function resetGame() {
            score = 0;
            streak = 0;
            level = 1;
            usedQuestions = [];
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('level').textContent = level;
            displayQuestion();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        displayQuestion();
    </script>
</body>
</html>
