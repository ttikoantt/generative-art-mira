<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring Memory Match</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ffeaa7 0%, #fab1a0 50%, #fd79a8 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #2d3436;
            margin-bottom: 10px;
            text-align: center;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
        }

        .subtitle {
            color: #636e72;
            margin-bottom: 20px;
            text-align: center;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat-box {
            background: rgba(255,255,255,0.9);
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-box label {
            display: block;
            color: #636e72;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .stat-box .value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2d3436;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 600px;
            margin-bottom: 20px;
        }

        .card {
            width: 80px;
            height: 80px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
        }

        .card.flipped .card-inner,
        .card.matched .card-inner {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card-front {
            background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);
            color: white;
        }

        .card-back {
            background: white;
            transform: rotateY(180deg);
        }

        .card.matched .card-back {
            background: linear-gradient(135deg, #55efc4 0%, #00b894 100%);
            animation: matchPulse 0.5s;
        }

        @keyframes matchPulse {
            0%, 100% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #fd79a8 0%, #e84393 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(232, 67, 147, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(232, 67, 147, 0.6);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            animation: modalIn 0.3s;
        }

        @keyframes modalIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-content h2 {
            color: #2d3436;
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .modal-content p {
            color: #636e72;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.5rem;
            }

            .game-board {
                gap: 10px;
            }

            .card {
                width: 60px;
                height: 60px;
            }

            .card-front,
            .card-back {
                font-size: 2rem;
            }

            .stat-box {
                padding: 10px 15px;
            }

            .stat-box .value {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <h1>🌸 Spring Memory Match 🌼</h1>
    <p class="subtitle">Find all matching pairs!</p>

    <div class="stats">
        <div class="stat-box">
            <label>Moves</label>
            <div class="value" id="moves">0</div>
        </div>
        <div class="stat-box">
            <label>Matches</label>
            <div class="value" id="matches">0/8</div>
        </div>
        <div class="stat-box">
            <label>Time</label>
            <div class="value" id="time">0:00</div>
        </div>
    </div>

    <div class="game-board" id="gameBoard"></div>

    <div class="controls">
        <button id="restartBtn">🔄 New Game</button>
    </div>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2>🎉 Congratulations! 🎉</h2>
            <p>You found all the spring pairs!</p>
            <p>Moves: <strong id="finalMoves">0</strong></p>
            <p>Time: <strong id="finalTime">0:00</strong></p>
            <br>
            <button id="playAgainBtn">🌸 Play Again</button>
        </div>
    </div>

    <script>
        // Spring themed emojis
        const emojis = ['🐰', '🥚', '🌷', '🌸', '🦋', '🐣', '🌼', '🌱'];
        const gameBoard = document.getElementById('gameBoard');
        const movesEl = document.getElementById('moves');
        const matchesEl = document.getElementById('matches');
        const timeEl = document.getElementById('time');
        const winModal = document.getElementById('winModal');
        const finalMovesEl = document.getElementById('finalMoves');
        const finalTimeEl = document.getElementById('finalTime');
        const restartBtn = document.getElementById('restartBtn');
        const playAgainBtn = document.getElementById('playAgainBtn');

        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let canFlip = true;
        let timer = null;
        let seconds = 0;

        function shuffle(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function createBoard() {
            // Create pairs
            const cardPairs = [...emojis, ...emojis];
            const shuffled = shuffle(cardPairs);

            // Clear board
            gameBoard.innerHTML = '';
            cards = [];

            // Create cards
            shuffled.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;
                card.dataset.emoji = emoji;

                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">❓</div>
                        <div class="card-back">${emoji}</div>
                    </div>
                `;

                card.addEventListener('click', () => flipCard(card));
                gameBoard.appendChild(card);
                cards.push(card);
            });
        }

        function flipCard(card) {
            if (!canFlip) return;
            if (card.classList.contains('flipped')) return;
            if (card.classList.contains('matched')) return;
            if (flippedCards.length >= 2) return;

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                moves++;
                movesEl.textContent = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            canFlip = false;
            const [card1, card2] = flippedCards;
            const match = card1.dataset.emoji === card2.dataset.emoji;

            if (match) {
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    matchedPairs++;
                    matchesEl.textContent = `${matchedPairs}/8`;
                    flippedCards = [];
                    canFlip = true;

                    if (matchedPairs === 8) {
                        endGame();
                    }
                }, 500);
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    canFlip = true;
                }, 1000);
            }
        }

        function startTimer() {
            seconds = 0;
            updateTimerDisplay();
            timer = setInterval(() => {
                seconds++;
                updateTimerDisplay();
            }, 1000);
        }

        function stopTimer() {
            if (timer) {
                clearInterval(timer);
                timer = null;
            }
        }

        function updateTimerDisplay() {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            timeEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function endGame() {
            stopTimer();
            finalMovesEl.textContent = moves;
            finalTimeEl.textContent = timeEl.textContent;
            winModal.classList.add('show');
        }

        function initGame() {
            // Reset state
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            seconds = 0;
            canFlip = true;

            // Update UI
            movesEl.textContent = '0';
            matchesEl.textContent = '0/8';
            timeEl.textContent = '0:00';
            winModal.classList.remove('show');

            // Stop old timer
            stopTimer();

            // Create new board
            createBoard();

            // Start timer
            startTimer();
        }

        // Event listeners
        restartBtn.addEventListener('click', initGame);
        playAgainBtn.addEventListener('click', initGame);

        // Start game
        initGame();
    </script>
</body>
</html>
