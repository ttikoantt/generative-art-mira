<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>クリックスピード</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        h1 {
            color: white;
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .stat {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            text-align: center;
            min-width: 120px;
        }
        
        .stat-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        
        .stat-value {
            color: white;
            font-size: 2em;
            font-weight: bold;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        
        .click-area {
            width: 200px;
            height: 200px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
            position: relative;
        }
        
        .click-area:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .click-area.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }
        
        .click-text {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
            text-align: center;
        }
        
        .click-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            animation: clickPulse 0.3s ease-out;
            pointer-events: none;
        }
        
        @keyframes clickPulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }
        
        .controls {
            display: flex;
            gap: 15px;
        }
        
        button {
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid white;
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        
        button:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .time-bar {
            width: 300px;
            height: 8px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .time-progress {
            height: 100%;
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            transition: width 0.1s linear;
        }
        
        .result {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 200;
        }
        
        .result.show {
            display: flex;
        }
        
        .result-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        
        .result h2 {
            color: white;
            font-size: 2em;
            margin-bottom: 20px;
        }
        
        .result-score {
            color: white;
            font-size: 4em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .result-unit {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.5em;
            margin-bottom: 30px;
        }
        
        .result-rank {
            color: #ffd700;
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 30px;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }
            .stats {
                gap: 15px;
            }
            .stat {
                min-width: 100px;
                padding: 10px 15px;
            }
            .click-area {
                width: 160px;
                height: 160px;
            }
            .time-bar {
                width: 250px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    
    <div class="container">
        <h1>⚡ クリックスピード</h1>
        
        <div class="time-bar">
            <div class="time-progress" id="timeProgress"></div>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-label">クリック数</div>
                <div class="stat-value" id="clickCount">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">残り時間</div>
                <div class="stat-value" id="timeLeft">5.0</div>
            </div>
            <div class="stat">
                <div class="stat-label">最高記録</div>
                <div class="stat-value" id="bestScore">0</div>
            </div>
        </div>
        
        <div class="click-area" id="clickArea">
            <div class="click-text">TAP!</div>
        </div>
        
        <div class="controls">
            <button onclick="startGame()">スタート</button>
            <button onclick="resetGame()">リセット</button>
        </div>
    </div>
    
    <div class="result" id="result">
        <div class="result-content">
            <h2>🎉 結果</h2>
            <div class="result-score" id="finalScore">0</div>
            <div class="result-unit">クリック / 5秒</div>
            <div class="result-rank" id="rank"></div>
            <button onclick="closeResult()">もう一度</button>
        </div>
    </div>
    
    <script>
        let clickCount = 0;
        let timeLeft = 5.0;
        let gameRunning = false;
        let gameTimer = null;
        let bestScore = parseInt(localStorage.getItem('clickSpeedBest')) || 0;
        
        const clickArea = document.getElementById('clickArea');
        const clickCountEl = document.getElementById('clickCount');
        const timeLeftEl = document.getElementById('timeLeft');
        const bestScoreEl = document.getElementById('bestScore');
        const timeProgress = document.getElementById('timeProgress');
        const result = document.getElementById('result');
        const finalScoreEl = document.getElementById('finalScore');
        const rankEl = document.getElementById('rank');
        
        bestScoreEl.textContent = bestScore;
        
        function startGame() {
            if (gameRunning) return;
            
            clickCount = 0;
            timeLeft = 5.0;
            gameRunning = true;
            
            clickCountEl.textContent = '0';
            timeLeftEl.textContent = '5.0';
            timeProgress.style.width = '100%';
            clickArea.classList.remove('disabled');
            
            const startTime = Date.now();
            
            gameTimer = setInterval(() => {
                const elapsed = (Date.now() - startTime) / 1000;
                timeLeft = Math.max(0, 5.0 - elapsed);
                
                timeLeftEl.textContent = timeLeft.toFixed(1);
                timeProgress.style.width = `${(timeLeft / 5.0) * 100}%`;
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 50);
        }
        
        function endGame() {
            gameRunning = false;
            clearInterval(gameTimer);
            clickArea.classList.add('disabled');
            
            if (clickCount > bestScore) {
                bestScore = clickCount;
                localStorage.setItem('clickSpeedBest', bestScore);
                bestScoreEl.textContent = bestScore;
            }
            
            finalScoreEl.textContent = clickCount;
            
            const cps = clickCount / 5;
            let rank = '';
            if (cps >= 10) rank = '🏆 伝説級!';
            else if (cps >= 8) rank = '⭐ マスター!';
            else if (cps >= 6) rank = '👏 すごい!';
            else if (cps >= 4) rank = '😊 いい感じ!';
            else if (cps >= 2) rank = '💪 頑張れ!';
            else rank = '🐢 ゆっくり...';
            
            rankEl.textContent = rank;
            result.classList.add('show');
        }
        
        function resetGame() {
            gameRunning = false;
            clearInterval(gameTimer);
            clickCount = 0;
            timeLeft = 5.0;
            clickCountEl.textContent = '0';
            timeLeftEl.textContent = '5.0';
            timeProgress.style.width = '100%';
            clickArea.classList.remove('disabled');
        }
        
        function closeResult() {
            result.classList.remove('show');
            resetGame();
        }
        
        clickArea.addEventListener('mousedown', handleClick);
        clickArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick(e);
        }, { passive: false });
        
        function handleClick(e) {
            if (!gameRunning) return;
            
            clickCount++;
            clickCountEl.textContent = clickCount;
            
            const effect = document.createElement('div');
            effect.className = 'click-effect';
            clickArea.appendChild(effect);
            
            setTimeout(() => effect.remove(), 300);
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
