<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Snake - 順番に食べて！</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        .game-container {
            text-align: center;
        }
        .header {
            color: white;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            font-size: 18px;
        }
        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        .stat-label {
            color: #aaa;
            font-size: 12px;
        }
        .stat-value {
            color: #4ecdc4;
            font-size: 24px;
            font-weight: bold;
        }
        #canvas {
            border: 3px solid rgba(78, 205, 196, 0.5);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            display: block;
            margin: 20px auto;
        }
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .controls button, .dpad-btn {
            padding: 15px 25px;
            font-size: 18px;
            background: rgba(78, 205, 196, 0.2);
            border: 2px solid rgba(78, 205, 196, 0.5);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
            min-width: 60px;
        }
        .controls button:hover, .dpad-btn:hover {
            background: rgba(78, 205, 196, 0.4);
            transform: scale(1.05);
        }
        .controls button:active, .dpad-btn:active {
            transform: scale(0.95);
        }
        .dpad {
            display: none;
            grid-template-columns: repeat(3, 60px);
            gap: 5px;
            margin-top: 15px;
        }
        .dpad-btn {
            height: 60px;
        }
        .dpad-up { grid-column: 2; }
        .dpad-left { grid-column: 1; grid-row: 2; }
        .dpad-down { grid-column: 2; grid-row: 2; }
        .dpad-right { grid-column: 3; grid-row: 2; }
        .next-number {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 15px;
            color: white;
            font-size: 16px;
            backdrop-filter: blur(10px);
        }
        .next-number span {
            color: #ff6b6b;
            font-size: 32px;
            font-weight: bold;
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            backdrop-filter: blur(10px);
        }
        @media (max-width: 768px) {
            .dpad {
                display: grid;
            }
            .controls button {
                display: none;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    <div class="next-number">次の数字: <span id="nextNum">1</span></div>
    
    <div class="game-container">
        <div class="header">
            <h1>🐍 Number Snake</h1>
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">スコア</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">長さ</div>
                    <div class="stat-value" id="length">3</div>
                </div>
                <div class="stat">
                    <div class="stat-label">最高</div>
                    <div class="stat-value" id="highscore">0</div>
                </div>
            </div>
        </div>

        <canvas id="canvas"></canvas>

        <div class="controls">
            <button onclick="changeDirection('up')">↑</button>
            <button onclick="changeDirection('down')">↓</button>
            <button onclick="changeDirection('left')">←</button>
            <button onclick="changeDirection('right')">→</button>
            <button onclick="restart()">🔄 リスタート</button>
        </div>

        <div class="dpad">
            <button class="dpad-btn dpad-up" onclick="changeDirection('up')">↑</button>
            <button class="dpad-btn dpad-left" onclick="changeDirection('left')">←</button>
            <button class="dpad-btn dpad-down" onclick="changeDirection('down')">↓</button>
            <button class="dpad-btn dpad-right" onclick="changeDirection('right')">→</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // ゲーム設定
        const gridSize = 20;
        let canvasWidth, canvasHeight;
        let tileCountX, tileCountY;

        // ゲーム状態
        let snake = [];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let numbers = [];
        let currentNumber = 1;
        let score = 0;
        let highScore = 0;
        let gameOver = false;
        let gameSpeed = 100;

        function resize() {
            const maxWidth = Math.min(600, window.innerWidth - 40);
            const maxHeight = Math.min(600, window.innerHeight - 300);
            
            canvasWidth = Math.floor(maxWidth / gridSize) * gridSize;
            canvasHeight = Math.floor(maxHeight / gridSize) * gridSize;
            
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            
            tileCountX = canvasWidth / gridSize;
            tileCountY = canvasHeight / gridSize;
        }

        function initGame() {
            snake = [
                { x: Math.floor(tileCountX / 2), y: Math.floor(tileCountY / 2) }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            numbers = [];
            currentNumber = 1;
            score = 0;
            gameOver = false;
            gameSpeed = 100;
            spawnNumbers();
            updateUI();
        }

        function spawnNumbers() {
            numbers = [];
            const numCount = 5;
            const usedPositions = new Set();
            
            for (let i = 0; i < numCount; i++) {
                let pos;
                do {
                    pos = {
                        x: Math.floor(Math.random() * tileCountX),
                        y: Math.floor(Math.random() * tileCountY)
                    };
                } while (isOnSnake(pos) || usedPositions.has(`${pos.x},${pos.y}`));
                
                usedPositions.add(`${pos.x},${pos.y}`);
                
                // 現在の数字に近い数字を出現
                const num = currentNumber + Math.floor(Math.random() * 5) - 2;
                numbers.push({
                    x: pos.x,
                    y: pos.y,
                    number: Math.max(1, num)
                });
            }
        }

        function isOnSnake(pos) {
            return snake.some(segment => segment.x === pos.x && segment.y === pos.y);
        }

        function changeDirection(dir) {
            switch(dir) {
                case 'up':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'down':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'left':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'right':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        }

        function update() {
            if (gameOver) return;

            direction = { ...nextDirection };
            
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // 壁との衝突
            if (head.x < 0 || head.x >= tileCountX || head.y < 0 || head.y >= tileCountY) {
                gameOver = true;
                return;
            }

            // 自分との衝突
            if (isOnSnake(head)) {
                gameOver = true;
                return;
            }

            snake.unshift(head);

            // 数字を食べたかチェック
            const ateIndex = numbers.findIndex(n => n.x === head.x && n.y === head.y);
            if (ateIndex !== -1) {
                const eatenNumber = numbers[ateIndex].number;
                numbers.splice(ateIndex, 1);
                
                if (eatenNumber === currentNumber) {
                    // 正しい順番！
                    score += 10 * currentNumber;
                    currentNumber++;
                } else if (eatenNumber > currentNumber) {
                    // 飛ばした！
                    score -= 20;
                    snake.pop();
                } else {
                    // 間違った数字！
                    score -= 10;
                    snake.pop();
                }
                
                // 数字が少なくなったら補充
                if (numbers.length < 3) {
                    const usedPositions = new Set();
                    numbers.forEach(n => usedPositions.add(`${n.x},${n.y}`));
                    
                    let pos;
                    do {
                        pos = {
                            x: Math.floor(Math.random() * tileCountX),
                            y: Math.floor(Math.random() * tileCountY)
                        };
                    } while (isOnSnake(pos) || usedPositions.has(`${pos.x},${pos.y}`));
                    
                    const num = currentNumber + Math.floor(Math.random() * 5) - 2;
                    numbers.push({
                        x: pos.x,
                        y: pos.y,
                        number: Math.max(1, num)
                    });
                }
                
                updateUI();
            } else {
                snake.pop();
            }
        }

        function draw() {
            // 背景
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);

            // グリッド
            ctx.strokeStyle = 'rgba(78, 205, 196, 0.1)';
            ctx.lineWidth = 0.5;
            for (let x = 0; x <= canvasWidth; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvasHeight);
                ctx.stroke();
            }
            for (let y = 0; y <= canvasHeight; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvasWidth, y);
                ctx.stroke();
            }

            // 数字を描画
            numbers.forEach(num => {
                const x = num.x * gridSize;
                const y = num.y * gridSize;
                
                // 背景
                const isTarget = num.number === currentNumber;
                ctx.fillStyle = isTarget ? 'rgba(255, 107, 107, 0.3)' : 'rgba(78, 205, 196, 0.3)';
                ctx.fillRect(x + 1, y + 1, gridSize - 2, gridSize - 2);
                
                // 数字
                ctx.fillStyle = isTarget ? '#ff6b6b' : '#4ecdc4';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(num.number, x + gridSize / 2, y + gridSize / 2);
            });

            // スネークを描画
            snake.forEach((segment, index) => {
                const x = segment.x * gridSize;
                const y = segment.y * gridSize;
                
                const gradient = ctx.createRadialGradient(
                    x + gridSize / 2, y + gridSize / 2, 0,
                    x + gridSize / 2, y + gridSize / 2, gridSize / 2
                );
                
                const hue = (150 + index * 5) % 360;
                gradient.addColorStop(0, `hsla(${hue}, 70%, 60%, 0.9)`);
                gradient.addColorStop(1, `hsla(${hue}, 70%, 40%, 0.7)`);
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(x + 1, y + 1, gridSize - 2, gridSize - 2, 4);
                ctx.fill();
            });

            // ゲームオーバー
            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvasWidth, canvasHeight);
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 32px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('ゲームオーバー', canvasWidth / 2, canvasHeight / 2 - 20);
                
                ctx.font = '18px Arial';
                ctx.fillText(`スコア: ${score}`, canvasWidth / 2, canvasHeight / 2 + 20);
                ctx.fillText('タップでリスタート', canvasWidth / 2, canvasHeight / 2 + 50);
            }
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('length').textContent = snake.length;
            document.getElementById('nextNum').textContent = currentNumber;
            
            if (score > highScore) {
                highScore = score;
                document.getElementById('highscore').textContent = highScore;
            }
        }

        function restart() {
            initGame();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function gameLoop() {
            update();
            draw();
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    changeDirection('up');
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    changeDirection('down');
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    changeDirection('left');
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    changeDirection('right');
                    e.preventDefault();
                    break;
                case ' ':
                    if (gameOver) restart();
                    e.preventDefault();
                    break;
            }
        });

        // タップ操作
        canvas.addEventListener('click', () => {
            if (gameOver) restart();
        });

        // タッチスワイプ
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        canvas.addEventListener('touchend', (e) => {
            if (gameOver) {
                restart();
                return;
            }
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                changeDirection(dx > 0 ? 'right' : 'left');
            } else {
                changeDirection(dy > 0 ? 'down' : 'up');
            }
        }, { passive: true });

        window.addEventListener('resize', () => {
            resize();
            draw();
        });

        // 初期化
        resize();
        initGame();
        setInterval(gameLoop, gameSpeed);
    </script>
</body>
</html>
