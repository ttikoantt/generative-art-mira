<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Snake - Puzzle Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a1a0a 0%, #1a2a1a 50%, #0a1a2a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }

        .info {
            display: flex;
            gap: 30px;
            color: #88ff88;
            font-size: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .info span {
            background: rgba(100, 200, 100, 0.2);
            padding: 8px 16px;
            border-radius: 15px;
            border: 1px solid rgba(100, 200, 100, 0.3);
        }

        #canvas {
            border: 2px solid rgba(100, 200, 100, 0.4);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(100, 200, 100, 0.3);
            background: rgba(0, 20, 0, 0.8);
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls button {
            background: rgba(100, 200, 100, 0.2);
            border: 1px solid rgba(100, 200, 100, 0.4);
            color: #88ff88;
            padding: 12px 24px;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .controls button:hover {
            background: rgba(100, 200, 100, 0.4);
            box-shadow: 0 0 20px rgba(100, 200, 100, 0.5);
        }

        .instructions {
            color: rgba(100, 200, 100, 0.7);
            font-size: 11px;
            text-align: center;
            max-width: 400px;
            line-height: 1.6;
        }

        .instructions strong {
            color: #88ff88;
        }

        #fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid rgba(100, 200, 100, 0.5);
            text-align: center;
            z-index: 200;
            display: none;
        }

        .game-over.show {
            display: block;
        }

        .game-over h2 {
            color: #ff6666;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .game-over p {
            color: #88ff88;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .game-over button {
            margin-top: 20px;
            background: rgba(100, 200, 100, 0.2);
            border: 1px solid rgba(100, 200, 100, 0.4);
            color: #88ff88;
            padding: 12px 30px;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .game-over button:hover {
            background: rgba(100, 200, 100, 0.4);
            box-shadow: 0 0 20px rgba(100, 200, 100, 0.5);
        }

        .target-number {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(100, 200, 100, 0.3);
            color: #88ff88;
            padding: 15px 30px;
            border-radius: 20px;
            border: 2px solid rgba(100, 200, 100, 0.5);
            font-size: 24px;
            font-weight: bold;
            z-index: 100;
            box-shadow: 0 0 30px rgba(100, 200, 100, 0.4);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="info">
            <span>📊 Score: <strong id="score">0</strong></span>
            <span>🐍 Length: <strong id="length">3</strong></span>
            <span>🎯 Best: <strong id="best">0</strong></span>
        </div>

        <div class="target-number">
            Find: <strong id="targetNumber">1</strong>
        </div>

        <canvas id="canvas"></canvas>

        <div class="controls">
            <button id="restart">🔄 Restart</button>
            <button id="pause">⏸️ Pause</button>
        </div>

        <div class="instructions">
            <strong>🎮 How to Play:</strong><br>
            Use <strong>Arrow Keys</strong> or <strong>Swipe</strong> to move<br>
            Eat numbers in order: <strong>1 → 2 → 3 → ...</strong><br>
            Wrong number = Game Over!
        </div>
    </div>

    <button id="fullscreen" class="controls">⛶ Fullscreen</button>

    <div class="game-over" id="gameOver">
        <h2>💀 Game Over!</h2>
        <p>Score: <strong id="finalScore">0</strong></p>
        <p>Best: <strong id="finalBest">0</strong></p>
        <button id="playAgain">🔄 Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const lengthEl = document.getElementById('length');
        const bestEl = document.getElementById('best');
        const targetNumberEl = document.getElementById('targetNumber');
        const restartBtn = document.getElementById('restart');
        const pauseBtn = document.getElementById('pause');
        const fullscreenBtn = document.getElementById('fullscreen');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const finalBestEl = document.getElementById('finalBest');
        const playAgainBtn = document.getElementById('playAgain');

        const GRID_SIZE = 20;
        let CELL_SIZE;
        let snake = [];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let numbers = [];
        let targetNumber = 1;
        let score = 0;
        let best = 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameLoop;

        function setupCanvas() {
            const size = Math.min(window.innerWidth - 40, window.innerHeight - 280, 500);
            CELL_SIZE = Math.floor(size / GRID_SIZE);
            canvas.width = CELL_SIZE * GRID_SIZE;
            canvas.height = CELL_SIZE * GRID_SIZE;
        }
        setupCanvas();
        window.addEventListener('resize', setupCanvas);

        function initGame() {
            const startX = Math.floor(GRID_SIZE / 2);
            const startY = Math.floor(GRID_SIZE / 2);
            
            snake = [
                { x: startX, y: startY },
                { x: startX - 1, y: startY },
                { x: startX - 2, y: startY }
            ];
            
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            numbers = [];
            targetNumber = 1;
            score = 0;
            gamePaused = false;
            gameRunning = true;

            spawnNumber(1);
            spawnNumber(2);
            spawnNumber(3);
            
            updateUI();
            gameOverEl.classList.remove('show');
            
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(gameStep, 100);
        }

        function spawnNumber(num) {
            let pos;
            let attempts = 0;
            
            do {
                pos = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE)
                };
                attempts++;
            } while (
                attempts < 100 && (
                    snake.some(s => s.x === pos.x && s.y === pos.y) ||
                    numbers.some(n => n.x === pos.x && n.y === pos.y)
                )
            );

            if (attempts < 100) {
                numbers.push({ x: pos.x, y: pos.y, value: num });
            }
        }

        function gameStep() {
            if (gamePaused || !gameRunning) return;

            direction = { ...nextDirection };

            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // Wall collision
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                gameOver();
                return;
            }

            // Self collision
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // Check number collision
            const numIndex = numbers.findIndex(n => n.x === head.x && n.y === head.y);
            
            if (numIndex !== -1) {
                const num = numbers[numIndex];
                
                if (num.value === targetNumber) {
                    // Correct number
                    score++;
                    numbers.splice(numIndex, 1);
                    targetNumber++;
                    
                    // Spawn new numbers
                    for (let i = targetNumber; i <= targetNumber + 2; i++) {
                        spawnNumber(i);
                    }
                    
                    updateUI();
                } else {
                    // Wrong number
                    gameOver();
                    return;
                }
            } else {
                // No number eaten, remove tail
                snake.pop();
            }

            draw();
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = 'rgba(0, 10, 0, 1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid
            ctx.strokeStyle = 'rgba(50, 100, 50, 0.2)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }

            // Draw numbers
            numbers.forEach(num => {
                const isTarget = num.value === targetNumber;
                
                // Glow effect for target
                if (isTarget) {
                    ctx.shadowColor = '#88ff88';
                    ctx.shadowBlur = 15;
                } else {
                    ctx.shadowColor = 'rgba(100, 200, 100, 0.5)';
                    ctx.shadowBlur = 5;
                }

                // Number background
                const gradient = ctx.createRadialGradient(
                    num.x * CELL_SIZE + CELL_SIZE / 2,
                    num.y * CELL_SIZE + CELL_SIZE / 2,
                    0,
                    num.x * CELL_SIZE + CELL_SIZE / 2,
                    num.y * CELL_SIZE + CELL_SIZE / 2,
                    CELL_SIZE
                );
                
                if (isTarget) {
                    gradient.addColorStop(0, 'rgba(100, 255, 100, 0.8)');
                    gradient.addColorStop(1, 'rgba(50, 150, 50, 0.3)');
                } else {
                    gradient.addColorStop(0, 'rgba(100, 200, 100, 0.6)');
                    gradient.addColorStop(1, 'rgba(30, 80, 30, 0.2)');
                }

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(
                    num.x * CELL_SIZE + CELL_SIZE / 2,
                    num.y * CELL_SIZE + CELL_SIZE / 2,
                    CELL_SIZE / 2 - 2,
                    0,
                    Math.PI * 2
                );
                ctx.fill();

                // Number text
                ctx.fillStyle = isTarget ? '#003300' : '#88ff88';
                ctx.font = `bold ${CELL_SIZE * 0.6}px Courier New`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(
                    num.value,
                    num.x * CELL_SIZE + CELL_SIZE / 2,
                    num.y * CELL_SIZE + CELL_SIZE / 2
                );

                ctx.shadowBlur = 0;
            });

            // Draw snake
            snake.forEach((segment, index) => {
                const isHead = index === 0;
                const alpha = 1 - (index / snake.length) * 0.7;
                
                if (isHead) {
                    ctx.shadowColor = '#88ff88';
                    ctx.shadowBlur = 10;
                }

                const gradient = ctx.createRadialGradient(
                    segment.x * CELL_SIZE + CELL_SIZE / 2,
                    segment.y * CELL_SIZE + CELL_SIZE / 2,
                    0,
                    segment.x * CELL_SIZE + CELL_SIZE / 2,
                    segment.y * CELL_SIZE + CELL_SIZE / 2,
                    CELL_SIZE / 2
                );
                
                gradient.addColorStop(0, `rgba(100, 255, 100, ${alpha})`);
                gradient.addColorStop(1, `rgba(30, 100, 30, ${alpha * 0.5})`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * CELL_SIZE + 1,
                    segment.y * CELL_SIZE + 1,
                    CELL_SIZE - 2,
                    CELL_SIZE - 2,
                    isHead ? 6 : 4
                );
                ctx.fill();

                ctx.shadowBlur = 0;
            });
        }

        function updateUI() {
            scoreEl.textContent = score;
            lengthEl.textContent = snake.length;
            bestEl.textContent = best;
            targetNumberEl.textContent = targetNumber;
        }

        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            
            if (score > best) {
                best = score;
            }
            
            finalScoreEl.textContent = score;
            finalBestEl.textContent = best;
            gameOverEl.classList.add('show');
        }

        // Controls
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        });

        // Touch controls
        let touchStartX, touchStartY;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        });

        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
                else if (dx < -30 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
            } else {
                if (dy > 30 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
                else if (dy < -30 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
            }
        });

        restartBtn.addEventListener('click', initGame);
        playAgainBtn.addEventListener('click', initGame);

        pauseBtn.addEventListener('click', () => {
            gamePaused = !gamePaused;
            pauseBtn.textContent = gamePaused ? '▶️ Resume' : '⏸️ Pause';
        });

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // Start game
        initGame();
    </script>
</body>
</html>
