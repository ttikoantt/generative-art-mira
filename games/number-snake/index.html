<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Number Snake - 数字スネーク</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Helvetica Neue', sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        h1 {
            color: #fff;
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        .score {
            color: #00ff88;
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        #gameCanvas {
            border: 3px solid #00ff88;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            background: #0a0a0a;
            max-width: 100%;
        }
        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(2, 60px);
            gap: 10px;
            justify-content: center;
        }
        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 24px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.1s;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .control-btn:active {
            background: rgba(0, 255, 136, 0.3);
            transform: scale(0.95);
        }
        .control-btn:nth-child(1) { grid-column: 2; }
        .control-btn:nth-child(2) { grid-column: 1; grid-row: 2; }
        .control-btn:nth-child(3) { grid-column: 2; grid-row: 2; }
        .control-btn:nth-child(4) { grid-column: 3; grid-row: 2; }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 100;
            touch-action: manipulation;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 50;
            border: 2px solid #00ff88;
        }
        .game-over h2 {
            color: #ff4444;
            font-size: 36px;
            margin-bottom: 20px;
        }
        .game-over p {
            color: #fff;
            font-size: 20px;
            margin-bottom: 20px;
        }
        .restart-btn {
            background: #00ff88;
            border: none;
            color: #000;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            touch-action: manipulation;
        }
        .restart-btn:hover {
            background: #00cc6a;
            transform: scale(1.05);
        }
        @media (max-width: 768px) {
            h1 { font-size: 24px; }
            .score { font-size: 20px; }
            .controls { gap: 8px; }
            .control-btn { width: 55px; height: 55px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Number Snake</h1>
        <div class="score">スコア: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="controls">
            <button class="control-btn" onclick="changeDirection('up')">↑</button>
            <button class="control-btn" onclick="changeDirection('left')">←</button>
            <button class="control-btn" onclick="changeDirection('down')">↓</button>
            <button class="control-btn" onclick="changeDirection('right')">→</button>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全画面</button>

    <div class="game-over" id="gameOver">
        <h2>Game Over!</h2>
        <p>最終スコア: <span id="finalScore">0</span></p>
        <button class="restart-btn" onclick="restartGame">もう一度</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        let snake = [];
        let direction = 'right';
        let nextDirection = 'right';
        let number = null;
        let score = 0;
        let gameLoop = null;

        function init() {
            snake = [
                { x: 6, y: 10 },
                { x: 5, y: 10 },
                { x: 4, y: 10 }
            ];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            updateScore();
            spawnNumber();
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, 100);
        }

        function spawnNumber() {
            let valid = false;
            while (!valid) {
                number = {
                    x: Math.floor(Math.random() * (canvas.width / gridSize)),
                    y: Math.floor(Math.random() * (canvas.height / gridSize)),
                    value: Math.floor(Math.random() * 9) + 1
                };
                valid = !snake.some(segment => segment.x === number.x && segment.y === number.y);
            }
        }

        function update() {
            direction = nextDirection;
            const head = { ...snake[0] };

            switch (direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }

            // 壁との衝突
            if (head.x < 0 || head.x >= canvas.width / gridSize ||
                head.y < 0 || head.y >= canvas.height / gridSize) {
                gameOver();
                return;
            }

            // 自分との衝突
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 数字を食べた
            if (head.x === number.x && head.y === number.y) {
                score += number.value * 10;
                updateScore();
                spawnNumber();
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            // 背景
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // グリッド
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += gridSize) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            // 数字
            const hue = (number.value * 30 + 180) % 360;
            ctx.fillStyle = `hsl(${hue}, 80%, 50%)`;
            ctx.shadowColor = `hsl(${hue}, 80%, 50%)`;
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(
                number.x * gridSize + gridSize / 2,
                number.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0, Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(
                number.value,
                number.x * gridSize + gridSize / 2,
                number.y * gridSize + gridSize / 2
            );

            // スネーク
            snake.forEach((segment, index) => {
                const gradient = ctx.createLinearGradient(
                    segment.x * gridSize,
                    segment.y * gridSize,
                    segment.x * gridSize + gridSize,
                    segment.y * gridSize + gridSize
                );
                gradient.addColorStop(0, index === 0 ? '#00ff88' : '#00cc6a');
                gradient.addColorStop(1, '#009950');

                ctx.fillStyle = gradient;
                ctx.shadowColor = '#00ff88';
                ctx.shadowBlur = index === 0 ? 10 : 5;
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
            });
            ctx.shadowBlur = 0;
        }

        function changeDirection(dir) {
            const opposites = { up: 'down', down: 'up', left: 'right', right: 'left' };
            if (opposites[dir] !== direction) {
                nextDirection = dir;
            }
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        function gameOver() {
            clearInterval(gameLoop);
            gameLoop = null;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }

        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            init();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('全画面エラー:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            const keyMap = {
                'ArrowUp': 'up',
                'ArrowDown': 'down',
                'ArrowLeft': 'left',
                'ArrowRight': 'right'
            };
            if (keyMap[e.key]) {
                e.preventDefault();
                changeDirection(keyMap[e.key]);
            }
            if (e.key === ' ' && !gameLoop) {
                restartGame();
            }
        });

        // スワイプ操作
        let touchStartX = 0;
        let touchStartY = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        canvas.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) > Math.abs(dy)) {
                changeDirection(dx > 0 ? 'right' : 'left');
            } else {
                changeDirection(dy > 0 ? 'down' : 'up');
            }
        });

        init();
    </script>
</body>
</html>
