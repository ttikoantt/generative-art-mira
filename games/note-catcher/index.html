<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Catcher - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            text-align: center;
            z-index: 10;
        }

        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 1.5rem;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }

        #score {
            color: #ffd700;
            font-size: 1.8rem;
            margin-bottom: 15px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        #gameCanvas {
            border: 3px solid rgba(255, 107, 107, 0.5);
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(255, 107, 107, 0.3);
            background: rgba(0, 0, 0, 0.5);
            max-width: 95vw;
            cursor: pointer;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        #fullscreenBtn {
            background: linear-gradient(135deg, #a29bfe 0%, #6c5ce7 100%);
        }

        .info {
            color: rgba(255, 255, 255, 0.7);
            margin-top: 15px;
            font-size: 0.85rem;
            max-width: 500px;
            line-height: 1.6;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
            border: 3px solid #ff6b6b;
            box-shadow: 0 0 50px rgba(255, 107, 107, 0.5);
            display: none;
        }

        .game-over h2 {
            color: #ff6b6b;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .game-over p {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .game-over .final-score {
            color: #ffd700;
            font-size: 3rem;
            font-weight: bold;
            margin: 20px 0;
        }

        .combo-display {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 215, 0, 0.2);
            padding: 10px 20px;
            border-radius: 10px;
            color: #ffd700;
            font-size: 1.2rem;
            font-weight: bold;
            display: none;
            animation: pulse 0.5s ease-in-out;
            border: 2px solid #ffd700;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.2rem;
            }

            #score {
                font-size: 1.5rem;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }

            .info {
                font-size: 0.75rem;
                padding: 0 20px;
            }

            .game-over {
                padding: 25px;
                width: 90%;
                max-width: 350px;
            }

            .game-over h2 {
                font-size: 1.5rem;
            }

            .game-over .final-score {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎵 Note Catcher</h1>
        <div id="score">Score: 0</div>
        <canvas id="gameCanvas" width="600" height="500"></canvas>
        <div class="controls">
            <button onclick="startGame()">▶️ スタート</button>
            <button id="fullscreenBtn" onclick="toggleFullscreen()">📺 全画面</button>
        </div>
        <p class="info">
            落ちてくる音符をキャッチ！<br>
            タップまたはクリックで音符を消します<br>
            同じ色を連続でキャッチするとコンボボーナス！
        </p>
    </div>

    <div class="game-over" id="gameOver">
        <h2>🎵 Game Over 🎵</h2>
        <p>最終スコア</p>
        <div class="final-score" id="finalScore">0</div>
        <p>最高スコア: <span id="highScore">0</span></p>
        <br>
        <button onclick="restartGame()">🔄 もう一度プレイ</button>
    </div>

    <div class="combo-display" id="comboDisplay">Combo x1</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let score = 0;
        let highScore = localStorage.getItem('noteCatcherHighScore') || 0;
        let isPlaying = false;
        let animationId = null;
        let notes = [];
        let particles = [];
        let lastNoteTime = 0;
        let noteInterval = 1500;
        let combo = 0;
        let lastColor = null;

        const colors = [
            { name: 'C', color: '#ff6b6b', emoji: '🎵' },
            { name: 'D', color: '#feca57', emoji: '🎶' },
            { name: 'E', color: '#48dbfb', emoji: '🎼' },
            { name: 'F', color: '#ff9ff3', emoji: '♪' },
            { name: 'G', color: '#54a0ff', emoji: '♫' }
        ];

        class Note {
            constructor() {
                this.x = Math.random() * (canvas.width - 60) + 30;
                this.y = -30;
                this.size = 25;
                this.speed = 2 + Math.random() * 1.5;
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                const colorData = colors[Math.floor(Math.random() * colors.length)];
                this.color = colorData.color;
                this.name = colorData.name;
                this.emoji = colorData.emoji;
                this.oscillation = Math.random() * Math.PI * 2;
            }

            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;
                this.oscillation += 0.05;
                this.x += Math.sin(this.oscillation) * 0.5;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // 音符の背景（光る効果）
                ctx.beginPath();
                ctx.arc(0, 0, this.size * 1.3, 0, Math.PI * 2);
                ctx.fillStyle = this.color + '30';
                ctx.fill();

                // 音符の絵文字
                ctx.font = `${this.size * 1.5}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.emoji, 0, 0);

                // 音符名
                ctx.font = 'bold 12px Arial';
                ctx.fillStyle = '#fff';
                ctx.fillText(this.name, 0, this.size * 0.8);

                ctx.restore();
            }

            isClicked(x, y) {
                const dist = Math.sqrt((x - this.x) ** 2 + (y - this.y) ** 2);
                return dist < this.size * 1.5;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 6 + 3;
                this.speedX = (Math.random() - 0.5) * 8;
                this.speedY = (Math.random() - 0.5) * 8;
                this.life = 1;
                this.decay = Math.random() * 0.03 + 0.02;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += 0.2; // 重力
                this.life -= this.decay;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color + Math.floor(this.life * 255).toString(16).padStart(2, '0');
                ctx.fill();
            }
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function showCombo() {
            const comboDisplay = document.getElementById('comboDisplay');
            if (combo > 1) {
                comboDisplay.textContent = `Combo x${combo}`;
                comboDisplay.style.display = 'block';
                comboDisplay.style.animation = 'none';
                setTimeout(() => {
                    comboDisplay.style.animation = 'pulse 0.5s ease-in-out';
                }, 10);

                setTimeout(() => {
                    comboDisplay.style.display = 'none';
                }, 1000);
            }
        }

        function spawnNote() {
            notes.push(new Note());
        }

        function update(timestamp) {
            if (!isPlaying) return;

            // 音符をスポーン
            if (timestamp - lastNoteTime > noteInterval) {
                spawnNote();
                lastNoteTime = timestamp;
                noteInterval = Math.max(500, noteInterval - 5); // 徐々に難しく
            }

            // 背景をクリア
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // グリッド線
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.height; i += 50) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            // 音符を更新・描画
            for (let i = notes.length - 1; i >= 0; i--) {
                notes[i].update();
                notes[i].draw();

                // 画面外に出た場合
                if (notes[i].y > canvas.height + 50) {
                    notes.splice(i, 1);
                    combo = 0; // コンボリセット
                }
            }

            // パーティクルを更新・描画
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();

                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            animationId = requestAnimationFrame(update);
        }

        function handleClick(e) {
            if (!isPlaying) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            let clientX, clientY;

            if (e.type === 'touchstart') {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            const x = (clientX - rect.left) * scaleX;
            const y = (clientY - rect.top) * scaleY;

            for (let i = notes.length - 1; i >= 0; i--) {
                if (notes[i].isClicked(x, y)) {
                    const note = notes[i];

                    // コンボ判定
                    if (lastColor === note.color) {
                        combo++;
                    } else {
                        combo = 1;
                        lastColor = note.color;
                    }

                    // スコア計算
                    const comboBonus = combo > 1 ? combo * 0.5 : 1;
                    const points = Math.floor(10 * comboBonus);
                    score += points;

                    // エフェクト
                    createExplosion(note.x, note.y, note.color);

                    if (combo > 1) {
                        showCombo();
                    }

                    notes.splice(i, 1);
                    document.getElementById('score').textContent = `Score: ${score}`;

                    break; // 一度に一つだけ
                }
            }
        }

        function startGame() {
            score = 0;
            combo = 0;
            lastColor = null;
            notes = [];
            particles = [];
            noteInterval = 1500;
            isPlaying = true;
            lastNoteTime = performance.now();

            document.getElementById('score').textContent = 'Score: 0';
            document.getElementById('gameOver').style.display = 'none';

            if (animationId) {
                cancelAnimationFrame(animationId);
            }

            update(performance.now());
        }

        function gameOver() {
            isPlaying = false;
            if (animationId) {
                cancelAnimationFrame(animationId);
            }

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('noteCatcherHighScore', highScore);
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('highScore').textContent = highScore;
            document.getElementById('gameOver').style.display = 'block';
        }

        function restartGame() {
            startGame();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                canvas.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        canvas.addEventListener('click', handleClick);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick(e);
        });

        // ゲームオーバー判定（音符が5個溜まったら）
        setInterval(() => {
            if (isPlaying && notes.length >= 5) {
                gameOver();
            }
        }, 500);

        // 初期描画
        ctx.fillStyle = 'rgba(0, 0, 0, 1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 24px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('🎵 Note Catcher 🎵', canvas.width / 2, canvas.height / 2 - 30);

        ctx.font = '18px Arial';
        ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
        ctx.fillText('スタートボタンを押して始めよう！', canvas.width / 2, canvas.height / 2 + 20);

        // キーボードショートカット
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !isPlaying) {
                e.preventDefault();
                startGame();
            } else if (e.code === 'KeyR' && !isPlaying) {
                restartGame();
            }
        });

        // レスポンシブ対応
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth * 0.95, 600);
            const maxHeight = Math.min(window.innerHeight * 0.6, 500);

            if (window.innerWidth < 768) {
                canvas.width = maxWidth;
                canvas.height = maxHeight;
            }
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>
