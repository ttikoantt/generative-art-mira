<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Dash - 数字タップ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        .header {
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
        }

        .stat {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #00d4ff;
        }

        .game-area {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            max-width: 400px;
            margin: 0 auto;
        }

        .number-btn {
            position: absolute;
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
            transition: all 0.1s;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .number-btn:active {
            transform: scale(0.95);
        }

        .number-btn.correct {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.4);
            animation: correct 0.3s;
        }

        .number-btn.wrong {
            background: linear-gradient(135deg, #ff4757, #ff3344);
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
            animation: shake 0.3s;
        }

        @keyframes correct {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(0); opacity: 0; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 30px 50px;
            border-radius: 15px;
            font-size: 24px;
            z-index: 100;
            display: none;
            text-align: center;
        }

        .message.show {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .instructions {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5em;
            }

            .stat-value {
                font-size: 1.5em;
            }

            .number-btn {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }

            .btn {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Number Dash</h1>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="score">0</div>
                    <div>スコア</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="timer">0</div>
                    <div>秒</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="highScore">0</div>
                    <div>ハイスコア</div>
                </div>
            </div>
        </div>

        <div class="game-area" id="gameArea">
            <!-- 数字ボタンがここに表示される -->
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn">スタート</button>
            <button class="btn btn-secondary" onclick="toggleFullscreen()">全画面</button>
        </div>

        <p class="instructions">
            1から順番にタップ！間違えるとタイムペナルティ
        </p>
    </div>

    <div class="message" id="message">
        <div id="messageText"></div>
    </div>

    <script>
        const gameArea = document.getElementById('gameArea');
        const startBtn = document.getElementById('startBtn');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const highScoreEl = document.getElementById('highScore');
        const message = document.getElementById('message');
        const messageText = document.getElementById('messageText');

        let currentNumber = 1;
        let score = 0;
        let timer = 0;
        let timerInterval = null;
        let gameActive = false;
        let numbers = [];

        // ハイスコアをロード
        let highScore = parseInt(localStorage.getItem('numberDashHighScore')) || 0;
        highScoreEl.textContent = highScore;

        function startGame() {
            currentNumber = 1;
            score = 0;
            timer = 0;
            gameActive = true;

            scoreEl.textContent = score;
            timerEl.textContent = timer;
            startBtn.textContent = 'リセット';

            gameArea.innerHTML = '';
            numbers = [];

            // 数字を生成
            generateNumbers();

            // タイマー開始
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timer++;
                timerEl.textContent = timer;
            }, 1000);
        }

        function generateNumbers() {
            const count = 10; // 同時に表示する数字の数
            const gameRect = gameArea.getBoundingClientRect();

            for (let i = currentNumber; i < currentNumber + count; i++) {
                const btn = document.createElement('button');
                btn.className = 'number-btn';
                btn.textContent = i;
                btn.dataset.number = i;

                // ランダムな位置
                const x = Math.random() * (gameRect.width - 60);
                const y = Math.random() * (gameRect.height - 60);
                btn.style.left = x + 'px';
                btn.style.top = y + 'px';

                btn.addEventListener('click', () => handleNumberClick(i, btn));
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    handleNumberClick(i, btn);
                }, { passive: false });

                gameArea.appendChild(btn);
                numbers.push(btn);
            }
        }

        function handleNumberClick(num, btn) {
            if (!gameActive) return;

            if (num === currentNumber) {
                // 正解
                btn.classList.add('correct');
                score++;
                scoreEl.textContent = score;
                currentNumber++;

                // 新しい数字を追加
                if (currentNumber <= 100) {
                    setTimeout(() => {
                        btn.remove();
                        addNewNumber(currentNumber + 9);
                    }, 300);
                } else {
                    // クリア
                    endGame(true);
                }
            } else {
                // 間違い
                btn.classList.add('wrong');
                timer += 3; // ペナルティ
                timerEl.textContent = timer + ' (+3)';

                setTimeout(() => {
                    btn.classList.remove('wrong');
                }, 300);
            }
        }

        function addNewNumber(num) {
            const btn = document.createElement('button');
            btn.className = 'number-btn';
            btn.textContent = num;
            btn.dataset.number = num;

            const gameRect = gameArea.getBoundingClientRect();
            const x = Math.random() * (gameRect.width - 60);
            const y = Math.random() * (gameRect.height - 60);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';

            btn.addEventListener('click', () => handleNumberClick(num, btn));
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleNumberClick(num, btn);
            }, { passive: false });

            gameArea.appendChild(btn);
        }

        function endGame(cleared) {
            gameActive = false;
            clearInterval(timerInterval);

            if (cleared) {
                showMessage(`🎉 クリア！\nスコア: ${score}\nタイム: ${timer}秒`);

                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('numberDashHighScore', highScore);
                    highScoreEl.textContent = highScore;
                }
            }

            startBtn.textContent = 'スタート';
        }

        function showMessage(text) {
            messageText.textContent = text;
            message.classList.add('show');
            setTimeout(() => {
                message.classList.remove('show');
            }, 2000);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        startBtn.addEventListener('click', startGame);

        // タッチデバイスでのダブルタップ防止
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
