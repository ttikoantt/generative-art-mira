<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Memory - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(79, 172, 254, 0.5);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 1.1em;
        }

        .stat {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8em;
        }

        .stat-value {
            color: #4facfe;
            font-weight: bold;
        }

        .game-area {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .numbers-display {
            font-size: 3em;
            font-weight: bold;
            letter-spacing: 10px;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(79, 172, 254, 0.8);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 30px rgba(79, 172, 254, 0.8);
            }
            to {
                text-shadow: 0 0 50px rgba(79, 172, 254, 1), 0 0 100px rgba(79, 172, 254, 0.5);
            }
        }

        .message {
            font-size: 1.3em;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
        }

        .timer-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            transition: width 0.1s linear;
        }

        .input-area {
            margin-top: 20px;
        }

        .number-input {
            font-size: 2em;
            padding: 15px 20px;
            width: 100%;
            max-width: 300px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            text-align: center;
            font-family: 'Courier New', monospace;
            letter-spacing: 5px;
        }

        .number-input:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.5);
        }

        .button {
            padding: 15px 40px;
            font-size: 1.2em;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }

        .button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(79, 172, 254, 0.6);
        }

        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .back-link {
            text-align: center;
            margin-top: 30px;
        }

        .back-link a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.9em;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: #4facfe;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 14px;
            cursor: pointer;
            z-index: 100;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5em;
            }

            .numbers-display {
                font-size: 2em;
                letter-spacing: 5px;
            }

            .message {
                font-size: 1em;
            }

            .number-input {
                font-size: 1.5em;
                padding: 10px 15px;
            }

            .button {
                padding: 12px 30px;
                font-size: 1em;
            }
        }

        .correct {
            animation: correctPulse 0.5s ease;
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .wrong {
            animation: wrongShake 0.5s ease;
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <div class="header">
            <h1>🔢 Number Memory</h1>
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">LEVEL</div>
                    <div class="stat-value" id="level">1</div>
                </div>
                <div class="stat">
                    <div class="stat-label">SCORE</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">BEST</div>
                    <div class="stat-value" id="best">0</div>
                </div>
            </div>
        </div>

        <div class="game-area" id="gameArea">
            <div class="numbers-display" id="numbersDisplay"></div>
            <div class="message" id="message"></div>
            <div class="timer-bar" id="timerBar" style="display: none;">
                <div class="timer-fill" id="timerFill"></div>
            </div>
            <div class="input-area" id="inputArea" style="display: none;">
                <input type="text" class="number-input" id="numberInput" placeholder="数字を入力" inputmode="numeric" pattern="[0-9]*">
                <br>
                <button class="button" id="submitBtn" onclick="checkAnswer()">送信</button>
            </div>
            <button class="button" id="startBtn" onclick="startGame()">スタート</button>
        </div>

        <div class="back-link">
            <a href="../index.html">← ゲーム一覧に戻る</a>
        </div>
    </div>

    <script>
        let level = 1;
        let score = 0;
        let bestScore = localStorage.getItem('numberMemoryBest') || 0;
        let currentNumbers = '';
        let gameState = 'idle'; // idle, showing, input, result
        let timeLeft = 0;
        let timerInterval = null;

        const numbersDisplay = document.getElementById('numbersDisplay');
        const messageEl = document.getElementById('message');
        const inputArea = document.getElementById('inputArea');
        const numberInput = document.getElementById('numberInput');
        const startBtn = document.getElementById('startBtn');
        const submitBtn = document.getElementById('submitBtn');
        const timerBar = document.getElementById('timerBar');
        const timerFill = document.getElementById('timerFill');

        document.getElementById('best').textContent = bestScore;

        function generateNumbers(count) {
            let numbers = '';
            for (let i = 0; i < count; i++) {
                numbers += Math.floor(Math.random() * 10);
            }
            return numbers;
        }

        function startGame() {
            level = 1;
            score = 0;
            updateStats();
            showNumbers();
        }

        function showNumbers() {
            gameState = 'showing';
            currentNumbers = generateNumbers(level + 2);

            numbersDisplay.textContent = currentNumbers;
            messageEl.textContent = 'この数字を覚えて！';
            inputArea.style.display = 'none';
            startBtn.style.display = 'none';
            timerBar.style.display = 'none';

            // Show time based on level (more time for more digits)
            const showTime = 1000 + (level * 500);

            setTimeout(() => {
                inputPhase();
            }, showTime);
        }

        function inputPhase() {
            gameState = 'input';
            numbersDisplay.textContent = '?'.repeat(currentNumbers.length);
            messageEl.textContent = '覚えた数字を入力してね！';
            inputArea.style.display = 'block';
            numberInput.value = '';
            numberInput.focus();

            // Timer based on level (more time for more digits)
            timeLeft = 5 + level;
            updateTimer();
            timerBar.style.display = 'block';

            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                updateTimer();

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    checkAnswer(true); // Timeout
                }
            }, 100);
        }

        function updateTimer() {
            const totalTime = 5 + level;
            const percentage = (timeLeft / totalTime) * 100;
            timerFill.style.width = percentage + '%';

            if (percentage < 30) {
                timerFill.style.background = 'linear-gradient(90deg, #ff6b6b, #ff8e8e)';
            } else {
                timerFill.style.background = 'linear-gradient(90deg, #4facfe, #00f2fe)';
            }
        }

        function checkAnswer(timeout = false) {
            if (gameState !== 'input') return;

            clearInterval(timerInterval);
            gameState = 'result';

            const userAnswer = numberInput.value;
            const gameArea = document.getElementById('gameArea');

            if (timeout || userAnswer !== currentNumbers) {
                // Wrong answer
                gameArea.classList.add('wrong');
                messageEl.textContent = timeout ? '時間切れ！' : '違います...';
                numbersDisplay.textContent = currentNumbers;

                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('numberMemoryBest', bestScore);
                    document.getElementById('best').textContent = bestScore;
                    messageEl.textContent += ' 🎉 新記録！';
                }

                setTimeout(() => {
                    gameArea.classList.remove('wrong');
                    resetGame();
                }, 2000);
            } else {
                // Correct!
                gameArea.classList.add('correct');
                score += level * 10;
                level++;
                updateStats();

                messageEl.textContent = '正解！ + ' + ((level - 1) * 10) + '点';

                setTimeout(() => {
                    gameArea.classList.remove('correct');
                    showNumbers();
                }, 1500);
            }
        }

        function resetGame() {
            gameState = 'idle';
            numbersDisplay.textContent = '';
            messageEl.textContent = 'もう一度挑戦？';
            inputArea.style.display = 'none';
            startBtn.style.display = 'inline-block';
            startBtn.textContent = 'もう一度';
            timerBar.style.display = 'none';
        }

        function updateStats() {
            document.getElementById('level').textContent = level;
            document.getElementById('score').textContent = score;
        }

        // Enter key to submit
        numberInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        // Only allow numbers
        numberInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
