<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Emoji Reaction Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            color: #ffffff;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .target-info {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px 25px;
            margin: 20px auto;
            max-width: 300px;
        }

        .target-info h2 {
            color: #ffffff;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .target-emoji {
            font-size: 4rem;
            margin: 10px 0;
        }

        .score-board {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
        }

        .score-item {
            color: #ffffff;
        }

        .score-label {
            font-size: 0.8rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 2rem;
            font-weight: bold;
        }

        .game-area {
            width: 280px;
            height: 280px;
            margin: 20px auto;
            position: relative;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .game-area:active {
            transform: scale(0.95);
        }

        .game-area.correct {
            background: rgba(76, 217, 100, 0.3);
            animation: pulse-green 0.3s ease;
        }

        .game-area.wrong {
            background: rgba(255, 59, 48, 0.3);
            animation: shake 0.3s ease;
        }

        .emoji-display {
            font-size: 8rem;
            user-select: none;
            animation: pop-in 0.2s ease;
        }

        @keyframes pop-in {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes pulse-green {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .timer-bar {
            width: 100%;
            max-width: 400px;
            height: 8px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            margin: 20px auto;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            transition: width 0.1s linear;
            border-radius: 4px;
        }

        .timer-fill.warning {
            background: linear-gradient(90deg, #f093fb, #f5576c);
        }

        button {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.5);
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            margin: 20px;
            display: none;
        }

        .result.show {
            display: block;
            animation: slide-up 0.3s ease;
        }

        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .result-stat {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
        }

        .result-stat-label {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .result-stat-value {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .fullscreen-btn svg {
            width: 22px;
            height: 22px;
            fill: white;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .game-area {
                width: 220px;
                height: 220px;
            }

            .emoji-display {
                font-size: 6rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">
        <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    </button>

    <div class="container">
        <h1>⚡ Emoji Reaction</h1>

        <div class="target-info">
            <h2>ターゲット絵文字</h2>
            <div class="target-emoji" id="targetEmoji">😀</div>
        </div>

        <div class="score-board">
            <div class="score-item">
                <div class="score-label">スコア</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">コンボ</div>
                <div class="score-value" id="combo">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">ハイスコア</div>
                <div class="score-value" id="highScore">0</div>
            </div>
        </div>

        <div class="timer-bar">
            <div class="timer-fill" id="timerFill"></div>
        </div>

        <div class="game-area" id="gameArea" onclick="handleTap()">
            <div class="emoji-display" id="emojiDisplay">🎮</div>
        </div>

        <button id="startBtn" onclick="startGame()">スタート</button>
        <button id="restartBtn" onclick="startGame()" class="hidden">リスタート</button>

        <div class="result" id="result">
            <h2>🏆 ゲーム終了！</h2>
            <div class="result-stats">
                <div class="result-stat">
                    <div class="result-stat-label">スコア</div>
                    <div class="result-stat-value" id="finalScore">0</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-label">最大コンボ</div>
                    <div class="result-stat-value" id="maxCombo">0</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-label">正解率</div>
                    <div class="result-stat-value" id="accuracy">0%</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-label">平均反応時間</div>
                    <div class="result-stat-value" id="avgReaction">0ms</div>
                </div>
            </div>
            <button onclick="startGame()">もう一度プレイ</button>
        </div>
    </div>

    <script>
        const emojis = ['😀', '😂', '😍', '🥳', '😎', '🤔', '😴', '🤯', '😱', '🥶', '😈', '👻', '🤖', '🎃', '🦁', '🐸', '🦄', '🌈', '⭐', '🔥', '💎', '🎯', '🚀', '🎨'];
        let targetEmoji = '😀';
        let currentEmoji = '';
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let highScore = parseInt(localStorage.getItem('emojiReactionHighScore')) || 0;
        let timeLeft = 60;
        let gameRunning = false;
        let reactionTimes = [];
        let lastEmojiChange = 0;
        let correctAnswers = 0;
        let totalAnswers = 0;

        const gameArea = document.getElementById('gameArea');
        const emojiDisplay = document.getElementById('emojiDisplay');
        const scoreDisplay = document.getElementById('score');
        const comboDisplay = document.getElementById('combo');
        const highScoreDisplay = document.getElementById('highScore');
        const timerFill = document.getElementById('timerFill');
        const targetEmojiDisplay = document.getElementById('targetEmoji');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const resultDiv = document.getElementById('result');

        highScoreDisplay.textContent = highScore;

        function startGame() {
            score = 0;
            combo = 0;
            maxCombo = 0;
            timeLeft = 60;
            reactionTimes = [];
            correctAnswers = 0;
            totalAnswers = 0;
            gameRunning = true;

            updateScore();
            highScoreDisplay.textContent = highScore;

            // ターゲット絵文字を設定
            targetEmoji = emojis[Math.floor(Math.random() * emojis.length)];
            targetEmojiDisplay.textContent = targetEmoji;

            // ゲームエリアを表示
            startBtn.classList.add('hidden');
            restartBtn.classList.add('hidden');
            resultDiv.classList.remove('show');

            // 最初の絵文字を表示
            showNextEmoji();

            // タイマー開始
            gameTimer();
        }

        function showNextEmoji() {
            if (!gameRunning) return;

            // 70%の確率でターゲット、30%でその他
            if (Math.random() < 0.7) {
                currentEmoji = targetEmoji;
            } else {
                let otherEmoji;
                do {
                    otherEmoji = emojis[Math.floor(Math.random() * emojis.length)];
                } while (otherEmoji === targetEmoji);
                currentEmoji = otherEmoji;
            }

            emojiDisplay.textContent = currentEmoji;
            lastEmojiChange = Date.now();
        }

        function handleTap() {
            if (!gameRunning) {
                startGame();
                return;
            }

            totalAnswers++;
            const reactionTime = Date.now() - lastEmojiChange;

            if (currentEmoji === targetEmoji) {
                // 正解
                combo++;
                correctAnswers++;
                reactionTimes.push(reactionTime);

                const points = 10 + (combo * 2);
                score += points;

                if (combo > maxCombo) {
                    maxCombo = combo;
                }

                gameArea.classList.add('correct');
                setTimeout(() => gameArea.classList.remove('correct'), 300);
            } else {
                // 不正解
                combo = 0;
                score = Math.max(0, score - 20);

                gameArea.classList.add('wrong');
                setTimeout(() => gameArea.classList.remove('wrong'), 300);
            }

            updateScore();
            showNextEmoji();

            // タイミングをランダムに変える
            setTimeout(() => {
                if (gameRunning) {
                    showNextEmoji();
                }
            }, Math.random() * 1000 + 500);
        }

        function updateScore() {
            scoreDisplay.textContent = score;
            comboDisplay.textContent = combo;

            if (score > highScore) {
                highScore = score;
                highScoreDisplay.textContent = highScore;
                localStorage.setItem('emojiReactionHighScore', highScore);
            }
        }

        function gameTimer() {
            const timer = setInterval(() => {
                timeLeft--;
                const percentage = (timeLeft / 60) * 100;
                timerFill.style.width = percentage + '%';

                if (percentage < 30) {
                    timerFill.classList.add('warning');
                } else {
                    timerFill.classList.remove('warning');
                }

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameRunning = false;

            // 統計を計算
            const accuracy = totalAnswers > 0 ? Math.round((correctAnswers / totalAnswers) * 100) : 0;
            const avgReaction = reactionTimes.length > 0
                ? Math.round(reactionTimes.reduce((a, b) => a + b, 0) / reactionTimes.length)
                : 0;

            // 結果を表示
            document.getElementById('finalScore').textContent = score;
            document.getElementById('maxCombo').textContent = maxCombo;
            document.getElementById('accuracy').textContent = accuracy + '%';
            document.getElementById('avgReaction').textContent = avgReaction + 'ms';

            resultDiv.classList.add('show');
            restartBtn.classList.remove('hidden');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // キーボード操作（スペースキーでタップ）
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleTap();
            }
        });

        // 最初の絵文字を設定
        emojiDisplay.textContent = '🎮';
    </script>
</body>
</html>
