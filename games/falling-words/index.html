<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falling Words - 落ちてくる単語をタイプ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            color: #fff;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .stat-label {
            color: #888;
            font-size: 0.75rem;
        }

        .stat-value {
            color: #00ff88;
            font-size: 1.2rem;
            font-weight: bold;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 700px;
            height: 500px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(0, 255, 136, 0.3);
            border-radius: 10px;
            overflow: hidden;
        }

        .word {
            position: absolute;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
            white-space: nowrap;
            transition: transform 0.1s ease;
        }

        .word.matched {
            transform: scale(1.5);
            opacity: 0;
        }

        .word.typed {
            color: #00ff88;
        }

        .word.missed {
            color: #ff4444;
        }

        #inputArea {
            width: 100%;
            max-width: 700px;
            margin-top: 15px;
        }

        #wordInput {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2rem;
            font-family: 'Courier New', monospace;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(0, 255, 136, 0.3);
            border-radius: 10px;
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }

        #wordInput:focus {
            border-color: rgba(0, 255, 136, 0.8);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        #wordInput.error {
            border-color: #ff4444;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #00ff88;
        }

        .overlay p {
            font-size: 1rem;
            color: #888;
            margin-bottom: 20px;
            text-align: center;
            padding: 0 20px;
        }

        .overlay .final-score {
            font-size: 3rem;
            color: #00ff88;
            margin: 20px 0;
        }

        .btn {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #000;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.5);
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-small {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-small:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .combo-display {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .combo-display.show {
            opacity: 1;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.3rem;
            }

            .stats {
                gap: 10px;
            }

            .stat {
                padding: 5px 10px;
                font-size: 0.8rem;
            }

            #gameContainer {
                height: 400px;
            }

            .word {
                font-size: 0.85rem;
                padding: 6px 10px;
            }

            #wordInput {
                font-size: 1rem;
                padding: 12px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⌨️ Falling Words ⌨️</h1>
        <div class="stats">
            <div class="stat">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">LEVEL</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">LIVES</div>
                <div class="stat-value" id="lives">❤️❤️❤️</div>
            </div>
            <div class="stat">
                <div class="stat-label">HIGH SCORE</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>
    </div>

    <div id="gameContainer">
        <div class="combo-display" id="comboDisplay">COMBO x1</div>
    </div>

    <div id="inputArea">
        <input type="text" id="wordInput" placeholder="ここに単語を入力..." autocomplete="off" autocapitalize="off" autocorrect="off">
    </div>

    <div class="controls">
        <button class="btn-small" onclick="togglePause()">一時停止</button>
        <button class="btn-small" onclick="resetGame()">リセット</button>
    </div>

    <div id="startOverlay" class="overlay">
        <h2>Falling Words</h2>
        <p>落ちてくる単語を素早く正確に入力して消しましょう！<br>単語が地面に着くとライフが減ります。</p>
        <button class="btn" onclick="startGame()">ゲーム開始</button>
    </div>

    <div id="gameOverOverlay" class="overlay hidden">
        <h2>Game Over</h2>
        <p>素晴らしい挑戦でした！</p>
        <div class="final-score" id="finalScore">0</div>
        <p id="newRecord" style="color: #ffcc00; display: none;">🎉 新記録達成！ 🎉</p>
        <button class="btn" onclick="startGame()">もう一度プレイ</button>
    </div>

    <script>
        // 単語リスト（英語と日本語）
        const WORD_LIST = [
            // 英語短め
            'cat', 'dog', 'run', 'jump', 'fast', 'slow', 'code', 'game',
            'play', 'stop', 'start', 'music', 'sound', 'light', 'dark',
            'hello', 'world', 'space', 'time', 'fire', 'water', 'earth',
            'dream', 'night', 'star', 'moon', 'sun', 'cloud', 'rain',
            'snow', 'wind', 'storm', 'peace', 'love', 'hope', 'life',
            // 英語長め
            'computer', 'keyboard', 'mouse', 'screen', 'program',
            'algorithm', 'function', 'variable', 'constant', 'array',
            'beautiful', 'wonderful', 'amazing', 'awesome', 'fantastic',
            'adventure', 'discovery', 'explorer', 'discovery', 'challeng',
            'javascript', 'language', 'creative', 'artistic', 'artistic',
            // 日本語（ローマ字）
            'neko', 'inu', 'tori', 'sakana', 'mikan', 'ringo',
            'nihon', 'tokyo', 'osaka', 'kyoto', 'hokkaido',
            'arigato', 'sayonara', 'ohayou', 'konnichiwa',
            'sakura', 'fuji', 'samurai', 'ninja', 'manga',
            'anime', 'game', 'music', 'art', 'code', 'love'
        ];

        // ゲーム状態
        let gameState = {
            isPlaying: false,
            isPaused: false,
            score: 0,
            lives: 3,
            level: 1,
            words: [],
            combo: 0,
            maxCombo: 0,
            spawnRate: 2000,
            fallSpeed: 1,
            lastSpawn: 0,
            highScore: parseInt(localStorage.getItem('fallingWordsHighScore')) || 0
        };

        const gameContainer = document.getElementById('gameContainer');
        const wordInput = document.getElementById('wordInput');
        const scoreDisplay = document.getElementById('score');
        const levelDisplay = document.getElementById('level');
        const livesDisplay = document.getElementById('lives');
        const highScoreDisplay = document.getElementById('highScore');
        const comboDisplay = document.getElementById('comboDisplay');

        // 初期化
        highScoreDisplay.textContent = gameState.highScore;

        // 単語クラス
        class Word {
            constructor() {
                this.text = WORD_LIST[Math.floor(Math.random() * WORD_LIST.length)];
                this.x = Math.random() * (gameContainer.offsetWidth - 100) + 50;
                this.y = -30;
                this.speed = gameState.fallSpeed + Math.random() * 0.5;
                this.element = null;
                this.color = this.getRandomColor();
                this.createElement();
            }

            getRandomColor() {
                const colors = [
                    'rgba(0, 255, 136, 0.9)',
                    'rgba(0, 200, 255, 0.9)',
                    'rgba(255, 136, 0, 0.9)',
                    'rgba(255, 0, 136, 0.9)',
                    'rgba(136, 0, 255, 0.9)',
                    'rgba(255, 255, 0, 0.9)'
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            createElement() {
                this.element = document.createElement('div');
                this.element.className = 'word';
                this.element.textContent = this.text;
                this.element.style.left = this.x + 'px';
                this.element.style.top = this.y + 'px';
                this.element.style.color = this.color;
                this.element.style.backgroundColor = this.color.replace('0.9', '0.1');
                gameContainer.appendChild(this.element);
            }

            update() {
                this.y += this.speed;
                this.element.style.top = this.y + 'px';

                // 地面に到達
                if (this.y > gameContainer.offsetHeight - 20) {
                    return false;
                }
                return true;
            }

            highlight(matchedText) {
                const before = this.text.substring(0, matchedText.length);
                const after = this.text.substring(matchedText.length);
                this.element.innerHTML = `<span style="color: #00ff88;">${before}</span>${after}`;
            }

            remove(matched = true) {
                this.element.classList.add('matched');
                setTimeout(() => {
                    if (this.element.parentNode) {
                        this.element.parentNode.removeChild(this.element);
                    }
                }, 100);
            }
        }

        // ゲーム開始
        function startGame() {
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');

            // ゲーム状態リセット
            gameState.isPlaying = true;
            gameState.isPaused = false;
            gameState.score = 0;
            gameState.lives = 3;
            gameState.level = 1;
            gameState.combo = 0;
            gameState.maxCombo = 0;
            gameState.words.forEach(w => {
                if (w.element.parentNode) {
                    w.element.parentNode.removeChild(w.element);
                }
            });
            gameState.words = [];
            gameState.spawnRate = 2000;
            gameState.fallSpeed = 1;
            gameState.lastSpawn = Date.now();

            updateDisplay();
            wordInput.value = '';
            wordInput.focus();

            requestAnimationFrame(gameLoop);
        }

        // ゲームループ
        function gameLoop() {
            if (!gameState.isPlaying || gameState.isPaused) {
                if (gameState.isPlaying) {
                    requestAnimationFrame(gameLoop);
                }
                return;
            }

            // 単語生成
            const now = Date.now();
            if (now - gameState.lastSpawn > gameState.spawnRate) {
                gameState.words.push(new Word());
                gameState.lastSpawn = now;
            }

            // 単語更新
            gameState.words = gameState.words.filter(word => {
                const alive = word.update();
                if (!alive) {
                    // 地面に到達
                    word.element.classList.add('missed');
                    gameState.lives--;
                    gameState.combo = 0;
                    updateComboDisplay();
                    updateDisplay();

                    setTimeout(() => {
                        if (word.element.parentNode) {
                            word.element.parentNode.removeChild(word.element);
                        }
                    }, 300);

                    if (gameState.lives <= 0) {
                        gameOver();
                    }
                }
                return alive;
            });

            requestAnimationFrame(gameLoop);
        }

        // 入力処理
        wordInput.addEventListener('input', (e) => {
            if (!gameState.isPlaying || gameState.isPaused) return;

            const input = e.target.value.toLowerCase().trim();

            // 一致する単語を探す
            let matchedWord = null;
            for (let word of gameState.words) {
                if (word.text.toLowerCase().startsWith(input)) {
                    matchedWord = word;
                    break;
                }
            }

            // 全単語のハイライトをクリア
            gameState.words.forEach(w => {
                w.element.textContent = w.text;
            });

            // 入力エラーのスタイルをリセット
            wordInput.classList.remove('error');

            if (matchedWord) {
                // ハイライト
                matchedWord.highlight(input);

                // 完全一致
                if (matchedWord.text.toLowerCase() === input) {
                    matchedWord.remove();
                    gameState.words = gameState.words.filter(w => w !== matchedWord);
                    gameState.score += Math.floor(10 * (1 + gameState.combo * 0.1));
                    gameState.combo++;
                    if (gameState.combo > gameState.maxCombo) {
                        gameState.maxCombo = gameState.combo;
                    }
                    updateComboDisplay();
                    wordInput.value = '';

                    // レベルアップチェック
                    if (gameState.score > gameState.level * 100) {
                        levelUp();
                    }

                    updateDisplay();
                }
            } else if (input.length > 0) {
                // 入力エラー
                wordInput.classList.add('error');
            }
        });

        // レベルアップ
        function levelUp() {
            gameState.level++;
            gameState.spawnRate = Math.max(500, 2000 - gameState.level * 150);
            gameState.fallSpeed = 1 + gameState.level * 0.2;

            // レベルアップエフェクト
            levelDisplay.style.transform = 'scale(1.5)';
            levelDisplay.style.color = '#ffcc00';
            setTimeout(() => {
                levelDisplay.style.transform = 'scale(1)';
                levelDisplay.style.color = '#00ff88';
            }, 300);
        }

        // コンボ表示更新
        function updateComboDisplay() {
            if (gameState.combo >= 2) {
                comboDisplay.textContent = `COMBO x${gameState.combo}`;
                comboDisplay.classList.add('show');
            } else {
                comboDisplay.classList.remove('show');
            }
        }

        // 表示更新
        function updateDisplay() {
            scoreDisplay.textContent = gameState.score;
            levelDisplay.textContent = gameState.level;
            livesDisplay.textContent = '❤️'.repeat(Math.max(0, gameState.lives));
        }

        // ゲームオーバー
        function gameOver() {
            gameState.isPlaying = false;

            // ハイスコア更新
            let isNewRecord = false;
            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
                localStorage.setItem('fallingWordsHighScore', gameState.highScore);
                highScoreDisplay.textContent = gameState.highScore;
                isNewRecord = true;
            }

            // ゲームオーバー画面表示
            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('newRecord').style.display = isNewRecord ? 'block' : 'none';
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        // 一時停止
        function togglePause() {
            if (!gameState.isPlaying) return;
            gameState.isPaused = !gameState.isPaused;
            if (!gameState.isPaused) {
                wordInput.focus();
                requestAnimationFrame(gameLoop);
            }
        }

        // リセット
        function resetGame() {
            if (confirm('本当にリセットしますか？')) {
                gameState.words.forEach(w => {
                    if (w.element.parentNode) {
                        w.element.parentNode.removeChild(w.element);
                    }
                });
                gameState.words = [];
                document.getElementById('startOverlay').classList.remove('hidden');
                document.getElementById('gameOverOverlay').classList.add('hidden');
                gameState.isPlaying = false;
            }
        }

        // キーボードショートカット
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                togglePause();
            }
            if (!gameState.isPlaying && !e.target.matches('input')) {
                if (e.key === 'Enter') {
                    startGame();
                }
            }
        });

        // 入力欄に自動フォーカス
        gameContainer.addEventListener('click', () => {
            if (gameState.isPlaying && !gameState.isPaused) {
                wordInput.focus();
            }
        });
    </script>
</body>
</html>
