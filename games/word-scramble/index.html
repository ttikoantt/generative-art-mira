<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Scramble - Mira Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #00ffaa;
            margin-bottom: 10px;
            font-size: 28px;
            text-shadow: 0 0 20px rgba(0, 255, 170, 0.5);
        }
        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
            font-size: 14px;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        .stat {
            text-align: center;
        }
        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 5px;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #00ffaa;
        }
        .hint-section {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0, 255, 170, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 170, 0.3);
        }
        .hint-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 5px;
        }
        .hint-text {
            font-size: 16px;
            color: #00ffaa;
            font-weight: bold;
        }
        .scrambled-letters {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .letter {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #00ffaa, #00aaff);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0, 255, 170, 0.3);
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .letter:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 255, 170, 0.5);
        }
        .letter:active {
            transform: scale(0.95);
        }
        .letter.used {
            opacity: 0.3;
            transform: scale(0.8);
        }
        .answer-area {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .answer-letter {
            width: 50px;
            height: 50px;
            background: rgba(0, 255, 170, 0.2);
            border: 2px solid #00ffaa;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            color: #00ffaa;
            cursor: pointer;
            transition: all 0.3s;
        }
        .answer-letter:hover {
            background: rgba(0, 255, 170, 0.3);
        }
        .answer-letter.empty {
            border: 2px dashed rgba(255, 255, 255, 0.3);
            background: transparent;
            color: transparent;
            cursor: default;
        }
        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-submit {
            background: linear-gradient(135deg, #00ffaa, #00aaff);
            color: #1a1a2e;
        }
        .btn-submit:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 255, 170, 0.5);
        }
        .btn-clear {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .btn-clear:hover {
            background: rgba(255, 100, 100, 0.3);
        }
        .btn-shuffle {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .btn-shuffle:hover {
            background: rgba(255, 255, 100, 0.3);
        }
        .message {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
            display: none;
        }
        .message.show {
            display: block;
        }
        .message.correct {
            background: rgba(0, 255, 170, 0.2);
            color: #00ffaa;
            border: 2px solid #00ffaa;
        }
        .message.incorrect {
            background: rgba(255, 100, 100, 0.2);
            color: #ff6464;
            border: 2px solid #ff6464;
        }
        .message.info {
            background: rgba(0, 170, 255, 0.2);
            color: #00aaff;
            border: 2px solid #00aaff;
        }
        #fullscreen-btn {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        #fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        @media (max-width: 600px) {
            .letter {
                width: 45px;
                height: 45px;
                font-size: 24px;
            }
            .answer-letter {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔤 Word Scramble</h1>
        <p class="subtitle">文字を並べ替えて単語を作ろう</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">レベル</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">連続正解</div>
                <div class="stat-value" id="streak">0</div>
            </div>
        </div>

        <div class="hint-section">
            <div class="hint-label">ヒント</div>
            <div class="hint-text" id="hint">読み込み中...</div>
        </div>

        <div class="scrambled-letters" id="scrambled-letters"></div>

        <div class="answer-area" id="answer-area"></div>

        <div class="message" id="message"></div>

        <div class="buttons">
            <button class="btn btn-shuffle" id="shuffle-btn">🔄 シャッフル</button>
            <button class="btn btn-clear" id="clear-btn">✖ クリア</button>
        </div>
        <button class="btn btn-submit" id="submit-btn">✓ 送信</button>
        <br><br>
        <button id="fullscreen-btn">⛶ 全画面表示</button>
    </div>

    <script>
        const words = [
            { word: "APPLE", hint: "果物" },
            { word: "TIGER", hint: "動物" },
            { word: "HOUSE", hint: "建物" },
            { word: "WATER", hint: "飲み物" },
            { word: "MUSIC", hint: "音" },
            { word: "PIZZA", hint: "食べ物" },
            { word: "BEACH", hint: "場所" },
            { word: "CLOUD", hint: "空の上" },
            { word: "DANCE", hint: "動作" },
            { word: "EARTH", hint: "惑星" },
            { word: "FLAME", hint: "火" },
            { word: "GRAPE", hint: "果物" },
            { word: "HEART", hint: "体の一部" },
            { word: "IMAGE", hint: "見るもの" },
            { word: "JUICE", hint: "飲み物" },
            { word: "KNIFE", hint: "道具" },
            { word: "LEMON", hint: "果物" },
            { word: "MONEY", hint: "使うもの" },
            { word: "NIGHT", hint: "時間" },
            { word: "OCEAN", hint: "水" },
            { word: "PIANO", hint: "楽器" },
            { word: "QUEEN", hint: "人" },
            { word: "RIVER", hint: "水" },
            { word: "SNAKE", hint: "動物" },
            { word: "TABLE", hint: "家具" },
            { word: "WORLD", hint: "場所" },
            { word: "BREAD", hint: "食べ物" },
            { word: "CHAIR", hint: "家具" },
            { word: "DREAM", hint: "寝る時" },
            { word: "GHOST", hint: "怖いもの" }
        ];

        let currentWord = null;
        let scrambledLetters = [];
        let answerLetters = [];
        let score = 0;
        let level = 1;
        let streak = 0;
        let usedWords = [];

        function shuffleWord(word) {
            const letters = word.split('');
            for (let i = letters.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [letters[i], letters[j]] = [letters[j], letters[i]];
            }
            return letters;
        }

        function newGame() {
            // 未使用の単語から選択
            const availableWords = words.filter(w => !usedWords.includes(w.word));
            if (availableWords.length === 0) {
                usedWords = [];
                currentWord = words[Math.floor(Math.random() * words.length)];
            } else {
                currentWord = availableWords[Math.floor(Math.random() * availableWords.length)];
            }

            usedWords.push(currentWord.word);

            scrambledLetters = shuffleWord(currentWord.word);
            answerLetters = [];

            document.getElementById('hint').textContent = currentWord.hint;
            renderScrambledLetters();
            renderAnswerArea();
            hideMessage();
        }

        function renderScrambledLetters() {
            const container = document.getElementById('scrambled-letters');
            container.innerHTML = '';

            scrambledLetters.forEach((letter, index) => {
                const div = document.createElement('div');
                div.className = 'letter' + (answerLetters.includes(index) ? ' used' : '');
                div.textContent = letter;
                div.addEventListener('click', () => selectLetter(index));
                container.appendChild(div);
            });
        }

        function renderAnswerArea() {
            const container = document.getElementById('answer-area');
            container.innerHTML = '';

            for (let i = 0; i < currentWord.word.length; i++) {
                const div = document.createElement('div');
                if (i < answerLetters.length) {
                    const letterIndex = answerLetters[i];
                    div.className = 'answer-letter';
                    div.textContent = scrambledLetters[letterIndex];
                    div.addEventListener('click', () => removeAnswer(i));
                } else {
                    div.className = 'answer-letter empty';
                }
                container.appendChild(div);
            }
        }

        function selectLetter(index) {
            if (answerLetters.length < currentWord.word.length && !answerLetters.includes(index)) {
                answerLetters.push(index);
                renderScrambledLetters();
                renderAnswerArea();
            }
        }

        function removeAnswer(position) {
            answerLetters.splice(position, 1);
            renderScrambledLetters();
            renderAnswerArea();
        }

        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = 'message show ' + type;
        }

        function hideMessage() {
            const message = document.getElementById('message');
            message.className = 'message';
        }

        function submitAnswer() {
            if (answerLetters.length !== currentWord.word.length) {
                showMessage('全ての文字を選択してください！', 'info');
                return;
            }

            const answer = answerLetters.map(i => scrambledLetters[i]).join('');

            if (answer === currentWord.word) {
                // 正解
                streak++;
                const baseScore = 100;
                const streakBonus = streak * 20;
                const levelBonus = level * 10;
                const totalScore = baseScore + streakBonus + levelBonus;
                score += totalScore;

                if (streak >= 3) {
                    level++;
                    showMessage(`正解！ +${totalScore}点（レベルアップ！）`, 'correct');
                } else {
                    showMessage(`正解！ +${totalScore}点`, 'correct');
                }

                updateStats();

                setTimeout(() => {
                    newGame();
                }, 1500);
            } else {
                // 不正解
                streak = 0;
                showMessage('違います！もう一度考えてみましょう', 'incorrect');
                updateStats();
            }
        }

        function clearAnswer() {
            answerLetters = [];
            renderScrambledLetters();
            renderAnswerArea();
            hideMessage();
        }

        function shuffleLetters() {
            const unusedLetters = scrambledLetters.filter((_, i) => !answerLetters.includes(i));
            for (let i = unusedLetters.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [unusedLetters[i], unusedLetters[j]] = [unusedLetters[j], unusedLetters[i]];
            }

            let unusedIndex = 0;
            for (let i = 0; i < scrambledLetters.length; i++) {
                if (!answerLetters.includes(i)) {
                    scrambledLetters[i] = unusedLetters[unusedIndex++];
                }
            }

            renderScrambledLetters();
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('streak').textContent = streak;
        }

        // イベントリスナー
        document.getElementById('submit-btn').addEventListener('click', submitAnswer);
        document.getElementById('clear-btn').addEventListener('click', clearAnswer);
        document.getElementById('shuffle-btn').addEventListener('click', shuffleLetters);

        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // ゲーム開始
        newGame();
    </script>
</body>
</html>
