<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Word Scramble</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 20px;
            font-size: 2em;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 10px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .scrambled-word {
            text-align: center;
            font-size: 36px;
            font-weight: bold;
            color: #333;
            margin: 30px 0;
            letter-spacing: 5px;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            word-break: break-all;
        }

        .input-section {
            margin-bottom: 20px;
        }

        .input-section input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 10px;
            text-align: center;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .input-section input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-section input.correct {
            border-color: #10b981;
            background: #d1fae5;
        }

        .input-section input.wrong {
            border-color: #ef4444;
            background: #fee2e2;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-skip {
            background: #f5f5f5;
            color: #666;
        }

        .btn-skip:hover {
            background: #e0e0e0;
        }

        .btn-hint {
            background: #ffd700;
            color: #333;
        }

        .btn-hint:hover {
            background: #ffed4e;
        }

        .hint {
            text-align: center;
            color: #666;
            font-style: italic;
            margin-bottom: 15px;
            min-height: 20px;
            padding: 10px;
            background: #fffbeb;
            border-radius: 8px;
            border-left: 4px solid #ffd700;
        }

        .message {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: bold;
            display: none;
        }

        .message.success {
            display: block;
            background: #d1fae5;
            color: #065f46;
        }

        .message.error {
            display: block;
            background: #fee2e2;
            color: #991b1b;
        }

        .fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            .game-container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5em;
            }

            .scrambled-word {
                font-size: 24px;
                letter-spacing: 2px;
            }

            .buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen" id="fullscreenBtn">⛶</button>

    <div class="game-container">
        <h1>🔤 Word Scramble</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Streak</div>
                <div class="stat-value" id="streak">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Best</div>
                <div class="stat-value" id="best">0</div>
            </div>
        </div>

        <div class="scrambled-word" id="scrambledWord">LOADING...</div>

        <div class="hint" id="hint"></div>

        <div class="message" id="message"></div>

        <div class="input-section">
            <input
                type="text"
                id="answerInput"
                placeholder="Type your answer..."
                autocomplete="off"
                autocapitalize="off"
            >
        </div>

        <div class="buttons">
            <button class="btn btn-submit" id="submitBtn">Submit</button>
            <button class="btn btn-hint" id="hintBtn">💡 Hint</button>
            <button class="btn btn-skip" id="skipBtn">Skip</button>
        </div>
    </div>

    <script>
        // Word bank (mixed English and Japanese romaji)
        const wordBank = [
            { word: "APPLE", hint: "A fruit that keeps the doctor away" },
            { word: "TOKYO", hint: "Capital of Japan" },
            { word: "PIZZA", hint: "Italian dish with cheese and toppings" },
            { word: "SAMURAI", hint: "Japanese warrior class" },
            { word: "OCEAN", hint: "Large body of salt water" },
            { word: "SUSHI", hint: "Japanese dish with raw fish" },
            { word: "GUITAR", hint: "Six-stringed musical instrument" },
            { word: "SAKURA", hint: "Cherry blossom in Japanese" },
            { word: "PLANET", hint: "Earth is one of these" },
            { word: "KIMONO", hint: "Traditional Japanese garment" },
            { word: "DRAGON", hint: "Mythical fire-breathing creature" },
            { word: "ANIME", hint: "Japanese animation style" },
            { word: "CASTLE", hint: "Fortified building for royalty" },
            { word: "NINJA", hint: "Covert agent in feudal Japan" },
            { word: "FOREST", hint: "Large area covered with trees" },
            { word: "BAMBOO", hint: "Fast-growing grass used in Asia" },
            { word: "TEMPLE", hint: "Religious building for worship" },
            { word: "MONKEY", hint: "Primate that likes bananas" },
            { word: "ROBOT", hint: "Mechanical artificial being" },
            { word: "GARDEN", hint: "Place where plants grow" }
        ];

        let currentWord = null;
        let score = 0;
        let streak = 0;
        let bestStreak = parseInt(localStorage.getItem('wordScrambleBest') || '0');
        let hintUsed = false;

        const scrambledWordEl = document.getElementById('scrambledWord');
        const hintEl = document.getElementById('hint');
        const answerInput = document.getElementById('answerInput');
        const submitBtn = document.getElementById('submitBtn');
        const skipBtn = document.getElementById('skipBtn');
        const hintBtn = document.getElementById('hintBtn');
        const messageEl = document.getElementById('message');
        const scoreEl = document.getElementById('score');
        const streakEl = document.getElementById('streak');
        const bestEl = document.getElementById('best');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        function shuffleWord(word) {
            const arr = word.split('');
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            const shuffled = arr.join('');
            // Make sure it's different from original
            if (shuffled === word) {
                return shuffleWord(word);
            }
            return shuffled;
        }

        function newWord() {
            // Pick random word
            const index = Math.floor(Math.random() * wordBank.length);
            currentWord = wordBank[index];

            // Display scrambled word
            scrambledWordEl.textContent = shuffleWord(currentWord.word);

            // Reset state
            answerInput.value = '';
            answerInput.classList.remove('correct', 'wrong');
            hintEl.textContent = '';
            messageEl.className = 'message';
            messageEl.style.display = 'none';
            hintUsed = false;
            hintBtn.disabled = false;

            // Focus input
            answerInput.focus();
        }

        function checkAnswer() {
            const answer = answerInput.value.toUpperCase().trim();

            if (!answer) {
                showMessage('Please enter an answer!', 'error');
                return;
            }

            if (answer === currentWord.word) {
                // Correct!
                answerInput.classList.remove('wrong');
                answerInput.classList.add('correct');

                const points = hintUsed ? 5 : 10;
                score += points;
                streak++;

                if (streak > bestStreak) {
                    bestStreak = streak;
                    localStorage.setItem('wordScrambleBest', bestStreak.toString());
                }

                updateStats();
                showMessage(`🎉 Correct! +${points} points!`, 'success');

                setTimeout(() => {
                    newWord();
                }, 1500);
            } else {
                // Wrong
                answerInput.classList.remove('correct');
                answerInput.classList.add('wrong');

                streak = 0;
                updateStats();
                showMessage('❌ Try again!', 'error');

                setTimeout(() => {
                    answerInput.classList.remove('wrong');
                }, 500);
            }
        }

        function showHint() {
            hintEl.textContent = `💡 ${currentWord.hint}`;
            hintUsed = true;
            hintBtn.disabled = true;
        }

        function skipWord() {
            streak = 0;
            updateStats();
            showMessage(`The word was: ${currentWord.word}`, 'error');
            setTimeout(() => {
                newWord();
            }, 2000);
        }

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
        }

        function updateStats() {
            scoreEl.textContent = score;
            streakEl.textContent = streak;
            bestEl.textContent = bestStreak;
        }

        // Event listeners
        submitBtn.addEventListener('click', checkAnswer);
        skipBtn.addEventListener('click', skipWord);
        hintBtn.addEventListener('click', showHint);

        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        // Auto-uppercase input
        answerInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.toUpperCase();
        });

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') checkAnswer();
            if (e.key === 'h' || e.key === 'H') showHint();
            if (e.key === 's' || e.key === 'S') skipWord();
        });

        // Initialize
        updateStats();
        newWord();
    </script>
</body>
</html>
