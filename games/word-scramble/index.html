<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Scramble - 単語パズル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            padding: 20px;
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .score {
            font-size: 1.2em;
            color: #00ff88;
            margin-bottom: 20px;
        }
        .scrambled-word {
            font-size: 2.5em;
            letter-spacing: 15px;
            margin: 30px 0;
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
        .input-area {
            margin: 20px 0;
        }
        input {
            width: 100%;
            max-width: 300px;
            padding: 15px 20px;
            font-size: 1.3em;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            text-align: center;
            outline: none;
            transition: all 0.3s;
        }
        input:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }
        input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        .submit {
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            color: #000;
        }
        .submit:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }
        .skip, .hint {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .skip:hover, .hint:hover {
            background: rgba(255,255,255,0.2);
        }
        .message {
            margin-top: 20px;
            font-size: 1.3em;
            min-height: 30px;
        }
        .correct {
            color: #00ff88;
            animation: pulse 0.5s;
        }
        .wrong {
            color: #ff4757;
        }
        .hint-text {
            color: #ffa502;
            font-size: 1.1em;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .stats {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }
        .stat {
            background: rgba(255,255,255,0.05);
            padding: 15px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        .stat-label {
            font-size: 0.9em;
            color: rgba(255,255,255,0.7);
        }
        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #00d4ff;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <h1>📝 Word Scramble</h1>
        <div class="score">スコア: <span id="score">0</span></div>

        <div class="scrambled-word" id="scrambledWord"></div>

        <div class="input-area">
            <input type="text" id="answer" placeholder="答えを入力..." autocomplete="off">
        </div>

        <div class="buttons">
            <button class="submit" onclick="checkAnswer()">提出</button>
            <button class="hint" onclick="showHint()">ヒント</button>
            <button class="skip" onclick="skipWord()">スキップ</button>
        </div>

        <div class="message" id="message"></div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">正解</div>
                <div class="stat-value" id="correct">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">連続正解</div>
                <div class="stat-value" id="streak">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">スキップ</div>
                <div class="stat-value" id="skipped">0</div>
            </div>
        </div>
    </div>

    <script>
        const words = [
            { word: "APPLE", hint: "果物" },
            { word: "TIGER", hint: "動物" },
            { word: "HOUSE", hint: "建物" },
            { word: "WATER", hint: "飲み物" },
            { word: "MUSIC", hint: "芸術" },
            { word: "BEACH", hint: "場所" },
            { word: "CLOUD", hint: "空にあるもの" },
            { word: "DREAM", hint: "寝ている時..." },
            { word: "EARTH", hint: "私たちの惑星" },
            { word: "FLAME", hint: "火の形" },
            { word: "GRAPE", hint: "紫の果物" },
            { word: "HEART", hint: " ❤️ " },
            { word: "IMAGE", hint: "写真" },
            { word: "JUICE", hint: "飲み物" },
            { word: "KNIFE", hint: "道具" },
            { word: "LEMON", hint: "酸っぱい果物" },
            { word: "MOUSE", hint: "動物または道具" },
            { word: "NIGHT", hint: "昼の反対" },
            { word: "OCEAN", hint: "大きな水たまり" },
            { word: "PIANO", hint: "楽器" },
            { word: "QUEEN", hint: "王の妻" },
            { word: "RIVER", hint: "流れる水" },
            { word: "SNAKE", hint: "細長い動物" },
            { word: "TABLE", hint: "家具" },
            { word: "UPPER", hint: "上の" },
            { word: "VIDEO", hint: "映像" },
            { word: "WORLD", hint: "地球" },
            { word: "XEROX", hint: "コピー" },
            { word: "YOUTH", hint: "若さ" },
            { word: "ZEBRA", hint: "縞模様の動物" },
            { word: "BREAD", hint: "食べるもの" },
            { word: "CHAIR", hint: "座るもの" },
            { word: "DANCE", hint: "体を動かす" },
            { word: "SMILE", hint: "😊" }
        ];

        let currentWord = null;
        let score = 0;
        let correctCount = 0;
        let streak = 0;
        let skippedCount = 0;
        let usedWords = [];

        function shuffleWord(word) {
            const arr = word.split('');
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            const shuffled = arr.join('');
            return shuffled === word ? shuffleWord(word) : shuffled;
        }

        function newWord() {
            if (usedWords.length >= words.length) {
                usedWords = [];
            }

            let available = words.filter(w => !usedWords.includes(w.word));
            currentWord = available[Math.floor(Math.random() * available.length)];
            usedWords.push(currentWord.word);

            document.getElementById('scrambledWord').textContent = shuffleWord(currentWord.word);
            document.getElementById('answer').value = '';
            document.getElementById('message').textContent = '';
        }

        function checkAnswer() {
            const answer = document.getElementById('answer').value.toUpperCase().trim();
            const message = document.getElementById('message');

            if (answer === currentWord.word) {
                streak++;
                correctCount++;
                const bonus = streak > 1 ? streak * 10 : 0;
                score += 100 + bonus;
                message.className = 'message correct';
                message.textContent = `🎉 正解！+${100 + bonus}ポイント`;
                updateStats();
                setTimeout(newWord, 1500);
            } else {
                streak = 0;
                message.className = 'message wrong';
                message.textContent = '❌ 違います...もう一度！';
                updateStats();
            }
        }

        function showHint() {
            const message = document.getElementById('message');
            message.className = 'message hint-text';
            message.textContent = `💡 ヒント: ${currentWord.hint}`;
            score = Math.max(0, score - 20);
            updateStats();
        }

        function skipWord() {
            streak = 0;
            skippedCount++;
            const message = document.getElementById('message');
            message.className = 'message';
            message.textContent = `答え: ${currentWord.word}`;
            updateStats();
            setTimeout(newWord, 2000);
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('correct').textContent = correctCount;
            document.getElementById('streak').textContent = streak;
            document.getElementById('skipped').textContent = skippedCount;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Enterキーで提出
        document.getElementById('answer').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        // ゲーム開始
        newWord();
        updateStats();
    </script>
</body>
</html>
