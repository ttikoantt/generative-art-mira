<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Scramble - 言葉パズル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 10px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
        }

        .scrambled-word {
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
            letter-spacing: 8px;
            margin: 30px 0;
            padding: 20px;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 10px;
            text-transform: uppercase;
        }

        .input-section {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid #ddd;
            border-radius: 10px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        input[type="text"].correct {
            border-color: #10b981;
            background-color: rgba(16, 185, 129, 0.1);
        }

        input[type="text"].wrong {
            border-color: #ef4444;
            background-color: rgba(239, 68, 68, 0.1);
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 15px 20px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        .skip-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }

        .skip-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.6);
        }

        .hint-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(79, 172, 254, 0.4);
        }

        .hint-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.6);
        }

        .hint {
            margin-top: 15px;
            padding: 10px;
            background: rgba(79, 172, 254, 0.1);
            border-radius: 8px;
            color: #4facfe;
            font-size: 0.9rem;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            z-index: 1000;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .scrambled-word {
                font-size: 2rem;
                letter-spacing: 5px;
            }

            .buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>📝 Word Scramble</h1>
        <p class="subtitle">並べ替えて正しい単語を見つけよう！</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">スコア</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="streak">0</div>
                <div class="stat-label">連続正解</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="total">0</div>
                <div class="stat-label">総問題数</div>
            </div>
        </div>

        <div class="scrambled-word" id="scrambledWord">READY</div>

        <div class="input-section">
            <input type="text" id="answer" placeholder="答えを入力..." autocomplete="off">
        </div>

        <div class="buttons">
            <button class="submit-btn" onclick="checkAnswer()">送信</button>
            <button class="hint-btn" onclick="showHint()">ヒント</button>
            <button class="skip-btn" onclick="skipWord()">スキップ</button>
        </div>

        <div class="hint" id="hint"></div>
    </div>

    <script>
        // Word list with hints
        const words = [
            { word: "JAVASCRIPT", hint: "プログラミング言語" },
            { word: "CREATIVE", hint: "創造的な" },
            { word: "PUZZLE", hint: "パズルゲーム" },
            { word: "RAINBOW", hint: "空にできる色の帯" },
            { word: "ELEPHANT", hint: "大きな動物" },
            { word: "COMPUTER", hint: "情報機器" },
            { word: "MOUNTAIN", hint: "自然の地形" },
            { word: "SUNSHINE", hint: "太陽の光" },
            { word: "BUTTERFLY", hint: "美しい昆虫" },
            { word: "ADVENTURE", hint: "冒険" },
            { word: "CHOCOLATE", hint: "甘いお菓子" },
            { word: "UNIVERSE", hint: "宇宙" },
            { word: "TREASURE", hint: "宝物" },
            { word: "DOLPHIN", hint: "海の哺乳類" },
            { word: "FANTASY", hint: "空想" },
            { word: "HARMONY", hint: "調和" },
            { word: "JOURNEY", hint: "旅" },
            { word: "KINGDOM", hint: "王国" },
            { word: "LIBRARY", hint: "図書館" },
            { word: "MYSTERY", hint: "謎" }
        ];

        let currentWord = null;
        let scrambledWord = "";
        let score = 0;
        let streak = 0;
        let total = 0;
        let hintShown = false;

        // Scramble word
        function scrambleWord(word) {
            const arr = word.split('');
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            const scrambled = arr.join('');
            // Make sure it's different from original
            return scrambled === word ? scrambleWord(word) : scrambled;
        }

        // New word
        function newWord() {
            currentWord = words[Math.floor(Math.random() * words.length)];
            scrambledWord = scrambleWord(currentWord.word);
            document.getElementById('scrambledWord').textContent = scrambledWord;
            document.getElementById('answer').value = '';
            document.getElementById('answer').className = '';
            document.getElementById('hint').textContent = '';
            hintShown = false;
        }

        // Check answer
        function checkAnswer() {
            const answer = document.getElementById('answer').value.toUpperCase().trim();
            
            if (answer === currentWord.word) {
                // Correct!
                streak++;
                total++;
                const bonus = hintShown ? 5 : 10;
                score += bonus + (streak * 2);
                
                document.getElementById('answer').className = 'correct';
                updateStats();
                
                // Animation effect
                document.getElementById('score').style.transform = 'scale(1.2)';
                setTimeout(() => {
                    document.getElementById('score').style.transform = 'scale(1)';
                    newWord();
                }, 1000);
            } else if (answer !== '') {
                // Wrong
                streak = 0;
                document.getElementById('answer').className = 'wrong';
                updateStats();
                setTimeout(() => {
                    document.getElementById('answer').className = '';
                }, 500);
            }
        }

        // Show hint
        function showHint() {
            if (!hintShown) {
                document.getElementById('hint').textContent = `💡 ${currentWord.hint}`;
                hintShown = true;
            }
        }

        // Skip word
        function skipWord() {
            streak = 0;
            total++;
            updateStats();
            newWord();
        }

        // Update stats
        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('total').textContent = total;
        }

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Enter key
        document.getElementById('answer').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        // Start game
        newWord();
    </script>
</body>
</html>
