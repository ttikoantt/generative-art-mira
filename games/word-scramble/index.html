<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Word Scramble - 単語パズル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 10px;
            overflow-x: hidden;
        }
        .container {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            color: #667eea;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .subtitle {
            color: #764ba2;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            margin-bottom: 20px;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 15px;
            min-width: 80px;
        }
        .stat-label {
            font-size: 0.8rem;
            opacity: 0.9;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 5px;
        }
        .word-display {
            background: #f0f0f0;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
        }
        .letter-btn {
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: bold;
            width: clamp(45px, 12vw, 60px);
            height: clamp(45px, 12vw, 60px);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
        }
        .letter-btn:hover:not(.used) {
            background: #667eea;
            color: white;
            transform: scale(1.1);
        }
        .letter-btn.used {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .answer-display {
            background: white;
            border: 3px solid #764ba2;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
        }
        .answer-letter {
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: bold;
            color: #764ba2;
            min-width: 30px;
        }
        .blank {
            color: #ccc;
        }
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: clamp(0.9rem, 2vw, 1rem);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(102,126,234,0.6);
        }
        .btn:active {
            transform: translateY(0);
        }
        .hint-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .message {
            margin-top: 15px;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: clamp(0.9rem, 2vw, 1rem);
            font-weight: bold;
        }
        .correct {
            background: #4caf50;
            color: white;
            animation: pulse 0.5s ease;
        }
        .wrong {
            background: #f44336;
            color: white;
            animation: shake 0.5s ease;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            .btn {
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Word Scramble</h1>
        <p class="subtitle">並べ替えられた文字を正しい単語にしよう！</p>
        
        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">問題</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">ヒント</div>
                <div class="stat-value" id="hints">3</div>
            </div>
        </div>
        
        <div class="word-display" id="letterButtons"></div>
        
        <div class="answer-display" id="answerDisplay"></div>
        
        <div class="controls">
            <button class="btn" onclick="submitAnswer()">✓ 確定</button>
            <button class="btn" onclick="clearAnswer()">✗ クリア</button>
            <button class="btn" onclick="shuffle()">🔄 シャッフル</button>
            <button class="btn hint-btn" onclick="showHint()">💡 ヒント</button>
            <button class="btn" onclick="newGame()">🎮 新規</button>
        </div>
        
        <div class="message" id="message"></div>
    </div>

    <script>
        const words = [
            { word: "APPLE", hint: "果物" },
            { word: "BANANA", hint: "黄色い果物" },
            { word: "ORANGE", hint: "柑橘類" },
            { word: "GRAPE", hint: "房になる果物" },
            { word: "MANGO", hint: "トロピカルフルーツ" },
            { word: "PEACH", hint: "ピンクの果物" },
            { word: "CHERRY", hint: "小さな赤い果物" },
            { word: "LEMON", hint: "酸っぱい黄色い果物" },
            { word: "MELON", hint: "緑の球形果物" },
            { word: "BERRY", hint: "小さな甘い果物" },
            { word: "TIGER", hint: "縞模様の猛獣" },
            { word: "LION", hint: "百獣の王" },
            { word: "ELEPHANT", hint: "鼻が長い動物" },
            { word: "MONKEY", hint: "バナナが好きな動物" },
            { word: "PANDA", hint: "白黒のクマ" },
            { word: "RABBIT", hint: "長い耳の動物" },
            { word: "DOLPHIN", hint: "海の知恵者" },
            { word: "PENGUIN", hint: "スーツを着た鳥" },
            { word: "GIRAFFE", hint: "首が長い動物" },
            { word: "ZEBRA", hint: "シマウマ" },
            { word: "PLANET", hint: "宇宙の旅人" },
            { word: "GALAXY", hint: "星の集まり" },
            { word: "COMET", hint: "尾を引く星" },
            { word: "METEOR", hint: "流れ星" },
            { word: "ORBIT", hint: "天体の通り道" }
        ];
        
        let currentWord = null;
        let shuffledLetters = [];
        let currentAnswer = [];
        let usedLetters = [];
        let score = 0;
        let level = 1;
        let hints = 3;
        
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }
        
        function newGame() {
            const wordData = words[Math.floor(Math.random() * words.length)];
            currentWord = wordData;
            shuffledLetters = shuffleArray(wordData.word.split(''));
            currentAnswer = [];
            usedLetters = [];
            displayLetters();
            displayAnswer();
            clearMessage();
        }
        
        function displayLetters() {
            const container = document.getElementById('letterButtons');
            container.innerHTML = '';
            
            shuffledLetters.forEach((letter, index) => {
                const btn = document.createElement('button');
                btn.className = 'letter-btn' + (usedLetters.includes(index) ? ' used' : '');
                btn.textContent = letter;
                btn.onclick = () => selectLetter(index);
                container.appendChild(btn);
            });
        }
        
        function displayAnswer() {
            const container = document.getElementById('answerDisplay');
            container.innerHTML = '';
            
            const wordLength = currentWord.word.length;
            for (let i = 0; i < wordLength; i++) {
                const span = document.createElement('span');
                span.className = 'answer-letter';
                span.textContent = currentAnswer[i] || '_';
                container.appendChild(span);
            }
        }
        
        function selectLetter(index) {
            if (usedLetters.includes(index)) return;
            if (currentAnswer.length >= currentWord.word.length) return;
            
            usedLetters.push(index);
            currentAnswer.push(shuffledLetters[index]);
            displayLetters();
            displayAnswer();
        }
        
        function clearAnswer() {
            currentAnswer = [];
            usedLetters = [];
            displayLetters();
            displayAnswer();
            clearMessage();
        }
        
        function submitAnswer() {
            const answer = currentAnswer.join('');
            if (answer !== currentWord.word) {
                showMessage('不正解！もう一度試してみてね', 'wrong');
                return;
            }
            
            const bonus = Math.max(0, 100 - currentAnswer.length * 5);
            score += bonus;
            level++;
            
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            
            showMessage(`正解！ +${bonus}ポイント`, 'correct');
            
            setTimeout(newGame, 1500);
        }
        
        function shuffle() {
            shuffledLetters = shuffleArray(shuffledLetters);
            currentAnswer = [];
            usedLetters = [];
            displayLetters();
            displayAnswer();
            clearMessage();
        }
        
        function showHint() {
            if (hints <= 0) {
                showMessage('ヒントがありません！', 'wrong');
                return;
            }
            
            hints--;
            document.getElementById('hints').textContent = hints;
            showMessage(`ヒント: ${currentWord.hint}`, 'correct');
        }
        
        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = 'message ' + type;
        }
        
        function clearMessage() {
            document.getElementById('message').textContent = '';
            document.getElementById('message').className = 'message';
        }
        
        newGame();
    </script>
</body>
</html>
