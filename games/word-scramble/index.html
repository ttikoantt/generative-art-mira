<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Scramble - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .stat {
            text-align: center;
            background: rgba(102, 126, 234, 0.2);
            padding: 15px 20px;
            border-radius: 12px;
            flex: 1;
            margin: 0 5px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 5px;
        }

        .word-display {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
        }

        .scrambled-word {
            font-size: 2.5rem;
            color: #f093fb;
            font-weight: bold;
            letter-spacing: 8px;
            margin-bottom: 10px;
        }

        .hint {
            color: #888;
            font-size: 0.9rem;
            font-style: italic;
        }

        .input-section {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 12px;
            color: #fff;
            text-align: center;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.15);
        }

        input[type="text"]::placeholder {
            color: #666;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            flex: 1;
            padding: 15px;
            font-size: 1rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .skip-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .skip-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        #fullscreenBtn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .message {
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            font-weight: 600;
            display: none;
        }

        .message.correct {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            display: block;
        }

        .message.incorrect {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            display: block;
        }

        .message.show-answer {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
            display: block;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.5rem;
            }

            .scrambled-word {
                font-size: 1.8rem;
                letter-spacing: 4px;
            }

            .stat-value {
                font-size: 1.4rem;
            }

            button {
                padding: 12px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Word Scramble</h1>
        <p class="subtitle">並べ替えられた単語を当てよう！</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">スコア</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="streak">0</div>
                <div class="stat-label">連続正解</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="bestStreak">0</div>
                <div class="stat-label">ベスト</div>
            </div>
        </div>

        <div class="word-display">
            <div class="scrambled-word" id="scrambledWord">LOADING...</div>
            <div class="hint" id="hint"></div>
        </div>

        <div class="input-section">
            <input type="text" id="userInput" placeholder="答えを入力..." autocomplete="off">
        </div>

        <div class="buttons">
            <button class="submit-btn" onclick="checkAnswer()">送信</button>
            <button class="skip-btn" onclick="skipWord()">スキップ</button>
            <button id="fullscreenBtn" onclick="toggleFullscreen()">全画面</button>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script>
        // 単語リスト（日本語と英語）
        const words = [
            { word: "APPLE", hint: "果物" },
            { word: "TIGER", hint: "動物" },
            { word: "PIZZA", hint: "食べ物" },
            { word: "BEACH", hint: "場所" },
            { word: "MUSIC", hint: "趣味" },
            { word: "HOUSE", hint: "建物" },
            { word: "HAPPY", hint: "感情" },
            { word: "WATER", hint: "自然" },
            { word: "PHONE", hint: "電子機器" },
            { word: "SCHOOL", hint: "場所" },
            { word: "GARDEN", hint: "場所" },
            { word: "SUMMER", hint: "季節" },
            { word: "ORANGE", hint: "果物" },
            { word: "WINTER", hint: "季節" },
            { word: "FRIEND", hint: "人間関係" },
            { word: "BIRTHDAY", hint: "イベント" },
            { word: "COMPUTER", hint: "電子機器" },
            { word: "BREAKFAST", hint: "食事" },
            { word: "MOUNTAIN", hint: "自然" },
            { word: "UMBRELLA", hint: "道具" },
            { word: "CHOCOLATE", hint: "食べ物" },
            { word: "BASKETBALL", hint: "スポーツ" },
            { word: "ADVENTURE", hint: "概念" },
            { word: "BEAUTIFUL", hint: "形容詞" },
            { word: "WONDERFUL", hint: "形容詞" }
        ];

        let currentWord = null;
        let score = 0;
        let streak = 0;
        let bestStreak = 0;
        let usedWords = [];

        // 文字をシャッフル
        function scrambleWord(word) {
            const arr = word.split('');
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            const scrambled = arr.join('');
            // シャッフルしても元の単語と同じならもう一度
            return scrambled === word ? scrambleWord(word) : scrambled;
        }

        // 新しい単語を取得
        function getNewWord() {
            if (usedWords.length >= words.length) {
                usedWords = [];
            }

            let availableWords = words.filter(w => !usedWords.includes(w));
            const wordData = availableWords[Math.floor(Math.random() * availableWords.length)];
            usedWords.push(wordData);

            return {
                original: wordData.word,
                scrambled: scrambleWord(wordData.word),
                hint: wordData.hint
            };
        }

        // 新しい単語を表示
        function showNewWord() {
            currentWord = getNewWord();
            document.getElementById('scrambledWord').textContent = currentWord.scrambled;
            document.getElementById('hint').textContent = `ヒント: ${currentWord.hint}`;
            document.getElementById('userInput').value = '';
            document.getElementById('message').className = 'message';
            document.getElementById('message').textContent = '';
            document.getElementById('userInput').focus();
        }

        // 答えをチェック
        function checkAnswer() {
            const userInput = document.getElementById('userInput').value.toUpperCase().trim();
            const messageEl = document.getElementById('message');

            if (!userInput) {
                messageEl.textContent = '答えを入力してください！';
                messageEl.className = 'message incorrect';
                return;
            }

            if (userInput === currentWord.original) {
                // 正解
                score += 10 + streak * 2;
                streak++;
                if (streak > bestStreak) {
                    bestStreak = streak;
                }

                updateStats();

                messageEl.textContent = `🎉 正解！ +${10 + (streak - 1) * 2}ポイント`;
                messageEl.className = 'message correct';

                setTimeout(showNewWord, 1500);
            } else {
                // 不正解
                streak = 0;
                updateStats();

                messageEl.textContent = '❌ 間違いです。もう一度！';
                messageEl.className = 'message incorrect';
            }
        }

        // スキップ
        function skipWord() {
            const messageEl = document.getElementById('message');
            streak = 0;
            updateStats();

            messageEl.textContent = `正解は: ${currentWord.original}`;
            messageEl.className = 'message show-answer';

            setTimeout(showNewWord, 2000);
        }

        // スタッツ更新
        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('bestStreak').textContent = bestStreak;
        }

        // 全画面切替
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Enterキーで送信
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        // 初期化
        showNewWord();
    </script>
</body>
</html>
