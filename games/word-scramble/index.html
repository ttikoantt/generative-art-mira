<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Scramble - 単語並べ替えゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 5px;
            font-size: 2rem;
        }

        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            background: #f7f7f7;
            padding: 15px;
            border-radius: 10px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .timer-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #667eea);
            transition: width 0.1s linear;
        }

        .scrambled-word {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 8px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .input-section {
            margin-bottom: 20px;
        }

        .input-section input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.2rem;
            text-align: center;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .input-section input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-section input.correct {
            border-color: #4caf50;
            background: rgba(76, 175, 80, 0.1);
        }

        .input-section input.wrong {
            border-color: #f44336;
            background: rgba(244, 67, 54, 0.1);
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .skip-btn {
            background: #f7f7f7;
            color: #666;
        }

        .skip-btn:hover {
            background: #e0e0e0;
        }

        .hint-btn {
            background: #ffd700;
            color: #333;
        }

        .hint-btn:hover {
            background: #ffcc00;
        }

        .message {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: 600;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }

        .message.error {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }

        .message.hint {
            background: rgba(255, 215, 0, 0.2);
            color: #b8860b;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .game-over {
            display: none;
            text-align: center;
        }

        .game-over.show {
            display: block;
        }

        .final-score {
            font-size: 3rem;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 1.5rem;
            }
            .scrambled-word {
                font-size: 1.5rem;
                letter-spacing: 4px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🎯 Word Scramble</h1>
        <p class="subtitle">単語を正しい順序に並べ替えよう！</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">連続正解</div>
                <div class="stat-value" id="streak">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">残り時間</div>
                <div class="stat-value" id="timer">30</div>
            </div>
        </div>

        <div class="timer-bar">
            <div class="timer-fill" id="timerFill"></div>
        </div>

        <div class="scrambled-word" id="scrambledWord">READY?</div>

        <div id="gameSection">
            <div class="input-section">
                <input type="text" id="answerInput" placeholder="答えを入力..." autocomplete="off">
            </div>

            <div class="message" id="message"></div>

            <div class="buttons">
                <button class="submit-btn" onclick="checkAnswer()">送信</button>
                <button class="skip-btn" onclick="skipWord()">スキップ</button>
                <button class="hint-btn" onclick="showHint()">ヒント</button>
            </div>
        </div>

        <div class="game-over" id="gameOver">
            <h2>🎮 ゲームオーバー！</h2>
            <div class="final-score" id="finalScore">0</div>
            <p>最高連続正解: <span id="maxStreak">0</span></p>
            <p>正解数: <span id="correctCount">0</span></p>
            <br>
            <button class="submit-btn" onclick="restartGame()">もう一度プレイ</button>
        </div>
    </div>

    <script>
        const words = [
            'apple', 'banana', 'orange', 'grape', 'mango',
            'piano', 'guitar', 'violin', 'drum', 'flute',
            'tiger', 'lion', 'elephant', 'monkey', 'panda',
            'computer', 'keyboard', 'mouse', 'screen', 'laptop',
            'happy', 'smile', 'laugh', 'dream', 'peace',
            'summer', 'winter', 'spring', 'autumn', 'season',
            'coffee', 'tea', 'water', 'juice', 'soda',
            'house', 'room', 'door', 'window', 'garden',
            'book', 'paper', 'pen', 'pencil', 'eraser',
            'music', 'dance', 'sing', 'play', 'listen'
        ];

        let currentWord = '';
        let scrambledWord = '';
        let score = 0;
        let streak = 0;
        let maxStreak = 0;
        let correctCount = 0;
        let timeLeft = 30;
        let timerInterval = null;
        let gameActive = false;
        let hintUsed = false;

        const hints = {
            'apple': '🍎 赤い果物',
            'banana': '🍌 黄色く曲がった果物',
            'orange': '🍊 オレンジ色の柑橘類',
            'grape': '🍇 ブドウの房',
            'mango': '🥭 熱帯の甘い果物',
            'piano': '🎹 黒と白の鍵盤楽器',
            'guitar': '🎸 6本弦の楽器',
            'violin': '🎻 弓で弾く弦楽器',
            'drum': '🥁 リズムを刻む打楽器',
            'flute': '🎵 縦に持って吹く管楽器',
            'tiger': '🐅 森の王、縞模様',
            'lion': '🦁 草原の王',
            'elephant': '🐘 鼻が長い巨大な動物',
            'monkey': '🐒 木登りが得意な動物',
            'panda': '🐼 白黒のクマ',
            'computer': '💻 情報処理機器',
            'keyboard': '⌨️ タイプする入力装置',
            'mouse': '🖱️ 手で動かすポインティングデバイス',
            'screen': '📺 画像を表示する装置',
            'laptop': '💻 持ち運べるコンピューター',
            'happy': '😊 幸せな感情',
            'smile': '😄 口元を上げる表情',
            'laugh': '😂 声を出して笑う',
            'dream': '💭 眠っている時に見るもの',
            'peace': '☮️ 平和',
            'summer': '☀️ 一番暑い季節',
            'winter': '❄️ 一番寒い季節',
            'spring': '🌸 花が咲く季節',
            'autumn': '🍂 紅葉する季節',
            'season': '🌍 春夏秋冬のどれか',
            'coffee': '☕ カフェイン飲料',
            'tea': '🍵 茶葉から作る飲み物',
            'water': '💧 生命に必要な液体',
            'juice': '🧃 果物を絞った飲み物',
            'soda': '🥤 炭酸飲料',
            'house': '🏠 人が住む建物',
            'room': '🚪 家の中の区切られた空間',
            'door': '🚪 入り口を開閉するもの',
            'window': '🪟 外が見えるガラスの開口部',
            'garden': '🌷 植物を育てる場所',
            'book': '📖 文字が書かれたページの束',
            'paper': '📄 文字を書く薄いシート',
            'pen': '🖊️ インクで書く道具',
            'pencil': '✏️ 黒鉛で書く道具',
            'eraser': '🧹 消しゴム',
            'music': '🎵 音による芸術',
            'dance': '💃 リズムに合わせて体を動かす',
            'sing': '🎤 歌う',
            'play': '🎮 遊ぶ',
            'listen': '👂 耳で聞く'
        };

        function shuffleWord(word) {
            const arr = word.split('');
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            const shuffled = arr.join('');
            return shuffled !== word ? shuffled : shuffleWord(word);
        }

        function newWord() {
            currentWord = words[Math.floor(Math.random() * words.length)];
            scrambledWord = shuffleWord(currentWord);
            document.getElementById('scrambledWord').textContent = scrambledWord;
            document.getElementById('answerInput').value = '';
            hintUsed = false;
        }

        function checkAnswer() {
            if (!gameActive) return;

            const input = document.getElementById('answerInput');
            const answer = input.value.toLowerCase().trim();
            const message = document.getElementById('message');

            if (answer === currentWord) {
                streak++;
                correctCount++;
                if (streak > maxStreak) maxStreak = streak;

                const baseScore = 100;
                const timeBonus = Math.floor(timeLeft * 2);
                const streakBonus = (streak - 1) * 50;
                const hintPenalty = hintUsed ? 30 : 0;
                const roundScore = Math.max(10, baseScore + timeBonus + streakBonus - hintPenalty);
                score += roundScore;

                message.textContent = `🎉 正解！ +${roundScore}ポイント`;
                message.className = 'message show success';
                input.className = 'correct';

                setTimeout(() => {
                    message.className = 'message';
                    input.className = '';
                    newWord();
                }, 1000);
            } else {
                streak = 0;
                message.textContent = '❌ 違います、もう一度！';
                message.className = 'message show error';
                input.className = 'wrong';

                setTimeout(() => {
                    message.className = 'message';
                    input.className = '';
                }, 1000);
            }

            updateStats();
        }

        function skipWord() {
            if (!gameActive) return;
            streak = 0;
            updateStats();
            newWord();
        }

        function showHint() {
            if (!gameActive || hintUsed) return;
            hintUsed = true;
            const message = document.getElementById('message');
            message.textContent = '💡 ' + hints[currentWord];
            message.className = 'message show hint';

            setTimeout(() => {
                message.className = 'message';
            }, 2000);
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('timer').textContent = timeLeft;
            const percentage = (timeLeft / 30) * 100;
            document.getElementById('timerFill').style.width = percentage + '%';
        }

        function startTimer() {
            timeLeft = 30;
            timerInterval = setInterval(() => {
                timeLeft--;
                updateStats();

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);
            document.getElementById('gameSection').style.display = 'none';
            document.getElementById('gameOver').classList.add('show');
            document.getElementById('finalScore').textContent = score;
            document.getElementById('maxStreak').textContent = maxStreak;
            document.getElementById('correctCount').textContent = correctCount;
        }

        function restartGame() {
            score = 0;
            streak = 0;
            maxStreak = 0;
            correctCount = 0;
            timeLeft = 30;
            gameActive = true;

            document.getElementById('gameSection').style.display = 'block';
            document.getElementById('gameOver').classList.remove('show');
            updateStats();
            newWord();
            startTimer();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Event listeners
        document.getElementById('answerInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        // Initialize
        restartGame();
    </script>
</body>
</html>
