<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Scramble - 文字並べ替えゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            color: #1e3c72;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            color: white;
        }

        .stat {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
        }

        .scrambled-word {
            font-size: 36px;
            font-weight: bold;
            color: #1e3c72;
            margin: 25px 0;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .hint {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
            font-style: italic;
        }

        .input-section {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            font-size: 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        input[type="text"].correct {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        input[type="text"].incorrect {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .submit-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4);
        }

        .skip-btn {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
        }

        .skip-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(245, 158, 11, 0.4);
        }

        .hint-btn {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            color: white;
        }

        .hint-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
        }

        .message {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            min-height: 27px;
        }

        .message.correct {
            color: #10b981;
        }

        .message.incorrect {
            color: #ef4444;
        }

        .message.info {
            color: #667eea;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .game-container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .scrambled-word {
                font-size: 28px;
                letter-spacing: 4px;
            }

            .buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">📺 Fullscreen</button>

    <div class="game-container">
        <h1>📝 Word Scramble</h1>
        <p class="subtitle">文字を並べ替えて単語を作ろう！</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">STREAK</div>
                <div class="stat-value" id="streak">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">BEST</div>
                <div class="stat-value" id="best">0</div>
            </div>
        </div>

        <div class="scrambled-word" id="scrambledWord">LOADING...</div>
        <div class="hint" id="hint">ヒントがここに表示されます</div>

        <div class="input-section">
            <input type="text" id="userInput" placeholder="答えを入力..." autocomplete="off">
        </div>

        <div class="buttons">
            <button class="submit-btn" onclick="checkAnswer()">✓ 確認</button>
            <button class="skip-btn" onclick="skipWord()">⏭ スキップ</button>
            <button class="hint-btn" onclick="showLetterHint()">💡 ヒント</button>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script>
        const words = [
            { word: 'JAVASCRIPT', hint: 'プログラミング言語' },
            { word: 'CREATIVE', hint: '創造的な' },
            { word: 'PUZZLE', hint: '頭を使う遊び' },
            { word: 'RAINBOW', hint: '雨上がりの空に' },
            { word: 'ELEPHANT', hint: '大きな鼻の動物' },
            { word: 'MOUNTAIN', hint: '高くてそびえる' },
            { word: 'BUTTERFLY', hint: '花から花へ飛ぶ' },
            { word: 'CHOCOLATE', hint: '甘いお菓子' },
            { word: 'ADVENTURE', hint: '冒険' },
            { word: 'BIRTHDAY', hint: '特別な日' },
            { word: 'FRIEND', hint: '大切な人' },
            { word: 'SUNSHINE', hint: '太陽の光' },
            { word: 'TREASURE', hint: '宝物' },
            { word: 'DOLPHIN', hint: '海で泳ぐ賢い動物' },
            { word: 'UNIVERSE', hint: '宇宙全体' },
            { word: 'WONDERFUL', hint: '素晴らしい' },
            { word: 'HARMONY', hint: '調和' },
            { word: 'JOURNEY', hint: '旅' },
            { word: 'MYSTERY', hint: '謎' },
            { word: 'VICTORY', hint: '勝利' }
        ];

        let currentWord = '';
        let currentHint = '';
        let score = 0;
        let streak = 0;
        let bestStreak = 0;
        let revealedLetters = 0;

        function shuffleWord(word) {
            const arr = word.split('');
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr.join('');
        }

        function newWord() {
            const randomIndex = Math.floor(Math.random() * words.length);
            currentWord = words[randomIndex].word;
            currentHint = words[randomIndex].hint;
            revealedLetters = 0;
            
            let scrambled = shuffleWord(currentWord);
            while (scrambled === currentWord) {
                scrambled = shuffleWord(currentWord);
            }
            
            document.getElementById('scrambledWord').textContent = scrambled;
            document.getElementById('hint').textContent = `ヒント: ${currentHint}`;
            document.getElementById('userInput').value = '';
            document.getElementById('userInput').className = '';
            document.getElementById('message').textContent = '';
            document.getElementById('message').className = 'message';
        }

        function checkAnswer() {
            const userInput = document.getElementById('userInput').value.toUpperCase().trim();
            const inputEl = document.getElementById('userInput');
            const messageEl = document.getElementById('message');

            if (!userInput) {
                messageEl.textContent = '答えを入力してください！';
                messageEl.className = 'message info';
                return;
            }

            if (userInput === currentWord) {
                streak++;
                if (streak > bestStreak) {
                    bestStreak = streak;
                }
                score += 100 + (streak * 10);

                inputEl.className = 'correct';
                messageEl.textContent = `🎉 正解！ +${100 + (streak * 10)}点`;
                messageEl.className = 'message correct';

                updateStats();

                setTimeout(() => {
                    newWord();
                }, 1500);
            } else {
                streak = 0;
                inputEl.className = 'incorrect';
                messageEl.textContent = '❌ 違います。もう一度！';
                messageEl.className = 'message incorrect';

                updateStats();

                setTimeout(() => {
                    inputEl.className = '';
                }, 500);
            }
        }

        function skipWord() {
            streak = 0;
            updateStats();
            newWord();
            document.getElementById('message').textContent = '⏭ スキップしました';
            document.getElementById('message').className = 'message info';
        }

        function showLetterHint() {
            if (revealedLetters < currentWord.length - 1) {
                revealedLetters++;
                const hint = currentWord.substring(0, revealedLetters) + '_'.repeat(currentWord.length - revealedLetters);
                document.getElementById('message').textContent = `💡 ヒント: ${hint.split('').join(' ')}`;
                document.getElementById('message').className = 'message info';
                score = Math.max(0, score - 20);
                updateStats();
            } else {
                document.getElementById('message').textContent = '💡 もうヒントはありません！';
                document.getElementById('message').className = 'message info';
            }
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('best').textContent = bestStreak;
        }

        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        newWord();
    </script>
</body>
</html>
