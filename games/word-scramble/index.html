<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Scramble - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .game-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .game-header h1 {
            color: #00d4ff;
            font-size: 2em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .stat {
            text-align: center;
            color: #fff;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #00ff88;
        }

        .stat-label {
            font-size: 0.8em;
            opacity: 0.7;
            margin-top: 5px;
        }

        .scrambled-word {
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid #00d4ff;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .scrambled-word::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.2), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .word-display {
            font-size: 2.5em;
            font-weight: bold;
            color: #00d4ff;
            letter-spacing: 5px;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.8);
        }

        .input-area {
            margin-bottom: 20px;
        }

        .input-area input {
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            text-align: center;
            transition: all 0.3s ease;
        }

        .input-area input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .input-area input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            font-size: 1em;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-submit {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #fff;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        .btn-hint {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: #fff;
        }

        .btn-hint:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
        }

        .btn-skip {
            background: linear-gradient(135deg, #6c5ce7, #5541d7);
            color: #fff;
        }

        .btn-skip:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(108, 92, 231, 0.4);
        }

        .message {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            border: 1px solid #00ff88;
        }

        .message.error {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
        }

        .message.hint {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid #ffc107;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid #00d4ff;
            color: #00d4ff;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        @media (max-width: 768px) {
            .game-container {
                padding: 20px;
            }

            .game-header h1 {
                font-size: 1.5em;
            }

            .word-display {
                font-size: 2em;
                letter-spacing: 3px;
            }

            .buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🔤 WORD SCRAMBLE</h1>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">SCORE</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="timeLeft">60</div>
                <div class="stat-label">TIME</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="streak">0</div>
                <div class="stat-label">STREAK</div>
            </div>
        </div>

        <div class="scrambled-word">
            <div class="word-display" id="scrambledWord">???</div>
        </div>

        <div class="input-area">
            <input type="text" id="answerInput" placeholder="Type your answer..." autocomplete="off">
        </div>

        <div class="buttons">
            <button class="btn btn-submit" onclick="checkAnswer()">SUBMIT</button>
            <button class="btn btn-hint" onclick="showHint()">HINT</button>
            <button class="btn btn-skip" onclick="skipWord()">SKIP</button>
        </div>

        <div id="message"></div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>

    <script>
        const words = [
            { word: 'JAVASCRIPT', hint: 'Programming language' },
            { word: 'ALGORITHM', hint: 'Step-by-step procedure' },
            { word: 'FUNCTION', hint: 'Reusable code block' },
            { word: 'VARIABLE', hint: 'Stores data' },
            { word: 'BROWSER', hint: 'Chrome, Safari, Firefox' },
            { word: 'CANVAS', hint: 'HTML5 drawing element' },
            { word: 'PIXEL', hint: 'Picture element' },
            { word: 'VECTOR', hint: 'Direction + magnitude' },
            { word: 'ARRAY', hint: 'Ordered list' },
            { word: 'OBJECT', hint: 'Key-value pairs' },
            { word: 'STRING', hint: 'Text data' },
            { word: 'NUMBER', hint: 'Numeric data' },
            { word: 'BOOLEAN', hint: 'True or false' },
            { word: 'LOOP', hint: 'Repeat code' },
            { word: 'CONDITION', hint: 'If-else statement' },
            { word: 'PROMISE', hint: 'Async operation' },
            { word: 'ASYNC', hint: 'Non-blocking' },
            { word: 'AWAIT', hint: 'Wait for promise' },
            { word: 'CLASS', hint: 'Blueprint for objects' },
            { word: 'METHOD', hint: 'Function in class' },
            { word: 'MODULE', hint: 'Reusable code file' },
            { word: 'PACKAGE', hint: 'Collection of modules' },
            { word: 'DEBUG', hint: 'Find and fix errors' },
            { word: 'COMPILE', hint: 'Convert code' },
            { word: 'SYNTAX', hint: 'Grammar of code' }
        ];

        let currentWord = null;
        let scrambledWord = '';
        let score = 0;
        let timeLeft = 60;
        let streak = 0;
        let gameActive = true;
        let timer = null;
        let usedWords = [];
        let hintsUsed = 0;

        const scrambledWordEl = document.getElementById('scrambledWord');
        const answerInput = document.getElementById('answerInput');
        const scoreEl = document.getElementById('score');
        const timeLeftEl = document.getElementById('timeLeft');
        const streakEl = document.getElementById('streak');
        const messageEl = document.getElementById('message');

        function shuffleWord(word) {
            const arr = word.split('');
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            const shuffled = arr.join('');
            return shuffled === word ? shuffleWord(word) : shuffled;
        }

        function getNewWord() {
            const availableWords = words.filter(w => !usedWords.includes(w.word));

            if (availableWords.length === 0) {
                usedWords = [];
                return getNewWord();
            }

            const randomIndex = Math.floor(Math.random() * availableWords.length);
            const wordObj = availableWords[randomIndex];
            usedWords.push(wordObj.word);

            return wordObj;
        }

        function newRound() {
            currentWord = getNewWord();
            scrambledWord = shuffleWord(currentWord.word);
            scrambledWordEl.textContent = scrambledWord;
            answerInput.value = '';
            answerInput.focus();
            hideMessage();
        }

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;

            if (type === 'success') {
                setTimeout(hideMessage, 1500);
            }
        }

        function hideMessage() {
            messageEl.textContent = '';
            messageEl.className = '';
        }

        function checkAnswer() {
            if (!gameActive) return;

            const answer = answerInput.value.toUpperCase().trim();

            if (!answer) {
                showMessage('Type something!', 'error');
                return;
            }

            if (answer === currentWord.word) {
                // 正解！
                const basePoints = 10;
                const streakBonus = streak * 5;
                const hintPenalty = hintsUsed * 3;
                const points = Math.max(1, basePoints + streakBonus - hintPenalty);

                score += points;
                streak++;
                hintsUsed = 0;

                scoreEl.textContent = score;
                streakEl.textContent = streak;

                showMessage(`✓ Correct! +${points} points!`, 'success');

                setTimeout(newRound, 1000);
            } else {
                // 不正解
                streak = 0;
                streakEl.textContent = streak;
                showMessage('✗ Try again!', 'error');
                answerInput.classList.add('shake');

                setTimeout(() => {
                    answerInput.classList.remove('shake');
                }, 500);
            }
        }

        function showHint() {
            if (!gameActive) return;

            const hint = currentWord.hint;
            const firstLetter = currentWord.word[0];
            const length = currentWord.word.length;

            showMessage(`💡 ${hint} (${length} letters, starts with "${firstLetter}")`, 'hint');
            hintsUsed++;
        }

        function skipWord() {
            if (!gameActive) return;

            streak = 0;
            streakEl.textContent = streak;
            showMessage('Skipped!', 'error');

            setTimeout(newRound, 500);
        }

        function startTimer() {
            timer = setInterval(() => {
                timeLeft--;
                timeLeftEl.textContent = timeLeft;

                if (timeLeft <= 10) {
                    timeLeftEl.style.color = '#ff6b6b';
                }

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameActive = false;
            clearInterval(timer);

            showMessage(`Game Over! Final Score: ${score}`, 'success');

            setTimeout(() => {
                if (confirm(`Time's up! Score: ${score}\nPlay again?`)) {
                    resetGame();
                }
            }, 2000);
        }

        function resetGame() {
            score = 0;
            timeLeft = 60;
            streak = 0;
            gameActive = true;
            usedWords = [];
            hintsUsed = 0;

            scoreEl.textContent = score;
            timeLeftEl.textContent = timeLeft;
            streakEl.textContent = streak;
            timeLeftEl.style.color = '#00ff88';

            newRound();
            startTimer();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Enterキーで送信
        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        // シェイクアニメーション
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                75% { transform: translateX(10px); }
            }
            .shake {
                animation: shake 0.3s ease;
            }
        `;
        document.head.appendChild(style);

        // ゲーム開始
        newRound();
        startTimer();
    </script>
</body>
</html>
