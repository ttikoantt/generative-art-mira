<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Word Scramble | 並べ替えゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #fff;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            color: #a0d8ff;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            text-align: center;
            margin-bottom: 25px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
            gap: 15px;
        }

        .stat {
            text-align: center;
            background: rgba(255, 255, 255, 0.15);
            padding: 15px 25px;
            border-radius: 15px;
            flex: 1;
        }

        .stat-label {
            color: #a0d8ff;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #fff;
            font-size: 1.8rem;
            font-weight: bold;
        }

        .scrambled-word {
            text-align: center;
            margin-bottom: 30px;
        }

        .word-display {
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: bold;
            color: #fff;
            letter-spacing: 0.1em;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            word-break: break-all;
        }

        .input-section {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            text-align: center;
            outline: none;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.3);
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        input[type="text"].correct {
            background: rgba(100, 255, 100, 0.3);
            border: 2px solid #4ade80;
        }

        input[type="text"].wrong {
            background: rgba(255, 100, 100, 0.3);
            border: 2px solid #f87171;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 15px 25px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit {
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            color: #fff;
        }

        .btn-submit:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(74, 222, 128, 0.4);
        }

        .btn-skip {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .btn-skip:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .hint {
            text-align: center;
            color: #a0d8ff;
            font-size: 0.9rem;
            margin-top: 15px;
            min-height: 1.5em;
        }

        .message {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .message.success {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
        }

        .message.error {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
        }

        .difficulty {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .difficulty-btn {
            padding: 8px 16px;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.15);
            color: #a0d8ff;
            border: 1px solid rgba(160, 216, 255, 0.3);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .difficulty-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .difficulty-btn.active {
            background: rgba(74, 222, 128, 0.3);
            border-color: #4ade80;
            color: #fff;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            .stats {
                flex-direction: column;
            }

            .buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Word Scramble</h1>
        <p class="subtitle">単語並べ替えゲーム</p>

        <div class="difficulty">
            <button class="difficulty-btn active" data-difficulty="easy">やさしい</button>
            <button class="difficulty-btn" data-difficulty="medium">ふつう</button>
            <button class="difficulty-btn" data-difficulty="hard">むずかしい</button>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">問題</div>
                <div class="stat-value" id="question">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">正解率</div>
                <div class="stat-value" id="accuracy">0%</div>
            </div>
        </div>

        <div class="scrambled-word">
            <div class="word-display" id="scrambledWord">Loading...</div>
        </div>

        <div id="message"></div>

        <div class="input-section">
            <input type="text" id="answerInput" placeholder="答えを入力..." maxlength="20">
        </div>

        <div class="buttons">
            <button class="btn-submit" id="submitBtn">送信</button>
            <button class="btn-skip" id="skipBtn">スキップ</button>
        </div>

        <div class="hint" id="hint"></div>
    </div>

    <script>
        // Word lists by difficulty
        const words = {
            easy: [
                { word: "APPLE", hint: "果物" },
                { word: "CAT", hint: "動物" },
                { word: "DOG", hint: "動物" },
                { word: "FISH", hint: "水に住む生物" },
                { word: "BIRD", hint: "空を飛ぶ動物" },
                { word: "SUN", hint: "空にある星" },
                { word: "MOON", hint: "夜に見える" },
                { word: "STAR", hint: "夜空に光る" },
                { word: "TREE", hint: "植物" },
                { word: "BOOK", hint: "読むもの" },
                { word: "PEN", hint: "書くもの" },
                { word: "MILK", hint: "飲み物" },
                { word: "RED", hint: "色" },
                { word: "BLUE", hint: "色" },
                { word: "GREEN", hint: "色" }
            ],
            medium: [
                { word: "GARDEN", hint: "花や植物を育てる場所" },
                { word: "WINDOW", hint: "部屋にあるガラス" },
                { word: "COMPUTER", hint: "電子機器" },
                { word: "MUSIC", hint: "耳で楽しむもの" },
                { word: "FRIEND", hint: "仲間" },
                { word: "SUMMER", hint: "暑い季節" },
                { word: "WINTER", hint: "寒い季節" },
                { word: "ORANGE", hint: "果物であり色" },
                { word: "RABBIT", hint: "長い耳の動物" },
                { word: "SCHOOL", hint: "学ぶ場所" },
                { word: "DOCTOR", hint: "病気を治す人" },
                { word: "MARKET", hint: "買い物をする場所" }
            ],
            hard: [
                { word: "RAINBOW", hint: "雨上がりに見える" },
                { word: "ELEPHANT", hint: "鼻が長い動物" },
                { word: "COMPUTER", hint: "計算機" },
                { word: "KEYBOARD", hint: "タイピングするもの" },
                { word: "LANGUAGE", hint: "話すこと" },
                { word: "ADVENTURE", hint: "冒険" },
                { word: "BEAUTIFUL", hint: "美しい" },
                { word: "MOUNTAIN", hint: "高い地形" },
                { word: "UNIVERSE", hint: "宇宙" },
                { word: "BUTTERFLY", hint: "飛ぶ昆虫" },
                { word: "CHOCOLATE", hint: "甘いおやつ" },
                { word: "TELESCOPE", hint: "遠くを見る道具" }
            ]
        };

        // Game state
        let currentDifficulty = 'easy';
        let currentWord = '';
        let scrambledWord = '';
        let currentHint = '';
        let score = 0;
        let questionNum = 1;
        let correctAnswers = 0;
        let totalAnswers = 0;
        let usedWords = new Set();

        // DOM elements
        const scrambledWordEl = document.getElementById('scrambledWord');
        const answerInput = document.getElementById('answerInput');
        const submitBtn = document.getElementById('submitBtn');
        const skipBtn = document.getElementById('skipBtn');
        const scoreEl = document.getElementById('score');
        const questionEl = document.getElementById('question');
        const accuracyEl = document.getElementById('accuracy');
        const hintEl = document.getElementById('hint');
        const messageEl = document.getElementById('message');
        const difficultyBtns = document.querySelectorAll('.difficulty-btn');

        // Shuffle word
        function shuffleWord(word) {
            const arr = word.split('');
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr.join('');
        }

        // Get random word
        function getRandomWord() {
            const wordList = words[currentDifficulty];
            const available = wordList.filter(w => !usedWords.has(w.word));

            if (available.length === 0) {
                // Reset used words if all used
                usedWords.clear();
                return wordList[Math.floor(Math.random() * wordList.length)];
            }

            return available[Math.floor(Math.random() * available.length)];
        }

        // New question
        function newQuestion() {
            const wordObj = getRandomWord();
            currentWord = wordObj.word;
            currentHint = wordObj.hint;

            // Make sure scrambled word is different from original
            do {
                scrambledWord = shuffleWord(currentWord);
            } while (scrambledWord === currentWord && currentWord.length > 1);

            // Update UI
            scrambledWordEl.textContent = scrambledWord;
            answerInput.value = '';
            answerInput.className = '';
            hintEl.textContent = `ヒント: ${currentHint}`;
            messageEl.textContent = '';
            messageEl.className = 'message';

            questionEl.textContent = questionNum;
        }

        // Update accuracy
        function updateAccuracy() {
            if (totalAnswers === 0) {
                accuracyEl.textContent = '0%';
            } else {
                accuracyEl.textContent = Math.round((correctAnswers / totalAnswers) * 100) + '%';
            }
        }

        // Check answer
        function checkAnswer() {
            const answer = answerInput.value.toUpperCase().trim();

            if (!answer) {
                showMessage('答えを入力してください', 'error');
                return;
            }

            totalAnswers++;

            if (answer === currentWord) {
                // Correct
                correctAnswers++;
                score += 10;
                scoreEl.textContent = score;
                answerInput.className = 'correct';
                showMessage('🎉 正解！素晴らしい！', 'success');
                updateAccuracy();

                // Mark word as used
                usedWords.add(currentWord);

                // Next question after delay
                setTimeout(() => {
                    questionNum++;
                    newQuestion();
                }, 1500);
            } else {
                // Wrong
                answerInput.className = 'wrong';
                showMessage('不正解...もう一度！', 'error');
                updateAccuracy();

                // Remove wrong class after animation
                setTimeout(() => {
                    answerInput.className = '';
                }, 500);
            }
        }

        // Show message
        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
        }

        // Skip question
        function skipQuestion() {
            showMessage(`答えは「${currentWord}」でした`, 'error');
            totalAnswers++;
            updateAccuracy();
            usedWords.add(currentWord);

            setTimeout(() => {
                questionNum++;
                newQuestion();
            }, 2000);
        }

        // Set difficulty
        function setDifficulty(difficulty) {
            currentDifficulty = difficulty;

            // Update button styles
            difficultyBtns.forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.difficulty === difficulty) {
                    btn.classList.add('active');
                }
            });

            // Reset game
            usedWords.clear();
            questionNum = 1;
            newQuestion();
        }

        // Event listeners
        submitBtn.addEventListener('click', checkAnswer);

        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        skipBtn.addEventListener('click', skipQuestion);

        difficultyBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                setDifficulty(btn.dataset.difficulty);
            });
        });

        // Initialize game
        newQuestion();
    </script>
</body>
</html>
