<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Scramble - ワードスクランブル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2em;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 0.9em;
            opacity: 0.8;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: 700;
            color: #00ffcc;
        }

        .stat-label {
            font-size: 0.75em;
            opacity: 0.7;
        }

        .word-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .scrambled-word {
            font-size: 2.5em;
            font-weight: 700;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .hint {
            font-size: 0.9em;
            opacity: 0.7;
            font-style: italic;
        }

        .input-container {
            margin-bottom: 20px;
        }

        .input-container input {
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            text-align: center;
            outline: none;
        }

        .input-container input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 15px;
            font-size: 1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .submit-btn {
            background: linear-gradient(135deg, #00ffcc 0%, #667eea 100%);
            color: #0a0a0a;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 204, 0.4);
        }

        .skip-btn {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .skip-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .hint-btn {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .hint-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .message {
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: 600;
            display: none;
        }

        .message.success {
            background: rgba(0, 255, 204, 0.2);
            color: #00ffcc;
            display: block;
        }

        .message.error {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            display: block;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: none;
            color: #fff;
            font-size: 1.5em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .scrambled-word {
                font-size: 2em;
                letter-spacing: 3px;
            }

            .buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <div class="header">
            <h1>Word Scramble</h1>
            <p>並べ替えられた単語を元に戻そう！</p>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">スコア</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="streak">0</div>
                <div class="stat-label">連続正解</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="total">0</div>
                <div class="stat-label">総問題数</div>
            </div>
        </div>

        <div class="word-container">
            <div class="scrambled-word" id="scrambledWord">LOADING...</div>
            <div class="hint" id="hintText"></div>
        </div>

        <div class="message" id="message"></div>

        <div class="input-container">
            <input type="text" id="answerInput" placeholder="ここに答えを入力..." autocomplete="off">
        </div>

        <div class="buttons">
            <button class="submit-btn" onclick="checkAnswer()">答える</button>
            <button class="hint-btn" onclick="showHint()">ヒント</button>
            <button class="skip-btn" onclick="skipWord()">スキップ</button>
        </div>
    </div>

    <script>
        const words = [
            { word: "JAVASCRIPT", hint: "プログラミング言語" },
            { word: "CREATIVE", hint: "創造的な" },
            { word: "PUZZLE", hint: "パズル" },
            { word: "RAINBOW", hint: "空に架かる橋" },
            { word: "ELEPHANT", hint: "鼻が長い動物" },
            { word: "COMPUTER", hint: "電子機器" },
            { word: "BEAUTIFUL", hint: "美しい" },
            { word: "ADVENTURE", hint: "冒険" },
            { word: "CHOCOLATE", hint: "甘いお菓子" },
            { word: "DOLPHIN", hint: "海に住む哺乳類" },
            { word: "FANTASTIC", hint: "素晴らしい" },
            { word: "GUITAR", hint: "弦楽器" },
            { word: "HAPPINESS", hint: "幸せ" },
            { word: "ISLAND", hint: "陸地に囲まれた海" },
            { word: "JOURNEY", hint: "旅" },
            { word: "KANGAROO", hint: "オーストラリアの動物" },
            { word: "LIBRARY", hint: "本がたくさんある場所" },
            { word: "MYSTERY", hint: "神秘的な" },
            { word: "NEBULA", hint: "宇宙にある星雲" },
            { word: "OCEAN", hint: "大きな海" },
            { word: "PENGUIN", hint: "南極に住む鳥" },
            { word: "QUESTION", hint: "質問" },
            { word: "RAINBOW", hint: "七色の光" },
            { word: "SUNSHINE", hint: "太陽の光" },
            { word: "TREASURE", hint: "宝物" },
            { word: "UNIVERSE", hint: "宇宙全体" },
            { word: "VOLCANO", hint: "噴火する山" },
            { word: "WATERFALL", hint: "滝" },
            { word: "XYLOPHONE", hint: "木琴" },
            { word: "YOGA", hint: "瞑想法" },
            { word: "ZEBRA", hint: "シマウマ" },
            { word: "ALGORITHM", hint: "計算手順" },
            { word: "BUTTERFLY", hint: "美しい虫" },
            { word: "CACTUS", hint: "サボテン" },
            { word: "DAISY", hint: "ヒナギク" },
            { word: "ECLIPSE", hint: "日食・月食" },
            { word: "FREEDOM", hint: "自由" },
            { word: "GLACIER", hint: "氷河" },
            { word: "HARMONY", hint: "調和" },
            { word: "INSPIRE", hint: "インスピレーション" },
            { word: "JASMINE", hint: "ジャスミン" },
            { word: "KARMA", hint: "因果" },
            { word: "LOTUS", hint: "蓮の花" },
            { word: "MELANCHOLY", hint: "憂鬱" },
            { word: "NOSTALGIA", hint: "懐かしさ" },
            { word: "OPAL", hint: "オパール" },
            { word: "PARADISE", hint: "楽園" },
            { word: "QUARTZ", hint: "水晶" },
            { word: "RHYTHM", hint: "リズム" },
            { word: "SERENDIPITY", hint: "偶然の幸運" },
            { word: "TWILIGHT", hint: "黄昏時" },
            { word: "UMBRELLA", hint: "雨傘" },
            { word: "VIBRANT", hint: "活発な" },
            { word: "WANDERLUST", hint: "旅への憧れ" },
            { word: "ZENITH", hint: "天頂" }
        ];

        let currentWord = null;
        let score = 0;
        let streak = 0;
        let total = 0;
        let usedWords = [];

        function shuffleWord(word) {
            const array = word.split('');
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            const shuffled = array.join('');

            if (shuffled === word && word.length > 1) {
                return shuffleWord(word);
            }

            return shuffled;
        }

        function getNewWord() {
            if (usedWords.length >= words.length) {
                usedWords = [];
            }

            let wordData;
            do {
                wordData = words[Math.floor(Math.random() * words.length)];
            } while (usedWords.includes(wordData.word));

            usedWords.push(wordData.word);
            return wordData;
        }

        function loadNewWord() {
            currentWord = getNewWord();
            const scrambled = shuffleWord(currentWord.word);
            document.getElementById('scrambledWord').textContent = scrambled;
            document.getElementById('hintText').textContent = '';
            document.getElementById('answerInput').value = '';
            document.getElementById('message').className = 'message';
            document.getElementById('message').textContent = '';
            document.getElementById('answerInput').focus();
        }

        function checkAnswer() {
            const answer = document.getElementById('answerInput').value.toUpperCase().trim();
            const messageEl = document.getElementById('message');

            if (answer === currentWord.word) {
                total++;
                streak++;
                const points = 10 + streak * 2;
                score += points;

                messageEl.textContent = `🎉 正解！ +${points}点（連続${streak}回）`;
                messageEl.className = 'message success';

                updateStats();
                setTimeout(loadNewWord, 1500);
            } else if (answer.length > 0) {
                streak = 0;
                messageEl.textContent = '❌ 違います。もう一度！';
                messageEl.className = 'message error';
                updateStats();
            }
        }

        function showHint() {
            document.getElementById('hintText').textContent = `💡 ヒント: ${currentWord.hint}`;
        }

        function skipWord() {
            streak = 0;
            updateStats();
            loadNewWord();
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('total').textContent = total;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        document.getElementById('answerInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        loadNewWord();
    </script>
</body>
</html>
