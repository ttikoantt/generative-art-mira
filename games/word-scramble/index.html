<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Scramble - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #999;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 20px;
        }

        .stat {
            color: white;
        }

        .stat-label {
            font-size: 0.8em;
            opacity: 0.9;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
        }

        .scrambled-word {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
            margin: 30px 0;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .input-section {
            margin: 30px 0;
        }

        input[type="text"] {
            width: 100%;
            padding: 20px;
            font-size: 1.5em;
            text-align: center;
            border: 3px solid #667eea;
            border-radius: 15px;
            outline: none;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            border-color: #764ba2;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }

        input[type="text"].correct {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        input[type="text"].wrong {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 15px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .submit-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .skip-btn {
            background: #f3f4f6;
            color: #666;
        }

        .skip-btn:hover {
            background: #e5e7eb;
        }

        .hint-btn {
            background: #fef3c7;
            color: #92400e;
        }

        .hint-btn:hover {
            background: #fde68a;
        }

        .hint-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            margin-top: 20px;
            font-size: 1.2em;
            font-weight: bold;
            min-height: 30px;
            transition: all 0.3s;
        }

        .message.correct {
            color: #10b981;
        }

        .message.wrong {
            color: #ef4444;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .category {
            display: inline-block;
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>📝 Word Scramble</h1>
        <p class="subtitle">文字を並べ替えて単語を作ろう！</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">問題</div>
                <div class="stat-value"><span id="current">1</span>/<span id="total">10</span></div>
            </div>
            <div class="stat">
                <div class="stat-label">連続正解</div>
                <div class="stat-value" id="streak">0</div>
            </div>
        </div>

        <div class="category" id="category">カテゴリ</div>

        <div class="scrambled-word" id="scrambledWord">WORD</div>

        <div class="input-section">
            <input type="text" id="answer" placeholder="答えを入力..." autocomplete="off">
        </div>

        <div class="buttons">
            <button class="hint-btn" id="hintBtn" onclick="showHint()">💡 ヒント</button>
            <button class="skip-btn" onclick="skipQuestion()">⏭ スキップ</button>
            <button class="submit-btn" onclick="checkAnswer()">✓ 送信</button>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script>
        const words = [
            { word: "JAPAN", hint: "東アジアの国", category: "国名" },
            { word: "TOKYO", hint: "日本の首都", category: "都市" },
            { word: "SUSHI", hint: "日本料理", category: "食べ物" },
            { word: "SAMURAI", hint: "日本の武士", category: "歴史" },
            { word: "ANIME", hint: "日本のアニメーション", category: "文化" },
            { word: "FUJI", hint: "日本一高い山", category: "地理" },
            { word: "SAKE", hint: "日本の酒", category: "食べ物" },
            { word: "KIMONO", hint: "日本の伝統衣装", category: "文化" },
            { word: "ORIGAMI", hint: "紙を折る芸術", category: "文化" },
            { word: "RAMEN", hint: "日本の麺料理", category: "食べ物" },
            { word: "MANGA", hint: "日本の漫画", category: "文化" },
            { word: "BONSAI", hint: "鉢植えの芸術", category: "文化" },
            { word: "KARAOKE", hint: "歌を楽しむ遊び", category: "娯楽" },
            { word: "TEMPURA", hint: "揚げ物", category: "食べ物" },
            { word: "GEISHA", hint: "芸舞妓", category: "歴史" },
            { word: "SHINKANSEN", hint: "高速列車", category: "交通" },
            { word: "YAKINIKU", hint: "焼肉", category: "食べ物" },
            { word: "WAGYU", hint: "和牛", category: "食べ物" },
            { word: "ONSEN", hint: "温泉", category: "地理" },
            { word: "NINJA", hint: "忍術使い", category: "歴史" }
        ];

        let currentWordIndex = 0;
        let score = 0;
        let streak = 0;
        let currentWord = null;
        let shuffledWords = [];
        let hintUsed = false;

        function shuffle(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function shuffleWord(word) {
            const arr = word.split('');
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            const shuffled = arr.join('');
            // シャッフルしても同じなら再試行
            if (shuffled === word) return shuffleWord(word);
            return shuffled;
        }

        function initGame() {
            shuffledWords = shuffle(words);
            currentWordIndex = 0;
            score = 0;
            streak = 0;
            updateStats();
            loadWord();
        }

        function loadWord() {
            if (currentWordIndex >= shuffledWords.length) {
                endGame();
                return;
            }

            currentWord = shuffledWords[currentWordIndex];
            hintUsed = false;

            document.getElementById('scrambledWord').textContent = shuffleWord(currentWord.word);
            document.getElementById('category').textContent = currentWord.category;
            document.getElementById('answer').value = '';
            document.getElementById('answer').className = '';
            document.getElementById('message').textContent = '';
            document.getElementById('message').className = 'message';
            document.getElementById('hintBtn').disabled = false;

            updateStats();
        }

        function checkAnswer() {
            const answer = document.getElementById('answer').value.toUpperCase().trim();
            const input = document.getElementById('answer');

            if (answer === currentWord.word) {
                // 正解
                input.className = 'correct';
                showMessage('🎉 正解！ +' + (10 + streak * 2) + '点', 'correct');

                streak++;
                const points = 10 + streak * 2 - (hintUsed ? 3 : 0);
                score += Math.max(1, points);

                updateStats();

                setTimeout(() => {
                    currentWordIndex++;
                    loadWord();
                }, 1500);
            } else if (answer.length > 0) {
                // 不正解
                input.className = 'wrong';
                showMessage('❌ 違います...もう一度！', 'wrong');
                streak = 0;
                updateStats();

                setTimeout(() => {
                    input.className = '';
                }, 500);
            }
        }

        function skipQuestion() {
            streak = 0;
            showMessage('スキップしました', 'wrong');
            updateStats();
            setTimeout(() => {
                currentWordIndex++;
                loadWord();
            }, 1000);
        }

        function showHint() {
            if (hintUsed) return;
            hintUsed = true;
            document.getElementById('hintBtn').disabled = true;
            showMessage('💡 ヒント: ' + currentWord.hint, 'correct');
        }

        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = 'message ' + type;
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('current').textContent = currentWordIndex + 1;
            document.getElementById('total').textContent = Math.min(10, shuffledWords.length);
            document.getElementById('streak').textContent = streak;
        }

        function endGame() {
            const container = document.querySelector('.container');
            container.innerHTML = `
                <h1>🎊 ゲーム終了！</h1>
                <p class="subtitle">お疲れ様でした！</p>

                <div class="stats">
                    <div class="stat">
                        <div class="stat-label">最終スコア</div>
                        <div class="stat-value">${score}</div>
                    </div>
                </div>

                <div style="margin: 30px 0;">
                    <p style="font-size: 1.5em; color: #667eea;">
                        ${getScoreMessage(score)}
                    </p>
                </div>

                <button class="submit-btn" onclick="location.reload()">🔄 もう一度遊ぶ</button>
            `;
        }

        function getScoreMessage(score) {
            if (score >= 150) return "🏆 完璧なスコア！";
            if (score >= 100) return "🌟 素晴らしい！";
            if (score >= 70) return "👍 とても良い！";
            if (score >= 40) return "😊 頑張ったね！";
            return "💪 練習あるのみ！";
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Enterキーで送信
        document.getElementById('answer').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        // ゲーム開始
        initGame();
    </script>
</body>
</html>
