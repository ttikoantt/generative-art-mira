<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Scramble - 文字並べ替えパズル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            color: white;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }

        .game-area {
            text-align: center;
            margin: 30px 0;
        }

        .scrambled-word {
            font-size: 48px;
            font-weight: bold;
            color: #764ba2;
            letter-spacing: 8px;
            margin: 20px 0;
            min-height: 60px;
        }

        .input-area {
            margin: 20px 0;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            font-size: 24px;
            border: 3px solid #667eea;
            border-radius: 12px;
            text-align: center;
            letter-spacing: 4px;
            text-transform: uppercase;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: #764ba2;
            box-shadow: 0 0 20px rgba(118, 75, 162, 0.3);
        }

        input[type="text"].correct {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        input[type="text"].wrong {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .hint-btn {
            background: #f59e0b;
            color: white;
        }

        .hint-btn:hover {
            background: #d97706;
        }

        .skip-btn {
            background: #6b7280;
            color: white;
        }

        .skip-btn:hover {
            background: #4b5563;
        }

        .message {
            text-align: center;
            padding: 15px;
            margin-top: 20px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            display: none;
        }

        .message.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #667eea;
            color: #667eea;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: #667eea;
            color: white;
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 22px;
            }

            .scrambled-word {
                font-size: 32px;
                letter-spacing: 4px;
            }

            .stat-value {
                font-size: 24px;
            }

            button {
                padding: 12px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    
    <div class="container">
        <h1>📝 Word Scramble</h1>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">SCORE</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="streak">0</div>
                <div class="stat-label">STREAK</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="total">0</div>
                <div class="stat-label">SOLVED</div>
            </div>
        </div>

        <div class="game-area">
            <div class="scrambled-word" id="scrambledWord">LOADING...</div>
            
            <div class="input-area">
                <input type="text" id="answer" placeholder="Type answer here..." maxlength="20" autocomplete="off">
            </div>

            <div class="buttons">
                <button class="submit-btn" onclick="checkAnswer()">✓ Check</button>
                <button class="hint-btn" onclick="showHint()">💡 Hint</button>
                <button class="skip-btn" onclick="skipWord()">Skip</button>
            </div>

            <div class="message" id="message"></div>
        </div>
    </div>

    <script>
        const words = [
            'APPLE', 'BEACH', 'CHAIR', 'DREAM', 'EAGLE',
            'FLAME', 'GRAPE', 'HOUSE', 'IMAGE', 'JUICE',
            'KNIFE', 'LEMON', 'MANGO', 'NIGHT', 'OCEAN',
            'PIANO', 'QUEEN', 'RIVER', 'STORM', 'TIGER',
            'UNCLE', 'VIDEO', 'WATER', 'XENON', 'YACHT',
            'ZEBRA', 'BREAD', 'CLOUD', 'DANCE', 'EARTH',
            'FRUIT', 'GHOST', 'HEART', 'IVORY', 'JELLY',
            'KARMA', 'LUNCH', 'MOUSE', 'NOBLE', 'OLIVE',
            'PEACE', 'QUILT', 'ROBOT', 'SNAKE', 'TRUCK',
            'UNITY', 'VOICE', 'WORLD', 'XEROX', 'YOUNG'
        ];

        let currentWord = '';
        let scrambledWord = '';
        let score = 0;
        let streak = 0;
        let totalSolved = 0;
        let hintUsed = false;

        function scrambleWord(word) {
            const letters = word.split('');
            for (let i = letters.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [letters[i], letters[j]] = [letters[j], letters[i]];
            }
            return letters.join('');
        }

        function loadNewWord() {
            currentWord = words[Math.floor(Math.random() * words.length)];
            scrambledWord = scrambleWord(currentWord);
            
            // Make sure scrambled is different from original
            while (scrambledWord === currentWord) {
                scrambledWord = scrambleWord(currentWord);
            }

            document.getElementById('scrambledWord').textContent = scrambledWord;
            document.getElementById('answer').value = '';
            document.getElementById('answer').className = '';
            document.getElementById('message').className = 'message';
            hintUsed = false;
        }

        function checkAnswer() {
            const answer = document.getElementById('answer').value.toUpperCase().trim();
            const input = document.getElementById('answer');
            const message = document.getElementById('message');

            if (!answer) return;

            if (answer === currentWord) {
                // Correct!
                streak++;
                totalSolved++;
                
                const bonus = hintUsed ? 5 : 10;
                const streakBonus = streak >= 3 ? streak * 2 : 0;
                const pointsEarned = bonus + streakBonus;
                score += pointsEarned;

                input.className = 'correct';
                message.textContent = `🎉 Correct! +${pointsEarned} points${streak >= 3 ? ` (Streak bonus: ${streak * 2})` : ''}`;
                message.className = 'message show success';

                updateStats();

                setTimeout(() => {
                    message.className = 'message';
                    loadNewWord();
                }, 1500);
            } else {
                // Wrong
                streak = 0;
                input.className = 'wrong';
                message.textContent = '❌ Try again!';
                message.className = 'message show error';

                setTimeout(() => {
                    input.className = '';
                    message.className = 'message';
                }, 1000);

                updateStats();
            }
        }

        function showHint() {
            const message = document.getElementById('message');
            const hintLength = Math.ceil(currentWord.length / 2);
            const hint = currentWord.substring(0, hintLength) + '_'.repeat(currentWord.length - hintLength);
            
            hintUsed = true;
            message.textContent = `💡 Hint: ${hint}`;
            message.className = 'message show';
        }

        function skipWord() {
            streak = 0;
            updateStats();
            loadNewWord();
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('total').textContent = totalSolved;
        }

        // Enter key support
        document.getElementById('answer').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        loadNewWord();
    </script>
</body>
</html>
