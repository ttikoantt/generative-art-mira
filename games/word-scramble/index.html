<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Word Scramble</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .score {
            color: #764ba2;
            font-size: 18px;
            margin-bottom: 20px;
        }
        .scrambled-word {
            font-size: 36px;
            font-weight: bold;
            color: #333;
            margin: 20px 0;
            letter-spacing: 5px;
            min-height: 50px;
        }
        .input-section {
            margin: 20px 0;
        }
        input {
            width: 100%;
            padding: 15px;
            font-size: 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            text-align: center;
            font-size: 24px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            flex: 1;
            padding: 15px 20px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        .submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .skip {
            background: #f0f0f0;
            color: #666;
        }
        .skip:hover {
            background: #e0e0e0;
        }
        .hint {
            margin-top: 15px;
            color: #999;
            font-size: 14px;
            min-height: 20px;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            display: none;
        }
        .correct {
            background: #4caf50;
            color: white;
        }
        .wrong {
            background: #f44336;
            color: white;
        }
        .fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <h1>🔤 Word Scramble</h1>
        <div class="score">Score: <span id="score">0</span> | Streak: <span id="streak">0</span></div>

        <div class="scrambled-word" id="scrambledWord"></div>

        <div class="input-section">
            <input type="text" id="answer" placeholder="Type here..." autocomplete="off">
        </div>

        <div class="buttons">
            <button class="submit" onclick="checkAnswer()">Submit</button>
            <button class="skip" onclick="skipWord()">Skip</button>
        </div>

        <div class="hint" id="hint"></div>
        <div class="message" id="message"></div>
    </div>

    <script>
        const words = [
            { word: 'CREATIVE', hint: 'Artistic and imaginative' },
            { word: 'PUZZLE', hint: 'A game or problem to solve' },
            { word: 'RAINBOW', hint: 'Colorful arc in the sky' },
            { word: 'JOURNEY', hint: 'A long trip or adventure' },
            { word: 'WHISPER', hint: 'Speak very softly' },
            { word: 'BREEZE', hint: 'A gentle wind' },
            { word: 'SPARKLE', hint: 'Shine brightly' },
            { word: 'DREAM', hint: 'Images during sleep' },
            { word: 'WONDER', hint: 'Feeling of amazement' },
            { word: 'HARMONY', hint: 'Pleasing combination' },
            { word: 'LIBERTY', hint: 'Freedom' },
            { word: 'DISCOVER', hint: 'Find something new' },
            { word: 'MYSTERY', hint: 'Something unknown' },
            { word: 'ADVENTURE', hint: 'Exciting experience' },
            { word: 'TREASURE', hint: 'Valuable hidden items' }
        ];

        let currentWord = null;
        let score = 0;
        let streak = 0;
        let maxStreak = 0;

        function shuffleWord(word) {
            const arr = word.split('');
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            const shuffled = arr.join('');
            return shuffled === word ? shuffleWord(word) : shuffled;
        }

        function newWord() {
            currentWord = words[Math.floor(Math.random() * words.length)];
            document.getElementById('scrambledWord').textContent = shuffleWord(currentWord.word);
            document.getElementById('answer').value = '';
            document.getElementById('hint').textContent = `💡 Hint: ${currentWord.hint}`;
            document.getElementById('message').style.display = 'none';
            document.getElementById('answer').focus();
        }

        function checkAnswer() {
            const answer = document.getElementById('answer').value.toUpperCase().trim();
            const messageEl = document.getElementById('message');

            if (answer === currentWord.word) {
                streak++;
                score += streak * 10;
                if (streak > maxStreak) maxStreak = streak;

                messageEl.textContent = `✨ Correct! +${streak * 10} points (Streak: ${streak})`;
                messageEl.className = 'message correct';
                messageEl.style.display = 'block';

                updateScore();
                setTimeout(newWord, 1500);
            } else {
                streak = 0;
                messageEl.textContent = `❌ Try again!`;
                messageEl.className = 'message wrong';
                messageEl.style.display = 'block';
                updateScore();
            }
        }

        function skipWord() {
            streak = 0;
            updateScore();
            newWord();
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        document.getElementById('answer').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        newWord();
    </script>
</body>
</html>
