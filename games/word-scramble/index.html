<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Scramble - 単語並べ替えゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .game-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .game-header h1 {
            font-size: 2rem;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            font-size: 1.2rem;
        }

        .stat {
            background: rgba(0, 255, 136, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #00ff88;
        }

        .scrambled-word {
            font-size: 2.5rem;
            letter-spacing: 10px;
            color: #ff6b6b;
            text-shadow: 0 0 10px #ff6b6b;
            margin: 30px 0;
            text-align: center;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
        }

        .letter {
            display: inline-block;
            background: rgba(255, 107, 107, 0.2);
            padding: 10px 15px;
            border-radius: 5px;
            border: 2px solid #ff6b6b;
            transition: all 0.3s;
        }

        .input-area {
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }

        .input-area input {
            width: 100%;
            padding: 15px;
            font-size: 1.3rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #4ecdc4;
            border-radius: 10px;
            color: #fff;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
        }

        .input-area input:focus {
            outline: none;
            border-color: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        .buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.1rem;
            background: rgba(78, 205, 196, 0.2);
            border: 2px solid #4ecdc4;
            color: #4ecdc4;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            border-radius: 10px;
            transition: all 0.3s;
            touch-action: manipulation;
        }

        .btn:hover {
            background: rgba(78, 205, 196, 0.4);
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-hint {
            border-color: #ffd93d;
            color: #ffd93d;
            background: rgba(255, 217, 61, 0.1);
        }

        .message {
            font-size: 1.3rem;
            text-align: center;
            min-height: 40px;
            margin-bottom: 20px;
        }

        .message.correct {
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
        }

        .message.incorrect {
            color: #ff6b6b;
            text-shadow: 0 0 10px #ff6b6b;
        }

        .message.hint {
            color: #ffd93d;
            text-shadow: 0 0 10px #ffd93d;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid #00ff88;
            color: #00ff88;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            border-radius: 5px;
        }

        @media (max-width: 600px) {
            .scrambled-word {
                font-size: 1.8rem;
                letter-spacing: 5px;
            }
            
            .buttons {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="game-header">
        <h1>📝 Word Scramble</h1>
        <div class="stats">
            <div class="stat">🎯 Score: <span id="score">0</span></div>
            <div class="stat">🔥 Streak: <span id="streak">0</span></div>
            <div class="stat">⏱️ Time: <span id="time">0</span>s</div>
        </div>
    </div>

    <div class="scrambled-word" id="scrambledWord"></div>
    
    <div class="input-area">
        <input type="text" id="answerInput" placeholder="正しい単語を入力..." autocomplete="off">
    </div>

    <div class="buttons">
        <button class="btn" id="checkBtn">✓ 確認</button>
        <button class="btn btn-hint" id="hintBtn">💡 ヒント</button>
        <button class="btn" id="skipBtn">⏭ スキップ</button>
    </div>

    <div class="message" id="message"></div>

    <button class="fullscreen-btn" id="fullscreenBtn">⛶ Fullscreen</button>

    <script>
        const words = [
            'JAVASCRIPT', 'PYTHON', 'CREATIVE', 'DESIGN', 'PUZZLE',
            'CODING', 'GAME', 'ARTIST', 'BROWSER', 'DEVELOPER',
            'INTERFACE', 'EXPERIMENT', 'DIGITAL', 'ANIMATION', 'COLORFUL',
            'CHALLENGE', 'VICTORY', 'BONUS', 'SPEED', 'POWER',
            'MAGIC', 'FUTURE', 'DREAM', 'FREEDOM', 'ENERGY',
            'HARMONY', 'BALANCE', 'RHYTHM', 'MELODY', 'VISION'
        ];

        const hints = {
            'JAVASCRIPT': 'Webページの動的な機能を作るプログラミング言語',
            'PYTHON': 'シンプルで読みやすいプログラミング言語',
            'CREATIVE': '新しいアイデアを生み出すこと',
            'DESIGN': '美しく機能的なものを作る計画',
            'PUZZLE': '解くべき謎や問題',
            'CODING': 'プログラムを書くこと',
            'GAME': '遊んで楽しむもの',
            'ARTIST': '芸術作品を作る人',
            'BROWSER': 'Webページを閲覧するソフトウェア',
            'DEVELOPER': 'ソフトウェアを開発する人',
            'INTERFACE': 'ユーザーとシステムがやり取りする面',
            'EXPERIMENT': '新しいことを試すこと',
            'DIGITAL': 'コンピューターで処理されるデータ',
            'ANIMATION': '絵を動かす技術',
            'COLORFUL': '様々な色が使われている',
            'CHALLENGE': '挑戦すること',
            'VICTORY': '勝つこと',
            'BONUS': 'ボーナス',
            'SPEED': '速さ',
            'POWER': '力',
            'MAGIC': '魔法',
            'FUTURE': '未来',
            'DREAM': '夢',
            'FREEDOM': '自由',
            'ENERGY': 'エネルギー',
            'HARMONY': '調和',
            'BALANCE': 'バランス',
            'RHYTHM': 'リズム',
            'MELODY': 'メロディ',
            'VISION': 'ビジョン'
        };

        let currentWord = '';
        let scrambledWord = '';
        let score = 0;
        let streak = 0;
        let time = 0;
        let timer = null;
        let hintsUsed = 0;

        const scrambledWordEl = document.getElementById('scrambledWord');
        const answerInput = document.getElementById('answerInput');
        const messageEl = document.getElementById('message');
        const scoreEl = document.getElementById('score');
        const streakEl = document.getElementById('streak');
        const timeEl = document.getElementById('time');
        const checkBtn = document.getElementById('checkBtn');
        const hintBtn = document.getElementById('hintBtn');
        const skipBtn = document.getElementById('skipBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        function scrambleWord(word) {
            const arr = word.split('');
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            const scrambled = arr.join('');
            return scrambled === word ? scrambleWord(word) : scrambled;
        }

        function newGame() {
            currentWord = words[Math.floor(Math.random() * words.length)];
            scrambledWord = scrambleWord(currentWord);
            
            scrambledWordEl.innerHTML = scrambledWord.split('').map(letter => 
                `<span class="letter">${letter}</span>`
            ).join('');
            
            answerInput.value = '';
            answerInput.focus();
            messageEl.textContent = '';
            messageEl.className = 'message';
            hintsUsed = 0;
        }

        function startTimer() {
            if (timer) clearInterval(timer);
            time = 0;
            timer = setInterval(() => {
                time++;
                timeEl.textContent = time;
            }, 1000);
        }

        function checkAnswer() {
            const answer = answerInput.value.toUpperCase().trim();
            
            if (!answer) {
                messageEl.textContent = '⚠️ 単語を入力してください';
                messageEl.className = 'message incorrect';
                return;
            }
            
            if (answer === currentWord) {
                // 正解
                streak++;
                const basePoints = 100;
                const streakBonus = streak * 10;
                const hintPenalty = hintsUsed * 20;
                const points = Math.max(basePoints + streakBonus - hintPenalty, 10);
                
                score += points;
                scoreEl.textContent = score;
                streakEl.textContent = streak;
                
                messageEl.textContent = `✅ 正解！ +${points}ポイント（ストリーク: ${streak}）`;
                messageEl.className = 'message correct';
                
                setTimeout(() => {
                    newGame();
                }, 1500);
            } else {
                // 不正解
                streak = 0;
                streakEl.textContent = streak;
                messageEl.textContent = '❌ 違います...もう一度！';
                messageEl.className = 'message incorrect';
                answerInput.value = '';
                answerInput.focus();
            }
        }

        function showHint() {
            if (hintsUsed >= 2) {
                messageEl.textContent = '⚠️ ヒントは最大2回までです';
                messageEl.className = 'message hint';
                return;
            }
            
            hintsUsed++;
            const hint = hints[currentWord];
            messageEl.textContent = `💡 ヒント: ${hint}`;
            messageEl.className = 'message hint';
        }

        function skipWord() {
            streak = 0;
            streakEl.textContent = streak;
            messageEl.textContent = '⏭ スキップしました';
            messageEl.className = 'message';
            setTimeout(() => {
                newGame();
            }, 1000);
        }

        // イベントリスナー
        checkBtn.addEventListener('click', checkAnswer);
        hintBtn.addEventListener('click', showHint);
        skipBtn.addEventListener('click', skipWord);

        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // ゲーム開始
        newGame();
        startTimer();
    </script>
</body>
</html>
