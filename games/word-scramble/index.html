<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Word Scramble</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            color: #00f5ff;
            font-size: 2em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 245, 255, 0.5);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            color: #fff;
            backdrop-filter: blur(10px);
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #00f5ff;
        }

        .stat-label {
            font-size: 0.8em;
            color: #a0a0a0;
        }

        .word-display {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 245, 255, 0.3);
            border-radius: 20px;
            padding: 40px 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .word-display.shake {
            animation: shake 0.5s;
            border-color: #ff6b6b;
        }

        .word-display.correct {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .scrambled-word {
            font-size: 2.5em;
            font-weight: bold;
            color: #fff;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
        }

        .hint {
            color: #a0a0a0;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .category {
            color: #7b2dff;
            font-size: 0.85em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-section {
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            max-width: 300px;
            padding: 15px 20px;
            font-size: 1.3em;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            text-align: center;
            letter-spacing: 3px;
            text-transform: uppercase;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: #00f5ff;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
        }

        input::placeholder {
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.3);
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 30px;
            font-size: 1em;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            min-width: 120px;
        }

        .submit {
            background: linear-gradient(45deg, #00f5ff, #7b2dff);
            color: #fff;
        }

        .skip {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .hint-btn {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 2px solid rgba(255, 193, 7, 0.3);
        }

        button:hover {
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 20px;
            color: #fff;
            z-index: 1000;
            display: none;
            text-align: center;
            border: 2px solid #00f5ff;
            box-shadow: 0 0 50px rgba(0, 245, 255, 0.5);
        }

        .message h2 {
            font-size: 2em;
            margin-bottom: 10px;
            color: #00f5ff;
        }

        .message p {
            font-size: 1.2em;
            margin-bottom: 20px;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(45deg, #00f5ff, #7b2dff);
            border: none;
            color: #fff;
            font-size: 1.5em;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 20px rgba(0, 245, 255, 0.3);
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            transform: scale(1.1);
        }

        .timer-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
            border-radius: 2px;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #00f5ff, #7b2dff);
            transition: width 0.1s linear;
            border-radius: 2px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.5em; }
            .scrambled-word { font-size: 2em; }
            input { font-size: 1.1em; }
            .buttons { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔤 Word Scramble</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">Score</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="streak">0</div>
                <div class="stat-label">Streak</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="level">1</div>
                <div class="stat-label">Level</div>
            </div>
        </div>

        <div class="timer-bar">
            <div class="timer-fill" id="timerFill"></div>
        </div>

        <div class="word-display" id="wordDisplay">
            <div class="category" id="category">Category</div>
            <div class="scrambled-word" id="scrambledWord">WORD</div>
            <div class="hint" id="hint">Type the unscrambled word</div>
        </div>

        <div class="input-section">
            <input type="text" id="answer" placeholder="Your answer..." autocomplete="off" autocapitalize="none" spellcheck="false">
        </div>

        <div class="buttons">
            <button class="submit" onclick="checkAnswer()">Submit</button>
            <button class="skip" onclick="skipWord()">Skip</button>
            <button class="hint-btn" onclick="showHint()">Hint 💡</button>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="message" id="message">
        <h2 id="messageTitle">Correct!</h2>
        <p id="messageText">The word was: ANSWER</p>
        <button class="submit" onclick="hideMessage()">Continue</button>
    </div>

    <script>
        // Word database with categories
        const wordDatabase = [
            // Animals
            { word: 'ELEPHANT', category: 'Animal', hint: 'Large mammal with a trunk' },
            { word: 'DOLPHIN', category: 'Animal', hint: 'Intelligent marine mammal' },
            { word: 'PENGUIN', category: 'Animal', hint: 'Flightless bird from Antarctica' },
            { word: 'KANGAROO', category: 'Animal', hint: 'Australian hopper' },
            { word: 'BUTTERFLY', category: 'Animal', hint: 'Beautiful flying insect' },
            { word: 'OCTOPUS', category: 'Animal', hint: 'Eight-armed sea creature' },
            { word: 'GIRAFFE', category: 'Animal', hint: 'Tallest animal with a long neck' },
            { word: 'TURTLE', category: 'Animal', hint: 'Slow-moving reptile with a shell' },

            // Technology
            { word: 'COMPUTER', category: 'Technology', hint: 'Electronic calculating device' },
            { word: 'INTERNET', category: 'Technology', hint: 'Global network of networks' },
            { word: 'SOFTWARE', category: 'Technology', hint: 'Computer programs and apps' },
            { word: 'KEYBOARD', category: 'Technology', hint: 'Input device with buttons' },
            { word: 'WEBCAM', category: 'Technology', hint: 'Camera for video calls' },
            { word: 'PROGRAM', category: 'Technology', hint: 'Set of instructions for computers' },
            { word: 'DATABASE', category: 'Technology', hint: 'Organized collection of data' },
            { word: 'WIRELESS', category: 'Technology', hint: 'Connection without cables' },

            // Food
            { word: 'SPAGHETTI', category: 'Food', hint: 'Long thin Italian pasta' },
            { word: 'CHOCOLATE', category: 'Food', hint: 'Sweet brown candy' },
            { word: 'SANDWICH', category: 'Food', hint: 'Food between bread slices' },
            { word: 'PINEAPPLE', category: 'Food', hint: 'Tropical fruit with spiky skin' },
            { word: 'CROISSANT', category: 'Food', hint: 'French crescent pastry' },
            { word: 'HAMBURGER', category: 'Food', hint: 'Popular meat patty sandwich' },
            { word: 'BROCCOLI', category: 'Food', hint: 'Green tree-like vegetable' },
            { word: 'STRAWBERRY', category: 'Food', hint: 'Red fruit with seeds' },

            // Nature
            { word: 'MOUNTAIN', category: 'Nature', hint: 'Large elevation of land' },
            { word: 'WATERFALL', category: 'Nature', hint: 'Water cascading down rocks' },
            { word: 'RAINBOW', category: 'Nature', hint: 'Colorful arc in the sky' },
            { word: 'VOLCANO', category: 'Nature', hint: 'Mountain that erupts lava' },
            { word: 'TORNADO', category: 'Nature', hint: 'Violent rotating storm' },
            { word: 'GLACIER', category: 'Nature', hint: 'Large mass of ice' },
            { word: 'DESERT', category: 'Nature', hint: 'Dry sandy region' },
            { word: 'JUNGLE', category: 'Nature', hint: 'Dense tropical forest' },

            // Music
            { word: 'PIANO', category: 'Music', hint: 'Large keyboard instrument' },
            { word: 'GUITAR', category: 'Music', hint: 'Six-string instrument' },
            { word: 'VIOLIN', category: 'Music', hint: 'Bowed string instrument' },
            { word: 'DRUMS', category: 'Music', hint: 'Percussion instrument' },
            { word: 'MELODY', category: 'Music', hint: 'Sequence of musical notes' },
            { word: 'RHYTHM', category: 'Music', hint: 'Pattern of sounds and beats' },
            { word: 'SYMPHONY', category: 'Music', hint: 'Long orchestral composition' },
            { word: 'HARMONY', category: 'Music', hint: 'Pleasing combination of notes' },

            // Science
            { word: 'PLANET', category: 'Science', hint: 'Celestial body orbiting a star' },
            { word: 'GALAXY', category: 'Science', hint: 'Huge collection of stars' },
            { word: 'FOSSIL', category: 'Science', hint: 'Preserved remains of ancient life' },
            { word: 'GRAVITY', category: 'Science', hint: 'Force that pulls objects down' },
            { word: 'ENERGY', category: 'Science', hint: 'Capacity to do work' },
            { word: 'OXYGEN', category: 'Science', hint: 'Gas we need to breathe' },
            { word: 'ECLIPSE', category: 'Science', hint: 'One body blocking another' },
            { word: 'TELESCOPE', category: 'Science', hint: 'Tool for viewing distant objects' },

            // Sports
            { word: 'BASKETBALL', category: 'Sport', hint: 'Game with hoop and orange ball' },
            { word: 'SWIMMING', category: 'Sport', hint: 'Moving through water' },
            { word: 'VOLLEYBALL', category: 'Sport', hint: 'Ball game over a net' },
            { word: 'GYMNASTICS', category: 'Sport', hint: 'Exercise requiring flexibility' },
            { word: 'MARATHON', category: 'Sport', hint: 'Long-distance running race' },
            { word: 'TENNIS', category: 'Sport', hint: 'Racket sport' },
            { word: 'SURFING', category: 'Sport', hint: 'Riding ocean waves' },
            { word: 'WRESTLING', category: 'Sport', hint: 'Grappling combat sport' }
        ];

        // Game state
        let currentWord = null;
        let usedWords = new Set();
        let score = 0;
        let streak = 0;
        let level = 1;
        let timerValue = 100;
        let timerInterval = null;
        let hintsUsed = 0;
        let wordsPerLevel = 5;
        let wordsCompleted = 0;

        // DOM elements
        const scoreEl = document.getElementById('score');
        const streakEl = document.getElementById('streak');
        const levelEl = document.getElementById('level');
        const scrambledWordEl = document.getElementById('scrambledWord');
        const categoryEl = document.getElementById('category');
        const hintEl = document.getElementById('hint');
        const answerInput = document.getElementById('answer');
        const wordDisplay = document.getElementById('wordDisplay');
        const timerFill = document.getElementById('timerFill');

        // Scramble word
        function scrambleWord(word) {
            const arr = word.split('');
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            const scrambled = arr.join('');
            // Make sure it's different from original
            if (scrambled === word && word.length > 1) {
                return scrambleWord(word);
            }
            return scrambled;
        }

        // Get random word
        function getRandomWord() {
            const available = wordDatabase.filter(w => !usedWords.has(w.word));
            if (available.length === 0) {
                usedWords.clear();
                return getRandomWord();
            }
            const index = Math.floor(Math.random() * available.length);
            return available[index];
        }

        // New word
        function newWord() {
            currentWord = getRandomWord();
            usedWords.add(currentWord.word);
            
            scrambledWordEl.textContent = scrambleWord(currentWord.word);
            categoryEl.textContent = currentWord.category;
            hintEl.textContent = `Length: ${currentWord.word.length} letters`;
            answerInput.value = '';
            answerInput.focus();
            
            // Reset timer
            timerValue = 100;
            startTimer();
        }

        // Start timer
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const decay = 0.3 + (level * 0.1);
                timerValue -= decay;
                timerFill.style.width = timerValue + '%';
                
                if (timerValue <= 0) {
                    clearInterval(timerInterval);
                    streak = 0;
                    updateStats();
                    showMessage('Time\'s Up! ⏰', `The word was: ${currentWord.word}`, true);
                }
            }, 100);
        }

        // Check answer
        function checkAnswer() {
            const answer = answerInput.value.toUpperCase().trim();
            
            if (!answer) return;
            
            if (answer === currentWord.word) {
                // Correct!
                const baseScore = 100;
                const streakBonus = streak * 20;
                const levelBonus = level * 10;
                const timeBonus = Math.floor(timerValue / 2);
                const totalScore = baseScore + streakBonus + levelBonus + timeBonus;
                
                score += totalScore;
                streak++;
                wordsCompleted++;
                
                if (wordsCompleted >= wordsPerLevel) {
                    level++;
                    wordsCompleted = 0;
                }
                
                updateStats();
                showMessage('Correct! ✅', `+${totalScore} points\nThe word was: ${currentWord.word}`, false);
            } else {
                // Wrong!
                wordDisplay.classList.add('shake');
                setTimeout(() => wordDisplay.classList.remove('shake'), 500);
                answerInput.value = '';
                answerInput.focus();
            }
        }

        // Skip word
        function skipWord() {
            streak = 0;
            updateStats();
            showMessage('Skipped ⏭️', `The word was: ${currentWord.word}`, true);
        }

        // Show hint
        function showHint() {
            if (hintsUsed >= 2) {
                hintEl.textContent = 'No more hints! 🚫';
                return;
            }
            hintsUsed++;
            const cost = hintsUsed * 20;
            score = Math.max(0, score - cost);
            updateStats();
            hintEl.textContent = `Hint (-${cost} pts): ${currentWord.hint}`;
        }

        // Update stats display
        function updateStats() {
            scoreEl.textContent = score;
            streakEl.textContent = streak;
            levelEl.textContent = level;
        }

        // Show message
        function showMessage(title, text, wasSkipped) {
            document.getElementById('messageTitle').textContent = title;
            document.getElementById('messageText').textContent = text;
            document.getElementById('message').style.display = 'block';
            
            if (wasSkipped) {
                document.querySelector('#message button').textContent = 'Next Word';
                document.querySelector('#message button').onclick = () => {
                    hideMessage();
                    newWord();
                };
            } else {
                document.querySelector('#message button').textContent = 'Continue';
                document.querySelector('#message button').onclick = hideMessage;
            }
        }

        // Hide message
        function hideMessage() {
            document.getElementById('message').style.display = 'none';
            if (!document.querySelector('#message button').textContent.includes('Next Word')) {
                newWord();
            }
        }

        // Toggle fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Event listeners
        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        // Prevent zoom on mobile
        document.addEventListener('gesturestart', e => e.preventDefault());
        document.addEventListener('gesturechange', e => e.preventDefault());
        document.addEventListener('gestureend', e => e.preventDefault());

        // Initialize game
        newWord();
        updateStats();
    </script>
</body>
</html>
