<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Scramble - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #999;
            font-size: 14px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 10px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .hint {
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            color: #666;
            background: #fff3cd;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ffc107;
        }

        .scrambled-word {
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            color: #333;
            margin-bottom: 30px;
            letter-spacing: 10px;
        }

        .letters-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .letter {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .letter:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(102, 126, 234, 0.6);
        }

        .letter:active {
            transform: translateY(0);
        }

        .letter.used {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        .answer-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .answer {
            display: inline-block;
            min-height: 50px;
            padding: 10px 20px;
            background: #f0f0f0;
            border-radius: 10px;
            font-size: 32px;
            font-weight: bold;
            color: #333;
            letter-spacing: 5px;
            min-width: 300px;
        }

        .answer-hint {
            font-size: 14px;
            color: #999;
            margin-top: 5px;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-clear {
            background: #f0f0f0;
            color: #666;
        }

        .btn-clear:hover {
            background: #e0e0e0;
        }

        .btn-skip {
            background: #ffc107;
            color: #333;
        }

        .btn-skip:hover {
            background: #ffb300;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 40px;
            border-radius: 20px;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            z-index: 1000;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            0% {
                transform: translate(-50%, -50%) scale(0);
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @media (max-width: 600px) {
            .scrambled-word {
                font-size: 32px;
                letter-spacing: 5px;
            }

            .letter {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }

            .answer {
                font-size: 24px;
                min-width: 200px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="game-container">
        <div class="header">
            <h1>Word Scramble</h1>
            <p class="subtitle">文字をクリックして単語を完成させよう！</p>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">レベル</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">正解</div>
                <div class="stat-value" id="streak">0</div>
            </div>
        </div>

        <div class="hint">
            💡 <span id="hintText">ヒント</span>
        </div>

        <div class="scrambled-word" id="scrambledWord"></div>

        <div class="letters-container" id="lettersContainer"></div>

        <div class="answer-container">
            <div class="answer" id="answer">_</div>
            <p class="answer-hint">上の文字をクリック</p>
        </div>

        <div class="controls">
            <button class="btn btn-clear" onclick="clearAnswer()">クリア</button>
            <button class="btn btn-skip" onclick="skipWord()">スキップ</button>
        </div>
    </div>

    <script>
        // Word list with hints
        const words = [
            { word: "APPLE", hint: "果物" },
            { word: "TIGER", hint: "動物" },
            { word: "HOUSE", hint: "建物" },
            { word: "WATER", hint: "液体" },
            { word: "MUSIC", hint: "音" },
            { word: "EARTH", hint: "惑星" },
            { word: "CLOUD", hint: "空" },
            { word: "DREAM", hint: "睡眠" },
            { word: "SMILE", hint: "感情" },
            { word: "BRAIN", hint: "体の部位" },
            { word: "PIZZA", hint: "食べ物" },
            { word: "BEACH", hint: "場所" },
            { word: "RIVER", hint: "自然" },
            { word: "PHONE", hint: "電子機器" },
            { word: "PLANE", hint: "乗り物" },
            { word: "GHOST", hint: "超常現象" },
            { word: "SNAKE", hint: "爬虫類" },
            { word: "BREAD", hint: "食べ物" },
            { word: "CHAIR", hint: "家具" },
            { word: "CLOCK", hint: "時間" },
            { word: "STONE", hint: "自然" },
            { word: "TRAIN", hint: "乗り物" },
            { word: "WITCH", hint: "ファンタジー" },
            { word: "CRAB", hint: "海" },
            { word: "MOUSE", hint: "動物" },
            { word: "ZEBRA", hint: "動物" },
            { word: "LEMON", hint: "果物" },
            { word: "MAGIC", hint: "ファンタジー" },
            { word: "HEART", hint: "体の部位" },
            { word: "STORM", hint: "天気" }
        ];

        let currentWord = null;
        let scrambledWord = "";
        let userAnswer = "";
        let usedLetters = [];
        let score = 0;
        let level = 1;
        let streak = 0;
        let usedWords = [];

        // Initialize game
        function initGame() {
            pickRandomWord();
            updateStats();
        }

        // Pick random word
        function pickRandomWord() {
            const availableWords = words.filter(w => !usedWords.includes(w.word));
            
            if (availableWords.length === 0) {
                usedWords = [];
                pickRandomWord();
                return;
            }

            const randomIndex = Math.floor(Math.random() * availableWords.length);
            currentWord = availableWords[randomIndex];
            usedWords.push(currentWord.word);

            scrambleWord(currentWord.word);
        }

        // Scramble word
        function scrambleWord(word) {
            const letters = word.split('');
            
            // Fisher-Yates shuffle
            for (let i = letters.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [letters[i], letters[j]] = [letters[j], letters[i]];
            }

            scrambledWord = letters.join('');

            // Make sure it's different from original
            if (scrambledWord === word) {
                scrambleWord(word);
                return;
            }

            displayWord();
            displayLetters();
            clearAnswer();
        }

        // Display scrambled word
        function displayWord() {
            document.getElementById('scrambledWord').textContent = scrambledWord;
            document.getElementById('hintText').textContent = currentWord.hint;
        }

        // Display letter buttons
        function displayLetters() {
            const container = document.getElementById('lettersContainer');
            container.innerHTML = '';

            scrambledWord.split('').forEach((letter, index) => {
                const button = document.createElement('button');
                button.className = 'letter';
                button.textContent = letter;
                button.onclick = () => selectLetter(index, letter);
                container.appendChild(button);
            });
        }

        // Select letter
        function selectLetter(index, letter) {
            if (usedLetters.includes(index)) return;

            userAnswer += letter;
            usedLetters.push(index);

            updateAnswer();
            markLetterUsed(index);

            // Check if complete
            if (userAnswer.length === scrambledWord.length) {
                checkAnswer();
            }
        }

        // Update answer display
        function updateAnswer() {
            const answerEl = document.getElementById('answer');
            answerEl.textContent = userAnswer || '_';
        }

        // Mark letter as used
        function markLetterUsed(index) {
            const buttons = document.querySelectorAll('.letter');
            buttons[index].classList.add('used');
        }

        // Check answer
        function checkAnswer() {
            if (userAnswer === currentWord.word) {
                // Correct!
                streak++;
                const points = 10 * level;
                score += points;

                showMessage('🎉 正解！ +'+points+'点', '#4CAF50');

                // Level up every 3 correct answers
                if (streak % 3 === 0) {
                    level++;
                    setTimeout(() => showMessage('🚀 レベルアップ！ Lv.'+level, '#FFC107'), 1000);
                }

                updateStats();
                
                setTimeout(() => {
                    pickRandomWord();
                }, 1500);
            } else {
                // Wrong
                streak = 0;
                showMessage('❌ 間違い！', '#F44336');
                updateStats();

                setTimeout(() => {
                    clearAnswer();
                }, 1000);
            }
        }

        // Clear answer
        function clearAnswer() {
            userAnswer = "";
            usedLetters = [];
            updateAnswer();

            const buttons = document.querySelectorAll('.letter');
            buttons.forEach(button => button.classList.remove('used'));
        }

        // Skip word
        function skipWord() {
            streak = 0;
            updateStats();
            pickRandomWord();
        }

        // Update stats
        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('streak').textContent = streak;
        }

        // Show message
        function showMessage(text, color) {
            const existing = document.querySelector('.message');
            if (existing) existing.remove();

            const message = document.createElement('div');
            message.className = 'message';
            message.textContent = text;
            message.style.background = color;
            document.body.appendChild(message);

            setTimeout(() => {
                message.remove();
            }, 1200);
        }

        // Toggle fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Start game
        initGame();
    </script>
</body>
</html>
