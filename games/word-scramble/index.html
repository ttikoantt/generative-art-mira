<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Scramble</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #333;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #f5576c;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
        }

        .stat {
            text-align: center;
            padding: 15px 25px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-radius: 15px;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.8em;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8em;
        }

        .scramble-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .scrambled-word {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
            letter-spacing: 8px;
            margin-bottom: 20px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hint {
            font-size: 1em;
            color: #f5576c;
            margin-bottom: 20px;
        }

        .input-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 15px;
            border: 2px solid #f5576c;
            border-radius: 10px;
            font-size: 1.2em;
            text-align: center;
            text-transform: uppercase;
        }

        input:focus {
            outline: none;
            border-color: #f093fb;
        }

        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .message.hint {
            background: #fff3cd;
            color: #856404;
            display: block;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: transform 0.2s;
        }

        .fullscreen-btn:hover {
            transform: scale(1.1);
        }

        .skip-btn {
            background: linear-gradient(135deg, #a8a8a8 0%, #6c757d 100%);
            margin-left: 10px;
        }

        .skip-btn:hover {
            box-shadow: 0 5px 20px rgba(108, 117, 125, 0.4);
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5em;
            }

            .scrambled-word {
                font-size: 1.8em;
                letter-spacing: 4px;
            }

            .stats {
                flex-wrap: wrap;
                gap: 10px;
            }

            .stat {
                flex: 1;
                min-width: 120px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <h1>🎮 Word Scramble</h1>
        <p class="subtitle">並べ替えて単語を作ろう！</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">連続正解</div>
                <div class="stat-value" id="streak">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">最高連続</div>
                <div class="stat-value" id="bestStreak">0</div>
            </div>
        </div>

        <div class="scramble-container">
            <div class="scrambled-word" id="scrambledWord">LOADING...</div>
            <p class="hint" id="hint"></p>
        </div>

        <div class="message" id="message"></div>

        <div class="input-container">
            <input type="text" id="guessInput" placeholder="答えを入力" autocomplete="off" maxlength="20">
            <button onclick="checkGuess()">答える</button>
            <button class="skip-btn" onclick="skipWord()">スキップ</button>
        </div>
    </div>

    <script>
        const words = [
            { word: 'APPLE', hint: '果物' },
            { word: 'TIGER', hint: '動物' },
            { word: 'HOUSE', hint: '建物' },
            { word: 'MUSIC', hint: '音' },
            { word: 'WATER', hint: '液体' },
            { word: 'BREAD', hint: '食べ物' },
            { word: 'HAPPY', hint: '感情' },
            { word: 'WORLD', hint: '場所' },
            { word: 'LIGHT', hint: '明かり' },
            { word: 'DREAM', hint: '眠り' },
            { word: 'BEACH', hint: '場所' },
            { word: 'CLOUD', hint: '空' },
            { word: 'DANCE', hint: '動作' },
            { word: 'EARTH', hint: '星' },
            { word: 'FLAME', hint: '熱' },
            { word: 'GRAPE', hint: '果物' },
            { word: 'HEART', hint: '体' },
            { word: 'IMAGE', hint: '絵' },
            { word: 'JUICE', hint: '飲み物' },
            { word: 'KNIFE', hint: '道具' },
            { word: 'LEMON', hint: '果物' },
            { word: 'MOUSE', hint: '動物' },
            { word: 'NIGHT', hint: '時間' },
            { word: 'OCEAN', hint: '場所' },
            { word: 'PIANO', hint: '楽器' },
            { word: 'QUEEN', hint: '人' },
            { word: 'RIVER', hint: '水' },
            { word: 'SNAKE', hint: '動物' },
            { word: 'TRAIN', hint: '乗り物' },
            { word: 'URBAN', hint: '都市' },
            { word: 'VIDEO', hint: '映像' },
            { word: 'WITCH', hint: '魔法' },
            { word: 'XENON', hint: '元素' },
            { word: 'YACHT', hint: '乗り物' },
            { word: 'ZEBRA', hint: '動物' },
            { word: 'GARDEN', hint: '場所' },
            { word: 'FOREST', hint: '自然' },
            { word: 'SCHOOL', hint: '建物' },
            { word: 'DOCTOR', hint: '職業' },
            { word: 'PARENT', hint: '家族' },
            { word: 'WINDOW', hint: '家' },
            { word: 'SUMMER', hint: '季節' },
            { word: 'ORANGE', hint: '果物' },
            { word: 'PURPLE', hint: '色' },
            { word: 'GUITAR', hint: '楽器' },
            { word: 'POCKET', hint: '服' },
            { word: 'COFFEE', hint: '飲み物' },
            { word: 'FRIEND', hint: '人間関係' },
            { word: 'WINTER', hint: '季節' },
            { word: 'BANANA', hint: '果物' },
            { word: 'GARDEN', hint: '場所' },
            { word: 'ROCKET', hint: '乗り物' },
            { word: 'PLANET', hint: '宇宙' },
            { word: 'CASTLE', hint: '建物' },
            { word: 'DRAGON', hint: '生き物' },
            { word: 'ISLAND', hint: '場所' },
            { word: 'FOREST', hint: '自然' },
            { word: 'PYTHON', hint: 'プログラミング' },
            { word: 'GAMING', hint: '趣味' },
            { word: 'SUNSET', hint: '自然' },
            { word: 'FOUNTAIN', hint: '建物' },
            { word: 'MOUNTAIN', hint: '自然' },
            { word: 'COMPUTER', hint: '道具' },
            { word: 'ELEPHANT', hint: '動物' },
            { word: 'CHOCOLATE', hint: '食べ物' },
            { word: 'TELESCOPE', hint: '道具' },
            { word: 'VIOLINIST', hint: '職業' },
            { word: 'TROMBONE', hint: '楽器' },
            { word: 'SAXOPHONE', hint: '楽器' },
            { word: 'MOSQUITO', hint: '虫' },
            { word: 'UMBRELLA', hint: '道具' },
            { word: 'DIAMOND', hint: '宝石' },
            { word: 'VOLCANO', hint: '自然' },
            { word: 'KANGAROO', hint: '動物' },
            { word: 'AVALANCHE', hint: '自然' },
            { word: 'PINEAPPLE', hint: '果物' },
            { word: 'BASKETBALL', hint: 'スポーツ' },
            { word: 'STRONGHOLD', hint: '建物' },
            { word: 'ASTRONAUT', hint: '職業' },
            { word: 'DINOSAUR', hint: '古代生物' }
        ];

        let currentWord = null;
        let score = 0;
        let streak = 0;
        let bestStreak = 0;

        function scrambleWord(word) {
            const arr = word.split('');
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            const scrambled = arr.join('');
            return scrambled === word ? scrambleWord(word) : scrambled;
        }

        function newWord() {
            const randomIndex = Math.floor(Math.random() * words.length);
            currentWord = words[randomIndex];
            document.getElementById('scrambledWord').textContent = scrambleWord(currentWord.word);
            document.getElementById('hint').textContent = `ヒント: ${currentWord.hint}`;
            document.getElementById('guessInput').value = '';
            document.getElementById('guessInput').focus();
            hideMessage();
        }

        function checkGuess() {
            const guess = document.getElementById('guessInput').value.toUpperCase().trim();

            if (!guess) {
                showMessage('⚠️ 答えを入力してください', 'error');
                return;
            }

            if (guess === currentWord.word) {
                // Correct!
                streak++;
                if (streak > bestStreak) {
                    bestStreak = streak;
                }

                const baseScore = currentWord.word.length * 10;
                const streakBonus = streak * 5;
                const earnedScore = baseScore + streakBonus;
                score += earnedScore;

                updateStats();
                showMessage(`🎉 正解！ +${earnedScore}点（連続ボーナス: +${streakBonus}）`, 'success');

                setTimeout(newWord, 1500);
            } else {
                // Wrong
                streak = 0;
                updateStats();
                showMessage('❌ 違います。もう一度試してみてください！', 'error');
                document.getElementById('guessInput').value = '';
            }
        }

        function skipWord() {
            streak = 0;
            updateStats();
            showMessage(`⏭️ スキップ！正解は「${currentWord.word}」でした`, 'hint');
            setTimeout(newWord, 2000);
        }

        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
        }

        function hideMessage() {
            const messageEl = document.getElementById('message');
            messageEl.className = 'message';
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('bestStreak').textContent = bestStreak;
        }

        // Enter key to submit
        document.getElementById('guessInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkGuess();
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Start game
        newWord();
    </script>
</body>
</html>
