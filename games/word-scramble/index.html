<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Word Scramble - 単語パズル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-top: 15px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 15px;
            color: white;
            font-size: 0.9rem;
        }

        .stat-label {
            opacity: 0.7;
            font-size: 0.75rem;
            margin-bottom: 3px;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: #667eea;
        }

        .scrambled-word {
            font-size: 3rem;
            font-weight: 700;
            color: white;
            letter-spacing: 15px;
            margin: 30px 0;
            text-align: center;
            text-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .input-container {
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
        }

        .word-input {
            width: 100%;
            padding: 18px 25px;
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            letter-spacing: 5px;
            transition: all 0.3s;
        }

        .word-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }

        .word-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
        }

        .buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 30px;
        }

        .btn {
            padding: 15px 35px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .hint-container {
            text-align: center;
            margin-top: 20px;
        }

        .hint-btn {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid rgba(255, 193, 7, 0.3);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .hint-btn:hover {
            background: rgba(255, 193, 7, 0.3);
        }

        .hint-text {
            color: rgba(255, 255, 255, 0.7);
            margin-top: 15px;
            font-style: italic;
            min-height: 24px;
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 30px 50px;
            border-radius: 20px;
            font-size: 2rem;
            font-weight: 700;
            z-index: 1000;
            animation: messagePop 0.5s ease-out;
        }

        .message.success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            box-shadow: 0 10px 40px rgba(17, 153, 142, 0.5);
        }

        .message.error {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
            box-shadow: 0 10px 40px rgba(235, 51, 73, 0.5);
        }

        @keyframes messagePop {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.1);
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .message.hidden {
            display: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.2rem;
            z-index: 100;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 600px) {
            .title {
                font-size: 1.8rem;
            }

            .scrambled-word {
                font-size: 2rem;
                letter-spacing: 8px;
            }

            .word-input {
                font-size: 1.2rem;
                padding: 15px 20px;
            }

            .stats {
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="game-container">
        <div class="header">
            <h1 class="title">WORD SCRAMBLE</h1>
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">SCORE</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">STREAK</div>
                    <div class="stat-value" id="streak">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">ROUND</div>
                    <div class="stat-value" id="round">1</div>
                </div>
            </div>
        </div>

        <div class="scrambled-word" id="scrambled-word">LOADING...</div>

        <div class="input-container">
            <input
                type="text"
                class="word-input"
                id="word-input"
                placeholder="答えを入力..."
                autocomplete="off"
                autocorrect="off"
                autocapitalize="off"
                spellcheck="false"
            >
        </div>

        <div class="buttons">
            <button class="btn btn-primary" onclick="checkAnswer()">答える</button>
            <button class="btn btn-secondary" onclick="skipWord()">スキップ</button>
            <button class="btn btn-secondary" onclick="shuffleLetters()">シャッフル</button>
        </div>

        <div class="hint-container">
            <button class="hint-btn" onclick="showHint()">💡 ヒント (-50点)</button>
            <div class="hint-text" id="hint-text"></div>
        </div>
    </div>

    <div class="message hidden" id="message"></div>

    <script>
        const words = [
            { word: "JAVASCRIPT", hint: "Web開発で使われるプログラミング言語" },
            { word: "CREATIVE", hint: "創造的な、独創的な" },
            { word: "PUZZLE", hint: "謎、パズル" },
            { word: "RAINBOW", hint: "空に現れる七色の弧" },
            { word: "GALAXY", hint: "星雲、銀河" },
            { word: "WHISPER", hint: "ささやき、ひそひそ話す" },
            { word: "JOURNEY", hint: "旅、旅程" },
            { word: "SPARKLE", hint: "きらきら輝く" },
            { word: "HARMONY", hint: "調和、ハーモニー" },
            { word: "THUNDER", hint: "雷、いかずち" },
            { word: "BUTTERFLY", hint: "蝶々" },
            { word: "SUNSHINE", hint: "日光、陽光" },
            { word: "MOUNTAIN", hint: "山" },
            { word: "OCEAN", hint: "海洋、大海" },
            { word: "FREEDOM", hint: "自由" },
            { word: "DREAM", hint: "夢" },
            { word: "WONDER", hint: "驚き、不思議" },
            { word: "BREEZE", hint: "そよ風" },
            { word: "FOREST", hint: "森、森林" },
            { word: "RHYTHM", hint: "リズム、律動" },
            { word: "CHALLENGE", hint: "挑戦、難題" },
            { word: "VICTORY", hint: "勝利" },
            { word: "MYSTERY", hint: "謎、神秘" },
            { word: "ADVENTURE", hint: "冒険" },
            { word: "PARADISE", hint: "楽園" },
            { word: "TREASURE", hint: "宝、財宝" },
            { word: "MEMORIES", hint: "思い出、記憶" },
            { word: "INFINITY", hint: "無限" },
            { word: "BRILLIANT", hint: "輝かしい、素晴らしい" },
            { word: "SERENDIPITY", hint: "偶然の幸運" }
        ];

        let currentWord = null;
        let scrambledWord = "";
        let score = 0;
        let streak = 0;
        let round = 1;
        let hintUsed = false;

        function scrambleWord(word) {
            const letters = word.split('');
            for (let i = letters.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [letters[i], letters[j]] = [letters[j], letters[i]];
            }
            const scrambled = letters.join('');
            return scrambled === word ? scrambleWord(word) : scrambled;
        }

        function newRound() {
            const randomIndex = Math.floor(Math.random() * words.length);
            currentWord = words[randomIndex];
            scrambledWord = scrambleWord(currentWord.word);

            document.getElementById('scrambled-word').textContent = scrambledWord;
            document.getElementById('word-input').value = '';
            document.getElementById('hint-text').textContent = '';
            document.getElementById('word-input').focus();

            hintUsed = false;
        }

        function checkAnswer() {
            const input = document.getElementById('word-input').value.toUpperCase().trim();

            if (input === currentWord.word) {
                const baseScore = currentWord.word.length * 10;
                const streakBonus = streak * 5;
                const penalty = hintUsed ? 50 : 0;
                const totalScore = Math.max(10, baseScore + streakBonus - penalty);

                score += totalScore;
                streak++;
                round++;

                showMessage(`🎉 +${totalScore}点!`, 'success');
                updateStats();

                setTimeout(() => {
                    newRound();
                }, 1500);
            } else {
                streak = 0;
                showMessage('❌ 間違いです!', 'error');
                updateStats();

                setTimeout(() => {
                    hideMessage();
                }, 1000);
            }
        }

        function skipWord() {
            showMessage(`${currentWord.word}`, 'error');
            streak = 0;
            updateStats();

            setTimeout(() => {
                hideMessage();
                newRound();
            }, 1500);
        }

        function shuffleLetters() {
            scrambledWord = scrambleWord(currentWord.word);
            document.getElementById('scrambled-word').textContent = scrambledWord;
        }

        function showHint() {
            if (!hintUsed) {
                hintUsed = true;
                document.getElementById('hint-text').textContent = currentWord.hint;
                score = Math.max(0, score - 50);
                updateStats();
            }
        }

        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = `message ${type}`;
        }

        function hideMessage() {
            document.getElementById('message').className = 'message hidden';
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('round').textContent = round;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Enter key to submit
        document.getElementById('word-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        // Initialize
        newRound();
        updateStats();
    </script>
</body>
</html>
