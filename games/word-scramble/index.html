<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Scramble - ワードスクランブル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 0.5rem;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 1.5rem;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 1.5rem;
            gap: 10px;
        }

        .stat {
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 15px;
            flex: 1;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.9;
        }

        .word-display {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scrambled-word {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: bold;
            color: #333;
            letter-spacing: 0.5rem;
            word-break: break-all;
        }

        .hint {
            color: #999;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .input-area {
            margin-bottom: 1.5rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 1rem;
            font-size: 1.2rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="text"].correct {
            border-color: #10b981;
            background-color: #f0fdf4;
        }

        input[type="text"].incorrect {
            border-color: #ef4444;
            background-color: #fef2f2;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 1rem;
        }

        button {
            flex: 1;
            padding: 1rem;
            font-size: 1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .skip-btn {
            background: #e0e0e0;
            color: #666;
        }

        .skip-btn:hover {
            background: #d0d0d0;
        }

        .hint-btn {
            background: #fbbf24;
            color: white;
        }

        .hint-btn:hover {
            background: #f59e0b;
        }

        .message {
            text-align: center;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            font-weight: bold;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            background: #f0fdf4;
            color: #10b981;
        }

        .message.error {
            background: #fef2f2;
            color: #ef4444;
        }

        .language-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 1rem;
        }

        .lang-btn {
            padding: 0.5rem 1rem;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .lang-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            color: #667eea;
            border: none;
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            z-index: 100;
        }

        .fullscreen-btn:hover {
            transform: scale(1.1);
        }

        @media (max-width: 600px) {
            .container {
                padding: 1.5rem;
            }

            .button-group {
                flex-direction: column;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 10px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()" title="全画面表示">⛶</button>

    <div class="container">
        <h1>🔤 Word Scramble</h1>
        <p class="subtitle">シャッフルされた文字を正しい順序に並べ替えよう！</p>

        <div class="language-toggle">
            <button class="lang-btn active" data-lang="ja" onclick="setLanguage('ja')">🇯🇵 日本語</button>
            <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">🇺🇸 English</button>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">スコア</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="streak">0</div>
                <div class="stat-label">連続正解</div>
            </div>
        </div>

        <div class="word-display">
            <div class="scrambled-word" id="scrambledWord">読み込み中...</div>
            <div class="hint" id="hint"></div>
        </div>

        <div class="input-area">
            <input type="text" id="answerInput" placeholder="ここに答えを入力..." autocomplete="off">
        </div>

        <div class="button-group">
            <button class="submit-btn" onclick="checkAnswer()">✓ 送信</button>
            <button class="hint-btn" onclick="showHint()">💡 ヒント</button>
            <button class="skip-btn" onclick="skipWord()">⏭ スキップ</button>
        </div>

        <div id="message"></div>
    </div>

    <script>
        const japaneseWords = [
            { word: "さくら", hint: "春の花" },
            { word: "ふじさん", hint: "日本の最高峰" },
            { word: "てんき", hint: "空の状態" },
            { word: "ともだち", hint: "親しい人" },
            { word: "がっこう", hint: "学ぶ場所" },
            { word: "たべもの", hint: "栄養を摂るもの" },
            { word: "いえ", hint: "住む場所" },
            { word: "ほん", hint: "読むもの" },
            { word: "みず", hint: "生命に必要なもの" },
            { word: "ひかり", hint: "明るさ" },
            { word: "やま", hint: "自然の高台" },
            { word: "うみ", hint: "塩水の広がり" },
            { word: "そら", hint: "頭上の広がり" },
            { word: "くも", hint: "空に浮かぶもの" },
            { word: "かぜ", hint: "空気の流れ" },
            { word: "あめ", hint: "空から降る水" },
            { word: "ゆき", hint: "冬の降水" },
            { word: "つき", hint: "夜の天体" },
            { word: "ほし", hint: "夜に光る点" },
            { word: "にちようび", hint: "週の終わりの休日" }
        ];

        const englishWords = [
            { word: "APPLE", hint: "A red or green fruit" },
            { word: "BOOK", hint: "Something you read" },
            { word: "HOUSE", hint: "A place to live" },
            { word: "FRIEND", hint: "Someone you like" },
            { word: "SCHOOL", hint: "A place to learn" },
            { word: "WATER", hint: "Essential for life" },
            { word: "MUSIC", hint: "You listen to this" },
            { word: "HAPPY", hint: "A positive emotion" },
            { word: "GARDEN", hint: "Where flowers grow" },
            { word: "SUMMER", hint: "The hottest season" },
            { word: "WINTER", hint: "The coldest season" },
            { word: "MORNING", hint: "Start of the day" },
            { word: "JOURNEY", hint: "A long trip" },
            { word: "DREAM", hint: "What you see when sleeping" },
            { word: "FOREST", hint: "Many trees together" }
        ];

        let currentLanguage = 'ja';
        let currentWordList = japaneseWords;
        let currentWord = null;
        let score = 0;
        let streak = 0;
        let hintShown = false;

        function shuffleWord(word) {
            const arr = word.split('');
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            const shuffled = arr.join('');
            return shuffled === word ? shuffleWord(word) : shuffled;
        }

        function getRandomWord() {
            const index = Math.floor(Math.random() * currentWordList.length);
            return currentWordList[index];
        }

        function newWord() {
            currentWord = getRandomWord();
            const scrambled = shuffleWord(currentWord.word);
            document.getElementById('scrambledWord').textContent = scrambled;
            document.getElementById('hint').textContent = '';
            document.getElementById('answerInput').value = '';
            document.getElementById('answerInput').className = '';
            document.getElementById('message').textContent = '';
            hintShown = false;
        }

        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            setTimeout(() => {
                messageEl.textContent = '';
                messageEl.className = 'message';
            }, 2000);
        }

        function checkAnswer() {
            const input = document.getElementById('answerInput');
            const answer = input.value.trim().toLowerCase();
            const correct = currentWord.word.toLowerCase();

            if (answer === correct) {
                streak++;
                const points = hintShown ? 5 : 10;
                score += points + (streak > 1 ? streak * 2 : 0);
                updateStats();
                input.className = 'correct';
                showMessage(`🎉 正解！ +${points}${streak > 1 ? ' (ボーナス: +' + (streak * 2) + ')' : ''} ポイント`, 'success');
                setTimeout(newWord, 1500);
            } else {
                streak = 0;
                updateStats();
                input.className = 'incorrect';
                showMessage('❌ 間違いです。もう一度試してください！', 'error');
                setTimeout(() => {
                    input.className = '';
                }, 500);
            }
        }

        function showHint() {
            document.getElementById('hint').textContent = `💡 ヒント: ${currentWord.hint}`;
            hintShown = true;
        }

        function skipWord() {
            streak = 0;
            updateStats();
            showMessage(`⏭ 正解は「${currentWord.word}」でした`, 'error');
            setTimeout(newWord, 1500);
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
        }

        function setLanguage(lang) {
            currentLanguage = lang;
            currentWordList = lang === 'ja' ? japaneseWords : englishWords;

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-lang="${lang}"]`).classList.add('active');

            newWord();
        }

        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        }

        // イベントリスナー
        document.getElementById('answerInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        // 初期化
        newWord();
    </script>
</body>
</html>
