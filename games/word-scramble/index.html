<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Word Scramble - 文字並べ替えパズル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .score {
            color: #764ba2;
            font-size: 18px;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .hint {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .scrambled-word {
            font-size: 48px;
            font-weight: bold;
            color: #333;
            letter-spacing: 8px;
            margin: 30px 0;
            text-transform: uppercase;
        }

        .letter-boxes {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .letter-box {
            width: 60px;
            height: 60px;
            border: 3px solid #667eea;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            color: #333;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .letter-box:hover {
            transform: scale(1.1);
            background: #f0f0ff;
        }

        .letter-box.used {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .user-answer {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
            min-height: 50px;
            margin: 20px 0;
            letter-spacing: 5px;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: #ccc;
        }

        .message {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            min-height: 30px;
        }

        .message.correct {
            color: #4caf50;
        }

        .message.wrong {
            color: #f44336;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 600px) {
            .game-container {
                padding: 25px;
            }

            .letter-box {
                width: 45px;
                height: 45px;
                font-size: 24px;
            }

            .scrambled-word {
                font-size: 32px;
                letter-spacing: 4px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <h1>📝 Word Scramble</h1>
        <div class="score">スコア: <span id="score">0</span></div>
        <div class="hint">ヒント: <span id="hint"></span></div>

        <div class="scrambled-word" id="scrambled"></div>

        <div class="letter-boxes" id="letterBoxes"></div>

        <div class="user-answer" id="userAnswer">_</div>

        <div class="buttons">
            <button onclick="checkAnswer()">答える</button>
            <button class="secondary" onclick="resetAnswer()">リセット</button>
            <button class="secondary" onclick="newWord()">次の単語</button>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script>
        const words = [
            { word: "APPLE", hint: "果物" },
            { word: "TIGER", hint: "動物" },
            { word: "HOUSE", hint: "建物" },
            { word: "MUSIC", hint: "音" },
            { word: "BEACH", hint: "場所" },
            { word: "CLOUD", hint: "空" },
            { word: "DREAM", hint: "夜" },
            { word: "FLASH", hint: "光" },
            { word: "GRASS", hint: "緑" },
            { word: "HEART", hint: "体" },
            { word: "JUICE", hint: "飲み物" },
            { word: "LIGHT", hint: "明るい" },
            { word: "MONEY", hint: "使うもの" },
            { word: "NIGHT", hint: "暗い" },
            { word: "OCEAN", hint: "水" },
            { word: "PIZZA", hint: "食べ物" },
            { word: "QUEEN", hint: "王族" },
            { word: "RIVER", hint: "流れ" },
            { word: "SMILE", hint: "顔" },
            { word: "STORY", hint: "話" },
        ];

        let currentWord = null;
        let scrambled = "";
        let userAnswer = [];
        let score = 0;
        let usedLetters = [];

        function scrambleWord(word) {
            const letters = word.split('');
            for (let i = letters.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [letters[i], letters[j]] = [letters[j], letters[i]];
            }
            const result = letters.join('');
            // 元の単語と同じならもう一度
            if (result === word) {
                return scrambleWord(word);
            }
            return result;
        }

        function newWord() {
            currentWord = words[Math.floor(Math.random() * words.length)];
            scrambled = scrambleWord(currentWord.word);
            userAnswer = [];
            usedLetters = [];
            updateDisplay();
            document.getElementById('message').textContent = '';
        }

        function updateDisplay() {
            document.getElementById('scrambled').textContent = scrambled;
            document.getElementById('hint').textContent = currentWord.hint;
            document.getElementById('userAnswer').textContent = userAnswer.length > 0 ? userAnswer.join('') : '_';

            // 文字ボックスを生成
            const letterBoxes = document.getElementById('letterBoxes');
            letterBoxes.innerHTML = '';
            for (let i = 0; i < scrambled.length; i++) {
                const box = document.createElement('div');
                box.className = 'letter-box';
                box.textContent = scrambled[i];
                box.onclick = () => selectLetter(i);
                if (usedLetters.includes(i)) {
                    box.classList.add('used');
                }
                letterBoxes.appendChild(box);
            }
        }

        function selectLetter(index) {
            if (!usedLetters.includes(index)) {
                usedLetters.push(index);
                userAnswer.push(scrambled[index]);
                updateDisplay();
            }
        }

        function resetAnswer() {
            userAnswer = [];
            usedLetters = [];
            updateDisplay();
            document.getElementById('message').textContent = '';
        }

        function checkAnswer() {
            const answer = userAnswer.join('');
            const message = document.getElementById('message');

            if (answer === currentWord.word) {
                message.textContent = '🎉 正解！素晴らしい！';
                message.className = 'message correct';
                score += 10;
                document.getElementById('score').textContent = score;

                // 正解音（ビープ）
                playSound(523, 0.1);
                setTimeout(() => playSound(659, 0.1), 100);
                setTimeout(() => playSound(784, 0.2), 200);

                // 自動的に次の単語へ
                setTimeout(() => {
                    newWord();
                }, 1500);
            } else if (answer.length === currentWord.word.length) {
                message.textContent = '❌ 違います...もう一度！';
                message.className = 'message wrong';
                playSound(200, 0.3);
            } else {
                message.textContent = 'まだ文字が足りません';
                message.className = 'message';
            }
        }

        function playSound(frequency, duration) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = frequency;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ゲーム開始
        newWord();
    </script>
</body>
</html>
