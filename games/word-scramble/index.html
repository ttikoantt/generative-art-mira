<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Scramble - 単語アナグラムゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 15px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }

        .game-area {
            text-align: center;
        }

        .hint {
            font-size: 14px;
            color: #888;
            margin-bottom: 20px;
        }

        .scrambled-word {
            font-size: 48px;
            font-weight: bold;
            color: #333;
            letter-spacing: 10px;
            margin-bottom: 30px;
            min-height: 60px;
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 15px 20px;
            font-size: 20px;
            border: 2px solid #ddd;
            border-radius: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #667eea;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .skip-btn {
            background: #f5f5f5;
            color: #666;
            margin-top: 10px;
        }

        .skip-btn:hover {
            background: #e0e0e0;
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 24px;
            }

            .scrambled-word {
                font-size: 32px;
                letter-spacing: 5px;
            }

            .input-area {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>

    <div class="container">
        <h1>Word Scramble</h1>
        <p class="subtitle">並べ替えられた文字から正しい単語を当てよう！</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">連続正解</div>
                <div class="stat-value" id="streak">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">最高連続</div>
                <div class="stat-value" id="best">0</div>
            </div>
        </div>

        <div class="game-area">
            <p class="hint" id="hint">ヒントが表示されます</p>
            <div class="scrambled-word" id="scrambled">LOADING...</div>

            <div class="input-area">
                <input type="text" id="answer" placeholder="答えを入力..." autocomplete="off">
                <button class="submit-btn" onclick="checkAnswer()">解答</button>
            </div>

            <button class="skip-btn" onclick="skipWord()">スキップ</button>

            <div class="message" id="message"></div>
        </div>
    </div>

    <script>
        // 単語データ（日本語と英語）
        const words = [
            { word: "ELEPHANT", scramble: "LEPEHANT", hint: "動物: 鼻が長い大型動物" },
            { word: "COMPUTER", scramble: "PUCRETOM", hint: "機器: 情報処理をする機械" },
            { word: "SUNSHINE", scramble: "NSHUISNE", hint: "自然: 太陽の光" },
            { word: "MOUNTAIN", scramble: "NUNTAOMI", hint: "自然: 高い地形" },
            { word: "BUTTERFLY", scramble: "UTTREFYLB", hint: "生物: 美しい羽の昆虫" },
            { word: "CHOCOLATE", scramble: "OCOCHOCTE", hint: "食べ物: 甘いお菓子" },
            { word: "RAINBOW", scramble: "BOWRAIN", hint: "自然: 雨上がりに見える色" },
            { word: "GUITAR", scramble: "TARGIU", hint: "楽器: 6本の弦" },
            { word: "DIAMOND", scramble: "MADONID", hint: "宝石: 最も硬い" },
            { word: "FREEDOM", scramble: "DOREFEM", hint: "概念: 自由" }
        ];

        let currentWord = null;
        let score = 0;
        let streak = 0;
        let bestStreak = 0;
        let usedWords = [];

        function shuffleWord(word) {
            const arr = word.split('');
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            const shuffled = arr.join('');
            return shuffled !== word ? shuffled : shuffleWord(word);
        }

        function getRandomWord() {
            const available = words.filter(w => !usedWords.includes(w.word));
            if (available.length === 0) {
                usedWords = [];
                return words[Math.floor(Math.random() * words.length)];
            }
            return available[Math.floor(Math.random() * available.length)];
        }

        function newWord() {
            currentWord = getRandomWord();
            usedWords.push(currentWord.word);

            document.getElementById('scrambled').textContent = currentWord.scramble;
            document.getElementById('hint').textContent = currentWord.hint;
            document.getElementById('answer').value = '';
            document.getElementById('message').className = 'message';
            document.getElementById('message').style.display = 'none';
        }

        function checkAnswer() {
            const answer = document.getElementById('answer').value.toUpperCase().trim();
            const messageEl = document.getElementById('message');

            if (answer === currentWord.word) {
                score += 10 + streak * 5;
                streak++;
                if (streak > bestStreak) {
                    bestStreak = streak;
                }

                messageEl.textContent = `正解！ +${10 + (streak - 1) * 5}点`;
                messageEl.className = 'message success';

                updateStats();

                setTimeout(newWord, 1500);
            } else {
                streak = 0;
                messageEl.textContent = '不正解... もう一度！';
                messageEl.className = 'message error';
                updateStats();
            }
        }

        function skipWord() {
            streak = 0;
            updateStats();
            newWord();
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('best').textContent = bestStreak;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Enterキーで解答
        document.getElementById('answer').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        // ゲーム開始
        newWord();
    </script>
</body>
</html>
