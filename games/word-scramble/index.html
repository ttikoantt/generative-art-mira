<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Scramble - 単語並べ替えゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .score-item {
            text-align: center;
        }

        .score-label {
            font-size: 12px;
            color: #6c757d;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .scrambled-word {
            font-size: 36px;
            text-align: center;
            margin: 30px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            letter-spacing: 5px;
            font-weight: bold;
            color: #764ba2;
        }

        .input-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #answer {
            flex: 1;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            text-align: center;
            text-transform: uppercase;
        }

        #answer:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 15px 30px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        .hint {
            text-align: center;
            color: #6c757d;
            font-size: 14px;
            margin-top: 15px;
            font-style: italic;
        }

        .message {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: bold;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.correct {
            background: #d4edda;
            color: #155724;
        }

        .message.wrong {
            background: #f8d7da;
            color: #721c24;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <h1>🎯 Word Scramble</h1>

        <div class="score-board">
            <div class="score-item">
                <div class="score-label">スコア</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">正解</div>
                <div class="score-value" id="streak">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">問題</div>
                <div class="score-value" id="question">1</div>
            </div>
        </div>

        <div class="message" id="message"></div>

        <div class="scrambled-word" id="scrambled">LOADING...</div>

        <div class="input-container">
            <input type="text" id="answer" placeholder="答えを入力..." autocomplete="off">
        </div>

        <button class="btn btn-primary" onclick="checkAnswer()" style="width: 100%;">送信</button>
        <button class="btn btn-secondary" onclick="skipWord()">スキップ</button>

        <div class="hint" id="hint"></div>
    </div>

    <script>
        // 英単語リスト（日本語訳付き）
        const words = [
            { word: "JAPAN", hint: "日本" },
            { word: "TOKYO", hint: "首都" },
            { word: "APPLE", hint: "果物" },
            { word: "MUSIC", hint: "芸術" },
            { word: "HAPPY", hint: "感情" },
            { word: "WATER", hint: "飲み物" },
            { word: "HOUSE", hint: "建物" },
            { word: "PHONE", hint: "通信機器" },
            { word: "PIZZA", hint: "食べ物" },
            { word: "BEACH", hint: "場所" },
            { word: "DREAM", hint: "眠り" },
            { word: "SMILE", hint: "表情" },
            { word: "GARDEN", hint: "自然" },
            { word: "SUMMER", hint: "季節" },
            { word: "WINTER", hint: "季節" },
            { word: "FRIEND", hint: "関係" },
            { word: "SCHOOL", hint: "教育" },
            { word: "FOREST", hint: "自然" },
            { word: "RIVER", hint: "自然" },
            { word: "PLANET", hint: "宇宙" }
        ];

        let currentWord = null;
        let score = 0;
        let streak = 0;
        let questionNumber = 1;
        let usedWords = [];

        function shuffleWord(word) {
            const arr = word.split('');
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            const shuffled = arr.join('');
            return shuffled === word ? shuffleWord(word) : shuffled;
        }

        function getNextWord() {
            if (usedWords.length >= words.length) {
                usedWords = [];
            }

            let availableWords = words.filter(w => !usedWords.includes(w));
            const wordObj = availableWords[Math.floor(Math.random() * availableWords.length)];
            usedWords.push(wordObj);
            return wordObj;
        }

        function newWord() {
            currentWord = getNextWord();
            document.getElementById('scrambled').textContent = shuffleWord(currentWord.word);
            document.getElementById('hint').textContent = `ヒント: ${currentWord.hint}`;
            document.getElementById('answer').value = '';
            document.getElementById('message').className = 'message';
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message show ${type}`;
        }

        function checkAnswer() {
            const answer = document.getElementById('answer').value.toUpperCase().trim();
            
            if (!answer) {
                showMessage('答えを入力してください！', 'wrong');
                return;
            }

            if (answer === currentWord.word) {
                // 正解
                streak++;
                const points = 100 + (streak * 10);
                score += points;
                
                document.getElementById('score').textContent = score;
                document.getElementById('streak').textContent = streak;
                
                showMessage(`🎉 正解！ +${points}ポイント`, 'correct');
                
                setTimeout(() => {
                    questionNumber++;
                    document.getElementById('question').textContent = questionNumber;
                    newWord();
                }, 1000);
            } else {
                // 不正解
                streak = 0;
                document.getElementById('streak').textContent = streak;
                showMessage('😢 不正解...もう一度！', 'wrong');
            }
        }

        function skipWord() {
            streak = 0;
            document.getElementById('streak').textContent = streak;
            showMessage(`⏭ スキップ！答えは ${currentWord.word}`, 'wrong');
            
            setTimeout(() => {
                questionNumber++;
                document.getElementById('question').textContent = questionNumber;
                newWord();
            }, 1500);
        }

        // Enterキーで送信
        document.getElementById('answer').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        newWord();
    </script>
</body>
</html>
