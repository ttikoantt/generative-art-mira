<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Scramble - 単語パズルゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #ffd700;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .stat {
            color: #fff;
            font-size: 0.9rem;
        }

        .stat-value {
            color: #ffd700;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .scrambled-word {
            font-size: 2.5rem;
            color: #00ff88;
            letter-spacing: 5px;
            margin: 20px 0;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            word-break: break-all;
        }

        .input-area {
            margin: 20px 0;
        }

        input {
            width: 100%;
            max-width: 300px;
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid #00ff88;
            border-radius: 10px;
            background: rgba(0, 255, 136, 0.1);
            color: #fff;
            text-align: center;
            outline: none;
        }

        input:focus {
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            background: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
            border: none;
            color: #1a1a2e;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 120px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .hint-btn {
            background: linear-gradient(135deg, #ff0088 0%, #cc0066 100%);
        }

        .hint-btn:hover {
            box-shadow: 0 5px 20px rgba(255, 0, 136, 0.5);
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #8800ff 0%, #6600cc 100%);
        }

        .fullscreen-btn:hover {
            box-shadow: 0 5px 20px rgba(136, 0, 255, 0.5);
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1rem;
            min-height: 50px;
        }

        .correct {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            border: 1px solid #00ff88;
        }

        .wrong {
            background: rgba(255, 0, 136, 0.2);
            color: #ff0088;
            border: 1px solid #ff0088;
        }

        .hint-text {
            color: #ffd700;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .timer {
            color: #ff8800;
            font-size: 1.2rem;
            margin-top: 10px;
        }

        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-over.show {
            display: flex;
        }

        .game-over-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #ffd700;
            text-align: center;
        }

        .game-over h2 {
            color: #ffd700;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .final-score {
            color: #00ff88;
            font-size: 3rem;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Word Scramble</h1>
        <div class="stats">
            <div class="stat">
                <div>スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div>問題</div>
                <div class="stat-value" id="question">1</div>
            </div>
            <div class="stat">
                <div>連続正解</div>
                <div class="stat-value" id="streak">0</div>
            </div>
        </div>

        <div class="scrambled-word" id="scrambled-word">LOADING...</div>

        <div class="input-area">
            <input type="text" id="answer" placeholder="答えを入力..." autocomplete="off">
        </div>

        <div class="buttons">
            <button onclick="submitAnswer()">✅ 回答</button>
            <button class="hint-btn" onclick="showHint()">💡 ヒント</button>
            <button onclick="skipQuestion()">⏭️ スキップ</button>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">📺 全画面</button>
        </div>

        <div class="timer" id="timer">残り時間: 60秒</div>
        <div class="hint-text" id="hint"></div>
        <div class="message" id="message"></div>
    </div>

    <div class="game-over" id="gameOver">
        <div class="game-over-content">
            <h2>🎮 ゲームオーバー</h2>
            <div class="final-score" id="finalScore">0</div>
            <p style="color: #fff; margin-bottom: 20px;">問題数: <span id="totalQuestions">0</span></p>
            <button onclick="restartGame()">🔄 もう一度</button>
        </div>
    </div>

    <script>
        const words = [
            { word: "JAVASCRIPT", hint: "プログラミング言語" },
            { word: "BROWSER", hint: "ウェブを見るソフト" },
            { word: "COMPUTER", hint: "電子計算機" },
            { word: "INTERNET", hint: "世界中のネットワーク" },
            { word: "KEYBOARD", hint: "文字を入力する装置" },
            { word: "MONITOR", hint: "画面を表示する装置" },
            { word: "SOFTWARE", hint: "プログラムの総称" },
            { word: "HARDWARE", hint: "物理的な機器" },
            { word: "MEMORY", hint: "データを記憶する装置" },
            { word: "PROGRAM", hint: "コンピュータへの命令" },
            { word: "WEBSITE", hint: "ウェブ上のページ" },
            { word: "DATABASE", hint: "データの保管庫" },
            { word: "NETWORK", hint: "接続されたシステム" },
            { word: "SECURITY", hint: "安全を守る仕組み" },
            { word: "ALGORITHM", hint: "問題解決の手順" },
            { word: "VARIABLE", hint: "値を入れる箱" },
            { word: "FUNCTION", hint: "処理のまとまり" },
            { word: "ARRAY", hint: "データの並び" },
            { word: "OBJECT", hint: "データのかたまり" },
            { word: "STRING", hint: "文字の列" },
            { word: "NUMBER", hint: "数値" },
            { word: "BOOLEAN", hint: "真偽値" },
            { word: "LOOP", hint: "繰り返し処理" },
            { word: "CONDITION", hint: "条件分岐" },
            { word: "DEBUG", hint: "バグを探すこと" },
            { word: "FRAMEWORK", hint: "開発の枠組み" },
            { word: "LIBRARY", hint: "便利な関数の集まり" },
            { word: "INTERFACE", hint: "接続する面" },
            { word: "PROTOCOL", hint: "通信の決まり" },
            { word: "SERVER", hint: "サービスを提供する側" }
        ];

        let currentWord = null;
        let score = 0;
        let questionNumber = 1;
        let streak = 0;
        let timeLeft = 60;
        let timerInterval = null;
        let usedWords = [];

        function shuffleWord(word) {
            const array = word.split('');
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            const shuffled = array.join('');
            return shuffled === word ? shuffleWord(word) : shuffled;
        }

        function newQuestion() {
            if (usedWords.length >= words.length) {
                usedWords = [];
            }

            let availableWords = words.filter(w => !usedWords.includes(w.word));
            if (availableWords.length === 0) {
                availableWords = words;
                usedWords = [];
            }

            const randomIndex = Math.floor(Math.random() * availableWords.length);
            currentWord = availableWords[randomIndex];
            usedWords.push(currentWord.word);

            document.getElementById('scrambled-word').textContent = shuffleWord(currentWord.word);
            document.getElementById('answer').value = '';
            document.getElementById('hint').textContent = '';
            document.getElementById('message').textContent = '';
            document.getElementById('message').className = 'message';
        }

        function submitAnswer() {
            const answer = document.getElementById('answer').value.toUpperCase().trim();
            const messageEl = document.getElementById('message');

            if (answer === currentWord.word) {
                const baseScore = currentWord.word.length * 10;
                const streakBonus = streak * 5;
                const timeBonus = timeLeft * 2;
                const totalScore = baseScore + streakBonus + timeBonus;

                score += totalScore;
                streak++;
                questionNumber++;

                messageEl.textContent = `🎉 正解！ +${totalScore}点（基本:${baseScore} 連続:+${streakBonus} 時間:+${timeBonus}）`;
                messageEl.className = 'message correct';

                updateStats();

                setTimeout(() => {
                    newQuestion();
                }, 1500);
            } else {
                streak = 0;
                messageEl.textContent = `❌ 違います。もう一度！`;
                messageEl.className = 'message wrong';
                updateStats();
            }
        }

        function showHint() {
            const hintLength = Math.ceil(currentWord.word.length / 3);
            const hint = currentWord.word.substring(0, hintLength) + '_'.repeat(currentWord.word.length - hintLength);
            document.getElementById('hint').textContent = `💡 ヒント: ${hint} （${currentWord.hint}）`;
        }

        function skipQuestion() {
            streak = 0;
            updateStats();
            newQuestion();
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('question').textContent = questionNumber;
            document.getElementById('streak').textContent = streak;
        }

        function startTimer() {
            timeLeft = 60;
            updateTimerDisplay();

            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const timerEl = document.getElementById('timer');
            timerEl.textContent = `残り時間: ${timeLeft}秒`;

            if (timeLeft <= 10) {
                timerEl.style.color = '#ff0000';
                timerEl.style.fontSize = '1.5rem';
            } else {
                timerEl.style.color = '#ff8800';
                timerEl.style.fontSize = '1.2rem';
            }
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('totalQuestions').textContent = questionNumber - 1;
            document.getElementById('gameOver').classList.add('show');
        }

        function restartGame() {
            score = 0;
            questionNumber = 1;
            streak = 0;
            usedWords = [];
            updateStats();
            document.getElementById('gameOver').classList.remove('show');
            newQuestion();
            startTimer();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert('全画面表示ができません');
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Enterキーで回答
        document.getElementById('answer').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                submitAnswer();
            }
        });

        // ゲーム開始
        newQuestion();
        startTimer();
    </script>
</body>
</html>
