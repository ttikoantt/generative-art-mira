<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Scramble - ワードスクランブル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stat {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 25px;
            border-radius: 20px;
            font-size: 1.1em;
            font-weight: bold;
        }

        .hint {
            font-size: 1em;
            color: #764ba2;
            margin: 15px 0;
            font-style: italic;
        }

        .scrambled-word {
            background: #f0f0f0;
            padding: 25px;
            border-radius: 20px;
            margin: 25px 0;
            font-size: 2.5em;
            font-weight: bold;
            letter-spacing: 10px;
            color: #333;
            text-transform: uppercase;
        }

        .input-area {
            margin: 25px 0;
        }

        input[type="text"] {
            width: 100%;
            padding: 18px 25px;
            font-size: 1.3em;
            border: 3px solid #667eea;
            border-radius: 15px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: #764ba2;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }

        input[type="text"].correct {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        input[type="text"].wrong {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 35px;
            font-size: 1.1em;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .submit-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .skip-btn {
            background: #f0f0f0;
            color: #666;
        }

        .skip-btn:hover {
            background: #e0e0e0;
        }

        .message {
            margin: 20px 0;
            padding: 15px;
            border-radius: 15px;
            font-size: 1.1em;
            font-weight: bold;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8em;
            }

            .scrambled-word {
                font-size: 1.8em;
                letter-spacing: 5px;
            }

            .game-container {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <h1>🔤 Word Scramble</h1>

        <div class="stats">
            <div class="stat">✅ 正解: <span id="correct">0</span></div>
            <div class="stat">❌ スキップ: <span id="skipped">0</span></div>
            <div class="stat">🎯 連続正解: <span id="streak">0</span></div>
        </div>

        <div class="hint" id="hint"></div>

        <div class="scrambled-word" id="scrambled"></div>

        <div class="input-area">
            <input 
                type="text" 
                id="answer" 
                placeholder="答えを入力..."
                autocomplete="off"
                autocapitalize="off"
            >
        </div>

        <div class="message" id="message"></div>

        <div class="buttons">
            <button class="submit-btn" onclick="checkAnswer()">送信</button>
            <button class="skip-btn" onclick="skipWord()">スキップ</button>
        </div>
    </div>

    <script>
        const words = [
            { word: "ELEPHANT", hint: "巨大な動物" },
            { word: "COMPUTER", hint: "電子機器" },
            { word: "SUNSHINE", hint: "空にあるもの" },
            { word: "MOUNTAIN", hint: "自然の地形" },
            { word: "BUTTERFLY", hint: "美しい昆虫" },
            { word: "CHOCOLATE", hint: "甘いお菓子" },
            { word: "UMBRELLA", hint: "雨の日に使う" },
            { word: "ADVENTURE", hint: "刺激的な経験" },
            { word: "BEAUTIFUL", hint: "美しい" },
            { word: "WONDERFUL", hint: "素晴らしい" },
            { word: "DANGEROUS", hint: "危険な" },
            { word: "MYSTERIOUS", hint: "神秘的な" },
            { word: "HAPPINESS", hint: "幸せ" },
            { word: "KNOWLEDGE", hint: "知識" },
            { word: "FRIENDSHIP", hint: "友情" },
            { word: "CHALLENGE", hint: "挑戦" },
            { word: "VICTORY", hint: "勝利" },
            { word: "JOURNEY", hint: "旅" },
            { word: "TREASURE", hint: "宝物" },
            { word: "RAINBOW", hint: "雨上がりに見える" },
            { word: "THUNDER", hint: "雷の音" },
            { word: "WHISPER", hint: "ささやき" },
            { word: "SPARKLE", hint: "きらめく" },
            { word: "RHYTHM", hint: "音楽の拍子" },
            { word: "QUICKLY", hint: "素早く" },
            { word: "PUZZLE", hint: "パズル" },
            { word: "JUNGLE", hint: "密林" },
            { word: "GIGGLE", hint: "クスクス笑う" },
            { word: "BREEZE", hint: "そよ風" },
            { word: "TWINKLE", hint: "キラキラ光る" }
        ];

        let currentWord = null;
        let correct = 0;
        let skipped = 0;
        let streak = 0;

        function shuffleWord(word) {
            const arr = word.split('');
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            const shuffled = arr.join('');
            // 元の単語と同じになったら再シャッフル
            return shuffled === word ? shuffleWord(word) : shuffled;
        }

        function newWord() {
            currentWord = words[Math.floor(Math.random() * words.length)];
            document.getElementById('scrambled').textContent = shuffleWord(currentWord.word);
            document.getElementById('hint').textContent = `💡 ヒント: ${currentWord.hint}`;
            document.getElementById('answer').value = '';
            document.getElementById('answer').className = '';
            document.getElementById('message').textContent = '';
            document.getElementById('answer').focus();
        }

        function checkAnswer() {
            const answer = document.getElementById('answer').value.toUpperCase().trim();
            const input = document.getElementById('answer');
            const message = document.getElementById('message');

            if (answer === currentWord.word) {
                correct++;
                streak++;
                document.getElementById('correct').textContent = correct;
                document.getElementById('streak').textContent = streak;

                input.className = 'correct';
                message.className = 'message success';
                message.textContent = `🎉 正解！ (+${streak * 10}ポイント)`;

                setTimeout(newWord, 1500);
            } else {
                streak = 0;
                document.getElementById('streak').textContent = streak;
                input.className = 'wrong';
                message.className = 'message error';
                message.textContent = '❌ 違います。もう一度試してください！';

                setTimeout(() => {
                    input.className = '';
                    message.textContent = '';
                }, 1000);
            }
        }

        function skipWord() {
            skipped++;
            streak = 0;
            document.getElementById('skipped').textContent = skipped;
            document.getElementById('streak').textContent = streak;

            const message = document.getElementById('message');
            message.className = 'message error';
            message.textContent = `答えは「${currentWord.word}」でした！`;

            setTimeout(newWord, 2000);
        }

        document.getElementById('answer').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // ゲーム開始
        newWord();
    </script>
</body>
</html>
