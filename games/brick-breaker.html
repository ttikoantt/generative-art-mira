<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brick Breaker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #gameContainer {
            position: relative;
        }

        canvas {
            display: block;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(125, 211, 252, 0.3);
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            z-index: 100;
        }

        .ui-overlay.hidden {
            display: none;
        }

        .ui-overlay h1 {
            color: #7dd3fc;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(125, 211, 252, 0.5);
        }

        .ui-overlay p {
            color: white;
            font-size: 18px;
            margin: 10px 0;
            text-align: center;
        }

        .ui-overlay button {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(135deg, #7dd3fc 0%, #3b82f6 100%);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .ui-overlay button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(125, 211, 252, 0.5);
        }

        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(125, 211, 252, 0.5);
            pointer-events: none;
        }

        .hud span {
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 15px;
            border-radius: 20px;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(125, 211, 252, 0.3);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 50;
        }

        .fullscreen-btn:hover {
            background: rgba(125, 211, 252, 0.5);
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            canvas {
                max-width: 95vw;
                max-height: 80vh;
            }
            .ui-overlay h1 {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>

        <div class="hud" id="hud">
            <span id="score">Score: 0</span>
            <span id="lives">Lives: 3</span>
            <span id="level">Level: 1</span>
        </div>

        <div class="ui-overlay" id="startScreen">
            <h1>🧱 Brick Breaker</h1>
            <p>パドルを操作してブロックを崩せ！</p>
            <p><strong>操作方法:</strong></p>
            <p>🖱️ マウス / 👆 タッチ で移動</p>
            <button onclick="startGame()">ゲーム開始</button>
        </div>

        <div class="ui-overlay hidden" id="gameOverScreen">
            <h1>ゲームオーバー</h1>
            <p>最終スコア: <span id="finalScore">0</span></p>
            <p>クリアしたレベル: <span id="finalLevel">0</span></p>
            <button onclick="startGame()">もう一度</button>
        </div>

        <div class="ui-overlay hidden" id="levelClearScreen">
            <h1>🎉 レベルクリア！</h1>
            <p>スコア: <span id="levelScore">0</span></p>
            <button onclick="nextLevel()">次のレベルへ</button>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">📺 全画面</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Responsive canvas size
        const isMobile = window.innerWidth < 600;
        canvas.width = isMobile ? 360 : 800;
        canvas.height = isMobile ? 480 : 600;

        const PADDLE_WIDTH = isMobile ? 80 : 120;
        const PADDLE_HEIGHT = 15;
        const BALL_RADIUS = 8;
        const BRICK_ROWS = 5;
        const BRICK_COLS = isMobile ? 6 : 10;
        const BRICK_WIDTH = (canvas.width - 40) / BRICK_COLS - 5;
        const BRICK_HEIGHT = 25;
        const BRICK_PADDING = 5;
        const BRICK_TOP = 60;
        const BRICK_LEFT = 20;

        let paddle = { x: canvas.width / 2 - PADDLE_WIDTH / 2, width: PADDLE_WIDTH, height: PADDLE_HEIGHT };
        let ball = { x: canvas.width / 2, y: canvas.height - 50, dx: 4, dy: -4, radius: BALL_RADIUS };
        let bricks = [];
        let score = 0;
        let lives = 3;
        let level = 1;
        let gameRunning = false;
        let particles = [];

        const brickColors = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#3b82f6', '#8b5cf6'];

        function createBricks() {
            bricks = [];
            for (let row = 0; row < BRICK_ROWS; row++) {
                for (let col = 0; col < BRICK_COLS; col++) {
                    bricks.push({
                        x: BRICK_LEFT + col * (BRICK_WIDTH + BRICK_PADDING),
                        y: BRICK_TOP + row * (BRICK_HEIGHT + BRICK_PADDING),
                        width: BRICK_WIDTH,
                        height: BRICK_HEIGHT,
                        color: brickColors[row % brickColors.length],
                        alive: true
                    });
                }
            }
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: x,
                    y: y,
                    dx: (Math.random() - 0.5) * 8,
                    dy: (Math.random() - 0.5) * 8,
                    radius: Math.random() * 3 + 1,
                    color: color,
                    life: 1
                });
            }
        }

        function drawPaddle() {
            ctx.beginPath();
            ctx.roundRect(paddle.x, canvas.height - paddle.height - 10, paddle.width, paddle.height, 8);
            const gradient = ctx.createLinearGradient(paddle.x, 0, paddle.x + paddle.width, 0);
            gradient.addColorStop(0, '#7dd3fc');
            gradient.addColorStop(1, '#3b82f6');
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            const gradient = ctx.createRadialGradient(ball.x, ball.y, 0, ball.x, ball.y, ball.radius);
            gradient.addColorStop(0, '#fff');
            gradient.addColorStop(1, '#7dd3fc');
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#7dd3fc';
        }

        function drawBricks() {
            bricks.forEach(brick => {
                if (!brick.alive) return;

                ctx.beginPath();
                ctx.roundRect(brick.x, brick.y, brick.width, brick.height, 4);
                ctx.fillStyle = brick.color;
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 2;
                ctx.stroke();
            });
            ctx.shadowBlur = 0;
        }

        function drawParticles() {
            particles = particles.filter(p => {
                p.x += p.dx;
                p.y += p.dy;
                p.life -= 0.02;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI * 2);
                ctx.fillStyle = p.color.replace(')', `, ${p.life})`).replace('rgb', 'rgba');
                ctx.fill();

                return p.life > 0;
            });
        }

        function moveBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Wall collision
            if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
                ball.dx *= -1;
            }
            if (ball.y - ball.radius < 0) {
                ball.dy *= -1;
            }

            // Paddle collision
            if (ball.y + ball.radius > canvas.height - paddle.height - 10 &&
                ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
                ball.dy = -Math.abs(ball.dy);
                const hitPos = (ball.x - paddle.x) / paddle.width;
                ball.dx = (hitPos - 0.5) * 10;
            }

            // Brick collision
            bricks.forEach(brick => {
                if (!brick.alive) return;

                if (ball.x > brick.x && ball.x < brick.x + brick.width &&
                    ball.y > brick.y && ball.y < brick.y + brick.height) {
                    brick.alive = false;
                    ball.dy *= -1;
                    score += 10 * level;
                    createParticles(brick.x + brick.width / 2, brick.y + brick.height / 2, brick.color);
                    updateHUD();
                }
            });

            // Bottom - lose life
            if (ball.y + ball.radius > canvas.height) {
                lives--;
                updateHUD();
                if (lives <= 0) {
                    gameOver();
                } else {
                    resetBall();
                }
            }

            // Check level clear
            if (bricks.every(b => !b.alive)) {
                levelClear();
            }
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height - 50;
            ball.dx = 4 * (Math.random() > 0.5 ? 1 : -1);
            ball.dy = -4 - level * 0.5;
        }

        function updateHUD() {
            document.getElementById('score').textContent = `Score: ${score}`;
            document.getElementById('lives').textContent = `Lives: ${lives}`;
            document.getElementById('level').textContent = `Level: ${level}`;
        }

        function gameLoop() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBricks();
            drawPaddle();
            drawBall();
            drawParticles();
            moveBall();

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            score = 0;
            lives = 3;
            level = 1;
            particles = [];
            createBricks();
            resetBall();
            updateHUD();
            gameRunning = true;
            gameLoop();
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalLevel').textContent = level;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        function levelClear() {
            gameRunning = false;
            document.getElementById('levelScore').textContent = score;
            document.getElementById('levelClearScreen').classList.remove('hidden');
        }

        function nextLevel() {
            document.getElementById('levelClearScreen').classList.add('hidden');
            level++;
            createBricks();
            resetBall();
            gameRunning = true;
            gameLoop();
        }

        // Controls
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, x - paddle.width / 2));
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left;
            paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, x - paddle.width / 2));
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        createBricks();
        updateHUD();
    </script>
</body>
</html>
