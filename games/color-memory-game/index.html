<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Memory Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 2em;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            color: #0ff;
            font-size: 1.2em;
        }

        .stat-box {
            background: rgba(0, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .color-btn {
            width: 150px;
            height: 150px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .color-btn:active {
            transform: scale(0.95);
        }

        .color-btn.lit {
            filter: brightness(2);
            box-shadow: 0 0 30px currentColor;
        }

        .red { background: linear-gradient(135deg, #ff6b6b, #c92a2a); }
        .blue { background: linear-gradient(135deg, #4dabf7, #1971c2); }
        .green { background: linear-gradient(135deg, #51cf66, #2f9e44); }
        .yellow { background: linear-gradient(135deg, #ffd43b, #fab005); }

        .controls {
            margin-top: 20px;
        }

        .btn {
            background: linear-gradient(135deg, #0ff, #00f);
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 25px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 255, 255, 0.3);
            margin: 5px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(0, 255, 255, 0.5);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            color: #fff;
            font-size: 1.1em;
            margin-top: 20px;
            min-height: 30px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .instructions {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        #fullscreenBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #0ff;
            color: #0ff;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            z-index: 100;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        #fullscreenBtn:hover {
            background: rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        @media (max-width: 600px) {
            .color-btn {
                width: 120px;
                height: 120px;
            }

            h1 {
                font-size: 1.5em;
            }

            .stats {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <button id="fullscreenBtn">🔲 Fullscreen</button>

    <div class="container">
        <h1>🎨 Color Memory Challenge</h1>

        <div class="stats">
            <div class="stat-box">
                <div>Level: <span id="level">1</span></div>
            </div>
            <div class="stat-box">
                <div>Score: <span id="score">0</span></div>
            </div>
            <div class="stat-box">
                <div>Best: <span id="best">0</span></div>
            </div>
        </div>

        <div class="game-board">
            <button class="color-btn red" data-color="0"></button>
            <button class="color-btn blue" data-color="1"></button>
            <button class="color-btn green" data-color="2"></button>
            <button class="color-btn yellow" data-color="3"></button>
        </div>

        <div class="controls">
            <button class="btn" id="startBtn" onclick="startGame()">Start Game</button>
        </div>

        <div class="message" id="message">Press Start to begin!</div>

        <div class="instructions">
            <strong>How to Play:</strong><br>
            Watch the color sequence, then repeat it by clicking the buttons.<br>
            Each round adds one more color to remember!
        </div>
    </div>

    <script>
        const colors = ['red', 'blue', 'green', 'yellow'];
        const colorSounds = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5

        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('colorMemoryBest')) || 0;
        let isPlaying = false;
        let isPlayerTurn = false;

        const buttons = document.querySelectorAll('.color-btn');
        const startBtn = document.getElementById('startBtn');
        const messageEl = document.getElementById('message');
        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');

        bestEl.textContent = bestScore;

        // Audio context for sounds
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(freq, duration = 300) {
            if (!audioCtx) return;

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.frequency.value = freq;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration / 1000);

            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + duration / 1000);
        }

        function flashButton(colorIndex, duration = 300) {
            return new Promise(resolve => {
                const btn = buttons[colorIndex];
                btn.classList.add('lit');
                playSound(colorSounds[colorIndex], duration);

                setTimeout(() => {
                    btn.classList.remove('lit');
                    setTimeout(resolve, 100);
                }, duration);
            });
        }

        async function playSequence() {
            isPlayerTurn = false;
            messageEl.textContent = 'Watch carefully...';
            startBtn.disabled = true;

            await new Promise(r => setTimeout(r, 500));

            for (let color of sequence) {
                await flashButton(color);
            }

            isPlayerTurn = true;
            playerSequence = [];
            messageEl.textContent = 'Your turn! Repeat the sequence.';
        }

        function addToSequence() {
            const randomColor = Math.floor(Math.random() * 4);
            sequence.push(randomColor);
        }

        function handlePlayerClick(colorIndex) {
            if (!isPlayerTurn || !isPlaying) return;

            initAudio();
            flashButton(colorIndex, 150);
            playerSequence.push(colorIndex);

            const currentIndex = playerSequence.length - 1;

            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                gameOver();
                return;
            }

            if (playerSequence.length === sequence.length) {
                score += level * 10;
                scoreEl.textContent = score;
                level++;
                levelEl.textContent = level;

                if (score > bestScore) {
                    bestScore = score;
                    bestEl.textContent = bestScore;
                    localStorage.setItem('colorMemoryBest', bestScore);
                }

                messageEl.textContent = 'Correct! Next level...';
                isPlayerTurn = false;

                setTimeout(() => {
                    addToSequence();
                    playSequence();
                }, 1000);
            }
        }

        function gameOver() {
            isPlaying = false;
            isPlayerTurn = false;
            messageEl.textContent = `Game Over! You reached level ${level} with ${score} points!`;
            startBtn.disabled = false;
            startBtn.textContent = 'Play Again';

            // Flash all buttons to indicate game over
            buttons.forEach(btn => btn.classList.add('lit'));
            setTimeout(() => {
                buttons.forEach(btn => btn.classList.remove('lit'));
            }, 500);
        }

        function startGame() {
            initAudio();
            isPlaying = true;
            sequence = [];
            playerSequence = [];
            level = 1;
            score = 0;

            levelEl.textContent = level;
            scoreEl.textContent = score;

            startBtn.disabled = true;
            addToSequence();
            playSequence();
        }

        // Event listeners
        buttons.forEach(btn => {
            const colorIndex = parseInt(btn.dataset.color);
            btn.addEventListener('click', () => handlePlayerClick(colorIndex));
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handlePlayerClick(colorIndex);
            });
        });

        // Fullscreen
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });
    </script>
</body>
</html>
