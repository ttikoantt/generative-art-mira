<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Memory - 色記憶ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #ffffff;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 10px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px 25px;
            min-width: 100px;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.75rem;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
            aspect-ratio: 1;
        }

        .color-card {
            aspect-ratio: 1;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 4px solid rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .color-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .color-card:active {
            transform: scale(0.95);
        }

        .color-card.hidden {
            background: rgba(255, 255, 255, 0.1) !important;
            border-color: rgba(255, 255, 255, 0.2);
        }

        .color-card.hidden::before {
            content: '?';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 700;
        }

        .color-card.correct {
            animation: correctPulse 0.5s ease;
            border-color: #4ade80;
        }

        .color-card.wrong {
            animation: wrongShake 0.5s ease;
            border-color: #f87171;
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); box-shadow: 0 0 30px rgba(74, 222, 128, 0.6); }
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .message {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            padding: 20px 30px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: none;
        }

        .message.show {
            display: block;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn {
            background: rgba(255, 255, 255, 0.95);
            color: #667eea;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #ffffff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }

            .game-board {
                gap: 10px;
            }

            .stat-box {
                padding: 10px 15px;
                min-width: 80px;
            }

            .stat-value {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <h1>Color Memory</h1>
        <p class="subtitle">色記憶ゲーム - 光る色を覚えて同じ色を探そう！</p>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">レベル</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="message" id="message"></div>

        <button class="btn" id="startBtn" onclick="startGame()">ゲーム開始</button>
    </div>

    <script>
        const gameBoard = document.getElementById('gameBoard');
        const message = document.getElementById('message');
        const startBtn = document.getElementById('startBtn');
        const levelDisplay = document.getElementById('level');
        const scoreDisplay = document.getElementById('score');

        const colors = [
            '#ef4444', // Red
            '#f97316', // Orange
            '#eab308', // Yellow
            '#22c55e', // Green
            '#06b6d4', // Cyan
            '#3b82f6', // Blue
            '#8b5cf6', // Purple
            '#ec4899'  // Pink
        ];

        let level = 1;
        let score = 0;
        let targetColor = null;
        let isPlaying = false;
        let cards = [];

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function generateCards() {
            const numCards = Math.min(9, 6 + Math.floor(level / 2));
            const availableColors = colors.slice(0, Math.min(colors.length, numCards));
            
            cards = shuffleArray([...availableColors]);
            
            // ターゲット色をランダムに選択
            targetColor = cards[Math.floor(Math.random() * cards.length)];
            
            return cards;
        }

        function renderBoard(hideAll = false) {
            gameBoard.innerHTML = '';
            
            cards.forEach((color, index) => {
                const card = document.createElement('div');
                card.className = 'color-card';
                card.style.background = color;
                card.dataset.color = color;
                
                if (hideAll) {
                    card.classList.add('hidden');
                }
                
                card.addEventListener('click', () => handleCardClick(card));
                gameBoard.appendChild(card);
            });
        }

        function handleCardClick(card) {
            if (!isPlaying) return;
            
            const selectedColor = card.dataset.color;
            card.classList.remove('hidden');
            
            if (selectedColor === targetColor) {
                // 正解
                card.classList.add('correct');
                score += level * 10;
                scoreDisplay.textContent = score;
                
                showMessage('正解！🎉', 'success');
                
                setTimeout(() => {
                    nextLevel();
                }, 1000);
            } else {
                // 不正解
                card.classList.add('wrong');
                showMessage('違う色だよ！もう一度！', 'error');
                
                setTimeout(() => {
                    card.classList.add('hidden');
                    card.classList.remove('wrong');
                }, 500);
            }
        }

        function showMessage(text, type) {
            message.textContent = text;
            message.className = 'message show';
            
            if (type === 'success') {
                message.style.background = 'linear-gradient(135deg, #4ade80, #22c55e)';
                message.style.color = '#ffffff';
            } else if (type === 'error') {
                message.style.background = 'linear-gradient(135deg, #f87171, #ef4444)';
                message.style.color = '#ffffff';
            } else {
                message.style.background = 'rgba(255, 255, 255, 0.95)';
                message.style.color = '#333';
            }
            
            setTimeout(() => {
                message.classList.remove('show');
            }, 1500);
        }

        function showTargetColor() {
            // ターゲット色を一時的に表示
            const targetCard = Array.from(gameBoard.children).find(
                card => card.dataset.color === targetColor
            );
            
            if (targetCard) {
                targetCard.classList.remove('hidden');
                targetCard.style.boxShadow = '0 0 30px rgba(255, 255, 255, 0.8)';
                
                setTimeout(() => {
                    targetCard.classList.add('hidden');
                    targetCard.style.boxShadow = '';
                }, 1000 + Math.min(2000, level * 100));
            }
        }

        function startGame() {
            level = 1;
            score = 0;
            levelDisplay.textContent = level;
            scoreDisplay.textContent = score;
            
            startBtn.style.display = 'none';
            startLevel();
        }

        function startLevel() {
            generateCards();
            renderBoard(true);
            
            showMessage(`レベル ${level}`, 'info');
            
            setTimeout(() => {
                isPlaying = true;
                showTargetColor();
            }, 1500);
        }

        function nextLevel() {
            isPlaying = false;
            level++;
            levelDisplay.textContent = level;
            
            showMessage('次のレベル！', 'success');
            
            setTimeout(() => {
                startLevel();
            }, 1500);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // タッチ操作の最適化
        document.addEventListener('touchstart', function() {}, { passive: true });
    </script>
</body>
</html>
