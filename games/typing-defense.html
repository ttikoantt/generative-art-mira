<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Defense - タイピング防衛</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #2d1b4e 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #gameCanvas {
            display: block;
            cursor: text;
        }

        .game-ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            z-index: 100;
            pointer-events: none;
        }

        .stats {
            color: #00ff88;
            font-size: 18px;
            text-shadow: 0 0 10px #00ff88;
        }

        .stats div {
            margin: 5px 0;
        }

        .level {
            text-align: center;
            color: #ff00ff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 15px #ff00ff;
        }

        .health-bar {
            width: 200px;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #ff4444;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff0000);
            transition: width 0.3s;
            box-shadow: 0 0 10px #ff4444;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: #fff;
            z-index: 200;
            display: none;
            border: 2px solid #00ff88;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.3);
        }

        .game-over h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #ff4444;
            text-shadow: 0 0 20px #ff4444;
        }

        .game-over p {
            font-size: 18px;
            margin: 10px 0;
            color: #aaa;
        }

        .game-over .score {
            font-size: 32px;
            color: #00ff88;
            margin: 20px 0;
            text-shadow: 0 0 15px #00ff88;
        }

        .restart-btn {
            margin-top: 20px;
            padding: 15px 40px;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            border: none;
            border-radius: 10px;
            color: #0f0f23;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .restart-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
        }

        .start-screen {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: #fff;
            z-index: 200;
            border: 2px solid #00ff88;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.3);
        }

        .start-screen h1 {
            font-size: 42px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #00ff88, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .start-screen p {
            font-size: 16px;
            margin: 10px 0;
            color: #aaa;
        }

        .start-btn {
            margin-top: 30px;
            padding: 15px 40px;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            border: none;
            border-radius: 10px;
            color: #0f0f23;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .start-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            font-size: 24px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 136, 0.3);
            transform: scale(1.1);
        }

        .instructions {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            color: #fff;
            font-size: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 768px) {
            .stats {
                font-size: 14px;
            }

            .level {
                font-size: 20px;
            }

            .health-bar {
                width: 120px;
                height: 15px;
            }

            .game-over, .start-screen {
                padding: 25px;
                margin: 20px;
            }

            .game-over h2, .start-screen h1 {
                font-size: 28px;
            }

            .instructions {
                font-size: 10px;
                padding: 10px 15px;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="game-ui">
        <div class="stats">
            <div>スコア: <span id="score">0</span></div>
            <div>WPM: <span id="wpm">0</span></div>
            <div>正解: <span id="correct">0</span></div>
        </div>
        <div class="level">LEVEL <span id="level">1</span></div>
        <div>
            <div class="health-bar">
                <div class="health-fill" id="healthBar"></div>
            </div>
        </div>
    </div>

    <div class="start-screen" id="startScreen">
        <h1>⌨️ Typing Defense</h1>
        <p>落ちてくる単語をタイピングして消せ！</p>
        <p>タイプミスでライフ減少</p>
        <p>レベルアップで難易度上昇</p>
        <button class="start-btn" onclick="startGame()">スタート</button>
    </div>

    <div class="game-over" id="gameOver">
        <h2>GAME OVER</h2>
        <p>最終スコア</p>
        <div class="score" id="finalScore">0</div>
        <p>レベル: <span id="finalLevel">1</span></p>
        <p>正解数: <span id="finalCorrect">0</span></p>
        <p>WPM: <span id="finalWpm">0</span></p>
        <button class="restart-btn" onclick="startGame()">再挑戦</button>
    </div>

    <div class="instructions">
        <p>⌨️ キーボードで単語を入力</p>
        <p>Enterで確定 | ESCでポーズ</p>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // 単語リスト（レベル別）
        const wordLists = {
            1: ['cat', 'dog', 'run', 'jump', 'play', 'read', 'write', 'sing', 'dance', 'walk'],
            2: ['apple', 'banana', 'orange', 'grape', 'melon', 'cherry', 'lemon', 'peach'],
            3: ['computer', 'keyboard', 'mouse', 'screen', 'program', 'coding', 'developer'],
            4: ['javascript', 'python', 'function', 'variable', 'constant', 'algorithm', 'database'],
            5: ['artificial', 'intelligence', 'technology', 'innovation', 'creativity', 'development']
        };

        // ゲーム状態
        let gameState = {
            isRunning: false,
            isPaused: false,
            score: 0,
            level: 1,
            health: 100,
            correct: 0,
            total: 0,
            startTime: null,
            words: [],
            currentInput: '',
            spawnTimer: 0,
            spawnInterval: 2000,
            fallSpeed: 1
        };

        // 単語クラス
        class Word {
            constructor(text, level) {
                this.text = text;
                this.x = Math.random() * (width - 150) + 75;
                this.y = -30;
                this.speed = (gameState.fallSpeed + Math.random() * 0.5) * (1 + level * 0.2);
                this.hue = Math.random() * 60 + (level % 6) * 60;
                this.targeted = false;
                this.matched = '';
            }

            update() {
                this.y += this.speed;
            }

            draw() {
                // 背景グロー
                ctx.save();
                ctx.shadowColor = `hsla(${this.hue}, 100%, 50%, 0.8)`;
                ctx.shadowBlur = 15;

                // 一致部分を緑で表示
                const fontSize = 18 + gameState.level;
                ctx.font = `bold ${fontSize}px 'Courier New', monospace`;

                // テキスト全体の幅を計算
                const totalWidth = ctx.measureText(this.text).width;
                let xOffset = this.x - totalWidth / 2;

                // 背景パネル
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.beginPath();
                ctx.roundRect(xOffset - 10, this.y - fontSize - 5, totalWidth + 20, fontSize + 20, 5);
                ctx.fill();

                // マッチした部分
                if (this.matched) {
                    ctx.fillStyle = '#00ff88';
                    ctx.fillText(this.matched, xOffset, this.y);
                    xOffset += ctx.measureText(this.matched).width;
                }

                // 残り部分
                const remaining = this.text.substring(this.matched.length);
                ctx.fillStyle = `hsl(${this.hue}, 80%, 60%)`;
                ctx.fillText(remaining, xOffset, this.y);

                // ターゲットインジケーター
                if (this.targeted) {
                    ctx.strokeStyle = '#00ff88';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.roundRect(xOffset - 12, this.y - fontSize - 7, totalWidth + 24, fontSize + 24, 7);
                    ctx.stroke();
                }

                ctx.restore();
            }
        }

        // ゲーム開始
        function startGame() {
            gameState = {
                isRunning: true,
                isPaused: false,
                score: 0,
                level: 1,
                health: 100,
                correct: 0,
                total: 0,
                startTime: Date.now(),
                words: [],
                currentInput: '',
                spawnTimer: 0,
                spawnInterval: 2000,
                fallSpeed: 1
            };

            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';
            updateUI();
            requestAnimationFrame(gameLoop);
        }

        // ゲームオーバー
        function endGame() {
            gameState.isRunning = false;

            const elapsed = (Date.now() - gameState.startTime) / 1000 / 60; // 分
            const wpm = elapsed > 0 ? Math.round(gameState.correct / elapsed) : 0;

            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('finalLevel').textContent = gameState.level;
            document.getElementById('finalCorrect').textContent = gameState.correct;
            document.getElementById('finalWpm').textContent = wpm;
            document.getElementById('gameOver').style.display = 'block';
        }

        // 単語を生成
        function spawnWord() {
            const words = wordLists[Math.min(gameState.level, 5)];
            const text = words[Math.floor(Math.random() * words.length)];
            gameState.words.push(new Word(text, gameState.level));
        }

        // UI更新
        function updateUI() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('correct').textContent = gameState.correct;
            document.getElementById('healthBar').style.width = gameState.health + '%';

            const elapsed = (Date.now() - gameState.startTime) / 1000 / 60;
            const wpm = elapsed > 0 ? Math.round(gameState.correct / elapsed) : 0;
            document.getElementById('wpm').textContent = wpm;
        }

        // レベルアップ
        function levelUp() {
            gameState.level++;
            gameState.fallSpeed += 0.3;
            gameState.spawnInterval = Math.max(800, 2000 - gameState.level * 150);

            // ボーナス回復
            gameState.health = Math.min(100, gameState.health + 10);
        }

        // ゲームループ
        let lastTime = 0;
        function gameLoop(timestamp) {
            if (!gameState.isRunning) return;

            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;

            if (!gameState.isPaused) {
                // 背景クリア
                ctx.fillStyle = 'rgba(15, 15, 35, 0.3)';
                ctx.fillRect(0, 0, width, height);

                // スポーンタイマー
                gameState.spawnTimer += deltaTime;
                if (gameState.spawnTimer >= gameState.spawnInterval) {
                    spawnWord();
                    gameState.spawnTimer = 0;
                }

                // 単語更新
                gameState.words.forEach((word, index) => {
                    word.update();
                    word.draw();

                    // 画面外に出た
                    if (word.y > height + 30) {
                        gameState.words.splice(index, 1);
                        gameState.health -= 10;
                        gameState.total++;
                        updateUI();

                        if (gameState.health <= 0) {
                            endGame();
                        }
                    }
                });

                // 入力表示
                if (gameState.currentInput) {
                    ctx.save();
                    ctx.font = 'bold 24px "Courier New", monospace';
                    ctx.fillStyle = '#00ff88';
                    ctx.textAlign = 'center';
                    ctx.shadowColor = '#00ff88';
                    ctx.shadowBlur = 10;
                    ctx.fillText(gameState.currentInput + '_', width / 2, height - 50);
                    ctx.restore();
                }

                // レベルアップチェック
                if (gameState.correct >= gameState.level * 10) {
                    levelUp();
                    updateUI();
                }
            }

            requestAnimationFrame(gameLoop);
        }

        // キーボードイベント
        document.addEventListener('keydown', (e) => {
            if (!gameState.isRunning) return;

            if (e.key === 'Escape') {
                gameState.isPaused = !gameState.isPaused;
                return;
            }

            if (gameState.isPaused) return;

            if (e.key === 'Enter') {
                // Enterで確定
                checkInput();
                return;
            }

            if (e.key === 'Backspace') {
                gameState.currentInput = gameState.currentInput.slice(0, -1);
                updateWordTargets();
                return;
            }

            // アルファベットのみ
            if (/^[a-zA-Z]$/.test(e.key)) {
                gameState.currentInput += e.key.toLowerCase();
                updateWordTargets();
                checkPartialMatch();
            }
        });

        // 単語ターゲット更新
        function updateWordTargets() {
            gameState.words.forEach(word => {
                word.targeted = word.text.startsWith(gameState.currentInput);
                word.matched = '';
            });
        }

        // 部分一致チェック
        function checkPartialMatch() {
            gameState.words.forEach(word => {
                if (word.text.startsWith(gameState.currentInput)) {
                    word.matched = gameState.currentInput;
                }
            });
        }

        // 入力チェック
        function checkInput() {
            const matched = gameState.words.find(word => word.text === gameState.currentInput);

            if (matched) {
                // 正解
                const index = gameState.words.indexOf(matched);
                gameState.words.splice(index, 1);
                gameState.correct++;
                gameState.total++;
                gameState.score += matched.text.length * 10 * gameState.level;
                updateUI();
            } else {
                // ミスタイプ
                gameState.health -= 5;
                updateUI();

                if (gameState.health <= 0) {
                    endGame();
                }
            }

            gameState.currentInput = '';
            updateWordTargets();
        }

        // 全画面表示
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ウィンドウリサイズ
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // 初期化
        updateUI();
    </script>
</body>
</html>
