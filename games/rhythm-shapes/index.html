<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Shapes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: manipulation;
        }

        #gameCanvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        #ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .stat {
            color: #fff;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        #startScreen, #gameOverScreen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            color: white;
        }

        #gameOverScreen {
            display: none;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .button {
            padding: 20px 60px;
            font-size: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .instructions {
            margin: 20px;
            text-align: center;
            line-height: 1.8;
            color: #aaa;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            z-index: 100;
            font-size: 14px;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        #finalScore {
            font-size: 36px;
            margin: 20px;
            color: #0ff;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui">
        <div class="stat">スコア: <span id="score">0</span></div>
        <div class="stat">コンボ: <span id="combo">0</span>x</div>
        <div class="stat">ライフ: <span id="lives">3</span></div>
    </div>

    <div id="startScreen">
        <h1>🎵 Rhythm Shapes</h1>
        <div class="instructions">
            落ちてくるシェイプに合わせてリズムを刻もう！<br><br>
            🔴 円 → タップ<br>
            🔺 三角 → タップ<br>
            🟦 四角 → タップ<br><br>
            リズムに合わせてタップで高得点！
        </div>
        <button class="button" onclick="startGame()">スタート</button>
    </div>

    <div id="gameOverScreen">
        <h1>ゲームオーバー</h1>
        <div id="finalScore">スコア: 0</div>
        <button class="button" onclick="restartGame()">もう一度</button>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let gameRunning = false;
        let score = 0;
        let combo = 0;
        let lives = 3;
        let shapes = [];
        let particles = [];
        let lastShapeTime = 0;
        let shapeInterval = 1500;
        let comboMultiplier = 1;

        // シェイプの種類
        const SHAPE_TYPES = ['circle', 'triangle', 'square'];
        const SHAPE_COLORS = ['#ff6b6b', '#4ecdc4', '#45b7d1'];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        // シェイプクラス
        class Shape {
            constructor() {
                this.type = SHAPE_TYPES[Math.floor(Math.random() * SHAPE_TYPES.length)];
                this.x = Math.random() * (width - 200) + 100;
                this.y = -50;
                this.size = 40 + Math.random() * 30;
                this.speed = 2 + Math.random() * 2;
                this.color = SHAPE_COLORS[SHAPE_TYPES.indexOf(this.type)];
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.clicked = false;
                this.scale = 1;
            }

            update(deltaTime) {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;
                this.pulsePhase += 0.1;

                // パルス効果
                this.scale = 1 + Math.sin(this.pulsePhase) * 0.1;

                // 画面外に出たらライフを減らす
                if (this.y > height + 50 && !this.clicked) {
                    lives--;
                    combo = 0;
                    comboMultiplier = 1;
                    updateUI();
                    return false;
                }
                return true;
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.scale(this.scale, this.scale);

                // 光る効果
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;

                if (this.type === 'circle') {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                } else if (this.type === 'triangle') {
                    ctx.beginPath();
                    ctx.moveTo(0, -this.size);
                    ctx.lineTo(this.size * 0.866, this.size * 0.5);
                    ctx.lineTo(-this.size * 0.866, this.size * 0.5);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                } else if (this.type === 'square') {
                    ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                    ctx.strokeRect(-this.size / 2, -this.size / 2, this.size, this.size);
                }

                ctx.restore();
            }

            isClicked(x, y) {
                const dx = x - this.x;
                const dy = y - this.y;
                return Math.sqrt(dx * dx + dy * dy) < this.size + 20;
            }
        }

        // パーティクルクラス
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = 5 + Math.random() * 10;
                this.speedX = (Math.random() - 0.5) * 10;
                this.speedY = (Math.random() - 0.5) * 10;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.02;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= this.decay;
                this.size *= 0.95;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function createParticles(x, y, color, count = 20) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function createFloatingText(x, y, text, color) {
            // フローティングテキスト効果（簡易版）
            particles.push({
                x, y,
                text,
                color,
                life: 1,
                size: 30,
                update: function() {
                    this.y -= 2;
                    this.life -= 0.02;
                },
                draw: function(ctx) {
                    ctx.save();
                    ctx.globalAlpha = this.life;
                    ctx.fillStyle = this.color;
                    ctx.font = `bold ${this.size}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = this.color;
                    ctx.fillText(this.text, this.x, this.y);
                    ctx.restore();
                }
            });
        }

        function spawnShape() {
            shapes.push(new Shape());
        }

        function handleClick(x, y) {
            if (!gameRunning) return;

            for (let i = shapes.length - 1; i >= 0; i--) {
                const shape = shapes[i];
                if (!shape.clicked && shape.isClicked(x, y)) {
                    shape.clicked = true;

                    // コンボ計算
                    combo++;
                    comboMultiplier = Math.min(1 + combo * 0.1, 3);

                    // スコア計算
                    const points = Math.floor(100 * comboMultiplier);
                    score += points;

                    // エフェクト
                    createParticles(shape.x, shape.y, shape.color);
                    createFloatingText(shape.x, shape.y, `+${points}`, shape.color);

                    // シェイプを削除
                    shapes.splice(i, 1);
                    updateUI();
                    return;
                }
            }

            // 空タップでコンボリセット
            if (combo > 0) {
                combo = 0;
                comboMultiplier = 1;
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;
            document.getElementById('lives').textContent = lives;
        }

        function gameLoop(timestamp) {
            if (!gameRunning) return;

            // 背景をフェード
            ctx.fillStyle = 'rgba(26, 26, 46, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // シェイプをスポーン
            if (timestamp - lastShapeTime > shapeInterval) {
                spawnShape();
                lastShapeTime = timestamp;
                // 徐々に難しくなる
                shapeInterval = Math.max(500, 1500 - score * 2);
            }

            // シェイプを更新・描画
            shapes = shapes.filter(shape => shape.update());

            for (const shape of shapes) {
                shape.draw(ctx);
            }

            // パーティクルを更新・描画
            particles = particles.filter(p => {
                p.update();
                return p.life > 0;
            });

            for (const particle of particles) {
                particle.draw(ctx);
            }

            // ゲームオーバー判定
            if (lives <= 0) {
                endGame();
                return;
            }

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            gameRunning = true;
            score = 0;
            combo = 0;
            lives = 3;
            shapes = [];
            particles = [];
            shapeInterval = 1500;
            lastShapeTime = performance.now();
            updateUI();
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = `スコア: ${score}`;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        function restartGame() {
            startGame();
        }

        // タッチイベント
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleClick(touch.clientX, touch.clientY);
        });

        // マウスイベント
        canvas.addEventListener('click', (e) => {
            handleClick(e.clientX, e.clientY);
        });

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
