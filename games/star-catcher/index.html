<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Catcher #924</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            color: #ffffff;
            overflow: hidden;
            touch-action: none;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 100vh;
            max-height: 800px;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            font-size: 1.1rem;
            margin-top: 5px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-value {
            font-weight: bold;
            color: #ffd700;
        }

        #game-canvas {
            flex: 1;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            backdrop-filter: blur(5px);
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #ffd700;
        }

        .overlay p {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #ccc;
        }

        .overlay .final-score {
            font-size: 3rem;
            font-weight: bold;
            color: #ffd700;
            margin: 20px 0;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .instructions {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #888;
            text-align: center;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.2rem;
            }

            .stats {
                font-size: 0.9rem;
                gap: 15px;
            }

            .overlay h2 {
                font-size: 1.5rem;
            }

            .overlay .final-score {
                font-size: 2rem;
            }

            button {
                padding: 12px 30px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>⭐ Star Catcher</h1>
            <div class="stats">
                <div class="stat">
                    <span>Score:</span>
                    <span class="stat-value" id="score">0</span>
                </div>
                <div class="stat">
                    <span>Time:</span>
                    <span class="stat-value" id="time">60</span>
                </div>
                <div class="stat">
                    <span>High:</span>
                    <span class="stat-value" id="high-score">0</span>
                </div>
            </div>
        </div>

        <canvas id="game-canvas"></canvas>

        <div class="overlay" id="start-overlay">
            <h2>Star Catcher</h2>
            <p>Catch the falling stars!</p>
            <button id="start-btn">Start Game</button>
            <div class="instructions">
                Use ← → arrow keys or touch sides<br>
                Catch stars, avoid bombs
            </div>
        </div>

        <div class="overlay hidden" id="gameover-overlay">
            <h2>Game Over!</h2>
            <p>Your Score</p>
            <div class="final-score" id="final-score">0</div>
            <button id="restart-btn">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');

        let player, stars, bombs, particles;
        let score, timeLeft, gameRunning;
        let lastTime;
        let spawnTimer = 0;
        let highScore = localStorage.getItem('starCatcherHighScore') || 0;

        document.getElementById('high-score').textContent = highScore;

        function resize() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        class Player {
            constructor() {
                this.width = 80;
                this.height = 20;
                this.x = canvas.width / 2 - this.width / 2;
                this.y = canvas.height - this.height - 20;
                this.speed = 8;
                this.velX = 0;
            }

            update(keys) {
                if (keys['ArrowLeft'] || keys['TouchLeft']) {
                    this.velX = -this.speed;
                } else if (keys['ArrowRight'] || keys['TouchRight']) {
                    this.velX = this.speed;
                } else {
                    this.velX *= 0.8;
                }

                this.x += this.velX;

                if (this.x < 0) this.x = 0;
                if (this.x + this.width > canvas.width) {
                    this.x = canvas.width - this.width;
                }
            }

            draw() {
                // Glow effect
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#667eea';

                // Player body
                const gradient = ctx.createLinearGradient(this.x, this.y, this.x + this.width, this.y);
                gradient.addColorStop(0, '#667eea');
                gradient.addColorStop(0.5, '#764ba2');
                gradient.addColorStop(1, '#667eea');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(this.x, this.y, this.width, this.height, 10);
                ctx.fill();

                ctx.shadowBlur = 0;
            }
        }

        class Star {
            constructor() {
                this.radius = 15;
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = -this.radius;
                this.speed = Math.random() * 3 + 2;
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.2;
                this.points = 5;
            }

            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ffd700';

                ctx.fillStyle = '#ffd700';
                ctx.beginPath();

                for (let i = 0; i < this.points * 2; i++) {
                    const angle = (i * Math.PI) / this.points;
                    const radius = i % 2 === 0 ? this.radius : this.radius / 2;
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;

                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }

                ctx.closePath();
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.restore();
            }

            isOffScreen() {
                return this.y > canvas.height + this.radius;
            }

            collidesWith(player) {
                return this.y + this.radius > player.y &&
                       this.y - this.radius < player.y + player.height &&
                       this.x > player.x &&
                       this.x < player.x + player.width;
            }
        }

        class Bomb {
            constructor() {
                this.radius = 12;
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = -this.radius;
                this.speed = Math.random() * 2 + 2;
            }

            update() {
                this.y += this.speed;
            }

            draw() {
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ff4444';

                ctx.fillStyle = '#ff4444';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // Fuse
                ctx.strokeStyle = '#ffaa00';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y - this.radius);
                ctx.quadraticCurveTo(
                    this.x + 5, this.y - this.radius - 5,
                    this.x + 3, this.y - this.radius - 10
                );
                ctx.stroke();

                // Spark
                if (Math.random() > 0.5) {
                    ctx.fillStyle = '#ffff00';
                    ctx.beginPath();
                    ctx.arc(this.x + 3, this.y - this.radius - 10, 3, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.shadowBlur = 0;
            }

            isOffScreen() {
                return this.y > canvas.height + this.radius;
            }

            collidesWith(player) {
                return this.y + this.radius > player.y &&
                       this.y - this.radius < player.y + player.height &&
                       this.x > player.x &&
                       this.x < player.x + player.width;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.radius = Math.random() * 5 + 2;
                this.color = color;
                this.life = 1;
                this.decay = Math.random() * 0.03 + 0.02;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.3;
                this.life -= this.decay;
            }

            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }

            isDead() {
                return this.life <= 0;
            }
        }

        function createParticles(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function init() {
            resize();
            player = new Player();
            stars = [];
            bombs = [];
            particles = [];
            score = 0;
            timeLeft = 60;
            gameRunning = true;
            lastTime = performance.now();
            spawnTimer = 0;

            document.getElementById('score').textContent = score;
            document.getElementById('time').textContent = timeLeft;
        }

        function spawnObject() {
            if (Math.random() < 0.3) {
                bombs.push(new Bomb());
            } else {
                stars.push(new Star());
            }
        }

        const keys = {};

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;

            if (x < rect.width / 2) {
                keys['TouchLeft'] = true;
            } else {
                keys['TouchRight'] = true;
            }
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            keys['TouchLeft'] = false;
            keys['TouchRight'] = false;
        });

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;

            if (x < rect.width / 2) {
                keys['TouchLeft'] = true;
            } else {
                keys['TouchRight'] = true;
            }
        });

        canvas.addEventListener('mouseup', () => {
            keys['TouchLeft'] = false;
            keys['TouchRight'] = false;
        });

        function gameOver() {
            gameRunning = false;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('starCatcherHighScore', highScore);
                document.getElementById('high-score').textContent = highScore;
            }

            document.getElementById('final-score').textContent = score;
            document.getElementById('gameover-overlay').classList.remove('hidden');
        }

        function update(currentTime) {
            if (!gameRunning) return;

            const deltaTime = (currentTime - lastTime) / 1000;
            lastTime = currentTime;

            // Update time
            timeLeft -= deltaTime;
            if (timeLeft <= 0) {
                timeLeft = 0;
                gameOver();
                return;
            }
            document.getElementById('time').textContent = Math.ceil(timeLeft);

            // Spawn objects
            spawnTimer += deltaTime;
            if (spawnTimer > 0.5) {
                spawnTimer = 0;
                spawnObject();
            }

            // Update player
            player.update(keys);

            // Update stars
            stars.forEach(star => star.update());
            stars = stars.filter(star => {
                if (star.isOffScreen()) return false;

                if (star.collidesWith(player)) {
                    score += 10;
                    document.getElementById('score').textContent = score;
                    createParticles(star.x, star.y, '#ffd700', 15);
                    return false;
                }

                return true;
            });

            // Update bombs
            bombs.forEach(bomb => bomb.update());
            bombs = bombs.filter(bomb => {
                if (bomb.isOffScreen()) return false;

                if (bomb.collidesWith(player)) {
                    score = Math.max(0, score - 20);
                    document.getElementById('score').textContent = score;
                    createParticles(bomb.x, bomb.y, '#ff4444', 20);
                    return false;
                }

                return true;
            });

            // Update particles
            particles.forEach(p => p.update());
            particles = particles.filter(p => !p.isDead());
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            player.draw();
            stars.forEach(star => star.draw());
            bombs.forEach(bomb => bomb.draw());
            particles.forEach(p => p.draw());
        }

        function gameLoop(currentTime) {
            update(currentTime);
            draw();

            if (gameRunning) {
                requestAnimationFrame(gameLoop);
            }
        }

        function startGame() {
            init();
            document.getElementById('start-overlay').classList.add('hidden');
            document.getElementById('gameover-overlay').classList.add('hidden');
            requestAnimationFrame(gameLoop);
        }

        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', startGame);

        window.addEventListener('resize', () => {
            resize();
            if (player) {
                player.x = Math.min(player.x, canvas.width - player.width);
                player.y = canvas.height - player.height - 20;
            }
        });

        resize();
    </script>
</body>
</html>
