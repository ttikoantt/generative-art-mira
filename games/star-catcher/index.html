<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Star Catcher - 星キャッチャー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #0a0a2e, #1a1a4e);
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
        }

        .hud {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            z-index: 10;
        }

        .hud-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .hud-label {
            font-size: 12px;
            opacity: 0.7;
            text-transform: uppercase;
        }

        .hud-value {
            font-size: 28px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .start-screen, .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 46, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            text-align: center;
        }

        .start-screen h1, .game-over-screen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
        }

        .start-screen p, .game-over-screen p {
            font-size: 18px;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .start-btn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border: none;
            border-radius: 30px;
            color: #0a0a2e;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .start-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
        }

        .final-score {
            font-size: 36px;
            color: #ffd700;
            margin: 20px 0;
        }

        .game-over-screen {
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="hud">
        <div class="hud-item">
            <span class="hud-label">スコア</span>
            <span class="hud-value" id="score">0</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">ライフ</span>
            <span class="hud-value" id="lives">❤️❤️❤️</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">ハイスコア</span>
            <span class="hud-value" id="highScore">0</span>
        </div>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>

    <div class="start-screen" id="startScreen">
        <h1>⭐ Star Catcher</h1>
        <p>空から落ちてくる星をキャッチしよう！</p>
        <p>左右にスワイプして移動</p>
        <p>青い星はプラス点</p>
        <p>赤い星はマイナス点</p>
        <button class="start-btn" id="startBtn">スタート</button>
    </div>

    <div class="game-over-screen" id="gameOverScreen">
        <h1>Game Over</h1>
        <p>最終スコア</p>
        <div class="final-score" id="finalScore">0</div>
        <button class="start-btn" id="restartBtn">もう一度</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const highScoreEl = document.getElementById('highScore');
        const finalScoreEl = document.getElementById('finalScore');

        let width, height;
        let score = 0;
        let lives = 3;
        let highScore = parseInt(localStorage.getItem('starCatcherHighScore')) || 0;
        let gameRunning = false;
        let playerX = 0;
        let targetX = 0;
        const playerWidth = 80;
        const playerHeight = 20;

        highScoreEl.textContent = highScore;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            playerX = width / 2 - playerWidth / 2;
            targetX = playerX;
        }

        window.addEventListener('resize', resize);
        resize();

        // タッチ/マウス操作
        let isDragging = false;

        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            updateTargetX(e.clientX);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                updateTargetX(e.clientX);
            }
        });

        canvas.addEventListener('mouseup', () => { isDragging = false; });
        canvas.addEventListener('mouseleave', () => { isDragging = false; });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDragging = true;
            updateTargetX(e.touches[0].clientX);
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isDragging) {
                updateTargetX(e.touches[0].clientX);
            }
        }, { passive: false });

        canvas.addEventListener('touchend', () => { isDragging = false; });

        function updateTargetX(x) {
            targetX = x - playerWidth / 2;
        }

        // 星クラス
        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * (width - 30);
                this.y = -50;
                this.speed = Math.random() * 2 + 2 + score * 0.1;
                this.radius = Math.random() * 10 + 15;
                this.type = Math.random() < 0.8 ? 'good' : 'bad';
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.trail = [];
            }

            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;

                // トレイル
                this.trail.push({ x: this.x, y: this.y, alpha: 1 });
                if (this.trail.length > 10) {
                    this.trail.shift();
                }
                this.trail.forEach(t => t.alpha -= 0.1);
            }

            draw() {
                // トレイル
                this.trail.forEach((t, i) => {
                    ctx.save();
                    ctx.globalAlpha = t.alpha * 0.3;
                    ctx.fillStyle = this.type === 'good' ? '#ffd700' : '#ff4444';
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, this.radius * (i / this.trail.length), 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                });

                // 星の描画
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius);
                if (this.type === 'good') {
                    gradient.addColorStop(0, '#ffffff');
                    gradient.addColorStop(0.3, '#ffd700');
                    gradient.addColorStop(1, '#ff9500');
                } else {
                    gradient.addColorStop(0, '#ffaaaa');
                    gradient.addColorStop(0.3, '#ff4444');
                    gradient.addColorStop(1, '#cc0000');
                }

                // 星の形
                ctx.fillStyle = gradient;
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
                    const x = Math.cos(angle) * this.radius;
                    const y = Math.sin(angle) * this.radius;
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.closePath();
                ctx.fill();

                // 光る効果
                ctx.shadowColor = this.type === 'good' ? '#ffd700' : '#ff4444';
                ctx.shadowBlur = 20;
                ctx.fill();

                ctx.restore();
            }
        }

        // キャッチエフェクト
        class CatchEffect {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.alpha = 1;
                this.particles = [];
                for (let i = 0; i < 10; i++) {
                    const angle = (Math.PI * 2 * i) / 10;
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * 3,
                        vy: Math.sin(angle) * 3
                    });
                }
            }

            update() {
                this.alpha -= 0.02;
                this.particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.1;
                });
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                this.particles.forEach(p => {
                    ctx.fillStyle = this.type === 'good' ? '#ffd700' : '#ff4444';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.restore();
            }
        }

        let stars = [];
        let effects = [];
        let spawnTimer = 0;

        function spawnStar() {
            spawnTimer++;
            if (spawnTimer > 60 - Math.min(score, 40)) {
                stars.push(new Star());
                spawnTimer = 0;
            }
        }

        function checkCollisions() {
            stars.forEach((star, index) => {
                // プレイヤーとの衝突
                if (star.y + star.radius > height - 100 &&
                    star.y - star.radius < height - 80 &&
                    star.x > playerX && star.x < playerX + playerWidth) {

                    if (star.type === 'good') {
                        score += 10;
                        effects.push(new CatchEffect(star.x, star.y, 'good'));
                    } else {
                        lives--;
                        effects.push(new CatchEffect(star.x, star.y, 'bad'));
                        updateLives();
                        if (lives <= 0) {
                            gameOver();
                        }
                    }
                    stars.splice(index, 1);
                    updateScore();
                }
                // 画面外に出たら消える
                else if (star.y > height) {
                    stars.splice(index, 1);
                }
            });
        }

        function updateScore() {
            scoreEl.textContent = score;
        }

        function updateLives() {
            livesEl.textContent = '❤️'.repeat(lives);
        }

        function gameOver() {
            gameRunning = false;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('starCatcherHighScore', highScore);
                highScoreEl.textContent = highScore;
            }
            finalScoreEl.textContent = score;
            gameOverScreen.style.display = 'flex';
        }

        function startGame() {
            score = 0;
            lives = 3;
            stars = [];
            effects = [];
            spawnTimer = 0;
            gameRunning = true;
            updateScore();
            updateLives();
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
        }

        function drawPlayer() {
            const playerY = height - 100;
            
            // プレイヤーの影
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.beginPath();
            ctx.ellipse(playerX + playerWidth / 2, playerY + 30, playerWidth / 2, 10, 0, 0, Math.PI * 2);
            ctx.fill();

            // プレイヤーの本体
            const gradient = ctx.createLinearGradient(playerX, playerY, playerX + playerWidth, playerY);
            gradient.addColorStop(0, '#6366f1');
            gradient.addColorStop(0.5, '#8b5cf6');
            gradient.addColorStop(1, '#6366f1');

            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.roundRect(playerX, playerY, playerWidth, playerHeight, 10);
            ctx.fill();

            // 光る効果
            ctx.shadowColor = '#8b5cf6';
            ctx.shadowBlur = 20;
            ctx.fill();
            ctx.shadowBlur = 0;

            // 装飾
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.roundRect(playerX + 10, playerY + 5, playerWidth - 20, 5, 2);
            ctx.fill();
        }

        function drawBackground() {
            // 背景の星
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            for (let i = 0; i < 50; i++) {
                const x = (i * 73) % width;
                const y = (i * 137) % height;
                const size = (i % 3) + 1;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, width, height);

            drawBackground();

            if (gameRunning) {
                // プレイヤーの移動（スムーズに）
                playerX += (targetX - playerX) * 0.1;
                playerX = Math.max(0, Math.min(width - playerWidth, playerX));

                spawnStar();
                stars.forEach(s => s.update());
                checkCollisions();
            }

            stars.forEach(s => s.draw());
            effects.forEach((e, i) => {
                e.update();
                if (e.alpha <= 0) {
                    effects.splice(i, 1);
                } else {
                    e.draw();
                }
            });

            if (gameRunning) {
                drawPlayer();
            }

            requestAnimationFrame(gameLoop);
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // 全画面切り替え
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('全画面エラー:', err);
                });
            } else {
                document.exitFullscreen();
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fullscreenBtn.textContent = '全画面解除';
            } else {
                fullscreenBtn.textContent = '全画面';
            }
        });

        gameLoop();
    </script>
</body>
</html>
