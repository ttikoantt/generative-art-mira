<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Catcher ⭐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #0a0a20, #1a1a40);
            color: #fff;
            overflow: hidden;
            touch-action: manipulation;
        }

        #game {
            position: relative;
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .hud {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 100;
        }

        .score-panel {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 215, 0, 0.3);
        }

        .score-panel h2 {
            font-size: 14px;
            color: #ffd700;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .score-panel .score {
            font-size: 36px;
            font-weight: bold;
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .timer-panel {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(0, 255, 255, 0.3);
        }

        .timer-panel h2 {
            font-size: 14px;
            color: #0ff;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .timer-panel .time {
            font-size: 36px;
            font-weight: bold;
            color: #0ff;
        }

        .combo-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px #ffd700, 0 0 40px #ffaa00;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 100;
        }

        .combo-panel.show {
            opacity: 1;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(10px);
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h1 {
            font-size: 48px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
            text-align: center;
            max-width: 400px;
        }

        .overlay .final-score {
            font-size: 72px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 20px;
            text-shadow: 0 0 30px #ffd700;
        }

        .btn {
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #ffd700;
        }

        @media (max-width: 768px) {
            .hud {
                flex-direction: column;
                gap: 10px;
            }

            .score-panel, .timer-panel {
                padding: 10px 15px;
            }

            .score-panel .score, .timer-panel .time {
                font-size: 24px;
            }

            .overlay h1 {
                font-size: 32px;
            }

            .overlay .final-score {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <div id="game">
        <canvas id="canvas"></canvas>

        <div class="hud">
            <div class="score-panel">
                <h2>Score</h2>
                <div class="score" id="score">0</div>
            </div>
            <div class="timer-panel">
                <h2>Time</h2>
                <div class="time" id="timer">60</div>
            </div>
        </div>

        <div class="combo-panel" id="combo"></div>

        <div class="overlay" id="startOverlay">
            <h1>⭐ Star Catcher</h1>
            <p>Tap the shooting stars before they disappear!<br>Build combos for bonus points!</p>
            <button class="btn" id="startBtn">Start Game</button>
        </div>

        <div class="overlay hidden" id="gameOverOverlay">
            <h1>Time's Up!</h1>
            <div class="final-score" id="finalScore">0</div>
            <p id="finalMessage"></p>
            <button class="btn" id="restartBtn">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const comboEl = document.getElementById('combo');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScoreEl = document.getElementById('finalScore');
        const finalMessageEl = document.getElementById('finalMessage');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // Game state
        let score = 0;
        let timeLeft = 60;
        let gameRunning = false;
        let combo = 0;
        let lastCatchTime = 0;
        const COMBO_TIMEOUT = 1500; // ms

        // Stars
        class ShootingStar {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 0.3;
                this.length = 50 + Math.random() * 100;
                this.speed = 2 + Math.random() * 3;
                this.angle = Math.PI / 4 + (Math.random() - 0.5) * 0.5;
                this.vx = Math.cos(this.angle) * this.speed;
                this.vy = Math.sin(this.angle) * this.speed;
                this.brightness = 1;
                this.alive = true;
                this.points = Math.floor(this.speed * 10);
                this.trail = [];
            }

            update() {
                this.trail.unshift({ x: this.x, y: this.y });
                if (this.trail.length > 20) {
                    this.trail.pop();
                }

                this.x += this.vx;
                this.y += this.vy;
                this.brightness -= 0.003;

                if (this.brightness <= 0 || this.x > width || this.y > height) {
                    this.alive = false;
                    combo = 0; // Reset combo on miss
                }
            }

            draw() {
                // Draw trail
                for (let i = 0; i < this.trail.length; i++) {
                    const alpha = (1 - i / this.trail.length) * this.brightness;
                    const size = (1 - i / this.trail.length) * 4;
                    ctx.beginPath();
                    ctx.arc(this.trail[i].x, this.trail[i].y, size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.fill();
                }

                // Draw star
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 15);
                gradient.addColorStop(0, `rgba(255, 255, 255, ${this.brightness})`);
                gradient.addColorStop(0.5, `rgba(255, 215, 0, ${this.brightness * 0.5})`);
                gradient.addColorStop(1, 'rgba(255, 215, 0, 0)');

                ctx.beginPath();
                ctx.arc(this.x, this.y, 15, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Glow
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ffd700';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.brightness})`;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            contains(x, y) {
                const dx = x - this.x;
                const dy = y - this.y;
                return Math.sqrt(dx * dx + dy * dy) < 50;
            }
        }

        // Background stars
        class BackgroundStar {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2;
                this.twinkle = Math.random() * Math.PI * 2;
            }

            update() {
                this.twinkle += 0.05;
            }

            draw() {
                const brightness = 0.3 + Math.sin(this.twinkle) * 0.2;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${brightness})`;
                ctx.fill();
            }
        }

        let shootingStars = [];
        let backgroundStars = [];
        let spawnTimer = 0;

        function createBackgroundStars() {
            backgroundStars = [];
            for (let i = 0; i < 200; i++) {
                backgroundStars.push(new BackgroundStar());
            }
        }
        createBackgroundStars();

        function spawnStar() {
            shootingStars.push(new ShootingStar());
        }

        function startGame() {
            score = 0;
            timeLeft = 60;
            combo = 0;
            shootingStars = [];
            gameRunning = true;
            startOverlay.classList.add('hidden');
            gameOverOverlay.classList.add('hidden');
            updateUI();
            gameLoop();

            // Spawn stars
            const spawnInterval = setInterval(() => {
                if (!gameRunning) {
                    clearInterval(spawnInterval);
                    return;
                }
                spawnStar();
            }, 800);

            // Timer
            const timerInterval = setInterval(() => {
                if (!gameRunning) {
                    clearInterval(timerInterval);
                    return;
                }
                timeLeft--;
                updateUI();
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameRunning = false;
            finalScoreEl.textContent = score;

            let message = '';
            if (score < 500) {
                message = 'Keep practicing! 🌟';
            } else if (score < 1000) {
                message = 'Good job! ⭐';
            } else if (score < 2000) {
                message = 'Excellent! ⭐⭐';
            } else {
                message = 'Amazing! You\'re a star master! ⭐⭐⭐';
            }
            finalMessageEl.textContent = message;

            gameOverOverlay.classList.remove('hidden');
        }

        function updateUI() {
            scoreEl.textContent = score;
            timerEl.textContent = timeLeft;
        }

        function showCombo(points) {
            comboEl.textContent = `+${points}${combo > 1 ? ` x${combo} Combo!` : ''}`;
            comboEl.classList.add('show');
            setTimeout(() => {
                comboEl.classList.remove('show');
            }, 500);
        }

        function handleInput(x, y) {
            if (!gameRunning) return;

            for (let i = shootingStars.length - 1; i >= 0; i--) {
                if (shootingStars[i].contains(x, y)) {
                    const now = Date.now();
                    if (now - lastCatchTime < COMBO_TIMEOUT) {
                        combo++;
                    } else {
                        combo = 1;
                    }
                    lastCatchTime = now;

                    const points = shootingStars[i].points * combo;
                    score += points;
                    showCombo(points);

                    // Create explosion effect
                    createExplosion(shootingStars[i].x, shootingStars[i].y);

                    shootingStars.splice(i, 1);
                    updateUI();
                    return;
                }
            }
        }

        // Explosion effect
        let explosions = [];

        function createExplosion(x, y) {
            for (let i = 0; i < 10; i++) {
                explosions.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1,
                    color: `hsl(${45 + Math.random() * 20}, 100%, 60%)`
                });
            }
        }

        function updateExplosions() {
            for (let i = explosions.length - 1; i >= 0; i--) {
                const exp = explosions[i];
                exp.x += exp.vx;
                exp.y += exp.vy;
                exp.life -= 0.05;
                if (exp.life <= 0) {
                    explosions.splice(i, 1);
                }
            }
        }

        function drawExplosions() {
            explosions.forEach(exp => {
                ctx.beginPath();
                ctx.arc(exp.x, exp.y, 3 * exp.life, 0, Math.PI * 2);
                ctx.fillStyle = exp.color.replace('60%)', `${60 * exp.life}%)`);
                ctx.fill();
            });
        }

        function gameLoop() {
            if (!gameRunning) return;

            // Clear
            ctx.fillStyle = 'rgba(10, 10, 32, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // Draw background stars
            backgroundStars.forEach(star => {
                star.update();
                star.draw();
            });

            // Update and draw shooting stars
            for (let i = shootingStars.length - 1; i >= 0; i--) {
                shootingStars[i].update();
                shootingStars[i].draw();
                if (!shootingStars[i].alive) {
                    shootingStars.splice(i, 1);
                }
            }

            // Explosions
            updateExplosions();
            drawExplosions();

            requestAnimationFrame(gameLoop);
        }

        // Event listeners
        canvas.addEventListener('click', (e) => {
            handleInput(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleInput(touch.clientX, touch.clientY);
        });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // Resize
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            createBackgroundStars();
        });

        // Initial background
        function drawBackground() {
            ctx.fillStyle = 'rgba(10, 10, 32, 1)';
            ctx.fillRect(0, 0, width, height);
            backgroundStars.forEach(star => {
                star.update();
                star.draw();
            });
            if (!gameRunning) {
                requestAnimationFrame(drawBackground);
            }
        }
        drawBackground();
    </script>
</body>
</html>
