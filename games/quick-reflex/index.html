<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Quick Reflex</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            touch-action: manipulation;
        }

        #gameCanvas {
            display: block;
            cursor: crosshair;
            touch-action: none;
        }

        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            z-index: 10;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .stats {
            display: flex;
            gap: 40px;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .stat-box {
            text-align: center;
            background: rgba(255, 255, 255, 0.2);
            padding: 20px 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
        }

        button {
            padding: 15px 40px;
            font-size: 20px;
            border: none;
            border-radius: 25px;
            background: white;
            color: #764ba2;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .instructions {
            margin-top: 30px;
            font-size: 16px;
            opacity: 0.9;
            text-align: center;
            line-height: 1.8;
            max-width: 400px;
        }

        .hud {
            position: fixed;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
            z-index: 5;
            color: #764ba2;
            font-weight: bold;
        }

        .fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 10px;
            color: #764ba2;
            font-size: 20px;
            cursor: pointer;
            z-index: 20;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
            display: none;
        }

        .game-over-stats {
            margin: 20px 0;
            font-size: 18px;
            line-height: 1.8;
        }

        .combo-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            opacity: 0;
            z-index: 100;
        }

        .combo-display.show {
            animation: comboAnim 0.5s ease-out forwards;
        }

        @keyframes comboAnim {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.5);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 36px;
            }

            .stats {
                gap: 20px;
            }

            .stat-box {
                padding: 15px 20px;
            }

            .stat-value {
                font-size: 28px;
            }

            button {
                padding: 12px 30px;
                font-size: 18px;
            }

            .instructions {
                font-size: 14px;
                padding: 0 20px;
            }

            .fullscreen-btn {
                display: block;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <!-- Start Screen -->
    <div id="startScreen" class="screen">
        <h1>⚡ Quick Reflex</h1>
        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">最高スコア</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">平均反応時間</div>
                <div class="stat-value" id="avgReaction">0ms</div>
            </div>
        </div>
        <button onclick="startGame()">スタート</button>
        <div class="instructions">
            🎯 ターゲットが現れたら素早くタップ！<br>
            ⏱️ 反応速度が速いほど高得点<br>
            🔥 連続で成功でコンボボーナス<br>
            ❌ 間違えた場所をタップするとライフ減少
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverScreen" class="screen hidden">
        <h1>🏁 ゲームオーバー</h1>
        <div class="game-over-stats">
            スコア: <span id="finalScore">0</span><br>
            最高スコア: <span id="finalHighScore">0</span><br>
            平均反応時間: <span id="finalAvgReaction">0ms</span><br>
            最大コンボ: <span id="maxCombo">0</span>
        </div>
        <button onclick="startGame()">もう一度プレイ</button>
    </div>

    <!-- HUD -->
    <div id="hud" class="hud hidden">
        <div>スコア: <span id="score">0</span></div>
        <div>ライフ: <span id="lives">❤️❤️❤️</span></div>
        <div>コンボ: <span id="combo">0</span></div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div id="comboDisplay" class="combo-display"></div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game state
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let combo = 0;
        let maxCombo = 0;
        let target = null;
        let targetSpawnTime = 0;
        let reactionTimes = [];
        let highScore = parseInt(localStorage.getItem('quickReflexHighScore')) || 0;

        // Canvas dimensions
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        // Target class
        class Target {
            constructor() {
                const margin = 80;
                this.radius = 40;
                this.x = margin + Math.random() * (canvas.width - margin * 2);
                this.y = margin + Math.random() * (canvas.height - margin * 2);
                this.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
                this.scale = 0;
                this.maxScale = 1;
                this.shrinkRate = 0.003 + (score / 10000) * 0.002;
                this.active = true;
                this.appearTime = performance.now();
            }

            update() {
                this.scale += (this.maxScale - this.scale) * 0.15;
                this.maxScale -= this.shrinkRate;

                if (this.maxScale <= 0) {
                    this.active = false;
                    if (gameRunning) {
                        loseLife();
                    }
                }
            }

            draw() {
                if (!this.active) return;

                const size = this.radius * this.scale;

                // 外側の光る円
                ctx.beginPath();
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, size);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.arc(this.x, this.y, size * 1.5, 0, Math.PI * 2);
                ctx.fill();

                // ターゲットの本体
                ctx.beginPath();
                ctx.fillStyle = this.color;
                ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
                ctx.fill();

                // ハイライト
                ctx.beginPath();
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.arc(this.x - size * 0.3, this.y - size * 0.3, size * 0.3, 0, Math.PI * 2);
                ctx.fill();
            }

            contains(x, y) {
                const dx = x - this.x;
                const dy = y - this.y;
                return Math.sqrt(dx * dx + dy * dy) < this.radius * this.scale;
            }
        }

        // Spawn target
        function spawnTarget() {
            if (!gameRunning) return;
            target = new Target();
            targetSpawnTime = performance.now();
        }

        // Handle click/tap
        function handleInput(x, y) {
            if (!gameRunning || !target) return;

            if (target.contains(x, y)) {
                // Success!
                const reactionTime = performance.now() - targetSpawnTime;
                reactionTimes.push(reactionTime);

                // Calculate score based on reaction time
                const baseScore = 100;
                const timeBonus = Math.max(0, 1000 - reactionTime) / 10;
                const comboBonus = combo * 10;

                const points = Math.floor(baseScore + timeBonus + comboBonus);
                score += points;

                combo++;
                if (combo > maxCombo) {
                    maxCombo = combo;
                }

                // Show combo
                if (combo >= 3) {
                    showCombo(combo);
                }

                updateHUD();

                // Spawn next target
                setTimeout(spawnTarget, 200);
            } else {
                // Miss!
                combo = 0;
                loseLife();
                updateHUD();
            }
        }

        // Lose life
        function loseLife() {
            lives--;
            combo = 0;
            updateHUD();

            if (lives <= 0) {
                endGame();
            } else {
                target = null;
                setTimeout(spawnTarget, 500);
            }
        }

        // Show combo
        function showCombo(count) {
            const comboDisplay = document.getElementById('comboDisplay');
            comboDisplay.textContent = `${count} Combo!`;
            comboDisplay.classList.remove('show');
            void comboDisplay.offsetWidth; // Trigger reflow
            comboDisplay.classList.add('show');
        }

        // Update HUD
        function updateHUD() {
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;

            const hearts = '❤️'.repeat(Math.max(0, lives));
            document.getElementById('lives').textContent = hearts;
        }

        // Start game
        function startGame() {
            gameRunning = true;
            score = 0;
            lives = 3;
            combo = 0;
            maxCombo = 0;
            reactionTimes = [];

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');

            updateHUD();
            spawnTarget();
            gameLoop();
        }

        // End game
        function endGame() {
            gameRunning = false;

            // Update high score
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('quickReflexHighScore', highScore);
            }

            // Calculate average reaction time
            const avgReaction = reactionTimes.length > 0
                ? Math.floor(reactionTimes.reduce((a, b) => a + b, 0) / reactionTimes.length)
                : 0;

            // Show game over screen
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalHighScore').textContent = highScore;
            document.getElementById('finalAvgReaction').textContent = avgReaction + 'ms';
            document.getElementById('maxCombo').textContent = maxCombo;

            document.getElementById('hud').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.remove('hidden');

            // Update start screen stats
            updateStartScreenStats();
        }

        // Update start screen stats
        function updateStartScreenStats() {
            document.getElementById('highScore').textContent = highScore;

            const allReactions = JSON.parse(localStorage.getItem('quickReflexReactions') || '[]');
            const avgReaction = allReactions.length > 0
                ? Math.floor(allReactions.reduce((a, b) => a + b, 0) / allReactions.length)
                : 0;
            document.getElementById('avgReaction').textContent = avgReaction + 'ms';
        }

        // Game loop
        function gameLoop() {
            if (!gameRunning) return;

            // Clear canvas
            ctx.fillStyle = 'rgba(102, 126, 234, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update and draw target
            if (target) {
                target.update();
                target.draw();

                if (!target.active) {
                    target = null;
                }
            }

            requestAnimationFrame(gameLoop);
        }

        // Toggle fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Event listeners
        canvas.addEventListener('click', (e) => {
            handleInput(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleInput(touch.clientX, touch.clientY);
        });

        window.addEventListener('resize', resize);

        // Initialize
        resize();
        updateStartScreenStats();

        // Save reaction times on game over
        window.addEventListener('beforeunload', () => {
            if (reactionTimes.length > 0) {
                const allReactions = JSON.parse(localStorage.getItem('quickReflexReactions') || '[]');
                allReactions.push(...reactionTimes);
                localStorage.setItem('quickReflexReactions', JSON.stringify(allReactions.slice(-100)));
            }
        });
    </script>
</body>
</html>
