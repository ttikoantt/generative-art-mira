<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Reflex - 反射神経ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 600px;
            width: 100%;
        }

        .game-area {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 20px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px 25px;
            border-radius: 15px;
            flex: 1;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: white;
        }

        .target-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 200px;
        }

        .target {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 50%;
            cursor: pointer;
            position: absolute;
            transition: transform 0.1s ease;
            box-shadow: 0 4px 20px rgba(245, 87, 108, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .target:active {
            transform: scale(0.9);
        }

        .target .emoji {
            font-size: 40px;
        }

        .message {
            font-size: 48px;
            color: white;
            font-weight: bold;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .instructions {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: white;
            color: #667eea;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 14px;
            cursor: pointer;
            border-radius: 20px;
            z-index: 100;
        }

        .hidden {
            display: none !important;
        }

        .combo {
            position: absolute;
            top: 10px;
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            animation: pulse 0.3s ease;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .target {
            animation: pop 0.2s ease;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>

    <div class="container">
        <div class="game-area">
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">スコア</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">残り時間</div>
                    <div class="stat-value" id="time">30</div>
                </div>
                <div class="stat">
                    <div class="stat-label">コンボ</div>
                    <div class="stat-value" id="combo">0</div>
                </div>
            </div>

            <div class="target-container" id="gameArea">
                <!-- Start Screen -->
                <div id="startScreen">
                    <div class="message">🎯</div>
                    <div class="instructions">ターゲットをタップしてスコア獲得！<br>コンボでポイントアップ</div>
                    <button class="btn" id="startBtn">スタート</button>
                </div>

                <!-- Game Screen -->
                <div id="gameScreen" class="hidden">
                    <div class="target" id="target">
                        <span class="emoji">🎯</span>
                    </div>
                </div>

                <!-- End Screen -->
                <div id="endScreen" class="hidden">
                    <div class="message">⏰</div>
                    <div class="instructions">最終スコア</div>
                    <div class="stat-value" id="finalScore" style="font-size: 48px; margin-bottom: 20px;">0</div>
                    <button class="btn" id="restartBtn">もう一度</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const startScreen = document.getElementById('startScreen');
        const gameScreen = document.getElementById('gameScreen');
        const endScreen = document.getElementById('endScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const target = document.getElementById('target');
        const gameArea = document.getElementById('gameArea');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        const scoreEl = document.getElementById('score');
        const timeEl = document.getElementById('time');
        const comboEl = document.getElementById('combo');
        const finalScoreEl = document.getElementById('finalScore');

        let score = 0;
        let combo = 0;
        let timeLeft = 30;
        let gameInterval;
        let timerInterval;
        let targetTimeout;

        const emojis = ['🎯', '🎪', '🎨', '🎭', '🎪', '⭐', '🌟', '💫', '✨', '🔮'];

        function startGame() {
            score = 0;
            combo = 0;
            timeLeft = 30;

            scoreEl.textContent = '0';
            timeEl.textContent = '30';
            comboEl.textContent = '0';

            startScreen.classList.add('hidden');
            endScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');

            spawnTarget();

            gameInterval = setInterval(() => {
                timeLeft--;
                timeEl.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function spawnTarget() {
            const containerRect = gameArea.getBoundingClientRect();
            const maxX = containerRect.width - 100;
            const maxY = containerRect.height - 100;

            const x = Math.random() * maxX;
            const y = Math.random() * maxY;

            target.style.left = x + 'px';
            target.style.top = y + 'px';

            const emoji = emojis[Math.floor(Math.random() * emojis.length)];
            target.querySelector('.emoji').textContent = emoji;

            // Clear previous timeout
            if (targetTimeout) {
                clearTimeout(targetTimeout);
            }

            // Move target after 1.5 - 2.5 seconds
            targetTimeout = setTimeout(() => {
                if (timeLeft > 0) {
                    combo = 0;
                    comboEl.textContent = '0';
                    spawnTarget();
                }
            }, 1500 + Math.random() * 1000);
        }

        function hitTarget() {
            combo++;
            comboEl.textContent = combo;

            const points = 10 + (combo * 2);
            score += points;
            scoreEl.textContent = score;

            // Show combo popup
            if (combo % 5 === 0) {
                showComboPopup();
            }

            spawnTarget();
        }

        function showComboPopup() {
            const popup = document.createElement('div');
            popup.className = 'combo';
            popup.textContent = `${combo} COMBO!`;
            popup.style.position = 'absolute';
            popup.style.top = '50%';
            popup.style.left = '50%';
            popup.style.transform = 'translate(-50%, -50%)';
            gameArea.appendChild(popup);

            setTimeout(() => {
                popup.remove();
            }, 500);
        }

        function endGame() {
            clearInterval(gameInterval);
            clearTimeout(targetTimeout);

            finalScoreEl.textContent = score;

            gameScreen.classList.add('hidden');
            endScreen.classList.remove('hidden');
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        target.addEventListener('click', hitTarget);
        target.addEventListener('touchstart', (e) => {
            e.preventDefault();
            hitTarget();
        });

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });
    </script>
</body>
</html>
