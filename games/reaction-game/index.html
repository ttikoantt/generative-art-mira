<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Reaction Time Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.1s;
        }

        .game-container.waiting {
            background: #ce2636;
        }

        .game-container.ready {
            background: #4bdb6a;
        }

        .game-container.too-early {
            background: #4a4a4a;
        }

        .content {
            text-align: center;
            color: white;
            padding: 20px;
        }

        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .message {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .sub-message {
            font-size: 18px;
            opacity: 0.8;
        }

        .result {
            font-size: 64px;
            font-weight: bold;
            margin: 20px 0;
        }

        .stats {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 20px;
            border-radius: 15px;
            font-size: 14px;
            z-index: 10;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 10;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .icon {
                font-size: 60px;
            }

            .message {
                font-size: 24px;
            }

            .result {
                font-size: 48px;
            }

            .stats {
                font-size: 12px;
                padding: 10px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="stats">
        <div>Best: <span id="best">-</span></div>
        <div>Average: <span id="average">-</span></div>
        <div>Attempts: <span id="attempts">0</span></div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <div class="game-container waiting" id="game">
        <div class="content">
            <div class="icon">⏱️</div>
            <div class="message">Tap to Start</div>
            <div class="sub-message">When the screen turns green, tap as fast as you can!</div>
        </div>
    </div>

    <script>
        const game = document.getElementById('game');
        const bestEl = document.getElementById('best');
        const averageEl = document.getElementById('average');
        const attemptsEl = document.getElementById('attempts');

        let state = 'idle'; // idle, waiting, ready, too-early, result
        let startTime = 0;
        let timeoutId = null;
        let results = [];
        let bestTime = null;

        function setState(newState, content = '') {
            state = newState;
            game.className = 'game-container ' + newState;

            if (content) {
                game.querySelector('.content').innerHTML = content;
            }
        }

        function startWaiting() {
            const delay = 2000 + Math.random() * 3000;
            timeoutId = setTimeout(() => {
                setState('ready', `
                    <div class="icon">⚡</div>
                    <div class="message">TAP NOW!</div>
                `);
                startTime = performance.now();
            }, delay);
        }

        function handleClick() {
            switch (state) {
                case 'idle':
                case 'result':
                    setState('waiting', `
                        <div class="icon">⏳</div>
                        <div class="message">Wait for green...</div>
                    `);
                    startWaiting();
                    break;

                case 'waiting':
                    clearTimeout(timeoutId);
                    setState('too-early', `
                        <div class="icon">😅</div>
                        <div class="message">Too Early!</div>
                        <div class="sub-message">Tap to try again</div>
                    `);
                    state = 'too-early';
                    break;

                case 'ready':
                    const reactionTime = Math.round(performance.now() - startTime);
                    results.push(reactionTime);

                    if (!bestTime || reactionTime < bestTime) {
                        bestTime = reactionTime;
                        bestEl.textContent = bestTime + 'ms';
                    }

                    const average = Math.round(results.reduce((a, b) => a + b, 0) / results.length);
                    averageEl.textContent = average + 'ms';
                    attemptsEl.textContent = results.length;

                    let comment = '';
                    if (reactionTime < 200) comment = '🔥 Incredible!';
                    else if (reactionTime < 250) comment = '⚡ Excellent!';
                    else if (reactionTime < 300) comment = '👍 Great!';
                    else if (reactionTime < 400) comment = '😊 Good!';
                    else comment = '🐢 Keep practicing!';

                    setState('result', `
                        <div class="icon">⏱️</div>
                        <div class="result">${reactionTime}ms</div>
                        <div class="message">${comment}</div>
                        <div class="sub-message">Tap to try again</div>
                    `);
                    break;

                case 'too-early':
                    setState('waiting', `
                        <div class="icon">⏳</div>
                        <div class="message">Wait for green...</div>
                    `);
                    startWaiting();
                    break;
            }
        }

        game.addEventListener('click', handleClick);
        game.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick();
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleClick();
            }
        });
    </script>
</body>
</html>
