<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe with AI | Games by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #667eea;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .difficulty-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .difficulty-btn {
            padding: 8px 16px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .difficulty-btn:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .difficulty-btn.active {
            background: #667eea;
            color: white;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .cell {
            width: 100px;
            height: 100px;
            background: #f8f9fa;
            border: none;
            border-radius: 12px;
            font-size: 2.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .cell:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.3);
        }

        .cell:disabled {
            cursor: not-allowed;
        }

        .cell.x {
            color: #e74c3c;
        }

        .cell.o {
            color: #3498db;
        }

        .status {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 20px 0;
            min-height: 30px;
            color: #333;
        }

        .status.win {
            color: #27ae60;
            font-size: 1.5rem;
        }

        .status.lose {
            color: #e74c3c;
            font-size: 1.5rem;
        }

        .status.draw {
            color: #f39c12;
            font-size: 1.5rem;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 15px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 12px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .reset-btn {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(102, 126, 234, 0.9);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 1000;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: #764ba2;
            transform: scale(1.05);
        }

        .turn-indicator {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
            font-size: 1rem;
            color: #666;
        }

        .turn-x {
            color: #e74c3c;
            font-weight: bold;
        }

        .turn-o {
            color: #3498db;
            font-weight: bold;
        }

        @media (max-width: 480px) {
            .game-container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .cell {
                width: 80px;
                height: 80px;
                font-size: 2rem;
            }

            .difficulty-selector {
                flex-wrap: wrap;
            }

            .difficulty-btn {
                font-size: 0.9rem;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全画面</button>

    <div class="game-container">
        <h1>⭕❌ Tic-Tac-Toe</h1>
        <p class="subtitle">AI対戦三目並べ</p>

        <div class="difficulty-selector">
            <button class="difficulty-btn" data-difficulty="easy" onclick="setDifficulty('easy')">簡単</button>
            <button class="difficulty-btn active" data-difficulty="medium" onclick="setDifficulty('medium')">普通</button>
            <button class="difficulty-btn" data-difficulty="hard" onclick="setDifficulty('hard')">難しい</button>
        </div>

        <div class="turn-indicator">
            あなたのターン: <span class="turn-x">❌</span>
        </div>

        <div class="board" id="board">
            <button class="cell" data-index="0"></button>
            <button class="cell" data-index="1"></button>
            <button class="cell" data-index="2"></button>
            <button class="cell" data-index="3"></button>
            <button class="cell" data-index="4"></button>
            <button class="cell" data-index="5"></button>
            <button class="cell" data-index="6"></button>
            <button class="cell" data-index="7"></button>
            <button class="cell" data-index="8"></button>
        </div>

        <div class="status" id="status"></div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">勝ち</div>
                <div class="stat-value" id="wins">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">負け</div>
                <div class="stat-value" id="losses">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">引き分け</div>
                <div class="stat-value" id="draws">0</div>
            </div>
        </div>

        <button class="reset-btn" onclick="resetGame()">🔄 新しいゲーム</button>
    </div>

    <script>
        // ゲーム状態
        let board = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'X';
        let gameActive = true;
        let difficulty = 'medium';
        let stats = { wins: 0, losses: 0, draws: 0 };

        // 勝利パターン
        const winPatterns = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // 横
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // 縦
            [0, 4, 8], [2, 4, 6] // 斜め
        ];

        // 難易度設定
        function setDifficulty(level) {
            difficulty = level;
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.difficulty === level) {
                    btn.classList.add('active');
                }
            });
            resetGame();
        }

        // セルクリック
        document.querySelectorAll('.cell').forEach(cell => {
            cell.addEventListener('click', () => {
                const index = cell.dataset.index;
                if (board[index] === '' && gameActive && currentPlayer === 'X') {
                    makeMove(index, 'X');
                    if (gameActive) {
                        setTimeout(aiMove, 500);
                    }
                }
            });
        });

        // 移動
        function makeMove(index, player) {
            board[index] = player;
            const cell = document.querySelector(`[data-index="${index}"]`);
            cell.textContent = player === 'X' ? '❌' : '⭕';
            cell.classList.add(player.toLowerCase());
            cell.disabled = true;

            const winner = checkWinner();
            if (winner) {
                gameActive = false;
                if (winner === 'X') {
                    document.getElementById('status').textContent = '🎉 あなたの勝ち！';
                    document.getElementById('status').className = 'status win';
                    stats.wins++;
                } else {
                    document.getElementById('status').textContent = '😢 AIの勝ち...';
                    document.getElementById('status').className = 'status lose';
                    stats.losses++;
                }
                updateStats();
            } else if (board.every(cell => cell !== '')) {
                gameActive = false;
                document.getElementById('status').textContent = '🤝 引き分け！';
                document.getElementById('status').className = 'status draw';
                stats.draws++;
                updateStats();
            } else {
                currentPlayer = player === 'X' ? 'O' : 'X';
                updateTurnIndicator();
            }
        }

        // AIの移動
        function aiMove() {
            if (!gameActive) return;

            let move;

            switch (difficulty) {
                case 'easy':
                    move = getRandomMove();
                    break;
                case 'medium':
                    move = Math.random() < 0.7 ? getBestMove() : getRandomMove();
                    break;
                case 'hard':
                    move = getBestMove();
                    break;
            }

            if (move !== -1) {
                makeMove(move, 'O');
            }
        }

        // ランダム移動（簡単モード）
        function getRandomMove() {
            const availableMoves = board.map((cell, index) => cell === '' ? index : -1).filter(i => i !== -1);
            return availableMoves[Math.floor(Math.random() * availableMoves.length)];
        }

        // 最適な移動（ミニマックスアルゴリズム）
        function getBestMove() {
            let bestScore = -Infinity;
            let bestMove = -1;

            for (let i = 0; i < 9; i++) {
                if (board[i] === '') {
                    board[i] = 'O';
                    const score = minimax(board, 0, false);
                    board[i] = '';
                    if (score > bestScore) {
                        bestScore = score;
                        bestMove = i;
                    }
                }
            }

            return bestMove;
        }

        // ミニマックスアルゴリズム
        function minimax(board, depth, isMaximizing) {
            const winner = checkWinner();
            if (winner === 'O') return 10 - depth;
            if (winner === 'X') return depth - 10;
            if (board.every(cell => cell !== '')) return 0;

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] === '') {
                        board[i] = 'O';
                        const score = minimax(board, depth + 1, false);
                        board[i] = '';
                        bestScore = Math.max(score, bestScore);
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] === '') {
                        board[i] = 'X';
                        const score = minimax(board, depth + 1, true);
                        board[i] = '';
                        bestScore = Math.min(score, bestScore);
                    }
                }
                return bestScore;
            }
        }

        // 勝利チェック
        function checkWinner() {
            for (const pattern of winPatterns) {
                const [a, b, c] = pattern;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    return board[a];
                }
            }
            return null;
        }

        // ターンインジケーター更新
        function updateTurnIndicator() {
            const indicator = document.querySelector('.turn-indicator');
            if (currentPlayer === 'X') {
                indicator.innerHTML = 'あなたのターン: <span class="turn-x">❌</span>';
            } else {
                indicator.innerHTML = 'AIのターン: <span class="turn-o">⭕</span>';
            }
        }

        // 統計更新
        function updateStats() {
            document.getElementById('wins').textContent = stats.wins;
            document.getElementById('losses').textContent = stats.losses;
            document.getElementById('draws').textContent = stats.draws;
        }

        // ゲームリセット
        function resetGame() {
            board = ['', '', '', '', '', '', '', '', ''];
            currentPlayer = 'X';
            gameActive = true;
            document.getElementById('status').textContent = '';
            document.getElementById('status').className = 'status';
            updateTurnIndicator();

            document.querySelectorAll('.cell').forEach(cell => {
                cell.textContent = '';
                cell.classList.remove('x', 'o');
                cell.disabled = false;
            });
        }

        // 全画面トグル
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        updateTurnIndicator();
    </script>
</body>
</html>
