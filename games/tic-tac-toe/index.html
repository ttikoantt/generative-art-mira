<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe | Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 1rem;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            color: #fff;
            font-size: clamp(2rem, 5vw, 3rem);
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(79, 172, 254, 0.8);
        }

        .game-info {
            color: #4facfe;
            font-size: clamp(1rem, 2vw, 1.3rem);
            margin-bottom: 1.5rem;
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .score {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            border: 2px solid rgba(79, 172, 254, 0.3);
        }

        .score span {
            color: #fff;
            font-weight: bold;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 400px;
            margin: 0 auto 1.5rem;
            touch-action: none;
        }

        .cell {
            width: clamp(80px, 20vw, 120px);
            height: clamp(80px, 20vw, 120px);
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid rgba(79, 172, 254, 0.5);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .cell:hover:not(.taken) {
            background: rgba(79, 172, 254, 0.2);
            transform: scale(1.05);
        }

        .cell.taken {
            cursor: not-allowed;
        }

        .cell.x {
            color: #4facfe;
            text-shadow: 0 0 10px rgba(79, 172, 254, 0.8);
        }

        .cell.o {
            color: #ff6b9d;
            text-shadow: 0 0 10px rgba(255, 107, 157, 0.8);
        }

        .cell.winning {
            animation: pulse 0.5s ease-in-out infinite;
            background: rgba(255, 255, 255, 0.2);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
        }

        .btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            font-size: clamp(0.9rem, 2vw, 1rem);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-fullscreen {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .message {
            color: #fff;
            font-size: clamp(1rem, 2vw, 1.3rem);
            margin-top: 1rem;
            min-height: 2rem;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .info {
            color: rgba(255, 255, 255, 0.6);
            font-size: clamp(0.8rem, 1.5vw, 0.9rem);
            margin-top: 1rem;
        }

        .difficulty {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .difficulty-btn {
            padding: 0.5rem 1rem;
            border: 2px solid rgba(79, 172, 254, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .difficulty-btn.active {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border-color: #4facfe;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⭕❌ Tic Tac Toe</h1>
        <div class="game-info">
            <div class="score">You (X): <span id="playerScore">0</span></div>
            <div class="score">AI (O): <span id="aiScore">0</span></div>
        </div>
        <div class="difficulty">
            <button class="difficulty-btn" onclick="setDifficulty('easy')">Easy</button>
            <button class="difficulty-btn active" onclick="setDifficulty('medium')">Medium</button>
            <button class="difficulty-btn" onclick="setDifficulty('hard')">Hard</button>
        </div>
        <div class="board" id="board"></div>
        <div class="message" id="message"></div>
        <div class="controls">
            <button class="btn" onclick="resetGame()">New Game</button>
            <button class="btn btn-fullscreen" onclick="toggleFullscreen()">Fullscreen</button>
        </div>
        <p class="info">先攻でAIと対戦！勝てるかな？</p>
    </div>

    <script>
        const board = document.getElementById('board');
        const message = document.getElementById('message');
        const playerScoreEl = document.getElementById('playerScore');
        const aiScoreEl = document.getElementById('aiScore');

        let gameState = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'X';
        let gameActive = true;
        let playerScore = 0;
        let aiScore = 0;
        let difficulty = 'medium';

        const winPatterns = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        function initBoard() {
            board.innerHTML = '';
            gameState.forEach((cell, index) => {
                const cellElement = document.createElement('div');
                cellElement.classList.add('cell');
                cellElement.dataset.index = index;
                cellElement.addEventListener('click', handleCellClick);
                board.appendChild(cellElement);
            });
        }

        function handleCellClick(e) {
            const index = e.target.dataset.index;

            if (gameState[index] !== '' || !gameActive || currentPlayer !== 'X') {
                return;
            }

            makeMove(index, 'X');

            if (gameActive) {
                currentPlayer = 'O';
                message.textContent = 'AI thinking...';
                setTimeout(aiMove, 500);
            }
        }

        function makeMove(index, player) {
            gameState[index] = player;
            const cell = board.children[index];
            cell.textContent = player;
            cell.classList.add('taken', player.toLowerCase());

            if (checkWin(player)) {
                gameActive = false;
                highlightWinningCells(player);
                if (player === 'X') {
                    playerScore++;
                    playerScoreEl.textContent = playerScore;
                    message.textContent = '🎉 You Win!';
                } else {
                    aiScore++;
                    aiScoreEl.textContent = aiScore;
                    message.textContent = '😢 AI Wins!';
                }
                return;
            }

            if (gameState.every(cell => cell !== '')) {
                gameActive = false;
                message.textContent = '🤝 Draw!';
                return;
            }

            currentPlayer = player === 'X' ? 'O' : 'X';
            if (currentPlayer === 'X') {
                message.textContent = 'Your turn!';
            }
        }

        function checkWin(player) {
            return winPatterns.some(pattern => {
                return pattern.every(index => gameState[index] === player);
            });
        }

        function highlightWinningCells(player) {
            winPatterns.forEach(pattern => {
                if (pattern.every(index => gameState[index] === player)) {
                    pattern.forEach(index => {
                        board.children[index].classList.add('winning');
                    });
                }
            });
        }

        function aiMove() {
            if (!gameActive) return;

            let move;

            switch (difficulty) {
                case 'easy':
                    move = getRandomMove();
                    break;
                case 'medium':
                    move = Math.random() < 0.7 ? getBestMove() : getRandomMove();
                    break;
                case 'hard':
                    move = getBestMove();
                    break;
            }

            makeMove(move, 'O');
        }

        function getRandomMove() {
            const availableMoves = gameState
                .map((cell, index) => cell === '' ? index : null)
                .filter(index => index !== null);
            return availableMoves[Math.floor(Math.random() * availableMoves.length)];
        }

        function getBestMove() {
            let bestScore = -Infinity;
            let bestMove;

            for (let i = 0; i < 9; i++) {
                if (gameState[i] === '') {
                    gameState[i] = 'O';
                    const score = minimax(gameState, 0, false);
                    gameState[i] = '';
                    if (score > bestScore) {
                        bestScore = score;
                        bestMove = i;
                    }
                }
            }

            return bestMove;
        }

        function minimax(state, depth, isMaximizing) {
            if (checkWinState(state, 'O')) return 10 - depth;
            if (checkWinState(state, 'X')) return depth - 10;
            if (state.every(cell => cell !== '')) return 0;

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (state[i] === '') {
                        state[i] = 'O';
                        const score = minimax(state, depth + 1, false);
                        state[i] = '';
                        bestScore = Math.max(score, bestScore);
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (state[i] === '') {
                        state[i] = 'X';
                        const score = minimax(state, depth + 1, true);
                        state[i] = '';
                        bestScore = Math.min(score, bestScore);
                    }
                }
                return bestScore;
            }
        }

        function checkWinState(state, player) {
            return winPatterns.some(pattern => {
                return pattern.every(index => state[index] === player);
            });
        }

        function resetGame() {
            gameState = ['', '', '', '', '', '', '', '', ''];
            currentPlayer = 'X';
            gameActive = true;
            message.textContent = 'Your turn!';
            initBoard();
        }

        function setDifficulty(level) {
            difficulty = level;
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            resetGame();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        initBoard();
        message.textContent = 'Your turn!';
    </script>
</body>
</html>
