<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe | Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
        }

        .game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .status {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-align: center;
            min-height: 30px;
        }

        .status .winner {
            color: #4ade80;
            font-weight: 600;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .cell {
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .cell:hover:not(.taken) {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
        }

        .cell.taken {
            cursor: not-allowed;
        }

        .cell.x {
            color: #f472b6;
            text-shadow: 0 0 20px rgba(244, 114, 182, 0.5);
        }

        .cell.o {
            color: #60a5fa;
            text-shadow: 0 0 20px rgba(96, 165, 250, 0.5);
        }

        .cell.winning {
            background: rgba(74, 222, 128, 0.2);
            border-color: #4ade80;
            animation: winning 0.5s ease;
        }

        @keyframes winning {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .buttons {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .score {
            margin-top: 20px;
            display: flex;
            gap: 30px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .score-value {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .score-x .score-value {
            color: #f472b6;
        }

        .score-o .score-value {
            color: #60a5fa;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        @media (max-width: 400px) {
            .cell {
                width: 70px;
                height: 70px;
                font-size: 2.2rem;
            }

            .header h1 {
                font-size: 1.2rem;
            }

            .status {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⭕ Tic-Tac-Toe ❌</h1>
        <p>三目並べ - 3つ並べよう！</p>
    </div>

    <div class="game-container">
        <div class="status" id="status">❌ の番です</div>

        <div class="board" id="board"></div>

        <div class="score">
            <div class="score-item score-x">
                <span>❌ 勝ち</span>
                <span class="score-value" id="scoreX">0</span>
            </div>
            <div class="score-item">
                <span>引き分け</span>
                <span class="score-value" id="scoreDraw">0</span>
            </div>
            <div class="score-item score-o">
                <span>⭕ 勝ち</span>
                <span class="score-value" id="scoreO">0</span>
            </div>
        </div>

        <div class="buttons">
            <button class="btn" onclick="resetGame()">🔄 もう一度</button>
            <button class="btn" onclick="resetScore()">📊 スコアリセット</button>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <script>
        const board = document.getElementById('board');
        const status = document.getElementById('status');

        let cells = [];
        let currentPlayer = 'X';
        let gameActive = true;
        let scores = { X: 0, O: 0, draw: 0 };

        const winningCombinations = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // 横
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // 縦
            [0, 4, 8], [2, 4, 6]              // 斜め
        ];

        // 初期化
        function init() {
            board.innerHTML = '';
            cells = [];
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.addEventListener('click', () => handleCellClick(i));
                board.appendChild(cell);
                cells.push(cell);
            }
        }

        // セルクリック
        function handleCellClick(index) {
            if (!gameActive || cells[index].classList.contains('taken')) return;

            cells[index].textContent = currentPlayer;
            cells[index].classList.add('taken', currentPlayer.toLowerCase());

            if (checkWin()) {
                gameActive = false;
                status.innerHTML = `🎉 <span class="winner">${currentPlayer} の勝ち！</span>`;
                scores[currentPlayer]++;
                updateScores();
                highlightWinningCells();
                return;
            }

            if (checkDraw()) {
                gameActive = false;
                status.textContent = '🤝 引き分け！';
                scores.draw++;
                updateScores();
                return;
            }

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            status.textContent = `${currentPlayer === 'X' ? '❌' : '⭕'} の番です`;
        }

        // 勝利判定
        function checkWin() {
            return winningCombinations.some(combination => {
                return combination.every(index => {
                    return cells[index].classList.contains(currentPlayer.toLowerCase());
                });
            });
        }

        // 引き分け判定
        function checkDraw() {
            return Array.from(cells).every(cell => cell.classList.contains('taken'));
        }

        // 勝利セルをハイライト
        function highlightWinningCells() {
            winningCombinations.forEach(combination => {
                if (combination.every(index => {
                    return cells[index].classList.contains(currentPlayer.toLowerCase());
                })) {
                    combination.forEach(index => {
                        cells[index].classList.add('winning');
                    });
                }
            });
        }

        // スコア更新
        function updateScores() {
            document.getElementById('scoreX').textContent = scores.X;
            document.getElementById('scoreO').textContent = scores.O;
            document.getElementById('scoreDraw').textContent = scores.draw;
        }

        // ゲームリセット
        function resetGame() {
            init();
            currentPlayer = 'X';
            gameActive = true;
            status.textContent = '❌ の番です';
        }

        // スコアリセット
        function resetScore() {
            scores = { X: 0, O: 0, draw: 0 };
            updateScores();
            resetGame();
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化実行
        init();
    </script>
</body>
</html>
