<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tap Rhythm Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            touch-action: manipulation;
            overflow: hidden;
        }

        .game-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            color: white;
        }

        .score, .combo, .high-score {
            text-align: center;
        }

        .label {
            font-size: 12px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .value {
            font-size: 32px;
            font-weight: bold;
            margin-top: 5px;
        }

        .combo .value {
            color: #ffd700;
            font-size: 48px;
        }

        .high-score {
            font-size: 14px;
            opacity: 0.6;
        }

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .target-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border: 3px solid rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: transform 0.1s;
        }

        .target-circle.shrink {
            transform: scale(0.3);
        }

        .inner-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd700 0%, #ff6b6b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .tap-text {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .feedback {
            position: absolute;
            font-size: 48px;
            font-weight: bold;
            animation: feedback 0.5s ease-out forwards;
            pointer-events: none;
        }

        @keyframes feedback {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px) scale(1.5);
            }
        }

        .perfect { color: #ffd700; }
        .great { color: #4ecdc4; }
        .good { color: #95e1d3; }
        .miss { color: #ff6b6b; }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-tap {
            background: linear-gradient(135deg, #ffd700 0%, #ff6b6b 100%);
            color: white;
            font-size: 20px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
        }

        .btn-tap:active {
            transform: scale(0.95);
            box-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
        }

        .btn-fullscreen {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 15px 20px;
        }

        .btn-fullscreen:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .start-screen, .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
        }

        .game-over-screen {
            display: none;
        }

        .title {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ffd700 0%, #ff6b6b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 30px;
        }

        .final-score {
            font-size: 64px;
            font-weight: bold;
            margin: 20px 0;
        }

        .stats {
            display: flex;
            gap: 30px;
            margin: 20px 0;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            margin-top: 5px;
        }

        .instructions {
            font-size: 14px;
            opacity: 0.7;
            margin-top: 30px;
            text-align: center;
            line-height: 1.6;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="score">
                <div class="label">Score</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="combo">
                <div class="value" id="combo">0</div>
            </div>
            <div class="high-score">
                <div class="label">Best</div>
                <div class="value" id="highScore">0</div>
            </div>
        </div>

        <div class="game-area">
            <div class="target-circle" id="targetCircle">
                <div class="inner-circle">
                    <div class="tap-text">TAP!</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-fullscreen" onclick="toggleFullscreen()">全画面</button>
            <button class="btn btn-tap" id="tapBtn">TAP!</button>
        </div>
    </div>

    <div class="start-screen" id="startScreen">
        <div class="title">TAP RHYTHM</div>
        <div class="subtitle">リズムに合わせてタップ！</div>
        <button class="btn btn-tap" onclick="startGame()">START</button>
        <div class="instructions">
            円が縮むタイミングでタップ！<br>
            完璧なタイミングで高得点を目指そう
        </div>
    </div>

    <div class="game-over-screen" id="gameOverScreen">
        <div class="title">GAME OVER</div>
        <div class="final-score" id="finalScore">0</div>
        <div class="stats">
            <div class="stat">
                <div class="stat-label">Perfect</div>
                <div class="stat-value" id="perfectCount">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Great</div>
                <div class="stat-value" id="greatCount">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Miss</div>
                <div class="stat-value" id="missCount">0</div>
            </div>
        </div>
        <button class="btn btn-tap" onclick="startGame()">RETRY</button>
    </div>

    <script>
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let highScore = parseInt(localStorage.getItem('tapRhythmHighScore')) || 0;
        let perfectCount = 0;
        let greatCount = 0;
        let goodCount = 0;
        let missCount = 0;

        let isPlaying = false;
        let startTime = 0;
        let lastTapTime = 0;

        const elements = {
            score: document.getElementById('score'),
            combo: document.getElementById('combo'),
            highScore: document.getElementById('highScore'),
            targetCircle: document.getElementById('targetCircle'),
            tapBtn: document.getElementById('tapBtn'),
            startScreen: document.getElementById('startScreen'),
            gameOverScreen: document.getElementById('gameOverScreen'),
            finalScore: document.getElementById('finalScore'),
            perfectCount: document.getElementById('perfectCount'),
            greatCount: document.getElementById('greatCount'),
            missCount: document.getElementById('missCount')
        };

        elements.highScore.textContent = highScore;

        function startGame() {
            score = 0;
            combo = 0;
            maxCombo = 0;
            perfectCount = 0;
            greatCount = 0;
            goodCount = 0;
            missCount = 0;
            isPlaying = true;
            startTime = Date.now();
            lastTapTime = startTime;

            updateUI();
            elements.startScreen.classList.add('hidden');
            elements.gameOverScreen.classList.add('hidden');
            elements.gameOverScreen.style.display = 'none';

            startRhythm();
        }

        function startRhythm() {
            if (!isPlaying) return;

            // 縮むアニメーション
            elements.targetCircle.classList.remove('shrink');
            setTimeout(() => {
                elements.targetCircle.classList.add('shrink');
            }, 10);

            // 次のサイクル
            const interval = 1500 - Math.min(score / 10, 500); // 徐々に速く
            setTimeout(startRhythm, interval);
        }

        function handleTap() {
            if (!isPlaying) return;

            const now = Date.now();
            const timeSinceLastTap = now - lastTapTime;
            lastTapTime = now;

            // 縮んでいる最中かどうかを判定（簡易版：一定時間内）
            const cycleTime = timeSinceLastTap < 1500 ? timeSinceLastTap : 0;
            const optimalTime = 300; // 縮み始めから300ms後がベスト（簡易判定）

            const diff = Math.abs(cycleTime - optimalTime);

            let feedbackText = '';
            let feedbackClass = '';
            let points = 0;

            if (diff < 50) {
                feedbackText = 'PERFECT!';
                feedbackClass = 'perfect';
                points = 100;
                perfectCount++;
                combo++;
            } else if (diff < 100) {
                feedbackText = 'GREAT!';
                feedbackClass = 'great';
                points = 50;
                greatCount++;
                combo++;
            } else if (diff < 200) {
                feedbackText = 'GOOD';
                feedbackClass = 'good';
                points = 20;
                goodCount++;
                combo++;
            } else {
                feedbackText = 'MISS';
                feedbackClass = 'miss';
                points = 0;
                missCount++;
                combo = 0;
            }

            if (combo > maxCombo) {
                maxCombo = combo;
            }

            // コンボボーナス
            const comboBonus = Math.floor(combo / 5) * 10;
            points += comboBonus;

            score += points;
            updateUI();
            showFeedback(feedbackText, feedbackClass);

            // ゲームオーバー判定
            if (missCount >= 5) {
                endGame();
            }
        }

        function showFeedback(text, className) {
            const feedback = document.createElement('div');
            feedback.className = `feedback ${className}`;
            feedback.textContent = text;
            elements.targetCircle.parentElement.appendChild(feedback);

            setTimeout(() => {
                feedback.remove();
            }, 500);
        }

        function updateUI() {
            elements.score.textContent = score;
            elements.combo.textContent = combo;
        }

        function endGame() {
            isPlaying = false;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('tapRhythmHighScore', highScore);
                elements.highScore.textContent = highScore;
            }

            elements.finalScore.textContent = score;
            elements.perfectCount.textContent = perfectCount;
            elements.greatCount.textContent = greatCount;
            elements.missCount.textContent = missCount;

            elements.gameOverScreen.style.display = 'flex';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        elements.tapBtn.addEventListener('click', handleTap);
        elements.tapBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleTap();
        });

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && isPlaying) {
                e.preventDefault();
                handleTap();
            }
        });
    </script>
</body>
</html>
