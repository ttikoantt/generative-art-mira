<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dot Reaction Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .score {
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(78, 205, 196, 0.8);
        }

        .timer {
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .timer.warning {
            color: #ff6b6b;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .game-area {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dot {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 0 30px rgba(78, 205, 196, 0.6);
            animation: appear 0.3s ease-out;
        }

        .dot:active {
            transform: scale(0.9);
        }

        @keyframes appear {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h1 {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.8;
            max-width: 400px;
        }

        .final-score {
            font-size: 72px;
            font-weight: bold;
            margin: 20px 0;
            color: #4ecdc4;
            text-shadow: 0 0 30px rgba(78, 205, 196, 0.6);
        }

        .btn {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            border: none;
            color: white;
            padding: 15px 50px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 20px rgba(78, 205, 196, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(78, 205, 196, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 50;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .combo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #ffeaa7;
            text-shadow: 0 0 30px rgba(255, 234, 167, 0.8);
            pointer-events: none;
            opacity: 0;
            z-index: 50;
        }

        .combo.show {
            animation: comboShow 0.5s ease-out;
        }

        @keyframes comboShow {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="timer" id="timer">30</div>
        </div>

        <div class="game-area" id="gameArea"></div>

        <div class="combo" id="combo"></div>
    </div>

    <div class="overlay" id="startOverlay">
        <h1>Dot Reaction</h1>
        <p>Tap the dots as fast as you can! Build combos for bonus points.</p>
        <button class="btn" onclick="startGame()">Start Game</button>
    </div>

    <div class="overlay hidden" id="endOverlay">
        <h1>Time's Up!</h1>
        <div class="final-score" id="finalScore">0</div>
        <p id="finalMessage">Great job!</p>
        <button class="btn" onclick="startGame()">Play Again</button>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        let score = 0;
        let timeLeft = 30;
        let gameInterval;
        let spawnInterval;
        let combo = 0;
        let lastClickTime = 0;
        let activeDot = null;
        const gameArea = document.getElementById('gameArea');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const startOverlay = document.getElementById('startOverlay');
        const endOverlay = document.getElementById('endOverlay');
        const finalScoreEl = document.getElementById('finalScore');
        const finalMessageEl = document.getElementById('finalMessage');
        const comboEl = document.getElementById('combo');

        const colors = [
            'linear-gradient(135deg, #ff6b6b, #ee5a5a)',
            'linear-gradient(135deg, #4ecdc4, #44a08d)',
            'linear-gradient(135deg, #45b7d1, #2d7fb8)',
            'linear-gradient(135deg, #96ceb4, #7db39b)',
            'linear-gradient(135deg, #ffeaa7, #fdcb6e)',
            'linear-gradient(135deg, #a29bfe, #6c5ce7)',
            'linear-gradient(135deg, #fd79a8, #e84393)',
            'linear-gradient(135deg, #00b894, #00a085)'
        ];

        function startGame() {
            score = 0;
            timeLeft = 30;
            combo = 0;
            scoreEl.textContent = '0';
            timerEl.textContent = '30';
            timerEl.classList.remove('warning');

            startOverlay.classList.add('hidden');
            endOverlay.classList.add('hidden');

            gameArea.innerHTML = '';

            spawnDot();

            gameInterval = setInterval(() => {
                timeLeft--;
                timerEl.textContent = timeLeft;

                if (timeLeft <= 5) {
                    timerEl.classList.add('warning');
                }

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function spawnDot() {
            if (activeDot) {
                activeDot.remove();
            }

            const dot = document.createElement('div');
            dot.className = 'dot';

            const maxX = window.innerWidth - 100;
            const maxY = window.innerHeight - 200;
            const x = Math.random() * maxX + 50;
            const y = Math.random() * maxY + 100;

            dot.style.left = x + 'px';
            dot.style.top = y + 'px';
            dot.style.background = colors[Math.floor(Math.random() * colors.length)];

            dot.addEventListener('click', handleDotClick);
            dot.addEventListener('touchstart', handleDotClick);

            gameArea.appendChild(dot);
            activeDot = dot;

            spawnInterval = setTimeout(spawnDot, Math.max(800, 2000 - score * 10));
        }

        function handleDotClick(e) {
            e.preventDefault();
            e.stopPropagation();

            const now = Date.now();
            const timeDiff = now - lastClickTime;

            if (timeDiff < 1000) {
                combo++;
            } else {
                combo = 1;
            }
            lastClickTime = now;

            let points = 10;
            if (combo >= 3) {
                points = 15;
                showCombo(combo);
            } else if (combo >= 5) {
                points = 20;
                showCombo(combo);
            } else if (combo >= 10) {
                points = 30;
                showCombo(combo);
            }

            score += points;
            scoreEl.textContent = score;

            clearTimeout(spawnInterval);
            spawnDot();
        }

        function showCombo(count) {
            comboEl.textContent = `Combo x${count}!`;
            comboEl.classList.remove('show');
            void comboEl.offsetWidth;
            comboEl.classList.add('show');
        }

        function endGame() {
            clearInterval(gameInterval);
            clearTimeout(spawnInterval);

            if (activeDot) {
                activeDot.remove();
                activeDot = null;
            }

            finalScoreEl.textContent = score;

            if (score < 100) {
                finalMessageEl.textContent = 'Keep practicing! 💪';
            } else if (score < 200) {
                finalMessageEl.textContent = 'Nice work! 👍';
            } else if (score < 350) {
                finalMessageEl.textContent = 'Great job! 🎉';
            } else {
                finalMessageEl.textContent = 'Amazing! 🏆';
            }

            endOverlay.classList.remove('hidden');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
