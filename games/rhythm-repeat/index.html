<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Repeat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a0033 0%, #330066 50%, #1a0033 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            position: relative;
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 10s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .container {
            text-align: center;
            z-index: 1;
            padding: 20px;
        }

        h1 {
            color: #ffffff;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
        }

        .stats {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem 2rem;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-label {
            color: #ff66ff;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .stat-value {
            color: #ffffff;
            font-size: 2rem;
            font-weight: bold;
        }

        .game-area {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .message {
            color: #ffffff;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .rhythm-display {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .rhythm-dot {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .rhythm-dot.active {
            background: #ff00ff;
            box-shadow: 0 0 30px #ff00ff;
            transform: scale(1.2);
        }

        .rhythm-dot.success {
            background: #00ff00;
            box-shadow: 0 0 30px #00ff00;
        }

        .rhythm-dot.error {
            background: #ff0000;
            box-shadow: 0 0 30px #ff0000;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            max-width: 300px;
            margin: 0 auto;
        }

        .pad {
            aspect-ratio: 1;
            border-radius: 15px;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .pad:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .pad-0 { background: linear-gradient(135deg, #ff0066, #ff0099); color: white; }
        .pad-1 { background: linear-gradient(135deg, #0066ff, #0099ff); color: white; }
        .pad-2 { background: linear-gradient(135deg, #ffcc00, #ff9900); color: white; }
        .pad-3 { background: linear-gradient(135deg, #00ff66, #00ff99); color: white; }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
        }

        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 200;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .game-over.show {
            display: flex;
        }

        .game-over h2 {
            color: #ff0066;
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .game-over p {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 2rem;
        }

        .restart-btn {
            background: #ff00ff;
            border: none;
            color: white;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .restart-btn:hover {
            background: #ff00aa;
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .rhythm-dot {
                width: 50px;
                height: 50px;
            }

            .controls {
                max-width: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🎵 Rhythm Repeat</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">Level</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
        </div>

        <div class="game-area">
            <div class="message" id="message">Tap Start to Play!</div>

            <div class="rhythm-display" id="rhythmDisplay">
                <div class="rhythm-dot"></div>
                <div class="rhythm-dot"></div>
                <div class="rhythm-dot"></div>
                <div class="rhythm-dot"></div>
            </div>

            <div class="controls" id="controls" style="display: none;">
                <button class="pad pad-0" onclick="handleInput(0)">0</button>
                <button class="pad pad-1" onclick="handleInput(1)">1</button>
                <button class="pad pad-2" onclick="handleInput(2)">2</button>
                <button class="pad pad-3" onclick="handleInput(3)">3</button>
            </div>

            <button id="startBtn" onclick="startGame()" style="
                background: linear-gradient(135deg, #ff00ff, #ff00aa);
                border: none;
                color: white;
                padding: 1rem 2rem;
                font-size: 1.2rem;
                border-radius: 25px;
                cursor: pointer;
                margin-top: 1rem;
                box-shadow: 0 5px 15px rgba(255, 0, 255, 0.3);
            ">▶ Start Game</button>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>Game Over!</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button class="restart-btn" onclick="restartGame()">Play Again</button>
    </div>

    <script>
        // Particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.width = Math.random() * 10 + 5 + 'px';
            particle.style.height = particle.style.width;
            particle.style.animationDelay = Math.random() * 10 + 's';
            particle.style.animationDuration = Math.random() * 10 + 10 + 's';
            particlesContainer.appendChild(particle);
        }

        // Audio Context
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
        }

        function playNote(frequency, duration = 0.2) {
            if (!audioCtx) return;

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.frequency.value = frequency;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + duration);
        }

        const frequencies = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5

        // Game State
        let sequence = [];
        let playerInput = [];
        let level = 1;
        let score = 0;
        let isPlaying = false;
        let isShowingSequence = false;

        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');
        const messageEl = document.getElementById('message');
        const rhythmDisplay = document.getElementById('rhythmDisplay');
        const controls = document.getElementById('controls');
        const startBtn = document.getElementById('startBtn');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');

        function startGame() {
            initAudio();
            sequence = [];
            playerInput = [];
            level = 1;
            score = 0;
            isPlaying = true;

            levelEl.textContent = level;
            scoreEl.textContent = score;
            messageEl.textContent = 'Watch the rhythm...';
            controls.style.display = 'grid';
            startBtn.style.display = 'none';

            addToSequence();
        }

        function addToSequence() {
            const newBeat = Math.floor(Math.random() * 4);
            sequence.push(newBeat);
            showSequence();
        }

        function showSequence() {
            isShowingSequence = true;
            playerInput = [];

            let i = 0;
            const interval = setInterval(() => {
                if (i >= sequence.length) {
                    clearInterval(interval);
                    isShowingSequence = false;
                    messageEl.textContent = 'Your turn!';
                    return;
                }

                highlightDot(sequence[i]);
                playNote(frequencies[sequence[i]]);
                i++;
            }, 600);
        }

        function highlightDot(index) {
            const dots = rhythmDisplay.querySelectorAll('.rhythm-dot');
            dots.forEach((dot, i) => {
                if (i === index) {
                    dot.classList.add('active');
                    setTimeout(() => dot.classList.remove('active'), 400);
                }
            });
        }

        function handleInput(padIndex) {
            if (!isPlaying || isShowingSequence) return;

            playNote(frequencies[padIndex]);
            playerInput.push(padIndex);

            const currentIndex = playerInput.length - 1;

            if (playerInput[currentIndex] !== sequence[currentIndex]) {
                gameOver();
                return;
            }

            if (playerInput.length === sequence.length) {
                score += level * 10;
                scoreEl.textContent = score;
                level++;
                levelEl.textContent = level;
                messageEl.textContent = 'Great! Next level...';

                setTimeout(() => {
                    addToSequence();
                }, 1000);
            }
        }

        function gameOver() {
            isPlaying = false;
            finalScoreEl.textContent = score;
            gameOverEl.classList.add('show');
        }

        function restartGame() {
            gameOverEl.classList.remove('show');
            startGame();
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!isPlaying || isShowingSequence) return;

            const keyMap = { 'q': 0, 'w': 1, 'a': 2, 's': 3 };
            if (keyMap.hasOwnProperty(e.key.toLowerCase())) {
                handleInput(keyMap[e.key.toLowerCase()]);
            }
        });

        // Fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
