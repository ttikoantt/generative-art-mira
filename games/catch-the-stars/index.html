<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch the Stars</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #0a0a2e, #1a1a4e);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        #gameCanvas {
            display: block;
        }

        .game-ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .stats {
            color: #fff;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .fullscreen-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            color: #fff;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 100, 0.8);
        }

        .overlay p {
            font-size: 18px;
            margin-bottom: 30px;
            color: #ddd;
        }

        .overlay .score-display {
            font-size: 36px;
            margin-bottom: 30px;
            color: #ffd700;
        }

        .overlay button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .overlay button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        @media (max-width: 768px) {
            .stats {
                font-size: 14px;
            }

            .overlay h1 {
                font-size: 32px;
            }

            .overlay p {
                font-size: 14px;
            }

            .overlay .score-display {
                font-size: 28px;
            }

            .overlay button {
                padding: 12px 30px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="game-ui">
        <div class="stats">
            <div>⭐ スコア: <span id="score">0</span></div>
            <div>⏱️ 残り時間: <span id="time">30</span>秒</div>
        </div>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="overlay" id="startOverlay">
        <h1>⭐ Catch the Stars</h1>
        <p>星空から降ってくる星をキャッチしよう！<br>左右キーまたはタップで動かして、30秒以内に星を集めよう！</p>
        <button onclick="startGame()">スタート</button>
    </div>

    <div class="overlay hidden" id="gameOverlay">
        <h1>🎉 ゲームオーバー！</h1>
        <div class="score-display">スコア: <span id="finalScore">0</span></div>
        <p id="rank"></p>
        <button onclick="startGame()">もう一度遊ぶ</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // ゲーム状態
        let score = 0;
        let timeLeft = 30;
        let gameRunning = false;
        let gameTimer;
        let spawnTimer;

        // プレイヤー
        const player = {
            x: width / 2,
            y: height - 100,
            width: 80,
            height: 60,
            speed: 8,
            direction: 0
        };

        // 星
        let stars = [];

        // キー入力
        const keys = {
            left: false,
            right: false
        };

        function createStar() {
            const size = 20 + Math.random() * 15;
            return {
                x: Math.random() * (width - size * 2) + size,
                y: -size,
                size: size,
                speed: 2 + Math.random() * 3,
                rotation: Math.random() * Math.PI * 2,
                rotationSpeed: (Math.random() - 0.5) * 0.1,
                points: Math.floor(size / 10)
            };
        }

        function drawStar(star) {
            ctx.save();
            ctx.translate(star.x, star.y);
            ctx.rotate(star.rotation);
            
            // 星の光
            ctx.shadowColor = '#ffd700';
            ctx.shadowBlur = 15;
            
            // 星を描画
            ctx.beginPath();
            const spikes = 5;
            const outerRadius = star.size;
            const innerRadius = star.size * 0.4;
            
            for (let i = 0; i < spikes * 2; i++) {
                const radius = i % 2 === 0 ? outerRadius : innerRadius;
                const angle = (i / (spikes * 2)) * Math.PI * 2 - Math.PI / 2;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            
            ctx.closePath();
            ctx.fillStyle = '#ffd700';
            ctx.fill();
            ctx.strokeStyle = '#ffed4a';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.restore();
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // カゴを描画
            ctx.shadowColor = 'rgba(255, 255, 255, 0.5)';
            ctx.shadowBlur = 10;
            
            // カゴの外枠
            ctx.beginPath();
            ctx.moveTo(-player.width / 2, 0);
            ctx.lineTo(-player.width / 2, player.height);
            ctx.lineTo(player.width / 2, player.height);
            ctx.lineTo(player.width / 2, 0);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // カゴの柄
            for (let i = 0; i <= 4; i++) {
                const x = -player.width / 2 + (i / 4) * player.width;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, player.height);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
            
            ctx.restore();
        }

        function update() {
            if (!gameRunning) return;

            // プレイヤーの移動
            if (keys.left && player.x > player.width / 2) {
                player.x -= player.speed;
            }
            if (keys.right && player.x < width - player.width / 2) {
                player.x += player.speed;
            }

            // 星の更新
            for (let i = stars.length - 1; i >= 0; i--) {
                const star = stars[i];
                star.y += star.speed;
                star.rotation += star.rotationSpeed;

                // キャッチ判定
                if (star.y + star.size > player.y &&
                    star.y - star.size < player.y + player.height &&
                    star.x + star.size > player.x - player.width / 2 &&
                    star.x - star.size < player.x + player.width / 2) {
                    
                    score += star.points;
                    document.getElementById('score').textContent = score;
                    stars.splice(i, 1);
                    
                    // キャッチエフェクト
                    createCatchEffect(star.x, star.y);
                    continue;
                }

                // 画面外に出た星を削除
                if (star.y > height + star.size) {
                    stars.splice(i, 1);
                }
            }
        }

        function createCatchEffect(x, y) {
            const particles = [];
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 1
                });
            }
            
            function updateParticles() {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= 0.02;
                    
                    if (p.life <= 0) {
                        particles.splice(i, 1);
                    }
                }
                
                if (particles.length > 0) {
                    requestAnimationFrame(updateParticles);
                }
            }
            
            updateParticles();
        }

        function draw() {
            // 背景をクリア
            ctx.clearRect(0, 0, width, height);

            // 星を描画
            stars.forEach(star => drawStar(star));

            // プレイヤーを描画
            drawPlayer();

            requestAnimationFrame(draw);
        }

        function gameLoop() {
            update();
            draw();
            
            if (gameRunning) {
                requestAnimationFrame(gameLoop);
            }
        }

        function spawnStar() {
            if (gameRunning) {
                stars.push(createStar());
            }
        }

        function startGame() {
            // リセット
            score = 0;
            timeLeft = 30;
            stars = [];
            gameRunning = true;
            
            document.getElementById('score').textContent = score;
            document.getElementById('time').textContent = timeLeft;
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverlay').classList.add('hidden');

            // タイマー開始
            gameTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('time').textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // 星スポーン
            spawnTimer = setInterval(spawnStar, 500);

            // ゲームループ開始
            gameLoop();
        }

        function endGame() {
            gameRunning = false;
            clearInterval(gameTimer);
            clearInterval(spawnTimer);

            document.getElementById('finalScore').textContent = score;
            
            // ランク判定
            let rank = '';
            if (score >= 100) {
                rank = '🏆 星の伝説！';
            } else if (score >= 70) {
                rank = '🌟 星の達人！';
            } else if (score >= 40) {
                rank = '⭐ 星の愛好家！';
            } else {
                rank = '✨ まだ修行中...';
            }
            document.getElementById('rank').textContent = rank;

            document.getElementById('gameOverlay').classList.remove('hidden');
        }

        // キー入力イベント
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
        });

        // タッチイベント
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touchX = e.touches[0].clientX;
            if (touchX < width / 2) {
                keys.left = true;
                keys.right = false;
            } else {
                keys.right = true;
                keys.left = false;
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            keys.left = false;
            keys.right = false;
        }, { passive: false });

        // リサイズイベント
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            player.y = height - 100;
        });

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期描画
        draw();
    </script>
</body>
</html>
