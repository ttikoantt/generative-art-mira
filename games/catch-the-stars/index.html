<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Catch the Stars</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: none;
        }
        #gameCanvas {
            display: block;
            touch-action: none;
        }
        .ui {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            z-index: 100;
            pointer-events: none;
        }
        .score {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            display: none;
            z-index: 200;
            backdrop-filter: blur(10px);
        }
        .game-over h2 {
            font-size: 36px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .game-over p {
            font-size: 24px;
            margin-bottom: 20px;
        }
        .game-over button {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .game-over button:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }
        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 300;
            text-align: center;
        }
        .start-screen h1 {
            font-size: 42px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ffd93d, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .start-screen p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.8;
        }
        .start-screen button {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 20px 50px;
            font-size: 24px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .start-screen button:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="ui">
        <div class="score">⭐ <span id="score">0</span></div>
        <div>⏱️ <span id="timer">60</span>s</div>
    </div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="start-screen" id="startScreen">
        <h1>⭐ Catch the Stars ⭐</h1>
        <p>タップして星をキャッチ！<br>60秒で何個キャッチできる？</p>
        <button onclick="startGame()">スタート</button>
    </div>

    <div class="game-over" id="gameOver">
        <h2>🎉 ゲーム終了！</h2>
        <p>スコア: <span id="finalScore">0</span> ⭐</p>
        <button onclick="restartGame()">もう一度</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let stars = [];
        let score = 0;
        let timeLeft = 60;
        let gameRunning = false;
        let gameTimer;
        let spawnTimer;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Star {
            constructor() {
                this.size = Math.random() * 30 + 20;
                this.x = Math.random() * (width - this.size * 2) + this.size;
                this.y = Math.random() * (height - this.size * 2) + this.size;
                this.speedX = (Math.random() - 0.5) * 4;
                this.speedY = (Math.random() - 0.5) * 4;
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.hue = Math.random() * 60 + 30; // Yellow-orange range
                this.alpha = 0;
                this.fadeIn = true;
                this.life = 0;
                this.maxLife = 180 + Math.random() * 120; // 3-5 seconds
                this.points = Math.floor(this.size);
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.rotation += this.rotationSpeed;
                this.life++;

                // Bounce off edges
                if (this.x < this.size || this.x > width - this.size) {
                    this.speedX *= -1;
                }
                if (this.y < this.size || this.y > height - this.size) {
                    this.speedY *= -1;
                }

                // Fade in/out
                if (this.fadeIn) {
                    this.alpha += 0.05;
                    if (this.alpha >= 1) {
                        this.alpha = 1;
                        this.fadeIn = false;
                    }
                } else if (this.life > this.maxLife - 30) {
                    this.alpha -= 0.033;
                }

                return this.alpha > 0;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // Glow effect
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 70%, ${this.alpha})`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 100%, 50%, ${this.alpha * 0.5})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 100%, 50%, 0)`);

                ctx.beginPath();
                ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Star shape
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
                    const x = Math.cos(angle) * (this.size * 0.7);
                    const y = Math.sin(angle) * (this.size * 0.7);
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.closePath();
                ctx.fillStyle = `hsla(${this.hue}, 100%, 80%, ${this.alpha})`;
                ctx.fill();

                ctx.restore();
            }

            isClicked(x, y) {
                const dx = x - this.x;
                const dy = y - this.y;
                return Math.sqrt(dx * dx + dy * dy) < this.size;
            }
        }

        function spawnStar() {
            if (!gameRunning) return;
            stars.push(new Star());
        }

        function drawBackground() {
            // Gradient background
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#0f0c29');
            gradient.addColorStop(0.5, '#302b63');
            gradient.addColorStop(1, '#24243e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // Stars in background
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            for (let i = 0; i < 50; i++) {
                const x = (i * 137) % width;
                const y = (i * 251) % height;
                const size = (i % 3) + 1;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createExplosion(x, y, hue) {
            // Visual feedback
            const ripple = document.createElement('div');
            ripple.style.cssText = `
                position: fixed;
                left: ${x}px;
                top: ${y}px;
                width: 10px;
                height: 10px;
                border: 3px solid hsla(${hue}, 100%, 70%, 0.8);
                border-radius: 50%;
                transform: translate(-50%, -50%);
                animation: ripple 0.5s ease-out forwards;
                pointer-events: none;
                z-index: 1000;
            `;
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 500);
        }

        function handleInput(x, y) {
            if (!gameRunning) return;

            for (let i = stars.length - 1; i >= 0; i--) {
                if (stars[i].isClicked(x, y)) {
                    score += stars[i].points;
                    document.getElementById('score').textContent = score;
                    createExplosion(stars[i].x, stars[i].y, stars[i].hue);
                    stars.splice(i, 1);
                    break;
                }
            }
        }

        function update() {
            if (!gameRunning) return;

            drawBackground();

            stars = stars.filter(star => {
                const alive = star.update();
                if (alive) star.draw();
                return alive;
            });

            requestAnimationFrame(update);
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';

            score = 0;
            timeLeft = 60;
            stars = [];
            gameRunning = true;

            document.getElementById('score').textContent = score;
            document.getElementById('timer').textContent = timeLeft;

            // Spawn stars
            spawnTimer = setInterval(spawnStar, 500);

            // Game timer
            gameTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // Initial stars
            for (let i = 0; i < 5; i++) {
                spawnStar();
            }

            update();
        }

        function endGame() {
            gameRunning = false;
            clearInterval(gameTimer);
            clearInterval(spawnTimer);

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }

        function restartGame() {
            startGame();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Event listeners
        window.addEventListener('resize', resize);

        canvas.addEventListener('click', (e) => {
            handleInput(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleInput(touch.clientX, touch.clientY);
        });

        // Add ripple animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                0% {
                    width: 10px;
                    height: 10px;
                    opacity: 1;
                }
                100% {
                    width: 100px;
                    height: 100px;
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // Initialize
        resize();
    </script>
</body>
</html>
