<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Math Speed - Quick Calculation Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .score-display {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .score-item {
            text-align: center;
        }

        .score-item .label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
        }

        .score-item .value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }

        .problem-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
        }

        .problem-display .problem {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .problem-display .timer {
            font-size: 16px;
            opacity: 0.8;
        }

        .answer-input {
            width: 100%;
            padding: 15px;
            font-size: 24px;
            border: 3px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            font-family: 'Segoe UI', sans-serif;
        }

        .answer-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .start-screen, .game-over-screen {
            text-align: center;
        }

        .start-screen h2, .game-over-screen h2 {
            color: #333;
            margin-bottom: 15px;
        }

        .start-screen p, .game-over-screen p {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .stats {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .stats-row:last-child {
            border-bottom: none;
        }

        .feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .feedback.correct {
            color: #4caf50;
        }

        .feedback.wrong {
            color: #f44336;
        }

        .feedback.show {
            opacity: 1;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <div class="container">
        <div class="game-header">
            <h1>Math Speed</h1>
        </div>

        <div class="start-screen" id="startScreen">
            <h2>Ready?</h2>
            <p>計算問題を素早く解いてハイスコアを目指そう！<br>制限時間は60秒</p>
            <button class="btn" onclick="startGame()">Start Game</button>
        </div>

        <div id="gameScreen" style="display: none;">
            <div class="score-display">
                <div class="score-item">
                    <div class="label">Score</div>
                    <div class="value" id="score">0</div>
                </div>
                <div class="score-item">
                    <div class="label">Time</div>
                    <div class="value" id="time">60</div>
                </div>
            </div>

            <div class="problem-display">
                <div class="problem" id="problem">5 + 3 = ?</div>
                <div class="timer">残り時間: <span id="timer">60</span>秒</div>
            </div>

            <input type="number" class="answer-input" id="answerInput" placeholder="答えを入力" autofocus>
            <button class="btn" onclick="checkAnswer()">Submit</button>
        </div>

        <div class="game-over-screen" id="gameOverScreen" style="display: none;">
            <h2>Game Over!</h2>
            <div class="stats">
                <div class="stats-row">
                    <span>スコア</span>
                    <strong id="finalScore">0</strong>
                </div>
                <div class="stats-row">
                    <span>正解数</span>
                    <strong id="correctCount">0</strong>
                </div>
                <div class="stats-row">
                    <span>連続正解</span>
                    <strong id="maxCombo">0</strong>
                </div>
                <div class="stats-row">
                    <span>平均時間</span>
                    <strong id="avgTime">0.0秒</strong>
                </div>
            </div>
            <button class="btn" onclick="startGame()">Play Again</button>
        </div>
    </div>

    <div class="feedback" id="feedback"></div>

    <script>
        let score = 0;
        let timeLeft = 60;
        let correctCount = 0;
        let maxCombo = 0;
        let currentCombo = 0;
        let currentAnswer = 0;
        let gameTimer = null;
        let problemStartTime = 0;
        let totalTime = 0;

        function startGame() {
            score = 0;
            timeLeft = 60;
            correctCount = 0;
            maxCombo = 0;
            currentCombo = 0;
            totalTime = 0;

            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';

            updateDisplay();
            generateProblem();

            gameTimer = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            document.getElementById('answerInput').focus();
        }

        function generateProblem() {
            const operations = ['+', '-', '×'];
            const op = operations[Math.floor(Math.random() * operations.length)];

            let a, b;
            switch (op) {
                case '+':
                    a = Math.floor(Math.random() * 20) + 1;
                    b = Math.floor(Math.random() * 20) + 1;
                    currentAnswer = a + b;
                    break;
                case '-':
                    a = Math.floor(Math.random() * 20) + 10;
                    b = Math.floor(Math.random() * a);
                    currentAnswer = a - b;
                    break;
                case '×':
                    a = Math.floor(Math.random() * 10) + 1;
                    b = Math.floor(Math.random() * 10) + 1;
                    currentAnswer = a * b;
                    break;
            }

            document.getElementById('problem').textContent = `${a} ${op} ${b} = ?`;
            document.getElementById('answerInput').value = '';
            problemStartTime = Date.now();
        }

        function checkAnswer() {
            const userAnswer = parseInt(document.getElementById('answerInput').value);
            const elapsed = (Date.now() - problemStartTime) / 1000;

            if (userAnswer === currentAnswer) {
                correctCount++;
                currentCombo++;
                totalTime += elapsed;

                // 速いほど高得点
                const timeBonus = Math.max(0, Math.floor((5 - elapsed) * 10));
                const comboBonus = currentCombo * 5;
                score += 100 + timeBonus + comboBonus;

                if (currentCombo > maxCombo) {
                    maxCombo = currentCombo;
                }

                showFeedback('correct');
            } else {
                currentCombo = 0;
                showFeedback('wrong');
            }

            updateDisplay();
            generateProblem();
            document.getElementById('answerInput').focus();
        }

        function showFeedback(type) {
            const feedback = document.getElementById('feedback');
            feedback.textContent = type === 'correct' ? '⭕' : '❌';
            feedback.className = `feedback ${type} show`;

            setTimeout(() => {
                feedback.className = 'feedback';
            }, 500);
        }

        function updateDisplay() {
            document.getElementById('score').textContent = score;
            document.getElementById('time').textContent = timeLeft;
            document.getElementById('timer').textContent = timeLeft;
        }

        function endGame() {
            clearInterval(gameTimer);

            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'block';

            document.getElementById('finalScore').textContent = score;
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('maxCombo').textContent = maxCombo;
            document.getElementById('avgTime').textContent =
                correctCount > 0 ? (totalTime / correctCount).toFixed(2) + '秒' : '0秒';
        }

        // Enter keyで送信
        document.getElementById('answerInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
