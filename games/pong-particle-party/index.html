<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Particle Party</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .score-board {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 60px;
            color: white;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .score {
            text-align: center;
        }

        .score-label {
            font-size: 14px;
            opacity: 0.6;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .combo-display {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.5);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .combo-display.show {
            opacity: 1;
        }

        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }

        .start-screen.hidden {
            display: none;
        }

        .start-screen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .start-screen p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .controls {
            margin-top: 30px;
            font-size: 14px;
            opacity: 0.6;
            text-align: center;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="score-board">
            <div class="score">
                <div class="score-label">Player</div>
                <div id="playerScore">0</div>
            </div>
            <div class="score">
                <div class="score-label">CPU</div>
                <div id="cpuScore">0</div>
            </div>
        </div>

        <div class="combo-display" id="comboDisplay">
            <span id="comboText">COMBO x1</span>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div class="start-screen" id="startScreen">
            <h1>🏓 Pong Particle Party</h1>
            <p>パドルを動かしてボールを打ち返せ！</p>
            <button class="start-btn" id="startBtn">START</button>
            <div class="controls">
                <p>マウス/タッチでパドルを操作</p>
                <p>連続で打ち返すとコンボ発生！</p>
            </div>
        </div>

        <button class="fullscreen-btn" id="fullscreenBtn">⛶ Fullscreen</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const startBtn = document.getElementById('startBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let width, height;
        let gameRunning = false;
        let playerScore = 0;
        let cpuScore = 0;
        let combo = 0;
        let showCombo = false;
        let comboTimeout = null;

        // Game objects
        const paddleWidth = 12;
        const paddleHeight = 100;
        const ballSize = 12;

        let player = { x: 0, y: 0, targetY: 0 };
        let cpu = { x: 0, y: 0, speed: 5 };
        let ball = { x: 0, y: 0, vx: 0, vy: 0, speed: 7 };
        let particles = [];

        function resize() {
            const maxWidth = 800;
            const maxHeight = 600;

            width = Math.min(window.innerWidth - 40, maxWidth);
            height = Math.min(window.innerHeight - 40, maxHeight);

            canvas.width = width;
            canvas.height = height;

            // Position paddles
            player.x = 30;
            player.y = height / 2;
            player.targetY = player.y;

            cpu.x = width - 30 - paddleWidth;
            cpu.y = height / 2;

            // Reset ball if game not running
            if (!gameRunning) {
                resetBall();
            }
        }

        function resetBall() {
            ball.x = width / 2;
            ball.y = height / 2;
            ball.speed = 7;
            const angle = (Math.random() * Math.PI / 3) - Math.PI / 6;
            const direction = Math.random() > 0.5 ? 1 : -1;
            ball.vx = Math.cos(angle) * ball.speed * direction;
            ball.vy = Math.sin(angle) * ball.speed;
        }

        function createParticles(x, y, color, count = 15) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1,
                    color: color,
                    size: Math.random() * 4 + 2
                });
            }
        }

        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1; // Gravity
                p.life -= 0.02;
                return p.life > 0;
            });
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function update() {
            // Move player paddle
            const dy = player.targetY - player.y;
            player.y += dy * 0.15;
            player.y = Math.max(paddleHeight / 2, Math.min(height - paddleHeight / 2, player.y));

            // CPU AI
            const targetY = ball.y;
            const cpuDy = targetY - cpu.y;
            cpu.y += Math.sign(cpuDy) * Math.min(Math.abs(cpuDy), cpu.speed);
            cpu.y = Math.max(paddleHeight / 2, Math.min(height - paddleHeight / 2, cpu.y));

            // Move ball
            ball.x += ball.vx;
            ball.y += ball.vy;

            // Ball collision with top/bottom
            if (ball.y - ballSize / 2 < 0 || ball.y + ballSize / 2 > height) {
                ball.vy *= -1;
                ball.y = ball.y < ballSize / 2 ? ballSize / 2 : height - ballSize / 2;
            }

            // Ball collision with paddles
            // Player paddle
            if (ball.x - ballSize / 2 < player.x + paddleWidth &&
                ball.x + ballSize / 2 > player.x &&
                ball.y > player.y - paddleHeight / 2 &&
                ball.y < player.y + paddleHeight / 2) {

                if (ball.vx < 0) {
                    const hitY = (ball.y - player.y) / (paddleHeight / 2);
                    const angle = hitY * Math.PI / 3;
                    ball.vx = Math.cos(angle) * ball.speed;
                    ball.vy = Math.sin(angle) * ball.speed;
                    ball.speed = Math.min(ball.speed + 0.3, 15);

                    combo++;
                    showComboDisplay();

                    // Create particles
                    createParticles(ball.x, ball.y, '#667eea', 20 + combo * 2);
                }
            }

            // CPU paddle
            if (ball.x + ballSize / 2 > cpu.x &&
                ball.x - ballSize / 2 < cpu.x + paddleWidth &&
                ball.y > cpu.y - paddleHeight / 2 &&
                ball.y < cpu.y + paddleHeight / 2) {

                if (ball.vx > 0) {
                    const hitY = (ball.y - cpu.y) / (paddleHeight / 2);
                    const angle = hitY * Math.PI / 3;
                    ball.vx = -Math.cos(angle) * ball.speed;
                    ball.vy = Math.sin(angle) * ball.speed;
                    ball.speed = Math.min(ball.speed + 0.3, 15);

                    // Create particles
                    createParticles(ball.x, ball.y, '#764ba2', 15);
                }
            }

            // Scoring
            if (ball.x < 0) {
                cpuScore++;
                document.getElementById('cpuScore').textContent = cpuScore;
                combo = 0;
                hideComboDisplay();
                createParticles(0, ball.y, '#ff4757', 30);
                resetBall();
            }

            if (ball.x > width) {
                playerScore++;
                document.getElementById('playerScore').textContent = playerScore;
                createParticles(width, ball.y, '#2ed573', 30);
                resetBall();
            }

            // Update particles
            updateParticles();
        }

        function showComboDisplay() {
            if (combo > 1) {
                document.getElementById('comboText').textContent = `COMBO x${combo}`;
                document.getElementById('comboDisplay').classList.add('show');

                if (comboTimeout) clearTimeout(comboTimeout);
                comboTimeout = setTimeout(hideComboDisplay, 2000);
            }
        }

        function hideComboDisplay() {
            document.getElementById('comboDisplay').classList.remove('show');
        }

        function draw() {
            // Clear
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, width, height);

            // Draw center line
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(width / 2, 0);
            ctx.lineTo(width / 2, height);
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw particles
            drawParticles();

            // Draw paddles with glow
            // Player paddle
            ctx.shadowColor = '#667eea';
            ctx.shadowBlur = 20;
            ctx.fillStyle = '#667eea';
            ctx.fillRect(player.x, player.y - paddleHeight / 2, paddleWidth, paddleHeight);

            // CPU paddle
            ctx.shadowColor = '#764ba2';
            ctx.fillStyle = '#764ba2';
            ctx.fillRect(cpu.x, cpu.y - paddleHeight / 2, paddleWidth, paddleHeight);

            ctx.shadowBlur = 0;

            // Draw ball with glow
            ctx.shadowColor = '#ffd700';
            ctx.shadowBlur = 20;
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ballSize / 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function gameLoop() {
            if (!gameRunning) return;

            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            playerScore = 0;
            cpuScore = 0;
            combo = 0;
            document.getElementById('playerScore').textContent = '0';
            document.getElementById('cpuScore').textContent = '0';
            hideComboDisplay();
            particles = [];

            resetBall();
            gameRunning = true;
            startScreen.classList.add('hidden');
            gameLoop();
        }

        // Event listeners
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            player.targetY = e.clientY - rect.top;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            player.targetY = e.touches[0].clientY - rect.top;
        }, { passive: false });

        startBtn.addEventListener('click', startGame);

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Initialize
        resize();
        draw();
    </script>
</body>
</html>
