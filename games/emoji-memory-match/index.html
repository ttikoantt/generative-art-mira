<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Memory Match</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            color: #fff;
            font-size: 16px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            opacity: 0.7;
            font-size: 12px;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #00d4ff;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 400px;
            margin-bottom: 20px;
        }

        .card {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            cursor: pointer;
            transition: transform 0.3s, opacity 0.3s;
            user-select: none;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card.flipped {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            transform: rotateY(180deg);
        }

        .card.matched {
            opacity: 0.5;
            pointer-events: none;
        }

        .card-content {
            display: none;
        }

        .card.flipped .card-content {
            display: block;
        }

        .btn {
            padding: 15px 40px;
            font-size: 18px;
            background: linear-gradient(135deg, #00d4ff 0%, #005bea 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            margin: 5px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.5);
        }

        #fullscreenBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            cursor: pointer;
            z-index: 100;
        }

        #fullscreenBtn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 480px) {
            .game-board {
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
                max-width: 320px;
            }

            .card {
                width: 65px;
                height: 65px;
                font-size: 28px;
            }

            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <button id="fullscreenBtn">⛶ 全画面</button>

    <h1>🎮 Emoji Memory Match</h1>

    <div class="stats">
        <div class="stat">
            <div class="stat-label">Moves</div>
            <div class="stat-value" id="moves">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Matches</div>
            <div class="stat-value" id="matches">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Best</div>
            <div class="stat-value" id="best">-</div>
        </div>
    </div>

    <div class="game-board" id="gameBoard"></div>

    <button class="btn" id="restartBtn">🔄 リスタート</button>

    <script>
        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const matchesDisplay = document.getElementById('matches');
        const bestDisplay = document.getElementById('best');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        const emojis = ['🍎', '🍊', '🍋', '🍇', '🍓', '🍒', '🥝', '🍑'];

        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let canFlip = true;

        // ベストスコアを読み込む
        let bestScore = localStorage.getItem('emojiMemoryBest') || null;
        if (bestScore) {
            bestDisplay.textContent = bestScore;
        }

        // カードを初期化
        function initCards() {
            // カードのペアを作成
            const cardPairs = [...emojis, ...emojis];
            // シャッフル
            for (let i = cardPairs.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cardPairs[i], cardPairs[j]] = [cardPairs[j], cardPairs[i]];
            }

            // カードを作成
            cards = cardPairs.map((emoji, index) => ({
                id: index,
                emoji: emoji,
                flipped: false,
                matched: false
            }));

            renderBoard();
        }

        // ボードを描画
        function renderBoard() {
            gameBoard.innerHTML = '';
            cards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.className = 'card';
                if (card.flipped) cardElement.classList.add('flipped');
                if (card.matched) cardElement.classList.add('matched');

                const content = document.createElement('div');
                content.className = 'card-content';
                content.textContent = card.emoji;
                cardElement.appendChild(content);

                cardElement.addEventListener('click', () => flipCard(card));
                gameBoard.appendChild(cardElement);
            });
        }

        // カードをめくる
        function flipCard(card) {
            if (!canFlip || card.flipped || card.matched) return;

            card.flipped = true;
            flippedCards.push(card);
            renderBoard();

            if (flippedCards.length === 2) {
                moves++;
                movesDisplay.textContent = moves;
                checkMatch();
            }
        }

        // マッチチェック
        function checkMatch() {
            canFlip = false;
            const [card1, card2] = flippedCards;

            if (card1.emoji === card2.emoji) {
                // マッチ！
                card1.matched = true;
                card2.matched = true;
                matchedPairs++;
                matchesDisplay.textContent = matchedPairs;
                flippedCards = [];
                canFlip = true;

                // ゲームクリアチェック
                if (matchedPairs === emojis.length) {
                    setTimeout(() => {
                        if (!bestScore || moves < bestScore) {
                            bestScore = moves;
                            localStorage.setItem('emojiMemoryBest', bestScore);
                            bestDisplay.textContent = bestScore;
                            alert(`🎉 新記録！ ${moves}手でクリア！`);
                        } else {
                            alert(`🎉 クリア！ ${moves}手`);
                        }
                    }, 500);
                }
            } else {
                // マッチ失敗
                setTimeout(() => {
                    card1.flipped = false;
                    card2.flipped = false;
                    flippedCards = [];
                    canFlip = true;
                    renderBoard();
                }, 1000);
            }
        }

        // リスタート
        function restart() {
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            canFlip = true;
            movesDisplay.textContent = '0';
            matchesDisplay.textContent = '0';
            initCards();
        }

        // イベントリスナー
        restartBtn.addEventListener('click', restart);

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // ゲーム開始
        initCards();
    </script>
</body>
</html>
