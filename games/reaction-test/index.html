<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Test - 反射神経テスト</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            color: white;
            font-size: clamp(24px, 5vw, 36px);
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 20px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            color: white;
            flex: 1;
            max-width: 150px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: clamp(28px, 6vw, 42px);
            font-weight: bold;
        }

        .stat-unit {
            font-size: 14px;
            opacity: 0.8;
        }

        .game-area {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            max-width: 500px;
            margin: 0 auto 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }

        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: clamp(18px, 4vw, 28px);
            font-weight: bold;
            text-align: center;
            padding: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            width: 100%;
        }

        .target {
            position: absolute;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            display: none;
        }

        .target:active {
            transform: scale(0.9);
        }

        .target.show {
            display: block;
            animation: popIn 0.2s ease;
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 14px;
            z-index: 100;
        }

        .rounds-info {
            color: white;
            font-size: 14px;
            margin-top: 15px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <h1>⚡ 反射神経テスト</h1>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">平均反応時間</div>
                <div class="stat-value" id="avgTime">0</div>
                <div class="stat-unit">ms</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">ベスト</div>
                <div class="stat-value" id="bestTime">0</div>
                <div class="stat-unit">ms</div>
            </div>
        </div>

        <div class="game-area" id="gameArea">
            <div class="message" id="message">タップしてスタート</div>
            <div class="target" id="target"></div>
        </div>

        <div class="controls">
            <button onclick="startGame()">スタート</button>
            <button onclick="resetGame()">リセット</button>
        </div>

        <div class="rounds-info">
            ラウンド: <span id="roundCount">0</span> / 5
        </div>
    </div>

    <script>
        const gameArea = document.getElementById('gameArea');
        const target = document.getElementById('target');
        const message = document.getElementById('message');
        const avgTimeEl = document.getElementById('avgTime');
        const bestTimeEl = document.getElementById('bestTime');
        const roundCountEl = document.getElementById('roundCount');

        let gameState = 'idle'; // idle, waiting, active, finished
        let reactionTimes = [];
        let roundCount = 0;
        const totalRounds = 5;
        let startTime = 0;
        let timeoutId = null;

        // ゲーム開始
        function startGame() {
            if (gameState === 'waiting' || gameState === 'active') return;

            gameState = 'waiting';
            reactionTimes = [];
            roundCount = 0;
            updateStats();
            roundCountEl.textContent = roundCount;

            message.textContent = '準備...';
            target.classList.remove('show');

            const delay = Math.random() * 2000 + 1000; // 1-3秒

            timeoutId = setTimeout(() => {
                showTarget();
            }, delay);
        }

        // ターゲット表示
        function showTarget() {
            if (gameState !== 'waiting') return;

            gameState = 'active';
            startTime = performance.now();
            message.textContent = '';

            // ランダムな位置にターゲットを配置
            const areaRect = gameArea.getBoundingClientRect();
            const maxX = areaRect.width - 80;
            const maxY = areaRect.height - 80;

            const x = Math.random() * maxX;
            const y = Math.random() * maxY;

            target.style.left = x + 'px';
            target.style.top = y + 'px';
            target.classList.add('show');
        }

        // ターゲットクリック
        target.addEventListener('mousedown', handleTargetClick);
        target.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleTargetClick();
        });

        function handleTargetClick() {
            if (gameState !== 'active') return;

            const reactionTime = Math.round(performance.now() - startTime);
            reactionTimes.push(reactionTime);
            roundCount++;

            target.classList.remove('show');

            if (roundCount >= totalRounds) {
                endGame();
            } else {
                gameState = 'waiting';
                message.textContent = `${reactionTime}ms - 次のラウンド...`;
                roundCountEl.textContent = roundCount;
                updateStats();

                timeoutId = setTimeout(() => {
                    showTarget();
                }, Math.random() * 2000 + 1000);
            }
        }

        // 早期クリック（ゲームエリアをクリックした場合）
        gameArea.addEventListener('mousedown', (e) => {
            if (e.target === gameArea && gameState === 'waiting') {
                clearTimeout(timeoutId);
                gameState = 'idle';
                message.textContent = '早すぎます！もう一度タップ';
            }
        });

        // ゲーム終了
        function endGame() {
            gameState = 'finished';
            updateStats();

            const avg = Math.round(reactionTimes.reduce((a, b) => a + b) / reactionTimes.length);
            const best = Math.min(...reactionTimes);

            message.textContent = `完了！平均: ${avg}ms / ベスト: ${best}ms`;
        }

        // 統計更新
        function updateStats() {
            if (reactionTimes.length === 0) {
                avgTimeEl.textContent = '0';
                bestTimeEl.textContent = '0';
                return;
            }

            const avg = Math.round(reactionTimes.reduce((a, b) => a + b) / reactionTimes.length);
            const best = Math.min(...reactionTimes);

            avgTimeEl.textContent = avg;
            bestTimeEl.textContent = best;
        }

        // リセット
        function resetGame() {
            clearTimeout(timeoutId);
            gameState = 'idle';
            reactionTimes = [];
            roundCount = 0;
            updateStats();
            roundCountEl.textContent = '0';
            message.textContent = 'タップしてスタート';
            target.classList.remove('show');
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
