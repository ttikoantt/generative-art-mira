<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Tap Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        #game {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }
        .score-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            text-align: center;
            min-width: 120px;
        }
        .score-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .score-value {
            font-size: 36px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        #message h1 {
            font-size: 48px;
            color: white;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }
        #message p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
        }
        #startScreen, #gameOverScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #startScreen h1, #gameOverScreen h1 {
            font-size: 42px;
            color: white;
            margin-bottom: 30px;
            text-shadow: 0 4px 20px rgba(102, 126, 234, 0.5);
        }
        #startScreen p, #gameOverScreen p {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 40px;
        }
        .btn {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            pointer-events: auto;
        }
        .btn:hover, .btn:active {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.6);
        }
        #finalScore {
            font-size: 64px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 20px 0;
        }
        #fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 10px;
            color: #667eea;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
        }
        #fullscreen:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.3);
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>

    <div id="ui" class="hidden">
        <div class="score-box">
            <div class="score-label">Score</div>
            <div class="score-value" id="score">0</div>
        </div>
        <div class="score-box">
            <div class="score-label">Time</div>
            <div class="score-value" id="timer">30</div>
        </div>
    </div>

    <div id="message"></div>

    <div id="startScreen">
        <h1>⚡ Speed Tap Challenge</h1>
        <p>現れるターゲットをできるだけ速くタップ！<br>30秒間で何個タップできるかチャレンジ</p>
        <button class="btn" id="startBtn">スタート</button>
    </div>

    <div id="gameOverScreen" class="hidden">
        <h1>🎮 ゲーム終了</h1>
        <p>あなたのスコア</p>
        <div id="finalScore">0</div>
        <p style="margin-top: 20px; color: #ffd700;">🏆 ハイスコア: <span id="highScore">0</span></p>
        <button class="btn" id="restartBtn">もう一度</button>
    </div>

    <button id="fullscreen">全画面</button>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreEl = document.getElementById('finalScore');
        const highScoreEl = document.getElementById('highScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const ui = document.getElementById('ui');
        const fullscreenBtn = document.getElementById('fullscreen');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // ゲーム状態
        let gameState = {
            score: 0,
            highScore: parseInt(localStorage.getItem('speedTapHighScore')) || 0,
            timeLeft: 30,
            isPlaying: false,
            target: null,
            targetRadius: 50,
            lastSpawnTime: 0
        };

        // ターゲットを生成
        function spawnTarget() {
            const padding = gameState.targetRadius + 20;
            gameState.target = {
                x: padding + Math.random() * (width - padding * 2),
                y: padding + Math.random() * (height - padding * 2),
                radius: gameState.targetRadius,
                spawnTime: Date.now()
            };
        }

        // ターゲットを描画
        function drawTarget() {
            if (!gameState.target) return;

            const age = Date.now() - gameState.target.spawnTime;
            const maxAge = 2000; // 2秒で消える
            const life = 1 - Math.min(age / maxAge, 1);

            if (life <= 0) {
                gameState.target = null;
                spawnTarget();
                return;
            }

            const gradient = ctx.createRadialGradient(
                gameState.target.x, gameState.target.y, 0,
                gameState.target.x, gameState.target.y, gameState.target.radius * life
            );
            gradient.addColorStop(0, `rgba(255, 255, 255, ${life})`);
            gradient.addColorStop(0.3, `rgba(102, 126, 234, ${life * 0.8})`);
            gradient.addColorStop(1, `rgba(118, 75, 162, 0)`);

            ctx.beginPath();
            ctx.arc(gameState.target.x, gameState.target.y, gameState.target.radius * life, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();

            // 外側の光
            ctx.beginPath();
            ctx.arc(gameState.target.x, gameState.target.y, gameState.target.radius * 1.2 * life, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255, 255, 255, ${life * 0.3})`;
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        // ゲーム開始
        function startGame() {
            gameState.score = 0;
            gameState.timeLeft = 30;
            gameState.isPlaying = true;
            gameState.target = null;

            scoreEl.textContent = '0';
            timerEl.textContent = '30';

            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            ui.classList.remove('hidden');

            spawnTarget();

            // タイマー
            const timerInterval = setInterval(() => {
                if (!gameState.isPlaying) {
                    clearInterval(timerInterval);
                    return;
                }

                gameState.timeLeft--;
                timerEl.textContent = gameState.timeLeft;

                if (gameState.timeLeft <= 0) {
                    endGame();
                    clearInterval(timerInterval);
                }
            }, 1000);
        }

        // ゲーム終了
        function endGame() {
            gameState.isPlaying = false;
            gameState.target = null;

            // ハイスコア更新
            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
                localStorage.setItem('speedTapHighScore', gameState.highScore);
            }

            finalScoreEl.textContent = gameState.score;
            highScoreEl.textContent = gameState.highScore;

            ui.classList.add('hidden');
            gameOverScreen.classList.remove('hidden');
        }

        // クリック/タップ処理
        function handleClick(x, y) {
            if (!gameState.isPlaying || !gameState.target) return;

            const dx = x - gameState.target.x;
            const dy = y - gameState.target.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < gameState.target.radius) {
                // ヒット！
                gameState.score++;
                scoreEl.textContent = gameState.score;

                // エフェクト
                createHitEffect(gameState.target.x, gameState.target.y);

                gameState.target = null;
                spawnTarget();
            }
        }

        // ヒットエフェクト
        let effects = [];

        function createHitEffect(x, y) {
            for (let i = 0; i < 10; i++) {
                effects.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1,
                    color: `hsl(${Math.random() * 60 + 250}, 100%, 60%)`
                });
            }
        }

        function updateEffects() {
            effects = effects.filter(e => e.life > 0);

            effects.forEach(e => {
                e.x += e.vx;
                e.y += e.vy;
                e.life -= 0.05;

                ctx.beginPath();
                ctx.arc(e.x, e.y, 5 * e.life, 0, Math.PI * 2);
                ctx.fillStyle = e.color.replace(')', `, ${e.life})`).replace('hsl', 'hsla');
                ctx.fill();
            });
        }

        // イベントリスナー
        canvas.addEventListener('click', (e) => {
            handleClick(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleClick(touch.clientX, touch.clientY);
        }, { passive: false });

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // アニメーションループ
        function animate() {
            // 背景をクリア
            ctx.fillStyle = 'rgba(0, 0, 0, 0)';
            ctx.fillRect(0, 0, width, height);

            if (gameState.isPlaying) {
                drawTarget();
                updateEffects();
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
