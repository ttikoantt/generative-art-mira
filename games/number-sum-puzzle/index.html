<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>数字合計パズル - Number Sum Puzzle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a1a3a 0%, #2a1a4a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        h1 {
            color: #fff;
            font-size: 24px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 10px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
            flex: 1;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
        }

        .target-display {
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .target-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-bottom: 10px;
        }

        .target-number {
            color: #ffd700;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .current-sum {
            color: rgba(255, 255, 255, 0.6);
            font-size: 18px;
            margin-top: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .cell:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .cell.selected {
            background: rgba(100, 200, 255, 0.4);
            border-color: #6ec6ff;
            box-shadow: 0 0 15px rgba(100, 200, 255, 0.5);
        }

        .cell.disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
        }

        .submit-btn {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
        }

        .submit-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
        }

        .clear-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .clear-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 30px;
            border-radius: 15px;
            font-size: 18px;
            z-index: 2000;
            display: none;
            text-align: center;
        }

        .message.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            z-index: 1500;
        }

        .overlay.show {
            display: block;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🔢 数字合計パズル</h1>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">ラウンド</div>
                <div class="stat-value" id="round">1/3</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
        </div>

        <div class="target-display">
            <div class="target-label">目標合計</div>
            <div class="target-number" id="target">50</div>
            <div class="current-sum">現在の合計: <span id="currentSum">0</span></div>
        </div>

        <div class="grid" id="grid"></div>

        <div class="buttons">
            <button class="clear-btn" onclick="clearSelection()">クリア</button>
            <button class="submit-btn" onclick="submitAnswer()">決定!</button>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="message" id="message"></div>

    <script>
        // ゲーム状態
        let round = 1;
        let maxRounds = 3;
        let score = 0;
        let target = 50;
        let grid = [];
        let selectedCells = [];
        let gridSize = 5;

        // 要素
        const gridElement = document.getElementById('grid');
        const targetElement = document.getElementById('target');
        const currentSumElement = document.getElementById('currentSum');
        const roundElement = document.getElementById('round');
        const scoreElement = document.getElementById('score');
        const messageElement = document.getElementById('message');
        const overlayElement = document.getElementById('overlay');

        // グリッドを初期化
        function initGrid() {
            grid = [];
            selectedCells = [];

            for (let i = 0; i < gridSize * gridSize; i++) {
                grid.push(Math.floor(Math.random() * 9) + 1);
            }

            renderGrid();
            updateCurrentSum();
        }

        // グリッドを描画
        function renderGrid() {
            gridElement.innerHTML = '';
            grid.forEach((num, index) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = num;
                cell.onclick = () => toggleCell(index);
                cell.id = `cell-${index}`;
                gridElement.appendChild(cell);
            });
        }

        // セルをトグル
        function toggleCell(index) {
            const cell = document.getElementById(`cell-${index}`);

            if (selectedCells.includes(index)) {
                // 隣接しているセルのみ選択解除可能
                const adjacentIndices = getAdjacentIndices(index);
                const hasAdjacentSelected = selectedCells.some(i =>
                    i !== index && adjacentIndices.includes(i)
                );

                if (hasAdjacentSelected || selectedCells.length === 1) {
                    selectedCells = selectedCells.filter(i => i !== index);
                    cell.classList.remove('selected');
                }
            } else {
                // 隣接しているセル、またはまだ何も選択していない場合のみ選択可能
                if (selectedCells.length === 0 || isAdjacent(index)) {
                    selectedCells.push(index);
                    cell.classList.add('selected');
                }
            }

            updateCurrentSum();
        }

        // 隣接しているかチェック
        function isAdjacent(index) {
            const row = Math.floor(index / gridSize);
            const col = index % gridSize;

            return selectedCells.some(i => {
                const selectedRow = Math.floor(i / gridSize);
                const selectedCol = i % gridSize;
                return Math.abs(row - selectedRow) + Math.abs(col - selectedCol) === 1;
            });
        }

        // 隣接するインデックスを取得
        function getAdjacentIndices(index) {
            const row = Math.floor(index / gridSize);
            const col = index % gridSize;
            const adjacent = [];

            if (row > 0) adjacent.push(index - gridSize);
            if (row < gridSize - 1) adjacent.push(index + gridSize);
            if (col > 0) adjacent.push(index - 1);
            if (col < gridSize - 1) adjacent.push(index + 1);

            return adjacent;
        }

        // 現在の合計を更新
        function updateCurrentSum() {
            const sum = selectedCells.reduce((acc, i) => acc + grid[i], 0);
            currentSumElement.textContent = sum;
        }

        // 選択をクリア
        function clearSelection() {
            selectedCells = [];
            document.querySelectorAll('.cell').forEach(cell => {
                cell.classList.remove('selected');
            });
            updateCurrentSum();
        }

        // 回答を送信
        function submitAnswer() {
            if (selectedCells.length === 0) {
                showMessage('数字を選択してください！');
                return;
            }

            const sum = selectedCells.reduce((acc, i) => acc + grid[i], 0);
            const diff = Math.abs(target - sum);

            // 差が小さいほど高得点
            let points = 0;
            if (diff === 0) points = 100;
            else if (diff <= 2) points = 80;
            else if (diff <= 5) points = 60;
            else if (diff <= 10) points = 40;
            else if (diff <= 15) points = 20;
            else points = 5;

            score += points;
            scoreElement.textContent = score;

            showMessage(`合計: ${sum}\n差: ${diff}\n獲得ポイント: ${points}`, 1500);
        }

        // メッセージを表示
        function showMessage(text, duration = 1500) {
            messageElement.textContent = text;
            messageElement.classList.add('show');
            overlayElement.classList.add('show');

            setTimeout(() => {
                messageElement.classList.remove('show');
                overlayElement.classList.remove('show');

                // 次のラウンドへ
                nextRound();
            }, duration);
        }

        // 次のラウンド
        function nextRound() {
            round++;
            if (round > maxRounds) {
                // ゲーム終了
                showMessage(`🎉 ゲーム終了！\n\n最終スコア: ${score}\n\n「新しいゲーム」で再挑戦！`, 3000);
                setTimeout(() => {
                    resetGame();
                }, 3000);
            } else {
                roundElement.textContent = `${round}/${maxRounds}`;
                target = Math.floor(Math.random() * 50) + 40; // 40-89
                targetElement.textContent = target;
                initGrid();
            }
        }

        // ゲームをリセット
        function resetGame() {
            round = 1;
            score = 0;
            target = 50;
            roundElement.textContent = `${round}/${maxRounds}`;
            scoreElement.textContent = score;
            targetElement.textContent = target;
            initGrid();
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        initGrid();
    </script>
</body>
</html>
