<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Timing Puzzle Light | Games by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a1a;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            touch-action: manipulation;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .header {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
        }

        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .score {
            font-size: 2rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .combo {
            font-size: 1.2rem;
            color: #ffcc00;
            margin-top: 5px;
        }

        .lights-container {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .light {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .light.active {
            background: rgba(0, 255, 136, 0.8);
            border-color: #00ff88;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.8);
        }

        .light.success {
            background: rgba(0, 255, 255, 0.8);
            border-color: #00ffff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
        }

        .light.fail {
            background: rgba(255, 0, 0, 0.8);
            border-color: #ff0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.8);
        }

        .light:nth-child(1) { top: 0; left: 50%; transform: translateX(-50%); }
        .light:nth-child(2) { top: 20%; right: 0; }
        .light:nth-child(3) { bottom: 20%; right: 0; }
        .light:nth-child(4) { bottom: 0; left: 50%; transform: translateX(-50%); }
        .light:nth-child(5) { bottom: 20%; left: 0; }
        .light:nth-child(6) { top: 20%; left: 0; }

        .center-light {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .timing-bar {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .timing-indicator {
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 100%;
            background: #ffffff;
            transform: translateX(-50%);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        .timing-zone {
            position: absolute;
            top: 0;
            height: 100%;
            width: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 255, 136, 0.3);
            border-radius: 4px;
        }

        .level-info {
            position: absolute;
            bottom: 60px;
            left: 0;
            right: 0;
            text-align: center;
        }

        .level {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 5px;
        }

        .difficulty {
            font-size: 0.9rem;
            color: #666;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 12px 24px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: rgba(0, 255, 136, 0.2);
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            z-index: 10;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .message.show {
            opacity: 1;
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 26, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            display: none;
        }

        .game-over.show {
            display: flex;
        }

        .game-over h2 {
            font-size: 2.5rem;
            color: #ff4444;
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 26, 0.98);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .start-screen h1 {
            font-size: 2rem;
            color: #00ff88;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .start-screen p {
            font-size: 1rem;
            color: #888;
            margin-bottom: 10px;
            max-width: 300px;
            text-align: center;
        }

        .start-screen .btn {
            margin-top: 30px;
            font-size: 1.1rem;
            padding: 15px 40px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>Timing Puzzle Light</h1>
            <div class="score" id="score">0</div>
            <div class="combo" id="combo"></div>
        </div>

        <div class="lights-container">
            <div class="light" data-index="0"></div>
            <div class="light" data-index="1"></div>
            <div class="light" data-index="2"></div>
            <div class="light" data-index="3"></div>
            <div class="light" data-index="4"></div>
            <div class="light" data-index="5"></div>
            <div class="center-light"></div>
        </div>

        <div class="timing-bar">
            <div class="timing-zone"></div>
            <div class="timing-indicator" id="indicator"></div>
        </div>

        <div class="level-info">
            <div class="level">Level: <span id="level">1</span></div>
            <div class="difficulty">Speed: <span id="speed">1.0</span>x</div>
        </div>

        <div class="controls">
            <button class="btn" onclick="restartGame()">Restart</button>
        </div>

        <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    </div>

    <div class="message" id="message"></div>

    <div class="game-over" id="gameOver">
        <h2>Game Over!</h2>
        <div class="final-score">Score: <span id="finalScore">0</span></div>
        <button class="btn" onclick="restartGame()">Play Again</button>
    </div>

    <div class="start-screen" id="startScreen">
        <h1>Timing Puzzle Light</h1>
        <p>Tap the lights when they glow!</p>
        <p>Time your taps perfectly for bonus points!</p>
        <p>Build combos for higher scores!</p>
        <button class="btn" onclick="startGame()">Start Game</button>
    </div>

    <script>
        let score = 0;
        let combo = 0;
        let level = 1;
        let speed = 1.0;
        let activeLight = null;
        let timingPosition = 0;
        let timingDirection = 1;
        let gameRunning = false;
        let timingSpeed = 0.02;
        let lightActiveTime = 0;
        let maxActiveTime = 60;

        const lights = document.querySelectorAll('.light');
        const indicator = document.getElementById('indicator');
        const message = document.getElementById('message');

        function getRandomLight() {
            return Math.floor(Math.random() * lights.length);
        }

        function activateLight() {
            if (!gameRunning) return;

            // Clear previous active light
            if (activeLight !== null) {
                lights[activeLight].classList.remove('active');
            }

            // Activate new random light
            activeLight = getRandomLight();
            lights[activeLight].classList.add('active');
            lightActiveTime = 0;

            // Adjust timing based on level
            timingSpeed = 0.02 * speed;
            maxActiveTime = Math.max(30, 60 - level * 2);
        }

        function updateTiming() {
            if (!gameRunning) return;

            timingPosition += timingSpeed * timingDirection;

            if (timingPosition >= 1 || timingPosition <= 0) {
                timingDirection *= -1;
            }

            const position = timingPosition * 100;
            indicator.style.left = `${position}%`;

            // Check if light has been active too long
            if (activeLight !== null) {
                lightActiveTime++;
                if (lightActiveTime > maxActiveTime) {
                    missLight();
                }
            }
        }

        function checkTiming() {
            const perfectZone = 0.2;
            const goodZone = 0.35;

            const distanceFromCenter = Math.abs(timingPosition - 0.5);

            if (distanceFromCenter < perfectZone) {
                return 'perfect';
            } else if (distanceFromCenter < goodZone) {
                return 'good';
            } else {
                return 'miss';
            }
        }

        function handleLightClick(index) {
            if (!gameRunning) return;
            if (activeLight === null) return;
            if (index !== activeLight) return;

            const timing = checkTiming();

            if (timing === 'perfect') {
                lights[index].classList.add('success');
                score += 100 * level * (1 + combo * 0.1);
                combo++;
                showMessage('Perfect! +100', '#00ffff');
            } else if (timing === 'good') {
                lights[index].classList.add('success');
                score += 50 * level;
                combo++;
                showMessage('Good! +50', '#00ff88');
            } else {
                lights[index].classList.add('fail');
                combo = 0;
                showMessage('Miss!', '#ff4444');
            }

            setTimeout(() => {
                lights[index].classList.remove('success', 'fail');
            }, 200);

            updateUI();
            activateLight();
        }

        function missLight() {
            if (activeLight !== null) {
                lights[activeLight].classList.add('fail');
                setTimeout(() => {
                    lights[activeLight].classList.remove('fail');
                }, 200);
            }
            
            combo = 0;
            showMessage('Miss!', '#ff4444');
            updateUI();
            activateLight();
        }

        function showMessage(text, color) {
            message.textContent = text;
            message.style.color = color;
            message.classList.add('show');
            
            setTimeout(() => {
                message.classList.remove('show');
            }, 500);
        }

        function updateUI() {
            document.getElementById('score').textContent = Math.floor(score);
            document.getElementById('combo').textContent = combo > 0 ? `Combo: ${combo}` : '';
            document.getElementById('level').textContent = level;
            document.getElementById('speed').textContent = speed.toFixed(1);
        }

        function checkLevelUp() {
            const newLevel = Math.floor(score / 500) + 1;
            if (newLevel > level) {
                level = newLevel;
                speed = 1.0 + (level - 1) * 0.1;
                showMessage(`Level ${level}!`, '#ffcc00');
            }
        }

        function gameLoop() {
            if (!gameRunning) return;

            updateTiming();
            checkLevelUp();

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            score = 0;
            combo = 0;
            level = 1;
            speed = 1.0;
            activeLight = null;
            timingPosition = 0.5;
            timingDirection = 1;

            updateUI();
            activateLight();
            gameLoop();
        }

        function restartGame() {
            document.getElementById('gameOver').classList.remove('show');
            startGame();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Event listeners
        lights.forEach((light, index) => {
            light.addEventListener('click', () => handleLightClick(index));
            light.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleLightClick(index);
            });
        });

        // Prevent context menu on long press
        document.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>
</body>
</html>
