<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dot Eater</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            color: #fff;
            font-size: clamp(1.5rem, 5vw, 3rem);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            color: #fff;
            font-size: clamp(14px, 3vw, 18px);
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .canvas-container {
            position: relative;
            width: 90vw;
            max-width: 600px;
            height: 60vh;
            max-height: 600px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.3);
        }

        canvas {
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
        }

        .controls {
            margin-top: 15px;
            color: #fff;
            text-align: center;
            font-size: 14px;
            opacity: 0.8;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: none;
            font-size: 24px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .game-over, .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            z-index: 100;
        }

        .game-over h2, .start-screen h2 {
            font-size: clamp(2rem, 8vw, 4rem);
            margin-bottom: 20px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            cursor: pointer;
            transition: transform 0.3s ease;
            margin: 10px;
        }

        .btn:hover {
            transform: scale(1.1);
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .stats {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🍎 Dot Eater</h1>

        <div class="stats">
            <div class="stat">スコア: <span id="score">0</span></div>
            <div class="stat">ハイスコア: <span id="highScore">0</span></div>
            <div class="stat">ステージ: <span id="stage">1</span></div>
        </div>

        <div class="canvas-container">
            <canvas id="gameCanvas"></canvas>
            <div class="start-screen" id="startScreen">
                <h2>Dot Eater</h2>
                <p style="margin-bottom: 20px;">矢印キーかタップで移動</p>
                <p style="margin-bottom: 20px;">🍎 餌を集めて点数アップ</p>
                <p style="margin-bottom: 30px;">👾 敵に触らないで！</p>
                <button class="btn" onclick="startGame()">スタート</button>
            </div>
            <div class="game-over hidden" id="gameOver">
                <h2>ゲームオーバー</h2>
                <p style="font-size: 24px; margin-bottom: 30px;">スコア: <span id="finalScore">0</span></p>
                <button class="btn" onclick="startGame()">もう一度</button>
            </div>
        </div>

        <div class="controls">
            <p>PC: 矢印キー | モバイル: 画面をタップ</p>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let player, foods, enemies, particles;
        let score, highScore, stage;
        let gameLoop;
        let keys = {};
        let touchX, touchY;

        // Set canvas size
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Load high score
        highScore = parseInt(localStorage.getItem('dotEaterHighScore')) || 0;
        document.getElementById('highScore').textContent = highScore;

        // Player
        class Player {
            constructor() {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.size = 20;
                this.speed = 5;
            }

            update() {
                if (keys['ArrowUp'] || keys['w']) this.y -= this.speed;
                if (keys['ArrowDown'] || keys['s']) this.y += this.speed;
                if (keys['ArrowLeft'] || keys['a']) this.x -= this.speed;
                if (keys['ArrowRight'] || keys['d']) this.x += this.speed;

                // Touch controls
                if (touchX !== undefined && touchY !== undefined) {
                    const dx = touchX - this.x;
                    const dy = touchY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > 10) {
                        this.x += (dx / dist) * this.speed;
                        this.y += (dy / dist) * this.speed;
                    }
                }

                // Boundaries
                this.x = Math.max(this.size, Math.min(canvas.width - this.size, this.x));
                this.y = Math.max(this.size, Math.min(canvas.height - this.size, this.y));
            }

            draw() {
                // Glow effect
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#4CAF50';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = '#4CAF50';
                ctx.fill();
                ctx.shadowBlur = 0;

                // Eyes
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(this.x - 5, this.y - 5, 5, 0, Math.PI * 2);
                ctx.arc(this.x + 5, this.y - 5, 5, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(this.x - 5, this.y - 5, 2, 0, Math.PI * 2);
                ctx.arc(this.x + 5, this.y - 5, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Food
        class Food {
            constructor() {
                this.x = Math.random() * (canvas.width - 60) + 30;
                this.y = Math.random() * (canvas.height - 60) + 30;
                this.size = 12;
                this.hue = Math.random() * 360;
            }

            draw() {
                ctx.shadowBlur = 15;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 50%)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${this.hue}, 100%, 60%)`;
                ctx.fill();
                ctx.shadowBlur = 0;

                // Pulse animation
                const pulse = Math.sin(Date.now() * 0.005) * 3;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size + pulse, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 100%, 60%, 0.3)`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        // Enemy
        class Enemy {
            constructor(stage) {
                this.x = Math.random() < 0.5 ? -30 : canvas.width + 30;
                this.y = Math.random() * canvas.height;
                this.size = 18 + stage * 2;
                this.speed = 1.5 + stage * 0.3;
                this.angle = 0;
            }

            update() {
                // Chase player
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > 0) {
                    this.x += (dx / dist) * this.speed;
                    this.y += (dy / dist) * this.speed;
                }

                this.angle += 0.05;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // Spiky shape
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#FF5252';
                ctx.beginPath();
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const r = i % 2 === 0 ? this.size : this.size * 0.5;
                    const x = Math.cos(angle) * r;
                    const y = Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fillStyle = '#FF5252';
                ctx.fill();
                ctx.shadowBlur = 0;

                ctx.restore();
            }
        }

        // Particle
        class Particle {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.life = 1;
                this.hue = hue;
                this.size = Math.random() * 5 + 2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.02;
                this.size *= 0.98;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${this.life})`;
                ctx.fill();
            }
        }

        function createParticles(x, y, hue, count = 10) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, hue));
            }
        }

        function init() {
            player = new Player();
            foods = [];
            enemies = [];
            particles = [];
            score = 0;
            stage = 1;

            // Create initial foods
            for (let i = 0; i < 5; i++) {
                foods.push(new Food());
            }

            // Create initial enemies
            for (let i = 0; i < 2; i++) {
                enemies.push(new Enemy(stage));
            }

            updateUI();
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('stage').textContent = stage;
        }

        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOver').classList.add('hidden');
            init();
            if (gameLoop) cancelAnimationFrame(gameLoop);
            update();
        }

        function gameOver() {
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('dotEaterHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.remove('hidden');
            cancelAnimationFrame(gameLoop);
        }

        function update() {
            gameLoop = requestAnimationFrame(update);

            // Clear canvas
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update player
            player.update();
            player.draw();

            // Update foods
            foods.forEach((food, index) => {
                food.draw();

                // Collision with player
                const dx = player.x - food.x;
                const dy = player.y - food.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < player.size + food.size) {
                    createParticles(food.x, food.y, food.hue, 15);
                    foods.splice(index, 1);
                    score += 10;
                    updateUI();

                    // Spawn new food
                    foods.push(new Food());

                    // Progression
                    if (score % 50 === 0) {
                        stage++;
                        enemies.push(new Enemy(stage));
                    }
                }
            });

            // Update enemies
            enemies.forEach((enemy, index) => {
                enemy.update();
                enemy.draw();

                // Collision with player
                const dx = player.x - enemy.x;
                const dy = player.y - enemy.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < player.size + enemy.size * 0.7) {
                    createParticles(player.x, player.y, 0, 30);
                    gameOver();
                }
            });

            // Update particles
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // Stage indicator
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.font = '150px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(stage, canvas.width / 2, canvas.height / 2);
        }

        // Controls
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            touchX = e.touches[0].clientX - rect.left;
            touchY = e.touches[0].clientY - rect.top;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            touchX = e.touches[0].clientX - rect.left;
            touchY = e.touches[0].clientY - rect.top;
        });

        canvas.addEventListener('touchend', () => {
            touchX = undefined;
            touchY = undefined;
        });

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
