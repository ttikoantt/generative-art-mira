<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Memory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .subtitle {
            color: #666;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #888;
            margin-top: 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .cell {
            aspect-ratio: 1;
            background: #e0e0e0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cell:hover:not(.active) {
            background: #d0d0d0;
            transform: scale(1.05);
        }

        .cell:active {
            transform: scale(0.95);
        }

        .cell.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            animation: pulse 0.3s ease;
        }

        .cell.success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .cell.error {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
            animation: shake 0.3s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .message {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            font-weight: 600;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message.info {
            background: #e3f2fd;
            color: #1976d2;
        }

        .message.success {
            background: #e8f5e9;
            color: #388e3c;
        }

        .message.error {
            background: #ffebee;
            color: #d32f2f;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .instructions {
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 10px;
            font-size: 0.85rem;
            color: #856404;
        }

        @media (max-width: 400px) {
            h1 {
                font-size: 1.5rem;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            .grid {
                gap: 8px;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 Pattern Memory</h1>
        <p class="subtitle">パターンを記憶して再現しよう</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="level">1</div>
                <div class="stat-label">レベル</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">スコア</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="best">0</div>
                <div class="stat-label">ベスト</div>
            </div>
        </div>

        <div class="message info" id="message">
            スタートボタンを押して始めよう！
        </div>

        <div class="grid" id="grid">
            <button class="cell" data-index="0"></button>
            <button class="cell" data-index="1"></button>
            <button class="cell" data-index="2"></button>
            <button class="cell" data-index="3"></button>
            <button class="cell" data-index="4"></button>
            <button class="cell" data-index="5"></button>
            <button class="cell" data-index="6"></button>
            <button class="cell" data-index="7"></button>
            <button class="cell" data-index="8"></button>
        </div>

        <div class="controls">
            <button class="btn-primary" id="startBtn" onclick="startGame()">スタート</button>
            <button class="btn-secondary" onclick="resetGame()">リセット</button>
        </div>

        <div class="instructions">
            <strong>遊び方:</strong><br>
            1. ライトが光る順番を覚える<br>
            2. 同じ順番でタップする<br>
            3. 正解するとレベルアップ！
        </div>
    </div>

    <script>
        const cells = document.querySelectorAll('.cell');
        const messageEl = document.getElementById('message');
        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const startBtn = document.getElementById('startBtn');

        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('patternMemoryBest')) || 0;
        let isPlaying = false;
        let isShowingSequence = false;

        bestEl.textContent = bestScore;

        function setMessage(text, type = 'info') {
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
        }

        function playSound(frequency, duration) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = frequency;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        function activateCell(index, duration = 300) {
            return new Promise(resolve => {
                const cell = cells[index];
                cell.classList.add('active');

                // サウンド（インデックスによって音程が変わる）
                const frequencies = [262, 294, 330, 349, 392, 440, 494, 523, 587];
                playSound(frequencies[index], duration / 1000);

                setTimeout(() => {
                    cell.classList.remove('active');
                    setTimeout(resolve, 100);
                }, duration);
            });
        }

        async function showSequence() {
            isShowingSequence = true;
            startBtn.disabled = true;

            await new Promise(r => setTimeout(r, 500));

            for (let i = 0; i < sequence.length; i++) {
                await activateCell(sequence[i], 400);
                await new Promise(r => setTimeout(r, 200));
            }

            isShowingSequence = false;
            setMessage('あなたの番！同じ順番でタップしてね', 'info');
            startBtn.disabled = false;
        }

        function addToSequence() {
            const randomIndex = Math.floor(Math.random() * 9);
            sequence.push(randomIndex);
        }

        async function startGame() {
            if (isShowingSequence) return;

            isPlaying = true;
            sequence = [];
            playerSequence = [];
            level = 1;
            score = 0;

            updateStats();
            setMessage('パターンを覚えて...', 'info');

            await new Promise(r => setTimeout(r, 1000));

            addToSequence();
            await showSequence();
        }

        function updateStats() {
            levelEl.textContent = level;
            scoreEl.textContent = score;
        }

        async function handleCellClick(index) {
            if (!isPlaying || isShowingSequence) return;

            const cell = cells[index];
            playerSequence.push(index);

            // クリック時のフィードバック
            cell.classList.add('active');
            playSound([262, 294, 330, 349, 392, 440, 494, 523, 587][index], 0.1);
            setTimeout(() => cell.classList.remove('active'), 100);

            // 正誤判定
            const currentIndex = playerSequence.length - 1;

            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                // 間違い
                cell.classList.add('error');
                setMessage(`残念！正解は ${sequence.length} 個でした`, 'error');
                isPlaying = false;

                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('patternMemoryBest', bestScore);
                    bestEl.textContent = bestScore;
                    setMessage(`🎉 新記録！スコア: ${score}`, 'success');
                }

                await new Promise(r => setTimeout(r, 1000));
                cell.classList.remove('error');
                startBtn.disabled = false;
                return;
            }

            // 正解
            cell.classList.add('success');
            setTimeout(() => cell.classList.remove('success'), 200);

            // シーケンス完了チェック
            if (playerSequence.length === sequence.length) {
                score += level * 10;
                level++;
                updateStats();

                setMessage('🎉 正解！次のレベルへ...', 'success');

                await new Promise(r => setTimeout(r, 1500));

                playerSequence = [];
                addToSequence();
                await showSequence();
            }
        }

        function resetGame() {
            isPlaying = false;
            sequence = [];
            playerSequence = [];
            level = 1;
            score = 0;
            updateStats();
            setMessage('リセットしました。スタートボタンで始めよう！', 'info');
            startBtn.disabled = false;

            // 全てのセルの状態をリセット
            cells.forEach(cell => {
                cell.classList.remove('active', 'success', 'error');
            });
        }

        // イベントリスナー
        cells.forEach((cell, index) => {
            cell.addEventListener('click', () => handleCellClick(index));
        });

        // タッチ対応
        cells.forEach((cell, index) => {
            cell.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleCellClick(index);
            });
        });
    </script>
</body>
</html>
