<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Memory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2a 100%);
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            font-size: 18px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #00ffcc;
        }

        .grid {
            display: grid;
            gap: 12px;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .cell {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .cell::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60%;
            height: 60%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            opacity: 0;
            transition: all 0.3s;
        }

        .cell:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.15);
        }

        .cell:active {
            transform: scale(0.95);
        }

        .cell.flashed {
            background: linear-gradient(135deg, #00ffcc 0%, #00ff99 100%);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.6);
            border-color: #00ffcc;
        }

        .cell.flashed::before {
            opacity: 1;
            background: rgba(255, 255, 255, 0.3);
        }

        .cell.correct {
            background: linear-gradient(135deg, #00ff00 0%, #00cc00 100%);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.6);
        }

        .cell.wrong {
            background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .message {
            font-size: 24px;
            margin-bottom: 20px;
            min-height: 35px;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .message.show {
            color: #00ffcc;
        }

        .message.watch {
            color: #ffcc00;
        }

        .message.gameover {
            color: #ff6666;
        }

        .restart-btn {
            background: linear-gradient(135deg, #00ffcc 0%, #00ff99 100%);
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-family: 'Courier New', monospace;
            color: #0a0a1a;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            display: none;
        }

        .restart-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.6);
        }

        .restart-btn.visible {
            display: block;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 15px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            border-radius: 20px;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 600px) {
            .cell {
                width: 60px;
                height: 60px;
            }

            .grid {
                gap: 8px;
            }

            h1 {
                font-size: 22px;
            }

            .stats {
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="header">
        <h1>🎯 Pattern Memory</h1>
        <div class="stats">
            <div class="stat">
                <div>レベル</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div>スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div>ハイスコア</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>
    </div>

    <div class="message" id="message">スタートボタンを押してね</div>

    <div class="grid" id="grid"></div>

    <button class="restart-btn" id="restartBtn" onclick="restartGame()">もう一度プレイ</button>

    <script>
        const gridSize = 3;
        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('patternMemoryHighScore')) || 0;
        let isShowingSequence = false;
        let isPlaying = false;

        const grid = document.getElementById('grid');
        const messageEl = document.getElementById('message');
        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const restartBtn = document.getElementById('restartBtn');

        function initGrid() {
            grid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            grid.innerHTML = '';

            for (let i = 0; i < gridSize * gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', handleCellClick);
                grid.appendChild(cell);
            }

            highScoreEl.textContent = highScore;
        }

        function handleCellClick(e) {
            if (!isPlaying || isShowingSequence) return;

            const index = parseInt(e.target.dataset.index);
            playerSequence.push(index);

            flashCell(index, 300);

            // クリック判定
            const expectedIndex = sequence[playerSequence.length - 1];
            if (index !== expectedIndex) {
                gameOver();
                return;
            }

            // 全て正解
            if (playerSequence.length === sequence.length) {
                score += level * 10;
                scoreEl.textContent = score;
                level++;
                levelEl.textContent = level;

                if (score > highScore) {
                    highScore = score;
                    highScoreEl.textContent = highScore;
                    localStorage.setItem('patternMemoryHighScore', highScore);
                }

                messageEl.textContent = '正解！ 次のレベルへ';
                messageEl.className = 'message show';

                setTimeout(() => {
                    playerSequence = [];
                    addToSequence();
                    showSequence();
                }, 1500);
            }
        }

        function flashCell(index, duration = 500) {
            const cells = document.querySelectorAll('.cell');
            const cell = cells[index];

            cell.classList.add('flashed');

            setTimeout(() => {
                cell.classList.remove('flashed');
            }, duration);
        }

        function addToSequence() {
            const newIndex = Math.floor(Math.random() * (gridSize * gridSize));
            sequence.push(newIndex);
        }

        async function showSequence() {
            isShowingSequence = true;
            messageEl.textContent = 'パターンを見てね';
            messageEl.className = 'message watch';

            await new Promise(resolve => setTimeout(resolve, 1000));

            for (let i = 0; i < sequence.length; i++) {
                await new Promise(resolve => setTimeout(resolve, 300));
                flashCell(sequence[i], 400);
                await new Promise(resolve => setTimeout(resolve, 500));
            }

            isShowingSequence = false;
            isPlaying = true;
            messageEl.textContent = '同じ順番で押してね';
            messageEl.className = 'message';
        }

        function gameOver() {
            isPlaying = false;
            messageEl.textContent = `ゲームオーバー！ スコア: ${score}`;
            messageEl.className = 'message gameover';

            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.style.pointerEvents = 'none';
            });

            restartBtn.classList.add('visible');
        }

        function restartGame() {
            sequence = [];
            playerSequence = [];
            level = 1;
            score = 0;
            isPlaying = false;
            isShowingSequence = false;

            levelEl.textContent = level;
            scoreEl.textContent = score;

            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.style.pointerEvents = 'auto';
                cell.classList.remove('correct', 'wrong');
            });

            restartBtn.classList.remove('visible');

            startGame();
        }

        function startGame() {
            addToSequence();
            showSequence();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        initGrid();

        // 最初のスタート
        setTimeout(() => {
            messageEl.textContent = 'クリックでスタート';
            messageEl.className = 'message show';

            grid.addEventListener('click', function startHandler() {
                grid.removeEventListener('click', startHandler);
                startGame();
            }, { once: true });
        }, 500);
    </script>
</body>
</html>
