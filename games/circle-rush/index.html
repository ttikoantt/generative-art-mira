<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle Rush - Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100vh;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }
        .score {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #0ff;
        }
        .fullscreen-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            pointer-events: all;
            transition: all 0.3s;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        .gameOver, .startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 100;
        }
        .gameOver.hidden, .startScreen.hidden {
            display: none;
        }
        .gameOver h1, .startScreen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ff6b6b;
            text-shadow: 0 0 20px #ff6b6b;
        }
        .startScreen h1 {
            color: #4ecdc4;
            text-shadow: 0 0 20px #4ecdc4;
        }
        .gameOver p, .startScreen p {
            font-size: 24px;
            margin-bottom: 30px;
        }
        .playBtn, .restartBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: #fff;
            padding: 15px 40px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .playBtn:hover, .restartBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.6);
        }
        .instructions {
            margin-top: 30px;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="canvas"></canvas>

        <div class="ui">
            <div class="score">Score: <span id="score">0</span></div>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
        </div>

        <div class="startScreen" id="startScreen">
            <h1>⭕ Circle Rush</h1>
            <p>Tap circles at the right moment!</p>
            <button class="playBtn" onclick="startGame()">▶ Play</button>
            <div class="instructions">
                <p>Tap the small circles when they're inside the large ring</p>
                <p>Don't let them escape!</p>
            </div>
        </div>

        <div class="gameOver hidden" id="gameOver">
            <h1>Game Over!</h1>
            <p>Score: <span id="finalScore">0</span></p>
            <button class="restartBtn" onclick="restartGame()">↻ Restart</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const finalScoreEl = document.getElementById('finalScore');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOver');

        let width, height;
        let centerX, centerY;
        let gameRunning = false;
        let score = 0;
        let ringRadius = 150;
        let ringAngle = 0;
        let gapAngle = Math.PI / 3;
        let circles = [];
        let spawnTimer = 0;
        let spawnInterval = 60;
        let difficulty = 1;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
            ringRadius = Math.min(width, height) * 0.2;
        }

        class Circle {
            constructor() {
                this.angle = Math.random() * Math.PI * 2;
                this.radius = 10;
                this.distance = ringRadius + 100;
                this.speed = 3 + Math.random() * 2;
                this.color = `hsl(${Math.random() * 60 + 300}, 80%, 60%)`;
                this.active = true;
            }

            update() {
                this.distance -= this.speed * difficulty;

                // Check if circle is in the gap
                const relAngle = (this.angle - ringAngle + Math.PI * 2) % (Math.PI * 2);
                const gapStart = (Math.PI * 2 - gapAngle) / 2;
                const gapEnd = gapStart + gapAngle;
                const inGap = relAngle >= gapStart && relAngle <= gapEnd;
                const inRing = Math.abs(this.distance - ringRadius) < 30;

                // Check if escaped (went past ring without being tapped)
                if (this.distance < ringRadius - 50 && this.active) {
                    gameOver();
                }
            }

            draw() {
                if (!this.active) return;

                const x = centerX + Math.cos(this.angle) * this.distance;
                const y = centerY + Math.sin(this.angle) * this.distance;

                // Glow
                ctx.beginPath();
                ctx.arc(x, y, this.radius * 2, 0, Math.PI * 2);
                ctx.fillStyle = this.color.replace('60%', '30%', 'g');
                ctx.globalAlpha = 0.3;
                ctx.fill();
                ctx.globalAlpha = 1;

                // Circle
                ctx.beginPath();
                ctx.arc(x, y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            checkTap(x, y) {
                if (!this.active) return false;

                const circleX = centerX + Math.cos(this.angle) * this.distance;
                const circleY = centerY + Math.sin(this.angle) * this.distance;

                const dx = x - circleX;
                const dy = y - circleY;
                const dist = Math.sqrt(dx * dx + dy * dy);

                // Check if tap is close enough and circle is near ring
                if (dist < 50 && Math.abs(this.distance - ringRadius) < 50) {
                    this.active = false;
                    score += 10;
                    scoreEl.textContent = score;
                    return true;
                }
                return false;
            }
        }

        function spawnCircle() {
            circles.push(new Circle());
        }

        function update() {
            if (!gameRunning) return;

            ringAngle += 0.02 * difficulty;

            spawnTimer++;
            if (spawnTimer >= spawnInterval) {
                spawnCircle();
                spawnTimer = 0;
                spawnInterval = Math.max(30, spawnInterval - 1);
                difficulty = Math.min(2, difficulty + 0.02);
            }

            circles.forEach(c => c.update());
            circles = circles.filter(c => c.distance > ringRadius - 100);
        }

        function draw() {
            // Clear
            ctx.fillStyle = 'rgba(26, 26, 46, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // Draw ring
            const gradient = ctx.createLinearGradient(
                centerX - ringRadius, centerY - ringRadius,
                centerX + ringRadius, centerY + ringRadius
            );
            gradient.addColorStop(0, '#4ecdc4');
            gradient.addColorStop(1, '#44a08d');

            // Ring segments
            for (let a = 0; a < Math.PI * 2; a += 0.1) {
                const relAngle = (a - ringAngle + Math.PI * 2) % (Math.PI * 2);
                const gapStart = (Math.PI * 2 - gapAngle) / 2;
                const gapEnd = gapStart + gapAngle;

                if (relAngle < gapStart || relAngle > gapEnd) {
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, ringRadius, a, a + 0.1);
                    ctx.strokeStyle = gradient;
                    ctx.lineWidth = 10;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                }
            }

            // Inner glow
            ctx.beginPath();
            ctx.arc(centerX, centerY, ringRadius - 20, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(78, 205, 196, 0.2)';
            ctx.lineWidth = 5;
            ctx.stroke();

            // Draw circles
            circles.forEach(c => c.draw());
        }

        function animate() {
            update();
            draw();
            requestAnimationFrame(animate);
        }

        function startGame() {
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            gameRunning = true;
            score = 0;
            circles = [];
            spawnTimer = 0;
            spawnInterval = 60;
            difficulty = 1;
            scoreEl.textContent = '0';
        }

        function gameOver() {
            gameRunning = false;
            finalScoreEl.textContent = score;
            gameOverScreen.classList.remove('hidden');
        }

        function restartGame() {
            startGame();
        }

        // Event listeners
        window.addEventListener('resize', resize);

        canvas.addEventListener('click', (e) => {
            if (!gameRunning) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            circles.forEach(c => c.checkTap(x, y));
        });

        canvas.addEventListener('touchstart', (e) => {
            if (!gameRunning) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;

            circles.forEach(c => c.checkTap(x, y));
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        resize();
        animate();
    </script>
</body>
</html>
