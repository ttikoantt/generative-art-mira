<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balloon Pop Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            cursor: crosshair;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .balloon {
            position: absolute;
            cursor: pointer;
            animation: float 3s ease-in-out infinite;
            transition: transform 0.1s;
        }

        .balloon:hover {
            transform: scale(1.1);
        }

        .balloon:active {
            transform: scale(0.9);
        }

        .balloon svg {
            width: 100%;
            height: 100%;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        #score {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 100;
        }

        #timer {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 30px;
            border-radius: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #764ba2;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 100;
        }

        #gameOver {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 200;
        }

        #gameOver h1 {
            font-size: 64px;
            color: #fff;
            margin-bottom: 30px;
        }

        #gameOver p {
            font-size: 32px;
            color: #fff;
            margin-bottom: 40px;
        }

        #restartBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 24px;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        #restartBtn:hover {
            transform: scale(1.1);
        }

        .pop {
            animation: pop 0.3s ease-out forwards;
        }

        @keyframes pop {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        .score-popup {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            pointer-events: none;
            animation: scoreFloat 1s ease-out forwards;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        @keyframes scoreFloat {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px);
            }
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid white;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-family: Arial, sans-serif;
            font-size: 14px;
            z-index: 100;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            #score {
                font-size: 24px;
                padding: 10px 30px;
            }

            #timer {
                font-size: 18px;
                padding: 8px 20px;
            }

            #gameOver h1 {
                font-size: 48px;
            }

            #gameOver p {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer"></div>

    <div id="score">Score: 0</div>
    <div id="timer">Time: 30</div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div id="gameOver">
        <h1>⏰ Time's Up!</h1>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button id="restartBtn">Play Again</button>
    </div>

    <script>
        const gameContainer = document.getElementById('gameContainer');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const gameOverDisplay = document.getElementById('gameOver');
        const finalScoreDisplay = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');

        let score = 0;
        let timeLeft = 30;
        let gameInterval;
        let balloonInterval;
        let isGameRunning = false;

        const balloonColors = [
            { main: '#FF6B6B', light: '#FFE66D' },
            { main: '#4ECDC4', light: '#45B7D1' },
            { main: '#96CEB4', light: '#FFEAA7' },
            { main: '#DDA0DD', light: '#FF69B4' },
            { main: '#87CEEB', light: '#B0E0E6' },
            { main: '#FFA07A', light: '#FFD700' }
        ];

        function createBalloonSVG(color) {
            return `
                <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                    <ellipse cx="50" cy="50" rx="40" ry="45" fill="${color.main}" opacity="0.9"/>
                    <ellipse cx="50" cy="30" rx="25" ry="20" fill="${color.light}" opacity="0.6"/>
                    <polygon points="50,95 45,105 55,105" fill="${color.main}"/>
                    <line x1="50" y1="105" x2="50" y2="120" stroke="#333" stroke-width="2"/>
                </svg>
            `;
        }

        function createBalloon() {
            if (!isGameRunning) return;

            const balloon = document.createElement('div');
            balloon.className = 'balloon';

            const size = Math.random() * 60 + 50;
            const x = Math.random() * (window.innerWidth - size);
            const y = window.innerHeight;
            const color = balloonColors[Math.floor(Math.random() * balloonColors.length)];

            balloon.style.width = size + 'px';
            balloon.style.height = (size * 1.2) + 'px';
            balloon.style.left = x + 'px';
            balloon.style.top = y + 'px';
            balloon.innerHTML = createBalloonSVG(color);

            const points = Math.floor((100 - size) / 10) * 10;
            balloon.dataset.points = points;

            balloon.addEventListener('click', () => popBalloon(balloon));
            balloon.addEventListener('touchstart', (e) => {
                e.preventDefault();
                popBalloon(balloon);
            });

            gameContainer.appendChild(balloon);

            const duration = Math.random() * 3000 + 4000;
            const startTime = Date.now();

            function floatUp() {
                if (!isGameRunning || !balloon.parentElement) return;

                const elapsed = Date.now() - startTime;
                const progress = elapsed / duration;

                if (progress < 1) {
                    const newY = y - (window.innerHeight + 150) * progress;
                    const wobble = Math.sin(elapsed * 0.005) * 20;
                    balloon.style.top = newY + 'px';
                    balloon.style.left = (x + wobble) + 'px';
                    requestAnimationFrame(floatUp);
                } else {
                    balloon.remove();
                }
            }

            requestAnimationFrame(floatUp);
        }

        function popBalloon(balloon) {
            const points = parseInt(balloon.dataset.points);
            score += points;
            scoreDisplay.textContent = 'Score: ' + score;

            // スコアポップアップ
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.textContent = '+' + points;
            popup.style.left = balloon.style.left;
            popup.style.top = balloon.style.top;
            gameContainer.appendChild(popup);

            setTimeout(() => popup.remove(), 1000);

            // 風船をポップ
            balloon.classList.add('pop');
            setTimeout(() => balloon.remove(), 300);
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            isGameRunning = true;

            scoreDisplay.textContent = 'Score: ' + score;
            timerDisplay.textContent = 'Time: ' + timeLeft;
            gameOverDisplay.style.display = 'none';

            gameContainer.innerHTML = '';

            gameInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = 'Time: ' + timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            balloonInterval = setInterval(createBalloon, 800);
        }

        function endGame() {
            isGameRunning = false;
            clearInterval(gameInterval);
            clearInterval(balloonInterval);

            finalScoreDisplay.textContent = score;
            gameOverDisplay.style.display = 'flex';

            gameContainer.innerHTML = '';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        restartBtn.addEventListener('click', startGame);

        startGame();
    </script>
</body>
</html>
