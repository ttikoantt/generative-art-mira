<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dot Chase - Mira's Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: none;
        }
        #gameCanvas {
            display: block;
            touch-action: none;
        }
        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 18px;
            z-index: 100;
        }
        #score, #time {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 25px;
        }
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        #overlay h1 {
            color: #fff;
            font-size: 48px;
            margin-bottom: 20px;
        }
        #overlay p {
            color: #fff;
            font-size: 18px;
            margin-bottom: 30px;
        }
        #startBtn {
            padding: 15px 50px;
            font-size: 24px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #startBtn:hover {
            transform: scale(1.1);
        }
        #fullscreen {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            cursor: pointer;
            z-index: 100;
            border-radius: 5px;
        }
        #fullscreen:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div id="score">Score: 0</div>
        <div id="time">Time: 30</div>
    </div>

    <div id="overlay">
        <h1>Dot Chase</h1>
        <p>ドットをタップしてスコアを稼ごう！<br>30秒で何個タップできる？</p>
        <button id="startBtn">スタート</button>
    </div>

    <button id="fullscreen">全画面</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('startBtn');
        const scoreEl = document.getElementById('score');
        const timeEl = document.getElementById('time');

        let width, height;
        let dots = [];
        let score = 0;
        let timeLeft = 30;
        let gameActive = false;
        let spawnTimer = 0;
        let gameTimer = null;

        // Dotクラス
        class Dot {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * (width - 100) + 50;
                this.y = Math.random() * (height - 200) + 100;
                this.radius = 0;
                this.targetRadius = 20 + Math.random() * 20;
                this.color = `hsl(${Math.random() * 360}, 80%, 60%)`;
                this.glowColor = `hsl(${Math.random() * 360}, 80%, 50%)`;
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = (Math.random() - 0.5) * 3;
                this.alpha = 0;
                this.popped = false;
            }

            update() {
                // 出現アニメーション
                this.radius += (this.targetRadius - this.radius) * 0.1;
                this.alpha = Math.min(1, this.alpha + 0.05);

                // 移動
                this.x += this.vx;
                this.y += this.vy;

                // 壁で跳ね返る
                if (this.x < this.targetRadius || this.x > width - this.targetRadius) {
                    this.vx *= -1;
                }
                if (this.y < this.targetRadius + 80 || this.y > height - this.targetRadius - 60) {
                    this.vy *= -1;
                }

                // 徐々に消える
                if (Math.random() < 0.002) {
                    this.targetRadius *= 0.99;
                    if (this.targetRadius < 5) {
                        return false;
                    }
                }
                return true;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                
                // グロー効果
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.glowColor;
                
                // ドットを描画
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                
                ctx.restore();
            }

            checkClick(x, y) {
                const dist = Math.sqrt((x - this.x) ** 2 + (y - this.y) ** 2);
                return dist < this.radius;
            }
        }

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function spawnDot() {
            if (dots.length < 10 && gameActive) {
                dots.push(new Dot());
            }
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 10; i++) {
                const particle = {
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    radius: 3 + Math.random() * 5,
                    color: color,
                    alpha: 1
                };
                
                // パーティクルアニメーション
                const animateParticle = () => {
                    particle.x += particle.vx;
                    particle.y += particle.vy;
                    particle.alpha -= 0.03;
                    
                    if (particle.alpha > 0) {
                        ctx.save();
                        ctx.globalAlpha = particle.alpha;
                        ctx.beginPath();
                        ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
                        ctx.fillStyle = particle.color;
                        ctx.fill();
                        ctx.restore();
                        requestAnimationFrame(animateParticle);
                    }
                };
                animateParticle();
            }
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            dots = [];
            gameActive = true;
            
            scoreEl.textContent = `Score: ${score}`;
            timeEl.textContent = `Time: ${timeLeft}`;
            
            overlay.style.display = 'none';

            // 最初のドットを生成
            for (let i = 0; i < 5; i++) {
                dots.push(new Dot());
            }

            // タイマー
            gameTimer = setInterval(() => {
                timeLeft--;
                timeEl.textContent = `Time: ${timeLeft}`;
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            animate();
        }

        function endGame() {
            gameActive = false;
            clearInterval(gameTimer);
            
            document.querySelector('#overlay h1').textContent = `Game Over!`;
            document.querySelector('#overlay p').textContent = `スコア: ${score} 点`;
            startBtn.textContent = 'もう一度';
            overlay.style.display = 'flex';
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);

            // ドットを更新・描画
            dots = dots.filter(dot => dot.update());
            dots.forEach(dot => dot.draw());

            // 新しいドットをスポーン
            spawnTimer++;
            if (spawnTimer > 60) {
                spawnDot();
                spawnTimer = 0;
            }

            if (gameActive) {
                requestAnimationFrame(animate);
            }
        }

        // イベントリスナー
        window.addEventListener('resize', init);

        canvas.addEventListener('click', (e) => {
            if (!gameActive) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            for (let i = dots.length - 1; i >= 0; i--) {
                if (dots[i].checkClick(x, y)) {
                    createParticles(dots[i].x, dots[i].y, dots[i].color);
                    dots.splice(i, 1);
                    score++;
                    scoreEl.textContent = `Score: ${score}`;
                    break;
                }
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            if (!gameActive) return;
            e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left;
            const y = e.touches[0].clientY - rect.top;

            for (let i = dots.length - 1; i >= 0; i--) {
                if (dots[i].checkClick(x, y)) {
                    createParticles(dots[i].x, dots[i].y, dots[i].color);
                    dots.splice(i, 1);
                    score++;
                    scoreEl.textContent = `Score: ${score}`;
                    break;
                }
            }
        });

        startBtn.addEventListener('click', startGame);

        document.getElementById('fullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // 初期化
        init();
    </script>
</body>
</html>
