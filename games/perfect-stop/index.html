<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Perfect Stop - ピッタリストップ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            color: white;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
        }

        .timer-display {
            font-size: 5rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            margin: 30px 0;
            color: #00d9ff;
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
        }

        .timer-display.perfect {
            color: #00ff88;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.8);
            animation: perfect 0.5s ease;
        }

        @keyframes perfect {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .timer-display.good {
            color: #ffdd00;
            text-shadow: 0 0 20px rgba(255, 221, 0, 0.5);
        }

        .timer-display.bad {
            color: #ff4444;
            text-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
        }

        .btn {
            padding: 20px 60px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            margin: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-stop {
            background: linear-gradient(45deg, #ff4444, #ff6b6b);
            color: white;
            box-shadow: 0 10px 30px rgba(255, 68, 68, 0.3);
        }

        .btn-stop:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(255, 68, 68, 0.4);
        }

        .btn-stop:active {
            transform: translateY(0);
            box-shadow: 0 5px 20px rgba(255, 68, 68, 0.3);
        }

        .btn-stop:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-start {
            background: linear-gradient(45deg, #00d9ff, #00ff88);
            color: white;
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.3);
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(0, 217, 255, 0.4);
        }

        .btn-start:active {
            transform: translateY(0);
        }

        .result {
            margin: 30px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            display: none;
        }

        .result.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-title {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .result-time {
            font-size: 2rem;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            margin: 15px 0;
        }

        .result-diff {
            font-size: 1.2rem;
            color: #00d9ff;
            margin: 10px 0;
        }

        .stats {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
        }

        .stats-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #00d9ff;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .stat-item {
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .stat-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00ff88;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            text-decoration: none;
            z-index: 100;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.5rem;
            }

            .timer-display {
                font-size: 3.5rem;
            }

            .btn {
                padding: 15px 40px;
                font-size: 1.2rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-btn">← 戻る</a>
    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>

    <div class="container">
        <h1>🎯 Perfect Stop</h1>
        <p class="subtitle">0.00秒ぴったりで止めろ！</p>

        <div class="timer-display" id="timerDisplay">5.00</div>

        <button class="btn btn-stop" id="stopBtn" disabled>ストップ！</button>
        <button class="btn btn-start" id="startBtn">スタート</button>

        <div class="result" id="result">
            <div class="result-title" id="resultTitle"></div>
            <div class="result-time" id="resultTime"></div>
            <div class="result-diff" id="resultDiff"></div>
        </div>

        <div class="stats">
            <div class="stats-title">📊 統計</div>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-label">回数</div>
                    <div class="stat-value" id="statCount">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">ベスト</div>
                    <div class="stat-value" id="statBest">-</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">平均</div>
                    <div class="stat-value" id="statAvg">-</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const timerDisplay = document.getElementById('timerDisplay');
        const stopBtn = document.getElementById('stopBtn');
        const startBtn = document.getElementById('startBtn');
        const result = document.getElementById('result');
        const resultTitle = document.getElementById('resultTitle');
        const resultTime = document.getElementById('resultTime');
        const resultDiff = document.getElementById('resultDiff');
        const statCount = document.getElementById('statCount');
        const statBest = document.getElementById('statBest');
        const statAvg = document.getElementById('statAvg');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let startTime = 0;
        let animationId = null;
        let isRunning = false;
        let stats = {
            count: 0,
            best: null,
            total: 0
        };

        // 統計をロード
        function loadStats() {
            const saved = localStorage.getItem('perfectStopStats');
            if (saved) {
                stats = JSON.parse(saved);
                updateStatsDisplay();
            }
        }

        // 統計を保存
        function saveStats() {
            localStorage.setItem('perfectStopStats', JSON.stringify(stats));
        }

        // 統計表示を更新
        function updateStatsDisplay() {
            statCount.textContent = stats.count;
            statBest.textContent = stats.best ? stats.best.toFixed(2) + 's' : '-';
            statAvg.textContent = stats.count > 0 ? (stats.total / stats.count).toFixed(2) + 's' : '-';
        }

        // タイマー更新
        function updateTimer() {
            const elapsed = (Date.now() - startTime) / 1000;
            const remaining = Math.max(0, 5 - elapsed);
            timerDisplay.textContent = remaining.toFixed(2);

            if (remaining <= 0) {
                stopGame();
            } else {
                animationId = requestAnimationFrame(updateTimer);
            }
        }

        // ゲーム開始
        function startGame() {
            isRunning = true;
            startTime = Date.now();
            timerDisplay.classList.remove('perfect', 'good', 'bad');
            result.classList.remove('show');
            stopBtn.disabled = false;
            startBtn.disabled = true;
            updateTimer();
        }

        // ゲーム停止
        function stopGame() {
            isRunning = false;
            cancelAnimationFrame(animationId);

            const elapsed = (Date.now() - startTime) / 1000;
            const finalTime = Math.max(0, 5 - elapsed);
            const diff = Math.abs(finalTime);

            // 結果表示
            timerDisplay.textContent = finalTime.toFixed(2);
            result.classList.add('show');
            resultTime.textContent = finalTime.toFixed(2) + '秒';

            // 評価
            if (diff < 0.05) {
                timerDisplay.classList.add('perfect');
                resultTitle.textContent = '🎉 完璧！';
                resultDiff.textContent = '誤差: ' + diff.toFixed(3) + '秒';
            } else if (diff < 0.15) {
                timerDisplay.classList.add('good');
                resultTitle.textContent = '👏 すごい！';
                resultDiff.textContent = '誤差: ' + diff.toFixed(3) + '秒';
            } else if (diff < 0.30) {
                timerDisplay.classList.add('good');
                resultTitle.textContent = '😊 いい感じ！';
                resultDiff.textContent = '誤差: ' + diff.toFixed(3) + '秒';
            } else {
                timerDisplay.classList.add('bad');
                resultTitle.textContent = '😅 もう一回！';
                resultDiff.textContent = '誤差: ' + diff.toFixed(3) + '秒';
            }

            // 統計更新
            stats.count++;
            stats.total += diff;
            if (stats.best === null || diff < stats.best) {
                stats.best = diff;
            }
            saveStats();
            updateStatsDisplay();

            stopBtn.disabled = true;
            startBtn.disabled = false;
        }

        // イベントリスナー
        startBtn.addEventListener('click', startGame);
        stopBtn.addEventListener('click', stopGame);

        // タップ/クリックで即座にストップ（モバイル向け）
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && isRunning) {
                e.preventDefault();
                stopGame();
            }
        });

        // 全画面ボタン
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                fullscreenBtn.textContent = '全画面解除';
            } else {
                document.exitFullscreen();
                fullscreenBtn.textContent = '全画面';
            }
        });

        // 全画面変更イベント
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                fullscreenBtn.textContent = '全画面';
            }
        });

        // 初期化
        loadStats();
    </script>
</body>
</html>
