<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Stop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .game-container {
            width: 90vw;
            max-width: 500px;
        }

        .title {
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #64c8ff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 15px;
            background: #111;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .score-item {
            text-align: center;
        }

        .score-label {
            color: #666;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .score-value {
            color: #64c8ff;
            font-size: 32px;
            font-weight: bold;
        }

        .score-value.best {
            color: #a855f7;
        }

        .bar-container {
            position: relative;
            width: 100%;
            height: 80px;
            background: #111;
            border-radius: 10px;
            border: 2px solid #333;
            overflow: hidden;
            margin-bottom: 30px;
            cursor: pointer;
            touch-action: manipulation;
        }

        .target-zone {
            position: absolute;
            top: 0;
            height: 100%;
            background: linear-gradient(180deg,
                rgba(100, 200, 255, 0.1) 0%,
                rgba(100, 200, 255, 0.3) 50%,
                rgba(100, 200, 255, 0.1) 100%);
            border-left: 2px solid #64c8ff;
            border-right: 2px solid #64c8ff;
            transition: all 0.3s ease;
        }

        .target-zone.perfect {
            background: linear-gradient(180deg,
                rgba(168, 85, 247, 0.3) 0%,
                rgba(168, 85, 247, 0.5) 50%,
                rgba(168, 85, 247, 0.3) 100%);
            border-left: 2px solid #a855f7;
            border-right: 2px solid #a855f7;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.5);
        }

        .cursor {
            position: absolute;
            top: 5px;
            bottom: 5px;
            width: 8px;
            background: linear-gradient(180deg, #64c8ff, #a855f7);
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(100, 200, 255, 0.8);
            transform: translateX(-50%);
        }

        .message {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
            min-height: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .message .main {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .message .main.perfect {
            color: #a855f7;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.8);
        }

        .message .main.good {
            color: #64c8ff;
        }

        .message .main.miss {
            color: #ef4444;
        }

        .message .sub {
            font-size: 12px;
            color: #666;
        }

        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #64c8ff, #a855f7);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(100, 200, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: #222;
            border: 1px solid #444;
            border-radius: 6px;
            color: #888;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .fullscreen-btn:hover {
            background: #333;
            color: #fff;
        }

        .instructions {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 20px;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 22px;
            }

            .score-value {
                font-size: 24px;
            }

            .bar-container {
                height: 60px;
            }

            .message .main {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <div class="title">Perfect Stop</div>

        <div class="score-board">
            <div class="score-item">
                <div class="score-label">スコア</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">ベスト</div>
                <div class="score-value best" id="bestScore">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">連続</div>
                <div class="score-value" id="streak">0</div>
            </div>
        </div>

        <div class="bar-container" id="barContainer">
            <div class="target-zone" id="targetZone"></div>
            <div class="cursor" id="cursor"></div>
        </div>

        <div class="message">
            <div class="main" id="mainMessage">準備完了</div>
            <div class="sub" id="subMessage">開始ボタンを押してね</div>
        </div>

        <button id="startBtn" onclick="startGame()">スタート</button>

        <div class="instructions">
            ターゲットゾーンに入った瞬間にタップ！<br>
            完璧なタイミングで止めてハイスコアを目指そう
        </div>
    </div>

    <script>
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('perfectStopBest')) || 0;
        let streak = 0;
        let gameRunning = false;
        let animationId = null;

        const barContainer = document.getElementById('barContainer');
        const targetZone = document.getElementById('targetZone');
        const cursor = document.getElementById('cursor');
        const startBtn = document.getElementById('startBtn');
        const scoreEl = document.getElementById('score');
        const bestScoreEl = document.getElementById('bestScore');
        const streakEl = document.getElementById('streak');
        const mainMessage = document.getElementById('mainMessage');
        const subMessage = document.getElementById('subMessage');

        let cursorPos = 0;
        let direction = 1;
        let speed = 0.8;
        let targetStart = 0;
        let targetWidth = 0;

        bestScoreEl.textContent = bestScore;

        function generateTarget() {
            const containerWidth = barContainer.clientWidth;
            const difficulty = Math.min(score * 0.02, 0.7);

            targetWidth = Math.max(15, 60 - score * 0.5);
            targetStart = Math.random() * (containerWidth - targetWidth);

            targetZone.style.left = targetStart + 'px';
            targetZone.style.width = targetWidth + 'px';

            targetZone.classList.remove('perfect');

            if (targetWidth < 25) {
                targetZone.classList.add('perfect');
            }

            speed = Math.min(0.8 + score * 0.005, 2.5);
        }

        function animate() {
            if (!gameRunning) return;

            cursorPos += speed * direction;

            const containerWidth = barContainer.clientWidth;

            if (cursorPos >= containerWidth) {
                cursorPos = containerWidth;
                direction = -1;
            } else if (cursorPos <= 0) {
                cursorPos = 0;
                direction = 1;
            }

            cursor.style.left = cursorPos + 'px';

            animationId = requestAnimationFrame(animate);
        }

        function checkStop() {
            if (!gameRunning) return;

            const cursorCenter = cursorPos;
            const targetEnd = targetStart + targetWidth;

            const distance = Math.abs(cursorCenter - (targetStart + targetWidth / 2));
            const zoneWidth = targetWidth / 2;

            if (distance <= zoneWidth) {
                const accuracy = 1 - (distance / zoneWidth);
                const points = Math.round(accuracy * 100);

                if (accuracy >= 0.9) {
                    score += 50;
                    streak++;
                    showMessage('Perfect!!', `+50ポイント (精度: ${Math.round(accuracy * 100)}%)`, 'perfect');
                } else if (accuracy >= 0.6) {
                    score += 20;
                    streak++;
                    showMessage('Good!', `+20ポイント (精度: ${Math.round(accuracy * 100)}%)`, 'good');
                } else {
                    score += 5;
                    streak++;
                    showMessage('OK', `+5ポイント (精度: ${Math.round(accuracy * 100)}%)`, 'good');
                }

                if (streak > 0 && streak % 5 === 0) {
                    score += streak * 10;
                    showMessage(`${streak}コンボ!!`, `+${streak * 10}ボーナス!`, 'perfect');
                }

                updateScore();
                generateTarget();
            } else {
                gameOver();
            }
        }

        function showMessage(main, sub, type = '') {
            mainMessage.textContent = main;
            subMessage.textContent = sub;
            mainMessage.className = 'main ' + type;
        }

        function updateScore() {
            scoreEl.textContent = score;
            streakEl.textContent = streak;

            if (score > bestScore) {
                bestScore = score;
                bestScoreEl.textContent = bestScore;
                localStorage.setItem('perfectStopBest', bestScore);
            }
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);

            showMessage('Game Over', `最終スコア: ${score}`, 'miss');

            if (score >= bestScore && score > 0) {
                subMessage.textContent = `🎉 新記録!! 最終スコア: ${score}`;
            }

            startBtn.textContent = 'もう一度';
            startBtn.disabled = false;
        }

        function startGame() {
            score = 0;
            streak = 0;
            cursorPos = 0;
            direction = 1;

            updateScore();
            generateTarget();

            showMessage('', 'ターゲットゾーンで止めて!', '');

            startBtn.disabled = true;
            startBtn.textContent = 'タップしてストップ!';
            gameRunning = true;

            animate();
        }

        barContainer.addEventListener('click', checkStop);
        barContainer.addEventListener('touchstart', (e) => {
            e.preventDefault();
            checkStop();
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', () => {
            if (gameRunning) {
                generateTarget();
            }
        });
    </script>
</body>
</html>
