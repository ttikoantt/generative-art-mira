<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ひらがなフラッシュ | Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            color: #fff;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        .header p {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .stat {
            text-align: center;
            color: #fff;
        }

        .stat-label {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .combo-meter {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .combo-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb);
            width: 0%;
            transition: width 0.1s;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .card {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
            overflow: hidden;
        }

        .card:active {
            transform: scale(0.95);
        }

        .card.tapped {
            animation: tapEffect 0.3s forwards;
        }

        .card.wrong {
            animation: wrongEffect 0.5s;
        }

        @keyframes tapEffect {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.2);
                opacity: 0.8;
            }
            100% {
                transform: scale(0);
                opacity: 0;
            }
        }

        @keyframes wrongEffect {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .card-character {
            font-size: 2rem;
            font-weight: 500;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .target-display {
            text-align: center;
            padding: 20px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .target-label {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 10px;
        }

        .target-character {
            font-size: 3rem;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 0 30px rgba(255,255,255,0.5);
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .start-screen, .game-over-screen {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .start-screen h2, .game-over-screen h2 {
            font-size: 2rem;
            color: #fff;
            margin-bottom: 20px;
            font-weight: 300;
        }

        .start-screen p, .game-over-screen p {
            color: rgba(255,255,255,0.7);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .final-score {
            font-size: 3rem;
            font-weight: 600;
            color: #feca57;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(254, 202, 87, 0.5);
        }

        .btn {
            padding: 15px 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.6);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            z-index: 1000;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .game-area {
            display: none;
        }

        .game-area.active {
            display: block;
        }

        .start-screen.active {
            display: block;
        }

        .start-screen.hidden,
        .game-over-screen.hidden {
            display: none;
        }

        .difficulty-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .difficulty-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }

        .difficulty-btn.active {
            background: rgba(255,255,255,0.3);
            border-color: rgba(255,255,255,0.5);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5rem;
            }
            .game-board {
                gap: 8px;
            }
            .card-character {
                font-size: 1.5rem;
            }
            .target-character {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <div class="header">
            <h1>ひらがなフラッシュ</h1>
            <p>Hiragana Flash - Tap Game</p>
        </div>

        <div class="start-screen active" id="startScreen">
            <h2>ひらがなフラッシュ</h2>
            <p>
                表示されたひらがなと同じ文字を<br>
                できるだけ速くタップしてください！<br>
                コンボを繋いでハイスコアを目指そう！
            </p>
            
            <div class="difficulty-selector">
                <button class="difficulty-btn active" onclick="setDifficulty('easy')">簡単</button>
                <button class="difficulty-btn" onclick="setDifficulty('normal')">普通</button>
                <button class="difficulty-btn" onclick="setDifficulty('hard')">難しい</button>
            </div>
            
            <button class="btn" onclick="startGame()">スタート</button>
        </div>

        <div class="game-area" id="gameArea">
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">スコア</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">時間</div>
                    <div class="stat-value" id="timer">60</div>
                </div>
                <div class="stat">
                    <div class="stat-label">コンボ</div>
                    <div class="stat-value" id="combo">0</div>
                </div>
            </div>

            <div class="combo-meter">
                <div class="combo-fill" id="comboFill"></div>
            </div>

            <div class="target-display">
                <div class="target-label">この文字をタップ！</div>
                <div class="target-character" id="targetCharacter">あ</div>
            </div>

            <div class="game-board" id="gameBoard"></div>
        </div>

        <div class="game-over-screen hidden" id="gameOverScreen">
            <h2>ゲーム終了！</h2>
            <p>お疲れ様でした！</p>
            <div class="final-score" id="finalScore">0</div>
            <p>最高スコア: <span id="highScore">0</span></p>
            <button class="btn" onclick="restartGame()">もう一度</button>
        </div>
    </div>

    <script>
        // ひらがなセット
        const hiraganaSets = {
            easy: 'あいうえおかきくけこさしすせそたちつてと',
            normal: 'あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろ',
            hard: 'あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをんがぎぐげござじずぜぞだぢづでどばびぶべぼぱぴぷぺぽ'
        };

        const GRID_SIZES = {
            easy: 15,
            normal: 20,
            hard: 25
        };

        let currentDifficulty = 'easy';
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let timeLeft = 60;
        let gameTimer;
        let currentTarget = '';
        let gameActive = false;
        let highScores = JSON.parse(localStorage.getItem('hiraganaFlashHighScores')) || {};

        function setDifficulty(difficulty) {
            currentDifficulty = difficulty;
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function generateGameBoard() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            
            const hiraganaSet = hiraganaSets[currentDifficulty];
            const gridSize = GRID_SIZES[currentDifficulty];
            
            // ターゲット文字を含む配列を作成
            let characters = [];
            
            // ターゲット文字を複数配置（難易度で変化）
            const targetCount = currentDifficulty === 'easy' ? 4 : currentDifficulty === 'normal' ? 3 : 2;
            for (let i = 0; i < targetCount; i++) {
                characters.push(currentTarget);
            }
            
            // 残りのマスを埋める
            while (characters.length < gridSize) {
                const randomChar = hiraganaSet[Math.floor(Math.random() * hiraganaSet.length)];
                if (randomChar !== currentTarget) {
                    characters.push(randomChar);
                }
            }
            
            // シャッフル
            characters = shuffleArray(characters);
            
            // カードを作成
            characters.forEach((char, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<span class="card-character">${char}</span>`;
                card.dataset.character = char;
                card.onclick = () => handleCardTap(card, char);
                board.appendChild(card);
            });
        }

        function setNewTarget() {
            const hiraganaSet = hiraganaSets[currentDifficulty];
            currentTarget = hiraganaSet[Math.floor(Math.random() * hiraganaSet.length)];
            document.getElementById('targetCharacter').textContent = currentTarget;
        }

        function handleCardTap(card, character) {
            if (!gameActive) return;
            
            if (character === currentTarget) {
                // 正解
                card.classList.add('tapped');
                combo++;
                maxCombo = Math.max(maxCombo, combo);
                
                // コンボボーナス
                const comboBonus = Math.floor(combo / 5) * 10;
                score += 10 + comboBonus;
                
                updateStats();
                
                // 新しいターゲットとボードを生成
                setTimeout(() => {
                    setNewTarget();
                    generateGameBoard();
                }, 150);
            } else {
                // 不正解
                card.classList.add('wrong');
                combo = 0;
                updateStats();
                setTimeout(() => {
                    card.classList.remove('wrong');
                }, 500);
            }
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;
            
            // コンボメーター更新
            const comboFill = document.getElementById('comboFill');
            const comboPercent = Math.min((combo / 20) * 100, 100);
            comboFill.style.width = comboPercent + '%';
        }

        function startGame() {
            document.getElementById('startScreen').classList.remove('active');
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameArea').classList.add('active');
            document.getElementById('gameOverScreen').classList.add('hidden');
            
            score = 0;
            combo = 0;
            maxCombo = 0;
            timeLeft = 60;
            gameActive = true;
            
            updateStats();
            document.getElementById('timer').textContent = timeLeft;
            
            setNewTarget();
            generateGameBoard();
            
            gameTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameActive = false;
            clearInterval(gameTimer);
            
            document.getElementById('gameArea').classList.remove('active');
            document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('finalScore').textContent = score;
            
            // ハイスコア更新
            if (!highScores[currentDifficulty] || score > highScores[currentDifficulty]) {
                highScores[currentDifficulty] = score;
                localStorage.setItem('hiraganaFlashHighScores', JSON.stringify(highScores));
            }
            
            document.getElementById('highScore').textContent = highScores[currentDifficulty] || 0;
        }

        function restartGame() {
            document.getElementById('gameOverScreen').classList.add('hidden');
            startGame();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !gameActive) {
                startGame();
            }
        });
    </script>
</body>
</html>
