<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quick Math - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 500px;
            width: 100%;
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            color: white;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px 25px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .info-label {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 28px;
            font-weight: bold;
        }

        .question-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .question {
            font-size: 48px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .answer-input {
            width: 100%;
            padding: 15px;
            font-size: 32px;
            text-align: center;
            border: 3px solid #ddd;
            border-radius: 10px;
            outline: none;
            transition: all 0.3s ease;
        }

        .answer-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .answer-input.correct {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        .answer-input.wrong {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .combo-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            font-weight: bold;
            color: #fbbf24;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.8);
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .combo-display.show {
            opacity: 1;
            animation: comboPop 0.5s ease;
        }

        @keyframes comboPop {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }

        .start-screen, .end-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .screen-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
        }

        .screen-title {
            font-size: 36px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .screen-description {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .stats {
            margin: 20px 0;
            padding: 20px;
            background: #f3f4f6;
            border-radius: 10px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 16px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">全画面表示</button>

    <div class="container">
        <div class="game-info">
            <div class="info-box">
                <div class="info-label">スコア</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-box">
                <div class="info-label">時間</div>
                <div class="info-value" id="timer">60</div>
            </div>
            <div class="info-box">
                <div class="info-label">コンボ</div>
                <div class="info-value" id="combo">0</div>
            </div>
        </div>

        <div class="question-box">
            <div class="question" id="question">2 + 3 = ?</div>
            <input type="number" class="answer-input" id="answer" placeholder="答えを入力" autofocus>
        </div>
    </div>

    <div class="combo-display" id="comboDisplay">COMBO x2!</div>

    <div class="start-screen" id="startScreen">
        <div class="screen-content">
            <div class="screen-title">Quick Math</div>
            <div class="screen-description">
                簡単な計算問題に素早く答えるゲーム！<br><br>
                • 60秒の制限時間<br>
                • 連続正解でコンボボーナス<br>
                • 難易度は徐々に上昇<br><br>
                準備はいい？
            </div>
            <button class="btn" id="startBtn">スタート</button>
        </div>
    </div>

    <div class="end-screen hidden" id="endScreen">
        <div class="screen-content">
            <div class="screen-title">ゲーム終了！</div>
            <div class="stats">
                <div class="stat-row">
                    <span>最終スコア:</span>
                    <span id="finalScore">0</span>
                </div>
                <div class="stat-row">
                    <span>正解数:</span>
                    <span id="correctCount">0</span>
                </div>
                <div class="stat-row">
                    <span>最大コンボ:</span>
                    <span id="maxCombo">0</span>
                </div>
                <div class="stat-row">
                    <span>ハイスコア:</span>
                    <span id="highScore">0</span>
                </div>
            </div>
            <button class="btn" id="restartBtn">もう一度</button>
        </div>
    </div>

    <script>
        const canvas = document;
        const startScreen = document.getElementById('startScreen');
        const endScreen = document.getElementById('endScreen');
        const questionEl = document.getElementById('question');
        const answerInput = document.getElementById('answer');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const comboEl = document.getElementById('combo');
        const comboDisplay = document.getElementById('comboDisplay');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let score = 0;
        let timeLeft = 60;
        let combo = 0;
        let maxCombo = 0;
        let correctAnswers = 0;
        let currentAnswer = 0;
        let difficulty = 1;
        let gameTimer = null;
        let gameActive = false;

        const highScore = localStorage.getItem('quickMathHighScore') || 0;

        function generateQuestion() {
            const operations = ['+', '-', '×'];
            const operation = operations[Math.floor(Math.random() * operations.length)];
            
            let num1, num2;
            
            if (operation === '+') {
                num1 = Math.floor(Math.random() * (10 * difficulty)) + 1;
                num2 = Math.floor(Math.random() * (10 * difficulty)) + 1;
                currentAnswer = num1 + num2;
            } else if (operation === '-') {
                num1 = Math.floor(Math.random() * (10 * difficulty)) + 5;
                num2 = Math.floor(Math.random() * num1);
                currentAnswer = num1 - num2;
            } else {
                num1 = Math.floor(Math.random() * (5 * difficulty)) + 1;
                num2 = Math.floor(Math.random() * (5 * difficulty)) + 1;
                currentAnswer = num1 * num2;
            }
            
            questionEl.textContent = `${num1} ${operation} ${num2} = ?`;
            answerInput.value = '';
            answerInput.focus();
        }

        function checkAnswer() {
            const userAnswer = parseInt(answerInput.value);
            
            if (userAnswer === currentAnswer) {
                // 正解
                combo++;
                if (combo > maxCombo) maxCombo = combo;
                correctAnswers++;
                
                const comboBonus = Math.floor(combo / 3) * 5;
                const baseScore = 10 + Math.floor(difficulty * 2);
                score += baseScore + comboBonus;
                
                if (combo >= 3) {
                    showComboDisplay();
                }
                
                answerInput.classList.remove('wrong');
                answerInput.classList.add('correct');
                setTimeout(() => answerInput.classList.remove('correct'), 300);
                
                // 難易度を上げる
                if (correctAnswers % 5 === 0 && difficulty < 5) {
                    difficulty++;
                }
                
                updateDisplay();
                generateQuestion();
            } else {
                // 不正解
                combo = 0;
                answerInput.classList.remove('correct');
                answerInput.classList.add('wrong');
                setTimeout(() => answerInput.classList.remove('wrong'), 300);
                updateDisplay();
            }
        }

        function showComboDisplay() {
            comboDisplay.textContent = `COMBO x${combo}!`;
            comboDisplay.classList.add('show');
            setTimeout(() => comboDisplay.classList.remove('show'), 500);
        }

        function updateDisplay() {
            scoreEl.textContent = score;
            timerEl.textContent = timeLeft;
            comboEl.textContent = combo;
        }

        function startGame() {
            score = 0;
            timeLeft = 60;
            combo = 0;
            maxCombo = 0;
            correctAnswers = 0;
            difficulty = 1;
            gameActive = true;
            
            startScreen.classList.add('hidden');
            endScreen.classList.add('hidden');
            
            updateDisplay();
            generateQuestion();
            
            gameTimer = setInterval(() => {
                timeLeft--;
                timerEl.textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameActive = false;
            clearInterval(gameTimer);
            
            // ハイスコア更新
            if (score > highScore) {
                localStorage.setItem('quickMathHighScore', score);
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('correctCount').textContent = correctAnswers;
            document.getElementById('maxCombo').textContent = maxCombo;
            document.getElementById('highScore').textContent = Math.max(score, highScore);
            
            endScreen.classList.remove('hidden');
        }

        // イベントリスナー
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        answerInput.addEventListener('input', () => {
            if (answerInput.value !== '') {
                checkAnswer();
            }
        });

        // Enterキー対応
        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        // 全画面表示
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                fullscreenBtn.textContent = '全画面を終了';
            } else {
                document.exitFullscreen();
                fullscreenBtn.textContent = '全画面表示';
            }
        });

        // タッチ対応
        answerInput.addEventListener('touchstart', (e) => {
            e.target.focus();
        });
    </script>
</body>
</html>
