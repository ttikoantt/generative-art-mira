<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Math Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat {
            text-align: center;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 15px 25px;
            border-radius: 15px;
            color: white;
            min-width: 120px;
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.9;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .question-area {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .question {
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .timer-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #8bc34a);
            transition: width 0.1s linear;
        }

        .answer-input {
            width: 100%;
            padding: 15px;
            font-size: 1.5rem;
            border: 3px solid #ddd;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .answer-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .answer-input.correct {
            border-color: #4caf50;
            background: #e8f5e9;
        }

        .answer-input.wrong {
            border-color: #f44336;
            background: #ffebee;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            padding: 15px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            min-width: 120px;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .difficulty-btn {
            background: #e0e0e0;
            color: #333;
            padding: 10px 20px;
            font-size: 0.9rem;
        }

        .difficulty-btn.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .feedback {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 30px;
            margin-bottom: 10px;
        }

        .feedback.correct {
            color: #4caf50;
        }

        .feedback.wrong {
            color: #f44336;
        }

        .start-screen {
            text-align: center;
        }

        .start-screen h2 {
            margin-bottom: 20px;
            color: #555;
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            margin-top: 10px;
        }

        @media (max-width: 480px) {
            .game-container {
                padding: 20px;
            }

            .stats {
                flex-direction: column;
            }

            .stat {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🔢 Quick Math</h1>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">連続正解</div>
                <div class="stat-value" id="streak">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">最高記録</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>

        <div id="gameArea" style="display: none;">
            <div class="question-area">
                <div class="question" id="question">2 + 3 = ?</div>
                <div class="timer-bar">
                    <div class="timer-fill" id="timerFill"></div>
                </div>
                <input type="number" class="answer-input" id="answerInput" placeholder="答えを入力" autocomplete="off">
            </div>
            <div class="feedback" id="feedback"></div>
            <div class="button-group">
                <button class="start-btn" onclick="submitAnswer()">回答</button>
                <button class="start-btn" onclick="endGame()">終了</button>
            </div>
        </div>

        <div id="startScreen" class="start-screen">
            <h2>難易度を選択</h2>
            <div class="button-group">
                <button class="difficulty-btn active" onclick="setDifficulty('easy')">簡単</button>
                <button class="difficulty-btn" onclick="setDifficulty('medium')">普通</button>
                <button class="difficulty-btn" onclick="setDifficulty('hard')">難しい</button>
            </div>
            <p style="margin: 20px 0; color: #666;">制限時間内に計算問題を解いてスコアを稼ごう！</p>
            <button class="start-btn" onclick="startGame()" style="width: 100%;">スタート</button>
        </div>

        <div id="gameOver" style="display: none; text-align: center;">
            <h2>ゲーム終了！</h2>
            <p style="font-size: 1.5rem; margin: 20px 0;">最終スコア: <strong id="finalScore">0</strong></p>
            <p style="color: #666;" id="gameOverMessage"></p>
            <button class="start-btn" onclick="showStartScreen()" style="width: 100%;">もう一度</button>
        </div>

        <button class="fullscreen-btn" onclick="toggleFullscreen()" style="width: 100%;">全画面表示</button>
    </div>

    <script>
        let score = 0;
        let streak = 0;
        let highScore = localStorage.getItem('quickMathHighScore') || 0;
        let difficulty = 'easy';
        let currentQuestion = {};
        let timer = null;
        let timeLeft = 0;
        let gameActive = false;

        const difficultySettings = {
            easy: { time: 10, operations: ['+', '-'], range: 10 },
            medium: { time: 8, operations: ['+', '-', '×'], range: 20 },
            hard: { time: 6, operations: ['+', '-', '×', '÷'], range: 50 }
        };

        document.getElementById('highScore').textContent = highScore;

        function setDifficulty(level) {
            difficulty = level;
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function generateQuestion() {
            const settings = difficultySettings[difficulty];
            const operation = settings.operations[Math.floor(Math.random() * settings.operations.length)];
            let a, b, answer;

            switch(operation) {
                case '+':
                    a = Math.floor(Math.random() * settings.range) + 1;
                    b = Math.floor(Math.random() * settings.range) + 1;
                    answer = a + b;
                    break;
                case '-':
                    a = Math.floor(Math.random() * settings.range) + 1;
                    b = Math.floor(Math.random() * a);
                    answer = a - b;
                    break;
                case '×':
                    a = Math.floor(Math.random() * 12) + 1;
                    b = Math.floor(Math.random() * 12) + 1;
                    answer = a * b;
                    break;
                case '÷':
                    b = Math.floor(Math.random() * 12) + 1;
                    answer = Math.floor(Math.random() * 12) + 1;
                    a = b * answer;
                    break;
            }

            currentQuestion = {
                text: `${a} ${operation} ${b} = ?`,
                answer: answer
            };

            document.getElementById('question').textContent = currentQuestion.text;
        }

        function startTimer() {
            const settings = difficultySettings[difficulty];
            timeLeft = settings.time;
            
            timer = setInterval(() => {
                timeLeft -= 0.1;
                const percentage = (timeLeft / settings.time) * 100;
                document.getElementById('timerFill').style.width = percentage + '%';

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    handleWrongAnswer();
                    nextQuestion();
                }
            }, 100);
        }

        function submitAnswer() {
            if (!gameActive) return;
            
            const userAnswer = parseInt(document.getElementById('answerInput').value);
            const input = document.getElementById('answerInput');
            const feedback = document.getElementById('feedback');

            if (userAnswer === currentQuestion.answer) {
                handleCorrectAnswer();
            } else {
                handleWrongAnswer();
            }

            input.value = '';
            setTimeout(nextQuestion, 500);
        }

        function handleCorrectAnswer() {
            const input = document.getElementById('answerInput');
            const feedback = document.getElementById('feedback');
            
            input.classList.add('correct');
            feedback.textContent = '⭕ 正解！';
            feedback.className = 'feedback correct';

            streak++;
            const bonus = Math.min(streak, 10);
            score += 10 + bonus * 2;

            updateStats();
        }

        function handleWrongAnswer() {
            const input = document.getElementById('answerInput');
            const feedback = document.getElementById('feedback');
            
            input.classList.add('wrong');
            feedback.textContent = `❌ 不正解！答えは ${currentQuestion.answer}`;
            feedback.className = 'feedback wrong';
            streak = 0;

            updateStats();
        }

        function nextQuestion() {
            document.getElementById('answerInput').classList.remove('correct', 'wrong');
            document.getElementById('feedback').textContent = '';
            
            clearInterval(timer);
            generateQuestion();
            startTimer();
            document.getElementById('answerInput').focus();
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('quickMathHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
        }

        function startGame() {
            score = 0;
            streak = 0;
            gameActive = true;
            
            updateStats();
            
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('gameArea').style.display = 'block';
            
            generateQuestion();
            startTimer();
            document.getElementById('answerInput').focus();
        }

        function endGame() {
            gameActive = false;
            clearInterval(timer);
            
            document.getElementById('gameArea').style.display = 'none';
            document.getElementById('gameOver').style.display = 'block';
            document.getElementById('finalScore').textContent = score;

            let message = '';
            if (score >= 100) {
                message = '🎉 素晴らしい！数学の達人！';
            } else if (score >= 50) {
                message = '👍 とてもいい調子！';
            } else if (score >= 20) {
                message = '💪 もっと頑張れる！';
            } else {
                message = '📚 練習あるのみ！';
            }
            document.getElementById('gameOverMessage').textContent = message;
        }

        function showStartScreen() {
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('startScreen').style.display = 'block';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Enterキーで回答
        document.getElementById('answerInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                submitAnswer();
            }
        });
    </script>
</body>
</html>
