<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Math Challenge | クイック数学チャレンジ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 90%;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .game-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            flex-wrap: wrap;
            gap: 20px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            margin-top: 5px;
        }

        .problem-container {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(123, 44, 191, 0.2));
            padding: 40px;
            border-radius: 20px;
            margin: 30px 0;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.3);
        }

        .problem {
            font-size: 48px;
            font-weight: 700;
            margin: 20px 0;
            text-shadow: 0 2px 20px rgba(0, 212, 255, 0.5);
        }

        .answer-input {
            width: 100%;
            max-width: 300px;
            padding: 20px;
            font-size: 32px;
            text-align: center;
            border: none;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.95);
            color: #1a1a2e;
            font-weight: 700;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .answer-input:focus {
            transform: scale(1.05);
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.4);
        }

        .timer-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border-radius: 4px;
            transition: width 0.1s linear;
        }

        .btn {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 10px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            color: white;
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.6);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            font-weight: 900;
            text-shadow: 0 5px 30px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .feedback.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.5);
        }

        .feedback.correct {
            color: #00ff88;
            text-shadow: 0 5px 30px rgba(0, 255, 136, 0.7);
        }

        .feedback.wrong {
            color: #ff4757;
            text-shadow: 0 5px 30px rgba(255, 71, 87, 0.7);
        }

        .difficulty-selector {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .difficulty-btn {
            padding: 15px 30px;
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .difficulty-btn:hover, .difficulty-btn.active {
            background: rgba(255, 255, 255, 0.2);
            border-color: #00d4ff;
            transform: scale(1.05);
        }

        .high-scores {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
        }

        .high-score-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .high-score-item:last-child {
            border-bottom: none;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
                width: 95%;
            }

            .game-title {
                font-size: 24px;
            }

            .problem {
                font-size: 36px;
            }

            .answer-input {
                font-size: 24px;
                padding: 15px;
            }

            .stat-value {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="feedback" id="feedback"></div>

    <!-- Start Screen -->
    <div class="screen active" id="startScreen">
        <div class="container">
            <div class="game-title">🧮 Quick Math Challenge</div>
            <p style="margin: 20px 0; opacity: 0.8;">制限時間内で計算問題を解こう！</p>

            <div class="difficulty-selector">
                <button class="difficulty-btn active" data-difficulty="easy">
                    😊 Easy<br>
                    <small>足し算・引き算</small>
                </button>
                <button class="difficulty-btn" data-difficulty="medium">
                    🤔 Medium<br>
                    <small>掛け算追加</small>
                </button>
                <button class="difficulty-btn" data-difficulty="hard">
                    🔥 Hard<br>
                    <small>割り算追加</small>
                </button>
                <button class="difficulty-btn" data-difficulty="extreme">
                    💀 Extreme<br>
                    <small>全ての演算</small>
                </button>
            </div>

            <button class="btn btn-primary" onclick="startGame()">スタート</button>

            <div class="high-scores">
                <h3 style="margin-bottom: 15px;">🏆 ハイスコア</h3>
                <div id="highScoresList"></div>
            </div>
        </div>
    </div>

    <!-- Game Screen -->
    <div class="screen" id="gameScreen">
        <div class="container">
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">スコア</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">連続正解</div>
                    <div class="stat-value" id="streak">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">残り時間</div>
                    <div class="stat-value" id="timeLeft">60</div>
                </div>
            </div>

            <div class="timer-bar">
                <div class="timer-fill" id="timerFill"></div>
            </div>

            <div class="problem-container">
                <div class="problem" id="problem">2 + 2 = ?</div>
            </div>

            <input type="number" class="answer-input" id="answerInput" placeholder="答え" autocomplete="off">
        </div>
    </div>

    <!-- Result Screen -->
    <div class="screen" id="resultScreen">
        <div class="container">
            <div class="game-title">🎉 ゲーム終了！</div>

            <div class="stats">
                <div class="stat">
                    <div class="stat-label">最終スコア</div>
                    <div class="stat-value" id="finalScore">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">正解数</div>
                    <div class="stat-value" id="correctAnswers">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">最高連続</div>
                    <div class="stat-value" id="maxStreak">0</div>
                </div>
            </div>

            <div style="margin: 30px 0;">
                <div id="newRecord" style="display: none; color: #00ff88; font-size: 24px; margin: 20px 0;">
                    🎊 新記録達成！ 🎊
                </div>
            </div>

            <button class="btn btn-primary" onclick="showStartScreen()">もう一度プレイ</button>
        </div>
    </div>

    <script>
        // Game State
        let score = 0;
        let streak = 0;
        let maxStreak = 0;
        let correctCount = 0;
        let timeLeft = 60;
        let currentAnswer = 0;
        let gameTimer = null;
        let difficulty = 'easy';

        // Difficulty Settings
        const difficultySettings = {
            easy: { operations: ['+', '-'], max: 20, time: 60 },
            medium: { operations: ['+', '-', '×'], max: 12, time: 60 },
            hard: { operations: ['+', '-', '×', '÷'], max: 12, time: 60 },
            extreme: { operations: ['+', '-', '×', '÷'], max: 20, time: 45 }
        };

        // DOM Elements
        const screens = {
            start: document.getElementById('startScreen'),
            game: document.getElementById('gameScreen'),
            result: document.getElementById('resultScreen')
        };

        const elements = {
            score: document.getElementById('score'),
            streak: document.getElementById('streak'),
            timeLeft: document.getElementById('timeLeft'),
            timerFill: document.getElementById('timerFill'),
            problem: document.getElementById('problem'),
            answerInput: document.getElementById('answerInput'),
            feedback: document.getElementById('feedback'),
            finalScore: document.getElementById('finalScore'),
            correctAnswers: document.getElementById('correctAnswers'),
            maxStreak: document.getElementById('maxStreak'),
            newRecord: document.getElementById('newRecord'),
            highScoresList: document.getElementById('highScoresList')
        };

        // High Scores
        function getHighScores() {
            const scores = localStorage.getItem('mathChallengeScores');
            return scores ? JSON.parse(scores) : { easy: 0, medium: 0, hard: 0, extreme: 0 };
        }

        function saveHighScore(diff, score) {
            const scores = getHighScores();
            if (score > scores[diff]) {
                scores[diff] = score;
                localStorage.setItem('mathChallengeScores', JSON.stringify(scores));
                return true;
            }
            return false;
        }

        function updateHighScoresDisplay() {
            const scores = getHighScores();
            const difficulties = ['easy', 'medium', 'hard', 'extreme'];
            const labels = { easy: '😊 Easy', medium: '🤔 Medium', hard: '🔥 Hard', extreme: '💀 Extreme' };

            elements.highScoresList.innerHTML = difficulties.map(diff => `
                <div class="high-score-item">
                    <span>${labels[diff]}</span>
                    <span>${scores[diff]} 点</span>
                </div>
            `).join('');
        }

        // Screen Management
        function showScreen(screenName) {
            Object.values(screens).forEach(screen => screen.classList.remove('active'));
            screens[screenName].classList.add('active');
        }

        function showStartScreen() {
            showScreen('start');
            updateHighScoresDisplay();
        }

        // Problem Generation
        function generateProblem() {
            const settings = difficultySettings[difficulty];
            const operation = settings.operations[Math.floor(Math.random() * settings.operations.length)];
            let num1, num2, answer;

            switch (operation) {
                case '+':
                    num1 = Math.floor(Math.random() * settings.max) + 1;
                    num2 = Math.floor(Math.random() * settings.max) + 1;
                    answer = num1 + num2;
                    break;
                case '-':
                    num1 = Math.floor(Math.random() * settings.max) + 2;
                    num2 = Math.floor(Math.random() * (num1 - 1)) + 1;
                    answer = num1 - num2;
                    break;
                case '×':
                    num1 = Math.floor(Math.random() * settings.max) + 1;
                    num2 = Math.floor(Math.random() * settings.max) + 1;
                    answer = num1 * num2;
                    break;
                case '÷':
                    num2 = Math.floor(Math.random() * (settings.max - 2)) + 2;
                    answer = Math.floor(Math.random() * settings.max) + 1;
                    num1 = num2 * answer;
                    break;
            }

            currentAnswer = answer;
            elements.problem.textContent = `${num1} ${operation} ${num2} = ?`;
            elements.answerInput.value = '';
            elements.answerInput.focus();
        }

        // Feedback
        function showFeedback(correct) {
            const feedback = elements.feedback;
            feedback.textContent = correct ? '◯' : '×';
            feedback.className = `feedback ${correct ? 'correct' : 'wrong'} show`;
            setTimeout(() => {
                feedback.classList.remove('show');
            }, 500);
        }

        // Game Logic
        function checkAnswer() {
            const userAnswer = parseInt(elements.answerInput.value);
            if (isNaN(userAnswer)) return;

            if (userAnswer === currentAnswer) {
                // Correct
                const basePoints = 10;
                const streakBonus = Math.floor(streak / 5) * 5;
                const difficultyBonus = { easy: 1, medium: 2, hard: 3, extreme: 5 }[difficulty];
                score += basePoints + streakBonus + difficultyBonus;

                streak++;
                correctCount++;
                if (streak > maxStreak) maxStreak = streak;

                showFeedback(true);
            } else {
                // Wrong
                streak = 0;
                showFeedback(false);
            }

            updateUI();
            generateProblem();
        }

        function updateUI() {
            elements.score.textContent = score;
            elements.streak.textContent = streak;

            const totalTime = difficultySettings[difficulty].time;
            const percent = (timeLeft / totalTime) * 100;
            elements.timerFill.style.width = `${percent}%`;

            if (percent < 20) {
                elements.timerFill.style.background = 'linear-gradient(90deg, #ff4757, #ff6b81)';
            } else {
                elements.timerFill.style.background = 'linear-gradient(90deg, #00d4ff, #7b2cbf)';
            }
        }

        function startGame() {
            score = 0;
            streak = 0;
            maxStreak = 0;
            correctCount = 0;
            timeLeft = difficultySettings[difficulty].time;

            showScreen('game');
            generateProblem();
            updateUI();

            gameTimer = setInterval(() => {
                timeLeft--;
                elements.timeLeft.textContent = timeLeft;
                updateUI();

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            clearInterval(gameTimer);

            elements.finalScore.textContent = score;
            elements.correctAnswers.textContent = correctCount;
            elements.maxStreak.textContent = maxStreak;

            const isNewRecord = saveHighScore(difficulty, score);
            elements.newRecord.style.display = isNewRecord ? 'block' : 'none';

            showScreen('result');
        }

        // Event Listeners
        elements.answerInput.addEventListener('input', (e) => {
            const value = e.target.value;
            if (value && !isNaN(value)) {
                checkAnswer();
            }
        });

        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                difficulty = btn.dataset.difficulty;
            });
        });

        // Keyboard shortcut
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && screens.game.classList.contains('active')) {
                checkAnswer();
            }
            if (e.key === 'f' || e.key === 'F') {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    document.exitFullscreen();
                }
            }
        });

        // Initialize
        showStartScreen();
    </script>
</body>
</html>
