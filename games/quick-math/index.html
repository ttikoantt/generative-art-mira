<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Math Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            color: #4ecdc4;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            gap: 15px;
        }

        .stat {
            background: rgba(78, 205, 196, 0.1);
            padding: 15px;
            border-radius: 10px;
            flex: 1;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #4ecdc4;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 5px;
        }

        .problem {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            margin: 20px 0;
            border: 2px solid rgba(78, 205, 196, 0.3);
        }

        .expression {
            font-size: 48px;
            color: #fff;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .timer {
            font-size: 24px;
            color: #ffe66d;
            margin-top: 15px;
        }

        .timer.warning {
            color: #ff6b6b;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .answer-input {
            width: 100%;
            padding: 15px;
            font-size: 24px;
            text-align: center;
            border: 2px solid rgba(78, 205, 196, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            margin: 20px 0;
            outline: none;
            transition: all 0.3s;
        }

        .answer-input:focus {
            border-color: #4ecdc4;
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.2);
        }

        .btn {
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(78, 205, 196, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(78, 205, 196, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
        }

        .feedback {
            font-size: 24px;
            margin: 20px 0;
            min-height: 35px;
            font-weight: bold;
        }

        .feedback.correct {
            color: #4ecdc4;
        }

        .feedback.wrong {
            color: #ff6b6b;
        }

        .game-over {
            display: none;
        }

        .game-over.active {
            display: block;
        }

        .game-over h2 {
            color: #ffe66d;
            margin-bottom: 20px;
            font-size: 36px;
        }

        .final-score {
            font-size: 72px;
            color: #4ecdc4;
            margin: 20px 0;
            font-weight: bold;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(78, 205, 196, 0.2);
            border: 1px solid rgba(78, 205, 196, 0.3);
            color: #4ecdc4;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(78, 205, 196, 0.3);
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .expression {
                font-size: 36px;
            }

            .stat-value {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <div class="container">
        <h1>⚡ Quick Math</h1>

        <div id="game-screen">
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="score">0</div>
                    <div class="stat-label">Score</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="streak">0</div>
                    <div class="stat-label">Streak</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="best">0</div>
                    <div class="stat-label">Best</div>
                </div>
            </div>

            <div class="problem">
                <div class="expression" id="expression">2 + 3 = ?</div>
                <div class="timer" id="timer">10.0s</div>
            </div>

            <input type="number" class="answer-input" id="answer" placeholder="答えを入力..." autocomplete="off">

            <div>
                <button class="btn" onclick="checkAnswer()">Answer</button>
                <button class="btn btn-secondary" onclick="skipProblem()">Skip</button>
            </div>

            <div class="feedback" id="feedback"></div>
        </div>

        <div class="game-over" id="game-over">
            <h2>⏰ Game Over!</h2>
            <div>Final Score</div>
            <div class="final-score" id="final-score">0</div>
            <div style="color: rgba(255,255,255,0.7); margin-bottom: 20px;">
                Best Streak: <span id="final-streak">0</span>
            </div>
            <button class="btn" onclick="startGame()">Play Again</button>
        </div>
    </div>

    <script>
        let score = 0;
        let streak = 0;
        let bestStreak = 0;
        let currentAnswer = 0;
        let timeLeft = 10;
        let timerInterval = null;
        let gameActive = false;

        const answerInput = document.getElementById('answer');
        const feedbackEl = document.getElementById('feedback');
        const gameScreen = document.getElementById('game-screen');
        const gameOverScreen = document.getElementById('game-over');

        // Load best streak from localStorage
        const savedBest = localStorage.getItem('quickMathBest');
        if (savedBest) {
            bestStreak = parseInt(savedBest);
            document.getElementById('best').textContent = bestStreak;
        }

        function generateProblem() {
            const operations = ['+', '-', '×'];
            const operation = operations[Math.floor(Math.random() * operations.length)];
            let a, b;

            switch (operation) {
                case '+':
                    a = Math.floor(Math.random() * 20) + 1;
                    b = Math.floor(Math.random() * 20) + 1;
                    currentAnswer = a + b;
                    break;
                case '-':
                    a = Math.floor(Math.random() * 20) + 10;
                    b = Math.floor(Math.random() * a);
                    currentAnswer = a - b;
                    break;
                case '×':
                    a = Math.floor(Math.random() * 10) + 1;
                    b = Math.floor(Math.random() * 10) + 1;
                    currentAnswer = a * b;
                    break;
            }

            document.getElementById('expression').textContent = `${a} ${operation} ${b} = ?`;
            answerInput.value = '';
            answerInput.focus();
        }

        function checkAnswer() {
            if (!gameActive) return;

            const userAnswer = parseInt(answerInput.value);

            if (userAnswer === currentAnswer) {
                // Correct!
                score += 10 + streak * 2;
                streak++;

                if (streak > bestStreak) {
                    bestStreak = streak;
                    localStorage.setItem('quickMathBest', bestStreak);
                }

                updateStats();
                feedbackEl.textContent = '✓ Correct!';
                feedbackEl.className = 'feedback correct';

                // Add bonus time
                timeLeft = Math.min(timeLeft + 2, 10);

                setTimeout(() => {
                    feedbackEl.textContent = '';
                    generateProblem();
                }, 500);
            } else {
                // Wrong!
                streak = 0;
                updateStats();
                feedbackEl.textContent = `✗ Wrong! Answer: ${currentAnswer}`;
                feedbackEl.className = 'feedback wrong';

                // Penalty
                timeLeft -= 3;

                setTimeout(() => {
                    feedbackEl.textContent = '';
                    generateProblem();
                }, 1000);
            }
        }

        function skipProblem() {
            if (!gameActive) return;

            streak = 0;
            updateStats();
            timeLeft -= 2;
            generateProblem();
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('best').textContent = bestStreak;
        }

        function updateTimer() {
            const timerEl = document.getElementById('timer');
            timerEl.textContent = `${timeLeft.toFixed(1)}s`;

            if (timeLeft <= 3) {
                timerEl.classList.add('warning');
            } else {
                timerEl.classList.remove('warning');
            }

            timeLeft -= 0.1;

            if (timeLeft <= 0) {
                gameOver();
            }
        }

        function gameOver() {
            gameActive = false;
            clearInterval(timerInterval);

            document.getElementById('final-score').textContent = score;
            document.getElementById('final-streak').textContent = bestStreak;

            gameScreen.style.display = 'none';
            gameOverScreen.classList.add('active');
        }

        function startGame() {
            score = 0;
            streak = 0;
            timeLeft = 10;
            gameActive = true;

            updateStats();

            gameScreen.style.display = 'block';
            gameOverScreen.classList.remove('active');

            generateProblem();

            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 100);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Enter key to submit
        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        // Start game on load
        startGame();
    </script>
</body>
</html>
