<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dot Connector - ミラのゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            color: white;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255,255,255,0.15);
            padding: 10px 20px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            color: rgba(255,255,255,0.7);
            font-size: clamp(0.7rem, 1.5vw, 0.85rem);
            margin-bottom: 5px;
        }

        .stat-value {
            color: white;
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: bold;
        }

        #game-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin: 15px 0;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        #game-board {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .dot {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: 3px solid rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.8rem, 2vw, 1.2rem);
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .dot:hover {
            transform: scale(1.1);
        }

        .dot.selected {
            transform: scale(1.15);
            box-shadow: 0 0 20px rgba(255,255,255,0.6);
        }

        .dot.connected {
            opacity: 0.3;
        }

        .dot.red { background: linear-gradient(135deg, #ff6b6b, #ee5a6f); }
        .dot.blue { background: linear-gradient(135deg, #4ecdc4, #44a08d); }
        .dot.green { background: linear-gradient(135deg, #a8e6cf, #56ab2f); }
        .dot.yellow { background: linear-gradient(135deg, #ffd93d, #f6c23e); }
        .dot.purple { background: linear-gradient(135deg, #c44dff, #9d4edd); }
        .dot.orange { background: linear-gradient(135deg, #ff9f43, #ff6b6b); }
        .dot.pink { background: linear-gradient(135deg, #ff6b9d, #c44569); }
        .dot.cyan { background: linear-gradient(135deg, #00d2ff, #3a7bd5); }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: clamp(0.8rem, 2vw, 1rem);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            backdrop-filter: blur(10px);
        }

        button:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            background: rgba(255,255,255,0.15);
        }

        .info {
            color: rgba(255,255,255,0.7);
            font-size: clamp(0.7rem, 1.5vw, 0.85rem);
            margin-top: 15px;
            line-height: 1.6;
        }

        #message {
            color: #ffd93d;
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            margin-bottom: 15px;
            min-height: 1.5em;
            font-weight: bold;
        }

        @media (max-width: 480px) {
            #game-board {
                grid-template-columns: repeat(5, 1fr);
                gap: 6px;
            }

            .dot {
                border-width: 2px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔵 Dot Connector</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">レベル</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">タイム</div>
                <div class="stat-value" id="time">60</div>
            </div>
        </div>

        <div id="message"></div>

        <div id="game-container">
            <div id="game-board"></div>
        </div>

        <div class="controls">
            <button onclick="startGame()">スタート</button>
            <button onclick="resetGame()">リセット</button>
            <button onclick="toggleFullscreen()" class="fullscreen-btn">全画面</button>
        </div>

        <p class="info">
            同じ色のドットを素早く繋げて消しましょう！<br>
            連鎖で高得点！
        </p>
    </div>

    <script>
        const board = document.getElementById('game-board');
        const levelDisplay = document.getElementById('level');
        const scoreDisplay = document.getElementById('score');
        const timeDisplay = document.getElementById('time');
        const messageDisplay = document.getElementById('message');

        let dots = [];
        let selectedDots = [];
        let score = 0;
        let level = 1;
        let timeLeft = 60;
        let gameRunning = false;
        let timer = null;

        const colors = ['red', 'blue', 'green', 'yellow', 'purple', 'orange', 'pink', 'cyan'];
        const colorEmojis = {
            red: '🔴',
            blue: '🔵',
            green: '🟢',
            yellow: '🟡',
            purple: '🟣',
            orange: '🟠',
            pink: '💗',
            cyan: '🩵'
        };

        function createBoard() {
            board.innerHTML = '';
            dots = [];
            const numDots = Math.min(30 + level * 2, 48);
            const numColors = Math.min(3 + Math.floor(level / 2), colors.length);

            for (let i = 0; i < numDots; i++) {
                const dot = document.createElement('div');
                const color = colors[Math.floor(Math.random() * numColors)];
                dot.className = `dot ${color}`;
                dot.textContent = colorEmojis[color];
                dot.dataset.color = color;
                dot.dataset.index = i;
                dot.addEventListener('click', handleDotClick);
                board.appendChild(dot);
                dots.push(dot);
            }
        }

        function handleDotClick(e) {
            if (!gameRunning) return;

            const dot = e.target;

            if (dot.classList.contains('connected')) return;

            if (selectedDots.length === 0) {
                selectDot(dot);
            } else {
                const firstColor = selectedDots[0].dataset.color;

                if (dot.dataset.color === firstColor) {
                    if (!selectedDots.includes(dot)) {
                        if (isAdjacent(dot, selectedDots[selectedDots.length - 1])) {
                            selectDot(dot);
                        }
                    } else if (dot === selectedDots[selectedDots.length - 2]) {
                        deselectLastDot();
                    }
                }
            }
        }

        function selectDot(dot) {
            selectedDots.push(dot);
            dot.classList.add('selected');
            dot.style.animation = 'pulse 0.3s ease';

            if (selectedDots.length >= 3) {
                clearDots();
            }
        }

        function deselectLastDot() {
            const dot = selectedDots.pop();
            dot.classList.remove('selected');
        }

        function isAdjacent(dot1, dot2) {
            const index1 = parseInt(dot1.dataset.index);
            const index2 = parseInt(dot2.dataset.index);
            const boardSize = Math.ceil(Math.sqrt(dots.length));

            const row1 = Math.floor(index1 / boardSize);
            const col1 = index1 % boardSize;
            const row2 = Math.floor(index2 / boardSize);
            const col2 = index2 % boardSize;

            const rowDiff = Math.abs(row1 - row2);
            const colDiff = Math.abs(col1 - col2);

            return (rowDiff <= 1 && colDiff <= 1) && (rowDiff + colDiff > 0);
        }

        function clearDots() {
            const color = selectedDots[0].dataset.color;
            const count = selectedDots.length;
            const points = count * count * 10;

            selectedDots.forEach(dot => {
                dot.style.transform = 'scale(0)';
                dot.style.opacity = '0';
            });

            setTimeout(() => {
                selectedDots.forEach(dot => {
                    dot.classList.remove('selected', 'connected');
                    dot.style.transform = '';
                    dot.style.opacity = '';
                    dot.style.animation = '';
                });

                const newColor = colors[Math.floor(Math.random() * colors.length)];
                selectedDots.forEach(dot => {
                    dot.className = `dot ${newColor}`;
                    dot.textContent = colorEmojis[newColor];
                    dot.dataset.color = newColor;
                });

                selectedDots = [];
            }, 300);

            score += points;
            scoreDisplay.textContent = score;

            if (count >= 5) {
                showMessage(`${count}連鎖！ +${points}点！`);
                timeLeft = Math.min(timeLeft + 5, 60);
            }
        }

        function startGame() {
            score = 0;
            level = 1;
            timeLeft = 60;
            gameRunning = true;
            selectedDots = [];

            scoreDisplay.textContent = score;
            levelDisplay.textContent = level;
            timeDisplay.textContent = timeLeft;

            createBoard();
            showMessage('ゲームスタート！');

            if (timer) clearInterval(timer);
            timer = setInterval(() => {
                timeLeft--;
                timeDisplay.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                } else if (timeLeft % 20 === 0 && timeLeft < 60) {
                    levelUp();
                }
            }, 1000);
        }

        function levelUp() {
            level++;
            levelDisplay.textContent = level;
            showMessage(`レベルアップ！ レベル${level}`);
            createBoard();
        }

        function endGame() {
            gameRunning = false;
            clearInterval(timer);
            showMessage(`ゲーム終了！ スコア: ${score}点`);
        }

        function resetGame() {
            gameRunning = false;
            if (timer) clearInterval(timer);
            score = 0;
            level = 1;
            timeLeft = 60;
            selectedDots = [];

            scoreDisplay.textContent = score;
            levelDisplay.textContent = level;
            timeDisplay.textContent = timeLeft;
            showMessage('');
            createBoard();
        }

        function showMessage(msg) {
            messageDisplay.textContent = msg;
            if (msg) {
                messageDisplay.style.animation = 'fadeIn 0.3s ease';
                setTimeout(() => {
                    messageDisplay.style.animation = '';
                }, 300);
            }
        }

        function toggleFullscreen() {
            const container = document.getElementById('game-container');
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                container.requestFullscreen();
            }
        }

        // CSSアニメーション追加
        const style = document.createElement('style');
        style.textContent = `
            @keyframes pulse {
                0%, 100% { transform: scale(1.15); }
                50% { transform: scale(1.25); }
            }
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(-10px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);

        // 初期化
        createBoard();
    </script>
</body>
</html>
