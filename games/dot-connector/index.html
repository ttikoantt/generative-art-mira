<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dot Connector - ドット接続パズル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            color: white;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            font-size: 1.2em;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        canvas {
            display: block;
            border-radius: 10px;
            cursor: pointer;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn.primary {
            background: rgba(255, 255, 255, 0.9);
            color: #667eea;
            border-color: white;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 30px 50px;
            border-radius: 20px;
            font-size: 24px;
            z-index: 200;
            display: none;
            text-align: center;
        }

        .message.show {
            display: block;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.5em;
            }

            .stats {
                font-size: 1em;
                gap: 15px;
            }

            .game-container {
                padding: 10px;
            }

            .btn {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="header">
        <h1>🔵 Dot Connector</h1>
        <div class="stats">
            <div class="stat">レベル: <span id="level">1</span></div>
            <div class="stat">移動: <span id="moves">0</span></div>
        </div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="controls">
        <button class="btn primary" onclick="resetLevel()">リセット</button>
        <button class="btn" onclick="previousLevel()">← 前へ</button>
        <button class="btn" onclick="nextLevel()">次へ →</button>
    </div>

    <div class="message" id="message"></div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const GRID_SIZE = 50;
        const DOT_RADIUS = 8;

        let currentLevel = 0;
        let moves = 0;
        let dots = [];
        let connections = [];
        let selectedDot = null;
        let isComplete = false;

        const levels = [
            // レベル 1: 3x3 - 簡単
            {
                gridSize: 3,
                dots: [
                    { x: 0, y: 0 },
                    { x: 1, y: 0 },
                    { x: 2, y: 0 },
                    { x: 0, y: 1 },
                    { x: 2, y: 1 },
                    { x: 0, y: 2 },
                    { x: 1, y: 2 },
                    { x: 2, y: 2 }
                ]
            },
            // レベル 2: 3x3 - 中間パターン
            {
                gridSize: 3,
                dots: [
                    { x: 0, y: 0 },
                    { x: 2, y: 0 },
                    { x: 1, y: 1 },
                    { x: 0, y: 2 },
                    { x: 2, y: 2 }
                ]
            },
            // レベル 3: 4x4 - 複雑
            {
                gridSize: 4,
                dots: [
                    { x: 0, y: 0 },
                    { x: 1, y: 0 },
                    { x: 3, y: 0 },
                    { x: 0, y: 1 },
                    { x: 2, y: 1 },
                    { x: 3, y: 1 },
                    { x: 1, y: 2 },
                    { x: 2, y: 2 },
                    { x: 0, y: 3 },
                    { x: 3, y: 3 }
                ]
            },
            // レベル 4: 4x4 - 外周パターン
            {
                gridSize: 4,
                dots: [
                    { x: 0, y: 0 },
                    { x: 1, y: 0 },
                    { x: 2, y: 0 },
                    { x: 3, y: 0 },
                    { x: 3, y: 1 },
                    { x: 3, y: 2 },
                    { x: 3, y: 3 },
                    { x: 2, y: 3 },
                    { x: 1, y: 3 },
                    { x: 0, y: 3 },
                    { x: 0, y: 2 },
                    { x: 0, y: 1 }
                ]
            },
            // レベル 5: 5x5 - 複雑
            {
                gridSize: 5,
                dots: [
                    { x: 0, y: 0 },
                    { x: 2, y: 0 },
                    { x: 4, y: 0 },
                    { x: 1, y: 1 },
                    { x: 3, y: 1 },
                    { x: 0, y: 2 },
                    { x: 2, y: 2 },
                    { x: 4, y: 2 },
                    { x: 1, y: 3 },
                    { x: 3, y: 3 },
                    { x: 0, y: 4 },
                    { x: 2, y: 4 },
                    { x: 4, y: 4 }
                ]
            }
        ];

        function init() {
            resizeCanvas();
            loadLevel(currentLevel);
            canvas.addEventListener('click', handleClick);
            canvas.addEventListener('touchstart', handleTouch);
            draw();
        }

        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 400);
            const level = levels[currentLevel];
            const size = level.gridSize * GRID_SIZE + 40;

            canvas.width = Math.min(maxWidth, size);
            canvas.height = Math.min(maxWidth, size);
        }

        function loadLevel(levelIndex) {
            if (levelIndex < 0) levelIndex = 0;
            if (levelIndex >= levels.length) levelIndex = levels.length - 1;

            currentLevel = levelIndex;
            moves = 0;
            isComplete = false;
            connections = [];
            selectedDot = null;

            const level = levels[currentLevel];
            dots = level.dots.map(d => ({
                ...d,
                id: `${d.x}-${d.y}`,
                connected: false
            }));

            document.getElementById('level').textContent = currentLevel + 1;
            document.getElementById('moves').textContent = moves;
            hideMessage();

            resizeCanvas();
            draw();
        }

        function getDotAt(x, y) {
            const padding = 20;
            const level = levels[currentLevel];
            const cellWidth = (canvas.width - padding * 2) / level.gridSize;
            const cellHeight = (canvas.height - padding * 2) / level.gridSize;

            for (let dot of dots) {
                const dotX = padding + dot.x * cellWidth + cellWidth / 2;
                const dotY = padding + dot.y * cellHeight + cellHeight / 2;
                const dist = Math.sqrt((x - dotX) ** 2 + (y - dotY) ** 2);

                if (dist < DOT_RADIUS * 2) {
                    return dot;
                }
            }
            return null;
        }

        function isConnected(dot1, dot2) {
            return connections.some(c =>
                (c.from === dot1.id && c.to === dot2.id) ||
                (c.from === dot2.id && c.to === dot1.id)
            );
        }

        function canConnect(dot1, dot2) {
            if (dot1.id === dot2.id) return false;
            if (isConnected(dot1, dot2)) return false;

            // 隣接チェック
            const dx = Math.abs(dot1.x - dot2.x);
            const dy = Math.abs(dot1.y - dot2.y);

            return (dx === 1 && dy === 0) || (dx === 0 && dy === 1);
        }

        function handleClick(e) {
            if (isComplete) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const clickedDot = getDotAt(x, y);

            if (clickedDot) {
                if (selectedDot === null) {
                    selectedDot = clickedDot;
                } else if (selectedDot === clickedDot) {
                    selectedDot = null;
                } else if (canConnect(selectedDot, clickedDot)) {
                    connections.push({
                        from: selectedDot.id,
                        to: clickedDot.id
                    });
                    moves++;
                    document.getElementById('moves').textContent = moves;
                    selectedDot = clickedDot;
                    checkCompletion();
                }
            }

            draw();
        }

        function handleTouch(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('click', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            handleClick(mouseEvent);
        }

        function checkCompletion() {
            if (connections.length === dots.length - 1) {
                // 全てのドットが接続されているかチェック
                const visited = new Set();
                const queue = [dots[0].id];
                visited.add(dots[0].id);

                while (queue.length > 0) {
                    const current = queue.shift();

                    for (let conn of connections) {
                        if (conn.from === current && !visited.has(conn.to)) {
                            visited.add(conn.to);
                            queue.push(conn.to);
                        } else if (conn.to === current && !visited.has(conn.from)) {
                            visited.add(conn.from);
                            queue.push(conn.from);
                        }
                    }
                }

                if (visited.size === dots.length) {
                    isComplete = true;
                    showMessage('🎉 クリア！');
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#f8f9fa';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const padding = 20;
            const level = levels[currentLevel];
            const cellWidth = (canvas.width - padding * 2) / level.gridSize;
            const cellHeight = (canvas.height - padding * 2) / level.gridSize;

            // グリッドを描画
            ctx.strokeStyle = '#e9ecef';
            ctx.lineWidth = 1;

            for (let i = 0; i <= level.gridSize; i++) {
                const pos = padding + i * cellWidth;
                ctx.beginPath();
                ctx.moveTo(padding, pos);
                ctx.lineTo(canvas.width - padding, pos);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(pos, padding);
                ctx.lineTo(pos, canvas.height - padding);
                ctx.stroke();
            }

            // 接続線を描画
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';

            for (let conn of connections) {
                const fromDot = dots.find(d => d.id === conn.from);
                const toDot = dots.find(d => d.id === conn.to);

                if (fromDot && toDot) {
                    const fromX = padding + fromDot.x * cellWidth + cellWidth / 2;
                    const fromY = padding + fromDot.y * cellHeight + cellHeight / 2;
                    const toX = padding + toDot.x * cellWidth + cellWidth / 2;
                    const toY = padding + toDot.y * cellHeight + cellHeight / 2;

                    ctx.beginPath();
                    ctx.moveTo(fromX, fromY);
                    ctx.lineTo(toX, toY);
                    ctx.stroke();
                }
            }

            // ドットを描画
            for (let dot of dots) {
                const x = padding + dot.x * cellWidth + cellWidth / 2;
                const y = padding + dot.y * cellHeight + cellHeight / 2;

                ctx.beginPath();
                ctx.arc(x, y, DOT_RADIUS, 0, Math.PI * 2);

                if (dot === selectedDot) {
                    ctx.fillStyle = '#ffd93d';
                } else {
                    ctx.fillStyle = '#667eea';
                }

                ctx.fill();
                ctx.strokeStyle = '#4c3c7c';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        function resetLevel() {
            loadLevel(currentLevel);
        }

        function previousLevel() {
            if (currentLevel > 0) {
                loadLevel(currentLevel - 1);
            }
        }

        function nextLevel() {
            if (currentLevel < levels.length - 1) {
                loadLevel(currentLevel + 1);
            }
        }

        function showMessage(text) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.classList.add('show');
            setTimeout(() => {
                hideMessage();
            }, 2000);
        }

        function hideMessage() {
            const message = document.getElementById('message');
            message.classList.remove('show');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            draw();
        });

        window.addEventListener('load', init);
    </script>
</body>
</html>
