<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>タイミングサークル | Timing Circle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation;
        }

        canvas {
            display: block;
        }

        .ui {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
        }

        .score {
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .combo {
            font-size: 24px;
            margin-top: 10px;
            color: #ffd700;
        }

        .perfect {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 20;
        }

        .perfect.show {
            opacity: 1;
        }

        .gameover {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            z-index: 30;
            display: none;
        }

        .gameover.show {
            display: block;
        }

        .gameover h2 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .gameover p {
            font-size: 24px;
            margin-bottom: 30px;
        }

        .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .restart-btn:hover {
            transform: scale(1.1);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            pointer-events: none;
            text-align: center;
        }

        @media (max-width: 768px) {
            .score {
                font-size: 36px;
            }

            .combo {
                font-size: 18px;
            }

            .perfect {
                font-size: 36px;
            }

            .gameover h2 {
                font-size: 36px;
            }

            .gameover p {
                font-size: 18px;
            }

            .fullscreen-btn {
                top: 15px;
                right: 15px;
                padding: 8px 16px;
                font-size: 12px;
            }

            .instructions {
                font-size: 12px;
                bottom: 15px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="ui">
        <div class="score">0</div>
        <div class="combo"></div>
    </div>

    <div class="perfect" id="perfect">PERFECT!</div>

    <div class="gameover" id="gameover">
        <h2>Game Over</h2>
        <p>Score: <span id="finalScore">0</span></p>
        <button class="restart-btn" id="restartBtn">もう一度</button>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>

    <div class="instructions">タップしてクリック！タイミングを合わせて！</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const perfectEl = document.getElementById('perfect');
        const gameoverEl = document.getElementById('gameover');
        const finalScoreEl = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const scoreEl = document.querySelector('.score');
        const comboEl = document.querySelector('.combo');

        let width, height;
        let score = 0;
        let combo = 0;
        let circleRadius = 200;
        let targetRadius = 50;
        let shrinking = true;
        let shrinkSpeed = 2;
        let hue = 0;
        let gameOver = false;

        // Resize canvas
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        // Reset game
        function reset() {
            score = 0;
            combo = 0;
            circleRadius = 200;
            shrinkSpeed = 2;
            gameOver = false;
            updateUI();
            gameoverEl.classList.remove('show');
        }

        // Update UI
        function updateUI() {
            scoreEl.textContent = score;
            comboEl.textContent = combo > 1 ? `${combo}x Combo!` : '';
        }

        // Show perfect feedback
        function showPerfect() {
            perfectEl.classList.add('show');
            setTimeout(() => {
                perfectEl.classList.remove('show');
            }, 500);
        }

        // Handle tap/click
        function handleTap() {
            if (gameOver) return;

            const diff = Math.abs(circleRadius - targetRadius);

            if (diff < 15) {
                // Perfect!
                let points = 100 * (1 + combo * 0.1);
                if (diff < 5) {
                    points *= 2; // Bonus for very precise
                    showPerfect();
                }
                score += Math.floor(points);
                combo++;
                shrinkSpeed = Math.min(5, 2 + score * 0.01);
                circleRadius = 200;
            } else {
                // Miss
                combo = 0;
                if (diff > 50) {
                    gameOver = true;
                    finalScoreEl.textContent = score;
                    gameoverEl.classList.add('show');
                }
            }

            updateUI();
        }

        // Event listeners
        canvas.addEventListener('click', handleTap);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleTap();
        });

        restartBtn.addEventListener('click', reset);

        // Fullscreen functionality
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        });

        document.addEventListener('fullscreenchange', () => {
            fullscreenBtn.textContent = document.fullscreenElement ? '元に戻す' : '全画面';
        });

        // Animation loop
        function animate() {
            // Clear canvas
            ctx.fillStyle = 'rgba(26, 26, 46, 0.3)';
            ctx.fillRect(0, 0, width, height);

            if (!gameOver) {
                // Update circle
                if (shrinking) {
                    circleRadius -= shrinkSpeed;
                    if (circleRadius < targetRadius - 20) {
                        // Missed!
                        combo = 0;
                        circleRadius = 200;
                        updateUI();
                    }
                }

                // Update hue
                hue = (hue + 0.5) % 360;

                // Draw target circle (outline)
                ctx.beginPath();
                ctx.arc(width / 2, height / 2, targetRadius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${hue}, 70%, 60%, 0.5)`;
                ctx.lineWidth = 3;
                ctx.stroke();

                // Draw shrinking circle
                ctx.beginPath();
                ctx.arc(width / 2, height / 2, circleRadius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${hue + 180}, 70%, 60%, 0.9)`;
                ctx.lineWidth = 5;
                ctx.stroke();

                // Draw glow
                ctx.beginPath();
                ctx.arc(width / 2, height / 2, circleRadius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${hue + 180}, 70%, 60%, 0.3)`;
                ctx.lineWidth = 15;
                ctx.stroke();
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
