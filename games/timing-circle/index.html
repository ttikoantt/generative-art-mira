<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Timing Circle | Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            touch-action: manipulation;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .score {
            font-size: 48px;
            font-weight: bold;
            color: #00ffcc;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
        }

        .level {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 5px;
        }

        .game-area {
            position: relative;
            width: 300px;
            height: 300px;
        }

        .target-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.2);
            background: transparent;
        }

        .shrinking-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 4px solid;
            background: transparent;
        }

        .center-point {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #00ffcc;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.8);
        }

        .feedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            font-weight: bold;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
        }

        .feedback.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.2);
        }

        .feedback.perfect {
            color: #00ffcc;
            text-shadow: 0 0 30px rgba(0, 255, 204, 0.8);
        }

        .feedback.good {
            color: #ffff00;
        }

        .feedback.miss {
            color: #ff4444;
        }

        .controls {
            margin-top: 30px;
        }

        .tap-btn {
            background: linear-gradient(135deg, #00ffcc 0%, #00ccaa 100%);
            border: none;
            padding: 20px 60px;
            font-size: 24px;
            font-weight: bold;
            color: #0a0a0f;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 255, 204, 0.3);
            transition: all 0.2s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .tap-btn:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.3);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 204, 0.2);
            border: 1px solid rgba(0, 255, 204, 0.5);
            color: #00ffcc;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
        }

        .combo {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #ff44ff;
            text-shadow: 0 0 10px rgba(255, 68, 255, 0.5);
            opacity: 0;
            transition: all 0.3s;
        }

        .combo.show {
            opacity: 1;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        @media (max-width: 600px) {
            .game-area {
                width: 250px;
                height: 250px;
            }

            .tap-btn {
                padding: 15px 50px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="score" id="score">0</div>
            <div class="level" id="level">Level 1</div>
        </div>

        <div class="game-area" id="gameArea">
            <div class="target-circle" id="targetCircle"></div>
            <div class="shrinking-circle" id="shrinkingCircle"></div>
            <div class="center-point"></div>
            <div class="feedback" id="feedback"></div>
        </div>

        <div class="controls">
            <button class="tap-btn" id="tapBtn">TAP!</button>
        </div>

        <div class="combo" id="combo"></div>
        <div class="info">サークルがターゲットと重なった瞬間にタップ</div>

        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    </div>

    <script>
        // ゲーム状態
        let score = 0;
        let level = 1;
        let combo = 0;
        let maxCombo = 0;

        // 設定
        let targetRadius = 100;
        let startRadius = 200;
        let shrinkSpeed = 1;
        let animationId = null;
        let isPlaying = false;

        // 現在の半径
        let currentRadius = startRadius;

        // DOM要素
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const targetCircle = document.getElementById('targetCircle');
        const shrinkingCircle = document.getElementById('shrinkingCircle');
        const feedbackEl = document.getElementById('feedback');
        const comboEl = document.getElementById('combo');
        const tapBtn = document.getElementById('tapBtn');
        const gameArea = document.getElementById('gameArea');

        // 初期化
        function init() {
            targetRadius = 100;
            startRadius = 200;
            shrinkSpeed = 1 + (level - 1) * 0.2;

            targetCircle.style.width = (targetRadius * 2) + 'px';
            targetCircle.style.height = (targetRadius * 2) + 'px';

            currentRadius = startRadius;
            isPlaying = true;
            gameLoop();
        }

        // ゲームループ
        function gameLoop() {
            if (!isPlaying) return;

            // サークルを縮小
            currentRadius -= shrinkSpeed;

            // 中心点を通過したら終了
            if (currentRadius <= 0) {
                miss();
                return;
            }

            // サークルを描画
            updateShrinkingCircle();

            animationId = requestAnimationFrame(gameLoop);
        }

        // 縮小サークルを更新
        function updateShrinkingCircle() {
            const progress = (startRadius - currentRadius) / (startRadius - targetRadius);
            const hue = progress * 120;
            shrinkingCircle.style.width = (currentRadius * 2) + 'px';
            shrinkingCircle.style.height = (currentRadius * 2) + 'px';
            shrinkingCircle.style.borderColor = `hsl(${hue}, 80%, 50%)`;
            shrinkingCircle.style.boxShadow = `0 0 ${progress * 20}px hsl(${hue}, 80%, 50%)`;
        }

        // タップ判定
        function tap() {
            if (!isPlaying) return;

            const diff = Math.abs(currentRadius - targetRadius);
            const tolerance = 20 + level * 2;

            if (diff <= tolerance) {
                // 完璧
                const points = diff < tolerance / 3 ? 100 : 50;
                score += points * (1 + combo * 0.1);
                combo++;
                maxCombo = Math.max(maxCombo, combo);

                showFeedback(diff < tolerance / 3 ? 'PERFECT!' : 'GOOD!', 'perfect');
            } else if (diff <= tolerance * 2) {
                // ギリギリ
                score += 25;
                showFeedback('OK', 'good');
            } else {
                // ミス
                miss();
                return;
            }

            // レベルアップ判定
            if (score >= level * 500) {
                level++;
                levelEl.textContent = 'Level ' + level;
                shrinkSpeed = 1 + (level - 1) * 0.2;
            }

            updateUI();
            nextRound();
        }

        // 次のラウンド
        function nextRound() {
            cancelAnimationFrame(animationId);
            currentRadius = startRadius;

            // ターゲットの位置を変える
            targetRadius = 80 + Math.random() * 40;
            targetCircle.style.width = (targetRadius * 2) + 'px';
            targetCircle.style.height = (targetRadius * 2) + 'px';

            gameLoop();
        }

        // ミス
        function miss() {
            isPlaying = false;
            cancelAnimationFrame(animationId);
            combo = 0;
            showFeedback('MISS!', 'miss');

            setTimeout(() => {
                gameOver();
            }, 1000);
        }

        // ゲームオーバー
        function gameOver() {
            alert(`Game Over!\nScore: ${Math.floor(score)}\nMax Combo: ${maxCombo}`);
            score = 0;
            level = 1;
            combo = 0;
            maxCombo = 0;
            updateUI();
            init();
        }

        // フィードバック表示
        function showFeedback(text, type) {
            feedbackEl.textContent = text;
            feedbackEl.className = 'feedback show ' + type;

            setTimeout(() => {
                feedbackEl.className = 'feedback';
            }, 500);
        }

        // UI更新
        function updateUI() {
            scoreEl.textContent = Math.floor(score);
            levelEl.textContent = 'Level ' + level;

            if (combo > 1) {
                comboEl.textContent = combo + ' Combo!';
                comboEl.classList.add('show');
            } else {
                comboEl.classList.remove('show');
            }
        }

        // 全画面
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        tapBtn.addEventListener('click', tap);
        tapBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            tap();
        });

        gameArea.addEventListener('click', tap);
        gameArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            tap();
        });

        // キーボード
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                tap();
            }
        });

        // ゲーム開始
        init();
    </script>
</body>
</html>
