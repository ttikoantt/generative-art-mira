<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘘つきDetective - April Fools Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            text-align: center;
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 20px;
            text-align: center;
        }
        .score-board {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .score-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
        }
        .score-label {
            font-size: 0.7rem;
            color: #888;
        }
        .score-value {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .story-area {
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #f39c12;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 120px;
        }
        .story-title {
            font-size: 0.9rem;
            color: #f39c12;
            margin-bottom: 10px;
        }
        .story-text {
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }
        .card {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            border: 2px solid #444;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .card:hover:not(.disabled) {
            transform: translateY(-5px);
            border-color: #f39c12;
            box-shadow: 0 5px 20px rgba(243, 156, 18, 0.3);
        }
        .card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .card.selected {
            border-color: #e74c3c;
            background: linear-gradient(135deg, #c0392b 0%, #e74c3c 100%);
        }
        .card.correct {
            border-color: #27ae60;
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
        }
        .card-avatar {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .card-name {
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .card-hint {
            font-size: 0.7rem;
            color: #aaa;
        }
        .feedback {
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #444;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }
        .feedback.show {
            display: block;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .feedback-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .feedback-title.correct {
            color: #27ae60;
        }
        .feedback-title.wrong {
            color: #e74c3c;
        }
        .next-btn {
            width: 100%;
            max-width: 600px;
            padding: 15px 30px;
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .next-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.5);
        }
        .full-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #444;
            color: #fff;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .full-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .game-over {
            display: none;
            text-align: center;
        }
        .game-over.show {
            display: block;
        }
        .game-over h2 {
            font-size: 2rem;
            color: #f39c12;
            margin-bottom: 20px;
        }
        .restart-btn {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <button class="full-btn" onclick="toggleFullScreen()">📺 全画面</button>
    
    <h1>🔍 嘘つきDetective</h1>
    <p class="subtitle">エイプリルフール特別企画 - 誰が嘘をついている？</p>
    
    <div class="score-board">
        <div class="score-item">
            <div class="score-label">正解</div>
            <div class="score-value" id="correct">0</div>
        </div>
        <div class="score-item">
            <div class="score-label">間違い</div>
            <div class="score-value" id="wrong">0</div>
        </div>
        <div class="score-item">
            <div class="score-label">ラウンド</div>
            <div class="score-value" id="round">1/5</div>
        </div>
    </div>
    
    <div class="story-area" id="storyArea">
        <div class="story-title">📖 ケース #1</div>
        <div class="story-text" id="storyText">読み込み中...</div>
    </div>
    
    <div class="cards-container" id="cardsContainer"></div>
    
    <div class="feedback" id="feedback">
        <div class="feedback-title" id="feedbackTitle"></div>
        <div id="feedbackText"></div>
    </div>
    
    <button class="next-btn" id="nextBtn" onclick="nextRound()" style="display: none;">次のケース →</button>
    
    <div class="game-over" id="gameOver">
        <h2>🎉 お疲れ様！</h2>
        <p>結果発表...</p>
        <div id="finalScore"></div>
        <button class="next-btn restart-btn" onclick="restartGame()">もう一度遊ぶ</button>
    </div>
    
    <script>
        let currentRound = 0;
        let correct = 0;
        let wrong = 0;
        let selectedCard = null;
        const totalRounds = 5;
        
        const scenarios = [
            {
                title: "ケース #1: 消えたケーキ",
                story: "オフィスの休憩室にあった誕生日ケーキが消えた！4人の社員が事情を語る。誰が嘘をついているか見破れ！",
                characters: [
                    { name: "田中", avatar: "👨‍💼", hint: "「私は休憩室に一度も行ってません」と、コーヒーカップを持って言った", liar: true },
                    { name: "佐藤", avatar: "👩‍💻", hint: "「3時頃、メールチェックに来ました。ケーキはありましたよ」", liar: false },
                    { name: "鈴木", avatar: "👨‍🍳", hint: "「給湯室でコーヒー入れてました。ずっとそこにました」", liar: false },
                    { name: "山田", avatar: "👨‍🎨", hint: "「外でタバコ吸ってました。タイムスタンプ見て！」", liar: false }
                ]
            },
            {
                title: "ケース #2: 壊れたパソコン",
                story: "会議室のパソコンが水浸し！犯人は誰だ？",
                characters: [
                    { name: "Aさん", avatar: "🧑", hint: "「私はずっとドアの外で待ってました。誰も入っていきませんよ」", liar: false },
                    { name: "Bさん", avatar: "👤", hint: "「私は一度も部屋に入ってないです」", liar: true },
                    { name: "Cさん", avatar: "🧑‍💼", hint: "「資料を探しに一瞬入ったけど、誰もいなかったです」", liar: false },
                    { name: "Dさん", avatar: "🧑‍💻", hint: "「トイレに行ってました。10分くらい」", liar: false }
                ]
            },
            {
                title: "ケース #3: 忘れられた約束",
                story: "週末の約束を誰も覚えていない！誰が嘘をついている？",
                characters: [
                    { name: "友達A", avatar: "👫", hint: "「確か日曜に映画に行くって話したよね？」", liar: false },
                    { name: "友達B", avatar: "👬", hint: "「いや、土曜にカラオケだろ！」", liar: false },
                    { name: "友達C", avatar: "👭", hint: "「あれ？そんな約束、聞いてないけど...」", liar: false },
                    { name: "友達D", avatar: "🧑‍🤝‍🧑", hint: "「みんな同じメッセージ来たよね？見てます！」", liar: true }
                ]
            },
            {
                title: "ケース #4: 隠されたお菓子",
                story: "子供が隠したお菓子を探して！誰が嘘をついている？",
                characters: [
                    { name: "長男", avatar: "👦", hint: "「僕は食べないって言ったもん！」と口の周りにチョコがついている", liar: true },
                    { name: "次男", avatar: "🧒", hint: "「兄が隠すの見たよ」", liar: false },
                    { name: "妹", avatar: "👧", hint: "「私はずっとテレビ見てた」", liar: false },
                    { name: "犬", avatar: "🐕", hint: "「ワン！」（信頼できる証人）", liar: false }
                ]
            },
            {
                title: "ケース #5: 真夜中の音",
                story: "真夜中にキッチンから音が！誰が起きていた？",
                characters: [
                    { name: "父", avatar: "👨", hint: "「私は8時に寝たよ。一晩中寝てた」", liar: false },
                    { name: "母", avatar: "👩", hint: "「トイレに起きたけど、誰も見なかったわ」", liar: false },
                    { name: "兄", avatar: "👨‍🎓", hint: "「ゲームしてたけど、ヘッドホンしてたから音は聞こえなかった」", liar: false },
                    { name: "妹", avatar: "👧‍🎤", hint: "「私はずっと寝てた！」と机の上の飲みかけのジュースを指す", liar: true }
                ]
            }
        ];
        
        function loadRound() {
            const scenario = scenarios[currentRound];
            document.getElementById('storyText').textContent = scenario.story;
            document.querySelector('.story-title').textContent = scenario.title;
            document.getElementById('round').textContent = `${currentRound + 1}/${totalRounds}`;
            
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';
            
            scenario.characters.forEach((char, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-avatar">${char.avatar}</div>
                    <div class="card-name">${char.name}</div>
                    <div class="card-hint">${char.hint}</div>
                `;
                card.onclick = () => selectCard(index, card);
                container.appendChild(card);
            });
            
            document.getElementById('feedback').classList.remove('show');
            document.getElementById('nextBtn').style.display = 'none';
            selectedCard = null;
        }
        
        function selectCard(index, cardElement) {
            if (selectedCard !== null) return;
            
            selectedCard = index;
            const scenario = scenarios[currentRound];
            const isCorrect = scenario.characters[index].liar;
            
            // Mark all cards
            const cards = document.querySelectorAll('.card');
            cards.forEach((card, i) => {
                card.classList.add('disabled');
                if (scenario.characters[i].liar) {
                    card.classList.add('correct');
                }
                if (i === index) {
                    card.classList.add('selected');
                }
            });
            
            // Show feedback
            const feedback = document.getElementById('feedback');
            const title = document.getElementById('feedbackTitle');
            const text = document.getElementById('feedbackText');
            
            if (isCorrect) {
                correct++;
                title.textContent = '🎉 正解！';
                title.className = 'feedback-title correct';
                text.textContent = `${scenario.characters[index].name}は嘘つきでした！素晴らしい推理です！`;
            } else {
                wrong++;
                title.textContent = '😅 残念！';
                title.className = 'feedback-title wrong';
                const liar = scenario.characters.find(c => c.liar);
                text.textContent = `正解は${liar.name}でした！よく見てみましょう...`;
            }
            
            document.getElementById('correct').textContent = correct;
            document.getElementById('wrong').textContent = wrong;
            
            feedback.classList.add('show');
            document.getElementById('nextBtn').style.display = currentRound < totalRounds - 1 ? 'block' : 'none';
            
            if (currentRound === totalRounds - 1) {
                setTimeout(showGameOver, 1500);
            }
        }
        
        function nextRound() {
            currentRound++;
            loadRound();
        }
        
        function showGameOver() {
            document.getElementById('storyArea').style.display = 'none';
            document.getElementById('cardsContainer').style.display = 'none';
            document.getElementById('feedback').style.display = 'none';
            document.querySelector('.score-board').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            
            const gameOver = document.getElementById('gameOver');
            gameOver.classList.add('show');
            
            const percentage = Math.round((correct / totalRounds) * 100);
            let message = '';
            if (percentage === 100) {
                message = '🏆 完璧！名探偵ですね！';
            } else if (percentage >= 80) {
                message = '🌟 素晴らしい！敏腕探偵！';
            } else if (percentage >= 60) {
                message = '👍 まあまあ！修行が必要！';
            } else if (percentage >= 40) {
                message = '😅 頑張りましょう！';
            } else {
                message = '💀 探偵を辞めた方が...';
            }
            
            document.getElementById('finalScore').innerHTML = `
                <p style="font-size: 1.5rem; margin: 20px 0;">${message}</p>
                <p>正解: ${correct} / ${totalRounds}</p>
            `;
        }
        
        function restartGame() {
            currentRound = 0;
            correct = 0;
            wrong = 0;
            selectedCard = null;
            
            document.getElementById('correct').textContent = '0';
            document.getElementById('wrong').textContent = '0';
            
            document.getElementById('storyArea').style.display = 'block';
            document.getElementById('cardsContainer').style.display = 'grid';
            document.querySelector('.score-board').style.display = 'flex';
            document.getElementById('gameOver').classList.remove('show');
            
            loadRound();
        }
        
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        // Start game
        loadRound();
    </script>
</body>
</html>
