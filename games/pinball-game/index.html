<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinball Arcade - ピンボールアーケード</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            overflow: hidden;
            padding: 20px;
        }

        .game-container {
            text-align: center;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            color: #ff6b6b;
            font-size: 1.5rem;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
            letter-spacing: 2px;
        }

        .subtitle {
            color: #4ecdc4;
            font-size: 0.7rem;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 60vh;
            max-height: 600px;
            margin: 0 auto 20px;
            border-radius: 20px;
            overflow: hidden;
            background: #0a0a0a;
            box-shadow: 0 0 40px rgba(78, 205, 196, 0.3);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .hud-item {
            color: #4ecdc4;
            font-size: 0.8rem;
        }

        .hud-value {
            color: #ff6b6b;
            font-size: 1.2rem;
            margin-left: 10px;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .control-btn {
            padding: 15px 30px;
            font-size: 0.8rem;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(78, 205, 196, 0.3);
            letter-spacing: 1px;
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(78, 205, 196, 0.5);
        }

        .control-btn:active {
            transform: translateY(0);
        }

        .paddle-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        .paddle-btn {
            flex: 1;
            max-width: 150px;
            padding: 20px;
            font-size: 0.7rem;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .paddle-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 10px rgba(255, 107, 107, 0.5);
        }

        .instructions {
            color: #888;
            font-size: 0.65rem;
            margin-top: 15px;
            line-height: 1.8;
        }

        .fullscreen-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 10px 15px;
            font-size: 0.7rem;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 50;
        }

        .game-over h2 {
            color: #ff6b6b;
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
        }

        .game-over p {
            color: #4ecdc4;
            font-size: 0.8rem;
            margin-bottom: 20px;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.2rem;
            }

            .subtitle {
                font-size: 0.6rem;
            }

            .hud {
                padding: 10px 15px;
            }

            .hud-item {
                font-size: 0.7rem;
            }

            .hud-value {
                font-size: 1rem;
            }

            .control-btn {
                padding: 12px 24px;
                font-size: 0.7rem;
            }

            .paddle-btn {
                padding: 15px;
                font-size: 0.6rem;
            }

            .instructions {
                font-size: 0.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎮 PINBALL ARCADE</h1>
        <p class="subtitle">ピンボールアーケード</p>

        <div class="hud">
            <div class="hud-item">SCORE<span class="hud-value" id="score">0</span></div>
            <div class="hud-item">BALLS<span class="hud-value" id="balls">3</span></div>
            <div class="hud-item">HIGH<span class="hud-value" id="high-score">0</span></div>
        </div>

        <div id="game-container">
            <canvas id="gameCanvas"></canvas>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

            <div class="game-over hidden" id="gameOver">
                <h2>GAME OVER</h2>
                <p>Final Score: <span id="finalScore">0</span></p>
                <button class="control-btn" onclick="restartGame()">RESTART</button>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn" onclick="launchBall()">🚀 LAUNCH</button>
            <button class="control-btn" onclick="resetGame()">🔄 RESET</button>
        </div>

        <div class="paddle-controls">
            <button class="paddle-btn" id="leftPaddle">LEFT PADDLE</button>
            <button class="paddle-btn" id="rightPaddle">RIGHT PADDLE</button>
        </div>

        <p class="instructions">
            LEFT/RIGHTボタン or A/Dキーでパドル操作<br>
            LAUNCHボタン or SPACEキーでボール発射<br>
            バンパーに当ててポイントを稼げ！
        </p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;

        function resize() {
            const container = document.getElementById('game-container');
            width = container.clientWidth;
            height = container.clientHeight;
            canvas.width = width;
            canvas.height = height;
        }

        // Game state
        let score = 0;
        let balls = 3;
        let highScore = localStorage.getItem('pinballHighScore') || 0;
        let gameRunning = false;
        let ballLaunched = false;

        // Ball
        let ball = {
            x: 0,
            y: 0,
            vx: 0,
            vy: 0,
            radius: 8
        };

        // Paddles
        let leftPaddle = {
            x: 0,
            y: 0,
            width: 70,
            height: 15,
            angle: 0.4,
            targetAngle: 0.4,
            active: false
        };

        let rightPaddle = {
            x: 0,
            y: 0,
            width: 70,
            height: 15,
            angle: -0.4,
            targetAngle: -0.4,
            active: false
        };

        // Bumpers
        let bumpers = [];

        // Targets
        let targets = [];

        function initBumpers() {
            bumpers = [
                { x: width * 0.3, y: height * 0.25, radius: 25, points: 100, color: '#ff6b6b', hit: false },
                { x: width * 0.5, y: height * 0.2, radius: 25, points: 100, color: '#4ecdc4', hit: false },
                { x: width * 0.7, y: height * 0.25, radius: 25, points: 100, color: '#ffe66d', hit: false },
                { x: width * 0.4, y: height * 0.35, radius: 20, points: 150, color: '#ee5a24', hit: false },
                { x: width * 0.6, y: height * 0.35, radius: 20, points: 150, color: '#00d4ff', hit: false }
            ];
        }

        function initTargets() {
            targets = [
                { x: width * 0.25, y: height * 0.5, width: 60, height: 15, points: 50, color: '#ff6b6b', hit: false },
                { x: width * 0.75, y: height * 0.5, width: 60, height: 15, points: 50, color: '#4ecdc4', hit: false }
            ];
        }

        function initPaddles() {
            leftPaddle.x = width * 0.3;
            leftPaddle.y = height - 40;
            rightPaddle.x = width * 0.7;
            rightPaddle.y = height - 40;
        }

        function resetBall() {
            ball.x = width * 0.9;
            ball.y = height - 80;
            ball.vx = 0;
            ball.vy = 0;
            ballLaunched = false;
        }

        function launchBall() {
            if (!ballLaunched && gameRunning) {
                ball.vy = -15 - Math.random() * 3;
                ball.vx = -2 - Math.random() * 2;
                ballLaunched = true;
            }
        }

        function update() {
            if (!gameRunning || !ballLaunched) return;

            // Apply gravity
            ball.vy += 0.2;

            // Update ball position
            ball.x += ball.vx;
            ball.y += ball.vy;

            // Wall collisions
            if (ball.x - ball.radius < 0) {
                ball.x = ball.radius;
                ball.vx *= -0.8;
            }
            if (ball.x + ball.radius > width) {
                ball.x = width - ball.radius;
                ball.vx *= -0.8;
            }
            if (ball.y - ball.radius < 0) {
                ball.y = ball.radius;
                ball.vy *= -0.8;
            }

            // Paddle rotations
            leftPaddle.angle += (leftPaddle.targetAngle - leftPaddle.angle) * 0.3;
            rightPaddle.angle += (rightPaddle.targetAngle - rightPaddle.angle) * 0.3;

            // Paddle collisions
            checkPaddleCollision(leftPaddle, true);
            checkPaddleCollision(rightPaddle, false);

            // Bumper collisions
            bumpers.forEach(bumper => {
                const dx = ball.x - bumper.x;
                const dy = ball.y - bumper.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < ball.radius + bumper.radius) {
                    const angle = Math.atan2(dy, dx);
                    ball.vx = Math.cos(angle) * 8;
                    ball.vy = Math.sin(angle) * 8;
                    ball.x = bumper.x + Math.cos(angle) * (ball.radius + bumper.radius + 1);
                    ball.y = bumper.y + Math.sin(angle) * (ball.radius + bumper.radius + 1);

                    score += bumper.points;
                    bumper.hit = true;
                    setTimeout(() => bumper.hit = false, 100);
                    updateHUD();
                }
            });

            // Target collisions
            targets.forEach(target => {
                if (!target.hit &&
                    ball.x > target.x - target.width / 2 &&
                    ball.x < target.x + target.width / 2 &&
                    ball.y > target.y - target.height / 2 &&
                    ball.y < target.y + target.height / 2) {
                    ball.vy *= -1;
                    target.hit = true;
                    score += target.points;
                    updateHUD();
                    setTimeout(() => target.hit = false, 1000);
                }
            });

            // Ball falls out
            if (ball.y > height + 50) {
                balls--;
                updateHUD();

                if (balls <= 0) {
                    gameOver();
                } else {
                    resetBall();
                }
            }

            // Speed limit
            const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
            if (speed > 18) {
                ball.vx = (ball.vx / speed) * 18;
                ball.vy = (ball.vy / speed) * 18;
            }
        }

        function checkPaddleCollision(paddle, isLeft) {
            const px = paddle.x;
            const py = paddle.y;
            const pw = paddle.width;
            const ph = paddle.height;

            // Simplified paddle collision
            if (ball.y + ball.radius > py - ph / 2 &&
                ball.y - ball.radius < py + ph / 2 &&
                ball.x > px - pw / 2 &&
                ball.x < px + pw / 2) {

                if (ball.vy > 0) {
                    ball.vy *= -0.8;
                    ball.y = py - ph / 2 - ball.radius;

                    // Add paddle velocity
                    const paddleForce = paddle.active ? 3 : 1;
                    const direction = isLeft ? -1 : 1;
                    ball.vx += direction * paddleForce + (Math.random() - 0.5) * 2;
                    ball.vy -= Math.abs(ball.vx) * 0.3;

                    // Speed boost
                    ball.vy -= paddleForce * 1.5;
                }
            }
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, width, height);

            // Draw bumpers
            bumpers.forEach(bumper => {
                ctx.beginPath();
                ctx.arc(bumper.x, bumper.y, bumper.radius, 0, Math.PI * 2);
                ctx.fillStyle = bumper.hit ? '#fff' : bumper.color;
                ctx.shadowBlur = bumper.hit ? 20 : 10;
                ctx.shadowColor = bumper.color;
                ctx.fill();
                ctx.shadowBlur = 0;

                // Inner circle
                ctx.beginPath();
                ctx.arc(bumper.x, bumper.y, bumper.radius * 0.6, 0, Math.PI * 2);
                ctx.fillStyle = bumper.hit ? 'rgba(255, 255, 255, 0.8)' : 'rgba(0, 0, 0, 0.5)';
                ctx.fill();
            });

            // Draw targets
            targets.forEach(target => {
                ctx.fillStyle = target.hit ? '#333' : target.color;
                ctx.shadowBlur = target.hit ? 0 : 10;
                ctx.shadowColor = target.color;
                ctx.fillRect(
                    target.x - target.width / 2,
                    target.y - target.height / 2,
                    target.width,
                    target.height
                );
                ctx.shadowBlur = 0;
            });

            // Draw paddles
            drawPaddle(leftPaddle);
            drawPaddle(rightPaddle);

            // Draw ball
            if (gameRunning) {
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#fff';
                ctx.fill();
                ctx.shadowBlur = 0;

                // Ball trail
                if (ballLaunched) {
                    ctx.beginPath();
                    ctx.arc(ball.x - ball.vx * 0.5, ball.y - ball.vy * 0.5, ball.radius * 0.7, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.fill();
                }
            }

            // Draw walls
            ctx.strokeStyle = '#4ecdc4';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(width, 0);
            ctx.lineTo(width, height);
            ctx.lineTo(0, height);
            ctx.closePath();
            ctx.stroke();
        }

        function drawPaddle(paddle) {
            ctx.save();
            ctx.translate(paddle.x, paddle.y);
            ctx.rotate(paddle.angle);

            ctx.fillStyle = paddle.active ? '#ff6b6b' : '#4ecdc4';
            ctx.shadowBlur = paddle.active ? 20 : 10;
            ctx.shadowColor = paddle.active ? '#ff6b6b' : '#4ecdc4';

            // Round rectangle
            const r = 8;
            const w = paddle.width;
            const h = paddle.height;

            ctx.beginPath();
            ctx.roundRect(-w / 2, -h / 2, w, h, r);
            ctx.fill();

            ctx.restore();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function updateHUD() {
            document.getElementById('score').textContent = score;
            document.getElementById('balls').textContent = balls;
            document.getElementById('high-score').textContent = highScore;
        }

        function gameOver() {
            gameRunning = false;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('pinballHighScore', highScore);
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.remove('hidden');
            updateHUD();
        }

        function resetGame() {
            score = 0;
            balls = 3;
            gameRunning = true;
            ballLaunched = false;
            document.getElementById('gameOver').classList.add('hidden');
            initBumpers();
            initTargets();
            initPaddles();
            resetBall();
            updateHUD();
        }

        function restartGame() {
            resetGame();
        }

        function toggleFullscreen() {
            const container = document.getElementById('game-container');
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => {
                    console.log('全画面エラー:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Controls
        document.getElementById('leftPaddle').addEventListener('mousedown', () => {
            leftPaddle.active = true;
            leftPaddle.targetAngle = -0.3;
        });

        document.getElementById('leftPaddle').addEventListener('mouseup', () => {
            leftPaddle.active = false;
            leftPaddle.targetAngle = 0.4;
        });

        document.getElementById('rightPaddle').addEventListener('mousedown', () => {
            rightPaddle.active = true;
            rightPaddle.targetAngle = 0.3;
        });

        document.getElementById('rightPaddle').addEventListener('mouseup', () => {
            rightPaddle.active = false;
            rightPaddle.targetAngle = -0.4;
        });

        // Touch controls
        document.getElementById('leftPaddle').addEventListener('touchstart', (e) => {
            e.preventDefault();
            leftPaddle.active = true;
            leftPaddle.targetAngle = -0.3;
        });

        document.getElementById('leftPaddle').addEventListener('touchend', () => {
            leftPaddle.active = false;
            leftPaddle.targetAngle = 0.4;
        });

        document.getElementById('rightPaddle').addEventListener('touchstart', (e) => {
            e.preventDefault();
            rightPaddle.active = true;
            rightPaddle.targetAngle = 0.3;
        });

        document.getElementById('rightPaddle').addEventListener('touchend', () => {
            rightPaddle.active = false;
            rightPaddle.targetAngle = -0.4;
        });

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyA') {
                leftPaddle.active = true;
                leftPaddle.targetAngle = -0.3;
            }
            if (e.code === 'KeyD') {
                rightPaddle.active = true;
                rightPaddle.targetAngle = 0.3;
            }
            if (e.code === 'Space') {
                e.preventDefault();
                launchBall();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'KeyA') {
                leftPaddle.active = false;
                leftPaddle.targetAngle = 0.4;
            }
            if (e.code === 'KeyD') {
                rightPaddle.active = false;
                rightPaddle.targetAngle = -0.4;
            }
        });

        // Initialize
        window.addEventListener('resize', () => {
            resize();
            initBumpers();
            initTargets();
            initPaddles();
            if (!ballLaunched) {
                resetBall();
            }
        });

        resize();
        initBumpers();
        initTargets();
        initPaddles();
        resetBall();
        updateHUD();
        gameLoop();
    </script>
</body>
</html>
