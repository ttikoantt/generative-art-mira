<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Matrix - Memory Puzzle Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
            color: white;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 20px;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            min-width: 100px;
        }

        .info-item label {
            display: block;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
        }

        .info-item span {
            font-size: 24px;
            font-weight: bold;
        }

        .grid {
            display: grid;
            gap: 8px;
            margin: 20px auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            max-width: 400px;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .cell.active {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
        }

        .cell.preview {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }

        .cell:hover {
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .cell.correct {
            background: linear-gradient(135deg, #00b894, #00cec9);
            animation: pulse 0.5s;
        }

        .cell.wrong {
            background: linear-gradient(135deg, #d63031, #e17055);
            animation: shake 0.5s;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .message {
            font-size: 20px;
            margin: 20px 0;
            min-height: 30px;
        }

        .message.success {
            color: #00b894;
        }

        .message.error {
            color: #d63031;
        }

        .btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 210, 255, 0.4);
        }

        .btn.secondary {
            background: rgba(255, 255, 255, 0.1);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 10;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .instructions {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 24px;
            }

            .info {
                gap: 10px;
            }

            .info-item {
                padding: 8px 15px;
                min-width: 80px;
            }

            .info-item span {
                font-size: 18px;
            }

            .grid {
                gap: 5px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">⛶ Fullscreen</button>

    <div class="container">
        <h1>Memory Matrix</h1>

        <div class="info">
            <div class="info-item">
                <label>Level</label>
                <span id="level">1</span>
            </div>
            <div class="info-item">
                <label>Score</label>
                <span id="score">0</span>
            </div>
            <div class="info-item">
                <label>Lives</label>
                <span id="lives">3</span>
            </div>
        </div>

        <div class="grid" id="grid"></div>

        <div class="message" id="message">Watch the pattern!</div>

        <button class="btn" id="startBtn">Start Game</button>

        <div class="instructions">
            <p>🔵 Watch the blue pattern carefully</p>
            <p>👆 Tap the cells in the same order</p>
            <p>❤️ You have 3 lives</p>
        </div>
    </div>

    <script>
        let gridSize = 3;
        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let score = 0;
        let lives = 3;
        let isShowingSequence = false;
        let canClick = false;

        const grid = document.getElementById('grid');
        const messageEl = document.getElementById('message');
        const startBtn = document.getElementById('startBtn');
        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');

        function initGrid() {
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;

            for (let i = 0; i < gridSize * gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleCellClick(i));
                grid.appendChild(cell);
            }
        }

        function generateSequence() {
            const count = Math.min(level + 2, gridSize * gridSize);
            const indices = [];

            while (indices.length < count) {
                const index = Math.floor(Math.random() * (gridSize * gridSize));
                if (!indices.includes(index)) {
                    indices.push(index);
                }
            }

            return indices;
        }

        async function showSequence() {
            isShowingSequence = true;
            canClick = false;
            messageEl.textContent = 'Watch carefully...';
            messageEl.className = 'message';

            const cells = document.querySelectorAll('.cell');

            // Show preview
            for (const index of sequence) {
                cells[index].classList.add('preview');
            }

            await sleep(1500);

            // Hide all
            cells.forEach(cell => cell.classList.remove('preview'));

            await sleep(500);

            // Show sequence one by one
            for (const index of sequence) {
                cells[index].classList.add('preview');
                await sleep(400);
                cells[index].classList.remove('preview');
                await sleep(200);
            }

            await sleep(500);

            isShowingSequence = false;
            canClick = true;
            playerSequence = [];
            messageEl.textContent = 'Your turn!';
        }

        function handleCellClick(index) {
            if (!canClick || isShowingSequence) return;

            const cell = document.querySelectorAll('.cell')[index];
            playerSequence.push(index);

            if (sequence[playerSequence.length - 1] === index) {
                // Correct so far
                cell.classList.add('active');

                if (playerSequence.length === sequence.length) {
                    // Complete!
                    canClick = false;
                    score += level * 10;
                    scoreEl.textContent = score;

                    messageEl.textContent = 'Perfect! 🎉';
                    messageEl.className = 'message success';

                    setTimeout(() => {
                        level++;
                        levelEl.textContent = level;

                        if (level % 3 === 1 && gridSize < 5) {
                            gridSize++;
                            initGrid();
                        }

                        startRound();
                    }, 1500);
                }
            } else {
                // Wrong!
                cell.classList.add('wrong');
                lives--;
                livesEl.textContent = lives;

                if (lives <= 0) {
                    gameOver();
                } else {
                    messageEl.textContent = `Wrong! ${lives} lives left`;
                    messageEl.className = 'message error';

                    setTimeout(() => {
                        document.querySelectorAll('.cell').forEach(c => {
                            c.classList.remove('active', 'wrong');
                        });
                        showSequence();
                    }, 1500);
                }
            }
        }

        function startRound() {
            sequence = generateSequence();
            playerSequence = [];
            document.querySelectorAll('.cell').forEach(c => {
                c.classList.remove('active', 'wrong');
            });
            showSequence();
        }

        function gameOver() {
            canClick = false;
            messageEl.textContent = `Game Over! Final Score: ${score}`;
            messageEl.className = 'message error';
            startBtn.textContent = 'Play Again';
            startBtn.style.display = 'inline-block';
        }

        function startGame() {
            level = 1;
            score = 0;
            lives = 3;
            gridSize = 3;

            levelEl.textContent = level;
            scoreEl.textContent = score;
            livesEl.textContent = lives;

            initGrid();
            startBtn.style.display = 'none';
            startRound();
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Fullscreen button
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Start button
        startBtn.addEventListener('click', startGame);

        // Initialize
        initGrid();
    </script>
</body>
</html>
