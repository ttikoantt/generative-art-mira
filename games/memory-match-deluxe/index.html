<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Memory Match Deluxe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            max-width: 600px;
        }
        
        h1 {
            color: #fff;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 4px 20px rgba(0, 212, 255, 0.5);
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-value {
            color: #00d4ff;
            font-size: 1.8em;
            font-weight: bold;
            margin-top: 5px;
        }
        
        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 600px;
            width: 100%;
            aspect-ratio: 1;
        }
        
        .card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 2px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            opacity: 0;
            transition: opacity 0.3s;
            border-radius: 13px;
        }
        
        .card.flipped::before {
            opacity: 0.1;
        }
        
        .card:hover:not(.flipped):not(.matched) {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3);
        }
        
        .card.flipped {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 153, 255, 0.1));
            transform: rotateY(180deg);
        }
        
        .card.matched {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.2), rgba(0, 204, 106, 0.1));
            animation: matchPulse 0.5s ease-out;
        }
        
        @keyframes matchPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .card-icon {
            position: relative;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .card.flipped .card-icon,
        .card.matched .card-icon {
            opacity: 1;
        }
        
        .btn {
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.6);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .win-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        
        .win-screen.show {
            opacity: 1;
            pointer-events: all;
        }
        
        .win-screen h2 {
            color: #00ff88;
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
        }
        
        .win-stats {
            color: white;
            font-size: 1.5em;
            margin-bottom: 30px;
            text-align: center;
        }
        
        /* Mobile responsive */
        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }
            
            .game-board {
                gap: 10px;
            }
            
            .card {
                font-size: 2em;
            }
            
            .stats {
                padding: 10px;
            }
            
            .stat-value {
                font-size: 1.4em;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎮 Memory Match</h1>
        <div class="stats">
            <div class="stat">
                <div class="stat-label">Moves</div>
                <div class="stat-value" id="moves">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Pairs</div>
                <div class="stat-value"><span id="pairs">0</span>/8</div>
            </div>
            <div class="stat">
                <div class="stat-label">Time</div>
                <div class="stat-value" id="time">00:00</div>
            </div>
        </div>
    </div>
    
    <div class="game-board" id="gameBoard"></div>
    
    <button class="btn" id="restartBtn">New Game</button>
    
    <div class="win-screen" id="winScreen">
        <h2>🎉 You Win!</h2>
        <div class="win-stats">
            <p>Moves: <span id="finalMoves">0</span></p>
            <p>Time: <span id="finalTime">00:00</span></p>
        </div>
        <button class="btn" id="playAgainBtn">Play Again</button>
    </div>
    
    <script>
        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const pairsDisplay = document.getElementById('pairs');
        const timeDisplay = document.getElementById('time');
        const winScreen = document.getElementById('winScreen');
        const finalMoves = document.getElementById('finalMoves');
        const finalTime = document.getElementById('finalTime');
        
        // Card icons (emojis)
        const icons = ['🌟', '🎨', '🎵', '🌸', '🎭', '🎪', '🎯', '🎲'];
        
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let gameTimer = null;
        let seconds = 0;
        let isProcessing = false;
        
        // Initialize game
        function initGame() {
            // Reset state
            cards = [];
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            seconds = 0;
            isProcessing = false;
            
            // Update displays
            movesDisplay.textContent = '0';
            pairsDisplay.textContent = '0';
            timeDisplay.textContent = '00:00';
            
            // Clear timer
            if (gameTimer) {
                clearInterval(gameTimer);
            }
            
            // Create card pairs
            const cardPairs = [...icons, ...icons];
            shuffleArray(cardPairs);
            
            // Clear board
            gameBoard.innerHTML = '';
            
            // Create cards
            cardPairs.forEach((icon, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;
                card.dataset.icon = icon;
                
                const iconElement = document.createElement('span');
                iconElement.className = 'card-icon';
                iconElement.textContent = icon;
                
                card.appendChild(iconElement);
                card.addEventListener('click', () => flipCard(card));
                gameBoard.appendChild(card);
                
                cards.push(card);
            });
            
            // Start timer
            gameTimer = setInterval(updateTimer, 1000);
        }
        
        // Shuffle array
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
        
        // Flip card
        function flipCard(card) {
            if (isProcessing) return;
            if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
            if (flippedCards.length >= 2) return;
            
            card.classList.add('flipped');
            flippedCards.push(card);
            
            if (flippedCards.length === 2) {
                moves++;
                movesDisplay.textContent = moves;
                checkMatch();
            }
        }
        
        // Check for match
        function checkMatch() {
            isProcessing = true;
            const [card1, card2] = flippedCards;
            const icon1 = card1.dataset.icon;
            const icon2 = card2.dataset.icon;
            
            if (icon1 === icon2) {
                // Match found
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    matchedPairs++;
                    pairsDisplay.textContent = matchedPairs;
                    flippedCards = [];
                    isProcessing = false;
                    
                    if (matchedPairs === icons.length) {
                        endGame();
                    }
                }, 500);
            } else {
                // No match
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    isProcessing = false;
                }, 1000);
            }
        }
        
        // Update timer
        function updateTimer() {
            seconds++;
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            timeDisplay.textContent = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        
        // End game
        function endGame() {
            clearInterval(gameTimer);
            finalMoves.textContent = moves;
            finalTime.textContent = timeDisplay.textContent;
            winScreen.classList.add('show');
        }
        
        // Event listeners
        document.getElementById('restartBtn').addEventListener('click', () => {
            initGame();
        });
        
        document.getElementById('playAgainBtn').addEventListener('click', () => {
            winScreen.classList.remove('show');
            initGame();
        });
        
        // Start game
        initGame();
    </script>
</body>
</html>
