<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Blitz - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            padding: 20px;
        }

        .game-container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 8px;
            font-size: 28px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            color: #a0a0a0;
            text-align: center;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 24px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            color: #888;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .stat-value {
            color: #4ecdc4;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(78, 205, 196, 0.5);
        }

        .number-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .number-btn {
            aspect-ratio: 1;
            background: linear-gradient(145deg, #2a2a4a, #1a1a3a);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .number-btn:hover:not(:disabled) {
            background: linear-gradient(145deg, #3a3a5a, #2a2a4a);
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(78, 205, 196, 0.3);
        }

        .number-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .number-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .number-btn.correct {
            background: linear-gradient(145deg, #4ecdc4, #44a08d) !important;
            animation: pulse 0.3s ease-out;
        }

        .number-btn.wrong {
            background: linear-gradient(145deg, #ff6b6b, #ee5a5a) !important;
            animation: shake 0.3s ease-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .target-number {
            text-align: center;
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
        }

        .target-label {
            color: #888;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .target-value {
            color: #fff;
            font-size: 56px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(78, 205, 196, 0.8);
        }

        .timer-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ecdc4, #44a08d);
            transition: width 0.1s linear;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(145deg, #4ecdc4, #44a08d);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(78, 205, 196, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(78, 205, 196, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .game-over {
            text-align: center;
            padding: 40px 20px;
        }

        .game-over h2 {
            color: #4ecdc4;
            font-size: 32px;
            margin-bottom: 16px;
        }

        .final-score {
            color: #fff;
            font-size: 64px;
            font-weight: bold;
            margin-bottom: 24px;
            text-shadow: 0 0 30px rgba(78, 205, 196, 0.8);
        }

        .hidden {
            display: none !important;
        }

        .fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="game-container">
        <h1>🔢 Number Blitz</h1>
        <p class="subtitle">タップするだけのスピードゲーム</p>

        <div id="gameScreen">
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">スコア</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">コンボ</div>
                    <div class="stat-value" id="combo">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">ハイスコア</div>
                    <div class="stat-value" id="highScore">0</div>
                </div>
            </div>

            <div class="target-number">
                <div class="target-label">タップする番号</div>
                <div class="target-value" id="targetNumber">1</div>
            </div>

            <div class="timer-bar">
                <div class="timer-fill" id="timerFill"></div>
            </div>

            <div class="number-grid" id="numberGrid"></div>
        </div>

        <div id="gameOverScreen" class="game-over hidden">
            <h2>🎮 ゲームオーバー</h2>
            <div class="final-score" id="finalScore">0</div>
            <p style="color: #a0a0a0; margin-bottom: 24px;">ポイント</p>
            <button class="btn" onclick="restartGame()">もう一度プレイ</button>
        </div>

        <div id="startScreen" class="game-over">
            <h2>🔢 Number Blitz</h2>
            <p style="color: #a0a0a0; margin-bottom: 24px;">
                表示された数字を順番にタップ！<br>
                スピードと正確さが鍵です
            </p>
            <button class="btn" onclick="startGame()">ゲームスタート</button>
        </div>
    </div>

    <script>
        let score = 0;
        let combo = 0;
        let highScore = parseInt(localStorage.getItem('numberBlitzHighScore')) || 0;
        let currentNumber = 1;
        let timeLeft = 30;
        let timerInterval;
        let gameActive = false;
        let numbers = [];

        document.getElementById('highScore').textContent = highScore;

        function shuffleNumbers() {
            numbers = Array.from({ length: 25 }, (_, i) => i + 1);
            for (let i = numbers.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [numbers[i], numbers[j]] = [numbers[j], numbers[i]];
            }
        }

        function createGrid() {
            const grid = document.getElementById('numberGrid');
            grid.innerHTML = '';
            shuffleNumbers();

            numbers.forEach((num, index) => {
                const btn = document.createElement('button');
                btn.className = 'number-btn';
                btn.textContent = num;
                btn.dataset.number = num;
                btn.onclick = () => handleNumberClick(num, btn);
                grid.appendChild(btn);
            });
        }

        function handleNumberClick(number, btn) {
            if (!gameActive || btn.disabled) return;

            if (number === currentNumber) {
                // Correct
                btn.classList.add('correct');
                btn.disabled = true;

                combo++;
                const comboBonus = Math.floor(combo / 5) * 2;
                score += 10 + comboBonus;

                updateStats();

                if (currentNumber === 25) {
                    // Round complete - generate new grid
                    currentNumber = 1;
                    setTimeout(() => {
                        createGrid();
                        document.getElementById('targetNumber').textContent = currentNumber;
                    }, 300);
                } else {
                    currentNumber++;
                    document.getElementById('targetNumber').textContent = currentNumber;
                }
            } else {
                // Wrong
                btn.classList.add('wrong');
                combo = 0;
                timeLeft = Math.max(0, timeLeft - 2);
                updateStats();

                setTimeout(() => {
                    btn.classList.remove('wrong');
                }, 300);
            }
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('numberBlitzHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
        }

        function startGame() {
            score = 0;
            combo = 0;
            currentNumber = 1;
            timeLeft = 30;
            gameActive = true;

            updateStats();
            createGrid();
            document.getElementById('targetNumber').textContent = currentNumber;

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');

            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                const percentage = (timeLeft / 30) * 100;
                document.getElementById('timerFill').style.width = percentage + '%';

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 100);
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);

            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('finalScore').textContent = score;
        }

        function restartGame() {
            startGame();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
