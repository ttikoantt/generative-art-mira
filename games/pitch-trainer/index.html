<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音感トレーナー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            text-align: center;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
        }
        .play-btn {
            width: 100%;
            padding: 20px;
            font-size: 18px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 15px;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
            margin-bottom: 20px;
        }
        .play-btn:hover {
            transform: scale(1.05);
        }
        .play-btn:active {
            transform: scale(0.95);
        }
        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .option-btn {
            padding: 15px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        .option-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .option-btn.correct {
            background: rgba(76, 217, 100, 0.5);
            border-color: #4cd964;
        }
        .option-btn.wrong {
            background: rgba(255, 59, 48, 0.5);
            border-color: #ff3b30;
        }
        .feedback {
            text-align: center;
            font-size: 18px;
            min-height: 27px;
            margin-bottom: 10px;
        }
        .feedback.correct { color: #4cd964; }
        .feedback.wrong { color: #ff3b30; }
        .difficulty {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .diff-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }
        .diff-btn.active {
            background: rgba(255, 255, 255, 0.4);
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            h1 { font-size: 24px; }
            .stat-value { font-size: 24px; }
            .options { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    
    <div class="container">
        <h1>🎵 音感トレーナー #862</h1>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="score">0</div>
                <div>スコア</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="streak">0</div>
                <div>連続正解</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="accuracy">0%</div>
                <div>正答率</div>
            </div>
        </div>
        
        <div class="difficulty">
            <button class="diff-btn active" onclick="setDifficulty('easy')">簡単</button>
            <button class="diff-btn" onclick="setDifficulty('medium')">普通</button>
            <button class="diff-btn" onclick="setDifficulty('hard')">難しい</button>
        </div>
        
        <button class="play-btn" id="playBtn" onclick="playNote()">
            🔊 音を再生
        </button>
        
        <div class="feedback" id="feedback"></div>
        
        <div class="options" id="options">
            <button class="option-btn" onclick="checkAnswer('C')">ド (C)</button>
            <button class="option-btn" onclick="checkAnswer('D')">レ (D)</button>
            <button class="option-btn" onclick="checkAnswer('E')">ミ (E)</button>
            <button class="option-btn" onclick="checkAnswer('F')">ファ (F)</button>
            <button class="option-btn" onclick="checkAnswer('G')">ソ (G)</button>
            <button class="option-btn" onclick="checkAnswer('A')">ラ (A)</button>
            <button class="option-btn" onclick="checkAnswer('B')">シ (B)</button>
            <button class="option-btn" onclick="checkAnswer('C5')">高いド (C5)</button>
        </div>
    </div>

    <script>
        let audioContext;
        let currentNote;
        let score = 0;
        let streak = 0;
        let totalQuestions = 0;
        let correctAnswers = 0;
        let difficulty = 'easy';
        let canAnswer = false;
        
        const notes = {
            'C': { freq: 261.63, name: 'ド (C)' },
            'D': { freq: 293.66, name: 'レ (D)' },
            'E': { freq: 329.63, name: 'ミ (E)' },
            'F': { freq: 349.23, name: 'ファ (F)' },
            'G': { freq: 392.00, name: 'ソ (G)' },
            'A': { freq: 440.00, name: 'ラ (A)' },
            'B': { freq: 493.88, name: 'シ (B)' },
            'C5': { freq: 523.25, name: '高いド (C5)' }
        };
        
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function playNote() {
            initAudio();
            
            const noteKeys = Object.keys(notes);
            
            if (difficulty === 'easy') {
                currentNote = noteKeys[Math.floor(Math.random() * 5)]; // C-G
            } else if (difficulty === 'medium') {
                currentNote = noteKeys[Math.floor(Math.random() * 7)]; // C-B
            } else {
                currentNote = noteKeys[Math.floor(Math.random() * 8)]; // 全部
            }
            
            const note = notes[currentNote];
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = note.freq;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 1);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 1);
            
            canAnswer = true;
            document.getElementById('feedback').textContent = '';
            resetButtons();
        }
        
        function checkAnswer(answer) {
            if (!canAnswer) return;
            
            totalQuestions++;
            canAnswer = false;
            
            const buttons = document.querySelectorAll('.option-btn');
            
            if (answer === currentNote) {
                correctAnswers++;
                streak++;
                score += 10 * streak;
                document.getElementById('feedback').textContent = '🎉 正解！';
                document.getElementById('feedback').className = 'feedback correct';
                event.target.classList.add('correct');
            } else {
                streak = 0;
                document.getElementById('feedback').textContent = `❌ 間違い！正解は ${notes[currentNote].name}`;
                document.getElementById('feedback').className = 'feedback wrong';
                event.target.classList.add('wrong');
                
                // 正解をハイライト
                buttons.forEach(btn => {
                    if (btn.textContent.includes(notes[currentNote].name.split(' ')[0])) {
                        btn.classList.add('correct');
                    }
                });
            }
            
            updateStats();
            
            setTimeout(() => {
                document.getElementById('feedback').textContent = '';
                resetButtons();
            }, 1500);
        }
        
        function resetButtons() {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                btn.classList.remove('correct', 'wrong');
            });
        }
        
        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            const accuracy = totalQuestions > 0 ? Math.round((correctAnswers / totalQuestions) * 100) : 0;
            document.getElementById('accuracy').textContent = accuracy + '%';
        }
        
        function setDifficulty(level) {
            difficulty = level;
            document.querySelectorAll('.diff-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // スコアリセット
            score = 0;
            streak = 0;
            totalQuestions = 0;
            correctAnswers = 0;
            updateStats();
        }
        
        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        }
        
        // キーボードショートカット
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                playNote();
            }
        });
    </script>
</body>
</html>
