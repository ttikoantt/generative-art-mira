<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tap Collection - ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 10px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .header-item {
            color: white;
            font-size: 14px;
        }

        .header-item strong {
            font-size: 20px;
            color: #4ade80;
        }

        .play-area {
            flex: 1;
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
        }

        .target {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
            animation: pulse 1s ease-in-out infinite;
        }

        .target:active {
            transform: scale(0.9);
        }

        .target.tapped {
            animation: pop 0.3s ease-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }

        .collection {
            display: flex;
            gap: 5px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            margin-top: 10px;
            min-height: 50px;
            overflow-x: auto;
        }

        .collection-item {
            font-size: 24px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay-title {
            color: white;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .overlay-score {
            color: #4ade80;
            font-size: 48px;
            margin-bottom: 30px;
        }

        .overlay-items {
            color: white;
            font-size: 18px;
            margin-bottom: 30px;
            text-align: center;
        }

        .btn {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            z-index: 50;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            .header-item {
                font-size: 12px;
            }
            .header-item strong {
                font-size: 18px;
            }
            .target {
                width: 50px;
                height: 50px;
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="header-item">スコア: <strong id="score">0</strong></div>
            <div class="header-item">時間: <strong id="timer">30</strong>s</div>
            <div class="header-item">レベル: <strong id="level">1</strong></div>
        </div>

        <div class="play-area" id="playArea"></div>

        <div class="collection" id="collection"></div>
    </div>

    <div class="overlay" id="startOverlay">
        <div class="overlay-title">🎯 Tap Collection</div>
        <div style="color: #aaa; margin-bottom: 30px; font-size: 16px; text-align: center; padding: 0 20px;">
            出現するアイテムをタップしてコレクションしよう！<br>
            レベルが上がると難易度アップ！
        </div>
        <button class="btn" id="startBtn">ゲーム開始</button>
    </div>

    <div class="overlay hidden" id="endOverlay">
        <div class="overlay-title">🎉 ゲーム終了！</div>
        <div class="overlay-score" id="finalScore">0</div>
        <div class="overlay-items" id="finalItems">0個コレクション</div>
        <button class="btn" id="restartBtn">もう一度</button>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>

    <script>
        const playArea = document.getElementById('playArea');
        const collection = document.getElementById('collection');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const levelEl = document.getElementById('level');
        const startOverlay = document.getElementById('startOverlay');
        const endOverlay = document.getElementById('endOverlay');
        const finalScoreEl = document.getElementById('finalScore');
        const finalItemsEl = document.getElementById('finalItems');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        const ITEMS = ['🍎', '🍊', '🍋', '🍇', '🍓', '🍒', '🥝', '🍑', '🍌', '🍉', '⭐', '🌙', '☀️', '🔥', '💎', '🎀', '🎸', '🎹', '🎺', '🎻'];
        const COLORS = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#06b6d4', '#3b82f6', '#8b5cf6', '#ec4899'];

        let score = 0;
        let timeLeft = 30;
        let level = 1;
        let collected = [];
        let gameTimer = null;
        let spawnTimer = null;
        let isPlaying = false;

        function startGame() {
            score = 0;
            timeLeft = 30;
            level = 1;
            collected = [];
            isPlaying = true;

            updateUI();
            startOverlay.classList.add('hidden');
            endOverlay.classList.add('hidden');
            collection.innerHTML = '';

            gameTimer = setInterval(updateTimer, 1000);
            spawnTarget();
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameTimer);
            clearTimeout(spawnTimer);

            // 全てのターゲットを削除
            playArea.querySelectorAll('.target').forEach(t => t.remove());

            finalScoreEl.textContent = score;
            finalItemsEl.textContent = `${collected.length}個コレクション`;
            endOverlay.classList.remove('hidden');
        }

        function updateTimer() {
            timeLeft--;
            timerEl.textContent = timeLeft;

            if (timeLeft <= 0) {
                endGame();
            }
        }

        function updateUI() {
            scoreEl.textContent = score;
            timerEl.textContent = timeLeft;
            levelEl.textContent = level;
        }

        function spawnTarget() {
            if (!isPlaying) return;

            const target = document.createElement('div');
            target.className = 'target';

            const item = ITEMS[Math.floor(Math.random() * ITEMS.length)];
            const color = COLORS[Math.floor(Math.random() * COLORS.length)];

            target.textContent = item;
            target.style.background = `radial-gradient(circle, ${color}88, ${color}44)`;
            target.style.boxShadow = `0 0 20px ${color}66`;

            const maxX = playArea.offsetWidth - 70;
            const maxY = playArea.offsetHeight - 70;
            target.style.left = Math.random() * maxX + 'px';
            target.style.top = Math.random() * maxY + 'px';

            target.addEventListener('click', () => onTap(target, item));
            target.addEventListener('touchstart', (e) => {
                e.preventDefault();
                onTap(target, item);
            });

            playArea.appendChild(target);

            // 消えるタイマー（レベルで短くなる）
            const disappearTime = Math.max(1000, 3000 - level * 200);
            setTimeout(() => {
                if (target.parentNode) {
                    target.remove();
                    // 次のターゲット
                    if (isPlaying) {
                        const nextDelay = Math.max(500, 2000 - level * 100);
                        spawnTimer = setTimeout(spawnTarget, nextDelay);
                    }
                }
            }, disappearTime);
        }

        function onTap(target, item) {
            if (!isPlaying) return;

            target.classList.add('tapped');
            
            // スコア計算（レベルで高得点）
            const points = 10 * level;
            score += points;

            // コレクションに追加
            collected.push(item);
            const collectionItem = document.createElement('span');
            collectionItem.className = 'collection-item';
            collectionItem.textContent = item;
            collection.appendChild(collectionItem);

            // スクロール
            collection.scrollLeft = collection.scrollWidth;

            // レベルアップ（5個ごと）
            if (collected.length % 5 === 0) {
                level++;
                timeLeft = Math.min(timeLeft + 5, 30); // ボーナス時間
            }

            updateUI();

            setTimeout(() => target.remove(), 300);

            // 次のターゲット
            if (isPlaying) {
                const nextDelay = Math.max(500, 2000 - level * 100);
                spawnTimer = setTimeout(spawnTarget, nextDelay);
            }
        }

        // イベントリスナー
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // リサイズ対応
        window.addEventListener('resize', () => {
            // ターゲットの位置調整が必要なら
        });
    </script>
</body>
</html>
