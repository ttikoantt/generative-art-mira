<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Dot Connect - ドットコネクト</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            touch-action: manipulation;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #764ba2;
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #667eea;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #f5f7fa, #e8ecf3);
            border-radius: 12px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #764ba2;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #667eea;
            margin-top: 5px;
        }

        #gameCanvas {
            border: 3px solid #667eea;
            border-radius: 12px;
            background: #f8f9ff;
            cursor: pointer;
            touch-action: none;
            display: block;
            margin: 0 auto;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button.restart {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }

        .info {
            margin-top: 15px;
            color: #667eea;
            font-size: 0.85rem;
            text-align: center;
            line-height: 1.6;
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.98);
            padding: 30px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            text-align: center;
            z-index: 1000;
            display: none;
        }

        .message h2 {
            color: #764ba2;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .message p {
            color: #667eea;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 999;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5rem;
            }

            #gameCanvas {
                width: 100%;
                height: auto;
            }

            button {
                padding: 10px 18px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 Pixel Dot Connect</h1>
        <p class="subtitle">数字を順番に繋いでいこう！</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">スコア</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="level">1</div>
                <div class="stat-label">レベル</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="timer">60</div>
                <div class="stat-label">時間</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="350" height="350"></canvas>

        <div class="controls">
            <button onclick="startGame()">🎮 スタート</button>
            <button class="restart" onclick="restartGame()">🔄 リスタート</button>
        </div>

        <div class="info">
            <p>💡 数字を1から順番にタップして繋いでいこう！</p>
            <p>⏱️ 制限時間内にクリアで次のレベルへ</p>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="message" id="message">
        <h2 id="messageTitle">🎉 レベルクリア！</h2>
        <p id="messageText">素晴らしい！</p>
        <button onclick="closeMessage()">つづける</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let dots = [];
        let nextDot = 1;
        let score = 0;
        let level = 1;
        let timer = 60;
        let timerInterval = null;
        let gameActive = false;

        const dotRadius = 18;
        const colors = [
            '#f5576c', '#f093fb', '#667eea', '#4facfe', '#00f2fe',
            '#fa709a', '#fee140', '#30cfd0', '#38f9d7', '#a8edea'
        ];

        class Dot {
            constructor(number, x, y) {
                this.number = number;
                this.x = x;
                this.y = y;
                this.radius = dotRadius;
                this.baseRadius = dotRadius;
                this.connected = false;
                this.color = colors[(number - 1) % colors.length];
                this.scale = 1;
                this.targetScale = 1;
            }

            update() {
                this.scale += (this.targetScale - this.scale) * 0.2;
            }

            draw() {
                ctx.save();

                // グロー効果
                if (this.number === nextDot && !this.connected) {
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = 15;
                }

                // 円
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * this.scale, 0, Math.PI * 2);
                
                if (this.connected) {
                    ctx.fillStyle = '#95a5a6';
                    ctx.strokeStyle = '#7f8c8d';
                } else if (this.number === nextDot) {
                    ctx.fillStyle = this.color;
                    ctx.strokeStyle = '#fff';
                } else {
                    ctx.fillStyle = '#ecf0f1';
                    ctx.strokeStyle = '#bdc3c7';
                }

                ctx.fill();
                ctx.lineWidth = 3;
                ctx.stroke();

                // 数字
                ctx.fillStyle = this.connected ? '#fff' : '#2c3e50';
                ctx.font = `bold ${14 * this.scale}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.number, this.x, this.y);

                ctx.restore();
            }

            isClicked(x, y) {
                const dx = x - this.x;
                const dy = y - this.y;
                return dx * dx + dy * dy <= this.radius * this.radius * 1.5;
            }

            pulse() {
                this.targetScale = 1.2;
                setTimeout(() => {
                    this.targetScale = 1;
                }, 150);
            }
        }

        function generateDots() {
            dots = [];
            const padding = 50;
            const gridSize = Math.min(4 + Math.floor(level / 2), 7);
            const spacing = (canvas.width - padding * 2) / (gridSize - 1);

            const positions = [];

            for (let row = 0; row < gridSize; row++) {
                for (let col = 0; col < gridSize; col++) {
                    const x = padding + col * spacing;
                    const y = padding + row * spacing;
                    positions.push({ x, y });
                }
            }

            // シャッフル
            for (let i = positions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [positions[i], positions[j]] = [positions[j], positions[i]];
            }

            const numDots = Math.min(10 + level * 2, gridSize * gridSize);

            for (let i = 0; i < numDots; i++) {
                dots.push(new Dot(i + 1, positions[i].x, positions[i].y));
            }
        }

        function drawConnectingLines() {
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';

            const connectedDots = dots.filter(d => d.connected);
            connectedDots.sort((a, b) => a.number - b.number);

            if (connectedDots.length > 1) {
                ctx.beginPath();
                ctx.moveTo(connectedDots[0].x, connectedDots[0].y);

                for (let i = 1; i < connectedDots.length; i++) {
                    ctx.lineTo(connectedDots[i].x, connectedDots[i].y);
                }

                ctx.stroke();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // グリッド背景
            ctx.strokeStyle = 'rgba(102, 126, 234, 0.1)';
            ctx.lineWidth = 1;
            const gridSize = 30;
            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            drawConnectingLines();

            dots.forEach(dot => {
                dot.update();
                dot.draw();
            });

            if (gameActive) {
                requestAnimationFrame(draw);
            }
        }

        function handleClick(e) {
            if (!gameActive) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;

            for (const dot of dots) {
                if (dot.isClicked(x, y) && !dot.connected) {
                    if (dot.number === nextDot) {
                        dot.connected = true;
                        dot.pulse();
                        nextDot++;
                        score += 10 * level;

                        document.getElementById('score').textContent = score;

                        if (nextDot > dots.length) {
                            levelComplete();
                        }
                    } else {
                        // 間違えた場合のペナルティ
                        score = Math.max(0, score - 5);
                        document.getElementById('score').textContent = score;
                    }
                    break;
                }
            }
        }

        canvas.addEventListener('click', handleClick);

        function startGame() {
            if (gameActive) return;

            gameActive = true;
            nextDot = 1;
            timer = 60;

            generateDots();
            updateStats();

            timerInterval = setInterval(() => {
                timer--;
                document.getElementById('timer').textContent = timer;

                if (timer <= 0) {
                    gameOver();
                }
            }, 1000);

            draw();
        }

        function restartGame() {
            gameActive = false;
            if (timerInterval) clearInterval(timerInterval);

            score = 0;
            level = 1;
            nextDot = 1;
            timer = 60;

            updateStats();
            generateDots();

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            dots.forEach(dot => dot.draw());
        }

        function levelComplete() {
            gameActive = false;
            clearInterval(timerInterval);

            const bonus = timer * 5;
            score += bonus;
            level++;

            showMessage(
                '🎉 レベルクリア！',
                `ボーナス: +${bonus}点\n次はレベル${level}！`
            );
        }

        function gameOver() {
            gameActive = false;
            clearInterval(timerInterval);

            showMessage(
                '⏰ タイムアップ！',
                `最終スコア: ${score}点\nレベル: ${level}`
            );
        }

        function showMessage(title, text) {
            document.getElementById('messageTitle').textContent = title;
            document.getElementById('messageText').textContent = text;
            document.getElementById('message').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeMessage() {
            document.getElementById('message').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';

            if (timer <= 0) {
                restartGame();
            } else {
                startGame();
            }
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('timer').textContent = timer;
        }

        // 初期描画
        generateDots();
        dots.forEach(dot => dot.draw());
    </script>
</body>
</html>
