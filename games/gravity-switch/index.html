<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gravity Switch - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #1a1a2e;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: manipulation;
        }

        #gameCanvas {
            display: block;
            margin: 0 auto;
        }

        .ui {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }

        .score {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .high-score {
            color: #ffd700;
            font-size: 16px;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 20;
            backdrop-filter: blur(10px);
        }

        .overlay h1 {
            color: #fff;
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 18px;
            margin-bottom: 30px;
            text-align: center;
            max-width: 300px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            pointer-events: all;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .hidden {
            display: none !important;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 14px;
            cursor: pointer;
            z-index: 10;
            backdrop-filter: blur(10px);
            border-radius: 10px;
            transition: all 0.3s ease;
            pointer-events: all;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .gravity-indicator {
            position: absolute;
            left: 20px;
            bottom: 20px;
            color: white;
            font-size: 14px;
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="ui">
        <div class="score">Score: <span id="score">0</span></div>
        <div class="high-score">Best: <span id="highScore">0</span></div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    <div class="gravity-indicator">Tap/Space to flip gravity</div>

    <canvas id="gameCanvas"></canvas>

    <div class="overlay" id="startOverlay">
        <h1>Gravity Switch</h1>
        <p>Tap or press Space to flip gravity and avoid obstacles!</p>
        <button class="btn" onclick="startGame()">Start Game</button>
    </div>

    <div class="overlay hidden" id="gameOverOverlay">
        <h1>Game Over!</h1>
        <p>Score: <span id="finalScore">0</span></p>
        <button class="btn" onclick="startGame()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let gameState = 'start'; // 'start', 'playing', 'gameover'
        let score = 0;
        let highScore = localStorage.getItem('gravitySwitchHighScore') || 0;
        let gravity = 1;
        let gameSpeed = 3;
        let spawnTimer = 0;

        // Player
        let player = {
            x: 100,
            y: 0,
            width: 30,
            height: 30,
            velocityY: 0,
            gravity: 0.5
        };

        // Obstacles
        let obstacles = [];

        // Particles
        let particles = [];

        // Resize
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            if (gameState === 'start') {
                player.y = height / 2;
            }
        }

        // Spawn obstacle
        function spawnObstacle() {
            const gap = 150;
            const gapY = Math.random() * (height - gap - 100) + 50;

            obstacles.push({
                x: width,
                width: 50,
                gapY: gapY,
                gapHeight: gap,
                passed: false
            });
        }

        // Create particles
        function createParticles(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1,
                    color: color
                });
            }
        }

        // Update particles
        function updateParticles() {
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
            });
        }

        // Draw particles
        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        // Start game
        function startGame() {
            gameState = 'playing';
            score = 0;
            gameSpeed = 3;
            gravity = 1;
            player.y = height / 2;
            player.velocityY = 0;
            obstacles = [];
            particles = [];
            spawnTimer = 0;

            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('score').textContent = '0';
            document.getElementById('highScore').textContent = highScore;
        }

        // Game over
        function gameOver() {
            gameState = 'gameover';

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('gravitySwitchHighScore', highScore);
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.remove('hidden');

            createParticles(player.x, player.y, '#ff6b6b');
        }

        // Update
        function update() {
            if (gameState !== 'playing') return;

            // Update player
            player.velocityY += player.gravity * gravity;
            player.y += player.velocityY;

            // Boundary check
            if (player.y < 0 || player.y + player.height > height) {
                gameOver();
                return;
            }

            // Spawn obstacles
            spawnTimer++;
            if (spawnTimer > 100) {
                spawnObstacle();
                spawnTimer = 0;
            }

            // Update obstacles
            obstacles.forEach(obs => {
                obs.x -= gameSpeed;

                // Check pass
                if (!obs.passed && obs.x + obs.width < player.x) {
                    obs.passed = true;
                    score++;
                    document.getElementById('score').textContent = score;
                    gameSpeed += 0.1;
                }

                // Collision detection
                if (player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x) {
                    if (player.y < obs.gapY ||
                        player.y + player.height > obs.gapY + obs.gapHeight) {
                        gameOver();
                        return;
                    }
                }
            });

            // Remove off-screen obstacles
            obstacles = obstacles.filter(obs => obs.x + obs.width > 0);

            // Update particles
            updateParticles();
        }

        // Draw
        function draw() {
            // Clear
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, width, height);

            // Draw obstacles
            obstacles.forEach(obs => {
                ctx.fillStyle = '#ff6b6b';
                ctx.fillRect(obs.x, 0, obs.width, obs.gapY);
                ctx.fillRect(obs.x, obs.gapY + obs.gapHeight, obs.width, height - obs.gapY - obs.gapHeight);
            });

            // Draw player
            const gradient = ctx.createLinearGradient(player.x, player.y, player.x + player.width, player.y + player.height);
            gradient.addColorStop(0, '#4ecdc4');
            gradient.addColorStop(1, '#44a399');
            ctx.fillStyle = gradient;
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Player glow
            ctx.shadowColor = '#4ecdc4';
            ctx.shadowBlur = 20;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.shadowBlur = 0;

            // Draw particles
            drawParticles();
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Flip gravity
        function flipGravity() {
            if (gameState === 'playing') {
                gravity *= -1;
                createParticles(player.x + player.width / 2, player.y + player.height / 2, '#4ecdc4');
            }
        }

        // Events
        window.addEventListener('resize', resize);
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState === 'start') {
                    startGame();
                } else if (gameState === 'gameover') {
                    startGame();
                } else {
                    flipGravity();
                }
            }
        });
        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameState === 'playing') {
                flipGravity();
            }
        });
        window.addEventListener('click', () => {
            if (gameState === 'playing') {
                flipGravity();
            }
        });

        // Fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Start
        resize();
        document.getElementById('highScore').textContent = highScore;
        gameLoop();
    </script>
</body>
</html>
