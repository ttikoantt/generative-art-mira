<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Switch - 重力反転ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }
        canvas {
            display: block;
            margin: 0 auto;
        }
        .ui {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            pointer-events: none;
        }
        .ui.hidden {
            display: none;
        }
        .title {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff; }
            to { text-shadow: 0 0 30px #ff00ff, 0 0 60px #ff00ff; }
        }
        .score {
            font-size: 24px;
            margin-bottom: 30px;
            color: #00ffff;
        }
        .instructions {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.8;
        }
        .game-ui {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 24px;
            text-shadow: 0 0 10px #00ffff;
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 5px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            pointer-events: auto;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="ui" id="startScreen">
        <div class="title">GRAVITY SWITCH</div>
        <div class="score" id="finalScore"></div>
        <div class="instructions">
            タップで重力反転<br>
            障害物を避けろ<br><br>
            <span style="color: #00ffff;">TAP TO START</span>
        </div>
    </div>

    <div class="game-ui" id="gameUI" style="display: none;">
        <span id="scoreDisplay">0</span>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let gameRunning = false;
        let score = 0;
        let time = 0;

        // プレイヤー
        const player = {
            y: 0,
            vy: 0,
            gravity: 1, // 1: 下向き, -1: 上向き
            size: 30,
            targetY: 0
        };

        // 障害物
        let obstacles = [];
        const obstacleWidth = 60;
        const obstacleSpeed = 3;
        const obstacleSpawnRate = 60; // フレーム数

        function resize() {
            width = canvas.width = Math.min(window.innerWidth, 500);
            height = canvas.height = window.innerHeight;
            player.y = 50;
            player.targetY = 50;
        }

        window.addEventListener('resize', resize);
        resize();

        function startGame() {
            gameRunning = true;
            score = 0;
            time = 0;
            obstacles = [];
            player.y = 50;
            player.targetY = 50;
            player.gravity = 1;
            player.vy = 0;

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameUI').style.display = 'block';

            gameLoop();
        }

        function endGame() {
            gameRunning = false;
            document.getElementById('startScreen').classList.remove('hidden');
            document.getElementById('finalScore').textContent = `Score: ${Math.floor(score)}`;
            document.getElementById('gameUI').style.display = 'none';
        }

        function switchGravity() {
            if (!gameRunning) {
                startGame();
                return;
            }
            player.gravity *= -1;
            player.targetY = player.gravity === 1 ? 50 : height - 50;
            player.vy = 0;
        }

        canvas.addEventListener('click', switchGravity);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            switchGravity();
        });

        function spawnObstacle() {
            const gapSize = 150;
            const gapY = Math.random() * (height - gapSize - 100) + 50;

            obstacles.push({
                x: width,
                y: 0,
                height: gapY,
                width: obstacleWidth,
                type: 'top'
            });

            obstacles.push({
                x: width,
                y: gapY + gapSize,
                height: height - gapY - gapSize,
                width: obstacleWidth,
                type: 'bottom'
            });
        }

        function update() {
            time++;
            score += 0.1;

            // プレイヤーの位置更新
            player.vy += player.gravity * 0.8;
            player.y += player.vy;

            // 天井/床の制限
            if (player.gravity === 1 && player.y > 50) {
                player.y = 50;
                player.vy = 0;
            } else if (player.gravity === -1 && player.y < height - 50) {
                player.y = height - 50;
                player.vy = 0;
            }

            // 障害物の生成
            if (time % obstacleSpawnRate === 0) {
                spawnObstacle();
            }

            // 障害物の更新
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= obstacleSpeed;

                // 衝突判定
                const obs = obstacles[i];
                const playerLeft = width / 2 - player.size / 2;
                const playerRight = width / 2 + player.size / 2;
                const playerTop = player.y - player.size / 2;
                const playerBottom = player.y + player.size / 2;

                if (playerRight > obs.x && playerLeft < obs.x + obs.width) {
                    if (playerTop < obs.y + obs.height && playerBottom > obs.y) {
                        endGame();
                        return;
                    }
                }

                // 画面外に出たら削除
                if (obs.x + obs.width < 0) {
                    obstacles.splice(i, 1);
                }
            }

            document.getElementById('scoreDisplay').textContent = Math.floor(score);
        }

        function draw() {
            // 背景
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, width, height);

            // グリッド
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i < width; i += 30) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, height);
                ctx.stroke();
            }
            for (let i = 0; i < height; i += 30) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(width, i);
                ctx.stroke();
            }

            // 天井と床
            ctx.fillStyle = 'rgba(0, 255, 255, 0.2)';
            ctx.fillRect(0, 0, width, 50);
            ctx.fillRect(0, height - 50, width, 50);

            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, 50);
            ctx.lineTo(width, 50);
            ctx.moveTo(0, height - 50);
            ctx.lineTo(width, height - 50);
            ctx.stroke();

            // 障害物
            obstacles.forEach(obs => {
                const gradient = ctx.createLinearGradient(obs.x, 0, obs.x + obs.width, 0);
                gradient.addColorStop(0, '#ff00ff');
                gradient.addColorStop(1, '#00ffff');
                ctx.fillStyle = gradient;
                ctx.shadowColor = '#ff00ff';
                ctx.shadowBlur = 10;
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                ctx.shadowBlur = 0;
            });

            // プレイヤー
            const playerGradient = ctx.createRadialGradient(
                width / 2, player.y, 0,
                width / 2, player.y, player.size / 2
            );
            playerGradient.addColorStop(0, '#ffffff');
            playerGradient.addColorStop(0.5, '#00ffff');
            playerGradient.addColorStop(1, '#0066ff');
            ctx.fillStyle = playerGradient;
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(width / 2, player.y, player.size / 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // 重力インジケーター
            ctx.fillStyle = player.gravity === 1 ? '#00ffff' : '#ff00ff';
            ctx.font = '20px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText(player.gravity === 1 ? '▼' : '▲', width / 2, player.y + 7);
        }

        function gameLoop() {
            if (!gameRunning) return;

            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 初期描画
        draw();

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
