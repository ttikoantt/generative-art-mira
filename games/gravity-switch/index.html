<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Switch - 重力反転アクション</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.8);
        }

        h1 {
            font-size: clamp(16px, 4vw, 32px);
            color: #f0f;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: clamp(10px, 2vw, 14px);
            color: #888;
        }

        #canvas {
            flex: 1;
            display: block;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 200;
            display: none;
        }

        .game-over.show {
            display: block;
        }

        .game-over h2 {
            font-size: clamp(24px, 6vw, 48px);
            color: #f0f;
            margin-bottom: 20px;
        }

        .game-over p {
            font-size: clamp(14px, 3vw, 24px);
            margin-bottom: 20px;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 100;
        }

        button {
            padding: 10px 20px;
            font-size: clamp(12px, 2.5vw, 16px);
            background: rgba(255, 0, 255, 0.1);
            border: 1px solid #f0f;
            color: #f0f;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
        }

        button:hover {
            background: rgba(255, 0, 255, 0.3);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
        }

        button:active {
            transform: scale(0.95);
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            padding: 10px 15px;
        }

        .info {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: clamp(10px, 2vw, 14px);
            color: #f0f;
            opacity: 0.8;
            z-index: 100;
        }

        .stats {
            position: absolute;
            top: 20px;
            right: 80px;
            font-size: clamp(10px, 1.5vw, 12px);
            color: #f0f;
            z-index: 100;
            text-align: right;
        }

        .score {
            font-size: clamp(16px, 3vw, 24px);
        }
    </style>
</head>
<body>
    <header>
        <h1>🔄 Gravity Switch</h1>
        <div class="subtitle">重力反転アクション</div>
    </header>

    <div class="stats">
        <div class="score">Score: <span id="score">0</span></div>
        <div>High Score: <span id="highScore">0</span></div>
    </div>

    <canvas id="canvas"></canvas>

    <div class="info">
        Tap/Click/Space to switch gravity • Avoid obstacles
    </div>

    <div class="game-over" id="gameOver">
        <h2>💀 Game Over!</h2>
        <p>Score: <span id="finalScore">0</span></p>
        <button id="restartBtn">🔄 Restart</button>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let gameRunning = true;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('gravitySwitchHighScore')) || 0;

        // Game state
        let gravity = 1;
        let gravityDirection = 1;

        // Player
        const player = {
            x: 100,
            y: 0,
            width: 30,
            height: 30,
            velocityY: 0,
            jumpForce: 12,
            color: '#f0f'
        };

        // Obstacles
        let obstacles = [];
        const obstacleSpeed = 4;
        let obstacleSpawnTimer = 0;
        const obstacleSpawnInterval = 100;

        // Particles
        let particles = [];

        // Resize handler
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            player.y = height / 2;
        }

        window.addEventListener('resize', resize);
        resize();

        // Update high score display
        document.getElementById('highScore').textContent = highScore;

        // Obstacle class
        function createObstacle() {
            const gap = 180;
            const gapY = Math.random() * (height - gap - 100) + 50;

            return {
                x: width,
                gapY: gapY,
                gap: gap,
                width: 60,
                passed: false
            };
        }

        // Particle class for effects
        function createParticle(x, y) {
            return {
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 6,
                radius: Math.random() * 3 + 1,
                life: 1,
                hue: Math.random() * 60 + 280 // Purple-pink range
            };
        }

        // Switch gravity
        function switchGravity() {
            if (!gameRunning) return;

            gravityDirection *= -1;
            gravity = gravityDirection;
            player.velocityY = -gravityDirection * player.jumpForce;

            // Add particles at player position
            for (let i = 0; i < 10; i++) {
                particles.push(createParticle(player.x, player.y));
            }
        }

        // Game over
        function gameOver() {
            gameRunning = false;
            document.getElementById('gameOver').classList.add('show');
            document.getElementById('finalScore').textContent = score;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('gravitySwitchHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
        }

        // Restart game
        function restart() {
            gameRunning = true;
            score = 0;
            obstacles = [];
            particles = [];
            player.y = height / 2;
            player.velocityY = 0;
            gravityDirection = 1;
            gravity = 1;
            obstacleSpawnTimer = 0;
            document.getElementById('gameOver').classList.remove('show');
            document.getElementById('score').textContent = 0;
        }

        // Update game
        function update() {
            if (!gameRunning) return;

            // Apply gravity
            player.velocityY += gravity * 0.5;
            player.y += player.velocityY;

            // Boundary check
            if (player.y < 0) {
                player.y = 0;
                player.velocityY = 0;
            }
            if (player.y + player.height > height) {
                player.y = height - player.height;
                player.velocityY = 0;
            }

            // Spawn obstacles
            obstacleSpawnTimer++;
            if (obstacleSpawnTimer >= obstacleSpawnInterval) {
                obstacles.push(createObstacle());
                obstacleSpawnTimer = 0;
            }

            // Update obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= obstacleSpeed;

                // Check collision
                const obs = obstacles[i];
                if (player.x + player.width > obs.x && player.x < obs.x + obs.width) {
                    // Check if player is NOT in the gap
                    if (player.y < obs.gapY || player.y + player.height > obs.gapY + obs.gap) {
                        gameOver();
                    }
                }

                // Score
                if (!obs.passed && obs.x + obs.width < player.x) {
                    obs.passed = true;
                    score++;
                    document.getElementById('score').textContent = score;
                }

                // Remove off-screen obstacles
                if (obs.x + obs.width < 0) {
                    obstacles.splice(i, 1);
                }
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;

                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        // Draw game
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            // Draw background grid
            ctx.strokeStyle = 'rgba(255, 0, 255, 0.1)';
            ctx.lineWidth = 1;
            const gridSize = 50;
            for (let x = 0; x < width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            for (let y = 0; y < height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }

            // Draw obstacles
            obstacles.forEach(obs => {
                // Top obstacle
                ctx.fillStyle = '#f0f';
                ctx.fillRect(obs.x, 0, obs.width, obs.gapY);

                // Bottom obstacle
                ctx.fillRect(obs.x, obs.gapY + obs.gap, obs.width, height - obs.gapY - obs.gap);

                // Glow effect
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#f0f';
                ctx.fillRect(obs.x, 0, obs.width, obs.gapY);
                ctx.fillRect(obs.x, obs.gapY + obs.gap, obs.width, height - obs.gapY - obs.gap);
                ctx.shadowBlur = 0;
            });

            // Draw particles
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${p.hue}, 80%, 60%, ${p.life})`;
                ctx.fill();
            });

            // Draw player
            ctx.fillStyle = player.color;
            ctx.shadowBlur = 20;
            ctx.shadowColor = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.shadowBlur = 0;

            // Draw gravity indicator
            ctx.fillStyle = '#f0f';
            ctx.font = '24px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText(gravityDirection > 0 ? '⬇️' : '⬆️', player.x + player.width / 2, player.y - 15);
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Input handlers
        function handleInput(e) {
            if (e.type === 'keydown' && e.code !== 'Space') return;
            e.preventDefault();
            switchGravity();
        }

        document.addEventListener('keydown', handleInput);
        canvas.addEventListener('click', handleInput);
        canvas.addEventListener('touchstart', handleInput);

        // Button handlers
        document.getElementById('restartBtn').addEventListener('click', restart);
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Start game
        gameLoop();
    </script>
</body>
</html>
