<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Star Pop - 星を割るゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
            position: relative;
        }

        /* 星空の背景 */
        #bgStars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .bgStar {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .game-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ヘッダー */
        .header {
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .score-panel {
            text-align: center;
        }

        .score-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-value {
            color: #fff;
            font-size: 1.8rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 200, 0.5);
        }

        .time-panel {
            text-align: center;
        }

        .time-value {
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .time-value.warning {
            color: #ff6b6b;
            animation: pulse 0.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* コンボ表示 */
        .combo {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 100;
        }

        .combo.show {
            opacity: 1;
            animation: comboShow 0.5s ease;
        }

        @keyframes comboShow {
            0% { transform: translateX(-50%) scale(0.5); opacity: 0; }
            50% { transform: translateX(-50%) scale(1.2); }
            100% { transform: translateX(-50%) scale(1); opacity: 1; }
        }

        /* ゲームエリア */
        .game-area {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        /* 星 */
        .star {
            position: absolute;
            cursor: pointer;
            transition: transform 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }

        .star:active {
            transform: scale(0.9);
        }

        .star svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 10px currentColor);
        }

        .star.gold { color: #ffd700; }
        .star.silver { color: #c0c0c0; }
        .star.blue { color: #87ceeb; }
        .star.red { color: #ff6b6b; }
        .star.purple { color: #dda0dd; }

        /* パーティクル */
        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            animation: particleFade 0.8s ease-out forwards;
        }

        @keyframes particleFade {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(0);
            }
        }

        /* スコア浮き上がりエフェクト */
        .scorePopup {
            position: absolute;
            color: #fff;
            font-weight: bold;
            font-size: 1.5rem;
            pointer-events: none;
            animation: scoreFloat 1s ease-out forwards;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        @keyframes scoreFloat {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px) scale(1.2);
            }
        }

        /* スタート画面 */
        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .start-screen.hidden {
            display: none;
        }

        .start-screen h1 {
            color: #ffd700;
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
        }

        .start-screen p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
            margin-bottom: 2rem;
            text-align: center;
            max-width: 300px;
        }

        .start-btn {
            background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%);
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            color: #000;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.6);
        }

        /* ゲームオーバー画面 */
        .gameover-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .gameover-screen.hidden {
            display: none;
        }

        .gameover-screen h2 {
            color: #ff6b6b;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .final-score {
            color: #ffd700;
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
        }

        .high-score {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        .restart-btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 107, 107, 0.6);
        }

        /* 全画面ボタン */
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .score-value {
                font-size: 1.5rem;
            }

            .time-value {
                font-size: 1.2rem;
            }

            .start-screen h1 {
                font-size: 2rem;
            }

            .gameover-screen h2 {
                font-size: 2rem;
            }

            .final-score {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="bgStars"></div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <div class="header">
            <div class="score-panel">
                <div class="score-label">スコア</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="time-panel">
                <div class="score-label">残り時間</div>
                <div class="time-value" id="time">60</div>
            </div>
        </div>

        <div class="combo" id="combo">x1</div>

        <div class="game-area" id="gameArea"></div>
    </div>

    <!-- スタート画面 -->
    <div class="start-screen" id="startScreen">
        <h1>⭐ Star Pop</h1>
        <p>星をクリックして割るシンプルなゲーム！<br>コンボを繋いでハイスコアを目指そう！</p>
        <button class="start-btn" onclick="startGame()">スタート</button>
    </div>

    <!-- ゲームオーバー画面 -->
    <div class="gameover-screen hidden" id="gameoverScreen">
        <h2>🎮 ゲームオーバー</h2>
        <div class="final-score" id="finalScore">0</div>
        <div class="high-score" id="highScore">ハイスコア: 0</div>
        <button class="restart-btn" onclick="restartGame()">もう一度</button>
    </div>

    <script>
        // 背景の星を生成
        function createBgStars() {
            const container = document.getElementById('bgStars');
            const numStars = 150;

            for (let i = 0; i < numStars; i++) {
                const star = document.createElement('div');
                star.className = 'bgStar';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 2 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(star);
            }
        }

        // ゲーム変数
        let score = 0;
        let timeLeft = 60;
        let gameInterval;
        let spawnInterval;
        let combo = 0;
        let comboTimeout;
        let highScore = localStorage.getItem('starPopHighScore') || 0;
        let gameActive = false;

        const gameArea = document.getElementById('gameArea');
        const scoreEl = document.getElementById('score');
        const timeEl = document.getElementById('time');
        const comboEl = document.getElementById('combo');
        const startScreen = document.getElementById('startScreen');
        const gameoverScreen = document.getElementById('gameoverScreen');
        const finalScoreEl = document.getElementById('finalScore');
        const highScoreEl = document.getElementById('highScore');

        // 星のタイプ
        const starTypes = [
            { class: 'gold', points: 10, size: 60 },
            { class: 'silver', points: 20, size: 50 },
            { class: 'blue', points: 30, size: 45 },
            { class: 'red', points: 40, size: 40 },
            { class: 'purple', points: 50, size: 35 }
        ];

        // 星のSVG
        const starSvg = `
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
            </svg>
        `;

        // ゲーム開始
        function startGame() {
            score = 0;
            timeLeft = 60;
            combo = 0;
            gameActive = true;

            scoreEl.textContent = '0';
            timeEl.textContent = '60';
            timeEl.classList.remove('warning');
            comboEl.classList.remove('show');

            startScreen.classList.add('hidden');
            gameoverScreen.classList.add('hidden');
            gameArea.innerHTML = '';

            // タイマー開始
            gameInterval = setInterval(() => {
                timeLeft--;
                timeEl.textContent = timeLeft;

                if (timeLeft <= 10) {
                    timeEl.classList.add('warning');
                }

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // 星の生成開始（徐々に早くなる）
            startSpawning();
        }

        // 星の生成
        function startSpawning() {
            spawnStar();
            if (gameActive) {
                const spawnRate = Math.max(400, 1000 - (score / 10));
                spawnInterval = setTimeout(startSpawning, spawnRate);
            }
        }

        // 星を生成
        function spawnStar() {
            const starType = starTypes[Math.floor(Math.random() * starTypes.length)];
            const star = document.createElement('div');
            star.className = `star ${starType.class}`;
            star.innerHTML = starSvg;

            const size = starType.size + Math.random() * 20;
            star.style.width = size + 'px';
            star.style.height = size + 'px';

            const maxX = gameArea.clientWidth - size;
            const maxY = gameArea.clientHeight - size;
            star.style.left = Math.random() * maxX + 'px';
            star.style.top = Math.random() * maxY + 'px';

            star.dataset.points = starType.points;
            star.dataset.size = size;

            star.addEventListener('click', (e) => popStar(e, star));
            star.addEventListener('touchstart', (e) => {
                e.preventDefault();
                popStar(e, star);
            });

            gameArea.appendChild(star);

            // 一定時間で消える
            setTimeout(() => {
                if (star.parentNode && gameActive) {
                    star.remove();
                    resetCombo();
                }
            }, 3000);
        }

        // 星を割る
        function popStar(e, star) {
            if (!gameActive) return;

            const points = parseInt(star.dataset.points);
            const size = parseFloat(star.dataset.size);
            const rect = star.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;

            // コンボ更新
            combo++;
            clearTimeout(comboTimeout);
            comboTimeout = setTimeout(resetCombo, 1500);

            // コンボ表示
            if (combo > 1) {
                comboEl.textContent = `x${combo}`;
                comboEl.classList.add('show');
            }

            // スコア計算（コンボボーナス）
            const comboBonus = Math.min(combo, 10);
            const finalPoints = points * comboBonus;
            score += finalPoints;
            scoreEl.textContent = score;

            // パーティクルエフェクト
            createParticles(x, y, star.classList.contains('gold') ? '#ffd700' :
                           star.classList.contains('silver') ? '#c0c0c0' :
                           star.classList.contains('blue') ? '#87ceeb' :
                           star.classList.contains('red') ? '#ff6b6b' : '#dda0dd');

            // スコア浮き上がりエフェクト
            showScorePopup(x, y, finalPoints);

            star.remove();

            // 新しい星をすぐに生成
            if (gameActive) {
                spawnStar();
            }
        }

        // コンボリセット
        function resetCombo() {
            combo = 0;
            comboEl.classList.remove('show');
        }

        // パーティクル作成
        function createParticles(x, y, color) {
            const numParticles = 10;

            for (let i = 0; i < numParticles; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.width = Math.random() * 8 + 4 + 'px';
                particle.style.height = particle.style.width;
                particle.style.background = color;

                const angle = (Math.PI * 2 * i) / numParticles;
                const velocity = Math.random() * 100 + 50;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity;

                particle.style.transform = `translate(${vx}px, ${vy}px)`;

                document.body.appendChild(particle);

                setTimeout(() => particle.remove(), 800);
            }
        }

        // スコア浮き上がりエフェクト
        function showScorePopup(x, y, points) {
            const popup = document.createElement('div');
            popup.className = 'scorePopup';
            popup.textContent = '+' + points;
            popup.style.left = x + 'px';
            popup.style.top = y + 'px';

            document.body.appendChild(popup);

            setTimeout(() => popup.remove(), 1000);
        }

        // ゲーム終了
        function endGame() {
            gameActive = false;
            clearInterval(gameInterval);
            clearTimeout(spawnInterval);
            clearTimeout(comboTimeout);

            // ハイスコア更新
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('starPopHighScore', highScore);
            }

            finalScoreEl.textContent = score;
            highScoreEl.textContent = `ハイスコア: ${highScore}`;
            gameoverScreen.classList.remove('hidden');
        }

        // リスタート
        function restartGame() {
            startGame();
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        createBgStars();
    </script>
</body>
</html>
