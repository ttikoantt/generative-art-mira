<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rhythm Catcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            touch-action: none;
        }

        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }

        .score-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-radius: 15px;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .score-panel .label {
            font-size: 12px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-panel .value {
            font-size: 28px;
            font-weight: bold;
            margin-top: 5px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .combo-display {
            text-align: center;
        }

        .combo-display .value {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(45deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }

        .combo-display .label {
            font-size: 14px;
            margin-top: 5px;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }

        .game-over, .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .game-over.hidden, .start-screen.hidden {
            display: none;
        }

        .game-over h1, .start-screen h1 {
            font-size: 48px;
            color: white;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .game-over p, .start-screen p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            margin-bottom: 30px;
        }

        .final-score {
            font-size: 64px;
            color: #f5576c;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .btn {
            background: linear-gradient(45deg, #f093fb, #f5576c);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(245, 87, 108, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .direction-hint {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="ui-overlay">
        <div class="score-panel">
            <div class="label">Score</div>
            <div class="value" id="scoreDisplay">0</div>
        </div>
        <div class="score-panel combo-display">
            <div class="label">Combo</div>
            <div class="value" id="comboDisplay">0</div>
        </div>
    </div>

    <div class="direction-hint">タップして音符をキャッチ！</div>

    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>

    <div class="start-screen" id="startScreen">
        <h1>🎵 Rhythm Catcher</h1>
        <p>4方向から流れてくる音符をタイミングよくキャッチ！</p>
        <button class="btn" id="startBtn">Start Game</button>
    </div>

    <div class="game-over hidden" id="gameOverScreen">
        <h1>Game Over</h1>
        <div class="final-score" id="finalScore">0</div>
        <p>Max Combo: <span id="maxCombo">0</span></p>
        <button class="btn" id="restartBtn">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        let notes = [];
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let gameRunning = false;
        let gameSpeed = 3;
        let spawnRate = 60; // frames
        let spawnTimer = 0;

        const directions = [
            { x: 0, y: -1, angle: -Math.PI / 2, color: '#ff6b6b' },  // 上
            { x: 1, y: 0, angle: 0, color: '#4ecdc4' },              // 右
            { x: 0, y: 1, angle: Math.PI / 2, color: '#45b7d1' },    // 下
            { x: -1, y: 0, angle: Math.PI, color: '#f9ca24' }        // 左
        ];

        const targetRadius = 60;
        const noteRadius = 20;

        // UI Elements
        const scoreDisplay = document.getElementById('scoreDisplay');
        const comboDisplay = document.getElementById('comboDisplay');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreEl = document.getElementById('finalScore');
        const maxComboEl = document.getElementById('maxCombo');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        resize();
        window.addEventListener('resize', resize);

        // Note class
        class Note {
            constructor(direction) {
                this.direction = direction;
                this.distance = Math.max(width, height) / 2 + 50;
                this.active = true;
                this.color = direction.color;
            }

            update() {
                this.distance -= gameSpeed;

                // Check if note reached center (miss)
                if (this.distance <= 0) {
                    this.active = false;
                    combo = 0;
                    updateUI();
                }
            }

            draw(ctx) {
                if (!this.active) return;

                const x = centerX + this.direction.x * this.distance;
                const y = centerY + this.direction.y * this.distance;

                // Note circle
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;

                const gradient = ctx.createRadialGradient(x, y, 0, x, y, noteRadius);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, 'transparent');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(x, y, noteRadius, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }

            checkTap(x, y) {
                const noteX = centerX + this.direction.x * this.distance;
                const noteY = centerY + this.direction.y * this.distance;

                const dist = Math.sqrt((x - noteX) ** 2 + (y - noteY) ** 2);
                return dist < noteRadius + 30;
            }
        }

        function spawnNote() {
            const dir = directions[Math.floor(Math.random() * directions.length)];
            notes.push(new Note(dir));
        }

        function handleTap(x, y) {
            if (!gameRunning) return;

            let caught = false;

            for (let i = notes.length - 1; i >= 0; i--) {
                const note = notes[i];
                if (note.active && note.checkTap(x, y)) {
                    // Calculate accuracy based on distance from center
                    const accuracy = Math.abs(note.distance - targetRadius);
                    let points = 100;

                    if (accuracy < 20) {
                        points = 100; // Perfect
                    } else if (accuracy < 40) {
                        points = 80;  // Good
                    } else {
                        points = 50;  // OK
                    }

                    score += points * (1 + combo * 0.1);
                    combo++;
                    maxCombo = Math.max(maxCombo, combo);

                    // Increase difficulty
                    if (combo % 10 === 0) {
                        gameSpeed = Math.min(gameSpeed + 0.3, 8);
                        spawnRate = Math.max(spawnRate - 2, 30);
                    }

                    note.active = false;
                    caught = true;
                    updateUI();
                    break;
                }
            }

            if (!caught && combo > 0) {
                combo = 0;
                updateUI();
            }
        }

        function updateUI() {
            scoreDisplay.textContent = Math.floor(score).toLocaleString();
            comboDisplay.textContent = combo;

            // Combo animation
            if (combo > 0 && combo % 5 === 0) {
                comboDisplay.style.transform = 'scale(1.3)';
                setTimeout(() => {
                    comboDisplay.style.transform = 'scale(1)';
                }, 100);
            }
        }

        function drawTarget() {
            // Center circle
            ctx.save();

            // Outer glow
            ctx.shadowBlur = 30;
            ctx.shadowColor = 'rgba(255, 255, 255, 0.5)';

            // Main circle
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, targetRadius);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0.1)');

            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, targetRadius, 0, Math.PI * 2);
            ctx.fill();

            // Border
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 3;
            ctx.stroke();

            ctx.restore();
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);

            if (gameRunning) {
                // Draw target
                drawTarget();

                // Spawn notes
                spawnTimer++;
                if (spawnTimer >= spawnRate) {
                    spawnNote();
                    spawnTimer = 0;
                }

                // Update and draw notes
                for (let i = notes.length - 1; i >= 0; i--) {
                    notes[i].update();
                    notes[i].draw(ctx);

                    if (!notes[i].active) {
                        notes.splice(i, 1);
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        function startGame() {
            score = 0;
            combo = 0;
            maxCombo = 0;
            gameSpeed = 3;
            spawnRate = 60;
            notes = [];
            gameRunning = true;
            updateUI();
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
        }

        function gameOver() {
            gameRunning = false;
            finalScoreEl.textContent = Math.floor(score).toLocaleString();
            maxComboEl.textContent = maxCombo;
            gameOverScreen.classList.remove('hidden');
        }

        // Event listeners
        canvas.addEventListener('click', (e) => {
            handleTap(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleTap(touch.clientX, touch.clientY);
        });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Start animation
        animate();
    </script>
</body>
</html>
