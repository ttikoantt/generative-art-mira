<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Simon Memory - 記憶力ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            touch-action: manipulation;
        }

        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.8rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .subtitle {
            color: #aaa;
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            width: 130px;
            height: 130px;
            border-radius: 15px;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn.green {
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
        }

        .btn.red {
            background: linear-gradient(135deg, #f44336 0%, #c62828 100%);
        }

        .btn.yellow {
            background: linear-gradient(135deg, #ffeb3b 0%, #f9a825 100%);
        }

        .btn.blue {
            background: linear-gradient(135deg, #2196f3 0%, #1565c0 100%);
        }

        .btn.lit {
            filter: brightness(1.8);
            transform: scale(1.05);
            box-shadow: 0 0 30px currentColor;
        }

        .info {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            color: #fff;
            font-size: 1.1rem;
        }

        .info div {
            text-align: center;
        }

        .info span {
            display: block;
            font-size: 1.8rem;
            font-weight: bold;
            color: #4fc3f7;
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-btn {
            background: rgba(255,255,255,0.15);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .control-btn:hover {
            background: rgba(255,255,255,0.25);
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: #fff;
            padding: 30px 50px;
            border-radius: 15px;
            font-size: 1.5rem;
            text-align: center;
            z-index: 100;
            display: none;
        }

        .message.show {
            display: block;
        }

        @media (max-width: 400px) {
            .btn {
                width: 100px;
                height: 100px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .info span {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <h1>🎮 Simon Memory</h1>
    <p class="subtitle">光る順番を覚えて同じ順番で押そう</p>

    <div class="game-board">
        <button class="btn green" data-color="green" data-freq="392"></button>
        <button class="btn red" data-color="red" data-freq="523"></button>
        <button class="btn yellow" data-color="yellow" data-freq="440"></button>
        <button class="btn blue" data-color="blue" data-freq="349"></button>
    </div>

    <div class="info">
        <div>レベル<span id="level">1</span></div>
        <div>ハイスコア<span id="highScore">0</span></div>
    </div>

    <div class="controls">
        <button class="control-btn" id="startBtn" onclick="startGame()">スタート</button>
        <button class="control-btn" id="soundBtn" onclick="toggleSound()">サウンド: ON</button>
    </div>

    <div class="message" id="message"></div>

    <script>
        const sequence = [];
        let playerIndex = 0;
        let level = 1;
        let isPlaying = false;
        let isShowingSequence = false;
        let soundEnabled = true;
        let highScore = localStorage.getItem('simonHighScore') || 0;

        document.getElementById('highScore').textContent = highScore;

        const colors = ['green', 'red', 'yellow', 'blue'];
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playTone(frequency, duration = 0.3) {
            if (!soundEnabled) return;

            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = frequency;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        function flashButton(color) {
            const btn = document.querySelector(`[data-color="${color}"]`);
            const freq = parseInt(btn.dataset.freq);

            btn.classList.add('lit');
            playTone(freq);

            setTimeout(() => {
                btn.classList.remove('lit');
            }, 300);
        }

        function addToSequence() {
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            sequence.push(randomColor);
        }

        async function showSequence() {
            isShowingSequence = true;
            document.getElementById('startBtn').disabled = true;

            await new Promise(resolve => setTimeout(resolve, 500));

            for (let color of sequence) {
                flashButton(color);
                await new Promise(resolve => setTimeout(resolve, 600));
            }

            isShowingSequence = false;
            document.getElementById('startBtn').disabled = false;
        }

        function handleInput(color) {
            if (isShowingSequence || !isPlaying) return;

            flashButton(color);

            if (color !== sequence[playerIndex]) {
                gameOver();
                return;
            }

            playerIndex++;

            if (playerIndex >= sequence.length) {
                level++;
                document.getElementById('level').textContent = level;
                playerIndex = 0;

                if (level > highScore) {
                    highScore = level - 1;
                    localStorage.setItem('simonHighScore', highScore);
                    document.getElementById('highScore').textContent = highScore;
                }

                setTimeout(() => {
                    addToSequence();
                    showSequence();
                }, 1000);
            }
        }

        function startGame() {
            sequence.length = 0;
            playerIndex = 0;
            level = 1;
            isPlaying = true;

            document.getElementById('level').textContent = level;

            addToSequence();
            showSequence();
        }

        function gameOver() {
            isPlaying = false;
            showMessage(`ゲームオーバー！\nレベル: ${level - 1}`);
        }

        function showMessage(text) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.classList.add('show');

            setTimeout(() => {
                messageEl.classList.remove('show');
            }, 2000);
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundBtn').textContent = `サウンド: ${soundEnabled ? 'ON' : 'OFF'}`;
        }

        // Event listeners
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const color = btn.dataset.color;
                handleInput(color);
            });

            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const color = btn.dataset.color;
                handleInput(color);
            });
        });
    </script>
</body>
</html>
