<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Word Rain - Typing Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #gameContainer {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #gameArea {
            width: 90%;
            max-width: 600px;
            height: 70%;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        .word {
            position: absolute;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            white-space: nowrap;
            transition: transform 0.1s;
        }

        .word.matched {
            color: #0f0;
            transform: scale(1.2);
        }

        .word.missed {
            color: #f00;
        }

        #ui {
            width: 90%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            margin-bottom: 10px;
            color: #fff;
        }

        .stat {
            text-align: center;
        }

        .statLabel {
            font-size: 12px;
            color: #aaa;
        }

        .statValue {
            font-size: 24px;
            font-weight: bold;
            color: #0ff;
        }

        #inputArea {
            width: 90%;
            max-width: 600px;
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        #wordInput {
            flex: 1;
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        #wordInput:focus {
            outline: none;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.8);
        }

        #startBtn, #restartBtn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        #startBtn {
            background: #0f0;
            color: #333;
        }

        #restartBtn {
            background: #f90;
            color: #fff;
            display: none;
        }

        #startBtn:hover, #restartBtn:hover {
            transform: scale(1.05);
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: #fff;
        }

        #overlay h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.8);
        }

        #overlay p {
            font-size: 18px;
            margin-bottom: 10px;
            color: #aaa;
        }

        #overlay.hidden {
            display: none;
        }

        #fullscreenBtn {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid #fff;
            color: #fff;
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s;
        }

        #fullscreenBtn:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        @media (max-width: 768px) {
            #gameArea {
                height: 60%;
            }

            .word {
                font-size: 14px;
            }

            .statValue {
                font-size: 18px;
            }

            #wordInput {
                font-size: 16px;
                padding: 12px;
            }

            #overlay h1 {
                font-size: 32px;
            }
        }

        /* キーボード（モバイル用） */
        #mobileKeyboard {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.9);
            padding: 10px;
            z-index: 50;
        }

        @media (max-width: 768px) {
            #mobileKeyboard {
                display: grid;
                grid-template-columns: repeat(10, 1fr);
                gap: 5px;
            }
        }

        .key {
            padding: 15px 5px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            cursor: pointer;
            touch-action: manipulation;
        }

        .key:active {
            background: rgba(255, 255, 255, 0.4);
        }

        .key.space {
            grid-column: span 10;
        }
    </style>
</head>
<body>
    <button id="fullscreenBtn">全画面</button>

    <div id="gameContainer">
        <div id="ui">
            <div class="stat">
                <div class="statLabel">スコア</div>
                <div class="statValue" id="score">0</div>
            </div>
            <div class="stat">
                <div class="statLabel">レベル</div>
                <div class="statValue" id="level">1</div>
            </div>
            <div class="stat">
                <div class="statLabel">ライフ</div>
                <div class="statValue" id="lives">5</div>
            </div>
        </div>

        <div id="gameArea"></div>

        <div id="inputArea">
            <input type="text" id="wordInput" placeholder="ここに入力..." autocomplete="off">
            <button id="startBtn">スタート</button>
            <button id="restartBtn">再挑戦</button>
        </div>
    </div>

    <div id="overlay">
        <h1>Word Rain</h1>
        <p>落ちてくる単語を素早く入力！</p>
        <p>単語を消すとスコアアップ</p>
        <p>画面下に触れるとゲームオーバー</p>
        <button id="overlayStartBtn">スタート</button>
    </div>

    <!-- モバイル用キーボード -->
    <div id="mobileKeyboard"></div>

    <script>
        const gameArea = document.getElementById('gameArea');
        const wordInput = document.getElementById('wordInput');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const livesEl = document.getElementById('lives');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const overlay = document.getElementById('overlay');
        const overlayStartBtn = document.getElementById('overlayStartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const mobileKeyboard = document.getElementById('mobileKeyboard');

        // 単語リスト（英語）
        const words = [
            'apple', 'banana', 'cherry', 'date', 'elderberry',
            'fig', 'grape', 'honeydew', 'kiwi', 'lemon',
            'mango', 'nectarine', 'orange', 'papaya', 'quince',
            'raspberry', 'strawberry', 'tangerine', 'ugli', 'vanilla',
            'watermelon', 'xigua', 'yam', 'zucchini',
            'cat', 'dog', 'elephant', 'fish', 'giraffe',
            'horse', 'iguana', 'jellyfish', 'kangaroo', 'lion',
            'monkey', 'newt', 'octopus', 'penguin', 'quail',
            'rabbit', 'snake', 'tiger', 'unicorn', 'vulture',
            'whale', 'xenops', 'yak', 'zebra',
            'computer', 'keyboard', 'mouse', 'screen', 'internet',
            'website', 'program', 'code', 'data', 'network',
            'server', 'database', 'algorithm', 'function', 'variable'
        ];

        // ゲーム状態
        let gameState = {
            running: false,
            score: 0,
            level: 1,
            lives: 5,
            words: [],
            lastSpawn: 0,
            spawnInterval: 2000,
            fallSpeed: 1
        };

        // モバイル用キーボード作成
        function createMobileKeyboard() {
            const rows = [
                'QWERTYUIOP',
                'ASDFGHJKL',
                'ZXCVBNM'
            ];

            rows.forEach(row => {
                row.split('').forEach(key => {
                    const button = document.createElement('button');
                    button.className = 'key';
                    button.textContent = key;
                    button.addEventListener('click', () => {
                        wordInput.value += key.toLowerCase();
                        checkWord();
                    });
                    mobileKeyboard.appendChild(button);
                });
            });

            // スペースキー
            const spaceButton = document.createElement('button');
            spaceButton.className = 'key space';
            spaceButton.textContent = 'スペース';
            spaceButton.addEventListener('click', () => {
                wordInput.value += ' ';
            });
            mobileKeyboard.appendChild(spaceButton);

            // バックスペース
            const backspaceButton = document.createElement('button');
            backspaceButton.className = 'key';
            backspaceButton.textContent = '削除';
            backspaceButton.addEventListener('click', () => {
                wordInput.value = wordInput.value.slice(0, -1);
            });
            mobileKeyboard.appendChild(backspaceButton);
        }

        createMobileKeyboard();

        // 単語スポーン
        function spawnWord() {
            const word = words[Math.floor(Math.random() * words.length)];
            const wordEl = document.createElement('div');
            wordEl.className = 'word';
            wordEl.textContent = word;
            wordEl.style.left = Math.random() * (gameArea.clientWidth - 100) + 'px';
            wordEl.style.top = '0px';

            gameArea.appendChild(wordEl);

            gameState.words.push({
                element: wordEl,
                text: word,
                y: 0,
                x: parseFloat(wordEl.style.left),
                speed: gameState.fallSpeed + Math.random() * 0.5
            });
        }

        // 単語更新
        function updateWords() {
            const gameHeight = gameArea.clientHeight;

            gameState.words.forEach((word, index) => {
                word.y += word.speed;
                word.element.style.top = word.y + 'px';

                // 画面外に出た
                if (word.y > gameHeight - 30) {
                    word.element.classList.add('missed');
                    gameState.lives--;
                    livesEl.textContent = gameState.lives;

                    setTimeout(() => {
                        word.element.remove();
                    }, 500);

                    gameState.words.splice(index, 1);

                    // ゲームオーバー
                    if (gameState.lives <= 0) {
                        gameOver();
                    }
                }
            });
        }

        // 単語チェック
        function checkWord() {
            const input = wordInput.value.toLowerCase().trim();

            gameState.words.forEach((word, index) => {
                if (input === word.text) {
                    word.element.classList.add('matched');
                    gameState.score += word.text.length * 10;
                    scoreEl.textContent = gameState.score;

                    setTimeout(() => {
                        word.element.remove();
                    }, 300);

                    gameState.words.splice(index, 1);
                    wordInput.value = '';

                    // レベルアップ
                    if (gameState.score >= gameState.level * 200) {
                        gameState.level++;
                        levelEl.textContent = gameState.level;
                        gameState.spawnInterval = Math.max(500, 2000 - gameState.level * 100);
                        gameState.fallSpeed = 1 + gameState.level * 0.2;
                    }
                }
            });
        }

        // ゲーム開始
        function startGame() {
            gameState = {
                running: true,
                score: 0,
                level: 1,
                lives: 5,
                words: [],
                lastSpawn: Date.now(),
                spawnInterval: 2000,
                fallSpeed: 1
            };

            scoreEl.textContent = '0';
            levelEl.textContent = '1';
            livesEl.textContent = '5';
            wordInput.value = '';

            gameArea.innerHTML = '';
            overlay.classList.add('hidden');
            startBtn.style.display = 'none';
            restartBtn.style.display = 'none';

            wordInput.focus();
            gameLoop();
        }

        // ゲームオーバー
        function gameOver() {
            gameState.running = false;
            overlay.classList.remove('hidden');
            overlay.querySelector('h1').textContent = 'ゲームオーバー';
            overlay.querySelectorAll('p')[0].textContent = `スコア: ${gameState.score}`;
            overlay.querySelectorAll('p')[1].textContent = `レベル: ${gameState.level}`;
            overlay.querySelectorAll('p')[2].textContent = '再挑戦しますか？';
            overlayStartBtn.textContent = '再挑戦';
            restartBtn.style.display = 'block';
        }

        // ゲームループ
        function gameLoop() {
            if (!gameState.running) return;

            // 単語スポーン
            if (Date.now() - gameState.lastSpawn > gameState.spawnInterval) {
                spawnWord();
                gameState.lastSpawn = Date.now();
            }

            // 単語更新
            updateWords();

            requestAnimationFrame(gameLoop);
        }

        // イベントリスナー
        wordInput.addEventListener('input', checkWord);

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);
        overlayStartBtn.addEventListener('click', startGame);

        // 全画面ボタン
        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.requestFullscreen();
            }
        });

        // リサイズ対応
        window.addEventListener('resize', () => {
            // ゲーム中にリサイズされた場合の処理
        });
    </script>
</body>
</html>
