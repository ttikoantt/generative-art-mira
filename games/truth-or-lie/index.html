<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truth or Lie: April Fools Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e22ce 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            width: 90%;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .subtitle {
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.7em;
            opacity: 0.8;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .question {
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            min-width: 120px;
        }

        .btn-truth {
            background: linear-gradient(135deg, #00c853, #00e676);
            color: #fff;
        }

        .btn-lie {
            background: linear-gradient(135deg, #ff5252, #ff1744);
            color: #fff;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .result {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .result.correct {
            color: #00e676;
        }

        .result.incorrect {
            color: #ff1744;
        }

        .explanation {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 15px;
        }

        #fullscreenBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9em;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        #fullscreenBtn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00c853, #00e676);
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.5em;
            }

            .question {
                font-size: 1em;
            }

            .btn {
                padding: 12px 24px;
                min-width: 100px;
            }
        }
    </style>
</head>
<body>
    <button id="fullscreenBtn">⛶ Fullscreen</button>

    <div class="container">
        <h1>🎭 Truth or Lie</h1>
        <p class="subtitle">April Fools Edition - Can you spot the fake facts?</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">Score</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="streak">0</div>
                <div class="stat-label">Streak</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="questionNum">1</div>
                <div class="stat-label">Question</div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>

        <div class="card" id="card">
            <div class="question" id="question">Loading...</div>
        </div>

        <div class="buttons" id="buttons">
            <button class="btn btn-truth" id="truthBtn">✓ Truth</button>
            <button class="btn btn-lie" id="lieBtn">✗ Lie</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                statement: "April Fools' Day originated in France in 1564 when the new year was changed from April 1 to January 1.",
                isTruth: true,
                explanation: "True! People who continued to celebrate the new year in April were called 'April fools'."
            },
            {
                statement: "In 1996, Taco Bell announced they had purchased the Liberty Bell and renamed it the 'Taco Liberty Bell'.",
                isTruth: true,
                explanation: "True! Thousands of people called to complain about this April Fools' prank."
            },
            {
                statement: "Google once introduced 'Gmail Mic Drop' which automatically sent a mic drop GIF with every email.",
                isTruth: true,
                explanation: "True! In 2016, Gmail users accidentally sent mic drops to important emails. It was removed within hours."
            },
            {
                statement: "The Eiffel Tower was originally intended to be a temporary installation for the 1889 World's Fair.",
                isTruth: true,
                explanation: "True! It was almost demolished in 1909 but was saved by its use as a radio tower."
            },
            {
                statement: "A goldfish has a memory of only 3 seconds.",
                isTruth: false,
                explanation: "False! Goldfish can remember things for months, not seconds."
            },
            {
                statement: "NASA confirmed that the moon is made of green cheese.",
                isTruth: false,
                explanation: "False! The moon is made of rock and dust. This was just an April Fools' joke."
            },
            {
                statement: "In 1957, the BBC broadcast a fake documentary about spaghetti trees in Switzerland.",
                isTruth: true,
                explanation: "True! Hundreds of viewers called asking how to grow their own spaghetti trees."
            },
            {
                statement: "Humans only use 10% of their brains.",
                isTruth: false,
                explanation: "False! Brain imaging shows we use virtually every part of our brain."
            },
            {
                statement: "The Great Wall of China is visible from space with the naked eye.",
                isTruth: false,
                explanation: "False! It's barely visible and only under perfect conditions. Many astronauts report not seeing it."
            },
            {
                statement: "In 2015, a study showed that cats actually want to kill their owners.",
                isTruth: true,
                explanation: "True... sort of! A study found cats display similar predatory behaviors toward owners as prey. But it's playful, not murderous!"
            },
            {
                statement: "Adolf Hitler was nominated for the Nobel Peace Prize in 1939.",
                isTruth: true,
                explanation: "True! A Swedish MP nominated him as a joke. The nomination was withdrawn."
            },
            {
                statement: "Friday the 13th is statistically the unluckiest day of the year.",
                isTruth: false,
                explanation: "False! Studies show no increase in accidents or bad luck on Friday the 13th."
            },
            {
                statement: "Mickey Mouse was originally named Mortimer Mouse.",
                isTruth: true,
                explanation: "True! Walt Disney's wife Lillian convinced him to change it to Mickey."
            },
            {
                statement: "You swallow 8 spiders per year while sleeping.",
                isTruth: false,
                explanation: "False! Spiders have no reason to enter your mouth. This is a widespread myth."
            },
            {
                statement: "In 2008, the BBC announced that camera crews had filmed flying penguins in Antarctica.",
                isTruth: true,
                explanation: "True! Their April Fools' documentary showed penguins that could fly to the Amazon rainforest."
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let streak = 0;
        let shuffledQuestions = [];
        let canAnswer = true;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function init() {
            shuffledQuestions = shuffle([...questions]);
            displayQuestion();
            updateStats();
        }

        function displayQuestion() {
            const q = shuffledQuestions[currentQuestion];
            document.getElementById('question').textContent = q.statement;
            document.getElementById('questionNum').textContent = `${currentQuestion + 1}/${questions.length}`;
            document.getElementById('progress').style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;
            canAnswer = true;
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
        }

        function showResult(isCorrect, isTruth, explanation) {
            canAnswer = false;
            const card = document.getElementById('card');
            const buttons = document.getElementById('buttons');

            const resultHTML = `
                <div class="result ${isCorrect ? 'correct' : 'incorrect'}">
                    ${isCorrect ? '🎉 Correct!' : '😅 Wrong!'}
                </div>
                <div class="explanation">
                    ${isTruth ? 'It was the TRUTH.' : 'It was a LIE.'}<br><br>
                    ${explanation}
                </div>
            `;

            card.innerHTML = resultHTML;
            buttons.style.display = 'none';

            if (currentQuestion < shuffledQuestions.length - 1) {
                setTimeout(() => {
                    currentQuestion++;
                    card.innerHTML = `<div class="question" id="question"></div>`;
                    buttons.style.display = 'flex';
                    displayQuestion();
                }, 3000);
            } else {
                setTimeout(() => {
                    showFinalResult();
                }, 3000);
            }
        }

        function showFinalResult() {
            const card = document.getElementById('card');
            const percentage = Math.round((score / questions.length) * 100);
            let message = '';

            if (percentage === 100) {
                message = '🏆 PERFECT! You\'re a truth detective!';
            } else if (percentage >= 80) {
                message = '🌟 Excellent! Almost perfect!';
            } else if (percentage >= 60) {
                message = '👍 Good job! You did well!';
            } else if (percentage >= 40) {
                message = '😅 Not bad! Keep practicing!';
            } else {
                message = '🎭 April Fools got you! Try again!';
            }

            card.innerHTML = `
                <div class="result correct">🎮 Game Over!</div>
                <div style="font-size: 1.2em; margin-bottom: 20px;">${message}</div>
                <div style="font-size: 2em; font-weight: bold; margin-bottom: 20px;">${score} / ${questions.length}</div>
                <button class="btn btn-truth" onclick="location.reload()">🔄 Play Again</button>
            `;
        }

        function handleAnswer(userSaidTruth) {
            if (!canAnswer) return;

            const q = shuffledQuestions[currentQuestion];
            const isCorrect = userSaidTruth === q.isTruth;

            if (isCorrect) {
                score++;
                streak++;
            } else {
                streak = 0;
            }

            updateStats();
            showResult(isCorrect, q.isTruth, q.explanation);
        }

        document.getElementById('truthBtn').addEventListener('click', () => handleAnswer(true));
        document.getElementById('lieBtn').addEventListener('click', () => handleAnswer(false));

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        init();
    </script>
</body>
</html>
