<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quick Reflection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            font-family: 'Arial', sans-serif;
            touch-action: manipulation;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 18px;
            z-index: 100;
        }

        .hud-left, .hud-right {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .hud span {
            font-weight: bold;
        }

        .target {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            position: absolute;
        }

        .target:active {
            transform: scale(0.95);
        }

        .start-screen, .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            color: white;
        }

        .start-screen h1, .game-over-screen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .start-screen p, .game-over-screen p {
            font-size: 16px;
            margin-bottom: 30px;
            color: #aaa;
            text-align: center;
            max-width: 300px;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s;
        }

        .start-btn:hover {
            transform: scale(1.1);
        }

        .final-score {
            font-size: 36px;
            margin: 20px 0;
            color: #ffd93d;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .fullscreen-btn:hover {
            transform: scale(1.1);
        }

        .combo-text {
            position: fixed;
            font-size: 48px;
            font-weight: bold;
            color: #ffd93d;
            text-shadow: 0 0 20px rgba(255, 217, 61, 0.8);
            pointer-events: none;
            animation: comboFade 0.5s ease-out forwards;
            z-index: 150;
        }

        @keyframes comboFade {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .heart {
            color: #ff6b6b;
        }

        .score-value {
            color: #6bcb77;
        }

        .time-value {
            color: #ffd93d;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="hud">
            <div class="hud-left">
                <span>❤️ <span id="lives" class="heart">3</span></span>
                <span>🎯 <span id="score" class="score-value">0</span></span>
            </div>
            <div class="hud-right">
                <span>⏱️ <span id="time" class="time-value">60</span></span>
                <span>🔥 <span id="combo">0</span></span>
            </div>
        </div>

        <div id="target" class="target" style="display:none;"></div>

        <div class="start-screen" id="startScreen">
            <h1>Quick Reflection</h1>
            <p>矢印が指す方向に素早くタップ！<br>制限時間60秒でハイスコアを目指そう</p>
            <button class="start-btn" onclick="startGame()">スタート</button>
        </div>

        <div class="game-over-screen" id="gameOverScreen" style="display:none;">
            <h1>ゲームオーバー</h1>
            <div class="final-score">スコア: <span id="finalScore">0</span></div>
            <p>最高コンボ: <span id="maxCombo">0</span></p>
            <button class="start-btn" onclick="startGame()">もう一度</button>
        </div>

        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    </div>

    <script>
        let score = 0;
        let lives = 3;
        let timeLeft = 60;
        let combo = 0;
        let maxCombo = 0;
        let gameRunning = false;
        let currentDirection = '';
        let timer = null;
        let difficulty = 1;

        const directions = ['↑', '↓', '←', '→'];
        const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#f7b731', '#a55eea', '#26de81'];

        const target = document.getElementById('target');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');

        function startGame() {
            score = 0;
            lives = 3;
            timeLeft = 60;
            combo = 0;
            maxCombo = 0;
            difficulty = 1;
            gameRunning = true;

            updateHUD();
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';

            timer = setInterval(() => {
                timeLeft--;
                updateHUD();

                if (timeLeft <= 0) {
                    endGame();
                }

                // 難易度上昇
                if (timeLeft % 10 === 0) {
                    difficulty += 0.2;
                }
            }, 1000);

            showNextTarget();
        }

        function endGame() {
            gameRunning = false;
            clearInterval(timer);
            target.style.display = 'none';
            gameOverScreen.style.display = 'flex';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('maxCombo').textContent = maxCombo;
        }

        function showNextTarget() {
            if (!gameRunning) return;

            const container = document.querySelector('.game-container');
            const maxX = container.clientWidth - 150;
            const maxY = container.clientHeight - 200;

            const x = Math.random() * maxX;
            const y = Math.random() * maxY + 80;

            currentDirection = directions[Math.floor(Math.random() * directions.length)];
            const color = colors[Math.floor(Math.random() * colors.length)];

            target.style.display = 'flex';
            target.style.left = x + 'px';
            target.style.top = y + 'px';
            target.style.background = `linear-gradient(135deg, ${color}, ${adjustColor(color, -30)})`;
            target.textContent = currentDirection;

            // タイムアウトでライフ減
            setTimeout(() => {
                if (gameRunning && target.style.display !== 'none') {
                    lives--;
                    combo = 0;
                    updateHUD();

                    if (lives <= 0) {
                        endGame();
                    } else {
                        showNextTarget();
                    }
                }
            }, 3000 / difficulty);
        }

        function adjustColor(color, amount) {
            const hex = color.replace('#', '');
            const r = Math.max(0, Math.min(255, parseInt(hex.substr(0, 2), 16) + amount));
            const g = Math.max(0, Math.min(255, parseInt(hex.substr(2, 2), 16) + amount));
            const b = Math.max(0, Math.min(255, parseInt(hex.substr(4, 2), 16) + amount));
            return `rgb(${r}, ${g}, ${b})`;
        }

        target.addEventListener('click', handleTap);
        target.addEventListener('touchstart', handleTap);

        function handleTap(e) {
            e.preventDefault();

            if (!gameRunning) return;

            score += 10 * (1 + combo * 0.1);
            combo++;
            if (combo > maxCombo) maxCombo = combo;

            showComboText();
            updateHUD();
            showNextTarget();
        }

        function showComboText() {
            if (combo >= 3) {
                const comboText = document.createElement('div');
                comboText.className = 'combo-text';
                comboText.textContent = `${combo} COMBO!`;
                comboText.style.left = '50%';
                comboText.style.top = '40%';
                comboText.style.transform = 'translateX(-50%)';
                document.body.appendChild(comboText);

                setTimeout(() => {
                    document.body.removeChild(comboText);
                }, 500);
            }
        }

        function updateHUD() {
            document.getElementById('lives').textContent = lives;
            document.getElementById('score').textContent = Math.floor(score);
            document.getElementById('time').textContent = timeLeft;
            document.getElementById('combo').textContent = combo;
        }

        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        }
    </script>
</body>
</html>
