<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reflex Blitz | Mira Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            color: #fff;
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff006e, #8338ec, #3a86ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(131, 56, 236, 0.3);
        }

        .subtitle {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .stat-item {
            background: rgba(131, 56, 236, 0.15);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid rgba(131, 56, 236, 0.3);
        }

        .stat-label {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #8338ec;
        }

        #gameArea {
            width: 100%;
            height: 400px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
            border: 2px solid rgba(131, 56, 236, 0.3);
            cursor: crosshair;
        }

        .target {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
            animation: pulse 0.5s ease-in-out infinite;
        }

        .target:active {
            transform: scale(0.9);
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 20px currentColor, 0 0 40px currentColor;
            }
            50% {
                box-shadow: 0 0 30px currentColor, 0 0 60px currentColor;
            }
        }

        @keyframes pop {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        .pop {
            animation: pop 0.3s ease-out forwards;
        }

        .start-screen, .end-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.9);
            z-index: 10;
        }

        .start-btn {
            padding: 20px 40px;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #ff006e, #8338ec);
            border: none;
            color: #fff;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            margin: 10px;
            font-family: 'Courier New', monospace;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(131, 56, 236, 0.5);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .score-display {
            font-size: 4rem;
            font-weight: bold;
            background: linear-gradient(90deg, #ff006e, #8338ec, #3a86ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 20px 0;
        }

        .high-score {
            font-size: 1rem;
            color: #8338ec;
            margin-bottom: 20px;
        }

        .instructions {
            font-size: 0.9rem;
            color: #888;
            margin-top: 20px;
            max-width: 300px;
            line-height: 1.6;
        }

        .combo-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: bold;
            color: #ff006e;
            pointer-events: none;
            animation: comboFade 0.5s ease-out forwards;
        }

        @keyframes comboFade {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            #gameArea {
                height: 350px;
            }

            .stats {
                gap: 15px;
                font-size: 0.9rem;
            }

            .stat-value {
                font-size: 1.2rem;
            }
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 12px;
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            z-index: 1000;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }

        .difficulty-selector {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .difficulty-btn {
            padding: 8px 16px;
            font-size: 0.85rem;
            background: rgba(131, 56, 236, 0.2);
            border: 1px solid rgba(131, 56, 236, 0.4);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }

        .difficulty-btn.active {
            background: #8338ec;
            border-color: #8338ec;
        }

        .difficulty-btn:hover {
            background: rgba(131, 56, 236, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Reflex Blitz</h1>
        <p class="subtitle">反応速度を極めろ！</p>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">時間</div>
                <div class="stat-value" id="time">30</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">コンボ</div>
                <div class="stat-value" id="combo">0</div>
            </div>
        </div>

        <div id="gameArea">
            <div class="start-screen" id="startScreen">
                <h2 style="font-size: 2rem; margin-bottom: 10px;">🎯 Reflex Blitz</h2>
                <p class="instructions">
                    現れる丸をタップして消そう！<br>
                    素早く正確にタップするとコンボアップ！<br>
                    30秒で何個消せるかな？
                </p>
                <button class="start-btn" id="startBtn">スタート</button>
                <div class="difficulty-selector">
                    <button class="difficulty-btn active" data-difficulty="easy">Easy</button>
                    <button class="difficulty-btn" data-difficulty="normal">Normal</button>
                    <button class="difficulty-btn" data-difficulty="hard">Hard</button>
                </div>
            </div>

            <div class="end-screen" id="endScreen" style="display: none;">
                <h2 style="font-size: 1.5rem;">🏆 終了！</h2>
                <div class="score-display" id="finalScore">0</div>
                <div class="high-score" id="highScore"></div>
                <button class="start-btn" id="restartBtn">もう一度</button>
            </div>
        </div>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">⛶ 全画面</button>

    <script>
        const gameArea = document.getElementById('gameArea');
        const scoreEl = document.getElementById('score');
        const timeEl = document.getElementById('time');
        const comboEl = document.getElementById('combo');
        const startScreen = document.getElementById('startScreen');
        const endScreen = document.getElementById('endScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const finalScoreEl = document.getElementById('finalScore');
        const highScoreEl = document.getElementById('highScore');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const difficultyBtns = document.querySelectorAll('.difficulty-btn');

        let score = 0;
        let timeLeft = 30;
        let combo = 0;
        let gameRunning = false;
        let gameInterval;
        let spawnInterval;
        let currentDifficulty = 'easy';
        let highScore = localStorage.getItem('reflexBlitzHighScore') || 0;
        let targets = [];

        const difficultySettings = {
            easy: { minSize: 60, maxSize: 90, spawnRate: 1200 },
            normal: { minSize: 40, maxSize: 70, spawnRate: 900 },
            hard: { minSize: 25, maxSize: 50, spawnRate: 600 }
        };

        const colors = ['#ff006e', '#8338ec', '#3a86ff', '#06ffa5', '#ffbe0b', '#ff5400'];

        // 全画面
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                fullscreenBtn.textContent = '⛶ 元に戻す';
            } else {
                document.exitFullscreen();
                fullscreenBtn.textContent = '⛶ 全画面';
            }
        });

        // 難易度選択
        difficultyBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                difficultyBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDifficulty = btn.dataset.difficulty;
            });
        });

        // ゲーム開始
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        function startGame() {
            score = 0;
            timeLeft = 30;
            combo = 0;
            gameRunning = true;

            updateUI();
            
            startScreen.style.display = 'none';
            endScreen.style.display = 'none';
            
            // 既存的ターゲットをクリア
            targets.forEach(t => t.remove());
            targets = [];

            // タイマー開始
            gameInterval = setInterval(() => {
                timeLeft--;
                updateUI();
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // ターゲットスポーン
            spawnTarget();
            spawnInterval = setInterval(spawnTarget, difficultySettings[currentDifficulty].spawnRate);
        }

        function spawnTarget() {
            if (!gameRunning) return;

            const settings = difficultySettings[currentDifficulty];
            const size = Math.random() * (settings.maxSize - settings.minSize) + settings.minSize;
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            const maxX = gameArea.offsetWidth - size;
            const maxY = gameArea.offsetHeight - size;
            const x = Math.random() * maxX;
            const y = Math.random() * maxY;

            const target = document.createElement('div');
            target.className = 'target';
            target.style.width = `${size}px`;
            target.style.height = `${size}px`;
            target.style.left = `${x}px`;
            target.style.top = `${y}px`;
            target.style.backgroundColor = color;
            target.style.color = color;
            
            target.addEventListener('click', (e) => {
                e.stopPropagation();
                hitTarget(target);
            });

            target.addEventListener('touchstart', (e) => {
                e.stopPropagation();
                e.preventDefault();
                hitTarget(target);
            }, { passive: false });

            gameArea.appendChild(target);
            targets.push(target);

            // 自動消去
            setTimeout(() => {
                if (target.parentNode && gameRunning) {
                    target.remove();
                    targets = targets.filter(t => t !== target);
                    combo = 0;
                    updateUI();
                }
            }, 2000);
        }

        function hitTarget(target) {
            if (!gameRunning) return;

            combo++;
            
            // コンボボーナス
            const comboBonus = Math.floor(combo / 5) * 2;
            const points = 10 + comboBonus;
            score += points;

            updateUI();
            showComboEffect();

            // ポップエフェクト
            target.classList.add('pop');
            setTimeout(() => {
                target.remove();
                targets = targets.filter(t => t !== target);
            }, 300);
        }

        function showComboEffect() {
            if (combo > 0 && combo % 5 === 0) {
                const comboDisplay = document.createElement('div');
                comboDisplay.className = 'combo-display';
                comboDisplay.textContent = `${combo} COMBO!`;
                gameArea.appendChild(comboDisplay);
                
                setTimeout(() => {
                    comboDisplay.remove();
                }, 500);
            }
        }

        function updateUI() {
            scoreEl.textContent = score;
            timeEl.textContent = timeLeft;
            comboEl.textContent = combo;
        }

        function endGame() {
            gameRunning = false;
            clearInterval(gameInterval);
            clearInterval(spawnInterval);

            // 残ったターゲットを削除
            targets.forEach(t => t.remove());
            targets = [];

            // ハイスコア更新
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('reflexBlitzHighScore', highScore);
            }

            finalScoreEl.textContent = score;
            highScoreEl.textContent = `🏆 ハイスコア: ${highScore}`;
            
            endScreen.style.display = 'flex';
        }

        // ゲームエリア外でのタップでコンボリセット
        gameArea.addEventListener('click', () => {
            if (gameRunning && combo > 0) {
                combo = 0;
                updateUI();
            }
        });
    </script>
</body>
</html>
