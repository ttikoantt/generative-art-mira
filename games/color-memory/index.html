<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>色記憶チャレンジ | Color Memory Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #4facfe;
            font-size: 28px;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
            max-width: 350px;
            margin-left: auto;
            margin-right: auto;
        }

        .color-btn {
            aspect-ratio: 1;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .color-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .color-btn:active::before {
            opacity: 1;
        }

        .color-btn:active {
            transform: scale(0.95);
        }

        .color-btn.flashing {
            animation: flash 0.5s;
        }

        @keyframes flash {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(2); }
        }

        .btn-red { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); }
        .btn-blue { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .btn-green { background: linear-gradient(135deg, #43e97b, #38f9d7); }
        .btn-yellow { background: linear-gradient(135deg, #f9d423, #ff4e50); }

        .message {
            color: #fff;
            font-size: 18px;
            margin-bottom: 20px;
            min-height: 27px;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .instructions {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            line-height: 1.6;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 24px;
            }

            .game-board {
                gap: 10px;
            }

            .stats {
                gap: 15px;
            }

            .stat {
                padding: 10px 20px;
            }

            .stat-value {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 色記憶チャレンジ</h1>
        <div class="subtitle">Color Memory Challenge</div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">LEVEL</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">BEST</div>
                <div class="stat-value" id="best">0</div>
            </div>
        </div>

        <div class="game-board">
            <button class="color-btn btn-red" data-color="red"></button>
            <button class="color-btn btn-blue" data-color="blue"></button>
            <button class="color-btn btn-green" data-color="green"></button>
            <button class="color-btn btn-yellow" data-color="yellow"></button>
        </div>

        <div class="message" id="message">スタートボタンを押して始めよう！</div>
        <button class="start-btn" id="startBtn">ゲームスタート</button>

        <div class="instructions">
            <strong>遊び方：</strong><br>
            1. 「ゲームスタート」を押すと色が光る順序を覚える<br>
            2. 同じ順序で色をタップする<br>
            3. 正解するとレベルアップ、間違えるとゲームオーバー
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const colors = ['red', 'blue', 'green', 'yellow'];
        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('colorMemoryBest')) || 0;
        let isPlaying = false;
        let isShowingSequence = false;

        const startBtn = document.getElementById('startBtn');
        const messageEl = document.getElementById('message');
        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const colorBtns = document.querySelectorAll('.color-btn');

        // 初期表示
        bestEl.textContent = bestScore;

        // ゲーム開始
        startBtn.addEventListener('click', startGame);

        // 色ボタンクリック
        colorBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                if (!isPlaying || isShowingSequence) return;

                const color = btn.dataset.color;
                flashButton(btn);
                playerSequence.push(color);

                checkSequence();
            });

            // タッチ対応
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (!isPlaying || isShowingSequence) return;

                const color = btn.dataset.color;
                flashButton(btn);
                playerSequence.push(color);

                checkSequence();
            });
        });

        function startGame() {
            sequence = [];
            playerSequence = [];
            level = 1;
            score = 0;
            isPlaying = true;

            updateStats();
            startBtn.disabled = true;
            messageEl.textContent = '準備...';

            setTimeout(() => {
                nextLevel();
            }, 1000);
        }

        function nextLevel() {
            playerSequence = [];
            isShowingSequence = true;
            messageEl.textContent = '覚えてね...';

            // 新しい色を追加
            const newColor = colors[Math.floor(Math.random() * colors.length)];
            sequence.push(newColor);

            // シーケンスを表示
            let delay = 0;
            const interval = Math.max(400, 800 - level * 30);

            sequence.forEach((color, index) => {
                setTimeout(() => {
                    const btn = document.querySelector(`[data-color="${color}"]`);
                    flashButton(btn);
                }, delay);
                delay += interval;
            });

            // プレイヤーのターン
            setTimeout(() => {
                isShowingSequence = false;
                messageEl.textContent = 'あなたの番！';
            }, delay);
        }

        function checkSequence() {
            const currentIndex = playerSequence.length - 1;

            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                gameOver();
                return;
            }

            // 正解
            if (playerSequence.length === sequence.length) {
                score += level * 10;
                level++;

                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('colorMemoryBest', bestScore);
                }

                updateStats();
                messageEl.textContent = '正解！次のレベル...';
                isShowingSequence = true;

                setTimeout(() => {
                    nextLevel();
                }, 1500);
            }
        }

        function gameOver() {
            isPlaying = false;
            messageEl.textContent = `ゲームオーバー！ スコア: ${score}`;
            startBtn.disabled = false;
            startBtn.textContent = 'もう一度';

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('colorMemoryBest', bestScore);
                updateStats();
            }

            // 間違ったボタンを強調
            const btn = document.querySelector(`[data-color="${playerSequence[currentIndex]}"]`);
            btn.style.animation = 'shake 0.5s';
            setTimeout(() => {
                btn.style.animation = '';
            }, 500);
        }

        function flashButton(btn) {
            btn.classList.add('flashing');
            setTimeout(() => {
                btn.classList.remove('flashing');
            }, 500);
        }

        function updateStats() {
            levelEl.textContent = level;
            scoreEl.textContent = score;
            bestEl.textContent = bestScore;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // シェイクアニメーション
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                75% { transform: translateX(10px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
