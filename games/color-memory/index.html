<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Memory - 色記憶ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 20px;
            font-size: 14px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            color: white;
            font-size: 24px;
            font-weight: bold;
            margin-top: 5px;
        }

        .target-display {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .target-color {
            width: 100%;
            height: 150px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .target-color.hidden {
            background: rgba(255, 255, 255, 0.05) !important;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .instruction {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .color-option {
            aspect-ratio: 1;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 3px solid transparent;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .color-option:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .color-option:active {
            transform: scale(0.95);
        }

        .color-option.correct {
            border-color: #4ade80;
            animation: pulse 0.5s ease;
        }

        .color-option.wrong {
            border-color: #f87171;
            animation: shake 0.5s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .timer-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.1s linear;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .message {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 14px;
            font-weight: bold;
        }

        .message.success {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.3);
        }

        .message.error {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
            border: 1px solid rgba(248, 113, 113, 0.3);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <h1>🎨 Color Memory</h1>
        <p class="subtitle">色を記憶して正しい色を選ぼう！</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">レベル</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">ハイスコア</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>

        <div class="target-display">
            <div class="target-color" id="targetColor"></div>
            <p class="instruction" id="instruction">覚えてね...</p>
        </div>

        <div class="timer-bar">
            <div class="timer-fill" id="timerFill"></div>
        </div>

        <div id="message"></div>

        <div class="options" id="options"></div>

        <button class="btn" id="startBtn" onclick="startGame()">ゲーム開始</button>
    </div>

    <script>
        let level = 1;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('colorMemoryHighScore')) || 0;
        let targetColor = '';
        let gameActive = false;
        let showingColor = true;
        let timer = null;
        let timeLeft = 0;
        let maxTime = 0;

        document.getElementById('highScore').textContent = highScore;

        function generateColor() {
            const hue = Math.floor(Math.random() * 360);
            const saturation = 60 + Math.random() * 30;
            const lightness = 45 + Math.random() * 20;
            return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
        }

        function generateSimilarColors(baseColor, count) {
            const colors = [baseColor];

            // baseColorを解析してHSLを取得
            const tempDiv = document.createElement('div');
            tempDiv.style.color = baseColor;
            document.body.appendChild(tempDiv);
            const computed = getComputedStyle(tempDiv).color;
            document.body.removeChild(tempDiv);

            const rgb = computed.match(/\d+/g).map(Number);
            const hsl = rgbToHsl(rgb[0], rgb[1], rgb[2]);

            while (colors.length < count) {
                const hueVariation = (Math.random() - 0.5) * 30;
                const satVariation = (Math.random() - 0.5) * 20;
                const lightVariation = (Math.random() - 0.5) * 15;

                const newHue = (hsl[0] + hueVariation + 360) % 360;
                const newSat = Math.max(30, Math.min(100, hsl[1] + satVariation));
                const newLight = Math.max(30, Math.min(80, hsl[2] + lightVariation));

                const newColor = `hsl(${newHue}, ${newSat}%, ${newLight}%)`;

                if (!colors.some(c => colorsSimilar(c, newColor))) {
                    colors.push(newColor);
                }
            }

            return shuffle(colors);
        }

        function rgbToHsl(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;

            if (max === min) {
                h = s = 0;
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }
            return [h * 360, s * 100, l * 100];
        }

        function colorsSimilar(c1, c2) {
            const div1 = document.createElement('div');
            const div2 = document.createElement('div');
            div1.style.color = c1;
            div2.style.color = c2;
            document.body.appendChild(div1);
            document.body.appendChild(div2);
            const rgb1 = getComputedStyle(div1).color.match(/\d+/g).map(Number);
            const rgb2 = getComputedStyle(div2).color.match(/\d+/g).map(Number);
            document.body.removeChild(div1);
            document.body.removeChild(div2);

            const diff = Math.sqrt(
                Math.pow(rgb1[0] - rgb2[0], 2) +
                Math.pow(rgb1[1] - rgb2[1], 2) +
                Math.pow(rgb1[2] - rgb2[2], 2)
            );
            return diff < 30;
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startGame() {
            level = 1;
            score = 0;
            document.getElementById('level').textContent = level;
            document.getElementById('score').textContent = score;
            document.getElementById('startBtn').classList.add('hidden');
            startRound();
        }

        function startRound() {
            gameActive = false;
            showingColor = true;

            targetColor = generateColor();
            const targetElement = document.getElementById('targetColor');
            targetElement.style.background = targetColor;
            targetElement.classList.remove('hidden');

            document.getElementById('instruction').textContent = '覚えてね...';
            document.getElementById('message').innerHTML = '';
            document.getElementById('options').innerHTML = '';

            // 色を見せる時間（レベルが上がると短くなる）
            const showTime = Math.max(1000, 3000 - level * 200);

            setTimeout(() => {
                showingColor = false;
                targetElement.classList.add('hidden');

                const optionCount = Math.min(9, 3 + Math.floor(level / 2));
                const options = generateSimilarColors(targetColor, optionCount);

                const optionsContainer = document.getElementById('options');
                options.forEach((color, index) => {
                    const btn = document.createElement('div');
                    btn.className = 'color-option';
                    btn.style.background = color;
                    btn.onclick = () => selectColor(color, btn);
                    optionsContainer.appendChild(btn);
                });

                document.getElementById('instruction').textContent = '同じ色を選んで！';

                // タイマー（レベルが上がると短くなる）
                maxTime = Math.max(3000, 10000 - level * 500);
                timeLeft = maxTime;
                updateTimer();

                timer = setInterval(() => {
                    timeLeft -= 100;
                    updateTimer();
                    if (timeLeft <= 0) {
                        timeUp();
                    }
                }, 100);

                gameActive = true;
            }, showTime);
        }

        function updateTimer() {
            const percentage = (timeLeft / maxTime) * 100;
            document.getElementById('timerFill').style.width = percentage + '%';
        }

        function selectColor(color, element) {
            if (!gameActive) return;
            gameActive = false;
            clearInterval(timer);

            const options = document.querySelectorAll('.color-option');
            options.forEach(opt => opt.style.pointerEvents = 'none');

            if (colorsSimilar(color, targetColor)) {
                element.classList.add('correct');
                score += level * 10;
                document.getElementById('score').textContent = score;

                const messageDiv = document.getElementById('message');
                messageDiv.className = 'message success';
                messageDiv.textContent = `正解！ +${level * 10}点`;

                setTimeout(() => {
                    level++;
                    document.getElementById('level').textContent = level;
                    startRound();
                }, 1500);
            } else {
                element.classList.add('wrong');
                // 正解を表示
                options.forEach(opt => {
                    if (colorsSimilar(opt.style.background, targetColor)) {
                        opt.classList.add('correct');
                    }
                });

                const messageDiv = document.getElementById('message');
                messageDiv.className = 'message error';
                messageDiv.textContent = '残念！ゲームオーバー';

                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('colorMemoryHighScore', highScore);
                    document.getElementById('highScore').textContent = highScore;
                    messageDiv.textContent += ' 🎉 新記録！';
                }

                setTimeout(() => {
                    document.getElementById('startBtn').classList.remove('hidden');
                    document.getElementById('startBtn').textContent = 'もう一度プレイ';
                }, 2000);
            }
        }

        function timeUp() {
            gameActive = false;
            clearInterval(timer);

            const options = document.querySelectorAll('.color-option');
            options.forEach(opt => {
                opt.style.pointerEvents = 'none';
                if (colorsSimilar(opt.style.background, targetColor)) {
                    opt.classList.add('correct');
                }
            });

            const messageDiv = document.getElementById('message');
            messageDiv.className = 'message error';
            messageDiv.textContent = '時間切れ！';

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('colorMemoryHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
                messageDiv.textContent += ' 🎉 新記録！';
            }

            setTimeout(() => {
                document.getElementById('startBtn').classList.remove('hidden');
                document.getElementById('startBtn').textContent = 'もう一度プレイ';
            }, 2000);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
