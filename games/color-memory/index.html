<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Color Memory - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        h1 {
            color: #ffffff;
            margin-bottom: 10px;
            font-size: 28px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 20px 0;
        }

        .color-btn {
            width: 140px;
            height: 140px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .color-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: rotate(45deg);
            transition: all 0.5s ease;
        }

        .color-btn:hover::before {
            left: 100%;
        }

        .color-btn:active {
            transform: scale(0.95);
        }

        .color-btn.red { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); }
        .color-btn.blue { background: linear-gradient(135deg, #4ecdc4, #44a08d); }
        .color-btn.green { background: linear-gradient(135deg, #a8e063, #56ab2f); }
        .color-btn.yellow { background: linear-gradient(135deg, #f7d794, #f5cd79); }

        .color-btn.active {
            animation: flash 0.5s ease;
            box-shadow: 0 0 40px currentColor;
        }

        @keyframes flash {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            color: #ffffff;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .overlay p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            margin-bottom: 30px;
            text-align: center;
            max-width: 400px;
            padding: 0 20px;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #ffffff;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #ffffff;
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            z-index: 50;
            pointer-events: none;
        }

        .message.hidden {
            display: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 10px 16px;
            border-radius: 20px;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        @media (max-width: 768px) {
            h1 { font-size: 22px; }
            .color-btn { width: 120px; height: 120px; }
            .stats { gap: 15px; }
            .stat-box { padding: 8px 15px; }
            .stat-value { font-size: 20px; }
            .overlay h2 { font-size: 24px; }
            .game-board { gap: 15px; }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <h1>🎨 Color Memory</h1>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">ベスト</div>
                <div class="stat-value" id="bestScore">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">レベル</div>
                <div class="stat-value" id="level">1</div>
            </div>
        </div>

        <div class="game-board">
            <button class="color-btn red" data-color="red"></button>
            <button class="color-btn blue" data-color="blue"></button>
            <button class="color-btn green" data-color="green"></button>
            <button class="color-btn yellow" data-color="yellow"></button>
        </div>
    </div>

    <!-- スタート画面 -->
    <div class="overlay" id="startOverlay">
        <h2>🎨 Color Memory</h2>
        <p>
            光る色の順番を覚えて、同じ順番でタップしよう！<br><br>
            レベルが上がるにつれて、順番が長くなります。<br>
            ベストスコアに挑戦！
        </p>
        <button class="start-btn" onclick="startGame()">スタート</button>
    </div>

    <!-- ゲームオーバー画面 -->
    <div class="overlay hidden" id="gameOverOverlay">
        <h2>💫 ゲームオーバー</h2>
        <p>スコア: <span id="finalScore">0</span></p>
        <button class="start-btn" onclick="startGame()">もう一度</button>
    </div>

    <!-- メッセージ -->
    <div class="message hidden" id="message"></div>

    <script>
        const COLORS = ['red', 'blue', 'green', 'yellow'];
        const BASE_DELAY = 600;
        const MIN_DELAY = 200;

        let sequence = [];
        let playerSequence = [];
        let score = 0;
        let level = 1;
        let isPlaying = false;
        let isShowingSequence = false;

        // ベストスコアを読み込み
        let bestScore = parseInt(localStorage.getItem('colorMemoryBest')) || 0;
        document.getElementById('bestScore').textContent = bestScore;

        // 音を再生
        function playSound(color) {
            const frequencies = {
                red: 261.63,
                blue: 329.63,
                green: 392.00,
                yellow: 523.25
            };

            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.frequency.value = frequencies[color];
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.3);
        }

        // 色を光らせる
        function flashColor(color) {
            const btn = document.querySelector(`[data-color="${color}"]`);
            btn.classList.add('active');
            playSound(color);

            setTimeout(() => {
                btn.classList.remove('active');
            }, 300);
        }

        // シーケンスを表示
        async function showSequence() {
            isShowingSequence = true;
            playerSequence = [];

            const delay = Math.max(MIN_DELAY, BASE_DELAY - (level - 1) * 30);

            for (let i = 0; i < sequence.length; i++) {
                await new Promise(resolve => setTimeout(resolve, delay));
                flashColor(sequence[i]);
            }

            await new Promise(resolve => setTimeout(resolve, 500));
            isShowingSequence = false;
        }

        // 新しいシーケンスを追加
        function addToSequence() {
            const randomColor = COLORS[Math.floor(Math.random() * COLORS.length)];
            sequence.push(randomColor);
        }

        // ゲーム開始
        function startGame() {
            sequence = [];
            playerSequence = [];
            score = 0;
            level = 1;
            isPlaying = true;

            updateUI();

            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');

            addToSequence();
            setTimeout(() => showSequence(), 500);
        }

        // プレイヤーの入力を処理
        function handleInput(color) {
            if (!isPlaying || isShowingSequence) return;

            flashColor(color);
            playerSequence.push(color);

            const currentIndex = playerSequence.length - 1;

            // 間違った色
            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                gameOver();
                return;
            }

            // シーケンス完了
            if (playerSequence.length === sequence.length) {
                score += level;
                level++;

                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('colorMemoryBest', bestScore);
                }

                updateUI();
                showMessage(`レベル ${level}!`);

                setTimeout(() => {
                    addToSequence();
                    showSequence();
                }, 1000);
            }
        }

        // ゲームオーバー
        function gameOver() {
            isPlaying = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.remove('hidden');

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('colorMemoryBest', bestScore);
            }
        }

        // UI更新
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('bestScore').textContent = bestScore;
            document.getElementById('level').textContent = level;
        }

        // メッセージ表示
        function showMessage(text) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.classList.remove('hidden');

            setTimeout(() => {
                messageEl.classList.add('hidden');
            }, 1000);
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                handleInput(btn.dataset.color);
            });

            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleInput(btn.dataset.color);
            });
        });

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (!isPlaying || isShowingSequence) return;

            const keyMap = {
                '1': 'red',
                '2': 'blue',
                '3': 'green',
                '4': 'yellow'
            };

            if (keyMap[e.key]) {
                handleInput(keyMap[e.key]);
            }
        });
    </script>
</body>
</html>
