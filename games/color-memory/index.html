<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Color Memory - 色の記憶</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            touch-action: manipulation;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .title {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .score-board {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            color: white;
        }

        .score-item {
            text-align: center;
        }

        .score-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .color-btn {
            width: 120px;
            height: 120px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .color-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent,
                rgba(255, 255, 255, 0.1),
                transparent
            );
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% {
                transform: translateX(-100%) translateY(-100%) rotate(45deg);
            }
            100% {
                transform: translateX(100%) translateY(100%) rotate(45deg);
            }
        }

        .color-btn:active {
            transform: scale(0.95);
        }

        .color-btn.red {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
        }

        .color-btn.blue {
            background: linear-gradient(135deg, #4ecdc4 0%, #3db8b0 100%);
        }

        .color-btn.yellow {
            background: linear-gradient(135deg, #ffe66d 0%, #ffd93d 100%);
        }

        .color-btn.green {
            background: linear-gradient(135deg, #95e652 0%, #7ed950 100%);
        }

        .color-btn.active {
            transform: scale(1.05);
            box-shadow: 0 0 30px currentColor;
            filter: brightness(1.3);
        }

        .color-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
        }

        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            text-align: center;
            color: white;
            font-size: 1.1rem;
            margin-top: 20px;
            min-height: 30px;
        }

        @media (max-width: 480px) {
            .title {
                font-size: 1.5rem;
            }

            .color-btn {
                width: 100px;
                height: 100px;
            }

            .game-board {
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">🎨 Color Memory</div>
        <div class="subtitle">色の順番を覚えて、同じ順にタップ！</div>
    </div>

    <div class="score-board">
        <div class="score-item">
            <div class="score-label">レベル</div>
            <div class="score-value" id="level">1</div>
        </div>
        <div class="score-item">
            <div class="score-label">スコア</div>
            <div class="score-value" id="score">0</div>
        </div>
        <div class="score-item">
            <div class="score-label">ハイスコア</div>
            <div class="score-value" id="highScore">0</div>
        </div>
    </div>

    <div class="game-board">
        <button class="color-btn red" data-color="0" aria-label="Red"></button>
        <button class="color-btn blue" data-color="1" aria-label="Blue"></button>
        <button class="color-btn yellow" data-color="2" aria-label="Yellow"></button>
        <button class="color-btn green" data-color="3" aria-label="Green"></button>
    </div>

    <button class="start-btn" id="startBtn">🎮 スタート</button>
    <div class="message" id="message"></div>

    <script>
        const colorBtns = document.querySelectorAll('.color-btn');
        const startBtn = document.getElementById('startBtn');
        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const messageEl = document.getElementById('message');

        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let score = 0;
        let highScore = localStorage.getItem('colorMemoryHighScore') || 0;
        let isPlaying = false;
        let isShowingSequence = false;

        // Audio context
        let audioCtx = null;

        const frequencies = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5
        const colors = ['red', 'blue', 'yellow', 'green'];

        highScoreEl.textContent = highScore;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(index, duration = 300) {
            if (!audioCtx) return;

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(frequencies[index], audioCtx.currentTime);

            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration / 1000);

            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + duration / 1000);
        }

        function playErrorSound() {
            if (!audioCtx) return;

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);

            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);

            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.5);
        }

        function activateButton(index, duration = 300) {
            const btn = colorBtns[index];
            btn.classList.add('active');
            playSound(index, duration);

            setTimeout(() => {
                btn.classList.remove('active');
            }, duration);
        }

        function addToSequence() {
            const randomColor = Math.floor(Math.random() * 4);
            sequence.push(randomColor);
        }

        async function showSequence() {
            isShowingSequence = true;
            setButtonsDisabled(true);
            messageEl.textContent = '覚えて...';

            await new Promise(resolve => setTimeout(resolve, 500));

            for (let i = 0; i < sequence.length; i++) {
                await new Promise(resolve => setTimeout(resolve, 300));
                activateButton(sequence[i]);
                await new Promise(resolve => setTimeout(resolve, 400));
            }

            isShowingSequence = false;
            setButtonsDisabled(false);
            messageEl.textContent = 'あなたの番！';
        }

        function setButtonsDisabled(disabled) {
            colorBtns.forEach(btn => {
                if (disabled) {
                    btn.classList.add('disabled');
                } else {
                    btn.classList.remove('disabled');
                }
            });
        }

        function handleColorClick(index) {
            if (!isPlaying || isShowingSequence) return;

            activateButton(index);
            playerSequence.push(index);

            const currentMove = playerSequence.length - 1;

            if (playerSequence[currentMove] !== sequence[currentMove]) {
                gameOver();
                return;
            }

            if (playerSequence.length === sequence.length) {
                score += level * 10;
                scoreEl.textContent = score;
                level++;
                levelEl.textContent = level;

                if (score > highScore) {
                    highScore = score;
                    highScoreEl.textContent = highScore;
                    localStorage.setItem('colorMemoryHighScore', highScore);
                }

                messageEl.textContent = '正解！ 🎉';
                playerSequence = [];

                setTimeout(() => {
                    addToSequence();
                    showSequence();
                }, 1000);
            }
        }

        function gameOver() {
            playErrorSound();
            isPlaying = false;
            setButtonsDisabled(true);
            startBtn.disabled = false;

            messageEl.innerHTML = `間違い！ スコア: ${score} <br> もう一度挑戦？`;
        }

        function startGame() {
            initAudio();
            sequence = [];
            playerSequence = [];
            level = 1;
            score = 0;
            isPlaying = true;

            levelEl.textContent = level;
            scoreEl.textContent = score;
            startBtn.disabled = true;

            addToSequence();
            showSequence();
        }

        // Event listeners
        colorBtns.forEach((btn, index) => {
            btn.addEventListener('click', () => handleColorClick(index));
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleColorClick(index);
            });
        });

        startBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
