<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Memory - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            text-align: center;
            font-weight: 600;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 1.5rem;
            background: rgba(255, 255, 255, 0.2);
            padding: 1rem;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-bottom: 0.25rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .color-box {
            aspect-ratio: 1;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .color-box::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0);
            transition: background 0.3s ease;
        }

        .color-box:hover::before {
            background: rgba(255, 255, 255, 0.2);
        }

        .color-box.hidden {
            background: #2d3748 !important;
            cursor: pointer;
        }

        .color-box.selected {
            border-color: #ffd700;
            transform: scale(1.05);
        }

        .color-box.matched {
            opacity: 0.3;
            cursor: default;
        }

        .color-box.wrong {
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 1rem 2rem;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.9);
            color: #667eea;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 1rem;
            right: 1rem;
            padding: 0.8rem;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            z-index: 100;
        }

        .message {
            text-align: center;
            margin-top: 1rem;
            font-size: 1.1rem;
            font-weight: 500;
            min-height: 1.5rem;
        }

        .success {
            color: #68d391;
        }

        .error {
            color: #fc8181;
        }

        .start-screen, .game-over-screen {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .start-screen h2, .game-over-screen h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        .start-screen p, .game-over-screen p {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.2rem;
            }

            .game-board {
                gap: 8px;
            }

            .color-box {
                border-radius: 8px;
            }

            button {
                padding: 0.8rem 1.5rem;
                font-size: 0.9rem;
            }

            .fullscreen-btn {
                top: 0.5rem;
                right: 0.5rem;
                width: 45px;
                height: 45px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <h1>🎨 COLOR MEMORY</h1>

        <div id="startScreen" class="start-screen">
            <h2>色の記憶ゲーム</h2>
            <p>
                同じ色のペアをすべて見つけてください！<br>
                カードをクリックして色を確認し、<br>
                全てのペアをマッチングしましょう。
            </p>
            <button onclick="startGame()">スタート</button>
        </div>

        <div id="gameArea" class="hidden">
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">レベル</div>
                    <div class="stat-value" id="level">1</div>
                </div>
                <div class="stat">
                    <div class="stat-label">手数</div>
                    <div class="stat-value" id="moves">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">タイム</div>
                    <div class="stat-value" id="timer">0:00</div>
                </div>
            </div>

            <div class="game-board" id="gameBoard"></div>

            <div class="message" id="message"></div>

            <div class="controls">
                <button onclick="resetGame()">リセット</button>
            </div>
        </div>

        <div id="gameOverScreen" class="game-over-screen hidden">
            <h2>🎉 クリア！</h2>
            <p>
                おめでとうございます！<br>
                レベル: <span id="finalLevel">1</span><br>
                手数: <span id="finalMoves">0</span><br>
                タイム: <span id="finalTime">0:00</span>
            </p>
            <button onclick="startGame()">次のレベル</button>
        </div>
    </div>

    <script>
        let colors = [];
        let selectedBoxes = [];
        let matchedPairs = 0;
        let totalPairs = 0;
        let moves = 0;
        let level = 1;
        let timer = null;
        let seconds = 0;
        let isProcessing = false;

        // 色の生成
        function generateColors(count) {
            const colorSet = [];
            for (let i = 0; i < count; i++) {
                const hue = (i * 360 / count) % 360;
                const saturation = 60 + Math.random() * 30;
                const lightness = 45 + Math.random() * 20;
                colorSet.push(`hsl(${hue}, ${saturation}%, ${lightness}%)`);
            }
            return colorSet;
        }

        // ゲームボードの作成
        function createBoard() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';

            totalPairs = level + 3; // レベルに応じてペア数を増やす
            const colors = generateColors(totalPairs);
            const allColors = [...colors, ...colors];

            // シャッフル（Fisher-Yates）
            for (let i = allColors.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [allColors[i], allColors[j]] = [allColors[j], allColors[i]];
            }

            // ボックスを作成
            allColors.forEach((color, index) => {
                const box = document.createElement('div');
                box.className = 'color-box hidden';
                box.dataset.color = color;
                box.dataset.index = index;
                box.addEventListener('click', () => handleClick(box));
                box.style.backgroundColor = color;
                board.appendChild(box);
            });

            matchedPairs = 0;
            moves = 0;
            updateStats();
        }

        // クリック処理
        function handleClick(box) {
            if (isProcessing) return;
            if (box.classList.contains('matched')) return;
            if (box.classList.contains('selected')) return;
            if (selectedBoxes.length >= 2) return;

            box.classList.remove('hidden');
            box.classList.add('selected');
            selectedBoxes.push(box);

            if (selectedBoxes.length === 2) {
                isProcessing = true;
                moves++;
                updateStats();
                checkMatch();
            }
        }

        // マッチチェック
        function checkMatch() {
            const [box1, box2] = selectedBoxes;
            const match = box1.dataset.color === box2.dataset.color;

            if (match) {
                setTimeout(() => {
                    box1.classList.add('matched');
                    box2.classList.add('matched');
                    box1.classList.remove('selected');
                    box2.classList.remove('selected');
                    selectedBoxes = [];
                    matchedPairs++;
                    isProcessing = false;

                    showMessage('マッチ！', 'success');

                    if (matchedPairs === totalPairs) {
                        gameOver();
                    }
                }, 300);
            } else {
                setTimeout(() => {
                    box1.classList.add('wrong');
                    box2.classList.add('wrong');
                }, 300);

                setTimeout(() => {
                    box1.classList.add('hidden');
                    box2.classList.add('hidden');
                    box1.classList.remove('selected', 'wrong');
                    box2.classList.remove('selected', 'wrong');
                    selectedBoxes = [];
                    isProcessing = false;
                    showMessage('違います...', 'error');
                }, 1000);
            }
        }

        // メッセージ表示
        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = 'message ' + type;

            setTimeout(() => {
                message.textContent = '';
                message.className = 'message';
            }, 1500);
        }

        // 統計更新
        function updateStats() {
            document.getElementById('level').textContent = level;
            document.getElementById('moves').textContent = moves;
        }

        // タイマー開始
        function startTimer() {
            seconds = 0;
            timer = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                document.getElementById('timer').textContent =
                    `${mins}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        }

        // タイマー停止
        function stopTimer() {
            if (timer) {
                clearInterval(timer);
                timer = null;
            }
        }

        // ゲーム開始
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('gameArea').classList.remove('hidden');

            stopTimer();
            createBoard();
            startTimer();
        }

        // ゲームリセット
        function resetGame() {
            stopTimer();
            selectedBoxes.forEach(box => {
                box.classList.add('hidden');
                box.classList.remove('selected');
            });
            selectedBoxes = [];
            createBoard();
            startTimer();
        }

        // ゲームオーバー
        function gameOver() {
            stopTimer();

            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            const timeStr = `${mins}:${secs.toString().padStart(2, '0')}`;

            document.getElementById('finalLevel').textContent = level;
            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('finalTime').textContent = timeStr;

            document.getElementById('gameArea').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.remove('hidden');

            level++;
        }

        // 全画面表示
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
