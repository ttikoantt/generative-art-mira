<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Color Memory Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            padding: 20px;
        }

        .game-container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #eee;
            margin-bottom: 10px;
            font-size: 28px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .score {
            color: #4ecdc4;
            font-size: 20px;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .color-btn {
            aspect-ratio: 1;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .color-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
            pointer-events: none;
        }

        .color-btn:active {
            transform: scale(0.95);
        }

        .color-btn.active {
            transform: scale(1.05);
            box-shadow: 0 0 30px currentColor;
        }

        .red { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); }
        .blue { background: linear-gradient(135deg, #4ecdc4, #44a08d); }
        .green { background: linear-gradient(135deg, #a8e6cf, #56ab91); }
        .yellow { background: linear-gradient(135deg, #ffd93d, #f9c802); }

        .status {
            color: #95a5a6;
            font-size: 16px;
            margin-bottom: 20px;
            min-height: 24px;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #eee;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 120px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.primary {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            border: none;
            color: #1a1a2e;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #eee;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .high-score {
            color: #ffd700;
            font-size: 14px;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 24px; }
            .grid { gap: 10px; }
            .btn { padding: 10px 16px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
    
    <div class="game-container">
        <h1>🎨 Color Memory</h1>
        <div class="score">Level: <span id="level">1</span></div>
        <div class="high-score">🏆 Best: <span id="highScore">0</span></div>
        <div class="status" id="status">Press Start to Play!</div>
        
        <div class="grid">
            <button class="color-btn red" data-color="red"></button>
            <button class="color-btn blue" data-color="blue"></button>
            <button class="color-btn green" data-color="green"></button>
            <button class="color-btn yellow" data-color="yellow"></button>
        </div>

        <div class="controls">
            <button class="btn primary" onclick="startGame()">▶ Start</button>
            <button class="btn" onclick="resetGame()">↺ Reset</button>
        </div>
    </div>

    <script>
        const colors = ['red', 'blue', 'green', 'yellow'];
        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let isPlaying = false;
        let isShowingSequence = false;
        let highScore = localStorage.getItem('colorMemoryHighScore') || 0;

        document.getElementById('highScore').textContent = highScore;

        function playTone(color) {
            const frequencies = { red: 261.63, blue: 329.63, green: 392.00, yellow: 523.25 };
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.frequency.value = frequencies[color];
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.3);
            } catch (e) {
                // Audio not supported
            }
        }

        function flashButton(color) {
            const btn = document.querySelector(`[data-color="${color}"]`);
            btn.classList.add('active');
            playTone(color);
            setTimeout(() => btn.classList.remove('active'), 300);
        }

        async function showSequence() {
            isShowingSequence = true;
            document.getElementById('status').textContent = 'Watch carefully...';
            
            await new Promise(resolve => setTimeout(resolve, 500));
            
            for (let i = 0; i < sequence.length; i++) {
                await new Promise(resolve => setTimeout(resolve, 600));
                flashButton(sequence[i]);
            }
            
            await new Promise(resolve => setTimeout(resolve, 500));
            isShowingSequence = false;
            document.getElementById('status').textContent = 'Your turn!';
        }

        function addToSequence() {
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            sequence.push(randomColor);
        }

        function handleColorClick(color) {
            if (!isPlaying || isShowingSequence) return;
            
            flashButton(color);
            playerSequence.push(color);
            
            const currentIndex = playerSequence.length - 1;
            
            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                gameOver();
                return;
            }
            
            if (playerSequence.length === sequence.length) {
                playerSequence = [];
                level++;
                document.getElementById('level').textContent = level;
                document.getElementById('status').textContent = 'Correct! Next level...';
                
                if (level > highScore) {
                    highScore = level;
                    localStorage.setItem('colorMemoryHighScore', highScore);
                    document.getElementById('highScore').textContent = highScore;
                }
                
                setTimeout(() => {
                    addToSequence();
                    showSequence();
                }, 1000);
            }
        }

        function startGame() {
            if (isPlaying) return;
            
            isPlaying = true;
            sequence = [];
            playerSequence = [];
            level = 1;
            document.getElementById('level').textContent = level;
            
            addToSequence();
            showSequence();
        }

        function gameOver() {
            isPlaying = false;
            document.getElementById('status').textContent = `❌ Game Over! You reached level ${level}. Press Start to try again.`;
        }

        function resetGame() {
            isPlaying = false;
            sequence = [];
            playerSequence = [];
            level = 1;
            document.getElementById('level').textContent = level;
            document.getElementById('status').textContent = 'Press Start to Play!';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Event listeners
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', () => handleColorClick(btn.dataset.color));
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleColorClick(btn.dataset.color);
            });
        });
    </script>
</body>
</html>
