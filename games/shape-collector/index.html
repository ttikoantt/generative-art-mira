<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Shape Collector - 形集めゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #gameCanvas {
            flex: 1;
            cursor: pointer;
            touch-action: none;
        }

        .ui {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px;
            pointer-events: none;
            z-index: 10;
        }

        .score-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px 25px;
            color: #fff;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .score-panel .score {
            font-size: 28px;
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .score-panel .label {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .target-shape {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px 25px;
            color: #fff;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .target-shape .label {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .target-shape .shape {
            font-size: 36px;
        }

        .lives-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px 25px;
            color: #fff;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .lives-panel .hearts {
            font-size: 24px;
        }

        .fullscreen-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #4a6fa5, #6a4a9f);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            z-index: 100;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(74, 111, 165, 0.4);
            pointer-events: auto;
        }

        .fullscreen-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(74, 111, 165, 0.6);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h1 {
            font-size: 48px;
            color: #fff;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff6b6b, #ffd700, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .overlay .subtitle {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 30px;
        }

        .overlay .final-score {
            font-size: 36px;
            color: #ffd700;
            margin-bottom: 30px;
        }

        .overlay .btn {
            background: linear-gradient(135deg, #4a6fa5, #6a4a9f);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(74, 111, 165, 0.4);
            pointer-events: auto;
        }

        .overlay .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(74, 111, 165, 0.6);
        }

        .overlay .btn:active {
            transform: scale(0.95);
        }

        .combo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            pointer-events: none;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .combo.show {
            opacity: 1;
            animation: comboAnim 0.5s ease-out;
        }

        @keyframes comboAnim {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .score-panel, .target-shape, .lives-panel {
                padding: 10px 15px;
            }

            .score-panel .score {
                font-size: 24px;
            }

            .target-shape .shape {
                font-size: 28px;
            }

            .lives-panel .hearts {
                font-size: 20px;
            }

            .overlay h1 {
                font-size: 32px;
            }

            .overlay .final-score {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="ui">
            <div class="score-panel">
                <div class="label">SCORE</div>
                <div class="score" id="score">0</div>
            </div>

            <div class="target-shape">
                <div class="label">COLLECT</div>
                <div class="shape" id="targetShape">⭕</div>
            </div>

            <div class="lives-panel">
                <div class="label">LIVES</div>
                <div class="hearts" id="lives">❤️❤️❤️</div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>

        <div class="combo" id="combo"></div>

        <div class="overlay" id="startOverlay">
            <h1>🎯 Shape Collector</h1>
            <div class="subtitle">指定された形を集めよう！</div>
            <button class="btn" onclick="startGame()">スタート</button>
        </div>

        <div class="overlay hidden" id="gameOverOverlay">
            <h1>ゲームオーバー</h1>
            <div class="final-score" id="finalScore">Score: 0</div>
            <button class="btn" onclick="startGame()">もう一度</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // キャンバスサイズの設定
        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight - 60;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ゲームの状態
        let gameState = 'start';
        let score = 0;
        let lives = 3;
        let combo = 0;
        let shapes = [];
        let particles = [];
        let lastSpawnTime = 0;
        let spawnInterval = 1500;
        let targetShapeType = 'circle';

        // 形の種類
        const SHAPE_TYPES = [
            { type: 'circle', emoji: '⭕', color: '#ff6b6b' },
            { type: 'square', emoji: '🟦', color: '#4ecdc4' },
            { type: 'triangle', emoji: '🔺', color: '#ffd700' }
        ];

        // 形クラス
        class Shape {
            constructor() {
                const typeData = SHAPE_TYPES[Math.floor(Math.random() * SHAPE_TYPES.length)];
                this.type = typeData.type;
                this.emoji = typeData.emoji;
                this.color = typeData.color;
                this.size = 30 + Math.random() * 20;
                this.x = Math.random() * (canvas.width - this.size * 2) + this.size;
                this.y = -this.size * 2;
                this.speedY = 2 + Math.random() * 2;
                this.speedX = (Math.random() - 0.5) * 2;
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.wobble = Math.random() * Math.PI * 2;
            }

            update() {
                this.y += this.speedY;
                this.x += this.speedX + Math.sin(this.wobble) * 0.5;
                this.rotation += this.rotationSpeed;
                this.wobble += 0.1;

                // 壁で弾む
                if (this.x < this.size || this.x > canvas.width - this.size) {
                    this.speedX *= -1;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // 光るエフェクト
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.color;

                // 形を描画
                ctx.fillStyle = this.color;
                ctx.font = `${this.size * 2}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.emoji, 0, 0);

                ctx.restore();
            }

            isClicked(x, y) {
                const dx = x - this.x;
                const dy = y - this.y;
                return Math.sqrt(dx * dx + dy * dy) < this.size;
            }
        }

        // パーティクルクラス
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = 3 + Math.random() * 3;
                this.speedX = (Math.random() - 0.5) * 8;
                this.speedY = (Math.random() - 0.5) * 8;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.02;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += 0.2;
                this.life -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // ターゲットの形を変更
        function changeTargetShape() {
            const targetData = SHAPE_TYPES[Math.floor(Math.random() * SHAPE_TYPES.length)];
            targetShapeType = targetData.type;
            document.getElementById('targetShape').textContent = targetData.emoji;
        }

        // スコア更新
        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        // ライフ更新
        function updateLives() {
            let heartsHTML = '';
            for (let i = 0; i < lives; i++) {
                heartsHTML += '❤️';
            }
            for (let i = lives; i < 3; i++) {
                heartsHTML += '🖤';
            }
            document.getElementById('lives').textContent = heartsHTML;
        }

        // コンボ表示
        function showCombo(text) {
            const comboEl = document.getElementById('combo');
            comboEl.textContent = text;
            comboEl.classList.remove('show');
            void comboEl.offsetWidth;
            comboEl.classList.add('show');
        }

        // パーティクルを作成
        function createParticles(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        // 形をスポーン
        function spawnShape() {
            shapes.push(new Shape());
        }

        // ゲーム開始
        function startGame() {
            gameState = 'playing';
            score = 0;
            lives = 3;
            combo = 0;
            shapes = [];
            particles = [];
            spawnInterval = 1500;
            changeTargetShape();
            updateScore();
            updateLives();

            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');
        }

        // ゲームオーバー
        function gameOver() {
            gameState = 'gameover';
            document.getElementById('finalScore').textContent = `Score: ${score}`;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        // クリック/タッチ処理
        function handleClick(x, y) {
            if (gameState !== 'playing') return;

            for (let i = shapes.length - 1; i >= 0; i--) {
                const shape = shapes[i];
                if (shape.isClicked(x, y)) {
                    if (shape.type === targetShapeType) {
                        // 正解
                        combo++;
                        const points = 10 * combo;
                        score += points;
                        createParticles(shape.x, shape.y, shape.color, 15);
                        showCombo(`+${points}${combo > 1 ? ` (${combo}x Combo!)` : ''}`);
                        shapes.splice(i, 1);

                        // ターゲットを変更
                        changeTargetShape();

                        // 難易度を上げる
                        if (score % 50 === 0 && spawnInterval > 500) {
                            spawnInterval -= 100;
                        }
                    } else {
                        // 間違い
                        combo = 0;
                        lives--;
                        createParticles(shape.x, shape.y, '#ff0000', 10);
                        showCombo('Miss!');
                        shapes.splice(i, 1);
                        updateLives();

                        if (lives <= 0) {
                            gameOver();
                        }
                    }
                    updateScore();
                    break;
                }
            }
        }

        // イベントリスナー
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            handleClick(e.clientX - rect.left, e.clientY - rect.top);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            handleClick(touch.clientX - rect.left, touch.clientY - rect.top);
        });

        // 全画面表示
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ゲームループ
        function gameLoop(timestamp) {
            // キャンバスをクリア
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameState === 'playing') {
                // 形をスポーン
                if (timestamp - lastSpawnTime > spawnInterval) {
                    spawnShape();
                    lastSpawnTime = timestamp;
                }

                // 形を更新・描画
                for (let i = shapes.length - 1; i >= 0; i--) {
                    const shape = shapes[i];
                    shape.update();
                    shape.draw();

                    // 画面外に出たら削除
                    if (shape.y > canvas.height + shape.size * 2) {
                        shapes.splice(i, 1);
                        // ターゲットの形を逃したらペナルティ
                        if (shape.type === targetShapeType) {
                            combo = 0;
                        }
                    }
                }

                // パーティクルを更新・描画
                for (let i = particles.length - 1; i >= 0; i--) {
                    const particle = particles[i];
                    particle.update();
                    particle.draw();

                    if (particle.life <= 0) {
                        particles.splice(i, 1);
                    }
                }
            }

            requestAnimationFrame(gameLoop);
        }

        // ゲームを開始
        gameLoop(0);
    </script>
</body>
</html>
