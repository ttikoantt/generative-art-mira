<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Color Reflex - カラーリフレックス</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            padding: 20px;
        }
        .game-container {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }
        h1 {
            color: #fff;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
            margin-bottom: 30px;
        }
        .score-display {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
        }
        .score-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px 30px;
            min-width: 100px;
        }
        .score-box .label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8em;
            margin-bottom: 5px;
        }
        .score-box .value {
            color: #fff;
            font-size: 2em;
            font-weight: bold;
        }
        .game-area {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .instruction {
            font-size: 1.5em;
            color: #fff;
            margin-bottom: 30px;
            min-height: 40px;
        }
        .color-target {
            font-size: 2em;
            font-weight: bold;
            padding: 20px 40px;
            border-radius: 15px;
            margin-bottom: 20px;
            transition: all 0.3s;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        .timer-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            transition: width 0.1s linear;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .color-btn {
            border: none;
            border-radius: 15px;
            padding: 25px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            color: #fff;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .color-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        .color-btn:active {
            transform: scale(0.95);
        }
        .start-screen, .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .start-screen h2, .game-over-screen h2 {
            color: #fff;
            font-size: 3em;
            margin-bottom: 20px;
        }
        .start-screen p, .game-over-screen p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.2em;
            margin-bottom: 30px;
            max-width: 400px;
            text-align: center;
            padding: 0 20px;
        }
        .start-btn, .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 15px 50px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }
        .start-btn:hover, .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 30px rgba(102, 126, 234, 0.6);
        }
        .hidden {
            display: none !important;
        }
        .final-score {
            color: #00d2ff;
            font-size: 4em;
            font-weight: bold;
            margin: 20px 0;
        }
        .combo-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5em;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            pointer-events: none;
            opacity: 0;
            transition: all 0.3s;
        }
        .combo-display.show {
            opacity: 1;
            animation: comboAnim 0.5s ease-out;
        }
        @keyframes comboAnim {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            z-index: 50;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        @media (max-width: 600px) {
            h1 { font-size: 2em; }
            .color-target { font-size: 1.5em; padding: 15px 30px; }
            .color-btn { padding: 20px; font-size: 1.1em; }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <h1>🎨 Color Reflex</h1>
        <p class="subtitle">色の反射神経テスト</p>

        <div class="score-display">
            <div class="score-box">
                <div class="label">スコア</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="label">ハイスコア</div>
                <div class="value" id="highScore">0</div>
            </div>
        </div>

        <div class="game-area">
            <div class="instruction" id="instruction">同じ色のボタンを押せ！</div>
            <div class="color-target" id="colorTarget">赤</div>
            <div class="timer-bar">
                <div class="timer-fill" id="timerFill"></div>
            </div>
            <div class="buttons" id="buttons"></div>
        </div>
    </div>

    <div class="start-screen" id="startScreen">
        <h2>🎨 Color Reflex</h2>
        <p>表示される色の名前と<strong>同じ色</strong>のボタンを素早く押してください！<br><br>制限時間は3秒からスタート。正解するたびに時間が少し回復します。</p>
        <button class="start-btn" onclick="startGame()">スタート</button>
    </div>

    <div class="game-over-screen hidden" id="gameOverScreen">
        <h2>ゲームオーバー</h2>
        <p>你的スコア</p>
        <div class="final-score" id="finalScore">0</div>
        <button class="restart-btn" onclick="startGame()">もう一度</button>
    </div>

    <div class="combo-display" id="comboDisplay">+10</div>

    <script>
        const colors = [
            { name: '赤', color: '#ff4757' },
            { name: '青', color: '#3742fa' },
            { name: '緑', color: '#2ed573' },
            { name: '黄', color: '#ffa502' },
            { name: '紫', color: '#a55eea' },
            { name: 'オレンジ', color: '#ff7f50' },
            { name: 'ピンク', color: '#ff6b81' },
            { name: '水色', color: '#00d2ff' }
        ];

        let score = 0;
        let highScore = parseInt(localStorage.getItem('colorReflexHighScore')) || 0;
        let currentTarget = null;
        let currentColors = [];
        let timeLeft = 3;
        let maxTime = 3;
        let gameInterval = null;
        let combo = 0;

        document.getElementById('highScore').textContent = highScore;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startGame() {
            score = 0;
            timeLeft = 3;
            maxTime = 3;
            combo = 0;
            document.getElementById('score').textContent = '0';
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            
            generateRound();
            gameInterval = setInterval(updateTimer, 50);
        }

        function generateRound() {
            // Shuffle colors
            const shuffledColors = shuffleArray([...colors]);
            
            // Pick target color
            currentTarget = shuffledColors[0];
            
            // Pick 4 colors for buttons (including the target)
            currentColors = shuffledColors.slice(0, 4);
            currentColors = shuffleArray(currentColors);
            
            // Update display
            const targetElement = document.getElementById('colorTarget');
            targetElement.textContent = currentTarget.name;
            targetElement.style.backgroundColor = currentColors[Math.floor(Math.random() * currentColors.length)].color;
            targetElement.style.color = '#fff';
            
            // Random instruction
            const instructions = [
                '同じ色のボタンを押せ！',
                'この色のボタンを押せ！',
                '対応する色を選べ！'
            ];
            document.getElementById('instruction').textContent = 
                instructions[Math.floor(Math.random() * instructions.length)];
            
            // Create buttons
            const buttonsContainer = document.getElementById('buttons');
            buttonsContainer.innerHTML = '';
            
            currentColors.forEach((colorObj, index) => {
                const btn = document.createElement('button');
                btn.className = 'color-btn';
                btn.style.backgroundColor = colorObj.color;
                btn.textContent = colorObj.name;
                btn.onclick = () => checkAnswer(colorObj);
                buttonsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedColor) {
            if (selectedColor.name === currentTarget.name) {
                // Correct!
                combo++;
                const basePoints = 10;
                const comboBonus = Math.min(combo * 2, 20);
                const points = basePoints + comboBonus;
                score += points;
                
                document.getElementById('score').textContent = score;
                
                // Show combo
                showCombo(`+${points}`);
                
                // Add time (but cap at maxTime)
                timeLeft = Math.min(timeLeft + 0.5, maxTime);
                
                // Increase difficulty
                if (score % 50 === 0 && maxTime > 1) {
                    maxTime -= 0.2;
                }
                
                generateRound();
            } else {
                // Wrong!
                combo = 0;
                timeLeft -= 0.5;
                showCombo('❌', '#ff4757');
            }
        }

        function showCombo(text, color = null) {
            const comboDisplay = document.getElementById('comboDisplay');
            comboDisplay.textContent = text;
            if (color) {
                comboDisplay.style.color = color;
            } else {
                comboDisplay.style.color = '#fff';
            }
            comboDisplay.classList.add('show');
            setTimeout(() => {
                comboDisplay.classList.remove('show');
            }, 500);
        }

        function updateTimer() {
            timeLeft -= 0.05;
            
            const percentage = (timeLeft / maxTime) * 100;
            const timerFill = document.getElementById('timerFill');
            timerFill.style.width = percentage + '%';
            
            if (percentage < 30) {
                timerFill.style.background = 'linear-gradient(90deg, #ff4757 0%, #ff6b81 100%)';
            } else if (percentage < 60) {
                timerFill.style.background = 'linear-gradient(90deg, #ffa502 0%, #ff7f50 100%)';
            } else {
                timerFill.style.background = 'linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%)';
            }
            
            if (timeLeft <= 0) {
                gameOver();
            }
        }

        function gameOver() {
            clearInterval(gameInterval);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('colorReflexHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key >= '1' && e.key <= '4') {
                const index = parseInt(e.key) - 1;
                const buttons = document.querySelectorAll('.color-btn');
                if (buttons[index] && !document.getElementById('startScreen').classList.contains('hidden') === false) {
                    buttons[index].click();
                }
            }
        });
    </script>
</body>
</html>
