<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slot Machine - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .game-container {
            background: linear-gradient(145deg, #2a2a4a, #1a1a3a);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #ffd700;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
        }
        .stat {
            text-align: center;
        }
        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
            margin-bottom: 5px;
        }
        .stat-value {
            color: #ffd700;
            font-size: 1.8rem;
            font-weight: bold;
        }
        .slots {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .slot {
            width: 100px;
            height: 120px;
            background: linear-gradient(145deg, #0a0a1a, #1a1a2a);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            border: 3px solid rgba(255, 215, 0, 0.3);
            box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s;
        }
        .slot.spinning {
            animation: spin 0.1s linear infinite;
        }
        @keyframes spin {
            0% { transform: translateY(-10px); }
            50% { transform: translateY(10px); }
            100% { transform: translateY(-10px); }
        }
        .slot.winner {
            animation: winner 0.5s ease-in-out infinite;
            border-color: #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }
        @keyframes winner {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .bet-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            align-items: center;
        }
        .bet-controls button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .bet-controls button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .bet-controls button:active {
            transform: scale(0.95);
        }
        .bet-display {
            color: white;
            font-size: 1.2rem;
            min-width: 100px;
            text-align: center;
        }
        .spin-btn {
            padding: 20px 40px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(145deg, #ffd700, #ffaa00);
            color: #1a1a2e;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
        }
        .spin-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.4);
        }
        .spin-btn:active:not(:disabled) {
            transform: translateY(0);
        }
        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .result {
            text-align: center;
            margin-top: 20px;
            font-size: 1.2rem;
            min-height: 30px;
        }
        .result.win {
            color: #4ade80;
            font-weight: bold;
        }
        .result.lose {
            color: #f87171;
        }
        .result.jackpot {
            color: #ffd700;
            font-size: 1.5rem;
            font-weight: bold;
            animation: jackpot 0.5s ease-in-out infinite;
        }
        @keyframes jackpot {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .back-btn {
            margin-top: 20px;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
            .slot {
                width: 80px;
                height: 100px;
                font-size: 2.5rem;
            }
            .spin-btn {
                padding: 15px 30px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">⛶ 全画面</button>

    <div class="game-container">
        <h1>🎰 SLOT MACHINE</h1>
        <p class="subtitle">運試し！7揃うでジャックポット！</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">コイン</div>
                <div class="stat-value" id="coins">100</div>
            </div>
            <div class="stat">
                <div class="stat-label">勝利数</div>
                <div class="stat-value" id="wins">0</div>
            </div>
        </div>

        <div class="slots">
            <div class="slot" id="slot1">🍒</div>
            <div class="slot" id="slot2">🍋</div>
            <div class="slot" id="slot3">🍇</div>
        </div>

        <div class="controls">
            <div class="bet-controls">
                <button id="betDown">-10</button>
                <div class="bet-display">BET: <span id="bet">10</span></div>
                <button id="betUp">+10</button>
            </div>
            <button class="spin-btn" id="spinBtn">🎲 SPIN</button>
        </div>

        <div class="result" id="result"></div>
    </div>

    <button class="back-btn" onclick="location.href='../index.html'">← ゲーム一覧</button>

    <script>
        const symbols = ['🍒', '🍋', '🍇', '🍊', '⭐', '💎', '7️⃣'];
        const payouts = {
            '7️⃣': 50,   // Jackpot
            '💎': 20,
            '⭐': 10,
            '🍊': 5,
            '🍇': 3,
            '🍋': 2,
            '🍒': 1
        };

        let coins = 100;
        let bet = 10;
        let wins = 0;
        let spinning = false;

        const slot1 = document.getElementById('slot1');
        const slot2 = document.getElementById('slot2');
        const slot3 = document.getElementById('slot3');
        const spinBtn = document.getElementById('spinBtn');
        const betUp = document.getElementById('betUp');
        const betDown = document.getElementById('betDown');
        const result = document.getElementById('result');

        function getRandomSymbol() {
            return symbols[Math.floor(Math.random() * symbols.length)];
        }

        function spin(slot, duration, callback) {
            slot.classList.add('spinning');
            let spins = 0;
            const maxSpins = 20 + Math.floor(Math.random() * 10);
            const spinInterval = setInterval(() => {
                slot.textContent = getRandomSymbol();
                spins++;
                if (spins >= maxSpins) {
                    clearInterval(spinInterval);
                    slot.classList.remove('spinning');
                    if (callback) callback(slot.textContent);
                }
            }, duration);
        }

        function spinAll() {
            if (spinning || coins < bet) return;
            spinning = true;
            spinBtn.disabled = true;
            result.textContent = '';
            result.className = 'result';

            coins -= bet;
            updateStats();

            const results = [];
            const delays = [50, 70, 90];

            spin(slot1, delays[0], (r1) => {
                results[0] = r1;
                spin(slot2, delays[1], (r2) => {
                    results[1] = r2;
                    spin(slot3, delays[2], (r3) => {
                        results[2] = r3;
                        checkWin(results);
                        spinning = false;
                        spinBtn.disabled = false;
                    });
                });
            });
        }

        function checkWin(results) {
            const [s1, s2, s3] = results;

            // All three match
            if (s1 === s2 && s2 === s3) {
                const payout = payouts[s1] * bet;
                coins += payout;
                wins++;

                if (s1 === '7️⃣') {
                    result.textContent = `🎉 JACKPOT! +${payout} コイン!`;
                    result.className = 'result jackpot';
                    slot1.classList.add('winner');
                    slot2.classList.add('winner');
                    slot3.classList.add('winner');
                } else {
                    result.textContent = `🎊 ${s1} 揃い! +${payout} コイン!`;
                    result.className = 'result win';
                    slot1.classList.add('winner');
                    slot2.classList.add('winner');
                    slot3.classList.add('winner');
                }
            }
            // Two match
            else if (s1 === s2 || s2 === s3 || s1 === s3) {
                const payout = Math.floor(bet * 0.5);
                coins += payout;
                result.textContent = `👍 2つ揃い! +${payout} コイン`;
                result.className = 'result win';
            }
            // No match
            else {
                result.textContent = '😢 はずれ...';
                result.className = 'result lose';
            }

            setTimeout(() => {
                slot1.classList.remove('winner');
                slot2.classList.remove('winner');
                slot3.classList.remove('winner');
            }, 2000);

            updateStats();

            // Game over
            if (coins <= 0) {
                setTimeout(() => {
                    if (confirm('ゲームオーバー! リセットしますか？')) {
                        coins = 100;
                        bet = 10;
                        wins = 0;
                        updateStats();
                    }
                }, 500);
            }
        }

        function updateStats() {
            document.getElementById('coins').textContent = coins;
            document.getElementById('wins').textContent = wins;
            document.getElementById('bet').textContent = bet;
        }

        spinBtn.addEventListener('click', spinAll);

        betUp.addEventListener('click', () => {
            if (bet + 10 <= coins) {
                bet += 10;
                updateStats();
            }
        });

        betDown.addEventListener('click', () => {
            if (bet - 10 >= 10) {
                bet -= 10;
                updateStats();
            }
        });

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !spinning) {
                e.preventDefault();
                spinAll();
            }
        });
    </script>
</body>
</html>
