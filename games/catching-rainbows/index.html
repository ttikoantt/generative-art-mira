<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Catching Rainbows - ミラのゲームコレクション</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #game-canvas {
            flex: 1;
            width: 100%;
            height: 100%;
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .hud-item {
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1.2em;
            font-weight: bold;
            backdrop-filter: blur(10px);
        }

        .hud-item span {
            color: #00f5ff;
        }

        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #game-over.active {
            opacity: 1;
            pointer-events: auto;
        }

        #game-over h1 {
            font-size: 3em;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ff4081, #ff9800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #game-over p {
            font-size: 1.5em;
            margin-bottom: 30px;
        }

        #game-over button {
            background: linear-gradient(45deg, #00f5ff, #ff00ff);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 1.3em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0, 245, 255, 0.4);
        }

        #game-over button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 245, 255, 0.6);
        }

        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 101;
        }

        #start-screen h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-align: center;
        }

        #start-screen .rainbow {
            background: linear-gradient(45deg, #ff4081, #ff9800, #ffeb3b, #4caf50, #00bcd4, #9c27b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #start-screen p {
            font-size: 1.1em;
            margin-bottom: 10px;
            color: #ccc;
            text-align: center;
            max-width: 500px;
            padding: 0 20px;
        }

        #start-screen button {
            background: linear-gradient(45deg, #00f5ff, #ff00ff);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 1.3em;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0, 245, 255, 0.4);
        }

        #start-screen button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 245, 255, 0.6);
        }

        @media (max-width: 768px) {
            #game-over h1 {
                font-size: 2em;
            }

            #game-over p {
                font-size: 1.2em;
            }

            .hud-item {
                font-size: 1em;
                padding: 8px 15px;
            }

            #start-screen h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>

        <div class="hud">
            <div class="hud-item">スコア: <span id="score">0</span></div>
            <div class="hud-item">ライフ: <span id="lives">3</span></div>
        </div>

        <div id="game-over">
            <h1>🌈 Game Over</h1>
            <p>最終スコア: <span id="final-score">0</span></p>
            <button onclick="restartGame()">もう一度プレイ</button>
        </div>

        <div id="start-screen">
            <h1 class="rainbow">🌈 Catching Rainbows</h1>
            <p>空から落ちてくる色とりどりのボールをキャッチしよう！</p>
            <p>左右にスワイプしてバスケットを動かします</p>
            <p>色によって得点が異なります</p>
            <p>ボールを落とすとライフを失います</p>
            <button onclick="startGame()">ゲームスタート</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');
        const finalScoreElement = document.getElementById('final-score');
        const gameOverScreen = document.getElementById('game-over');
        const startScreen = document.getElementById('start-screen');

        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let balls = [];
        let player = {
            x: 0,
            y: 0,
            width: 100,
            height: 20
        };

        // ボールの色と得点
        const ballTypes = [
            { color: '#ff4081', points: 10, speed: 2 },   // ピンク
            { color: '#ff9800', points: 15, speed: 2.5 }, // オレンジ
            { color: '#ffeb3b', points: 20, speed: 3 },   // 黄色
            { color: '#4caf50', points: 25, speed: 3.5 }, // 緑
            { color: '#00bcd4', points: 30, speed: 4 },   // シアン
            { color: '#9c27b0', points: 50, speed: 5 }    // 紫（レア）
        ];

        // キャンバスサイズ設定
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            player.x = canvas.width / 2 - player.width / 2;
            player.y = canvas.height - player.height - 20;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ボール生成
        function spawnBall() {
            if (!gameRunning) return;

            const type = ballTypes[Math.floor(Math.random() * ballTypes.length)];
            const difficultyMultiplier = 1 + (score / 500); // スコアに応じて速度上昇

            balls.push({
                x: Math.random() * (canvas.width - 30) + 15,
                y: -20,
                radius: 15,
                ...type,
                speed: type.speed * difficultyMultiplier
            });

            // 次のボールを生成
            const spawnDelay = Math.max(500, 1500 - score); // スコアに応じて生成頻度上昇
            setTimeout(spawnBall, spawnDelay);
        }

        // プレイヤー移動
        let touchX = null;

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            touchX = e.touches[0].clientX;
        });

        canvas.addEventListener('touchstart', (e) => {
            touchX = e.touches[0].clientX;
        });

        canvas.addEventListener('touchend', () => {
            touchX = null;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (e.buttons === 1) {
                touchX = e.clientX;
            }
        });

        canvas.addEventListener('mouseup', () => {
            touchX = null;
        });

        // ゲーム更新
        function update() {
            if (!gameRunning) return;

            // プレイヤー移動
            if (touchX !== null) {
                const targetX = touchX - player.width / 2;
                player.x += (targetX - player.x) * 0.2;
            }

            // 境界チェック
            player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));

            // ボール更新
            balls.forEach((ball, index) => {
                ball.y += ball.speed;

                // キャッチ判定
                if (ball.y + ball.radius >= player.y &&
                    ball.y - ball.radius <= player.y + player.height &&
                    ball.x >= player.x &&
                    ball.x <= player.x + player.width) {

                    score += ball.points;
                    scoreElement.textContent = score;
                    balls.splice(index, 1);

                    // キャッチエフェクト
                    createCatchEffect(ball.x, ball.y, ball.color);
                    return;
                }

                // 落下判定
                if (ball.y - ball.radius > canvas.height) {
                    lives--;
                    livesElement.textContent = lives;
                    balls.splice(index, 1);

                    if (lives <= 0) {
                        endGame();
                    }
                }
            });
        }

        // キャッチエフェクト
        let effects = [];

        function createCatchEffect(x, y, color) {
            for (let i = 0; i < 10; i++) {
                effects.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1,
                    color: color
                });
            }
        }

        function updateEffects() {
            effects.forEach((effect, index) => {
                effect.x += effect.vx;
                effect.y += effect.vy;
                effect.life -= 0.05;

                if (effect.life <= 0) {
                    effects.splice(index, 1);
                }
            });
        }

        // 描画
        function draw() {
            // 背景
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a0a1a');
            gradient.addColorStop(1, '#1a1a2e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // ボール
            balls.forEach(ball => {
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);

                const ballGradient = ctx.createRadialGradient(
                    ball.x - ball.radius * 0.3, ball.y - ball.radius * 0.3, 0,
                    ball.x, ball.y, ball.radius
                );
                ballGradient.addColorStop(0, 'white');
                ballGradient.addColorStop(0.3, ball.color);
                ballGradient.addColorStop(1, ball.color);

                ctx.fillStyle = ballGradient;
                ctx.fill();

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 2;
                ctx.stroke();
            });

            // プレイヤー（バスケット）
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.fillRect(player.x, player.y, player.width, player.height);

            ctx.strokeStyle = '#00f5ff';
            ctx.lineWidth = 3;
            ctx.strokeRect(player.x, player.y, player.width, player.height);

            // キャッチエフェクト
            effects.forEach(effect => {
                ctx.beginPath();
                ctx.arc(effect.x, effect.y, 5 * effect.life, 0, Math.PI * 2);
                ctx.fillStyle = effect.color;
                ctx.globalAlpha = effect.life;
                ctx.fill();
                ctx.globalAlpha = 1;
            });
        }

        // ゲームループ
        function gameLoop() {
            if (!gameRunning) return;

            update();
            updateEffects();
            draw();

            requestAnimationFrame(gameLoop);
        }

        // ゲーム開始
        function startGame() {
            startScreen.style.display = 'none';
            gameOverScreen.classList.remove('active');

            score = 0;
            lives = 3;
            balls = [];
            effects = [];

            scoreElement.textContent = score;
            livesElement.textContent = lives;

            gameRunning = true;
            spawnBall();
            gameLoop();
        }

        // ゲーム終了
        function endGame() {
            gameRunning = false;
            finalScoreElement.textContent = score;
            gameOverScreen.classList.add('active');
        }

        // リスタート
        function restartGame() {
            startGame();
        }
    </script>
</body>
</html>
