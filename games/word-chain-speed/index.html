<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Word Chain Speed Challenge - しりとりスピード</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Hiragino Kaku Gothic Pro', 'Arial', sans-serif;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 2rem);
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px 20px;
            border-radius: 15px;
            text-align: center;
            flex: 1;
            min-width: 120px;
        }

        .info-label {
            font-size: 0.8rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .word-display {
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .current-word {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .last-char {
            font-size: 1rem;
            opacity: 0.8;
        }

        .last-char span {
            background: #ff6b6b;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .input-section {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            text-align: center;
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.5);
        }

        .timer-bar {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #00f260 0%, #0575e6 100%);
            transition: width 0.1s linear;
        }

        .timer-fill.warning {
            background: linear-gradient(90deg, #ff9966 0%, #ff5e62 100%);
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }

        .btn-start {
            background: linear-gradient(135deg, #00f260 0%, #0575e6 100%);
            color: white;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 242, 96, 0.4);
        }

        .message {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .message.success {
            background: rgba(0, 242, 96, 0.2);
            border: 2px solid #00f260;
        }

        .message.error {
            background: rgba(255, 94, 98, 0.2);
            border: 2px solid #ff5e62;
        }

        .message.info {
            background: rgba(255, 255, 255, 0.2);
        }

        .hidden {
            display: none;
        }

        .rules {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .rules h3 {
            margin-bottom: 10px;
        }

        .rules ul {
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔤 Word Chain Speed</h1>
        <p class="subtitle">しりとりスピードチャレンジ</p>

        <!-- Start Screen -->
        <div id="startScreen">
            <div class="rules">
                <h3>📖 ルール</h3>
                <ul>
                    <li>前の単語の最後の文字で始まる単語を入力</li>
                    <li>制限時間は単語ごとに5秒</li>
                    <li>連続正解でボーナスタイム</li>
                    <li>同じ単語は使えない</li>
                </ul>
            </div>
            <br>
            <button class="btn-start" onclick="startGame()">🚀 スタート</button>
        </div>

        <!-- Game Screen -->
        <div id="gameScreen" class="hidden">
            <div class="game-info">
                <div class="info-box">
                    <div class="info-label">スコア</div>
                    <div class="info-value" id="score">0</div>
                </div>
                <div class="info-box">
                    <div class="info-label">連続</div>
                    <div class="info-value" id="streak">0</div>
                </div>
            </div>

            <div class="timer-bar">
                <div class="timer-fill" id="timerFill"></div>
            </div>

            <div class="word-display">
                <div class="current-word" id="currentWord">りんご</div>
                <div class="last-char">次の文字: <span id="nextChar">ゴ</span></div>
            </div>

            <div class="input-section">
                <input type="text" id="wordInput" placeholder="単語を入力..." autocomplete="off">
            </div>

            <div id="messageBox"></div>
        </div>

        <!-- Result Screen -->
        <div id="resultScreen" class="hidden">
            <div style="text-align: center; padding: 20px;">
                <h2 style="font-size: 2rem; margin-bottom: 20px;">🏁 ゲームオーバー</h2>
                <div class="info-box" style="margin-bottom: 20px;">
                    <div class="info-label">最終スコア</div>
                    <div class="info-value" id="finalScore" style="font-size: 3rem;">0</div>
                </div>
                <div class="info-box" style="margin-bottom: 20px;">
                    <div class="info-label">最大連続</div>
                    <div class="info-value" id="maxStreak">0</div>
                </div>
                <button class="btn-start" onclick="startGame()">🔄 もう一度</button>
            </div>
        </div>
    </div>

    <script>
        // Game state
        let score = 0;
        let streak = 0;
        let maxStreak = 0;
        let currentWord = '';
        let usedWords = new Set();
        let timerInterval = null;
        let timeLeft = 5;
        const maxTime = 5;

        // DOM elements
        const startScreen = document.getElementById('startScreen');
        const gameScreen = document.getElementById('gameScreen');
        const resultScreen = document.getElementById('resultScreen');
        const currentWordEl = document.getElementById('currentWord');
        const nextCharEl = document.getElementById('nextChar');
        const scoreEl = document.getElementById('score');
        const streakEl = document.getElementById('streak');
        const timerFill = document.getElementById('timerFill');
        const wordInput = document.getElementById('wordInput');
        const messageBox = document.getElementById('messageBox');
        const finalScoreEl = document.getElementById('finalScore');
        const maxStreakEl = document.getElementById('maxStreak');

        // Word list (simplified - in production, use a proper dictionary)
        const wordList = [
            'あい', 'あお', 'あか', 'あき', 'あさ', 'あし', 'あた', 'あに', 'あね', 'あの',
            'いえ', 'いし', 'いす', 'いち', 'いぬ', 'いも', 'いり',
            'うえ', 'うし', 'うた', 'うみ', 'うら',
            'えき', 'えだ', 'えど', 'えほん',
            'おい', 'おか', 'おに', 'おふ', 'おや',
            'かい', 'かお', 'かき', 'かさ', 'かし', 'かぜ', 'かど',
            'き', 'きいろ', 'きく', 'きせつ', 'きって', 'きのこ',
            'くぎ', 'くさ', 'くすり', 'くつ', 'くも',
            'けいこ', 'けしき', 'けしごむ',
            'こ', 'こえ', 'こおり', 'こくばん', 'こころ', 'ご',
            'さいふ', 'さかな', 'さくら', 'さけ', 'さとう',
            'しいく', 'しお', 'しごと', 'しずく', 'した',
            'すいか', 'すき', 'すし', 'すな',
            'せいかつ', 'せき', 'せなか', 'せんせい',
            'そう', 'そと',
            'たいる', 'たいへん', 'たか', 'たこ', 'たすけ', 'たて', 'たぬき', 'たまご',
            'ちいさい', 'ちえ', 'ちから', 'ちず', 'ちち',
            'つき', 'つくえ', 'つくし', 'つめ',
            'て', 'てい', 'てがみ', 'てき', 'てつ',
            'てん', 'てんき', 'てんぷら',
            'と', 'といれ', 'とけい', 'ところ', 'とり',
            'なか', 'なつ', 'なまえ', 'なみ',
            'に', 'にく', 'にし', 'にち',
            'ぬ',
            'ね', 'ねこ', 'ねつ',
            'の', 'のう', 'のち', 'のり',
            'は', 'はい', 'はく', 'はこ', 'はし', 'はな', 'はる',
            'ひ', 'ひがし', 'ひと', 'ひまわり', 'ひゃく',
            'ふうせん', 'ふく', 'ふくろ', 'ふね',
            'へい', 'へや', 'へん',
            'ほう', 'ほし', 'ほん',
            'まいにち', 'まき', 'まち', 'まど',
            'み', 'みち', 'みみ', 'みらい',
            'むし',
            'め', 'めがね',
            'もうしこみ',
            'も', 'もり',
            'や', 'やま', 'やさい',
            'ゆ', 'ゆうびんきょく', 'ゆき', 'ゆめ',
            'よ', 'よい', 'よる',
            'らく', 'らくご',
            'りょう', 'りんご',
            'る', 'るす',
            'れい', 'れきし',
            'ろ', 'ろうそく',
            'わ', 'わかい', 'わに', 'わる'
        ];

        // Start game
        function startGame() {
            score = 0;
            streak = 0;
            maxStreak = 0;
            usedWords.clear();

            // Pick random starting word
            currentWord = wordList[Math.floor(Math.random() * wordList.length)];
            usedWords.add(currentWord);

            updateDisplay();
            startTimer();

            startScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');

            wordInput.value = '';
            wordInput.focus();
            messageBox.innerHTML = '';
        }

        // Update display
        function updateDisplay() {
            currentWordEl.textContent = currentWord;
            const lastChar = currentWord.slice(-1);
            nextCharEl.textContent = lastChar;

            scoreEl.textContent = score;
            streakEl.textContent = streak;
        }

        // Start timer
        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = maxTime;
            updateTimerBar();

            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                updateTimerBar();

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 100);
        }

        // Update timer bar
        function updateTimerBar() {
            const percentage = (timeLeft / maxTime) * 100;
            timerFill.style.width = percentage + '%';

            if (percentage < 30) {
                timerFill.classList.add('warning');
            } else {
                timerFill.classList.remove('warning');
            }
        }

        // Check word
        function checkWord(inputWord) {
            inputWord = inputWord.trim().toLowerCase();

            if (inputWord.length < 2) {
                showMessage('最低2文字以上', 'error');
                return false;
            }

            const lastChar = currentWord.slice(-1);
            const firstChar = inputWord.slice(0, 1);

            if (firstChar !== lastChar) {
                showMessage(`「${lastChar}」で始まる単語が必要です`, 'error');
                return false;
            }

            if (usedWords.has(inputWord)) {
                showMessage('この単語は既に使われています', 'error');
                return false;
            }

            // Success!
            usedWords.add(inputWord);
            currentWord = inputWord;
            streak++;
            if (streak > maxStreak) maxStreak = streak;

            // Score calculation
            const baseScore = 10;
            const streakBonus = Math.floor(streak / 3) * 5;
            const timeBonus = Math.floor(timeLeft * 2);
            score += baseScore + streakBonus + timeBonus;

            showMessage(`+${baseScore + streakBonus + timeBonus}点!`, 'success');

            // Reset timer
            timeLeft = maxTime;
            updateTimerBar();

            updateDisplay();
            wordInput.value = '';

            return true;
        }

        // Show message
        function showMessage(text, type) {
            messageBox.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => {
                if (messageBox.innerHTML.includes(text)) {
                    messageBox.innerHTML = '';
                }
            }, 2000);
        }

        // End game
        function endGame() {
            clearInterval(timerInterval);

            finalScoreEl.textContent = score;
            maxStreakEl.textContent = maxStreak;

            gameScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
        }

        // Input handling
        wordInput.addEventListener('input', (e) => {
            const word = e.target.value;
            const lastChar = currentWord.slice(-1);

            if (word.slice(0, 1) !== lastChar) {
                wordInput.style.borderColor = '#ff5e62';
            } else {
                wordInput.style.borderColor = '#00f260';
            }
        });

        wordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const inputWord = wordInput.value;
                if (inputWord) {
                    if (checkWord(inputWord)) {
                        // Word accepted
                    }
                }
            }
        });
    </script>
</body>
</html>
