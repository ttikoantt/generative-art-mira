<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Reaction Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: clamp(24px, 5vw, 36px);
            margin-bottom: 10px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 30px;
        }

        .game-area {
            width: 100%;
            aspect-ratio: 1;
            max-width: 400px;
            margin: 0 auto 30px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(18px, 4vw, 24px);
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .game-area.waiting {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }

        .game-area.ready {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            animation: pulse 0.5s ease-in-out infinite;
        }

        .game-area.too-early {
            background: linear-gradient(135deg, #f39c12 0%, #d68910 100%);
        }

        .game-area.result {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
        }

        .game-area.start {
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .game-area:active {
            transform: scale(0.98);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px 10px;
            backdrop-filter: blur(10px);
        }

        .stat-box .label {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-box .value {
            font-size: clamp(20px, 4vw, 28px);
            font-weight: 700;
            color: #667eea;
        }

        .stat-box .unit {
            font-size: 12px;
            opacity: 0.7;
        }

        .history {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-family: monospace;
        }

        .history-item.best {
            background: linear-gradient(135deg, #f39c12 0%, #d68910 100%);
            font-weight: 700;
        }

        .history-item.worst {
            background: rgba(231, 76, 60, 0.3);
        }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .ranking {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ranking h3 {
            font-size: 14px;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .ranking-tier {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            margin: 3px;
        }

        .tier-s { background: linear-gradient(135deg, #f39c12 0%, #d68910 100%); }
        .tier-a { background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); }
        .tier-b { background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%); }
        .tier-c { background: linear-gradient(135deg, #3498db 0%, #2980b9 100%); }
        .tier-d { background: rgba(255, 255, 255, 0.2); }

        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }

            .game-area {
                margin-bottom: 20px;
            }

            .stats {
                gap: 10px;
            }

            .buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>⚡ Reaction Challenge</h1>
        <p class="subtitle">画面が緑色になったらタップ！</p>

        <div class="game-area start" id="gameArea">
            <span id="gameText">タップして開始</span>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="label">平均</div>
                <div class="value" id="avgTime">--</div>
                <div class="unit">ms</div>
            </div>
            <div class="stat-box">
                <div class="label">最速</div>
                <div class="value" id="bestTime">--</div>
                <div class="unit">ms</div>
            </div>
            <div class="stat-box">
                <div class="label">試行</div>
                <div class="value" id="attemptCount">0</div>
                <div class="unit">/ 5</div>
            </div>
        </div>

        <div class="history" id="history"></div>

        <div class="ranking" id="ranking" style="display: none;">
            <h3>🏆 ランク評価</h3>
            <div></div>
        </div>

        <div class="buttons">
            <button class="btn btn-primary" onclick="resetGame()">リセット</button>
        </div>
    </div>

    <script>
        const gameArea = document.getElementById('gameArea');
        const gameText = document.getElementById('gameText');
        const avgTimeEl = document.getElementById('avgTime');
        const bestTimeEl = document.getElementById('bestTime');
        const attemptCountEl = document.getElementById('attemptCount');
        const historyEl = document.getElementById('history');
        const rankingEl = document.getElementById('ranking');

        let gameState = 'start'; // start, waiting, ready, tooEarly, result
        let startTime = 0;
        let timeoutId = null;
        let reactionTimes = [];
        const maxAttempts = 5;

        // タッチ/クリックイベント
        gameArea.addEventListener('click', handleInput);
        gameArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInput();
        }, { passive: false });

        function handleInput() {
            switch (gameState) {
                case 'start':
                    startGame();
                    break;
                case 'waiting':
                    tooEarly();
                    break;
                case 'ready':
                    recordReaction();
                    break;
                case 'tooEarly':
                case 'result':
                    nextRound();
                    break;
            }
        }

        function startGame() {
            reactionTimes = [];
            updateStats();
            historyEl.innerHTML = '';
            rankingEl.style.display = 'none';
            nextRound();
        }

        function nextRound() {
            if (reactionTimes.length >= maxAttempts) {
                showFinalResult();
                return;
            }

            gameState = 'waiting';
            gameArea.className = 'game-area waiting';
            gameText.textContent = '待機...';

            // 2-5秒のランダムな待機時間
            const waitTime = 2000 + Math.random() * 3000;

            timeoutId = setTimeout(() => {
                gameState = 'ready';
                gameArea.className = 'game-area ready';
                gameText.textContent = 'タップ！';
                startTime = performance.now();
            }, waitTime);
        }

        function tooEarly() {
            clearTimeout(timeoutId);
            gameState = 'tooEarly';
            gameArea.className = 'game-area too-early';
            gameText.textContent = '早すぎ！\nタップで再試行';
        }

        function recordReaction() {
            const reactionTime = Math.round(performance.now() - startTime);
            reactionTimes.push(reactionTime);

            gameState = 'result';
            gameArea.className = 'game-area result';
            gameText.textContent = `${reactionTime}ms\n次へ`;

            updateStats();
            updateHistory();
        }

        function updateStats() {
            if (reactionTimes.length === 0) {
                avgTimeEl.textContent = '--';
                bestTimeEl.textContent = '--';
                attemptCountEl.textContent = '0';
                return;
            }

            const avg = Math.round(reactionTimes.reduce((a, b) => a + b, 0) / reactionTimes.length);
            const best = Math.min(...reactionTimes);

            avgTimeEl.textContent = avg;
            bestTimeEl.textContent = best;
            attemptCountEl.textContent = reactionTimes.length;
        }

        function updateHistory() {
            historyEl.innerHTML = reactionTimes.map((time, index) => {
                const isFirst = index === 0;
                const isBest = time === Math.min(...reactionTimes);
                const isWorst = time === Math.max(...reactionTimes);
                let classes = 'history-item';
                if (isBest) classes += ' best';
                else if (isWorst) classes += ' worst';
                return `<span class="${classes}">${index + 1}. ${time}ms</span>`;
            }).join('');
        }

        function showFinalResult() {
            gameState = 'start';
            gameArea.className = 'game-area start';
            gameText.textContent = 'もう一度プレイ';

            const avg = Math.round(reactionTimes.reduce((a, b) => a + b, 0) / reactionTimes.length);
            const best = Math.min(...reactionTimes);

            // ランク評価
            let tier, tierName, tierClass;
            if (best < 180) {
                tier = 'S';
                tierName = '神業';
                tierClass = 'tier-s';
            } else if (best < 220) {
                tier = 'A';
                tierName = '超人的';
                tierClass = 'tier-a';
            } else if (best < 260) {
                tier = 'B';
                tierName = '优秀';
                tierClass = 'tier-b';
            } else if (best < 300) {
                tier = 'C';
                tierName = '普通';
                tierClass = 'tier-c';
            } else {
                tier = 'D';
                tierName = 'もう一度';
                tierClass = 'tier-d';
            }

            rankingEl.style.display = 'block';
            rankingEl.querySelector('div').innerHTML = `
                <span class="ranking-tier ${tierClass}">${tier} ${tierName}</span>
            `;
        }

        function resetGame() {
            clearTimeout(timeoutId);
            reactionTimes = [];
            gameState = 'start';
            gameArea.className = 'game-area start';
            gameText.textContent = 'タップして開始';
            updateStats();
            historyEl.innerHTML = '';
            rankingEl.style.display = 'none';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // キーボード対応（Spaceキー）
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleInput();
            }
        });
    </script>
</body>
</html>
