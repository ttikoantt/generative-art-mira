<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake 3D - 立体スネークゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .game-container {
            position: relative;
            width: 90vmin;
            height: 90vmin;
            max-width: 600px;
            max-height: 600px;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
        }

        .info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 14px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .score {
            position: absolute;
            top: 10px;
            right: 10px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .controls {
            position: absolute;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0.95);
        }

        .control-btn:nth-child(2) {
            grid-column: 2;
            grid-row: 1;
        }

        .control-btn:nth-child(3) {
            grid-column: 1;
            grid-row: 2;
        }

        .control-btn:nth-child(4) {
            grid-column: 3;
            grid-row: 2;
        }

        .control-btn:nth-child(5) {
            grid-column: 2;
            grid-row: 3;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            display: none;
        }

        .game-over h2 {
            color: #ff6b6b;
            margin-bottom: 15px;
            font-size: 28px;
        }

        .game-over p {
            color: white;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .game-over button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .game-over button:hover {
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .controls {
                bottom: -70px;
                grid-template-columns: repeat(3, 50px);
                grid-template-rows: repeat(3, 50px);
            }

            .control-btn {
                font-size: 20px;
            }

            .info {
                font-size: 12px;
            }

            .score {
                font-size: 20px;
            }
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <canvas id="gameCanvas"></canvas>

        <div class="info">
            <div>🐍 Snake 3D</div>
            <div>矢印キーまたはボタンで操作</div>
        </div>

        <div class="score" id="score">Score: 0</div>

        <div class="controls">
            <button class="control-btn" onclick="changeDirection(0, -1)">↑</button>
            <button class="control-btn" onclick="changeDirection(-1, 0)">←</button>
            <button class="control-btn" onclick="changeDirection(1, 0)">→</button>
            <button class="control-btn" onclick="changeDirection(0, 1)">↓</button>
        </div>

        <div class="game-over" id="gameOver">
            <h2>Game Over!</h2>
            <p>Score: <span id="finalScore">0</span></p>
            <button onclick="restartGame()">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let gridSize = 20;
        let tileCount;

        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let gameRunning = true;
        let gameSpeed = 100;
        let rotation = 0;

        const colors = [
            { primary: '#ff6b6b', secondary: '#ee5a24' },
            { primary: '#feca57', secondary: '#ff9f43' },
            { primary: '#48dbfb', secondary: '#0abde3' },
            { primary: '#ff9ff3', secondary: '#f368e0' },
            { primary: '#54a0ff', secondary: '#2e86de' },
            { primary: '#5f27cd', secondary: '#341f97' },
            { primary: '#00d2d3', secondary: '#01a3a4' }
        ];

        let currentColor = colors[0];

        function resize() {
            const container = document.querySelector('.game-container');
            const rect = container.getBoundingClientRect();

            canvas.width = rect.width;
            canvas.height = rect.height;

            width = canvas.width;
            height = canvas.height;

            tileCount = Math.floor(Math.min(width, height) / gridSize);
        }

        function init() {
            snake = [
                { x: Math.floor(tileCount / 2), y: Math.floor(tileCount / 2) },
                { x: Math.floor(tileCount / 2) - 1, y: Math.floor(tileCount / 2) },
                { x: Math.floor(tileCount / 2) - 2, y: Math.floor(tileCount / 2) }
            ];

            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameRunning = true;
            currentColor = colors[Math.floor(Math.random() * colors.length)];

            document.getElementById('score').textContent = `Score: ${score}`;
            document.getElementById('gameOver').style.display = 'none';

            placeFood();
        }

        function placeFood() {
            let valid = false;
            while (!valid) {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };

                valid = !snake.some(segment => segment.x === food.x && segment.y === food.y);
            }
        }

        function changeDirection(dx, dy) {
            if (!gameRunning) return;

            // 逆方向を防止
            if (direction.x === -dx && direction.y === -dy) return;
            if (direction.x === dx && direction.y === dy) return;

            nextDirection = { x: dx, y: dy };
        }

        function update() {
            if (!gameRunning) return;

            direction = { ...nextDirection };

            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // 壁に衝突
            if (head.x < 0 || head.x >= tileCount ||
                head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // 自分に衝突
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 食べた
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = `Score: ${score}`;
                placeFood();

                // 色を変更
                if (score % 30 === 0) {
                    currentColor = colors[Math.floor(Math.random() * colors.length)];
                }
            } else {
                snake.pop();
            }

            // 回転アニメーション
            rotation += 0.02;
        }

        function draw() {
            // 背景
            ctx.fillStyle = 'rgba(12, 12, 12, 0.3)';
            ctx.fillRect(0, 0, width, height);

            const offsetX = (width - tileCount * gridSize) / 2;
            const offsetY = (height - tileCount * gridSize) / 2;

            // グリッド
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;

            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(offsetX + i * gridSize, offsetY);
                ctx.lineTo(offsetX + i * gridSize, offsetY + tileCount * gridSize);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(offsetX, offsetY + i * gridSize);
                ctx.lineTo(offsetX + tileCount * gridSize, offsetY + i * gridSize);
                ctx.stroke();
            }

            // 食べ物（3D効果）
            const foodX = offsetX + food.x * gridSize + gridSize / 2;
            const foodY = offsetY + food.y * gridSize + gridSize / 2;

            // 影
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.beginPath();
            ctx.ellipse(foodX + 3, foodY + 3, gridSize / 2 - 2, gridSize / 2 - 2, 0, 0, Math.PI * 2);
            ctx.fill();

            // 本体
            const foodGradient = ctx.createRadialGradient(
                foodX - 3, foodY - 3, 0,
                foodX, foodY, gridSize / 2
            );
            foodGradient.addColorStop(0, '#ff6b6b');
            foodGradient.addColorStop(1, '#ee5a24');

            ctx.fillStyle = foodGradient;
            ctx.beginPath();
            ctx.arc(foodX, foodY, gridSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();

            // ハイライト
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.beginPath();
            ctx.arc(foodX - 3, foodY - 3, gridSize / 6, 0, Math.PI * 2);
            ctx.fill();

            // スネーク（3D効果）
            snake.forEach((segment, index) => {
                const x = offsetX + segment.x * gridSize + gridSize / 2;
                const y = offsetY + segment.y * gridSize + gridSize / 2;

                // 影
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.beginPath();
                ctx.ellipse(x + 2, y + 2, gridSize / 2 - 3, gridSize / 2 - 3, 0, 0, Math.PI * 2);
                ctx.fill();

                // 本体
                const size = gridSize / 2 - 2;
                const gradient = ctx.createRadialGradient(
                    x - size / 3, y - size / 3, 0,
                    x, y, size
                );

                if (index === 0) {
                    // 頭
                    gradient.addColorStop(0, currentColor.primary);
                    gradient.addColorStop(1, currentColor.secondary);
                } else {
                    // 体（徐々に薄く）
                    const alpha = 1 - (index / snake.length) * 0.5;
                    gradient.addColorStop(0, `${currentColor.primary}${Math.floor(alpha * 255).toString(16).padStart(2, '0')}`);
                    gradient.addColorStop(1, `${currentColor.secondary}${Math.floor(alpha * 255).toString(16).padStart(2, '0')}`);
                }

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();

                // ハイライト
                if (index === 0) {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                    ctx.beginPath();
                    ctx.arc(x - size / 3, y - size / 3, size / 4, 0, Math.PI * 2);
                    ctx.fill();

                    // 目
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(x - 3, y - 2, 3, 0, Math.PI * 2);
                    ctx.arc(x + 3, y - 2, 3, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = 'black';
                    ctx.beginPath();
                    ctx.arc(x - 3 + direction.x * 1, y - 2 + direction.y * 1, 1.5, 0, Math.PI * 2);
                    ctx.arc(x + 3 + direction.x * 1, y - 2 + direction.y * 1, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }

        function restartGame() {
            init();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // キーボード
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    changeDirection(0, -1);
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    changeDirection(0, 1);
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    changeDirection(-1, 0);
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    changeDirection(1, 0);
                    break;
            }
        });

        // スワイプ
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30) changeDirection(1, 0);
                else if (dx < -30) changeDirection(-1, 0);
            } else {
                if (dy > 30) changeDirection(0, 1);
                else if (dy < -30) changeDirection(0, -1);
            }
        });

        function gameLoop() {
            update();
            draw();
            setTimeout(() => requestAnimationFrame(gameLoop), gameSpeed);
        }

        window.addEventListener('resize', resize);
        resize();
        init();
        gameLoop();
    </script>
</body>
</html>
