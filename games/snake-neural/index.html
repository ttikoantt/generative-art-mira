<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake 2.0 - Neural Network</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
        }
        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        h1 {
            font-size: clamp(24px, 5vw, 48px);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(100, 255, 150, 0.5);
            text-align: center;
        }
        .subtitle {
            color: #a0a0a0;
            font-size: clamp(12px, 2vw, 16px);
            margin-bottom: 20px;
            text-align: center;
        }
        #canvas {
            border: 3px solid rgba(100, 255, 150, 0.4);
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(100, 255, 150, 0.3);
            max-width: 100%;
            max-height: 55vh;
        }
        .stats {
            margin-top: 20px;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .stat {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            text-align: center;
        }
        .stat-label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #64ff96;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            background: linear-gradient(135deg, #64ff96 0%, #4ade80 100%);
            color: #1a1a2e;
            border: none;
            padding: 12px 28px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(100, 255, 150, 0.4);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(100, 255, 150, 0.6);
        }
        .mode-selector {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .mode-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 20px;
        }
        .mode-btn.active {
            background: linear-gradient(135deg, #64ff96 0%, #4ade80 100%);
            color: #1a1a2e;
        }
        .info {
            margin-top: 15px;
            color: #888;
            font-size: 12px;
            text-align: center;
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Snake 2.0 - Neural Network</h1>
        <p class="subtitle">AIと協力するか、対戦するニューラルヘビ</p>
        <canvas id="canvas"></canvas>
        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">AIの学習</div>
                <div class="stat-value" id="ai-level">Lv.1</div>
            </div>
            <div class="stat">
                <div class="stat-label">最高記録</div>
                <div class="stat-value" id="high-score">0</div>
            </div>
        </div>
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="player">🎮 プレイヤー</button>
            <button class="mode-btn" data-mode="ai">🤖 AIのみ</button>
            <button class="mode-btn" data-mode="battle">⚔️ 対戦</button>
        </div>
        <div class="controls">
            <button id="startBtn">▶ スタート</button>
            <button id="pauseBtn">⏸ 一時停止</button>
            <button id="resetBtn">🔄 リセット</button>
        </div>
        <div class="info">
            矢印キーまたはスワイプで操作 • AIが学習して進化します
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const scoreEl = document.getElementById('score');
        const aiLevelEl = document.getElementById('ai-level');
        const highScoreEl = document.getElementById('high-score');
        const modeBtns = document.querySelectorAll('.mode-btn');

        // セットアップ
        const GRID_SIZE = 20;
        const CELL_SIZE = 20;
        canvas.width = GRID_SIZE * CELL_SIZE;
        canvas.height = GRID_SIZE * CELL_SIZE;

        // ゲーム状態
        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = 0;
        let isRunning = false;
        let isPaused = false;
        let gameMode = 'player';
        let aiLevel = 1;
        let aiSnake = [];
        let aiDirection = { x: 1, y: 0 };
        let aiScore = 0;

        // 簡易ニューラルネットワーク
        class NeuralNetwork {
            constructor() {
                this.weights = {
                    input: Array(24).fill(0).map(() => Math.random() * 2 - 1),
                    output: Array(4).fill(0).map(() => Math.random() * 2 - 1)
                };
                this.learningRate = 0.3;
            }

            predict(inputs) {
                // 簡易的な計算
                let outputs = [0, 0, 0, 0];
                const directions = [
                    { x: 0, y: -1 }, // 上
                    { x: 0, y: 1 },  // 下
                    { x: -1, y: 0 }, // 左
                    { x: 1, y: 0 }   // 右
                ];

                for (let i = 0; i < 4; i++) {
                    const dir = directions[i];
                    let score = 0;

                    // 食べ物への距離
                    const foodDistX = food.x - snake[0].x;
                    const foodDistY = food.y - snake[0].y;
                    const dotProduct = dir.x * foodDistX + dir.y * foodDistY;
                    score += dotProduct * this.weights.input[i];

                    // 壁との距離
                    const nextX = snake[0].x + dir.x;
                    const nextY = snake[0].y + dir.y;
                    if (nextX < 0 || nextX >= GRID_SIZE || nextY < 0 || nextY >= GRID_SIZE) {
                        score -= 10 * this.weights.input[i + 4];
                    }

                    // 体との衝突
                    for (let seg of snake) {
                        if (nextX === seg.x && nextY === seg.y) {
                            score -= 8 * this.weights.input[i + 8];
                        }
                    }

                    outputs[i] = score;
                }

                return outputs;
            }

            train(inputs, reward) {
                // 報酬に基づいて重みを更新
                for (let i = 0; i < 4; i++) {
                    this.weights.input[i] += reward * this.learningRate * (Math.random() - 0.5);
                    this.weights.input[i] = Math.max(-1, Math.min(1, this.weights.input[i]));
                }
            }
        }

        let nn = new NeuralNetwork();

        function init() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            updateScore();
            spawnFood();
            draw();
        }

        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE)
                };
            } while (snake.some(seg => seg.x === food.x && seg.y === food.y));
        }

        function update() {
            if (!isRunning || isPaused) return;

            // AIの意思決定
            if (gameMode === 'ai' || gameMode === 'battle') {
                const inputs = getInputs();
                const outputs = nn.predict(inputs);
                const bestMove = outputs.indexOf(Math.max(...outputs));

                const directions = [
                    { x: 0, y: -1 },
                    { x: 0, y: 1 },
                    { x: -1, y: 0 },
                    { x: 1, y: 0 }
                ];

                if (gameMode === 'ai') {
                    direction = directions[bestMove];
                } else {
                    aiDirection = directions[bestMove];
                }
            }

            // 移動
            direction = nextDirection;
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // 衝突判定
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE ||
                snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 食べ物を食べた
            if (head.x === food.x && head.y === food.y) {
                score += 10 * aiLevel;
                updateScore();
                spawnFood();
                nn.train(null, 1); // 報酬
            } else {
                snake.pop();
            }

            draw();
            setTimeout(update, 150 - aiLevel * 10);
        }

        function getInputs() {
            // 簡易的な入力（実際にはもっと複雑にできる）
            return [
                snake[0].x, snake[0].y,
                food.x, food.y
            ];
        }

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // グリッド
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }

            // 食べ物
            const gradient = ctx.createRadialGradient(
                food.x * CELL_SIZE + CELL_SIZE / 2,
                food.y * CELL_SIZE + CELL_SIZE / 2,
                0,
                food.x * CELL_SIZE + CELL_SIZE / 2,
                food.y * CELL_SIZE + CELL_SIZE / 2,
                CELL_SIZE
            );
            gradient.addColorStop(0, '#ff6b6b');
            gradient.addColorStop(1, '#ee5a5a');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(
                food.x * CELL_SIZE + CELL_SIZE / 2,
                food.y * CELL_SIZE + CELL_SIZE / 2,
                CELL_SIZE / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();

            // ヘビ
            snake.forEach((seg, i) => {
                const hue = 120 + i * 2;
                const lightness = 50 + (snake.length - i) * 2;
                ctx.fillStyle = `hsl(${hue}, 70%, ${lightness}%)`;

                if (i === 0) {
                    // 頭
                    ctx.beginPath();
                    ctx.arc(
                        seg.x * CELL_SIZE + CELL_SIZE / 2,
                        seg.y * CELL_SIZE + CELL_SIZE / 2,
                        CELL_SIZE / 2 - 1,
                        0,
                        Math.PI * 2
                    );
                    ctx.fill();

                    // 目
                    ctx.fillStyle = '#1a1a2e';
                    ctx.beginPath();
                    ctx.arc(
                        seg.x * CELL_SIZE + CELL_SIZE / 2 - 4,
                        seg.y * CELL_SIZE + CELL_SIZE / 2 - 2,
                        2,
                        0,
                        Math.PI * 2
                    );
                    ctx.arc(
                        seg.x * CELL_SIZE + CELL_SIZE / 2 + 4,
                        seg.y * CELL_SIZE + CELL_SIZE / 2 - 2,
                        2,
                        0,
                        Math.PI * 2
                    );
                    ctx.fill();
                } else {
                    // 体
                    ctx.fillRect(
                        seg.x * CELL_SIZE + 1,
                        seg.y * CELL_SIZE + 1,
                        CELL_SIZE - 2,
                        CELL_SIZE - 2
                    );
                }
            });
        }

        function updateScore() {
            scoreEl.textContent = score;
            aiLevelEl.textContent = 'Lv.' + aiLevel;
            if (score > highScore) {
                highScore = score;
                highScoreEl.textContent = highScore;
            }
        }

        function gameOver() {
            isRunning = false;
            startBtn.textContent = '▶ スタート';

            // AI学習
            if (score > 100) {
                aiLevel = Math.min(aiLevel + 1, 10);
            } else {
                nn.train(null, -0.5); // 惩罰
            }

            alert(`ゲームオーバー！\nスコア: ${score}\nAIレベル: ${aiLevel}`);
        }

        function start() {
            if (isRunning) return;
            isRunning = true;
            isPaused = false;
            startBtn.textContent = '✓ 実行中';
            update();
        }

        function pause() {
            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? '▶ 再開' : '⏸ 一時停止';
        }

        function reset() {
            isRunning = false;
            isPaused = false;
            startBtn.textContent = '▶ スタート';
            pauseBtn.textContent = '⏸ 一時停止';
            if (score > highScore) {
                highScore = score;
                highScoreEl.textContent = highScore;
            }
            init();
        }

        function setMode(mode) {
            gameMode = mode;
            modeBtns.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });
            reset();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (gameMode === 'ai') return;

            switch (e.key) {
                case 'ArrowUp':
                    if (direction.y === 0) nextDirection = { x: 0, y: -1 };
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    if (direction.y === 0) nextDirection = { x: 0, y: 1 };
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    if (direction.x === 0) nextDirection = { x: -1, y: 0 };
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    if (direction.x === 0) nextDirection = { x: 1, y: 0 };
                    e.preventDefault();
                    break;
                case ' ':
                    if (isRunning) pause();
                    else start();
                    e.preventDefault();
                    break;
            }
        });

        // タッチ操作
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            e.preventDefault();
        });

        canvas.addEventListener('touchend', (e) => {
            if (gameMode === 'ai') return;

            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30 && direction.x === 0) nextDirection = { x: 1, y: 0 };
                else if (dx < -30 && direction.x === 0) nextDirection = { x: -1, y: 0 };
            } else {
                if (dy > 30 && direction.y === 0) nextDirection = { x: 0, y: 1 };
                else if (dy < -30 && direction.y === 0) nextDirection = { x: 0, y: -1 };
            }
            e.preventDefault();
        });

        // イベントリスナー
        startBtn.addEventListener('click', start);
        pauseBtn.addEventListener('click', pause);
        resetBtn.addEventListener('click', reset);
        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => setMode(btn.dataset.mode));
        });

        // 初期化
        init();
    </script>
</body>
</html>
