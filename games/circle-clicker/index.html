<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle Clicker - 円クリッカー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            text-align: center;
            color: #fff;
            padding: 20px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #00d4ff, #7b2dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #888;
            margin-bottom: 15px;
            font-size: 0.85rem;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat {
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 15px;
            padding: 15px 20px;
            min-width: 100px;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #00d4ff;
        }

        .combo {
            color: #ffaa00;
        }

        #gameArea {
            position: relative;
            width: 100%;
            height: 400px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 20px;
            margin: 20px auto;
            overflow: hidden;
            touch-action: none;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .circle:active {
            transform: scale(0.9);
        }

        .circle.clicked {
            animation: explode 0.3s ease-out forwards;
        }

        @keyframes explode {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        .score-popup {
            position: absolute;
            font-size: 1.5rem;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-50px);
                opacity: 0;
            }
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 28px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: linear-gradient(135deg, #00d4ff, #7b2dff);
            color: #fff;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            font-size: 0.85rem;
            z-index: 1000;
        }

        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .game-over.show {
            display: flex;
        }

        .game-over h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #ff4444;
        }

        .final-score {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        .final-score span {
            color: #00d4ff;
            font-size: 2.5rem;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.4rem;
            }

            .stat {
                padding: 10px 15px;
                min-width: 80px;
            }

            .stat-value {
                font-size: 1.4rem;
            }

            #gameArea {
                height: 350px;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <h1>🎯 Circle Clicker</h1>
        <p class="subtitle">円が消える前にクリック！</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">コンボ</div>
                <div class="stat-value combo" id="combo">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">最高</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>

        <div id="gameArea"></div>

        <div class="controls">
            <button id="startBtn" onclick="startGame()">スタート</button>
            <button id="pauseBtn" onclick="togglePause()" disabled>一時停止</button>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>ゲームオーバー！</h2>
        <div class="final-score">
            スコア: <span id="finalScore">0</span>
        </div>
        <button onclick="restartGame()">もう一度</button>
    </div>

    <script>
        const gameArea = document.getElementById('gameArea');
        const scoreDisplay = document.getElementById('score');
        const comboDisplay = document.getElementById('combo');
        const highScoreDisplay = document.getElementById('highScore');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreDisplay = document.getElementById('finalScore');

        let score = 0;
        let combo = 0;
        let highScore = parseInt(localStorage.getItem('circleClickerHighScore')) || 0;
        let isPlaying = false;
        let isPaused = false;
        let circles = [];
        let gameLoop = null;
        let spawnLoop = null;
        let speed = 1;

        highScoreDisplay.textContent = highScore;

        const colors = [
            'linear-gradient(135deg, #00d4ff, #0099cc)',
            'linear-gradient(135deg, #7b2dff, #5500cc)',
            'linear-gradient(135deg, #ff2d92, #cc0066)',
            'linear-gradient(135deg, #00ff88, #00cc66)',
            'linear-gradient(135deg, #ffff00, #cccc00)',
            'linear-gradient(135deg, #ff8800, #cc6600)',
            'linear-gradient(135deg, #00ffff, #00cccc)',
            'linear-gradient(135deg, #ff00ff, #cc00cc)'
        ];

        function createCircle() {
            if (!isPlaying || isPaused) return;

            const circle = document.createElement('div');
            circle.className = 'circle';

            const size = 60 + Math.random() * 50;
            const maxX = gameArea.clientWidth - size;
            const maxY = gameArea.clientHeight - size;
            const x = Math.random() * maxX;
            const y = Math.random() * maxY;

            circle.style.width = size + 'px';
            circle.style.height = size + 'px';
            circle.style.left = x + 'px';
            circle.style.top = y + 'px';
            circle.style.background = colors[Math.floor(Math.random() * colors.length)];
            circle.style.boxShadow = `0 0 ${size / 3}px rgba(0, 212, 255, 0.5)`;

            const shrinkTime = 2000 + Math.random() * 2000;
            circle.dataset.maxSize = size;
            circle.dataset.shrinkTime = shrinkTime;
            circle.dataset.created = Date.now();

            // クリックイベント
            const clickHandler = (e) => {
                e.preventDefault();
                if (!isPlaying || isPaused) return;

                const elapsed = Date.now() - parseFloat(circle.dataset.created);
                const remaining = 1 - (elapsed / parseFloat(circle.dataset.shrinkTime));
                const points = Math.round(10 * remaining * (1 + combo * 0.1));

                score += points;
                combo++;
                updateScore();

                // スコアポップアップ
                showScorePopup(e.clientX || e.touches[0].clientX, e.clientY || e.touches[0].clientY, points);

                // クリックエフェクト
                circle.classList.add('clicked');
                setTimeout(() => circle.remove(), 300);

                circles = circles.filter(c => c !== circle);

                // 難易度上昇
                if (combo % 5 === 0) {
                    speed += 0.1;
                }
            };

            circle.addEventListener('mousedown', clickHandler);
            circle.addEventListener('touchstart', clickHandler);

            gameArea.appendChild(circle);
            circles.push(circle);

            // サイズ減少
            const shrinkInterval = setInterval(() => {
                if (!isPlaying || isPaused) {
                    clearInterval(shrinkInterval);
                    return;
                }

                const elapsed = Date.now() - parseFloat(circle.dataset.created);
                const progress = elapsed / parseFloat(circle.dataset.shrinkTime);

                if (progress >= 1) {
                    // 時間切れ
                    clearInterval(shrinkInterval);
                    circle.remove();
                    circles = circles.filter(c => c !== circle);
                    combo = 0;
                    updateScore();

                    // ゲームオーバー判定
                    if (circles.length === 0 && isPlaying) {
                        endGame();
                    }
                } else {
                    const currentSize = parseFloat(circle.dataset.maxSize) * (1 - progress);
                    circle.style.width = currentSize + 'px';
                    circle.style.height = currentSize + 'px';
                }
            }, 16);
        }

        function showScorePopup(x, y, points) {
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.textContent = '+' + points;
            popup.style.left = x + 'px';
            popup.style.top = y + 'px';
            popup.style.color = points >= 15 ? '#00ff88' : points >= 10 ? '#ffff00' : '#ffffff';
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 800);
        }

        function updateScore() {
            scoreDisplay.textContent = score;
            comboDisplay.textContent = combo;

            if (score > highScore) {
                highScore = score;
                highScoreDisplay.textContent = highScore;
                localStorage.setItem('circleClickerHighScore', highScore);
            }
        }

        function startGame() {
            score = 0;
            combo = 0;
            speed = 1;
            isPlaying = true;
            isPaused = false;
            circles.forEach(c => c.remove());
            circles = [];
            updateScore();

            startBtn.disabled = true;
            pauseBtn.disabled = false;
            gameOverScreen.classList.remove('show');

            // 円生成
            spawnLoop = setInterval(() => {
                if (circles.length < 5) {
                    createCircle();
                }
            }, 800 / speed);
        }

        function togglePause() {
            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? '再開' : '一時停止';
        }

        function endGame() {
            isPlaying = false;
            clearInterval(spawnLoop);
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            finalScoreDisplay.textContent = score;
            gameOverScreen.classList.add('show');
        }

        function restartGame() {
            gameOverScreen.classList.remove('show');
            startGame();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && isPlaying) {
                e.preventDefault();
                togglePause();
            }
        });
    </script>
</body>
</html>
