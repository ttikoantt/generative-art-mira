<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Perfect Circle Timing #886</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .score-board {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .score-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            margin-bottom: 5px;
        }

        .score-value {
            color: white;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .combo-display {
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
            margin-top: 10px;
            min-height: 30px;
        }

        .game-area {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .target-circle {
            width: 100px;
            height: 100px;
            border: 4px solid rgba(255, 255, 255, 0.3);
        }

        .active-circle {
            width: 280px;
            height: 280px;
            border: 4px solid white;
            transition: width 0.016s linear, height 0.016s linear;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
        }

        .active-circle.perfect {
            border-color: #00ff00;
            box-shadow: 0 0 40px #00ff00;
        }

        .active-circle.good {
            border-color: #ffff00;
            box-shadow: 0 0 40px #ffff00;
        }

        .active-circle.miss {
            border-color: #ff0000;
            box-shadow: 0 0 40px #ff0000;
        }

        .tap-area {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            cursor: pointer;
            z-index: 10;
        }

        .feedback {
            position: absolute;
            font-size: 32px;
            font-weight: bold;
            pointer-events: none;
            animation: feedbackAnim 0.5s ease-out forwards;
        }

        @keyframes feedbackAnim {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -100%) scale(1.2);
            }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay-title {
            color: white;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        .overlay-score {
            color: #ffd700;
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .start-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .start-btn:hover, .start-btn:active {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
            z-index: 50;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .instructions {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-top: 20px;
            text-align: center;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 12px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <div class="score-board">
            <div class="score-label">SCORE</div>
            <div class="score-value" id="score">0</div>
            <div class="combo-display" id="combo"></div>
        </div>

        <div class="game-area">
            <div class="circle target-circle"></div>
            <div class="circle active-circle" id="activeCircle"></div>
            <div class="tap-area" id="tapArea"></div>
        </div>
    </div>

    <div class="overlay" id="overlay">
        <div class="overlay-title" id="overlayTitle">Perfect Circle Timing</div>
        <div class="overlay-score" id="finalScore"></div>
        <button class="start-btn" onclick="startGame()">スタート</button>
        <div class="instructions">
            白い円が縮小します<br>
            目標の円に重なった時にタップ！<br>
            完璧なタイミングで高得点
        </div>
    </div>

    <script>
        let score = 0;
        let combo = 0;
        let isPlaying = false;
        let circleSize = 280;
        let shrinkingSpeed = 2;
        let animationId = null;
        let gameLoopId = null;

        const activeCircle = document.getElementById('activeCircle');
        const scoreDisplay = document.getElementById('score');
        const comboDisplay = document.getElementById('combo');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const finalScore = document.getElementById('finalScore');
        const tapArea = document.getElementById('tapArea');

        function startGame() {
            score = 0;
            combo = 0;
            circleSize = 280;
            shrinkingSpeed = 2;
            isPlaying = true;

            updateScore();
            updateCombo();

            overlay.classList.add('hidden');
            activeCircle.classList.remove('perfect', 'good', 'miss');

            if (animationId) cancelAnimationFrame(animationId);
            if (gameLoopId) clearInterval(gameLoopId);

            gameLoop();
        }

        function gameLoop() {
            if (!isPlaying) return;

            circleSize -= shrinkingSpeed;

            if (circleSize <= 20) {
                gameOver();
                return;
            }

            activeCircle.style.width = circleSize + 'px';
            activeCircle.style.height = circleSize + 'px';

            animationId = requestAnimationFrame(gameLoop);
        }

        function tap(e) {
            if (!isPlaying) return;
            e.preventDefault();
            e.stopPropagation();

            const targetSize = 100;
            const diff = Math.abs(circleSize - targetSize);

            activeCircle.classList.remove('perfect', 'good', 'miss');

            if (diff <= 10) {
                // Perfect!
                combo++;
                score += 100 * combo;
                activeCircle.classList.add('perfect');
                showFeedback('PERFECT!', '#00ff00');
            } else if (diff <= 25) {
                // Good
                combo++;
                score += 50 * combo;
                activeCircle.classList.add('good');
                showFeedback('GOOD', '#ffff00');
            } else {
                // Miss
                combo = 0;
                activeCircle.classList.add('miss');
                showFeedback('MISS', '#ff0000');
            }

            updateScore();
            updateCombo();

            // Reset circle
            circleSize = 280;
            shrinkingSpeed = Math.min(2 + score / 500, 5);
        }

        function showFeedback(text, color) {
            const feedback = document.createElement('div');
            feedback.className = 'feedback';
            feedback.textContent = text;
            feedback.style.color = color;
            feedback.style.left = '50%';
            feedback.style.top = '50%';

            const gameArea = document.querySelector('.game-area');
            gameArea.appendChild(feedback);

            setTimeout(() => {
                feedback.remove();
            }, 500);
        }

        function gameOver() {
            isPlaying = false;
            if (animationId) cancelAnimationFrame(animationId);

            overlayTitle.textContent = 'GAME OVER';
            finalScore.textContent = `Score: ${score}`;
            overlay.classList.remove('hidden');
        }

        function updateScore() {
            scoreDisplay.textContent = score;
        }

        function updateCombo() {
            if (combo >= 5) {
                comboDisplay.textContent = `${combo} COMBO!🔥`;
            } else if (combo >= 3) {
                comboDisplay.textContent = `${combo} COMBO!`;
            } else {
                comboDisplay.textContent = '';
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        tapArea.addEventListener('click', tap);
        tapArea.addEventListener('touchstart', tap, { passive: false });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && isPlaying) {
                tap(e);
            }
        });
    </script>
</body>
</html>
