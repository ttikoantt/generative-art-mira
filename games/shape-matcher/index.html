<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shape Matcher - 記憶力ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 600px;
        }

        h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .stat {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2rem;
        }

        .stat span {
            color: #48dbfb;
            font-weight: bold;
        }

        .game-area {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .shape-display {
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .shape {
            transition: all 0.3s ease;
        }

        .timer-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #48dbfb, #ff6b6b);
            transition: width 0.1s linear;
            border-radius: 4px;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .option {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
        }

        .option:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .option:active {
            transform: scale(0.95);
        }

        .message {
            color: #fff;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .btn {
            background: linear-gradient(135deg, #48dbfb, #5f27cd);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(72, 219, 251, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(72, 219, 251, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            .options {
                gap: 10px;
            }

            .option {
                width: 70px;
                height: 70px;
            }
        }

        .correct {
            animation: correct 0.5s ease;
        }

        .wrong {
            animation: wrong 0.5s ease;
        }

        @keyframes correct {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); background: rgba(72, 219, 251, 0.3); }
        }

        @keyframes wrong {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Shape Matcher</h1>
        <div class="stats">
            <div class="stat">スコア: <span id="score">0</span></div>
            <div class="stat">レベル: <span id="level">1</span></div>
            <div class="stat">ライフ: <span id="lives">3</span></div>
        </div>

        <div class="game-area">
            <div id="gameContent"></div>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const gameContent = document.getElementById('gameContent');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const livesEl = document.getElementById('lives');

        let score = 0;
        let level = 1;
        let lives = 3;
        let currentShape = null;
        let gamePhase = 'start'; // start, memorize, choose, result, gameover

        // 図形の定義
        const shapes = [
            { name: 'circle', draw: drawCircle },
            { name: 'square', draw: drawSquare },
            { name: 'triangle', draw: drawTriangle },
            { name: 'star', draw: drawStar },
            { name: 'diamond', draw: drawDiamond },
            { name: 'hexagon', draw: drawHexagon },
            { name: 'heart', draw: drawHeart },
            { name: 'pentagon', draw: drawPentagon }
        ];

        const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd', '#00d2d3'];

        function drawCircle(size, color) {
            return `<svg width="${size}" height="${size}" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="40" fill="${color}" />
            </svg>`;
        }

        function drawSquare(size, color) {
            return `<svg width="${size}" height="${size}" viewBox="0 0 100 100">
                <rect x="15" y="15" width="70" height="70" rx="5" fill="${color}" />
            </svg>`;
        }

        function drawTriangle(size, color) {
            return `<svg width="${size}" height="${size}" viewBox="0 0 100 100">
                <polygon points="50,15 15,85 85,85" fill="${color}" />
            </svg>`;
        }

        function drawStar(size, color) {
            return `<svg width="${size}" height="${size}" viewBox="0 0 100 100">
                <polygon points="50,10 61,40 95,40 68,60 79,90 50,72 21,90 32,60 5,40 39,40" fill="${color}" />
            </svg>`;
        }

        function drawDiamond(size, color) {
            return `<svg width="${size}" height="${size}" viewBox="0 0 100 100">
                <polygon points="50,10 90,50 50,90 10,50" fill="${color}" />
            </svg>`;
        }

        function drawHexagon(size, color) {
            return `<svg width="${size}" height="${size}" viewBox="0 0 100 100">
                <polygon points="50,10 85,30 85,70 50,90 15,70 15,30" fill="${color}" />
            </svg>`;
        }

        function drawHeart(size, color) {
            return `<svg width="${size}" height="${size}" viewBox="0 0 100 100">
                <path d="M50,85 C20,60 10,40 25,25 C40,10 50,25 50,25 C50,25 60,10 75,25 C90,40 80,60 50,85Z" fill="${color}" />
            </svg>`;
        }

        function drawPentagon(size, color) {
            return `<svg width="${size}" height="${size}" viewBox="0 0 100 100">
                <polygon points="50,10 90,40 75,90 25,90 10,40" fill="${color}" />
            </svg>`;
        }

        function getRandomShape() {
            return shapes[Math.floor(Math.random() * shapes.length)];
        }

        function getRandomColor() {
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function showStartScreen() {
            gameContent.innerHTML = `
                <div class="message">記憶力ゲーム</div>
                <div style="color: rgba(255,255,255,0.6); margin-bottom: 30px;">
                    表示される図形を覚えて<br>
                    正しいものを選んでください！
                </div>
                <button class="btn" onclick="startGame()">スタート</button>
            `;
        }

        function startGame() {
            score = 0;
            level = 1;
            lives = 3;
            updateStats();
            nextRound();
        }

        function nextRound() {
            gamePhase = 'memorize';
            currentShape = getRandomShape();
            const color = getRandomColor();
            const displayTime = Math.max(2000, 4000 - level * 200);

            gameContent.innerHTML = `
                <div class="message">この図形を覚えて！</div>
                <div class="shape-display">
                    <div class="shape">${currentShape.draw(150, color)}</div>
                </div>
                <div class="timer-bar">
                    <div class="timer-fill" id="timerFill"></div>
                </div>
            `;

            const timerFill = document.getElementById('timerFill');
            let timeLeft = displayTime;
            const interval = 50;

            const timer = setInterval(() => {
                timeLeft -= interval;
                timerFill.style.width = `${(timeLeft / displayTime) * 100}%`;

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    showChoices(color);
                }
            }, interval);
        }

        function showChoices(color) {
            gamePhase = 'choose';
            const numChoices = Math.min(3 + Math.floor(level / 2), 9);
            const choiceShapes = [currentShape];

            while (choiceShapes.length < numChoices) {
                const randomShape = getRandomShape();
                if (!choiceShapes.includes(randomShape)) {
                    choiceShapes.push(randomShape);
                }
            }

            // シャッフル
            for (let i = choiceShapes.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [choiceShapes[i], choiceShapes[j]] = [choiceShapes[j], choiceShapes[i]];
            }

            let optionsHTML = '<div class="options">';
            choiceShapes.forEach((shape, index) => {
                optionsHTML += `
                    <div class="option" onclick="selectChoice('${shape.name}', this)">
                        ${shape.draw(60, color)}
                    </div>
                `;
            });
            optionsHTML += '</div>';

            gameContent.innerHTML = `
                <div class="message">どれでしたか？</div>
                ${optionsHTML}
            `;
        }

        function selectChoice(shapeName, element) {
            if (gamePhase !== 'choose') return;

            if (shapeName === currentShape.name) {
                // 正解
                element.classList.add('correct');
                score += level * 10;
                level++;
                updateStats();

                setTimeout(() => {
                    nextRound();
                }, 500);
            } else {
                // 不正解
                element.classList.add('wrong');
                lives--;
                updateStats();

                if (lives <= 0) {
                    setTimeout(() => {
                        showGameOver();
                    }, 500);
                } else {
                    setTimeout(() => {
                        nextRound();
                    }, 500);
                }
            }
        }

        function showGameOver() {
            gamePhase = 'gameover';
            gameContent.innerHTML = `
                <div class="message">ゲームオーバー！</div>
                <div style="color: #48dbfb; font-size: 2rem; margin-bottom: 10px;">
                    スコア: ${score}
                </div>
                <div style="color: rgba(255,255,255,0.6); margin-bottom: 30px;">
                    レベル: ${level}
                </div>
                <button class="btn" onclick="startGame()">もう一度</button>
            `;
        }

        function updateStats() {
            scoreEl.textContent = score;
            levelEl.textContent = level;
            livesEl.textContent = lives;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        showStartScreen();
    </script>
</body>
</html>
