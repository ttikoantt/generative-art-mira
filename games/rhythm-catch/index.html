<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Catch - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }

        h1 {
            color: white;
            margin-bottom: 10px;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            color: white;
            font-size: 1.2rem;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.9;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .game-container {
            position: relative;
            background: black;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
            touch-action: none;
        }

        .info {
            color: white;
            margin-top: 20px;
            font-size: 1rem;
            opacity: 0.9;
        }

        .fullscreen-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 10;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 5;
        }

        .game-over h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .game-over p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .restart-btn {
            background: white;
            color: #f5576c;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.5rem;
            }

            .stats {
                gap: 15px;
            }

            .stat {
                padding: 8px 15px;
            }

            .info {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Rhythm Catch</h1>
        <div class="stats">
            <div class="stat">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">COMBO</div>
                <div class="stat-value" id="combo">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">HIGH</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>
        <div class="game-container">
            <canvas id="gameCanvas"></canvas>
            <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>
            <div class="game-over hidden" id="gameOver">
                <h2>Game Over!</h2>
                <p>Score: <span id="finalScore">0</span></p>
                <button class="restart-btn" id="restartBtn">再挑戦</button>
            </div>
        </div>
        <p class="info">円が中央に来たらタップ！</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const gameOverScreen = document.getElementById('gameOver');
        const restartBtn = document.getElementById('restartBtn');
        const scoreDisplay = document.getElementById('score');
        const comboDisplay = document.getElementById('combo');
        const highScoreDisplay = document.getElementById('highScore');
        const finalScoreDisplay = document.getElementById('finalScore');

        // Canvas size
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = Math.min(800, window.innerWidth - 40);
            canvas.height = Math.min(500, window.innerHeight - 250);
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game state
        let score = 0;
        let combo = 0;
        let highScore = localStorage.getItem('rhythmCatchHighScore') || 0;
        let gameRunning = true;
        let circles = [];
        let lastCircleTime = 0;
        let circleInterval = 1500;
        let gameSpeed = 1;

        highScoreDisplay.textContent = highScore;

        // Circle class
        class Circle {
            constructor() {
                this.angle = Math.random() * Math.PI * 2;
                this.radius = Math.min(canvas.width, canvas.height) * 0.4;
                this.size = 20;
                this.speed = 0.02 * gameSpeed;
                this.color = `hsl(${Math.random() * 60 + 300}, 70%, 60%)`;
                this.catched = false;
            }

            update() {
                this.angle += this.speed;
            }

            draw() {
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                const x = centerX + Math.cos(this.angle) * this.radius;
                const y = centerY + Math.sin(this.angle) * this.radius;

                // Draw circle
                ctx.save();
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(x, y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                // Draw target zone
                ctx.save();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(centerX, centerY, this.size + 10, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }

            isInTarget() {
                const targetRadius = this.size + 10;
                return Math.abs(this.radius - targetRadius) < 30;
            }
        }

        // Create new circle
        function createCircle() {
            circles.push(new Circle());
        }

        // Check catch
        function checkCatch() {
            if (!gameRunning) return;

            let catched = false;
            circles.forEach((circle, index) => {
                if (circle.isInTarget() && !circle.catched) {
                    circle.catched = true;
                    catched = true;
                    combo++;
                    score += 10 * combo;
                    updateDisplay();

                    // Remove circle
                    setTimeout(() => {
                        circles = circles.filter(c => c !== circle);
                    }, 100);
                }
            });

            if (!catched) {
                combo = 0;
                updateDisplay();
            }
        }

        // Update display
        function updateDisplay() {
            scoreDisplay.textContent = score;
            comboDisplay.textContent = combo;
        }

        // Game over
        function gameOver() {
            gameRunning = false;
            gameOverScreen.classList.remove('hidden');
            finalScoreDisplay.textContent = score;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('rhythmCatchHighScore', highScore);
                highScoreDisplay.textContent = highScore;
            }
        }

        // Restart game
        function restartGame() {
            score = 0;
            combo = 0;
            gameRunning = true;
            circles = [];
            lastCircleTime = Date.now();
            gameSpeed = 1;
            circleInterval = 1500;
            updateDisplay();
            gameOverScreen.classList.add('hidden');
        }

        // Animation loop
        function animate() {
            if (!gameRunning) {
                requestAnimationFrame(animate);
                return;
            }

            // Clear canvas
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw center
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            ctx.save();
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.beginPath();
            ctx.arc(centerX, centerY, 30, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Create circles
            if (Date.now() - lastCircleTime > circleInterval) {
                createCircle();
                lastCircleTime = Date.now();

                // Increase difficulty
                gameSpeed += 0.02;
                circleInterval = Math.max(800, 1500 - score * 5);
            }

            // Update and draw circles
            circles.forEach(circle => {
                circle.update();
                circle.draw();
            });

            // Check missed circles
            circles.forEach(circle => {
                if (circle.radius < 20) {
                    gameOver();
                }
            });

            requestAnimationFrame(animate);
        }

        animate();

        // Input events
        canvas.addEventListener('click', checkCatch);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            checkCatch();
        });

        restartBtn.addEventListener('click', restartGame);

        // Fullscreen
        fullscreenBtn.addEventListener('click', () => {
            if (canvas.requestFullscreen) {
                canvas.requestFullscreen();
            } else if (canvas.webkitRequestFullscreen) {
                canvas.webkitRequestFullscreen();
            } else if (canvas.msRequestFullscreen) {
                canvas.msRequestFullscreen();
            }
        });

        // Handle fullscreen change
        document.addEventListener('fullscreenchange', handleFullscreen);
        document.addEventListener('webkitfullscreenchange', handleFullscreen);

        function handleFullscreen() {
            const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement;
            if (isFullscreen) {
                canvas.width = window.screen.width;
                canvas.height = window.screen.height;
            } else {
                resizeCanvas();
            }
        }
    </script>
</body>
</html>
