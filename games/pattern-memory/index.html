<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Memory Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            padding: 20px;
        }

        .game-container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 2rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat {
            color: #fff;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 5px;
        }

        .pattern-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            margin-bottom: 20px;
            aspect-ratio: 1;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .cell:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.2);
        }

        .cell.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.6);
            transform: scale(1.1);
        }

        .cell.correct {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            box-shadow: 0 0 20px rgba(67, 233, 123, 0.6);
        }

        .cell.wrong {
            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
            box-shadow: 0 0 20px rgba(245, 87, 108, 0.6);
        }

        .cell.showing {
            animation: pulse 0.5s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            from {
                transform: scale(1);
                box-shadow: 0 0 10px rgba(102, 126, 234, 0.4);
            }
            to {
                transform: scale(1.1);
                box-shadow: 0 0 20px rgba(102, 126, 234, 0.8);
            }
        }

        .message {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 15px;
            min-height: 30px;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .game-over.show {
            display: flex;
        }

        .game-over h2 {
            color: #fff;
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .final-score {
            color: #667eea;
            font-size: 5rem;
            font-weight: bold;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .pattern-container {
                gap: 8px;
                padding: 15px;
            }

            .stats {
                padding: 10px;
            }

            .stat-value {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🧠 Pattern Memory Challenge</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="level">1</div>
                <div class="stat-label">Level</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">Score</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="lives">3</div>
                <div class="stat-label">Lives</div>
            </div>
        </div>

        <div class="message" id="message">Tap "Start Game" to begin!</div>

        <div class="pattern-container" id="pattern"></div>

        <button class="btn" id="startBtn">Start Game</button>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">⛶</button>

    <div class="game-over" id="gameOver">
        <h2>Game Over!</h2>
        <div class="final-score" id="finalScore">0</div>
        <button class="btn" id="restartBtn">Play Again</button>
    </div>

    <script>
        const patternContainer = document.getElementById('pattern');
        const message = document.getElementById('message');
        const startBtn = document.getElementById('startBtn');
        const levelDisplay = document.getElementById('level');
        const scoreDisplay = document.getElementById('score');
        const livesDisplay = document.getElementById('lives');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreDisplay = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let gridSize = 5;
        let pattern = [];
        let playerPattern = [];
        let level = 1;
        let score = 0;
        let lives = 3;
        let isShowingPattern = false;
        let canClick = false;

        function createGrid() {
            patternContainer.innerHTML = '';
            patternContainer.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;

            for (let i = 0; i < gridSize * gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', handleCellClick);
                cell.addEventListener('touchstart', handleCellTouch, { passive: false });
                patternContainer.appendChild(cell);
            }
        }

        function generatePattern() {
            const patternLength = Math.min(3 + Math.floor(level / 2), gridSize * gridSize);
            pattern = [];

            const usedIndices = new Set();

            while (pattern.length < patternLength) {
                const index = Math.floor(Math.random() * (gridSize * gridSize));
                if (!usedIndices.has(index)) {
                    usedIndices.add(index);
                    pattern.push(index);
                }
            }
        }

        async function showPattern() {
            isShowingPattern = true;
            canClick = false;
            message.textContent = 'Watch the pattern...';
            startBtn.disabled = true;

            const cells = document.querySelectorAll('.cell');

            // Clear all cells first
            cells.forEach(cell => {
                cell.classList.remove('active', 'correct', 'wrong', 'showing');
            });

            // Show pattern with delays
            for (let i = 0; i < pattern.length; i++) {
                await sleep(300);
                const cell = cells[pattern[i]];
                cell.classList.add('showing', 'active');

                await sleep(Math.max(800 - level * 50, 400));

                cell.classList.remove('showing', 'active');
            }

            await sleep(500);
            message.textContent = 'Your turn! Recreate the pattern.';
            isShowingPattern = false;
            canClick = true;
            startBtn.disabled = false;
        }

        function handleCellClick(e) {
            if (!canClick || isShowingPattern) return;

            const index = parseInt(e.target.dataset.index);
            checkPattern(index);
        }

        function handleCellTouch(e) {
            e.preventDefault();
            if (!canClick || isShowingPattern) return;

            const index = parseInt(e.target.dataset.index);
            checkPattern(index);
        }

        function checkPattern(index) {
            const cells = document.querySelectorAll('.cell');
            playerPattern.push(index);

            const currentIndex = playerPattern.length - 1;

            if (pattern[currentIndex] === index) {
                // Correct
                cells[index].classList.add('correct');

                if (playerPattern.length === pattern.length) {
                    // Pattern complete!
                    score += level * 10;
                    level++;
                    updateStats();

                    message.textContent = '🎉 Perfect! Get ready...';
                    canClick = false;

                    setTimeout(() => {
                        playerPattern = [];
                        cells.forEach(cell => {
                            cell.classList.remove('correct', 'wrong');
                        });

                        // Increase grid size every 3 levels
                        if (level % 3 === 1 && gridSize < 6) {
                            gridSize++;
                            createGrid();
                        }

                        startLevel();
                    }, 1500);
                }
            } else {
                // Wrong!
                cells[index].classList.add('wrong');
                lives--;
                updateStats();

                if (lives <= 0) {
                    gameOver();
                } else {
                    message.textContent = `❌ Wrong! ${lives} lives remaining. Try again!`;
                    canClick = false;

                    setTimeout(() => {
                        playerPattern = [];
                        cells.forEach(cell => {
                            cell.classList.remove('correct', 'wrong');
                        });

                        // Show pattern again
                        showPattern();
                    }, 1500);
                }
            }
        }

        function startLevel() {
            generatePattern();
            showPattern();
        }

        function startGame() {
            level = 1;
            score = 0;
            lives = 3;
            gridSize = 5;
            playerPattern = [];

            updateStats();
            createGrid();
            startLevel();
        }

        function updateStats() {
            levelDisplay.textContent = level;
            scoreDisplay.textContent = score;
            livesDisplay.textContent = lives;
        }

        function gameOver() {
            finalScoreDisplay.textContent = score;
            gameOverScreen.classList.add('show');
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        startBtn.addEventListener('click', startGame);

        restartBtn.addEventListener('click', () => {
            gameOverScreen.classList.remove('show');
            startGame();
        });

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Initialize grid
        createGrid();
    </script>
</body>
</html>
