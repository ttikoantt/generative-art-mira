<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Memory - パターン記憶ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .grid-container {
            display: grid;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .grid-container.size-3 {
            grid-template-columns: repeat(3, 1fr);
        }

        .grid-container.size-4 {
            grid-template-columns: repeat(4, 1fr);
        }

        .grid-container.size-5 {
            grid-template-columns: repeat(5, 1fr);
        }

        .cell {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #e0e0e0 0%, #f5f5f5 100%);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .cell:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .cell.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #764ba2;
            animation: pulse 0.5s ease;
        }

        .cell.showing {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-color: #f5576c;
        }

        .cell.correct {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border-color: #00f2fe;
            animation: correctPulse 0.5s ease;
        }

        .cell.wrong {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            border-color: #fa709a;
            animation: shake 0.5s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .message {
            text-align: center;
            font-size: 18px;
            margin-bottom: 15px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .message.watching {
            color: #f5576c;
            font-weight: bold;
        }

        .message.reproducing {
            color: #667eea;
            font-weight: bold;
        }

        .message.correct {
            color: #00f2fe;
        }

        .message.wrong {
            color: #fa709a;
        }

        .btn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #667eea;
        }

        .btn-secondary:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.3);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 100;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }

        .high-score {
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
            color: #666;
        }

        .high-score span {
            color: #f5576c;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">全画面表示</button>

    <div class="container">
        <h1>🧠 Pattern Memory</h1>

        <div class="high-score">
            ハイスコア: <span id="highScore">0</span>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">レベル</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">ライフ</div>
                <div class="stat-value" id="lives">❤️❤️❤️</div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>

        <div class="message" id="message">スタートボタンを押してね</div>

        <div class="grid-container size-3" id="grid"></div>

        <button class="btn btn-primary" id="startBtn">ゲームスタート</button>
        <button class="btn btn-secondary" id="resetBtn">リセット</button>
    </div>

    <script>
        class PatternMemoryGame {
            constructor() {
                this.gridSize = 3;
                this.pattern = [];
                this.playerPattern = [];
                this.level = 1;
                this.score = 0;
                this.lives = 3;
                this.highScore = parseInt(localStorage.getItem('patternMemoryHighScore')) || 0;
                this.isShowingPattern = false;
                this.isAcceptingInput = false;
                this.currentPatternIndex = 0;

                this.gridEl = document.getElementById('grid');
                this.messageEl = document.getElementById('message');
                this.levelEl = document.getElementById('level');
                this.scoreEl = document.getElementById('score');
                this.livesEl = document.getElementById('lives');
                this.highScoreEl = document.getElementById('highScore');
                this.progressFillEl = document.getElementById('progressFill');
                this.startBtn = document.getElementById('startBtn');
                this.resetBtn = document.getElementById('resetBtn');

                this.init();
            }

            init() {
                this.createGrid();
                this.updateDisplay();
                this.highScoreEl.textContent = this.highScore;

                this.startBtn.addEventListener('click', () => this.startGame());
                this.resetBtn.addEventListener('click', () => this.resetGame());
            }

            createGrid() {
                this.gridEl.className = `grid-container size-${this.gridSize}`;
                this.gridEl.innerHTML = '';

                for (let i = 0; i < this.gridSize * this.gridSize; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.index = i;
                    cell.addEventListener('click', () => this.handleCellClick(i));
                    this.gridEl.appendChild(cell);
                }
            }

            startGame() {
                this.level = 1;
                this.score = 0;
                this.lives = 3;
                this.gridSize = 3;
                this.startLevel();
            }

            resetGame() {
                this.level = 1;
                this.score = 0;
                this.lives = 3;
                this.gridSize = 3;
                this.pattern = [];
                this.playerPattern = [];
                this.isShowingPattern = false;
                this.isAcceptingInput = false;

                this.createGrid();
                this.updateDisplay();
                this.setMessage('スタートボタンを押してね', '');
                this.progressFillEl.style.width = '0%';
            }

            startLevel() {
                this.pattern = [];
                this.playerPattern = [];
                this.currentPatternIndex = 0;

                // グリッドサイズを調整
                this.gridSize = Math.min(3 + Math.floor((this.level - 1) / 3), 5);
                this.createGrid();

                // パターン生成
                const patternLength = Math.min(3 + this.level - 1, 10);
                for (let i = 0; i < patternLength; i++) {
                    this.pattern.push(Math.floor(Math.random() * (this.gridSize * this.gridSize)));
                }

                // パターンを表示
                this.showPattern();
                this.updateDisplay();
            }

            async showPattern() {
                this.isShowingPattern = true;
                this.isAcceptingInput = false;
                this.setMessage('パターンを覚えて...', 'watching');
                this.startBtn.disabled = true;

                await this.sleep(500);

                for (let i = 0; i < this.pattern.length; i++) {
                    const cellIndex = this.pattern[i];
                    const cell = this.gridEl.children[cellIndex];

                    cell.classList.add('showing');
                    await this.sleep(400);
                    cell.classList.remove('showing');

                    if (i < this.pattern.length - 1) {
                        await this.sleep(200);
                    }
                }

                await this.sleep(500);

                this.isShowingPattern = false;
                this.isAcceptingInput = true;
                this.setMessage('同じパターンをタップしてね！', 'reproducing');
                this.startBtn.disabled = false;
            }

            handleCellClick(index) {
                if (!this.isAcceptingInput || this.isShowingPattern) return;

                const cell = this.gridEl.children[index];
                cell.classList.add('active');

                setTimeout(() => {
                    cell.classList.remove('active');
                }, 200);

                // 正誤判定
                if (index === this.pattern[this.currentPatternIndex]) {
                    cell.classList.add('correct');
                    setTimeout(() => cell.classList.remove('correct'), 500);

                    this.currentPatternIndex++;
                    this.updateProgress();

                    if (this.currentPatternIndex >= this.pattern.length) {
                        // レベルクリア
                        this.isAcceptingInput = false;
                        this.score += this.level * 10;
                        this.level++;

                        if (this.score > this.highScore) {
                            this.highScore = this.score;
                            localStorage.setItem('patternMemoryHighScore', this.highScore);
                            this.highScoreEl.textContent = this.highScore;
                        }

                        this.setMessage('🎉 素晴らしい！次のレベルへ', 'correct');
                        this.updateDisplay();

                        setTimeout(() => {
                            this.startLevel();
                        }, 1500);
                    }
                } else {
                    // 間違い
                    cell.classList.add('wrong');
                    setTimeout(() => cell.classList.remove('wrong'), 500);

                    this.lives--;
                    this.updateDisplay();

                    if (this.lives <= 0) {
                        this.gameOver();
                    } else {
                        this.isAcceptingInput = false;
                        this.setMessage(`間違い！残りライフ: ${this.lives}`, 'wrong');

                        setTimeout(() => {
                            this.showPattern();
                        }, 1500);
                    }
                }
            }

            updateProgress() {
                const progress = (this.currentPatternIndex / this.pattern.length) * 100;
                this.progressFillEl.style.width = `${progress}%`;
            }

            gameOver() {
                this.isAcceptingInput = false;
                this.setMessage(`💔 ゲームオーバー！スコア: ${this.score}`, 'wrong');
                this.startBtn.textContent = 'もう一度挑戦';

                if (this.score >= this.highScore && this.score > 0) {
                    this.setMessage(`🏆 新記録！スコア: ${this.score}`, 'correct');
                }
            }

            updateDisplay() {
                this.levelEl.textContent = this.level;
                this.scoreEl.textContent = this.score;

                let livesDisplay = '';
                for (let i = 0; i < 3; i++) {
                    livesDisplay += i < this.lives ? '❤️' : '🖤';
                }
                this.livesEl.textContent = livesDisplay;
            }

            setMessage(text, type) {
                this.messageEl.textContent = text;
                this.messageEl.className = `message ${type}`;
            }

            sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
        }

        // ゲーム初期化
        const game = new PatternMemoryGame();

        // 全画面表示
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });
    </script>
</body>
</html>
