<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pattern Memory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            color: #fff;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #4facfe;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px auto;
            max-width: 300px;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .cell:active {
            transform: scale(0.95);
        }

        .cell.active {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border-color: #4facfe;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.5);
        }

        .cell.correct {
            background: linear-gradient(135deg, #00f260 0%, #0575e6 100%);
            border-color: #00f260;
        }

        .cell.wrong {
            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
            border-color: #f5576c;
        }

        .message {
            color: #fff;
            font-size: 18px;
            margin: 20px 0;
            min-height: 27px;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            z-index: 100;
            padding: 8px 16px;
            font-size: 14px;
        }

        .progress {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin: 15px 0;
        }

        .progress-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
        }

        .progress-dot.active {
            background: #4facfe;
        }

        .progress-dot.completed {
            background: #00f260;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <h1>🧠 Pattern Memory</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">LEVEL</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">BEST</div>
                <div class="stat-value" id="best">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="score">0</div>
            </div>
        </div>

        <div class="progress" id="progress"></div>

        <div class="grid" id="grid"></div>

        <div class="message" id="message">Watch the pattern...</div>

        <div class="controls">
            <button onclick="startGame()">▶ Start</button>
            <button onclick="showRules()">❓ Rules</button>
        </div>
    </div>

    <script>
        const gridSize = 9;
        let pattern = [];
        let playerPattern = [];
        let level = 1;
        let score = 0;
        let bestLevel = 0;
        let isShowingPattern = false;
        let canClick = false;

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let i = 0; i < gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', handleCellClick);
                cell.addEventListener('touchstart', handleCellClick);
                grid.appendChild(cell);
            }
        }

        function generatePattern() {
            const length = Math.min(level + 2, 9);
            pattern = [];
            const used = new Set();
            while (pattern.length < length) {
                const num = Math.floor(Math.random() * gridSize);
                if (!used.has(num)) {
                    used.add(num);
                    pattern.push(num);
                }
            }
        }

        function updateProgress() {
            const progress = document.getElementById('progress');
            progress.innerHTML = '';
            for (let i = 0; i < pattern.length; i++) {
                const dot = document.createElement('div');
                dot.className = 'progress-dot';
                if (i < playerPattern.length) {
                    dot.classList.add('completed');
                }
                progress.appendChild(dot);
            }
        }

        async function showPattern() {
            isShowingPattern = true;
            canClick = false;
            playerPattern = [];
            updateProgress();

            document.getElementById('message').textContent = 'Watch the pattern...';

            for (let i = 0; i < pattern.length; i++) {
                await sleep(500);
                const cell = document.querySelector(`[data-index="${pattern[i]}"]`);
                cell.classList.add('active');
                await sleep(400);
                cell.classList.remove('active');
            }

            await sleep(300);
            document.getElementById('message').textContent = 'Your turn! Repeat the pattern';
            isShowingPattern = false;
            canClick = true;
        }

        function handleCellClick(e) {
            if (!canClick || isShowingPattern) return;

            const index = parseInt(e.target.dataset.index);
            const cell = e.target;

            playerPattern.push(index);
            cell.classList.add('active');

            setTimeout(() => {
                cell.classList.remove('active');
            }, 200);

            updateProgress();

            // Check if correct
            const currentIndex = playerPattern.length - 1;
            if (playerPattern[currentIndex] !== pattern[currentIndex]) {
                // Wrong!
                cell.classList.add('wrong');
                canClick = false;
                document.getElementById('message').textContent = `❌ Wrong! Level ${level} - Score: ${score}`;

                if (level > bestLevel) {
                    bestLevel = level;
                    document.getElementById('best').textContent = bestLevel;
                }

                setTimeout(() => {
                    cell.classList.remove('wrong');
                    level = 1;
                    score = 0;
                    updateStats();
                    document.getElementById('message').textContent = 'Game Over! Press Start to try again';
                }, 1000);
                return;
            }

            // Check if pattern complete
            if (playerPattern.length === pattern.length) {
                canClick = false;
                document.querySelectorAll('.cell').forEach((c, i) => {
                    if (pattern.includes(i)) {
                        c.classList.add('correct');
                    }
                });

                score += level * 10;
                level++;

                document.getElementById('message').textContent = `✅ Perfect! Level ${level} - Score: ${score}`;
                updateStats();

                setTimeout(() => {
                    document.querySelectorAll('.cell').forEach(c => {
                        c.classList.remove('correct');
                    });
                    generatePattern();
                    showPattern();
                }, 1500);
            }
        }

        function startGame() {
            level = 1;
            score = 0;
            updateStats();
            generatePattern();
            showPattern();
        }

        function updateStats() {
            document.getElementById('level').textContent = level;
            document.getElementById('score').textContent = score;
            document.getElementById('best').textContent = bestLevel;
        }

        function showRules() {
            document.getElementById('message').innerHTML = `
                📯 Watch the pattern<br>
                👆 Tap cells in the same order<br>
                📈 Patterns get longer each level<br>
                🏆 Reach the highest level possible!
            `;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        createGrid();
    </script>
</body>
</html>
