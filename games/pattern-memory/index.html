<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pattern Memory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
        }

        .level-display {
            color: #4ecdc4;
            font-size: 1.5em;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px auto;
            max-width: 350px;
        }

        .tile {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .tile:active {
            transform: scale(0.95);
        }

        .tile.active {
            animation: flash 0.5s;
        }

        .tile.flash-red {
            background: rgba(255, 80, 80, 0.8) !important;
            box-shadow: 0 0 30px rgba(255, 80, 80, 0.8);
        }

        .tile.flash-green {
            background: rgba(80, 255, 80, 0.8) !important;
            box-shadow: 0 0 30px rgba(80, 255, 80, 0.8);
        }

        .tile.flash-blue {
            background: rgba(80, 80, 255, 0.8) !important;
            box-shadow: 0 0 30px rgba(80, 80, 255, 0.8);
        }

        .tile.flash-yellow {
            background: rgba(255, 255, 80, 0.8) !important;
            box-shadow: 0 0 30px rgba(255, 255, 80, 0.8);
        }

        .tile.flash-purple {
            background: rgba(200, 80, 255, 0.8) !important;
            box-shadow: 0 0 30px rgba(200, 80, 255, 0.8);
        }

        .tile.disabled {
            pointer-events: none;
            opacity: 0.5;
        }

        @keyframes flash {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .status {
            color: #95a5a6;
            font-size: 1.2em;
            margin: 20px 0;
            min-height: 30px;
        }

        .score {
            color: #ffd93d;
            font-size: 1.3em;
            margin-bottom: 20px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            margin: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.secondary {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            box-shadow: 0 5px 20px rgba(17, 153, 142, 0.4);
        }

        .instructions {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9em;
            margin-top: 30px;
            line-height: 1.6;
        }

        .game-over {
            display: none;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 20px;
            margin: 20px;
        }

        .game-over.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .game-over h2 {
            color: #e74c3c;
            font-size: 2em;
            margin-bottom: 20px;
        }

        .game-over p {
            color: #fff;
            font-size: 1.3em;
            margin: 10px 0;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <div class="container">
        <h1>🧠 Pattern Memory</h1>
        <div class="level-display">Level: <span id="level">1</span></div>
        <div class="score">Score: <span id="score">0</span></div>
        <div class="status" id="status">Watch the pattern!</div>

        <div class="grid" id="grid">
            <div class="tile" data-index="0"></div>
            <div class="tile" data-index="1"></div>
            <div class="tile" data-index="2"></div>
            <div class="tile" data-index="3"></div>
            <div class="tile" data-index="4"></div>
            <div class="tile" data-index="5"></div>
            <div class="tile" data-index="6"></div>
            <div class="tile" data-index="7"></div>
            <div class="tile" data-index="8"></div>
        </div>

        <div class="game-over" id="gameOver">
            <h2>Game Over!</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <p>Level Reached: <span id="finalLevel">1</span></p>
            <button class="btn" onclick="startGame()">Play Again</button>
        </div>

        <button class="btn" id="startBtn" onclick="startGame()">Start Game</button>

        <div class="instructions">
            <p>Watch the color pattern, then repeat it by tapping the tiles!</p>
            <p>Each level adds one more color to remember.</p>
        </div>
    </div>

    <script>
        const colors = ['red', 'green', 'blue', 'yellow', 'purple'];
        const tiles = document.querySelectorAll('.tile');
        const levelDisplay = document.getElementById('level');
        const scoreDisplay = document.getElementById('score');
        const statusDisplay = document.getElementById('status');
        const gameOverDiv = document.getElementById('gameOver');
        const startBtn = document.getElementById('startBtn');

        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let score = 0;
        let isPlaying = false;
        let isShowingPattern = false;

        function flashTile(index, color, duration = 500) {
            const tile = tiles[index];
            tile.classList.add(`flash-${color}`);
            setTimeout(() => {
                tile.classList.remove(`flash-${color}`);
            }, duration);
        }

        function playSequence() {
            isShowingPattern = true;
            statusDisplay.textContent = 'Watch carefully...';
            tiles.forEach(tile => tile.classList.add('disabled'));

            let i = 0;
            const interval = setInterval(() => {
                if (i < sequence.length) {
                    const [tileIndex, color] = sequence[i];
                    flashTile(tileIndex, color);
                    i++;
                } else {
                    clearInterval(interval);
                    setTimeout(() => {
                        isShowingPattern = false;
                        statusDisplay.textContent = 'Your turn! Repeat the pattern';
                        tiles.forEach(tile => tile.classList.remove('disabled'));
                    }, 500);
                }
            }, 800);
        }

        function addToSequence() {
            const tileIndex = Math.floor(Math.random() * 9);
            const color = colors[Math.floor(Math.random() * colors.length)];
            sequence.push([tileIndex, color]);
        }

        function handleTileClick(index) {
            if (isShowingPattern || !isPlaying) return;

            const [expectedTile, expectedColor] = sequence[playerSequence.length];

            if (index === expectedTile) {
                flashTile(index, expectedColor);
                playerSequence.push([index, expectedColor]);

                if (playerSequence.length === sequence.length) {
                    score += level * 10;
                    scoreDisplay.textContent = score;
                    statusDisplay.textContent = '✓ Correct! Get ready...';

                    setTimeout(() => {
                        level++;
                        levelDisplay.textContent = level;
                        playerSequence = [];
                        addToSequence();
                        setTimeout(playSequence, 1000);
                    }, 1000);
                }
            } else {
                gameOver();
            }
        }

        function gameOver() {
            isPlaying = false;
            tiles.forEach(tile => tile.classList.add('disabled'));
            statusDisplay.textContent = 'Game Over!';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalLevel').textContent = level;
            gameOverDiv.classList.add('show');
            startBtn.style.display = 'none';
        }

        function startGame() {
            sequence = [];
            playerSequence = [];
            level = 1;
            score = 0;
            isPlaying = true;

            levelDisplay.textContent = level;
            scoreDisplay.textContent = score;
            gameOverDiv.classList.remove('show');
            startBtn.style.display = 'none';

            tiles.forEach(tile => tile.classList.remove('disabled'));

            addToSequence();
            setTimeout(playSequence, 1000);
        }

        tiles.forEach(tile => {
            tile.addEventListener('click', () => {
                const index = parseInt(tile.dataset.index);
                handleTileClick(index);
            });
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
