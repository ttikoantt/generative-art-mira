<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Memory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: clamp(2rem, 6vw, 3rem);
            background: linear-gradient(90deg, #00d4ff, #9c27b0, #ff5722);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            color: #aaa;
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat {
            text-align: center;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .stat-value {
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #9c27b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #888;
            margin-top: 5px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .cell:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
        }

        .cell.active {
            background: linear-gradient(135deg, #00d4ff, #9c27b0);
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            transform: scale(1.05);
        }

        .cell.success {
            background: linear-gradient(135deg, #4caf50, #8bc34a);
            border-color: #4caf50;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
        }

        .cell.error {
            background: linear-gradient(135deg, #f44336, #ff5722);
            border-color: #f44336;
            box-shadow: 0 0 20px rgba(244, 67, 54, 0.5);
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .message {
            text-align: center;
            font-size: clamp(1rem, 3vw, 1.3rem);
            margin-bottom: 20px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message.info {
            color: #00d4ff;
        }

        .message.success {
            color: #4caf50;
        }

        .message.error {
            color: #f44336;
        }

        .start-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #00d4ff, #9c27b0);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.5);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .full-screen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #fff;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .full-screen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 480px) {
            .grid {
                gap: 8px;
            }

            .cell {
                border-radius: 8px;
            }

            .game-container {
                padding: 20px;
            }

            .stats {
                gap: 15px;
            }

            .stat {
                padding: 10px 15px;
            }
        }
    </style>
</head>
<body>
    <button class="full-screen-btn" onclick="toggleFullScreen()">全画面</button>

    <div class="header">
        <h1>🧠 Pattern Memory</h1>
        <p class="subtitle">パターンを覚えて再現しよう</p>
    </div>

    <div class="stats">
        <div class="stat">
            <div class="stat-value" id="level">1</div>
            <div class="stat-label">レベル</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="score">0</div>
            <div class="stat-label">スコア</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="lives">3</div>
            <div class="stat-label">ライフ</div>
        </div>
    </div>

    <div class="game-container">
        <div class="message" id="message">スタートボタンを押して始めよう！</div>

        <div class="grid" id="grid">
            <!-- Cells will be generated by JavaScript -->
        </div>

        <button class="start-btn" id="startBtn" onclick="startGame()">ゲームスタート</button>
    </div>

    <script>
        const GRID_SIZE = 4;
        const TOTAL_CELLS = GRID_SIZE * GRID_SIZE;

        let level = 1;
        let score = 0;
        let lives = 3;
        let pattern = [];
        let playerPattern = [];
        let isShowingPattern = false;
        let canClick = false;

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            for (let i = 0; i < TOTAL_CELLS; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.onclick = () => handleCellClick(i);
                grid.appendChild(cell);
            }
        }

        function generatePattern() {
            const patternLength = Math.min(3 + level, TOTAL_CELLS - 1);
            pattern = [];

            while (pattern.length < patternLength) {
                const index = Math.floor(Math.random() * TOTAL_CELLS);
                if (!pattern.includes(index)) {
                    pattern.push(index);
                }
            }

            pattern.sort((a, b) => a - b);
        }

        async function showPattern() {
            isShowingPattern = true;
            canClick = false;

            const cells = document.querySelectorAll('.cell');

            // Clear all cells first
            cells.forEach(cell => {
                cell.classList.remove('active');
            });

            // Show pattern
            await sleep(500);

            for (const index of pattern) {
                cells[index].classList.add('active');
            }

            setMessage('パターンを覚えて...', 'info');

            await sleep(1000 + level * 200);

            // Hide pattern
            cells.forEach(cell => {
                cell.classList.remove('active');
            });

            setMessage('パターンを再現して！', 'info');
            canClick = true;
            isShowingPattern = false;
        }

        function handleCellClick(index) {
            if (!canClick || isShowingPattern) return;

            const cell = document.querySelectorAll('.cell')[index];

            if (playerPattern.includes(index)) {
                // Already clicked
                return;
            }

            playerPattern.push(index);
            cell.classList.add('active');

            // Check if this cell was part of the pattern
            if (!pattern.includes(index)) {
                // Wrong cell
                cell.classList.remove('active');
                cell.classList.add('error');
                lives--;
                updateStats();

                setTimeout(() => {
                    cell.classList.remove('error');

                    if (lives <= 0) {
                        gameOver();
                    } else {
                        setMessage('間違った！もう一度挑戦', 'error');
                        playerPattern = [];

                        setTimeout(() => {
                            showPattern();
                        }, 1500);
                    }
                }, 500);

                return;
            }

            // Check if player has completed the pattern
            if (playerPattern.length === pattern.length) {
                // Success!
                canClick = false;
                playerPattern.forEach(index => {
                    document.querySelectorAll('.cell')[index].classList.add('success');
                });

                const points = level * 100;
                score += points;
                level++;
                updateStats();

                setMessage(`正解！ +${points}点`, 'success');

                setTimeout(() => {
                    playerPattern = [];

                    document.querySelectorAll('.cell').forEach(cell => {
                        cell.classList.remove('active', 'success');
                    });

                    startRound();
                }, 1500);
            }
        }

        function startRound() {
            generatePattern();
            showPattern();
        }

        function startGame() {
            level = 1;
            score = 0;
            lives = 3;
            playerPattern = [];
            updateStats();

            document.getElementById('startBtn').disabled = true;

            createGrid();
            startRound();
        }

        function gameOver() {
            canClick = false;
            setMessage(`ゲームオーバー！最終スコア: ${score}`, 'error');

            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').textContent = 'もう一度プレイ';
        }

        function updateStats() {
            document.getElementById('level').textContent = level;
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
        }

        function setMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = 'message ' + type;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        createGrid();
    </script>
</body>
</html>
