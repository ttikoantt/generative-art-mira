<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Memory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.8);
        }
        .stat {
            font-size: 18px;
        }
        .stat span {
            color: #00d9ff;
            font-weight: bold;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px auto;
            max-width: 320px;
        }
        .cell {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        .cell.active {
            background: linear-gradient(135deg, #00d9ff 0%, #00ff88 100%);
            border-color: #00d9ff;
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.5);
        }
        .cell:active {
            transform: scale(0.95);
        }
        .cell.show {
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
            border-color: #ff6b6b;
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
        }
        .message {
            color: #fff;
            font-size: 20px;
            margin: 20px 0;
            min-height: 30px;
        }
        .btn {
            background: linear-gradient(135deg, #00d9ff 0%, #00ff88 100%);
            border: none;
            color: #1a1a2e;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 217, 255, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 100;
        }
        .fullscreen-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .fullscreen-btn:active {
            transform: scale(0.95);
        }
        @media (max-width: 400px) {
            .grid {
                gap: 10px;
                max-width: 280px;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    
    <div class="container">
        <h1>🧠 Pattern Memory</h1>
        
        <div class="stats">
            <div class="stat">Level: <span id="level">1</span></div>
            <div class="stat">Score: <span id="score">0</span></div>
        </div>
        
        <div class="grid" id="grid"></div>
        
        <div class="message" id="message">Watch the pattern...</div>
        
        <button class="btn" id="startBtn" onclick="startGame()">Start Game</button>
    </div>

    <script>
        const gridSize = 9;
        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let score = 0;
        let isShowing = false;
        let canClick = false;
        
        const grid = document.getElementById('grid');
        const message = document.getElementById('message');
        const startBtn = document.getElementById('startBtn');
        const levelDisplay = document.getElementById('level');
        const scoreDisplay = document.getElementById('score');
        
        // Create grid
        for (let i = 0; i < gridSize; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.index = i;
            cell.addEventListener('click', () => handleCellClick(i));
            cell.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleCellClick(i);
            });
            grid.appendChild(cell);
        }
        
        function startGame() {
            level = 1;
            score = 0;
            updateDisplay();
            startBtn.disabled = true;
            nextRound();
        }
        
        function nextRound() {
            sequence = [];
            playerSequence = [];
            const patternLength = Math.min(3 + Math.floor(level / 2), 7);
            
            for (let i = 0; i < patternLength; i++) {
                sequence.push(Math.floor(Math.random() * gridSize));
            }
            
            showPattern();
        }
        
        async function showPattern() {
            isShowing = true;
            canClick = false;
            message.textContent = 'Watch carefully...';
            
            const cells = document.querySelectorAll('.cell');
            
            // Clear all
            cells.forEach(c => c.classList.remove('show', 'active'));
            
            await sleep(500);
            
            for (let index of sequence) {
                cells[index].classList.add('show');
                await sleep(600);
                cells[index].classList.remove('show');
                await sleep(200);
            }
            
            isShowing = false;
            canClick = true;
            message.textContent = 'Your turn! Repeat the pattern';
        }
        
        function handleCellClick(index) {
            if (!canClick || isShowing) return;
            
            const cell = document.querySelector(`[data-index="${index}"]`);
            cell.classList.add('active');
            setTimeout(() => cell.classList.remove('active'), 200);
            
            playerSequence.push(index);
            
            // Check if correct so far
            const currentIndex = playerSequence.length - 1;
            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                gameOver();
                return;
            }
            
            // Check if complete
            if (playerSequence.length === sequence.length) {
                canClick = false;
                level++;
                score += level * 10;
                updateDisplay();
                message.textContent = 'Correct! Next level...';
                setTimeout(() => nextRound(), 1500);
            }
        }
        
        function gameOver() {
            canClick = false;
            message.textContent = `Game Over! Final Score: ${score}`;
            startBtn.disabled = false;
            startBtn.textContent = 'Play Again';
        }
        
        function updateDisplay() {
            levelDisplay.textContent = level;
            scoreDisplay.textContent = score;
        }
        
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
