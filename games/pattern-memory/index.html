<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Memory - パターン記憶ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
            font-size: 14px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #e94560;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px auto;
            max-width: 400px;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cell:hover {
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        .cell.active {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border-color: #e94560;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        .cell.success {
            background: linear-gradient(135deg, #00b894, #00cec9);
            border-color: #00b894;
            box-shadow: 0 0 20px rgba(0, 184, 148, 0.5);
        }

        .cell.error {
            background: linear-gradient(135deg, #d63031, #e17055);
            border-color: #d63031;
            box-shadow: 0 0 20px rgba(214, 48, 49, 0.5);
        }

        .cell.disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .message {
            font-size: 20px;
            margin: 20px 0;
            min-height: 30px;
            font-weight: bold;
        }

        .message.show {
            color: #00b894;
        }

        .message.memorize {
            color: #fdcb6e;
        }

        .message.gameover {
            color: #d63031;
        }

        .btn {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(233, 69, 96, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s);
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .instructions {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 24px;
            }
            .grid {
                max-width: 300px;
                gap: 8px;
            }
            .stat-value {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🧠 Pattern Memory</h1>
        <p class="subtitle">パターンを記憶して再現しよう！</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="level">1</div>
                <div class="stat-label">レベル</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">スコア</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="best">0</div>
                <div class="stat-label">ベスト</div>
            </div>
        </div>

        <div class="message" id="message">スタートボタンを押してね</div>

        <div class="grid" id="grid"></div>

        <button class="btn" id="startBtn" onclick="startGame()">スタート</button>

        <div class="instructions">
            <strong>遊び方:</strong><br>
            1. パターンが表示されるので覚えよう<br>
            2. 消えたら同じパターンを再現<br>
            3. 正解ならレベルアップ！
        </div>
    </div>

    <script>
        const gridSize = 16;
        let pattern = [];
        let playerPattern = [];
        let level = 1;
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('patternMemoryBest')) || 0;
        let isShowingPattern = false;
        let canClick = false;

        const grid = document.getElementById('grid');
        const messageEl = document.getElementById('message');
        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const startBtn = document.getElementById('startBtn');

        bestEl.textContent = bestScore;

        function initGrid() {
            grid.innerHTML = '';
            for (let i = 0; i < gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleCellClick(i));
                grid.appendChild(cell);
            }
        }

        function generatePattern() {
            pattern = [];
            const patternCount = Math.min(3 + Math.floor(level / 2), 8);
            const available = [...Array(gridSize).keys()];

            for (let i = 0; i < patternCount; i++) {
                const randomIndex = Math.floor(Math.random() * available.length);
                pattern.push(available[randomIndex]);
                available.splice(randomIndex, 1);
            }
        }

        function showPattern() {
            isShowingPattern = true;
            canClick = false;
            playerPattern = [];

            messageEl.textContent = `レベル ${level} - パターンを覚えて！`;
            messageEl.className = 'message memorize';

            // 全てのセルをリセット
            document.querySelectorAll('.cell').forEach(cell => {
                cell.className = 'cell disabled';
            });

            // パターンを表示
            pattern.forEach((index, i) => {
                setTimeout(() => {
                    const cell = document.querySelector(`[data-index="${index}"]`);
                    cell.classList.add('active');
                }, i * 300);
            });

            // パターンを隠す
            setTimeout(() => {
                document.querySelectorAll('.cell').forEach(cell => {
                    cell.classList.remove('active', 'disabled');
                });
                isShowingPattern = false;
                canClick = true;
                messageEl.textContent = '同じパターンをクリック！';
                messageEl.className = 'message';
            }, pattern.length * 300 + 1000);
        }

        function handleCellClick(index) {
            if (!canClick || isShowingPattern) return;

            const cell = document.querySelector(`[data-index="${index}"]`);

            if (playerPattern.includes(index)) return;

            if (pattern.includes(index)) {
                cell.classList.add('success');
                playerPattern.push(index);

                if (playerPattern.length === pattern.length) {
                    levelComplete();
                }
            } else {
                cell.classList.add('error');
                gameOver();
            }
        }

        function levelComplete() {
            canClick = false;
            const bonus = level * 100;
            score += bonus;

            messageEl.textContent = `正解！ +${bonus}ポイント`;
            messageEl.className = 'message show';

            levelEl.textContent = level;
            scoreEl.textContent = score;

            setTimeout(() => {
                level++;
                startBtn.style.display = 'inline-block';
                startBtn.textContent = '次のレベルへ';
                messageEl.textContent = '準備はいい？';
            }, 1500);
        }

        function gameOver() {
            canClick = false;

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('patternMemoryBest', bestScore);
                bestEl.textContent = bestScore;
                messageEl.textContent = `🎉 新記録！ スコア: ${score}`;
            } else {
                messageEl.textContent = `ゲームオーバー！ スコア: ${score}`;
            }

            messageEl.className = 'message gameover';

            level = 1;
            score = 0;
            levelEl.textContent = level;
            scoreEl.textContent = score;

            startBtn.style.display = 'inline-block';
            startBtn.textContent = 'もう一度';
        }

        function startGame() {
            startBtn.style.display = 'none';
            levelEl.textContent = level;
            scoreEl.textContent = score;

            initGrid();
            generatePattern();
            showPattern();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        initGrid();
    </script>
</body>
</html>
