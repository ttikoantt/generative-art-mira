<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Memory | Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0f0f23 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        .container {
            text-align: center;
        }
        h1 {
            color: #00ffff;
            margin-bottom: 20px;
            font-size: 28px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        .info {
            color: #ffffff;
            margin-bottom: 20px;
            font-size: 16px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 0 auto;
            max-width: 400px;
        }
        .cell {
            width: 100px;
            height: 100px;
            background: linear-gradient(145deg, #1a1a3e, #0f0f23);
            border: 2px solid #00ffff;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
        }
        .cell:active {
            transform: scale(0.95);
        }
        .cell.active {
            background: linear-gradient(145deg, #00ffff, #00cccc);
            color: #000;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.7);
        }
        .cell:hover:not(.active):not(.disabled) {
            background: linear-gradient(145deg, #2a2a5e, #1f1f43);
        }
        .cell.disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }
        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            background: #00ffff;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover {
            background: #00cccc;
            transform: scale(1.05);
        }
        button:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            color: #00ffff;
            font-size: 20px;
            margin-top: 20px;
            min-height: 30px;
            font-weight: bold;
        }
        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #00ffff;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            z-index: 1000;
        }
        .fullscreen-btn:hover {
            background: #00cccc;
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            .grid {
                gap: 10px;
            }
            .cell {
                width: 80px;
                height: 80px;
                font-size: 20px;
            }
            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>
    
    <div class="container">
        <h1>🎮 Pattern Memory</h1>
        <div class="info">
            レベル: <span id="level">1</span> | 
            スコア: <span id="score">0</span> |
            ハイスコア: <span id="highscore">0</span>
        </div>
        <div class="grid" id="grid"></div>
        <div class="message" id="message"></div>
        <div class="controls">
            <button id="startBtn" onclick="startGame()">スタート</button>
        </div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const messageEl = document.getElementById('message');
        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');
        const highscoreEl = document.getElementById('highscore');
        const startBtn = document.getElementById('startBtn');

        const gridSize = 9;
        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let score = 0;
        let highScore = 0;
        let isShowing = false;
        let isGameActive = false;

        // Initialize grid
        function initGrid() {
            grid.innerHTML = '';
            for (let i = 0; i < gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell disabled';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleCellClick(i));
                grid.appendChild(cell);
            }
        }

        // Generate sequence
        function generateSequence() {
            const newStep = Math.floor(Math.random() * gridSize);
            sequence.push(newStep);
        }

        // Show sequence
        async function showSequence() {
            isShowing = true;
            isGameActive = false;
            messageEl.textContent = '順番を覚えて...';
            
            disableGrid(true);

            for (let i = 0; i < sequence.length; i++) {
                await delay(300);
                await flashCell(sequence[i]);
            }

            await delay(500);
            isShowing = false;
            isGameActive = true;
            playerSequence = [];
            messageEl.textContent = '同じ順番でタップ！';
            disableGrid(false);
        }

        // Flash cell
        function flashCell(index) {
            return new Promise(resolve => {
                const cells = document.querySelectorAll('.cell');
                cells[index].classList.add('active');
                
                // Play tone
                playTone(index);
                
                setTimeout(() => {
                    cells[index].classList.remove('active');
                    setTimeout(resolve, 100);
                }, 400);
            });
        }

        // Play tone
        function playTone(index) {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                const frequencies = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33];
                oscillator.frequency.value = frequencies[index];
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.3);
            } catch (e) {
                // Audio not supported
            }
        }

        // Handle cell click
        function handleCellClick(index) {
            if (isShowing || !isGameActive) return;

            const cells = document.querySelectorAll('.cell');
            cells[index].classList.add('active');
            playTone(index);
            setTimeout(() => cells[index].classList.remove('active'), 200);

            playerSequence.push(index);

            const currentIndex = playerSequence.length - 1;
            
            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                gameOver();
                return;
            }

            if (playerSequence.length === sequence.length) {
                // Level complete
                score += level * 10;
                scoreEl.textContent = score;
                level++;
                levelEl.textContent = level;
                messageEl.textContent = '正解！次のレベルへ...';
                isGameActive = false;
                disableGrid(true);
                
                setTimeout(() => {
                    generateSequence();
                    showSequence();
                }, 1500);
            }
        }

        // Game over
        function gameOver() {
            isGameActive = false;
            disableGrid(true);
            
            if (score > highScore) {
                highScore = score;
                highscoreEl.textContent = highScore;
                messageEl.textContent = `🎉 新記録！スコア: ${score}`;
            } else {
                messageEl.textContent = `ゲームオーバー！スコア: ${score}`;
            }
            
            startBtn.textContent = 'もう一度プレイ';
            startBtn.disabled = false;
        }

        // Start game
        function startGame() {
            sequence = [];
            playerSequence = [];
            level = 1;
            score = 0;
            isGameActive = true;
            
            levelEl.textContent = level;
            scoreEl.textContent = score;
            startBtn.disabled = true;
            startBtn.textContent = 'プレイ中...';
            
            generateSequence();
            showSequence();
        }

        // Disable/enable grid
        function disableGrid(disabled) {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                if (disabled) {
                    cell.classList.add('disabled');
                } else {
                    cell.classList.remove('disabled');
                }
            });
        }

        // Delay helper
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        initGrid();
    </script>
</body>
</html>
