<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Memory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #fff;
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #0ff;
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat {
            color: #888;
            font-size: 14px;
        }

        .stat span {
            color: #0ff;
            font-size: 24px;
            font-weight: bold;
            margin-left: 5px;
        }

        .grid {
            display: grid;
            gap: 8px;
            margin: 20px auto;
            max-width: 400px;
        }

        .cell {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .cell:hover {
            border-color: rgba(0, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .cell.selected {
            background: linear-gradient(135deg, #0ff 0%, #00f 100%);
            box-shadow: 0 0 20px #0ff;
            border-color: #0ff;
        }

        .cell.show {
            background: linear-gradient(135deg, #ff0 0%, #f00 100%);
            box-shadow: 0 0 20px #ff0;
            border-color: #ff0;
        }

        .cell.correct {
            background: linear-gradient(135deg, #0f0 0%, #0ff 100%);
            box-shadow: 0 0 20px #0f0;
        }

        .cell.wrong {
            background: linear-gradient(135deg, #f00 0%, #f0f 100%);
            box-shadow: 0 0 20px #f00;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .message {
            color: #fff;
            font-size: 18px;
            margin: 20px 0;
            min-height: 27px;
            text-shadow: 0 0 10px currentColor;
        }

        .message.memorize {
            color: #ff0;
        }

        .message.reproduce {
            color: #0ff;
        }

        .message.success {
            color: #0f0;
        }

        .message.fail {
            color: #f00;
        }

        .btn {
            background: linear-gradient(135deg, #0ff 0%, #00f 100%);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #0ff;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .timer {
            color: #fff;
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 0 20px #0ff;
        }

        .timer.warning {
            color: #f00;
            animation: pulse 0.5s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .progress {
            width: 100%;
            max-width: 400px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin: 20px auto;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #0ff 0%, #00f 100%);
            transition: width 0.3s ease;
        }

        @media (max-width: 500px) {
            h1 {
                font-size: 24px;
            }

            .cell {
                width: 55px;
                height: 55px;
            }

            .timer {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Pattern Memory</h1>

        <div class="stats">
            <div class="stat">Level: <span id="level">1</span></div>
            <div class="stat">Score: <span id="score">0</span></div>
            <div class="stat">High Score: <span id="highScore">0</span></div>
        </div>

        <div class="message" id="message">Start Game to begin!</div>
        <div class="timer" id="timer"></div>

        <div class="progress">
            <div class="progress-bar" id="progressBar" style="width: 0%"></div>
        </div>

        <div class="grid" id="grid"></div>

        <button class="btn" id="startBtn">Start Game</button>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const message = document.getElementById('message');
        const timer = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');
        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const progressBar = document.getElementById('progressBar');

        // Game state
        let gridSize = 3;
        let pattern = [];
        let selected = [];
        let level = 1;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('patternMemoryHighScore')) || 0;
        let showTime = 2000;
        let timeLimit = 10000;
        let timeRemaining = 0;
        let gamePhase = 'idle'; // idle, showing, playing, result

        highScoreEl.textContent = highScore;

        function createGrid() {
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;

            for (let i = 0; i < gridSize * gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleCellClick(i));
                grid.appendChild(cell);
            }
        }

        function generatePattern() {
            const cells = gridSize * gridSize;
            const patternCount = Math.min(3 + Math.floor(level / 2), cells);
            pattern = [];

            const indices = Array.from({ length: cells }, (_, i) => i);

            for (let i = 0; i < patternCount; i++) {
                const randomIndex = Math.floor(Math.random() * indices.length);
                pattern.push(indices[randomIndex]);
                indices.splice(randomIndex, 1);
            }
        }

        function showPattern() {
            gamePhase = 'showing';
            message.textContent = 'Memorize the pattern!';
            message.className = 'message memorize';
            startBtn.disabled = true;

            const cells = document.querySelectorAll('.cell');

            pattern.forEach(index => {
                cells[index].classList.add('show');
            });

            setTimeout(() => {
                cells.forEach(cell => cell.classList.remove('show'));
                startPlaying();
            }, showTime);
        }

        function startPlaying() {
            gamePhase = 'playing';
            selected = [];
            message.textContent = 'Reproduce the pattern!';
            message.className = 'message reproduce';

            timeRemaining = timeLimit;
            updateTimer();

            const timerInterval = setInterval(() => {
                if (gamePhase !== 'playing') {
                    clearInterval(timerInterval);
                    return;
                }

                timeRemaining -= 100;
                updateTimer();

                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    endGame(false);
                }
            }, 100);
        }

        function updateTimer() {
            const seconds = Math.ceil(timeRemaining / 1000);
            timer.textContent = seconds;

            if (timeRemaining <= 3000) {
                timer.className = 'timer warning';
            } else {
                timer.className = 'timer';
            }

            const progress = ((timeLimit - timeRemaining) / timeLimit) * 100;
            progressBar.style.width = `${progress}%`;
        }

        function handleCellClick(index) {
            if (gamePhase !== 'playing') return;
            if (selected.includes(index)) return;

            const cells = document.querySelectorAll('.cell');
            selected.push(index);
            cells[index].classList.add('selected');

            // Check if this cell is in the pattern
            if (pattern.includes(index)) {
                cells[index].classList.add('correct');
            } else {
                cells[index].classList.add('wrong');
                setTimeout(() => endGame(false), 500);
                return;
            }

            // Check if all pattern cells are selected
            if (selected.length === pattern.length) {
                setTimeout(() => endGame(true), 300);
            }
        }

        function endGame(success) {
            gamePhase = 'result';
            const cells = document.querySelectorAll('.cell');

            if (success) {
                const timeBonus = Math.floor(timeRemaining / 100);
                const levelBonus = level * 10;
                const roundScore = timeBonus + levelBonus;
                score += roundScore;

                message.textContent = `✓ Perfect! +${roundScore} points`;
                message.className = 'message success';

                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('patternMemoryHighScore', highScore);
                    highScoreEl.textContent = highScore;
                }

                level++;
                gridSize = Math.min(3 + Math.floor(level / 3), 5);
                showTime = Math.max(1000, 2000 - level * 100);
                timeLimit = Math.max(5000, 10000 - level * 500);

                levelEl.textContent = level;
                scoreEl.textContent = score;

                setTimeout(() => {
                    createGrid();
                    generatePattern();
                    showPattern();
                }, 1500);
            } else {
                message.textContent = `✗ Game Over! Final Score: ${score}`;
                message.className = 'message fail';

                // Show the correct pattern
                cells.forEach((cell, index) => {
                    cell.classList.remove('selected', 'correct', 'wrong');
                    if (pattern.includes(index)) {
                        cell.classList.add('show');
                    }
                });

                startBtn.disabled = false;
                startBtn.textContent = 'Play Again';
                timer.textContent = '';
                progressBar.style.width = '100%';
            }
        }

        function startGame() {
            level = 1;
            score = 0;
            gridSize = 3;
            showTime = 2000;
            timeLimit = 10000;

            levelEl.textContent = level;
            scoreEl.textContent = score;

            createGrid();
            generatePattern();
            showPattern();
        }

        startBtn.addEventListener('click', startGame);

        // Initialize
        createGrid();
    </script>
</body>
</html>
