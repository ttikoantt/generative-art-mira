<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pattern Memory Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            color: white;
        }

        .game-container {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .stat {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .stat-value {
            font-weight: bold;
            color: #4ecdc4;
        }

        .grid {
            display: grid;
            gap: 10px;
            margin: 20px auto;
            max-width: 400px;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .cell::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 80%;
            height: 80%;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border-radius: 50%;
            transition: transform 0.3s;
        }

        .cell.active::before {
            transform: translate(-50%, -50%) scale(1);
        }

        .cell.selected::before {
            background: linear-gradient(135deg, #4ecdc4, #45b7aa);
        }

        .cell.correct::before {
            background: linear-gradient(135deg, #51cf66, #40c057);
        }

        .cell.wrong::before {
            background: linear-gradient(135deg, #ff6b6b, #fa5252);
        }

        .cell:active {
            transform: scale(0.95);
        }

        .message {
            font-size: 1.5rem;
            margin: 20px 0;
            min-height: 40px;
            font-weight: bold;
        }

        .message.success {
            color: #51cf66;
        }

        .message.error {
            color: #ff6b6b;
        }

        .start-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(78, 205, 196, 0.3);
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .preview-bar {
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin: 15px 0;
            overflow: hidden;
        }

        .preview-progress {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4);
            width: 100%;
            transition: width 0.1s linear;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.5rem;
            }

            .stats {
                gap: 15px;
                font-size: 1rem;
            }

            .stat {
                padding: 8px 15px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">⛶</button>

    <div class="game-container">
        <h1>🎯 Pattern Memory</h1>
        
        <div class="stats">
            <div class="stat">
                レベル: <span class="stat-value" id="level">1</span>
            </div>
            <div class="stat">
                スコア: <span class="stat-value" id="score">0</span>
            </div>
        </div>

        <div class="message" id="message">スタートボタンを押してね！</div>
        
        <div class="preview-bar" id="previewBar" style="display: none;">
            <div class="preview-progress" id="previewProgress"></div>
        </div>

        <div class="grid" id="grid"></div>

        <button class="start-btn" id="startBtn">🎮 ゲームスタート</button>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const message = document.getElementById('message');
        const levelDisplay = document.getElementById('level');
        const scoreDisplay = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');
        const previewBar = document.getElementById('previewBar');
        const previewProgress = document.getElementById('previewProgress');

        let level = 1;
        let score = 0;
        let gridSize = 2;
        let pattern = [];
        let selected = [];
        let isShowingPattern = false;
        let canClick = false;
        let cells = [];

        function initGrid() {
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            cells = [];

            for (let i = 0; i < gridSize * gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleCellClick(i));
                grid.appendChild(cell);
                cells.push(cell);
            }
        }

        function generatePattern() {
            const totalCells = gridSize * gridSize;
            const patternLength = Math.min(3 + Math.floor(level / 2), totalCells - 1);
            pattern = [];

            while (pattern.length < patternLength) {
                const index = Math.floor(Math.random() * totalCells);
                if (!pattern.includes(index)) {
                    pattern.push(index);
                }
            }
        }

        async function showPattern() {
            isShowingPattern = true;
            canClick = false;
            selected = [];

            // Clear previous selections
            cells.forEach(cell => {
                cell.classList.remove('active', 'selected', 'correct', 'wrong');
            });

            message.textContent = 'パターンを覚えてね！';
            message.className = 'message';

            // Show preview bar
            previewBar.style.display = 'block';
            const showTime = Math.max(1000, 2000 - level * 100);
            const startTime = Date.now();

            const progressInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const progress = Math.max(0, 100 - (elapsed / showTime * 100));
                previewProgress.style.width = progress + '%';
            }, 16);

            // Highlight pattern cells one by one
            for (let i = 0; i < pattern.length; i++) {
                await sleep(showTime / pattern.length / 2);
                cells[pattern[i]].classList.add('active');
                await sleep(showTime / pattern.length / 2);
                cells[pattern[i]].classList.remove('active');
            }

            clearInterval(progressInterval);
            previewBar.style.display = 'none';

            await sleep(300);

            isShowingPattern = false;
            canClick = true;
            message.textContent = 'パターンを再現してね！';
        }

        function handleCellClick(index) {
            if (!canClick || isShowingPattern) return;
            if (selected.includes(index)) return;

            const cell = cells[index];
            cell.classList.add('selected');
            selected.push(index);

            if (selected.length === pattern.length) {
                canClick = false;
                checkPattern();
            }
        }

        function checkPattern() {
            let correct = 0;
            let wrong = 0;

            selected.forEach((index, i) => {
                if (pattern[i] === index) {
                    cells[index].classList.add('correct');
                    correct++;
                } else {
                    cells[index].classList.add('wrong');
                    wrong++;
                }
            });

            if (correct === pattern.length && wrong === 0) {
                // Success!
                score += level * 10;
                scoreDisplay.textContent = score;
                message.textContent = '🎉 完璧！';
                message.className = 'message success';

                setTimeout(() => {
                    nextLevel();
                }, 1500);
            } else {
                // Game over
                message.textContent = `ゲームオーバー！ スコア: ${score}`;
                message.className = 'message error';
                startBtn.textContent = '🔄 もう一度';
                startBtn.style.display = 'block';

                // Reveal correct pattern
                cells.forEach((cell, i) => {
                    if (pattern.includes(i)) {
                        cell.classList.add('correct');
                    }
                });
            }
        }

        function nextLevel() {
            level++;

            // Increase grid size every 3 levels
            if (level > 1 && (level - 1) % 3 === 0 && gridSize < 5) {
                gridSize++;
                initGrid();
            }

            levelDisplay.textContent = level;
            startBtn.style.display = 'none';

            setTimeout(() => {
                generatePattern();
                showPattern();
            }, 500);
        }

        function startGame() {
            level = 1;
            score = 0;
            gridSize = 2;
            selected = [];

            levelDisplay.textContent = level;
            scoreDisplay.textContent = score;
            startBtn.style.display = 'none';
            message.className = 'message';

            initGrid();
            generatePattern();

            setTimeout(() => {
                showPattern();
            }, 500);
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Fullscreen
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Start button
        startBtn.addEventListener('click', startGame);

        // Initialize
        initGrid();
    </script>
</body>
</html>
