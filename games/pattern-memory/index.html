<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pattern Memory - パターン記憶ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1e3a5f 0%, #0a1628 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #64b5f6;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .stat {
            font-size: 1.2em;
        }
        
        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #64b5f6;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px auto;
            max-width: 350px;
        }
        
        .cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(100, 181, 246, 0.3);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
        }
        
        .cell.active {
            background: linear-gradient(135deg, #64b5f6, #42a5f5);
            border-color: #64b5f6;
            box-shadow: 0 0 20px rgba(100, 181, 246, 0.5);
            transform: scale(1.05);
        }
        
        .cell.selected {
            background: linear-gradient(135deg, #81c784, #66bb6a);
            border-color: #81c784;
            box-shadow: 0 0 20px rgba(129, 199, 132, 0.5);
            transform: scale(1.05);
        }
        
        .cell:active {
            transform: scale(0.95);
        }
        
        .message {
            margin: 20px 0;
            padding: 15px;
            background: rgba(100, 181, 246, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 1.1em;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #64b5f6, #42a5f5);
            border-radius: 4px;
            transition: width 0.1s;
        }
        
        .btn {
            background: linear-gradient(135deg, #64b5f6, #42a5f5);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px;
            font-weight: bold;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(100, 181, 246, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 1.5em;
            }
            
            .grid {
                gap: 8px;
                max-width: 300px;
            }
            
            .stat {
                font-size: 1em;
            }
            
            .stat-value {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    
    <div class="container">
        <h1>🎮 Pattern Memory</h1>
        
        <div class="stats">
            <div class="stat">
                レベル<br>
                <span class="stat-value" id="level">1</span>
            </div>
            <div class="stat">
                スコア<br>
                <span class="stat-value" id="score">0</span>
            </div>
            <div class="stat">
                ライフ<br>
                <span class="stat-value" id="lives">3</span>
            </div>
        </div>
        
        <div class="message" id="message">スタートボタンを押してね！</div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>
        
        <div class="grid" id="grid"></div>
        
        <button class="btn" id="startBtn" onclick="startGame()">スタート</button>
    </div>
    
    <script>
        const GRID_SIZE = 4;
        const GRID_CELLS = GRID_SIZE * GRID_SIZE;
        
        let level = 1;
        let score = 0;
        let lives = 3;
        let pattern = [];
        let selected = [];
        let gameState = 'idle'; // idle, showing, memorizing, playing, result
        let showTime = 2000;
        
        const grid = document.getElementById('grid');
        const messageEl = document.getElementById('message');
        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const progressEl = document.getElementById('progress');
        const startBtn = document.getElementById('startBtn');
        
        // グリッドの初期化
        function initGrid() {
            grid.innerHTML = '';
            for (let i = 0; i < GRID_CELLS; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.onclick = () => handleCellClick(i);
                grid.appendChild(cell);
            }
        }
        
        // パターンを生成
        function generatePattern() {
            const numToActivate = Math.min(3 + Math.floor(level / 2), 8);
            pattern = [];
            
            while (pattern.length < numToActivate) {
                const index = Math.floor(Math.random() * GRID_CELLS);
                if (!pattern.includes(index)) {
                    pattern.push(index);
                }
            }
        }
        
        // パターンを表示
        function showPattern() {
            gameState = 'showing';
            messageEl.textContent = 'パターンを覚えてね！';
            
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, i) => {
                if (pattern.includes(i)) {
                    cell.classList.add('active');
                }
            });
            
            // プログレスバーのアニメーション
            let elapsed = 0;
            const interval = 50;
            const progressInterval = setInterval(() => {
                elapsed += interval;
                const percentage = (elapsed / showTime) * 100;
                progressEl.style.width = percentage + '%';
                
                if (elapsed >= showTime) {
                    clearInterval(progressInterval);
                    hidePattern();
                }
            }, interval);
        }
        
        // パターンを隠す
        function hidePattern() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.classList.remove('active');
            });
            
            gameState = 'playing';
            selected = [];
            progressEl.style.width = '0%';
            messageEl.textContent = 'パターンを再現してね！';
        }
        
        // セルクリック処理
        function handleCellClick(index) {
            if (gameState !== 'playing') return;
            
            const cell = document.querySelectorAll('.cell')[index];
            
            if (selected.includes(index)) {
                // 選択解除
                selected = selected.filter(i => i !== index);
                cell.classList.remove('selected');
            } else {
                // 選択追加
                selected.push(index);
                cell.classList.add('selected');
                
                // 選択完了チェック
                if (selected.length === pattern.length) {
                    setTimeout(checkResult, 300);
                }
            }
        }
        
        // 結果チェック
        function checkResult() {
            const correct = selected.length === pattern.length && 
                          selected.every(i => pattern.includes(i));
            
            if (correct) {
                score += level * 100;
                scoreEl.textContent = score;
                
                messageEl.textContent = '🎉 正解！次のレベルへ！';
                messageEl.style.background = 'rgba(129, 199, 132, 0.3)';
                
                level++;
                levelEl.textContent = level;
                showTime = Math.max(1000, 2000 - level * 100);
                
                setTimeout(() => {
                    messageEl.style.background = 'rgba(100, 181, 246, 0.2)';
                    startRound();
                }, 1500);
            } else {
                lives--;
                livesEl.textContent = lives;
                
                if (lives <= 0) {
                    gameOver();
                } else {
                    messageEl.textContent = `❌ 間違い！残りライフ: ${lives}`;
                    messageEl.style.background = 'rgba(244, 67, 54, 0.3)';
                    
                    setTimeout(() => {
                        messageEl.style.background = 'rgba(100, 181, 246, 0.2)';
                        // 同じレベルで再挑戦
                        selected = [];
                        const cells = document.querySelectorAll('.cell');
                        cells.forEach(cell => cell.classList.remove('selected'));
                        startRound();
                    }, 1500);
                }
            }
        }
        
        // ラウンド開始
        function startRound() {
            generatePattern();
            showPattern();
        }
        
        // ゲームオーバー
        function gameOver() {
            gameState = 'result';
            messageEl.textContent = `ゲームオーバー！最終スコア: ${score} (レベル${level})`;
            messageEl.style.background = 'rgba(244, 67, 54, 0.3)';
            startBtn.textContent = 'もう一度プレイ';
            startBtn.style.display = 'inline-block';
        }
        
        // ゲーム開始
        function startGame() {
            level = 1;
            score = 0;
            lives = 3;
            showTime = 2000;
            
            levelEl.textContent = level;
            scoreEl.textContent = score;
            livesEl.textContent = lives;
            
            startBtn.style.display = 'none';
            
            selected = [];
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => cell.classList.remove('selected', 'active'));
            
            startRound();
        }
        
        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        // 初期化
        initGrid();
    </script>
</body>
</html>
