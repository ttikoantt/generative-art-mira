<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Memory | Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            padding: 20px;
        }

        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 2rem;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .stats {
            display: flex;
            gap: 40px;
            color: #fff;
            font-size: 1.2rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #4ecdc4;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .tile {
            width: 120px;
            height: 120px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            border: 3px solid rgba(255, 255, 255, 0.1);
        }

        .tile.red { background: #e74c3c; }
        .tile.blue { background: #3498db; }
        .tile.green { background: #2ecc71; }
        .tile.yellow { background: #f1c40f; }

        .tile:active {
            transform: scale(0.95);
        }

        .tile.active {
            transform: scale(1.1);
            box-shadow: 0 0 40px currentColor;
        }

        .message {
            color: #fff;
            font-size: 1.5rem;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
                margin-bottom: 15px;
            }

            .stats {
                gap: 20px;
                padding: 10px 20px;
                font-size: 1rem;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            .tile {
                width: 80px;
                height: 80px;
            }

            .message {
                font-size: 1rem;
                padding: 10px 20px;
            }

            .grid {
                gap: 10px;
                padding: 15px;
            }
        }

        @media (max-width: 400px) {
            .tile {
                width: 70px;
                height: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="controls">
        <button onclick="toggleFullscreen()">📺 全画面</button>
    </div>

    <h1>🎮 Pattern Memory</h1>

    <div class="game-container">
        <div class="stats">
            <div class="stat">
                <div>SCORE</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div>BEST</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
            <div class="stat">
                <div>LEVEL</div>
                <div class="stat-value" id="level">1</div>
            </div>
        </div>

        <div class="grid" id="grid"></div>

        <div class="message" id="message">Tap to Start</div>
    </div>

    <script>
        const colors = ['red', 'blue', 'green', 'yellow'];
        const grid = document.getElementById('grid');
        const message = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        const highScoreDisplay = document.getElementById('highScore');
        const levelDisplay = document.getElementById('level');

        let sequence = [];
        let playerSequence = [];
        let score = 0;
        let highScore = parseInt(localStorage.getItem('patternMemoryHighScore')) || 0;
        let level = 1;
        let isShowingSequence = false;
        let isPlayerTurn = false;

        function initGrid() {
            grid.innerHTML = '';
            colors.forEach((color, index) => {
                const tile = document.createElement('div');
                tile.className = `tile ${color}`;
                tile.dataset.color = color;
                tile.addEventListener('click', () => handleTileClick(color));
                grid.appendChild(tile);
            });
            highScoreDisplay.textContent = highScore;
        }

        function addToSequence() {
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            sequence.push(randomColor);
        }

        async function showSequence() {
            isShowingSequence = true;
            isPlayerTurn = false;
            message.textContent = 'Watch carefully...';
            playerSequence = [];

            await sleep(500);

            for (let color of sequence) {
                await flashTile(color);
                await sleep(300);
            }

            isShowingSequence = false;
            isPlayerTurn = true;
            message.textContent = 'Your turn!';
        }

        async function flashTile(color) {
            const tile = document.querySelector(`.tile.${color}`);
            tile.classList.add('active');
            playTone(color);

            await sleep(400);

            tile.classList.remove('active');
        }

        function handleTileClick(color) {
            if (!isPlayerTurn || isShowingSequence) return;

            flashTile(color);
            playerSequence.push(color);

            const currentIndex = playerSequence.length - 1;

            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                gameOver();
                return;
            }

            if (playerSequence.length === sequence.length) {
                score += level * 10;
                scoreDisplay.textContent = score;
                level++;
                levelDisplay.textContent = level;
                message.textContent = 'Correct! 🎉';
                isPlayerTurn = false;

                setTimeout(() => {
                    addToSequence();
                    showSequence();
                }, 1500);
            }
        }

        function gameOver() {
            isPlayerTurn = false;
            message.textContent = `Game Over! Score: ${score}`;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('patternMemoryHighScore', highScore);
                highScoreDisplay.textContent = highScore;
                message.textContent = `New High Score! 🏆 ${score}`;
            }

            // Flash all tiles red
            document.querySelectorAll('.tile').forEach(tile => {
                tile.style.boxShadow = '0 0 40px #e74c3c';
                setTimeout(() => {
                    tile.style.boxShadow = '';
                }, 500);
            });

            setTimeout(() => {
                message.textContent = 'Tap to Start';
            }, 2000);
        }

        function startGame() {
            if (isPlayerTurn || isShowingSequence) return;

            sequence = [];
            playerSequence = [];
            score = 0;
            level = 1;
            scoreDisplay.textContent = score;
            levelDisplay.textContent = level;

            addToSequence();
            showSequence();
        }

        function playTone(color) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            const frequencies = {
                red: 261.63,
                blue: 329.63,
                green: 392.00,
                yellow: 523.25
            };

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = frequencies[color];
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        message.addEventListener('click', startGame);

        initGrid();
    </script>
</body>
</html>
