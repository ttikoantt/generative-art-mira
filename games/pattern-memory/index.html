<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Memory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 10px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px 25px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            margin-bottom: 5px;
        }

        .stat-value {
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px auto;
            max-width: 320px;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .cell:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.4);
        }

        .cell.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(240, 147, 251, 0.6);
        }

        .cell.success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            animation: successPulse 0.5s;
        }

        .cell.error {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            animation: errorShake 0.5s;
        }

        .cell.revealed {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        }

        @keyframes successPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .message {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 16px;
            color: #333;
            font-weight: 500;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .button {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .progress {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .progress-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .progress-dot.completed {
            background: #4facfe;
        }

        .progress-dot.current {
            background: #f093fb;
            transform: scale(1.3);
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🧠 Pattern Memory</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">レベル</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">ハイスコア</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>

        <div class="message" id="message">スタートボタンを押してね！</div>

        <div class="progress" id="progress"></div>

        <div class="grid" id="grid"></div>

        <button class="button" id="startBtn" onclick="startGame()">スタート</button>
    </div>

    <script>
        const gridSize = 4;
        const totalCells = gridSize * gridSize;

        let level = 1;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('patternMemoryHighScore')) || 0;
        let pattern = [];
        let playerPattern = [];
        let isShowingPattern = false;
        let canClick = false;
        let cells = [];

        // Initialize grid
        function initGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            cells = [];

            for (let i = 0; i < totalCells; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.addEventListener('click', () => handleCellClick(i));
                cell.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    handleCellClick(i);
                });
                grid.appendChild(cell);
                cells.push(cell);
            }
        }

        function generatePattern() {
            pattern = [];
            const patternLength = Math.min(2 + level, 8);

            for (let i = 0; i < patternLength; i++) {
                let randomCell;
                do {
                    randomCell = Math.floor(Math.random() * totalCells);
                } while (pattern.includes(randomCell));
                pattern.push(randomCell);
            }
        }

        async function showPattern() {
            isShowingPattern = true;
            canClick = false;
            updateMessage('パターンを覚えてね！');

            // Clear all cells first
            cells.forEach(cell => {
                cell.classList.remove('active', 'revealed');
            });

            await sleep(300);

            for (const cellIndex of pattern) {
                cells[cellIndex].classList.add('revealed');
                await sleep(500 + level * 50);
            }

            await sleep(1000 + level * 100);

            cells.forEach(cell => {
                cell.classList.remove('revealed');
            });

            isShowingPattern = false;
            canClick = true;
            updateMessage('パターンを再現してね！');
        }

        function handleCellClick(index) {
            if (!canClick || isShowingPattern) return;

            if (playerPattern.includes(index)) return;

            cells[index].classList.add('active');

            const currentIndex = playerPattern.length;

            if (pattern[currentIndex] === index) {
                // Correct
                playerPattern.push(index);
                cells[index].classList.add('success');
                updateProgress();

                if (playerPattern.length === pattern.length) {
                    // Level complete
                    canClick = false;
                    score += level * 10;
                    updateStats();
                    updateMessage('素晴らしい！ 🎉');

                    setTimeout(() => {
                        level++;
                        updateStats();
                        nextLevel();
                    }, 1500);
                }
            } else {
                // Wrong
                canClick = false;
                cells[index].classList.add('error');
                updateMessage('間違った！ 😢');

                // Show correct pattern
                setTimeout(() => {
                    pattern.forEach((cellIndex, i) => {
                        setTimeout(() => {
                            cells[cellIndex].classList.add('revealed');
                        }, i * 200);
                    });
                }, 500);

                // Game over
                setTimeout(() => {
                    gameOver();
                }, 2000);
            }
        }

        function updateProgress() {
            const progress = document.getElementById('progress');
            progress.innerHTML = '';

            for (let i = 0; i < pattern.length; i++) {
                const dot = document.createElement('div');
                dot.className = 'progress-dot';
                if (i < playerPattern.length) {
                    dot.classList.add('completed');
                } else if (i === playerPattern.length) {
                    dot.classList.add('current');
                }
                progress.appendChild(dot);
            }
        }

        function nextLevel() {
            playerPattern = [];
            updateProgress();
            generatePattern();
            setTimeout(() => {
                showPattern();
            }, 500);
        }

        function gameOver() {
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('patternMemoryHighScore', highScore);
                updateMessage(`🎊 新ハイスコア！ ${highScore}点 🎊`);
            } else {
                updateMessage(`ゲームオーバー！ スコア: ${score}`);
            }

            updateStats();
            document.getElementById('startBtn').textContent = 'もう一度';
        }

        function startGame() {
            level = 1;
            score = 0;
            playerPattern = [];
            updateStats();
            updateProgress();
            document.getElementById('startBtn').textContent = 'リスタート';

            // Clear cells
            cells.forEach(cell => {
                cell.classList.remove('active', 'success', 'error', 'revealed');
            });

            generatePattern();
            setTimeout(() => {
                showPattern();
            }, 500);
        }

        function updateStats() {
            document.getElementById('level').textContent = level;
            document.getElementById('score').textContent = score;
            document.getElementById('highScore').textContent = highScore;
        }

        function updateMessage(msg) {
            document.getElementById('message').textContent = msg;
        }

        function updateProgress() {
            const progress = document.getElementById('progress');
            progress.innerHTML = '';

            for (let i = 0; i < pattern.length; i++) {
                const dot = document.createElement('div');
                dot.className = 'progress-dot';
                if (i < playerPattern.length) {
                    dot.classList.add('completed');
                } else if (i === playerPattern.length && canClick) {
                    dot.classList.add('current');
                }
                progress.appendChild(dot);
            }
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        initGrid();
        updateStats();
    </script>
</body>
</html>
