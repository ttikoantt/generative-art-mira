<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pattern Memory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .score {
            color: #00ff88;
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 400px;
            margin: 0 auto;
            aspect-ratio: 1;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .cell:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .cell.active {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            border-color: #00ff88;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
            transform: scale(1.05);
        }

        .cell.correct {
            background: linear-gradient(135deg, #00bfff 0%, #0099cc 100%);
            border-color: #00bfff;
            box-shadow: 0 0 30px rgba(0, 191, 255, 0.6);
        }

        .cell.wrong {
            background: linear-gradient(135deg, #ff4757 0%, #cc3333 100%);
            border-color: #ff4757;
            box-shadow: 0 0 30px rgba(255, 71, 87, 0.6);
            animation: shake 0.3s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .message {
            color: #fff;
            font-size: 1.2rem;
            margin-top: 20px;
            min-height: 1.5em;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .btn {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            border: none;
            color: #1a1a2e;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 25px rgba(0, 255, 136, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            border-radius: 20px;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }

            .grid {
                gap: 8px;
                max-width: 320px;
            }

            .cell {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <div class="container">
        <h1>🎮 Pattern Memory</h1>
        <div class="score">Level: <span id="level">1</span> | Best: <span id="best">0</span></div>
        <div class="grid" id="grid"></div>
        <div class="message" id="message">Watch the pattern...</div>
        <button class="btn" id="startBtn" onclick="startGame()">Start Game</button>
    </div>

    <script>
        const gridSize = 16;
        const grid = document.getElementById('grid');
        const message = document.getElementById('message');
        const startBtn = document.getElementById('startBtn');
        const levelSpan = document.getElementById('level');
        const bestSpan = document.getElementById('best');

        let pattern = [];
        let playerPattern = [];
        let level = 1;
        let bestScore = 0;
        let isShowing = false;
        let canClick = false;

        // Emojis for cells
        const emojis = ['⭐', '🌟', '✨', '💫', '🔥', '💎', '🌈', '🎯', '🎪', '🎨', '🎭', '🎪', '🎠', '🎡', '🎢', '🎲'];

        // Initialize grid
        function initGrid() {
            grid.innerHTML = '';
            for (let i = 0; i < gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleCellClick(i));
                cell.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    handleCellClick(i);
                }, { passive: false });
                grid.appendChild(cell);
            }
        }

        function handleCellClick(index) {
            if (!canClick || isShowing) return;

            const cell = grid.children[index];
            cell.classList.add('correct');
            setTimeout(() => cell.classList.remove('correct'), 200);

            playerPattern.push(index);

            // Check if correct
            const currentIndex = playerPattern.length - 1;
            if (playerPattern[currentIndex] !== pattern[currentIndex]) {
                gameOver();
                return;
            }

            // Check if pattern complete
            if (playerPattern.length === pattern.length) {
                canClick = false;
                message.textContent = '✨ Perfect! Next level...';
                setTimeout(() => {
                    level++;
                    levelSpan.textContent = level;
                    startRound();
                }, 1000);
            }
        }

        function startGame() {
            level = 1;
            pattern = [];
            playerPattern = [];
            levelSpan.textContent = level;
            startBtn.style.display = 'none';
            startRound();
        }

        function startRound() {
            playerPattern = [];
            pattern = generatePattern(level + 2);
            showMessagePattern();
        }

        function generatePattern(length) {
            const newPattern = [];
            for (let i = 0; i < length; i++) {
                newPattern.push(Math.floor(Math.random() * gridSize));
            }
            return newPattern;
        }

        async function showMessagePattern() {
            isShowing = true;
            canClick = false;
            message.textContent = '👀 Watch carefully...';

            for (let i = 0; i < pattern.length; i++) {
                await new Promise(resolve => setTimeout(resolve, 300));
                const cell = grid.children[pattern[i]];
                cell.classList.add('active');
                cell.textContent = emojis[pattern[i] % emojis.length];

                await new Promise(resolve => setTimeout(resolve, 400));

                cell.classList.remove('active');
                cell.textContent = '';
            }

            isShowing = false;
            canClick = true;
            message.textContent = '🎯 Repeat the pattern!';
        }

        function gameOver() {
            canClick = false;
            message.textContent = `❌ Game Over! Level: ${level}`;

            // Show correct cells
            pattern.forEach((index, i) => {
                setTimeout(() => {
                    const cell = grid.children[index];
                    cell.classList.add('active');
                    cell.textContent = emojis[index % emojis.length];
                    setTimeout(() => {
                        cell.classList.remove('active');
                        cell.textContent = '';
                    }, 200);
                }, i * 100);
            });

            // Update best score
            if (level > bestScore) {
                bestScore = level;
                bestSpan.textContent = bestScore;
            }

            setTimeout(() => {
                startBtn.style.display = 'inline-block';
                startBtn.textContent = 'Try Again';
            }, 1500);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        initGrid();
    </script>
</body>
</html>
