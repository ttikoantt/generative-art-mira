<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Memory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }

        h1 {
            color: #00ff88;
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .stats {
            color: #ffffff;
            font-size: 18px;
            margin-bottom: 20px;
            display: flex;
            gap: 30px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            color: #00ff88;
        }

        .message {
            color: #ffffff;
            font-size: 20px;
            margin-bottom: 20px;
            min-height: 30px;
            text-align: center;
        }

        .message.show {
            animation: pulse 0.5s ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .grid {
            display: grid;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .cell {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .cell:hover:not(.disabled) {
            background: rgba(0, 255, 136, 0.3);
            transform: scale(1.05);
        }

        .cell.active {
            background: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
            border-color: #00ff88;
        }

        .cell.pattern {
            background: #ff6b6b;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.6);
            border-color: #ff6b6b;
        }

        .cell.disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .cell.correct {
            background: #00ff88;
            animation: correctPulse 0.5s;
        }

        .cell.wrong {
            background: #ff6b6b;
            animation: wrongPulse 0.5s;
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @keyframes wrongPulse {
            0%, 100% { transform: scale(1); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        button {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            border: none;
            color: #1a1a2e;
            padding: 15px 30px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(0, 255, 136, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s;
            box-shadow: none;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 136, 0.4);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 24px;
            }

            .stats {
                font-size: 14px;
                gap: 20px;
            }

            .stat-value {
                font-size: 20px;
            }

            .grid {
                gap: 5px;
                padding: 15px;
            }

            .cell {
                width: 50px;
                height: 50px;
            }

            button {
                padding: 12px 24px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <h1>🎯 Pattern Memory</h1>

    <div class="stats">
        <div class="stat">
            <div class="stat-label">LEVEL</div>
            <div class="stat-value" id="level">1</div>
        </div>
        <div class="stat">
            <div class="stat-label">SCORE</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">BEST</div>
            <div class="stat-value" id="best">0</div>
        </div>
    </div>

    <div class="message" id="message">Watch the pattern!</div>

    <div class="grid" id="grid"></div>

    <div class="controls">
        <button onclick="startGame()">▶ Start Game</button>
        <button onclick="showRules()">❓ Rules</button>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        const GRID_SIZES = [3, 3, 4, 4, 4, 5, 5, 5, 5, 6];
        const PATTERN_COUNTS = [3, 3, 4, 4, 5, 5, 6, 6, 7, 8];
        const SHOW_TIMES = [2000, 1800, 1600, 1500, 1400, 1300, 1200, 1100, 1000, 900];

        let level = 1;
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('patternMemoryBest')) || 0;
        let gridSize = GRID_SIZES[0];
        let pattern = [];
        let playerPattern = [];
        let isShowingPattern = false;
        let isGameActive = false;

        const grid = document.getElementById('grid');
        const messageEl = document.getElementById('message');
        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');

        bestEl.textContent = bestScore;

        function initGrid() {
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;

            for (let i = 0; i < gridSize * gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleCellClick(i));
                grid.appendChild(cell);
            }
        }

        function generatePattern() {
            const totalCells = gridSize * gridSize;
            const patternCount = PATTERN_COUNTS[Math.min(level - 1, PATTERN_COUNTS.length - 1)];
            const newPattern = [];

            while (newPattern.length < patternCount) {
                const randomIndex = Math.floor(Math.random() * totalCells);
                if (!newPattern.includes(randomIndex)) {
                    newPattern.push(randomIndex);
                }
            }

            return newPattern;
        }

        function showMessage(text) {
            messageEl.textContent = text;
            messageEl.classList.remove('show');
            void messageEl.offsetWidth;
            messageEl.classList.add('show');
        }

        async function showPattern() {
            isShowingPattern = true;
            showMessage('Watch carefully!');

            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => cell.classList.add('disabled'));

            // Show pattern
            pattern.forEach(index => {
                cells[index].classList.add('pattern');
            });

            // Hide pattern after time
            const showTime = SHOW_TIMES[Math.min(level - 1, SHOW_TIMES.length - 1)];
            await sleep(showTime);

            pattern.forEach(index => {
                cells[index].classList.remove('pattern');
            });

            cells.forEach(cell => cell.classList.remove('disabled'));
            isShowingPattern = false;
            showMessage('Your turn! Recreate the pattern');
        }

        function handleCellClick(index) {
            if (isShowingPattern || !isGameActive) return;

            const cells = document.querySelectorAll('.cell');
            const cell = cells[index];

            if (playerPattern.includes(index)) {
                // Already clicked, remove it
                playerPattern = playerPattern.filter(i => i !== index);
                cell.classList.remove('active');
            } else {
                // Add to pattern
                playerPattern.push(index);
                cell.classList.add('active');

                // Check if complete
                if (playerPattern.length === pattern.length) {
                    checkPattern();
                }
            }
        }

        function checkPattern() {
            const isCorrect = playerPattern.length === pattern.length &&
                playerPattern.every((val, index) => val === pattern[index]);

            const cells = document.querySelectorAll('.cell');

            if (isCorrect) {
                // Correct!
                const bonus = level * 100;
                score += bonus;
                scoreEl.textContent = score;
                showMessage(`✓ Correct! +${bonus} points`);

                cells.forEach(cell => {
                    if (pattern.includes(parseInt(cell.dataset.index))) {
                        cell.classList.add('correct');
                    }
                });

                setTimeout(() => {
                    levelUp();
                }, 1500);
            } else {
                // Wrong!
                cells.forEach(cell => {
                    cell.classList.add('wrong');
                });
                showMessage('✗ Wrong pattern! Game Over');
                isGameActive = false;

                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('patternMemoryBest', bestScore);
                    bestEl.textContent = bestScore;
                    setTimeout(() => {
                        showMessage(`🎉 New Best: ${bestScore}!`);
                    }, 1500);
                }

                setTimeout(() => {
                    showMessage('Click Start Game to play again');
                }, 2500);
            }
        }

        function levelUp() {
            level++;
            levelEl.textContent = level;

            // Update grid size
            const sizeIndex = Math.min(level - 1, GRID_SIZES.length - 1);
            gridSize = GRID_SIZES[sizeIndex];
            initGrid();

            // Start next round
            setTimeout(() => {
                startRound();
            }, 1000);
        }

        function startRound() {
            pattern = generatePattern();
            playerPattern = [];
            showPattern();
        }

        function startGame() {
            level = 1;
            score = 0;
            levelEl.textContent = level;
            scoreEl.textContent = score;
            isGameActive = true;

            const sizeIndex = Math.min(level - 1, GRID_SIZES.length - 1);
            gridSize = GRID_SIZES[sizeIndex];
            initGrid();

            startRound();
        }

        function showRules() {
            showMessage('Watch the pattern, then recreate it!');
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        initGrid();
        showMessage('Click Start Game to begin!');
    </script>
</body>
</html>
