<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pattern Memory - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            color: white;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            width: 90%;
            text-align: center;
        }

        h1 {
            font-size: clamp(24px, 5vw, 36px);
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            font-size: clamp(14px, 3vw, 18px);
        }

        .stat {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            color: #888;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #0ff;
            font-size: 24px;
            font-weight: bold;
        }

        .grid {
            display: grid;
            gap: 10px;
            margin: 0 auto;
            max-width: 400px;
            aspect-ratio: 1;
        }

        .tile {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .tile.active {
            background: rgba(0, 255, 255, 0.8);
            border-color: #0ff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            transform: scale(1.05);
        }

        .tile.correct {
            background: rgba(0, 255, 100, 0.8);
            border-color: #0f6;
            box-shadow: 0 0 20px rgba(0, 255, 100, 0.5);
        }

        .tile.wrong {
            background: rgba(255, 0, 100, 0.8);
            border-color: #f06;
            box-shadow: 0 0 20px rgba(255, 0, 100, 0.5);
            animation: shake 0.5s;
        }

        .tile.show {
            background: rgba(255, 200, 0, 0.8);
            border-color: #fc0;
            box-shadow: 0 0 20px rgba(255, 200, 0, 0.5);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .message {
            margin-top: 30px;
            font-size: clamp(16px, 4vw, 20px);
            min-height: 30px;
            color: #0ff;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: rgba(0, 255, 255, 0.2);
            border: 2px solid #0ff;
            color: white;
            padding: 12px 24px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }

        button:hover {
            background: rgba(0, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            font-size: 14px;
            z-index: 1000;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            font-size: 14px;
            text-decoration: none;
            color: white;
            border-radius: 8px;
            z-index: 1000;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            .grid {
                gap: 6px;
            }

            .tile {
                border-width: 1px;
            }

            button {
                padding: 10px 20px;
                font-size: 14px;
            }
        }

        .phase-indicator {
            margin-top: 20px;
            font-size: 18px;
            color: #fc0;
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-btn">← 戻る</a>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🎮 Pattern Memory #833</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">レベル</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">ライフ</div>
                <div class="stat-value" id="lives">3</div>
            </div>
        </div>

        <div class="grid" id="grid"></div>

        <div class="phase-indicator" id="phaseIndicator"></div>

        <div class="message" id="message">スタートボタンを押してね！</div>

        <div class="controls">
            <button onclick="startGame()">スタート</button>
            <button onclick="resetGame()">リセット</button>
        </div>
    </div>

    <script>
        let gridSize = 3;
        let pattern = [];
        let playerPattern = [];
        let level = 1;
        let score = 0;
        let lives = 3;
        let isShowingPattern = false;
        let isPlayerTurn = false;

        const grid = document.getElementById('grid');
        const message = document.getElementById('message');
        const levelDisplay = document.getElementById('level');
        const scoreDisplay = document.getElementById('score');
        const livesDisplay = document.getElementById('lives');
        const phaseIndicator = document.getElementById('phaseIndicator');

        function createGrid() {
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;

            for (let i = 0; i < gridSize * gridSize; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.dataset.index = i;
                tile.addEventListener('click', handleTileClick);
                grid.appendChild(tile);
            }
        }

        function generatePattern() {
            const numTiles = Math.min(3 + level, gridSize * gridSize);
            pattern = [];

            for (let i = 0; i < numTiles; i++) {
                let index;
                do {
                    index = Math.floor(Math.random() * (gridSize * gridSize));
                } while (pattern.includes(index));
                pattern.push(index);
            }
        }

        function showPattern() {
            isShowingPattern = true;
            isPlayerTurn = false;
            playerPattern = [];

            message.textContent = 'パターンを覚えてね！';
            phaseIndicator.textContent = '表示中...';

            const tiles = document.querySelectorAll('.tile');

            pattern.forEach((index, i) => {
                setTimeout(() => {
                    tiles[index].classList.add('show');
                    setTimeout(() => {
                        tiles[index].classList.remove('show');
                    }, 500);
                }, i * 600);
            });

            setTimeout(() => {
                isShowingPattern = false;
                isPlayerTurn = true;
                message.textContent = 'パターンを再現してね！';
                phaseIndicator.textContent = 'あなたのターン！';
            }, pattern.length * 600 + 500);
        }

        function handleTileClick(e) {
            if (isShowingPattern || !isPlayerTurn) return;

            const tile = e.target;
            const index = parseInt(tile.dataset.index);

            if (playerPattern.includes(index)) return;

            playerPattern.push(index);

            if (pattern.includes(index)) {
                tile.classList.add('correct');
                setTimeout(() => tile.classList.remove('correct'), 300);

                if (playerPattern.length === pattern.length) {
                    // Correct!
                    score += level * 10;
                    scoreDisplay.textContent = score;
                    message.textContent = '正解！ 🎉';
                    phaseIndicator.textContent = '';

                    setTimeout(() => {
                        level++;
                        levelDisplay.textContent = level;

                        if (level % 3 === 1 && gridSize < 5) {
                            gridSize++;
                            createGrid();
                        }

                        startRound();
                    }, 1500);
                }
            } else {
                // Wrong!
                tile.classList.add('wrong');
                lives--;
                livesDisplay.textContent = lives;

                if (lives <= 0) {
                    gameOver();
                } else {
                    message.textContent = `間違い！残りライフ: ${lives}`;
                    phaseIndicator.textContent = '';

                    setTimeout(() => {
                        showPattern();
                    }, 1500);
                }
            }
        }

        function startRound() {
            generatePattern();
            setTimeout(showPattern, 1000);
        }

        function startGame() {
            level = 1;
            score = 0;
            lives = 3;
            gridSize = 3;

            levelDisplay.textContent = level;
            scoreDisplay.textContent = score;
            livesDisplay.textContent = lives;

            createGrid();
            startRound();
        }

        function resetGame() {
            level = 1;
            score = 0;
            lives = 3;
            gridSize = 3;

            levelDisplay.textContent = level;
            scoreDisplay.textContent = score;
            livesDisplay.textContent = lives;

            isShowingPattern = false;
            isPlayerTurn = false;

            createGrid();
            message.textContent = 'スタートボタンを押してね！';
            phaseIndicator.textContent = '';
        }

        function gameOver() {
            isPlayerTurn = false;
            message.textContent = `ゲームオーバー！ スコア: ${score}`;
            phaseIndicator.textContent = '';
        }

        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        }

        // Initialize
        createGrid();
    </script>
</body>
</html>
