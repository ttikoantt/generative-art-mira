<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Memory - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 1.8rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            color: #fff;
            min-width: 100px;
        }

        .stat-label {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .lives {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .heart {
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }

        .heart.lost {
            opacity: 0.2;
            transform: scale(0.8);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 350px;
            margin: 0 auto 20px;
            aspect-ratio: 1;
        }

        .cell {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .cell:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .cell:active {
            transform: scale(0.95);
        }

        .cell.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.6);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .cell.correct {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            box-shadow: 0 0 30px rgba(67, 233, 123, 0.6);
        }

        .cell.wrong {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            box-shadow: 0 0 30px rgba(250, 112, 154, 0.6);
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .message {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 20px;
            min-height: 30px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button.fullscreen-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .overlay h2 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .overlay p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .overlay .final-score {
            font-size: 3rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.4rem;
            }

            .grid {
                max-width: 100%;
                gap: 8px;
            }

            .stat {
                min-width: 80px;
                padding: 8px 15px;
            }

            .stat-value {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 Pattern Memory</h1>
        <p class="subtitle">パターンを覚えて、同じ順番でタップ！</p>

        <div class="lives" id="lives">
            <span class="heart">❤️</span>
            <span class="heart">❤️</span>
            <span class="heart">❤️</span>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">LEVEL</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">BEST</div>
                <div class="stat-value" id="best">0</div>
            </div>
        </div>

        <div class="message" id="message">スタートボタンを押してね！</div>

        <div class="grid" id="grid"></div>

        <div class="buttons">
            <button id="start">▶️ スタート</button>
            <button id="restart" style="display: none;">🔄 もう一度</button>
            <button id="fullscreen" class="fullscreen-btn">📺 全画面</button>
        </div>
    </div>

    <div class="overlay" id="overlay">
        <h2>Game Over!</h2>
        <p>素晴らしい挑戦でした！</p>
        <div class="final-score" id="finalScore">0</div>
        <button id="playAgain">🎮 もう一度遊ぶ</button>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const messageEl = document.getElementById('message');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const bestEl = document.getElementById('best');
        const livesEl = document.getElementById('lives');
        const startBtn = document.getElementById('start');
        const restartBtn = document.getElementById('restart');
        const fullscreenBtn = document.getElementById('fullscreen');
        const overlay = document.getElementById('overlay');
        const finalScoreEl = document.getElementById('finalScore');
        const playAgainBtn = document.getElementById('playAgain');

        const GRID_SIZE = 9;
        const INITIAL_LIVES = 3;

        let pattern = [];
        let playerInput = [];
        let score = 0;
        let level = 1;
        let lives = INITIAL_LIVES;
        let bestScore = parseInt(localStorage.getItem('patternMemoryBest')) || 0;
        let isShowingPattern = false;
        let gameStarted = false;

        bestEl.textContent = bestScore;

        // グリッドを作成
        function createGrid() {
            grid.innerHTML = '';
            for (let i = 0; i < GRID_SIZE; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', handleCellClick);
                grid.appendChild(cell);
            }
        }

        // パターンを生成
        function generatePattern() {
            const length = 3 + level;
            pattern = [];
            for (let i = 0; i < length; i++) {
                pattern.push(Math.floor(Math.random() * GRID_SIZE));
            }
        }

        // パターンを表示
        async function showPattern() {
            isShowingPattern = true;
            messageEl.textContent = 'パターンを覚えてね...';
            playerInput = [];

            await sleep(500);

            for (let i = 0; i < pattern.length; i++) {
                const cell = grid.children[pattern[i]];
                cell.classList.add('active');
                await sleep(400);
                cell.classList.remove('active');
                await sleep(200);
            }

            messageEl.textContent = 'あなたの番！';
            isShowingPattern = false;
        }

        // セルをクリック
        function handleCellClick(e) {
            if (isShowingPattern || !gameStarted) return;

            const cell = e.target;
            const index = parseInt(cell.dataset.index);

            cell.classList.add('active');
            setTimeout(() => cell.classList.remove('active'), 200);

            playerInput.push(index);

            // 正誤判定
            const currentStep = playerInput.length - 1;
            if (playerInput[currentStep] !== pattern[currentStep]) {
                // 間違った！
                cell.classList.add('wrong');
                setTimeout(() => cell.classList.remove('wrong'), 500);

                lives--;
                updateLives();

                if (lives <= 0) {
                    gameOver();
                } else {
                    messageEl.textContent = `間違った！残りライフ: ${lives}`;
                    playerInput = [];
                    setTimeout(() => {
                        showPattern();
                    }, 1500);
                }
                return;
            }

            // 正解！
            cell.classList.add('correct');
            setTimeout(() => cell.classList.remove('correct'), 200);

            if (playerInput.length === pattern.length) {
                // パターン完成！
                score += level * 10;
                level++;
                scoreEl.textContent = score;
                levelEl.textContent = level;

                if (score > bestScore) {
                    bestScore = score;
                    bestEl.textContent = bestScore;
                    localStorage.setItem('patternMemoryBest', bestScore);
                }

                messageEl.textContent = `素晴らしい！次のレベルへ！`;

                setTimeout(() => {
                    generatePattern();
                    showPattern();
                }, 1500);
            }
        }

        // ライフを更新
        function updateLives() {
            const hearts = livesEl.querySelectorAll('.heart');
            hearts.forEach((heart, index) => {
                if (index < lives) {
                    heart.classList.remove('lost');
                } else {
                    heart.classList.add('lost');
                }
            });
        }

        // ゲームオーバー
        function gameOver() {
            gameStarted = false;
            messageEl.textContent = 'ゲームオーバー...';
            finalScoreEl.textContent = score;
            overlay.classList.add('show');
            startBtn.style.display = 'none';
            restartBtn.style.display = 'inline-block';
        }

        // ゲームを開始
        function startGame() {
            score = 0;
            level = 1;
            lives = INITIAL_LIVES;
            gameStarted = true;

            scoreEl.textContent = score;
            levelEl.textContent = level;
            updateLives();

            startBtn.style.display = 'none';
            restartBtn.style.display = 'none';

            generatePattern();
            showPattern();
        }

        // ヘルパー関数
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // イベントリスナー
        startBtn.addEventListener('click', startGame);

        restartBtn.addEventListener('click', () => {
            overlay.classList.remove('show');
            startGame();
        });

        playAgainBtn.addEventListener('click', () => {
            overlay.classList.remove('show');
            startGame();
        });

        fullscreenBtn.addEventListener('click', () => {
            const container = document.querySelector('.container');
            if (container.requestFullscreen) {
                container.requestFullscreen();
            } else if (container.webkitRequestFullscreen) {
                container.webkitRequestFullscreen();
            }
        });

        // タッチ操作の最適化
        document.querySelectorAll('.cell').forEach(cell => {
            cell.addEventListener('touchstart', (e) => {
                e.preventDefault();
                cell.click();
            });
        });

        // 初期化
        createGrid();
    </script>
</body>
</html>
