<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Memory - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #fff;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 20px;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            flex: 1;
        }
        .stat-box .label {
            color: #aaa;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        .stat-box .value {
            color: #fff;
            font-size: 2em;
            font-weight: bold;
        }
        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
            aspect-ratio: 1;
        }
        .cell {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            position: relative;
            overflow: hidden;
        }
        .cell:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        .cell.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.7);
            animation: pulse 0.5s ease-out;
        }
        .cell.correct {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            box-shadow: 0 0 30px rgba(56, 239, 125, 0.7);
        }
        .cell.wrong {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            animation: shake 0.5s;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .message {
            color: #fff;
            font-size: 1.2em;
            margin-bottom: 20px;
            min-height: 30px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1em;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            z-index: 100;
        }
        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 1.1em;
            z-index: 100;
        }
        .back-link:hover {
            color: #fff;
        }
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }
            .game-board {
                gap: 10px;
            }
            .cell {
                font-size: 1.5em;
            }
            .stats {
                flex-direction: column;
                gap: 10px;
            }
            .fullscreen {
                top: auto;
                bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <a href="../" class="back-link">← 戻る</a>

    <div class="container">
        <h1>🧠 Pattern Memory</h1>

        <div class="stats">
            <div class="stat-box">
                <div class="label">レベル</div>
                <div class="value" id="level">1</div>
            </div>
            <div class="stat-box">
                <div class="label">スコア</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="label">ハイスコア</div>
                <div class="value" id="highScore">0</div>
            </div>
        </div>

        <div class="game-board" id="board"></div>

        <div class="message" id="message">スタートボタンを押してね！</div>

        <div class="controls">
            <button class="btn" id="startBtn" onclick="startGame()">スタート</button>
            <button class="btn" id="nextBtn" onclick="nextLevel()" style="display: none;">次のレベル</button>
        </div>
    </div>

    <button class="btn fullscreen" onclick="toggleFullscreen()">全画面</button>

    <script>
        const GRID_SIZE = 4;
        const EMOJIS = ['🌟', '💎', '🔮', '🎭', '🦋', '🌸', '🎪', '🎯', '🚀', '⚡', '🔥', '💫', '🌈', '🎨', '🎭', '🦋'];

        let level = 1;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('patternMemoryHighScore')) || 0;
        let pattern = [];
        let playerPattern = [];
        let isShowing = false;
        let canClick = false;

        function init() {
            createBoard();
            updateStats();
        }

        function createBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleClick(i));
                board.appendChild(cell);
            }
        }

        function updateStats() {
            document.getElementById('level').textContent = level;
            document.getElementById('score').textContent = score;
            document.getElementById('highScore').textContent = highScore;
        }

        function generatePattern(length) {
            const indices = [];
            while (indices.length < length) {
                const idx = Math.floor(Math.random() * (GRID_SIZE * GRID_SIZE));
                if (!indices.includes(idx)) {
                    indices.push(idx);
                }
            }
            return indices;
        }

        function showPattern() {
            isShowing = true;
            canClick = false;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('message').textContent = 'パターンを覚えてね...';

            const cells = document.querySelectorAll('.cell');
            const emoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];

            pattern.forEach((idx, i) => {
                setTimeout(() => {
                    const cell = cells[idx];
                    cell.classList.add('active');
                    cell.textContent = emoji;
                    setTimeout(() => {
                        cell.classList.remove('active');
                        cell.textContent = '';
                    }, 400);
                }, i * 600);
            });

            setTimeout(() => {
                isShowing = false;
                canClick = true;
                document.getElementById('message').textContent = 'パターンを再現してね！';
            }, pattern.length * 600 + 500);
        }

        function handleClick(index) {
            if (!canClick || isShowing) return;

            const cell = document.querySelectorAll('.cell')[index];
            cell.classList.add('active');
            setTimeout(() => cell.classList.remove('active'), 200);

            playerPattern.push(index);

            if (playerPattern[playerPattern.length - 1] !== pattern[playerPattern.length - 1]) {
                gameOver();
                return;
            }

            if (playerPattern.length === pattern.length) {
                levelComplete();
            }
        }

        function levelComplete() {
            canClick = false;
            const cells = document.querySelectorAll('.cell');
            pattern.forEach(idx => {
                cells[idx].classList.add('correct');
            });

            score += level * 10;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('patternMemoryHighScore', highScore);
            }
            updateStats();

            document.getElementById('message').textContent = '🎉 正解！次のレベルへ！';
            document.getElementById('nextBtn').style.display = 'inline-block';
        }

        function gameOver() {
            canClick = false;
            const cells = document.querySelectorAll('.cell');
            pattern.forEach(idx => {
                cells[idx].classList.add('wrong');
            });

            document.getElementById('message').textContent = `💀 ゲームオーバー！ スコア: ${score}`;
            document.getElementById('startBtn').textContent = 'もう一度';
            document.getElementById('startBtn').disabled = false;
        }

        function startGame() {
            level = 1;
            score = 0;
            updateStats();

            document.getElementById('startBtn').textContent = 'スタート';
            document.getElementById('nextBtn').style.display = 'none';

            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.classList.remove('correct', 'wrong');
            });

            pattern = generatePattern(3);
            playerPattern = [];
            showPattern();
        }

        function nextLevel() {
            level++;
            updateStats();

            document.getElementById('nextBtn').style.display = 'none';

            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.classList.remove('correct', 'wrong');
            });

            pattern = generatePattern(Math.min(3 + level - 1, 10));
            playerPattern = [];
            showPattern();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        init();
    </script>
</body>
</html>
