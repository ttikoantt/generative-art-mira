<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Memory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            color: white;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.8;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            border: 3px solid transparent;
            user-select: none;
        }

        .cell.active {
            background: rgba(255, 255, 255, 0.9);
            color: #667eea;
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .cell.selected {
            border-color: rgba(255, 255, 255, 0.9);
            transform: scale(1.05);
        }

        .cell.hidden {
            background: rgba(255, 255, 255, 0.1);
            color: transparent;
        }

        .cell.correct {
            background: rgba(76, 217, 100, 0.9);
            animation: pulse 0.5s;
        }

        .cell.wrong {
            background: rgba(255, 59, 48, 0.9);
            animation: shake 0.5s;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .message {
            text-align: center;
            color: white;
            font-size: 18px;
            min-height: 27px;
            margin-bottom: 15px;
        }

        .timer-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .timer-progress {
            height: 100%;
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            transition: width 0.1s;
        }

        #fullscreen-btn {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        #fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .cell {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 Pattern Memory</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Level</div>
                <div class="stat-value" id="level">1</div>
            </div>
        </div>

        <div class="message" id="message">Memorize the pattern!</div>

        <div class="timer-bar">
            <div class="timer-progress" id="timer"></div>
        </div>

        <div class="grid" id="grid"></div>

        <button id="fullscreen-btn">⛶ Fullscreen</button>
    </div>

    <script>
        const gridSize = 16;
        const grid = document.getElementById('grid');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const messageEl = document.getElementById('message');
        const timerEl = document.getElementById('timer');

        let pattern = [];
        let playerPattern = [];
        let score = 0;
        let level = 1;
        let isShowing = true;
        let timerInterval;

        function initGrid() {
            grid.innerHTML = '';
            for (let i = 1; i <= gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = i;
                cell.dataset.number = i;
                cell.addEventListener('click', handleCellClick);
                grid.appendChild(cell);
            }
        }

        function generatePattern() {
            const length = Math.min(3 + Math.floor(level / 2), 8);
            const numbers = [];
            while (numbers.length < length) {
                const num = Math.floor(Math.random() * gridSize) + 1;
                if (!numbers.includes(num)) {
                    numbers.push(num);
                }
            }
            return numbers;
        }

        function showPattern() {
            isShowing = true;
            pattern = generatePattern();
            playerPattern = [];
            messageEl.textContent = 'Memorize!';

            // Show pattern
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.classList.remove('active', 'selected', 'correct', 'wrong');
                if (pattern.includes(parseInt(cell.dataset.number))) {
                    cell.classList.add('active');
                }
            });

            // Timer
            const time = Math.max(3000 - level * 200, 1500);
            timerEl.style.width = '100%';
            let progress = 100;
            timerInterval = setInterval(() => {
                progress -= 100 / (time / 50);
                timerEl.style.width = `${progress}%`;
            }, 50);

            // Hide after delay
            setTimeout(() => {
                clearInterval(timerInterval);
                cells.forEach(cell => {
                    cell.classList.remove('active');
                    cell.classList.add('hidden');
                });
                isShowing = false;
                messageEl.textContent = 'Reproduce the pattern!';
                timerEl.style.width = '0%';
            }, time);
        }

        function handleCellClick(e) {
            if (isShowing) return;

            const number = parseInt(e.target.dataset.number);
            const cell = e.target;

            if (playerPattern.includes(number)) {
                playerPattern = playerPattern.filter(n => n !== number);
                cell.classList.remove('selected');
            } else {
                playerPattern.push(number);
                cell.classList.add('selected');

                // Check if pattern length matches
                if (playerPattern.length === pattern.length) {
                    checkPattern();
                }
            }
        }

        function checkPattern() {
            const cells = document.querySelectorAll('.cell');
            const correct = pattern.sort().toString() === [...playerPattern].sort().toString();

            if (correct) {
                score += level * 100;
                level++;
                scoreEl.textContent = score;
                levelEl.textContent = level;
                messageEl.textContent = '✅ Correct!';

                // Flash green
                playerPattern.forEach(num => {
                    const cell = document.querySelector(`[data-number="${num}"]`);
                    cell.classList.add('correct');
                    cell.classList.remove('selected', 'hidden');
                });

                setTimeout(() => {
                    showPattern();
                }, 1500);
            } else {
                messageEl.textContent = '❌ Game Over!';

                // Flash wrong
                pattern.forEach(num => {
                    const cell = document.querySelector(`[data-number="${num}"]`);
                    cell.classList.remove('hidden');
                    if (playerPattern.includes(num)) {
                        cell.classList.add('correct');
                    } else {
                        cell.classList.add('active');
                    }
                });

                playerPattern.forEach(num => {
                    if (!pattern.includes(num)) {
                        const cell = document.querySelector(`[data-number="${num}"]`);
                        cell.classList.remove('hidden');
                        cell.classList.add('wrong');
                    }
                });

                setTimeout(() => {
                    // Reset
                    score = 0;
                    level = 1;
                    scoreEl.textContent = score;
                    levelEl.textContent = level;
                    showPattern();
                }, 3000);
            }
        }

        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Initialize
        initGrid();
        setTimeout(showPattern, 1000);
    </script>
</body>
</html>
