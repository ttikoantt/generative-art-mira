<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pattern Memory | Game by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
        }
        
        h1 {
            color: #eee;
            margin-bottom: 10px;
            font-size: 24px;
            text-align: center;
        }
        
        .info {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
        }
        
        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
        }
        
        .stat {
            color: #4ecdc4;
            font-size: 18px;
            font-weight: bold;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .cell {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .cell:active {
            transform: scale(0.95);
        }
        
        .cell.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }
        
        .cell.correct {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border-color: #11998e;
            box-shadow: 0 0 20px rgba(17, 153, 142, 0.5);
        }
        
        .cell.wrong {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            border-color: #eb3349;
            box-shadow: 0 0 20px rgba(235, 51, 73, 0.5);
        }
        
        .message {
            color: #fff;
            font-size: 16px;
            margin-bottom: 15px;
            min-height: 24px;
            text-align: center;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        #fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        #fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        @media (max-width: 480px) {
            .cell {
                width: 50px;
                height: 50px;
            }
            
            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <h1>🧠 Pattern Memory</h1>
    <div class="info" id="info">パターンを覚えて再現しよう！</div>
    
    <div class="stats">
        <div class="stat">レベル: <span id="level">1</span></div>
        <div class="stat">スコア: <span id="score">0</span></div>
    </div>
    
    <div class="grid" id="grid"></div>
    
    <div class="message" id="message">スタートボタンを押してね</div>
    <button class="btn" id="start-btn">スタート</button>
    
    <button id="fullscreen-btn">全画面表示</button>
    
    <script>
        const GRID_SIZE = 5;
        const TOTAL_CELLS = GRID_SIZE * GRID_SIZE;
        
        let level = 1;
        let score = 0;
        let pattern = [];
        let playerPattern = [];
        let isShowingPattern = false;
        let canClick = false;
        
        const grid = document.getElementById('grid');
        const startBtn = document.getElementById('start-btn');
        const message = document.getElementById('message');
        const levelDisplay = document.getElementById('level');
        const scoreDisplay = document.getElementById('score');
        const info = document.getElementById('info');
        
        // グリッドを作成
        function createGrid() {
            grid.innerHTML = '';
            for (let i = 0; i < TOTAL_CELLS; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleCellClick(i));
                grid.appendChild(cell);
            }
        }
        
        // パターンを生成
        function generatePattern() {
            pattern = [];
            const numLights = Math.min(3 + Math.floor(level / 2), 10);
            
            for (let i = 0; i < numLights; i++) {
                let index;
                do {
                    index = Math.floor(Math.random() * TOTAL_CELLS);
                } while (pattern.includes(index));
                pattern.push(index);
            }
        }
        
        // パターンを表示
        async function showPattern() {
            isShowingPattern = true;
            canClick = false;
            playerPattern = [];
            
            info.textContent = 'パターンを覚えて...';
            message.textContent = '';
            startBtn.disabled = true;
            
            await sleep(500);
            
            for (const index of pattern) {
                const cell = grid.children[index];
                cell.classList.add('active');
                await sleep(400);
                cell.classList.remove('active');
                await sleep(100);
            }
            
            await sleep(300);
            
            isShowingPattern = false;
            canClick = true;
            info.textContent = 'パターンを再現しよう！';
            message.textContent = 'セルをタップしてね';
        }
        
        // セルクリック処理
        function handleCellClick(index) {
            if (!canClick || isShowingPattern) return;
            
            const cell = grid.children[index];
            playerPattern.push(index);
            
            const currentIndex = playerPattern.length - 1;
            
            if (playerPattern[currentIndex] === pattern[currentIndex]) {
                // 正解
                cell.classList.add('correct');
                setTimeout(() => cell.classList.remove('correct'), 300);
                
                // 全部正解チェック
                if (playerPattern.length === pattern.length) {
                    canClick = false;
                    score += level * 10;
                    scoreDisplay.textContent = score;
                    
                    message.textContent = '🎉 完璧！レベルアップ！';
                    
                    setTimeout(() => {
                        level++;
                        levelDisplay.textContent = level;
                        generatePattern();
                        showPattern();
                    }, 1500);
                }
            } else {
                // 間違い
                cell.classList.add('wrong');
                canClick = false;
                
                message.textContent = '😢 間違い！ゲームオーバー';
                
                // 正解を表示
                pattern.forEach(index => {
                    grid.children[index].classList.add('active');
                });
                
                setTimeout(() => {
                    startBtn.disabled = false;
                    startBtn.textContent = 'もう一度挑戦';
                }, 2000);
            }
        }
        
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        function startGame() {
            level = 1;
            score = 0;
            levelDisplay.textContent = level;
            scoreDisplay.textContent = score;
            
            // 全てのクラスをリセット
            Array.from(grid.children).forEach(cell => {
                cell.classList.remove('active', 'correct', 'wrong');
            });
            
            generatePattern();
            showPattern();
        }
        
        startBtn.addEventListener('click', startGame);
        
        // 全画面表示
        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });
        
        createGrid();
    </script>
</body>
</html>
