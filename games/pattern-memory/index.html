<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pattern Memory - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 20px;
            touch-action: manipulation;
        }
        .game-container {
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h1 {
            color: #e94560;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }
        .info {
            color: #a0a0a0;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .score {
            color: #fff;
            font-size: 20px;
            margin-bottom: 20px;
        }
        .score span {
            color: #e94560;
            font-weight: bold;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .tile {
            width: 150px;
            height: 150px;
            background: #16213e;
            border: 3px solid #0f3460;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.3);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .tile:active {
            transform: scale(0.95);
        }
        .tile.lit {
            background: #e94560;
            border-color: #ff6b6b;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.8);
            transform: scale(1.05);
        }
        .tile.success {
            background: #4ecca3;
            border-color: #6ee7c7;
            box-shadow: 0 0 30px rgba(78, 204, 163, 0.8);
        }
        .tile.error {
            background: #e94560;
            border-color: #ff6b6b;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.8);
            animation: shake 0.5s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .status {
            color: #fff;
            font-size: 18px;
            margin-bottom: 20px;
            min-height: 27px;
        }
        .status.watching {
            color: #e94560;
        }
        .status.playing {
            color: #4ecca3;
        }
        .start-btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }
        .start-btn:hover {
            background: #ff6b6b;
            transform: scale(1.05);
        }
        .start-btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }
        .fullscreen-btn {
            background: rgba(15, 52, 96, 0.8);
            color: white;
            border: 1px solid rgba(233, 69, 96, 0.5);
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fullscreen-btn:hover {
            background: rgba(15, 52, 96, 1);
        }
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            display: none;
        }
        .game-over.show {
            display: block;
        }
        .game-over h2 {
            color: #e94560;
            font-size: 32px;
            margin-bottom: 20px;
        }
        .game-over p {
            color: #fff;
            font-size: 18px;
            margin-bottom: 20px;
        }
        .game-over button {
            background: #4ecca3;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎮 Pattern Memory</h1>
        <p class="info">パターンを記憶して同じ順番でタップ！</p>
        <div class="score">
            スコア: <span id="score">0</span> |
            ハイスコア: <span id="highScore">0</span>
        </div>
        <div class="status" id="status">スタートボタンを押してね</div>
        <div class="grid">
            <div class="tile" data-tile="0">1</div>
            <div class="tile" data-tile="1">2</div>
            <div class="tile" data-tile="2">3</div>
            <div class="tile" data-tile="3">4</div>
        </div>
        <button class="start-btn" id="startBtn">スタート</button>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    </div>

    <div class="game-over" id="gameOver">
        <h2>ゲームオーバー！</h2>
        <p>スコア: <span id="finalScore">0</span></p>
        <button onclick="restart()">再挑戦</button>
    </div>

    <script>
        const tiles = document.querySelectorAll('.tile');
        const startBtn = document.getElementById('startBtn');
        const statusEl = document.getElementById('status');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');

        let sequence = [];
        let playerSequence = [];
        let score = 0;
        let highScore = localStorage.getItem('patternMemoryHighScore') || 0;
        let isPlaying = false;
        let isShowingSequence = false;

        highScoreEl.textContent = highScore;

        function playSound(frequency, duration, type = 'sine') {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = frequency;
            oscillator.type = type;
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        function lightUp(tile, duration = 500) {
            tile.classList.add('lit');
            playSound(200 + parseInt(tile.dataset.tile) * 100, duration / 1000);
            setTimeout(() => tile.classList.remove('lit'), duration);
        }

        function addToSequence() {
            sequence.push(Math.floor(Math.random() * 4));
        }

        async function showSequence() {
            isShowingSequence = true;
            statusEl.textContent = 'パターンを見てね...';
            statusEl.className = 'status watching';
            startBtn.disabled = true;

            await new Promise(resolve => setTimeout(resolve, 500));

            for (const tileIndex of sequence) {
                await new Promise(resolve => setTimeout(resolve, 300));
                lightUp(tiles[tileIndex]);
                await new Promise(resolve => setTimeout(resolve, 600));
            }

            isShowingSequence = false;
            statusEl.textContent = 'あなたの番！';
            statusEl.className = 'status playing';
        }

        function handleTileClick(tile) {
            if (!isPlaying || isShowingSequence) return;

            const tileIndex = parseInt(tile.dataset.tile);
            playerSequence.push(tileIndex);

            lightUp(tile, 200);

            const currentIndex = playerSequence.length - 1;

            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                gameOver();
                return;
            }

            if (playerSequence.length === sequence.length) {
                score++;
                scoreEl.textContent = score;
                playSound(800, 0.3, 'square');

                setTimeout(() => {
                    playerSequence = [];
                    addToSequence();
                    showSequence();
                }, 1000);
            }
        }

        function gameOver() {
            isPlaying = false;
            tiles.forEach(t => t.classList.add('error'));
            playSound(150, 0.5, 'sawtooth');

            setTimeout(() => {
                tiles.forEach(t => t.classList.remove('error'));

                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('patternMemoryHighScore', highScore);
                    highScoreEl.textContent = highScore;
                }

                finalScoreEl.textContent = score;
                gameOverEl.classList.add('show');
            }, 500);
        }

        function startGame() {
            sequence = [];
            playerSequence = [];
            score = 0;
            scoreEl.textContent = score;
            isPlaying = true;
            gameOverEl.classList.remove('show');
            startBtn.disabled = true;

            addToSequence();
            showSequence();
        }

        function restart() {
            gameOverEl.classList.remove('show');
            startGame();
        }

        tiles.forEach(tile => {
            tile.addEventListener('click', () => handleTileClick(tile));
            tile.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleTileClick(tile);
            });
        });

        startBtn.addEventListener('click', startGame);

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
