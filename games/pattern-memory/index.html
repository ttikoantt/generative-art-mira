<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Memory Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            color: white;
            padding: 20px;
        }

        .game-info {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-info h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #00d4ff;
        }

        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .stat {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        .stat span {
            color: #00ff87;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .cell {
            width: 90px;
            height: 90px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .cell:hover {
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        .cell.active {
            animation: flash 0.5s ease;
        }

        .cell.success {
            background: rgba(0, 255, 135, 0.3) !important;
            border-color: #00ff87 !important;
        }

        .cell.error {
            background: rgba(255, 0, 110, 0.3) !important;
            border-color: #ff006e !important;
            animation: shake 0.5s ease;
        }

        @keyframes flash {
            0%, 100% {
                background: rgba(255, 255, 255, 0.05);
                box-shadow: none;
            }
            50% {
                background: var(--cell-color);
                box-shadow: 0 0 30px var(--cell-color), inset 0 0 20px rgba(255, 255, 255, 0.3);
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .message {
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
            min-height: 27px;
            color: rgba(255, 255, 255, 0.8);
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls button {
            padding: 12px 24px;
            background: rgba(0, 212, 255, 0.2);
            border: 2px solid #00d4ff;
            color: #00d4ff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .controls button:hover {
            background: rgba(0, 212, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
        }

        .controls button:active {
            transform: translateY(0);
        }

        .controls button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 480px) {
            .grid {
                gap: 10px;
            }

            .cell {
                width: 70px;
                height: 70px;
            }

            .game-info h1 {
                font-size: 20px;
            }

            .stats {
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="game-info">
        <h1>🎮 Pattern Memory #833</h1>
        <div class="stats">
            <div class="stat">レベル: <span id="level">1</span></div>
            <div class="stat">スコア: <span id="score">0</span></div>
            <div class="stat">ハイスコア: <span id="highscore">0</span></div>
        </div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="message" id="message">スタートボタンを押してね！</div>

    <div class="controls">
        <button onclick="startGame()" id="startBtn">スタート</button>
        <button onclick="toggleFullscreen()" id="fullscreenBtn">全画面</button>
    </div>

    <script>
        // Game state
        let level = 1;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('patternMemoryHighScore')) || 0;
        let sequence = [];
        let playerSequence = [];
        let isPlaying = false;
        let isShowingSequence = false;
        let gameStarted = false;

        // Colors for cells
        const colors = [
            '#00d4ff', // Blue
            '#ff006e', // Pink
            '#00ff87', // Green
            '#ffcc00', // Yellow
            '#ff00ff', // Magenta
            '#9900ff', // Purple
            '#ff6600', // Orange
            '#00ffdd', // Cyan
            '#ff0080'  // Rose
        ];

        // Initialize grid
        function initGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.style.setProperty('--cell-color', colors[i]);
                cell.addEventListener('click', handleCellClick);
                cell.addEventListener('touchstart', handleCellClick);
                grid.appendChild(cell);
            }

            updateDisplay();
        }

        // Update display
        function updateDisplay() {
            document.getElementById('level').textContent = level;
            document.getElementById('score').textContent = score;
            document.getElementById('highscore').textContent = highScore;
        }

        // Start game
        function startGame() {
            level = 1;
            score = 0;
            gameStarted = true;
            isPlaying = true;
            document.getElementById('startBtn').textContent = 'リスタート';
            updateDisplay();
            nextRound();
        }

        // Next round
        function nextRound() {
            sequence = [];
            playerSequence = [];

            // Generate sequence based on level
            const seqLength = Math.min(level + 2, 10);
            for (let i = 0; i < seqLength; i++) {
                sequence.push(Math.floor(Math.random() * 9));
            }

            // Show sequence
            showSequence();
        }

        // Show sequence to player
        async function showSequence() {
            isShowingSequence = true;
            showMessage('パターンを覚えて...');

            const cells = document.querySelectorAll('.cell');
            const speed = Math.max(600 - level * 30, 300);

            for (let i = 0; i < sequence.length; i++) {
                await delay(speed / 2);
                const cellIndex = sequence[i];
                cells[cellIndex].classList.add('active');
                playSound(cellIndex);

                await delay(speed);

                cells[cellIndex].classList.remove('active');
            }

            await delay(500);
            isShowingSequence = false;
            showMessage('同じ順番でタップして！');
        }

        // Handle cell click
        function handleCellClick(e) {
            if (!gameStarted || isShowingSequence || !isPlaying) return;

            const cell = e.target;
            const index = parseInt(cell.dataset.index);

            // Visual feedback
            cell.classList.add('active');
            playSound(index);
            setTimeout(() => cell.classList.remove('active'), 200);

            // Check if correct
            const correctIndex = sequence[playerSequence.length];
            if (index === correctIndex) {
                playerSequence.push(index);

                // Check if round complete
                if (playerSequence.length === sequence.length) {
                    score += level * 10;
                    level++;
                    isPlaying = false;

                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('patternMemoryHighScore', highScore);
                    }

                    updateDisplay();
                    showMessage('素晴らしい！🎉');
                    celebrate();

                    setTimeout(() => {
                        isPlaying = true;
                        nextRound();
                    }, 1500);
                }
            } else {
                // Wrong!
                cell.classList.add('error');
                isPlaying = false;

                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('patternMemoryHighScore', highScore);
                }

                updateDisplay();
                showMessage(`ゲームオーバー！ スコア: ${score}`);

                setTimeout(() => {
                    cell.classList.remove('error');
                    gameStarted = false;
                    document.getElementById('startBtn').textContent = 'スタート';
                }, 2000);
            }
        }

        // Play sound
        function playSound(index) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            // Different notes for different cells
            const notes = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33];
            oscillator.frequency.value = notes[index];
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        // Show message
        function showMessage(msg) {
            document.getElementById('message').textContent = msg;
        }

        // Celebrate
        function celebrate() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, i) => {
                setTimeout(() => {
                    cell.classList.add('success');
                    setTimeout(() => cell.classList.remove('success'), 300);
                }, i * 50);
            });
        }

        // Delay helper
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Toggle fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        initGrid();
    </script>
</body>
</html>
