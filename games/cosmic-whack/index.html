<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cosmic Whack - ミラのゲームコレクション</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        h1 {
            color: #fff;
            text-align: center;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(147, 112, 219, 0.5);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .stat {
            text-align: center;
            color: #fff;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #9370db, #ff69b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .hole {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
            position: relative;
            overflow: hidden;
        }

        .hole:active {
            transform: scale(0.95);
        }

        .hole.active {
            background: rgba(147, 112, 219, 0.2);
            border-color: rgba(147, 112, 219, 0.5);
        }

        .mole {
            font-size: 48px;
            opacity: 0;
            transform: scale(0);
            transition: all 0.15s ease-out;
            pointer-events: none;
        }

        .hole.active .mole {
            opacity: 1;
            transform: scale(1);
        }

        .hole.hit .mole {
            animation: hit 0.2s ease-out;
        }

        @keyframes hit {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(0); opacity: 0; }
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #9370db, #ff69b4);
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(147, 112, 219, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .combo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 64px;
            font-weight: bold;
            color: #ff69b4;
            text-shadow: 0 0 30px rgba(255, 105, 180, 0.8);
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }

        .combo.show {
            animation: comboPop 0.5s ease-out;
        }

        @keyframes comboPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 26, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 200;
        }

        .game-over.show {
            display: flex;
        }

        .game-over h2 {
            font-size: 48px;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(147, 112, 219, 0.8);
        }

        .game-over p {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
        }

        .game-over .btn {
            width: 200px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>⭐ Cosmic Whack</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">TIME</div>
                <div class="stat-value" id="time">30</div>
            </div>
            <div class="stat">
                <div class="stat-label">COMBO</div>
                <div class="stat-value" id="combo">0</div>
            </div>
        </div>

        <div class="grid" id="grid"></div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn">スタート</button>
            <button class="btn btn-secondary" id="resetBtn">リセット</button>
        </div>
    </div>

    <div class="combo" id="combo"></div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="game-over" id="gameOver">
        <h2>🌟 Game Over!</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button class="btn btn-primary" onclick="restartGame()">もう一度</button>
    </div>

    <script>
        const GRID_SIZE = 9;
        const GAME_TIME = 30;
        const MOLE_DISPLAY_TIME = 1000;
        const MOLE_INTERVAL = 700;

        const moles = ['⭐', '🌟', '✨', '💫', '🌙', '☄️', '🪐', '🌍', '🌎'];

        let score = 0;
        let timeLeft = GAME_TIME;
        let combo = 0;
        let maxCombo = 0;
        let gameActive = false;
        let gameTimer = null;
        let moleTimer = null;

        const grid = document.getElementById('grid');
        const scoreDisplay = document.getElementById('score');
        const timeDisplay = document.getElementById('time');
        const comboDisplay = document.getElementById('combo');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const comboPopup = document.getElementById('combo');
        const gameOver = document.getElementById('gameOver');
        const finalScoreDisplay = document.getElementById('finalScore');

        // グリッドを生成
        function createGrid() {
            grid.innerHTML = '';
            for (let i = 0; i < GRID_SIZE; i++) {
                const hole = document.createElement('div');
                hole.className = 'hole';
                hole.dataset.index = i;

                const mole = document.createElement('div');
                mole.className = 'mole';
                mole.textContent = moles[i % moles.length];
                hole.appendChild(mole);

                hole.addEventListener('click', () => whackMole(i));
                hole.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    whackMole(i);
                }, { passive: false });

                grid.appendChild(hole);
            }
        }

        // もぐらを表示
        function showMole() {
            if (!gameActive) return;

            const holes = document.querySelectorAll('.hole');
            holes.forEach(hole => hole.classList.remove('active'));

            const availableHoles = Array.from({ length: GRID_SIZE }, (_, i) => i);
            const numToShow = Math.min(3 + Math.floor(score / 50), 5);

            for (let i = 0; i < numToShow && availableHoles.length > 0; i++) {
                const randomIndex = Math.floor(Math.random() * availableHoles.length);
                const holeIndex = availableHoles.splice(randomIndex, 1)[0];
                holes[holeIndex].classList.add('active');

                setTimeout(() => {
                    if (holes[holeIndex].classList.contains('active')) {
                        holes[holeIndex].classList.remove('active');
                        combo = 0;
                        updateDisplay();
                    }
                }, MOLE_DISPLAY_TIME - Math.min(score * 2, 400));
            }
        }

        // もぐらを叩く
        function whackMole(index) {
            if (!gameActive) return;

            const hole = grid.children[index];
            if (!hole.classList.contains('active')) {
                combo = 0;
                updateDisplay();
                return;
            }

            hole.classList.remove('active');
            hole.classList.add('hit');
            setTimeout(() => hole.classList.remove('hit'), 200);

            combo++;
            if (combo > maxCombo) maxCombo = combo;

            const comboBonus = Math.floor(combo / 3) * 5;
            const points = 10 + comboBonus;
            score += points;

            if (combo > 0 && combo % 5 === 0) {
                showComboPopup(combo);
            }

            updateDisplay();
        }

        // コンボポップアップ
        function showComboPopup(comboCount) {
            comboPopup.textContent = `${comboCount} COMBO!`;
            comboPopup.classList.remove('show');
            void comboPopup.offsetWidth; // リフロー
            comboPopup.classList.add('show');
        }

        // 表示を更新
        function updateDisplay() {
            scoreDisplay.textContent = score;
            timeDisplay.textContent = timeLeft;
            comboDisplay.textContent = combo;
        }

        // ゲーム開始
        function startGame() {
            if (gameActive) return;

            score = 0;
            timeLeft = GAME_TIME;
            combo = 0;
            maxCombo = 0;
            gameActive = true;

            updateDisplay();
            startBtn.textContent = 'プレイ中...';
            startBtn.disabled = true;
            gameOver.classList.remove('show');

            gameTimer = setInterval(() => {
                timeLeft--;
                updateDisplay();

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            moleTimer = setInterval(showMole, MOLE_INTERVAL);
        }

        // ゲーム終了
        function endGame() {
            gameActive = false;
            clearInterval(gameTimer);
            clearInterval(moleTimer);

            const holes = document.querySelectorAll('.hole');
            holes.forEach(hole => hole.classList.remove('active'));

            startBtn.textContent = 'スタート';
            startBtn.disabled = false;

            finalScoreDisplay.textContent = score;
            gameOver.classList.add('show');
        }

        // リセット
        function resetGame() {
            gameActive = false;
            clearInterval(gameTimer);
            clearInterval(moleTimer);

            score = 0;
            timeLeft = GAME_TIME;
            combo = 0;

            updateDisplay();
            startBtn.textContent = 'スタート';
            startBtn.disabled = false;
            gameOver.classList.remove('show');

            const holes = document.querySelectorAll('.hole');
            holes.forEach(hole => hole.classList.remove('active', 'hit'));
        }

        // リスタート
        function restartGame() {
            gameOver.classList.remove('show');
            startGame();
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        startBtn.addEventListener('click', startGame);
        resetBtn.addEventListener('click', resetGame);

        // 初期化
        createGrid();
    </script>
</body>
</html>
