<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodge Ball - 障害物回避ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #gameCanvas {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 100%;
            max-height: 100vh;
        }

        .ui {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }

        .score {
            font-size: 32px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .high-score {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 5px;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 200;
            display: none;
        }

        .game-over h2 {
            color: white;
            font-size: 36px;
            margin-bottom: 20px;
        }

        .game-over p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 18px;
            margin-bottom: 30px;
        }

        .restart-btn {
            background: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .restart-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.3);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            font-family: Arial, sans-serif;
            font-size: 14px;
            border-radius: 20px;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .score {
                font-size: 24px;
            }

            .game-over {
                padding: 30px;
                width: 90%;
            }

            .game-over h2 {
                font-size: 28px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 12px;
            }

            .instructions {
                font-size: 12px;
                bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="ui">
        <div class="score">Score: <span id="score">0</span></div>
        <div class="high-score">Best: <span id="highScore">0</span></div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>Game Over!</h2>
        <p>Score: <span id="finalScore">0</span></p>
        <button class="restart-btn" onclick="restartGame()">Play Again</button>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <div class="instructions">Tap or Click to move</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // キャンバスサイズ設定
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 600);
            const maxHeight = Math.min(window.innerHeight - 100, 800);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ゲーム状態
        let score = 0;
        let highScore = localStorage.getItem('dodgeBallHighScore') || 0;
        let gameRunning = true;
        let speedMultiplier = 1;

        document.getElementById('highScore').textContent = highScore;

        // プレイヤー
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 100,
            radius: 20,
            color: '#00ff88',
            targetX: canvas.width / 2,
            targetY: canvas.height - 100
        };

        // 障害物
        let obstacles = [];

        // 障害物クラス
        class Obstacle {
            constructor() {
                this.radius = Math.random() * 20 + 15;
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = -this.radius;
                this.speed = (Math.random() * 2 + 2) * speedMultiplier;
                this.color = `hsl(${Math.random() * 60 + 300}, 70%, 60%)`;
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.2;
            }

            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // 光るエフェクト
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;

                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // 内部のデコレーション
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.arc(-this.radius * 0.3, -this.radius * 0.3, this.radius * 0.3, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        // 障害物を生成
        function spawnObstacle() {
            if (!gameRunning) return;

            obstacles.push(new Obstacle());

            // 難易度上昇
            const spawnRate = Math.max(500, 1500 - score * 10);
            setTimeout(spawnObstacle, spawnRate);
        }

        // コリジョン判定
        function checkCollision(p, o) {
            const dx = p.x - o.x;
            const dy = p.y - o.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < p.radius + o.radius;
        }

        // ゲームオーバー
        function gameOver() {
            gameRunning = false;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('dodgeBallHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }

        // リスタート
        function restartGame() {
            score = 0;
            speedMultiplier = 1;
            obstacles = [];
            gameRunning = true;
            player.x = canvas.width / 2;
            player.targetX = canvas.width / 2;
            document.getElementById('score').textContent = score;
            document.getElementById('gameOver').style.display = 'none';
            spawnObstacle();
        }

        // ゲームループ
        function gameLoop() {
            // キャンバスをクリア
            ctx.fillStyle = 'rgba(102, 126, 234, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameRunning) {
                // プレイヤーをスムーズに移動
                player.x += (player.targetX - player.x) * 0.1;
                player.y += (player.targetY - player.y) * 0.1;

                // プレイヤーを描画
                ctx.save();
                ctx.shadowBlur = 20;
                ctx.shadowColor = player.color;
                ctx.fillStyle = player.color;
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
                ctx.fill();

                // プレイヤーの光るエフェクト
                const gradient = ctx.createRadialGradient(
                    player.x, player.y, 0,
                    player.x, player.y, player.radius * 2
                );
                gradient.addColorStop(0, 'rgba(0, 255, 136, 0.3)');
                gradient.addColorStop(1, 'rgba(0, 255, 136, 0)');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.radius * 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                // 障害物を更新・描画
                obstacles.forEach((obstacle, index) => {
                    obstacle.update();
                    obstacle.draw();

                    // 画面外に出たら削除
                    if (obstacle.y > canvas.height + obstacle.radius) {
                        obstacles.splice(index, 1);
                        score++;
                        document.getElementById('score').textContent = score;

                        // 難易度上昇
                        if (score % 5 === 0) {
                            speedMultiplier += 0.1;
                        }
                    }

                    // コリジョン判定
                    if (checkCollision(player, obstacle)) {
                        gameOver();
                    }
                });
            }

            requestAnimationFrame(gameLoop);
        }

        // イベントリスナー
        canvas.addEventListener('click', (e) => {
            if (!gameRunning) return;
            const rect = canvas.getBoundingClientRect();
            player.targetX = e.clientX - rect.left;
            player.targetY = e.clientY - rect.top;
        });

        canvas.addEventListener('touchstart', (e) => {
            if (!gameRunning) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            player.targetX = e.touches[0].clientX - rect.left;
            player.targetY = e.touches[0].clientY - rect.top;
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!gameRunning) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            player.targetX = e.touches[0].clientX - rect.left;
            player.targetY = e.touches[0].clientY - rect.top;
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ゲーム開始
        spawnObstacle();
        gameLoop();
    </script>
</body>
</html>
