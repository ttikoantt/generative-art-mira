<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Word Chain Puzzle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 10px;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            border-radius: 10px;
            flex: 1;
        }

        .info-label {
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.5em;
            font-weight: bold;
        }

        .puzzle-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .word-display {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .letter-box {
            width: 50px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
            user-select: none;
        }

        .letter-box.selected {
            background: rgba(78, 205, 196, 0.3);
            border-color: #4ecdc4;
            transform: scale(1.1);
        }

        .letter-box.hint {
            background: rgba(255, 107, 107, 0.3);
            border-color: #ff6b6b;
        }

        .instructions {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .letters-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .letter-btn {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .letter-btn:active {
            transform: scale(0.95);
        }

        .letter-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-submit {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            color: white;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(78, 205, 196, 0.4);
        }

        .btn-shuffle {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-shuffle:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
        }

        .message.success {
            background: rgba(78, 205, 196, 0.2);
            border: 1px solid #4ecdc4;
            color: #4ecdc4;
        }

        .message.error {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.5em;
            }
            
            .letter-box {
                width: 40px;
                height: 50px;
                font-size: 1.4em;
            }
            
            .letter-btn {
                width: 40px;
                height: 40px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>
    
    <div class="container">
        <h1>🔤 Word Chain Puzzle</h1>
        <p class="subtitle">1文字変えて新しい言葉を作ろう</p>

        <div class="game-info">
            <div class="info-box">
                <div class="info-label">レベル</div>
                <div class="info-value" id="level">1</div>
            </div>
            <div class="info-box">
                <div class="info-label">スコア</div>
                <div class="info-value" id="score">0</div>
            </div>
        </div>

        <div class="puzzle-container">
            <div class="word-display" id="wordDisplay"></div>
            
            <p class="instructions">タップして文字を選び、1文字だけ変えて新しい言葉を作ってね</p>
            
            <div class="letters-container" id="lettersContainer"></div>
            
            <div class="action-buttons">
                <button class="btn btn-shuffle" id="shuffleBtn">シャッフル</button>
                <button class="btn btn-submit" id="submitBtn">送信</button>
            </div>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script>
        // English word list (common 3-4 letter words)
        const wordList = [
            'cat', 'dog', 'hat', 'bat', 'rat', 'mat', 'sat', 'pat', 'fat',
            'cot', 'dot', 'hot', 'lot', 'not', 'pot', 'rot', 'tot',
            'cut', 'but', 'nut', 'put', 'rut', 'gut', 'hut', 'mut',
            'cap', 'map', 'lap', 'nap', 'gap', 'rap', 'sap', 'tap', 'zap',
            'cop', 'mop', 'pop', 'top', 'hop', 'bop', 'lop', 'sop',
            'cup', 'pup', 'sup', 'yup',
            'cab', 'lab', 'jab', 'dab', 'tab', 'gab', 'nab',
            'cob', 'dob', 'bob', 'fob', 'job', 'lob', 'rob', 'sob',
            'cub', 'nub', 'sub', 'tub', 'bub',
            'cad', 'dad', 'had', 'lad', 'mad', 'pad', 'sad', 'tad',
            'cod', 'nod', 'pod', 'rod', 'sod', 'mod',
            'cud', 'mud', 'bud', 'dud', 'pud', 'rud', 'sud',
            'cam', 'dam', 'gam', 'ham', 'jam', 'lam', 'mam', 'nam', 'pam', 'ram', 'tam', 'yam',
            'car', 'bar', 'far', 'jar', 'mar', 'par', 'tar', 'war', 'yar',
            'bet', 'get', 'jet', 'let', 'met', 'net', 'pet', 'set', 'vet', 'wet', 'yet',
            'bit', 'fit', 'hit', 'kit', 'lit', 'nit', 'pit', 'sit', 'wit',
            'bot', 'dot', 'hot', 'jot', 'lot', 'not', 'pot', 'rot', 'tot',
            'but', 'cut', 'gut', 'hut', 'nut', 'put', 'rut',
            'big', 'dig', 'fig', 'gig', 'jig', 'pig', 'rig', 'wig',
            'bog', 'cog', 'dog', 'fog', 'hog', 'jog', 'log', 'nog',
            'bug', 'dug', 'hug', 'jug', 'lug', 'mug', 'pug', 'rug', 'tug',
            'bag', 'dag', 'gag', 'hag', 'jag', 'lag', 'nag', 'rag', 'sag', 'tag', 'wag',
            'beg', 'egg', 'leg', 'peg', 'keg',
            'ban', 'can', 'dan', 'fan', 'man', 'pan', 'ran', 'tan', 'van',
            'bin', 'din', 'fin', 'gin', 'kin', 'pin', 'sin', 'tin', 'win',
            'bon', 'don', 'hon', 'ion', 'non', 'son', 'ton',
            'bun', 'dun', 'fun', 'gun', 'hun', 'nun', 'pun', 'run', 'sun',
            'bad', 'dad', 'fad', 'gad', 'had', 'lad', 'mad', 'pad', 'sad', 'tad',
            'bed', 'fed', 'led', 'med', 'ped', 'red', 'wed',
            'bid', 'did', 'hid', 'kid', 'lid', 'rid',
            'bud', 'dud', 'mud',
            'bar', 'car', 'far', 'jar',
            'ber', 'cer', 'fer', 'her', 'per',
            'bir', 'fir', 'sir',
            'bor', 'cor', 'for', 'gor', 'mor', 'nor', 'sor', 'tor',
            'bur', 'cur', 'fur', 'pur', 'sur'
        ];

        const wordSet = new Set(wordList);

        let currentWord = '';
        let targetWord = '';
        let selectedIndex = -1;
        let level = 1;
        let score = 0;

        const wordDisplay = document.getElementById('wordDisplay');
        const lettersContainer = document.getElementById('lettersContainer');
        const submitBtn = document.getElementById('submitBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const messageEl = document.getElementById('message');
        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');

        function initGame() {
            // Start with a simple word
            const startWords = ['cat', 'dog', 'hat', 'bat', 'rat'];
            currentWord = startWords[Math.floor(Math.random() * startWords.length)];
            targetWord = '';
            selectedIndex = -1;
            
            renderWord();
            renderLetters();
            hideMessage();
        }

        function renderWord() {
            wordDisplay.innerHTML = '';
            
            for (let i = 0; i < currentWord.length; i++) {
                const box = document.createElement('div');
                box.className = 'letter-box';
                if (i === selectedIndex) {
                    box.classList.add('selected');
                }
                box.textContent = currentWord[i];
                box.addEventListener('click', () => selectLetter(i));
                wordDisplay.appendChild(box);
            }
        }

        function renderLetters() {
            lettersContainer.innerHTML = '';
            const letters = 'abcdefghijklmnopqrstuvwxyz';
            
            for (const letter of letters) {
                const btn = document.createElement('button');
                btn.className = 'letter-btn';
                btn.textContent = letter.toUpperCase();
                btn.addEventListener('click', () => replaceLetter(letter));
                lettersContainer.appendChild(btn);
            }
        }

        function selectLetter(index) {
            selectedIndex = index;
            renderWord();
        }

        function replaceLetter(letter) {
            if (selectedIndex === -1) {
                showMessage('文字を選んでね', 'error');
                return;
            }
            
            const newWord = currentWord.substring(0, selectedIndex) + letter + currentWord.substring(selectedIndex + 1);
            
            if (newWord === currentWord) {
                showMessage('同じ文字だよ', 'error');
                return;
            }
            
            if (wordSet.has(newWord)) {
                currentWord = newWord;
                score += 10;
                level++;
                selectedIndex = -1;
                
                updateStats();
                renderWord();
                showMessage(`✨ "${newWord.toUpperCase()}" - 素晴らしい！ (+10点)`, 'success');
                
                // Check for level up
                if (level % 5 === 0) {
                    setTimeout(() => {
                        showMessage(`🎉 レベル ${level} 達成！`, 'success');
                    }, 1000);
                }
            } else {
                showMessage(`"${newWord.toUpperCase()}" は辞書にないよ`, 'error');
            }
        }

        function shuffleWord() {
            // Get all valid words of same length
            const sameLengthWords = wordList.filter(w => w.length === currentWord.length);
            const randomWord = sameLengthWords[Math.floor(Math.random() * sameLengthWords.length)];
            currentWord = randomWord;
            selectedIndex = -1;
            renderWord();
            showMessage(`🔄 "${randomWord.toUpperCase()}" に変更`, 'success');
        }

        function updateStats() {
            levelEl.textContent = level;
            scoreEl.textContent = score;
        }

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            messageEl.style.display = 'block';
            
            setTimeout(() => {
                hideMessage();
            }, 2000);
        }

        function hideMessage() {
            messageEl.style.display = 'none';
        }

        submitBtn.addEventListener('click', () => {
            if (selectedIndex === -1) {
                showMessage('文字を選んでね', 'error');
                return;
            }
            showMessage('下の文字を選んで置き換えてね', 'error');
        });

        shuffleBtn.addEventListener('click', shuffleWord);

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                fullscreenBtn.textContent = '元に戻す';
            } else {
                document.exitFullscreen();
                fullscreenBtn.textContent = '全画面';
            }
        });

        // Start game
        initGame();
    </script>
</body>
</html>
