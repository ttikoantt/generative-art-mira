<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Falling Shapes Puzzle | Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: #00ff88;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(0, 255, 136, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .stat-label {
            color: #888;
            font-size: clamp(0.7rem, 2vw, 0.9rem);
        }

        .stat-value {
            color: #00ff88;
            font-size: clamp(1.2rem, 3vw, 1.5rem);
            font-weight: bold;
        }

        .game-container {
            position: relative;
            width: 90vw;
            max-width: 400px;
            aspect-ratio: 3/4;
            background: rgba(0, 0, 0, 0.5);
            border: 3px solid #00ff88;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .target-zone {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 150px;
            border: 3px dashed rgba(0, 255, 136, 0.5);
            border-radius: 10px;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .target-indicator {
            width: 80px;
            height: 80px;
            opacity: 0.3;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-btn {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #1a1a2e;
            border: none;
            padding: 15px 30px;
            font-size: clamp(1rem, 3vw, 1.2rem);
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 120px;
            touch-action: manipulation;
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .overlay-title {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            color: #00ff88;
            margin-bottom: 20px;
        }

        .overlay-score {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: #fff;
            margin-bottom: 30px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            border: 1px solid #00ff88;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 1000;
            font-size: 20px;
        }

        @media (max-width: 480px) {
            .game-container {
                width: 95vw;
            }

            .target-zone {
                width: 120px;
                height: 120px;
            }

            .target-indicator {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="game-header">
        <h1>Falling Shapes</h1>
        <div class="stats">
            <div class="stat">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">LEVEL</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">LIVES</div>
                <div class="stat-value" id="lives">3</div>
            </div>
        </div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="target-zone">
            <canvas class="target-indicator" id="targetCanvas"></canvas>
        </div>
        <div class="overlay" id="overlay">
            <div class="overlay-title" id="overlayTitle">Game Over</div>
            <div class="overlay-score" id="overlayScore">Score: 0</div>
            <button class="control-btn" onclick="startGame()">Play Again</button>
        </div>
    </div>

    <div class="controls">
        <button class="control-btn" id="leftBtn">◀ LEFT</button>
        <button class="control-btn" id="rightBtn">RIGHT ▶</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const targetCanvas = document.getElementById('targetCanvas');
        const targetCtx = targetCanvas.getContext('2d');

        let score = 0;
        let level = 1;
        let lives = 3;
        let gameRunning = false;
        let animationId;

        const shapeTypes = ['square', 'triangle', 'circle', 'star'];
        const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7'];

        let currentShape = null;
        let targetShape = null;
        let fallSpeed = 1.5;
        let spawnTimer = 0;

        function resize() {
            const container = canvas.parentElement;
            const dpr = window.devicePixelRatio || 1;
            canvas.width = container.clientWidth * dpr;
            canvas.height = container.clientHeight * dpr;
            ctx.scale(dpr, dpr);

            targetCanvas.width = 80 * dpr;
            targetCanvas.height = 80 * dpr;
            targetCtx.scale(dpr, dpr);
        }

        function createShape() {
            const type = shapeTypes[Math.floor(Math.random() * shapeTypes.length)];
            const color = colors[Math.floor(Math.random() * colors.length)];
            const rotation = Math.floor(Math.random() * 4) * (Math.PI / 2);

            return {
                type,
                color,
                rotation,
                x: canvas.width / window.devicePixelRatio / 2,
                y: -40,
                size: 35,
                velocityY: fallSpeed
            };
        }

        function drawShape(context, shape, x, y, size, opacity = 1) {
            context.save();
            context.translate(x, y);
            context.rotate(shape.rotation);
            context.globalAlpha = opacity;
            context.fillStyle = shape.color;
            context.strokeStyle = shape.color;
            context.lineWidth = 3;

            const s = size;

            switch(shape.type) {
                case 'square':
                    context.fillRect(-s/2, -s/2, s, s);
                    break;
                case 'triangle':
                    context.beginPath();
                    context.moveTo(0, -s/2);
                    context.lineTo(s/2, s/2);
                    context.lineTo(-s/2, s/2);
                    context.closePath();
                    context.fill();
                    break;
                case 'circle':
                    context.beginPath();
                    context.arc(0, 0, s/2, 0, Math.PI * 2);
                    context.fill();
                    break;
                case 'star':
                    drawStar(context, 0, 0, 5, s/2, s/4);
                    context.fill();
                    break;
            }

            context.restore();
        }

        function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let x = cx;
            let y = cy;
            let step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);

            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;

                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }

            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
        }

        function setNewTarget() {
            targetShape = createShape();
            targetShape.rotation = Math.floor(Math.random() * 4) * (Math.PI / 2);

            const container = canvas.parentElement;
            targetCtx.clearRect(0, 0, targetCanvas.width, targetCanvas.height);
            drawShape(targetCtx, targetShape, 40, 40, 50, 0.5);
        }

        function spawnShape() {
            if (!currentShape) {
                currentShape = createShape();
            }
        }

        function checkMatch() {
            if (!currentShape || !targetShape) return;

            const targetZoneY = canvas.height / window.devicePixelRatio - 50 - 75;

            if (currentShape.y >= targetZoneY) {
                const typeMatch = currentShape.type === targetShape.type;
                const rotationMatch = Math.abs(currentShape.rotation - targetShape.rotation) < 0.1;

                if (typeMatch && rotationMatch) {
                    score += 10 * level;
                    updateStats();
                    setNewTarget();

                    if (score % 50 === 0) {
                        level++;
                        fallSpeed = 1.5 + (level - 1) * 0.2;
                        updateStats();
                    }
                } else {
                    lives--;
                    updateStats();

                    if (lives <= 0) {
                        gameOver();
                    }
                }

                currentShape = null;
            }
        }

        function update() {
            if (!gameRunning) return;

            const width = canvas.width / window.devicePixelRatio;
            const height = canvas.height / window.devicePixelRatio;

            ctx.fillStyle = 'rgba(26, 26, 46, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // Draw target zone background
            const targetZoneY = height - 50 - 75;
            ctx.fillStyle = 'rgba(0, 255, 136, 0.05)';
            ctx.fillRect(width/2 - 75, targetZoneY, 150, 150);

            if (!targetShape) {
                setNewTarget();
            }

            spawnTimer++;
            if (spawnTimer > 60) {
                spawnShape();
                spawnTimer = 0;
            }

            if (currentShape) {
                currentShape.y += currentShape.velocityY;

                if (currentShape.y > height + 50) {
                    currentShape = null;
                    lives--;
                    updateStats();

                    if (lives <= 0) {
                        gameOver();
                    }
                }

                if (currentShape) {
                    drawShape(ctx, currentShape, currentShape.x, currentShape.y, currentShape.size);
                    checkMatch();
                }
            }

            animationId = requestAnimationFrame(update);
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lives').textContent = lives;
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);

            document.getElementById('overlayTitle').textContent = 'Game Over';
            document.getElementById('overlayScore').textContent = `Score: ${score}`;
            document.getElementById('overlay').classList.add('active');
        }

        function startGame() {
            score = 0;
            level = 1;
            lives = 3;
            fallSpeed = 1.5;
            spawnTimer = 0;
            currentShape = null;
            targetShape = null;

            updateStats();
            document.getElementById('overlay').classList.remove('active');

            setNewTarget();
            gameRunning = true;
            update();
        }

        function moveShape(direction) {
            if (currentShape && gameRunning) {
                const step = 15;
                const width = canvas.width / window.devicePixelRatio;

                if (direction === 'left' && currentShape.x > 50) {
                    currentShape.x -= step;
                } else if (direction === 'right' && currentShape.x < width - 50) {
                    currentShape.x += step;
                }
            }
        }

        document.getElementById('leftBtn').addEventListener('click', () => moveShape('left'));
        document.getElementById('rightBtn').addEventListener('click', () => moveShape('right'));

        document.getElementById('leftBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveShape('left');
        });

        document.getElementById('rightBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveShape('right');
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
                moveShape('left');
            } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {
                moveShape('right');
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', resize);
        resize();

        document.getElementById('overlay').classList.add('active');
        document.getElementById('overlayTitle').textContent = 'Falling Shapes';
        document.getElementById('overlayScore').textContent = 'Match the shape and rotation!';
    </script>
</body>
</html>
