<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Clicker - 瞑想クリッカー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            padding: 20px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: white;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1em;
            margin-bottom: 30px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .stat-value {
            color: white;
            font-size: 2em;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .click-area {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.1) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            border: 3px solid rgba(255, 255, 255, 0.3);
            transition: all 0.2s;
            position: relative;
        }

        .click-area:active {
            transform: scale(0.95);
        }

        .click-area.clicking {
            transform: scale(0.9);
            background: radial-gradient(circle, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.2) 100%);
        }

        .click-icon {
            font-size: 4em;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .ripple {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            animation: ripple 0.6s ease-out;
            pointer-events: none;
        }

        @keyframes ripple {
            0% {
                transform: scale(1);
                opacity: 0.5;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        .upgrades {
            display: grid;
            gap: 10px;
        }

        .upgrade {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .upgrade:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        .upgrade:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .upgrade-name {
            color: white;
            font-weight: bold;
            font-size: 1.1em;
        }

        .upgrade-cost {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
            margin-top: 5px;
        }

        .upgrade-level {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8em;
            margin-top: 3px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .combo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3em;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            pointer-events: none;
            animation: comboPopup 0.5s ease-out;
        }

        @keyframes comboPopup {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.5);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .click-area {
                width: 150px;
                height: 150px;
            }

            .click-icon {
                font-size: 3em;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <h1>🧘 Zen Clicker</h1>
        <p class="subtitle">クリックして心を鎮めよう</p>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">クリック数</div>
                <div class="stat-value" id="clicks">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">マナ</div>
                <div class="stat-value" id="mana">0</div>
            </div>
        </div>

        <div class="click-area" id="clickArea">
            <div class="click-icon">🌸</div>
        </div>

        <div class="upgrades">
            <div class="upgrade" id="upgrade1" onclick="buyUpgrade(1)">
                <div class="upgrade-name">🍃 葉の悟り</div>
                <div class="upgrade-cost">コスト: <span id="cost1">10</span> マナ</div>
                <div class="upgrade-level">Lv.<span id="level1">0</span> | +1/クリック</div>
            </div>
            <div class="upgrade" id="upgrade2" onclick="buyUpgrade(2)">
                <div class="upgrade-name">🌸 花の開花</div>
                <div class="upgrade-cost">コスト: <span id="cost2">50</span> マナ</div>
                <div class="upgrade-level">Lv.<span id="level2">0</span> | +5/クリック</div>
            </div>
            <div class="upgrade" id="upgrade3" onclick="buyUpgrade(3)">
                <div class="upgrade-name">🌙 月の光</div>
                <div class="upgrade-cost">コスト: <span id="cost3">200</span> マナ</div>
                <div class="upgrade-level">Lv.<span id="level3">0</span> | +20/クリック</div>
            </div>
        </div>
    </div>

    <script>
        let clicks = 0;
        let mana = 0;
        let clickPower = 1;

        const upgrades = {
            1: { cost: 10, level: 0, bonus: 1, costMult: 1.5 },
            2: { cost: 50, level: 0, bonus: 5, costMult: 1.6 },
            3: { cost: 200, level: 0, bonus: 20, costMult: 1.7 }
        };

        const clickArea = document.getElementById('clickArea');

        clickArea.addEventListener('mousedown', handleClick);
        clickArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick(e);
        });

        function handleClick(e) {
            clicks++;
            mana += clickPower;

            updateDisplay();
            createRipple();
            clickArea.classList.add('clicking');
            setTimeout(() => clickArea.classList.remove('clicking'), 100);
        }

        function createRipple() {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            clickArea.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        function buyUpgrade(id) {
            const upgrade = upgrades[id];
            if (mana >= upgrade.cost) {
                mana -= upgrade.cost;
                upgrade.level++;
                clickPower += upgrade.bonus;
                upgrade.cost = Math.floor(upgrade.cost * upgrade.costMult);

                updateDisplay();
                updateUpgrades();
            }
        }

        function updateDisplay() {
            document.getElementById('clicks').textContent = clicks.toLocaleString();
            document.getElementById('mana').textContent = mana.toLocaleString();
        }

        function updateUpgrades() {
            for (let id = 1; id <= 3; id++) {
                const upgrade = upgrades[id];
                document.getElementById(`cost${id}`).textContent = upgrade.cost.toLocaleString();
                document.getElementById(`level${id}`).textContent = upgrade.level;

                const btn = document.getElementById(`upgrade${id}`);
                btn.disabled = mana < upgrade.cost;
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 定期更新
        setInterval(() => {
            updateUpgrades();
        }, 100);

        updateDisplay();
        updateUpgrades();
    </script>
</body>
</html>
