<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dot Collector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        .score-display {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .high-score {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 5px;
        }

        .fullscreen-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            pointer-events: auto;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }

        #startScreen, #gameOverScreen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
        }

        #gameOverScreen {
            display: none;
        }

        .screen-title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .screen-subtitle {
            font-size: 18px;
            opacity: 0.8;
            margin-bottom: 40px;
            text-align: center;
            max-width: 300px;
        }

        .start-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.6);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .final-score {
            font-size: 64px;
            font-weight: bold;
            margin: 20px 0;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @media (max-width: 768px) {
            .score-display {
                font-size: 20px;
                padding: 12px 20px;
            }

            .screen-title {
                font-size: 36px;
            }

            .final-score {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="ui-overlay">
        <div class="score-display">
            <div id="score">0</div>
            <div class="high-score">Best: <span id="highScore">0</span></div>
        </div>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    </div>

    <div id="startScreen">
        <div class="screen-title">Dot Collector</div>
        <div class="screen-subtitle">Tap the dots to collect them!<br>Don't let them escape!</div>
        <button class="start-btn" onclick="startGame()">Start Game</button>
    </div>

    <div id="gameOverScreen">
        <div class="screen-title">Game Over</div>
        <div class="final-score" id="finalScore">0</div>
        <div class="screen-subtitle">Dots collected</div>
        <button class="start-btn" onclick="startGame()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let gameRunning = false;
        let score = 0;
        let highScore = localStorage.getItem('dotCollectorHighScore') || 0;
        let missedDots = 0;
        const maxMissed = 5;

        document.getElementById('highScore').textContent = highScore;

        const dots = [];
        const particles = [];

        const colors = ['#ff6b9d', '#c44dff', '#4d79ff', '#4dffea', '#ffd700'];

        class Dot {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * (width - 100) + 50;
                this.y = -50;
                this.size = Math.random() * 20 + 30;
                this.speed = Math.random() * 2 + 1;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.active = true;
                this.pulse = 0;
            }

            update() {
                if (!this.active) return;

                this.y += this.speed;
                this.pulse += 0.1;

                // Check if dot went off screen
                if (this.y > height + 50) {
                    this.active = false;
                    missedDots++;
                    if (missedDots >= maxMissed) {
                        gameOver();
                    }
                }
            }

            draw() {
                if (!this.active) return;

                const pulseSize = this.size + Math.sin(this.pulse) * 5;

                // Glow effect
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, pulseSize * 1.5
                );
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(0.5, this.color + '80');
                gradient.addColorStop(1, 'transparent');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, pulseSize * 1.5, 0, Math.PI * 2);
                ctx.fill();

                // Core
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, pulseSize * 0.5, 0, Math.PI * 2);
                ctx.fill();

                // Shine
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x - pulseSize * 0.2, this.y - pulseSize * 0.2, pulseSize * 0.2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 8 + 4;
                this.speedX = (Math.random() - 0.5) * 10;
                this.speedY = (Math.random() - 0.5) * 10;
                this.alpha = 1;
                this.decay = Math.random() * 0.03 + 0.02;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= this.decay;
                this.speedY += 0.2; // Gravity
            }

            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function spawnDot() {
            if (!gameRunning) return;

            dots.push(new Dot());

            // Spawn faster as score increases
            const spawnRate = Math.max(500, 1500 - score * 10);
            setTimeout(spawnDot, spawnRate);
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function update() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, width, height);

            // Update and draw dots
            dots.forEach((dot, index) => {
                dot.update();
                dot.draw();
                if (!dot.active) {
                    dots.splice(index, 1);
                }
            });

            // Update and draw particles
            particles.forEach((particle, index) => {
                particle.update();
                particle.draw();
                if (particle.alpha <= 0) {
                    particles.splice(index, 1);
                }
            });

            // Draw missed dots indicator
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.font = '16px sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText(`Missed: ${missedDots}/${maxMissed}`, width - 20, height - 20);

            requestAnimationFrame(update);
        }

        function handleTap(x, y) {
            if (!gameRunning) return;

            dots.forEach((dot, index) => {
                if (!dot.active) return;

                const dx = x - dot.x;
                const dy = y - dot.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < dot.size + 20) {
                    // Collect dot
                    score++;
                    document.getElementById('score').textContent = score;

                    createExplosion(dot.x, dot.y, dot.color);
                    dot.active = false;
                }
            });
        }

        // Mouse/Touch events
        canvas.addEventListener('click', (e) => {
            handleTap(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleTap(touch.clientX, touch.clientY);
        });

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';

            gameRunning = true;
            score = 0;
            missedDots = 0;
            dots.length = 0;
            particles.length = 0;

            document.getElementById('score').textContent = '0';

            update();
            spawnDot();
        }

        function gameOver() {
            gameRunning = false;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('dotCollectorHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Resize handler
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
