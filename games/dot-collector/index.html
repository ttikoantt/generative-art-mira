<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dot Collector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #gameCanvas {
            display: block;
        }

        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 10, 26, 0.95);
            z-index: 100;
            transition: opacity 0.3s;
        }

        .ui-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .game-title {
            color: #00ffff;
            font-size: 48px;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .score-display {
            color: white;
            font-size: 28px;
            margin: 10px 0;
        }

        .high-score {
            color: #ffcc00;
            font-size: 20px;
            margin: 5px 0;
        }

        .instructions {
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            margin: 20px 0;
            text-align: center;
            line-height: 1.6;
        }

        .btn {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.4);
        }

        .game-ui {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 10;
            pointer-events: none;
        }

        .score-box {
            color: white;
            font-size: 24px;
            font-weight: 300;
        }

        .timer-box {
            color: #ff6b6b;
            font-size: 24px;
            font-weight: 300;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 50;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .powerup-indicator {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffcc00;
            font-size: 18px;
            font-weight: 300;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 10;
        }

        .powerup-indicator.active {
            opacity: 1;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="game-ui">
        <div class="score-box">Score: <span id="score">0</span></div>
        <div class="timer-box">Time: <span id="timer">30</span>s</div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    <div class="powerup-indicator" id="powerupIndicator">2x Score!</div>

    <div class="ui-overlay" id="startScreen">
        <div class="game-title">Dot Collector</div>
        <div class="high-score">High Score: <span id="highScoreDisplay">0</span></div>
        <div class="instructions">
            プレイヤー（白い円）をドラッグして動かし<br>
            色付きのドットを集めよう！<br><br>
            🔵 青: +10点<br>
            🟢 緑: +20点<br>
            🟡 黄: 2倍スコア（5秒間）<br>
            🔴 赤: -5点（避けて！）<br>
            ⭐ 金: +50点（レア！）
        </div>
        <button class="btn" onclick="startGame()">Start</button>
    </div>

    <div class="ui-overlay hidden" id="gameOverScreen">
        <div class="game-title">Time's Up!</div>
        <div class="score-display">Score: <span id="finalScore">0</span></div>
        <div class="high-score">High Score: <span id="finalHighScore">0</span></div>
        <button class="btn" onclick="startGame()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let player = { x: 0, y: 0, radius: 20 };
        let dots = [];
        let particles = [];
        let score = 0;
        let highScore = localStorage.getItem('dotCollectorHighScore') || 0;
        let gameTime = 30;
        let gameRunning = false;
        let lastTime = 0;
        let doubleScore = false;
        let doubleScoreTimer = 0;

        const DOT_TYPES = {
            blue: { color: '#00aaff', points: 10, radius: 8, chance: 0.4 },
            green: { color: '#00ff88', points: 20, radius: 10, chance: 0.25 },
            yellow: { color: '#ffcc00', points: 0, radius: 12, chance: 0.1 },
            red: { color: '#ff4444', points: -5, radius: 10, chance: 0.2 },
            gold: { color: '#ffd700', points: 50, radius: 15, chance: 0.05 }
        };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            player.x = width / 2;
            player.y = height / 2;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function createDot() {
            const rand = Math.random();
            let cumulative = 0;
            let type = 'blue';

            for (const [key, value] of Object.entries(DOT_TYPES)) {
                cumulative += value.chance;
                if (rand < cumulative) {
                    type = key;
                    break;
                }
            }

            return {
                x: Math.random() * (width - 40) + 20,
                y: Math.random() * (height - 40) + 20,
                ...DOT_TYPES[type],
                type,
                pulse: 0
            };
        }

        function createParticle(x, y, color) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 3 + 2;
            particles.push({
                x,
                y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                radius: Math.random() * 4 + 2,
                color,
                alpha: 1,
                decay: Math.random() * 0.02 + 0.02
            });
        }

        function spawnParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                createParticle(x, y, color);
            }
        }

        function updateDots() {
            // Keep 10-15 dots on screen
            while (dots.length < 12) {
                dots.push(createDot());
            }

            dots.forEach(dot => {
                dot.pulse += 0.05;
            });
        }

        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= p.decay;
                p.vx *= 0.98;
                p.vy *= 0.98;
                return p.alpha > 0;
            });
        }

        function checkCollisions() {
            dots = dots.filter(dot => {
                const dx = player.x - dot.x;
                const dy = player.y - dot.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < player.radius + dot.radius) {
                    // Collision!
                    let points = dot.points;
                    if (doubleScore && points > 0) {
                        points *= 2;
                    }

                    score += points;
                    if (score < 0) score = 0;

                    if (dot.type === 'yellow') {
                        doubleScore = true;
                        doubleScoreTimer = 5;
                        document.getElementById('powerupIndicator').classList.add('active');
                    } else if (dot.type === 'red') {
                        spawnParticles(dot.x, dot.y, dot.color, 5);
                    } else {
                        spawnParticles(dot.x, dot.y, dot.color, 10);
                    }

                    document.getElementById('score').textContent = score;
                    return false;
                }
                return true;
            });
        }

        function update(dt) {
            if (!gameRunning) return;

            // Update timer
            gameTime -= dt;
            if (gameTime <= 0) {
                gameOver();
                return;
            }
            document.getElementById('timer').textContent = Math.ceil(gameTime);

            // Update double score timer
            if (doubleScore) {
                doubleScoreTimer -= dt;
                if (doubleScoreTimer <= 0) {
                    doubleScore = false;
                    document.getElementById('powerupIndicator').classList.remove('active');
                }
            }

            updateDots();
            updateParticles();
            checkCollisions();
        }

        function draw() {
            // Clear with trail effect
            ctx.fillStyle = 'rgba(10, 10, 26, 0.2)';
            ctx.fillRect(0, 0, width, height);

            // Draw particles
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color.replace(')', `, ${p.alpha})`).replace('rgb', 'rgba');
                ctx.fill();
            });

            // Draw dots
            dots.forEach(dot => {
                const pulse = Math.sin(dot.pulse) * 2;
                ctx.beginPath();
                ctx.arc(dot.x, dot.y, dot.radius + pulse, 0, Math.PI * 2);

                // Glow effect
                const gradient = ctx.createRadialGradient(
                    dot.x, dot.y, 0,
                    dot.x, dot.y, dot.radius * 2
                );
                gradient.addColorStop(0, dot.color);
                gradient.addColorStop(1, 'transparent');

                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(dot.x, dot.y, dot.radius, 0, Math.PI * 2);
                ctx.fillStyle = dot.color;
                ctx.fill();
            });

            // Draw player
            const playerGradient = ctx.createRadialGradient(
                player.x, player.y, 0,
                player.x, player.y, player.radius * 2
            );
            playerGradient.addColorStop(0, doubleScore ? '#ffcc00' : '#ffffff');
            playerGradient.addColorStop(0.5, doubleScore ? 'rgba(255, 204, 0, 0.5)' : 'rgba(255, 255, 255, 0.3)');
            playerGradient.addColorStop(1, 'transparent');

            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius * 2, 0, Math.PI * 2);
            ctx.fillStyle = playerGradient;
            ctx.fill();

            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = doubleScore ? '#ffcc00' : '#ffffff';
            ctx.fill();

            // Draw player border
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius + 3, 0, Math.PI * 2);
            ctx.strokeStyle = doubleScore ? '#ffcc00' : 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function gameLoop(timestamp) {
            const dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;

            update(dt);
            draw();

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('highScoreDisplay').textContent = highScore;

            score = 0;
            gameTime = 30;
            dots = [];
            particles = [];
            doubleScore = false;
            document.getElementById('score').textContent = '0';
            document.getElementById('powerupIndicator').classList.remove('active');

            gameRunning = true;
            lastTime = performance.now();
        }

        function gameOver() {
            gameRunning = false;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('dotCollectorHighScore', highScore);
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalHighScore').textContent = highScore;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        // Input handling
        let isDragging = false;

        canvas.addEventListener('mousedown', (e) => {
            const dx = e.clientX - player.x;
            const dy = e.clientY - player.y;
            if (Math.sqrt(dx * dx + dy * dy) < player.radius * 2) {
                isDragging = true;
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                player.x = e.clientX;
                player.y = e.clientY;
            }
        });

        canvas.addEventListener('mouseup', () => {
            isDragging = false;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const dx = touch.clientX - player.x;
            const dy = touch.clientY - player.y;
            if (Math.sqrt(dx * dx + dy * dy) < player.radius * 3) {
                isDragging = true;
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isDragging) {
                const touch = e.touches[0];
                player.x = touch.clientX;
                player.y = touch.clientY;
            }
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });

        window.addEventListener('resize', resize);

        // Initialize
        resize();
        document.getElementById('highScoreDisplay').textContent = highScore;
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
