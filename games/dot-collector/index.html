<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dot Collector - 点を集めろ！</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
        }

        .ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        .score {
            color: #fff;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(78, 205, 196, 0.5);
        }

        .timer {
            color: #ff6b6b;
            font-size: 28px;
            font-weight: bold;
        }

        .level {
            color: #4ecdc4;
            font-size: 20px;
        }

        .start-screen, .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .start-screen h1, .game-over-screen h1 {
            color: #fff;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(78, 205, 196, 0.8);
        }

        .start-screen p, .game-over-screen p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 18px;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.6;
        }

        .btn {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(78, 205, 196, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(78, 205, 196, 0.6);
        }

        .final-score {
            color: #4ecdc4;
            font-size: 64px;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(78, 205, 196, 0.8);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 10;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .score {
                font-size: 24px;
            }
            .timer {
                font-size: 22px;
            }
            .level {
                font-size: 16px;
            }
            .start-screen h1, .game-over-screen h1 {
                font-size: 32px;
            }
            .final-score {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="ui">
        <div class="score">スコア: <span id="score">0</span></div>
        <div class="level">レベル: <span id="level">1</span></div>
        <div class="timer">⏱️ <span id="timer">30</span></div>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>

    <canvas id="gameCanvas"></canvas>

    <div class="start-screen" id="startScreen">
        <h1>Dot Collector</h1>
        <p>
            プレイヤー（白い丸）を動かして<br>
            色付きのドットを集めろ！<br><br>
            操作方法：<br>
            • PC: マウスに従って移動<br>
            • モバイル: タッチしてドラッグ<br><br>
            レッドドットを避けて、<br>
            ブルードットを集めよう！
        </p>
        <button class="btn" id="startBtn">スタート</button>
    </div>

    <div class="game-over-screen hidden" id="gameOverScreen">
        <h1>ゲームオーバー！</h1>
        <div class="final-score" id="finalScore">0</div>
        <p>最高スコア: <span id="highScore">0</span></p>
        <button class="btn" id="restartBtn">もう一度</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Canvasサイズ
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ゲーム状態
        let gameState = 'start'; // start, playing, gameover
        let score = 0;
        let timeLeft = 30;
        let level = 1;
        let highScore = localStorage.getItem('dotCollectorHighScore') || 0;

        // プレイヤー
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 20,
            vx: 0,
            vy: 0
        };

        // ドット
        const dots = [];
        const maxDots = 20;
        const dotRadius = 12;

        // マウス/タッチ位置
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;

        // ドットクラス
        class Dot {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * (canvas.width - 100) + 50;
                this.y = Math.random() * (canvas.height - 100) + 50;
                
                // タイプ: 0 = グッド（青）、1 = バッド（赤）
                const badChance = Math.min(0.1 + level * 0.05, 0.4);
                this.type = Math.random() < badChance ? 1 : 0;
                
                // グローバル座標
                this.radius = dotRadius + Math.random() * 8;
                
                // 動き
                this.vx = (Math.random() - 0.5) * (1 + level * 0.3);
                this.vy = (Math.random() - 0.5) * (1 + level * 0.3);
                
                // パルス
                this.pulse = 0;
                this.pulseSpeed = 0.05 + Math.random() * 0.05;
            }

            update() {
                // 動き
                this.x += this.vx;
                this.y += this.vy;

                // 境界で跳ね返る
                if (this.x < this.radius || this.x > canvas.width - this.radius) {
                    this.vx *= -1;
                }
                if (this.y < this.radius || this.y > canvas.height - this.radius) {
                    this.vy *= -1;
                }

                // パルス
                this.pulse += this.pulseSpeed;
            }

            draw() {
                const pulseRadius = this.radius + Math.sin(this.pulse) * 3;
                
                // グロー
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, pulseRadius * 2
                );
                
                if (this.type === 0) {
                    // グッド（青）
                    gradient.addColorStop(0, 'rgba(78, 205, 196, 0.8)');
                    gradient.addColorStop(0.5, 'rgba(78, 205, 196, 0.3)');
                    gradient.addColorStop(1, 'rgba(78, 205, 196, 0)');
                } else {
                    // バッド（赤）
                    gradient.addColorStop(0, 'rgba(255, 107, 107, 0.8)');
                    gradient.addColorStop(0.5, 'rgba(255, 107, 107, 0.3)');
                    gradient.addColorStop(1, 'rgba(255, 107, 107, 0)');
                }

                ctx.beginPath();
                ctx.arc(this.x, this.y, pulseRadius * 2, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // 本体
                ctx.beginPath();
                ctx.arc(this.x, this.y, pulseRadius, 0, Math.PI * 2);
                ctx.fillStyle = this.type === 0 ? '#4ecdc4' : '#ff6b6b';
                ctx.fill();
            }
        }

        // ドット初期化
        function initDots() {
            dots.length = 0;
            const dotCount = Math.min(maxDots + level * 2, 40);
            for (let i = 0; i < dotCount; i++) {
                dots.push(new Dot());
            }
        }

        // プレイヤー更新
        function updatePlayer() {
            // マウスに向かってスムーズに移動
            const dx = mouseX - player.x;
            const dy = mouseY - player.y;
            
            player.vx += dx * 0.05;
            player.vy += dy * 0.05;
            
            player.vx *= 0.85;
            player.vy *= 0.85;
            
            player.x += player.vx;
            player.y += player.vy;

            // 速度制限
            const speed = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
            if (speed > 15) {
                player.vx = (player.vx / speed) * 15;
                player.vy = (player.vy / speed) * 15;
            }

            // 境界
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));
        }

        // 衝突判定
        function checkCollisions() {
            for (let i = dots.length - 1; i >= 0; i--) {
                const dot = dots[i];
                const dx = player.x - dot.x;
                const dy = player.y - dot.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < player.radius + dot.radius) {
                    if (dot.type === 0) {
                        // グッドドット
                        const points = 10 * level;
                        score += points;
                        updateScore();
                        
                        // 新しいドット
                        dot.reset();
                    } else {
                        // バッドドット
                        score = Math.max(0, score - 50);
                        updateScore();
                        dot.reset();
                    }
                }
            }
        }

        // レベルアップ
        function checkLevelUp() {
            const targetScore = level * 200;
            if (score >= targetScore) {
                level++;
                document.getElementById('level').textContent = level;
                
                // 追加時間
                timeLeft += 10;
                
                // ドット再生成
                initDots();
            }
        }

        // スコア更新
        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        // タイマー
        function updateTimer() {
            if (gameState === 'playing') {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;

                if (timeLeft <= 0) {
                    gameOver();
                }
            }
        }

        setInterval(updateTimer, 1000);

        // プレイヤー描画
        function drawPlayer() {
            // グロー
            const gradient = ctx.createRadialGradient(
                player.x, player.y, 0,
                player.x, player.y, player.radius * 3
            );
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius * 3, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();

            // 本体
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            
            // 光沢
            ctx.beginPath();
            ctx.arc(player.x - player.radius * 0.3, player.y - player.radius * 0.3, player.radius * 0.4, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.fill();
        }

        // 描画
        function draw() {
            // クリア
            ctx.fillStyle = 'rgba(26, 26, 46, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameState === 'playing') {
                // ドット
                dots.forEach(dot => {
                    dot.update();
                    dot.draw();
                });

                // プレイヤー
                updatePlayer();
                drawPlayer();

                // 衝突
                checkCollisions();

                // レベルアップ
                checkLevelUp();
            }

            requestAnimationFrame(draw);
        }

        // ゲームオーバー
        function gameOver() {
            gameState = 'gameover';
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('dotCollectorHighScore', highScore);
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('highScore').textContent = highScore;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        // ゲーム開始
        function startGame() {
            gameState = 'playing';
            score = 0;
            timeLeft = 30;
            level = 1;
            
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            player.vx = 0;
            player.vy = 0;
            
            updateScore();
            document.getElementById('level').textContent = level;
            document.getElementById('timer').textContent = timeLeft;
            
            initDots();
            
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
        }

        // イベント
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });

        // 全画面
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // 開始
        draw();
    </script>
</body>
</html>
