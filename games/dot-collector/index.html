<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dot Collector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2em;
            text-align: center;
        }

        .score {
            font-size: 24px;
            margin-bottom: 15px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            backdrop-filter: blur(10px);
        }

        .canvas-container {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
            background: #000;
            cursor: crosshair;
        }

        .fullscreen-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 8px 15px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .game-over h2 {
            font-size: 48px;
            color: #f5576c;
        }

        .game-over p {
            font-size: 24px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .info {
            margin-top: 15px;
            text-align: center;
            opacity: 0.7;
            font-size: 14px;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5em;
            }

            .score {
                font-size: 18px;
                padding: 8px 15px;
            }
        }
    </style>
</head>
<body>
    <h1>🎯 Dot Collector</h1>

    <div class="score">
        Score: <span id="score">0</span> | High Score: <span id="highScore">0</span>
    </div>

    <div class="canvas-container">
        <canvas id="canvas"></canvas>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

        <div id="gameOver" class="game-over hidden">
            <h2>Game Over!</h2>
            <p>Score: <span id="finalScore">0</span></p>
            <button onclick="restartGame()">🔄 Play Again</button>
        </div>
    </div>

    <div class="info">
        Move your finger/mouse to collect dots 🟢 | Avoid enemies 🔴
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const finalScoreEl = document.getElementById('finalScore');
        const gameOverEl = document.getElementById('gameOver');

        // Set canvas size
        function resizeCanvas() {
            const size = Math.min(window.innerWidth - 40, window.innerHeight - 200, 700);
            canvas.width = size;
            canvas.height = size;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game state
        let score = 0;
        let highScore = localStorage.getItem('dotCollectorHighScore') || 0;
        let gameRunning = true;
        let animationId = null;

        highScoreEl.textContent = highScore;

        // Player
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 15,
            color: '#667eea'
        };

        // Dots and enemies
        let dots = [];
        let enemies = [];

        // Mouse/touch position
        let targetPos = { x: canvas.width / 2, y: canvas.height / 2 };

        // Initialize dots
        function initDots() {
            dots = [];
            for (let i = 0; i < 10; i++) {
                spawnDot();
            }
        }

        function spawnDot() {
            dots.push({
                x: Math.random() * (canvas.width - 40) + 20,
                y: Math.random() * (canvas.height - 40) + 20,
                radius: 8,
                color: '#43e97b',
                pulse: 0
            });
        }

        // Initialize enemies
        function initEnemies() {
            enemies = [];
        }

        function spawnEnemy() {
            const side = Math.floor(Math.random() * 4);
            let x, y, vx, vy;

            switch (side) {
                case 0: // Top
                    x = Math.random() * canvas.width;
                    y = -20;
                    vx = (Math.random() - 0.5) * 4;
                    vy = Math.random() * 2 + 1;
                    break;
                case 1: // Right
                    x = canvas.width + 20;
                    y = Math.random() * canvas.height;
                    vx = -(Math.random() * 2 + 1);
                    vy = (Math.random() - 0.5) * 4;
                    break;
                case 2: // Bottom
                    x = Math.random() * canvas.width;
                    y = canvas.height + 20;
                    vx = (Math.random() - 0.5) * 4;
                    vy = -(Math.random() * 2 + 1);
                    break;
                case 3: // Left
                    x = -20;
                    y = Math.random() * canvas.height;
                    vx = Math.random() * 2 + 1;
                    vy = (Math.random() - 0.5) * 4;
                    break;
            }

            enemies.push({
                x,
                y,
                vx,
                vy,
                radius: 12,
                color: '#f5576c'
            });
        }

        // Input handling
        function updatePlayerPosition(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            targetPos.x = clientX - rect.left;
            targetPos.y = clientY - rect.top;
        }

        canvas.addEventListener('mousemove', (e) => {
            if (gameRunning) {
                updatePlayerPosition(e.clientX, e.clientY);
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (gameRunning) {
                const touch = e.touches[0];
                updatePlayerPosition(touch.clientX, touch.clientY);
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning) {
                const touch = e.touches[0];
                updatePlayerPosition(touch.clientX, touch.clientY);
            }
        });

        // Game update
        function update() {
            if (!gameRunning) return;

            // Move player towards target
            const dx = targetPos.x - player.x;
            const dy = targetPos.y - player.y;
            player.x += dx * 0.1;
            player.y += dy * 0.1;

            // Keep player in bounds
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

            // Update dots
            dots.forEach((dot, index) => {
                dot.pulse += 0.1;

                // Check collision with player
                const dist = Math.sqrt((player.x - dot.x) ** 2 + (player.y - dot.y) ** 2);
                if (dist < player.radius + dot.radius) {
                    // Collect dot
                    dots.splice(index, 1);
                    score += 10;
                    scoreEl.textContent = score;
                    spawnDot();

                    // Spawn enemy every 50 points
                    if (score % 50 === 0) {
                        spawnEnemy();
                    }
                }
            });

            // Update enemies
            enemies.forEach((enemy) => {
                enemy.x += enemy.vx;
                enemy.y += enemy.vy;

                // Check collision with player
                const dist = Math.sqrt((player.x - enemy.x) ** 2 + (player.y - enemy.y) ** 2);
                if (dist < player.radius + enemy.radius - 5) {
                    gameOver();
                }
            });

            // Remove enemies that are far off screen
            enemies = enemies.filter(e =>
                e.x > -50 && e.x < canvas.width + 50 &&
                e.y > -50 && e.y < canvas.height + 50
            );
        }

        // Draw
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            const gridSize = 50;
            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Draw dots
            dots.forEach(dot => {
                const pulseRadius = dot.radius + Math.sin(dot.pulse) * 2;
                ctx.beginPath();
                ctx.arc(dot.x, dot.y, pulseRadius, 0, Math.PI * 2);
                ctx.fillStyle = dot.color;
                ctx.fill();
                ctx.shadowColor = dot.color;
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            // Draw enemies
            enemies.forEach(enemy => {
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
                ctx.fillStyle = enemy.color;
                ctx.fill();
                ctx.shadowColor = enemy.color;
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            // Draw player
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.fill();
            ctx.shadowColor = player.color;
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // Game loop
        function gameLoop() {
            update();
            draw();

            if (gameRunning) {
                animationId = requestAnimationFrame(gameLoop);
            }
        }

        // Game over
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);

            finalScoreEl.textContent = score;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('dotCollectorHighScore', highScore);
                highScoreEl.textContent = highScore;
            }

            gameOverEl.classList.remove('hidden');
        }

        // Restart game
        function restartGame() {
            score = 0;
            scoreEl.textContent = score;
            gameRunning = true;
            gameOverEl.classList.add('hidden');

            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            targetPos = { x: canvas.width / 2, y: canvas.height / 2 };

            initDots();
            initEnemies();
            gameLoop();
        }

        // Fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                canvas.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Start game
        initDots();
        initEnemies();
        gameLoop();

        // Spawn initial enemy
        setTimeout(() => {
            if (gameRunning) spawnEnemy();
        }, 3000);
    </script>
</body>
</html>
