<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>折り紙タイミングマスター | Origami Timing Master</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ ProN W3', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .info-item {
            color: white;
        }

        .info-label {
            font-size: 12px;
            opacity: 0.9;
        }

        .info-value {
            font-size: 24px;
            font-weight: bold;
        }

        .game-area {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
        }

        .target-zone {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 4px;
            background: rgba(255, 215, 0, 0.3);
            border-radius: 2px;
            z-index: 1;
        }

        .target-zone::before,
        .target-zone::after {
            content: '';
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
            background: #ffd700;
        }

        .target-zone::before {
            top: -15px;
        }

        .target-zone::after {
            bottom: -15px;
        }

        .indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 20px;
            background: #ff6b6b;
            border-radius: 4px;
            z-index: 2;
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
        }

        .fold-line {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            width: 250px;
            height: 250px;
            border: 3px solid #ffd700;
            border-radius: 10px;
            opacity: 0.5;
            z-index: 0;
        }

        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            z-index: 10;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .perfect { color: #ffd700; }
        .great { color: #4ecdc4; }
        .good { color: #95e1d3; }
        .miss { color: #ff6b6b; }

        .fold-button {
            margin-top: 30px;
            padding: 20px 60px;
            font-size: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
            font-weight: bold;
        }

        .fold-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(0, 0, 0, 0.4);
        }

        .fold-button:active {
            transform: translateY(1px);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white;
            padding: 10px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .overlay-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 90%;
        }

        .overlay h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .overlay p {
            color: #333;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .start-button {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 22px;
            }

            .game-area {
                width: 250px;
                height: 250px;
            }

            .fold-button {
                padding: 15px 40px;
                font-size: 18px;
            }

            .info-value {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>📄 折り紙タイミングマスター</h1>

        <div class="game-info">
            <div class="info-item">
                <div class="info-label">スコア</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">コンボ</div>
                <div class="info-value" id="combo">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">ハイスコア</div>
                <div class="info-value" id="highScore">0</div>
            </div>
        </div>

        <div class="game-area">
            <div class="fold-line"></div>
            <div class="target-zone"></div>
            <div class="indicator" id="indicator"></div>
        </div>

        <button class="fold-button" id="foldButton">折る！</button>
    </div>

    <div class="overlay" id="startOverlay">
        <div class="overlay-content">
            <h2>📄 折り紙タイミングマスター</h2>
            <p>赤いインジケーターが黄色い枠に入った瞬間に「折る！」ボタンを押してください！</p>
            <p>PERFECTで最高得点、MISSでコンボがリセットされます。</p>
            <p>折り紙の折り目に合わせて、完璧なタイミングを目指しましょう！</p>
            <button class="start-button" onclick="startGame()">スタート</button>
        </div>
    </div>

    <script>
        // ゲーム状態
        let score = 0;
        let combo = 0;
        let highScore = parseInt(localStorage.getItem('origamiHighScore')) || 0;
        let indicatorPosition = 0;
        let indicatorDirection = 1;
        let indicatorSpeed = 2;
        let isPlaying = false;
        let animationId = null;

        // DOM要素
        const scoreElement = document.getElementById('score');
        const comboElement = document.getElementById('combo');
        const highScoreElement = document.getElementById('highScore');
        const indicator = document.getElementById('indicator');
        const foldButton = document.getElementById('foldButton');
        const startOverlay = document.getElementById('startOverlay');

        // 初期化
        function init() {
            highScoreElement.textContent = highScore;
            indicatorPosition = 50;
        }

        // ゲーム開始
        function startGame() {
            startOverlay.classList.add('hidden');
            isPlaying = true;
            score = 0;
            combo = 0;
            indicatorSpeed = 2;
            updateUI();
            gameLoop();
        }

        // ゲームループ
        function gameLoop() {
            if (!isPlaying) return;

            // インジケーターを動かす
            indicatorPosition += indicatorDirection * indicatorSpeed;

            // 境界で反転
            if (indicatorPosition >= 80 || indicatorPosition <= 20) {
                indicatorDirection *= -1;
            }

            // スピードを徐々に上げる
            indicatorSpeed = Math.min(indicatorSpeed + 0.0002, 5);

            // インジケーターの位置を更新
            const offset = (indicatorPosition - 50) * 3;
            indicator.style.left = `calc(50% + ${offset}px)`;

            animationId = requestAnimationFrame(gameLoop);
        }

        // 折るボタンが押された
        function fold() {
            if (!isPlaying) return;

            const distance = Math.abs(indicatorPosition - 50);
            let judgment = '';
            let points = 0;

            if (distance <= 3) {
                judgment = 'PERFECT!';
                points = 100;
                combo++;
            } else if (distance <= 8) {
                judgment = 'GREAT!';
                points = 70;
                combo++;
            } else if (distance <= 15) {
                judgment = 'GOOD';
                points = 30;
                combo++;
            } else {
                judgment = 'MISS';
                points = 0;
                combo = 0;
            }

            // コンボボーナス
            const comboBonus = combo > 1 ? Math.floor(combo * 10) : 0;
            const totalPoints = points + comboBonus;

            score += totalPoints;

            // 判定を表示
            showMessage(judgment);

            // UIを更新
            updateUI();

            // ハイスコアを更新
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('origamiHighScore', highScore);
            }
        }

        // メッセージを表示
        function showMessage(text) {
            const gameArea = document.querySelector('.game-area');
            const existingMessage = gameArea.querySelector('.message');
            if (existingMessage) {
                existingMessage.remove();
            }

            const message = document.createElement('div');
            message.className = 'message';

            if (text === 'PERFECT!') {
                message.classList.add('perfect');
            } else if (text === 'GREAT!') {
                message.classList.add('great');
            } else if (text === 'GOOD') {
                message.classList.add('good');
            } else {
                message.classList.add('miss');
            }

            message.textContent = text;
            gameArea.appendChild(message);

            setTimeout(() => {
                message.remove();
            }, 500);
        }

        // UIを更新
        function updateUI() {
            scoreElement.textContent = score;
            comboElement.textContent = combo;
            highScoreElement.textContent = highScore;
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        foldButton.addEventListener('click', fold);

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault();
                if (isPlaying) {
                    fold();
                } else {
                    startGame();
                }
            }
        });

        // タッチ操作
        document.addEventListener('touchstart', (e) => {
            if (e.target === foldButton || isPlaying) {
                // デフォルトの動作を防止
                // e.preventDefault(); // コメントアウト：ボタンクリックを妨げない
            }
        }, { passive: true });

        // 初期化
        init();
    </script>
</body>
</html>
