<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Tap | Reflex Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }
        #gameCanvas {
            display: block;
        }
        .ui {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }
        .score {
            color: #4a9eff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(74, 158, 255, 0.5);
        }
        .timer {
            color: #ff4a6e;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 74, 110, 0.5);
        }
        .combo {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 18px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .combo.show {
            opacity: 1;
        }
        .start-screen, .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 15, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .game-over-screen {
            display: none;
        }
        h1 {
            color: #4a9eff;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(74, 158, 255, 0.5);
        }
        .subtitle {
            color: #888;
            font-size: 16px;
            margin-bottom: 40px;
        }
        .final-score {
            color: #ffd700;
            font-size: 64px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        .final-stats {
            color: #888;
            font-size: 18px;
            margin-bottom: 40px;
        }
        .btn {
            background: rgba(74, 158, 255, 0.2);
            border: 2px solid #4a9eff;
            color: #4a9eff;
            padding: 15px 40px;
            font-size: 18px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            transition: all 0.3s ease;
            pointer-events: auto;
        }
        .btn:hover {
            background: rgba(74, 158, 255, 0.4);
            transform: scale(1.05);
        }
        .fullscreen-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(74, 158, 255, 0.2);
            border: 1px solid rgba(74, 158, 255, 0.5);
            color: #4a9eff;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            transition: all 0.3s ease;
            pointer-events: auto;
        }
        .fullscreen-btn:hover {
            background: rgba(74, 158, 255, 0.4);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="ui">
        <div class="score">Score: <span id="score">0</span></div>
        <div class="timer">Time: <span id="timer">60</span></div>
    </div>

    <div class="combo" id="combo">
        <span id="combo-count">0</span>x Combo!
    </div>

    <div class="start-screen" id="startScreen">
        <h1>⚡ QUICK TAP</h1>
        <div class="subtitle">Tap the targets as fast as you can!</div>
        <button class="btn" onclick="startGame()">START GAME</button>
    </div>

    <div class="game-over-screen" id="gameOverScreen">
        <h1>GAME OVER</h1>
        <div class="final-score" id="finalScore">0</div>
        <div class="final-stats" id="finalStats">
            Hits: 0 | Miss: 0 | Best Combo: 0
        </div>
        <button class="btn" onclick="startGame()">PLAY AGAIN</button>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // Game state
        let gameRunning = false;
        let score = 0;
        let timeLeft = 60;
        let targets = [];
        let particles = [];
        let combo = 0;
        let maxCombo = 0;
        let hits = 0;
        let misses = 0;
        let lastTime = 0;
        let spawnTimer = 0;
        let spawnInterval = 800;

        // Target class
        class Target {
            constructor() {
                this.radius = Math.random() * 30 + 30;
                this.x = Math.random() * (width - this.radius * 2) + this.radius;
                this.y = Math.random() * (height - this.radius * 2) + this.radius;
                this.maxLife = 2000;
                this.life = this.maxLife;
                this.hue = Math.random() * 60 + 180;
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.markedForDeletion = false;
            }

            update(dt) {
                this.life -= dt;
                if (this.life <= 0) {
                    this.markedForDeletion = true;
                    misses++;
                    combo = 0;
                    updateCombo();
                }
                this.pulsePhase += 0.1;
            }

            draw() {
                const alpha = this.life / this.maxLife;
                const pulse = Math.sin(this.pulsePhase) * 5;

                ctx.save();
                ctx.translate(this.x, this.y);

                // Outer ring
                ctx.strokeStyle = `hsla(${this.hue}, 80%, 60%, ${alpha})`;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius + pulse, 0, Math.PI * 2);
                ctx.stroke();

                // Inner circle
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius);
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 70%, ${alpha * 0.8})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 80%, 50%, ${alpha * 0.3})`);
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // Center dot
                ctx.fillStyle = `hsla(${this.hue}, 80%, 80%, ${alpha})`;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius * 0.3, 0, Math.PI * 2);
                ctx.fill();

                // Timer ring
                const timerAngle = (this.life / this.maxLife) * Math.PI * 2;
                ctx.strokeStyle = `hsla(0, 80%, 60%, ${alpha})`;
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius + 10, -Math.PI / 2, -Math.PI / 2 + timerAngle);
                ctx.stroke();

                ctx.restore();
            }

            checkHit(x, y) {
                const dx = x - this.x;
                const dy = y - this.y;
                return Math.sqrt(dx * dx + dy * dy) < this.radius;
            }
        }

        // Particle class
        class Particle {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1;
                this.decay = Math.random() * 0.03 + 0.02;
                this.size = Math.random() * 5 + 2;
                this.hue = hue;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }

            draw() {
                ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${this.life})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function spawnTarget() {
            targets.push(new Target());
        }

        function createExplosion(x, y, hue) {
            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(x, y, hue));
            }
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        function updateTimer() {
            document.getElementById('timer').textContent = timeLeft;
        }

        function updateCombo() {
            const comboEl = document.getElementById('combo');
            const comboCount = document.getElementById('combo-count');
            comboCount.textContent = combo;
            if (combo > 1) {
                comboEl.classList.add('show');
            } else {
                comboEl.classList.remove('show');
            }
        }

        function handleInput(x, y) {
            if (!gameRunning) return;

            for (let i = targets.length - 1; i >= 0; i--) {
                if (targets[i].checkHit(x, y)) {
                    const target = targets[i];
                    hits++;
                    combo++;
                    if (combo > maxCombo) maxCombo = combo;

                    const basePoints = 100;
                    const comboBonus = combo * 10;
                    const speedBonus = Math.floor((1 - target.life / target.maxLife) * 50);
                    score += basePoints + comboBonus + speedBonus;

                    createExplosion(target.x, target.y, target.hue);
                    targets.splice(i, 1);

                    updateScore();
                    updateCombo();
                    return;
                }
            }

            // Missed click
            combo = 0;
            updateCombo();
        }

        // Mouse events
        canvas.addEventListener('click', (e) => {
            handleInput(e.clientX, e.clientY);
        });

        // Touch events
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleInput(touch.clientX, touch.clientY);
        });

        // Resize
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // Fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function startGame() {
            gameRunning = true;
            score = 0;
            timeLeft = 60;
            combo = 0;
            maxCombo = 0;
            hits = 0;
            misses = 0;
            targets = [];
            particles = [];
            spawnTimer = 0;
            lastTime = performance.now();

            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';

            updateScore();
            updateTimer();
            updateCombo();

            // Spawn initial targets
            for (let i = 0; i < 3; i++) {
                spawnTarget();
            }

            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameRunning = false;
            document.getElementById('gameOverScreen').style.display = 'flex';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalStats').textContent =
                `Hits: ${hits} | Miss: ${misses} | Best Combo: ${maxCombo}`;
        }

        function gameLoop(currentTime) {
            if (!gameRunning) return;

            const dt = currentTime - lastTime;
            lastTime = currentTime;

            // Clear
            ctx.fillStyle = 'rgba(10, 10, 15, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // Spawn targets
            spawnTimer += dt;
            if (spawnTimer > spawnInterval) {
                spawnTarget();
                spawnTimer = 0;
                // Gradually increase difficulty
                if (spawnInterval > 400) spawnInterval -= 5;
            }

            // Update and draw targets
            targets.forEach(target => target.update(dt));
            targets = targets.filter(t => !t.markedForDeletion);
            targets.forEach(target => target.draw());

            // Update and draw particles
            particles.forEach(p => p.update());
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => p.draw());

            // Update timer
            timeLeft -= dt / 1000;
            if (timeLeft <= 0) {
                timeLeft = 0;
                updateTimer();
                endGame();
                return;
            }
            updateTimer();

            requestAnimationFrame(gameLoop);
        }

        // Initial draw
        ctx.fillStyle = '#0a0a0f';
        ctx.fillRect(0, 0, width, height);
    </script>
</body>
</html>
