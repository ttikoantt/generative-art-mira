<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Speed | タイピング・スピード</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 90%;
            text-align: center;
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            color: white;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .word-display {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .word {
            font-size: 2rem;
            font-weight: bold;
            color: #2d3436;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
        }

        .word .correct {
            color: #00b894;
            text-shadow: 0 0 10px rgba(0, 184, 148, 0.3);
        }

        .word .current {
            color: #667eea;
            border-bottom: 3px solid #667eea;
            animation: blink 0.5s infinite;
        }

        .word .remaining {
            color: #b2bec3;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .input-area {
            margin: 20px 0;
        }

        #wordInput {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2rem;
            border: 2px solid #dfe6e9;
            border-radius: 10px;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
            background: white;
        }

        #wordInput:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            margin: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.secondary {
            background: #dfe6e9;
            color: #2d3436;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .btn.secondary:hover {
            background: #b2bec3;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .game-over {
            display: none;
        }

        .game-over.show {
            display: block;
        }

        .results {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #dfe6e9;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            font-weight: 500;
            color: #636e72;
        }

        .result-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .difficulty-selector {
            margin: 15px 0;
        }

        .difficulty-btn {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
            padding: 8px 16px;
            border-radius: 20px;
            margin: 0 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .difficulty-btn.active,
        .difficulty-btn:hover {
            background: #667eea;
            color: white;
        }

        /* 全画面ボタン */
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        /* モバイル対応 */
        @media (max-width: 768px) {
            .game-container {
                padding: 25px;
            }

            h1 {
                font-size: 1.4rem;
            }

            .word {
                font-size: 1.5rem;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            #wordInput {
                font-size: 1rem;
                padding: 12px 15px;
            }

            .btn {
                padding: 12px 30px;
                font-size: 1rem;
            }
        }

        .hidden {
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #dfe6e9;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()" title="全画面">⛶</button>

    <div class="game-container">
        <h1>⌨️ タイピング・スピード</h1>

        <!-- スタート画面 -->
        <div id="startScreen">
            <div class="difficulty-selector">
                <button class="difficulty-btn active" data-difficulty="easy" onclick="setDifficulty('easy')">簡単</button>
                <button class="difficulty-btn" data-difficulty="medium" onclick="setDifficulty('medium')">普通</button>
                <button class="difficulty-btn" data-difficulty="hard" onclick="setDifficulty('hard')">難しい</button>
            </div>
            <p style="margin: 20px 0; color: #636e72;">
                制限時間60秒で、できるだけ多くの単語を入力してください！
            </p>
            <button class="btn" onclick="startGame()">スタート</button>
        </div>

        <!-- ゲーム画面 -->
        <div id="gameScreen" class="hidden">
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="score">0</div>
                    <div class="stat-label">スコア</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="timer">60</div>
                    <div class="stat-label">残り時間</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="wpm">0</div>
                    <div class="stat-label">WPM</div>
                </div>
            </div>

            <div class="word-display">
                <div class="word" id="wordDisplay"></div>
            </div>

            <div class="input-area">
                <input
                    type="text"
                    id="wordInput"
                    placeholder="ここにタイプ..."
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="off"
                    spellcheck="false"
                >
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <button class="btn secondary" onclick="endGame()">終了</button>
        </div>

        <!-- 結果画面 -->
        <div id="resultScreen" class="game-over">
            <h2>🎉 ゲーム終了！</h2>
            <div class="results">
                <div class="result-item">
                    <span class="result-label">最終スコア</span>
                    <span class="result-value" id="finalScore">0</span>
                </div>
                <div class="result-item">
                    <span class="result-label">正解数</span>
                    <span class="result-value" id="correctWords">0</span>
                </div>
                <div class="result-item">
                    <span class="result-label">WPM (1分あたり)</span>
                    <span class="result-value" id="finalWpm">0</span>
                </div>
                <div class="result-item">
                    <span class="result-label">正確率</span>
                    <span class="result-value" id="accuracy">0%</span>
                </div>
            </div>
            <button class="btn" onclick="resetGame()">もう一度</button>
        </div>
    </div>

    <script>
        // 単語リスト（日本語と英語）
        const wordLists = {
            easy: {
                words: [
                    'apple', 'book', 'cat', 'dog', 'egg', 'fish', 'game', 'hat',
                    '山', '川', '空', '海', '花', '木', '鳥', '猫',
                    'red', 'blue', 'green', 'yellow', 'black', 'white',
                    'run', 'walk', 'jump', 'swim', 'fly', 'sleep',
                    '一', '二', '三', '四', '五', '十', '百', '千'
                ]
            },
            medium: {
                words: [
                    'computer', 'keyboard', 'mouse', 'monitor', 'internet',
                    'program', 'code', 'debug', 'system', 'network',
                    '東京', '大阪', '京都', '北海道', '沖縄',
                    '春', '夏', '秋', '冬', '朝', '昼', '夜', '夕方',
                    'document', 'browser', 'website', 'application',
                    'mountain', 'river', 'ocean', 'forest', 'desert'
                ]
            },
            hard: {
                words: [
                    'algorithm', 'development', 'programming', 'architecture',
                    'intelligence', 'automation', 'innovation', 'technology',
                    '人工知能', '機械学習', 'プログラミング', 'アルゴリズム',
                    'quantum', 'encryption', 'blockchain', 'cryptocurrency',
                    'virtual', 'reality', 'augmented', 'metaverse',
                    'exponential', 'polymorphism', 'inheritance', 'recursion'
                ]
            }
        };

        let currentDifficulty = 'easy';
        let currentWords = [];
        let currentWord = '';
        let score = 0;
        let correctWords = 0;
        let totalKeystrokes = 0;
        let correctKeystrokes = 0;
        let timeLeft = 60;
        let gameTimer = null;
        let gameActive = false;

        const wordDisplay = document.getElementById('wordDisplay');
        const wordInput = document.getElementById('wordInput');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const wpmDisplay = document.getElementById('wpm');
        const progressFill = document.getElementById('progressFill');

        function setDifficulty(difficulty) {
            currentDifficulty = difficulty;
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.difficulty === difficulty) {
                    btn.classList.add('active');
                }
            });
        }

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function startGame() {
            // ゲーム状態リセット
            score = 0;
            correctWords = 0;
            totalKeystrokes = 0;
            correctKeystrokes = 0;
            timeLeft = 60;
            gameActive = true;

            // 単語リスト準備
            currentWords = shuffleArray(wordLists[currentDifficulty].words);

            // 画面切り替え
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');
            document.getElementById('resultScreen').classList.remove('show');

            // 最初の単語表示
            showNextWord();

            // タイマー開始
            startTimer();

            // 入力フィールドにフォーカス
            wordInput.value = '';
            wordInput.focus();
        }

        function showNextWord() {
            if (currentWords.length === 0) {
                currentWords = shuffleArray(wordLists[currentDifficulty].words);
            }
            currentWord = currentWords.pop();
            displayWord();
        }

        function displayWord() {
            const input = wordInput.value;
            let html = '';

            for (let i = 0; i < currentWord.length; i++) {
                if (i < input.length) {
                    if (input[i] === currentWord[i]) {
                        html += `<span class="correct">${currentWord[i]}</span>`;
                    } else {
                        html += `<span class="current" style="color: #d63031;">${currentWord[i]}</span>`;
                    }
                } else if (i === input.length) {
                    html += `<span class="current">${currentWord[i]}</span>`;
                } else {
                    html += `<span class="remaining">${currentWord[i]}</span>`;
                }
            }

            wordDisplay.innerHTML = html;

            // プログレスバー更新
            const progress = (input.length / currentWord.length) * 100;
            progressFill.style.width = `${progress}%`;
        }

        function startTimer() {
            gameTimer = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }

                // WPM更新
                updateWpm();
            }, 1000);
        }

        function updateWpm() {
            const timeElapsed = 60 - timeLeft;
            if (timeElapsed > 0) {
                const wpm = Math.round((correctWords / timeElapsed) * 60);
                wpmDisplay.textContent = wpm;
            }
        }

        function endGame() {
            gameActive = false;
            clearInterval(gameTimer);

            // 結果計算
            const accuracy = totalKeystrokes > 0
                ? Math.round((correctKeystrokes / totalKeystrokes) * 100)
                : 0;
            const timeElapsed = 60 - timeLeft;
            const finalWpm = timeElapsed > 0
                ? Math.round((correctWords / timeElapsed) * 60)
                : 0;

            // 結果表示
            document.getElementById('finalScore').textContent = score;
            document.getElementById('correctWords').textContent = correctWords;
            document.getElementById('finalWpm').textContent = finalWpm;
            document.getElementById('accuracy').textContent = `${accuracy}%`;

            // 画面切り替え
            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.add('show');
        }

        function resetGame() {
            document.getElementById('resultScreen').classList.remove('show');
            document.getElementById('startScreen').classList.remove('hidden');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Fullscreen error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        wordInput.addEventListener('input', (e) => {
            if (!gameActive) return;

            const input = e.target.value;
            totalKeystrokes++;

            // 正確なキーストロークをカウント
            for (let i = 0; i < input.length && i < currentWord.length; i++) {
                if (input[i] === currentWord[i]) {
                    correctKeystrokes++;
                }
            }

            // 単語が完成したかチェック
            if (input === currentWord) {
                correctWords++;
                score += currentWord.length * 10;
                scoreDisplay.textContent = score;
                wordInput.value = '';
                showNextWord();
            } else {
                displayWord();
            }
        });

        // Enterキーでスキップ
        wordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && gameActive) {
                // スキップ（ペナルティなし）
                wordInput.value = '';
                showNextWord();
            }
        });

        // 初期状態でフォーカス
        window.addEventListener('load', () => {
            wordInput.focus();
        });
    </script>
</body>
</html>
