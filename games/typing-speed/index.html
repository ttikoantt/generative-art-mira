<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Speed Challenge - タイピング速度テスト</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #764ba2;
        }

        .word-display {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .word {
            font-size: 48px;
            font-weight: bold;
            color: #333;
            letter-spacing: 2px;
        }

        .word.completed {
            color: #28a745;
        }

        .input-area {
            margin-bottom: 20px;
        }

        .input-field {
            width: 100%;
            padding: 20px;
            font-size: 24px;
            border: 3px solid #ddd;
            border-radius: 15px;
            text-align: center;
            outline: none;
            transition: all 0.3s;
            background: white;
        }

        .input-field:focus {
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.2);
        }

        .input-field.correct {
            border-color: #28a745;
            background: #d4edda;
        }

        .input-field.incorrect {
            border-color: #dc3545;
            background: #f8d7da;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            min-width: 150px;
        }

        .btn-start {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-restart {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .fullscreen-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(79, 172, 254, 0.4);
        }

        .message {
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
            min-height: 27px;
            color: #667eea;
            font-weight: bold;
        }

        .result {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        .result-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
        }

        .result-stat {
            text-align: center;
        }

        .result-stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .result-stat-value {
            font-size: 48px;
            font-weight: bold;
        }

        .result-message {
            font-size: 18px;
            opacity: 0.9;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }

        @media (max-width: 768px) {
            .game-container {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .word {
                font-size: 32px;
            }

            .input-field {
                font-size: 20px;
                padding: 15px;
            }

            .stats {
                gap: 20px;
            }

            .stat-value {
                font-size: 28px;
            }

            .btn {
                padding: 12px 20px;
                font-size: 16px;
                min-width: 120px;
            }

            .result h2 {
                font-size: 28px;
            }

            .result-stat-value {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>⌨️ Typing Speed Challenge</h1>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">WPM</div>
                <div class="stat-value" id="wpm">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">正答率</div>
                <div class="stat-value" id="accuracy">100%</div>
            </div>
            <div class="stat">
                <div class="stat-label">残り単語</div>
                <div class="stat-value" id="remaining">0</div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress" style="width: 0%"></div>
        </div>

        <div class="word-display">
            <div class="word" id="word">START</div>
        </div>

        <div class="message" id="message">スタートボタンを押して開始！</div>

        <div class="input-area">
            <input type="text" class="input-field" id="input" placeholder="ここに単語を入力..." autocomplete="off" autocapitalize="off" spellcheck="false">
        </div>

        <div class="button-group">
            <button class="btn btn-start" id="startBtn">スタート</button>
            <button class="btn btn-restart" id="restartBtn" style="display: none;">リスタート</button>
            <button class="btn fullscreen-btn" id="fullscreenBtn">全画面</button>
        </div>

        <div class="result" id="result">
            <h2>🎉 結果発表！</h2>
            <div class="result-stats">
                <div class="result-stat">
                    <div class="result-stat-label">WPM（1分あたりの単語数）</div>
                    <div class="result-stat-value" id="finalWpm">0</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-label">正答率</div>
                    <div class="result-stat-value" id="finalAccuracy">0%</div>
                </div>
            </div>
            <div class="result-message" id="resultMessage"></div>
        </div>
    </div>

    <script>
        const words = [
            'apple', 'banana', 'cherry', 'date', 'elderberry', 'fig', 'grape',
            'honeydew', 'kiwi', 'lemon', 'mango', 'nectarine', 'orange', 'papaya',
            'quince', 'raspberry', 'strawberry', 'tangerine', 'ugli', 'vanilla',
            'watermelon', 'xigua', 'yam', 'zucchini', 'cat', 'dog', 'elephant',
            'fish', 'giraffe', 'horse', 'iguana', 'jellyfish', 'kangaroo', 'lion',
            'monkey', 'newt', 'octopus', 'penguin', 'quail', 'rabbit', 'snake',
            'tiger', 'unicorn', 'vulture', 'whale', 'xenops', 'yak', 'zebra',
            'brave', 'calm', 'determined', 'energetic', 'focused', 'grateful',
            'happy', 'inspired', 'joyful', 'kind', 'loving', 'motivated', 'optimistic',
            'patient', 'positive', 'resilient', 'strong', 'thankful', 'understanding',
            'vibrant', 'wise', 'adventure', 'beauty', 'creativity', 'discovery',
            'excellence', 'freedom', 'growth', 'harmony', 'innovation', 'journey',
            'knowledge', 'leadership', 'momentum', 'opportunity', 'passion', 'quest',
            'radiance', 'success', 'transformation', 'unity', 'victory', 'wisdom'
        ];

        const gameState = {
            isRunning: false,
            startTime: null,
            currentWordIndex: 0,
            correctWords: 0,
            totalAttempts: 0,
            wordSequence: []
        };

        const elements = {
            word: document.getElementById('word'),
            input: document.getElementById('input'),
            wpm: document.getElementById('wpm'),
            accuracy: document.getElementById('accuracy'),
            remaining: document.getElementById('remaining'),
            message: document.getElementById('message'),
            startBtn: document.getElementById('startBtn'),
            restartBtn: document.getElementById('restartBtn'),
            fullscreenBtn: document.getElementById('fullscreenBtn'),
            result: document.getElementById('result'),
            finalWpm: document.getElementById('finalWpm'),
            finalAccuracy: document.getElementById('finalAccuracy'),
            resultMessage: document.getElementById('resultMessage'),
            progress: document.getElementById('progress')
        };

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function startGame() {
            gameState.isRunning = true;
            gameState.startTime = Date.now();
            gameState.currentWordIndex = 0;
            gameState.correctWords = 0;
            gameState.totalAttempts = 0;
            gameState.wordSequence = shuffleArray(words).slice(0, 20);

            elements.startBtn.style.display = 'none';
            elements.restartBtn.style.display = 'inline-block';
            elements.result.classList.remove('show');
            elements.input.value = '';
            elements.input.focus();

            showWord();
            updateStats();
            elements.message.textContent = '頑張れ！';
        }

        function showWord() {
            const word = gameState.wordSequence[gameState.currentWordIndex];
            elements.word.textContent = word;
            elements.word.classList.remove('completed');
            elements.input.value = '';
        }

        function checkInput() {
            if (!gameState.isRunning) return;

            const typed = elements.input.value.trim();
            const target = gameState.wordSequence[gameState.currentWordIndex];

            gameState.totalAttempts++;

            if (typed === target) {
                gameState.correctWords++;
                elements.word.classList.add('completed');
                
                setTimeout(() => {
                    gameState.currentWordIndex++;
                    
                    if (gameState.currentWordIndex >= gameState.wordSequence.length) {
                        endGame();
                    } else {
                        showWord();
                        updateStats();
                    }
                }, 100);
            }

            updateStats();
        }

        function updateStats() {
            const elapsedTime = (Date.now() - gameState.startTime) / 1000 / 60; // 分
            const wpm = elapsedTime > 0 ? Math.round(gameState.correctWords / elapsedTime) : 0;
            const accuracy = gameState.totalAttempts > 0 
                ? Math.round((gameState.correctWords / gameState.totalAttempts) * 100) 
                : 100;
            const remaining = gameState.wordSequence.length - gameState.currentWordIndex;
            const progress = (gameState.currentWordIndex / gameState.wordSequence.length) * 100;

            elements.wpm.textContent = wpm;
            elements.accuracy.textContent = accuracy + '%';
            elements.remaining.textContent = remaining;
            elements.progress.style.width = progress + '%';
        }

        function endGame() {
            gameState.isRunning = false;
            
            const elapsedTime = (Date.now() - gameState.startTime) / 1000 / 60;
            const finalWpm = Math.round(gameState.correctWords / elapsedTime);
            const finalAccuracy = gameState.totalAttempts > 0 
                ? Math.round((gameState.correctWords / gameState.totalAttempts) * 100) 
                : 100;

            elements.finalWpm.textContent = finalWpm;
            elements.finalAccuracy.textContent = finalAccuracy + '%';

            // 結果メッセージ
            let message = '';
            if (finalWpm >= 60) {
                message = '🏆 素晴らしい！プロ級のタイピングスキル！';
            } else if (finalWpm >= 40) {
                message = '👏 すごい！上級レベルのスキル！';
            } else if (finalWpm >= 25) {
                message = '😊 いい調子！中級レベル！';
            } else {
                message = '💪 練習あるのみ！まずは25 WPMを目指そう！';
            }

            elements.resultMessage.textContent = message;
            elements.result.classList.add('show');
            elements.message.textContent = 'ゲーム終了！リスタートボタンで再挑戦！';
        }

        function restartGame() {
            elements.result.classList.remove('show');
            startGame();
        }

        // イベントリスナー
        elements.startBtn.addEventListener('click', startGame);
        elements.restartBtn.addEventListener('click', restartGame);
        elements.input.addEventListener('input', checkInput);

        elements.fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // キーボードショートカット
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !gameState.isRunning) {
                startGame();
            }
        });

        // 定期的にWPMを更新
        setInterval(() => {
            if (gameState.isRunning) {
                updateStats();
            }
        }, 100);
    </script>
</body>
</html>
