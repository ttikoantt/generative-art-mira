<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Speed - タイピングゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00d9ff, #00ff87);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .stat {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            min-width: 120px;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #00ff87;
        }
        .stat-label {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 5px;
        }
        .word-display {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            margin: 20px 0;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .letter {
            font-size: 2rem;
            font-family: 'Courier New', monospace;
            padding: 5px;
            border-radius: 5px;
            transition: all 0.2s ease;
        }
        .letter.current {
            background: rgba(0, 255, 135, 0.3);
            animation: pulse 1s infinite;
        }
        .letter.correct {
            color: #00ff87;
        }
        .letter.incorrect {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.2);
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .input-area {
            margin: 20px 0;
        }
        input {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 15px 25px;
            border-radius: 15px;
            font-size: 1.2rem;
            width: 100%;
            max-width: 500px;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }
        input:focus {
            border-color: #00ff87;
            box-shadow: 0 0 20px rgba(0, 255, 135, 0.3);
        }
        .btn {
            background: linear-gradient(135deg, #00ff87, #00d9ff);
            border: none;
            color: #1a1a2e;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 255, 135, 0.4);
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            z-index: 100;
            transition: all 0.3s ease;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .result {
            background: rgba(0, 255, 135, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result h2 {
            margin-bottom: 15px;
            color: #00ff87;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>⌨️ Typing Speed</h1>
        <p>表示された単語をできるだけ速く入力してください</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="wpm">0</div>
                <div class="stat-label">WPM</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="accuracy">100%</div>
                <div class="stat-label">正確率</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="time">0</div>
                <div class="stat-label">秒</div>
            </div>
        </div>

        <div class="word-display" id="wordDisplay"></div>

        <div class="input-area">
            <input type="text" id="input" placeholder="ここにタイプ..." autocomplete="off" autocapitalize="off">
        </div>

        <button class="btn" onclick="startGame()">スタート</button>

        <div class="result" id="result">
            <h2>🎉 結果</h2>
            <p>タイピング速度: <span id="finalWpm">0</span> WPM</p>
            <p>正確率: <span id="finalAccuracy">0</span>%</p>
            <p>時間: <span id="finalTime">0</span>秒</p>
        </div>
    </div>

    <script>
        const words = [
            'apple', 'banana', 'cherry', 'dragon', 'elephant', 'flower', 'garden',
            'house', 'island', 'jungle', 'kangaroo', 'lemon', 'mountain', 'ocean',
            'piano', 'queen', 'river', 'sunset', 'tiger', 'umbrella', 'violet',
            'water', 'yellow', 'zebra', 'adventure', 'beautiful', 'creative',
            'delicious', 'elephant', 'fantastic', 'gigantic', 'happiness',
            'important', 'journey', 'knowledge', 'language', 'mountain',
            'natural', 'opportunity', 'peaceful', 'questions', 'remember',
            'sunshine', 'tomorrow', 'universe', 'victory', 'wonderful',
            'yesterday', 'amazing', 'brilliant', 'challenge', 'discovery',
            'excitement', 'friendship', 'gratitude', 'harmony', 'inspiration'
        ];

        let currentWord = '';
        let currentLetterIndex = 0;
        let startTime = null;
        let timerInterval = null;
        let totalChars = 0;
        let correctChars = 0;
        let totalWords = 0;
        let isPlaying = false;

        const wordDisplay = document.getElementById('wordDisplay');
        const input = document.getElementById('input');
        const wpmDisplay = document.getElementById('wpm');
        const accuracyDisplay = document.getElementById('accuracy');
        const timeDisplay = document.getElementById('time');
        const result = document.getElementById('result');

        function getRandomWord() {
            return words[Math.floor(Math.random() * words.length)];
        }

        function displayWord() {
            currentWord = getRandomWord();
            currentLetterIndex = 0;
            wordDisplay.innerHTML = '';

            currentWord.split('').forEach((letter, index) => {
                const span = document.createElement('span');
                span.textContent = letter;
                span.className = 'letter';
                if (index === 0) span.classList.add('current');
                wordDisplay.appendChild(span);
            });
        }

        function updateDisplay() {
            const letters = wordDisplay.querySelectorAll('.letter');
            letters.forEach((letter, index) => {
                letter.classList.remove('current');
                if (index < currentLetterIndex) {
                    if (letter.dataset.correct === 'true') {
                        letter.classList.add('correct');
                    } else {
                        letter.classList.add('incorrect');
                    }
                } else if (index === currentLetterIndex) {
                    letter.classList.add('current');
                }
            });
        }

        function calculateStats() {
            const elapsed = (Date.now() - startTime) / 1000;
            const minutes = elapsed / 60;
            const wpm = Math.round((correctChars / 5) / minutes) || 0;
            const accuracy = totalChars > 0 ? Math.round((correctChars / totalChars) * 100) : 100;

            wpmDisplay.textContent = wpm;
            accuracyDisplay.textContent = accuracy + '%';
            timeDisplay.textContent = Math.floor(elapsed);

            return { wpm, accuracy, time: Math.floor(elapsed) };
        }

        function startGame() {
            isPlaying = true;
            totalChars = 0;
            correctChars = 0;
            totalWords = 0;
            startTime = Date.now();
            input.value = '';
            input.disabled = false;
            input.focus();
            result.classList.remove('show');

            displayWord();

            timerInterval = setInterval(() => {
                calculateStats();
            }, 100);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(timerInterval);
            input.disabled = true;

            const stats = calculateStats();
            document.getElementById('finalWpm').textContent = stats.wpm;
            document.getElementById('finalAccuracy').textContent = stats.accuracy;
            document.getElementById('finalTime').textContent = stats.time;
            result.classList.add('show');
        }

        input.addEventListener('input', (e) => {
            if (!isPlaying) return;

            const inputValue = input.value;
            const letters = wordDisplay.querySelectorAll('.letter');
            const targetLetter = currentWord[currentLetterIndex];

            if (inputValue.length > 0) {
                const typedChar = inputValue[inputValue.length - 1];
                totalChars++;

                if (typedChar === targetLetter) {
                    correctChars++;
                    letters[currentLetterIndex].dataset.correct = 'true';
                } else {
                    letters[currentLetterIndex].dataset.correct = 'false';
                }

                currentLetterIndex++;
                input.value = '';

                if (currentLetterIndex >= currentWord.length) {
                    totalWords++;
                    if (totalWords >= 10) {
                        endGame();
                    } else {
                        displayWord();
                    }
                } else {
                    updateDisplay();
                }
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
