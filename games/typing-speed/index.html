<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Speed Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px;
            border-radius: 12px;
        }
        .stat-label {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 5px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: bold;
        }
        .word-display {
            background: #f7f7f7;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .word {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            letter-spacing: 3px;
        }
        .word span {
            transition: all 0.1s;
        }
        .word span.correct {
            color: #10b981;
        }
        .word span.incorrect {
            color: #ef4444;
            text-decoration: underline;
        }
        .input-area {
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            font-size: 18px;
            font-family: 'Courier New', monospace;
            border: 2px solid #ddd;
            border-radius: 10px;
            outline: none;
            transition: all 0.3s;
            text-align: center;
        }
        input[type="text"]:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        .message {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
            min-height: 20px;
        }
        .timer {
            position: relative;
            height: 8px;
            background: #e5e5e5;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .timer-bar {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #667eea);
            transition: width 0.1s;
            border-radius: 4px;
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">WPM</div>
                <div class="stat-value" id="wpm">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">正確率</div>
                <div class="stat-value" id="accuracy">100%</div>
            </div>
        </div>

        <div class="timer">
            <div class="timer-bar" id="timerBar"></div>
        </div>

        <div class="word-display">
            <div class="word" id="wordDisplay">Ready?</div>
        </div>

        <div class="input-area">
            <input type="text" id="wordInput" placeholder="ここに入力..." autocomplete="off">
        </div>

        <button class="btn" id="startBtn">スタート</button>
        <button class="btn" id="resetBtn">リセット</button>

        <div class="message" id="message"></div>
    </div>

    <script>
        const words = [
            'adventure', 'brilliant', 'creative', 'discovery', 'energetic',
            'fantastic', 'greatest', 'harmony', 'inspiring', 'journey',
            'knowledge', 'laughter', 'marvelous', 'narrative', 'optimistic',
            'phenomenal', 'quickest', 'radiant', 'splendid', 'triumphant',
            'ultimate', 'vibrant', 'wonderful', 'xylophone', 'yesterday',
            'zealous', 'algorithm', 'browser', 'computer', 'database',
            'electron', 'function', 'graphics', 'hardware', 'internet',
            'javascript', 'keyboard', 'language', 'monitor', 'network',
            'operator', 'program', 'quantum', 'robotics', 'software',
            'terminal', 'upgrade', 'virtual', 'wireless', 'youtube',
            'awesome', 'beautiful', 'creative', 'dynamic', 'elegant',
            'fascinating', 'generous', 'humble', 'innovative', 'joyful',
            'kindness', 'logical', 'magical', 'natural', 'optimistic',
            'peaceful', 'qualified', 'remarkable', 'spiritual', 'thoughtful',
            'unique', 'valuable', 'wholesome', 'zenith', 'amazing'
        ];

        let score = 0;
        let timeLeft = 60;
        let currentWord = '';
        let isPlaying = false;
        let timer = null;
        let totalTyped = 0;
        let correctTyped = 0;

        const wordDisplay = document.getElementById('wordDisplay');
        const wordInput = document.getElementById('wordInput');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const scoreEl = document.getElementById('score');
        const wpmEl = document.getElementById('wpm');
        const accuracyEl = document.getElementById('accuracy');
        const timerBar = document.getElementById('timerBar');
        const messageEl = document.getElementById('message');

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function showWord() {
            const randomIndex = Math.floor(Math.random() * words.length);
            currentWord = words[randomIndex];
            wordDisplay.innerHTML = currentWord.split('').map(char => `<span>${char}</span>`).join('');
            wordInput.value = '';
        }

        function updateStats() {
            scoreEl.textContent = score;
            const wpm = Math.round((correctTyped / 5) / ((60 - timeLeft) / 60));
            wpmEl.textContent = isFinite(wpm) ? wpm : 0;
            const accuracy = totalTyped > 0 ? Math.round((correctTyped / totalTyped) * 100) : 100;
            accuracyEl.textContent = accuracy + '%';
            timerBar.style.width = (timeLeft / 60 * 100) + '%';
        }

        function startGame() {
            score = 0;
            timeLeft = 60;
            isPlaying = true;
            totalTyped = 0;
            correctTyped = 0;
            messageEl.textContent = '';

            startBtn.disabled = true;
            wordInput.disabled = false;
            wordInput.focus();

            showWord();
            updateStats();

            timer = setInterval(() => {
                timeLeft--;
                updateStats();

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            clearInterval(timer);
            isPlaying = false;
            startBtn.disabled = false;
            wordInput.disabled = true;
            messageEl.textContent = `ゲーム終了！ スコア: ${score} WPM: ${wpmEl.textContent}`;
        }

        function resetGame() {
            clearInterval(timer);
            isPlaying = false;
            score = 0;
            timeLeft = 60;
            totalTyped = 0;
            correctTyped = 0;
            startBtn.disabled = false;
            wordInput.disabled = true;
            wordInput.value = '';
            wordDisplay.textContent = 'Ready?';
            messageEl.textContent = '';
            updateStats();
        }

        wordInput.addEventListener('input', () => {
            if (!isPlaying) return;

            const typed = wordInput.value;
            totalTyped += typed.length;

            // 文字ごとに判定
            const spans = wordDisplay.querySelectorAll('span');
            let allCorrect = true;

            typed.split('').forEach((char, i) => {
                if (spans[i]) {
                    if (char === currentWord[i]) {
                        spans[i].className = 'correct';
                    } else {
                        spans[i].className = 'incorrect';
                        allCorrect = false;
                    }
                }
            });

            // 残りの文字をリセット
            for (let i = typed.length; i < spans.length; i++) {
                spans[i].className = '';
            }

            // 正解判定
            if (typed === currentWord && allCorrect) {
                score += 10;
                correctTyped += currentWord.length;
                showWord();
                updateStats();
            }
        });

        startBtn.addEventListener('click', startGame);
        resetBtn.addEventListener('click', resetGame);

        wordInput.disabled = true;
        updateStats();

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
