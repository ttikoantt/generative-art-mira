<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Speed Challenge - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 15px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 10px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }

        .word-display {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin: 20px 0;
            text-align: center;
        }

        .current-word {
            font-size: 36px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .typed-chars {
            color: #28a745;
        }

        .remaining-chars {
            color: #333;
        }

        .input-area {
            margin: 20px 0;
        }

        input {
            width: 100%;
            padding: 15px;
            font-size: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            text-align: center;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .fullscreen-btn {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
        }

        .fullscreen-btn:hover {
            background: rgba(102, 126, 234, 0.2);
        }

        .result {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .result h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .result-item {
            margin: 15px 0;
            font-size: 18px;
        }

        .result-value {
            font-weight: bold;
            color: #764ba2;
        }

        @media (max-width: 768px) {
            .game-container {
                padding: 20px;
            }

            h1 {
                font-size: 22px;
            }

            .current-word {
                font-size: 28px;
            }

            .stat-value {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>⌨️ Typing Speed Challenge</h1>

        <div id="game-area">
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">Score</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Time</div>
                    <div class="stat-value" id="time">60</div>
                </div>
                <div class="stat">
                    <div class="stat-label">WPM</div>
                    <div class="stat-value" id="wpm">0</div>
                </div>
            </div>

            <div class="word-display">
                <div class="current-word" id="word-display"></div>
            </div>

            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>

            <div class="input-area">
                <input type="text" id="input" placeholder="Type here..." autocomplete="off" autocapitalize="off">
            </div>

            <div class="buttons">
                <button class="start-btn" onclick="startGame()">Start Game</button>
                <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
            </div>
        </div>

        <div class="result" id="result">
            <h2>🎉 Time's Up!</h2>
            <div class="result-item">Final Score: <span class="result-value" id="final-score">0</span></div>
            <div class="result-item">Words Typed: <span class="result-value" id="final-words">0</span></div>
            <div class="result-item">Accuracy: <span class="result-value" id="final-accuracy">0%</span></div>
            <div class="result-item">Average WPM: <span class="result-value" id="final-wpm">0</span></div>
            <button class="start-btn" onclick="startGame()" style="width: 100%; margin-top: 20px;">Play Again</button>
        </div>
    </div>

    <script>
        const words = [
            'algorithm', 'browser', 'computer', 'database', 'encryption',
            'function', 'graphics', 'hardware', 'interface', 'javascript',
            'keyboard', 'language', 'memory', 'network', 'operating',
            'program', 'quantum', 'responsive', 'software', 'technology',
            'user', 'virtual', 'wireless', 'xml', 'yellow', 'zone',
            'automation', 'bandwidth', 'cybersecurity', 'debug', 'ethernet',
            'firewall', 'gigabyte', 'html', 'internet', 'json', 'kernel',
            'latency', 'malware', 'node', 'object', 'python', 'query',
            'robot', 'server', 'terminal', 'url', 'variable', 'widget',
            'zip', 'async', 'binary', 'cache', 'data', 'element', 'frame'
        ];

        let currentWord = '';
        let score = 0;
        let timeLeft = 60;
        let wordsTyped = 0;
        let correctChars = 0;
        let totalChars = 0;
        let timer = null;
        let gameStarted = false;
        let startTime = 0;

        const wordDisplay = document.getElementById('word-display');
        const input = document.getElementById('input');
        const scoreDisplay = document.getElementById('score');
        const timeDisplay = document.getElementById('time');
        const wpmDisplay = document.getElementById('wpm');
        const progressBar = document.getElementById('progress');
        const gameArea = document.getElementById('game-area');
        const result = document.getElementById('result');

        function getRandomWord() {
            return words[Math.floor(Math.random() * words.length)];
        }

        function displayWord() {
            currentWord = getRandomWord();
            wordDisplay.innerHTML = currentWord;
        }

        function updateWordDisplay() {
            const typed = input.value;
            const remaining = currentWord.substring(typed.length);
            wordDisplay.innerHTML = `<span class="typed-chars">${typed}</span><span class="remaining-chars">${remaining}</span>`;
        }

        function calculateWPM() {
            if (!startTime || wordsTyped === 0) return 0;
            const minutes = (Date.now() - startTime) / 60000;
            return Math.round(wordsTyped / minutes);
        }

        function updateProgress() {
            const totalWords = 10;
            const progress = (wordsTyped % totalWords) / totalWords * 100;
            progressBar.style.width = progress + '%';
        }

        function startGame() {
            score = 0;
            timeLeft = 60;
            wordsTyped = 0;
            correctChars = 0;
            totalChars = 0;
            gameStarted = true;
            startTime = Date.now();

            scoreDisplay.textContent = '0';
            timeDisplay.textContent = '60';
            wpmDisplay.textContent = '0';
            input.value = '';
            input.disabled = false;
            input.focus();

            gameArea.style.display = 'block';
            result.style.display = 'none';

            displayWord();

            timer = setInterval(() => {
                timeLeft--;
                timeDisplay.textContent = timeLeft;

                wpmDisplay.textContent = calculateWPM();

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            clearInterval(timer);
            gameStarted = false;
            input.disabled = true;

            const accuracy = totalChars > 0 ? Math.round((correctChars / totalChars) * 100) : 0;
            const finalWpm = calculateWPM();

            document.getElementById('final-score').textContent = score;
            document.getElementById('final-words').textContent = wordsTyped;
            document.getElementById('final-accuracy').textContent = accuracy + '%';
            document.getElementById('final-wpm').textContent = finalWpm;

            gameArea.style.display = 'none';
            result.style.display = 'block';
        }

        input.addEventListener('input', () => {
            if (!gameStarted) return;

            const typed = input.value;

            if (typed === currentWord) {
                score += 10;
                wordsTyped++;
                correctChars += currentWord.length;
                totalChars += currentWord.length;

                scoreDisplay.textContent = score;
                input.value = '';
                displayWord();
                updateProgress();
            } else if (currentWord.startsWith(typed)) {
                updateWordDisplay();
            } else {
                totalChars++;
                updateWordDisplay();
            }

            wpmDisplay.textContent = calculateWPM();
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        displayWord();
    </script>
</body>
</html>
