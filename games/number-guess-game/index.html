<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字当てゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
        }

        .message {
            font-size: 1.3rem;
            margin: 20px 0;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .message.high { color: #ff6b6b; }
        .message.low { color: #4ecdc4; }
        .message.correct { color: #ffd700; font-size: 1.8rem; }
        .message.info { color: #fff; }

        .input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        input[type="number"] {
            padding: 15px 25px;
            font-size: 1.5rem;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            text-align: center;
            width: 150px;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="number"]:focus {
            border-color: #ffd700;
            background: rgba(255,255,255,0.3);
        }

        input[type="number"]::placeholder {
            color: rgba(255,255,255,0.5);
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #333;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: rgba(255,255,255,0.2);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        button.secondary:hover {
            background: rgba(255,255,255,0.3);
        }

        .history {
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
            max-height: 150px;
            overflow-y: auto;
        }

        .history-title {
            font-size: 0.9rem;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 15px;
            margin: 5px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .history-item .high { color: #ff6b6b; }
        .history-item .low { color: #4ecdc4; }
        .history-item .correct { color: #ffd700; }

        .difficulty {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .difficulty-btn {
            padding: 10px 20px;
            font-size: 1rem;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            color: #fff;
        }

        .difficulty-btn.active {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #333;
            border-color: #ffd700;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .game-card {
                padding: 20px;
            }

            .stats {
                font-size: 0.9rem;
            }

            .message {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 数字当てゲーム</h1>
        <p class="subtitle">1から100までの数字を当ててみよう！</p>

        <div class="game-card">
            <div class="difficulty">
                <button class="difficulty-btn" onclick="setDifficulty(10)" data-range="10">Easy (1-10)</button>
                <button class="difficulty-btn active" onclick="setDifficulty(100)" data-range="100">Normal (1-100)</button>
                <button class="difficulty-btn" onclick="setDifficulty(1000)" data-range="1000">Hard (1-1000)</button>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">挑戦回数</span>
                    <span class="stat-value" id="attempts">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">ベスト記録</span>
                    <span class="stat-value" id="best">-</span>
                </div>
            </div>

            <div class="message info" id="message">
                数字を入力してスタート！
            </div>

            <div class="input-group">
                <input type="number" id="guess" placeholder="?" min="1" max="100" onkeypress="if(event.key==='Enter')makeGuess()">
                <button onclick="makeGuess()">予想！</button>
            </div>

            <button class="secondary" onclick="newGame()">🔄 新しいゲーム</button>
        </div>

        <div class="history">
            <div class="history-title">📜 予想履歴</div>
            <div id="history-list"></div>
        </div>
    </div>

    <script>
        let targetNumber;
        let attempts;
        let maxNumber = 100;
        let gameOver = false;
        let bestScore = localStorage.getItem('numberGuessBest') || null;

        const messageEl = document.getElementById('message');
        const attemptsEl = document.getElementById('attempts');
        const bestEl = document.getElementById('best');
        const guessInput = document.getElementById('guess');
        const historyList = document.getElementById('history-list');

        function init() {
            if (bestScore) {
                bestEl.textContent = bestScore;
            }
            newGame();
        }

        function setDifficulty(range) {
            maxNumber = range;
            guessInput.max = range;

            // Update button styles
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('active');
                if (parseInt(btn.dataset.range) === range) {
                    btn.classList.add('active');
                }
            });

            newGame();
        }

        function newGame() {
            targetNumber = Math.floor(Math.random() * maxNumber) + 1;
            attempts = 0;
            gameOver = false;

            attemptsEl.textContent = '0';
            messageEl.textContent = `1から${maxNumber}までの数字を当てて！`;
            messageEl.className = 'message info';
            guessInput.value = '';
            guessInput.disabled = false;
            guessInput.focus();

            historyList.innerHTML = '';

            console.log('答え:', targetNumber); // For debugging
        }

        function makeGuess() {
            if (gameOver) {
                newGame();
                return;
            }

            const guess = parseInt(guessInput.value);

            if (isNaN(guess) || guess < 1 || guess > maxNumber) {
                messageEl.textContent = `1から${maxNumber}までの数字を入力して！`;
                messageEl.className = 'message info';
                return;
            }

            attempts++;
            attemptsEl.textContent = attempts;

            addToHistory(guess, guess === targetNumber ? 'correct' : (guess > targetNumber ? 'high' : 'low'));

            if (guess === targetNumber) {
                // Correct!
                gameOver = true;
                messageEl.textContent = `🎉 正解！ ${targetNumber} でした！（${attempts}回目）`;
                messageEl.className = 'message correct';

                if (!bestScore || attempts < bestScore) {
                    bestScore = attempts;
                    localStorage.setItem('numberGuessBest', bestScore);
                    bestEl.textContent = bestScore;
                    messageEl.textContent = `🎉 新記録達成！ ${attempts}回で正解！`;
                }

                guessInput.disabled = true;
            } else if (guess > targetNumber) {
                messageEl.textContent = `⬇️ ${guess} より小さいです`;
                messageEl.className = 'message high';
            } else {
                messageEl.textContent = `⬆️ ${guess} より大きいです`;
                messageEl.className = 'message low';
            }

            guessInput.value = '';
            guessInput.focus();
        }

        function addToHistory(guess, result) {
            const item = document.createElement('div');
            item.className = 'history-item';

            let arrow = '';
            let resultClass = result;

            if (result === 'high') {
                arrow = '⬇️';
            } else if (result === 'low') {
                arrow = '⬆️';
            } else {
                arrow = '✅';
            }

            item.innerHTML = `
                <span>${attempts}回目: ${guess}</span>
                <span class="${resultClass}">${arrow}</span>
            `;

            historyList.insertBefore(item, historyList.firstChild);
        }

        // Initialize game
        init();
    </script>
</body>
</html>
