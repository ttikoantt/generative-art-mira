<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bouncing Balls - Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: none;
        }

        #canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .ui {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: #fff;
        }

        .score {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .lives {
            font-size: 18px;
            margin-top: 5px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            z-index: 100;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 200;
            color: #fff;
            display: none;
        }

        .game-over.show {
            display: block;
        }

        .game-over h2 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
        }

        .game-over p {
            font-size: 24px;
            margin-bottom: 30px;
        }

        .game-over button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: #fff;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .game-over button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-align: center;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="ui">
        <div class="score">Score: <span id="score">0</span></div>
        <div class="lives">❤️ <span id="lives">3</span></div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="game-over" id="gameOver">
        <h2>Game Over!</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button onclick="restartGame()">Play Again</button>
    </div>

    <div class="instructions">タップでジャンプ</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let ball;
        let platforms = [];
        let collectibles = [];
        let score = 0;
        let lives = 3;
        let gameOver = false;
        let cameraY = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Ball {
            constructor() {
                this.radius = 15;
                this.x = width / 2;
                this.y = height - 100;
                this.vx = 0;
                this.vy = 0;
                this.gravity = 0.5;
                this.jumpForce = -12;
                this.onGround = false;
                this.color = '#667eea';
            }

            update() {
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;

                // 地面の判定
                if (this.y + this.radius > height) {
                    this.y = height - this.radius;
                    this.vy = 0;
                    this.onGround = true;
                } else {
                    this.onGround = false;
                }

                // 壁の判定
                if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx = -this.vx * 0.8;
                }
                if (this.x + this.radius > width) {
                    this.x = width - this.radius;
                    this.vx = -this.vx * 0.8;
                }
            }

            jump() {
                if (this.onGround) {
                    this.vy = this.jumpForce;
                    this.onGround = false;
                }
            }

            draw() {
                // ボールの影
                ctx.beginPath();
                ctx.arc(this.x + 3, this.y + 3, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.fill();

                // ボール
                const gradient = ctx.createRadialGradient(
                    this.x - 5, this.y - 5, 0,
                    this.x, this.y, this.radius
                );
                gradient.addColorStop(0, '#a5b4fc');
                gradient.addColorStop(1, this.color);

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        class Platform {
            constructor(x, y, w, h, type = 'normal') {
                this.x = x;
                this.y = y;
                this.width = w;
                this.height = h;
                this.type = type;
                this.moving = type === 'moving';
                this.moveSpeed = 2;
                this.moveRange = 100;
                this.startX = x;
                this.direction = 1;
            }

            update() {
                if (this.moving) {
                    this.x += this.moveSpeed * this.direction;
                    if (this.x > this.startX + this.moveRange || this.x < this.startX - this.moveRange) {
                        this.direction *= -1;
                    }
                }
            }

            draw() {
                let color = '#4a5568';
                if (this.type === 'moving') color = '#ed8936';
                if (this.type === 'breakable') color = '#fc8181';

                ctx.fillStyle = color;
                ctx.fillRect(this.x, this.y, this.width, this.height);

                // 光沢
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.fillRect(this.x, this.y, this.width, 5);
            }
        }

        class Collectible {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 10;
                this.collected = false;
                this.rotation = 0;
            }

            update() {
                this.rotation += 0.05;
            }

            draw() {
                if (this.collected) return;

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // 星形
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
                    const x = Math.cos(angle) * this.radius;
                    const y = Math.sin(angle) * this.radius;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();

                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius);
                gradient.addColorStop(0, '#fef08a');
                gradient.addColorStop(1, '#f59e0b');
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.restore();
            }
        }

        function checkCollision(ball, platform) {
            return ball.x + ball.radius > platform.x &&
                   ball.x - ball.radius < platform.x + platform.width &&
                   ball.y + ball.radius > platform.y &&
                   ball.y - ball.radius < platform.y + platform.height;
        }

        function checkCollectible(ball, collectible) {
            const dx = ball.x - collectible.x;
            const dy = ball.y - collectible.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < ball.radius + collectible.radius;
        }

        function generateLevel() {
            platforms = [];
            collectibles = [];

            // 地面
            platforms.push(new Platform(0, height - 20, width, 20));

            // ランダムなプラットフォーム
            for (let i = 0; i < 15; i++) {
                const x = Math.random() * (width - 150);
                const y = height - 100 - i * 80;
                const w = 100 + Math.random() * 100;
                const h = 20;

                let type = 'normal';
                if (Math.random() < 0.2) type = 'moving';
                else if (Math.random() < 0.1) type = 'breakable';

                platforms.push(new Platform(x, y, w, h, type));

                // コレクティブル
                if (Math.random() < 0.5) {
                    collectibles.push(new Collectible(x + w / 2, y - 30));
                }
            }

            // 最初のプラットフォーム上にボール
            ball = new Ball();
            ball.y = height - 50;
        }

        function init() {
            resize();
            generateLevel();
            gameLoop();
        }

        function gameLoop() {
            if (gameOver) return;

            ctx.clearRect(0, 0, width, height);

            // 更新
            ball.update();
            platforms.forEach(p => p.update());
            collectibles.forEach(c => c.update());

            // プラットフォームとの衝突
            platforms.forEach(platform => {
                if (checkCollision(ball, platform)) {
                    // 上から乗った場合
                    if (ball.vy > 0 && ball.y - ball.radius < platform.y) {
                        ball.y = platform.y - ball.radius;
                        ball.vy = 0;
                        ball.onGround = true;
                    }
                }
            });

            // コレクティブルとの衝突
            collectibles.forEach(collectible => {
                if (!collectible.collected && checkCollectible(ball, collectible)) {
                    collectible.collected = true;
                    score += 10;
                    updateUI();
                }
            });

            // 落下判定
            if (ball.y - ball.radius > height) {
                lives--;
                updateUI();
                if (lives <= 0) {
                    endGame();
                } else {
                    ball.y = height - 100;
                    ball.vy = 0;
                }
            }

            // 描画
            platforms.forEach(p => p.draw());
            collectibles.forEach(c => c.draw());
            ball.draw();

            requestAnimationFrame(gameLoop);
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
        }

        function endGame() {
            gameOver = true;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.add('show');
        }

        function restartGame() {
            score = 0;
            lives = 3;
            gameOver = false;
            document.getElementById('gameOver').classList.remove('show');
            updateUI();
            generateLevel();
            gameLoop();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // タップでジャンプ
        canvas.addEventListener('click', () => ball.jump());
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            ball.jump();
        });

        // キーボード操作
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                ball.jump();
            }
        });

        window.addEventListener('resize', resize);

        init();
    </script>
</body>
</html>
