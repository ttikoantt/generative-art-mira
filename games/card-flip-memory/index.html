<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Flip Memory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-size: clamp(24px, 5vw, 48px);
            margin-bottom: 10px;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            font-size: clamp(16px, 3vw, 24px);
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            color: #888;
            font-size: 14px;
        }

        .stat-value {
            font-weight: bold;
            color: #f093fb;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
            max-width: 600px;
        }

        .card {
            width: clamp(60px, 15vw, 120px);
            height: clamp(80px, 20vw, 160px);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(32px, 8vw, 64px);
            transition: all 0.5s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            position: relative;
            transform-style: preserve-3d;
        }

        .card:hover:not(.flipped):not(.matched) {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        .card.flipped {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            transform: rotateY(180deg);
        }

        .card.matched {
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            opacity: 0.6;
            cursor: not-allowed;
            animation: matchPulse 0.5s ease;
        }

        @keyframes matchPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .card-content {
            display: none;
            transform: rotateY(180deg);
        }

        .card.flipped .card-content,
        .card.matched .card-content {
            display: block;
        }

        .card-back {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .card.flipped .card-back,
        .card.matched .card-back {
            display: none;
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4);
        }

        .fullscreen-btn:hover {
            box-shadow: 0 6px 20px rgba(240, 147, 251, 0.6);
        }

        .win-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .win-message.show {
            display: block;
        }

        .win-message h2 {
            font-size: clamp(24px, 5vw, 36px);
            margin-bottom: 20px;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .win-message p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .win-message button {
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .game-board {
                gap: 10px;
            }

            button {
                padding: 10px 20px;
                font-size: 14px;
            }

            .stats {
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <h1>🎴 Card Flip Memory</h1>
    <p style="color: #aaa; margin-bottom: 15px;">カードをめくってペアを見つけよう！</p>

    <div class="stats">
        <div class="stat">
            <div class="stat-label">ムーブ</div>
            <div class="stat-value" id="moves">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">ペア</div>
            <div class="stat-value" id="pairs">0/8</div>
        </div>
        <div class="stat">
            <div class="stat-label">タイム</div>
            <div class="stat-value" id="timer">0:00</div>
        </div>
    </div>

    <div class="game-board" id="gameBoard"></div>

    <div class="controls">
        <button onclick="initGame()">🔄 リスタート</button>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">📺 全画面</button>
    </div>

    <div class="win-message" id="winMessage">
        <h2>🎉 クリア！</h2>
        <p>おめでとうございます！</p>
        <p>ムーブ: <span id="finalMoves">0</span></p>
        <p>タイム: <span id="finalTime">0:00</span></p>
        <button onclick="closeWinMessage(); initGame();">🔄 もう一度プレイ</button>
    </div>

    <script>
        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const pairsDisplay = document.getElementById('pairs');
        const timerDisplay = document.getElementById('timer');
        const winMessage = document.getElementById('winMessage');

        const emojis = ['🍎', '🍊', '🍋', '🍇', '🍓', '🍒', '🍑', '🍍'];
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let timer = 0;
        let timerInterval = null;
        let canFlip = true;

        function initGame() {
            cards = [];
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            timer = 0;
            canFlip = true;

            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }

            updateStats();

            const cardPairs = [...emojis, ...emojis];
            shuffleArray(cardPairs);

            gameBoard.innerHTML = '';
            
            cardPairs.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;
                card.dataset.emoji = emoji;

                card.innerHTML = `
                    <div class="card-back">❓</div>
                    <div class="card-content">${emoji}</div>
                `;

                card.addEventListener('click', () => flipCard(card));
                gameBoard.appendChild(card);
            });

            startTimer();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function flipCard(card) {
            if (!canFlip) return;
            if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
            if (flippedCards.length >= 2) return;

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                moves++;
                updateStats();
                checkMatch();
            }
        }

        function checkMatch() {
            canFlip = false;
            const [card1, card2] = flippedCards;
            const emoji1 = card1.dataset.emoji;
            const emoji2 = card2.dataset.emoji;

            if (emoji1 === emoji2) {
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    matchedPairs++;
                    updateStats();
                    flippedCards = [];
                    canFlip = true;

                    if (matchedPairs === emojis.length) {
                        endGame();
                    }
                }, 500);
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    canFlip = true;
                }, 1000);
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timer++;
                updateStats();
            }, 1000);
        }

        function updateStats() {
            movesDisplay.textContent = moves;
            pairsDisplay.textContent = `${matchedPairs}/${emojis.length}`;
            
            const minutes = Math.floor(timer / 60);
            const seconds = timer % 60;
            timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        function endGame() {
            clearInterval(timerInterval);
            
            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('finalTime').textContent = timerDisplay.textContent;
            
            setTimeout(() => {
                winMessage.classList.add('show');
            }, 500);
        }

        function closeWinMessage() {
            winMessage.classList.remove('show');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert('全画面表示に対応していません');
                });
            } else {
                document.exitFullscreen();
            }
        }

        // ゲーム開始
        initGame();
    </script>
</body>
</html>
