<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Word Catcher | 単語キャッチ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            overflow: hidden;
        }

        h1 {
            font-size: clamp(1.2rem, 4vw, 2rem);
            margin: 1rem;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        #game-container {
            position: relative;
            width: min(95vw, 500px);
            height: min(70vh, 500px);
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .stats {
            display: flex;
            gap: 1.5rem;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin: 0.5rem;
            backdrop-filter: blur(10px);
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.7;
            margin-bottom: 0.2rem;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .controls {
            display: flex;
            gap: 0.8rem;
            padding: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 0.7rem 1.4rem;
            font-size: 0.9rem;
            font-weight: bold;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(240, 147, 251, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 0.5rem 1rem;
            font-size: 0.7rem;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 10;
            border: none;
            box-shadow: none;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        #game-container:fullscreen .fullscreen-btn {
            display: none;
        }

        .instructions {
            text-align: center;
            padding: 0.5rem;
            font-size: 0.7rem;
            opacity: 0.8;
            max-width: 500px;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            display: none;
            z-index: 100;
        }

        .game-over.show {
            display: block;
        }

        .game-over h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #f5576c;
        }

        .game-over p {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 600px) {
            .stats {
                gap: 1rem;
                padding: 0.6rem 0.8rem;
            }

            .stat-value {
                font-size: 1.1rem;
            }

            button {
                padding: 0.6rem 1.2rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <h1>📝 Word Catcher</h1>

    <div id="game-container">
        <canvas id="canvas"></canvas>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

        <div class="game-over" id="game-over">
            <h2>Game Over!</h2>
            <p>スコア: <span id="final-score">0</span></p>
            <button onclick="restartGame()">もう一度プレイ</button>
        </div>
    </div>

    <div class="stats">
        <div class="stat">
            <div class="stat-label">スコア</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">レベル</div>
            <div class="stat-value" id="level">1</div>
        </div>
        <div class="stat">
            <div class="stat-label">ライフ</div>
            <div class="stat-value" id="lives">❤️❤️❤️</div>
        </div>
    </div>

    <div class="controls">
        <button onclick="startGame()">▶️ スタート</button>
        <button onclick="pauseGame()">⏸️ 一時停止</button>
    </div>

    <p class="instructions">← → またはタッチで移動 | 落ちる単語をキャッチ！</p>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;

        // Game state
        let gameState = 'idle'; // idle, playing, paused, gameover
        let score = 0;
        let level = 1;
        let lives = 3;
        let animationId;

        // Player basket
        const basket = {
            x: 0,
            y: 0,
            width: 80,
            height: 15,
            speed: 8,
            targetX: 0
        };

        // Words
        const words = [
            'AI', 'CODE', 'DATA', 'GAME', 'JAVA', 'NODE', 'RUST', 'WEB',
            'BYTE', 'CHIP', 'CLOUD', 'DEBUG', 'ERROR', 'LOGIC', 'MOUSE',
            'PIXEL', 'QUERY', 'ROBOT', 'SCREEN', 'SERVER', 'SHELL', 'TOKEN',
            'UNITY', 'VIDEO', 'WIFI', 'WORLD', 'ALGORITHM', 'BROWSER',
            'COMPILER', 'DATABASE', 'FUNCTION', 'GRAPHICS', 'NETWORK'
        ];

        let fallingWords = [];
        let wordSpawnTimer = 0;
        let wordSpawnInterval = 120; // frames
        let baseSpeed = 1;

        function resize() {
            const container = document.getElementById('game-container');
            const rect = container.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;

            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;

            width = canvas.width;
            height = canvas.height;

            ctx.scale(dpr, dpr);
            width = rect.width;
            height = rect.height;

            basket.y = height - 40;
            basket.x = width / 2 - basket.width / 2;
            basket.targetX = basket.x;
        }

        function spawnWord() {
            const word = words[Math.floor(Math.random() * words.length)];
            const wordWidth = ctx.measureText(word).width + 20;

            fallingWords.push({
                text: word,
                x: Math.random() * (width - wordWidth),
                y: -30,
                width: wordWidth,
                height: 25,
                speed: baseSpeed + Math.random() * 0.5,
                color: `hsl(${Math.random() * 360}, 70%, 60%)`
            });
        }

        function update() {
            if (gameState !== 'playing') return;

            // Update basket position (smooth movement)
            const diff = basket.targetX - basket.x;
            basket.x += diff * 0.15;

            // Keep basket in bounds
            if (basket.x < 0) basket.x = 0;
            if (basket.x > width - basket.width) basket.x = width - basket.width;

            // Spawn words
            wordSpawnTimer++;
            if (wordSpawnTimer >= wordSpawnInterval) {
                spawnWord();
                wordSpawnTimer = 0;
            }

            // Update words
            for (let i = fallingWords.length - 1; i >= 0; i--) {
                const word = fallingWords[i];
                word.y += word.speed + (level - 1) * 0.3;

                // Check collision with basket
                if (word.y + word.height >= basket.y &&
                    word.y + word.height <= basket.y + basket.height &&
                    word.x + word.width >= basket.x &&
                    word.x <= basket.x + basket.width) {

                    // Caught!
                    score += word.text.length * 10;
                    fallingWords.splice(i, 1);
                    updateStats();
                    continue;
                }

                // Check if word fell off screen
                if (word.y > height) {
                    fallingWords.splice(i, 1);
                    lives--;
                    updateStats();

                    if (lives <= 0) {
                        gameOver();
                    }
                }
            }

            // Level up
            if (score >= level * 200) {
                level++;
                wordSpawnInterval = Math.max(40, 120 - level * 10);
                updateStats();
            }
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = 'rgba(26, 26, 46, 1)';
            ctx.fillRect(0, 0, width, height);

            // Draw stars background
            for (let i = 0; i < 50; i++) {
                const x = (i * 73) % width;
                const y = (i * 97) % height;
                ctx.fillStyle = `rgba(255, 255, 255, ${0.3 + Math.sin(Date.now() / 1000 + i) * 0.2})`;
                ctx.beginPath();
                ctx.arc(x, y, 1, 0, Math.PI * 2);
                ctx.fill();
            }

            // Draw basket
            const gradient = ctx.createLinearGradient(basket.x, basket.y, basket.x, basket.y + basket.height);
            gradient.addColorStop(0, '#f093fb');
            gradient.addColorStop(1, '#f5576c');

            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.roundRect(basket.x, basket.y, basket.width, basket.height, 5);
            ctx.fill();

            // Draw basket glow
            ctx.shadowColor = '#f093fb';
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0;

            // Draw words
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';

            for (const word of fallingWords) {
                // Word background
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.beginPath();
                ctx.roundRect(word.x - 5, word.y, word.width, word.height, 5);
                ctx.fill();

                // Word text
                ctx.fillStyle = word.color;
                ctx.fillText(word.text, word.x, word.y + 4);
            }

            // Draw game state messages
            if (gameState === 'idle') {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('スタートボタンを押してね！', width / 2, height / 2);
            } else if (gameState === 'paused') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, width, height);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.font = 'bold 28px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('一時停止', width / 2, height / 2);
            }
        }

        function animate() {
            update();
            draw();
            animationId = requestAnimationFrame(animate);
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lives').textContent = '❤️'.repeat(Math.max(0, lives));
        }

        function startGame() {
            gameState = 'playing';
            score = 0;
            level = 1;
            lives = 3;
            fallingWords = [];
            wordSpawnTimer = 0;
            wordSpawnInterval = 120;
            updateStats();
        }

        function pauseGame() {
            if (gameState === 'playing') {
                gameState = 'paused';
            } else if (gameState === 'paused') {
                gameState = 'playing';
            }
        }

        function gameOver() {
            gameState = 'gameover';
            document.getElementById('final-score').textContent = score;
            document.getElementById('game-over').classList.add('show');
        }

        function restartGame() {
            document.getElementById('game-over').classList.remove('show');
            startGame();
        }

        function toggleFullscreen() {
            const container = document.getElementById('game-container');
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                container.requestFullscreen();
            }
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                basket.targetX = Math.max(0, basket.targetX - 50);
            } else if (e.key === 'ArrowRight') {
                basket.targetX = Math.min(width - basket.width, basket.targetX + 50);
            }
        });

        // Touch controls
        canvas.addEventListener('touchstart', handleTouch);
        canvas.addEventListener('touchmove', handleTouch);

        function handleTouch(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;

            basket.targetX = x - basket.width / 2;

            // Keep in bounds
            if (basket.targetX < 0) basket.targetX = 0;
            if (basket.targetX > width - basket.width) basket.targetX = width - basket.width;
        }

        window.addEventListener('resize', resize);

        // Initialize
        resize();
        animate();
    </script>
</body>
</html>
