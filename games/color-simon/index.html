<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Color Simon - カラーシーザイム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #fff;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .score-display {
            color: #ffd700;
            font-size: 24px;
            margin-bottom: 30px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .game-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .color-btn {
            aspect-ratio: 1;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .color-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.3);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .color-btn:hover::before {
            opacity: 0.2;
        }

        .color-btn:active {
            transform: scale(0.95);
        }

        .color-btn.active::before {
            opacity: 0.6;
        }

        .red { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%); }
        .blue { background: linear-gradient(135deg, #4ecdc4 0%, #3db8b0 100%); }
        .green { background: linear-gradient(135deg, #a8e6cf 0%, #88d4ab 100%); }
        .yellow { background: linear-gradient(135deg, #ffd93d 0%, #e6c235 100%); }

        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            margin-bottom: 20px;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            color: #fff;
            font-size: 16px;
            margin-top: 20px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fullscreen-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 480px) {
            h1 { font-size: 24px; }
            .score-display { font-size: 20px; }
            .game-board { gap: 10px; }
            .color-btn { border-radius: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Color Simon</h1>
        <div class="score-display">Level: <span id="level">1</span></div>

        <div class="game-board">
            <button class="color-btn red" data-color="red" aria-label="Red"></button>
            <button class="color-btn blue" data-color="blue" aria-label="Blue"></button>
            <button class="color-btn green" data-color="green" aria-label="Green"></button>
            <button class="color-btn yellow" data-color="yellow" aria-label="Yellow"></button>
        </div>

        <button class="start-btn" id="startBtn">Start Game</button>
        <div class="message" id="message">Press Start to begin!</div>

        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    </div>

    <script>
        const colors = ['red', 'blue', 'green', 'yellow'];
        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let isPlaying = false;
        let isShowingSequence = false;

        const startBtn = document.getElementById('startBtn');
        const message = document.getElementById('message');
        const levelDisplay = document.getElementById('level');
        const colorBtns = document.querySelectorAll('.color-btn');

        function playTone(color) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            const frequencies = {
                red: 261.63,
                blue: 329.63,
                green: 392.00,
                yellow: 523.25
            };

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = frequencies[color];
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        function flashButton(color) {
            const btn = document.querySelector(`[data-color="${color}"]`);
            btn.classList.add('active');
            playTone(color);

            setTimeout(() => {
                btn.classList.remove('active');
            }, 300);
        }

        function addToSequence() {
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            sequence.push(randomColor);
        }

        async function showSequence() {
            isShowingSequence = true;
            message.textContent = 'Watch carefully...';
            startBtn.disabled = true;

            await new Promise(resolve => setTimeout(resolve, 1000));

            for (let color of sequence) {
                flashButton(color);
                await new Promise(resolve => setTimeout(resolve, 600));
            }

            message.textContent = 'Your turn!';
            playerSequence = [];
            isShowingSequence = false;
        }

        function handleColorClick(color) {
            if (!isPlaying || isShowingSequence) return;

            flashButton(color);
            playerSequence.push(color);

            const currentIndex = playerSequence.length - 1;

            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                gameOver();
                return;
            }

            if (playerSequence.length === sequence.length) {
                level++;
                levelDisplay.textContent = level;
                message.textContent = 'Correct! Next level...';
                isPlaying = false;
                startBtn.disabled = false;

                setTimeout(() => {
                    addToSequence();
                    showSequence();
                    isPlaying = true;
                }, 1500);
            }
        }

        function gameOver() {
            isPlaying = false;
            message.textContent = `Game Over! You reached level ${level}!`;
            startBtn.disabled = false;
            startBtn.textContent = 'Play Again';

            // Flash all colors
            colors.forEach(color => {
                setTimeout(() => flashButton(color), 0);
            });
        }

        function startGame() {
            level = 1;
            sequence = [];
            playerSequence = [];
            levelDisplay.textContent = level;
            isPlaying = true;

            addToSequence();
            showSequence();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Event listeners
        startBtn.addEventListener('click', () => {
            startGame();
            startBtn.textContent = 'Playing...';
        });

        colorBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const color = btn.dataset.color;
                handleColorClick(color);
            });

            // Touch support
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const color = btn.dataset.color;
                handleColorClick(color);
            });
        });

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (!isPlaying || isShowingSequence) return;

            const keyMap = {
                'q': 'red',
                'w': 'blue',
                'a': 'green',
                's': 'yellow'
            };

            if (keyMap[e.key.toLowerCase()]) {
                handleColorClick(keyMap[e.key.toLowerCase()]);
            }
        });
    </script>
</body>
</html>
