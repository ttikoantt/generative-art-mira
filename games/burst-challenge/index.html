<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Burst Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .score-display {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .timer-display {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .combo-display {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 100;
        }

        .combo-display.active {
            opacity: 1;
            animation: comboPulse 0.5s ease;
        }

        @keyframes comboPulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.2); }
        }

        .start-screen, .end-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(10px);
        }

        .start-screen h1, .end-screen h1 {
            color: white;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .start-screen p, .end-screen p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 18px;
            margin-bottom: 30px;
            text-align: center;
            max-width: 400px;
        }

        .final-score {
            color: #ffd700;
            font-size: 64px;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            pointer-events: auto;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .target {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s ease;
            animation: targetAppear 0.3s ease;
        }

        @keyframes targetAppear {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .target.bursting {
            animation: targetBurst 0.3s ease forwards;
        }

        @keyframes targetBurst {
            to {
                transform: scale(2);
                opacity: 0;
            }
        }

        .normal-target {
            background: radial-gradient(circle, #ff6b6b 0%, #ee5a6f 100%);
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.6);
        }

        .bonus-target {
            background: radial-gradient(circle, #ffd700 0%, #ffaa00 100%);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            animation: targetAppear 0.3s ease, bonusPulse 1s ease infinite;
        }

        @keyframes bonusPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .penalty-target {
            background: radial-gradient(circle, #4ecdc4 0%, #44a08d 100%);
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.6);
        }

        .burst-particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .start-screen h1, .end-screen h1 {
                font-size: 36px;
            }

            .score-display, .timer-display {
                font-size: 18px;
            }

            .combo-display {
                font-size: 24px;
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <div class="ui-layer">
            <div class="score-display">Score: <span id="score">0</span></div>
            <div class="timer-display">Time: <span id="timer">30</span></div>
        </div>

        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>

        <div class="combo-display" id="comboDisplay">
            <span id="comboCount">0</span>x Combo!
        </div>

        <div class="start-screen" id="startScreen">
            <h1>💥 Burst Challenge</h1>
            <p>ターゲットをタップしてバーストさせよう！<br>30秒でハイスコアを目指せ！</p>
            <p style="font-size: 14px; color: #ffd700;">🔴 赤: +10点 | 🟡 金: +50点（ボーナス）<br>🔵 青: -5点（ペナルティ）</p>
            <button class="start-btn" onclick="startGame()">スタート</button>
        </div>

        <div class="end-screen hidden" id="endScreen">
            <h1>🎉 ゲーム終了！</h1>
            <p>あなたのスコア：</p>
            <div class="final-score" id="finalScore">0</div>
            <p id="finalMessage"></p>
            <button class="start-btn" onclick="startGame()">もう一度</button>
        </div>
    </div>

    <script>
        // Game state
        let score = 0;
        let timeLeft = 30;
        let combo = 0;
        let gameActive = false;
        let targets = [];
        let gameLoop;
        let timerLoop;
        let spawnLoop;

        const gameContainer = document.getElementById('gameContainer');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const comboDisplay = document.getElementById('comboDisplay');
        const comboCount = document.getElementById('comboCount');
        const startScreen = document.getElementById('startScreen');
        const endScreen = document.getElementById('endScreen');
        const finalScore = document.getElementById('finalScore');
        const finalMessage = document.getElementById('finalMessage');

        function startGame() {
            // Reset game state
            score = 0;
            timeLeft = 30;
            combo = 0;
            gameActive = true;
            targets = [];

            // Update UI
            scoreDisplay.textContent = '0';
            timerDisplay.textContent = '30';
            comboDisplay.classList.remove('active');

            // Hide screens
            startScreen.classList.add('hidden');
            endScreen.classList.add('hidden');

            // Clear existing targets
            document.querySelectorAll('.target').forEach(t => t.remove());
            document.querySelectorAll('.burst-particle').forEach(p => p.remove());

            // Start game loops
            gameLoop = setInterval(updateGame, 16);
            timerLoop = setInterval(updateTimer, 1000);
            spawnLoop = setInterval(spawnTarget, 800);

            // Spawn initial targets
            for (let i = 0; i < 3; i++) {
                setTimeout(() => spawnTarget(), i * 200);
            }
        }

        function updateGame() {
            // Update combo display
            if (combo > 1) {
                comboCount.textContent = combo;
                comboDisplay.classList.add('active');
            } else {
                comboDisplay.classList.remove('active');
            }
        }

        function updateTimer() {
            timeLeft--;
            timerDisplay.textContent = timeLeft;

            if (timeLeft <= 0) {
                endGame();
            }
        }

        function endGame() {
            gameActive = false;

            // Stop game loops
            clearInterval(gameLoop);
            clearInterval(timerLoop);
            clearInterval(spawnLoop);

            // Remove all targets
            document.querySelectorAll('.target').forEach(t => t.remove());

            // Show end screen
            finalScore.textContent = score;

            // Set message based on score
            if (score >= 500) {
                finalMessage.textContent = '🌟 すごい！プロ級の実力！';
            } else if (score >= 300) {
                finalMessage.textContent = '👏 素晴らしい！とても上手！';
            } else if (score >= 150) {
                finalMessage.textContent = '😊 いい調子！もっと頑張れる！';
            } else {
                finalMessage.textContent = '💪 練習あるのみ！挑戦を続けよう！';
            }

            endScreen.classList.remove('hidden');
        }

        function spawnTarget() {
            if (!gameActive) return;

            // Limit number of targets
            if (targets.length >= 8) return;

            const target = document.createElement('div');
            target.className = 'target';

            // Random position (avoiding edges)
            const size = 50 + Math.random() * 30;
            const maxX = window.innerWidth - size - 20;
            const maxY = window.innerHeight - size - 100;
            const x = 20 + Math.random() * maxX;
            const y = 80 + Math.random() * maxY;

            target.style.width = `${size}px`;
            target.style.height = `${size}px`;
            target.style.left = `${x}px`;
            target.style.top = `${y}px`;

            // Determine target type
            const rand = Math.random();
            if (rand < 0.15) {
                target.classList.add('bonus-target');
                target.dataset.type = 'bonus';
                target.dataset.points = 50;
            } else if (rand < 0.3) {
                target.classList.add('penalty-target');
                target.dataset.type = 'penalty';
                target.dataset.points = -5;
            } else {
                target.classList.add('normal-target');
                target.dataset.type = 'normal';
                target.dataset.points = 10;
            }

            // Click handler
            target.addEventListener('click', (e) => handleTargetClick(e, target));
            target.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleTargetClick(e, target);
            });

            gameContainer.appendChild(target);
            targets.push(target);

            // Auto-remove after time
            setTimeout(() => {
                if (target.parentNode) {
                    target.remove();
                    targets = targets.filter(t => t !== target);
                    // Reset combo on miss
                    combo = 0;
                }
            }, 2500);
        }

        function handleTargetClick(e, target) {
            e.stopPropagation();

            if (!gameActive || target.classList.contains('bursting')) return;

            target.classList.add('bursting');

            const type = target.dataset.type;
            const points = parseInt(target.dataset.points);

            // Update score and combo
            if (type === 'penalty') {
                score = Math.max(0, score + points);
                combo = 0;
            } else {
                score += points + (combo * 2);
                combo++;
            }

            scoreDisplay.textContent = score;

            // Create burst particles
            createBurstEffect(
                parseInt(target.style.left) + parseInt(target.style.width) / 2,
                parseInt(target.style.top) + parseInt(target.style.height) / 2,
                type
            );

            // Remove target after animation
            setTimeout(() => {
                target.remove();
                targets = targets.filter(t => t !== target);
            }, 300);
        }

        function createBurstEffect(x, y, type) {
            const colors = {
                normal: ['#ff6b6b', '#ee5a6f', '#ff8787'],
                bonus: ['#ffd700', '#ffaa00', '#ffed4a'],
                penalty: ['#4ecdc4', '#44a08d', '#7ed6df']
            };

            const particleColors = colors[type];
            const particleCount = type === 'bonus' ? 20 : 12;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'burst-particle';

                const angle = (Math.PI * 2 * i) / particleCount;
                const velocity = 3 + Math.random() * 3;
                const size = 5 + Math.random() * 8;

                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;
                particle.style.background = particleColors[Math.floor(Math.random() * particleColors.length)];
                particle.style.boxShadow = `0 0 ${size}px ${particle.style.background}`;

                gameContainer.appendChild(particle);

                // Animate particle
                let px = x;
                let py = y;
                let opacity = 1;

                const animateParticle = setInterval(() => {
                    px += Math.cos(angle) * velocity;
                    py += Math.sin(angle) * velocity;
                    opacity -= 0.05;

                    particle.style.left = `${px}px`;
                    particle.style.top = `${py}px`;
                    particle.style.opacity = opacity;

                    if (opacity <= 0) {
                        clearInterval(animateParticle);
                        particle.remove();
                    }
                }, 16);
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            // Adjust target positions if needed
            targets.forEach(target => {
                const rect = target.getBoundingClientRect();
                if (rect.right > window.innerWidth) {
                    target.style.left = `${window.innerWidth - parseInt(target.style.width) - 20}px`;
                }
                if (rect.bottom > window.innerHeight) {
                    target.style.top = `${window.innerHeight - parseInt(target.style.height) - 100}px`;
                }
            });
        });
    </script>
</body>
</html>
