<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quick Target</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            color: white;
            padding: 20px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin: 20px 0;
            font-size: 1.2em;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px 25px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: 0.8em;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
        }

        #playArea {
            width: 90vw;
            max-width: 500px;
            height: 500px;
            max-height: 60vh;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            position: relative;
            margin: 20px auto;
            cursor: crosshair;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
        }

        .target {
            position: absolute;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #ff6b6b, #ee5a5a);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            animation: pulse 1s infinite;
        }

        .target:active {
            transform: scale(0.9);
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .target.hit {
            animation: hit 0.3s ease-out;
        }

        @keyframes hit {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        .btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            margin: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .message {
            font-size: 1.3em;
            margin: 20px 0;
            min-height: 30px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .stats {
                gap: 15px;
                font-size: 1em;
            }

            .stat-box {
                padding: 10px 15px;
            }

            .target {
                width: 50px;
                height: 50px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <div class="game-container">
        <h1>🎯 Quick Target</h1>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">TIME</div>
                <div class="stat-value" id="time">30</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">BEST</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>

        <div class="message" id="message">Tap START to play!</div>

        <div id="playArea"></div>

        <button class="btn" id="startBtn" onclick="startGame()">START</button>
    </div>

    <script>
        let score = 0;
        let timeLeft = 30;
        let gameRunning = false;
        let timer = null;
        let targetTimer = null;
        let highScore = localStorage.getItem('quickTargetHighScore') || 0;
        let targetsHit = 0;

        document.getElementById('highScore').textContent = highScore;

        const playArea = document.getElementById('playArea');
        const scoreEl = document.getElementById('score');
        const timeEl = document.getElementById('time');
        const messageEl = document.getElementById('message');
        const startBtn = document.getElementById('startBtn');

        function startGame() {
            score = 0;
            timeLeft = 30;
            targetsHit = 0;
            gameRunning = true;

            scoreEl.textContent = score;
            timeEl.textContent = timeLeft;
            messageEl.textContent = 'Tap the targets!';
            startBtn.textContent = 'PLAYING...';
            startBtn.disabled = true;

            playArea.innerHTML = '';

            timer = setInterval(() => {
                timeLeft--;
                timeEl.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            spawnTarget();
        }

        function spawnTarget() {
            if (!gameRunning) return;

            const target = document.createElement('div');
            target.className = 'target';

            const maxX = playArea.clientWidth - 60;
            const maxY = playArea.clientHeight - 60;

            const x = Math.random() * maxX;
            const y = Math.random() * maxY;

            target.style.left = x + 'px';
            target.style.top = y + 'px';

            // Random color
            const hue = Math.random() * 360;
            target.style.background = `radial-gradient(circle, hsl(${hue}, 70%, 60%), hsl(${hue}, 70%, 50%))`;

            target.addEventListener('click', hitTarget);
            target.addEventListener('touchstart', (e) => {
                e.preventDefault();
                hitTarget.call(target, e);
            });

            playArea.appendChild(target);

            // Remove target after 2 seconds if not hit
            setTimeout(() => {
                if (target.parentNode && !target.classList.contains('hit')) {
                    target.remove();
                    if (gameRunning) {
                        spawnTarget();
                    }
                }
            }, 2000);
        }

        function hitTarget(e) {
            if (!gameRunning) return;

            e.target.classList.add('hit');
            score += 10;
            targetsHit++;
            scoreEl.textContent = score;

            setTimeout(() => {
                if (e.target.parentNode) {
                    e.target.remove();
                }
                if (gameRunning) {
                    spawnTarget();
                }
            }, 300);
        }

        function endGame() {
            gameRunning = false;
            clearInterval(timer);

            startBtn.textContent = 'START';
            startBtn.disabled = false;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('quickTargetHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
                messageEl.textContent = `🎉 New High Score! ${score} points!`;
            } else {
                messageEl.textContent = `Game Over! Score: ${score}`;
            }

            // Clear remaining targets
            playArea.innerHTML = '';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
