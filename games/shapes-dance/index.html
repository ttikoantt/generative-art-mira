<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Shapes Dance - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        canvas {
            display: block;
        }
        #ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }
        .stat {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        #startScreen, #gameOverScreen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
        }
        #gameOverScreen {
            display: none;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 18px;
            margin-bottom: 40px;
            opacity: 0.7;
        }
        .btn {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            padding: 20px 60px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.3);
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 107, 107, 0.4);
        }
        .btn:active {
            transform: scale(0.95);
        }
        .final-score {
            font-size: 72px;
            font-weight: bold;
            margin: 20px 0;
            color: #4ecdc4;
        }
        #fullscreenBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 50;
        }
        #fullscreenBtn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        .combo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            pointer-events: none;
            opacity: 0;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="stat">⭐ <span id="score">0</span></div>
        <div class="stat">🔥 <span id="combo">0</span>x</div>
    </div>

    <div id="startScreen">
        <h1>🎯 Shapes Dance</h1>
        <div class="subtitle">Tap the shapes when they glow!</div>
        <button class="btn" id="startBtn">Start Game</button>
    </div>

    <div id="gameOverScreen">
        <h1>Game Over!</h1>
        <div class="final-score" id="finalScore">0</div>
        <div class="subtitle">Best Score: <span id="bestScore">0</span></div>
        <button class="btn" id="restartBtn">Play Again</button>
    </div>

    <div class="combo" id="comboDisplay"></div>

    <canvas id="canvas"></canvas>
    <button id="fullscreenBtn">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const scoreDisplay = document.getElementById('score');
        const comboDisplay = document.getElementById('combo');
        const comboPopup = document.getElementById('comboDisplay');
        const finalScoreDisplay = document.getElementById('finalScore');
        const bestScoreDisplay = document.getElementById('bestScore');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let width, height;
        let shapes = [];
        let particles = [];
        let score = 0;
        let combo = 0;
        let bestScore = localStorage.getItem('shapesDanceBest') || 0;
        let gameRunning = false;
        let lastTime = 0;
        let spawnTimer = 0;
        let difficulty = 1;
        let bgHue = 0;

        bestScoreDisplay.textContent = bestScore;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        // Shape class
        class Shape {
            constructor() {
                this.type = Math.floor(Math.random() * 4);
                this.size = Math.random() * 40 + 30;
                this.x = Math.random() * (width - this.size * 2) + this.size;
                this.y = Math.random() * (height - this.size * 2) + this.size;
                this.hue = Math.random() * 360;
                this.glow = false;
                this.glowTimer = 0;
                this.life = 1;
                this.dx = (Math.random() - 0.5) * 2;
                this.dy = (Math.random() - 0.5) * 2;
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.05;
            }

            update(dt) {
                this.x += this.dx;
                this.y += this.dy;
                this.rotation += this.rotationSpeed;

                // Bounce off walls
                if (this.x < this.size || this.x > width - this.size) this.dx *= -1;
                if (this.y < this.size || this.y > height - this.size) this.dy *= -1;

                // Random glow
                if (Math.random() < 0.01 * difficulty) {
                    this.glow = true;
                    this.glowTimer = 1500 / difficulty;
                }

                if (this.glow) {
                    this.glowTimer -= dt;
                    if (this.glowTimer <= 0) {
                        this.glow = false;
                    }
                }

                // Fade out over time
                this.life -= dt * 0.0001 * difficulty;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                const glowIntensity = this.glow ? 1 : 0.3;
                const size = this.size * (this.glow ? 1.2 : 1);

                // Glow effect
                if (this.glow) {
                    ctx.shadowColor = `hsla(${this.hue}, 100%, 60%, 1)`;
                    ctx.shadowBlur = 30;
                }

                ctx.fillStyle = `hsla(${this.hue}, 70%, ${this.glow ? 70 : 50}%, ${this.life * glowIntensity})`;
                ctx.strokeStyle = `hsla(${this.hue}, 80%, 70%, ${this.life * glowIntensity})`;
                ctx.lineWidth = 3;

                ctx.beginPath();
                switch (this.type) {
                    case 0: // Circle
                        ctx.arc(0, 0, size, 0, Math.PI * 2);
                        break;
                    case 1: // Square
                        ctx.rect(-size, -size, size * 2, size * 2);
                        break;
                    case 2: // Triangle
                        ctx.moveTo(0, -size);
                        ctx.lineTo(size, size);
                        ctx.lineTo(-size, size);
                        ctx.closePath();
                        break;
                    case 3: // Star
                        for (let i = 0; i < 5; i++) {
                            const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
                            const x = Math.cos(angle) * size;
                            const y = Math.sin(angle) * size;
                            if (i === 0) ctx.moveTo(x, y);
                            else ctx.lineTo(x, y);
                        }
                        ctx.closePath();
                        break;
                }

                ctx.fill();
                ctx.stroke();
                ctx.restore();
            }

            containsPoint(px, py) {
                const dx = px - this.x;
                const dy = py - this.y;
                return Math.sqrt(dx * dx + dy * dy) < this.size * 1.5;
            }

            tap() {
                if (this.glow) {
                    score += 10 * combo + 10;
                    combo++;
                    showCombo();
                    createExplosion(this.x, this.y, this.hue);
                    return true;
                } else {
                    combo = 0;
                    createExplosion(this.x, this.y, 0, false);
                    return false;
                }
            }
        }

        // Particle class for effects
        class Particle {
            constructor(x, y, hue, success) {
                this.x = x;
                this.y = y;
                this.hue = hue;
                this.size = Math.random() * 5 + 2;
                this.life = 1;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                this.dx = Math.cos(angle) * speed;
                this.dy = Math.sin(angle) * speed;
                this.success = success;
            }

            update() {
                this.x += this.dx;
                this.y += this.dy;
                this.dy += 0.1;
                this.life -= 0.02;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                const hue = this.success ? this.hue : 0;
                ctx.fillStyle = `hsla(${hue}, 80%, 60%, ${this.life})`;
                ctx.fill();
            }
        }

        function createExplosion(x, y, hue, success = true) {
            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(x, y, hue, success));
            }
        }

        function showCombo() {
            if (combo > 1) {
                comboPopup.textContent = `${combo}x COMBO!`;
                comboPopup.style.opacity = '1';
                comboPopup.style.transform = 'translate(-50%, -50%) scale(1.2)';
                setTimeout(() => {
                    comboPopup.style.opacity = '0';
                    comboPopup.style.transform = 'translate(-50%, -50%) scale(1)';
                }, 500);
            }
        }

        function spawnShape() {
            if (shapes.length < 5 + difficulty * 2) {
                shapes.push(new Shape());
            }
        }

        function handleTap(x, y) {
            if (!gameRunning) return;

            let hit = false;
            for (let i = shapes.length - 1; i >= 0; i--) {
                if (shapes[i].containsPoint(x, y)) {
                    if (shapes[i].tap()) {
                        shapes.splice(i, 1);
                        hit = true;
                        scoreDisplay.textContent = score;
                        comboDisplay.textContent = combo;
                    } else {
                        // Missed tap on non-glowing shape
                        gameOver();
                    }
                    break;
                }
            }

            // Missed tap
            if (!hit && shapes.length > 0) {
                combo = 0;
                comboDisplay.textContent = combo;
            }
        }

        function gameOver() {
            gameRunning = false;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('shapesDanceBest', bestScore);
            }
            finalScoreDisplay.textContent = score;
            bestScoreDisplay.textContent = bestScore;
            gameOverScreen.style.display = 'flex';
        }

        function startGame() {
            score = 0;
            combo = 0;
            difficulty = 1;
            shapes = [];
            particles = [];
            scoreDisplay.textContent = '0';
            comboDisplay.textContent = '0';
            gameRunning = true;
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
        }

        function update(timestamp) {
            const dt = timestamp - lastTime;
            lastTime = timestamp;

            // Clear canvas
            bgHue = (bgHue + 0.1) % 360;
            ctx.fillStyle = `hsla(${bgHue}, 20%, 10%, 0.3)`;
            ctx.fillRect(0, 0, width, height);

            if (gameRunning) {
                // Spawn shapes
                spawnTimer += dt;
                if (spawnTimer > 2000 / difficulty) {
                    spawnShape();
                    spawnTimer = 0;
                }

                // Increase difficulty
                difficulty = 1 + Math.floor(score / 100) * 0.5;

                // Update shapes
                shapes.forEach(shape => shape.update(dt));
                shapes = shapes.filter(shape => shape.life > 0);

                // Auto-remove non-glowing shapes
                for (let i = shapes.length - 1; i >= 0; i--) {
                    if (!shapes[i].glow && shapes[i].life < 0.5) {
                        shapes.splice(i, 1);
                        combo = 0;
                        comboDisplay.textContent = combo;
                    }
                }

                // Draw shapes
                shapes.forEach(shape => shape.draw());
            }

            // Update particles
            particles.forEach(p => p.update());
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => p.draw());

            requestAnimationFrame(update);
        }

        // Event listeners
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        canvas.addEventListener('click', (e) => {
            handleTap(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let touch of e.touches) {
                handleTap(touch.clientX, touch.clientY);
            }
        }, { passive: false });

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Start animation loop
        requestAnimationFrame(update);
    </script>
</body>
</html>
