<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Jump | Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            max-width: 100%;
            max-height: 100vh;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }

        .score {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .high-score {
            color: #ffd700;
            font-size: 1rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .fullscreen-btn {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            pointer-events: auto;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .start-screen, .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 20;
        }

        .start-screen h1, .game-over-screen h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 4px 20px rgba(100, 200, 255, 0.5);
        }

        .start-screen p, .game-over-screen p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.8);
        }

        .start-btn, .restart-btn {
            padding: 15px 40px;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            pointer-events: auto;
        }

        .start-btn:hover, .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }

        .final-score {
            font-size: 2rem;
            color: #ffd700;
            margin: 20px 0;
        }

        .new-record {
            color: #ff6b6b;
            font-size: 1.2rem;
            margin-top: 10px;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .hidden {
            display: none !important;
        }

        .back-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            pointer-events: auto;
            z-index: 25;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="canvas"></canvas>

        <div class="ui-overlay">
            <div class="score">Score: <span id="scoreDisplay">0</span></div>
            <div class="high-score">Best: <span id="highScoreDisplay">0</span></div>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
        </div>

        <div class="start-screen" id="startScreen">
            <h1>🌍 Orbit Jump</h1>
            <p>Tap to jump to next orbit!</p>
            <button class="start-btn" onclick="startGame()">Start Game</button>
            <button class="back-btn" onclick="goBack()">← Back to Games</button>
        </div>

        <div class="game-over-screen hidden" id="gameOverScreen">
            <h1>Game Over</h1>
            <div class="final-score">Score: <span id="finalScore">0</span></div>
            <div id="newRecord" class="new-record hidden">🎉 New Record!</div>
            <button class="restart-btn" onclick="startGame()">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let centerX, centerY;
        let gameStarted = false;
        let gameOver = false;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('orbitJumpHighScore')) || 0;

        // ゲームの状態
        let player = null;
        let orbits = [];
        let nextOrbitIndex = 0;
        let orbitSpeed = 0.02;
        let orbitSpeedIncrease = 0.001;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        class Orbit {
            constructor(radius) {
                this.radius = radius;
                this.angle = Math.random() * Math.PI * 2;
                this.size = Math.random() * 20 + 25;
                this.color = this.getRandomColor();
                this.hasGaps = Math.random() > 0.3;
                this.gapAngle = Math.random() * Math.PI * 2;
                this.gapSize = Math.random() * 0.5 + 0.3;
            }

            getRandomColor() {
                const colors = [
                    '#ff6b6b', '#4ecdc4', '#45b7d1', '#f9ca24',
                    '#6c5ce7', '#a29bfe', '#fd79a8', '#00b894'
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.angle += orbitSpeed * (1 + score * 0.05);
            }

            draw() {
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(this.angle);

                // 軌道を描く
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // 惑星を描く
                const planetAngle = 0;
                const x = Math.cos(planetAngle) * this.radius;
                const y = Math.sin(planetAngle) * this.radius;

                // グロー効果
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, this.size);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

                ctx.beginPath();
                ctx.arc(x, y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.restore();
            }
        }

        class Player {
            constructor() {
                this.orbitIndex = 0;
                this.angle = 0;
                this.radius = orbits[0].radius;
                this.size = 15;
                this.jumping = false;
                this.jumpProgress = 0;
                this.targetOrbit = null;
                this.startRadius = 0;
            }

            update() {
                if (this.jumping) {
                    this.jumpProgress += 0.08;
                    if (this.jumpProgress >= 1) {
                        this.jumpProgress = 0;
                        this.jumping = false;
                        this.orbitIndex = this.targetOrbit;
                        this.radius = orbits[this.orbitIndex].radius;
                        this.targetOrbit = null;
                        score++;
                        document.getElementById('scoreDisplay').textContent = score;

                        // 難易度上昇
                        orbitSpeed += orbitSpeedIncrease;
                    } else {
                        // 跳躍中の位置計算
                        const progress = this.jumpProgress;
                        this.radius = this.startRadius + (orbits[this.targetOrbit].radius - this.startRadius) * progress;

                        // 跳躍中の軌跡
                        ctx.save();
                        ctx.translate(centerX, centerY);
                        ctx.rotate(this.angle);

                        // 跳躍エフェクト
                        const trailSize = this.size * (1 + Math.sin(progress * Math.PI) * 0.5);
                        ctx.beginPath();
                        ctx.arc(this.radius, 0, trailSize, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(100, 200, 255, ${0.5 - progress * 0.3})`;
                        ctx.fill();

                        ctx.restore();
                    }
                } else {
                    // 惑星と同じ速度で回転
                    this.angle += orbitSpeed * (1 + score * 0.05);
                }
            }

            jump() {
                if (this.jumping) return false;

                // 内側から外側へ、または外側から内側へ
                if (this.orbitIndex < orbits.length - 1) {
                    this.targetOrbit = this.orbitIndex + 1;
                } else {
                    this.targetOrbit = 0;
                }

                this.jumping = true;
                this.jumpProgress = 0;
                this.startRadius = this.radius;
                return true;
            }

            draw() {
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(this.angle);

                // プレイヤーを描く
                const glowSize = this.size * 2;
                const gradient = ctx.createRadialGradient(
                    this.radius, 0, 0,
                    this.radius, 0, glowSize
                );
                gradient.addColorStop(0, 'rgba(150, 220, 255, 0.8)');
                gradient.addColorStop(0.5, 'rgba(100, 180, 255, 0.3)');
                gradient.addColorStop(1, 'rgba(50, 150, 255, 0)');

                ctx.beginPath();
                ctx.arc(this.radius, 0, glowSize, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // 本体
                ctx.beginPath();
                ctx.arc(this.radius, 0, this.size, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();

                ctx.restore();
            }
        }

        function initGame() {
            resize();

            // 軌道を作成
            orbits = [];
            const numOrbits = 5;
            const minRadius = Math.min(width, height) * 0.15;
            const maxRadius = Math.min(width, height) * 0.35;
            const radiusStep = (maxRadius - minRadius) / (numOrbits - 1);

            for (let i = 0; i < numOrbits; i++) {
                orbits.push(new Orbit(minRadius + i * radiusStep));
            }

            // プレイヤーを作成
            player = new Player();

            score = 0;
            orbitSpeed = 0.02;
            document.getElementById('scoreDisplay').textContent = '0';
            document.getElementById('highScoreDisplay').textContent = highScore;
        }

        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            initGame();
            gameStarted = true;
            gameOver = false;
            animate();
        }

        function endGame() {
            gameOver = true;
            gameStarted = false;

            // ハイスコア更新
            let isNewRecord = false;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('orbitJumpHighScore', highScore);
                isNewRecord = true;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('highScoreDisplay').textContent = highScore;

            const newRecordEl = document.getElementById('newRecord');
            if (isNewRecord) {
                newRecordEl.classList.remove('hidden');
            } else {
                newRecordEl.classList.add('hidden');
            }

            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        function animate() {
            if (!gameStarted || gameOver) return;

            // 背景
            ctx.fillStyle = 'rgba(26, 26, 46, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // 星空
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            for (let i = 0; i < 50; i++) {
                const x = (Math.sin(i * 123.456 + Date.now() * 0.0001) * 0.5 + 0.5) * width;
                const y = (Math.cos(i * 789.012 + Date.now() * 0.0001) * 0.5 + 0.5) * height;
                const size = Math.sin(i * 345.678 + Date.now() * 0.001) * 0.5 + 1;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }

            // 軌道を更新・描画
            orbits.forEach(orbit => {
                orbit.update();
                orbit.draw();
            });

            // プレイヤーを更新・描画
            player.update();
            player.draw();

            requestAnimationFrame(animate);
        }

        // イベントリスナー
        window.addEventListener('resize', () => {
            resize();
            if (gameStarted && !gameOver) {
                initGame();
            }
        });

        canvas.addEventListener('click', () => {
            if (gameStarted && !gameOver) {
                player.jump();
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameStarted && !gameOver) {
                player.jump();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameStarted && !gameOver) {
                    player.jump();
                }
            }
        });

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ゲーム一覧に戻る
        function goBack() {
            window.location.href = '../index.html';
        }

        // 初期化
        resize();
        document.getElementById('highScoreDisplay').textContent = highScore;
    </script>
</body>
</html>
