<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Color Grid Puzzle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            touch-action: manipulation;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #00d4ff;
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .cell {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .cell.active {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .cell.inactive {
            background: rgba(255, 255, 255, 0.1);
        }

        .cell:hover {
            transform: scale(1.05);
        }

        .cell:active {
            transform: scale(0.95);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .control-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border: none;
            border-radius: 25px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.5);
        }

        .control-btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .instructions {
            max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .instructions h3 {
            margin-bottom: 10px;
            color: #00d4ff;
        }

        .instructions p {
            font-size: 14px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.8);
        }

        .win-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            padding: 30px 50px;
            border-radius: 20px;
            font-size: 24px;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 10px 50px rgba(0, 212, 255, 0.5);
            animation: pulse 1s ease-in-out infinite;
            display: none;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .cell {
                width: 50px;
                height: 50px;
            }

            .grid {
                gap: 6px;
                padding: 10px;
            }

            .stats {
                gap: 10px;
            }

            .stat {
                padding: 8px 15px;
            }

            .stat-value {
                font-size: 20px;
            }

            .instructions {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <div class="header">
        <h1>🎨 Color Grid Puzzle</h1>
        <div class="stats">
            <div class="stat">
                <div class="stat-label">Moves</div>
                <div class="stat-value" id="moves">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Best</div>
                <div class="stat-value" id="best">-</div>
            </div>
        </div>
    </div>

    <div class="game-container">
        <div class="grid" id="grid"></div>

        <div class="controls">
            <button class="control-btn" onclick="newGame()">🔄 New Game</button>
            <button class="control-btn" onclick="resetGame()">↩️ Reset</button>
        </div>
    </div>

    <div class="instructions">
        <h3>📖 How to Play</h3>
        <p>Click a cell to toggle it and its adjacent cells. Make all cells the same color (all on or all off) to win!</p>
    </div>

    <div class="win-message" id="win-message">🎉 You Win!</div>

    <script>
        const GRID_SIZE = 5;
        let grid = [];
        let moves = 0;
        let bestScore = localStorage.getItem('colorGridBest') || null;
        let initialState = [];

        function initGrid() {
            const gridElement = document.getElementById('grid');
            gridElement.innerHTML = '';
            grid = [];

            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell inactive';
                cell.addEventListener('click', () => toggleCell(i));
                gridElement.appendChild(cell);
                grid.push(false);
            }
        }

        function toggleCell(index) {
            moves++;
            document.getElementById('moves').textContent = moves;

            // Toggle clicked cell and adjacent cells
            toggle(index);
            toggle(index - 1); // Left
            toggle(index + 1); // Right
            toggle(index - GRID_SIZE); // Top
            toggle(index + GRID_SIZE); // Bottom

            // Handle edge cases
            const row = Math.floor(index / GRID_SIZE);
            const col = index % GRID_SIZE;

            // Don't wrap around horizontally
            if (col === 0) toggle(index - 1);
            if (col === GRID_SIZE - 1) toggle(index + 1);

            render();
            checkWin();
        }

        function toggle(index) {
            if (index >= 0 && index < GRID_SIZE * GRID_SIZE) {
                grid[index] = !grid[index];
            }
        }

        function render() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, index) => {
                cell.className = grid[index] ? 'cell active' : 'cell inactive';
            });
        }

        function checkWin() {
            const allOn = grid.every(cell => cell);
            const allOff = grid.every(cell => !cell);

            if (allOn || allOff) {
                showWin();
            }
        }

        function showWin() {
            const winMessage = document.getElementById('win-message');
            winMessage.style.display = 'block';

            if (!bestScore || moves < bestScore) {
                bestScore = moves;
                localStorage.setItem('colorGridBest', bestScore);
                document.getElementById('best').textContent = bestScore;
            }

            setTimeout(() => {
                winMessage.style.display = 'none';
            }, 3000);
        }

        function newGame() {
            moves = 0;
            document.getElementById('moves').textContent = '0';

            // Initialize with all cells off
            grid = new Array(GRID_SIZE * GRID_SIZE).fill(false);

            // Make random moves to create a solvable puzzle
            const numMoves = Math.floor(Math.random() * 10) + 5;
            for (let i = 0; i < numMoves; i++) {
                const randomIndex = Math.floor(Math.random() * GRID_SIZE * GRID_SIZE);
                toggle(randomIndex);
                toggle(randomIndex - 1);
                toggle(randomIndex + 1);
                toggle(randomIndex - GRID_SIZE);
                toggle(randomIndex + GRID_SIZE);

                const row = Math.floor(randomIndex / GRID_SIZE);
                const col = randomIndex % GRID_SIZE;
                if (col === 0) toggle(randomIndex - 1);
                if (col === GRID_SIZE - 1) toggle(randomIndex + 1);
            }

            initialState = [...grid];
            render();
        }

        function resetGame() {
            grid = [...initialState];
            moves = 0;
            document.getElementById('moves').textContent = '0';
            render();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        if (bestScore) {
            document.getElementById('best').textContent = bestScore;
        }

        initGrid();
        newGame();
    </script>
</body>
</html>
