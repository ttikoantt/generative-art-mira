<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pattern Lock Challenge - 記憶ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            touch-action: none;
        }

        .header {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
        }

        .score {
            position: fixed;
            top: 20px;
            right: 20px;
            color: #00f7ff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 247, 255, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 150px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 20px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 20px rgba(0, 247, 255, 0.8);
            z-index: 50;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .message.show {
            opacity: 1;
        }

        .game-container {
            position: relative;
            width: min(400px, 90vw);
            height: min(400px, 90vw);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            height: 100%;
        }

        .dot {
            position: relative;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .dot::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30%;
            height: 30%;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .dot.active::after {
            width: 80%;
            height: 80%;
            background: #00f7ff;
            box-shadow: 0 0 20px rgba(0, 247, 255, 0.8);
        }

        .dot.demo {
            border-color: #ff6600;
        }

        .dot.demo::after {
            background: #ff6600;
            box-shadow: 0 0 20px rgba(255, 102, 0, 0.8);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            border-radius: 20px;
        }

        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 15, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            gap: 30px;
        }

        .start-screen.hidden {
            display: none;
        }

        .start-screen h1 {
            color: white;
            font-size: 36px;
            text-shadow: 0 0 20px rgba(0, 247, 255, 0.8);
        }

        .start-screen p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            text-align: center;
            max-width: 400px;
            line-height: 1.6;
        }

        .start-btn {
            background: linear-gradient(135deg, #00f7ff, #0066ff);
            border: none;
            color: white;
            padding: 20px 60px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(0, 247, 255, 0.5);
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(0, 247, 255, 0.8);
        }

        .level {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="header">🔐 Pattern Lock</div>
    <div class="score">Score: <span id="score">0</span></div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="start-screen" id="startScreen">
        <h1>🔐 Pattern Lock Challenge</h1>
        <p>表示されるパターンを記憶して、同じパターンをなぞってください。<br>レベルが上がるとパターンが長くなります！</p>
        <button class="start-btn" onclick="startGame()">スタート</button>
    </div>

    <div class="message" id="message"></div>

    <div class="game-container">
        <canvas id="canvas"></canvas>
        <div class="grid" id="grid"></div>
    </div>

    <div class="level">Level: <span id="level">1</span></div>

    <script>
        const grid = document.getElementById('grid');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const messageEl = document.getElementById('message');
        const startScreen = document.getElementById('startScreen');

        let dots = [];
        let pattern = [];
        let playerPattern = [];
        let score = 0;
        let level = 1;
        let isDemo = false;
        let isDrawing = false;

        // グリッドを作成
        function createGrid() {
            grid.innerHTML = '';
            dots = [];

            for (let i = 0; i < 9; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.dataset.index = i;
                grid.appendChild(dot);
                dots.push(dot);
            }

            resizeCanvas();
        }

        function resizeCanvas() {
            const rect = grid.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        // パターンを生成
        function generatePattern() {
            const length = Math.min(3 + Math.floor(level / 2), 8);
            pattern = [];

            let prevIndex = -1;

            for (let i = 0; i < length; i++) {
                let nextIndex;

                do {
                    nextIndex = Math.floor(Math.random() * 9);
                } while (nextIndex === prevIndex);

                pattern.push(nextIndex);
                prevIndex = nextIndex;
            }

            return pattern;
        }

        // デモパターンを表示
        async function showDemo() {
            isDemo = true;

            // 全てのドットをリセット
            dots.forEach(dot => {
                dot.classList.remove('active', 'demo');
            });

            // パターンを順番に表示
            for (let i = 0; i < pattern.length; i++) {
                await sleep(400);
                dots[pattern[i]].classList.add('demo');
                dots[pattern[i]].classList.add('active');
            }

            await sleep(500);

            // デモをクリア
            dots.forEach(dot => {
                dot.classList.remove('demo', 'active');
            });

            isDemo = false;
            playerPattern = [];
            isDrawing = true;
            showMessage('あなたの番！');
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function showMessage(text) {
            messageEl.textContent = text;
            messageEl.classList.add('show');
            setTimeout(() => {
                messageEl.classList.remove('show');
            }, 1500);
        }

        // パターンを描画
        function drawPattern(indices, color = '#00f7ff') {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (indices.length < 2) return;

            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.shadowBlur = 10;
            ctx.shadowColor = color;

            ctx.beginPath();

            indices.forEach((index, i) => {
                const dot = dots[index];
                const rect = dot.getBoundingClientRect();
                const gridRect = grid.getBoundingClientRect();

                const x = rect.left - gridRect.left + rect.width / 2;
                const y = rect.top - gridRect.top + rect.height / 2;

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });

            ctx.stroke();
        }

        // ドットをアクティベート
        function activateDot(index) {
            if (isDemo) return;
            if (!isDrawing) return;
            if (playerPattern.includes(index)) return;

            playerPattern.push(index);
            dots[index].classList.add('active');

            drawPattern(playerPattern);

            // パターンチェック
            if (playerPattern.length === pattern.length) {
                checkPattern();
            }
        }

        // パターンをチェック
        function checkPattern() {
            isDrawing = false;

            const correct = pattern.every((val, i) => val === playerPattern[i]);

            if (correct) {
                score += level * 100;
                scoreEl.textContent = score;
                showMessage('正解！ 🎉');

                setTimeout(() => {
                    level++;
                    levelEl.textContent = level;
                    nextRound();
                }, 1500);
            } else {
                showMessage('間違い！ ❌');
                dots.forEach((dot, i) => {
                    if (pattern[i] !== playerPattern[i]) {
                        dot.style.borderColor = '#ff0000';
                    }
                });

                setTimeout(() => {
                    gameOver();
                }, 1500);
            }
        }

        function nextRound() {
            dots.forEach(dot => {
                dot.classList.remove('active');
                dot.style.borderColor = '';
            });
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            generatePattern();
            setTimeout(() => {
                showDemo();
            }, 1000);
        }

        function gameOver() {
            startScreen.classList.remove('hidden');
            startScreen.querySelector('h1').textContent = 'ゲームオーバー';
            startScreen.querySelector('p').innerHTML = `スコア: ${score}<br>レベル: ${level}`;
            startScreen.querySelector('button').textContent = 'もう一度';
        }

        function startGame() {
            score = 0;
            level = 1;
            scoreEl.textContent = score;
            levelEl.textContent = level;

            startScreen.classList.add('hidden');
            startScreen.querySelector('h1').textContent = '🔐 Pattern Lock Challenge';

            createGrid();
            generatePattern();

            setTimeout(() => {
                showDemo();
            }, 1000);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        dots.forEach((dot, index) => {
            dot.addEventListener('mousedown', (e) => {
                e.preventDefault();
                activateDot(index);
            });

            dot.addEventListener('touchstart', (e) => {
                e.preventDefault();
                activateDot(index);
            });
        });

        // グリッド全体でのイベント（スワイプ対応）
        grid.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;

            const element = document.elementFromPoint(e.clientX, e.clientY);
            if (element && element.classList.contains('dot')) {
                const index = parseInt(element.dataset.index);
                activateDot(index);
            }
        });

        grid.addEventListener('touchmove', (e) => {
            if (!isDrawing) return;

            const touch = e.touches[0];
            const element = document.elementFromPoint(touch.clientX, touch.clientY);
            if (element && element.classList.contains('dot')) {
                const index = parseInt(element.dataset.index);
                activateDot(index);
            }
        });

        window.addEventListener('resize', () => {
            resizeCanvas();
            if (playerPattern.length > 1) {
                drawPattern(playerPattern);
            }
        });

        // 初期化
        createGrid();
    </script>
</body>
</html>
