<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>数列マスター - Sequence Master</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .game-header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #fff;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .score {
            color: #4ecca3;
            font-size: 1.5em;
            font-weight: bold;
        }

        .sequence-display {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }

        .sequence-numbers {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }

        .number {
            background: rgba(78, 204, 163, 0.2);
            color: #4ecca3;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 1.5em;
            font-weight: bold;
            border: 2px solid #4ecca3;
        }

        .question {
            color: #fff;
            font-size: 1.2em;
            text-align: center;
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 15px;
            font-size: 1.2em;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            color: #1a1a2e;
        }

        button {
            padding: 15px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .submit-btn {
            background: #4ecca3;
            color: #1a1a2e;
        }

        .submit-btn:hover {
            background: #3db892;
            transform: scale(1.05);
        }

        .hint-btn {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .hint-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .feedback {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 1.1em;
            display: none;
        }

        .feedback.correct {
            background: rgba(78, 204, 163, 0.3);
            color: #4ecca3;
            display: block;
        }

        .feedback.incorrect {
            background: rgba(231, 76, 60, 0.3);
            color: #e74c3c;
            display: block;
        }

        .new-game-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 15px;
        }

        .new-game-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 14px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .hint {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
            text-align: center;
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <div class="game-header">
            <h1>🔢 数列マスター</h1>
            <div class="score">スコア: <span id="score">0</span></div>
        </div>

        <div class="sequence-display">
            <div class="sequence-numbers" id="sequence">
                <!-- 数列がここに表示される -->
            </div>
            <div class="question">次の数字は何でしょう？</div>
        </div>

        <div class="input-area">
            <input type="number" id="answer" placeholder="答えを入力" onkeypress="if(event.key==='Enter')checkAnswer()">
            <button class="submit-btn" onclick="checkAnswer()">答える</button>
        </div>

        <div class="feedback" id="feedback"></div>

        <div class="hint" id="hint"></div>

        <button class="new-game-btn" onclick="newGame()">新しい数列</button>
    </div>

    <script>
        let score = 0;
        let currentSequence = null;
        let currentAnswer = 0;

        // 数列パターン
        const sequences = [
            {
                pattern: (n) => n * 2,
                generate: (count) => Array.from({length: count}, (_, i) => Math.pow(2, i)),
                hint: "2倍ずつ増えています"
            },
            {
                pattern: (n) => n + 2,
                generate: (count) => Array.from({length: count}, (_, i) => 2 * i + 2),
                hint: "2ずつ増えています"
            },
            {
                pattern: (n) => n + 3,
                generate: (count) => Array.from({length: count}, (_, i) => 3 * i + 3),
                hint: "3ずつ増えています"
            },
            {
                pattern: (n) => n * n,
                generate: (count) => Array.from({length: count}, (_, i) => (i + 1) * (i + 1)),
                hint: "平方数（1², 2², 3²...）です"
            },
            {
                pattern: (n) => n * 3,
                generate: (count) => Array.from({length: count}, (_, i) => Math.pow(3, i)),
                hint: "3倍ずつ増えています"
            },
            {
                pattern: (n) => n * (n + 1) / 2,
                generate: (count) => Array.from({length: count}, (_, i) => (i + 1) * (i + 2) / 2),
                hint: "三角数（1, 3, 6, 10...）です"
            },
            {
                pattern: (n) => n + 5,
                generate: (count) => Array.from({length: count}, (_, i) => 5 * i + 5),
                hint: "5ずつ増えています"
            },
            {
                pattern: (n) => n * 4,
                generate: (count) => Array.from({length: count}, (_, i) => Math.pow(4, i)),
                hint: "4倍ずつ増えています"
            },
            {
                pattern: (n) => n * n * n,
                generate: (count) => Array.from({length: count}, (_, i) => Math.pow(i + 1, 3)),
                hint: "立方数（1³, 2³, 3³...）です"
            },
            {
                pattern: (n) => 2 * n - 1,
                generate: (count) => Array.from({length: count}, (_, i) => 2 * (i + 1) - 1),
                hint: "奇数列（1, 3, 5, 7...）です"
            }
        ];

        function newGame() {
            // ランダムにパターンを選択
            const seqIndex = Math.floor(Math.random() * sequences.length);
            const seq = sequences[seqIndex];

            // 数列を生成（表示用：4つ）
            const displayCount = 4;
            const displayed = seq.generate(displayCount);

            // 正解を計算（5つ目）
            currentAnswer = seq.generate(displayCount + 1)[displayCount];

            // 表示
            const sequenceDiv = document.getElementById('sequence');
            sequenceDiv.innerHTML = displayed.map(n => `<div class="number">${n}</div>`).join('');

            // ヒントを設定
            document.getElementById('hint').textContent = `💡 ヒント: ${seq.hint}`;

            // フィードバックをクリア
            const feedback = document.getElementById('feedback');
            feedback.className = 'feedback';
            feedback.textContent = '';

            // 入力フィールドをクリア
            document.getElementById('answer').value = '';
            document.getElementById('answer').focus();

            currentSequence = seq;
        }

        function checkAnswer() {
            const userAnswer = parseInt(document.getElementById('answer').value);
            const feedback = document.getElementById('feedback');

            if (isNaN(userAnswer)) {
                feedback.className = 'feedback incorrect';
                feedback.textContent = '❌ 数字を入力してください';
                return;
            }

            if (userAnswer === currentAnswer) {
                feedback.className = 'feedback correct';
                feedback.textContent = `🎉 正解！+10ポイント`;
                score += 10;
                document.getElementById('score').textContent = score;

                // 新しい数列へ
                setTimeout(() => {
                    newGame();
                }, 1500);
            } else {
                feedback.className = 'feedback incorrect';
                feedback.textContent = `❌ 違います。もう一度考えてみてください！`;
                score = Math.max(0, score - 5);
                document.getElementById('score').textContent = score;
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ゲーム開始
        newGame();
    </script>
</body>
</html>
