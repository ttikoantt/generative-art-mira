<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Catch the Star | Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            color: #ffd700;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            color: #fff;
            font-size: 1rem;
            backdrop-filter: blur(10px);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
        }

        #gameCanvas {
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0c29 100%);
            border: 3px solid rgba(255, 215, 0, 0.3);
            border-radius: 15px;
            cursor: pointer;
            touch-action: none;
            display: block;
            margin: 0 auto;
        }

        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 12, 41, 0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid rgba(255, 215, 0, 0.3);
            backdrop-filter: blur(10px);
            display: none;
            z-index: 10;
        }

        .overlay.show {
            display: block;
        }

        .overlay h2 {
            color: #ffd700;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .overlay p {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .final-score {
            font-size: 3rem;
            color: #ffd700;
            margin: 20px 0;
            font-weight: bold;
        }

        .button {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #0f0c29;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.5);
        }

        .combo {
            position: absolute;
            color: #ff6b6b;
            font-size: 1.5rem;
            font-weight: bold;
            pointer-events: none;
            animation: comboFade 0.5s ease-out forwards;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.8);
        }

        @keyframes comboFade {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px) scale(1.5);
            }
        }

        .star-caught {
            position: absolute;
            pointer-events: none;
            animation: starBurst 0.4s ease-out forwards;
        }

        @keyframes starBurst {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(2);
            }
        }

        .fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(255, 215, 0, 0.2);
            border: none;
            color: #ffd700;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.5rem;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 215, 0, 0.4);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.5rem;
            }

            .stats {
                font-size: 0.9rem;
            }

            .overlay {
                padding: 25px;
                width: 90%;
            }

            .overlay h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">⛶</button>

    <div class="game-container">
        <h1>⭐ Catch the Star</h1>

        <div class="stats">
            <div class="stat">
                スコア<br>
                <span class="stat-value" id="score">0</span>
            </div>
            <div class="stat">
                残り時間<br>
                <span class="stat-value" id="timeLeft">30</span>s
            </div>
            <div class="stat">
                コンボ<br>
                <span class="stat-value" id="combo">0</span>x
            </div>
        </div>

        <canvas id="gameCanvas" width="500" height="500"></canvas>

        <div class="overlay show" id="startOverlay">
            <h2>⭐ Catch the Star</h2>
            <p>星をタップしてキャッチ！</p>
            <p>連続キャッチでコンボボーナス🔥</p>
            <button class="button" id="startBtn">スタート</button>
        </div>

        <div class="overlay" id="gameOverOverlay">
            <h2>🎮 ゲームオーバー</h2>
            <p>最終スコア</p>
            <div class="final-score" id="finalScore">0</div>
            <p>最大コンボ: <span id="maxCombo">0</span>x</p>
            <button class="button" id="restartBtn">もう一度</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ゲーム状態
        let score = 0;
        let timeLeft = 30;
        let combo = 0;
        let maxCombo = 0;
        let gameRunning = false;
        let gameTimer = null;
        let starSpawnTimer = null;

        // 星の配列
        let stars = [];

        // 難易度
        let spawnRate = 1000;
        let starLifetime = 2500;
        let starSize = 40;

        // 星クラス
        class Star {
            constructor() {
                this.size = starSize;
                this.x = Math.random() * (canvas.width - this.size * 2) + this.size;
                this.y = Math.random() * (canvas.height - this.size * 2) + this.size;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.pulse = 0;
                this.createdAt = Date.now();
                this.lifetime = starLifetime;
                this.alpha = 0;
                this.fadingIn = true;
            }

            update() {
                this.rotation += this.rotationSpeed;
                this.pulse += 0.1;

                const age = Date.now() - this.createdAt;

                // フェードイン
                if (this.fadingIn && age < 300) {
                    this.alpha = age / 300;
                }

                // フェードアウト（寿命が近づいたら）
                if (age > this.lifetime - 500) {
                    this.fadingIn = false;
                    this.alpha = (this.lifetime - age) / 500;
                }

                return age < this.lifetime;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // パルス効果
                const scale = 1 + Math.sin(this.pulse) * 0.1;
                ctx.scale(scale, scale);

                // 星を描画
                this.drawStar(0, 0, 5, this.size, this.size / 2);

                ctx.restore();
            }

            drawStar(cx, cy, spikes, outerRadius, innerRadius) {
                let rot = Math.PI / 2 * 3;
                let x = cx;
                let y = cy;
                let step = Math.PI / spikes;

                ctx.beginPath();
                ctx.moveTo(cx, cy - outerRadius);

                for (let i = 0; i < spikes; i++) {
                    x = cx + Math.cos(rot) * outerRadius;
                    y = cy + Math.sin(rot) * outerRadius;
                    ctx.lineTo(x, y);
                    rot += step;

                    x = cx + Math.cos(rot) * innerRadius;
                    y = cy + Math.sin(rot) * innerRadius;
                    ctx.lineTo(x, y);
                    rot += step;
                }

                ctx.lineTo(cx, cy - outerRadius);
                ctx.closePath();

                // グラデーション
                const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, outerRadius);
                gradient.addColorStop(0, `rgba(255, 255, 255, ${this.alpha})`);
                gradient.addColorStop(0.5, `rgba(255, 215, 0, ${this.alpha})`);
                gradient.addColorStop(1, `rgba(255, 165, 0, ${this.alpha * 0.5})`);

                ctx.fillStyle = gradient;
                ctx.fill();

                // 光芒
                ctx.strokeStyle = `rgba(255, 255, 255, ${this.alpha * 0.5})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            isClicked(x, y) {
                const dx = x - this.x;
                const dy = y - this.y;
                return Math.sqrt(dx * dx + dy * dy) < this.size;
            }
        }

        // キャンバスサイズを調整
        function resizeCanvas() {
            const container = canvas.parentElement;
            const maxWidth = Math.min(container.clientWidth - 40, 500);
            const size = maxWidth;

            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';
            canvas.width = size;
            canvas.height = size;
        }

        // 星をスポーン
        function spawnStar() {
            if (!gameRunning) return;

            stars.push(new Star());

            // 徐々に難易度を上げる
            if (score > 500) {
                spawnRate = 600;
                starLifetime = 1800;
                starSize = 35;
            } else if (score > 300) {
                spawnRate = 700;
                starLifetime = 2000;
                starSize = 37;
            } else if (score > 100) {
                spawnRate = 800;
                starLifetime = 2200;
                starSize = 38;
            }
        }

        // ゲームループ
        function gameLoop() {
            if (!gameRunning) return;

            // クリア
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 星を更新・描画
            stars = stars.filter(star => {
                const alive = star.update();
                if (alive) {
                    star.draw();
                }
                return alive;
            });

            requestAnimationFrame(gameLoop);
        }

        // タップ/クリック処理
        function handleTap(e) {
            if (!gameRunning) return;

            e.preventDefault();

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            let x, y;
            if (e.touches) {
                x = (e.touches[0].clientX - rect.left) * scaleX;
                y = (e.touches[0].clientY - rect.top) * scaleY;
            } else {
                x = (e.clientX - rect.left) * scaleX;
                y = (e.clientY - rect.top) * scaleY;
            }

            // 星をチェック（後ろの星から）
            for (let i = stars.length - 1; i >= 0; i--) {
                if (stars[i].isClicked(x, y)) {
                    // 星をキャッチ！
                    catchStar(stars[i]);
                    stars.splice(i, 1);
                    return;
                }
            }

            // 星を押し損ねたらコンボリセット
            if (combo > 0) {
                combo = 0;
                updateUI();
            }
        }

        // 星をキャッチ
        function catchStar(star) {
            combo++;
            maxCombo = Math.max(maxCombo, combo);

            // コンボボーナス
            const comboMultiplier = Math.min(combo, 10);
            const points = 10 * comboMultiplier;
            score += points;

            // コンボ表示
            if (combo > 1) {
                showCombo(combo, star.x, star.y);
            }

            // エフェクト
            showStarBurst(star.x, star.y);

            updateUI();
        }

        // コンボ表示
        function showCombo(combo, x, y) {
            const comboEl = document.createElement('div');
            comboEl.className = 'combo';
            comboEl.textContent = `${combo}x COMBO!`;
            comboEl.style.left = x + 'px';
            comboEl.style.top = y + 'px';
            document.body.appendChild(comboEl);

            setTimeout(() => comboEl.remove(), 500);
        }

        // 星バーストエフェクト
        function showStarBurst(x, y) {
            const burst = document.createElement('div');
            burst.className = 'star-caught';
            burst.innerHTML = '⭐';
            burst.style.left = x + 'px';
            burst.style.top = y + 'px';
            burst.style.fontSize = '40px';
            document.body.appendChild(burst);

            setTimeout(() => burst.remove(), 400);
        }

        // UI更新
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('timeLeft').textContent = timeLeft;
            document.getElementById('combo').textContent = combo;
        }

        // ゲーム開始
        function startGame() {
            score = 0;
            timeLeft = 30;
            combo = 0;
            maxCombo = 0;
            stars = [];
            gameRunning = true;

            // 難易度リセット
            spawnRate = 1000;
            starLifetime = 2500;
            starSize = 40;

            updateUI();

            document.getElementById('startOverlay').classList.remove('show');
            document.getElementById('gameOverOverlay').classList.remove('show');

            // タイマー開始
            gameTimer = setInterval(() => {
                timeLeft--;
                updateUI();

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // 星スポーン開始
            starSpawnTimer = setInterval(spawnStar, spawnRate);

            // ゲームループ開始
            gameLoop();
        }

        // ゲーム終了
        function endGame() {
            gameRunning = false;
            clearInterval(gameTimer);
            clearInterval(starSpawnTimer);

            document.getElementById('finalScore').textContent = score;
            document.getElementById('maxCombo').textContent = maxCombo;
            document.getElementById('gameOverOverlay').classList.add('show');
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        canvas.addEventListener('click', handleTap);
        canvas.addEventListener('touchstart', handleTap);

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>
