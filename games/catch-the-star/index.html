<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Catch the Star | Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            touch-action: manipulation;
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .star {
            position: absolute;
            font-size: 40px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
            animation: twinkle 1s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        .star:active {
            transform: scale(0.8);
        }

        .hud {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            z-index: 100;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            color: white;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-label {
            font-size: 11px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            margin-top: 5px;
        }

        .stat-value.score { color: #ffd700; }
        .stat-value.combo { color: #ff6b6b; }
        .stat-value.time { color: #4ecdc4; }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .game-over.active {
            opacity: 1;
            pointer-events: all;
        }

        .game-over h1 {
            color: #ffd700;
            font-size: 48px;
            margin-bottom: 20px;
        }

        .game-over p {
            color: white;
            font-size: 20px;
            margin-bottom: 30px;
        }

        .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 300;
            transition: opacity 0.5s;
        }

        .start-screen h1 {
            color: #ffd700;
            font-size: 42px;
            margin-bottom: 10px;
        }

        .start-screen p {
            color: white;
            font-size: 16px;
            opacity: 0.7;
            margin-bottom: 30px;
        }

        .start-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            color: white;
            padding: 15px 50px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
        }

        .start-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .catch-effect {
            position: absolute;
            font-size: 24px;
            color: #ffd700;
            font-weight: bold;
            pointer-events: none;
            animation: catchPop 0.8s ease-out forwards;
        }

        @keyframes catchPop {
            0% {
                transform: scale(0.5);
                opacity: 1;
            }
            100% {
                transform: translateY(-50px) scale(1.5);
                opacity: 0;
            }
        }

        .combo-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #ff6b6b;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s;
            z-index: 150;
        }

        .combo-indicator.show {
            opacity: 1;
            animation: comboPop 0.5s ease-out;
        }

        @keyframes comboPop {
            0% { transform: translate(-50%, -50%) scale(0.5); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <div class="hud">
            <div class="stat">
                <div class="stat-label">Score</div>
                <div class="stat-value score" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Combo</div>
                <div class="stat-value combo" id="combo">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Time</div>
                <div class="stat-value time" id="time">30</div>
            </div>
        </div>

        <div class="start-screen" id="startScreen">
            <h1>⭐ Catch the Star</h1>
            <p>Tap stars to catch them!</p>
            <button class="start-btn" onclick="startGame()">Start</button>
        </div>

        <div class="game-over" id="gameOver">
            <h1>⏰ Time's Up!</h1>
            <p>Final Score: <span id="finalScore">0</span></p>
            <p>Best Combo: <span id="bestCombo">0</span></p>
            <button class="restart-btn" onclick="startGame()">Play Again</button>
        </div>

        <div class="combo-indicator" id="comboIndicator"></div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        let score = 0;
        let combo = 0;
        let bestCombo = 0;
        let timeLeft = 30;
        let gameRunning = false;
        let stars = [];
        let gameTimer;
        let spawnTimer;
        let gameSpeed = 2000;

        const gameContainer = document.getElementById('gameContainer');
        const scoreEl = document.getElementById('score');
        const comboEl = document.getElementById('combo');
        const timeEl = document.getElementById('time');
        const gameOverEl = document.getElementById('gameOver');
        const startScreenEl = document.getElementById('startScreen');
        const finalScoreEl = document.getElementById('finalScore');
        const bestComboEl = document.getElementById('bestCombo');
        const comboIndicator = document.getElementById('comboIndicator');

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function startGame() {
            score = 0;
            combo = 0;
            bestCombo = 0;
            timeLeft = 30;
            gameSpeed = 2000;
            gameRunning = true;

            updateHUD();
            startScreenEl.classList.add('hidden');
            gameOverEl.classList.remove('active');

            // Clear existing stars
            stars.forEach(s => s.element.remove());
            stars = [];

            // Start game loop
            gameTimer = setInterval(updateTime, 1000);
            spawnStar();
        }

        function updateTime() {
            timeLeft--;
            timeEl.textContent = timeLeft;

            // Speed up over time
            if (timeLeft % 5 === 0 && gameSpeed > 500) {
                gameSpeed -= 200;
            }

            if (timeLeft <= 0) {
                endGame();
            }
        }

        function endGame() {
            gameRunning = false;
            clearInterval(gameTimer);
            clearTimeout(spawnTimer);

            // Remove all stars
            stars.forEach(s => s.element.remove());
            stars = [];

            finalScoreEl.textContent = score;
            bestComboEl.textContent = bestCombo;
            gameOverEl.classList.add('active');
        }

        function spawnStar() {
            if (!gameRunning) return;

            const starEmojis = ['⭐', '✨', '💫', '🌟'];
            const star = document.createElement('div');
            star.className = 'star';
            star.textContent = starEmojis[Math.floor(Math.random() * starEmojis.length)];

            const size = Math.random() * 20 + 30;
            const x = Math.random() * (window.innerWidth - size);
            const y = Math.random() * (window.innerHeight - size);

            star.style.left = x + 'px';
            star.style.top = y + 'px';
            star.style.fontSize = size + 'px';

            // Random movement
            const speedX = (Math.random() - 0.5) * 3;
            const speedY = (Math.random() - 0.5) * 3;

            const starObj = {
                element: star,
                x: x,
                y: y,
                speedX: speedX,
                speedY: speedY,
                life: 4000 // Disappear after 4 seconds
            };

            star.addEventListener('click', (e) => catchStar(e, starObj));
            star.addEventListener('touchstart', (e) => {
                e.preventDefault();
                catchStar(e, starObj);
            });

            gameContainer.appendChild(star);
            stars.push(starObj);

            // Animate star
            const animateStar = setInterval(() => {
                if (!gameRunning) {
                    clearInterval(animateStar);
                    return;
                }

                starObj.x += starObj.speedX;
                starObj.y += starObj.speedY;
                starObj.life -= 16;

                // Bounce off walls
                if (starObj.x <= 0 || starObj.x >= window.innerWidth - size) {
                    starObj.speedX *= -1;
                }
                if (starObj.y <= 0 || starObj.y >= window.innerHeight - size) {
                    starObj.speedY *= -1;
                }

                star.style.left = starObj.x + 'px';
                star.style.top = starObj.y + 'px';

                // Remove old stars
                if (starObj.life <= 0) {
                    clearInterval(animateStar);
                    star.remove();
                    stars = stars.filter(s => s !== starObj);
                    if (stars.length === 0) {
                        combo = 0;
                        updateHUD();
                    }
                }
            }, 16);

            // Schedule next spawn
            spawnTimer = setTimeout(spawnStar, gameSpeed);
        }

        function catchStar(e, starObj) {
            if (!gameRunning) return;

            // Calculate score based on combo
            combo++;
            if (combo > bestCombo) bestCombo = combo;

            const points = 10 + (combo * 5);
            score += points;

            updateHUD();

            // Show catch effect
            showCatchEffect(e.clientX || e.touches[0].clientX, 
                           e.clientY || e.touches[0].clientY, points);

            // Show combo indicator for milestones
            if (combo % 5 === 0) {
                showComboIndicator(combo);
            }

            // Remove star
            starObj.element.remove();
            stars = stars.filter(s => s !== starObj);
        }

        function showCatchEffect(x, y, points) {
            const effect = document.createElement('div');
            effect.className = 'catch-effect';
            effect.textContent = '+' + points;
            effect.style.left = x + 'px';
            effect.style.top = y + 'px';
            gameContainer.appendChild(effect);

            setTimeout(() => effect.remove(), 800);
        }

        function showComboIndicator(combo) {
            comboIndicator.textContent = combo + 'x COMBO!';
            comboIndicator.classList.add('show');
            setTimeout(() => comboIndicator.classList.remove('show'), 500);
        }

        function updateHUD() {
            scoreEl.textContent = score;
            comboEl.textContent = combo;
        }
    </script>
</body>
</html>
