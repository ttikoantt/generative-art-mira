<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Star Catcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(to bottom, #0a0a1a, #1a1a3a);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: none;
        }
        #gameCanvas {
            display: block;
            cursor: pointer;
        }
        .ui {
            position: fixed;
            pointer-events: none;
            color: white;
        }
        .score {
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        .combo {
            top: 55px;
            left: 20px;
            font-size: 18px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        .timer {
            top: 20px;
            right: 20px;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            pointer-events: auto;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .start-screen, .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 26, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            text-align: center;
        }
        .start-screen h1, .game-over-screen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        .start-screen p, .game-over-screen p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.8;
        }
        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.2s;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .start-btn:hover {
            transform: scale(1.05);
        }
        .start-btn:active {
            transform: scale(0.95);
        }
        .final-score {
            font-size: 64px;
            font-weight: bold;
            color: #ffd700;
            margin: 20px 0;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }
        .hidden {
            display: none !important;
        }
        @media (max-width: 768px) {
            .start-screen h1, .game-over-screen h1 {
                font-size: 36px;
            }
            .score, .timer {
                font-size: 20px;
            }
            .fullscreen-btn {
                display: none;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="ui score">Score: <span id="score">0</span></div>
    <div class="ui combo" id="combo"></div>
    <div class="ui timer">Time: <span id="timer">60</span>s</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <div class="start-screen" id="startScreen">
        <h1>⭐ Star Catcher</h1>
        <p>Tap the stars before they disappear!<br>Build combos for bonus points!</p>
        <button class="start-btn" onclick="startGame()">Start Game</button>
    </div>

    <div class="game-over-screen hidden" id="gameOverScreen">
        <h1>Time's Up!</h1>
        <p>Your Score</p>
        <div class="final-score" id="finalScore">0</div>
        <p id="highScoreText">High Score: 0</p>
        <button class="start-btn" onclick="startGame()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let score = 0;
        let combo = 0;
        let timeLeft = 60;
        let gameRunning = false;
        let stars = [];
        let particles = [];
        let lastSpawn = 0;
        let spawnRate = 800;
        let highScore = parseInt(localStorage.getItem('starCatcherHighScore')) || 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function createStar() {
            const size = Math.random() * 30 + 30;
            const star = {
                x: Math.random() * (width - size * 2) + size,
                y: Math.random() * (height - size * 2) + size,
                size: size,
                maxSize: size,
                life: 1,
                decay: Math.random() * 0.008 + 0.005,
                rotation: Math.random() * Math.PI * 2,
                rotationSpeed: (Math.random() - 0.5) * 0.05,
                color: getRandomColor(),
                points: Math.floor(Math.random() * 3) + 1
            };
            stars.push(star);
        }

        function getRandomColor() {
            const colors = [
                { r: 255, g: 215, b: 0 },    // Gold
                { r: 100, g: 200, b: 255 },  // Light blue
                { r: 255, g: 100, b: 150 },  // Pink
                { r: 150, g: 255, b: 150 },  // Light green
                { r: 255, g: 150, b: 50 },   // Orange
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                const angle = (Math.PI * 2 / 15) * i;
                const speed = Math.random() * 5 + 3;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1,
                    decay: Math.random() * 0.02 + 0.02,
                    color: color,
                    size: Math.random() * 4 + 2
                });
            }
        }

        function drawStar(x, y, size, rotation, color, alpha) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotation);
            ctx.beginPath();

            const spikes = 5;
            const outerRadius = size;
            const innerRadius = size * 0.4;

            for (let i = 0; i < spikes * 2; i++) {
                const radius = i % 2 === 0 ? outerRadius : innerRadius;
                const angle = (Math.PI / spikes) * i;
                const px = Math.cos(angle) * radius;
                const py = Math.sin(angle) * radius;

                if (i === 0) {
                    ctx.moveTo(px, py);
                } else {
                    ctx.lineTo(px, py);
                }
            }

            ctx.closePath();

            // Glow effect
            ctx.shadowColor = `rgba(${color.r}, ${color.g}, ${color.b}, ${alpha})`;
            ctx.shadowBlur = 20;
            ctx.fillStyle = `rgba(${color.r}, ${color.g}, ${color.b}, ${alpha})`;
            ctx.fill();

            // Inner highlight
            ctx.beginPath();
            for (let i = 0; i < spikes * 2; i++) {
                const radius = i % 2 === 0 ? outerRadius * 0.6 : innerRadius * 0.6;
                const angle = (Math.PI / spikes) * i;
                const px = Math.cos(angle) * radius;
                const py = Math.sin(angle) * radius;

                if (i === 0) {
                    ctx.moveTo(px, py);
                } else {
                    ctx.lineTo(px, py);
                }
            }
            ctx.closePath();
            ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.3})`;
            ctx.fill();

            ctx.restore();
        }

        function update(timestamp) {
            if (!gameRunning) return;

            // Spawn stars
            if (timestamp - lastSpawn > spawnRate) {
                createStar();
                lastSpawn = timestamp;
                // Increase difficulty over time
                spawnRate = Math.max(300, 800 - (60 - timeLeft) * 8);
            }

            // Update stars
            stars = stars.filter(star => {
                star.life -= star.decay;
                star.rotation += star.rotationSpeed;
                star.size = star.maxSize * star.life;
                return star.life > 0;
            });

            // Update particles
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1; // gravity
                p.life -= p.decay;
                return p.life > 0;
            });
        }

        function draw() {
            // Clear with gradient background
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#0a0a1a');
            gradient.addColorStop(0.5, '#1a1a3a');
            gradient.addColorStop(1, '#0a0a1a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // Draw stars
            stars.forEach(star => {
                drawStar(
                    star.x,
                    star.y,
                    star.size,
                    star.rotation,
                    star.color,
                    star.life
                );

                // Point indicator
                if (star.points > 1) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${star.life * 0.8})`;
                    ctx.font = 'bold 16px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(`x${star.points}`, star.x, star.y - star.size - 10);
                }
            });

            // Draw particles
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${p.color.r}, ${p.color.g}, ${p.color.b}, ${p.life})`;
                ctx.fill();
            });
        }

        function gameLoop(timestamp) {
            update(timestamp);
            draw();
            if (gameRunning) {
                requestAnimationFrame(gameLoop);
            }
        }

        function handleClick(x, y) {
            if (!gameRunning) return;

            for (let i = stars.length - 1; i >= 0; i--) {
                const star = stars[i];
                const dx = x - star.x;
                const dy = y - star.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < star.size) {
                    // Caught!
                    combo++;
                    const points = star.points * combo;
                    score += points;

                    createParticles(star.x, star.y, star.color);
                    stars.splice(i, 1);

                    updateUI();

                    // Combo flash effect
                    if (combo >= 5) {
                        document.getElementById('combo').style.transform = 'scale(1.2)';
                        setTimeout(() => {
                            document.getElementById('combo').style.transform = 'scale(1)';
                        }, 100);
                    }

                    break;
                }
            }
        }

        function updateUI() {
            document.getElementById('score').textContent = score;

            const comboEl = document.getElementById('combo');
            if (combo >= 2) {
                comboEl.textContent = `${combo}x Combo!`;
                comboEl.style.opacity = Math.min(1, 0.5 + combo * 0.1);
            } else {
                comboEl.textContent = '';
            }

            document.getElementById('timer').textContent = timeLeft;
        }

        function startGame() {
            score = 0;
            combo = 0;
            timeLeft = 60;
            stars = [];
            particles = [];
            spawnRate = 800;
            gameRunning = true;

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            updateUI();

            // Timer
            const timerInterval = setInterval(() => {
                if (!gameRunning) {
                    clearInterval(timerInterval);
                    return;
                }

                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                    clearInterval(timerInterval);
                }
            }, 1000);

            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameRunning = false;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('starCatcherHighScore', highScore);
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('highScoreText').textContent = `High Score: ${highScore}`;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Event listeners
        canvas.addEventListener('click', (e) => {
            handleClick(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleClick(touch.clientX, touch.clientY);
        });

        window.addEventListener('resize', resize);

        // Initialize
        resize();
    </script>
</body>
</html>
