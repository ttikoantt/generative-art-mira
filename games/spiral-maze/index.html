<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>螺旋迷路 | Spiral Maze</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .game-container {
            position: relative;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: white;
            font-size: 16px;
            font-weight: 600;
        }

        canvas {
            display: block;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.3);
        }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            min-width: 50px;
            user-select: none;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .fullscreen-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 10px 18px;
            font-size: 12px;
        }

        .instructions {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .game-container {
                padding: 15px;
                margin: 10px;
            }

            .stats {
                font-size: 14px;
                margin-bottom: 10px;
            }

            .control-btn {
                padding: 15px 25px;
                font-size: 16px;
            }

            .fullscreen-btn {
                padding: 8px 14px;
                font-size: 11px;
            }

            .instructions {
                font-size: 11px;
            }
        }

        /* Modal for win */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-content h2 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        .modal-content p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .modal-btn {
            background: white;
            color: #764ba2;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .modal-btn:active {
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .modal-content {
                padding: 30px 20px;
                margin: 20px;
            }

            .modal-content h2 {
                font-size: 24px;
            }

            .modal-content p {
                font-size: 16px;
            }

            .modal-btn {
                padding: 12px 30px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="stats">
            <div>🎮 Level: <span id="level">1</span></div>
            <div>⏱️ Time: <span id="time">0</span>s</div>
            <div>🏆 Best: <span id="best">-</span></div>
        </div>
        <canvas id="canvas"></canvas>
        <div class="controls">
            <button class="control-btn" onclick="move(-1, 0)">←</button>
            <button class="control-btn" onclick="move(0, -1)">↑</button>
            <button class="control-btn" onclick="move(0, 1)">↓</button>
            <button class="control-btn" onclick="move(1, 0)">→</button>
            <button class="control-btn fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
        </div>
        <div class="instructions">Goal: Reach the center of the spiral!</div>
    </div>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2>🎉 Clear!</h2>
            <p>You escaped the spiral maze!</p>
            <p>Time: <span id="finalTime">0</span> seconds</p>
            <button class="modal-btn" onclick="nextLevel()">Next Level →</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Set canvas size
        const size = Math.min(window.innerWidth - 60, 500);
        canvas.width = size;
        canvas.height = size;

        // Game state
        let level = 1;
        let time = 0;
        let timer = null;
        let player = { x: 0, y: 0 };
        let goal = { x: 0, y: 0 };
        let walls = [];
        let spiralPath = [];
        let pathIndex = 0;
        let bestTimes = {};

        // Grid settings
        const cellSize = size / 15;
        const gridCount = 15;

        // Generate spiral maze
        function generateMaze() {
            walls = [];
            spiralPath = [];

            const cx = Math.floor(gridCount / 2);
            const cy = Math.floor(gridCount / 2);

            // Generate spiral path
            let x = 0, y = 0;
            let dx = 1, dy = 0;
            let segmentLength = 1;
            let segmentPassed = 0;
            let segments = 0;

            spiralPath.push({ x: cx, y: cy });

            while (spiralPath.length < gridCount * gridCount) {
                x += dx;
                y += dy;
                segmentPassed++;

                if (x >= 0 && x < gridCount && y >= 0 && y < gridCount) {
                    spiralPath.push({ x: x, y: y });
                }

                if (segmentPassed === segmentLength) {
                    segmentPassed = 0;
                    segments++;

                    if (segments % 2 === 0) {
                        segmentLength++;
                    }

                    // Change direction (counterclockwise spiral)
                    const temp = dx;
                    dx = -dy;
                    dy = temp;
                }
            }

            // Create walls based on spiral path
            for (let i = 0; i < gridCount; i++) {
                for (let j = 0; j < gridCount; j++) {
                    const onPath = spiralPath.some(p => p.x === i && p.y === j);
                    if (!onPath) {
                        walls.push({ x: i, y: j });
                    }
                }
            }

            // Set player and goal positions
            pathIndex = spiralPath.length - 1;
            player = { ...spiralPath[pathIndex] };
            goal = { ...spiralPath[0] };
        }

        // Draw game
        function draw() {
            // Clear canvas
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw walls
            walls.forEach(wall => {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(
                    wall.x * cellSize + 2,
                    wall.y * cellSize + 2,
                    cellSize - 4,
                    cellSize - 4
                );
            });

            // Draw spiral path (subtle)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            spiralPath.forEach((p, i) => {
                if (i === 0) {
                    ctx.moveTo(p.x * cellSize + cellSize / 2, p.y * cellSize + cellSize / 2);
                } else {
                    ctx.lineTo(p.x * cellSize + cellSize / 2, p.y * cellSize + cellSize / 2);
                }
            });
            ctx.stroke();

            // Draw goal (center of spiral)
            ctx.beginPath();
            ctx.arc(
                goal.x * cellSize + cellSize / 2,
                goal.y * cellSize + cellSize / 2,
                cellSize / 3,
                0,
                Math.PI * 2
            );
            ctx.fillStyle = '#ffd700';
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Goal glow
            ctx.beginPath();
            ctx.arc(
                goal.x * cellSize + cellSize / 2,
                goal.y * cellSize + cellSize / 2,
                cellSize / 2,
                0,
                Math.PI * 2
            );
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.3)';
            ctx.lineWidth = 4;
            ctx.stroke();

            // Draw player
            ctx.beginPath();
            ctx.arc(
                player.x * cellSize + cellSize / 2,
                player.y * cellSize + cellSize / 2,
                cellSize / 3,
                0,
                Math.PI * 2
            );
            const gradient = ctx.createRadialGradient(
                player.x * cellSize + cellSize / 2,
                player.y * cellSize + cellSize / 2,
                0,
                player.x * cellSize + cellSize / 2,
                player.y * cellSize + cellSize / 2,
                cellSize / 3
            );
            gradient.addColorStop(0, '#00ff88');
            gradient.addColorStop(1, '#00cc66');
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Player glow
            ctx.beginPath();
            ctx.arc(
                player.x * cellSize + cellSize / 2,
                player.y * cellSize + cellSize / 2,
                cellSize / 2,
                0,
                Math.PI * 2
            );
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.3)';
            ctx.lineWidth = 4;
            ctx.stroke();
        }

        // Move player
        function move(dx, dy) {
            const newX = player.x + dx;
            const newY = player.y + dy;

            // Check bounds
            if (newX < 0 || newX >= gridCount || newY < 0 || newY >= gridCount) {
                return;
            }

            // Check walls
            const isWall = walls.some(w => w.x === newX && w.y === newY);
            if (isWall) {
                return;
            }

            // Check if move is valid along spiral path
            const currentIndex = spiralPath.findIndex(p => p.x === player.x && p.y === player.y);
            const targetIndex = spiralPath.findIndex(p => p.x === newX && p.y === newY);

            // Allow movement only if on spiral path and moving toward goal
            if (targetIndex === -1 || targetIndex >= currentIndex) {
                return;
            }

            player.x = newX;
            player.y = newY;

            // Check win condition
            if (player.x === goal.x && player.y === goal.y) {
                win();
            }

            draw();
        }

        // Win condition
        function win() {
            clearInterval(timer);

            // Update best time
            if (!bestTimes[level] || time < bestTimes[level]) {
                bestTimes[level] = time;
                document.getElementById('best').textContent = time + 's';
            }

            // Show modal
            document.getElementById('finalTime').textContent = time;
            document.getElementById('winModal').classList.add('active');
        }

        // Next level
        function nextLevel() {
            level++;
            document.getElementById('level').textContent = level;
            document.getElementById('winModal').classList.remove('active');
            document.getElementById('best').textContent = bestTimes[level] || '-';

            resetGame();
        }

        // Reset game
        function resetGame() {
            time = 0;
            document.getElementById('time').textContent = time;

            if (timer) {
                clearInterval(timer);
            }

            timer = setInterval(() => {
                time++;
                document.getElementById('time').textContent = time;
            }, 1000);

            generateMaze();
            draw();
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    move(-1, 0);
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    move(1, 0);
                    e.preventDefault();
                    break;
                case 'ArrowUp':
                case 'w':
                case 'W':
                    move(0, -1);
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    move(0, 1);
                    e.preventDefault();
                    break;
            }
        });

        // Touch swipe controls
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            const threshold = 30;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > threshold) {
                    move(1, 0);
                } else if (dx < -threshold) {
                    move(-1, 0);
                }
            } else {
                if (dy > threshold) {
                    move(0, 1);
                } else if (dy < -threshold) {
                    move(0, -1);
                }
            }
        }, { passive: true });

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize game
        generateMaze();
        draw();

        timer = setInterval(() => {
            time++;
            document.getElementById('time').textContent = time;
        }, 1000);
    </script>
</body>
</html>
