<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ネオンリフレックス - Neon Reflex</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .game-container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            color: #0ff;
        }

        .title {
            font-size: 24px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #0ff;
        }

        .scores {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
        }

        .score-box {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #0ff;
            padding: 10px 20px;
            border-radius: 10px;
            color: #fff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        .score-label {
            font-size: 12px;
            opacity: 0.7;
        }

        .score-value {
            font-size: 28px;
            font-weight: bold;
            color: #0ff;
        }

        .game-area {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #f0f;
            border-radius: 10px;
            overflow: hidden;
            cursor: crosshair;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
        }

        .target {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, #0ff 0%, #f0f 100%);
            box-shadow: 0 0 20px #0ff, 0 0 40px #f0f;
            cursor: pointer;
            transition: transform 0.1s ease;
            animation: pulse 0.5s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .target:active {
            transform: scale(0.9);
        }

        .start-screen, .gameover-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .start-screen h2, .gameover-screen h2 {
            color: #f0f;
            font-size: 28px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #f0f;
        }

        .start-screen p {
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
            padding: 0 20px;
        }

        .gameover-screen .final-score {
            font-size: 48px;
            color: #0ff;
            margin: 20px 0;
            text-shadow: 0 0 20px #0ff;
        }

        .btn {
            background: linear-gradient(135deg, #f0f 0%, #0ff 100%);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.8);
        }

        .time-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .time-fill {
            height: 100%;
            background: linear-gradient(90deg, #0ff 0%, #f0f 100%);
            transition: width 0.1s linear;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            z-index: 100;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .combo {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: #ff0;
            text-shadow: 0 0 10px #ff0;
            pointer-events: none;
            animation: comboFade 0.5s ease-out forwards;
        }

        @keyframes comboFade {
            from {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            to {
                opacity: 0;
                transform: translateY(-30px) scale(1.5);
            }
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 600px) {
            .title {
                font-size: 20px;
            }

            .score-value {
                font-size: 24px;
            }

            .target {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <div class="header">
            <div class="title">🎯 ネオンリフレックス</div>
            <div class="time-bar">
                <div class="time-fill" id="timeFill"></div>
            </div>
            <div class="scores">
                <div class="score-box">
                    <div class="score-label">スコア</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">ハイスコア</div>
                    <div class="score-value" id="highScore">0</div>
                </div>
            </div>
        </div>

        <div class="game-area" id="gameArea">
            <div class="start-screen" id="startScreen">
                <h2>🎯 ネオンリフレックス</h2>
                <p>現れるターゲットを素早くタップ！<br>制限時間30秒で何個タップできる？</p>
                <button class="btn" onclick="startGame()">スタート</button>
            </div>

            <div class="gameover-screen hidden" id="gameoverScreen">
                <h2>ゲームオーバー</h2>
                <div class="final-score" id="finalScore">0</div>
                <p style="color: #fff; margin-bottom: 20px;" id="newRecord"></p>
                <button class="btn" onclick="startGame()">もう一度</button>
            </div>
        </div>
    </div>

    <script>
        let score = 0;
        let highScore = parseInt(localStorage.getItem('neonReflexHighScore')) || 0;
        let timeLeft = 30;
        let gameInterval;
        let spawnInterval;
        let combo = 0;
        let isPlaying = false;

        document.getElementById('highScore').textContent = highScore;

        function startGame() {
            score = 0;
            timeLeft = 30;
            combo = 0;
            isPlaying = true;

            document.getElementById('score').textContent = '0';
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameoverScreen').classList.add('hidden');

            updateTimeBar();

            gameInterval = setInterval(() => {
                timeLeft--;
                updateTimeBar();

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            spawnTarget();
            spawnInterval = setInterval(spawnTarget, 800);
        }

        function updateTimeBar() {
            const fill = document.getElementById('timeFill');
            fill.style.width = `${(timeLeft / 30) * 100}%`;
        }

        function spawnTarget() {
            if (!isPlaying) return;

            const gameArea = document.getElementById('gameArea');
            const existingTarget = gameArea.querySelector('.target');
            if (existingTarget) {
                existingTarget.remove();
            }

            const target = document.createElement('div');
            target.className = 'target';

            const maxX = gameArea.clientWidth - 60;
            const maxY = gameArea.clientHeight - 60;
            const x = Math.random() * maxX;
            const y = Math.random() * maxY;

            target.style.left = `${x}px`;
            target.style.top = `${y}px`;

            target.addEventListener('click', (e) => {
                e.stopPropagation();
                hitTarget(e.clientX, e.clientY);
            });

            target.addEventListener('touchstart', (e) => {
                e.stopPropagation();
                e.preventDefault();
                const touch = e.touches[0];
                hitTarget(touch.clientX, touch.clientY);
            });

            gameArea.appendChild(target);
        }

        function hitTarget(clientX, clientY) {
            if (!isPlaying) return;

            combo++;
            const points = 10 + (combo - 1) * 2;
            score += points;

            document.getElementById('score').textContent = score;

            // コンボ表示
            const gameArea = document.getElementById('gameArea');
            const rect = gameArea.getBoundingClientRect();
            const comboText = document.createElement('div');
            comboText.className = 'combo';
            comboText.textContent = `+${points}`;
            comboText.style.left = `${clientX - rect.left}px`;
            comboText.style.top = `${clientY - rect.top}px`;
            gameArea.appendChild(comboText);

            setTimeout(() => comboText.remove(), 500);

            spawnTarget();
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameInterval);
            clearInterval(spawnInterval);

            const gameArea = document.getElementById('gameArea');
            const existingTarget = gameArea.querySelector('.target');
            if (existingTarget) {
                existingTarget.remove();
            }

            document.getElementById('finalScore').textContent = score;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('neonReflexHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
                document.getElementById('newRecord').textContent = '🎉 新記録！';
            } else {
                document.getElementById('newRecord').textContent = '';
            }

            document.getElementById('gameoverScreen').classList.remove('hidden');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ゲームエリア外のクリックでコンボリセット
        document.getElementById('gameArea').addEventListener('click', () => {
            if (isPlaying) {
                combo = 0;
            }
        });
    </script>
</body>
</html>
