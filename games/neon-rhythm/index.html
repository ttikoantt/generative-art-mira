<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ネオンリズム - Neon Rhythm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #gameCanvas {
            border: 2px solid #00ffff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            border-radius: 10px;
        }

        .hud {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            border-radius: 25px;
            border: 2px solid #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .hud-item {
            text-align: center;
        }

        .hud-label {
            font-size: 11px;
            color: #00ffff;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hud-value {
            font-size: 28px;
            color: #fff;
            font-weight: bold;
            text-shadow: 0 0 10px #00ffff;
        }

        .combo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #ff00ff;
            text-shadow: 0 0 20px #ff00ff;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .combo.show {
            opacity: 1;
            animation: comboAnim 0.5s ease-out;
        }

        @keyframes comboAnim {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .message {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            opacity: 0;
            transition: opacity 0.3s;
            text-align: center;
        }

        .message.show {
            opacity: 1;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 255, 0.2);
            border: 2px solid #00ffff;
            color: #00ffff;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .start-screen, .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .start-screen h1, .game-over-screen h1 {
            font-size: 36px;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff;
            margin-bottom: 20px;
        }

        .start-screen p, .game-over-screen p {
            font-size: 16px;
            color: #fff;
            margin-bottom: 30px;
            text-align: center;
            max-width: 300px;
        }

        .start-btn, .restart-btn {
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            border: none;
            color: #000;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }

        .start-btn:hover, .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.8);
        }

        .hidden {
            display: none !important;
        }

        .final-score {
            font-size: 48px;
            color: #ff00ff;
            text-shadow: 0 0 20px #ff00ff;
            margin: 20px 0;
        }

        @media (max-width: 768px) {
            .hud {
                padding: 10px 20px;
                gap: 20px;
            }

            .hud-label {
                font-size: 9px;
            }

            .hud-value {
                font-size: 22px;
            }

            .start-screen h1, .game-over-screen h1 {
                font-size: 28px;
            }

            .start-screen p, .game-over-screen p {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="hud">
        <div class="hud-item">
            <div class="hud-label">Score</div>
            <div class="hud-value" id="score">0</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">Combo</div>
            <div class="hud-value" id="combo">0</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">Lives</div>
            <div class="hud-value" id="lives">3</div>
        </div>
    </div>

    <div class="combo" id="comboDisplay"></div>
    <div class="message" id="message"></div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="start-screen" id="startScreen">
        <h1>🎵 ネオンリズム</h1>
        <p>円が中央のターゲットに重なった時<br/>画面をタップ！</p>
        <button class="start-btn" onclick="startGame()">Start</button>
    </div>

    <div class="game-over-screen hidden" id="gameOverScreen">
        <h1>Game Over</h1>
        <div class="final-score" id="finalScore">0</div>
        <p id="finalMessage"></p>
        <button class="restart-btn" onclick="restartGame()">再挑戦</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let gameRunning = false;
        let score = 0;
        let combo = 0;
        let lives = 3;
        let circles = [];
        let targetCircle = null;
        let lastTapTime = 0;
        let tapWindow = 800; // ミリ秒

        const colors = [
            { main: '#ff00ff', glow: 'rgba(255, 0, 255, 0.5)' },
            { main: '#00ffff', glow: 'rgba(0, 255, 255, 0.5)' },
            { main: '#ffff00', glow: 'rgba(255, 255, 0, 0.5)' },
            { main: '#ff0080', glow: 'rgba(255, 0, 128, 0.5)' }
        ];

        function resize() {
            const maxWidth = Math.min(window.innerWidth - 40, 600);
            const maxHeight = Math.min(window.innerHeight - 200, 600);
            const size = Math.min(maxWidth, maxHeight);
            
            width = canvas.width = size;
            height = canvas.height = size;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        class Circle {
            constructor(index) {
                this.index = index;
                this.baseRadius = 40 - index * 8;
                this.maxRadius = 100;
                this.angle = (Math.PI * 2 / 4) * index;
                this.speed = 0.02 + Math.random() * 0.01;
                this.color = colors[index % colors.length];
                this.radius = this.baseRadius;
                this.expanding = true;
            }

            update() {
                if (this.expanding) {
                    this.radius += this.speed * 20;
                    if (this.radius >= this.maxRadius) {
                        this.expanding = false;
                    }
                } else {
                    this.radius -= this.speed * 20;
                    if (this.radius <= this.baseRadius) {
                        this.expanding = true;
                    }
                }
            }

            draw() {
                const centerX = width / 2;
                const centerY = height / 2;

                // グロー効果
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.color.glow;

                // 円を描く
                ctx.strokeStyle = this.color.main;
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(centerX, centerY, this.radius, 0, Math.PI * 2);
                ctx.stroke();

                ctx.shadowBlur = 0;
            }

            isNearTarget() {
                const centerX = width / 2;
                const centerY = height / 2;
                const dx = centerX - targetCircle.x;
                const dy = centerY - targetCircle.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                return Math.abs(distance - this.radius) < 15;
            }
        }

        function initCircles() {
            circles = [];
            for (let i = 0; i < 4; i++) {
                circles.push(new Circle(i));
            }
        }

        function spawnTarget() {
            const side = Math.floor(Math.random() * 4);
            const centerX = width / 2;
            const centerY = height / 2;
            const spawnRadius = width / 2 - 30;
            
            let angle;
            switch(side) {
                case 0: angle = 0; break;
                case 1: angle = Math.PI / 2; break;
                case 2: angle = Math.PI; break;
                case 3: angle = -Math.PI / 2; break;
            }

            targetCircle = {
                x: centerX + Math.cos(angle) * spawnRadius,
                y: centerY + Math.sin(angle) * spawnRadius,
                targetX: centerX,
                targetY: centerY,
                speed: 2 + Math.random() * 2,
                color: colors[Math.floor(Math.random() * colors.length)]
            };
        }

        function update() {
            circles.forEach(circle => circle.update());

            if (targetCircle) {
                const dx = targetCircle.targetX - targetCircle.x;
                const dy = targetCircle.targetY - targetCircle.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance > 5) {
                    const angle = Math.atan2(dy, dx);
                    targetCircle.x += Math.cos(angle) * targetCircle.speed;
                    targetCircle.y += Math.sin(angle) * targetCircle.speed;
                } else {
                    // 中央に到着
                    lives--;
                    updateHUD();
                    showMessage('Miss!', '#ff0000');
                    targetCircle = null;
                    
                    if (lives <= 0) {
                        gameOver();
                    } else {
                        setTimeout(spawnTarget, 1000);
                    }
                }
            }
        }

        function draw() {
            // 背景
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, width, height);

            // グリッド
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i < width; i += 30) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(width, i);
                ctx.stroke();
            }

            // 円を描く
            circles.forEach(circle => circle.draw());

            // ターゲットを描く
            if (targetCircle) {
                ctx.shadowBlur = 20;
                ctx.shadowColor = targetCircle.color.glow;
                ctx.fillStyle = targetCircle.color.main;
                ctx.beginPath();
                ctx.arc(targetCircle.x, targetCircle.y, 15, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        function handleTap() {
            if (!gameRunning || !targetCircle) return;

            const centerX = width / 2;
            const centerY = height / 2;
            const dx = centerX - targetCircle.x;
            const dy = centerY - targetCircle.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            // どの円に近いかチェック
            let bestCircle = null;
            let bestDiff = Infinity;

            circles.forEach(circle => {
                const diff = Math.abs(distance - circle.radius);
                if (diff < bestDiff) {
                    bestDiff = diff;
                    bestCircle = circle;
                }
            });

            if (bestCircle && bestDiff < 20) {
                // ヒット！
                const now = Date.now();
                if (now - lastTapTime < tapWindow) {
                    combo++;
                } else {
                    combo = 1;
                }
                lastTapTime = now;

                const points = 10 * combo;
                score += points;

                updateHUD();
                showCombo(combo);
                
                if (combo >= 5) {
                    showMessage(`${combo} Combo! +${points}`, '#ff00ff');
                } else {
                    showMessage(`+${points}`, '#00ffff');
                }

                targetCircle = null;
                setTimeout(spawnTarget, 500);
            } else {
                // ミス
                combo = 0;
                updateHUD();
                showMessage('Miss!', '#ff0000');
            }
        }

        function updateHUD() {
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;
            document.getElementById('lives').textContent = lives;
        }

        function showCombo(count) {
            if (count >= 3) {
                const comboDisplay = document.getElementById('comboDisplay');
                comboDisplay.textContent = `${count} COMBO!`;
                comboDisplay.classList.add('show');
                setTimeout(() => comboDisplay.classList.remove('show'), 500);
            }
        }

        function showMessage(text, color) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.style.color = color;
            message.style.textShadow = `0 0 10px ${color}`;
            message.classList.add('show');
            setTimeout(() => message.classList.remove('show'), 800);
        }

        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            
            score = 0;
            combo = 0;
            lives = 3;
            gameRunning = true;
            
            updateHUD();
            initCircles();
            spawnTarget();
            
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('finalScore').textContent = score;
            
            let message = '';
            if (score >= 500) {
                message = '🌟 伝説的なスコア！ 🌟';
            } else if (score >= 300) {
                message = '⭐ 素晴らしい！ ⭐';
            } else if (score >= 100) {
                message = '👍 いい調子！';
            } else {
                message = '💪 もう一度挑戦！';
            }
            document.getElementById('finalMessage').textContent = message;
        }

        function restartGame() {
            startGame();
        }

        function gameLoop() {
            if (!gameRunning) return;

            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // イベントリスナー
        canvas.addEventListener('click', handleTap);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleTap();
        });

        window.addEventListener('resize', resize);
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && gameRunning) {
                handleTap();
            }
        });

        // 初期化
        resize();
    </script>
</body>
</html>
