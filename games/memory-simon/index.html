<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Simon - 記憶ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 20px;
            overflow: hidden;
        }
        #title {
            color: white;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        #info {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            margin-bottom: 30px;
        }
        #game-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            max-width: 350px;
            width: 100%;
        }
        .button {
            aspect-ratio: 1;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .button:active {
            transform: scale(0.95);
        }
        .button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        #red {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
        }
        #red.lit {
            background: linear-gradient(135deg, #ff8585, #ff6b6b);
            box-shadow: 0 0 40px rgba(255, 107, 107, 0.8);
        }
        #blue {
            background: linear-gradient(135deg, #4ecdc4, #3dbdb5);
        }
        #blue.lit {
            background: linear-gradient(135deg, #6eddd4, #4ecdc4);
            box-shadow: 0 0 40px rgba(78, 205, 196, 0.8);
        }
        #yellow {
            background: linear-gradient(135deg, #ffe66d, #ffd93d);
        }
        #yellow.lit {
            background: linear-gradient(135deg, #ffeb8d, #ffe66d);
            box-shadow: 0 0 40px rgba(255, 230, 109, 0.8);
        }
        #green {
            background: linear-gradient(135deg, #95e652, #7ed23f);
        }
        #green.lit {
            background: linear-gradient(135deg, #aef572, #95e652);
            box-shadow: 0 0 40px rgba(149, 230, 82, 0.8);
        }
        #stats {
            display: flex;
            gap: 30px;
            margin-top: 30px;
            color: white;
            font-size: 16px;
        }
        #start-btn {
            margin-top: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
        }
        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.4);
        }
        #start-btn:active {
            transform: scale(0.95);
        }
        #message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 30px 50px;
            border-radius: 20px;
            font-size: 24px;
            z-index: 100;
            display: none;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        #fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-size: 12px;
            transition: all 0.3s;
        }
        #fullscreen:hover {
            background: rgba(255,255,255,0.2);
        }
        @media (max-width: 480px) {
            #title {
                font-size: 22px;
            }
            #game-container {
                gap: 10px;
                max-width: 300px;
            }
            .button {
                border-radius: 15px;
            }
        }
    </style>
</head>
<body>
    <button id="fullscreen" onclick="toggleFullscreen()">全画面</button>
    <h1 id="title">Memory Simon</h1>
    <p id="info">光った順序を覚えて、同じ順序でタップ！</p>
    
    <div id="game-container">
        <button class="button" id="red" data-color="red"></button>
        <button class="button" id="blue" data-color="blue"></button>
        <button class="button" id="yellow" data-color="yellow"></button>
        <button class="button" id="green" data-color="green"></button>
    </div>
    
    <div id="stats">
        <span id="level">レベル: 1</span>
        <span id="score">スコア: 0</span>
    </div>
    
    <button id="start-btn" onclick="startGame()">スタート</button>
    
    <div id="message"></div>

    <script>
        const colors = ['red', 'blue', 'yellow', 'green'];
        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let score = 0;
        let isPlaying = false;
        let isShowingSequence = false;

        const buttons = document.querySelectorAll('.button');
        const levelDisplay = document.getElementById('level');
        const scoreDisplay = document.getElementById('score');
        const messageDiv = document.getElementById('message');
        const startBtn = document.getElementById('start-btn');

        function playSound(color) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            const frequencies = {
                red: 261.63,      // C4
                blue: 329.63,     // E4
                yellow: 392.00,   // G4
                green: 523.25     // C5
            };
            
            oscillator.frequency.value = frequencies[color];
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        function lightUp(color) {
            const button = document.getElementById(color);
            button.classList.add('lit');
            playSound(color);
            setTimeout(() => {
                button.classList.remove('lit');
            }, 300);
        }

        async function showSequence() {
            isShowingSequence = true;
            buttons.forEach(btn => btn.disabled = true);
            startBtn.disabled = true;

            await new Promise(resolve => setTimeout(resolve, 800));

            for (const color of sequence) {
                lightUp(color);
                await new Promise(resolve => setTimeout(resolve, 600));
            }

            isShowingSequence = false;
            buttons.forEach(btn => btn.disabled = false);
            startBtn.disabled = false;
        }

        function addToSequence() {
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            sequence.push(randomColor);
        }

        function checkSequence(index) {
            if (playerSequence[index] === sequence[index]) {
                if (playerSequence.length === sequence.length) {
                    score += level * 10;
                    scoreDisplay.textContent = `スコア: ${score}`;
                    level++;
                    levelDisplay.textContent = `レベル: ${level}`;
                    playerSequence = [];
                    setTimeout(() => {
                        addToSequence();
                        showSequence();
                    }, 1000);
                }
            } else {
                gameOver();
            }
        }

        function gameOver() {
            isPlaying = false;
            showMessage(`ゲームオーバー！\n\n最終レベル: ${level}\nスコア: ${score}`);
            startBtn.textContent = 'もう一度';
        }

        function showMessage(text) {
            messageDiv.textContent = text;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }

        function startGame() {
            sequence = [];
            playerSequence = [];
            level = 1;
            score = 0;
            isPlaying = true;
            
            levelDisplay.textContent = `レベル: ${level}`;
            scoreDisplay.textContent = `スコア: ${score}`;
            startBtn.textContent = 'プレイ中...';
            startBtn.disabled = true;

            addToSequence();
            showSequence();
        }

        buttons.forEach(button => {
            button.addEventListener('click', () => {
                if (!isPlaying || isShowingSequence) return;
                
                const color = button.dataset.color;
                playerSequence.push(color);
                lightUp(color);
                
                checkSequence(playerSequence.length - 1);
            });

            // タッチ対応
            button.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (!isPlaying || isShowingSequence) return;
                
                const color = button.dataset.color;
                playerSequence.push(color);
                lightUp(color);
                
                checkSequence(playerSequence.length - 1);
            });
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (!isPlaying || isShowingSequence) return;
            
            const keyMap = {
                'q': 'red',
                'w': 'blue',
                'a': 'yellow',
                's': 'green'
            };
            
            const color = keyMap[e.key.toLowerCase()];
            if (color) {
                playerSequence.push(color);
                lightUp(color);
                checkSequence(playerSequence.length - 1);
            }
        });
    </script>
</body>
</html>
