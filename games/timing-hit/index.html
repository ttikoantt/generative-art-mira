<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timing Hit - Mira's Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 800px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
        }

        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .score-display {
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .lives-display {
            display: flex;
            gap: 5px;
        }

        .heart {
            width: 25px;
            height: 25px;
            background: #ff4757;
            clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 50% 80%, 18% 100%, 0% 38%);
        }

        .heart.lost {
            opacity: 0.2;
        }

        .game-area {
            width: 100%;
            height: 100%;
            position: relative;
            cursor: pointer;
        }

        .target {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            cursor: pointer;
            animation: appear 0.3s ease-out, pulse 1s ease-in-out infinite;
        }

        @keyframes appear {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .target-hit {
            animation: hit 0.3s ease-out forwards;
        }

        @keyframes hit {
            to {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }

        .overlay h1 {
            font-size: 48px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay p {
            font-size: 18px;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .overlay .final-score {
            font-size: 64px;
            font-weight: bold;
            margin: 20px 0;
            color: #ffd700;
        }

        .btn {
            padding: 15px 40px;
            font-size: 18px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: bold;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .combo-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 64px;
            font-weight: bold;
            color: #ffd700;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
        }

        .combo-display.show {
            animation: comboPop 0.5s ease-out;
        }

        @keyframes comboPop {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            20% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1) translateY(-50px);
            }
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .difficulty-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <div class="header">
            <div class="score-display">スコア: <span id="score">0</span></div>
            <div class="lives-display" id="lives">
                <div class="heart"></div>
                <div class="heart"></div>
                <div class="heart"></div>
            </div>
        </div>

        <div class="game-area" id="gameArea"></div>

        <div class="combo-display" id="comboDisplay"></div>

        <div class="overlay" id="startOverlay">
            <h1>Timing Hit</h1>
            <p>ターゲットが出現したらタップ！</p>
            <p style="font-size: 14px; margin-bottom: 30px;">時間内にタップしないとライフが減ります</p>
            <button class="btn" onclick="startGame()">スタート</button>
        </div>

        <div class="overlay" id="gameOverOverlay" style="display: none;">
            <h1>ゲームオーバー</h1>
            <p>最終スコア</p>
            <div class="final-score" id="finalScore">0</div>
            <button class="btn" onclick="startGame()">もう一度</button>
        </div>

        <div class="difficulty-info">難易度: <span id="difficulty">1</span></div>
    </div>

    <script>
        const gameArea = document.getElementById('gameArea');
        const scoreDisplay = document.getElementById('score');
        const livesDisplay = document.getElementById('lives');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScoreDisplay = document.getElementById('finalScore');
        const comboDisplay = document.getElementById('comboDisplay');
        const difficultyDisplay = document.getElementById('difficulty');

        let score = 0;
        let lives = 3;
        let combo = 0;
        let gameActive = false;
        let currentTarget = null;
        let targetTimer = null;
        let difficulty = 1;
        let spawnTime = 2000;
        let targetLifetime = 2000;

        const colors = [
            'linear-gradient(45deg, #ff6b6b, #ff8e8e)',
            'linear-gradient(45deg, #4ecdc4, #7eddd6)',
            'linear-gradient(45deg, #ffd93d, #ffe5a3)',
            'linear-gradient(45deg, #a8e6cf, #c7f0db)',
            'linear-gradient(45deg, #ff8b94, #ffa8b0)',
            'linear-gradient(45deg, #9b59b6, #bb7bd4)'
        ];

        function updateScore(points) {
            score += points;
            scoreDisplay.textContent = score;
        }

        function updateLives() {
            const hearts = livesDisplay.querySelectorAll('.heart');
            hearts.forEach((heart, index) => {
                if (index >= lives) {
                    heart.classList.add('lost');
                } else {
                    heart.classList.remove('lost');
                }
            });
        }

        function showCombo() {
            if (combo >= 3) {
                comboDisplay.textContent = `${combo} Combo!`;
                comboDisplay.classList.remove('show');
                void comboDisplay.offsetWidth; // Trigger reflow
                comboDisplay.classList.add('show');
            }
        }

        function createTarget() {
            if (!gameActive) return;

            const target = document.createElement('div');
            target.className = 'target';

            const size = Math.max(60 - difficulty * 2, 30);
            const maxX = gameArea.clientWidth - size;
            const maxY = gameArea.clientHeight - size;

            target.style.width = `${size}px`;
            target.style.height = `${size}px`;
            target.style.left = `${Math.random() * maxX}px`;
            target.style.top = `${Math.random() * maxY}px`;
            target.style.background = colors[Math.floor(Math.random() * colors.length)];

            target.onclick = (e) => {
                e.stopPropagation();
                hitTarget(target);
            };

            gameArea.appendChild(target);
            currentTarget = target;

            // ターゲットが消えるタイマー
            const lifetime = Math.max(targetLifetime - difficulty * 100, 800);
            targetTimer = setTimeout(() => {
                if (target && target.parentNode) {
                    target.remove();
                    missTarget();
                }
            }, lifetime);

            // 次のターゲットの生成タイミング
            const nextSpawn = Math.max(spawnTime - difficulty * 100, 500);
            setTimeout(createTarget, nextSpawn);
        }

        function hitTarget(target) {
            if (!gameActive) return;

            clearTimeout(targetTimer);

            // ヒットアニメーション
            target.classList.add('target-hit');
            setTimeout(() => {
                if (target && target.parentNode) {
                    target.remove();
                }
            }, 300);

            combo++;

            // コンボボーナス
            const basePoints = 10;
            const comboBonus = Math.min(combo * 5, 100);
            const points = basePoints + comboBonus;
            updateScore(points);

            showCombo();

            // 難易度上昇
            if (score > 0 && score % 100 === 0) {
                difficulty = Math.min(difficulty + 1, 15);
                difficultyDisplay.textContent = difficulty;
            }
        }

        function missTarget() {
            if (!gameActive) return;

            combo = 0;
            lives--;
            updateLives();

            if (lives <= 0) {
                endGame();
            }
        }

        function startGame() {
            score = 0;
            lives = 3;
            combo = 0;
            difficulty = 1;
            spawnTime = 2000;
            targetLifetime = 2000;

            updateScore(0);
            updateLives();
            difficultyDisplay.textContent = difficulty;

            // クリア
            gameArea.innerHTML = '';

            startOverlay.style.display = 'none';
            gameOverOverlay.style.display = 'none';

            gameActive = true;

            setTimeout(createTarget, 1000);
        }

        function endGame() {
            gameActive = false;

            if (currentTarget && currentTarget.parentNode) {
                currentTarget.remove();
            }

            finalScoreDisplay.textContent = score;
            gameOverOverlay.style.display = 'flex';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ゲームエリア外をクリックした時のペナルティ
        gameArea.addEventListener('click', () => {
            if (gameActive && currentTarget) {
                // ペナルティなし、単にスルー
            }
        });
    </script>
</body>
</html>
