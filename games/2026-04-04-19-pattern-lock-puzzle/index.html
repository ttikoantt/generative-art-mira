<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Lock Puzzle - パターンロックパズル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Arial', sans-serif;
            touch-action: none;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .title {
            color: #fff;
            font-size: 24px;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
        }
        .game-area {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        .pattern-display {
            width: 300px;
            height: 300px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            padding: 10px;
        }
        .dot {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .dot.active {
            background: rgba(100, 200, 255, 0.5);
            transform: scale(1.1);
        }
        .dot.correct {
            background: rgba(100, 255, 100, 0.5);
        }
        .dot.wrong {
            background: rgba(255, 100, 100, 0.5);
        }
        .dot::after {
            content: '';
            width: 30%;
            height: 30%;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-bottom: 15px;
        }
        .stat {
            text-align: center;
            color: #fff;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
        }
        .stat-label {
            font-size: 12px;
            opacity: 0.7;
        }
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        button {
            padding: 12px 24px;
            background: rgba(100, 200, 255, 0.3);
            border: 1px solid rgba(100, 200, 255, 0.5);
            color: white;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            background: rgba(100, 200, 255, 0.5);
        }
        button:active {
            transform: scale(0.95);
        }
        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .message.show {
            opacity: 1;
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 14px;
            cursor: pointer;
            border-radius: 5px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 100;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .instructions {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            text-align: center;
            margin-top: 15px;
            line-height: 1.5;
        }
        @media (max-width: 480px) {
            .pattern-display {
                width: 250px;
                height: 250px;
            }
            .title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    
    <div class="container">
        <div class="title">🔐 Pattern Lock Puzzle</div>
        <div class="subtitle">パターンを覚えて再現しよう！</div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="level">1</div>
                <div class="stat-label">レベル</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">スコア</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="lives">3</div>
                <div class="stat-label">ライフ</div>
            </div>
        </div>

        <div class="game-area">
            <div class="pattern-display" id="patternDisplay">
                <!-- Dots will be generated by JS -->
            </div>
            <div class="message" id="message"></div>
        </div>

        <div class="buttons">
            <button onclick="startGame()">スタート</button>
            <button onclick="skipLevel()">スキップ</button>
        </div>

        <div class="instructions">
            パターンが表示されるので覚えよう！<br>
            表示中にタップして暗記し、入力フェーズで再現しよう
        </div>
    </div>

    <script>
        const patternDisplay = document.getElementById('patternDisplay');
        const messageEl = document.getElementById('message');
        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');

        let level = 1;
        let score = 0;
        let lives = 3;
        let pattern = [];
        let playerPattern = [];
        let isShowingPattern = false;
        let canInput = false;

        // Initialize dots
        function initDots() {
            patternDisplay.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.dataset.index = i;
                dot.addEventListener('click', () => handleDotClick(i));
                dot.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    handleDotClick(i);
                });
                patternDisplay.appendChild(dot);
            }
        }

        // Generate pattern based on level
        function generatePattern() {
            const length = Math.min(3 + Math.floor(level / 2), 9);
            pattern = [];
            const used = new Set();
            
            while (pattern.length < length) {
                const index = Math.floor(Math.random() * 9);
                if (!used.has(index)) {
                    used.add(index);
                    pattern.push(index);
                }
            }
        }

        // Show pattern to player
        async function showPattern() {
            isShowingPattern = true;
            canInput = false;
            playerPattern = [];
            
            // Clear all dots
            document.querySelectorAll('.dot').forEach(dot => {
                dot.classList.remove('active', 'correct', 'wrong');
            });

            await delay(500);

            // Show pattern
            for (let i = 0; i < pattern.length; i++) {
                const dot = document.querySelector(`[data-index="${pattern[i]}"]`);
                dot.classList.add('active');
                await delay(400);
                if (i < pattern.length - 1) {
                    dot.classList.remove('active');
                    await delay(100);
                }
            }

            await delay(800);

            // Hide pattern
            document.querySelectorAll('.dot').forEach(dot => {
                dot.classList.remove('active');
            });

            isShowingPattern = false;
            canInput = true;
            showMessage('あなたの番！');
            await delay(1000);
            hideMessage();
        }

        // Handle dot click
        function handleDotClick(index) {
            if (!canInput || isShowingPattern) return;
            
            const dot = document.querySelector(`[data-index="${index}"]`);
            
            // Don't allow same dot twice in a row
            if (playerPattern.length > 0 && playerPattern[playerPattern.length - 1] === index) {
                return;
            }

            // Don't allow repeating same dot in pattern
            if (playerPattern.includes(index)) {
                return;
            }

            playerPattern.push(index);
            dot.classList.add('active');

            // Check if wrong
            if (playerPattern[playerPattern.length - 1] !== pattern[playerPattern.length - 1]) {
                canInput = false;
                dot.classList.remove('active');
                dot.classList.add('wrong');
                showMessage('違う！');
                lives--;
                livesEl.textContent = lives;
                
                setTimeout(() => {
                    if (lives <= 0) {
                        gameOver();
                    } else {
                        retryLevel();
                    }
                }, 1500);
                return;
            }

            // Check if complete
            if (playerPattern.length === pattern.length) {
                canInput = false;
                document.querySelectorAll('.dot.active').forEach(d => {
                    d.classList.add('correct');
                });
                showMessage('正解！🎉');
                score += level * 10;
                scoreEl.textContent = score;
                
                setTimeout(() => {
                    nextLevel();
                }, 1500);
            }
        }

        // Next level
        function nextLevel() {
            level++;
            levelEl.textContent = level;
            startGame();
        }

        // Retry level
        function retryLevel() {
            hideMessage();
            document.querySelectorAll('.dot').forEach(dot => {
                dot.classList.remove('active', 'correct', 'wrong');
            });
            showPattern();
        }

        // Skip level (penalty: lose 1 life)
        function skipLevel() {
            if (isShowingPattern) return;
            lives--;
            livesEl.textContent = lives;
            
            if (lives <= 0) {
                gameOver();
            } else {
                showMessage('スキップ（-1ライフ）');
                setTimeout(() => {
                    nextLevel();
                }, 1000);
            }
        }

        // Game over
        function gameOver() {
            canInput = false;
            showMessage(`ゲームオーバー！\nスコア: ${score}`);
            
            setTimeout(() => {
                if (confirm(`ゲームオーバー！\nスコア: ${score}\nもう一度プレイしますか？`)) {
                    resetGame();
                }
            }, 2000);
        }

        // Reset game
        function resetGame() {
            level = 1;
            score = 0;
            lives = 3;
            levelEl.textContent = level;
            scoreEl.textContent = score;
            livesEl.textContent = lives;
            startGame();
        }

        // Start game
        function startGame() {
            if (isShowingPattern) return;
            generatePattern();
            showPattern();
        }

        // Show message
        function showMessage(text) {
            messageEl.textContent = text;
            messageEl.classList.add('show');
        }

        // Hide message
        function hideMessage() {
            messageEl.classList.remove('show');
        }

        // Delay helper
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        initDots();
    </script>
</body>
</html>
