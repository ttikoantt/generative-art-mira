<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Classic</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 3rem);
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d4ff, #9b59b6, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4 / 3;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.3);
            border: 2px solid rgba(0, 212, 255, 0.3);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: bold;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.8);
        }

        .score-player {
            color: #00d4ff;
        }

        .score-cpu {
            color: #ff6b9d;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            background: linear-gradient(45deg, #00d4ff, #9b59b6);
            color: white;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            margin-top: 20px;
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .start-screen h2 {
            font-size: clamp(1.5rem, 5vw, 3rem);
            margin-bottom: 30px;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.8);
        }

        .start-screen button {
            font-size: 1.2rem;
            padding: 15px 40px;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .difficulty {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .difficulty-btn {
            padding: 8px 16px;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .difficulty-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .difficulty-btn.active {
            background: linear-gradient(45deg, #00d4ff, #9b59b6);
            border-color: transparent;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 600px) {
            .controls {
                flex-direction: column;
                width: 100%;
            }

            button {
                width: 100%;
            }

            .info {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <h1>🏓 Pong Classic</h1>

    <div class="game-container">
        <button class="fullscreen-btn" id="fullscreenBtn">⛶ 全画面</button>

        <div class="score">
            <span class="score-player" id="playerScore">0</span>
            <span class="score-cpu" id="cpuScore">0</span>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div class="start-screen" id="startScreen">
            <h2>🏓 Pong Classic</h2>
            <button id="startBtn">▶ ゲームスタート</button>
            <div class="difficulty">
                <button class="difficulty-btn active" data-difficulty="easy">かんたん</button>
                <button class="difficulty-btn" data-difficulty="medium">ふつう</button>
                <button class="difficulty-btn" data-difficulty="hard">むずかしい</button>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="restartBtn">🔄 リスタート</button>
    </div>

    <div class="info">
        <p>⌨️ PC: マウスでパドルを操作 | W/Sキーでも操作可能</p>
        <p>📱 モバイル: 画面をタップ・スワイプして操作</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const playerScoreEl = document.getElementById('playerScore');
        const cpuScoreEl = document.getElementById('cpuScore');
        const difficultyBtns = document.querySelectorAll('.difficulty-btn');

        let animationId;
        let gameRunning = false;
        let difficulty = 'easy';

        // Game settings
        const settings = {
            easy: { cpuSpeed: 3, cpuReaction: 0.02 },
            medium: { cpuSpeed: 5, cpuReaction: 0.05 },
            hard: { cpuSpeed: 7, cpuReaction: 0.1 }
        };

        // Canvas size
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth * window.devicePixelRatio;
            canvas.height = container.clientHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game objects
        const paddleWidth = 12;
        const paddleHeight = 80;
        const ballSize = 12;

        const player = {
            x: 20,
            y: 0,
            width: paddleWidth,
            height: paddleHeight,
            score: 0,
            color: '#00d4ff'
        };

        const cpu = {
            x: 0,
            y: 0,
            width: paddleWidth,
            height: paddleHeight,
            score: 0,
            speed: settings.easy.cpuSpeed,
            color: '#ff6b9d'
        };

        const ball = {
            x: 0,
            y: 0,
            size: ballSize,
            speedX: 6,
            speedY: 6,
            color: '#fff'
        };

        let mouseY = 0;

        // Initialize positions
        function initGame() {
            const width = canvas.width / window.devicePixelRatio;
            const height = canvas.height / window.devicePixelRatio;

            player.y = height / 2 - paddleHeight / 2;
            cpu.x = width - 20 - paddleWidth;
            cpu.y = height / 2 - paddleHeight / 2;
            ball.x = width / 2;
            ball.y = height / 2;
            ball.speedX = 6 * (Math.random() > 0.5 ? 1 : -1);
            ball.speedY = 6 * (Math.random() > 0.5 ? 1 : -1);

            cpu.speed = settings[difficulty].cpuSpeed;
        }

        // Draw functions
        function drawRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.shadowColor = color;
            ctx.shadowBlur = 15;
            ctx.fillRect(x, y, w, h);
            ctx.shadowBlur = 0;
        }

        function drawBall(x, y, size, color) {
            ctx.fillStyle = color;
            ctx.shadowColor = color;
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(x, y, size / 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawNet() {
            const width = canvas.width / window.devicePixelRatio;
            const height = canvas.height / window.devicePixelRatio;

            ctx.setLineDash([10, 10]);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(width / 2, 0);
            ctx.lineTo(width / 2, height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Update game
        function update() {
            if (!gameRunning) return;

            const width = canvas.width / window.devicePixelRatio;
            const height = canvas.height / window.devicePixelRatio;

            // Move player paddle
            const targetY = mouseY - paddleHeight / 2;
            player.y += (targetY - player.y) * 0.2;
            player.y = Math.max(0, Math.min(height - paddleHeight, player.y));

            // Move CPU paddle
            const cpuCenter = cpu.y + paddleHeight / 2;
            const ballCenter = ball.y;
            const diff = ballCenter - cpuCenter;

            if (Math.abs(diff) > 5) {
                cpu.y += Math.sign(diff) * Math.min(Math.abs(diff) * settings[difficulty].cpuReaction, cpu.speed);
            }
            cpu.y = Math.max(0, Math.min(height - paddleHeight, cpu.y));

            // Move ball
            ball.x += ball.speedX;
            ball.y += ball.speedY;

            // Ball collision with top/bottom
            if (ball.y <= ball.size / 2 || ball.y >= height - ball.size / 2) {
                ball.speedY *= -1;
                ball.y = ball.y <= ball.size / 2 ? ball.size / 2 : height - ball.size / 2;
            }

            // Ball collision with paddles
            if (ball.x - ball.size / 2 <= player.x + player.width &&
                ball.y >= player.y && ball.y <= player.y + player.height) {
                ball.speedX = Math.abs(ball.speedX) * 1.05;
                ball.speedX = Math.min(ball.speedX, 15);
                const hitPos = (ball.y - player.y) / paddleHeight;
                ball.speedY = (hitPos - 0.5) * 10;
            }

            if (ball.x + ball.size / 2 >= cpu.x &&
                ball.y >= cpu.y && ball.y <= cpu.y + cpu.height) {
                ball.speedX = -Math.abs(ball.speedX) * 1.05;
                ball.speedX = Math.max(ball.speedX, -15);
                const hitPos = (ball.y - cpu.y) / paddleHeight;
                ball.speedY = (hitPos - 0.5) * 10;
            }

            // Score
            if (ball.x < 0) {
                cpu.score++;
                cpuScoreEl.textContent = cpu.score;
                resetBall();
            } else if (ball.x > width) {
                player.score++;
                playerScoreEl.textContent = player.score;
                resetBall();
            }
        }

        function resetBall() {
            const width = canvas.width / window.devicePixelRatio;
            const height = canvas.height / window.devicePixelRatio;

            ball.x = width / 2;
            ball.y = height / 2;
            ball.speedX = 6 * (Math.random() > 0.5 ? 1 : -1);
            ball.speedY = 6 * (Math.random() > 0.5 ? 1 : -1);
        }

        // Draw game
        function draw() {
            const width = canvas.width / window.devicePixelRatio;
            const height = canvas.height / window.devicePixelRatio;

            // Clear
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // Draw net
            drawNet();

            // Draw paddles
            drawRect(player.x, player.y, player.width, player.height, player.color);
            drawRect(cpu.x, cpu.y, cpu.width, cpu.height, cpu.color);

            // Draw ball
            drawBall(ball.x, ball.y, ball.size, ball.color);
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        // Event listeners
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseY = (e.clientY - rect.top) * (canvas.height / window.devicePixelRatio / rect.height);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            mouseY = (e.touches[0].clientY - rect.top) * (canvas.height / window.devicePixelRatio / rect.height);
        });

        document.addEventListener('keydown', (e) => {
            const height = canvas.height / window.devicePixelRatio;
            const speed = 20;

            if (e.key === 'w' || e.key === 'W') {
                mouseY = Math.max(0, mouseY - speed);
            } else if (e.key === 's' || e.key === 'S') {
                mouseY = Math.min(height, mouseY + speed);
            }
        });

        startBtn.addEventListener('click', () => {
            startScreen.classList.add('hidden');
            gameRunning = true;
            initGame();
        });

        restartBtn.addEventListener('click', () => {
            player.score = 0;
            cpu.score = 0;
            playerScoreEl.textContent = '0';
            cpuScoreEl.textContent = '0';
            initGame();
        });

        fullscreenBtn.addEventListener('click', () => {
            const container = document.querySelector('.game-container');
            if (document.fullscreenElement) {
                document.exitFullscreen();
                fullscreenBtn.textContent = '⛶ 全画面';
            } else {
                container.requestFullscreen();
                fullscreenBtn.textContent = '⛶ 退出';
            }
        });

        difficultyBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                difficultyBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                difficulty = btn.dataset.difficulty;
            });
        });

        // Initialize
        initGame();
        mouseY = canvas.height / window.devicePixelRatio / 2;
        gameLoop();
    </script>
</body>
</html>
