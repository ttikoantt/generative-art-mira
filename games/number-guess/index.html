<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guess Challenge - 数当てチャレンジ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 25px;
            font-size: 1.1em;
        }

        .game-info {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .game-info p {
            color: #333;
            font-size: 1.1em;
            margin: 5px 0;
        }

        .game-info strong {
            color: #667eea;
        }

        .input-section {
            margin-bottom: 20px;
        }

        input[type="number"] {
            width: 150px;
            padding: 15px;
            font-size: 1.5em;
            text-align: center;
            border: 3px solid #ddd;
            border-radius: 10px;
            margin-right: 10px;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .message {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 10px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message.too-high {
            background: #ffedea;
            color: #e74c3c;
        }

        .message.too-low {
            background: #eaf4ff;
            color: #3498db;
        }

        .message.correct {
            background: #d5f4e6;
            color: #27ae60;
        }

        .message.default {
            background: #f5f7fa;
            color: #666;
        }

        .history {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .history h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .history-item {
            background: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .history-item.high {
            border: 2px solid #e74c3c;
            color: #e74c3c;
        }

        .history-item.low {
            border: 2px solid #3498db;
            color: #3498db;
        }

        .new-game {
            margin-top: 15px;
            background: linear-gradient(45deg, #f093fb, #f5576c);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.5em;
            }

            .input-section {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            input[type="number"] {
                width: 100%;
                margin-right: 0;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🔢 Number Guess Challenge</h1>
        <p class="subtitle">1から100の数を当てよう！</p>

        <div class="game-info">
            <p>挑戦回数: <strong id="attempts">0</strong></p>
            <p>ベストスコア: <strong id="bestScore">-</strong></p>
        </div>

        <div class="message default" id="message">
            1から100の数を入力してね！
        </div>

        <div class="input-section">
            <input type="number" id="guess" min="1" max="100" placeholder="?">
            <button id="submitBtn">予想！</button>
        </div>

        <div class="history" id="history" style="display: none;">
            <h3>予想履歴</h3>
            <div class="history-list" id="historyList"></div>
        </div>

        <button class="new-game" id="newGameBtn" style="display: none;">新しいゲーム</button>
    </div>

    <script>
        let targetNumber;
        let attempts;
        let historyList;
        let bestScore = localStorage.getItem('numberGuessBestScore') || null;

        const messageEl = document.getElementById('message');
        const guessInput = document.getElementById('guess');
        const submitBtn = document.getElementById('submitBtn');
        const attemptsEl = document.getElementById('attempts');
        const bestScoreEl = document.getElementById('bestScore');
        const historyEl = document.getElementById('history');
        const historyListEl = document.getElementById('historyList');
        const newGameBtn = document.getElementById('newGameBtn');

        function updateBestScore() {
            bestScoreEl.textContent = bestScore ? bestScore : '-';
        }

        function startNewGame() {
            targetNumber = Math.floor(Math.random() * 100) + 1;
            attempts = 0;
            historyList = [];

            attemptsEl.textContent = '0';
            guessInput.value = '';
            guessInput.disabled = false;
            submitBtn.disabled = false;
            
            messageEl.textContent = '1から100の数を入力してね！';
            messageEl.className = 'message default';
            
            historyEl.style.display = 'none';
            historyListEl.innerHTML = '';
            newGameBtn.style.display = 'none';
            
            guessInput.focus();
            updateBestScore();
        }

        function makeGuess() {
            const guess = parseInt(guessInput.value);

            if (isNaN(guess) || guess < 1 || guess > 100) {
                messageEl.textContent = '1から100の数を入力してね！';
                messageEl.className = 'message default';
                return;
            }

            attempts++;
            attemptsEl.textContent = attempts;

            historyList.push(guess);
            updateHistory();

            if (guess === targetNumber) {
                messageEl.textContent = `🎉 正解！答えは ${targetNumber} でした！(${attempts}回目)`;
                messageEl.className = 'message correct';
                endGame();
            } else if (guess > targetNumber) {
                messageEl.textContent = '📉 もっと小さい数だよ！';
                messageEl.className = 'message too-high';
            } else {
                messageEl.textContent = '📈 もっと大きい数だよ！';
                messageEl.className = 'message too-low';
            }

            guessInput.value = '';
            guessInput.focus();
        }

        function updateHistory() {
            historyEl.style.display = 'block';
            historyListEl.innerHTML = '';

            historyList.forEach(num => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.textContent = num;

                if (num > targetNumber) {
                    item.classList.add('high');
                    item.textContent += ' ↓';
                } else if (num < targetNumber) {
                    item.classList.add('low');
                    item.textContent += ' ↑';
                }

                historyListEl.appendChild(item);
            });
        }

        function endGame() {
            guessInput.disabled = true;
            submitBtn.disabled = true;
            newGameBtn.style.display = 'inline-block';

            if (!bestScore || attempts < bestScore) {
                bestScore = attempts;
                localStorage.setItem('numberGuessBestScore', bestScore);
                updateBestScore();
                messageEl.textContent += ' 🏆 新記録！';
            }
        }

        submitBtn.addEventListener('click', makeGuess);
        newGameBtn.addEventListener('click', startNewGame);

        guessInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                makeGuess();
            }
        });

        // Start the game
        startNewGame();
    </script>
</body>
</html>
