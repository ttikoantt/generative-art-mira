<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gravity Switcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16/9;
            background: #0a0a1a;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 217, 255, 0.3);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.7) 0%, transparent 100%);
            pointer-events: none;
        }

        .score-display {
            font-size: 1.5rem;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.8);
            font-weight: bold;
        }

        .gravity-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            font-size: 1rem;
        }

        .gravity-arrow {
            font-size: 1.5rem;
            transition: transform 0.3s ease;
        }

        .gravity-arrow.up {
            transform: rotate(0deg);
            color: #ff6b6b;
        }

        .gravity-arrow.down {
            transform: rotate(180deg);
            color: #4ecdc4;
        }

        .game-over-screen, .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 10;
        }

        .game-over-screen.hidden, .start-screen.hidden {
            display: none;
        }

        .game-title {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 10px;
        }

        .final-score {
            font-size: 3rem;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.8);
        }

        .instructions {
            color: #aaa;
            text-align: center;
            font-size: 0.9rem;
            max-width: 300px;
            line-height: 1.5;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 217, 255, 0.6);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .gravity-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border: 4px solid #fff;
            font-size: 2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
            transition: all 0.2s ease;
            z-index: 5;
        }

        .gravity-btn:active {
            transform: translateX(-50%) scale(0.95);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 217, 255, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .game-title {
                font-size: 1.8rem;
            }

            .final-score {
                font-size: 2.5rem;
            }

            .gravity-btn {
                width: 70px;
                height: 70px;
                font-size: 1.5rem;
            }

            .score-display {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>

        <div class="ui-overlay">
            <div class="score-display">Score: <span id="score">0</span></div>
            <div class="gravity-indicator">
                <span class="gravity-arrow down" id="gravityArrow">⬇</span>
            </div>
        </div>

        <div class="start-screen" id="startScreen">
            <h1 class="game-title">🌌 Gravity Switcher</h1>
            <p class="instructions">
                障害物を避けながらスコアを稼ごう！<br>
                タップで重力の向きを反転<br>
                PC: スペースキー / モバイル: 画面下部のボタン
            </p>
            <button class="btn" onclick="startGame()">スタート</button>
        </div>

        <div class="game-over-screen hidden" id="gameOverScreen">
            <h1 class="game-title">ゲームオーバー</h1>
            <div class="final-score" id="finalScore">0</div>
            <p class="instructions" id="highScoreDisplay">ハイスコア: 0</p>
            <button class="btn" onclick="startGame()">もう一度</button>
        </div>

        <button class="gravity-btn" id="gravityBtn">⇅</button>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game state
        let gameState = 'start'; // start, playing, gameover
        let score = 0;
        let highScore = localStorage.getItem('gravitySwitcherHighScore') || 0;
        let gravity = 1; // 1 = down, -1 = up
        let gameSpeed = 3;
        let frameCount = 0;

        // Player
        const player = {
            x: 100,
            y: 0,
            width: 30,
            height: 30,
            velocity: 0,
            gravity: 0.5,
            jumpStrength: -8,
            grounded: false
        };

        // Obstacles
        let obstacles = [];
        const obstacleWidth = 40;
        const gapHeight = 180;

        // Particles
        let particles = [];

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            player.y = canvas.height / 2;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function startGame() {
            gameState = 'playing';
            score = 0;
            gameSpeed = 3;
            gravity = 1;
            obstacles = [];
            particles = [];
            player.y = canvas.height / 2;
            player.velocity = 0;
            frameCount = 0;

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('score').textContent = score;
            updateGravityIndicator();

            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameState = 'gameover';

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('gravitySwitcherHighScore', highScore);
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('highScoreDisplay').textContent = `ハイスコア: ${highScore}`;
            document.getElementById('gameOverScreen').classList.remove('hidden');

            // Explosion effect
            createExplosion(player.x + player.width / 2, player.y + player.height / 2);
        }

        function switchGravity() {
            if (gameState !== 'playing') return;

            gravity *= -1;
            player.velocity = gravity * -8;
            player.grounded = false;

            createParticles(player.x + player.width / 2, player.y + player.height / 2, 10);
            updateGravityIndicator();
        }

        function updateGravityIndicator() {
            const arrow = document.getElementById('gravityArrow');
            if (gravity === 1) {
                arrow.textContent = '⬇';
                arrow.className = 'gravity-arrow down';
            } else {
                arrow.textContent = '⬆';
                arrow.className = 'gravity-arrow up';
            }
        }

        function createParticles(x, y, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1,
                    color: gravity === 1 ? '#4ecdc4' : '#ff6b6b'
                });
            }
        }

        function createExplosion(x, y) {
            for (let i = 0; i < 30; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15,
                    life: 1,
                    color: '#ff6b6b'
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;

                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3 * p.life, 0, Math.PI * 2);
                ctx.fillStyle = p.color + Math.floor(p.life * 255).toString(16).padStart(2, '0');
                ctx.fill();
            });
        }

        function spawnObstacle() {
            const minHeight = 50;
            const maxHeight = canvas.height - gapHeight - minHeight;
            const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;

            obstacles.push({
                x: canvas.width,
                topHeight: topHeight,
                bottomY: topHeight + gapHeight,
                passed: false
            });
        }

        function update() {
            // Update player
            player.velocity += player.gravity * gravity;
            player.y += player.velocity;

            // Boundary check
            if (player.y < 0) {
                player.y = 0;
                player.velocity = 0;
            }
            if (player.y + player.height > canvas.height) {
                player.y = canvas.height - player.height;
                player.velocity = 0;
            }

            // Spawn obstacles
            if (frameCount % 120 === 0) {
                spawnObstacle();
            }

            // Update obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.x -= gameSpeed;

                // Check collision
                if (player.x < obs.x + obstacleWidth &&
                    player.x + player.width > obs.x &&
                    (player.y < obs.topHeight || player.y + player.height > obs.bottomY)) {
                    gameOver();
                    return;
                }

                // Score
                if (!obs.passed && player.x > obs.x + obstacleWidth) {
                    obs.passed = true;
                    score++;
                    document.getElementById('score').textContent = score;

                    // Increase difficulty
                    if (score % 5 === 0) {
                        gameSpeed += 0.3;
                    }
                }

                // Remove off-screen obstacles
                if (obs.x + obstacleWidth < 0) {
                    obstacles.splice(i, 1);
                }
            }

            updateParticles();
            frameCount++;
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw stars background
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            for (let i = 0; i < 50; i++) {
                const x = (i * 17 + frameCount * 0.5) % canvas.width;
                const y = (i * 23) % canvas.height;
                ctx.beginPath();
                ctx.arc(x, y, 1, 0, Math.PI * 2);
                ctx.fill();
            }

            // Draw obstacles
            obstacles.forEach(obs => {
                // Top obstacle
                const gradient1 = ctx.createLinearGradient(obs.x, 0, obs.x + obstacleWidth, 0);
                gradient1.addColorStop(0, '#ff6b6b');
                gradient1.addColorStop(1, '#ee5a5a');
                ctx.fillStyle = gradient1;
                ctx.fillRect(obs.x, 0, obstacleWidth, obs.topHeight);

                // Bottom obstacle
                const gradient2 = ctx.createLinearGradient(obs.x, 0, obs.x + obstacleWidth, 0);
                gradient2.addColorStop(0, '#4ecdc4');
                gradient2.addColorStop(1, '#44b3ab');
                ctx.fillStyle = gradient2;
                ctx.fillRect(obs.x, obs.bottomY, obstacleWidth, canvas.height - obs.bottomY);

                // Glow effect
                ctx.shadowColor = gravity === 1 ? '#4ecdc4' : '#ff6b6b';
                ctx.shadowBlur = 10;
            });
            ctx.shadowBlur = 0;

            // Draw player
            const playerGradient = ctx.createRadialGradient(
                player.x + player.width / 2, player.y + player.height / 2, 0,
                player.x + player.width / 2, player.y + player.height / 2, player.width
            );
            playerGradient.addColorStop(0, '#ffffff');
            playerGradient.addColorStop(0.5, gravity === 1 ? '#4ecdc4' : '#ff6b6b');
            playerGradient.addColorStop(1, 'transparent');
            
            ctx.beginPath();
            ctx.arc(player.x + player.width / 2, player.y + player.height / 2, player.width / 2, 0, Math.PI * 2);
            ctx.fillStyle = playerGradient;
            ctx.fill();

            // Player trail
            ctx.beginPath();
            ctx.arc(player.x + player.width / 2 - 10, player.y + player.height / 2, player.width / 3, 0, Math.PI * 2);
            ctx.fillStyle = (gravity === 1 ? 'rgba(78, 205, 196, ' : 'rgba(255, 107, 107, ') + '0.3)';
            ctx.fill();

            // Draw particles
            drawParticles();
        }

        function gameLoop() {
            if (gameState !== 'playing') return;

            update();
            draw();

            if (gameState === 'playing') {
                requestAnimationFrame(gameLoop);
            }
        }

        // Controls
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState === 'playing') {
                    switchGravity();
                } else if (gameState !== 'playing') {
                    startGame();
                }
            }
        });

        document.getElementById('gravityBtn').addEventListener('click', (e) => {
            e.preventDefault();
            if (gameState === 'playing') {
                switchGravity();
            }
        });

        document.getElementById('gravityBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameState === 'playing') {
                switchGravity();
            }
        });

        // Touch controls
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameState === 'playing') {
                switchGravity();
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initial draw
        draw();
    </script>
</body>
</html>
