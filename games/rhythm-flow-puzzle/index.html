<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rhythm Flow Puzzle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: white;
        }

        .score, .combo, .level {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }

        .combo {
            color: #ffd700;
            font-size: 20px;
            animation: pulse 0.5s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        #canvas {
            display: block;
            width: 100%;
            height: 500px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            justify-content: center;
        }

        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 1000;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h1 {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay p {
            font-size: 18px;
            margin-bottom: 30px;
            text-align: center;
            max-width: 400px;
            line-height: 1.6;
        }

        .final-score {
            font-size: 36px;
            color: #ffd700;
            margin: 20px 0;
        }

        .miss-effect {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #ff4444;
            font-weight: bold;
            animation: missAnim 0.5s ease forwards;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes missAnim {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
        }

        .perfect-effect {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            color: #00ff88;
            font-weight: bold;
            animation: perfectAnim 0.5s ease forwards;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes perfectAnim {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        @media (max-width: 768px) {
            #canvas {
                height: 400px;
            }

            .score, .combo, .level {
                font-size: 14px;
                padding: 8px 15px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="header">
            <div class="score">スコア: <span id="scoreValue">0</span></div>
            <div class="combo">コンボ: <span id="comboValue">0</span></div>
            <div class="level">レベル: <span id="levelValue">1</span></div>
        </div>

        <canvas id="canvas"></canvas>

        <div class="controls">
            <button id="startBtn">▶️ スタート</button>
            <button id="fullscreenBtn">📺 全画面</button>
        </div>
    </div>

    <div class="overlay" id="startOverlay">
        <h1>🎵 Rhythm Flow</h1>
        <p>流れてくる色タイルを同じ色のボックスでキャッチ！<br>リズムに合わせてコンボを稼ごう！</p>
        <button id="playBtn">🎮 プレイ開始</button>
    </div>

    <div class="overlay hidden" id="gameOverOverlay">
        <h1>ゲームオーバー</h1>
        <div class="final-score">スコア: <span id="finalScore">0</span></div>
        <p>最大コンボ: <span id="maxCombo">0</span></p>
        <button id="restartBtn">🔄 もう一度</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreValue = document.getElementById('scoreValue');
        const comboValue = document.getElementById('comboValue');
        const levelValue = document.getElementById('levelValue');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScore = document.getElementById('finalScore');
        const maxComboDisplay = document.getElementById('maxCombo');
        const startBtn = document.getElementById('startBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const playBtn = document.getElementById('playBtn');
        const restartBtn = document.getElementById('restartBtn');

        let width, height;
        let gameRunning = false;
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let level = 1;
        let tiles = [];
        let boxes = [];
        let particles = [];
        let time = 0;
        let spawnRate = 60;
        let tileSpeed = 3;
        let lastSpawn = 0;
        let missedTiles = 0;
        const maxMissed = 5;

        const colors = [
            { name: 'red', color: '#ff4444', lightColor: '#ff8888' },
            { name: 'blue', color: '#4488ff', lightColor: '#88aaff' },
            { name: 'green', color: '#44ff88', lightColor: '#88ffaa' },
            { name: 'yellow', color: '#ffdd44', lightColor: '#ffee88' }
        ];

        function resize() {
            const container = document.getElementById('gameContainer');
            const containerWidth = container.clientWidth - 40;
            canvas.width = containerWidth;
            canvas.height = window.innerWidth <= 768 ? 400 : 500;
            width = canvas.width;
            height = canvas.height;
            initBoxes();
        }

        function initBoxes() {
            boxes = [];
            const boxWidth = width / colors.length;

            colors.forEach((colorData, index) => {
                boxes.push({
                    x: index * boxWidth,
                    y: height - 80,
                    width: boxWidth,
                    height: 60,
                    color: colorData.color,
                    name: colorData.name,
                    active: false,
                    activationTime: 0
                });
            });
        }

        class Tile {
            constructor() {
                const colorData = colors[Math.floor(Math.random() * colors.length)];
                const boxWidth = width / colors.length;

                this.x = Math.floor(Math.random() * colors.length) * boxWidth + boxWidth / 2;
                this.y = -30;
                this.radius = 25;
                this.color = colorData.color;
                this.lightColor = colorData.lightColor;
                this.name = colorData.name;
                this.speed = tileSpeed + Math.random() * 0.5;
                this.active = true;
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
            }

            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;

                if (this.y > height + 50) {
                    this.active = false;
                    return 'miss';
                }
                return 'active';
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // グロー効果
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius * 1.5);
                gradient.addColorStop(0, this.lightColor);
                gradient.addColorStop(0.5, this.color);
                gradient.addColorStop(1, 'transparent');

                ctx.beginPath();
                ctx.arc(0, 0, this.radius * 1.5, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // メインの円
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();

                // ハイライト
                ctx.beginPath();
                ctx.arc(-this.radius * 0.3, -this.radius * 0.3, this.radius * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fill();

                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.radius = Math.random() * 5 + 2;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.02;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2;
                this.life -= this.decay;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * this.life, 0, Math.PI * 2);
                ctx.fillStyle = `${this.color}${Math.floor(this.life * 255).toString(16).padStart(2, '0')}`;
                ctx.fill();
            }
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function showEffect(text, isGood) {
            const effect = document.createElement('div');
            effect.className = isGood ? 'perfect-effect' : 'miss-effect';
            effect.textContent = text;
            document.body.appendChild(effect);

            setTimeout(() => {
                effect.remove();
            }, 500);
        }

        function checkCollisions() {
            const boxHeight = 60;
            const boxY = height - 80;

            tiles.forEach((tile, tileIndex) => {
                if (!tile.active) return;

                boxes.forEach((box, boxIndex) => {
                    if (box.active) return;
                    if (tile.y >= boxY && tile.y <= boxY + boxHeight) {
                        const boxLeft = box.x;
                        const boxRight = box.x + box.width;

                        if (tile.x >= boxLeft && tile.x <= boxRight) {
                            if (tile.name === box.name) {
                                // 正しい色でキャッチ
                                tile.active = false;
                                combo++;
                                if (combo > maxCombo) maxCombo = combo;

                                const points = 10 * combo * level;
                                score += points;

                                createParticles(tile.x, tile.y, tile.color);

                                if (combo % 10 === 0) {
                                    showEffect(`コンボ ${combo}!`, true);
                                }
                            } else {
                                // 間違った色
                                combo = 0;
                                showEffect('ミス!', false);
                            }
                        }
                    }
                });
            });
        }

        function update() {
            if (!gameRunning) return;

            time++;

            // レベルアップ
            if (score > level * 500) {
                level++;
                tileSpeed += 0.3;
                spawnRate = Math.max(20, spawnRate - 5);
            }

            // タイルをスポーン
            if (time - lastSpawn > spawnRate) {
                tiles.push(new Tile());
                lastSpawn = time;
            }

            // タイルを更新
            tiles.forEach(tile => {
                const status = tile.update();
                if (status === 'miss') {
                    missedTiles++;
                    combo = 0;
                    showEffect('見逃した!', false);

                    if (missedTiles >= maxMissed) {
                        gameOver();
                    }
                }
            });

            // パーティクルを更新
            particles = particles.filter(p => {
                p.update();
                return p.life > 0;
            });

            // ボックスのアクティベーションをリセット
            boxes.forEach(box => {
                if (box.active && time - box.activationTime > 10) {
                    box.active = false;
                }
            });

            checkCollisions();

            // アクティブでないタイルを削除
            tiles = tiles.filter(tile => tile.active);

            // UIを更新
            scoreValue.textContent = score;
            comboValue.textContent = combo;
            levelValue.textContent = level;

            // コンボアニメーション
            if (combo > 0) {
                comboValue.parentElement.style.animation = 'none';
                setTimeout(() => {
                    comboValue.parentElement.style.animation = 'pulse 0.5s ease';
                }, 10);
            }
        }

        function draw() {
            // 背景
            const bgGradient = ctx.createLinearGradient(0, 0, 0, height);
            bgGradient.addColorStop(0, '#1a1a2e');
            bgGradient.addColorStop(1, '#16213e');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, width, height);

            // グリッド線
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i < height; i += 30) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(width, i);
                ctx.stroke();
            }

            // ボックスを描画
            boxes.forEach(box => {
                const gradient = ctx.createLinearGradient(box.x, box.y, box.x, box.y + box.height);

                if (box.active) {
                    gradient.addColorStop(0, box.color);
                    gradient.addColorStop(1, box.color + '88');
                    ctx.shadowColor = box.color;
                    ctx.shadowBlur = 20;
                } else {
                    gradient.addColorStop(0, box.color + '44');
                    gradient.addColorStop(1, box.color + '22');
                    ctx.shadowBlur = 0;
                }

                ctx.fillStyle = gradient;
                ctx.fillRect(box.x + 5, box.y, box.width - 10, box.height);

                // ボーダー
                ctx.strokeStyle = box.color;
                ctx.lineWidth = 3;
                ctx.strokeRect(box.x + 5, box.y, box.width - 10, box.height);

                ctx.shadowBlur = 0;
            });

            // タイルを描画
            tiles.forEach(tile => tile.draw());

            // パーティクルを描画
            particles.forEach(p => p.draw());

            // 残りミス回数を表示
            ctx.fillStyle = 'white';
            ctx.font = '14px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            const missesLeft = maxMissed - missedTiles;
            ctx.fillText(`残りライフ: ${'❤️'.repeat(missesLeft)}`, width / 2, 25);

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        function startGame() {
            gameRunning = true;
            score = 0;
            combo = 0;
            maxCombo = 0;
            level = 1;
            missedTiles = 0;
            tiles = [];
            particles = [];
            time = 0;
            tileSpeed = 3;
            spawnRate = 60;
            lastSpawn = 0;

            startOverlay.classList.add('hidden');
            gameOverOverlay.classList.add('hidden');

            draw();
        }

        function gameOver() {
            gameRunning = false;
            finalScore.textContent = score;
            maxComboDisplay.textContent = maxCombo;
            gameOverOverlay.classList.remove('hidden');
        }

        // タッチ/クリックイベント
        canvas.addEventListener('click', (e) => {
            if (!gameRunning) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            boxes.forEach(box => {
                if (x >= box.x && x <= box.x + box.width &&
                    y >= box.y && y <= box.y + box.height) {
                    box.active = true;
                    box.activationTime = time;
                }
            });
        });

        // キーボードイベント
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;

            const keyMap = {
                'd': 0,
                'f': 1,
                'j': 2,
                'k': 3
            };

            if (keyMap.hasOwnProperty(e.key.toLowerCase())) {
                const index = keyMap[e.key.toLowerCase()];
                if (boxes[index]) {
                    boxes[index].active = true;
                    boxes[index].activationTime = time;
                }
            }
        });

        // ボタンイベント
        playBtn.addEventListener('click', startGame);
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // 初期化
        window.addEventListener('resize', resize);
        resize();
        initBoxes();

        // 初期描画
        const bgGradient = ctx.createLinearGradient(0, 0, 0, height);
        bgGradient.addColorStop(0, '#1a1a2e');
        bgGradient.addColorStop(1, '#16213e');
        ctx.fillStyle = bgGradient;
        ctx.fillRect(0, 0, width, height);
    </script>
</body>
</html>
