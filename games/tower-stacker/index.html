<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Stacker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        h1 {
            color: #fff;
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .score {
            color: #4ade80;
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 2px 20px rgba(74, 222, 128, 0.5);
        }

        .high-score {
            color: #fbbf24;
            font-size: 18px;
            margin-bottom: 20px;
        }

        #canvas {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 100%;
            touch-action: none;
        }

        .tap-area {
            margin-top: 20px;
            padding: 20px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .tap-area:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.5);
        }

        .tap-area:active {
            transform: translateY(0);
        }

        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .game-over.show {
            display: flex;
        }

        .game-over-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .game-over h2 {
            color: #ef4444;
            font-size: 36px;
            margin-bottom: 20px;
        }

        .final-score {
            color: #fff;
            font-size: 64px;
            font-weight: bold;
            margin: 20px 0;
        }

        .restart-btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(74, 222, 128, 0.4);
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(74, 222, 128, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 24px;
            }

            .score {
                font-size: 36px;
            }

            .tap-area {
                padding: 15px 30px;
                font-size: 18px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>

    <div class="game-container">
        <h1>🏗️ Tower Stacker</h1>
        <div class="high-score">🏆 ハイスコア: <span id="highScore">0</span></div>
        <div class="score" id="score">0</div>
        <canvas id="canvas" width="400" height="500"></canvas>
        <button class="tap-area" id="tapBtn">タップして積む！</button>
    </div>

    <div class="game-over" id="gameOver">
        <div class="game-over-content">
            <h2>ゲームオーバー！</h2>
            <div class="final-score" id="finalScore">0</div>
            <p style="color: #fff; margin-bottom: 20px;">階層</p>
            <button class="restart-btn" id="restartBtn">もう一度</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const tapBtn = document.getElementById('tapBtn');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let blocks = [];
        let currentBlock = null;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('towerStackerHighScore')) || 0;
        let gameSpeed = 3;
        let isGameOver = false;
        let isMoving = true;

        highScoreEl.textContent = highScore;

        const BLOCK_HEIGHT = 30;
        const CANVAS_WIDTH = 400;
        const CANVAS_HEIGHT = 500;
        const BASE_WIDTH = 200;
        const MIN_WIDTH = 20;

        function createBlock(y, width, x) {
            return {
                x: x || CANVAS_WIDTH / 2 - width / 2,
                y: y,
                width: width,
                height: BLOCK_HEIGHT,
                direction: Math.random() > 0.5 ? 1 : -1,
                hue: (score * 10) % 360
            };
        }

        function initGame() {
            blocks = [];
            score = 0;
            gameSpeed = 3;
            isGameOver = false;
            isMoving = true;

            // 基礎ブロック
            blocks.push(createBlock(CANVAS_HEIGHT - BLOCK_HEIGHT, BASE_WIDTH, CANVAS_WIDTH / 2 - BASE_WIDTH / 2));

            // 最初の移動ブロック
            spawnNewBlock();

            scoreEl.textContent = score;
            gameOverEl.classList.remove('show');
        }

        function spawnNewBlock() {
            const prevBlock = blocks[blocks.length - 1];
            const newWidth = prevBlock.width;
            const newY = prevBlock.y - BLOCK_HEIGHT;

            currentBlock = createBlock(newY, newWidth, 0);
            currentBlock.direction = 1;
            isMoving = true;
        }

        function update() {
            if (isGameOver || !isMoving) return;

            currentBlock.x += gameSpeed * currentBlock.direction;

            if (currentBlock.x <= 0 || currentBlock.x + currentBlock.width >= CANVAS_WIDTH) {
                currentBlock.direction *= -1;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // 配置されたブロック
            blocks.forEach((block, index) => {
                const hue = (index * 10) % 360;
                ctx.fillStyle = `hsl(${hue}, 70%, 50%)`;
                ctx.fillRect(block.x, block.y, block.width, block.height);

                // ハイライト
                ctx.fillStyle = `hsla(${hue}, 70%, 70%, 0.3)`;
                ctx.fillRect(block.x, block.y, block.width, 5);
            });

            // 現在のブロック
            if (currentBlock && isMoving) {
                const hue = (score * 10) % 360;
                ctx.fillStyle = `hsl(${hue}, 70%, 50%)`;
                ctx.fillRect(currentBlock.x, currentBlock.y, currentBlock.width, currentBlock.height);

                // ハイライト
                ctx.fillStyle = `hsla(${hue}, 70%, 70%, 0.3)`;
                ctx.fillRect(currentBlock.x, currentBlock.y, currentBlock.width, 5);
            }
        }

        function placeBlock() {
            if (!isMoving || isGameOver) return;

            isMoving = false;

            const prevBlock = blocks[blocks.length - 1];
            const overlap = Math.min(
                currentBlock.x + currentBlock.width,
                prevBlock.x + prevBlock.width
            ) - Math.max(
                currentBlock.x,
                prevBlock.x
            );

            if (overlap <= 0) {
                gameOver();
                return;
            }

            // 新しいブロックの幅と位置
            const newWidth = overlap;
            const newX = Math.max(currentBlock.x, prevBlock.x);

            // ブロックを追加
            blocks.push({
                x: newX,
                y: currentBlock.y,
                width: newWidth,
                height: BLOCK_HEIGHT,
                hue: (score * 10) % 360
            });

            score++;
            scoreEl.textContent = score;

            // スピードアップ
            if (score % 5 === 0) {
                gameSpeed += 0.5;
            }

            // 画面を下にスクロール
            if (blocks[blocks.length - 1].y < 150) {
                blocks.forEach(block => {
                    block.y += BLOCK_HEIGHT;
                });
            }

            // 次のブロック
            setTimeout(() => {
                if (!isGameOver) {
                    spawnNewBlock();
                }
            }, 100);
        }

        function gameOver() {
            isGameOver = true;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('towerStackerHighScore', highScore);
                highScoreEl.textContent = highScore;
            }

            finalScoreEl.textContent = score;
            gameOverEl.classList.add('show');
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // イベントリスナー
        tapBtn.addEventListener('click', placeBlock);
        canvas.addEventListener('click', placeBlock);
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                placeBlock();
            }
        });

        // タッチ対応
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            placeBlock();
        }, { passive: false });

        restartBtn.addEventListener('click', initGame);

        // 全画面ボタン
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                fullscreenBtn.textContent = '全画面解除';
            } else {
                document.exitFullscreen();
                fullscreenBtn.textContent = '全画面';
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fullscreenBtn.textContent = '全画面解除';
            } else {
                fullscreenBtn.textContent = '全画面';
            }
        });

        // ゲーム開始
        initGame();
        gameLoop();
    </script>
</body>
</html>
