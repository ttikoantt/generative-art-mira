<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reflex Game - 反応ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        #gameArea {
            position: relative;
            width: 100%;
            height: 100vh;
            cursor: crosshair;
        }

        .target {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .target:active {
            transform: scale(0.9);
        }

        .stats {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-radius: 15px;
            color: white;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.2);
            min-width: 150px;
        }

        .stats h3 {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stats .value {
            font-size: 28px;
            font-weight: bold;
        }

        .stats .label {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 5px;
        }

        .menu {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .start-screen, .end-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            color: white;
            text-align: center;
        }

        .start-screen h1, .end-screen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .start-screen p, .end-screen p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .start-btn, .restart-btn {
            background: linear-gradient(45deg, #00d4ff, #7c3aed);
            border: none;
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .start-btn:hover, .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.4);
        }

        .start-btn:active, .restart-btn:active {
            transform: scale(0.95);
        }

        .hidden {
            display: none !important;
        }

        .result {
            font-size: 24px;
            margin: 20px 0;
        }

        .result .score {
            font-size: 48px;
            font-weight: bold;
            color: #00d4ff;
        }

        .timer-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            transition: width 0.1s linear;
            z-index: 150;
        }
    </style>
</head>
<body>
    <div class="start-screen" id="startScreen">
        <h1>⚡ Reflex Game</h1>
        <p>ターゲットをタップして反応速度を測定！</p>
        <button class="start-btn" onclick="startGame()">スタート</button>
    </div>

    <div class="end-screen hidden" id="endScreen">
        <h1>🎯 ゲーム終了！</h1>
        <div class="result">
            スコア<br>
            <div class="score" id="finalScore">0</div>
        </div>
        <p>平均反応時間: <span id="avgTime">0</span>ms</p>
        <button class="restart-btn" onclick="startGame()">もう一度</button>
    </div>

    <div class="timer-bar" id="timerBar"></div>

    <div class="stats">
        <h3>スコア</h3>
        <div class="value" id="score">0</div>
        <div class="label">残り時間: <span id="timeLeft">30</span>秒</div>
    </div>

    <div class="menu">
        <button class="btn" onclick="toggleFullscreen()">全画面</button>
    </div>

    <div id="gameArea"></div>

    <script>
        const gameArea = document.getElementById('gameArea');
        const scoreEl = document.getElementById('score');
        const timeLeftEl = document.getElementById('timeLeft');
        const timerBar = document.getElementById('timerBar');
        const startScreen = document.getElementById('startScreen');
        const endScreen = document.getElementById('endScreen');
        const finalScoreEl = document.getElementById('finalScore');
        const avgTimeEl = document.getElementById('avgTime');

        let score = 0;
        let timeLeft = 30;
        let gameActive = false;
        let gameInterval;
        let spawnInterval;
        let reactionTimes = [];
        let currentTarget = null;
        let targetSpawnTime = 0;

        function startGame() {
            score = 0;
            timeLeft = 30;
            reactionTimes = [];
            gameActive = true;

            scoreEl.textContent = score;
            timeLeftEl.textContent = timeLeft;
            timerBar.style.width = '100%';

            startScreen.classList.add('hidden');
            endScreen.classList.add('hidden');
            gameArea.innerHTML = '';

            // タイマー開始
            gameInterval = setInterval(() => {
                timeLeft--;
                timeLeftEl.textContent = timeLeft;
                timerBar.style.width = (timeLeft / 30 * 100) + '%';

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // ターゲット生成
            spawnTarget();
            spawnInterval = setInterval(() => {
                if (gameActive) {
                    spawnTarget();
                }
            }, 800);
        }

        function spawnTarget() {
            // 既存のターゲットを削除
            if (currentTarget) {
                currentTarget.remove();
            }

            const target = document.createElement('div');
            target.className = 'target';

            const size = Math.random() * 40 + 50; // 50-90px
            const maxX = window.innerWidth - size - 20;
            const maxY = window.innerHeight - size - 100;

            const hue = Math.random() * 360;
            target.style.width = size + 'px';
            target.style.height = size + 'px';
            target.style.left = Math.random() * maxX + 10 + 'px';
            target.style.top = Math.random() * maxY + 80 + 'px';
            target.style.background = `radial-gradient(circle at 30% 30%, 
                hsl(${hue}, 80%, 70%), 
                hsl(${hue}, 70%, 50%))`;
            target.style.boxShadow = `0 0 20px hsl(${hue}, 70%, 50%)`;

            targetSpawnTime = Date.now();

            const clickHandler = () => {
                const reactionTime = Date.now() - targetSpawnTime;
                reactionTimes.push(reactionTime);

                // ボーナス：速い反応ほど高得点
                const bonus = Math.max(0, Math.floor((1000 - reactionTime) / 10));
                const points = 10 + bonus;
                score += points;
                scoreEl.textContent = score;

                target.remove();
                currentTarget = null;

                // エフェクト
                createParticles(
                    parseInt(target.style.left) + size / 2,
                    parseInt(target.style.top) + size / 2,
                    hue
                );

                // 次のターゲットを即座に生成
                setTimeout(spawnTarget, 100);
            };

            target.addEventListener('click', clickHandler);
            target.addEventListener('touchstart', (e) => {
                e.preventDefault();
                clickHandler();
            });

            gameArea.appendChild(target);
            currentTarget = target;
        }

        function createParticles(x, y, hue) {
            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.style.cssText = `
                    position: absolute;
                    width: 8px;
                    height: 8px;
                    background: hsl(${hue}, 80%, 60%);
                    border-radius: 50%;
                    left: ${x}px;
                    top: ${y}px;
                    pointer-events: none;
                    z-index: 50;
                `;

                const angle = (Math.PI * 2 * i) / 8;
                const velocity = 5 + Math.random() * 5;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity;

                gameArea.appendChild(particle);

                let opacity = 1;
                let posX = x;
                let posY = y;

                const animate = () => {
                    posX += vx;
                    posY += vy;
                    opacity -= 0.05;

                    particle.style.left = posX + 'px';
                    particle.style.top = posY + 'px';
                    particle.style.opacity = opacity;

                    if (opacity > 0) {
                        requestAnimationFrame(animate);
                    } else {
                        particle.remove();
                    }
                };

                requestAnimationFrame(animate);
            }
        }

        function endGame() {
            gameActive = false;
            clearInterval(gameInterval);
            clearInterval(spawnInterval);

            if (currentTarget) {
                currentTarget.remove();
            }

            const avgTime = reactionTimes.length > 0
                ? Math.round(reactionTimes.reduce((a, b) => a + b, 0) / reactionTimes.length)
                : 0;

            finalScoreEl.textContent = score;
            avgTimeEl.textContent = avgTime;
            endScreen.classList.remove('hidden');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 自動終了（プレイせず放置した場合）
        setTimeout(() => {
            if (!gameActive && startScreen.classList.contains('hidden') === false) {
                // 何もしない
            }
        }, 1000);
    </script>
</body>
</html>
