<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Timing Reflex Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: manipulation;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .stats {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            color: #fff;
            font-size: 18px;
            z-index: 10;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
        }

        .combo {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            z-index: 10;
        }

        .combo.show {
            opacity: 1;
            transform: translateX(-50%) scale(1.2);
        }

        .game-area {
            width: 300px;
            height: 300px;
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .target-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            pointer-events: none;
        }

        .timing-circle {
            width: 100px;
            height: 100px;
            position: relative;
            cursor: pointer;
            border-radius: 50%;
            transition: transform 0.1s;
        }

        .timing-circle:active {
            transform: scale(0.95);
        }

        .center-dot {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #ff0040;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px #ff0040, 0 0 40px #ff0040;
        }

        .progress-ring {
            position: absolute;
            top: -20px;
            left: -20px;
            width: 140px;
            height: 140px;
        }

        .progress-ring circle {
            fill: none;
            stroke-width: 3;
            stroke-linecap: round;
        }

        .progress-ring .bg {
            stroke: rgba(255, 255, 255, 0.1);
        }

        .progress-ring .progress {
            stroke: #00ff88;
            transform: rotate(-90deg);
            transform-origin: center;
            transition: stroke-dashoffset 0.016s linear;
        }

        .feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            font-weight: bold;
            pointer-events: none;
            opacity: 0;
            z-index: 20;
        }

        .feedback.show {
            opacity: 1;
            animation: feedbackPop 0.5s ease-out;
        }

        @keyframes feedbackPop {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.3);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }

        .feedback.perfect {
            color: #ffff00;
            text-shadow: 0 0 20px #ffff00;
        }

        .feedback.great {
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88;
        }

        .feedback.good {
            color: #00aaff;
            text-shadow: 0 0 20px #00aaff;
        }

        .feedback.miss {
            color: #ff4444;
            text-shadow: 0 0 20px #ff4444;
        }

        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 15, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .start-screen h1 {
            color: #fff;
            font-size: 36px;
            margin-bottom: 20px;
        }

        .start-screen p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            margin-bottom: 30px;
            text-align: center;
            max-width: 300px;
        }

        .start-btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #ff0040, #ff0080);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 0, 64, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            border-radius: 5px;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .round-info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .stats {
                gap: 30px;
                font-size: 16px;
            }

            .stat-value {
                font-size: 28px;
            }

            .game-area {
                width: 280px;
                height: 280px;
            }

            .combo {
                font-size: 40px;
            }

            .feedback {
                font-size: 60px;
            }

            .start-screen h1 {
                font-size: 28px;
            }

            .start-screen p {
                font-size: 14px;
                padding: 0 20px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">SCORE</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="highScore">0</div>
                <div class="stat-label">BEST</div>
            </div>
        </div>

        <div class="combo" id="combo">COMBO x5!</div>

        <div class="game-area">
            <div class="target-ring" style="width: 150px; height: 150px; top: 50%; left: 50%; transform: translate(-50%, -50%);"></div>
            <div class="target-ring" style="width: 80px; height: 80px; top: 50%; left: 50%; transform: translate(-50%, -50%);"></div>

            <div class="timing-circle" id="timingCircle">
                <div class="center-dot"></div>
                <svg class="progress-ring">
                    <circle class="bg" cx="70" cy="70" r="67"></circle>
                    <circle class="progress" cx="70" cy="70" r="67"
                            stroke-dasharray="421"
                            stroke-dashoffset="421"></circle>
                </svg>
            </div>
        </div>

        <div class="feedback" id="feedback"></div>

        <div class="round-info">Round <span id="round">1</span> / 10</div>

        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    </div>

    <div class="start-screen" id="startScreen">
        <h1>⚡ Timing Reflex</h1>
        <p>円が収縮したらタイミングよくタップ！<br>完璧なタイミングでボーナス！</p>
        <button class="start-btn" onclick="startGame()">START</button>
    </div>

    <script>
        let score = 0;
        let highScore = 0;
        let combo = 0;
        let round = 1;
        let isPlaying = false;
        let phase = 'waiting'; // waiting,收缩, expanding
        let progress = 0;
        let speed = 0.5;
        let startTime = 0;
        let lastTime = 0;

        const timingCircle = document.getElementById('timingCircle');
        const progressCircle = document.querySelector('.progress');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const comboEl = document.getElementById('combo');
        const feedbackEl = document.getElementById('feedback');
        const roundEl = document.getElementById('round');
        const startScreen = document.getElementById('startScreen');

        const CIRCUMFERENCE = 421;

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function showFeedback(text, type) {
            feedbackEl.textContent = text;
            feedbackEl.className = `feedback ${type} show`;

            setTimeout(() => {
                feedbackEl.classList.remove('show');
            }, 500);
        }

        function showCombo() {
            if (combo >= 3) {
                comboEl.textContent = `COMBO x${combo}!`;
                comboEl.classList.add('show');
                setTimeout(() => {
                    comboEl.classList.remove('show');
                }, 1000);
            }
        }

        function updateStats() {
            scoreEl.textContent = score;
            highScoreEl.textContent = highScore;
            roundEl.textContent = round;
        }

        function updateProgress() {
            const offset = CIRCUMFERENCE - (progress / 100) * CIRCUMFERENCE;
            progressCircle.style.strokeDashoffset = offset;
        }

        function handleTap(e) {
            e.preventDefault();

            if (!isPlaying) return;

            if (phase === '收缩') {
                const accuracy = Math.abs(progress - 100);
                let points = 0;
                let type = '';

                if (accuracy < 5) {
                    points = 100 + combo * 10;
                    type = 'perfect';
                    combo++;
                } else if (accuracy < 15) {
                    points = 75 + combo * 5;
                    type = 'great';
                    combo++;
                } else if (accuracy < 30) {
                    points = 50;
                    type = 'good';
                    combo = 0;
                } else {
                    points = 10;
                    type = 'miss';
                    combo = 0;
                }

                score += points;
                showFeedback(type.toUpperCase(), type);
                showCombo();

                phase = 'expanding';
                progress = 100;
            } else if (phase === 'expanding' && progress > 90) {
                phase = 'waiting';
                progress = 0;

                round++;
                if (round > 10) {
                    endGame();
                } else {
                    speed = 0.5 + round * 0.1;
                    updateStats();

                    setTimeout(() => {
                        if (isPlaying && round <= 10) {
                            phase = '收缩';
                            startTime = performance.now();
                        }
                    }, 500);
                }
            }
        }

        function gameLoop(currentTime) {
            if (!isPlaying) return;

            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            if (phase === '收缩') {
                progress += speed * (deltaTime / 16);
                if (progress >= 100) {
                    progress = 100;
                    // Missed timing
                    combo = 0;
                    showFeedback('MISS', 'miss');
                    phase = 'expanding';
                }
            } else if (phase === 'expanding') {
                progress -= speed * 2 * (deltaTime / 16);
                if (progress <= 0) {
                    progress = 0;
                }
            }

            updateProgress();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            startScreen.style.display = 'none';
            score = 0;
            combo = 0;
            round = 1;
            speed = 0.5;
            phase = 'waiting';
            progress = 0;
            isPlaying = true;
            lastTime = performance.now();

            updateStats();
            updateProgress();

            setTimeout(() => {
                phase = '收缩';
                requestAnimationFrame(gameLoop);
            }, 1000);
        }

        function endGame() {
            isPlaying = false;

            if (score > highScore) {
                highScore = score;
            }

            updateStats();

            setTimeout(() => {
                startScreen.style.display = 'flex';
            }, 1500);
        }

        timingCircle.addEventListener('mousedown', handleTap);
        timingCircle.addEventListener('touchstart', handleTap, { passive: false });

        updateStats();
        updateProgress();
    </script>
</body>
</html>
