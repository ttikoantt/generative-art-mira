<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Timing Reflex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }
        .game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 70vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .target {
            position: absolute;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s ease;
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.6);
        }
        .target:active {
            transform: scale(0.9);
        }
        .target.perfect {
            background: linear-gradient(135deg, #00d2d3 0%, #54a0ff 100%);
            box-shadow: 0 0 40px rgba(0, 210, 211, 0.8);
        }
        .target.miss {
            background: linear-gradient(135deg, #576574 0%, #222f3e 100%);
        }
        .info {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 0 10px;
        }
        .info-item {
            background: rgba(255,255,255,0.05);
            padding: 15px 20px;
            border-radius: 10px;
            text-align: center;
            flex: 1;
            margin: 0 5px;
        }
        .info-item:first-child { margin-left: 0; }
        .info-item:last-child { margin-right: 0; }
        .info-label {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .info-value {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 15, 26, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .overlay.hidden { display: none; }
        .overlay h1 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .overlay p {
            color: rgba(255,255,255,0.7);
            margin-bottom: 30px;
            text-align: center;
            max-width: 280px;
            line-height: 1.6;
        }
        .overlay .score {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00d2d3 0%, #54a0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .overlay .stats {
            color: rgba(255,255,255,0.6);
            margin-bottom: 30px;
            font-size: 14px;
        }
        button {
            padding: 15px 40px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        button:active {
            transform: translateY(0);
        }
        .feedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            font-weight: bold;
            pointer-events: none;
            animation: feedback 0.5s ease-out forwards;
        }
        @keyframes feedback {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -100%) scale(1.5); }
        }
        .feedback.perfect { color: #00d2d3; }
        .feedback.good { color: #feca57; }
        .feedback.miss { color: #ff6b6b; }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            padding: 10px 15px;
            font-size: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreen">⛶ 全画面</button>

    <div class="info">
        <div class="info-item">
            <div class="info-label">スコア</div>
            <div class="info-value" id="score">0</div>
        </div>
        <div class="info-item">
            <div class="info-label">連続</div>
            <div class="info-value" id="combo">0</div>
        </div>
        <div class="info-item">
            <div class="info-label">最高</div>
            <div class="info-value" id="best">0</div>
        </div>
    </div>

    <div class="game-container" id="game">
        <div class="overlay" id="startOverlay">
            <h1>⚡ Timing Reflex</h1>
            <p>ターゲットが出現したら<br>すぐにタップ！<br><br>スピードと正確さが鍵</p>
            <button id="startBtn">スタート</button>
        </div>

        <div class="overlay hidden" id="gameOverlay">
            <div class="score" id="finalScore">0</div>
            <div class="stats" id="finalStats">Perfect: 0 | Good: 0 | Miss: 0</div>
            <button id="restartBtn">もう一度</button>
        </div>
    </div>

    <script>
        const game = document.getElementById('game');
        const scoreEl = document.getElementById('score');
        const comboEl = document.getElementById('combo');
        const bestEl = document.getElementById('best');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverlay = document.getElementById('gameOverlay');
        const finalScoreEl = document.getElementById('finalScore');
        const finalStatsEl = document.getElementById('finalStats');

        let score = 0;
        let combo = 0;
        let best = parseInt(localStorage.getItem('timingReflexBest')) || 0;
        let perfect = 0;
        let good = 0;
        let miss = 0;
        let gameRunning = false;
        let currentTarget = null;
        let targetTimer = null;
        let gameTimer = null;
        let spawnTime = 0;
        let baseInterval = 2000;
        let currentInterval = baseInterval;
        let targetsHit = 0;

        bestEl.textContent = best;

        function createTarget() {
            if (!gameRunning) return;

            const target = document.createElement('div');
            target.className = 'target';

            const container = game.getBoundingClientRect();
            const maxX = container.width - 60;
            const maxY = container.height - 60;

            target.style.left = Math.random() * maxX + 'px';
            target.style.top = Math.random() * maxY + 'px';

            spawnTime = Date.now();

            target.addEventListener('mousedown', hitTarget);
            target.addEventListener('touchstart', (e) => {
                e.preventDefault();
                hitTarget(e);
            });

            game.appendChild(target);
            currentTarget = target;

            targetTimer = setTimeout(() => {
                if (currentTarget === target) {
                    missTarget();
                }
            }, currentInterval);
        }

        function hitTarget(e) {
            if (!gameRunning) return;

            e.preventDefault();
            const reactionTime = Date.now() - spawnTime;
            const perfectWindow = currentInterval * 0.3;
            const goodWindow = currentInterval * 0.6;

            clearTimeout(targetTimer);

            if (reactionTime <= perfectWindow) {
                perfect++;
                combo++;
                score += 100 * (1 + combo * 0.1);
                showFeedback('PERFECT!', 'perfect');
                currentTarget.classList.add('perfect');
            } else if (reactionTime <= goodWindow) {
                good++;
                combo++;
                score += 50 * (1 + combo * 0.05);
                showFeedback('GOOD', 'good');
            } else {
                miss++;
                combo = 0;
                showFeedback('SLOW', 'miss');
                currentTarget.classList.add('miss');
            }

            targetsHit++;
            if (targetsHit % 5 === 0 && currentInterval > 800) {
                currentInterval -= 100;
            }

            updateUI();
            currentTarget.remove();
            currentTarget = null;

            setTimeout(createTarget, Math.random() * 500 + 300);
        }

        function missTarget() {
            if (!gameRunning) return;

            miss++;
            combo = 0;
            showFeedback('MISS', 'miss');

            updateUI();
            currentTarget.remove();
            currentTarget = null;

            setTimeout(createTarget, Math.random() * 500 + 300);
        }

        function showFeedback(text, type) {
            const feedback = document.createElement('div');
            feedback.className = `feedback ${type}`;
            feedback.textContent = text;
            game.appendChild(feedback);

            setTimeout(() => feedback.remove(), 500);
        }

        function updateUI() {
            scoreEl.textContent = Math.floor(score);
            comboEl.textContent = combo;

            if (score > best) {
                best = Math.floor(score);
                bestEl.textContent = best;
                localStorage.setItem('timingReflexBest', best);
            }
        }

        function startGame() {
            score = 0;
            combo = 0;
            perfect = 0;
            good = 0;
            miss = 0;
            gameRunning = true;
            currentInterval = baseInterval;
            targetsHit = 0;

            startOverlay.classList.add('hidden');
            gameOverlay.classList.add('hidden');

            updateUI();

            setTimeout(createTarget, 500);

            gameTimer = setTimeout(() => {
                endGame();
            }, 60000);
        }

        function endGame() {
            gameRunning = false;
            clearTimeout(targetTimer);
            clearTimeout(gameTimer);

            if (currentTarget) {
                currentTarget.remove();
                currentTarget = null;
            }

            finalScoreEl.textContent = Math.floor(score);
            finalStatsEl.textContent = `Perfect: ${perfect} | Good: ${good} | Miss: ${miss}`;
            gameOverlay.classList.remove('hidden');
        }

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        document.getElementById('fullscreen').addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });
    </script>
</body>
</html>
