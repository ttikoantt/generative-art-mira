<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Speed Math Challenge - Game 834</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            touch-action: manipulation;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .problem {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
        }

        .equation {
            font-size: 48px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .timer-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.1s linear;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 15px 20px;
            font-size: 24px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        input.correct {
            border-color: #4caf50;
            background: #e8f5e9;
        }

        input.incorrect {
            border-color: #f44336;
            background: #ffebee;
        }

        .button {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .button:active {
            transform: scale(0.95);
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .start-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 20px;
            padding: 20px;
        }

        .game-over {
            text-align: center;
            display: none;
        }

        .game-over.show {
            display: block;
        }

        .game-over h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 64px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
        }

        .streak-badge {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .equation {
                font-size: 36px;
            }

            input {
                font-size: 20px;
                padding: 12px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ Speed Math</h1>
        </div>

        <div id="game-screen">
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">Score</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Streak</div>
                    <div class="stat-value" id="streak">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Best</div>
                    <div class="stat-value" id="best">0</div>
                </div>
            </div>

            <div class="streak-badge" id="streak-badge" style="display: none;">🔥 On Fire!</div>

            <div class="problem">
                <div class="equation" id="equation">5 + 3 = ?</div>
                <div class="timer-bar">
                    <div class="timer-fill" id="timer-fill"></div>
                </div>
            </div>

            <div class="input-section">
                <input type="number" id="answer" placeholder="答え" autocomplete="off">
                <button class="button submit-btn" id="submit-btn">送信</button>
            </div>
        </div>

        <div id="start-screen">
            <div class="problem">
                <p style="font-size: 18px; color: #666; margin-bottom: 20px;">
                    簡単な計算問題を素早く解こう！<br>
                    時間内にできるだけ多くの問題を解いてスコアを稼ごう！
                </p>
                <p style="font-size: 14px; color: #999;">
                    • 1問正解 = 10点<br>
                    • 連続正解でボーナス<br>
                    • 間違えるとストリークリセット
                </p>
            </div>
            <button class="button start-btn" id="start-btn">ゲーム開始</button>
        </div>

        <div class="game-over" id="game-over">
            <h2>🎮 Game Over!</h2>
            <div class="final-score" id="final-score">0</div>
            <p style="color: #999; margin-bottom: 20px;">最高記録更新！</p>
            <button class="button start-btn" id="restart-btn">もう一度プレイ</button>
            <a href="../index.html" class="button" style="display: block; margin-top: 10px; text-align: center; background: #f0f0f0; color: #666; text-decoration: none;">ゲーム一覧へ</a>
        </div>
    </div>

    <script>
        const gameScreen = document.getElementById('game-screen');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over');

        const scoreDisplay = document.getElementById('score');
        const streakDisplay = document.getElementById('streak');
        const bestDisplay = document.getElementById('best');
        const equationDisplay = document.getElementById('equation');
        const answerInput = document.getElementById('answer');
        const submitBtn = document.getElementById('submit-btn');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const timerFill = document.getElementById('timer-fill');
        const finalScoreDisplay = document.getElementById('final-score');
        const streakBadge = document.getElementById('streak-badge');

        let score = 0;
        let streak = 0;
        let bestScore = parseInt(localStorage.getItem('speedMathBest')) || 0;
        let currentAnswer = 0;
        let timer = null;
        let timeLeft = 10;
        let maxTime = 10;
        let gameActive = false;

        bestDisplay.textContent = bestScore;

        function generateProblem() {
            const operations = ['+', '-', '×'];
            const operation = operations[Math.floor(Math.random() * operations.length)];
            let num1, num2;

            switch (operation) {
                case '+':
                    num1 = Math.floor(Math.random() * 20) + 1;
                    num2 = Math.floor(Math.random() * 20) + 1;
                    currentAnswer = num1 + num2;
                    break;
                case '-':
                    num1 = Math.floor(Math.random() * 20) + 10;
                    num2 = Math.floor(Math.random() * num1);
                    currentAnswer = num1 - num2;
                    break;
                case '×':
                    num1 = Math.floor(Math.random() * 10) + 1;
                    num2 = Math.floor(Math.random() * 10) + 1;
                    currentAnswer = num1 * num2;
                    break;
            }

            equationDisplay.textContent = `${num1} ${operation} ${num2} = ?`;
            timeLeft = maxTime;
        }

        function startTimer() {
            if (timer) clearInterval(timer);

            timer = setInterval(() => {
                timeLeft -= 0.1;
                const percentage = (timeLeft / maxTime) * 100;
                timerFill.style.width = percentage + '%';

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 100);
        }

        function checkAnswer() {
            if (!gameActive) return;

            const userAnswer = parseInt(answerInput.value);

            if (userAnswer === currentAnswer) {
                // Correct!
                streak++;
                const streakBonus = Math.min(streak, 10);
                score += 10 + streakBonus;
                scoreDisplay.textContent = score;
                streakDisplay.textContent = streak;

                if (streak >= 5) {
                    streakBadge.style.display = 'inline-block';
                }

                answerInput.classList.add('correct');
                setTimeout(() => {
                    answerInput.classList.remove('correct');
                    answerInput.value = '';
                    generateProblem();
                }, 300);

                // Add bonus time
                timeLeft = Math.min(timeLeft + 2, maxTime);
            } else {
                // Incorrect
                streak = 0;
                streakDisplay.textContent = streak;
                streakBadge.style.display = 'none';

                answerInput.classList.add('incorrect');
                setTimeout(() => {
                    answerInput.classList.remove('incorrect');
                    answerInput.value = '';
                }, 300);
            }
        }

        function startGame() {
            score = 0;
            streak = 0;
            maxTime = 10;
            gameActive = true;

            scoreDisplay.textContent = score;
            streakDisplay.textContent = streak;
            streakBadge.style.display = 'none';

            startScreen.style.display = 'none';
            gameOverScreen.classList.remove('show');
            gameScreen.style.display = 'block';

            generateProblem();
            startTimer();
            answerInput.focus();
        }

        function endGame() {
            gameActive = false;
            clearInterval(timer);

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('speedMathBest', bestScore);
                bestDisplay.textContent = bestScore;
            }

            finalScoreDisplay.textContent = score;
            gameScreen.style.display = 'none';
            gameOverScreen.classList.add('show');
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);
        submitBtn.addEventListener('click', checkAnswer);

        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        // Prevent double-tap zoom on mobile
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
    </script>
</body>
</html>
