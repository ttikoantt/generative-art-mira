<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gravity Defier</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f1a;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            touch-action: none;
        }

        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .score {
            font-size: 24px;
            color: #fff;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(100, 200, 255, 0.5);
        }

        .high-score {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 200;
            display: none;
        }

        .game-over.active {
            display: block;
        }

        .game-over h2 {
            font-size: 48px;
            color: #ff6b6b;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }

        .game-over p {
            font-size: 24px;
            color: #fff;
            margin-bottom: 30px;
        }

        .restart-btn {
            padding: 15px 40px;
            font-size: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: #fff;
            border-radius: 30px;
            cursor: pointer;
            pointer-events: all;
            transition: transform 0.2s;
        }

        .restart-btn:hover {
            transform: scale(1.1);
        }

        .restart-btn:active {
            transform: scale(0.95);
        }

        .instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            z-index: 100;
            text-align: center;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: all;
        }

        @media (max-width: 768px) {
            .score {
                font-size: 20px;
            }

            .game-over h2 {
                font-size: 36px;
            }

            .game-over p {
                font-size: 20px;
            }

            .restart-btn {
                padding: 12px 30px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="ui-overlay">
        <div>
            <div class="score">Score: <span id="score">0</span></div>
            <div class="high-score">Best: <span id="highScore">0</span></div>
        </div>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
    </div>

    <div class="game-over" id="gameOver">
        <h2>Game Over</h2>
        <p>Score: <span id="finalScore">0</span></p>
        <button class="restart-btn" onclick="restartGame()">Play Again</button>
    </div>

    <div class="instructions">タップ/クリックで重力反転</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let player, obstacles, stars;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('gravityDefierHighScore')) || 0;
        let gameRunning = true;
        let animationId;

        const GRAVITY = 0.5;
        const JUMP_FORCE = -8;
        const GRAVITY_REVERSAL = -0.5;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Player {
            constructor() {
                this.width = 30;
                this.height = 30;
                this.x = width * 0.2;
                this.y = height / 2;
                this.vy = 0;
                this.gravity = GRAVITY;
                this.rotation = 0;
                this.trail = [];
            }

            update() {
                this.vy += this.gravity;
                this.y += this.vy;

                // トレイル効果
                this.trail.push({ x: this.x, y: this.y, alpha: 1 });
                if (this.trail.length > 10) {
                    this.trail.shift();
                }

                // 回転
                this.rotation = this.vy * 0.05;

                // 上下の境界チェック
                if (this.y < 0 || this.y > height - this.height) {
                    gameOver();
                }
            }

            draw() {
                // トレイル
                this.trail.forEach((t, i) => {
                    ctx.save();
                    ctx.globalAlpha = t.alpha * 0.3;
                    ctx.fillStyle = '#667eea';
                    ctx.fillRect(t.x, t.y, this.width, this.height);
                    t.alpha -= 0.1;
                    ctx.restore();
                });

                // プレイヤー
                ctx.save();
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                ctx.rotate(this.rotation);

                const gradient = ctx.createLinearGradient(-this.width/2, 0, this.width/2, 0);
                gradient.addColorStop(0, '#667eea');
                gradient.addColorStop(1, '#764ba2');

                ctx.fillStyle = gradient;
                ctx.shadowColor = '#667eea';
                ctx.shadowBlur = 15;
                ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);

                ctx.restore();
            }

            reverseGravity() {
                this.gravity = -this.gravity;
                this.vy = this.gravity > 0 ? JUMP_FORCE : -JUMP_FORCE;
            }
        }

        class Obstacle {
            constructor() {
                this.width = 50;
                this.height = Math.random() * 150 + 100;
                this.x = width;
                this.gap = 180;
                this.top = Math.random() * (height - this.gap - this.height);
                this.bottom = height - this.top - this.gap;
                this.speed = 5;
                this.passed = false;
            }

            update() {
                this.x -= this.speed;

                if (this.x + this.width < 0) {
                    return false;
                }

                return true;
            }

            draw() {
                const gradient = ctx.createLinearGradient(this.x, 0, this.x + this.width, 0);
                gradient.addColorStop(0, '#ff6b6b');
                gradient.addColorStop(1, '#feca57');

                ctx.fillStyle = gradient;
                ctx.shadowColor = '#ff6b6b';
                ctx.shadowBlur = 10;

                // 上の障害物
                ctx.fillRect(this.x, 0, this.width, this.top);

                // 下の障害物
                ctx.fillRect(this.x, height - this.bottom, this.width, this.bottom);

                ctx.shadowBlur = 0;
            }

            checkCollision(player) {
                if (player.x + player.width > this.x && player.x < this.x + this.width) {
                    if (player.y < this.top || player.y + player.height > height - this.bottom) {
                        return true;
                    }
                }
                return false;
            }
        }

        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 1;
                this.twinkle = Math.random() * Math.PI * 2;
            }

            update() {
                this.twinkle += 0.05;
            }

            draw() {
                const alpha = (Math.sin(this.twinkle) + 1) / 2 * 0.5 + 0.3;
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            resize();
            player = new Player();
            obstacles = [];
            stars = [];
            score = 0;
            gameRunning = true;

            // 星を生成
            for (let i = 0; i < 100; i++) {
                stars.push(new Star());
            }

            document.getElementById('score').textContent = score;
            document.getElementById('highScore').textContent = highScore;
            document.getElementById('gameOver').classList.remove('active');
        }

        function spawnObstacle() {
            if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < width - 300) {
                obstacles.push(new Obstacle());
            }
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('gravityDefierHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.add('active');
        }

        function restartGame() {
            init();
            animate();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function handleInput() {
            if (gameRunning) {
                player.reverseGravity();
            }
        }

        function animate() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, width, height);

            // 星の更新と描画
            stars.forEach(star => {
                star.update();
                star.draw();
            });

            // 障害物の生成
            spawnObstacle();

            // 障害物の更新と描画
            obstacles = obstacles.filter(obstacle => {
                const alive = obstacle.update();
                obstacle.draw();

                // 衝突判定
                if (obstacle.checkCollision(player)) {
                    gameOver();
                }

                // スコア更新
                if (!obstacle.passed && obstacle.x + obstacle.width < player.x) {
                    obstacle.passed = true;
                    score++;
                    document.getElementById('score').textContent = score;
                }

                return alive;
            });

            // プレイヤーの更新と描画
            player.update();
            player.draw();

            animationId = requestAnimationFrame(animate);
        }

        // Event Listeners
        window.addEventListener('resize', () => {
            resize();
            if (!gameRunning) {
                init();
            }
        });

        canvas.addEventListener('click', handleInput);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInput();
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && gameRunning) {
                e.preventDefault();
                handleInput();
            }
        });

        // Initialize
        init();
        animate();
    </script>
</body>
</html>
