<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Coin Catcher - コインキャッチャー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(to bottom, #1a1a3e, #2a2a5e);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: none;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .header {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            z-index: 10;
        }

        .stat {
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .stat span {
            color: #ffd700;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .overlay.hidden {
            display: none;
        }

        .title {
            color: #ffd700;
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.7);
        }

        .final-score {
            color: #fff;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .button {
            background: linear-gradient(to bottom, #ffd700, #ff9500);
            color: #1a1a3e;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .button:active {
            transform: scale(0.95);
            box-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
        }

        .instructions {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="header">
            <div class="stat">Score: <span id="score">0</span></div>
            <div class="stat">Lives: <span id="lives">3</span></div>
        </div>

        <canvas id="canvas"></canvas>

        <div id="startScreen" class="overlay">
            <div class="title">Coin Catcher</div>
            <button class="button" onclick="startGame()">Start</button>
            <div class="instructions">タップ/ドラッグでキャッチャーを操作</div>
        </div>

        <div id="gameOverScreen" class="overlay hidden">
            <div class="title">Game Over</div>
            <div class="final-score">Score: <span id="finalScore">0</span></div>
            <button class="button" onclick="startGame()">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const finalScoreEl = document.getElementById('finalScore');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');

        let width, height;
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let coins = [];
        let particles = [];
        let catcher = {
            x: 0,
            y: 0,
            width: 80,
            height: 20
        };
        let mouseX = 0;
        let coinSpawnRate = 60;
        let frameCount = 0;
        let difficulty = 1;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            catcher.y = height - 80;
        }

        class Coin {
            constructor() {
                this.x = Math.random() * (width - 40) + 20;
                this.y = -30;
                this.radius = 15;
                this.speed = (Math.random() * 2 + 2) * difficulty;
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.2;
                this.type = Math.random() < 0.2 ? 'bonus' : 'normal';
                this.caught = false;
            }

            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // Glow effect
                const glowColor = this.type === 'bonus' ? 'rgba(255, 215, 0, 0.3)' : 'rgba(100, 200, 255, 0.3)';
                ctx.shadowColor = this.type === 'bonus' ? '#ffd700' : '#64c8ff';
                ctx.shadowBlur = 20;

                // Coin shape
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius);
                if (this.type === 'bonus') {
                    gradient.addColorStop(0, '#ffff00');
                    gradient.addColorStop(0.5, '#ffd700');
                    gradient.addColorStop(1, '#ff9500');
                } else {
                    gradient.addColorStop(0, '#ffffff');
                    gradient.addColorStop(0.5, '#64c8ff');
                    gradient.addColorStop(1, '#4a90d9');
                }
                ctx.fillStyle = gradient;
                ctx.fill();

                // Shine
                ctx.beginPath();
                ctx.arc(-5, -5, 4, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.fill();

                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8 - 2;
                this.radius = Math.random() * 3 + 2;
                this.color = color;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.02;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2;
                this.life -= this.decay;
            }

            draw() {
                ctx.globalAlpha = this.life;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function spawnCoin() {
            coins.push(new Coin());
        }

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function checkCollision(coin) {
            const coinLeft = coin.x - coin.radius;
            const coinRight = coin.x + coin.radius;
            const coinBottom = coin.y + coin.radius;

            const catcherLeft = catcher.x - catcher.width / 2;
            const catcherRight = catcher.x + catcher.width / 2;
            const catcherTop = catcher.y;

            return coinRight > catcherLeft && 
                   coinLeft < catcherRight && 
                   coinBottom > catcherTop && 
                   coinBottom < catcherTop + 30;
        }

        function update() {
            if (!gameRunning) return;

            frameCount++;

            // Spawn coins
            if (frameCount % Math.max(20, Math.floor(coinSpawnRate / difficulty)) === 0) {
                spawnCoin();
            }

            // Increase difficulty
            if (frameCount % 600 === 0) {
                difficulty += 0.1;
            }

            // Update catcher
            catcher.x += (mouseX - catcher.x) * 0.15;
            catcher.x = Math.max(catcher.width / 2, Math.min(width - catcher.width / 2, catcher.x));

            // Update coins
            coins.forEach((coin, index) => {
                coin.update();

                if (checkCollision(coin) && !coin.caught) {
                    coin.caught = true;
                    const points = coin.type === 'bonus' ? 5 : 1;
                    score += points;
                    scoreEl.textContent = score;
                    
                    const color = coin.type === 'bonus' ? '#ffd700' : '#64c8ff';
                    createParticles(coin.x, coin.y, color, 15);
                    
                    coins.splice(index, 1);
                } else if (coin.y > height) {
                    if (!coin.caught) {
                        lives--;
                        livesEl.textContent = lives;
                        createParticles(coin.x, height - 20, '#ff4444', 10);
                        
                        if (lives <= 0) {
                            gameOver();
                        }
                    }
                    coins.splice(index, 1);
                }
            });

            // Update particles
            particles.forEach((particle, index) => {
                particle.update();
                if (particle.life <= 0) {
                    particles.splice(index, 1);
                }
            });
        }

        function draw() {
            // Clear
            ctx.fillStyle = 'rgba(26, 26, 62, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // Draw particles
            particles.forEach(particle => particle.draw());

            // Draw coins
            coins.forEach(coin => coin.draw());

            // Draw catcher
            ctx.save();
            ctx.translate(catcher.x, catcher.y);

            // Glow
            ctx.shadowColor = '#64c8ff';
            ctx.shadowBlur = 15;

            // Body
            const gradient = ctx.createLinearGradient(-catcher.width / 2, 0, catcher.width / 2, 0);
            gradient.addColorStop(0, '#4a90d9');
            gradient.addColorStop(0.5, '#64c8ff');
            gradient.addColorStop(1, '#4a90d9');
            ctx.fillStyle = gradient;

            ctx.beginPath();
            ctx.roundRect(-catcher.width / 2, 0, catcher.width, catcher.height, 10);
            ctx.fill();

            // Highlight
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.beginPath();
            ctx.roundRect(-catcher.width / 2 + 5, 2, catcher.width - 10, 5, 3);
            ctx.fill();

            ctx.restore();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            score = 0;
            lives = 3;
            coins = [];
            particles = [];
            frameCount = 0;
            difficulty = 1;
            
            scoreEl.textContent = score;
            livesEl.textContent = lives;
            
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            gameRunning = true;
        }

        function gameOver() {
            gameRunning = false;
            finalScoreEl.textContent = score;
            gameOverScreen.classList.remove('hidden');
        }

        // Event listeners
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            mouseX = e.touches[0].clientX - rect.left;
        });

        window.addEventListener('resize', resize);

        // Initialize
        resize();
        mouseX = width / 2;
        gameLoop();
    </script>
</body>
</html>
