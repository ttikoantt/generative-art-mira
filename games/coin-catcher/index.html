<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コインキャッチャー | Coin Catcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        canvas {
            display: block;
        }

        .score {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .lives {
            position: fixed;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            display: none;
        }

        .game-over h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .game-over p {
            font-size: 24px;
            margin-bottom: 30px;
        }

        .game-over button {
            background: #f39c12;
            border: none;
            color: #fff;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.4);
        }

        .game-over button:hover {
            background: #e67e22;
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(243, 156, 18, 0.6);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 768px) {
            .score, .lives {
                font-size: 18px;
            }

            .game-over h1 {
                font-size: 32px;
            }

            .game-over p {
                font-size: 18px;
            }

            .game-over button {
                padding: 12px 30px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="canvas"></canvas>

        <div class="score">SCORE: <span id="score">0</span></div>
        <div class="lives">❤️ <span id="lives">3</span></div>

        <div class="game-over" id="gameOver">
            <h1>GAME OVER</h1>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button onclick="restartGame()">もう一度プレイ / Play Again</button>
        </div>

        <button class="fullscreen-btn" onclick="toggleFullscreen()">
            全画面表示 / Fullscreen
        </button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let paddle;
        let coins = [];
        let score = 0;
        let lives = 3;
        let gameRunning = true;
        let coinSpawnRate = 60;
        let frameCount = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            if (paddle) {
                paddle.y = height - 50;
            }
        }

        class Paddle {
            constructor() {
                this.width = 100;
                this.height = 15;
                this.x = width / 2 - this.width / 2;
                this.y = height - 50;
                this.speed = 8;
                this.targetX = this.x;
            }

            update() {
                // Smooth movement towards target
                const dx = this.targetX - this.x;
                this.x += dx * 0.2;

                // Keep paddle in bounds
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > width) this.x = width - this.width;
            }

            draw() {
                const gradient = ctx.createLinearGradient(
                    this.x, this.y,
                    this.x + this.width, this.y
                );
                gradient.addColorStop(0, '#f39c12');
                gradient.addColorStop(0.5, '#f1c40f');
                gradient.addColorStop(1, '#f39c12');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(this.x, this.y, this.width, this.height, 5);
                ctx.fill();

                // Glow effect
                ctx.shadowColor = '#f39c12';
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class Coin {
            constructor() {
                this.size = 15;
                this.x = Math.random() * (width - this.size * 2) + this.size;
                this.y = -this.size;
                this.speed = 2 + Math.random() * 2;
                this.rotation = 0;
                this.rotationSpeed = 0.1 + Math.random() * 0.1;
            }

            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // Coin body
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath();
                ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                ctx.fill();

                // Inner circle
                ctx.fillStyle = '#f39c12';
                ctx.beginPath();
                ctx.arc(0, 0, this.size * 0.7, 0, Math.PI * 2);
                ctx.fill();

                // Shine effect
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(-this.size * 0.3, -this.size * 0.3, this.size * 0.2, 0, Math.PI * 2);
                ctx.fill();

                // Glow
                ctx.shadowColor = '#f1c40f';
                ctx.shadowBlur = 15;
                ctx.fill();
                ctx.shadowBlur = 0;

                ctx.restore();
            }

            isOffScreen() {
                return this.y - this.size > height;
            }

            isCollidingWith(paddle) {
                return (
                    this.y + this.size > paddle.y &&
                    this.y - this.size < paddle.y + paddle.height &&
                    this.x > paddle.x &&
                    this.x < paddle.x + paddle.width
                );
            }
        }

        function spawnCoin() {
            coins.push(new Coin());
        }

        function update() {
            if (!gameRunning) return;

            frameCount++;

            // Clear canvas
            ctx.clearRect(0, 0, width, height);

            // Spawn coins
            if (frameCount % coinSpawnRate === 0) {
                spawnCoin();
                // Increase difficulty over time
                if (frameCount % 500 === 0 && coinSpawnRate > 30) {
                    coinSpawnRate -= 5;
                }
            }

            // Update paddle
            paddle.update();
            paddle.draw();

            // Update coins
            for (let i = coins.length - 1; i >= 0; i--) {
                const coin = coins[i];
                coin.update();
                coin.draw();

                // Check collision
                if (coin.isCollidingWith(paddle)) {
                    score += 10;
                    document.getElementById('score').textContent = score;
                    coins.splice(i, 1);
                    continue;
                }

                // Check if off screen
                if (coin.isOffScreen()) {
                    lives--;
                    document.getElementById('lives').textContent = lives;
                    coins.splice(i, 1);

                    if (lives <= 0) {
                        gameOver();
                    }
                }
            }

            requestAnimationFrame(update);
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }

        function restartGame() {
            score = 0;
            lives = 3;
            gameRunning = true;
            coinSpawnRate = 60;
            frameCount = 0;
            coins = [];
            paddle.x = width / 2 - paddle.width / 2;

            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('gameOver').style.display = 'none';

            update();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Event listeners
        window.addEventListener('resize', resize);

        // Mouse controls
        canvas.addEventListener('mousemove', (e) => {
            if (paddle) {
                paddle.targetX = e.clientX - paddle.width / 2;
            }
        });

        // Touch controls
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (paddle) {
                const touch = e.touches[0];
                paddle.targetX = touch.clientX - paddle.width / 2;
            }
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            if (paddle) {
                const touch = e.touches[0];
                paddle.targetX = touch.clientX - paddle.width / 2;
            }
        });

        // Keyboard controls
        window.addEventListener('keydown', (e) => {
            if (!paddle) return;
            if (e.key === 'ArrowLeft') {
                paddle.targetX = paddle.x - 30;
            } else if (e.key === 'ArrowRight') {
                paddle.targetX = paddle.x + 30;
            }
        });

        // Initialize
        resize();
        paddle = new Paddle();
        update();
    </script>
</body>
</html>
