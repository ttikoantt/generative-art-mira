<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Whack-a-Mole | Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 15px;
            color: white;
            font-size: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            margin-left: 5px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 400px;
            width: 100%;
        }

        .hole {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
            overflow: hidden;
        }

        .hole:hover {
            border-color: rgba(255, 255, 255, 0.3);
        }

        .mole {
            position: absolute;
            width: 80%;
            height: 80%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            border-radius: 50%;
            transition: transform 0.15s ease-out;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .mole.active {
            transform: translate(-50%, -50%) scale(1);
        }

        .mole.normal {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
        }

        .mole.golden {
            background: linear-gradient(135deg, #ffd93d, #f0c929);
            box-shadow: 0 0 30px rgba(255, 217, 61, 0.5);
        }

        .mole.bomb {
            background: linear-gradient(135deg, #6b7280, #4b5563);
            box-shadow: 0 0 30px rgba(107, 114, 128, 0.5);
        }

        .hit-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            animation: hit 0.3s ease-out;
            pointer-events: none;
        }

        @keyframes hit {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.5); }
        }

        .score-popup {
            position: absolute;
            color: white;
            font-size: 20px;
            font-weight: bold;
            pointer-events: none;
            animation: scoreUp 0.8s ease-out;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        @keyframes scoreUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 15, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            color: white;
            font-size: 36px;
            margin-bottom: 20px;
        }

        .overlay p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.6;
        }

        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            z-index: 50;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            h1 { font-size: 24px; }
            .game-grid { gap: 10px; }
            .stat { padding: 8px 15px; font-size: 12px; }
            .stat-value { font-size: 20px; }
            .mole { font-size: 30px; }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <div class="header">
            <h1>🎯 Whack-a-Mole</h1>
            <div class="stats">
                <div class="stat">
                    スコア<span class="stat-value" id="score">0</span>
                </div>
                <div class="stat">
                    時間<span class="stat-value" id="time">30</span>
                </div>
                <div class="stat">
                    レベル<span class="stat-value" id="level">1</span>
                </div>
            </div>
        </div>

        <div class="game-grid" id="gameGrid"></div>
    </div>

    <div class="overlay" id="startOverlay">
        <h2>🎯 Whack-a-Mole</h2>
        <p>
            モグラを叩いてスコアを稼ごう！<br><br>
            🔴 モグラ: +10点<br>
            🟡 ゴールデン: +30点<br>
            ⚫ 爆弾: -20点
        </p>
        <button class="btn" onclick="startGame()">スタート</button>
    </div>

    <div class="overlay hidden" id="endOverlay">
        <h2>🎉 ゲーム終了！</h2>
        <p>
            スコア: <span id="finalScore">0</span><br>
            最高レベル: <span id="finalLevel">1</span>
        </p>
        <button class="btn" onclick="startGame()">もう一度</button>
    </div>

    <script>
        const GRID_SIZE = 9;
        const GAME_DURATION = 30;
        const BASE_MOLE_TIME = 1500;

        let score = 0;
        let level = 1;
        let timeLeft = GAME_DURATION;
        let gameActive = false;
        let moleTimeout = null;
        let gameInterval = null;
        let currentMole = null;

        const gameGrid = document.getElementById('gameGrid');
        const scoreEl = document.getElementById('score');
        const timeEl = document.getElementById('time');
        const levelEl = document.getElementById('level');
        const startOverlay = document.getElementById('startOverlay');
        const endOverlay = document.getElementById('endOverlay');
        const finalScoreEl = document.getElementById('finalScore');
        const finalLevelEl = document.getElementById('finalLevel');

        // ゲームグリッドを作成
        function createGrid() {
            gameGrid.innerHTML = '';
            for (let i = 0; i < GRID_SIZE; i++) {
                const hole = document.createElement('div');
                hole.className = 'hole';
                hole.dataset.index = i;

                const mole = document.createElement('div');
                mole.className = 'mole';
                hole.appendChild(mole);

                hole.addEventListener('mousedown', () => whack(i));
                hole.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    whack(i);
                });

                gameGrid.appendChild(hole);
            }
        }

        function startGame() {
            score = 0;
            level = 1;
            timeLeft = GAME_DURATION;
            gameActive = true;

            scoreEl.textContent = score;
            timeEl.textContent = timeLeft;
            levelEl.textContent = level;

            startOverlay.classList.add('hidden');
            endOverlay.classList.add('hidden');

            createGrid();
            showMole();

            gameInterval = setInterval(() => {
                timeLeft--;
                timeEl.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameActive = false;
            clearInterval(gameInterval);
            clearTimeout(moleTimeout);

            finalScoreEl.textContent = score;
            finalLevelEl.textContent = level;

            endOverlay.classList.remove('hidden');
        }

        function showMole() {
            if (!gameActive) return;

            hideMole();

            const holes = document.querySelectorAll('.hole');
            const randomIndex = Math.floor(Math.random() * holes.length);
            const hole = holes[randomIndex];
            const mole = hole.querySelector('.mole');

            // モールのタイプを決定
            const rand = Math.random();
            let moleType = 'normal';

            if (rand < 0.1) {
                moleType = 'bomb'; // 10%
            } else if (rand < 0.25) {
                moleType = 'golden'; // 15%
            }

            mole.className = `mole ${moleType} active`;
            mole.textContent = moleType === 'normal' ? '🐹' :
                             moleType === 'golden' ? '✨' :
                             moleType === 'bomb' ? '💣' : '🐹';

            currentMole = {
                index: randomIndex,
                type: moleType,
                startTime: Date.now()
            };

            // 出現時間を計算（レベルで短くなる）
            const showTime = Math.max(500, BASE_MOLE_TIME - (level * 100));

            moleTimeout = setTimeout(() => {
                if (currentMole && currentMole.index === randomIndex) {
                    hideMole();
                    showMole();
                }
            }, showTime);
        }

        function hideMole() {
            const moles = document.querySelectorAll('.mole');
            moles.forEach(mole => {
                mole.classList.remove('active');
            });
            currentMole = null;
        }

        function whack(index) {
            if (!gameActive || !currentMole || currentMole.index !== index) return;

            const hole = document.querySelectorAll('.hole')[index];
            const mole = hole.querySelector('.mole');

            // ヒットエフェクト
            const effect = document.createElement('div');
            effect.className = 'hit-effect';
            hole.appendChild(effect);
            setTimeout(() => effect.remove(), 300);

            // スコア計算
            let points = 0;
            if (currentMole.type === 'normal') {
                points = 10;
            } else if (currentMole.type === 'golden') {
                points = 30;
            } else if (currentMole.type === 'bomb') {
                points = -20;
            }

            score += points;
            scoreEl.textContent = score;

            // スコアポップアップ
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.textContent = points > 0 ? `+${points}` : points;
            popup.style.left = '50%';
            popup.style.top = '50%';
            popup.style.transform = 'translate(-50%, -50%)';
            hole.appendChild(popup);
            setTimeout(() => popup.remove(), 800);

            // レベルアップ
            if (score >= level * 100) {
                level++;
                levelEl.textContent = level;

                // レベルアップエフェクト
                levelEl.style.color = '#ffd93d';
                setTimeout(() => levelEl.style.color = '', 500);
            }

            hideMole();
            clearTimeout(moleTimeout);

            // 次のモールを表示
            setTimeout(showMole, 200);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        createGrid();
    </script>
</body>
</html>
