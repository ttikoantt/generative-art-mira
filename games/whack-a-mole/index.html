<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Whack-a-Mole - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            font-size: 18px;
        }
        
        .stat {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 400px;
            width: 100%;
        }
        
        .hole {
            aspect-ratio: 1;
            background: rgba(139, 90, 43, 0.8);
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            border: 4px solid rgba(0,0,0,0.3);
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }
        
        .hole:active {
            transform: scale(0.95);
        }
        
        .mole {
            position: absolute;
            bottom: -100%;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 70%;
            background: linear-gradient(180deg, #8B4513 0%, #654321 100%);
            border-radius: 50% 50% 0 0;
            transition: bottom 0.15s ease-out;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }
        
        .mole.up {
            bottom: 10%;
        }
        
        .mole::before {
            content: '🐹';
            font-size: min(40px, 8vw);
        }
        
        .mole.whacked {
            background: linear-gradient(180deg, #ff6b6b 0%, #c92a2a 100%);
        }
        
        .mole.whacked::before {
            content: '😵';
        }
        
        .start-btn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 20px;
            background: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        
        .start-btn:hover {
            transform: scale(1.05);
        }
        
        .start-btn:active {
            transform: scale(0.95);
        }
        
        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 1000;
        }
        
        .game-over h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }
        
        .game-over p {
            font-size: 24px;
            margin-bottom: 30px;
        }
        
        .game-over .restart-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            backdrop-filter: blur(10px);
        }
        
        @media (max-width: 480px) {
            .header h1 {
                font-size: 22px;
            }
            .stats {
                gap: 15px;
                font-size: 16px;
            }
            .game-board {
                gap: 10px;
                max-width: 320px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>
    
    <div class="header">
        <h1>🐹 Whack-a-Mole</h1>
        <div class="stats">
            <div class="stat">スコア: <span id="score">0</span></div>
            <div class="stat">時間: <span id="timer">30</span>s</div>
        </div>
    </div>
    
    <div class="game-board" id="gameBoard"></div>
    
    <button class="start-btn" id="startBtn">スタート</button>
    
    <div class="game-over" id="gameOver" style="display: none;">
        <h2>🎮 ゲームオーバー!</h2>
        <p>最終スコア: <span id="finalScore">0</span></p>
        <button class="restart-btn" id="restartBtn">もう一度</button>
    </div>
    
    <script>
        const gameBoard = document.getElementById('gameBoard');
        const startBtn = document.getElementById('startBtn');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        
        let score = 0;
        let timeLeft = 30;
        let gameTimer;
        let moleTimer;
        let isPlaying = false;
        let currentMole = null;
        
        // Create holes
        for (let i = 0; i < 9; i++) {
            const hole = document.createElement('div');
            hole.className = 'hole';
            hole.innerHTML = '<div class="mole"></div>';
            hole.addEventListener('click', whackMole);
            gameBoard.appendChild(hole);
        }
        
        function randomHole() {
            const holes = document.querySelectorAll('.hole');
            const idx = Math.floor(Math.random() * holes.length);
            return holes[idx];
        }
        
        function showMole() {
            if (!isPlaying) return;
            
            // Hide previous mole
            if (currentMole) {
                currentMole.querySelector('.mole').classList.remove('up');
            }
            
            const hole = randomHole();
            const mole = hole.querySelector('.mole');
            mole.classList.remove('whacked');
            mole.classList.add('up');
            currentMole = hole;
            
            // Hide mole after random time
            const showTime = Math.random() * 1000 + 600;
            setTimeout(() => {
                if (mole.classList.contains('up') && !mole.classList.contains('whacked')) {
                    mole.classList.remove('up');
                }
            }, showTime);
            
            // Schedule next mole
            const nextTime = Math.random() * 800 + 400;
            moleTimer = setTimeout(showMole, nextTime);
        }
        
        function whackMole(e) {
            if (!isPlaying) return;
            
            const mole = e.currentTarget.querySelector('.mole');
            if (mole.classList.contains('up') && !mole.classList.contains('whacked')) {
                mole.classList.add('whacked');
                score += 10;
                scoreEl.textContent = score;
                
                // Hide whacked mole
                setTimeout(() => {
                    mole.classList.remove('up', 'whacked');
                }, 300);
            }
        }
        
        function startGame() {
            score = 0;
            timeLeft = 30;
            scoreEl.textContent = score;
            timerEl.textContent = timeLeft;
            isPlaying = true;
            
            startBtn.disabled = true;
            gameOverEl.style.display = 'none';
            
            showMole();
            
            gameTimer = setInterval(() => {
                timeLeft--;
                timerEl.textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }
        
        function endGame() {
            isPlaying = false;
            clearInterval(gameTimer);
            clearTimeout(moleTimer);
            
            if (currentMole) {
                currentMole.querySelector('.mole').classList.remove('up');
            }
            
            finalScoreEl.textContent = score;
            gameOverEl.style.display = 'flex';
            startBtn.disabled = false;
        }
        
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);
        
        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });
    </script>
</body>
</html>
