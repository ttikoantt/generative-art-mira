<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Mole - もぐらたたき</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            touch-action: manipulation;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            color: #fff;
        }

        .header h1 {
            font-size: clamp(20px, 5vw, 32px);
            margin-bottom: 10px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            color: #fff;
            font-size: clamp(14px, 3vw, 18px);
            backdrop-filter: blur(10px);
        }

        .stat-value {
            font-size: clamp(20px, 5vw, 28px);
            font-weight: bold;
            color: #ffd700;
        }

        .game-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 400px;
            width: 100%;
            margin-bottom: 20px;
        }

        .hole {
            aspect-ratio: 1;
            background: radial-gradient(ellipse at center, #2d2d2d 0%, #1a1a1a 100%);
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            border: 3px solid #3d3d3d;
            box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s;
        }

        .hole:active {
            transform: scale(0.95);
        }

        .mole {
            position: absolute;
            bottom: -100%;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 70%;
            background: linear-gradient(135deg, #8B4513 0%, #A0522D 100%);
            border-radius: 50% 50% 40% 40%;
            transition: bottom 0.2s ease-out;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(30px, 8vw, 50px);
        }

        .mole.up {
            bottom: 0;
        }

        .mole.hit {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
        }

        .mole::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            width: 15%;
            height: 15%;
            background: #000;
            border-radius: 50%;
            box-shadow: 25px 0 0 #000;
        }

        .mole::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30%;
            height: 20%;
            background: #ff9999;
            border-radius: 50%;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4a 100%);
            color: #1a1a2e;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: clamp(14px, 3vw, 18px);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            border: 1px solid #ffd700;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 215, 0, 0.4);
        }

        .combo-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(40px, 10vw, 80px);
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }

        .combo-display.show {
            opacity: 1;
            animation: comboAnim 0.5s ease-out;
        }

        @keyframes comboAnim {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @media (max-width: 480px) {
            .game-container {
                gap: 10px;
                max-width: 320px;
            }

            .stats {
                gap: 10px;
            }

            .stat {
                padding: 8px 15px;
                font-size: 12px;
            }

            .stat-value {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="header">
        <h1>🔨 Whack-a-Mole</h1>
        <div class="stats">
            <div class="stat">
                <div>スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div>時間</div>
                <div class="stat-value" id="time">30</div>
            </div>
            <div class="stat">
                <div>コンボ</div>
                <div class="stat-value" id="combo">0</div>
            </div>
        </div>
    </div>

    <div class="game-container" id="gameContainer">
        <div class="hole" data-index="0"><div class="mole">🐹</div></div>
        <div class="hole" data-index="1"><div class="mole">🐹</div></div>
        <div class="hole" data-index="2"><div class="mole">🐹</div></div>
        <div class="hole" data-index="3"><div class="mole">🐹</div></div>
        <div class="hole" data-index="4"><div class="mole">🐹</div></div>
        <div class="hole" data-index="5"><div class="mole">🐹</div></div>
        <div class="hole" data-index="6"><div class="mole">🐹</div></div>
        <div class="hole" data-index="7"><div class="mole">🐹</div></div>
        <div class="hole" data-index="8"><div class="mole">🐹</div></div>
    </div>

    <div class="controls">
        <button class="btn" id="startBtn" onclick="startGame()">スタート</button>
        <button class="btn" id="resetBtn" onclick="resetGame()">リセット</button>
    </div>

    <div class="combo-display" id="comboDisplay"></div>

    <script>
        let score = 0;
        let timeLeft = 30;
        let combo = 0;
        let gameInterval;
        let moleInterval;
        let isPlaying = false;
        let currentMole = null;
        let moleTimeout;

        const scoreEl = document.getElementById('score');
        const timeEl = document.getElementById('time');
        const comboEl = document.getElementById('combo');
        const startBtn = document.getElementById('startBtn');
        const holes = document.querySelectorAll('.hole');
        const comboDisplay = document.getElementById('comboDisplay');

        function randomHole() {
            const index = Math.floor(Math.random() * holes.length);
            return holes[index];
        }

        function showMole() {
            if (!isPlaying) return;

            // Hide current mole
            if (currentMole) {
                currentMole.classList.remove('up');
            }

            // Show new mole
            const hole = randomHole();
            const mole = hole.querySelector('.mole');
            mole.classList.remove('hit');
            mole.classList.add('up');
            currentMole = mole;

            // Random display time (decreases as score increases)
            const baseTime = 1500;
            const difficultyBonus = Math.min(score * 10, 800);
            const displayTime = baseTime - difficultyBonus + Math.random() * 500;

            moleTimeout = setTimeout(() => {
                if (mole.classList.contains('up') && !mole.classList.contains('hit')) {
                    mole.classList.remove('up');
                    combo = 0; // Reset combo on miss
                    comboEl.textContent = combo;
                }
            }, displayTime);
        }

        function whack(e) {
            if (!isPlaying) return;

            const hole = e.currentTarget;
            const mole = hole.querySelector('.mole');

            if (!mole.classList.contains('up') || mole.classList.contains('hit')) {
                return;
            }

            // Hit!
            clearTimeout(moleTimeout);
            mole.classList.add('hit');
            mole.classList.remove('up');

            combo++;
            const points = 10 + Math.min(combo * 5, 40); // Bonus for combo
            score += points;
            scoreEl.textContent = score;
            comboEl.textContent = combo;

            // Show combo display
            if (combo >= 3) {
                comboDisplay.textContent = `${combo} Combo!`;
                comboDisplay.classList.add('show');
                setTimeout(() => {
                    comboDisplay.classList.remove('show');
                }, 500);
            }
        }

        function startGame() {
            if (isPlaying) return;

            isPlaying = true;
            startBtn.disabled = true;
            score = 0;
            timeLeft = 30;
            combo = 0;
            scoreEl.textContent = score;
            timeEl.textContent = timeLeft;
            comboEl.textContent = combo;

            // Game timer
            gameInterval = setInterval(() => {
                timeLeft--;
                timeEl.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // Mole spawning
            moleInterval = setInterval(() => {
                showMole();
            }, 800);

            showMole();
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameInterval);
            clearInterval(moleInterval);
            clearTimeout(moleTimeout);
            startBtn.disabled = false;

            if (currentMole) {
                currentMole.classList.remove('up');
            }

            // Show final score
            comboDisplay.textContent = `🎉 ${score}点!`;
            comboDisplay.classList.add('show');
            setTimeout(() => {
                comboDisplay.classList.remove('show');
            }, 2000);
        }

        function resetGame() {
            isPlaying = false;
            clearInterval(gameInterval);
            clearInterval(moleInterval);
            clearTimeout(moleTimeout);
            startBtn.disabled = false;

            score = 0;
            timeLeft = 30;
            combo = 0;
            scoreEl.textContent = score;
            timeEl.textContent = timeLeft;
            comboEl.textContent = combo;

            holes.forEach(hole => {
                const mole = hole.querySelector('.mole');
                mole.classList.remove('up', 'hit');
            });
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Event listeners
        holes.forEach(hole => {
            hole.addEventListener('mousedown', whack);
            hole.addEventListener('touchstart', (e) => {
                e.preventDefault();
                whack(e);
            });
        });
    </script>
</body>
</html>
