<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>もぐらたたき</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
            touch-action: manipulation;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 28px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            color: white;
            font-size: 20px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.8;
        }

        .stat-value {
            font-weight: bold;
            font-size: 28px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .hole {
            aspect-ratio: 1;
            background: #4a3728;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            box-shadow: inset 0 -5px 10px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }

        .hole:active {
            transform: scale(0.95);
        }

        .mole {
            position: absolute;
            width: 70%;
            height: 70%;
            background: #8B4513;
            border-radius: 50% 50% 40% 40%;
            left: 15%;
            top: 100%;
            transition: top 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 -5px 10px rgba(0,0,0,0.3);
        }

        .mole.up {
            top: 15%;
        }

        .mole::before {
            content: '';
            position: absolute;
            width: 20%;
            height: 20%;
            background: black;
            border-radius: 50%;
            top: 30%;
            left: 25%;
        }

        .mole::after {
            content: '';
            position: absolute;
            width: 20%;
            height: 20%;
            background: black;
            border-radius: 50%;
            top: 30%;
            right: 25%;
        }

        .mole.hit {
            background: #ff6b6b;
            transform: scale(0.9);
        }

        .mole.hit::before,
        .mole.hit::after {
            content: '×';
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-start {
            background: #4CAF50;
            color: white;
        }

        .btn-start:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        .btn-reset {
            background: #f44336;
            color: white;
        }

        .btn-reset:hover {
            background: #da190b;
            transform: scale(1.05);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .game-over {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 200;
        }

        .game-over.show {
            display: block;
        }

        .game-over h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        .game-over p {
            font-size: 24px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 22px;
            }

            .stats {
                font-size: 16px;
            }

            .stat {
                padding: 10px 15px;
            }

            .stat-value {
                font-size: 22px;
            }

            .mole {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🔨 もぐらたたき</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">時間</div>
                <div class="stat-value" id="time">60</div>
            </div>
        </div>

        <div class="grid">
            <div class="hole" data-index="0">
                <div class="mole"></div>
            </div>
            <div class="hole" data-index="1">
                <div class="mole"></div>
            </div>
            <div class="hole" data-index="2">
                <div class="mole"></div>
            </div>
            <div class="hole" data-index="3">
                <div class="mole"></div>
            </div>
            <div class="hole" data-index="4">
                <div class="mole"></div>
            </div>
            <div class="hole" data-index="5">
                <div class="mole"></div>
            </div>
            <div class="hole" data-index="6">
                <div class="mole"></div>
            </div>
            <div class="hole" data-index="7">
                <div class="mole"></div>
            </div>
            <div class="hole" data-index="8">
                <div class="mole"></div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-start" onclick="startGame()">スタート</button>
            <button class="btn btn-reset" onclick="resetGame()">リセット</button>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>🎉 ゲームオーバー！</h2>
        <p>最終スコア: <span id="finalScore">0</span></p>
        <button class="btn btn-start" onclick="resetGame()">もう一度</button>
    </div>

    <script>
        let score = 0;
        let timeLeft = 60;
        let gameRunning = false;
        let moleTimer;
        let countdownTimer;
        let currentMole = null;
        let moleSpeed = 1000;

        const holes = document.querySelectorAll('.hole');
        const moles = document.querySelectorAll('.mole');
        const scoreDisplay = document.getElementById('score');
        const timeDisplay = document.getElementById('time');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreDisplay = document.getElementById('finalScore');

        // Start game
        function startGame() {
            if (gameRunning) return;

            gameRunning = true;
            score = 0;
            timeLeft = 60;
            moleSpeed = 1000;

            scoreDisplay.textContent = score;
            timeDisplay.textContent = timeLeft;
            gameOverScreen.classList.remove('show');

            // Start mole spawning
            moleTimer = setInterval(spawnMole, moleSpeed);

            // Start countdown
            countdownTimer = setInterval(() => {
                timeLeft--;
                timeDisplay.textContent = timeLeft;

                // Increase difficulty
                if (timeLeft % 10 === 0 && moleSpeed > 400) {
                    moleSpeed -= 100;
                    clearInterval(moleTimer);
                    moleTimer = setInterval(spawnMole, moleSpeed);
                }

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        // Spawn mole
        function spawnMole() {
            // Hide current mole
            if (currentMole !== null) {
                moles[currentMole].classList.remove('up');
            }

            // Show new mole
            const randomHole = Math.floor(Math.random() * 9);
            currentMole = randomHole;
            moles[randomHole].classList.add('up');

            // Auto hide after delay
            setTimeout(() => {
                if (currentMole === randomHole) {
                    moles[randomHole].classList.remove('up');
                    currentMole = null;
                }
            }, moleSpeed * 0.8);
        }

        // Whack mole
        holes.forEach((hole, index) => {
            hole.addEventListener('click', () => {
                if (!gameRunning) return;

                const mole = moles[index];
                if (mole.classList.contains('up') && !mole.classList.contains('hit')) {
                    // Hit!
                    score += 10;
                    scoreDisplay.textContent = score;
                    mole.classList.add('hit');

                    setTimeout(() => {
                        mole.classList.remove('up', 'hit');
                        currentMole = null;
                    }, 200);
                }
            });

            // Touch support
            hole.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (!gameRunning) return;

                const mole = moles[index];
                if (mole.classList.contains('up') && !mole.classList.contains('hit')) {
                    score += 10;
                    scoreDisplay.textContent = score;
                    mole.classList.add('hit');

                    setTimeout(() => {
                        mole.classList.remove('up', 'hit');
                        currentMole = null;
                    }, 200);
                }
            });
        });

        // End game
        function endGame() {
            gameRunning = false;
            clearInterval(moleTimer);
            clearInterval(countdownTimer);

            // Hide all moles
            moles.forEach(mole => mole.classList.remove('up'));

            // Show game over screen
            finalScoreDisplay.textContent = score;
            gameOverScreen.classList.add('show');
        }

        // Reset game
        function resetGame() {
            gameRunning = false;
            clearInterval(moleTimer);
            clearInterval(countdownTimer);

            score = 0;
            timeLeft = 60;
            moleSpeed = 1000;

            scoreDisplay.textContent = score;
            timeDisplay.textContent = timeLeft;
            gameOverScreen.classList.remove('show');

            // Hide all moles
            moles.forEach(mole => mole.classList.remove('up', 'hit'));
            currentMole = null;
        }

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
