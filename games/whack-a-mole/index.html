<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Whack-a-Mole: もぐらたたき</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
            color: #ffffff;
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 200, 100, 0.5);
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-label {
            font-size: 0.9rem;
            color: #aaaaaa;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffffff;
        }

        #score { color: #ffd700; }
        #time { color: #00ff88; }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
            max-width: 500px;
            width: 100%;
        }

        .hole {
            aspect-ratio: 1;
            background: radial-gradient(circle at center, #2a2a3e 0%, #1a1a2e 100%);
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .hole:active {
            transform: scale(0.95);
        }

        .hole::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: radial-gradient(ellipse at center, #0a0a15 0%, transparent 70%);
            border-radius: 0 0 50% 50%;
        }

        .mole {
            position: absolute;
            bottom: -60%;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 70%;
            background: linear-gradient(135deg, #8B4513 0%, #654321 100%);
            border-radius: 50% 50% 0 0;
            transition: bottom 0.2s ease-out;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.3);
        }

        .mole.up {
            bottom: 20%;
        }

        .mole.whacked {
            animation: whack 0.3s ease-out;
        }

        @keyframes whack {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.3); }
            100% { transform: translateX(-50%) scale(0); bottom: -60%; }
        }

        .mole-face {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .mole-eyes {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20%;
        }

        .mole-eye {
            width: 15%;
            height: 15%;
            background: #ffffff;
            border-radius: 50%;
            position: relative;
        }

        .mole-eye::after {
            content: '';
            position: absolute;
            top: 30%;
            left: 30%;
            width: 40%;
            height: 40%;
            background: #000000;
            border-radius: 50%;
        }

        .mole-nose {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translateX(-50%);
            width: 25%;
            height: 20%;
            background: #ff9999;
            border-radius: 50%;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: #ffffff;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            touch-action: manipulation;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px 20px;
            backdrop-filter: blur(10px);
            box-shadow: none;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: none;
            box-shadow: none;
        }

        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ffffff;
        }

        .game-over.show {
            display: flex;
        }

        .game-over h2 {
            font-size: clamp(2rem, 8vw, 4rem);
            margin-bottom: 20px;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        .final-score {
            font-size: clamp(1.5rem, 5vw, 3rem);
            margin-bottom: 30px;
        }

        @media (max-width: 480px) {
            .game-grid {
                gap: 10px;
            }

            .stats {
                gap: 15px;
            }

            .stat {
                padding: 10px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="game-header">
        <h1>🔨 Whack-a-Mole</h1>
        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">時間</div>
                <div class="stat-value" id="time">30</div>
            </div>
        </div>
    </div>

    <div class="game-grid" id="gameGrid"></div>

    <div class="controls">
        <button id="startBtn" onclick="startGame()">ゲーム開始</button>
        <button onclick="resetHighScore()">ハイスコアリセット</button>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-over" id="gameOver">
        <h2>🎉 ゲームオーバー！</h2>
        <div class="final-score">
            スコア: <span id="finalScore">0</span><br>
            ハイスコア: <span id="highScore">0</span>
        </div>
        <button onclick="restartGame()">もう一度</button>
    </div>

    <script>
        const GRID_SIZE = 9;
        const GAME_DURATION = 30;
        const MOLE_UP_TIME = 1000;

        let score = 0;
        let timeLeft = GAME_DURATION;
        let gameInterval = null;
        let timerInterval = null;
        let isPlaying = false;
        let currentMole = null;
        let highScore = localStorage.getItem('whackAMoleHighScore') || 0;

        function createGrid() {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';

            for (let i = 0; i < GRID_SIZE; i++) {
                const hole = document.createElement('div');
                hole.className = 'hole';
                hole.dataset.index = i;

                const mole = document.createElement('div');
                mole.className = 'mole';

                const face = document.createElement('div');
                face.className = 'mole-face';

                const eyes = document.createElement('div');
                eyes.className = 'mole-eyes';

                for (let j = 0; j < 2; j++) {
                    const eye = document.createElement('div');
                    eye.className = 'mole-eye';
                    eyes.appendChild(eye);
                }

                const nose = document.createElement('div');
                nose.className = 'mole-nose';

                face.appendChild(eyes);
                face.appendChild(nose);
                mole.appendChild(face);
                hole.appendChild(mole);

                hole.addEventListener('click', () => whackMole(i));
                hole.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    whackMole(i);
                });

                grid.appendChild(hole);
            }
        }

        function whackMole(index) {
            if (!isPlaying) return;

            const mole = document.querySelector(`.hole[data-index="${index}"] .mole`);

            if (mole.classList.contains('up') && !mole.classList.contains('whacked')) {
                mole.classList.add('whacked');
                mole.classList.remove('up');
                score += 10;
                document.getElementById('score').textContent = score;

                setTimeout(() => {
                    mole.classList.remove('whacked');
                }, 300);
            }
        }

        function showRandomMole() {
            if (!isPlaying) return;

            hideMole();

            const availableHoles = [];
            for (let i = 0; i < GRID_SIZE; i++) {
                const mole = document.querySelector(`.hole[data-index="${i}"] .mole`);
                if (!mole.classList.contains('whacked')) {
                    availableHoles.push(i);
                }
            }

            if (availableHoles.length === 0) return;

            const randomIndex = availableHoles[Math.floor(Math.random() * availableHoles.length)];
            const mole = document.querySelector(`.hole[data-index="${randomIndex}"] .mole`);
            mole.classList.add('up');
            currentMole = randomIndex;

            setTimeout(() => {
                if (isPlaying && currentMole === randomIndex) {
                    hideMole();
                }
            }, MOLE_UP_TIME);
        }

        function hideMole() {
            if (currentMole !== null) {
                const mole = document.querySelector(`.hole[data-index="${currentMole}"] .mole`);
                mole.classList.remove('up');
                currentMole = null;
            }
        }

        function startGame() {
            score = 0;
            timeLeft = GAME_DURATION;
            isPlaying = true;

            document.getElementById('score').textContent = score;
            document.getElementById('time').textContent = timeLeft;
            document.getElementById('startBtn').disabled = true;

            gameInterval = setInterval(showRandomMole, 800);

            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('time').textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameInterval);
            clearInterval(timerInterval);
            hideMole();

            document.getElementById('startBtn').disabled = false;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('whackAMoleHighScore', highScore);
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('highScore').textContent = highScore;
            document.getElementById('gameOver').classList.add('show');
        }

        function restartGame() {
            document.getElementById('gameOver').classList.remove('show');
            startGame();
        }

        function resetHighScore() {
            if (confirm('ハイスコアをリセットしますか？')) {
                highScore = 0;
                localStorage.setItem('whackAMoleHighScore', 0);
                alert('ハイスコアをリセットしました');
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('全画面エラー:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        createGrid();
    </script>
</body>
</html>
