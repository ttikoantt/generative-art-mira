<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Mole</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 32px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            font-weight: 600;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }
        
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .hole {
            aspect-ratio: 1;
            background: linear-gradient(145deg, #8B4513, #654321);
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            box-shadow: inset 0 -10px 20px rgba(0,0,0,0.4),
                        0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.1s ease;
        }
        
        .hole:active {
            transform: scale(0.95);
        }
        
        .mole {
            position: absolute;
            bottom: -100%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 80%;
            transition: bottom 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none;
        }
        
        .hole.active .mole {
            bottom: 10%;
            pointer-events: auto;
        }
        
        .mole-body {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #D2691E, #8B4513);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .mole-face {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 40%;
        }
        
        .mole-eye {
            position: absolute;
            width: 12px;
            height: 14px;
            background: white;
            border-radius: 50%;
            top: 0;
        }
        
        .mole-eye::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: #333;
            border-radius: 50%;
            top: 4px;
            left: 3px;
        }
        
        .mole-eye.left {
            left: 15%;
        }
        
        .mole-eye.right {
            right: 15%;
        }
        
        .mole-nose {
            position: absolute;
            width: 16px;
            height: 12px;
            background: #FFB6C1;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .hole.whacked .mole {
            animation: whacked 0.3s ease-out forwards;
        }
        
        @keyframes whacked {
            0% {
                transform: translateX(-50%) scale(1);
            }
            50% {
                transform: translateX(-50%) scale(1.2) rotate(10deg);
            }
            100% {
                transform: translateX(-50%) scale(0);
                bottom: -100%;
            }
        }
        
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-secondary {
            background: white;
            color: #667eea;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }
        
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }
        
        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .game-over.show {
            display: flex;
        }
        
        .game-over-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.3s ease-out;
        }
        
        @keyframes popIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .game-over h2 {
            font-size: 36px;
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .final-score {
            font-size: 64px;
            font-weight: bold;
            color: #764ba2;
            margin: 20px 0;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 24px;
            }
            
            .game-board {
                gap: 10px;
            }
            
            .stat-value {
                font-size: 24px;
            }
            
            .btn {
                padding: 12px 24px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    
    <div class="container">
        <h1>🐹 Whack-a-Mole</h1>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">TIME</div>
                <div class="stat-value" id="time">30</div>
            </div>
            <div class="stat">
                <div class="stat-label">HIGH SCORE</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>
        
        <div class="game-board" id="gameBoard">
            <!-- 9 holes will be generated -->
        </div>
        
        <div class="controls">
            <button class="btn btn-primary" id="startBtn" onclick="startGame()">Start Game</button>
            <button class="btn btn-secondary" onclick="resetGame()">Reset</button>
        </div>
    </div>
    
    <div class="game-over" id="gameOver">
        <div class="game-over-content">
            <h2>🎉 Game Over!</h2>
            <div class="final-score" id="finalScore">0</div>
            <p style="color: #666; margin-bottom: 20px;">Points</p>
            <button class="btn btn-primary" onclick="closeGameOver()">Play Again</button>
        </div>
    </div>
    
    <script>
        let score = 0;
        let timeLeft = 30;
        let highScore = localStorage.getItem('whackHighScore') || 0;
        let gameActive = false;
        let moleTimer = null;
        let countdownTimer = null;
        let currentHole = null;
        
        const scoreDisplay = document.getElementById('score');
        const timeDisplay = document.getElementById('time');
        const highScoreDisplay = document.getElementById('highScore');
        const gameBoard = document.getElementById('gameBoard');
        const startBtn = document.getElementById('startBtn');
        const gameOverModal = document.getElementById('gameOver');
        const finalScoreDisplay = document.getElementById('finalScore');
        
        // Initialize
        highScoreDisplay.textContent = highScore;
        createHoles();
        
        function createHoles() {
            for (let i = 0; i < 9; i++) {
                const hole = document.createElement('div');
                hole.className = 'hole';
                hole.dataset.index = i;
                
                const mole = document.createElement('div');
                mole.className = 'mole';
                
                const moleBody = document.createElement('div');
                moleBody.className = 'mole-body';
                
                const moleFace = document.createElement('div');
                moleFace.className = 'mole-face';
                
                const leftEye = document.createElement('div');
                leftEye.className = 'mole-eye left';
                
                const rightEye = document.createElement('div');
                rightEye.className = 'mole-eye right';
                
                const nose = document.createElement('div');
                nose.className = 'mole-nose';
                
                moleFace.appendChild(leftEye);
                moleFace.appendChild(rightEye);
                moleFace.appendChild(nose);
                moleBody.appendChild(moleFace);
                mole.appendChild(moleBody);
                hole.appendChild(mole);
                
                hole.addEventListener('click', () => whackMole(hole));
                
                gameBoard.appendChild(hole);
            }
        }
        
        function startGame() {
            if (gameActive) return;
            
            gameActive = true;
            score = 0;
            timeLeft = 30;
            
            scoreDisplay.textContent = score;
            timeDisplay.textContent = timeLeft;
            startBtn.disabled = true;
            
            // Start countdown
            countdownTimer = setInterval(() => {
                timeLeft--;
                timeDisplay.textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
            
            // Start showing moles
            showMole();
        }
        
        function showMole() {
            if (!gameActive) return;
            
            const holes = document.querySelectorAll('.hole');
            
            // Clear previous mole
            if (currentHole !== null) {
                holes[currentHole].classList.remove('active');
            }
            
            // Pick random hole (different from current)
            let newHole;
            do {
                newHole = Math.floor(Math.random() * holes.length);
            } while (newHole === currentHole);
            
            currentHole = newHole;
            holes[currentHole].classList.add('active');
            
            // Mole stays up for random time (faster as score increases)
            const difficulty = Math.max(500, 1500 - score * 20);
            const stayTime = 500 + Math.random() * difficulty;
            
            setTimeout(() => {
                if (gameActive && holes[currentHole].classList.contains('active')) {
                    holes[currentHole].classList.remove('active');
                    currentHole = null;
                    
                    // Schedule next mole
                    const nextDelay = Math.max(300, 800 - score * 10);
                    moleTimer = setTimeout(showMole, nextDelay);
                }
            }, stayTime);
        }
        
        function whackMole(hole) {
            if (!gameActive || !hole.classList.contains('active')) return;
            
            hole.classList.remove('active');
            hole.classList.add('whacked');
            
            score += 10;
            scoreDisplay.textContent = score;
            
            // Update high score
            if (score > highScore) {
                highScore = score;
                highScoreDisplay.textContent = highScore;
                localStorage.setItem('whackHighScore', highScore);
            }
            
            setTimeout(() => {
                hole.classList.remove('whacked');
            }, 300);
            
            // Show next mole faster
            clearTimeout(moleTimer);
            const nextDelay = Math.max(200, 600 - score * 10);
            moleTimer = setTimeout(showMole, nextDelay);
        }
        
        function endGame() {
            gameActive = false;
            clearInterval(countdownTimer);
            clearTimeout(moleTimer);
            
            const holes = document.querySelectorAll('.hole');
            holes.forEach(hole => {
                hole.classList.remove('active');
            });
            
            startBtn.disabled = false;
            
            finalScoreDisplay.textContent = score;
            gameOverModal.classList.add('show');
        }
        
        function closeGameOver() {
            gameOverModal.classList.remove('show');
            resetGame();
        }
        
        function resetGame() {
            gameActive = false;
            clearInterval(countdownTimer);
            clearTimeout(moleTimer);
            
            const holes = document.querySelectorAll('.hole');
            holes.forEach(hole => {
                hole.classList.remove('active', 'whacked');
            });
            
            score = 0;
            timeLeft = 30;
            scoreDisplay.textContent = score;
            timeDisplay.textContent = timeLeft;
            startBtn.disabled = false;
            currentHole = null;
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
