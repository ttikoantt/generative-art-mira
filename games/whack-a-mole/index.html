<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Whack-a-Mole Lite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a, #1a1a3a);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            padding: 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            color: #ff6b6b;
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 2px solid rgba(255, 107, 107, 0.3);
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #7fffd4;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(127, 255, 212, 0.5);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 2px solid rgba(255, 107, 107, 0.2);
        }

        .hole {
            aspect-ratio: 1;
            background: radial-gradient(circle, #2a2a4a, #1a1a3a);
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            border: 3px solid rgba(255, 107, 107, 0.3);
            transition: all 0.2s ease;
            box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        .hole:active {
            transform: scale(0.95);
        }

        .mole {
            position: absolute;
            width: 70%;
            height: 70%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            border-radius: 50%;
            transition: transform 0.1s ease;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.6);
        }

        .mole.active {
            transform: translate(-50%, -50%) scale(1);
            animation: moleAppear 0.2s ease;
        }

        .mole::before {
            content: '🐹';
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        @keyframes moleAppear {
            0% { transform: translate(-50%, -50%) scale(0); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        .hit-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: radial-gradient(circle, rgba(127, 255, 212, 0.8), transparent);
            border-radius: 50%;
            animation: hitEffect 0.3s ease;
            pointer-events: none;
        }

        @keyframes hitEffect {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.4);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.6);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-over.show {
            display: flex;
        }

        .game-over-content {
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, #1a1a3a, #2a2a5a);
            border-radius: 20px;
            border: 3px solid #ff6b6b;
            box-shadow: 0 0 40px rgba(255, 107, 107, 0.5);
        }

        .game-over h2 {
            color: #ff6b6b;
            font-size: 2rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }

        .final-score {
            color: #7fffd4;
            font-size: 3rem;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(127, 255, 212, 0.5);
        }

        .fullscreen-btn {
            margin-top: 15px;
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.1);
            color: #7fffd4;
            border: 2px solid #7fffd4;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
        }

        .fullscreen-btn:hover {
            background: rgba(127, 255, 212, 0.2);
            box-shadow: 0 0 15px rgba(127, 255, 212, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐹 Whack-a-Mole Lite</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">TIME</div>
                <div class="stat-value" id="time">30</div>
            </div>
        </div>

        <div class="game-board" id="gameBoard">
            <!-- 9 holes -->
        </div>

        <button class="btn" id="startBtn" onclick="startGame()">🎮 START</button>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">🖥️ 全画面</button>
    </div>

    <div class="game-over" id="gameOver">
        <div class="game-over-content">
            <h2>🎉 Game Over!</h2>
            <div class="final-score" id="finalScore">0</div>
            <button class="btn" onclick="restartGame()">🔄 Play Again</button>
        </div>
    </div>

    <script>
        // ゲーム状態
        let score = 0;
        let timeLeft = 30;
        let gameRunning = false;
        let moleInterval = null;
        let countdownInterval = null;
        let activeHole = null;

        // DOM要素
        const gameBoard = document.getElementById('gameBoard');
        const scoreDisplay = document.getElementById('score');
        const timeDisplay = document.getElementById('time');
        const startBtn = document.getElementById('startBtn');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreDisplay = document.getElementById('finalScore');

        // ゲームボードを初期化
        function initBoard() {
            gameBoard.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const hole = document.createElement('div');
                hole.className = 'hole';
                hole.dataset.index = i;

                const mole = document.createElement('div');
                mole.className = 'mole';

                hole.appendChild(mole);
                hole.addEventListener('click', () => whackMole(i));
                hole.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    whackMole(i);
                });

                gameBoard.appendChild(hole);
            }
        }

        // もぐらを叩く
        function whackMole(index) {
            if (!gameRunning) return;

            const hole = gameBoard.children[index];
            const mole = hole.querySelector('.mole');

            if (mole.classList.contains('active')) {
                mole.classList.remove('active');
                score += 10;
                scoreDisplay.textContent = score;

                // ヒットエフェクト
                const effect = document.createElement('div');
                effect.className = 'hit-effect';
                hole.appendChild(effect);
                setTimeout(() => effect.remove(), 300);

                // 次のもぐらをすぐに表示
                setTimeout(showMole, 200);
            }
        }

        // もぐらを表示
        function showMole() {
            if (!gameRunning) return;

            // 前のもぐらを隠す
            if (activeHole !== null) {
                const prevHole = gameBoard.children[activeHole];
                const prevMole = prevHole.querySelector('.mole');
                prevMole.classList.remove('active');
            }

            // ランダムな穴を選択
            let newHole;
            do {
                newHole = Math.floor(Math.random() * 9);
            } while (newHole === activeHole);

            activeHole = newHole;
            const hole = gameBoard.children[activeHole];
            const mole = hole.querySelector('.mole');
            mole.classList.add('active');

            // 自動的に隠す（難易度調整）
            const hideTime = Math.max(500, 1500 - score * 5);
            setTimeout(() => {
                if (mole.classList.contains('active')) {
                    mole.classList.remove('active');
                    if (gameRunning) {
                        setTimeout(showMole, 300);
                    }
                }
            }, hideTime);
        }

        // ゲーム開始
        function startGame() {
            score = 0;
            timeLeft = 30;
            gameRunning = true;

            scoreDisplay.textContent = score;
            timeDisplay.textContent = timeLeft;
            startBtn.textContent = '🎮 Playing...';
            startBtn.disabled = true;

            // カウントダウン
            countdownInterval = setInterval(() => {
                timeLeft--;
                timeDisplay.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // もぐらを表示開始
            showMole();
        }

        // ゲーム終了
        function endGame() {
            gameRunning = false;
            clearInterval(countdownInterval);

            if (activeHole !== null) {
                const hole = gameBoard.children[activeHole];
                const mole = hole.querySelector('.mole');
                mole.classList.remove('active');
            }

            finalScoreDisplay.textContent = score;
            gameOverScreen.classList.add('show');
            startBtn.textContent = '🎮 START';
            startBtn.disabled = false;
        }

        // ゲーム再開
        function restartGame() {
            gameOverScreen.classList.remove('show');
            startGame();
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        initBoard();
    </script>
</body>
</html>
