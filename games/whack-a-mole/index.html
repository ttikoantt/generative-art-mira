<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>もぐらたたき - Whack-a-Mole</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #764ba2;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px auto;
            max-width: 400px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .hole {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: radial-gradient(ellipse at center, #3d2914 0%, #5c3d1e 100%);
            border-radius: 50%;
            cursor: pointer;
            overflow: hidden;
            box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s ease;
        }

        .hole:active {
            transform: scale(0.95);
        }

        .hole::before {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 120%;
            height: 30px;
            background: radial-gradient(ellipse at center, #4a3420 0%, #2d1f10 100%);
            border-radius: 50%;
        }

        .mole {
            position: absolute;
            bottom: -100%;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 80%;
            background: linear-gradient(to bottom, #8B4513 0%, #654321 100%);
            border-radius: 50% 50% 40% 40%;
            transition: bottom 0.15s ease-out;
            z-index: 1;
        }

        .mole::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            width: 25%;
            height: 30%;
            background: white;
            border-radius: 50%;
            box-shadow: inset 0 -3px 5px rgba(0, 0, 0, 0.2);
        }

        .mole::after {
            content: '';
            position: absolute;
            top: 20%;
            right: 20%;
            width: 25%;
            height: 30%;
            background: white;
            border-radius: 50%;
            box-shadow: inset 0 -3px 5px rgba(0, 0, 0, 0.2);
        }

        .mole.up {
            bottom: 10%;
        }

        .mole.hit {
            background: linear-gradient(to bottom, #ff6b6b 0%, #c0392b 100%);
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(-50%) rotate(0deg); }
            25% { transform: translateX(-50%) rotate(-10deg); }
            75% { transform: translateX(-50%) rotate(10deg); }
        }

        .mole-face {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 50%;
            z-index: 2;
        }

        .eye {
            position: absolute;
            width: 8px;
            height: 10px;
            background: #2c1810;
            border-radius: 50%;
            top: 20%;
        }

        .eye.left {
            left: 20%;
        }

        .eye.right {
            right: 20%;
        }

        .nose {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 10px;
            background: #654321;
            border-radius: 50%;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .game-over.show {
            display: flex;
        }

        .game-over-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .game-over h2 {
            color: #764ba2;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 3rem;
            font-weight: bold;
            color: #f5576c;
            margin: 20px 0;
        }

        .difficulty {
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            color: #764ba2;
            font-weight: bold;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
            }

            .game-board {
                gap: 10px;
                padding: 15px;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            button {
                padding: 12px 24px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔨 もぐらたたき 🔨</h1>
        <p class="subtitle">Whack-a-Mole - 出てきたもぐらをタップ！</p>

        <div class="difficulty" id="difficultyDisplay">
            難易度: ふつう
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">残り時間</div>
                <div class="stat-value" id="timeLeft">30</div>
            </div>
        </div>

        <div class="game-board" id="gameBoard">
            <!-- 9つの穴が生成される -->
        </div>

        <div class="controls">
            <button onclick="startGame()">🎮 ゲームスタート</button>
            <button onclick="changeDifficulty()">⚙️ 難易度変更</button>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <div class="game-over-content">
            <h2>🎉 ゲームオーバー！ 🎉</h2>
            <div class="final-score" id="finalScore">0</div>
            <p>ポイント獲得！</p>
            <br>
            <button onclick="startGame()">🔄 もう一度プレイ</button>
            <br><br>
            <button onclick="closeGameOver()" style="background: #667eea;">閉じる</button>
        </div>
    </div>

    <script>
        const gameBoard = document.getElementById('gameBoard');
        const scoreDisplay = document.getElementById('score');
        const timeLeftDisplay = document.getElementById('timeLeft');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreDisplay = document.getElementById('finalScore');
        const difficultyDisplay = document.getElementById('difficultyDisplay');

        let score = 0;
        let timeLeft = 30;
        let gameTimer = null;
        let moleTimer = null;
        let isGameRunning = false;
        let currentHole = null;
        let difficulties = [
            { name: 'かんたん', time: 1500, label: 'かんたん' },
            { name: 'ふつう', time: 1000, label: 'ふつう' },
            { name: 'むずかしい', time: 700, label: 'むずかしい' },
            { name: 'ゲシュマップ', time: 500, label: 'ゲシュマップ' }
        ];
        let currentDifficulty = 1;

        // ゲームボードを作成
        function createBoard() {
            gameBoard.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const hole = document.createElement('div');
                hole.className = 'hole';
                hole.dataset.index = i;

                const mole = document.createElement('div');
                mole.className = 'mole';

                const face = document.createElement('div');
                face.className = 'mole-face';

                const eyeLeft = document.createElement('div');
                eyeLeft.className = 'eye left';

                const eyeRight = document.createElement('div');
                eyeRight.className = 'eye right';

                const nose = document.createElement('div');
                nose.className = 'nose';

                face.appendChild(eyeLeft);
                face.appendChild(eyeRight);
                face.appendChild(nose);
                mole.appendChild(face);
                hole.appendChild(mole);

                hole.addEventListener('click', whackMole);
                hole.addEventListener('touchstart', whackMole);

                gameBoard.appendChild(hole);
            }
        }

        function getRandomHole() {
            const holes = document.querySelectorAll('.hole');
            const index = Math.floor(Math.random() * holes.length);
            return holes[index];
        }

        function peep() {
            if (!isGameRunning) return;

            const hole = getRandomHole();
            const mole = hole.querySelector('.mole');

            // 同じ穴は連続で出さない
            if (hole === currentHole) {
                moleTimer = setTimeout(peep, 500);
                return;
            }

            currentHole = hole;
            mole.classList.add('up');

            setTimeout(() => {
                mole.classList.remove('up');
                if (isGameRunning) {
                    peep();
                }
            }, difficulties[currentDifficulty].time);
        }

        function whackMole(e) {
            if (!isGameRunning) return;

            const hole = e.currentTarget;
            const mole = hole.querySelector('.mole');

            if (!mole.classList.contains('up')) return;
            if (mole.classList.contains('hit')) return;

            mole.classList.add('hit');
            score += 10 * (currentDifficulty + 1);
            scoreDisplay.textContent = score;

            setTimeout(() => {
                mole.classList.remove('up');
                mole.classList.remove('hit');
            }, 300);
        }

        function startGame() {
            if (gameTimer) clearInterval(gameTimer);
            if (moleTimer) clearTimeout(moleTimer);

            score = 0;
            timeLeft = 30;
            isGameRunning = true;

            scoreDisplay.textContent = score;
            timeLeftDisplay.textContent = timeLeft;
            gameOverScreen.classList.remove('show');

            gameTimer = setInterval(() => {
                timeLeft--;
                timeLeftDisplay.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            peep();
        }

        function endGame() {
            isGameRunning = false;
            clearInterval(gameTimer);
            clearTimeout(moleTimer);

            const moles = document.querySelectorAll('.mole');
            moles.forEach(mole => {
                mole.classList.remove('up', 'hit');
            });

            finalScoreDisplay.textContent = score;
            gameOverScreen.classList.add('show');
        }

        function closeGameOver() {
            gameOverScreen.classList.remove('show');
        }

        function changeDifficulty() {
            currentDifficulty = (currentDifficulty + 1) % difficulties.length;
            difficultyDisplay.textContent = `難易度: ${difficulties[currentDifficulty].label}`;
        }

        // 初期化
        createBoard();
    </script>
</body>
</html>
