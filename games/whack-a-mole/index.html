<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Whack a Mole - もぐらたたき</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            user-select: none;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            color: white;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            font-size: 1.3rem;
            margin-bottom: 10px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 500px;
            width: 100%;
            aspect-ratio: 1;
        }

        .hole {
            background: #4a3728;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }

        .hole:active {
            transform: scale(0.95);
        }

        .mole {
            position: absolute;
            width: 70%;
            height: 70%;
            left: 15%;
            bottom: -100%;
            background: linear-gradient(135deg, #8B4513, #654321);
            border-radius: 50% 50% 45% 45%;
            transition: bottom 0.15s ease-out;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }

        .mole.up {
            bottom: 15%;
        }

        .mole::before,
        .mole::after {
            content: '';
            position: absolute;
            width: 20%;
            height: 20%;
            background: #000;
            border-radius: 50%;
            top: 30%;
        }

        .mole::before {
            left: 25%;
        }

        .mole::after {
            right: 25%;
        }

        .mole.hit {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
        }

        .mole.hit::after {
            content: '😵';
            font-size: 2rem;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 15px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .start-btn {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            background: rgba(255, 255, 255, 0.3);
            color: white;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 40px 60px;
            border-radius: 20px;
            font-size: 2rem;
            font-weight: bold;
            z-index: 100;
            display: none;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .message.show {
            display: block;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            .stats {
                font-size: 1rem;
                gap: 15px;
            }

            .stat {
                padding: 8px 15px;
            }

            .game-board {
                gap: 10px;
            }

            button {
                padding: 12px 24px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔨 もぐらたたき</h1>
        <div class="stats">
            <div class="stat">スコア: <span id="score">0</span></div>
            <div class="stat">残り時間: <span id="time">30</span>秒</div>
        </div>
    </div>

    <div class="game-board">
        <div class="hole" data-index="0"><div class="mole">🐹</div></div>
        <div class="hole" data-index="1"><div class="mole">🐹</div></div>
        <div class="hole" data-index="2"><div class="mole">🐹</div></div>
        <div class="hole" data-index="3"><div class="mole">🐹</div></div>
        <div class="hole" data-index="4"><div class="mole">🐹</div></div>
        <div class="hole" data-index="5"><div class="mole">🐹</div></div>
        <div class="hole" data-index="6"><div class="mole">🐹</div></div>
        <div class="hole" data-index="7"><div class="mole">🐹</div></div>
        <div class="hole" data-index="8"><div class="mole">🐹</div></div>
    </div>

    <div class="controls">
        <button class="start-btn" onclick="startGame()">スタート</button>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    </div>

    <div class="message" id="message"></div>

    <script>
        let score = 0;
        let timeLeft = 30;
        let gameTimer = null;
        let moleTimer = null;
        let isPlaying = false;
        let currentMole = null;

        const holes = document.querySelectorAll('.hole');
        const scoreEl = document.getElementById('score');
        const timeEl = document.getElementById('time');
        const messageEl = document.getElementById('message');

        // もぐらをランダムに出現
        function showMole() {
            if (!isPlaying) return;

            // 前のもぐらを隠す
            if (currentMole) {
                currentMole.classList.remove('up');
            }

            // ランダムな穴を選択
            const randomHole = holes[Math.floor(Math.random() * holes.length)];
            const mole = randomHole.querySelector('.mole');

            // もぐらを出現
            mole.classList.remove('hit');
            mole.classList.add('up');
            currentMole = mole;

            // 次のもぐらを出すタイミング（ランダム）
            const delay = Math.random() * 800 + 400;
            moleTimer = setTimeout(showMole, delay);
        }

        // もぐらをクリック
        function whack(e) {
            if (!isPlaying) return;

            const mole = e.currentTarget.querySelector('.mole');
            if (mole.classList.contains('up') && !mole.classList.contains('hit')) {
                // ヒット！
                mole.classList.add('hit');
                score += 10;
                scoreEl.textContent = score;

                // ヒットエフェクト
                setTimeout(() => {
                    mole.classList.remove('up');
                }, 200);
            }
        }

        // ゲーム開始
        function startGame() {
            if (isPlaying) return;

            score = 0;
            timeLeft = 30;
            isPlaying = true;

            scoreEl.textContent = score;
            timeEl.textContent = timeLeft;

            // 隠れているもぐらをリセット
            holes.forEach(hole => {
                const mole = hole.querySelector('.mole');
                mole.classList.remove('up', 'hit');
            });

            // カウントダウン
            messageEl.textContent = '3';
            messageEl.classList.add('show');
            
            setTimeout(() => {
                messageEl.textContent = '2';
            }, 500);

            setTimeout(() => {
                messageEl.textContent = '1';
            }, 1000);

            setTimeout(() => {
                messageEl.textContent = 'スタート！';
            }, 1500);

            setTimeout(() => {
                messageEl.classList.remove('show');

                // ゲーム開始
                showMole();

                // タイマー開始
                gameTimer = setInterval(() => {
                    timeLeft--;
                    timeEl.textContent = timeLeft;

                    if (timeLeft <= 0) {
                        endGame();
                    }
                }, 1000);
            }, 2000);
        }

        // ゲーム終了
        function endGame() {
            isPlaying = false;
            clearInterval(gameTimer);
            clearTimeout(moleTimer);

            // もぐらを隠す
            if (currentMole) {
                currentMole.classList.remove('up');
            }

            // 結果表示
            let message = '';
            if (score >= 200) {
                message = `🏆 完璧！\nスコア: ${score}`;
            } else if (score >= 150) {
                message = `🎉 素晴らしい！\nスコア: ${score}`;
            } else if (score >= 100) {
                message = `😊 いい調子！\nスコア: ${score}`;
            } else {
                message = `💪 頑張れ！\nスコア: ${score}`;
            }

            messageEl.textContent = message;
            messageEl.classList.add('show');

            setTimeout(() => {
                messageEl.classList.remove('show');
            }, 3000);
        }

        // 全画面表示
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        holes.forEach(hole => {
            hole.addEventListener('click', whack);
            hole.addEventListener('touchstart', (e) => {
                e.preventDefault();
                whack(e);
            });
        });
    </script>
</body>
</html>
