<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Whack-a-Mole | Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .stat {
            text-align: center;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            color: white;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .hole {
            aspect-ratio: 1;
            background: #8B4513;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s;
        }

        .hole:active {
            transform: scale(0.95);
        }

        .mole {
            position: absolute;
            width: 70%;
            height: 70%;
            background: linear-gradient(135deg, #8B7355 0%, #6B4423 100%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.1s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .mole::before {
            content: '●  ●';
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            color: #333;
            letter-spacing: 8px;
        }

        .mole::after {
            content: '';
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translateX(-50%);
            width: 30%;
            height: 20%;
            background: #FF69B4;
            border-radius: 50%;
        }

        .mole.active {
            transform: translate(-50%, -50%) scale(1);
        }

        .mole.whacked {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            transform: translate(-50%, -50%) scale(1);
        }

        .btn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        @media (max-width: 768px) {
            .game-container {
                padding: 20px;
            }

            h1 {
                font-size: 22px;
            }

            .stat-value {
                font-size: 24px;
            }

            .grid {
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <h1>🔨 Whack-a-Mole</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">残り時間</div>
                <div class="stat-value" id="timer">30</div>
            </div>
        </div>

        <div class="grid" id="grid"></div>

        <button class="btn" id="startBtn">スタート</button>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');

        let score = 0;
        let timeLeft = 30;
        let gameInterval;
        let moleInterval;
        let currentMole = null;
        let gameActive = false;

        // グリッドを作成
        for (let i = 0; i < 9; i++) {
            const hole = document.createElement('div');
            hole.className = 'hole';

            const mole = document.createElement('div');
            mole.className = 'mole';
            mole.dataset.index = i;

            mole.addEventListener('click', whackMole);
            mole.addEventListener('touchstart', (e) => {
                e.preventDefault();
                whackMole(e);
            });

            hole.appendChild(mole);
            grid.appendChild(hole);
        }

        function whackMole(e) {
            if (!gameActive) return;

            const mole = e.target;
            if (!mole.classList.contains('active')) return;

            mole.classList.remove('active');
            mole.classList.add('whacked');
            score += 10;
            scoreEl.textContent = score;

            setTimeout(() => {
                mole.classList.remove('whacked');
            }, 200);
        }

        function showMole() {
            if (!gameActive) return;

            // 前のもぐらを隠す
            if (currentMole !== null) {
                const prevMole = document.querySelector(`.mole[data-index="${currentMole}"]`);
                if (prevMole && prevMole.classList.contains('active')) {
                    prevMole.classList.remove('active');
                }
            }

            // 新しいもぐらを表示
            const availableHoles = [];
            document.querySelectorAll('.mole').forEach((mole, index) => {
                if (!mole.classList.contains('active') && !mole.classList.contains('whacked')) {
                    availableHoles.push(index);
                }
            });

            if (availableHoles.length > 0) {
                currentMole = availableHoles[Math.floor(Math.random() * availableHoles.length)];
                const mole = document.querySelector(`.mole[data-index="${currentMole}"]`);
                mole.classList.add('active');

                // もぐらを隠すタイマー
                setTimeout(() => {
                    if (mole.classList.contains('active')) {
                        mole.classList.remove('active');
                    }
                }, 800);
            }
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            gameActive = true;

            scoreEl.textContent = score;
            timerEl.textContent = timeLeft;
            startBtn.textContent = 'ゲーム中...';
            startBtn.disabled = true;

            // 全てのもぐらをリセット
            document.querySelectorAll('.mole').forEach(mole => {
                mole.classList.remove('active', 'whacked');
            });

            // もぐらを表示
            moleInterval = setInterval(showMole, 600);

            // タイマー
            gameInterval = setInterval(() => {
                timeLeft--;
                timerEl.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameActive = false;
            clearInterval(gameInterval);
            clearInterval(moleInterval);

            startBtn.textContent = `もう一度プレイ (最終スコア: ${score})`;
            startBtn.disabled = false;

            // 全てのもぐらを隠す
            document.querySelectorAll('.mole').forEach(mole => {
                mole.classList.remove('active');
            });
        }

        startBtn.addEventListener('click', startGame);

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
