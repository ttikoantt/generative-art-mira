<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Mole | Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            touch-action: manipulation;
        }

        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 30px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            text-align: center;
        }

        .stat-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 400px;
            margin-bottom: 30px;
        }

        .hole {
            width: 100px;
            height: 100px;
            background: #8b4513;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }

        .hole:active {
            transform: scale(0.95);
        }

        .hole::before {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 120%;
            height: 30px;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
        }

        .mole {
            position: absolute;
            width: 80px;
            height: 80px;
            background: #d2691e;
            border-radius: 50% 50% 50% 50%;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            transition: transform 0.15s ease-out;
            display: flex;
            align-items: center;
            justify-content: center;
            bottom: 10px;
        }

        .mole::before {
            content: '🐹';
            font-size: 50px;
        }

        .mole.active {
            transform: translateX(-50%) translateY(-10%);
        }

        .mole.whacked {
            transform: translateX(-50%) translateY(100%);
        }

        .mole.whacked::before {
            content: '😵';
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .btn-start {
            background: #4caf50;
            color: white;
        }

        .btn-start:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        .btn-start:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .game-over.show {
            display: flex;
        }

        .game-over-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .game-over-content h2 {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 20px;
        }

        .game-over-content p {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 30px;
        }

        @media (max-width: 500px) {
            h1 {
                font-size: 1.8em;
            }

            .game-board {
                max-width: 300px;
                gap: 10px;
            }

            .hole {
                width: 80px;
                height: 80px;
            }

            .mole {
                width: 65px;
                height: 65px;
            }

            .mole::before {
                font-size: 40px;
            }

            .stats {
                gap: 15px;
            }

            .stat {
                padding: 10px 20px;
            }

            .stat-value {
                font-size: 24px;
            }

            .btn {
                padding: 12px 25px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <h1>🐹 Whack-a-Mole</h1>

    <div class="stats">
        <div class="stat">
            <div class="stat-label">Score</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Time</div>
            <div class="stat-value" id="timer">30</div>
        </div>
        <div class="stat">
            <div class="stat-label">Combo</div>
            <div class="stat-value" id="combo">0</div>
        </div>
    </div>

    <div class="game-board">
        <div class="hole" data-hole="0"><div class="mole"></div></div>
        <div class="hole" data-hole="1"><div class="mole"></div></div>
        <div class="hole" data-hole="2"><div class="mole"></div></div>
        <div class="hole" data-hole="3"><div class="mole"></div></div>
        <div class="hole" data-hole="4"><div class="mole"></div></div>
        <div class="hole" data-hole="5"><div class="mole"></div></div>
        <div class="hole" data-hole="6"><div class="mole"></div></div>
        <div class="hole" data-hole="7"><div class="mole"></div></div>
        <div class="hole" data-hole="8"><div class="mole"></div></div>
    </div>

    <div class="controls">
        <button class="btn btn-start" id="startBtn">Start Game</button>
    </div>

    <div class="game-over" id="gameOver">
        <div class="game-over-content">
            <h2>Game Over!</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button class="btn btn-start" id="restartBtn">Play Again</button>
        </div>
    </div>

    <script>
        const holes = document.querySelectorAll('.hole');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const comboDisplay = document.getElementById('combo');
        const startBtn = document.getElementById('startBtn');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreDisplay = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');

        let score = 0;
        let timeLeft = 30;
        let combo = 0;
        let gameInterval;
        let moleInterval;
        let isPlaying = false;
        let activeMole = null;

        function randomHole() {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (activeMole === hole) {
                return randomHole();
            }
            return hole;
        }

        function showMole() {
            if (!isPlaying) return;

            const hole = randomHole();
            const mole = hole.querySelector('.mole');

            if (activeMole) {
                const prevMole = activeMole.querySelector('.mole');
                prevMole.classList.remove('active');
                combo = 0;
                comboDisplay.textContent = combo;
            }

            activeMole = hole;
            mole.classList.add('active');

            // Hide mole after random time
            const showTime = 600 + Math.random() * 400;
            setTimeout(() => {
                if (mole.classList.contains('active')) {
                    mole.classList.remove('active');
                    combo = 0;
                    comboDisplay.textContent = combo;
                    activeMole = null;
                }
            }, showTime);
        }

        function whackMole(e) {
            if (!isPlaying) return;

            const hole = e.currentTarget;
            const mole = hole.querySelector('.mole');

            if (mole.classList.contains('active') && !mole.classList.contains('whacked')) {
                mole.classList.add('whacked');
                combo++;
                comboDisplay.textContent = combo;

                const points = 10 + (combo > 1 ? (combo - 1) * 5 : 0);
                score += points;
                scoreDisplay.textContent = score;

                setTimeout(() => {
                    mole.classList.remove('active', 'whacked');
                    activeMole = null;
                }, 200);
            }
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            combo = 0;
            isPlaying = true;
            activeMole = null;

            scoreDisplay.textContent = score;
            timerDisplay.textContent = timeLeft;
            comboDisplay.textContent = combo;

            startBtn.disabled = true;
            gameOverScreen.classList.remove('show');

            // Reset all moles
            holes.forEach(hole => {
                const mole = hole.querySelector('.mole');
                mole.classList.remove('active', 'whacked');
            });

            // Start mole spawning
            moleInterval = setInterval(showMole, 800);

            // Start timer
            gameInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameInterval);
            clearInterval(moleInterval);

            startBtn.disabled = false;
            finalScoreDisplay.textContent = score;
            gameOverScreen.classList.add('show');

            // Reset all moles
            holes.forEach(hole => {
                const mole = hole.querySelector('.mole');
                mole.classList.remove('active', 'whacked');
            });
            activeMole = null;
        }

        holes.forEach(hole => {
            hole.addEventListener('click', whackMole);
            hole.addEventListener('touchstart', (e) => {
                e.preventDefault();
                whackMole(e);
            });
        });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', () => {
            gameOverScreen.classList.remove('show');
            startGame();
        });

        // Prevent double-tap zoom on mobile
        document.addEventListener('touchend', (e) => {
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
