<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Mole | Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
            touch-action: manipulation;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .hole {
            aspect-ratio: 1;
            background: #8B4513;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            transition: transform 0.1s;
        }

        .hole:active {
            transform: scale(0.95);
        }

        .mole {
            position: absolute;
            bottom: -80%;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 80%;
            background: linear-gradient(180deg, #d4a574 0%, #b8956c 100%);
            border-radius: 50% 50% 0 0;
            transition: bottom 0.2s ease-out;
            box-shadow: 0 -3px 10px rgba(0, 0, 0, 0.3);
        }

        .mole.up {
            bottom: 0;
        }

        .mole::before {
            content: '';
            position: absolute;
            top: 25%;
            left: 20%;
            width: 20%;
            height: 15%;
            background: #333;
            border-radius: 50%;
            box-shadow: 30px 0 0 #333;
        }

        .mole::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 40%;
            width: 20%;
            height: 10%;
            background: #ff6b6b;
            border-radius: 50%;
        }

        .mole.hit {
            background: linear-gradient(180deg, #ff6b6b 0%, #ee5a5a 100%);
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #fff;
        }

        .btn-start {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(56, 239, 125, 0.4);
        }

        .btn-back {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
        }

        .difficulty {
            grid-column: 1 / -1;
            background: rgba(255, 255, 255, 0.2);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .overlay h2 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .overlay p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }

            .stat-value {
                font-size: 1.4rem;
            }

            .game-board {
                gap: 8px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔨 Whack-a-Mole</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">TIME</div>
                <div class="stat-value" id="time">30</div>
            </div>
            <div class="stat">
                <div class="stat-label">HIGH SCORE</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="controls">
            <button class="btn-start" onclick="startGame()">▶️ スタート</button>
            <button class="btn-back" onclick="goBack()">← 戻る</button>
            <button class="difficulty" onclick="cycleDifficulty()">
                難易度: <span id="difficultyText">普通</span>
            </button>
        </div>
    </div>

    <div class="overlay" id="overlay">
        <div class="overlay-content">
            <h2 id="overlayTitle">Game Over!</h2>
            <p id="overlayScore">Score: 0</p>
            <button class="btn-start" onclick="closeOverlay()">もう一度</button>
        </div>
    </div>

    <script>
        const GRID_SIZE = 9;
        const GAME_DURATION = 30;
        const difficulties = [
            { name: 'かんたん', interval: 1200, duration: 1500 },
            { name: '普通', interval: 900, duration: 1200 },
            { name: 'むずかしい', interval: 600, duration: 900 },
            { name: '超難しい', interval: 400, duration: 700 }
        ];

        let score = 0;
        let timeLeft = GAME_DURATION;
        let highScore = parseInt(localStorage.getItem('whackAMoleHighScore')) || 0;
        let gameRunning = false;
        let currentDifficulty = 1;
        let moleTimeout = null;
        let gameTimer = null;

        const gameBoard = document.getElementById('gameBoard');
        const scoreDisplay = document.getElementById('score');
        const timeDisplay = document.getElementById('time');
        const highScoreDisplay = document.getElementById('highScore');
        const overlay = document.getElementById('overlay');
        const difficultyText = document.getElementById('difficultyText');

        // ゲームボードを初期化
        function initBoard() {
            gameBoard.innerHTML = '';
            for (let i = 0; i < GRID_SIZE; i++) {
                const hole = document.createElement('div');
                hole.className = 'hole';
                hole.dataset.index = i;

                const mole = document.createElement('div');
                mole.className = 'mole';
                hole.appendChild(mole);

                hole.addEventListener('mousedown', whack);
                hole.addEventListener('touchstart', whack);

                gameBoard.appendChild(hole);
            }
            highScoreDisplay.textContent = highScore;
        }

        function whack(e) {
            if (!gameRunning) return;
            e.preventDefault();

            const mole = e.target.closest('.hole').querySelector('.mole');
            if (mole.classList.contains('up')) {
                mole.classList.add('hit');
                mole.classList.remove('up');

                score += 10;
                scoreDisplay.textContent = score;

                // ヒットエフェクト
                setTimeout(() => {
                    mole.classList.remove('hit');
                }, 200);
            }
        }

        function showMole() {
            if (!gameRunning) return;

            const holes = document.querySelectorAll('.mole');
            const activeMoles = Array.from(holes).filter(m => m.classList.contains('up'));

            if (activeMoles.length < 2) {
                const availableHoles = Array.from(holes).filter(m => !m.classList.contains('up'));
                if (availableHoles.length > 0) {
                    const randomHole = availableHoles[Math.floor(Math.random() * availableHoles.length)];
                    randomHole.classList.add('up');

                    const diff = difficulties[currentDifficulty];
                    setTimeout(() => {
                        randomHole.classList.remove('up');
                    }, diff.duration);
                }
            }

            moleTimeout = setTimeout(showMole, difficulties[currentDifficulty].interval);
        }

        function startGame() {
            if (gameRunning) return;

            score = 0;
            timeLeft = GAME_DURATION;
            gameRunning = true;

            scoreDisplay.textContent = score;
            timeDisplay.textContent = timeLeft;

            // 全てのモグラをリセット
            document.querySelectorAll('.mole').forEach(m => {
                m.classList.remove('up', 'hit');
            });

            showMole();

            gameTimer = setInterval(() => {
                timeLeft--;
                timeDisplay.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameRunning = false;

            if (moleTimeout) clearTimeout(moleTimeout);
            if (gameTimer) clearInterval(gameTimer);

            document.querySelectorAll('.mole').forEach(m => {
                m.classList.remove('up', 'hit');
            });

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('whackAMoleHighScore', highScore);
                highScoreDisplay.textContent = highScore;
            }

            document.getElementById('overlayTitle').textContent = score > highScore - score ? '🎉 New High Score!' : 'Game Over!';
            document.getElementById('overlayScore').textContent = `Score: ${score}`;
            overlay.classList.add('show');
        }

        function closeOverlay() {
            overlay.classList.remove('show');
        }

        function cycleDifficulty() {
            currentDifficulty = (currentDifficulty + 1) % difficulties.length;
            difficultyText.textContent = difficulties[currentDifficulty].name;
        }

        function goBack() {
            window.location.href = '../index.html';
        }

        // 初期化
        initBoard();
    </script>
</body>
</html>
