<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Mole - もぐらたたき</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2em;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #4ecdc4;
        }

        #score {
            color: #ffd700;
        }

        #timer {
            color: #ff6b6b;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .hole {
            width: 100px;
            height: 100px;
            background: radial-gradient(ellipse at center, #2d2d44 0%, #1a1a2e 100%);
            border-radius: 50%;
            border: 4px solid #3d3d5c;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .hole:active {
            transform: scale(0.95);
        }

        .mole {
            position: absolute;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #8b4513 0%, #654321 100%);
            border-radius: 50% 50% 40% 40%;
            transition: bottom 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .mole.active {
            bottom: 10px;
        }

        .mole.hit {
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            padding: 15px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        #startBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        #startBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .difficulty-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .difficulty-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .difficulty-btn.active {
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            border-color: transparent;
        }

        .combo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4em;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .combo.show {
            opacity: 1;
            animation: comboAnim 0.5s ease;
        }

        @keyframes comboAnim {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 1001;
        }

        .game-over.show {
            display: flex;
        }

        .game-over h2 {
            font-size: 3em;
            color: #ffd700;
            margin-bottom: 20px;
        }

        .game-over p {
            font-size: 1.5em;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5em;
            }

            .hole {
                width: 80px;
                height: 80px;
            }

            .mole {
                width: 55px;
                height: 55px;
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">⛶</button>

    <div class="header">
        <h1>🔨 Whack-a-Mole</h1>
        <p>もぐらを叩いてスコアを稼ごう！</p>
    </div>

    <div class="stats">
        <div class="stat">
            <div class="stat-label">SCORE</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">TIME</div>
            <div class="stat-value" id="timer">30</div>
        </div>
        <div class="stat">
            <div class="stat-label">COMBO</div>
            <div class="stat-value" id="combo">0</div>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn">▶ スタート</button>
        <button class="difficulty-btn active" data-difficulty="easy">EASY</button>
        <button class="difficulty-btn" data-difficulty="normal">NORMAL</button>
        <button class="difficulty-btn" data-difficulty="hard">HARD</button>
    </div>

    <div class="game-grid" id="gameGrid"></div>

    <div class="combo" id="comboDisplay"></div>

    <div class="game-over" id="gameOver">
        <h2>⏰ タイムアップ！</h2>
        <p>最終スコア: <span id="finalScore">0</span></p>
        <button id="restartBtn">🔄 もう一度</button>
    </div>

    <script>
        const gameGrid = document.getElementById('gameGrid');
        const startBtn = document.getElementById('startBtn');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const comboEl = document.getElementById('combo');
        const comboDisplay = document.getElementById('comboDisplay');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const difficultyBtns = document.querySelectorAll('.difficulty-btn');

        const gridSize = 9;
        const moles = [];
        let score = 0;
        let timeLeft = 30;
        let combo = 0;
        let gameInterval;
        let moleInterval;
        let isPlaying = false;
        let difficulty = 'easy';
        const moleEmojis = ['🐹', '🦔', '🐻', '🐰'];

        const difficultySettings = {
            easy: { moleTime: 1200, spawnRate: 1000 },
            normal: { moleTime: 900, spawnRate: 800 },
            hard: { moleTime: 600, spawnRate: 600 }
        };

        // グリッド作成
        function createGrid() {
            gameGrid.innerHTML = '';
            for (let i = 0; i < gridSize; i++) {
                const hole = document.createElement('div');
                hole.className = 'hole';

                const mole = document.createElement('div');
                mole.className = 'mole';
                mole.textContent = moleEmojis[Math.floor(Math.random() * moleEmojis.length)];
                mole.dataset.index = i;

                mole.addEventListener('click', whackMole);
                mole.addEventListener('touchstart', whackMole);

                hole.appendChild(mole);
                gameGrid.appendChild(hole);
                moles.push(mole);
            }
        }

        createGrid();

        // 全画面表示
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // 難易度切り替え
        difficultyBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                difficultyBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                difficulty = btn.dataset.difficulty;
            });
        });

        // もぐら出現
        function showMole() {
            if (!isPlaying) return;

            const inactiveMoles = moles.filter(m => !mole.classList.contains('active'));
            if (inactiveMoles.length === 0) return;

            const mole = inactiveMoles[Math.floor(Math.random() * inactiveMoles.length)];
            mole.classList.add('active');
            mole.classList.remove('hit');

            const settings = difficultySettings[difficulty];
            setTimeout(() => {
                mole.classList.remove('active');
            }, settings.moleTime);
        }

        // もぐらを叩く
        function whackMole(e) {
            if (!isPlaying) return;
            e.preventDefault();

            const mole = e.target;
            if (!mole.classList.contains('active') || mole.classList.contains('hit')) return;

            mole.classList.add('hit');
            combo++;

            const points = 10 * combo;
            score += points;

            updateDisplay();

            // コンボ表示
            if (combo >= 3) {
                comboDisplay.textContent = `${combo} COMBO!`;
                comboDisplay.classList.add('show');
                setTimeout(() => {
                    comboDisplay.classList.remove('show');
                }, 500);
            }

            // エモジ変更
            mole.textContent = '😵';

            setTimeout(() => {
                mole.classList.remove('active');
                mole.textContent = moleEmojis[Math.floor(Math.random() * moleEmojis.length)];
            }, 200);
        }

        // 表示更新
        function updateDisplay() {
            scoreEl.textContent = score;
            timerEl.textContent = timeLeft;
            comboEl.textContent = combo;
        }

        // ゲーム開始
        function startGame() {
            score = 0;
            timeLeft = 30;
            combo = 0;
            isPlaying = true;

            updateDisplay();
            startBtn.disabled = true;
            startBtn.textContent = 'プレイ中...';
            gameOverEl.classList.remove('show');

            const settings = difficultySettings[difficulty];

            gameInterval = setInterval(() => {
                timeLeft--;
                timerEl.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            moleInterval = setInterval(showMole, settings.spawnRate);
        }

        // ゲーム終了
        function endGame() {
            isPlaying = false;
            clearInterval(gameInterval);
            clearInterval(moleInterval);

            moles.forEach(mole => {
                mole.classList.remove('active');
            });

            finalScoreEl.textContent = score;
            gameOverEl.classList.add('show');

            startBtn.disabled = false;
            startBtn.textContent = '▶ スタート';
        }

        // イベントリスナー
        startBtn.addEventListener('click', startGame);

        restartBtn.addEventListener('click', () => {
            gameOverEl.classList.remove('show');
            startGame();
        });
    </script>
</body>
</html>
