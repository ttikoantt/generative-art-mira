<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Mole | Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a0033, #330066);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }
        h1 {
            color: #fff;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            text-align: center;
            text-shadow: 0 0 20px #ff00ff;
        }
        .stats {
            display: flex;
            gap: 2rem;
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #00ffaa;
            text-shadow: 0 0 10px #00ffaa;
        }
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.3);
        }
        .hole {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #444 30%, #222 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease;
        }
        .hole:active {
            transform: scale(0.95);
        }
        .mole {
            font-size: 3rem;
            position: absolute;
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform: translateY(100px);
            user-select: none;
            pointer-events: none;
        }
        .mole.active {
            transform: translateY(0);
            pointer-events: auto;
        }
        .mole.hit {
            animation: hit 0.3s ease;
        }
        @keyframes hit {
            0% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.5); }
            100% { transform: translateY(100px) scale(0.5); opacity: 0; }
        }
        .controls {
            display: flex;
            gap: 0.5rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            background: linear-gradient(135deg, #ff00ff, #ff6600);
            color: #fff;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 0, 255, 0.4);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 255, 0.6);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .game-over.show {
            display: flex;
        }
        .game-over h2 {
            color: #ff00ff;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px #ff00ff;
        }
        .game-over p {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }
        .fullscreen-btn {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            z-index: 100;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .hit-effect {
            position: absolute;
            font-size: 2rem;
            animation: pop 0.5s ease forwards;
            pointer-events: none;
            z-index: 10;
        }
        @keyframes pop {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(2) translateY(-30px); opacity: 0; }
        }
        @media (max-width: 400px) {
            .hole {
                width: 70px;
                height: 70px;
            }
            .mole {
                font-size: 2.5rem;
            }
            .game-board {
                gap: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">📺 全画面</button>

    <h1>🔨 Whack-a-Mole</h1>

    <div class="stats">
        <div class="stat">
            <div>スコア</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat">
            <div>時間</div>
            <div class="stat-value" id="time">30</div>
        </div>
    </div>

    <div class="game-board" id="gameBoard"></div>

    <div class="controls">
        <button id="startBtn">🎮 スタート</button>
        <button id="restartBtn" disabled>🔄 再プレイ</button>
    </div>

    <div class="game-over" id="gameOver">
        <h2>🎊 ゲームオーバー！</h2>
        <p>最終スコア: <span id="finalScore">0</span></p>
        <button id="playAgainBtn">🔄 もう一度</button>
    </div>

    <script>
        const gameBoard = document.getElementById('gameBoard');
        const scoreEl = document.getElementById('score');
        const timeEl = document.getElementById('time');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const playAgainBtn = document.getElementById('playAgainBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let score = 0;
        let timeLeft = 30;
        let gameInterval = null;
        let moleInterval = null;
        let isPlaying = false;
        const GRID_SIZE = 9;

        const MOJIS = ['🐹', '🦔', '🐰', '🦊', '🐻', '🐼'];

        function initGame() {
            gameBoard.innerHTML = '';
            for (let i = 0; i < GRID_SIZE; i++) {
                const hole = document.createElement('div');
                hole.className = 'hole';
                hole.dataset.index = i;

                const mole = document.createElement('div');
                mole.className = 'mole';
                mole.textContent = MOJIS[Math.floor(Math.random() * MOJIS.length)];
                mole.dataset.index = i;

                hole.appendChild(mole);
                hole.addEventListener('click', handleWhack);
                hole.addEventListener('touchstart', handleWhack, { passive: false });

                gameBoard.appendChild(hole);
            }
        }

        function handleWhack(e) {
            e.preventDefault();
            if (!isPlaying) return;

            const hole = e.currentTarget;
            const mole = hole.querySelector('.mole');

            if (mole.classList.contains('active') && !mole.classList.contains('hit')) {
                // ヒット！
                mole.classList.add('hit');
                score += 10;
                scoreEl.textContent = score;

                // ヒットエフェクト
                showHitEffect(hole);

                setTimeout(() => {
                    mole.classList.remove('active', 'hit');
                }, 300);
            }
        }

        function showHitEffect(hole) {
            const effect = document.createElement('div');
            effect.className = 'hit-effect';
            effect.textContent = '💥';
            effect.style.left = '50%';
            effect.style.top = '50%';
            effect.style.transform = 'translate(-50%, -50%)';
            hole.appendChild(effect);

            setTimeout(() => effect.remove(), 500);
        }

        function showMole() {
            if (!isPlaying) return;

            const moles = document.querySelectorAll('.mole');
            const activeMoles = document.querySelectorAll('.mole.active');

            // 最大2匹まで同時に表示
            if (activeMoles.length >= 2) return;

            // 非アクティブなモグラを探す
            const inactiveMoles = Array.from(moles).filter(m => !m.classList.contains('active') && !m.classList.contains('hit'));

            if (inactiveMoles.length === 0) return;

            const randomMole = inactiveMoles[Math.floor(Math.random() * inactiveMoles.length)];
            randomMole.classList.add('active');
            randomMole.textContent = MOJIS[Math.floor(Math.random() * MOJIS.length)];

            // 自動で隠れる
            const hideTime = 800 + Math.random() * 700;
            setTimeout(() => {
                if (randomMole.classList.contains('active') && !randomMole.classList.contains('hit')) {
                    randomMole.classList.remove('active');
                }
            }, hideTime);
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            isPlaying = true;

            scoreEl.textContent = score;
            timeEl.textContent = timeLeft;

            startBtn.disabled = true;
            restartBtn.disabled = false;
            gameOverEl.classList.remove('show');

            // モグラ出現インターバル（徐々に速くなる）
            let spawnRate = 1000;
            const minRate = 400;

            moleInterval = setInterval(() => {
                showMole();

                // 徐々に速くなる
                if (spawnRate > minRate) {
                    spawnRate -= 10;
                }
            }, spawnRate);

            // タイマー
            gameInterval = setInterval(() => {
                timeLeft--;
                timeEl.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameInterval);
            clearInterval(moleInterval);

            // 全てのモグラを隠す
            document.querySelectorAll('.mole').forEach(mole => {
                mole.classList.remove('active');
            });

            finalScoreEl.textContent = score;
            gameOverEl.classList.add('show');
        }

        function restartGame() {
            if (gameInterval) clearInterval(gameInterval);
            if (moleInterval) clearInterval(moleInterval);

            startBtn.disabled = false;
            restartBtn.disabled = true;

            document.querySelectorAll('.mole').forEach(mole => {
                mole.classList.remove('active', 'hit');
            });

            score = 0;
            timeLeft = 30;
            scoreEl.textContent = score;
            timeEl.textContent = timeLeft;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Event Listeners
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', restartGame);
        playAgainBtn.addEventListener('click', () => {
            gameOverEl.classList.remove('show');
            restartGame();
            startGame();
        });
        fullscreenBtn.addEventListener('click', toggleFullscreen);

        // Initialize
        initGame();
    </script>
</body>
</html>
