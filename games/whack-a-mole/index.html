<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Whack-a-Mole Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            color: white;
        }

        .score, .time {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            font-size: 20px;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 500px;
            width: 100%;
            flex: 1;
            align-content: center;
        }

        .hole {
            aspect-ratio: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            border: 3px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
        }

        .hole:active {
            transform: scale(0.95);
        }

        .mole {
            position: absolute;
            width: 80%;
            height: 80%;
            left: 10%;
            bottom: -80%;
            background: linear-gradient(135deg, #8B4513 0%, #A0522D 100%);
            border-radius: 50% 50% 0 0;
            transition: bottom 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .mole.up {
            bottom: 10%;
        }

        .mole::before {
            content: '🐹';
        }

        .mole.hit {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
        }

        .mole.hit::before {
            content: '😵';
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(240, 147, 251, 0.6);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 1000;
        }

        .game-over.show {
            display: flex;
        }

        .game-over h2 {
            color: white;
            font-size: 48px;
            margin-bottom: 20px;
        }

        .game-over p {
            color: white;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .difficulty {
            color: white;
            font-size: 14px;
            margin-top: 10px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <div class="game-container">
        <div class="header">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="time">Time: <span id="time">30</span>s</div>
        </div>

        <div class="grid" id="grid"></div>

        <div class="controls">
            <button class="btn" onclick="startGame()">Start Game</button>
        </div>

        <div class="difficulty">Difficulty: Medium (1.5s)</div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>Game Over!</h2>
        <p>Your Score: <span id="finalScore">0</span></p>
        <button class="btn" onclick="startGame()">Play Again</button>
    </div>

    <script>
        const holes = [];
        const gridSize = 9;
        let score = 0;
        let timeLeft = 30;
        let gameInterval = null;
        let moleInterval = null;
        let activeHole = null;
        const moleUpTime = 1500;

        function initGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            holes.length = 0;

            for (let i = 0; i < gridSize; i++) {
                const hole = document.createElement('div');
                hole.className = 'hole';
                hole.innerHTML = '<div class="mole"></div>';

                hole.addEventListener('click', () => whack(i));
                hole.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    whack(i);
                });

                grid.appendChild(hole);
                holes.push(hole);
            }
        }

        function showMole() {
            if (activeHole !== null) {
                holes[activeHole].querySelector('.mole').classList.remove('up');
            }

            let newHole;
            do {
                newHole = Math.floor(Math.random() * gridSize);
            } while (newHole === activeHole);

            activeHole = newHole;
            const mole = holes[activeHole].querySelector('.mole');
            mole.classList.remove('hit');
            mole.classList.add('up');
        }

        function whack(index) {
            if (index !== activeHole) return;

            const mole = holes[index].querySelector('.mole');
            if (!mole.classList.contains('up')) return;

            if (mole.classList.contains('hit')) return;

            mole.classList.add('hit');
            score += 10;
            document.getElementById('score').textContent = score;

            setTimeout(() => {
                mole.classList.remove('up');
                activeHole = null;
            }, 300);
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            activeHole = null;

            document.getElementById('score').textContent = score;
            document.getElementById('time').textContent = timeLeft;
            document.getElementById('gameOver').classList.remove('show');

            initGrid();

            // Show mole at regular intervals
            moleInterval = setInterval(() => {
                if (activeHole === null) {
                    showMole();
                }
            }, moleUpTime);

            // Game timer
            gameInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('time').textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            clearInterval(gameInterval);
            clearInterval(moleInterval);

            // Hide any remaining mole
            if (activeHole !== null) {
                holes[activeHole].querySelector('.mole').classList.remove('up');
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.add('show');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize grid on load
        initGrid();
    </script>
</body>
</html>
