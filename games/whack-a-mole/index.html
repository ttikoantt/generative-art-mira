<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Whack-a-Mole</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: #fff;
        }

        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            margin-top: 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .hole {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #3d2b1f 0%, #2a1f17 100%);
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            box-shadow: inset 0 10px 20px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s;
            overflow: hidden;
        }

        .hole:active {
            transform: scale(0.95);
        }

        .mole {
            position: absolute;
            bottom: -100%;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 70px;
            transition: bottom 0.2s ease-out;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            pointer-events: none;
        }

        .mole.active {
            bottom: 10%;
        }

        .mole.hit {
            bottom: -100%;
        }

        .mole .mole-emoji {
            font-size: 50px;
            filter: drop-shadow(2px 2px 5px rgba(0, 0, 0, 0.3));
        }

        .mole.whacked .mole-emoji {
            animation: whack 0.3s ease-out;
        }

        @keyframes whack {
            0% { transform: scale(1); }
            50% { transform: scale(1.3) rotate(20deg); }
            100% { transform: scale(0); }
        }

        .mole.mole-normal { z-index: 2; }
        .mole.mole-golden { z-index: 3; }
        .mole.mole-bomb { z-index: 1; }

        .mole.mole-bomb .mole-emoji {
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(-50%) rotate(-5deg); }
            50% { transform: translateX(-50%) rotate(5deg); }
        }

        .score-popup {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            animation: scoreUp 0.8s ease-out forwards;
            z-index: 100;
        }

        @keyframes scoreUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px) scale(1.5);
            }
        }

        .start-screen, .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            z-index: 200;
        }

        .start-screen.hidden, .game-over-screen.hidden {
            display: none;
        }

        .start-screen h2, .game-over-screen h2 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .start-screen p, .game-over-screen p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .btn {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.6);
        }

        .difficulty-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .difficulty-btn {
            padding: 10px 20px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .difficulty-btn:hover, .difficulty-btn.active {
            background: rgba(255, 255, 255, 0.3);
            border-color: #667eea;
        }

        .final-score {
            font-size: 72px;
            font-weight: bold;
            color: #ffd700;
            margin: 20px 0;
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(102, 126, 234, 0.8);
            transform: scale(1.05);
        }

        @media (max-width: 480px) {
            .grid {
                gap: 10px;
                padding: 15px;
            }

            .hole {
                width: 80px;
                height: 80px;
            }

            .mole {
                width: 55px;
                height: 55px;
            }

            .mole .mole-emoji {
                font-size: 40px;
            }

            .header h1 {
                font-size: 28px;
            }

            .stat-value {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🔨 Whack-a-Mole</h1>
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">Score</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Time</div>
                    <div class="stat-value" id="time">30</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Combo</div>
                    <div class="stat-value" id="combo">0</div>
                </div>
            </div>
        </div>

        <div class="grid" id="grid"></div>
    </div>

    <div class="start-screen" id="startScreen">
        <h2>🔨 Whack-a-Mole</h2>
        <p>Tap the moles before they disappear!</p>
        <div class="difficulty-selector">
            <button class="difficulty-btn" onclick="setDifficulty('easy')">Easy</button>
            <button class="difficulty-btn active" onclick="setDifficulty('normal')">Normal</button>
            <button class="difficulty-btn" onclick="setDifficulty('hard')">Hard</button>
        </div>
        <p>⭐ = +3pts | 🐹 = +10pts | 💣 = -5pts</p>
        <button class="btn" onclick="startGame()">Start Game</button>
    </div>

    <div class="game-over-screen hidden" id="gameOverScreen">
        <h2>Game Over!</h2>
        <p>Your Score</p>
        <div class="final-score" id="finalScore">0</div>
        <p id="highScoreText">New High Score!</p>
        <button class="btn" onclick="resetGame()">Play Again</button>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        const grid = document.getElementById('grid');
        const scoreDisplay = document.getElementById('score');
        const timeDisplay = document.getElementById('time');
        const comboDisplay = document.getElementById('combo');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreDisplay = document.getElementById('finalScore');
        const highScoreText = document.getElementById('highScoreText');

        let holes = [];
        let moles = [];
        let score = 0;
        let timeLeft = 30;
        let combo = 0;
        let gameActive = false;
        let gameInterval;
        let moleInterval;
        let difficulty = 'normal';
        let highScore = localStorage.getItem('whackAMoleHighScore') || 0;

        const difficulties = {
            easy: { speed: 1500, stayTime: 1200 },
            normal: { speed: 1000, stayTime: 900 },
            hard: { speed: 700, stayTime: 600 }
        };

        const moleTypes = [
            { type: 'normal', emoji: '🐹', points: 1, probability: 0.7 },
            { type: 'golden', emoji: '⭐', points: 3, probability: 0.2 },
            { type: 'bomb', emoji: '💣', points: -5, probability: 0.1 }
        ];

        function createGrid() {
            grid.innerHTML = '';
            holes = [];
            moles = [];

            for (let i = 0; i < 9; i++) {
                const hole = document.createElement('div');
                hole.className = 'hole';
                hole.dataset.index = i;

                const mole = document.createElement('div');
                mole.className = 'mole mole-normal';
                mole.innerHTML = '<span class="mole-emoji">🐹</span>';
                mole.dataset.index = i;

                hole.appendChild(mole);
                grid.appendChild(hole);
                holes.push(hole);
                moles.push(mole);

                hole.addEventListener('mousedown', (e) => whackMole(i, e));
                hole.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    whackMole(i, e.touches[0]);
                });
            }
        }

        function setDifficulty(diff) {
            difficulty = diff;
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.toLowerCase() === diff) {
                    btn.classList.add('active');
                }
            });
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            combo = 0;
            gameActive = true;

            scoreDisplay.textContent = score;
            timeDisplay.textContent = timeLeft;
            comboDisplay.textContent = combo;

            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');

            gameInterval = setInterval(updateTimer, 1000);
            moleInterval = setInterval(showRandomMole, difficulties[difficulty].speed);
        }

        function showRandomMole() {
            if (!gameActive) return;

            // Hide all moles first
            moles.forEach(mole => {
                mole.classList.remove('active');
            });

            // Pick random hole
            const availableHoles = moles.map((m, i) => i).filter(i => !moles[i].classList.contains('active'));
            if (availableHoles.length === 0) return;

            const randomHole = availableHoles[Math.floor(Math.random() * availableHoles.length)];
            const mole = moles[randomHole];

            // Select mole type based on probability
            const rand = Math.random();
            let cumulative = 0;
            let selectedType = moleTypes[0];

            for (const type of moleTypes) {
                cumulative += type.probability;
                if (rand <= cumulative) {
                    selectedType = type;
                    break;
                }
            }

            // Set mole appearance
            mole.className = `mole mole-${selectedType.type} active`;
            mole.querySelector('.mole-emoji').textContent = selectedType.emoji;
            mole.dataset.points = selectedType.points;
            mole.dataset.type = selectedType.type;

            // Hide mole after stay time
            setTimeout(() => {
                if (mole.classList.contains('active') && !mole.classList.contains('hit')) {
                    mole.classList.remove('active');
                    combo = 0;
                    comboDisplay.textContent = combo;
                }
            }, difficulties[difficulty].stayTime);
        }

        function whackMole(index, event) {
            if (!gameActive) return;

            const mole = moles[index];
            if (!mole.classList.contains('active') || mole.classList.contains('hit')) return;

            mole.classList.add('hit');
            mole.classList.add('whacked');

            const points = parseInt(mole.dataset.points);
            const type = mole.dataset.type;

            if (type === 'bomb') {
                score = Math.max(0, score + points);
                combo = 0;
            } else {
                combo++;
                score += points + Math.floor(combo / 5); // Bonus points for high combos
            }

            scoreDisplay.textContent = score;
            comboDisplay.textContent = combo;

            // Show score popup
            showScorePopup(event.clientX, event.clientY, points, type);

            // Reset mole after animation
            setTimeout(() => {
                mole.classList.remove('hit', 'whacked', 'active');
            }, 300);
        }

        function showScorePopup(x, y, points, type) {
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.textContent = type === 'bomb' ? points : `+${points}`;
            popup.style.left = `${x}px`;
            popup.style.top = `${y}px`;
            popup.style.color = type === 'bomb' ? '#ff4757' : type === 'golden' ? '#ffd700' : '#fff';
            document.body.appendChild(popup);

            setTimeout(() => popup.remove(), 800);
        }

        function updateTimer() {
            timeLeft--;
            timeDisplay.textContent = timeLeft;

            if (timeLeft <= 0) {
                endGame();
            }
        }

        function endGame() {
            gameActive = false;
            clearInterval(gameInterval);
            clearInterval(moleInterval);

            finalScoreDisplay.textContent = score;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('whackAMoleHighScore', highScore);
                highScoreText.textContent = '🎉 New High Score!';
            } else {
                highScoreText.textContent = `High Score: ${highScore}`;
            }

            gameOverScreen.classList.remove('hidden');
        }

        function resetGame() {
            gameOverScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
            createGrid();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        createGrid();
    </script>
</body>
</html>
