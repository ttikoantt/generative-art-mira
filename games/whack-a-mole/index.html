<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Mole</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .game-header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .game-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .stats {
            display: flex;
            gap: 40px;
            justify-content: center;
            margin-top: 15px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 500px;
            width: 100%;
        }

        .hole {
            aspect-ratio: 1;
            background: radial-gradient(ellipse at center, #2a2a4a 0%, #1a1a2e 100%);
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            box-shadow: inset 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s;
        }

        .hole:active {
            transform: scale(0.95);
        }

        .hole::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 30%;
            background: #0a0a1a;
            border-radius: 50%;
        }

        .mole {
            position: absolute;
            bottom: -100%;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 80%;
            background: linear-gradient(180deg, #8b5a2b 0%, #6b4423 100%);
            border-radius: 50% 50% 40% 40%;
            transition: bottom 0.2s ease-out;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .mole.up {
            bottom: 10%;
        }

        .mole::before {
            content: '';
            position: absolute;
            top: 20%;
            width: 15px;
            height: 15px;
            background: #333;
            border-radius: 50%;
            box-shadow: 25px 0 0 #333;
        }

        .mole::after {
            content: '';
            position: absolute;
            top: 45%;
            width: 20px;
            height: 12px;
            background: #ff6b6b;
            border-radius: 50%;
        }

        .mole.hit {
            background: linear-gradient(180deg, #ff6b6b 0%, #c92a2a 100%);
        }

        .mole.hit::after {
            background: #fff;
        }

        .mole.special {
            background: linear-gradient(180deg, #ffd43b 0%, #fab005 100%);
        }

        .mole.special::before {
            background: #495057;
        }

        .mole.special::after {
            background: #ffd43b;
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .game-over.show {
            opacity: 1;
            pointer-events: all;
        }

        .game-over h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #00ff88;
        }

        .final-score {
            font-size: 5rem;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .play-again-btn {
            background: #00ff88;
            color: #1a1a2e;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .play-again-btn:hover {
            background: #00cc6a;
            transform: scale(1.05);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 50;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 600px) {
            .game-board {
                gap: 15px;
            }

            .game-header h1 {
                font-size: 2rem;
            }

            .stat-value {
                font-size: 1.5rem;
            }
        }

        .combo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-weight: bold;
            color: #ffd43b;
            text-shadow: 0 0 20px rgba(255, 212, 59, 0.8);
            pointer-events: none;
            opacity: 0;
            animation: none;
        }

        .combo.show {
            animation: comboPop 0.5s ease-out;
        }

        @keyframes comboPop {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .start-btn {
            background: #00ff88;
            color: #1a1a2e;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .start-btn:hover {
            background: #00cc6a;
            transform: scale(1.05);
        }

        .instructions {
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">⛶ Fullscreen</button>

    <div class="game-header">
        <h1>🔨 Whack-a-Mole</h1>
        <div class="stats">
            <div class="stat">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Time</div>
                <div class="stat-value" id="timer">30</div>
            </div>
            <div class="stat">
                <div class="stat-label">Combo</div>
                <div class="stat-value" id="combo">0</div>
            </div>
        </div>
        <button class="start-btn" id="startBtn">▶ Start Game</button>
    </div>

    <div class="game-board" id="gameBoard"></div>

    <div class="instructions">
        Tap the moles before they hide! 🐹<br>
        Golden moles = Bonus points! ⭐
    </div>

    <div class="combo" id="comboDisplay"></div>

    <div class="game-over" id="gameOver">
        <h2>Game Over!</h2>
        <div class="final-score" id="finalScore">0</div>
        <button class="play-again-btn" id="playAgain">Play Again</button>
    </div>

    <script>
        const gameBoard = document.getElementById('gameBoard');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const comboDisplay = document.getElementById('combo');
        const comboPopup = document.getElementById('comboDisplay');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreDisplay = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const playAgainBtn = document.getElementById('playAgain');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let score = 0;
        let combo = 0;
        let timeLeft = 30;
        let gameTimer;
        let moleTimer;
        let isPlaying = false;
        let currentHole = null;

        // Create holes
        function createBoard() {
            gameBoard.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const hole = document.createElement('div');
                hole.className = 'hole';
                hole.innerHTML = '<div class="mole"></div>';
                hole.addEventListener('click', whack);
                gameBoard.appendChild(hole);
            }
        }

        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        function randomHole() {
            const holes = document.querySelectorAll('.hole');
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (hole === currentHole) {
                return randomHole();
            }
            return hole;
        }

        function peep() {
            if (!isPlaying) return;

            const time = randomTime(400, 1000);
            const hole = randomHole();
            const mole = hole.querySelector('.mole');

            // 20% chance of special golden mole
            const isSpecial = Math.random() < 0.2;
            if (isSpecial) {
                mole.classList.add('special');
            }

            currentHole = hole;
            mole.classList.add('up');

            setTimeout(() => {
                mole.classList.remove('up');
                mole.classList.remove('special');
                if (!mole.classList.contains('hit')) {
                    combo = 0;
                    updateCombo();
                }
                mole.classList.remove('hit');
                currentHole = null;
                if (isPlaying) {
                    peep();
                }
            }, time);
        }

        function whack(e) {
            if (!isPlaying) return;

            const hole = this;
            const mole = hole.querySelector('.mole');

            if (!mole.classList.contains('up')) return;
            if (mole.classList.contains('hit')) return;

            mole.classList.add('hit');

            let points = 10;
            if (mole.classList.contains('special')) {
                points = 30;
            }

            combo++;
            score += points * (1 + Math.floor(combo / 5) * 0.5);

            updateScore();
            updateCombo();

            if (combo > 1 && combo % 5 === 0) {
                showComboPopup();
            }
        }

        function updateScore() {
            scoreDisplay.textContent = Math.floor(score);
        }

        function updateCombo() {
            comboDisplay.textContent = combo;
        }

        function showComboPopup() {
            comboPopup.textContent = `${combo}x Combo!`;
            comboPopup.classList.remove('show');
            void comboPopup.offsetWidth; // Trigger reflow
            comboPopup.classList.add('show');
        }

        function startGame() {
            score = 0;
            combo = 0;
            timeLeft = 30;
            isPlaying = true;

            updateScore();
            updateCombo();
            timerDisplay.textContent = timeLeft;

            startBtn.style.display = 'none';
            gameOverScreen.classList.remove('show');

            peep();

            gameTimer = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameTimer);

            finalScoreDisplay.textContent = Math.floor(score);
            gameOverScreen.classList.add('show');
            startBtn.style.display = 'block';
        }

        // Event listeners
        startBtn.addEventListener('click', startGame);
        playAgainBtn.addEventListener('click', startGame);

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Initialize
        createBoard();
    </script>
</body>
</html>
