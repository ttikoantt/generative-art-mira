<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Whack-a-Mole</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            padding: 10px;
        }

        .game-container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            color: #ffd700;
            font-size: clamp(2rem, 6vw, 3rem);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            color: white;
            font-size: clamp(1rem, 3vw, 1.3rem);
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            min-width: 100px;
        }

        .stat-label {
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.7);
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #ffd700;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
            aspect-ratio: 1;
        }

        .hole {
            background: linear-gradient(180deg, #3d3d3d 0%, #1a1a1a 100%);
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            box-shadow: inset 0 10px 20px rgba(0, 0, 0, 0.8);
            border: 3px solid #4a4a4a;
        }

        .hole::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30%;
            background: linear-gradient(180deg, #2d2d2d 0%, #0d0d0d 100%);
            border-radius: 0 0 50% 50%;
        }

        .mole {
            position: absolute;
            bottom: -100%;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 80%;
            transition: bottom 0.15s ease-out;
            z-index: 2;
        }

        .mole.up {
            bottom: 15%;
        }

        .mole-body {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #8b6914 0%, #6b4e0a 100%);
            border-radius: 50% 50% 40% 40%;
            position: relative;
        }

        .mole-face {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
        }

        .mole-eyes {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .eye {
            width: 25%;
            height: 25%;
            background: white;
            border-radius: 50%;
            position: relative;
        }

        .eye::after {
            content: '';
            position: absolute;
            width: 50%;
            height: 50%;
            background: #333;
            border-radius: 50%;
            top: 25%;
            left: 25%;
        }

        .nose {
            width: 40%;
            height: 25%;
            background: #5a3d00;
            border-radius: 50%;
            margin: 0 auto;
        }

        .mole.whacked .mole-body {
            background: linear-gradient(180deg, #ff6b6b 0%, #c0392b 100%);
        }

        .mole.whacked .eye::after {
            width: 80%;
            height: 80%;
            top: 10%;
            left: 10%;
        }

        .hit-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }

        .hit-effect.show {
            animation: hitPop 0.5s ease-out;
        }

        @keyframes hitPop {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(2);
            }
        }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .game-over-overlay.show {
            display: flex;
        }

        .game-over-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            animation: gameOverPop 0.5s ease-out;
        }

        @keyframes gameOverPop {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .game-over-content h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 4rem;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 20px;
        }

        @media (max-width: 480px) {
            .game-grid {
                gap: 5px;
            }

            button {
                padding: 12px 20px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全画面</button>

    <div class="game-container">
        <h1>🔨 Whack-a-Mole</h1>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">TIME</div>
                <div class="stat-value" id="timer">30</div>
            </div>
        </div>

        <div class="game-grid" id="gameGrid">
            <!-- グリッドはJavaScriptで生成 -->
        </div>

        <div class="buttons">
            <button id="startBtn" onclick="startGame()">▶ スタート</button>
            <button id="resetBtn" onclick="resetGame()" disabled>↺ リセット</button>
        </div>
    </div>

    <div class="game-over-overlay" id="gameOverOverlay">
        <div class="game-over-content">
            <h2>🎉 ゲーム終了！</h2>
            <div class="final-score" id="finalScore">0</div>
            <p>素晴らしいスコアです！</p>
            <button onclick="closeGameOver()">もう一度プレイ</button>
        </div>
    </div>

    <script>
        let score = 0;
        let timeLeft = 30;
        let gameInterval = null;
        let moleInterval = null;
        let isPlaying = false;
        let currentMole = null;
        let moleTimeout = null;

        // グリッドを生成
        function createGrid() {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';

            for (let i = 0; i < 9; i++) {
                const hole = document.createElement('div');
                hole.className = 'hole';
                hole.dataset.index = i;

                const mole = document.createElement('div');
                mole.className = 'mole';
                mole.innerHTML = `
                    <div class="mole-body">
                        <div class="mole-face">
                            <div class="mole-eyes">
                                <div class="eye"></div>
                                <div class="eye"></div>
                            </div>
                            <div class="nose"></div>
                        </div>
                    </div>
                `;

                const hitEffect = document.createElement('div');
                hitEffect.className = 'hit-effect';
                hitEffect.textContent = '💥';

                hole.appendChild(mole);
                hole.appendChild(hitEffect);
                grid.appendChild(hole);

                // クリックイベント
                hole.addEventListener('click', () => whackMole(i));
                hole.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    whackMole(i);
                });
            }
        }

        createGrid();

        // モグラを出す
        function showMole() {
            if (!isPlaying) return;

            // 前のモグラを隠す
            if (currentMole !== null) {
                const prevMole = document.querySelector(`[data-index="${currentMole}"] .mole`);
                if (prevMole) {
                    prevMole.classList.remove('up');
                }
            }

            // ランダムな穴を選択
            const holes = document.querySelectorAll('.hole');
            let randomHole;
            do {
                randomHole = Math.floor(Math.random() * holes.length);
            } while (randomHole === currentMole);

            currentMole = randomHole;
            const mole = document.querySelector(`[data-index="${currentMole}"] .mole`);
            mole.classList.remove('whacked');
            mole.classList.add('up');

            // モグラを隠すタイマー
            const showTime = Math.random() * 800 + 600; // 600-1400ms
            if (moleTimeout) clearTimeout(moleTimeout);
            moleTimeout = setTimeout(() => {
                if (mole && !mole.classList.contains('whacked')) {
                    mole.classList.remove('up');
                }
            }, showTime);
        }

        // モグラを叩く
        function whackMole(index) {
            if (!isPlaying) return;

            const mole = document.querySelector(`[data-index="${index}"] .mole`);
            const hole = document.querySelector(`[data-index="${index}"]`);
            const hitEffect = hole.querySelector('.hit-effect');

            if (mole.classList.contains('up') && !mole.classList.contains('whacked')) {
                // スコア追加
                score += 10;
                updateScore();

                // 叩かれたエフェクト
                mole.classList.add('whacked');
                hitEffect.classList.add('show');
                setTimeout(() => hitEffect.classList.remove('show'), 500);

                // モグラを隠す
                setTimeout(() => {
                    mole.classList.remove('up', 'whacked');
                }, 200);

                // 即座に次のモグラを出す
                if (moleTimeout) clearTimeout(moleTimeout);
                setTimeout(showMole, 300);
            }
        }

        // ゲーム開始
        function startGame() {
            score = 0;
            timeLeft = 30;
            isPlaying = true;
            currentMole = null;

            updateScore();
            updateTimer();

            document.getElementById('startBtn').disabled = true;
            document.getElementById('resetBtn').disabled = false;

            // ゲームループ
            gameInterval = setInterval(() => {
                timeLeft--;
                updateTimer();

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // モグラ出現ループ
            moleInterval = setInterval(showMole, 1000);

            // 最初のモグラ
            showMole();
        }

        // ゲーム終了
        function endGame() {
            isPlaying = false;
            clearInterval(gameInterval);
            clearInterval(moleInterval);
            if (moleTimeout) clearTimeout(moleTimeout);

            // 全てのモグラを隠す
            document.querySelectorAll('.mole').forEach(mole => {
                mole.classList.remove('up', 'whacked');
            });

            document.getElementById('startBtn').disabled = false;
            document.getElementById('resetBtn').disabled = true;

            // 結果表示
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.add('show');
        }

        // リセット
        function resetGame() {
            endGame();
            score = 0;
            timeLeft = 30;
            updateScore();
            updateTimer();
        }

        // ゲームオーバーを閉じる
        function closeGameOver() {
            document.getElementById('gameOverOverlay').classList.remove('show');
            startGame();
        }

        // スコア更新
        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        // タイマー更新
        function updateTimer() {
            document.getElementById('timer').textContent = timeLeft;
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
