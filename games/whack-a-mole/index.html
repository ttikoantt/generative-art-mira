<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Mole</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .hole {
            aspect-ratio: 1;
            background: #8B4513;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s;
        }

        .hole:active {
            transform: scale(0.95);
        }

        .mole {
            position: absolute;
            width: 80%;
            height: 80%;
            left: 10%;
            bottom: -80%;
            background: linear-gradient(135deg, #8B4513 0%, #A0522D 100%);
            border-radius: 50% 50% 0 0;
            transition: bottom 0.15s ease-out;
        }

        .mole.up {
            bottom: 0;
        }

        .mole::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: #333;
            border-radius: 50%;
            top: 30%;
            left: 25%;
        }

        .mole::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: #333;
            border-radius: 50%;
            top: 30%;
            right: 25%;
        }

        .mole .nose {
            position: absolute;
            width: 25px;
            height: 18px;
            background: #FFB6C1;
            border-radius: 50%;
            top: 45%;
            left: 50%;
            transform: translateX(-50%);
        }

        .mole.whacked {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            z-index: 1000;
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .game-over-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
        }

        .game-over-content h2 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 10px;
        }

        .game-over-content p {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 20px;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .stat-value {
                font-size: 24px;
            }

            .game-board {
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🔨 Whack-a-Mole</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">時間</div>
                <div class="stat-value" id="time">30</div>
            </div>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="controls">
            <button id="startBtn" onclick="startGame()">スタート</button>
            <button onclick="resetGame()">リセット</button>
        </div>
    </div>

    <div class="game-over hidden" id="gameOver">
        <div class="game-over-content">
            <h2>🎉 ゲーム終了！</h2>
            <p>最終スコア: <span id="finalScore">0</span></p>
            <button onclick="resetGame()">もう一度プレイ</button>
        </div>
    </div>

    <script>
        const gameBoard = document.getElementById('gameBoard');
        const scoreDisplay = document.getElementById('score');
        const timeDisplay = document.getElementById('time');
        const startBtn = document.getElementById('startBtn');
        const gameOverDiv = document.getElementById('gameOver');
        const finalScoreSpan = document.getElementById('finalScore');

        let score = 0;
        let timeLeft = 30;
        let gameTimer = null;
        let moleTimer = null;
        let currentMole = null;
        let isPlaying = false;

        // Create holes
        for (let i = 0; i < 9; i++) {
            const hole = document.createElement('div');
            hole.className = 'hole';
            hole.innerHTML = '<div class="mole"><div class="nose"></div></div>';
            hole.addEventListener('click', whack);
            gameBoard.appendChild(hole);
        }

        function getRandomHole() {
            const holes = document.querySelectorAll('.hole');
            const index = Math.floor(Math.random() * holes.length);
            return holes[index];
        }

        function showMole() {
            if (!isPlaying) return;

            const hole = getRandomHole();
            const mole = hole.querySelector('.mole');

            // Reset previous mole
            if (currentMole) {
                currentMole.classList.remove('up');
            }

            mole.classList.remove('whacked');
            mole.classList.add('up');
            currentMole = mole;

            // Hide mole after random time
            const showTime = Math.random() * 800 + 400;
            setTimeout(() => {
                if (mole.classList.contains('up') && !mole.classList.contains('whacked')) {
                    mole.classList.remove('up');
                }
            }, showTime);

            // Schedule next mole
            const nextTime = Math.random() * 1000 + 500;
            moleTimer = setTimeout(showMole, nextTime);
        }

        function whack(e) {
            if (!isPlaying) return;

            const mole = e.currentTarget.querySelector('.mole');
            if (mole.classList.contains('up') && !mole.classList.contains('whacked')) {
                mole.classList.add('whacked');
                score += 10;
                scoreDisplay.textContent = score;

                setTimeout(() => {
                    mole.classList.remove('up');
                }, 100);
            }
        }

        function startGame() {
            if (isPlaying) return;

            isPlaying = true;
            score = 0;
            timeLeft = 30;
            scoreDisplay.textContent = score;
            timeDisplay.textContent = timeLeft;
            startBtn.disabled = true;

            showMole();

            gameTimer = setInterval(() => {
                timeLeft--;
                timeDisplay.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameTimer);
            clearTimeout(moleTimer);

            if (currentMole) {
                currentMole.classList.remove('up');
            }

            finalScoreSpan.textContent = score;
            gameOverDiv.classList.remove('hidden');
        }

        function resetGame() {
            isPlaying = false;
            clearInterval(gameTimer);
            clearTimeout(moleTimer);

            score = 0;
            timeLeft = 30;
            scoreDisplay.textContent = score;
            timeDisplay.textContent = timeLeft;
            startBtn.disabled = false;

            if (currentMole) {
                currentMole.classList.remove('up', 'whacked');
            }

            gameOverDiv.classList.add('hidden');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
