<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Whack-a-Mole</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            touch-action: manipulation;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00ff88, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
        }

        .stat {
            text-align: center;
            color: #fff;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid rgba(0, 255, 136, 0.3);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
        }

        .hole {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #1a1a2e 0%, #0a0a0a 100%);
            border-radius: 50%;
            border: 3px solid rgba(0, 255, 136, 0.5);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease;
            box-shadow: inset 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .hole:active {
            transform: scale(0.95);
        }

        .hole.active {
            border-color: #ff0088;
            box-shadow: inset 0 0 20px rgba(255, 0, 136, 0.3), 0 0 20px rgba(255, 0, 136, 0.5);
        }

        .mole {
            position: absolute;
            width: 70%;
            height: 70%;
            left: 15%;
            top: 100%;
            background: radial-gradient(circle, #ff0088 0%, #cc0066 100%);
            border-radius: 50%;
            transition: top 0.15s ease-out;
            box-shadow: 0 0 20px rgba(255, 0, 136, 0.8);
        }

        .hole.active .mole {
            top: 15%;
        }

        .mole::before {
            content: '🐹';
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            top: 0;
            left: 0;
        }

        .controls {
            margin-top: 25px;
            display: flex;
            gap: 15px;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .start-btn {
            background: linear-gradient(135deg, #00ff88 0%, #00ffff 100%);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.7);
        }

        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .fullscreen-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid rgba(0, 255, 136, 0.5);
            text-align: center;
            display: none;
            z-index: 1000;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.3);
        }

        .game-over.show {
            display: block;
        }

        .game-over h2 {
            font-size: 36px;
            color: #00ff88;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .game-over p {
            font-size: 18px;
            color: #fff;
            margin-bottom: 10px;
        }

        .game-over .final-score {
            font-size: 48px;
            color: #00ffff;
            margin: 20px 0;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.7);
        }

        .hit-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.8) 0%, transparent 70%);
            border-radius: 50%;
            animation: hit 0.3s ease-out;
            pointer-events: none;
        }

        @keyframes hit {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        .score-popup {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.8);
            animation: popup 0.5s ease-out;
            pointer-events: none;
        }

        @keyframes popup {
            0% {
                transform: translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-50px);
                opacity: 0;
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 24px;
            }

            .hole {
                width: 80px;
                height: 80px;
            }

            .stats {
                gap: 15px;
            }

            .stat-value {
                font-size: 24px;
            }

            button {
                padding: 10px 20px;
                font-size: 14px;
            }
        }

        @media (max-width: 400px) {
            .game-board {
                gap: 10px;
                padding: 15px;
            }

            .hole {
                width: 70px;
                height: 70px;
            }

            .mole::before {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <h1>Whack-a-Mole</h1>

    <div class="stats">
        <div class="stat">
            <div class="stat-label">SCORE</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">TIME</div>
            <div class="stat-value" id="time">60</div>
        </div>
        <div class="stat">
            <div class="stat-label">HIGH SCORE</div>
            <div class="stat-value" id="highScore">0</div>
        </div>
    </div>

    <div class="game-board" id="gameBoard">
        <!-- 9つの穴 -->
    </div>

    <div class="controls">
        <button class="start-btn" id="startBtn">START</button>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    </div>

    <div class="game-over" id="gameOver">
        <h2>GAME OVER!</h2>
        <p>最終スコア</p>
        <div class="final-score" id="finalScore">0</div>
        <button class="start-btn" onclick="restartGame()">もう一度</button>
    </div>

    <script>
        const gameBoard = document.getElementById('gameBoard');
        const scoreElement = document.getElementById('score');
        const timeElement = document.getElementById('time');
        const highScoreElement = document.getElementById('highScore');
        const startBtn = document.getElementById('startBtn');
        const gameOverModal = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');

        let score = 0;
        let timeLeft = 60;
        let highScore = localStorage.getItem('whackAMoleHighScore') || 0;
        let gameInterval;
        let moleInterval;
        let isPlaying = false;
        let moleTimer;
        let gameSpeed = 1000;

        highScoreElement.textContent = highScore;

        // 9つの穴を作成
        for (let i = 0; i < 9; i++) {
            const hole = document.createElement('div');
            hole.className = 'hole';
            hole.innerHTML = '<div class="mole"></div>';
            hole.addEventListener('click', () => whackMole(hole));
            hole.addEventListener('touchstart', (e) => {
                e.preventDefault();
                whackMole(hole);
            });
            gameBoard.appendChild(hole);
        }

        const holes = document.querySelectorAll('.hole');

        function whackMole(hole) {
            if (!isPlaying || !hole.classList.contains('active')) return;

            // ヒットエフェクト
            const effect = document.createElement('div');
            effect.className = 'hit-effect';
            hole.appendChild(effect);
            setTimeout(() => effect.remove(), 300);

            // スコアポップアップ
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.textContent = '+10';
            popup.style.left = '50%';
            popup.style.top = '50%';
            popup.style.transform = 'translate(-50%, -50%)';
            hole.appendChild(popup);
            setTimeout(() => popup.remove(), 500);

            // スコア加算
            score += 10;
            scoreElement.textContent = score;

            // もぐらを隠す
            hole.classList.remove('active');

            // 難易度上昇
            if (score % 50 === 0 && gameSpeed > 400) {
                gameSpeed -= 50;
            }
        }

        function showMole() {
            if (!isPlaying) return;

            // 全ての穴からアクティブを削除
            holes.forEach(hole => hole.classList.remove('active'));

            // ランダムに穴を選択
            const randomHole = holes[Math.floor(Math.random() * holes.length)];
            randomHole.classList.add('active');

            // 次のもぐらを表示
            clearTimeout(moleTimer);
            moleTimer = setTimeout(showMole, gameSpeed);
        }

        function startGame() {
            score = 0;
            timeLeft = 60;
            gameSpeed = 1000;
            isPlaying = true;

            scoreElement.textContent = score;
            timeElement.textContent = timeLeft;
            startBtn.disabled = true;
            gameOverModal.classList.remove('show');

            // ゲーム開始
            showMole();

            // タイマー
            gameInterval = setInterval(() => {
                timeLeft--;
                timeElement.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameInterval);
            clearTimeout(moleTimer);

            // 全てのもぐらを隠す
            holes.forEach(hole => hole.classList.remove('active'));

            startBtn.disabled = false;

            // ハイスコア更新
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('whackAMoleHighScore', highScore);
                highScoreElement.textContent = highScore;
            }

            // ゲームオーバー表示
            finalScoreElement.textContent = score;
            gameOverModal.classList.add('show');
        }

        function restartGame() {
            gameOverModal.classList.remove('show');
            startGame();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        startBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
