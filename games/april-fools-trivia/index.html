<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>April Fools Trivia - Generative Art by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .game-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            text-align: center;
            color: #667eea;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: clamp(0.8rem, 2vw, 1rem);
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 1;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 1;
        }

        .stat {
            text-align: center;
            padding: 0.8rem 1.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 15px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.9;
        }

        .stat-value {
            font-size: 1.5rem;
        }

        .question-container {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 1;
        }

        .question-number {
            color: #667eea;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .question {
            color: #333;
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .options {
            display: grid;
            gap: 0.8rem;
            position: relative;
            z-index: 1;
        }

        .option {
            padding: 1rem 1.5rem;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            position: relative;
            overflow: hidden;
        }

        .option:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .option.correct {
            background: linear-gradient(135deg, #6bcb77, #4caf50);
            border-color: #4caf50;
            color: white;
            animation: correctPulse 0.6s;
        }

        .option.incorrect {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            border-color: #ee5a6f;
            color: white;
            animation: shake 0.5s;
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .feedback {
            text-align: center;
            padding: 1rem;
            margin-top: 1rem;
            border-radius: 10px;
            font-weight: bold;
            position: relative;
            z-index: 1;
        }

        .feedback.show {
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.5rem;
            position: relative;
            z-index: 1;
        }

        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-next {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-next:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.6);
        }

        .btn-restart {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            box-shadow: 0 5px 20px rgba(238, 90, 111, 0.4);
        }

        .btn-restart:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(238, 90, 111, 0.6);
        }

        .btn-fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            color: #667eea;
            border: 2px solid #667eea;
            padding: 0.8rem 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.3s;
            z-index: 1000;
        }

        .btn-fullscreen:hover {
            background: #667eea;
            color: white;
            transform: scale(1.05);
        }

        .hidden {
            display: none;
        }

        .result-container {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .result-title {
            font-size: 2rem;
            color: #667eea;
            margin-bottom: 1rem;
        }

        .result-score {
            font-size: 4rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 1rem 0;
        }

        .result-message {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 2rem;
        }

        .emoji {
            font-size: 3rem;
            margin: 1rem 0;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <button class="btn-fullscreen" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <div class="game-container">
        <h1>🎭 April Fools Trivia</h1>
        <div class="subtitle">Test Your April Fools Knowledge!</div>

        <div id="gameSection">
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">Question</div>
                    <div class="stat-value"><span id="currentQ">1</span>/<span id="totalQ">10</span></div>
                </div>
                <div class="stat">
                    <div class="stat-label">Score</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Streak</div>
                    <div class="stat-value" id="streak">0 🔥</div>
                </div>
            </div>

            <div class="question-container">
                <div class="question-number">Question <span id="qNumber">1</span></div>
                <div class="question" id="questionText">Loading question...</div>
            </div>

            <div class="options" id="optionsContainer">
                <!-- Options will be generated here -->
            </div>

            <div class="feedback hidden" id="feedback"></div>

            <div class="btn-container">
                <button class="btn btn-next hidden" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
            </div>
        </div>

        <div id="resultSection" class="result-container hidden">
            <div class="emoji">🎉</div>
            <div class="result-title">Quiz Complete!</div>
            <div class="result-score" id="finalScore">0/10</div>
            <div class="result-message" id="resultMessage">Great job!</div>
            <div class="btn-container">
                <button class="btn btn-restart" onclick="restartGame()">Play Again 🔄</button>
            </div>
        </div>
    </div>

    <script>
        const triviaData = [
            {
                question: "What is the origin of April Fools' Day?",
                options: [
                    "Ancient Roman festival of Hilaria",
                    "Calendar change in France (1582)",
                    "Spring equinox celebration",
                    "All of the above may be true"
                ],
                correct: 3,
                fact: "The true origin is unclear, but the most popular theory is about France's calendar change!"
            },
            {
                question: "In which country do people celebrate April Fools by sticking paper fish on people's backs?",
                options: ["Italy", "France", "Spain", "Germany"],
                correct: 1,
                fact: "In France, it's called 'Poisson d'Avril' (April Fish)! 🐟"
            },
            {
                question: "What year did Google famously introduce 'Gmail Paper' as an April Fools' joke?",
                options: ["2005", "2007", "2010", "2012"],
                correct: 1,
                fact: "Google claimed they would print and mail your emails for free! 📧"
            },
            {
                question: "Which famous hoax involved people believing they could see spaghetti growing on trees?",
                options: ["BBC (1957)", "CNN (1980)", "NBC (1965)", "Fox News (1990)"],
                correct: 0,
                fact: "The BBC's 'Spaghetti Tree' hoax fooled thousands in 1957! 🍝"
            },
            {
                question: "What is 'April Fools' Day' called in Scotland?",
                options: ["Fool's Day", "Gowkie Day", "Hunt-the-Gowk Day", "Trick Day"],
                correct: 2,
                fact: "'Gowk' means cuckoo, symbolizing a fool! 🐦"
            },
            {
                question: "Which media company once announced they would purchase the 'Idea of Tuesday'?",
                options: ["Google", "BBC", "The Onion", "CNN"],
                correct: 2,
                fact: "The Onion, a satirical newspaper, is famous for creative April Fools' content! 📰"
            },
            {
                question: "In what year did Taco Bell announce they had purchased the Liberty Bell?",
                options: ["1993", "1996", "1999", "2001"],
                correct: 1,
                fact: "They renamed it 'Taco Liberty Bell' - thousands were fooled! 🔔"
            },
            {
                question: "Which country celebrates April Fools' Day on April 1st but also has a 13th day festival?",
                options: ["India", "Brazil", "Nepal", "Thailand"],
                correct: 0,
                fact: "India has Holi, the festival of colors, in March! 🎨"
            },
            {
                question: "What did Burger King once introduce as a 'Chocolate Whopper' in Germany?",
                options: ["Real chocolate burger", "Fake announcement", "Limited edition", "Dessert burger"],
                correct: 1,
                fact: "It was an April Fools' joke that looked surprisingly real! 🍔"
            },
            {
                question: "Which sport traditionally has its season start on April 1st in many countries?",
                options: ["Baseball", "Cricket", "Fishing", "All sports"],
                correct: 2,
                fact: "Fishing season traditionally starts April 1st - perfect for April Fools! 🎣"
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let streak = 0;
        let answered = false;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function loadQuestion() {
            answered = false;
            const q = triviaData[currentQuestion];

            document.getElementById('qNumber').textContent = currentQuestion + 1;
            document.getElementById('currentQ').textContent = currentQuestion + 1;
            document.getElementById('totalQ').textContent = triviaData.length;
            document.getElementById('questionText').textContent = q.question;
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('nextBtn').classList.add('hidden');

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            const shuffledOptions = q.options.map((opt, idx) => ({ text: opt, originalIdx: idx }));
            shuffleArray(shuffledOptions);

            shuffledOptions.forEach((opt, idx) => {
                const optionBtn = document.createElement('button');
                optionBtn.className = 'option';
                optionBtn.textContent = opt.text;
                optionBtn.onclick = () => checkAnswer(opt.originalIdx, optionBtn);
                optionsContainer.appendChild(optionBtn);
            });
        }

        function checkAnswer(selectedIdx, btnElement) {
            if (answered) return;
            answered = true;

            const q = triviaData[currentQuestion];
            const isCorrect = selectedIdx === q.correct;
            const allOptions = document.querySelectorAll('.option');

            allOptions.forEach((opt, idx) => {
                opt.onclick = null;
                if (parseInt(opt.dataset.originalIdx) === q.correct) {
                    opt.classList.add('correct');
                }
            });

            if (isCorrect) {
                score++;
                streak++;
                btnElement.classList.add('correct');
                showFeedback('✅ Correct! ' + q.fact, true);
            } else {
                streak = 0;
                btnElement.classList.add('incorrect');
                showFeedback('❌ Wrong! ' + q.fact, false);
            }

            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak + ' 🔥';

            setTimeout(() => {
                document.getElementById('nextBtn').classList.remove('hidden');
                if (currentQuestion === triviaData.length - 1) {
                    document.getElementById('nextBtn').textContent = 'See Results 🎉';
                }
            }, 1500);
        }

        function showFeedback(message, isCorrect) {
            const feedback = document.getElementById('feedback');
            feedback.textContent = message;
            feedback.className = 'feedback show';
            feedback.style.background = isCorrect
                ? 'linear-gradient(135deg, #d4edda, #c3e6cb)'
                : 'linear-gradient(135deg, #f8d7da, #f5c6cb)';
            feedback.style.color = isCorrect ? '#155724' : '#721c24';
        }

        function nextQuestion() {
            currentQuestion++;

            if (currentQuestion >= triviaData.length) {
                showResults();
            } else {
                loadQuestion();
            }
        }

        function showResults() {
            document.getElementById('gameSection').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');

            const percentage = (score / triviaData.length) * 100;
            document.getElementById('finalScore').textContent = `${score}/${triviaData.length}`;

            let message, emoji;
            if (percentage === 100) {
                message = "Perfect! You're an April Fools master! 🏆";
                emoji = "🎊";
            } else if (percentage >= 80) {
                message = "Excellent! You really know your stuff! 🌟";
                emoji = "🎉";
            } else if (percentage >= 60) {
                message = "Good job! Keep learning! 📚";
                emoji = "😊";
            } else if (percentage >= 40) {
                message = "Not bad, but room for improvement! 💪";
                emoji = "🤔";
            } else {
                message = "April Fools got you! Try again! 😜";
                emoji = "😂";
            }

            document.getElementById('resultMessage').textContent = message;
            document.querySelector('.result-container .emoji').textContent = emoji;
        }

        function restartGame() {
            currentQuestion = 0;
            score = 0;
            streak = 0;

            document.getElementById('score').textContent = '0';
            document.getElementById('streak').textContent = '0 🔥';
            document.getElementById('nextBtn').textContent = 'Next Question →';

            document.getElementById('gameSection').classList.remove('hidden');
            document.getElementById('resultSection').classList.add('hidden');

            shuffleArray(triviaData);
            loadQuestion();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize game
        shuffleArray(triviaData);
        loadQuestion();
    </script>
</body>
</html>
