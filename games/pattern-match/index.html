<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Match | パターンマッチ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: white;
            padding: 20px;
        }

        .game-container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #00d9ff;
        }

        .grid-container {
            margin: 20px auto;
            display: inline-block;
        }

        .grid {
            display: grid;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 217, 255, 0.2);
        }

        .cell {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .cell:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.15);
        }

        .cell.active {
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            border-color: transparent;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.6);
            transform: scale(1.1);
        }

        .cell.correct {
            background: linear-gradient(135deg, #00ff88, #00d9ff);
            animation: correctPulse 0.5s;
        }

        .cell.wrong {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            animation: wrongPulse 0.5s;
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @keyframes wrongPulse {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .message {
            margin: 20px 0;
            font-size: 1.3rem;
            min-height: 40px;
            color: #00ff88;
            font-weight: bold;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            padding: 15px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.5);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            transition: width 0.3s;
            border-radius: 3px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .cell {
                width: 55px;
                height: 55px;
                font-size: 1.2rem;
            }

            .grid {
                gap: 8px;
                padding: 15px;
            }

            .stat-value {
                font-size: 1.4rem;
            }

            button {
                padding: 12px 24px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">⛶ 全画面</button>

    <div class="game-container">
        <h1>🧩 Pattern Match</h1>

        <div class="stats">
            <div class="stat">
                <span class="stat-label">レベル</span>
                <span class="stat-value" id="level">1</span>
            </div>
            <div class="stat">
                <span class="stat-label">スコア</span>
                <span class="stat-value" id="score">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">最高</span>
                <span class="stat-value" id="highScore">0</span>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="message" id="message">「開始」ボタンを押してスタート！</div>

        <div class="grid-container">
            <div class="grid" id="grid"></div>
        </div>

        <div class="buttons">
            <button id="startBtn">🚀 開始</button>
            <button id="resetBtn" disabled>🔄 リセット</button>
        </div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const message = document.getElementById('message');
        const levelDisplay = document.getElementById('level');
        const scoreDisplay = document.getElementById('score');
        const highScoreDisplay = document.getElementById('highScore');
        const progressFill = document.getElementById('progressFill');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let gridSize = 3;
        let pattern = [];
        let playerPattern = [];
        let level = 1;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('patternMatchHighScore')) || 0;
        let isShowingPattern = false;
        let isPlayerTurn = false;
        let patternLength = 3;

        highScoreDisplay.textContent = highScore;

        // Initialize grid
        function initGrid() {
            grid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            grid.innerHTML = '';

            for (let i = 0; i < gridSize * gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', handleCellClick);
                grid.appendChild(cell);
            }
        }

        // Generate pattern
        function generatePattern() {
            pattern = [];
            const totalCells = gridSize * gridSize;

            for (let i = 0; i < patternLength; i++) {
                let index;
                do {
                    index = Math.floor(Math.random() * totalCells);
                } while (pattern.includes(index));
                pattern.push(index);
            }
        }

        // Show pattern
        async function showPattern() {
            isShowingPattern = true;
            isPlayerTurn = false;
            message.textContent = 'パターンを覚えて...';
            progressFill.style.width = '0%';

            // Clear all cells
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.classList.remove('active', 'correct', 'wrong');
            });

            await sleep(500);

            // Show pattern with animation
            for (let i = 0; i < pattern.length; i++) {
                const cell = cells[pattern[i]];
                cell.classList.add('active');
                progressFill.style.width = `${((i + 1) / pattern.length) * 100}%`;

                await sleep(600);
                cell.classList.remove('active');
                await sleep(200);
            }

            await sleep(300);
            isShowingPattern = false;
            isPlayerTurn = true;
            message.textContent = '同じパターンをクリック！';
        }

        // Handle cell click
        function handleCellClick(e) {
            if (!isPlayerTurn || isShowingPattern) return;

            const cell = e.target;
            const index = parseInt(cell.dataset.index);

            // Check if already clicked
            if (playerPattern.includes(index)) return;

            // Check if correct
            const currentIndex = playerPattern.length;

            if (index === pattern[currentIndex]) {
                cell.classList.add('correct');
                playerPattern.push(index);

                // Check if pattern complete
                if (playerPattern.length === pattern.length) {
                    isPlayerTurn = false;
                    score += level * 10;
                    scoreDisplay.textContent = score;
                    message.textContent = '🎉 正解！';

                    setTimeout(() => {
                        nextLevel();
                    }, 1000);
                }
            } else {
                // Wrong!
                cell.classList.add('wrong');
                isPlayerTurn = false;
                message.textContent = '❌ 間違い！';

                setTimeout(() => {
                    gameOver();
                }, 1000);
            }
        }

        // Next level
        function nextLevel() {
            level++;
            levelDisplay.textContent = level;

            // Increase difficulty
            if (level % 3 === 0 && gridSize < 5) {
                gridSize++;
                initGrid();
            }

            if (level % 2 === 0) {
                patternLength++;
            }

            playerPattern = [];
            generatePattern();
            setTimeout(() => {
                showPattern();
            }, 500);
        }

        // Game over
        function gameOver() {
            message.textContent = `ゲームオーバー！ スコア: ${score}`;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('patternMatchHighScore', highScore);
                highScoreDisplay.textContent = highScore;
                message.textContent = `🏆 新記録！ スコア: ${score}`;
            }

            startBtn.disabled = false;
            resetBtn.disabled = true;

            // Show correct pattern
            const cells = document.querySelectorAll('.cell');
            pattern.forEach(index => {
                cells[index].classList.add('correct');
            });
        }

        // Start game
        function startGame() {
            level = 1;
            score = 0;
            gridSize = 3;
            patternLength = 3;

            levelDisplay.textContent = level;
            scoreDisplay.textContent = score;

            startBtn.disabled = true;
            resetBtn.disabled = false;

            initGrid();
            generatePattern();
            showPattern();
        }

        // Reset game
        function resetGame() {
            isPlayerTurn = false;
            isShowingPattern = false;
            startBtn.disabled = false;
            resetBtn.disabled = true;
            message.textContent = '「開始」ボタンを押してスタート！';

            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.classList.remove('active', 'correct', 'wrong');
            });
        }

        // Sleep utility
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Fullscreen
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                fullscreenBtn.textContent = '⛶ 退出';
            } else {
                document.exitFullscreen();
                fullscreenBtn.textContent = '⛶ 全画面';
            }
        });

        // Event listeners
        startBtn.addEventListener('click', startGame);
        resetBtn.addEventListener('click', resetGame);

        // Initialize
        initGrid();
    </script>
</body>
</html>
