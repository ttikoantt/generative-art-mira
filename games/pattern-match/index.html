<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Match - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #667eea;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            margin-bottom: 25px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .stat {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 25px;
            border-radius: 15px;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .stat-label {
            font-size: 0.8em;
            opacity: 0.9;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            margin: 0 auto 25px;
            aspect-ratio: 1;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            width: 100%;
            height: 100%;
            padding: 10px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 15px;
        }

        .cell {
            aspect-ratio: 1;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 3px solid transparent;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .cell:active {
            transform: scale(0.95);
        }

        .cell.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: #764ba2;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.6);
        }

        .cell.correct {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            animation: pulse 0.5s;
        }

        .cell.wrong {
            background: linear-gradient(135deg, #eb3349, #f45c43);
            animation: shake 0.5s;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 20px 40px;
            border-radius: 15px;
            font-size: clamp(1rem, 3vw, 1.3rem);
            font-weight: bold;
            z-index: 10;
            display: none;
            animation: fadeIn 0.3s;
        }

        .message.show {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .timer-bar {
            width: 100%;
            height: 8px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.1s linear;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 25px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #4a90d9, #5ba0e9);
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .grid {
                gap: 5px;
                padding: 8px;
            }

            .cell {
                border-radius: 5px;
            }

            .stats {
                gap: 15px;
            }

            button {
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Pattern Match</h1>
        <p class="subtitle">パターンを記憶して同じ配置を再現しよう</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">Level</div>
                <div id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">Score</div>
                <div id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Best</div>
                <div id="best">0</div>
            </div>
        </div>

        <div id="game-container">
            <div class="timer-bar">
                <div class="timer-fill" id="timer-fill"></div>
            </div>
            <div class="grid" id="grid"></div>
            <div class="message" id="message"></div>
        </div>

        <div class="buttons">
            <button id="start-btn" onclick="startGame()">🎮 Start</button>
            <button onclick="showHint()">💡 Hint</button>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">📺 Fullscreen</button>
        </div>
    </div>

    <script>
        const gridSize = 5;
        let pattern = [];
        let playerPattern = [];
        let level = 1;
        let score = 0;
        let best = parseInt(localStorage.getItem('patternMatchBest')) || 0;
        let isShowingPattern = false;
        let isPlaying = false;
        let displayTime = 0;

        function initGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            for (let i = 0; i < gridSize * gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleCellClick(i));
                grid.appendChild(cell);
            }
            
            updateStats();
        }

        function generatePattern() {
            const cellCount = Math.min(3 + level, 15);
            pattern = [];
            
            while (pattern.length < cellCount) {
                const index = Math.floor(Math.random() * (gridSize * gridSize));
                if (!pattern.includes(index)) {
                    pattern.push(index);
                }
            }
        }

        function showPattern() {
            isShowingPattern = true;
            isPlaying = false;
            playerPattern = [];
            
            const cells = document.querySelectorAll('.cell');
            const displayTime = Math.max(1000, 2500 - level * 150);
            
            // Show pattern
            pattern.forEach(index => {
                cells[index].classList.add('active');
            });

            showMessage('覚えて！');

            setTimeout(() => {
                cells.forEach(cell => {
                    cell.classList.remove('active');
                });
                hideMessage();
                
                isShowingPattern = false;
                isPlaying = true;
                showMessage('再現して！');
                
                setTimeout(() => hideMessage(), 1000);
            }, displayTime);
        }

        function handleCellClick(index) {
            if (isShowingPattern || !isPlaying) return;
            
            const cell = document.querySelectorAll('.cell')[index];
            
            if (playerPattern.includes(index)) {
                // Deselect
                playerPattern = playerPattern.filter(i => i !== index);
                cell.classList.remove('active');
            } else {
                // Select
                playerPattern.push(index);
                cell.classList.add('active');
                
                // Check immediately if wrong
                if (!pattern.includes(index)) {
                    cell.classList.add('wrong');
                    setTimeout(() => {
                        cell.classList.remove('wrong');
                        gameOver();
                    }, 500);
                    return;
                }
                
                // Check if completed
                if (playerPattern.length === pattern.length) {
                    checkWin();
                }
            }
        }

        function checkWin() {
            const correct = pattern.every(index => playerPattern.includes(index));
            
            if (correct) {
                // Highlight correct cells
                playerPattern.forEach(index => {
                    document.querySelectorAll('.cell')[index].classList.add('correct');
                });
                
                const bonus = Math.floor(level * 10 * (1 + (3 - level * 0.1) * 0.5));
                score += bonus;
                
                showMessage(`🎉 正解！ +${bonus}`);
                
                setTimeout(() => {
                    level++;
                    updateStats();
                    startLevel();
                }, 1500);
            }
        }

        function gameOver() {
            isPlaying = false;
            
            if (score > best) {
                best = score;
                localStorage.setItem('patternMatchBest', best);
                showMessage(`🏆 新記録！ ${score}点`);
            } else {
                showMessage(`😢 Game Over！ ${score}点`);
            }
            
            document.getElementById('start-btn').disabled = false;
        }

        function showHint() {
            if (!isPlaying || playerPattern.length >= pattern.length) return;
            
            const unrevealed = pattern.filter(i => !playerPattern.includes(i));
            if (unrevealed.length > 0) {
                const hintIndex = unrevealed[Math.floor(Math.random() * unrevealed.length)];
                const cell = document.querySelectorAll('.cell')[hintIndex];
                
                cell.style.boxShadow = '0 0 20px 5px rgba(255, 215, 0, 0.8)';
                setTimeout(() => {
                    cell.style.boxShadow = '';
                }, 1000);
            }
        }

        function showMessage(text) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.classList.add('show');
        }

        function hideMessage() {
            document.getElementById('message').classList.remove('show');
        }

        function updateStats() {
            document.getElementById('level').textContent = level;
            document.getElementById('score').textContent = score;
            document.getElementById('best').textContent = best;
        }

        function startGame() {
            level = 1;
            score = 0;
            updateStats();
            document.getElementById('start-btn').disabled = true;
            startLevel();
        }

        function startLevel() {
            playerPattern = [];
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.classList.remove('active', 'correct', 'wrong');
            });
            
            generatePattern();
            setTimeout(() => showPattern(), 500);
        }

        function toggleFullscreen() {
            const container = document.querySelector('.container');
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => {
                    console.log('Fullscreen failed:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        initGrid();
    </script>
</body>
</html>
