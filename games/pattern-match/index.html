<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Match - パターン記憶ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .game-container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .stat {
            color: #fff;
            font-size: 1.1rem;
        }

        .stat span {
            color: #00d4ff;
            font-weight: bold;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px auto;
            max-width: 300px;
        }

        .cell {
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .cell::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 0;
            height: 0;
            background: radial-gradient(circle, #00d4ff 0%, transparent 70%);
            border-radius: 50%;
            transition: all 0.3s;
        }

        .cell.active::before {
            width: 60px;
            height: 60px;
        }

        .cell.correct {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
        }

        .cell.wrong {
            border-color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .cell.hint {
            border-color: #ffbb00;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .message {
            color: #fff;
            font-size: 1.3rem;
            margin: 20px 0;
            min-height: 40px;
            font-weight: bold;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
            font-weight: bold;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 212, 255, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .level-info {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            margin: 15px 0;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }

            .grid-container {
                gap: 8px;
                max-width: 260px;
            }

            .cell {
                width: 80px;
                height: 80px;
            }

            .stats {
                gap: 20px;
                font-size: 1rem;
            }

            .btn {
                padding: 12px 30px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎯 Pattern Match</h1>
        <p class="subtitle">パターンを記憶して再現しよう</p>

        <div class="stats">
            <div class="stat">レベル: <span id="level">1</span></div>
            <div class="stat">スコア: <span id="score">0</span></div>
        </div>

        <div class="level-info">表示されるパターンを覚えて、同じ順番でタップ！</div>

        <div class="grid-container" id="grid">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="message" id="message"></div>

        <button class="btn" id="startBtn" onclick="startGame()">ゲーム開始</button>
    </div>

    <script>
        const cells = document.querySelectorAll('.cell');
        const messageEl = document.getElementById('message');
        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');

        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let score = 0;
        let isShowing = false;
        let canClick = false;

        function startGame() {
            level = 1;
            score = 0;
            updateStats();
            startBtn.disabled = true;
            startBtn.textContent = 'プレイ中...';
            nextLevel();
        }

        function nextLevel() {
            playerSequence = [];
            sequence = [];
            canClick = false;

            const sequenceLength = Math.min(level + 2, 9);
            messageEl.textContent = 'パターンを覚えて...';
            messageEl.style.color = '#fff';

            setTimeout(() => {
                generateSequence(sequenceLength);
                showSequence();
            }, 1000);
        }

        function generateSequence(length) {
            const usedIndices = new Set();
            for (let i = 0; i < length; i++) {
                let index;
                do {
                    index = Math.floor(Math.random() * 9);
                } while (usedIndices.has(index));
                usedIndices.add(index);
                sequence.push(index);
            }
        }

        function showSequence() {
            isShowing = true;
            let i = 0;

            const interval = setInterval(() => {
                if (i >= sequence.length) {
                    clearInterval(interval);
                    isShowing = false;
                    canClick = true;
                    messageEl.textContent = '同じ順番でタップ！';
                    messageEl.style.color = '#00d4ff';
                    return;
                }

                flashCell(sequence[i]);
                i++;
            }, 800);
        }

        function flashCell(index) {
            const cell = cells[index];
            cell.classList.add('active');

            setTimeout(() => {
                cell.classList.remove('active');
            }, 400);
        }

        cells.forEach((cell, index) => {
            cell.addEventListener('click', () => {
                if (!canClick || isShowing) return;

                handleCellClick(index);
            });
        });

        function handleCellClick(index) {
            playerSequence.push(index);
            flashCell(index);

            const currentIndex = playerSequence.length - 1;

            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                gameOver();
                return;
            }

            if (playerSequence.length === sequence.length) {
                levelComplete();
            }
        }

        function levelComplete() {
            canClick = false;
            const bonus = level * 100;
            score += bonus;
            level++;
            updateStats();

            messageEl.textContent = `正解！ +${bonus}点`;
            messageEl.style.color = '#00ff88';

            // 全てのセルを緑に光らせる
            sequence.forEach(index => {
                cells[index].classList.add('correct');
            });

            setTimeout(() => {
                sequence.forEach(index => {
                    cells[index].classList.remove('correct');
                });
                nextLevel();
            }, 1500);
        }

        function gameOver() {
            canClick = false;
            startBtn.disabled = false;
            startBtn.textContent = 'もう一度';

            messageEl.textContent = `ゲームオーバー！ スコア: ${score}`;
            messageEl.style.color = '#ff4444';

            cells.forEach(cell => {
                cell.classList.add('wrong');
            });

            setTimeout(() => {
                cells.forEach(cell => {
                    cell.classList.remove('wrong');
                });
            }, 1000);
        }

        function updateStats() {
            levelEl.textContent = level;
            scoreEl.textContent = score;
        }
    </script>
</body>
</html>
