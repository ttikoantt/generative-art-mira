<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Match | Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a0a2e 0%, #16082a 50%, #0c0015 100%);
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            height: 100vh;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00f5d4, #00bbf9, #9b5de5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat {
            text-align: center;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00f5d4, #00bbf9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #b8a8d4;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 3px;
        }

        .game-area {
            position: relative;
            margin: 10px 0;
        }

        .grid {
            display: grid;
            gap: 12px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 245, 212, 0.2);
        }

        .cell {
            width: 80px;
            height: 80px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 3px solid rgba(0, 245, 212, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .cell:hover {
            transform: scale(1.05);
            border-color: rgba(0, 245, 212, 0.6);
            box-shadow: 0 0 20px rgba(0, 245, 212, 0.4);
        }

        .cell.active {
            background: linear-gradient(135deg, #00f5d4, #00bbf9);
            border-color: #00f5d4;
            box-shadow: 0 0 30px rgba(0, 245, 212, 0.6);
        }

        .cell.correct {
            background: linear-gradient(135deg, #00bbf9, #9b5de5);
            animation: pulse 0.5s ease;
        }

        .cell.wrong {
            background: linear-gradient(135deg, #f72585, #7209b7);
            animation: shake 0.5s ease;
        }

        .cell.preview {
            background: linear-gradient(135deg, #ffd60a, #ff9e00);
            border-color: #ffd60a;
            box-shadow: 0 0 30px rgba(255, 214, 10, 0.6);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            padding: 30px 50px;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 20px;
            border: 3px solid #00f5d4;
            box-shadow: 0 0 40px rgba(0, 245, 212, 0.5);
            z-index: 100;
            display: none;
        }

        .message.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .controls {
            margin-top: 20px;
        }

        .btn {
            padding: 15px 35px;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00f5d4, #00bbf9);
            color: #000;
            box-shadow: 0 4px 20px rgba(0, 245, 212, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 245, 212, 0.6);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(0, 245, 212, 0.8);
            color: #000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 1000;
        }

        .instructions {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #b8a8d4;
            text-align: center;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.4rem;
            }

            .cell {
                width: 60px;
                height: 60px;
                font-size: 1.5rem;
            }

            .grid {
                gap: 8px;
                padding: 15px;
            }

            .message {
                font-size: 1.5rem;
                padding: 20px 30px;
            }

            .btn {
                padding: 12px 28px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全画面</button>

    <div class="container">
        <h1>🧩 Pattern Match</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">スコア</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="level">1</div>
                <div class="stat-label">レベル</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="best">0</div>
                <div class="stat-label">ベスト</div>
            </div>
        </div>

        <div class="game-area">
            <div class="grid" id="grid"></div>
            <div class="message" id="message"></div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn" onclick="startGame()">🚀 スタート</button>
        </div>

        <div class="instructions">
            パターンを覚えて、同じ順番でタップしよう！
        </div>
    </div>

    <script>
        const gridSize = 4;
        const gridElement = document.getElementById('grid');
        const messageElement = document.getElementById('message');
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');
        const bestElement = document.getElementById('best');
        const startBtn = document.getElementById('startBtn');

        let pattern = [];
        let playerPattern = [];
        let score = 0;
        let level = 1;
        let bestScore = localStorage.getItem('patternMatchBest') || 0;
        let isShowingPattern = false;
        let canClick = false;

        const emojis = ['🌟', '💎', '🔥', '⚡', '🌈', '🎯', '💫', '🎨', '🎭', '🎪', '🎢', '🎡'];

        // Initialize grid
        function initGrid() {
            gridElement.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            gridElement.innerHTML = '';

            for (let i = 0; i < gridSize * gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleCellClick(i));
                gridElement.appendChild(cell);
            }

            bestElement.textContent = bestScore;
        }

        function generatePattern() {
            const length = Math.min(3 + Math.floor(level / 2), 12);
            pattern = [];

            for (let i = 0; i < length; i++) {
                const index = Math.floor(Math.random() * (gridSize * gridSize));
                if (!pattern.includes(index)) {
                    pattern.push(index);
                }
            }
        }

        function showMessage(text, duration = 2000) {
            messageElement.textContent = text;
            messageElement.classList.add('show');

            if (duration > 0) {
                setTimeout(() => {
                    messageElement.classList.remove('show');
                }, duration);
            }
        }

        async function showPattern() {
            isShowingPattern = true;
            canClick = false;
            playerPattern = [];

            // Clear all cells
            document.querySelectorAll('.cell').forEach(cell => {
                cell.className = 'cell';
            });

            await sleep(500);

            // Show pattern
            for (let i = 0; i < pattern.length; i++) {
                const cell = document.querySelector(`[data-index="${pattern[i]}"]`);
                cell.classList.add('preview');

                if (i < pattern.length - 1) {
                    await sleep(Math.max(600 - level * 30, 300));
                    cell.classList.remove('preview');
                }
            }

            // Clear pattern
            await sleep(Math.max(600 - level * 30, 300));
            document.querySelectorAll('.cell').forEach(cell => {
                cell.classList.remove('preview');
            });

            isShowingPattern = false;
            canClick = true;
            showMessage('GO!', 1000);
        }

        async function handleCellClick(index) {
            if (!canClick || isShowingPattern) return;

            const cell = document.querySelector(`[data-index="${index}"]`);

            if (playerPattern.includes(index)) {
                // Already clicked this cell
                return;
            }

            playerPattern.push(index);

            // Check if correct
            const currentIndex = playerPattern.length - 1;
            if (pattern[currentIndex] === index) {
                // Correct
                cell.classList.add('correct');
                score += 10 * level;
                scoreElement.textContent = score;

                // Check if complete
                if (playerPattern.length === pattern.length) {
                    canClick = false;
                    await sleep(500);
                    levelUp();
                }
            } else {
                // Wrong
                cell.classList.add('wrong');
                canClick = false;
                gameOver();
            }
        }

        async function levelUp() {
            level++;
            levelElement.textContent = level;

            // Bonus points
            score += 50 * level;
            scoreElement.textContent = score;

            await sleep(500);
            showMessage(`🎉 レベル ${level}！`, 1500);

            await sleep(1500);
            generatePattern();
            await showPattern();
        }

        function gameOver() {
            // Show correct pattern
            pattern.forEach((index, i) => {
                setTimeout(() => {
                    const cell = document.querySelector(`[data-index="${index}"]`);
                    cell.classList.add('active');
                }, i * 100);
            });

            // Update best score
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('patternMatchBest', bestScore);
                bestElement.textContent = bestScore;
            }

            showMessage(`💀 ゲームオーバー！\nスコア: ${score}`, -1);
            startBtn.textContent = '🔄 もう一度';
        }

        async function startGame() {
            score = 0;
            level = 1;
            scoreElement.textContent = score;
            levelElement.textContent = level;
            startBtn.textContent = '🚀 スタート';

            messageElement.classList.remove('show');

            // Clear all cells
            document.querySelectorAll('.cell').forEach(cell => {
                cell.className = 'cell';
            });

            await sleep(500);
            generatePattern();
            await showPattern();
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        initGrid();
    </script>
</body>
</html>
