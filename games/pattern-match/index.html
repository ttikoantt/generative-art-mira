<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Match - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 800px;
        }

        h1 {
            color: #fff;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: clamp(0.8rem, 2vw, 1rem);
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            display: block;
        }

        .stat-value {
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .game-area {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .pattern-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 400px;
            margin: 0 auto 20px;
        }

        .cell {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 3px solid transparent;
        }

        .cell:hover {
            transform: scale(1.05);
        }

        .cell.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-color: #fff;
            box-shadow: 0 0 20px rgba(245, 87, 108, 0.5);
        }

        .cell.correct {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .cell.wrong {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .message {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 20px;
            min-height: 30px;
        }

        .controls {
            margin-top: 20px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 90%;
        }

        .overlay-content h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .pattern-grid {
                gap: 10px;
            }

            .cell {
                width: 60px;
                height: 60px;
            }

            .stats {
                gap: 15px;
            }

            .stat {
                padding: 8px 15px;
            }
        }

        @media (max-width: 480px) {
            .cell {
                width: 50px;
                height: 50px;
            }

            .pattern-grid {
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧩 Pattern Match</h1>
        <p class="subtitle">パターン記憶ゲーム</p>

        <div class="stats">
            <div class="stat">
                <span class="stat-label">レベル</span>
                <span class="stat-value" id="level">1</span>
            </div>
            <div class="stat">
                <span class="stat-label">スコア</span>
                <span class="stat-value" id="score">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">最高記録</span>
                <span class="stat-value" id="highScore">0</span>
            </div>
        </div>

        <div class="game-area">
            <p class="message" id="message">スタートボタンを押してね！</p>
            <div class="pattern-grid" id="grid"></div>
        </div>

        <div class="controls">
            <button onclick="startGame()">🎮 スタート</button>
        </div>
    </div>

    <div class="overlay" id="overlay">
        <div class="overlay-content">
            <h2 id="overlayTitle">ゲームオーバー</h2>
            <p id="overlayMessage"></p>
            <button onclick="startGame()">🔄 もう一度</button>
        </div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const messageEl = document.getElementById('message');
        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlayMessage = document.getElementById('overlayMessage');

        let cells = [];
        let pattern = [];
        let playerPattern = [];
        let level = 1;
        let score = 0;
        let highScore = localStorage.getItem('patternMatchHighScore') || 0;
        let isShowing = false;
        let canPlay = false;

        highScoreEl.textContent = highScore;

        function initGrid() {
            grid.innerHTML = '';
            cells = [];
            for (let i = 0; i < 16; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', handleCellClick);
                grid.appendChild(cell);
                cells.push(cell);
            }
        }

        function generatePattern() {
            pattern = [];
            const count = Math.min(3 + level, 8);
            const used = new Set();

            while (pattern.length < count) {
                const index = Math.floor(Math.random() * 16);
                if (!used.has(index)) {
                    used.add(index);
                    pattern.push(index);
                }
            }
        }

        async function showPattern() {
            isShowing = true;
            canPlay = false;
            messageEl.textContent = 'パターンを覚えてね！';
            messageEl.style.color = '#f5576c';

            clearCells();

            for (let i = 0; i < pattern.length; i++) {
                await sleep(300);
                cells[pattern[i]].classList.add('active');
                await sleep(500);
                cells[pattern[i]].classList.remove('active');
            }

            await sleep(500);
            messageEl.textContent = '同じパターンをクリック！';
            messageEl.style.color = '#4facfe';
            isShowing = false;
            canPlay = true;
        }

        function handleCellClick(e) {
            if (!canPlay || isShowing) return;

            const index = parseInt(e.target.dataset.index);
            e.target.classList.add('active');

            if (pattern[playerPattern.length] === index) {
                playerPattern.push(index);
                e.target.classList.add('correct');

                if (playerPattern.length === pattern.length) {
                    canPlay = false;
                    score += level * 10;
                    scoreEl.textContent = score;
                    messageEl.textContent = '素晴らしい！ 🎉';

                    setTimeout(() => {
                        level++;
                        levelEl.textContent = level;
                        playerPattern = [];
                        clearCells();
                        showPattern();
                    }, 1500);
                }
            } else {
                canPlay = false;
                e.target.classList.add('wrong');
                gameOver();
            }
        }

        function clearCells() {
            cells.forEach(cell => {
                cell.classList.remove('active', 'correct', 'wrong');
            });
        }

        function gameOver() {
            messageEl.textContent = 'ゲームオーバー 😢';

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('patternMatchHighScore', highScore);
                highScoreEl.textContent = highScore;
                overlayTitle.textContent = '🏆 新記録！';
            } else {
                overlayTitle.textContent = 'ゲームオーバー';
            }

            overlayMessage.textContent = `レベル: ${level} | スコア: ${score}`;
            overlay.classList.add('show');
        }

        function startGame() {
            overlay.classList.remove('show');
            level = 1;
            score = 0;
            playerPattern = [];
            levelEl.textContent = level;
            scoreEl.textContent = score;
            clearCells();

            generatePattern();
            setTimeout(showPattern, 500);
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        initGrid();
    </script>
</body>
</html>
