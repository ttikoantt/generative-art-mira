<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Match</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff;
        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 20px;
            text-align: center;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-info {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .info-label {
            color: #aaa;
            margin-right: 10px;
        }

        .info-value {
            color: #00d4ff;
            font-weight: 600;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(var(--cols), 1fr);
            gap: 10px;
            width: 100%;
            height: 100%;
        }

        .cell {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .cell::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 70%;
            height: 70%;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border-radius: 50%;
            transition: transform 0.3s;
        }

        .cell.active::before {
            transform: translate(-50%, -50%) scale(1);
        }

        .cell.correct::before {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
        }

        .cell.wrong::before {
            background: linear-gradient(135deg, #ff4444, #cc0000);
        }

        .cell:hover {
            transform: scale(1.05);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            z-index: 10;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay p {
            color: #aaa;
            margin-bottom: 30px;
            text-align: center;
            max-width: 80%;
        }

        button {
            padding: 15px 40px;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 1.5rem;
            font-weight: 600;
            z-index: 100;
            animation: fadeInOut 2s forwards;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
        }

        .difficulty-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .difficulty-buttons button {
            padding: 10px 20px;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .game-info {
                flex-direction: column;
                gap: 10px;
                align-items: center;
            }

            .grid {
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <h1>🧩 Pattern Match</h1>

    <div class="game-info">
        <div class="info-item">
            <span class="info-label">レベル:</span>
            <span class="info-value" id="level">1</span>
        </div>
        <div class="info-item">
            <span class="info-label">スコア:</span>
            <span class="info-value" id="score">0</span>
        </div>
        <div class="info-item">
            <span class="info-label">ハイスコア:</span>
            <span class="info-value" id="highScore">0</span>
        </div>
    </div>

    <div class="game-container">
        <div class="grid" id="grid" style="--cols: 3"></div>

        <div class="overlay" id="startOverlay">
            <h2>Pattern Match</h2>
            <p>パターンを記憶して、同じパターンを再現しよう！</p>
            <button id="startBtn">ゲーム開始</button>
        </div>

        <div class="overlay hidden" id="gameOverOverlay">
            <h2>ゲームオーバー</h2>
            <p>スコア: <span id="finalScore">0</span></p>
            <button id="restartBtn">もう一度</button>
        </div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const levelDisplay = document.getElementById('level');
        const scoreDisplay = document.getElementById('score');
        const highScoreDisplay = document.getElementById('highScore');
        const finalScoreDisplay = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        let level = 1;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('patternMatchHighScore')) || 0;
        let gridSize = 3;
        let pattern = [];
        let playerPattern = [];
        let isMemorizing = false;
        let isPlaying = false;

        function initGame() {
            highScoreDisplay.textContent = highScore;
        }

        function createGrid(size) {
            grid.innerHTML = '';
            grid.style.setProperty('--cols', size);
            
            for (let i = 0; i < size * size; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleCellClick(i));
                grid.appendChild(cell);
            }
        }

        function generatePattern(size, level) {
            const cells = size * size;
            const numActive = Math.min(3 + level, cells - 1);
            const pattern = new Set();
            
            while (pattern.size < numActive) {
                pattern.add(Math.floor(Math.random() * cells));
            }
            
            return Array.from(pattern);
        }

        function showPattern() {
            pattern.forEach(index => {
                const cell = grid.querySelector(`[data-index="${index}"]`);
                cell.classList.add('active');
            });
        }

        function hidePattern() {
            const cells = grid.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.classList.remove('active', 'correct', 'wrong');
            });
        }

        function handleCellClick(index) {
            if (!isPlaying || isMemorizing) return;
            
            const cell = grid.querySelector(`[data-index="${index}"]`);
            
            if (playerPattern.includes(index)) {
                // すでに選択済み
                return;
            }
            
            playerPattern.push(index);
            cell.classList.add('active');
            
            if (pattern.includes(index)) {
                cell.classList.add('correct');
                playSound(600 + playerPattern.length * 50, 0.1);
            } else {
                cell.classList.add('wrong');
                playSound(200, 0.2);
                gameOver();
                return;
            }
            
            // パターン完成チェック
            if (playerPattern.length === pattern.length) {
                const correct = pattern.every(i => playerPattern.includes(i));
                if (correct) {
                    levelComplete();
                }
            }
        }

        function showMessage(text) {
            const message = document.createElement('div');
            message.className = 'message';
            message.textContent = text;
            document.body.appendChild(message);
            
            setTimeout(() => {
                message.remove();
            }, 2000);
        }

        function playSound(frequency, duration) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = frequency;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        function startLevel() {
            isMemorizing = true;
            isPlaying = true;
            playerPattern = [];
            
            // グリッドサイズを調整（レベル5以降）
            if (level >= 5 && level % 5 === 1) {
                gridSize = Math.min(6, 3 + Math.floor(level / 5));
                createGrid(gridSize);
            }
            
            pattern = generatePattern(gridSize, level);
            
            // パターン表示時間（レベルに応じて短く）
            const showTime = Math.max(1000, 3000 - level * 100);
            
            showMessage('覚えて！');
            showPattern();
            
            setTimeout(() => {
                hidePattern();
                isMemorizing = false;
                showMessage('再現して！');
            }, showTime);
        }

        function levelComplete() {
            const bonus = level * 100;
            score += bonus;
            scoreDisplay.textContent = score;
            
            showMessage(`正解！ +${bonus}点`);
            playSound(800, 0.2);
            
            setTimeout(() => {
                level++;
                levelDisplay.textContent = level;
                startLevel();
            }, 1500);
        }

        function gameOver() {
            isPlaying = false;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('patternMatchHighScore', highScore);
                highScoreDisplay.textContent = highScore;
                showMessage(`🎉 新記録！ ${score}点`);
            } else {
                showMessage('ゲームオーバー');
            }
            
            setTimeout(() => {
                finalScoreDisplay.textContent = score;
                gameOverOverlay.classList.remove('hidden');
            }, 1500);
        }

        function startGame() {
            level = 1;
            score = 0;
            gridSize = 3;
            levelDisplay.textContent = level;
            scoreDisplay.textContent = score;
            
            startOverlay.classList.add('hidden');
            gameOverOverlay.classList.add('hidden');
            
            createGrid(gridSize);
            startLevel();
        }

        function restartGame() {
            gameOverOverlay.classList.add('hidden');
            startGame();
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', restartGame);

        initGame();
    </script>
</body>
</html>
