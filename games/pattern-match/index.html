<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pattern Match - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
            touch-action: manipulation;
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            font-size: 1.1rem;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .grid-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
        }

        .grid {
            display: grid;
            gap: 8px;
        }

        .cell {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .cell:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.2);
        }

        .cell.active {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border-color: #f5576c;
            box-shadow: 0 0 15px rgba(245, 87, 108, 0.5);
        }

        .cell.success {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            border-color: #00f2fe;
        }

        .cell.error {
            background: linear-gradient(135deg, #fa709a, #fee140);
            border-color: #fa709a;
            animation: shake 0.3s;
        }

        .cell.preview {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: #764ba2;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px 50px;
            border-radius: 15px;
            font-size: 1.5rem;
            text-align: center;
            z-index: 1000;
            display: none;
            backdrop-filter: blur(10px);
        }

        .message.show {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .instructions {
            margin-top: 20px;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.8;
            max-width: 400px;
        }

        @media (max-width: 600px) {
            .cell {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            .stats {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="game-header">
        <h1>🧩 Pattern Match</h1>
        <div class="stats">
            <div class="stat">Level: <span id="level">1</span></div>
            <div class="stat">Score: <span id="score">0</span></div>
            <div class="stat">Lives: <span id="lives">❤️❤️❤️</span></div>
        </div>
    </div>

    <div class="grid-container">
        <div class="grid" id="grid"></div>
    </div>

    <div class="instructions">
        <p>パターンを覚えて、同じセルをタップしよう！</p>
    </div>

    <div class="message" id="message"></div>

    <script>
        const grid = document.getElementById('grid');
        const messageEl = document.getElementById('message');

        let gridSize = 3;
        let pattern = [];
        let playerPattern = [];
        let level = 1;
        let score = 0;
        let lives = 3;
        let showingPattern = false;
        let patternDuration = 2000;

        const symbols = ['⭐', '🔥', '💎', '🌟', '⚡', '🌈', '🎯', '🎪', '🎨'];

        function init() {
            startLevel();
        }

        function createGrid() {
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;

            for (let i = 0; i < gridSize * gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', handleCellClick);
                cell.addEventListener('touchstart', handleCellClick, { passive: false });
                grid.appendChild(cell);
            }
        }

        function generatePattern() {
            pattern = [];
            const cellCount = gridSize * gridSize;
            const patternCount = Math.min(level + 2, cellCount - 1);

            const indices = Array.from({ length: cellCount }, (_, i) => i);
            shuffleArray(indices);

            for (let i = 0; i < patternCount; i++) {
                pattern.push({
                    index: indices[i],
                    symbol: symbols[i % symbols.length]
                });
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        async function showPattern() {
            showingPattern = true;
            playerPattern = [];

            const cells = document.querySelectorAll('.cell');

            // Clear all cells
            cells.forEach(cell => {
                cell.className = 'cell';
                cell.textContent = '';
            });

            await sleep(300);

            // Show pattern
            pattern.forEach(p => {
                const cell = cells[p.index];
                cell.classList.add('preview');
                cell.textContent = p.symbol;
            });

            await sleep(patternDuration);

            // Hide pattern
            cells.forEach(cell => {
                cell.className = 'cell';
                cell.textContent = '';
            });

            showingPattern = false;
        }

        function handleCellClick(e) {
            e.preventDefault();
            if (showingPattern) return;

            const cell = e.target;
            const index = parseInt(cell.dataset.index);

            const patternItem = pattern.find(p => p.index === index);

            if (patternItem) {
                cell.classList.add('active');
                cell.textContent = patternItem.symbol;
                playerPattern.push(index);

                // Check if complete
                if (playerPattern.length === pattern.length) {
                    checkWin();
                }
            } else {
                // Wrong cell
                cell.classList.add('error');
                lives--;
                updateLives();

                if (lives <= 0) {
                    gameOver();
                } else {
                    setTimeout(() => {
                        cell.classList.remove('error');
                        // Reset player pattern
                        playerPattern = [];
                        document.querySelectorAll('.cell').forEach(c => {
                            c.classList.remove('active');
                            c.textContent = '';
                        });
                        // Show pattern again
                        showPattern();
                    }, 500);
                }
            }
        }

        function checkWin() {
            const cells = document.querySelectorAll('.cell');

            // Check if all pattern cells are selected
            const allCorrect = pattern.every(p => playerPattern.includes(p.index));

            if (allCorrect) {
                // Success!
                cells.forEach((cell, i) => {
                    if (pattern.find(p => p.index === i)) {
                        cell.classList.add('success');
                    }
                });

                score += level * 100;
                level++;
                updateStats();

                showMessage('🎉 Perfect! Next level...', 1500, () => {
                    startLevel();
                });
            }
        }

        function startLevel() {
            // Adjust difficulty
            if (level <= 2) {
                gridSize = 3;
                patternDuration = 2000;
            } else if (level <= 5) {
                gridSize = 3;
                patternDuration = 1500;
            } else if (level <= 8) {
                gridSize = 4;
                patternDuration = 1500;
            } else if (level <= 12) {
                gridSize = 4;
                patternDuration = 1200;
            } else {
                gridSize = 5;
                patternDuration = 1000;
            }

            createGrid();
            generatePattern();
            updateStats();

            setTimeout(() => {
                showPattern();
            }, 500);
        }

        function gameOver() {
            showMessage(`💀 Game Over!\nFinal Score: ${score}\nLevel: ${level}`, 3000, () => {
                level = 1;
                score = 0;
                lives = 3;
                updateStats();
                startLevel();
            });
        }

        function showMessage(text, duration, callback) {
            messageEl.textContent = text;
            messageEl.classList.add('show');

            setTimeout(() => {
                messageEl.classList.remove('show');
                if (callback) callback();
            }, duration);
        }

        function updateStats() {
            document.getElementById('level').textContent = level;
            document.getElementById('score').textContent = score;
        }

        function updateLives() {
            const hearts = '❤️'.repeat(lives) + '🖤'.repeat(3 - lives);
            document.getElementById('lives').textContent = hearts;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Start game
        init();
    </script>
</body>
</html>
