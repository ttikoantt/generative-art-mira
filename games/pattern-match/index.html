<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Match - パターンマッチ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-container {
            text-align: center;
            padding: 20px;
        }

        .header {
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #00d9ff 0%, #00ff88 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            color: #fff;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: 0.8em;
            color: #888;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #00ff88;
        }

        .pattern-grid {
            display: grid;
            gap: 8px;
            margin: 20px auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            max-width: 400px;
        }

        .cell {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .cell:hover {
            transform: scale(1.05);
            border-color: rgba(0, 217, 255, 0.5);
        }

        .cell.active {
            background: linear-gradient(135deg, #00d9ff 0%, #00ff88 100%);
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .cell.correct {
            background: linear-gradient(135deg, #00ff88 0%, #00d9ff 100%);
            animation: pulse 0.5s ease;
        }

        .cell.wrong {
            background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%);
            animation: shake 0.5s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .message {
            color: #fff;
            font-size: 1.2em;
            margin: 20px 0;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message.memorize {
            color: #00d9ff;
            font-weight: bold;
            animation: blink 1s infinite;
        }

        .message.reproduce {
            color: #00ff88;
            font-weight: bold;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .timer-bar {
            width: 100%;
            max-width: 400px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin: 20px auto;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d9ff 0%, #00ff88 100%);
            border-radius: 3px;
            transition: width 0.1s linear;
        }

        .btn {
            padding: 15px 40px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #00d9ff 0%, #00ff88 100%);
            color: #1a1a2e;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 217, 255, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d9ff 0%, #00ff88 100%);
            border: none;
            color: #1a1a2e;
            font-size: 1.5em;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 217, 255, 0.4);
            z-index: 100;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fullscreen-btn:hover {
            transform: scale(1.1);
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }

            .cell {
                width: 50px;
                height: 50px;
            }

            .stats {
                gap: 15px;
            }

            .stat {
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🎯 Pattern Match</h1>
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">Level</div>
                    <div class="stat-value" id="level">1</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Score</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Lives</div>
                    <div class="stat-value" id="lives">❤️❤️❤️</div>
                </div>
            </div>
        </div>

        <div class="message" id="message">Press Start to Play</div>

        <div class="timer-bar">
            <div class="timer-fill" id="timerFill"></div>
        </div>

        <div class="pattern-grid" id="grid"></div>

        <div id="startScreen">
            <button class="btn" id="startBtn">▶ Start Game</button>
        </div>
    </div>

    <button class="fullscreen-btn" id="fullscreen">⛶</button>

    <script>
        const gridSize = 4;
        let grid = [];
        let pattern = [];
        let playerPattern = [];
        let level = 1;
        let score = 0;
        let lives = 3;
        let gameState = 'start'; // start, memorize, reproduce, result
        let memorizeTime = 3000;
        let reproduceTime = 10000;
        let timerInterval;
        let timeLeft;

        const gridEl = document.getElementById('grid');
        const messageEl = document.getElementById('message');
        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const timerFillEl = document.getElementById('timerFill');
        const startScreenEl = document.getElementById('startScreen');
        const startBtn = document.getElementById('startBtn');

        function initGrid() {
            gridEl.innerHTML = '';
            gridEl.style.gridTemplateColumns = `repeat(${gridSize}, 60px)`;
            grid = [];

            for (let i = 0; i < gridSize * gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleCellClick(i));
                gridEl.appendChild(cell);
                grid.push(cell);
            }
        }

        function generatePattern() {
            const patternCount = Math.min(3 + Math.floor(level / 2), 8);
            pattern = [];

            const indices = Array.from({ length: gridSize * gridSize }, (_, i) => i);

            for (let i = 0; i < patternCount; i++) {
                const randomIndex = Math.floor(Math.random() * indices.length);
                pattern.push(indices[randomIndex]);
                indices.splice(randomIndex, 1);
            }
        }

        function showPattern() {
            gameState = 'memorize';
            messageEl.textContent = '🧠 Memorize!';
            messageEl.className = 'message memorize';

            // Clear all cells
            grid.forEach(cell => cell.classList.remove('active', 'correct', 'wrong'));

            // Show pattern
            pattern.forEach(index => {
                grid[index].classList.add('active');
            });

            // Start timer
            timeLeft = memorizeTime;
            updateTimer();

            timerInterval = setInterval(() => {
                timeLeft -= 100;
                updateTimer();

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    hidePattern();
                }
            }, 100);
        }

        function hidePattern() {
            gameState = 'reproduce';
            playerPattern = [];
            messageEl.textContent = '✨ Reproduce!';
            messageEl.className = 'message reproduce';

            // Hide pattern
            grid.forEach(cell => cell.classList.remove('active'));

            // Start reproduce timer
            timeLeft = reproduceTime;
            updateTimer();

            timerInterval = setInterval(() => {
                timeLeft -= 100;
                updateTimer();

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    checkResult();
                }
            }, 100);
        }

        function handleCellClick(index) {
            if (gameState !== 'reproduce') return;
            if (playerPattern.includes(index)) return;

            playerPattern.push(index);
            grid[index].classList.add('active');

            // Check if clicked too many
            if (playerPattern.length > pattern.length) {
                grid[index].classList.add('wrong');
                gameOver();
                return;
            }

            // Check if correct
            const currentIndex = playerPattern.length - 1;
            if (pattern[currentIndex] !== index) {
                grid[index].classList.add('wrong');
                gameOver();
                return;
            }

            // Check if complete
            if (playerPattern.length === pattern.length) {
                clearInterval(timerInterval);
                levelComplete();
            }
        }

        function checkResult() {
            if (playerPattern.length === pattern.length &&
                playerPattern.every((val, idx) => val === pattern[idx])) {
                levelComplete();
            } else {
                gameOver();
            }
        }

        function levelComplete() {
            gameState = 'result';
            clearInterval(timerInterval);

            // Show all correct cells
            pattern.forEach(index => {
                grid[index].classList.remove('active');
                grid[index].classList.add('correct');
            });

            messageEl.textContent = '🎉 Correct!';
            score += level * 100 + Math.floor(timeLeft / 100);
            level++;

            updateUI();

            setTimeout(() => {
                startLevel();
            }, 1500);
        }

        function gameOver() {
            gameState = 'result';
            clearInterval(timerInterval);

            lives--;
            updateUI();

            if (lives <= 0) {
                messageEl.textContent = `💀 Game Over! Score: ${score}`;
                startScreenEl.style.display = 'block';
                startBtn.textContent = '🔄 Play Again';
            } else {
                messageEl.textContent = '❌ Wrong! Try again...';

                // Show pattern
                pattern.forEach(index => {
                    grid[index].classList.add('active');
                });

                setTimeout(() => {
                    level = Math.max(1, level - 1);
                    startLevel();
                }, 2000);
            }
        }

        function startLevel() {
            gameState = 'memorize';
            playerPattern = [];

            // Adjust difficulty
            memorizeTime = Math.max(1500, 3000 - level * 200);
            reproduceTime = Math.max(5000, 10000 - level * 500);

            generatePattern();
            showPattern();
        }

        function startGame() {
            level = 1;
            score = 0;
            lives = 3;
            startScreenEl.style.display = 'none';
            updateUI();
            startLevel();
        }

        function updateUI() {
            levelEl.textContent = level;
            scoreEl.textContent = score;
            livesEl.textContent = '❤️'.repeat(lives);
        }

        function updateTimer() {
            const maxTime = gameState === 'memorize' ? memorizeTime : reproduceTime;
            const percentage = (timeLeft / maxTime) * 100;
            timerFillEl.style.width = percentage + '%';

            // Change color based on time
            if (percentage < 30) {
                timerFillEl.style.background = 'linear-gradient(90deg, #ff4757 0%, #ff6b81 100%)';
            } else {
                timerFillEl.style.background = 'linear-gradient(90deg, #00d9ff 0%, #00ff88 100%)';
            }
        }

        // Event listeners
        startBtn.addEventListener('click', startGame);

        document.getElementById('fullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Initialize
        initGrid();
    </script>
</body>
</html>
