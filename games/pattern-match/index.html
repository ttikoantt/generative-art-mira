<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Match - パターン記憶ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            color: #ffffff;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: 12px;
            color: #a0a0a0;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #00d4ff;
        }

        .pattern-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .pattern-cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .pattern-cell.active {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            transform: scale(1.05);
        }

        .pattern-cell.correct {
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            animation: pulse 0.5s;
        }

        .pattern-cell.wrong {
            background: linear-gradient(135deg, #ff4444, #ff6b6b);
            animation: shake 0.5s;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .message {
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border: none;
            color: #ffffff;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 24px;
            }

            .stats {
                gap: 15px;
            }

            .stat {
                padding: 8px 15px;
            }

            .pattern-cell {
                border-radius: 10px;
            }

            .fullscreen-btn {
                padding: 10px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>

    <div class="container">
        <h1>🎯 Pattern Match</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">LEVEL</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">BEST</div>
                <div class="stat-value" id="best">0</div>
            </div>
        </div>

        <div class="pattern-grid" id="patternGrid">
            <div class="pattern-cell" data-index="0"></div>
            <div class="pattern-cell" data-index="1"></div>
            <div class="pattern-cell" data-index="2"></div>
            <div class="pattern-cell" data-index="3"></div>
            <div class="pattern-cell" data-index="4"></div>
            <div class="pattern-cell" data-index="5"></div>
            <div class="pattern-cell" data-index="6"></div>
            <div class="pattern-cell" data-index="7"></div>
            <div class="pattern-cell" data-index="8"></div>
        </div>

        <div class="message" id="message">
            「スタート」ボタンを押してゲームを始めてください！
        </div>

        <div class="controls">
            <button id="startBtn" onclick="startGame()">スタート</button>
        </div>
    </div>

    <script>
        let level = 1;
        let score = 0;
        let bestScore = localStorage.getItem('patternMatchBest') || 0;
        let pattern = [];
        let playerPattern = [];
        let isShowingPattern = false;
        let isGameActive = false;

        const cells = document.querySelectorAll('.pattern-cell');
        const messageEl = document.getElementById('message');
        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const startBtn = document.getElementById('startBtn');

        bestEl.textContent = bestScore;

        function generatePattern() {
            const length = Math.min(2 + level, 9);
            pattern = [];

            for (let i = 0; i < length; i++) {
                let index;
                do {
                    index = Math.floor(Math.random() * 9);
                } while (pattern.includes(index));
                pattern.push(index);
            }
        }

        async function showPattern() {
            isShowingPattern = true;
            isGameActive = false;
            startBtn.disabled = true;
            messageEl.textContent = 'パターンを覚えてください...';

            await sleep(500);

            for (let index of pattern) {
                cells[index].classList.add('active');
                await sleep(600);
                cells[index].classList.remove('active');
                await sleep(200);
            }

            messageEl.textContent = '同じパターンをタップしてください！';
            isShowingPattern = false;
            isGameActive = true;
            playerPattern = [];
        }

        function handleCellClick(index) {
            if (isShowingPattern || !isGameActive) return;

            const currentIndex = playerPattern.length;

            if (pattern[currentIndex] === index) {
                // Correct
                cells[index].classList.add('correct');
                setTimeout(() => cells[index].classList.remove('correct'), 500);

                playerPattern.push(index);

                if (playerPattern.length === pattern.length) {
                    // Level complete!
                    isGameActive = false;
                    score += level * 10;
                    level++;
                    scoreEl.textContent = score;
                    levelEl.textContent = level;

                    if (score > bestScore) {
                        bestScore = score;
                        bestEl.textContent = bestScore;
                        localStorage.setItem('patternMatchBest', bestScore);
                    }

                    messageEl.textContent = '🎉 正解！レベルアップ！';
                    startBtn.disabled = false;
                    startBtn.textContent = '次のレベルへ';
                }
            } else {
                // Wrong!
                cells[index].classList.add('wrong');
                setTimeout(() => cells[index].classList.remove('wrong'), 500);

                isGameActive = false;
                messageEl.textContent = `😢 間違い！ レベル ${level} でゲームオーバー`;

                if (score > bestScore) {
                    bestScore = score;
                    bestEl.textContent = bestScore;
                    localStorage.setItem('patternMatchBest', bestScore);
                }

                level = 1;
                score = 0;
                levelEl.textContent = level;
                scoreEl.textContent = score;
                startBtn.disabled = false;
                startBtn.textContent = 'もう一度';
            }
        }

        function startGame() {
            generatePattern();
            setTimeout(() => showPattern(), 300);
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        cells.forEach((cell, index) => {
            cell.addEventListener('click', () => handleCellClick(index));
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
