<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Match - パターン記憶ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        h1 {
            color: white;
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            color: white;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .message {
            color: white;
            font-size: 1.5em;
            text-align: center;
            margin-bottom: 20px;
            min-height: 40px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .cell {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .cell.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-color: white;
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(240, 147, 251, 0.5);
        }

        .cell.correct {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .cell.wrong {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            animation: shake 0.5s ease;
        }

        .cell.disabled {
            pointer-events: none;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(240, 147, 251, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(240, 147, 251, 0.6);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        button.secondary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .timer-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            transition: width 0.1s linear;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.8em;
            }

            .grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
            }

            .cell {
                width: 60px;
                height: 60px;
            }

            .stats {
                gap: 15px;
            }

            .stat {
                padding: 10px 15px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">🖥️ 全画面</button>

    <h1>🧠 Pattern Match</h1>

    <div class="stats">
        <div class="stat">
            <div class="stat-label">レベル</div>
            <div class="stat-value" id="level">1</div>
        </div>
        <div class="stat">
            <div class="stat-label">スコア</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">ライフ</div>
            <div class="stat-value" id="lives">❤️❤️❤️</div>
        </div>
    </div>

    <div class="game-container">
        <div class="message" id="message">スタートボタンを押してね！</div>

        <div class="timer-bar">
            <div class="timer-fill" id="timerFill"></div>
        </div>

        <div class="grid" id="grid"></div>

        <div class="buttons">
            <button onclick="startGame()" id="startBtn">🎮 スタート</button>
            <button class="secondary" onclick="resetGame()">🔄 リセット</button>
        </div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const message = document.getElementById('message');
        const levelDisplay = document.getElementById('level');
        const scoreDisplay = document.getElementById('score');
        const livesDisplay = document.getElementById('lives');
        const timerFill = document.getElementById('timerFill');
        const startBtn = document.getElementById('startBtn');

        let level = 1;
        let score = 0;
        let lives = 3;
        let pattern = [];
        let playerPattern = [];
        let isShowingPattern = false;
        let canClick = false;
        let timer = null;
        let timeLeft = 0;
        const maxTime = 5000;

        function createGrid() {
            grid.innerHTML = '';
            for (let i = 0; i < 16; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleCellClick(i));
                grid.appendChild(cell);
            }
        }

        function generatePattern() {
            const length = Math.min(3 + level, 8);
            pattern = [];
            const used = new Set();

            while (pattern.length < length) {
                const index = Math.floor(Math.random() * 16);
                if (!used.has(index)) {
                    used.add(index);
                    pattern.push(index);
                }
            }
        }

        async function showPattern() {
            isShowingPattern = true;
            canClick = false;
            message.textContent = 'パターンを覚えてね！';

            // Reset all cells
            document.querySelectorAll('.cell').forEach(cell => {
                cell.className = 'cell disabled';
            });

            // Show pattern with delay
            for (let i = 0; i < pattern.length; i++) {
                await new Promise(resolve => setTimeout(resolve, 500));
                const cell = document.querySelector(`[data-index="${pattern[i]}"]`);
                cell.classList.add('active');
                await new Promise(resolve => setTimeout(resolve, 600));
                cell.classList.remove('active');
            }

            // Enable player input
            isShowingPattern = false;
            canClick = true;
            playerPattern = [];
            message.textContent = '同じパターンをクリック！';
            startTimer();

            document.querySelectorAll('.cell').forEach(cell => {
                cell.classList.remove('disabled');
            });
        }

        function handleCellClick(index) {
            if (!canClick || isShowingPattern) return;

            const cell = document.querySelector(`[data-index="${index}"]`);
            cell.classList.add('active');

            setTimeout(() => {
                cell.classList.remove('active');
            }, 200);

            playerPattern.push(index);

            // Check if correct
            const currentIndex = playerPattern.length - 1;
            if (playerPattern[currentIndex] !== pattern[currentIndex]) {
                // Wrong
                cell.classList.add('wrong');
                lives--;
                updateLives();

                if (lives <= 0) {
                    gameOver();
                } else {
                    message.textContent = '間違い！もう一度！';
                    canClick = false;
                    stopTimer();
                    setTimeout(() => {
                        showPattern();
                    }, 1500);
                }
                return;
            }

            // Check if complete
            if (playerPattern.length === pattern.length) {
                // Correct!
                stopTimer();
                canClick = false;
                playerPattern.forEach((idx, i) => {
                    setTimeout(() => {
                        const c = document.querySelector(`[data-index="${idx}"]`);
                        c.classList.add('correct');
                    }, i * 100);
                });

                const bonus = Math.floor(timeLeft / 100);
                score += (level * 100) + bonus;
                level++;
                updateStats();

                message.textContent = `正解！ +${level * 100 + bonus}点！`;

                setTimeout(() => {
                    document.querySelectorAll('.cell').forEach(c => {
                        c.classList.remove('correct');
                    });
                    showPattern();
                }, 2000);
            }
        }

        function startTimer() {
            timeLeft = maxTime - (level * 200);
            timeLeft = Math.max(timeLeft, 2000);
            timerFill.style.width = '100%';

            timer = setInterval(() => {
                timeLeft -= 100;
                const percent = (timeLeft / (maxTime - (level * 200))) * 100;
                timerFill.style.width = `${Math.max(percent, 0)}%`;

                if (timeLeft <= 0) {
                    stopTimer();
                    timeUp();
                }
            }, 100);
        }

        function stopTimer() {
            if (timer) {
                clearInterval(timer);
                timer = null;
            }
        }

        function timeUp() {
            canClick = false;
            lives--;
            updateLives();

            if (lives <= 0) {
                gameOver();
            } else {
                message.textContent = '時間切れ！もう一度！';
                setTimeout(() => {
                    showPattern();
                }, 1500);
            }
        }

        function gameOver() {
            canClick = false;
            stopTimer();
            message.textContent = `ゲームオーバー！ スコア: ${score}`;
            startBtn.disabled = false;
            startBtn.textContent = '🎮 もう一度';
        }

        function startGame() {
            level = 1;
            score = 0;
            lives = 3;
            updateStats();
            startBtn.disabled = true;
            generatePattern();
            showPattern();
        }

        function resetGame() {
            stopTimer();
            canClick = false;
            isShowingPattern = false;
            level = 1;
            score = 0;
            lives = 3;
            pattern = [];
            playerPattern = [];
            updateStats();
            message.textContent = 'スタートボタンを押してね！';
            startBtn.disabled = false;
            startBtn.textContent = '🎮 スタート';
            timerFill.style.width = '100%';

            document.querySelectorAll('.cell').forEach(cell => {
                cell.className = 'cell';
            });
        }

        function updateStats() {
            levelDisplay.textContent = level;
            scoreDisplay.textContent = score;
            updateLives();
        }

        function updateLives() {
            livesDisplay.textContent = '❤️'.repeat(lives);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        createGrid();
    </script>
</body>
</html>
