<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Match - Mira's Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden;
        }
        #game {
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00f5ff, #ff00f5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }
        .stat {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        #grid {
            display: grid;
            gap: 8px;
            margin: 20px auto;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        .cell {
            width: 70px;
            height: 70px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.1);
        }
        .cell:hover:not(.disabled) {
            transform: scale(1.05);
            background: rgba(255,255,255,0.2);
        }
        .cell.active {
            background: linear-gradient(135deg, #00f5ff, #0099ff);
            border-color: #00f5ff;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.5);
        }
        .cell.selected {
            background: linear-gradient(135deg, #ff00f5, #ff0080);
            border-color: #ff00f5;
            box-shadow: 0 0 20px rgba(255, 0, 245, 0.5);
        }
        .cell.disabled {
            cursor: not-allowed;
        }
        #message {
            font-size: 1.5rem;
            margin: 15px 0;
            height: 40px;
            color: #00f5ff;
        }
        #timer {
            font-size: 1.2rem;
            color: #ff00f5;
            margin-bottom: 10px;
        }
        button {
            background: linear-gradient(45deg, #00f5ff, #0099ff);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 245, 255, 0.4);
        }
        #fullscreenBtn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        #fullscreenBtn:hover {
            background: rgba(255,255,255,0.2);
            box-shadow: none;
        }
        @media (max-width: 600px) {
            .cell {
                width: 50px;
                height: 50px;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div id="game">
        <h1>🧩 Pattern Match</h1>
        <div id="stats">
            <div class="stat">レベル: <span id="level">1</span></div>
            <div class="stat">スコア: <span id="score">0</span></div>
        </div>
        <div id="timer"></div>
        <div id="message">スタートボタンを押してね！</div>
        <div id="grid"></div>
        <button id="startBtn">スタート</button>
    </div>
    <button id="fullscreenBtn">📺 全画面</button>

    <script>
        const grid = document.getElementById('grid');
        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');
        const messageEl = document.getElementById('message');
        const timerEl = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');

        // 設定
        let gridSize = 3;
        let level = 1;
        let score = 0;
        let pattern = [];
        let selected = [];
        let isMemorizing = false;
        let timer = null;

        // グリッド初期化
        function initGrid() {
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;

            for (let i = 0; i < gridSize * gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleCellClick(i));
                grid.appendChild(cell);
            }
        }

        // パターン生成
        function generatePattern() {
            const totalCells = gridSize * gridSize;
            const patternCount = Math.min(3 + level, totalCells);
            pattern = [];

            while (pattern.length < patternCount) {
                const idx = Math.floor(Math.random() * totalCells);
                if (!pattern.includes(idx)) {
                    pattern.push(idx);
                }
            }
        }

        // パターン表示
        function showPattern() {
            isMemorizing = true;
            selected = [];
            const cells = document.querySelectorAll('.cell');
            cells.forEach(c => {
                c.classList.remove('active', 'selected');
                c.classList.add('disabled');
            });

            // パターンを表示
            pattern.forEach(idx => cells[idx].classList.add('active'));

            // 表示時間（レベルが上がると短くなる）
            const showTime = Math.max(1000, 3000 - level * 200);

            messageEl.textContent = 'パターンを覚えて！';

            setTimeout(() => {
                cells.forEach(c => c.classList.remove('active'));
                isMemorizing = false;
                cells.forEach(c => c.classList.remove('disabled'));

                // 入力時間（レベルが上がると短くなる）
                const inputTime = Math.max(5, 15 - level);
                let timeLeft = inputTime;
                timerEl.textContent = `残り時間: ${timeLeft}秒`;

                timer = setInterval(() => {
                    timeLeft--;
                    timerEl.textContent = `残り時間: ${timeLeft}秒`;
                    if (timeLeft <= 0) {
                        clearInterval(timer);
                        checkPattern(true);
                    }
                }, 1000);

                messageEl.textContent = '同じパターンをクリック！';
            }, showTime);
        }

        // セルクリック
        function handleCellClick(index) {
            if (isMemorizing) return;

            const cell = document.querySelectorAll('.cell')[index];

            if (selected.includes(index)) {
                // 選択解除
                selected = selected.filter(i => i !== index);
                cell.classList.remove('selected');
            } else {
                // 選択
                selected.push(index);
                cell.classList.add('selected');
            }

            // 選択数がパターン数と同じならチェック
            if (selected.length === pattern.length) {
                checkPattern();
            }
        }

        // パターンチェック
        function checkPattern(timeout = false) {
            clearInterval(timer);
            timerEl.textContent = '';

            const cells = document.querySelectorAll('.cell');
            cells.forEach(c => c.classList.add('disabled'));

            let correct = true;
            if (timeout) {
                correct = false;
            } else {
                // ソートして比較
                const sortedPattern = [...pattern].sort((a, b) => a - b);
                const sortedSelected = [...selected].sort((a, b) => a - b);
                correct = JSON.stringify(sortedPattern) === JSON.stringify(sortedSelected);
            }

            if (correct) {
                score += level * 100;
                scoreEl.textContent = score;
                messageEl.textContent = '🎉 正解！';
                messageEl.style.color = '#00f5ff';
                level++;
                levelEl.textContent = level;

                // 3レベルごとにグリッドサイズを増やす
                if (level % 3 === 1 && gridSize < 5) {
                    gridSize++;
                    setTimeout(() => {
                        initGrid();
                        startLevel();
                    }, 1000);
                } else {
                    setTimeout(startLevel, 1000);
                }
            } else {
                messageEl.textContent = '❌ 不正解... もう一度！';
                messageEl.style.color = '#ff0080';
                startBtn.textContent = 'リトライ';
                startBtn.style.display = 'block';
            }
        }

        // レベル開始
        function startLevel() {
            generatePattern();
            setTimeout(showPattern, 500);
        }

        // ゲーム開始
        function startGame() {
            level = 1;
            score = 0;
            gridSize = 3;
            levelEl.textContent = level;
            scoreEl.textContent = score;
            startBtn.style.display = 'none';
            initGrid();
            startLevel();
        }

        // 全画面
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        startBtn.addEventListener('click', startGame);
        initGrid();
    </script>
</body>
</html>
