<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pattern Match - Memory Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .stat {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
        }

        .stat-value {
            color: #4ecdc4;
            font-size: 2rem;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .cell:active {
            transform: scale(0.95);
        }

        .cell.active {
            animation: flash 0.5s;
        }

        @keyframes flash {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .cell.showing {
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 30px currentColor;
        }

        .cell.correct {
            animation: correct 0.5s;
        }

        @keyframes correct {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .cell.wrong {
            animation: wrong 0.5s;
        }

        @keyframes wrong {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .message {
            color: #fff;
            font-size: 1.3rem;
            margin-bottom: 20px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .btn {
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(78, 205, 196, 0.3);
            font-weight: bold;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(78, 205, 196, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
            }

            .grid {
                gap: 10px;
            }

            .stat {
                font-size: 0.9rem;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            .message {
                font-size: 1.1rem;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <div class="container">
        <h1>🎯 Pattern Match</h1>

        <div class="stats">
            <div class="stat">
                <div>Level</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div>Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
        </div>

        <div class="grid" id="grid"></div>

        <div class="message" id="message">
            Press Start to begin!
        </div>

        <button class="btn" id="startBtn" onclick="startGame()">Start Game</button>
    </div>

    <script>
        const colors = [
            '#ff6b6b', // Red
            '#4ecdc4', // Teal
            '#45b7d1', // Blue
            '#96ceb4', // Green
            '#ffeaa7', // Yellow
            '#dfe6e9', // White
            '#fd79a8', // Pink
            '#a29bfe', // Purple
            '#fdcb6e'  // Orange
        ];

        let pattern = [];
        let playerPattern = [];
        let level = 1;
        let score = 0;
        let isShowingPattern = false;
        let canClick = false;

        const grid = document.getElementById('grid');
        const messageEl = document.getElementById('message');
        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');

        function createGrid() {
            grid.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleCellClick(i));
                grid.appendChild(cell);
            }
        }

        function startGame() {
            pattern = [];
            playerPattern = [];
            level = 1;
            score = 0;
            updateStats();
            startBtn.style.display = 'none';
            nextLevel();
        }

        function nextLevel() {
            playerPattern = [];
            isShowingPattern = true;
            canClick = false;

            // Add new pattern step
            const newStep = Math.floor(Math.random() * 9);
            pattern.push(newStep);

            messageEl.textContent = `Level ${level} - Watch carefully!`;

            // Show pattern after short delay
            setTimeout(() => showPattern(), 500);
        }

        function showPattern() {
            let i = 0;

            const showNext = () => {
                if (i >= pattern.length) {
                    isShowingPattern = false;
                    canClick = true;
                    messageEl.textContent = 'Your turn! Repeat the pattern';
                    return;
                }

                const cellIndex = pattern[i];
                const cell = grid.children[cellIndex];
                const color = colors[cellIndex];

                cell.classList.add('showing');
                cell.style.backgroundColor = color;
                cell.style.boxShadow = `0 0 40px ${color}`;

                setTimeout(() => {
                    cell.classList.remove('showing');
                    cell.style.backgroundColor = '';
                    cell.style.boxShadow = '';
                    i++;
                    setTimeout(showNext, 200);
                }, 500);
            };

            showNext();
        }

        function handleCellClick(index) {
            if (!canClick || isShowingPattern) return;

            const cell = grid.children[index];
            const color = colors[index];

            // Visual feedback
            cell.style.backgroundColor = color;
            cell.style.boxShadow = `0 0 40px ${color}`;
            setTimeout(() => {
                cell.style.backgroundColor = '';
                cell.style.boxShadow = '';
            }, 200);

            // Check if correct
            const correctIndex = pattern[playerPattern.length];
            if (index === correctIndex) {
                playerPattern.push(index);

                // Check if completed pattern
                if (playerPattern.length === pattern.length) {
                    canClick = false;
                    cell.classList.add('correct');
                    setTimeout(() => {
                        cell.classList.remove('correct');
                        score += level * 10;
                        level++;
                        updateStats();
                        messageEl.textContent = '🎉 Correct! Next level...';
                        setTimeout(() => nextLevel(), 1000);
                    }, 500);
                }
            } else {
                // Wrong!
                canClick = false;
                cell.classList.add('wrong');
                cell.style.backgroundColor = '#ff6b6b';

                messageEl.textContent = `❌ Game Over! Final Score: ${score}`;

                setTimeout(() => {
                    cell.classList.remove('wrong');
                    cell.style.backgroundColor = '';
                    startBtn.style.display = 'inline-block';
                    startBtn.textContent = 'Play Again';
                }, 1000);
            }
        }

        function updateStats() {
            levelEl.textContent = level;
            scoreEl.textContent = score;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        createGrid();
    </script>
</body>
</html>
