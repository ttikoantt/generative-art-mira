<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Match - パターン記憶ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 10px;
            overflow: hidden;
        }

        .game-container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #ffffff;
            font-size: 28px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            color: #ffffff;
            font-size: 16px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
        }

        .grid-container {
            display: inline-block;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .grid {
            display: grid;
            gap: 8px;
            margin: 0 auto;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .cell.revealed {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.6);
            animation: pulse 0.5s;
        }

        .cell.correct {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 0 20px rgba(245, 87, 108, 0.6);
        }

        .cell.wrong {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            animation: shake 0.3s;
        }

        .cell:hover:not(.revealed):not(.correct):not(.wrong) {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }

        .message {
            margin-top: 20px;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #ffffff;
            font-size: 16px;
            backdrop-filter: blur(10px);
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message.error {
            background: rgba(255, 107, 107, 0.3);
        }

        .message.success {
            background: rgba(75, 181, 67, 0.3);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.1s;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #ffffff;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 22px;
            }

            .grid {
                gap: 5px;
            }

            .cell {
                min-width: 60px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <h1>🧩 Pattern Match</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">レベル</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">ライフ</div>
                <div class="stat-value" id="lives">❤️❤️❤️</div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>

        <div class="grid-container">
            <div class="grid" id="grid"></div>
        </div>

        <div class="message" id="message">クリックしてスタート！</div>
    </div>

    <script>
        const GRID_SIZE = 4;
        const INITIAL_PATTERN_SIZE = 3;
        const SHOW_TIME = 1500;
        const HIDE_TIME = 500;

        let grid = [];
        let pattern = [];
        let playerPattern = [];
        let level = 1;
        let score = 0;
        let lives = 3;
        let gameState = 'start'; // start, showing, playing, gameover
        let patternSize = INITIAL_PATTERN_SIZE;

        const gridElement = document.getElementById('grid');
        const messageElement = document.getElementById('message');
        const levelElement = document.getElementById('level');
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');
        const progressElement = document.getElementById('progress');

        function initGrid() {
            gridElement.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 1fr)`;
            gridElement.innerHTML = '';
            grid = [];

            const cellSize = Math.min(
                (window.innerWidth - 60) / GRID_SIZE,
                70
            );

            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.style.width = `${cellSize}px`;
                cell.style.height = `${cellSize}px`;
                cell.dataset.index = i;
                cell.addEventListener('click', handleCellClick);
                cell.addEventListener('touchstart', handleCellClick, { passive: true });
                gridElement.appendChild(cell);
                grid.push(cell);
            }
        }

        function generatePattern() {
            pattern = [];
            const indices = Array.from({ length: GRID_SIZE * GRID_SIZE }, (_, i) => i);

            for (let i = 0; i < patternSize; i++) {
                const randomIndex = Math.floor(Math.random() * indices.length);
                pattern.push(indices.splice(randomIndex, 1)[0]);
            }
        }

        function showPattern() {
            gameState = 'showing';
            messageElement.textContent = 'パターンを覚えて！';
            messageElement.className = 'message';

            pattern.forEach(index => {
                grid[index].classList.add('revealed');
            });

            setTimeout(() => {
                pattern.forEach(index => {
                    grid[index].classList.remove('revealed');
                });

                setTimeout(() => {
                    gameState = 'playing';
                    messageElement.textContent = '覚えたパターンをタップ！';
                }, HIDE_TIME);
            }, SHOW_TIME);
        }

        function handleCellClick(e) {
            if (gameState !== 'playing') {
                if (gameState === 'start' || gameState === 'gameover') {
                    startGame();
                }
                return;
            }

            const index = parseInt(e.target.dataset.index);

            if (playerPattern.includes(index)) {
                return;
            }

            if (pattern.includes(index)) {
                e.target.classList.add('correct');
                playerPattern.push(index);

                if (playerPattern.length === pattern.length) {
                    setTimeout(() => {
                        levelComplete();
                    }, 500);
                }
            } else {
                e.target.classList.add('wrong');
                lives--;
                updateLives();

                if (lives <= 0) {
                    setTimeout(() => {
                        gameOver();
                    }, 500);
                } else {
                    messageElement.textContent = '間違い！ライフ -1';
                    messageElement.className = 'message error';

                    setTimeout(() => {
                        messageElement.textContent = 'もう一度挑戦！';
                        messageElement.className = 'message';
                        resetPattern();
                    }, 1000);
                }
            }
        }

        function levelComplete() {
            score += level * 10;
            level++;
            patternSize = Math.min(INITIAL_PATTERN_SIZE + Math.floor(level / 2), 8);

            updateStats();
            messageElement.textContent = `素晴らしい！レベル ${level} に進む！`;
            messageElement.className = 'message success';

            setTimeout(() => {
                resetPattern();
            }, 1500);
        }

        function resetPattern() {
            playerPattern = [];
            grid.forEach(cell => {
                cell.classList.remove('correct', 'wrong');
            });
            generatePattern();
            showPattern();
        }

        function gameOver() {
            gameState = 'gameover';
            messageElement.textContent = `ゲームオーバー！スコア: ${score} クリックで再スタート`;
            messageElement.className = 'message error';
        }

        function startGame() {
            level = 1;
            score = 0;
            lives = 3;
            patternSize = INITIAL_PATTERN_SIZE;
            playerPattern = [];

            grid.forEach(cell => {
                cell.classList.remove('revealed', 'correct', 'wrong');
            });

            updateStats();
            generatePattern();
            showPattern();
        }

        function updateStats() {
            levelElement.textContent = level;
            scoreElement.textContent = score;
            updateLives();
            updateProgress();
        }

        function updateLives() {
            livesElement.textContent = '❤️'.repeat(lives);
        }

        function updateProgress() {
            const progress = ((playerPattern.length || 0) / pattern.length) * 100;
            progressElement.style.width = `${progress}%`;
        }

        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        }

        window.addEventListener('resize', () => {
            initGrid();
        });

        initGrid();
    </script>
</body>
</html>
