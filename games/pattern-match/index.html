<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Match - パターン記憶ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            color: white;
        }

        .game-container {
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .pattern-display {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 300px;
            margin: 0 auto;
        }

        .cell {
            aspect-ratio: 1;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .cell.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
            transform: scale(1.05);
        }

        .cell:hover:not(.disabled) {
            border-color: #667eea;
            transform: scale(1.02);
        }

        .cell.disabled {
            cursor: not-allowed;
            opacity: 0.3;
        }

        .message {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 20px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }

        .message.success {
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
        }

        .message.error {
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
        }

        .message.info {
            color: #60a5fa;
        }

        .timer-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.1s linear;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 15px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .grid {
                max-width: 250px;
                gap: 8px;
            }

            .cell {
                font-size: 1.5rem;
            }

            .pattern-display {
                padding: 20px;
            }

            button {
                padding: 10px 18px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全画面</button>

    <div class="game-container">
        <h1>🧩 Pattern Match</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">レベル</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">ハイスコア</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>

        <div class="timer-bar">
            <div class="timer-fill" id="timerFill"></div>
        </div>

        <div class="message" id="message">
            スタートボタンを押してゲームを開始！
        </div>

        <div class="pattern-display">
            <div class="grid" id="grid"></div>
        </div>

        <div class="controls">
            <button onclick="startGame()" id="startBtn">🚀 スタート</button>
            <button onclick="skipToNext()" id="skipBtn" disabled>⏭️ スキップ</button>
        </div>
    </div>

    <script>
        // Game state
        let pattern = [];
        let playerPattern = [];
        let level = 1;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('patternMatchHighScore')) || 0;
        let isShowingPattern = false;
        let canClick = false;
        let timeLeft = 0;
        let timerInterval = null;
        let gridSize = 3;

        const icons = ['🌟', '🔥', '💎', '🎯', '🚀', '🌈', '⚡', '🎨', '🎭'];

        // Initialize
        document.getElementById('highScore').textContent = highScore;
        createGrid();

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;

            for (let i = 0; i < gridSize * gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell disabled';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleCellClick(i));
                grid.appendChild(cell);
            }
        }

        function generatePattern() {
            const numActive = Math.min(level + 2, gridSize * gridSize);
            pattern = [];

            const indices = Array.from({ length: gridSize * gridSize }, (_, i) => i);
            shuffleArray(indices);

            for (let i = 0; i < numActive; i++) {
                pattern.push({
                    index: indices[i],
                    icon: icons[Math.floor(Math.random() * icons.length)]
                });
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function displayPattern() {
            isShowingPattern = true;
            canClick = false;

            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.classList.add('disabled');
                cell.classList.remove('active');
                cell.textContent = '';
            });

            // Show pattern
            pattern.forEach(({ index, icon }) => {
                cells[index].classList.add('active');
                cells[index].textContent = icon;
            });

            updateMessage('パターンを覚えて！', 'info');

            // Hide pattern after delay
            setTimeout(() => {
                cells.forEach(cell => {
                    cell.classList.remove('active');
                    cell.textContent = '';
                });

                isShowingPattern = false;
                canClick = true;

                cells.forEach(cell => cell.classList.remove('disabled'));
                updateMessage('同じパターンを再現して！', 'info');

                startTimer();
            }, 1500 + level * 200);
        }

        function handleCellClick(index) {
            if (!canClick || isShowingPattern) return;

            const cell = document.querySelectorAll('.cell')[index];

            // Toggle cell
            if (playerPattern.includes(index)) {
                playerPattern = playerPattern.filter(i => i !== index);
                cell.classList.remove('active');
                cell.textContent = '';
            } else {
                playerPattern.push(index);
                const patternItem = pattern.find(p => p.index === index);
                cell.classList.add('active');
                cell.textContent = patternItem ? patternItem.icon : icons[Math.floor(Math.random() * icons.length)];
            }

            // Check if player has selected enough cells
            if (playerPattern.length >= pattern.length) {
                checkPattern();
            }
        }

        function checkPattern() {
            const correctIndices = pattern.map(p => p.index).sort();
            const playerIndices = [...playerPattern].sort();

            const isCorrect = correctIndices.length === playerIndices.length &&
                correctIndices.every((val, idx) => val === playerIndices[idx]);

            canClick = false;
            stopTimer();

            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => cell.classList.add('disabled'));

            if (isCorrect) {
                const timeBonus = Math.floor(timeLeft * 10);
                const levelBonus = level * 100;
                const bonus = timeBonus + levelBonus;
                score += bonus;

                updateMessage(`正解！ +${bonus}ポイント`, 'success');
                setTimeout(() => {
                    level++;
                    updateStats();
                    nextRound();
                }, 1500);
            } else {
                updateMessage(`不正解... 正しいパターン: ${pattern.length}個`, 'error');

                // Show correct pattern
                setTimeout(() => {
                    pattern.forEach(({ index, icon }) => {
                        cells[index].classList.add('active');
                        cells[index].textContent = icon;
                    });
                }, 500);

                setTimeout(() => {
                    endGame();
                }, 2500);
            }
        }

        function startTimer() {
            timeLeft = Math.max(10 - level * 0.5, 5);
            updateTimerBar();

            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                updateTimerBar();

                if (timeLeft <= 0) {
                    stopTimer();
                    updateMessage('時間切れ！', 'error');
                    setTimeout(() => endGame(), 1500);
                }
            }, 100);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function updateTimerBar() {
            const maxTime = Math.max(10 - level * 0.5, 5);
            const percentage = (timeLeft / maxTime) * 100;
            document.getElementById('timerFill').style.width = percentage + '%';
        }

        function nextRound() {
            playerPattern = [];

            // Increase grid size every 3 levels
            if (level % 3 === 1 && gridSize < 4) {
                gridSize++;
                createGrid();
            }

            generatePattern();
            setTimeout(() => displayPattern(), 500);
        }

        function startGame() {
            level = 1;
            score = 0;
            gridSize = 3;
            playerPattern = [];

            updateStats();
            createGrid();
            generatePattern();

            document.getElementById('startBtn').disabled = true;
            document.getElementById('skipBtn').disabled = false;

            setTimeout(() => displayPattern(), 500);
        }

        function endGame() {
            stopTimer();

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('patternMatchHighScore', highScore);
                updateMessage(`🎉 新ハイスコア！ ${score}ポイント`, 'success');
            } else {
                updateMessage(`ゲームオーバー！ スコア: ${score}`, 'error');
            }

            updateStats();

            document.getElementById('startBtn').disabled = false;
            document.getElementById('skipBtn').disabled = true;
        }

        function skipToNext() {
            if (!isShowingPattern && canClick) {
                stopTimer();
                updateMessage('スキップ...', 'info');

                const cells = document.querySelectorAll('.cell');
                cells.forEach(cell => {
                    cell.classList.add('disabled');
                    cell.classList.remove('active');
                    cell.textContent = '';
                });

                playerPattern = [];
                level = Math.max(level - 1, 1);
                score = Math.max(score - 50, 0);
                updateStats();

                setTimeout(() => nextRound(), 500);
            }
        }

        function updateStats() {
            document.getElementById('level').textContent = level;
            document.getElementById('score').textContent = score;
            document.getElementById('highScore').textContent = highScore;
        }

        function updateMessage(text, type = '') {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = 'message ' + type;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
