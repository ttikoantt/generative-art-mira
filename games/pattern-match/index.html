<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Match - パターン記憶ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 10px;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .subtitle {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 15px;
            min-width: 120px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 300;
        }

        .game-area {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .pattern-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 350px;
            margin: 0 auto 20px;
        }

        .pattern-cell {
            aspect-ratio: 1;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .pattern-cell::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }

        .pattern-cell.active::before {
            background: var(--cell-color);
            box-shadow: 0 0 30px var(--cell-color);
        }

        .pattern-cell.correct {
            border-color: #4ade80;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
        }

        .pattern-cell.wrong {
            border-color: #f87171;
            box-shadow: 0 0 20px rgba(248, 113, 113, 0.5);
        }

        .pattern-cell:active {
            transform: scale(0.95);
        }

        .message {
            font-size: 1.5rem;
            font-weight: 300;
            min-height: 40px;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.9);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .instructions {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            .pattern-grid {
                gap: 10px;
                max-width: 300px;
            }

            .stats {
                gap: 15px;
            }

            .stat {
                padding: 10px 20px;
                min-width: 100px;
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .showing .pattern-cell.active::before {
            animation: pulse 0.5s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <h1>PATTERN MATCH</h1>
        <p class="subtitle">パターン記憶ゲーム</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">レベル</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">最高</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>

        <div class="instructions" id="instructions">
            「スタート」を押して、光るパターンを覚えてください！
        </div>

        <div class="game-area">
            <div class="message" id="message"></div>

            <div class="pattern-grid" id="patternGrid">
                <div class="pattern-cell" data-index="0" style="--cell-color: #ff6b6b;"></div>
                <div class="pattern-cell" data-index="1" style="--cell-color: #4ecdc4;"></div>
                <div class="pattern-cell" data-index="2" style="--cell-color: #45b7d1;"></div>
                <div class="pattern-cell" data-index="3" style="--cell-color: #f9ca24;"></div>
                <div class="pattern-cell" data-index="4" style="--cell-color: #6c5ce7;"></div>
                <div class="pattern-cell" data-index="5" style="--cell-color: #a29bfe;"></div>
                <div class="pattern-cell" data-index="6" style="--cell-color: #fd79a8;"></div>
                <div class="pattern-cell" data-index="7" style="--cell-color: #00b894;"></div>
                <div class="pattern-cell" data-index="8" style="--cell-color: #e17055;"></div>
            </div>

            <button class="btn" id="startBtn" onclick="startGame()">スタート</button>
        </div>
    </div>

    <script>
        const cells = document.querySelectorAll('.pattern-cell');
        const messageEl = document.getElementById('message');
        const startBtn = document.getElementById('startBtn');
        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const instructionsEl = document.getElementById('instructions');
        const gameArea = document.querySelector('.game-area');

        let pattern = [];
        let playerPattern = [];
        let level = 1;
        let score = 0;
        let highScore = localStorage.getItem('patternMatchHighScore') || 0;
        let isShowing = false;
        let isPlayerTurn = false;

        highScoreEl.textContent = highScore;

        function generatePattern(length) {
            const newPattern = [];
            for (let i = 0; i < length; i++) {
                newPattern.push(Math.floor(Math.random() * 9));
            }
            return newPattern;
        }

        async function showPattern() {
            isShowing = true;
            isPlayerTurn = false;
            gameArea.classList.add('showing');
            startBtn.disabled = true;
            instructionsEl.textContent = 'パターンを覚えてください...';
            messageEl.textContent = '';

            // 全てのセルをリセット
            cells.forEach(cell => {
                cell.classList.remove('active', 'correct', 'wrong');
            });

            await sleep(500);

            for (let index of pattern) {
                cells[index].classList.add('active');
                await sleep(400);
                cells[index].classList.remove('active');
                await sleep(200);
            }

            gameArea.classList.remove('showing');
            isShowing = false;
            isPlayerTurn = true;
            instructionsEl.textContent = '同じ順番でタップしてください！';
            messageEl.textContent = 'あなたの番！';
        }

        function handleCellClick(index) {
            if (!isPlayerTurn || isShowing) return;

            // タップエフェクト
            cells[index].classList.add('active');
            setTimeout(() => cells[index].classList.remove('active'), 200);

            playerPattern.push(index);

            const currentIndex = playerPattern.length - 1;

            if (playerPattern[currentIndex] !== pattern[currentIndex]) {
                // 間違い
                cells[index].classList.add('wrong');
                gameOver();
                return;
            }

            cells[index].classList.add('correct');
            setTimeout(() => cells[index].classList.remove('correct'), 300);

            if (playerPattern.length === pattern.length) {
                // 正解
                levelComplete();
            }
        }

        function levelComplete() {
            isPlayerTurn = false;
            level++;
            score += level * 10;
            levelEl.textContent = level;
            scoreEl.textContent = score;

            if (score > highScore) {
                highScore = score;
                highScoreEl.textContent = highScore;
                localStorage.setItem('patternMatchHighScore', highScore);
            }

            messageEl.textContent = '正解！ 🎉';
            instructionsEl.textContent = '素晴らしい！次のレベルへ...';

            setTimeout(() => {
                nextLevel();
            }, 1500);
        }

        function gameOver() {
            isPlayerTurn = false;
            messageEl.textContent = `ゲームオーバー！ スコア: ${score}`;
            instructionsEl.textContent = '「スタート」でもう一度挑戦！';
            startBtn.textContent = 'もう一度';
            startBtn.disabled = false;
        }

        function nextLevel() {
            playerPattern = [];
            pattern = generatePattern(Math.min(level + 2, 9));
            showPattern();
        }

        function startGame() {
            level = 1;
            score = 0;
            levelEl.textContent = level;
            scoreEl.textContent = score;
            playerPattern = [];
            pattern = generatePattern(3);
            startBtn.textContent = 'スタート';
            showPattern();
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        cells.forEach((cell, index) => {
            cell.addEventListener('click', () => handleCellClick(index));
            cell.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleCellClick(index);
            });
        });

        // キーボード対応
        document.addEventListener('keydown', (e) => {
            if (!isPlayerTurn || isShowing) return;

            const keyMap = {
                '1': 0, '2': 1, '3': 2,
                '4': 3, '5': 4, '6': 5,
                '7': 6, '8': 7, '9': 8
            };

            if (keyMap.hasOwnProperty(e.key)) {
                handleCellClick(keyMap[e.key]);
            }
        });
    </script>
</body>
</html>
