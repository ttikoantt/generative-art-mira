<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pattern Match</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
        }

        h1 {
            color: #fff;
            font-size: clamp(1.8rem, 6vw, 3rem);
            margin-bottom: 10px;
            text-align: center;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.8);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            margin-bottom: 20px;
            text-align: center;
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            margin-bottom: 5px;
        }

        .stat-value {
            color: #00d4ff;
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: bold;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.8);
        }

        .game-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .message {
            color: #fff;
            font-size: clamp(1rem, 3vw, 1.3rem);
            text-align: center;
            margin-bottom: 20px;
            min-height: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .cell {
            width: clamp(80px, 25vw, 100px);
            height: clamp(80px, 25vw, 100px);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(2rem, 6vw, 3rem);
        }

        .cell:active {
            transform: scale(0.95);
        }

        .cell.active {
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.8);
            border-color: #00d4ff;
        }

        .cell.correct {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.8);
            border-color: #00ff88;
        }

        .cell.wrong {
            background: linear-gradient(135deg, #ff4757, #ff3344);
            box-shadow: 0 0 30px rgba(255, 71, 87, 0.8);
            border-color: #ff4757;
        }

        .buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 15px 35px;
            font-size: clamp(1rem, 3vw, 1.2rem);
            font-family: 'Arial', sans-serif;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            font-weight: bold;
        }

        .btn-start {
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            color: #fff;
        }

        .btn-start:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.6);
        }

        .btn-restart {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
        }

        .btn-restart:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(245, 87, 108, 0.6);
        }

        .btn-fullscreen {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #fff;
        }

        .btn-fullscreen:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(79, 172, 254, 0.6);
        }

        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .game-over.show {
            display: flex;
        }

        .game-over h2 {
            color: #fff;
            font-size: clamp(2rem, 6vw, 3rem);
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.8);
        }

        .game-over p {
            color: rgba(255, 255, 255, 0.8);
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            margin-bottom: 30px;
        }

        .level-indicator {
            color: #fff;
            font-size: clamp(1rem, 3vw, 1.3rem);
            text-align: center;
            margin-bottom: 15px;
            min-height: 25px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .pulse {
            animation: pulse 0.5s ease-in-out;
        }
    </style>
</head>
<body>
    <h1>🧩 Pattern Match</h1>
    <p class="subtitle">パターンを覚えて再現しよう！</p>

    <div class="stats">
        <div class="stat">
            <div class="stat-label">スコア</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">レベル</div>
            <div class="stat-value" id="level">1</div>
        </div>
        <div class="stat">
            <div class="stat-label">最高レベル</div>
            <div class="stat-value" id="high-level">1</div>
        </div>
    </div>

    <div class="game-container">
        <div class="level-indicator" id="level-indicator">スタートボタンを押してね</div>
        <div class="message" id="message"></div>
        <div class="grid" id="grid"></div>

        <div class="buttons">
            <button class="btn-start" id="start-btn" onclick="startGame()">▶️ スタート</button>
            <button class="btn-restart" onclick="resetGame()">🔄 リセット</button>
            <button class="btn-fullscreen" onclick="toggleFullscreen()">📺 全画面</button>
        </div>
    </div>

    <div class="game-over" id="game-over">
        <h2>🎮 ゲームオーバー</h2>
        <p>到達レベル: <span id="final-level">1</span></p>
        <p>スコア: <span id="final-score">0</span></p>
        <button class="btn-restart" onclick="resetGame()">🔄 もう一度</button>
    </div>

    <script>
        const gridSize = 9;
        let pattern = [];
        let playerPattern = [];
        let score = 0;
        let level = 1;
        let highLevel = parseInt(localStorage.getItem('patternMatchHighLevel')) || 1;
        let isShowingPattern = false;
        let canClick = false;

        const grid = document.getElementById('grid');
        const messageEl = document.getElementById('message');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const highLevelEl = document.getElementById('high-level');
        const levelIndicatorEl = document.getElementById('level-indicator');
        const startBtn = document.getElementById('start-btn');
        const gameOverEl = document.getElementById('game-over');

        // 初期化
        highLevelEl.textContent = highLevel;
        initGrid();

        function initGrid() {
            grid.innerHTML = '';
            for (let i = 0; i < gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleCellClick(i));
                grid.appendChild(cell);
            }
        }

        function generatePattern() {
            pattern = [];
            const patternLength = Math.min(3 + level, 9);
            const used = new Set();

            while (pattern.length < patternLength) {
                const index = Math.floor(Math.random() * gridSize);
                if (!used.has(index)) {
                    used.add(index);
                    pattern.push(index);
                }
            }
        }

        async function showPattern() {
            isShowingPattern = true;
            canClick = false;
            messageEl.textContent = 'パターンを覚えてね！';
            levelIndicatorEl.textContent = `レベル ${level}`;

            // 全てのセルをリセット
            document.querySelectorAll('.cell').forEach(cell => {
                cell.className = 'cell';
            });

            // パターンを表示
            for (let i = 0; i < pattern.length; i++) {
                await sleep(300);
                const cell = document.querySelector(`[data-index="${pattern[i]}"]`);
                cell.classList.add('active');
                await sleep(500 + (level * 50));
                cell.classList.remove('active');
            }

            await sleep(300);
            isShowingPattern = false;
            canClick = true;
            playerPattern = [];
            messageEl.textContent = '同じパターンをクリック！';
        }

        function handleCellClick(index) {
            if (!canClick || isShowingPattern) return;

            const cell = document.querySelector(`[data-index="${pattern[index]}"]`);
            cell.classList.add('pulse');
            setTimeout(() => cell.classList.remove('pulse'), 500);

            playerPattern.push(index);

            // 正誤判定
            if (playerPattern[playerPattern.length - 1] === pattern[playerPattern.length - 1]) {
                // 正しいセルをハイライト
                const clickedCell = document.querySelector(`[data-index="${index}"]`);
                clickedCell.classList.add('correct');
                setTimeout(() => clickedCell.classList.remove('correct'), 300);

                // パターン完了チェック
                if (playerPattern.length === pattern.length) {
                    canClick = false;
                    score += level * 10;
                    scoreEl.textContent = score;
                    messageEl.textContent = '🎉 正解！';

                    if (level > highLevel) {
                        highLevel = level;
                        highLevelEl.textContent = highLevel;
                        localStorage.setItem('patternMatchHighLevel', highLevel);
                    }

                    setTimeout(() => {
                        level++;
                        levelEl.textContent = level;
                        startRound();
                    }, 1500);
                }
            } else {
                // 間違い
                const clickedCell = document.querySelector(`[data-index="${index}"]`);
                clickedCell.classList.add('wrong');
                canClick = false;
                gameOver();
            }
        }

        function startGame() {
            score = 0;
            level = 1;
            scoreEl.textContent = score;
            levelEl.textContent = level;
            startBtn.style.display = 'none';
            startRound();
        }

        function startRound() {
            generatePattern();
            setTimeout(() => showPattern(), 500);
        }

        function gameOver() {
            messageEl.textContent = '😢 間違い！';
            document.getElementById('final-level').textContent = level;
            document.getElementById('final-score').textContent = score;
            setTimeout(() => {
                gameOverEl.classList.add('show');
            }, 1000);
        }

        function resetGame() {
            gameOverEl.classList.remove('show');
            startBtn.style.display = 'inline-block';
            messageEl.textContent = '';
            levelIndicatorEl.textContent = 'スタートボタンを押してね';
            document.querySelectorAll('.cell').forEach(cell => {
                cell.className = 'cell';
            });
            score = 0;
            level = 1;
            scoreEl.textContent = score;
            levelEl.textContent = level;
            canClick = false;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
