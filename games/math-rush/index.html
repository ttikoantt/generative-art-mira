<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Rush - 計算スピードゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .game-area {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 15px;
            color: #fff;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #0ff;
        }

        .question {
            font-size: 48px;
            color: #fff;
            margin: 30px 0;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }

        .timer-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #0ff, #00f);
            border-radius: 10px;
            transition: width 0.1s linear;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .option {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(0, 100, 255, 0.2));
            border: 2px solid rgba(0, 255, 255, 0.3);
            color: #fff;
            padding: 25px;
            font-size: 28px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .option:hover {
            transform: scale(1.05);
            border-color: #0ff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .option:active {
            transform: scale(0.95);
        }

        .option.correct {
            background: linear-gradient(135deg, rgba(0, 255, 100, 0.3), rgba(0, 200, 50, 0.3));
            border-color: #0f5;
            animation: correct 0.3s;
        }

        .option.wrong {
            background: linear-gradient(135deg, rgba(255, 50, 50, 0.3), rgba(200, 0, 0, 0.3));
            border-color: #f00;
            animation: wrong 0.3s;
        }

        @keyframes correct {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes wrong {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .start-screen, .game-over-screen {
            display: none;
        }

        .start-screen.active, .game-over-screen.active {
            display: block;
        }

        .game-area.hidden {
            display: none;
        }

        .start-btn, .restart-btn {
            background: linear-gradient(135deg, #0ff, #00f);
            color: #fff;
            border: none;
            padding: 20px 50px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 20px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .start-btn:hover, .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }

        .final-score {
            font-size: 64px;
            color: #0ff;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }

        .combo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            font-weight: bold;
            color: #ff0;
            text-shadow: 0 0 20px rgba(255, 255, 0, 0.8);
            opacity: 0;
            pointer-events: none;
            z-index: 1000;
        }

        .combo.show {
            animation: comboAnim 0.5s;
        }

        @keyframes comboAnim {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #0ff, #00f);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            z-index: 1000;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.5rem;
            }

            .question {
                font-size: 36px;
            }

            .options {
                grid-template-columns: 1fr;
            }

            .option {
                padding: 20px;
                font-size: 24px;
            }

            .final-score {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MATH RUSH</h1>

        <!-- Start Screen -->
        <div class="start-screen active" id="startScreen">
            <div class="game-area">
                <p style="color: #aaa; margin-bottom: 20px;">計算スピードを競うゲーム！</p>
                <p style="color: #888; margin-bottom: 30px;">制限時間内に正解を選んでスコアを稼ごう！</p>
                <button class="start-btn" onclick="startGame()">START</button>
            </div>
        </div>

        <!-- Game Area -->
        <div class="game-area hidden" id="gameArea">
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">SCORE</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">LEVEL</div>
                    <div class="stat-value" id="level">1</div>
                </div>
                <div class="stat">
                    <div class="stat-label">COMBO</div>
                    <div class="stat-value" id="combo">0</div>
                </div>
            </div>

            <div class="timer-bar">
                <div class="timer-fill" id="timerFill"></div>
            </div>

            <div class="question" id="question">2 + 3 = ?</div>

            <div class="options" id="options"></div>
        </div>

        <!-- Game Over Screen -->
        <div class="game-over-screen" id="gameOverScreen">
            <div class="game-area">
                <h2 style="color: #fff; margin-bottom: 20px;">GAME OVER</h2>
                <p style="color: #aaa;">Final Score</p>
                <div class="final-score" id="finalScore">0</div>
                <p style="color: #888; margin-bottom: 20px;">Level: <span id="finalLevel">1</span></p>
                <button class="restart-btn" onclick="startGame()">PLAY AGAIN</button>
            </div>
        </div>
    </div>

    <div class="combo" id="combo"></div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        let score = 0;
        let level = 1;
        let combo = 0;
        let maxCombo = 0;
        let correctAnswer = 0;
        let timeLeft = 10;
        let maxTime = 10;
        let timerInterval;
        let gameActive = false;

        const operators = ['+', '-', '×'];
        const correctSound = '🎯';
        const wrongSound = '❌';

        function startGame() {
            score = 0;
            level = 1;
            combo = 0;
            maxCombo = 0;
            maxTime = 10;
            gameActive = true;

            document.getElementById('startScreen').classList.remove('active');
            document.getElementById('gameOverScreen').classList.remove('active');
            document.getElementById('gameArea').classList.remove('hidden');

            updateStats();
            generateQuestion();
            startTimer();
        }

        function generateQuestion() {
            const operator = operators[Math.floor(Math.random() * operators.length)];
            let num1, num2;

            switch (operator) {
                case '+':
                    num1 = Math.floor(Math.random() * (level * 10)) + 1;
                    num2 = Math.floor(Math.random() * (level * 10)) + 1;
                    correctAnswer = num1 + num2;
                    break;
                case '-':
                    num1 = Math.floor(Math.random() * (level * 10)) + 5;
                    num2 = Math.floor(Math.random() * num1);
                    correctAnswer = num1 - num2;
                    break;
                case '×':
                    num1 = Math.floor(Math.random() * (level + 5)) + 1;
                    num2 = Math.floor(Math.random() * (level + 5)) + 1;
                    correctAnswer = num1 * num2;
                    break;
            }

            document.getElementById('question').textContent = `${num1} ${operator} ${num2} = ?`;

            const options = generateOptions(correctAnswer);
            displayOptions(options);
        }

        function generateOptions(correct) {
            const options = [correct];
            while (options.length < 4) {
                const wrong = correct + Math.floor(Math.random() * 21) - 10;
                if (wrong !== correct && wrong >= 0 && !options.includes(wrong)) {
                    options.push(wrong);
                }
            }
            return options.sort(() => Math.random() - 0.5);
        }

        function displayOptions(options) {
            const container = document.getElementById('options');
            container.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selected, btn) {
            if (!gameActive) return;

            if (selected === correctAnswer) {
                btn.classList.add('correct');
                combo++;
                if (combo > maxCombo) maxCombo = combo;

                const points = 10 * level + (combo * 5);
                score += points;

                if (combo >= 3) {
                    showCombo(combo);
                }

                if (score >= level * 100) {
                    level++;
                    maxTime = Math.max(3, 10 - level);
                }

                setTimeout(() => {
                    generateQuestion();
                    resetTimer();
                }, 300);
            } else {
                btn.classList.add('wrong');
                combo = 0;
                timeLeft = Math.max(1, timeLeft - 2);

                const options = document.querySelectorAll('.option');
                options.forEach(opt => {
                    if (parseInt(opt.textContent) === correctAnswer) {
                        opt.classList.add('correct');
                    }
                });

                setTimeout(() => {
                    generateQuestion();
                    resetTimer();
                }, 500);
            }

            updateStats();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                updateTimer();

                if (timeLeft <= 0) {
                    gameOver();
                }
            }, 100);
        }

        function resetTimer() {
            timeLeft = maxTime;
            updateTimer();
        }

        function updateTimer() {
            const percentage = (timeLeft / maxTime) * 100;
            document.getElementById('timerFill').style.width = percentage + '%';
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('combo').textContent = combo;
        }

        function showCombo(count) {
            const comboEl = document.getElementById('combo');
            comboEl.textContent = `${count} COMBO!`;
            comboEl.classList.add('show');
            setTimeout(() => comboEl.classList.remove('show'), 500);
        }

        function gameOver() {
            gameActive = false;
            clearInterval(timerInterval);

            document.getElementById('gameArea').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('active');
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalLevel').textContent = level;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            const key = parseInt(e.key);
            if (key >= 1 && key <= 4) {
                const options = document.querySelectorAll('.option');
                if (options[key - 1]) {
                    options[key - 1].click();
                }
            }
        });
    </script>
</body>
</html>
