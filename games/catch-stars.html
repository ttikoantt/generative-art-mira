<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch the Stars - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a1e 0%, #1a1a3e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        h1 {
            color: #fff;
            margin-bottom: 5px;
            font-size: 1.8rem;
            text-align: center;
        }

        .subtitle {
            color: #888;
            margin-bottom: 15px;
            font-size: 0.9rem;
            text-align: center;
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 15px;
            color: #fff;
            font-size: 1.1rem;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-value {
            font-weight: bold;
            color: #FFD700;
        }

        .canvas-container {
            position: relative;
            background: linear-gradient(180deg, #0a0a2e 0%, #1a1a4e 100%);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(100, 100, 255, 0.3);
        }

        #gameCanvas {
            display: block;
            cursor: none;
        }

        .fullscreen-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.3s;
            z-index: 10;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            z-index: 5;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #FFD700;
        }

        .overlay p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .start-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .start-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.5);
        }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2196F3, #1976D2);
            color: #fff;
        }

        .btn-accent {
            background: linear-gradient(135deg, #FF9800, #F57C00);
            color: #fff;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .info {
            color: #666;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.4rem;
            }

            .stats {
                font-size: 0.9rem;
                gap: 15px;
            }

            .overlay h2 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <h1>⭐ Catch the Stars</h1>
    <p class="subtitle">Move to catch falling stars • Avoid the bombs!</p>

    <div class="stats">
        <div class="stat">
            <span>Score:</span>
            <span class="stat-value" id="score">0</span>
        </div>
        <div class="stat">
            <span>High Score:</span>
            <span class="stat-value" id="highScore">0</span>
        </div>
        <div class="stat">
            <span>Lives:</span>
            <span class="stat-value" id="lives">❤️❤️❤️</span>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="gameCanvas"></canvas>
        <button class="fullscreen-btn" id="fullscreenBtn">⛶ Fullscreen</button>

        <div class="overlay" id="startOverlay">
            <h2>⭐ Catch the Stars</h2>
            <p>Move your basket to catch the stars!</p>
            <button class="start-btn" id="startBtn">Start Game</button>
        </div>

        <div class="overlay hidden" id="gameOverOverlay">
            <h2>💥 Game Over!</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button class="start-btn" id="restartBtn">Play Again</button>
        </div>
    </div>

    <div class="controls">
        <button class="btn-primary" id="pauseBtn">⏸️ Pause</button>
        <button class="btn-accent" id="resetBtn">🔄 Reset</button>
    </div>

    <p class="info">🖱️ Mouse / 👆 Touch to move • ⭐ Catch stars • 💣 Avoid bombs</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Set canvas size
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = Math.min(800, window.innerWidth - 40);
            canvas.height = Math.min(500, window.innerHeight - 300);
        }
        resizeCanvas();

        // Game state
        let score = 0;
        let highScore = parseInt(localStorage.getItem('catchStarsHighScore')) || 0;
        let lives = 3;
        let gameRunning = false;
        let gamePaused = false;
        let animationId = null;

        // Update high score display
        document.getElementById('highScore').textContent = highScore;

        // Player
        const player = {
            width: 80,
            height: 20,
            x: canvas.width / 2 - 40,
            y: canvas.height - 40,
            speed: 8
        };

        // Falling objects
        let stars = [];
        let bombs = [];

        // Spawn rates
        let starSpawnRate = 60;
        let bombSpawnRate = 180;
        let frameCount = 0;

        // Draw player (basket)
        function drawPlayer() {
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Basket pattern
            ctx.strokeStyle = '#A0522D';
            ctx.lineWidth = 2;
            for (let i = 0; i < player.width; i += 10) {
                ctx.beginPath();
                ctx.moveTo(player.x + i, player.y);
                ctx.lineTo(player.x + i + 5, player.y + player.height);
                ctx.stroke();
            }

            // Glow effect
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#FFD700';
            ctx.fillStyle = '#FFD700';
            ctx.fillRect(player.x, player.y, player.width, 3);
            ctx.shadowBlur = 0;
        }

        // Draw star
        function drawStar(star) {
            ctx.save();
            ctx.translate(star.x, star.y);
            ctx.rotate(star.rotation);

            ctx.shadowBlur = 15;
            ctx.shadowColor = star.color;
            ctx.fillStyle = star.color;

            // Draw star shape
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
                const x = Math.cos(angle) * star.size;
                const y = Math.sin(angle) * star.size;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.restore();
        }

        // Draw bomb
        function drawBomb(bomb) {
            ctx.save();
            ctx.translate(bomb.x, bomb.y);

            // Bomb body
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff0000';
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(0, 0, bomb.size, 0, Math.PI * 2);
            ctx.fill();

            // Fuse
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, -bomb.size);
            ctx.lineTo(5, -bomb.size - 8);
            ctx.stroke();

            // Spark
            ctx.fillStyle = bomb.sparkColor;
            ctx.beginPath();
            ctx.arc(5, -bomb.size - 8, 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.restore();
        }

        // Spawn star
        function spawnStar() {
            const colors = ['#FFD700', '#FFA500', '#FF69B4', '#00CED1', '#9370DB'];
            stars.push({
                x: Math.random() * (canvas.width - 30) + 15,
                y: -30,
                size: 15,
                speed: Math.random() * 3 + 2,
                color: colors[Math.floor(Math.random() * colors.length)],
                rotation: 0,
                rotationSpeed: (Math.random() - 0.5) * 0.2
            });
        }

        // Spawn bomb
        function spawnBomb() {
            bombs.push({
                x: Math.random() * (canvas.width - 30) + 15,
                y: -30,
                size: 18,
                speed: Math.random() * 2 + 2,
                sparkColor: '#FF4500'
            });
        }

        // Update game
        function update() {
            frameCount++;

            // Spawn objects
            if (frameCount % starSpawnRate === 0) spawnStar();
            if (frameCount % bombSpawnRate === 0) spawnBomb();

            // Increase difficulty
            if (frameCount % 600 === 0 && starSpawnRate > 20) {
                starSpawnRate -= 5;
            }

            // Update stars
            stars.forEach((star, index) => {
                star.y += star.speed;
                star.rotation += star.rotationSpeed;

                // Check collision with player
                if (star.y + star.size >= player.y &&
                    star.x >= player.x &&
                    star.x <= player.x + player.width) {
                    stars.splice(index, 1);
                    score += 10;
                    document.getElementById('score').textContent = score;
                }

                // Remove if off screen
                if (star.y > canvas.height) {
                    stars.splice(index, 1);
                }
            });

            // Update bombs
            bombs.forEach((bomb, index) => {
                bomb.y += bomb.speed;

                // Check collision with player
                if (bomb.y + bomb.size >= player.y &&
                    bomb.x >= player.x &&
                    bomb.x <= player.x + player.width) {
                    bombs.splice(index, 1);
                    lives--;
                    updateLives();
                    if (lives <= 0) gameOver();
                }

                // Remove if off screen
                if (bomb.y > canvas.height) {
                    bombs.splice(index, 1);
                }
            });
        }

        // Update lives display
        function updateLives() {
            const hearts = '❤️'.repeat(lives) + '🖤'.repeat(3 - lives);
            document.getElementById('lives').textContent = hearts;
        }

        // Draw everything
        function draw() {
            // Clear canvas
            ctx.fillStyle = 'rgba(10, 10, 46, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw falling objects
            stars.forEach(drawStar);
            bombs.forEach(drawBomb);

            // Draw player
            drawPlayer();
        }

        // Game loop
        function gameLoop() {
            if (!gameRunning || gamePaused) return;

            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        // Start game
        function startGame() {
            score = 0;
            lives = 3;
            stars = [];
            bombs = [];
            starSpawnRate = 60;
            bombSpawnRate = 180;
            frameCount = 0;
            gameRunning = true;
            gamePaused = false;

            document.getElementById('score').textContent = score;
            updateLives();
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('pauseBtn').textContent = '⏸️ Pause';

            gameLoop();
        }

        // Game over
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('catchStarsHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        // Toggle pause
        function togglePause() {
            if (!gameRunning) return;

            gamePaused = !gamePaused;
            document.getElementById('pauseBtn').textContent = gamePaused ? '▶️ Resume' : '⏸️ Pause';

            if (!gamePaused) {
                gameLoop();
            }
        }

        // Reset game
        function resetGame() {
            gameRunning = false;
            gamePaused = false;
            cancelAnimationFrame(animationId);

            score = 0;
            lives = 3;
            stars = [];
            bombs = [];

            document.getElementById('score').textContent = score;
            updateLives();
            document.getElementById('startOverlay').classList.remove('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');

            // Clear canvas
            ctx.fillStyle = '#0a0a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawPlayer();
        }

        // Player movement
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left - player.width / 2;
            player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            player.x = touch.clientX - rect.left - player.width / 2;
            player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
        });

        // Button events
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        document.getElementById('pauseBtn').addEventListener('click', togglePause);
        document.getElementById('resetBtn').addEventListener('click', resetGame);

        // Fullscreen
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (canvas.requestFullscreen) {
                canvas.requestFullscreen();
            }
        });

        // Window resize
        window.addEventListener('resize', () => {
            resizeCanvas();
            if (!gameRunning) {
                player.x = canvas.width / 2 - player.width / 2;
                player.y = canvas.height - 40;
                ctx.fillStyle = '#0a0a2e';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                drawPlayer();
            }
        });

        // Initial draw
        ctx.fillStyle = '#0a0a2e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawPlayer();
    </script>
</body>
</html>
