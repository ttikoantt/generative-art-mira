<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Letter Puzzle - 文字パズルゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
            overflow: hidden;
        }
        .container {
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #eee;
            text-align: center;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 2px;
        }
        .score-board {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        .score-item {
            text-align: center;
            flex: 1;
        }
        .score-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            margin-bottom: 5px;
        }
        .score-value {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
        }
        .puzzle-area {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .hint-text {
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .word-slots {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            min-height: 60px;
        }
        .letter-slot {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
        }
        .letter-slot.filled {
            background: rgba(102, 126, 234, 0.5);
            border-color: #667eea;
        }
        .letter-slot:active {
            transform: scale(0.95);
        }
        .letter-pool {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .letter-btn {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        .letter-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }
        .letter-btn.used {
            opacity: 0.3;
            pointer-events: none;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .control-btn {
            flex: 1;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        .control-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.2);
        }
        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            display: none;
            animation: fadeIn 0.3s;
        }
        .message.show {
            display: block;
        }
        .message h2 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .message p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
        }
        .message button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LETTER PUZZLE</h1>

        <div class="score-board">
            <div class="score-item">
                <div class="score-label">スコア</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">レベル</div>
                <div class="score-value" id="level">1</div>
            </div>
            <div class="score-item">
                <div class="score-label">クリア</div>
                <div class="score-value" id="cleared">0</div>
            </div>
        </div>

        <div class="puzzle-area">
            <div class="hint-text" id="hintText">ヒントがここに表示されます</div>
            <div class="word-slots" id="wordSlots"></div>
        </div>

        <div class="letter-pool" id="letterPool"></div>

        <div class="controls">
            <button class="control-btn" id="clearBtn">クリア</button>
            <button class="control-btn" id="skipBtn">スキップ</button>
        </div>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">全画面表示</button>

    <div class="message" id="message">
        <h2 id="messageTitle">素晴らしい！</h2>
        <p id="messageText">正解です！</p>
        <button id="messageBtn">次へ</button>
    </div>

    <script>
        const puzzles = [
            { word: 'APPLE', hint: '赤くて丸い果物' },
            { word: 'BANANA', hint: '黄色くて曲がった果物' },
            { word: 'ORANGE', hint: 'オレンジ色の柑橘類' },
            { word: 'GRAPE', hint: '房になる小さな果物' },
            { word: 'MANGO', hint: '熱帯の甘い果物' },
            { word: 'PIZZA', hint: 'イタリアの人気料理' },
            { word: 'SUSHI', hint: '日本の代表的な料理' },
            { word: 'COFFEE', hint: '朝飲む黒い飲み物' },
            { word: 'WATER', hint: '生命に必要な液体' },
            { word: 'HOUSE', hint: '人が住む建物' },
            { word: 'PIANO', hint: '鍵盤楽器' },
            { word: 'TIGER', hint: '縞模様の猛獣' },
            { word: 'EARTH', hint: '私たちが住む惑星' },
            { word: 'MOON', hint: '夜空に輝く天体' },
            { word: 'CLOUD', hint: '空に浮かぶ白いもの' },
            { word: 'DREAM', hint: '眠っている時の想像' },
            { word: 'MUSIC', hint: '音による芸術' },
            { word: 'OCEAN', hint: '広大な海' },
            { word: 'RIVER', hint: '水が流れる川' },
            { word: 'FOREST', hint: '木が多い場所' }
        ];

        let currentPuzzle = null;
        let currentWord = [];
        let usedLetters = [];
        let score = 0;
        let level = 1;
        let cleared = 0;

        const hintText = document.getElementById('hintText');
        const wordSlots = document.getElementById('wordSlots');
        const letterPool = document.getElementById('letterPool');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const clearedEl = document.getElementById('cleared');
        const message = document.getElementById('message');
        const messageTitle = document.getElementById('messageTitle');
        const messageText = document.getElementById('messageText');
        const messageBtn = document.getElementById('messageBtn');
        const clearBtn = document.getElementById('clearBtn');
        const skipBtn = document.getElementById('skipBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function loadPuzzle() {
            const puzzle = puzzles[Math.floor(Math.random() * puzzles.length)];
            currentPuzzle = puzzle;
            currentWord = [];
            usedLetters = [];

            hintText.textContent = puzzle.hint;

            // スロット作成
            wordSlots.innerHTML = '';
            for (let i = 0; i < puzzle.word.length; i++) {
                const slot = document.createElement('div');
                slot.className = 'letter-slot';
                slot.dataset.index = i;
                slot.addEventListener('click', () => removeLetter(i));
                wordSlots.appendChild(slot);
            }

            // 文字プール作成
            const letters = shuffle(puzzle.word.split(''));
            letterPool.innerHTML = '';
            letters.forEach((letter, index) => {
                const btn = document.createElement('button');
                btn.className = 'letter-btn';
                btn.textContent = letter;
                btn.dataset.letter = letter;
                btn.dataset.index = index;
                btn.addEventListener('click', () => addLetter(letter, index, btn));
                letterPool.appendChild(btn);
            });
        }

        function addLetter(letter, poolIndex, btn) {
            if (currentWord.length >= currentPuzzle.word.length) return;

            const emptySlot = Array.from(wordSlots.children).find(slot => !slot.classList.contains('filled'));
            if (!emptySlot) return;

            emptySlot.textContent = letter;
            emptySlot.classList.add('filled');
            emptySlot.dataset.poolIndex = poolIndex;

            currentWord.push(letter);
            usedLetters.push(poolIndex);
            btn.classList.add('used');

            if (currentWord.length === currentPuzzle.word.length) {
                checkAnswer();
            }
        }

        function removeLetter(slotIndex) {
            const slot = wordSlots.children[slotIndex];
            if (!slot.classList.contains('filled')) return;

            const poolIndex = parseInt(slot.dataset.poolIndex);
            const btn = letterPool.querySelector(`[data-index="${poolIndex}"]`);

            slot.textContent = '';
            slot.classList.remove('filled');
            slot.dataset.poolIndex = '';

            const wordIndex = currentWord.findIndex((_, i) =>
                wordSlots.children[i].dataset.poolIndex === String(poolIndex)
            );
            if (wordIndex > -1) {
                currentWord.splice(wordIndex, 1);
            }
            usedLetters = usedLetters.filter(i => i !== poolIndex);

            if (btn) {
                btn.classList.remove('used');
            }
        }

        function checkAnswer() {
            const answer = currentWord.join('');
            if (answer === currentPuzzle.word) {
                const bonus = Math.floor(currentPuzzle.word.length * 10 * level);
                score += bonus;
                cleared++;
                level = Math.floor(cleared / 5) + 1;

                scoreEl.textContent = score;
                levelEl.textContent = level;
                clearedEl.textContent = cleared;

                messageTitle.textContent = '素晴らしい！';
                messageText.textContent = `正解です！ +${bonus}ポイント`;
                message.classList.add('show');
            }
        }

        function clearWord() {
            Array.from(wordSlots.children).forEach(slot => {
                slot.textContent = '';
                slot.classList.remove('filled');
                slot.dataset.poolIndex = '';
            });
            Array.from(letterPool.children).forEach(btn => {
                btn.classList.remove('used');
            });
            currentWord = [];
            usedLetters = [];
        }

        function skipPuzzle() {
            score = Math.max(0, score - 5);
            scoreEl.textContent = score;
            loadPuzzle();
        }

        clearBtn.addEventListener('click', clearWord);
        skipBtn.addEventListener('click', skipPuzzle);
        messageBtn.addEventListener('click', () => {
            message.classList.remove('show');
            loadPuzzle();
        });

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                fullscreenBtn.textContent = '全画面解除';
            } else {
                document.exitFullscreen();
                fullscreenBtn.textContent = '全画面表示';
            }
        });

        // 初期化
        loadPuzzle();
    </script>
</body>
</html>
