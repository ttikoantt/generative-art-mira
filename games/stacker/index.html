<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stacker | Game by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 70vh;
            max-height: 600px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            color: #fff;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
        }

        .score-display {
            color: #ffd700;
            font-size: 1.5em;
            margin-bottom: 20px;
        }

        .high-score {
            color: #aaa;
            font-size: 1em;
            margin-bottom: 30px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 5px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .game-info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 5;
        }

        .current-score {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #ffd700;
            font-size: 18px;
            font-weight: bold;
            z-index: 5;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .instructions {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas"></canvas>
        <div class="game-info">🎮 Stacker</div>
        <div class="current-score">Score: <span id="score">0</span></div>

        <!-- Start Screen -->
        <div id="start-screen" class="ui-overlay">
            <h1>🎯 Stacker</h1>
            <p class="high-score">High Score: <span id="high-score-display">0</span></p>
            <button class="btn" onclick="startGame()">Start Game</button>
            <p class="instructions">Tap to place the block<br>Stack them as high as you can!</p>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="ui-overlay hidden">
            <h1>Game Over</h1>
            <p class="score-display">Score: <span id="final-score">0</span></p>
            <p class="high-score">High Score: <span id="final-high-score">0</span></p>
            <button class="btn" onclick="startGame()">Play Again</button>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Responsive canvas
        function resizeCanvas() {
            const container = document.getElementById('game-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game state
        let gameState = 'start'; // start, playing, gameover
        let score = 0;
        let highScore = localStorage.getItem('stackerHighScore') || 0;

        // Stack configuration
        const BASE_BLOCK_WIDTH = 200;
        const BLOCK_HEIGHT = 25;
        const BLOCK_SPEED = 3;

        // Stack
        let stack = [];
        let currentBlock = null;
        let currentDirection = 1;

        // Colors
        const colors = [
            '#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3',
            '#54a0ff', '#5f27cd', '#00d2d3', '#ff9f43'
        ];

        // Initialize game
        function initGame() {
            stack = [];
            score = 0;

            // Base platform
            stack.push({
                x: canvas.width / 2 - BASE_BLOCK_WIDTH / 2,
                y: canvas.height - BLOCK_HEIGHT - 20,
                width: BASE_BLOCK_WIDTH,
                height: BLOCK_HEIGHT,
                color: colors[0]
            });

            spawnNextBlock();
            updateScoreDisplay();
        }

        // Spawn next block
        function spawnNextBlock() {
            const previousBlock = stack[stack.length - 1];
            const color = colors[stack.length % colors.length];

            currentBlock = {
                x: 0,
                y: previousBlock.y - BLOCK_HEIGHT,
                width: previousBlock.width,
                height: BLOCK_HEIGHT,
                color: color,
                speed: BLOCK_SPEED + (stack.length * 0.1)
            };

            currentDirection = 1;
        }

        // Update game
        function update() {
            if (gameState !== 'playing') return;

            // Move current block
            currentBlock.x += currentBlock.speed * currentDirection;

            // Bounce off edges
            if (currentBlock.x <= 0) {
                currentDirection = 1;
            } else if (currentBlock.x + currentBlock.width >= canvas.width) {
                currentDirection = -1;
            }
        }

        // Draw game
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw stack
            stack.forEach((block, index) => {
                ctx.fillStyle = block.color;
                ctx.shadowColor = block.color;
                ctx.shadowBlur = 10;
                ctx.fillRect(block.x, block.y, block.width, block.height);

                // Highlight
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fillRect(block.x, block.y, block.width, 5);
            });

            ctx.shadowBlur = 0;

            // Draw current block
            if (currentBlock && gameState === 'playing') {
                ctx.fillStyle = currentBlock.color;
                ctx.shadowColor = currentBlock.color;
                ctx.shadowBlur = 15;
                ctx.fillRect(currentBlock.x, currentBlock.y, currentBlock.width, currentBlock.height);

                // Highlight
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fillRect(currentBlock.x, currentBlock.y, currentBlock.width, 5);

                ctx.shadowBlur = 0;
            }
        }

        // Place block
        function placeBlock() {
            if (gameState !== 'playing' || !currentBlock) return;

            const previousBlock = stack[stack.length - 1];
            const overlap = calculateOverlap(currentBlock, previousBlock);

            if (overlap <= 0) {
                gameOver();
                return;
            }

            // Trim block
            const trimmedBlock = {
                ...currentBlock,
                width: overlap,
                x: currentBlock.x + (currentBlock.x < previousBlock.x ?
                    previousBlock.x - currentBlock.x : 0)
            };

            stack.push(trimmedBlock);
            score++;

            // Check win condition
            if (stack.length > 20) {
                // Shift everything down
                stack.forEach(block => {
                    block.y += BLOCK_HEIGHT;
                });
            }

            updateScoreDisplay();
            spawnNextBlock();
        }

        // Calculate overlap
        function calculateOverlap(block1, block2) {
            const left = Math.max(block1.x, block2.x);
            const right = Math.min(block1.x + block1.width, block2.x + block2.width);
            return Math.max(0, right - left);
        }

        // Game over
        function gameOver() {
            gameState = 'gameover';

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('stackerHighScore', highScore);
            }

            document.getElementById('final-score').textContent = score;
            document.getElementById('final-high-score').textContent = highScore;
            document.getElementById('game-over-screen').classList.remove('hidden');
        }

        // Update score display
        function updateScoreDisplay() {
            document.getElementById('score').textContent = score;
        }

        // Start game
        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');
            document.getElementById('high-score-display').textContent = highScore;

            gameState = 'playing';
            initGame();
        }

        // Handle input
        function handleInput(e) {
            if (e.type === 'keydown' && e.code !== 'Space') return;
            e.preventDefault();

            if (gameState === 'playing') {
                placeBlock();
            }
        }

        canvas.addEventListener('click', handleInput);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInput(e);
        });
        document.addEventListener('keydown', handleInput);

        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        document.getElementById('high-score-display').textContent = highScore;
        gameLoop();
    </script>
</body>
</html>
