<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Mole</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            color: #fff;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 15px;
            text-align: center;
            color: #fff;
        }

        .stat-box .label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .stat-box .value {
            font-size: 2rem;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 500px;
            width: 100%;
            margin-bottom: 20px;
        }

        .hole {
            aspect-ratio: 1;
            background: #4a3728;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.5);
            border: 4px solid #3a2718;
            transition: transform 0.1s ease;
        }

        .hole:active {
            transform: scale(0.95);
        }

        .mole {
            position: absolute;
            width: 80%;
            height: 80%;
            background: linear-gradient(135deg, #8B4513 0%, #A0522D 100%);
            border-radius: 50% 50% 40% 40%;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            transition: top 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 -3px 10px rgba(0, 0, 0, 0.3);
        }

        .mole.active {
            top: 10%;
        }

        .mole.whacked {
            top: 100%;
        }

        .mole-face {
            font-size: 2.5rem;
            position: relative;
            z-index: 1;
        }

        .mole-nose {
            position: absolute;
            width: 25%;
            height: 20%;
            background: #ff9999;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .mole-eyes {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            display: flex;
            justify-content: space-between;
        }

        .mole-eye {
            width: 30%;
            height: 30%;
            background: #000;
            border-radius: 50%;
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn.secondary {
            background: linear-gradient(45deg, #00d9ff, #00ff88);
            box-shadow: 0 5px 15px rgba(0, 217, 255, 0.3);
        }

        .btn.secondary:hover {
            box-shadow: 0 8px 20px rgba(0, 217, 255, 0.5);
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .game-over.show {
            display: flex;
        }

        .game-over-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .game-over-content h2 {
            font-size: 2.5rem;
            color: #667eea;
            margin-bottom: 20px;
        }

        .game-over-content .final-score {
            font-size: 4rem;
            font-weight: bold;
            color: #764ba2;
            margin: 20px 0;
        }

        .game-over-content p {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 30px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            z-index: 1000;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .game-board {
                gap: 10px;
            }

            .hole {
                min-width: 80px;
            }

            .stats {
                gap: 15px;
            }

            .stat-box {
                padding: 10px 20px;
            }

            .stat-box .value {
                font-size: 1.5rem;
            }
        }

        .hit-effect {
            position: absolute;
            font-size: 2rem;
            animation: hitEffect 0.5s ease forwards;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes hitEffect {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            50% {
                transform: scale(1.5);
                opacity: 1;
            }
            100% {
                transform: scale(2) translateY(-30px);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="header">
        <h1>🔨 Whack-a-Mole</h1>
    </div>

    <div class="stats">
        <div class="stat-box">
            <div class="label">SCORE</div>
            <div class="value" id="score">0</div>
        </div>
        <div class="stat-box">
            <div class="label">TIME</div>
            <div class="value" id="time">30</div>
        </div>
        <div class="stat-box">
            <div class="label">HIGH SCORE</div>
            <div class="value" id="highScore">0</div>
        </div>
    </div>

    <div class="game-board" id="gameBoard">
        <!-- 9個の穴 -->
    </div>

    <div class="controls">
        <button class="btn" id="startBtn" onclick="startGame()">スタート</button>
        <button class="btn secondary" onclick="resetGame()">リセット</button>
    </div>

    <div class="game-over" id="gameOver">
        <div class="game-over-content">
            <h2>🎉 ゲームオーバー！</h2>
            <p>最終スコア</p>
            <div class="final-score" id="finalScore">0</div>
            <p id="highScoreMessage"></p>
            <button class="btn" onclick="closeGameOver()">もう一度</button>
        </div>
    </div>

    <script>
        const gameBoard = document.getElementById('gameBoard');
        const scoreElement = document.getElementById('score');
        const timeElement = document.getElementById('time');
        const highScoreElement = document.getElementById('highScore');
        const startBtn = document.getElementById('startBtn');
        const gameOverElement = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');
        const highScoreMessage = document.getElementById('highScoreMessage');

        let score = 0;
        let timeLeft = 30;
        let gameActive = false;
        let gameInterval;
        let moleInterval;
        let highScore = localStorage.getItem('whackHighScore') || 0;
        let difficulty = 1;

        // ハイスコアを表示
        highScoreElement.textContent = highScore;

        // ゲームボードを初期化
        function initGameBoard() {
            gameBoard.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const hole = document.createElement('div');
                hole.className = 'hole';
                hole.dataset.index = i;

                const mole = document.createElement('div');
                mole.className = 'mole';
                mole.innerHTML = `
                    <div class="mole-eyes">
                        <div class="mole-eye"></div>
                        <div class="mole-eye"></div>
                    </div>
                    <div class="mole-nose"></div>
                `;

                hole.appendChild(mole);
                hole.addEventListener('click', whackMole);
                gameBoard.appendChild(hole);
            }
        }

        // ゲーム開始
        function startGame() {
            if (gameActive) return;

            score = 0;
            timeLeft = 30;
            difficulty = 1;
            gameActive = true;
            startBtn.disabled = true;

            updateScore();
            updateTimer();

            // タイマーを開始
            gameInterval = setInterval(() => {
                timeLeft--;
                updateTimer();

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // もぐらを出現
            showMole();
        }

        // もぐらを出現
        function showMole() {
            if (!gameActive) return;

            const holes = document.querySelectorAll('.hole');
            const activeMoles = document.querySelectorAll('.mole.active');

            // 難易度に応じて複数のもぐらを出現
            const maxMoles = Math.min(difficulty, 3);
            if (activeMoles.length < maxMoles) {
                const availableHoles = Array.from(holes).filter(hole =>
                    !hole.querySelector('.mole').classList.contains('active')
                );

                if (availableHoles.length > 0) {
                    const randomHole = availableHoles[Math.floor(Math.random() * availableHoles.length)];
                    const mole = randomHole.querySelector('.mole');

                    mole.classList.add('active');
                    mole.classList.remove('whacked');

                    // 難易度に応じて表示時間を変化
                    const showTime = Math.max(500, 1500 - difficulty * 100);

                    setTimeout(() => {
                        if (mole.classList.contains('active') && !mole.classList.contains('whacked')) {
                            mole.classList.remove('active');
                        }
                    }, showTime);
                }
            }

            // 次のもぐらを出現するタイミング
            const nextMoleTime = Math.max(400, 1000 - difficulty * 50);
            moleInterval = setTimeout(showMole, nextMoleTime);
        }

        // もぐらを叩く
        function whackMole(e) {
            if (!gameActive) return;

            const hole = e.currentTarget;
            const mole = hole.querySelector('.mole');

            if (mole.classList.contains('active') && !mole.classList.contains('whacked')) {
                mole.classList.add('whacked');
                mole.classList.remove('active');

                // スコア加算（難易度に応じて変化）
                const points = 10 + difficulty * 2;
                score += points;
                updateScore();

                // ヒットエフェクト
                showHitEffect(hole, points);

                // 難易度を上昇
                if (score % 50 === 0) {
                    difficulty = Math.min(difficulty + 1, 10);
                }
            }
        }

        // ヒットエフェクトを表示
        function showHitEffect(hole, points) {
            const effect = document.createElement('div');
            effect.className = 'hit-effect';
            effect.textContent = `+${points}`;
            effect.style.left = '50%';
            effect.style.top = '50%';
            effect.style.transform = 'translate(-50%, -50%)';
            hole.appendChild(effect);

            setTimeout(() => {
                effect.remove();
            }, 500);
        }

        // スコアを更新
        function updateScore() {
            scoreElement.textContent = score;
        }

        // タイマーを更新
        function updateTimer() {
            timeElement.textContent = timeLeft;

            // 時間が少なくなったら色を変更
            if (timeLeft <= 10) {
                timeElement.style.color = '#ff6b6b';
            } else if (timeLeft <= 20) {
                timeElement.style.color = '#feca57';
            } else {
                timeElement.style.color = '#fff';
            }
        }

        // ゲーム終了
        function endGame() {
            gameActive = false;
            clearInterval(gameInterval);
            clearTimeout(moleInterval);

            // 全てもぐらを隠す
            document.querySelectorAll('.mole').forEach(mole => {
                mole.classList.remove('active', 'whacked');
            });

            startBtn.disabled = false;

            // ハイスコアを更新
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('whackHighScore', highScore);
                highScoreElement.textContent = highScore;
                highScoreMessage.textContent = '🎊 新記録達成！ 🎊';
            } else {
                highScoreMessage.textContent = `ハイスコア: ${highScore}`;
            }

            finalScoreElement.textContent = score;
            gameOverElement.classList.add('show');
        }

        // ゲームオーバー画面を閉じる
        function closeGameOver() {
            gameOverElement.classList.remove('show');
        }

        // リセット
        function resetGame() {
            gameActive = false;
            clearInterval(gameInterval);
            clearTimeout(moleInterval);

            score = 0;
            timeLeft = 30;
            difficulty = 1;

            updateScore();
            updateTimer();

            // 全てもぐらを隠す
            document.querySelectorAll('.mole').forEach(mole => {
                mole.classList.remove('active', 'whacked');
            });

            startBtn.disabled = false;
        }

        // 全画面表示
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ゲームボードを初期化
        initGameBoard();
    </script>
</body>
</html>
