<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Number Tap Rush</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            padding: 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            padding: 15px 0;
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            background: linear-gradient(90deg, #00d4ff, #7b2ff7, #ff006e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00d4ff;
        }

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .current-number {
            font-size: clamp(4rem, 20vw, 8rem);
            font-weight: bold;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            max-width: 400px;
            width: 100%;
        }

        .number-btn {
            aspect-ratio: 1;
            border: none;
            border-radius: 10px;
            font-size: clamp(1.2rem, 4vw, 2rem);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            background: linear-gradient(135deg, #2a2a4a, #1a1a3a);
            color: #eee;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .number-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
        }

        .number-btn:active {
            transform: translateY(0);
        }

        .number-btn.correct {
            background: linear-gradient(135deg, #00d4aa, #00aa88);
            animation: correctPop 0.3s ease;
        }

        .number-btn.wrong {
            background: linear-gradient(135deg, #ff4757, #cc0000);
            animation: wrongShake 0.3s ease;
        }

        .number-btn.used {
            opacity: 0.3;
            pointer-events: none;
        }

        @keyframes correctPop {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            padding: 15px;
        }

        button.action-btn {
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .start-btn {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: white;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .result-content {
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, #1a1a2e, #2a2a4e);
            border-radius: 20px;
            max-width: 90%;
            width: 400px;
        }

        .result-content h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #00d4ff;
        }

        .result-stats {
            margin: 20px 0;
            font-size: 1.1rem;
        }

        .result-stats div {
            margin: 10px 0;
        }

        .highlight {
            color: #00d4ff;
            font-weight: bold;
        }

        .new-record {
            color: #ffd700;
            font-weight: bold;
            animation: pulse 0.5s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @media (max-width: 400px) {
            .grid {
                gap: 8px;
            }

            .number-btn {
                font-size: 1.5rem;
            }

            .current-number {
                font-size: 5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Number Tap Rush</h1>
        </header>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">次の数字</div>
                <div class="stat-value" id="nextNumber">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">タイム</div>
                <div class="stat-value" id="timer">0.00</div>
            </div>
            <div class="stat">
                <div class="stat-label">ミス</div>
                <div class="stat-value" id="misses">0</div>
            </div>
        </div>

        <div class="game-area">
            <div class="current-number" id="currentNumber">?</div>
            <div class="grid" id="grid"></div>
        </div>

        <div class="controls">
            <button class="action-btn start-btn" id="startBtn">▶ スタート</button>
        </div>
    </div>

    <div class="overlay" id="resultOverlay">
        <div class="result-content">
            <h2>🎉 クリア！</h2>
            <div class="result-stats">
                <div>タイム: <span class="highlight" id="finalTime">0.00</span>秒</div>
                <div>ミス: <span class="highlight" id="finalMisses">0</span>回</div>
                <div>ベストタイム: <span class="highlight" id="bestTime">-</span>秒</div>
            </div>
            <button class="action-btn start-btn" id="restartBtn">もう一度</button>
        </div>
    </div>

    <script>
        // Game state
        let currentTarget = 1;
        let startTime = null;
        let timerInterval = null;
        let missCount = 0;
        let isPlaying = false;
        let numbers = [];

        // Best time from localStorage
        let bestTime = parseFloat(localStorage.getItem('numberTapBestTime')) || null;

        // DOM elements
        const grid = document.getElementById('grid');
        const currentNumberEl = document.getElementById('currentNumber');
        const nextNumberEl = document.getElementById('nextNumber');
        const timerEl = document.getElementById('timer');
        const missesEl = document.getElementById('misses');
        const startBtn = document.getElementById('startBtn');
        const resultOverlay = document.getElementById('resultOverlay');
        const finalTimeEl = document.getElementById('finalTime');
        const finalMissesEl = document.getElementById('finalMisses');
        const bestTimeEl = document.getElementById('bestTime');
        const restartBtn = document.getElementById('restartBtn');

        // Initialize grid
        function initGrid() {
            grid.innerHTML = '';
            numbers = [];
            
            // Create numbers 1-25
            for (let i = 1; i <= 25; i++) {
                numbers.push(i);
            }
            
            // Shuffle
            shuffleArray(numbers);
            
            // Create buttons
            numbers.forEach(num => {
                const btn = document.createElement('button');
                btn.className = 'number-btn';
                btn.textContent = num;
                btn.addEventListener('click', () => handleNumberClick(num, btn));
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    handleNumberClick(num, btn);
                });
                grid.appendChild(btn);
            });
        }

        // Shuffle array
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Handle number click
        function handleNumberClick(num, btn) {
            if (!isPlaying) return;

            if (num === currentTarget) {
                // Correct
                btn.classList.add('correct', 'used');
                currentTarget++;

                if (currentTarget > 25) {
                    endGame();
                } else {
                    currentNumberEl.textContent = currentTarget;
                    nextNumberEl.textContent = currentTarget;
                }
            } else if (!btn.classList.contains('used')) {
                // Wrong
                btn.classList.add('wrong');
                missCount++;
                missesEl.textContent = missCount;

                setTimeout(() => {
                    btn.classList.remove('wrong');
                }, 300);
            }
        }

        // Start game
        function startGame() {
            currentTarget = 1;
            missCount = 0;
            isPlaying = true;

            currentNumberEl.textContent = '1';
            nextNumberEl.textContent = '1';
            timerEl.textContent = '0.00';
            missesEl.textContent = '0';

            initGrid();

            startBtn.textContent = 'プレイ中...';
            startBtn.disabled = true;

            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 10);
        }

        // Update timer
        function updateTimer() {
            const elapsed = (Date.now() - startTime) / 1000;
            timerEl.textContent = elapsed.toFixed(2);
        }

        // End game
        function endGame() {
            isPlaying = false;
            clearInterval(timerInterval);

            const finalTime = (Date.now() - startTime) / 1000;
            const isNewRecord = !bestTime || finalTime < bestTime;

            if (isNewRecord) {
                bestTime = finalTime;
                localStorage.setItem('numberTapBestTime', bestTime);
            }

            finalTimeEl.textContent = finalTime.toFixed(2);
            finalMissesEl.textContent = missCount;

            if (bestTime) {
                bestTimeEl.textContent = bestTime.toFixed(2);
                if (isNewRecord) {
                    bestTimeEl.classList.add('new-record');
                    bestTimeEl.textContent += ' 🏆 NEW!';
                } else {
                    bestTimeEl.classList.remove('new-record');
                }
            } else {
                bestTimeEl.textContent = '-';
            }

            resultOverlay.classList.add('active');
            startBtn.textContent = '▶ スタート';
            startBtn.disabled = false;
        }

        // Event listeners
        startBtn.addEventListener('click', startGame);

        restartBtn.addEventListener('click', () => {
            resultOverlay.classList.remove('active');
            startGame();
        });

        // Initialize
        initGrid();
    </script>
</body>
</html>
