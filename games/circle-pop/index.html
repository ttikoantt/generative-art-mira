<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Circle Pop - 円をポップ！</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: manipulation;
        }
        
        canvas {
            display: block;
            cursor: pointer;
        }
        
        .ui {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: white;
            z-index: 100;
            pointer-events: none;
        }
        
        .score {
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        
        .timer {
            font-size: 24px;
            margin-top: 10px;
            color: #4ecdc4;
        }
        
        .combo {
            font-size: 32px;
            margin-top: 5px;
            color: #ffe66d;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .combo.show {
            opacity: 1;
        }
        
        .start-screen, .end-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 200;
        }
        
        .end-screen {
            display: none;
        }
        
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .final-score {
            font-size: 72px;
            font-weight: bold;
            margin: 20px 0;
            color: #ffe66d;
        }
        
        .high-score {
            font-size: 24px;
            color: #95e1d3;
            margin-bottom: 30px;
        }
        
        .btn {
            padding: 15px 40px;
            font-size: 24px;
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(78, 205, 196, 0.4);
        }
        
        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(78, 205, 196, 0.6);
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }
        
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        
        .fullscreen-btn:active {
            transform: scale(0.95);
        }
        
        .instructions {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 20px;
            max-width: 300px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="start-screen" id="startScreen">
        <h1>Circle Pop</h1>
        <p class="instructions">クリック/タップで円をポップ！<br>連続でポップするとコンボボーナス！</p>
        <button class="btn" id="startBtn">スタート</button>
    </div>
    
    <div class="end-screen" id="endScreen">
        <h1>ゲーム終了！</h1>
        <div class="final-score" id="finalScore">0</div>
        <div class="high-score" id="highScore">ハイスコア: 0</div>
        <button class="btn" id="restartBtn">もう一度</button>
    </div>
    
    <div class="ui">
        <div class="score" id="score">0</div>
        <div class="timer" id="timer">30</div>
        <div class="combo" id="combo"></div>
    </div>
    
    <canvas id="canvas"></canvas>
    
    <button class="fullscreen-btn" id="fullscreenBtn">全画面表示</button>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const comboEl = document.getElementById('combo');
        const startScreen = document.getElementById('startScreen');
        const endScreen = document.getElementById('endScreen');
        const finalScoreEl = document.getElementById('finalScore');
        const highScoreEl = document.getElementById('highScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        
        // ゲーム状態
        let score = 0;
        let timeLeft = 30;
        let combo = 0;
        let lastPopTime = 0;
        let gameRunning = false;
        let highScoreValue = localStorage.getItem('circlePopHighScore') || 0;
        
        // 円の配列
        const circles = [];
        const maxCircles = 10;
        const colors = ['#4ecdc4', '#44a08d', '#ffe66d', '#95e1d3', '#f38181', '#aa96da'];
        
        // エフェクト配列
        const effects = [];
        
        // 円クラス
        class Circle {
            constructor() {
                this.radius = Math.random() * 30 + 30;
                this.x = Math.random() * (width - this.radius * 2) + this.radius;
                this.y = Math.random() * (height - this.radius * 2) + this.radius;
                this.targetRadius = this.radius;
                this.radius = 0;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.appearing = true;
                this.life = 0;
                this.maxLife = Math.random() * 200 + 100;
                this.pulse = 0;
            }
            
            update() {
                // 出現アニメーション
                if (this.appearing) {
                    this.radius += (this.targetRadius - this.radius) * 0.1;
                    if (Math.abs(this.radius - this.targetRadius) < 1) {
                        this.appearing = false;
                    }
                }
                
                // 脈動
                this.pulse += 0.05;
                this.radius = this.targetRadius + Math.sin(this.pulse) * 3;
                
                // 寿命
                this.life++;
            }
            
            draw() {
                const alpha = 1 - (this.life / this.maxLife);
                
                // 光の効果
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 1.5, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 1.5
                );
                gradient.addColorStop(0, this.color + '40');
                gradient.addColorStop(1, this.color + '00');
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // 円本体
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = alpha;
                ctx.fill();
                ctx.globalAlpha = 1;
                
                // ハイライト
                ctx.beginPath();
                ctx.arc(this.x - this.radius * 0.3, this.y - this.radius * 0.3, this.radius * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.globalAlpha = alpha;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
            
            isClicked(x, y) {
                const distance = Math.sqrt((x - this.x) ** 2 + (y - this.y) ** 2);
                return distance < this.radius;
            }
            
            isExpired() {
                return this.life >= this.maxLife;
            }
        }
        
        // ポップエフェクトクラス
        class PopEffect {
            constructor(x, y, color, score) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.score = score;
                this.radius = 0;
                this.maxRadius = 50;
                this.alpha = 1;
                this.particles = [];
                
                // 粒子を作成
                for (let i = 0; i < 8; i++) {
                    const angle = (Math.PI * 2 / 8) * i;
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * 3,
                        vy: Math.sin(angle) * 3,
                        radius: 3
                    });
                }
            }
            
            update() {
                this.radius += 5;
                this.alpha -= 0.05;
                
                for (let particle of this.particles) {
                    particle.x += particle.vx;
                    particle.y += particle.vy;
                    particle.radius *= 0.95;
                }
            }
            
            draw() {
                // 波紋
                if (this.alpha > 0) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = this.color;
                    ctx.globalAlpha = this.alpha;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }
                
                // 粒子
                for (let particle of this.particles) {
                    ctx.beginPath();
                    ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = this.alpha;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
                
                // スコア表示
                ctx.font = 'bold 24px Arial';
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.alpha;
                ctx.textAlign = 'center';
                ctx.fillText('+' + this.score, this.x, this.y - 20);
                ctx.globalAlpha = 1;
            }
            
            isDone() {
                return this.alpha <= 0;
            }
        }
        
        // 円をスポーン
        function spawnCircle() {
            if (circles.length < maxCircles) {
                circles.push(new Circle());
            }
        }
        
        // ゲーム開始
        function startGame() {
            score = 0;
            timeLeft = 30;
            combo = 0;
            gameRunning = true;
            circles.length = 0;
            effects.length = 0;
            
            scoreEl.textContent = '0';
            timerEl.textContent = '30';
            comboEl.textContent = '';
            comboEl.classList.remove('show');
            
            startScreen.style.display = 'none';
            endScreen.style.display = 'none';
            
            // タイマー開始
            const timerInterval = setInterval(() => {
                if (!gameRunning) {
                    clearInterval(timerInterval);
                    return;
                }
                
                timeLeft--;
                timerEl.textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    endGame();
                    clearInterval(timerInterval);
                }
            }, 1000);
            
            // 円をスポーン
            const spawnInterval = setInterval(() => {
                if (!gameRunning) {
                    clearInterval(spawnInterval);
                    return;
                }
                spawnCircle();
            }, 500);
        }
        
        // ゲーム終了
        function endGame() {
            gameRunning = false;
            
            if (score > highScoreValue) {
                highScoreValue = score;
                localStorage.setItem('circlePopHighScore', highScoreValue);
            }
            
            finalScoreEl.textContent = score;
            highScoreEl.textContent = 'ハイスコア: ' + highScoreValue;
            endScreen.style.display = 'flex';
        }
        
        // クリック/タッチ処理
        function handleClick(x, y) {
            if (!gameRunning) return;
            
            let hit = false;
            
            for (let i = circles.length - 1; i >= 0; i--) {
                if (circles[i].isClicked(x, y)) {
                    // コンボ計算
                    const now = Date.now();
                    if (now - lastPopTime < 500) {
                        combo++;
                    } else {
                        combo = 1;
                    }
                    lastPopTime = now;
                    
                    // スコア計算
                    const baseScore = 10;
                    const comboBonus = Math.min(combo, 10) * 5;
                    const points = baseScore + comboBonus;
                    score += points;
                    
                    // UI更新
                    scoreEl.textContent = score;
                    if (combo > 1) {
                        comboEl.textContent = combo + ' COMBO!';
                        comboEl.classList.add('show');
                    }
                    
                    // エフェクト追加
                    effects.push(new PopEffect(circles[i].x, circles[i].y, circles[i].color, points));
                    
                    // 円を削除
                    circles.splice(i, 1);
                    hit = true;
                    break;
                }
            }
            
            if (!hit) {
                combo = 0;
                comboEl.classList.remove('show');
            }
        }
        
        // イベントリスナー
        canvas.addEventListener('click', (e) => {
            handleClick(e.clientX, e.clientY);
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleClick(touch.clientX, touch.clientY);
        });
        
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);
        
        // 全画面表示
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });
        
        // リサイズ対応
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
        
        // アニメーションループ
        function animate() {
            // クリア
            ctx.fillStyle = 'rgba(26, 26, 46, 0.3)';
            ctx.fillRect(0, 0, width, height);
            
            if (gameRunning) {
                // 円を更新・描画
                for (let i = circles.length - 1; i >= 0; i--) {
                    circles[i].update();
                    circles[i].draw();
                    
                    if (circles[i].isExpired()) {
                        circles.splice(i, 1);
                        combo = 0;
                        comboEl.classList.remove('show');
                    }
                }
                
                // エフェクトを更新・描画
                for (let i = effects.length - 1; i >= 0; i--) {
                    effects[i].update();
                    effects[i].draw();
                    
                    if (effects[i].isDone()) {
                        effects.splice(i, 1);
                    }
                }
            }
            
            requestAnimationFrame(animate);
        }
        
        // アニメーション開始
        animate();
    </script>
</body>
</html>
