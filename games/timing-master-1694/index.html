<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Timing Master #1694</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: white;
            font-size: 32px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .score-display {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
        }

        .score-box {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px 30px;
            border-radius: 15px;
            color: white;
        }

        .score-box h3 {
            font-size: 14px;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .score-box .value {
            font-size: 36px;
            font-weight: bold;
        }

        .game-area {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 30px;
        }

        .circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }

        .target-zone {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                rgba(255, 215, 0, 0.8) 0deg,
                rgba(255, 215, 0, 0.8) 30deg,
                transparent 30deg
            );
            animation: rotateZone 4s linear infinite;
        }

        @keyframes rotateZone {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .indicator {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 30px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .tap-button {
            width: 150px;
            height: 150px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
            transition: all 0.1s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .tap-button:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        .feedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            pointer-events: none;
            animation: fadeUp 0.5s ease-out forwards;
        }

        @keyframes fadeUp {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -80%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -120%) scale(1);
            }
        }

        .message {
            color: white;
            font-size: 18px;
            margin-top: 20px;
            min-height: 27px;
            opacity: 0.9;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 768px) {
            .game-container {
                padding: 20px;
                width: 95%;
            }

            h1 {
                font-size: 24px;
            }

            .game-area {
                width: 250px;
                height: 250px;
            }

            .tap-button {
                width: 120px;
                height: 120px;
                font-size: 20px;
            }

            .score-box {
                padding: 10px 20px;
            }

            .score-box .value {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    
    <div class="game-container">
        <h1>⏱️ Timing Master</h1>
        
        <div class="score-display">
            <div class="score-box">
                <h3>SCORE</h3>
                <div class="value" id="score">0</div>
            </div>
            <div class="score-box">
                <h3>BEST</h3>
                <div class="value" id="best">0</div>
            </div>
        </div>

        <div class="game-area" id="gameArea">
            <div class="circle"></div>
            <div class="target-zone" id="targetZone"></div>
            <div class="indicator"></div>
        </div>

        <button class="tap-button" id="tapButton">TAP!</button>
        <div class="message" id="message">Tap when indicator is in the gold zone!</div>
    </div>

    <script>
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('timingMasterBest')) || 0;
        let rotation = 0;
        let rotationSpeed = 4;
        let isPlaying = true;

        const scoreDisplay = document.getElementById('score');
        const bestDisplay = document.getElementById('best');
        const message = document.getElementById('message');
        const tapButton = document.getElementById('tapButton');
        const targetZone = document.getElementById('targetZone');
        const gameArea = document.getElementById('gameArea');

        bestDisplay.textContent = bestScore;

        function updateRotation() {
            rotation = (rotation + rotationSpeed) % 360;
            targetZone.style.transform = `rotate(${rotation}deg)`;
            
            // Gradually increase speed
            if (score > 0 && score % 5 === 0) {
                rotationSpeed = 4 + (score / 10);
            }
            
            requestAnimationFrame(updateRotation);
        }

        function showFeedback(text, color) {
            const feedback = document.createElement('div');
            feedback.className = 'feedback';
            feedback.textContent = text;
            feedback.style.color = color;
            gameArea.appendChild(feedback);
            
            setTimeout(() => feedback.remove(), 500);
        }

        function checkTiming() {
            if (!isPlaying) return;

            // Target zone is at 0-30 degrees in the rotation
            // Indicator is fixed at top (0 degrees)
            // So we need to check if the rotated zone includes 0 degrees
            
            let targetStart = rotation % 360;
            let targetEnd = (targetStart + 30) % 360;
            
            // Normalize angles
            if (targetEnd < targetStart) {
                // Zone crosses 0/360 boundary
                let hit = (targetStart <= 0 && 0 <= 360) || (0 <= targetEnd);
                
                if (hit) {
                    // Calculate precision (how close to center of zone)
                    let distance = Math.abs(15 - ((targetStart + 360) % 360));
                    let points = 0;
                    
                    if (distance < 5) {
                        points = 3;
                        showFeedback('PERFECT! +3', '#FFD700');
                    } else if (distance < 10) {
                        points = 2;
                        showFeedback('GREAT! +2', '#00CED1');
                    } else {
                        points = 1;
                        showFeedback('GOOD! +1', '#32CD32');
                    }
                    
                    score += points;
                    scoreDisplay.textContent = score;
                    message.textContent = getEncouragement(score);
                    
                    if (score > bestScore) {
                        bestScore = score;
                        bestDisplay.textContent = bestScore;
                        localStorage.setItem('timingMasterBest', bestScore);
                    }
                } else {
                    // Miss
                    showFeedback('MISS!', '#FF4444');
                    score = 0;
                    scoreDisplay.textContent = score;
                    message.textContent = 'Try again!';
                    rotationSpeed = 4;
                }
            } else {
                // Zone doesn't cross boundary
                if (targetStart <= 0 && 0 <= targetEnd) {
                    let distance = Math.abs(15 - (0 - targetStart));
                    let points = 0;
                    
                    if (distance < 5) {
                        points = 3;
                        showFeedback('PERFECT! +3', '#FFD700');
                    } else if (distance < 10) {
                        points = 2;
                        showFeedback('GREAT! +2', '#00CED1');
                    } else {
                        points = 1;
                        showFeedback('GOOD! +1', '#32CD32');
                    }
                    
                    score += points;
                    scoreDisplay.textContent = score;
                    message.textContent = getEncouragement(score);
                    
                    if (score > bestScore) {
                        bestScore = score;
                        bestDisplay.textContent = bestScore;
                        localStorage.setItem('timingMasterBest', bestScore);
                    }
                } else {
                    showFeedback('MISS!', '#FF4444');
                    score = 0;
                    scoreDisplay.textContent = score;
                    message.textContent = 'Try again!';
                    rotationSpeed = 4;
                }
            }
        }

        function getEncouragement(score) {
            if (score < 5) return 'Good start! Keep going!';
            if (score < 10) return 'Nice! You\'re getting better!';
            if (score < 20) return 'Great! Focus and precision!';
            if (score < 30) return 'Amazing! Almost there!';
            return 'Incredible! You\'re a master!';
        }

        tapButton.addEventListener('click', checkTiming);
        tapButton.addEventListener('touchend', (e) => {
            e.preventDefault();
            checkTiming();
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                checkTiming();
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Start the game
        updateRotation();
    </script>
</body>
</html>
