<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Color Memory Match - Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            color: white;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            color: white;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 5px;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .color-box {
            aspect-ratio: 1;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .color-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent,
                rgba(255, 255, 255, 0.1),
                transparent
            );
            transform: rotate(45deg);
            transition: all 0.5s ease;
        }

        .color-box:hover::before {
            left: 100%;
        }

        .color-box:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .color-box.selected {
            border-color: white;
            transform: scale(1.1);
        }

        .color-box.correct {
            border-color: #27ae60;
            animation: pulse 0.5s ease;
        }

        .color-box.wrong {
            border-color: #e74c3c;
            animation: shake 0.5s ease;
        }

        .color-box.hidden {
            background: rgba(255, 255, 255, 0.1) !important;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1.1); }
            50% { transform: scale(1.15); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .message {
            text-align: center;
            color: white;
            font-size: 18px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .message.highlight {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .button:active {
            transform: translateY(0);
        }

        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: auto;
            padding: 10px 20px;
        }

        .timer-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .timer-progress {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.1s linear;
        }

        @media (max-width: 480px) {
            .game-container {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .color-grid {
                gap: 10px;
            }

            .stat-value {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <button class="button fullscreen-btn" onclick="toggleFullscreen()">⛶ 全画面</button>

    <div class="game-container">
        <div class="header">
            <h1>🎨 カラーマッチ</h1>
            <p style="opacity: 0.7; font-size: 14px;">表示された色と同じ色を選んでね</p>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">スコア</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="level">1</div>
                <div class="stat-label">レベル</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="best">0</div>
                <div class="stat-label">ベスト</div>
            </div>
        </div>

        <div class="timer-bar">
            <div class="timer-progress" id="timerProgress"></div>
        </div>

        <div class="color-grid" id="colorGrid"></div>

        <div class="message" id="message">
            ゲームスタート！
        </div>

        <button class="button" id="actionButton" onclick="handleAction()">
            ゲームスタート
        </button>
    </div>

    <script>
        let score = 0;
        let level = 1;
        let bestScore = parseInt(localStorage.getItem('colorMatchBest')) || 0;
        let gameState = 'start'; // start, memorize, guess, result, gameover
        let targetColor = '';
        let colors = [];
        let timeLeft = 0;
        let maxTime = 0;
        let timerInterval = null;

        const colorPalette = [
            '#e74c3c', '#e91e63', '#9b59b6', '#673ab7',
            '#3f51b5', '#2196f3', '#03a9f4', '#00bcd4',
            '#009688', '#4caf50', '#8bc34a', '#cddc39',
            '#ffeb3b', '#ffc107', '#ff9800', '#ff5722'
        ];

        function init() {
            document.getElementById('best').textContent = bestScore;
            createColorGrid();
            updateMessage('ゲームスタート！', false);
        }

        function createColorGrid() {
            const grid = document.getElementById('colorGrid');
            grid.innerHTML = '';

            for (let i = 0; i < 4; i++) {
                const box = document.createElement('div');
                box.className = 'color-box hidden';
                box.onclick = () => selectColor(i);
                grid.appendChild(box);
            }
        }

        function generateColors() {
            // ターゲット色を選択
            targetColor = colorPalette[Math.floor(Math.random() * colorPalette.length)];

            // 選択肢を生成（ターゲットを含む）
            colors = [targetColor];

            while (colors.length < 4) {
                const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                if (!colors.includes(color)) {
                    colors.push(color);
                }
            }

            // シャッフル
            colors.sort(() => Math.random() - 0.5);
        }

        function showColors() {
            const boxes = document.querySelectorAll('.color-box');
            boxes.forEach((box, index) => {
                box.style.background = colors[index];
                box.className = 'color-box';
                box.dataset.color = colors[index];
            });
        }

        function hideColors() {
            const boxes = document.querySelectorAll('.color-box');
            boxes.forEach(box => {
                box.className = 'color-box hidden';
            });
        }

        function startGame() {
            score = 0;
            level = 1;
            updateStats();
            startRound();
        }

        function startRound() {
            generateColors();
            showColors();

            // レベルに応じて記憶時間を調整
            const memorizeTime = Math.max(1500, 3000 - level * 100);
            gameState = 'memorize';
            updateMessage(`色を覚えてね！ (${Math.ceil(memorizeTime/1000)}秒)`, false);
            updateButton('待機中...', true);

            setTimeout(() => {
                hideColors();
                startGuessing();
            }, memorizeTime);
        }

        function startGuessing() {
            gameState = 'guess';
            showColors();

            // レベルに応じて制限時間を調整
            maxTime = Math.max(3, 5 - level * 0.2);
            timeLeft = maxTime;
            updateMessage('同じ色を選んでね！', false);
            updateButton('', true);

            // タイマー開始
            updateTimerBar();
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                updateTimerBar();

                if (timeLeft <= 0) {
                    timeUp();
                }
            }, 100);
        }

        function selectColor(index) {
            if (gameState !== 'guess') return;

            const boxes = document.querySelectorAll('.color-box');
            const selectedBox = boxes[index];
            const selectedColor = colors[index];

            clearInterval(timerInterval);

            if (selectedColor === targetColor) {
                // 正解
                selectedBox.classList.add('correct');
                score += Math.ceil(timeLeft * 10 * level);
                level++;
                updateStats();
                updateMessage(`🎉 正解！ +${Math.ceil(timeLeft * 10 * (level - 1))}点`, true);
                updateButton('次のレベルへ', false);
                gameState = 'result';
            } else {
                // 不正解
                selectedBox.classList.add('wrong');
                // ターゲット色を表示
                boxes.forEach(box => {
                    if (box.dataset.color === targetColor) {
                        box.classList.add('correct');
                    }
                });
                gameOver();
            }
        }

        function timeUp() {
            clearInterval(timerInterval);
            updateMessage('⏰ 時間切れ！', true);

            // ターゲット色を表示
            const boxes = document.querySelectorAll('.color-box');
            boxes.forEach(box => {
                if (box.dataset.color === targetColor) {
                    box.classList.add('correct');
                }
            });

            gameOver();
        }

        function gameOver() {
            gameState = 'gameover';

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('colorMatchBest', bestScore);
                document.getElementById('best').textContent = bestScore;
                updateMessage(`🏆 新記録！ ${score}点`, true);
            } else {
                updateMessage(`ゲームオーバー！ ${score}点`, true);
            }

            updateButton('もう一度プレイ', false);
        }

        function handleAction() {
            if (gameState === 'start' || gameState === 'gameover') {
                startGame();
            } else if (gameState === 'result') {
                startRound();
            }
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
        }

        function updateMessage(text, highlight) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = highlight ? 'message highlight' : 'message';
        }

        function updateButton(text, disabled) {
            const button = document.getElementById('actionButton');
            button.textContent = text;
            button.disabled = disabled;
        }

        function updateTimerBar() {
            const progress = (timeLeft / maxTime) * 100;
            document.getElementById('timerProgress').style.width = progress + '%';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert('全画面表示ができません');
                });
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        init();
    </script>
</body>
</html>
