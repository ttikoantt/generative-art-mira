<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Number Snap - 数字スナップ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            touch-action: manipulation;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .stat {
            background: rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .stat strong {
            color: #FFD700;
        }

        .game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 600px;
        }

        .target-display {
            font-size: 48px;
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            width: 100%;
            aspect-ratio: 1;
        }

        .number-card {
            background: rgba(255,255,255,0.9);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .number-card:active {
            transform: scale(0.95);
        }

        .number-card.correct {
            background: #4CAF50;
            color: white;
            animation: correctPop 0.3s ease;
        }

        .number-card.wrong {
            background: #f44336;
            color: white;
            animation: shake 0.3s ease;
        }

        .number-card.found {
            opacity: 0.3;
            pointer-events: none;
        }

        @keyframes correctPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .overlay-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .overlay-content h2 {
            font-size: 32px;
            color: #667eea;
            margin-bottom: 20px;
        }

        .overlay-content p {
            font-size: 18px;
            color: #666;
            margin-bottom: 10px;
        }

        .overlay-content .score {
            font-size: 48px;
            color: #FFD700;
            font-weight: bold;
            margin: 20px 0;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease;
            margin: 10px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="header">
        <h1>🔢 Number Snap</h1>
        <div class="stats">
            <div class="stat">スコア: <strong id="score">0</strong></div>
            <div class="stat">ハイスコア: <strong id="highScore">0</strong></div>
        </div>
        <div class="stats">
            <div class="stat">次の数字: <strong id="nextNumber">1</strong></div>
            <div class="stat">残り: <strong id="remaining">25</strong></div>
        </div>
    </div>

    <div class="game-container">
        <div class="target-display">次: <span id="targetNumber">1</span></div>
        <div class="grid" id="grid"></div>
    </div>

    <div id="startOverlay" class="overlay">
        <div class="overlay-content">
            <h2>🔢 Number Snap</h2>
            <p>1から25までの数字を順番にタップ！</p>
            <p>反射神経を鍛える脳トレゲーム</p>
            <button class="btn" onclick="startGame()">スタート</button>
        </div>
    </div>

    <div id="gameOverOverlay" class="overlay hidden">
        <div class="overlay-content">
            <h2>🎉 完成！</h2>
            <p>所要時間</p>
            <div class="score" id="finalTime">0.00秒</div>
            <p>スコア: <span id="finalScore">0</span></p>
            <button class="btn" onclick="startGame()">もう一度</button>
            <button class="btn btn-secondary" onclick="goToMenu()">メニュー</button>
        </div>
    </div>

    <script>
        // ゲーム状態
        let numbers = [];
        let currentNumber = 1;
        let score = 0;
        let highScore = localStorage.getItem('numberSnapHighScore') || 0;
        let startTime = null;
        let foundCount = 0;

        // 初期化
        document.getElementById('highScore').textContent = highScore;

        // ゲーム開始
        function startGame() {
            // リセット
            numbers = [];
            currentNumber = 1;
            score = 0;
            foundCount = 0;
            startTime = Date.now();

            // 数字を生成（1-25をシャッフル）
            for (let i = 1; i <= 25; i++) {
                numbers.push(i);
            }
            shuffleArray(numbers);

            // グリッドを生成
            renderGrid();
            updateUI();

            // オーバーレイを非表示
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');
        }

        // 配列をシャッフル
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // グリッドを描画
        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            numbers.forEach((num, index) => {
                const card = document.createElement('div');
                card.className = 'number-card';
                card.textContent = num;
                card.dataset.number = num;
                card.onclick = () => handleCardClick(card, num);
                grid.appendChild(card);
            });
        }

        // カードクリック処理
        function handleCardClick(card, number) {
            if (number === currentNumber) {
                // 正解
                card.classList.add('correct');
                card.classList.add('found');
                
                score += 10 * currentNumber;
                foundCount++;
                currentNumber++;

                // 全部見つかったらゲーム終了
                if (foundCount >= 25) {
                    setTimeout(endGame, 500);
                }

                updateUI();
            } else {
                // 不正解
                card.classList.add('wrong');
                score = Math.max(0, score - 5);
                setTimeout(() => card.classList.remove('wrong'), 300);
                updateUI();
            }
        }

        // UI更新
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('nextNumber').textContent = currentNumber;
            document.getElementById('targetNumber').textContent = currentNumber;
            document.getElementById('remaining').textContent = 25 - foundCount;
        }

        // ゲーム終了
        function endGame() {
            const endTime = Date.now();
            const elapsed = ((endTime - startTime) / 1000).toFixed(2);

            // ハイスコア更新
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('numberSnapHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }

            // 結果表示
            document.getElementById('finalTime').textContent = elapsed + '秒';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        // メニューに戻る
        function goToMenu() {
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('startOverlay').classList.remove('hidden');
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
