<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Timing Catch #834</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 800px;
        }

        #gameArea {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .score-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #fff;
            z-index: 10;
        }

        .score-display h2 {
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        .score-display p {
            font-size: 14px;
            opacity: 0.7;
            margin-top: 5px;
        }

        #target {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, #ff6b6b 0%, #c92a2a 100%);
            box-shadow: 0 0 30px rgba(255,107,107,0.5);
            cursor: pointer;
            transition: transform 0.1s;
        }

        #target:active {
            transform: scale(0.9);
        }

        #target.catch-zone {
            background: radial-gradient(circle, #51cf66 0%, #2f9e44 100%);
            box-shadow: 0 0 30px rgba(81,207,102,0.7);
        }

        #target.too-early {
            background: radial-gradient(circle, #ffd43b 0%, #fab005 100%);
            box-shadow: 0 0 30px rgba(255,212,59,0.7);
        }

        #target.too-late {
            background: radial-gradient(circle, #ff6b6b 0%, #c92a2a 100%);
            box-shadow: 0 0 30px rgba(255,107,107,0.7);
        }

        #zone {
            position: absolute;
            width: 120px;
            height: 120px;
            border: 3px dashed rgba(255,255,255,0.3);
            border-radius: 50%;
            pointer-events: none;
        }

        #zone.highlight {
            border-color: rgba(81,207,102,0.8);
            box-shadow: inset 0 0 20px rgba(81,207,102,0.3);
        }

        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        #message.show {
            opacity: 1;
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            z-index: 100;
        }

        #gameOverScreen {
            display: none;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #ff6b6b, #ffd43b, #51cf66);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .instructions {
            text-align: center;
            margin-bottom: 30px;
            padding: 0 20px;
        }

        .instructions p {
            font-size: 16px;
            line-height: 1.6;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .highlight {
            color: #51cf66;
            font-weight: bold;
        }

        button {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 25px rgba(102,126,234,0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .final-score {
            font-size: 64px;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 0 30px rgba(255,255,255,0.5);
        }

        .stats {
            margin: 20px 0;
            text-align: center;
        }

        .stats p {
            font-size: 16px;
            margin: 5px 0;
            opacity: 0.8;
        }

        #lives {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .heart {
            width: 30px;
            height: 30px;
            background: #ff6b6b;
            clip-path: path('M15 25.5C15 25.5 3 18 3 9C3 4 7 2 10 2C13 2 15 5 15 5C15 5 17 2 20 2C23 2 27 4 27 9C27 18 15 25.5 15 25.5Z');
            opacity: 1;
            transition: opacity 0.3s;
        }

        .heart.lost {
            opacity: 0.2;
        }

        #combo {
            position: absolute;
            top: 150px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: bold;
            color: #ffd43b;
            text-shadow: 0 0 10px rgba(255,212,59,0.8);
            z-index: 10;
            opacity: 0;
            transition: opacity 0.2s;
        }

        #combo.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="gameArea">
            <div class="score-display">
                <h2 id="score">0</h2>
                <p>SCORE</p>
            </div>

            <div id="lives"></div>

            <div id="combo"></div>

            <div id="zone"></div>
            <div id="target"></div>
            <div id="message"></div>
        </div>

        <div id="startScreen">
            <h1>⏱️ Timing Catch</h1>
            <div class="instructions">
                <p>ターゲットが<span class="highlight">緑色のゾーン</span>に来たときにタップ！</p>
                <p>早すぎると黄色、遅すぎると赤色</p>
                <p>3回ミスでゲームオーバー</p>
            </div>
            <button id="startBtn">START</button>
        </div>

        <div id="gameOverScreen">
            <h1>GAME OVER</h1>
            <div class="final-score" id="finalScore">0</div>
            <div class="stats">
                <p>Perfect: <span id="perfectCount">0</span></p>
                <p>Max Combo: <span id="maxCombo">0</span></p>
            </div>
            <button id="restartBtn">RETRY</button>
        </div>
    </div>

    <script>
        const target = document.getElementById('target');
        const zone = document.getElementById('zone');
        const scoreDisplay = document.getElementById('score');
        const message = document.getElementById('message');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const finalScore = document.getElementById('finalScore');
        const perfectCount = document.getElementById('perfectCount');
        const maxComboDisplay = document.getElementById('maxCombo');
        const livesContainer = document.getElementById('lives');
        const comboDisplay = document.getElementById('combo');

        let score = 0;
        let lives = 3;
        let combo = 0;
        let maxCombo = 0;
        let perfectCountNum = 0;
        let gameRunning = false;
        let animationId = null;

        const gameArea = document.getElementById('gameArea');
        const centerX = gameArea.offsetWidth / 2;
        const centerY = gameArea.offsetHeight / 2;

        const zoneRadius = 60;
        const targetRadius = 40;
        const orbitRadius = 150;
        let angle = 0;
        const angularSpeed = 0.03;

        function initLives() {
            livesContainer.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                livesContainer.appendChild(heart);
            }
        }

        function updateLives() {
            const hearts = livesContainer.querySelectorAll('.heart');
            hearts.forEach((heart, index) => {
                if (index >= lives) {
                    heart.classList.add('lost');
                } else {
                    heart.classList.remove('lost');
                }
            });
        }

        function showCombo() {
            if (combo >= 2) {
                comboDisplay.textContent = `${combo} COMBO!`;
                comboDisplay.classList.add('show');
                setTimeout(() => {
                    comboDisplay.classList.remove('show');
                }, 1000);
            }
        }

        function updateScore(points) {
            score += points;
            scoreDisplay.textContent = score;
        }

        function showMessage(text, color) {
            message.textContent = text;
            message.style.color = color;
            message.classList.add('show');
            setTimeout(() => {
                message.classList.remove('show');
            }, 800);
        }

        function isInZone() {
            const zoneAngle = Math.PI * 1.5; // Top position
            const zoneWidth = 0.3; // Zone width in radians

            let normalizedAngle = angle % (Math.PI * 2);
            if (normalizedAngle < 0) normalizedAngle += Math.PI * 2;

            const diff = Math.abs(normalizedAngle - zoneAngle);
            return diff < zoneWidth;
        }

        function targetClick() {
            if (!gameRunning) return;

            if (isInZone()) {
                // Perfect catch!
                target.classList.add('catch-zone');
                combo++;
                if (combo > maxCombo) maxCombo = combo;
                perfectCountNum++;
                updateScore(10 + combo * 5);
                showMessage('PERFECT! +' + (10 + combo * 5), '#51cf66');
                showCombo();
            } else {
                const zoneAngle = Math.PI * 1.5;
                let normalizedAngle = angle % (Math.PI * 2);
                if (normalizedAngle < 0) normalizedAngle += Math.PI * 2;

                const diff = normalizedAngle - zoneAngle;
                if (diff < 0 || diff > Math.PI) {
                    // Too early
                    target.classList.add('too-early');
                    combo = 0;
                    lives--;
                    updateLives();
                    showMessage('TOO EARLY!', '#ffd43b');
                } else {
                    // Too late
                    target.classList.add('too-late');
                    combo = 0;
                    lives--;
                    updateLives();
                    showMessage('TOO LATE!', '#ff6b6b');
                }
            }

            if (lives <= 0) {
                gameOver();
            }

            setTimeout(() => {
                target.classList.remove('catch-zone', 'too-early', 'too-late');
            }, 200);
        }

        function gameLoop() {
            if (!gameRunning) return;

            angle += angularSpeed;

            // Update target position
            const targetX = centerX + Math.cos(angle) * orbitRadius - targetRadius;
            const targetY = centerY + Math.sin(angle) * orbitRadius - targetRadius;

            target.style.left = targetX + 'px';
            target.style.top = targetY + 'px';

            // Update zone highlight
            if (isInZone()) {
                zone.classList.add('highlight');
            } else {
                zone.classList.remove('highlight');
            }

            animationId = requestAnimationFrame(gameLoop);
        }

        function startGame() {
            score = 0;
            lives = 3;
            combo = 0;
            maxCombo = 0;
            perfectCountNum = 0;
            angle = 0;

            updateScore(0);
            initLives();

            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            gameRunning = true;

            // Position zone at top
            zone.style.left = (centerX - zoneRadius) + 'px';
            zone.style.top = (centerY - orbitRadius - zoneRadius) + 'px';

            gameLoop();
        }

        function gameOver() {
            gameRunning = false;
            if (animationId) {
                cancelAnimationFrame(animationId);
            }

            finalScore.textContent = score;
            perfectCount.textContent = perfectCountNum;
            maxComboDisplay.textContent = maxCombo;

            gameOverScreen.style.display = 'flex';
        }

        // Event Listeners
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);
        target.addEventListener('click', targetClick);
        target.addEventListener('touchstart', (e) => {
            e.preventDefault();
            targetClick();
        });

        // Initialize lives display
        initLives();
    </script>
</body>
</html>
