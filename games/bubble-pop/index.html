<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Pop Puzzle - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        #gameCanvas {
            display: block;
            cursor: pointer;
        }

        .ui {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 100;
            pointer-events: none;
        }

        .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 25px;
            border-radius: 15px;
            color: #fff;
            text-align: center;
            pointer-events: auto;
        }

        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .combo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 30px rgba(102, 126, 234, 0.8);
            pointer-events: none;
            animation: comboAnim 0.8s ease-out forwards;
        }

        @keyframes comboAnim {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            30% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.3);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1) translateY(-50px);
            }
        }

        .controls {
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .game-over.show {
            display: flex;
        }

        .game-over-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 50px;
            border-radius: 30px;
            text-align: center;
            color: #fff;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .game-over h2 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .game-over p {
            font-size: 24px;
            margin-bottom: 30px;
        }

        .restart-btn {
            background: #fff;
            color: #667eea;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 768px) {
            .ui {
                top: 10px;
                left: 10px;
                right: 10px;
            }

            .stats {
                gap: 10px;
            }

            .stat {
                padding: 10px 15px;
            }

            .stat-label {
                font-size: 9px;
            }

            .stat-value {
                font-size: 20px;
            }

            .control-btn {
                padding: 10px 16px;
                font-size: 12px;
            }

            .combo {
                font-size: 48px;
            }

            .game-over-content {
                padding: 30px;
                margin: 20px;
            }

            .game-over h2 {
                font-size: 32px;
            }

            .game-over p {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="ui">
        <div class="stats">
            <div class="stat">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">COMBO</div>
                <div class="stat-value" id="combo">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">HIGHSCORE</div>
                <div class="stat-value" id="highscore">0</div>
            </div>
        </div>
        <div class="controls">
            <button class="control-btn" id="pauseBtn">一時停止</button>
            <button class="control-btn" id="fullscreenBtn">全画面</button>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <div class="game-over-content">
            <h2>TIME'S UP!</h2>
            <p>SCORE: <span id="finalScore">0</span></p>
            <button class="restart-btn" id="restartBtn">もう一度</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let bubbles = [];
        let particles = [];
        let score = 0;
        let combo = 0;
        let highscore = parseInt(localStorage.getItem('bubblePopHighscore')) || 0;
        let gameTime = 60;
        let isPaused = false;
        let isGameOver = false;
        let lastBubbleTime = 0;
        let comboTimeout = null;

        const COLORS = [
            '#667eea',
            '#764ba2',
            '#f093fb',
            '#f5576c',
            '#4facfe',
            '#00f2fe',
            '#43e97b',
            '#fa709a'
        ];

        class Bubble {
            constructor() {
                this.radius = Math.random() * 40 + 30;
                this.x = Math.random() * (width - this.radius * 2) + this.radius;
                this.y = height + this.radius;
                this.speedY = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 2;
                this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                this.opacity = 0;
                this.maxOpacity = Math.random() * 0.3 + 0.7;
                this.popped = false;
                this.shake = 0;
            }

            update() {
                this.y -= this.speedY;
                this.x += this.speedX + Math.sin(this.shake) * 0.5;
                this.shake += 0.1;

                if (this.opacity < this.maxOpacity) {
                    this.opacity += 0.02;
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;

                // バブルのグラデーション
                const gradient = ctx.createRadialGradient(
                    this.x - this.radius * 0.3,
                    this.y - this.radius * 0.3,
                    0,
                    this.x,
                    this.y,
                    this.radius
                );
                gradient.addColorStop(0, '#ffffff');
                gradient.addColorStop(0.3, this.color);
                gradient.addColorStop(1, this.color + '40');

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // ハイライト
                ctx.beginPath();
                ctx.arc(this.x - this.radius * 0.3, this.y - this.radius * 0.3, this.radius * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.fill();

                ctx.restore();
            }

            contains(x, y) {
                const dx = x - this.x;
                const dy = y - this.y;
                return dx * dx + dy * dy < this.radius * this.radius;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.radius = Math.random() * 5 + 2;
                this.speedX = (Math.random() - 0.5) * 10;
                this.speedY = (Math.random() - 0.5) * 10;
                this.color = color;
                this.opacity = 1;
                this.decay = Math.random() * 0.03 + 0.02;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += 0.2;
                this.opacity -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function spawnBubble() {
            const now = Date.now();
            if (now - lastBubbleTime > 800) {
                bubbles.push(new Bubble());
                lastBubbleTime = now;
            }
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function showCombo() {
            const comboEl = document.createElement('div');
            comboEl.className = 'combo';
            comboEl.textContent = `COMBO x${combo}!`;
            document.body.appendChild(comboEl);

            setTimeout(() => comboEl.remove(), 800);
        }

        function popBubble(bubble) {
            if (bubble.popped) return;
            bubble.popped = true;

            createParticles(bubble.x, bubble.y, bubble.color);

            combo++;
            const points = 10 * combo;
            score += points;

            if (combo > 1) {
                showCombo();
            }

            clearTimeout(comboTimeout);
            comboTimeout = setTimeout(() => {
                combo = 0;
            }, 1500);

            updateUI();
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;
            document.getElementById('highscore').textContent = highscore;
        }

        function gameOver() {
            isGameOver = true;

            if (score > highscore) {
                highscore = score;
                localStorage.setItem('bubblePopHighscore', highscore);
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.add('show');
            updateUI();
        }

        function restartGame() {
            bubbles = [];
            particles = [];
            score = 0;
            combo = 0;
            isGameOver = false;
            document.getElementById('gameOver').classList.remove('show');
            updateUI();
        }

        function update() {
            if (isPaused || isGameOver) return;

            spawnBubble();

            bubbles.forEach(bubble => bubble.update());
            particles.forEach(particle => particle.update());

            particles = particles.filter(p => p.opacity > 0);
            bubbles = bubbles.filter(b => !b.popped && b.y > -b.radius * 2);
        }

        function draw() {
            // 背景を再描画
            const gradient = ctx.createLinearGradient(0, 0, width, height);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(0.5, '#16213e');
            gradient.addColorStop(1, '#0f3460');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            bubbles.forEach(bubble => bubble.draw());
            particles.forEach(particle => particle.draw());
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // イベントリスナー
        canvas.addEventListener('click', (e) => {
            if (isPaused || isGameOver) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            bubbles.forEach(bubble => {
                if (bubble.contains(x, y)) {
                    popBubble(bubble);
                }
            });
        });

        canvas.addEventListener('touchstart', (e) => {
            if (isPaused || isGameOver) return;
            e.preventDefault();

            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;

            bubbles.forEach(bubble => {
                if (bubble.contains(x, y)) {
                    popBubble(bubble);
                }
            });
        });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            isPaused = !isPaused;
            document.getElementById('pauseBtn').textContent = isPaused ? '再開' : '一時停止';
        });

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        document.getElementById('restartBtn').addEventListener('click', restartGame);

        // 60秒タイマー
        setTimeout(() => {
            if (!isGameOver) {
                gameOver();
            }
        }, 60000);

        // 初期化
        resize();
        window.addEventListener('resize', resize);
        updateUI();
        gameLoop();
    </script>
</body>
</html>
