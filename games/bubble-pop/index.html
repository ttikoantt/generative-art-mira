<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bubble Pop Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .score {
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .timer {
            font-size: 20px;
            font-weight: bold;
            color: white;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
        }

        .combo {
            position: fixed;
            top: 80px;
            right: 20px;
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        #gameCanvas {
            flex: 1;
            width: 100%;
            height: 100%;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h1 {
            font-size: 48px;
            font-weight: bold;
            color: white;
            margin-bottom: 20px;
            text-align: center;
        }

        .overlay p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
            text-align: center;
            max-width: 300px;
        }

        .overlay .final-score {
            font-size: 72px;
            font-weight: bold;
            color: #ffd700;
            margin: 20px 0;
        }

        .btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 16px 48px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.4);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .fullscreen-btn {
            position: fixed;
            top: 15px;
            right: 20px;
            z-index: 150;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .overlay h1 {
                font-size: 32px;
            }

            .overlay .final-score {
                font-size: 56px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="timer">⏱️ <span id="timer">60</span>s</div>
        </div>

        <div class="combo" id="combo"></div>

        <canvas id="gameCanvas"></canvas>

        <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>

        <div class="overlay" id="startOverlay">
            <h1>🫧 Bubble Pop</h1>
            <p>浮かぶバブルをタップして割ろう！<br>コンボでスコアアップ！</p>
            <button class="btn" id="startBtn">スタート</button>
        </div>

        <div class="overlay hidden" id="gameOverlay">
            <h1>🎉 ゲーム終了！</h1>
            <p>最終スコア</p>
            <div class="final-score" id="finalScore">0</div>
            <p>最大コンボ: <span id="maxCombo">0</span></p>
            <button class="btn" id="restartBtn">もう一度</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const scoreElement = document.getElementById('score');
        const timerElement = document.getElementById('timer');
        const comboElement = document.getElementById('combo');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverlay = document.getElementById('gameOverlay');
        const finalScoreElement = document.getElementById('finalScore');
        const maxComboElement = document.getElementById('maxCombo');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let score = 0;
        let timeLeft = 60;
        let gameRunning = false;
        let combo = 0;
        let maxCombo = 0;
        let lastPopTime = 0;
        const comboTimeout = 1500; // 1.5秒以内に次を割るとコンボ継続

        const bubbles = [];
        const colors = [
            { bg: '#FF6B6B', border: '#FF5252' },
            { bg: '#4ECDC4', border: '#26C6DA' },
            { bg: '#45B7D1', border: '#2196F3' },
            { bg: '#FFA07A', border: '#FF7043' },
            { bg: '#98D8C8', border: '#4DB6AC' },
            { bg: '#F7DC6F', border: '#FBC02D' },
            { bg: '#BB8FCE', border: '#9C27B0' },
            { bg: '#85C1E2', border: '#03A9F4' }
        ];

        class Bubble {
            constructor() {
                this.reset();
            }

            reset() {
                this.radius = Math.random() * 30 + 30;
                this.x = Math.random() * (width - this.radius * 2) + this.radius;
                this.y = height + this.radius + Math.random() * 100;
                this.speedY = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 2;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.popped = false;
                this.popAnimation = 0;
                this.alpha = 1;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = Math.random() * 0.05 + 0.02;
            }

            update() {
                if (this.popped) {
                    this.popAnimation += 0.1;
                    this.alpha -= 0.1;
                    return this.popAnimation < 1;
                }

                this.y -= this.speedY;
                this.x += Math.sin(this.wobble) * 0.5 + this.speedX;
                this.wobble += this.wobbleSpeed;

                // 画面外に出たらリセット
                if (this.y < -this.radius * 2) {
                    this.reset();
                }

                // 境界での跳ね返り
                if (this.x < this.radius || this.x > width - this.radius) {
                    this.speedX *= -1;
                }

                return true;
            }

            draw() {
                ctx.save();

                if (this.popped) {
                    // 割れたアニメーション
                    const scale = 1 + this.popAnimation * 0.5;
                    ctx.globalAlpha = this.alpha;
                    ctx.translate(this.x, this.y);
                    ctx.scale(scale, scale);

                    // 花びらのようなパーティクル
                    for (let i = 0; i < 8; i++) {
                        const angle = (i / 8) * Math.PI * 2;
                        const distance = this.popAnimation * this.radius * 2;

                        ctx.fillStyle = this.color.bg;
                        ctx.globalAlpha = this.alpha * (1 - this.popAnimation);
                        ctx.beginPath();
                        ctx.arc(
                            Math.cos(angle) * distance,
                            Math.sin(angle) * distance,
                            this.radius * 0.3 * (1 - this.popAnimation),
                            0, Math.PI * 2
                        );
                        ctx.fill();
                    }
                } else {
                    // バブル本体
                    const gradient = ctx.createRadialGradient(
                        this.x - this.radius * 0.3,
                        this.y - this.radius * 0.3,
                        0,
                        this.x,
                        this.y,
                        this.radius
                    );

                    gradient.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                    gradient.addColorStop(0.3, this.color.bg);
                    gradient.addColorStop(1, this.color.border);

                    ctx.fillStyle = gradient;
                    ctx.globalAlpha = 0.9;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fill();

                    // ハイライト
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                    ctx.beginPath();
                    ctx.arc(
                        this.x - this.radius * 0.3,
                        this.y - this.radius * 0.3,
                        this.radius * 0.2,
                        0, Math.PI * 2
                    );
                    ctx.fill();

                    // ボーダー
                    ctx.strokeStyle = this.color.border;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.stroke();
                }

                ctx.restore();
            }

            contains(x, y) {
                if (this.popped) return false;
                const dx = this.x - x;
                const dy = this.y - y;
                return Math.sqrt(dx * dx + dy * dy) < this.radius;
            }

            pop() {
                this.popped = true;
            }
        }

        // ゲーム初期化
        function init() {
            bubbles.length = 0;
            for (let i = 0; i < 15; i++) {
                const bubble = new Bubble();
                bubble.y = Math.random() * height;
                bubbles.push(bubble);
            }
        }

        // スコア計算（コンボ考慮）
        function calculateScore() {
            const now = Date.now();
            if (now - lastPopTime < comboTimeout) {
                combo++;
            } else {
                combo = 1;
            }
            lastPopTime = now;

            if (combo > maxCombo) {
                maxCombo = combo;
            }

            const baseScore = 100;
            const comboBonus = Math.floor(combo * 20);
            return baseScore + comboBonus;
        }

        // コンボ表示
        function updateComboDisplay() {
            if (combo > 1) {
                comboElement.textContent = `${combo} Combo! 🎯`;
                comboElement.style.transform = 'scale(1.2)';
                setTimeout(() => {
                    comboElement.style.transform = 'scale(1)';
                }, 100);
            } else {
                comboElement.textContent = '';
            }
        }

        // ゲーム開始
        function startGame() {
            score = 0;
            timeLeft = 60;
            combo = 0;
            maxCombo = 0;
            lastPopTime = 0;
            gameRunning = true;

            scoreElement.textContent = '0';
            timerElement.textContent = '60';
            comboElement.textContent = '';
            startOverlay.classList.add('hidden');
            gameOverlay.classList.add('hidden');

            init();

            // タイマー
            const timerInterval = setInterval(() => {
                if (!gameRunning) {
                    clearInterval(timerInterval);
                    return;
                }

                timeLeft--;
                timerElement.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                    clearInterval(timerInterval);
                }
            }, 1000);

            animate();
        }

        // ゲーム終了
        function endGame() {
            gameRunning = false;
            finalScoreElement.textContent = score;
            maxComboElement.textContent = maxCombo;
            gameOverlay.classList.remove('hidden');
        }

        // アニメーションループ
        function animate() {
            if (!gameRunning) return;

            // 背景をクリア（グラデーション）
            const gradient = ctx.createLinearGradient(0, 0, width, height);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(1, '#764ba2');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // バブルを更新・描画
            bubbles.forEach(bubble => {
                if (bubble.update()) {
                    bubble.draw();
                } else {
                    bubble.reset();
                }
            });

            requestAnimationFrame(animate);
        }

        // タッチ/クリックイベント
        function handleInput(e) {
            if (!gameRunning) return;

            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;

            if (e.type === 'touchstart') {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            const x = clientX - rect.left;
            const y = clientY - rect.top;

            bubbles.forEach(bubble => {
                if (!bubble.popped && bubble.contains(x, y)) {
                    bubble.pop();
                    const points = calculateScore();
                    score += points;
                    scoreElement.textContent = score;
                    updateComboDisplay();
                }
            });
        }

        canvas.addEventListener('touchstart', handleInput, { passive: false });
        canvas.addEventListener('click', handleInput);

        // ボタンイベント
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // 全画面
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // リサイズ
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // 初期化
        init();

        // 待機画面のアニメーション
        function idleAnimate() {
            if (gameRunning) return;

            const gradient = ctx.createLinearGradient(0, 0, width, height);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(1, '#764ba2');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            bubbles.forEach(bubble => {
                bubble.update();
                bubble.draw();
            });

            requestAnimationFrame(idleAnimate);
        }

        idleAnimate();
    </script>
</body>
</html>
