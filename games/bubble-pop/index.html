<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bubble Pop - 泡割りゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            color: #fff;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat {
            color: #fff;
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            color: #888;
            font-size: 0.8em;
            margin-right: 5px;
        }

        .stat-value {
            color: #4facfe;
            font-weight: bold;
            font-size: 1.2em;
        }

        #canvas {
            border: 2px solid #333;
            border-radius: 10px;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a1a2e 100%);
            cursor: pointer;
            touch-action: none;
            max-width: 100%;
            box-shadow: 0 0 30px rgba(100, 100, 255, 0.3);
        }

        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            z-index: 10;
            display: none;
            min-width: 280px;
        }

        .overlay.active {
            display: block;
        }

        .overlay h2 {
            font-size: clamp(1.5rem, 4vw, 2rem);
            margin-bottom: 15px;
            color: #4facfe;
        }

        .overlay p {
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            margin-bottom: 10px;
        }

        .overlay .score {
            font-size: clamp(2rem, 5vw, 3rem);
            color: #f093fb;
            margin: 20px 0;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            margin: 5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4);
        }

        .fullscreen-btn:hover {
            box-shadow: 0 6px 20px rgba(240, 147, 251, 0.6);
        }

        .combo {
            position: absolute;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: bold;
            color: #f093fb;
            text-shadow: 0 0 10px #f093fb;
            animation: comboAnim 0.5s ease-out forwards;
            pointer-events: none;
        }

        @keyframes comboAnim {
            0% {
                opacity: 1;
                transform: scale(0.5);
            }
            50% {
                opacity: 1;
                transform: scale(1.5);
            }
            100% {
                opacity: 0;
                transform: scale(1.5) translateY(-50px);
            }
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .info {
            color: #666;
            font-size: 0.9rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🫧 Bubble Pop</h1>

        <div class="stats">
            <div class="stat">
                <span class="stat-label">スコア:</span>
                <span class="stat-value" id="score">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">時間:</span>
                <span class="stat-value" id="timer">60</span>
            </div>
            <div class="stat">
                <span class="stat-label">コンボ:</span>
                <span class="stat-value" id="combo">0x</span>
            </div>
        </div>

        <canvas id="canvas"></canvas>

        <div class="overlay" id="startOverlay">
            <h2>🫧 Bubble Pop</h2>
            <p>泡をタップして割ろう！</p>
            <p>60秒でハイスコアを目指す</p>
            <p style="font-size: 0.9em; color: #888; margin-top: 15px;">連続で割るとコンボボーナス！</p>
            <button onclick="startGame()">スタート</button>
        </div>

        <div class="overlay" id="gameOverlay">
            <h2>🎉 ゲーム終了！</h2>
            <p>最終スコア</p>
            <div class="score" id="finalScore">0</div>
            <p style="color: #4facfe;">最大コンボ: <span id="maxCombo">0</span></p>
            <button onclick="startGame()">もう一度</button>
        </div>

        <div class="controls">
            <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>
        </div>

        <p class="info">💡 泡をタップして割ろう！連続で割るとコンボボーナス</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Responsive canvas size
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 500);
            const maxHeight = Math.min(window.innerHeight - 350, 500);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game state
        let score = 0;
        let timeLeft = 60;
        let combo = 0;
        let maxCombo = 0;
        let gameRunning = false;
        let bubbles = [];
        let particles = [];
        let lastPopTime = 0;
        const COMBO_TIMEOUT = 1000; // 1秒

        // Bubble class
        class Bubble {
            constructor() {
                this.radius = Math.random() * 20 + 25;
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = canvas.height + this.radius;
                this.speed = Math.random() * 1.5 + 0.5;
                this.hue = Math.random() * 360;
                this.alpha = Math.random() * 0.3 + 0.7;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = Math.random() * 0.05 + 0.02;
            }

            update() {
                this.y -= this.speed;
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 0.5;
            }

            draw() {
                // Main bubble
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 70%, 60%, ${this.alpha * 0.3})`;
                ctx.fill();

                // Highlight
                ctx.beginPath();
                ctx.arc(this.x - this.radius * 0.3, this.y - this.radius * 0.3, this.radius * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 70%, 80%, ${this.alpha})`;
                ctx.fill();

                // Border
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 70%, 70%, ${this.alpha * 0.5})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            isClicked(x, y) {
                const dx = this.x - x;
                const dy = this.y - y;
                return Math.sqrt(dx * dx + dy * dy) < this.radius;
            }

            isOffScreen() {
                return this.y < -this.radius;
            }
        }

        // Particle class (for pop effect)
        class Particle {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 5 + 2;
                this.speedX = (Math.random() - 0.5) * 8;
                this.speedY = (Math.random() - 0.5) * 8;
                this.hue = hue;
                this.alpha = 1;
                this.decay = Math.random() * 0.03 + 0.02;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += 0.2; // gravity
                this.alpha -= this.decay;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 70%, 60%, ${this.alpha})`;
                ctx.fill();
            }

            isDead() {
                return this.alpha <= 0;
            }
        }

        // Create pop effect
        function createPopEffect(x, y, hue) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, hue));
            }
        }

        // Show combo text
        function showCombo(x, y) {
            if (combo >= 3) {
                const comboEl = document.createElement('div');
                comboEl.className = 'combo';
                comboEl.textContent = `${combo} COMBO!`;
                comboEl.style.left = x + 'px';
                comboEl.style.top = y + 'px';
                document.body.appendChild(comboEl);

                setTimeout(() => {
                    comboEl.remove();
                }, 500);
            }
        }

        // Start game
        function startGame() {
            score = 0;
            timeLeft = 60;
            combo = 0;
            maxCombo = 0;
            gameRunning = true;
            bubbles = [];
            particles = [];

            document.getElementById('startOverlay').classList.remove('active');
            document.getElementById('gameOverlay').classList.remove('active');

            updateDisplay();
            gameLoop();

            // Timer
            const timer = setInterval(() => {
                if (!gameRunning) {
                    clearInterval(timer);
                    return;
                }

                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                    clearInterval(timer);
                }
            }, 1000);
        }

        // End game
        function endGame() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('maxCombo').textContent = maxCombo;
            document.getElementById('gameOverlay').classList.add('active');
        }

        // Update display
        function updateDisplay() {
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo + 'x';
        }

        // Handle click/tap
        function handleInput(x, y) {
            if (!gameRunning) return;

            const canvasRect = canvas.getBoundingClientRect();
            const canvasX = x - canvasRect.left;
            const canvasY = y - canvasRect.top;

            // Check bubbles (reverse to pop top bubbles first)
            for (let i = bubbles.length - 1; i >= 0; i--) {
                if (bubbles[i].isClicked(canvasX, canvasY)) {
                    const bubble = bubbles[i];

                    // Check combo
                    const now = Date.now();
                    if (now - lastPopTime < COMBO_TIMEOUT) {
                        combo++;
                    } else {
                        combo = 1;
                    }
                    lastPopTime = now;
                    maxCombo = Math.max(maxCombo, combo);

                    // Calculate score with combo bonus
                    const baseScore = 10;
                    const comboBonus = Math.min(combo, 10);
                    const bubbleBonus = Math.floor((50 - bubble.radius) / 2);
                    const points = baseScore + comboBonus + bubbleBonus;
                    score += points;

                    // Effects
                    createPopEffect(bubble.x, bubble.y, bubble.hue);
                    showCombo(x, y);

                    // Remove bubble
                    bubbles.splice(i, 1);

                    updateDisplay();
                    return;
                }
            }
        }

        canvas.addEventListener('click', (e) => {
            handleInput(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleInput(touch.clientX, touch.clientY);
        });

        // Game loop
        function gameLoop() {
            if (!gameRunning) return;

            // Clear canvas
            ctx.fillStyle = 'rgba(10, 10, 20, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Spawn bubbles
            if (Math.random() < 0.03 && bubbles.length < 15) {
                bubbles.push(new Bubble());
            }

            // Update and draw bubbles
            bubbles = bubbles.filter(bubble => !bubble.isOffScreen());
            bubbles.forEach(bubble => {
                bubble.update();
                bubble.draw();
            });

            // Update and draw particles
            particles = particles.filter(particle => !particle.isDead());
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            requestAnimationFrame(gameLoop);
        }

        // Fullscreen
        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        }

        // Show start screen
        document.getElementById('startOverlay').classList.add('active');
    </script>
</body>
</html>
