<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bubble Pop - 泡を割るゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }

        .header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            gap: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .game-container {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #gameCanvas {
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            font-weight: 300;
            text-align: center;
        }

        .overlay p {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 30px;
            text-align: center;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #00d4ff);
            color: #fff;
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(124, 58, 237, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 100;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .fullscreen-btn.active {
            background: rgba(124, 58, 237, 0.5);
        }

        .combo-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            font-weight: 700;
            color: #fbbf24;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.8);
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .combo-display.active {
            opacity: 1;
            animation: comboPop 0.3s ease;
        }

        @keyframes comboPop {
            0% { transform: translateX(-50%) scale(0.5); }
            50% { transform: translateX(-50%) scale(1.3); }
            100% { transform: translateX(-50%) scale(1); }
        }

        .score-popup {
            position: absolute;
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            pointer-events: none;
            animation: scorePopup 0.8s ease-out forwards;
        }

        @keyframes scorePopup {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px) scale(1.5);
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.2rem;
            }

            .stat-value {
                font-size: 1.2rem;
            }

            .overlay h2 {
                font-size: 2rem;
            }

            .game-container {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>💫 Bubble Pop</h1>
        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">時間</div>
                <div class="stat-value" id="timer">60</div>
            </div>
        </div>
    </header>

    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>

    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="combo-display" id="comboDisplay"></div>
    </div>

    <div class="overlay" id="startOverlay">
        <h2>🫧 Bubble Pop</h2>
        <p>泡をタップして割ろう！<br>連続で割るとコンボボーナス！</p>
        <button class="btn btn-primary" id="startBtn">ゲーム開始</button>
    </div>

    <div class="overlay hidden" id="gameOverOverlay">
        <h2>🎉 ゲーム終了！</h2>
        <p>最終スコア: <span id="finalScore">0</span></p>
        <p>最大コンボ: <span id="maxCombo">0</span></p>
        <button class="btn btn-primary" id="restartBtn">もう一度</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const comboDisplay = document.getElementById('comboDisplay');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScoreDisplay = document.getElementById('finalScore');
        const maxComboDisplay = document.getElementById('maxCombo');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let isFullscreen = false;
        let gameRunning = false;
        let score = 0;
        let timeLeft = 60;
        let combo = 0;
        let maxCombo = 0;
        let lastPopTime = 0;
        let bubbles = [];
        let particles = [];
        let gameLoop;
        let timerInterval;

        function resizeCanvas() {
            const container = document.querySelector('.game-container');
            const maxWidth = Math.min(600, window.innerWidth - 40);
            const maxHeight = isFullscreen ? window.innerHeight - 100 : window.innerHeight - 100;

            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }

        class Bubble {
            constructor() {
                this.radius = Math.random() * 30 + 25;
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = Math.random() * (canvas.height - this.radius * 2) + this.radius;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.hue = Math.random() * 360;
                this.alpha = 0.8;
                this.popped = false;
                this.growing = true;
                this.targetRadius = this.radius;
                this.radius = 0;
            }

            update() {
                if (this.growing) {
                    this.radius += 2;
                    if (this.radius >= this.targetRadius) {
                        this.growing = false;
                    }
                    return;
                }

                if (this.popped) return;

                this.x += this.vx;
                this.y += this.vy;

                if (this.x - this.radius < 0 || this.x + this.radius > canvas.width) {
                    this.vx *= -1;
                }
                if (this.y - this.radius < 0 || this.y + this.radius > canvas.height) {
                    this.vy *= -1;
                }

                this.hue = (this.hue + 0.5) % 360;
            }

            draw() {
                if (this.popped) return;

                ctx.save();
                ctx.globalAlpha = this.alpha;

                const gradient = ctx.createRadialGradient(
                    this.x - this.radius * 0.3, this.y - this.radius * 0.3, 0,
                    this.x, this.y, this.radius
                );

                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 85%, 1)`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 80%, 60%, 0.8)`);
                gradient.addColorStop(1, `hsla(${this.hue}, 70%, 40%, 0.3)`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = `hsla(${this.hue}, 70%, 70%, 0.5)`;
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.beginPath();
                ctx.arc(this.x - this.radius * 0.3, this.y - this.radius * 0.3, this.radius * 0.15, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }

            containsPoint(px, py) {
                const dx = px - this.x;
                const dy = py - this.y;
                return dx * dx + dy * dy <= this.radius * this.radius;
            }

            pop() {
                this.popped = true;

                for (let i = 0; i < 15; i++) {
                    particles.push(new Particle(this.x, this.y, this.hue));
                }
            }
        }

        class Particle {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.hue = hue;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.radius = Math.random() * 4 + 2;
                this.alpha = 1;
                this.decay = Math.random() * 0.03 + 0.02;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2;
                this.alpha -= this.decay;
            }

            draw() {
                if (this.alpha <= 0) return;

                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = `hsl(${this.hue}, 80%, 60%)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function createBubbles(count) {
            for (let i = 0; i < count; i++) {
                bubbles.push(new Bubble());
            }
        }

        function showCombo(x, y) {
            if (combo > 1) {
                comboDisplay.textContent = `${combo} COMBO!`;
                comboDisplay.classList.add('active');
                setTimeout(() => {
                    comboDisplay.classList.remove('active');
                }, 500);
            }
        }

        function showScorePopup(x, y, points) {
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.textContent = `+${points}`;
            popup.style.left = `${x}px`;
            popup.style.top = `${y}px`;
            document.querySelector('.game-container').appendChild(popup);

            setTimeout(() => {
                popup.remove();
            }, 800);
        }

        function handleClick(e) {
            if (!gameRunning) return;

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            let popped = false;

            for (let bubble of bubbles) {
                if (!bubble.popped && bubble.containsPoint(x, y)) {
                    const now = Date.now();
                    if (now - lastPopTime < 1000) {
                        combo++;
                    } else {
                        combo = 1;
                    }
                    lastPopTime = now;

                    if (combo > maxCombo) {
                        maxCombo = combo;
                    }

                    const basePoints = Math.floor(50 - bubble.radius);
                    const comboBonus = combo > 1 ? combo * 10 : 0;
                    const points = basePoints + comboBonus;

                    score += points;
                    scoreDisplay.textContent = score;

                    bubble.pop();
                    popped = true;

                    showCombo(e.clientX, e.clientY);
                    showScorePopup(e.clientX, e.clientY, points);

                    break;
                }
            }

            if (!popped) {
                combo = 0;
            }
        }

        function update() {
            if (!gameRunning) return;

            ctx.fillStyle = 'rgba(26, 26, 46, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let bubble of bubbles) {
                bubble.update();
                bubble.draw();
            }

            particles = particles.filter(p => p.alpha > 0);
            for (let particle of particles) {
                particle.update();
                particle.draw();
            }

            if (bubbles.filter(b => !b.popped && !b.growing).length < 5) {
                createBubbles(3);
            }

            requestAnimationFrame(update);
        }

        function startGame() {
            score = 0;
            timeLeft = 60;
            combo = 0;
            maxCombo = 0;
            bubbles = [];
            particles = [];

            scoreDisplay.textContent = score;
            timerDisplay.textContent = timeLeft;

            createBubbles(10);

            startOverlay.classList.add('hidden');
            gameOverOverlay.classList.add('hidden');

            gameRunning = true;

            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            update();
        }

        function endGame() {
            gameRunning = false;
            clearInterval(timerInterval);

            finalScoreDisplay.textContent = score;
            maxComboDisplay.textContent = maxCombo;

            gameOverOverlay.classList.remove('hidden');
        }

        function toggleFullscreen() {
            isFullscreen = !isFullscreen;

            if (isFullscreen) {
                document.documentElement.requestFullscreen?.() ||
                document.documentElement.webkitRequestFullscreen?.();
                fullscreenBtn.textContent = '解除';
                fullscreenBtn.classList.add('active');
            } else {
                document.exitFullscreen?.() ||
                document.webkitExitFullscreen?.();
                fullscreenBtn.textContent = '全画面';
                fullscreenBtn.classList.remove('active');
            }

            setTimeout(() => {
                resizeCanvas();
            }, 100);
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);
        fullscreenBtn.addEventListener('click', toggleFullscreen);
        canvas.addEventListener('click', handleClick);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick(e);
        });

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                isFullscreen = false;
                fullscreenBtn.textContent = '全画面';
                fullscreenBtn.classList.remove('active');
                resizeCanvas();
            }
        });

        window.addEventListener('resize', resizeCanvas);

        resizeCanvas();
    </script>
</body>
</html>
