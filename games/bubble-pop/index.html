<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Pop - バブルポップ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation;
        }
        canvas {
            display: block;
        }
        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }
        #combo {
            position: fixed;
            top: 20px;
            right: 20px;
            color: #ffd700;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }
        #start-screen, #game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }
        #start-screen h1, #game-over h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        #start-screen p, #game-over p {
            font-size: 18px;
            margin-bottom: 30px;
        }
        .btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: scale(1.1);
        }
        .hidden {
            display: none !important;
        }
        #fullscreen {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 8px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 14px;
            z-index: 50;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="ui">
        <div>Score: <span id="score">0</span></div>
    </div>
    <div id="combo">
        Combo: <span id="combo-count">0</span>x
    </div>
    <button id="fullscreen">全画面</button>

    <div id="start-screen">
        <h1>🫧 Bubble Pop</h1>
        <p>浮かぶバブルをタップして割ろう！</p>
        <button class="btn" id="start-btn">スタート</button>
    </div>

    <div id="game-over" class="hidden">
        <h1>Game Over</h1>
        <p>Score: <span id="final-score">0</span></p>
        <button class="btn" id="restart-btn">もう一度</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        let score = 0;
        let combo = 0;
        let comboTimer = 0;
        let gameRunning = false;
        let bubbles = [];
        let particles = [];
        let bubbleSpawnRate = 60;
        let frameCount = 0;

        // バブルクラス
        class Bubble {
            constructor() {
                this.radius = 30 + Math.random() * 30;
                this.x = Math.random() * (width - this.radius * 2) + this.radius;
                this.y = height + this.radius;
                this.speedY = 1 + Math.random() * 2;
                this.speedX = (Math.random() - 0.5) * 2;
                this.opacity = 0.7 + Math.random() * 0.3;
                this.hue = Math.random() * 360;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.05 + Math.random() * 0.05;
            }

            update() {
                this.y -= this.speedY;
                this.x += this.speedX + Math.sin(this.wobble) * 0.5;
                this.wobble += this.wobbleSpeed;

                // 壁で反転
                if (this.x < this.radius || this.x > width - this.radius) {
                    this.speedX *= -1;
                }
            }

            draw() {
                const gradient = ctx.createRadialGradient(
                    this.x - this.radius * 0.3,
                    this.y - this.radius * 0.3,
                    0,
                    this.x,
                    this.y,
                    this.radius
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 80%, ${this.opacity})`);
                gradient.addColorStop(0.7, `hsla(${this.hue}, 70%, 60%, ${this.opacity})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 60%, 40%, ${this.opacity * 0.8})`);

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // ハイライト
                ctx.beginPath();
                ctx.arc(this.x - this.radius * 0.3, this.y - this.radius * 0.3, this.radius * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity * 0.8})`;
                ctx.fill();
            }

            isOffScreen() {
                return this.y < -this.radius;
            }

            contains(x, y) {
                const dx = x - this.x;
                const dy = y - this.y;
                return dx * dx + dy * dy < this.radius * this.radius;
            }
        }

        // パーティクルクラス
        class Particle {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.size = 3 + Math.random() * 5;
                this.speedX = (Math.random() - 0.5) * 8;
                this.speedY = (Math.random() - 0.5) * 8;
                this.hue = hue;
                this.opacity = 1;
                this.decay = 0.02 + Math.random() * 0.02;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += 0.1;
                this.opacity -= this.decay;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${this.opacity})`;
                ctx.fill();
            }

            isDead() {
                return this.opacity <= 0;
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function spawnBubble() {
            bubbles.push(new Bubble());
        }

        function createParticles(x, y, hue) {
            for (let i = 0; i < 10; i++) {
                particles.push(new Particle(x, y, hue));
            }
        }

        function updateScore(points) {
            score += points;
            combo++;
            comboTimer = 60;
            document.getElementById('score').textContent = score;
            document.getElementById('combo-count').textContent = combo;
        }

        function resetCombo() {
            combo = 0;
            document.getElementById('combo-count').textContent = combo;
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('final-score').textContent = score;
            document.getElementById('game-over').classList.remove('hidden');
        }

        function startGame() {
            score = 0;
            combo = 0;
            comboTimer = 0;
            bubbles = [];
            particles = [];
            bubbleSpawnRate = 60;
            gameRunning = true;
            frameCount = 0;

            document.getElementById('score').textContent = 0;
            document.getElementById('combo-count').textContent = 0;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over').classList.add('hidden');
        }

        function animate() {
            if (!gameRunning) {
                requestAnimationFrame(animate);
                return;
            }

            ctx.clearRect(0, 0, width, height);

            frameCount++;

            // 難易度上昇
            if (frameCount % 600 === 0 && bubbleSpawnRate > 20) {
                bubbleSpawnRate -= 5;
            }

            // バブル生成
            if (frameCount % bubbleSpawnRate === 0) {
                spawnBubble();
            }

            // コンボタイマー
            if (comboTimer > 0) {
                comboTimer--;
                if (comboTimer === 0) {
                    resetCombo();
                }
            }

            // バブル更新・描画
            bubbles = bubbles.filter(bubble => {
                bubble.update();
                bubble.draw();

                if (bubble.isOffScreen()) {
                    resetCombo();
                    return false;
                }
                return true;
            });

            // パーティクル更新・描画
            particles = particles.filter(particle => {
                particle.update();
                particle.draw();
                return !particle.isDead();
            });

            requestAnimationFrame(animate);
        }

        function handleClick(x, y) {
            if (!gameRunning) return;

            for (let i = bubbles.length - 1; i >= 0; i--) {
                if (bubbles[i].contains(x, y)) {
                    const bubble = bubbles[i];
                    createParticles(bubble.x, bubble.y, bubble.hue);
                    const basePoints = Math.floor(100 / bubble.radius * 10);
                    updateScore(basePoints * (1 + combo * 0.1));
                    bubbles.splice(i, 1);
                    return;
                }
            }
        }

        // イベントリスナー
        window.addEventListener('resize', resize);

        canvas.addEventListener('click', (e) => {
            handleClick(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleClick(touch.clientX, touch.clientY);
        });

        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', startGame);

        document.getElementById('fullscreen').addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // 初期化
        resize();
        animate();
    </script>
</body>
</html>
