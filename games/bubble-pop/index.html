<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bubble Pop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            cursor: pointer;
        }

        .ui {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 100;
        }

        .score-panel, .time-panel {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .score-panel span, .time-panel span {
            font-size: 32px;
            color: #ffd700;
        }

        .start-screen, .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(5px);
        }

        .start-screen h1, .game-over-screen h1 {
            font-size: 48px;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        .game-over-screen h2 {
            font-size: 36px;
            color: #ffd700;
            margin-bottom: 20px;
        }

        .start-btn {
            padding: 20px 60px;
            font-size: 24px;
            background: linear-gradient(135deg, #00ff88, #00ffff);
            border: none;
            border-radius: 50px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
        }

        .start-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(0, 255, 136, 0.5);
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        .hidden {
            display: none !important;
        }

        .instructions {
            color: #fff;
            margin-top: 30px;
            font-size: 18px;
            text-align: center;
            line-height: 1.8;
            opacity: 0.8;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .combo-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            pointer-events: none;
            z-index: 150;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .combo-display.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="ui">
        <div class="score-panel">Score: <span id="score">0</span></div>
        <div class="time-panel">Time: <span id="time">60</span></div>
    </div>

    <div class="combo-display" id="combo"></div>

    <canvas id="gameCanvas"></canvas>

    <div class="start-screen" id="startScreen">
        <h1>🫧 Bubble Pop</h1>
        <button class="start-btn" onclick="startGame()">スタート</button>
        <div class="instructions">
            泡をタップして割ろう！<br>
            連続で割るとコンボボーナス<br>
            制限時間60秒でハイスコアを目指せ
        </div>
    </div>

    <div class="game-over-screen hidden" id="gameOverScreen">
        <h1>Game Over!</h1>
        <h2>Score: <span id="finalScore">0</span></h2>
        <button class="start-btn" onclick="restartGame()">もう一度</button>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let bubbles = [];
        let particles = [];
        let score = 0;
        let timeLeft = 60;
        let gameRunning = false;
        let combo = 0;
        let lastPopTime = 0;
        let animationId;
        let timerInterval;

        const COLORS = [
            '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A',
            '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E2'
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Bubble {
            constructor() {
                this.reset();
            }

            reset() {
                this.radius = Math.random() * 30 + 30;
                this.x = Math.random() * (width - this.radius * 2) + this.radius;
                this.y = Math.random() * (height - this.radius * 2) + this.radius;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                this.alpha = 0.8;
                this.pulse = Math.random() * Math.PI * 2;
                this.popScale = 1;
                this.popping = false;
            }

            update() {
                if (this.popping) {
                    this.popScale += 0.1;
                    this.alpha -= 0.1;
                    return this.alpha > 0;
                }

                this.x += this.speedX;
                this.y += this.speedY;
                this.pulse += 0.05;

                // 壁との衝突
                if (this.x - this.radius < 0 || this.x + this.radius > width) {
                    this.speedX *= -1;
                    this.x = Math.max(this.radius, Math.min(width - this.radius, this.x));
                }
                if (this.y - this.radius < 0 || this.y + this.radius > height) {
                    this.speedY *= -1;
                    this.y = Math.max(this.radius, Math.min(height - this.radius, this.y));
                }

                // 脈動効果
                const pulseScale = 1 + Math.sin(this.pulse) * 0.1;
                this.currentRadius = this.radius * pulseScale;

                return true;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;

                const drawRadius = this.radius * this.popScale;

                // グラデーション
                const gradient = ctx.createRadialGradient(
                    this.x - drawRadius * 0.3,
                    this.y - drawRadius * 0.3,
                    0,
                    this.x,
                    this.y,
                    drawRadius
                );
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                gradient.addColorStop(0.5, this.color);
                gradient.addColorStop(1, this.color);

                // 泡
                ctx.beginPath();
                ctx.arc(this.x, this.y, drawRadius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // ハイライト
                ctx.beginPath();
                ctx.arc(
                    this.x - drawRadius * 0.3,
                    this.y - drawRadius * 0.3,
                    drawRadius * 0.2,
                    0,
                    Math.PI * 2
                );
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.fill();

                ctx.restore();
            }

            pop() {
                this.popping = true;
                // パーティクル生成
                for (let i = 0; i < 10; i++) {
                    particles.push(new Particle(this.x, this.y, this.color));
                }
            }

            contains(x, y) {
                const dx = this.x - x;
                const dy = this.y - y;
                return Math.sqrt(dx * dx + dy * dy) < this.radius;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.speedX = (Math.random() - 0.5) * 8;
                this.speedY = (Math.random() - 0.5) * 8;
                this.radius = Math.random() * 5 + 2;
                this.alpha = 1;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += 0.2; // 重力
                this.alpha -= 0.02;
                return this.alpha > 0;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function init() {
            bubbles = [];
            const bubbleCount = Math.floor((width * height) / 50000);
            for (let i = 0; i < Math.max(8, bubbleCount); i++) {
                bubbles.push(new Bubble());
            }
        }

        function animate() {
            if (!gameRunning) return;

            // クリア
            ctx.clearRect(0, 0, width, height);

            // 泡の更新と描画
            bubbles = bubbles.filter(b => {
                const alive = b.update();
                if (alive) b.draw();
                return alive;
            });

            // 新しい泡を追加
            if (bubbles.length < 8) {
                bubbles.push(new Bubble());
            }

            // パーティクルの更新と描画
            particles = particles.filter(p => {
                const alive = p.update();
                if (alive) p.draw();
                return alive;
            });

            animationId = requestAnimationFrame(animate);
        }

        function handleClick(e) {
            if (!gameRunning) return;

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            for (let i = bubbles.length - 1; i >= 0; i--) {
                const bubble = bubbles[i];
                if (!bubble.popping && bubble.contains(x, y)) {
                    bubble.pop();

                    // コンボ計算
                    const now = Date.now();
                    if (now - lastPopTime < 1000) {
                        combo++;
                    } else {
                        combo = 1;
                    }
                    lastPopTime = now;

                    // スコア計算
                    const basePoints = Math.floor(100 - bubble.radius);
                    const comboBonus = Math.floor(basePoints * combo * 0.5);
                    const points = basePoints + comboBonus;
                    score += points;

                    // コンボ表示
                    if (combo >= 2) {
                        showCombo(combo);
                    }

                    updateScore();
                    break;
                }
            }
        }

        function showCombo(count) {
            const comboEl = document.getElementById('combo');
            comboEl.textContent = `${count} COMBO!`;
            comboEl.classList.add('show');
            setTimeout(() => comboEl.classList.remove('show'), 500);
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        function updateTime() {
            timeLeft--;
            document.getElementById('time').textContent = timeLeft;

            if (timeLeft <= 0) {
                endGame();
            }
        }

        function startGame() {
            score = 0;
            timeLeft = 60;
            combo = 0;
            gameRunning = true;

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');

            updateScore();
            document.getElementById('time').textContent = timeLeft;

            init();
            animate();

            timerInterval = setInterval(updateTime, 1000);
        }

        function endGame() {
            gameRunning = false;
            clearInterval(timerInterval);
            cancelAnimationFrame(animationId);

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        function restartGame() {
            startGame();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        window.addEventListener('resize', () => {
            resize();
            if (!gameRunning) init();
        });

        canvas.addEventListener('click', handleClick);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick(e);
        }, { passive: false });

        // 初期化
        resize();
        init();
    </script>
</body>
</html>
