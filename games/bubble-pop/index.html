<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Bubble Pop Challenge | Mira's Games</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      touch-action: manipulation;
    }

    #gameCanvas {
      display: block;
      touch-action: none;
    }

    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
      z-index: 10;
    }

    .stat {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      padding: 12px 20px;
      border-radius: 12px;
      color: white;
      font-size: 18px;
      font-weight: bold;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    #startScreen, #gameOverScreen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    #gameOverScreen {
      display: none;
    }

    h1 {
      color: white;
      font-size: 48px;
      margin-bottom: 20px;
      text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    p {
      color: rgba(255, 255, 255, 0.9);
      font-size: 18px;
      margin-bottom: 30px;
      text-align: center;
      max-width: 400px;
    }

    button {
      padding: 16px 48px;
      font-size: 20px;
      font-weight: bold;
      color: white;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(245, 87, 108, 0.6);
    }

    button:active {
      transform: scale(0.95);
    }

    .hidden {
      display: none !important;
    }

    #fullscreenBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
      z-index: 10;
    }

    #fullscreenBtn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="ui">
    <div class="stat">スコア: <span id="score">0</span></div>
    <div class="stat">時間: <span id="timer">30</span>s</div>
  </div>

  <div id="startScreen">
    <h1>🫧 Bubble Pop</h1>
    <p>泡をタップして割ろう！<br>小さい泡ほど高得点</p>
    <button id="startBtn">スタート</button>
  </div>

  <div id="gameOverScreen">
    <h1>終了！</h1>
    <p>スコア: <span id="finalScore">0</span></p>
    <button id="restartBtn">もう一度</button>
  </div>

  <button id="fullscreenBtn">🔲 全画面</button>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // ゲーム状態
    let score = 0;
    let timeLeft = 30;
    let gameRunning = false;
    let bubbles = [];
    let particles = [];
    let gameLoop;
    let timerInterval;

    // キャンバスサイズ設定
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // 泡クラス
    class Bubble {
      constructor() {
        this.radius = Math.random() * 40 + 20;
        this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
        this.y = canvas.height + this.radius;
        this.speed = Math.random() * 2 + 1;
        this.wobble = Math.random() * Math.PI * 2;
        this.wobbleSpeed = Math.random() * 0.05 + 0.02;
        this.hue = Math.random() * 60 + 180; // 青〜紫
        this.alpha = 0;
        this.fadingIn = true;
      }

      update() {
        this.y -= this.speed;
        this.wobble += this.wobbleSpeed;

        // フェードイン
        if (this.fadingIn) {
          this.alpha += 0.02;
          if (this.alpha >= 0.7) {
            this.alpha = 0.7;
            this.fadingIn = false;
          }
        }
      }

      draw() {
        const wobbleX = Math.sin(this.wobble) * 5;

        // 泡の本体
        const gradient = ctx.createRadialGradient(
          this.x - this.radius * 0.3 + wobbleX,
          this.y - this.radius * 0.3,
          0,
          this.x + wobbleX,
          this.y,
          this.radius
        );

        gradient.addColorStop(0, `hsla(${this.hue}, 80%, 80%, ${this.alpha})`);
        gradient.addColorStop(0.5, `hsla(${this.hue}, 70%, 60%, ${this.alpha * 0.8})`);
        gradient.addColorStop(1, `hsla(${this.hue}, 60%, 40%, ${this.alpha * 0.6})`);

        ctx.beginPath();
        ctx.arc(this.x + wobbleX, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();

        // ハイライト
        ctx.beginPath();
        ctx.arc(
          this.x - this.radius * 0.3 + wobbleX,
          this.y - this.radius * 0.3,
          this.radius * 0.2,
          0,
          Math.PI * 2
        );
        ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha * 0.8})`;
        ctx.fill();
      }

      contains(px, py) {
        const wobbleX = Math.sin(this.wobble) * 5;
        const dx = px - (this.x + wobbleX);
        const dy = py - this.y;
        return Math.sqrt(dx * dx + dy * dy) < this.radius;
      }

      isOffScreen() {
        return this.y < -this.radius * 2;
      }

      getPoints() {
        // 小さい泡ほど高得点
        return Math.floor((60 - this.radius) * 2);
      }
    }

    // パーティクルクラス（泡が割れた時のエフェクト）
    class Particle {
      constructor(x, y, hue) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8;
        this.radius = Math.random() * 4 + 2;
        this.hue = hue;
        this.alpha = 1;
        this.decay = Math.random() * 0.02 + 0.02;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.2; // 重力
        this.alpha -= this.decay;
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue}, 80%, 70%, ${this.alpha})`;
        ctx.fill();
      }

      isDead() {
        return this.alpha <= 0;
      }
    }

    // 泡をスポーン
    function spawnBubble() {
      if (gameRunning && bubbles.length < 15) {
        bubbles.push(new Bubble());
      }
    }

    // ゲームループ
    function update() {
      // 背景
      ctx.fillStyle = 'rgba(102, 126, 234, 0.2)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 泡を更新・描画
      bubbles = bubbles.filter(bubble => {
        bubble.update();
        bubble.draw();
        return !bubble.isOffScreen();
      });

      // パーティクルを更新・描画
      particles = particles.filter(particle => {
        particle.update();
        particle.draw();
        return !particle.isDead();
      });

      if (gameRunning) {
        gameLoop = requestAnimationFrame(update);
      }
    }

    // タップ/クリック処理
    function handleTap(x, y) {
      if (!gameRunning) return;

      for (let i = bubbles.length - 1; i >= 0; i--) {
        if (bubbles[i].contains(x, y)) {
          // スコア加算
          const points = bubbles[i].getPoints();
          score += points;
          document.getElementById('score').textContent = score;

          // パーティクルエフェクト
          for (let j = 0; j < 10; j++) {
            particles.push(new Particle(
              bubbles[i].x + Math.sin(bubbles[i].wobble) * 5,
              bubbles[i].y,
              bubbles[i].hue
            ));
          }

          // 泡を削除
          bubbles.splice(i, 1);
          break;
        }
      }
    }

    canvas.addEventListener('click', (e) => {
      handleTap(e.clientX, e.clientY);
    });

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      handleTap(touch.clientX, touch.clientY);
    });

    // ゲーム開始
    function startGame() {
      score = 0;
      timeLeft = 30;
      bubbles = [];
      particles = [];
      gameRunning = true;

      document.getElementById('score').textContent = score;
      document.getElementById('timer').textContent = timeLeft;
      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('gameOverScreen').classList.add('hidden');

      // タイマー
      timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').textContent = timeLeft;

        if (timeLeft <= 0) {
          endGame();
        }
      }, 1000);

      // 泡のスポーン
      const spawnInterval = setInterval(() => {
        if (!gameRunning) {
          clearInterval(spawnInterval);
          return;
        }
        spawnBubble();
      }, 500);

      update();
    }

    // ゲーム終了
    function endGame() {
      gameRunning = false;
      clearInterval(timerInterval);
      cancelAnimationFrame(gameLoop);

      document.getElementById('finalScore').textContent = score;
      document.getElementById('gameOverScreen').classList.remove('hidden');
      document.getElementById('gameOverScreen').style.display = 'flex';
    }

    // ボタンイベント
    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', startGame);

    // 全画面ボタン
    document.getElementById('fullscreenBtn').addEventListener('click', () => {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        document.documentElement.requestFullscreen();
      }
    });
  </script>
</body>
</html>
