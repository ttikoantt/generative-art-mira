<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Pop - バブルポップ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: none;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 18px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 25px;
            border-radius: 15px;
            z-index: 10;
        }

        .ui div {
            margin: 5px 0;
        }

        .score {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
        }

        .combo {
            font-size: 22px;
            color: #ff6b6b;
            font-weight: bold;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
            display: none;
        }

        .game-over h1 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #ff6b6b;
        }

        .game-over p {
            font-size: 24px;
            margin: 10px 0;
        }

        .game-over button {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 20px;
            background: #667eea;
            border: none;
            color: #fff;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .game-over button:hover {
            background: #764ba2;
            transform: scale(1.05);
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.1);
        }

        .start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
        }

        .start-screen h1 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #667eea;
        }

        .start-screen p {
            font-size: 18px;
            margin: 10px 0;
            line-height: 1.6;
        }

        .start-screen button {
            margin-top: 25px;
            padding: 15px 50px;
            font-size: 22px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: #fff;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .start-screen button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="ui" id="ui" style="display: none;">
        <div class="score">スコア: <span id="score">0</span></div>
        <div class="combo">コンボ: <span id="combo">0</span>x</div>
        <div>残り: <span id="remaining">0</span></div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="start-screen" id="startScreen">
        <h1>🫧 Bubble Pop</h1>
        <p>バブルをタップして割ろう！</p>
        <p>• 連続で割るとコンボボーナス</p>
        <p>• 全て割るとクリア</p>
        <p>• 制限時間以内にクリアしよう</p>
        <button onclick="startGame()">▶ スタート</button>
    </div>

    <div class="game-over" id="gameOver">
        <h1 id="resultTitle">ゲームオーバー</h1>
        <p>スコア: <span id="finalScore">0</span></p>
        <p>最大コンボ: <span id="maxCombo">0</span></p>
        <button onclick="startGame()">🔄 再プレイ</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let bubbles = [];
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let gameActive = false;
        let timeLeft = 60;
        let lastPopTime = 0;
        let comboTimeout = 1500;
        let particles = [];

        const colors = [
            '#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3',
            '#54a0ff', '#5f27cd', '#00d2d3', '#ff9f43',
            '#10ac84', '#ee5a6f', '#c56cf0', '#ff6348'
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Bubble {
            constructor(x, y, radius) {
                this.x = x || Math.random() * (width - 100) + 50;
                this.y = y || Math.random() * (height - 200) + 100;
                this.radius = radius || 30 + Math.random() * 30;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.alpha = 0.6 + Math.random() * 0.3;
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.02 + Math.random() * 0.02;
                this.dx = (Math.random() - 0.5) * 0.5;
                this.dy = (Math.random() - 0.5) * 0.5;
                this.wobble = 0;
                this.wobbleSpeed = 0.05 + Math.random() * 0.05;
            }

            update() {
                this.pulsePhase += this.pulseSpeed;
                this.wobble += this.wobbleSpeed;

                this.x += this.dx;
                this.y += this.dy;

                // 壁で跳ね返る
                if (this.x - this.radius < 0 || this.x + this.radius > width) {
                    this.dx *= -1;
                }
                if (this.y - this.radius < 0 || this.y + this.radius > height) {
                    this.dy *= -1;
                }
            }

            draw() {
                const pulse = 1 + Math.sin(this.pulsePhase) * 0.05;
                const currentRadius = this.radius * pulse;

                // バブルの影
                ctx.beginPath();
                ctx.arc(this.x + 5, this.y + 5, currentRadius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                ctx.fill();

                // バブル本体
                const gradient = ctx.createRadialGradient(
                    this.x - currentRadius * 0.3, this.y - currentRadius * 0.3, 0,
                    this.x, this.y, currentRadius
                );
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                gradient.addColorStop(0.3, this.color);
                gradient.addColorStop(1, this.color);

                ctx.beginPath();
                ctx.arc(this.x, this.y, currentRadius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.globalAlpha = this.alpha;
                ctx.fill();

                // ハイライト
                ctx.beginPath();
                ctx.arc(
                    this.x - currentRadius * 0.3,
                    this.y - currentRadius * 0.3,
                    currentRadius * 0.2,
                    0, Math.PI * 2
                );
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.globalAlpha = 1;
                ctx.fill();

                ctx.globalAlpha = 1;
            }

            contains(x, y) {
                const dist = Math.sqrt((x - this.x) ** 2 + (y - this.y) ** 2);
                return dist < this.radius;
            }
        }

        class PopParticle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = 3 + Math.random() * 5;
                this.dx = (Math.random() - 0.5) * 10;
                this.dy = (Math.random() - 0.5) * 10;
                this.alpha = 1;
                this.decay = 0.02 + Math.random() * 0.02;
            }

            update() {
                this.x += this.dx;
                this.y += this.dy;
                this.dy += 0.2;
                this.alpha -= this.decay;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.alpha;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function initBubbles() {
            bubbles = [];
            const bubbleCount = Math.floor((width * height) / 25000);
            for (let i = 0; i < bubbleCount; i++) {
                let bubble;
                let overlapping = true;
                let attempts = 0;

                while (overlapping && attempts < 50) {
                    bubble = new Bubble();
                    overlapping = false;

                    for (const b of bubbles) {
                        const dist = Math.sqrt(
                            (bubble.x - b.x) ** 2 + (bubble.y - b.y) ** 2
                        );
                        if (dist < bubble.radius + b.radius + 10) {
                            overlapping = true;
                            break;
                        }
                    }
                    attempts++;
                }

                if (!overlapping) {
                    bubbles.push(bubble);
                }
            }
        }

        function popBubble(bubble, index) {
            // パーティクルを生成
            for (let i = 0; i < 15; i++) {
                particles.push(new PopParticle(bubble.x, bubble.y, bubble.color));
            }

            bubbles.splice(index, 1);

            // スコア計算
            const now = Date.now();
            if (now - lastPopTime < comboTimeout) {
                combo++;
            } else {
                combo = 1;
            }
            lastPopTime = now;

            if (combo > maxCombo) {
                maxCombo = combo;
            }

            const baseScore = Math.floor(bubble.radius);
            const comboBonus = Math.floor(baseScore * combo * 0.5);
            score += baseScore + comboBonus;

            updateUI();
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;
            document.getElementById('remaining').textContent = bubbles.length;
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);

            if (gameActive) {
                bubbles.forEach(b => {
                    b.update();
                    b.draw();
                });

                particles = particles.filter(p => p.alpha > 0);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });

                if (bubbles.length === 0) {
                    endGame(true);
                }
            }

            requestAnimationFrame(animate);
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('ui').style.display = 'block';

            score = 0;
            combo = 0;
            maxCombo = 0;
            timeLeft = 60;
            gameActive = true;
            particles = [];

            initBubbles();
            updateUI();
            animate();
        }

        function endGame(won) {
            gameActive = false;
            document.getElementById('gameOver').style.display = 'block';
            document.getElementById('resultTitle').textContent = won ? '🎉 クリア！' : 'ゲームオーバー';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('maxCombo').textContent = maxCombo;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        canvas.addEventListener('click', (e) => {
            if (!gameActive) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            for (let i = bubbles.length - 1; i >= 0; i--) {
                if (bubbles[i].contains(x, y)) {
                    popBubble(bubbles[i], i);
                    break;
                }
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            if (!gameActive) return;
            e.preventDefault();

            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;

            for (let i = bubbles.length - 1; i >= 0; i--) {
                if (bubbles[i].contains(x, y)) {
                    popBubble(bubbles[i], i);
                    break;
                }
            }
        });

        window.addEventListener('resize', () => {
            resize();
            if (gameActive) {
                initBubbles();
                updateUI();
            }
        });

        // 初期化
        resize();
    </script>
</body>
</html>
