<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Pop - バブル崩しゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #gameCanvas {
            display: block;
            cursor: crosshair;
        }

        .hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            z-index: 100;
        }

        .hud-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hud-label {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 4px;
        }

        .hud-value {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .timer {
            color: #ffd700;
        }

        .timer.warning {
            color: #ff6b6b;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .start-screen, .end-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 200;
        }

        .start-screen.hidden, .end-screen.hidden {
            display: none;
        }

        .title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ff6b9d, #c44cff, #4cc9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 18px;
            opacity: 0.8;
            margin-bottom: 40px;
        }

        .final-score {
            font-size: 64px;
            font-weight: bold;
            color: #ffd700;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .btn {
            background: linear-gradient(45deg, #ff6b9d, #c44cff);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.4);
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.6);
        }

        .fullscreen-btn {
            position: fixed;
            top: 80px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            backdrop-filter: blur(10px);
            z-index: 100;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 768px) {
            .title {
                font-size: 32px;
            }

            .subtitle {
                font-size: 14px;
            }

            .hud-value {
                font-size: 18px;
            }

            .final-score {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="hud">
        <div class="hud-item">
            <span class="hud-label">スコア</span>
            <span class="hud-value" id="score">0</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">残り時間</span>
            <span class="hud-value timer" id="timer">60</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">コンボ</span>
            <span class="hud-value" id="combo">0</span>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <canvas id="gameCanvas"></canvas>

    <div class="start-screen" id="startScreen">
        <div class="title">🫧 Bubble Pop</div>
        <div class="subtitle">バブルをクリックして割ろう！</div>
        <button class="btn" onclick="startGame()">ゲーム開始</button>
    </div>

    <div class="end-screen hidden" id="endScreen">
        <div class="title">ゲーム終了！</div>
        <div class="final-score" id="finalScore">0</div>
        <div class="subtitle">スコア</div>
        <button class="btn" onclick="startGame()">もう一度プレイ</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let bubbles = [];
        let score = 0;
        let combo = 0;
        let lastPopTime = 0;
        let timeLeft = 60;
        let gameRunning = false;
        let gameTimer;
        let spawnTimer;

        const COLORS = [
            { main: '#ff6b9d', light: '#ff99c8', dark: '#cc4477' },
            { main: '#c44cff', light: '#d980ff', dark: '#9933cc' },
            { main: '#4cc9ff', light: '#80ddff', dark: '#3399cc' },
            { main: '#69ff9d', light: '#9dffbf', dark: '#44cc77' },
            { main: '#ffd700', light: '#ffe44d', dark: '#ccaa00' }
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Bubble {
            constructor() {
                this.radius = 25 + Math.random() * 35;
                this.x = this.radius + Math.random() * (width - this.radius * 2);
                this.y = height + this.radius;
                this.speedY = 1 + Math.random() * 2;
                this.speedX = (Math.random() - 0.5) * 2;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.02 + Math.random() * 0.03;
                this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                this.alpha = 0.8 + Math.random() * 0.2;
                this.points = Math.floor(60 - this.radius);
                this.popped = false;
                this.popAnimation = 0;
                this.popParticles = [];
            }

            update() {
                if (this.popped) {
                    this.popAnimation += 0.1;
                    return this.popAnimation < 1;
                }

                this.y -= this.speedY;
                this.x += this.speedX + Math.sin(this.wobble) * 0.5;
                this.wobble += this.wobbleSpeed;

                return this.y > -this.radius * 2;
            }

            draw(ctx) {
                if (this.popped) {
                    // 破裂エフェクト
                    for (const p of this.popParticles) {
                        p.x += p.vx;
                        p.y += p.vy;
                        p.vy += 0.1;
                        p.life -= 0.02;

                        if (p.life > 0) {
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                            ctx.fillStyle = `rgba(255, 255, 255, ${p.life * 0.8})`;
                            ctx.fill();
                        }
                    }
                    return this.popParticles.filter(p => p.life > 0).length > 0;
                }

                // バブルの本体
                const gradient = ctx.createRadialGradient(
                    this.x - this.radius * 0.3,
                    this.y - this.radius * 0.3,
                    0,
                    this.x,
                    this.y,
                    this.radius
                );
                gradient.addColorStop(0, this.color.light);
                gradient.addColorStop(0.5, this.color.main);
                gradient.addColorStop(1, this.color.dark);

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.globalAlpha = this.alpha;
                ctx.fill();
                ctx.globalAlpha = 1;

                // ハイライト
                ctx.beginPath();
                ctx.arc(
                    this.x - this.radius * 0.3,
                    this.y - this.radius * 0.3,
                    this.radius * 0.2,
                    0,
                    Math.PI * 2
                );
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.fill();

                // 小さいハイライト
                ctx.beginPath();
                ctx.arc(
                    this.x - this.radius * 0.15,
                    this.y - this.radius * 0.5,
                    this.radius * 0.08,
                    0,
                    Math.PI * 2
                );
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.fill();

                // ポイント表示
                if (this.points > 0) {
                    ctx.fillStyle = 'white';
                    ctx.font = `bold ${this.radius * 0.5}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.points, this.x, this.y);
                }
            }

            pop() {
                this.popped = true;

                // パーティクルを作成
                for (let i = 0; i < 12; i++) {
                    const angle = (i / 12) * Math.PI * 2;
                    this.popParticles.push({
                        x: this.x,
                        y: this.y,
                        vx: Math.cos(angle) * (3 + Math.random() * 3),
                        vy: Math.sin(angle) * (3 + Math.random() * 3),
                        size: 3 + Math.random() * 5,
                        life: 1
                    });
                }

                // スコア計算
                const now = Date.now();
                if (now - lastPopTime < 1000) {
                    combo++;
                } else {
                    combo = 1;
                }
                lastPopTime = now;

                const comboMultiplier = Math.min(combo, 10);
                const points = this.points * comboMultiplier;
                score += points;

                updateHUD();
            }

            containsPoint(px, py) {
                if (this.popped) return false;
                const dx = px - this.x;
                const dy = py - this.y;
                return dx * dx + dy * dy < this.radius * this.radius;
            }
        }

        function spawnBubble() {
            if (!gameRunning) return;
            bubbles.push(new Bubble());
        }

        function updateHUD() {
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;

            const timerEl = document.getElementById('timer');
            timerEl.textContent = timeLeft;

            if (timeLeft <= 10) {
                timerEl.classList.add('warning');
            } else {
                timerEl.classList.remove('warning');
            }
        }

        function animate() {
            // 背景をクリア
            ctx.fillStyle = 'rgba(102, 126, 234, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // バブルを更新・描画
            bubbles = bubbles.filter(bubble => {
                const alive = bubble.update();
                if (alive) {
                    bubble.draw(ctx);
                }
                return alive;
            });

            if (gameRunning) {
                requestAnimationFrame(animate);
            }
        }

        function handleClick(e) {
            if (!gameRunning) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // 逆順でチェック（上のバブルから）
            for (let i = bubbles.length - 1; i >= 0; i--) {
                if (bubbles[i].containsPoint(x, y)) {
                    bubbles[i].pop();
                    break;
                }
            }
        }

        canvas.addEventListener('click', handleClick);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleClick({ clientX: touch.clientX, clientY: touch.clientY });
        });

        function startGame() {
            // リセット
            score = 0;
            combo = 0;
            timeLeft = 60;
            bubbles = [];
            gameRunning = true;

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('endScreen').classList.add('hidden');

            updateHUD();

            // タイマー開始
            gameTimer = setInterval(() => {
                timeLeft--;
                updateHUD();

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // バブル生成
            spawnTimer = setInterval(spawnBubble, 800);

            // アニメーション開始
            animate();
        }

        function endGame() {
            gameRunning = false;
            clearInterval(gameTimer);
            clearInterval(spawnTimer);

            document.getElementById('finalScore').textContent = score;
            document.getElementById('endScreen').classList.remove('hidden');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
