<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bubble Pop Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            touch-action: none;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .ui {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .score, .time {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 24px;
            font-weight: bold;
            color: #764ba2;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            backdrop-filter: blur(10px);
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h1 {
            color: white;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }

        .overlay p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 18px;
            margin-bottom: 30px;
        }

        .overlay .final-score {
            color: #667eea;
            font-size: 72px;
            font-weight: bold;
            margin: 20px 0;
        }

        .button {
            padding: 20px 50px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .button:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .button:active {
            transform: scale(0.95);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            padding: 12px;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .combo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            font-weight: bold;
            color: white;
            text-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 150;
        }

        .combo.show {
            opacity: 1;
            animation: comboPop 0.5s ease-out;
        }

        @keyframes comboPop {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .overlay h1 {
                font-size: 36px;
            }
            .overlay .final-score {
                font-size: 48px;
            }
            .score, .time {
                font-size: 18px;
                padding: 10px 15px;
            }
            .combo {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="ui">
        <div class="score">スコア: <span id="score">0</span></div>
        <div class="time">時間: <span id="time">60</span>s</div>
    </div>

    <div class="combo" id="combo"></div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="overlay" id="startOverlay">
        <h1>🫧 Bubble Pop</h1>
        <p>泡をタップして割ろう！<br>連続で割るとコンボボーナス！</p>
        <button class="button" onclick="startGame()">スタート</button>
    </div>

    <div class="overlay hidden" id="gameOverOverlay">
        <h1>ゲームオーバー！</h1>
        <div class="final-score" id="finalScore">0</div>
        <p id="finalMessage">お疲れ様！</p>
        <button class="button" onclick="startGame()">もう一度</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let bubbles = [];
        let score = 0;
        let timeLeft = 60;
        let gameRunning = false;
        let combo = 0;
        let comboTimer = null;
        let lastPopTime = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Bubble {
            constructor() {
                this.reset();
            }

            reset() {
                this.radius = Math.random() * 30 + 20;
                this.x = Math.random() * (width - this.radius * 2) + this.radius;
                this.y = height + this.radius;
                this.speedY = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 1;
                this.hue = Math.random() * 60 + 200; // 青〜紫
                this.alpha = 0.8;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = Math.random() * 0.1 + 0.05;
                this.popped = false;
                this.popAnimation = 0;
            }

            update() {
                if (this.popped) {
                    this.popAnimation += 0.1;
                    this.radius *= 1.1;
                    this.alpha -= 0.1;
                    return this.alpha > 0;
                }

                this.y -= this.speedY;
                this.x += Math.sin(this.wobble) * 0.5;
                this.wobble += this.wobbleSpeed;

                // 画面外に出たらリセット
                if (this.y < -this.radius) {
                    this.reset();
                }

                return true;
            }

            draw() {
                ctx.save();

                // 泡の影
                ctx.beginPath();
                ctx.arc(this.x + 5, this.y + 5, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 0, 0, 0.1)`;
                ctx.fill();

                // 泡の本体
                const gradient = ctx.createRadialGradient(
                    this.x - this.radius * 0.3,
                    this.y - this.radius * 0.3,
                    0,
                    this.x,
                    this.y,
                    this.radius
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 80%, ${this.alpha})`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 70%, 60%, ${this.alpha * 0.8})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 60%, 40%, ${this.alpha * 0.6})`);

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // ハイライト
                ctx.beginPath();
                ctx.arc(
                    this.x - this.radius * 0.3,
                    this.y - this.radius * 0.3,
                    this.radius * 0.2,
                    0,
                    Math.PI * 2
                );
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha * 0.8})`;
                ctx.fill();

                ctx.restore();
            }

            checkPop(x, y) {
                if (this.popped) return false;

                const dx = x - this.x;
                const dy = y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < this.radius) {
                    this.popped = true;
                    return true;
                }
                return false;
            }
        }

        function createBubbles() {
            bubbles = [];
            for (let i = 0; i < 15; i++) {
                const bubble = new Bubble();
                bubble.y = Math.random() * height;
                bubbles.push(bubble);
            }
        }

        function startGame() {
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');

            score = 0;
            timeLeft = 60;
            combo = 0;
            gameRunning = true;

            document.getElementById('score').textContent = score;
            document.getElementById('time').textContent = timeLeft;

            createBubbles();
            animate();

            // タイマー開始
            const timerInterval = setInterval(() => {
                if (!gameRunning) {
                    clearInterval(timerInterval);
                    return;
                }

                timeLeft--;
                document.getElementById('time').textContent = timeLeft;

                if (timeLeft <= 0) {
                    gameOver();
                    clearInterval(timerInterval);
                }
            }, 1000);
        }

        function gameOver() {
            gameRunning = false;

            document.getElementById('finalScore').textContent = score;

            let message = 'お疲れ様！';
            if (score >= 1000) {
                message = '🏆 伝説のスコア！';
            } else if (score >= 500) {
                message = '⭐ 素晴らしい！';
            } else if (score >= 300) {
                message = '👍 いい感じ！';
            }

            document.getElementById('finalMessage').textContent = message;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        function showCombo() {
            const comboElement = document.getElementById('combo');
            comboElement.textContent = `${combo} Combo!`;
            comboElement.classList.add('show');
            setTimeout(() => {
                comboElement.classList.remove('show');
            }, 500);
        }

        function handleClick(x, y) {
            if (!gameRunning) return;

            const now = Date.now();

            for (let bubble of bubbles) {
                if (bubble.checkPop(x, y)) {
                    // コンボ処理
                    if (now - lastPopTime < 1000) {
                        combo++;
                    } else {
                        combo = 1;
                    }
                    lastPopTime = now;

                    // スコア計算（コンボボーナス）
                    const baseScore = 10;
                    const comboBonus = Math.min(combo - 1, 10) * 5;
                    const points = baseScore + comboBonus;
                    score += points;

                    document.getElementById('score').textContent = score;

                    if (combo >= 3) {
                        showCombo();
                    }

                    // 新しい泡を追加
                    setTimeout(() => {
                        const newBubble = new Bubble();
                        newBubble.y = height + newBubble.radius;
                        bubbles.push(newBubble);
                    }, 500);

                    break;
                }
            }
        }

        function animate() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, width, height);

            // 泡を更新・描画
            bubbles = bubbles.filter(bubble => bubble.update());
            bubbles.forEach(bubble => bubble.draw());

            // 常に一定数の泡を維持
            while (bubbles.length < 15) {
                const bubble = new Bubble();
                bubble.y = height + bubble.radius;
                bubbles.push(bubble);
            }

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        window.addEventListener('resize', resize);

        canvas.addEventListener('click', (e) => {
            handleClick(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleClick(touch.clientX, touch.clientY);
        });

        // 初期化
        resize();
    </script>
</body>
</html>
