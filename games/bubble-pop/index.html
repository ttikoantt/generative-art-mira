<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bubble Pop Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: none;
        }

        canvas {
            display: block;
        }

        .ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .score-panel, .timer-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
        }

        .timer-panel.warning {
            background: rgba(255, 100, 100, 0.3);
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .start-screen, .gameover-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
        }

        .start-screen h1, .gameover-screen h1 {
            color: #fff;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
        }

        .start-screen p, .gameover-screen p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            margin-bottom: 30px;
        }

        .final-score {
            color: #4ecdc4;
            font-size: 64px;
            font-weight: bold;
            margin: 20px 0;
        }

        .btn {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            border: none;
            border-radius: 30px;
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.1);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 10px;
            right: 10px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
            z-index: 50;
            font-size: 14px;
            pointer-events: all;
        }

        .hidden {
            display: none !important;
        }

        .combo {
            position: fixed;
            pointer-events: none;
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            animation: comboAnim 0.5s ease-out forwards;
        }

        @keyframes comboAnim {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-50px) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="ui">
        <div class="score-panel">🎯 Score: <span id="score">0</span></div>
        <div class="timer-panel" id="timerPanel">⏱️ <span id="timer">30</span>s</div>
    </div>

    <div class="start-screen" id="startScreen">
        <h1>Bubble Pop</h1>
        <p>泡をタップして割ろう！</p>
        <button class="btn" id="startBtn">スタート</button>
    </div>

    <div class="gameover-screen hidden" id="gameoverScreen">
        <h1>Game Over</h1>
        <p>スコア</p>
        <div class="final-score" id="finalScore">0</div>
        <button class="btn" id="restartBtn">もう一度</button>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">⛶ 全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let bubbles = [];
        let particles = [];
        let score = 0;
        let timeLeft = 30;
        let gameRunning = false;
        let combo = 0;
        let lastPopTime = 0;

        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const timerPanel = document.getElementById('timerPanel');
        const startScreen = document.getElementById('startScreen');
        const gameoverScreen = document.getElementById('gameoverScreen');
        const finalScoreEl = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Bubble {
            constructor() {
                this.radius = Math.random() * 30 + 30;
                this.x = Math.random() * (width - this.radius * 2) + this.radius;
                this.y = height + this.radius;
                this.speed = Math.random() * 2 + 1;
                this.wobbleSpeed = Math.random() * 0.05 + 0.02;
                this.wobbleAmount = Math.random() * 2;
                this.wobbleOffset = Math.random() * Math.PI * 2;
                this.hue = Math.random() * 60 + 180; // 青～紫
                this.alpha = Math.random() * 0.3 + 0.5;
                this.points = Math.floor((50 - this.radius) / 2) + 5;
            }

            update() {
                this.y -= this.speed;
                this.x += Math.sin(Date.now() * this.wobbleSpeed + this.wobbleOffset) * this.wobbleAmount;
            }

            draw() {
                // 泡の本体
                const gradient = ctx.createRadialGradient(
                    this.x - this.radius * 0.3, this.y - this.radius * 0.3, 0,
                    this.x, this.y, this.radius
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 70%, ${this.alpha})`);
                gradient.addColorStop(0.7, `hsla(${this.hue}, 80%, 50%, ${this.alpha * 0.7})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 80%, 40%, ${this.alpha * 0.3})`);

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // ハイライト
                ctx.beginPath();
                ctx.arc(this.x - this.radius * 0.3, this.y - this.radius * 0.3, this.radius * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha * 0.6})`;
                ctx.fill();
            }

            contains(x, y) {
                const dx = x - this.x;
                const dy = y - this.y;
                return Math.sqrt(dx * dx + dy * dy) < this.radius;
            }

            isOffScreen() {
                return this.y < -this.radius;
            }
        }

        class Particle {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.radius = Math.random() * 5 + 2;
                this.hue = hue;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.02;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2; // 重力
                this.alpha -= this.decay;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${this.alpha})`;
                ctx.fill();
            }

            isDead() {
                return this.alpha <= 0;
            }
        }

        function showCombo(x, y, count) {
            if (count < 2) return;

            const comboEl = document.createElement('div');
            comboEl.className = 'combo';
            comboEl.textContent = `${count} Combo!`;
            comboEl.style.left = x + 'px';
            comboEl.style.top = y + 'px';
            document.body.appendChild(comboEl);

            setTimeout(() => comboEl.remove(), 500);
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            combo = 0;
            bubbles = [];
            particles = [];
            gameRunning = true;

            scoreEl.textContent = score;
            timerEl.textContent = timeLeft;
            timerPanel.classList.remove('warning');

            startScreen.classList.add('hidden');
            gameoverScreen.classList.add('hidden');

            // タイマー開始
            const timer = setInterval(() => {
                if (!gameRunning) {
                    clearInterval(timer);
                    return;
                }

                timeLeft--;
                timerEl.textContent = timeLeft;

                if (timeLeft <= 5) {
                    timerPanel.classList.add('warning');
                }

                if (timeLeft <= 0) {
                    endGame();
                    clearInterval(timer);
                }
            }, 1000);

            // 泡の生成
            const spawner = setInterval(() => {
                if (!gameRunning) {
                    clearInterval(spawner);
                    return;
                }

                if (Math.random() < 0.7) {
                    bubbles.push(new Bubble());
                }
            }, 500);

            animate();
        }

        function endGame() {
            gameRunning = false;
            finalScoreEl.textContent = score;
            gameoverScreen.classList.remove('hidden');
        }

        function handleClick(x, y) {
            if (!gameRunning) return;

            let popped = false;

            for (let i = bubbles.length - 1; i >= 0; i--) {
                if (bubbles[i].contains(x, y)) {
                    const bubble = bubbles[i];

                    // パーティクル生成
                    for (let j = 0; j < 10; j++) {
                        particles.push(new Particle(bubble.x, bubble.y, bubble.hue));
                    }

                    // コンボ判定
                    const now = Date.now();
                    if (now - lastPopTime < 1000) {
                        combo++;
                    } else {
                        combo = 1;
                    }
                    lastPopTime = now;

                    // スコア計算（コンボボーナス）
                    const points = bubble.points * (1 + combo * 0.5);
                    score += Math.floor(points);
                    scoreEl.textContent = score;

                    showCombo(x, y, combo);

                    bubbles.splice(i, 1);
                    popped = true;
                    break;
                }
            }

            if (!popped) {
                combo = 0;
            }
        }

        function animate() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, width, height);

            // 泡の更新と描画
            bubbles = bubbles.filter(bubble => {
                bubble.update();
                bubble.draw();
                return !bubble.isOffScreen();
            });

            // パーティクルの更新と描画
            particles = particles.filter(particle => {
                particle.update();
                particle.draw();
                return !particle.isDead();
            });

            requestAnimationFrame(animate);
        }

        // イベントリスナー
        canvas.addEventListener('click', (e) => {
            handleClick(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let touch of e.touches) {
                handleClick(touch.clientX, touch.clientY);
            }
        });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // 初期化
        resize();
        window.addEventListener('resize', resize);
    </script>
</body>
</html>
