<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Pop - バブルポップ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: manipulation;
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .score-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            z-index: 100;
            display: flex;
            gap: 40px;
        }

        .score-item {
            text-align: center;
        }

        .score-label {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-value {
            font-size: 32px;
        }

        #gameCanvas {
            display: block;
            cursor: pointer;
        }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 200;
        }

        .game-over.show {
            display: flex;
        }

        .game-over h2 {
            color: white;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .final-score {
            color: white;
            font-size: 24px;
            margin-bottom: 40px;
        }

        .restart-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }

        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(245, 87, 108, 0.6);
        }

        .restart-btn:active {
            transform: scale(0.98);
        }

        .fullscreen-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .score-display {
                gap: 20px;
            }

            .score-value {
                font-size: 28px;
            }

            .game-over h2 {
                font-size: 36px;
            }

            .final-score {
                font-size: 20px;
            }

            .restart-btn {
                padding: 12px 30px;
                font-size: 16px;
            }

            .fullscreen-btn {
                bottom: 15px;
                right: 15px;
                padding: 8px 16px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="score-display">
            <div class="score-item">
                <div class="score-label">Score</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">Lives</div>
                <div class="score-value" id="lives">3</div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>

        <div class="game-over" id="gameOver">
            <h2>Game Over!</h2>
            <div class="final-score">Final Score: <span id="finalScore">0</span></div>
            <button class="restart-btn" onclick="restartGame()">もう一度プレイ</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');

        let width, height;
        let score = 0;
        let lives = 3;
        let gameRunning = true;
        let bubbles = [];
        let particles = [];
        let lastSpawn = 0;
        let spawnInterval = 1000;
        let difficultyMultiplier = 1;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        resize();
        window.addEventListener('resize', resize);

        class Bubble {
            constructor() {
                this.radius = Math.random() * 30 + 25;
                this.x = Math.random() * (width - this.radius * 2) + this.radius;
                this.y = height + this.radius;
                this.speed = (Math.random() * 2 + 1) * difficultyMultiplier;
                this.color = this.getRandomColor();
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = Math.random() * 0.05 + 0.02;
                this.popped = false;
            }

            getRandomColor() {
                const colors = [
                    { main: '#FF6B6B', glow: '#FF8E8E' },
                    { main: '#4ECDC4', glow: '#7EDDD6' },
                    { main: '#FFE66D', glow: '#FFF09E' },
                    { main: '#95E1D3', glow: '#B5F0E5' },
                    { main: '#F38181', glow: '#F7A3A3' },
                    { main: '#AA96DA', glow: '#C4B6E8' },
                    { main: '#FCBAD3', glow: '#FDD5E3' },
                    { main: '#A8E6CF', glow: '#C9F3DF' }
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.y -= this.speed;
                this.wobble += this.wobbleSpeed;

                if (this.y + this.radius < 0) {
                    this.popped = true;
                    lives--;
                    livesEl.textContent = lives;

                    if (lives <= 0) {
                        endGame();
                    }
                }
            }

            draw() {
                ctx.save();

                // Glow effect
                ctx.shadowColor = this.color.glow;
                ctx.shadowBlur = 20;

                // Main bubble
                const gradient = ctx.createRadialGradient(
                    this.x - this.radius * 0.3,
                    this.y - this.radius * 0.3,
                    0,
                    this.x,
                    this.y,
                    this.radius
                );
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                gradient.addColorStop(0.3, this.color.glow);
                gradient.addColorStop(0.7, this.color.main);
                gradient.addColorStop(1, this.color.main);

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Highlight
                ctx.beginPath();
                ctx.arc(
                    this.x - this.radius * 0.3,
                    this.y - this.radius * 0.3,
                    this.radius * 0.2,
                    0,
                    Math.PI * 2
                );
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.fill();

                ctx.restore();
            }

            contains(x, y) {
                const dx = x - this.x;
                const dy = y - this.y;
                return dx * dx + dy * dy <= this.radius * this.radius;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 5 + 2;
                this.speedX = (Math.random() - 0.5) * 10;
                this.speedY = (Math.random() - 0.5) * 10;
                this.gravity = 0.3;
                this.life = 1;
                this.decay = Math.random() * 0.03 + 0.02;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += this.gravity;
                this.life -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function createPopParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function spawnBubble() {
            bubbles.push(new Bubble());
        }

        function handleClick(e) {
            if (!gameRunning) return;

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            for (let i = bubbles.length - 1; i >= 0; i--) {
                if (bubbles[i].contains(x, y)) {
                    const bubble = bubbles[i];
                    createPopParticles(bubble.x, bubble.y, bubble.color.glow);

                    // Score based on bubble size (smaller = more points)
                    const points = Math.floor((50 - bubble.radius) * difficultyMultiplier);
                    score += points;
                    scoreEl.textContent = score;

                    bubbles.splice(i, 1);

                    // Increase difficulty
                    difficultyMultiplier = 1 + (score / 1000);

                    break;
                }
            }
        }

        canvas.addEventListener('click', handleClick);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick(e);
        });

        function endGame() {
            gameRunning = false;
            finalScoreEl.textContent = score;
            gameOverEl.classList.add('show');
        }

        function restartGame() {
            score = 0;
            lives = 3;
            gameRunning = true;
            bubbles = [];
            particles = [];
            difficultyMultiplier = 1;
            scoreEl.textContent = score;
            livesEl.textContent = lives;
            gameOverEl.classList.remove('show');
        }

        function gameLoop(timestamp) {
            if (!lastSpawn) lastSpawn = timestamp;

            // Spawn bubbles
            if (timestamp - lastSpawn > spawnInterval / difficultyMultiplier) {
                spawnBubble();
                lastSpawn = timestamp;
            }

            // Clear canvas
            ctx.clearRect(0, 0, width, height);

            // Update and draw bubbles
            bubbles = bubbles.filter(b => !b.popped);
            bubbles.forEach(bubble => {
                if (gameRunning) bubble.update();
                bubble.draw();
            });

            // Update and draw particles
            particles = particles.filter(p => p.life > 0);
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            requestAnimationFrame(gameLoop);
        }

        gameLoop(0);

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
