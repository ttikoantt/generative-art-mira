<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bubble Pop - Relaxing Pop Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            touch-action: none;
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .score {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            animation: float 3s ease-in-out infinite;
            box-shadow: inset -10px -10px 20px rgba(0, 0, 0, 0.2),
                        inset 10px 10px 20px rgba(255, 255, 255, 0.3),
                        0 5px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.1s;
        }

        .bubble:active {
            transform: scale(0.9);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .popping {
            animation: pop 0.3s ease-out forwards;
        }

        .combo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            opacity: 0;
            z-index: 50;
        }

        .combo.show {
            animation: comboShow 0.5s ease-out forwards;
        }

        @keyframes comboShow {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <div class="score">Score: <span id="score">0</span></div>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
        <div class="combo" id="combo"></div>
    </div>

    <script>
        const container = document.getElementById('gameContainer');
        const scoreElement = document.getElementById('score');
        const comboElement = document.getElementById('combo');

        let score = 0;
        let comboCount = 0;
        let lastPopTime = 0;
        const COMBO_TIMEOUT = 1000;

        const colors = [
            'radial-gradient(circle at 30% 30%, #ff6b6b, #ee5a5a)',
            'radial-gradient(circle at 30% 30%, #4ecdc4, #44a08d)',
            'radial-gradient(circle at 30% 30%, #f9d423, #f5af19)',
            'radial-gradient(circle at 30% 30%, #a8e6cf, #56ab2f)',
            'radial-gradient(circle at 30% 30%, #ff8a5c, #ea5455)',
            'radial-gradient(circle at 30% 30%, #7fcdbb, #45b7d1)',
            'radial-gradient(circle at 30% 30%, #f093fb, #f5576c)',
            'radial-gradient(circle at 30% 30%, #4facfe, #00f2fe)'
        ];

        function createBubble() {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';

            const size = Math.random() * 60 + 40;
            const x = Math.random() * (window.innerWidth - size);
            const y = Math.random() * (window.innerHeight - size);
            const color = colors[Math.floor(Math.random() * colors.length)];

            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;
            bubble.style.left = `${x}px`;
            bubble.style.top = `${y}px`;
            bubble.style.background = color;
            bubble.style.animationDelay = `${Math.random() * 2}s`;

            bubble.addEventListener('click', () => popBubble(bubble));
            bubble.addEventListener('touchstart', (e) => {
                e.preventDefault();
                popBubble(bubble);
            });

            container.appendChild(bubble);
        }

        function popBubble(bubble) {
            if (bubble.classList.contains('popping')) return;

            const now = Date.now();
            if (now - lastPopTime < COMBO_TIMEOUT) {
                comboCount++;
            } else {
                comboCount = 1;
            }
            lastPopTime = now;

            const points = bubble.offsetWidth * comboCount;
            score += points;
            scoreElement.textContent = score;

            if (comboCount >= 3) {
                comboElement.textContent = `${comboCount}x COMBO!`;
                comboElement.classList.remove('show');
                void comboElement.offsetWidth;
                comboElement.classList.add('show');
            }

            bubble.classList.add('popping');
            setTimeout(() => {
                if (bubble.parentNode) {
                    bubble.parentNode.removeChild(bubble);
                    createBubble();
                }
            }, 300);
        }

        // Initialize bubbles
        function initBubbles() {
            const bubbleCount = Math.min(20, Math.floor((window.innerWidth * window.innerHeight) / 20000));
            for (let i = 0; i < bubbleCount; i++) {
                createBubble();
            }
        }

        initBubbles();

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Resize handler
        window.addEventListener('resize', () => {
            const bubbleCount = Math.min(20, Math.floor((window.innerWidth * window.innerHeight) / 20000));
            const currentBubbles = document.querySelectorAll('.bubble:not(.popping)').length;
            if (currentBubbles < bubbleCount) {
                for (let i = 0; i < bubbleCount - currentBubbles; i++) {
                    createBubble();
                }
            }
        });
    </script>
</body>
</html>
