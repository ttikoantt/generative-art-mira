<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bubble Pop Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: none;
            user-select: none;
        }

        #gameCanvas {
            display: block;
            touch-action: none;
        }

        .ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }

        .score-display {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        .timer {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        .start-screen, .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
        }

        .start-screen.hidden, .game-over-screen.hidden {
            display: none;
        }

        .title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.8);
        }

        .subtitle {
            font-size: 18px;
            margin-bottom: 40px;
            opacity: 0.8;
            text-align: center;
            padding: 0 20px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
            pointer-events: auto;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .final-score {
            font-size: 64px;
            font-weight: bold;
            margin: 20px 0;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        .high-score {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
            z-index: 50;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 768px) {
            .title {
                font-size: 32px;
            }
            .final-score {
                font-size: 48px;
            }
            .ui {
                padding: 10px;
            }
            .score-display, .timer {
                font-size: 14px;
                padding: 8px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="ui">
        <div class="score-display">Score: <span id="score">0</span></div>
        <div class="timer">Time: <span id="timer">30</span>s</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="start-screen" id="startScreen">
        <div class="title">🫧 Bubble Pop</div>
        <div class="subtitle">Tap bubbles to pop them!<br>Get the highest score in 30 seconds!</div>
        <button class="btn" id="startBtn">Start Game</button>
    </div>

    <div class="game-over-screen hidden" id="gameOverScreen">
        <div class="title">Time's Up!</div>
        <div class="final-score" id="finalScore">0</div>
        <div class="high-score">Best: <span id="highScore">0</span></div>
        <button class="btn" id="restartBtn">Play Again</button>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">Full Screen</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const finalScoreEl = document.getElementById('finalScore');
        const highScoreEl = document.getElementById('highScore');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let width, height;
        let bubbles = [];
        let score = 0;
        let timeLeft = 30;
        let gameRunning = false;
        let gameLoop;
        let timerInterval;
        let spawnInterval;
        let highScore = localStorage.getItem('bubblePopHighScore') || 0;

        highScoreEl.textContent = highScore;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Bubble {
            constructor() {
                this.radius = Math.random() * 30 + 30;
                this.x = Math.random() * (width - this.radius * 2) + this.radius;
                this.y = height + this.radius;
                this.speed = Math.random() * 2 + 1;
                this.hue = Math.random() * 360;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = Math.random() * 0.1 + 0.05;
                this.popped = false;
                this.scale = 1;
            }

            update() {
                this.y -= this.speed;
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 0.5;

                return this.y + this.radius > -50;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.scale, this.scale);

                // 泡のグラデーション
                const gradient = ctx.createRadialGradient(
                    -this.radius * 0.3, -this.radius * 0.3, 0,
                    0, 0, this.radius
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 80%, 0.9)`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 70%, 60%, 0.7)`);
                gradient.addColorStop(1, `hsla(${this.hue}, 60%, 50%, 0.5)`);

                // メインの泡
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // ハイライト
                ctx.beginPath();
                ctx.arc(-this.radius * 0.3, -this.radius * 0.3, this.radius * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.fill();

                // 外枠
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 70%, 70%, 0.8)`;
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.restore();
            }

            checkTap(x, y) {
                const dx = x - this.x;
                const dy = y - this.y;
                return Math.sqrt(dx * dx + dy * dy) < this.radius + 20;
            }

            pop() {
                this.popped = true;
                this.scale = 1.3;

                // ポップ音の視覚効果
                for (let i = 0; i < 10; i++) {
                    particles.push(new Particle(this.x, this.y, this.hue));
                }
            }
        }

        class Particle {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.hue = hue;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.radius = Math.random() * 5 + 2;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.02;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2;
                this.alpha -= this.decay;
                return this.alpha > 0;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${this.alpha})`;
                ctx.fill();
            }
        }

        let particles = [];

        function spawnBubble() {
            if (bubbles.length < 15 && gameRunning) {
                bubbles.push(new Bubble());
            }
        }

        function update() {
            // 背景をクリア
            ctx.fillStyle = 'rgba(102, 126, 234, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 泡を更新・描画
            bubbles = bubbles.filter(bubble => {
                const alive = bubble.update() && !bubble.popped;
                if (alive) {
                    bubble.draw();
                }
                return alive;
            });

            // パーティクルを更新・描画
            particles = particles.filter(particle => {
                const alive = particle.update();
                if (alive) {
                    particle.draw();
                }
                return alive;
            });

            if (gameRunning) {
                gameLoop = requestAnimationFrame(update);
            }
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            bubbles = [];
            particles = [];
            gameRunning = true;

            scoreEl.textContent = score;
            timerEl.textContent = timeLeft;

            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');

            spawnInterval = setInterval(spawnBubble, 500);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // 初期の泡
            for (let i = 0; i < 5; i++) {
                setTimeout(() => spawnBubble(), i * 200);
            }

            update();
        }

        function endGame() {
            gameRunning = false;
            clearInterval(spawnInterval);
            clearInterval(timerInterval);
            cancelAnimationFrame(gameLoop);

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('bubblePopHighScore', highScore);
            }

            finalScoreEl.textContent = score;
            highScoreEl.textContent = highScore;
            gameOverScreen.classList.remove('hidden');
        }

        function handleTap(x, y) {
            if (!gameRunning) return;

            for (let i = bubbles.length - 1; i >= 0; i--) {
                if (bubbles[i].checkTap(x, y)) {
                    bubbles[i].pop();
                    score += 10;
                    scoreEl.textContent = score;
                    break;
                }
            }
        }

        // イベントリスナー
        canvas.addEventListener('click', (e) => {
            handleTap(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let touch of e.touches) {
                handleTap(touch.clientX, touch.clientY);
            }
        });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // 初期化
        resize();
        window.addEventListener('resize', resize);
    </script>
</body>
</html>
