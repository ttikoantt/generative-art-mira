<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bubble Pop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: manipulation;
        }

        #gameCanvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .score {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 30px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            z-index: 100;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover, .fullscreen-btn:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .combo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            pointer-events: none;
            opacity: 0;
            z-index: 100;
        }

        .combo.show {
            animation: comboAnim 0.5s ease-out;
        }

        @keyframes comboAnim {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="score">Score: <span id="score">0</span></div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    <div class="combo" id="combo"></div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const comboEl = document.getElementById('combo');

        let width, height;
        let bubbles = [];
        let score = 0;
        let combo = 0;
        let lastPopTime = 0;
        const comboTimeout = 1000;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Bubble {
            constructor() {
                this.radius = Math.random() * 40 + 30;
                this.x = Math.random() * (width - this.radius * 2) + this.radius;
                this.y = height + this.radius;
                this.speed = Math.random() * 2 + 1;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = Math.random() * 0.05 + 0.02;
                this.hue = Math.random() * 60 + 180;
                this.popping = false;
                this.popProgress = 0;
            }

            update() {
                if (this.popping) {
                    this.popProgress += 0.1;
                    return this.popProgress < 1;
                }

                this.y -= this.speed;
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 0.5;

                return this.y > -this.radius;
            }

            draw() {
                const currentRadius = this.popping 
                    ? this.radius * (1 + this.popProgress * 0.5)
                    : this.radius;
                const alpha = this.popping 
                    ? 1 - this.popProgress 
                    : 0.6;

                const gradient = ctx.createRadialGradient(
                    this.x - currentRadius * 0.3,
                    this.y - currentRadius * 0.3,
                    0,
                    this.x,
                    this.y,
                    currentRadius
                );

                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 70%, ${alpha})`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 70%, 50%, ${alpha * 0.8})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 60%, 30%, ${alpha * 0.3})`);

                ctx.beginPath();
                ctx.arc(this.x, this.y, currentRadius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                if (!this.popping) {
                    ctx.beginPath();
                    ctx.arc(this.x - currentRadius * 0.3, this.y - currentRadius * 0.3, currentRadius * 0.2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.6})`;
                    ctx.fill();
                }
            }

            contains(px, py) {
                const dx = px - this.x;
                const dy = py - this.y;
                return Math.sqrt(dx * dx + dy * dy) < this.radius;
            }

            pop() {
                this.popping = true;
            }
        }

        function createBubble() {
            bubbles.push(new Bubble());
        }

        function showCombo() {
            if (combo >= 3) {
                comboEl.textContent = `${combo} Combo!`;
                comboEl.classList.remove('show');
                void comboEl.offsetWidth;
                comboEl.classList.add('show');
            }
        }

        function handleClick(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            for (let i = bubbles.length - 1; i >= 0; i--) {
                const bubble = bubbles[i];
                if (!bubble.popping && bubble.contains(x, y)) {
                    bubble.pop();
                    
                    const now = Date.now();
                    if (now - lastPopTime < comboTimeout) {
                        combo++;
                    } else {
                        combo = 1;
                    }
                    lastPopTime = now;

                    score += 10 * combo;
                    scoreEl.textContent = score;
                    showCombo();
                    break;
                }
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, width, height);

            bubbles = bubbles.filter(bubble => bubble.update());
            bubbles.forEach(bubble => bubble.draw());

            if (Math.random() < 0.03) {
                createBubble();
            }

            requestAnimationFrame(gameLoop);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', resize);
        canvas.addEventListener('click', handleClick);
        canvas.addEventListener('touchstart', handleClick, { passive: false });

        resize();
        gameLoop();
    </script>
</body>
</html>
