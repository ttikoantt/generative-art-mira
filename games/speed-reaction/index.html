<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Reaction - 反応速度ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            padding: 20px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #fff;
            margin-bottom: 30px;
            font-size: 32px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            color: #aaa;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #fff;
            font-size: 28px;
            font-weight: bold;
        }

        .game-area {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .target {
            font-size: 72px;
            font-weight: bold;
            margin-bottom: 20px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .target.waiting {
            color: #ffd93d;
            animation: pulse 1s infinite;
        }

        .target.click {
            color: #ff6b6b;
            cursor: pointer;
            transition: all 0.1s;
            user-select: none;
        }

        .target.click:active {
            transform: scale(0.95);
        }

        .target.success {
            color: #6bcb77;
        }

        .target.fail {
            color: #ff6b6b;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .instruction {
            color: #aaa;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .btn {
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .high-score {
            color: #ffd93d;
            font-size: 14px;
            margin-top: 10px;
        }

        .difficulty {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .difficulty-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .difficulty-btn.active {
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            border-color: transparent;
        }

        .difficulty-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>⚡ Speed Reaction</h1>

        <div class="difficulty">
            <button class="difficulty-btn active" data-difficulty="easy">Easy</button>
            <button class="difficulty-btn" data-difficulty="medium">Medium</button>
            <button class="difficulty-btn" data-difficulty="hard">Hard</button>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">反応時間</div>
                <div class="stat-value" id="time">0 ms</div>
            </div>
        </div>

        <div class="high-score">
            🏆 ハイスコア: <span id="highScore">0</span>
        </div>

        <div class="game-area">
            <div class="target waiting" id="target">待機中...</div>
            <div class="instruction" id="instruction">
                「スタート」ボタンを押してゲーム開始
            </div>
        </div>

        <button class="btn" id="startBtn">スタート</button>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const target = document.getElementById('target');
        const instruction = document.getElementById('instruction');
        const scoreDisplay = document.getElementById('score');
        const timeDisplay = document.getElementById('time');
        const highScoreDisplay = document.getElementById('highScore');
        const startBtn = document.getElementById('startBtn');
        const difficultyBtns = document.querySelectorAll('.difficulty-btn');

        let score = 0;
        let highScore = parseInt(localStorage.getItem('speedReactionHighScore')) || 0;
        let gameState = 'idle'; // idle, waiting, ready, ended
        let startTime = 0;
        let timeoutId = null;
        let difficulty = 'easy';
        const difficulties = {
            easy: { min: 2000, max: 5000 },
            medium: { min: 1500, max: 4000 },
            hard: { min: 1000, max: 3000 }
        };

        highScoreDisplay.textContent = highScore;

        difficultyBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                difficultyBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                difficulty = btn.dataset.difficulty;
            });
        });

        startBtn.addEventListener('click', startGame);

        target.addEventListener('click', handleClick);
        target.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick();
        });

        function startGame() {
            score = 0;
            scoreDisplay.textContent = score;
            startBtn.style.display = 'none';
            startRound();
        }

        function startRound() {
            gameState = 'waiting';
            target.className = 'target waiting';
            target.textContent = '待機中...';
            instruction.textContent = '画面が赤くなったらクリック！';

            const delay = Math.random() * 
                (difficulties[difficulty].max - difficulties[difficulty].min) + 
                difficulties[difficulty].min;

            timeoutId = setTimeout(() => {
                gameState = 'ready';
                startTime = Date.now();
                target.className = 'target click';
                target.textContent = 'CLICK!';
                instruction.textContent = '今！クリックして！';
            }, delay);
        }

        function handleClick() {
            if (gameState === 'waiting') {
                // 早期クリック（不正）
                clearTimeout(timeoutId);
                gameState = 'ended';
                target.className = 'target fail';
                target.textContent = '✗ 速すぎる！';
                instruction.textContent = `スコア: ${score} | ハイスコア: ${Math.max(score, highScore)}`;
                startBtn.textContent = 'もう一度';
                startBtn.style.display = 'block';
                updateHighScore();
            } else if (gameState === 'ready') {
                // 成功
                const reactionTime = Date.now() - startTime;
                score++;
                scoreDisplay.textContent = score;
                timeDisplay.textContent = `${reactionTime} ms`;

                target.className = 'target success';
                target.textContent = '✓ 完璧！';
                instruction.textContent = `${reactionTime} ms`;

                setTimeout(() => {
                    startRound();
                }, 1000);
            }
        }

        function updateHighScore() {
            if (score > highScore) {
                highScore = score;
                highScoreDisplay.textContent = highScore;
                localStorage.setItem('speedReactionHighScore', highScore);
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState === 'idle' || gameState === 'ended') {
                    startGame();
                } else {
                    handleClick();
                }
            }
        });
    </script>
</body>
</html>
