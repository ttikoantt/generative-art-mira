<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sunrise Rush - 初日の出</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .game-area {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            background: linear-gradient(to bottom, #0f0c29 0%, #302b63 50%, #24243e 100%);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .mountain {
            position: absolute;
            bottom: 0;
            width: 0;
            height: 0;
            border-style: solid;
        }

        .mountain-1 {
            left: -10%;
            border-width: 0 120px 180px 120px;
            border-color: transparent transparent #2d3436 transparent;
        }

        .mountain-2 {
            left: 20%;
            border-width: 0 100px 150px 100px;
            border-color: transparent transparent #636e72 transparent;
        }

        .mountain-3 {
            right: -10%;
            border-width: 0 130px 200px 130px;
            border-color: transparent transparent #2d3436 transparent;
        }

        .sun {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, #FFD700 0%, #FF6B6B 100%);
            box-shadow: 0 0 40px #FFD700, 0 0 80px #FF6B6B;
            transition: bottom 0.3s ease-out;
            cursor: pointer;
        }

        .sun::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.3) 0%, transparent 70%);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.5; }
        }

        .obstacle {
            position: absolute;
            background: #e74c3c;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s ease;
        }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
        }

        .cloud::before {
            width: 40px;
            height: 40px;
            top: -20px;
            left: 10px;
        }

        .cloud::after {
            width: 50px;
            height: 50px;
            top: -25px;
            right: 10px;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: white;
        }

        .score {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .high-score {
            font-size: 16px;
            opacity: 0.8;
        }

        .start-screen, .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }

        .start-screen h1, .game-over-screen h1 {
            font-size: clamp(28px, 6vw, 40px);
            margin-bottom: 20px;
            text-shadow: 0 0 20px #FFD700;
        }

        .start-screen p, .game-over-screen p {
            font-size: clamp(14px, 3vw, 18px);
            margin-bottom: 30px;
            opacity: 0.9;
            text-align: center;
            padding: 0 20px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 18px;
            background: linear-gradient(45deg, #FFD700, #FF6B6B);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
            transition: transform 0.2s ease;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .hidden {
            display: none !important;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .final-score {
            font-size: 48px;
            font-weight: bold;
            color: #FFD700;
            margin: 20px 0;
            text-shadow: 0 0 30px #FFD700;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="info-panel">
            <div class="score">🌅 <span id="score">0</span>m</div>
            <div class="high-score">🏆 <span id="highScore">0</span>m</div>
        </div>

        <div class="game-area" id="gameArea">
            <div class="stars" id="stars"></div>
            <div class="mountain mountain-1"></div>
            <div class="mountain mountain-2"></div>
            <div class="mountain mountain-3"></div>
            <div class="sun" id="sun"></div>

            <div class="start-screen" id="startScreen">
                <h1>🌅 Sunrise Rush</h1>
                <p>太陽をタップして上昇させ、雲を避けながら山の上まで登ろう！<br>タップで上昇、手を離すと下降</p>
                <button class="btn" onclick="startGame()">🚀 スタート</button>
            </div>

            <div class="game-over-screen hidden" id="gameOverScreen">
                <h1>🌙 ゲームオーバー</h1>
                <div class="final-score" id="finalScore">0m</div>
                <p id="newRecord" style="color: #FFD700; font-weight: bold;"></p>
                <button class="btn" onclick="startGame()">🔄 もう一度</button>
            </div>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全画面</button>

    <script>
        const sun = document.getElementById('sun');
        const gameArea = document.getElementById('gameArea');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreEl = document.getElementById('finalScore');
        const newRecordEl = document.getElementById('newRecord');
        const starsContainer = document.getElementById('stars');

        let sunY = 50;
        let velocity = 0;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('sunriseHighScore')) || 0;
        let gameLoop;
        let obstacles = [];
        let clouds = [];
        let isGameOver = false;
        let isRising = false;

        highScoreEl.textContent = highScore;

        // 星を生成
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 60 + '%';
            star.style.animationDelay = Math.random() * 2 + 's';
            starsContainer.appendChild(star);
        }

        function startGame() {
            sunY = 50;
            velocity = 0;
            score = 0;
            obstacles = [];
            clouds = [];
            isGameOver = false;

            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');

            // 既存の障害物と雲をクリア
            document.querySelectorAll('.obstacle, .cloud').forEach(el => el.remove());

            updateSunPosition();
            spawnObstacle();
            spawnCloud();

            if (gameLoop) cancelAnimationFrame(gameLoop);
            gameLoop = requestAnimationFrame(update);
        }

        function updateSunPosition() {
            sun.style.bottom = sunY + 'px';
        }

        function spawnObstacle() {
            if (isGameOver) return;

            const obstacle = document.createElement('div');
            obstacle.className = 'obstacle';
            const type = Math.floor(Math.random() * 3);
            const emojis = ['⚡', '💨', '🌧️'];
            const colors = ['#e74c3c', '#3498db', '#9b59b6'];
            obstacle.textContent = emojis[type];
            obstacle.style.backgroundColor = colors[type];
            obstacle.style.width = '40px';
            obstacle.style.height = '40px';
            obstacle.style.left = Math.random() * (gameArea.offsetWidth - 40) + 'px';
            obstacle.style.bottom = sunY + 200 + Math.random() * 100 + 'px';
            gameArea.appendChild(obstacle);
            obstacles.push(obstacle);

            const delay = 2000 + Math.random() * 2000;
            setTimeout(spawnObstacle, delay);
        }

        function spawnCloud() {
            if (isGameOver) return;

            const cloud = document.createElement('div');
            cloud.className = 'cloud';
            const size = 60 + Math.random() * 40;
            cloud.style.width = size + 'px';
            cloud.style.height = size * 0.4 + 'px';
            cloud.style.left = '0';
            cloud.style.bottom = sunY + 150 + Math.random() * 200 + 'px';
            gameArea.appendChild(cloud);
            clouds.push({ element: cloud, x: 0, speed: 1 + Math.random() * 2 });

            const delay = 3000 + Math.random() * 3000;
            setTimeout(spawnCloud, delay);
        }

        function checkCollision(sunRect, obstacleRect) {
            const sunCenterX = sunRect.left + sunRect.width / 2;
            const sunCenterY = sunRect.top + sunRect.height / 2;
            const obstacleCenterX = obstacleRect.left + obstacleRect.width / 2;
            const obstacleCenterY = obstacleRect.top + obstacleRect.height / 2;

            const distanceX = sunCenterX - obstacleCenterX;
            const distanceY = sunCenterY - obstacleCenterY;
            const distance = Math.sqrt(distanceX * distanceX + distanceY * distanceY);

            return distance < 40;
        }

        function gameOver() {
            isGameOver = true;
            cancelAnimationFrame(gameLoop);

            finalScoreEl.textContent = score + 'm';

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('sunriseHighScore', highScore);
                highScoreEl.textContent = highScore;
                newRecordEl.textContent = '🎉 新記録達成！ 🎉';
            } else {
                newRecordEl.textContent = '';
            }

            gameOverScreen.classList.remove('hidden');
        }

        function update() {
            if (isGameOver) return;

            // 太陽の移動
            if (isRising) {
                velocity += 0.8;
            } else {
                velocity -= 0.4;
            }

            velocity = Math.max(-10, Math.min(10, velocity));
            sunY += velocity;
            sunY = Math.max(50, Math.min(gameArea.offsetHeight - 100, sunY));

            updateSunPosition();

            // スコア更新
            const currentScore = Math.floor((sunY - 50) / 10);
            if (currentScore > score) {
                score = currentScore;
                scoreEl.textContent = score;
            }

            // クリア条件
            if (sunY >= gameArea.offsetHeight - 150) {
                isGameOver = true;
                cancelAnimationFrame(gameLoop);
                finalScoreEl.textContent = '🎉 GOAL! 🎉';
                newRecordEl.textContent = '初日の出成功！' + score + 'm';
                gameOverScreen.classList.remove('hidden');
                return;
            }

            // 障害物との衝突判定
            const sunRect = sun.getBoundingClientRect();
            obstacles.forEach((obstacle, index) => {
                const obstacleRect = obstacle.getBoundingClientRect();
                if (checkCollision(sunRect, obstacleRect)) {
                    gameOver();
                    return;
                }

                // 画面外に出たら削除
                if (obstacleRect.top > gameArea.offsetHeight) {
                    obstacle.remove();
                    obstacles.splice(index, 1);
                }
            });

            // 雲の移動
            clouds.forEach((cloud, index) => {
                cloud.x += cloud.speed;
                cloud.element.style.left = cloud.x + 'px';

                // 雲との衝突判定
                const cloudRect = cloud.element.getBoundingClientRect();
                if (checkCollision(sunRect, cloudRect)) {
                    velocity -= 2; // 雲に当たると減速
                }

                // 画面外に出たら削除
                if (cloud.x > gameArea.offsetWidth) {
                    cloud.element.remove();
                    clouds.splice(index, 1);
                }
            });

            gameLoop = requestAnimationFrame(update);
        }

        // タップ/マウス操作
        function startRising(e) {
            if (e.target.classList.contains('btn')) return;
            e.preventDefault();
            isRising = true;
        }

        function stopRising(e) {
            e.preventDefault();
            isRising = false;
        }

        // タッチイベント
        gameArea.addEventListener('touchstart', startRising);
        gameArea.addEventListener('touchend', stopRising);

        // マウスイベント
        gameArea.addEventListener('mousedown', startRising);
        gameArea.addEventListener('mouseup', stopRising);
        gameArea.addEventListener('mouseleave', stopRising);

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期太陽位置
        updateSunPosition();
    </script>
</body>
</html>
