<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Ping Pong - クラシックピンポン</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #eee;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(90deg, #00f5ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 15px;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .score {
            text-align: center;
        }

        .score-label {
            font-size: 0.8rem;
            color: #888;
            display: block;
        }

        .score-value {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #00f5ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .canvas-wrapper {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(0, 245, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.2);
        }

        #gameCanvas {
            width: 100%;
            height: 400px;
            display: block;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.6);
        }

        .controls-info {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .control-btn {
            padding: 12px 24px;
            font-size: 0.9rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: linear-gradient(135deg, #00f5ff, #0080ff);
            color: #000;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 245, 255, 0.4);
        }

        .control-btn:active {
            transform: translateY(0);
        }

        .mobile-controls {
            display: none;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .mobile-btn {
            width: 80px;
            height: 80px;
            font-size: 2rem;
            border: none;
            border-radius: 50%;
            background: rgba(0, 245, 255, 0.3);
            color: #00f5ff;
            cursor: pointer;
            transition: background 0.2s;
            -webkit-user-select: none;
            user-select: none;
        }

        .mobile-btn:active {
            background: rgba(0, 245, 255, 0.6);
        }

        .info {
            text-align: center;
            color: #666;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            display: none;
        }

        .game-over.active {
            display: flex;
        }

        .game-over h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #00f5ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-over p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .score-board {
                gap: 30px;
            }

            .score-value {
                font-size: 2rem;
            }

            #gameCanvas {
                height: 300px;
            }

            .mobile-controls {
                display: flex;
            }

            .controls-info {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏓 Classic Ping Pong</h1>
        <p class="subtitle">クラシックピンポン - シンプルで中毒性のあるゲーム</p>

        <div class="score-board">
            <div class="score">
                <span class="score-label">プレイヤー</span>
                <span class="score-value" id="playerScore">0</span>
            </div>
            <div class="score">
                <span class="score-label">CPU</span>
                <span class="score-value" id="cpuScore">0</span>
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>
        </div>

        <div class="controls-info">
            <button class="control-btn" id="startBtn">ゲーム開始</button>
            <button class="control-btn" id="resetBtn">リセット</button>
        </div>

        <div class="mobile-controls">
            <button class="mobile-btn" id="upBtn">↑</button>
            <button class="mobile-btn" id="downBtn">↓</button>
        </div>

        <p class="info">
            PC: W/Sキーまたは↑/↓キーでパドルを操作<br>
            モバイル: ボタンをタップして操作
        </p>
    </div>

    <div class="game-over" id="gameOver">
        <h2 id="winnerText">🎉 勝利！</h2>
        <p id="finalScore">5 - 3</p>
        <button class="control-btn" id="restartBtn">もう一度プレイ</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ゲーム設定
        const WINNING_SCORE = 5;
        const PADDLE_HEIGHT = 80;
        const PADDLE_WIDTH = 12;
        const BALL_SIZE = 12;
        const PADDLE_SPEED = 8;
        const INITIAL_BALL_SPEED = 6;

        // ゲーム状態
        let playerScore = 0;
        let cpuScore = 0;
        let gameRunning = false;
        let ballSpeed = INITIAL_BALL_SPEED;

        // パドル
        let playerY = 0;
        let cpuY = 0;

        // ボール
        let ball = {
            x: 0,
            y: 0,
            vx: 0,
            vy: 0
        };

        // 入力状態
        let playerMovingUp = false;
        let playerMovingDown = false;

        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            canvas.width = wrapper.clientWidth - 40;
            canvas.height = wrapper.clientHeight - 40;

            // 初期位置を設定
            playerY = canvas.height / 2 - PADDLE_HEIGHT / 2;
            cpuY = canvas.height / 2 - PADDLE_HEIGHT / 2;
            resetBall();
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;

            // ランダムな方向
            const angle = (Math.random() * Math.PI / 2) - Math.PI / 4;
            const direction = Math.random() > 0.5 ? 1 : -1;

            ball.vx = Math.cos(angle) * ballSpeed * direction;
            ball.vy = Math.sin(angle) * ballSpeed;
        }

        function update() {
            if (!gameRunning) return;

            // プレイヤーの移動
            if (playerMovingUp && playerY > 0) {
                playerY -= PADDLE_SPEED;
            }
            if (playerMovingDown && playerY < canvas.height - PADDLE_HEIGHT) {
                playerY += PADDLE_SPEED;
            }

            // CPUの移動（単純なAI）
            const cpuCenter = cpuY + PADDLE_HEIGHT / 2;
            const ballCenter = ball.y;

            if (cpuCenter < ballCenter - 20) {
                cpuY += PADDLE_SPEED * 0.7;
            } else if (cpuCenter > ballCenter + 20) {
                cpuY -= PADDLE_SPEED * 0.7;
            }

            cpuY = Math.max(0, Math.min(canvas.height - PADDLE_HEIGHT, cpuY));

            // ボールの移動
            ball.x += ball.vx;
            ball.y += ball.vy;

            // 上下の壁との衝突
            if (ball.y <= BALL_SIZE / 2 || ball.y >= canvas.height - BALL_SIZE / 2) {
                ball.vy *= -1;
                ball.y = ball.y <= BALL_SIZE / 2 ? BALL_SIZE / 2 : canvas.height - BALL_SIZE / 2;
            }

            // プレイヤーのパドルとの衝突
            const playerPaddleX = 20;
            if (ball.x - BALL_SIZE / 2 <= playerPaddleX + PADDLE_WIDTH &&
                ball.x + BALL_SIZE / 2 >= playerPaddleX &&
                ball.y >= playerY &&
                ball.y <= playerY + PADDLE_HEIGHT) {

                // 反射角度を計算
                const hitPos = (ball.y - playerY) / PADDLE_HEIGHT;
                const angle = (hitPos - 0.5) * Math.PI / 3;

                ballSpeed = Math.min(ballSpeed * 1.05, 15);
                ball.vx = Math.cos(angle) * ballSpeed;
                ball.vy = Math.sin(angle) * ballSpeed;
                ball.x = playerPaddleX + PADDLE_WIDTH + BALL_SIZE / 2;
            }

            // CPUのパドルとの衝突
            const cpuPaddleX = canvas.width - 20 - PADDLE_WIDTH;
            if (ball.x + BALL_SIZE / 2 >= cpuPaddleX &&
                ball.x - BALL_SIZE / 2 <= cpuPaddleX + PADDLE_WIDTH &&
                ball.y >= cpuY &&
                ball.y <= cpuY + PADDLE_HEIGHT) {

                const hitPos = (ball.y - cpuY) / PADDLE_HEIGHT;
                const angle = (hitPos - 0.5) * Math.PI / 3;

                ballSpeed = Math.min(ballSpeed * 1.05, 15);
                ball.vx = -Math.cos(angle) * ballSpeed;
                ball.vy = Math.sin(angle) * ballSpeed;
                ball.x = cpuPaddleX - BALL_SIZE / 2;
            }

            // 得点判定
            if (ball.x < 0) {
                cpuScore++;
                updateScore();
                ballSpeed = INITIAL_BALL_SPEED;
                checkWin();
                resetBall();
            } else if (ball.x > canvas.width) {
                playerScore++;
                updateScore();
                ballSpeed = INITIAL_BALL_SPEED;
                checkWin();
                resetBall();
            }
        }

        function draw() {
            // 背景をクリア
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // センターライン
            ctx.setLineDash([10, 10]);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);

            // プレイヤーのパドル（シアン）
            const playerGradient = ctx.createLinearGradient(20, playerY, 20 + PADDLE_WIDTH, playerY);
            playerGradient.addColorStop(0, '#00f5ff');
            playerGradient.addColorStop(1, '#0080ff');
            ctx.fillStyle = playerGradient;
            ctx.shadowColor = '#00f5ff';
            ctx.shadowBlur = 20;
            ctx.fillRect(20, playerY, PADDLE_WIDTH, PADDLE_HEIGHT);
            ctx.shadowBlur = 0;

            // CPUのパドル（マゼンタ）
            const cpuGradient = ctx.createLinearGradient(canvas.width - 20 - PADDLE_WIDTH, cpuY, canvas.width - 20, cpuY);
            cpuGradient.addColorStop(0, '#ff00ff');
            cpuGradient.addColorStop(1, '#ff0080');
            ctx.fillStyle = cpuGradient;
            ctx.shadowColor = '#ff00ff';
            ctx.shadowBlur = 20;
            ctx.fillRect(canvas.width - 20 - PADDLE_WIDTH, cpuY, PADDLE_WIDTH, PADDLE_HEIGHT);
            ctx.shadowBlur = 0;

            // ボール
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, BALL_SIZE / 2, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.shadowColor = '#fff';
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0;

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        function updateScore() {
            document.getElementById('playerScore').textContent = playerScore;
            document.getElementById('cpuScore').textContent = cpuScore;
        }

        function checkWin() {
            if (playerScore >= WINNING_SCORE || cpuScore >= WINNING_SCORE) {
                gameRunning = false;
                const playerWon = playerScore >= WINNING_SCORE;
                document.getElementById('winnerText').textContent = playerWon ? '🎉 勝利！' : '😢 敗北...';
                document.getElementById('finalScore').textContent = `${playerScore} - ${cpuScore}`;
                document.getElementById('gameOver').classList.add('active');
            }
        }

        function resetGame() {
            playerScore = 0;
            cpuScore = 0;
            ballSpeed = INITIAL_BALL_SPEED;
            updateScore();
            resetBall();
            document.getElementById('gameOver').classList.remove('active');
        }

        // イベントリスナー
        document.addEventListener('keydown', (e) => {
            if (e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp') {
                playerMovingUp = true;
            }
            if (e.key === 's' || e.key === 'S' || e.key === 'ArrowDown') {
                playerMovingDown = true;
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp') {
                playerMovingUp = false;
            }
            if (e.key === 's' || e.key === 'S' || e.key === 'ArrowDown') {
                playerMovingDown = false;
            }
        });

        // モバイルコントロール
        const upBtn = document.getElementById('upBtn');
        const downBtn = document.getElementById('downBtn');

        upBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            playerMovingUp = true;
        });
        upBtn.addEventListener('touchend', () => playerMovingUp = false);
        upBtn.addEventListener('mousedown', () => playerMovingUp = true);
        upBtn.addEventListener('mouseup', () => playerMovingUp = false);
        upBtn.addEventListener('mouseleave', () => playerMovingUp = false);

        downBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            playerMovingDown = true;
        });
        downBtn.addEventListener('touchend', () => playerMovingDown = false);
        downBtn.addEventListener('mousedown', () => playerMovingDown = true);
        downBtn.addEventListener('mouseup', () => playerMovingDown = false);
        downBtn.addEventListener('mouseleave', () => playerMovingDown = false);

        // ボタン
        document.getElementById('startBtn').addEventListener('click', () => {
            if (!gameRunning) {
                gameRunning = true;
            }
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            resetGame();
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            resetGame();
            gameRunning = true;
        });

        // 初期化
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        draw();
    </script>
</body>
</html>
