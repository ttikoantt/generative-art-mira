<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Courier New', monospace;
        }

        #gameCanvas {
            display: block;
        }

        .game-info {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 18px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .score {
            font-size: 36px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .lives {
            font-size: 24px;
            margin-top: 5px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            color: white;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 10;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            display: none;
            z-index: 20;
        }

        .game-over h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ff6b6b;
        }

        .game-over p {
            font-size: 24px;
            margin-bottom: 30px;
        }

        .restart-btn {
            padding: 15px 40px;
            background: #4ecdc4;
            border: none;
            border-radius: 25px;
            color: white;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .restart-btn:hover {
            background: #45b7d1;
            transform: scale(1.05);
        }

        .instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="game-info">
        <div class="score">Score: <span id="scoreDisplay">0</span></div>
        <div class="lives">❤️❤️❤️</div>
    </div>

    <div class="instructions">
        ← → キーまたはタップで移動<br>
        落ちてくるボールをキャッチ！
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">全画面表示</button>

    <div class="game-over" id="gameOver">
        <h1>Game Over</h1>
        <p>Score: <span id="finalScore">0</span></p>
        <button class="restart-btn" id="restartBtn">再挑戦</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const finalScore = document.getElementById('finalScore');
        const gameOverScreen = document.getElementById('gameOver');
        const restartBtn = document.getElementById('restartBtn');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // ゲーム状態
        let score = 0;
        let lives = 3;
        let gameRunning = true;
        let difficulty = 1;

        // プレイヤー（バスケット）
        const player = {
            width: 80,
            height: 15,
            x: width / 2 - 40,
            y: height - 80,
            speed: 8
        };

        // ボール配列
        const balls = [];

        // キー入力
        const keys = {};

        // ボールクラス
        class Ball {
            constructor() {
                this.radius = 15;
                this.x = Math.random() * (width - this.radius * 2) + this.radius;
                this.y = -this.radius;
                this.speed = (Math.random() * 2 + 2) * difficulty;
                this.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.2;
            }

            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // ボールの本体
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0.3)');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // ハイライト
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.beginPath();
                ctx.arc(-5, -5, 5, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        // プレイヤーの描画
        function drawPlayer() {
            ctx.save();

            // バスケットの影
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(player.x + 5, player.y + 5, player.width, player.height);

            // バスケットのグラデーション
            const gradient = ctx.createLinearGradient(player.x, player.y, player.x, player.y + player.height);
            gradient.addColorStop(0, '#4ecdc4');
            gradient.addColorStop(1, '#45b7d1');

            ctx.fillStyle = gradient;
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // バスケットの縁
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.strokeRect(player.x, player.y, player.width, player.height);

            ctx.restore();
        }

        // ゲームオーバー
        function gameOver() {
            gameRunning = false;
            finalScore.textContent = score;
            gameOverScreen.style.display = 'block';
        }

        // ゲームリセット
        function resetGame() {
            score = 0;
            lives = 3;
            difficulty = 1;
            gameRunning = true;
            balls.length = 0;
            player.x = width / 2 - player.width / 2;
            scoreDisplay.textContent = score;
            gameOverScreen.style.display = 'none';
            updateLives();
        }

        // ライフ更新
        function updateLives() {
            let heartsHTML = '';
            for (let i = 0; i < 3; i++) {
                if (i < lives) {
                    heartsHTML += '❤️';
                } else {
                    heartsHTML += '🖤';
                }
            }
            document.querySelector('.lives').textContent = heartsHTML;
        }

        // ボールを生成
        function spawnBall() {
            if (gameRunning && Math.random() < 0.02 * difficulty) {
                balls.push(new Ball());
            }
        }

        // 衝突判定
        function checkCollision(ball) {
            return ball.x > player.x &&
                   ball.x < player.x + player.width &&
                   ball.y + ball.radius > player.y &&
                   ball.y - ball.radius < player.y + player.height;
        }

        // ゲームループ
        function gameLoop() {
            if (gameRunning) {
                ctx.clearRect(0, 0, width, height);

                // プレイヤーの移動
                if (keys['ArrowLeft'] || keys['TouchLeft']) {
                    player.x -= player.speed;
                }
                if (keys['ArrowRight'] || keys['TouchRight']) {
                    player.x += player.speed;
                }

                // 画面境界
                if (player.x < 0) player.x = 0;
                if (player.x + player.width > width) player.x = width - player.width;

                // ボールの更新と描画
                for (let i = balls.length - 1; i >= 0; i--) {
                    const ball = balls[i];
                    ball.update();
                    ball.draw();

                    // キャッチ判定
                    if (checkCollision(ball)) {
                        score += 10;
                        scoreDisplay.textContent = score;
                        balls.splice(i, 1);

                        // 難易度アップ
                        if (score % 50 === 0) {
                            difficulty += 0.1;
                        }
                        continue;
                    }

                    // 画面外に出た
                    if (ball.y - ball.radius > height) {
                        balls.splice(i, 1);
                        lives--;
                        updateLives();

                        if (lives <= 0) {
                            gameOver();
                        }
                    }
                }

                drawPlayer();
                spawnBall();
            }

            requestAnimationFrame(gameLoop);
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // タッチ操作
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            if (touch.clientX < width / 2) {
                keys['TouchLeft'] = true;
            } else {
                keys['TouchRight'] = true;
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            keys['TouchLeft'] = false;
            keys['TouchRight'] = false;
        }, { passive: false });

        // 全画面表示
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // ウィンドウサイズ変更
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            player.y = height - 80;
        });

        // 再スタート
        restartBtn.addEventListener('click', resetGame);

        // ゲーム開始
        gameLoop();
    </script>
</body>
</html>
