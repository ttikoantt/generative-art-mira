<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tap Sprint | Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            color: white;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            font-size: 18px;
        }
        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #00ff88;
        }
        .game-area {
            flex: 1;
            width: 100%;
            max-width: 600px;
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
        }
        .target {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s ease;
            animation: appear 0.3s ease;
        }
        .target:active {
            transform: scale(0.9);
        }
        @keyframes appear {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        .popped {
            animation: pop 0.2s ease forwards;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }
        .overlay h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }
        .overlay p {
            font-size: 18px;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.7);
        }
        .overlay .score {
            font-size: 48px;
            color: #00ff88;
            margin: 20px 0;
        }
        .btn {
            background: linear-gradient(135deg, #00ff88, 00cc6a);
            border: none;
            color: #1a1a2e;
            padding: 15px 50px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
        }
        .btn:active {
            transform: scale(0.95);
        }
        .fullscreen-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🎯 Tap Sprint</h1>
            <div class="stats">
                <div class="stat">
                    <span class="stat-value" id="score">0</span>
                    <span>Score</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="time">30</span>
                    <span>Time</span>
                </div>
            </div>
        </div>
        <div class="game-area" id="gameArea"></div>
    </div>

    <div class="overlay" id="startOverlay">
        <h2>🎯 Tap Sprint</h2>
        <p>Tap as many targets as you can!</p>
        <p>You have 30 seconds</p>
        <button class="btn" id="startBtn">Start Game</button>
    </div>

    <div class="overlay hidden" id="endOverlay">
        <h2>⏰ Time's Up!</h2>
        <p>Your Score</p>
        <div class="score" id="finalScore">0</div>
        <p id="highScoreText">High Score: 0</p>
        <button class="btn" id="restartBtn">Play Again</button>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">全画面表示</button>

    <script>
        const gameArea = document.getElementById('gameArea');
        const scoreEl = document.getElementById('score');
        const timeEl = document.getElementById('time');
        const startOverlay = document.getElementById('startOverlay');
        const endOverlay = document.getElementById('endOverlay');
        const finalScoreEl = document.getElementById('finalScore');
        const highScoreText = document.getElementById('highScoreText');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let score = 0;
        let timeLeft = 30;
        let gameActive = false;
        let gameTimer = null;
        let spawnTimer = null;
        let highScore = localStorage.getItem('tapSprintHighScore') || 0;
        let targets = [];
        let combo = 0;

        const colors = [
            'linear-gradient(135deg, #ff6b6b, #ee5a5a)',
            'linear-gradient(135deg, #4ecdc4, #44a08d)',
            'linear-gradient(135deg, #a8e6cf, #56ab2f)',
            'linear-gradient(135deg, #ffd93d, #f6c23e)',
            'linear-gradient(135deg, #6c5ce7, #a29bfe)',
            'linear-gradient(135deg, #fd79a8, #e84393)'
        ];

        function createTarget() {
            if (!gameActive) return;

            const target = document.createElement('div');
            target.className = 'target';

            const size = Math.random() * 40 + 40;
            const x = Math.random() * (gameArea.offsetWidth - size);
            const y = Math.random() * (gameArea.offsetHeight - size);
            const color = colors[Math.floor(Math.random() * colors.length)];

            target.style.width = size + 'px';
            target.style.height = size + 'px';
            target.style.left = x + 'px';
            target.style.top = y + 'px';
            target.style.background = color;

            // クリックイベント
            const handleClick = () => {
                if (!gameActive) return;
                combo++;
                const points = 10 + Math.floor(combo / 5) * 5;
                score += points;
                scoreEl.textContent = score;
                target.classList.add('popped');
                setTimeout(() => {
                    if (target.parentNode) {
                        target.remove();
                    }
                }, 200);
            };

            target.addEventListener('click', handleClick);
            target.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleClick();
            }, { passive: false });

            gameArea.appendChild(target);
            targets.push(target);

            // 自動的に消える
            setTimeout(() => {
                if (target.parentNode && !target.classList.contains('popped')) {
                    target.remove();
                    combo = 0; // ミスでコンボリセット
                }
            }, 2000);
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            combo = 0;
            gameActive = true;
            targets = [];

            scoreEl.textContent = score;
            timeEl.textContent = timeLeft;

            startOverlay.classList.add('hidden');
            endOverlay.classList.add('hidden');

            // タイマー開始
            gameTimer = setInterval(() => {
                timeLeft--;
                timeEl.textContent = timeLeft;
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // ターゲット生成
            spawnTimer = setInterval(() => {
                createTarget();
                if (timeLeft < 20) {
                    setTimeout(createTarget, 200); // 後半は早く
                }
                if (timeLeft < 10) {
                    setTimeout(createTarget, 400);
                }
            }, 600);
        }

        function endGame() {
            gameActive = false;
            clearInterval(gameTimer);
            clearInterval(spawnTimer);

            // 全ターゲット削除
            targets.forEach(t => t.remove());
            targets = [];

            // ハイスコア更新
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('tapSprintHighScore', highScore);
            }

            finalScoreEl.textContent = score;
            highScoreText.textContent = `High Score: ${highScore}`;
            endOverlay.classList.remove('hidden');
        }

        // 全画面
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // 初期ハイスコア表示
        highScoreText.textContent = `High Score: ${highScore}`;
    </script>
</body>
</html>
