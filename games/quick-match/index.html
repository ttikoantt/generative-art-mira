<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Match - Color Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #f5576c;
        }

        .game-area {
            width: 100%;
            max-width: 400px;
        }

        .target-color {
            width: 100%;
            height: 150px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        .target-color.correct {
            animation: correct 0.3s ease;
        }

        .target-color.wrong {
            animation: wrong 0.3s ease;
        }

        @keyframes correct {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); box-shadow: 0 10px 40px rgba(76, 175, 80, 0.5); }
        }

        @keyframes wrong {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .color-btn {
            aspect-ratio: 1;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.5rem;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .color-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .color-btn:active {
            transform: translateY(0);
        }

        .color-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }

        .color-btn:active::before {
            width: 200%;
            height: 200%;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .overlay-content {
            text-align: center;
            padding: 40px;
            max-width: 400px;
        }

        .overlay-content h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay-content p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .overlay-content .final-score {
            font-size: 4rem;
            font-weight: bold;
            margin: 20px 0;
            color: #f5576c;
        }

        .start-btn {
            padding: 15px 50px;
            font-size: 1.3rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(245, 87, 108, 0.6);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 50;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .hidden {
            display: none !important;
        }

        .timer-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            transition: width 0.1s linear;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            .target-color {
                height: 120px;
                font-size: 1rem;
            }

            .overlay-content h2 {
                font-size: 2.5rem;
            }

            .final-score {
                font-size: 3rem !important;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <div class="header">
            <h1>🎯 Quick Match</h1>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">ハイスコア</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>

        <div class="game-area">
            <div class="timer-bar">
                <div class="timer-fill" id="timerFill"></div>
            </div>

            <div class="target-color" id="targetColor">
                赤色のボタンを押して！
            </div>

            <div class="options" id="options">
                <!-- ボタンはJSで生成 -->
            </div>
        </div>
    </div>

    <div class="overlay" id="startOverlay">
        <div class="overlay-content">
            <h2>🎯 Quick Match</h2>
            <p>表示された色と同じ名前のボタンを<br>素早くタップしてください！</p>
            <button class="start-btn" onclick="startGame()">スタート</button>
        </div>
    </div>

    <div class="overlay hidden" id="gameOverOverlay">
        <div class="overlay-content">
            <h2>ゲームオーバー！</h2>
            <p>あなたのスコア</p>
            <div class="final-score" id="finalScore">0</div>
            <button class="start-btn" onclick="startGame()">もう一度</button>
        </div>
    </div>

    <script>
        const colors = [
            { name: '赤', color: '#e74c3c' },
            { name: '青', color: '#3498db' },
            { name: '緑', color: '#2ecc71' },
            { name: '黄', color: '#f1c40f' },
            { name: '紫', color: '#9b59b6' },
            { name: 'オレンジ', color: '#e67e22' },
            { name: 'ピンク', color: '#e91e63' },
            { name: '水色', color: '#00bcd4' }
        ];

        let score = 0;
        let highScore = localStorage.getItem('quickMatchHighScore') || 0;
        let timeLeft = 30;
        let timerInterval;
        let currentTarget = null;
        let isPlaying = false;

        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const targetColorEl = document.getElementById('targetColor');
        const optionsEl = document.getElementById('options');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScoreEl = document.getElementById('finalScore');
        const timerFill = document.getElementById('timer-fill');

        highScoreEl.textContent = highScore;

        function startGame() {
            score = 0;
            timeLeft = 30;
            scoreEl.textContent = '0';
            startOverlay.classList.add('hidden');
            gameOverOverlay.classList.add('hidden');
            isPlaying = true;

            generateQuestion();
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                const percentage = (timeLeft / 30) * 100;
                timerFill.style.width = percentage + '%';

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 100);
        }

        function generateQuestion() {
            // ターゲットの色を選択
            currentTarget = colors[Math.floor(Math.random() * colors.length)];

            // ターゲットを表示
            targetColorEl.textContent = `${currentTarget.name}色のボタンを押して！`;
            targetColorEl.style.background = currentTarget.color;

            // 選択肢を生成（ターゲットを含む4色）
            let options = [currentTarget];
            while (options.length < 4) {
                let randomColor = colors[Math.floor(Math.random() * colors.length)];
                if (!options.includes(randomColor)) {
                    options.push(randomColor);
                }
            }

            // シャッフル
            options = options.sort(() => Math.random() - 0.5);

            // ボタンを生成
            optionsEl.innerHTML = '';
            options.forEach(color => {
                const btn = document.createElement('button');
                btn.className = 'color-btn';
                btn.style.background = color.color;
                btn.textContent = color.name;
                btn.onclick = () => checkAnswer(color);
                optionsEl.appendChild(btn);
            });
        }

        function checkAnswer(selected) {
            if (!isPlaying) return;

            if (selected.name === currentTarget.name) {
                // 正解
                score++;
                scoreEl.textContent = score;
                targetColorEl.classList.add('correct');
                setTimeout(() => {
                    targetColorEl.classList.remove('correct');
                    generateQuestion();
                }, 300);
            } else {
                // 不正解
                timeLeft -= 3; // ペナルティ
                targetColorEl.classList.add('wrong');
                setTimeout(() => {
                    targetColorEl.classList.remove('wrong');
                }, 300);
            }
        }

        function endGame() {
            isPlaying = false;
            clearInterval(timerInterval);

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('quickMatchHighScore', highScore);
                highScoreEl.textContent = highScore;
            }

            finalScoreEl.textContent = score;
            gameOverOverlay.classList.remove('hidden');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
