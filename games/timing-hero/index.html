<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timing Hero - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 28px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
        }
        .stat {
            text-align: center;
            color: #fff;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .stat-label {
            font-size: 14px;
            opacity: 0.8;
        }
        .game-area {
            width: 300px;
            height: 300px;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .game-area:active {
            transform: scale(0.95);
        }
        .target-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            top: 0;
            left: 0;
        }
        .perfect-zone {
            position: absolute;
            width: 120px;
            height: 120px;
            border: 4px solid #fff;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
        .indicator {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #fff;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
            transition: all 0.05s;
        }
        .feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }
        .feedback.show {
            animation: feedbackAnim 0.5s ease-out;
        }
        @keyframes feedbackAnim {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }
        .start-screen, .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .start-screen h2, .game-over-screen h2 {
            color: #fff;
            font-size: 36px;
            margin-bottom: 20px;
        }
        .start-screen p, .game-over-screen p {
            color: #aaa;
            font-size: 16px;
            margin-bottom: 30px;
            text-align: center;
            max-width: 400px;
            padding: 0 20px;
        }
        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .start-btn:hover {
            transform: scale(1.05);
        }
        .final-score {
            color: #fff;
            font-size: 64px;
            font-weight: bold;
            margin: 20px 0;
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            border: none;
            width: 50px;
            height: 50px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            z-index: 1000;
        }
        .fullscreen-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        .hidden {
            display: none !important;
        }
        .combo-display {
            position: absolute;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <h1>⏱️ Timing Hero</h1>

    <div class="stats">
        <div class="stat">
            <div class="stat-value" id="score">0</div>
            <div class="stat-label">SCORE</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="best-combo">0</div>
            <div class="stat-label">BEST COMBO</div>
        </div>
    </div>

    <div class="combo-display" id="combo"></div>

    <div class="game-area" id="game-area">
        <div class="target-ring"></div>
        <div class="perfect-zone"></div>
        <div class="indicator" id="indicator"></div>
    </div>

    <div class="feedback" id="feedback"></div>

    <!-- スタート画面 -->
    <div class="start-screen" id="start-screen">
        <h2>⏱️ Timing Hero</h2>
        <p>白い点が中央の白い円に重なった瞬間にクリック！<br>タイミングを合わせてハイスコアを目指そう！</p>
        <button class="start-btn" onclick="startGame()">スタート</button>
    </div>

    <!-- ゲームオーバー画面 -->
    <div class="game-over-screen hidden" id="game-over-screen">
        <h2>Game Over</h2>
        <div class="final-score" id="final-score">0</div>
        <p id="final-message"></p>
        <button class="start-btn" onclick="startGame()">もう一度</button>
    </div>

    <script>
        const gameArea = document.getElementById('game-area');
        const indicator = document.getElementById('indicator');
        const feedback = document.getElementById('feedback');
        const scoreDisplay = document.getElementById('score');
        const comboDisplay = document.getElementById('combo');
        const bestComboDisplay = document.getElementById('best-combo');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScore = document.getElementById('final-score');
        const finalMessage = document.getElementById('final-message');

        let score = 0;
        let combo = 0;
        let bestCombo = 0;
        let angle = 0;
        let speed = 0.03;
        let gameRunning = false;
        let lives = 3;
        let animationId = null;

        function startGame() {
            score = 0;
            combo = 0;
            bestCombo = 0;
            angle = 0;
            speed = 0.03;
            lives = 3;
            gameRunning = true;

            scoreDisplay.textContent = '0';
            bestComboDisplay.textContent = '0';
            comboDisplay.textContent = '';
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');

            gameLoop();
        }

        function gameLoop() {
            if (!gameRunning) return;

            angle += speed;
            if (angle >= Math.PI * 2) {
                angle -= Math.PI * 2;
            }

            // インジケーターの位置更新
            const radius = 135;
            const x = Math.cos(angle) * radius;
            const y = Math.sin(angle) * radius;

            indicator.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;

            animationId = requestAnimationFrame(gameLoop);
        }

        function handleClick() {
            if (!gameRunning) return;

            // 角度が0（中央）に近いかどうか判定
            const targetAngle = 0;
            let diff = Math.abs(angle - targetAngle);
            if (diff > Math.PI) {
                diff = Math.PI * 2 - diff;
            }

            const perfectThreshold = 0.15;
            const goodThreshold = 0.3;
            const okThreshold = 0.5;

            if (diff < perfectThreshold) {
                // PERFECT!
                showFeedback('PERFECT! 🎯', '#00ff00');
                score += 100;
                combo++;
                speed = Math.min(speed + 0.002, 0.08);
            } else if (diff < goodThreshold) {
                // GOOD
                showFeedback('GOOD! 👍', '#ffff00');
                score += 50;
                combo++;
            } else if (diff < okThreshold) {
                // OK
                showFeedback('OK 👌', '#ffa500');
                score += 20;
                combo = 0;
            } else {
                // MISS
                showFeedback('MISS! 💔', '#ff0000');
                combo = 0;
                lives--;
                if (lives <= 0) {
                    gameOver();
                    return;
                }
            }

            if (combo > bestCombo) {
                bestCombo = combo;
            }

            scoreDisplay.textContent = score;
            bestComboDisplay.textContent = bestCombo;
            comboDisplay.textContent = combo > 1 ? `${combo} COMBO!` : '';
        }

        function showFeedback(text, color) {
            feedback.textContent = text;
            feedback.style.color = color;
            feedback.classList.remove('show');
            void feedback.offsetWidth; // リフローを強制
            feedback.classList.add('show');
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);

            finalScore.textContent = score;

            if (score >= 2000) {
                finalMessage.textContent = '🏆 伝説のタイミングマスター！';
            } else if (score >= 1000) {
                finalMessage.textContent = '🥇 素晴らしい反応速度！';
            } else if (score >= 500) {
                finalMessage.textContent = '🥈 なかなかいい！';
            } else {
                finalMessage.textContent = '🥉 練習あるのみ！';
            }

            gameOverScreen.classList.remove('hidden');
        }

        // 全画面表示
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        gameArea.addEventListener('click', handleClick);
        gameArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick();
        });

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && gameRunning) {
                e.preventDefault();
                handleClick();
            }
        });
    </script>
</body>
</html>
