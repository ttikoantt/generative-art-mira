<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Snake</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: none;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #canvas {
            display: block;
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
        }

        .score {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #0ff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #0ff;
            z-index: 100;
        }

        .highScore {
            position: fixed;
            top: 55px;
            left: 50%;
            transform: translateX(-50%);
            color: #f0f;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 0 0 10px #f0f;
            z-index: 100;
        }

        .gameOver {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #0ff;
            text-align: center;
            z-index: 200;
            display: none;
        }

        .gameOver h1 {
            color: #f0f;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #f0f;
        }

        .gameOver p {
            color: #0ff;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .restartBtn {
            background: linear-gradient(135deg, #0ff, #f0f);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .restartBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            text-align: center;
            z-index: 100;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid rgba(0, 255, 255, 0.5);
            color: #0ff;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 255, 0.3);
        }

        .startScreen {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #0ff;
            text-align: center;
            z-index: 200;
        }

        .startScreen h1 {
            color: #0ff;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #0ff;
        }

        .startScreen p {
            color: #fff;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .startBtn {
            background: linear-gradient(135deg, #0ff, #f0f);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .startBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="score">SCORE: <span id="score">0</span></div>
        <div class="highScore">HIGH: <span id="highScore">0</span></div>
        <canvas id="canvas"></canvas>
        <div class="controls">矢印キーまたはスワイプで操作</div>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

        <div class="startScreen" id="startScreen">
            <h1>NEON SNAKE</h1>
            <p>矢印キーまたはスワイプで操作<br>リンゴを食べて伸びよう！</p>
            <button class="startBtn" onclick="startGame()">START</button>
        </div>

        <div class="gameOver" id="gameOver">
            <h1>GAME OVER</h1>
            <p>SCORE: <span id="finalScore">0</span></p>
            <button class="restartBtn" onclick="restartGame()">RESTART</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let gridSize = 20;
        let tileCount;
        let width, height;

        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('neonSnakeHighScore') || 0;
        let gameRunning = false;
        let gameLoop;
        let particles = [];

        function resize() {
            const maxWidth = Math.min(window.innerWidth - 40, 600);
            const maxHeight = Math.min(window.innerHeight - 150, 600);
            const size = Math.min(maxWidth, maxHeight);

            width = canvas.width = Math.floor(size / gridSize) * gridSize;
            height = canvas.height = Math.floor(size / gridSize) * gridSize;
            tileCount = width / gridSize;
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.life = 1;
                this.decay = Math.random() * 0.03 + 0.02;
                this.color = color;
                this.size = Math.random() * 4 + 2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                this.size *= 0.95;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function createParticles(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function init() {
            resize();
            document.getElementById('highScore').textContent = highScore;
            snake = [
                { x: Math.floor(tileCount / 2), y: Math.floor(tileCount / 2) }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            document.getElementById('score').textContent = score;
            spawnFood();
            particles = [];
        }

        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * (height / gridSize))
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function update() {
            direction = { ...nextDirection };

            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // Wall collision (wrap around)
            if (head.x < 0) head.x = tileCount - 1;
            if (head.x >= tileCount) head.x = 0;
            if (head.y < 0) head.y = Math.floor(height / gridSize) - 1;
            if (head.y >= height / gridSize) head.y = 0;

            // Self collision
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // Eat food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                createParticles(
                    head.x * gridSize + gridSize / 2,
                    head.y * gridSize + gridSize / 2,
                    '#0ff',
                    20
                );
                spawnFood();
            } else {
                snake.pop();
            }

            // Update particles
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => p.update());
        }

        function draw() {
            // Clear with trail effect
            ctx.fillStyle = 'rgba(10, 10, 10, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // Draw grid
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, height);
                ctx.stroke();
            }
            for (let i = 0; i <= height / gridSize; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(width, i * gridSize);
                ctx.stroke();
            }

            // Draw particles
            particles.forEach(p => p.draw());

            // Draw food
            const foodX = food.x * gridSize + gridSize / 2;
            const foodY = food.y * gridSize + gridSize / 2;

            ctx.save();
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#0ff';
            ctx.fillStyle = '#0ff';
            ctx.beginPath();
            ctx.arc(foodX, foodY, gridSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Draw snake
            snake.forEach((segment, index) => {
                const x = segment.x * gridSize;
                const y = segment.y * gridSize;
                const hue = (180 + index * 5) % 360;

                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
                ctx.fillStyle = `hsl(${hue}, 100%, ${60 - index}%)`;
                ctx.fillRect(x + 1, y + 1, gridSize - 2, gridSize - 2);
                ctx.restore();
            });
        }

        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('neonSnakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            init();
            gameRunning = true;
            gameLoop = setInterval(() => {
                update();
                draw();
            }, 100);
        }

        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            init();
            gameRunning = true;
            gameLoop = setInterval(() => {
                update();
                draw();
            }, 100);
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;

            switch(e.key) {
                case 'ArrowUp':
                    if (direction.y === 0) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                    if (direction.y === 0) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                    if (direction.x === 0) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                    if (direction.x === 0) nextDirection = { x: 1, y: 0 };
                    break;
            }
        });

        // Touch controls
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            if (!gameRunning) return;

            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 0 && direction.x === 0) {
                    nextDirection = { x: 1, y: 0 };
                } else if (dx < 0 && direction.x === 0) {
                    nextDirection = { x: -1, y: 0 };
                }
            } else {
                if (dy > 0 && direction.y === 0) {
                    nextDirection = { x: 0, y: 1 };
                } else if (dy < 0 && direction.y === 0) {
                    nextDirection = { x: 0, y: -1 };
                }
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', () => {
            if (gameRunning) {
                resize();
            }
        });

        // Initial setup
        resize();
    </script>
</body>
</html>
