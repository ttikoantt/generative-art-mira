<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake Classic</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            padding: 20px;
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            margin-bottom: 10px;
            color: #0ff;
            font-size: 18px;
            text-shadow: 0 0 10px #0ff;
        }

        .game-canvas {
            border: 2px solid #0ff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3),
                        inset 0 0 20px rgba(0, 255, 255, 0.1);
            border-radius: 8px;
            background: #050510;
        }

        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(2, 60px);
            gap: 10px;
            justify-content: center;
        }

        .control-btn {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: #0ff;
            font-size: 24px;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .control-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .control-btn:active {
            transform: scale(0.95);
            background: rgba(0, 255, 255, 0.3);
        }

        .control-btn.up { grid-column: 2; grid-row: 1; }
        .control-btn.left { grid-column: 1; grid-row: 2; }
        .control-btn.down { grid-column: 2; grid-row: 2; }
        .control-btn.right { grid-column: 3; grid-row: 2; }

        .fullscreen-btn {
            margin-top: 15px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: #0ff;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 255, 0.2);
        }

        .game-over {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #f0f;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            z-index: 100;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.5);
        }

        .game-over h2 {
            color: #f0f;
            font-size: 32px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #f0f;
        }

        .game-over p {
            color: #fff;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .restart-btn {
            background: #f0f;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .restart-btn:hover {
            box-shadow: 0 0 20px #f0f;
            transform: scale(1.05);
        }

        .instructions {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            margin-top: 15px;
        }

        @media (max-width: 500px) {
            .game-canvas {
                width: 320px;
                height: 320px;
            }
            
            .controls {
                grid-template-columns: repeat(3, 55px);
                grid-template-rows: repeat(2, 55px);
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="score-board">
            <div>Score: <span id="score">0</span></div>
            <div>High Score: <span id="highScore">0</span></div>
        </div>
        
        <canvas id="gameCanvas" class="game-canvas" width="400" height="400"></canvas>
        
        <div class="controls">
            <button class="control-btn up" data-dir="up">▲</button>
            <button class="control-btn left" data-dir="left">◀</button>
            <button class="control-btn down" data-dir="down">▼</button>
            <button class="control-btn right" data-dir="right">▶</button>
        </div>
        
        <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>
        
        <p class="instructions">矢印キーまたはボタンで操作</p>
    </div>

    <div class="game-over" id="gameOver">
        <h2>GAME OVER</h2>
        <p>Score: <span id="finalScore">0</span></p>
        <button class="restart-btn" id="restartBtn">再挑戦</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const gameOverElement = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const controlBtns = document.querySelectorAll('.control-btn');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('neonSnakeHighScore') || 0;
        let gameRunning = true;
        let gameSpeed = 100;
        let lastTime = 0;

        highScoreElement.textContent = highScore;

        function init() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            scoreElement.textContent = score;
            gameRunning = true;
            gameOverElement.style.display = 'none';
            spawnFood();
        }

        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function update() {
            direction = { ...nextDirection };

            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // 壁との衝突（ラップアラウンド）
            if (head.x < 0) head.x = tileCount - 1;
            if (head.x >= tileCount) head.x = 0;
            if (head.y < 0) head.y = tileCount - 1;
            if (head.y >= tileCount) head.y = 0;

            // 自分との衝突
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 食べ物を食べた
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                spawnFood();
                
                // スピードアップ
                if (score % 50 === 0 && gameSpeed > 50) {
                    gameSpeed -= 5;
                }
            } else {
                snake.pop();
            }
        }

        function draw() {
            // 背景
            ctx.fillStyle = '#050510';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // グリッド
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 蛇を描く
            snake.forEach((segment, index) => {
                const alpha = 1 - (index / snake.length) * 0.7;
                const hue = (Date.now() * 0.1 + index * 5) % 360;
                
                // グロー効果
                ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
                ctx.shadowBlur = index === 0 ? 20 : 10;
                
                ctx.fillStyle = `hsla(${hue}, 100%, 60%, ${alpha})`;
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
            });

            ctx.shadowBlur = 0;

            // 食べ物を描く
            ctx.shadowColor = '#f0f';
            ctx.shadowBlur = 15;
            ctx.fillStyle = '#f0f';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();

            ctx.shadowBlur = 0;
        }

        function gameOver() {
            gameRunning = false;
            
            if (score > highScore) {
                highScore = score;
                highScoreElement.textContent = highScore;
                localStorage.setItem('neonSnakeHighScore', highScore);
            }
            
            finalScoreElement.textContent = score;
            gameOverElement.style.display = 'block';
        }

        function gameLoop(currentTime) {
            if (!gameRunning) {
                requestAnimationFrame(gameLoop);
                return;
            }

            const deltaTime = currentTime - lastTime;
            
            if (deltaTime >= gameSpeed) {
                update();
                lastTime = currentTime;
            }
            
            draw();
            requestAnimationFrame(gameLoop);
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            
            switch(e.key) {
                case 'ArrowUp':
                    if (direction.y === 0) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                    if (direction.y === 0) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                    if (direction.x === 0) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                    if (direction.x === 0) nextDirection = { x: 1, y: 0 };
                    break;
            }
        });

        // ボタン操作
        controlBtns.forEach(btn => {
            const handlePress = (e) => {
                e.preventDefault();
                if (!gameRunning) return;
                
                const dir = btn.dataset.dir;
                switch(dir) {
                    case 'up':
                        if (direction.y === 0) nextDirection = { x: 0, y: -1 };
                        break;
                    case 'down':
                        if (direction.y === 0) nextDirection = { x: 0, y: 1 };
                        break;
                    case 'left':
                        if (direction.x === 0) nextDirection = { x: -1, y: 0 };
                        break;
                    case 'right':
                        if (direction.x === 0) nextDirection = { x: 1, y: 0 };
                        break;
                }
            };
            
            btn.addEventListener('mousedown', handlePress);
            btn.addEventListener('touchstart', handlePress);
        });

        // 再スタート
        restartBtn.addEventListener('click', () => {
            gameSpeed = 100;
            init();
        });

        // 全画面
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // ゲーム開始
        init();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
