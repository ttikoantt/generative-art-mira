<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        #gameContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        #gameCanvas {
            border: 2px solid #2a2a3a;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 255, 150, 0.3);
        }

        #score {
            color: #00ff96;
            font-size: 24px;
            font-weight: bold;
        }

        #highScore {
            color: #ff6b9d;
            font-size: 16px;
        }

        #instructions {
            color: #8a8aaa;
            font-size: 12px;
            text-align: center;
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 15, 0.95);
            padding: 30px;
            border-radius: 10px;
            border: 2px solid #00ff96;
            text-align: center;
            color: #00ff96;
            z-index: 100;
        }

        #gameOverScreen {
            display: none;
            border-color: #ff6b9d;
            color: #ff6b9d;
        }

        button {
            background: transparent;
            border: 2px solid #00ff96;
            color: #00ff96;
            padding: 10px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
        }

        button:hover {
            background: rgba(0, 255, 150, 0.2);
        }

        #gameOverScreen button {
            border-color: #ff6b9d;
            color: #ff6b9d;
        }

        #gameOverScreen button:hover {
            background: rgba(255, 107, 157, 0.2);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 150, 0.2);
            border: 1px solid #00ff96;
            color: #00ff96;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 150, 0.3);
        }

        #mobileControls {
            display: none;
            gap: 10px;
            margin-top: 15px;
        }

        .control-row {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            background: rgba(0, 255, 150, 0.2);
            border: 2px solid #00ff96;
            border-radius: 10px;
            color: #00ff96;
            font-size: 24px;
            cursor: pointer;
            user-select: none;
        }

        .control-btn:active {
            background: rgba(0, 255, 150, 0.4);
        }

        @media (max-width: 768px) {
            #mobileControls {
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            #instructions {
                display: none;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div id="gameContainer">
        <div id="score">SCORE: <span id="scoreValue">0</span></div>
        <div id="highScore">HIGH SCORE: <span id="highScoreValue">0</span></div>
        <canvas id="gameCanvas"></canvas>
        <div id="instructions">矢印キーで操作 | スペースで一時停止</div>

        <div id="mobileControls">
            <div class="control-row">
                <button class="control-btn" ontouchstart="changeDirection('up')">↑</button>
            </div>
            <div class="control-row">
                <button class="control-btn" ontouchstart="changeDirection('left')">←</button>
                <button class="control-btn" ontouchstart="changeDirection('right')">→</button>
            </div>
            <div class="control-row">
                <button class="control-btn" ontouchstart="changeDirection('down')">↓</button>
            </div>
        </div>
    </div>

    <div id="startScreen">
        <h1>NEON SNAKE</h1>
        <p>スネークゲーム</p>
        <button onclick="startGame()">スタート</button>
    </div>

    <div id="gameOverScreen">
        <h1>GAME OVER</h1>
        <p>SCORE: <span id="finalScore">0</span></p>
        <button onclick="startGame()">リプレイ</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 設定
        const config = {
            gridSize: 20,
            gridCount: 20,
            initialSpeed: 150,
            speedIncrease: 5
        };

        // キャンバスサイズ設定
        const canvasSize = Math.min(window.innerWidth - 40, window.innerHeight - 300, 400);
        canvas.width = canvasSize;
        canvas.height = canvasSize;
        config.gridSize = Math.floor(canvasSize / config.gridCount);

        // ゲーム状態
        let snake = [];
        let direction = 'right';
        let nextDirection = 'right';
        let food = {};
        let score = 0;
        let highScore = parseInt(localStorage.getItem('neonSnakeHighScore')) || 0;
        let gameLoop = null;
        let gameSpeed = config.initialSpeed;
        let isPaused = false;
        let isRunning = false;

        // ハイスコア表示
        document.getElementById('highScoreValue').textContent = highScore;

        // 初期化
        function init() {
            const startX = Math.floor(config.gridCount / 2);
            const startY = Math.floor(config.gridCount / 2);

            snake = [
                { x: startX, y: startY },
                { x: startX - 1, y: startY },
                { x: startX - 2, y: startY }
            ];

            direction = 'right';
            nextDirection = 'right';
            score = 0;
            gameSpeed = config.initialSpeed;

            updateScore();
            generateFood();
        }

        // 食べ物を生成
        function generateFood() {
            let validPosition = false;

            while (!validPosition) {
                food = {
                    x: Math.floor(Math.random() * config.gridCount),
                    y: Math.floor(Math.random() * config.gridCount)
                };

                validPosition = !snake.some(segment =>
                    segment.x === food.x && segment.y === food.y
                );
            }
        }

        // 方向変更
        function changeDirection(newDir) {
            const opposites = {
                up: 'down',
                down: 'up',
                left: 'right',
                right: 'left'
            };

            if (newDir !== opposites[direction]) {
                nextDirection = newDir;
            }
        }

        // キー入力
        document.addEventListener('keydown', (e) => {
            if (!isRunning) return;

            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    changeDirection('up');
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    changeDirection('down');
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    changeDirection('left');
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    changeDirection('right');
                    break;
                case ' ':
                    e.preventDefault();
                    togglePause();
                    break;
            }
        });

        // 一時停止
        function togglePause() {
            isPaused = !isPaused;
        }

        // スコア更新
        function updateScore() {
            document.getElementById('scoreValue').textContent = score;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('neonSnakeHighScore', highScore);
                document.getElementById('highScoreValue').textContent = highScore;
            }
        }

        // 衝突チェック
        function checkCollision(head) {
            // 壁との衝突
            if (head.x < 0 || head.x >= config.gridCount ||
                head.y < 0 || head.y >= config.gridCount) {
                return true;
            }

            // 自分との衝突
            return snake.some(segment =>
                segment.x === head.x && segment.y === head.y
            );
        }

        // 描画
        function draw() {
            // 背景
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // グリッド
            ctx.strokeStyle = 'rgba(0, 255, 150, 0.1)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= config.gridCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * config.gridSize, 0);
                ctx.lineTo(i * config.gridSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * config.gridSize);
                ctx.lineTo(canvas.width, i * config.gridSize);
                ctx.stroke();
            }

            // スネーク
            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * config.gridSize + config.gridSize / 2,
                    segment.y * config.gridSize + config.gridSize / 2,
                    0,
                    segment.x * config.gridSize + config.gridSize / 2,
                    segment.y * config.gridSize + config.gridSize / 2,
                    config.gridSize / 2
                );

                const hue = (index * 5 + Date.now() / 20) % 360;
                gradient.addColorStop(0, `hsla(${hue}, 100%, 70%, 1)`);
                gradient.addColorStop(1, `hsla(${hue}, 100%, 50%, 0.8)`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * config.gridSize + 1,
                    segment.y * config.gridSize + 1,
                    config.gridSize - 2,
                    config.gridSize - 2,
                    4
                );
                ctx.fill();

                // 頭の光
                if (index === 0) {
                    ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
                    ctx.shadowBlur = 15;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            });

            // 食べ物
            const foodGradient = ctx.createRadialGradient(
                food.x * config.gridSize + config.gridSize / 2,
                food.y * config.gridSize + config.gridSize / 2,
                0,
                food.x * config.gridSize + config.gridSize / 2,
                food.y * config.gridSize + config.gridSize / 2,
                config.gridSize / 2
            );
            foodGradient.addColorStop(0, 'rgba(255, 107, 157, 1)');
            foodGradient.addColorStop(1, 'rgba(255, 107, 157, 0.6)');

            ctx.fillStyle = foodGradient;
            ctx.shadowColor = '#ff6b9d';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(
                food.x * config.gridSize + config.gridSize / 2,
                food.y * config.gridSize + config.gridSize / 2,
                config.gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;

            // 一時停止表示
            if (isPaused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#00ff96';
                ctx.font = 'bold 30px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
            }
        }

        // ゲームループ
        function update() {
            if (isPaused) {
                draw();
                gameLoop = setTimeout(update, gameSpeed);
                return;
            }

            direction = nextDirection;

            // 新しい頭の位置
            const head = { ...snake[0] };

            switch (direction) {
                case 'up':
                    head.y--;
                    break;
                case 'down':
                    head.y++;
                    break;
                case 'left':
                    head.x--;
                    break;
                case 'right':
                    head.x++;
                    break;
            }

            // 衝突チェック
            if (checkCollision(head)) {
                gameOver();
                return;
            }

            // スネークを移動
            snake.unshift(head);

            // 食べ物を食べたか
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                updateScore();
                generateFood();

                // スピードアップ
                gameSpeed = Math.max(50, gameSpeed - config.speedIncrease);
            } else {
                snake.pop();
            }

            draw();
            gameLoop = setTimeout(update, gameSpeed);
        }

        // ゲームオーバー
        function gameOver() {
            isRunning = false;
            clearTimeout(gameLoop);

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').style.display = 'block';
        }

        // ゲーム開始
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';

            isPaused = false;
            isRunning = true;

            init();
            update();
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期描画
        init();
        draw();
    </script>
</body>
</html>
