<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ネオン・スネーク | Miraのゲーム実験</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            color: #0ff;
            text-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .stat {
            color: #f0f;
            text-shadow: 0 0 10px #f0f;
            font-size: 18px;
        }

        canvas {
            border: 2px solid #0ff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5), inset 0 0 20px rgba(0, 255, 255, 0.1);
            display: block;
            margin: 0 auto;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-btn {
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #0ff;
            color: #0ff;
            padding: 15px 25px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .control-btn:hover, .control-btn:active {
            background: rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        .fullscreen-btn {
            margin-top: 15px;
            background: rgba(255, 0, 255, 0.2);
            border: 1px solid #f0f;
            color: #f0f;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 0, 255, 0.3);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #f0f;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.5);
            display: none;
        }

        .game-over h2 {
            color: #f0f;
            text-shadow: 0 0 20px #f0f;
            margin-bottom: 20px;
        }

        .game-over p {
            color: #0ff;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 20px;
            }

            .stat {
                font-size: 14px;
            }

            .control-btn {
                padding: 12px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 ネオン・スネーク</h1>
        <div class="stats">
            <div class="stat">スコア: <span id="score">0</span></div>
            <div class="stat">最高: <span id="highScore">0</span></div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="controls">
            <button class="control-btn" ontouchstart="changeDirection('up')" onclick="changeDirection('up')">↑</button>
        </div>
        <div class="controls">
            <button class="control-btn" ontouchstart="changeDirection('left')" onclick="changeDirection('left')">←</button>
            <button class="control-btn" ontouchstart="changeDirection('down')" onclick="changeDirection('down')">↓</button>
            <button class="control-btn" ontouchstart="changeDirection('right')" onclick="changeDirection('right')">→</button>
        </div>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>
    </div>

    <div class="game-over" id="gameOver">
        <h2>💀 GAME OVER</h2>
        <p>スコア: <span id="finalScore">0</span></p>
        <button class="control-btn" onclick="restartGame()">リスタート</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // レスポンシブキャンバスサイズ
        const setCanvasSize = () => {
            const maxWidth = Math.min(window.innerWidth - 40, 400);
            const maxHeight = Math.min(window.innerHeight - 300, 400);
            const size = Math.min(maxWidth, maxHeight);
            canvas.width = size;
            canvas.height = size;
        };
        setCanvasSize();

        const gridSize = 20;
        let tileCount = canvas.width / gridSize;

        // ゲーム状態
        let snake = [{ x: 10, y: 10 }];
        let food = { x: 15, y: 15 };
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('neonSnakeHighScore') || 0;
        let gameLoop;
        let gameSpeed = 120;
        let isGameOver = false;

        document.getElementById('highScore').textContent = highScore;

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    changeDirection('up');
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    changeDirection('down');
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    changeDirection('left');
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    changeDirection('right');
                    break;
            }
        });

        function changeDirection(dir) {
            switch (dir) {
                case 'up':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'down':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'left':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'right':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        }

        function spawnFood() {
            do {
                food.x = Math.floor(Math.random() * tileCount);
                food.y = Math.floor(Math.random() * tileCount);
            } while (snake.some(seg => seg.x === food.x && seg.y === food.y));
        }

        function update() {
            if (isGameOver) return;

            direction = { ...nextDirection };

            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // 壁にぶつかったらゲームオーバー
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // 自分にぶつかったらゲームオーバー
            if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 食べたとき
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                spawnFood();

                // 少しずつスピードアップ
                if (gameSpeed > 60) {
                    gameSpeed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, gameSpeed);
                }
            } else {
                snake.pop();
            }
        }

        function draw() {
            // 背景をクリア
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // グリッド（薄く）
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.1)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // スネークを描画（ネオングロー効果）
            snake.forEach((seg, index) => {
                const hue = (180 + index * 5) % 360;
                const alpha = 1 - (index / snake.length) * 0.5;

                ctx.shadowBlur = 15;
                ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
                ctx.fillStyle = `hsla(${hue}, 100%, 60%, ${alpha})`;

                ctx.fillRect(
                    seg.x * gridSize + 1,
                    seg.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
            });

            // 食べ物を描画（ネオンピンク）
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#f0f';
            ctx.fillStyle = '#f0f';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();

            ctx.shadowBlur = 0;
        }

        function gameStep() {
            update();
            draw();
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(gameLoop);

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('neonSnakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }

        function restartGame() {
            snake = [{ x: 10, y: 10 }];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameSpeed = 120;
            isGameOver = false;

            document.getElementById('score').textContent = 0;
            document.getElementById('gameOver').style.display = 'none';

            spawnFood();
            clearInterval(gameLoop);
            gameLoop = setInterval(gameStep, gameSpeed);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // リサイズ対応
        window.addEventListener('resize', () => {
            setCanvasSize();
            tileCount = canvas.width / gridSize;
        });

        // ゲーム開始
        spawnFood();
        gameLoop = setInterval(gameStep, gameSpeed);
    </script>
</body>
</html>
