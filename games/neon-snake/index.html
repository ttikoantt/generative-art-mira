<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake - ネオンスネーク</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            color: white;
            z-index: 10;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
        }

        .stats {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        .stat {
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }

        #canvas {
            border: 3px solid #00ff88;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
            background: rgba(0,0,0,0.5);
        }

        .controls {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,255,136,0.4);
        }

        .mobile-controls {
            margin-top: 1.5rem;
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 0.5rem;
        }

        .mobile-btn {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 12px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mobile-btn:active {
            transform: scale(0.95);
            background: rgba(0,255,136,0.3);
        }

        .fullscreen-btn {
            position: fixed;
            top: 1rem;
            right: 1rem;
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }
            #canvas {
                width: 85vw;
                height: 85vw;
            }
            .mobile-controls {
                display: grid;
            }
        }

        @media (min-width: 769px) {
            .mobile-controls {
                display: none;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🐍 Neon Snake</h1>

        <div class="stats">
            <div class="stat">スコア: <span id="score">0</span></div>
            <div class="stat">最高: <span id="highScore">0</span></div>
        </div>

        <canvas id="canvas" width="400" height="400"></canvas>

        <div class="controls">
            <button onclick="startGame()">スタート</button>
            <button onclick="changeSpeed()">速度: <span id="speedText">Normal</span></button>
        </div>

        <div class="mobile-controls">
            <div></div>
            <button class="mobile-btn" ontouchstart="changeDirection('up')">↑</button>
            <div></div>
            <button class="mobile-btn" ontouchstart="changeDirection('left')">←</button>
            <div></div>
            <button class="mobile-btn" ontouchstart="changeDirection('right')">→</button>
            <div></div>
            <button class="mobile-btn" ontouchstart="changeDirection('down')">↓</button>
            <div></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let gameSpeed = 100;
        let isRunning = false;
        let speedLevel = 1;

        const speeds = [
            { name: 'Slow', ms: 150 },
            { name: 'Normal', ms: 100 },
            { name: 'Fast', ms: 60 },
            { name: 'Insane', ms: 40 }
        ];

        document.getElementById('highScore').textContent = highScore;

        function initGame() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            document.getElementById('score').textContent = score;
            spawnFood();
        }

        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function update() {
            direction = { ...nextDirection };

            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // Self collision
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // Eat food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('snakeHighScore', highScore);
                    document.getElementById('highScore').textContent = highScore;
                }
                spawnFood();
            } else {
                snake.pop();
            }
        }

        function draw() {
            // Clear canvas with trail effect
            ctx.fillStyle = 'rgba(26, 26, 46, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // Draw snake with glow
            snake.forEach((segment, index) => {
                const hue = 150 + (index * 2) % 60;
                const lightness = 50 - (index * 0.5);
                ctx.fillStyle = `hsl(${hue}, 100%, ${Math.max(lightness, 30)}%)`;
                ctx.shadowBlur = index === 0 ? 15 : 5;
                ctx.shadowColor = '#00ff88';

                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    4
                );
                ctx.fill();
            });

            // Draw food with pulsing effect
            const pulse = Math.sin(Date.now() / 200) * 0.2 + 0.8;
            ctx.fillStyle = `rgba(255, 100, 100, ${pulse})`;
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ff6464';

            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();

            ctx.shadowBlur = 0;
        }

        function gameStep() {
            update();
            draw();
        }

        function startGame() {
            if (gameLoop) {
                clearInterval(gameLoop);
            }
            initGame();
            isRunning = true;
            gameLoop = setInterval(gameStep, gameSpeed);
        }

        function gameOver() {
            clearInterval(gameLoop);
            gameLoop = null;
            isRunning = false;

            // Game over effect
            ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 30px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
            ctx.font = '20px Arial';
            ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 35);
        }

        function changeSpeed() {
            speedLevel = (speedLevel + 1) % speeds.length;
            gameSpeed = speeds[speedLevel].ms;
            document.getElementById('speedText').textContent = speeds[speedLevel].name;

            if (isRunning) {
                clearInterval(gameLoop);
                gameLoop = setInterval(gameStep, gameSpeed);
            }
        }

        function changeDirection(dir) {
            const directions = {
                up: { x: 0, y: -1 },
                down: { x: 0, y: 1 },
                left: { x: -1, y: 0 },
                right: { x: 1, y: 0 }
            };

            const newDir = directions[dir];
            if (newDir && !(newDir.x === -direction.x && newDir.y === -direction.y)) {
                nextDirection = newDir;
            }
        }

        document.addEventListener('keydown', (e) => {
            const keyMap = {
                ArrowUp: 'up',
                ArrowDown: 'down',
                ArrowLeft: 'left',
                ArrowRight: 'right',
                w: 'up',
                s: 'down',
                a: 'left',
                d: 'right'
            };

            if (keyMap[e.key]) {
                e.preventDefault();
                changeDirection(keyMap[e.key]);
            }

            if (e.key === ' ' && !isRunning) {
                e.preventDefault();
                startGame();
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initial draw
        initGame();
        draw();
    </script>
</body>
</html>
