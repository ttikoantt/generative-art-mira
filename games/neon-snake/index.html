<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake | Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
            }
            to {
                text-shadow: 0 0 30px #00ff88, 0 0 60px #00ff88, 0 0 80px #00ff88;
            }
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 10px;
            border: 2px solid rgba(0, 255, 136, 0.3);
        }

        .stat-label {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00ff88;
        }

        .canvas-wrapper {
            position: relative;
            display: inline-block;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.3);
        }

        canvas {
            display: block;
            background: #0a0a0a;
            border: 3px solid #00ff88;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 10;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            font-size: 2rem;
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88;
        }

        .overlay p {
            color: #aaa;
            max-width: 300px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: linear-gradient(45deg, #00ff88, #00cc6a);
            border: none;
            border-radius: 50px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 30px rgba(0, 255, 136, 0.4);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 50px rgba(0, 255, 136, 0.6);
        }

        .fullscreen-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 255, 136, 0.2);
            border: 2px solid #00ff88;
            padding: 8px 15px;
            border-radius: 8px;
            color: #00ff88;
            font-size: 0.8rem;
            cursor: pointer;
            z-index: 5;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 136, 0.3);
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            background: rgba(0, 255, 136, 0.2);
            border: 2px solid #00ff88;
            border-radius: 12px;
            color: #00ff88;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .control-btn:active {
            background: rgba(0, 255, 136, 0.4);
            transform: scale(0.95);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            .stats {
                gap: 15px;
            }

            canvas {
                max-width: 100%;
            }

            .control-btn {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 Neon Snake</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">ハイスコア</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">速度</div>
                <div class="stat-value" id="speed">1</div>
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

            <div class="overlay" id="startOverlay">
                <h2>Neon Snake</h2>
                <p>矢印キーまたはボタンで操作<br>食べ物を集めてスコアアップ！</p>
                <button class="btn" onclick="startGame()">スタート</button>
            </div>

            <div class="overlay hidden" id="gameOverOverlay">
                <h2>ゲームオーバー</h2>
                <p>スコア: <span id="finalScore">0</span></p>
                <button class="btn" onclick="startGame()">もう一度</button>
            </div>
        </div>

        <div class="controls">
            <div></div>
            <button class="control-btn" onclick="changeDirection('up')">↑</button>
            <div></div>
            <button class="control-btn" onclick="changeDirection('left')">←</button>
            <button class="control-btn" onclick="changeDirection('down')">↓</button>
            <button class="control-btn" onclick="changeDirection('right')">→</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ゲーム設定
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        // ゲーム状態
        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = parseInt(localStorage.getItem('neonSnakeHighScore')) || 0;
        let gameLoop = null;
        let gameSpeed = 150;
        let speedLevel = 1;
        let particles = [];

        document.getElementById('highScore').textContent = highScore;

        // パーティクルクラス
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 4 + 2;
                this.speedX = (Math.random() - 0.5) * 4;
                this.speedY = (Math.random() - 0.5) * 4;
                this.life = 1;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 0.02;
                this.size *= 0.98;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function initGame() {
            // 蛇の初期位置（中央）
            const startX = Math.floor(tileCount / 2);
            const startY = Math.floor(tileCount / 2);
            snake = [
                { x: startX, y: startY },
                { x: startX - 1, y: startY },
                { x: startX - 2, y: startY }
            ];

            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            speedLevel = 1;
            gameSpeed = 150;
            particles = [];

            document.getElementById('score').textContent = score;
            document.getElementById('speed').textContent = speedLevel;

            spawnFood();
        }

        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function update() {
            // 方向を更新
            direction = { ...nextDirection };

            // 新しい頭の位置
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // 壁との衝突（ラップアラウンド）
            if (head.x < 0) head.x = tileCount - 1;
            if (head.x >= tileCount) head.x = 0;
            if (head.y < 0) head.y = tileCount - 1;
            if (head.y >= tileCount) head.y = 0;

            // 自分との衝突
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 食べ物を食べた
            if (head.x === food.x && head.y === food.y) {
                score += 10;

                // スピードアップ
                if (score % 50 === 0 && speedLevel < 10) {
                    speedLevel++;
                    gameSpeed = Math.max(50, 150 - speedLevel * 10);
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, gameSpeed);
                    document.getElementById('speed').textContent = speedLevel;
                }

                document.getElementById('score').textContent = score;

                // パーティクルエフェクト
                const px = food.x * gridSize + gridSize / 2;
                const py = food.y * gridSize + gridSize / 2;
                createParticles(px, py, '#ff00ff');

                spawnFood();
            } else {
                snake.pop();
            }

            // パーティクルを更新
            particles = particles.filter(p => {
                p.update();
                return p.life > 0;
            });
        }

        function draw() {
            // キャンバスをクリア
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // グリッドを描画
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.1)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 蛇を描画
            snake.forEach((segment, index) => {
                const x = segment.x * gridSize;
                const y = segment.y * gridSize;
                const padding = 2;

                // グラデーション
                const hue = 120 + (index * 5) % 60;
                const saturation = 100;
                const lightness = 50 - (index * 0.5);

                ctx.fillStyle = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = `hsl(${hue}, ${saturation}%, 50%)`;

                ctx.beginPath();
                ctx.roundRect(x + padding, y + padding, gridSize - padding * 2, gridSize - padding * 2, 4);
                ctx.fill();

                ctx.shadowBlur = 0;
            });

            // 食べ物を描画
            const fx = food.x * gridSize + gridSize / 2;
            const fy = food.y * gridSize + gridSize / 2;

            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ff00ff';
            ctx.fillStyle = '#ff00ff';
            ctx.beginPath();
            ctx.arc(fx, fy, gridSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 0;

            // パーティクルを描画
            particles.forEach(p => p.draw());
        }

        function gameStep() {
            update();
            draw();
        }

        function startGame() {
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');

            initGame();
            draw();

            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(gameStep, gameSpeed);
        }

        function gameOver() {
            clearInterval(gameLoop);
            gameLoop = null;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('neonSnakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        function changeDirection(dir) {
            switch (dir) {
                case 'up':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'down':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'left':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'right':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    changeDirection('up');
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    changeDirection('down');
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    changeDirection('left');
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    changeDirection('right');
                    break;
                case ' ':
                    e.preventDefault();
                    if (!gameLoop || gameLoop === null) {
                        startGame();
                    }
                    break;
            }
        });

        // スワイプ操作
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30) changeDirection('right');
                else if (dx < -30) changeDirection('left');
            } else {
                if (dy > 30) changeDirection('down');
                else if (dy < -30) changeDirection('up');
            }
        });

        // 初期描画
        initGame();
        draw();
    </script>
</body>
</html>
