<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Snake - ネオンスネーク</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }

        h1 {
            color: #fff;
            font-size: clamp(1.5rem, 4vw, 3rem);
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .subtitle {
            color: #00ff88;
            font-size: clamp(0.8rem, 2vw, 1.2rem);
            margin-bottom: 15px;
        }

        .score-display {
            color: #ff00ff;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            margin-bottom: 15px;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(255, 0, 255, 0.5);
        }

        #gameCanvas {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3),
                        inset 0 0 30px rgba(0, 255, 136, 0.1);
            max-width: 100%;
            border: 2px solid rgba(0, 255, 136, 0.3);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: clamp(0.9rem, 2vw, 1rem);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.4);
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            color: #88ffbb;
            font-size: clamp(0.75rem, 1.5vw, 0.9rem);
            margin-top: 15px;
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #ff00ff 0%, #ff00cc 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 0, 255, 0.4);
        }

        .fullscreen-btn:hover {
            box-shadow: 0 6px 20px rgba(255, 0, 255, 0.6);
        }

        /* Mobile controls */
        .mobile-controls {
            margin-top: 15px;
            display: none;
        }

        @media (max-width: 768px) {
            .mobile-controls {
                display: grid;
                grid-template-areas:
                    ". up ."
                    "left . right"
                    ". down .";
                gap: 5px;
            }

            .mobile-btn {
                width: 60px;
                height: 60px;
                background: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
                border: none;
                border-radius: 50%;
                color: #000;
                font-size: 1.5rem;
                font-weight: bold;
                cursor: pointer;
                box-shadow: 0 4px 15px rgba(0, 255, 136, 0.4);
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .mobile-btn:active {
                transform: scale(0.95);
            }

            .btn-up { grid-area: up; }
            .btn-down { grid-area: down; }
            .btn-left { grid-area: left; }
            .btn-right { grid-area: right; }
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #ff0088;
            box-shadow: 0 0 40px rgba(255, 0, 136, 0.5);
            z-index: 1000;
            display: none;
        }

        .game-over h2 {
            color: #ff0088;
            font-size: 2rem;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(255, 0, 136, 0.5);
        }

        .game-over p {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Neon Snake</h1>
        <p class="subtitle">ネオンスタイルのスネークゲーム</p>

        <div class="score-display">
            スコア: <span id="score">0</span> | 最高: <span id="highScore">0</span>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div class="mobile-controls">
            <button class="mobile-btn btn-up" ontouchstart="changeDirection('up')">↑</button>
            <button class="mobile-btn btn-left" ontouchstart="changeDirection('left')">←</button>
            <button class="mobile-btn btn-right" ontouchstart="changeDirection('right')">→</button>
            <button class="mobile-btn btn-down" ontouchstart="changeDirection('down')">↓</button>
        </div>

        <div class="controls">
            <button onclick="resetGame()">リセット</button>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
        </div>

        <p class="info">⌨️ 矢印キーまたはスワイプで操作</p>
    </div>

    <div class="game-over" id="gameOver">
        <h2>💥 GAME OVER</h2>
        <p>スコア: <span id="finalScore">0</span></p>
        <button onclick="resetGame()">もう一度</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Canvas size
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 600);
            const maxHeight = Math.min(window.innerHeight - 350, 500);
            const size = Math.floor(Math.min(maxWidth, maxHeight) / 20) * 20;
            canvas.width = size;
            canvas.height = size;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game settings
        const gridSize = 20;
        let gridWidth, gridHeight;

        function updateGridSize() {
            gridWidth = canvas.width / gridSize;
            gridHeight = canvas.height / gridSize;
        }
        updateGridSize();

        // Game state
        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('neonSnakeHighScore') || 0;
        let gameLoop;
        let gameSpeed = 150;

        document.getElementById('highScore').textContent = highScore;

        // Initialize game
        function initGame() {
            updateGridSize();
            snake = [
                { x: Math.floor(gridWidth / 2), y: Math.floor(gridHeight / 2) }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameSpeed = 150;
            spawnFood();
            updateScore();
            document.getElementById('gameOver').style.display = 'none';
        }

        // Spawn food
        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * gridWidth),
                    y: Math.floor(Math.random() * gridHeight)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        // Update score
        function updateScore() {
            document.getElementById('score').textContent = score;
            if (score > highScore) {
                highScore = score;
                document.getElementById('highScore').textContent = highScore;
                localStorage.setItem('neonSnakeHighScore', highScore);
            }
        }

        // Draw game
        function draw() {
            // Clear canvas
            ctx.fillStyle = 'rgba(0, 0, 0, 0.9)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid (subtle)
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= gridWidth; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= gridHeight; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // Draw snake
            snake.forEach((segment, index) => {
                const hue = 120 + index * 3;
                const alpha = 1 - (index / snake.length) * 0.5;

                ctx.fillStyle = `hsla(${hue}, 100%, 50%, ${alpha})`;
                ctx.shadowColor = `hsla(${hue}, 100%, 50%, 0.8)`;
                ctx.shadowBlur = 10;

                const x = segment.x * gridSize + 1;
                const y = segment.y * gridSize + 1;
                const size = gridSize - 2;

                ctx.beginPath();
                ctx.roundRect(x, y, size, size, 4);
                ctx.fill();

                // Head highlight
                if (index === 0) {
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(x + size / 2, y + size / 2, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            // Draw food
            ctx.fillStyle = '#ff0088';
            ctx.shadowColor = '#ff0088';
            ctx.shadowBlur = 15;

            const fx = food.x * gridSize + gridSize / 2;
            const fy = food.y * gridSize + gridSize / 2;
            const pulseSize = 6 + Math.sin(Date.now() / 200) * 2;

            ctx.beginPath();
            ctx.arc(fx, fy, pulseSize, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 0;
        }

        // Update game state
        function update() {
            direction = { ...nextDirection };

            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // Check wall collision
            if (head.x < 0 || head.x >= gridWidth || head.y < 0 || head.y >= gridHeight) {
                gameOver();
                return;
            }

            // Check self collision
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                updateScore();
                spawnFood();

                // Increase speed
                if (gameSpeed > 80) {
                    gameSpeed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, gameSpeed);
                }
            } else {
                snake.pop();
            }

            draw();
        }

        // Game step
        function gameStep() {
            update();
        }

        // Game over
        function gameOver() {
            clearInterval(gameLoop);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }

        // Reset game
        function resetGame() {
            clearInterval(gameLoop);
            initGame();
            gameLoop = setInterval(gameStep, gameSpeed);
        }

        // Change direction
        function changeDirection(dir) {
            switch(dir) {
                case 'up':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'down':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'left':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'right':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                    e.preventDefault();
                    changeDirection('up');
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    changeDirection('down');
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    changeDirection('left');
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    changeDirection('right');
                    break;
                case ' ':
                    e.preventDefault();
                    resetGame();
                    break;
            }
        });

        // Touch controls (swipe)
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30) changeDirection('right');
                else if (dx < -30) changeDirection('left');
            } else {
                if (dy > 30) changeDirection('down');
                else if (dy < -30) changeDirection('up');
            }
        });

        // Fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Start game
        initGame();
        draw();
        gameLoop = setInterval(gameStep, gameSpeed);
    </script>
</body>
</html>
