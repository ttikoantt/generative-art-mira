<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Memory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            color: #00ff00;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }

        .subtitle {
            color: #00ff00;
            font-size: 0.9rem;
            margin-bottom: 20px;
            opacity: 0.7;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 15px 25px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }

        .stat-label {
            color: #00ff00;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .stat-value {
            color: #00ff00;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        #gameArea {
            background: rgba(0, 0, 0, 0.5);
            border: 3px solid #00ff00;
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.2);
            min-height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #sequenceDisplay {
            color: #00ff00;
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 10px;
            text-shadow: 0 0 30px rgba(0, 255, 0, 0.8);
        }

        #message {
            color: #00ff00;
            font-size: 1.2rem;
            margin-bottom: 15px;
            min-height: 30px;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 300px;
            margin: 20px auto;
        }

        .key {
            background: linear-gradient(135deg, rgba(0, 255, 0, 0.2) 0%, rgba(0, 255, 0, 0.1) 100%);
            border: 2px solid #00ff00;
            color: #00ff00;
            font-size: 2rem;
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 255, 0, 0.3);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            touch-action: manipulation;
        }

        .key:hover {
            background: linear-gradient(135deg, rgba(0, 255, 0, 0.4) 0%, rgba(0, 255, 0, 0.2) 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 0, 0.5);
        }

        .key:active {
            transform: translateY(0);
            background: rgba(0, 255, 0, 0.5);
        }

        .key:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        button {
            background: linear-gradient(135deg, #00ff00 0%, #00aa00 100%);
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 255, 0, 0.4);
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 0, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: linear-gradient(135deg, #ff00ff 0%, #aa00aa 100%);
            box-shadow: 0 4px 15px rgba(255, 0, 255, 0.4);
        }

        button.secondary:hover {
            box-shadow: 0 6px 20px rgba(255, 0, 255, 0.6);
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }

        .fullscreen-btn:hover {
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.6);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .stat-box {
                padding: 10px 20px;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            #sequenceDisplay {
                font-size: 2rem;
                letter-spacing: 5px;
            }

            .key {
                padding: 15px;
                font-size: 1.8rem;
            }

            button {
                padding: 12px 24px;
                font-size: 0.9rem;
            }
        }

        .fullscreen {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            max-width: none !important;
            z-index: 9999 !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%) !important;
        }

        .fullscreen #gameArea {
            max-width: 90vw;
        }

        .flash {
            animation: flash 0.3s ease-out;
        }

        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .correct {
            animation: correct 0.5s ease-out;
        }

        @keyframes correct {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .wrong {
            animation: wrong 0.5s ease-out;
        }

        @keyframes wrong {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <h1>🧠 Matrix Memory</h1>
        <p class="subtitle">数字の順番を覚えて入力</p>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">レベル</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">ハイスコア</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>

        <div id="gameArea">
            <div id="sequenceDisplay"></div>
            <div id="message">スタートボタンを押してね</div>
        </div>

        <div class="keypad" id="keypad" style="display: none;">
            <button class="key" onclick="inputNumber(1)">1</button>
            <button class="key" onclick="inputNumber(2)">2</button>
            <button class="key" onclick="inputNumber(3)">3</button>
            <button class="key" onclick="inputNumber(4)">4</button>
            <button class="key" onclick="inputNumber(5)">5</button>
            <button class="key" onclick="inputNumber(6)">6</button>
            <button class="key" onclick="inputNumber(7)">7</button>
            <button class="key" onclick="inputNumber(8)">8</button>
            <button class="key" onclick="inputNumber(9)">9</button>
        </div>

        <div class="controls">
            <button onclick="startGame()">▶ スタート</button>
            <button class="secondary" onclick="resetGame()">🔄 リセット</button>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">📺 全画面</button>
        </div>
    </div>

    <script>
        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let score = 0;
        let highScore = 0;
        let isShowingSequence = false;
        let isPlayerTurn = false;
        let displayTimeout = null;

        function updateDisplay() {
            document.getElementById('level').textContent = level;
            document.getElementById('score').textContent = score;
            document.getElementById('highScore').textContent = highScore;
        }

        function showMessage(text) {
            document.getElementById('message').textContent = text;
        }

        function showSequence(number) {
            const display = document.getElementById('sequenceDisplay');
            display.textContent = number;
            display.classList.add('flash');
            setTimeout(() => {
                display.classList.remove('flash');
            }, 300);
        }

        function clearDisplay() {
            document.getElementById('sequenceDisplay').textContent = '';
        }

        function generateSequence() {
            const length = Math.min(level + 2, 10);
            sequence = [];
            for (let i = 0; i < length; i++) {
                sequence.push(Math.floor(Math.random() * 9) + 1);
            }
        }

        async function playSequence() {
            isShowingSequence = true;
            isPlayerTurn = false;
            playerSequence = [];

            showMessage('覚えて...');
            document.getElementById('keypad').style.display = 'none';

            for (let i = 0; i < sequence.length; i++) {
                await new Promise(resolve => {
                    displayTimeout = setTimeout(() => {
                        showSequence(sequence[i]);
                        setTimeout(() => {
                            clearDisplay();
                            setTimeout(resolve, 200);
                        }, 600);
                    }, 400);
                });
            }

            isShowingSequence = false;
            isPlayerTurn = true;
            showMessage('入力して！');
            document.getElementById('keypad').style.display = 'grid';
        }

        function inputNumber(num) {
            if (!isPlayerTurn || isShowingSequence) return;

            playerSequence.push(num);
            showSequence(num);

            const currentIndex = playerSequence.length - 1;

            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                // Wrong!
                document.getElementById('gameArea').classList.add('wrong');
                setTimeout(() => {
                    document.getElementById('gameArea').classList.remove('wrong');
                }, 500);

                gameOver();
                return;
            }

            if (playerSequence.length === sequence.length) {
                // Correct!
                document.getElementById('gameArea').classList.add('correct');
                setTimeout(() => {
                    document.getElementById('gameArea').classList.remove('correct');
                }, 500);

                score += level * 10;
                if (score > highScore) {
                    highScore = score;
                }

                showMessage('正解！ 🎉');
                document.getElementById('keypad').style.display = 'none';

                setTimeout(() => {
                    level++;
                    updateDisplay();
                    startLevel();
                }, 1500);
            }
        }

        function startLevel() {
            generateSequence();
            playSequence();
        }

        function startGame() {
            if (isShowingSequence) return;

            if (displayTimeout) {
                clearTimeout(displayTimeout);
            }

            level = 1;
            score = 0;
            updateDisplay();

            showMessage('準備...');
            clearDisplay();

            setTimeout(() => {
                startLevel();
            }, 1000);
        }

        function gameOver() {
            isPlayerTurn = false;
            showMessage(`ゲームオーバー！ スコア: ${score}`);
            document.getElementById('keypad').style.display = 'none';
            clearDisplay();
        }

        function resetGame() {
            if (displayTimeout) {
                clearTimeout(displayTimeout);
            }

            isShowingSequence = false;
            isPlayerTurn = false;
            level = 1;
            score = 0;
            sequence = [];
            playerSequence = [];

            updateDisplay();
            showMessage('スタートボタンを押してね');
            clearDisplay();
            document.getElementById('keypad').style.display = 'none';
        }

        function toggleFullscreen() {
            const container = document.getElementById('container');
            container.classList.toggle('fullscreen');
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (!isPlayerTurn || isShowingSequence) return;

            const key = parseInt(e.key);
            if (key >= 1 && key <= 9) {
                inputNumber(key);
            }
        });

        // Initialize
        updateDisplay();
    </script>
</body>
</html>
