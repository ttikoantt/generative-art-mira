<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rainbow Trail</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .container {
            text-align: center;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        h1 {
            color: #fff;
            font-size: 1.3rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .controls {
            display: flex;
            gap: 0.5rem;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        button:active {
            transform: scale(0.95);
        }

        .canvas-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        .hint {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            pointer-events: none;
            text-align: center;
        }

        .mode-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 3rem;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌈 Rainbow Trail</h1>
            <div class="controls">
                <button onclick="clearCanvas()">クリア</button>
                <button onclick="toggleMode()">モード変更</button>
                <button onclick="saveImage()">保存</button>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="trailCanvas"></canvas>
            <div class="mode-indicator" id="modeIndicator"></div>
            <p class="hint">画面をドラッグして美しいトレイルを描こう</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('trailCanvas');
        const ctx = canvas.getContext('2d');
        const modeIndicator = document.getElementById('modeIndicator');

        // Canvasサイズ設定
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 描画状態
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let hue = 0;
        let particles = [];
        let mode = 0; // 0: Rainbow, 1: Fire, 2: Ice, 3: Galaxy

        const modes = [
            { name: 'Rainbow', bg: '#0a0a0a' },
            { name: 'Fire', bg: '#0a0000' },
            { name: 'Ice', bg: '#00000a' },
            { name: 'Galaxy', bg: '#000005' }
        ];

        // パーティクルクラス
        class Particle {
            constructor(x, y, hue, mode) {
                this.x = x;
                this.y = y;
                this.hue = hue;
                this.mode = mode;
                this.size = Math.random() * 8 + 4;
                this.speedX = (Math.random() - 0.5) * 3;
                this.speedY = (Math.random() - 0.5) * 3;
                this.life = 1;
                this.decay = 0.01 + Math.random() * 0.02;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.2;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY -= 0.05; // 浮力
                this.life -= this.decay;
                this.size *= 0.98;
                this.rotation += this.rotationSpeed;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                let color;
                switch(this.mode) {
                    case 0: // Rainbow
                        color = `hsla(${this.hue}, 100%, 60%, ${this.life})`;
                        break;
                    case 1: // Fire
                        color = `hsla(${this.hue}, 100%, ${50 + this.life * 30}%, ${this.life})`;
                        break;
                    case 2: // Ice
                        color = `hsla(${180 + this.hue * 0.3}, 80%, ${60 + this.life * 30}%, ${this.life})`;
                        break;
                    case 3: // Galaxy
                        color = `hsla(${280 + this.hue * 0.5}, 90%, ${60 + this.life * 20}%, ${this.life})`;
                        break;
                }

                // 星形を描画
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const angle = (Math.PI * 2 / 5) * i;
                    const x = Math.cos(angle) * this.size;
                    const y = Math.sin(angle) * this.size;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fillStyle = color;
                ctx.shadowColor = color;
                ctx.shadowBlur = 15;
                ctx.fill();

                ctx.restore();
            }
        }

        // 描画関数
        function draw(x, y) {
            const dx = x - lastX;
            const dy = y - lastY;
            const distance = Math.sqrt(dx * dx + dy * dy);

            // 距離に応じてパーティクル数を調整
            const particleCount = Math.min(10, Math.ceil(distance / 5));

            for (let i = 0; i < particleCount; i++) {
                const t = i / particleCount;
                const px = lastX + dx * t;
                const py = lastY + dy * t;

                // 複数のパーティクルを生成
                for (let j = 0; j < 3; j++) {
                    const offsetX = (Math.random() - 0.5) * 20;
                    const offsetY = (Math.random() - 0.5) * 20;
                    particles.push(new Particle(px + offsetX, py + offsetY, hue, mode));
                }
            }

            hue += 2;
            if (hue >= 360) hue = 0;

            lastX = x;
            lastY = y;
        }

        // イベントハンドラー
        function handleStart(e) {
            e.preventDefault();
            isDrawing = true;
            const pos = getPos(e);
            lastX = pos.x;
            lastY = pos.y;
        }

        function handleMove(e) {
            e.preventDefault();
            if (!isDrawing) return;
            const pos = getPos(e);
            draw(pos.x, pos.y);
        }

        function handleEnd(e) {
            e.preventDefault();
            isDrawing = false;
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            if (e.touches) {
                return {
                    x: e.touches[0].clientX - rect.left,
                    y: e.touches[0].clientY - rect.top
                };
            }
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        // イベントリスナー
        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('mouseleave', handleEnd);

        canvas.addEventListener('touchstart', handleStart);
        canvas.addEventListener('touchmove', handleMove);
        canvas.addEventListener('touchend', handleEnd);

        // アニメーションループ
        function animate() {
            // 半透明の背景でトレイル効果
            ctx.fillStyle = `${modes[mode].bg}0.1`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // パーティクルを更新・描画
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();

                if (particles[i].life <= 0 || particles[i].size < 0.5) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        // コントロール関数
        function clearCanvas() {
            ctx.fillStyle = modes[mode].bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles = [];
            hue = 0;
        }

        function toggleMode() {
            mode = (mode + 1) % modes.length;
            document.body.style.background = modes[mode].bg;
            
            // モード表示
            modeIndicator.textContent = modes[mode].name;
            modeIndicator.style.opacity = '1';
            setTimeout(() => {
                modeIndicator.style.opacity = '0';
            }, 1000);

            clearCanvas();
        }

        function saveImage() {
            const link = document.createElement('a');
            link.download = `rainbow-trail-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        // 初期化
        clearCanvas();
        animate();

        // 定期的に色を変える（自動モード用）
        setInterval(() => {
            if (!isDrawing) {
                hue = (hue + 1) % 360;
            }
        }, 100);
    </script>
</body>
</html>
