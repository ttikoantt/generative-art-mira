<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漢字パズル | Kanji Puzzle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 2rem;
            color: #f0f0f0;
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            letter-spacing: 0.3rem;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #888;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 0.2rem;
        }

        .score-board {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            backdrop-filter: blur(10px);
        }

        .score-item {
            text-align: center;
        }

        .score-label {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 5px;
            letter-spacing: 0.1rem;
        }

        .score-value {
            font-size: 1.5rem;
            color: #f0f0f0;
            font-weight: bold;
        }

        .puzzle-area {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .question {
            text-align: center;
            margin-bottom: 30px;
        }

        .target-kanji {
            font-size: 4rem;
            color: #f0f0f0;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        .hint {
            font-size: 0.9rem;
            color: #888;
            letter-spacing: 0.1rem;
        }

        .parts-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .part-slot {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #f0f0f0;
            transition: all 0.3s ease;
        }

        .part-slot.filled {
            background: rgba(100, 150, 255, 0.1);
            border: 2px solid rgba(100, 150, 255, 0.3);
        }

        .parts-pool {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            min-height: 80px;
        }

        .part {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #f0f0f0;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .part:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.1);
        }

        .part.selected {
            background: rgba(100, 150, 255, 0.2);
            border: 1px solid rgba(100, 150, 255, 0.4);
        }

        .part-slot:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #f0f0f0;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-check {
            background: rgba(100, 200, 100, 0.2);
            border: 1px solid rgba(100, 200, 100, 0.3);
        }

        .btn-check:hover {
            background: rgba(100, 200, 100, 0.3);
        }

        .message {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 1rem;
            letter-spacing: 0.1rem;
            display: none;
        }

        .message.success {
            background: rgba(100, 200, 100, 0.2);
            border: 1px solid rgba(100, 200, 100, 0.3);
            color: #8f8;
            display: block;
        }

        .message.error {
            background: rgba(200, 100, 100, 0.2);
            border: 1px solid rgba(200, 100, 100, 0.3);
            color: #f88;
            display: block;
        }

        .instructions {
            text-align: center;
            color: #666;
            font-size: 0.8rem;
            letter-spacing: 0.1rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
                letter-spacing: 0.2rem;
            }

            .target-kanji {
                font-size: 3rem;
            }

            .part-slot {
                width: 80px;
                height: 80px;
                font-size: 2.5rem;
            }

            .part {
                width: 60px;
                height: 60px;
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>漢字パズル</h1>
        <p class="subtitle">Kanji Puzzle - 漢字を組み立てよう</p>

        <div class="score-board">
            <div class="score-item">
                <div class="score-label">レベル</div>
                <div class="score-value" id="level">1</div>
            </div>
            <div class="score-item">
                <div class="score-label">スコア</div>
                <div class="score-value" id="score">0</div>
            </div>
        </div>

        <div class="puzzle-area">
            <div class="question">
                <div class="target-kanji" id="targetKanji">?</div>
                <div class="hint" id="hint">ヒント: 木が二つで「林」</div>
            </div>

            <div class="parts-container">
                <div class="part-slot" id="slot1" onclick="slotClick(0)"></div>
                <div class="part-slot" id="slot2" onclick="slotClick(1)"></div>
            </div>

            <div class="parts-pool" id="partsPool"></div>
        </div>

        <div class="controls">
            <button class="btn btn-check" onclick="checkAnswer()">答え合わせ</button>
            <button class="btn" onclick="resetPuzzle()">リセット</button>
            <button class="btn" onclick="nextPuzzle()">次へ</button>
        </div>

        <div class="message" id="message"></div>

        <p class="instructions">部品をクリックしてスロットに入れよう</p>
    </div>

    <script>
        // Puzzle data
        const puzzles = [
            {
                target: '林',
                parts: ['木', '木'],
                hint: '木が二つで「林」',
                options: ['木', '山', '川', '木']
            },
            {
                target: '森',
                parts: ['木', '林'],
                hint: '木が三つで「森」',
                options: ['木', '林', '火', '水']
            },
            {
                target: '明',
                parts: ['日', '月'],
                hint: '日と月で「明」',
                options: ['日', '月', '星', '空']
            },
            {
                target: '休',
                parts: ['亻', '木'],
                hint: '人が木で「休」む',
                options: ['亻', '木', '山', '水']
            },
            {
                target: '岩',
                parts: ['山', '石'],
                hint: '山にある「岩」',
                options: ['山', '石', '土', '川']
            },
            {
                target: '男',
                parts: ['田', '力'],
                hint: '田んぼで力を使う「男」',
                options: ['田', '力', '土', '山']
            },
            {
                target: '町',
                parts: ['田', '丁'],
                hint: '田んぼのある「町」',
                options: ['田', '丁', '日', '月']
            },
            {
                target: '炎',
                parts: ['火', '火'],
                hint: '火が二つで「炎」',
                options: ['火', '水', '山', '火']
            },
            {
                target: '看',
                parts: ['手', '目'],
                hint: '手で目を覆って「看」る',
                options: ['手', '目', '日', '耳']
            },
            {
                target: '鳴',
                parts: ['口', '鳥'],
                hint: '口と鳥で「鳴」く',
                options: ['口', '鳥', '虫', '日']
            }
        ];

        let currentPuzzle = 0;
        let level = 1;
        let score = 0;
        let selectedPart = null;
        let slotContents = [null, null];

        // Initialize
        function init() {
            loadPuzzle(currentPuzzle);
        }

        function loadPuzzle(index) {
            const puzzle = puzzles[index];
            document.getElementById('targetKanji').textContent = puzzle.target;
            document.getElementById('hint').textContent = 'ヒント: ' + puzzle.hint;

            // Reset slots
            slotContents = [null, null];
            updateSlots();

            // Load parts
            const pool = document.getElementById('partsPool');
            pool.innerHTML = '';

            const shuffledOptions = [...puzzle.options].sort(() => Math.random() - 0.5);

            shuffledOptions.forEach((part, i) => {
                const partEl = document.createElement('div');
                partEl.className = 'part';
                partEl.textContent = part;
                partEl.onclick = () => selectPart(part, partEl);
                pool.appendChild(partEl);
            });

            // Clear message
            document.getElementById('message').style.display = 'none';
            selectedPart = null;
        }

        function selectPart(part, element) {
            // Remove previous selection
            document.querySelectorAll('.part').forEach(p => p.classList.remove('selected'));

            // Select new part
            selectedPart = part;
            element.classList.add('selected');
        }

        function slotClick(slotIndex) {
            if (selectedPart === null) return;

            // Remove from other slot if present
            const otherSlot = slotIndex === 0 ? 1 : 0;
            if (slotContents[otherSlot] === selectedPart) {
                slotContents[otherSlot] = null;
            }

            // Place in slot
            slotContents[slotIndex] = selectedPart;
            updateSlots();

            // Clear selection
            selectedPart = null;
            document.querySelectorAll('.part').forEach(p => p.classList.remove('selected'));
        }

        function updateSlots() {
            document.getElementById('slot1').textContent = slotContents[0] || '';
            document.getElementById('slot2').textContent = slotContents[1] || '';

            document.getElementById('slot1').classList.toggle('filled', slotContents[0] !== null);
            document.getElementById('slot2').classList.toggle('filled', slotContents[1] !== null);
        }

        function checkAnswer() {
            const puzzle = puzzles[currentPuzzle];
            const answer = slotContents.join('');

            const messageEl = document.getElementById('message');

            if (answer === puzzle.parts.join('')) {
                messageEl.textContent = '🎉 正解！素晴らしい！';
                messageEl.className = 'message success';
                score += 100 * level;
                document.getElementById('score').textContent = score;
            } else if (slotContents[0] === null || slotContents[1] === null) {
                messageEl.textContent = '⚠️ 両方のスロットを埋めてください';
                messageEl.className = 'message error';
            } else {
                messageEl.textContent = '❌ 違います。もう一度挑戦！';
                messageEl.className = 'message error';
            }

            messageEl.style.display = 'block';
        }

        function resetPuzzle() {
            slotContents = [null, null];
            updateSlots();
            document.getElementById('message').style.display = 'none';
            selectedPart = null;
            document.querySelectorAll('.part').forEach(p => p.classList.remove('selected'));
        }

        function nextPuzzle() {
            currentPuzzle = (currentPuzzle + 1) % puzzles.length;

            if (currentPuzzle === 0) {
                level++;
                document.getElementById('level').textContent = level;
            }

            loadPuzzle(currentPuzzle);
        }

        // Start game
        init();
    </script>
</body>
</html>
