<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Number Tap Speed - 速攻ナンバーパズル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        h1 {
            color: #fff;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            color: #4ecdc4;
            font-size: 18px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
        }

        .game-area {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 400px;
            padding: 10px;
        }

        .number-btn {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
        }

        .number-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent,
                rgba(255, 255, 255, 0.1),
                transparent
            );
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%) translateY(-100%) rotate(45deg);
            }
            100% {
                transform: translateX(100%) translateY(100%) rotate(45deg);
            }
        }

        .number-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .number-btn:active {
            transform: scale(0.95);
        }

        .number-btn.correct {
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            animation: correctPulse 0.3s ease;
        }

        @keyframes correctPulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }

        .number-btn.wrong {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-10px);
            }
            75% {
                transform: translateX(10px);
            }
        }

        .number-btn.next {
            border: 3px solid #ffd93d;
            box-shadow: 0 0 20px rgba(255, 217, 61, 0.6);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            flex-direction: column;
            text-align: center;
            padding: 20px;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            color: #4ecdc4;
            font-size: 36px;
            margin-bottom: 20px;
        }

        .overlay p {
            color: #fff;
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .overlay .big-time {
            font-size: 48px;
            font-weight: bold;
            color: #ffd93d;
            margin: 20px 0;
        }

        .start-btn {
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(78, 205, 196, 0.4);
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(78, 205, 196, 0.6);
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        #fullscreenBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            z-index: 200;
        }

        #fullscreenBtn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        #fullscreenBtn:active {
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
                padding: 5px;
            }

            .number-btn {
                font-size: 20px;
                border-radius: 10px;
            }

            h1 {
                font-size: 20px;
            }

            .stats {
                gap: 20px;
            }

            .stat-value {
                font-size: 20px;
            }

            #fullscreenBtn {
                top: 10px;
                right: 10px;
                padding: 8px 12px;
                font-size: 12px;
            }

            .overlay h2 {
                font-size: 28px;
            }

            .overlay .big-time {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <button id="fullscreenBtn">⛶ 全画面</button>

    <div class="container">
        <div class="header">
            <h1>🔢 Number Tap Speed</h1>
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">次の数字</div>
                    <div class="stat-value" id="nextNumber">1</div>
                </div>
                <div class="stat">
                    <div class="stat-label">タイム</div>
                    <div class="stat-value" id="timer">0.00</div>
                </div>
            </div>
        </div>

        <div class="game-area">
            <div class="grid" id="grid"></div>
        </div>
    </div>

    <div class="overlay" id="startOverlay">
        <h2>🔢 Number Tap Speed</h2>
        <p>
            1から25までの数字を順番にタップ！<br>
            できるだけ速くクリアしよう
        </p>
        <button class="start-btn" id="startBtn">ゲーム開始</button>
    </div>

    <div class="overlay hidden" id="resultOverlay">
        <h2>🎉 クリア！</h2>
        <p>あなたの記録</p>
        <div class="big-time" id="finalTime">0.00秒</div>
        <button class="start-btn" id="retryBtn">もう一度</button>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const nextNumberEl = document.getElementById('nextNumber');
        const timerEl = document.getElementById('timer');
        const startOverlay = document.getElementById('startOverlay');
        const resultOverlay = document.getElementById('resultOverlay');
        const startBtn = document.getElementById('startBtn');
        const retryBtn = document.getElementById('retryBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const finalTimeEl = document.getElementById('finalTime');

        let currentNumber = 1;
        let startTime = 0;
        let timerInterval = null;
        let gameActive = false;

        const TOTAL_NUMBERS = 25;

        function createGrid() {
            grid.innerHTML = '';
            const numbers = Array.from({ length: TOTAL_NUMBERS }, (_, i) => i + 1);
            shuffleArray(numbers);

            numbers.forEach(num => {
                const btn = document.createElement('button');
                btn.className = 'number-btn';
                btn.textContent = num;
                btn.dataset.number = num;
                btn.addEventListener('click', handleNumberClick);
                grid.appendChild(btn);
            });

            updateNextButton();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function handleNumberClick(e) {
            if (!gameActive) return;

            const clickedNumber = parseInt(e.target.dataset.number);
            const btn = e.target;

            if (clickedNumber === currentNumber) {
                // 正解
                btn.classList.add('correct');
                btn.disabled = true;

                if (currentNumber === TOTAL_NUMBERS) {
                    endGame();
                } else {
                    currentNumber++;
                    nextNumberEl.textContent = currentNumber;
                    updateNextButton();
                }
            } else {
                // 不正解
                btn.classList.add('wrong');
                setTimeout(() => btn.classList.remove('wrong'), 500);
            }
        }

        function updateNextButton() {
            document.querySelectorAll('.number-btn').forEach(btn => {
                btn.classList.remove('next');
                if (parseInt(btn.dataset.number) === currentNumber) {
                    btn.classList.add('next');
                }
            });
        }

        function startGame() {
            gameActive = true;
            currentNumber = 1;
            startTime = Date.now();
            nextNumberEl.textContent = currentNumber;

            createGrid();

            startOverlay.classList.add('hidden');
            resultOverlay.classList.add('hidden');

            timerInterval = setInterval(updateTimer, 10);
        }

        function updateTimer() {
            const elapsed = Date.now() - startTime;
            timerEl.textContent = (elapsed / 1000).toFixed(2);
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);

            const finalTime = timerEl.textContent;
            finalTimeEl.textContent = finalTime + '秒';

            setTimeout(() => {
                resultOverlay.classList.remove('hidden');
            }, 500);
        }

        startBtn.addEventListener('click', startGame);
        retryBtn.addEventListener('click', startGame);

        // 全画面
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });
    </script>
</body>
</html>
