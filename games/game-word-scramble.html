<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Word Scramble - 単語パズル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, sans-serif;
            overflow: hidden;
        }
        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .title {
            font-size: 28px;
            color: #e94560;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            font-size: 16px;
            color: #a0a0a0;
        }
        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .stat-value {
            font-size: 24px;
            color: #fff;
            font-weight: bold;
        }
        .hint-text {
            margin-top: 15px;
            color: #ffd700;
            font-size: 14px;
            text-align: center;
            min-height: 20px;
        }
        .scrambled-area {
            width: 100%;
            margin-bottom: 20px;
        }
        .scrambled-label {
            color: #a0a0a0;
            font-size: 14px;
            margin-bottom: 10px;
            text-align: center;
        }
        .scrambled-letters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            min-height: 60px;
        }
        .letter {
            width: 50px;
            height: 50px;
            background: linear-gradient(145deg, #e94560, #c73e54);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }
        .letter:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.5);
        }
        .letter:active {
            transform: scale(0.95);
        }
        .letter.used {
            opacity: 0.3;
            transform: scale(0.8);
        }
        .answer-area {
            width: 100%;
            margin-bottom: 20px;
        }
        .answer-label {
            color: #a0a0a0;
            font-size: 14px;
            margin-bottom: 10px;
            text-align: center;
        }
        .answer-box {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            min-height: 60px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            align-items: center;
        }
        .answer-letter {
            width: 45px;
            height: 45px;
            background: linear-gradient(145deg, #4a90a4, #357a8c);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 3px 10px rgba(74, 144, 164, 0.3);
        }
        .answer-letter:hover {
            transform: scale(1.1);
            background: linear-gradient(145deg, #5aa0b4, #458a9c);
        }
        .answer-letter:active {
            transform: scale(0.95);
        }
        .placeholder {
            width: 45px;
            height: 45px;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 8px;
        }
        .buttons {
            display: flex;
            gap: 15px;
            width: 100%;
        }
        .btn {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-check {
            background: linear-gradient(145deg, #00b894, #00a884);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 184, 148, 0.3);
        }
        .btn-check:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 184, 148, 0.5);
        }
        .btn-skip {
            background: linear-gradient(145deg, #6c5ce7, #5a4bd4);
            color: #fff;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }
        .btn-skip:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.5);
        }
        .btn-hint {
            background: linear-gradient(145deg, #fdcb6e, #f0b84a);
            color: #2d3436;
            box-shadow: 0 4px 15px rgba(253, 203, 110, 0.3);
        }
        .btn-hint:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(253, 203, 110, 0.5);
        }
        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            color: #fff;
            padding: 30px 50px;
            border-radius: 20px;
            font-size: 24px;
            font-weight: bold;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .message.show {
            opacity: 1;
            pointer-events: auto;
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <div class="container">
        <div class="header">
            <div class="title">🔤 Word Scramble</div>
            <div class="stats">
                <div class="stat">
                    <span class="stat-value" id="score">0</span>
                    <span>Score</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="streak">0</span>
                    <span>Streak</span>
                </div>
            </div>
            <div class="hint-text" id="hintText"></div>
        </div>

        <div class="scrambled-area">
            <div class="scrambled-label">並べ替えられた文字</div>
            <div class="scrambled-letters" id="scrambledLetters"></div>
        </div>

        <div class="answer-area">
            <div class="answer-label">ここにクリックして並べ替え</div>
            <div class="answer-box" id="answerBox"></div>
        </div>

        <div class="buttons">
            <button class="btn btn-hint" onclick="showHint()">💡 Hint</button>
            <button class="btn btn-skip" onclick="skipWord()">Skip →</button>
            <button class="btn btn-check" onclick="checkAnswer()">✓ Check</button>
        </div>
    </div>

    <div class="message" id="message"></div>

    <script>
        const words = [
            { word: "APPLE", hint: "赤くて丸い果物" },
            { word: "TIGER", hint: "虎" },
            { word: "PIZZA", hint: "イタリア発祥の食べ物" },
            { word: "OCEAN", hint: "海" },
            { word: "MUSIC", hint: "音楽" },
            { word: "DREAM", hint: "夢" },
            { word: "GHOST", hint: "お化け" },
            { word: "CLOUD", hint: "雲" },
            { word: "STORM", hint: "嵐" },
            { word: "BRAIN", hint: "脳" },
            { word: "CHAIR", hint: "椅子" },
            { word: "PHONE", hint: "電話" },
            { word: "SMILE", hint: "笑顔" },
            { word: "WATER", hint: "水" },
            { word: "HOUSE", hint: "家" },
            { word: "BREAD", hint: "パン" },
            { word: "MONEY", hint: "お金" },
            { word: "NIGHT", hint: "夜" },
            { word: "LIGHT", hint: "光" },
            { word: "EARTH", hint: "地球" }
        ];

        let currentWord = null;
        let scrambledLetters = [];
        let answerLetters = [];
        let score = 0;
        let streak = 0;
        let hintsUsed = 0;

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function newGame() {
            currentWord = words[Math.floor(Math.random() * words.length)];
            scrambledLetters = shuffleArray(currentWord.word.split(''));
            answerLetters = [];
            hintsUsed = 0;
            document.getElementById('hintText').textContent = '';
            render();
        }

        function render() {
            const scrambledContainer = document.getElementById('scrambledLetters');
            const answerContainer = document.getElementById('answerBox');

            // Render scrambled letters
            scrambledContainer.innerHTML = '';
            scrambledLetters.forEach((letter, index) => {
                const letterEl = document.createElement('div');
                letterEl.className = 'letter' + (letter.used ? ' used' : '');
                letterEl.textContent = letter.char;
                letterEl.onclick = () => useLetter(index);
                scrambledContainer.appendChild(letterEl);
            });

            // Render answer box
            answerContainer.innerHTML = '';
            const totalLength = currentWord.word.length;
            for (let i = 0; i < totalLength; i++) {
                if (i < answerLetters.length) {
                    const answerLetter = answerLetters[i];
                    const letterEl = document.createElement('div');
                    letterEl.className = 'answer-letter';
                    letterEl.textContent = answerLetter.char;
                    letterEl.onclick = () => removeAnswerLetter(i);
                    answerContainer.appendChild(letterEl);
                } else {
                    const placeholder = document.createElement('div');
                    placeholder.className = 'placeholder';
                    answerContainer.appendChild(placeholder);
                }
            }

            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
        }

        function useLetter(index) {
            if (scrambledLetters[index].used) return;
            scrambledLetters[index].used = true;
            answerLetters.push({ char: scrambledLetters[index].char, sourceIndex: index });
            render();
        }

        function removeAnswerLetter(index) {
            const answerLetter = answerLetters[index];
            scrambledLetters[answerLetter.sourceIndex].used = false;
            answerLetters.splice(index, 1);
            render();
        }

        function checkAnswer() {
            const answer = answerLetters.map(l => l.char).join('');
            if (answer.length !== currentWord.word.length) {
                showMessage('文字が足りません！');
                return;
            }

            if (answer === currentWord.word) {
                const points = Math.max(10, 50 - hintsUsed * 10);
                score += points + streak * 5;
                streak++;
                showMessage(`🎉 正解！ +${points + streak * 5}点`);
                setTimeout(() => {
                    hideMessage();
                    newGame();
                }, 1500);
            } else {
                streak = 0;
                showMessage('❌ 違います...もう一度！');
                setTimeout(hideMessage, 1000);
            }
            render();
        }

        function skipWord() {
            streak = 0;
            showMessage('スキップ...');
            setTimeout(() => {
                hideMessage();
                newGame();
            }, 1000);
            render();
        }

        function showHint() {
            hintsUsed++;
            document.getElementById('hintText').textContent = '💡 ' + currentWord.hint;
            render();
        }

        function showMessage(text) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.classList.add('show');
        }

        function hideMessage() {
            document.getElementById('message').classList.remove('show');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        newGame();
    </script>
</body>
</html>
