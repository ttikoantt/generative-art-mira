<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ワード・ハンター</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 20px;
        }

        .game-info {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.7);
        }

        .info-value {
            font-size: 1.8rem;
            font-weight: bold;
        }

        #timer {
            color: #ffd700;
        }

        #score {
            color: #4ade80;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(4, 70px);
            grid-template-rows: repeat(4, 70px);
            gap: 8px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .cell {
            width: 70px;
            height: 70px;
            border: none;
            border-radius: 12px;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            background: rgba(255,255,255,0.9);
            color: #333;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .cell:hover {
            transform: scale(1.05);
        }

        .cell.selected {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            transform: scale(1.1);
        }

        .cell:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .current-word {
            font-size: 1.5rem;
            margin-bottom: 15px;
            padding: 10px 25px;
            background: rgba(255,255,255,0.15);
            border-radius: 25px;
            min-width: 200px;
            text-align: center;
            letter-spacing: 3px;
        }

        .button-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .submit-btn {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: #fff;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.4);
        }

        .clear-btn {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }

        .clear-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .fullscreen-btn {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }

        .fullscreen-btn:hover {
            background: rgba(255,255,255,0.25);
        }

        .found-words {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            max-width: 320px;
        }

        .found-words h3 {
            font-size: 1rem;
            margin-bottom: 10px;
            color: rgba(255,255,255,0.9);
        }

        .word-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .word-tag {
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
        }

        .message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            z-index: 1000;
            animation: slideDown 0.3s ease;
        }

        .message.success {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: #fff;
        }

        .message.error {
            background: linear-gradient(135deg, #f87171, #ef4444);
            color: #fff;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @media (max-width: 400px) {
            .board {
                grid-template-columns: repeat(4, 60px);
                grid-template-rows: repeat(4, 60px);
            }

            .cell {
                width: 60px;
                height: 60px;
                font-size: 1.5rem;
            }

            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <h1>🎯 ワード・ハンター</h1>
    <p class="subtitle">文字をタップして単語を作ろう！</p>

    <div class="game-info">
        <div class="info-item">
            <div class="info-label">スコア</div>
            <div class="info-value" id="score">0</div>
        </div>
        <div class="info-item">
            <div class="info-label">時間</div>
            <div class="info-value" id="timer">60</div>
        </div>
    </div>

    <div class="current-word" id="current-word"></div>

    <div class="board" id="board"></div>

    <div class="button-row">
        <button class="submit-btn" onclick="submitWord()">✓ 送信</button>
        <button class="clear-btn" onclick="clearSelection()">✗ クリア</button>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
    </div>

    <div class="found-words">
        <h3>見つけた単語 (<span id="word-count">0</span>)</h3>
        <div class="word-list" id="word-list"></div>
    </div>

    <script>
        const letters = 'あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをんAIUEOKAKIKUKEKO';
        const commonWords = new Set([
            'あい', 'うえ', 'いえ', 'うみ', 'いし', 'えき', 'おか', 'かき', 'きく', 'くに',
            'けさ', 'こえ', 'さい', 'さく', 'すし', 'せかい', 'そら', 'たい', 'つき', 'てみ',
            'とり', 'なつ', 'にち', 'ねこ', 'はな', 'ひと', 'ふね', 'へや', 'ほし', 'まち',
            'みず', 'むし', 'もり', 'やま', 'ゆき', 'よる', 'らく', 'りんご', 'るす', 'れい',
            'わか', 'を', 'ん', 'AI', 'UE', 'OK'
        ]);

        let board = [];
        let selectedCells = [];
        let score = 0;
        let timeLeft = 60;
        let foundWords = new Set();
        let gameRunning = false;
        let timerInterval = null;

        function generateBoard() {
            board = [];
            for (let i = 0; i < 16; i++) {
                board.push(letters[Math.floor(Math.random() * letters.length)]);
            }
            renderBoard();
        }

        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            board.forEach((letter, index) => {
                const button = document.createElement('button');
                button.className = 'cell';
                button.textContent = letter;
                button.dataset.index = index;
                button.onclick = () => selectCell(index);
                if (selectedCells.includes(index)) {
                    button.classList.add('selected');
                }
                boardEl.appendChild(button);
            });
        }

        function selectCell(index) {
            if (!gameRunning) {
                startGame();
            }

            if (selectedCells.includes(index)) {
                selectedCells = selectedCells.filter(i => i !== index);
            } else if (selectedCells.length < 8) {
                selectedCells.push(index);
            }

            renderBoard();
            updateCurrentWord();
        }

        function updateCurrentWord() {
            const word = selectedCells.map(i => board[i]).join('');
            document.getElementById('current-word').textContent = word;
        }

        function clearSelection() {
            selectedCells = [];
            renderBoard();
            updateCurrentWord();
        }

        function submitWord() {
            const word = selectedCells.map(i => board[i]).join('');

            if (word.length < 2) {
                showMessage('単語が短すぎます！', 'error');
                return;
            }

            if (foundWords.has(word)) {
                showMessage('すでに見つけています！', 'error');
                clearSelection();
                return;
            }

            // 簡易的な単語判定（実際は辞書データが必要）
            const isValid = word.length >= 2 && (
                commonWords.has(word) ||
                word.length >= 3
            );

            if (isValid) {
                const points = calculatePoints(word);
                score += points;
                foundWords.add(word);
                document.getElementById('score').textContent = score;

                const wordList = document.getElementById('word-list');
                const tag = document.createElement('span');
                tag.className = 'word-tag';
                tag.textContent = `${word} +${points}`;
                wordList.appendChild(tag);
                document.getElementById('word-count').textContent = foundWords.size;

                showMessage(`+${points}ポイント！`, 'success');
            } else {
                showMessage('有効な単語ではありません', 'error');
            }

            clearSelection();
        }

        function calculatePoints(word) {
            let basePoints = word.length * 10;
            if (word.length >= 5) basePoints += 20;
            if (word.length >= 7) basePoints += 30;
            return basePoints;
        }

        function showMessage(text, type) {
            const existing = document.querySelector('.message');
            if (existing) existing.remove();

            const message = document.createElement('div');
            message.className = `message ${type}`;
            message.textContent = text;
            document.body.appendChild(message);

            setTimeout(() => message.remove(), 2000);
        }

        function startGame() {
            gameRunning = true;
            timeLeft = 60;
            document.getElementById('timer').textContent = timeLeft;

            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameRunning = false;
            clearInterval(timerInterval);

            setTimeout(() => {
                showMessage(`ゲーム終了！スコア: ${score}`, 'success');

                setTimeout(() => {
                    if (confirm(`スコア: ${score}点\n見つけた単語: ${foundWords.size}語\n\nもう一度遊びますか？`)) {
                        resetGame();
                    }
                }, 1500);
            }, 500);
        }

        function resetGame() {
            score = 0;
            foundWords.clear();
            selectedCells = [];
            gameRunning = false;
            document.getElementById('score').textContent = '0';
            document.getElementById('word-count').textContent = '0';
            document.getElementById('word-list').innerHTML = '';
            document.getElementById('current-word').textContent = '';
            generateBoard();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // キーボード対応
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                submitWord();
            } else if (e.key === 'Escape') {
                clearSelection();
            }
        });

        // 初期化
        generateBoard();
        showMessage('文字をタップしてゲーム開始！', 'success');
    </script>
</body>
</html>
