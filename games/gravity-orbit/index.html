<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gravity Orbit - 重力軌道ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: none;
        }

        canvas {
            display: block;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h1 {
            color: #fff;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .overlay p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-bottom: 30px;
            text-align: center;
            max-width: 300px;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .start-btn:hover {
            transform: scale(1.05);
        }

        .score {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            z-index: 10;
        }

        .high-score {
            position: fixed;
            top: 50px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            z-index: 10;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
        }

        .energy {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
            z-index: 10;
        }

        .energy-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.1s;
        }

        .energy-text {
            position: fixed;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="overlay" id="startOverlay">
        <h1>🌌 Gravity Orbit</h1>
        <p>タップ/クリックで推進力を与え、重力源の周りを回る軌道を維持しよう！</p>
        <button class="start-btn" onclick="startGame()">スタート</button>
    </div>

    <div class="overlay hidden" id="gameOverOverlay">
        <h1>💫 Game Over</h1>
        <p>スコア: <span id="finalScore">0</span></p>
        <button class="start-btn" onclick="restartGame()">もう一度</button>
    </div>

    <div class="score">スコア: <span id="score">0</span></div>
    <div class="high-score">最高: <span id="highScore">0</span></div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="energy-text">エネルギー</div>
    <div class="energy">
        <div class="energy-bar" id="energyBar"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let gameRunning = false;
        let score = 0;
        let highScore = localStorage.getItem('gravityOrbitHighScore') || 0;
        let energy = 100;

        document.getElementById('highScore').textContent = highScore;

        const gravitySource = {
            x: 0,
            y: 0,
            radius: 40,
            mass: 5000
        };

        const player = {
            x: 0,
            y: 0,
            vx: 0,
            vy: 0,
            radius: 10,
            trail: []
        };

        let obstacles = [];
        let stars = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            gravitySource.x = canvas.width / 2;
            gravitySource.y = canvas.height / 2;

            // 星を生成
            stars = [];
            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5
                });
            }
        }

        window.addEventListener('resize', resize);
        resize();

        function initPlayer() {
            const angle = Math.random() * Math.PI * 2;
            const distance = 150;

            player.x = gravitySource.x + Math.cos(angle) * distance;
            player.y = gravitySource.y + Math.sin(angle) * distance;

            // 初期速度：垂直方向
            const speed = 4;
            player.vx = -Math.sin(angle) * speed;
            player.vy = Math.cos(angle) * speed;

            player.trail = [];
        }

        function spawnObstacle() {
            const side = Math.floor(Math.random() * 4);
            let x, y, vx, vy;

            switch(side) {
                case 0: // 上
                    x = Math.random() * canvas.width;
                    y = -20;
                    vx = (Math.random() - 0.5) * 2;
                    vy = Math.random() * 2 + 1;
                    break;
                case 1: // 右
                    x = canvas.width + 20;
                    y = Math.random() * canvas.height;
                    vx = -(Math.random() * 2 + 1);
                    vy = (Math.random() - 0.5) * 2;
                    break;
                case 2: // 下
                    x = Math.random() * canvas.width;
                    y = canvas.height + 20;
                    vx = (Math.random() - 0.5) * 2;
                    vy = -(Math.random() * 2 + 1);
                    break;
                case 3: // 左
                    x = -20;
                    y = Math.random() * canvas.height;
                    vx = Math.random() * 2 + 1;
                    vy = (Math.random() - 0.5) * 2;
                    break;
            }

            obstacles.push({
                x, y, vx, vy,
                radius: 8 + Math.random() * 12
            });
        }

        function applyThrust() {
            if (energy >= 10) {
                // 重力源方向へのベクトル
                const dx = gravitySource.x - player.x;
                const dy = gravitySource.y - player.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                // 垂直方向に推進力
                const thrust = 0.5;
                player.vx += (-dy / distance) * thrust;
                player.vy += (dx / distance) * thrust;

                energy -= 10;
            }
        }

        function update() {
            if (!gameRunning) return;

            // 重力
            const dx = gravitySource.x - player.x;
            const dy = gravitySource.y - player.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            const force = gravitySource.mass / (distance * distance);
            const ax = (dx / distance) * force;
            const ay = (dy / distance) * force;

            player.vx += ax;
            player.vy += ay;

            player.x += player.vx;
            player.y += player.vy;

            // トレイル
            player.trail.push({ x: player.x, y: player.y });
            if (player.trail.length > 50) {
                player.trail.shift();
            }

            // 障害物更新
            obstacles.forEach(obs => {
                obs.x += obs.vx;
                obs.y += obs.vy;
            });

            obstacles = obstacles.filter(obs => {
                return obs.x > -50 && obs.x < canvas.width + 50 &&
                       obs.y > -50 && obs.y < canvas.height + 50;
            });

            // 衝突判定
            // 重力源との衝突
            if (distance < gravitySource.radius + player.radius) {
                gameOver();
                return;
            }

            // 画面外
            if (player.x < -50 || player.x > canvas.width + 50 ||
                player.y < -50 || player.y > canvas.height + 50) {
                gameOver();
                return;
            }

            // 障害物との衝突
            obstacles.forEach(obs => {
                const odx = obs.x - player.x;
                const ody = obs.y - player.y;
                const odist = Math.sqrt(odx * odx + ody * ody);

                if (odist < obs.radius + player.radius) {
                    gameOver();
                }
            });

            // エネルギー回復
            energy = Math.min(100, energy + 0.1);

            // スコア
            score++;
            document.getElementById('score').textContent = score;
            document.getElementById('energyBar').style.width = energy + '%';
        }

        function draw() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 星
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${0.3 + star.speed * 0.2})`;
                ctx.fill();
            });

            if (gameRunning) {
                // トレイル
                player.trail.forEach((point, index) => {
                    const alpha = index / player.trail.length;
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, player.radius * alpha, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(102, 126, 234, ${alpha * 0.5})`;
                    ctx.fill();
                });

                // プレイヤー
                const gradient = ctx.createRadialGradient(
                    player.x, player.y, 0,
                    player.x, player.y, player.radius
                );
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(0.5, '#667eea');
                gradient.addColorStop(1, '#764ba2');

                ctx.beginPath();
                ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // 重力源
                const gGradient = ctx.createRadialGradient(
                    gravitySource.x, gravitySource.y, 0,
                    gravitySource.x, gravitySource.y, gravitySource.radius
                );
                gGradient.addColorStop(0, 'rgba(255, 200, 100, 1)');
                gGradient.addColorStop(0.5, 'rgba(255, 150, 50, 0.8)');
                gGradient.addColorStop(1, 'rgba(255, 100, 0, 0)');

                ctx.beginPath();
                ctx.arc(gravitySource.x, gravitySource.y, gravitySource.radius, 0, Math.PI * 2);
                ctx.fillStyle = gGradient;
                ctx.fill();

                // 障害物
                obstacles.forEach(obs => {
                    ctx.beginPath();
                    ctx.arc(obs.x, obs.y, obs.radius, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 100, 100, 0.8)';
                    ctx.fill();
                });
            }

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        function startGame() {
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');

            score = 0;
            energy = 100;
            obstacles = [];
            initPlayer();
            gameRunning = true;

            // 障害物スポーン
            setInterval(() => {
                if (gameRunning && obstacles.length < 10) {
                    spawnObstacle();
                }
            }, 2000);
        }

        function gameOver() {
            gameRunning = false;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('gravityOrbitHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        function restartGame() {
            startGame();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        canvas.addEventListener('click', (e) => {
            if (gameRunning) {
                applyThrust();
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            if (gameRunning) {
                e.preventDefault();
                applyThrust();
            }
        });

        draw();
    </script>
</body>
</html>
