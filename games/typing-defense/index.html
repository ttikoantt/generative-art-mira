<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Defense - タイピング防衛ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #gameCanvas {
            display: block;
        }

        .ui {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #00ff88;
            font-size: 24px;
            z-index: 100;
            text-shadow: 0 0 10px #00ff88;
        }

        .level {
            position: fixed;
            top: 20px;
            right: 20px;
            color: #ff6b6b;
            font-size: 24px;
            z-index: 100;
            text-shadow: 0 0 10px #ff6b6b;
        }

        .combo {
            position: fixed;
            top: 60px;
            left: 20px;
            color: #ffd93d;
            font-size: 18px;
            z-index: 100;
            text-shadow: 0 0 10px #ffd93d;
        }

        .start-screen, .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            color: white;
        }

        .game-over-screen {
            display: none;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn {
            background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
            color: #0a0a0a;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 255, 136, 0.4);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 30px rgba(0, 255, 136, 0.6);
        }

        .instructions {
            margin-top: 30px;
            text-align: center;
            color: #aaa;
            line-height: 1.8;
        }

        .score-display {
            font-size: 36px;
            margin: 20px 0;
            color: #00ff88;
        }

        .hidden {
            display: none !important;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(0, 255, 136, 0.2);
            border: 2px solid #00ff88;
            color: #00ff88;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 136, 0.3);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="ui">
        <div>SCORE: <span id="score">0</span></div>
    </div>

    <div class="level">
        LEVEL: <span id="level">1</span>
    </div>

    <div class="combo">
        COMBO: <span id="combo">0</span>x
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="start-screen" id="startScreen">
        <h1>TYPING DEFENSE</h1>
        <div class="instructions">
            <div>表示された単語をタイプして敵を破壊</div>
            <div>敵が下に到達するとゲームオーバー</div>
            <div>コンボを繋いでハイスコアを目指せ！</div>
        </div>
        <button class="btn" onclick="startGame()">START</button>
    </div>

    <div class="game-over-screen" id="gameOverScreen">
        <h1>GAME OVER</h1>
        <div class="score-display">Score: <span id="finalScore">0</span></div>
        <div style="color: #aaa; margin-bottom: 20px;">Level: <span id="finalLevel">1</span></div>
        <button class="btn" onclick="startGame()">RETRY</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let enemies = [];
        let particles = [];
        let score = 0;
        let level = 1;
        let combo = 0;
        let gameRunning = false;
        let spawnRate = 2000;
        let lastSpawn = 0;
        let currentInput = '';

        const words = [
            'attack', 'defend', 'power', 'speed', 'magic', 'skill',
            'force', 'blast', 'strike', 'guard', 'shield', 'boost',
            'rapid', 'swift', 'fierce', 'brave', 'mighty', 'grand',
            'super', 'ultra', 'hyper', 'mega', 'giga', 'tera',
            'neon', 'cyber', 'laser', 'plasma', 'fusion', 'quantum',
            'nexus', 'orbit', 'cosmic', 'stellar', 'solar', 'lunar',
            'shadow', 'light', 'dark', 'chaos', 'order', 'flux',
            'pulse', 'wave', 'spark', 'flash', 'glow', 'beam',
            'storm', 'frost', 'flame', 'thunder', 'wind', 'quake',
            'dragon', 'phoenix', 'titan', 'legend', 'mythic', 'epic'
        ];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Enemy {
            constructor() {
                this.word = words[Math.floor(Math.random() * words.length)];
                this.x = Math.random() * (canvas.width - 200) + 100;
                this.y = -30;
                this.speed = 0.5 + (level * 0.2);
                this.typed = '';
                this.color = `hsl(${Math.random() * 60 + 320}, 80%, 60%)`;
            }

            update() {
                this.y += this.speed;
            }

            draw() {
                // 敵の背景
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(this.x - 60, this.y - 15, 120, 30);

                // タイプ済み文字
                ctx.fillStyle = '#00ff88';
                ctx.font = 'bold 18px "Courier New"';
                ctx.textAlign = 'center';
                ctx.fillText(this.typed, this.x, this.y + 5);

                // 未タイプ文字
                const remaining = this.word.substring(this.typed.length);
                ctx.fillStyle = this.color;
                ctx.fillText(remaining, this.x + ctx.measureText(this.typed).width / 2 + 5, this.y + 5);

                // グロー効果
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10;
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x - 65, this.y - 20, 130, 40);
                ctx.shadowBlur = 0;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1;
                this.color = color;
                this.size = Math.random() * 4 + 2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2;
                this.life -= 0.02;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function spawnEnemy() {
            enemies.push(new Enemy());
        }

        function updateGame(timestamp) {
            if (!gameRunning) return;

            // 敵の出現
            if (timestamp - lastSpawn > spawnRate) {
                spawnEnemy();
                lastSpawn = timestamp;
            }

            // 敵の更新
            enemies.forEach((enemy, index) => {
                enemy.update();

                // 画面外に出たらゲームオーバー
                if (enemy.y > canvas.height) {
                    gameOver();
                }
            });

            // パーティクルの更新
            particles = particles.filter(p => {
                p.update();
                return p.life > 0;
            });

            // レベルアップ
            if (score >= level * 100) {
                level++;
                spawnRate = Math.max(500, 2000 - level * 100);
            }

            // UI更新
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('combo').textContent = combo;
        }

        function drawGame() {
            // 背景
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // グリッド
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.1)';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 50) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += 50) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // 敵の描画
            enemies.forEach(enemy => enemy.draw());

            // パーティクルの描画
            particles.forEach(p => p.draw());

            // 入力表示
            if (currentInput) {
                ctx.fillStyle = '#00ff88';
                ctx.font = 'bold 24px "Courier New"';
                ctx.textAlign = 'center';
                ctx.shadowColor = '#00ff88';
                ctx.shadowBlur = 10;
                ctx.fillText(currentInput + '_', canvas.width / 2, canvas.height - 50);
                ctx.shadowBlur = 0;
            }
        }

        function gameLoop(timestamp) {
            if (!gameRunning) return;

            updateGame(timestamp);
            drawGame();

            requestAnimationFrame(gameLoop);
        }

        function handleInput(key) {
            if (!gameRunning) return;

            if (key === 'Backspace') {
                currentInput = currentInput.slice(0, -1);
                return;
            }

            if (key.length !== 1) return;

            currentInput += key.toLowerCase();

            // 入力チェック
            let hit = false;
            enemies.forEach((enemy, index) => {
                if (enemy.typed === '' || enemy.word.startsWith(enemy.typed + key.toLowerCase())) {
                    if (enemy.word === enemy.typed + key.toLowerCase()) {
                        // 完了！
                        createExplosion(enemy.x, enemy.y, enemy.color);
                        enemies.splice(index, 1);
                        score += 10 + combo * 5;
                        combo++;
                        currentInput = '';
                        hit = true;
                    } else {
                        enemy.typed += key.toLowerCase();
                    }
                }
            });

            if (!hit) {
                // ミスタイプ
                for (let enemy of enemies) {
                    if (!enemy.word.startsWith(currentInput)) {
                        currentInput = '';
                        combo = 0;
                        break;
                    }
                }
            }
        }

        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');

            enemies = [];
            particles = [];
            score = 0;
            level = 1;
            combo = 0;
            gameRunning = true;
            spawnRate = 2000;
            currentInput = '';

            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalLevel').textContent = level;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // キーボード入力
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (gameRunning) {
                    gameRunning = false;
                    document.getElementById('startScreen').classList.remove('hidden');
                }
                return;
            }
            handleInput(e.key);
        });

        window.addEventListener('resize', resize);

        // 初期化
        resize();
    </script>
</body>
</html>
