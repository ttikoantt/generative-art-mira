<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Reaction Math - 反応計算ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            min-width: 100px;
        }

        .problem {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .equation {
            font-size: 3rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .timer-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .timer-fill {
            background: linear-gradient(90deg, #f5576c 0%, #f093fb 100%);
            height: 100%;
            transition: width 0.1s linear;
        }

        .answers {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .answer-btn {
            padding: 25px;
            font-size: 1.8rem;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .answer-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(240, 147, 251, 0.4);
        }

        .answer-btn:active {
            transform: translateY(-1px);
        }

        .game-over {
            display: none;
        }

        .game-over.active {
            display: block;
        }

        .game-over h2 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 4rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .best-score {
            color: #666;
            margin-bottom: 30px;
        }

        .start-btn, .restart-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .start-btn:hover, .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            .equation {
                font-size: 2.5rem;
            }

            .answer-btn {
                padding: 20px;
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">📺</button>

    <div class="container">
        <h1>🔢 Reaction Math</h1>
        <p class="subtitle">反応速度と計算力を鍛える脳トレゲーム</p>

        <div class="stats">
            <div class="stat">スコア: <span id="score">0</span></div>
            <div class="stat">コンボ: <span id="combo">0</span></div>
        </div>

        <div class="problem" id="problemArea">
            <div class="equation" id="equation">スタートボタンを押してね</div>
            <div class="timer-bar">
                <div class="timer-fill" id="timerFill"></div>
            </div>
        </div>

        <div class="answers" id="answersArea"></div>

        <button class="start-btn" id="startBtn">▶ ゲーム開始</button>

        <div class="game-over" id="gameOver">
            <h2>🎮 ゲームオーバー</h2>
            <div class="final-score" id="finalScore">0</div>
            <div class="best-score">最高記録: <span id="bestScore">0</span></div>
            <button class="restart-btn" id="restartBtn">🔄 もう一度</button>
        </div>
    </div>

    <script>
        let score = 0;
        let combo = 0;
        let bestScore = parseInt(localStorage.getItem('reactionMathBestScore')) || 0;
        let currentAnswer = 0;
        let timeLeft = 0;
        let totalTime = 0;
        let gameTimer = null;
        let isGameRunning = false;
        let difficulty = 1;

        const scoreDisplay = document.getElementById('score');
        const comboDisplay = document.getElementById('combo');
        const equationDisplay = document.getElementById('equation');
        const timerFill = document.getElementById('timerFill');
        const answersArea = document.getElementById('answersArea');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const gameOverArea = document.getElementById('gameOver');
        const finalScoreDisplay = document.getElementById('finalScore');
        const bestScoreDisplay = document.getElementById('bestScore');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        // 初期表示
        bestScoreDisplay.textContent = bestScore;

        function generateProblem() {
            const operations = ['+', '-', '×'];
            const operation = operations[Math.floor(Math.random() * operations.length)];
            let num1, num2;

            // 難易度に応じて数値を調整
            const max = 5 + difficulty * 2;

            switch (operation) {
                case '+':
                    num1 = Math.floor(Math.random() * max) + 1;
                    num2 = Math.floor(Math.random() * max) + 1;
                    currentAnswer = num1 + num2;
                    break;
                case '-':
                    num1 = Math.floor(Math.random() * max) + 2;
                    num2 = Math.floor(Math.random() * (num1 - 1)) + 1;
                    currentAnswer = num1 - num2;
                    break;
                case '×':
                    num1 = Math.floor(Math.random() * (5 + difficulty)) + 1;
                    num2 = Math.floor(Math.random() * (5 + difficulty)) + 1;
                    currentAnswer = num1 * num2;
                    break;
            }

            equationDisplay.textContent = `${num1} ${operation} ${num2} = ?`;
            generateAnswers(currentAnswer);
        }

        function generateAnswers(correctAnswer) {
            const answers = [correctAnswer];
            while (answers.length < 4) {
                let wrongAnswer;
                if (Math.random() < 0.5) {
                    wrongAnswer = correctAnswer + Math.floor(Math.random() * 10) - 5;
                } else {
                    wrongAnswer = correctAnswer + Math.floor(Math.random() * 20) - 10;
                }
                if (wrongAnswer !== correctAnswer && wrongAnswer >= 0 && !answers.includes(wrongAnswer)) {
                    answers.push(wrongAnswer);
                }
            }

            // シャッフル
            for (let i = answers.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [answers[i], answers[j]] = [answers[j], answers[i]];
            }

            answersArea.innerHTML = '';
            answers.forEach(answer => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.textContent = answer;
                btn.onclick = () => checkAnswer(answer);
                answersArea.appendChild(btn);
            });
        }

        function checkAnswer(selectedAnswer) {
            if (!isGameRunning) return;

            if (selectedAnswer === currentAnswer) {
                // 正解
                combo++;
                const bonus = Math.min(combo, 10);
                score += 10 + bonus;

                // 難易度を上げる
                if (score % 50 === 0 && difficulty < 10) {
                    difficulty++;
                }

                // 制限時間を少し減らす（難易度上昇）
                totalTime = Math.max(3, 6 - difficulty * 0.3);
                timeLeft = totalTime;
            } else {
                // 不正解
                combo = 0;
                endGame();
                return;
            }

            updateDisplay();
            generateProblem();
        }

        function startGame() {
            score = 0;
            combo = 0;
            difficulty = 1;
            totalTime = 6;
            timeLeft = totalTime;
            isGameRunning = true;

            startBtn.style.display = 'none';
            gameOverArea.classList.remove('active');

            updateDisplay();
            generateProblem();
            startTimer();
        }

        function startTimer() {
            gameTimer = setInterval(() => {
                timeLeft -= 0.1;
                timerFill.style.width = `${(timeLeft / totalTime) * 100}%`;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 100);
        }

        function endGame() {
            isGameRunning = false;
            clearInterval(gameTimer);

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('reactionMathBestScore', bestScore);
            }

            finalScoreDisplay.textContent = score;
            bestScoreDisplay.textContent = bestScore;
            gameOverArea.classList.add('active');
        }

        function updateDisplay() {
            scoreDisplay.textContent = score;
            comboDisplay.textContent = combo;
            timerFill.style.width = '100%';
        }

        // イベントリスナー
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.error('全画面エラー:', err);
                });
            } else {
                document.exitFullscreen();
            }
        });

        // キーボード操作（1-4キーで回答）
        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;

            const key = parseInt(e.key);
            if (key >= 1 && key <= 4) {
                const buttons = answersArea.querySelectorAll('.answer-btn');
                if (buttons[key - 1]) {
                    buttons[key - 1].click();
                }
            }
        });
    </script>
</body>
</html>
