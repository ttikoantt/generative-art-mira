<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Grid - 反応速度ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-label {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .grid-container {
            margin: 30px auto;
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .cell {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .cell:hover:not(.active):not(.wrong) {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.15);
        }

        .cell:active:not(.active):not(.wrong) {
            transform: scale(0.95);
        }

        .cell.active {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            border-color: #fff;
            animation: glow 0.5s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
        }

        .cell.wrong {
            background: linear-gradient(135deg, #ff0000, #ff4444);
            animation: shake 0.5s ease-in-out;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 107, 107, 0.5); }
            50% { box-shadow: 0 0 40px rgba(255, 107, 107, 0.8); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .lives {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }

        .life {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .life.lost {
            opacity: 0.3;
            transform: scale(0.8);
        }

        .message {
            font-size: 1.5rem;
            margin: 20px 0;
            min-height: 50px;
            color: #ffd93d;
            text-shadow: 0 0 10px rgba(255, 217, 61, 0.5);
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .overlay.show {
            display: flex;
        }

        .overlay-content {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .overlay-content h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay-content p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #aaa;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            color: #000;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 107, 107, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            font-size: 0.9rem;
            color: #fff;
            box-shadow: none;
        }

        .instructions {
            color: #666;
            font-size: 0.9rem;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .cell {
                width: 80px;
                height: 80px;
            }

            .grid {
                gap: 10px;
            }

            .stat {
                padding: 10px 15px;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            .overlay-content h2 {
                font-size: 2rem;
            }
        }

        .fullscreen-active .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .fullscreen-active h1,
        .fullscreen-active .instructions,
        .fullscreen-active .fullscreen-btn {
            display: none;
        }

        .fullscreen-active .grid-container {
            margin: 0;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>

    <div class="container">
        <h1>🎯 Reaction Grid</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">ステージ</div>
                <div class="stat-value" id="stage">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">平均反応時間</div>
                <div class="stat-value" id="avgTime">0ms</div>
            </div>
        </div>

        <div class="lives">
            <div class="life" id="life1">❤️</div>
            <div class="life" id="life2">❤️</div>
            <div class="life" id="life3">❤️</div>
        </div>

        <div class="message" id="message">スタートボタンを押してね！</div>

        <div class="grid-container">
            <div class="grid" id="grid">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
        </div>

        <div class="instructions">
            💡 光るセルをタップ！間違えるとライフ減少 • ステージが進むと速くなる
        </div>
    </div>

    <div class="overlay" id="overlay">
        <div class="overlay-content">
            <h2 id="overlayTitle">🎯 Reaction Grid</h2>
            <p id="overlayMessage">光るセルをできるだけ速くタップしよう！</p>
            <button onclick="startGame()">スタート</button>
        </div>
    </div>

    <script>
        let score = 0;
        let stage = 1;
        let lives = 3;
        let activeCell = null;
        let cellAppearTime = 0;
        let reactionTimes = [];
        let gameActive = false;
        let minDisplayTime = 1000;
        let maxDisplayTime = 2000;

        const cells = document.querySelectorAll('.cell');
        const overlay = document.getElementById('overlay');
        const messageEl = document.getElementById('message');

        function showOverlay(title, msg, btnText = 'スタート') {
            document.getElementById('overlayTitle').textContent = title;
            document.getElementById('overlayMessage').textContent = msg;
            overlay.querySelector('button').textContent = btnText;
            overlay.classList.add('show');
        }

        function hideOverlay() {
            overlay.classList.remove('show');
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('stage').textContent = stage;

            if (reactionTimes.length > 0) {
                const avg = Math.round(
                    reactionTimes.reduce((a, b) => a + b, 0) / reactionTimes.length
                );
                document.getElementById('avgTime').textContent = avg + 'ms';
            } else {
                document.getElementById('avgTime').textContent = '0ms';
            }
        }

        function updateLives() {
            for (let i = 1; i <= 3; i++) {
                const life = document.getElementById(`life${i}`);
                if (i <= lives) {
                    life.classList.remove('lost');
                } else {
                    life.classList.add('lost');
                }
            }
        }

        function activateRandomCell() {
            if (!gameActive) return;

            // 前のアクティブセルをリセット
            if (activeCell) {
                activeCell.classList.remove('active');
            }

            // ランダムに選択
            const availableCells = Array.from(cells).filter(c => !c.classList.contains('active'));
            activeCell = availableCells[Math.floor(Math.random() * availableCells.length)];
            activeCell.classList.add('active');

            cellAppearTime = Date.now();

            // 表示時間はステージによって短くなる
            const displayTime = Math.max(
                minDisplayTime - (stage * 50),
                400
            );

            setTimeout(() => {
                if (activeCell && activeCell.classList.contains('active')) {
                    // タイムアウト
                    activeCell.classList.remove('active');
                    loseLife();
                }
            }, displayTime);

            // 次の出現までの待機時間もステージによって短くなる
            const waitTime = Math.random() * (maxDisplayTime - minDisplayTime) + minDisplayTime - (stage * 30);
            setTimeout(activateRandomCell, Math.max(waitTime, 300));
        }

        function handleCellClick(cell) {
            if (!gameActive) return;

            if (cell === activeCell && cell.classList.contains('active')) {
                // 正解！
                const reactionTime = Date.now() - cellAppearTime;
                reactionTimes.push(reactionTime);

                // 反応時間によるボーナス
                let points = 10;
                if (reactionTime < 400) points = 30;
                else if (reactionTime < 600) points = 20;

                score += points;
                messageEl.textContent = `+${points}点！ (${reactionTime}ms)`;
                messageEl.style.color = '#00ff00';

                cell.classList.remove('active');

                // ステージアップ
                if (score >= stage * 100) {
                    stage++;
                    messageEl.textContent = `ステージ ${stage}！`;
                    messageEl.style.color = '#ffd93d';
                }

                updateStats();
            } else if (!cell.classList.contains('active')) {
                // 間違い！
                cell.classList.add('wrong');
                setTimeout(() => cell.classList.remove('wrong'), 500);
                loseLife();
            }
        }

        function loseLife() {
            lives--;
            updateLives();

            if (lives <= 0) {
                gameOver();
            } else {
                messageEl.textContent = 'ミス！❌';
                messageEl.style.color = '#ff4444';
            }
        }

        function gameOver() {
            gameActive = false;

            const avgReaction = reactionTimes.length > 0
                ? Math.round(reactionTimes.reduce((a, b) => a + b, 0) / reactionTimes.length)
                : 0;

            let rank = 'C';
            if (avgReaction < 400) rank = 'S';
            else if (avgReaction < 500) rank = 'A';
            else if (avgReaction < 600) rank = 'B';

            showOverlay(
                'ゲームオーバー',
                `スコア: ${score} • ステージ: ${stage} • 平均反応時間: ${avgReaction}ms\n評価: ${rank}`,
                'もう一度'
            );
        }

        function startGame() {
            score = 0;
            stage = 1;
            lives = 3;
            reactionTimes = [];
            gameActive = true;
            activeCell = null;

            updateStats();
            updateLives();

            hideOverlay();
            messageEl.textContent = 'スタート！';
            messageEl.style.color = '#ffd93d';

            // 少し遅延して開始
            setTimeout(activateRandomCell, 500);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.body.requestFullscreen();
                document.body.classList.add('fullscreen-active');
            } else {
                document.exitFullscreen();
                document.body.classList.remove('fullscreen-active');
            }
        }

        // イベントリスナー
        cells.forEach(cell => {
            cell.addEventListener('click', () => handleCellClick(cell));
            cell.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleCellClick(cell);
            });
        });

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                document.body.classList.remove('fullscreen-active');
            }
        });

        // 初期化
        showOverlay('🎯 Reaction Grid', '光るセルをできるだけ速くタップしよう！', 'スタート');
    </script>
</body>
</html>
