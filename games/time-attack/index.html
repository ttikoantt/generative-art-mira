<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タイムアタック - Time Attack</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Orbitron', monospace;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            color: #00d4ff;
            font-size: 18px;
            z-index: 10;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(0, 212, 255, 0.6);
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
        }

        .number-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .number-btn {
            width: 80px;
            height: 80px;
            border: none;
            border-radius: 12px;
            font-size: 32px;
            font-weight: bold;
            font-family: 'Orbitron', monospace;
            cursor: pointer;
            transition: all 0.15s ease;
            background: linear-gradient(145deg, #1e3a5f, #0f2647);
            color: #00d4ff;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .number-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .number-btn:hover::before {
            left: 100%;
        }

        .number-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 10px rgba(0, 212, 255, 0.2);
        }

        .number-btn.correct {
            background: linear-gradient(145deg, #0a4d2e, #063020) !important;
            color: #00ff88 !important;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.4) !important;
        }

        .number-btn.wrong {
            background: linear-gradient(145deg, #4d0a0a, #300606) !important;
            color: #ff4444 !important;
            box-shadow: 0 4px 15px rgba(255, 68, 68, 0.4) !important;
            animation: shake 0.3s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .start-screen, .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 20, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            color: #00d4ff;
            font-size: 36px;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .subtitle {
            color: rgba(0, 212, 255, 0.7);
            font-size: 16px;
            margin-bottom: 40px;
            text-align: center;
        }

        .start-btn, .restart-btn {
            padding: 20px 60px;
            font-size: 20px;
            font-weight: bold;
            font-family: 'Orbitron', monospace;
            color: #00d4ff;
            background: linear-gradient(145deg, #1e3a5f, #0f2647);
            border: 2px solid #00d4ff;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .start-btn:hover, .restart-btn:hover {
            background: linear-gradient(145deg, #2a4d7f, #1a3050);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            transform: scale(1.05);
        }

        .final-score {
            color: #00ff88;
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
        }

        .score-label {
            color: rgba(0, 212, 255, 0.7);
            font-size: 18px;
        }

        .next-number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
            font-weight: bold;
            color: #ff6b6b;
            text-shadow: 0 0 30px rgba(255, 107, 107, 0.8);
            z-index: 50;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .next-number.show {
            opacity: 1;
        }

        @media (max-width: 480px) {
            .number-grid {
                gap: 10px;
            }
            .number-btn {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }
            .header {
                gap: 20px;
                font-size: 14px;
            }
            .stat-value {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="stat">
                <div class="stat-label">目標</div>
                <div class="stat-value" id="targetNumber">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">時間</div>
                <div class="stat-value" id="timer">30</div>
            </div>
        </div>

        <div class="number-grid" id="numberGrid"></div>

        <div class="next-number" id="nextNumber"></div>

        <div class="start-screen" id="startScreen">
            <h1>⏱️ タイムアタック</h1>
            <div class="subtitle">1から順番にクリック！<br>30秒で何までいける？</div>
            <button class="start-btn" id="startBtn">スタート</button>
        </div>

        <div class="game-over-screen hidden" id="gameOverScreen">
            <h1>🏁 タイムアップ！</h1>
            <div class="score-label">最終スコア</div>
            <div class="final-score" id="finalScore">0</div>
            <button class="restart-btn" id="restartBtn">もう一度</button>
        </div>
    </div>

    <script>
        let currentTarget = 1;
        let score = 0;
        let timeLeft = 30;
        let gameRunning = false;
        let timerInterval;
        let numbers = [];

        const numberGrid = document.getElementById('numberGrid');
        const targetDisplay = document.getElementById('targetNumber');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreDisplay = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initGame() {
            numbers = shuffleArray(Array.from({length: 25}, (_, i) => i + 1));
            renderGrid();
            currentTarget = 1;
            score = 0;
            timeLeft = 30;
            updateDisplay();
        }

        function renderGrid() {
            numberGrid.innerHTML = '';
            numbers.forEach(num => {
                const btn = document.createElement('button');
                btn.className = 'number-btn';
                btn.textContent = num;
                btn.onclick = () => handleNumberClick(num, btn);
                numberGrid.appendChild(btn);
            });
        }

        function handleNumberClick(num, btn) {
            if (!gameRunning) return;

            if (num === currentTarget) {
                // 正解
                btn.classList.add('correct');
                score += 10;
                currentTarget++;

                if (currentTarget > 25) {
                    // 全クリア
                    endGame();
                }
            } else {
                // 不正解
                btn.classList.add('wrong');
                score = Math.max(0, score - 5);
                setTimeout(() => btn.classList.remove('wrong'), 300);
            }

            updateDisplay();
        }

        function updateDisplay() {
            targetDisplay.textContent = currentTarget > 25 ? '🎉' : currentTarget;
            scoreDisplay.textContent = score;
            timerDisplay.textContent = timeLeft;
        }

        function startGame() {
            initGame();
            gameRunning = true;
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');

            timerInterval = setInterval(() => {
                timeLeft--;
                updateDisplay();

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameRunning = false;
            clearInterval(timerInterval);
            finalScoreDisplay.textContent = score;
            gameOverScreen.classList.remove('hidden');
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // タッチのデフォルト動作を防止
        document.addEventListener('touchstart', (e) => {
            if (e.target.classList.contains('number-btn')) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
