<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Quiz - 数式クイズ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .title {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #4ecca3;
        }

        .stat-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 5px;
        }

        .question {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
        }

        .expression {
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 10px;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .option {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .option:active {
            transform: translateY(0);
        }

        .option.correct {
            background: rgba(78, 204, 163, 0.3);
            border-color: #4ecca3;
        }

        .option.wrong {
            background: rgba(238, 82, 83, 0.3);
            border-color: #ee5253;
        }

        .game-over {
            text-align: center;
            display: none;
        }

        .game-over.active {
            display: block;
        }

        .final-score {
            font-size: 72px;
            font-weight: bold;
            color: #4ecca3;
            margin: 20px 0;
        }

        .restart-btn {
            background: linear-gradient(135deg, #4ecca3 0%, #45b393 100%);
            border: none;
            border-radius: 25px;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(78, 204, 163, 0.3);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            .game-container {
                padding: 30px 20px;
            }

            .expression {
                font-size: 36px;
            }

            .option {
                padding: 15px;
                font-size: 24px;
            }

            .stat-value {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>

    <div class="game-container">
        <div class="header">
            <div class="title">🧮 Math Quiz</div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">スコア</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="lives">3</div>
                <div class="stat-label">ライフ</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="streak">0</div>
                <div class="stat-label">連続正解</div>
            </div>
        </div>

        <div class="question" id="questionArea">
            <div class="expression" id="expression">2 + 2 = ?</div>
            <div class="options" id="options">
                <button class="option" data-answer="4">4</button>
                <button class="option" data-answer="5">5</button>
                <button class="option" data-answer="3">3</button>
                <button class="option" data-answer="6">6</button>
            </div>
        </div>

        <div class="game-over" id="gameOver">
            <div class="title">ゲームオーバー</div>
            <div class="final-score" id="finalScore">0</div>
            <div style="color: rgba(255, 255, 255, 0.7); margin-bottom: 20px;">
                最高連続正解: <span id="bestStreak">0</span>
            </div>
            <button class="restart-btn" id="restartBtn">もう一度プレイ</button>
        </div>
    </div>

    <script>
        let score = 0;
        let lives = 3;
        let streak = 0;
        let bestStreak = 0;
        let currentAnswer = 0;
        let canAnswer = true;

        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const streakEl = document.getElementById('streak');
        const expressionEl = document.getElementById('expression');
        const optionsEl = document.getElementById('options');
        const questionArea = document.getElementById('questionArea');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const bestStreakEl = document.getElementById('bestStreak');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        // 新しい問題を生成
        function generateQuestion() {
            const operations = ['+', '-', '×'];
            const operation = operations[Math.floor(Math.random() * operations.length)];
            let a, b, answer;

            // 難易度に応じて数字を調整
            const difficulty = Math.min(Math.floor(streak / 3), 5);
            const maxNumber = 10 + difficulty * 5;

            a = Math.floor(Math.random() * maxNumber) + 1;
            b = Math.floor(Math.random() * maxNumber) + 1;

            switch (operation) {
                case '+':
                    answer = a + b;
                    break;
                case '-':
                    if (a < b) [a, b] = [b, a]; // マイナスにならないように
                    answer = a - b;
                    break;
                case '×':
                    a = Math.floor(Math.random() * 10) + 1;
                    b = Math.floor(Math.random() * 10) + 1;
                    answer = a * b;
                    break;
            }

            currentAnswer = answer;
            expressionEl.textContent = `${a} ${operation} ${b} = ?`;

            // 選択肢を生成
            const options = generateOptions(answer);
            optionsEl.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.textContent = opt;
                btn.dataset.answer = opt;
                btn.addEventListener('click', () => checkAnswer(opt));
                optionsEl.appendChild(btn);
            });
        }

        // 選択肢を生成
        function generateOptions(correct) {
            const options = [correct];
            while (options.length < 4) {
                const offset = Math.floor(Math.random() * 10) - 5;
                const wrong = correct + offset;
                if (wrong !== correct && wrong >= 0 && !options.includes(wrong)) {
                    options.push(wrong);
                }
            }
            return shuffle(options);
        }

        // 配列をシャッフル
        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // 答えをチェック
        function checkAnswer(selected) {
            if (!canAnswer) return;
            canAnswer = false;

            const buttons = optionsEl.querySelectorAll('.option');
            buttons.forEach(btn => {
                const answer = parseInt(btn.dataset.answer);
                if (answer === currentAnswer) {
                    btn.classList.add('correct');
                } else if (answer === selected) {
                    btn.classList.add('wrong');
                }
            });

            if (selected === currentAnswer) {
                // 正解
                streak++;
                if (streak > bestStreak) bestStreak = streak;
                score += 10 + streak * 5;
                scoreEl.textContent = score;
                streakEl.textContent = streak;
            } else {
                // 不正解
                lives--;
                livesEl.textContent = lives;
                streak = 0;
                streakEl.textContent = streak;

                if (lives <= 0) {
                    setTimeout(showGameOver, 500);
                    return;
                }
            }

            setTimeout(() => {
                canAnswer = true;
                generateQuestion();
            }, 1000);
        }

        // ゲームオーバー
        function showGameOver() {
            questionArea.style.display = 'none';
            gameOverEl.classList.add('active');
            finalScoreEl.textContent = score;
            bestStreakEl.textContent = bestStreak;
        }

        // リスタート
        function restart() {
            score = 0;
            lives = 3;
            streak = 0;
            bestStreak = 0;
            canAnswer = true;

            scoreEl.textContent = score;
            livesEl.textContent = lives;
            streakEl.textContent = streak;

            gameOverEl.classList.remove('active');
            questionArea.style.display = 'block';
            generateQuestion();
        }

        // 全画面
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        restartBtn.addEventListener('click', restart);

        // ゲーム開始
        generateQuestion();
    </script>
</body>
</html>
