<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Quiz - 計算ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
        }
        .stat {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 24px;
            font-weight: bold;
        }
        .stat-label {
            font-size: 12px;
            opacity: 0.9;
            display: block;
            margin-top: 5px;
        }
        .question {
            font-size: 48px;
            font-weight: bold;
            color: #333;
            margin: 30px 0;
            letter-spacing: 2px;
        }
        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .option {
            background: white;
            border: 3px solid #667eea;
            border-radius: 12px;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }
        .option:hover {
            background: #667eea;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        .option:active {
            transform: translateY(-1px);
        }
        .option.correct {
            background: #10b981;
            border-color: #10b981;
            color: white;
            animation: pulse 0.5s ease;
        }
        .option.wrong {
            background: #ef4444;
            border-color: #ef4444;
            color: white;
            animation: shake 0.5s ease;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1000;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }
        .game-over {
            display: none;
        }
        .game-over.show {
            display: block;
        }
        .game-over h2 {
            font-size: 32px;
            color: #333;
            margin-bottom: 20px;
        }
        .game-over p {
            font-size: 18px;
            color: #666;
            margin: 10px 0;
        }
        .final-score {
            font-size: 64px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 20px 0;
        }
        .restart-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .timer {
            font-size: 20px;
            color: #ef4444;
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>
    <div class="container">
        <h1>🧮 Math Quiz</h1>
        <p class="subtitle">計算スピードを競うゲーム</p>
        <div class="stats">
            <div class="stat">
                <div id="score">0</div>
                <span class="stat-label">スコア</span>
            </div>
            <div class="stat">
                <div id="streak">0</div>
                <span class="stat-label">連続正解</span>
            </div>
        </div>
        <div class="timer">残り時間: <span id="timeLeft">30</span>秒</div>
        <div class="game-screen">
            <div class="question" id="question">5 + 3 = ?</div>
            <div class="options" id="options">
                <div class="option" onclick="checkAnswer(8)">8</div>
                <div class="option" onclick="checkAnswer(7)">7</div>
                <div class="option" onclick="checkAnswer(9)">9</div>
                <div class="option" onclick="checkAnswer(6)">6</div>
            </div>
        </div>
        <div class="game-over" id="gameOver">
            <h2>🎮 ゲーム終了！</h2>
            <div class="final-score" id="finalScore">0</div>
            <p>連続正解記録: <span id="finalStreak">0</span></p>
            <p>正解率: <span id="accuracy">0</span>%</p>
            <button class="restart-btn" onclick="restartGame()">もう一度挑戦</button>
        </div>
    </div>
    <script>
        let score = 0;
        let streak = 0;
        let maxStreak = 0;
        let correctAnswers = 0;
        let totalQuestions = 0;
        let timeLeft = 30;
        let timer;
        let currentAnswer = 0;
        let canAnswer = true;

        function generateQuestion() {
            const operations = ['+', '-', '×'];
            const operation = operations[Math.floor(Math.random() * operations.length)];
            let num1, num2, answer;

            switch(operation) {
                case '+':
                    num1 = Math.floor(Math.random() * 20) + 1;
                    num2 = Math.floor(Math.random() * 20) + 1;
                    answer = num1 + num2;
                    break;
                case '-':
                    num1 = Math.floor(Math.random() * 20) + 10;
                    num2 = Math.floor(Math.random() * num1);
                    answer = num1 - num2;
                    break;
                case '×':
                    num1 = Math.floor(Math.random() * 12) + 1;
                    num2 = Math.floor(Math.random() * 12) + 1;
                    answer = num1 * num2;
                    break;
            }

            currentAnswer = answer;
            document.getElementById('question').textContent = `${num1} ${operation} ${num2} = ?`;

            const options = [answer];
            while (options.length < 4) {
                let wrongAnswer = answer + (Math.floor(Math.random() * 10) - 5);
                if (wrongAnswer !== answer && wrongAnswer >= 0 && !options.includes(wrongAnswer)) {
                    options.push(wrongAnswer);
                }
            }
            options.sort(() => Math.random() - 0.5);

            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(opt);
                optionsContainer.appendChild(btn);
            });

            canAnswer = true;
        }

        function checkAnswer(selected) {
            if (!canAnswer) return;
            canAnswer = false;

            totalQuestions++;
            const options = document.querySelectorAll('.option');
            options.forEach(opt => {
                if (parseInt(opt.textContent) === currentAnswer) {
                    opt.classList.add('correct');
                } else if (parseInt(opt.textContent) === selected && selected !== currentAnswer) {
                    opt.classList.add('wrong');
                }
            });

            if (selected === currentAnswer) {
                score += 10 + streak * 2;
                streak++;
                correctAnswers++;
                if (streak > maxStreak) maxStreak = streak;
            } else {
                streak = 0;
            }

            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;

            setTimeout(() => {
                generateQuestion();
            }, 500);
        }

        function startTimer() {
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timeLeft').textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            clearInterval(timer);
            document.querySelector('.game-screen').style.display = 'none';
            document.querySelector('.stats').style.display = 'none';
            document.querySelector('.timer').style.display = 'none';
            document.getElementById('gameOver').classList.add('show');
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalStreak').textContent = maxStreak;
            document.getElementById('accuracy').textContent = totalQuestions > 0 ?
                Math.round((correctAnswers / totalQuestions) * 100) : 0;
        }

        function restartGame() {
            score = 0;
            streak = 0;
            maxStreak = 0;
            correctAnswers = 0;
            totalQuestions = 0;
            timeLeft = 30;

            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('timeLeft').textContent = timeLeft;
            document.querySelector('.game-screen').style.display = 'block';
            document.querySelector('.stats').style.display = 'flex';
            document.querySelector('.timer').style.display = 'block';
            document.getElementById('gameOver').classList.remove('show');

            generateQuestion();
            startTimer();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        generateQuestion();
        startTimer();
    </script>
</body>
</html>
