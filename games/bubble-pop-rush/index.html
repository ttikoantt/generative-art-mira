<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bubble Pop Rush - 泡割りラッシュ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e22ce 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation;
        }
        canvas {
            display: block;
            cursor: crosshair;
        }
        .ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        .score, .time, .combo {
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }
        .score span, .time span, .combo span {
            color: #fbbf24;
            font-size: 24px;
        }
        .combo {
            color: #f472b6;
        }
        .start-screen, .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 200;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .game-over-screen {
            display: none;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f472b6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 18px;
            color: #94a3b8;
            margin-bottom: 40px;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 50px;
            border-radius: 50px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn:hover, .btn:active {
            transform: scale(1.05);
        }
        .final-score {
            font-size: 72px;
            font-weight: bold;
            color: #fbbf24;
            margin: 20px 0;
        }
        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
        }
        .stat {
            text-align: center;
        }
        .stat-label {
            font-size: 14px;
            color: #94a3b8;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: white;
        }
        .fullscreen {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
            z-index: 100;
        }
        .combo-popup {
            position: fixed;
            font-size: 36px;
            font-weight: bold;
            color: #f472b6;
            text-shadow: 0 0 20px rgba(244, 114, 182, 0.8);
            pointer-events: none;
            animation: comboPopup 0.5s ease-out forwards;
            z-index: 150;
        }
        @keyframes comboPopup {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px) scale(1.5);
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="ui" id="ui" style="display: none;">
        <div class="score">Score: <span id="score">0</span></div>
        <div class="combo">Combo: <span id="combo">0</span>x</div>
        <div class="time">Time: <span id="time">60</span></div>
    </div>
    
    <div class="start-screen" id="startScreen">
        <h1>🫧 Bubble Pop Rush</h1>
        <div class="subtitle">泡をタップして割れ！</div>
        <button class="btn" onclick="startGame()">Start Game</button>
    </div>
    
    <div class="game-over-screen" id="gameOverScreen">
        <h1>Game Over!</h1>
        <div class="final-score" id="finalScore">0</div>
        <div class="stats">
            <div class="stat">
                <div class="stat-label">Bubbles Popped</div>
                <div class="stat-value" id="bubblesPopped">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Max Combo</div>
                <div class="stat-value" id="maxCombo">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Accuracy</div>
                <div class="stat-value" id="accuracy">0%</div>
            </div>
        </div>
        <button class="btn" onclick="startGame()">Play Again</button>
    </div>
    
    <button class="fullscreen" onclick="toggleFullscreen()">⛶</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        
        let bubbles = [];
        let particles = [];
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let timeLeft = 60;
        let gameRunning = false;
        let bubblesPopped = 0;
        let totalClicks = 0;
        let lastPopTime = 0;
        
        const GAME_DURATION = 60;
        const COMBO_TIMEOUT = 1500; // ミリ秒
        
        class Bubble {
            constructor() {
                this.radius = 20 + Math.random() * 40;
                this.x = this.radius + Math.random() * (width - this.radius * 2);
                this.y = height + this.radius;
                this.speed = 1 + Math.random() * 2 + (score / 1000); // スコアで加速
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.02 + Math.random() * 0.02;
                this.hue = Math.random() * 360;
                this.alpha = 0.7 + Math.random() * 0.3;
                this.points = Math.floor(100 - this.radius) + 10;
            }
            
            update() {
                this.y -= this.speed;
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 0.5;
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                
                // 泡の本体
                const gradient = ctx.createRadialGradient(
                    this.x - this.radius * 0.3, 
                    this.y - this.radius * 0.3, 
                    0,
                    this.x, 
                    this.y, 
                    this.radius
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 70%, 0.9)`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 70%, 50%, 0.6)`);
                gradient.addColorStop(1, `hsla(${this.hue}, 60%, 40%, 0.3)`);
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // ハイライト
                ctx.beginPath();
                ctx.arc(
                    this.x - this.radius * 0.3,
                    this.y - this.radius * 0.3,
                    this.radius * 0.2,
                    0,
                    Math.PI * 2
                );
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.fill();
                
                // ポイント表示
                ctx.fillStyle = 'white';
                ctx.font = `bold ${this.radius * 0.5}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.points, this.x, this.y);
                
                ctx.restore();
            }
            
            isOffScreen() {
                return this.y < -this.radius;
            }
            
            contains(x, y) {
                const dx = this.x - x;
                const dy = this.y - y;
                return Math.sqrt(dx * dx + dy * dy) < this.radius;
            }
        }
        
        class Particle {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.radius = 2 + Math.random() * 4;
                this.speedX = (Math.random() - 0.5) * 8;
                this.speedY = (Math.random() - 0.5) * 8;
                this.hue = hue;
                this.alpha = 1;
                this.decay = 0.02 + Math.random() * 0.02;
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += 0.2; // 重力
                this.alpha -= this.decay;
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${this.hue}, 80%, 60%)`;
                ctx.fill();
                ctx.restore();
            }
        }
        
        function spawnBubble() {
            if (gameRunning) {
                bubbles.push(new Bubble());
                
                // 難易度上昇：スコアが高いほど泡が増える
                const spawnRate = Math.max(500, 1500 - score);
                setTimeout(spawnBubble, spawnRate);
            }
        }
        
        function popBubble(bubble) {
            const now = Date.now();
            
            // コンボ判定
            if (now - lastPopTime < COMBO_TIMEOUT) {
                combo++;
            } else {
                combo = 1;
            }
            lastPopTime = now;
            maxCombo = Math.max(maxCombo, combo);
            
            // スコア計算（コンボボーナス）
            const comboBonus = Math.min(combo, 10);
            const points = bubble.points * comboBonus;
            score += points;
            bubblesPopped++;
            
            // パーティクル生成
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(bubble.x, bubble.y, bubble.hue));
            }
            
            // コンボポップアップ
            if (combo >= 3) {
                showComboPopup(combo, bubble.x, bubble.y);
            }
            
            updateUI();
        }
        
        function showComboPopup(comboCount, x, y) {
            const popup = document.createElement('div');
            popup.className = 'combo-popup';
            popup.textContent = `${comboCount}x COMBO!`;
            popup.style.left = x + 'px';
            popup.style.top = y + 'px';
            document.body.appendChild(popup);
            
            setTimeout(() => popup.remove(), 500);
        }
        
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;
            document.getElementById('time').textContent = timeLeft;
        }
        
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('ui').style.display = 'flex';
            
            bubbles = [];
            particles = [];
            score = 0;
            combo = 0;
            maxCombo = 0;
            timeLeft = GAME_DURATION;
            bubblesPopped = 0;
            totalClicks = 0;
            gameRunning = true;
            
            updateUI();
            spawnBubble();
            startTimer();
            animate();
        }
        
        function startTimer() {
            const timer = setInterval(() => {
                if (!gameRunning) {
                    clearInterval(timer);
                    return;
                }
                
                timeLeft--;
                updateUI();
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    endGame();
                }
            }, 1000);
        }
        
        function endGame() {
            gameRunning = false;
            
            document.getElementById('ui').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'flex';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('bubblesPopped').textContent = bubblesPopped;
            document.getElementById('maxCombo').textContent = maxCombo;
            
            const accuracy = totalClicks > 0 
                ? Math.round((bubblesPopped / totalClicks) * 100) 
                : 0;
            document.getElementById('accuracy').textContent = accuracy + '%';
        }
        
        function handleClick(x, y) {
            if (!gameRunning) return;
            
            totalClicks++;
            
            for (let i = bubbles.length - 1; i >= 0; i--) {
                if (bubbles[i].contains(x, y)) {
                    popBubble(bubbles[i]);
                    bubbles.splice(i, 1);
                    return;
                }
            }
            
            // 外したらコンボリセット
            combo = 0;
            updateUI();
        }
        
        // イベントリスナー
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            handleClick(e.clientX - rect.left, e.clientY - rect.top);
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            handleClick(touch.clientX - rect.left, touch.clientY - rect.top);
        });
        
        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            // 泡の更新と描画
            for (let i = bubbles.length - 1; i >= 0; i--) {
                bubbles[i].update();
                bubbles[i].draw();
                
                if (bubbles[i].isOffScreen()) {
                    bubbles.splice(i, 1);
                }
            }
            
            // パーティクルの更新と描画
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            if (gameRunning) {
                requestAnimationFrame(animate);
            }
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        // ウィンドウサイズ変更
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
