<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Memory Patterns - Match Beautiful Cards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 100%);
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .title {
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 2px 20px rgba(0, 212, 255, 0.5);
            margin-bottom: 10px;
        }
        
        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }
        
        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .stat-value {
            color: #00d4ff;
            font-size: 24px;
            font-weight: bold;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-width: 400px;
            width: 100%;
        }
        
        .card {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        
        .card.flipped {
            transform: rotateY(180deg);
        }
        
        .card.matched {
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.5s ease;
        }
        
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .card-front {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 153, 255, 0.3));
            border: 2px solid rgba(0, 212, 255, 0.3);
        }
        
        .card-front::before {
            content: '?';
            font-size: 32px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: bold;
        }
        
        .card-back {
            transform: rotateY(180deg);
            background: rgba(255, 255, 255, 0.95);
        }
        
        .pattern {
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }
        
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.6);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .win-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .win-modal.show {
            opacity: 1;
            visibility: visible;
        }
        
        .win-content {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 153, 255, 0.3));
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid rgba(0, 212, 255, 0.3);
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }
        
        .win-modal.show .win-content {
            transform: scale(1);
        }
        
        .win-title {
            color: white;
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 2px 20px rgba(0, 212, 255, 0.5);
        }
        
        .win-stats {
            color: rgba(255, 255, 255, 0.9);
            font-size: 18px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 480px) {
            .grid {
                gap: 8px;
            }
            
            .title {
                font-size: 22px;
            }
            
            .stat-value {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="title">Memory Patterns</div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="moves">0</div>
                    <div>Moves</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="matches">0</div>
                    <div>Matches</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="timer">0:00</div>
                    <div>Time</div>
                </div>
            </div>
        </div>
        
        <div class="grid" id="grid"></div>
        
        <div class="controls">
            <button class="btn btn-primary" onclick="restartGame()">New Game</button>
            <button class="btn btn-secondary" onclick="showPatterns()">Patterns</button>
        </div>
    </div>
    
    <div class="win-modal" id="winModal">
        <div class="win-content">
            <div class="win-title">🎉 You Won! 🎉</div>
            <div class="win-stats" id="winStats"></div>
            <button class="btn btn-primary" onclick="restartGame()">Play Again</button>
        </div>
    </div>
    
    <script>
        // Pattern generators
        const patterns = [
            // Gradient circles
            (canvas) => {
                const ctx = canvas.getContext('2d');
                const gradient = ctx.createRadialGradient(
                    canvas.width/2, canvas.height/2, 0,
                    canvas.width/2, canvas.height/2, canvas.width/2
                );
                gradient.addColorStop(0, '#ff006e');
                gradient.addColorStop(1, '#ff4d94');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            },
            // Gradient circles 2
            (canvas) => {
                const ctx = canvas.getContext('2d');
                const gradient = ctx.createRadialGradient(
                    canvas.width/2, canvas.height/2, 0,
                    canvas.width/2, canvas.height/2, canvas.width/2
                );
                gradient.addColorStop(0, '#00d4ff');
                gradient.addColorStop(1, '#0099ff');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            },
            // Gradient circles 3
            (canvas) => {
                const ctx = canvas.getContext('2d');
                const gradient = ctx.createRadialGradient(
                    canvas.width/2, canvas.height/2, 0,
                    canvas.width/2, canvas.height/2, canvas.width/2
                );
                gradient.addColorStop(0, '#00ff88');
                gradient.addColorStop(1, '#00cc6a');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            },
            // Gradient circles 4
            (canvas) => {
                const ctx = canvas.getContext('2d');
                const gradient = ctx.createRadialGradient(
                    canvas.width/2, canvas.height/2, 0,
                    canvas.width/2, canvas.height/2, canvas.width/2
                );
                gradient.addColorStop(0, '#ffdd00');
                gradient.addColorStop(1, '#ffaa00');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            },
            // Striped pattern
            (canvas) => {
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#bb00ff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = '#9900ff';
                ctx.lineWidth = 3;
                for (let i = 0; i < 10; i++) {
                    ctx.beginPath();
                    ctx.moveTo(0, i * canvas.height / 10);
                    ctx.lineTo(canvas.width, i * canvas.height / 10);
                    ctx.stroke();
                }
            },
            // Dotted pattern
            (canvas) => {
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#ff6600';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ff4400';
                for (let i = 0; i < 5; i++) {
                    for (let j = 0; j < 5; j++) {
                        ctx.beginPath();
                        ctx.arc(
                            (i + 0.5) * canvas.width / 5,
                            (j + 0.5) * canvas.height / 5,
                            5, 0, Math.PI * 2
                        );
                        ctx.fill();
                    }
                }
            },
            // Wave pattern
            (canvas) => {
                const ctx = canvas.getContext('2d');
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                gradient.addColorStop(0, '#00d4ff');
                gradient.addColorStop(0.5, '#00ff88');
                gradient.addColorStop(1, '#00d4ff');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 2;
                for (let i = 0; i < 5; i++) {
                    ctx.beginPath();
                    for (let x = 0; x < canvas.width; x++) {
                        const y = canvas.height / 2 + Math.sin(x * 0.05 + i) * 20;
                        if (x === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.stroke();
                }
            },
            // Spiral pattern
            (canvas) => {
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#ff006e';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.strokeStyle = '#ff4d94';
                ctx.lineWidth = 2;
                ctx.beginPath();
                for (let i = 0; i < 100; i++) {
                    const angle = i * 0.3;
                    const radius = i * 0.5;
                    const x = canvas.width/2 + Math.cos(angle) * radius;
                    const y = canvas.height/2 + Math.sin(angle) * radius;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }
        ];
        
        // Game state
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let gameStarted = false;
        let timerInterval = null;
        let seconds = 0;
        
        // Initialize game
        function initGame() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            // Reset state
            cards = [];
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            gameStarted = false;
            seconds = 0;
            
            if (timerInterval) clearInterval(timerInterval);
            
            updateStats();
            
            // Create pairs
            const numPairs = 8;
            const patternIndices = Array.from({length: numPairs}, (_, i) => i % patterns.length);
            
            // Shuffle
            const shuffled = [...patternIndices, ...patternIndices]
                .sort(() => Math.random() - 0.5);
            
            // Create cards
            shuffled.forEach((patternIndex, i) => {
                const card = createCard(patternIndex, i);
                cards.push(card);
                grid.appendChild(card.element);
            });
        }
        
        // Create card
        function createCard(patternIndex, id) {
            const element = document.createElement('div');
            element.className = 'card';
            element.dataset.id = id;
            element.dataset.pattern = patternIndex;
            
            const front = document.createElement('div');
            front.className = 'card-face card-front';
            
            const back = document.createElement('div');
            back.className = 'card-face card-back';
            
            const canvas = document.createElement('canvas');
            canvas.width = 100;
            canvas.height = 100;
            canvas.className = 'pattern';
            patterns[patternIndex](canvas);
            back.appendChild(canvas);
            
            element.appendChild(front);
            element.appendChild(back);
            
            element.addEventListener('click', () => flipCard(card));
            
            return { element, patternIndex, id, flipped: false, matched: false };
        }
        
        // Flip card
        function flipCard(card) {
            if (card.flipped || card.matched || flippedCards.length >= 2) return;
            
            // Start timer on first flip
            if (!gameStarted) {
                gameStarted = true;
                startTimer();
            }
            
            card.flipped = true;
            card.element.classList.add('flipped');
            flippedCards.push(card);
            
            if (flippedCards.length === 2) {
                moves++;
                updateStats();
                checkMatch();
            }
        }
        
        // Check for match
        function checkMatch() {
            const [card1, card2] = flippedCards;
            
            if (card1.patternIndex === card2.patternIndex) {
                // Match found
                card1.matched = true;
                card2.matched = true;
                
                setTimeout(() => {
                    card1.element.classList.add('matched');
                    card2.element.classList.add('matched');
                    matchedPairs++;
                    updateStats();
                    
                    if (matchedPairs === 8) {
                        endGame();
                    }
                }, 500);
                
                flippedCards = [];
            } else {
                // No match
                setTimeout(() => {
                    card1.flipped = false;
                    card2.flipped = false;
                    card1.element.classList.remove('flipped');
                    card2.element.classList.remove('flipped');
                    flippedCards = [];
                }, 1000);
            }
        }
        
        // Update stats
        function updateStats() {
            document.getElementById('moves').textContent = moves;
            document.getElementById('matches').textContent = matchedPairs;
        }
        
        // Start timer
        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                document.getElementById('timer').textContent = 
                    `${mins}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        }
        
        // End game
        function endGame() {
            clearInterval(timerInterval);
            
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            const timeStr = `${mins}:${secs.toString().padStart(2, '0')}`;
            
            document.getElementById('winStats').innerHTML = `
                Moves: ${moves}<br>
                Time: ${timeStr}
            `;
            
            setTimeout(() => {
                document.getElementById('winModal').classList.add('show');
            }, 500);
        }
        
        // Restart game
        function restartGame() {
            document.getElementById('winModal').classList.remove('show');
            initGame();
        }
        
        // Show all patterns briefly
        function showPatterns() {
            if (gameStarted) return;
            
            cards.forEach(card => {
                card.element.classList.add('flipped');
            });
            
            setTimeout(() => {
                cards.forEach(card => {
                    card.element.classList.remove('flipped');
                });
            }, 2000);
        }
        
        // Initialize on load
        initGame();
    </script>
</body>
</html>
