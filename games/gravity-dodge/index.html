<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gravity Dodge - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0a0a2a 0%, #1a0a3a 50%, #2a0a4a 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100vh;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10, 10, 42, 0.95);
            z-index: 100;
            transition: opacity 0.5s;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .title {
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px rgba(138, 43, 226, 0.8);
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            margin-bottom: 40px;
            text-align: center;
        }

        .btn {
            background: linear-gradient(135deg, #8a2be2 0%, #6a0dad 100%);
            border: none;
            color: white;
            padding: 15px 50px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(138, 43, 226, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(138, 43, 226, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .score-display {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(138, 43, 226, 0.8);
            z-index: 50;
        }

        .high-score {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            z-index: 50;
        }

        .gravity-indicator {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 24px;
            z-index: 50;
            transition: transform 0.3s;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 50;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .final-score {
            font-size: 72px;
            font-weight: bold;
            color: #8a2be2;
            text-shadow: 0 0 30px rgba(138, 43, 226, 0.8);
            margin: 20px 0;
        }

        .new-record {
            color: #ffd700;
            font-size: 24px;
            margin-bottom: 30px;
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .instructions {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-top: 30px;
            text-align: center;
            line-height: 1.8;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 32px;
            }

            .subtitle {
                font-size: 14px;
                padding: 0 20px;
            }

            .score-display {
                font-size: 28px;
            }

            .final-score {
                font-size: 56px;
            }

            .gravity-indicator {
                font-size: 20px;
                left: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="score-display" id="score">0</div>
    <div class="high-score" id="highScore">BEST: 0</div>
    <div class="gravity-indicator" id="gravityIndicator">⬇️</div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="overlay" id="startScreen">
        <div class="title">Gravity Dodge</div>
        <div class="subtitle">重力を操り、障害物を回避せよ</div>
        <button class="btn" onclick="startGame()">スタート</button>
        <div class="instructions">
            画面をタップ/クリックで重力反転<br>
            障害物に当たらないように生き残れ！
        </div>
    </div>

    <div class="overlay hidden" id="gameOverScreen">
        <div class="title">GAME OVER</div>
        <div class="final-score" id="finalScore">0</div>
        <div class="new-record" id="newRecord" style="display: none;">🏆 新記録！</div>
        <button class="btn" onclick="startGame()">リプレイ</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ゲーム状態
        let gameState = 'start'; // start, playing, gameover
        let score = 0;
        let highScore = parseInt(localStorage.getItem('gravityDodgeHighScore')) || 0;

        // プレイヤー
        let player = {
            x: 100,
            y: 0,
            width: 30,
            height: 30,
            velocityY: 0,
            gravity: 0.6,
            gravityDirection: 1, // 1 = 下, -1 = 上
            maxVelocity: 12
        };

        // 障害物
        let obstacles = [];
        let obstacleSpawnTimer = 0;
        let obstacleSpawnInterval = 90; // フレーム数
        let obstacleSpeed = 5;

        // パーティクル（トレイルエフェクト用）
        let particles = [];

        // 初期化
        function init() {
            resize();
            document.getElementById('highScore').textContent = `BEST: ${highScore}`;
        }

        // キャンバスサイズ
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            player.y = canvas.height / 2;
        }

        // ゲーム開始
        function startGame() {
            gameState = 'playing';
            score = 0;
            player.y = canvas.height / 2;
            player.velocityY = 0;
            player.gravityDirection = 1;
            obstacles = [];
            particles = [];
            obstacleSpawnTimer = 0;
            obstacleSpawnInterval = 90;
            obstacleSpeed = 5;

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('score').textContent = '0';
            updateGravityIndicator();

            gameLoop();
        }

        // ゲームオーバー
        function gameOver() {
            gameState = 'gameover';

            const isNewRecord = score > highScore;
            if (isNewRecord) {
                highScore = score;
                localStorage.setItem('gravityDodgeHighScore', highScore);
                document.getElementById('highScore').textContent = `BEST: ${highScore}`;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('newRecord').style.display = isNewRecord ? 'block' : 'none';
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        // 重力反転
        function flipGravity() {
            if (gameState !== 'playing') return;

            player.gravityDirection *= -1;
            player.velocityY = player.gravityDirection * 3;
            updateGravityIndicator();

            // エフェクト
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: player.x + player.width / 2,
                    y: player.y + player.height / 2,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 30,
                    color: `hsl(${270 + Math.random() * 30}, 100%, 60%)`
                });
            }
        }

        // 重力インジケーター更新
        function updateGravityIndicator() {
            const indicator = document.getElementById('gravityIndicator');
            indicator.textContent = player.gravityDirection === 1 ? '⬇️' : '⬆️';
            indicator.style.transform = `translateY(-50%) rotate(${player.gravityDirection === 1 ? 0 : 180}deg)`;
        }

        // 障害物生成
        function spawnObstacle() {
            const fromLeft = Math.random() > 0.5;
            const gap = 180;
            const gapY = Math.random() * (canvas.height - gap - 100) + 50;

            obstacles.push({
                x: fromLeft ? canvas.width : -60,
                y: 0,
                width: 60,
                height: gapY,
                speed: fromLeft ? -obstacleSpeed : obstacleSpeed,
                type: 'top',
                color: `hsl(${Math.random() * 60 + 280}, 70%, 50%)`
            });

            obstacles.push({
                x: fromLeft ? canvas.width : -60,
                y: gapY + gap,
                width: 60,
                height: canvas.height - gapY - gap,
                speed: fromLeft ? -obstacleSpeed : obstacleSpeed,
                type: 'bottom',
                color: `hsl(${Math.random() * 60 + 280}, 70%, 50%)`
            });
        }

        // コリジョン判定
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // ゲームループ
        function gameLoop() {
            if (gameState !== 'playing') return;

            // 背景クリア
            ctx.fillStyle = 'rgba(10, 10, 42, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // プレイヤー更新
            player.velocityY += player.gravity * player.gravityDirection;
            player.velocityY = Math.max(-player.maxVelocity, Math.min(player.maxVelocity, player.velocityY));
            player.y += player.velocityY;

            // 境界チェック
            if (player.y < 0) {
                player.y = 0;
                player.velocityY = 0;
            }
            if (player.y > canvas.height - player.height) {
                player.y = canvas.height - player.height;
                player.velocityY = 0;
            }

            // 障害物生成
            obstacleSpawnTimer++;
            if (obstacleSpawnTimer >= obstacleSpawnInterval) {
                spawnObstacle();
                obstacleSpawnTimer = 0;

                // 難易度上昇
                if (obstacleSpawnInterval > 50) obstacleSpawnInterval -= 2;
                if (obstacleSpeed < 12) obstacleSpeed += 0.2;
            }

            // 障害物更新
            obstacles.forEach((obs, index) => {
                obs.x += obs.speed;

                // 描画
                const gradient = ctx.createLinearGradient(obs.x, 0, obs.x + obs.width, 0);
                gradient.addColorStop(0, obs.color);
                gradient.addColorStop(1, 'rgba(138, 43, 226, 0.3)');
                ctx.fillStyle = gradient;
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

                // グロー
                ctx.shadowBlur = 20;
                ctx.shadowColor = obs.color;
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                ctx.shadowBlur = 0;

                // コリジョン
                if (checkCollision(player, obs)) {
                    gameOver();
                }
            });

            // 画面外の障害物削除
            obstacles = obstacles.filter(obs => obs.x > -100 && obs.x < canvas.width + 100);

            // パーティクル更新
            particles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;

                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 30;
                ctx.fill();
                ctx.globalAlpha = 1;

                if (p.life <= 0) {
                    particles.splice(index, 1);
                }
            });

            // プレイヤー描画
            const playerGradient = ctx.createRadialGradient(
                player.x + player.width / 2, player.y + player.height / 2, 0,
                player.x + player.width / 2, player.y + player.height / 2, player.width
            );
            playerGradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            playerGradient.addColorStop(0.5, 'rgba(138, 43, 226, 0.8)');
            playerGradient.addColorStop(1, 'rgba(138, 43, 226, 0.3)');

            ctx.fillStyle = playerGradient;
            ctx.beginPath();
            ctx.arc(
                player.x + player.width / 2,
                player.y + player.height / 2,
                player.width / 2,
                0, Math.PI * 2
            );
            ctx.fill();

            // グロー
            ctx.shadowBlur = 30;
            ctx.shadowColor = 'rgba(138, 43, 226, 0.8)';
            ctx.fill();
            ctx.shadowBlur = 0;

            // スコア更新
            score++;
            document.getElementById('score').textContent = score;

            requestAnimationFrame(gameLoop);
        }

        // イベントリスナー
        window.addEventListener('resize', resize);

        canvas.addEventListener('click', flipGravity);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            flipGravity();
        }, { passive: false });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState === 'playing') {
                    flipGravity();
                } else if (gameState === 'start' || gameState === 'gameover') {
                    startGame();
                }
            }
        });

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        init();
    </script>
</body>
</html>
