<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gravity Dodge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }

        canvas {
            display: block;
        }

        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            pointer-events: none;
            user-select: none;
        }

        .score {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .gravity-indicator {
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.8;
        }

        .gravity-bar {
            width: 100px;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 5px;
        }

        .gravity-fill {
            height: 100%;
            background: linear-gradient(90deg, #0ff, #f0f);
            transition: width 0.3s ease;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #0ff;
            display: none;
        }

        .game-over h2 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #f0f;
        }

        .game-over p {
            font-size: 18px;
            margin: 10px 0;
            opacity: 0.9;
        }

        .restart-btn {
            margin-top: 25px;
            padding: 15px 40px;
            font-size: 18px;
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0ff, #f0f);
            color: #000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            pointer-events: all;
        }

        .restart-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .restart-btn:active {
            transform: scale(0.95);
        }

        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        .start-screen h1 {
            font-size: 36px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #0ff, #f0f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .start-screen p {
            font-size: 14px;
            margin: 8px 0;
            opacity: 0.8;
        }

        .start-btn {
            margin-top: 30px;
            padding: 18px 50px;
            font-size: 20px;
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0ff, #f0f);
            color: #000;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .start-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="ui">
        <div class="score">Score: <span id="score">0</span></div>
        <div class="gravity-indicator">
            Gravity Change
            <div class="gravity-bar">
                <div class="gravity-fill" id="gravityFill"></div>
            </div>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="start-screen" id="startScreen">
        <h1>🌌 Gravity Dodge</h1>
        <p>Dodge obstacles as gravity shifts!</p>
        <p>Tap/Click to move in that direction</p>
        <p>Gravity changes every few seconds</p>
        <button class="start-btn" onclick="startGame()">START</button>
    </div>

    <div class="game-over" id="gameOver">
        <h2>GAME OVER</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <p>Best Score: <span id="bestScore">0</span></p>
        <button class="restart-btn" onclick="restartGame()">RETRY</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let player;
        let obstacles = [];
        let score = 0;
        let bestScore = localStorage.getItem('gravityDodgeBest') || 0;
        let gameRunning = false;
        let gravityY = 0.3;
        let gravityTimer = 0;
        let gravityChangeInterval = 180; // 3 seconds at 60fps
        let lastTime = 0;
        let spawnTimer = 0;
        let spawnInterval = 60;

        // Player class
        class Player {
            constructor() {
                this.x = width / 2;
                this.y = height / 2;
                this.radius = 12;
                this.vx = 0;
                this.vy = 0;
                this.targetX = this.x;
                this.targetY = this.y;
            }

            update() {
                // Move towards target
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                this.vx = dx * 0.15;
                this.vy = dy * 0.15;

                // Apply gravity
                this.vy += gravityY;

                // Update position
                this.x += this.vx;
                this.y += this.vy;

                // Keep in bounds
                this.x = Math.max(this.radius, Math.min(width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(height - this.radius, this.y));
            }

            draw() {
                // Glow
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * 2);
                gradient.addColorStop(0, 'rgba(0, 255, 255, 0.5)');
                gradient.addColorStop(1, 'rgba(0, 255, 255, 0)');

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Core
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#0ff';
                ctx.fill();

                // Inner glow
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.6, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
            }

            setTarget(x, y) {
                this.targetX = x;
                this.targetY = y;
            }
        }

        // Obstacle class
        class Obstacle {
            constructor() {
                this.radius = 15 + Math.random() * 25;
                this.x = Math.random() * (width - this.radius * 2) + this.radius;
                this.y = -this.radius;
                this.speed = 3 + Math.random() * 4 + score * 0.02;
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.sides = 4 + Math.floor(Math.random() * 3);
                this.color = `hsl(${Math.random() * 60 + 280}, 80%, 60%)`;
            }

            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;
                return this.y > height + this.radius;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // Glow
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;

                // Draw polygon
                ctx.beginPath();
                for (let i = 0; i < this.sides; i++) {
                    const angle = (i / this.sides) * Math.PI * 2;
                    const x = Math.cos(angle) * this.radius;
                    const y = Math.sin(angle) * this.radius;
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.closePath();

                ctx.strokeStyle = this.color;
                ctx.lineWidth = 3;
                ctx.stroke();

                ctx.restore();
            }

            collidesWith(player) {
                const dx = this.x - player.x;
                const dy = this.y - player.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                return dist < this.radius + player.radius;
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function init() {
            resize();
            player = new Player();
            obstacles = [];
            score = 0;
            gravityY = 0.3;
            gravityTimer = 0;
            spawnTimer = 0;
            spawnInterval = 60;

            document.getElementById('bestScore').textContent = bestScore;
        }

        function changeGravity() {
            // Random gravity direction
            const directions = [
                { y: 0.5, name: '↓' },
                { y: 0.3, name: '↘' },
                { y: 0.2, name: '→' },
                { y: 0.1, name: '↗' },
                { y: 0, name: '・' },
                { y: -0.1, name: '↖' },
                { y: -0.2, name: '←' },
                { y: -0.3, name: '↙' },
                { y: -0.5, name: '↑' }
            ];

            const dir = directions[Math.floor(Math.random() * directions.length)];
            gravityY = dir.y;
            gravityTimer = 0;
        }

        function spawnObstacle() {
            obstacles.push(new Obstacle());
        }

        function update(deltaTime) {
            // Update gravity timer
            gravityTimer++;
            const gravityProgress = gravityTimer / gravityChangeInterval;
            document.getElementById('gravityFill').style.width = (gravityProgress * 100) + '%';

            if (gravityTimer >= gravityChangeInterval) {
                changeGravity();
            }

            // Update player
            player.update();

            // Spawn obstacles
            spawnTimer++;
            if (spawnTimer >= spawnInterval) {
                spawnObstacle();
                spawnTimer = 0;
                // Gradually increase difficulty
                spawnInterval = Math.max(20, 60 - score * 0.5);
            }

            // Update obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obstacle = obstacles[i];
                if (obstacle.update()) {
                    obstacles.splice(i, 1);
                    score++;
                    document.getElementById('score').textContent = score;
                } else if (obstacle.collidesWith(player)) {
                    gameOver();
                    return;
                }
            }
        }

        function draw() {
            // Clear with fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, width, height);

            // Draw gravity indicator arrows
            ctx.save();
            ctx.globalAlpha = 0.1;
            const arrowSize = 30;
            const spacing = 100;
            for (let x = arrowSize; x < width; x += spacing) {
                for (let y = arrowSize; y < height; y += spacing) {
                    ctx.beginPath();
                    ctx.arc(x, y, 3, 0, Math.PI * 2);
                    ctx.fillStyle = '#0ff';
                    ctx.fill();

                    // Arrow
                    const gravY = -gravityY * arrowSize;
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(x, y + gravY);
                    ctx.strokeStyle = '#0ff';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
            ctx.restore();

            // Draw obstacles
            for (let obstacle of obstacles) {
                obstacle.draw();
            }

            // Draw player
            player.draw();

            // Draw gravity warning
            if (gravityTimer >= gravityChangeInterval - 60) {
                const warningOpacity = (gravityTimer - (gravityChangeInterval - 60)) / 60;
                ctx.save();
                ctx.globalAlpha = warningOpacity * 0.3;
                ctx.fillStyle = '#f0f';
                ctx.font = 'bold 48px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('⚠ GRAVITY SHIFT ⚠', width / 2, height / 2);
                ctx.restore();
            }
        }

        function gameLoop(timestamp) {
            if (!gameRunning) return;

            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;

            update(deltaTime);
            draw();

            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false;

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('gravityDodgeBest', bestScore);
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('bestScore').textContent = bestScore;
            document.getElementById('gameOver').style.display = 'block';
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';
            init();
            gameRunning = true;
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function restartGame() {
            startGame();
        }

        // Input handlers
        function handleInput(e) {
            if (!gameRunning) return;
            e.preventDefault();

            const rect = canvas.getBoundingClientRect();
            let x, y;

            if (e.touches) {
                x = e.touches[0].clientX - rect.left;
                y = e.touches[0].clientY - rect.top;
            } else {
                x = e.clientX - rect.left;
                y = e.clientY - rect.top;
            }

            player.setTarget(x, y);
        }

        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('mousemove', (e) => {
            if (e.buttons === 1) handleInput(e);
        });

        canvas.addEventListener('touchstart', handleInput, { passive: false });
        canvas.addEventListener('touchmove', handleInput, { passive: false });

        window.addEventListener('resize', resize);

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initial setup
        resize();
    </script>
</body>
</html>
