<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Blitz - �語当てゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            font-size: 18px;
            font-weight: bold;
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            color: #999;
            font-size: 14px;
        }

        .info-value {
            color: #667eea;
            font-size: 24px;
        }

        .word-display {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 10px;
            margin: 30px 0;
            color: #333;
            min-height: 40px;
        }

        .keyboard {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px;
            margin-top: 20px;
        }

        .key {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 5px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .key:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .key:disabled {
            background: #ddd;
            cursor: not-allowed;
        }

        .key.correct {
            background: #10b981;
        }

        .key.wrong {
            background: #ef4444;
        }

        .message {
            text-align: center;
            margin: 20px 0;
            font-size: 20px;
            font-weight: bold;
            min-height: 30px;
        }

        .message.win {
            color: #10b981;
        }

        .message.lose {
            color: #ef4444;
        }

        .new-game-btn {
            width: 100%;
            background: #764ba2;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
        }

        .new-game-btn:hover {
            background: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            z-index: 100;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 22px;
            }

            .word-display {
                font-size: 24px;
                letter-spacing: 5px;
            }

            .keyboard {
                grid-template-columns: repeat(7, 1fr);
                gap: 5px;
            }

            .key {
                padding: 12px 3px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Word Blitz</h1>
        <div class="game-info">
            <div class="info-item">
                <div class="info-label">スコア</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">残り回数</div>
                <div class="info-value" id="attempts">6</div>
            </div>
        </div>

        <div class="word-display" id="word-display"></div>
        <div class="message" id="message"></div>

        <div class="keyboard" id="keyboard"></div>

        <button class="new-game-btn" onclick="initGame()">新しいゲーム</button>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const words = [
            'APPLE', 'BANANA', 'CHERRY', 'DRAGON', 'EAGLE',
            'FLOWER', 'GUITAR', 'HOUSE', 'ISLAND', 'JUNGLE',
            'KOALA', 'LEMON', 'MANGO', 'NATURE', 'OCEAN',
            'PIRATE', 'QUEEN', 'ROBOT', 'SUNNY', 'TIGER',
            'UMBRELLA', 'VIOLET', 'WATER', 'XYLO', 'YELLOW',
            'ZEBRA', 'CLOUD', 'DREAM', 'EARTH', 'FIRE',
            'GOLDEN', 'HAPPY', 'IMAGE', 'JUMP', 'KITE',
            'LIGHT', 'MAGIC', 'NIGHT', 'ORBIT', 'PEACE',
            'QUICK', 'RIVER', 'STORM', 'TRAIN', 'UNITY',
            'VOICE', 'WAVE', 'YOUTH', 'ZONE', 'BRAVE',
            'CREAM', 'DANCE', 'ENERGY', 'FRUIT', 'GRAPE',
            'HEART', 'IVORY', 'JUICE', 'KNIFE', 'LAKE'
        ];

        let currentWord = '';
        let guessedLetters = new Set();
        let attemptsLeft = 6;
        let score = 0;
        let gameOver = false;

        function initGame() {
            currentWord = words[Math.floor(Math.random() * words.length)];
            guessedLetters = new Set();
            attemptsLeft = 6;
            gameOver = false;

            document.getElementById('score').textContent = score;
            document.getElementById('attempts').textContent = attemptsLeft;
            document.getElementById('message').textContent = '';
            document.getElementById('message').className = 'message';

            renderWord();
            renderKeyboard();
        }

        function renderWord() {
            const display = currentWord.split('').map(letter =>
                guessedLetters.has(letter) ? letter : '_'
            ).join(' ');
            document.getElementById('word-display').textContent = display;
        }

        function renderKeyboard() {
            const keyboard = document.getElementById('keyboard');
            keyboard.innerHTML = '';

            for (let i = 65; i <= 90; i++) {
                const letter = String.fromCharCode(i);
                const button = document.createElement('button');
                button.textContent = letter;
                button.className = 'key';

                if (guessedLetters.has(letter)) {
                    button.disabled = true;
                    if (currentWord.includes(letter)) {
                        button.classList.add('correct');
                    } else {
                        button.classList.add('wrong');
                    }
                }

                button.onclick = () => guessLetter(letter);
                keyboard.appendChild(button);
            }
        }

        function guessLetter(letter) {
            if (gameOver || guessedLetters.has(letter)) return;

            guessedLetters.add(letter);

            if (currentWord.includes(letter)) {
                score += 10;
            } else {
                attemptsLeft--;
            }

            document.getElementById('score').textContent = score;
            document.getElementById('attempts').textContent = attemptsLeft;

            renderWord();
            renderKeyboard();
            checkGameEnd();
        }

        function checkGameEnd() {
            const allGuessed = currentWord.split('').every(letter => guessedLetters.has(letter));

            if (allGuessed) {
                gameOver = true;
                score += attemptsLeft * 5;
                document.getElementById('score').textContent = score;
                showMessage('🎉 正解！ +' + (attemptsLeft * 5) + ' ボーナス！', 'win');
            } else if (attemptsLeft <= 0) {
                gameOver = true;
                showMessage('😢 ゲームオーバー！答え: ' + currentWord, 'lose');
            }
        }

        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = 'message ' + type;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            const letter = e.key.toUpperCase();
            if (letter >= 'A' && letter <= 'Z') {
                guessLetter(letter);
            }
        });

        initGame();
    </script>
</body>
</html>
