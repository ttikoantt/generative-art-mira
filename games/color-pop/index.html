<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Pop - ストロープ効果ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .game-container {
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #333;
        }

        .word-display {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .word-display::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 50%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #colorWord {
            font-size: 4rem;
            font-weight: bold;
            text-shadow: 0 0 30px currentColor;
            z-index: 1;
            transition: all 0.1s ease;
            animation: pulse 0.5s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .color-btn {
            padding: 25px;
            border: none;
            border-radius: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            text-transform: uppercase;
        }

        .color-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .color-btn.correct {
            animation: correct 0.5s ease;
        }

        @keyframes correct {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); box-shadow: 0 0 30px rgba(0, 255, 0, 0.5); }
        }

        .color-btn.wrong {
            animation: wrong 0.5s ease;
        }

        @keyframes wrong {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .timer-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            transition: width 0.1s linear;
            border-radius: 10px;
        }

        .timer-fill.warning {
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .overlay-content {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .overlay-content h2 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .overlay-content p {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .overlay-content button {
            padding: 15px 40px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .overlay-content button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }

            #colorWord {
                font-size: 3rem;
            }

            .color-btn {
                padding: 20px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <h1>🎨 Color Pop</h1>
        <p class="subtitle">文字の<strong>色</strong>に対応するボタンを押せ！</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">連続</div>
                <div class="stat-value" id="combo">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">ハイスコア</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>

        <div class="word-display">
            <span id="colorWord">準備</span>
        </div>

        <div class="timer-bar">
            <div class="timer-fill" id="timerFill"></div>
        </div>

        <div class="options">
            <button class="color-btn" onclick="checkAnswer('red')" style="background: linear-gradient(135deg, #ff6b6b, #ee5a24); color: white;">赤</button>
            <button class="color-btn" onclick="checkAnswer('blue')" style="background: linear-gradient(135deg, #4facfe, #00f2fe); color: white;">青</button>
            <button class="color-btn" onclick="checkAnswer('green')" style="background: linear-gradient(135deg, #43e97b, #38f9d7); color: white;">緑</button>
            <button class="color-btn" onclick="checkAnswer('yellow')" style="background: linear-gradient(135deg, #f9d423, #ff4e50); color: white;">黄</button>
        </div>
    </div>

    <!-- Start Overlay -->
    <div class="overlay" id="startOverlay">
        <div class="overlay-content">
            <h2>🎨 Color Pop</h2>
            <p>画面に表示される<strong>文字の色</strong>に対応するボタンを押してください。</p>
            <p>例：「<span style="color: blue;">赤</span>」と表示されたら<strong>青</strong>ボタンを押す</p>
            <p>時間内に正解してスコアを稼ごう！</p>
            <button onclick="startGame()">スタート</button>
        </div>
    </div>

    <!-- Game Over Overlay -->
    <div class="overlay hidden" id="gameOverOverlay">
        <div class="overlay-content">
            <h2>ゲームオーバー！</h2>
            <p>スコア: <strong id="finalScore">0</strong></p>
            <p>最大コンボ: <strong id="maxCombo">0</strong></p>
            <button onclick="restartGame()">もう一度</button>
        </div>
    </div>

    <script>
        const colors = {
            red: { name: '赤', hex: '#ff6b6b' },
            blue: { name: '青', hex: '#4facfe' },
            green: { name: '緑', hex: '#43e97b' },
            yellow: { name: '黄', hex: '#f9d423' }
        };

        const colorKeys = Object.keys(colors);
        let currentWord = '';
        let currentColor = '';
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let highScore = localStorage.getItem('colorPopHighScore') || 0;
        let timeLeft = 100;
        let gameInterval;
        let isPlaying = false;

        document.getElementById('highScore').textContent = highScore;

        function startGame() {
            document.getElementById('startOverlay').classList.add('hidden');
            score = 0;
            combo = 0;
            maxCombo = 0;
            timeLeft = 100;
            isPlaying = true;
            updateStats();
            nextWord();
            gameInterval = setInterval(updateTimer, 100);
        }

        function nextWord() {
            const wordColor = colorKeys[Math.floor(Math.random() * colorKeys.length)];
            const textColor = colorKeys[Math.floor(Math.random() * colorKeys.length)];

            currentWord = wordColor;
            currentColor = textColor;

            const colorWordEl = document.getElementById('colorWord');
            colorWordEl.textContent = colors[wordColor].name;
            colorWordEl.style.color = colors[textColor].hex;

            // Reset time
            timeLeft = Math.min(100, 50 + score * 2);
            updateTimer();
        }

        function checkAnswer(selectedColor) {
            if (!isPlaying) return;

            const btn = event.target;

            if (selectedColor === currentColor) {
                // Correct!
                btn.classList.add('correct');
                setTimeout(() => btn.classList.remove('correct'), 500);

                combo++;
                maxCombo = Math.max(maxCombo, combo);
                score += 10 + combo * 2;
                updateStats();
                nextWord();
            } else {
                // Wrong!
                btn.classList.add('wrong');
                setTimeout(() => btn.classList.remove('wrong'), 500);

                combo = 0;
                timeLeft -= 20;
                if (timeLeft <= 0) {
                    endGame();
                }
                updateStats();
            }
        }

        function updateTimer() {
            const timerFill = document.getElementById('timerFill');
            timerFill.style.width = timeLeft + '%';

            if (timeLeft < 30) {
                timerFill.classList.add('warning');
            } else {
                timerFill.classList.remove('warning');
            }

            timeLeft -= 2;
            if (timeLeft <= 0) {
                endGame();
            }
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('colorPopHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameInterval);

            document.getElementById('finalScore').textContent = score;
            document.getElementById('maxCombo').textContent = maxCombo;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        function restartGame() {
            document.getElementById('gameOverOverlay').classList.add('hidden');
            startGame();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
