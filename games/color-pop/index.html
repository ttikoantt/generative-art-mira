<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Color Pop - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            touch-action: manipulation;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: white;
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .target-color {
            color: white;
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .target-color span {
            font-weight: bold;
            font-size: 24px;
            padding: 5px 15px;
            border-radius: 8px;
            margin: 0 5px;
        }

        .game-area {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .color-btn {
            aspect-ratio: 1;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 50px;
            transition: all 0.15s;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .color-btn:active {
            transform: scale(0.9);
        }

        .color-btn.correct {
            animation: correctPop 0.5s;
        }

        .color-btn.wrong {
            animation: wrongShake 0.5s;
        }

        @keyframes correctPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); box-shadow: 0 0 30px currentColor; }
            100% { transform: scale(1); }
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-bottom: 5px;
        }

        .stat-value {
            color: white;
            font-size: 28px;
            font-weight: bold;
        }

        .combo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            pointer-events: none;
            opacity: 0;
            z-index: 100;
        }

        .combo.show {
            animation: comboPopup 0.8s;
        }

        @keyframes comboPopup {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
        }

        .time-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .time-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff87, #60efff);
            transition: width 0.1s linear;
        }

        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .game-over.show {
            display: flex;
        }

        .game-over h2 {
            color: white;
            font-size: 48px;
            margin-bottom: 20px;
        }

        .game-over p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 24px;
            margin-bottom: 30px;
        }

        .restart-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
            transition: all 0.3s;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            z-index: 50;
        }

        .instructions {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Color Pop</h1>

        <div class="target-color">
            ターゲット: <span id="targetColor">🔴</span>
        </div>

        <div class="game-area">
            <button class="color-btn" data-color="red">🔴</button>
            <button class="color-btn" data-color="blue">🔵</button>
            <button class="color-btn" data-color="green">🟢</button>
            <button class="color-btn" data-color="yellow">🟡</button>
            <button class="color-btn" data-color="purple">🟣</button>
            <button class="color-btn" data-color="orange">🟠</button>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">コンボ</div>
                <div class="stat-value" id="combo">0</div>
            </div>
        </div>

        <div class="time-bar">
            <div class="time-fill" id="timeFill"></div>
        </div>

        <p class="instructions">ターゲットの色のボタンをタップ！</p>
    </div>

    <div class="combo" id="combo"></div>

    <div class="game-over" id="gameOver">
        <h2>ゲームオーバー！</h2>
        <p>スコア: <span id="finalScore">0</span></p>
        <p>最高コンボ: <span id="maxCombo">0</span></p>
        <button class="restart-btn" id="restartBtn">もう一度遊ぶ</button>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">📺 全画面</button>

    <script>
        const colors = [
            { name: 'red', emoji: '🔴', bg: 'linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%)' },
            { name: 'blue', emoji: '🔵', bg: 'linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%)' },
            { name: 'green', emoji: '🟢', bg: 'linear-gradient(135deg, #a8e6cf 0%, #56ab2f 100%)' },
            { name: 'yellow', emoji: '🟡', bg: 'linear-gradient(135deg, #ffd93d 0%, #f9c802 100%)' },
            { name: 'purple', emoji: '🟣', bg: 'linear-gradient(135deg, #a8a4e6 0%, #7c73e6 100%)' },
            { name: 'orange', emoji: '🟠', bg: 'linear-gradient(135deg, #ffcc33 0%, #ff9933 100%)' }
        ];

        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let targetColor = colors[0];
        let timeLeft = 100;
        let gameInterval;
        let isPlaying = false;

        const scoreEl = document.getElementById('score');
        const comboEl = document.getElementById('combo');
        const targetColorEl = document.getElementById('targetColor');
        const timeFill = document.getElementById('timeFill');
        const comboPopup = document.getElementById('combo');
        const gameOver = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const maxComboEl = document.getElementById('maxCombo');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        // Initialize buttons
        document.querySelectorAll('.color-btn').forEach(btn => {
            const colorName = btn.dataset.color;
            const color = colors.find(c => c.name === colorName);
            btn.style.background = color.bg;
        });

        function setNewTarget() {
            targetColor = colors[Math.floor(Math.random() * colors.length)];
            targetColorEl.textContent = targetColor.emoji;
            targetColorEl.style.background = targetColor.bg;
        }

        function startGame() {
            score = 0;
            combo = 0;
            maxCombo = 0;
            timeLeft = 100;
            isPlaying = true;

            scoreEl.textContent = '0';
            comboEl.textContent = '0';
            gameOver.classList.remove('show');

            setNewTarget();

            gameInterval = setInterval(() => {
                timeLeft -= 0.5;
                timeFill.style.width = timeLeft + '%';

                if (timeLeft <= 0) {
                    endGame();
                } else if (timeLeft < 30) {
                    timeFill.style.background = 'linear-gradient(90deg, #ff6b6b, #ee5a5a)';
                } else {
                    timeFill.style.background = 'linear-gradient(90deg, #00ff87, #60efff)';
                }
            }, 50);
        }

        function endGame() {
            clearInterval(gameInterval);
            isPlaying = false;

            finalScoreEl.textContent = score;
            maxComboEl.textContent = maxCombo;
            gameOver.classList.add('show');
        }

        function showCombo() {
            if (combo >= 3) {
                comboPopup.textContent = `${combo} コンボ!`;
                comboPopup.classList.remove('show');
                void comboPopup.offsetWidth; // Trigger reflow
                comboPopup.classList.add('show');
            }
        }

        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (!isPlaying) {
                    startGame();
                    return;
                }

                const selectedColor = btn.dataset.color;

                if (selectedColor === targetColor.name) {
                    // Correct!
                    combo++;
                    if (combo > maxCombo) maxCombo = combo;

                    const points = 10 + (combo * 5);
                    score += points;

                    scoreEl.textContent = score;
                    comboEl.textContent = combo;

                    btn.classList.add('correct');
                    setTimeout(() => btn.classList.remove('correct'), 500);

                    showCombo();

                    // Add time
                    timeLeft = Math.min(100, timeLeft + 5);

                    setNewTarget();

                    // Shuffle buttons
                    shuffleButtons();
                } else {
                    // Wrong!
                    combo = 0;
                    comboEl.textContent = '0';

                    btn.classList.add('wrong');
                    setTimeout(() => btn.classList.remove('wrong'), 500);

                    // Lose time
                    timeLeft = Math.max(0, timeLeft - 10);
                }
            });
        });

        function shuffleButtons() {
            const container = document.querySelector('.game-area');
            const buttons = Array.from(container.children);

            for (let i = buttons.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                container.appendChild(buttons[j]);
            }
        }

        restartBtn.addEventListener('click', startGame);

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // Start game on first click
        document.querySelector('.color-btn').addEventListener('click', () => {
            if (!isPlaying) {
                startGame();
            }
        }, { once: true });
    </script>
</body>
</html>
