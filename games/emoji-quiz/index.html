<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Quiz - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        .score-display {
            font-size: 1.2rem;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 25px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
        }

        .game-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2);
        }

        .category-info {
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .emoji-display {
            font-size: 5rem;
            text-align: center;
            margin: 30px 0;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .option-btn {
            padding: 20px;
            font-size: 1.1rem;
            border: none;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.9);
            color: #667eea;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .option-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .option-btn.correct {
            background: #10b981;
            color: white;
        }

        .option-btn.wrong {
            background: #ef4444;
            color: white;
        }

        .feedback {
            text-align: center;
            font-size: 1.3rem;
            margin-top: 20px;
            min-height: 40px;
            font-weight: 600;
        }

        .feedback.correct {
            color: #10b981;
        }

        .feedback.wrong {
            color: #ef4444;
        }

        .next-btn {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            font-size: 1.1rem;
            border: none;
            border-radius: 15px;
            background: linear-gradient(45deg, #f093fb, #f5576c);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            display: none;
        }

        .next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }

        .next-btn.show {
            display: block;
        }

        .game-over {
            text-align: center;
            display: none;
        }

        .game-over.show {
            display: block;
        }

        .final-score {
            font-size: 3rem;
            margin: 30px 0;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        .restart-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            border: none;
            border-radius: 25px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-size: 1.5rem;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(1.1);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            .emoji-display {
                font-size: 4rem;
            }

            .options {
                grid-template-columns: 1fr;
            }

            .game-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎯 Emoji Quiz</h1>
        <div class="score-display">
            スコア: <span id="score">0</span> | Q<span id="question">1</span>/10
        </div>
    </div>

    <div class="game-container" id="game">
        <div class="category-info">カテゴリー: <span id="category">映画</span></div>
        <div class="emoji-display" id="emoji">🎬👻🚫</div>
        <div class="options" id="options"></div>
        <div class="feedback" id="feedback"></div>
        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">次の問題へ ➜</button>
    </div>

    <div class="game-over" id="gameOver">
        <h2>🎉 ゲーム終了！</h2>
        <div class="final-score" id="finalScore">0 / 10</div>
        <p id="resultMessage"></p>
        <br>
        <button class="restart-btn" onclick="restartGame()">🔄 もう一度プレイ</button>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <script>
        // Quiz data
        const quizzes = [
            {
                category: "映画",
                emoji: "🎬👻🚫",
                answer: "ゴーストバスターズ",
                options: ["ゴーストバスターズ", "スター・ウォーズ", "ジュラシック・パーク", "バック・トゥ・ザ・フューチャー"]
            },
            {
                category: "映画",
                emoji: "🦁👑🌍",
                answer: "ライオン・キング",
                options: ["ライオン・キング", "アラジン", "美女と野獣", "リトル・マーメイド"]
            },
            {
                category: "アニメ",
                emoji: "🔴👟🍕",
                answer: "スポンジ・ボブ",
                options: ["スポンジ・ボブ", "サウスパーク", "シンプソンズ", "ファミリー・ガイ"]
            },
            {
                category: "食べ物",
                emoji: "🍕🧀🍅",
                answer: "マルゲリータ",
                options: ["マルゲリータ", "ペペロニ", "ハワイアン", "チーズ"]
            },
            {
                category: "都市",
                emoji: "🗼🗼🍷",
                answer: "パリ",
                options: ["パリ", "ローマ", "ロンドン", "ニューヨーク"]
            },
            {
                category: "映画",
                emoji: "🧙‍♂️💍🏔️",
                answer: "ロード・オブ・ザ・リング",
                options: ["ロード・オブ・ザ・リング", "ハリー・ポッター", "スター・ウォーズ", "アベンジャーズ"]
            },
            {
                category: "動物",
                emoji: "🐼🎋🇨🇳",
                answer: "パンダ",
                options: ["パンダ", "コアラ", "キリン", "ゾウ"]
            },
            {
                category: "映画",
                emoji: "🚢💔🧊",
                answer: "タイタニック",
                options: ["タイタニック", "ポセイドン", "パイレーツ・オブ・カリビアン", "ジョーズ"]
            },
            {
                category: "アニメ",
                emoji: "⚡🦸‍♂️🔴",
                answer: "スパイダーマン",
                options: ["スパイダーマン", "バットマン", "スーパーマン", "アイアンマン"]
            },
            {
                category: "食べ物",
                emoji: "🍣🍚🐟",
                answer: "寿司",
                options: ["寿司", "刺身", "ラーメン", "天ぷら"]
            },
            {
                category: "映画",
                emoji: "🤖🌱🌍",
                answer: "アイ・アム・レジェンド",
                options: ["アイ・アム・レジェンド", "ターミネーター", "マトリックス", "ブレードランナー"]
            },
            {
                category: "都市",
                emoji: "🗽🗼🏙️",
                answer: "ニューヨーク",
                options: ["ニューヨーク", "ロサンゼルス", "シカゴ", "マイアミ"]
            },
            {
                category: "アニメ",
                emoji: "🐭👑🏰",
                answer: "ミッキーマウス",
                options: ["ミッキーマウス", "ドナルドダック", "グーフィー", "プルート"]
            },
            {
                category: "食べ物",
                emoji: "🍜🥢🌶️",
                answer: "ラーメン",
                options: ["ラーメン", "うどん", "そば", "パスタ"]
            },
            {
                category: "映画",
                emoji: "🦈🚤💀",
                answer: "ジョーズ",
                options: ["ジョーズ", "ディープ・ブルー", "シャーク・ネード", "メガ・シャーク"]
            }
        ];

        // Game state
        let score = 0;
        let currentQuestion = 0;
        let shuffledQuestions = [];
        let answered = false;

        // Shuffle array
        function shuffle(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        // Initialize game
        function initGame() {
            shuffledQuestions = shuffle(quizzes).slice(0, 10);
            score = 0;
            currentQuestion = 0;
            updateScore();
            showQuestion();
        }

        // Update score display
        function updateScore() {
            document.getElementById('score').textContent = score;
            document.getElementById('question').textContent = currentQuestion + 1;
        }

        // Show question
        function showQuestion() {
            answered = false;
            const quiz = shuffledQuestions[currentQuestion];

            document.getElementById('category').textContent = quiz.category;
            document.getElementById('emoji').textContent = quiz.emoji;
            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('nextBtn').classList.remove('show');

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';

            const shuffledOptions = shuffle(quiz.options);
            shuffledOptions.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option;
                btn.onclick = () => checkAnswer(option, quiz.answer, btn);
                optionsDiv.appendChild(btn);
            });
        }

        // Check answer
        function checkAnswer(selected, correct, btn) {
            if (answered) return;
            answered = true;

            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => {
                b.style.pointerEvents = 'none';
                if (b.textContent === correct) {
                    b.classList.add('correct');
                }
            });

            const feedback = document.getElementById('feedback');
            if (selected === correct) {
                score++;
                feedback.textContent = '🎉 正解！';
                feedback.className = 'feedback correct';
                btn.classList.add('correct');
            } else {
                feedback.textContent = `❌ 残念！正解は「${correct}」`;
                feedback.className = 'feedback wrong';
                btn.classList.add('wrong');
            }

            updateScore();
            document.getElementById('nextBtn').classList.add('show');
        }

        // Next question
        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion >= 10) {
                endGame();
            } else {
                updateScore();
                showQuestion();
            }
        }

        // End game
        function endGame() {
            document.getElementById('game').style.display = 'none';
            document.getElementById('gameOver').classList.add('show');
            document.getElementById('finalScore').textContent = `${score} / 10`;

            let message = '';
            if (score === 10) {
                message = '🏆 完璧！おめでとうございます！';
            } else if (score >= 8) {
                message = '🌟 素晴らしい！';
            } else if (score >= 6) {
                message = '👍 いい調子！';
            } else if (score >= 4) {
                message = '💪 もう少し頑張れば！';
            } else {
                message = '📚 練習あるのみ！';
            }
            document.getElementById('resultMessage').textContent = message;
        }

        // Restart game
        function restartGame() {
            document.getElementById('game').style.display = 'block';
            document.getElementById('gameOver').classList.remove('show');
            initGame();
        }

        // Toggle fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Start game
        initGame();
    </script>
</body>
</html>
