<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shape Memory - 形の記憶</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
            overflow: hidden;
        }
        
        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 28px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        
        .score-board {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .score-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        
        .score-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            margin-bottom: 5px;
        }
        
        .score-value {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
        }
        
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .shape {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }
        
        .shape:hover {
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        .shape:active {
            transform: scale(0.95);
        }
        
        .shape.active {
            animation: pulse 0.5s;
        }
        
        .shape .icon {
            font-size: 50px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .shape.show .icon {
            opacity: 1;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); }
            50% { transform: scale(1.1); box-shadow: 0 0 20px 10px rgba(255, 255, 255, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }
        
        .message {
            color: #fff;
            font-size: 20px;
            margin-bottom: 20px;
            text-align: center;
            min-height: 30px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
        
        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        
        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }
        
        .start-btn:active {
            transform: translateY(0);
        }
        
        @media (max-width: 600px) {
            .shape {
                width: 80px;
                height: 80px;
            }
            
            .shape .icon {
                font-size: 40px;
            }
            
            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <h1>Shape Memory</h1>
    
    <div class="score-board">
        <div class="score-item">
            <div class="score-label">レベル</div>
            <div class="score-value" id="level">1</div>
        </div>
        <div class="score-item">
            <div class="score-label">スコア</div>
            <div class="score-value" id="score">0</div>
        </div>
        <div class="score-item">
            <div class="score-label">連続正解</div>
            <div class="score-value" id="streak">0</div>
        </div>
    </div>
    
    <div class="message" id="message">スタートボタンを押して始めてね！</div>
    
    <div class="game-board" id="board">
        <div class="shape" data-shape="0"><span class="icon">🔴</span></div>
        <div class="shape" data-shape="1"><span class="icon">🔵</span></div>
        <div class="shape" data-shape="2"><span class="icon">🟢</span></div>
        <div class="shape" data-shape="3"><span class="icon">🟡</span></div>
        <div class="shape" data-shape="4"><span class="icon">🟣</span></div>
        <div class="shape" data-shape="5"><span class="icon">🟠</span></div>
        <div class="shape" data-shape="6"><span class="icon">⭐</span></div>
        <div class="shape" data-shape="7"><span class="icon">💎</span></div>
        <div class="shape" data-shape="8"><span class="icon">🌟</span></div>
    </div>
    
    <button class="start-btn" id="startBtn">スタート</button>

    <script>
        const shapes = document.querySelectorAll('.shape');
        const message = document.getElementById('message');
        const startBtn = document.getElementById('startBtn');
        const levelDisplay = document.getElementById('level');
        const scoreDisplay = document.getElementById('score');
        const streakDisplay = document.getElementById('streak');
        
        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let score = 0;
        let streak = 0;
        let isPlaying = false;
        let isShowingSequence = false;
        
        const icons = ['🔴', '🔵', '🟢', '🟡', '🟣', '🟠', '⭐', '💎', '🌟'];
        
        startBtn.addEventListener('click', startGame);
        
        shapes.forEach((shape, index) => {
            shape.addEventListener('click', () => handleShapeClick(index));
        });
        
        function startGame() {
            sequence = [];
            playerSequence = [];
            level = 1;
            score = 0;
            streak = 0;
            isPlaying = true;
            
            updateDisplay();
            startBtn.style.display = 'none';
            message.textContent = '準備中...';
            
            setTimeout(() => {
                nextRound();
            }, 1000);
        }
        
        function nextRound() {
            playerSequence = [];
            addToSequence();
            showSequence();
        }
        
        function addToSequence() {
            const randomShape = Math.floor(Math.random() * 9);
            sequence.push(randomShape);
        }
        
        async function showSequence() {
            isShowingSequence = true;
            message.textContent = '覚えてね...';
            
            await sleep(500);
            
            for (let i = 0; i < sequence.length; i++) {
                await sleep(300);
                highlightShape(sequence[i]);
                await sleep(600);
            }
            
            isShowingSequence = false;
            message.textContent = '順番にクリック！';
        }
        
        function highlightShape(index) {
            const shape = shapes[index];
            shape.classList.add('show', 'active');
            
            setTimeout(() => {
                shape.classList.remove('active');
            }, 300);
            
            setTimeout(() => {
                shape.classList.remove('show');
            }, 800);
        }
        
        function handleShapeClick(index) {
            if (!isPlaying || isShowingSequence) return;
            
            highlightShape(index);
            playerSequence.push(index);
            
            const currentIndex = playerSequence.length - 1;
            
            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                gameOver();
                return;
            }
            
            if (playerSequence.length === sequence.length) {
                // Correct!
                streak++;
                score += 10 * level;
                updateDisplay();
                
                message.textContent = '正解！';
                
                setTimeout(() => {
                    level++;
                    updateDisplay();
                    nextRound();
                }, 1000);
            }
        }
        
        function gameOver() {
            isPlaying = false;
            message.textContent = `ゲームオーバー！スコア: ${score}`;
            startBtn.textContent = 'もう一度';
            startBtn.style.display = 'block';
        }
        
        function updateDisplay() {
            levelDisplay.textContent = level;
            scoreDisplay.textContent = score;
            streakDisplay.textContent = streak;
        }
        
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        // Prevent scroll on touch
        document.body.addEventListener('touchmove', (e) => {
            if (isPlaying) e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
