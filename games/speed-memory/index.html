<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Memory | Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }

        .game-container {
            text-align: center;
            z-index: 10;
            padding: 20px;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 4rem);
            margin-bottom: 10px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
        }

        .game-area {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .number-display {
            font-size: clamp(4rem, 15vw, 8rem);
            font-weight: bold;
            margin: 20px 0;
            transition: all 0.3s ease;
        }

        .number-display.show {
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            transform: scale(1.1);
        }

        .number-display.hidden {
            opacity: 0;
            transform: scale(0.5);
        }

        .message {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .input-area {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        input[type="number"] {
            width: 200px;
            padding: 15px 25px;
            font-size: 1.5rem;
            border: none;
            border-radius: 15px;
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        input[type="number"]:focus {
            outline: none;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            font-size: 1.5rem;
            margin: 10px 0;
            font-weight: bold;
        }

        .result.correct {
            color: #00ff88;
        }

        .result.incorrect {
            color: #ff4444;
        }

        .difficulty {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .difficulty-btn {
            padding: 10px 20px;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.2);
        }

        .difficulty-btn.active {
            background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
        }

        @media (max-width: 600px) {
            .game-area {
                padding: 20px;
                min-height: 150px;
            }

            .input-area {
                flex-direction: column;
                align-items: center;
            }

            input[type="number"] {
                width: 150px;
            }

            .stats {
                gap: 15px;
            }

            .stat {
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>⚡ Speed Memory</h1>
        <p class="subtitle">覚えた数字を入力せよ！</p>

        <div class="difficulty">
            <button class="difficulty-btn active" onclick="setDifficulty('easy')">Easy (3桁)</button>
            <button class="difficulty-btn" onclick="setDifficulty('medium')">Medium (5桁)</button>
            <button class="difficulty-btn" onclick="setDifficulty('hard')">Hard (7桁)</button>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">Level</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Best</div>
                <div class="stat-value" id="best">0</div>
            </div>
        </div>

        <div class="game-area">
            <div id="numberDisplay" class="number-display"></div>
            <div id="message" class="message">スタートボタンを押して！</div>
        </div>

        <div id="result" class="result"></div>

        <div class="input-area" id="inputArea" style="display: none;">
            <input type="number" id="userInput" placeholder="数字を入力" autofocus>
            <button onclick="checkAnswer()">送信</button>
        </div>

        <button id="startBtn" onclick="startGame()">スタート</button>
    </div>

    <script>
        let currentNumber = '';
        let level = 1;
        let score = 0;
        let bestScore = localStorage.getItem('speedMemoryBest') || 0;
        let difficulty = 'easy';
        let digitCount = 3;
        let displayTime = 2000;
        let isPlaying = false;

        document.getElementById('best').textContent = bestScore;

        const numberDisplay = document.getElementById('numberDisplay');
        const message = document.getElementById('message');
        const result = document.getElementById('result');
        const inputArea = document.getElementById('inputArea');
        const userInput = document.getElementById('userInput');
        const startBtn = document.getElementById('startBtn');

        function setDifficulty(diff) {
            if (isPlaying) return;

            difficulty = diff;
            document.querySelectorAll('.difficulty-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            switch(diff) {
                case 'easy':
                    digitCount = 3;
                    displayTime = 2000;
                    break;
                case 'medium':
                    digitCount = 5;
                    displayTime = 1500;
                    break;
                case 'hard':
                    digitCount = 7;
                    displayTime = 1000;
                    break;
            }
        }

        function generateNumber() {
            let num = '';
            for (let i = 0; i < digitCount + Math.floor(level / 3); i++) {
                num += Math.floor(Math.random() * 10);
            }
            return num;
        }

        function startGame() {
            level = 1;
            score = 0;
            updateStats();
            startBtn.style.display = 'none';
            isPlaying = true;
            showNextNumber();
        }

        function showNextNumber() {
            result.textContent = '';
            result.className = 'result';
            inputArea.style.display = 'none';
            userInput.value = '';
            currentNumber = generateNumber();

            numberDisplay.textContent = currentNumber;
            numberDisplay.className = 'number-display show';
            message.textContent = 'この数字を覚えて！';

            let time = displayTime;
            if (level > 5) time -= 200;
            if (level > 10) time -= 200;

            setTimeout(() => {
                numberDisplay.className = 'number-display hidden';
                setTimeout(() => {
                    numberDisplay.textContent = '?'.repeat(currentNumber.length);
                    numberDisplay.className = 'number-display';
                    message.textContent = '覚えた数字を入力して！';
                    inputArea.style.display = 'flex';
                    userInput.focus();
                }, 300);
            }, Math.max(time, 500));
        }

        function checkAnswer() {
            const userAnswer = userInput.value;

            if (userAnswer === currentNumber) {
                result.textContent = '⭕ 正解！';
                result.className = 'result correct';
                score += level * 10;
                level++;
                updateStats();

                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('speedMemoryBest', bestScore);
                    document.getElementById('best').textContent = bestScore;
                }

                setTimeout(() => {
                    showNextNumber();
                }, 1000);
            } else {
                result.textContent = `❌ 不正解！正解は ${currentNumber}`;
                result.className = 'result incorrect';
                gameOver();
            }
        }

        function gameOver() {
            isPlaying = false;
            message.textContent = `Game Over! スコア: ${score}`;
            startBtn.style.display = 'block';
            startBtn.textContent = 'もう一度';
            inputArea.style.display = 'none';
        }

        function updateStats() {
            document.getElementById('level').textContent = level;
            document.getElementById('score').textContent = score;
        }

        // Enter key support
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });
    </script>
</body>
</html>
