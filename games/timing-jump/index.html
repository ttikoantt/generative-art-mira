<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timing Jump - タイミングジャンプゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        
        .game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16/9;
        }
        
        #gameCanvas {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
        }
        
        .score-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            z-index: 10;
        }
        
        .high-score {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            z-index: 10;
        }
        
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            z-index: 100;
        }
        
        .overlay.hidden {
            display: none;
        }
        
        .title {
            color: white;
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.8);
        }
        
        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 18px;
            margin-bottom: 30px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.6);
        }
        
        .game-over-title {
            color: #ff6b6b;
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .final-score {
            color: white;
            font-size: 32px;
            margin-bottom: 30px;
        }
        
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            z-index: 1000;
            transition: all 0.3s ease;
        }
        
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>
    
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="score-display" id="scoreDisplay">0</div>
        <div class="high-score" id="highScoreDisplay">🏆 0</div>
        
        <div class="overlay" id="startOverlay">
            <div class="title">Timing Jump</div>
            <div class="subtitle">タップでジャンプ！障害物を避けよう</div>
            <button class="btn" id="startBtn">スタート</button>
        </div>
        
        <div class="overlay hidden" id="gameOverOverlay">
            <div class="game-over-title">Game Over</div>
            <div class="final-score" id="finalScore">スコア: 0</div>
            <button class="btn" id="restartBtn">もう一度</button>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const highScoreDisplay = document.getElementById('highScoreDisplay');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScoreDisplay = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        
        // キャンバスサイズ設定
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // ゲーム状態
        let gameState = 'start'; // start, playing, gameover
        let score = 0;
        let highScore = localStorage.getItem('timingJumpHighScore') || 0;
        highScoreDisplay.textContent = `🏆 ${highScore}`;
        
        // プレイヤー
        const player = {
            x: 100,
            y: 0,
            width: 40,
            height: 40,
            vy: 0,
            jumpForce: -15,
            gravity: 0.6,
            grounded: false,
            trail: []
        };
        
        // 障害物
        let obstacles = [];
        let obstacleTimer = 0;
        let obstacleInterval = 100;
        
        // 背景バー
        let bars = [];
        
        // パーティクル
        let particles = [];
        
        // 初期化
        function init() {
            player.y = canvas.height - player.height - 50;
            player.vy = 0;
            player.trail = [];
            obstacles = [];
            particles = [];
            score = 0;
            obstacleTimer = 0;
            obstacleInterval = 100;
            scoreDisplay.textContent = '0';
            
            // 背景バー生成
            bars = [];
            for (let i = 0; i < 10; i++) {
                bars.push({
                    x: (canvas.width / 10) * i,
                    width: canvas.width / 10,
                    height: Math.random() * 30 + 20,
                    speed: Math.random() * 0.5 + 0.2
                });
            }
        }
        
        // ジャンプ
        function jump() {
            if (gameState === 'playing') {
                player.vy = player.jumpForce;
                player.grounded = false;
                
                // ジャンプパーティクル
                for (let i = 0; i < 10; i++) {
                    particles.push({
                        x: player.x + player.width / 2,
                        y: player.y + player.height,
                        vx: (Math.random() - 0.5) * 5,
                        vy: Math.random() * 3,
                        life: 1,
                        color: `hsl(${Math.random() * 60 + 200}, 80%, 60%)`
                    });
                }
            }
        }
        
        // 障害物生成
        function spawnObstacle() {
            const type = Math.floor(Math.random() * 3);
            let obstacle = {
                x: canvas.width + 50,
                passed: false
            };
            
            switch(type) {
                case 0: // 地上の障害物
                    obstacle.y = canvas.height - 60;
                    obstacle.width = 30;
                    obstacle.height = 60;
                    obstacle.color = '#ff6b6b';
                    break;
                case 1: // 空中の障害物
                    obstacle.y = canvas.height - 150;
                    obstacle.width = 30;
                    obstacle.height = 30;
                    obstacle.color = '#ffd93d';
                    break;
                case 2: // 二段障害物
                    obstacle.y = canvas.height - 100;
                    obstacle.width = 25;
                    obstacle.height = 25;
                    obstacle.color = '#6bcb77';
                    obstacle.secondY = canvas.height - 50;
                    obstacle.secondHeight = 50;
                    break;
            }
            
            obstacles.push(obstacle);
        }
        
        // 当たり判定
        function checkCollision(rect1, obstacle) {
            // メイン障害物
            if (rect1.x < obstacle.x + obstacle.width &&
                rect1.x + rect1.width > obstacle.x &&
                rect1.y < obstacle.y + obstacle.height &&
                rect1.y + rect1.height > obstacle.y) {
                return true;
            }
            
            // 二段目の障害物
            if (obstacle.secondY !== undefined) {
                if (rect1.x < obstacle.x + obstacle.width &&
                    rect1.x + rect1.width > obstacle.x &&
                    rect1.y < obstacle.secondY + obstacle.secondHeight &&
                    rect1.y + rect1.height > obstacle.secondY) {
                    return true;
                }
            }
            
            return false;
        }
        
        // 更新
        function update() {
            if (gameState !== 'playing') return;
            
            // プレイヤー
            player.vy += player.gravity;
            player.y += player.vy;
            
            // 地面判定
            if (player.y >= canvas.height - player.height - 50) {
                player.y = canvas.height - player.height - 50;
                player.vy = 0;
                player.grounded = true;
            }
            
            // トレイル
            player.trail.push({ x: player.x, y: player.y });
            if (player.trail.length > 10) {
                player.trail.shift();
            }
            
            // 障害物更新
            obstacleTimer++;
            if (obstacleTimer >= obstacleInterval) {
                spawnObstacle();
                obstacleTimer = 0;
                // 徐々に難しく
                if (obstacleInterval > 60) {
                    obstacleInterval -= 0.5;
                }
            }
            
            obstacles.forEach(obs => {
                obs.x -= 5;
                
                // スコア加算
                if (!obs.passed && obs.x + obs.width < player.x) {
                    obs.passed = true;
                    score++;
                    scoreDisplay.textContent = score;
                    
                    // スコアアップパーティクル
                    for (let i = 0; i < 5; i++) {
                        particles.push({
                            x: player.x + player.width,
                            y: player.y,
                            vx: Math.random() * 3 + 2,
                            vy: (Math.random() - 0.5) * 4,
                            life: 1,
                            color: '#ffd700'
                        });
                    }
                }
            });
            
            // 画面外の障害物を削除
            obstacles = obstacles.filter(obs => obs.x > -50);
            
            // 当たり判定
            const playerRect = {
                x: player.x + 5,
                y: player.y + 5,
                width: player.width - 10,
                height: player.height - 10
            };
            
            obstacles.forEach(obs => {
                if (checkCollision(playerRect, obs)) {
                    gameOver();
                }
            });
            
            // パーティクル更新
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                return p.life > 0;
            });
            
            // 背景バー更新
            bars.forEach(bar => {
                bar.height = 30 + Math.sin(Date.now() * 0.001 * bar.speed) * 10;
            });
        }
        
        // 描画
        function draw() {
            // 背景
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 背景バー
            bars.forEach(bar => {
                const gradient = ctx.createLinearGradient(0, canvas.height - bar.height - 50, 0, canvas.height - 50);
                gradient.addColorStop(0, 'rgba(100, 200, 255, 0.1)');
                gradient.addColorStop(1, 'rgba(100, 200, 255, 0.3)');
                ctx.fillStyle = gradient;
                ctx.fillRect(bar.x, canvas.height - bar.height - 50, bar.width, bar.height);
            });
            
            // 地面
            ctx.fillStyle = '#0f3460';
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
            
            // 地面装飾
            ctx.strokeStyle = '#16213e';
            ctx.lineWidth = 2;
            for (let i = 0; i < canvas.width; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i - (Date.now() * 0.1) % 50, canvas.height - 50);
                ctx.lineTo(i - (Date.now() * 0.1) % 50, canvas.height);
                ctx.stroke();
            }
            
            // プレイヤートレイル
            player.trail.forEach((pos, i) => {
                const alpha = i / player.trail.length * 0.3;
                ctx.fillStyle = `rgba(100, 200, 255, ${alpha})`;
                ctx.fillRect(pos.x, pos.y, player.width, player.height);
            });
            
            // プレイヤー
            const playerGradient = ctx.createLinearGradient(
                player.x, player.y,
                player.x, player.y + player.height
            );
            playerGradient.addColorStop(0, '#667eea');
            playerGradient.addColorStop(1, '#764ba2');
            ctx.fillStyle = playerGradient;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            
            // プレイヤーグロー
            ctx.shadowColor = '#667eea';
            ctx.shadowBlur = 20;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.shadowBlur = 0;
            
            // 障害物
            obstacles.forEach(obs => {
                ctx.fillStyle = obs.color;
                ctx.shadowColor = obs.color;
                ctx.shadowBlur = 15;
                
                // メイン障害物
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                
                // 二段目
                if (obs.secondY !== undefined) {
                    ctx.fillRect(obs.x, obs.secondY, obs.width, obs.secondHeight);
                }
                
                ctx.shadowBlur = 0;
            });
            
            // パーティクル
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fill();
                ctx.globalAlpha = 1;
            });
        }
        
        // ゲームオーバー
        function gameOver() {
            gameState = 'gameover';
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('timingJumpHighScore', highScore);
                highScoreDisplay.textContent = `🏆 ${highScore}`;
            }
            
            finalScoreDisplay.textContent = `スコア: ${score}`;
            gameOverOverlay.classList.remove('hidden');
        }
        
        // ゲームループ
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // イベント
        startBtn.addEventListener('click', () => {
            init();
            gameState = 'playing';
            startOverlay.classList.add('hidden');
        });
        
        restartBtn.addEventListener('click', () => {
            init();
            gameState = 'playing';
            gameOverOverlay.classList.add('hidden');
        });
        
        canvas.addEventListener('click', jump);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && gameState === 'playing') {
                e.preventDefault();
                jump();
            }
        });
        
        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });
        
        // 初期化 & 開始
        init();
        gameLoop();
    </script>
</body>
</html>
