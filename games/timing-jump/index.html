<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>タイミングジャンプ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .score {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
        }

        .score span {
            color: #00ffaa;
        }

        .fullscreen-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .canvas-container {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 100;
            transition: opacity 0.3s ease;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .overlay h1 {
            color: #fff;
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 170, 0.5);
        }

        .overlay p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            margin-bottom: 30px;
            text-align: center;
            padding: 0 20px;
        }

        .overlay .final-score {
            color: #00ffaa;
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
        }

        .start-btn {
            padding: 15px 50px;
            background: linear-gradient(135deg, #00ffaa, #00cc88);
            border: none;
            border-radius: 30px;
            color: #000;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 255, 170, 0.4);
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 30px rgba(0, 255, 170, 0.6);
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        .combo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ffaa;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .combo.show {
            opacity: 1;
            animation: comboPop 0.5s ease;
        }

        @keyframes comboPop {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @media (max-width: 600px) {
            .header {
                padding: 10px 15px;
            }

            .score {
                font-size: 20px;
            }

            .overlay h1 {
                font-size: 28px;
            }

            .overlay p {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="score">スコア: <span id="score">0</span></div>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
        </div>

        <div class="canvas-container">
            <canvas id="gameCanvas"></canvas>
            <div class="combo" id="combo"></div>
        </div>

        <div class="overlay" id="overlay">
            <h1 id="overlayTitle">タイミングジャンプ</h1>
            <p id="overlayText">回転するバーの隙間をタイミングよくタップしてジャンプ！</p>
            <div class="final-score" id="finalScore" style="display: none;">0</div>
            <button class="start-btn" onclick="startGame()">スタート</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlayText = document.getElementById('overlayText');
        const finalScoreEl = document.getElementById('finalScore');
        const comboEl = document.getElementById('combo');

        let width, height, centerX, centerY;
        let gameRunning = false;
        let score = 0;
        let combo = 0;
        let rotation = 0;
        let rotationSpeed = 0.02;
        let playerAngle = 0;
        let playerRadius = 0;
        let barRadius = 0;
        let barWidth = 60; // バーの隙間の角度（度）
        let bars = [];

        function resize() {
            const container = document.querySelector('.canvas-container');
            width = canvas.width = container.clientWidth;
            height = canvas.height = container.clientHeight;
            centerX = width / 2;
            centerY = height / 2;
            playerRadius = Math.min(width, height) * 0.15;
            barRadius = Math.min(width, height) * 0.35;
        }

        window.addEventListener('resize', resize);
        resize();

        function startGame() {
            gameRunning = true;
            score = 0;
            combo = 0;
            rotation = 0;
            rotationSpeed = 0.02;
            playerAngle = -Math.PI / 2;
            scoreEl.textContent = '0';
            overlay.classList.add('hidden');
            finalScoreEl.style.display = 'none';

            // バーを生成
            bars = [];
            const barCount = 3;
            for (let i = 0; i < barCount; i++) {
                bars.push({
                    startAngle: (i * 2 * Math.PI / barCount) - (barWidth * Math.PI / 180 / 2),
                    endAngle: (i * 2 * Math.PI / barCount) + (barWidth * Math.PI / 180 / 2)
                });
            }

            animate();
        }

        function gameOver() {
            gameRunning = false;
            overlayTitle.textContent = 'ゲームオーバー';
            overlayText.textContent = `最高コンボ: ${combo}回`;
            finalScoreEl.textContent = score;
            finalScoreEl.style.display = 'block';
            overlay.classList.remove('hidden');
        }

        function jump() {
            if (!gameRunning) return;

            // プレイヤーの角度を計算（正規化）
            let normalizedPlayerAngle = playerAngle % (2 * Math.PI);
            if (normalizedPlayerAngle < 0) normalizedPlayerAngle += 2 * Math.PI;

            // 回転を考慮
            let adjustedRotation = rotation % (2 * Math.PI);

            // バーの位置を計算
            let success = false;
            for (const bar of bars) {
                let barStart = (bar.startAngle + adjustedRotation) % (2 * Math.PI);
                let barEnd = (bar.endAngle + adjustedRotation) % (2 * Math.PI);

                if (barStart < 0) barStart += 2 * Math.PI;
                if (barEnd < 0) barEnd += 2 * Math.PI;

                // プレイヤーがバーの隙間にいるかチェック
                if (normalizedPlayerAngle >= barStart && normalizedPlayerAngle <= barEnd) {
                    success = true;
                    break;
                }
            }

            if (success) {
                combo++;
                score += 10 * combo;
                scoreEl.textContent = score;

                // コンボ表示
                if (combo > 1) {
                    comboEl.textContent = `${combo} COMBO!`;
                    comboEl.classList.add('show');
                    setTimeout(() => comboEl.classList.remove('show'), 500);
                }

                // 難易度アップ
                if (score % 50 === 0) {
                    rotationSpeed += 0.002;
                }

                // プレイヤーを次の位置へ
                playerAngle += Math.PI / 2;
            } else {
                gameOver();
            }
        }

        function draw() {
            // 背景をクリア
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, width, height);

            // 外円を描画
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(centerX, centerY, barRadius, 0, 2 * Math.PI);
            ctx.stroke();

            // バーを描画
            for (const bar of bars) {
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(rotation);

                const startAngle = bar.startAngle;
                const endAngle = bar.endAngle;

                // バーのグラデーション
                const gradient = ctx.createRadialGradient(
                    centerX, centerY, barRadius - 20,
                    centerX, centerY, barRadius + 20
                );
                gradient.addColorStop(0, 'rgba(0, 255, 170, 0.1)');
                gradient.addColorStop(0.5, 'rgba(0, 255, 170, 0.8)');
                gradient.addColorStop(1, 'rgba(0, 255, 170, 0.1)');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, barRadius + 30, startAngle, endAngle);
                ctx.closePath();
                ctx.fill();

                // バーの枠線
                ctx.strokeStyle = '#00ffaa';
                ctx.lineWidth = 3;
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00ffaa';
                ctx.stroke();

                ctx.restore();
            }

            // プレイヤーを描画
            const playerX = centerX + Math.cos(playerAngle) * playerRadius;
            const playerY = centerY + Math.sin(playerAngle) * playerRadius;

            // プレイヤーの光
            ctx.shadowBlur = 25;
            ctx.shadowColor = '#00ffaa';

            // プレイヤーの本体
            const playerGradient = ctx.createRadialGradient(
                playerX, playerY, 0,
                playerX, playerY, 15
            );
            playerGradient.addColorStop(0, '#ffffff');
            playerGradient.addColorStop(0.3, '#00ffaa');
            playerGradient.addColorStop(1, 'rgba(0, 255, 170, 0)');

            ctx.fillStyle = playerGradient;
            ctx.beginPath();
            ctx.arc(playerX, playerY, 15, 0, 2 * Math.PI);
            ctx.fill();

            ctx.shadowBlur = 0;

            // 内円を描画
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(centerX, centerY, playerRadius, 0, 2 * Math.PI);
            ctx.stroke();
        }

        function animate() {
            if (!gameRunning) {
                draw();
                return;
            }

            rotation += rotationSpeed;
            draw();
            requestAnimationFrame(animate);
        }

        // イベントリスナー
        canvas.addEventListener('click', jump);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        }, { passive: false });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameRunning) {
                    jump();
                } else {
                    startGame();
                }
            }
        });

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`全画面エラー: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // 初期描画
        draw();
    </script>
</body>
</html>
