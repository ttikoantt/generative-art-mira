<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Timing Jump - タイミングジャンプ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
        }

        .ui {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            z-index: 100;
        }

        .ui h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .ui p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .ui button {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .ui button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        .hidden {
            display: none;
        }

        .score {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 36px;
            font-weight: bold;
            color: white;
            text-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
            z-index: 50;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .game-over-score {
            font-size: 72px;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .new-record {
            color: #ffd700;
            font-size: 24px;
            margin-top: 10px;
            animation: pulse 0.5s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="score" id="score">0</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    <canvas id="gameCanvas"></canvas>

    <div class="ui" id="startScreen">
        <h1>⏱️ Timing Jump</h1>
        <p>タップでジャンプ！障害物を避けよう</p>
        <button onclick="startGame()">スタート</button>
    </div>

    <div class="ui hidden" id="gameOverScreen">
        <h1>💀 Game Over</h1>
        <div class="game-over-score" id="finalScore">0</div>
        <p>ベストスコア: <span id="bestScore">0</span></p>
        <div class="new-record hidden" id="newRecord">🏆 新記録！</div>
        <button onclick="startGame()">もう一度</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // キャンバスサイズ設定
        function resizeCanvas() {
            const maxWidth = Math.min(800, window.innerWidth - 40);
            const maxHeight = Math.min(600, window.innerHeight - 100);
            
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ゲーム状態
        let gameState = 'start'; // start, playing, gameover
        let score = 0;
        let bestScore = localStorage.getItem('timingJumpBest') || 0;
        let groundY;
        let gameSpeed = 5;

        // プレイヤー
        const player = {
            x: 100,
            y: 0,
            width: 40,
            height: 40,
            velocityY: 0,
            jumping: false,
            grounded: true,
            color: '#fff'
        };

        // 障害物
        let obstacles = [];
        let obstacleTimer = 0;

        // パーティクル
        let particles = [];

        function resetGame() {
            groundY = canvas.height - 60;
            player.y = groundY - player.height;
            player.velocityY = 0;
            player.jumping = false;
            player.grounded = true;
            obstacles = [];
            particles = [];
            obstacleTimer = 0;
            score = 0;
            gameSpeed = 5;
            document.getElementById('score').textContent = '0';
        }

        function jump() {
            if (player.grounded && gameState === 'playing') {
                player.velocityY = -15;
                player.jumping = true;
                player.grounded = false;
                
                // ジャンプエフェクト
                for (let i = 0; i < 10; i++) {
                    particles.push({
                        x: player.x + player.width / 2,
                        y: player.y + player.height,
                        vx: (Math.random() - 0.5) * 5,
                        vy: Math.random() * 3,
                        size: Math.random() * 5 + 2,
                        alpha: 1
                    });
                }
            }
        }

        function spawnObstacle() {
            const types = ['box', 'spike'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            let obstacle = {
                x: canvas.width,
                y: groundY - 30,
                width: 30,
                height: 30,
                type: type
            };

            if (type === 'spike') {
                obstacle.height = 40;
                obstacle.y = groundY - 40;
            }

            obstacles.push(obstacle);
        }

        function update() {
            if (gameState !== 'playing') return;

            // プレイヤーの物理
            player.velocityY += 0.8; // 重力
            player.y += player.velocityY;

            // 地面判定
            if (player.y >= groundY - player.height) {
                player.y = groundY - player.height;
                player.velocityY = 0;
                player.grounded = true;
                player.jumping = false;
            }

            // 障害物生成
            obstacleTimer++;
            if (obstacleTimer > 60 + Math.random() * 60) {
                spawnObstacle();
                obstacleTimer = 0;
            }

            // 障害物更新
            obstacles.forEach((obs, index) => {
                obs.x -= gameSpeed;

                // 衝突判定
                if (player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.height > obs.y) {
                    gameOver();
                }

                // スコア更新
                if (obs.x + obs.width < player.x && !obs.passed) {
                    obs.passed = true;
                    score++;
                    document.getElementById('score').textContent = score;
                    
                    // スピードアップ
                    if (score % 5 === 0) {
                        gameSpeed += 0.5;
                    }
                }

                // 画面外に出たら削除
                if (obs.x + obs.width < 0) {
                    obstacles.splice(index, 1);
                }
            });

            // パーティクル更新
            particles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.02;
                if (p.alpha <= 0) {
                    particles.splice(index, 1);
                }
            });
        }

        function draw() {
            // クリア
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 地面
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(0, groundY, canvas.width, 60);

            // プレイヤー
            ctx.fillStyle = player.color;
            ctx.shadowColor = 'rgba(255, 255, 255, 0.5)';
            ctx.shadowBlur = 20;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.shadowBlur = 0;

            // 障害物
            obstacles.forEach(obs => {
                if (obs.type === 'box') {
                    ctx.fillStyle = '#ff6b6b';
                    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                } else {
                    ctx.fillStyle = '#ffd93d';
                    ctx.beginPath();
                    ctx.moveTo(obs.x, obs.y + obs.height);
                    ctx.lineTo(obs.x + obs.width / 2, obs.y);
                    ctx.lineTo(obs.x + obs.width, obs.y + obs.height);
                    ctx.closePath();
                    ctx.fill();
                }
            });

            // パーティクル
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
                ctx.fill();
            });
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            gameState = 'playing';
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            resetGame();
        }

        function gameOver() {
            gameState = 'gameover';
            
            // ベストスコア更新
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('timingJumpBest', bestScore);
                document.getElementById('newRecord').classList.remove('hidden');
            } else {
                document.getElementById('newRecord').classList.add('hidden');
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('bestScore').textContent = bestScore;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        // イベントリスナー
        canvas.addEventListener('click', jump);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState === 'playing') {
                    jump();
                } else if (gameState === 'start') {
                    startGame();
                } else if (gameState === 'gameover') {
                    startGame();
                }
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        groundY = canvas.height - 60;
        player.y = groundY - player.height;
        gameLoop();
    </script>
</body>
</html>
