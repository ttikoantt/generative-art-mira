<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Timing Jump | タイミングジャンプ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 60vh;
            min-height: 400px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
        }

        .score-display {
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .score-display .label {
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-display .value {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .combo-display {
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 16px;
            border-radius: 12px;
            text-align: center;
        }

        .combo-display .combo-number {
            font-size: 1.2rem;
            font-weight: bold;
            color: #764ba2;
        }

        .combo-display .combo-label {
            font-size: 0.6rem;
            color: #999;
        }

        .start-screen, .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .start-screen h1, .game-over-screen h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 4px 20px rgba(102, 126, 234, 0.5);
        }

        .start-screen p, .game-over-screen p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
            margin-bottom: 30px;
            text-align: center;
            padding: 0 20px;
        }

        .start-btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.6);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .final-score {
            font-size: 3rem;
            font-weight: bold;
            color: #fff;
            margin: 20px 0;
        }

        .hidden {
            display: none !important;
        }

        .full-screen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            z-index: 1000;
            transition: background 0.3s;
        }

        .full-screen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .instructions {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            font-size: 0.9rem;
            max-width: 300px;
        }

        @media (max-width: 768px) {
            .game-container {
                height: 70vh;
                border-radius: 15px;
            }

            .start-screen h1, .game-over-screen h1 {
                font-size: 2rem;
            }

            .full-screen-btn {
                top: auto;
                bottom: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <button class="full-screen-btn" onclick="toggleFullScreen()">⛶</button>

    <div class="game-container">
        <canvas id="gameCanvas"></canvas>

        <div class="ui-overlay">
            <div class="score-display">
                <div class="label">Score</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="combo-display">
                <div class="combo-number" id="combo">0</div>
                <div class="combo-label">COMBO</div>
            </div>
        </div>

        <div class="start-screen" id="startScreen">
            <h1>⏱️ Timing Jump</h1>
            <p>障害物が近づいたら完璧なタイミングでジャンプ！<br>連続で成功するとコンボボーナス！</p>
            <button class="start-btn" onclick="startGame()">スタート</button>
        </div>

        <div class="game-over-screen hidden" id="gameOverScreen">
            <h1>Game Over</h1>
            <div class="final-score" id="finalScore">0</div>
            <p>最高スコア: <span id="highScore">0</span></p>
            <button class="start-btn" onclick="startGame()">もう一度</button>
        </div>
    </div>

    <div class="instructions">
        📱 タップ or クリック or スペースでジャンプ
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ゲーム状態
        let gameRunning = false;
        let score = 0;
        let combo = 0;
        let highScore = localStorage.getItem('timingJumpHighScore') || 0;
        let gameSpeed = 3;
        let lastTime = 0;

        // プレイヤー
        const player = {
            x: 80,
            y: 0,
            width: 40,
            height: 40,
            velocityY: 0,
            gravity: 0.6,
            jumpForce: -12,
            isJumping: false,
            groundY: 0
        };

        // 障害物
        let obstacles = [];
        let obstacleTimer = 0;
        let obstacleInterval = 1500;

        // エフェクト
        let effects = [];
        let perfectTiming = false;

        // キャンバスサイズ設定
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            player.groundY = canvas.height - 60;
            player.y = player.groundY - player.height;
        }

        // ゲーム開始
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');

            gameRunning = true;
            score = 0;
            combo = 0;
            gameSpeed = 3;
            obstacles = [];
            effects = [];
            obstacleTimer = 0;

            player.y = player.groundY - player.height;
            player.velocityY = 0;
            player.isJumping = false;

            updateUI();
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        // ジャンプ
        function jump() {
            if (!gameRunning) return;

            if (!player.isJumping) {
                player.velocityY = player.jumpForce;
                player.isJumping = true;

                // 完璧なタイミングチェック
                const nearestObstacle = obstacles.find(o => o.x > player.x && o.x < player.x + 200);
                if (nearestObstacle) {
                    const distance = nearestObstacle.x - player.x;
                    if (distance > 80 && distance < 150) {
                        perfectTiming = true;
                        combo++;
                        addEffect(player.x + player.width / 2, player.y, 'PERFECT!', '#FFD700');
                    } else {
                        perfectTiming = false;
                    }
                }
            }
        }

        // 障害物生成
        function spawnObstacle() {
            const type = Math.random();
            let obstacle = {
                x: canvas.width,
                width: 30,
                height: 40 + Math.random() * 30,
                color: type > 0.7 ? '#FF6B6B' : '#4ECDC4'
            };
            obstacle.y = player.groundY - obstacle.height;
            obstacles.push(obstacle);
        }

        // エフェクト追加
        function addEffect(x, y, text, color) {
            effects.push({
                x, y, text, color,
                life: 1,
                velocityY: -3
            });
        }

        // 衝突判定
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // ゲームオーバー
        function gameOver() {
            gameRunning = false;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('timingJumpHighScore', highScore);
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('highScore').textContent = highScore;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        // UI更新
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;
        }

        // ゲームループ
        function gameLoop(currentTime) {
            if (!gameRunning) return;

            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            // クリア
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 背景描画
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(1, '#764ba2');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 地面描画
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, player.groundY, canvas.width, canvas.height - player.groundY);

            // プレイヤー更新
            player.velocityY += player.gravity;
            player.y += player.velocityY;

            if (player.y >= player.groundY - player.height) {
                player.y = player.groundY - player.height;
                player.velocityY = 0;
                player.isJumping = false;
            }

            // プレイヤー描画
            ctx.fillStyle = perfectTiming ? '#FFD700' : '#fff';
            ctx.shadowColor = perfectTiming ? '#FFD700' : 'rgba(255, 255, 255, 0.5)';
            ctx.shadowBlur = perfectTiming ? 20 : 10;

            ctx.beginPath();
            ctx.arc(
                player.x + player.width / 2,
                player.y + player.height / 2,
                player.width / 2,
                0, Math.PI * 2
            );
            ctx.fill();

            ctx.shadowBlur = 0;

            // 障害物更新
            obstacleTimer += deltaTime;
            if (obstacleTimer >= obstacleInterval) {
                spawnObstacle();
                obstacleTimer = 0;
                obstacleInterval = 1000 + Math.random() * 1000;
            }

            obstacles.forEach((obstacle, index) => {
                obstacle.x -= gameSpeed;

                // 障害物描画
                ctx.fillStyle = obstacle.color;
                ctx.shadowColor = obstacle.color;
                ctx.shadowBlur = 15;
                ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
                ctx.shadowBlur = 0;

                // 衝突判定
                if (checkCollision(player, obstacle)) {
                    gameOver();
                    return;
                }

                // スコア加算
                if (obstacle.x + obstacle.width < player.x && !obstacle.passed) {
                    obstacle.passed = true;
                    const points = 10 + (combo > 1 ? combo * 5 : 0);
                    score += points;
                    updateUI();
                }
            });

            obstacles = obstacles.filter(o => o.x + o.width > 0);

            // エフェクト更新
            effects.forEach((effect, index) => {
                effect.y += effect.velocityY;
                effect.life -= 0.02;

                if (effect.life > 0) {
                    ctx.save();
                    ctx.globalAlpha = effect.life;
                    ctx.fillStyle = effect.color;
                    ctx.font = 'bold 20px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(effect.text, effect.x, effect.y);
                    ctx.restore();
                }
            });

            effects = effects.filter(e => e.life > 0);

            perfectTiming = false;

            // 難易度上昇
            gameSpeed = 3 + Math.floor(score / 100) * 0.5;

            requestAnimationFrame(gameLoop);
        }

        // フルスクリーン切り替え
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        window.addEventListener('resize', resizeCanvas);
        canvas.addEventListener('click', jump);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameRunning) {
                    jump();
                } else {
                    startGame();
                }
            }
        });

        // 初期化
        resizeCanvas();
        document.getElementById('highScore').textContent = highScore;
    </script>
</body>
</html>
