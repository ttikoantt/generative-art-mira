<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timing Jump - ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: manipulation;
            user-select: none;
        }

        #gameCanvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .game-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .score-display {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .high-score {
            position: absolute;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            font-family: monospace;
        }

        .start-screen, .game-over-screen {
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            pointer-events: auto;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .game-title {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #ffd43b, #69db7c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
        }

        .btn {
            background: linear-gradient(45deg, #4dabf7, #74c0fc);
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(77, 171, 247, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(77, 171, 247, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .final-score {
            font-size: 64px;
            font-weight: bold;
            margin: 20px 0;
            color: #ffd43b;
            text-shadow: 0 0 20px rgba(255, 212, 59, 0.5);
        }

        .instructions {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 20px;
        }

        .hidden {
            display: none !important;
        }

        .fullscreen-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            z-index: 100;
            pointer-events: auto;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .combo-display {
            position: absolute;
            top: 110px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd43b;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 212, 59, 0.5);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .combo-display.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>

    <div class="game-ui">
        <div class="high-score">HIGH: <span id="highScore">0</span></div>
        <div class="score-display hidden" id="scoreDisplay">0</div>
        <div class="combo-display" id="comboDisplay">COMBO x<span id="comboCount">0</span></div>

        <div class="start-screen" id="startScreen">
            <div class="game-title">Timing Jump</div>
            <div class="subtitle">タイミングよくジャンプして障害物を避けよう！</div>
            <button class="btn" id="startBtn">スタート</button>
            <div class="instructions">タップ・クリックでジャンプ</div>
        </div>

        <div class="game-over-screen hidden" id="gameOverScreen">
            <div class="game-title">Game Over</div>
            <div class="final-score" id="finalScore">0</div>
            <button class="btn" id="restartBtn">もう一度</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const highScoreDisplay = document.getElementById('highScore');
        const finalScoreDisplay = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const comboDisplay = document.getElementById('comboDisplay');
        const comboCount = document.getElementById('comboCount');

        let width, height;
        let gameState = 'start'; // start, playing, gameover
        let score = 0;
        let highScore = parseInt(localStorage.getItem('timingJumpHighScore')) || 0;
        let combo = 0;

        highScoreDisplay.textContent = highScore;

        // ゲーム設定
        const GRAVITY = 0.6;
        const JUMP_FORCE = -12;
        const GROUND_HEIGHT = 60;
        const OBSTACLE_SPEED = 6;
        const OBSTACLE_MIN_GAP = 250;
        const OBSTACLE_MAX_GAP = 450;

        // プレイヤー
        let player = {
            x: 0,
            y: 0,
            width: 40,
            height: 40,
            velocityY: 0,
            isJumping: false,
            jumpCount: 0,
            maxJumps: 2
        };

        // 障害物
        let obstacles = [];
        let nextObstacleTimer = 0;
        let groundY = 0;

        // 背景要素
        let stars = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            groundY = height - GROUND_HEIGHT;

            if (gameState === 'start') {
                player.x = 80;
                player.y = groundY - player.height;
            }
        }

        function initStars() {
            stars = [];
            for (let i = 0; i < 50; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * (height - GROUND_HEIGHT),
                    size: Math.random() * 2 + 1,
                    twinkle: Math.random() * Math.PI * 2
                });
            }
        }

        function spawnObstacle() {
            const types = ['box', 'spike', 'double'];
            const type = types[Math.floor(Math.random() * types.length)];

            let obstacle = {
                x: width,
                y: groundY,
                width: 30,
                height: 30 + Math.random() * 20,
                type: type,
                passed: false
            };

            if (type === 'spike') {
                obstacle.width = 25;
                obstacle.height = 35;
            } else if (type === 'double') {
                obstacle.width = 25;
                obstacle.height = 25;
                obstacle.y = groundY - obstacle.height;
            }

            obstacles.push(obstacle);
            nextObstacleTimer = OBSTACLE_MIN_GAP + Math.random() * (OBSTACLE_MAX_GAP - OBSTACLE_MIN_GAP);
        }

        function resetGame() {
            player.x = 80;
            player.y = groundY - player.height;
            player.velocityY = 0;
            player.isJumping = false;
            player.jumpCount = 0;

            obstacles = [];
            nextObstacleTimer = 0;
            score = 0;
            combo = 0;

            scoreDisplay.textContent = '0';
            comboDisplay.classList.remove('show');
        }

        function jump() {
            if (gameState !== 'playing') return;

            if (player.jumpCount < player.maxJumps) {
                player.velocityY = JUMP_FORCE;
                player.jumpCount++;
                player.isJumping = true;
            }
        }

        function update() {
            if (gameState !== 'playing') return;

            // プレイヤーの物理演算
            player.velocityY += GRAVITY;
            player.y += player.velocityY;

            // 地面との衝突
            if (player.y >= groundY - player.height) {
                player.y = groundY - player.height;
                player.velocityY = 0;
                player.isJumping = false;
                player.jumpCount = 0;
            }

            // 障害物の生成
            nextObstacleTimer -= OBSTACLE_SPEED;
            if (nextObstacleTimer <= 0) {
                spawnObstacle();
            }

            // 障害物の更新
            obstacles.forEach(obs => {
                obs.x -= OBSTACLE_SPEED;

                // 通過時のスコア
                if (!obs.passed && obs.x + obs.width < player.x) {
                    obs.passed = true;
                    score++;
                    combo++;
                    scoreDisplay.textContent = score;

                    if (combo >= 5) {
                        comboCount.textContent = combo;
                        comboDisplay.classList.add('show');
                    } else {
                        comboDisplay.classList.remove('show');
                    }
                }
            });

            // 衝突判定
            const playerBox = {
                x: player.x + 5,
                y: player.y + 5,
                width: player.width - 10,
                height: player.height - 10
            };

            for (let obs of obstacles) {
                let obsBox;
                if (obs.type === 'spike') {
                    obsBox = { x: obs.x, y: obs.y - obs.height, width: obs.width, height: obs.height };
                } else if (obs.type === 'double') {
                    obsBox = { x: obs.x, y: obs.y, width: obs.width, height: obs.height };
                } else {
                    obsBox = { x: obs.x, y: obs.y - obs.height, width: obs.width, height: obs.height };
                }

                if (playerBox.x < obsBox.x + obsBox.width &&
                    playerBox.x + playerBox.width > obsBox.x &&
                    playerBox.y < obsBox.y + obsBox.height &&
                    playerBox.y + playerBox.height > obsBox.y) {
                    gameOver();
                    return;
                }
            }

            // 画面外の障害物を削除
            obstacles = obstacles.filter(obs => obs.x + obs.width > 0);
        }

        function draw() {
            // 背景グラデーション
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(1, '#16213e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // 星
            stars.forEach(star => {
                star.twinkle += 0.05;
                const alpha = 0.3 + Math.sin(star.twinkle) * 0.3;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fill();
            });

            // 地面
            ctx.fillStyle = '#0f3460';
            ctx.fillRect(0, groundY, width, GROUND_HEIGHT);

            // 地面のライン
            ctx.strokeStyle = '#533483';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(width, groundY);
            ctx.stroke();

            // プレイヤー
            ctx.save();
            ctx.translate(player.x + player.width / 2, player.y + player.height / 2);

            // 回転効果（ジャンプ中）
            if (player.isJumping) {
                const rotation = (player.jumpCount * Math.PI) / 4;
                ctx.rotate(rotation);
            }

            // プレイヤーの本体
            const playerGradient = ctx.createLinearGradient(-player.width / 2, -player.height / 2, player.width / 2, player.height / 2);
            playerGradient.addColorStop(0, '#ff6b6b');
            playerGradient.addColorStop(1, '#ffd43b');
            ctx.fillStyle = playerGradient;
            ctx.fillRect(-player.width / 2, -player.height / 2, player.width, player.height);

            // プレイヤーの目
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(5, -5, 6, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath();
            ctx.arc(7, -5, 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            // 障害物
            obstacles.forEach(obs => {
                ctx.save();

                if (obs.type === 'spike') {
                    // 三角形のスパイク
                    ctx.fillStyle = '#e74c3c';
                    ctx.beginPath();
                    ctx.moveTo(obs.x, obs.y);
                    ctx.lineTo(obs.x + obs.width / 2, obs.y - obs.height);
                    ctx.lineTo(obs.x + obs.width, obs.y);
                    ctx.closePath();
                    ctx.fill();
                } else if (obs.type === 'double') {
                    // 小さな箱
                    ctx.fillStyle = '#9b59b6';
                    ctx.fillRect(obs.x, obs.y - obs.height, obs.width, obs.height);
                } else {
                    // 通常の箱
                    const obsGradient = ctx.createLinearGradient(obs.x, obs.y - obs.height, obs.x, obs.y);
                    obsGradient.addColorStop(0, '#3498db');
                    obsGradient.addColorStop(1, '#2980b9');
                    ctx.fillStyle = obsGradient;
                    ctx.fillRect(obs.x, obs.y - obs.height, obs.width, obs.height);
                }

                ctx.restore();
            });
        }

        function gameOver() {
            gameState = 'gameover';

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('timingJumpHighScore', highScore);
                highScoreDisplay.textContent = highScore;
            }

            finalScoreDisplay.textContent = score;
            gameOverScreen.classList.remove('hidden');
            scoreDisplay.classList.add('hidden');
            comboDisplay.classList.remove('show');
        }

        function startGame() {
            gameState = 'playing';
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            scoreDisplay.classList.remove('hidden');
            resetGame();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // イベントリスナー
        canvas.addEventListener('click', jump);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        }, { passive: false });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                if (gameState === 'playing') {
                    jump();
                } else if (gameState === 'start') {
                    startGame();
                } else if (gameState === 'gameover') {
                    startGame();
                }
            }
        });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        window.addEventListener('resize', resize);

        // 初期化
        resize();
        initStars();
        gameLoop();
    </script>
</body>
</html>
