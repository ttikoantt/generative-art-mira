<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Timing Jump - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: none;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            z-index: 10;
        }

        #score {
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        #highScore {
            font-size: 16px;
            opacity: 0.7;
            margin-top: 5px;
        }

        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            z-index: 20;
            pointer-events: none;
        }

        #message h2 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
        }

        #message p {
            font-size: 18px;
            opacity: 0.9;
        }

        #fullscreenBtn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            z-index: 100;
            transition: all 0.3s;
        }

        #fullscreenBtn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            #score {
                font-size: 36px;
            }

            #highScore {
                font-size: 14px;
            }

            #message h2 {
                font-size: 24px;
            }

            #message p {
                font-size: 16px;
            }

            #fullscreenBtn {
                padding: 6px 12px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="game"></canvas>
        <div id="ui">
            <div id="score">0</div>
            <div id="highScore">BEST: 0</div>
        </div>
        <div id="message">
            <h2>Timing Jump</h2>
            <p>タップしてジャンプ！</p>
        </div>
        <button id="fullscreenBtn">全画面</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const messageEl = document.getElementById('message');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        // ゲームの設定
        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 400;
        const GROUND_HEIGHT = 50;

        // ゲーム状態
        let gameState = 'waiting'; // waiting, playing, gameover
        let score = 0;
        let highScore = localStorage.getItem('timingJumpHighScore') || 0;
        let gameSpeed = 5;
        let gravity = 0.6;
        let jumpForce = -12;

        // キャラクター（忍者のようなマスコット）
        const player = {
            x: 100,
            y: 0,
            width: 40,
            height: 40,
            velocityY: 0,
            isJumping: false,
            jumpCount: 0,
            maxJumps: 2, // 2段ジャンプ可能
            color: '#4ecdc4',
            rotation: 0
        };

        // 障害物配列
        let obstacles = [];

        // パーティクル配列
        let particles = [];

        // キャンバスサイズ設定
        function resize() {
            const container = document.getElementById('gameContainer');
            const maxWidth = Math.min(GAME_WIDTH, container.clientWidth - 20);
            const scale = maxWidth / GAME_WIDTH;

            canvas.width = GAME_WIDTH;
            canvas.height = GAME_HEIGHT;
            canvas.style.width = `${maxWidth}px`;
            canvas.style.height = `${GAME_HEIGHT * scale}px`;
        }

        // 障害物を生成
        function spawnObstacle() {
            const types = [
                { width: 30, height: 50, color: '#ff6b6b' }, // 通常の障害物
                { width: 50, height: 30, color: '#feca57' }, // 低い障害物
                { width: 40, height: 70, color: '#ff9ff3' }, // 高い障害物
                { width: 60, height: 40, color: '#54a0ff' }  // 広い障害物
            ];

            const type = types[Math.floor(Math.random() * types.length)];

            obstacles.push({
                x: GAME_WIDTH,
                y: GAME_HEIGHT - GROUND_HEIGHT - type.height,
                width: type.width,
                height: type.height,
                color: type.color,
                passed: false
            });
        }

        // パーティクルを生成
        function spawnParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8 - 2,
                    size: Math.random() * 4 + 2,
                    color: color,
                    life: 1
                });
            }
        }

        // ジャンプ
        function jump() {
            if (gameState === 'waiting') {
                startGame();
                return;
            }

            if (gameState === 'gameover') {
                resetGame();
                return;
            }

            if (player.jumpCount < player.maxJumps) {
                player.velocityY = jumpForce;
                player.isJumping = true;
                player.jumpCount++;

                // ジャンプエフェクト
                spawnParticles(
                    player.x + player.width / 2,
                    player.y + player.height,
                    '#4ecdc4',
                    10
                );
            }
        }

        // ゲーム開始
        function startGame() {
            gameState = 'playing';
            messageEl.style.display = 'none';
            player.y = GAME_HEIGHT - GROUND_HEIGHT - player.height;
            score = 0;
            gameSpeed = 5;
            obstacles = [];
            particles = [];
            scoreEl.textContent = '0';
        }

        // ゲームオーバー
        function gameOver() {
            gameState = 'gameover';

            // ハイスコア更新
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('timingJumpHighScore', highScore);
                highScoreEl.textContent = `BEST: ${highScore}`;
            }

            // ゲームオーバーエフェクト
            spawnParticles(
                player.x + player.width / 2,
                player.y + player.height / 2,
                '#ff6b6b',
                30
            );

            messageEl.innerHTML = `
                <h2>Game Over!</h2>
                <p>スコア: ${score}</p>
                <p>タップでリプレイ</p>
            `;
            messageEl.style.display = 'block';
        }

        // リセット
        function resetGame() {
            player.y = GAME_HEIGHT - GROUND_HEIGHT - player.height;
            player.velocityY = 0;
            player.isJumping = false;
            player.jumpCount = 0;
            player.rotation = 0;

            obstacles = [];
            particles = [];
            score = 0;
            gameSpeed = 5;

            scoreEl.textContent = '0';
            messageEl.style.display = 'none';

            gameState = 'waiting';

            messageEl.innerHTML = `
                <h2>Timing Jump</h2>
                <p>タップしてスタート！</p>
            `;
        }

        // 更新
        function update() {
            if (gameState !== 'playing') return;

            // プレイヤーの更新
            player.velocityY += gravity;
            player.y += player.velocityY;

            // 地面判定
            if (player.y >= GAME_HEIGHT - GROUND_HEIGHT - player.height) {
                player.y = GAME_HEIGHT - GROUND_HEIGHT - player.height;
                player.velocityY = 0;
                player.isJumping = false;
                player.jumpCount = 0;
            }

            // 空中で回転
            if (player.isJumping) {
                player.rotation += 0.15;
            } else {
                player.rotation = 0;
            }

            // 障害物の更新
            obstacles.forEach((obs, index) => {
                obs.x -= gameSpeed;

                // スコア加算
                if (!obs.passed && obs.x + obs.width < player.x) {
                    obs.passed = true;
                    score++;
                    scoreEl.textContent = score;

                    // スピードアップ
                    if (score % 5 === 0) {
                        gameSpeed += 0.3;
                    }
                }

                // 画面外に出たら削除
                if (obs.x + obs.width < 0) {
                    obstacles.splice(index, 1);
                }

                // 衝突判定
                if (checkCollision(player, obs)) {
                    gameOver();
                }
            });

            // 障害物生成
            if (obstacles.length === 0 ||
                obstacles[obstacles.length - 1].x < GAME_WIDTH - 200 - Math.random() * 150) {
                if (Math.random() < 0.02) {
                    spawnObstacle();
                }
            }

            // パーティクルの更新
            particles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                p.life -= 0.02;

                if (p.life <= 0) {
                    particles.splice(index, 1);
                }
            });
        }

        // 衝突判定
        function checkCollision(a, b) {
            const padding = 8;
            return a.x + padding < b.x + b.width &&
                   a.x + a.width - padding > b.x &&
                   a.y + padding < b.y + b.height &&
                   a.y + a.height - padding > b.y;
        }

        // 描画
        function draw() {
            // 背景クリア
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // 背景グラデーション
            const bgGradient = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
            bgGradient.addColorStop(0, '#1a1a2e');
            bgGradient.addColorStop(1, '#16213e');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // 地面
            const groundGradient = ctx.createLinearGradient(0, GAME_HEIGHT - GROUND_HEIGHT, 0, GAME_HEIGHT);
            groundGradient.addColorStop(0, '#2d3436');
            groundGradient.addColorStop(1, '#1e272e');
            ctx.fillStyle = groundGradient;
            ctx.fillRect(0, GAME_HEIGHT - GROUND_HEIGHT, GAME_WIDTH, GROUND_HEIGHT);

            // 地面のライン
            ctx.strokeStyle = '#4ecdc4';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, GAME_HEIGHT - GROUND_HEIGHT);
            ctx.lineTo(GAME_WIDTH, GAME_HEIGHT - GROUND_HEIGHT);
            ctx.stroke();

            // 障害物を描画
            obstacles.forEach(obs => {
                // 障害物のグラデーション
                const obsGradient = ctx.createLinearGradient(obs.x, obs.y, obs.x, obs.y + obs.height);
                obsGradient.addColorStop(0, obs.color);
                obsGradient.addColorStop(1, shadeColor(obs.color, -20));

                ctx.fillStyle = obsGradient;
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

                // ハイライト
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.fillRect(obs.x, obs.y, obs.width, 5);
            });

            // パーティクルを描画
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fill();
                ctx.globalAlpha = 1;
            });

            // プレイヤーを描画
            ctx.save();
            ctx.translate(player.x + player.width / 2, player.y + player.height / 2);
            ctx.rotate(player.rotation);

            // 体
            const playerGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, player.width / 2);
            playerGradient.addColorStop(0, '#4ecdc4');
            playerGradient.addColorStop(1, '#2d9a93');
            ctx.fillStyle = playerGradient;
            ctx.beginPath();
            ctx.arc(0, 0, player.width / 2, 0, Math.PI * 2);
            ctx.fill();

            // 目
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(-5, -5, 6, 0, Math.PI * 2);
            ctx.arc(5, -5, 6, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath();
            ctx.arc(-4, -5, 3, 0, Math.PI * 2);
            ctx.arc(6, -5, 3, 0, Math.PI * 2);
            ctx.fill();

            // 口（ニコニコ）
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 5, 8, 0.1 * Math.PI, 0.9 * Math.PI);
            ctx.stroke();

            ctx.restore();

            // 待機状態のメッセージ
            if (gameState === 'waiting') {
                messageEl.style.display = 'block';
            }
        }

        // 色を明るく/暗くする
        function shadeColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt;
            const G = (num >> 8 & 0x00FF) + amt;
            const B = (num & 0x0000FF) + amt;
            return '#' + (0x1000000 + (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
                (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
                (B < 255 ? B < 1 ? 0 : B : 255))
                .toString(16).slice(1);
        }

        // ゲームループ
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        window.addEventListener('resize', resize);
        canvas.addEventListener('click', jump);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                jump();
            }
        });
        fullscreenBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleFullscreen();
        });

        // 初期化
        highScoreEl.textContent = `BEST: ${highScore}`;
        resize();
        player.y = GAME_HEIGHT - GROUND_HEIGHT - player.height;
        gameLoop();
    </script>
</body>
</html>
