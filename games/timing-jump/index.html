<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Timing Jump</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: radial-gradient(circle, #1a1a2e 0%, #0f0f1a 100%);
      overflow: hidden;
      font-family: sans-serif;
      color: white;
      touch-action: none;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    canvas {
      display: block;
    }
    .ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: flex;
      flex-direction: column;
    }
    .score-display {
      text-align: center;
      font-size: 2.5rem;
      font-weight: bold;
      margin-top: 20px;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
    }
    .high-score {
      text-align: center;
      font-size: 1rem;
      opacity: 0.6;
      margin-top: 5px;
    }
    .game-over {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: auto;
    }
    .game-over h2 {
      font-size: 2rem;
      margin-bottom: 20px;
    }
    .game-over p {
      font-size: 1.2rem;
      margin-bottom: 30px;
      opacity: 0.8;
    }
    .restart-btn {
      padding: 15px 30px;
      font-size: 1.2rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 50px;
      color: white;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .restart-btn:hover {
      transform: scale(1.05);
    }
    .fullscreen-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 15px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: white;
      font-size: 0.8rem;
      cursor: pointer;
      pointer-events: auto;
      transition: all 0.3s ease;
    }
    .fullscreen-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    .instructions {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 0.9rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div class="ui-layer">
      <div class="score-display" id="score">0</div>
      <div class="high-score" id="highScore">Best: 0</div>
    </div>
    <div class="instructions" id="instructions">
      タップで隙間を通過！
    </div>
    <div class="game-over" id="gameOver" style="display: none;">
      <h2>Game Over</h2>
      <p>Score: <span id="finalScore">0</span></p>
      <button class="restart-btn" id="restartBtn">再挑戦</button>
    </div>
    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('score');
    const highScoreDisplay = document.getElementById('highScore');
    const gameOverScreen = document.getElementById('gameOver');
    const finalScoreDisplay = document.getElementById('finalScore');
    const restartBtn = document.getElementById('restartBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const instructions = document.getElementById('instructions');

    let width, height, centerX, centerY;
    let rotationAngle = 0;
    let score = 0;
    let highScore = localStorage.getItem('timingJumpHighScore') || 0;
    let rotationSpeed = 0.03;
    let baseSpeed = 0.03;
    let isGameOver = false;
    let isJumping = false;
    let jumpProgress = 0;
    let jumpSpeed = 0.08;
    let playerDistance = 50;
    let ringRadius = 120;
    let barThickness = 30;
    let gapAngle = Math.PI / 3;

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      centerX = width / 2;
      centerY = height / 2;
      ringRadius = Math.min(width, height) * 0.25;
    }
    resize();
    window.addEventListener('resize', resize);

    highScoreDisplay.textContent = `Best: ${highScore}`;

    function resetGame() {
      score = 0;
      rotationSpeed = baseSpeed;
      isGameOver = false;
      isJumping = false;
      jumpProgress = 0;
      scoreDisplay.textContent = score;
      gameOverScreen.style.display = 'none';
      instructions.style.opacity = '0.6';
    }

    function jump() {
      if (isGameOver || isJumping) return;
      isJumping = true;
      jumpProgress = 0;
      instructions.style.opacity = '0';
    }

    function checkCollision() {
      if (!isJumping) return false;

      const playerAngle = rotationAngle;
      const normalizedPlayerAngle = ((playerAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      
      let gapStart = (3 * Math.PI / 2);
      let gapEnd = gapStart + gapAngle;
      
      gapStart = ((gapStart % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      gapEnd = ((gapEnd % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      
      let inGap = false;
      if (gapStart < gapEnd) {
        inGap = normalizedPlayerAngle >= gapStart && normalizedPlayerAngle <= gapEnd;
      } else {
        inGap = normalizedPlayerAngle >= gapStart || normalizedPlayerAngle <= gapEnd;
      }
      
      if (!inGap && jumpProgress > 0.3 && jumpProgress < 0.7) {
        return true;
      }
      return false;
    }

    function update() {
      if (isGameOver) return;

      rotationAngle += rotationSpeed;

      if (isJumping) {
        jumpProgress += jumpSpeed;
        if (jumpProgress >= 1) {
          jumpProgress = 0;
          isJumping = false;
          score++;
          scoreDisplay.textContent = score;
          
          if (score > highScore) {
            highScore = score;
            localStorage.setItem('timingJumpHighScore', highScore);
            highScoreDisplay.textContent = `Best: ${highScore}`;
          }
          
          if (score % 5 === 0) {
            rotationSpeed += 0.002;
            baseSpeed += 0.002;
          }
        }
      }

      if (checkCollision()) {
        isGameOver = true;
        finalScoreDisplay.textContent = score;
        gameOverScreen.style.display = 'block';
      }
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);

      // Draw ring
      ctx.save();
      ctx.translate(centerX, centerY);
      ctx.rotate(rotationAngle);

      // Draw bars with gap
      const barCount = Math.floor((Math.PI * 2 - gapAngle) / 0.1);
      for (let i = 0; i < barCount; i++) {
        const angle = (3 * Math.PI / 2) + (gapAngle / 2) + 0.1 + (i * 0.1);
        if (angle > Math.PI * 2 + (3 * Math.PI / 2) + (gapAngle / 2)) break;

        ctx.save();
        ctx.rotate(angle);
        
        const gradient = ctx.createLinearGradient(0, -ringRadius - barThickness, 0, -ringRadius);
        gradient.addColorStop(0, 'rgba(102, 126, 234, 0.8)');
        gradient.addColorStop(1, 'rgba(118, 75, 162, 0.8)');
        
        ctx.fillStyle = gradient;
        ctx.fillRect(-barThickness / 2, -ringRadius - barThickness, barThickness, barThickness);
        ctx.restore();
      }

      ctx.restore();

      // Draw player
      const playerRadius = isJumping ? ringRadius : playerDistance;
      const alpha = isJumping ? 1 - Math.abs(jumpProgress - 0.5) * 2 : 1;
      
      ctx.save();
      ctx.translate(centerX, centerY);
      ctx.rotate(rotationAngle);
      
      ctx.beginPath();
      ctx.arc(0, -playerRadius, 12, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
      ctx.fill();
      
      ctx.beginPath();
      ctx.arc(0, -playerRadius, 8, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(102, 126, 234, ${alpha})`;
      ctx.fill();
      
      ctx.restore();

      // Draw center
      ctx.beginPath();
      ctx.arc(centerX, centerY, 20, 0, Math.PI * 2);
      const centerGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 20);
      centerGradient.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
      centerGradient.addColorStop(1, 'rgba(102, 126, 234, 0.1)');
      ctx.fillStyle = centerGradient;
      ctx.fill();
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // Controls
    function handleInput(e) {
      e.preventDefault();
      if (isGameOver) return;
      jump();
    }

    canvas.addEventListener('mousedown', handleInput);
    canvas.addEventListener('touchstart', handleInput);

    restartBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      resetGame();
    });

    fullscreenBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    });

    gameLoop();
  </script>
</body>
</html>
