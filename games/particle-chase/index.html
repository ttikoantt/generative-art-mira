<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Particle Chase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            touch-action: none;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            pointer-events: none;
            padding: 20px;
        }

        .score {
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .high-score {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #gameOverScreen {
            display: none;
        }

        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.8);
            text-align: center;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            margin-bottom: 30px;
            text-align: center;
            max-width: 80%;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            pointer-events: all;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .final-score {
            color: white;
            font-size: 2rem;
            margin: 20px 0;
        }

        .instructions {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            margin-top: 20px;
            text-align: center;
            line-height: 1.6;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            .score {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="ui-overlay">
        <div class="score">Score: <span id="score">0</span></div>
        <div class="high-score">Best: <span id="highScore">0</span></div>
    </div>

    <div id="startScreen">
        <h1>✨ Particle Chase</h1>
        <p class="subtitle">光の粒子を操り、障害物を避けてエネルギーを集めよう！</p>
        <button class="start-btn" onclick="startGame()">🎮 Start</button>
        <p class="instructions">
            PC: マウスで移動<br>
            Mobile: タッチ＆ドラッグで移動
        </p>
    </div>

    <div id="gameOverScreen">
        <h1>💥 Game Over</h1>
        <div class="final-score">Score: <span id="finalScore">0</span></div>
        <button class="start-btn" onclick="startGame()">🔄 Retry</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let player, energies, obstacles, particles;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('particleChaseHighScore')) || 0;
        let gameRunning = false;
        let mouseX, mouseY;
        let difficulty = 1;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        document.getElementById('highScore').textContent = highScore;

        class Player {
            constructor() {
                this.x = width / 2;
                this.y = height / 2;
                this.radius = 15;
                this.targetX = this.x;
                this.targetY = this.y;
                this.trail = [];
            }

            update() {
                // Smooth movement towards target
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                this.x += dx * 0.1;
                this.y += dy * 0.1;

                // Keep in bounds
                this.x = Math.max(this.radius, Math.min(width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(height - this.radius, this.y));

                // Add trail
                this.trail.push({ x: this.x, y: this.y, alpha: 1 });
                if (this.trail.length > 20) {
                    this.trail.shift();
                }

                // Fade trail
                this.trail.forEach(t => t.alpha *= 0.95);
            }

            draw() {
                // Draw trail
                this.trail.forEach((t, i) => {
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, this.radius * t.alpha * 0.8, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(102, 126, 234, ${t.alpha * 0.3})`;
                    ctx.fill();
                });

                // Draw player
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 2
                );
                gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
                gradient.addColorStop(0.5, 'rgba(102, 126, 234, 0.8)');
                gradient.addColorStop(1, 'rgba(102, 126, 234, 0)');

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.fill();
            }

            setTarget(x, y) {
                this.targetX = x;
                this.targetY = y;
            }
        }

        class Energy {
            constructor() {
                this.x = Math.random() * (width - 60) + 30;
                this.y = Math.random() * (height - 60) + 30;
                this.radius = 10;
                this.pulse = 0;
            }

            update() {
                this.pulse += 0.1;
            }

            draw() {
                const scale = 1 + Math.sin(this.pulse) * 0.2;

                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 3 * scale
                );
                gradient.addColorStop(0, 'rgba(255, 204, 0, 1)');
                gradient.addColorStop(0.5, 'rgba(255, 149, 0, 0.5)');
                gradient.addColorStop(1, 'rgba(255, 149, 0, 0)');

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 3 * scale, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * scale, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.fill();
            }
        }

        class Obstacle {
            constructor() {
                const side = Math.floor(Math.random() * 4);
                switch(side) {
                    case 0: // Top
                        this.x = Math.random() * width;
                        this.y = -30;
                        this.vx = (Math.random() - 0.5) * 4;
                        this.vy = Math.random() * 3 + 2;
                        break;
                    case 1: // Right
                        this.x = width + 30;
                        this.y = Math.random() * height;
                        this.vx = -(Math.random() * 3 + 2);
                        this.vy = (Math.random() - 0.5) * 4;
                        break;
                    case 2: // Bottom
                        this.x = Math.random() * width;
                        this.y = height + 30;
                        this.vx = (Math.random() - 0.5) * 4;
                        this.vy = -(Math.random() * 3 + 2);
                        break;
                    case 3: // Left
                        this.x = -30;
                        this.y = Math.random() * height;
                        this.vx = Math.random() * 3 + 2;
                        this.vy = (Math.random() - 0.5) * 4;
                        break;
                }

                this.radius = Math.random() * 15 + 10;
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.sides = Math.floor(Math.random() * 3) + 3;
            }

            update() {
                this.x += this.vx * difficulty;
                this.y += this.vy * difficulty;
                this.rotation += this.rotationSpeed;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                const gradient = ctx.createRadialGradient(
                    0, 0, 0,
                    0, 0, this.radius * 2
                );
                gradient.addColorStop(0, 'rgba(255, 94, 77, 0.8)');
                gradient.addColorStop(1, 'rgba(255, 94, 77, 0)');

                ctx.beginPath();
                for (let i = 0; i < this.sides; i++) {
                    const angle = (i / this.sides) * Math.PI * 2;
                    const x = Math.cos(angle) * this.radius;
                    const y = Math.sin(angle) * this.radius;
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.closePath();

                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.restore();
            }

            isOffScreen() {
                return (
                    this.x < -50 ||
                    this.x > width + 50 ||
                    this.y < -50 ||
                    this.y > height + 50
                );
            }

            collidesWith(p) {
                const dx = this.x - p.x;
                const dy = this.y - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                return dist < this.radius + p.radius;
            }
        }

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.02;
                this.size = Math.random() * 4 + 2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.life -= this.decay;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 204, 0, ${this.life})`;
                ctx.fill();
            }

            isDead() {
                return this.life <= 0;
            }
        }

        function spawnParticles(x, y, count) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y));
            }
        }

        function checkCollisions() {
            // Energy collection
            for (let i = energies.length - 1; i >= 0; i--) {
                const energy = energies[i];
                const dx = energy.x - player.x;
                const dy = energy.y - player.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < energy.radius + player.radius) {
                    spawnParticles(energy.x, energy.y, 10);
                    energies.splice(i, 1);
                    score += 10;
                    document.getElementById('score').textContent = score;

                    // Spawn new energy
                    energies.push(new Energy());

                    // Increase difficulty
                    if (score % 50 === 0) {
                        difficulty += 0.1;
                    }
                }
            }

            // Obstacle collision
            for (const obstacle of obstacles) {
                if (obstacle.collidesWith(player)) {
                    gameOver();
                    return;
                }
            }
        }

        function update() {
            if (!gameRunning) return;

            player.update();

            energies.forEach(e => e.update());
            obstacles.forEach(o => o.update());
            particles.forEach(p => p.update());

            // Remove off-screen obstacles
            obstacles = obstacles.filter(o => !o.isOffScreen());
            particles = particles.filter(p => !p.isDead());

            // Spawn obstacles
            if (Math.random() < 0.02 * difficulty) {
                obstacles.push(new Obstacle());
            }

            checkCollisions();
        }

        function draw() {
            // Clear with gradient background
            const bgGradient = ctx.createRadialGradient(
                width / 2, height / 2, 0,
                width / 2, height / 2, Math.max(width, height)
            );
            bgGradient.addColorStop(0, '#1a1a2e');
            bgGradient.addColorStop(1, '#0a0a0a');

            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, width, height);

            // Draw game objects
            energies.forEach(e => e.draw());
            obstacles.forEach(o => o.draw());
            particles.forEach(p => p.draw());
            player.draw();
        }

        function gameLoop() {
            update();
            draw();
            if (gameRunning) {
                requestAnimationFrame(gameLoop);
            }
        }

        function startGame() {
            player = new Player();
            energies = [new Energy()];
            obstacles = [];
            particles = [];
            score = 0;
            difficulty = 1;
            gameRunning = true;

            document.getElementById('score').textContent = '0';
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';

            gameLoop();
        }

        function gameOver() {
            gameRunning = false;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('particleChaseHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        // Mouse controls
        canvas.addEventListener('mousemove', (e) => {
            if (gameRunning) {
                player.setTarget(e.clientX, e.clientY);
            }
        });

        // Touch controls
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (gameRunning && e.touches.length > 0) {
                player.setTarget(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning && e.touches.length > 0) {
                player.setTarget(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });

        // Initial draw
        resize();
        draw();
    </script>
</body>
</html>
