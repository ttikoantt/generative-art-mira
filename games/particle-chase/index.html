<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>パーティクル・チェイス</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }

        .header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
        }

        h1 {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 300;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            cursor: none;
        }

        .ui {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            z-index: 10;
        }

        .stat {
            text-align: center;
            color: #fff;
        }

        .stat-label {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 200;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
            display: none;
        }

        .game-over.active {
            display: block;
        }

        .game-over h2 {
            color: #ff4757;
            font-size: 3rem;
            font-weight: 200;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(255, 71, 87, 0.8);
        }

        .game-over p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .game-over button {
            font-size: 1.1rem;
            padding: 15px 40px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>✨ パーティクル・チェイス</h1>
        <p class="subtitle">逃げ切れ！</p>
    </div>

    <div class="ui">
        <div class="stat">
            <div class="stat-label">スコア</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">ハイスコア</div>
            <div class="stat-value" id="highScore">0</div>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div class="game-over" id="gameOver">
        <h2>ゲームオーバー</h2>
        <p>スコア: <span id="finalScore">0</span></p>
        <button onclick="restartGame()">もう一度</button>
    </div>

    <div class="controls">
        <button onclick="toggleFullscreen()">全画面</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');

        let player, enemies, powerUps, particles;
        let score = 0;
        let highScore = localStorage.getItem('particleChaseHighScore') || 0;
        let gameRunning = false;
        let mouseX = 0, mouseY = 0;
        let difficulty = 1;

        highScoreEl.textContent = highScore;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Player {
            constructor() {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.size = 15;
                this.speed = 5;
                this.trail = [];
                this.poweredUp = false;
                this.powerUpTime = 0;
            }

            update() {
                // Smooth follow mouse
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > 5) {
                    this.x += (dx / dist) * this.speed;
                    this.y += (dy / dist) * this.speed;
                }

                // Trail
                this.trail.push({ x: this.x, y: this.y, size: this.size });
                if (this.trail.length > 20) {
                    this.trail.shift();
                }

                // Power up timer
                if (this.poweredUp) {
                    this.powerUpTime--;
                    if (this.powerUpTime <= 0) {
                        this.poweredUp = false;
                    }
                }
            }

            draw() {
                // Draw trail
                this.trail.forEach((pos, i) => {
                    const alpha = i / this.trail.length * 0.5;
                    const size = pos.size * (i / this.trail.length);
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = this.poweredUp ? '#ff6b6b' : '#00ffff';
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = this.poweredUp ? '#ff6b6b' : '#00ffff';
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                });

                // Draw player
                ctx.save();
                ctx.fillStyle = this.poweredUp ? '#ff4757' : '#00ffff';
                ctx.shadowBlur = 30;
                ctx.shadowColor = this.poweredUp ? '#ff4757' : '#00ffff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();

                // Inner glow
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                gradient.addColorStop(0, '#ffffff');
                gradient.addColorStop(0.3, this.poweredUp ? '#ff6b6b' : '#00ffff');
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.restore();
            }
        }

        class Enemy {
            constructor() {
                const side = Math.floor(Math.random() * 4);
                switch(side) {
                    case 0: // Top
                        this.x = Math.random() * canvas.width;
                        this.y = -30;
                        break;
                    case 1: // Right
                        this.x = canvas.width + 30;
                        this.y = Math.random() * canvas.height;
                        break;
                    case 2: // Bottom
                        this.x = Math.random() * canvas.width;
                        this.y = canvas.height + 30;
                        break;
                    case 3: // Left
                        this.x = -30;
                        this.y = Math.random() * canvas.height;
                        break;
                }

                this.size = 10 + Math.random() * 10;
                this.speed = 1 + Math.random() * 2 + difficulty * 0.5;
                this.angle = 0;
                this.hue = Math.random() * 360;
            }

            update() {
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                this.x += (dx / dist) * this.speed;
                this.y += (dy / dist) * this.speed;
                this.angle += 0.05;
                this.hue = (this.hue + 1) % 360;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                ctx.fillStyle = `hsl(${this.hue}, 80%, 60%)`;
                ctx.shadowBlur = 15;
                ctx.shadowColor = `hsl(${this.hue}, 80%, 60%)`;

                // Draw star shape
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const angle = (i * Math.PI * 2) / 5 - Math.PI / 2;
                    const x = Math.cos(angle) * this.size;
                    const y = Math.sin(angle) * this.size;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }
        }

        class PowerUp {
            constructor() {
                this.x = Math.random() * (canvas.width - 100) + 50;
                this.y = Math.random() * (canvas.height - 100) + 50;
                this.size = 12;
                this.angle = 0;
            }

            update() {
                this.angle += 0.03;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // Glow
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ff6b6b';

                // Star shape
                ctx.fillStyle = '#ff6b6b';
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const angle = (i * Math.PI * 2) / 5 - Math.PI / 2;
                    const x = Math.cos(angle) * this.size;
                    const y = Math.sin(angle) * this.size;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);

                    const innerAngle = angle + Math.PI / 5;
                    const innerX = Math.cos(innerAngle) * (this.size * 0.4);
                    const innerY = Math.sin(innerAngle) * (this.size * 0.4);
                    ctx.lineTo(innerX, innerY);
                }
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = 2 + Math.random() * 3;
                this.speedX = (Math.random() - 0.5) * 8;
                this.speedY = (Math.random() - 0.5) * 8;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.02;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedX *= 0.95;
                this.speedY *= 0.95;
                this.life -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function createExplosion(x, y, color, count = 20) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function checkCollision(obj1, obj2) {
            const dx = obj1.x - obj2.x;
            const dy = obj1.y - obj2.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            return dist < obj1.size + obj2.size;
        }

        function initGame() {
            player = new Player();
            enemies = [];
            powerUps = [];
            particles = [];
            score = 0;
            difficulty = 1;
            scoreEl.textContent = score;

            // Initial enemies
            for (let i = 0; i < 3; i++) {
                enemies.push(new Enemy());
            }

            gameRunning = true;
            gameOverEl.classList.remove('active');
        }

        function spawnEnemy() {
            if (enemies.length < 5 + Math.floor(difficulty)) {
                enemies.push(new Enemy());
            }
        }

        function spawnPowerUp() {
            if (powerUps.length < 2 && Math.random() < 0.01) {
                powerUps.push(new PowerUp());
            }
        }

        function gameOver() {
            gameRunning = false;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('particleChaseHighScore', highScore);
                highScoreEl.textContent = highScore;
            }

            finalScoreEl.textContent = score;
            gameOverEl.classList.add('active');
        }

        function restartGame() {
            initGame();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameRunning) {
                player.update();
                player.draw();

                // Update enemies
                enemies.forEach(enemy => {
                    enemy.update();
                    enemy.draw();

                    // Check collision with player
                    if (checkCollision(player, enemy)) {
                        if (player.poweredUp) {
                            // Destroy enemy
                            createExplosion(enemy.x, enemy.y, `hsl(${enemy.hue}, 80%, 60%)`, 30);
                            enemies = enemies.filter(e => e !== enemy);
                            score += 50;
                            scoreEl.textContent = score;
                        } else {
                            createExplosion(player.x, player.y, '#00ffff', 50);
                            gameOver();
                        }
                    }
                });

                // Update power-ups
                powerUps.forEach(powerUp => {
                    powerUp.update();
                    powerUp.draw();

                    // Check collision
                    if (checkCollision(player, powerUp)) {
                        player.poweredUp = true;
                        player.powerUpTime = 300; // 5 seconds at 60fps
                        createExplosion(powerUp.x, powerUp.y, '#ff6b6b', 25);
                        powerUps = powerUps.filter(p => p !== powerUp);
                        score += 100;
                        scoreEl.textContent = score;
                    }
                });

                // Update particles
                particles = particles.filter(p => p.life > 0);
                particles.forEach(particle => {
                    particle.update();
                    particle.draw();
                });

                // Spawn
                spawnEnemy();
                spawnPowerUp();

                // Increase difficulty
                difficulty += 0.001;
                score++;
                scoreEl.textContent = score;
            }

            requestAnimationFrame(animate);
        }

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            mouseX = e.touches[0].clientX - rect.left;
            mouseY = e.touches[0].clientY - rect.top;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            mouseX = e.touches[0].clientX - rect.left;
            mouseY = e.touches[0].clientY - rect.top;
        });

        window.addEventListener('resize', resize);
        resize();
        initGame();
        animate();
    </script>
</body>
</html>
