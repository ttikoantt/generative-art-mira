<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Particle Chase - パーティクル・チェイス</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #gameCanvas {
            flex: 1;
            display: block;
            touch-action: none;
            cursor: none;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 3em;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }

        .subtitle {
            font-size: 1.2em;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
            text-align: center;
        }

        .instructions {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            max-width: 400px;
            text-align: center;
        }

        .instructions p {
            margin: 10px 0;
            font-size: 0.95em;
        }

        .instructions strong {
            color: #667eea;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2em;
            font-weight: 600;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 5;
        }

        .score, .lives {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1.1em;
            font-weight: 600;
        }

        .score {
            color: #667eea;
        }

        .lives {
            color: #ff6b6b;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(102, 126, 234, 0.8);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.2em;
            transition: all 0.3s ease;
            z-index: 6;
            pointer-events: auto;
        }

        .fullscreen-btn:hover {
            background: rgba(102, 126, 234, 1);
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .subtitle {
                font-size: 1em;
            }

            .instructions {
                padding: 15px;
                margin-bottom: 20px;
            }

            .instructions p {
                font-size: 0.85em;
            }

            button {
                padding: 12px 30px;
                font-size: 1em;
            }

            .score, .lives {
                font-size: 0.9em;
                padding: 8px 15px;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="hud">
        <div class="score">スコア: <span id="scoreValue">0</span></div>
        <div class="lives">ライフ: <span id="livesValue">3</span></div>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">⛶</button>

    <div class="overlay" id="startScreen">
        <h1>✨ Particle Chase</h1>
        <p class="subtitle">パーティクル・チェイス</p>
        <div class="instructions">
            <p>🖱️ <strong>マウス/タッチ</strong> でプレイヤーを動かす</p>
            <p>⭐ <strong>青い光</strong> を集めてスコアアップ</p>
            <p>👻 <strong>影</strong> から逃げよう！</p>
            <p>💫 当たるとライフを失う</p>
        </div>
        <button id="startBtn">スタート</button>
    </div>

    <div class="overlay hidden" id="gameOverScreen">
        <h1>💀 ゲームオーバー</h1>
        <p class="subtitle">最終スコア: <span id="finalScore">0</span></p>
        <button id="restartBtn">もう一度</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ゲーム状態
        let gameState = 'start'; // start, playing, gameover
        let score = 0;
        let lives = 3;
        let animationId = null;

        // プレイヤー
        const player = {
            x: 0,
            y: 0,
            radius: 10,
            color: '#667eea',
            trail: [],
            maxTrail: 20
        };

        // エネルギー（青い光）
        let energies = [];

        // 敵（影）
        let enemies = [];

        // マウス位置
        let mouseX = 0;
        let mouseY = 0;

        // キャンバスサイズ設定
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // プレイヤーを中央に配置
            if (gameState === 'start') {
                player.x = canvas.width / 2;
                player.y = canvas.height / 2;
                mouseX = player.x;
                mouseY = player.y;
            }
        }

        // プレイヤーを更新
        function updatePlayer() {
            // プレイヤーはマウスに向かって滑らかに移動
            const dx = mouseX - player.x;
            const dy = mouseY - player.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance > 5) {
                player.x += dx * 0.1;
                player.y += dy * 0.1;
            }

            // トレイルを更新
            player.trail.unshift({ x: player.x, y: player.y });
            if (player.trail.length > player.maxTrail) {
                player.trail.pop();
            }

            // 画面境界内に収める
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));
        }

        // エネルギーを生成
        function spawnEnergy() {
            const energy = {
                x: Math.random() * (canvas.width - 100) + 50,
                y: Math.random() * (canvas.height - 100) + 50,
                radius: 8,
                color: '#4ecdc4',
                pulse: 0
            };
            energies.push(energy);
        }

        // 敵を生成
        function spawnEnemy() {
            const enemy = {
                x: Math.random() < 0.5 ? -20 : canvas.width + 20,
                y: Math.random() * canvas.height,
                radius: 12,
                speed: 1.5 + Math.random() * 1.5,
                color: '#2d3436',
                angle: 0
            };
            enemies.push(enemy);
        }

        // エネルギーを更新
        function updateEnergies() {
            energies.forEach(energy => {
                energy.pulse += 0.1;
            });
        }

        // 敵を更新
        function updateEnemies() {
            enemies.forEach(enemy => {
                // プレイヤーに向かって移動
                const dx = player.x - enemy.x;
                const dy = player.y - enemy.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance > 0) {
                    enemy.x += (dx / distance) * enemy.speed;
                    enemy.y += (dy / distance) * enemy.speed;
                }

                // プレイヤーとの衝突判定
                if (distance < player.radius + enemy.radius) {
                    lives--;
                    updateLives();
                    if (lives <= 0) {
                        gameOver();
                    }
                    // 敵を削除
                    enemies = enemies.filter(e => e !== enemy);
                }
            });
        }

        // 衝突判定
        function checkCollisions() {
            // エネルギーとの衝突
            energies = energies.filter(energy => {
                const dx = player.x - energy.x;
                const dy = player.y - energy.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < player.radius + energy.radius) {
                    // エネルギーを取得
                    score += 10;
                    updateScore();
                    return false;
                }
                return true;
            });

            // 敵が画面外に出たら削除
            enemies = enemies.filter(enemy => {
                return enemy.x > -50 && enemy.x < canvas.width + 50 &&
                       enemy.y > -50 && enemy.y < canvas.height + 50;
            });
        }

        // プレイヤーを描画
        function drawPlayer() {
            // トレイルを描画
            player.trail.forEach((pos, index) => {
                const alpha = (player.maxTrail - index) / player.maxTrail;
                const radius = player.radius * (index / player.maxTrail) * 0.8;

                ctx.beginPath();
                ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(102, 126, 234, ${alpha * 0.5})`;
                ctx.fill();
            });

            // プレイヤーを描画
            const gradient = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, player.radius);
            gradient.addColorStop(0, 'rgba(102, 126, 234, 1)');
            gradient.addColorStop(1, 'rgba(118, 75, 162, 0.8)');

            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();

            // グロー効果
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius + 5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(102, 126, 234, 0.3)';
            ctx.fill();
        }

        // エネルギーを描画
        function drawEnergies() {
            energies.forEach(energy => {
                const pulseRadius = energy.radius + Math.sin(energy.pulse) * 2;

                const gradient = ctx.createRadialGradient(energy.x, energy.y, 0, energy.x, energy.y, pulseRadius);
                gradient.addColorStop(0, 'rgba(78, 205, 196, 1)');
                gradient.addColorStop(0.5, 'rgba(78, 205, 196, 0.5)');
                gradient.addColorStop(1, 'rgba(78, 205, 196, 0)');

                ctx.beginPath();
                ctx.arc(energy.x, energy.y, pulseRadius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            });
        }

        // 敵を描画
        function drawEnemies() {
            enemies.forEach(enemy => {
                const gradient = ctx.createRadialGradient(enemy.x, enemy.y, 0, enemy.x, enemy.y, enemy.radius);
                gradient.addColorStop(0, 'rgba(45, 52, 54, 1)');
                gradient.addColorStop(1, 'rgba(45, 52, 54, 0.5)');

                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // 赤いグロー
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, enemy.radius + 3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 107, 107, 0.3)';
                ctx.fill();
            });
        }

        // スコアを更新
        function updateScore() {
            document.getElementById('scoreValue').textContent = score;
        }

        // ライフを更新
        function updateLives() {
            document.getElementById('livesValue').textContent = lives;
        }

        // ゲームオーバー
        function gameOver() {
            gameState = 'gameover';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').classList.remove('hidden');
            canvas.style.cursor = 'auto';
        }

        // ゲームをリセット
        function resetGame() {
            score = 0;
            lives = 3;
            energies = [];
            enemies = [];
            player.trail = [];
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            mouseX = player.x;
            mouseY = player.y;
            updateScore();
            updateLives();
        }

        // ゲームループ
        function gameLoop() {
            if (gameState !== 'playing') {
                return;
            }

            // 背景をクリア
            ctx.fillStyle = 'rgba(10, 10, 10, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 更新
            updatePlayer();
            updateEnergies();
            updateEnemies();
            checkCollisions();

            // 描画
            drawEnergies();
            drawEnemies();
            drawPlayer();

            // エネルギーを生成
            if (Math.random() < 0.02) {
                spawnEnergy();
            }

            // 敵を生成
            if (Math.random() < 0.01 + score * 0.0001) {
                spawnEnemy();
            }

            animationId = requestAnimationFrame(gameLoop);
        }

        // ゲームを開始
        function startGame() {
            resetGame();
            gameState = 'playing';
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            canvas.style.cursor = 'none';
            gameLoop();
        }

        // マウスイベント
        canvas.addEventListener('mousemove', (e) => {
            if (gameState === 'playing') {
                mouseX = e.clientX;
                mouseY = e.clientY;
            }
        });

        // タッチイベント
        canvas.addEventListener('touchmove', (e) => {
            if (gameState === 'playing') {
                e.preventDefault();
                const touch = e.touches[0];
                mouseX = touch.clientX;
                mouseY = touch.clientY;
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            if (gameState === 'playing') {
                e.preventDefault();
                const touch = e.touches[0];
                mouseX = touch.clientX;
                mouseY = touch.clientY;
            }
        });

        // ボタンイベント
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        // 全画面ボタン
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // 初期化
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // スタート画面でパーティクルアニメーション
        function drawStartScreenParticles() {
            if (gameState === 'start' || gameState === 'gameover') {
                ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // ランダムなパーティクルを描画
                for (let i = 0; i < 5; i++) {
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * canvas.height;
                    const radius = Math.random() * 3;
                    const hue = Math.random() * 60 + 240;

                    ctx.beginPath();
                    ctx.arc(x, y, radius, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${hue}, 70%, 60%, 0.5)`;
                    ctx.fill();
                }

                requestAnimationFrame(drawStartScreenParticles);
            }
        }
        drawStartScreenParticles();
    </script>
</body>
</html>
