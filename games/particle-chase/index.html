<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>パーティクル・チェイス</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        #gameCanvas {
            display: block;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0a 100%);
        }

        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .score-display {
            color: white;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.8);
            text-align: center;
        }

        .level-display {
            color: rgba(255,255,255,0.7);
            font-size: 1rem;
            text-align: center;
            margin-top: 5px;
        }

        .start-screen, .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            pointer-events: auto;
            z-index: 100;
        }

        .game-over-screen {
            display: none;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 40px;
            text-align: center;
            max-width: 400px;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.5);
            pointer-events: auto;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 50px rgba(102, 126, 234, 0.7);
        }

        .final-score {
            font-size: 4rem;
            font-weight: bold;
            margin: 20px 0;
            color: #667eea;
        }

        .high-score {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 30px;
        }

        .controls {
            margin-top: 40px;
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
            text-align: center;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            color: white;
            transition: background 0.3s;
            pointer-events: auto;
        }

        .fullscreen-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            .final-score {
                font-size: 3rem;
            }

            .score-display {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="ui-overlay">
        <div class="score-container">
            <div class="score-display">Score: <span id="score">0</span></div>
            <div class="level-display">Level: <span id="level">1</span></div>
        </div>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    </div>

    <div class="start-screen" id="startScreen">
        <h1>🌟 パーティクル・チェイス</h1>
        <p class="subtitle">光る粒子を追いかけてスコアを稼ごう！<br>障害物にぶつからないように注意！</p>
        <button class="start-btn" onclick="startGame()">スタート</button>
        <div class="controls">
            <p>🖱️ マウス/タップで移動</p>
            <p>⚡ 光る玉を集める</p>
            <p>⚠️ 赤い障害物を避ける</p>
        </div>
    </div>

    <div class="game-over-screen" id="gameOverScreen">
        <h1>ゲームオーバー</h1>
        <div class="final-score" id="finalScore">0</div>
        <div class="high-score">ハイスコア: <span id="highScore">0</span></div>
        <button class="start-btn" onclick="startGame()">もう一度</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let gameRunning = false;
        let score = 0;
        let level = 1;
        let highScore = localStorage.getItem('particleChaseHighScore') || 0;

        // ゲームオブジェクト
        let player;
        let targets = [];
        let obstacles = [];
        let particles = [];

        // リサイズ処理
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // プレイヤー
        class Player {
            constructor() {
                this.x = width / 2;
                this.y = height / 2;
                this.size = 20;
                this.targetX = this.x;
                this.targetY = this.y;
                this.trail = [];
                this.maxTrail = 20;
            }

            update() {
                // スムーズな移動
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                this.x += dx * 0.15;
                this.y += dy * 0.15;

                // トレイル記録
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }

                // 画面外に出ないように
                this.x = Math.max(this.size, Math.min(width - this.size, this.x));
                this.y = Math.max(this.size, Math.min(height - this.size, this.y));
            }

            draw() {
                // トレイル
                this.trail.forEach((pos, i) => {
                    const alpha = i / this.trail.length * 0.5;
                    const size = this.size * (i / this.trail.length);
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(102, 126, 234, ${alpha})`;
                    ctx.fill();
                });

                // 本体
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(0.5, '#667eea');
                gradient.addColorStop(1, '#764ba2');
                ctx.fillStyle = gradient;
                ctx.fill();

                // グロー
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size + 10, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(102, 126, 234, 0.3)';
                ctx.fill();
            }
        }

        // ターゲット（収集アイテム）
        class Target {
            constructor() {
                this.x = Math.random() * (width - 100) + 50;
                this.y = Math.random() * (height - 100) + 50;
                this.size = 15;
                this.pulse = 0;
                this.color = `hsl(${Math.random() * 60 + 40}, 100%, 60%)`;
            }

            update() {
                this.pulse += 0.1;
            }

            draw() {
                const pulseSize = this.size + Math.sin(this.pulse) * 5;

                // グロー
                ctx.beginPath();
                ctx.arc(this.x, this.y, pulseSize + 20, 0, Math.PI * 2);
                ctx.fillStyle = this.color.replace(')', ', 0.2)').replace('hsl', 'hsla');
                ctx.fill();

                // 本体
                ctx.beginPath();
                ctx.arc(this.x, this.y, pulseSize, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, pulseSize);
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(0.5, this.color);
                gradient.addColorStop(1, this.color.replace('60%', '40%'));
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        // 障害物
        class Obstacle {
            constructor() {
                this.x = Math.random() * (width - 100) + 50;
                this.y = Math.random() * (height - 100) + 50;
                this.size = 25;
                this.vx = (Math.random() - 0.5) * 2 * (1 + level * 0.2);
                this.vy = (Math.random() - 0.5) * 2 * (1 + level * 0.2);
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // 反射
                if (this.x < this.size || this.x > width - this.size) this.vx *= -1;
                if (this.y < this.size || this.y > height - this.size) this.vy *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                gradient.addColorStop(0, '#f5576c');
                gradient.addColorStop(1, '#eb3349');
                ctx.fillStyle = gradient;
                ctx.fill();

                // 警告グロー
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size + 15, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(235, 51, 73, 0.3)';
                ctx.fill();
            }
        }

        // エフェクトパーティクル
        class EffectParticle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1;
                this.color = color;
                this.size = Math.random() * 5 + 2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.02;
                this.vx *= 0.98;
                this.vy *= 0.98;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color.replace(')', `, ${this.life})`).replace('hsl', 'hsla');
                ctx.fill();
            }
        }

        // 初期化
        function init() {
            player = new Player();
            targets = [];
            obstacles = [];
            particles = [];
            score = 0;
            level = 1;

            // ターゲット生成
            for (let i = 0; i < 3; i++) {
                targets.push(new Target());
            }

            // 障害物生成
            for (let i = 0; i < 2; i++) {
                obstacles.push(new Obstacle());
            }

            updateUI();
        }

        // ターゲット追加
        function addTarget() {
            targets.push(new Target());
        }

        // 障害物追加
        function addObstacle() {
            obstacles.push(new Obstacle());
        }

        // エフェクト生成
        function createExplosion(x, y, color) {
            for (let i = 0; i < 20; i++) {
                particles.push(new EffectParticle(x, y, color));
            }
        }

        // UI更新
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
        }

        // 衝突判定
        function checkCollision(obj1, obj2) {
            const dx = obj1.x - obj2.x;
            const dy = obj1.y - obj2.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < obj1.size + obj2.size;
        }

        // ゲームループ
        function gameLoop() {
            if (!gameRunning) return;

            // クリア
            ctx.fillStyle = 'rgba(10, 10, 10, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // プレイヤー更新
            player.update();
            player.draw();

            // ターゲット更新
            targets.forEach((target, index) => {
                target.update();
                target.draw();

                // 衝突判定
                if (checkCollision(player, target)) {
                    createExplosion(target.x, target.y, target.color);
                    targets.splice(index, 1);
                    score += 10 * level;

                    // レベルアップ
                    if (score % 100 === 0) {
                        level++;
                        addObstacle();
                    }

                    addTarget();
                    updateUI();
                }
            });

            // 障害物更新
            obstacles.forEach(obstacle => {
                obstacle.update();
                obstacle.draw();

                // 衝突判定（ゲームオーバー）
                if (checkCollision(player, obstacle)) {
                    gameOver();
                    return;
                }
            });

            // エフェクト更新
            particles.forEach((particle, index) => {
                particle.update();
                particle.draw();

                if (particle.life <= 0) {
                    particles.splice(index, 1);
                }
            });

            requestAnimationFrame(gameLoop);
        }

        // ゲーム開始
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            gameRunning = true;
            init();
            gameLoop();
        }

        // ゲームオーバー
        function gameOver() {
            gameRunning = false;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('particleChaseHighScore', highScore);
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('highScore').textContent = highScore;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        // 入力処理
        canvas.addEventListener('mousemove', (e) => {
            if (gameRunning) {
                player.targetX = e.clientX;
                player.targetY = e.clientY;
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (gameRunning) {
                const touch = e.touches[0];
                player.targetX = touch.clientX;
                player.targetY = touch.clientY;
            }
        }, { passive: false });

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期ハイスコア表示
        document.getElementById('highScore').textContent = highScore;
    </script>
</body>
</html>
