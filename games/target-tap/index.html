<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Target Tap - ターゲットタップ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: manipulation;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .header {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .score-display {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .score-label {
            font-size: 14px;
            opacity: 0.8;
            display: block;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 32px;
            color: #4ecdc4;
        }

        .timer-display {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .timer-value {
            font-size: 32px;
            color: #ff6b6b;
        }

        .combo-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #ffd93d;
            text-shadow: 0 0 20px rgba(255, 217, 61, 0.8);
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }

        .combo-display.show {
            animation: comboAnim 0.5s ease-out;
        }

        @keyframes comboAnim {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.5);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 200;
            backdrop-filter: blur(10px);
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h1 {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.8;
            text-align: center;
            max-width: 400px;
            padding: 0 20px;
        }

        .start-btn {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            border: none;
            color: white;
            padding: 20px 60px;
            font-size: 24px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(78, 205, 196, 0.3);
            font-weight: bold;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(78, 205, 196, 0.4);
        }

        .start-btn:active {
            transform: translateY(-1px);
        }

        .final-score {
            font-size: 72px;
            color: #ffd93d;
            margin: 20px 0;
            text-shadow: 0 0 30px rgba(255, 217, 61, 0.5);
        }

        .stats {
            display: flex;
            gap: 30px;
            margin: 20px 0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 32px;
            color: #4ecdc4;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            z-index: 15;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>

        <div class="header">
            <div class="score-display">
                <span class="score-label">SCORE</span>
                <span class="score-value" id="score">0</span>
            </div>
            <div class="timer-display">
                <span class="timer-label">TIME</span>
                <span class="timer-value" id="timer">60</span>
            </div>
        </div>

        <div class="combo-display" id="combo"></div>

        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

        <div class="overlay" id="startOverlay">
            <h1>🎯 Target Tap</h1>
            <p>現れるターゲットをタップ！速いほど高得点！<br>60秒で何回タップできるか挑戦！</p>
            <button class="start-btn" onclick="startGame()">スタート</button>
        </div>

        <div class="overlay hidden" id="endOverlay">
            <h1>🎉 終了！</h1>
            <div class="final-score" id="finalScore">0</div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-label">MAX COMBO</div>
                    <div class="stat-value" id="maxCombo">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">平均タイム</div>
                    <div class="stat-value" id="avgTime">0ms</div>
                </div>
            </div>
            <button class="start-btn" onclick="startGame()">もう一度</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let score = 0;
        let timeLeft = 60;
        let combo = 0;
        let maxCombo = 0;
        let targets = [];
        let particles = [];
        let gameActive = false;
        let timerInterval;
        let targetSpawnInterval;
        let targetTimes = [];

        const colors = [
            '#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7', '#dfe6e9',
            '#fd79a8', '#a29bfe', '#00b894', '#e17055'
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Target {
            constructor() {
                const margin = 80;
                this.radius = Math.random() * 30 + 40;
                this.x = Math.random() * (width - margin * 2) + margin;
                this.y = Math.random() * (height - margin * 2) + margin;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.scale = 0;
                this.maxScale = 1;
                this.spawnTime = Date.now();
                this.life = 1;
                this.lifeDecay = 0.008;
                this.pulseOffset = Math.random() * Math.PI * 2;
            }

            update(time) {
                // 出現アニメーション
                if (this.scale < this.maxScale) {
                    this.scale += 0.1;
                }

                // 脈動アニメーション
                this.pulseOffset += 0.1;

                // ライフ減少
                this.life -= this.lifeDecay;
            }

            draw(time) {
                const pulse = Math.sin(this.pulseOffset) * 0.1 + 1;
                const currentRadius = this.radius * this.scale * pulse;

                ctx.save();
                ctx.globalAlpha = this.life;

                // 外側の光るエフェクト
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, currentRadius * 2
                );
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(0.5, this.color + '40');
                gradient.addColorStop(1, 'transparent');

                ctx.beginPath();
                ctx.arc(this.x, this.y, currentRadius * 2, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // メインの円
                ctx.beginPath();
                ctx.arc(this.x, this.y, currentRadius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.color;
                ctx.fill();

                // ハイライト
                ctx.beginPath();
                ctx.arc(this.x - currentRadius * 0.3, this.y - currentRadius * 0.3, currentRadius * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.fill();

                ctx.restore();
            }

            contains(x, y) {
                const dist = Math.sqrt((x - this.x) ** 2 + (y - this.y) ** 2);
                return dist < this.radius * this.scale;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 4;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.color = color;
                this.size = Math.random() * 8 + 4;
                this.life = 1;
                this.decay = Math.random() * 0.03 + 0.02;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.life -= this.decay;
                this.size *= 0.97;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function spawnTarget() {
            if (targets.length < 5) {
                targets.push(new Target());
            }
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function showCombo(text) {
            const comboEl = document.getElementById('combo');
            comboEl.textContent = text;
            comboEl.classList.remove('show');
            void comboEl.offsetWidth; // Trigger reflow
            comboEl.classList.add('show');
        }

        function handleTap(x, y) {
            if (!gameActive) return;

            for (let i = targets.length - 1; i >= 0; i--) {
                if (targets[i].contains(x, y)) {
                    const target = targets[i];
                    const tapTime = Date.now() - target.spawnTime;

                    // タイムボーナス
                    let points = 10;
                    let comboText = '';

                    if (tapTime < 300) {
                        points = 50;
                        comboText = '⚡ PERFECT!';
                    } else if (tapTime < 500) {
                        points = 30;
                        comboText = '✨ GREAT!';
                    } else {
                        points = 10;
                        comboText = '👍';
                    }

                    combo++;
                    if (combo > maxCombo) maxCombo = combo;

                    points += combo * 2;
                    targetTimes.push(tapTime);

                    score += points;
                    createParticles(target.x, target.y, target.color);
                    targets.splice(i, 1);

                    document.getElementById('score').textContent = score;

                    if (combo >= 3) {
                        showCombo(`${comboText} ${combo} COMBO!`);
                    } else {
                        showCombo(comboText);
                    }

                    return;
                }
            }

            // ミス
            combo = 0;
            showCombo('MISS');
        }

        function animate(time) {
            ctx.clearRect(0, 0, width, height);

            // ターゲットの更新と描画
            targets = targets.filter(t => t.life > 0);
            targets.forEach(target => {
                target.update(time);
                target.draw(time);
            });

            // パーティクルの更新と描画
            particles = particles.filter(p => p.life > 0);
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            requestAnimationFrame(animate);
        }

        function startGame() {
            score = 0;
            timeLeft = 60;
            combo = 0;
            maxCombo = 0;
            targets = [];
            particles = [];
            targetTimes = [];
            gameActive = true;

            document.getElementById('score').textContent = '0';
            document.getElementById('timer').textContent = '60';
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('endOverlay').classList.add('hidden');

            // タイマー
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // ターゲット生成
            targetSpawnInterval = setInterval(spawnTarget, 500);
            spawnTarget();
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);
            clearInterval(targetSpawnInterval);

            const avgTime = targetTimes.length > 0
                ? Math.round(targetTimes.reduce((a, b) => a + b, 0) / targetTimes.length)
                : 0;

            document.getElementById('finalScore').textContent = score;
            document.getElementById('maxCombo').textContent = maxCombo;
            document.getElementById('avgTime').textContent = avgTime + 'ms';
            document.getElementById('endOverlay').classList.remove('hidden');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('全画面表示に失敗しました');
                });
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        canvas.addEventListener('click', (e) => {
            handleTap(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleTap(touch.clientX, touch.clientY);
        }, { passive: false });

        window.addEventListener('resize', resize);

        // 初期化
        resize();
        animate(0);
    </script>
</body>
</html>
