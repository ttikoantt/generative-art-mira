<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game - スネークゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            padding: 10px 20px;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .score-display {
            color: #c4b5fd;
            font-size: 18px;
            font-weight: bold;
        }

        .high-score {
            color: #f9a8d4;
            font-size: 14px;
        }

        #gameCanvas {
            border: 2px solid rgba(139, 92, 246, 0.5);
            border-radius: 10px;
            background: rgba(10, 10, 15, 0.9);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.2);
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.5);
            color: #c4b5fd;
            padding: 12px 24px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            border-radius: 8px;
        }

        button:hover {
            background: rgba(139, 92, 246, 0.4);
            border-color: rgba(139, 92, 246, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.3);
        }

        .touch-controls {
            display: none;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin-top: 10px;
        }

        .touch-btn {
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.5);
            color: #c4b5fd;
            padding: 15px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .touch-btn:active {
            background: rgba(139, 92, 246, 0.5);
            transform: scale(0.95);
        }

        .touch-btn.empty {
            background: transparent;
            border: none;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 15, 0.95);
            padding: 30px 50px;
            border: 2px solid rgba(236, 72, 153, 0.5);
            border-radius: 15px;
            text-align: center;
            display: none;
            z-index: 100;
        }

        .game-over.show {
            display: block;
        }

        .game-over h2 {
            color: #f9a8d4;
            margin-bottom: 15px;
            font-size: 28px;
        }

        .game-over p {
            color: #c4b5fd;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(236, 72, 153, 0.2);
            border: 1px solid rgba(236, 72, 153, 0.5);
            color: #f9a8d4;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .touch-controls {
                display: grid;
            }
            
            #gameCanvas {
                max-width: 90vw;
                max-height: 50vh;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">⛶ 全画面</button>

    <div class="game-container">
        <div class="header">
            <div class="score-display">スコア: <span id="score">0</span></div>
            <div class="high-score">ハイスコア: <span id="highScore">0</span></div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="controls">
            <button id="startBtn">▶ スタート</button>
            <button id="pauseBtn">⏸ 一時停止</button>
        </div>

        <div class="touch-controls">
            <div class="touch-btn empty"></div>
            <div class="touch-btn" id="upBtn">↑</div>
            <div class="touch-btn empty"></div>
            <div class="touch-btn" id="leftBtn">←</div>
            <div class="touch-btn empty"></div>
            <div class="touch-btn" id="rightBtn">→</div>
            <div class="touch-btn empty"></div>
            <div class="touch-btn" id="downBtn">↓</div>
            <div class="touch-btn empty"></div>
        </div>

        <div class="game-over" id="gameOver">
            <h2>ゲームオーバー!</h2>
            <p>スコア: <span id="finalScore">0</span></p>
            <button id="restartBtn">↻ もう一度</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 15, y: 15 };
        let dx = 0;
        let dy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameSpeed = 100;
        let lastTime = 0;
        let particles = [];

        highScoreEl.textContent = highScore;

        function drawGame(timestamp) {
            if (!gameRunning || gamePaused) return;

            if (timestamp - lastTime < gameSpeed) {
                requestAnimationFrame(drawGame);
                return;
            }
            lastTime = timestamp;

            update();
            draw();
            requestAnimationFrame(drawGame);
        }

        function update() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // 壁にぶつかったら反対側から出現
            if (head.x < 0) head.x = tileCount - 1;
            if (head.x >= tileCount) head.x = 0;
            if (head.y < 0) head.y = tileCount - 1;
            if (head.y >= tileCount) head.y = 0;

            // 自分にぶつかったかチェック
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // 食べ物を食べた
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                createParticles(head.x * gridSize + gridSize / 2, head.y * gridSize + gridSize / 2);
                
                // スピードアップ
                if (gameSpeed > 50) {
                    gameSpeed -= 2;
                }

                // 新しい食べ物の位置
                spawnFood();
            } else {
                snake.pop();
            }

            // パーティクル更新
            updateParticles();
        }

        function draw() {
            // 背景
            ctx.fillStyle = 'rgba(10, 10, 15, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // グリッド（薄く）
            ctx.strokeStyle = 'rgba(139, 92, 246, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // パーティクル
            drawParticles();

            // 蛇を描画
            snake.forEach((segment, index) => {
                const hue = 270 + index * 2;
                const lightness = 60 - index * 0.5;
                const alpha = 1 - index * 0.02;
                
                ctx.fillStyle = `hsla(${hue}, 80%, ${lightness}%, ${alpha})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = `hsla(${hue}, 80%, 60%, 0.8)`;
                
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );

                ctx.shadowBlur = 0;
            });

            // 食べ物を描画
            const pulse = Math.sin(Date.now() * 0.01) * 3;
            ctx.fillStyle = '#f9a8d4';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#f9a8d4';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2 + pulse,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function spawnFood() {
            do {
                food.x = Math.floor(Math.random() * tileCount);
                food.y = Math.floor(Math.random() * tileCount);
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function createParticles(x, y) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 1,
                    color: `hsl(${Math.random() * 60 + 300}, 80%, 60%)`
                });
            }
        }

        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                return p.life > 0;
            });
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function gameOver() {
            gameRunning = false;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreEl.textContent = highScore;
            }
            
            finalScoreEl.textContent = score;
            gameOverEl.classList.add('show');
        }

        function startGame() {
            snake = [{ x: 10, y: 10 }];
            dx = 1;
            dy = 0;
            score = 0;
            gameSpeed = 100;
            particles = [];
            scoreEl.textContent = score;
            spawnFood();
            gameRunning = true;
            gamePaused = false;
            gameOverEl.classList.remove('show');
            startBtn.textContent = '🔄 リスタート';
            requestAnimationFrame(drawGame);
        }

        function togglePause() {
            if (!gameRunning) return;
            gamePaused = !gamePaused;
            pauseBtn.textContent = gamePaused ? '▶ 再開' : '⏸ 一時停止';
            if (!gamePaused) {
                requestAnimationFrame(drawGame);
            }
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (!gameRunning || gamePaused) return;

            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (dy !== 1) { dx = 0; dy = -1; }
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (dy !== -1) { dx = 0; dy = 1; }
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (dx !== 1) { dx = -1; dy = 0; }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (dx !== -1) { dx = 1; dy = 0; }
                    break;
                case ' ':
                    togglePause();
                    break;
            }
        });

        // タッチ操作
        document.getElementById('upBtn').addEventListener('click', () => {
            if (dy !== 1) { dx = 0; dy = -1; }
        });
        document.getElementById('downBtn').addEventListener('click', () => {
            if (dy !== -1) { dx = 0; dy = 1; }
        });
        document.getElementById('leftBtn').addEventListener('click', () => {
            if (dx !== 1) { dx = -1; dy = 0; }
        });
        document.getElementById('rightBtn').addEventListener('click', () => {
            if (dx !== -1) { dx = 1; dy = 0; }
        });

        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', togglePause);
        restartBtn.addEventListener('click', startGame);

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                fullscreenBtn.textContent = '⛶ 元に戻す';
            } else {
                document.exitFullscreen();
                fullscreenBtn.textContent = '⛶ 全画面';
            }
        });

        // スワイプ操作
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            if (!gameRunning || gamePaused) return;

            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;

            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                if (deltaX > 30 && dx !== -1) { dx = 1; dy = 0; }
                else if (deltaX < -30 && dx !== 1) { dx = -1; dy = 0; }
            } else {
                if (deltaY > 30 && dy !== -1) { dx = 0; dy = 1; }
                else if (deltaY < -30 && dy !== 1) { dx = 0; dy = -1; }
            }
        });

        // 初期描画
        draw();
    </script>
</body>
</html>
