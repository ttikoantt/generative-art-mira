<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 500px;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }

        .header h1 {
            font-size: 28px;
        }

        .stats {
            display: flex;
            gap: 30px;
            font-size: 18px;
        }

        .stat-box {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 5px;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
        }

        #gameCanvas {
            border: 3px solid #00ffff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3),
                        inset 0 0 60px rgba(0, 255, 255, 0.1);
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-btn {
            background: rgba(0, 255, 255, 0.2);
            border: 2px solid rgba(0, 255, 255, 0.5);
            color: #00ffff;
            padding: 12px 24px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
        }

        .control-btn:hover {
            background: rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            transform: scale(1.05);
        }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin-top: 20px;
        }

        .d-pad button {
            background: rgba(0, 255, 255, 0.2);
            border: 2px solid rgba(0, 255, 255, 0.5);
            color: #00ffff;
            font-size: 24px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .d-pad button:active {
            background: rgba(0, 255, 255, 0.5);
            transform: scale(0.95);
        }

        .d-pad .empty {
            visibility: hidden;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            border-radius: 10px;
            z-index: 10;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            color: #00ffff;
            font-size: 36px;
            text-shadow: 0 0 20px #00ffff;
        }

        .overlay p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 18px;
            text-align: center;
            max-width: 300px;
        }

        .overlay button {
            background: #00ffff;
            border: none;
            color: #0a0a0f;
            padding: 15px 40px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: all 0.3s;
        }

        .overlay button:hover {
            box-shadow: 0 0 30px #00ffff;
            transform: scale(1.05);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid rgba(0, 255, 255, 0.5);
            color: #00ffff;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .header h1 {
                font-size: 22px;
            }

            .stats {
                gap: 15px;
            }

            .stat-box {
                padding: 8px 15px;
            }

            .stat-value {
                font-size: 20px;
            }

            .d-pad {
                grid-template-columns: repeat(3, 50px);
                grid-template-rows: repeat(3, 50px);
            }

            .d-pad button {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <div class="game-container">
        <div class="header">
            <h1>🐍 Neon Snake</h1>
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-label">SCORE</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">HIGH SCORE</div>
                    <div class="stat-value" id="highScore">0</div>
                </div>
            </div>
        </div>

        <div style="position: relative;">
            <canvas id="gameCanvas" width="400" height="400"></canvas>

            <div class="overlay" id="startOverlay">
                <h2>🐍 NEON SNAKE</h2>
                <p>Use arrow keys or buttons to control the snake</p>
                <button onclick="startGame()">▶ START</button>
            </div>

            <div class="overlay hidden" id="gameOverOverlay">
                <h2>GAME OVER</h2>
                <p>Final Score: <span id="finalScore">0</span></p>
                <button onclick="startGame()">🔄 PLAY AGAIN</button>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn" onclick="changeSpeed(0)">🐢 SLOW</button>
            <button class="control-btn" onclick="changeSpeed(1)">⚡ NORMAL</button>
            <button class="control-btn" onclick="changeSpeed(2)">🔥 FAST</button>
        </div>

        <div class="d-pad">
            <div class="empty"></div>
            <button onclick="changeDirection('up')">↑</button>
            <div class="empty"></div>
            <button onclick="changeDirection('left')">←</button>
            <button onclick="togglePause()" id="pauseBtn">⏸</button>
            <button onclick="changeDirection('right')">→</button>
            <div class="empty"></div>
            <button onclick="changeDirection('down')">↓</button>
            <div class="empty"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{ x: 10, y: 10 }];
        let velocity = { x: 1, y: 0 };
        let nextVelocity = { x: 1, y: 0 };
        let food = { x: 15, y: 15 };
        let score = 0;
        let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
        let gameLoop;
        let isPaused = false;
        let speed = 100;
        const speeds = [150, 100, 60];
        let isGameOver = false;

        document.getElementById('highScore').textContent = highScore;

        function startGame() {
            snake = [{ x: 10, y: 10 }];
            velocity = { x: 1, y: 0 };
            nextVelocity = { x: 1, y: 0 };
            score = 0;
            document.getElementById('score').textContent = score;
            isGameOver = false;
            isPaused = false;
            document.getElementById('pauseBtn').textContent = '⏸';
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');
            spawnFood();
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(gameUpdate, speed);
        }

        function gameUpdate() {
            if (isPaused || isGameOver) return;

            velocity = { ...nextVelocity };

            const head = { x: snake[0].x + velocity.x, y: snake[0].y + velocity.y };

            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // Self collision
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // Food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                spawnFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.1)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // Draw snake
            snake.forEach((segment, index) => {
                const hue = (index * 5 + Date.now() / 50) % 360;
                ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
                ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
                ctx.shadowBlur = 10;

                const padding = 2;
                ctx.fillRect(
                    segment.x * gridSize + padding,
                    segment.y * gridSize + padding,
                    gridSize - padding * 2,
                    gridSize - padding * 2
                );
            });

            // Reset shadow
            ctx.shadowBlur = 0;

            // Draw food
            ctx.fillStyle = '#ff00ff';
            ctx.shadowColor = '#ff00ff';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(gameLoop);

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        function changeDirection(dir) {
            const keyMap = {
                'up': { x: 0, y: -1 },
                'down': { x: 0, y: 1 },
                'left': { x: -1, y: 0 },
                'right': { x: 1, y: 0 }
            };

            const newDir = keyMap[dir];
            if (!newDir) return;

            // Prevent reversing
            if (velocity.x + newDir.x === 0 && velocity.y + newDir.y === 0) return;

            nextVelocity = newDir;
        }

        function changeSpeed(level) {
            speed = speeds[level];
            if (gameLoop && !isGameOver && !isPaused) {
                clearInterval(gameLoop);
                gameLoop = setInterval(gameUpdate, speed);
            }
        }

        function togglePause() {
            if (isGameOver) return;
            isPaused = !isPaused;
            document.getElementById('pauseBtn').textContent = isPaused ? '▶' : '⏸';
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            const keyMap = {
                'ArrowUp': 'up',
                'ArrowDown': 'down',
                'ArrowLeft': 'left',
                'ArrowRight': 'right',
                'w': 'up',
                's': 'down',
                'a': 'left',
                'd': 'right'
            };

            if (keyMap[e.key]) {
                e.preventDefault();
                changeDirection(keyMap[e.key]);
            }

            if (e.key === ' ') {
                e.preventDefault();
                if (isGameOver) {
                    startGame();
                } else {
                    togglePause();
                }
            }
        });

        // Touch swipe controls
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            const minSwipe = 30;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > minSwipe) changeDirection('right');
                else if (dx < -minSwipe) changeDirection('left');
            } else {
                if (dy > minSwipe) changeDirection('down');
                else if (dy < -minSwipe) changeDirection('up');
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initial draw
        draw();
    </script>
</body>
</html>
