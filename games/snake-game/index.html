<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake Game - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: #fff;
        }

        .score {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(161, 140, 209, 0.8);
        }

        .high-score {
            font-size: 16px;
            opacity: 0.7;
        }

        canvas {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            display: block;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: #fff;
            display: none;
            z-index: 100;
        }

        .game-over h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #ff6b6b;
        }

        .game-over p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            color: #fff;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            text-decoration: none;
            z-index: 100;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .controls {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .game-container {
                padding: 15px;
            }

            .header {
                margin-bottom: 15px;
            }

            .score {
                font-size: 20px;
            }

            .high-score {
                font-size: 14px;
            }

            .fullscreen-btn, .back-btn {
                padding: 8px 16px;
                font-size: 12px;
            }

            .game-over {
                padding: 30px;
            }

            .game-over h2 {
                font-size: 28px;
            }

            .game-over p {
                font-size: 16px;
            }

            .restart-btn {
                padding: 12px 30px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-btn">← Back</a>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <div class="game-container">
        <div class="header">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="high-score">Best: <span id="highScore">0</span></div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="controls">
            Desktop: Arrow Keys or WASD | Mobile: Swipe
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>Game Over!</h2>
        <p>Your Score: <span id="finalScore">0</span></p>
        <button class="restart-btn" onclick="restartGame()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // キャンバスサイズ設定
        const gridSize = 20;
        let canvasSize = Math.min(window.innerWidth - 60, window.innerHeight - 200, 400);
        canvasSize = Math.floor(canvasSize / gridSize) * gridSize;
        canvas.width = canvasSize;
        canvas.height = canvasSize;

        // ゲーム変数
        let snake = [{ x: 10, y: 10 }];
        let food = { x: 15, y: 15 };
        let direction = { x: 0, y: 0 };
        let nextDirection = { x: 0, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop;
        let gameSpeed = 100;

        // ハイスコア表示
        document.getElementById('highScore').textContent = highScore;

        // 色の設定
        const colors = {
            snakeHead: '#667eea',
            snakeBody: '#764ba2',
            food: '#ff6b6b',
            grid: 'rgba(255, 255, 255, 0.05)'
        };

        function draw() {
            // 背景クリア
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // グリッド描画
            ctx.strokeStyle = colors.grid;
            ctx.lineWidth = 1;
            for (let i = 0; i <= canvas.width; i += gridSize) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            // 食べ物描画（光る効果）
            ctx.shadowBlur = 15;
            ctx.shadowColor = colors.food;
            ctx.fillStyle = colors.food;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;

            // 蛇描画
            snake.forEach((segment, index) => {
                ctx.shadowBlur = index === 0 ? 15 : 8;
                ctx.shadowColor = index === 0 ? colors.snakeHead : colors.snakeBody;
                ctx.fillStyle = index === 0 ? colors.snakeHead : colors.snakeBody;

                // 丸みを帯びたセグメント
                const padding = 2;
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + padding,
                    segment.y * gridSize + padding,
                    gridSize - padding * 2,
                    gridSize - padding * 2,
                    5
                );
                ctx.fill();
            });
            ctx.shadowBlur = 0;
        }

        function update() {
            // 方向を更新
            direction = { ...nextDirection };

            // 新しい頭の位置
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // 壁との衝突（ゲームオーバー）
            if (head.x < 0 || head.x >= canvas.width / gridSize ||
                head.y < 0 || head.y >= canvas.height / gridSize) {
                gameOver();
                return;
            }

            // 自分との衝突
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            // 新しい頭を追加
            snake.unshift(head);

            // 食べ物を食べたか
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                generateFood();

                // スピードアップ
                if (score % 50 === 0 && gameSpeed > 50) {
                    gameSpeed -= 5;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, gameSpeed);
                }
            } else {
                snake.pop();
            }
        }

        function generateFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * (canvas.width / gridSize)),
                    y: Math.floor(Math.random() * (canvas.height / gridSize))
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function gameStep() {
            update();
            draw();
        }

        function gameOver() {
            clearInterval(gameLoop);

            // ハイスコア更新
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }

        function restartGame() {
            snake = [{ x: 10, y: 10 }];
            direction = { x: 0, y: 0 };
            nextDirection = { x: 0, y: 0 };
            score = 0;
            gameSpeed = 100;
            document.getElementById('score').textContent = score;
            document.getElementById('gameOver').style.display = 'none';
            generateFood();
            gameLoop = setInterval(gameStep, gameSpeed);
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y === 0) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y === 0) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x === 0) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x === 0) nextDirection = { x: 1, y: 0 };
                    break;
            }
        });

        // スワイプ操作（モバイル）
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30 && direction.x === 0) nextDirection = { x: 1, y: 0 };
                else if (dx < -30 && direction.x === 0) nextDirection = { x: -1, y: 0 };
            } else {
                if (dy > 30 && direction.y === 0) nextDirection = { x: 0, y: 1 };
                else if (dy < -30 && direction.y === 0) nextDirection = { x: 0, y: -1 };
            }
        });

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ゲーム開始
        generateFood();
        draw();
        gameLoop = setInterval(gameStep, gameSpeed);
    </script>
</body>
</html>
