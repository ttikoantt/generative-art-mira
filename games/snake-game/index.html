<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Classic - スネーク</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #4ade80;
            margin-bottom: 10px;
            font-size: 2em;
            text-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
        }

        .score-board {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .score-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .score-label {
            color: #94a3b8;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .score-value {
            color: #fff;
            font-size: 1.8em;
            font-weight: bold;
        }

        .score-value.high {
            color: #fbbf24;
        }

        #gameCanvas {
            border: 3px solid #4ade80;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.3);
            background: #0f172a;
            max-width: 100%;
            touch-action: none;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background: rgba(74, 222, 128, 0.2);
            border: 2px solid #4ade80;
            color: #4ade80;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn:hover {
            background: rgba(74, 222, 128, 0.3);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
        }

        .fullscreen-btn {
            background: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
            color: #3b82f6;
        }

        .fullscreen-btn:hover {
            background: rgba(59, 130, 246, 0.3);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid #ef4444;
            text-align: center;
            z-index: 100;
            display: none;
            box-shadow: 0 0 50px rgba(239, 68, 68, 0.5);
        }

        .game-over.show {
            display: block;
        }

        .game-over h2 {
            color: #ef4444;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .game-over p {
            color: #fff;
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        .direction-buttons {
            display: none;
            margin-top: 20px;
            gap: 10px;
        }

        .dir-btn {
            width: 60px;
            height: 60px;
            background: rgba(74, 222, 128, 0.2);
            border: 2px solid #4ade80;
            color: #4ade80;
            border-radius: 10px;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .dir-btn:active {
            background: rgba(74, 222, 128, 0.4);
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5em;
            }

            .score-board {
                gap: 15px;
            }

            .score-item {
                padding: 8px 15px;
            }

            .score-value {
                font-size: 1.4em;
            }

            .direction-buttons {
                display: grid;
                grid-template-columns: repeat(3, 60px);
                grid-template-rows: repeat(2, 60px);
                gap: 5px;
            }

            .dir-btn {
                width: 60px;
                height: 60px;
            }

            .dir-up { grid-column: 2; grid-row: 1; }
            .dir-left { grid-column: 1; grid-row: 2; }
            .dir-down { grid-column: 2; grid-row: 2; }
            .dir-right { grid-column: 3; grid-row: 2; }

            .controls .btn {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Snake Classic</h1>

        <div class="score-board">
            <div class="score-item">
                <div class="score-label">Score</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">High Score</div>
                <div class="score-value high" id="highScore">0</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="controls">
            <button class="btn" onclick="startGame()">▶ Start</button>
            <button class="btn" onclick="pauseGame()">⏸ Pause</button>
            <button class="btn fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
        </div>

        <div class="direction-buttons">
            <button class="dir-btn dir-up" ontouchstart="changeDirection('up')" onclick="changeDirection('up')">↑</button>
            <button class="dir-btn dir-left" ontouchstart="changeDirection('left')" onclick="changeDirection('left')">←</button>
            <button class="dir-btn dir-down" ontouchstart="changeDirection('down')" onclick="changeDirection('down')">↓</button>
            <button class="dir-btn dir-right" ontouchstart="changeDirection('right')" onclick="changeDirection('right')">→</button>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>💀 Game Over!</h2>
        <p>Score: <span id="finalScore">0</span></p>
        <button class="btn" onclick="restartGame()">🔄 Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop;
        let gameSpeed = 100;
        let isRunning = false;
        let isPaused = false;

        document.getElementById('highScore').textContent = highScore;

        function drawGame() {
            if (isPaused) return;

            clearCanvas();
            moveSnake();
            drawFood();
            drawSnake();
            checkCollision();
            checkFoodCollision();
        }

        function clearCanvas() {
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid pattern
            ctx.strokeStyle = 'rgba(74, 222, 128, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
        }

        function drawSnake() {
            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    0,
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    gridSize
                );

                if (index === 0) {
                    // Head
                    gradient.addColorStop(0, '#86efac');
                    gradient.addColorStop(1, '#22c55e');
                } else {
                    // Body - gradient based on position
                    const alpha = 1 - (index / snake.length) * 0.5;
                    gradient.addColorStop(0, `rgba(74, 222, 128, ${alpha})`);
                    gradient.addColorStop(1, `rgba(34, 197, 94, ${alpha})`);
                }

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    5
                );
                ctx.fill();

                // Eyes on head
                if (index === 0) {
                    ctx.fillStyle = '#0f172a';
                    const eyeSize = 3;
                    const eyeOffset = 5;

                    let eye1X, eye1Y, eye2X, eye2Y;

                    if (dx === 1) { // Right
                        eye1X = segment.x * gridSize + gridSize - eyeOffset;
                        eye1Y = segment.y * gridSize + eyeOffset;
                        eye2X = segment.x * gridSize + gridSize - eyeOffset;
                        eye2Y = segment.y * gridSize + gridSize - eyeOffset;
                    } else if (dx === -1) { // Left
                        eye1X = segment.x * gridSize + eyeOffset;
                        eye1Y = segment.y * gridSize + eyeOffset;
                        eye2X = segment.x * gridSize + eyeOffset;
                        eye2Y = segment.y * gridSize + gridSize - eyeOffset;
                    } else if (dy === -1) { // Up
                        eye1X = segment.x * gridSize + eyeOffset;
                        eye1Y = segment.y * gridSize + eyeOffset;
                        eye2X = segment.x * gridSize + gridSize - eyeOffset;
                        eye2Y = segment.y * gridSize + eyeOffset;
                    } else { // Down
                        eye1X = segment.x * gridSize + eyeOffset;
                        eye1Y = segment.y * gridSize + gridSize - eyeOffset;
                        eye2X = segment.x * gridSize + gridSize - eyeOffset;
                        eye2Y = segment.y * gridSize + gridSize - eyeOffset;
                    }

                    ctx.beginPath();
                    ctx.arc(eye1X, eye1Y, eyeSize, 0, Math.PI * 2);
                    ctx.arc(eye2X, eye2Y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function drawFood() {
            const gradient = ctx.createRadialGradient(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                0,
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize
            );

            gradient.addColorStop(0, '#fca5a5');
            gradient.addColorStop(0.5, '#ef4444');
            gradient.addColorStop(1, 'rgba(239, 68, 68, 0)');

            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();

            // Glow effect
            ctx.shadowColor = '#ef4444';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function moveSnake() {
            if (dx === 0 && dy === 0) return;

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            // Check if food was eaten (before removing tail)
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                generateFood();
                // Speed up slightly
                if (gameSpeed > 50) {
                    gameSpeed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(drawGame, gameSpeed);
                }
            } else {
                snake.pop();
            }
        }

        function checkCollision() {
            const head = snake[0];

            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // Self collision
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }
        }

        function checkFoodCollision() {
            // Handled in moveSnake
        }

        function generateFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function changeDirection(direction) {
            switch(direction) {
                case 'up':
                    if (dy !== 1) { dx = 0; dy = -1; }
                    break;
                case 'down':
                    if (dy !== -1) { dx = 0; dy = 1; }
                    break;
                case 'left':
                    if (dx !== 1) { dx = -1; dy = 0; }
                    break;
                case 'right':
                    if (dx !== -1) { dx = 1; dy = 0; }
                    break;
            }
        }

        function startGame() {
            if (isRunning) return;

            snake = [{x: 10, y: 10}];
            dx = 1;
            dy = 0;
            score = 0;
            gameSpeed = 100;
            isRunning = true;
            isPaused = false;

            document.getElementById('score').textContent = score;
            document.getElementById('gameOver').classList.remove('show');

            generateFood();
            gameLoop = setInterval(drawGame, gameSpeed);
        }

        function pauseGame() {
            if (!isRunning) return;
            isPaused = !isPaused;
        }

        function gameOver() {
            clearInterval(gameLoop);
            isRunning = false;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.add('show');
        }

        function restartGame() {
            startGame();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    changeDirection('up');
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    changeDirection('down');
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    changeDirection('left');
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    changeDirection('right');
                    break;
                case ' ':
                    e.preventDefault();
                    if (!isRunning) {
                        startGame();
                    } else {
                        pauseGame();
                    }
                    break;
            }
        });

        // Touch swipe controls
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        });

        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 30) changeDirection('right');
                else if (diffX < -30) changeDirection('left');
            } else {
                if (diffY > 30) changeDirection('down');
                else if (diffY < -30) changeDirection('up');
            }
        });

        // Initial draw
        clearCanvas();
        drawFood();
        drawSnake();
    </script>
</body>
</html>
