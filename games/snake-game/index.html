<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game Lite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .game-container {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(102, 126, 234, 0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: #0ff;
        }

        .header h1 {
            font-size: 24px;
            text-shadow: 0 0 10px #0ff;
        }

        .stats {
            text-align: right;
        }

        .stats p {
            margin: 5px 0;
            font-size: 14px;
        }

        .stats span {
            color: #0f0;
            font-weight: bold;
            font-size: 18px;
        }

        canvas {
            border: 3px solid #0ff;
            border-radius: 10px;
            display: block;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .controls {
            margin-top: 20px;
            text-align: center;
            color: #0ff;
        }

        .controls button {
            background: transparent;
            border: 2px solid #0ff;
            color: #0ff;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .controls button:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 15px #0ff;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid #0ff;
            text-align: center;
            color: #0ff;
            display: none;
            z-index: 1000;
        }

        .game-over h2 {
            font-size: 36px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #0ff;
        }

        .game-over p {
            font-size: 24px;
            margin: 10px 0;
        }

        .game-over button {
            background: transparent;
            border: 2px solid #0ff;
            color: #0ff;
            padding: 15px 30px;
            margin: 10px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 18px;
            transition: all 0.3s;
        }

        .game-over button:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 15px #0ff;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 255, 255, 0.2);
            border: 2px solid #0ff;
            color: #0ff;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 14px;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 255, 0.4);
        }

        .instructions {
            margin-top: 15px;
            font-size: 12px;
            color: #0ff;
            text-align: center;
        }

        @media (max-width: 768px) {
            .game-container {
                padding: 15px;
                margin: 10px;
            }

            .header h1 {
                font-size: 20px;
            }

            .stats p {
                font-size: 12px;
            }

            canvas {
                max-width: 100%;
                height: auto;
            }

            .fullscreen-btn {
                bottom: 10px;
                right: 10px;
            }

            .instructions {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🐍 Snake Game</h1>
            <div class="stats">
                <p>スコア: <span id="score">0</span></p>
                <p>ハイスコア: <span id="highScore">0</span></p>
            </div>
        </div>

        <canvas id="canvas"></canvas>

        <div class="controls">
            <button onclick="startGame()">スタート</button>
            <button onclick="togglePause()">一時停止</button>
        </div>

        <div class="instructions">
            操作: 矢印キー / WASD / スワイプ
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-over" id="gameOver">
        <h2>Game Over!</h2>
        <p>スコア: <span id="finalScore">0</span></p>
        <p>ハイスコア: <span id="finalHighScore">0</span></p>
        <button onclick="restartGame()">もう一度</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const gridSize = 20;
        const tileCount = 20;

        let width, height;
        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameSpeed = 100;
        let gameLoop;
        let lastRenderTime = 0;
        let snakeHeadColor = 0;

        function resize() {
            const maxWidth = Math.min(window.innerWidth - 40, 600);
            const size = Math.floor(maxWidth / gridSize) * gridSize;

            width = canvas.width = size;
            height = canvas.height = size;

            document.getElementById('highScore').textContent = highScore;
        }

        function init() {
            const startX = Math.floor(tileCount / 2);
            const startY = Math.floor(tileCount / 2);

            snake = [
                { x: startX, y: startY },
                { x: startX - 1, y: startY },
                { x: startX - 2, y: startY }
            ];

            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameSpeed = 100;

            document.getElementById('score').textContent = score;
            spawnFood();
        }

        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function update() {
            if (!gameRunning || gamePaused) return;

            direction = { ...nextDirection };

            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // Wall collision
            if (head.x < 0 || head.x >= tileCount ||
                head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // Self collision
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // Food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;

                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('snakeHighScore', highScore);
                    document.getElementById('highScore').textContent = highScore;
                }

                spawnFood();

                // Speed up
                if (score % 50 === 0 && gameSpeed > 50) {
                    gameSpeed -= 5;
                }
            } else {
                snake.pop();
            }

            snakeHeadColor = (snakeHeadColor + 5) % 360;
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            // Grid
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(width, i * gridSize);
                ctx.stroke();
            }

            // Food
            ctx.fillStyle = '#ff0';
            ctx.shadowColor = '#ff0';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;

            // Snake
            snake.forEach((segment, index) => {
                const hue = index === 0 ? snakeHeadColor : (snakeHeadColor + index * 10) % 360;
                const alpha = 1 - (index / snake.length) * 0.5;

                ctx.fillStyle = `hsla(${hue}, 70%, 50%, ${alpha})`;
                ctx.shadowColor = `hsl(${hue}, 70%, 50%)`;
                ctx.shadowBlur = index === 0 ? 15 : 5;

                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
            });
            ctx.shadowBlur = 0;
        }

        function gameLoopFn(currentTime) {
            gameLoop = requestAnimationFrame(gameLoopFn);

            const timeSinceLastRender = currentTime - lastRenderTime;
            if (timeSinceLastRender < gameSpeed) return;

            lastRenderTime = currentTime;

            update();
            draw();
        }

        function startGame() {
            if (gameRunning) return;

            init();
            gameRunning = true;
            gamePaused = false;
            lastRenderTime = 0;
            document.getElementById('gameOver').style.display = 'none';
            gameLoop = requestAnimationFrame(gameLoopFn);
        }

        function togglePause() {
            if (!gameRunning) return;
            gamePaused = !gamePaused;
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(gameLoop);

            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalHighScore').textContent = highScore;
            document.getElementById('gameOver').style.display = 'block';
        }

        function restartGame() {
            startGame();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) {
                if (e.key === ' ' || e.key === 'Enter') {
                    startGame();
                }
                return;
            }

            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y !== 1) {
                        nextDirection = { x: 0, y: -1 };
                    }
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y !== -1) {
                        nextDirection = { x: 0, y: 1 };
                    }
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x !== 1) {
                        nextDirection = { x: -1, y: 0 };
                    }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x !== -1) {
                        nextDirection = { x: 1, y: 0 };
                    }
                    break;
                case ' ':
                    togglePause();
                    break;
            }
        });

        // Touch controls
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            if (!gameRunning) {
                startGame();
                return;
            }

            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                // Horizontal
                if (diffX > 0 && direction.x !== -1) {
                    nextDirection = { x: 1, y: 0 };
                } else if (diffX < 0 && direction.x !== 1) {
                    nextDirection = { x: -1, y: 0 };
                }
            } else {
                // Vertical
                if (diffY > 0 && direction.y !== -1) {
                    nextDirection = { x: 0, y: 1 };
                } else if (diffY < 0 && direction.y !== 1) {
                    nextDirection = { x: 0, y: -1 };
                }
            }
        });

        window.addEventListener('resize', resize);
        resize();
        init();
        draw();
    </script>
</body>
</html>
