<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game - スネークゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2em;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .description {
            color: #aaa;
            margin-bottom: 20px;
            text-align: center;
            max-width: 600px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }

        .stats {
            display: flex;
            gap: 30px;
            font-size: 1.2em;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 30px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .stat span {
            font-size: 0.8em;
            color: #888;
        }

        .stat strong {
            font-size: 1.5em;
            color: #4facfe;
        }

        .canvas-container {
            background: #0a0a0f;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        canvas {
            border-radius: 8px;
            display: block;
            touch-action: none;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            display: none;
            z-index: 10;
        }

        .game-over.show {
            display: block;
        }

        .game-over h2 {
            font-size: 2em;
            margin-bottom: 10px;
            color: #f5576c;
        }

        .game-over p {
            font-size: 1.2em;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-fullscreen {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .btn-fullscreen:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 172, 254, 0.4);
        }

        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .mobile-controls button {
            width: 60px;
            height: 60px;
            font-size: 1.5em;
            padding: 0;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .mobile-controls button:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0.95);
        }

        .mobile-controls .empty {
            visibility: hidden;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5em;
            }

            .stats {
                padding: 10px 20px;
                gap: 20px;
            }

            .stat strong {
                font-size: 1.2em;
            }

            .canvas-container {
                padding: 15px;
            }

            .mobile-controls {
                display: grid;
            }

            .controls {
                order: 2;
            }
        }
    </style>
</head>
<body>
    <h1>🐍 Snake Game - スネークゲーム</h1>
    <p class="description">
        クラシックなスネークゲーム。矢印キーまたはタップで操作。<br>
        食べ物を食べて成長しよう。壁や自分にぶつかるとゲームオーバー。
    </p>

    <div class="container">
        <div class="stats">
            <div class="stat">
                <span>スコア</span>
                <strong id="score">0</strong>
            </div>
            <div class="stat">
                <span>ハイスコア</span>
                <strong id="highScore">0</strong>
            </div>
            <div class="stat">
                <span>長さ</span>
                <strong id="length">3</strong>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="gameCanvas"></canvas>
            <div class="game-over" id="gameOver">
                <h2>💀 Game Over!</h2>
                <p>スコア: <span id="finalScore">0</span></p>
                <button class="btn-primary" onclick="restartGame()">🔄 もう一度</button>
            </div>
        </div>

        <div class="controls">
            <button class="btn-primary" onclick="restartGame()">🔄 リスタート</button>
            <button class="btn-fullscreen" onclick="toggleFullscreen()">📺 全画面</button>
        </div>

        <div class="mobile-controls">
            <div class="empty"></div>
            <button onclick="setDirection('up')">⬆️</button>
            <div class="empty"></div>
            <button onclick="setDirection('left')">⬅️</button>
            <button onclick="setDirection('down')">⬇️</button>
            <button onclick="setDirection('right')">➡️</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game settings
        const gridSize = 20;
        const canvasSize = 400;
        canvas.width = canvasSize;
        canvas.height = canvasSize;
        canvas.style.width = '100%';
        canvas.style.height = 'auto';
        canvas.style.maxWidth = canvasSize + 'px';

        // Game state
        let snake = [];
        let direction = 'right';
        let nextDirection = 'right';
        let food = null;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
        let gameLoop = null;
        let gameSpeed = 150;

        // Initialize
        function init() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            gameSpeed = 150;
            spawnFood();
            updateStats();
        }

        // Spawn food
        function spawnFood() {
            let validPosition = false;
            while (!validPosition) {
                food = {
                    x: Math.floor(Math.random() * (canvasSize / gridSize)),
                    y: Math.floor(Math.random() * (canvasSize / gridSize))
                };
                validPosition = !snake.some(segment => segment.x === food.x && segment.y === food.y);
            }
        }

        // Update stats
        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('highScore').textContent = highScore;
            document.getElementById('length').textContent = snake.length;
        }

        // Draw
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, canvasSize, canvasSize);

            // Draw grid
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= canvasSize; i += gridSize) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvasSize);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvasSize, i);
                ctx.stroke();
            }

            // Draw snake
            snake.forEach((segment, index) => {
                const gradient = ctx.createLinearGradient(
                    segment.x * gridSize,
                    segment.y * gridSize,
                    (segment.x + 1) * gridSize,
                    (segment.y + 1) * gridSize
                );

                if (index === 0) {
                    gradient.addColorStop(0, '#4facfe');
                    gradient.addColorStop(1, '#00f2fe');
                } else {
                    const alpha = 1 - (index / snake.length) * 0.5;
                    gradient.addColorStop(0, `rgba(102, 126, 234, ${alpha})`);
                    gradient.addColorStop(1, `rgba(118, 75, 162, ${alpha})`);
                }

                ctx.fillStyle = gradient;
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );

                // Add shine effect to head
                if (index === 0) {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.fillRect(
                        segment.x * gridSize + 3,
                        segment.y * gridSize + 3,
                        gridSize / 3,
                        gridSize / 3
                    );
                }
            });

            // Draw food
            const foodGradient = ctx.createRadialGradient(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                0,
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2
            );
            foodGradient.addColorStop(0, '#f5576c');
            foodGradient.addColorStop(1, '#f093fb');

            ctx.fillStyle = foodGradient;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();

            // Add glow effect
            ctx.shadowColor = '#f5576c';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // Update
        function update() {
            direction = nextDirection;

            const head = { ...snake[0] };

            switch (direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }

            // Check collision with walls
            if (head.x < 0 || head.x >= canvasSize / gridSize ||
                head.y < 0 || head.y >= canvasSize / gridSize) {
                gameOver();
                return;
            }

            // Check collision with self
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // Check if ate food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('snakeHighScore', highScore);
                }
                spawnFood();
                updateStats();

                // Speed up slightly
                if (gameSpeed > 80) {
                    gameSpeed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, gameSpeed);
                }
            } else {
                snake.pop();
            }

            draw();
        }

        // Game step
        function gameStep() {
            update();
        }

        // Game over
        function gameOver() {
            clearInterval(gameLoop);
            gameLoop = null;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.add('show');
        }

        // Restart
        function restartGame() {
            document.getElementById('gameOver').classList.remove('show');
            if (gameLoop) {
                clearInterval(gameLoop);
            }
            init();
            gameLoop = setInterval(gameStep, gameSpeed);
            draw();
        }

        // Set direction (for mobile controls)
        function setDirection(dir) {
            const opposites = {
                'up': 'down',
                'down': 'up',
                'left': 'right',
                'right': 'left'
            };

            if (dir !== opposites[direction]) {
                nextDirection = dir;
            }
        }

        // Toggle fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            const keyMap = {
                'ArrowUp': 'up',
                'ArrowDown': 'down',
                'ArrowLeft': 'left',
                'ArrowRight': 'right',
                'w': 'up',
                's': 'down',
                'a': 'left',
                'd': 'right'
            };

            if (keyMap[e.key]) {
                e.preventDefault();
                setDirection(keyMap[e.key]);
            }

            // Space to restart
            if (e.key === ' ' && !gameLoop) {
                restartGame();
            }
        });

        // Touch controls (swipe)
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            if (!gameLoop) return;

            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            if (Math.abs(dx) > Math.abs(dy)) {
                setDirection(dx > 0 ? 'right' : 'left');
            } else {
                setDirection(dy > 0 ? 'down' : 'up');
            }
        });

        // Start game
        init();
        draw();
        gameLoop = setInterval(gameStep, gameSpeed);
    </script>
</body>
</html>
