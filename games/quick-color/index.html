<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Color - 脳トレ色当てゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient 3s ease infinite;
        }

        @keyframes gradient {
            0%, 100% { filter: hue-rotate(0deg); }
            50% { filter: hue-rotate(180deg); }
        }

        .subtitle {
            font-size: 1rem;
            color: #888;
            margin-bottom: 30px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #48dbfb;
        }

        .game-area {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 20px;
        }

        #question {
            font-size: 5rem;
            font-weight: bold;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            cursor: default;
            user-select: none;
            -webkit-user-select: none;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 400px;
            margin: 0 auto;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 25px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .option-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .option-btn:active {
            transform: scale(0.95);
        }

        .option-btn.correct {
            background: rgba(0, 255, 100, 0.3);
            border-color: #00ff64;
            animation: correct 0.5s ease;
        }

        .option-btn.wrong {
            background: rgba(255, 0, 100, 0.3);
            border-color: #ff0064;
            animation: wrong 0.5s ease;
        }

        @keyframes correct {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes wrong {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .feedback {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 20px;
            min-height: 40px;
            transition: all 0.3s ease;
        }

        .feedback.correct {
            color: #00ff64;
        }

        .feedback.wrong {
            color: #ff0064;
        }

        .start-screen, .end-screen {
            padding: 40px;
        }

        .start-screen h2, .end-screen h2 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .start-screen p, .end-screen p {
            color: #888;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .start-btn, .restart-btn {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            border: none;
            color: #000;
            padding: 20px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.3);
        }

        .start-btn:hover, .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(255, 107, 107, 0.5);
        }

        .instructions {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }

        .instructions h3 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #48dbfb;
        }

        .instructions ul {
            list-style: none;
            padding: 0;
        }

        .instructions li {
            padding: 8px 0;
            color: #aaa;
            font-size: 0.9rem;
        }

        .instructions li::before {
            content: "💡 ";
        }

        .high-score {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(255, 165, 0, 0.1));
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .high-score h3 {
            font-size: 1.2rem;
            color: #ffd700;
            margin-bottom: 10px;
        }

        .high-score p {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffd700;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            #question {
                font-size: 4rem;
            }

            .option-btn {
                padding: 20px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()" title="全画面">⛶</button>

    <div class="container">
        <h1>🎯 Quick Color</h1>
        <p class="subtitle">脳トレ色当てゲーム</p>

        <div id="startScreen" class="start-screen">
            <div class="instructions">
                <h3>📖 ルール</h3>
                <ul>
                    <li>表示される<span style="color: #ff6b6b;">色の名前</span>を読んでください</li>
                    <li>文字の<span style="color: #48dbfb;">実際の色</span>に惑わされないで！</li>
                    <li>制限時間は<span style="color: #feca57;">30秒</span>です</li>
                    <li>正解で<span style="color: #00ff64;">+10点</span>、不正解で<span style="color: #ff0064;">-5点</span></li>
                </ul>
            </div>
            <button class="start-btn" onclick="startGame()">🎮 スタート</button>
        </div>

        <div id="gameScreen" style="display: none;">
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">スコア</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">残り時間</div>
                    <div class="stat-value" id="timer">30</div>
                </div>
            </div>

            <div class="game-area">
                <div id="question"></div>
                <div class="options" id="options"></div>
                <div class="feedback" id="feedback"></div>
            </div>
        </div>

        <div id="endScreen" class="end-screen" style="display: none;">
            <div class="high-score">
                <h3>🏆 ハイスコア</h3>
                <p id="highScore">0</p>
            </div>
            <h2>🎉 ゲーム終了！</h2>
            <p>あなたのスコア: <span id="finalScore" style="font-size: 2rem; color: #48dbfb; font-weight: bold;">0</span></p>
            <p id="resultMessage"></p>
            <button class="restart-btn" onclick="startGame()">🔄 もう一度プレイ</button>
        </div>
    </div>

    <script>
        const colors = [
            { name: 'RED', color: '#ff6b6b' },
            { name: 'BLUE', color: '#48dbfb' },
            { name: 'GREEN', color: '#00ff64' },
            { name: 'YELLOW', color: '#feca57' },
            { name: 'PURPLE', color: '#a55eea' },
            { name: 'ORANGE', color: '#ff9f43' },
            { name: 'PINK', color: '#ff9ff3' },
            { name: 'CYAN', color: '#00d2d3' }
        ];

        let score = 0;
        let timeLeft = 30;
        let timerInterval;
        let currentAnswer = '';
        let highScore = localStorage.getItem('quickColorHighScore') || 0;
        let canAnswer = false;

        function shuffle(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function generateQuestion() {
            // ランダムに問題を生成
            const answerColor = colors[Math.floor(Math.random() * colors.length)];
            
            // トリック: 文字の色と名前が一致しないように
            let displayColor;
            do {
                displayColor = colors[Math.floor(Math.random() * colors.length)];
            } while (displayColor.name === answerColor.name);

            currentAnswer = answerColor.name;
            
            const questionEl = document.getElementById('question');
            questionEl.textContent = answerColor.name;
            questionEl.style.color = displayColor.color;

            // 選択肢を生成（正解含む4つ）
            const wrongAnswers = shuffle(colors)
                .filter(c => c.name !== answerColor.name)
                .slice(0, 3);
            
            const options = shuffle([answerColor, ...wrongAnswers]);
            
            const optionsEl = document.getElementById('options');
            optionsEl.innerHTML = '';
            
            options.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option.name;
                btn.style.borderColor = option.color;
                btn.onclick = () => checkAnswer(option.name, btn);
                optionsEl.appendChild(btn);
            });

            document.getElementById('feedback').textContent = '';
            canAnswer = true;
        }

        function checkAnswer(selected, button) {
            if (!canAnswer) return;
            canAnswer = false;

            const feedbackEl = document.getElementById('feedback');
            
            if (selected === currentAnswer) {
                score += 10;
                button.classList.add('correct');
                feedbackEl.textContent = '⭕ 正解！ +10点';
                feedbackEl.className = 'feedback correct';
            } else {
                score = Math.max(0, score - 5);
                button.classList.add('wrong');
                feedbackEl.textContent = `❌ 不正解... 正解は「${currentAnswer}」`;
                feedbackEl.className = 'feedback wrong';
                
                // 正解ボタンをハイライト
                document.querySelectorAll('.option-btn').forEach(btn => {
                    if (btn.textContent === currentAnswer) {
                        btn.classList.add('correct');
                    }
                });
            }

            document.getElementById('score').textContent = score;

            // 次の問題へ
            setTimeout(() => {
                generateQuestion();
            }, 800);
        }

        function updateTimer() {
            timeLeft--;
            document.getElementById('timer').textContent = timeLeft;
            
            if (timeLeft <= 0) {
                endGame();
            }
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            
            document.getElementById('score').textContent = score;
            document.getElementById('timer').textContent = timeLeft;
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('endScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';

            generateQuestion();
            
            timerInterval = setInterval(updateTimer, 1000);
        }

        function endGame() {
            clearInterval(timerInterval);
            canAnswer = false;

            // ハイスコア更新
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('quickColorHighScore', highScore);
            }

            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('endScreen').style.display = 'block';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('highScore').textContent = highScore;

            // 結果メッセージ
            let message = '';
            if (score >= 100) {
                message = '🌟 すごい！脳トレマスター！';
            } else if (score >= 50) {
                message = '👍 いい調子！';
            } else {
                message = '💪 練習あるのみ！';
            }
            document.getElementById('resultMessage').textContent = message;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期表示でハイスコアをセット
        document.getElementById('highScore').textContent = highScore;
    </script>
</body>
</html>
