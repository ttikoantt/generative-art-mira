<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sequence Memory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            touch-action: manipulation;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: white;
            font-size: clamp(24px, 5vw, 36px);
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .info {
            color: rgba(255, 255, 255, 0.9);
            font-size: clamp(14px, 3vw, 18px);
            margin-bottom: 30px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            color: white;
            font-size: clamp(16px, 4vw, 20px);
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.8;
            display: block;
            margin-bottom: 5px;
            font-weight: normal;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            border: 3px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .cell:active {
            transform: scale(0.95);
        }

        .cell.active {
            background: #ffd93d;
            border-color: #ff6b6b;
            box-shadow: 0 0 30px #ffd93d, 0 0 60px #ffd93d;
            transform: scale(1.1);
        }

        .cell.correct {
            background: #6bcb77;
            border-color: #4ecdc4;
            box-shadow: 0 0 20px #6bcb77;
        }

        .cell.wrong {
            background: #ff6b6b;
            border-color: #c44569;
            box-shadow: 0 0 20px #ff6b6b;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .message {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            font-size: clamp(16px, 4vw, 20px);
            color: #333;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: clamp(16px, 4vw, 20px);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .progress {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .progress-dot {
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }

        .progress-dot.active {
            background: #ffd93d;
            box-shadow: 0 0 10px #ffd93d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Sequence Memory</h1>
        <p class="info">点滅するパターンを覚えて、同じ順番でタップ！</p>

        <div class="stats">
            <div class="stat">
                <span class="stat-label">Level</span>
                <span id="level">1</span>
            </div>
            <div class="stat">
                <span class="stat-label">High Score</span>
                <span id="highScore">0</span>
            </div>
        </div>

        <div class="message" id="message">
            スタートボタンを押してね！
        </div>

        <div class="progress" id="progress"></div>

        <div class="grid">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button class="btn" id="startBtn" onclick="startGame()">スタート</button>
    </div>

    <script>
        const cells = document.querySelectorAll('.cell');
        const messageEl = document.getElementById('message');
        const levelEl = document.getElementById('level');
        const highScoreEl = document.getElementById('highScore');
        const progressEl = document.getElementById('progress');
        const startBtn = document.getElementById('startBtn');

        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let highScore = parseInt(localStorage.getItem('sequenceMemoryHighScore')) || 0;
        let isPlaying = false;
        let isShowingSequence = false;

        highScoreEl.textContent = highScore;

        function showMessage(text) {
            messageEl.textContent = text;
        }

        function updateProgress() {
            progressEl.innerHTML = '';
            for (let i = 0; i < sequence.length; i++) {
                const dot = document.createElement('div');
                dot.className = 'progress-dot';
                if (i < playerSequence.length) {
                    dot.classList.add('active');
                }
                progressEl.appendChild(dot);
            }
        }

        function activateCell(index, duration = 500) {
            return new Promise(resolve => {
                const cell = cells[index];
                cell.classList.add('active');
                setTimeout(() => {
                    cell.classList.remove('active');
                    setTimeout(resolve, 100);
                }, duration);
            });
        }

        async function showSequence() {
            isShowingSequence = true;
            showMessage('パターンを見てね！');
            startBtn.disabled = true;

            await new Promise(r => setTimeout(r, 1000));

            for (let i = 0; i < sequence.length; i++) {
                await activateCell(sequence[i], 600);
                await new Promise(r => setTimeout(r, 200));
            }

            showMessage('同じ順番でタップ！');
            isShowingSequence = false;
            startBtn.disabled = false;
        }

        function addToSequence() {
            const randomIndex = Math.floor(Math.random() * 9);
            sequence.push(randomIndex);
        }

        async function handleCellClick(index) {
            if (!isPlaying || isShowingSequence) return;

            playerSequence.push(index);
            updateProgress();
            await activateCell(index, 300);

            const currentIndex = playerSequence.length - 1;

            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                // Wrong!
                cells[index].classList.add('wrong');
                showMessage(`間違い！レベル${level}でゲームオーバー`);
                isPlaying = false;
                startBtn.textContent = 'もう一度';

                if (level > highScore) {
                    highScore = level;
                    localStorage.setItem('sequenceMemoryHighScore', highScore);
                    highScoreEl.textContent = highScore;
                    setTimeout(() => {
                        showMessage(`🎉 新記録！レベル${highScore}！`);
                    }, 1500);
                }

                setTimeout(() => {
                    cells.forEach(cell => cell.classList.remove('wrong'));
                }, 500);
                return;
            }

            // Correct so far
            cells[index].classList.add('correct');
            setTimeout(() => {
                cells[index].classList.remove('correct');
            }, 300);

            // Check if sequence complete
            if (playerSequence.length === sequence.length) {
                // Success!
                showMessage('正解！次のレベルへ！');
                level++;
                levelEl.textContent = level;
                playerSequence = [];
                await new Promise(r => setTimeout(r, 1500));
                addToSequence();
                updateProgress();
                await showSequence();
            }
        }

        function startGame() {
            sequence = [];
            playerSequence = [];
            level = 1;
            levelEl.textContent = level;
            isPlaying = true;
            startBtn.textContent = 'リセット';

            updateProgress();
            addToSequence();
            showSequence();
        }

        cells.forEach((cell, index) => {
            cell.addEventListener('click', () => handleCellClick(index));
            cell.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleCellClick(index);
            });
        });
    </script>
</body>
</html>
