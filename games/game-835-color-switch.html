<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Color Switch - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: #fff;
            touch-action: none;
        }

        h1 {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4, #45b7d1);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 3s ease infinite;
            z-index: 10;
        }

        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        #gameCanvas {
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .score-display {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            font-weight: 700;
            z-index: 10;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .high-score {
            position: absolute;
            top: 130px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            opacity: 0.7;
            z-index: 10;
            letter-spacing: 1px;
        }

        #fullscreenBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 20px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            text-transform: uppercase;
            z-index: 10;
        }

        #fullscreenBtn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
            display: none;
            border: 2px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
        }

        .game-over h2 {
            font-size: 36px;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .game-over p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .game-over button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: #fff;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .game-over button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 30px rgba(102, 126, 234, 0.5);
        }

        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            opacity: 0.6;
            z-index: 10;
            text-align: center;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 20px;
                top: 15px;
            }

            .score-display {
                font-size: 36px;
                top: 55px;
            }

            .high-score {
                font-size: 11px;
                top: 100px;
            }

            #fullscreenBtn {
                padding: 8px 15px;
                font-size: 10px;
            }

            .instructions {
                font-size: 10px;
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
    <h1>Color Switch</h1>

    <button id="fullscreenBtn">全画面</button>

    <div class="score-display" id="score">0</div>
    <div class="high-score">BEST: <span id="highScore">0</span></div>

    <canvas id="gameCanvas"></canvas>

    <div class="game-over" id="gameOver">
        <h2>Game Over</h2>
        <p>Score: <span id="finalScore">0</span></p>
        <button id="restartBtn">Play Again</button>
    </div>

    <div class="instructions">
        🎮 PC: ← →で移動、SPACEで色切り替え<br>
        📱 Mobile: 左右スワイプで移動、タップで色切り替え
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const highScoreDisplay = document.getElementById('highScore');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreDisplay = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        // Colors
        const COLORS = [
            { name: 'Red', value: '#ff6b6b' },
            { name: 'Blue', value: '#4ecdc4' },
            { name: 'Yellow', value: '#ffeaa7' }
        ];

        // Game state
        let score = 0;
        let highScore = parseInt(localStorage.getItem('colorSwitchHighScore')) || 0;
        let gameRunning = false;
        let animationId;

        highScoreDisplay.textContent = highScore;

        // Canvas size
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 500);
            const maxHeight = Math.min(window.innerHeight - 200, 700);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Paddle
        const paddle = {
            width: 80,
            height: 15,
            x: 0,
            y: 0,
            colorIndex: 0,
            speed: 8,
            targetX: 0
        };

        // Balls
        let balls = [];
        let ballSpawnTimer = 0;
        let spawnInterval = 120;
        let ballSpeed = 2;
        let difficultyTimer = 0;

        // Particles
        let particles = [];

        // Initialize paddle position
        function initPaddle() {
            paddle.x = canvas.width / 2 - paddle.width / 2;
            paddle.y = canvas.height - 50;
            paddle.targetX = paddle.x;
            paddle.colorIndex = Math.floor(Math.random() * COLORS.length);
        }

        // Create ball
        function createBall() {
            const colorIndex = Math.floor(Math.random() * COLORS.length);
            balls.push({
                x: Math.random() * (canvas.width - 30) + 15,
                y: -20,
                radius: 12,
                colorIndex: colorIndex,
                speed: ballSpeed + Math.random() * 1
            });
        }

        // Create particles
        function createParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    radius: Math.random() * 4 + 2,
                    color: color,
                    life: 1
                });
            }
        }

        // Update particles
        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                p.radius *= 0.98;
                return p.life > 0;
            });
        }

        // Draw particles
        function drawParticles() {
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.fill();
                ctx.globalAlpha = 1;
            });
        }

        // Draw paddle
        function drawPaddle() {
            ctx.beginPath();
            ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 8);
            ctx.fillStyle = COLORS[paddle.colorIndex].value;
            ctx.shadowBlur = 20;
            ctx.shadowColor = COLORS[paddle.colorIndex].value;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // Draw ball
        function drawBalls() {
            balls.forEach(ball => {
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
                ctx.fillStyle = COLORS[ball.colorIndex].value;
                ctx.shadowBlur = 15;
                ctx.shadowColor = COLORS[ball.colorIndex].value;
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        }

        // Update game
        function update() {
            if (!gameRunning) return;

            // Smooth paddle movement
            paddle.x += (paddle.targetX - paddle.x) * 0.15;

            // Keep paddle in bounds
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;

            // Spawn balls
            ballSpawnTimer++;
            if (ballSpawnTimer >= spawnInterval) {
                createBall();
                ballSpawnTimer = 0;
            }

            // Increase difficulty
            difficultyTimer++;
            if (difficultyTimer >= 600) { // Every ~10 seconds
                ballSpeed += 0.3;
                spawnInterval = Math.max(40, spawnInterval - 5);
                difficultyTimer = 0;
            }

            // Update balls
            balls = balls.filter(ball => {
                ball.y += ball.speed;

                // Check collision with paddle
                if (ball.y + ball.radius >= paddle.y &&
                    ball.y - ball.radius <= paddle.y + paddle.height &&
                    ball.x >= paddle.x &&
                    ball.x <= paddle.x + paddle.width) {

                    if (ball.colorIndex === paddle.colorIndex) {
                        // Correct color - score!
                        score += 10;
                        scoreDisplay.textContent = score;
                        createParticles(ball.x, ball.y, COLORS[ball.colorIndex].value);
                        return false; // Remove ball
                    } else {
                        // Wrong color - game over
                        gameOver();
                        return false;
                    }
                }

                // Ball went off screen
                if (ball.y > canvas.height + 20) {
                    return false; // Remove ball
                }

                return true;
            });

            updateParticles();
        }

        // Draw game
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Background
            ctx.fillStyle = 'rgba(26, 26, 46, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawPaddle();
            drawBalls();
            drawParticles();
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        // Start game
        function startGame() {
            score = 0;
            balls = [];
            particles = [];
            ballSpawnTimer = 0;
            spawnInterval = 120;
            ballSpeed = 2;
            difficultyTimer = 0;
            gameRunning = true;
            scoreDisplay.textContent = '0';
            gameOverScreen.style.display = 'none';

            initPaddle();
            gameLoop();
        }

        // Game over
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('colorSwitchHighScore', highScore);
                highScoreDisplay.textContent = highScore;
            }

            finalScoreDisplay.textContent = score;
            gameOverScreen.style.display = 'block';
        }

        // Controls
        const keys = {};

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;

            if (e.key === ' ' && gameRunning) {
                e.preventDefault();
                paddle.colorIndex = (paddle.colorIndex + 1) % COLORS.length;
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        function handleKeyDown() {
            if (keys['ArrowLeft'] || keys['a']) {
                paddle.targetX -= paddle.speed;
            }
            if (keys['ArrowRight'] || keys['d']) {
                paddle.targetX += paddle.speed;
            }
        }

        setInterval(handleKeyDown, 16);

        // Touch controls
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const deltaX = touch.clientX - touchStartX;
            paddle.targetX += deltaX * 0.5;
            touchStartX = touch.clientX;
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            const touch = e.changedTouches[0];
            const deltaY = Math.abs(touch.clientY - touchStartY);

            // If minimal movement, treat as tap
            if (deltaY < 10 && gameRunning) {
                paddle.colorIndex = (paddle.colorIndex + 1) % COLORS.length;
            }
        });

        // Mouse controls
        canvas.addEventListener('click', (e) => {
            if (gameRunning) {
                paddle.colorIndex = (paddle.colorIndex + 1) % COLORS.length;
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (gameRunning) {
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                paddle.targetX = mouseX - paddle.width / 2;
            }
        });

        // Restart button
        restartBtn.addEventListener('click', startGame);

        // Fullscreen
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Initial state
        initPaddle();

        // Draw initial state
        ctx.fillStyle = 'rgba(26, 26, 46, 0.3)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawPaddle();

        // Start game on click
        canvas.addEventListener('click', () => {
            if (!gameRunning && gameOverScreen.style.display === 'none') {
                startGame();
            }
        });

        // Handle visibility
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && gameRunning) {
                // Pause game
            } else if (!document.hidden && !gameRunning && gameOverScreen.style.display === 'none') {
                // Resume could be added here
            }
        });
    </script>
</body>
</html>
