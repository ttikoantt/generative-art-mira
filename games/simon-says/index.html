<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says | 記憶ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
        }
        
        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 2rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }
        
        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 15px;
            color: #fff;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        
        .stat-label {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
        }
        
        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .button {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            transition: all 0.1s;
            position: relative;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }
        
        .button:active {
            transform: scale(0.95);
        }
        
        .button.red {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
        }
        
        .button.blue {
            background: linear-gradient(135deg, #4dabf7, #339af0);
        }
        
        .button.green {
            background: linear-gradient(135deg, #51cf66, #40c057);
        }
        
        .button.yellow {
            background: linear-gradient(135deg, #ffd93d, #fab005);
        }
        
        .button.active {
            transform: scale(1.05);
            filter: brightness(1.3);
            box-shadow: 0 0 30px currentColor;
        }
        
        .button.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .message {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 20px;
            min-height: 30px;
            text-align: center;
        }
        
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
        }
        
        @media (max-width: 600px) {
            .button {
                width: 100px;
                height: 100px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .stat-value {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    
    <h1>🎮 Simon Says</h1>
    
    <div class="stats">
        <div class="stat">
            <div class="stat-label">レベル</div>
            <div class="stat-value" id="level">1</div>
        </div>
        <div class="stat">
            <div class="stat-label">スコア</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">ハイスコア</div>
            <div class="stat-value" id="highscore">0</div>
        </div>
    </div>
    
    <div class="message" id="message">スタートボタンを押してね！</div>
    
    <div class="game-board">
        <button class="button red" data-color="red" data-sound="329.63"></button>
        <button class="button blue" data-color="blue" data-sound="440.00"></button>
        <button class="button green" data-color="green" data-sound="523.25"></button>
        <button class="button yellow" data-color="yellow" data-sound="659.25"></button>
    </div>
    
    <div class="controls">
        <button class="btn btn-primary" id="startBtn" onclick="startGame()">スタート</button>
        <button class="btn btn-secondary" onclick="resetGame()">リセット</button>
    </div>
    
    <script>
        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let score = 0;
        let highscore = localStorage.getItem('simonHighscore') || 0;
        let isPlaying = false;
        let isShowingSequence = false;
        
        const colors = ['red', 'blue', 'green', 'yellow'];
        const buttons = {};
        
        // ボタンを取得
        colors.forEach(color => {
            buttons[color] = document.querySelector(`.button.${color}`);
        });
        
        // Audio Context
        let audioCtx = null;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function playSound(frequency, duration = 0.3) {
            if (!audioCtx) return;
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.frequency.value = frequency;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + duration);
        }
        
        function flashButton(color) {
            const button = buttons[color];
            button.classList.add('active');
            
            const frequency = parseFloat(button.dataset.sound);
            playSound(frequency);
            
            setTimeout(() => {
                button.classList.remove('active');
            }, 300);
        }
        
        async function showSequence() {
            isShowingSequence = true;
            setMessage('覚えてね...');
            setButtonsDisabled(true);
            
            await sleep(500);
            
            for (let i = 0; i < sequence.length; i++) {
                await sleep(300);
                flashButton(sequence[i]);
                await sleep(400);
            }
            
            isShowingSequence = false;
            setButtonsDisabled(false);
            setMessage('あなたの番！');
        }
        
        function addToSequence() {
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            sequence.push(randomColor);
        }
        
        function handleButtonClick(color) {
            if (!isPlaying || isShowingSequence) return;
            
            initAudio();
            flashButton(color);
            playerSequence.push(color);
            
            // 正誤判定
            const index = playerSequence.length - 1;
            if (playerSequence[index] !== sequence[index]) {
                gameOver();
                return;
            }
            
            // シークエンス完了
            if (playerSequence.length === sequence.length) {
                score += level * 10;
                updateStats();
                playerSequence = [];
                level++;
                updateStats();
                
                setMessage('正解！ 🎉');
                setButtonsDisabled(true);
                
                setTimeout(() => {
                    addToSequence();
                    showSequence();
                }, 1000);
            }
        }
        
        function startGame() {
            initAudio();
            sequence = [];
            playerSequence = [];
            level = 1;
            score = 0;
            isPlaying = true;
            
            updateStats();
            document.getElementById('startBtn').textContent = 'プレイ中...';
            document.getElementById('startBtn').disabled = true;
            
            addToSequence();
            showSequence();
        }
        
        function gameOver() {
            isPlaying = false;
            
            if (score > highscore) {
                highscore = score;
                localStorage.setItem('simonHighscore', highscore);
                setMessage(`🎉 新記録！ スコア: ${score}`);
            } else {
                setMessage(`ゲームオーバー！ スコア: ${score}`);
            }
            
            updateStats();
            setButtonsDisabled(true);
            
            document.getElementById('startBtn').textContent = 'もう一度';
            document.getElementById('startBtn').disabled = false;
        }
        
        function resetGame() {
            sequence = [];
            playerSequence = [];
            level = 1;
            score = 0;
            isPlaying = false;
            
            updateStats();
            setMessage('スタートボタンを押してね！');
            setButtonsDisabled(false);
            
            document.getElementById('startBtn').textContent = 'スタート';
            document.getElementById('startBtn').disabled = false;
        }
        
        function updateStats() {
            document.getElementById('level').textContent = level;
            document.getElementById('score').textContent = score;
            document.getElementById('highscore').textContent = highscore;
        }
        
        function setMessage(msg) {
            document.getElementById('message').textContent = msg;
        }
        
        function setButtonsDisabled(disabled) {
            colors.forEach(color => {
                if (disabled) {
                    buttons[color].classList.add('disabled');
                } else {
                    buttons[color].classList.remove('disabled');
                }
            });
        }
        
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        // イベントリスナー
        colors.forEach(color => {
            buttons[color].addEventListener('click', () => handleButtonClick(color));
        });
        
        // 初期化
        updateStats();
    </script>
</body>
</html>
