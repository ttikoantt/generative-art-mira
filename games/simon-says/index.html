<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Simon Says Memory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 10px;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            color: #fff;
        }
        .stat {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            min-width: 100px;
        }
        .stat-label {
            font-size: 12px;
            opacity: 0.7;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
        }
        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .tile {
            aspect-ratio: 1;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            border: 4px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }
        .tile::before {
            content: '';
            position: absolute;
            inset: 0;
            background: inherit;
            filter: brightness(1.3);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .tile:hover {
            transform: scale(1.05);
        }
        .tile.active::before {
            opacity: 1;
        }
        .tile.disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        .red { background: #ff4757; box-shadow: 0 8px 20px rgba(255, 71, 87, 0.4); }
        .blue { background: #2ed573; box-shadow: 0 8px 20px rgba(46, 213, 115, 0.4); }
        .yellow { background: #ffa502; box-shadow: 0 8px 20px rgba(255, 165, 2, 0.4); }
        .green { background: #1e90ff; box-shadow: 0 8px 20px rgba(30, 144, 255, 0.4); }

        .message {
            text-align: center;
            color: #fff;
            font-size: 18px;
            margin-bottom: 20px;
            min-height: 30px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .btn {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 15px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            z-index: 10;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        @media (max-width: 480px) {
            h1 { font-size: 20px; }
            .game-board { gap: 10px; }
            .stat { min-width: 80px; padding: 8px 15px; }
            .stat-value { font-size: 20px; }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🎮 Simon Says Memory</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">レベル</div>
                <div class="stat-value" id="level">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">ハイスコア</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>

        <div class="game-board">
            <div class="tile red" data-tile="0"></div>
            <div class="tile blue" data-tile="1"></div>
            <div class="tile yellow" data-tile="2"></div>
            <div class="tile green" data-tile="3"></div>
        </div>

        <div class="message" id="message">スタートボタンを押してね</div>

        <div class="button-group">
            <button class="btn btn-primary" id="startBtn" onclick="startGame()">スタート</button>
        </div>
    </div>

    <script>
        let sequence = [];
        let playerSequence = [];
        let level = 0;
        let highScore = localStorage.getItem('simonHighScore') || 0;
        let isPlaying = false;
        let isShowingSequence = false;

        const tiles = document.querySelectorAll('.tile');
        const levelDisplay = document.getElementById('level');
        const highScoreDisplay = document.getElementById('highScore');
        const messageDisplay = document.getElementById('message');
        const startBtn = document.getElementById('startBtn');

        highScoreDisplay.textContent = highScore;

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function playSound(frequency, duration) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = frequency;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        function activateTile(index, duration = 300) {
            return new Promise(resolve => {
                const tile = tiles[index];
                tile.classList.add('active');

                const frequencies = [262, 330, 392, 523];
                playSound(frequencies[index], duration / 1000);

                setTimeout(() => {
                    tile.classList.remove('active');
                    setTimeout(resolve, 100);
                }, duration);
            });
        }

        async function showSequence() {
            isShowingSequence = true;
            messageDisplay.textContent = '見てね...';
            setTilesDisabled(true);

            await new Promise(r => setTimeout(r, 500));

            for (let index of sequence) {
                await activateTile(index);
            }

            await new Promise(r => setTimeout(r, 300));

            isShowingSequence = false;
            messageDisplay.textContent = 'あなたの番！';
            setTilesDisabled(false);
        }

        function addToSequence() {
            const randomTile = Math.floor(Math.random() * 4);
            sequence.push(randomTile);
        }

        function setTilesDisabled(disabled) {
            tiles.forEach(tile => {
                if (disabled) {
                    tile.classList.add('disabled');
                } else {
                    tile.classList.remove('disabled');
                }
            });
        }

        function handleTileClick(index) {
            if (isShowingSequence || !isPlaying) return;

            activateTile(index, 200);
            playerSequence.push(index);

            const currentIndex = playerSequence.length - 1;

            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                gameOver();
                return;
            }

            if (playerSequence.length === sequence.length) {
                level++;
                levelDisplay.textContent = level;
                playerSequence = [];

                if (level > highScore) {
                    highScore = level;
                    highScoreDisplay.textContent = highScore;
                    localStorage.setItem('simonHighScore', highScore);
                }

                messageDisplay.textContent = '正解！🎉';
                setTilesDisabled(true);

                setTimeout(() => {
                    addToSequence();
                    showSequence();
                }, 1000);
            }
        }

        function gameOver() {
            isPlaying = false;
            messageDisplay.textContent = `ゲームオーバー！レベル: ${level}`;
            startBtn.textContent = 'もう一度';
            startBtn.style.display = 'block';
            setTilesDisabled(true);

            // 失敗音
            playSound(150, 0.5);
        }

        async function startGame() {
            sequence = [];
            playerSequence = [];
            level = 0;
            isPlaying = true;
            startBtn.style.display = 'none';

            levelDisplay.textContent = level;
            messageDisplay.textContent = '準備...';

            await new Promise(r => setTimeout(r, 1000));

            addToSequence();
            showSequence();
        }

        tiles.forEach(tile => {
            tile.addEventListener('click', () => {
                const index = parseInt(tile.dataset.tile);
                handleTileClick(index);
            });

            tile.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const index = parseInt(tile.dataset.tile);
                handleTileClick(index);
            });
        });
    </script>
</body>
</html>
