<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says - Memory Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .buttons-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .game-button {
            aspect-ratio: 1;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .game-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0);
            transition: background 0.2s ease;
        }

        .game-button.red { background: #ff4757; }
        .game-button.blue { background: #3742fa; }
        .game-button.green { background: #2ed573; }
        .game-button.yellow { background: #ffa502; }

        .game-button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .game-button:active {
            transform: scale(0.95);
        }

        .game-button.active::before {
            background: rgba(255, 255, 255, 0.6);
        }

        .game-button.disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .message {
            text-align: center;
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            min-height: 27px;
            font-weight: 500;
        }

        .start-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        @media (max-width: 500px) {
            .game-container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .buttons-container {
                gap: 10px;
            }

            .stat-value {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>
    <div class="game-container">
        <h1>Simon Says</h1>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-label">レベル</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">ハイスコア</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>

        <div class="message" id="message">スタートボタンを押してね！</div>

        <div class="buttons-container">
            <button class="game-button red" id="red" data-color="red"></button>
            <button class="game-button blue" id="blue" data-color="blue"></button>
            <button class="game-button green" id="green" data-color="green"></button>
            <button class="game-button yellow" id="yellow" data-color="yellow"></button>
        </div>

        <button class="start-btn" id="startBtn">スタート</button>
    </div>

    <script>
        const colors = ['red', 'blue', 'green', 'yellow'];
        const buttons = {};
        colors.forEach(color => {
            buttons[color] = document.getElementById(color);
        });

        const startBtn = document.getElementById('startBtn');
        const message = document.getElementById('message');
        const levelDisplay = document.getElementById('level');
        const scoreDisplay = document.getElementById('score');
        const highScoreDisplay = document.getElementById('highScore');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let score = 0;
        let highScore = localStorage.getItem('simonHighScore') || 0;
        let isPlaying = false;
        let isPlayerTurn = false;

        highScoreDisplay.textContent = highScore;

        function playTone(frequency, duration) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = frequency;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        const frequencies = {
            red: 261.63,
            blue: 329.63,
            green: 392.00,
            yellow: 523.25
        };

        function flashButton(color) {
            return new Promise(resolve => {
                buttons[color].classList.add('active');
                playTone(frequencies[color], 0.3);
                setTimeout(() => {
                    buttons[color].classList.remove('active');
                    setTimeout(resolve, 100);
                }, 300);
            });
        }

        async function playSequence() {
            isPlayerTurn = false;
            message.textContent = 'よく見てね...';
            setButtonsEnabled(false);

            await new Promise(resolve => setTimeout(resolve, 500));

            for (let color of sequence) {
                await flashButton(color);
            }

            isPlayerTurn = true;
            playerSequence = [];
            message.textContent = 'あなたの番！';
            setButtonsEnabled(true);
        }

        function addToSequence() {
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            sequence.push(randomColor);
        }

        function setButtonsEnabled(enabled) {
            colors.forEach(color => {
                if (enabled) {
                    buttons[color].classList.remove('disabled');
                } else {
                    buttons[color].classList.add('disabled');
                }
            });
        }

        async function handleColorClick(color) {
            if (!isPlayerTurn) return;

            flashButton(color);
            playerSequence.push(color);

            const currentIndex = playerSequence.length - 1;

            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                gameOver();
                return;
            }

            if (playerSequence.length === sequence.length) {
                score += level * 10;
                scoreDisplay.textContent = score;
                level++;
                levelDisplay.textContent = level;

                if (score > highScore) {
                    highScore = score;
                    highScoreDisplay.textContent = highScore;
                    localStorage.setItem('simonHighScore', highScore);
                }

                message.textContent = '正解！';
                isPlayerTurn = false;
                setButtonsEnabled(false);

                await new Promise(resolve => setTimeout(resolve, 1000));

                addToSequence();
                playSequence();
            }
        }

        function gameOver() {
            isPlaying = false;
            isPlayerTurn = false;
            message.textContent = `ゲームオーバー！ スコア: ${score}`;
            startBtn.textContent = 'もう一度';
            setButtonsEnabled(false);

            // Play error sound
            playTone(150, 0.5);
            setTimeout(() => playTone(100, 0.5), 200);
        }

        function startGame() {
            sequence = [];
            playerSequence = [];
            level = 1;
            score = 0;
            isPlaying = true;

            levelDisplay.textContent = level;
            scoreDisplay.textContent = score;

            addToSequence();
            playSequence();

            startBtn.textContent = 'プレイ中...';
        }

        colors.forEach(color => {
            buttons[color].addEventListener('click', () => handleColorClick(color));
            buttons[color].addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleColorClick(color);
            });
        });

        startBtn.addEventListener('click', () => {
            if (!isPlaying) {
                startGame();
            }
        });

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        setButtonsEnabled(false);
    </script>
</body>
</html>
