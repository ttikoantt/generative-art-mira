<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient 3s ease infinite;
            background-size: 300% 300%;
        }

        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 15px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            min-width: 100px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #4ecdc4;
        }

        .stat-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 5px;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            aspect-ratio: 1;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn.red {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
        }

        .btn.blue {
            background: linear-gradient(135deg, #4ecdc4, #3db8b0);
        }

        .btn.yellow {
            background: linear-gradient(135deg, #ffe66d, #ffd93d);
        }

        .btn.green {
            background: linear-gradient(135deg, #a8e6cf, #88d8b0);
        }

        .btn.lit {
            filter: brightness(1.5);
            transform: scale(1.05);
            box-shadow: 0 0 30px currentColor;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            margin-top: 20px;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            font-size: 1.1rem;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .back-link {
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #4ecdc4;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .game-board {
                gap: 10px;
                max-width: 300px;
            }

            .stats {
                gap: 10px;
            }

            .stat {
                padding: 10px 15px;
                min-width: 80px;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            .control-btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 15px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">📺 全画面</button>

    <div class="container">
        <h1>🎮 Simon Says</h1>
        <p class="subtitle">光のパターンを覚えて、同じ順序でタップ！</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="level">1</div>
                <div class="stat-label">レベル</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="highScore">0</div>
                <div class="stat-label">🏆 最高</div>
            </div>
        </div>

        <div class="game-board">
            <button class="btn red" data-color="red"></button>
            <button class="btn blue" data-color="blue"></button>
            <button class="btn yellow" data-color="yellow"></button>
            <button class="btn green" data-color="green"></button>
        </div>

        <div class="controls">
            <button class="control-btn" id="startBtn">▶️ スタート</button>
            <button class="control-btn" id="strictBtn">🔴 ストリクトモード: OFF</button>
        </div>

        <div class="message" id="message">
            スタートボタンを押してゲームを開始！
        </div>

        <a href="../index.html" class="back-link">← ゲーム一覧に戻る</a>
    </div>

    <script>
        const colors = ['red', 'blue', 'yellow', 'green'];
        const buttons = {};
        colors.forEach(color => {
            buttons[color] = document.querySelector(`[data-color="${color}"]`);
        });

        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let highScore = localStorage.getItem('simonHighScore') || 0;
        let strictMode = false;
        let isPlaying = false;
        let isShowingSequence = false;

        // Display high score
        document.getElementById('highScore').textContent = highScore;

        function playTone(color) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            const frequencies = {
                red: 261.63,    // C4
                blue: 329.63,   // E4
                yellow: 392.00, // G4
                green: 523.25   // C5
            };

            oscillator.frequency.value = frequencies[color];
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        function lightUp(color, duration = 400) {
            return new Promise(resolve => {
                buttons[color].classList.add('lit');
                playTone(color);
                setTimeout(() => {
                    buttons[color].classList.remove('lit');
                    setTimeout(resolve, 100);
                }, duration);
            });
        }

        async function showSequence() {
            isShowingSequence = true;
            document.getElementById('message').textContent = 'パターンを覚えて...';
            document.getElementById('startBtn').disabled = true;

            await new Promise(resolve => setTimeout(resolve, 500));

            for (let color of sequence) {
                await lightUp(color);
            }

            document.getElementById('message').textContent = 'あなたの番！';
            isShowingSequence = false;
            playerSequence = [];
        }

        function addToSequence() {
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            sequence.push(randomColor);
        }

        function nextLevel() {
            level++;
            document.getElementById('level').textContent = level;
            addToSequence();
            showSequence();
        }

        function gameOver() {
            isPlaying = false;
            document.getElementById('message').textContent = `ゲームオーバー！レベル ${level - 1} までクリア！`;

            if (level - 1 > highScore) {
                highScore = level - 1;
                localStorage.setItem('simonHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
                document.getElementById('message').textContent += ' 🎉 新記録！';
            }

            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').textContent = '🔄 もう一度';
        }

        async function handleInput(color) {
            if (!isPlaying || isShowingSequence) return;

            playerSequence.push(color);
            const index = playerSequence.length - 1;

            await lightUp(color, 200);

            if (playerSequence[index] !== sequence[index]) {
                document.getElementById('message').textContent = '❌ 間違い！';

                if (strictMode) {
                    setTimeout(gameOver, 500);
                } else {
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    document.getElementById('message').textContent = 'もう一度挑戦！';
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    showSequence();
                }
                return;
            }

            if (playerSequence.length === sequence.length) {
                document.getElementById('message').textContent = '✅ 正解！';
                await new Promise(resolve => setTimeout(resolve, 1000));
                nextLevel();
            }
        }

        function startGame() {
            sequence = [];
            playerSequence = [];
            level = 1;
            isPlaying = true;

            document.getElementById('level').textContent = level;
            document.getElementById('startBtn').textContent = '🎮 プレイ中...';
            document.getElementById('startBtn').disabled = true;

            addToSequence();
            showSequence();
        }

        // Event listeners
        document.getElementById('startBtn').addEventListener('click', startGame);

        document.getElementById('strictBtn').addEventListener('click', () => {
            strictMode = !strictMode;
            document.getElementById('strictBtn').textContent = strictMode ? '🔴 ストリクトモード: ON' : '🔴 ストリクトモード: OFF';
        });

        colors.forEach(color => {
            buttons[color].addEventListener('click', () => handleInput(color));
        });

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // Touch support for better mobile experience
        buttons.red.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInput('red');
        });

        buttons.blue.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInput('blue');
        });

        buttons.yellow.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInput('yellow');
        });

        buttons.green.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInput('green');
        });
    </script>
</body>
</html>
