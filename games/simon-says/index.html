<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says - 記憶ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: #00ff88;
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .stat {
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 30px;
            border-radius: 12px;
            border: 2px solid #333;
        }

        .stat-label {
            display: block;
            color: #888;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .stat-value {
            display: block;
            color: #00ff88;
            font-size: 24px;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 400px;
            margin: 0 auto 30px;
        }

        .pad {
            width: 180px;
            height: 180px;
            border-radius: 12px;
            border: 4px solid #333;
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
            overflow: hidden;
        }

        .pad::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, rgba(255,255,255,0.3) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.15s;
        }

        .pad.lit::before {
            opacity: 1;
        }

        .pad.red {
            background: linear-gradient(135deg, #ff4757, #ff3344);
            box-shadow: 0 0 30px rgba(255, 71, 87, 0.3);
        }

        .pad.red.lit {
            background: linear-gradient(135deg, #ff6b7a, #ff4757);
            box-shadow: 0 0 50px rgba(255, 71, 87, 0.8);
            transform: scale(1.05);
        }

        .pad.blue {
            background: linear-gradient(135deg, #3498db, #2980b9);
            box-shadow: 0 0 30px rgba(52, 152, 219, 0.3);
        }

        .pad.blue.lit {
            background: linear-gradient(135deg, #5dade2, #3498db);
            box-shadow: 0 0 50px rgba(52, 152, 219, 0.8);
            transform: scale(1.05);
        }

        .pad.green {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.3);
        }

        .pad.green.lit {
            background: linear-gradient(135deg, #58d68d, #2ecc71);
            box-shadow: 0 0 50px rgba(46, 204, 113, 0.8);
            transform: scale(1.05);
        }

        .pad.yellow {
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.3);
        }

        .pad.yellow.lit {
            background: linear-gradient(135deg, #f4d03f, #f1c40f);
            box-shadow: 0 0 50px rgba(241, 196, 15, 0.8);
            transform: scale(1.05);
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn-start {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #000;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 255, 136, 0.4);
        }

        .btn-start:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #00ff88;
            border: 2px solid #00ff88;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 136, 0.2);
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 30px 50px;
            border-radius: 16px;
            font-size: 24px;
            font-weight: bold;
            z-index: 100;
            border: 2px solid #00ff88;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.3);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .pad {
                width: 140px;
                height: 140px;
            }

            .stats {
                gap: 15px;
            }

            .stat {
                padding: 10px 20px;
            }

            .stat-value {
                font-size: 20px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 15px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <h1>🎮 Simon Says</h1>
        <p class="subtitle">光るパターンを記憶して同じ順序でタップ！</p>

        <div class="stats">
            <div class="stat">
                <span class="stat-label">レベル</span>
                <span class="stat-value" id="level">1</span>
            </div>
            <div class="stat">
                <span class="stat-label">ハイスコア</span>
                <span class="stat-value" id="highScore">0</span>
            </div>
        </div>

        <div class="game-board">
            <div class="pad red" data-color="red"></div>
            <div class="pad blue" data-color="blue"></div>
            <div class="pad green" data-color="green"></div>
            <div class="pad yellow" data-color="yellow"></div>
        </div>

        <div class="controls">
            <button class="btn btn-start" id="startBtn" onclick="startGame()">スタート</button>
        </div>
    </div>

    <script>
        const pads = document.querySelectorAll('.pad');
        const levelDisplay = document.getElementById('level');
        const highScoreDisplay = document.getElementById('highScore');
        const startBtn = document.getElementById('startBtn');

        const colors = ['red', 'blue', 'green', 'yellow'];
        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let isPlaying = false;
        let isShowingSequence = false;
        let highScore = localStorage.getItem('simonSaysHighScore') || 0;

        highScoreDisplay.textContent = highScore;

        // Web Audio API for sounds
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playTone(frequency, duration = 0.3) {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = frequency;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        function getColorSound(color) {
            const sounds = {
                red: 261.63,      // C4
                blue: 329.63,     // E4
                green: 392.00,    // G4
                yellow: 523.25    // C5
            };
            return sounds[color];
        }

        function playErrorSound() {
            playTone(150, 0.5);
            setTimeout(() => playTone(100, 0.5), 200);
        }

        function playSuccessSound() {
            playTone(523.25, 0.15);
            setTimeout(() => playTone(659.25, 0.15), 150);
            setTimeout(() => playTone(783.99, 0.2), 300);
        }

        function lightUp(color) {
            const pad = document.querySelector(`[data-color="${color}"]`);
            pad.classList.add('lit');
            playTone(getColorSound(color));

            setTimeout(() => {
                pad.classList.remove('lit');
            }, 300);
        }

        function addToSequence() {
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            sequence.push(randomColor);
        }

        async function showSequence() {
            isShowingSequence = true;
            startBtn.disabled = true;

            await new Promise(resolve => setTimeout(resolve, 500));

            for (let i = 0; i < sequence.length; i++) {
                await new Promise(resolve => setTimeout(resolve, 200));
                lightUp(sequence[i]);
                await new Promise(resolve => setTimeout(resolve, 400));
            }

            isShowingSequence = false;
            startBtn.disabled = false;
        }

        function handlePadClick(color) {
            if (!isPlaying || isShowingSequence) return;

            lightUp(color);
            playerSequence.push(color);

            const currentIndex = playerSequence.length - 1;

            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                gameOver();
                return;
            }

            if (playerSequence.length === sequence.length) {
                playSuccessSound();
                playerSequence = [];
                level++;
                levelDisplay.textContent = level;

                if (level > highScore) {
                    highScore = level;
                    highScoreDisplay.textContent = highScore;
                    localStorage.setItem('simonSaysHighScore', highScore);
                }

                setTimeout(() => {
                    addToSequence();
                    showSequence();
                }, 1000);
            }
        }

        function showMessage(text, duration = 2000) {
            const message = document.createElement('div');
            message.className = 'message';
            message.textContent = text;
            document.body.appendChild(message);

            setTimeout(() => {
                message.remove();
            }, duration);
        }

        function gameOver() {
            playErrorSound();
            isPlaying = false;
            showMessage(`ゲームオーバー！ レベル: ${level}`, 2500);

            setTimeout(() => {
                sequence = [];
                playerSequence = [];
                level = 1;
                levelDisplay.textContent = level;
                startBtn.disabled = false;
                startBtn.textContent = 'もう一度';
            }, 2500);
        }

        function startGame() {
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            sequence = [];
            playerSequence = [];
            level = 1;
            levelDisplay.textContent = level;
            isPlaying = true;

            addToSequence();
            showSequence();

            startBtn.textContent = 'プレイ中...';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        pads.forEach(pad => {
            pad.addEventListener('click', () => {
                const color = pad.dataset.color;
                handlePadClick(color);
            });

            pad.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const color = pad.dataset.color;
                handlePadClick(color);
            });
        });
    </script>
</body>
</html>
