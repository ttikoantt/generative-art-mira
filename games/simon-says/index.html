<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says - Memory Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }

        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            color: #fff;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .button {
            width: 150px;
            height: 150px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            position: relative;
            overflow: hidden;
        }

        .button::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent,
                rgba(255, 255, 255, 0.1),
                transparent
            );
            transform: rotate(45deg);
            transition: all 0.5s;
        }

        .button:hover::before {
            animation: shine 1.5s infinite;
        }

        @keyframes shine {
            0% {
                transform: translateX(-100%) translateY(-100%) rotate(45deg);
            }
            100% {
                transform: translateX(100%) translateY(100%) rotate(45deg);
            }
        }

        .red {
            background: linear-gradient(135deg, #ff6b6b 0%, #c92a2a 100%);
            box-shadow: 0 8px 0 #a61e1e, 0 15px 30px rgba(255, 107, 107, 0.4);
        }

        .red:active, .red.active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #a61e1e, 0 8px 15px rgba(255, 107, 107, 0.6);
            filter: brightness(1.3);
        }

        .blue {
            background: linear-gradient(135deg, #4dabf7 0%, #1971c2 100%);
            box-shadow: 0 8px 0 #1565c0, 0 15px 30px rgba(77, 171, 247, 0.4);
        }

        .blue:active, .blue.active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #1565c0, 0 8px 15px rgba(77, 171, 247, 0.6);
            filter: brightness(1.3);
        }

        .green {
            background: linear-gradient(135deg, #51cf66 0%, #2f9e44 100%);
            box-shadow: 0 8px 0 #2b8a3e, 0 15px 30px rgba(81, 207, 102, 0.4);
        }

        .green:active, .green.active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #2b8a3e, 0 8px 15px rgba(81, 207, 102, 0.6);
            filter: brightness(1.3);
        }

        .yellow {
            background: linear-gradient(135deg, #ffd43b 0%, #f59f00 100%);
            box-shadow: 0 8px 0 #e67700, 0 15px 30px rgba(255, 212, 59, 0.4);
        }

        .yellow:active, .yellow.active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #e67700, 0 8px 15px rgba(255, 212, 59, 0.6);
            filter: brightness(1.3);
        }

        .message {
            color: #fff;
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-align: center;
            min-height: 40px;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .start-btn:active {
            transform: translateY(1px);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .home-link {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .home-link:hover {
            color: #fff;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .button {
                width: 120px;
                height: 120px;
            }

            .game-board {
                gap: 15px;
            }

            .stat-value {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .button {
                width: 100px;
                height: 100px;
            }

            .stats {
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <a href="../index.html" class="home-link">← ゲーム一覧</a>

    <button class="fullscreen-btn" id="fullscreen">⛶</button>

    <h1>🎵 Simon Says</h1>

    <div class="stats">
        <div class="stat">
            <div class="stat-label">Level</div>
            <div class="stat-value" id="level">1</div>
        </div>
        <div class="stat">
            <div class="stat-label">Score</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Best</div>
            <div class="stat-value" id="highScore">0</div>
        </div>
    </div>

    <div class="message" id="message">スタートボタンを押してね！</div>

    <div class="game-board">
        <button class="button red" data-color="red"></button>
        <button class="button blue" data-color="blue"></button>
        <button class="button green" data-color="green"></button>
        <button class="button yellow" data-color="yellow"></button>
    </div>

    <button class="start-btn" id="startBtn">ゲームスタート</button>

    <script>
        const colors = ['red', 'blue', 'green', 'yellow'];
        const frequencies = {
            red: 330,
            blue: 440,
            green: 550,
            yellow: 660
        };

        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let score = 0;
        let highScore = localStorage.getItem('simonHighScore') || 0;
        let isPlaying = false;
        let isPlayerTurn = false;

        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        document.getElementById('highScore').textContent = highScore;

        function playSound(color, duration = 0.3) {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = frequencies[color];
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        function flashButton(color, duration = 400) {
            return new Promise(resolve => {
                const button = document.querySelector(`[data-color="${color}"]`);
                button.classList.add('active');
                playSound(color, duration / 1000);

                setTimeout(() => {
                    button.classList.remove('active');
                    setTimeout(resolve, 100);
                }, duration);
            });
        }

        async function playSequence() {
            isPlayerTurn = false;
            document.getElementById('message').textContent = 'よく見てね...';

            await new Promise(resolve => setTimeout(resolve, 800));

            for (let i = 0; i < sequence.length; i++) {
                await flashButton(sequence[i]);
            }

            isPlayerTurn = true;
            playerSequence = [];
            document.getElementById('message').textContent = 'あなたの番！';
        }

        function addToSequence() {
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            sequence.push(randomColor);
        }

        async function handleColorClick(color) {
            if (!isPlaying || !isPlayerTurn) return;

            playerSequence.push(color);
            await flashButton(color, 200);

            const currentIndex = playerSequence.length - 1;

            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                gameOver();
                return;
            }

            if (playerSequence.length === sequence.length) {
                score += level;
                level++;
                document.getElementById('score').textContent = score;
                document.getElementById('level').textContent = level;

                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('simonHighScore', highScore);
                    document.getElementById('highScore').textContent = highScore;
                }

                isPlayerTurn = false;
                document.getElementById('message').textContent = '正解！🎉';

                await new Promise(resolve => setTimeout(resolve, 1000));
                addToSequence();
                await playSequence();
            }
        }

        function gameOver() {
            isPlaying = false;
            isPlayerTurn = false;

            // Play error sound
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.frequency.value = 150;
            oscillator.type = 'sawtooth';
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);

            document.getElementById('message').innerHTML = `ゲームオーバー！<br>スコア: ${score}`;
            document.getElementById('startBtn').style.display = 'block';

            // Flash all buttons
            colors.forEach((color, index) => {
                setTimeout(() => {
                    const button = document.querySelector(`[data-color="${color}"]`);
                    button.classList.add('active');
                    setTimeout(() => button.classList.remove('active'), 200);
                }, index * 100);
            });
        }

        function startGame() {
            sequence = [];
            playerSequence = [];
            level = 1;
            score = 0;

            document.getElementById('level').textContent = level;
            document.getElementById('score').textContent = score;
            document.getElementById('startBtn').style.display = 'none';

            isPlaying = true;
            addToSequence();
            playSequence();
        }

        // Event listeners
        document.querySelectorAll('.button').forEach(button => {
            button.addEventListener('click', () => {
                handleColorClick(button.dataset.color);
            });

            button.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleColorClick(button.dataset.color);
            });
        });

        document.getElementById('startBtn').addEventListener('click', startGame);

        document.getElementById('fullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Prevent scrolling on touch
        document.body.addEventListener('touchmove', (e) => {
            if (e.target.closest('.game-board')) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
