<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        .game-container {
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 28px;
        }
        .score {
            color: #4ecdc4;
            font-size: 24px;
            margin-bottom: 30px;
        }
        .sequence-display {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            margin-bottom: 20px;
            height: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .cell {
            width: 150px;
            height: 150px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            opacity: 0.6;
        }
        .cell:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }
        .cell:active {
            transform: scale(0.95);
        }
        .cell.active {
            opacity: 1;
            transform: scale(1.1);
            box-shadow: 0 0 30px currentColor;
        }
        .cell.red { background: #ff4757; color: #ff4757; }
        .cell.blue { background: #3742fa; color: #3742fa; }
        .cell.green { background: #2ed573; color: #2ed573; }
        .cell.yellow { background: #ffa502; color: #ffa502; }

        .btn {
            padding: 15px 40px;
            background: #4ecdc4;
            border: none;
            border-radius: 8px;
            color: #0a0a0f;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #45b7af;
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            color: #4ecdc4;
            font-size: 18px;
            margin-top: 20px;
            min-height: 27px;
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            z-index: 1000;
        }
        @media (max-width: 400px) {
            .cell {
                width: 120px;
                height: 120px;
            }
            .grid {
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    <div class="game-container">
        <h1>🎮 Simon Says</h1>
        <div class="score">レベル: <span id="level">1</span></div>
        <div class="sequence-display" id="sequenceDisplay"></div>
        <div class="grid">
            <button class="cell red" data-color="red" aria-label="赤"></button>
            <button class="cell blue" data-color="blue" aria-label="青"></button>
            <button class="cell green" data-color="green" aria-label="緑"></button>
            <button class="cell yellow" data-color="yellow" aria-label="黄"></button>
        </div>
        <button class="btn" id="startBtn">スタート</button>
        <div class="message" id="message"></div>
    </div>

    <script>
        const colors = ['red', 'blue', 'green', 'yellow'];
        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let isPlaying = false;
        let isShowingSequence = false;

        const cells = document.querySelectorAll('.cell');
        const startBtn = document.getElementById('startBtn');
        const levelDisplay = document.getElementById('level');
        const messageDisplay = document.getElementById('message');
        const sequenceDisplay = document.getElementById('sequenceDisplay');

        function playTone(frequency, duration = 200) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.frequency.value = frequency;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration / 1000);

            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + duration / 1000);
        }

        function getFrequency(color) {
            const frequencies = {
                red: 261.63,
                blue: 329.63,
                green: 392.00,
                yellow: 523.25
            };
            return frequencies[color];
        }

        function flashCell(color) {
            const cell = document.querySelector(`[data-color="${color}"]`);
            cell.classList.add('active');
            playTone(getFrequency(color), 300);

            setTimeout(() => {
                cell.classList.remove('active');
            }, 300);
        }

        async function showSequence() {
            isShowingSequence = true;
            startBtn.disabled = true;
            messageDisplay.textContent = '覚えて...';
            sequenceDisplay.textContent = `シーケンス: ${sequence.length} アイテム`;

            await new Promise(resolve => setTimeout(resolve, 500));

            for (let i = 0; i < sequence.length; i++) {
                await new Promise(resolve => setTimeout(resolve, 200));
                flashCell(sequence[i]);
                await new Promise(resolve => setTimeout(resolve, 400));
            }

            messageDisplay.textContent = 'あなたの番！';
            sequenceDisplay.textContent = '同じ順番でタップしてください';
            isShowingSequence = false;
        }

        function addToSequence() {
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            sequence.push(randomColor);
        }

        async function handlePlayerClick(color) {
            if (isShowingSequence || !isPlaying) return;

            flashCell(color);
            playerSequence.push(color);

            const currentIndex = playerSequence.length - 1;

            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                gameOver();
                return;
            }

            if (playerSequence.length === sequence.length) {
                playerSequence = [];
                level++;
                levelDisplay.textContent = level;
                messageDisplay.textContent = '正解！';
                await new Promise(resolve => setTimeout(resolve, 1000));
                addToSequence();
                showSequence();
            }
        }

        function gameOver() {
            isPlaying = false;
            messageDisplay.textContent = `ゲームオーバー！ レベル: ${level}`;
            startBtn.disabled = false;
            startBtn.textContent = 'もう一度';
            sequenceDisplay.textContent = '';

            playTone(200, 500);
            await new Promise(resolve => setTimeout(resolve, 200));
            playTone(150, 500);
        }

        function startGame() {
            sequence = [];
            playerSequence = [];
            level = 1;
            isPlaying = true;
            levelDisplay.textContent = level;
            startBtn.disabled = true;
            messageDisplay.textContent = '';

            addToSequence();
            showSequence();
        }

        cells.forEach(cell => {
            cell.addEventListener('click', () => {
                const color = cell.dataset.color;
                handlePlayerClick(color);
            });
            cell.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const color = cell.dataset.color;
                handlePlayerClick(color);
            });
        });

        startBtn.addEventListener('click', startGame);

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
