<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            padding: 20px;
        }

        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 2rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .stats {
            color: rgba(255,255,255,0.8);
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            gap: 30px;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .pad {
            width: 150px;
            height: 150px;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.1s, filter 0.1s;
            border: 4px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .pad:hover {
            transform: scale(1.05);
        }

        .pad:active {
            transform: scale(0.95);
        }

        .pad.red {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.3);
        }

        .pad.blue {
            background: linear-gradient(135deg, #3498db, #2980b9);
            box-shadow: 0 10px 30px rgba(52, 152, 219, 0.3);
        }

        .pad.green {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            box-shadow: 0 10px 30px rgba(46, 204, 113, 0.3);
        }

        .pad.yellow {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            box-shadow: 0 10px 30px rgba(243, 156, 18, 0.3);
        }

        .pad.lit {
            filter: brightness(1.8);
            transform: scale(1.1);
        }

        .pad.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .message {
            color: #fff;
            font-size: 1.3rem;
            margin-bottom: 20px;
            min-height: 30px;
            text-align: center;
        }

        button.start-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button.start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }

        button.start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 14px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        @media (max-width: 400px) {
            .pad {
                width: 120px;
                height: 120px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .stats {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <h1>🎮 Simon Says</h1>
    <div class="stats">
        <span>レベル: <strong id="level">1</strong></span>
        <span>ハイスコア: <strong id="highScore">0</strong></span>
    </div>
    <div class="game-board">
        <div class="pad red" data-color="red"></div>
        <div class="pad blue" data-color="blue"></div>
        <div class="pad green" data-color="green"></div>
        <div class="pad yellow" data-color="yellow"></div>
    </div>
    <p class="message" id="message">スタートボタンを押してね！</p>
    <button class="start-btn" id="startBtn">🎯 スタート</button>
    <button class="fullscreen-btn" id="fullscreenBtn">📺 全画面</button>

    <script>
        const pads = document.querySelectorAll('.pad');
        const startBtn = document.getElementById('startBtn');
        const messageEl = document.getElementById('message');
        const levelEl = document.getElementById('level');
        const highScoreEl = document.getElementById('highScore');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let isPlaying = false;
        let isShowingSequence = false;
        let highScore = localStorage.getItem('simonHighScore') || 0;

        highScoreEl.textContent = highScore;

        // Audio context for sounds
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playTone(frequency, duration = 0.3) {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.frequency.value = frequency;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + duration);
        }

        const frequencies = {
            red: 329.63,    // E4
            blue: 392.00,   // G4
            green: 440.00,  // A4
            yellow: 523.25  // C5
        };

        function lightUp(color) {
            const pad = document.querySelector(`.pad.${color}`);
            pad.classList.add('lit');
            playTone(frequencies[color]);
            setTimeout(() => pad.classList.remove('lit'), 300);
        }

        function addToSequence() {
            const colors = ['red', 'blue', 'green', 'yellow'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            sequence.push(randomColor);
        }

        async function showSequence() {
            isShowingSequence = true;
            messageEl.textContent = '順番を覚えてね！';
            setPadsDisabled(true);

            await new Promise(resolve => setTimeout(resolve, 500));

            for (let i = 0; i < sequence.length; i++) {
                await new Promise(resolve => setTimeout(resolve, 200));
                lightUp(sequence[i]);
                await new Promise(resolve => setTimeout(resolve, 400));
            }

            isShowingSequence = false;
            messageEl.textContent = 'あなたの番！';
            setPadsDisabled(false);
        }

        function setPadsDisabled(disabled) {
            pads.forEach(pad => {
                if (disabled) {
                    pad.classList.add('disabled');
                } else {
                    pad.classList.remove('disabled');
                }
            });
        }

        function handlePadClick(color) {
            if (isShowingSequence || !isPlaying) return;

            lightUp(color);
            playerSequence.push(color);

            const currentIndex = playerSequence.length - 1;

            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                gameOver();
                return;
            }

            if (playerSequence.length === sequence.length) {
                level++;
                levelEl.textContent = level;
                playerSequence = [];
                messageEl.textContent = '素晴らしい！ 次のレベルへ...';

                if (level > highScore) {
                    highScore = level;
                    highScoreEl.textContent = highScore;
                    localStorage.setItem('simonHighScore', highScore);
                }

                setPadsDisabled(true);
                setTimeout(() => {
                    addToSequence();
                    showSequence();
                }, 1000);
            }
        }

        function gameOver() {
            isPlaying = false;
            messageEl.textContent = `ゲームオーバー！ レベル: ${level}`;
            startBtn.textContent = '🔄 もう一度';
            startBtn.disabled = false;
            setPadsDisabled(true);

            // Error sound
            playTone(200, 0.5);
            setTimeout(() => playTone(150, 0.3), 200);
        }

        function startGame() {
            sequence = [];
            playerSequence = [];
            level = 1;
            isPlaying = true;
            levelEl.textContent = level;
            startBtn.disabled = true;

            audioCtx.resume();

            addToSequence();
            showSequence();
        }

        // Event listeners
        pads.forEach(pad => {
            pad.addEventListener('click', () => {
                const color = pad.dataset.color;
                handlePadClick(color);
            });
        });

        startBtn.addEventListener('click', startGame);

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });
    </script>
</body>
</html>
