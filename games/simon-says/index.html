<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Simon Says - 記憶ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            color: #fff;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        .score {
            color: #00d4ff;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            margin-bottom: 20px;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 400px;
            margin: 0 auto 30px;
        }

        .button {
            aspect-ratio: 1;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .button::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3), transparent);
        }

        .button.green {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            box-shadow: 0 8px 20px rgba(0, 255, 136, 0.4);
        }

        .button.red {
            background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);
            box-shadow: 0 8px 20px rgba(255, 68, 68, 0.4);
        }

        .button.yellow {
            background: linear-gradient(135deg, #ffdd00 0%, #ccaa00 100%);
            box-shadow: 0 8px 20px rgba(255, 221, 0, 0.4);
        }

        .button.blue {
            background: linear-gradient(135deg, #0088ff 0%, #0055cc 100%);
            box-shadow: 0 8px 20px rgba(0, 136, 255, 0.4);
        }

        .button:active {
            transform: scale(0.95);
        }

        .button.active {
            transform: scale(1.05);
            filter: brightness(1.5);
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-btn {
            padding: 14px 28px;
            font-size: 1.1rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .control-btn:active {
            transform: translateY(0);
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .message {
            color: #fff;
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            margin-top: 20px;
            min-height: 30px;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        @media (max-width: 480px) {
            .game-board {
                gap: 10px;
                max-width: 320px;
            }

            .button {
                border-radius: 15px;
            }

            .control-btn {
                padding: 12px 24px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Simon Says</h1>
        <p class="score">レベル: <span id="level">0</span></p>

        <div class="game-board">
            <button class="button green" data-color="0"></button>
            <button class="button red" data-color="1"></button>
            <button class="button yellow" data-color="2"></button>
            <button class="button blue" data-color="3"></button>
        </div>

        <div class="controls">
            <button class="control-btn" id="start-btn" onclick="startGame()">スタート</button>
            <button class="control-btn fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
        </div>

        <p class="message" id="message">スタートボタンを押してね！</p>
    </div>

    <script>
        const colors = ['green', 'red', 'yellow', 'blue'];
        const buttons = document.querySelectorAll('.button');
        const levelDisplay = document.getElementById('level');
        const messageDisplay = document.getElementById('message');
        const startBtn = document.getElementById('start-btn');

        let sequence = [];
        let playerSequence = [];
        let level = 0;
        let isPlaying = false;
        let isPlayerTurn = false;

        // 音声周波数
        const frequencies = [392, 329.63, 261.63, 220]; // G4, E4, C4, A3
        let audioContext = null;

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(index) {
            initAudio();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = frequencies[index];
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        function flashButton(index) {
            const button = buttons[index];
            button.classList.add('active');
            playSound(index);

            setTimeout(() => {
                button.classList.remove('active');
            }, 300);
        }

        function playSequence() {
            isPlayerTurn = false;
            messageDisplay.textContent = '見ててね...';
            startBtn.disabled = true;

            let i = 0;
            const interval = setInterval(() => {
                flashButton(sequence[i]);
                i++;

                if (i >= sequence.length) {
                    clearInterval(interval);
                    isPlayerTurn = true;
                    messageDisplay.textContent = 'あなたの番！';
                }
            }, 600);
        }

        function addToSequence() {
            const randomColor = Math.floor(Math.random() * 4);
            sequence.push(randomColor);
            level++;
            levelDisplay.textContent = level;
        }

        function handlePlayerInput(colorIndex) {
            if (!isPlayerTurn) return;

            playerSequence.push(colorIndex);
            flashButton(colorIndex);

            const currentIndex = playerSequence.length - 1;

            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                gameOver();
                return;
            }

            if (playerSequence.length === sequence.length) {
                playerSequence = [];
                isPlayerTurn = false;
                messageDisplay.textContent = '正解！';
                setTimeout(() => {
                    addToSequence();
                    playSequence();
                }, 1000);
            }
        }

        function startGame() {
            initAudio();
            sequence = [];
            playerSequence = [];
            level = 0;
            isPlaying = true;

            messageDisplay.textContent = '準備...';
            startBtn.disabled = true;

            setTimeout(() => {
                addToSequence();
                playSequence();
            }, 1000);
        }

        function gameOver() {
            isPlaying = false;
            isPlayerTurn = false;
            messageDisplay.textContent = `ゲームオーバー！ レベル: ${level}`;
            startBtn.disabled = false;

            // 失敗音を再生
            initAudio();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.frequency.value = 150;
            oscillator.type = 'sawtooth';
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('全画面エラー:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        buttons.forEach(button => {
            button.addEventListener('click', () => {
                const colorIndex = parseInt(button.dataset.color);
                handlePlayerInput(colorIndex);
            });

            // タッチイベントのサポート
            button.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const colorIndex = parseInt(button.dataset.color);
                handlePlayerInput(colorIndex);
            });
        });

        // キーボードサポート
        document.addEventListener('keydown', (e) => {
            if (!isPlayerTurn) return;

            const keyMap = {
                'q': 0, '1': 0,  // 緑
                'w': 1, '2': 1,  // 赤
                'a': 2, '3': 2,  // 黄
                's': 3, '4': 3   // 青
            };

            if (keyMap.hasOwnProperty(e.key.toLowerCase())) {
                handlePlayerInput(keyMap[e.key.toLowerCase()]);
            }
        });
    </script>
</body>
</html>
