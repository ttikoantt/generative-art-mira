<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says - 記憶力ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            color: #fff;
            font-size: clamp(1.8rem, 5vw, 3rem);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 200, 100, 0.5);
        }

        .subtitle {
            color: #aaa;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            margin-bottom: 30px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            color: #888;
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            margin-bottom: 5px;
        }

        .stat-value {
            color: #fff;
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 400px;
            margin: 0 auto 30px;
        }

        .button {
            aspect-ratio: 1;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .button::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0) 100%);
            border-radius: 20px;
        }

        .button:active {
            transform: scale(0.95);
        }

        .button:disabled {
            cursor: not-allowed;
        }

        .button-green {
            background: linear-gradient(135deg, #00e676 0%, #00c853 100%);
        }

        .button-red {
            background: linear-gradient(135deg, #ff5252 0%, #d32f2f 100%);
        }

        .button-yellow {
            background: linear-gradient(135deg, #ffeb3b 0%, #ffc107 100%);
        }

        .button-blue {
            background: linear-gradient(135deg, #448aff 0%, #2962ff 100%);
        }

        .button.lit {
            transform: scale(1.05);
            box-shadow: 0 0 40px currentColor, 0 0 60px currentColor;
            filter: brightness(1.3);
        }

        .button.wrong {
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-top: 20px;
            color: #fff;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            min-height: 1.5em;
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
            box-shadow: 0 4px 15px rgba(155, 89, 182, 0.4);
        }

        .fullscreen-btn:hover {
            box-shadow: 0 6px 20px rgba(155, 89, 182, 0.6);
        }

        /* フルスクリーン */
        .fullscreen-mode {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fullscreen-mode .game-board {
            max-width: 500px;
        }

        .info {
            color: #666;
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <h1>🎮 Simon Says</h1>
        <p class="subtitle">記憶力ゲーム - 色の順序を覚えて再現しよう</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">レベル</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">最高レベル</div>
                <div class="stat-value" id="best-level">0</div>
            </div>
        </div>

        <div class="game-board">
            <button class="button button-green" data-color="green" disabled></button>
            <button class="button button-red" data-color="red" disabled></button>
            <button class="button button-yellow" data-color="yellow" disabled></button>
            <button class="button button-blue" data-color="blue" disabled></button>
        </div>

        <div class="controls">
            <button class="btn" id="start-btn" onclick="startGame()">スタート</button>
            <button class="btn fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
        </div>

        <p class="message" id="message">スタートボタンを押して始めよう！</p>

        <p class="info">💡 音が出るようにボリュームを上げてください</p>
    </div>

    <script>
        const buttons = document.querySelectorAll('.button');
        const levelDisplay = document.getElementById('level');
        const bestLevelDisplay = document.getElementById('best-level');
        const messageDisplay = document.getElementById('message');
        const startBtn = document.getElementById('start-btn');
        const container = document.getElementById('container');

        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let bestLevel = localStorage.getItem('simonBestLevel') || 0;
        let isPlaying = false;
        let isPlayerTurn = false;

        bestLevelDisplay.textContent = bestLevel;

        // 音声コンテキスト
        let audioContext = null;

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 色の周波数
        const frequencies = {
            green: 392,    // G4
            red: 329.63,   // E4
            yellow: 440,   // A4
            blue: 261.63   // C4
        };

        // 音を再生
        function playTone(color, duration = 300) {
            initAudio();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = frequencies[color];
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration / 1000);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration / 1000);
        }

        // ボタンを光らせる
        function flashButton(color, duration = 400) {
            const button = document.querySelector(`[data-color="${color}"]`);
            button.classList.add('lit');
            playTone(color, duration);

            setTimeout(() => {
                button.classList.remove('lit');
            }, duration);
        }

        // シーケンスを再生
        async function playSequence() {
            isPlayerTurn = false;
            messageDisplay.textContent = '覚えて...';
            buttons.forEach(btn => btn.disabled = true);

            await new Promise(resolve => setTimeout(resolve, 500));

            for (let i = 0; i < sequence.length; i++) {
                await new Promise(resolve => setTimeout(resolve, 200));
                flashButton(sequence[i]);
                await new Promise(resolve => setTimeout(resolve, 500));
            }

            isPlayerTurn = true;
            messageDisplay.textContent = 'あなたの番！';
            buttons.forEach(btn => btn.disabled = false);
        }

        // ゲーム開始
        function startGame() {
            initAudio();
            sequence = [];
            playerSequence = [];
            level = 1;
            levelDisplay.textContent = level;
            isPlaying = true;
            startBtn.disabled = true;

            addToSequence();
            playSequence();
        }

        // シーケンスに追加
        function addToSequence() {
            const colors = ['green', 'red', 'yellow', 'blue'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            sequence.push(randomColor);
        }

        // プレイヤーの入力
        buttons.forEach(button => {
            button.addEventListener('click', () => {
                if (!isPlayerTurn || !isPlaying) return;

                const color = button.dataset.color;
                playerSequence.push(color);
                flashButton(color, 200);

                // 入力チェック
                const currentIndex = playerSequence.length - 1;
                if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                    gameOver();
                    return;
                }

                // シーケンス完了チェック
                if (playerSequence.length === sequence.length) {
                    level++;
                    levelDisplay.textContent = level;
                    playerSequence = [];

                    // 最高レベル更新
                    if (level > bestLevel) {
                        bestLevel = level;
                        bestLevelDisplay.textContent = bestLevel;
                        localStorage.setItem('simonBestLevel', bestLevel);
                    }

                    messageDisplay.textContent = '正解！ 次のレベル...';
                    buttons.forEach(btn => btn.disabled = true);

                    setTimeout(() => {
                        addToSequence();
                        playSequence();
                    }, 1000);
                }
            });
        });

        // ゲームオーバー
        function gameOver() {
            isPlaying = false;
            isPlayerTurn = false;
            buttons.forEach(btn => btn.disabled = true);
            buttons.forEach(btn => btn.classList.add('wrong'));

            // 間違った音
            playTone('red', 500);

            setTimeout(() => {
                buttons.forEach(btn => btn.classList.remove('wrong'));
            }, 500);

            messageDisplay.textContent = `ゲームオーバー！ レベル ${level} 到達`;
            startBtn.disabled = false;
            startBtn.textContent = 'もう一度';
        }

        // フルスクリーン
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                container.classList.add('fullscreen-mode');
            } else {
                container.classList.remove('fullscreen-mode');
            }
        });
    </script>
</body>
</html>
