<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Simon Says</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 1rem;
        }

        h1 {
            color: #eee;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .score {
            color: #4ecdc4;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            margin-bottom: 1.5rem;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            max-width: 400px;
            margin: 0 auto;
            aspect-ratio: 1;
        }

        .color-btn {
            aspect-ratio: 1;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .color-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0);
            transition: background 0.15s ease;
        }

        .color-btn.active::before {
            background: rgba(255, 255, 255, 0.6);
        }

        .color-btn:active {
            transform: scale(0.95);
        }

        .btn-red { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); }
        .btn-blue { background: linear-gradient(135deg, #4ecdc4, #3db8b0); }
        .btn-green { background: linear-gradient(135deg, #95e652, #7ed442); }
        .btn-yellow { background: linear-gradient(135deg, #ffd93d, #f5c800); }

        .message {
            color: #95a5a6;
            font-size: clamp(1rem, 3vw, 1.3rem);
            margin-top: 2rem;
            min-height: 1.5em;
        }

        .start-btn {
            margin-top: 1.5rem;
            padding: 1rem 3rem;
            font-size: clamp(1rem, 3vw, 1.2rem);
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.6);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 1rem;
            right: 1rem;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .high-score {
            color: #ffd93d;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>

    <div class="container">
        <h1>🎮 Simon Says</h1>
        <div class="high-score" id="highScore">ハイスコア: 0</div>
        <div class="score" id="score">スコア: 0</div>

        <div class="game-board">
            <button class="color-btn btn-red" data-color="red"></button>
            <button class="color-btn btn-blue" data-color="blue"></button>
            <button class="color-btn btn-green" data-color="green"></button>
            <button class="color-btn btn-yellow" data-color="yellow"></button>
        </div>

        <div class="message" id="message">スタートボタンを押してね！</div>
        <button class="start-btn" id="startBtn">ゲームスタート</button>
    </div>

    <script>
        const colors = ['red', 'blue', 'green', 'yellow'];
        const buttons = {};
        colors.forEach(color => {
            buttons[color] = document.querySelector(`[data-color="${color}"]`);
        });

        const scoreDisplay = document.getElementById('score');
        const messageDisplay = document.getElementById('message');
        const startBtn = document.getElementById('startBtn');
        const highScoreDisplay = document.getElementById('highScore');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let sequence = [];
        let playerSequence = [];
        let score = 0;
        let highScore = localStorage.getItem('simonHighScore') || 0;
        let isPlaying = false;
        let isShowingSequence = false;

        highScoreDisplay.textContent = `ハイスコア: ${highScore}`;

        // オーディオコンテキスト
        let audioContext;

        function playTone(frequency, duration = 0.3) {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }

            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = frequency;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        const tones = {
            red: 261.63,    // C4
            blue: 329.63,   // E4
            green: 392.00,  // G4
            yellow: 523.25  // C5
        };

        function flashButton(color) {
            return new Promise(resolve => {
                buttons[color].classList.add('active');
                playTone(tones[color]);
                setTimeout(() => {
                    buttons[color].classList.remove('active');
                    setTimeout(resolve, 100);
                }, 400);
            });
        }

        async function showSequence() {
            isShowingSequence = true;
            messageDisplay.textContent = 'よく見てね...';
            startBtn.disabled = true;

            await new Promise(r => setTimeout(r, 500));

            for (let color of sequence) {
                await flashButton(color);
            }

            isShowingSequence = false;
            messageDisplay.textContent = 'あなたの番！';
        }

        function addToSequence() {
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            sequence.push(randomColor);
        }

        async function handlePlayerInput(color) {
            if (!isPlaying || isShowingSequence) return;

            playerSequence.push(color);

            const currentIndex = playerSequence.length - 1;

            // 正しい入力
            if (playerSequence[currentIndex] === sequence[currentIndex]) {
                flashButton(color);

                // シーケンス完了
                if (playerSequence.length === sequence.length) {
                    score++;
                    scoreDisplay.textContent = `スコア: ${score}`;

                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('simonHighScore', highScore);
                        highScoreDisplay.textContent = `ハイスコア: ${highScore}`;
                    }

                    playerSequence = [];
                    messageDisplay.textContent = '素晴らしい！次...';

                    await new Promise(r => setTimeout(r, 1000));
                    addToSequence();
                    await showSequence();
                }
            } else {
                // 間違い
                playTone(150, 0.5); // エラー音
                gameOver();
            }
        }

        function gameOver() {
            isPlaying = false;
            messageDisplay.textContent = `ゲームオーバー！スコア: ${score}`;
            startBtn.disabled = false;
            startBtn.textContent = 'もう一度';

            // すべてのボタンを点滅
            colors.forEach(color => {
                buttons[color].classList.add('active');
                setTimeout(() => {
                    buttons[color].classList.remove('active');
                }, 200);
            });
        }

        function startGame() {
            sequence = [];
            playerSequence = [];
            score = 0;
            scoreDisplay.textContent = 'スコア: 0';
            isPlaying = true;

            addToSequence();
            showSequence();
        }

        // イベントリスナー
        colors.forEach(color => {
            buttons[color].addEventListener('click', () => handlePlayerInput(color));
            buttons[color].addEventListener('touchstart', (e) => {
                e.preventDefault();
                handlePlayerInput(color);
            });
        });

        startBtn.addEventListener('click', startGame);

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // キーボードサポート
        document.addEventListener('keydown', (e) => {
            if (!isPlaying || isShowingSequence) return;

            const keyMap = {
                'r': 'red',
                'b': 'blue',
                'g': 'green',
                'y': 'yellow'
            };

            if (keyMap[e.key.toLowerCase()]) {
                handlePlayerInput(keyMap[e.key.toLowerCase()]);
            }
        });
    </script>
</body>
</html>
