<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says - Memory Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: white;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            color: white;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 0 auto;
            max-width: 400px;
        }

        .pad {
            aspect-ratio: 1;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.1s ease;
            position: relative;
            overflow: hidden;
        }

        .pad::before {
            content: '';
            position: absolute;
            inset: 0;
            background: inherit;
            border-radius: 20px;
        }

        .pad:active {
            transform: scale(0.95);
        }

        .pad.red {
            background: #e74c3c;
            box-shadow: 0 8px 30px rgba(231, 76, 60, 0.4);
        }

        .pad.red.active,
        .pad.red:active {
            background: #ff6b5b;
            box-shadow: 0 0 50px rgba(231, 76, 60, 0.8);
        }

        .pad.blue {
            background: #3498db;
            box-shadow: 0 8px 30px rgba(52, 152, 219, 0.4);
        }

        .pad.blue.active,
        .pad.blue:active {
            background: #5dade2;
            box-shadow: 0 0 50px rgba(52, 152, 219, 0.8);
        }

        .pad.green {
            background: #2ecc71;
            box-shadow: 0 8px 30px rgba(46, 204, 113, 0.4);
        }

        .pad.green.active,
        .pad.green:active {
            background: #58d68d;
            box-shadow: 0 0 50px rgba(46, 204, 113, 0.8);
        }

        .pad.yellow {
            background: #f1c40f;
            box-shadow: 0 8px 30px rgba(241, 196, 15, 0.4);
        }

        .pad.yellow.active,
        .pad.yellow:active {
            background: #f4d03f;
            box-shadow: 0 0 50px rgba(241, 196, 15, 0.8);
        }

        .controls {
            margin-top: 30px;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 50px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.5);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            color: white;
            font-size: 18px;
            margin-top: 20px;
            min-height: 27px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .pad.disabled {
            pointer-events: none;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>

    <div class="container">
        <h1>Simon Says</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">LEVEL</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="score">0</div>
            </div>
        </div>

        <div class="game-board">
            <button class="pad red" data-pad="0"></button>
            <button class="pad blue" data-pad="1"></button>
            <button class="pad green" data-pad="2"></button>
            <button class="pad yellow" data-pad="3"></button>
        </div>

        <div class="message" id="message">Press START to play</div>

        <div class="controls">
            <button class="start-btn" id="startBtn">START</button>
        </div>
    </div>

    <script>
        const pads = document.querySelectorAll('.pad');
        const startBtn = document.getElementById('startBtn');
        const levelDisplay = document.getElementById('level');
        const scoreDisplay = document.getElementById('score');
        const messageDisplay = document.getElementById('message');

        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const frequencies = [329.63, 392.00, 261.63, 440.00]; // E4, G4, C4, A4

        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let score = 0;
        let isPlaying = false;
        let isShowingSequence = false;

        function playTone(index) {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = frequencies[index];
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        function activatePad(index, duration = 300) {
            pads[index].classList.add('active');
            playTone(index);

            setTimeout(() => {
                pads[index].classList.remove('active');
            }, duration);
        }

        function addToSequence() {
            const randomPad = Math.floor(Math.random() * 4);
            sequence.push(randomPad);
        }

        async function showSequence() {
            isShowingSequence = true;
            disablePads(true);
            messageDisplay.textContent = 'Watch carefully...';

            await sleep(500);

            for (let i = 0; i < sequence.length; i++) {
                await sleep(300);
                activatePad(sequence[i]);
                await sleep(500);
            }

            messageDisplay.textContent = 'Your turn!';
            disablePads(false);
            isShowingSequence = false;
            playerSequence = [];
        }

        function disablePads(disabled) {
            pads.forEach(pad => {
                if (disabled) {
                    pad.classList.add('disabled');
                } else {
                    pad.classList.remove('disabled');
                }
            });
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function handlePadClick(index) {
            if (isShowingSequence || !isPlaying) return;

            activatePad(index);
            playerSequence.push(index);

            const currentIndex = playerSequence.length - 1;

            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                gameOver();
                return;
            }

            if (playerSequence.length === sequence.length) {
                score += level * 10;
                scoreDisplay.textContent = score;
                level++;
                levelDisplay.textContent = level;
                messageDisplay.textContent = 'Correct! Next level...';

                disablePads(true);
                setTimeout(() => {
                    addToSequence();
                    showSequence();
                }, 1000);
            }
        }

        function gameOver() {
            isPlaying = false;
            messageDisplay.textContent = `Game Over! Score: ${score}`;
            startBtn.disabled = false;
            startBtn.textContent = 'PLAY AGAIN';
            disablePads(true);

            // Game over sound
            playTone(0);
            setTimeout(() => playTone(1), 100);
            setTimeout(() => playTone(2), 200);
            setTimeout(() => playTone(3), 300);
        }

        function startGame() {
            sequence = [];
            playerSequence = [];
            level = 1;
            score = 0;
            isPlaying = true;

            levelDisplay.textContent = level;
            scoreDisplay.textContent = score;

            startBtn.disabled = true;
            startBtn.textContent = 'PLAYING...';

            addToSequence();
            showSequence();
        }

        pads.forEach((pad, index) => {
            pad.addEventListener('click', () => handlePadClick(index));
            pad.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handlePadClick(index);
            });
        });

        startBtn.addEventListener('click', startGame);

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        disablePads(true);
    </script>
</body>
</html>
