<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pixel Painter - Creative Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            height: 100vh;
        }

        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .score {
            color: #00ff88;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .canvas-container {
            position: relative;
            background: #16213e;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 4px 20px rgba(0, 255, 136, 0.2);
        }

        #pixelCanvas {
            border: 2px solid #00ff88;
            cursor: crosshair;
            display: block;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .color-palette {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .color-btn {
            width: 35px;
            height: 35px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .color-btn:hover {
            transform: scale(1.1);
        }

        .color-btn.selected {
            border: 3px solid #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        button {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #1a1a2e;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.4);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            z-index: 10;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 20px;
            }
            
            .canvas-container {
                padding: 5px;
            }

            .color-btn {
                width: 30px;
                height: 30px;
            }

            button {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">Fullscreen</button>

    <div class="container">
        <h1>🎨 Pixel Painter</h1>
        <div class="score">Pixels Placed: <span id="pixelCount">0</span></div>

        <div class="canvas-container">
            <canvas id="pixelCanvas" width="320" height="320"></canvas>
        </div>

        <div class="color-palette" id="colorPalette"></div>

        <div class="controls">
            <button onclick="clearCanvas()">Clear</button>
            <button onclick="animatePixels()">Animate!</button>
            <button onclick="randomFill()">Random Fill</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d');
        const pixelCountEl = document.getElementById('pixelCount');
        const colorPalette = document.getElementById('colorPalette');

        const GRID_SIZE = 16;
        const PIXEL_SIZE = canvas.width / GRID_SIZE;

        let pixels = [];
        let selectedColor = '#00ff88';
        let isDrawing = false;
        let pixelCount = 0;
        let isAnimating = false;

        // Color palette
        const colors = [
            '#00ff88', '#00ccff', '#ff00ff', '#ffff00',
            '#ff8800', '#8800ff', '#ff0066', '#00ffcc',
            '#ffffff', '#888888', '#444444', '#000000',
            '#ff0000', '#00ff00', '#0000ff', '#ffcc00'
        ];

        // Initialize grid
        function initGrid() {
            pixels = [];
            for (let y = 0; y < GRID_SIZE; y++) {
                pixels[y] = [];
                for (let x = 0; x < GRID_SIZE; x++) {
                    pixels[y][x] = null;
                }
            }
            drawGrid();
        }

        // Draw grid and pixels
        function drawGrid() {
            ctx.fillStyle = '#16213e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid lines
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 1;

            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * PIXEL_SIZE, 0);
                ctx.lineTo(i * PIXEL_SIZE, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * PIXEL_SIZE);
                ctx.lineTo(canvas.width, i * PIXEL_SIZE);
                ctx.stroke();
            }

            // Draw pixels
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    if (pixels[y][x]) {
                        ctx.fillStyle = pixels[y][x];
                        ctx.fillRect(
                            x * PIXEL_SIZE + 1,
                            y * PIXEL_SIZE + 1,
                            PIXEL_SIZE - 2,
                            PIXEL_SIZE - 2
                        );
                    }
                }
            }
        }

        // Place pixel
        function placePixel(x, y) {
            if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) {
                if (!pixels[y][x]) {
                    pixelCount++;
                    pixelCountEl.textContent = pixelCount;
                }
                pixels[y][x] = selectedColor;
                drawGrid();
            }
        }

        // Get grid position from event
        function getGridPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            const x = Math.floor((clientX - rect.left) * scaleX / PIXEL_SIZE);
            const y = Math.floor((clientY - rect.top) * scaleY / PIXEL_SIZE);

            return { x, y };
        }

        // Mouse events
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const pos = getGridPos(e);
            placePixel(pos.x, pos.y);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDrawing) {
                const pos = getGridPos(e);
                placePixel(pos.x, pos.y);
            }
        });

        canvas.addEventListener('mouseup', () => {
            isDrawing = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isDrawing = false;
        });

        // Touch events
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDrawing = true;
            const pos = getGridPos(e);
            placePixel(pos.x, pos.y);
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isDrawing) {
                const pos = getGridPos(e);
                placePixel(pos.x, pos.y);
            }
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            isDrawing = false;
        });

        // Create color palette
        colors.forEach(color => {
            const btn = document.createElement('div');
            btn.className = 'color-btn';
            btn.style.backgroundColor = color;
            if (color === selectedColor) btn.classList.add('selected');
            btn.addEventListener('click', () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedColor = color;
            });
            colorPalette.appendChild(btn);
        });

        // Clear canvas
        function clearCanvas() {
            pixelCount = 0;
            pixelCountEl.textContent = pixelCount;
            initGrid();
        }

        // Animate pixels
        function animatePixels() {
            if (isAnimating) return;
            isAnimating = true;

            const animationFrames = 20;
            let frame = 0;

            const originalPixels = pixels.map(row => [...row]);

            function animate() {
                frame++;

                // Wave effect
                for (let y = 0; y < GRID_SIZE; y++) {
                    for (let x = 0; x < GRID_SIZE; x++) {
                        if (originalPixels[y][x]) {
                            const offset = Math.sin((frame * 0.3) + (x + y) * 0.3) * 2;
                            pixels[y][x] = originalPixels[y][x];

                            // Create wave effect by shifting colors
                            if (Math.abs(offset) > 1) {
                                ctx.save();
                                ctx.translate(x * PIXEL_SIZE + PIXEL_SIZE / 2, y * PIXEL_SIZE + PIXEL_SIZE / 2);
                                ctx.scale(1 + offset * 0.1, 1 + offset * 0.1);
                                ctx.fillStyle = originalPixels[y][x];
                                ctx.fillRect(
                                    -PIXEL_SIZE / 2 + 1,
                                    -PIXEL_SIZE / 2 + 1,
                                    PIXEL_SIZE - 2,
                                    PIXEL_SIZE - 2
                                );
                                ctx.restore();
                            }
                        }
                    }
                }

                drawGrid();

                // Color cycle effect
                for (let y = 0; y < GRID_SIZE; y++) {
                    for (let x = 0; x < GRID_SIZE; x++) {
                        if (pixels[y][x] && originalPixels[y][x]) {
                            const hueShift = (frame * 10) % 360;
                            const hsl = hexToHSL(originalPixels[y][x]);
                            hsl.h = (hsl.h + hueShift) % 360;
                            pixels[y][x] = hslToHex(hsl.h, hsl.s, hsl.l);
                        }
                    }
                }

                drawGrid();

                if (frame < animationFrames) {
                    requestAnimationFrame(animate);
                } else {
                    // Restore original
                    pixels = originalPixels.map(row => [...row]);
                    drawGrid();
                    isAnimating = false;
                }
            }

            animate();
        }

        // Random fill
        function randomFill() {
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    if (Math.random() > 0.7) {
                        pixels[y][x] = colors[Math.floor(Math.random() * colors.length)];
                        pixelCount++;
                    }
                }
            }
            pixelCountEl.textContent = pixelCount;
            drawGrid();
        }

        // Color conversion utilities
        function hexToHSL(hex) {
            let r = parseInt(hex.slice(1, 3), 16) / 255;
            let g = parseInt(hex.slice(3, 5), 16) / 255;
            let b = parseInt(hex.slice(5, 7), 16) / 255;

            let max = Math.max(r, g, b);
            let min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;

            if (max === min) {
                h = s = 0;
            } else {
                let d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);

                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }

            return { h: h * 360, s: s * 100, l: l * 100 };
        }

        function hslToHex(h, s, l) {
            s /= 100;
            l /= 100;

            let c = (1 - Math.abs(2 * l - 1)) * s;
            let x = c * (1 - Math.abs((h / 60) % 2 - 1));
            let m = l - c / 2;
            let r, g, b;

            if (h < 60) { r = c; g = x; b = 0; }
            else if (h < 120) { r = x; g = c; b = 0; }
            else if (h < 180) { r = 0; g = c; b = x; }
            else if (h < 240) { r = 0; g = x; b = c; }
            else if (h < 300) { r = x; g = 0; b = c; }
            else { r = c; g = 0; b = x; }

            r = Math.round((r + m) * 255).toString(16).padStart(2, '0');
            g = Math.round((g + m) * 255).toString(16).padStart(2, '0');
            b = Math.round((b + m) * 255).toString(16).padStart(2, '0');

            return `#${r}${g}${b}`;
        }

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        initGrid();
    </script>
</body>
</html>
