<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pixel Painter - ピクセルペインター</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .canvas-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        #pixelCanvas {
            border: 3px solid #ddd;
            border-radius: 8px;
            cursor: crosshair;
            display: block;
            margin: 0 auto;
            touch-action: none;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .color-palette {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .color-btn {
            width: 40px;
            height: 40px;
            border: 3px solid white;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .color-btn:hover {
            transform: scale(1.1);
        }

        .color-btn.active {
            border-color: #333;
            transform: scale(1.15);
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .tools {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .tool-btn {
            padding: 10px 20px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .tool-btn.active {
            background: #667eea;
            color: white;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 22px;
            }

            .color-btn {
                width: 35px;
                height: 35px;
            }

            button {
                padding: 10px 18px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 ピクセルペインター</h1>
        <p class="subtitle">タップして描こう！</p>

        <div class="canvas-container">
            <canvas id="pixelCanvas" width="320" height="320"></canvas>
        </div>

        <div class="tools">
            <button class="tool-btn active" id="drawTool">✏️ 描く</button>
            <button class="tool-btn" id="eraseTool">🧹 消す</button>
        </div>

        <div class="color-palette" id="colorPalette"></div>

        <div class="controls">
            <button class="btn-secondary" id="clearBtn">🗑️ クリア</button>
            <button class="btn-success" id="downloadBtn">💾 保存</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d');

        const GRID_SIZE = 16;
        const PIXEL_SIZE = canvas.width / GRID_SIZE;

        // カラーパレット
        const colors = [
            '#000000', '#ffffff', '#ff6b6b', '#ee5a6f',
            '#f0932b', '#f1c40f', '#7bed9f', '#2ed573',
            '#1e90ff', '#3742fa', '#a55eea', '#ff6348',
            '#ff9ff3', '#54a0ff', '#5f27cd', '#00d2d3'
        ];

        // ピクセルデータ
        let pixels = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(null));

        let currentColor = colors[0];
        let isDrawing = false;
        let currentTool = 'draw'; // draw or erase

        // カラーパレット作成
        const paletteContainer = document.getElementById('colorPalette');
        colors.forEach((color, index) => {
            const btn = document.createElement('div');
            btn.className = 'color-btn' + (index === 0 ? ' active' : '');
            btn.style.backgroundColor = color;
            btn.addEventListener('click', () => {
                currentColor = color;
                currentTool = 'draw';
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('drawTool').classList.add('active');
                document.getElementById('eraseTool').classList.remove('active');
            });
            paletteContainer.appendChild(btn);
        });

        // キャンバス描画
        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // グリッド線
            ctx.strokeStyle = '#f0f0f0';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * PIXEL_SIZE, 0);
                ctx.lineTo(i * PIXEL_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * PIXEL_SIZE);
                ctx.lineTo(canvas.width, i * PIXEL_SIZE);
                ctx.stroke();
            }

            // ピクセル描画
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    if (pixels[y][x]) {
                        ctx.fillStyle = pixels[y][x];
                        ctx.fillRect(
                            x * PIXEL_SIZE + 1,
                            y * PIXEL_SIZE + 1,
                            PIXEL_SIZE - 2,
                            PIXEL_SIZE - 2
                        );
                    }
                }
            }
        }

        // ピクセル描画・消去
        function paintPixel(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const x = Math.floor((clientX - rect.left) * scaleX / PIXEL_SIZE);
            const y = Math.floor((clientY - rect.top) * scaleY / PIXEL_SIZE);

            if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) {
                if (currentTool === 'draw') {
                    pixels[y][x] = currentColor;
                } else {
                    pixels[y][x] = null;
                }
                drawCanvas();
            }
        }

        // マウスイベント
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            paintPixel(e.clientX, e.clientY);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDrawing) {
                paintPixel(e.clientX, e.clientY);
            }
        });

        canvas.addEventListener('mouseup', () => {
            isDrawing = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isDrawing = false;
        });

        // タッチイベント
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            paintPixel(touch.clientX, touch.clientY);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            paintPixel(touch.clientX, touch.clientY);
        });

        // ツール切り替え
        document.getElementById('drawTool').addEventListener('click', () => {
            currentTool = 'draw';
            document.getElementById('drawTool').classList.add('active');
            document.getElementById('eraseTool').classList.remove('active');
        });

        document.getElementById('eraseTool').addEventListener('click', () => {
            currentTool = 'erase';
            document.getElementById('eraseTool').classList.add('active');
            document.getElementById('drawTool').classList.remove('active');
        });

        // クリアボタン
        document.getElementById('clearBtn').addEventListener('click', () => {
            pixels = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(null));
            drawCanvas();
        });

        // ダウンロードボタン
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'pixel-art.png';
            link.href = canvas.toDataURL();
            link.click();
        });

        // LocalStorageに自動保存
        function saveToLocalStorage() {
            localStorage.setItem('pixelPainterData', JSON.stringify(pixels));
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem('pixelPainterData');
            if (saved) {
                pixels = JSON.parse(saved);
                drawCanvas();
            }
        }

        // 一定間隔で自動保存
        setInterval(saveToLocalStorage, 5000);

        // 初期化
        loadFromLocalStorage();
        drawCanvas();
    </script>
</body>
</html>
