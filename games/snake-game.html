<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake - ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .title {
            color: #0ff;
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 0 0 20px #0ff, 0 0 40px #0ff, 0 0 60px #0ff;
        }

        .score-display {
            display: flex;
            gap: 40px;
            color: #fff;
            font-size: 18px;
        }

        .score-item {
            text-align: center;
        }

        .score-value {
            font-size: 32px;
            font-weight: bold;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
        }

        canvas {
            border: 3px solid #0ff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5), inset 0 0 30px rgba(0, 255, 255, 0.1);
            background: #000;
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border: 2px solid #0ff;
            border-radius: 25px;
            background: transparent;
            color: #0ff;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 20px #0ff;
        }

        .fullscreen-btn {
            border-color: #f0f;
            color: #f0f;
        }

        .fullscreen-btn:hover {
            background: #f0f;
            color: #000;
            box-shadow: 0 0 20px #f0f;
        }

        .game-over {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px 60px;
            border: 3px solid #f00;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.5);
        }

        .game-over.show {
            display: block;
        }

        .game-over h2 {
            color: #f00;
            font-size: 36px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #f00;
        }

        .game-over p {
            color: #fff;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .mobile-controls {
            display: none;
            gap: 10px;
            margin-top: 20px;
        }

        .mobile-btn {
            width: 60px;
            height: 60px;
            border: 2px solid #0ff;
            border-radius: 15px;
            background: rgba(0, 255, 255, 0.2);
            color: #0ff;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .mobile-btn:active {
            background: #0ff;
            color: #000;
        }

        .arrow-container {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
        }

        .arrow-container .mobile-btn:nth-child(1) {
            grid-column: 2;
            grid-row: 1;
        }

        .arrow-container .mobile-btn:nth-child(2) {
            grid-column: 1;
            grid-row: 2;
        }

        .arrow-container .mobile-btn:nth-child(3) {
            grid-column: 3;
            grid-row: 2;
        }

        .arrow-container .mobile-btn:nth-child(4) {
            grid-column: 2;
            grid-row: 3;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 24px;
            }

            canvas {
                width: 90vw;
                height: 90vw;
                max-width: 400px;
                max-height: 400px;
            }

            .mobile-controls {
                display: flex;
            }

            button {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">NEON SNAKE</h1>
        <div class="score-display">
            <div class="score-item">
                <div>SCORE</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-item">
                <div>BEST</div>
                <div class="score-value" id="best">0</div>
            </div>
        </div>
        <canvas id="canvas" width="500" height="500"></canvas>
        <div class="controls">
            <button id="start">スタート</button>
            <button id="pause">一時停止</button>
            <button id="fullscreen" class="fullscreen-btn">全画面</button>
        </div>
        <div class="mobile-controls">
            <div class="arrow-container">
                <button class="mobile-btn" data-dir="up">▲</button>
                <button class="mobile-btn" data-dir="left">◀</button>
                <button class="mobile-btn" data-dir="right">▶</button>
                <button class="mobile-btn" data-dir="down">▼</button>
            </div>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>GAME OVER</h2>
        <p>スコア: <span id="finalScore">0</span></p>
        <button id="restart">再挑戦</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const gridCount = canvas.width / gridSize;

        let snake = [{ x: 5, y: 5 }];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let food = { x: 10, y: 10 };
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('snakeBest')) || 0;
        let gameLoop = null;
        let isPlaying = false;
        let isPaused = false;
        let speed = 100;
        let particles = [];

        document.getElementById('best').textContent = bestScore;

        // 粒子エフェクト
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.life = 30;
                this.maxLife = 30;
                this.color = color;
                this.size = Math.random() * 4 + 2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
            }

            draw() {
                const alpha = this.life / this.maxLife;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
                ctx.fillStyle = this.color.replace(')', `, ${alpha})`).replace('rgb', 'rgba');
                ctx.fill();
            }
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * gridCount),
                    y: Math.floor(Math.random() * gridCount)
                };
            } while (snake.some(s => s.x === food.x && s.y === food.y));
        }

        function update() {
            if (!isPlaying || isPaused) return;

            direction = { ...nextDirection };
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // 壁との衝突（ゲームオーバー）
            if (head.x < 0 || head.x >= gridCount || head.y < 0 || head.y >= gridCount) {
                gameOver();
                return;
            }

            // 自分との衝突（ゲームオーバー）
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 食べ物を食べた
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                if (score > bestScore) {
                    bestScore = score;
                    document.getElementById('best').textContent = bestScore;
                    localStorage.setItem('snakeBest', bestScore);
                }
                createParticles(
                    head.x * gridSize + gridSize / 2,
                    head.y * gridSize + gridSize / 2,
                    'rgb(0, 255, 255)'
                );
                spawnFood();
                // スピードアップ
                if (speed > 50) {
                    speed -= 1;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(update, speed);
                }
            } else {
                snake.pop();
            }

            // 粒子を更新
            particles = particles.filter(p => {
                p.update();
                return p.life > 0;
            });
        }

        function draw() {
            // 背景
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // グリッド（薄く）
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= gridCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 粒子
            particles.forEach(p => p.draw());

            // 食べ物
            const foodPulse = Math.sin(Date.now() * 0.01) * 3;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2 + foodPulse,
                0,
                Math.PI * 2
            );
            ctx.fillStyle = '#f0f';
            ctx.shadowColor = '#f0f';
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0;

            // ヘビ
            snake.forEach((segment, index) => {
                const hue = (180 + index * 5) % 360;
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    0,
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    gridSize / 2
                );
                gradient.addColorStop(0, `hsl(${hue}, 100%, 60%)`);
                gradient.addColorStop(1, `hsl(${hue}, 100%, 40%)`);

                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    4
                );
                ctx.fillStyle = gradient;
                ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
                ctx.shadowBlur = index === 0 ? 15 : 5;
                ctx.fill();
                ctx.shadowBlur = 0;

                // 頭に目を描く
                if (index === 0) {
                    ctx.fillStyle = '#000';
                    const eyeOffsetX = direction.x * 4;
                    const eyeOffsetY = direction.y * 4;
                    ctx.beginPath();
                    ctx.arc(
                        segment.x * gridSize + gridSize / 2 + eyeOffsetX - 3,
                        segment.y * gridSize + gridSize / 2 + eyeOffsetY - 3,
                        2, 0, Math.PI * 2
                    );
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(
                        segment.x * gridSize + gridSize / 2 + eyeOffsetX + 3,
                        segment.y * gridSize + gridSize / 2 + eyeOffsetY - 3,
                        2, 0, Math.PI * 2
                    );
                    ctx.fill();
                }
            });

            requestAnimationFrame(draw);
        }

        function gameOver() {
            isPlaying = false;
            clearInterval(gameLoop);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.add('show');
            createParticles(
                snake[0].x * gridSize + gridSize / 2,
                snake[0].y * gridSize + gridSize / 2,
                'rgb(255, 0, 0)'
            );
        }

        function startGame() {
            snake = [{ x: 5, y: 5 }];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            speed = 100;
            particles = [];
            document.getElementById('score').textContent = score;
            document.getElementById('gameOver').classList.remove('show');
            spawnFood();
            isPlaying = true;
            isPaused = false;
            document.getElementById('pause').textContent = '一時停止';
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, speed);
        }

        // キーボード操作
        document.addEventListener('keydown', e => {
            if (!isPlaying) return;

            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y === 0) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y === 0) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x === 0) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x === 0) nextDirection = { x: 1, y: 0 };
                    break;
                case ' ':
                    e.preventDefault();
                    isPaused = !isPaused;
                    document.getElementById('pause').textContent = isPaused ? '再生' : '一時停止';
                    break;
            }
        });

        // モバイル操作
        document.querySelectorAll('.mobile-btn').forEach(btn => {
            btn.addEventListener('touchstart', e => {
                e.preventDefault();
                if (!isPlaying) return;

                const dir = btn.dataset.dir;
                switch (dir) {
                    case 'up':
                        if (direction.y === 0) nextDirection = { x: 0, y: -1 };
                        break;
                    case 'down':
                        if (direction.y === 0) nextDirection = { x: 0, y: 1 };
                        break;
                    case 'left':
                        if (direction.x === 0) nextDirection = { x: -1, y: 0 };
                        break;
                    case 'right':
                        if (direction.x === 0) nextDirection = { x: 1, y: 0 };
                        break;
                }
            });
        });

        document.getElementById('start').addEventListener('click', startGame);
        document.getElementById('restart').addEventListener('click', startGame);

        document.getElementById('pause').addEventListener('click', (e) => {
            if (!isPlaying) return;
            isPaused = !isPaused;
            e.target.textContent = isPaused ? '再生' : '一時停止';
        });

        document.getElementById('fullscreen').addEventListener('click', () => {
            if (canvas.requestFullscreen) {
                canvas.requestFullscreen();
            } else if (canvas.webkitRequestFullscreen) {
                canvas.webkitRequestFullscreen();
            }
        });

        // 初期描画
        draw();
    </script>
</body>
</html>
