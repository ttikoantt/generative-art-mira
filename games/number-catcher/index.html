<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Catcher - 数字キャッチャー</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #eee;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            color: #fff;
            margin-bottom: 20px;
            font-size: 18px;
        }
        .stat-box {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        .stat-label {
            font-size: 12px;
            opacity: 0.7;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            margin-top: 5px;
        }
        #gameArea {
            width: 100%;
            height: 400px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .number {
            position: absolute;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.1s;
            user-select: none;
            -webkit-user-select: none;
        }
        .number:active {
            transform: scale(0.95);
        }
        .number.correct {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            animation: correct 0.3s ease;
        }
        .number.wrong {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            animation: wrong 0.3s ease;
        }
        @keyframes correct {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        @keyframes wrong {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .target {
            color: #fff;
            font-size: 20px;
            margin-bottom: 20px;
        }
        .target-number {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }
        .fullscreen-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .fullscreen-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            z-index: 100;
            display: none;
        }
        .game-over h2 {
            font-size: 32px;
            margin-bottom: 20px;
        }
        .game-over p {
            font-size: 18px;
            margin-bottom: 30px;
        }
        .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 18px;
            transition: transform 0.2s;
        }
        .restart-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔢 Number Catcher</h1>
        
        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">タイム</div>
                <div class="stat-value" id="timer">30</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">連続</div>
                <div class="stat-value" id="combo">0</div>
            </div>
        </div>

        <div class="target">
            ターゲット: <span class="target-number" id="targetNumber">0</span>
        </div>

        <div id="gameArea"></div>

        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>

        <div class="game-over" id="gameOver">
            <h2>ゲームオーバー！</h2>
            <p>最終スコア: <span id="finalScore">0</span></p>
            <button class="restart-btn" onclick="restartGame()">もう一度プレイ</button>
        </div>
    </div>

    <script>
        let score = 0;
        let timer = 30;
        let combo = 0;
        let targetNumber = 0;
        let gameActive = true;
        let numbers = [];
        let gameInterval;
        let timerInterval;
        let spawnInterval;

        const gameArea = document.getElementById('gameArea');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const comboEl = document.getElementById('combo');
        const targetEl = document.getElementById('targetNumber');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');

        function generateTarget() {
            targetNumber = Math.floor(Math.random() * 10);
            targetEl.textContent = targetNumber;
        }

        function spawnNumber() {
            if (!gameActive) return;

            const number = document.createElement('div');
            number.className = 'number';
            number.textContent = Math.floor(Math.random() * 10);

            const size = 60;
            const maxX = gameArea.clientWidth - size;
            const maxY = gameArea.clientHeight - size;

            number.style.left = Math.random() * maxX + 'px';
            number.style.top = Math.random() * maxY + 'px';

            number.addEventListener('click', () => clickNumber(number));
            number.addEventListener('touchstart', (e) => {
                e.preventDefault();
                clickNumber(number);
            });

            gameArea.appendChild(number);
            numbers.push(number);

            // 古い数字を削除
            if (numbers.length > 8) {
                const old = numbers.shift();
                old.remove();
            }
        }

        function clickNumber(element) {
            if (!gameActive) return;

            const value = parseInt(element.textContent);
            
            if (value === targetNumber) {
                // 正解
                element.classList.add('correct');
                score += 10 + combo * 2;
                combo++;
                updateStats();
                generateTarget();
                
                setTimeout(() => element.remove(), 300);
                numbers = numbers.filter(n => n !== element);
            } else {
                // 不正解
                element.classList.add('wrong');
                combo = 0;
                updateStats();
            }
        }

        function updateStats() {
            scoreEl.textContent = score;
            comboEl.textContent = combo;
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timer--;
                timerEl.textContent = timer;
                
                if (timer <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameActive = false;
            clearInterval(gameInterval);
            clearInterval(timerInterval);
            clearInterval(spawnInterval);
            
            finalScoreEl.textContent = score;
            gameOverEl.style.display = 'block';
        }

        function restartGame() {
            gameOverEl.style.display = 'none';
            gameArea.innerHTML = '';
            numbers = [];
            score = 0;
            timer = 30;
            combo = 0;
            gameActive = true;
            updateStats();
            timerEl.textContent = timer;
            
            generateTarget();
            startTimer();
            spawnInterval = setInterval(spawnNumber, 800);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ゲーム開始
        generateTarget();
        startTimer();
        spawnInterval = setInterval(spawnNumber, 800);
    </script>
</body>
</html>
