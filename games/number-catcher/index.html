<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Catcher - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0f;
            color: #fff;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .target {
            background: rgba(240, 147, 251, 0.2);
            border: 2px solid rgba(240, 147, 251, 0.5);
            border-radius: 16px;
            padding: 20px 40px;
            margin-bottom: 30px;
            text-align: center;
        }

        .target-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .target-value {
            font-size: 48px;
            font-weight: 700;
            color: #f093fb;
        }

        .game-canvas {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 400px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .number {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .number:active {
            transform: scale(0.9);
        }

        .number.caught {
            animation: catch 0.3s ease-out forwards;
        }

        @keyframes catch {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        .feedback {
            position: absolute;
            font-size: 24px;
            font-weight: 700;
            pointer-events: none;
            animation: feedback 0.8s ease-out forwards;
        }

        .feedback.correct {
            color: #4ade80;
        }

        .feedback.wrong {
            color: #f87171;
        }

        @keyframes feedback {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px) scale(1.2);
            }
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-btn {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .control-btn.primary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .control-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(240, 147, 251, 0.4);
        }

        .control-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .control-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 15, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            z-index: 5;
        }

        .game-over h2 {
            font-size: 36px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-over p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
        }

        .game-over .final-score {
            font-size: 64px;
            font-weight: 700;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
        }

        .combo-display {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 14px;
            font-weight: 700;
            color: #f093fb;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .combo-display.active {
            opacity: 1;
        }

        .timer-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            transition: width 0.1s linear;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 24px;
            }

            .stat-value {
                font-size: 28px;
            }

            .target-value {
                font-size: 36px;
            }

            .game-canvas {
                height: 350px;
            }

            .number {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="fullscreen-btn" id="fullscreenBtn" title="全画面表示">⛶</button>

        <div class="game-area">
            <div class="header">
                <h1>🔢 Number Catcher</h1>
                <p>ターゲットの条件に合う数字をタップ！</p>
            </div>

            <div class="stats">
                <div class="stat">
                    <div class="stat-label">スコア</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">ライフ</div>
                    <div class="stat-value" id="lives">3</div>
                </div>
                <div class="stat">
                    <div class="stat-label">レベル</div>
                    <div class="stat-value" id="level">1</div>
                </div>
            </div>

            <div class="target">
                <div class="target-label">ターゲット</div>
                <div class="target-value" id="target">偶数をタップ</div>
            </div>

            <div class="game-canvas" id="gameCanvas">
                <div class="timer-bar">
                    <div class="timer-fill" id="timerFill"></div>
                </div>
                <div class="combo-display" id="comboDisplay"></div>
                <div class="game-over" id="gameOver" style="display: none;">
                    <h2>ゲームオーバー</h2>
                    <p>最終スコア</p>
                    <div class="final-score" id="finalScore">0</div>
                    <button class="control-btn primary" id="restartBtn">もう一度プレイ</button>
                </div>
            </div>

            <div class="controls">
                <button class="control-btn primary" id="startBtn">ゲーム開始</button>
                <button class="control-btn secondary" id="pauseBtn">一時停止</button>
            </div>
        </div>
    </div>

    <script>
        // Game state
        let gameState = {
            score: 0,
            lives: 3,
            level: 1,
            combo: 0,
            maxCombo: 0,
            isPlaying: false,
            isPaused: false,
            numbers: [],
            timer: 60,
            timerInterval: null,
            spawnInterval: null,
            target: null
        };

        // Target conditions
        const targetConditions = [
            { text: '偶数をタップ', check: n => n % 2 === 0 },
            { text: '奇数をタップ', check: n => n % 2 !== 0 },
            { text: '5の倍数をタップ', check: n => n % 5 === 0 },
            { text: '3の倍数をタップ', check: n => n % 3 === 0 },
            { text: '10より大きい', check: n => n > 10 },
            { text: '10以下', check: n => n <= 10 },
            { text: '素数をタップ', check: n => isPrime(n) }
        ];

        function isPrime(n) {
            if (n < 2) return false;
            for (let i = 2; i <= Math.sqrt(n); i++) {
                if (n % i === 0) return false;
            }
            return true;
        }

        // Colors
        const colors = [
            'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
            'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
            'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
            'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
            'linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)',
            'linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)',
            'linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)'
        ];

        // DOM elements
        const gameCanvas = document.getElementById('gameCanvas');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const levelEl = document.getElementById('level');
        const targetEl = document.getElementById('target');
        const timerFill = document.getElementById('timerFill');
        const comboDisplay = document.getElementById('comboDisplay');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        // Start game
        function startGame() {
            gameState.score = 0;
            gameState.lives = 3;
            gameState.level = 1;
            gameState.combo = 0;
            gameState.maxCombo = 0;
            gameState.isPlaying = true;
            gameState.isPaused = false;
            gameState.timer = 60;
            gameState.numbers = [];

            updateUI();
            setNewTarget();
            startTimer();
            startSpawning();

            startBtn.textContent = 'リスタート';
            pauseBtn.textContent = '一時停止';
            gameOverEl.style.display = 'none';
        }

        // Set new target
        function setNewTarget() {
            const availableTargets = targetConditions.slice(0, Math.min(3 + gameState.level, targetConditions.length));
            gameState.target = availableTargets[Math.floor(Math.random() * availableTargets.length)];
            targetEl.textContent = gameState.target.text;
        }

        // Start timer
        function startTimer() {
            clearInterval(gameState.timerInterval);
            gameState.timerInterval = setInterval(() => {
                if (!gameState.isPaused && gameState.isPlaying) {
                    gameState.timer--;
                    updateTimer();

                    if (gameState.timer <= 0) {
                        changeTarget();
                    }
                }
            }, 1000);
        }

        // Change target
        function changeTarget() {
            setNewTarget();
            gameState.timer = Math.max(30, 60 - gameState.level * 5);

            // Clear some numbers
            gameState.numbers = gameState.numbers.slice(0, Math.floor(gameState.numbers.length / 2));
            renderNumbers();
        }

        // Update timer display
        function updateTimer() {
            const percentage = (gameState.timer / 60) * 100;
            timerFill.style.width = `${percentage}%`;
        }

        // Start spawning numbers
        function startSpawning() {
            clearInterval(gameState.spawnInterval);
            const spawnRate = Math.max(500, 1500 - gameState.level * 100);

            gameState.spawnInterval = setInterval(() => {
                if (!gameState.isPaused && gameState.isPlaying) {
                    spawnNumber();
                }
            }, spawnRate);
        }

        // Spawn number
        function spawnNumber() {
            if (gameState.numbers.length >= 15) return;

            const canvasRect = gameCanvas.getBoundingClientRect();
            const size = 50;
            const x = Math.random() * (canvasRect.width - size - 20) + 10;
            const y = Math.random() * (canvasRect.height - size - 60) + 50;
            const value = Math.floor(Math.random() * 20) + 1;
            const color = colors[Math.floor(Math.random() * colors.length)];

            const number = {
                id: Date.now() + Math.random(),
                x,
                y,
                size,
                value,
                color,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2,
                life: 500
            };

            gameState.numbers.push(number);
            renderNumber(number);

            // Remove after life expires
            setTimeout(() => {
                const index = gameState.numbers.findIndex(n => n.id === number.id);
                if (index !== -1) {
                    gameState.numbers.splice(index, 1);
                    const el = document.getElementById(`number-${number.id}`);
                    if (el) el.remove();
                }
            }, number.life);
        }

        // Render number
        function renderNumber(number) {
            const el = document.createElement('div');
            el.className = 'number';
            el.id = `number-${number.id}`;
            el.style.left = `${number.x}px`;
            el.style.top = `${number.y}px`;
            el.style.width = `${number.size}px`;
            el.style.height = `${number.size}px`;
            el.style.background = number.color;
            el.style.color = '#fff';
            el.style.boxShadow = '0 4px 12px rgba(0,0,0,0.3)';
            el.textContent = number.value;

            el.addEventListener('click', () => catchNumber(number));
            el.addEventListener('touchstart', (e) => {
                e.preventDefault();
                catchNumber(number);
            });

            gameCanvas.appendChild(el);

            // Animate
            animateNumber(number);
        }

        // Animate number
        function animateNumber(number) {
            const el = document.getElementById(`number-${number.id}`);
            if (!el) return;

            const canvasRect = gameCanvas.getBoundingClientRect();

            number.x += number.vx;
            number.y += number.vy;

            // Bounce off walls
            if (number.x <= 0 || number.x >= canvasRect.width - number.size) {
                number.vx *= -1;
            }
            if (number.y <= 50 || number.y >= canvasRect.height - number.size) {
                number.vy *= -1;
            }

            el.style.left = `${number.x}px`;
            el.style.top = `${number.y}px`;

            requestAnimationFrame(() => animateNumber(number));
        }

        // Render all numbers
        function renderNumbers() {
            gameCanvas.querySelectorAll('.number').forEach(el => el.remove());
            gameState.numbers.forEach(n => renderNumber(n));
        }

        // Catch number
        function catchNumber(number) {
            if (!gameState.isPlaying || gameState.isPaused) return;

            const isCorrect = gameState.target.check(number.value);

            if (isCorrect) {
                // Correct!
                gameState.combo++;
                gameState.maxCombo = Math.max(gameState.maxCombo, gameState.combo);
                const points = 10 * gameState.combo * gameState.level;
                gameState.score += points;

                showFeedback(number.x, number.y, `+${points}`, 'correct');
                showCombo();
            } else {
                // Wrong!
                gameState.combo = 0;
                gameState.lives--;
                showFeedback(number.x, number.y, '×', 'wrong');
                hideCombo();

                if (gameState.lives <= 0) {
                    endGame();
                    return;
                }
            }

            // Remove number
            const index = gameState.numbers.findIndex(n => n.id === number.id);
            if (index !== -1) {
                gameState.numbers.splice(index, 1);
            }

            const el = document.getElementById(`number-${number.id}`);
            if (el) {
                el.classList.add('caught');
                setTimeout(() => el.remove(), 300);
            }

            // Level up
            if (gameState.score >= gameState.level * 200) {
                gameState.level++;
                startSpawning();
            }

            updateUI();
        }

        // Show feedback
        function showFeedback(x, y, text, type) {
            const feedback = document.createElement('div');
            feedback.className = `feedback ${type}`;
            feedback.textContent = text;
            feedback.style.left = `${x}px`;
            feedback.style.top = `${y}px`;
            gameCanvas.appendChild(feedback);

            setTimeout(() => feedback.remove(), 800);
        }

        // Show combo
        function showCombo() {
            if (gameState.combo >= 2) {
                comboDisplay.textContent = `${gameState.combo} COMBO!`;
                comboDisplay.classList.add('active');
            }
        }

        // Hide combo
        function hideCombo() {
            comboDisplay.classList.remove('active');
        }

        // Update UI
        function updateUI() {
            scoreEl.textContent = gameState.score;
            livesEl.textContent = gameState.lives;
            levelEl.textContent = gameState.level;
        }

        // End game
        function endGame() {
            gameState.isPlaying = false;
            clearInterval(gameState.timerInterval);
            clearInterval(gameState.spawnInterval);

            finalScoreEl.textContent = gameState.score;
            gameOverEl.style.display = 'flex';
        }

        // Pause game
        function togglePause() {
            if (!gameState.isPlaying) return;

            gameState.isPaused = !gameState.isPaused;
            pauseBtn.textContent = gameState.isPaused ? '再開' : '一時停止';
        }

        // Event listeners
        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', togglePause);
        restartBtn.addEventListener('click', startGame);

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState.isPlaying) {
                    togglePause();
                } else {
                    startGame();
                }
            }
        });
    </script>
</body>
</html>
