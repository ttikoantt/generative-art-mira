<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Sequence Puzzle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            margin-bottom: 10px;
            text-align: center;
            color: #00d9ff;
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
        }

        .subtitle {
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            color: #8899a6;
            margin-bottom: 20px;
            text-align: center;
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
            font-size: clamp(1rem, 2.5vw, 1.3rem);
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 217, 255, 0.3);
        }

        .stat-label {
            color: #8899a6;
            font-size: 0.9em;
        }

        .stat-value {
            color: #00d9ff;
            font-weight: bold;
            font-size: 1.3em;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            width: 100%;
            max-width: 700px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 217, 255, 0.2);
        }

        .sequence-display {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
            text-align: center;
        }

        .sequence-label {
            color: #8899a6;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            margin-bottom: 15px;
        }

        .sequence-numbers {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: #00d9ff;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.1em;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .number {
            background: rgba(0, 217, 255, 0.1);
            padding: 10px 15px;
            border-radius: 8px;
            border: 2px solid rgba(0, 217, 255, 0.3);
            min-width: 50px;
            text-align: center;
        }

        .number.missing {
            border-style: dashed;
            border-color: #ffd700;
            color: #ffd700;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .options-container {
            margin: 25px 0;
        }

        .options-label {
            color: #8899a6;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            margin-bottom: 15px;
            text-align: center;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }

        .option-btn {
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.2) 0%, rgba(0, 217, 255, 0.1) 100%);
            border: 2px solid rgba(0, 217, 255, 0.4);
            color: #00d9ff;
            padding: 20px;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        .option-btn:hover {
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.4) 0%, rgba(0, 217, 255, 0.2) 100%);
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.3);
        }

        .option-btn:active {
            transform: translateY(0);
        }

        .option-btn.correct {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            border-color: #00ff88;
            color: #000;
            animation: success 0.5s;
        }

        .option-btn.wrong {
            background: linear-gradient(135deg, #ff4757 0%, #ff3344 100%);
            border-color: #ff4757;
            color: #fff;
            animation: shake 0.5s;
        }

        @keyframes success {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .hint-container {
            margin: 20px 0;
            text-align: center;
        }

        .hint-btn {
            background: rgba(255, 215, 0, 0.1);
            border: 2px solid rgba(255, 215, 0, 0.4);
            color: #ffd700;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            transition: all 0.3s;
        }

        .hint-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: scale(1.05);
        }

        .hint-text {
            margin-top: 15px;
            padding: 15px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 10px;
            color: #ffd700;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            display: none;
        }

        .hint-text.show {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px 60px;
            border-radius: 20px;
            font-size: clamp(2rem, 5vw, 3rem);
            z-index: 1000;
            display: none;
            text-align: center;
        }

        .feedback.correct {
            color: #00ff88;
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
        }

        .feedback.wrong {
            color: #ff4757;
            border: 3px solid #ff4757;
            box-shadow: 0 0 30px rgba(255, 71, 87, 0.5);
        }

        .feedback.show {
            display: block;
            animation: popIn 0.3s;
        }

        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0); }
            to { transform: translate(-50%, -50%) scale(1); }
        }

        .difficulty-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .difficulty-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #eee;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            transition: all 0.3s;
        }

        .difficulty-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .difficulty-btn.active {
            background: rgba(0, 217, 255, 0.3);
            border-color: #00d9ff;
            color: #00d9ff;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0, 217, 255, 0.2);
            color: #00d9ff;
            border: 2px solid #00d9ff;
            padding: 10px 15px;
            font-size: 1.5rem;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 217, 255, 0.4);
            transform: scale(1.1);
        }

        @media (max-width: 600px) {
            .game-container {
                padding: 20px;
            }
            
            .sequence-numbers {
                gap: 10px;
            }
            
            .number {
                min-width: 40px;
                padding: 8px 12px;
            }
            
            .options {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
    
    <h1>🔢 Number Sequence Puzzle</h1>
    <p class="subtitle">数列の法則を見つけて、次の数字を当てよう！</p>
    
    <div class="stats">
        <div class="stat">
            <div class="stat-label">スコア</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">連続正解</div>
            <div class="stat-value" id="streak">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">最高記録</div>
            <div class="stat-value" id="highScore">0</div>
        </div>
    </div>
    
    <div class="difficulty-selector">
        <button class="difficulty-btn active" data-difficulty="easy" onclick="setDifficulty('easy')">😊 易しい</button>
        <button class="difficulty-btn" data-difficulty="medium" onclick="setDifficulty('medium')">🤔 普通</button>
        <button class="difficulty-btn" data-difficulty="hard" onclick="setDifficulty('hard')">😰 難しい</button>
    </div>
    
    <div class="game-container">
        <div class="sequence-display">
            <div class="sequence-label">次の数字は？</div>
            <div class="sequence-numbers" id="sequence"></div>
        </div>
        
        <div class="options-container">
            <div class="options-label">選択肢から選んでね</div>
            <div class="options" id="options"></div>
        </div>
        
        <div class="hint-container">
            <button class="hint-btn" onclick="showHint()">💡 ヒント</button>
            <div class="hint-text" id="hint"></div>
        </div>
    </div>
    
    <div class="feedback" id="feedback"></div>

    <script>
        let score = 0;
        let streak = 0;
        let highScore = parseInt(localStorage.getItem('numberSequenceHighScore')) || 0;
        let currentSequence = [];
        let correctAnswer = 0;
        let currentHint = '';
        let difficulty = 'easy';
        let canAnswer = true;

        document.getElementById('highScore').textContent = highScore;

        const generators = {
            easy: [
                {
                    generate: () => {
                        const start = Math.floor(Math.random() * 10) + 1;
                        const step = Math.floor(Math.random() * 5) + 1;
                        const sequence = [start, start + step, start + step * 2, start + step * 3];
                        return {
                            sequence: sequence,
                            answer: start + step * 4,
                            hint: `${step}ずつ増えているよ`
                        };
                    }
                },
                {
                    generate: () => {
                        const start = Math.floor(Math.random() * 20) + 10;
                        const step = -(Math.floor(Math.random() * 3) + 1);
                        const sequence = [start, start + step, start + step * 2, start + step * 3];
                        return {
                            sequence: sequence,
                            answer: start + step * 4,
                            hint: `${Math.abs(step)}ずつ減っているよ`
                        };
                    }
                },
                {
                    generate: () => {
                        const base = Math.floor(Math.random() * 5) + 2;
                        const sequence = [base, base * 2, base * 3, base * 4];
                        return {
                            sequence: sequence,
                            answer: base * 5,
                            hint: `${base}の倍数だよ`
                        };
                    }
                }
            ],
            medium: [
                {
                    generate: () => {
                        const a = Math.floor(Math.random() * 3) + 1;
                        const sequence = [];
                        for (let i = 0; i < 5; i++) {
                            sequence.push(a * i * i);
                        }
                        return {
                            sequence: sequence.slice(0, 4),
                            answer: sequence[4],
                            hint: '平方の数列だよ（n²）'
                        };
                    }
                },
                {
                    generate: () => {
                        const a = Math.floor(Math.random() * 3) + 1;
                        const d = Math.floor(Math.random() * 3) + 1;
                        const sequence = [a, a + d, a + d * 3, a + d * 6];
                        return {
                            sequence: sequence,
                            answer: a + d * 10,
                            hint: '差が1, 2, 3, 4と増えているよ'
                        };
                    }
                },
                {
                    generate: () => {
                        const a = Math.floor(Math.random() * 3) + 2;
                        const sequence = [];
                        for (let i = 0; i < 5; i++) {
                            sequence.push(Math.pow(a, i));
                        }
                        return {
                            sequence: sequence.slice(0, 4),
                            answer: sequence[4],
                            hint: `${a}の累乗だよ`
                        };
                    }
                },
                {
                    generate: () => {
                        const sequence = [2, 4, 8, 16];
                        return {
                            sequence: sequence,
                            answer: 32,
                            hint: '前の数を2倍しているよ'
                        };
                    }
                }
            ],
            hard: [
                {
                    generate: () => {
                        const sequence = [1, 1, 2, 3];
                        return {
                            sequence: sequence,
                            answer: 5,
                            hint: 'フィボナッチ数列だよ（前の2つの数を足す）'
                        };
                    }
                },
                {
                    generate: () => {
                        const sequence = [1, 4, 9, 16];
                        return {
                            sequence: sequence,
                            answer: 25,
                            hint: '平方数の数列だよ（1², 2², 3²...）'
                        };
                    }
                },
                {
                    generate: () => {
                        const sequence = [3, 6, 18, 72];
                        return {
                            sequence: sequence,
                            answer: 360,
                            hint: '前の数に（順番×2）を掛けているよ'
                        };
                    }
                },
                {
                    generate: () => {
                        const a = Math.floor(Math.random() * 5) + 2;
                        const b = Math.floor(Math.random() * 3) + 1;
                        const sequence = [];
                        for (let i = 1; i <= 4; i++) {
                            sequence.push(a * i + b);
                        }
                        return {
                            sequence: sequence,
                            answer: a * 5 + b,
                            hint: `${a}n + ${b} の形だよ`
                        };
                    }
                },
                {
                    generate: () => {
                        const sequence = [2, 6, 12, 20];
                        return {
                            sequence: sequence,
                            answer: 30,
                            hint: 'n(n+1) の数列だよ'
                        };
                    }
                }
            ]
        };

        function generateSequence() {
            const generatorsForDifficulty = generators[difficulty];
            const generator = generatorsForDifficulty[Math.floor(Math.random() * generatorsForDifficulty.length)];
            const result = generator.generate();
            
            currentSequence = result.sequence;
            correctAnswer = result.answer;
            currentHint = result.hint;
            
            displaySequence();
            generateOptions();
            hideHint();
        }

        function displaySequence() {
            const sequenceEl = document.getElementById('sequence');
            sequenceEl.innerHTML = '';
            
            currentSequence.forEach((num, index) => {
                const numEl = document.createElement('div');
                numEl.className = 'number';
                numEl.textContent = num;
                sequenceEl.appendChild(numEl);
            });
            
            const missingEl = document.createElement('div');
            missingEl.className = 'number missing';
            missingEl.textContent = '?';
            sequenceEl.appendChild(missingEl);
        }

        function generateOptions() {
            const optionsEl = document.getElementById('options');
            optionsEl.innerHTML = '';
            
            let options = [correctAnswer];
            
            while (options.length < 4) {
                const offset = Math.floor(Math.random() * 21) - 10;
                const wrongAnswer = correctAnswer + offset;
                if (wrongAnswer > 0 && !options.includes(wrongAnswer)) {
                    options.push(wrongAnswer);
                }
            }
            
            options = shuffleArray(options);
            
            options.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option;
                btn.onclick = () => checkAnswer(option, btn);
                optionsEl.appendChild(btn);
            });
        }

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function checkAnswer(selected, btn) {
            if (!canAnswer) return;
            canAnswer = false;
            
            if (selected === correctAnswer) {
                btn.classList.add('correct');
                streak++;
                score += 10 * streak * (difficulty === 'easy' ? 1 : difficulty === 'medium' ? 2 : 3);
                
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('numberSequenceHighScore', highScore);
                }
                
                showFeedback('correct', '🎉 正解！+' + (10 * streak * (difficulty === 'easy' ? 1 : difficulty === 'medium' ? 2 : 3)));
            } else {
                btn.classList.add('wrong');
                streak = 0;
                showFeedback('wrong', '😅 残念！');
                
                // Highlight correct answer
                const buttons = document.querySelectorAll('.option-btn');
                buttons.forEach(b => {
                    if (parseInt(b.textContent) === correctAnswer) {
                        b.classList.add('correct');
                    }
                });
            }
            
            updateStats();
            
            setTimeout(() => {
                hideFeedback();
                generateSequence();
                canAnswer = true;
            }, 1500);
        }

        function showFeedback(type, text) {
            const feedback = document.getElementById('feedback');
            feedback.className = `feedback ${type} show`;
            feedback.textContent = text;
        }

        function hideFeedback() {
            const feedback = document.getElementById('feedback');
            feedback.classList.remove('show');
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('highScore').textContent = highScore;
        }

        function showHint() {
            const hintEl = document.getElementById('hint');
            hintEl.textContent = currentHint;
            hintEl.classList.add('show');
        }

        function hideHint() {
            const hintEl = document.getElementById('hint');
            hintEl.classList.remove('show');
        }

        function setDifficulty(diff) {
            difficulty = diff;
            
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-difficulty="${diff}"]`).classList.add('active');
            
            generateSequence();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize game
        generateSequence();
    </script>
</body>
</html>
