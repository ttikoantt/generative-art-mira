<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Circle Dodge - 円を避けろ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        #gameCanvas {
            display: block;
            cursor: none;
        }

        .ui {
            position: absolute;
            pointer-events: none;
        }

        .score {
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .high-score {
            top: 55px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
        }

        .game-over {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            pointer-events: auto;
            display: none;
        }

        .game-over h2 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 100, 100, 0.8);
        }

        .game-over p {
            font-size: 24px;
            margin-bottom: 30px;
        }

        .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 25px rgba(102, 126, 234, 0.6);
        }

        .restart-btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            pointer-events: auto;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .start-screen {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            pointer-events: auto;
        }

        .start-screen h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(102, 126, 234, 0.8);
        }

        .start-screen p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 25px rgba(102, 126, 234, 0.6);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="ui score">Score: <span id="score">0</span></div>
    <div class="ui high-score">Best: <span id="highScore">0</span></div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="ui start-screen" id="startScreen">
        <h1>🎯 Circle Dodge</h1>
        <p>マウス/タッチで赤い円を避けろ！</p>
        <button class="start-btn" onclick="startGame()">スタート</button>
    </div>

    <div class="ui game-over" id="gameOver">
        <h2>Game Over!</h2>
        <p>Score: <span id="finalScore">0</span></p>
        <button class="restart-btn" onclick="restartGame()">もう一度</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let mouseX, mouseY;
        let player = { x: 0, y: 0, radius: 15 };
        let enemies = [];
        let score = 0;
        let highScore = localStorage.getItem('circleDodgeHighScore') || 0;
        let gameRunning = false;
        let gameOver = false;
        let spawnRate = 60;
        let frameCount = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function init() {
            resize();
            mouseX = width / 2;
            mouseY = height / 2;
            player.x = mouseX;
            player.y = mouseY;
            document.getElementById('highScore').textContent = highScore;
        }

        function spawnEnemy() {
            const side = Math.floor(Math.random() * 4);
            let x, y, vx, vy;
            const speed = 2 + score * 0.05;

            switch(side) {
                case 0: // 上
                    x = Math.random() * width;
                    y = -20;
                    vx = (Math.random() - 0.5) * 2;
                    vy = speed;
                    break;
                case 1: // 右
                    x = width + 20;
                    y = Math.random() * height;
                    vx = -speed;
                    vy = (Math.random() - 0.5) * 2;
                    break;
                case 2: // 下
                    x = Math.random() * width;
                    y = height + 20;
                    vx = (Math.random() - 0.5) * 2;
                    vy = -speed;
                    break;
                case 3: // 左
                    x = -20;
                    y = Math.random() * height;
                    vx = speed;
                    vy = (Math.random() - 0.5) * 2;
                    break;
            }

            const radius = 15 + Math.random() * 25;
            const hue = Math.random() * 60 + 330; // 赤〜マゼンタ

            enemies.push({ x, y, vx, vy, radius, hue });
        }

        function update() {
            if (!gameRunning || gameOver) return;

            frameCount++;

            // プレイヤーをマウス位置に滑らかに移動
            player.x += (mouseX - player.x) * 0.15;
            player.y += (mouseY - player.y) * 0.15;

            // 敵をスポーン
            if (frameCount % spawnRate === 0) {
                spawnEnemy();
                // 徐々に難しくなる
                if (spawnRate > 20 && score % 10 === 0) {
                    spawnRate--;
                }
            }

            // 敵を更新
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.x += e.vx;
                e.y += e.vy;

                // 画面外に出たら削除
                if (e.x < -50 || e.x > width + 50 || e.y < -50 || e.y > height + 50) {
                    enemies.splice(i, 1);
                    score++;
                    document.getElementById('score').textContent = score;
                    continue;
                }

                // 衝突判定
                const dx = player.x - e.x;
                const dy = player.y - e.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < player.radius + e.radius) {
                    endGame();
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            if (!gameRunning) return;

            // 敵を描画
            enemies.forEach(e => {
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${e.hue}, 80%, 60%, 0.8)`;
                ctx.fill();
                ctx.strokeStyle = `hsla(${e.hue}, 80%, 80%, 1)`;
                ctx.lineWidth = 2;
                ctx.stroke();

                // 光る効果
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius * 1.5, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${e.hue}, 80%, 60%, 0.2)`;
                ctx.fill();
            });

            // プレイヤーを描画
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#00ff88';
            ctx.fill();
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 3;
            ctx.stroke();

            // プレイヤーの光る効果
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius * 2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 255, 136, 0.3)';
            ctx.fill();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            gameOver = false;
            score = 0;
            enemies = [];
            spawnRate = 60;
            frameCount = 0;
            document.getElementById('score').textContent = score;
        }

        function endGame() {
            gameOver = true;
            gameRunning = false;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('circleDodgeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }

        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            startGame();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });

        window.addEventListener('resize', resize);

        init();
        gameLoop();
    </script>
</body>
</html>
