<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Tap - 反応速度ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            font-size: clamp(2rem, 6vw, 3rem);
            margin-bottom: 10px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .subtitle {
            font-size: clamp(0.9rem, 2.5vw, 1.2rem);
            opacity: 0.9;
            margin-bottom: 20px;
            text-align: center;
        }

        .game-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .stat-label {
            font-size: 0.8em;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
            max-width: 400px;
            width: 100%;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(2rem, 8vw, 3.5rem);
            transition: all 0.15s ease;
            backdrop-filter: blur(10px);
            user-select: none;
            border: 3px solid rgba(255, 255, 255, 0.2);
        }

        .cell:active {
            transform: scale(0.95);
        }

        .cell.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(240, 147, 251, 0.5);
            border-color: rgba(255, 255, 255, 0.4);
            animation: pop 0.3s ease;
        }

        .cell.correct {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            animation: correct 0.3s ease;
        }

        .cell.wrong {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            animation: shake 0.3s ease;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1.05); }
        }

        @keyframes correct {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(240, 147, 251, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(240, 147, 251, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: #fff;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-size: 1.5rem;
            z-index: 1000;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .overlay-content {
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 30px;
            max-width: 400px;
        }

        .overlay h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .overlay p {
            font-size: 1.3rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .difficulty {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .difficulty-btn {
            padding: 10px 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .difficulty-btn:hover, .difficulty-btn.active {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 480px) {
            .game-board {
                gap: 10px;
            }
            
            .cell {
                border-radius: 15px;
            }
            
            .stat {
                padding: 10px 15px;
                min-width: 80px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <h1>⚡ Speed Tap</h1>
        <p class="subtitle">光るターゲットをタップ！スピード勝負</p>

        <div class="game-stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">時間</div>
                <div class="stat-value" id="timer">30</div>
            </div>
            <div class="stat">
                <div class="stat-label">ハイスコア</div>
                <div class="stat-value" id="highscore">0</div>
            </div>
        </div>

        <div class="game-board" id="board">
            <!-- 3x3グリッド -->
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn" onclick="startGame()">スタート</button>
            <button class="btn btn-secondary" onclick="showDifficulty()">難易度</button>
        </div>
    </div>

    <div class="overlay" id="overlay">
        <div class="overlay-content">
            <h2 id="overlayTitle">ゲームオーバー</h2>
            <p id="overlayMessage">スコア: 0</p>
            <button class="btn btn-primary" onclick="closeOverlay()">もう一度</button>
            <div class="difficulty" id="difficultySelect" style="display: none;">
                <button class="difficulty-btn active" data-difficulty="easy" onclick="setDifficulty('easy')">簡単</button>
                <button class="difficulty-btn" data-difficulty="normal" onclick="setDifficulty('normal')">普通</button>
                <button class="difficulty-btn" data-difficulty="hard" onclick="setDifficulty('hard')">難しい</button>
            </div>
        </div>
    </div>

    <script>
        // ゲーム状態
        let score = 0;
        let timeLeft = 30;
        let isPlaying = false;
        let currentCell = null;
        let gameTimer = null;
        let moleTimer = null;
        let highScore = parseInt(localStorage.getItem('speedTapHighScore')) || 0;
        
        // 難易度設定
        const difficulties = {
            easy: { moleTime: 1500, decrease: 0 },
            normal: { moleTime: 1000, decrease: 10 },
            hard: { moleTime: 700, decrease: 20 }
        };
        
        let currentDifficulty = 'normal';

        // ターゲットの絵文字
        const targets = ['⭐', '🎯', '💎', '🔥', '⚡', '🌟', '💫', '🎪', '🎨'];

        // 初期化
        const board = document.getElementById('board');
        const cells = [];

        // 9つのセルを作成
        for (let i = 0; i < 9; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.addEventListener('click', () => handleTap(i));
            cell.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleTap(i);
            });
            board.appendChild(cell);
            cells.push(cell);
        }

        // ハイスコア表示
        document.getElementById('highscore').textContent = highScore;

        function handleTap(index) {
            if (!isPlaying) return;

            if (currentCell === index) {
                // 正解！
                score += 10;
                document.getElementById('score').textContent = score;
                
                cells[index].classList.add('correct');
                cells[index].textContent = '✓';
                
                setTimeout(() => {
                    cells[index].classList.remove('correct', 'active');
                    cells[index].textContent = '';
                }, 200);

                // 次のターゲット
                clearTimeout(moleTimer);
                showNextTarget();
            } else {
                // 間違い！
                score = Math.max(0, score - 5);
                document.getElementById('score').textContent = score;
                
                cells[index].classList.add('wrong');
                setTimeout(() => {
                    cells[index].classList.remove('wrong');
                }, 300);
            }
        }

        function showNextTarget() {
            if (!isPlaying) return;

            // 前のターゲットをクリア
            if (currentCell !== null) {
                cells[currentCell].classList.remove('active');
                cells[currentCell].textContent = '';
            }

            // ランダムなセルを選択
            let nextCell;
            do {
                nextCell = Math.floor(Math.random() * 9);
            } while (nextCell === currentCell);

            currentCell = nextCell;

            // ターゲットを表示
            cells[currentCell].textContent = targets[Math.floor(Math.random() * targets.length)];
            cells[currentCell].classList.add('active');

            // 難易度に応じた時間で次へ
            const settings = difficulties[currentDifficulty];
            const adjustedTime = Math.max(400, settings.moleTime - (score * settings.decrease / 10));
            
            moleTimer = setTimeout(() => {
                if (isPlaying && currentCell !== null) {
                    cells[currentCell].classList.remove('active');
                    cells[currentCell].textContent = '';
                    currentCell = null;
                    showNextTarget();
                }
            }, adjustedTime);
        }

        function startGame() {
            if (isPlaying) return;

            score = 0;
            timeLeft = 30;
            isPlaying = true;
            currentCell = null;

            document.getElementById('score').textContent = '0';
            document.getElementById('timer').textContent = '30';
            document.getElementById('startBtn').disabled = true;
            document.getElementById('startBtn').textContent = 'プレイ中...';

            // タイマー開始
            gameTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // 最初のターゲット
            showNextTarget();
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameTimer);
            clearTimeout(moleTimer);

            // アクティブなセルをクリア
            if (currentCell !== null) {
                cells[currentCell].classList.remove('active');
                cells[currentCell].textContent = '';
            }

            // ハイスコア更新
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('speedTapHighScore', highScore);
                document.getElementById('highscore').textContent = highScore;
            }

            // 結果表示
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').textContent = 'スタート';
            
            showOverlay(
                'ゲームオーバー！',
                `スコア: ${score}${score >= highScore && score > 0 ? ' 🏆 新記録！' : ''}`
            );
        }

        function showOverlay(title, message) {
            document.getElementById('overlayTitle').textContent = title;
            document.getElementById('overlayMessage').textContent = message;
            document.getElementById('difficultySelect').style.display = 'none';
            document.getElementById('overlay').classList.add('show');
        }

        function closeOverlay() {
            document.getElementById('overlay').classList.remove('show');
        }

        function showDifficulty() {
            document.getElementById('overlayTitle').textContent = '難易度選択';
            document.getElementById('overlayMessage').textContent = 'ゲームの難易度を選択してください';
            document.getElementById('difficultySelect').style.display = 'flex';
            document.getElementById('overlay').classList.add('show');
        }

        function setDifficulty(difficulty) {
            currentDifficulty = difficulty;
            
            // ボタンのアクティブ状態更新
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.difficulty === difficulty) {
                    btn.classList.add('active');
                }
            });

            closeOverlay();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // キーボード操作（デバッグ用）
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !isPlaying) {
                e.preventDefault();
                startGame();
            }
        });
    </script>
</body>
</html>
