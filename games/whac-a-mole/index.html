<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whac-A-Mole</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
            touch-action: manipulation;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #667eea;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 400px;
            margin: 20px 0;
        }

        .hole {
            width: 100px;
            height: 100px;
            background: radial-gradient(ellipse at center, #3d2914 0%, #2a1d0d 100%);
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            box-shadow: inset 0 10px 20px rgba(0, 0, 0, 0.8);
            transition: transform 0.1s;
        }

        .hole:active {
            transform: scale(0.95);
        }

        .hole.mole {
            animation: moleUp 0.8s ease-in-out;
        }

        @keyframes moleUp {
            0%, 100% {
                transform: translateY(100%);
            }
            40%, 60% {
                transform: translateY(0);
            }
        }

        .mole {
            position: absolute;
            width: 80px;
            height: 80px;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            transition: bottom 0.15s ease-out;
        }

        .hole.mole .mole {
            bottom: 10px;
        }

        .mole-body {
            width: 80px;
            height: 70px;
            background: linear-gradient(145deg, #8B4513 0%, #654321 100%);
            border-radius: 50% 50% 40% 40%;
            position: relative;
        }

        .mole-face {
            position: absolute;
            width: 60px;
            height: 40px;
            top: 15px;
            left: 10px;
        }

        .mole-eye {
            width: 12px;
            height: 12px;
            background: #000;
            border-radius: 50%;
            position: absolute;
            top: 5px;
        }

        .mole-eye.left {
            left: 10px;
        }

        .mole-eye.right {
            right: 10px;
        }

        .mole-nose {
            width: 20px;
            height: 15px;
            background: #FF69B4;
            border-radius: 50%;
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
        }

        .mole-whiskers {
            position: absolute;
            top: 25px;
            width: 100%;
        }

        .whisker {
            width: 15px;
            height: 2px;
            background: #000;
            position: absolute;
        }

        .whisker.left-1 {
            left: 0;
            top: 0;
            transform: rotate(-20deg);
        }

        .whisker.left-2 {
            left: 0;
            top: 8px;
            transform: rotate(0deg);
        }

        .whisker.right-1 {
            right: 0;
            top: 0;
            transform: rotate(20deg);
        }

        .whisker.right-2 {
            right: 0;
            top: 8px;
            transform: rotate(0deg);
        }

        .hit-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            animation: hitPop 0.3s ease-out forwards;
            pointer-events: none;
        }

        @keyframes hitPop {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.5);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(2);
            }
        }

        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.3);
            color: white;
            border: 2px solid white;
            padding: 10px 15px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 10px;
            z-index: 100;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 1000;
        }

        .game-over.show {
            display: flex;
        }

        .game-over h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #f5576c;
        }

        .game-over p {
            font-size: 1.5rem;
            margin: 10px 0;
        }

        .combo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            animation: comboPop 0.5s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes comboPop {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0);
            }
            30% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.3);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.5);
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 2rem;
            }

            .game-board {
                gap: 10px;
                max-width: 320px;
            }

            .hole {
                width: 80px;
                height: 80px;
            }

            .mole {
                width: 65px;
                height: 65px;
            }

            .mole-body {
                width: 65px;
                height: 55px;
            }

            .mole-face {
                width: 50px;
                height: 35px;
                top: 10px;
                left: 7px;
            }

            .btn {
                padding: 12px 30px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <div class="header">
        <h1>🔨 Whac-A-Mole</h1>
        <div class="stats">
            <div class="stat">Score: <span id="score">0</span></div>
            <div class="stat">Time: <span id="time">30</span>s</div>
            <div class="stat">Combo: <span id="combo">0</span>x</div>
        </div>
    </div>

    <div class="game-board" id="gameBoard"></div>

    <div class="buttons">
        <button class="btn" id="startBtn" onclick="startGame()">▶ Start Game</button>
        <button class="btn" id="resetBtn" onclick="resetGame()" disabled>↺ Reset</button>
    </div>

    <div class="game-over" id="gameOver">
        <h2>Game Over!</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <p>Max Combo: <span id="maxCombo">0</span>x</p>
        <p>Hits: <span id="hits">0</span> / <span id="total">0</span></p>
        <br>
        <button class="btn" onclick="resetGame()">Play Again</button>
    </div>

    <script>
        const gameBoard = document.getElementById('gameBoard');
        const scoreEl = document.getElementById('score');
        const timeEl = document.getElementById('time');
        const comboEl = document.getElementById('combo');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const gameOverEl = document.getElementById('gameOver');

        let score = 0;
        let timeLeft = 30;
        let combo = 0;
        let maxCombo = 0;
        let hits = 0;
        let totalMoles = 0;
        let gameInterval = null;
        let moleTimeout = null;
        let isPlaying = false;

        const gridSize = 9;
        const holes = [];

        function createBoard() {
            gameBoard.innerHTML = '';
            holes.length = 0;

            for (let i = 0; i < gridSize; i++) {
                const hole = document.createElement('div');
                hole.className = 'hole';
                hole.dataset.index = i;

                const mole = document.createElement('div');
                mole.className = 'mole';

                const moleBody = document.createElement('div');
                moleBody.className = 'mole-body';

                const moleFace = document.createElement('div');
                moleFace.className = 'mole-face';

                const leftEye = document.createElement('div');
                leftEye.className = 'mole-eye left';

                const rightEye = document.createElement('div');
                rightEye.className = 'mole-eye right';

                const nose = document.createElement('div');
                nose.className = 'mole-nose';

                const whiskers = document.createElement('div');
                whiskers.className = 'mole-whiskers';

                const whiskersArray = [
                    { class: 'whisker left-1' },
                    { class: 'whisker left-2' },
                    { class: 'whisker right-1' },
                    { class: 'whisker right-2' }
                ];

                whiskersArray.forEach(w => {
                    const whisker = document.createElement('div');
                    whisker.className = w.class;
                    whiskers.appendChild(whisker);
                });

                moleFace.appendChild(leftEye);
                moleFace.appendChild(rightEye);
                moleFace.appendChild(nose);
                moleFace.appendChild(whiskers);

                moleBody.appendChild(moleFace);
                mole.appendChild(moleBody);
                hole.appendChild(mole);

                hole.addEventListener('click', () => hitMole(i));
                gameBoard.appendChild(hole);
                holes.push(hole);
            }
        }

        function showMole() {
            if (!isPlaying) return;

            const availableHoles = holes.filter(h => !h.classList.contains('mole'));
            if (availableHoles.length === 0) return;

            const randomHole = availableHoles[Math.floor(Math.random() * availableHoles.length)];
            randomHole.classList.add('mole');
            totalMoles++;

            const stayTime = Math.max(600, 1200 - score * 10);
            moleTimeout = setTimeout(() => {
                if (randomHole.classList.contains('mole')) {
                    randomHole.classList.remove('mole');
                    if (isPlaying) {
                        combo = 0;
                        updateDisplay();
                    }
                }
                if (isPlaying) {
                    showMole();
                }
            }, stayTime);
        }

        function hitMole(index) {
            if (!isPlaying) return;

            const hole = holes[index];
            if (!hole.classList.contains('mole')) {
                combo = 0;
                updateDisplay();
                return;
            }

            hole.classList.remove('mole');
            hits++;

            combo++;
            if (combo > maxCombo) {
                maxCombo = combo;
            }

            const points = 10 + combo * 5;
            score += points;

            showHitEffect(hole, '🔨');
            if (combo > 1 && combo % 5 === 0) {
                showCombo(combo);
            }

            updateDisplay();
        }

        function showHitEffect(hole, emoji) {
            const effect = document.createElement('div');
            effect.className = 'hit-effect';
            effect.textContent = emoji;
            hole.appendChild(effect);

            setTimeout(() => effect.remove(), 300);
        }

        function showCombo(count) {
            const combo = document.createElement('div');
            combo.className = 'combo';
            combo.textContent = `${count}x COMBO!`;
            document.body.appendChild(combo);

            setTimeout(() => combo.remove(), 500);
        }

        function updateDisplay() {
            scoreEl.textContent = score;
            timeEl.textContent = timeLeft;
            comboEl.textContent = combo;
        }

        function startGame() {
            if (isPlaying) return;

            score = 0;
            timeLeft = 30;
            combo = 0;
            maxCombo = 0;
            hits = 0;
            totalMoles = 0;
            isPlaying = true;

            updateDisplay();

            startBtn.disabled = true;
            resetBtn.disabled = false;

            gameInterval = setInterval(() => {
                timeLeft--;
                updateDisplay();

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            showMole();
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameInterval);
            clearTimeout(moleTimeout);

            document.getElementById('finalScore').textContent = score;
            document.getElementById('maxCombo').textContent = maxCombo;
            document.getElementById('hits').textContent = hits;
            document.getElementById('total').textContent = totalMoles;

            gameOverEl.classList.add('show');
            startBtn.disabled = false;
            resetBtn.disabled = true;
        }

        function resetGame() {
            isPlaying = false;
            clearInterval(gameInterval);
            clearTimeout(moleTimeout);

            holes.forEach(hole => hole.classList.remove('mole'));
            gameOverEl.classList.remove('show');

            score = 0;
            timeLeft = 30;
            combo = 0;
            maxCombo = 0;
            hits = 0;
            totalMoles = 0;

            updateDisplay();
            startBtn.disabled = false;
            resetBtn.disabled = true;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        createBoard();
    </script>
</body>
</html>
