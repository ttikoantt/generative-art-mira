<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sliding Puzzle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255,255,255,0.15);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .puzzle-container {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .puzzle {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            max-width: 350px;
            margin: 0 auto;
        }

        .tile {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            user-select: none;
        }

        .tile:hover:not(.empty) {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .tile.empty {
            background: rgba(255,255,255,0.05);
            cursor: default;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
        }

        .tile.correct {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            background: rgba(255,255,255,0.2);
            color: white;
            backdrop-filter: blur(10px);
        }

        button:hover {
            transform: scale(1.05);
            background: rgba(255,255,255,0.3);
        }

        button.primary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .difficulty {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .difficulty-btn {
            padding: 8px 16px;
            border: 2px solid rgba(255,255,255,0.3);
            background: transparent;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .difficulty-btn.active {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.8);
        }

        .win-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .win-screen.show {
            display: flex;
        }

        .win-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: popIn 0.5s ease;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .win-content h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .win-stats {
            margin: 20px 0;
            font-size: 1.2rem;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }
            .puzzle {
                max-width: 100%;
            }
            .tile {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <h1>🧩 Sliding Puzzle</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">移動回数</div>
                <div class="stat-value" id="moves">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">タイム</div>
                <div class="stat-value" id="timer">00:00</div>
            </div>
        </div>

        <div class="difficulty">
            <button class="difficulty-btn active" data-size="3">3×3</button>
            <button class="difficulty-btn" data-size="4">4×4</button>
            <button class="difficulty-btn" data-size="5">5×5</button>
        </div>

        <div class="puzzle-container">
            <div class="puzzle" id="puzzle"></div>
        </div>

        <div class="controls">
            <button class="primary" onclick="newGame()">🔄 新しいゲーム</button>
            <button onclick="resetPuzzle()">↩️ リセット</button>
        </div>
    </div>

    <div class="win-screen" id="winScreen">
        <div class="win-content">
            <h2>🎉 クリア！</h2>
            <div class="win-stats">
                <p>移動回数: <strong id="finalMoves">0</strong></p>
                <p>タイム: <strong id="finalTime">00:00</strong></p>
            </div>
            <button class="primary" onclick="closeWin(); newGame();">もう一度プレイ</button>
        </div>
    </div>

    <script>
        let gridSize = 3;
        let tiles = [];
        let emptyIndex;
        let moves = 0;
        let seconds = 0;
        let timerInterval;
        let gameStarted = false;
        let solvedTiles = [];

        function init() {
            const puzzle = document.getElementById('puzzle');
            puzzle.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            solvedTiles = [];
            for (let i = 1; i < gridSize * gridSize; i++) {
                solvedTiles.push(i);
            }
            solvedTiles.push(0);
        }

        function createTiles() {
            tiles = [...solvedTiles];
            emptyIndex = tiles.length - 1;
        }

        function shuffle() {
            // Shuffle by making valid moves to ensure solvability
            const shuffleMoves = gridSize * gridSize * 20;
            for (let i = 0; i < shuffleMoves; i++) {
                const neighbors = getNeighbors(emptyIndex);
                const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
                swap(emptyIndex, randomNeighbor);
                emptyIndex = randomNeighbor;
            }
        }

        function getNeighbors(index) {
            const neighbors = [];
            const row = Math.floor(index / gridSize);
            const col = index % gridSize;

            if (row > 0) neighbors.push(index - gridSize); // Up
            if (row < gridSize - 1) neighbors.push(index + gridSize); // Down
            if (col > 0) neighbors.push(index - 1); // Left
            if (col < gridSize - 1) neighbors.push(index + 1); // Right

            return neighbors;
        }

        function swap(i, j) {
            [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
        }

        function render() {
            const puzzle = document.getElementById('puzzle');
            puzzle.innerHTML = '';

            tiles.forEach((tile, index) => {
                const div = document.createElement('div');
                div.className = 'tile';
                div.textContent = tile || '';

                if (tile === 0) {
                    div.classList.add('empty');
                } else {
                    div.addEventListener('click', () => moveTile(index));
                    if (tile === index + 1) {
                        div.classList.add('correct');
                    }
                }

                puzzle.appendChild(div);
            });

            document.getElementById('moves').textContent = moves;
        }

        function moveTile(index) {
            const neighbors = getNeighbors(emptyIndex);
            if (neighbors.includes(index)) {
                swap(index, emptyIndex);
                emptyIndex = index;
                moves++;

                if (!gameStarted) {
                    gameStarted = true;
                    startTimer();
                }

                render();
                checkWin();
            }
        }

        function checkWin() {
            const isSolved = tiles.every((tile, index) => {
                if (index === tiles.length - 1) return tile === 0;
                return tile === index + 1;
            });

            if (isSolved) {
                clearInterval(timerInterval);
                showWinScreen();
            }
        }

        function startTimer() {
            clearInterval(timerInterval);
            seconds = 0;
            timerInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('timer').textContent = `${mins}:${secs}`;
            }, 1000);
        }

        function showWinScreen() {
            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('finalTime').textContent = document.getElementById('timer').textContent;
            document.getElementById('winScreen').classList.add('show');
        }

        function closeWin() {
            document.getElementById('winScreen').classList.remove('show');
        }

        function newGame() {
            clearInterval(timerInterval);
            gameStarted = false;
            moves = 0;
            seconds = 0;
            document.getElementById('timer').textContent = '00:00';
            createTiles();
            shuffle();
            render();
        }

        function resetPuzzle() {
            tiles = [...solvedTiles];
            emptyIndex = tiles.length - 1;
            moves = 0;
            clearInterval(timerInterval);
            gameStarted = false;
            seconds = 0;
            document.getElementById('timer').textContent = '00:00';
            render();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Difficulty buttons
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                gridSize = parseInt(btn.dataset.size);
                init();
                newGame();
            });
        });

        // Initialize
        init();
        newGame();
    </script>
</body>
</html>
