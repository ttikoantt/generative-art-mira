<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sliding Puzzle - Game #834</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
            padding: 20px;
        }
        
        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 28px;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
        }
        
        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            color: #fff;
            font-size: 16px;
            backdrop-filter: blur(10px);
        }
        
        .stat-value {
            font-weight: bold;
            color: #64c8ff;
        }
        
        .puzzle-container {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .puzzle {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            grid-template-rows: repeat(4, 80px);
            gap: 8px;
        }
        
        .tile {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        
        .tile:hover:not(.empty) {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .tile.empty {
            background: transparent;
            box-shadow: none;
            cursor: default;
        }
        
        .tile.correct {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            box-shadow: 0 4px 15px rgba(56, 239, 125, 0.4);
        }
        
        .buttons {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .win-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .win-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 50px rgba(102, 126, 234, 0.5);
            animation: popIn 0.5s ease;
        }
        
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .win-content h2 {
            color: #fff;
            font-size: 36px;
            margin-bottom: 20px;
        }
        
        .win-content p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 18px;
            margin-bottom: 30px;
        }
        
        .difficulty {
            margin-bottom: 20px;
        }
        
        .difficulty label {
            color: #fff;
            margin-right: 15px;
            font-size: 14px;
        }
        
        .difficulty select {
            padding: 8px 15px;
            border-radius: 20px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }
        
        .difficulty select option {
            background: #1a1a2e;
        }
        
        @media (max-width: 500px) {
            .puzzle {
                grid-template-columns: repeat(4, 65px);
                grid-template-rows: repeat(4, 65px);
                gap: 6px;
            }
            
            .tile {
                font-size: 24px;
                border-radius: 8px;
            }
            
            h1 {
                font-size: 22px;
            }
            
            .stat {
                font-size: 14px;
                padding: 8px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Sliding Puzzle</h1>
        
        <div class="difficulty">
            <label for="difficulty">Difficulty:</label>
            <select id="difficulty">
                <option value="easy">Easy (10 moves)</option>
                <option value="medium" selected>Medium (50 moves)</option>
                <option value="hard">Hard (100 moves)</option>
            </select>
        </div>
        
        <div class="stats">
            <div class="stat">Moves: <span class="stat-value" id="moves">0</span></div>
            <div class="stat">Time: <span class="stat-value" id="time">00:00</span></div>
            <div class="stat">Best: <span class="stat-value" id="best">-</span></div>
        </div>
        
        <div class="puzzle-container">
            <div class="puzzle" id="puzzle"></div>
        </div>
        
        <div class="buttons">
            <button class="btn btn-primary" onclick="initGame()">New Game</button>
            <button class="btn btn-secondary" onclick="solve()">Solve</button>
        </div>
    </div>
    
    <div class="win-overlay" id="winOverlay">
        <div class="win-content">
            <h2>🎉 Congratulations!</h2>
            <p>You solved the puzzle!</p>
            <p>Moves: <span id="finalMoves">0</span> | Time: <span id="finalTime">00:00</span></p>
            <button class="btn btn-primary" onclick="closeWin()">Play Again</button>
        </div>
    </div>

    <script>
        const SIZE = 4;
        let tiles = [];
        let emptyPos = { row: SIZE - 1, col: SIZE - 1 };
        let moves = 0;
        let startTime = null;
        let timerInterval = null;
        let gameStarted = false;
        
        // Load best score
        let bestMoves = localStorage.getItem('slidingPuzzleBest') || null;
        if (bestMoves) {
            document.getElementById('best').textContent = bestMoves;
        }
        
        function initGame() {
            // Stop timer
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            
            // Reset stats
            moves = 0;
            gameStarted = false;
            startTime = null;
            document.getElementById('moves').textContent = '0';
            document.getElementById('time').textContent = '00:00';
            
            // Create solved state
            tiles = [];
            for (let i = 0; i < SIZE * SIZE - 1; i++) {
                tiles.push(i + 1);
            }
            tiles.push(0); // Empty tile
            emptyPos = { row: SIZE - 1, col: SIZE - 1 };
            
            // Shuffle
            shuffle();
            
            // Render
            render();
        }
        
        function shuffle() {
            const difficulty = document.getElementById('difficulty').value;
            const shuffleMoves = {
                'easy': 10,
                'medium': 50,
                'hard': 100
            }[difficulty];
            
            for (let i = 0; i < shuffleMoves; i++) {
                const validMoves = getValidMoves();
                const randomMove = validMoves[Math.floor(Math.random() * validMoves.length)];
                moveTile(randomMove.row, randomMove.col, false);
            }
        }
        
        function getValidMoves() {
            const moves = [];
            const { row, col } = emptyPos;
            
            if (row > 0) moves.push({ row: row - 1, col });
            if (row < SIZE - 1) moves.push({ row: row + 1, col });
            if (col > 0) moves.push({ row, col: col - 1 });
            if (col < SIZE - 1) moves.push({ row, col: col + 1 });
            
            return moves;
        }
        
        function moveTile(row, col, countMove = true) {
            const index = row * SIZE + col;
            const emptyIndex = emptyPos.row * SIZE + emptyPos.col;
            
            // Swap
            [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
            emptyPos = { row, col };
            
            if (countMove) {
                moves++;
                document.getElementById('moves').textContent = moves;
                
                // Start timer on first move
                if (!gameStarted) {
                    gameStarted = true;
                    startTime = Date.now();
                    timerInterval = setInterval(updateTimer, 1000);
                }
                
                render();
                
                // Check win
                if (checkWin()) {
                    setTimeout(showWin, 300);
                }
            }
        }
        
        function updateTimer() {
            if (!startTime) return;
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const seconds = (elapsed % 60).toString().padStart(2, '0');
            document.getElementById('time').textContent = `${minutes}:${seconds}`;
        }
        
        function checkWin() {
            for (let i = 0; i < SIZE * SIZE - 1; i++) {
                if (tiles[i] !== i + 1) return false;
            }
            return tiles[SIZE * SIZE - 1] === 0;
        }
        
        function render() {
            const puzzle = document.getElementById('puzzle');
            puzzle.innerHTML = '';
            
            for (let i = 0; i < SIZE * SIZE; i++) {
                const tile = document.createElement('button');
                tile.className = 'tile';
                
                if (tiles[i] === 0) {
                    tile.classList.add('empty');
                } else {
                    tile.textContent = tiles[i];
                    tile.onclick = () => {
                        const row = Math.floor(i / SIZE);
                        const col = i % SIZE;
                        
                        // Check if adjacent to empty
                        const isAdjacent = (
                            (Math.abs(row - emptyPos.row) === 1 && col === emptyPos.col) ||
                            (Math.abs(col - emptyPos.col) === 1 && row === emptyPos.row)
                        );
                        
                        if (isAdjacent) {
                            // Find current position
                            const currentIndex = tiles.indexOf(tiles[i]);
                            const currentRow = Math.floor(currentIndex / SIZE);
                            const currentCol = currentIndex % SIZE;
                            moveTile(currentRow, currentCol);
                        }
                    };
                    
                    // Mark correct position
                    if (tiles[i] === i + 1) {
                        tile.classList.add('correct');
                    }
                }
                
                puzzle.appendChild(tile);
            }
        }
        
        function showWin() {
            clearInterval(timerInterval);
            
            // Update best score
            if (!bestMoves || moves < bestMoves) {
                bestMoves = moves;
                localStorage.setItem('slidingPuzzleBest', bestMoves);
                document.getElementById('best').textContent = bestMoves;
            }
            
            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('finalTime').textContent = document.getElementById('time').textContent;
            document.getElementById('winOverlay').style.display = 'flex';
        }
        
        function closeWin() {
            document.getElementById('winOverlay').style.display = 'none';
            initGame();
        }
        
        function solve() {
            // Reset to solved state
            tiles = [];
            for (let i = 0; i < SIZE * SIZE - 1; i++) {
                tiles.push(i + 1);
            }
            tiles.push(0);
            emptyPos = { row: SIZE - 1, col: SIZE - 1 };
            
            clearInterval(timerInterval);
            render();
        }
        
        // Initialize
        initGame();
    </script>
</body>
</html>
