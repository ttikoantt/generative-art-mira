<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sliding Puzzle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 20px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-label {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #00ff88;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .puzzle-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .puzzle {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            aspect-ratio: 1;
        }

        .tile {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .tile:hover:not(.empty) {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .tile.empty {
            background: transparent;
            cursor: default;
            box-shadow: none;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #000;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            font-family: 'Arial', sans-serif;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4);
        }

        .fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: none;
            padding: 8px 12px;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 5px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .win-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 200;
            display: none;
            backdrop-filter: blur(20px);
            border: 2px solid #00ff88;
        }

        .win-message.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        .win-message h2 {
            color: #00ff88;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .win-message p {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        @media (max-width: 480px) {
            .tile {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🧩 Sliding Puzzle</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">移動回数</div>
                <div class="stat-value" id="moves">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">時間</div>
                <div class="stat-value" id="time">00:00</div>
            </div>
        </div>

        <div class="puzzle-container">
            <div class="puzzle" id="puzzle"></div>
        </div>

        <div class="controls">
            <button onclick="shuffle()">🔀 シャッフル</button>
            <button onclick="reset()">🔄 リセット</button>
        </div>
    </div>

    <div class="win-message" id="winMessage">
        <h2>🎉 クリア！</h2>
        <p id="winText"></p>
        <button onclick="closeWinMessage(); shuffle();">もう一度</button>
    </div>

    <script>
        const SIZE = 4;
        let board = [];
        let moves = 0;
        let seconds = 0;
        let timer = null;
        let gameStarted = false;

        function initBoard() {
            board = [];
            for (let i = 1; i < SIZE * SIZE; i++) {
                board.push(i);
            }
            board.push(0); // Empty space
        }

        function render() {
            const puzzle = document.getElementById('puzzle');
            puzzle.innerHTML = '';

            board.forEach((value, index) => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                if (value === 0) {
                    tile.classList.add('empty');
                } else {
                    tile.textContent = value;
                    tile.onclick = () => moveTile(index);
                }
                puzzle.appendChild(tile);
            });

            document.getElementById('moves').textContent = moves;
        }

        function moveTile(index) {
            const emptyIndex = board.indexOf(0);
            const row = Math.floor(index / SIZE);
            const col = index % SIZE;
            const emptyRow = Math.floor(emptyIndex / SIZE);
            const emptyCol = emptyIndex % SIZE;

            // Check if adjacent
            const isAdjacent = (Math.abs(row - emptyRow) === 1 && col === emptyCol) ||
                              (Math.abs(col - emptyCol) === 1 && row === emptyRow);

            if (isAdjacent) {
                if (!gameStarted) {
                    gameStarted = true;
                    startTimer();
                }

                [board[index], board[emptyIndex]] = [board[emptyIndex], board[index]];
                moves++;
                render();

                if (checkWin()) {
                    stopTimer();
                    showWinMessage();
                }
            }
        }

        function shuffle() {
            reset();
            for (let i = 0; i < 200; i++) {
                const emptyIndex = board.indexOf(0);
                const neighbors = [];
                const row = Math.floor(emptyIndex / SIZE);
                const col = emptyIndex % SIZE;

                if (row > 0) neighbors.push(emptyIndex - SIZE);
                if (row < SIZE - 1) neighbors.push(emptyIndex + SIZE);
                if (col > 0) neighbors.push(emptyIndex - 1);
                if (col < SIZE - 1) neighbors.push(emptyIndex + 1);

                const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
                [board[emptyIndex], board[randomNeighbor]] = [board[randomNeighbor], board[emptyIndex]];
            }
            render();
        }

        function reset() {
            initBoard();
            moves = 0;
            seconds = 0;
            gameStarted = false;
            stopTimer();
            render();
        }

        function checkWin() {
            for (let i = 0; i < SIZE * SIZE - 1; i++) {
                if (board[i] !== i + 1) return false;
            }
            return board[SIZE * SIZE - 1] === 0;
        }

        function startTimer() {
            timer = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('time').textContent = `${mins}:${secs}`;
            }, 1000);
        }

        function stopTimer() {
            if (timer) {
                clearInterval(timer);
                timer = null;
            }
        }

        function showWinMessage() {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            const timeText = mins > 0 ? `${mins}分${secs}秒` : `${secs}秒`;

            document.getElementById('winText').textContent =
                `🎊 ${moves}回の移動で${timeText}でクリア！`;
            document.getElementById('winMessage').classList.add('show');
        }

        function closeWinMessage() {
            document.getElementById('winMessage').classList.remove('show');
        }

        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        }

        initBoard();
        render();
    </script>
</body>
</html>
