<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sliding Puzzle - Games by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        h1 {
            color: #fff;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin: 0.5rem 0;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .stats {
            display: flex;
            gap: 1.5rem;
            margin: 0.5rem 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 0.5rem 1rem;
            border-radius: 15px;
            color: #fff;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .game-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 500px;
            padding: 1rem;
        }

        .puzzle-board {
            display: grid;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 90vw;
            max-height: 70vh;
            aspect-ratio: 1;
        }

        .tile {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            aspect-ratio: 1;
        }

        .tile:hover:not(.empty) {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .tile:active:not(.empty) {
            transform: scale(0.95);
        }

        .tile.empty {
            background: rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.2);
            cursor: default;
        }

        .tile.correct {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
            margin: 1rem 0;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            width: 100%;
            max-width: 500px;
        }

        button {
            background: linear-gradient(135deg, #fff, #f0f0f0);
            color: #667eea;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .difficulty-btn {
            min-width: 80px;
        }

        .difficulty-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }

        .fullscreen-btn {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #fff;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
            color: #fff;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            animation: modalPop 0.3s ease;
        }

        @keyframes modalPop {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .modal p {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            animation: confetti-fall 3s ease-out forwards;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @media (max-width: 400px) {
            .puzzle-board {
                gap: 4px;
                padding: 10px;
            }
            .stats {
                gap: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <h1>🧩 Sliding Puzzle</h1>

    <div class="stats">
        <div class="stat">⏱️ Time: <span id="time">00:00</span></div>
        <div class="stat">👆 Moves: <span id="moves">0</span></div>
        <div class="stat">🏆 Best: <span id="best">-</span></div>
    </div>

    <div class="game-container">
        <div class="puzzle-board" id="board"></div>
    </div>

    <div class="controls">
        <button class="difficulty-btn active" onclick="setDifficulty(3)">3×3</button>
        <button class="difficulty-btn" onclick="setDifficulty(4)">4×4</button>
        <button class="difficulty-btn" onclick="setDifficulty(5)">5×5</button>
        <button onclick="shuffle()">🔀 Shuffle</button>
        <button onclick="reset()">🔄 Reset</button>
    </div>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2>🎉 Congratulations!</h2>
            <p>You solved the puzzle!</p>
            <p>Time: <span id="finalTime">00:00</span> | Moves: <span id="finalMoves">0</span></p>
            <button onclick="closeModal()">Play Again</button>
        </div>
    </div>

    <script>
        let size = 3;
        let tiles = [];
        let emptyIndex;
        let moves = 0;
        let timer;
        let seconds = 0;
        let gameStarted = false;
        let bestTimes = {};

        const board = document.getElementById('board');

        function init() {
            loadBestTimes();
            createBoard();
            updateBestDisplay();
        }

        function createBoard() {
            board.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(${size}, 1fr)`;

            tiles = [];
            const total = size * size;

            for (let i = 1; i < total; i++) {
                tiles.push(i);
            }
            tiles.push(0); // Empty tile
            emptyIndex = tiles.length - 1;

            renderBoard();
        }

        function renderBoard() {
            board.innerHTML = '';
            tiles.forEach((tile, index) => {
                const tileEl = document.createElement('div');
                tileEl.className = 'tile' + (tile === 0 ? ' empty' : '');
                if (tile !== 0) {
                    tileEl.textContent = tile;
                    tileEl.onclick = () => moveTile(index);
                }
                board.appendChild(tileEl);
            });
        }

        function moveTile(index) {
            if (!canMove(index)) return;

            if (!gameStarted) {
                startTimer();
                gameStarted = true;
            }

            // Swap tiles
            [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
            emptyIndex = index;
            moves++;
            document.getElementById('moves').textContent = moves;

            renderBoard();

            if (checkWin()) {
                setTimeout(handleWin, 300);
            }
        }

        function canMove(index) {
            const row = Math.floor(index / size);
            const col = index % size;
            const emptyRow = Math.floor(emptyIndex / size);
            const emptyCol = emptyIndex % size;

            return (Math.abs(row - emptyRow) + Math.abs(col - emptyCol)) === 1;
        }

        function shuffle() {
            resetTimer();
            moves = 0;
            document.getElementById('moves').textContent = '0';
            gameStarted = false;

            // Perform random valid moves to ensure solvability
            const shuffleMoves = size * size * 20;
            let lastIndex = -1;

            for (let i = 0; i < shuffleMoves; i++) {
                const neighbors = getMovableNeighbors();
                const validNeighbors = neighbors.filter(n => n !== lastIndex);
                const randomIndex = validNeighbors[Math.floor(Math.random() * validNeighbors.length)];

                [tiles[randomIndex], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[randomIndex]];
                lastIndex = emptyIndex;
                emptyIndex = randomIndex;
            }

            renderBoard();
        }

        function getMovableNeighbors() {
            const neighbors = [];
            const row = Math.floor(emptyIndex / size);
            const col = emptyIndex % size;

            if (row > 0) neighbors.push(emptyIndex - size);
            if (row < size - 1) neighbors.push(emptyIndex + size);
            if (col > 0) neighbors.push(emptyIndex - 1);
            if (col < size - 1) neighbors.push(emptyIndex + 1);

            return neighbors;
        }

        function checkWin() {
            for (let i = 0; i < tiles.length - 1; i++) {
                if (tiles[i] !== i + 1) return false;
            }
            return tiles[tiles.length - 1] === 0;
        }

        function handleWin() {
            stopTimer();
            createConfetti();

            const timeStr = document.getElementById('time').textContent;
            document.getElementById('finalTime').textContent = timeStr;
            document.getElementById('finalMoves').textContent = moves;

            // Update best time
            const key = size + 'x' + size;
            if (!bestTimes[key] || seconds < bestTimes[key]) {
                bestTimes[key] = seconds;
                saveBestTimes();
                updateBestDisplay();
            }

            document.getElementById('winModal').classList.add('show');
        }

        function createConfetti() {
            const colors = ['#f093fb', '#f5576c', '#4facfe', '#00f2fe', '#fff', '#ffd700'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.animationDuration = (2 + Math.random() * 2) + 's';
                document.body.appendChild(confetti);

                setTimeout(() => confetti.remove(), 4000);
            }
        }

        function closeModal() {
            document.getElementById('winModal').classList.remove('show');
            shuffle();
        }

        function setDifficulty(newSize) {
            size = newSize;
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes(size)) {
                    btn.classList.add('active');
                }
            });
            reset();
            updateBestDisplay();
        }

        function reset() {
            resetTimer();
            moves = 0;
            gameStarted = false;
            document.getElementById('moves').textContent = '0';
            createBoard();
        }

        function startTimer() {
            timer = setInterval(() => {
                seconds++;
                updateTimerDisplay();
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timer);
        }

        function resetTimer() {
            stopTimer();
            seconds = 0;
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('time').textContent = `${mins}:${secs}`;
        }

        function loadBestTimes() {
            const saved = localStorage.getItem('slidingPuzzleBest');
            if (saved) {
                bestTimes = JSON.parse(saved);
            }
        }

        function saveBestTimes() {
            localStorage.setItem('slidingPuzzleBest', JSON.stringify(bestTimes));
        }

        function updateBestDisplay() {
            const key = size + 'x' + size;
            const best = bestTimes[key];
            if (best) {
                const mins = Math.floor(best / 60).toString().padStart(2, '0');
                const secs = (best % 60).toString().padStart(2, '0');
                document.getElementById('best').textContent = `${mins}:${secs}`;
            } else {
                document.getElementById('best').textContent = '-';
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        init();
    </script>
</body>
</html>
