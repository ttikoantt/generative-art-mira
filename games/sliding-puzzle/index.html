<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sliding Puzzle - 15パズル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Hiragino Kaku Gothic Pro', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2rem;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea15, #764ba215);
            border-radius: 12px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #667eea;
        }

        .puzzle-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            aspect-ratio: 1;
            margin-bottom: 20px;
            background: #e0e5ec;
            padding: 8px;
            border-radius: 12px;
        }

        .tile {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1),
                        inset 0 1px 0 rgba(255, 255, 255, 0.8);
            color: #667eea;
            user-select: none;
        }

        .tile:active {
            transform: scale(0.95);
        }

        .tile.empty {
            background: transparent;
            box-shadow: none;
            cursor: default;
        }

        .tile.movable {
            background: linear-gradient(145deg, #f0f0ff, #e0e0f0);
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .win-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .win-overlay.show {
            display: flex;
        }

        .win-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: scaleIn 0.3s ease;
        }

        .win-content h2 {
            font-size: 2.5rem;
            color: #667eea;
            margin-bottom: 20px;
        }

        .win-content p {
            color: #666;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .win-content .final-stats {
            margin: 20px 0;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 12px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 480px) {
            .game-container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            .tile {
                font-size: 1.5rem;
            }

            button {
                padding: 12px;
                font-size: 0.9rem;
            }
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <h1>🧩 Sliding Puzzle</h1>
        <p class="subtitle">15パズル - 数字を順番に並べよう</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">移動回数</div>
                <div class="stat-value" id="moves">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">タイム</div>
                <div class="stat-value" id="timer">0:00</div>
            </div>
            <div class="stat">
                <div class="stat-label">ベスト</div>
                <div class="stat-value" id="best">--</div>
            </div>
        </div>

        <div class="puzzle-board" id="board"></div>

        <div class="controls">
            <button class="btn-primary" onclick="newGame()">新しいゲーム</button>
            <button class="btn-secondary" onclick="resetGame()">リセット</button>
        </div>
    </div>

    <div class="win-overlay" id="winOverlay">
        <div class="win-content">
            <h2>🎉 クリア！</h2>
            <div class="final-stats">
                <p>移動回数: <strong id="finalMoves">0</strong></p>
                <p>タイム: <strong id="finalTime">0:00</strong></p>
            </div>
            <button class="btn-primary" onclick="newGame()">もう一度プレイ</button>
        </div>
    </div>

    <script>
        let board = [];
        let emptyPos = { row: 3, col: 3 };
        let moves = 0;
        let seconds = 0;
        let timerInterval = null;
        let gameWon = false;
        let bestScore = localStorage.getItem('slidingPuzzleBest') || null;
        let initialBoard = [];

        function init() {
            if (bestScore) {
                document.getElementById('best').textContent = bestScore;
            }
            newGame();
        }

        function createSolvedBoard() {
            const board = [];
            for (let i = 0; i < 4; i++) {
                board[i] = [];
                for (let j = 0; j < 4; j++) {
                    board[i][j] = i * 4 + j + 1;
                }
            }
            board[3][3] = 0; // 空白
            return board;
        }

        function shuffleBoard() {
            board = createSolvedBoard();
            emptyPos = { row: 3, col: 3 };

            // ランダムな手順でシャッフル（必ず解けるようにするため）
            const shuffleMoves = 100;
            const directions = [
                { dr: -1, dc: 0 }, // 上
                { dr: 1, dc: 0 },  // 下
                { dr: 0, dc: -1 }, // 左
                { dr: 0, dc: 1 }   // 右
            ];

            for (let i = 0; i < shuffleMoves; i++) {
                const validMoves = directions.filter(dir => {
                    const newRow = emptyPos.row + dir.dr;
                    const newCol = emptyPos.col + dir.dc;
                    return newRow >= 0 && newRow < 4 && newCol >= 0 && newCol < 4;
                });

                const randomMove = validMoves[Math.floor(Math.random() * validMoves.length)];
                const newRow = emptyPos.row + randomMove.dr;
                const newCol = emptyPos.col + randomMove.dc;

                // 交換
                board[emptyPos.row][emptyPos.col] = board[newRow][newCol];
                board[newRow][newCol] = 0;
                emptyPos = { row: newRow, col: newCol };
            }

            // 初期状態を保存
            initialBoard = board.map(row => [...row]);
        }

        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';

            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';

                    if (board[i][j] === 0) {
                        tile.className += ' empty';
                    } else {
                        tile.textContent = board[i][j];

                        // 動かせるタイルをハイライト
                        if (canMove(i, j)) {
                            tile.className += ' movable';
                        }

                        tile.addEventListener('click', () => moveTile(i, j));
                    }

                    boardEl.appendChild(tile);
                }
            }
        }

        function canMove(row, col) {
            const dr = Math.abs(row - emptyPos.row);
            const dc = Math.abs(col - emptyPos.col);
            return (dr === 1 && dc === 0) || (dr === 0 && dc === 1);
        }

        function moveTile(row, col) {
            if (gameWon || !canMove(row, col)) return;

            // タイマー開始
            if (!timerInterval) {
                startTimer();
            }

            // 交換
            board[emptyPos.row][emptyPos.col] = board[row][col];
            board[row][col] = 0;
            emptyPos = { row, col };

            moves++;
            document.getElementById('moves').textContent = moves;

            renderBoard();
            checkWin();
        }

        function checkWin() {
            const solved = createSolvedBoard();
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (board[i][j] !== solved[i][j]) {
                        return false;
                    }
                }
            }

            gameWon = true;
            stopTimer();

            // ベストスコア更新
            if (!bestScore || moves < parseInt(bestScore)) {
                bestScore = moves;
                localStorage.setItem('slidingPuzzleBest', bestScore);
                document.getElementById('best').textContent = bestScore;
            }

            // クリア表示
            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('finalTime').textContent = formatTime(seconds);
            document.getElementById('winOverlay').classList.add('show');

            return true;
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                document.getElementById('timer').textContent = formatTime(seconds);
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function formatTime(totalSeconds) {
            const mins = Math.floor(totalSeconds / 60);
            const secs = totalSeconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function newGame() {
            stopTimer();
            moves = 0;
            seconds = 0;
            gameWon = false;
            document.getElementById('moves').textContent = '0';
            document.getElementById('timer').textContent = '0:00';
            document.getElementById('winOverlay').classList.remove('show');
            shuffleBoard();
            renderBoard();
        }

        function resetGame() {
            stopTimer();
            moves = 0;
            seconds = 0;
            gameWon = false;
            document.getElementById('moves').textContent = '0';
            document.getElementById('timer').textContent = '0:00';
            document.getElementById('winOverlay').classList.remove('show');
            board = initialBoard.map(row => [...row]);

            // 空白の位置を見つける
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (board[i][j] === 0) {
                        emptyPos = { row: i, col: j };
                    }
                }
            }

            renderBoard();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        init();
    </script>
</body>
</html>
