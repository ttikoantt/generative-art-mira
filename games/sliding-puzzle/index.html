<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sliding Puzzle - 15パズル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
            font-size: 16px;
            color: #555;
        }

        .stat {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
        }

        .puzzle-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            max-width: 400px;
            margin: 20px auto;
            aspect-ratio: 1;
        }

        .tile {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            user-select: none;
        }

        .tile:hover:not(.empty) {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .tile.empty {
            background: rgba(0, 0, 0, 0.1);
            box-shadow: none;
            cursor: default;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .win-message {
            display: none;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            animation: bounce 0.5s;
        }

        .win-message.show {
            display: block;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .tile {
                font-size: 24px;
            }
            
            .puzzle-container {
                gap: 6px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    
    <div class="container">
        <h1>🧩 Sliding Puzzle</h1>
        <div class="stats">
            <div class="stat">移動回数: <span id="moves">0</span></div>
            <div class="stat">時間: <span id="time">00:00</span></div>
        </div>
        
        <div class="puzzle-container" id="puzzle"></div>
        
        <div class="controls">
            <button onclick="scramble()">シャッフル</button>
            <button onclick="reset()">リセット</button>
        </div>
        
        <div class="win-message" id="winMessage">
            🎉 クリアおめでとう！ 🎉
        </div>
    </div>

    <script>
        const SIZE = 4;
        let tiles = [];
        let emptyPos = { row: 3, col: 3 };
        let moves = 0;
        let seconds = 0;
        let timerInterval = null;
        let gameStarted = false;

        function init() {
            tiles = [];
            for (let i = 0; i < SIZE * SIZE - 1; i++) {
                tiles.push(i + 1);
            }
            tiles.push(0); // Empty tile
            emptyPos = { row: SIZE - 1, col: SIZE - 1 };
            moves = 0;
            seconds = 0;
            gameStarted = false;
            updateDisplay();
            document.getElementById('winMessage').classList.remove('show');
            if (timerInterval) clearInterval(timerInterval);
        }

        function getIndex(row, col) {
            return row * SIZE + col;
        }

        function getPos(index) {
            return {
                row: Math.floor(index / SIZE),
                col: index % SIZE
            };
        }

        function canMove(row, col) {
            const rowDiff = Math.abs(row - emptyPos.row);
            const colDiff = Math.abs(col - emptyPos.col);
            return (rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1);
        }

        function moveTile(row, col) {
            if (!canMove(row, col)) return;

            const tileIndex = getIndex(row, col);
            const emptyIndex = getIndex(emptyPos.row, emptyPos.col);

            // Swap tiles
            [tiles[tileIndex], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[tileIndex]];
            emptyPos = { row, col };

            moves++;
            updateDisplay();

            if (!gameStarted) {
                gameStarted = true;
                startTimer();
            }

            if (checkWin()) {
                clearInterval(timerInterval);
                document.getElementById('winMessage').classList.add('show');
            }
        }

        function updateDisplay() {
            const puzzle = document.getElementById('puzzle');
            puzzle.innerHTML = '';

            for (let i = 0; i < SIZE * SIZE; i++) {
                const tile = document.createElement('div');
                const value = tiles[i];

                if (value === 0) {
                    tile.className = 'tile empty';
                } else {
                    tile.className = 'tile';
                    tile.textContent = value;
                    const pos = getPos(i);
                    tile.onclick = () => moveTile(pos.row, pos.col);
                }

                puzzle.appendChild(tile);
            }

            document.getElementById('moves').textContent = moves;
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('time').textContent = `${mins}:${secs}`;
            }, 1000);
        }

        function checkWin() {
            for (let i = 0; i < SIZE * SIZE - 1; i++) {
                if (tiles[i] !== i + 1) return false;
            }
            return tiles[SIZE * SIZE - 1] === 0;
        }

        function scramble() {
            // Perform random valid moves to ensure solvability
            const scrambleMoves = 150;
            let lastMove = null;

            for (let i = 0; i < scrambleMoves; i++) {
                const validMoves = [];
                const { row, col } = emptyPos;

                if (row > 0) validMoves.push({ row: row - 1, col });
                if (row < SIZE - 1) validMoves.push({ row: row + 1, col });
                if (col > 0) validMoves.push({ row, col: col - 1 });
                if (col < SIZE - 1) validMoves.push({ row, col: col + 1 });

                // Avoid undoing the last move
                const filteredMoves = validMoves.filter(
                    move => !lastMove || move.row !== lastMove.row || move.col !== lastMove.col
                );

                const move = filteredMoves[Math.floor(Math.random() * filteredMoves.length)];

                const tileIndex = getIndex(move.row, move.col);
                const emptyIndex = getIndex(emptyPos.row, emptyPos.col);

                [tiles[tileIndex], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[tileIndex]];
                lastMove = emptyPos;
                emptyPos = move;
            }

            moves = 0;
            seconds = 0;
            gameStarted = false;
            updateDisplay();
            document.getElementById('winMessage').classList.remove('show');
            if (timerInterval) clearInterval(timerInterval);
        }

        function reset() {
            init();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        init();
        scramble();
    </script>
</body>
</html>
