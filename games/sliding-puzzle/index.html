<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sliding Puzzle - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: 700;
        }

        .puzzle-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .puzzle-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            aspect-ratio: 1;
        }

        .tile {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            aspect-ratio: 1;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .tile:hover:not(.empty) {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .tile.empty {
            background: rgba(255, 255, 255, 0.1);
            cursor: default;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .shuffle-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        .shuffle-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .win-message {
            display: none;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            font-size: 1.2em;
            font-weight: 600;
            animation: pulse 0.5s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            from {
                transform: scale(1);
            }
            to {
                transform: scale(1.05);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .puzzle-container {
                padding: 15px;
            }

            .tile {
                font-size: 1.5em;
            }

            .stats {
                gap: 15px;
            }

            .stat-item {
                padding: 10px 15px;
            }

            button {
                padding: 12px 30px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <h1>🧩 Sliding Puzzle</h1>
        <p class="subtitle">タイルを並べ替えて完成させよう！</p>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">🎯 移動回数</div>
                <div class="stat-value" id="moveCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">⏱️ タイム</div>
                <div class="stat-value" id="timer">00:00</div>
            </div>
        </div>

        <div class="puzzle-container">
            <div class="puzzle-grid" id="puzzleGrid"></div>
        </div>

        <div class="win-message" id="winMessage">
            🎉 クリアおめでとう！ 🎉
        </div>

        <div class="controls">
            <button class="shuffle-btn" onclick="shufflePuzzle()">🔀 シャッフル</button>
        </div>
    </div>

    <script>
        let tiles = [1, 2, 3, 4, 5, 6, 7, 8, 0];
        let moveCount = 0;
        let timerInterval;
        let seconds = 0;
        let gameStarted = false;

        function initPuzzle() {
            const grid = document.getElementById('puzzleGrid');
            grid.innerHTML = '';

            tiles.forEach((value, index) => {
                const tile = document.createElement('div');
                tile.className = value === 0 ? 'tile empty' : 'tile';
                tile.textContent = value === 0 ? '' : value;
                tile.onclick = () => moveTile(index);
                grid.appendChild(tile);
            });
        }

        function moveTile(index) {
            const emptyIndex = tiles.indexOf(0);
            const row = Math.floor(index / 3);
            const col = index % 3;
            const emptyRow = Math.floor(emptyIndex / 3);
            const emptyCol = emptyIndex % 3;

            const rowDiff = Math.abs(row - emptyRow);
            const colDiff = Math.abs(col - emptyCol);

            if ((rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1)) {
                if (!gameStarted) {
                    gameStarted = true;
                    startTimer();
                }

                [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
                moveCount++;
                document.getElementById('moveCount').textContent = moveCount;
                initPuzzle();

                if (checkWin()) {
                    stopTimer();
                    document.getElementById('winMessage').style.display = 'block';
                }
            }
        }

        function checkWin() {
            const winState = [1, 2, 3, 4, 5, 6, 7, 8, 0];
            return tiles.every((value, index) => value === winState[index]);
        }

        function shufflePuzzle() {
            moveCount = 0;
            seconds = 0;
            gameStarted = false;
            document.getElementById('moveCount').textContent = '0';
            document.getElementById('timer').textContent = '00:00';
            document.getElementById('winMessage').style.display = 'none';
            stopTimer();

            // シャッフル（解けるパズルを生成）
            do {
                for (let i = tiles.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
                }
            } while (!isSolvable() || checkWin());

            initPuzzle();
        }

        function isSolvable() {
            let inversions = 0;
            for (let i = 0; i < tiles.length; i++) {
                for (let j = i + 1; j < tiles.length; j++) {
                    if (tiles[i] !== 0 && tiles[j] !== 0 && tiles[i] > tiles[j]) {
                        inversions++;
                    }
                }
            }
            return inversions % 2 === 0;
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('timer').textContent = `${mins}:${secs}`;
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        window.onload = () => {
            initPuzzle();
        };
    </script>
</body>
</html>
