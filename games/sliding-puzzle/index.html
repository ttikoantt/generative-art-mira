<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sliding Puzzle - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 10px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 12px;
            text-align: center;
            backdrop-filter: blur(10px);
            flex: 1;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            margin-bottom: 5px;
        }

        .stat-value {
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .tile {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .tile:not(.empty) {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .tile:not(.empty):hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .tile:not(.empty):active {
            transform: scale(0.95);
        }

        .tile.empty {
            background: rgba(255, 255, 255, 0.05);
            cursor: default;
        }

        .tile.correct {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: white;
            color: #1e3c72;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-title {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-text {
            color: #666;
            margin-bottom: 20px;
        }

        .modal-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .modal-stat {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 12px;
        }

        .modal-stat-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }

        .modal-stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 24px;
            }

            .tile {
                font-size: 24px;
            }

            .modal-content {
                padding: 30px 20px;
            }

            .fullscreen-btn {
                bottom: 15px;
                right: 15px;
                padding: 10px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧩 Sliding Puzzle</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">Moves</div>
                <div class="stat-value" id="moves">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Time</div>
                <div class="stat-value" id="time">0:00</div>
            </div>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="controls">
            <button class="btn btn-primary" onclick="newGame()">New Game</button>
            <button class="btn btn-secondary" onclick="toggleFullscreen()">Full Screen</button>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <div class="modal-title">🎉 Complete!</div>
            <div class="modal-text">You solved the puzzle!</div>
            <div class="modal-stats">
                <div class="modal-stat">
                    <div class="modal-stat-label">Moves</div>
                    <div class="modal-stat-value" id="finalMoves">0</div>
                </div>
                <div class="modal-stat">
                    <div class="modal-stat-label">Time</div>
                    <div class="modal-stat-value" id="finalTime">0:00</div>
                </div>
            </div>
            <button class="btn btn-primary" onclick="closeModal(); newGame();">Play Again</button>
        </div>
    </div>

    <script>
        const SIZE = 4;
        let board = [];
        let moves = 0;
        let seconds = 0;
        let timer = null;
        let gameStarted = false;

        // Initialize game
        function init() {
            board = [];
            for (let i = 1; i < SIZE * SIZE; i++) {
                board.push(i);
            }
            board.push(0); // Empty space

            // Shuffle (ensure solvable)
            shuffle();
            render();
        }

        // Shuffle board
        function shuffle() {
            // Start with solved state
            board = Array.from({length: SIZE * SIZE - 1}, (_, i) => i + 1);
            board.push(0);

            // Make random moves (ensures solvability)
            const emptyIdx = board.indexOf(0);
            let lastMove = -1;

            for (let i = 0; i < 150; i++) {
                const validMoves = getValidMoves();
                const movesWithoutLast = validMoves.filter(m => m !== lastMove);
                const move = movesWithoutLast.length > 0
                    ? movesWithoutLast[Math.floor(Math.random() * movesWithoutLast.length)]
                    : validMoves[Math.floor(Math.random() * validMoves.length)];

                swap(move, board.indexOf(0));
                lastMove = board.indexOf(0);
            }
        }

        // Get valid moves for empty space
        function getValidMoves() {
            const emptyIdx = board.indexOf(0);
            const row = Math.floor(emptyIdx / SIZE);
            const col = emptyIdx % SIZE;
            const moves = [];

            if (row > 0) moves.push(emptyIdx - SIZE); // Up
            if (row < SIZE - 1) moves.push(emptyIdx + SIZE); // Down
            if (col > 0) moves.push(emptyIdx - 1); // Left
            if (col < SIZE - 1) moves.push(emptyIdx + 1); // Right

            return moves;
        }

        // Swap tiles
        function swap(idx1, idx2) {
            [board[idx1], board[idx2]] = [board[idx2], board[idx1]];
        }

        // Render board
        function render() {
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';

            board.forEach((value, index) => {
                const tile = document.createElement('div');
                tile.className = 'tile';

                if (value === 0) {
                    tile.classList.add('empty');
                } else {
                    tile.textContent = value;
                    tile.onclick = () => handleClick(index);

                    // Highlight correct position
                    if (value === index + 1) {
                        tile.classList.add('correct');
                    }
                }

                gameBoard.appendChild(tile);
            });
        }

        // Handle tile click
        function handleClick(index) {
            const emptyIdx = board.indexOf(0);
            const row = Math.floor(index / SIZE);
            const col = index % SIZE;
            const emptyRow = Math.floor(emptyIdx / SIZE);
            const emptyCol = emptyIdx % SIZE;

            // Check if adjacent
            const isAdjacent =
                (Math.abs(row - emptyRow) === 1 && col === emptyCol) ||
                (Math.abs(col - emptyCol) === 1 && row === emptyRow);

            if (isAdjacent) {
                // Start timer on first move
                if (!gameStarted) {
                    gameStarted = true;
                    startTimer();
                }

                swap(index, emptyIdx);
                moves++;
                updateStats();
                render();

                // Check win
                if (checkWin()) {
                    stopTimer();
                    showWinModal();
                }
            }
        }

        // Check if puzzle is solved
        function checkWin() {
            for (let i = 0; i < SIZE * SIZE - 1; i++) {
                if (board[i] !== i + 1) return false;
            }
            return board[SIZE * SIZE - 1] === 0;
        }

        // Timer functions
        function startTimer() {
            timer = setInterval(() => {
                seconds++;
                updateStats();
            }, 1000);
        }

        function stopTimer() {
            if (timer) {
                clearInterval(timer);
                timer = null;
            }
        }

        function updateStats() {
            document.getElementById('moves').textContent = moves;
            document.getElementById('time').textContent = formatTime(seconds);
        }

        function formatTime(secs) {
            const mins = Math.floor(secs / 60);
            const s = secs % 60;
            return `${mins}:${s.toString().padStart(2, '0')}`;
        }

        // Modal functions
        function showWinModal() {
            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('finalTime').textContent = formatTime(seconds);
            document.getElementById('winModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('winModal').classList.remove('show');
        }

        // New game
        function newGame() {
            stopTimer();
            moves = 0;
            seconds = 0;
            gameStarted = false;
            updateStats();
            init();
        }

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Start game
        init();
    </script>
</body>
</html>
