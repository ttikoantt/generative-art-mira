<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Memory Sequence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .stat {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
        }

        .stat-value {
            color: #64c8ff;
            font-weight: bold;
            font-size: 1.5rem;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 20px auto;
            max-width: 400px;
        }

        .panel {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
            overflow: hidden;
        }

        .panel::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .panel:hover::before {
            opacity: 1;
        }

        .panel:active {
            transform: scale(0.95);
        }

        .panel.active {
            transform: scale(1.05);
            border-color: currentColor;
            box-shadow: 0 0 30px currentColor, inset 0 0 30px currentColor;
        }

        .panel.success {
            animation: successPulse 0.5s ease-out;
        }

        .panel.error {
            animation: errorShake 0.5s ease-out;
        }

        @keyframes successPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .panel-0 { color: #ff6b6b; }
        .panel-1 { color: #4ecdc4; }
        .panel-2 { color: #ffe66d; }
        .panel-3 { color: #a855f7; }

        .status {
            color: #fff;
            font-size: 1.3rem;
            margin: 20px 0;
            min-height: 30px;
            text-shadow: 0 0 10px rgba(100, 200, 255, 0.3);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            margin: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .game-over.show {
            display: flex;
        }

        .game-over-content {
            background: linear-gradient(135deg, #1a1f3a 0%, #2a2f4a 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(100, 200, 255, 0.3);
        }

        .game-over h2 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .game-over p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.3rem;
            margin: 10px 0;
        }

        .game-over .score {
            color: #64c8ff;
            font-size: 3rem;
            font-weight: bold;
            margin: 20px 0;
        }

        #fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(100, 200, 255, 0.2);
            border: 2px solid rgba(100, 200, 255, 0.5);
            color: #64c8ff;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 100;
        }

        #fullscreen:hover {
            background: rgba(100, 200, 255, 0.3);
            border-color: rgba(100, 200, 255, 0.8);
            transform: scale(1.05);
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .game-board { gap: 15px; }
            .panel { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <button id="fullscreen">全画面</button>

    <div class="container">
        <h1>🎵 Memory Sequence</h1>

        <div class="stats">
            <div class="stat">
                <div>レベル</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div>スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div>ハイスコア</div>
                <div class="stat-value" id="highscore">0</div>
            </div>
        </div>

        <div class="game-board">
            <div class="panel panel-0" data-panel="0">🔴</div>
            <div class="panel panel-1" data-panel="1">🟢</div>
            <div class="panel panel-2" data-panel="2">🟡</div>
            <div class="panel panel-3" data-panel="3">🟣</div>
        </div>

        <div class="status" id="status">スタートボタンを押してね！</div>

        <button class="btn" id="startBtn">スタート</button>
    </div>

    <div class="game-over" id="gameOver">
        <div class="game-over-content">
            <h2>ゲームオーバー！</h2>
            <p>あなたのスコア</p>
            <div class="score" id="finalScore">0</div>
            <p>到達レベル: <span id="finalLevel">1</span></p>
            <button class="btn" id="restartBtn">もう一度プレイ</button>
        </div>
    </div>

    <script>
        const panels = document.querySelectorAll('.panel');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const status = document.getElementById('status');
        const levelDisplay = document.getElementById('level');
        const scoreDisplay = document.getElementById('score');
        const highscoreDisplay = document.getElementById('highscore');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreDisplay = document.getElementById('finalScore');
        const finalLevelDisplay = document.getElementById('finalLevel');
        const fullscreenBtn = document.getElementById('fullscreen');

        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let score = 0;
        let highscore = localStorage.getItem('memorySequenceHighscore') || 0;
        let isPlaying = false;
        let isShowingSequence = false;

        // パネルの色とトーン
        const panelColors = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#a855f7'];
        const panelTones = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5

        // Web Audio API
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playTone(index) {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = panelTones[index];
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        function activatePanel(index, duration = 500) {
            const panel = panels[index];
            panel.classList.add('active');
            playTone(index);

            setTimeout(() => {
                panel.classList.remove('active');
            }, duration);
        }

        async function showSequence() {
            isShowingSequence = true;
            status.textContent = 'よく見てね...';

            await new Promise(resolve => setTimeout(resolve, 500));

            for (let i = 0; i < sequence.length; i++) {
                await new Promise(resolve => setTimeout(resolve, 200));
                activatePanel(sequence[i]);
                await new Promise(resolve => setTimeout(resolve, 600));
            }

            isShowingSequence = false;
            status.textContent = '順番通りにタップしてね！';
        }

        function addToSequence() {
            const randomPanel = Math.floor(Math.random() * 4);
            sequence.push(randomPanel);
        }

        function handlePanelClick(index) {
            if (!isPlaying || isShowingSequence) return;

            activatePanel(index, 300);
            playerSequence.push(index);

            const currentIndex = playerSequence.length - 1;

            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                gameOver();
                return;
            }

            if (playerSequence.length === sequence.length) {
                // レベル完了
                score += level * 10;
                level++;
                scoreDisplay.textContent = score;
                levelDisplay.textContent = level;

                status.textContent = '正解！次のレベルへ...';

                setTimeout(() => {
                    playerSequence = [];
                    addToSequence();
                    showSequence();
                }, 1000);
            }
        }

        function startGame() {
            sequence = [];
            playerSequence = [];
            level = 1;
            score = 0;
            isPlaying = true;

            levelDisplay.textContent = level;
            scoreDisplay.textContent = score;
            highscoreDisplay.textContent = highscore;

            startBtn.style.display = 'none';
            gameOverScreen.classList.remove('show');

            addToSequence();
            showSequence();
        }

        function gameOver() {
            isPlaying = false;

            // パネルを赤く点滅
            panels.forEach(panel => panel.classList.add('error'));
            setTimeout(() => {
                panels.forEach(panel => panel.classList.remove('error'));
            }, 500);

            // ハイスコア更新
            if (score > highscore) {
                highscore = score;
                localStorage.setItem('memorySequenceHighscore', highscore);
                highscoreDisplay.textContent = highscore;
            }

            finalScoreDisplay.textContent = score;
            finalLevelDisplay.textContent = level;

            setTimeout(() => {
                gameOverScreen.classList.add('show');
                startBtn.style.display = 'inline-block';
            }, 1000);
        }

        // イベントリスナー
        panels.forEach((panel, index) => {
            panel.addEventListener('click', () => handlePanelClick(index));
            panel.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handlePanelClick(index);
            });
        });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // 初期化
        highscoreDisplay.textContent = highscore;
    </script>
</body>
</html>
