<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>カラーキャッチ - Color Catch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            touch-action: none;
        }
        
        canvas {
            display: block;
        }
        
        .ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        
        .score, .level {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }
        
        .target-color {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 0 30px currentColor;
            z-index: 100;
            transition: all 0.3s;
        }
        
        .target-label {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 14px;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }
        
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
        }
        
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 200;
            display: none;
        }
        
        .game-over h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }
        
        .game-over p {
            font-size: 24px;
            margin-bottom: 30px;
        }
        
        .game-over button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .game-over button:hover {
            transform: scale(1.05);
        }
        
        @media (max-width: 768px) {
            .score, .level {
                font-size: 18px;
            }
            
            .target-color {
                width: 60px;
                height: 60px;
            }
            
            .target-label {
                font-size: 12px;
                bottom: 90px;
            }
            
            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="ui">
        <div class="score">スコア: <span id="score">0</span></div>
        <div class="level">レベル: <span id="level">1</span></div>
    </div>
    
    <div class="target-label">この色をキャッチ！</div>
    <div class="target-color" id="targetColor"></div>
    
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    
    <div class="game-over" id="gameOver">
        <h2>ゲームオーバー</h2>
        <p>スコア: <span id="finalScore">0</span></p>
        <button onclick="restartGame()">もう一度</button>
    </div>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        
        // ゲーム状態
        let score = 0;
        let level = 1;
        let lives = 3;
        let gameOver = false;
        let targetColorHue = 0;
        
        // 色の定義
        const colors = [
            { hue: 0, name: '赤' },
            { hue: 30, name: 'オレンジ' },
            { hue: 60, name: '黄色' },
            { hue: 120, name: '緑' },
            { hue: 180, name: 'シアン' },
            { hue: 240, name: '青' },
            { hue: 280, name: '紫' },
            { hue: 320, name: 'ピンク' }
        ];
        
        // ボール
        class Ball {
            constructor() {
                this.radius = Math.random() * 20 + 25;
                this.x = Math.random() * (width - this.radius * 2) + this.radius;
                this.y = -this.radius;
                this.speed = Math.random() * 2 + 2 + level * 0.3;
                this.hue = colors[Math.floor(Math.random() * colors.length)].hue;
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
            }
            
            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                // グロー効果
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius * 1.5);
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 70%, 1)`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 100%, 60%, 0.8)`);
                gradient.addColorStop(1, `hsla(${this.hue}, 100%, 50%, 0)`);
                
                ctx.beginPath();
                ctx.arc(0, 0, this.radius * 1.5, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // 本体
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${this.hue}, 100%, 60%)`;
                ctx.fill();
                
                // ハイライト
                ctx.beginPath();
                ctx.arc(-this.radius * 0.3, -this.radius * 0.3, this.radius * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.fill();
                
                ctx.restore();
            }
            
            isClicked(x, y) {
                const dx = x - this.x;
                const dy = y - this.y;
                return Math.sqrt(dx * dx + dy * dy) < this.radius * 1.5;
            }
        }
        
        let balls = [];
        let spawnTimer = 0;
        let spawnInterval = 120;
        
        function setTargetColor() {
            targetColorHue = colors[Math.floor(Math.random() * colors.length)].hue;
            const targetColorEl = document.getElementById('targetColor');
            targetColorEl.style.backgroundColor = `hsl(${targetColorHue}, 100%, 60%)`;
            targetColorEl.style.boxShadow = `0 0 30px hsl(${targetColorHue}, 100%, 60%)`;
        }
        
        function spawnBall() {
            balls.push(new Ball());
        }
        
        function checkColorMatch(ballHue) {
            const diff = Math.abs(ballHue - targetColorHue);
            return diff < 30 || diff > 330;
        }
        
        function animate() {
            // キャンバスクリア
            ctx.clearRect(0, 0, width, height);
            
            if (!gameOver) {
                // ボールスポーン
                spawnTimer++;
                if (spawnTimer >= spawnInterval) {
                    spawnBall();
                    spawnTimer = 0;
                    spawnInterval = Math.max(60, 120 - level * 5);
                }
                
                // ボール更新・描画
                for (let i = balls.length - 1; i >= 0; i--) {
                    const ball = balls[i];
                    ball.update();
                    ball.draw();
                    
                    // 画面外に出たら
                    if (ball.y - ball.radius > height) {
                        balls.splice(i, 1);
                    }
                }
            }
            
            requestAnimationFrame(animate);
        }
        
        function handleClick(x, y) {
            if (gameOver) return;
            
            for (let i = balls.length - 1; i >= 0; i--) {
                const ball = balls[i];
                if (ball.isClicked(x, y)) {
                    if (checkColorMatch(ball.hue)) {
                        // 正解
                        score += 10;
                        balls.splice(i, 1);
                        
                        // レベルアップ
                        if (score >= level * 50) {
                            level++;
                            setTargetColor();
                        }
                        
                        updateUI();
                    } else {
                        // 間違い
                        lives--;
                        if (lives <= 0) {
                            endGame();
                        }
                        balls.splice(i, 1);
                    }
                    return;
                }
            }
        }
        
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
        }
        
        function endGame() {
            gameOver = true;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function restartGame() {
            score = 0;
            level = 1;
            lives = 3;
            gameOver = false;
            balls = [];
            spawnTimer = 0;
            spawnInterval = 120;
            
            updateUI();
            setTargetColor();
            document.getElementById('gameOver').style.display = 'none';
        }
        
        // イベントリスナー
        canvas.addEventListener('click', (e) => {
            handleClick(e.clientX, e.clientY);
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let touch of e.touches) {
                handleClick(touch.clientX, touch.clientY);
            }
        });
        
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }
        
        // ゲーム開始
        setTargetColor();
        animate();
    </script>
</body>
</html>
