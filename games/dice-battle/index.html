<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Battle - Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 20px;
            font-size: 28px;
        }
        
        .battlefield {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 30px 0;
        }
        
        .player {
            text-align: center;
        }
        
        .player-name {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .dice-container {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin-bottom: 10px;
        }
        
        .dice {
            width: 50px;
            height: 50px;
            background: white;
            border: 3px solid #667eea;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }
        
        .dice.rolling {
            animation: roll 0.5s ease-out;
        }
        
        @keyframes roll {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(90deg) scale(1.2); }
            50% { transform: rotate(180deg) scale(1); }
            75% { transform: rotate(270deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }
        
        .player-score {
            font-size: 24px;
            font-weight: bold;
            color: #764ba2;
        }
        
        .vs {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .result {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin: 20px 0;
            min-height: 30px;
            color: #764ba2;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 15px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 10px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">⛶ Fullscreen</button>
    
    <div class="game-container">
        <h1>🎲 Dice Battle</h1>
        
        <div class="battlefield">
            <div class="player">
                <div class="player-name">You</div>
                <div class="dice-container">
                    <div class="dice" id="playerDice1">?</div>
                    <div class="dice" id="playerDice2">?</div>
                </div>
                <div class="player-score" id="playerScore">-</div>
            </div>
            
            <div class="vs">VS</div>
            
            <div class="player">
                <div class="player-name">CPU</div>
                <div class="dice-container">
                    <div class="dice" id="cpuDice1">?</div>
                    <div class="dice" id="cpuDice2">?</div>
                </div>
                <div class="player-score" id="cpuScore">-</div>
            </div>
        </div>
        
        <div class="result" id="result">Roll to start!</div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-label">Your Wins</div>
                <div class="stat-value" id="playerWins">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Ties</div>
                <div class="stat-value" id="ties">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">CPU Wins</div>
                <div class="stat-value" id="cpuWins">0</div>
            </div>
        </div>
        
        <div class="controls">
            <button id="rollBtn">🎲 Roll!</button>
            <button id="resetBtn">🔄 Reset</button>
        </div>
    </div>

    <script>
        const playerDice1 = document.getElementById('playerDice1');
        const playerDice2 = document.getElementById('playerDice2');
        const cpuDice1 = document.getElementById('cpuDice1');
        const cpuDice2 = document.getElementById('cpuDice2');
        const playerScoreEl = document.getElementById('playerScore');
        const cpuScoreEl = document.getElementById('cpuScore');
        const resultEl = document.getElementById('result');
        const rollBtn = document.getElementById('rollBtn');
        const resetBtn = document.getElementById('resetBtn');
        const playerWinsEl = document.getElementById('playerWins');
        const tiesEl = document.getElementById('ties');
        const cpuWinsEl = document.getElementById('cpuWins');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        
        let playerWins = 0;
        let ties = 0;
        let cpuWins = 0;
        let isRolling = false;
        
        function rollDice() {
            return Math.floor(Math.random() * 6) + 1;
        }
        
        function updateDice(element, value) {
            element.classList.add('rolling');
            setTimeout(() => {
                element.classList.remove('rolling');
                element.textContent = value;
            }, 500);
        }
        
        function roll() {
            if (isRolling) return;
            isRolling = true;
            rollBtn.disabled = true;
            
            resultEl.textContent = 'Rolling...';
            
            // サイコロをアニメーション
            const dice = [playerDice1, playerDice2, cpuDice1, cpuDice2];
            dice.forEach(d => {
                d.textContent = '?';
                d.classList.add('rolling');
            });
            
            setTimeout(() => {
                const playerRoll1 = rollDice();
                const playerRoll2 = rollDice();
                const cpuRoll1 = rollDice();
                const cpuRoll2 = rollDice();
                
                const playerTotal = playerRoll1 + playerRoll2;
                const cpuTotal = cpuRoll1 + cpuRoll2;
                
                playerDice1.classList.remove('rolling');
                playerDice2.classList.remove('rolling');
                cpuDice1.classList.remove('rolling');
                cpuDice2.classList.remove('rolling');
                
                playerDice1.textContent = playerRoll1;
                playerDice2.textContent = playerRoll2;
                cpuDice1.textContent = cpuRoll1;
                cpuDice2.textContent = cpuRoll2;
                
                playerScoreEl.textContent = playerTotal;
                cpuScoreEl.textContent = cpuTotal;
                
                // 結果判定
                if (playerTotal > cpuTotal) {
                    resultEl.textContent = '🎉 You Win!';
                    resultEl.style.color = '#4caf50';
                    playerWins++;
                    playerWinsEl.textContent = playerWins;
                } else if (playerTotal < cpuTotal) {
                    resultEl.textContent = '😢 CPU Wins!';
                    resultEl.style.color = '#f44336';
                    cpuWins++;
                    cpuWinsEl.textContent = cpuWins;
                } else {
                    resultEl.textContent = '🤝 Tie!';
                    resultEl.style.color = '#ff9800';
                    ties++;
                    tiesEl.textContent = ties;
                }
                
                isRolling = false;
                rollBtn.disabled = false;
            }, 600);
        }
        
        function reset() {
            playerWins = 0;
            ties = 0;
            cpuWins = 0;
            playerWinsEl.textContent = '0';
            tiesEl.textContent = '0';
            cpuWinsEl.textContent = '0';
            playerDice1.textContent = '?';
            playerDice2.textContent = '?';
            cpuDice1.textContent = '?';
            cpuDice2.textContent = '?';
            playerScoreEl.textContent = '-';
            cpuScoreEl.textContent = '-';
            resultEl.textContent = 'Roll to start!';
            resultEl.style.color = '#764ba2';
        }
        
        rollBtn.addEventListener('click', roll);
        resetBtn.addEventListener('click', reset);
        
        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });
    </script>
</body>
</html>
