<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Shape Shifter - 形状変換パズル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: clamp(24px, 5vw, 36px);
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            color: #fff;
            font-size: clamp(14px, 3vw, 18px);
        }

        .stat-value {
            font-size: clamp(18px, 4vw, 24px);
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px);
        }

        .tile {
            width: clamp(60px, 15vw, 80px);
            height: clamp(60px, 15vw, 80px);
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid #fff;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(24px, 6vw, 36px);
            user-select: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .tile:active {
            transform: scale(0.9);
        }

        .tile.circle {
            border-radius: 50%;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .tile.square {
            border-radius: 5px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .tile.triangle {
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .tile.diamond {
            transform: rotate(45deg);
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            font-size: clamp(14px, 3vw, 16px);
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            z-index: 100;
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 40px;
            border-radius: 20px;
            font-size: clamp(20px, 5vw, 32px);
            z-index: 200;
            display: none;
            text-align: center;
        }

        .message.show {
            display: block;
            animation: popIn 0.5s;
        }

        @keyframes popIn {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.1);
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .instructions {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            color: #fff;
            font-size: clamp(12px, 3vw, 14px);
            margin-bottom: 20px;
            max-width: 90%;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>

    <div class="game-container">
        <h1>🔷 Shape Shifter</h1>

        <div class="instructions">
            タイルをタップして形状を変化させ、全て同じ形に揃えよう！
            隣接するタイルも連動して変化します。
        </div>

        <div class="stats">
            <div class="stat">
                <div>レベル</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div>手数</div>
                <div class="stat-value" id="moves">0</div>
            </div>
            <div class="stat">
                <div>目標</div>
                <div class="stat-value" id="target">全て同じ形</div>
            </div>
        </div>

        <div class="grid" id="grid"></div>

        <div class="controls">
            <button onclick="restartLevel()">🔄 レベル再開</button>
            <button onclick="newGame()">🎮 新規ゲーム</button>
        </div>
    </div>

    <div class="message" id="message"></div>

    <script>
        const shapes = ['circle', 'square', 'triangle', 'diamond'];
        const shapeIcons = {
            'circle': '⚫',
            'square': '⬛',
            'triangle': '▲',
            'diamond': '◆'
        };

        let gridSize = 4;
        let grid = [];
        let moves = 0;
        let level = 1;

        function initGame() {
            grid = [];
            for (let i = 0; i < gridSize * gridSize; i++) {
                // ランダムな初期状態
                grid.push(shapes[Math.floor(Math.random() * shapes.length)]);
            }
            moves = 0;
            updateDisplay();
        }

        function getShapeIndex(shape) {
            return shapes.indexOf(shape);
        }

        function getNextShape(shape) {
            const idx = getShapeIndex(shape);
            return shapes[(idx + 1) % shapes.length];
        }

        function getNeighbors(index) {
            const neighbors = [];
            const row = Math.floor(index / gridSize);
            const col = index % gridSize;

            // 上下左右
            if (row > 0) neighbors.push(index - gridSize); // 上
            if (row < gridSize - 1) neighbors.push(index + gridSize); // 下
            if (col > 0) neighbors.push(index - 1); // 左
            if (col < gridSize - 1) neighbors.push(index + 1); // 右

            return neighbors;
        }

        function handleClick(index) {
            // クリックしたタイルと隣接タイルを変化
            const neighbors = getNeighbors(index);
            const tilesToChange = [index, ...neighbors];

            tilesToChange.forEach(idx => {
                if (idx >= 0 && idx < grid.length) {
                    grid[idx] = getNextShape(grid[idx]);
                }
            });

            moves++;
            updateDisplay();

            if (checkWin()) {
                showMessage(`🎉 レベル${level}クリア！\n手数: ${moves}`);
                setTimeout(() => {
                    level++;
                    gridSize = Math.min(4 + Math.floor(level / 3), 6); // レベルに応じてグリッドサイズ増加
                    initGame();
                }, 2000);
            }
        }

        function checkWin() {
            const firstShape = grid[0];
            return grid.every(shape => shape === firstShape);
        }

        function updateDisplay() {
            document.getElementById('level').textContent = level;
            document.getElementById('moves').textContent = moves;

            const gridElement = document.getElementById('grid');
            gridElement.innerHTML = '';
            gridElement.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;

            grid.forEach((shape, index) => {
                const tile = document.createElement('div');
                tile.className = `tile ${shape}`;
                tile.textContent = shapeIcons[shape];
                tile.onclick = () => handleClick(index);
                gridElement.appendChild(tile);
            });
        }

        function restartLevel() {
            initGame();
        }

        function newGame() {
            level = 1;
            gridSize = 4;
            initGame();
        }

        function showMessage(text) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.classList.add('show');
            setTimeout(() => {
                messageEl.classList.remove('show');
            }, 2000);
        }

        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        }

        // タッチ操作の最適化
        document.addEventListener('touchstart', (e) => {
            if (e.target.classList.contains('tile')) {
                e.preventDefault();
            }
        }, { passive: false });

        initGame();
    </script>
</body>
</html>
