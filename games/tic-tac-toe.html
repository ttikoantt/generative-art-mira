<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .status {
            color: #4ECDC4;
            font-size: 1.2rem;
            margin-bottom: 20px;
            min-height: 30px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 400px;
            margin: 0 auto 20px;
        }

        .cell {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .cell:hover:not(.taken) {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .cell.taken {
            cursor: not-allowed;
        }

        .cell.x {
            color: #FF6B6B;
        }

        .cell.o {
            color: #4ECDC4;
        }

        .cell.winner {
            background: rgba(255, 215, 0, 0.3);
            animation: winner-pulse 0.5s ease-in-out infinite alternate;
        }

        @keyframes winner-pulse {
            from {
                transform: scale(1);
                box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            }
            to {
                transform: scale(1.05);
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            }
        }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .mode-selector {
            margin-bottom: 20px;
        }

        .mode-selector button {
            margin: 0 5px;
        }

        .mode-selector button.active {
            background: rgba(78, 205, 196, 0.3);
            border-color: #4ECDC4;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 10;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 400px) {
            h1 {
                font-size: 2rem;
            }

            .cell {
                width: 80px;
                height: 80px;
                font-size: 2.5rem;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">🖥️ Fullscreen</button>

    <div class="container">
        <h1>🎮 Tic Tac Toe</h1>

        <div class="mode-selector">
            <button id="pvpBtn" class="active">👥 PvP</button>
            <button id="aiBtn">🤖 vs AI</button>
        </div>

        <div class="status" id="status">プレイヤー X のターン</div>

        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="buttons">
            <button id="resetBtn">🔄 新しいゲーム</button>
        </div>
    </div>

    <script>
        const board = document.getElementById('board');
        const cells = document.querySelectorAll('.cell');
        const status = document.getElementById('status');
        const resetBtn = document.getElementById('resetBtn');
        const pvpBtn = document.getElementById('pvpBtn');
        const aiBtn = document.getElementById('aiBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let currentPlayer = 'X';
        let boardState = ['', '', '', '', '', '', '', '', ''];
        let gameActive = true;
        let vsAI = false;

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        function handleCellClick(e) {
            const cell = e.target;
            const index = parseInt(cell.getAttribute('data-index'));

            if (boardState[index] !== '' || !gameActive) {
                return;
            }

            makeMove(index, currentPlayer);

            if (vsAI && gameActive) {
                setTimeout(() => {
                    aiMove();
                }, 500);
            }
        }

        function makeMove(index, player) {
            boardState[index] = player;
            cells[index].textContent = player;
            cells[index].classList.add('taken', player.toLowerCase());

            if (checkWin()) {
                gameActive = false;
                highlightWinner();
                status.textContent = `🎉 プレイヤー ${player} の勝ち！`;
                return;
            }

            if (checkDraw()) {
                gameActive = false;
                status.textContent = '🤝 引き分け！';
                return;
            }

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            status.textContent = `プレイヤー ${currentPlayer} のターン`;
        }

        function checkWin() {
            return winningConditions.some(condition => {
                return condition.every(index => {
                    return boardState[index] === currentPlayer;
                });
            });
        }

        function checkDraw() {
            return boardState.every(cell => cell !== '');
        }

        function highlightWinner() {
            winningConditions.forEach(condition => {
                if (condition.every(index => boardState[index] === currentPlayer)) {
                    condition.forEach(index => {
                        cells[index].classList.add('winner');
                    });
                }
            });
        }

        function aiMove() {
            if (!gameActive) return;

            // 簡単なAI: 勝てる手があれば取る、そうでなければランダム
            let move = findWinningMove('O');

            if (move === -1) {
                move = findWinningMove('X');
            }

            if (move === -1) {
                // 中央が空いていれば取る
                if (boardState[4] === '') {
                    move = 4;
                } else {
                    // ランダムな空きマス
                    const availableMoves = [];
                    boardState.forEach((cell, index) => {
                        if (cell === '') {
                            availableMoves.push(index);
                        }
                    });
                    move = availableMoves[Math.floor(Math.random() * availableMoves.length)];
                }
            }

            makeMove(move, 'O');
        }

        function findWinningMove(player) {
            for (let condition of winningConditions) {
                const values = condition.map(i => boardState[i]);
                const playerCount = values.filter(v => v === player).length;
                const emptyCount = values.filter(v => v === '').length;

                if (playerCount === 2 && emptyCount === 1) {
                    return condition.find(i => boardState[i] === '');
                }
            }
            return -1;
        }

        function resetGame() {
            currentPlayer = 'X';
            boardState = ['', '', '', '', '', '', '', '', ''];
            gameActive = true;
            status.textContent = 'プレイヤー X のターン';

            cells.forEach(cell => {
                cell.textContent = '';
                cell.classList.remove('taken', 'x', 'o', 'winner');
            });
        }

        function setMode(mode) {
            vsAI = mode === 'ai';
            pvpBtn.classList.toggle('active', !vsAI);
            aiBtn.classList.toggle('active', vsAI);
            resetGame();
        }

        cells.forEach(cell => cell.addEventListener('click', handleCellClick));
        resetBtn.addEventListener('click', resetGame);
        pvpBtn.addEventListener('click', () => setMode('pvp'));
        aiBtn.addEventListener('click', () => setMode('ai'));

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                fullscreenBtn.textContent = '↩️ Exit';
            } else {
                document.exitFullscreen();
                fullscreenBtn.textContent = '🖥️ Fullscreen';
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fullscreenBtn.textContent = '↩️ Exit';
            } else {
                fullscreenBtn.textContent = '🖥️ Fullscreen';
            }
        });
    </script>
</body>
</html>
