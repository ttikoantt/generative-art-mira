<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Typing Sprint</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #4ecdc4;
        }

        .game-container {
            width: 100%;
            max-width: 600px;
        }

        .word-display {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
            border: 2px solid rgba(78, 205, 196, 0.3);
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #currentWord {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 3px;
        }

        .char {
            display: inline-block;
            transition: all 0.1s ease;
        }

        .char.correct {
            color: #4ecdc4;
        }

        .char.incorrect {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.2);
            border-radius: 3px;
        }

        .char.current {
            border-bottom: 3px solid #ffe66d;
            animation: pulse 0.5s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .input-area {
            position: relative;
            margin-bottom: 20px;
        }

        #wordInput {
            width: 100%;
            padding: 15px 20px;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }

        #wordInput:focus {
            border-color: #4ecdc4;
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.3);
        }

        #wordInput::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ecdc4, #44a08d);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: #fff;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(78, 205, 196, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            border: 2px solid #4ecdc4;
            display: none;
        }

        .message h2 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #4ecdc4;
        }

        .message p {
            font-size: 18px;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.8);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 20px;
        }

        .combo-display {
            position: fixed;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            font-size: 48px;
            font-weight: bold;
            color: #ffe66d;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .combo-display.show {
            opacity: 1;
            animation: comboIn 0.3s ease;
        }

        @keyframes comboIn {
            0% { transform: translateY(-50%) scale(0.5); }
            100% { transform: translateY(-50%) scale(1); }
        }
    </style>
</head>
<body>
    <div class="stats">
        <div class="stat">
            <div class="stat-label">Score</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Level</div>
            <div class="stat-value" id="level">1</div>
        </div>
        <div class="stat">
            <div class="stat-label">WPM</div>
            <div class="stat-value" id="wpm">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Accuracy</div>
            <div class="stat-value" id="accuracy">100%</div>
        </div>
        <div class="stat">
            <div class="stat-label">Combo</div>
            <div class="stat-value" id="combo">0</div>
        </div>
    </div>

    <div class="game-container">
        <div class="word-display">
            <div id="currentWord"></div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="input-area">
            <input type="text" id="wordInput" placeholder="Type the word..." autocomplete="off" autocapitalize="off" autocorrect="off">
        </div>

        <div class="controls">
            <button id="startBtn">Start Game</button>
            <button class="secondary" id="resetBtn">Reset</button>
        </div>
    </div>

    <div class="combo-display" id="comboDisplay">🔥 x5</div>

    <button class="fullscreen-btn" id="fullscreenBtn">⛶</button>

    <div class="message" id="message">
        <h2>Game Over!</h2>
        <p id="finalScore">Score: 0</p>
        <button id="playAgain">Play Again</button>
    </div>

    <script>
        const words = [
            'quick', 'brown', 'fox', 'jumps', 'lazy', 'dog', 'hello', 'world',
            'typing', 'speed', 'game', 'challenge', 'keyboard', 'practice',
            'improve', 'skills', 'fast', 'accurate', 'focus', 'concentrate',
            'amazing', 'awesome', 'excellent', 'fantastic', 'wonderful',
            'javascript', 'programming', 'computer', 'software', 'develop',
            'creative', 'innovative', 'brilliant', 'spectacular', 'incredible',
            'adventure', 'journey', 'explore', 'discover', 'experience',
            'mountain', 'ocean', 'forest', 'desert', 'river', 'sunshine',
            'butterfly', 'rainbow', 'thunder', 'lightning', 'whisper',
            'program', 'function', 'variable', 'array', 'object', 'string',
            'algorithm', 'structure', 'pattern', 'design', 'system', 'data'
        ];

        let currentWord = '';
        let currentIndex = 0;
        let score = 0;
        let level = 1;
        let combo = 0;
        let maxCombo = 0;
        let correctChars = 0;
        let totalChars = 0;
        let startTime = null;
        let gameActive = false;
        let wordsCompleted = 0;

        const wordInput = document.getElementById('wordInput');
        const currentWordEl = document.getElementById('currentWord');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const wpmEl = document.getElementById('wpm');
        const accuracyEl = document.getElementById('accuracy');
        const comboEl = document.getElementById('combo');
        const comboDisplay = document.getElementById('comboDisplay');
        const progressFill = document.getElementById('progressFill');
        const message = document.getElementById('message');
        const finalScore = document.getElementById('finalScore');

        function getRandomWord() {
            return words[Math.floor(Math.random() * words.length)];
        }

        function displayWord() {
            currentWordEl.innerHTML = currentWord.split('').map((char, index) => {
                let className = 'char';
                if (index < currentIndex) {
                    className += ' correct';
                } else if (index === currentIndex) {
                    className += ' current';
                }
                return `<span class="${className}">${char}</span>`;
            }).join('');
        }

        function updateStats() {
            scoreEl.textContent = score;
            levelEl.textContent = level;
            comboEl.textContent = combo;

            const accuracy = totalChars > 0 ? Math.round((correctChars / totalChars) * 100) : 100;
            accuracyEl.textContent = accuracy + '%';

            if (startTime) {
                const elapsed = (Date.now() - startTime) / 1000 / 60; // minutes
                const wpm = Math.round((correctChars / 5) / elapsed) || 0;
                wpmEl.textContent = wpm;
            }

            const progress = (wordsCompleted % 10) * 10;
            progressFill.style.width = progress + '%';
        }

        function showCombo() {
            if (combo >= 3) {
                comboDisplay.textContent = `🔥 x${combo}`;
                comboDisplay.classList.add('show');
                setTimeout(() => {
                    comboDisplay.classList.remove('show');
                }, 1000);
            }
        }

        function checkWord() {
            const typed = wordInput.value.trim().toLowerCase();
            const chars = currentWord.split('');
            const typedChars = typed.split('');

            totalChars += typedChars.length;

            if (typed === currentWord) {
                // Correct word
                const bonus = 1 + (combo * 0.1);
                const points = Math.round(currentWord.length * 10 * bonus * level);
                score += points;
                combo++;
                correctChars += currentWord.length;
                wordsCompleted++;

                if (combo > maxCombo) {
                    maxCombo = combo;
                }

                // Level up every 10 words
                if (wordsCompleted % 10 === 0) {
                    level++;
                }

                showCombo();
                nextWord();
            } else if (typed.length >= currentWord.length) {
                // Wrong word
                combo = 0;
                wordInput.value = '';
                currentIndex = 0;
                displayWord();
            }
        }

        function nextWord() {
            currentWord = getRandomWord();
            currentIndex = 0;
            wordInput.value = '';
            displayWord();
            updateStats();
        }

        function startGame() {
            score = 0;
            level = 1;
            combo = 0;
            correctChars = 0;
            totalChars = 0;
            wordsCompleted = 0;
            startTime = Date.now();
            gameActive = true;

            message.style.display = 'none';
            wordInput.disabled = false;
            wordInput.focus();

            nextWord();
        }

        function endGame() {
            gameActive = false;
            wordInput.disabled = true;

            finalScore.textContent = `Score: ${score} | Level: ${level} | Best Combo: x${maxCombo}`;
            message.style.display = 'block';
        }

        // Event Listeners
        wordInput.addEventListener('input', () => {
            if (!gameActive) return;

            const typed = wordInput.value.toLowerCase();
            currentIndex = typed.length;

            // Update character colors
            const chars = currentWordEl.querySelectorAll('.char');
            chars.forEach((charEl, index) => {
                charEl.classList.remove('correct', 'incorrect', 'current');
                if (index < typed.length) {
                    if (typed[index] === currentWord[index]) {
                        charEl.classList.add('correct');
                    } else {
                        charEl.classList.add('incorrect');
                    }
                } else if (index === typed.length) {
                    charEl.classList.add('current');
                }
            });

            // Check if word is complete
            if (typed.length >= currentWord.length) {
                checkWord();
            }
        });

        wordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && wordInput.value.trim() !== '') {
                checkWord();
            }
        });

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('resetBtn').addEventListener('click', () => {
            gameActive = false;
            score = 0;
            level = 1;
            combo = 0;
            wordsCompleted = 0;
            updateStats();
            currentWordEl.textContent = 'Press Start';
            wordInput.value = '';
            wordInput.disabled = true;
            progressFill.style.width = '0%';
        });

        document.getElementById('playAgain').addEventListener('click', startGame);

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Initialize
        currentWordEl.textContent = 'Press Start';
        wordInput.disabled = true;
    </script>
</body>
</html>
