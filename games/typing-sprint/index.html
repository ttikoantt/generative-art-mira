<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Sprint - Speed Typing Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 32px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
        }

        .stat {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 15px;
            min-width: 100px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }

        .word-display {
            background: #f5f5f5;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .current-word {
            font-size: 36px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .typed {
            color: #667eea;
        }

        .remaining {
            color: #999;
        }

        .input-area {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            font-size: 24px;
            border: 3px solid #667eea;
            border-radius: 10px;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }

        input[type="text"].correct {
            border-color: #43e97b;
            background: rgba(67, 233, 123, 0.1);
        }

        input[type="text"].wrong {
            border-color: #f5576c;
            background: rgba(245, 87, 108, 0.1);
        }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .mobile-keyboard {
            display: none;
            margin-top: 20px;
        }

        .word-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .word-option {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .word-option:hover {
            background: #667eea;
            color: white;
            transform: scale(1.05);
        }

        .word-option.selected {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }

        @media (max-width: 768px) {
            .game-container {
                padding: 20px;
                width: 95%;
            }

            h1 {
                font-size: 24px;
            }

            .stat-value {
                font-size: 20px;
            }

            .current-word {
                font-size: 28px;
            }

            input[type="text"] {
                font-size: 20px;
            }

            .mobile-keyboard {
                display: block;
            }

            .input-area {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .stats {
                flex-direction: column;
                gap: 10px;
            }

            .stat {
                width: 100%;
            }

            .word-options {
                grid-template-columns: 1fr;
            }
        }

        .game-over {
            display: none;
        }

        .game-over.active {
            display: block;
        }

        .final-score {
            font-size: 48px;
            color: #667eea;
            margin: 20px 0;
            font-weight: bold;
        }

        .wpm {
            font-size: 24px;
            color: #764ba2;
            margin-bottom: 20px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <div class="game-container">
        <div class="game-screen">
            <h1>⌨️ Typing Sprint</h1>

            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="score">0</div>
                    <div class="stat-label">Score</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="timer">60</div>
                    <div class="stat-label">Time</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="streak">0</div>
                    <div class="stat-label">Streak</div>
                </div>
            </div>

            <div class="word-display">
                <div class="current-word" id="wordDisplay">Ready?</div>
            </div>

            <div class="input-area">
                <input type="text" id="wordInput" placeholder="Type here..." autocomplete="off" autocapitalize="off">
            </div>

            <div class="mobile-keyboard">
                <div class="word-options" id="wordOptions"></div>
            </div>

            <div class="buttons">
                <button id="startBtn" onclick="startGame()">Start Game</button>
                <button class="secondary" onclick="resetGame()">Reset</button>
            </div>
        </div>

        <div class="game-over">
            <h1>🎉 Time's Up!</h1>
            <div class="final-score" id="finalScore">0</div>
            <div class="wpm" id="finalWPM">0 WPM</div>
            <div class="buttons">
                <button onclick="startGame()">Play Again</button>
                <button class="secondary" onclick="resetGame()">Menu</button>
            </div>
        </div>
    </div>

    <script>
        const words = [
            'hello', 'world', 'code', 'game', 'type', 'fast', 'speed',
            'quick', 'race', 'win', 'play', 'fun', 'cool', 'awesome',
            'amazing', 'excellent', 'fantastic', 'wonderful', 'brilliant',
            'keyboard', 'screen', 'mouse', 'click', 'type', 'enter',
            'space', 'shift', 'control', 'escape', 'tab', 'delete',
            'home', 'end', 'page', 'up', 'down', 'left', 'right',
            'python', 'javascript', 'html', 'css', 'react', 'node',
            'database', 'server', 'client', 'api', 'rest', 'json',
            'function', 'variable', 'constant', 'array', 'object',
            'string', 'number', 'boolean', 'null', 'undefined',
            'loop', 'condition', 'switch', 'case', 'break', 'continue',
            'return', 'class', 'interface', 'extends', 'implements',
            'import', 'export', 'default', 'from', 'as', 'async',
            'await', 'promise', 'resolve', 'reject', 'catch', 'finally'
        ];

        let currentWord = '';
        let score = 0;
        let timer = 60;
        let streak = 0;
        let gameInterval = null;
        let isPlaying = false;
        let totalWords = 0;
        let correctWords = 0;

        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const streakEl = document.getElementById('streak');
        const wordDisplay = document.getElementById('wordDisplay');
        const wordInput = document.getElementById('wordInput');
        const startBtn = document.getElementById('startBtn');
        const gameScreen = document.querySelector('.game-screen');
        const gameOverScreen = document.querySelector('.game-over');
        const finalScoreEl = document.getElementById('finalScore');
        const finalWMPEl = document.getElementById('finalWPM');
        const wordOptionsEl = document.getElementById('wordOptions');

        function getRandomWord() {
            return words[Math.floor(Math.random() * words.length)];
        }

        function setNewWord() {
            currentWord = getRandomWord();
            wordDisplay.innerHTML = currentWord;
            wordInput.value = '';
            wordInput.className = '';

            // Update mobile options
            if (window.innerWidth <= 768) {
                const correctIndex = Math.floor(Math.random() * 4);
                const options = [];
                for (let i = 0; i < 4; i++) {
                    if (i === correctIndex) {
                        options.push(currentWord);
                    } else {
                        let randomWord;
                        do {
                            randomWord = getRandomWord();
                        } while (randomWord === currentWord);
                        options.push(randomWord);
                    }
                }

                wordOptionsEl.innerHTML = options.map(word =>
                    `<div class="word-option" onclick="selectWord('${word}')">${word}</div>`
                ).join('');
            }
        }

        function selectWord(word) {
            wordInput.value = word;
            checkWord();
        }

        function checkWord() {
            const input = wordInput.value.trim().toLowerCase();

            if (input === currentWord.toLowerCase()) {
                score += 10 + streak * 2;
                streak++;
                correctWords++;
                wordInput.classList.add('correct');
                setTimeout(() => {
                    setNewWord();
                }, 100);
            } else {
                wordInput.classList.add('wrong');
                streak = 0;
            }

            totalWords++;
            updateDisplay();
        }

        function updateDisplay() {
            scoreEl.textContent = score;
            timerEl.textContent = timer;
            streakEl.textContent = streak;
        }

        function startGame() {
            if (isPlaying) return;

            score = 0;
            timer = 60;
            streak = 0;
            totalWords = 0;
            correctWords = 0;
            isPlaying = true;

            gameScreen.classList.remove('hidden');
            gameOverScreen.classList.remove('active');

            setNewWord();
            updateDisplay();
            wordInput.focus();

            gameInterval = setInterval(() => {
                timer--;
                updateDisplay();

                if (timer <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            clearInterval(gameInterval);
            isPlaying = false;

            const wpm = Math.round((correctWords / 60) * 60);

            gameScreen.classList.add('hidden');
            gameOverScreen.classList.add('active');
            finalScoreEl.textContent = score;
            finalWMPEl.textContent = `${wpm} WPM`;
        }

        function resetGame() {
            clearInterval(gameInterval);
            isPlaying = false;

            score = 0;
            timer = 60;
            streak = 0;

            gameScreen.classList.remove('hidden');
            gameOverScreen.classList.remove('active');

            wordDisplay.innerHTML = 'Ready?';
            wordInput.value = '';
            wordInput.className = '';
            wordOptionsEl.innerHTML = '';

            updateDisplay();
        }

        wordInput.addEventListener('input', () => {
            const input = wordInput.value.trim().toLowerCase();

            if (input === currentWord.toLowerCase()) {
                checkWord();
            } else {
                wordInput.className = input.length > 0 && !currentWord.toLowerCase().startsWith(input) ? 'wrong' : '';
            }
        });

        wordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                checkWord();
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Prevent form submission
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.target.tagName !== 'BUTTON') {
                e.preventDefault();
            }
        });

        updateDisplay();
    </script>
</body>
</html>
