<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gem Collector - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a0533 0%, #0d1b2a 50%, #1b2838 100%);
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }

        canvas {
            display: block;
        }

        .ui {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 100;
        }

        .stats {
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .stats h2 {
            font-size: 24px;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats p {
            font-size: 16px;
            margin-bottom: 4px;
            opacity: 0.9;
        }

        .combo {
            color: #ffd700;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h1 {
            color: #ffd700;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
        }

        .overlay p {
            color: #fff;
            font-size: 18px;
            margin-bottom: 30px;
            text-align: center;
            max-width: 400px;
        }

        .overlay .score-display {
            font-size: 32px;
            color: #ff6b6b;
            margin-bottom: 20px;
        }

        .btn {
            background: linear-gradient(135deg, #ff6b6b, #ffd700);
            border: none;
            color: #000;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.8);
        }

        .btn:active {
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .stats h2 {
                font-size: 18px;
            }

            .stats p {
                font-size: 14px;
            }

            .combo {
                font-size: 16px;
            }

            .overlay h1 {
                font-size: 32px;
            }

            .overlay p {
                font-size: 14px;
                padding: 0 20px;
            }

            .overlay .score-display {
                font-size: 24px;
            }

            .btn {
                padding: 12px 30px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="ui">
        <div class="stats">
            <h2>💎 Gem Collector</h2>
            <p>Score: <span id="score">0</span></p>
            <p>Lives: <span id="lives">3</span></p>
            <p class="combo">Combo: <span id="combo">0</span>x</p>
        </div>
    </div>

    <div class="overlay" id="startOverlay">
        <h1>💎 Gem Collector</h1>
        <p>プレイヤーを左右に動かして<br>落ちてくる宝石を集めよう！<br><br>岩に当たるとライフを失うよ</p>
        <button class="btn" onclick="startGame()">Start Game</button>
    </div>

    <div class="overlay hidden" id="gameOverOverlay">
        <h1>Game Over</h1>
        <p class="score-display">Score: <span id="finalScore">0</span></p>
        <p>Best Combo: <span id="bestCombo">0</span>x</p>
        <button class="btn" onclick="restartGame()">Play Again</button>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let combo = 0;
        let bestCombo = 0;
        let lastCatchTime = 0;
        const comboTimeout = 2000;

        let player;
        let gems = [];
        let rocks = [];
        let particles = [];
        let spawnTimer = 0;
        let spawnInterval = 60;
        let difficultyTimer = 0;

        // Controls
        let keys = {};
        let touchX = null;
        let targetX = null;

        const gemColors = [
            { color: '#ff6b6b', glow: '#ff0000' },
            { color: '#ffd700', glow: '#ff8c00' },
            { color: '#00ff7f', glow: '#00ff00' },
            { color: '#8ab4f8', glow: '#00bfff' },
            { color: '#c58af9', glow: '#9370db' }
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Player {
            constructor() {
                this.width = 60;
                this.height = 20;
                this.x = width / 2;
                this.y = height - 80;
                this.speed = 8;
                this.glowIntensity = 0;
            }

            update() {
                // Smooth movement towards target
                if (targetX !== null) {
                    const diff = targetX - this.x;
                    this.x += diff * 0.15;
                }

                // Keyboard controls
                if (keys['ArrowLeft'] || keys['a']) {
                    this.x -= this.speed;
                    targetX = null;
                }
                if (keys['ArrowRight'] || keys['d']) {
                    this.x += this.speed;
                    targetX = null;
                }

                // Bounds
                this.x = Math.max(this.width / 2, Math.min(width - this.width / 2, this.x));

                // Glow pulse
                this.glowIntensity = Math.sin(Date.now() * 0.005) * 0.5 + 0.5;
            }

            draw() {
                const gradient = ctx.createLinearGradient(
                    this.x - this.width / 2, this.y,
                    this.x + this.width / 2, this.y
                );
                gradient.addColorStop(0, '#8ab4f8');
                gradient.addColorStop(0.5, '#c58af9');
                gradient.addColorStop(1, '#f98b8b');

                // Glow
                ctx.shadowBlur = 20 + this.glowIntensity * 10;
                ctx.shadowColor = '#c58af9';

                // Body
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(
                    this.x - this.width / 2,
                    this.y - this.height / 2,
                    this.width,
                    this.height,
                    10
                );
                ctx.fill();

                ctx.shadowBlur = 0;

                // Shine
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.roundRect(
                    this.x - this.width / 2 + 5,
                    this.y - this.height / 2 + 3,
                    this.width - 10,
                    5,
                    3
                );
                ctx.fill();
            }
        }

        class Gem {
            constructor() {
                this.size = 20 + Math.random() * 15;
                this.x = Math.random() * (width - this.size * 2) + this.size;
                this.y = -this.size;
                this.speed = 2 + Math.random() * 2 + (score / 100);
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.colorScheme = gemColors[Math.floor(Math.random() * gemColors.length)];
                this.points = Math.floor(this.size / 5);
                this.pulse = Math.random() * Math.PI * 2;
            }

            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;
                this.pulse += 0.1;
            }

            draw() {
                const pulse = Math.sin(this.pulse) * 0.3 + 1;
                const size = this.size * pulse;

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // Glow
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.colorScheme.glow;

                // Diamond shape
                ctx.fillStyle = this.colorScheme.color;
                ctx.beginPath();
                ctx.moveTo(0, -size);
                ctx.lineTo(size * 0.6, 0);
                ctx.lineTo(0, size);
                ctx.lineTo(-size * 0.6, 0);
                ctx.closePath();
                ctx.fill();

                // Shine
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.moveTo(0, -size * 0.5);
                ctx.lineTo(size * 0.3, 0);
                ctx.lineTo(0, size * 0.3);
                ctx.lineTo(-size * 0.3, 0);
                ctx.closePath();
                ctx.fill();

                ctx.restore();
                ctx.shadowBlur = 0;
            }
        }

        class Rock {
            constructor() {
                this.size = 25 + Math.random() * 20;
                this.x = Math.random() * (width - this.size * 2) + this.size;
                this.y = -this.size;
                this.speed = 1.5 + Math.random() * 1.5 + (score / 150);
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.05;
                this.vertices = this.generateVertices();
            }

            generateVertices() {
                const vertices = [];
                const numVertices = 8;
                for (let i = 0; i < numVertices; i++) {
                    const angle = (i / numVertices) * Math.PI * 2;
                    const variance = 0.7 + Math.random() * 0.6;
                    vertices.push({
                        x: Math.cos(angle) * this.size * variance,
                        y: Math.sin(angle) * this.size * variance
                    });
                }
                return vertices;
            }

            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // Shadow
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';

                // Rock body
                ctx.fillStyle = '#4a4a5a';
                ctx.strokeStyle = '#2a2a3a';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(this.vertices[0].x, this.vertices[0].y);
                for (let i = 1; i < this.vertices.length; i++) {
                    ctx.lineTo(this.vertices[i].x, this.vertices[i].y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // Highlight
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.beginPath();
                ctx.moveTo(this.vertices[0].x * 0.5, this.vertices[0].y * 0.5);
                for (let i = 1; i < 4; i++) {
                    ctx.lineTo(this.vertices[i].x * 0.5, this.vertices[i].y * 0.5);
                }
                ctx.stroke();

                ctx.restore();
                ctx.shadowBlur = 0;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.size = Math.random() * 4 + 2;
                this.color = color;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.02;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2;
                this.life -= this.decay;
            }

            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function spawnParticles(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function checkCollision(obj1, obj2) {
            const dx = obj1.x - obj2.x;
            const dy = obj1.y - obj2.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < (obj1.width / 2 + obj2.size);
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('combo').textContent = combo;

            // Combo timeout
            if (Date.now() - lastCatchTime > comboTimeout && combo > 0) {
                combo = 0;
            }
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('bestCombo').textContent = bestCombo;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        function draw() {
            // Clear with gradient background
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#0d1b2a');
            gradient.addColorStop(1, '#1b2838');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // Stars background
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            for (let i = 0; i < 50; i++) {
                const x = (i * 137) % width;
                const y = (i * 211 + Date.now() * 0.02) % height;
                const size = (i % 3) + 1;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }

            // Draw game objects
            gems.forEach(gem => gem.draw());
            rocks.forEach(rock => rock.draw());
            particles.forEach(p => p.draw());
            if (player) player.draw();
        }

        function update() {
            if (!gameRunning) return;

            // Update player
            player.update();

            // Spawn objects
            spawnTimer++;
            if (spawnTimer >= spawnInterval) {
                spawnTimer = 0;
                if (Math.random() < 0.7) {
                    gems.push(new Gem());
                } else {
                    rocks.push(new Rock());
                }
            }

            // Increase difficulty
            difficultyTimer++;
            if (difficultyTimer % 600 === 0 && spawnInterval > 20) {
                spawnInterval -= 2;
            }

            // Update gems
            gems = gems.filter(gem => {
                gem.update();

                // Check collision with player
                if (checkCollision(player, gem)) {
                    // Catch!
                    const now = Date.now();
                    if (now - lastCatchTime < comboTimeout) {
                        combo++;
                    } else {
                        combo = 1;
                    }
                    lastCatchTime = now;
                    bestCombo = Math.max(bestCombo, combo);

                    const points = gem.points * (1 + combo * 0.1);
                    score += Math.floor(points);

                    spawnParticles(gem.x, gem.y, gem.colorScheme.color, 15);
                    return false;
                }

                // Remove if off screen
                return gem.y < height + gem.size;
            });

            // Update rocks
            rocks = rocks.filter(rock => {
                rock.update();

                // Check collision with player
                if (checkCollision(player, rock)) {
                    lives--;
                    spawnParticles(rock.x, rock.y, '#ff6b6b', 20);
                    if (lives <= 0) {
                        gameOver();
                    }
                    return false;
                }

                // Remove if off screen
                return rock.y < height + rock.size;
            });

            // Update particles
            particles = particles.filter(p => {
                p.update();
                return p.life > 0;
            });

            updateUI();
        }

        function gameLoop() {
            draw();
            update();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            document.getElementById('startOverlay').classList.add('hidden');
            resetGame();
            gameRunning = true;
        }

        function restartGame() {
            document.getElementById('gameOverOverlay').classList.add('hidden');
            resetGame();
            gameRunning = true;
        }

        function resetGame() {
            score = 0;
            lives = 3;
            combo = 0;
            bestCombo = 0;
            spawnTimer = 0;
            spawnInterval = 60;
            difficultyTimer = 0;
            gems = [];
            rocks = [];
            particles = [];
            player = new Player();
            targetX = width / 2;
        }

        // Controls
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Touch/Mouse controls
        canvas.addEventListener('mousemove', (e) => {
            if (gameRunning) {
                targetX = e.clientX;
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (gameRunning) {
                targetX = e.touches[0].clientX;
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning) {
                targetX = e.touches[0].clientX;
            }
        });

        window.addEventListener('resize', () => {
            resize();
            if (player) {
                player.y = height - 80;
            }
        });

        // Initialize
        resize();
        player = new Player();
        gameLoop();
    </script>
</body>
</html>
