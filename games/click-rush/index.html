<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Rush</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .game-container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: clamp(24px, 5vw, 32px);
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 12px 20px;
            color: white;
            text-align: center;
            flex: 1;
        }

        .stat-box .label {
            font-size: clamp(11px, 2.5vw, 13px);
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .stat-box .value {
            font-size: clamp(24px, 5vw, 32px);
            font-weight: bold;
        }

        .game-area {
            position: relative;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            aspect-ratio: 1;
            width: 100%;
            overflow: hidden;
            cursor: crosshair;
        }

        .target {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
            animation: pulse 0.5s ease-in-out infinite alternate;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .target:hover {
            transform: scale(1.1);
        }

        .target:active {
            transform: scale(0.95);
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .pop {
            animation: pop 0.3s ease-out forwards;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            border-radius: 20px;
            z-index: 100;
        }

        .overlay h2 {
            font-size: clamp(28px, 6vw, 40px);
            margin-bottom: 20px;
        }

        .overlay p {
            font-size: clamp(14px, 3vw, 18px);
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .overlay .score {
            font-size: clamp(32px, 7vw, 48px);
            font-weight: bold;
            color: #ffd700;
            margin: 20px 0;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: clamp(16px, 4vw, 20px);
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .fullscreen-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            z-index: 50;
        }

        .bonus {
            position: absolute;
            font-weight: bold;
            color: #ffd700;
            font-size: 20px;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }

        .combo {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(24px, 5vw, 36px);
            font-weight: bold;
            color: #ff6b6b;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .combo.show {
            opacity: 1;
            animation: comboPulse 0.3s ease-out;
        }

        @keyframes comboPulse {
            0% { transform: translateX(-50%) scale(1.5); }
            100% { transform: translateX(-50%) scale(1); }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🎯 Click Rush</h1>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="label">スコア</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="label">時間</div>
                <div class="value" id="time">30</div>
            </div>
            <div class="stat-box">
                <div class="label">コンボ</div>
                <div class="value" id="combo">0</div>
            </div>
        </div>

        <div class="game-area" id="gameArea">
            <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
            <div class="combo" id="comboDisplay"></div>

            <div class="overlay" id="startOverlay">
                <h2>Click Rush</h2>
                <p>ターゲットを素早くクリック！</p>
                <p>連続で命中するとコンボボーナス</p>
                <button class="btn" onclick="startGame()">スタート</button>
            </div>

            <div class="overlay" id="endOverlay" style="display: none;">
                <h2>🎉 ゲーム終了！</h2>
                <p>最終スコア</p>
                <div class="score" id="finalScore">0</div>
                <p>最大コンボ: <span id="maxCombo">0</span></p>
                <button class="btn" onclick="startGame()">もう一度</button>
            </div>
        </div>
    </div>

    <script>
        const gameArea = document.getElementById('gameArea');
        const scoreDisplay = document.getElementById('score');
        const timeDisplay = document.getElementById('time');
        const comboDisplay = document.getElementById('combo');
        const comboPopup = document.getElementById('comboDisplay');
        const startOverlay = document.getElementById('startOverlay');
        const endOverlay = document.getElementById('endOverlay');
        const finalScoreDisplay = document.getElementById('finalScore');
        const maxComboDisplay = document.getElementById('maxCombo');

        let score = 0;
        let timeLeft = 30;
        let combo = 0;
        let maxCombo = 0;
        let gameTimer = null;
        let targetTimer = null;
        let isPlaying = false;

        const colors = [
            'linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%)',
            'linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%)',
            'linear-gradient(135deg, #f9d423 0%, #ff4e50 100%)',
            'linear-gradient(135deg, #a8e063 0%, #56ab2f 100%)',
            'linear-gradient(135deg, #ff9966 0%, #ff5e62 100%)',
            'linear-gradient(135deg, #b24592 0%, #f15f79 100%)'
        ];

        function createTarget() {
            if (!isPlaying) return;

            const target = document.createElement('div');
            target.className = 'target';

            const size = Math.random() * 40 + 40;
            const maxX = gameArea.offsetWidth - size;
            const maxY = gameArea.offsetHeight - size;
            const x = Math.random() * maxX;
            const y = Math.random() * maxY;

            target.style.width = size + 'px';
            target.style.height = size + 'px';
            target.style.left = x + 'px';
            target.style.top = y + 'px';
            target.style.background = colors[Math.floor(Math.random() * colors.length)];

            target.addEventListener('click', (e) => {
                e.stopPropagation();
                hitTarget(target, e);
            });

            target.addEventListener('touchstart', (e) => {
                e.stopPropagation();
                e.preventDefault();
                hitTarget(target, e.touches[0]);
            });

            gameArea.appendChild(target);

            // Auto-remove after some time
            setTimeout(() => {
                if (target.parentNode) {
                    target.remove();
                    if (isPlaying) {
                        combo = 0;
                        updateDisplay();
                    }
                }
            }, 2000 - Math.min(score * 5, 1500));

            // Create next target
            if (isPlaying) {
                const delay = Math.max(400, 1000 - score * 10);
                targetTimer = setTimeout(createTarget, delay);
            }
        }

        function hitTarget(target, event) {
            if (!isPlaying) return;

            combo++;
            if (combo > maxCombo) {
                maxCombo = combo;
            }

            // Combo bonus
            const bonus = Math.min(combo, 10);
            const points = 10 + bonus;
            score += points;

            // Show bonus popup
            if (combo > 1) {
                showBonus(event, `+${points} (${combo}xコンボ!)`);
            } else {
                showBonus(event, `+${points}`);
            }

            // Update combo display
            if (combo > 1) {
                comboPopup.textContent = `${combo}x コンボ!`;
                comboPopup.classList.add('show');
                setTimeout(() => comboPopup.classList.remove('show'), 500);
            }

            target.classList.add('pop');
            setTimeout(() => target.remove(), 300);

            updateDisplay();
        }

        function showBonus(event, text) {
            const bonus = document.createElement('div');
            bonus.className = 'bonus';
            bonus.textContent = text;

            const rect = gameArea.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;

            bonus.style.left = x + 'px';
            bonus.style.top = y + 'px';

            gameArea.appendChild(bonus);
            setTimeout(() => bonus.remove(), 1000);
        }

        function updateDisplay() {
            scoreDisplay.textContent = score;
            timeDisplay.textContent = timeLeft;
            comboDisplay.textContent = combo;
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            combo = 0;
            maxCombo = 0;
            isPlaying = true;

            // Clear existing targets
            document.querySelectorAll('.target').forEach(t => t.remove());

            startOverlay.style.display = 'none';
            endOverlay.style.display = 'none';

            updateDisplay();

            // Start timers
            gameTimer = setInterval(() => {
                timeLeft--;
                updateDisplay();

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            createTarget();
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameTimer);
            clearTimeout(targetTimer);

            // Clear remaining targets
            document.querySelectorAll('.target').forEach(t => t.remove());

            finalScoreDisplay.textContent = score;
            maxComboDisplay.textContent = maxCombo;
            endOverlay.style.display = 'flex';
        }

        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                gameArea.requestFullscreen();
            }
        }

        // Prevent scroll on touch
        gameArea.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
