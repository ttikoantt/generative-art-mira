<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リズムメモリ | Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            touch-action: manipulation;
            user-select: none;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #e94560;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            margin-top: 5px;
        }

        .game-area {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .message {
            text-align: center;
            font-size: 18px;
            color: #fff;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .rhythm-btn {
            aspect-ratio: 1;
            border: none;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .rhythm-btn:active {
            transform: scale(0.95);
        }

        .rhythm-btn.red {
            background: linear-gradient(135deg, #e94560 0%, #c23a51 100%);
        }

        .rhythm-btn.blue {
            background: linear-gradient(135deg, #00b4d8 0%, #0077b6 100%);
        }

        .rhythm-btn.green {
            background: linear-gradient(135deg, #06d6a0 0%, #059669 100%);
        }

        .rhythm-btn.yellow {
            background: linear-gradient(135deg, #ffd60a 0%, #e6b800 100%);
        }

        .rhythm-btn.active {
            filter: brightness(1.3);
            transform: scale(1.05);
        }

        .rhythm-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            min-height: 20px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560 0%, #c23a51 100%);
            color: #fff;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .instructions {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            line-height: 1.6;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 22px;
            }

            .stat-value {
                font-size: 24px;
            }

            .rhythm-btn {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 リズムメモリ</h1>
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">レベル</div>
                    <div class="stat-value" id="level">1</div>
                </div>
                <div class="stat">
                    <div class="stat-label">スコア</div>
                    <div class="stat-value" id="score">0</div>
                </div>
            </div>
        </div>

        <div class="game-area">
            <div class="message" id="message">
                スタートボタンを押してね！
            </div>

            <div class="buttons">
                <button class="rhythm-btn red" data-color="red" disabled>🔴</button>
                <button class="rhythm-btn blue" data-color="blue" disabled>🔵</button>
                <button class="rhythm-btn green" data-color="green" disabled>🟢</button>
                <button class="rhythm-btn yellow" data-color="yellow" disabled>🟡</button>
            </div>

            <div class="progress" id="progress"></div>

            <div class="controls">
                <button class="btn btn-primary" id="startBtn" onclick="startGame()">スタート</button>
                <button class="btn btn-secondary" onclick="toggleFullscreen()">全画面</button>
                <a href="../index.html" class="btn btn-secondary" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">戻る</a>
            </div>
        </div>

        <div class="instructions">
            <strong>遊び方：</strong><br>
            点灯する順番を覚えて、同じ順番でボタンを押してね！<br>
            レベルが上がると長くなるよ！
        </div>
    </div>

    <script>
        const colors = ['red', 'blue', 'green', 'yellow'];
        const colorNames = {
            red: '🔴',
            blue: '🔵',
            green: '🟢',
            yellow: '🟡'
        };

        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let score = 0;
        let isPlaying = false;
        let isPlayerTurn = false;
        let audioContext;

        // Web Audio API初期化
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 音を再生
        function playTone(frequency, duration = 0.3) {
            initAudio();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = frequency;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        const frequencies = {
            red: 261.63,    // C4
            blue: 329.63,   // E4
            green: 392.00,  // G4
            yellow: 523.25  // C5
        };

        // ボタンを点灯
        function highlightButton(color) {
            const btn = document.querySelector(`[data-color="${color}"]`);
            btn.classList.add('active');
            playTone(frequencies[color]);

            setTimeout(() => {
                btn.classList.remove('active');
            }, 300);
        }

        // シーケンス再生
        async function playSequence() {
            isPlayerTurn = false;
            disableButtons();
            updateMessage('よく見てね...');

            for (let i = 0; i < sequence.length; i++) {
                await sleep(600);
                updateProgress(`再生中: ${i + 1} / ${sequence.length}`);
                highlightButton(sequence[i]);
            }

            await sleep(500);
            isPlayerTurn = true;
            enableButtons();
            updateMessage('あなたの番！押してね！');
            updateProgress(`レベル ${level}: ${sequence.length}つの順番を覚えて`);
        }

        // スリープ関数
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // ゲーム開始
        function startGame() {
            initAudio();
            sequence = [];
            playerSequence = [];
            level = 1;
            score = 0;
            updateStats();
            addToSequence();
            playSequence();
        }

        // シーケンス追加
        function addToSequence() {
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            sequence.push(randomColor);
        }

        // プレイヤー入力
        function handleInput(color) {
            if (!isPlayerTurn || !isPlaying) return;

            playerSequence.push(color);
            highlightButton(color);

            const currentIndex = playerSequence.length - 1;

            // 間違った入力
            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                gameOver();
                return;
            }

            // 正しい入力
            score += 10 * level;
            updateStats();

            // シーケンス完了
            if (playerSequence.length === sequence.length) {
                isPlayerTurn = false;
                disableButtons();

                setTimeout(() => {
                    level++;
                    playerSequence = [];
                    updateStats();
                    addToSequence();
                    playSequence();
                }, 1000);
            }
        }

        // ゲームオーバー
        function gameOver() {
            isPlaying = false;
            isPlayerTurn = false;
            disableButtons();
            updateMessage(`ゲームオーバー！ スコア: ${score}`);
            updateProgress(`到達レベル: ${level}`);
            document.getElementById('startBtn').textContent = 'もう一度';
        }

        // ボタン有効化
        function enableButtons() {
            document.querySelectorAll('.rhythm-btn').forEach(btn => {
                btn.disabled = false;
            });
        }

        // ボタン無効化
        function disableButtons() {
            document.querySelectorAll('.rhythm-btn').forEach(btn => {
                btn.disabled = true;
            });
        }

        // メッセージ更新
        function updateMessage(msg) {
            document.getElementById('message').textContent = msg;
        }

        // 進捗更新
        function updateProgress(msg) {
            document.getElementById('progress').textContent = msg;
        }

        // スタッツ更新
        function updateStats() {
            document.getElementById('level').textContent = level;
            document.getElementById('score').textContent = score;
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        document.querySelectorAll('.rhythm-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const color = btn.dataset.color;
                handleInput(color);
            });
        });

        // タッチ対応
        document.querySelectorAll('.rhythm-btn').forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const color = btn.dataset.color;
                handleInput(color);
            });
        });
    </script>
</body>
</html>
