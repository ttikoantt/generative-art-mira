<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Reaction Rush</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            touch-action: none;
        }

        #game {
            width: 100vw;
            height: 100vh;
            position: relative;
            cursor: pointer;
        }

        .target {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, #ff6b6b 100%);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: transform 0.1s;
            animation: pulse 0.5s ease-in-out infinite alternate;
        }

        .target:active {
            transform: scale(0.9);
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .target.hit {
            animation: explode 0.3s ease-out forwards;
        }

        @keyframes explode {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        .ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .score-display {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .time-display {
            color: #fff;
            font-size: 20px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            color: #fff;
        }

        .start-screen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .start-screen p {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 40px;
        }

        .start-screen button {
            background: #fff;
            color: #764ba2;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s;
        }

        .start-screen button:hover {
            transform: scale(1.05);
        }

        .start-screen button:active {
            transform: scale(0.95);
        }

        .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            color: #fff;
        }

        .game-over-screen h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .game-over-screen p {
            font-size: 24px;
            margin-bottom: 40px;
        }

        .game-over-screen button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s;
        }

        .combo-display {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .combo-display.active {
            opacity: 1;
            animation: combo 0.3s ease-out;
        }

        @keyframes combo {
            0% { transform: translateX(-50%) scale(0.5); }
            50% { transform: translateX(-50%) scale(1.2); }
            100% { transform: translateX(-50%) scale(1); }
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            z-index: 100;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            animation: particle-fly 0.5s ease-out forwards;
        }

        @keyframes particle-fly {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div id="game"></div>

    <div class="ui">
        <div class="score-display">Score: <span id="score">0</span></div>
        <div class="time-display">Time: <span id="time">30</span></div>
    </div>

    <div class="combo-display" id="combo">Combo x<span id="combo-count">0</span>!</div>

    <div class="start-screen" id="start-screen">
        <h1>Reaction Rush</h1>
        <p>ターゲットをタップ！スピード勝負！</p>
        <button id="start-btn">スタート</button>
    </div>

    <div class="game-over-screen" id="game-over-screen">
        <h1>ゲームオーバー！</h1>
        <p>スコア: <span id="final-score">0</span></p>
        <button id="restart-btn">もう一度</button>
    </div>

    <button class="fullscreen-btn" id="fullscreen">⛶</button>

    <script>
        const game = document.getElementById('game');
        const scoreDisplay = document.getElementById('score');
        const timeDisplay = document.getElementById('time');
        const comboDisplay = document.getElementById('combo');
        const comboCount = document.getElementById('combo-count');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScore = document.getElementById('final-score');

        let score = 0;
        let timeLeft = 30;
        let combo = 0;
        let isPlaying = false;
        let gameTimer = null;
        let spawnTimer = null;

        function startGame() {
            score = 0;
            timeLeft = 30;
            combo = 0;
            isPlaying = true;

            scoreDisplay.textContent = score;
            timeDisplay.textContent = timeLeft;
            comboCount.textContent = combo;

            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';

            game.innerHTML = '';

            gameTimer = setInterval(() => {
                timeLeft--;
                timeDisplay.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            spawnTarget();
            scheduleNextSpawn();
        }

        function scheduleNextSpawn() {
            if (!isPlaying) return;

            const delay = Math.max(500, 1500 - score * 10);
            spawnTimer = setTimeout(() => {
                if (isPlaying) {
                    spawnTarget();
                    scheduleNextSpawn();
                }
            }, delay);
        }

        function spawnTarget() {
            const target = document.createElement('div');
            target.className = 'target';

            const maxX = window.innerWidth - 80;
            const maxY = window.innerHeight - 160;
            const x = Math.random() * maxX + 10;
            const y = Math.random() * maxY + 70;

            target.style.left = x + 'px';
            target.style.top = y + 'px';

            const colors = [
                'radial-gradient(circle, #fff 0%, #ff6b6b 100%)',
                'radial-gradient(circle, #fff 0%, #4ecdc4 100%)',
                'radial-gradient(circle, #fff 0%, #ffe66d 100%)',
                'radial-gradient(circle, #fff 0%, #95e1d3 100%)',
                'radial-gradient(circle, #fff 0%, #f38181 100%)'
            ];
            target.style.background = colors[Math.floor(Math.random() * colors.length)];

            target.addEventListener('mousedown', hitTarget);
            target.addEventListener('touchstart', hitTarget);

            game.appendChild(target);

            setTimeout(() => {
                if (target.parentNode && !target.classList.contains('hit')) {
                    target.remove();
                    combo = 0;
                    comboCount.textContent = combo;
                    comboDisplay.classList.remove('active');
                }
            }, 2000);
        }

        function hitTarget(e) {
            e.preventDefault();
            const target = e.target;

            if (target.classList.contains('hit')) return;
            target.classList.add('hit');

            combo++;
            const points = 10 + combo * 5;
            score += points;
            scoreDisplay.textContent = score;

            if (combo >= 3) {
                comboCount.textContent = combo;
                comboDisplay.classList.add('active');
                setTimeout(() => comboDisplay.classList.remove('active'), 500);
            }

            createParticles(e.clientX || e.touches[0].clientX, e.clientY || e.touches[0].clientY);

            setTimeout(() => target.remove(), 300);
        }

        function createParticles(x, y) {
            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';

                const angle = (Math.PI * 2 / 8) * i;
                const distance = 50 + Math.random() * 30;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;

                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');

                const colors = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#95e1d3', '#f38181'];
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];

                game.appendChild(particle);

                setTimeout(() => particle.remove(), 500);
            }
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameTimer);
            clearTimeout(spawnTimer);

            finalScore.textContent = score;
            gameOverScreen.style.display = 'flex';
        }

        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', startGame);

        document.getElementById('fullscreen').addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });
    </script>
</body>
</html>
