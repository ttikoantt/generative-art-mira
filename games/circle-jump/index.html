<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle Jump - Circular Platformer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #gameCanvas {
            display: block;
        }

        .game-info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            z-index: 100;
            pointer-events: none;
        }

        .score {
            font-size: 24px;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .high-score {
            margin-top: 5px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
            display: none;
            border: 2px solid #00ff88;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }

        .game-over h2 {
            color: #ff4444;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .game-over p {
            color: rgba(255, 255, 255, 0.8);
            margin: 10px 0;
            font-size: 18px;
        }

        .game-over button {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 18px;
            background: #00ff88;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            color: #1a1a2e;
            transition: all 0.3s;
        }

        .game-over button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid rgba(0, 255, 136, 0.5);
            color: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 5px;
            z-index: 100;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 136, 0.3);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .game-info {
                font-size: 14px;
                top: 10px;
                left: 10px;
            }

            .score {
                font-size: 20px;
            }

            .game-over {
                padding: 30px;
                width: 90%;
            }

            .game-over h2 {
                font-size: 24px;
            }

            .game-over p {
                font-size: 16px;
            }

            .game-over button {
                padding: 12px 30px;
                font-size: 16px;
            }

            .fullscreen-btn {
                bottom: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="game-info">
        <div class="score">Score: <span id="score">0</span></div>
        <div class="high-score">Best: <span id="highScore">0</span></div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>GAME OVER</h2>
        <p>Score: <span id="finalScore">0</span></p>
        <p>Best: <span id="finalHighScore">0</span></p>
        <button onclick="restartGame()">Play Again</button>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let centerX, centerY;
        let platforms = [];
        let player = null;
        let score = 0;
        let highScore = localStorage.getItem('circleJumpHighScore') || 0;
        let gameState = 'playing'; // 'playing', 'gameover'

        const PLATFORM_COUNT = 12;
        const CIRCLE_RADIUS = 200;
        const PLATFORM_WIDTH = 60;
        const PLATFORM_GAP = 30;
        const GRAVITY = 0.5;
        const JUMP_FORCE = 12;
        const ROTATION_SPEED = 0.005;

        document.getElementById('highScore').textContent = highScore;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        class Platform {
            constructor(angle, isGap = false) {
                this.angle = angle;
                this.isGap = isGap;
                this.width = isGap ? PLATFORM_GAP : PLATFORM_WIDTH;
                this.color = isGap ? null : `hsl(${Math.random() * 60 + 150}, 70%, 50%)`;
            }

            draw() {
                if (this.isGap) return;

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(this.angle);

                // Platform body
                const gradient = ctx.createLinearGradient(0, -CIRCLE_RADIUS, 0, -CIRCLE_RADIUS + 20);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0.3)');

                ctx.fillStyle = gradient;
                ctx.fillRect(-this.width / 2, -CIRCLE_RADIUS - 10, this.width, 20);

                // Glow effect
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10;
                ctx.fillRect(-this.width / 2, -CIRCLE_RADIUS - 10, this.width, 20);

                ctx.restore();
            }

            update() {
                this.angle += ROTATION_SPEED;
            }

            getBounds() {
                if (this.isGap) return null;

                const startAngle = this.angle - (this.width / 2) / CIRCLE_RADIUS;
                const endAngle = this.angle + (this.width / 2) / CIRCLE_RADIUS;

                return {
                    startAngle,
                    endAngle,
                    innerRadius: CIRCLE_RADIUS - 10,
                    outerRadius: CIRCLE_RADIUS + 10
                };
            }
        }

        class Player {
            constructor() {
                this.angle = 0;
                this.radius = CIRCLE_RADIUS;
                this.size = 15;
                this.velocity = 0;
                this.onPlatform = true;
                this.color = '#00ff88';
                this.rotation = 0;
            }

            jump() {
                if (this.onPlatform) {
                    this.velocity = JUMP_FORCE;
                    this.onPlatform = false;
                }
            }

            update() {
                if (!this.onPlatform) {
                    // Apply gravity (toward center)
                    this.velocity -= GRAVITY;
                    this.radius = CIRCLE_RADIUS - (this.velocity * 3);

                    // Check if landed
                    if (this.velocity <= 0) {
                        this.checkLanding();
                    }
                } else {
                    // Stick to platform rotation
                    this.radius = CIRCLE_RADIUS;
                }

                this.rotation += 0.1;
            }

            checkLanding() {
                let landed = false;

                for (const platform of platforms) {
                    if (platform.isGap) continue;

                    const bounds = platform.getBounds();
                    if (!bounds) continue;

                    const playerAngle = this.angle % (Math.PI * 2);
                    if (playerAngle < 0) this.angle += Math.PI * 2;

                    if (playerAngle >= bounds.startAngle && playerAngle <= bounds.endAngle) {
                        landed = true;
                        this.onPlatform = true;
                        this.velocity = 0;
                        this.radius = CIRCLE_RADIUS;

                        // Score for landing
                        score += 10;
                        document.getElementById('score').textContent = score;

                        // Increase difficulty
                        if (score % 100 === 0) {
                            ROTATION_SPEED.value = ROTATION_SPEED + 0.001;
                        }
                        break;
                    }
                }

                if (!landed) {
                    gameOver();
                }
            }

            draw() {
                const x = centerX + Math.cos(this.angle) * this.radius;
                const y = centerY + Math.sin(this.angle) * this.radius;

                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(this.rotation);

                // Player body
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
                gradient.addColorStop(0, '#ffffff');
                gradient.addColorStop(0.5, this.color);
                gradient.addColorStop(1, 'rgba(0, 255, 136, 0.3)');

                ctx.beginPath();
                ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Glow
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 15;
                ctx.fill();

                ctx.restore();
            }
        }

        function init() {
            resize();
            createPlatforms();
            player = new Player();
            score = 0;
            gameState = 'playing';
            document.getElementById('score').textContent = '0';
            document.getElementById('gameOver').style.display = 'none';
        }

        function createPlatforms() {
            platforms = [];
            const angleStep = (Math.PI * 2) / PLATFORM_COUNT;
            let gapCount = 0;

            for (let i = 0; i < PLATFORM_COUNT; i++) {
                const angle = i * angleStep;
                // Randomly create gaps (about 25% of platforms)
                const isGap = Math.random() < 0.25 && gapCount < 3;

                if (isGap) gapCount++;

                platforms.push(new Platform(angle, isGap));
            }
        }

        function animate() {
            if (gameState !== 'playing') return;

            // Clear
            ctx.fillStyle = 'rgba(26, 26, 46, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // Draw center circle
            ctx.beginPath();
            ctx.arc(centerX, centerY, 20, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 255, 136, 0.1)';
            ctx.fill();

            // Update and draw platforms
            platforms.forEach(platform => {
                platform.update();
                platform.draw();
            });

            // Update and draw player
            player.update();
            player.draw();

            // Instructions
            if (score === 0 && player.onPlatform) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.font = '16px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('Click or Space to jump!', centerX, centerY + CIRCLE_RADIUS + 50);
            }

            requestAnimationFrame(animate);
        }

        function gameOver() {
            gameState = 'gameover';

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('circleJumpHighScore', highScore);
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalHighScore').textContent = highScore;
            document.getElementById('gameOver').style.display = 'block';
        }

        function restartGame() {
            init();
            animate();
        }

        // Controls
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                if (gameState === 'playing') {
                    player.jump();
                }
            }
        });

        canvas.addEventListener('click', () => {
            if (gameState === 'playing') {
                player.jump();
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameState === 'playing') {
                player.jump();
            }
        });

        window.addEventListener('resize', resize);

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        init();
        animate();
    </script>
</body>
</html>
