<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Circle Jump - 円ジャンプ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            color: #fff;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 200, 100, 0.5);
        }

        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            color: #aaa;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #ffd700;
            font-size: 1.5rem;
            font-weight: bold;
        }

        #gameCanvas {
            background: radial-gradient(circle at center, #1a1a3e 0%, #0c0c1e 100%);
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(255, 200, 100, 0.2),
                        inset 0 0 60px rgba(0, 0, 50, 0.5);
            display: block;
            margin: 0 auto 15px;
            max-width: 100%;
            cursor: pointer;
        }

        .message {
            color: #ffd700;
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            margin-bottom: 15px;
            min-height: 30px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            color: #1a1a2e;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        button.start-btn {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
        }

        button.start-btn:hover {
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.6);
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4);
        }

        .fullscreen-btn:hover {
            box-shadow: 0 6px 20px rgba(240, 147, 251, 0.6);
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .stats {
                gap: 10px;
            }

            .stat-box {
                padding: 8px 15px;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Circle Jump</h1>
        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">ハイスコア</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="message" id="message">タップしてスタート！</div>
        <div class="controls">
            <button class="start-btn" onclick="startGame()">▶️ スタート</button>
            <button onclick="resetGame()">🔄 リセット</button>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">📺 全画面</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const messageEl = document.getElementById('message');

        // Game state
        let score = 0;
        let highScore = parseInt(localStorage.getItem('circleJumpHighScore')) || 0;
        let gameRunning = false;
        let gameOver = false;
        let rotationAngle = 0;
        let ballRadius = 8;
        let baseCircleRadius = 100;
        let ballAngle = 0;
        let rotationSpeed = 0.03;
        let targetAngle = Math.PI / 2; // 90 degrees
        let jumpPhase = false;
        let jumpProgress = 0;
        let ballColor = '#ffd700';

        // Responsive canvas
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 400);
            const size = Math.min(maxWidth, window.innerHeight - 300);
            canvas.width = size;
            canvas.height = size;
            baseCircleRadius = size * 0.25;
        }

        function updateHighScore() {
            highScoreEl.textContent = highScore;
        }

        function showMessage(text) {
            messageEl.textContent = text;
        }

        function drawBaseCircle() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // Outer glow
            ctx.beginPath();
            ctx.arc(centerX, centerY, baseCircleRadius + 10, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 200, 100, 0.1)';
            ctx.fill();

            // Main circle
            const gradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, baseCircleRadius
            );
            gradient.addColorStop(0, '#ffd700');
            gradient.addColorStop(0.7, '#ff8c00');
            gradient.addColorStop(1, '#ff6600');

            ctx.beginPath();
            ctx.arc(centerX, centerY, baseCircleRadius, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();

            // Inner highlight
            ctx.beginPath();
            ctx.arc(centerX - baseCircleRadius * 0.3, centerY - baseCircleRadius * 0.3, baseCircleRadius * 0.2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fill();
        }

        function drawBall() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            let orbitRadius = baseCircleRadius + 15;

            // If jumping, increase orbit radius
            if (jumpPhase) {
                orbitRadius += Math.sin(jumpProgress * Math.PI) * 40;
            }

            const ballX = centerX + Math.cos(ballAngle) * orbitRadius;
            const ballY = centerY + Math.sin(ballAngle) * orbitRadius;

            // Ball glow
            ctx.beginPath();
            ctx.arc(ballX, ballY, ballRadius * 2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
            ctx.fill();

            // Ball
            const ballGradient = ctx.createRadialGradient(
                ballX - 2, ballY - 2, 0,
                ballX, ballY, ballRadius
            );
            ballGradient.addColorStop(0, '#fff');
            ballGradient.addColorStop(0.3, ballColor);
            ballGradient.addColorStop(1, '#cc6600');

            ctx.beginPath();
            ctx.arc(ballX, ballY, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = ballGradient;
            ctx.fill();

            // Ball highlight
            ctx.beginPath();
            ctx.arc(ballX - 2, ballY - 2, ballRadius * 0.3, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.fill();
        }

        function drawTargetIndicator() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const orbitRadius = baseCircleRadius + 15;

            const targetX = centerX + Math.cos(targetAngle) * orbitRadius;
            const targetY = centerY + Math.sin(targetAngle) * orbitRadius;

            // Target zone indicator
            ctx.beginPath();
            ctx.arc(targetX, targetY, 20, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Direction arrow
            const arrowLength = 30;
            const arrowAngle = targetAngle + Math.PI / 2;
            const arrowX = centerX + Math.cos(targetAngle) * (orbitRadius + 40);
            const arrowY = centerY + Math.sin(targetAngle) * (orbitRadius + 40);

            ctx.beginPath();
            ctx.moveTo(arrowX, arrowY);
            ctx.lineTo(
                arrowX + Math.cos(arrowAngle + Math.PI) * arrowLength * 0.5,
                arrowY + Math.sin(arrowAngle + Math.PI) * arrowLength * 0.5
            );
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0c0c1e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawBaseCircle();
            drawTargetIndicator();
            drawBall();

            // Draw score on canvas
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.font = 'bold 100px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(score, canvas.width / 2, canvas.height / 2 + 30);
        }

        function update() {
            if (!gameRunning) return;

            // Update rotation
            rotationAngle += rotationSpeed;

            // Update ball angle (moves with rotation)
            ballAngle = rotationAngle;

            // Update jump animation
            if (jumpPhase) {
                jumpProgress += 0.05;
                if (jumpProgress >= 1) {
                    jumpPhase = false;
                    jumpProgress = 0;

                    // Check if ball is near target
                    const angleDiff = Math.abs(normalizeAngle(ballAngle - targetAngle));
                    if (angleDiff < 0.35) {
                        // Success!
                        score++;
                        scoreEl.textContent = score;
                        ballColor = '#00ff00';

                        // Increase difficulty
                        rotationSpeed = Math.min(0.03 + score * 0.002, 0.08);

                        // New target position
                        targetAngle = normalizeAngle(targetAngle + Math.PI / 2 + (Math.random() - 0.5) * 0.5);

                        setTimeout(() => {
                            ballColor = '#ffd700';
                        }, 200);
                    } else {
                        // Game over
                        endGame();
                    }
                }
            }
        }

        function normalizeAngle(angle) {
            while (angle < 0) angle += Math.PI * 2;
            while (angle >= Math.PI * 2) angle -= Math.PI * 2;
            return angle;
        }

        function jump() {
            if (!gameRunning || jumpPhase) return;

            jumpPhase = true;
            jumpProgress = 0;
        }

        function startGame() {
            if (gameRunning) return;

            gameRunning = true;
            gameOver = false;
            score = 0;
            scoreEl.textContent = score;
            rotationSpeed = 0.03;
            rotationAngle = 0;
            ballAngle = 0;
            targetAngle = Math.PI / 2;
            jumpPhase = false;
            jumpProgress = 0;
            ballColor = '#ffd700';

            showMessage('タイミングよくタップ！');
            gameLoop();
        }

        function endGame() {
            gameRunning = false;
            gameOver = true;
            ballColor = '#ff0000';

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('circleJumpHighScore', highScore);
                updateHighScore();
                showMessage(`🎉 新記録！ ${score}ポイント！`);
            } else {
                showMessage(`ゲームオーバー！ スコア: ${score}`);
            }
        }

        function resetGame() {
            gameRunning = false;
            gameOver = false;
            score = 0;
            scoreEl.textContent = score;
            rotationSpeed = 0.03;
            rotationAngle = 0;
            ballAngle = 0;
            targetAngle = Math.PI / 2;
            jumpPhase = false;
            jumpProgress = 0;
            ballColor = '#ffd700';

            showMessage('タップしてスタート！');
            draw();
        }

        function gameLoop() {
            if (!gameRunning) {
                draw();
                return;
            }

            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                canvas.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Event listeners
        canvas.addEventListener('click', () => {
            if (!gameRunning && !gameOver) {
                startGame();
            } else if (gameRunning) {
                jump();
            }
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!gameRunning && !gameOver) {
                startGame();
            } else if (gameRunning) {
                jump();
            }
        });

        window.addEventListener('resize', () => {
            resizeCanvas();
            if (!gameRunning) draw();
        });

        // Initialize
        updateHighScore();
        resizeCanvas();
        draw();
    </script>
</body>
</html>
