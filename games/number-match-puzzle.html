<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>数字マッチパズル | Number Match Puzzle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: #fff;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(100, 255, 218, 0.5);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .stat {
            text-align: center;
            color: #fff;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #64ffda;
            text-shadow: 0 0 10px rgba(100, 255, 218, 0.5);
        }

        .game-board {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .tile {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .tile:active {
            transform: scale(0.95);
        }

        .tile.selected {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.5);
            transform: scale(1.1);
        }

        .tile.matched {
            animation: matchAnim 0.5s ease forwards;
        }

        @keyframes matchAnim {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }

        .message {
            text-align: center;
            color: #fff;
            font-size: 18px;
            margin-bottom: 15px;
            min-height: 27px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            background: rgba(100, 255, 218, 0.2);
            color: #64ffda;
            border: 2px solid #64ffda;
            padding: 10px 25px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: rgba(100, 255, 218, 0.3);
            box-shadow: 0 0 20px rgba(100, 255, 218, 0.4);
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .fullscreen-btn {
            background: rgba(100, 255, 218, 0.2);
            color: #64ffda;
            border: 2px solid #64ffda;
            padding: 8px 20px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .fullscreen-btn:hover {
            background: rgba(100, 255, 218, 0.3);
            box-shadow: 0 0 20px rgba(100, 255, 218, 0.4);
        }

        .instructions {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            margin-top: 15px;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .header h1 {
                font-size: 22px;
            }

            .game-board {
                gap: 6px;
                padding: 10px;
            }

            .tile {
                font-size: 20px;
                border-radius: 8px;
            }

            .stat-value {
                font-size: 24px;
            }

            .btn {
                padding: 8px 20px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔢 数字マッチパズル</h1>
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">スコア</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">コンボ</div>
                    <div class="stat-value" id="combo">0</div>
                </div>
            </div>
        </div>

        <div class="message" id="message">同じ数字のタイルを選んでマッチ！</div>

        <div class="game-board" id="gameBoard"></div>

        <div class="buttons">
            <button class="btn" onclick="resetGame()">リセット</button>
            <button class="btn" onclick="newGame()">新しいゲーム</button>
        </div>

        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

        <div class="instructions">
            <p>同じ数字のタイルを2つ選んでマッチさせよう！</p>
            <p>連続でマッチするとコンボボーナス！</p>
        </div>
    </div>

    <script>
        let score = 0;
        let combo = 0;
        let selectedTile = null;
        let tiles = [];
        let matchedPairs = 0;
        let totalPairs = 18;

        const gameBoard = document.getElementById('gameBoard');
        const scoreDisplay = document.getElementById('score');
        const comboDisplay = document.getElementById('combo');
        const messageDisplay = document.getElementById('message');

        // 数字のペアを作成
        function createNumbers() {
            const numbers = [];
            for (let i = 1; i <= 9; i++) {
                numbers.push(i, i);
            }
            // シャッフル
            for (let i = numbers.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [numbers[i], numbers[j]] = [numbers[j], numbers[i]];
            }
            return numbers;
        }

        // ゲームボードを初期化
        function initGame() {
            gameBoard.innerHTML = '';
            tiles = [];
            matchedPairs = 0;
            totalPairs = 18;

            const numbers = createNumbers();

            numbers.forEach((num, index) => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.textContent = num;
                tile.dataset.number = num;
                tile.dataset.index = index;
                tile.addEventListener('click', () => handleTileClick(tile));
                gameBoard.appendChild(tile);
                tiles.push(tile);
            });
        }

        // タイルクリック処理
        function handleTileClick(tile) {
            if (tile.classList.contains('matched') || tile.classList.contains('selected')) {
                return;
            }

            if (selectedTile === null) {
                // 最初のタイルを選択
                selectedTile = tile;
                tile.classList.add('selected');
            } else {
                // 2枚目のタイルを選択
                const firstNumber = parseInt(selectedTile.dataset.number);
                const secondNumber = parseInt(tile.dataset.number);

                if (firstNumber === secondNumber) {
                    // マッチ成功
                    matchTiles(selectedTile, tile);
                    selectedTile = null;
                } else {
                    // マッチ失敗
                    combo = 0;
                    comboDisplay.textContent = combo;
                    showMessage('マッチ失敗！', false);

                    selectedTile.classList.remove('selected');
                    tile.classList.add('selected');
                    selectedTile = tile;

                    setTimeout(() => {
                        if (selectedTile) {
                            selectedTile.classList.remove('selected');
                            selectedTile = null;
                        }
                    }, 500);
                }
            }
        }

        // タイルをマッチさせる
        function matchTiles(tile1, tile2) {
            tile1.classList.remove('selected');
            tile1.classList.add('matched');
            tile2.classList.add('matched');

            combo++;
            matchedPairs++;

            // スコア計算（コンボボーナス）
            const points = 10 + (combo * 5);
            score += points;

            scoreDisplay.textContent = score;
            comboDisplay.textContent = combo;

            showMessage(`+${points} ポイント！ コンボ x${combo}`, true);

            // 全マッチチェック
            if (matchedPairs === totalPairs) {
                setTimeout(() => {
                    showMessage(`🎉 クリア！ スコア: ${score}`, true);
                }, 500);
            }
        }

        // メッセージ表示
        function showMessage(text, isGood) {
            messageDisplay.textContent = text;
            messageDisplay.style.color = isGood ? '#64ffda' : '#f5576c';
            messageDisplay.style.textShadow = isGood ?
                '0 0 10px rgba(100, 255, 218, 0.5)' :
                '0 0 10px rgba(245, 87, 108, 0.5)';
        }

        // ゲームリセット
        function resetGame() {
            score = 0;
            combo = 0;
            selectedTile = null;
            scoreDisplay.textContent = 0;
            comboDisplay.textContent = 0;
            showMessage('同じ数字のタイルを選んでマッチ！', true);
            initGame();
        }

        // 新しいゲーム
        function newGame() {
            resetGame();
        }

        // フルスクリーン
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ゲーム開始
        initGame();
    </script>
</body>
</html>
