<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Color Flood - Puzzle Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
            touch-action: manipulation;
        }
        
        h1 {
            color: #eee;
            font-size: 1.5em;
            margin: 10px 0;
            text-align: center;
        }
        
        .info {
            color: #aaa;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            color: #eee;
            font-size: 1.1em;
            margin-bottom: 10px;
        }
        
        .stats span {
            padding: 5px 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }
        
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        
        #grid {
            display: grid;
            gap: 2px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        
        .cell {
            width: 40px;
            height: 40px;
            border-radius: 5px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .cell:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
        
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            max-width: 350px;
        }
        
        .color-btn {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        
        .color-btn:hover {
            transform: scale(1.1);
            border-color: rgba(255, 255, 255, 0.8);
        }
        
        .color-btn:active {
            transform: scale(0.95);
        }
        
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .btn {
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
        }
        
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .win-message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px 50px;
            border-radius: 20px;
            color: #4ff;
            font-size: 2em;
            text-align: center;
            z-index: 200;
            animation: pulse 0.5s;
        }
        
        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }
        
        @media (max-width: 600px) {
            h1 { font-size: 1.2em; }
            .cell { width: 35px; height: 35px; }
            .color-btn { width: 45px; height: 45px; }
            .stats { font-size: 1em; }
        }
    </style>
</head>
<body>
    <h1>🎨 Color Flood</h1>
    <p class="info">色を変えて全域を同じ色にしよう！左上からスタート</p>
    
    <div class="stats">
        <span>手数: <strong id="moves">0</strong></span>
        <span>目標: <strong id="target">25</strong>手以内</span>
    </div>
    
    <div class="game-container">
        <div id="grid"></div>
        
        <div class="controls" id="controls"></div>
        
        <div class="actions">
            <button class="btn" onclick="newGame()">新しいゲーム</button>
            <button class="btn" onclick="changeSize()">サイズ変更</button>
        </div>
    </div>
    
    <button class="fullscreen-btn" id="fullscreen">全画面表示</button>
    <div class="win-message" id="winMessage">🎉 クリア！</div>
    
    <script>
        const COLORS = [
            '#ff6b6b', // Red
            '#4ecdc4', // Teal
            '#45b7d1', // Blue
            '#96ceb4', // Green
            '#ffeaa7', // Yellow
            '#dfe6e9'  // Gray
        ];
        
        let gridSize = 10;
        let grid = [];
        let moves = 0;
        let targetMoves = 25;
        let currentSizeIndex = 0;
        const SIZES = [10, 12, 14, 16];
        
        function initGame() {
            moves = 0;
            targetMoves = gridSize * 2.5;
            document.getElementById('moves').textContent = moves;
            document.getElementById('target').textContent = Math.floor(targetMoves);
            document.getElementById('winMessage').style.display = 'none';
            
            // Initialize grid
            grid = [];
            for (let i = 0; i < gridSize; i++) {
                grid[i] = [];
                for (let j = 0; j < gridSize; j++) {
                    grid[i][j] = Math.floor(Math.random() * COLORS.length);
                }
            }
            
            renderGrid();
            renderControls();
        }
        
        function renderGrid() {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            gridEl.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            
            for (let i = 0; i < gridSize; i++) {
                for (let j = 0; j < gridSize; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.style.backgroundColor = COLORS[grid[i][j]];
                    cell.dataset.row = i;
                    cell.dataset.col = j;
                    gridEl.appendChild(cell);
                }
            }
        }
        
        function renderControls() {
            const controls = document.getElementById('controls');
            controls.innerHTML = '';
            
            COLORS.forEach((color, index) => {
                const btn = document.createElement('button');
                btn.className = 'color-btn';
                btn.style.backgroundColor = color;
                btn.onclick = () => selectColor(index);
                controls.appendChild(btn);
            });
        }
        
        function selectColor(colorIndex) {
            const startColor = grid[0][0];
            if (colorIndex === startColor) return;
            
            moves++;
            document.getElementById('moves').textContent = moves;
            
            // Flood fill from top-left
            floodFill(0, 0, startColor, colorIndex);
            renderGrid();
            
            // Check win
            if (checkWin()) {
                showWin();
            }
        }
        
        function floodFill(row, col, targetColor, newColor) {
            if (row < 0 || row >= gridSize || col < 0 || col >= gridSize) return;
            if (grid[row][col] !== targetColor) return;
            
            grid[row][col] = newColor;
            
            floodFill(row - 1, col, targetColor, newColor);
            floodFill(row + 1, col, targetColor, newColor);
            floodFill(row, col - 1, targetColor, newColor);
            floodFill(row, col + 1, targetColor, newColor);
        }
        
        function checkWin() {
            const firstColor = grid[0][0];
            for (let i = 0; i < gridSize; i++) {
                for (let j = 0; j < gridSize; j++) {
                    if (grid[i][j] !== firstColor) return false;
                }
            }
            return true;
        }
        
        function showWin() {
            const winMessage = document.getElementById('winMessage');
            const efficiency = moves <= targetMoves ? 'Excellent!' : 'Good!';
            winMessage.innerHTML = `🎉 クリア！<br><span style="font-size: 0.5em">${moves}手 / ${Math.floor(targetMoves)}目標</span>`;
            winMessage.style.display = 'block';
            
            setTimeout(() => {
                winMessage.style.display = 'none';
            }, 3000);
        }
        
        function newGame() {
            initGame();
        }
        
        function changeSize() {
            currentSizeIndex = (currentSizeIndex + 1) % SIZES.length;
            gridSize = SIZES[currentSizeIndex];
            initGame();
        }
        
        // Fullscreen
        document.getElementById('fullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });
        
        // Start game
        initGame();
    </script>
</body>
</html>
