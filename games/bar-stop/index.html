<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar Stop - タイミングパズル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .score {
            color: #4ecdc4;
            font-size: 2em;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .bar-container {
            position: relative;
            width: 300px;
            height: 60px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 30px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            margin: 0 auto 30px;
            overflow: hidden;
        }

        .target-zone {
            position: absolute;
            top: 0;
            height: 100%;
            background: linear-gradient(180deg, #4ecdc4 0%, #2db5ac 100%);
            border-radius: 30px;
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.6);
        }

        .cursor {
            position: absolute;
            top: 5px;
            width: 4px;
            height: 50px;
            background: #fff;
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            transition: none;
        }

        .result {
            color: #fff;
            font-size: 1.5em;
            margin-bottom: 20px;
            min-height: 40px;
        }

        .result.perfect {
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            animation: pulse 0.5s;
        }

        .result.good {
            color: #4ecdc4;
        }

        .result.miss {
            color: #e74c3c;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        button {
            background: linear-gradient(135deg, #4ecdc4 0%, #2db5ac 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 1.2em;
            cursor: pointer;
            border-radius: 50px;
            box-shadow: 0 5px 20px rgba(78, 205, 196, 0.4);
            transition: all 0.3s;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 25px rgba(78, 205, 196, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            font-size: 0.9em;
            box-shadow: none;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .combo {
            position: fixed;
            top: 20px;
            right: 20px;
            color: #ffd700;
            font-size: 1.5em;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .instructions {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8em;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .bar-container {
                width: 250px;
            }

            .score {
                font-size: 1.5em;
            }

            button {
                padding: 12px 30px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎯 Bar Stop</h1>
        <p class="subtitle">タイミング合わせてタップ！</p>

        <div class="score">スコア: <span id="score">0</span></div>
        <div class="combo" id="combo" style="display: none;">コンボ: <span id="comboCount">0</span></div>

        <div class="bar-container" id="barContainer">
            <div class="target-zone" id="targetZone"></div>
            <div class="cursor" id="cursor"></div>
        </div>

        <div class="result" id="result"></div>

        <button id="actionBtn">スタート / Start</button>

        <p class="instructions">ボタンをタップしてカーソルをターゲットで止めよう！</p>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">全画面 / Fullscreen</button>

    <script>
        const barContainer = document.getElementById('barContainer');
        const targetZone = document.getElementById('targetZone');
        const cursor = document.getElementById('cursor');
        const actionBtn = document.getElementById('actionBtn');
        const resultDiv = document.getElementById('result');
        const scoreSpan = document.getElementById('score');
        const comboDiv = document.getElementById('combo');
        const comboCountSpan = document.getElementById('comboCount');

        let gameState = 'idle'; // idle, running, result
        let score = 0;
        let combo = 0;
        let animationId = null;
        let cursorPos = 0;
        let cursorDirection = 1;
        let cursorSpeed = 3;
        let targetStart = 40;
        let targetWidth = 20;

        function initGame() {
            // ランダムなターゲット位置
            targetStart = Math.random() * 60 + 20; // 20-80%
            targetWidth = Math.max(10, 30 - Math.floor(score / 500) * 2); // 徐々に狭く
            targetZone.style.left = targetStart + '%';
            targetZone.style.width = targetWidth + '%';

            // カーソル速度を徐々に上げる
            cursorSpeed = 3 + Math.floor(score / 300) * 0.5;

            cursorPos = 0;
            cursorDirection = 1;
            cursor.style.left = cursorPos + '%';
        }

        function updateCursor() {
            if (gameState !== 'running') return;

            cursorPos += cursorDirection * cursorSpeed * 0.1;

            if (cursorPos >= 100 || cursorPos <= 0) {
                cursorDirection *= -1;
            }

            cursor.style.left = cursorPos + '%';
            animationId = requestAnimationFrame(updateCursor);
        }

        function checkResult() {
            if (gameState !== 'running') return;

            cancelAnimationFrame(animationId);
            gameState = 'result';

            const cursorCenter = cursorPos;
            const targetCenter = targetStart + targetWidth / 2;
            const distance = Math.abs(cursorCenter - targetCenter);

            let points = 0;
            let resultText = '';
            let resultClass = '';

            if (distance < targetWidth / 4) {
                // Perfect!
                points = 100 + combo * 10;
                resultText = `🎉 PERFECT! +${points}`;
                resultClass = 'perfect';
                combo++;
            } else if (distance < targetWidth / 2) {
                // Good
                points = 50 + combo * 5;
                resultText = `✨ Good! +${points}`;
                resultClass = 'good';
                combo++;
            } else if (distance < targetWidth) {
                // OK
                points = 20;
                resultText = `👌 OK! +${points}`;
                resultClass = 'good';
                combo = 0;
            } else {
                // Miss
                points = 0;
                resultText = `❌ Miss!`;
                resultClass = 'miss';
                combo = 0;
            }

            score += points;
            scoreSpan.textContent = score;

            if (combo > 1) {
                comboDiv.style.display = 'block';
                comboCountSpan.textContent = combo;
            } else {
                comboDiv.style.display = 'none';
            }

            resultDiv.textContent = resultText;
            resultDiv.className = 'result ' + resultClass;

            actionBtn.textContent = '次へ / Next';
        }

        function startGame() {
            if (gameState === 'idle' || gameState === 'result') {
                resultDiv.textContent = '';
                resultDiv.className = 'result';
                initGame();
                gameState = 'running';
                actionBtn.textContent = 'ストップ / Stop!';
                updateCursor();
            } else if (gameState === 'running') {
                checkResult();
            }
        }

        actionBtn.addEventListener('click', startGame);

        // スペースキーでも操作可能
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                startGame();
            }
        });

        // 全画面ボタン
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // タッチ操作最適化
        actionBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startGame();
        });

        // 初期化
        initGame();
    </script>
</body>
</html>
