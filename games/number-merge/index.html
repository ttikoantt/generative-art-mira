<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Number Merge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
            overflow: hidden;
        }

        h1 {
            color: #eee;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .score-board {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .score-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .score-label {
            color: #aaa;
            font-size: 12px;
            text-transform: uppercase;
        }

        .score-value {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
        }

        .game-container {
            position: relative;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            grid-template-rows: repeat(4, 80px);
            gap: 10px;
        }

        .cell {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            transition: all 0.15s ease;
            user-select: none;
        }

        .tile-2 { background: #eee4da; color: #333; }
        .tile-4 { background: #ede0c8; color: #333; }
        .tile-8 { background: #f2b179; color: #fff; }
        .tile-16 { background: #f59563; color: #fff; }
        .tile-32 { background: #f67c5f; color: #fff; }
        .tile-64 { background: #f65e3b; color: #fff; }
        .tile-128 { background: #edcf72; color: #fff; font-size: 28px; }
        .tile-256 { background: #edcc61; color: #fff; font-size: 28px; }
        .tile-512 { background: #edc850; color: #fff; font-size: 28px; }
        .tile-1024 { background: #edc53f; color: #fff; font-size: 24px; }
        .tile-2048 { background: #edc22e; color: #fff; font-size: 24px; }
        .tile-super { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; font-size: 20px; }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
        }

        .game-over.show {
            display: flex;
        }

        .game-over h2 {
            color: #fff;
            font-size: 36px;
            margin-bottom: 20px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(102, 126, 234, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .info {
            color: #aaa;
            font-size: 14px;
            margin-top: 15px;
            text-align: center;
        }

        #fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            z-index: 10;
        }

        @media (max-width: 500px) {
            .grid {
                grid-template-columns: repeat(4, 65px);
                grid-template-rows: repeat(4, 65px);
                gap: 8px;
            }

            h1 {
                font-size: 2em;
            }

            .cell {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <h1>🔢 Number Merge</h1>

    <div class="score-board">
        <div class="score-item">
            <div class="score-label">Score</div>
            <div class="score-value" id="score">0</div>
        </div>
        <div class="score-item">
            <div class="score-label">Best</div>
            <div class="score-value" id="best">0</div>
        </div>
    </div>

    <div class="game-container">
        <div class="grid" id="grid"></div>
        <div class="game-over" id="gameOver">
            <h2>Game Over!</h2>
            <p style="color: #aaa; margin-bottom: 20px;">Score: <span id="finalScore">0</span></p>
            <button onclick="restart()">Play Again</button>
        </div>
    </div>

    <div class="controls">
        <button onclick="restart()">New Game</button>
    </div>

    <p class="info">矢印キーまたはスワイプで移動</p>

    <button id="fullscreen">全画面</button>

    <script>
        const SIZE = 4;
        let grid = [];
        let score = 0;
        let bestScore = localStorage.getItem('numberMergeBest') || 0;
        let gameOver = false;

        const gridElement = document.getElementById('grid');
        const scoreElement = document.getElementById('score');
        const bestElement = document.getElementById('best');
        const gameOverElement = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');

        bestElement.textContent = bestScore;

        function init() {
            grid = Array(SIZE).fill(null).map(() => Array(SIZE).fill(0));
            score = 0;
            gameOver = false;
            gameOverElement.classList.remove('show');
            scoreElement.textContent = '0';

            addRandomTile();
            addRandomTile();
            render();
        }

        function addRandomTile() {
            const emptyCells = [];
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c] === 0) {
                        emptyCells.push({ r, c });
                    }
                }
            }

            if (emptyCells.length > 0) {
                const { r, c } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                grid[r][c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function render() {
            gridElement.innerHTML = '';
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';

                    const value = grid[r][c];
                    if (value > 0) {
                        cell.textContent = value;
                        const tileClass = value <= 2048 ? `tile-${value}` : 'tile-super';
                        cell.classList.add(tileClass);
                    }

                    gridElement.appendChild(cell);
                }
            }
        }

        function move(direction) {
            if (gameOver) return;

            let moved = false;
            const newGrid = grid.map(row => [...row]);

            const rotateGrid = (times) => {
                for (let t = 0; t < times; t++) {
                    const temp = Array(SIZE).fill(null).map(() => Array(SIZE).fill(0));
                    for (let r = 0; r < SIZE; r++) {
                        for (let c = 0; c < SIZE; c++) {
                            temp[c][SIZE - 1 - r] = newGrid[r][c];
                        }
                    }
                    for (let r = 0; r < SIZE; r++) {
                        for (let c = 0; c < SIZE; c++) {
                            newGrid[r][c] = temp[r][c];
                        }
                    }
                }
            };

            // Rotate to always move left
            const rotations = { left: 0, up: 1, right: 2, down: 3 };
            rotateGrid(rotations[direction]);

            // Move left
            for (let r = 0; r < SIZE; r++) {
                let row = newGrid[r].filter(v => v !== 0);
                for (let i = 0; i < row.length - 1; i++) {
                    if (row[i] === row[i + 1]) {
                        row[i] *= 2;
                        score += row[i];
                        row.splice(i + 1, 1);
                    }
                }
                while (row.length < SIZE) row.push(0);
                newGrid[r] = row;
            }

            // Rotate back
            rotateGrid((4 - rotations[direction]) % 4);

            // Check if moved
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c] !== newGrid[r][c]) {
                        moved = true;
                        break;
                    }
                }
            }

            if (moved) {
                grid = newGrid;
                scoreElement.textContent = score;

                if (score > bestScore) {
                    bestScore = score;
                    bestElement.textContent = bestScore;
                    localStorage.setItem('numberMergeBest', bestScore);
                }

                addRandomTile();
                render();

                if (isGameOver()) {
                    gameOver = true;
                    finalScoreElement.textContent = score;
                    gameOverElement.classList.add('show');
                }
            }
        }

        function isGameOver() {
            // Check for empty cells
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c] === 0) return false;
                }
            }

            // Check for possible merges
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (c < SIZE - 1 && grid[r][c] === grid[r][c + 1]) return false;
                    if (r < SIZE - 1 && grid[r][c] === grid[r + 1][c]) return false;
                }
            }

            return true;
        }

        function restart() {
            init();
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            const keyMap = {
                ArrowLeft: 'left',
                ArrowRight: 'right',
                ArrowUp: 'up',
                ArrowDown: 'down'
            };

            if (keyMap[e.key]) {
                e.preventDefault();
                move(keyMap[e.key]);
            }
        });

        // Touch controls
        let touchStartX, touchStartY;

        gridElement.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        gridElement.addEventListener('touchend', (e) => {
            if (!touchStartX || !touchStartY) return;

            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            const minSwipe = 50;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > minSwipe) {
                    move(dx > 0 ? 'right' : 'left');
                }
            } else {
                if (Math.abs(dy) > minSwipe) {
                    move(dy > 0 ? 'down' : 'up');
                }
            }

            touchStartX = null;
            touchStartY = null;
        }, { passive: true });

        document.getElementById('fullscreen').addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        init();
    </script>
</body>
</html>
