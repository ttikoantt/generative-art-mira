<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Merge - 数値パズル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
        }

        .score {
            color: #4ecca3;
            font-weight: bold;
            font-size: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            transition: all 0.15s ease;
        }

        .cell[data-value="2"] { background: #ff6b6b; }
        .cell[data-value="4"] { background: #feca57; }
        .cell[data-value="8"] { background: #48dbfb; }
        .cell[data-value="16"] { background: #ff9ff3; }
        .cell[data-value="32"] { background: #54a0ff; }
        .cell[data-value="64"] { background: #5f27cd; }
        .cell[data-value="128"] { background: #00d2d3; }
        .cell[data-value="256"] { background: #ff9f43; }
        .cell[data-value="512"] { background: #10ac84; }
        .cell[data-value="1024"] { background: #ee5a24; }
        .cell[data-value="2048"] { background: #c23616; }

        .cell.merged {
            animation: merge 0.2s ease;
        }

        @keyframes merge {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 120px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .instructions {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            text-align: center;
            margin-top: 15px;
            line-height: 1.6;
        }

        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-over.show {
            display: flex;
        }

        .game-over-content {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
        }

        .game-over-content h2 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #ff6b6b;
        }

        .game-over-content p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 15px;
            max-width: 200px;
            margin-left: auto;
            margin-right: auto;
        }

        .controls button {
            padding: 15px;
            font-size: 20px;
            min-width: auto;
        }

        .controls button:nth-child(2) {
            grid-column: 2;
        }

        @media (max-width: 768px) {
            .game-container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .cell {
                font-size: 24px;
            }

            .instructions {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🔢 Number Merge</h1>
        <div class="info">
            <span>Score: <span class="score" id="score">0</span></span>
            <span>Best: <span class="score" id="best">0</span></span>
        </div>
        <div class="grid" id="grid"></div>
        <div class="buttons">
            <button onclick="newGame()">🔄 新規</button>
            <button onclick="toggleFullscreen()">📺 全画面</button>
        </div>
        <div class="instructions">
            💡 同じ数字をマージして大きくしよう！<br>
            スワイプまたは矢印キーで操作
        </div>
        <div class="controls">
            <button ontouchstart="move('up')" onclick="move('up')">↑</button>
            <button></button>
            <button></button>
            <button ontouchstart="move('left')" onclick="move('left')">←</button>
            <button ontouchstart="move('down')" onclick="move('down')">↓</button>
            <button ontouchstart="move('right')" onclick="move('right')">→</button>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <div class="game-over-content">
            <h2>🎮 Game Over</h2>
            <p>Score: <span id="finalScore">0</span></p>
            <button onclick="newGame()">🔄 もう一度</button>
        </div>
    </div>

    <script>
        let grid = [];
        let score = 0;
        let best = parseInt(localStorage.getItem('numberMergeBest')) || 0;
        const SIZE = 4;

        function init() {
            grid = Array(SIZE).fill(null).map(() => Array(SIZE).fill(0));
            score = 0;
            addNewTile();
            addNewTile();
            updateDisplay();
        }

        function addNewTile() {
            const empty = [];
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    if (grid[i][j] === 0) {
                        empty.push({ i, j });
                    }
                }
            }
            if (empty.length > 0) {
                const { i, j } = empty[Math.floor(Math.random() * empty.length)];
                grid[i][j] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function updateDisplay() {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (grid[i][j] !== 0) {
                        cell.textContent = grid[i][j];
                        cell.setAttribute('data-value', grid[i][j]);
                    }
                    gridEl.appendChild(cell);
                }
            }
            document.getElementById('score').textContent = score;
            document.getElementById('best').textContent = best;
        }

        function slide(row) {
            let arr = row.filter(val => val !== 0);
            let merged = Array(arr.length).fill(false);
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] === arr[i + 1] && !merged[i] && !merged[i + 1]) {
                    arr[i] *= 2;
                    score += arr[i];
                    merged[i] = true;
                    arr.splice(i + 1, 1);
                }
            }
            while (arr.length < SIZE) {
                arr.push(0);
            }
            return arr;
        }

        function move(direction) {
            let moved = false;
            let oldGrid = grid.map(row => [...row]);

            if (direction === 'left') {
                for (let i = 0; i < SIZE; i++) {
                    grid[i] = slide(grid[i]);
                }
            } else if (direction === 'right') {
                for (let i = 0; i < SIZE; i++) {
                    grid[i] = slide(grid[i].reverse()).reverse();
                }
            } else if (direction === 'up') {
                for (let j = 0; j < SIZE; j++) {
                    let col = [grid[0][j], grid[1][j], grid[2][j], grid[3][j]];
                    col = slide(col);
                    for (let i = 0; i < SIZE; i++) {
                        grid[i][j] = col[i];
                    }
                }
            } else if (direction === 'down') {
                for (let j = 0; j < SIZE; j++) {
                    let col = [grid[0][j], grid[1][j], grid[2][j], grid[3][j]];
                    col = slide(col.reverse()).reverse();
                    for (let i = 0; i < SIZE; i++) {
                        grid[i][j] = col[i];
                    }
                }
            }

            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    if (grid[i][j] !== oldGrid[i][j]) {
                        moved = true;
                        break;
                    }
                }
            }

            if (moved) {
                addNewTile();
                updateDisplay();
                if (score > best) {
                    best = score;
                    localStorage.setItem('numberMergeBest', best);
                }
                if (isGameOver()) {
                    document.getElementById('finalScore').textContent = score;
                    document.getElementById('gameOver').classList.add('show');
                }
            }
        }

        function isGameOver() {
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    if (grid[i][j] === 0) return false;
                    if (i < SIZE - 1 && grid[i][j] === grid[i + 1][j]) return false;
                    if (j < SIZE - 1 && grid[i][j] === grid[i][j + 1]) return false;
                }
            }
            return true;
        }

        function newGame() {
            document.getElementById('gameOver').classList.remove('show');
            init();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        document.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
                move(e.key.replace('Arrow', '').toLowerCase());
            }
        });

        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30) move('right');
                else if (dx < -30) move('left');
            } else {
                if (dy > 30) move('down');
                else if (dy < -30) move('up');
            }
        });

        init();
    </script>
</body>
</html>
