<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Reaction - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .game-container {
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
        }

        .stat {
            text-align: center;
            color: #fff;
        }

        .stat-label {
            font-size: 14px;
            color: #888;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
        }

        .score { color: #4CAF50; }
        .time { color: #FFC107; }

        .color-box {
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .color-word {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .question {
            color: #666;
            font-size: 1.2rem;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .option-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 20px;
            border-radius: 15px;
            color: #fff;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .option-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .option-btn:active {
            transform: translateY(0);
        }

        .option-btn.correct {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
        }

        .option-btn.wrong {
            background: linear-gradient(135deg, #f44336 0%, #da190b 100%);
        }

        .start-screen, .end-screen {
            text-align: center;
            padding: 40px;
        }

        .start-btn, .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 20px 60px;
            border-radius: 30px;
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .start-btn:hover, .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .final-score {
            font-size: 3rem;
            color: #4CAF50;
            margin: 20px 0;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .color-word {
                font-size: 2.5rem;
            }

            .question {
                font-size: 1rem;
            }

            .option-btn {
                padding: 15px;
                font-size: 1.1rem;
            }

            .start-btn, .restart-btn {
                padding: 15px 40px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="game-container">
        <h1>🎨 Color Reaction</h1>

        <!-- Start Screen -->
        <div id="start-screen" class="start-screen">
            <p style="color: #fff; font-size: 1.2rem; margin-bottom: 20px;">
                表示される色の<span style="color: #FFC107;">文字の色</span>を選んでね！
            </p>
            <p style="color: #888; margin-bottom: 30px;">
                例：「<span style="color: red;">赤</span>」と表示されたら<br>
                文字が<span style="color: red;">赤色</span>なので「赤」を選ぶ
            </p>
            <button class="start-btn" onclick="startGame()">スタート</button>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="hidden">
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">スコア</div>
                    <div class="stat-value score" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">残り時間</div>
                    <div class="stat-value time" id="time">30</div>
                </div>
            </div>

            <div class="color-box">
                <div class="color-word" id="color-word">赤</div>
                <div class="question">この文字の色は？</div>
            </div>

            <div class="options" id="options">
                <!-- Options will be generated by JS -->
            </div>
        </div>

        <!-- End Screen -->
        <div id="end-screen" class="end-screen hidden">
            <h2 style="color: #fff; font-size: 1.5rem; margin-bottom: 20px;">ゲーム終了！</h2>
            <div class="final-score" id="final-score">0</div>
            <p style="color: #888; margin-bottom: 30px;">ポイント獲得！</p>
            <button class="restart-btn" onclick="startGame()">もう一度</button>
        </div>
    </div>

    <script>
        const colors = [
            { name: '赤', color: '#FF5252' },
            { name: '青', color: '#448AFF' },
            { name: '緑', color: '#69F0AE' },
            { name: '黄', color: '#FFD740' },
            { name: '紫', color: '#E040FB' },
            { name: 'オレンジ', color: '#FFAB40' },
            { name: 'ピンク', color: '#FF4081' },
            { name: '水色', color: '#18FFFF' }
        ];

        let score = 0;
        let timeLeft = 30;
        let currentColor = null;
        let currentTextColor = null;
        let timer = null;
        let canAnswer = true;

        function startGame() {
            score = 0;
            timeLeft = 30;
            document.getElementById('score').textContent = score;
            document.getElementById('time').textContent = timeLeft;
            
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            nextRound();
            startTimer();
        }

        function startTimer() {
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('time').textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function nextRound() {
            canAnswer = true;
            
            // ランダムに文字と色を選択
            currentColor = colors[Math.floor(Math.random() * colors.length)];
            currentTextColor = colors[Math.floor(Math.random() * colors.length)];
            
            // 表示を更新
            const wordEl = document.getElementById('color-word');
            wordEl.textContent = currentColor.name;
            wordEl.style.color = currentTextColor.color;
            
            // 選択肢を生成
            const options = generateOptions();
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            options.forEach(color => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = color.name;
                btn.onclick = () => checkAnswer(color, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function generateOptions() {
            // 正解を含む4つの選択肢を生成
            const options = [currentColor];
            
            while (options.length < 4) {
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                if (!options.includes(randomColor)) {
                    options.push(randomColor);
                }
            }
            
            // シャッフル
            return options.sort(() => Math.random() - 0.5);
        }

        function checkAnswer(selectedColor, btn) {
            if (!canAnswer) return;
            canAnswer = false;
            
            if (selectedColor.name === currentTextColor.name) {
                // 正解
                score += 10;
                btn.classList.add('correct');
                document.getElementById('score').textContent = score;
            } else {
                // 不正解
                btn.classList.add('wrong');
                // 正解を表示
                const buttons = document.querySelectorAll('.option-btn');
                buttons.forEach(b => {
                    if (b.textContent === currentTextColor.name) {
                        b.classList.add('correct');
                    }
                });
            }
            
            setTimeout(() => {
                nextRound();
            }, 500);
        }

        function endGame() {
            clearInterval(timer);
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-score').textContent = score;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
