<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>色の反応 - Color Reaction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: white;
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            color: white;
        }

        .stat {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 5px;
        }

        .color-display {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        .color-display.wrong {
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .color-btn {
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .color-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .start-screen, .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .start-btn, .restart-btn {
            background: white;
            color: #764ba2;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: transform 0.1s;
            margin-top: 20px;
        }

        .start-btn:active, .restart-btn:active {
            transform: scale(0.95);
        }

        .instructions {
            color: white;
            text-align: center;
            margin: 20px 0;
            line-height: 1.6;
            max-width: 300px;
        }

        .final-score {
            color: white;
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
        }

        .hidden {
            display: none !important;
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
            z-index: 50;
            animation: fadeInOut 0.5s;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
        }
    </style>
</head>
<body>
    <div class="start-screen" id="startScreen">
        <h1>🎨 色の反応</h1>
        <div class="instructions">
            表示される<span style="font-weight:bold">色の名前</span>に合わせて、<br>
            正しい<span style="font-weight:bold">色のボタン</span>を押そう！
        </div>
        <button class="start-btn" onclick="startGame()">スタート</button>
    </div>

    <div class="game-over-screen hidden" id="gameOverScreen">
        <h1>🎮 ゲームオーバー</h1>
        <div class="final-score" id="finalScore">0</div>
        <p style="color: white; margin-bottom: 20px;">ポイント</p>
        <button class="restart-btn" onclick="startGame()">もう一度</button>
    </div>

    <div class="container hidden" id="gameContainer">
        <h1>🎨 色の反応</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">スコア</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="lives">3</div>
                <div class="stat-label">ライフ</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="level">1</div>
                <div class="stat-label">レベル</div>
            </div>
        </div>

        <div class="color-display" id="colorDisplay">
            赤
        </div>

        <div class="buttons" id="colorButtons">
            <button class="color-btn" style="background: #ff4444;" onclick="checkColor('red')">赤</button>
            <button class="color-btn" style="background: #44ff44;" onclick="checkColor('green')">緑</button>
            <button class="color-btn" style="background: #4444ff;" onclick="checkColor('blue')">青</button>
            <button class="color-btn" style="background: #ffff44;" onclick="checkColor('yellow')">黄</button>
        </div>
    </div>

    <script>
        const colors = [
            { name: '赤', color: 'red', bg: '#ff4444' },
            { name: '緑', color: 'green', bg: '#44ff44' },
            { name: '青', color: 'blue', bg: '#4444ff' },
            { name: '黄', color: 'yellow', bg: '#ffff44' }
        ];

        let score = 0;
        let lives = 3;
        let level = 1;
        let currentColor = null;
        let gameActive = false;
        let timeLimit = 3000;
        let timer = null;

        function startGame() {
            score = 0;
            lives = 3;
            level = 1;
            timeLimit = 3000;
            gameActive = true;

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('gameContainer').classList.remove('hidden');

            updateStats();
            nextColor();
        }

        function nextColor() {
            if (!gameActive) return;

            // ランダムに色を選択
            currentColor = colors[Math.floor(Math.random() * colors.length)];

            // レベルが上がると、色の名前と色が一致しない場合がある
            if (level >= 3 && Math.random() < 0.3) {
                const displayColor = colors[Math.floor(Math.random() * colors.length)];
                document.getElementById('colorDisplay').textContent = displayColor.name;
                document.getElementById('colorDisplay').style.background = displayColor.bg;
            } else {
                document.getElementById('colorDisplay').textContent = currentColor.name;
                document.getElementById('colorDisplay').style.background = currentColor.bg;
            }

            // タイマー開始
            clearTimeout(timer);
            timer = setTimeout(() => {
                loseLife();
            }, timeLimit);
        }

        function checkColor(color) {
            if (!gameActive) return;

            clearTimeout(timer);

            if (color === currentColor.color) {
                // 正解
                score += 10 * level;
                showMessage('+' + (10 * level));

                if (score >= level * 50) {
                    level++;
                    timeLimit = Math.max(1000, 3000 - (level * 200));
                    showMessage('レベルアップ！');
                }

                updateStats();
                nextColor();
            } else {
                // 不正解
                loseLife();
            }
        }

        function loseLife() {
            lives--;
            updateStats();

            if (lives <= 0) {
                gameOver();
            } else {
                showMessage('❌');
                document.getElementById('colorDisplay').classList.add('wrong');
                setTimeout(() => {
                    document.getElementById('colorDisplay').classList.remove('wrong');
                    nextColor();
                }, 500);
            }
        }

        function gameOver() {
            gameActive = false;
            clearTimeout(timer);

            document.getElementById('gameContainer').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('finalScore').textContent = score;
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('level').textContent = level;
        }

        function showMessage(text) {
            const message = document.createElement('div');
            message.className = 'message';
            message.textContent = text;
            document.body.appendChild(message);

            setTimeout(() => {
                message.remove();
            }, 500);
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (!gameActive) return;

            switch(e.key) {
                case '1': checkColor('red'); break;
                case '2': checkColor('green'); break;
                case '3': checkColor('blue'); break;
                case '4': checkColor('yellow'); break;
            }
        });
    </script>
</body>
</html>
