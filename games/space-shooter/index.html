<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Space Shooter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
        }

        .ui {
            position: fixed;
            color: white;
            pointer-events: none;
            z-index: 100;
        }

        .score {
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }

        .health {
            top: 20px;
            right: 20px;
            font-size: 20px;
        }

        .health-bar {
            width: 150px;
            height: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            overflow: hidden;
            margin-top: 5px;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff6b6b);
            transition: width 0.3s ease;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 200;
            display: none;
        }

        .game-over h1 {
            font-size: 48px;
            color: #ff4444;
            text-shadow: 0 0 20px rgba(255, 68, 68, 0.8);
            margin-bottom: 20px;
        }

        .game-over p {
            font-size: 24px;
            color: white;
            margin-bottom: 30px;
        }

        .game-over button {
            background: linear-gradient(135deg, #00ffff, #0088ff);
            border: none;
            color: #0a0a0a;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            pointer-events: all;
            transition: all 0.3s ease;
        }

        .game-over button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            text-align: center;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="ui score">スコア: <span id="score">0</span></div>
    <div class="ui health">
        HP
        <div class="health-bar">
            <div class="health-fill" id="healthBar"></div>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="instructions">
        PC: 矢印キーで移動、スペースで発射<br>
        モバイル: タップで移動＆発射
    </div>

    <div class="game-over" id="gameOver">
        <h1>GAME OVER</h1>
        <p>スコア: <span id="finalScore">0</span></p>
        <button onclick="restartGame()">再プレイ</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // プレイヤー
        const player = {
            x: width / 2,
            y: height - 100,
            width: 40,
            height: 40,
            speed: 6,
            health: 100,
            maxHealth: 100
        };

        // 弾
        let bullets = [];
        let enemies = [];
        let particles = [];
        let stars = [];
        let score = 0;
        let gameOver = false;
        let lastShot = 0;
        const shootInterval = 150;

        // キー入力
        const keys = {};

        // 星の背景
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * width,
                y: Math.random() * height,
                size: Math.random() * 2,
                speed: Math.random() * 3 + 1
            });
        }

        // 敵生成
        function spawnEnemy() {
            if (gameOver) return;

            const types = ['basic', 'fast', 'large'];
            const type = types[Math.floor(Math.random() * types.length)];

            const enemy = {
                x: Math.random() * (width - 40),
                y: -40,
                width: type === 'large' ? 50 : 30,
                height: type === 'large' ? 50 : 30,
                speed: type === 'fast' ? 4 : 2,
                health: type === 'large' ? 3 : 1,
                type: type,
                hue: Math.random() * 60 + 300
            };

            enemies.push(enemy);
        }

        // パーティクル生成
        function createParticles(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    radius: Math.random() * 4 + 2,
                    color: color,
                    life: 1
                });
            }
        }

        // 発射
        function shoot() {
            const now = Date.now();
            if (now - lastShot > shootInterval) {
                bullets.push({
                    x: player.x,
                    y: player.y - player.height / 2,
                    width: 4,
                    height: 15,
                    speed: 10,
                    hue: 180
                });
                lastShot = now;
            }
        }

        // 衝突判定
        function checkCollision(a, b) {
            return a.x - a.width / 2 < b.x + b.width / 2 &&
                   a.x + a.width / 2 > b.x - b.width / 2 &&
                   a.y - a.height / 2 < b.y + b.height / 2 &&
                   a.y + a.height / 2 > b.y - b.height / 2;
        }

        // 更新
        function update() {
            if (gameOver) return;

            // プレイヤー移動
            if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
            if (keys['ArrowRight'] || keys['d']) player.x += player.speed;
            if (keys['ArrowUp'] || keys['w']) player.y -= player.speed;
            if (keys['ArrowDown'] || keys['s']) player.y += player.speed;

            // 自動発射（モバイル用）
            if (keys[' ']) shoot();

            // 境界
            player.x = Math.max(player.width / 2, Math.min(width - player.width / 2, player.x));
            player.y = Math.max(player.height / 2, Math.min(height - player.height / 2, player.y));

            // 弾更新
            bullets.forEach((bullet, index) => {
                bullet.y -= bullet.speed;
                if (bullet.y < -20) bullets.splice(index, 1);
            });

            // 敵更新
            enemies.forEach((enemy, eIndex) => {
                enemy.y += enemy.speed;

                // プレイヤーとの衝突
                if (checkCollision(player, enemy)) {
                    player.health -= 20;
                    createParticles(enemy.x, enemy.y, `hsl(${enemy.hue}, 80%, 60%)`, 15);
                    enemies.splice(eIndex, 1);
                    document.getElementById('healthBar').style.width = `${player.health}%`;

                    if (player.health <= 0) {
                        endGame();
                    }
                    return;
                }

                // 弾との衝突
                bullets.forEach((bullet, bIndex) => {
                    if (checkCollision(bullet, enemy)) {
                        enemy.health--;
                        bullets.splice(bIndex, 1);
                        createParticles(bullet.x, bullet.y, `hsl(${bullet.hue}, 80%, 60%)`, 5);

                        if (enemy.health <= 0) {
                            score += enemy.type === 'large' ? 30 : 10;
                            document.getElementById('score').textContent = score;
                            createParticles(enemy.x, enemy.y, `hsl(${enemy.hue}, 80%, 60%)`, 20);
                            enemies.splice(eIndex, 1);
                        }
                    }
                });

                // 画面外
                if (enemy.y > height + 50) {
                    enemies.splice(eIndex, 1);
                }
            });

            // パーティクル更新
            particles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                p.vx *= 0.98;
                p.vy *= 0.98;

                if (p.life <= 0) particles.splice(index, 1);
            });

            // 星更新
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > height) {
                    star.y = 0;
                    star.x = Math.random() * width;
                }
            });
        }

        // 描画
        function draw() {
            // クリア
            ctx.fillStyle = 'rgba(10, 10, 10, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // 星
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.size / 2})`;
                ctx.fill();
            });

            // プレイヤー
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.beginPath();
            ctx.moveTo(0, -player.height / 2);
            ctx.lineTo(-player.width / 2, player.height / 2);
            ctx.lineTo(player.width / 2, player.height / 2);
            ctx.closePath();
            ctx.fillStyle = '#00ffff';
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 20;
            ctx.fill();
            ctx.restore();

            // 弾
            bullets.forEach(bullet => {
                ctx.beginPath();
                ctx.rect(bullet.x - bullet.width / 2, bullet.y - bullet.height / 2, bullet.width, bullet.height);
                ctx.fillStyle = `hsl(${bullet.hue}, 100%, 60%)`;
                ctx.shadowColor = `hsl(${bullet.hue}, 100%, 60%)`;
                ctx.shadowBlur = 10;
                ctx.fill();
            });

            // 敵
            enemies.forEach(enemy => {
                ctx.save();
                ctx.translate(enemy.x, enemy.y);
                ctx.beginPath();
                if (enemy.type === 'large') {
                    // 六角形
                    for (let i = 0; i < 6; i++) {
                        const angle = (i / 6) * Math.PI * 2 - Math.PI / 2;
                        const x = Math.cos(angle) * enemy.width / 2;
                        const y = Math.sin(angle) * enemy.height / 2;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                } else {
                    // 三角形
                    ctx.moveTo(0, enemy.height / 2);
                    ctx.lineTo(-enemy.width / 2, -enemy.height / 2);
                    ctx.lineTo(enemy.width / 2, -enemy.height / 2);
                    ctx.closePath();
                }
                ctx.fillStyle = `hsl(${enemy.hue}, 80%, 60%)`;
                ctx.shadowColor = `hsl(${enemy.hue}, 80%, 60%)`;
                ctx.shadowBlur = 15;
                ctx.fill();
                ctx.restore();
            });

            // パーティクル
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI * 2);
                ctx.fillStyle = p.color.replace(')', `, ${p.life})`).replace('hsl', 'hsla');
                ctx.fill();
            });
        }

        // ゲームオーバー
        function endGame() {
            gameOver = true;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }

        // リスタート
        function restartGame() {
            player.x = width / 2;
            player.y = height - 100;
            player.health = player.maxHealth;
            bullets = [];
            enemies = [];
            particles = [];
            score = 0;
            gameOver = false;
            document.getElementById('score').textContent = score;
            document.getElementById('healthBar').style.width = '100%';
            document.getElementById('gameOver').style.display = 'none';
        }

        // ゲームループ
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 敵生成間隔
        setInterval(spawnEnemy, 1500);

        // イベントリスナー
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ') e.preventDefault();
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // タッチ操作
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            keys[' '] = true;
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const targetX = touch.clientX;
            const targetY = touch.clientY;

            if (targetX < player.x - 10) keys['ArrowLeft'] = true;
            else keys['ArrowLeft'] = false;

            if (targetX > player.x + 10) keys['ArrowRight'] = true;
            else keys['ArrowRight'] = false;

            if (targetY < player.y - 10) keys['ArrowUp'] = true;
            else keys['ArrowUp'] = false;

            if (targetY > player.y + 10) keys['ArrowDown'] = true;
            else keys['ArrowDown'] = false;
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            keys[' '] = false;
            keys['ArrowLeft'] = false;
            keys['ArrowRight'] = false;
            keys['ArrowUp'] = false;
            keys['ArrowDown'] = false;
        }, { passive: false });

        gameLoop();
    </script>
</body>
</html>
