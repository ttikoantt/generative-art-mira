<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Space Shooter - Mira's Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            overflow: hidden;
        }

        header {
            text-align: center;
            padding: 15px;
            z-index: 10;
        }

        h1 {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.8rem;
            color: #888;
        }

        .game-container {
            position: relative;
            margin: 10px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.3);
        }

        canvas {
            display: block;
            background: #000;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            font-size: 2rem;
            color: #ff6b6b;
            margin-bottom: 20px;
        }

        .overlay p {
            font-size: 1rem;
            color: #ccc;
            margin-bottom: 10px;
        }

        .score-display {
            font-size: 3rem;
            color: #feca57;
            margin: 20px 0;
        }

        .btn {
            padding: 15px 30px;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: bold;
            margin-top: 10px;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
            color: #fff;
            z-index: 50;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }

        .health {
            display: flex;
            gap: 5px;
        }

        .heart {
            color: #ff6b6b;
            font-size: 1.2rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.2rem;
            }

            .overlay h2 {
                font-size: 1.5rem;
            }

            .btn {
                padding: 12px 24px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🚀 Space Shooter</h1>
        <p class="subtitle">障害物を撃ち落とせ！</p>
    </header>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="game-container">
        <canvas id="gameCanvas"></canvas>

        <div class="hud">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="health" id="health"></div>
        </div>

        <div class="overlay" id="startScreen">
            <h2>Space Shooter</h2>
            <p>左右ドラッグで移動</p>
            <p>タップで弾を発射</p>
            <button class="btn" onclick="startGame()">START</button>
        </div>

        <div class="overlay hidden" id="gameOverScreen">
            <h2>GAME OVER</h2>
            <div class="score-display" id="finalScore">0</div>
            <p>High Score: <span id="highScore">0</span></p>
            <button class="btn" onclick="startGame()">RESTART</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Set canvas size
        function resizeCanvas() {
            const container = canvas.parentElement;
            const maxWidth = Math.min(window.innerWidth - 20, 600);
            const maxHeight = window.innerHeight - 200;

            canvas.width = maxWidth;
            canvas.height = Math.min(maxHeight, 700);
        }

        // Game state
        let gameRunning = false;
        let score = 0;
        let highScore = localStorage.getItem('spaceShooterHighScore') || 0;
        let health = 3;

        // Player
        const player = {
            x: 0,
            y: 0,
            width: 40,
            height: 40,
            speed: 5,
            color: '#00ff88'
        };

        // Bullets
        let bullets = [];

        // Enemies
        let enemies = [];

        // Stars (background)
        let stars = [];

        // Input
        let input = {
            left: false,
            right: false,
            shoot: false
        };

        // Initialize stars
        function initStars() {
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 2 + 0.5
                });
            }
        }

        // Draw stars
        function drawStars() {
            stars.forEach(star => {
                ctx.fillStyle = `rgba(255, 255, 255, ${0.3 + star.size / 3})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // Update stars
        function updateStars() {
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
        }

        // Initialize player
        function initPlayer() {
            player.x = canvas.width / 2 - player.width / 2;
            player.y = canvas.height - player.height - 20;
        }

        // Draw player
        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x + player.width / 2, player.y + player.height / 2);

            // Ship body
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.moveTo(0, -player.height / 2);
            ctx.lineTo(-player.width / 2, player.height / 2);
            ctx.lineTo(0, player.height / 3);
            ctx.lineTo(player.width / 2, player.height / 2);
            ctx.closePath();
            ctx.fill();

            // Glow
            ctx.shadowColor = player.color;
            ctx.shadowBlur = 15;
            ctx.fill();

            ctx.restore();
        }

        // Update player
        function updatePlayer() {
            if (input.left && player.x > 0) {
                player.x -= player.speed;
            }
            if (input.right && player.x < canvas.width - player.width) {
                player.x += player.speed;
            }
        }

        // Shoot bullet
        function shoot() {
            bullets.push({
                x: player.x + player.width / 2,
                y: player.y,
                width: 4,
                height: 15,
                speed: 10,
                color: '#ff6b6b'
            });
        }

        // Draw bullets
        function drawBullets() {
            bullets.forEach(bullet => {
                ctx.fillStyle = bullet.color;
                ctx.shadowColor = bullet.color;
                ctx.shadowBlur = 10;
                ctx.fillRect(bullet.x - bullet.width / 2, bullet.y, bullet.width, bullet.height);
                ctx.shadowBlur = 0;
            });
        }

        // Update bullets
        function updateBullets() {
            bullets = bullets.filter(bullet => {
                bullet.y -= bullet.speed;
                return bullet.y > -bullet.height;
            });
        }

        // Spawn enemy
        function spawnEnemy() {
            const types = ['basic', 'fast', 'big'];
            const type = types[Math.floor(Math.random() * types.length)];

            let width = 30;
            let height = 30;
            let speed = 2;
            let health = 1;
            let color = '#feca57';
            let score = 10;

            if (type === 'fast') {
                width = 25;
                height = 25;
                speed = 4;
                color = '#ff6b6b';
                score = 15;
            } else if (type === 'big') {
                width = 50;
                height = 50;
                speed = 1;
                health = 3;
                color = '#48dbfb';
                score = 30;
            }

            enemies.push({
                x: Math.random() * (canvas.width - width),
                y: -height,
                width,
                height,
                speed,
                health,
                maxHealth: health,
                color,
                score,
                type
            });
        }

        // Draw enemies
        function drawEnemies() {
            enemies.forEach(enemy => {
                ctx.save();
                ctx.translate(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2);

                // Enemy body
                ctx.fillStyle = enemy.color;
                ctx.shadowColor = enemy.color;
                ctx.shadowBlur = 10;

                if (enemy.type === 'basic') {
                    ctx.fillRect(-enemy.width / 2, -enemy.height / 2, enemy.width, enemy.height);
                } else if (enemy.type === 'fast') {
                    ctx.beginPath();
                    ctx.moveTo(0, -enemy.height / 2);
                    ctx.lineTo(enemy.width / 2, enemy.height / 2);
                    ctx.lineTo(-enemy.width / 2, enemy.height / 2);
                    ctx.closePath();
                    ctx.fill();
                } else if (enemy.type === 'big') {
                    ctx.beginPath();
                    ctx.arc(0, 0, enemy.width / 2, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Health bar for big enemies
                if (enemy.maxHealth > 1) {
                    ctx.fillStyle = '#333';
                    ctx.fillRect(-enemy.width / 2, -enemy.height / 2 - 10, enemy.width, 5);
                    ctx.fillStyle = '#ff6b6b';
                    ctx.fillRect(-enemy.width / 2, -enemy.height / 2 - 10, enemy.width * (enemy.health / enemy.maxHealth), 5);
                }

                ctx.restore();
            });
        }

        // Update enemies
        function updateEnemies() {
            enemies = enemies.filter(enemy => {
                enemy.y += enemy.speed;

                // Check collision with player
                if (collision(player, enemy)) {
                    takeDamage();
                    return false;
                }

                return enemy.y < canvas.height + enemy.height;
            });
        }

        // Collision detection
        function collision(a, b) {
            return a.x < b.x + b.width &&
                   a.x + a.width > b.x &&
                   a.y < b.y + b.height &&
                   a.y + a.height > b.y;
        }

        // Check bullet-enemy collisions
        function checkCollisions() {
            bullets.forEach((bullet, bi) => {
                enemies.forEach((enemy, ei) => {
                    if (collision(bullet, enemy)) {
                        bullets.splice(bi, 1);
                        enemy.health--;

                        if (enemy.health <= 0) {
                            score += enemy.score;
                            enemies.splice(ei, 1);
                            updateScore();
                        }
                    }
                });
            });
        }

        // Take damage
        function takeDamage() {
            health--;
            updateHealth();

            if (health <= 0) {
                gameOver();
            }
        }

        // Update score display
        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        // Update health display
        function updateHealth() {
            const healthEl = document.getElementById('health');
            healthEl.innerHTML = '';
            for (let i = 0; i < health; i++) {
                healthEl.innerHTML += '<span class="heart">❤️</span>';
            }
        }

        // Game over
        function gameOver() {
            gameRunning = false;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('spaceShooterHighScore', highScore);
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('highScore').textContent = highScore;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        // Start game
        function startGame() {
            gameRunning = true;
            score = 0;
            health = 3;
            bullets = [];
            enemies = [];

            updateScore();
            updateHealth();

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');

            initPlayer();
            initStars();

            // Reset input
            input = { left: false, right: false, shoot: false };
        }

        // Game loop
        let lastEnemySpawn = 0;

        function gameLoop(timestamp) {
            if (!gameRunning) {
                requestAnimationFrame(gameLoop);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Update
            updateStars();
            updatePlayer();
            updateBullets();
            updateEnemies();
            checkCollisions();

            // Spawn enemies
            if (timestamp - lastEnemySpawn > 1000) {
                spawnEnemy();
                lastEnemySpawn = timestamp;
            }

            // Draw
            drawStars();
            drawBullets();
            drawEnemies();
            drawPlayer();

            requestAnimationFrame(gameLoop);
        }

        // Keyboard input
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') input.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd') input.right = true;
            if (e.key === ' ') shoot();
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') input.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd') input.right = false;
        });

        // Touch input
        let touchStartX = 0;

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            shoot();
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const diffX = touch.clientX - touchStartX;

            if (diffX < -10) {
                input.left = true;
                input.right = false;
            } else if (diffX > 10) {
                input.right = true;
                input.left = false;
            } else {
                input.left = false;
                input.right = false;
            }
        });

        canvas.addEventListener('touchend', () => {
            input.left = false;
            input.right = false;
        });

        // Mouse input
        canvas.addEventListener('mousedown', (e) => {
            shoot();
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;

            if (x < canvas.width / 2 - 50) {
                input.left = true;
                input.right = false;
            } else if (x > canvas.width / 2 + 50) {
                input.right = true;
                input.left = false;
            } else {
                input.left = false;
                input.right = false;
            }
        });

        canvas.addEventListener('mouseleave', () => {
            input.left = false;
            input.right = false;
        });

        // Fullscreen
        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        }

        // Initialize
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        initStars();
        updateHealth();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
