<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Shooter - スペースシューター</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #0a0a1a, #1a1a2e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 800px;
            max-height: 600px;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
        }

        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 16px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .hud-left, .hud-right {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .fullscreen-btn {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: white;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            transform: translateX(-50%) scale(1.05);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay p {
            font-size: 18px;
            margin: 10px 0;
            color: #aaa;
        }

        .overlay .score {
            font-size: 36px;
            margin: 20px 0;
            color: #00ffff;
        }

        .overlay button {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 18px;
            background: linear-gradient(45deg, #00ffff, #0088ff);
            border: none;
            border-radius: 25px;
            color: #0a0a1a;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .overlay button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .controls-info {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 255, 255, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .controls-info p {
            margin: 5px 0;
            font-size: 14px;
        }

        .mobile-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: none;
            justify-content: center;
            gap: 20px;
        }

        .mobile-controls button {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(0, 255, 255, 0.2);
            border: 2px solid rgba(0, 255, 255, 0.5);
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .mobile-controls button:active {
            background: rgba(0, 255, 255, 0.4);
            transform: scale(0.95);
        }

        .mobile-controls .shoot-btn {
            width: 80px;
            height: 80px;
            background: rgba(255, 0, 255, 0.2);
            border-color: rgba(255, 0, 255, 0.5);
        }

        @media (max-width: 768px) {
            .mobile-controls {
                display: flex;
            }

            .overlay h1 {
                font-size: 32px;
            }

            .overlay p {
                font-size: 14px;
            }

            .controls-info {
                padding: 15px;
            }
        }

        .lives {
            display: flex;
            gap: 5px;
        }

        .life {
            width: 20px;
            height: 20px;
            background: #ff0080;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="canvas"></canvas>

        <div class="hud">
            <div class="hud-left">
                <div>SCORE: <span id="score">0</span></div>
                <div class="lives" id="lives"></div>
            </div>
            <div class="hud-right">
                <div>HIGH: <span id="highScore">0</span></div>
                <div>WAVE: <span id="wave">1</span></div>
            </div>
        </div>

        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

        <div class="overlay" id="startScreen">
            <h1>🚀 SPACE SHOOTER</h1>
            <p>敵を撃ってスコアを稼げ！</p>
            <div class="controls-info">
                <p>← → : 移動</p>
                <p>SPACE : 発射</p>
            </div>
            <button onclick="startGame()">START</button>
        </div>

        <div class="overlay hidden" id="gameOverScreen">
            <h1>GAME OVER</h1>
            <p>最終スコア</p>
            <div class="score" id="finalScore">0</div>
            <button onclick="startGame()">RESTART</button>
        </div>

        <div class="mobile-controls">
            <button id="leftBtn">◀</button>
            <button id="shootBtn" class="shoot-btn">●</button>
            <button id="rightBtn">▶</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;

        function resize() {
            const container = document.getElementById('gameContainer');
            width = canvas.width = container.clientWidth;
            height = canvas.height = container.clientHeight;
        }

        resize();
        window.addEventListener('resize', resize);

        // ゲーム状態
        let gameRunning = false;
        let score = 0;
        let highScore = localStorage.getItem('spaceShooterHighScore') || 0;
        let lives = 3;
        let wave = 1;

        document.getElementById('highScore').textContent = highScore;

        // プレイヤー
        const player = {
            x: 0,
            y: 0,
            width: 40,
            height: 40,
            speed: 6,
            color: '#00ffff',
            movingLeft: false,
            movingRight: false
        };

        // 弾
        let bullets = [];
        const bulletSpeed = 8;
        let canShoot = true;
        let shootCooldown = 200;

        // 敵
        let enemies = [];
        let enemySpawnRate = 2000;
        let lastEnemySpawn = 0;

        // 星
        let stars = [];

        // 入力
        const keys = {};

        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space') {
                e.preventDefault();
                shoot();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // モバイルコントロール
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');
        const shootBtn = document.getElementById('shootBtn');

        leftBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            player.movingLeft = true;
        });

        leftBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            player.movingLeft = false;
        });

        rightBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            player.movingRight = true;
        });

        rightBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            player.movingRight = false;
        });

        shootBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            shoot();
        });

        // 星を初期化
        function initStars() {
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2,
                    speed: 0.5 + Math.random() * 1.5
                });
            }
        }

        // プレイヤーをリセット
        function resetPlayer() {
            player.x = width / 2 - player.width / 2;
            player.y = height - player.height - 20;
        }

        // 弾を発射
        function shoot() {
            if (!gameRunning || !canShoot) return;

            bullets.push({
                x: player.x + player.width / 2 - 2,
                y: player.y,
                width: 4,
                height: 12,
                color: '#ff00ff'
            });

            canShoot = false;
            setTimeout(() => {
                canShoot = true;
            }, shootCooldown);
        }

        // 敵をスポーン
        function spawnEnemy() {
            const types = ['basic', 'fast', 'tank'];
            const type = wave < 3 ? 'basic' : types[Math.floor(Math.random() * types.length)];

            const enemy = {
                x: Math.random() * (width - 40),
                y: -40,
                width: 40,
                height: 40,
                type: type,
                health: type === 'tank' ? 3 : 1,
                speed: type === 'fast' ? 4 : type === 'tank' ? 1.5 : 2,
                color: type === 'tank' ? '#ff0080' : type === 'fast' ? '#00ff80' : '#ffff00',
                points: type === 'tank' ? 30 : type === 'fast' ? 20 : 10
            };

            enemies.push(enemy);
        }

        // ライフを更新
        function updateLives() {
            const livesContainer = document.getElementById('lives');
            livesContainer.innerHTML = '';
            for (let i = 0; i < lives; i++) {
                const life = document.createElement('div');
                life.className = 'life';
                livesContainer.appendChild(life);
            }
        }

        // ゲーム開始
        function startGame() {
            gameRunning = true;
            score = 0;
            lives = 3;
            wave = 1;
            bullets = [];
            enemies = [];
            enemySpawnRate = 2000;

            document.getElementById('score').textContent = score;
            document.getElementById('wave').textContent = wave;
            updateLives();

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');

            resetPlayer();
            initStars();

            requestAnimationFrame(gameLoop);
        }

        // ゲームオーバー
        function gameOver() {
            gameRunning = false;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('spaceShooterHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        // 衝突判定
        function checkCollision(a, b) {
            return a.x < b.x + b.width &&
                   a.x + a.width > b.x &&
                   a.y < b.y + b.height &&
                   a.y + a.height > b.y;
        }

        // ゲームループ
        function gameLoop(timestamp) {
            if (!gameRunning) return;

            // 背景
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, width, height);

            // 星を描画・更新
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > height) {
                    star.y = 0;
                    star.x = Math.random() * width;
                }

                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.size / 2})`;
                ctx.fill();
            });

            // プレイヤー移動
            if ((keys['ArrowLeft'] || player.movingLeft) && player.x > 0) {
                player.x -= player.speed;
            }
            if ((keys['ArrowRight'] || player.movingRight) && player.x < width - player.width) {
                player.x += player.speed;
            }

            // プレイヤー描画
            ctx.save();
            ctx.translate(player.x + player.width / 2, player.y + player.height / 2);

            // 本体
            ctx.beginPath();
            ctx.moveTo(0, -player.height / 2);
            ctx.lineTo(-player.width / 2, player.height / 2);
            ctx.lineTo(player.width / 2, player.height / 2);
            ctx.closePath();
            ctx.fillStyle = player.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.fill();

            ctx.restore();

            // 弾更新・描画
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                bullet.y -= bulletSpeed;

                ctx.fillStyle = bullet.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = bullet.color;
                ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);

                if (bullet.y < -bullet.height) {
                    bullets.splice(i, 1);
                }
            }

            // 敵スポーン
            if (timestamp - lastEnemySpawn > enemySpawnRate) {
                spawnEnemy();
                lastEnemySpawn = timestamp;
            }

            // 敵更新・描画
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                enemy.y += enemy.speed;

                // 敵描画
                ctx.fillStyle = enemy.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = enemy.color;

                if (enemy.type === 'tank') {
                    // タンク型
                    ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
                    ctx.fillStyle = '#fff';
                    ctx.font = '12px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(enemy.health, enemy.x + enemy.width / 2, enemy.y + enemy.height / 2 + 4);
                } else if (enemy.type === 'fast') {
                    // 三角形
                    ctx.beginPath();
                    ctx.moveTo(enemy.x + enemy.width / 2, enemy.y + enemy.height);
                    ctx.lineTo(enemy.x, enemy.y);
                    ctx.lineTo(enemy.x + enemy.width, enemy.y);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    // 基本型
                    ctx.beginPath();
                    ctx.arc(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, enemy.width / 2, 0, Math.PI * 2);
                    ctx.fill();
                }

                // プレイヤーとの衝突
                if (checkCollision(player, enemy)) {
                    enemies.splice(i, 1);
                    lives--;
                    updateLives();

                    if (lives <= 0) {
                        gameOver();
                        return;
                    }
                    continue;
                }

                // 画面外に出たら削除
                if (enemy.y > height) {
                    enemies.splice(i, 1);
                    continue;
                }

                // 弾との衝突
                for (let j = bullets.length - 1; j >= 0; j--) {
                    if (checkCollision(bullets[j], enemy)) {
                        bullets.splice(j, 1);
                        enemy.health--;

                        if (enemy.health <= 0) {
                            score += enemy.points;
                            document.getElementById('score').textContent = score;

                            // ウェーブ進行
                            if (score >= wave * 200) {
                                wave++;
                                document.getElementById('wave').textContent = wave;
                                enemySpawnRate = Math.max(500, 2000 - wave * 200);
                            }

                            enemies.splice(i, 1);
                        }
                        break;
                    }
                }
            }

            ctx.shadowBlur = 0;
            requestAnimationFrame(gameLoop);
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        initStars();
        resetPlayer();
        updateLives();
    </script>
</body>
</html>
