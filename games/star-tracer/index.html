<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星空なぞり - Star Tracer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #0a0a1a, #1a1a3a, #0a0a2a);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100vh;
            cursor: crosshair;
        }

        .ui {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: white;
            z-index: 100;
        }

        .level {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .hint {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 10px;
        }

        .score-display {
            position: fixed;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
            z-index: 200;
        }

        .message.show {
            opacity: 1;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .level {
                font-size: 20px;
            }

            .hint {
                font-size: 12px;
            }

            .score-display {
                font-size: 14px;
                padding: 8px 15px;
            }

            .message {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="ui">
        <div class="level">レベル <span id="level">1</span></div>
        <div class="hint" id="hint">星を順番になぞって星座を作ろう！</div>
    </div>
    <div class="score-display">⭐ <span id="stars">0</span></div>
    <div class="message" id="message">Perfect!</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let level = 1;
        let totalStars = 0;
        let isDrawing = false;
        let currentPath = [];
        let currentLevelStars = [];
        let completed = false;
        let backgroundStars = [];

        // 星座のパターン（相対座標で定義）
        const constellations = [
            { name: "おおぐまの座（北斗七星）", points: [[0,0], [1,0.3], [2,0.5], [3,0.7], [3.5,1.2], [4.5,1.3], [4.8,0.8]] },
            { name: "カシオペア座", points: [[0,0], [0.5,0.8], [1,0.3], [1.5,0.9], [2,0.2]] },
            { name: "オリオン座", points: [[0,0], [0,1.5], [0.5,2], [1,1.5], [1,0], [0.5,0.5]] },
            { name: "夏の大三角", points: [[0,0], [1.5,0.3], [0.8,1.2]] },
            { name: "スバル（プレアデス）", points: [[0,0], [0.3,0.2], [0.6,0.1], [0.9,0.3], [0.5,0.5], [0.2,0.4], [0.7,0.6]] },
            { name: "わし星座", points: [[0,0], [0.5,0.5], [1,0.2], [1.5,0.6], [1.8,0.3], [1.2,1]] }
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initBackgroundStars();
            if (currentLevelStars.length === 0) {
                initLevel();
            } else {
                // 既存の星の位置を再計算
                repositionStars();
            }
        }

        function initBackgroundStars() {
            backgroundStars = [];
            const starCount = Math.floor((width * height) / 4000);
            for (let i = 0; i < starCount; i++) {
                backgroundStars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 1.5 + 0.5,
                    opacity: Math.random() * 0.5 + 0.3
                });
            }
        }

        function getLevelConstellation() {
            return constellations[(level - 1) % constellations.length];
        }

        function initLevel() {
            const constellation = getLevelConstellation();
            document.getElementById('level').textContent = level;
            document.getElementById('hint').textContent = `「${constellation.name}」をなぞろう！`;

            // 星座のスケールと位置を計算
            const padding = 100;
            const availableWidth = width - padding * 2;
            const availableHeight = height - padding * 2;

            const maxX = Math.max(...constellation.points.map(p => p[0]));
            const maxY = Math.max(...constellation.points.map(p => p[1]));

            const scale = Math.min(
                availableWidth / (maxX + 1),
                availableHeight / (maxY + 1),
                150
            );

            const offsetX = padding + (availableWidth - maxX * scale) / 2;
            const offsetY = padding + (availableHeight - maxY * scale) / 2;

            // 星の位置を設定
            currentLevelStars = constellation.points.map((point, index) => ({
                id: index,
                targetX: offsetX + point[0] * scale,
                targetY: offsetY + point[1] * scale,
                x: offsetX + point[0] * scale,
                y: offsetY + point[1] * scale,
                radius: 15 + Math.random() * 10,
                connected: false,
                glow: 0
            }));

            currentPath = [];
            completed = false;
        }

        function repositionStars() {
            const constellation = getLevelConstellation();
            const padding = 100;
            const availableWidth = width - padding * 2;
            const availableHeight = height - padding * 2;

            const maxX = Math.max(...constellation.points.map(p => p[0]));
            const maxY = Math.max(...constellation.points.map(p => p[1]));

            const scale = Math.min(
                availableWidth / (maxX + 1),
                availableHeight / (maxY + 1),
                150
            );

            const offsetX = padding + (availableWidth - maxX * scale) / 2;
            const offsetY = padding + (availableHeight - maxY * scale) / 2;

            currentLevelStars.forEach((star, index) => {
                const point = constellation.points[index];
                star.targetX = offsetX + point[0] * scale;
                star.targetY = offsetY + point[1] * scale;
            });
        }

        function getStarAtPosition(x, y) {
            for (let star of currentLevelStars) {
                const dx = star.x - x;
                const dy = star.y - y;
                if (Math.sqrt(dx * dx + dy * dy) < star.radius * 1.5) {
                    return star;
                }
            }
            return null;
        }

        function handleStart(x, y) {
            if (completed) return;
            
            const star = getStarAtPosition(x, y);
            if (star && star.id === 0) {
                isDrawing = true;
                currentPath = [star];
                star.connected = true;
                star.glow = 1;
            }
        }

        function handleMove(x, y) {
            if (!isDrawing) return;

            const star = getStarAtPosition(x, y);
            if (star && !currentPath.includes(star)) {
                // 次の星か確認
                const lastStar = currentPath[currentPath.length - 1];
                if (star.id === lastStar.id + 1) {
                    currentPath.push(star);
                    star.connected = true;
                    star.glow = 1;

                    // 全部の星がつながったか確認
                    if (currentPath.length === currentLevelStars.length) {
                        completed = true;
                        isDrawing = false;
                        totalStars += currentLevelStars.length;
                        document.getElementById('stars').textContent = totalStars;
                        
                        // 成功メッセージ
                        const messages = ['Perfect!', '素晴らしい！', '星座完成！', 'Excellent!', 'よくできた！'];
                        const message = messages[Math.floor(Math.random() * messages.length)];
                        showMessage(message);

                        // 次のレベルへ
                        setTimeout(() => {
                            level++;
                            initLevel();
                        }, 2000);
                    }
                }
            }
        }

        function handleEnd() {
            if (!completed && currentPath.length < currentLevelStars.length) {
                // 失敗 - リセット
                currentPath.forEach(star => {
                    star.connected = false;
                    star.glow = 0;
                });
                currentPath = [];
            }
            isDrawing = false;
        }

        function showMessage(text) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.classList.add('show');
            setTimeout(() => {
                messageEl.classList.remove('show');
            }, 1500);
        }

        function drawBackgroundStars() {
            backgroundStars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                ctx.fill();
            });
        }

        function drawPath() {
            if (currentPath.length < 2) return;

            ctx.beginPath();
            ctx.moveTo(currentPath[0].x, currentPath[0].y);
            
            for (let i = 1; i < currentPath.length; i++) {
                ctx.lineTo(currentPath[i].x, currentPath[i].y);
            }

            ctx.strokeStyle = 'rgba(255, 215, 0, 0.8)';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        function drawStars(time) {
            currentLevelStars.forEach(star => {
                // グロウエフェクトを更新
                if (star.glow > 0) {
                    star.glow *= 0.99;
                }

                // グロー
                if (star.connected || star.glow > 0) {
                    const gradient = ctx.createRadialGradient(
                        star.x, star.y, 0,
                        star.x, star.y, star.radius * 2
                    );
                    gradient.addColorStop(0, `rgba(255, 215, 0, ${0.3 + star.glow * 0.5})`);
                    gradient.addColorStop(1, 'rgba(255, 215, 0, 0)');
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.radius * 2, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                }

                // 星本体
                const gradient = ctx.createRadialGradient(
                    star.x - star.radius * 0.3, star.y - star.radius * 0.3, 0,
                    star.x, star.y, star.radius
                );

                if (star.connected) {
                    gradient.addColorStop(0, '#FFF8DC');
                    gradient.addColorStop(0.5, '#FFD700');
                    gradient.addColorStop(1, '#FFA500');
                } else if (star.id === 0) {
                    // 最初の星はハイライト
                    gradient.addColorStop(0, '#FFF8DC');
                    gradient.addColorStop(0.5, '#87CEEB');
                    gradient.addColorStop(1, '#4169E1');
                } else {
                    gradient.addColorStop(0, '#FFFFFF');
                    gradient.addColorStop(0.5, '#E0E0E0');
                    gradient.addColorStop(1, '#A0A0A0');
                }

                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // 番号を表示
                if (!star.connected && star.id > 0) {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                    ctx.font = `${star.radius * 0.8}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(star.id, star.x, star.y);
                }
            });
        }

        function animate() {
            const time = Date.now();

            // 背景
            ctx.fillStyle = 'rgba(10, 10, 26, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // 背景の星
            drawBackgroundStars();

            // パスを描画
            drawPath();

            // 星を描画
            drawStars(time);

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        canvas.addEventListener('mousedown', (e) => {
            handleStart(e.clientX, e.clientY);
        });

        canvas.addEventListener('mousemove', (e) => {
            handleMove(e.clientX, e.clientY);
        });

        canvas.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('mouseleave', handleEnd);

        // タッチイベント
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleStart(touch.clientX, touch.clientY);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleMove(touch.clientX, touch.clientY);
        });

        canvas.addEventListener('touchend', handleEnd);

        window.addEventListener('resize', resize);

        // 初期化
        resize();
        initLevel();
        animate();
    </script>
</body>
</html>
