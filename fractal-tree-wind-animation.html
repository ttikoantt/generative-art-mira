<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フラクタル木の風 - Fractal Tree Wind</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a1628 0%, #1a2744 50%, #2d1b4e 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        canvas {
            display: block;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-radius: 12px;
            color: #fff;
            font-size: 12px;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .controls h2 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #a78bfa;
        }

        .control-group {
            margin: 8px 0;
        }

        .control-group label {
            display: block;
            margin-bottom: 3px;
            color: #c4b5fd;
        }

        .control-group input[type="range"] {
            width: 150px;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(167, 139, 250, 0.3);
            border-radius: 2px;
            outline: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #a78bfa;
            border-radius: 50%;
            cursor: pointer;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(167, 139, 250, 0.8);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(167, 139, 250, 1);
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            .controls {
                top: 10px;
                left: 10px;
                padding: 10px 15px;
                font-size: 11px;
            }

            .control-group input[type="range"] {
                width: 120px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 10px 15px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <h2>🌳 フラクタル木の風</h2>
        <div class="control-group">
            <label>風の強さ: <span id="windValue">0.5</span></label>
            <input type="range" id="windStrength" min="0" max="1" step="0.01" value="0.5">
        </div>
        <div class="control-group">
            <label>風の速さ: <span id="speedValue">0.02</span></label>
            <input type="range" id="windSpeed" min="0.005" max="0.05" step="0.001" value="0.02">
        </div>
        <div class="control-group">
            <label>木の角度: <span id="angleValue">25</span>°</label>
            <input type="range" id="branchAngle" min="15" max="45" step="1" value="25">
        </div>
        <div class="control-group">
            <label>深さ: <span id="depthValue">10</span></label>
            <input type="range" id="maxDepth" min="5" max="12" step="1" value="10">
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let time = 0;

        // Control values
        let windStrength = 0.5;
        let windSpeed = 0.02;
        let branchAngle = 25;
        let maxDepth = 10;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        // Control event listeners
        document.getElementById('windStrength').addEventListener('input', (e) => {
            windStrength = parseFloat(e.target.value);
            document.getElementById('windValue').textContent = windStrength.toFixed(2);
        });

        document.getElementById('windSpeed').addEventListener('input', (e) => {
            windSpeed = parseFloat(e.target.value);
            document.getElementById('speedValue').textContent = windSpeed.toFixed(3);
        });

        document.getElementById('branchAngle').addEventListener('input', (e) => {
            branchAngle = parseFloat(e.target.value);
            document.getElementById('angleValue').textContent = branchAngle;
        });

        document.getElementById('maxDepth').addEventListener('input', (e) => {
            maxDepth = parseInt(e.target.value);
            document.getElementById('depthValue').textContent = maxDepth;
        });

        function drawTree(x, y, length, angle, depth) {
            if (depth === 0 || length < 2) return;

            const endX = x + Math.cos(angle) * length;
            const endY = y + Math.sin(angle) * length;

            // Draw branch
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);

            // Color based on depth
            const hue = 280 - depth * 15;
            const lightness = 30 + depth * 5;
            ctx.strokeStyle = `hsl(${hue}, 60%, ${lightness}%)`;
            ctx.lineWidth = depth * 0.8;
            ctx.stroke();

            // Wind effect - more pronounced at higher depths
            const windEffect = Math.sin(time + depth * 0.5) * windStrength * (maxDepth - depth) * 0.05;
            const angleRad = branchAngle * Math.PI / 180;

            // Recursive branches
            const newLength = length * 0.7;
            drawTree(endX, endY, newLength, angle - angleRad + windEffect, depth - 1);
            drawTree(endX, endY, newLength, angle + angleRad + windEffect, depth - 1);
        }

        function drawGround() {
            // Draw gradient ground
            const gradient = ctx.createLinearGradient(0, height - 50, 0, height);
            gradient.addColorStop(0, 'rgba(45, 27, 78, 0)');
            gradient.addColorStop(1, 'rgba(45, 27, 78, 0.8)');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, height - 50, width, 50);
        }

        function drawLeaves() {
            // Draw falling leaves
            ctx.fillStyle = 'rgba(167, 139, 250, 0.3)';
            for (let i = 0; i < 20; i++) {
                const x = (time * 20 + i * 100) % (width + 50) - 25;
                const y = (time * 15 + i * 80) % (height + 50) - 25;
                const size = 2 + Math.sin(i) * 1;

                ctx.beginPath();
                ctx.ellipse(x, y, size, size * 0.6, time + i, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawMoon() {
            // Draw moon in corner
            const moonX = width * 0.85;
            const moonY = height * 0.15;
            const moonRadius = 30;

            // Moon glow
            const glowGradient = ctx.createRadialGradient(moonX, moonY, moonRadius * 0.5, moonX, moonY, moonRadius * 2);
            glowGradient.addColorStop(0, 'rgba(255, 255, 230, 0.3)');
            glowGradient.addColorStop(1, 'rgba(255, 255, 230, 0)');
            ctx.fillStyle = glowGradient;
            ctx.beginPath();
            ctx.arc(moonX, moonY, moonRadius * 2, 0, Math.PI * 2);
            ctx.fill();

            // Moon
            ctx.fillStyle = 'rgba(255, 255, 230, 0.9)';
            ctx.beginPath();
            ctx.arc(moonX, moonY, moonRadius, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawStars() {
            // Draw stars
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            for (let i = 0; i < 50; i++) {
                const x = (i * 137.5) % width;
                const y = (i * 73.7) % (height * 0.6);
                const twinkle = Math.sin(time * 2 + i) * 0.5 + 0.5;
                const size = 1 + twinkle;

                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animate() {
            // Clear with fade effect for trails
            ctx.fillStyle = 'rgba(10, 22, 40, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // Draw background elements
            drawStars();
            drawMoon();
            drawGround();
            drawLeaves();

            // Draw tree
            drawTree(width / 2, height, height * 0.22, -Math.PI / 2, maxDepth);

            // Update time
            time += windSpeed;

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        animate();
    </script>
</body>
</html>
