<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave Particles - ウェーブ・パーティクル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #ffffff;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            pointer-events: none;
            opacity: 0.8;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #ffffff;
            padding: 12px 20px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                top: 10px;
                left: 10px;
            }

            .fullscreen-btn {
                padding: 10px 16px;
                font-size: 12px;
                bottom: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <div>🌊 Wave Particles</div>
        <div style="margin-top: 5px; font-size: 12px;">クリックで波を追加</div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Wave {
            constructor(y, amplitude, frequency, phase, color) {
                this.y = y;
                this.amplitude = amplitude;
                this.frequency = frequency;
                this.phase = phase;
                this.color = color;
                this.speed = 0.02 + Math.random() * 0.03;
            }

            update() {
                this.phase += this.speed;
            }

            draw() {
                ctx.beginPath();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;

                for (let x = 0; x < width; x++) {
                    const y = this.y + Math.sin(x * this.frequency + this.phase) * this.amplitude;
                    if (x === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }

                ctx.stroke();

                // Glow effect
                ctx.strokeStyle = this.color.replace('1)', '0.1)');
                ctx.lineWidth = 10;
                ctx.stroke();
            }
        }

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.life = 1;
                this.decay = 0.005 + Math.random() * 0.01;
                this.size = 2 + Math.random() * 3;
                this.color = `hsl(${Math.random() * 60 + 180}, 100%, 70%)`;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.02; // Gravity
                this.life -= this.decay;
            }

            draw() {
                ctx.beginPath();
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        // Create waves
        const waves = [];
        const colors = [
            'rgba(0, 255, 255, 1)',
            'rgba(255, 0, 255, 1)',
            'rgba(255, 255, 0, 1)',
            'rgba(0, 255, 128, 1)',
            'rgba(128, 0, 255, 1)'
        ];

        for (let i = 0; i < 5; i++) {
            waves.push(new Wave(
                height * (0.2 + i * 0.15),
                30 + Math.random() * 50,
                0.005 + Math.random() * 0.015,
                Math.random() * Math.PI * 2,
                colors[i]
            ));
        }

        let particles = [];

        function createParticles(x, y) {
            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(x, y));
            }
        }

        canvas.addEventListener('click', (e) => {
            createParticles(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let touch of e.touches) {
                createParticles(touch.clientX, touch.clientY);
            }
        });

        let frame = 0;

        function animate() {
            // Clear with trail effect
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // Update and draw waves
            waves.forEach(wave => {
                wave.update();
                wave.draw();
            });

            // Update and draw particles
            particles = particles.filter(p => p.life > 0);
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // Auto-generate particles occasionally
            if (frame % 60 === 0) {
                createParticles(
                    Math.random() * width,
                    height * (0.2 + Math.random() * 0.6)
                );
            }

            frame++;
            requestAnimationFrame(animate);
        }

        animate();

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
