<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Bubbles - Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            z-index: 10;
        }

        #canvas {
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            cursor: pointer;
        }

        .info {
            color: #fff;
            margin-top: 1rem;
            font-size: 0.9rem;
            opacity: 0.7;
            z-index: 10;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <h1>Floating Bubbles</h1>
    <canvas id="canvas" width="800" height="600"></canvas>
    <p class="info">クリックで新しい泡を追加</p>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Canvasサイズ調整
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 800);
            const maxHeight = Math.min(window.innerHeight - 200, 600);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 泡クラス
        class Bubble {
            constructor(x, y) {
                this.x = x || Math.random() * canvas.width;
                this.y = y || Math.random() * canvas.height;
                this.radius = Math.random() * 40 + 10;
                this.dx = (Math.random() - 0.5) * 3;
                this.dy = (Math.random() - 0.5) * 3;
                this.hue = Math.random() * 360;
                this.alpha = Math.random() * 0.5 + 0.3;
                this.pulseSpeed = Math.random() * 0.02 + 0.01;
                this.pulse = 0;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;

                // グラデーション
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 70%, 1)`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 70%, 50%, 0.5)`);
                gradient.addColorStop(1, `hsla(${this.hue}, 60%, 30%, 0)`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // ハイライト
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha * 0.5})`;
                ctx.beginPath();
                ctx.arc(
                    this.x - this.radius * 0.3,
                    this.y - this.radius * 0.3,
                    this.radius * 0.2,
                    0,
                    Math.PI * 2
                );
                ctx.fill();

                ctx.restore();
            }

            update() {
                // 色の変化
                this.hue += 0.2;

                // パルスエフェクト
                this.pulse += this.pulseSpeed;
                const scale = 1 + Math.sin(this.pulse) * 0.1;

                // 移動
                this.x += this.dx * scale;
                this.y += this.dy * scale;

                // 壁で反射
                if (this.x - this.radius < 0 || this.x + this.radius > canvas.width) {
                    this.dx *= -1;
                    this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                }
                if (this.y - this.radius < 0 || this.y + this.radius > canvas.height) {
                    this.dy *= -1;
                    this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));
                }

                this.draw();
            }
        }

        // 泡の配列
        let bubbles = [];

        // 初期泡を生成
        for (let i = 0; i < 15; i++) {
            bubbles.push(new Bubble());
        }

        // アニメーション
        function animate() {
            // 背景（トレイルエフェクト）
            ctx.fillStyle = 'rgba(26, 26, 46, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 泡を更新
            bubbles.forEach(bubble => bubble.update());

            // 泡同士の衝突検知
            for (let i = 0; i < bubbles.length; i++) {
                for (let j = i + 1; j < bubbles.length; j++) {
                    const dx = bubbles[j].x - bubbles[i].x;
                    const dy = bubbles[j].y - bubbles[i].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < bubbles[i].radius + bubbles[j].radius) {
                        // 衝突時のエフェクト
                        const midX = (bubbles[i].x + bubbles[j].x) / 2;
                        const midY = (bubbles[i].y + bubbles[j].y) / 2;

                        ctx.save();
                        ctx.globalAlpha = 0.3;
                        ctx.fillStyle = `hsl(${(bubbles[i].hue + bubbles[j].hue) / 2}, 100%, 70%)`;
                        ctx.beginPath();
                        ctx.arc(midX, midY, 10, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        // クリックで新しい泡を追加
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            bubbles.push(new Bubble(x, y));

            // 泡が多すぎたら削除
            if (bubbles.length > 30) {
                bubbles.shift();
            }
        });

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // アニメーション開始
        animate();
    </script>
</body>
</html>
