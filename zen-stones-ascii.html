<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Stones ASCII Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        #fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 1000;
        }
        #fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        #canvas {
            font-size: 12px;
            line-height: 1.2;
            white-space: pre;
            color: #e0e0e0;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            max-width: 95vw;
            max-height: 80vh;
            overflow: auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            margin: 20px;
        }
        .title {
            color: #fff;
            font-size: 24px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            letter-spacing: 5px;
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            margin-bottom: 20px;
        }
        @media (max-width: 768px) {
            #canvas {
                font-size: 8px;
                padding: 10px;
            }
            .title {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <button id="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    <div class="title">禅の石</div>
    <div class="subtitle">Zen Stones ASCII Art</div>
    <div id="canvas"></div>

    <script>
        const canvas = document.getElementById('canvas');

        // 色彩グラデーション
        const colors = [
            '#8B4513', '#A0522D', '#CD853F', '#DEB887',
            '#F5DEB3', '#FAEBD7', '#FFDEAD', '#FFE4C4'
        ];

        // 禅の石積みパターン
        const stonePatterns = [
            // 大きい石
            `
     .::::::::::.
   .::::'::::::'::.
  .:::'    ::    '::.
 .:::      ::      :::.
 :::.      ::      .:::
 :::.      ::      .:::
  '::.    .::    .::'
    ':::.:::.:::'
      ':::::::'
        ':::'
            `,
            // 中くらいの石
            `
    .:::::::.
   .::' :: '::.
  .::   ::   ::.
 ::.    ::    .::
 ::.    ::    .::
  '::......::'
    '::..::'
            `,
            // 小さな石
            `
   .::::.
  .::'::.
  .:: ::.
   ':::'
            `
        ];

        // 石の配置
        function generateZenGarden() {
            let output = '';

            // ランダムに石を配置
            const numStones = 8 + Math.floor(Math.random() * 5);

            for (let i = 0; i < numStones; i++) {
                const patternIndex = Math.floor(Math.random() * stonePatterns.length);
                const colorIndex = Math.floor(Math.random() * colors.length);
                const stone = stonePatterns[patternIndex];
                const color = colors[colorIndex];

                // 色付きの石を追加
                output += `<span style="color: ${color}">${stone}</span>\n\n`;
            }

            return output;
        }

        // 初期表示
        canvas.innerHTML = generateZenGarden();

        // 定期的に更新（禅の静けさを保つため、ゆっくり）
        setInterval(() => {
            if (Math.random() < 0.1) {  // 10%の確率で更新
                canvas.style.opacity = '0';
                setTimeout(() => {
                    canvas.innerHTML = generateZenGarden();
                    canvas.style.opacity = '1';
                }, 500);
            }
        }, 5000);

        // フェード効果
        canvas.style.transition = 'opacity 0.5s';

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
