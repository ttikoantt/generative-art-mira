<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Wave Art - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        canvas {
            display: block;
        }
        
        #fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 1000;
        }
        
        #fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        #info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <button id="fullscreen-btn">全画面表示</button>
    <div id="info">Particle Wave Art - タッチして波を起こそう</div>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        
        let width, height;
        let particles = [];
        let time = 0;
        let mouseX = 0;
        let mouseY = 0;
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initParticles();
        }
        
        function initParticles() {
            particles = [];
            const particleCount = Math.floor((width * height) / 3000);
            
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    baseY: Math.random() * height,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 0.02 + 0.01,
                    amplitude: Math.random() * 50 + 20,
                    phase: Math.random() * Math.PI * 2,
                    hue: Math.random() * 60 + 180, // Blue-cyan range
                    brightness: Math.random() * 50 + 50
                });
            }
        }
        
        function drawWave(t) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);
            
            particles.forEach((p, i) => {
                // Wave motion
                const waveOffset = Math.sin(t * p.speed + p.phase + p.x * 0.01) * p.amplitude;
                const mouseInfluence = Math.max(0, 1 - Math.hypot(p.x - mouseX, p.y - mouseY) / 200);
                
                p.y = p.baseY + waveOffset + mouseInfluence * 50 * Math.sin(t * 0.05);
                
                // Color shift based on position
                const hueShift = (p.x / width) * 60;
                const hue = p.hue + hueShift;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue}, 80%, ${p.brightness}%, 0.8)`;
                ctx.fill();
                
                // Glow effect for larger particles
                if (p.size > 1.5) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * 2, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${hue}, 80%, ${p.brightness}%, 0.1)`;
                    ctx.fill();
                }
            });
        }
        
        function animate() {
            time += 1;
            drawWave(time);
            requestAnimationFrame(animate);
        }
        
        // Event listeners
        window.addEventListener('resize', resize);
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });
        
        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });
        
        // Initialize
        resize();
        animate();
    </script>
</body>
</html>
