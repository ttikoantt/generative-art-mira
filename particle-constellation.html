<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Constellation - ミラのジェネレーティブアート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            color: white;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            color: rgba(255,255,255,0.8);
            font-size: clamp(0.8rem, 2vw, 1rem);
            margin-bottom: 20px;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16/9;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: clamp(0.8rem, 2vw, 1rem);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            backdrop-filter: blur(10px);
        }

        button:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            background: rgba(255,255,255,0.15);
        }

        .info {
            color: rgba(255,255,255,0.7);
            font-size: clamp(0.7rem, 1.5vw, 0.85rem);
            margin-top: 15px;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            button {
                padding: 14px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Particle Constellation</h1>
        <p class="subtitle">マウス/タップで遊ぶ星座のように繋がるパーティクル</p>

        <div id="canvas-container">
            <canvas id="particleCanvas"></canvas>
        </div>

        <div class="controls">
            <button onclick="changeParticleCount(50)">少なめ</button>
            <button onclick="changeParticleCount(100)">普通</button>
            <button onclick="changeParticleCount(150)">多め</button>
            <button onclick="toggleRainbow()">レインボー</button>
            <button onclick="resetParticles()" class="fullscreen-btn">リセット</button>
            <button onclick="toggleFullscreen()" class="fullscreen-btn">全画面</button>
        </div>

        <p class="info">
            パーティクルがお互いに近づくと線で繋がれます。<br>
            マウスやタップでパーティクルを動かして楽しんでください。
        </p>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');

        let particles = [];
        let mouseX = 0;
        let mouseY = 0;
        let isRainbow = false;
        let hue = 0;

        // 設定
        const config = {
            particleCount: 100,
            connectionDistance: 100,
            mouseDistance: 150,
            baseSpeed: 1,
            particleSize: 2
        };

        // キャンバスサイズ設定
        function resizeCanvas() {
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        // パーティクルクラス
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * config.baseSpeed;
                this.vy = (Math.random() - 0.5) * config.baseSpeed;
                this.size = config.particleSize + Math.random() * 2;
                this.hue = Math.random() * 360;
            }

            update() {
                // マウスの影響
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < config.mouseDistance) {
                    const force = (config.mouseDistance - dist) / config.mouseDistance;
                    this.vx += (dx / dist) * force * 0.3;
                    this.vy += (dy / dist) * force * 0.3;
                }

                // 速度制限
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > 2) {
                    this.vx = (this.vx / speed) * 2;
                    this.vy = (this.vy / speed) * 2;
                }

                // 位置更新
                this.x += this.vx;
                this.y += this.vy;

                // 境界チェック
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;

                // 境界内に収める
                this.x = Math.max(0, Math.min(canvas.width, this.x));
                this.y = Math.max(0, Math.min(canvas.height, this.y));
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);

                if (isRainbow) {
                    ctx.fillStyle = `hsl(${this.hue + hue}, 70%, 60%)`;
                } else {
                    ctx.fillStyle = `hsl(${this.hue}, 70%, 60%)`;
                }

                ctx.fill();
            }
        }

        // パーティクル初期化
        function initParticles() {
            particles = [];
            for (let i = 0; i < config.particleCount; i++) {
                particles.push(new Particle());
            }
        }

        // 線を描画
        function drawLines() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < config.connectionDistance) {
                        const opacity = 1 - dist / config.connectionDistance;

                        if (isRainbow) {
                            ctx.strokeStyle = `hsla(${hue + particles[i].hue}, 70%, 60%, ${opacity * 0.5})`;
                        } else {
                            ctx.strokeStyle = `hsla(${particles[i].hue}, 70%, 60%, ${opacity * 0.5})`;
                        }

                        ctx.lineWidth = opacity * 2;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // アニメーション
        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            drawLines();

            if (isRainbow) {
                hue += 0.5;
            }

            requestAnimationFrame(animate);
        }

        // マウス/タッチイベント
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            mouseX = touch.clientX - rect.left;
            mouseY = touch.clientY - rect.top;
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            mouseX = touch.clientX - rect.left;
            mouseY = touch.clientY - rect.top;
        }, { passive: false });

        // コントロール関数
        function changeParticleCount(count) {
            config.particleCount = count;
            initParticles();
        }

        function toggleRainbow() {
            isRainbow = !isRainbow;
        }

        function resetParticles() {
            initParticles();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                container.requestFullscreen();
            }
        }

        // 初期化
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        mouseX = canvas.width / 2;
        mouseY = canvas.height / 2;
        initParticles();
        animate();
    </script>
</body>
</html>
