<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Light Flow - Art 866</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">Click or tap to add light sources</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let lights = [];
        let particles = [];
        let mouse = { x: 0, y: 0 };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Light {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.hue = Math.random() * 360;
                this.radius = 0;
                this.maxRadius = 50 + Math.random() * 100;
                this.growthSpeed = 2;
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.02 + Math.random() * 0.02;
            }

            update() {
                if (this.radius < this.maxRadius) {
                    this.radius += this.growthSpeed;
                }

                this.pulsePhase += this.pulseSpeed;
                this.hue = (this.hue + 0.1) % 360;
            }

            draw(ctx) {
                const pulse = Math.sin(this.pulsePhase) * 0.3 + 0.7;
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * pulse
                );

                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 70%, 0.8)`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 100%, 50%, 0.3)`);
                gradient.addColorStop(1, `hsla(${this.hue}, 100%, 50%, 0)`);

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * pulse, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        class Particle {
            constructor(light) {
                this.light = light;
                this.angle = Math.random() * Math.PI * 2;
                this.distance = 0;
                this.speed = 0.5 + Math.random() * 1.5;
                this.size = 1 + Math.random() * 2;
                this.hue = light.hue + (Math.random() - 0.5) * 60;
                this.life = 1;
                this.decay = 0.002 + Math.random() * 0.003;
                this.wobblePhase = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.05 + Math.random() * 0.05;
                this.wobbleAmount = 0.5 + Math.random() * 1;
            }

            update() {
                this.distance += this.speed;
                this.wobblePhase += this.wobbleSpeed;
                this.life -= this.decay;

                if (this.life <= 0 || this.distance > this.light.radius * 2) {
                    return false;
                }
                return true;
            }

            draw(ctx) {
                const wobble = Math.sin(this.wobblePhase) * this.wobbleAmount;
                const x = this.light.x + Math.cos(this.angle + wobble * 0.1) * this.distance;
                const y = this.light.y + Math.sin(this.angle + wobble * 0.1) * this.distance;

                const alpha = this.life * 0.8;
                ctx.beginPath();
                ctx.arc(x, y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 70%, ${alpha})`;
                ctx.fill();
            }
        }

        function createLight(x, y) {
            lights.push(new Light(x, y));
            if (lights.length > 15) {
                lights.shift();
            }
        }

        function spawnParticles() {
            lights.forEach(light => {
                if (Math.random() < 0.3) {
                    particles.push(new Particle(light));
                }
            });
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            spawnParticles();

            lights.forEach(light => {
                light.update();
                light.draw(ctx);
            });

            particles = particles.filter(particle => {
                const alive = particle.update();
                if (alive) {
                    particle.draw(ctx);
                }
                return alive;
            });

            requestAnimationFrame(animate);
        }

        canvas.addEventListener('click', (e) => {
            createLight(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createLight(touch.clientX, touch.clientY);
        });

        window.addEventListener('resize', resize);
        resize();

        // Create initial lights
        createLight(width * 0.3, height * 0.4);
        createLight(width * 0.7, height * 0.6);

        animate();
    </script>
</body>
</html>
