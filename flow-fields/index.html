<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Fields - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        canvas {
            display: block;
        }
        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 12px;
            color: #fff;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        .controls h2 {
            margin-bottom: 15px;
            font-size: 1.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .control-group {
            margin-bottom: 15px;
        }
        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: #aaa;
        }
        .control-group input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #333;
            outline: none;
            -webkit-appearance: none;
        }
        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            margin-right: 10px;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }
        .stats {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 12px;
            color: #fff;
            font-size: 0.9em;
            backdrop-filter: blur(10px);
        }
        @media (max-width: 768px) {
            .controls {
                top: 10px;
                left: 10px;
                right: 10px;
                padding: 15px;
            }
            .fullscreen {
                top: auto;
                bottom: 20px;
                right: 20px;
            }
            .stats {
                display: none;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <h2>🌊 Flow Fields</h2>
        <div class="control-group">
            <label>粒子数: <span id="countValue">2000</span></label>
            <input type="range" id="particleCount" min="500" max="5000" value="2000">
        </div>
        <div class="control-group">
            <label>ノイズスケール: <span id="scaleValue">200</span></label>
            <input type="range" id="noiseScale" min="50" max="500" value="200">
        </div>
        <div class="control-group">
            <label>速度: <span id="speedValue">2</span></label>
            <input type="range" id="speed" min="1" max="10" value="2">
        </div>
        <div class="control-group">
            <label>色の変化: <span id="hueSpeedValue">0.1</span></label>
            <input type="range" id="hueSpeed" min="0.01" max="0.5" step="0.01" value="0.1">
        </div>
        <button class="btn" onclick="reset()">リセット</button>
        <button class="btn" onclick="toggleFade()">フェード切替</button>
    </div>

    <button class="btn fullscreen" onclick="toggleFullscreen()">全画面</button>

    <div class="stats" id="stats"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let time = 0;
        let fade = true;

        let settings = {
            particleCount: 2000,
            noiseScale: 200,
            speed: 2,
            hueSpeed: 0.1
        };

        // Simplex Noise
        class SimplexNoise {
            constructor() {
                this.p = new Uint8Array(256);
                for (let i = 0; i < 256; i++) {
                    this.p[i] = i;
                }
                for (let i = 255; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.p[i], this.p[j]] = [this.p[j], this.p[i]];
                }
                this.perm = new Uint8Array(512);
                for (let i = 0; i < 512; i++) {
                    this.perm[i] = this.p[i & 255];
                }
            }

            noise2D(x, y) {
                const F2 = 0.5 * (Math.sqrt(3) - 1);
                const G2 = (3 - Math.sqrt(3)) / 6;

                let s = (x + y) * F2;
                let i = Math.floor(x + s);
                let j = Math.floor(y + s);
                let t = (i + j) * G2;
                let X0 = i - t;
                let Y0 = j - t;
                let x0 = x - X0;
                let y0 = y - Y0;

                let i1, j1;
                if (x0 > y0) {
                    i1 = 1;
                    j1 = 0;
                } else {
                    i1 = 0;
                    j1 = 1;
                }

                let x1 = x0 - i1 + G2;
                let y1 = y0 - j1 + G2;
                let x2 = x0 - 1 + 2 * G2;
                let y2 = y0 - 1 + 2 * G2;

                let ii = i & 255;
                let jj = j & 255;

                let n0 = 0, n1 = 0, n2 = 0;

                let t0 = 0.5 - x0 * x0 - y0 * y0;
                if (t0 >= 0) {
                    let gi0 = this.perm[ii + this.perm[jj]] % 12;
                    t0 *= t0;
                    n0 = t0 * t0 * this.grad(gi0, x0, y0);
                }

                let t1 = 0.5 - x1 * x1 - y1 * y1;
                if (t1 >= 0) {
                    let gi1 = this.perm[ii + i1 + this.perm[jj + j1]] % 12;
                    t1 *= t1;
                    n1 = t1 * t1 * this.grad(gi1, x1, y1);
                }

                let t2 = 0.5 - x2 * x2 - y2 * y2;
                if (t2 >= 0) {
                    let gi2 = this.perm[ii + 1 + this.perm[jj + 1]] % 12;
                    t2 *= t2;
                    n2 = t2 * t2 * this.grad(gi2, x2, y2);
                }

                return 70 * (n0 + n1 + n2);
            }

            grad(hash, x, y) {
                const h = hash & 7;
                const u = h < 4 ? x : y;
                const v = h < 4 ? y : x;
                return ((h & 1) ? -u : u) + ((h & 2) ? -2 * v : 2 * v);
            }
        }

        const noise = new SimplexNoise();

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = 0;
                this.vy = 0;
                this.life = Math.random() * 200 + 100;
                this.maxLife = this.life;
                this.hue = Math.random() * 60 + 200; // Blue-purple range
            }

            update() {
                const angle = noise.noise2D(
                    this.x / settings.noiseScale + time * 0.0001,
                    this.y / settings.noiseScale + time * 0.0001
                ) * Math.PI * 4;

                this.vx += Math.cos(angle) * 0.1;
                this.vy += Math.sin(angle) * 0.1;

                // Speed limit
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > settings.speed) {
                    this.vx = (this.vx / speed) * settings.speed;
                    this.vy = (this.vy / speed) * settings.speed;
                }

                this.x += this.vx;
                this.y += this.vy;

                this.life--;
                this.hue += settings.hueSpeed;

                // Wrap around
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;

                if (this.life <= 0) {
                    this.reset();
                }
            }

            draw() {
                const alpha = this.life / this.maxLife;
                ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;

            particles = [];
            for (let i = 0; i < settings.particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            if (fade) {
                ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
                ctx.fillRect(0, 0, width, height);
            }

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            time++;
            updateStats();
            requestAnimationFrame(animate);
        }

        function reset() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, width, height);
            particles.forEach(p => p.reset());
            time = 0;
        }

        function toggleFade() {
            fade = !fade;
        }

        function updateStats() {
            const fps = Math.round(1000 / 16.67);
            document.getElementById('stats').innerHTML = `
                <div>🎨 Flow Fields</div>
                <div>粒子: ${particles.length}</div>
                <div>時間: ${time}</div>
            `;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Controls
        document.getElementById('particleCount').addEventListener('input', (e) => {
            settings.particleCount = parseInt(e.target.value);
            document.getElementById('countValue').textContent = settings.particleCount;
            init();
        });

        document.getElementById('noiseScale').addEventListener('input', (e) => {
            settings.noiseScale = parseInt(e.target.value);
            document.getElementById('scaleValue').textContent = settings.noiseScale;
        });

        document.getElementById('speed').addEventListener('input', (e) => {
            settings.speed = parseInt(e.target.value);
            document.getElementById('speedValue').textContent = settings.speed;
        });

        document.getElementById('hueSpeed').addEventListener('input', (e) => {
            settings.hueSpeed = parseFloat(e.target.value);
            document.getElementById('hueSpeedValue').textContent = settings.hueSpeed;
        });

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        init();
        animate();
    </script>
</body>
</html>
