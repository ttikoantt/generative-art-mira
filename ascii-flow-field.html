<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Flow Field | Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        h1 {
            color: #00ff88;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .subtitle {
            color: #888;
            font-size: clamp(0.8rem, 2vw, 1rem);
            margin-bottom: 20px;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            aspect-ratio: 16/9;
            background: #0a0a0f;
            border: 2px solid #00ff88;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }

        #asciiCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0a0a0f;
            border: none;
            padding: 12px 24px;
            font-size: clamp(0.9rem, 2vw, 1rem);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            color: #666;
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
            margin-top: 15px;
        }

        @media (max-width: 768px) {
            .canvas-container {
                max-width: 100%;
                border-radius: 5px;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ASCII Flow Field</h1>
        <p class="subtitle">パーティクルシステムを文字で表現</p>

        <div class="canvas-container">
            <canvas id="asciiCanvas"></canvas>
        </div>

        <div class="controls">
            <button onclick="regenerate()">新規生成</button>
            <button onclick="changeChars()">文字変更</button>
            <button onclick="togglePause()">一時停止/再開</button>
        </div>

        <p class="info">クリックでパーティクル追加 | スペースで一時停止</p>
    </div>

    <script>
        const canvas = document.getElementById('asciiCanvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        let animationId;
        let isPaused = false;
        let time = 0;

        const charSets = [
            ['∼', '≈', '∽', '∿', '〜'],
            ['·', '∙', '●', '○', '◌'],
            ['░', '▒', '▓', '█', '▓'],
            ['∴', '∵', '⋮', '⋯', '⋰'],
            ['✧', '✦', '★', '☆', '✫']
        ];
        let currentCharSet = charSets[0];
        let charSetIndex = 0;

        const colors = [
            ['#00ff88', '#00ffaa', '#00ffcc', '#00ffee'],
            ['#ff6b9d', '#ff8ab3', '#ffa9c9', '#ffc8df'],
            ['#6b9dff', '#8ab3ff', '#a9c9ff', '#c8dfff'],
            ['#ffb86b', '#ffc98a', '#ffd9a9', '#ffeac8']
        ];
        let currentColorIndex = 0;

        function resize() {
            const container = canvas.parentElement;
            const dpr = window.devicePixelRatio || 1;
            canvas.width = container.clientWidth * dpr;
            canvas.height = container.clientHeight * dpr;
            ctx.scale(dpr, dpr);
        }

        class Particle {
            constructor(x, y) {
                this.x = x || Math.random() * canvas.width / window.devicePixelRatio;
                this.y = y || Math.random() * canvas.height / window.devicePixelRatio;
                this.char = currentCharSet[Math.floor(Math.random() * currentCharSet.length)];
                this.color = colors[currentColorIndex][Math.floor(Math.random() * 4)];
                this.size = Math.random() * 20 + 12;
                this.speed = Math.random() * 0.5 + 0.3;
                this.angle = 0;
                this.life = 1;
                this.maxLife = Math.random() * 200 + 100;
                this.age = 0;
            }

            getFlowAngle(x, y) {
                const scale = 0.003;
                const angle = Math.sin(x * scale + time * 0.001) *
                            Math.cos(y * scale + time * 0.001) *
                            Math.PI * 2;
                return angle;
            }

            update() {
                this.age++;
                if (this.age > this.maxLife) {
                    this.life -= 0.02;
                }

                const angle = this.getFlowAngle(this.x, this.y);
                this.x += Math.cos(angle) * this.speed;
                this.y += Math.sin(angle) * this.speed;

                const width = canvas.width / window.devicePixelRatio;
                const height = canvas.height / window.devicePixelRatio;

                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;

                this.angle = angle;
            }

            draw() {
                const alpha = this.life * 0.8;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = this.color;
                ctx.font = `${this.size}px "Courier New", monospace`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillText(this.char, 0, 0);

                ctx.restore();
            }

            isDead() {
                return this.life <= 0;
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            if (!isPaused) {
                const width = canvas.width / window.devicePixelRatio;
                const height = canvas.height / window.devicePixelRatio;

                ctx.fillStyle = 'rgba(10, 10, 15, 0.05)';
                ctx.fillRect(0, 0, width, height);

                time += 1;

                particles = particles.filter(p => !p.isDead());

                if (particles.length < 80) {
                    particles.push(new Particle());
                }

                particles.forEach(particle => {
                    particle.update();
                    particle.draw();
                });
            }

            animationId = requestAnimationFrame(animate);
        }

        function regenerate() {
            currentColorIndex = (currentColorIndex + 1) % colors.length;
            init();
        }

        function changeChars() {
            charSetIndex = (charSetIndex + 1) % charSets.length;
            currentCharSet = charSets[charSetIndex];
            particles.forEach(p => {
                p.char = currentCharSet[Math.floor(Math.random() * currentCharSet.length)];
            });
        }

        function togglePause() {
            isPaused = !isPaused;
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            for (let i = 0; i < 5; i++) {
                particles.push(new Particle(x, y));
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                togglePause();
            }
        });

        window.addEventListener('resize', () => {
            resize();
            init();
        });

        resize();
        init();
        animate();
    </script>
</body>
</html>
