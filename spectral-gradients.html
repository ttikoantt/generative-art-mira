<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectral Gradients - Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0f;
            color: #fff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            opacity: 0.8;
        }

        #artwork {
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 90vw;
            max-height: 70vh;
        }

        .controls {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 0.8rem 1.5rem;
            font-size: 0.9rem;
            border: none;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            margin-top: 1rem;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        .fullscreen-btn {
            position: fixed;
            top: 1rem;
            right: 1rem;
            padding: 0.8rem;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            z-index: 100;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1rem;
            }

            button {
                padding: 0.6rem 1.2rem;
                font-size: 0.8rem;
            }

            .fullscreen-btn {
                top: 0.5rem;
                right: 0.5rem;
                width: 45px;
                height: 45px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <h1>SPECTRAL GRADIENTS</h1>
        <canvas id="artwork"></canvas>
        <div class="controls">
            <button onclick="regenerate()">再生成</button>
            <button onclick="togglePause()">一時停止</button>
            <button onclick="saveImage()">保存</button>
        </div>
        <div class="info">
            色彩が時間とともに変化します
        </div>
    </div>

    <script>
        const canvas = document.getElementById('artwork');
        const ctx = canvas.getContext('2d');

        // Canvasサイズ
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth * 0.9, 800);
            const maxHeight = Math.min(window.innerHeight * 0.7, 600);
            const aspectRatio = 4 / 3;

            let width = maxWidth;
            let height = width / aspectRatio;

            if (height > maxHeight) {
                height = maxHeight;
                width = height * aspectRatio;
            }

            canvas.width = width;
            canvas.height = height;
        }

        resizeCanvas();
        window.addEventListener('resize', () => {
            resizeCanvas();
            generateGradients();
        });

        let gradients = [];
        let time = 0;
        let isPaused = false;
        let animationId = null;

        // グラデーションを生成
        function generateGradients() {
            gradients = [];
            const numGradients = 5 + Math.floor(Math.random() * 5); // 5-10個

            for (let i = 0; i < numGradients; i++) {
                const angle = Math.random() * Math.PI * 2;
                const centerX = Math.random() * canvas.width;
                const centerY = Math.random() * canvas.height;
                const hue1 = Math.random() * 360;
                const hue2 = (hue1 + 30 + Math.random() * 60) % 360;
                const speed = 0.001 + Math.random() * 0.002;

                gradients.push({
                    angle,
                    centerX,
                    centerY,
                    hue1,
                    hue2,
                    speed
                });
            }
        }

        // グラデーションを描画
        function draw() {
            if (isPaused) return;

            // 背景をクリア
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // グラデーションを描画
            gradients.forEach((grad, index) => {
                const currentHue1 = (grad.hue1 + time * grad.speed * 100) % 360;
                const currentHue2 = (grad.hue2 + time * grad.speed * 100) % 360;

                // 円形グラデーション
                const radius = Math.max(canvas.width, canvas.height) * (0.8 + Math.sin(time * grad.speed + index) * 0.2);

                const gradient = ctx.createRadialGradient(
                    grad.centerX + Math.sin(time * grad.speed) * 50,
                    grad.centerY + Math.cos(time * grad.speed) * 50,
                    0,
                    canvas.width / 2,
                    canvas.height / 2,
                    radius
                );

                const alpha = 0.15 + Math.sin(time * grad.speed * 2 + index) * 0.05;

                gradient.addColorStop(0, `hsla(${currentHue1}, 80%, 60%, ${alpha})`);
                gradient.addColorStop(0.5, `hsla(${(currentHue1 + currentHue2) / 2}, 70%, 50%, ${alpha * 0.7})`);
                gradient.addColorStop(1, `hsla(${currentHue2}, 60%, 40%, 0)`);

                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            });

            time++;
            animationId = requestAnimationFrame(draw);
        }

        // 再生成
        function regenerate() {
            time = 0;
            generateGradients();
        }

        // 一時停止
        function togglePause() {
            isPaused = !isPaused;
            const btn = event.target;
            btn.textContent = isPaused ? '再開' : '一時停止';

            if (!isPaused) {
                draw();
            } else {
                cancelAnimationFrame(animationId);
            }
        }

        // 画像を保存
        function saveImage() {
            const link = document.createElement('a');
            link.download = 'spectral-gradients.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        // 全画面表示
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        generateGradients();
        draw();
    </script>
</body>
</html>
