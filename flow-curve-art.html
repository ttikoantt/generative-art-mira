<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Curve Art - 流れる曲線のアート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">Flow Curve Art - マウス/タッチで曲線を誘導</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let mouseX = 0, mouseY = 0;
        let hasMouse = false;

        // 粒子クラス
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.age = 0;
                this.maxAge = 200 + Math.random() * 200;
                this.hue = Math.random() * 360;
                this.size = 1 + Math.random() * 2;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.trail = [];
                this.maxTrailLength = 20 + Math.random() * 20;
            }

            update() {
                // マウスに近づくと曲線を描く
                if (hasMouse) {
                    const dx = mouseX - this.x;
                    const dy = mouseY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 200) {
                        const force = (200 - dist) / 200;
                        this.speedX += dx * force * 0.02;
                        this.speedY += dy * force * 0.02;
                    }
                }

                // スピード制限
                const speed = Math.sqrt(this.speedX * this.speedX + this.speedY * this.speedY);
                if (speed > 5) {
                    this.speedX = (this.speedX / speed) * 5;
                    this.speedY = (this.speedY / speed) * 5;
                }

                // トレイルに位置を追加
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.maxTrailLength) {
                    this.trail.shift();
                }

                // 位置更新
                this.x += this.speedX;
                this.y += this.speedY;

                // 自然な動き
                this.speedX += (Math.random() - 0.5) * 0.3;
                this.speedY += (Math.random() - 0.5) * 0.3;

                // 抵抗
                this.speedX *= 0.98;
                this.speedY *= 0.98;

                // 色の変化
                this.hue += 0.5;

                // 年齢更新
                this.age++;

                // 境界チェック（折り返し）
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }

            draw() {
                const alpha = 1 - (this.age / this.maxAge);

                if (this.trail.length > 2) {
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);

                    // スプライン曲線
                    for (let i = 1; i < this.trail.length - 1; i++) {
                        const xc = (this.trail[i].x + this.trail[i + 1].x) / 2;
                        const yc = (this.trail[i].y + this.trail[i + 1].y) / 2;
                        ctx.quadraticCurveTo(this.trail[i].x, this.trail[i].y, xc, yc);
                    }

                    ctx.lineTo(this.x, this.y);

                    // グラデーション
                    const gradient = ctx.createLinearGradient(
                        this.trail[0].x, this.trail[0].y,
                        this.x, this.y
                    );
                    gradient.addColorStop(0, `hsla(${this.hue - 20}, 80%, 60%, 0)`);
                    gradient.addColorStop(0.5, `hsla(${this.hue}, 80%, 60%, ${alpha * 0.5})`);
                    gradient.addColorStop(1, `hsla(${this.hue + 20}, 80%, 60%, ${alpha})`);

                    ctx.strokeStyle = gradient;
                    ctx.lineWidth = this.size;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.stroke();
                }

                // 粒子本体
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${alpha})`;
                ctx.fill();
            }

            isDead() {
                return this.age >= this.maxAge;
            }
        }

        // パーティクルシステム
        const particles = [];
        const maxParticles = 150;

        // 初期化
        function init() {
            resize();

            // 初期粒子を生成
            for (let i = 0; i < 50; i++) {
                particles.push(new Particle(
                    Math.random() * width,
                    Math.random() * height
                ));
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        // アニメーションループ
        function animate() {
            // 半透明背景でトレイル効果
            ctx.fillStyle = 'rgba(10, 10, 26, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // 新しい粒子を追加
            if (particles.length < maxParticles && Math.random() < 0.3) {
                particles.push(new Particle(
                    Math.random() * width,
                    Math.random() * height
                ));
            }

            // 粒子を更新・描画
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();

                if (particles[i].isDead()) {
                    // 死んだ粒子を新しい位置で再生成
                    particles[i] = new Particle(
                        Math.random() * width,
                        Math.random() * height
                    );
                }
            }

            requestAnimationFrame(animate);
        }

        // イベントリスナー
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            hasMouse = true;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
            hasMouse = true;
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
            hasMouse = true;
        }, { passive: false });

        canvas.addEventListener('mouseleave', () => {
            hasMouse = false;
        });

        canvas.addEventListener('touchend', () => {
            hasMouse = false;
        });

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 開始
        init();
        animate();
    </script>
</body>
</html>
