<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symmetrical Fractal Garden</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        h1 {
            color: #e0e0ff;
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(224, 224, 255, 0.5);
            letter-spacing: 2px;
        }

        canvas {
            background: radial-gradient(ellipse at center, #0d0d1a 0%, #050508 100%);
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.3),
                        inset 0 0 60px rgba(75, 0, 130, 0.2);
            margin: 20px auto;
            display: block;
            max-width: 100%;
        }

        .info {
            color: #a0a0c0;
            font-size: 0.9rem;
            margin-top: 15px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.4rem;
            }

            .info {
                font-size: 0.8rem;
            }

            .btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(102, 126, 234, 0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(118, 75, 162, 0.9);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <h1>🌸 Symmetrical Fractal Garden</h1>
        <canvas id="fractalCanvas"></canvas>
        <div class="info">
            <button class="btn" onclick="generateGarden()">新しい庭園</button>
            <button class="btn" onclick="downloadImage()">ダウンロード</button>
            <p style="margin-top: 15px;">対称的なフラクタルパターンが織りなす庭園</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('fractalCanvas');
        const ctx = canvas.getContext('2d');

        // Set canvas size
        function resizeCanvas() {
            const size = Math.min(window.innerWidth - 40, window.innerHeight - 200, 800);
            canvas.width = size;
            canvas.height = size;
            generateGarden();
        }

        // Color palettes
        const palettes = [
            ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8'],
            ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#00f2fe'],
            ['#f093fb', '#f5576c', '#ffd200', '#00cdac', '#00d4ff'],
            ['#a8edea', '#fed6e3', '#ffecd2', '#fcb69f', '#ee9ca7'],
            ['#667eea', '#764ba2', '#f093fb', '#ffd1ff', '#a8edea'],
            ['#ff9a9e', '#fecfef', '#fecfef', '#a18cd1', '#fbc2eb']
        ];

        let currentPalette = palettes[0];
        let seed = Math.random();

        // Seeded random
        function seededRandom() {
            seed = (seed * 9301 + 49297) % 233280;
            return seed / 233280;
        }

        function randomColor() {
            return currentPalette[Math.floor(seededRandom() * currentPalette.length)];
        }

        // Draw fractal branch
        function drawBranch(x, y, length, angle, depth) {
            if (depth <= 0 || length < 2) return;

            const endX = x + Math.cos(angle) * length;
            const endY = y + Math.sin(angle) * length;

            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = randomColor();
            ctx.lineWidth = depth * 0.8;
            ctx.stroke();

            // Draw flower at branch tip
            if (depth < 4) {
                drawFlower(endX, endY, depth);
            }

            // Recursive branches
            const newLength = length * 0.7;
            const spread = 0.5 + seededRandom() * 0.5;
            const numBranches = 2 + Math.floor(seededRandom() * 2);

            for (let i = 0; i < numBranches; i++) {
                const newAngle = angle + (i - (numBranches - 1) / 2) * spread;
                drawBranch(endX, endY, newLength, newAngle, depth - 1);
            }
        }

        // Draw flower
        function drawFlower(x, y, size) {
            const petalCount = 5 + Math.floor(seededRandom() * 4);
            const petalSize = size * 2;

            ctx.save();
            ctx.translate(x, y);

            for (let i = 0; i < petalCount; i++) {
                ctx.beginPath();
                ctx.rotate((Math.PI * 2) / petalCount);
                ctx.fillStyle = randomColor();
                ctx.globalAlpha = 0.6;
                ctx.ellipse(0, petalSize, petalSize * 0.4, petalSize, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            // Center
            ctx.beginPath();
            ctx.fillStyle = randomColor();
            ctx.globalAlpha = 1;
            ctx.arc(0, 0, petalSize * 0.3, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // Draw symmetrical garden
        function drawSymmetricalGarden() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const symmetry = 4 + Math.floor(seededRandom() * 4); // 4-8 fold symmetry

            for (let i = 0; i < symmetry; i++) {
                const angle = (Math.PI * 2 / symmetry) * i;
                const startX = centerX + Math.cos(angle) * 20;
                const startY = centerY + Math.sin(angle) * 20;

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle);
                ctx.translate(-centerX, -centerY);

                drawBranch(startX, startY, 60, angle, 6);

                ctx.restore();
            }

            // Center piece
            drawFlower(centerX, centerY, 8);
        }

        // Generate garden
        function generateGarden() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Random palette
            currentPalette = palettes[Math.floor(Math.random() * palettes.length)];
            seed = Math.random();

            // Draw background gradient
            const gradient = ctx.createRadialGradient(
                canvas.width / 2, canvas.height / 2, 0,
                canvas.width / 2, canvas.height / 2, canvas.width / 2
            );
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(1, '#0a0a0a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw multiple layers
            for (let layer = 0; layer < 3; layer++) {
                ctx.globalAlpha = 0.7 - layer * 0.2;
                drawSymmetricalGarden();
            }

            ctx.globalAlpha = 1;
        }

        // Download image
        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'symmetrical-fractal-garden.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        // Toggle fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>
