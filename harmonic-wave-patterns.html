<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Harmonic Wave Patterns - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0f;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(15, 15, 25, 0.9);
            padding: 20px;
            border-radius: 15px;
            z-index: 100;
            max-width: 280px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .controls h3 {
            color: #fff;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
        }
        
        .control-group {
            margin-bottom: 15px;
        }
        
        .control-group label {
            display: block;
            color: #aaa;
            font-size: 11px;
            margin-bottom: 5px;
        }
        
        .control-group input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }
        
        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
        }
        
        .palette-btn {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            transition: transform 0.2s;
        }
        
        .palette-btn:hover {
            transform: scale(1.05);
        }
        
        .palette-btn.ocean {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .palette-btn.sunset {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .palette-btn.forest {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        
        .palette-btn.neon {
            background: linear-gradient(135deg, #ff0080 0%, #00ffff 100%);
        }
        
        .palette-btn.monochrome {
            background: linear-gradient(135deg, #434343 0%, #000000 100%);
        }
        
        .toggle-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 101;
            background: rgba(15, 15, 25, 0.9);
            border: none;
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            display: none;
        }
        
        .controls.hidden {
            display: none;
        }
        
        .controls.hidden ~ .toggle-controls {
            display: block;
        }
        
        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 101;
            background: rgba(15, 15, 25, 0.9);
            border: none;
            color: #fff;
            padding: 12px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            backdrop-filter: blur(10px);
        }
        
        @media (max-width: 768px) {
            .controls {
                max-width: 240px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="controls" id="controls">
        <h3>🌊 Harmonic Wave Patterns</h3>
        
        <div class="control-group">
            <label>Wave Count: <span id="waveCountValue">5</span></label>
            <input type="range" id="waveCount" min="2" max="15" value="5">
        </div>
        
        <div class="control-group">
            <label>Amplitude: <span id="amplitudeValue">50</span></label>
            <input type="range" id="amplitude" min="10" max="150" value="50">
        </div>
        
        <div class="control-group">
            <label>Frequency: <span id="frequencyValue">1.0</span></label>
            <input type="range" id="frequency" min="0.1" max="3" step="0.1" value="1">
        </div>
        
        <div class="control-group">
            <label>Phase Speed: <span id="phaseSpeedValue">1.0</span></label>
            <input type="range" id="phaseSpeed" min="0" max="3" step="0.1" value="1">
        </div>
        
        <div class="control-group">
            <label>Color Palette</label>
            <button class="palette-btn ocean" onclick="setPalette('ocean')">Ocean</button>
            <button class="palette-btn sunset" onclick="setPalette('sunset')">Sunset</button>
            <button class="palette-btn forest" onclick="setPalette('forest')">Forest</button>
            <button class="palette-btn neon" onclick="setPalette('neon')">Neon</button>
            <button class="palette-btn monochrome" onclick="setPalette('monochrome')">Monochrome</button>
        </div>
    </div>
    
    <button class="toggle-controls" id="toggleBtn" onclick="toggleControls()">⚙️ Controls</button>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let time = 0;
        
        // Wave parameters
        let waveCount = 5;
        let amplitude = 50;
        let frequency = 1;
        let phaseSpeed = 1;
        
        // Color palettes
        const palettes = {
            ocean: ['#667eea', '#764ba2', '#00d4ff', '#0099ff', '#0055ff'],
            sunset: ['#f093fb', '#f5576c', '#ff9a9e', '#fecfef', '#ffecd2'],
            forest: ['#11998e', '#38ef7d', '#00d2aa', '#00b894', '#00a085'],
            neon: ['#ff0080', '#00ffff', '#ff00ff', '#00ff00', '#ffff00'],
            monochrome: ['#ffffff', '#cccccc', '#999999', '#666666', '#333333']
        };
        
        let currentPalette = 'ocean';
        let colors = palettes.ocean;
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        function setPalette(palette) {
            currentPalette = palette;
            colors = palettes[palette];
        }
        
        function drawWave(i, offset) {
            const color = colors[i % colors.length];
            ctx.beginPath();
            
            for (let x = 0; x < width; x++) {
                const y = height / 2 + 
                    Math.sin((x * frequency * 0.01) + (time * phaseSpeed) + offset) * amplitude +
                    Math.sin((x * frequency * 0.02) + (time * phaseSpeed * 0.5) + offset) * (amplitude * 0.5);
                
                if (x === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        
        function drawInterferencePattern() {
            ctx.globalAlpha = 0.3;
            
            for (let i = 0; i < waveCount; i++) {
                const offset = (i / waveCount) * Math.PI * 2;
                drawWave(i, offset);
            }
            
            ctx.globalAlpha = 1;
        }
        
        function draw() {
            // Clear with fade effect
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            drawInterferencePattern();
            
            time += 0.05;
            requestAnimationFrame(draw);
        }
        
        // Event listeners
        document.getElementById('waveCount').addEventListener('input', (e) => {
            waveCount = parseInt(e.target.value);
            document.getElementById('waveCountValue').textContent = waveCount;
        });
        
        document.getElementById('amplitude').addEventListener('input', (e) => {
            amplitude = parseInt(e.target.value);
            document.getElementById('amplitudeValue').textContent = amplitude;
        });
        
        document.getElementById('frequency').addEventListener('input', (e) => {
            frequency = parseFloat(e.target.value);
            document.getElementById('frequencyValue').textContent = frequency.toFixed(1);
        });
        
        document.getElementById('phaseSpeed').addEventListener('input', (e) => {
            phaseSpeed = parseFloat(e.target.value);
            document.getElementById('phaseSpeedValue').textContent = phaseSpeed.toFixed(1);
        });
        
        function toggleControls() {
            const controls = document.getElementById('controls');
            controls.classList.toggle('hidden');
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        window.addEventListener('resize', resize);
        resize();
        draw();
    </script>
</body>
</html>
