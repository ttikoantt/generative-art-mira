<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Shader Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 16px 24px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .controls button {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
            color: #000;
        }

        .controls button:hover {
            transform: scale(1.05);
            background: #fff;
            box-shadow: 0 8px 32px rgba(255, 255, 255, 0.3);
        }

        .controls button:active {
            transform: scale(0.95);
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            padding: 12px 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .fullscreen-btn svg {
            width: 24px;
            height: 24px;
            fill: white;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info" id="info">Pattern: Loading...</div>

    <button class="fullscreen-btn" id="fullscreenBtn" title="全画面">
        <svg viewBox="0 0 24 24">
            <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
        </svg>
    </button>

    <div class="controls">
        <button id="changePattern">パターン変更</button>
        <button id="toggleAnimation">アニメーション</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const info = document.getElementById('info');

        let width, height;
        let animationEnabled = true;
        let currentPattern = 0;
        let time = 0;

        // パターン定義
        const patterns = [
            {
                name: 'Mandelbrot風',
                fn: (x, y, t) => {
                    const cx = (x - width / 2) / (width / 4);
                    const cy = (y - height / 2) / (height / 4);
                    let zx = 0, zy = 0;
                    let i = 0;
                    const max = 50;
                    while (zx * zx + zy * zy < 4 && i < max) {
                        const temp = zx * zx - zy * zy + cx + Math.sin(t * 0.001) * 0.1;
                        zy = 2 * zx * zy + cy + Math.cos(t * 0.001) * 0.1;
                        zx = temp;
                        i++;
                    }
                    return i / max;
                }
            },
            {
                name: 'Julia Set',
                fn: (x, y, t) => {
                    const cx = Math.sin(t * 0.0005) * 0.7885;
                    const cy = Math.cos(t * 0.0007) * 0.7885;
                    let zx = (x - width / 2) / (width / 4);
                    let zy = (y - height / 2) / (height / 4);
                    let i = 0;
                    const max = 50;
                    while (zx * zx + zy * zy < 4 && i < max) {
                        const temp = zx * zx - zy * zy + cx;
                        zy = 2 * zx * zy + cy;
                        zx = temp;
                        i++;
                    }
                    return i / max;
                }
            },
            {
                name: 'バーンズリーのシダ',
                fn: (x, y, t) => {
                    const nx = (x / width) * 2 - 1;
                    const ny = (y / height) * 2 - 1;
                    const r = Math.sqrt(nx * nx + ny * ny);
                    const theta = Math.atan2(ny, nx) + t * 0.0002;
                    const value = Math.sin(r * 10 + theta * 3) * 0.5 + 0.5;
                    return value;
                }
            },
            {
                name: 'ニュートン風フラクタル',
                fn: (x, y, t) => {
                    const nx = (x - width / 2) / (width / 4);
                    const ny = (y - height / 2) / (height / 4);
                    let zx = nx, zy = ny;
                    let i = 0;
                    const max = 20;
                    const shift = Math.sin(t * 0.001) * 0.5;
                    while (zx * zx + zy * zy < 100 && i < max) {
                        const z3x = zx * zx * zx - 3 * zx * zy * zy;
                        const z3y = 3 * zx * zx * zy - zy * zy * zy;
                        const denom = 3 * (zx * zx + zy * zy) + 0.1;
                        zx = (zx - z3x / denom + shift) * 0.5;
                        zy = (zy - z3y / denom) * 0.5;
                        i++;
                    }
                    return i / max;
                }
            },
            {
                name: '波動干渉',
                fn: (x, y, t) => {
                    const cx = width / 2 + Math.sin(t * 0.0003) * 100;
                    const cy = height / 2 + Math.cos(t * 0.0004) * 100;
                    const d1 = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2);
                    const d2 = Math.sqrt((x - (width - cx)) ** 2 + (y - (height - cy)) ** 2);
                    const wave1 = Math.sin(d1 * 0.05 - t * 0.01);
                    const wave2 = Math.sin(d2 * 0.05 - t * 0.012);
                    return (wave1 + wave2 + 2) / 4;
                }
            },
            {
                name: 'ヘックス・フラクタル',
                fn: (x, y, t) => {
                    const nx = (x - width / 2) / 100;
                    const ny = (y - height / 2) / 100;
                    const value = Math.sin(nx * 2 + t * 0.001) *
                                  Math.cos(ny * 2 + t * 0.0012) *
                                  Math.sin((nx + ny) + t * 0.0008);
                    return (value + 1) / 2;
                }
            }
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function getColor(value, pattern) {
            // 各パターン固有のカラーパレット
            const palettes = [
                // Mandelbrot風
                (v) => {
                    const hue = v * 360;
                    const sat = 100 - v * 50;
                    const light = v * 70;
                    return `hsl(${hue}, ${sat}%, ${light}%)`;
                },
                // Julia Set
                (v) => {
                    const hue = 200 + v * 160;
                    const sat = 80 + v * 20;
                    const light = v * 60 + 10;
                    return `hsl(${hue}, ${sat}%, ${light}%)`;
                },
                // バーンズリーのシダ
                (v) => {
                    const hue = 80 + v * 80;
                    const sat = 100;
                    const light = v * 50 + 20;
                    return `hsl(${hue}, ${sat}%, ${light}%)`;
                },
                // ニュートン風フラクタル
                (v) => {
                    const hue = 280 + v * 80;
                    const sat = 90;
                    const light = v * 55 + 15;
                    return `hsl(${hue}, ${sat}%, ${light}%)`;
                },
                // 波動干渉
                (v) => {
                    const hue = 180 + v * 60;
                    const sat = 100;
                    const light = v * 50 + 20;
                    return `hsl(${hue}, ${sat}%, ${light}%)`;
                },
                // ヘックス・フラクタル
                (v) => {
                    const hue = 30 + v * 90;
                    const sat = 95;
                    const light = v * 55 + 15;
                    return `hsl(${hue}, ${sat}%, ${light}%)`;
                }
            ];
            return palettes[currentPattern](value);
        }

        function render() {
            const pattern = patterns[currentPattern];
            info.textContent = `Pattern: ${pattern.name}`;

            // 解像度を下げてパフォーマンス向上
            const scale = 4;
            const sw = Math.ceil(width / scale);
            const sh = Math.ceil(height / scale);

            const imageData = ctx.createImageData(width, height);
            const data = imageData.data;

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const sx = Math.floor(x / scale);
                    const sy = Math.floor(y / scale);

                    let value;
                    if (sx < sw && sy < sh) {
                        value = pattern.fn(sx, sy, time);
                    } else {
                        value = pattern.fn(x, y, time);
                    }

                    // カラーを取得
                    const colorStr = getColor(value, currentPattern);

                    // HSLをRGBに変換（簡易版）
                    const tempDiv = document.createElement('div');
                    tempDiv.style.color = colorStr;
                    document.body.appendChild(tempDiv);
                    const rgb = getComputedStyle(tempDiv).color.match(/\d+/g);
                    document.body.removeChild(tempDiv);

                    const idx = (y * width + x) * 4;
                    data[idx] = parseInt(rgb[0]);     // R
                    data[idx + 1] = parseInt(rgb[1]); // G
                    data[idx + 2] = parseInt(rgb[2]); // B
                    data[idx + 3] = 255;             // A
                }
            }

            ctx.putImageData(imageData, 0, 0);
        }

        function animate() {
            if (animationEnabled) {
                time += 16;
                render();
            }
            requestAnimationFrame(animate);
        }

        // イベントリスナー
        document.getElementById('changePattern').addEventListener('click', () => {
            currentPattern = (currentPattern + 1) % patterns.length;
            if (!animationEnabled) render();
        });

        document.getElementById('toggleAnimation').addEventListener('click', () => {
            animationEnabled = !animationEnabled;
            if (animationEnabled) render();
        });

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        window.addEventListener('resize', () => {
            resize();
            if (!animationEnabled) render();
        });

        // タッチ操作
        let touchStartX = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });

        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const diff = touchEndX - touchStartX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) {
                    currentPattern = (currentPattern - 1 + patterns.length) % patterns.length;
                } else {
                    currentPattern = (currentPattern + 1) % patterns.length;
                }
                if (!animationEnabled) render();
            }
        });

        // 初期化
        resize();
        animate();
    </script>
</body>
</html>
