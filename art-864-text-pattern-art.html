<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Pattern Art | Generative Art by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0f;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .overlay {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(10, 10, 15, 0.9);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .overlay h1 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #00ffaa;
        }

        .overlay p {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 5px;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 10px 20px;
            background: rgba(0, 255, 170, 0.1);
            border: 1px solid rgba(0, 255, 170, 0.3);
            color: #00ffaa;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: rgba(0, 255, 170, 0.2);
            transform: scale(1.05);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="overlay">
        <h1>Text Pattern Art</h1>
        <p>Click to change pattern</p>
        <p>Move mouse for effects</p>
    </div>

    <div class="controls">
        <button class="btn" onclick="changePattern()">Change Pattern</button>
        <button class="btn" onclick="changeColor()">Change Color</button>
        <button class="btn" onclick="toggleAnimation()">Toggle Animation</button>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let mouseX = 0, mouseY = 0;
        let animationEnabled = true;
        let currentPattern = 0;
        let colorScheme = 0;
        let time = 0;

        const patterns = [
            'spiral',
            'grid',
            'wave',
            'circular',
            'maze',
            'fractal'
        ];

        const colorSchemes = [
            ['#00ffaa', '#00ff88', '#00ff66', '#00ff44'],
            ['#ff6b6b', '#ee5a5a', '#dd4949', '#cc3838'],
            ['#4ecdc4', '#3dbdb5', '#2cadac', '#1b9da3'],
            ['#ffe66d', '#ffd93d', '#ffc80d', '#ffb800'],
            ['#c44dff', '#b34cee', '#a43bdd', '#952acc']
        ];

        const textChars = '●◆■▲△○◇□▽▼★☆♦♠♣♥⬛⬜◾◽▪▫';

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function getColors() {
            return colorSchemes[colorScheme];
        }

        function drawSpiral() {
            const colors = getColors();
            const centerX = width / 2;
            const centerY = height / 2;
            const chars = textChars.split('');
            
            for (let i = 0; i < 300; i++) {
                const angle = (i * 0.1) + (time * 0.01);
                const radius = i * 1.2;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;

                const charIndex = (i + Math.floor(time * 0.1)) % chars.length;
                const colorIndex = i % colors.length;
                const size = 8 + (i / 50);

                ctx.fillStyle = colors[colorIndex];
                ctx.font = `${size}px monospace`;
                ctx.globalAlpha = 0.8;
                ctx.fillText(chars[charIndex], x, y);
            }
        }

        function drawGrid() {
            const colors = getColors();
            const chars = textChars.split('');
            const gridSize = 40;
            const cols = Math.ceil(width / gridSize);
            const rows = Math.ceil(height / gridSize);

            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const x = i * gridSize + 20;
                    const y = j * gridSize + 20;

                    const dist = Math.sqrt(
                        Math.pow(x - mouseX, 2) + 
                        Math.pow(y - mouseY, 2)
                    );

                    const maxDist = 300;
                    let size = 12;
                    if (dist < maxDist) {
                        size = 12 + (1 - dist / maxDist) * 20;
                    }

                    const charIndex = (i + j + Math.floor(time * 0.05)) % chars.length;
                    const colorIndex = (i + j) % colors.length;

                    ctx.fillStyle = colors[colorIndex];
                    ctx.font = `${size}px monospace`;
                    ctx.globalAlpha = 0.7;
                    ctx.fillText(chars[charIndex], x, y);
                }
            }
        }

        function drawWave() {
            const colors = getColors();
            const chars = textChars.split('');
            const rows = 20;

            for (let row = 0; row < rows; row++) {
                const y = (height / rows) * row + 30;
                
                for (let x = 0; x < width; x += 30) {
                    const wave = Math.sin((x * 0.01) + (time * 0.02) + (row * 0.3)) * 30;
                    const actualY = y + wave;

                    const charIndex = (Math.floor(x / 30) + row + Math.floor(time * 0.1)) % chars.length;
                    const colorIndex = row % colors.length;

                    ctx.fillStyle = colors[colorIndex];
                    ctx.font = '14px monospace';
                    ctx.globalAlpha = 0.8;
                    ctx.fillText(chars[charIndex], x, actualY);
                }
            }
        }

        function drawCircular() {
            const colors = getColors();
            const chars = textChars.split('');
            const centerX = width / 2;
            const centerY = height / 2;
            const rings = 8;

            for (let ring = 1; ring <= rings; ring++) {
                const radius = ring * 50;
                const charsInRing = ring * 12;

                for (let i = 0; i < charsInRing; i++) {
                    const angle = (i / charsInRing) * Math.PI * 2 + (time * 0.005 * ring);
                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;

                    const charIndex = (i + ring + Math.floor(time * 0.1)) % chars.length;
                    const colorIndex = ring % colors.length;

                    ctx.fillStyle = colors[colorIndex];
                    ctx.font = `${10 + ring}px monospace`;
                    ctx.globalAlpha = 0.7;
                    ctx.fillText(chars[charIndex], x, y);
                }
            }
        }

        function drawMaze() {
            const colors = getColors();
            const chars = '│─┌┐└┘├┤┬┴┼'.split('');
            const cellSize = 20;
            const cols = Math.floor(width / cellSize);
            const rows = Math.floor(height / cellSize);

            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    if (Math.random() > 0.7) continue;

                    const x = i * cellSize;
                    const y = j * cellSize;

                    const charIndex = Math.floor(Math.random() * chars.length);
                    const colorIndex = (i + j) % colors.length;

                    ctx.fillStyle = colors[colorIndex];
                    ctx.font = '16px monospace';
                    ctx.globalAlpha = 0.5;
                    ctx.fillText(chars[charIndex], x, y);
                }
            }
        }

        function drawFractal() {
            const colors = getColors();
            const chars = '▲◆■●'.split('');

            function drawBranch(x, y, length, angle, depth) {
                if (depth === 0 || length < 2) return;

                const endX = x + Math.cos(angle) * length;
                const endY = y + Math.sin(angle) * length;

                const charIndex = depth % chars.length;
                const colorIndex = depth % colors.length;

                ctx.fillStyle = colors[colorIndex];
                ctx.font = `${Math.max(8, length * 0.8)}px monospace`;
                ctx.globalAlpha = 0.8;
                ctx.fillText(chars[charIndex], endX, endY);

                const angleOffset = 0.5 + Math.sin(time * 0.01) * 0.3;
                const newLength = length * 0.7;

                drawBranch(endX, endY, newLength, angle - angleOffset, depth - 1);
                drawBranch(endX, endY, newLength, angle + angleOffset, depth - 1);
            }

            drawBranch(width / 2, height, height * 0.25, -Math.PI / 2, 8);
        }

        function draw() {
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            switch (patterns[currentPattern]) {
                case 'spiral':
                    drawSpiral();
                    break;
                case 'grid':
                    drawGrid();
                    break;
                case 'wave':
                    drawWave();
                    break;
                case 'circular':
                    drawCircular();
                    break;
                case 'maze':
                    drawMaze();
                    break;
                case 'fractal':
                    ctx.fillStyle = 'rgba(10, 10, 15, 0.3)';
                    ctx.fillRect(0, 0, width, height);
                    drawFractal();
                    break;
            }

            time++;
        }

        function animate() {
            if (animationEnabled) {
                draw();
            }
            requestAnimationFrame(animate);
        }

        function changePattern() {
            currentPattern = (currentPattern + 1) % patterns.length;
        }

        function changeColor() {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
        }

        function toggleAnimation() {
            animationEnabled = !animationEnabled;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        canvas.addEventListener('click', changePattern);

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        window.addEventListener('resize', resize);

        window.addEventListener('touchstart', (e) => {
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        resize();
        mouseX = width / 2;
        mouseY = height / 2;
        animate();
    </script>
</body>
</html>
