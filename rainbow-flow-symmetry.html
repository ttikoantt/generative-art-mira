<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rainbow Flow Symmetry - Interactive Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 100, 150, 0.5);
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        canvas {
            background: #0a0a0f;
            border: 2px solid #333;
            border-radius: 10px;
            cursor: crosshair;
            display: block;
            margin: 0 auto;
            max-width: 95vw;
            max-height: 70vh;
            box-shadow: 0 0 30px rgba(255, 100, 150, 0.2);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            color: #666;
            font-size: 0.8rem;
            margin-top: 15px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }
            
            button {
                padding: 10px 20px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌈 Rainbow Flow Symmetry</h1>
        <p class="subtitle">対称的な虹色のフローアート</p>
        
        <canvas id="canvas"></canvas>
        
        <div class="controls">
            <button onclick="clearCanvas()">クリア</button>
            <button onclick="toggleSymmetry()">対称数: <span id="symCount">6</span></button>
            <button onclick="saveImage()">保存</button>
            <button onclick="toggleAutoPlay()">自動描画: <span id="autoStatus">OFF</span></button>
        </div>
        
        <p class="info">マウスを動かして描画 / タッチで描画</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Canvasサイズ設定
        function resizeCanvas() {
            const maxWidth = Math.min(800, window.innerWidth - 40);
            const maxHeight = Math.min(600, window.innerHeight - 200);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        let symmetries = 6;
        let hue = 0;
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let autoPlay = false;
        let autoPlayAngle = 0;
        
        // 対称的な描画
        function drawSymmetric(x, y, lastX, lastY) {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            for (let i = 0; i < symmetries; i++) {
                const angle = (2 * Math.PI * i) / symmetries;
                
                // 前の点を回転
                const lastRelX = lastX - centerX;
                const lastRelY = lastY - centerY;
                const rotatedLastX = lastRelX * Math.cos(angle) - lastRelY * Math.sin(angle) + centerX;
                const rotatedLastY = lastRelX * Math.sin(angle) + lastRelY * Math.cos(angle) + centerY;
                
                // 現在の点を回転
                const relX = x - centerX;
                const relY = y - centerY;
                const rotatedX = relX * Math.cos(angle) - relY * Math.sin(angle) + centerX;
                const rotatedY = relX * Math.sin(angle) + relY * Math.cos(angle) + centerY;
                
                // 線を描画
                ctx.beginPath();
                ctx.moveTo(rotatedLastX, rotatedLastY);
                ctx.lineTo(rotatedX, rotatedY);
                ctx.strokeStyle = `hsl(${hue}, 100%, 50%)`;
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.shadowBlur = 10;
                ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
                ctx.stroke();
            }
        }
        
        // マウスイベント
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            lastX = e.clientX - rect.left;
            lastY = e.clientY - rect.top;
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            drawSymmetric(x, y, lastX, lastY);
            
            lastX = x;
            lastY = y;
            hue = (hue + 0.5) % 360;
        });
        
        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mouseout', () => isDrawing = false);
        
        // タッチイベント
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            lastX = touch.clientX - rect.left;
            lastY = touch.clientY - rect.top;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isDrawing) return;
            
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            
            drawSymmetric(x, y, lastX, lastY);
            
            lastX = x;
            lastY = y;
            hue = (hue + 0.5) % 360;
        });
        
        canvas.addEventListener('touchend', () => isDrawing = false);
        
        // 自動描画
        function autoPlayDraw() {
            if (!autoPlay) return;
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = Math.min(canvas.width, canvas.height) * 0.3;
            
            autoPlayAngle += 0.02;
            const x = centerX + Math.cos(autoPlayAngle) * radius * Math.sin(autoPlayAngle * 3);
            const y = centerY + Math.sin(autoPlayAngle) * radius * Math.cos(autoPlayAngle * 2);
            
            drawSymmetric(x, y, lastX, lastY);
            
            lastX = x;
            lastY = y;
            hue = (hue + 0.3) % 360;
            
            requestAnimationFrame(autoPlayDraw);
        }
        
        // コントロール関数
        function clearCanvas() {
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            hue = 0;
        }
        
        function toggleSymmetry() {
            symmetries = symmetries === 6 ? 8 : symmetries === 8 ? 12 : symmetries === 12 ? 4 : 6;
            document.getElementById('symCount').textContent = symmetries;
        }
        
        function toggleAutoPlay() {
            autoPlay = !autoPlay;
            document.getElementById('autoStatus').textContent = autoPlay ? 'ON' : 'OFF';
            
            if (autoPlay) {
                lastX = canvas.width / 2;
                lastY = canvas.height / 2;
                autoPlayDraw();
            }
        }
        
        function saveImage() {
            const link = document.createElement('a');
            link.download = `rainbow-symmetry-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }
        
        // 初期化
        clearCanvas();
    </script>
</body>
</html>
