<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Fractal Tree - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e1a;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        canvas {
            display: block;
        }
        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            background: rgba(10, 14, 26, 0.8);
            padding: 15px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 200, 255, 0.2);
        }
        .info h1 {
            font-size: 1.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #64c8ff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .info p {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.8);
            margin: 5px 0;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(10, 14, 26, 0.8);
            padding: 10px 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 200, 255, 0.2);
        }
        .controls button {
            background: linear-gradient(135deg, #64c8ff, #a855f7);
            color: #0a0e1a;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .controls button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(100, 200, 255, 0.4);
        }
        @media (max-width: 768px) {
            .info {
                top: 10px;
                left: 10px;
                padding: 10px 15px;
            }
            .info h1 {
                font-size: 1.2em;
            }
            .controls {
                bottom: 10px;
                padding: 8px 10px;
            }
            .controls button {
                padding: 8px 15px;
                font-size: 0.8em;
            }
        }
    </style>
</head>
<body>
    <div class="info">
        <h1>🌳 Particle Fractal Tree</h1>
        <p>Particles form a fractal tree structure</p>
        <p>Click anywhere to spawn new tree</p>
    </div>
    <div class="controls">
        <button onclick="reset()">🔄 New Tree</button>
        <button onclick="toggleWind()">💨 Toggle Wind</button>
    </div>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        let tree = [];
        let windEnabled = false;
        let windTime = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            reset();
        }

        class Particle {
            constructor(x, y, color, size) {
                this.x = x;
                this.y = y;
                this.originX = x;
                this.originY = y;
                this.color = color;
                this.size = size;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 0.5 + 0.2;
                this.amplitude = Math.random() * 3 + 1;
                this.phase = Math.random() * Math.PI * 2;
                this.opacity = Math.random() * 0.5 + 0.5;
            }

            update(time) {
                // Gentle floating motion
                const wind = windEnabled ? Math.sin(time * 0.001 + this.phase) * 2 : 0;
                this.angle += 0.01;
                this.x = this.originX + Math.sin(this.angle) * this.amplitude + wind;
                this.y = this.originY + Math.cos(this.angle * 1.3) * this.amplitude;
                this.opacity = 0.5 + Math.sin(time * 0.002 + this.phase) * 0.3;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color.replace('OPACITY', this.opacity);
                ctx.fill();
            }
        }

        function generateBranch(x, y, length, angle, depth, maxDepth) {
            if (depth > maxDepth) return;

            const endX = x + Math.cos(angle) * length;
            const endY = y + Math.sin(angle) * length;

            // Color gradient from trunk (brown) to leaves (green/cyan)
            const hue = 30 + (depth / maxDepth) * 150; // Brown to cyan
            const saturation = 60 + (depth / maxDepth) * 40;
            const lightness = 40 + (depth / maxDepth) * 30;

            // Add particles along the branch
            const particleCount = Math.floor(length / 3);
            for (let i = 0; i < particleCount; i++) {
                const t = i / particleCount;
                const px = x + (endX - x) * t;
                const py = y + (endY - y) * t;
                const size = depth === maxDepth ? 2.5 : 1.5 - (depth / maxDepth);
                const color = `hsla(${hue}, ${saturation}%, ${lightness}%, OPACITY)`;
                particles.push(new Particle(px, py, color, size));
            }

            // Recursively create branches
            if (depth < maxDepth) {
                const branchCount = depth < 3 ? 2 : 3;
                const angleSpread = depth < 3 ? Math.PI / 4 : Math.PI / 3;

                for (let i = 0; i < branchCount; i++) {
                    const newAngle = angle + (i - (branchCount - 1) / 2) * angleSpread;
                    const newLength = length * 0.7;
                    generateBranch(endX, endY, newLength, newAngle, depth + 1, maxDepth);
                }
            }
        }

        function reset() {
            particles = [];
            tree = [];
            const startX = width / 2;
            const startY = height * 0.9;
            const trunkLength = Math.min(width, height) * 0.15;
            generateBranch(startX, startY, trunkLength, -Math.PI / 2, 0, 8);
        }

        function toggleWind() {
            windEnabled = !windEnabled;
        }

        function animate(time) {
            // Clear with trail effect
            ctx.fillStyle = 'rgba(10, 14, 26, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // Update and draw particles
            particles.forEach(p => {
                p.update(time);
                p.draw();
            });

            // Draw connections between nearby particles (branch structure)
            ctx.strokeStyle = 'rgba(100, 200, 255, 0.03)';
            ctx.lineWidth = 1;
            for (let i = 0; i < particles.length; i += 5) {
                for (let j = i + 1; j < particles.length && j < i + 20; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 30) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        canvas.addEventListener('click', (e) => {
            particles = [];
            tree = [];
            const startX = e.clientX;
            const startY = e.clientY;
            const trunkLength = Math.min(width, height) * 0.1;
            generateBranch(startX, startY, trunkLength, -Math.PI / 2, 0, 7);
        });

        window.addEventListener('resize', resize);
        resize();
        animate(0);
    </script>
</body>
</html>
