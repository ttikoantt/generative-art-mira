<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nocturnal Math Waltz - Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a12;
            overflow: hidden;
            font-family: 'Georgia', serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(180, 160, 255, 0.6);
            font-size: 14px;
            text-shadow: 0 0 10px rgba(120, 100, 255, 0.5);
            pointer-events: none;
            z-index: 10;
        }

        .title {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(200, 180, 255, 0.8);
            font-size: 24px;
            letter-spacing: 8px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(140, 120, 255, 0.6);
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="title">Nocturnal Math Waltz</div>
    <div class="info">Generative Art by Mira | Move mouse to interact</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let mouseX = width / 2;
        let mouseY = height / 2;
        let time = 0;

        // Mathematical dancers
        class MathDancer {
            constructor(index, total) {
                this.index = index;
                this.total = total;
                this.reset();
            }

            reset() {
                this.angle = (this.index / this.total) * Math.PI * 2;
                this.radius = 100 + Math.random() * 200;
                this.speed = 0.002 + Math.random() * 0.003;
                this.amplitude = 20 + Math.random() * 40;
                this.frequency = 1 + Math.random() * 3;
                this.phase = Math.random() * Math.PI * 2;
                this.hue = 220 + Math.random() * 60;
                this.size = 2 + Math.random() * 3;
                this.trail = [];
                this.maxTrail = 50;
            }

            update(mouseInfluence) {
                this.angle += this.speed;

                // Complex mathematical movement
                const wobble1 = Math.sin(time * this.frequency + this.phase) * this.amplitude;
                const wobble2 = Math.cos(time * this.frequency * 1.3 + this.phase * 2) * this.amplitude * 0.7;
                const wobble3 = Math.sin(time * this.frequency * 0.7 + this.phase * 1.5) * this.amplitude * 0.5;

                const currentRadius = this.radius + wobble1 + wobble2 + wobble3;

                // Mouse influence
                const dx = mouseX - width / 2;
                const dy = mouseY - height / 2;
                const mouseDist = Math.sqrt(dx * dx + dy * dy);
                const influence = Math.max(0, 1 - mouseDist / 500) * mouseInfluence * 50;

                this.x = width / 2 + Math.cos(this.angle) * (currentRadius + influence);
                this.y = height / 2 + Math.sin(this.angle) * (currentRadius + influence) * 0.6;

                // Store trail
                this.trail.push({ x: this.x, y: this.y, alpha: 1 });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }

                // Fade trail
                this.trail.forEach((point, i) => {
                    point.alpha = i / this.trail.length;
                });
            }

            draw() {
                // Draw trail
                if (this.trail.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);

                    for (let i = 1; i < this.trail.length; i++) {
                        const point = this.trail[i];
                        ctx.lineTo(point.x, point.y);
                    }

                    ctx.strokeStyle = `hsla(${this.hue}, 70%, 60%, 0.3)`;
                    ctx.lineWidth = this.size;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                }

                // Draw particle
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 3
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 70%, 1)`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 70%, 50%, 0.5)`);
                gradient.addColorStop(1, `hsla(${this.hue}, 60%, 30%, 0)`);

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        // Floating mathematical symbols
        class MathSymbol {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = 10 + Math.random() * 20;
                this.speedY = -0.5 - Math.random() * 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                this.opacity = 0;
                this.fadeIn = true;
                this.maxOpacity = 0.1 + Math.random() * 0.2;
                this.symbols = ['∫', '∑', 'π', '∞', '∂', '√', 'Δ', 'Ω', 'θ', 'λ'];
                this.symbol = this.symbols[Math.floor(Math.random() * this.symbols.length)];
            }

            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                this.rotation += this.rotationSpeed;

                if (this.fadeIn) {
                    this.opacity += 0.005;
                    if (this.opacity >= this.maxOpacity) {
                        this.fadeIn = false;
                    }
                }

                if (this.y < -50 || this.x < -50 || this.x > width + 50) {
                    this.reset();
                    this.y = height + 50;
                    this.fadeIn = true;
                    this.opacity = 0;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.font = `${this.size}px Georgia`;
                ctx.fillStyle = `rgba(180, 160, 255, ${this.opacity})`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.symbol, 0, 0);
                ctx.restore();
            }
        }

        // Lissajous curve dancer
        class LissajousDancer {
            constructor() {
                this.a = 3 + Math.random() * 2;
                this.b = 2 + Math.random() * 2;
                this.delta = Math.random() * Math.PI;
                this.scale = 100 + Math.random() * 150;
                this.hue = 180 + Math.random() * 80;
                this.trail = [];
                this.maxTrail = 100;
            }

            update() {
                const t = time * 0.5;
                const x = width / 2 + this.scale * Math.sin(this.a * t + this.delta);
                const y = height / 2 + this.scale * Math.sin(this.b * t);

                this.trail.push({ x, y, alpha: 1 });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }

                this.trail.forEach((point, i) => {
                    point.alpha = i / this.trail.length;
                });
            }

            draw() {
                if (this.trail.length < 2) return;

                ctx.beginPath();
                ctx.moveTo(this.trail[0].x, this.trail[0].y);

                for (let i = 1; i < this.trail.length; i++) {
                    ctx.lineTo(this.trail[i].x, this.trail[i].y);
                }

                ctx.strokeStyle = `hsla(${this.hue}, 60%, 50%, 0.2)`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        // Initialize dancers
        const dancerCount = 30;
        const dancers = [];
        for (let i = 0; i < dancerCount; i++) {
            dancers.push(new MathDancer(i, dancerCount));
        }

        // Initialize math symbols
        const symbolCount = 20;
        const symbols = [];
        for (let i = 0; i < symbolCount; i++) {
            symbols.push(new MathSymbol());
        }

        // Initialize Lissajous dancers
        const lissajousCount = 5;
        const lissajous = [];
        for (let i = 0; i < lissajousCount; i++) {
            lissajous.push(new LissajousDancer());
        }

        // Mouse tracking
        let mouseInfluence = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            mouseInfluence = Math.min(1, mouseInfluence + 0.05);
        });

        document.addEventListener('mouseleave', () => {
            mouseInfluence = Math.max(0, mouseInfluence - 0.02);
        });

        // Resize handler
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // Animation loop
        function animate() {
            // Fade effect for trails
            ctx.fillStyle = 'rgba(10, 10, 18, 0.05)';
            ctx.fillRect(0, 0, width, height);

            time += 0.016;

            // Decay mouse influence
            mouseInfluence = Math.max(0, mouseInfluence - 0.01);

            // Update and draw Lissajous dancers (background layer)
            lissajous.forEach(l => {
                l.update();
                l.draw();
            });

            // Update and draw math symbols
            symbols.forEach(s => {
                s.update();
                s.draw();
            });

            // Update and draw main dancers
            dancers.forEach(dancer => {
                dancer.update(mouseInfluence);
                dancer.draw();
            });

            // Draw center glow
            const centerGlow = ctx.createRadialGradient(
                width / 2, height / 2, 0,
                width / 2, height / 2, 300
            );
            centerGlow.addColorStop(0, 'rgba(120, 100, 255, 0.03)');
            centerGlow.addColorStop(0.5, 'rgba(80, 60, 200, 0.01)');
            centerGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');

            ctx.fillStyle = centerGlow;
            ctx.fillRect(0, 0, width, height);

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
