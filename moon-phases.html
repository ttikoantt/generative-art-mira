<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon Phases Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a3a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            position: relative;
        }

        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .container {
            text-align: center;
            z-index: 1;
        }

        h1 {
            color: #ffffff;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .moon-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 2rem auto;
        }

        .moon {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #f5f5f5 0%, #d4d4d4 50%, #a0a0a0 100%);
            box-shadow: 
                0 0 60px rgba(255, 255, 200, 0.3),
                0 0 100px rgba(255, 255, 200, 0.2),
                inset -30px -30px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .moon::before {
            content: '';
            position: absolute;
            top: 50px;
            left: 60px;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 50%;
        }

        .moon::after {
            content: '';
            position: absolute;
            top: 150px;
            left: 180px;
            width: 60px;
            height: 60px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 50%;
        }

        .shadow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #0a0a1a;
            transition: transform 0.1s ease;
        }

        .phase-info {
            color: #ffffff;
            font-size: 1.5rem;
            margin: 1rem 0;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .phase-name {
            color: #ffd700;
            font-size: 1.2rem;
            margin: 0.5rem 0;
        }

        .controls {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .moon-container {
                width: 200px;
                height: 200px;
            }

            .moon {
                width: 200px;
                height: 200px;
            }

            .phase-info {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🌙 Moon Phases Animation</h1>

        <div class="moon-container">
            <div class="moon">
                <div class="shadow" id="shadow"></div>
            </div>
        </div>

        <div class="phase-info">
            Phase: <span id="phaseValue">0</span>°
        </div>
        <div class="phase-name" id="phaseName">New Moon</div>

        <div class="controls">
            <button onclick="startAnimation()">▶ Play</button>
            <button onclick="pauseAnimation()">⏸ Pause</button>
            <button onclick="resetAnimation()">↺ Reset</button>
            <button onclick="setRandomPhase()">🎲 Random</button>
        </div>
    </div>

    <script>
        // Stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = Math.random() * 3 + 1 + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = Math.random() * 2 + 's';
            starsContainer.appendChild(star);
        }

        // Moon Phases
        let phase = 0;
        let animationId = null;
        let isAnimating = false;

        const shadow = document.getElementById('shadow');
        const phaseValue = document.getElementById('phaseValue');
        const phaseName = document.getElementById('phaseName');

        const phases = [
            { name: 'New Moon', range: [0, 10] },
            { name: 'Waxing Crescent', range: [10, 80] },
            { name: 'First Quarter', range: [80, 100] },
            { name: 'Waxing Gibbous', range: [100, 170] },
            { name: 'Full Moon', range: [170, 190] },
            { name: 'Waning Gibbous', range: [190, 260] },
            { name: 'Last Quarter', range: [260, 280] },
            { name: 'Waning Crescent', range: [280, 350] },
            { name: 'New Moon', range: [350, 360] }
        ];

        function getPhaseName(angle) {
            for (const phase of phases) {
                if (angle >= phase.range[0] && angle < phase.range[1]) {
                    return phase.name;
                }
            }
            return 'New Moon';
        }

        function updateShadow() {
            const angle = phase * Math.PI / 180;
            const x = Math.cos(angle) * 100;
            
            shadow.style.transform = `translateX(${x}px)`;

            phaseValue.textContent = Math.round(phase);
            phaseName.textContent = getPhaseName(phase);
        }

        function animate() {
            phase = (phase + 0.5) % 360;
            updateShadow();
            animationId = requestAnimationFrame(animate);
        }

        function startAnimation() {
            if (!isAnimating) {
                isAnimating = true;
                animate();
            }
        }

        function pauseAnimation() {
            isAnimating = false;
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
        }

        function resetAnimation() {
            pauseAnimation();
            phase = 0;
            updateShadow();
        }

        function setRandomPhase() {
            pauseAnimation();
            phase = Math.random() * 360;
            updateShadow();
        }

        // Touch/Mouse interaction
        let isDragging = false;
        let startX = 0;

        document.querySelector('.moon-container').addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX;
            pauseAnimation();
        });

        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const diff = e.clientX - startX;
                phase = (phase + diff * 0.5) % 360;
                if (phase < 0) phase += 360;
                updateShadow();
                startX = e.clientX;
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Touch events
        document.querySelector('.moon-container').addEventListener('touchstart', (e) => {
            isDragging = true;
            startX = e.touches[0].clientX;
            pauseAnimation();
        });

        document.addEventListener('touchmove', (e) => {
            if (isDragging) {
                const diff = e.touches[0].clientX - startX;
                phase = (phase + diff * 0.5) % 360;
                if (phase < 0) phase += 360;
                updateShadow();
                startX = e.touches[0].clientX;
            }
        });

        document.addEventListener('touchend', () => {
            isDragging = false;
        });

        // Fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        updateShadow();
    </script>
</body>
</html>
