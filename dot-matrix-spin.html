<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dot Matrix Spin | ジェネレーティブアート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #canvas {
            display: block;
        }

        #info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #ffffff;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }

        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        #fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            z-index: 100;
            transition: all 0.3s;
        }

        #fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="info">
        <h2>Dot Matrix Spin</h2>
        <p>Click & Drag to interact</p>
    </div>

    <button id="fullscreen-btn">⛶</button>

    <div id="controls">
        <button class="btn" id="reset-btn">Reset</button>
        <button class="btn" id="pause-btn">Pause</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        let dots = [];
        let isPaused = false;
        let mouseX = 0, mouseY = 0;
        let isMouseDown = false;

        const DOT_COUNT = 150;
        const BASE_RADIUS = 300;
        const DOT_SIZE = 4;

        class Dot {
            constructor(angle, radius, speed, sizeOffset) {
                this.angle = angle;
                this.radius = radius;
                this.speed = speed;
                this.sizeOffset = sizeOffset;
                this.baseColor = this.randomColor();
                this.currentColor = this.baseColor;
                this.pulsePhase = Math.random() * Math.PI * 2;
            }

            randomColor() {
                const colors = [
                    '#ff6b9d', '#c44dff', '#4d79ff', '#4dffff', '#4dff88',
                    '#ffff4d', '#ff884d', '#ff4d4d'
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            update(time, mouseInfluence) {
                this.angle += this.speed + mouseInfluence * 0.02;
                this.pulsePhase += 0.05;

                const distanceToMouse = Math.sqrt(
                    Math.pow(mouseX - centerX - Math.cos(this.angle) * this.radius, 2) +
                    Math.pow(mouseY - centerY - Math.sin(this.angle) * this.radius, 2)
                );

                if (isMouseDown && distanceToMouse < 100) {
                    this.radius += (this.radius > 150) ? -2 : 2;
                    this.currentColor = '#ffffff';
                } else {
                    this.radius += Math.sin(time * 0.001 + this.sizeOffset) * 0.5;
                    this.currentColor = this.baseColor;
                }
            }

            draw() {
                const x = centerX + Math.cos(this.angle) * this.radius;
                const y = centerY + Math.sin(this.angle) * this.radius;

                const size = DOT_SIZE + Math.sin(this.pulsePhase) * 2;
                const alpha = 0.6 + Math.sin(this.pulsePhase) * 0.4;

                ctx.beginPath();
                ctx.arc(x, y, Math.max(1, size), 0, Math.PI * 2);
                ctx.fillStyle = this.currentColor;
                ctx.globalAlpha = alpha;
                ctx.fill();
                ctx.globalAlpha = 1;

                // Glow effect
                ctx.beginPath();
                ctx.arc(x, y, Math.max(1, size * 2), 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, size * 2);
                gradient.addColorStop(0, this.currentColor + '40');
                gradient.addColorStop(1, this.currentColor + '00');
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        function init() {
            dots = [];
            for (let i = 0; i < DOT_COUNT; i++) {
                const angle = (i / DOT_COUNT) * Math.PI * 2;
                const radius = BASE_RADIUS + Math.random() * 100;
                const speed = 0.005 + Math.random() * 0.015;
                const sizeOffset = Math.random() * Math.PI * 2;
                dots.push(new Dot(angle, radius, speed, sizeOffset));
            }
        }

        function animate(time) {
            if (!isPaused) {
                ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
                ctx.fillRect(0, 0, width, height);

                const mouseInfluence = isMouseDown ? 1 : 0;

                dots.forEach(dot => {
                    dot.update(time, mouseInfluence);
                    dot.draw();
                });

                // Draw connecting lines for nearby dots
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.lineWidth = 1;
                for (let i = 0; i < dots.length; i++) {
                    for (let j = i + 1; j < dots.length; j++) {
                        const x1 = centerX + Math.cos(dots[i].angle) * dots[i].radius;
                        const y1 = centerY + Math.sin(dots[i].angle) * dots[i].radius;
                        const x2 = centerX + Math.cos(dots[j].angle) * dots[j].radius;
                        const y2 = centerY + Math.sin(dots[j].angle) * dots[j].radius;

                        const distance = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
                        if (distance < 80) {
                            ctx.beginPath();
                            ctx.moveTo(x1, y1);
                            ctx.lineTo(x2, y2);
                            ctx.stroke();
                        }
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        // Event listeners
        window.addEventListener('resize', () => {
            resize();
            init();
        });

        canvas.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isMouseDown = true;
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', () => {
            isMouseDown = false;
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, width, height);
            init();
        });

        document.getElementById('pause-btn').addEventListener('click', () => {
            isPaused = !isPaused;
            document.getElementById('pause-btn').textContent = isPaused ? 'Play' : 'Pause';
        });

        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Initialize
        resize();
        init();
        animate(0);
    </script>
</body>
</html>
