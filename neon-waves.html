<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Waves - Mira's Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        canvas {
            display: block;
        }
        #info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 14px;
            text-shadow: 0 0 10px currentColor;
            z-index: 100;
        }
        #fullscreen {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            cursor: pointer;
            z-index: 100;
            border-radius: 5px;
        }
        #fullscreen:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="info">Neon Waves - マウス/タッチで操作</div>
    <button id="fullscreen">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let mouseX = 0, mouseY = 0;
        let targetMouseX = 0, targetMouseY = 0;
        let time = 0;

        // 設定
        const waves = [];
        const waveCount = 5;

        // Waveクラス
        class Wave {
            constructor(index) {
                this.index = index;
                this.reset();
            }

            reset() {
                this.amplitude = 30 + Math.random() * 50;
                this.frequency = 0.005 + Math.random() * 0.01;
                this.speed = 0.5 + Math.random() * 1;
                this.phase = Math.random() * Math.PI * 2;

                // ネオン色
                const hue = (this.index * 60 + Math.random() * 30) % 360;
                this.color = `hsl(${hue}, 100%, 60%)`;
                this.glowColor = `hsl(${hue}, 100%, 50%)`;
            }

            draw(t) {
                ctx.beginPath();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 3;

                for (let x = 0; x < width; x += 2) {
                    // 距離による影響
                    const dx = x - mouseX;
                    const dy = height / 2 - mouseY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const influence = Math.max(0, 1 - dist / 300);

                    const wavePhase = this.phase + t * this.speed * 0.02;
                    const waveAmp = this.amplitude * (1 + influence);
                    const waveFreq = this.frequency * (1 + influence * 0.5);

                    const y = height / 2 + Math.sin(x * waveFreq + wavePhase + this.index) * waveAmp;
                    const y2 = height / 2 + Math.sin((x + 2) * waveFreq + wavePhase + this.index) * waveAmp;

                    if (x === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }

                ctx.shadowBlur = 20;
                ctx.shadowColor = this.glowColor;
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }

        // 初期化
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            mouseX = width / 2;
            mouseY = height / 2;
            targetMouseX = width / 2;
            targetMouseY = height / 2;

            waves.length = 0;
            for (let i = 0; i < waveCount; i++) {
                waves.push(new Wave(i));
            }
        }

        // 描画
        function draw() {
            // 暗い背景でフェード効果
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // マウス位置を滑らかに移動
            mouseX += (targetMouseX - mouseX) * 0.05;
            mouseY += (targetMouseY - mouseY) * 0.05;

            // 波を描画
            waves.forEach(wave => wave.draw(time));

            time++;
            requestAnimationFrame(draw);
        }

        // イベントリスナー
        window.addEventListener('resize', init);

        canvas.addEventListener('mousemove', (e) => {
            targetMouseX = e.clientX;
            targetMouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            targetMouseX = e.touches[0].clientX;
            targetMouseY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            targetMouseX = e.touches[0].clientX;
            targetMouseY = e.touches[0].clientY;
        });

        document.getElementById('fullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // スタート
        init();
        draw();
    </script>
</body>
</html>
