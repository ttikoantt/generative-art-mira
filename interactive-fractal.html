<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Fractal - Interactive Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow: hidden;
        }
        canvas {
            display: block;
            cursor: none;
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1000;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>
    <div class="info">
        <p>🎨 マウスを動かしてフラクタルを操作</p>
        <p>クリックでパターン変更</p>
    </div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let mouseX = 0, mouseY = 0;
        let patternType = 0;
        let time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('click', () => {
            patternType = (patternType + 1) % 3;
        });

        function getColor(t, offset) {
            const hue = (t * 50 + offset) % 360;
            const saturation = 70 + Math.sin(t * 2) * 20;
            const lightness = 50 + Math.sin(t * 3) * 20;
            return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
        }

        function drawFractalBranch(x, y, length, angle, depth, maxDepth, time) {
            if (depth > maxDepth) return;

            const endX = x + Math.cos(angle) * length;
            const endY = y + Math.sin(angle) * length;

            const hue = (time * 30 + depth * 40) % 360;
            ctx.strokeStyle = `hsl(${hue}, 70%, ${50 + depth * 5}%)`;
            ctx.lineWidth = Math.max(0.5, (maxDepth - depth) * 0.8);
            ctx.globalAlpha = 0.8;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.stroke();

            const newLength = length * 0.7;
            const angleOffset = Math.sin(time * 2 + depth * 0.5) * 0.3 + 0.3;
            const spread = (mouseX / width - 0.5) * 2;

            drawFractalBranch(endX, endY, newLength, angle - angleOffset + spread * 0.3, depth + 1, maxDepth, time);
            drawFractalBranch(endX, endY, newLength, angle + angleOffset + spread * 0.3, depth + 1, maxDepth, time);
        }

        function drawSpiral(x, y, time) {
            const numPoints = 500;
            const maxRadius = Math.min(width, height) * 0.4;
            const mouseFactor = mouseY / height;

            ctx.globalAlpha = 0.1;
            for (let i = 0; i < numPoints; i++) {
                const angle = (i / numPoints) * Math.PI * 20 + time * 2;
                const radius = (i / numPoints) * maxRadius * (0.5 + mouseFactor * 0.5);

                const px = x + Math.cos(angle) * radius;
                const py = y + Math.sin(angle) * radius;

                const hue = (i * 0.5 + time * 50) % 360;
                ctx.fillStyle = `hsl(${hue}, 80%, 60%)`;
                ctx.beginPath();
                ctx.arc(px, py, 2 + (i / numPoints) * 5, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawParticle(time) {
            const numParticles = 200;
            const centerX = width / 2;
            const centerY = height / 2;

            ctx.globalAlpha = 0.6;
            for (let i = 0; i < numParticles; i++) {
                const angle = (i / numParticles) * Math.PI * 2;
                const baseRadius = Math.min(width, height) * 0.3;
                const offset = Math.sin(time * 3 + i * 0.1) * 50;
                const mouseEffect = (mouseX / width - 0.5) * 100;

                const radius = baseRadius + offset + mouseEffect * Math.cos(angle);
                const px = centerX + Math.cos(angle + time) * radius;
                const py = centerY + Math.sin(angle + time) * radius;

                const hue = (i * 2 + time * 30 + (mouseY / height) * 100) % 360;
                ctx.fillStyle = `hsl(${hue}, 75%, 55%)`;
                ctx.beginPath();
                ctx.arc(px, py, 3 + Math.sin(time * 5 + i) * 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animate() {
            ctx.globalAlpha = 0.05;
            ctx.fillStyle = 'rgba(26, 26, 46, 0.1)';
            ctx.fillRect(0, 0, width, height);

            time += 0.016;

            if (patternType === 0) {
                drawFractalBranch(width / 2, height, 120, -Math.PI / 2, 0, 10, time);
            } else if (patternType === 1) {
                drawSpiral(width / 2, height / 2, time);
            } else {
                drawParticle(time);
            }

            requestAnimationFrame(animate);
        }
        animate();

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
