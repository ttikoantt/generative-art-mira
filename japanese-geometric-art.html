<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本語幾何学アート | Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            color: #fff;
            z-index: 10;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        .header p {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.1em;
        }

        #canvas {
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            z-index: 10;
        }

        .btn {
            padding: 12px 30px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,255,255,0.2);
        }

        .btn.active {
            background: rgba(255,255,255,0.3);
            border-color: rgba(255,255,255,0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            z-index: 1000;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5rem;
            }
            .controls {
                flex-wrap: wrap;
                justify-content: center;
            }
            .btn {
                padding: 10px 20px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <div class="header">
            <h1>日本語幾何学アート</h1>
            <p>Japanese Geometric Art</p>
        </div>

        <canvas id="canvas"></canvas>

        <div class="controls">
            <button class="btn" onclick="changePattern('spiral')">螺旋</button>
            <button class="btn" onclick="changePattern('grid')">格子</button>
            <button class="btn" onclick="changePattern('wave')">波動</button>
            <button class="btn" onclick="changePattern('vortex')">渦</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // 日本語文字セット
        const hiragana = 'あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをん';
        const katakana = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
        const kanji = '山水日月星雲風火水土木金花鳥夢心魂道理神仏光闇空虚実無有天地春夏秋冬東西南北';

        const characters = {
            hiragana,
            katakana,
            kanji
        };

        let width, height;
        let particles = [];
        let currentPattern = 'spiral';
        let animationId;
        let time = 0;

        function resize() {
            const container = document.querySelector('.container');
            const maxWidth = Math.min(window.innerWidth - 40, 900);
            const maxHeight = window.innerHeight - 250;
            
            width = canvas.width = maxWidth;
            height = canvas.height = maxHeight;
            
            initParticles();
        }

        class GeometricParticle {
            constructor(type, charSet) {
                this.type = type;
                this.charSet = charSet;
                this.char = this.getRandomChar();
                this.reset();
            }

            getRandomChar() {
                const chars = characters[this.charSet];
                return chars[Math.floor(Math.random() * chars.length)];
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 40 + 20;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.opacity = Math.random() * 0.8 + 0.2;
                this.hue = Math.random() * 60 + 180; // 青〜紫系
                this.scale = 1;
                this.scaleSpeed = (Math.random() - 0.5) * 0.01;
            }

            update() {
                this.rotation += this.rotationSpeed;
                this.scale = 1 + Math.sin(time * 0.001 + this.x * 0.01) * 0.3;
                this.hue = (this.hue + 0.1) % 360;

                switch(currentPattern) {
                    case 'spiral':
                        this.updateSpiral();
                        break;
                    case 'grid':
                        this.updateGrid();
                        break;
                    case 'wave':
                        this.updateWave();
                        break;
                    case 'vortex':
                        this.updateVortex();
                        break;
                }

                // 境界チェック
                if (this.x < -50 || this.x > width + 50 || this.y < -50 || this.y > height + 50) {
                    this.reset();
                }
            }

            updateSpiral() {
                const centerX = width / 2;
                const centerY = height / 2;
                const angle = Math.atan2(this.y - centerY, this.x - centerX);
                const dist = Math.sqrt(Math.pow(this.x - centerX, 2) + Math.pow(this.y - centerY, 2));
                
                this.x += Math.cos(angle + Math.PI/2) * 1;
                this.y += Math.sin(angle + Math.PI/2) * 1;
                this.rotation += 0.01;
            }

            updateGrid() {
                const gridSize = 80;
                const gridX = Math.round(this.x / gridSize) * gridSize;
                const gridY = Math.round(this.y / gridSize) * gridSize;
                
                this.x += (gridX - this.x) * 0.02;
                this.y += (gridY - this.y) * 0.02;
            }

            updateWave() {
                this.y += Math.sin(this.x * 0.01 + time * 0.002) * 2;
                this.x += this.speedX;
                
                if (this.x > width + 50) this.x = -50;
            }

            updateVortex() {
                const centerX = width / 2;
                const centerY = height / 2;
                const dx = this.x - centerX;
                const dy = this.y - centerY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const angle = Math.atan2(dy, dx);
                
                const newAngle = angle + 0.01 * (1 + 100 / (dist + 1));
                const newDist = dist * 1.001;
                
                this.x = centerX + Math.cos(newAngle) * newDist;
                this.y = centerY + Math.sin(newAngle) * newDist;
                
                if (dist > Math.max(width, height)) {
                    this.x = centerX + (Math.random() - 0.5) * 100;
                    this.y = centerY + (Math.random() - 0.5) * 100;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.scale(this.scale, this.scale);
                
                // グロー効果
                ctx.shadowColor = `hsla(${this.hue}, 80%, 60%, 0.8)`;
                ctx.shadowBlur = 20;
                
                // 文字描画
                ctx.fillStyle = `hsla(${this.hue}, 70%, 70%, ${this.opacity})`;
                ctx.font = `${this.size}px "Noto Sans JP", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.char, 0, 0);
                
                // 幾何学的な枠
                ctx.strokeStyle = `hsla(${this.hue + 180}, 60%, 50%, ${this.opacity * 0.5})`;
                ctx.lineWidth = 1;
                ctx.strokeRect(-this.size/2, -this.size/2, this.size, this.size);
                
                ctx.restore();
            }
        }

        function initParticles() {
            particles = [];
            
            // 各種文字セットから均等に配置
            const charSets = ['hiragana', 'katakana', 'kanji'];
            const particlesPerSet = 20;
            
            charSets.forEach(charSet => {
                for (let i = 0; i < particlesPerSet; i++) {
                    particles.push(new GeometricParticle('character', charSet));
                }
            });
        }

        function drawBackground() {
            // グラデーション背景
            const gradient = ctx.createRadialGradient(
                width/2, height/2, 0,
                width/2, height/2, Math.max(width, height)/2
            );
            gradient.addColorStop(0, 'rgba(20, 20, 40, 0.1)');
            gradient.addColorStop(1, 'rgba(10, 10, 20, 0.2)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }

        function animate() {
            drawBackground();
            
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            
            time++;
            animationId = requestAnimationFrame(animate);
        }

        function changePattern(pattern) {
            currentPattern = pattern;
            
            // ボタンのアクティブ状態
            document.querySelectorAll('.btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 粒子をリセット
            particles.forEach(p => {
                if (pattern === 'grid') {
                    p.x = Math.round(p.x / 80) * 80;
                    p.y = Math.round(p.y / 80) * 80;
                } else {
                    p.reset();
                }
            });
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        window.addEventListener('resize', resize);
        resize();
        animate();

        // タッチ対応
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        // 定期的に文字を変更
        setInterval(() => {
            particles.forEach(p => {
                if (Math.random() < 0.05) {
                    p.char = p.getRandomChar();
                }
            });
        }, 2000);
    </script>
</body>
</html>
