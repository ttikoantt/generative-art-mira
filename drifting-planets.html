<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空を漂う惑星 - Drifting Planets</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #0a0a1a, #1a1a3a, #0a0a2a);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                bottom: 15px;
            }

            .fullscreen-btn {
                top: 15px;
                right: 15px;
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">🪐 空を漂う惑星 | Drifting Planets</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let planets = [];
        let stars = [];

        // パステルカラー
        const planetColors = [
            { base: '#FFB3BA', shadow: '#FF6B6B', ring: '#FF8E8E' },
            { base: '#BAE1FF', shadow: '#6BB3FF', ring: '#8EC5FF' },
            { base: '#FFDFBA', shadow: '#FFB36B', ring: '#FFC78E' },
            { base: '#Baffc9', shadow: '#6bff9d', ring: '#8effbe' },
            { base: '#E0BBE4', shadow: '#C77DC2', ring: '#D49DD1' },
            { base: '#957DAD', shadow: '#6B4B8E', ring: '#7D5BA0' },
            { base: '#FFECB3', shadow: '#FFD54F', ring: '#FFEB77' }
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initStars();
        }

        function initStars() {
            stars = [];
            const starCount = Math.floor((width * height) / 3000);
            for (let i = 0; i < starCount; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 1.5 + 0.5,
                    opacity: Math.random() * 0.7 + 0.3,
                    twinkleSpeed: Math.random() * 0.02 + 0.005,
                    twinkleOffset: Math.random() * Math.PI * 2
                });
            }
        }

        class Planet {
            constructor() {
                this.reset();
            }

            reset() {
                const size = Math.random() * 60 + 25;
                this.radius = size;
                this.color = planetColors[Math.floor(Math.random() * planetColors.length)];
                
                // ランダムな位置（画面外から）
                const side = Math.floor(Math.random() * 4);
                switch(side) {
                    case 0: // 上
                        this.x = Math.random() * width;
                        this.y = -this.radius * 2;
                        this.vx = (Math.random() - 0.5) * 0.3;
                        this.vy = Math.random() * 0.3 + 0.1;
                        break;
                    case 1: // 右
                        this.x = width + this.radius * 2;
                        this.y = Math.random() * height;
                        this.vx = -(Math.random() * 0.3 + 0.1);
                        this.vy = (Math.random() - 0.5) * 0.3;
                        break;
                    case 2: // 下
                        this.x = Math.random() * width;
                        this.y = height + this.radius * 2;
                        this.vx = (Math.random() - 0.5) * 0.3;
                        this.vy = -(Math.random() * 0.3 + 0.1);
                        break;
                    case 3: // 左
                        this.x = -this.radius * 2;
                        this.y = Math.random() * height;
                        this.vx = Math.random() * 0.3 + 0.1;
                        this.vy = (Math.random() - 0.5) * 0.3;
                        break;
                }

                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.01;
                
                // リングがあるかどうか
                this.hasRing = Math.random() > 0.4;
                this.ringRadius = this.radius * (1.3 + Math.random() * 0.5);
                this.ringWidth = 5 + Math.random() * 15;
                this.ringAngle = Math.random() * Math.PI * 2;

                // 惑星の模様
                this.patterns = [];
                const patternCount = Math.floor(Math.random() * 3) + 1;
                for (let i = 0; i < patternCount; i++) {
                    this.patterns.push({
                        y: (Math.random() - 0.5) * this.radius * 0.8,
                        height: Math.random() * this.radius * 0.3 + 5,
                        opacity: Math.random() * 0.3 + 0.1
                    });
                }

                this.opacity = 0;
                this.fadingIn = true;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotationSpeed;

                // フェードイン・フェードアウト
                if (this.fadingIn) {
                    this.opacity += 0.005;
                    if (this.opacity >= 0.8) {
                        this.opacity = 0.8;
                        this.fadingIn = false;
                    }
                }

                // 画面外に出たらリセット
                if (this.x < -this.radius * 3 || this.x > width + this.radius * 3 ||
                    this.y < -this.radius * 3 || this.y > height + this.radius * 3) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.opacity;

                // リングを描画（惑星の後ろ）
                if (this.hasRing) {
                    this.drawRing(false);
                }

                // 惑星本体
                const gradient = ctx.createRadialGradient(
                    -this.radius * 0.3, -this.radius * 0.3, 0,
                    0, 0, this.radius
                );
                gradient.addColorStop(0, this.color.base);
                gradient.addColorStop(0.7, this.color.shadow);
                gradient.addColorStop(1, this.color.shadow);

                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // 模様を描画
                this.patterns.forEach(pattern => {
                    ctx.beginPath();
                    ctx.arc(0, pattern.y, this.radius * 0.9, 0, Math.PI * 2);
                    ctx.clip();
                    
                    ctx.fillStyle = `rgba(255, 255, 255, ${pattern.opacity})`;
                    ctx.fillRect(-this.radius, pattern.y - pattern.height / 2, 
                                this.radius * 2, pattern.height);
                });

                ctx.restore();
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.opacity;

                // リングを描画（惑星の前）
                if (this.hasRing) {
                    this.drawRing(true);
                }

                ctx.restore();
            }

            drawRing(front) {
                ctx.save();
                ctx.rotate(this.ringAngle);

                ctx.beginPath();
                ctx.ellipse(0, 0, this.ringRadius, this.ringRadius * 0.2, 0, 
                           front ? 0 : Math.PI, front ? Math.PI : Math.PI * 2);
                ctx.strokeStyle = this.color.ring;
                ctx.lineWidth = this.ringWidth;
                ctx.globalAlpha = front ? 0.7 : 0.3;
                ctx.stroke();

                // リングの内側の線
                ctx.beginPath();
                ctx.ellipse(0, 0, this.ringRadius * 0.8, this.ringRadius * 0.16, 0, 
                           front ? 0 : Math.PI, front ? Math.PI : Math.PI * 2);
                ctx.strokeStyle = this.color.ring;
                ctx.lineWidth = 2;
                ctx.globalAlpha = front ? 0.5 : 0.2;
                ctx.stroke();

                ctx.restore();
            }
        }

        function init() {
            resize();
            
            // 惑星を初期化
            const planetCount = Math.floor(Math.random() * 3) + 4;
            for (let i = 0; i < planetCount; i++) {
                const planet = new Planet();
                // 最初は画面内に配置
                planet.x = Math.random() * width;
                planet.y = Math.random() * height;
                planet.opacity = Math.random() * 0.5 + 0.3;
                planet.fadingIn = false;
                planets.push(planet);
            }
        }

        function drawStars(time) {
            stars.forEach(star => {
                const twinkle = Math.sin(time * star.twinkleSpeed + star.twinkleOffset) * 0.3 + 0.7;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity * twinkle})`;
                ctx.fill();
            });
        }

        function animate() {
            const time = Date.now();

            // 背景をクリア
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 星を描画
            drawStars(time);

            // 惑星を更新・描画（サイズ順にソート）
            planets.sort((a, b) => a.radius - b.radius);
            planets.forEach(planet => {
                planet.update();
                planet.draw();
            });

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', resize);
        init();
        animate();
    </script>
</body>
</html>
