<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>New Year Fireworks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a3a 50%, #2a1a2a 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: clamp(24px, 6vw, 64px);
            font-weight: bold;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8),
                         0 0 40px rgba(255, 215, 0, 0.6),
                         0 0 60px rgba(255, 215, 0, 0.4);
            opacity: 0;
            animation: fadeInOut 8s ease-in-out forwards;
        }

        .year {
            display: block;
            font-size: clamp(48px, 12vw, 120px);
            background: linear-gradient(45deg, #FFD700, #FF6B6B, #4ECDC4, #FFD700);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
        }

        .subtitle {
            font-size: clamp(14px, 3vw, 24px);
            margin-top: 20px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="title">
        <span class="year">2026</span>
        <div class="subtitle">🎆 新年の始まり 🎆</div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const fireworks = [];
        const particles = [];
        const stars = [];

        // 星を生成
        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * width,
                y: Math.random() * height * 0.7,
                size: Math.random() * 2,
                twinkle: Math.random() * Math.PI * 2
            });
        }

        class Firework {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = height;
                this.targetY = height * 0.2 + Math.random() * height * 0.3;
                this.speed = 8 + Math.random() * 4;
                this.size = 2 + Math.random() * 2;
                this.trail = [];
                this.maxTrail = 15;
                this.active = true;
                this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
            }

            update() {
                if (!this.active) return;

                this.trail.unshift({ x: this.x, y: this.y });
                if (this.trail.length > this.maxTrail) {
                    this.trail.pop();
                }

                this.y -= this.speed;

                if (this.y <= this.targetY) {
                    this.explode();
                    this.active = false;
                }
            }

            draw() {
                if (!this.active) return;

                // トレイルを描画
                for (let i = 0; i < this.trail.length; i++) {
                    const alpha = 1 - i / this.trail.length;
                    ctx.beginPath();
                    ctx.arc(this.trail[i].x, this.trail[i].y, this.size * alpha, 0, Math.PI * 2);
                    ctx.fillStyle = this.color.replace(')', `, ${alpha})`).replace('hsl', 'hsla');
                    ctx.fill();
                }

                // 先端を描画
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            explode() {
                const particleCount = 80 + Math.floor(Math.random() * 40);
                const hue = Math.random() * 360;

                for (let i = 0; i < particleCount; i++) {
                    const angle = (Math.PI * 2 / particleCount) * i;
                    const speed = 3 + Math.random() * 5;
                    particles.push(new Particle(this.x, this.y, angle, speed, hue));
                }
            }
        }

        class Particle {
            constructor(x, y, angle, speed, hue) {
                this.x = x;
                this.y = y;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.hue = hue + Math.random() * 30 - 15;
                this.life = 1;
                this.decay = 0.015 + Math.random() * 0.01;
                this.size = 2 + Math.random() * 2;
                this.gravity = 0.05;
                this.trail = [];
                this.maxTrail = 8;
            }

            update() {
                this.trail.unshift({ x: this.x, y: this.y, life: this.life });
                if (this.trail.length > this.maxTrail) {
                    this.trail.pop();
                }

                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }

            draw() {
                // トレイルを描画
                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const alpha = t.life * (1 - i / this.trail.length);
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, this.size * (1 - i / this.trail.length), 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${alpha})`;
                    ctx.fill();
                }

                // 現在の位置を描画
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 70%, ${this.life})`;
                ctx.fill();
            }
        }

        function drawStars() {
            stars.forEach(star => {
                star.twinkle += 0.02;
                const alpha = 0.3 + Math.sin(star.twinkle) * 0.3;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fill();
            });
        }

        function animate() {
            // 半透明の黒でクリア（トレイル効果）
            ctx.fillStyle = 'rgba(10, 10, 26, 0.15)';
            ctx.fillRect(0, 0, width, height);

            drawStars();

            // 新しい花火をランダムに発射
            if (Math.random() < 0.03 && fireworks.length < 5) {
                fireworks.push(new Firework());
            }

            // 花火を更新・描画
            for (let i = fireworks.length - 1; i >= 0; i--) {
                fireworks[i].update();
                fireworks[i].draw();

                if (!fireworks[i].active && fireworks[i].trail.length === 0) {
                    fireworks.splice(i, 1);
                }
            }

            // パーティクルを更新・描画
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();

                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        // タップで花火を発射
        canvas.addEventListener('click', (e) => {
            const firework = new Firework();
            firework.x = e.clientX;
            firework.reset();
            fireworks.push(firework);
        });

        // タッチ対応
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const firework = new Firework();
            firework.x = touch.clientX;
            firework.reset();
            fireworks.push(firework);
        });

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        animate();
    </script>
</body>
</html>
