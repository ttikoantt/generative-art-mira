<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Particle Sparks - Interactive Firework</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: pointer;
            touch-action: manipulation;
        }
        .info {
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            margin-bottom: 20px;
            padding: 0 20px;
        }
        .info h1 {
            font-size: 1.5em;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .info p {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.6);
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="info">
        <h1>✨ Particle Sparks</h1>
        <p>画面をタップして美しい火花を楽しもう！</p>
    </div>
    <canvas id="canvas"></canvas>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // キャンバスサイズ設定
        function resizeCanvas() {
            const size = Math.min(window.innerWidth - 40, window.innerHeight - 150, 500);
            canvas.width = size;
            canvas.height = size;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // パーティクルクラス
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 4 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1;
                this.decay = Math.random() * 0.015 + 0.01;
                this.size = Math.random() * 3 + 2;
                this.gravity = 0.05;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.vx *= 0.99;
                this.vy *= 0.99;
                this.life -= this.decay;
                this.size *= 0.98;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            isDead() {
                return this.life <= 0 || this.size < 0.5;
            }
        }

        // 火花システム
        class SparkSystem {
            constructor() {
                this.particles = [];
                this.colors = [
                    '#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3',
                    '#54a0ff', '#5f27cd', '#00d2d3', '#ff9f43',
                    '#ee5a6f', '#00b894', '#fdcb6e', '#6c5ce7'
                ];
            }

            createSpark(x, y) {
                const particleCount = 40 + Math.floor(Math.random() * 30);
                const baseColor = this.colors[Math.floor(Math.random() * this.colors.length)];

                for (let i = 0; i < particleCount; i++) {
                    // ベースカラーと類似色を使用
                    let color = baseColor;
                    if (Math.random() > 0.7) {
                        color = this.colors[Math.floor(Math.random() * this.colors.length)];
                    }
                    this.particles.push(new Particle(x, y, color));
                }
            }

            update() {
                this.particles = this.particles.filter(p => {
                    p.update();
                    return !p.isDead();
                });
            }

            draw() {
                // トレイル効果
                ctx.fillStyle = 'rgba(10, 10, 10, 0.15)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                this.particles.forEach(p => p.draw());
            }

            isEmpty() {
                return this.particles.length === 0;
            }
        }

        const sparkSystem = new SparkSystem();

        // イベントリスナー
        function handleInteraction(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            // キャンバス内であれば火花を作成
            if (x >= 0 && x <= canvas.width && y >= 0 && y <= canvas.height) {
                sparkSystem.createSpark(x, y);
            }
        }

        canvas.addEventListener('click', handleInteraction);
        canvas.addEventListener('touchstart', handleInteraction, { passive: false });

        // アニメーションループ
        function animate() {
            sparkSystem.update();
            sparkSystem.draw();
            requestAnimationFrame(animate);
        }

        // 全画面トグル
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期キャンバス描画
        ctx.fillStyle = 'rgba(10, 10, 10, 1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // スタートメッセージ
        ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
        ctx.font = '16px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('タップしてスタート！', canvas.width / 2, canvas.height / 2);

        animate();
    </script>
</body>
</html>
