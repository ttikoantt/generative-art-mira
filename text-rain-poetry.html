<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Text Rain Poetry 🌧️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            position: relative;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            color: white;
            font-size: 14px;
            max-width: 280px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .controls h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #fff;
            text-align: center;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #aaa;
        }

        .control-group input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #00d4ff;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .control-group select {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        .control-group select option {
            background: #1a1a2e;
        }

        .fullscreen-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .fullscreen-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .controls {
                top: 10px;
                right: 10px;
                left: 10px;
                max-width: none;
                padding: 15px;
            }

            .info {
                display: none;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <h2>🌧️ Text Rain Poetry</h2>

        <div class="control-group">
            <label>降水量</label>
            <input type="range" id="rainIntensity" min="1" max="50" value="15">
        </div>

        <div class="control-group">
            <label>風の強さ</label>
            <input type="range" id="windStrength" min="0" max="10" value="0">
        </div>

        <div class="control-group">
            <label>文字の大きさ</label>
            <input type="range" id="textSize" min="10" max="40" value="20">
        </div>

        <div class="control-group">
            <label>テキストセット</label>
            <select id="textSet">
                <option value="nature">自然の詩</option>
                <option value="love">愛の言葉</option>
                <option value="philosophy">哲学</option>
                <option value="dreams">夢</option>
                <option value="seasons">四季</option>
            </select>
        </div>

        <button class="fullscreen-btn" id="fullscreenBtn">🖥️ 全画面表示</button>
    </div>

    <div class="info">マウスを動かすと風が吹きます</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Canvas size
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Text sets
        const textSets = {
            nature: [
                '雨', '空', '雲', '風', '花', '木', '川', '山',
                '星', '月', '太陽', '海', '空', '鳥', '蝶', '露',
                '森', '泉', '滝', '雪', '霧', '虹', '朝', '夜',
                'Rain', 'Sky', 'Cloud', 'Wind', 'Bloom'
            ],
            love: [
                '愛', '恋', '想', '夢', '心', '絆', '憧', '誓',
                '愛しき', '永遠', '絆', '想い', '愛', '恋', '夢',
                'Love', 'Heart', 'Soul', 'Forever', 'Cherish'
            ],
            philosophy: [
                '生', '死', '時', '無', '有', '空', '存在', '本質',
                '真理', '智慧', '気づき', '静寂', '今', '此処',
                'Life', 'Being', 'Truth', 'Now', 'Awareness'
            ],
            dreams: [
                '夢', '希望', '冒険', '旅', '未来', '可能性', '挑戦',
                '夢見', '星', '空', '翼', '翔', '自由', '光',
                'Dream', 'Hope', 'Journey', 'Future', 'Possibility'
            ],
            seasons: [
                '春', '夏', '秋', '冬', '桜', '蝉', '紅葉', '雪',
                '春風', '夏海', '秋空', '冬星', '梅雨', '新月',
                'Spring', 'Summer', 'Autumn', 'Winter', 'Bloom'
            ]
        };

        // Color schemes
        const colorSchemes = [
            ['#00d4ff', '#0099cc', '#00ffff', '#00ccff', '#66e0ff'],
            ['#ff6b6b', '#ff8e8e', '#ffb4b4', '#ffd9d9', '#ff6b9d'],
            ['#ffd93d', '#ffe066', '#ffe99f', '#fff2cc', '#ffdd59'],
            ['#6bcb77', '#8fd99e', '#b4e6bf', '#d9f3df', '#95d5b2'],
            ['#9b59b6', '#b07cc6', '#c59fd9', '#dac2ec', '#be90d4']
        ];

        // Settings
        let settings = {
            rainIntensity: 15,
            windStrength: 0,
            textSize: 20,
            textSet: 'nature'
        };

        // Rain drops
        let drops = [];

        // Mouse position for wind
        let mouseX = 0;
        let mouseY = 0;
        let mouseInfluence = 0;

        class RainDrop {
            constructor() {
                this.reset();
                this.y = Math.random() * canvas.height;
            }

            reset() {
                const currentSet = textSets[settings.textSet];
                this.text = currentSet[Math.floor(Math.random() * currentSet.length)];
                this.x = Math.random() * canvas.width;
                this.y = -50;
                this.speed = 1 + Math.random() * 3;
                this.color = colorSchemes[Math.floor(Math.random() * colorSchemes.length)][Math.floor(Math.random() * 5)];
                this.rotation = (Math.random() - 0.5) * 0.3;
                this.rotationSpeed = (Math.random() - 0.5) * 0.01;
                this.size = settings.textSize * (0.6 + Math.random() * 0.8);
                this.opacity = 0.5 + Math.random() * 0.5;
                this.life = 1;
            }

            update() {
                // Apply gravity
                this.y += this.speed;

                // Apply wind
                this.x += settings.windStrength * 0.5;

                // Apply mouse influence
                const dx = this.x - mouseX;
                const dy = this.y - mouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 200 && mouseInfluence > 0) {
                    const force = (200 - dist) / 200 * mouseInfluence * 2;
                    this.x += (dx / dist) * force;
                    this.y += (dy / dist) * force;
                }

                // Update rotation
                this.rotation += this.rotationSpeed;

                // Fade out near bottom
                if (this.y > canvas.height - 100) {
                    this.opacity = Math.max(0, (canvas.height - this.y) / 100);
                }

                // Reset if off screen
                if (this.y > canvas.height + 50 || this.x < -50 || this.x > canvas.width + 50) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.font = `bold ${this.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.text, 0, 0);

                // Glow effect
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10;
                ctx.fillText(this.text, 0, 0);
                ctx.restore();
            }
        }

        // Initialize drops
        function initDrops() {
            drops = [];
            for (let i = 0; i < settings.rainIntensity * 10; i++) {
                drops.push(new RainDrop());
            }
        }
        initDrops();

        // Update number of drops when intensity changes
        document.getElementById('rainIntensity').addEventListener('input', (e) => {
            settings.rainIntensity = parseInt(e.target.value);
            initDrops();
        });

        // Event listeners for controls
        document.getElementById('windStrength').addEventListener('input', (e) => {
            settings.windStrength = parseInt(e.target.value);
        });

        document.getElementById('textSize').addEventListener('input', (e) => {
            settings.textSize = parseInt(e.target.value);
        });

        document.getElementById('textSet').addEventListener('change', (e) => {
            settings.textSet = e.target.value;
        });

        // Mouse move for wind effect
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            mouseInfluence = 1;
        });

        canvas.addEventListener('mouseleave', () => {
            mouseInfluence = 0;
        });

        // Touch support
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            mouseInfluence = 1;
        });

        canvas.addEventListener('touchend', () => {
            mouseInfluence = 0;
        });

        // Fullscreen
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Animation loop
        function animate() {
            // Clear with fade effect
            ctx.fillStyle = 'rgba(26, 26, 46, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update and draw drops
            drops.forEach(drop => {
                drop.update();
                drop.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
