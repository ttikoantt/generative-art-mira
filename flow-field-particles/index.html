<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flow Field Particles - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            touch-action: none;
        }

        canvas {
            display: block;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }

        .controls button {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .controls .primary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .controls .primary:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 14px;
            opacity: 0.7;
            pointer-events: none;
        }

        .fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            z-index: 100;
        }

        .fullscreen:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="controls">
        <button class="primary" onclick="reset()">🔄 Reset</button>
        <button class="primary" onclick="toggleMode()">🎨 Mode</button>
    </div>

    <button class="fullscreen" onclick="toggleFullscreen()">📺 Fullscreen</button>

    <div class="info">
        <p>✨ Drag to influence flow • Move to create trails</p>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let flowField;
        let cols, rows;
        const scale = 20;
        let mode = 0;
        let mouseX = 0, mouseY = 0;
        let isMouseDown = false;

        // Color palettes
        const palettes = [
            ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff'],
            ['#00d2d3', '#ff9f43', '#ee5a24', '#009432', '#0652DD'],
            ['#fd79a8', '#a29bfe', '#74b9ff', '#81ecec', '#ffeaa7'],
            ['#e17055', '#00b894', '#0984e3', '#6c5ce7', '#fdcb6e']
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            cols = Math.floor(width / scale) + 1;
            rows = Math.floor(height / scale) + 1;
            initFlowField();
        }

        function initFlowField() {
            flowField = new Array(cols * rows);

            let yoff = 0;
            for (let y = 0; y < rows; y++) {
                let xoff = 0;
                for (let x = 0; x < cols; x++) {
                    const index = x + y * cols;
                    const angle = noise(xoff, yoff) * Math.PI * 4;
                    flowField[index] = {
                        angle: angle,
                        vector: {
                            x: Math.cos(angle),
                            y: Math.sin(angle)
                        }
                    };
                    xoff += 0.1;
                }
                yoff += 0.1;
            }
        }

        // Simple noise function
        function noise(x, y) {
            const sin = Math.sin;
            return sin(x * 12.9898 + y * 78.233) * 43758.5453 % 1;
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = 0;
                this.vy = 0;
                this.ax = 0;
                this.ay = 0;
                this.maxSpeed = 2 + Math.random() * 2;
                this.maxForce = 0.1 + Math.random() * 0.1;
                this.prevX = this.x;
                this.prevY = this.y;
                this.life = 100 + Math.random() * 200;
                this.hue = Math.random() * 360;
            }

            applyForce(force) {
                this.ax += force.x;
                this.ay += force.y;
            }

            update() {
                this.vx += this.ax;
                this.vy += this.ay;

                // Limit speed
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > this.maxSpeed) {
                    this.vx = (this.vx / speed) * this.maxSpeed;
                    this.vy = (this.vy / speed) * this.maxSpeed;
                }

                this.prevX = this.x;
                this.prevY = this.y;

                this.x += this.vx;
                this.y += this.vy;

                this.ax = 0;
                this.ay = 0;

                this.life--;

                // Mouse influence
                if (isMouseDown) {
                    const dx = mouseX - this.x;
                    const dy = mouseY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        const force = (150 - dist) / 150;
                        this.applyForce({
                            x: (dx / dist) * force * 0.5,
                            y: (dy / dist) * force * 0.5
                        });
                    }
                }

                // Wrap around edges
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;

                // Reset if dead or stuck
                if (this.life <= 0 || (Math.abs(this.vx) < 0.1 && Math.abs(this.vy) < 0.1 && this.life < 50)) {
                    this.reset();
                }
            }

            draw() {
                const palette = palettes[mode];
                const colorIndex = Math.floor(this.hue / 360 * palette.length) % palette.length;

                ctx.beginPath();
                ctx.moveTo(this.prevX, this.prevY);
                ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = palette[colorIndex];
                ctx.lineWidth = 1.5;
                ctx.globalAlpha = this.life / 300;
                ctx.stroke();
                ctx.globalAlpha = 1;
            }

            follow(flowField) {
                const x = Math.floor(this.x / scale);
                const y = Math.floor(this.y / scale);
                const index = x + y * cols;

                if (index >= 0 && index < flowField.length) {
                    const force = flowField[index].vector;
                    this.applyForce({
                        x: force.x * this.maxForce,
                        y: force.y * this.maxForce
                    });
                }
            }
        }

        function initParticles() {
            particles = [];
            const numParticles = Math.floor((width * height) / 2000);

            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            particles.forEach(particle => {
                particle.follow(flowField);
                particle.update();
                particle.draw();
            });

            requestAnimationFrame(animate);
        }

        function reset() {
            initParticles();
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
        }

        function toggleMode() {
            mode = (mode + 1) % palettes.length;
            particles.forEach(p => {
                p.hue = Math.random() * 360;
            });
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Event listeners
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isMouseDown = false;
        });

        // Touch events
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isMouseDown = true;
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', () => {
            isMouseDown = false;
        });

        // Initialize
        resize();
        initParticles();
        animate();
    </script>
</body>
</html>
