<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>重力のダンス - Gravity Dance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            touch-action: manipulation;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .stats {
            position: fixed;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .control-btn {
            background: rgba(102, 126, 234, 0.8);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .control-btn:hover {
            transform: scale(1.05);
            background: rgba(102, 126, 234, 1);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 0.75rem;
                padding: 0 20px;
            }

            .control-btn {
                padding: 10px 16px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="info">🌌 クリック/タップで引力ポイントを追加</div>
    <div class="stats">Particles: <span id="particleCount">0</span> | Gravity Points: <span id="gravityCount">0</span> | Trails: <span id="trailMode">ON</span></div>
    
    <div class="controls">
        <button class="control-btn" id="resetBtn">🔄 リセット</button>
        <button class="control-btn" id="toggleBtn">🎨 色モード切替</button>
        <button class="control-btn" id="trailBtn">✨ 軌跡切替</button>
        <button class="control-btn" id="clearBtn">🗑️ 全消去</button>
    </div>
    
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const particleCountEl = document.getElementById('particleCount');
        const gravityCountEl = document.getElementById('gravityCount');
        const trailModeEl = document.getElementById('trailMode');
        const resetBtn = document.getElementById('resetBtn');
        const toggleBtn = document.getElementById('toggleBtn');
        const trailBtn = document.getElementById('trailBtn');
        const clearBtn = document.getElementById('clearBtn');

        let width, height;
        let particles = [];
        let gravityPoints = [];
        let colorMode = 0;
        let showTrails = true;
        let hueOffset = 0;

        // Physics constants
        const GRAVITY_STRENGTH = 0.8;
        const DAMPING = 0.98;
        const PARTICLE_COUNT = 300;
        const MAX_VELOCITY = 15;
        const TRAIL_LENGTH = 30;

        // Color modes
        const colorModes = [
            'velocity',      // Color based on velocity
            'position',      // Color based on position
            'gravity',       // Color based on nearest gravity point
            'rainbow'        // Rainbow cycle
        ];

        class GravityPoint {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.strength = GRAVITY_STRENGTH;
                this.hue = Math.random() * 360;
                this.pulsePhase = Math.random() * Math.PI * 2;
            }

            update() {
                this.pulsePhase += 0.05;
            }

            draw() {
                const pulse = Math.sin(this.pulsePhase) * 0.3 + 1;
                const radius = 15 * pulse;

                // Glow
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, radius * 2
                );

                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 70%, 0.8)`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 100%, 50%, 0.3)`);
                gradient.addColorStop(1, `hsla(${this.hue}, 100%, 30%, 0)`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, radius * 2, 0, Math.PI * 2);
                ctx.fill();

                // Core
                ctx.fillStyle = `hsla(${this.hue}, 100%, 90%, 1)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 8, 0, Math.PI * 2);
                ctx.fill();

                // Ring
                ctx.strokeStyle = `hsla(${this.hue}, 100%, 60%, 0.5)`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(this.x, this.y, radius * 1.5, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.radius = Math.random() * 3 + 1;
                this.hue = Math.random() * 360;
                this.trail = [];
                this.trailMaxLength = TRAIL_LENGTH;
                this.nearestGravityPoint = null;
            }

            update() {
                // Save current position for trail
                if (showTrails) {
                    this.trail.push({ x: this.x, y: this.y, hue: this.hue });
                    if (this.trail.length > this.trailMaxLength) {
                        this.trail.shift();
                    }
                }

                // Apply gravity from all points and find nearest
                let minDistance = Infinity;
                let nearestPoint = null;

                gravityPoints.forEach(point => {
                    const dx = point.x - this.x;
                    const dy = point.y - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < minDistance) {
                        minDistance = distance;
                        nearestPoint = point;
                    }

                    if (distance > 10) {
                        const force = point.strength / (distance * 0.02);
                        const angle = Math.atan2(dy, dx);
                        
                        this.vx += Math.cos(angle) * force;
                        this.vy += Math.sin(angle) * force;
                    }
                });

                this.nearestGravityPoint = nearestPoint;

                // Apply damping
                this.vx *= DAMPING;
                this.vy *= DAMPING;

                // Limit velocity
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > MAX_VELOCITY) {
                    this.vx = (this.vx / speed) * MAX_VELOCITY;
                    this.vy = (this.vy / speed) * MAX_VELOCITY;
                }

                // Update position
                this.x += this.vx;
                this.y += this.vy;

                // Update color based on mode
                this.updateColor(speed);

                // Boundary check (wrap around)
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }

            updateColor(speed) {
                const mode = colorModes[colorMode];

                switch (mode) {
                    case 'velocity':
                        // Color based on velocity (0-15 -> 0-240 hue)
                        const velocityHue = (speed / MAX_VELOCITY) * 240;
                        this.hue = velocityHue;
                        break;

                    case 'position':
                        // Color based on position
                        this.hue = ((this.x / width) * 180 + (this.y / height) * 180) % 360;
                        break;

                    case 'gravity':
                        // Color based on nearest gravity point
                        if (this.nearestGravityPoint) {
                            this.hue = this.nearestGravityPoint.hue;
                        } else {
                            this.hue = (hueOffset + this.x * 0.1) % 360;
                        }
                        break;

                    case 'rainbow':
                        // Rainbow cycle
                        this.hue = (hueOffset + this.x * 0.1 + this.y * 0.1) % 360;
                        break;
                }
            }

            draw() {
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                const alpha = 0.6 + (speed / MAX_VELOCITY) * 0.4;

                // Draw trail
                if (showTrails && this.trail.length > 1) {
                    ctx.save();
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';

                    for (let i = 0; i < this.trail.length - 1; i++) {
                        const point = this.trail[i];
                        const nextPoint = this.trail[i + 1];
                        const trailAlpha = (i / this.trail.length) * 0.5;

                        ctx.strokeStyle = `hsla(${point.hue}, 100%, 60%, ${trailAlpha})`;
                        ctx.lineWidth = (i / this.trail.length) * 3;
                        
                        ctx.beginPath();
                        ctx.moveTo(point.x, point.y);
                        ctx.lineTo(nextPoint.x, nextPoint.y);
                        ctx.stroke();
                    }

                    ctx.restore();
                }

                ctx.save();
                ctx.globalAlpha = alpha;

                // Glow effect
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 3
                );

                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 70%, ${alpha})`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 100%, 50%, ${alpha * 0.5})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 100%, 30%, 0)`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 3, 0, Math.PI * 2);
                ctx.fill();

                // Core
                ctx.fillStyle = `hsla(${this.hue}, 100%, 90%, ${alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // Update hue offset for color cycling
            hueOffset = (hueOffset + 0.5) % 360;

            // Update and draw gravity points
            gravityPoints.forEach(point => {
                point.update();
                point.draw();
            });

            // Update and draw particles
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // Draw connections between nearby particles
            ctx.save();
            ctx.globalAlpha = 0.15;
            ctx.strokeStyle = `hsla(${hueOffset}, 100%, 50%, 0.3)`;
            ctx.lineWidth = 1;

            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 100) {
                        const alpha = (1 - distance / 100) * 0.3;
                        ctx.strokeStyle = `hsla(${hueOffset}, 100%, 50%, ${alpha})`;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            ctx.restore();

            // Update stats
            particleCountEl.textContent = particles.length;
            gravityCountEl.textContent = gravityPoints.length;
            trailModeEl.textContent = showTrails ? 'ON' : 'OFF';

            requestAnimationFrame(animate);
        }

        // Event listeners
        window.addEventListener('resize', () => {
            resize();
            initParticles();
        });

        canvas.addEventListener('click', (e) => {
            gravityPoints.push(new GravityPoint(e.clientX, e.clientY));
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let touch of e.touches) {
                gravityPoints.push(new GravityPoint(touch.clientX, touch.clientY));
            }
        }, { passive: false });

        resetBtn.addEventListener('click', () => {
            initParticles();
        });

        toggleBtn.addEventListener('click', () => {
            colorMode = (colorMode + 1) % colorModes.length;
        });

        trailBtn.addEventListener('click', () => {
            showTrails = !showTrails;
        });

        clearBtn.addEventListener('click', () => {
            gravityPoints = [];
        });

        // Initialize
        resize();
        initParticles();
        
        // Add initial gravity point in center
        gravityPoints.push(new GravityPoint(width / 2, height / 2));
        
        animate();
    </script>
</body>
</html>
