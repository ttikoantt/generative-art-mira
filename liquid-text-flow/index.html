<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Liquid Text Flow - 流体テキストアニメーション</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            color: #e94560;
            font-size: clamp(1.5rem, 5vw, 3rem);
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
            text-align: center;
        }

        .canvas-container {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 100%);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            background: linear-gradient(135deg, #e94560 0%, #c23a51 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(233, 69, 96, 0.8);
            backdrop-filter: blur(10px);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(233, 69, 96, 1);
            transform: scale(1.1);
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: clamp(0.7rem, 2vw, 0.9rem);
        }

        /* 全画面時 */
        .fullscreen .canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border-radius: 0;
        }

        .fullscreen canvas {
            width: 100%;
            height: 100%;
        }

        .fullscreen .controls {
            display: none;
        }
    </style>
</head>
<body>
    <div class="fullscreen-btn" onclick="toggleFullscreen()">⛶</div>

    <div class="container">
        <h1>Liquid Text Flow</h1>
        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
        <div class="controls">
            <button class="btn" onclick="changeText('FLOW')">FLOW</button>
            <button class="btn" onclick="changeText('WAVE')">WAVE</button>
            <button class="btn" onclick="changeText('DREAM')">DREAM</button>
            <button class="btn" onclick="changeText('PEACE')">PEACE</button>
            <button class="btn" onclick="changeText('LOVE')">LOVE</button>
            <button class="btn" onclick="changeText('MAGIC')">MAGIC</button>
        </div>
    </div>

    <div class="info">マウスを動かすと波が変わります</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // キャンバスサイズ設定
        function resizeCanvas() {
            const container = canvas.parentElement;
            const size = Math.min(window.innerWidth - 40, window.innerHeight - 250, 600);
            canvas.width = size;
            canvas.height = size * 0.6;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        let currentText = 'FLOW';
        let mouseX = 0;
        let mouseY = 0;
        let time = 0;

        // テキスト変更
        function changeText(text) {
            currentText = text;
        }

        // マウス追跡
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = (e.clientX - rect.left) / canvas.width;
            mouseY = (e.clientY - rect.top) / canvas.height;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            mouseX = (touch.clientX - rect.left) / canvas.width;
            mouseY = (touch.clientY - rect.top) / canvas.height;
        }, { passive: false });

        // 流体テキスト描画
        function drawLiquidText() {
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const fontSize = canvas.width * 0.15;
            ctx.font = `bold ${fontSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const textWidth = ctx.measureText(currentText).width;
            const startX = (canvas.width - textWidth) / 2;

            // 文字を波のように描画
            for (let i = 0; i < currentText.length; i++) {
                const char = currentText[i];
                const charWidth = ctx.measureText(char).width;
                const x = startX + i * (textWidth / currentText.length) + charWidth / 2;

                // 波の計算
                const wave1 = Math.sin(time * 2 + i * 0.5 + mouseX * 5) * 10;
                const wave2 = Math.sin(time * 3 + i * 0.3 + mouseY * 5) * 8;
                const wave3 = Math.cos(time * 1.5 + i * 0.7) * 5;
                const y = canvas.height / 2 + wave1 + wave2 + wave3;

                // 色のグラデーション
                const hue = (time * 50 + i * 30) % 360;
                const gradient = ctx.createLinearGradient(x - 50, y - 50, x + 50, y + 50);
                gradient.addColorStop(0, `hsla(${hue}, 80%, 60%, 0.8)`);
                gradient.addColorStop(0.5, `hsla(${hue + 30}, 90%, 70%, 0.9)`);
                gradient.addColorStop(1, `hsla(${hue + 60}, 80%, 60%, 0.8)`);

                ctx.fillStyle = gradient;
                ctx.save();
                ctx.translate(x, y);

                // 回転エフェクト
                const rotation = Math.sin(time * 2 + i * 0.3 + mouseX * 3) * 0.1;
                ctx.rotate(rotation);

                ctx.fillText(char, 0, 0);
                ctx.restore();
            }

            // パーティクルエフェクト
            for (let i = 0; i < 30; i++) {
                const px = (Math.sin(time + i * 0.5) * 0.5 + 0.5) * canvas.width;
                const py = (Math.cos(time * 0.7 + i * 0.3) * 0.5 + 0.5) * canvas.height;
                const size = Math.sin(time * 2 + i) * 2 + 3;
                const alpha = Math.sin(time + i * 0.5) * 0.3 + 0.3;

                ctx.beginPath();
                ctx.arc(px, py, size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${(time * 30 + i * 20) % 360}, 70%, 70%, ${alpha})`;
                ctx.fill();
            }

            time += 0.02;
        }

        // アニメーションループ
        function animate() {
            drawLiquidText();
            requestAnimationFrame(animate);
        }

        animate();

        // 全画面切り替え
        function toggleFullscreen() {
            document.body.classList.toggle('fullscreen');
            const btn = document.querySelector('.fullscreen-btn');
            btn.textContent = document.body.classList.contains('fullscreen') ? '✕' : '⛶';

            if (document.body.classList.contains('fullscreen')) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            } else {
                resizeCanvas();
            }
        }
    </script>
</body>
</html>
