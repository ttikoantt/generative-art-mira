<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Spiral Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            color: #888;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        #canvas {
            border: 2px solid #333;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.2);
            background: #0d0d15;
            max-width: 100%;
            height: auto;
            cursor: pointer;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .control-group label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .control-group input[type="range"] {
            width: 150px;
            height: 6px;
            -webkit-appearance: none;
            background: #333;
            border-radius: 3px;
            outline: none;
        }
        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .control-group input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        button:active {
            transform: translateY(0);
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            font-size: 0.9rem;
            z-index: 1000;
        }
        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }
            .controls {
                flex-direction: column;
                align-items: center;
            }
            .control-group input[type="range"] {
                width: 200px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    <div class="container">
        <h1>🌀 Fractal Spiral Art</h1>
        <p class="subtitle">黄金角に基づくフラクタル螺旋アート</p>
        <canvas id="canvas" width="800" height="600"></canvas>
        <div class="controls">
            <div class="control-group">
                <label>パーティクル数: <span id="pointsValue">1000</span></label>
                <input type="range" id="points" min="100" max="3000" value="1000">
            </div>
            <div class="control-group">
                <label>スケール: <span id="scaleValue">8</span></label>
                <input type="range" id="scale" min="3" max="15" value="8" step="0.5">
            </div>
            <div class="control-group">
                <label>回転速度: <span id="rotationValue">0.5</span></label>
                <input type="range" id="rotation" min="0" max="2" value="0.5" step="0.1">
            </div>
            <button onclick="generateNew()">🎨 新規生成</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const GOLDEN_ANGLE = 137.507764 * (Math.PI / 180); // 黄金角（ラジアン）

        let particles = [];
        let animationId;
        let rotationOffset = 0;

        // パラメータ取得
        const getPoints = () => parseInt(document.getElementById('points').value);
        const getScale = () => parseFloat(document.getElementById('scale').value);
        const getRotation = () => parseFloat(document.getElementById('rotation').value);

        // UI更新
        function updateUI() {
            document.getElementById('pointsValue').textContent = getPoints();
            document.getElementById('scaleValue').textContent = getScale();
            document.getElementById('rotationValue').textContent = getRotation();
        }

        // イベントリスナー
        document.getElementById('points').addEventListener('input', () => { updateUI(); generateNew(); });
        document.getElementById('scale').addEventListener('input', () => { updateUI(); generateNew(); });
        document.getElementById('rotation').addEventListener('input', updateUI);

        // パーティクル生成
        function generateParticles() {
            particles = [];
            const count = getPoints();
            const scale = getScale();

            for (let i = 0; i < count; i++) {
                const angle = i * GOLDEN_ANGLE;
                const radius = scale * Math.sqrt(i);
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;

                // 色の計算（HSVからRGB）
                const hue = (i / count) * 360;
                const saturation = 80 + Math.random() * 20;
                const value = 60 + Math.random() * 40;
                const size = 1 + (i / count) * 4;

                particles.push({ x, y, hue, saturation, value, size, angle, radius });
            }
        }

        // 描画
        function draw() {
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);

            particles.forEach((p, i) => {
                const rotation = p.angle + rotationOffset;
                const x = Math.cos(rotation) * p.radius;
                const y = Math.sin(rotation) * p.radius;

                ctx.beginPath();
                ctx.arc(x, y, p.size, 0, Math.PI * 2);

                const gradient = ctx.createRadialGradient(x, y, 0, x, y, p.size);
                gradient.addColorStop(0, `hsla(${p.hue}, ${p.saturation}%, ${p.value}%, 1)`);
                gradient.addColorStop(1, `hsla(${p.hue}, ${p.saturation}%, ${p.value}%, 0)`);

                ctx.fillStyle = gradient;
                ctx.fill();
            });

            ctx.restore();

            rotationOffset += getRotation() * 0.01;
            animationId = requestAnimationFrame(draw);
        }

        function generateNew() {
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            rotationOffset = 0;
            generateParticles();
            draw();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        updateUI();
        generateNew();
    </script>
</body>
</html>
