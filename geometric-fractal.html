<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Fractal Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        #canvas {
            border-radius: 8px;
            box-shadow: 0 0 60px rgba(138, 43, 226, 0.3);
        }
        .info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-align: center;
        }
        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(138, 43, 226, 0.3);
            border: 1px solid rgba(138, 43, 226, 0.5);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .fullscreen-btn:hover {
            background: rgba(138, 43, 226, 0.5);
        }
        @media (max-width: 768px) {
            .info { font-size: 12px; }
            .fullscreen-btn { padding: 8px 16px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    <div class="info">幾何学フラクタルアート | タップでリセット</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let time = 0;
        let shapes = [];

        function resize() {
            width = canvas.width = Math.min(window.innerWidth * 0.9, 800);
            height = canvas.height = Math.min(window.innerHeight * 0.8, 800);
        }

        class FractalShape {
            constructor(x, y, size, depth, angle) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.depth = depth;
                this.angle = angle;
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                this.hue = Math.random() * 60 + 250; // Purple to Blue
            }

            update() {
                this.rotation += this.rotationSpeed;
                this.hue = (this.hue + 0.1) % 360;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle + this.rotation);

                const alpha = 0.3 + Math.sin(time * 0.02) * 0.2;
                ctx.strokeStyle = `hsla(${this.hue}, 80%, 60%, ${alpha})`;
                ctx.lineWidth = 1.5;

                this.drawShape(0, 0, this.size, this.depth);

                ctx.restore();
            }

            drawShape(x, y, size, depth) {
                if (depth <= 0 || size < 2) return;

                // Draw hexagon
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2;
                    const px = x + Math.cos(angle) * size;
                    const py = y + Math.sin(angle) * size;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.stroke();

                // Recursively draw smaller shapes
                const newSize = size * 0.45;
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2 + time * 0.01;
                    const px = x + Math.cos(angle) * size * 0.7;
                    const py = y + Math.sin(angle) * size * 0.7;
                    this.drawShape(px, py, newSize, depth - 1);
                }
            }
        }

        function initShapes() {
            shapes = [];
            const numShapes = 5;
            for (let i = 0; i < numShapes; i++) {
                const x = width / 2 + Math.cos(i / numShapes * Math.PI * 2) * 100;
                const y = height / 2 + Math.sin(i / numShapes * Math.PI * 2) * 100;
                shapes.push(new FractalShape(x, y, 60, 3, i / numShapes * Math.PI * 2));
            }
        }

        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // Update and draw shapes
            shapes.forEach(shape => {
                shape.update();
                shape.draw();
            });

            time++;
            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        canvas.addEventListener('click', initShapes);

        window.addEventListener('resize', resize);
        resize();
        initShapes();
        animate();
    </script>
</body>
</html>
