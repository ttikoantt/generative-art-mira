<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フラクタル・マンダラ・ジェネレーター</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #f093fb, #f5576c, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 20px;
        }

        #canvas {
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(240, 147, 251, 0.3),
                        0 0 100px rgba(245, 87, 108, 0.2);
            background: #000;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        #canvas:hover {
            transform: scale(1.02);
        }

        .controls {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
            width: 100%;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 5px;
        }

        .control-group input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(240, 147, 251, 0.4);
        }

        .button-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .generate-btn {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4);
        }

        .fullscreen-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .value-display {
            font-size: 0.8rem;
            color: #f093fb;
            float: right;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.4rem;
            }

            #canvas {
                width: 300px !important;
                height: 300px !important;
            }
        }
    </style>
</head>
<body>
    <h1>🔮 フラクタル・マンダラ・ジェネレーター</h1>
    <p class="subtitle">クリックで新しいパターンを生成</p>

    <canvas id="canvas" width="400" height="400"></canvas>

    <div class="controls">
        <div class="control-group">
            <label>シンメトリー <span class="value-display" id="symmetry-value">8</span></label>
            <input type="range" id="symmetry" min="4" max="16" value="8" step="1">
        </div>

        <div class="control-group">
            <label>複雑さ <span class="value-display" id="complexity-value">5</span></label>
            <input type="range" id="complexity" min="2" max="8" value="5" step="1">
        </div>

        <div class="control-group">
            <label>色の変化 <span class="value-display" id="color-shift-value">30</span></label>
            <input type="range" id="color-shift" min="10" max="60" value="30" step="5">
        </div>

        <div class="control-group">
            <label>回転速度 <span class="value-display" id="rotation-value">1</span></label>
            <input type="range" id="rotation" min="0" max="3" value="1" step="0.5">
        </div>

        <div class="button-row">
            <button class="generate-btn" onclick="generateNew()">🎨 新規生成</button>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全画面</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let symmetry = 8;
        let complexity = 5;
        let colorShift = 30;
        let rotationSpeed = 1;
        let rotation = 0;
        let baseHue = Math.random() * 360;
        let patterns = [];

        function generateNew() {
            baseHue = Math.random() * 360;
            generatePatterns();
        }

        function generatePatterns() {
            patterns = [];
            const numPatterns = complexity * 3;

            for (let i = 0; i < numPatterns; i++) {
                patterns.push({
                    radius: 30 + Math.random() * 150,
                    petals: 2 + Math.floor(Math.random() * 5),
                    amplitude: 10 + Math.random() * 30,
                    phase: Math.random() * Math.PI * 2,
                    speed: (Math.random() - 0.5) * 2,
                    lineWidth: 1 + Math.random() * 3
                });
            }
        }

        function drawFractalPetals(x, y, radius, petals, amplitude, phase, hue) {
            ctx.save();
            ctx.translate(x, y);

            for (let i = 0; i < symmetry; i++) {
                ctx.save();
                ctx.rotate((Math.PI * 2 * i) / symmetry);

                ctx.beginPath();
                for (let angle = 0; angle <= Math.PI * 2; angle += 0.05) {
                    const r = radius + Math.sin(angle * petals + phase) * amplitude;
                    const px = Math.cos(angle) * r;
                    const py = Math.sin(angle) * r;

                    if (angle === 0) {
                        ctx.moveTo(px, py);
                    } else {
                        ctx.lineTo(px, py);
                    }
                }
                ctx.closePath();
                ctx.strokeStyle = `hsla(${hue}, 80%, 60%, 0.6)`;
                ctx.lineWidth = 2;
                ctx.stroke();

                // 内部の装飾
                ctx.beginPath();
                for (let angle = 0; angle <= Math.PI * 2; angle += 0.1) {
                    const r = radius * 0.6 + Math.sin(angle * petals * 2 + phase) * amplitude * 0.5;
                    const px = Math.cos(angle) * r;
                    const py = Math.sin(angle) * r;

                    if (angle === 0) {
                        ctx.moveTo(px, py);
                    } else {
                        ctx.lineTo(px, py);
                    }
                }
                ctx.closePath();
                ctx.strokeStyle = `hsla(${hue + 30}, 70%, 70%, 0.4)`;
                ctx.lineWidth = 1;
                ctx.stroke();

                ctx.restore();
            }

            ctx.restore();
        }

        function draw() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // 背景をクリア（半透明でトレイル効果）
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 回転
            rotation += rotationSpeed * 0.01;

            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(rotation);

            // パターンを描画
            patterns.forEach((pattern, index) => {
                const hue = (baseHue + index * colorShift) % 360;
                drawFractalPetals(0, 0, pattern.radius, pattern.petals,
                    pattern.amplitude, pattern.phase + rotation * pattern.speed, hue);
            });

            // 中心の光
            const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, 40);
            gradient.addColorStop(0, `hsla(${baseHue}, 100%, 80%, 0.8)`);
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(0, 0, 40, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            requestAnimationFrame(draw);
        }

        // イベントリスナー
        canvas.addEventListener('click', generateNew);

        document.getElementById('symmetry').addEventListener('input', (e) => {
            symmetry = parseInt(e.target.value);
            document.getElementById('symmetry-value').textContent = symmetry;
        });

        document.getElementById('complexity').addEventListener('input', (e) => {
            complexity = parseInt(e.target.value);
            document.getElementById('complexity-value').textContent = complexity;
            generatePatterns();
        });

        document.getElementById('color-shift').addEventListener('input', (e) => {
            colorShift = parseInt(e.target.value);
            document.getElementById('color-shift-value').textContent = colorShift;
        });

        document.getElementById('rotation').addEventListener('input', (e) => {
            rotationSpeed = parseFloat(e.target.value);
            document.getElementById('rotation-value').textContent = rotationSpeed;
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // タッチデバイス対応
        if ('ontouchstart' in window) {
            canvas.style.width = '300px';
            canvas.style.height = '300px';
        }

        // 初期化
        generatePatterns();
        draw();
    </script>
</body>
</html>
