<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Quantum Dreams | Generative Art by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="title">Midnight Quantum Dreams</div>
    <div class="info">Click to create quantum ripples | Move to influence dreamscape</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let ripples = [];
        let mouseX = 0, mouseY = 0;
        let time = 0;

        // Unique seed based on timestamp
        const seed = Date.now();
        const random = (s) => {
            const x = Math.sin(s++) * 10000;
            return x - Math.floor(x);
        };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor(x, y, seedOffset) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.baseX = this.x;
                this.baseY = this.y;
                this.size = random(seed + seedOffset) * 3 + 1;
                this.speedX = (random(seed + seedOffset + 1) - 0.5) * 0.5;
                this.speedY = (random(seed + seedOffset + 2) - 0.5) * 0.5;
                this.angle = random(seed + seedOffset + 3) * Math.PI * 2;
                this.amplitude = random(seed + seedOffset + 4) * 50 + 20;
                this.frequency = random(seed + seedOffset + 5) * 0.02 + 0.01;
                this.phase = random(seed + seedOffset + 6) * Math.PI * 2;
                this.hue = random(seed + seedOffset + 7) * 60 + 220; // Blue-purple range
                this.alpha = random(seed + seedOffset + 8) * 0.5 + 0.2;
                this.glowIntensity = random(seed + seedOffset + 9) * 20 + 10;
            }

            update(rippleInfluence = { x: 0, y: 0, strength: 0 }) {
                // Quantum wave motion
                this.angle += this.frequency;
                const waveX = Math.cos(this.angle + this.phase) * this.amplitude;
                const waveY = Math.sin(this.angle + this.phase) * this.amplitude;

                // Mouse influence
                const dx = mouseX - this.baseX;
                const dy = mouseY - this.baseY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const mouseInfluence = Math.max(0, 1 - dist / 300) * 50;

                // Ripple influence
                this.x = this.baseX + waveX + dx * 0.02 * mouseInfluence + rippleInfluence.x * rippleInfluence.strength;
                this.y = this.baseY + waveY + dy * 0.02 * mouseInfluence + rippleInfluence.y * rippleInfluence.strength;

                // Slow drift
                this.baseX += this.speedX;
                this.baseY += this.speedY;

                // Wrap around
                if (this.baseX < -50) this.baseX = width + 50;
                if (this.baseX > width + 50) this.baseX = -50;
                if (this.baseY < -50) this.baseY = height + 50;
                if (this.baseY > height + 50) this.baseY = -50;

                // Pulsing glow
                this.currentAlpha = this.alpha * (0.5 + Math.sin(time * 0.02 + this.phase) * 0.5);
            }

            draw() {
                ctx.save();
                
                // Outer glow
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 3
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 60%, ${this.currentAlpha})`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 80%, 50%, ${this.currentAlpha * 0.3})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 80%, 40%, 0)`);
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Core
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 80%, ${this.currentAlpha})`;
                ctx.shadowBlur = this.glowIntensity;
                ctx.shadowColor = `hsla(${this.hue}, 100%, 70%, 0.8)`;
                ctx.fill();

                ctx.restore();
            }
        }

        class Ripple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.random() * 200 + 150;
                this.speed = Math.random() * 2 + 1;
                this.alpha = 1;
                this.hue = Math.random() * 60 + 180; // Cyan to purple
                this.decay = 0.02;
            }

            update() {
                this.radius += this.speed;
                this.alpha -= this.decay;
                return this.alpha > 0;
            }

            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 100%, 70%, ${this.alpha * 0.5})`;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 20;
                ctx.shadowColor = `hsla(${this.hue}, 100%, 60%, ${this.alpha})`;
                ctx.stroke();

                // Secondary ring
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.7, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue + 30}, 100%, 60%, ${this.alpha * 0.3})`;
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.restore();
            }

            getInfluence(x, y) {
                const dx = x - this.x;
                const dy = y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const waveFront = Math.abs(dist - this.radius);
                
                if (waveFront < 50 && this.alpha > 0) {
                    const strength = (1 - waveFront / 50) * this.alpha * 30;
                    const angle = Math.atan2(dy, dx);
                    return {
                        x: Math.cos(angle) * strength,
                        y: Math.sin(angle) * strength,
                        strength: strength / 30
                    };
                }
                return { x: 0, y: 0, strength: 0 };
            }
        }

        function init() {
            resize();
            
            // Create particles
            const particleCount = Math.floor((width * height) / 15000);
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle(null, null, i));
            }
        }

        function animate() {
            // Fade effect for trails
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // Update and draw ripples
            ripples = ripples.filter(ripple => {
                const alive = ripple.update();
                if (alive) ripple.draw();
                return alive;
            });

            // Calculate ripple influence
            let totalInfluence = { x: 0, y: 0, strength: 0 };
            for (const particle of particles) {
                let particleInfluence = { x: 0, y: 0, strength: 0 };
                for (const ripple of ripples) {
                    const inf = ripple.getInfluence(particle.x, particle.y);
                    particleInfluence.x += inf.x;
                    particleInfluence.y += inf.y;
                    particleInfluence.strength += inf.strength;
                }
                particle.update(particleInfluence);
                particle.draw();
            }

            // Quantum entanglement lines (connections between nearby particles)
            ctx.strokeStyle = 'rgba(150, 200, 255, 0.03)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 80) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            time++;
            requestAnimationFrame(animate);
        }

        // Event listeners
        window.addEventListener('resize', resize);
        
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        window.addEventListener('click', (e) => {
            ripples.push(new Ripple(e.clientX, e.clientY));
            
            // Create multiple ripples for quantum effect
            setTimeout(() => ripples.push(new Ripple(e.clientX, e.clientY)), 100);
            setTimeout(() => ripples.push(new Ripple(e.clientX, e.clientY)), 200);
        });

        // Touch support
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            ripples.push(new Ripple(touch.clientX, touch.clientY));
        });

        // Initialize and start
        init();
        animate();
    </script>
</body>
</html>
