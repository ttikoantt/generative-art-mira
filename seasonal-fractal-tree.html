<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seasonal Fractal Tree</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }

        h1 {
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        #canvas {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 0.9rem;
            font-family: 'Courier New', monospace;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.1);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            background: rgba(100, 200, 255, 0.2);
            border-color: rgba(100, 200, 255, 0.3);
        }

        .info {
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.4rem;
            }

            .controls {
                gap: 8px;
            }

            button {
                padding: 10px 18px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌳 Seasonal Fractal Tree</h1>
        <p class="subtitle">季節と共に変化するフラクタルツリー</p>
        
        <canvas id="canvas" width="600" height="500"></canvas>
        
        <div class="controls">
            <button onclick="changeSeason('spring')">🌸 春</button>
            <button onclick="changeSeason('summer')">🌿 夏</button>
            <button onclick="changeSeason('autumn')">🍂 秋</button>
            <button onclick="changeSeason('winter')">❄️ 冬</button>
            <button onclick="toggleAnimation()" class="fullscreen-btn">⏯️ アニメーション</button>
            <button onclick="toggleFullscreen()" class="fullscreen-btn">🖥️ 全画面</button>
        </div>
        
        <p class="info">風が吹くと枝が揺れます • 各季節で色彩が変化</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let currentSeason = 'spring';
        let isAnimating = true;
        let animationFrame;
        let time = 0;
        let windPhase = 0;

        const seasons = {
            spring: {
                trunk: '#8B4513',
                leaf: ['#FFB7C5', '#FFC0CB', '#FFD1DC', '#FFE4E1'],
                leafFall: 0.3,
                bg: ['#87CEEB', '#E0F7FA']
            },
            summer: {
                trunk: '#654321',
                leaf: ['#228B22', '#32CD32', '#00FF00', '#90EE90'],
                leafFall: 0,
                bg: ['#1E90FF', '#87CEEB']
            },
            autumn: {
                trunk: '#8B4513',
                leaf: ['#FF6347', '#FF8C00', '#FFD700', '#DC143C'],
                leafFall: 0.6,
                bg: ['#FFA500', '#FFD700']
            },
            winter: {
                trunk: '#696969',
                leaf: ['#FFFFFF', '#F0F8FF', '#E6E6FA'],
                leafFall: 0.1,
                bg: ['#B0C4DE', '#E0FFFF']
            }
        };

        function changeSeason(season) {
            currentSeason = season;
        }

        function toggleAnimation() {
            isAnimating = !isAnimating;
            if (isAnimating) {
                animate();
            } else {
                cancelAnimationFrame(animationFrame);
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function drawTree(x, y, length, angle, depth, wind) {
            if (depth === 0) return;

            const season = seasons[currentSeason];
            const endX = x + length * Math.cos(angle + wind);
            const endY = y - length * Math.sin(angle + wind);

            // Draw branch
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = season.trunk;
            ctx.lineWidth = depth * 2;
            ctx.stroke();

            // Draw leaves at end of branches
            if (depth <= 3) {
                const leafSize = depth * 4;
                for (let i = 0; i < 3; i++) {
                    const leafX = endX + (Math.random() - 0.5) * leafSize * 2;
                    const leafY = endY + (Math.random() - 0.5) * leafSize * 2;

                    ctx.beginPath();
                    ctx.arc(leafX, leafY, leafSize, 0, Math.PI * 2);
                    ctx.fillStyle = season.leaf[Math.floor(Math.random() * season.leaf.length)];
                    ctx.globalAlpha = 0.7;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }

            // Recursive branches
            const newLength = length * 0.75;
            const angleOffset = Math.PI / 6 + Math.sin(time * 0.001 + depth) * 0.1;

            drawTree(endX, endY, newLength, angle + angleOffset, depth - 1, wind);
            drawTree(endX, endY, newLength, angle - angleOffset, depth - 1, wind);

            // Occasional third branch
            if (depth > 4 && Math.random() > 0.7) {
                drawTree(endX, endY, newLength * 0.8, angle, depth - 1, wind);
            }
        }

        function drawBackground() {
            const season = seasons[currentSeason];
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, season.bg[0]);
            gradient.addColorStop(1, season.bg[1]);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw sun/moon
            ctx.beginPath();
            ctx.arc(canvas.width - 80, 80, 40, 0, Math.PI * 2);
            if (currentSeason === 'winter') {
                ctx.fillStyle = '#F0F8FF';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#FFFFFF';
            } else {
                ctx.fillStyle = '#FFD700';
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#FFA500';
            }
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawFallingLeaves() {
            const season = seasons[currentSeason];
            if (season.leafFall === 0) return;

            for (let i = 0; i < 20; i++) {
                const x = (time * 50 + i * 30) % (canvas.width + 50) - 25;
                const y = (time * 30 + i * 40 + Math.sin(time * 0.001 + i) * 100) % (canvas.height + 50) - 25;

                ctx.beginPath();
                ctx.arc(x, y, 5 + Math.random() * 3, 0, Math.PI * 2);
                ctx.fillStyle = season.leaf[Math.floor(Math.random() * season.leaf.length)];
                ctx.globalAlpha = 0.8;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function animate() {
            if (!isAnimating) return;

            time++;
            windPhase += 0.02;
            const wind = Math.sin(windPhase) * 0.05;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBackground();
            drawFallingLeaves();

            // Draw tree
            const startX = canvas.width / 2;
            const startY = canvas.height - 50;
            drawTree(startX, startY, 100, Math.PI / 2, 10, wind);

            // Draw ground
            const season = seasons[currentSeason];
            ctx.fillStyle = currentSeason === 'winter' ? '#F0F8FF' : '#8B4513';
            ctx.fillRect(0, canvas.height - 30, canvas.width, 30);

            animationFrame = requestAnimationFrame(animate);
        }

        // Initial draw
        animate();
    </script>
</body>
</html>
