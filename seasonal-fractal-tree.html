<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Seasonal Fractal Tree</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'Helvetica Neue', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #canvas {
            display: block;
            cursor: grab;
        }

        #canvas:active {
            cursor: grabbing;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .season-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid white;
            cursor: pointer;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .season-btn:hover {
            transform: scale(1.1);
        }

        .season-btn.active {
            transform: scale(1.15);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        .season-btn.spring { background: linear-gradient(135deg, #ffb7c5, #ff69b4); }
        .season-btn.summer { background: linear-gradient(135deg, #90EE90, #228B22); }
        .season-btn.autumn { background: linear-gradient(135deg, #FF8C00, #8B4513); }
        .season-btn.winter { background: linear-gradient(135deg, #E0FFFF, #4682B4); }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 14px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <div id="seasonName">🌸 Spring</div>
        <div style="font-size: 12px; opacity: 0.8; margin-top: 5px;">
            ドラッグで角度調整
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="controls">
        <button class="season-btn spring active" onclick="setSeason('spring')">🌸</button>
        <button class="season-btn summer" onclick="setSeason('summer')">🌿</button>
        <button class="season-btn autumn" onclick="setSeason('autumn')">🍂</button>
        <button class="season-btn winter" onclick="setSeason('winter')">❄️</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let currentSeason = 'spring';
        let branchAngle = 25;
        let isDragging = false;
        let lastX = 0;

        // 季節の設定
        const seasons = {
            spring: {
                name: '🌸 Spring',
                bgColor: ['#FFB7C5', '#FFE4E1', '#FFF0F5'],
                leafColors: ['#FFB7C5', '#FF69B4', '#FFC0CB', '#FF1493'],
                leafType: 'flower',
                showLeaves: true,
                showSnow: false
            },
            summer: {
                name: '🌿 Summer',
                bgColor: ['#87CEEB', '#B0E0E6', '#E0F7FA'],
                leafColors: ['#228B22', '#32CD32', '#90EE90', '#00FF7F'],
                leafType: 'leaf',
                showLeaves: true,
                showSnow: false
            },
            autumn: {
                name: '🍂 Autumn',
                bgColor: ['#FFE4B5', '#FFDAB9', '#FAEBD7'],
                leafColors: ['#FF8C00', '#FF4500', '#DC143C', '#FF6347', '#8B4513'],
                leafType: 'leaf',
                showLeaves: true,
                showSnow: false
            },
            winter: {
                name: '❄️ Winter',
                bgColor: ['#1a1a2e', '#16213e', '#0f3460'],
                leafColors: [],
                leafType: 'none',
                showLeaves: false,
                showSnow: true
            }
        };

        // 雪の粒子
        let snowflakes = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function setSeason(season) {
            currentSeason = season;
            document.getElementById('seasonName').textContent = seasons[season].name;

            document.querySelectorAll('.season-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.season-btn.${season}`).classList.add('active');

            if (season === 'winter') {
                initSnowflakes();
            }

            draw();
        }

        function drawBranch(x, y, length, angle, depth) {
            if (depth === 0) {
                // 葉っぱや花を描く
                const season = seasons[currentSeason];
                if (season.showLeaves && Math.random() > 0.3) {
                    const color = season.leafColors[Math.floor(Math.random() * season.leafColors.length)];
                    ctx.fillStyle = color;

                    if (season.leafType === 'flower') {
                        // 花
                        ctx.beginPath();
                        ctx.arc(x, y, 4 + Math.random() * 3, 0, Math.PI * 2);
                        ctx.fill();

                        // 花びら
                        for (let i = 0; i < 5; i++) {
                            const petalAngle = (i / 5) * Math.PI * 2;
                            const px = x + Math.cos(petalAngle) * 6;
                            const py = y + Math.sin(petalAngle) * 6;
                            ctx.beginPath();
                            ctx.arc(px, py, 2, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    } else {
                        // 葉
                        ctx.beginPath();
                        ctx.ellipse(x, y, 5 + Math.random() * 3, 3 + Math.random() * 2, angle, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                return;
            }

            const endX = x + Math.cos(angle) * length;
            const endY = y + Math.sin(angle) * length;

            // 枝を描く
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);

            const branchWidth = depth * 1.5;
            ctx.lineWidth = branchWidth;
            ctx.strokeStyle = currentSeason === 'winter' ? '#4a4a4a' : '#8B4513';
            ctx.lineCap = 'round';
            ctx.stroke();

            // 再帰的に枝を描く
            const newLength = length * 0.7;
            const angleOffset = (branchAngle * Math.PI) / 180;

            drawBranch(endX, endY, newLength, angle - angleOffset, depth - 1);
            drawBranch(endX, endY, newLength, angle + angleOffset, depth - 1);
        }

        function initSnowflakes() {
            snowflakes = [];
            for (let i = 0; i < 150; i++) {
                snowflakes.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 3 + 1,
                    speed: Math.random() * 1 + 0.5,
                    wind: Math.random() * 0.5 - 0.25
                });
            }
        }

        function drawSnow() {
            ctx.fillStyle = 'white';
            snowflakes.forEach(flake => {
                ctx.beginPath();
                ctx.arc(flake.x, flake.y, flake.radius, 0, Math.PI * 2);
                ctx.fill();

                flake.y += flake.speed;
                flake.x += flake.wind;

                if (flake.y > height) {
                    flake.y = -10;
                    flake.x = Math.random() * width;
                }
                if (flake.x > width) flake.x = 0;
                if (flake.x < 0) flake.x = width;
            });
        }

        function drawBackground() {
            const season = seasons[currentSeason];
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, season.bgColor[0]);
            gradient.addColorStop(0.5, season.bgColor[1]);
            gradient.addColorStop(1, season.bgColor[2]);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }

        function draw() {
            drawBackground();

            // フラクタル木を描く
            const startX = width / 2;
            const startY = height;
            const initialLength = Math.min(width, height) * 0.25;
            const initialDepth = 10;

            drawBranch(startX, startY, initialLength, -Math.PI / 2, initialDepth);

            // 冬なら雪を描く
            if (seasons[currentSeason].showSnow) {
                drawSnow();
            }
        }

        function animate() {
            draw();
            if (seasons[currentSeason].showSnow) {
                requestAnimationFrame(animate);
            }
        }

        // ドラッグで角度調整
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastX = e.clientX;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - lastX;
            branchAngle = Math.max(10, Math.min(60, branchAngle + deltaX * 0.5));
            lastX = e.clientX;
            if (!seasons[currentSeason].showSnow) {
                draw();
            }
        });

        canvas.addEventListener('mouseup', () => {
            isDragging = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
        });

        // タッチ対応
        canvas.addEventListener('touchstart', (e) => {
            isDragging = true;
            lastX = e.touches[0].clientX;
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const deltaX = e.touches[0].clientX - lastX;
            branchAngle = Math.max(10, Math.min(60, branchAngle + deltaX * 0.5));
            lastX = e.touches[0].clientX;
            if (!seasons[currentSeason].showSnow) {
                draw();
            }
        });

        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', () => {
            resize();
            draw();
        });

        // 初期化
        resize();
        animate();
    </script>
</body>
</html>
