<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Rush - コイン集めゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #fff;
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }

        #gameCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .game-ui {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
            width: 90%;
            max-width: 600px;
        }

        .score-display {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 30px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 215, 0, 0.3);
            display: inline-block;
            margin-bottom: 10px;
        }

        .score-display h2 {
            font-size: 1rem;
            color: #ffd700;
            margin-bottom: 5px;
        }

        .score-display .score {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .lives-display {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 0, 0, 0.3);
            display: inline-block;
        }

        .lives-display .heart {
            display: inline-block;
            font-size: 1.5rem;
            margin: 0 2px;
        }

        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 15px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #startBtn {
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            color: #000;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }

        #startBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.6);
        }

        #restartBtn {
            background: linear-gradient(45deg, #00d4ff, #7c3aed);
            color: white;
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        #restartBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.6);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            backdrop-filter: blur(5px);
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay p {
            font-size: 1.2rem;
            color: #a0a0a0;
            margin-bottom: 30px;
            text-align: center;
            max-width: 400px;
            padding: 0 20px;
        }

        .overlay .final-score {
            font-size: 3rem;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 20px;
        }

        .mobile-controls {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 20px;
            display: none;
        }

        .mobile-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s ease;
            user-select: none;
            -webkit-user-select: none;
        }

        .mobile-btn:active {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .mobile-controls {
                display: flex;
            }

            .controls {
                bottom: 20px;
            }

            button {
                padding: 12px 24px;
                font-size: 0.9rem;
            }
        }

        .instructions {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
            color: #a0a0a0;
            font-size: 0.9rem;
            display: none;
        }

        @media (min-width: 769px) {
            .instructions {
                display: block;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="game-ui">
        <div class="score-display">
            <h2>SCORE</h2>
            <div class="score" id="score">0</div>
        </div>
        <div class="lives-display">
            <span class="heart" id="heart1">❤️</span>
            <span class="heart" id="heart2">❤️</span>
            <span class="heart" id="heart3">❤️</span>
        </div>
    </div>

    <div class="instructions">
        ← → キーで移動 / スペースでジャンプ
    </div>

    <div class="mobile-controls">
        <button class="mobile-btn" id="leftBtn">◀</button>
        <button class="mobile-btn" id="rightBtn">▶</button>
        <button class="mobile-btn" id="jumpBtn">▲</button>
    </div>

    <div class="controls">
        <button id="startBtn">🎮 スタート</button>
    </div>

    <div class="overlay" id="startOverlay">
        <h1>Coin Rush</h1>
        <p>落ちてくるコインを集めて、爆弾を避けよう！<br>左右に移動してスコアを目指せ！</p>
        <button id="overlayStartBtn">🎮 ゲームスタート</button>
    </div>

    <div class="overlay hidden" id="gameOverOverlay">
        <h1>Game Over</h1>
        <div class="final-score" id="finalScore">0</div>
        <p>素晴らしいスコアです！</p>
        <button id="overlayRestartBtn">🔄 もう一度プレイ</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // UI要素
        const scoreDisplay = document.getElementById('score');
        const finalScoreDisplay = document.getElementById('finalScore');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const overlayStartBtn = document.getElementById('overlayStartBtn');
        const overlayRestartBtn = document.getElementById('overlayRestartBtn');

        // モバイルコントロール
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');
        const jumpBtn = document.getElementById('jumpBtn');

        // ゲーム変数
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let animationId;

        // キャンバスサイズ設定
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // プレイヤークラス
        class Player {
            constructor() {
                this.width = 50;
                this.height = 50;
                this.x = canvas.width / 2 - this.width / 2;
                this.y = canvas.height - 100;
                this.speed = 8;
                this.velocityY = 0;
                this.jumping = false;
                this.gravity = 0.8;
            }

            update(keys) {
                // 左右移動
                if (keys.left && this.x > 0) {
                    this.x -= this.speed;
                }
                if (keys.right && this.x < canvas.width - this.width) {
                    this.x += this.speed;
                }

                // ジャンプ
                if (keys.jump && !this.jumping) {
                    this.velocityY = -15;
                    this.jumping = true;
                }

                // 重力
                this.velocityY += this.gravity;
                this.y += this.velocityY;

                // 地面に着地
                if (this.y >= canvas.height - 100) {
                    this.y = canvas.height - 100;
                    this.velocityY = 0;
                    this.jumping = false;
                }
            }

            draw() {
                // 本体
                ctx.fillStyle = '#00d4ff';
                ctx.fillRect(this.x, this.y, this.width, this.height);

                // 目
                ctx.fillStyle = '#000';
                ctx.fillRect(this.x + 10, this.y + 10, 10, 10);
                ctx.fillRect(this.x + 30, this.y + 10, 10, 10);

                // 口
                ctx.fillStyle = '#000';
                ctx.fillRect(this.x + 15, this.y + 30, 20, 5);
            }
        }

        // アイテムクラス
        class Item {
            constructor() {
                this.size = 30;
                this.x = Math.random() * (canvas.width - this.size);
                this.y = -this.size;
                this.speed = 3 + Math.random() * 2;
                this.type = Math.random() < 0.3 ? 'bomb' : 'coin';
            }

            update() {
                this.y += this.speed;
            }

            draw() {
                if (this.type === 'coin') {
                    // コイン
                    ctx.beginPath();
                    ctx.arc(this.x + this.size / 2, this.y + this.size / 2, this.size / 2, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffd700';
                    ctx.fill();
                    ctx.strokeStyle = '#ffed4e';
                    ctx.lineWidth = 3;
                    ctx.stroke();

                    // 光沢
                    ctx.beginPath();
                    ctx.arc(this.x + this.size / 2 - 5, this.y + this.size / 2 - 5, 5, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                    ctx.fill();
                } else {
                    // 爆弾
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(this.x + this.size / 2, this.y + this.size / 2, this.size / 2, 0, Math.PI * 2);
                    ctx.fill();

                    // 導火線
                    ctx.strokeStyle = '#8b4513';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(this.x + this.size / 2, this.y);
                    ctx.lineTo(this.x + this.size / 2 + 5, this.y - 10);
                    ctx.stroke();

                    // 火花
                    ctx.fillStyle = '#ff4500';
                    ctx.beginPath();
                    ctx.arc(this.x + this.size / 2 + 5, this.y - 10, 3, 0, Math.PI * 2);
                    ctx.fill();

                    // スカル
                    ctx.fillStyle = '#fff';
                    ctx.font = '16px Arial';
                    ctx.fillText('💀', this.x + 5, this.y + 22);
                }
            }

            isOffScreen() {
                return this.y > canvas.height;
            }

            collidesWith(player) {
                return this.x < player.x + player.width &&
                       this.x + this.size > player.x &&
                       this.y < player.y + player.height &&
                       this.y + this.size > player.y;
            }
        }

        // パーティクルクラス
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 5 + 2;
                this.speedX = (Math.random() - 0.5) * 8;
                this.speedY = (Math.random() - 0.5) * 8;
                this.color = color;
                this.alpha = 1;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= 0.02;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            isDead() {
                return this.alpha <= 0;
            }
        }

        // ゲームオブジェクト
        let player;
        let items = [];
        let particles = [];
        let keys = { left: false, right: false, jump: false };
        let spawnTimer = 0;
        let spawnInterval = 60;

        // 初期化
        function init() {
            player = new Player();
            items = [];
            particles = [];
            score = 0;
            lives = 3;
            spawnTimer = 0;
            spawnInterval = 60;
            updateUI();
        }

        // UI更新
        function updateUI() {
            scoreDisplay.textContent = score;
            for (let i = 1; i <= 3; i++) {
                const heart = document.getElementById(`heart${i}`);
                heart.textContent = i <= lives ? '❤️' : '🖤';
            }
        }

        // パーティクル生成
        function createParticles(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        // ゲームループ
        function gameLoop() {
            if (!gameRunning) return;

            // クリア
            ctx.fillStyle = 'rgba(15, 12, 41, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 背景の星
            for (let i = 0; i < 50; i++) {
                const x = (i * 137.5) % canvas.width;
                const y = (i * 73.5 + Date.now() * 0.01) % canvas.height;
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.5})`;
                ctx.beginPath();
                ctx.arc(x, y, 1, 0, Math.PI * 2);
                ctx.fill();
            }

            // プレイヤー更新
            player.update(keys);
            player.draw();

            // アイテムスポーン
            spawnTimer++;
            if (spawnTimer >= spawnInterval) {
                items.push(new Item());
                spawnTimer = 0;
                spawnInterval = Math.max(30, 60 - Math.floor(score / 100) * 5);
            }

            // アイテム更新
            items = items.filter(item => {
                item.update();
                item.draw();

                // 衝突判定
                if (item.collidesWith(player)) {
                    if (item.type === 'coin') {
                        score += 10;
                        createParticles(item.x, item.y, '#ffd700', 15);
                    } else {
                        lives--;
                        createParticles(item.x, item.y, '#ff0000', 20);
                        if (lives <= 0) {
                            gameOver();
                        }
                    }
                    updateUI();
                    return false;
                }

                return !item.isOffScreen();
            });

            // パーティクル更新
            particles = particles.filter(particle => {
                particle.update();
                particle.draw();
                return !particle.isDead();
            });

            animationId = requestAnimationFrame(gameLoop);
        }

        // ゲームオーバー
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            finalScoreDisplay.textContent = score;
            gameOverOverlay.classList.remove('hidden');
            startBtn.style.display = 'none';
        }

        // ゲーム開始
        function startGame() {
            init();
            gameRunning = true;
            startOverlay.classList.add('hidden');
            gameOverOverlay.classList.add('hidden');
            startBtn.style.display = 'none';
            restartBtn.style.display = 'block';
            gameLoop();
        }

        // イベントリスナー
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') keys.left = true;
            if (e.key === 'ArrowRight') keys.right = true;
            if (e.key === ' ') {
                keys.jump = true;
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') keys.left = false;
            if (e.key === 'ArrowRight') keys.right = false;
            if (e.key === ' ') keys.jump = false;
        });

        // モバイルコントロール
        leftBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            keys.left = true;
        });
        leftBtn.addEventListener('touchend', () => {
            keys.left = false;
        });

        rightBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            keys.right = true;
        });
        rightBtn.addEventListener('touchend', () => {
            keys.right = false;
        });

        jumpBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            keys.jump = true;
        });
        jumpBtn.addEventListener('touchend', () => {
            keys.jump = false;
        });

        // ボタン
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);
        overlayStartBtn.addEventListener('click', startGame);
        overlayRestartBtn.addEventListener('click', startGame);

        // 初期化
        restartBtn.style.display = 'none';
        init();
    </script>
</body>
</html>
