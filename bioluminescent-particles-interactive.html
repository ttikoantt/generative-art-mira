<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bioluminescent Particles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 20px;
            color: #0ff;
            font-size: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            z-index: 100;
        }

        .btn {
            background: linear-gradient(135deg, #0ff, #00f);
            border: none;
            padding: 8px 20px;
            margin: 0 5px;
            border-radius: 15px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #0ff;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
            z-index: 100;
        }

        #fullscreenBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #0ff;
            color: #0ff;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            z-index: 100;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        #fullscreenBtn:hover {
            background: rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <div>✨ Bioluminescent Particles</div>
        <div style="margin-top: 5px; font-size: 12px; opacity: 0.7;">
            Move your mouse to attract particles<br>
            Click to create explosions
        </div>
    </div>

    <button id="fullscreenBtn">🔲 Fullscreen</button>

    <div id="controls">
        <button class="btn" onclick="changeMode('glow')">Glow</button>
        <button class="btn" onclick="changeMode('pulse')">Pulse</button>
        <button class="btn" onclick="changeMode('trail')">Trail</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let mouseX = width / 2;
        let mouseY = height / 2;
        let mode = 'glow';

        class Particle {
            constructor(x, y, isExplosion = false) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.size = Math.random() * 3 + 1;
                this.baseSize = this.size;
                this.speedX = (Math.random() - 0.5) * (isExplosion ? 8 : 2);
                this.speedY = (Math.random() - 0.5) * (isExplosion ? 8 : 2);
                this.hue = Math.random() * 60 + 150; // Cyan to blue range
                this.alpha = Math.random() * 0.5 + 0.5;
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.life = 1;
                this.decay = isExplosion ? 0.02 : 0;
                this.isExplosion = isExplosion;
            }

            update() {
                // Attract to mouse
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 200 && !this.isExplosion) {
                    const force = (200 - dist) / 200;
                    this.speedX += (dx / dist) * force * 0.3;
                    this.speedY += (dy / dist) * force * 0.3;
                }

                // Apply velocity with damping
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedX *= 0.98;
                this.speedY *= 0.98;

                // Wrap around edges
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;

                // Pulse effect
                this.pulsePhase += 0.05;
                if (mode === 'pulse') {
                    this.size = this.baseSize * (1 + Math.sin(this.pulsePhase) * 0.5);
                }

                // Decay for explosion particles
                if (this.isExplosion) {
                    this.life -= this.decay;
                    this.alpha = this.life;
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;

                // Glow effect
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 3
                );

                const hue = this.hue + Math.sin(this.pulsePhase) * 20;
                gradient.addColorStop(0, `hsla(${hue}, 100%, 70%, 1)`);
                gradient.addColorStop(0.5, `hsla(${hue}, 100%, 50%, 0.3)`);
                gradient.addColorStop(1, `hsla(${hue}, 100%, 50%, 0)`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                ctx.fill();

                // Core
                ctx.fillStyle = `hsla(${hue}, 100%, 80%, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        let particles = [];
        const particleCount = 150;

        // Initialize particles
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        // Mouse tracking
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });

        // Click to create explosion
        canvas.addEventListener('click', (e) => {
            createExplosion(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            createExplosion(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        function createExplosion(x, y) {
            for (let i = 0; i < 30; i++) {
                particles.push(new Particle(x, y, true));
            }
        }

        function changeMode(newMode) {
            mode = newMode;
        }

        // Fullscreen
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // Animation loop
        function animate() {
            // Trail effect
            if (mode === 'trail') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            } else {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            }
            ctx.fillRect(0, 0, width, height);

            // Update and draw particles
            particles = particles.filter(p => !p.isExplosion || p.life > 0);

            // Maintain particle count
            while (particles.length < particleCount) {
                particles.push(new Particle());
            }

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // Draw connections between nearby particles
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.1)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 80) {
                        ctx.globalAlpha = (80 - dist) / 80 * 0.3;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            ctx.globalAlpha = 1;

            requestAnimationFrame(animate);
        }

        // Handle resize
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        animate();
    </script>
</body>
</html>
