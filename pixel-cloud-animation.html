<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Cloud Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #8af;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(138, 170, 255, 0.3);
            z-index: 100;
        }

        .info h1 {
            font-size: 20px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #8af, #f8a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .info p {
            margin: 5px 0;
            opacity: 0.9;
        }

        .info .hint {
            color: #a8f;
            font-style: italic;
            margin-top: 10px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #4a6fa5, #6a4a9f);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            z-index: 100;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(74, 111, 165, 0.4);
        }

        .fullscreen-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(74, 111, 165, 0.6);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .info {
                top: 10px;
                left: 10px;
                padding: 10px 15px;
                font-size: 12px;
            }

            .info h1 {
                font-size: 16px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 10px 20px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="info">
        <h1>☁️ Pixel Cloud Animation</h1>
        <p>ピクセルが雲のように集まって形を作ります</p>
        <p class="hint">クリック/タッチでピクセルを乱してください</p>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // ピクセルの設定
        const PIXEL_SIZE = 4;
        const COLS = Math.floor(width / PIXEL_SIZE);
        const ROWS = Math.floor(height / PIXEL_SIZE);
        const TOTAL_PIXELS = COLS * ROWS;

        // ピクセル配列
        let pixels = [];

        // マウス/タッチの位置
        let mouseX = 0;
        let mouseY = 0;
        let mouseActive = false;

        // 時間
        let time = 0;

        // ピクセルクラス
        class Pixel {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.baseX = x;
                this.baseY = y;
                this.hue = 200 + Math.random() * 60;
                this.brightness = 50 + Math.random() * 30;
                this.alpha = 0.3 + Math.random() * 0.7;
                this.offset = Math.random() * Math.PI * 2;
                this.speed = 0.5 + Math.random() * 0.5;
                this.waveAmplitude = 10 + Math.random() * 20;
                this.displacement = { x: 0, y: 0 };
            }

            update(t) {
                // 波のような動き
                const waveX = Math.sin(t * this.speed + this.offset) * this.waveAmplitude;
                const waveY = Math.cos(t * this.speed * 0.7 + this.offset) * this.waveAmplitude * 0.5;

                // マウス/タッチによる乱れ
                if (mouseActive) {
                    const dx = this.baseX - mouseX;
                    const dy = this.baseY - mouseY;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 150) {
                        const force = (150 - dist) / 150;
                        const angle = Math.atan2(dy, dx);
                        this.displacement.x += Math.cos(angle) * force * 5;
                        this.displacement.y += Math.sin(angle) * force * 5;
                    }
                }

                // 乱れを徐々に戻す
                this.displacement.x *= 0.95;
                this.displacement.y *= 0.95;

                this.x = this.baseX + waveX + this.displacement.x;
                this.y = this.baseY + waveY + this.displacement.y;

                // 色の変化
                this.hue = 200 + Math.sin(t * 0.5 + this.offset) * 30;
                this.brightness = 50 + Math.cos(t * 0.3 + this.offset) * 20;
                this.alpha = 0.3 + Math.sin(t * 0.2 + this.offset) * 0.3;
            }

            draw() {
                ctx.fillStyle = `hsla(${this.hue}, 80%, ${this.brightness}%, ${this.alpha})`;
                ctx.fillRect(this.x * PIXEL_SIZE, this.y * PIXEL_SIZE, PIXEL_SIZE - 1, PIXEL_SIZE - 1);
            }
        }

        // ピクセルを初期化
        function initPixels() {
            pixels = [];
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    pixels.push(new Pixel(x, y));
                }
            }
        }

        // リサイズ時の処理
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initPixels();
        }

        // マウス/タッチイベント
        canvas.addEventListener('mousedown', (e) => {
            mouseActive = true;
            mouseX = e.clientX / PIXEL_SIZE;
            mouseY = e.clientY / PIXEL_SIZE;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (mouseActive) {
                mouseX = e.clientX / PIXEL_SIZE;
                mouseY = e.clientY / PIXEL_SIZE;
            }
        });

        canvas.addEventListener('mouseup', () => {
            mouseActive = false;
        });

        canvas.addEventListener('mouseleave', () => {
            mouseActive = false;
        });

        // タッチイベント
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouseActive = true;
            mouseX = e.touches[0].clientX / PIXEL_SIZE;
            mouseY = e.touches[0].clientY / PIXEL_SIZE;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (mouseActive) {
                mouseX = e.touches[0].clientX / PIXEL_SIZE;
                mouseY = e.touches[0].clientY / PIXEL_SIZE;
            }
        });

        canvas.addEventListener('touchend', () => {
            mouseActive = false;
        });

        window.addEventListener('resize', resize);

        // 全画面表示の切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // アニメーションループ
        function animate() {
            // 背景を少し透明にして残像効果
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, width, height);

            time += 0.02;

            // ピクセルを更新・描画
            pixels.forEach(pixel => {
                pixel.update(time);
                pixel.draw();
            });

            requestAnimationFrame(animate);
        }

        // 初期化
        initPixels();
        animate();
    </script>
</body>
</html>
