<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Pattern Generator | 幾何学的パターン・ジェネレーター</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: white;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .canvas-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        canvas {
            border-radius: 10px;
            display: block;
            max-width: 100%;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        button:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            text-align: center;
            max-width: 600px;
        }

        .info p {
            margin: 5px 0;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.5rem;
            }
            
            canvas {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <h1>🔷 幾何学的パターン・ジェネレーター</h1>
    <p class="subtitle">Geometric Pattern Generator</p>

    <div class="canvas-container">
        <canvas id="patternCanvas"></canvas>
    </div>

    <div class="controls">
        <button onclick="generateNew()">🎲 新しいパターン</button>
        <button onclick="toggleAnimation()">▶️ アニメーション</button>
        <button onclick="downloadPattern()">💾 保存</button>
    </div>

    <div class="info">
        <p><strong>操作方法:</strong></p>
        <p>• タップ/クリックで新しいパターンを生成</p>
        <p>• アニメーションボタンで動きを切り替え</p>
        <p>• 保存ボタンで画像をダウンロード</p>
    </div>

    <script>
        const canvas = document.getElementById('patternCanvas');
        const ctx = canvas.getContext('2d');

        // Canvas size
        const width = 600;
        const height = 600;
        canvas.width = width;
        canvas.height = height;

        let isAnimating = false;
        let animationId = null;
        let currentPattern = null;

        // Pattern types
        const patternTypes = ['spiral', 'mandala', 'fractal', 'waves', 'sacred'];

        // Color palettes
        const colorPalettes = [
            ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7'],
            ['#E74C3C', '#3498DB', '#2ECC71', '#F39C12', '#9B59B6'],
            ['#FF0080', '#FF8C00', '#40E0D0', '#FFD700', '#9400D3'],
            ['#00CED1', '#FF1493', '#00FF7F', '#FF4500', '#1E90FF'],
            ['#8B5CF6', '#EC4899', '#10B981', '#F59E0B', '#3B82F6']
        ];

        function getRandomElement(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function drawSpiral(colors, complexity) {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, width, height);

            const centerX = width / 2;
            const centerY = height / 2;
            const maxRadius = Math.min(width, height) * 0.45;

            ctx.lineWidth = 2;

            for (let i = 0; i < complexity * 100; i++) {
                const angle = i * 0.1;
                const radius = (i / (complexity * 100)) * maxRadius;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;

                ctx.beginPath();
                ctx.arc(x, y, 2 + (i % 5), 0, Math.PI * 2);
                ctx.fillStyle = colors[i % colors.length];
                ctx.globalAlpha = 0.7;
                ctx.fill();
            }

            // Add connecting lines
            ctx.globalAlpha = 0.1;
            for (let i = 0; i < complexity * 20; i++) {
                const angle1 = i * 0.5;
                const angle2 = angle1 + Math.PI / complexity;
                const radius = (i / (complexity * 20)) * maxRadius;

                const x1 = centerX + Math.cos(angle1) * radius;
                const y1 = centerY + Math.sin(angle1) * radius;
                const x2 = centerX + Math.cos(angle2) * radius;
                const y2 = centerY + Math.sin(angle2) * radius;

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = colors[i % colors.length];
                ctx.stroke();
            }

            ctx.globalAlpha = 1;
        }

        function drawMandala(colors, complexity) {
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, width, height);

            const centerX = width / 2;
            const centerY = height / 2;
            const layers = 5 + Math.floor(complexity / 3);
            const segments = 8 + complexity * 2;

            for (let layer = layers; layer > 0; layer--) {
                const radius = (layer / layers) * (Math.min(width, height) * 0.45);

                for (let i = 0; i < segments; i++) {
                    const angle = (i / segments) * Math.PI * 2;
                    const nextAngle = ((i + 1) / segments) * Math.PI * 2;

                    ctx.beginPath();
                    ctx.moveTo(centerX, centerY);
                    ctx.lineTo(
                        centerX + Math.cos(angle) * radius,
                        centerY + Math.sin(angle) * radius
                    );
                    ctx.lineTo(
                        centerX + Math.cos(nextAngle) * radius * 0.95,
                        centerY + Math.sin(nextAngle) * radius * 0.95
                    );
                    ctx.closePath();

                    ctx.fillStyle = colors[(layer + i) % colors.length];
                    ctx.globalAlpha = 0.6;
                    ctx.fill();

                    ctx.strokeStyle = colors[(layer + i + 1) % colors.length];
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }

                // Add decorative circles
                if (layer % 2 === 0) {
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius * 0.8, 0, Math.PI * 2);
                    ctx.strokeStyle = colors[layer % colors.length];
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }

            ctx.globalAlpha = 1;
        }

        function drawFractal(colors, complexity) {
            ctx.fillStyle = '#1e1e1e';
            ctx.fillRect(0, 0, width, height);

            function drawBranch(x, y, length, angle, depth) {
                if (depth === 0) return;

                const endX = x + Math.cos(angle) * length;
                const endY = y + Math.sin(angle) * length;

                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = colors[depth % colors.length];
                ctx.lineWidth = depth;
                ctx.globalAlpha = 0.8;
                ctx.stroke();

                const newLength = length * 0.7;
                const spread = Math.PI / (4 + complexity / 3);

                drawBranch(endX, endY, newLength, angle - spread, depth - 1);
                drawBranch(endX, endY, newLength, angle + spread, depth - 1);
            }

            const startX = width / 2;
            const startY = height * 0.9;
            const initialLength = height * 0.2;
            const maxDepth = 6 + Math.floor(complexity / 2);

            drawBranch(startX, startY, initialLength, -Math.PI / 2, maxDepth);

            ctx.globalAlpha = 1;
        }

        function drawWaves(colors, complexity) {
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#0c0c0c');
            gradient.addColorStop(1, '#1a1a2e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            const waveCount = 5 + complexity;
            const amplitude = 50 + complexity * 5;
            const frequency = 0.01 + complexity * 0.002;

            for (let w = 0; w < waveCount; w++) {
                ctx.beginPath();
                ctx.moveTo(0, height);

                for (let x = 0; x <= width; x += 5) {
                    const y = height / 2 + 
                              Math.sin(x * frequency + w * 0.5) * amplitude * Math.sin(w * 0.3) +
                              Math.cos(x * frequency * 1.5 + w * 0.3) * amplitude * 0.5;
                    ctx.lineTo(x, y);
                }

                ctx.lineTo(width, height);
                ctx.closePath();

                ctx.fillStyle = colors[w % colors.length];
                ctx.globalAlpha = 0.3 + (w / waveCount) * 0.4;
                ctx.fill();
            }

            ctx.globalAlpha = 1;
        }

        function drawSacred(colors, complexity) {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, width, height);

            const centerX = width / 2;
            const centerY = height / 2;
            const shapes = 3 + complexity;

            for (let s = 0; s < shapes; s++) {
                const radius = 50 + s * 40;
                const sides = 3 + s;
                const rotation = s * 0.2;

                ctx.beginPath();
                for (let i = 0; i <= sides; i++) {
                    const angle = (i / sides) * Math.PI * 2 + rotation;
                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;

                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.closePath();

                ctx.strokeStyle = colors[s % colors.length];
                ctx.lineWidth = 2;
                ctx.globalAlpha = 0.7;
                ctx.stroke();

                ctx.fillStyle = colors[s % colors.length];
                ctx.globalAlpha = 0.1;
                ctx.fill();
            }

            // Add center circle
            ctx.beginPath();
            ctx.arc(centerX, centerY, 30, 0, Math.PI * 2);
            ctx.fillStyle = colors[0];
            ctx.globalAlpha = 0.8;
            ctx.fill();

            ctx.globalAlpha = 1;
        }

        function generatePattern() {
            const patternType = getRandomElement(patternTypes);
            const colors = getRandomElement(colorPalettes);
            const complexity = getRandomInt(3, 10);

            currentPattern = {
                type: patternType,
                colors: colors,
                complexity: complexity
            };

            switch (patternType) {
                case 'spiral':
                    drawSpiral(colors, complexity);
                    break;
                case 'mandala':
                    drawMandala(colors, complexity);
                    break;
                case 'fractal':
                    drawFractal(colors, complexity);
                    break;
                case 'waves':
                    drawWaves(colors, complexity);
                    break;
                case 'sacred':
                    drawSacred(colors, complexity);
                    break;
            }

            // Add watermark
            ctx.globalAlpha = 0.5;
            ctx.font = '14px Arial';
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.textAlign = 'right';
            ctx.fillText('Geometric Pattern Generator', width - 10, height - 10);
            ctx.globalAlpha = 1;
        }

        function generateNew() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            isAnimating = false;
            generatePattern();
        }

        function toggleAnimation() {
            isAnimating = !isAnimating;

            if (isAnimating) {
                animate();
            } else if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
        }

        let animationOffset = 0;
        function animate() {
            if (!isAnimating) return;

            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            const colors = currentPattern.colors;
            const centerX = width / 2;
            const centerY = height / 2;
            const time = Date.now() * 0.001;

            for (let i = 0; i < 50; i++) {
                const angle = i * 0.3 + time;
                const radius = 100 + Math.sin(time + i * 0.2) * 50;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;

                ctx.beginPath();
                ctx.arc(x, y, 5 + Math.sin(time + i) * 3, 0, Math.PI * 2);
                ctx.fillStyle = colors[i % colors.length];
                ctx.globalAlpha = 0.7;
                ctx.fill();
            }

            ctx.globalAlpha = 1;
            animationId = requestAnimationFrame(animate);
        }

        function downloadPattern() {
            const link = document.createElement('a');
            link.download = `geometric-pattern-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        // Generate initial pattern
        generateNew();

        // Click on canvas to generate new
        canvas.addEventListener('click', generateNew);
    </script>
</body>
</html>
