<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Tower - ジェネレーティブアート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        h1 {
            color: #00ffff;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #00ffff;
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            height: 70vh;
            background: #0a0a1a;
            border: 2px solid #1a1a3a;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        label {
            color: #00ffff;
            font-size: 0.8rem;
        }

        input[type="range"] {
            width: 150px;
            accent-color: #00ffff;
        }

        button {
            background: linear-gradient(135deg, #00ffff, #0088ff);
            color: #0a0a1a;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .stats {
            color: #00ffff;
            font-size: 0.8rem;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            #canvas-container {
                height: 60vh;
            }

            input[type="range"] {
                width: 120px;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗼 Fractal Tower</h1>
        <p class="subtitle">マウスを動かしてフラクタルタワーを操作</p>

        <div id="canvas-container">
            <canvas id="canvas"></canvas>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>複雑さ: <span id="complexity-value">8</span></label>
                <input type="range" id="complexity" min="3" max="12" value="8">
            </div>

            <div class="control-group">
                <label>広がり: <span id="spread-value">45</span>°</label>
                <input type="range" id="spread" min="10" max="90" value="45">
            </div>

            <div class="control-group">
                <label>色相: <span id="hue-value">180</span></label>
                <input type="range" id="hue" min="0" max="360" value="180">
            </div>

            <button onclick="regenerate()">🔄 再生成</button>
        </div>

        <div class="stats">
            <span id="stats">部品数: 0 | 深さ: 0</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let mouseX = 0;
        let mouseY = 0;
        let complexity = 8;
        let spread = 45;
        let baseHue = 180;
        let componentCount = 0;
        let maxDepth = 0;

        function resize() {
            const container = document.getElementById('canvas-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            draw();
        }

        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = (e.clientX - rect.left) / canvas.width;
            mouseY = (e.clientY - rect.top) / canvas.height;
            draw();
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            mouseX = (touch.clientX - rect.left) / canvas.width;
            mouseY = (touch.clientY - rect.top) / canvas.height;
            draw();
        }, { passive: false });

        document.getElementById('complexity').addEventListener('input', (e) => {
            complexity = parseInt(e.target.value);
            document.getElementById('complexity-value').textContent = complexity;
            draw();
        });

        document.getElementById('spread').addEventListener('input', (e) => {
            spread = parseInt(e.target.value);
            document.getElementById('spread-value').textContent = spread;
            draw();
        });

        document.getElementById('hue').addEventListener('input', (e) => {
            baseHue = parseInt(e.target.value);
            document.getElementById('hue-value').textContent = baseHue;
            draw();
        });

        function drawBranch(x, y, length, angle, depth, maxDepth) {
            componentCount++;
            if (depth > maxDepth) {
                maxDepth = depth;
            }

            const endX = x + length * Math.cos(angle);
            const endY = y + length * Math.sin(angle);

            const hue = (baseHue + depth * 20) % 360;
            const saturation = 70 + depth * 3;
            const lightness = 50 + depth * 2;
            const alpha = 1 - (depth / maxDepth) * 0.3;

            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = `hsla(${hue}, ${saturation}%, ${lightness}%, ${alpha})`;
            ctx.lineWidth = Math.max(1, (maxDepth - depth) * 1.5);
            ctx.lineCap = 'round';
            ctx.stroke();

            if (depth < complexity) {
                const newLength = length * 0.7;
                const angleOffset = (spread * Math.PI / 180) * (1 + mouseY * 0.5);
                const depthFactor = 1 + mouseX * 0.5;

                drawBranch(endX, endY, newLength * depthFactor, angle - angleOffset, depth + 1, maxDepth);
                drawBranch(endX, endY, newLength * depthFactor, angle + angleOffset, depth + 1, maxDepth);

                if (depth < complexity / 2) {
                    drawBranch(endX, endY, newLength * 0.8, angle, depth + 1, maxDepth);
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            componentCount = 0;
            maxDepth = 0;

            const startX = canvas.width / 2;
            const startY = canvas.height;
            const initialLength = canvas.height * 0.25;

            drawBranch(startX, startY, initialLength, -Math.PI / 2, 0, 0);

            document.getElementById('stats').textContent = 
                `部品数: ${componentCount} | 深さ: ${maxDepth}`;
        }

        function regenerate() {
            baseHue = Math.random() * 360;
            document.getElementById('hue').value = Math.floor(baseHue);
            document.getElementById('hue-value').textContent = Math.floor(baseHue);
            draw();
        }

        resize();
    </script>
</body>
</html>
