<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量子場可視化 | Quantum Field Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #00ffff;
            font-size: 14px;
            text-shadow: 0 0 10px #00ffff;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 255, 0.2);
            color: #00ffff;
            border: 1px solid #00ffff;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        @media (max-width: 600px) {
            .info {
                font-size: 12px;
                bottom: 10px;
                left: 10px;
                padding: 10px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 15px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <div>🌌 量子場可視化</div>
        <div style="margin-top: 8px; font-size: 12px; color: #88ccff;">
            マウス/タッチで場を操作
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let mouseX = 0, mouseY = 0;
        let time = 0;

        // 量子場のパラメータ
        const fieldResolution = 20;
        let field = [];
        let cols, rows;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;

            cols = Math.ceil(width / fieldResolution);
            rows = Math.ceil(height / fieldResolution);

            initField();
        }

        function initField() {
            field = [];
            for (let i = 0; i < cols; i++) {
                field[i] = [];
                for (let j = 0; j < rows; j++) {
                    field[i][j] = {
                        wave: 0,
                        phase: Math.random() * Math.PI * 2,
                        amplitude: 0
                    };
                }
            }
        }

        function updateField() {
            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const x = i * fieldResolution;
                    const y = j * fieldResolution;

                    // マウスからの距離
                    const dx = x - mouseX;
                    const dy = y - mouseY;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    // 波動関数のシミュレーション
                    const wave1 = Math.sin((i + j) * 0.1 + time * 2);
                    const wave2 = Math.cos((i - j) * 0.15 + time * 1.5);
                    const wave3 = Math.sin(Math.sqrt(i * i + j * j) * 0.2 - time);

                    // 干渉パターン
                    let wave = (wave1 + wave2 + wave3) / 3;

                    // マウスの影響
                    const mouseInfluence = Math.exp(-dist / 200) * Math.sin(dist * 0.1 - time * 3);

                    field[i][j].wave = wave + mouseInfluence * 0.5;
                    field[i][j].amplitude = Math.abs(field[i][j].wave);
                    field[i][j].phase += 0.01;
                }
            }

            time += 0.016;
        }

        function drawField() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, width, height);

            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const x = i * fieldResolution;
                    const y = j * fieldResolution;
                    const cell = field[i][j];

                    // 波の振幅に基づいて色を計算
                    const amplitude = cell.amplitude;
                    const hue = (amplitude * 60 + time * 20) % 360;
                    const saturation = 80 + amplitude * 20;
                    const lightness = 30 + amplitude * 50;
                    const alpha = 0.3 + amplitude * 0.7;

                    // 量子の波動性を表現
                    const size = fieldResolution * (0.5 + amplitude * 0.5);

                    ctx.beginPath();
                    ctx.arc(x + fieldResolution / 2, y + fieldResolution / 2, size / 2, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${hue}, ${saturation}%, ${lightness}%, ${alpha})`;
                    ctx.fill();

                    // 干渉縞を描画
                    if (amplitude > 0.7) {
                        ctx.strokeStyle = `hsla(${hue}, ${saturation}%, ${lightness + 20}%, ${alpha * 0.5})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }

            // 量子もつれを表現する線
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.1)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < 50; i++) {
                const x1 = Math.random() * width;
                const y1 = Math.random() * height;
                const angle = Math.random() * Math.PI * 2;
                const length = 50 + Math.random() * 100;
                const x2 = x1 + Math.cos(angle) * length;
                const y2 = y1 + Math.sin(angle) * length;

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
        }

        function animate() {
            updateField();
            drawField();
            requestAnimationFrame(animate);
        }

        // イベントリスナー
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        resize();
        animate();
    </script>
</body>
</html>
