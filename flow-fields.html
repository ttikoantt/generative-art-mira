<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Fields - 有機的な流れのアート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="info">
        <div>Flow Fields</div>
        <div style="font-size: 12px; margin-top: 5px;">クリックでリセット</div>
    </div>

    <canvas id="canvas"></canvas>

    <div class="controls">
        <button class="btn" onclick="reset()">新規生成</button>
        <button class="btn fullscreen" onclick="toggleFullscreen()">全画面</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        let flowField = [];
        let cols, rows;
        const resolution = 20;
        const numberOfParticles = 2000;
        let animationId;
        let zIndex = 0;
        let colorOffset = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cols = Math.floor(canvas.width / resolution);
            rows = Math.floor(canvas.height / resolution);
            initFlowField();
        }

        function initFlowField() {
            flowField = [];
            const xoff = 0;
            const yoff = 0;

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const index = x + y * cols;
                    const angle = (Math.cos(x * 0.1) + Math.sin(y * 0.1)) * Math.PI;
                    flowField[index] = angle;
                }
            }
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = 0;
                this.vy = 0;
                this.history = [];
                this.maxLength = Math.random() * 50 + 20;
                this.speed = Math.random() * 2 + 1;
                this.hue = Math.random() * 60 + 180; // 青〜紫の範囲
            }

            update() {
                const x = Math.floor(this.x / resolution);
                const y = Math.floor(this.y / resolution);
                const index = x + y * cols;

                if (index >= 0 && index < flowField.length) {
                    const angle = flowField[index];
                    this.vx += Math.cos(angle) * 0.1;
                    this.vy += Math.sin(angle) * 0.1;
                }

                // 速度制限
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > this.speed) {
                    this.vx = (this.vx / speed) * this.speed;
                    this.vy = (this.vy / speed) * this.speed;
                }

                this.history.push({ x: this.x, y: this.y });

                if (this.history.length > this.maxLength) {
                    this.history.shift();
                }

                this.x += this.vx;
                this.y += this.vy;

                // 画面外に出たらリセット
                if (this.x < 0 || this.x > canvas.width ||
                    this.y < 0 || this.y > canvas.height) {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.history = [];
                    this.hue = Math.random() * 60 + 180 + colorOffset;
                }

                this.vx *= 0.95;
                this.vy *= 0.95;
            }

            draw() {
                if (this.history.length < 2) return;

                ctx.beginPath();
                ctx.moveTo(this.history[0].x, this.history[0].y);

                for (let i = 1; i < this.history.length; i++) {
                    ctx.lineTo(this.history[i].x, this.history[i].y);
                }

                const alpha = Math.min(1, this.history.length / 10);
                ctx.strokeStyle = `hsla(${this.hue}, 80%, 60%, ${alpha * 0.6})`;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < numberOfParticles; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            // トレイル効果
            ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            colorOffset += 0.1;
            animationId = requestAnimationFrame(animate);
        }

        function reset() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            colorOffset += 30;
            initParticles();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // クリックでリセット
        canvas.addEventListener('click', (e) => {
            if (e.target === canvas) {
                reset();
            }
        });

        window.addEventListener('resize', resize);

        // 初期化
        resize();
        initParticles();
        animate();
    </script>
</body>
</html>
