<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flow Fields - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            color: #fff;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        #canvas {
            display: block;
            max-width: 100%;
            max-height: 100vh;
            box-shadow: 0 0 50px rgba(102, 126, 234, 0.3);
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(10, 10, 10, 0.9);
            padding: 15px 20px;
            border-radius: 15px;
            color: #fff;
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            padding: 0;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1rem;
            }

            button {
                padding: 8px 16px;
                font-size: 0.8rem;
            }

            .info {
                font-size: 0.75rem;
                padding: 10px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌊 Flow Fields</h1>
        <div class="controls">
            <button onclick="generate()">新規生成</button>
            <button onclick="changeColorScheme()">カラー変更</button>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <div class="info">
        <div>パーティクル: <span id="particleCount">0</span></div>
        <div>スキーム: <span id="schemeName">オーシャン</span></div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        let flowField = [];
        let animationId;
        let colorSchemeIndex = 0;

        const colorSchemes = [
            { name: 'オーシャン', colors: ['#0077b6', '#00b4d8', '#90e0ef', '#caf0f8'] },
            { name: 'サンセット', colors: ['#ff6b6b', '#feca57', '#ff9ff3', '#54a0ff'] },
            { name: 'フォレスト', colors: ['#00b894', '#55efc4', '#81ecec', '#74b9ff'] },
            { name: 'ネオン', colors: ['#a29bfe', '#fd79a8', '#fdcb6e', '#00cec9'] },
            { name: 'モノクロ', colors: ['#2d3436', '#636e72', '#b2bec3', '#dfe6e9'] }
        ];

        function resize() {
            canvas.width = Math.min(window.innerWidth, 1200);
            canvas.height = Math.min(window.innerHeight - 100, 800);
        }

        function setup() {
            resize();
            generate();
            animate();
        }

        function generate() {
            // クリア
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // パーティクル初期化
            particles = [];
            const numParticles = 3000;

            for (let i = 0; i < numParticles; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: 0,
                    vy: 0,
                    life: Math.random() * 500 + 200,
                    maxLife: 700
                });
            }

            // フロー場生成
            flowField = [];
            const scale = 0.01;
            for (let y = 0; y < canvas.height; y += 5) {
                for (let x = 0; x < canvas.width; x += 5) {
                    const angle = (Math.cos(x * scale) + Math.sin(y * scale)) * Math.PI;
                    flowField.push({
                        x: x,
                        y: y,
                        angle: angle
                    });
                }
            }

            document.getElementById('particleCount').textContent = numParticles;
        }

        function changeColorScheme() {
            colorSchemeIndex = (colorSchemeIndex + 1) % colorSchemes.length;
            const scheme = colorSchemes[colorSchemeIndex];
            document.getElementById('schemeName').textContent = scheme.name;
            generate();
        }

        function getFlowAngle(x, y) {
            const scale = 0.008;
            const timeOffset = Date.now() * 0.0001;
            return (Math.cos(x * scale + timeOffset) + Math.sin(y * scale + timeOffset)) * Math.PI;
        }

        function animate() {
            const scheme = colorSchemes[colorSchemeIndex];

            particles.forEach((p, index) => {
                // フロー場から角度を取得
                const angle = getFlowAngle(p.x, p.y);

                // 加速
                p.vx += Math.cos(angle) * 0.5;
                p.vy += Math.sin(angle) * 0.5;

                // 摩擦
                p.vx *= 0.95;
                p.vy *= 0.95;

                // 位置更新
                p.x += p.vx;
                p.y += p.vy;

                // ライフ減少
                p.life--;

                // 描画
                const alpha = p.life / p.maxLife;
                const colorIndex = Math.floor((p.x / canvas.width) * scheme.colors.length);
                const color = scheme.colors[Math.min(colorIndex, scheme.colors.length - 1)];

                ctx.beginPath();
                ctx.arc(p.x, p.y, 1, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.globalAlpha = alpha * 0.3;
                ctx.fill();
                ctx.globalAlpha = 1;

                // リセット
                if (p.life <= 0 || p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) {
                    p.x = Math.random() * canvas.width;
                    p.y = Math.random() * canvas.height;
                    p.vx = 0;
                    p.vy = 0;
                    p.life = Math.random() * 500 + 200;
                }
            });

            animationId = requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', () => {
            resize();
            generate();
        });

        // 初期化
        setup();
    </script>
</body>
</html>
