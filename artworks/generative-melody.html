<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generative Melody - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 900px;
            width: 100%;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #a0a0a0;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .canvas-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        #visualizer {
            width: 100%;
            height: 300px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        button {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .play-btn {
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            color: white;
        }

        .play-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
        }

        .stop-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .stop-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .info {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .info-label {
            color: #a0a0a0;
        }

        .info-value {
            color: #00d4ff;
            font-weight: 600;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .canvas-container {
                padding: 20px;
            }

            #visualizer {
                height: 200px;
            }

            button {
                padding: 12px 30px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <h1>🎵 Generative Melody</h1>
        <p class="subtitle">AIが生成する無限の旋律</p>

        <div class="canvas-container">
            <canvas id="visualizer"></canvas>
        </div>

        <div class="controls">
            <button class="play-btn" onclick="startMusic()">▶ 再生</button>
            <button class="stop-btn" onclick="stopMusic()">⏹ 停止</button>
        </div>

        <div class="info">
            <div class="info-item">
                <span class="info-label">🎼 音階</span>
                <span class="info-value">ペンタトニックスケール</span>
            </div>
            <div class="info-item">
                <span class="info-label">🎹 生成方法</span>
                <span class="info-value">確率的アルゴリズム</span>
            </div>
            <div class="info-item">
                <span class="info-label">🎨 ビジュアライゼーション</span>
                <span class="info-value">リアルタイム波形</span>
            </div>
            <div class="info-item">
                <span class="info-label">🎵 再生中の音符</span>
                <span class="info-value" id="noteCount">0</span>
            </div>
        </div>
    </div>

    <script>
        let audioContext;
        let analyser;
        let isPlaying = false;
        let animationId;
        let noteCount = 0;
        let melodyInterval;

        // ペンタトニックスケール（Cメジャーペンタトニック）
        const scale = [
            261.63,  // C4
            293.66,  // D4
            329.63,  // E4
            392.00,  // G4
            440.00,  // A4
            523.25,  // C5
            587.33,  // D5
            659.25,  // E5
            783.99,  // G5
            880.00   // A5
        ];

        function initAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
        }

        function playNote(frequency, duration) {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(analyser);
            analyser.connect(audioContext.destination);

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);

            noteCount++;
            document.getElementById('noteCount').textContent = noteCount;
        }

        function generateMelody() {
            if (!isPlaying) return;

            // ランダムに音符を選択（ペンタトニックスケールから）
            const noteIndex = Math.floor(Math.random() * scale.length);
            const frequency = scale[noteIndex];

            // ランダムな長さ（0.2秒〜0.6秒）
            const duration = 0.2 + Math.random() * 0.4;

            playNote(frequency, duration);

            // 次の音符までの待ち時間（0.1秒〜0.4秒）
            const nextNoteTime = 100 + Math.random() * 300;
            melodyInterval = setTimeout(generateMelody, nextNoteTime);
        }

        function drawVisualizer() {
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');

            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function draw() {
                animationId = requestAnimationFrame(draw);

                analyser.getByteFrequencyData(dataArray);

                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const barWidth = (canvas.width / bufferLength) * 2.5;
                let barHeight;
                let x = 0;

                for (let i = 0; i < bufferLength; i++) {
                    barHeight = (dataArray[i] / 255) * canvas.height * 0.8;

                    const hue = (i / bufferLength) * 360;
                    ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;

                    ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);

                    x += barWidth + 1;
                }
            }

            draw();
        }

        function startMusic() {
            if (isPlaying) return;

            if (!audioContext) {
                initAudio();
            }

            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            isPlaying = true;
            noteCount = 0;
            document.getElementById('noteCount').textContent = '0';

            generateMelody();
            drawVisualizer();
        }

        function stopMusic() {
            isPlaying = false;
            clearTimeout(melodyInterval);
            cancelAnimationFrame(animationId);

            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期キャンバス
        window.addEventListener('load', () => {
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        });

        window.addEventListener('resize', () => {
            const canvas = document.getElementById('visualizer');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        });
    </script>
</body>
</html>
