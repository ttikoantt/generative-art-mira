<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dawn Particles - 夜明けのパーティクル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        canvas {
            display: block;
            touch-action: none;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
        }
        #fullscreen {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        #fullscreen:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="info">夜明けのパーティクル - Dawn Particles</div>
    <button id="fullscreen">全画面表示</button>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        let time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // 全画面表示
        document.getElementById('fullscreen').addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // パーティクルクラス
        class Particle {
            constructor() {
                this.reset();
                this.y = Math.random() * height; // 初期位置をランダムに
            }

            reset() {
                this.x = Math.random() * width;
                this.y = -10;
                this.size = Math.random() * 2 + 0.5;
                this.speedY = Math.random() * 0.5 + 0.2;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.alpha = Math.random() * 0.5 + 0.3;
                this.twinkle = Math.random() * Math.PI * 2;
                this.twinkleSpeed = Math.random() * 0.02 + 0.01;
                this.hue = Math.random() * 60 + 200; // 青〜紫系
            }

            update(dawnProgress) {
                this.y += this.speedY;
                this.x += this.speedX;
                this.twinkle += this.twinkleSpeed;

                // 夜明けの進行に合わせて色を変化
                if (dawnProgress > 0.5) {
                    this.hue = 60 + (dawnProgress - 0.5) * 60; // 黄色へ
                }

                if (this.y > height + 10) {
                    this.reset();
                }
            }

            draw(dawnProgress) {
                const twinkleAlpha = this.alpha * (0.5 + 0.5 * Math.sin(this.twinkle));

                // 夜明けの進行に合わせて透明度を変化
                const fadeAlpha = Math.max(0, twinkleAlpha * (1 - dawnProgress * 0.7));

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 70%, ${fadeAlpha})`;
                ctx.fill();
            }
        }

        // パーティクルを初期化
        function initParticles() {
            particles = [];
            const particleCount = Math.floor((width * height) / 3000);
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }
        initParticles();

        // 背景グラデーションを描画
        function drawBackground(dawnProgress) {
            const gradient = ctx.createLinearGradient(0, 0, 0, height);

            if (dawnProgress < 0.3) {
                // 夜
                gradient.addColorStop(0, `hsl(240, 60%, ${5 + dawnProgress * 5}%)`);
                gradient.addColorStop(1, `hsl(260, 40%, ${10 + dawnProgress * 10}%)`);
            } else if (dawnProgress < 0.7) {
                // 夜明け
                const t = (dawnProgress - 0.3) / 0.4;
                gradient.addColorStop(0, `hsl(${240 - t * 60}, 60%, ${5 + t * 20}%)`);
                gradient.addColorStop(0.5, `hsl(${280 - t * 80}, 50%, ${15 + t * 25}%)`);
                gradient.addColorStop(1, `hsl(${20 - t * 20}, 80%, ${30 + t * 30}%)`);
            } else {
                // 朝
                const t = (dawnProgress - 0.7) / 0.3;
                gradient.addColorStop(0, `hsl(200, 60%, ${20 + t * 30}%)`);
                gradient.addColorStop(0.5, `hsl(30, 70%, ${50 + t * 20}%)`);
                gradient.addColorStop(1, `hsl(40, 80%, ${70 + t * 20}%)`);
            }

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }

        // アニメーションループ
        function animate() {
            time += 0.002;

            // 夜明けの進行度（0 = 夜, 1 = 完全な朝）
            const dawnProgress = Math.min(1, Math.max(0, Math.sin(time)));

            drawBackground(dawnProgress);

            particles.forEach(p => {
                p.update(dawnProgress);
                p.draw(dawnProgress);
            });

            requestAnimationFrame(animate);
        }
        animate();

        // タッチ/クリックで新しいパーティクルを追加
        canvas.addEventListener('click', (e) => {
            for (let i = 0; i < 5; i++) {
                const p = new Particle();
                p.x = e.clientX + (Math.random() - 0.5) * 50;
                p.y = e.clientY + (Math.random() - 0.5) * 50;
                particles.push(p);
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            for (let i = 0; i < 5; i++) {
                const p = new Particle();
                p.x = touch.clientX + (Math.random() - 0.5) * 50;
                p.y = touch.clientY + (Math.random() - 0.5) * 50;
                particles.push(p);
            }
        });
    </script>
</body>
</html>
