<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fractal Tree Growth - Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        canvas {
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            max-width: 100%;
            max-height: 80vh;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            pointer-events: none;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            canvas {
                max-height: 70vh;
            }

            button {
                padding: 10px 20px;
                font-size: 12px;
            }

            .info {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="info" id="info"></div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全画面</button>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <button onclick="startGrowth()">🌱 新しい木を育てる</button>
        <button onclick="toggleSeason()">🍂 季節を変える</button>
        <button onclick="toggleWind()">💨 風をオン/オフ</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const info = document.getElementById('info');

        let width, height;
        let growthProgress = 0;
        let targetGrowth = 1;
        let season = 0; // 0: 春, 1: 夏, 2: 秋, 3: 冬
        let windEnabled = true;
        let windTime = 0;
        let treeSeed = Math.random() * 1000;
        let animationId;
        let lastGeneration = 0;
        let growthRate = 0.003;

        const seasons = [
            { name: '春', leafColor: [255, 182, 193], bg: ['#ffeaa7', '#fdcb6e'] },
            { name: '夏', leafColor: [46, 204, 113], bg: ['#74b9ff', '#0984e3'] },
            { name: '秋', leafColor: [230, 126, 34], bg: ['#fab1a0', '#e17055'] },
            { name: '冬', leafColor: [255, 255, 255], bg: ['#dfe6e9', '#b2bec3'] }
        ];

        function resize() {
            width = canvas.width = Math.min(window.innerWidth * 0.95, 900);
            height = canvas.height = Math.min(window.innerHeight * 0.75, 700);
        }

        function drawBranch(x, y, length, angle, depth, maxDepth) {
            if (depth > maxDepth) return;

            const progress = Math.min(1, growthProgress * (maxDepth + 1) - depth);
            if (progress <= 0) return;

            const endX = x + Math.cos(angle) * length * progress;
            const endY = y + Math.sin(angle) * length * progress;

            // 色の計算（木の幹：茶色から枝先：より明るく）
            const colorIntensity = 1 - (depth / maxDepth) * 0.5;
            const r = Math.floor(101 * colorIntensity);
            const g = Math.floor(67 * colorIntensity);
            const b = Math.floor(33 * colorIntensity);

            ctx.strokeStyle = `rgb(${r}, ${g}, ${b})`;
            ctx.lineWidth = Math.max(1, (maxDepth - depth + 1) * 1.5);
            ctx.lineCap = 'round';

            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.stroke();

            // 風の効果
            let windOffset = 0;
            if (windEnabled) {
                const depthFactor = depth / maxDepth;
                windOffset = Math.sin(windTime + depth * 0.5) * 0.03 * depthFactor;
            }

            // 葉を描く（最後の分岐のみ）
            if (depth === maxDepth && progress > 0.8) {
                drawLeaves(endX, endY);
            }

            // 再帰的に枝を描く
            if (depth < maxDepth) {
                const branchCount = 2 + Math.floor(Math.random() * 2);
                const angleSpread = 0.4 + Math.random() * 0.3;

                for (let i = 0; i < branchCount; i++) {
                    const branchAngle = angle + (i - (branchCount - 1) / 2) * angleSpread + windOffset;
                    const branchLength = length * (0.7 + Math.random() * 0.2);

                    // 次の世代の成長を少し遅らせる
                    if (growthProgress * (maxDepth + 1) > depth + 1) {
                        drawBranch(
                            endX,
                            endY,
                            branchLength,
                            branchAngle,
                            depth + 1,
                            maxDepth
                        );
                    }
                }
            }
        }

        function drawLeaves(x, y) {
            const seasonData = seasons[season];
            const leafCount = 5 + Math.floor(Math.random() * 8);

            for (let i = 0; i < leafCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const distance = 5 + Math.random() * 15;
                const leafX = x + Math.cos(angle) * distance;
                const leafY = y + Math.sin(angle) * distance;
                const leafSize = 3 + Math.random() * 5;

                const alpha = 0.6 + Math.random() * 0.4;
                ctx.fillStyle = `rgba(${seasonData.leafColor.join(',')}, ${alpha})`;

                ctx.beginPath();
                ctx.arc(leafX, leafY, leafSize, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function draw() {
            // 背景をクリア（季節に応じたグラデーション）
            const seasonData = seasons[season];
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, seasonData.bg[0]);
            gradient.addColorStop(1, seasonData.bg[1]);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // 地面を描く
            ctx.fillStyle = '#2d4a3e';
            ctx.fillRect(0, height - 50, width, 50);

            // 草を描く
            for (let i = 0; i < width; i += 5) {
                const grassHeight = 10 + Math.random() * 15;
                const grassAngle = -Math.PI / 2 + (Math.random() - 0.5) * 0.3;

                if (windEnabled) {
                    grassAngle += Math.sin(windTime + i * 0.02) * 0.1;
                }

                ctx.strokeStyle = '#27ae60';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(i, height - 50);
                ctx.lineTo(
                    i + Math.cos(grassAngle) * grassHeight,
                    height - 50 + Math.sin(grassAngle) * grassHeight
                );
                ctx.stroke();
            }

            // 木を描く
            const startX = width / 2;
            const startY = height - 50;
            const initialLength = height * 0.2;
            const maxDepth = Math.floor(6 + growthProgress * 2);

            drawBranch(startX, startY, initialLength, -Math.PI / 2, 0, maxDepth);

            // 情報更新
            const gen = Math.floor(Date.now() / 1000);
            if (gen !== lastGeneration) {
                lastGeneration = gen;
                info.textContent = `季節: ${seasonData.name} | 成長: ${Math.floor(growthProgress * 100)}% | 風: ${windEnabled ? 'オン' : 'オフ'}`;
            }
        }

        function animate() {
            windTime += 0.02;

            if (growthProgress < targetGrowth) {
                growthProgress += growthRate;
                if (growthProgress > targetGrowth) {
                    growthProgress = targetGrowth;
                }
            }

            draw();
            animationId = requestAnimationFrame(animate);
        }

        function startGrowth() {
            growthProgress = 0;
            targetGrowth = 1;
            treeSeed = Math.random() * 1000;
            growthRate = 0.003 + Math.random() * 0.002;
        }

        function toggleSeason() {
            season = (season + 1) % 4;
        }

        function toggleWind() {
            windEnabled = !windEnabled;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                canvas.requestFullscreen().catch(err => {
                    alert('全画面表示ができません');
                });
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        window.addEventListener('resize', resize);
        resize();
        startGrowth();
        animate();

        // タッチ操作の改善
        let lastTouchTime = 0;
        canvas.addEventListener('touchstart', (e) => {
            lastTouchTime = Date.now();
        });

        canvas.addEventListener('touchend', (e) => {
            if (Date.now() - lastTouchTime < 200) {
                // ダブルタップ判定
                const touch = e.changedTouches[0];
                const rect = canvas.getBoundingClientRect();
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;

                // キャンバスをタップで新しい木
                if (x > 0 && x < rect.width && y > 0 && y < rect.height) {
                    startGrowth();
                }
            }
        });
    </script>
</body>
</html>
