<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Tree Growth | Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        canvas {
            display: block;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            backdrop-filter: blur(10px);
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 20px;
        }

        @media (max-width: 768px) {
            canvas {
                width: 100%;
                height: 100%;
                border-radius: 0;
            }

            .controls {
                flex-direction: column;
                top: 10px;
                right: 10px;
            }

            button {
                padding: 8px 16px;
                font-size: 12px;
            }

            .info {
                bottom: 10px;
                font-size: 12px;
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <button onclick="regenerate()">🌱 新しい木</button>
        <button onclick="toggleFullscreen()">📺 全画面</button>
    </div>

    <div class="info">
        Click to spawn branches at cursor position
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let branches = [];
        let animationId;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Branch {
            constructor(x, y, angle, length, depth, color) {
                this.x = x;
                this.y = y;
                this.angle = angle;
                this.targetLength = length;
                this.currentLength = 0;
                this.depth = depth;
                this.color = color;
                this.width = Math.max(1, depth * 0.8);
                this.growthSpeed = 2 + Math.random() * 2;
                this.branches = [];
                this.spawned = false;
                this.finished = false;
            }

            update() {
                if (this.currentLength < this.targetLength) {
                    this.currentLength += this.growthSpeed;
                    if (this.currentLength >= this.targetLength) {
                        this.currentLength = this.targetLength;
                        this.spawned = true;
                    }
                } else if (!this.spawned && this.depth > 0) {
                    this.spawned = true;
                    this.spawnBranches();
                } else if (this.branches.length > 0) {
                    let allFinished = true;
                    for (let branch of this.branches) {
                        branch.update();
                        if (!branch.finished) {
                            allFinished = false;
                        }
                    }
                    this.finished = allFinished;
                } else {
                    this.finished = true;
                }
            }

            spawnBranches() {
                const numBranches = Math.floor(Math.random() * 2) + 2; // 2-3 branches
                const spreadAngle = (Math.random() * 0.5 + 0.4) * Math.PI;

                for (let i = 0; i < numBranches; i++) {
                    const angleOffset = (i - (numBranches - 1) / 2) * spreadAngle / (numBranches - 1);
                    const newAngle = this.angle + angleOffset;
                    const newLength = this.targetLength * (0.6 + Math.random() * 0.25);
                    const newDepth = this.depth - 1;

                    const endX = this.x + Math.cos(this.angle) * this.targetLength;
                    const endY = this.y + Math.sin(this.angle) * this.targetLength;

                    const hue = (this.color + Math.random() * 20 - 10) % 360;

                    this.branches.push(new Branch(
                        endX, endY,
                        newAngle,
                        newLength,
                        newDepth,
                        hue
                    ));
                }
            }

            draw() {
                const endX = this.x + Math.cos(this.angle) * this.currentLength;
                const endY = this.y + Math.sin(this.angle) * this.currentLength;

                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = `hsl(${this.color}, 70%, ${50 + this.depth * 3}%)`;
                ctx.lineWidth = this.width;
                ctx.lineCap = 'round';
                ctx.stroke();

                // Draw leaf at the end if this is a terminal branch
                if (this.depth === 0 && this.currentLength >= this.targetLength * 0.9) {
                    ctx.beginPath();
                    ctx.arc(endX, endY, 3 + Math.random() * 2, 0, Math.PI * 2);
                    ctx.fillStyle = `hsl(${this.color + 30}, 80%, 60%)`;
                    ctx.fill();
                }

                for (let branch of this.branches) {
                    branch.draw();
                }
            }
        }

        function createTree() {
            branches = [];
            const startX = width / 2;
            const startY = height;
            const baseLength = Math.min(width, height) * 0.15;
            const maxDepth = 10;
            const baseColor = Math.random() * 60 + 20; // Green hues

            branches.push(new Branch(
                startX, startY,
                -Math.PI / 2,
                baseLength,
                maxDepth,
                baseColor
            ));
        }

        function addTreeAt(x, y) {
            const length = Math.min(width, height) * 0.08 * (0.5 + Math.random() * 0.5);
            const maxDepth = 6 + Math.floor(Math.random() * 3);
            const baseColor = Math.random() * 360;

            branches.push(new Branch(
                x, y,
                -Math.PI / 2 + (Math.random() - 0.5) * 0.5,
                length,
                maxDepth,
                baseColor
            ));
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
            ctx.fillRect(0, 0, width, height);

            let allFinished = true;
            for (let branch of branches) {
                branch.update();
                branch.draw();
                if (!branch.finished) {
                    allFinished = false;
                }
            }

            animationId = requestAnimationFrame(animate);
        }

        function regenerate() {
            cancelAnimationFrame(animationId);
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, width, height);
            createTree();
            animate();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        canvas.addEventListener('click', (e) => {
            addTreeAt(e.clientX, e.clientY);
        });

        window.addEventListener('resize', () => {
            resize();
        });

        // Initialize
        resize();
        createTree();
        animate();
    </script>
</body>
</html>
