<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量子波動関数 | Quantum Wave Function</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                top: 10px;
                left: 10px;
            }

            .fullscreen-btn {
                padding: 8px 16px;
                font-size: 12px;
                bottom: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="info">
        <div>量子波動関数 | Quantum Wave Function</div>
        <div style="font-size: 12px; margin-top: 5px; opacity: 0.7;">クリックで波源を追加</div>
    </div>

    <canvas id="canvas"></canvas>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let waves = [];

        // 波源クラス
        class WaveSource {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.frequency = 0.02 + Math.random() * 0.03;
                this.amplitude = 30 + Math.random() * 40;
                this.phase = Math.random() * Math.PI * 2;
                this.hue = Math.random() * 360;
            }

            getValue(px, py, time) {
                const dx = px - this.x;
                const dy = py - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                return Math.sin(distance * this.frequency - time * 2 + this.phase) *
                       this.amplitude * Math.exp(-distance * 0.002);
            }
        }

        // 初期波源
        function initWaves() {
            waves = [];
            const numWaves = 5;
            for (let i = 0; i < numWaves; i++) {
                waves.push(new WaveSource(
                    Math.random() * width,
                    Math.random() * height
                ));
            }
        }

        // リサイズ
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initWaves();
        }

        // 描画
        let time = 0;
        function draw() {
            // 半透明でクリア（トレイル効果）
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, width, height);

            time += 0.016;

            // 粒子を描画
            const numParticles = 3000;
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;

            for (let i = 0; i < numParticles; i++) {
                const px = Math.random() * width;
                const py = Math.random() * height;

                // 全ての波源を重ね合わせ
                let totalAmplitude = 0;
                for (const wave of waves) {
                    totalAmplitude += wave.getValue(px, py, time);
                }

                // 振幅に応じて色と明るさを計算
                const normalizedAmp = (totalAmplitude + 100) / 200;
                const hue = (normalizedAmp * 60 + time * 10) % 360;
                const saturation = 80;
                const lightness = 30 + normalizedAmp * 50;

                // HSLをRGBに変換
                const rgb = hslToRgb(hue, saturation, lightness);

                // ピクセルに描画
                const x = Math.floor(px);
                const y = Math.floor(py);
                const idx = (y * width + x) * 4;

                if (idx >= 0 && idx < data.length - 3) {
                    data[idx] = rgb[0];
                    data[idx + 1] = rgb[1];
                    data[idx + 2] = rgb[2];
                    data[idx + 3] = 255;
                }
            }

            ctx.putImageData(imageData, 0, 0);

            // 波源を描画
            for (const wave of waves) {
                ctx.beginPath();
                ctx.arc(wave.x, wave.y, 5, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${wave.hue}, 100%, 70%, 0.8)`;
                ctx.fill();
            }

            requestAnimationFrame(draw);
        }

        // HSLをRGBに変換
        function hslToRgb(h, s, l) {
            s /= 100;
            l /= 100;
            const c = (1 - Math.abs(2 * l - 1)) * s;
            const x = c * (1 - Math.abs((h / 60) % 2 - 1));
            const m = l - c / 2;
            let r, g, b;

            if (h < 60) {
                r = c; g = x; b = 0;
            } else if (h < 120) {
                r = x; g = c; b = 0;
            } else if (h < 180) {
                r = 0; g = c; b = x;
            } else if (h < 240) {
                r = 0; g = x; b = c;
            } else if (h < 300) {
                r = x; g = 0; b = c;
            } else {
                r = c; g = 0; b = x;
            }

            return [
                Math.round((r + m) * 255),
                Math.round((g + m) * 255),
                Math.round((b + m) * 255)
            ];
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // クリックで波源を追加
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            waves.push(new WaveSource(x, y));

            // 最大10個
            if (waves.length > 10) {
                waves.shift();
            }
        });

        // タッチ対応
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            for (const touch of e.touches) {
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;
                waves.push(new WaveSource(x, y));

                if (waves.length > 10) {
                    waves.shift();
                }
            }
        });

        // 初期化
        window.addEventListener('resize', resize);
        resize();
        draw();
    </script>
</body>
</html>
