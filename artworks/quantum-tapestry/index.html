<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Tapestry - 量子の織物</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a1e;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        
        canvas {
            display: block;
        }
        
        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
        
        .title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="title">QUANTUM TAPESTRY</div>
    <div class="info">クリック/タップで新しい織物を生成</div>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        let connections = [];
        let time = 0;
        let mouse = { x: 0, y: 0, active: false };
        
        // 設定
        const config = {
            particleCount: 150,
            connectionDistance: 120,
            mouseInfluence: 150,
            baseSpeed: 0.5,
            colors: [
                { r: 100, g: 200, b: 255 },  // 青
                { r: 180, g: 100, b: 255 },  // 紫
                { r: 255, g: 150, b: 200 },  // ピンク
                { r: 100, g: 255, b: 200 },  // シアン
                { r: 255, g: 200, b: 100 }   // オレンジ
            ]
        };
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        class Particle {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.vx = (Math.random() - 0.5) * config.baseSpeed;
                this.vy = (Math.random() - 0.5) * config.baseSpeed;
                this.radius = Math.random() * 2 + 1;
                this.color = config.colors[Math.floor(Math.random() * config.colors.length)];
                this.phase = Math.random() * Math.PI * 2;
                this.frequency = Math.random() * 0.02 + 0.01;
                this.amplitude = Math.random() * 2 + 1;
            }
            
            update() {
                // 量子波動効果
                this.phase += this.frequency;
                const waveX = Math.cos(this.phase) * this.amplitude;
                const waveY = Math.sin(this.phase) * this.amplitude;
                
                // マウスの影響
                if (mouse.active) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < config.mouseInfluence) {
                        const force = (config.mouseInfluence - dist) / config.mouseInfluence;
                        this.vx += dx * force * 0.001;
                        this.vy += dy * force * 0.001;
                    }
                }
                
                // 位置更新（波動を含む）
                this.x += this.vx + waveX;
                this.y += this.vy + waveY;
                
                // 減衰
                this.vx *= 0.99;
                this.vy *= 0.99;
                
                // 境界チェック
                if (this.x < 0 || this.x > width) {
                    this.vx *= -1;
                    this.x = Math.max(0, Math.min(width, this.x));
                }
                if (this.y < 0 || this.y > height) {
                    this.vy *= -1;
                    this.y = Math.max(0, Math.min(height, this.y));
                }
            }
            
            draw() {
                const alpha = 0.5 + Math.sin(this.phase) * 0.3;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`;
                ctx.fill();
                
                // グロー効果
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 3
                );
                gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha * 0.3})`);
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 3, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }
        
        function init() {
            particles = [];
            for (let i = 0; i < config.particleCount; i++) {
                particles.push(new Particle());
            }
        }
        
        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < config.connectionDistance) {
                        const alpha = (1 - dist / config.connectionDistance) * 0.5;
                        
                        // 色をブレンド
                        const r = (particles[i].color.r + particles[j].color.r) / 2;
                        const g = (particles[i].color.g + particles[j].color.g) / 2;
                        const b = (particles[i].color.b + particles[j].color.b) / 2;
                        
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }
        }
        
        function animate() {
            // トレイル効果
            ctx.fillStyle = 'rgba(10, 10, 30, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // 時間を進める
            time += 0.01;
            
            // 接続線を描画
            drawConnections();
            
            // パーティクルを更新・描画
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            
            requestAnimationFrame(animate);
        }
        
        // イベントリスナー
        window.addEventListener('resize', resize);
        
        canvas.addEventListener('mousedown', (e) => {
            mouse.active = true;
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        
        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        
        canvas.addEventListener('mouseup', () => {
            mouse.active = false;
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouse.active = true;
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });
        
        canvas.addEventListener('touchend', () => {
            mouse.active = false;
        });
        
        // クリックで再初期化
        canvas.addEventListener('click', () => {
            init();
        });
        
        // 初期化
        resize();
        init();
        animate();
    </script>
</body>
</html>
