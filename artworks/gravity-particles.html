<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重力粒子システム | Gravity Particle System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info h1 {
            font-size: 18px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .info p {
            font-size: 12px;
            opacity: 0.7;
            line-height: 1.6;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .controls button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .controls button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            z-index: 100;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="info">
        <h1>重力粒子システム</h1>
        <p>マウスを動かして重力源を変える<br>クリックで爆発を起こす</p>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="controls">
        <button onclick="resetParticles()">リセット</button>
        <button onclick="changeMode()">モード切替</button>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let mouse = { x: 0, y: 0 };
        let mode = 0; // 0: 通常, 1: 反発, 2: 渦

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.radius = Math.random() * 3 + 1;
                this.color = this.getRandomColor();
                this.alpha = 1;
                this.life = 1;
                this.decay = 0.001;
            }

            getRandomColor() {
                const colors = [
                    'hsla(280, 70%, 60%,',
                    'hsla(220, 70%, 60%,',
                    'hsla(340, 70%, 60%,',
                    'hsla(160, 70%, 60%,',
                    'hsla(40, 70%, 60%,'
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                // 重力
                const gravity = 0.1;
                this.vy += gravity;

                // マウスの重力源
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (mode === 0) {
                    // 引力
                    if (dist > 10) {
                        const force = 50 / dist;
                        this.vx += dx / dist * force;
                        this.vy += dy / dist * force;
                    }
                } else if (mode === 1) {
                    // 反発
                    if (dist < 200) {
                        const force = 100 / (dist + 1);
                        this.vx -= dx / dist * force;
                        this.vy -= dy / dist * force;
                    }
                } else if (mode === 2) {
                    // 渦
                    const angle = Math.atan2(dy, dx);
                    const force = 30 / dist;
                    this.vx += Math.cos(angle + Math.PI / 2) * force;
                    this.vy += Math.sin(angle + Math.PI / 2) * force;
                    this.vx += dx / dist * force * 0.5;
                    this.vy += dy / dist * force * 0.5;
                }

                // 摩擦
                this.vx *= 0.99;
                this.vy *= 0.99;

                // 速度制限
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > 15) {
                    this.vx = this.vx / speed * 15;
                    this.vy = this.vy / speed * 15;
                }

                this.x += this.vx;
                this.y += this.vy;

                // 境界
                if (this.x < 0) {
                    this.x = 0;
                    this.vx *= -0.8;
                }
                if (this.x > width) {
                    this.x = width;
                    this.vx *= -0.8;
                }
                if (this.y < 0) {
                    this.y = 0;
                    this.vy *= -0.8;
                }
                if (this.y > height) {
                    this.y = height;
                    this.vy *= -0.6;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color + this.alpha + ')';
                ctx.fill();

                // グロー
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 2
                );
                gradient.addColorStop(0, this.color + (this.alpha * 0.3) + ')');
                gradient.addColorStop(1, this.color + '0)');
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 150; i++) {
                particles.push(new Particle());
            }
        }

        function resetParticles() {
            initParticles();
        }

        function changeMode() {
            mode = (mode + 1) % 3;
        }

        function explode(x, y) {
            for (let i = 0; i < 50; i++) {
                const p = new Particle(x, y);
                const angle = (Math.PI * 2 / 50) * i;
                const speed = Math.random() * 10 + 5;
                p.vx = Math.cos(angle) * speed;
                p.vy = Math.sin(angle) * speed;
                particles.push(p);
            }

            // パーティクル数制限
            while (particles.length > 200) {
                particles.shift();
            }
        }

        function animate() {
            // トレイル効果
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // マウス位置のインジケーター
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 20, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 2;
            ctx.stroke();

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベント
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener('click', (e) => {
            explode(e.clientX, e.clientY);
        });

        // タッチ対応
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
            explode(mouse.x, mouse.y);
        });

        // 初期化
        resize();
        mouse.x = width / 2;
        mouse.y = height / 2;
        initParticles();
        animate();
    </script>
</body>
</html>
