<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Particles - ジェネレーティブアート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: #00ff88;
            font-size: 1.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .info {
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }

        canvas {
            border: 2px solid #00ff88;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            max-width: 100%;
            touch-action: none;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }

        button:hover {
            background: rgba(0, 255, 136, 0.3);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            background: rgba(255, 0, 136, 0.1);
            border: 1px solid #ff0088;
            color: #ff0088;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 0, 136, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌌 Gravity Particles</h1>
        <p class="info">クリックで重力センターを移動 | 視覚的に美しい粒子アート</p>
        <canvas id="canvas" width="600" height="600"></canvas>
        <div class="controls">
            <button onclick="reset()">🔄 リセット</button>
            <button onclick="toggleTrails()">✨ 軌跡</button>
            <button onclick="changeMode()">🎨 モード変更</button>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">📺 全画面</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        let gravityCenter = { x: canvas.width / 2, y: canvas.height / 2 };
        let showTrails = true;
        let mode = 0; // 0: 通常, 1: 反発, 2: 渦

        const MODES = ['重力', '反発', '渦'];

        class Particle {
            constructor(x, y) {
                this.x = x || Math.random() * canvas.width;
                this.y = y || Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.radius = Math.random() * 3 + 1;
                this.color = this.getRandomColor();
                this.alpha = Math.random() * 0.5 + 0.5;
                this.life = 1;
                this.decay = Math.random() * 0.002 + 0.001;
            }

            getRandomColor() {
                const colors = [
                    '#00ff88', '#00ffcc', '#00ccff',
                    '#ff0088', '#ff00cc', '#cc00ff',
                    '#ffff00', '#ff8800', '#ffffff'
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                const dx = gravityCenter.x - this.x;
                const dy = gravityCenter.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (mode === 0) {
                    // 重力モード
                    const force = 0.5 / (distance + 1);
                    this.vx += (dx / distance) * force;
                    this.vy += (dy / distance) * force;
                } else if (mode === 1) {
                    // 反発モード
                    const force = 1 / (distance + 1);
                    this.vx -= (dx / distance) * force;
                    this.vy -= (dy / distance) * force;
                } else if (mode === 2) {
                    // 渦モード
                    const force = 0.3 / (distance + 1);
                    this.vx += (dx / distance) * force + (dy / distance) * 0.5;
                    this.vy += (dy / distance) * force - (dx / distance) * 0.5;
                }

                this.vx *= 0.99;
                this.vy *= 0.99;

                this.x += this.vx;
                this.y += this.vy;

                this.life -= this.decay;

                // 境界でリバウンド
                if (this.x < 0 || this.x > canvas.width) {
                    this.vx *= -0.8;
                    this.x = Math.max(0, Math.min(canvas.width, this.x));
                }
                if (this.y < 0 || this.y > canvas.height) {
                    this.vy *= -0.8;
                    this.y = Math.max(0, Math.min(canvas.height, this.y));
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.alpha * this.life;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < 150; i++) {
                particles.push(new Particle());
            }
        }

        function reset() {
            init();
        }

        function toggleTrails() {
            showTrails = !showTrails;
        }

        function changeMode() {
            mode = (mode + 1) % 3;
            alert(`モード: ${MODES[mode]}`);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                canvas.requestFullscreen().catch(err => {
                    alert('全画面表示ができません');
                });
            } else {
                document.exitFullscreen();
            }
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            gravityCenter.x = (e.clientX - rect.left) * (canvas.width / rect.width);
            gravityCenter.y = (e.clientY - rect.top) * (canvas.height / rect.height);

            // クリックした場所に新しい粒子を追加
            for (let i = 0; i < 10; i++) {
                const p = new Particle(
                    gravityCenter.x + (Math.random() - 0.5) * 50,
                    gravityCenter.y + (Math.random() - 0.5) * 50
                );
                p.vx = (Math.random() - 0.5) * 8;
                p.vy = (Math.random() - 0.5) * 8;
                particles.push(p);
            }
        });

        // タッチ対応
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            gravityCenter.x = (touch.clientX - rect.left) * (canvas.width / rect.width);
            gravityCenter.y = (touch.clientY - rect.top) * (canvas.height / rect.height);

            for (let i = 0; i < 10; i++) {
                const p = new Particle(
                    gravityCenter.x + (Math.random() - 0.5) * 50,
                    gravityCenter.y + (Math.random() - 0.5) * 50
                );
                p.vx = (Math.random() - 0.5) * 8;
                p.vy = (Math.random() - 0.5) * 8;
                particles.push(p);
            }
        });

        function animate() {
            if (showTrails) {
                ctx.fillStyle = 'rgba(12, 12, 12, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }

            // 重力センターを描画
            ctx.beginPath();
            ctx.arc(gravityCenter.x, gravityCenter.y, 8, 0, Math.PI * 2);
            ctx.fillStyle = mode === 0 ? '#00ff88' : mode === 1 ? '#ff0088' : '#ffff00';
            ctx.shadowBlur = 20;
            ctx.shadowColor = ctx.fillStyle;
            ctx.fill();
            ctx.shadowBlur = 0;

            // 粒子を更新・描画
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // 新しい粒子を追加
            if (particles.length < 150) {
                particles.push(new Particle());
            }

            requestAnimationFrame(animate);
        }

        init();
        animate();

        // レスポンシブ対応
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 600);
            const size = Math.min(maxWidth, window.innerHeight - 200);
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>
