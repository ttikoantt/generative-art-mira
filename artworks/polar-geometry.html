<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polar Geometry Art - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0c0c0c, #1a1a2e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas {
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 255, 255, 0.2);
        }

        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #0ff;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            pointer-events: none;
        }

        .title {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 12px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .controls {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #0ff;
            color: #0ff;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
        }

        .btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #0ff;
            color: #0ff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 10px;
                top: 60px;
            }
            .title {
                font-size: 10px;
            }
            .controls {
                bottom: 10px;
            }
            .btn {
                padding: 8px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="info" id="info"></div>
        <div class="title">Polar Geometry Art</div>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
        <canvas id="canvas"></canvas>
        <div class="controls">
            <button class="btn" onclick="changePattern()">パターン変更</button>
            <button class="btn" onclick="toggleAnimation()">一時停止</button>
            <button class="btn" onclick="saveImage()">保存</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const info = document.getElementById('info');

        let width, height, centerX, centerY;
        let animationId;
        let isAnimating = true;
        let time = 0;
        let patternIndex = 0;

        const patterns = [
            { name: 'Spiral Galaxy', layers: 8, points: 120, twist: 3 },
            { name: 'Rose Petals', layers: 12, points: 180, twist: 5 },
            { name: 'Star Burst', layers: 6, points: 90, twist: 2 },
            { name: 'Flower of Life', layers: 10, points: 150, twist: 4 },
            { name: 'Cosmic Web', layers: 15, points: 200, twist: 6 }
        ];

        function resize() {
            width = window.innerWidth * 0.9;
            height = window.innerHeight * 0.7;
            canvas.width = width;
            canvas.height = height;
            centerX = width / 2;
            centerY = height / 2;
        }

        function getPattern() {
            return patterns[patternIndex];
        }

        function polarToCartesian(r, theta) {
            return {
                x: centerX + r * Math.cos(theta),
                y: centerY + r * Math.sin(theta)
            };
        }

        function draw() {
            // Create trail effect
            ctx.fillStyle = 'rgba(12, 12, 12, 0.05)';
            ctx.fillRect(0, 0, width, height);

            const pattern = getPattern();
            const baseRadius = Math.min(width, height) * 0.35;

            for (let layer = 0; layer < pattern.layers; layer++) {
                const layerRadius = baseRadius * (1 - layer / pattern.layers);
                const layerOffset = (layer * Math.PI) / pattern.layers;
                const hue = (time * 20 + layer * 30) % 360;

                ctx.beginPath();

                for (let i = 0; i <= pattern.points; i++) {
                    const angle = (i / pattern.points) * Math.PI * 2 * pattern.twist + layerOffset + time * 0.5;
                    const radiusVariation = Math.sin(angle * 5 + time) * 20;
                    const r = layerRadius + radiusVariation;

                    const pos = polarToCartesian(r, angle);

                    if (i === 0) {
                        ctx.moveTo(pos.x, pos.y);
                    } else {
                        ctx.lineTo(pos.x, pos.y);
                    }
                }

                ctx.strokeStyle = `hsla(${hue}, 80%, 60%, 0.8)`;
                ctx.lineWidth = 2;
                ctx.stroke();

                // Draw connecting points
                for (let i = 0; i < pattern.points; i += 10) {
                    const angle = (i / pattern.points) * Math.PI * 2 * pattern.twist + layerOffset + time * 0.5;
                    const radiusVariation = Math.sin(angle * 5 + time) * 20;
                    const r = layerRadius + radiusVariation;
                    const pos = polarToCartesian(r, angle);

                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, 2, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${hue}, 100%, 70%, 0.9)`;
                    ctx.fill();
                }
            }

            // Draw center glow
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, baseRadius * 0.3);
            gradient.addColorStop(0, `hsla(${(time * 20) % 360}, 80%, 60%, 0.3)`);
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // Update info
            info.textContent = `${pattern.name} | Layer ${pattern.layers} | Points ${pattern.points}`;
        }

        function animate() {
            if (isAnimating) {
                time += 0.01;
                draw();
            }
            animationId = requestAnimationFrame(animate);
        }

        function changePattern() {
            patternIndex = (patternIndex + 1) % patterns.length;
            ctx.fillStyle = 'rgba(12, 12, 12, 1)';
            ctx.fillRect(0, 0, width, height);
            draw();
        }

        function toggleAnimation() {
            isAnimating = !isAnimating;
            const btn = event.target;
            btn.textContent = isAnimating ? '一時停止' : '再生';
        }

        function saveImage() {
            const link = document.createElement('a');
            link.download = `polar-geometry-${patternIndex}-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        window.addEventListener('resize', resize);
        resize();
        animate();

        // Touch support for mobile
        let lastTouch = 0;
        canvas.addEventListener('touchstart', (e) => {
            lastTouch = Date.now();
        });

        canvas.addEventListener('touchend', (e) => {
            if (Date.now() - lastTouch < 300) {
                changePattern();
            }
        });
    </script>
</body>
</html>
