<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Reactive Particles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Helvetica', sans-serif;
        }

        canvas {
            display: block;
        }

        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            cursor: pointer;
        }

        #start-overlay h1 {
            color: #0ff;
            font-size: 2em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #0ff;
        }

        #start-overlay p {
            color: #fff;
            font-size: 1em;
        }

        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            display: flex;
            gap: 10px;
        }

        .control-btn {
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #0ff;
            color: #0ff;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .control-btn:hover {
            background: rgba(0, 255, 255, 0.4);
        }

        #fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 50;
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #0ff;
            color: #0ff;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            #start-overlay h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div id="start-overlay">
        <h1>🎵 Audio Reactive Particles</h1>
        <p>Tap to Start (Microphone Access Required)</p>
    </div>

    <canvas id="canvas"></canvas>

    <button id="fullscreen">⛶ Fullscreen</button>

    <div id="controls">
        <button class="control-btn" id="mode-btn">Change Pattern</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startOverlay = document.getElementById('start-overlay');
        const fullscreenBtn = document.getElementById('fullscreen');
        const modeBtn = document.getElementById('mode-btn');

        let width, height;
        let particles = [];
        let audioContext, analyser, dataArray, source;
        let isRunning = false;
        let patternMode = 0;
        const patternCount = 4;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.baseX = this.x;
                this.baseY = this.y;
                this.size = Math.random() * 3 + 1;
                this.baseSize = this.size;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.hue = Math.random() * 360;
                this.life = 0;
                this.maxLife = Math.random() * 100 + 100;
            }

            update(audioValue, frequencyData) {
                this.life++;
                this.hue += 0.5;

                const audioFactor = audioValue / 255;

                switch (patternMode) {
                    case 0: // Circular explosion
                        const centerX = width / 2;
                        const centerY = height / 2;
                        const dx = this.x - centerX;
                        const dy = this.y - centerY;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const angle = Math.atan2(dy, dx);
                        const boost = audioFactor * 5;
                        this.x += Math.cos(angle) * boost + this.speedX;
                        this.y += Math.sin(angle) * boost + this.speedY;
                        this.size = this.baseSize * (1 + audioFactor * 3);
                        break;

                    case 1: // Wave motion
                        this.x += this.speedX * (1 + audioFactor * 2);
                        this.y += Math.sin(this.life * 0.02 + this.x * 0.01) * (2 + audioFactor * 5);
                        this.size = this.baseSize * (1 + audioFactor * 2);
                        break;

                    case 2: // Spiral
                        const spiralX = width / 2;
                        const spiralY = height / 2;
                        const sdx = this.x - spiralX;
                        const sdy = this.y - spiralY;
                        const sangle = Math.atan2(sdy, sdx);
                        const sdist = Math.sqrt(sdx * sdx + sdy * sdy);
                        this.x = spiralX + Math.cos(sangle + 0.02 * (1 + audioFactor)) * sdist;
                        this.y = spiralY + Math.sin(sangle + 0.02 * (1 + audioFactor)) * sdist;
                        this.x += Math.cos(sangle) * audioFactor * 3;
                        this.y += Math.sin(sangle) * audioFactor * 3;
                        this.size = this.baseSize * (1 + audioFactor * 2);
                        break;

                    case 3: // Random scatter
                        this.x += (Math.random() - 0.5) * 10 * audioFactor;
                        this.y += (Math.random() - 0.5) * 10 * audioFactor;
                        this.x += this.speedX;
                        this.y += this.speedY;
                        this.size = this.baseSize * (1 + audioFactor * 4);
                        break;
                }

                // Wrap around edges
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;

                // Respawn if too old
                if (this.life > this.maxLife) {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.life = 0;
                }
            }

            draw(audioValue) {
                const audioFactor = audioValue / 255;
                const saturation = 50 + audioFactor * 50;
                const lightness = 40 + audioFactor * 30;
                const alpha = 0.3 + audioFactor * 0.7;

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, ${saturation}%, ${lightness}%, ${alpha})`;
                ctx.fill();

                // Glow effect
                if (audioFactor > 0.5) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue}, ${saturation}%, ${lightness}%, ${alpha * 0.3})`;
                    ctx.fill();
                }
            }
        }

        function initParticles() {
            particles = [];
            const particleCount = 500;
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        async function initAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);

                dataArray = new Uint8Array(analyser.frequencyBinCount);
                isRunning = true;
                startOverlay.style.display = 'none';
                animate();
            } catch (err) {
                console.error('Microphone access denied:', err);
                startOverlay.innerHTML = '<h1>❌ Error</h1><p>Microphone access required</p>';
            }
        }

        function animate() {
            if (!isRunning) return;

            requestAnimationFrame(animate);

            analyser.getByteFrequencyData(dataArray);

            // Get average audio level
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            const average = sum / dataArray.length;

            // Clear with fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // Update and draw particles
            particles.forEach((particle, index) => {
                const freqIndex = Math.floor(index / particles.length * dataArray.length);
                const freqValue = dataArray[freqIndex];
                particle.update(freqValue, dataArray);
                particle.draw(freqValue);
            });

            // Draw audio visualization bars at bottom
            const barWidth = width / dataArray.length;
            for (let i = 0; i < dataArray.length; i++) {
                const barHeight = (dataArray[i] / 255) * 100;
                const hue = (i / dataArray.length) * 360;
                ctx.fillStyle = `hsl(${hue}, 70%, 50%)`;
                ctx.fillRect(i * barWidth, height - barHeight, barWidth - 1, barHeight);
            }
        }

        startOverlay.addEventListener('click', () => {
            initAudio();
        });

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        modeBtn.addEventListener('click', () => {
            patternMode = (patternMode + 1) % patternCount;
            const modes = ['Circular Explosion', 'Wave Motion', 'Spiral', 'Random Scatter'];
            modeBtn.textContent = `Pattern: ${modes[patternMode]}`;
        });

        initParticles();
    </script>
</body>
</html>
