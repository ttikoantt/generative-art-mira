<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Reactive Particles - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls button {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .controls button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .controls button:active {
            transform: scale(0.95);
        }

        .controls input[type="file"] {
            display: none;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            text-align: center;
            z-index: 100;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <button id="micBtn">🎤 マイク</button>
        <button id="fileBtn">📁 ファイル</button>
        <input type="file" id="audioFile" accept="audio/*">
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">⛶</button>

    <div class="info">音楽に合わせてパーティクルが踊ります | マイクまたはファイルで音声入力</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let audioContext;
        let analyser;
        let source;
        let isPlaying = false;
        let particles = [];
        let mouseX = 0;
        let mouseY = 0;

        // Canvas size
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Particle class
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.baseSize = Math.random() * 2 + 1;
                this.size = this.baseSize;
                this.baseSpeedX = (Math.random() - 0.5) * 0.5;
                this.baseSpeedY = (Math.random() - 0.5) * 0.5;
                this.speedX = this.baseSpeedX;
                this.speedY = this.baseSpeedY;
                this.hue = Math.random() * 360;
                this.life = Math.random();
                this.maxLife = Math.random() * 0.5 + 0.5;
            }

            update(frequencyData) {
                // Get frequency value based on position
                const freqIndex = Math.floor(
                    (this.x / canvas.width) * (this.y / canvas.height) * frequencyData.length
                );
                const frequency = frequencyData[freqIndex] || 0;
                const normalized = frequency / 255;

                // Update size based on frequency
                this.size = this.baseSize + normalized * 8;

                // Update speed based on frequency
                const speedMultiplier = 1 + normalized * 3;
                this.speedX = this.baseSpeedX * speedMultiplier;
                this.speedY = this.baseSpeedY * speedMultiplier;

                // Update position
                this.x += this.speedX;
                this.y += this.speedY;

                // Wrap around
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;

                // Update hue based on frequency
                this.hue = (this.hue + normalized * 5) % 360;

                // Life cycle
                this.life += 0.002;
                if (this.life > this.maxLife) {
                    this.reset();
                }
            }

            draw(frequencyData) {
                const freqIndex = Math.floor(
                    (this.x / canvas.width) * (this.y / canvas.height) * frequencyData.length
                );
                const frequency = frequencyData[freqIndex] || 0;
                const normalized = frequency / 255;
                const alpha = (1 - this.life / this.maxLife) * (0.3 + normalized * 0.7);

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, ${50 + normalized * 30}%, ${alpha})`;
                ctx.fill();

                // Glow effect for high frequencies
                if (normalized > 0.5) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${alpha * 0.3})`;
                    ctx.fill();
                }
            }
        }

        // Initialize particles
        function initParticles() {
            particles = [];
            const count = Math.min(300, Math.floor((canvas.width * canvas.height) / 5000));
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }
        initParticles();

        // Audio setup
        async function setupAudio(stream) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;

            source = audioContext.createMediaStreamSource(stream);
            source.connect(analyser);

            isPlaying = true;
            animate();
        }

        async function setupAudioFile(file) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;

            const reader = new FileReader();
            reader.onload = async (e) => {
                const audioData = await audioContext.decodeAudioData(e.target.result);
                source = audioContext.createBufferSource();
                source.buffer = audioData;
                source.connect(analyser);
                analyser.connect(audioContext.destination);
                source.start(0);
                source.loop = true;
                isPlaying = true;
                animate();
            };
            reader.readAsArrayBuffer(file);
        }

        // Animation loop
        function animate() {
            if (!isPlaying) return;

            requestAnimationFrame(animate);

            const frequencyData = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(frequencyData);

            // Clear with trail effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw center glow based on bass
            const bass = frequencyData[0] / 255;
            if (bass > 0.3) {
                const gradient = ctx.createRadialGradient(
                    canvas.width / 2, canvas.height / 2, 0,
                    canvas.width / 2, canvas.height / 2, canvas.width * 0.4
                );
                gradient.addColorStop(0, `hsla(${Date.now() / 50 % 360}, 80%, 50%, ${bass * 0.2})`);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // Update and draw particles
            particles.forEach(p => {
                p.update(frequencyData);
                p.draw(frequencyData);
            });

            // Draw circular visualizer
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = Math.min(canvas.width, canvas.height) * 0.25;

            ctx.beginPath();
            for (let i = 0; i < frequencyData.length; i++) {
                const angle = (i / frequencyData.length) * Math.PI * 2;
                const amplitude = (frequencyData[i] / 255) * 100;
                const x = centerX + Math.cos(angle) * (radius + amplitude);
                const y = centerY + Math.sin(angle) * (radius + amplitude);

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.closePath();
            ctx.strokeStyle = `hsla(${Date.now() / 50 % 360}, 80%, 60%, 0.5)`;
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // Event listeners
        document.getElementById('micBtn').addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                setupAudio(stream);
            } catch (err) {
                alert('マイクにアクセスできませんでした: ' + err.message);
            }
        });

        document.getElementById('fileBtn').addEventListener('click', () => {
            document.getElementById('audioFile').click();
        });

        document.getElementById('audioFile').addEventListener('change', (e) => {
            if (e.target.files[0]) {
                setupAudioFile(e.target.files[0]);
            }
        });

        // Fullscreen
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Idle animation when no audio
        function idleAnimate() {
            if (isPlaying) return;

            requestAnimationFrame(idleAnimate);

            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const frequencyData = new Uint8Array(128).fill(0);

            particles.forEach(p => {
                p.update(frequencyData);
                p.draw(frequencyData);
            });
        }
        idleAnimate();
    </script>
</body>
</html>
