<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmonic Flow Field</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e27;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        canvas {
            border: 2px solid rgba(100, 200, 255, 0.3);
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(100, 200, 255, 0.2);
            max-width: 100vw;
            max-height: 80vh;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: rgba(100, 200, 255, 0.1);
            border: 1px solid rgba(100, 200, 255, 0.5);
            color: #64c8ff;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
        }

        button:hover {
            background: rgba(100, 200, 255, 0.3);
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.3);
        }

        .title {
            color: #64c8ff;
            margin-bottom: 20px;
            font-size: 24px;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
            text-align: center;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
        }
    </style>
</head>
<body>
    <div class="title">✨ Harmonic Flow Field ✨</div>
    <canvas id="canvas"></canvas>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    <div class="controls">
        <button onclick="generateNew()">🎨 New Pattern</button>
        <button onclick="togglePause()">⏸ Pause</button>
        <button onclick="changeSpeed()">🚀 Speed</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Responsive canvas sizing
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth * 0.95, 1200);
            const maxHeight = Math.min(window.innerHeight * 0.75, 800);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', () => {
            resizeCanvas();
            generateNew();
        });

        let particles = [];
        let animationId;
        let isPaused = false;
        let speedMultiplier = 1;
        let hueOffset = 0;
        let particleCount = 2000;
        let trailAlpha = 0.05;

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.life = Math.random() * 200 + 100;
                this.maxLife = this.life;
                this.size = Math.random() * 2 + 0.5;
                this.hue = Math.random() * 60 + hueOffset;
            }

            update() {
                // Harmonic flow field using sine/cosine combinations
                const scale = 0.005;
                const time = Date.now() * 0.0005 * speedMultiplier;
                
                const angle = Math.sin(this.x * scale + time) * Math.PI * 2 +
                            Math.cos(this.y * scale + time) * Math.PI +
                            Math.sin((this.x + this.y) * scale * 0.5 + time * 0.5) * Math.PI;

                const speed = 1 + Math.sin(time + this.x * 0.01) * 0.5;
                
                this.x += Math.cos(angle) * speed * speedMultiplier;
                this.y += Math.sin(angle) * speed * speedMultiplier;
                this.life--;

                // Wrap around edges
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;

                if (this.life <= 0) {
                    this.reset();
                }
            }

            draw() {
                const alpha = (this.life / this.maxLife) * 0.8;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 70%, 60%, ${alpha})`;
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            if (!isPaused) {
                // Fade effect for trails
                ctx.fillStyle = `rgba(10, 14, 39, ${trailAlpha})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                particles.forEach(p => {
                    p.update();
                    p.draw();
                });

                hueOffset += 0.1;
            }
            animationId = requestAnimationFrame(animate);
        }

        function generateNew() {
            hueOffset = Math.random() * 360;
            trailAlpha = 0.03 + Math.random() * 0.07;
            particleCount = Math.floor(Math.random() * 2000) + 1000;
            init();
        }

        function togglePause() {
            isPaused = !isPaused;
            event.target.textContent = isPaused ? '▶ Play' : '⏸ Pause';
        }

        function changeSpeed() {
            speedMultiplier = speedMultiplier === 1 ? 2 : speedMultiplier === 2 ? 0.5 : 1;
            event.target.textContent = `🚀 Speed ${speedMultiplier}x`;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Start
        init();
        animate();
    </script>
</body>
</html>
