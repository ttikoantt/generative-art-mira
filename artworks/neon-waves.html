<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Waves - Interactive Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            pointer-events: none;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            transition: all 0.3s;
            pointer-events: auto;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">Neon Waves - Move or tap to create waves</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let waves = [];
        let mouseX = 0, mouseY = 0;
        let lastMouseX = 0, lastMouseY = 0;
        let isMoving = false;
        let moveTimeout;

        // Neon colors
        const colors = [
            { r: 255, g: 0, b: 255 },     // Magenta
            { r: 0, g: 255, b: 255 },     // Cyan
            { r: 255, g: 255, b: 0 },     // Yellow
            { r: 255, g: 0, b: 128 },     // Hot Pink
            { r: 0, g: 255, b: 128 },     // Spring Green
            { r: 128, g: 0, b: 255 },     // Purple
            { r: 255, g: 128, b: 0 },     // Orange
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Wave {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.max(width, height) * 0.8;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.alpha = 1;
                this.lineWidth = 3;
                this.speed = 2 + Math.random() * 2;
            }

            update() {
                this.radius += this.speed;
                this.alpha = 1 - (this.radius / this.maxRadius);
                this.lineWidth = 3 * this.alpha;
            }

            draw() {
                if (this.alpha <= 0) return;

                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);

                // Neon glow effect
                ctx.shadowBlur = 20;
                ctx.shadowColor = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha})`;
                ctx.strokeStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha})`;
                ctx.lineWidth = this.lineWidth;
                ctx.stroke();

                // Inner glow
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.95, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 255, 255, ${this.alpha * 0.5})`;
                ctx.lineWidth = this.lineWidth * 0.5;
                ctx.stroke();

                ctx.restore();
            }

            isDead() {
                return this.alpha <= 0;
            }
        }

        function createWave(x, y) {
            waves.push(new Wave(x, y));
            // Limit waves for performance
            if (waves.length > 50) {
                waves.shift();
            }
        }

        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // Update and draw waves
            waves = waves.filter(wave => !wave.isDead());
            waves.forEach(wave => {
                wave.update();
                wave.draw();
            });

            // Auto-generate waves when moving
            if (isMoving) {
                const dx = mouseX - lastMouseX;
                const dy = mouseY - lastMouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > 30) {
                    createWave(mouseX, mouseY);
                    lastMouseX = mouseX;
                    lastMouseY = mouseY;
                }
            }

            requestAnimationFrame(animate);
        }

        // Event listeners
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            isMoving = true;

            clearTimeout(moveTimeout);
            moveTimeout = setTimeout(() => {
                isMoving = false;
            }, 100);
        });

        canvas.addEventListener('click', (e) => {
            createWave(e.clientX, e.clientY);
            // Create multiple waves on click
            setTimeout(() => createWave(e.clientX, e.clientY), 100);
            setTimeout(() => createWave(e.clientX, e.clientY), 200);
        });

        // Touch support
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            isMoving = true;

            const dx = mouseX - lastMouseX;
            const dy = mouseY - lastMouseY;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist > 30) {
                createWave(mouseX, mouseY);
                lastMouseX = mouseX;
                lastMouseY = mouseY;
            }
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            lastMouseX = mouseX;
            lastMouseY = mouseY;
            createWave(mouseX, mouseY);
        }, { passive: false });

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        resize();
        mouseX = width / 2;
        mouseY = height / 2;
        lastMouseX = mouseX;
        lastMouseY = mouseY;

        // Create initial waves
        createWave(width / 2, height / 2);

        animate();
    </script>
</body>
</html>
