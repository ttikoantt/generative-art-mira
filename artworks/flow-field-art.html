<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flow Field Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e27;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(10, 14, 39, 0.9);
            padding: 20px;
            border-radius: 15px;
            color: #fff;
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 280px;
            transition: opacity 0.3s;
        }

        .controls.hidden {
            opacity: 0.1;
        }

        .controls:hover {
            opacity: 1;
        }

        h1 {
            font-size: 1.2em;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #00f5ff, #7b2dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .control {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85em;
            color: #a0a0a0;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(45deg, #00f5ff, #7b2dff);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 245, 255, 0.5);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 0.9em;
        }

        .primary {
            background: linear-gradient(45deg, #00f5ff, #7b2dff);
            color: #fff;
        }

        .secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 245, 255, 0.3);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(45deg, #00f5ff, #7b2dff);
            border: none;
            color: #fff;
            font-size: 1.5em;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 20px rgba(0, 245, 255, 0.3);
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            transform: scale(1.1);
        }

        .value {
            float: right;
            color: #00f5ff;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls" id="controls">
        <h1>🌀 Flow Field Art</h1>

        <div class="control">
            <label>Particle Count <span class="value" id="particleValue">500</span></label>
            <input type="range" id="particleCount" min="100" max="2000" value="500">
        </div>

        <div class="control">
            <label>Flow Strength <span class="value" id="flowValue">1.0</span></label>
            <input type="range" id="flowStrength" min="0.1" max="3" step="0.1" value="1">
        </div>

        <div class="control">
            <label>Noise Scale <span class="value" id="noiseValue">0.005</span></label>
            <input type="range" id="noiseScale" min="0.001" max="0.02" step="0.001" value="0.005">
        </div>

        <div class="control">
            <label>Trail Fade <span class="value" id="trailValue">0.97</span></label>
            <input type="range" id="trailFade" min="0.9" max="0.995" step="0.005" value="0.97">
        </div>

        <div class="control">
            <label>Speed <span class="value" id="speedValue">1.0</span></label>
            <input type="range" id="speed" min="0.1" max="3" step="0.1" value="1">
        </div>

        <div class="button-group">
            <button class="primary" onclick="resetParticles()">Reset</button>
            <button class="secondary" onclick="clearCanvas()">Clear</button>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        let width, height;
        let animationId;

        // Settings
        let settings = {
            particleCount: 500,
            flowStrength: 1.0,
            noiseScale: 0.005,
            trailFade: 0.97,
            speed: 1.0
        };

        // Simplex Noise implementation (simplified)
        class SimplexNoise {
            constructor() {
                this.p = new Uint8Array(512);
                this.perm = new Uint8Array(512);

                for (let i = 0; i < 256; i++) {
                    this.p[i] = i;
                }

                // Shuffle
                for (let i = 255; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.p[i], this.p[j]] = [this.p[j], this.p[i]];
                }

                for (let i = 0; i < 512; i++) {
                    this.perm[i] = this.p[i & 255];
                }
            }

            noise2D(x, y) {
                const F2 = 0.5 * (Math.sqrt(3) - 1);
                const G2 = (3 - Math.sqrt(3)) / 6;

                let s = (x + y) * F2;
                let i = Math.floor(x + s);
                let j = Math.floor(y + s);
                let t = (i + j) * G2;

                let X0 = i - t;
                let Y0 = j - t;
                let x0 = x - X0;
                let y0 = y - Y0;

                let i1, j1;
                if (x0 > y0) {
                    i1 = 1;
                    j1 = 0;
                } else {
                    i1 = 0;
                    j1 = 1;
                }

                let x1 = x0 - i1 + G2;
                let y1 = y0 - j1 + G2;
                let x2 = x0 - 1 + 2 * G2;
                let y2 = y0 - 1 + 2 * G2;

                let ii = i & 255;
                let jj = j & 255;

                let n0 = 0, n1 = 0, n2 = 0;

                let t0 = 0.5 - x0 * x0 - y0 * y0;
                if (t0 >= 0) {
                    let gi0 = this.perm[ii + this.perm[jj]] % 12;
                    t0 *= t0;
                    n0 = t0 * t0 * this.grad(gi0, x0, y0);
                }

                let t1 = 0.5 - x1 * x1 - y1 * y1;
                if (t1 >= 0) {
                    let gi1 = this.perm[ii + i1 + this.perm[jj + j1]] % 12;
                    t1 *= t1;
                    n1 = t1 * t1 * this.grad(gi1, x1, y1);
                }

                let t2 = 0.5 - x2 * x2 - y2 * y2;
                if (t2 >= 0) {
                    let gi2 = this.perm[ii + 1 + this.perm[jj + 1]] % 12;
                    t2 *= t2;
                    n2 = t2 * t2 * this.grad(gi2, x2, y2);
                }

                return 70 * (n0 + n1 + n2);
            }

            grad(hash, x, y) {
                let h = hash & 7;
                let u = h < 4 ? x : y;
                let v = h < 4 ? y : x;
                return ((h & 1) ? -u : u) + ((h & 2) ? -2 * v : 2 * v);
            }
        }

        const noise = new SimplexNoise();

        // Color palettes
        const palettes = [
            ['#00f5ff', '#7b2dff', '#ff00ff', '#00ff88'],
            ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3'],
            ['#26de81', '#fed330', '#fd79a8', '#a29bfe'],
            ['#ffeaa7', '#dfe6e9', '#74b9ff', '#fab1a0']
        ];

        let currentPalette = 0;

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = 0;
                this.vy = 0;
                this.life = 0;
                this.maxLife = 500 + Math.random() * 500;
                this.hue = Math.random() * 360;
                this.color = palettes[currentPalette][Math.floor(Math.random() * 4)];
            }

            update() {
                // Get flow field angle from noise
                let angle = noise.noise2D(this.x * settings.noiseScale, this.y * settings.noiseScale) * Math.PI * 4;
                
                // Update velocity
                this.vx += Math.cos(angle) * 0.1 * settings.flowStrength;
                this.vy += Math.sin(angle) * 0.1 * settings.flowStrength;

                // Apply drag
                this.vx *= 0.99;
                this.vy *= 0.99;

                // Update position
                this.x += this.vx * settings.speed;
                this.y += this.vy * settings.speed;

                // Wrap around edges
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;

                // Update life
                this.life++;
                if (this.life > this.maxLife) {
                    this.reset();
                }
            }

            draw() {
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                const alpha = 1 - (this.life / this.maxLife);
                const size = Math.min(speed * 0.5 + 0.5, 2);

                ctx.beginPath();
                ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
                ctx.fillStyle = this.color + Math.floor(alpha * 255).toString(16).padStart(2, '0');
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < settings.particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            // Fade effect for trails
            ctx.fillStyle = `rgba(10, 14, 39, ${1 - settings.trailFade})`;
            ctx.fillRect(0, 0, width, height);

            // Update and draw particles
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            animationId = requestAnimationFrame(animate);
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            clearCanvas();
        }

        function resetParticles() {
            currentPalette = Math.floor(Math.random() * palettes.length);
            initParticles();
            clearCanvas();
        }

        function clearCanvas() {
            ctx.fillStyle = '#0a0e27';
            ctx.fillRect(0, 0, width, height);
        }

        function toggleFullscreen() {
            const controls = document.getElementById('controls');
            controls.classList.toggle('hidden');
        }

        // Event listeners
        document.getElementById('particleCount').addEventListener('input', (e) => {
            settings.particleCount = parseInt(e.target.value);
            document.getElementById('particleValue').textContent = settings.particleCount;
            initParticles();
        });

        document.getElementById('flowStrength').addEventListener('input', (e) => {
            settings.flowStrength = parseFloat(e.target.value);
            document.getElementById('flowValue').textContent = settings.flowStrength.toFixed(1);
        });

        document.getElementById('noiseScale').addEventListener('input', (e) => {
            settings.noiseScale = parseFloat(e.target.value);
            document.getElementById('noiseValue').textContent = settings.noiseScale.toFixed(3);
        });

        document.getElementById('trailFade').addEventListener('input', (e) => {
            settings.trailFade = parseFloat(e.target.value);
            document.getElementById('trailValue').textContent = settings.trailFade.toFixed(2);
        });

        document.getElementById('speed').addEventListener('input', (e) => {
            settings.speed = parseFloat(e.target.value);
            document.getElementById('speedValue').textContent = settings.speed.toFixed(1);
        });

        // Canvas interaction
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // Add some particles at mouse position
            for (let i = 0; i < 5; i++) {
                const p = new Particle();
                p.x = x + (Math.random() - 0.5) * 50;
                p.y = y + (Math.random() - 0.5) * 50;
                particles.push(p);
            }

            // Remove excess particles
            while (particles.length > settings.particleCount + 100) {
                particles.shift();
            }
        });

        window.addEventListener('resize', resize);

        // Touch support
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;

            for (let i = 0; i < 5; i++) {
                const p = new Particle();
                p.x = x + (Math.random() - 0.5) * 50;
                p.y = y + (Math.random() - 0.5) * 50;
                particles.push(p);
            }

            while (particles.length > settings.particleCount + 100) {
                particles.shift();
            }
        }, { passive: false });

        // Initialize
        resize();
        initParticles();
        animate();
    </script>
</body>
</html>
