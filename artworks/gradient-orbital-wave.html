<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient Orbital Wave</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .controls button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            z-index: 100;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <div>Gradient Orbital Wave</div>
        <div>Move mouse/touch to interact</div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="controls">
        <button onclick="changePattern('wave')">Wave</button>
        <button onclick="changePattern('spiral')">Spiral</button>
        <button onclick="changePattern('chaos')">Chaos</button>
        <button onclick="toggleTrails()">Trails</button>
        <button onclick="reset()">Reset</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        let mouseX = 0, mouseY = 0;
        let pattern = 'wave';
        let showTrails = true;
        let particles = [];
        let time = 0;

        // 設定
        const config = {
            particleCount: 150,
            orbitCount: 5,
            baseRadius: 100,
            speed: 0.02,
            trailAlpha: 0.03
        };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
            config.baseRadius = Math.min(width, height) * 0.15;
        }

        class Particle {
            constructor(orbitIndex, particleIndex) {
                this.orbitIndex = orbitIndex;
                this.particleIndex = particleIndex;
                this.reset();
            }

            reset() {
                this.angle = (Math.PI * 2 * this.particleIndex) / (config.particleCount / config.orbitCount);
                this.radiusOffset = (this.orbitIndex + 1) * config.baseRadius * 0.25;
                this.speedOffset = 1 + (this.orbitIndex * 0.2);
                this.amplitude = 20 + Math.random() * 30;
                this.phaseOffset = Math.random() * Math.PI * 2;
                this.hueOffset = (this.orbitIndex / config.orbitCount) * 360;
            }

            update() {
                let targetX, targetY;

                switch (pattern) {
                    case 'wave':
                        this.angle += config.speed * this.speedOffset;
                        const waveRadius = this.radiusOffset + Math.sin(time * 2 + this.phaseOffset) * this.amplitude;
                        targetX = centerX + Math.cos(this.angle) * waveRadius;
                        targetY = centerY + Math.sin(this.angle) * waveRadius;
                        break;

                    case 'spiral':
                        this.angle += config.speed * this.speedOffset * 0.5;
                        const spiralRadius = this.radiusOffset + Math.sin(time + this.angle * 3) * this.amplitude;
                        targetX = centerX + Math.cos(this.angle + time * 0.5) * spiralRadius;
                        targetY = centerY + Math.sin(this.angle + time * 0.5) * spiralRadius;
                        break;

                    case 'chaos':
                        this.angle += config.speed * this.speedOffset * (1 + Math.sin(time * 0.5));
                        const chaosRadius = this.radiusOffset + Math.sin(time * 3 + this.phaseOffset) * this.amplitude * 1.5;
                        targetX = centerX + Math.cos(this.angle + Math.sin(time * 2)) * chaosRadius;
                        targetY = centerY + Math.sin(this.angle + Math.cos(time * 2)) * chaosRadius;
                        break;
                }

                // マウスインタラクション
                const dx = mouseX - targetX;
                const dy = mouseY - targetY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const maxDist = 150;

                if (dist < maxDist) {
                    const force = (maxDist - dist) / maxDist;
                    this.x = targetX - dx * force * 0.3;
                    this.y = targetY - dy * force * 0.3;
                } else {
                    this.x = targetX;
                    this.y = targetY;
                }
            }

            draw() {
                const hue = (this.hueOffset + time * 20 + this.angle * 30) % 360;
                const saturation = 70 + Math.sin(time + this.phaseOffset) * 20;
                const lightness = 50 + Math.sin(time * 2 + this.phaseOffset) * 15;
                const size = 2 + Math.sin(time * 3 + this.phaseOffset) * 1.5;

                ctx.beginPath();
                ctx.arc(this.x, this.y, Math.max(1, size), 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
                ctx.fill();
            }
        }

        function init() {
            resize();
            particles = [];

            for (let orbit = 0; orbit < config.orbitCount; orbit++) {
                for (let p = 0; p < config.particleCount / config.orbitCount; p++) {
                    particles.push(new Particle(orbit, p));
                }
            }
        }

        function animate() {
            // トレイル効果
            if (showTrails) {
                ctx.fillStyle = `rgba(10, 10, 15, ${config.trailAlpha})`;
                ctx.fillRect(0, 0, width, height);
            } else {
                ctx.clearRect(0, 0, width, height);
            }

            time += 0.016;

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // パーティクル間の接続（近いもの同士）
            ctx.strokeStyle = `rgba(255, 255, 255, 0.03)`;
            ctx.lineWidth = 0.5;

            for (let i = 0; i < particles.length; i += 3) {
                for (let j = i + 1; j < Math.min(i + 10, particles.length); j += 3) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 50) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        function changePattern(newPattern) {
            pattern = newPattern;
        }

        function toggleTrails() {
            showTrails = !showTrails;
        }

        function reset() {
            time = 0;
            init();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchstart', (e) => {
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        // 初期化
        init();
        animate();
    </script>
</body>
</html>
