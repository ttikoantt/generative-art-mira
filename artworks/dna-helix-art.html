<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA Helix Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.8);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                bottom: 15px;
            }

            .fullscreen-btn {
                top: 15px;
                right: 15px;
                padding: 8px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">ドラッグで回転 • スクロールでズーム</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let rotationX = 0;
        let rotationY = 0;
        let zoom = 1;
        let isDragging = false;
        let lastX, lastY;

        // DNAパラメータ
        const helixTurns = 4;
        const basePairs = 40;
        const helixRadius = 100;
        const verticalSpacing = 15;

        // 色パレット（DNAの美しい色）
        const color1 = { r: 0, g: 255, b: 255 };  // シアン
        const color2 = { r: 255, g: 0, b: 255 };  // マゼンタ

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function rotate3D(x, y, z) {
            // X軸回転
            let y1 = y * Math.cos(rotationX) - z * Math.sin(rotationX);
            let z1 = y * Math.sin(rotationX) + z * Math.cos(rotationX);

            // Y軸回転
            let x2 = x * Math.cos(rotationY) - z1 * Math.sin(rotationY);
            let z2 = x * Math.sin(rotationY) + z1 * Math.cos(rotationY);

            return { x: x2, y: y1, z: z2 };
        }

        function project(x, y, z) {
            const perspective = 500;
            const scale = perspective / (perspective + z) * zoom;

            return {
                x: width / 2 + x * scale,
                y: height / 2 + y * scale,
                scale: scale
            };
        }

        function drawHelix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            const points = [];
            const totalHeight = (basePairs - 1) * verticalSpacing;

            // DNAポイントを生成
            for (let i = 0; i < basePairs; i++) {
                const t = (i / basePairs) * helixTurns * Math.PI * 2;
                const y = (i / (basePairs - 1)) * totalHeight - totalHeight / 2;

                // 鎖1
                const x1 = Math.cos(t) * helixRadius;
                const z1 = Math.sin(t) * helixRadius;

                // 鎖2（180度ずらす）
                const x2 = Math.cos(t + Math.PI) * helixRadius;
                const z2 = Math.sin(t + Math.PI) * helixRadius;

                points.push({
                    type: 'strand1',
                    x: x1,
                    y: y,
                    z: z1,
                    index: i
                });

                points.push({
                    type: 'strand2',
                    x: x2,
                    y: y,
                    z: z2,
                    index: i
                });
            }

            // Zソート（奥から手前へ）
            points.sort((a, b) => {
                const ra = rotate3D(a.x, a.y, a.z);
                const rb = rotate3D(b.x, b.y, b.z);
                return rb.z - ra.z;
            });

            // ポイントを描画
            points.forEach(point => {
                const rotated = rotate3D(point.x, point.y, point.z);
                const projected = project(rotated.x, rotated.y, rotated.z);

                // 色のグラデーション
                const progress = point.index / basePairs;
                const r = Math.floor(color1.r + (color2.r - color1.r) * progress);
                const g = Math.floor(color1.g + (color2.g - color1.g) * progress);
                const b = Math.floor(color1.b + (color2.b - color1.b) * progress);

                // グロー効果
                const gradient = ctx.createRadialGradient(
                    projected.x, projected.y, 0,
                    projected.x, projected.y, 15 * projected.scale
                );

                if (point.type === 'strand1') {
                    gradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, 1)`);
                    gradient.addColorStop(0.5, `rgba(${r}, ${g}, ${b}, 0.3)`);
                    gradient.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);
                } else {
                    gradient.addColorStop(0, `rgba(${b}, ${r}, ${g}, 1)`);
                    gradient.addColorStop(0.5, `rgba(${b}, ${r}, ${g}, 0.3)`);
                    gradient.addColorStop(1, `rgba(${b}, ${r}, ${g}, 0)`);
                }

                ctx.beginPath();
                ctx.arc(projected.x, projected.y, 15 * projected.scale, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // 中心の点
                ctx.beginPath();
                ctx.arc(projected.x, projected.y, 5 * projected.scale, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, 0.9)`;
                ctx.fill();

                // 接続線（塩基対）
                if (point.type === 'strand1' && point.index < basePairs - 1) {
                    const nextIndex = point.index + 1;
                    const nextT = (nextIndex / basePairs) * helixTurns * Math.PI * 2;
                    const nextY = (nextIndex / (basePairs - 1)) * totalHeight - totalHeight / 2;

                    const x2 = Math.cos(nextT + Math.PI) * helixRadius;
                    const z2 = Math.sin(nextT + Math.PI) * helixRadius;

                    const r2 = rotate3D(x2, nextY, z2);
                    const p2 = project(r2.x, r2.y, r2.z);

                    ctx.beginPath();
                    ctx.moveTo(projected.x, projected.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${0.1 * projected.scale})`;
                    ctx.lineWidth = 1 * projected.scale;
                    ctx.stroke();
                }
            });
        }

        function animate() {
            rotationY += 0.005;
            drawHelix();
            requestAnimationFrame(animate);
        }

        // イベントハンドラー
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const deltaX = e.clientX - lastX;
                const deltaY = e.clientY - lastY;
                rotationY += deltaX * 0.01;
                rotationX += deltaY * 0.01;
                lastX = e.clientX;
                lastY = e.clientY;
            }
        });

        canvas.addEventListener('mouseup', () => {
            isDragging = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            zoom += e.deltaY * -0.001;
            zoom = Math.max(0.5, Math.min(3, zoom));
        });

        // タッチ対応
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDragging = true;
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isDragging && e.touches.length === 1) {
                const deltaX = e.touches[0].clientX - lastX;
                const deltaY = e.touches[0].clientY - lastY;
                rotationY += deltaX * 0.01;
                rotationX += deltaY * 0.01;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            }
        });

        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });

        window.addEventListener('resize', resize);

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        resize();
        animate();
    </script>
</body>
</html>
