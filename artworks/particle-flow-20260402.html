<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Flow - パーティクル・フロー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="info">マウスを動かしてパーティクルを操作</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let mouseX = width / 2;
        let mouseY = height / 2;
        let mouseSpeed = 0;
        let lastMouseX = mouseX;
        let lastMouseY = mouseY;

        // 色相
        let hue = 0;

        // パーティクルクラス
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = mouseX + (Math.random() - 0.5) * 100;
                this.y = mouseY + (Math.random() - 0.5) * 100;
                this.vx = 0;
                this.vy = 0;
                this.life = 1;
                this.maxLife = 0.5 + Math.random() * 1.5;
                this.size = 1 + Math.random() * 3;
                this.hue = hue + (Math.random() - 0.5) * 60;
            }

            update() {
                // マウスの方へ加速
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > 0) {
                    const force = Math.min(mouseSpeed * 0.1, 5);
                    this.vx += (dx / dist) * force;
                    this.vy += (dy / dist) * force;
                }

                // 回転力を追加
                this.vx += (Math.random() - 0.5) * 0.5;
                this.vy += (Math.random() - 0.5) * 0.5;

                // 減速
                this.vx *= 0.98;
                this.vy *= 0.98;

                // 移動
                this.x += this.vx;
                this.y += this.vy;

                // 寿命を減らす
                this.life -= 0.01;

                // 死んだらリセット
                if (this.life <= 0) {
                    this.reset();
                }
            }

            draw() {
                const alpha = this.life * 0.8;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${alpha})`;
                ctx.fill();
            }
        }

        // パーティクル配列
        const particles = [];
        const particleCount = 500;

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        // マウスイベント
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            // マウスの速度を計算
            const dx = mouseX - lastMouseX;
            const dy = mouseY - lastMouseY;
            mouseSpeed = Math.sqrt(dx * dx + dy * dy);

            lastMouseX = mouseX;
            lastMouseY = mouseY;
        });

        // タッチイベント
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;

            const dx = mouseX - lastMouseX;
            const dy = mouseY - lastMouseY;
            mouseSpeed = Math.sqrt(dx * dx + dy * dy);

            lastMouseX = mouseX;
            lastMouseY = mouseY;
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            lastMouseX = mouseX;
            lastMouseY = mouseY;
        });

        // アニメーション
        function animate() {
            // 背景をフェード
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 色相を回転
            hue += 0.5;

            // パーティクルを更新・描画
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // マウス速度を減衰
            mouseSpeed *= 0.95;

            requestAnimationFrame(animate);
        }

        animate();

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // リサイズ対応
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
