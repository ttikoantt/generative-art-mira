<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オーディオスペクトログラム | Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            color: #ffffff;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff006e, #8338ec, #3a86ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(131, 56, 236, 0.3);
        }

        .subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 30px;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            border: 2px solid #8338ec;
            background: rgba(131, 56, 236, 0.1);
            color: #fff;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
        }

        button:hover {
            background: rgba(131, 56, 236, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(131, 56, 236, 0.4);
        }

        button.active {
            background: #8338ec;
            box-shadow: 0 0 20px rgba(131, 56, 236, 0.6);
        }

        #canvas {
            width: 100%;
            max-width: 1000px;
            height: 400px;
            border-radius: 12px;
            background: #000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .status {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #666;
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .mode-selector button {
            padding: 8px 16px;
            font-size: 0.85rem;
            border-color: #3a86ff;
        }

        .mode-selector button.active {
            background: #3a86ff;
            border-color: #3a86ff;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            #canvas {
                height: 300px;
            }

            button {
                padding: 10px 18px;
                font-size: 0.9rem;
            }
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 12px;
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 オーディオスペクトログラム</h1>
        <p class="subtitle">音楽を可視化する - 音の世界を見る</p>

        <div class="controls">
            <button id="micBtn">🎤 マイクで開始</button>
            <button id="fileBtn">📁 ファイルを読み込み</button>
            <button id="demoBtn">🎵 デモ音楽</button>
            <input type="file" id="audioFile" accept="audio/*" style="display: none;">
        </div>

        <canvas id="canvas"></canvas>

        <div class="mode-selector">
            <button class="mode-btn active" data-mode="bars">📊 棒グラフ</button>
            <button class="mode-btn" data-mode="wave">〰️ 波形</button>
            <button class="mode-btn" data-mode="circle">🔵 円形</button>
            <button class="mode-btn" data-mode="particles">✨ パーティクル</button>
        </div>

        <p class="status" id="status">スタートボタンをクリックしてください</p>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">⛶ 全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const micBtn = document.getElementById('micBtn');
        const fileBtn = document.getElementById('fileBtn');
        const demoBtn = document.getElementById('demoBtn');
        const audioFile = document.getElementById('audioFile');
        const statusEl = document.getElementById('status');
        const modeBtns = document.querySelectorAll('.mode-btn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let audioContext;
        let analyser;
        let source;
        let isRunning = false;
        let currentMode = 'bars';
        let animationId;

        // キャンバスサイズ設定
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth * window.devicePixelRatio;
            canvas.height = canvas.offsetHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 全画面
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                fullscreenBtn.textContent = '⛶ 元に戻す';
            } else {
                document.exitFullscreen();
                fullscreenBtn.textContent = '⛶ 全画面';
            }
        });

        // モード切り替え
        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                modeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
            });
        });

        // オーディオ初期化
        function initAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 512;
            analyser.smoothingTimeConstant = 0.8;
        }

        // マイクスタート
        micBtn.addEventListener('click', async () => {
            try {
                initAudio();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);

                isRunning = true;
                micBtn.classList.add('active');
                statusEl.textContent = '🎤 マイクで音を取得中...';
                visualize();
            } catch (err) {
                statusEl.textContent = '❌ マイクのアクセスが拒否されました';
                console.error(err);
            }
        });

        // ファイル選択
        fileBtn.addEventListener('click', () => audioFile.click());

        audioFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                initAudio();
                const reader = new FileReader();
                reader.onload = (event) => {
                    const audioData = event.target.result;
                    audioContext.decodeAudioData(audioData, (buffer) => {
                        if (source) source.disconnect();
                        source = audioContext.createBufferSource();
                        source.buffer = buffer;
                        source.connect(analyser);
                        analyser.connect(audioContext.destination);
                        source.start(0);
                        source.loop = true;

                        isRunning = true;
                        fileBtn.classList.add('active');
                        statusEl.textContent = `📁 再生中: ${file.name}`;
                        visualize();
                    });
                };
                reader.readAsArrayBuffer(file);
            }
        });

        // デモ音楽
        demoBtn.addEventListener('click', () => {
            initAudio();
            
            // オシレーターでデモ音楽生成
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(analyser);
            analyser.connect(audioContext.destination);
            
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(220, audioContext.currentTime);
            
            // メロディ生成
            const notes = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];
            let noteIndex = 0;
            
            setInterval(() => {
                if (isRunning) {
                    oscillator.frequency.setValueAtTime(
                        notes[noteIndex % notes.length],
                        audioContext.currentTime
                    );
                    noteIndex++;
                }
            }, 250);
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            oscillator.start();
            source = oscillator;

            isRunning = true;
            demoBtn.classList.add('active');
            statusEl.textContent = '🎵 デモ音楽再生中...';
            visualize();
        });

        // 可視化ループ
        function visualize() {
            if (!isRunning) return;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            const width = canvas.offsetWidth;
            const height = canvas.offsetHeight;

            ctx.fillStyle = 'rgba(10, 10, 15, 0.2)';
            ctx.fillRect(0, 0, width, height);

            switch (currentMode) {
                case 'bars':
                    drawBars(dataArray, width, height);
                    break;
                case 'wave':
                    drawWave(dataArray, width, height);
                    break;
                case 'circle':
                    drawCircle(dataArray, width, height);
                    break;
                case 'particles':
                    drawParticles(dataArray, width, height);
                    break;
            }

            animationId = requestAnimationFrame(visualize);
        }

        // 棒グラフモード
        function drawBars(dataArray, width, height) {
            const barCount = 64;
            const barWidth = width / barCount;

            for (let i = 0; i < barCount; i++) {
                const index = Math.floor(i * dataArray.length / barCount);
                const value = dataArray[index];
                const barHeight = (value / 255) * height * 0.8;

                const hue = (i / barCount) * 360;
                const saturation = 80;
                const lightness = 50 + (value / 255) * 20;

                const gradient = ctx.createLinearGradient(0, height, 0, height - barHeight);
                gradient.addColorStop(0, `hsla(${hue}, ${saturation}%, ${lightness}%, 0.8)`);
                gradient.addColorStop(1, `hsla(${hue + 30}, ${saturation}%, ${lightness + 20}%, 0.4)`);

                ctx.fillStyle = gradient;
                ctx.fillRect(i * barWidth, height - barHeight, barWidth - 2, barHeight);

                // 光沢
                ctx.fillStyle = `hsla(${hue}, ${saturation}%, 80%, 0.3)`;
                ctx.fillRect(i * barWidth, height - barHeight, barWidth - 2, 3);
            }
        }

        // 波形モード
        function drawWave(dataArray, width, height) {
            ctx.beginPath();
            ctx.moveTo(0, height / 2);

            const waveArray = new Uint8Array(analyser.fftSize);
            analyser.getByteTimeDomainData(waveArray);

            for (let i = 0; i < waveArray.length; i++) {
                const x = (i / waveArray.length) * width;
                const y = (waveArray[i] / 128.0) * height / 2;

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }

            const gradient = ctx.createLinearGradient(0, 0, width, 0);
            gradient.addColorStop(0, '#ff006e');
            gradient.addColorStop(0.5, '#8338ec');
            gradient.addColorStop(1, '#3a86ff');

            ctx.strokeStyle = gradient;
            ctx.lineWidth = 3;
            ctx.stroke();

            // 鏡像
            ctx.strokeStyle = 'rgba(131, 56, 236, 0.3)';
            ctx.lineWidth = 2;
            for (let i = 0; i < waveArray.length; i++) {
                const x = (i / waveArray.length) * width;
                const y = height - (waveArray[i] / 128.0) * height / 2;

                if (i === 0) {
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.stroke();
        }

        // 円形モード
        function drawCircle(dataArray, width, height) {
            const centerX = width / 2;
            const centerY = height / 2;
            const radius = Math.min(width, height) * 0.25;

            for (let i = 0; i < dataArray.length; i++) {
                const value = dataArray[i];
                const angle = (i / dataArray.length) * Math.PI * 2 - Math.PI / 2;

                const barHeight = (value / 255) * radius;
                const x1 = centerX + Math.cos(angle) * radius;
                const y1 = centerY + Math.sin(angle) * radius;
                const x2 = centerX + Math.cos(angle) * (radius + barHeight);
                const y2 = centerY + Math.sin(angle) * (radius + barHeight);

                const hue = (i / dataArray.length) * 360;

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = `hsla(${hue}, 80%, 60%, 0.8)`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // 中心円
            const avgValue = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 0.8, 0, Math.PI * 2);
            ctx.fillStyle = `hsla(${(avgValue / 255) * 360}, 80%, 50%, 0.3)`;
            ctx.fill();
        }

        // パーティクルモード（簡易版）
        function drawParticles(dataArray, width, height) {
            const particles = 100;
            const centerX = width / 2;
            const centerY = height / 2;

            for (let i = 0; i < particles; i++) {
                const index = Math.floor(i * dataArray.length / particles);
                const value = dataArray[index];

                const angle = (i / particles) * Math.PI * 2;
                const distance = (value / 255) * Math.min(width, height) * 0.4;

                const x = centerX + Math.cos(angle) * distance;
                const y = centerY + Math.sin(angle) * distance;
                const size = (value / 255) * 15 + 3;

                const gradient = ctx.createRadialGradient(x, y, 0, x, y, size);
                gradient.addColorStop(0, `hsla(${(value / 255) * 360}, 80%, 70%, 1)`);
                gradient.addColorStop(1, `hsla(${(value / 255) * 360}, 80%, 50%, 0)`);

                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }
    </script>
</body>
</html>
