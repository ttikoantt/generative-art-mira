<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Geometry - Digital Patterns</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a1a;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        .info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            background: rgba(10, 10, 26, 0.8);
            padding: 15px 30px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info h1 {
            font-size: 1.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00ff88, #00aaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .info p {
            font-size: 0.9em;
            opacity: 0.7;
        }

        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 10;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90%;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: rgba(10, 10, 26, 0.8);
            padding: 12px 18px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-group label {
            font-size: 0.75em;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-group input[type="range"] {
            width: 120px;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: linear-gradient(135deg, #00ff88, #00aaff);
            border-radius: 50%;
            cursor: pointer;
        }

        .pattern-select {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .pattern-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85em;
            transition: all 0.3s ease;
        }

        .pattern-btn:hover {
            background: rgba(0, 255, 136, 0.2);
            border-color: #00ff88;
        }

        .pattern-btn.active {
            background: linear-gradient(135deg, #00ff88, #00aaff);
            border-color: transparent;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9em;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 136, 0.2);
            border-color: #00ff88;
        }

        @media (max-width: 768px) {
            .info h1 {
                font-size: 1.2em;
            }

            .controls {
                bottom: 20px;
                padding: 0 10px;
            }

            .control-group {
                padding: 10px 14px;
            }

            .control-group input[type="range"] {
                width: 100px;
            }

            .pattern-btn {
                padding: 6px 12px;
                font-size: 0.75em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="canvas"></canvas>

        <div class="info">
            <h1>✦ Number Geometry ✦</h1>
            <p id="patternInfo">Times Table Visualization</p>
        </div>

        <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

        <div class="controls">
            <div class="control-group">
                <label>Points</label>
                <input type="range" id="pointsSlider" min="10" max="500" value="200">
            </div>

            <div class="control-group">
                <label>Multiplier</label>
                <input type="range" id="multiplierSlider" min="2" max="200" value="2">
            </div>

            <div class="control-group">
                <label>Pattern</label>
                <div class="pattern-select">
                    <button class="pattern-btn active" data-pattern="timesTable">Times Table</button>
                    <button class="pattern-btn" data-pattern="fibonacci">Fibonacci</button>
                    <button class="pattern-btn" data-pattern="primeSpiral">Prime Spiral</button>
                    <button class="pattern-btn" data-pattern="moduloCircle">Modulo Circle</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY, radius;
        let numPoints = 200;
        let multiplier = 2;
        let currentPattern = 'timesTable';
        let animationOffset = 0;
        let animationSpeed = 0.005;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
            radius = Math.min(width, height) * 0.4;
        }

        function getPoint(index, total, r, angleOffset = 0) {
            const angle = (index / total) * Math.PI * 2 + angleOffset;
            return {
                x: centerX + Math.cos(angle) * r,
                y: centerY + Math.sin(angle) * r,
                angle: angle
            };
        }

        function drawTimesTable() {
            ctx.strokeStyle = `hsl(${120 + animationOffset * 50}, 100%, 60%)`;
            ctx.lineWidth = 0.5;

            for (let i = 0; i < numPoints; i++) {
                const start = getPoint(i, numPoints, radius);
                const targetIndex = (i * multiplier) % numPoints;
                const end = getPoint(targetIndex, numPoints, radius);

                const alpha = 0.3 + (i / numPoints) * 0.7;
                ctx.strokeStyle = `hsla(${120 + (i / numPoints) * 180 + animationOffset * 30}, 80%, 60%, ${alpha})`;
                
                ctx.beginPath();
                ctx.moveTo(start.x, start.y);
                ctx.lineTo(end.x, end.y);
                ctx.stroke();
            }

            // Draw points
            for (let i = 0; i < numPoints; i++) {
                const point = getPoint(i, numPoints, radius);
                const hue = (i / numPoints) * 360 + animationOffset * 20;
                ctx.fillStyle = `hsl(${hue}, 70%, 55%)`;
                ctx.beginPath();
                ctx.arc(point.x, point.y, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawFibonacci() {
            const fib = [1, 1];
            for (let i = 2; i < numPoints; i++) {
                fib.push(fib[i - 1] + fib[i - 2]);
            }

            ctx.strokeStyle = `hsl(${280 + animationOffset * 40}, 100%, 65%)`;
            ctx.lineWidth = 0.5;

            const maxFib = Math.max(...fib);
            
            for (let i = 0; i < numPoints - 1; i++) {
                const ratio = fib[i] / maxFib;
                const startAngle = ratio * Math.PI * 2 * multiplier;
                const start = getPoint(i, numPoints, radius, startAngle);

                const ratio2 = fib[i + 1] / maxFib;
                const endAngle = ratio2 * Math.PI * 2 * multiplier;
                const end = getPoint(i + 1, numPoints, radius, endAngle);

                const alpha = 0.3 + (i / numPoints) * 0.7;
                const hue = (280 + (i / numPoints) * 80 + animationOffset * 20) % 360;
                ctx.strokeStyle = `hsla(${hue}, 75%, 60%, ${alpha})`;
                
                ctx.beginPath();
                ctx.moveTo(start.x, start.y);
                ctx.lineTo(end.x, end.y);
                ctx.stroke();

                // Draw fibonacci numbers
                ctx.fillStyle = `hsla(${hue}, 75%, 55%, ${alpha})`;
                ctx.beginPath();
                ctx.arc(start.x, start.y, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawPrimeSpiral() {
            function isPrime(n) {
                if (n < 2) return false;
                if (n === 2) return true;
                if (n % 2 === 0) return false;
                for (let i = 3; i <= Math.sqrt(n); i += 2) {
                    if (n % i === 0) return false;
                }
                return true;
            }

            const primes = [];
            for (let i = 2; i <= numPoints * multiplier; i++) {
                if (isPrime(i)) primes.push(i);
            }

            ctx.strokeStyle = `hsl(${40 + animationOffset * 30}, 100%, 60%)`;
            ctx.lineWidth = 0.5;

            for (let i = 0; i < primes.length - 1; i++) {
                const spiralAngle = primes[i] * 0.5 + animationOffset;
                const spiralRadius = (primes[i] / (numPoints * multiplier)) * radius;
                const start = {
                    x: centerX + Math.cos(spiralAngle) * spiralRadius,
                    y: centerY + Math.sin(spiralAngle) * spiralRadius
                };

                const spiralAngle2 = primes[i + 1] * 0.5 + animationOffset;
                const spiralRadius2 = (primes[i + 1] / (numPoints * multiplier)) * radius;
                const end = {
                    x: centerX + Math.cos(spiralAngle2) * spiralRadius2,
                    y: centerY + Math.sin(spiralAngle2) * spiralRadius2
                };

                const alpha = 0.4 + (i / primes.length) * 0.6;
                const hue = (40 + (i / primes.length) * 60 + animationOffset * 15) % 360;
                ctx.strokeStyle = `hsla(${hue}, 90%, 55%, ${alpha})`;
                
                ctx.beginPath();
                ctx.moveTo(start.x, start.y);
                ctx.lineTo(end.x, end.y);
                ctx.stroke();

                // Draw prime points
                if (i % 3 === 0) {
                    ctx.fillStyle = `hsla(${hue}, 90%, 50%, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(start.x, start.y, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function drawModuloCircle() {
            ctx.strokeStyle = `hsl(${200 + animationOffset * 35}, 100%, 60%)`;
            ctx.lineWidth = 0.5;

            const basePoints = [];
            for (let i = 0; i < numPoints; i++) {
                basePoints.push(getPoint(i, numPoints, radius));
            }

            for (let i = 0; i < basePoints.length; i++) {
                const mod = (i * multiplier) % numPoints;
                const start = basePoints[i];
                const end = basePoints[mod];

                const alpha = 0.3 + Math.sin((i / numPoints) * Math.PI + animationOffset) * 0.4;
                const hue = (200 + (i / numPoints) * 100 + animationOffset * 25) % 360;
                ctx.strokeStyle = `hsla(${hue}, 85%, 60%, ${alpha})`;
                
                ctx.beginPath();
                ctx.moveTo(start.x, start.y);
                ctx.lineTo(end.x, end.y);
                ctx.stroke();
            }

            // Draw center decoration
            ctx.fillStyle = `hsla(${200 + animationOffset * 30}, 80%, 50%, 0.3)`;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 0.1, 0, Math.PI * 2);
            ctx.fill();

            // Draw points
            for (let i = 0; i < basePoints.length; i++) {
                const hue = (200 + (i / numPoints) * 100 + animationOffset * 25) % 360;
                ctx.fillStyle = `hsl(${hue}, 70%, 50%)`;
                ctx.beginPath();
                ctx.arc(basePoints[i].x, basePoints[i].y, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function draw() {
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, width, height);

            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, width, height);

            switch (currentPattern) {
                case 'timesTable':
                    drawTimesTable();
                    break;
                case 'fibonacci':
                    drawFibonacci();
                    break;
                case 'primeSpiral':
                    drawPrimeSpiral();
                    break;
                case 'moduloCircle':
                    drawModuloCircle();
                    break;
            }

            animationOffset += animationSpeed;
            requestAnimationFrame(draw);
        }

        // Event Listeners
        document.getElementById('pointsSlider').addEventListener('input', (e) => {
            numPoints = parseInt(e.target.value);
        });

        document.getElementById('multiplierSlider').addEventListener('input', (e) => {
            multiplier = parseInt(e.target.value);
        });

        document.querySelectorAll('.pattern-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.pattern-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPattern = btn.dataset.pattern;
                
                const info = document.getElementById('patternInfo');
                switch (currentPattern) {
                    case 'timesTable':
                        info.textContent = 'Times Table Visualization';
                        break;
                    case 'fibonacci':
                        info.textContent = 'Fibonacci Spiral Pattern';
                        break;
                    case 'primeSpiral':
                        info.textContent = 'Prime Number Spiral';
                        break;
                    case 'moduloCircle':
                        info.textContent = 'Modulo Arithmetic Circle';
                        break;
                }
            });
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        window.addEventListener('resize', resize);
        resize();
        draw();
    </script>
</body>
</html>
