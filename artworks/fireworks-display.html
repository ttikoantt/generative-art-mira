<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fireworks Display - 花火ショー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #0a0a1a, #1a1a2e, #16213e);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        #canvas {
            display: block;
            cursor: crosshair;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 20px;
            color: white;
            text-align: center;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .info h1 {
            font-size: 18px;
            margin-bottom: 5px;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-radius: 15px;
            color: white;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stats div {
            margin: 5px 0;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .info {
                bottom: 10px;
                padding: 10px 20px;
                font-size: 12px;
            }

            .stats {
                top: 10px;
                right: 10px;
                padding: 10px 15px;
                font-size: 12px;
            }

            .fullscreen-btn {
                top: 10px;
                left: 10px;
                padding: 8px 12px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="stats">
        <div>🎆 花火数: <span id="fireworkCount">0</span></div>
        <div>✨ パーティクル: <span id="particleCount">0</span></div>
    </div>

    <div class="info">
        <h1>🎇 Fireworks Display 🎇</h1>
        <div>クリックで花火を打ち上げ！</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let fireworks = [];
        let particles = [];
        let fireworkCount = 0;

        // カラーパレット
        const colors = [
            ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff'],
            ['#ff9f43', '#ee5a6f', '#0abde3', '#10ac84', '#5f27cd'],
            ['#fdcb6e', '#e17055', '#00b894', '#0984e3', '#6c5ce7'],
            ['#fab1a0', '#74b9ff', '#55efc4', '#a29bfe', '#fd79a8'],
            ['#ffeaa7', '#dfe6e9', '#ff7675', '#fd79a8', '#a29bfe']
        ];

        class Firework {
            constructor(x, targetY) {
                this.x = x;
                this.y = height;
                this.targetY = targetY;
                this.speed = 8 + Math.random() * 4;
                this.angle = -Math.PI / 2;
                this.velocity = {
                    x: Math.cos(this.angle) * this.speed,
                    y: Math.sin(this.angle) * this.speed
                };
                this.trail = [];
                this.trailLength = 10;
                this.exploded = false;
            }

            update() {
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.trailLength) {
                    this.trail.shift();
                }

                this.velocity.y += 0.05;
                this.x += this.velocity.x;
                this.y += this.velocity.y;

                if (this.velocity.y >= 0 || this.y <= this.targetY) {
                    this.exploded = true;
                    this.explode();
                }
            }

            explode() {
                const colorSet = colors[Math.floor(Math.random() * colors.length)];
                const particleCount = 80 + Math.floor(Math.random() * 50);

                for (let i = 0; i < particleCount; i++) {
                    const angle = (Math.PI * 2 / particleCount) * i;
                    const speed = 2 + Math.random() * 4;

                    particles.push(new Particle(
                        this.x,
                        this.y,
                        Math.cos(angle) * speed,
                        Math.sin(angle) * speed,
                        colorSet[Math.floor(Math.random() * colorSet.length)]
                    ));
                }

                fireworkCount++;
                document.getElementById('fireworkCount').textContent = fireworkCount;
            }

            draw() {
                // 軌跡を描画
                for (let i = 0; i < this.trail.length; i++) {
                    const alpha = i / this.trail.length;
                    ctx.beginPath();
                    ctx.arc(this.trail[i].x, this.trail[i].y, 2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 200, 100, ${alpha})`;
                    ctx.fill();
                }

                // 本体を描画
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
            }
        }

        class Particle {
            constructor(x, y, vx, vy, color) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.alpha = 1;
                this.decay = 0.015 + Math.random() * 0.01;
                this.gravity = 0.05;
                this.friction = 0.99;
                this.size = 2 + Math.random() * 2;
            }

            update() {
                this.vy += this.gravity;
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color.replace(')', `, ${this.alpha})`).replace('rgb', 'rgba');
                ctx.fill();
            }
        }

        function createFirework(x, y) {
            fireworks.push(new Firework(x, y));
        }

        function animate() {
            // 半透明の背景でトレイル効果
            ctx.fillStyle = 'rgba(10, 10, 26, 0.2)';
            ctx.fillRect(0, 0, width, height);

            // 花火を更新
            for (let i = fireworks.length - 1; i >= 0; i--) {
                fireworks[i].update();
                fireworks[i].draw();

                if (fireworks[i].exploded) {
                    fireworks.splice(i, 1);
                }
            }

            // パーティクルを更新
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();

                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                }
            }

            // パーティクル数を更新
            document.getElementById('particleCount').textContent = particles.length;

            requestAnimationFrame(animate);
        }

        // クリックイベント
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            createFirework(x, y);
        });

        // タッチイベント
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            createFirework(x, y);
        });

        // 自動花火
        function autoFirework() {
            const x = Math.random() * width;
            const y = height * 0.2 + Math.random() * height * 0.3;
            createFirework(x, y);
        }

        // 最初の自動花火
        setTimeout(() => {
            autoFirework();
        }, 1000);

        // その後、時々自動花火
        setInterval(() => {
            if (Math.random() > 0.5) {
                autoFirework();
            }
        }, 3000);

        // ウィンドウサイズ変更
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // アニメーション開始
        animate();
    </script>
</body>
</html>
