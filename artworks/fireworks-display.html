<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fireworks Display - ジェネレーティブアート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a2e 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: manipulation;
        }

        #canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            user-select: none;
        }

        .fullscreen-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .stats {
            position: absolute;
            top: 10px;
            left: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            font-family: monospace;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>

    <div class="instructions">
        タップ・クリックで花火を打ち上げ<br>
        Fireworks Display by Mira
    </div>

    <div class="stats" id="stats">
        Particles: 0 | Fireworks: 0
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const stats = document.getElementById('stats');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let width, height;
        let particles = [];
        let fireworks = [];
        let autoLaunchTimer = 0;

        // 色のパレット（鮮やかな色）
        const colors = [
            ['#ff6b6b', '#ff8787', '#ffa8a8'],  // 赤
            ['#ffd43b', '#ffe066', '#ffec99'],  // 黄
            ['#69db7c', '#8ce99a', '#b2f2bb'],  // 緑
            ['#4dabf7', '#74c0fc', '#a5d8ff'],  // 青
            ['#da77f2', '#e599f7', '#f3d9fa'],  // 紫
            '#ff6b6b', '#ffd43b', '#69db7c', '#4dabf7', '#da77f2'
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        // 花火クラス（打ち上がる部分）
        class Firework {
            constructor(x, targetY) {
                this.x = x;
                this.y = height;
                this.targetY = targetY;
                this.speed = 8 + Math.random() * 4;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.trail = [];
                this.maxTrail = 10;
            }

            update() {
                // 尾を追加
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }

                // 上昇
                this.y -= this.speed;
                this.speed *= 0.98; // 空気抵抗

                // 目標高度に到達したら爆発
                if (this.y <= this.targetY || this.speed < 1) {
                    this.explode();
                    return false;
                }
                return true;
            }

            draw() {
                // 尾を描画
                for (let i = 0; i < this.trail.length; i++) {
                    const alpha = (i / this.trail.length) * 0.5;
                    ctx.beginPath();
                    ctx.arc(this.trail[i].x, this.trail[i].y, 2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 200, ${alpha})`;
                    ctx.fill();
                }

                // 花火本体
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
            }

            explode() {
                const particleCount = 80 + Math.floor(Math.random() * 60);
                const baseColor = Array.isArray(this.color) ?
                    this.color[Math.floor(Math.random() * this.color.length)] :
                    this.color;

                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle(this.x, this.y, baseColor));
                }
            }
        }

        // 粒子クラス（爆発後の火花）
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;

                // 放射状に広がる速度
                const angle = (Math.PI * 2 / 360) * Math.random() * 360;
                const speed = 2 + Math.random() * 6;

                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;

                // 物理演算パラメータ
                this.gravity = 0.08;
                this.friction = 0.985;
                this.alpha = 1;
                this.decay = 0.015 + Math.random() * 0.01;
                this.size = 2 + Math.random() * 2;
            }

            update() {
                // 速度に摩擦を適用
                this.vx *= this.friction;
                this.vy *= this.friction;

                // 重力を適用
                this.vy += this.gravity;

                // 位置更新
                this.x += this.vx;
                this.y += this.vy;

                // 減衰
                this.alpha -= this.decay;

                return this.alpha > 0;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();

                // 光の効果
                ctx.globalAlpha = this.alpha * 0.5;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function createFirework(x, y) {
            fireworks.push(new Firework(x, y));
        }

        function update() {
            // 背景（少し残してトレイル効果）
            ctx.fillStyle = 'rgba(10, 10, 26, 0.15)';
            ctx.fillRect(0, 0, width, height);

            // 花火を更新
            fireworks = fireworks.filter(fw => fw.update());
            fireworks.forEach(fw => fw.draw());

            // 粒子を更新
            particles = particles.filter(p => p.update());
            particles.forEach(p => p.draw());

            // 統計更新
            stats.textContent = `Particles: ${particles.length} | Fireworks: ${fireworks.length}`;

            // 自動打ち上げ（一定間隔で）
            autoLaunchTimer++;
            if (autoLaunchTimer > 60 && Math.random() < 0.02) {
                const x = Math.random() * width;
                const y = height * (0.2 + Math.random() * 0.3);
                createFirework(x, y);
                autoLaunchTimer = 0;
            }

            requestAnimationFrame(update);
        }

        // クリック・タップで花火を打ち上げ
        canvas.addEventListener('click', (e) => {
            createFirework(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let touch of e.touches) {
                createFirework(touch.clientX, touch.clientY);
            }
        }, { passive: false });

        // 全画面ボタン
        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // 開始時に自動でいくつか打ち上げ
        setTimeout(() => createFirework(width * 0.3, height * 0.3), 500);
        setTimeout(() => createFirework(width * 0.7, height * 0.25), 1000);
        setTimeout(() => createFirework(width * 0.5, height * 0.35), 1500);

        update();
    </script>
</body>
</html>
