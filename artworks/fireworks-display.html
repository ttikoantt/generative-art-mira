<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fireworks Display | 花火大会</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a2e 50%, #0f0f23 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .controls button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .controls button.active {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 24px;
            font-weight: 300;
            text-align: center;
            z-index: 100;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            pointer-events: none;
        }

        .hint {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 18px;
            }
            .controls {
                bottom: 10px;
            }
            .controls button {
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="title">🎆 Fireworks Display</div>
    <div class="hint">クリック or タップで花火を打ち上げ</div>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <button id="autoBtn">自動打ち上げ</button>
        <button id="clearBtn">クリア</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // 花火の配列
        let fireworks = [];
        let particles = [];

        // 自動モード
        let autoMode = false;
        let autoInterval = null;

        // 色のパレット
        const colorPalettes = [
            ['#ff6b6b', '#ee5a5a', '#ff8787', '#ffa8a8'], // 赤
            ['#4ecdc4', '#45b7aa', '#26d0ce', '#1abc9c'], // 青
            ['#ffe66d', '#ffd93d', '#ffeb3b', '#fff176'], // 黄
            ['#a29bfe', '#6c5ce7', '#a55eea', '#8854d0'], // 紫
            ['#fd79a8', '#e84393', '#ff7675', '#fab1a0'], // ピンク
            ['#00b894', '#00cec9', '#81ecec', '#74b9ff'], // シアン
            ['#fdcb6e', '#e17055', '#d63031', '#ff7675'], // オレンジ
            ['#ffffff', '#f5f5f5', '#e0e0e0', '#bdbdbd'], // 白
        ];

        // 花火クラス
        class Firework {
            constructor(x, targetY, color) {
                this.x = x;
                this.y = height;
                this.targetY = targetY;
                this.color = color;
                this.speed = 8 + Math.random() * 4;
                this.angle = -Math.PI / 2;
                this.vx = Math.cos(this.angle) * this.speed;
                this.vy = Math.sin(this.angle) * this.speed;
                this.trail = [];
                this.exploded = false;
            }

            update() {
                // 重力
                this.vy += 0.15;

                // 位置更新
                this.x += this.vx;
                this.y += this.vy;

                // トレイル追加
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 10) {
                    this.trail.shift();
                }

                // 爆発判定
                if (this.vy > 0 && !this.exploded) {
                    this.explode();
                }
            }

            draw() {
                // トレイル描画
                for (let i = 0; i < this.trail.length; i++) {
                    const alpha = i / this.trail.length;
                    ctx.beginPath();
                    ctx.arc(this.trail[i].x, this.trail[i].y, 2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.5})`;
                    ctx.fill();
                }

                // 花火本体
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();

                // グロー効果
                ctx.beginPath();
                ctx.arc(this.x, this.y, 6, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 6);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.fill();
            }

            explode() {
                this.exploded = true;
                const particleCount = 80 + Math.floor(Math.random() * 40);
                const colors = colorPalettes[Math.floor(Math.random() * colorPalettes.length)];

                for (let i = 0; i < particleCount; i++) {
                    const angle = (Math.PI * 2 / particleCount) * i;
                    const speed = 3 + Math.random() * 5;
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    particles.push(new Particle(this.x, this.y, angle, speed, color));
                }
            }
        }

        // 粒子クラス
        class Particle {
            constructor(x, y, angle, speed, color) {
                this.x = x;
                this.y = y;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.color = color;
                this.alpha = 1;
                this.decay = 0.01 + Math.random() * 0.01;
                this.gravity = 0.08;
                this.size = 2 + Math.random() * 2;
                this.trail = [];
            }

            update() {
                // 重力
                this.vy += this.gravity;

                // 空気抵抗
                this.vx *= 0.99;
                this.vy *= 0.99;

                // 位置更新
                this.x += this.vx;
                this.y += this.vy;

                // トレイル追加
                this.trail.push({ x: this.x, y: this.y, alpha: this.alpha });
                if (this.trail.length > 5) {
                    this.trail.shift();
                }

                // フェードアウト
                this.alpha -= this.decay;
            }

            draw() {
                // トレイル描画
                for (let i = 0; i < this.trail.length; i++) {
                    const alpha = (i / this.trail.length) * this.alpha * 0.5;
                    ctx.beginPath();
                    ctx.arc(this.trail[i].x, this.trail[i].y, this.size * 0.5, 0, Math.PI * 2);
                    ctx.fillStyle = this.hexToRgba(this.color, alpha);
                    ctx.fill();
                }

                // 粒子本体
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.hexToRgba(this.color, this.alpha);
                ctx.fill();

                // グロー効果
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2);
                gradient.addColorStop(0, this.hexToRgba(this.color, this.alpha * 0.5));
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.fill();
            }

            hexToRgba(hex, alpha) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }
        }

        // 星星
        const stars = [];
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * width,
                y: Math.random() * height * 0.7,
                size: Math.random() * 1.5,
                twinkle: Math.random()
            });
        }

        // 星を描画
        function drawStars() {
            stars.forEach(star => {
                star.twinkle += 0.05;
                const alpha = 0.3 + Math.sin(star.twinkle) * 0.2;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fill();
            });
        }

        // アニメーションループ
        function animate() {
            // フェード効果
            ctx.fillStyle = 'rgba(10, 10, 26, 0.2)';
            ctx.fillRect(0, 0, width, height);

            // 星を描画
            drawStars();

            // 花火を更新
            fireworks = fireworks.filter(fw => !fw.exploded);
            fireworks.forEach(fw => {
                fw.update();
                fw.draw();
            });

            // 粒子を更新
            particles = particles.filter(p => p.alpha > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        // 花火を打ち上げる
        function launchFirework(x, y) {
            const targetY = y || height * 0.2 + Math.random() * height * 0.3;
            const posX = x || Math.random() * width;
            const color = '#ffffff';
            fireworks.push(new Firework(posX, targetY, color));
        }

        // イベントリスナー
        canvas.addEventListener('click', (e) => {
            launchFirework(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            launchFirework(touch.clientX, touch.clientY);
        });

        // 自動モード
        document.getElementById('autoBtn').addEventListener('click', () => {
            autoMode = !autoMode;
            const btn = document.getElementById('autoBtn');
            btn.classList.toggle('active');
            btn.textContent = autoMode ? '自動: ON' : '自動打ち上げ';

            if (autoMode) {
                autoInterval = setInterval(() => {
                    launchFirework();
                }, 800);
            } else {
                clearInterval(autoInterval);
            }
        });

        // クリアボタン
        document.getElementById('clearBtn').addEventListener('click', () => {
            fireworks = [];
            particles = [];
        });

        // リサイズ対応
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;

            // 星を再配置
            stars.length = 0;
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height * 0.7,
                    size: Math.random() * 1.5,
                    twinkle: Math.random()
                });
            }
        });

        // 開始
        animate();

        // 初期花火
        setTimeout(() => {
            launchFirework(width * 0.3, height * 0.3);
        }, 500);
        setTimeout(() => {
            launchFirework(width * 0.7, height * 0.25);
        }, 1000);
    </script>
</body>
</html>
