<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandala Generator | Mira's Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 20px;
            color: #888;
            font-size: 0.9rem;
        }

        .canvas-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .controls {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            color: #ccc;
            font-size: 0.9rem;
        }

        .control-group input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(255, 107, 107, 0.4);
        }

        .slider-value {
            text-align: right;
            color: #feca57;
            font-size: 0.85rem;
            margin-top: 3px;
        }

        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        button {
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #fff;
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-download {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(56, 239, 125, 0.4);
        }

        .btn-fullscreen {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-fullscreen:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }

            .canvas-container,
            .controls {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕉️ Mandala Generator</h1>
        <p class="subtitle">幾何学的な美しさを生成</p>

        <div class="canvas-container">
            <canvas id="mandalaCanvas" width="600" height="600"></canvas>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="symmetry">対称性</label>
                <input type="range" id="symmetry" min="3" max="24" value="8">
                <div class="slider-value" id="symmetryValue">8</div>
            </div>

            <div class="control-group">
                <label for="layers">層数</label>
                <input type="range" id="layers" min="3" max="12" value="6">
                <div class="slider-value" id="layersValue">6</div>
            </div>

            <div class="control-group">
                <label for="complexity">複雑さ</label>
                <input type="range" id="complexity" min="1" max="10" value="5">
                <div class="slider-value" id="complexityValue">5</div>
            </div>

            <div class="control-group">
                <label for="colorScheme">配色</label>
                <input type="range" id="colorScheme" min="1" max="5" value="1">
                <div class="slider-value" id="colorSchemeValue">レインボー</div>
            </div>

            <div class="buttons">
                <button class="btn-generate" onclick="generate()">🎨 生成</button>
                <button class="btn-download" onclick="download()">💾 保存</button>
                <button class="btn-fullscreen" onclick="toggleFullscreen()">📺 全画面</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mandalaCanvas');
        const ctx = canvas.getContext('2d');
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const maxRadius = Math.min(centerX, centerY) - 20;

        const colorSchemes = [
            { name: 'レインボー', colors: ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd'] },
            { name: 'オーロラ', colors: ['#00d2ff', '#3a7bd5', '#a8edea', '#fed6e3', '#d299c2', '#fef9d7'] },
            { name: 'サンセット', colors: ['#ff6b6b', '#ff8e53', '#feca57', '#ff9ff3', '#f368e0', '#ff9f43'] },
            { name: 'フォレスト', colors: ['#26de81', '#20bf6b', '#0fb9b1', '#2bcbba', '#45aaf2', '#4b7bec'] },
            { name: 'パステル', colors: ['#ffb8b8', '#ffd9b8', '#fff5b8', '#b8ffb8', '#b8deff', '#ddb8ff'] }
        ];

        // パラメータ更新
        document.getElementById('symmetry').addEventListener('input', (e) => {
            document.getElementById('symmetryValue').textContent = e.target.value;
            generate();
        });

        document.getElementById('layers').addEventListener('input', (e) => {
            document.getElementById('layersValue').textContent = e.target.value;
            generate();
        });

        document.getElementById('complexity').addEventListener('input', (e) => {
            document.getElementById('complexityValue').textContent = e.target.value;
            generate();
        });

        document.getElementById('colorScheme').addEventListener('input', (e) => {
            document.getElementById('colorSchemeValue').textContent = colorSchemes[e.target.value - 1].name;
            generate();
        });

        function getRandomFromPalette(palette) {
            return palette[Math.floor(Math.random() * palette.length)];
        }

        function drawPetal(x, y, radius, rotation, color, complexity) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotation);
            ctx.fillStyle = color;
            ctx.strokeStyle = color;
            ctx.lineWidth = 1;

            const petalLength = radius * (0.5 + Math.random() * 0.5);
            const petalWidth = radius * (0.1 + Math.random() * 0.2);

            ctx.beginPath();
            ctx.moveTo(0, 0);

            // 花びらの曲線
            const cp1x = petalWidth * 0.5;
            const cp1y = petalLength * 0.3;
            const cp2x = petalWidth;
            const cp2y = petalLength * 0.7;
            const endx = 0;
            const endy = petalLength;

            ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, endx, endy);
            ctx.bezierCurveTo(-cp2x, cp2y, -cp1x, cp1y, 0, 0);
            ctx.closePath();
            ctx.globalAlpha = 0.6 + Math.random() * 0.4;
            ctx.fill();
            ctx.globalAlpha = 1;
            ctx.restore();
        }

        function drawLayer(layerIndex, totalLayers, symmetry, complexity, palette) {
            const layerRadius = (maxRadius / totalLayers) * (layerIndex + 1);
            const elementsPerSymmetry = Math.ceil(complexity / 2);

            for (let i = 0; i < symmetry; i++) {
                const angle = (i * 2 * Math.PI) / symmetry;

                for (let j = 0; j < elementsPerSymmetry; j++) {
                    const subAngle = angle + (j * Math.PI / symmetry) * (Math.random() > 0.5 ? 1 : -1);
                    const distance = layerRadius * (0.3 + (j / elementsPerSymmetry) * 0.7);
                    const x = centerX + Math.cos(subAngle) * distance;
                    const y = centerY + Math.sin(subAngle) * distance;
                    const size = (layerRadius / totalLayers) * (0.3 + Math.random() * 0.7);

                    // ランダムに図形を選択
                    const shapeType = Math.random();

                    if (shapeType < 0.5) {
                        // 花びら
                        drawPetal(x, y, size, subAngle + Math.PI / 2, getRandomFromPalette(palette), complexity);
                    } else if (shapeType < 0.7) {
                        // 円
                        ctx.beginPath();
                        ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
                        ctx.fillStyle = getRandomFromPalette(palette);
                        ctx.globalAlpha = 0.7;
                        ctx.fill();
                        ctx.globalAlpha = 1;
                    } else {
                        // 線
                        ctx.beginPath();
                        ctx.moveTo(centerX, centerY);
                        ctx.lineTo(x, y);
                        ctx.strokeStyle = getRandomFromPalette(palette);
                        ctx.lineWidth = 1 + Math.random() * 2;
                        ctx.globalAlpha = 0.3 + Math.random() * 0.4;
                        ctx.stroke();
                        ctx.globalAlpha = 1;

                        // 端に小さな円
                        ctx.beginPath();
                        ctx.arc(x, y, size * 0.3, 0, Math.PI * 2);
                        ctx.fillStyle = getRandomFromPalette(palette);
                        ctx.globalAlpha = 0.8;
                        ctx.fill();
                        ctx.globalAlpha = 1;
                    }
                }
            }
        }

        function generate() {
            // キャンバスをクリア
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const symmetry = parseInt(document.getElementById('symmetry').value);
            const layers = parseInt(document.getElementById('layers').value);
            const complexity = parseInt(document.getElementById('complexity').value);
            const schemeIndex = parseInt(document.getElementById('colorScheme').value) - 1;
            const palette = colorSchemes[schemeIndex].colors;

            // 背景のグラデーション
            const bgGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, maxRadius);
            bgGradient.addColorStop(0, 'rgba(26, 26, 46, 1)');
            bgGradient.addColorStop(1, 'rgba(15, 52, 96, 1)');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 中央の円
            ctx.beginPath();
            ctx.arc(centerX, centerY, maxRadius * 0.1, 0, Math.PI * 2);
            ctx.fillStyle = palette[0];
            ctx.globalAlpha = 0.5;
            ctx.fill();
            ctx.globalAlpha = 1;

            // 各層を描画
            for (let i = 0; i < layers; i++) {
                drawLayer(i, layers, symmetry, complexity, palette);
            }

            // 外枠
            ctx.beginPath();
            ctx.arc(centerX, centerY, maxRadius, 0, Math.PI * 2);
            ctx.strokeStyle = palette[palette.length - 1];
            ctx.lineWidth = 2;
            ctx.globalAlpha = 0.5;
            ctx.stroke();
            ctx.globalAlpha = 1;
        }

        function download() {
            const link = document.createElement('a');
            link.download = `mandala-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期生成
        generate();
    </script>
</body>
</html>
