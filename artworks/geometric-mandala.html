<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Geometric Mandala - Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
        }

        .title {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 24px;
            font-weight: 300;
            z-index: 100;
            pointer-events: none;
            letter-spacing: 2px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <canvas id="mandala"></canvas>
    
    <div class="title">Geometric Mandala</div>
    <div class="info">Move or tap to create patterns</div>
    <button class="fullscreen-btn" id="fullscreenBtn">全画面表示</button>

    <script>
        const canvas = document.getElementById('mandala');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        let centerX = width / 2;
        let centerY = height / 2;

        let mouseX = centerX;
        let mouseY = centerY;
        let hue = 0;
        let rotation = 0;
        let layers = [];
        let lastPatternTime = 0;

        class Layer {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.hue = hue;
                this.rotation = 0;
                this.scale = 0;
                this.maxScale = 50 + Math.random() * 150;
                this.sides = 6 + Math.floor(Math.random() * 6); // 6-12 sides
                this.thickness = 1 + Math.random() * 2;
                this.opacity = 0.8;
                this.growthSpeed = 2 + Math.random() * 3;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                this.patterns = [];
                
                this.generatePatterns();
            }

            generatePatterns() {
                const numPatterns = 3 + Math.floor(Math.random() * 5);
                for (let i = 0; i < numPatterns; i++) {
                    this.patterns.push({
                        offset: Math.random() * 50 - 25,
                        scale: 0.5 + Math.random() * 0.5,
                        rotation: Math.random() * Math.PI * 2,
                        sides: this.sides + Math.floor(Math.random() * 3) - 1
                    });
                }
            }

            update() {
                if (this.scale < this.maxScale) {
                    this.scale += this.growthSpeed;
                } else {
                    this.opacity -= 0.005;
                }
                this.rotation += this.rotationSpeed;
            }

            draw(ctx) {
                if (this.opacity <= 0) return;

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // メインの形状
                this.drawPolygon(ctx, 0, 0, this.scale, this.sides, this.hue, this.opacity);

                // パターンを描画
                this.patterns.forEach(pattern => {
                    this.drawPolygon(
                        ctx,
                        pattern.offset,
                        pattern.offset,
                        this.scale * pattern.scale,
                        pattern.sides,
                        (this.hue + 30) % 360,
                        this.opacity * 0.5
                    );
                });

                ctx.restore();
            }

            drawPolygon(ctx, x, y, radius, sides, hue, opacity) {
                ctx.save();
                ctx.translate(x, y);
                
                ctx.beginPath();
                for (let i = 0; i <= sides; i++) {
                    const angle = (i / sides) * Math.PI * 2;
                    const px = Math.cos(angle) * radius;
                    const py = Math.sin(angle) * radius;
                    
                    if (i === 0) {
                        ctx.moveTo(px, py);
                    } else {
                        ctx.lineTo(px, py);
                    }
                }
                ctx.closePath();
                
                ctx.strokeStyle = `hsla(${hue}, 80%, 60%, ${opacity})`;
                ctx.lineWidth = this.thickness;
                ctx.stroke();

                // グロー効果
                ctx.strokeStyle = `hsla(${hue}, 100%, 70%, ${opacity * 0.3})`;
                ctx.lineWidth = this.thickness + 4;
                ctx.stroke();

                ctx.restore();
            }

            isAlive() {
                return this.opacity > 0;
            }
        }

        function createLayer(x, y) {
            layers.push(new Layer(x, y, hue));
        }

        function draw() {
            // 半透明の黒で背景を塗りつぶしてトレイル効果
            ctx.fillStyle = 'rgba(0, 0, 0, 0.03)';
            ctx.fillRect(0, 0, width, height);

            // 色を更新
            hue = (hue + 0.2) % 360;
            rotation += 0.002;

            // レイヤーを更新・描画
            layers = layers.filter(layer => {
                layer.update();
                layer.draw(ctx);
                return layer.isAlive();
            });

            // 中心のマンダラを描画
            drawCenterMandala();

            requestAnimationFrame(draw);
        }

        function drawCenterMandala() {
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(rotation);

            const numRings = 8;
            for (let r = 0; r < numRings; r++) {
                const radius = 30 + r * 25;
                const sides = 6 + r;
                const rotationOffset = r * 0.1;
                const layerHue = (hue + r * 20) % 360;

                ctx.save();
                ctx.rotate(rotationOffset);

                drawPolygonPath(0, 0, radius, sides, layerHue, 0.3);

                ctx.restore();
            }

            ctx.restore();
        }

        function drawPolygonPath(x, y, radius, sides, hue, opacity) {
            ctx.beginPath();
            for (let i = 0; i <= sides; i++) {
                const angle = (i / sides) * Math.PI * 2;
                const px = x + Math.cos(angle) * radius;
                const py = y + Math.sin(angle) * radius;
                
                if (i === 0) {
                    ctx.moveTo(px, py);
                } else {
                    ctx.lineTo(px, py);
                }
            }
            ctx.closePath();
            
            ctx.strokeStyle = `hsla(${hue}, 80%, 60%, ${opacity})`;
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        // イベントハンドラー
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            const now = Date.now();
            if (now - lastPatternTime > 100) {
                createLayer(mouseX, mouseY);
                lastPatternTime = now;
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            
            const now = Date.now();
            if (now - lastPatternTime > 100) {
                createLayer(mouseX, mouseY);
                lastPatternTime = now;
            }
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createLayer(touch.clientX, touch.clientY);
        }, { passive: false });

        canvas.addEventListener('click', (e) => {
            createLayer(e.clientX, e.clientY);
        });

        // 全画面表示
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                fullscreenBtn.textContent = '全画面を終了';
            } else {
                document.exitFullscreen();
                fullscreenBtn.textContent = '全画面表示';
            }
        });

        // リサイズ対応
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        });

        // 自動的にレイヤーを作成
        setInterval(() => {
            if (Math.random() > 0.7) {
                const x = Math.random() * width;
                const y = Math.random() * height;
                createLayer(x, y);
            }
        }, 2000);

        // 開始
        draw();
    </script>
</body>
</html>
