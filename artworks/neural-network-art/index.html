<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Network Art - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
        }
        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffaa;
            font-size: 12px;
            pointer-events: none;
            text-shadow: 0 0 10px #00ffaa;
        }
    </style>
</head>
<body>
    <div class="info">Neural Network Art #860<br>Move mouse to interact</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const layers = [6, 10, 8, 6, 4];
        const neurons = [];
        const connections = [];
        const particles = [];

        let mouseX = width / 2;
        let mouseY = height / 2;

        class Neuron {
            constructor(x, y, layer) {
                this.x = x;
                this.y = y;
                this.layer = layer;
                this.radius = Math.random() * 8 + 4;
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.pulseSpeed = Math.random() * 0.03 + 0.01;
                this.active = 0;
            }

            update(time) {
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const influence = Math.max(0, 1 - dist / 400);

                this.pulsePhase += this.pulseSpeed + influence * 0.02;
                this.active = influence;
            }

            draw(ctx, time) {
                const pulse = Math.sin(this.pulsePhase) * 0.5 + 0.5;
                const glowRadius = this.radius * (2 + pulse + this.active * 2);

                // Outer glow
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, glowRadius * 2
                );
                gradient.addColorStop(0, `rgba(0, 255, 170, ${0.3 + pulse * 0.2 + this.active * 0.5})`);
                gradient.addColorStop(0.5, `rgba(0, 200, 150, ${0.1 + pulse * 0.1})`);
                gradient.addColorStop(1, 'rgba(0, 150, 100, 0)');

                ctx.beginPath();
                ctx.arc(this.x, this.y, glowRadius * 2, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Core
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 255, 170, ${0.6 + pulse * 0.4 + this.active * 0.4})`;
                ctx.fill();

                // Inner highlight
                ctx.beginPath();
                ctx.arc(this.x - this.radius * 0.3, this.y - this.radius * 0.3, this.radius * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${0.4 + pulse * 0.3})`;
                ctx.fill();
            }
        }

        class Connection {
            constructor(n1, n2) {
                this.n1 = n1;
                this.n2 = n2;
                this.signalPhase = Math.random() * Math.PI * 2;
                this.signalSpeed = Math.random() * 0.02 + 0.01;
            }

            update(time) {
                this.signalPhase += this.signalSpeed;
            }

            draw(ctx, time) {
                const signal = Math.sin(this.signalPhase) * 0.5 + 0.5;
                const activity = Math.max(this.n1.active, this.n2.active);

                ctx.beginPath();
                ctx.moveTo(this.n1.x, this.n1.y);
                ctx.lineTo(this.n2.x, this.n2.y);

                const gradient = ctx.createLinearGradient(
                    this.n1.x, this.n1.y,
                    this.n2.x, this.n2.y
                );
                gradient.addColorStop(0, `rgba(0, 200, 150, ${0.1 + signal * 0.2 + activity * 0.5})`);
                gradient.addColorStop(0.5, `rgba(0, 255, 200, ${0.2 + signal * 0.3 + activity * 0.6})`);
                gradient.addColorStop(1, `rgba(0, 200, 150, ${0.1 + signal * 0.2 + activity * 0.5})`);

                ctx.strokeStyle = gradient;
                ctx.lineWidth = 1 + signal + activity * 2;
                ctx.stroke();

                // Signal particle
                if (signal > 0.9 || activity > 0.5) {
                    const t = (this.signalPhase % (Math.PI * 2)) / (Math.PI * 2);
                    const px = this.n1.x + (this.n2.x - this.n1.x) * t;
                    const py = this.n1.y + (this.n2.y - this.n1.y) * t;

                    ctx.beginPath();
                    ctx.arc(px, py, 2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${signal + activity})`;
                    ctx.fill();
                }
            }
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.life = 0;
                this.maxLife = Math.random() * 200 + 100;
                this.size = Math.random() * 2 + 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life++;

                if (this.life > this.maxLife || this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                    this.reset();
                }
            }

            draw(ctx) {
                const alpha = Math.max(0, 1 - this.life / this.maxLife) * 0.3;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 200, 150, ${alpha})`;
                ctx.fill();
            }
        }

        function init() {
            neurons.length = 0;
            connections.length = 0;

            const layerSpacing = width / (layers.length + 1);

            for (let l = 0; l < layers.length; l++) {
                const neuronCount = layers[l];
                const layerX = layerSpacing * (l + 1);
                const verticalSpacing = height / (neuronCount + 1);

                for (let n = 0; n < neuronCount; n++) {
                    const neuronY = verticalSpacing * (n + 1) + (Math.random() - 0.5) * 50;
                    neurons.push(new Neuron(layerX, neuronY, l));
                }
            }

            let prevLayerStart = 0;
            let prevLayerCount = layers[0];

            for (let l = 1; l < layers.length; l++) {
                const layerStart = prevLayerStart + prevLayerCount;
                const layerCount = layers[l];

                for (let i = 0; i < prevLayerCount; i++) {
                    for (let j = 0; j < layerCount; j++) {
                        if (Math.random() > 0.3) {
                            connections.push(new Connection(
                                neurons[prevLayerStart + i],
                                neurons[layerStart + j]
                            ));
                        }
                    }
                }

                prevLayerStart = layerStart;
                prevLayerCount = layerCount;
            }

            for (let i = 0; i < 50; i++) {
                particles.push(new Particle());
            }
        }

        let time = 0;

        function animate() {
            time++;

            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                p.update();
                p.draw(ctx);
            });

            connections.forEach(c => {
                c.update(time);
                c.draw(ctx, time);
            });

            neurons.forEach(n => {
                n.update(time);
                n.draw(ctx, time);
            });

            requestAnimationFrame(animate);
        }

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            init();
        });

        init();
        animate();
    </script>
</body>
</html>
