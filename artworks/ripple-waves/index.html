<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ripple Waves - インタラクティブ波紋</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        #canvas {
            display: block;
            cursor: pointer;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            user-select: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">クリックまたはタップで波紋を作成</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let ripples = [];

        // 色パレット
        const colors = [
            'rgba(99, 102, 241, ',   // Indigo
            'rgba(168, 85, 247, ',   // Purple
            'rgba(236, 72, 153, ',   // Pink
            'rgba(34, 211, 238, ',   // Cyan
            'rgba(52, 211, 153, ',   // Emerald
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Ripple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.max(width, height) * 0.8;
                this.speed = 2 + Math.random() * 2;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.opacity = 1;
                this.lineWidth = 3;
            }

            update() {
                this.radius += this.speed;
                this.opacity = 1 - (this.radius / this.maxRadius);
                this.lineWidth = 3 * this.opacity;
            }

            draw() {
                if (this.opacity <= 0) return;

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = this.color + this.opacity + ')';
                ctx.lineWidth = this.lineWidth;
                ctx.stroke();

                // 2番目の波紋（遅れて表示）
                if (this.radius > 50) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius - 50, 0, Math.PI * 2);
                    ctx.strokeStyle = this.color + (this.opacity * 0.5) + ')';
                    ctx.lineWidth = this.lineWidth * 0.5;
                    ctx.stroke();
                }
            }

            isDead() {
                return this.opacity <= 0;
            }
        }

        function createRipple(x, y) {
            ripples.push(new Ripple(x, y));

            // 複数の波紋を少しズレて作成
            setTimeout(() => {
                ripples.push(new Ripple(x, y));
            }, 100);

            setTimeout(() => {
                ripples.push(new Ripple(x, y));
            }, 200);
        }

        function animate() {
            // 半透明の背景でトレイル効果
            ctx.fillStyle = 'rgba(26, 26, 46, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 波紋を更新・描画
            ripples = ripples.filter(ripple => {
                ripple.update();
                ripple.draw();
                return !ripple.isDead();
            });

            requestAnimationFrame(animate);
        }

        // イベントリスナー
        canvas.addEventListener('click', (e) => {
            createRipple(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createRipple(touch.clientX, touch.clientY);
        }, { passive: false });

        window.addEventListener('resize', resize);

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        resize();
        animate();

        // デモ用の自動波紋（最初）
        setTimeout(() => createRipple(width / 2, height / 2), 500);
    </script>
</body>
</html>
