<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bioluminescent Waves - 生物発光波</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #0a0e1a 0%, #001f3f 50%, #003366 100%);
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #00ffff;
            font-size: 14px;
            text-shadow: 0 0 10px #00ffff;
            z-index: 100;
            pointer-events: none;
            opacity: 0.7;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #00ffff;
            color: #00ffff;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 20px #00ffff;
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                top: 10px;
                left: 10px;
            }

            .fullscreen-btn {
                font-size: 12px;
                padding: 8px 15px;
                top: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <div>Bioluminescent Waves</div>
        <div style="margin-top: 5px; font-size: 12px;">タッチ/クリックで発光</div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let waves = [];
        let mouseX = 0;
        let mouseY = 0;
        let isMouseDown = false;
        let time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        // タッチ/マウスイベント
        canvas.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            mouseX = e.clientX;
            mouseY = e.clientY;
            createBioluminescence(e.clientX, e.clientY);
        });

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            if (isMouseDown) {
                createBioluminescence(e.clientX, e.clientY);
            }
        });

        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isMouseDown = true;
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            createBioluminescence(touch.clientX, touch.clientY);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            if (isMouseDown) {
                createBioluminescence(touch.clientX, touch.clientY);
            }
        });

        canvas.addEventListener('touchend', () => {
            isMouseDown = false;
        });

        class BioluminescentParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2 - 1;
                this.life = 1;
                this.decay = 0.005 + Math.random() * 0.01;
                this.size = 2 + Math.random() * 4;
                this.hue = 160 + Math.random() * 40; // 青〜緑系
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.02; // 浮力
                this.life -= this.decay;
                this.hue += 0.5;
            }

            draw() {
                const alpha = this.life * 0.8;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${alpha})`;
                ctx.fill();

                // グロー効果
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life * 3, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${alpha * 0.3})`;
                ctx.fill();
            }
        }

        class Wave {
            constructor(y, amplitude, frequency, speed) {
                this.y = y;
                this.amplitude = amplitude;
                this.frequency = frequency;
                this.speed = speed;
                this.phase = Math.random() * Math.PI * 2;
                this.hue = 160 + Math.random() * 40;
            }

            draw() {
                ctx.beginPath();
                ctx.moveTo(0, this.y);

                for (let x = 0; x <= width; x += 5) {
                    const y = this.y + 
                              Math.sin(x * this.frequency + this.phase + time * this.speed) * this.amplitude +
                              Math.sin(x * this.frequency * 2 + this.phase * 1.5 + time * this.speed * 1.3) * this.amplitude * 0.5;
                    ctx.lineTo(x, y);
                }

                ctx.lineTo(width, height);
                ctx.lineTo(0, height);
                ctx.closePath();

                // グラデーション
                const gradient = ctx.createLinearGradient(0, this.y - this.amplitude, 0, height);
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 20%, 0.3)`);
                gradient.addColorStop(0.5, `hsla(${this.hue + 20}, 90%, 30%, 0.5)`);
                gradient.addColorStop(1, `hsla(${this.hue + 40}, 100%, 10%, 0.8)`);

                ctx.fillStyle = gradient;
                ctx.fill();

                // 波の頂点に発光ポイント
                for (let x = 0; x <= width; x += 30) {
                    const y = this.y + 
                              Math.sin(x * this.frequency + this.phase + time * this.speed) * this.amplitude +
                              Math.sin(x * this.frequency * 2 + this.phase * 1.5 + time * this.speed * 1.3) * this.amplitude * 0.5;

                    const glowIntensity = Math.sin(time * 2 + x * 0.01) * 0.5 + 0.5;

                    ctx.beginPath();
                    ctx.arc(x, y, 3 + glowIntensity * 5, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue}, 100%, 70%, ${glowIntensity * 0.6})`;
                    ctx.fill();

                    // グロー
                    ctx.beginPath();
                    ctx.arc(x, y, 10 + glowIntensity * 15, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${glowIntensity * 0.2})`;
                    ctx.fill();
                }
            }

            update() {
                this.phase += this.speed * 0.02;
            }
        }

        function createBioluminescence(x, y) {
            for (let i = 0; i < 5; i++) {
                particles.push(new BioluminescentParticle(
                    x + (Math.random() - 0.5) * 30,
                    y + (Math.random() - 0.5) * 30
                ));
            }
        }

        function initWaves() {
            waves = [];
            const numWaves = 5;
            for (let i = 0; i < numWaves; i++) {
                const y = height * (0.4 + i * 0.15);
                const amplitude = 20 + i * 10;
                const frequency = 0.005 + i * 0.002;
                const speed = 0.5 + i * 0.2;
                waves.push(new Wave(y, amplitude, frequency, speed));
            }
        }

        initWaves();

        window.addEventListener('resize', initWaves);

        function animate() {
            // 深海の背景グラデーション
            const bgGradient = ctx.createLinearGradient(0, 0, 0, height);
            bgGradient.addColorStop(0, '#0a0e1a');
            bgGradient.addColorStop(0.5, '#001f3f');
            bgGradient.addColorStop(1, '#003366');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, width, height);

            // 水中の光のカーテン効果
            for (let i = 0; i < 3; i++) {
                const x = (time * 50 + i * width / 3) % width;
                const gradient = ctx.createLinearGradient(x, 0, x + 100, height);
                gradient.addColorStop(0, `hsla(180, 100%, 50%, 0)`);
                gradient.addColorStop(0.5, `hsla(180, 100%, 60%, ${0.02 + Math.sin(time + i) * 0.01})`);
                gradient.addColorStop(1, `hsla(180, 100%, 50%, 0)`);
                ctx.fillStyle = gradient;
                ctx.fillRect(x, 0, 100, height);
            }

            // 波を描画（奥から手前へ）
            waves.forEach(wave => {
                wave.update();
                wave.draw();
            });

            // パーティクルを更新・描画
            particles = particles.filter(p => p.life > 0);
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // 自動発光エフェクト
            if (Math.random() < 0.02) {
                const x = Math.random() * width;
                const y = height * (0.4 + Math.random() * 0.5);
                createBioluminescence(x, y);
            }

            time += 0.016;
            requestAnimationFrame(animate);
        }

        animate();

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Fullscreen error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
