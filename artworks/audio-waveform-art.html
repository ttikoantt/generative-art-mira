<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Waveform Art - 音声波形アート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #0a0e27;
            color: #fff;
            overflow: hidden;
            min-height: 100vh;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: clamp(24px, 6vw, 48px);
            font-weight: 300;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .start-btn {
            padding: 16px 40px;
            font-size: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 30px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(102, 126, 234, 0.6);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .hidden {
            display: none;
        }

        .info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            opacity: 0.7;
            text-align: center;
            z-index: 10;
        }

        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .control-btn {
            padding: 10px 16px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 16px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .color-scheme {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .scheme-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .scheme-btn:hover,
        .scheme-btn.active {
            transform: scale(1.2);
            border-color: #fff;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 24px;
            }

            .controls {
                top: 10px;
                right: 10px;
                flex-direction: column;
            }

            .fullscreen-btn {
                top: 10px;
                left: 10px;
                padding: 8px 12px;
                font-size: 12px;
            }

            .info {
                font-size: 12px;
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="canvas"></canvas>

        <div class="overlay" id="overlay">
            <h1>Audio Waveform Art</h1>
            <p style="margin-bottom: 30px; opacity: 0.8;">音声を入力して波形をアートに</p>
            <button class="start-btn" id="startBtn">🎤 マイクを開始</button>
        </div>

        <div class="controls hidden" id="controls">
            <button class="control-btn" id="modeBtn">🎨 モード変更</button>
        </div>

        <button class="fullscreen-btn" id="fullscreenBtn">⛶ 全画面</button>

        <div class="color-scheme hidden" id="colorScheme">
            <button class="scheme-btn active" data-scheme="0" style="background: linear-gradient(135deg, #667eea, #764ba2);"></button>
            <button class="scheme-btn" data-scheme="1" style="background: linear-gradient(135deg, #f093fb, #f5576c);"></button>
            <button class="scheme-btn" data-scheme="2" style="background: linear-gradient(135deg, #4facfe, #00f2fe);"></button>
            <button class="scheme-btn" data-scheme="3" style="background: linear-gradient(135deg, #43e97b, #38f9d7);"></button>
            <button class="scheme-btn" data-scheme="4" style="background: linear-gradient(135deg, #fa709a, #fee140);"></button>
        </div>

        <div class="info" id="info"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('startBtn');
        const controls = document.getElementById('controls');
        const colorScheme = document.getElementById('colorScheme');
        const modeBtn = document.getElementById('modeBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const info = document.getElementById('info');

        let audioContext;
        let analyser;
        let microphone;
        let dataArray;
        let bufferLength;
        let isRunning = false;
        let currentMode = 0;
        let currentScheme = 0;

        const colorSchemes = [
            ['#667eea', '#764ba2', '#f093fb'],
            ['#f093fb', '#f5576c', '#ffecd2'],
            ['#4facfe', '#00f2fe', '#a8edea'],
            ['#43e97b', '#38f9d7', '#96e6a1'],
            ['#fa709a', '#fee140', '#ffecd2']
        ];

        const modes = [
            'waveform',
            'circular',
            'particles'
        ];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resize();
        window.addEventListener('resize', resize);

        async function startAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                microphone = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                microphone.connect(analyser);

                isRunning = true;
                overlay.classList.add('hidden');
                controls.classList.remove('hidden');
                colorScheme.classList.remove('hidden');

                animate();
            } catch (err) {
                console.error('Error accessing microphone:', err);
                info.textContent = '⚠️ マイクのアクセスが許可されていません';
            }
        }

        function getGradient() {
            const scheme = colorSchemes[currentScheme];
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, scheme[0]);
            gradient.addColorStop(0.5, scheme[1]);
            gradient.addColorStop(1, scheme[2]);
            return gradient;
        }

        function drawWaveform() {
            analyser.getByteTimeDomainData(dataArray);

            ctx.lineWidth = 3;
            ctx.strokeStyle = getGradient();
            ctx.beginPath();

            const sliceWidth = canvas.width / bufferLength;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const v = dataArray[i] / 128.0;
                const y = (v * canvas.height) / 2;

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }

                x += sliceWidth;
            }

            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();
        }

        function drawCircular() {
            analyser.getByteFrequencyData(dataArray);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = Math.min(canvas.width, canvas.height) / 4;

            for (let i = 0; i < bufferLength; i++) {
                const angle = (i / bufferLength) * Math.PI * 2;
                const amplitude = dataArray[i] / 255;
                const length = amplitude * radius;

                const x1 = centerX + Math.cos(angle) * radius;
                const y1 = centerY + Math.sin(angle) * radius;
                const x2 = centerX + Math.cos(angle) * (radius + length);
                const y2 = centerY + Math.sin(angle) * (radius + length);

                const hue = (i / bufferLength) * 360;
                ctx.strokeStyle = `hsla(${hue}, 70%, 60%, 0.8)`;
                ctx.lineWidth = 2;

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
        }

        let particles = [];

        function drawParticles() {
            analyser.getByteFrequencyData(dataArray);

            const newData = Array.from(dataArray);

            // 新しいパーティクルを生成
            if (newData.some(v => v > 100)) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 3;
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: 2 + Math.random() * 4,
                    life: 1,
                    hue: Math.random() * 360
                });
            }

            // パーティクルを更新
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.01;
                p.size *= 0.99;

                if (p.life <= 0) return false;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${p.hue}, 70%, 60%, ${p.life})`;
                ctx.fill();

                return true;
            });

            // 中心の円
            const avgFreq = newData.reduce((a, b) => a + b, 0) / newData.length;
            const centerRadius = 50 + (avgFreq / 255) * 100;

            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, centerRadius, 0, Math.PI * 2);
            ctx.fillStyle = getGradient();
            ctx.fill();
        }

        function animate() {
            if (!isRunning) return;

            // 半透明の背景でトレイル効果
            ctx.fillStyle = 'rgba(10, 14, 39, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            switch (modes[currentMode]) {
                case 'waveform':
                    drawWaveform();
                    break;
                case 'circular':
                    drawCircular();
                    break;
                case 'particles':
                    drawParticles();
                    break;
            }

            requestAnimationFrame(animate);
        }

        // イベントリスナー
        startBtn.addEventListener('click', startAudio);

        modeBtn.addEventListener('click', () => {
            currentMode = (currentMode + 1) % modes.length;
            info.textContent = `モード: ${modes[currentMode]}`;
            setTimeout(() => info.textContent = '', 2000);
            particles = []; // パーティクルをリセット
        });

        document.querySelectorAll('.scheme-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.scheme-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentScheme = parseInt(btn.dataset.scheme);
            });
        });

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // タッチサポート
        canvas.addEventListener('click', () => {
            if (isRunning) {
                currentMode = (currentMode + 1) % modes.length;
                info.textContent = `モード: ${modes[currentMode]}`;
                setTimeout(() => info.textContent = '', 2000);
                particles = [];
            }
        });

        info.textContent = 'クリックでモード変更';
    </script>
</body>
</html>
