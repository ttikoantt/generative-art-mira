<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Garden - Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
            padding: 20px;
        }
        
        h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .subtitle {
            color: #a0a0a0;
            font-size: 1rem;
            margin-bottom: 20px;
        }
        
        #canvas-container {
            position: relative;
            margin: 20px auto;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        canvas {
            display: block;
            cursor: pointer;
        }
        
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        button {
            padding: 12px 24px;
            font-size: 14px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .info {
            margin-top: 20px;
            color: #a0a0a0;
            font-size: 0.9rem;
        }
        
        .fullscreen-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            border-radius: 5px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 12px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .fullscreen-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }
            
            canvas {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌳 Fractal Garden</h1>
        <p class="subtitle">フラクタルの森を創り出すジェネレーティブ・アート</p>
        
        <div id="canvas-container">
            <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
            <canvas id="canvas" width="800" height="600"></canvas>
        </div>
        
        <div class="controls">
            <button class="btn-primary" onclick="generateNewGarden()">🌱 新しい森</button>
            <button class="btn-secondary" onclick="changeSeason()">🍂 季節を変える</button>
            <button class="btn-secondary" onclick="toggleAnimation()">⏯️ アニメーション</button>
        </div>
        
        <p class="info">キャンバスをクリックして新しい木を生成</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let trees = [];
        let season = 0; // 0: 春, 1: 夏, 2: 秋, 3: 冬
        let animating = true;
        let animationId;
        
        const seasons = [
            { name: '春', leafColor: [255, 182, 193], sky: ['#87CEEB', '#E0F6FF'] },
            { name: '夏', leafColor: [34, 139, 34], sky: ['#1E90FF', '#87CEEB'] },
            { name: '秋', leafColor: [255, 140, 0], sky: ['#FF6B6B', '#FFE66D'] },
            { name: '冬', leafColor: [255, 255, 255], sky: ['#2C3E50', '#3498DB'] }
        ];
        
        function generateRandomTree() {
            return {
                x: Math.random() * canvas.width,
                y: canvas.height,
                angle: -Math.PI / 2,
                length: 80 + Math.random() * 40,
                depth: 8 + Math.floor(Math.random() * 3),
                branchAngle: 0.3 + Math.random() * 0.3,
                lengthDecay: 0.7 + Math.random() * 0.1,
                color: `hsl(${30 + Math.random() * 20}, ${40 + Math.random() * 20}%, ${25 + Math.random() * 15}%)`,
                growth: 0,
                targetGrowth: 1,
                sway: Math.random() * 0.02,
                swaySpeed: 0.001 + Math.random() * 0.002,
                swayOffset: Math.random() * Math.PI * 2,
                leaves: []
            };
        }
        
        function drawBranch(tree, x, y, length, angle, depth, time) {
            if (depth <= 0) {
                // Draw leaf
                if (season < 3) {
                    const leafColor = seasons[season].leafColor;
                    const size = 3 + Math.sin(time * 0.001 + tree.swayOffset) * 1;
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${leafColor[0]}, ${leafColor[1]}, ${leafColor[2]}, ${0.6 + depth * 0.05})`;
                    ctx.fill();
                }
                return;
            }
            
            const currentLength = length * tree.growth;
            
            // Draw branch
            ctx.beginPath();
            ctx.moveTo(x, y);
            
            const sway = Math.sin(time * tree.swaySpeed + tree.swayOffset + depth * 0.5) * tree.sway * depth;
            const endX = x + Math.cos(angle + sway) * currentLength;
            const endY = y + Math.sin(angle + sway) * currentLength;
            
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = tree.color;
            ctx.lineWidth = depth * 1.5;
            ctx.lineCap = 'round';
            ctx.stroke();
            
            // Recursively draw sub-branches
            const newLength = length * tree.lengthDecay;
            drawBranch(tree, endX, endY, newLength, angle - tree.branchAngle, depth - 1, time);
            drawBranch(tree, endX, endY, newLength, angle + tree.branchAngle, depth - 1, time);
        }
        
        function drawGarden(time) {
            // Clear canvas with gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            const sky = seasons[season].sky;
            gradient.addColorStop(0, sky[0]);
            gradient.addColorStop(1, sky[1]);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw ground
            const groundGradient = ctx.createLinearGradient(0, canvas.height - 100, 0, canvas.height);
            const groundColors = ['#228B22', '#32CD32', '#8B4513', '#FFFAFA'];
            groundGradient.addColorStop(0, groundColors[season]);
            groundGradient.addColorStop(1, season === 3 ? '#FFFAFA' : '#1a5f1a');
            ctx.fillStyle = groundGradient;
            ctx.fillRect(0, canvas.height - 100, canvas.width, 100);
            
            // Draw trees
            trees.forEach(tree => {
                if (tree.growth < tree.targetGrowth) {
                    tree.growth += 0.005;
                }
                drawBranch(tree, tree.x, tree.y, tree.length, tree.angle, tree.depth, time);
            });
        }
        
        let lastTime = 0;
        function animate(currentTime) {
            if (!animating) return;
            
            drawGarden(currentTime);
            animationId = requestAnimationFrame(animate);
        }
        
        function generateNewGarden() {
            trees = [];
            const treeCount = 3 + Math.floor(Math.random() * 3);
            for (let i = 0; i < treeCount; i++) {
                trees.push(generateRandomTree());
            }
        }
        
        function changeSeason() {
            season = (season + 1) % 4;
        }
        
        function toggleAnimation() {
            animating = !animating;
            if (animating) {
                animate(performance.now());
            } else {
                cancelAnimationFrame(animationId);
            }
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.getElementById('canvas-container').requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        // Click to add new tree
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const tree = generateRandomTree();
            tree.x = x;
            trees.push(tree);
        });
        
        // Initialize
        generateNewGarden();
        animate(performance.now());
        
        // Responsive
        function resizeCanvas() {
            const container = document.getElementById('canvas-container');
            const maxWidth = Math.min(window.innerWidth - 40, 800);
            const ratio = canvas.height / canvas.width;
            
            if (window.innerWidth < 768) {
                canvas.style.width = maxWidth + 'px';
                canvas.style.height = (maxWidth * ratio) + 'px';
            } else {
                canvas.style.width = '800px';
                canvas.style.height = '600px';
            }
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>
