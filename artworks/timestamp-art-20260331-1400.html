<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timestamp Art - 2026-03-31 14:00</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-family: 'Courier New', monospace;
            font-size: 1.5rem;
            color: #eee;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        #canvas {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .info {
            margin-top: 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #888;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1rem;
            }

            #canvas {
                max-width: 95vw;
                max-height: 70vh;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🕐 Timestamp Art</h1>
        <canvas id="canvas" width="800" height="600"></canvas>
        <div class="info">
            <p>Generated from: 2026-03-31 14:00:04</p>
            <p>Seed values: Y=2026 M=3 D=31 H=14 M=0 S=4</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // タイムスタンプをシード値として使用
        const seed = {
            year: 2026,
            month: 3,
            day: 31,
            hour: 14,
            minute: 0,
            second: 4
        };

        // シードベースの乱数生成器
        function seededRandom(seed) {
            const x = Math.sin(seed++) * 10000;
            return x - Math.floor(x);
        }

        // 色の生成
        function generateColor(seed, index) {
            const h = (seed.year * index * 7) % 360;
            const s = 60 + (seed.month * index * 3) % 40;
            const l = 50 + (seed.day * index * 2) % 30;
            return `hsl(${h}, ${s}%, ${l}%)`;
        }

        // パターンを描画
        function drawPattern() {
            // 背景をクリア
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // 時間ベースのパラメータ
            const numRings = 6 + (seed.hour % 8);
            const particlesPerRing = 8 + (seed.minute * 2) % 16;

            for (let ring = 0; ring < numRings; ring++) {
                const radius = 50 + ring * 40;
                const color = generateColor(seed, ring);

                for (let i = 0; i < particlesPerRing; i++) {
                    const angle = (i / particlesPerRing) * Math.PI * 2;
                    const offset = seededRandom(seed.year + ring * 100 + i) * 20 - 10;
                    const size = 3 + seededRandom(seed.month + ring * 50 + i) * 8;

                    const x = centerX + Math.cos(angle) * (radius + offset);
                    const y = centerY + Math.sin(angle) * (radius + offset);

                    // グロー効果
                    const gradient = ctx.createRadialGradient(x, y, 0, x, y, size * 2);
                    gradient.addColorStop(0, color);
                    gradient.addColorStop(0.5, color.replace(')', ', 0.5)').replace('hsl', 'hsla'));
                    gradient.addColorStop(1, 'transparent');

                    ctx.beginPath();
                    ctx.arc(x, y, size * 2, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();

                    // 粒子
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fillStyle = color;
                    ctx.fill();
                }
            }

            // 中心のシンボル
            const symbolSize = 20 + seed.second * 2;
            ctx.beginPath();
            ctx.arc(centerX, centerY, symbolSize, 0, Math.PI * 2);
            ctx.fillStyle = generateColor(seed, 99);
            ctx.fill();

            // 内部のパターン
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 2;
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(
                    centerX + Math.cos(angle) * symbolSize * 1.5,
                    centerY + Math.sin(angle) * symbolSize * 1.5
                );
                ctx.stroke();
            }
        }

        // アニメーション
        let animationFrame;
        let rotation = 0;

        function animate() {
            rotation += 0.005;
            drawPattern();
            animationFrame = requestAnimationFrame(animate);
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        drawPattern();
    </script>
</body>
</html>
