<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>炎のダンス - Flame Dance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #0a0a0a, #1a0a00);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ff6600;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #ff3300;
            z-index: 10;
        }

        .subtitle {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #ff9900;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="info">🔥 炎のダンス</div>
    <div class="subtitle">クリックで風を起こす</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // 炎の粒子
        class Flame {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = width / 2 + (Math.random() - 0.5) * 100;
                this.y = height - 50;
                this.size = Math.random() * 8 + 4;
                this.speedY = Math.random() * 3 + 2;
                this.speedX = (Math.random() - 0.5) * 2;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.01;
                this.hue = Math.random() * 30 + 10; // オレンジ〜赤
                this.wind = 0;
            }

            update() {
                this.y -= this.speedY;
                this.x += this.speedX + this.wind;
                this.life -= this.decay;
                this.size *= 0.98;

                // 炎の揺らぎ
                this.speedX += (Math.random() - 0.5) * 0.5;
                this.wind *= 0.95;

                if (this.life <= 0 || this.size < 1) {
                    this.reset();
                }
            }

            draw() {
                const alpha = this.life;
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 2
                );

                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 70%, ${alpha})`);
                gradient.addColorStop(0.5, `hsla(${this.hue - 10}, 100%, 50%, ${alpha * 0.5})`);
                gradient.addColorStop(1, `hsla(${this.hue - 20}, 100%, 30%, 0)`);

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }

            addWind(force) {
                this.wind += force;
            }
        }

        // 炎の配列
        const flames = [];
        const flameCount = 200;

        for (let i = 0; i < flameCount; i++) {
            flames.push(new Flame());
        }

        // マウス/タッチイベントで風を起こす
        let mouseX = 0;
        let isMouseDown = false;

        canvas.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            mouseX = e.clientX;
            createWind(e.clientX, e.clientY);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isMouseDown) {
                createWind(e.clientX, e.clientY);
            }
        });

        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createWind(touch.clientX, touch.clientY);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createWind(touch.clientX, touch.clientY);
        });

        function createWind(x, y) {
            flames.forEach(flame => {
                const dx = flame.x - x;
                const dy = flame.y - y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 200) {
                    const force = (200 - dist) / 200 * 3;
                    flame.addWind(force * Math.sign(dx));
                }
            });
        }

        // アニメーション
        function animate() {
            // トレイル効果
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, width, height);

            flames.forEach(flame => {
                flame.update();
                flame.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();

        // ウィンドウリサイズ対応
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
