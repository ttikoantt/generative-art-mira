<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漢字フロウ | Kanji Flow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            color: #f0f0f0;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            letter-spacing: 0.5rem;
        }

        .subtitle {
            font-size: 1rem;
            color: #888;
            margin-bottom: 30px;
            letter-spacing: 0.3rem;
        }

        canvas {
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
                        0 0 100px rgba(100, 150, 255, 0.1);
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0a 100%);
            touch-action: none;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .info {
            color: #888;
            font-size: 0.9rem;
            margin-top: 20px;
            letter-spacing: 0.1rem;
        }

        .fullscreen-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #f0f0f0;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.2);
        }

        .fullscreen-btn:active {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
                letter-spacing: 0.3rem;
            }

            .subtitle {
                font-size: 0.8rem;
            }

            canvas {
                width: 100%;
                max-width: 350px;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>漢字フロウ</h1>
        <p class="subtitle">Kanji Flow - 漢字の流れ</p>

        <canvas id="canvas"></canvas>

        <div class="controls">
            <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>
        </div>

        <p class="info">漢字が静かに現れ、美しく消えていく</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Canvas size
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 500);
            const maxHeight = Math.min(window.innerHeight - 250, 500);

            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Kanji list
        const kanjiList = [
            '夢', '風', '水', '火', '空', '心', '光', '影',
            '森', '山', '川', '海', '月', '星', '花', '鳥',
            '春', '夏', '秋', '冬', '雪', '雨', '雲', '霧',
            '道', '愛', '命', '時', '無', '有', '真', '美',
            '静', '動', '遠', '近', '高', '低', '深', '浅',
            '和', '敬', '清', '寂', '幽', '玄', '妙', '禅'
        ];

        // Color palettes (Japanese traditional colors)
        const colorPalettes = [
            { r: 220, g: 100, b: 120 },  // 桜色
            { r: 100, g: 180, b: 220 },  // 水色
            { r: 180, g: 140, b: 200 },  // 藤色
            { r: 220, g: 180, b: 100 },  // 山吹色
            { r: 100, g: 200, b: 150 },  // 若草色
            { r: 200, g: 120, b: 180 },  // 紫躑躅
            { r: 150, g: 200, b: 220 },  // 瑠璃色
            { r: 220, g: 160, b: 140 }   // 肌色
        ];

        class KanjiParticle {
            constructor() {
                this.reset();
            }

            reset() {
                this.kanji = kanjiList[Math.floor(Math.random() * kanjiList.length)];
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.size = 100 + Math.random() * 50;
                this.baseColor = colorPalettes[Math.floor(Math.random() * colorPalettes.length)];
                this.opacity = 0;
                this.phase = 'fade-in';
                this.fadeSpeed = 0.005 + Math.random() * 0.005;
                this.rotation = (Math.random() - 0.5) * 0.02;
                this.angle = 0;
                this.floatX = 0;
                this.floatY = 0;
                this.floatSpeed = 0.01;
                this.floatAmplitude = 20;
                this.glowIntensity = 0;
            }

            update() {
                // Fade in
                if (this.phase === 'fade-in') {
                    this.opacity += this.fadeSpeed;
                    if (this.opacity >= 1) {
                        this.opacity = 1;
                        this.phase = 'display';
                    }
                }
                // Display
                else if (this.phase === 'display') {
                    this.glowIntensity = 0.5 + Math.sin(Date.now() * 0.001) * 0.3;
                    if (Math.random() < 0.002) {
                        this.phase = 'fade-out';
                    }
                }
                // Fade out
                else if (this.phase === 'fade-out') {
                    this.opacity -= this.fadeSpeed;
                    if (this.opacity <= 0) {
                        this.reset();
                    }
                }

                // Gentle floating
                this.angle += this.floatSpeed;
                this.floatX = Math.sin(this.angle) * this.floatAmplitude;
                this.floatY = Math.cos(this.angle * 0.7) * this.floatAmplitude;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.floatX, this.y + this.floatY);
                ctx.rotate(this.angle * this.rotation);

                // Glow effect
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size * 1.5);
                gradient.addColorStop(0, `rgba(${this.baseColor.r}, ${this.baseColor.g}, ${this.baseColor.b}, ${this.opacity * this.glowIntensity * 0.3})`);
                gradient.addColorStop(0.5, `rgba(${this.baseColor.r}, ${this.baseColor.g}, ${this.baseColor.b}, ${this.opacity * this.glowIntensity * 0.1})`);
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(0, 0, this.size * 1.5, 0, Math.PI * 2);
                ctx.fill();

                // Main kanji
                ctx.font = `${this.size}px "Noto Sans JP", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                // Shadow
                ctx.shadowColor = `rgba(${this.baseColor.r}, ${this.baseColor.g}, ${this.baseColor.b}, ${this.opacity * 0.5})`;
                ctx.shadowBlur = 30 * this.opacity;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;

                ctx.fillStyle = `rgba(${this.baseColor.r}, ${this.baseColor.g}, ${this.baseColor.b}, ${this.opacity})`;
                ctx.fillText(this.kanji, 0, 0);

                // Inner glow
                ctx.shadowBlur = 10 * this.opacity;
                ctx.shadowColor = `rgba(255, 255, 255, ${this.opacity * 0.5})`;
                ctx.fillText(this.kanji, 0, 0);

                ctx.restore();
            }
        }

        // Create particles
        const particles = [];
        for (let i = 0; i < 3; i++) {
            const p = new KanjiParticle();
            p.phase = 'fade-in';
            p.opacity = i * 0.3;
            particles.push(p);
        }

        // Background particles
        class BackgroundParticle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = 1 + Math.random() * 2;
                this.opacity = 0.1 + Math.random() * 0.3;
                this.speedY = -0.5 - Math.random() * 0.5;
            }

            update() {
                this.y += this.speedY;
                if (this.y < 0) {
                    this.reset();
                    this.y = canvas.height;
                }
            }

            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        const bgParticles = [];
        for (let i = 0; i < 50; i++) {
            bgParticles.push(new BackgroundParticle());
        }

        // Animation loop
        function animate() {
            // Clear with trail effect
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Background particles
            bgParticles.forEach(p => {
                p.update();
                p.draw();
            });

            // Kanji particles
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Handle fullscreen change
        document.addEventListener('fullscreenchange', () => {
            setTimeout(resizeCanvas, 100);
        });
    </script>
</body>
</html>
