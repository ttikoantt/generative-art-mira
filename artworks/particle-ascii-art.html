<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle ASCII Art - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
        }

        canvas {
            display: block;
            margin: 0 auto;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
        }

        button:hover {
            background: #00cc6a;
            transform: scale(1.05);
        }

        .info {
            color: #00ff88;
            margin-top: 15px;
            font-size: 12px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 136, 0.2);
            border: 2px solid #00ff88;
            color: #00ff88;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 136, 0.4);
        }

        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
                align-items: center;
            }

            button {
                width: 200px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <canvas id="canvas"></canvas>

        <div class="controls">
            <button onclick="changePattern('MIRA')">MIRA</button>
            <button onclick="changePattern('ART')">ART</button>
            <button onclick="changePattern('❤️')">HEART</button>
            <button onclick="changePattern('🌟')">STAR</button>
            <button onclick="changePattern('☆')">☆</button>
            <button onclick="toggleRainbow()">🌈 Rainbow</button>
        </div>

        <div class="info">
            パーティクルがASCII文字を形成 • Click to add particles
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let targetPattern = 'MIRA';
        let rainbowMode = false;
        let hue = 0;

        const asciiChars = '@%#*+=-:. ';
        const particleCount = 300;

        function resize() {
            width = Math.min(window.innerWidth * 0.9, 1200);
            height = Math.min(window.innerHeight * 0.6, 600);
            canvas.width = width;
            canvas.height = height;
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.targetX = this.x;
                this.targetY = this.y;
                this.vx = 0;
                this.vy = 0;
                this.char = asciiChars[Math.floor(Math.random() * asciiChars.length)];
                this.size = Math.random() * 20 + 16;
                this.color = '#00ff88';
                this.life = 0;
                this.maxLife = Math.random() * 200 + 100;
            }

            update() {
                // Move towards target
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                this.vx += dx * 0.02;
                this.vy += dy * 0.02;
                this.vx *= 0.92;
                this.vy *= 0.92;
                this.x += this.vx;
                this.y += this.vy;

                // Cycle characters
                this.life++;
                if (this.life % 10 === 0) {
                    const idx = asciiChars.indexOf(this.char);
                    this.char = asciiChars[(idx + 1) % asciiChars.length];
                }

                // Color
                if (rainbowMode) {
                    this.color = `hsl(${(hue + this.x / width * 60) % 360}, 100%, 50%)`;
                } else {
                    this.color = '#00ff88';
                }
            }

            draw() {
                const alpha = Math.min(1, this.life / 30);
                ctx.globalAlpha = alpha;
                ctx.fillStyle = this.color;
                ctx.font = `${this.size}px 'Courier New', monospace`;
                ctx.fillText(this.char, this.x, this.y);
                ctx.globalAlpha = 1;
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function calculateTargets(pattern) {
            const fontSize = 60;
            ctx.font = `bold ${fontSize}px 'Courier New', monospace`;
            const textWidth = ctx.measureText(pattern).width;
            const startX = (width - textWidth) / 2;
            const startY = height / 2;

            // Sample points along the text
            const imageData = ctx.getImageData(0, 0, width, height);

            let particleIndex = 0;
            for (let y = 0; y < height; y += 4) {
                for (let x = 0; x < width; x += 4) {
                    const idx = (y * width + x) * 4;
                    if (imageData.data[idx + 3] > 128) {
                        if (particleIndex < particles.length) {
                            particles[particleIndex].targetX = x;
                            particles[particleIndex].targetY = y;
                            particleIndex++;
                        }
                    }
                }
            }

            // Remaining particles go to random positions
            for (let i = particleIndex; i < particles.length; i++) {
                particles[i].targetX = Math.random() * width;
                particles[i].targetY = Math.random() * height;
            }
        }

        function changePattern(pattern) {
            targetPattern = pattern;

            // Clear and draw text for sampling
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = '#fff';
            ctx.font = "bold 60px 'Courier New', monospace";
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';

            // Handle emoji properly
            const fontSize = 60;
            const metrics = ctx.measureText(pattern);
            const textWidth = metrics.width;
            const startX = (width - textWidth) / 2;
            const startY = height / 2;

            ctx.fillText(pattern, startX, startY);

            calculateTargets(pattern);
        }

        function toggleRainbow() {
            rainbowMode = !rainbowMode;
        }

        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            hue = (hue + 0.5) % 360;

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Add particles on click
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            for (let i = 0; i < 20; i++) {
                const p = new Particle();
                p.x = x + (Math.random() - 0.5) * 50;
                p.y = y + (Math.random() - 0.5) * 50;
                p.targetX = x + (Math.random() - 0.5) * 100;
                p.targetY = y + (Math.random() - 0.5) * 100;
                particles.push(p);

                // Keep particle count manageable
                if (particles.length > 500) {
                    particles.shift();
                }
            }
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;

            for (let i = 0; i < 20; i++) {
                const p = new Particle();
                p.x = x + (Math.random() - 0.5) * 50;
                p.y = y + (Math.random() - 0.5) * 50;
                p.targetX = x + (Math.random() - 0.5) * 100;
                p.targetY = y + (Math.random() - 0.5) * 100;
                particles.push(p);

                if (particles.length > 500) {
                    particles.shift();
                }
            }
        });

        // Initialize
        window.addEventListener('resize', () => {
            resize();
            changePattern(targetPattern);
        });

        resize();
        initParticles();
        changePattern(targetPattern);
        animate();
    </script>
</body>
</html>
