<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Wind Tree</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #0a0a1a, #1a1a2e);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            pointer-events: none;
            user-select: none;
        }

        .info h1 {
            font-size: 24px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b9d, #c06bff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .info p {
            margin: 5px 0;
            opacity: 0.9;
        }

        .wind-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.8);
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            pointer-events: none;
            user-select: none;
        }

        .wind-arrow {
            font-size: 40px;
            transition: transform 0.1s;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 107, 157, 0.3);
            border: 1px solid rgba(255, 107, 157, 0.5);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 107, 157, 0.5);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <h1>🌳 Fractal Wind Tree</h1>
        <p>マウスを動かして風を操る</p>
        <p>X: 風の方向 | Y: 風の強さ</p>
    </div>

    <div class="wind-indicator">
        <div class="wind-arrow" id="windArrow">→</div>
        <div style="text-align: center; margin-top: 10px;">
            Wind: <span id="windStrength">0</span>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const windArrow = document.getElementById('windArrow');
        const windStrengthSpan = document.getElementById('windStrength');

        let mouseX = 0;
        let mouseY = 0;
        let windX = 0;
        let windY = 0;
        let time = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resize();
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });

        function drawBranch(x, y, length, angle, depth) {
            if (depth === 0) return;

            const endX = x + Math.cos(angle) * length;
            const endY = y + Math.sin(angle) * length;

            // 色のグラデーション
            const hue = 320 + depth * 10;
            const saturation = 70 + depth * 5;
            const lightness = 50 + depth * 5;

            ctx.strokeStyle = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
            ctx.lineWidth = depth * 0.8;
            ctx.lineCap = 'round';

            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.stroke();

            // 風の影響を計算
            const windInfluence = (10 - depth) * 0.02 * windX;
            const windAngle = angle + windInfluence + Math.sin(time * 0.001 + depth) * 0.02;

            const newLength = length * 0.75;
            const angleOffset = 0.5 + Math.abs(windY) * 0.01;

            drawBranch(endX, endY, newLength, windAngle - angleOffset, depth - 1);
            drawBranch(endX, endY, newLength, windAngle + angleOffset, depth - 1);
        }

        function updateWind() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            windX = (mouseX - centerX) / centerX;
            windY = (mouseY - centerY) / centerY;

            // 風の表示を更新
            const angle = windX * Math.PI;
            const strength = Math.abs(windX) * 10;

            windArrow.style.transform = `rotate(${angle}rad)`;
            windStrengthSpan.textContent = strength.toFixed(1);
        }

        function drawLeaves() {
            for (let i = 0; i < 50; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 3 + 1;

                const speedX = windX * 5;
                const speedY = 1 + Math.abs(windY) * 2;

                const floatX = Math.sin(time * 0.001 + i) * 50;
                const floatY = Math.cos(time * 0.0015 + i) * 30;

                ctx.fillStyle = `hsla(${320 + Math.random() * 40}, 70%, 70%, 0.6)`;
                ctx.beginPath();
                ctx.arc(x + floatX, y + floatY, size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animate() {
            // 背景をフェード
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            updateWind();
            drawLeaves();

            // ツリーを描画
            const startX = canvas.width / 2;
            const startY = canvas.height;
            const trunkLength = Math.min(canvas.width, canvas.height) * 0.25;

            drawBranch(startX, startY, trunkLength, -Math.PI / 2, 10);

            time++;
            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期マウス位置を中央に
        mouseX = canvas.width / 2;
        mouseY = canvas.height / 2;

        animate();
    </script>
</body>
</html>
