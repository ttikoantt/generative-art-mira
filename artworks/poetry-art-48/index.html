<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>言語の風景 - 生成詩アート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif JP', serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.1;
            overflow: hidden;
        }

        .floating-word {
            position: absolute;
            color: white;
            font-size: 24px;
            animation: float 20s infinite linear;
            opacity: 0.3;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.3;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 4px;
        }

        .poem-container {
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        .poem-line {
            font-size: 22px;
            line-height: 2;
            color: #333;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s forwards;
            margin: 10px 0;
        }

        .poem-line.japanese {
            font-size: 26px;
            font-weight: 500;
        }

        .poem-line.english {
            font-size: 18px;
            color: #666;
            font-style: italic;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            font-family: inherit;
            letter-spacing: 2px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .stats {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 14px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 22px;
            }

            .poem-line {
                font-size: 18px;
            }

            .poem-line.japanese {
                font-size: 22px;
            }

            .poem-line.english {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="background" id="background"></div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <h1>言語の風景</h1>
        <div class="poem-container" id="poem"></div>
        <button class="btn" onclick="generatePoem()">新しい詩を生成</button>
        <div class="stats">生成数: <span id="count">0</span></div>
    </div>

    <script>
        const japaneseWords = [
            { noun: ['桜', '月', '風', '星', '海', '山', '雨', '雪', '雲', '光', '影', '夢', '時', '道', '心', '空', '夜', '朝', '春', '秋'] },
            { verb: ['舞う', '流れる', '輝く', '沈む', '咲く', '降る', '届く', '消える', '描く', '歌う', '眠る', '醒める', '渡る', '抱く', '放つ'] },
            { adj: ['静かな', '美しい', '儚い', '永遠の', '遠い', '近い', '暖かい', '冷たい', '優しい', '激しい', '淡い', '深い', '高い', '広い', '細い'] },
            { place: ['空で', '海で', '山で', '夜に', '朝に', '夢の中で', '時を超えて', '風の中で', '光の中で', '影の中で'] }
        ];

        const englishWords = [
            { noun: ['cherry blossom', 'moonlight', 'breeze', 'star', 'ocean', 'mountain', 'rain', 'snow', 'cloud', 'light', 'shadow', 'dream', 'time', 'path', 'heart'] },
            { verb: ['dances', 'flows', 'shines', 'sinks', 'blooms', 'falls', 'reaches', 'fades', 'paints', 'sings', 'sleeps', 'wakes', 'crosses', 'embraces', 'releases'] },
            { adj: ['silent', 'beautiful', 'ephemeral', 'eternal', 'distant', 'near', 'warm', 'cold', 'gentle', 'intense', 'faint', 'deep', 'high', 'wide', 'thin'] },
            { place: ['in the sky', 'in the ocean', 'on the mountain', 'at night', 'in the morning', 'in dreams', 'beyond time', 'in the wind', 'in the light', 'in the shadow'] }
        ];

        let poemCount = 0;

        function generatePoem() {
            const poem = document.getElementById('poem');
            poem.innerHTML = '';

            // 日本語の詩を生成
            const japanesePoem = generateJapanesePoem();
            // 英語の詩を生成
            const englishPoem = generateEnglishPoem();

            // 詩を表示
            japanesePoem.forEach((line, index) => {
                const lineEl = document.createElement('div');
                lineEl.className = 'poem-line japanese';
                lineEl.style.animationDelay = `${index * 0.3}s`;
                lineEl.textContent = line;
                poem.appendChild(lineEl);
            });

            // 空行
            const spacer = document.createElement('div');
            spacer.style.height = '20px';
            poem.appendChild(spacer);

            // 英語の詩を表示
            englishPoem.forEach((line, index) => {
                const lineEl = document.createElement('div');
                lineEl.className = 'poem-line english';
                lineEl.style.animationDelay = `${(japanesePoem.length + index) * 0.3}s`;
                lineEl.textContent = line;
                poem.appendChild(lineEl);
            });

            // カウントを更新
            poemCount++;
            document.getElementById('count').textContent = poemCount;
        }

        function generateJapanesePoem() {
            const patterns = [
                () => {
                    const noun = randomItem(japaneseWords[0].noun);
                    const place = randomItem(japaneseWords[3].place);
                    const verb = randomItem(japaneseWords[1].verb);
                    return [`${noun}が${place}${verb}`, `${noun}、${verb}`];
                },
                () => {
                    const adj = randomItem(japaneseWords[2].adj);
                    const noun = randomItem(japaneseWords[0].noun);
                    const verb = randomItem(japaneseWords[1].verb);
                    return [`${adj}${noun}が${verb}`, `${noun}は${adj}`];
                },
                () => {
                    const noun1 = randomItem(japaneseWords[0].noun);
                    const noun2 = randomItem(japaneseWords[0].noun);
                    const verb = randomItem(japaneseWords[1].verb);
                    return [`${noun1}と${noun2}`, `${noun1}が${noun2}に${verb}`];
                },
                () => {
                    const noun = randomItem(japaneseWords[0].noun);
                    const verb1 = randomItem(japaneseWords[1].verb);
                    const verb2 = randomItem(japaneseWords[1].verb);
                    return [`${noun}が${verb1}`, `${noun}、また${verb2}`];
                }
            ];

            const pattern = randomItem(patterns);
            return pattern();
        }

        function generateEnglishPoem() {
            const patterns = [
                () => {
                    const noun = randomItem(englishWords[0].noun);
                    const place = randomItem(englishWords[3].place);
                    const verb = randomItem(englishWords[1].verb);
                    return [`The ${noun} ${verb} ${place}`, `${noun}, ${verb}`];
                },
                () => {
                    const adj = randomItem(englishWords[2].adj);
                    const noun = randomItem(englishWords[0].noun);
                    const verb = randomItem(englishWords[1].verb);
                    return [`${adj.charAt(0).toUpperCase() + adj.slice(1)} ${noun} ${verb}s`, `The ${noun} is ${adj}`];
                },
                () => {
                    const noun1 = randomItem(englishWords[0].noun);
                    const noun2 = randomItem(englishWords[0].noun);
                    const verb = randomItem(englishWords[1].verb);
                    return [`${noun1} and ${noun2}`, `${noun1} ${verb}s ${noun2}`];
                },
                () => {
                    const noun = randomItem(englishWords[0].noun);
                    const verb1 = randomItem(englishWords[1].verb);
                    const verb2 = randomItem(englishWords[1].verb);
                    return [`The ${noun} ${verb1}s`, `${noun}, ${verb2}s again`];
                }
            ];

            const pattern = randomItem(patterns);
            return pattern();
        }

        function randomItem(array) {
            return array[Math.floor(Math.random() * array.length)];
        }

        function createFloatingWords() {
            const background = document.getElementById('background');
            const words = [...japaneseWords[0].noun, ...japaneseWords[1].verb, ...englishWords[0].noun];

            for (let i = 0; i < 20; i++) {
                const word = document.createElement('div');
                word.className = 'floating-word';
                word.textContent = randomItem(words);
                word.style.left = Math.random() * 100 + '%';
                word.style.animationDelay = Math.random() * 20 + 's';
                word.style.animationDuration = (15 + Math.random() * 10) + 's';
                background.appendChild(word);
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        createFloatingWords();
        generatePoem();
    </script>
</body>
</html>
