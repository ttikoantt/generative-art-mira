<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Wind Trees - 風に揺れるフラクタルツリー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        #canvas {
            border: 2px solid #0f3460;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(15, 52, 96, 0.5);
            background: #0a0a15;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: #0f3460;
            color: #e94560;
            border: 2px solid #e94560;
            padding: 10px 20px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }

        button:hover {
            background: #e94560;
            color: #0f3460;
        }

        button.active {
            background: #e94560;
            color: #0f3460;
        }

        .info {
            color: #e94560;
            margin-top: 15px;
            font-size: 12px;
            text-align: center;
        }

        .fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #0f3460;
            color: #e94560;
            border: 2px solid #e94560;
            padding: 10px 15px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 5px;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: #e94560;
            color: #0f3460;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <canvas id="canvas" width="800" height="600"></canvas>

    <div class="controls">
        <button onclick="toggleWind()" id="windBtn">風: ON</button>
        <button onclick="changeSeason('spring')">春</button>
        <button onclick="changeSeason('summer')">夏</button>
        <button onclick="changeSeason('autumn')">秋</button>
        <button onclick="changeSeason('winter')">冬</button>
        <button onclick="regenerate()">再生成</button>
    </div>

    <div class="info">
        風に揺れるフラクタルツリー | クリックで新規ツリー生成
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let windEnabled = true;
        let windTime = 0;
        let season = 'spring';

        const colors = {
            spring: {
                trunk: '#4a3728',
                leaves: ['#ff69b4', '#ff1493', '#ff00ff', '#ffb6c1', '#ffc0cb']
            },
            summer: {
                trunk: '#5d4037',
                leaves: ['#228b22', '#32cd32', '#00ff00', '#90ee90', '#98fb98']
            },
            autumn: {
                trunk: '#6d4c41',
                leaves: ['#ff6347', '#ff4500', '#ff8c00', '#ffd700', '#ff0000']
            },
            winter: {
                trunk: '#8b7355',
                leaves: ['#fffaf0', '#f0f8ff', '#fff0f5', '#f5f5f5', '#ffefd5']
            }
        };

        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 800);
            const maxHeight = Math.min(window.innerHeight - 200, 600);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function drawBranch(x, y, length, angle, depth, maxDepth) {
            if (depth > maxDepth) return;

            const endX = x + Math.cos(angle) * length;
            const endY = y + Math.sin(angle) * length;

            // 風の影響を計算
            let windAngle = 0;
            if (windEnabled) {
                const windStrength = 0.05 * (1 + depth * 0.2);
                windAngle = Math.sin(windTime + depth * 0.5) * windStrength;
            }

            const newAngle = angle + windAngle;

            // 幅を計算
            const lineWidth = Math.max(1, (maxDepth - depth) * 1.5);

            // 枝を描画
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = colors[season].trunk;
            ctx.lineWidth = lineWidth;
            ctx.lineCap = 'round';
            ctx.stroke();

            // 葉を描画（深さが最大に近い場合）
            if (depth >= maxDepth - 1) {
                const leafColors = colors[season].leaves;
                const leafColor = leafColors[Math.floor(Math.random() * leafColors.length)];

                ctx.beginPath();
                ctx.arc(endX, endY, 3 + Math.random() * 3, 0, Math.PI * 2);
                ctx.fillStyle = leafColor;
                ctx.fill();
            }

            // 再帰的に枝を描画
            const branchCount = 2;
            const lengthDecay = 0.7;
            const angleVariation = 0.4 + Math.random() * 0.2;

            for (let i = 0; i < branchCount; i++) {
                const newLength = length * lengthDecay;
                const angleOffset = (i - 0.5) * angleVariation;
                drawBranch(endX, endY, newLength, newAngle + angleOffset, depth + 1, maxDepth);
            }
        }

        function drawTree() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const startX = canvas.width / 2;
            const startY = canvas.height - 50;
            const initialLength = canvas.height * 0.25;
            const initialAngle = -Math.PI / 2;
            const maxDepth = 7;

            drawBranch(startX, startY, initialLength, initialAngle, 0, maxDepth);

            // 地面を描画
            ctx.fillStyle = '#2d4a3e';
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
        }

        function animate() {
            if (windEnabled) {
                windTime += 0.03;
            }
            drawTree();
            requestAnimationFrame(animate);
        }

        function toggleWind() {
            windEnabled = !windEnabled;
            const btn = document.getElementById('windBtn');
            btn.textContent = `風: ${windEnabled ? 'ON' : 'OFF'}`;
            btn.classList.toggle('active', windEnabled);
        }

        function changeSeason(newSeason) {
            season = newSeason;
        }

        function regenerate() {
            drawTree();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                canvas.requestFullscreen().catch(err => {
                    alert('全画面表示がサポートされていません');
                });
            } else {
                document.exitFullscreen();
            }
        }

        canvas.addEventListener('click', regenerate);

        // 初期化
        document.getElementById('windBtn').classList.add('active');
        animate();
    </script>
</body>
</html>
