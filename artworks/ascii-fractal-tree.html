<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art Fractal Tree</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }

        h1 {
            color: #00ff00;
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ff00;
        }

        canvas {
            background: #000;
            border: 2px solid #00ff00;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            max-width: 100%;
            height: auto;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .control {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        label {
            color: #00ff00;
            font-size: 0.8rem;
        }

        input[type="range"] {
            width: 120px;
            accent-color: #00ff00;
        }

        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }

        button:hover {
            background: #00cc00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
            transform: scale(1.05);
        }

        .value {
            color: #00ff00;
            font-size: 0.9rem;
            min-width: 40px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #00ff00;
            color: #000;
            border: none;
            padding: 8px 12px;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 5px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🌳 ASCII Art Fractal Tree</h1>

        <canvas id="canvas"></canvas>

        <div class="controls">
            <div class="control">
                <label>角度</label>
                <input type="range" id="angle" min="10" max="45" value="25" onchange="draw()">
                <span class="value" id="angleValue">25°</span>
            </div>

            <div class="control">
                <label>長さ</label>
                <input type="range" id="length" min="50" max="150" value="100" onchange="draw()">
                <span class="value" id="lengthValue">100</span>
            </div>

            <div class="control">
                <label>深さ</label>
                <input type="range" id="depth" min="5" max="12" value="9" onchange="draw()">
                <span class="value" id="depthValue">9</span>
            </div>

            <div class="control">
                <label>分岐</label>
                <input type="range" id="branches" min="2" max="4" value="2" onchange="draw()">
                <span class="value" id="branchesValue">2</span>
            </div>

            <button onclick="randomize()">🎲 ランダム</button>
            <button onclick="animate()">✨ アニメーション</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const asciiChars = ['█', '▓', '▒', '░', '│', '┼', '·', ' '];
        const colors = ['#00ff00', '#00cc00', '#009900', '#006600', '#003300'];

        function resizeCanvas() {
            const size = Math.min(window.innerWidth - 40, 600);
            canvas.width = size;
            canvas.height = size;
            draw();
        }

        function drawBranch(x, y, length, angle, depth) {
            if (depth === 0) return;

            const endX = x + length * Math.cos(angle);
            const endY = y - length * Math.sin(angle);

            const colorIndex = Math.floor((1 - depth / 12) * (colors.length - 1));
            const charIndex = Math.floor((1 - depth / 12) * (asciiChars.length - 1));

            ctx.fillStyle = colors[colorIndex];
            ctx.font = `${Math.max(8, depth * 2)}px 'Courier New', monospace`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const char = asciiChars[Math.min(charIndex, asciiChars.length - 1)];
            ctx.fillText(char, endX, endY);

            const branches = parseInt(document.getElementById('branches').value);
            const angleSpread = parseInt(document.getElementById('angle').value) * Math.PI / 180;
            const lengthFactor = 0.7;

            for (let i = 0; i < branches; i++) {
                const newAngle = angle + angleSpread * (i - (branches - 1) / 2);
                drawBranch(endX, endY, length * lengthFactor, newAngle, depth - 1);
            }
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const startX = canvas.width / 2;
            const startY = canvas.height - 30;
            const length = parseInt(document.getElementById('length').value);
            const depth = parseInt(document.getElementById('depth').value);

            document.getElementById('angleValue').textContent = document.getElementById('angle').value + '°';
            document.getElementById('lengthValue').textContent = document.getElementById('length').value;
            document.getElementById('depthValue').textContent = document.getElementById('depth').value;
            document.getElementById('branchesValue').textContent = document.getElementById('branches').value;

            drawBranch(startX, startY, length, Math.PI / 2, depth);
        }

        function randomize() {
            document.getElementById('angle').value = 10 + Math.random() * 35;
            document.getElementById('length').value = 60 + Math.random() * 80;
            document.getElementById('depth').value = 7 + Math.floor(Math.random() * 5);
            document.getElementById('branches').value = 2 + Math.floor(Math.random() * 3);
            draw();
        }

        let animationId = null;
        function animate() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
                return;
            }

            let angle = 0;
            const animateLoop = () => {
                angle += 0.02;
                document.getElementById('angle').value = 20 + Math.sin(angle) * 15;
                draw();
                animationId = requestAnimationFrame(animateLoop);
            };
            animateLoop();
        }

        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>
