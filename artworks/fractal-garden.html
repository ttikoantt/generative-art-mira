<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Garden - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d4ff, #9d4edd, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            background: linear-gradient(45deg, #00d4ff, #9d4edd);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(157, 78, 221, 0.4);
        }

        .canvas-container {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        canvas {
            display: block;
            background: #0a0a0a;
            border-radius: 20px;
        }

        .info {
            margin-top: 20px;
            text-align: center;
            opacity: 0.7;
            font-size: 0.9rem;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(157, 78, 221, 0.8);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-size: 1.5rem;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(157, 78, 221, 1);
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .controls {
                gap: 10px;
            }

            button {
                padding: 10px 18px;
                font-size: 0.9rem;
            }

            canvas {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌿 Fractal Garden</h1>
        <div class="subtitle">インタラクティブ・フラクタル・ガーデン</div>
    </div>

    <div class="controls">
        <button onclick="regenerate()">🌱 新しい植物を生成</button>
        <button onclick="toggleAnimation()">⏯️ アニメーション</button>
        <button onclick="changeColorScheme()">🎨 色を変える</button>
    </div>

    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div class="info">
        <p>🖱️ マウスを動かすと植物が変化します | クリックで新しい植物が咲きます</p>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Set canvas size
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 900);
            const maxHeight = Math.min(window.innerHeight - 300, 700);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', () => {
            resizeCanvas();
            draw();
        });

        // State
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        let isAnimating = true;
        let colorScheme = 0;
        let growthStage = 0;
        let plants = [];
        let animationId;

        // Color schemes
        const colorSchemes = [
            ['#00d4ff', '#00ff88', '#ffff00', '#ff6b6b', '#9d4edd'],
            ['#ff6b6b', '#ffd93d', '#6bcf7f', '#4ecdc4', '#45b7d1'],
            ['#f94144', '#f3722c', '#f8961e', '#f9c74f', '#90be6d'],
            ['#00b4d8', '#0077b6', '#03045e', '#caf0f8', '#90e0ef'],
            ['#ff006e', '#8338ec', '#3a86ff', '#fb5607', '#ffbe0b']
        ];

        // Plant class
        class Plant {
            constructor(x, y, angle, length, depth, hueOffset) {
                this.x = x;
                this.y = y;
                this.angle = angle;
                this.targetLength = length;
                this.currentLength = 0;
                this.depth = depth;
                this.hueOffset = hueOffset;
                this.growthSpeed = 2 + Math.random() * 2;
                this.branches = [];
                this.finished = false;
            }

            grow() {
                if (this.currentLength < this.targetLength) {
                    this.currentLength += this.growthSpeed;
                    if (this.currentLength > this.targetLength) {
                        this.currentLength = this.targetLength;
                    }
                } else if (this.depth > 0 && !this.finished) {
                    // Create branches
                    const branchCount = 2 + Math.floor(Math.random() * 3);
                    const endX = this.x + Math.cos(this.angle) * this.currentLength;
                    const endY = this.y + Math.sin(this.angle) * this.currentLength;

                    for (let i = 0; i < branchCount; i++) {
                        const spread = 0.5 + Math.random() * 0.8;
                        const angleOffset = (i - (branchCount - 1) / 2) * spread;
                        const branch = new Plant(
                            endX,
                            endY,
                            this.angle + angleOffset,
                            this.targetLength * (0.6 + Math.random() * 0.3),
                            this.depth - 1,
                            this.hueOffset + Math.random() * 30 - 15
                        );
                        this.branches.push(branch);
                    }
                    this.finished = true;
                }

                // Grow branches
                this.branches.forEach(branch => branch.grow());
            }

            draw(ctx, globalAlpha) {
                const endX = this.x + Math.cos(this.angle) * this.currentLength;
                const endY = this.y + Math.sin(this.angle) * this.currentLength;

                // Draw branch
                const colors = colorSchemes[colorScheme];
                const colorIndex = Math.floor((this.hueOffset % 360) / 72) % colors.length;
                ctx.strokeStyle = colors[colorIndex];
                ctx.lineWidth = Math.max(1, this.depth * 1.5);
                ctx.globalAlpha = globalAlpha;
                ctx.lineCap = 'round';

                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(endX, endY);
                ctx.stroke();

                // Draw leaf/bud at end if this is a terminal branch
                if (this.depth <= 1 && this.currentLength >= this.targetLength * 0.9) {
                    ctx.globalAlpha = globalAlpha * 0.6;
                    ctx.fillStyle = colors[(colorIndex + 1) % colors.length];
                    ctx.beginPath();
                    ctx.arc(endX, endY, 3 + Math.random() * 4, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Draw branches
                this.branches.forEach(branch => branch.draw(ctx, globalAlpha));
            }
        }

        // Create new plant
        function createPlant(x, y) {
            const length = 60 + Math.random() * 40;
            const depth = 4 + Math.floor(Math.random() * 3);
            const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.5;
            const hueOffset = Math.random() * 360;
            return new Plant(x, y, angle, length, depth, hueOffset);
        }

        // Initialize plants
        function initPlants() {
            plants = [];
            const plantCount = 5 + Math.floor(Math.random() * 5);
            for (let i = 0; i < plantCount; i++) {
                const x = 100 + Math.random() * (canvas.width - 200);
                const y = canvas.height - 50 + Math.random() * 100;
                plants.push(createPlant(x, y));
            }
        }

        // Draw
        function draw() {
            // Clear with fade effect
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw all plants
            plants.forEach(plant => plant.draw(ctx, 1));

            // Draw particles
            drawParticles();
        }

        // Particles
        let particles = [];
        function createParticle() {
            return {
                x: Math.random() * canvas.width,
                y: canvas.height + 10,
                vx: (Math.random() - 0.5) * 2,
                vy: -1 - Math.random() * 2,
                size: 1 + Math.random() * 2,
                alpha: 0.3 + Math.random() * 0.4,
                color: colorSchemes[colorScheme][Math.floor(Math.random() * 5)]
            };
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 50; i++) {
                particles.push(createParticle());
            }
        }

        function drawParticles() {
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;

                if (p.y < -10) {
                    p.y = canvas.height + 10;
                    p.x = Math.random() * canvas.width;
                }

                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        // Animation loop
        function animate() {
            if (isAnimating) {
                plants.forEach(plant => plant.grow());
                draw();
            }
            animationId = requestAnimationFrame(animate);
        }

        // Event handlers
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            plants.push(createPlant(x, y));
            if (!isAnimating) draw();
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            mouseX = touch.clientX - rect.left;
            mouseY = touch.clientY - rect.top;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            plants.push(createPlant(x, y));
            if (!isAnimating) draw();
        });

        // Controls
        function regenerate() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            initPlants();
            if (!isAnimating) draw();
        }

        function toggleAnimation() {
            isAnimating = !isAnimating;
        }

        function changeColorScheme() {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
            if (!isAnimating) draw();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        initPlants();
        initParticles();
        animate();
    </script>
</body>
</html>
