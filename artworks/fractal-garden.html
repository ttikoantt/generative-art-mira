<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Garden - ジェネレーティブアート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #fff;
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }
        .info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 20px;
            text-align: center;
            z-index: 10;
        }
        .info h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #00ff87, #60efff, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .info p {
            font-size: 0.85rem;
            opacity: 0.7;
        }
        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            z-index: 100;
            transition: all 0.3s ease;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="canvas"></canvas>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
        <div class="info">
            <h1>🌸 Fractal Garden</h1>
            <p>フラクタルで咲く幻想的な植物たち</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let plants = [];
        let time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Plant {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.angle = Math.PI / 2;
                this.length = 0;
                this.maxLength = 100 + Math.random() * 150;
                this.width = 2 + Math.random() * 3;
                this.branches = [];
                this.growing = true;
                this.hue = Math.random() * 60 + 100; // 緑〜青系
                this.depth = 0;
                this.maxDepth = 4 + Math.floor(Math.random() * 3);
                this.growSpeed = 0.5 + Math.random() * 0.5;
            }

            grow() {
                if (!this.growing) return;

                this.length += this.growSpeed;

                if (this.length >= this.maxLength * 0.7 && this.branches.length === 0) {
                    // 枝を生やす
                    const numBranches = 2 + Math.floor(Math.random() * 2);
                    for (let i = 0; i < numBranches; i++) {
                        const angleOffset = (Math.random() - 0.5) * Math.PI / 2;
                        const branch = new Plant(
                            this.x + Math.cos(this.angle) * this.length,
                            this.y - Math.sin(this.angle) * this.length
                        );
                        branch.angle = this.angle + angleOffset;
                        branch.maxLength = this.maxLength * 0.6;
                        branch.width = this.width * 0.7;
                        branch.hue = this.hue + Math.random() * 20 - 10;
                        branch.depth = this.depth + 1;
                        branch.maxDepth = this.maxDepth;
                        branch.growSpeed = this.growSpeed;
                        this.branches.push(branch);
                    }
                }

                if (this.length >= this.maxLength) {
                    this.length = this.maxLength;
                    this.growing = false;
                }

                // 子供の枝も成長
                this.branches.forEach(branch => branch.grow());
            }

            draw(ctx, x, y, angle) {
                const endX = x + Math.cos(angle) * this.length;
                const endY = y - Math.sin(angle) * this.length;

                // 幹を描画
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = `hsl(${this.hue}, ${70 - this.depth * 10}%, ${50 - this.depth * 5}%)`;
                ctx.lineWidth = this.width * (1 - this.length / this.maxLength * 0.5);
                ctx.lineCap = 'round';
                ctx.stroke();

                // 先端に花や葉を描画
                if (!this.growing && this.branches.length === 0) {
                    this.drawFlower(ctx, endX, endY);
                }

                // 枝を描画
                this.branches.forEach(branch => {
                    branch.draw(ctx, endX, endY, branch.angle);
                });
            }

            drawFlower(ctx, x, y) {
                const size = 3 + Math.random() * 5;
                const petalHue = (this.hue + 180 + Math.random() * 60) % 360;

                for (let i = 0; i < 6; i++) {
                    const angle = (Math.PI * 2 / 6) * i;
                    const px = x + Math.cos(angle) * size;
                    const py = y + Math.sin(angle) * size;

                    ctx.beginPath();
                    ctx.arc(px, py, size * 0.8, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${petalHue}, 80%, 60%, 0.8)`;
                    ctx.fill();
                }

                // 中心
                ctx.beginPath();
                ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${petalHue + 30}, 90%, 70%, 1)`;
                ctx.fill();
            }
        }

        function init() {
            resize();
            plants = [];

            // 複数の植物を配置
            const numPlants = 5 + Math.floor(Math.random() * 3);
            for (let i = 0; i < numPlants; i++) {
                const x = Math.random() * width;
                const y = height;
                plants.push(new Plant(x, y));
            }
        }

        function animate() {
            // 半透明の背景でトレイル効果
            ctx.fillStyle = 'rgba(10, 10, 15, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // 全ての植物を成長させて描画
            plants.forEach(plant => {
                plant.grow();
                plant.draw(ctx, plant.x, plant.y, plant.angle);
            });

            time += 0.01;

            // 一定時間後にリセット
            if (time > 30) {
                init();
                time = 0;
            }

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', resize);
        init();
        animate();
    </script>
</body>
</html>
