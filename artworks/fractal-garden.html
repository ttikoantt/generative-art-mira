<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Garden - ジェネレーティブ・フラクタル・ガーデン</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 1.5em;
            font-weight: 300;
            background: linear-gradient(90deg, #ff6b9d, #c44ce2, #6b5ce7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .slider-container label {
            font-size: 0.85em;
            color: rgba(255, 255, 255, 0.7);
        }

        input[type="range"] {
            width: 100px;
            accent-color: #667eea;
        }

        #canvas {
            flex: 1;
            display: block;
            cursor: crosshair;
        }

        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            font-size: 0.85em;
            color: rgba(255, 255, 255, 0.8);
            max-width: 300px;
        }

        .info p {
            margin: 5px 0;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 10px;
            }

            h1 {
                font-size: 1.2em;
            }

            .controls {
                width: 100%;
                justify-content: center;
            }

            input[type="range"] {
                width: 80px;
            }

            .info {
                font-size: 0.75em;
                padding: 10px;
                max-width: 200px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🌸 Fractal Garden</h1>
        <div class="controls">
            <div class="slider-container">
                <label>深さ</label>
                <input type="range" id="depthSlider" min="4" max="10" value="7">
            </div>
            <div class="slider-container">
                <label>角度</label>
                <input type="range" id="angleSlider" min="10" max="60" value="25">
            </div>
            <button id="regenerate">🔄 再生成</button>
            <button id="clear">🗑️ クリア</button>
        </div>
    </header>

    <canvas id="canvas"></canvas>

    <div class="info">
        <p>🖱️ クリックで植物を植える</p>
        <p>✨ 自動的に成長します</p>
        <p>🎨 毎回違う花が咲きます</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // 設定
        let depth = 7;
        let angle = 25;
        const plants = [];

        // キャンバスサイズ設定
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - document.querySelector('header').offsetHeight;
            redraw();
        }

        // 色相生成（美しいグラデーション）
        function getHue(level, maxLevel) {
            const hue = (level / maxLevel) * 60 + 300; // ピンクから紫へ
            return hue % 360;
        }

        // 明度生成
        function getLightness(level, maxLevel) {
            return 60 - (level / maxLevel) * 20;
        }

        // 彩度生成
        function getSaturation(level, maxLevel) {
            return 80 + (level / maxLevel) * 20;
        }

        // 枝を描画
        function drawBranch(x, y, length, angle, depth, maxDepth) {
            if (depth === 0) {
                // 葉や花を描画
                const petalCount = Math.floor(Math.random() * 5) + 5;
                const petalLength = length * 0.8;

                for (let i = 0; i < petalCount; i++) {
                    const petalAngle = (i / petalCount) * Math.PI * 2;
                    const petalX = x + Math.cos(petalAngle) * petalLength;
                    const petalY = y + Math.sin(petalAngle) * petalLength;

                    const gradient = ctx.createRadialGradient(x, y, 0, x, y, petalLength);
                    const hue = getHue(maxDepth, maxDepth);
                    gradient.addColorStop(0, `hsla(${hue}, ${getSaturation(maxDepth, maxDepth)}%, 90%, 0.9)`);
                    gradient.addColorStop(0.5, `hsla(${hue}, ${getSaturation(maxDepth, maxDepth)}%, 70%, 0.6)`);
                    gradient.addColorStop(1, `hsla(${hue}, ${getSaturation(maxDepth, maxDepth)}%, 50%, 0)`);

                    ctx.beginPath();
                    ctx.arc(x, y, petalLength, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                }

                // 花の中心
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(45, 90%, 80%, 0.9)`;
                ctx.fill();

                return;
            }

            // 枝の終点を計算
            const endX = x + Math.cos(angle) * length;
            const endY = y + Math.sin(angle) * length;

            // 枝を描画
            const hue = getHue(maxDepth - depth, maxDepth);
            const gradient = ctx.createLinearGradient(x, y, endX, endY);
            gradient.addColorStop(0, `hsla(${hue}, ${getSaturation(maxDepth - depth, maxDepth)}%, ${getLightness(maxDepth - depth, maxDepth)}%, 0.9)`);
            gradient.addColorStop(1, `hsla(${hue + 20}, ${getSaturation(maxDepth - depth, maxDepth)}%, ${getLightness(maxDepth - depth, maxDepth)}%, 0.7)`);

            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = gradient;
            ctx.lineWidth = depth * 1.5;
            ctx.lineCap = 'round';
            ctx.stroke();

            // 再帰的に子枝を描画
            const newLength = length * 0.7;
            const angleVariation = (Math.random() - 0.5) * 20 * (Math.PI / 180);

            drawBranch(endX, endY, newLength, angle - (angle * (Math.PI / 180)) + angleVariation, depth - 1, maxDepth);
            drawBranch(endX, endY, newLength, angle + (angle * (Math.PI / 180)) + angleVariation, depth - 1, maxDepth);

            // 時々3本目の枝を追加
            if (Math.random() > 0.6) {
                drawBranch(endX, endY, newLength * 0.8, angle + angleVariation, depth - 1, maxDepth);
            }
        }

        // 植物を植える
        function plantSeed(x, y) {
            const initialLength = 80 + Math.random() * 40;
            const maxDepth = depth;

            plants.push({
                x,
                y,
                initialLength,
                maxDepth,
                angle: -Math.PI / 2, // 上向き
                currentDepth: 0,
                growthSpeed: 0.5 + Math.random() * 0.5
            });
        }

        // 植物を成長させる
        function growPlants() {
            let allGrown = true;

            plants.forEach(plant => {
                if (plant.currentDepth < plant.maxDepth) {
                    allGrown = false;
                    plant.currentDepth += plant.growthSpeed;
                    const clampedDepth = Math.min(plant.currentDepth, plant.maxDepth);

                    // この植物を再描画
                    // 完全に描画するには、キャンバスをクリアして全植物を再描画する必要がある
                }
            });

            if (!allGrown) {
                redraw();
            }
        }

        // 全てを再描画
        function redraw() {
            // 半透明の黒で背景を描画（トレイル効果）
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 全植物を描画
            plants.forEach(plant => {
                const clampedDepth = Math.min(Math.floor(plant.currentDepth), plant.maxDepth);
                drawBranch(plant.x, plant.y, plant.initialLength, plant.angle, clampedDepth, plant.maxDepth);
            });
        }

        // クリックイベント
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            plantSeed(x, y);
        });

        // タッチイベント
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            plantSeed(x, y);
        });

        // スライダー
        document.getElementById('depthSlider').addEventListener('input', (e) => {
            depth = parseInt(e.target.value);
        });

        document.getElementById('angleSlider').addEventListener('input', (e) => {
            angle = parseInt(e.target.value);
        });

        // ボタン
        document.getElementById('regenerate').addEventListener('click', () => {
            // ランダムな位置に植物を植える
            for (let i = 0; i < 3; i++) {
                const x = Math.random() * canvas.width;
                const y = canvas.height - 50 - Math.random() * 100;
                plantSeed(x, y);
            }
        });

        document.getElementById('clear').addEventListener('click', () => {
            plants.length = 0;
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        });

        // 初期化
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // アニメーションループ
        function animate() {
            growPlants();
            requestAnimationFrame(animate);
        }
        animate();

        // 開始時に自動的にいくつかの植物を植える
        setTimeout(() => {
            for (let i = 0; i < 5; i++) {
                const x = canvas.width * (0.2 + Math.random() * 0.6);
                const y = canvas.height - 50 - Math.random() * 100;
                plantSeed(x, y);
            }
        }, 500);
    </script>
</body>
</html>
