<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floral Particles - Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #ff6b9d, #c44cff, #6bb3ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header p {
            color: #888;
            font-size: 1rem;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            height: 70vh;
            background: radial-gradient(ellipse at center, #1a0a1e 0%, #0a0a0a 100%);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(196, 76, 255, 0.3);
            margin-bottom: 20px;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }

        .control-group {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-group label {
            font-size: 0.9rem;
            color: #aaa;
            min-width: 80px;
        }

        .control-group input[type="range"] {
            width: 150px;
            accent-color: #c44cff;
        }

        .control-group button {
            background: linear-gradient(135deg, #ff6b9d, #c44cff);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .control-group button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(196, 76, 255, 0.4);
        }

        .info {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .canvas-container {
                height: 60vh;
            }

            .controls {
                flex-direction: column;
            }

            .control-group {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌸 Floral Particles</h1>
            <p>Floral Particle System - Click and drag to create flowers</p>
        </div>

        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>Particles</label>
                <input type="range" id="particleCount" min="20" max="200" value="80">
            </div>
            <div class="control-group">
                <label>Size</label>
                <input type="range" id="particleSize" min="2" max="8" value="4">
            </div>
            <div class="control-group">
                <button id="clearBtn">Clear Canvas</button>
            </div>
            <div class="control-group">
                <button id="autoBtn">Auto Generate</button>
            </div>
        </div>

        <div class="info">
            ✨ Move your mouse or touch to create beautiful floral patterns
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let mouse = { x: null, y: null };
        let isAutoGenerating = false;

        const particleCountSlider = document.getElementById('particleCount');
        const particleSizeSlider = document.getElementById('particleSize');
        const clearBtn = document.getElementById('clearBtn');
        const autoBtn = document.getElementById('autoBtn');

        function resize() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            width = canvas.width;
            height = canvas.height;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 2 + 1;
                this.radius = parseFloat(particleSizeSlider.value);
                this.life = 1;
                this.decay = Math.random() * 0.01 + 0.005;
                
                // Floral colors
                const hues = [
                    Math.random() * 60 + 300, // Pink to purple
                    Math.random() * 40 + 320, // Pink to magenta
                    Math.random() * 60 + 180, // Cyan to blue
                    Math.random() * 30 + 280  // Purple
                ];
                this.hue = hues[Math.floor(Math.random() * hues.length)];
                this.saturation = Math.random() * 30 + 70;
                this.lightness = Math.random() * 20 + 60;
            }

            update() {
                this.angle += 0.02;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                this.speed *= 0.99;
                this.life -= this.decay;
                this.radius *= 0.99;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = `hsl(${this.hue}, ${this.saturation}%, ${this.lightness}%)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // Glow effect
                ctx.shadowBlur = 15;
                ctx.shadowColor = `hsl(${this.hue}, ${this.saturation}%, ${this.lightness}%)`;
                ctx.fill();
                ctx.restore();
            }
        }

        function createParticles(x, y) {
            const count = parseInt(particleCountSlider.value);
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y));
            }
        }

        function animate() {
            // Fade effect for trails
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, width, height);

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();

                if (p.life <= 0 || p.radius < 0.5) {
                    particles.splice(i, 1);
                }
            }

            // Auto generate
            if (isAutoGenerating && Math.random() < 0.1) {
                createParticles(
                    Math.random() * width,
                    Math.random() * height
                );
            }

            requestAnimationFrame(animate);
        }

        // Mouse events
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
            createParticles(mouse.x, mouse.y);
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // Touch events
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            mouse.x = touch.clientX - rect.left;
            mouse.y = touch.clientY - rect.top;
            createParticles(mouse.x, mouse.y);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            mouse.x = touch.clientX - rect.left;
            mouse.y = touch.clientY - rect.top;
            createParticles(mouse.x, mouse.y);
        });

        // Controls
        clearBtn.addEventListener('click', () => {
            particles = [];
            ctx.fillStyle = 'rgba(10, 10, 10, 1)';
            ctx.fillRect(0, 0, width, height);
        });

        autoBtn.addEventListener('click', () => {
            isAutoGenerating = !isAutoGenerating;
            autoBtn.textContent = isAutoGenerating ? 'Stop Auto' : 'Auto Generate';
            autoBtn.style.background = isAutoGenerating 
                ? 'linear-gradient(135deg, #ff6b6b, #ee5a6f)'
                : 'linear-gradient(135deg, #ff6b9d, #c44cff)';
        });

        animate();
    </script>
</body>
</html>
