<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lava Lamp Simulation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }

        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: clamp(24px, 5vw, 36px);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .canvas-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        #lavaCanvas {
            width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.3);
            background: linear-gradient(180deg, #0f0f23 0%, #1a1a3e 100%);
        }

        .fullscreen-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .info {
            color: rgba(255, 255, 255, 0.7);
            margin-top: 20px;
            font-size: clamp(12px, 3vw, 14px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌊 Lava Lamp Simulation</h1>
        <div class="canvas-wrapper">
            <canvas id="lavaCanvas" width="600" height="600"></canvas>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
        </div>
        <p class="info">タッチまたはマウスで波紋を作成 • 色が変化します</p>
    </div>

    <script>
        const canvas = document.getElementById('lavaCanvas');
        const ctx = canvas.getContext('2d');

        const blobs = [];
        const numBlobs = 8;
        let hue = 0;

        class Blob {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = Math.random() * 80 + 60;
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 1.5 - 0.5;
                this.hueOffset = Math.random() * 60 - 30;
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.pulseSpeed = Math.random() * 0.02 + 0.01;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.pulsePhase += this.pulseSpeed;

                // Boundary collision
                if (this.x < this.radius) {
                    this.x = this.radius;
                    this.vx *= -1;
                }
                if (this.x > canvas.width - this.radius) {
                    this.x = canvas.width - this.radius;
                    this.vx *= -1;
                }
                if (this.y < this.radius) {
                    this.y = this.radius;
                    this.vy *= -1;
                }
                if (this.y > canvas.height - this.radius) {
                    this.y = canvas.height - this.radius;
                    this.vy *= -1;
                }
            }

            draw() {
                const pulse = Math.sin(this.pulsePhase) * 0.2 + 1;
                const currentRadius = this.radius * pulse;

                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, currentRadius
                );

                const h = (hue + this.hueOffset) % 360;
                gradient.addColorStop(0, `hsla(${h}, 80%, 60%, 0.8)`);
                gradient.addColorStop(0.5, `hsla(${h}, 70%, 50%, 0.4)`);
                gradient.addColorStop(1, `hsla(${h}, 60%, 40%, 0)`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, currentRadius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Initialize blobs
        for (let i = 0; i < numBlobs; i++) {
            blobs.push(new Blob());
        }

        // Animation loop
        function animate() {
            // Clear with slight fade for trail effect
            ctx.fillStyle = 'rgba(15, 15, 35, 0.95)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw background gradient
            const bgGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bgGradient.addColorStop(0, 'rgba(15, 15, 35, 0.1)');
            bgGradient.addColorStop(1, 'rgba(26, 26, 62, 0.1)');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update and draw blobs
            blobs.forEach(blob => {
                blob.update();
                blob.draw();
            });

            // Slowly cycle global hue
            hue += 0.1;

            requestAnimationFrame(animate);
        }

        // Mouse/touch interaction
        function addBlob(x, y) {
            if (blobs.length < 15) {
                const newBlob = new Blob();
                newBlob.x = (x / canvas.offsetWidth) * canvas.width;
                newBlob.y = (y / canvas.offsetHeight) * canvas.height;
                newBlob.radius = Math.random() * 50 + 40;
                blobs.push(newBlob);
            }
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            addBlob(e.clientX - rect.left, e.clientY - rect.top);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            addBlob(touch.clientX - rect.left, touch.clientY - rect.top);
        });

        // Fullscreen
        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                canvas.requestFullscreen();
            }
        }

        // Start animation
        animate();
    </script>
</body>
</html>
