<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfield Warp ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            z-index: 100;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90%;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .control-group label {
            font-size: 12px;
            color: #0ff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-group input[type="range"] {
            width: 120px;
            height: 6px;
            -webkit-appearance: none;
            background: linear-gradient(to right, #0ff, #f0f);
            border-radius: 3px;
            outline: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px #0ff, 0 0 20px #f0f;
        }

        .color-btn {
            width: 35px;
            height: 35px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .color-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px currentColor;
        }

        .color-btn.active {
            border-color: #fff;
            box-shadow: 0 0 20px currentColor;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            z-index: 100;
        }

        .info h1 {
            font-size: 24px;
            margin-bottom: 5px;
            background: linear-gradient(45deg, #0ff, #f0f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @media (max-width: 768px) {
            .controls {
                bottom: 10px;
                padding: 10px 15px;
                gap: 10px;
            }

            .control-group input[type="range"] {
                width: 80px;
            }

            .color-btn {
                width: 30px;
                height: 30px;
            }

            .info {
                font-size: 12px;
            }

            .info h1 {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <h1>✨ Starfield Warp</h1>
        <p>Drag to change direction • Scroll to zoom</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Speed</label>
            <input type="range" id="speed" min="0.1" max="50" step="0.1" value="10">
        </div>
        <div class="control-group">
            <label>Star Count</label>
            <input type="range" id="count" min="100" max="5000" step="100" value="2000">
        </div>
        <div class="control-group">
            <label>Trail</label>
            <input type="range" id="trail" min="0" max="100" value="50">
        </div>
        <div class="control-group">
            <label>Color</label>
            <div style="display: flex; gap: 8px;">
                <button class="color-btn active" data-color="white" style="background: linear-gradient(135deg, #fff, #ccc);"></button>
                <button class="color-btn" data-color="blue" style="background: linear-gradient(135deg, #0ff, #00f);"></button>
                <button class="color-btn" data-color="purple" style="background: linear-gradient(135deg, #f0f, #90f);"></button>
                <button class="color-btn" data-color="rainbow" style="background: linear-gradient(135deg, #f00, #ff0, #0f0, #0ff, #00f, #f0f);"></button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        const centerX = width / 2;
        const centerY = height / 2;

        // Settings
        let speed = 10;
        let starCount = 2000;
        let trailAmount = 0.5;
        let colorMode = 'white';

        // Stars
        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = (Math.random() - 0.5) * width * 2;
                this.y = (Math.random() - 0.5) * height * 2;
                this.z = Math.random() * width;
                this.pz = this.z;
            }

            update() {
                this.z -= speed;

                if (this.z < 1) {
                    this.reset();
                    this.z = width;
                    this.pz = this.z;
                }
            }

            draw() {
                const x = (this.x / this.z) * width + centerX;
                const y = (this.y / this.z) * height + centerY;

                const px = (this.x / this.pz) * width + centerX;
                const py = (this.y / this.pz) * height + centerY;

                this.pz = this.z;

                if (x < 0 || x > width || y < 0 || y > height) return;

                const size = (1 - this.z / width) * 3;
                const brightness = (1 - this.z / width);

                let color;
                switch (colorMode) {
                    case 'blue':
                        color = `rgba(0, ${Math.floor(200 * brightness)}, 255, ${brightness})`;
                        break;
                    case 'purple':
                        color = `rgba(${Math.floor(255 * brightness)}, 0, ${Math.floor(255 * brightness)}, ${brightness})`;
                        break;
                    case 'rainbow':
                        const hue = (this.z / width) * 360;
                        color = `hsla(${hue}, 100%, 60%, ${brightness})`;
                        break;
                    default:
                        color = `rgba(255, 255, 255, ${brightness})`;
                }

                ctx.beginPath();
                ctx.moveTo(px, py);
                ctx.lineTo(x, y);
                ctx.strokeStyle = color;
                ctx.lineWidth = size;
                ctx.stroke();
            }
        }

        // Create stars
        let stars = [];
        function createStars() {
            stars = [];
            for (let i = 0; i < starCount; i++) {
                stars.push(new Star());
            }
        }
        createStars();

        // Animation
        function animate() {
            // Trail effect
            ctx.fillStyle = `rgba(0, 0, 0, ${1 - trailAmount})`;
            ctx.fillRect(0, 0, width, height);

            stars.forEach(star => {
                star.update();
                star.draw();
            });

            requestAnimationFrame(animate);
        }
        animate();

        // Controls
        document.getElementById('speed').addEventListener('input', (e) => {
            speed = parseFloat(e.target.value);
        });

        document.getElementById('count').addEventListener('input', (e) => {
            starCount = parseInt(e.target.value);
            createStars();
        });

        document.getElementById('trail').addEventListener('input', (e) => {
            trailAmount = e.target.value / 100;
        });

        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                colorMode = btn.dataset.color;
            });
        });

        // Mouse/touch interaction
        let isDragging = false;
        let lastX = 0;
        let lastY = 0;
        let offsetX = 0;
        let offsetY = 0;

        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - lastX;
            const dy = e.clientY - lastY;
            offsetX += dx;
            offsetY += dy;
            lastX = e.clientX;
            lastY = e.clientY;
        });

        canvas.addEventListener('mouseup', () => {
            isDragging = false;
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            speed = Math.max(0.1, Math.min(50, speed + e.deltaY * 0.01));
            document.getElementById('speed').value = speed;
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            isDragging = true;
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const dx = e.touches[0].clientX - lastX;
            const dy = e.touches[0].clientY - lastY;
            offsetX += dx;
            offsetY += dy;
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });

        // Resize
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
