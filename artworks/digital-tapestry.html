<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Digital Tapestry - デジタル織物</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            user-select: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 600px) {
            .info {
                font-size: 12px;
                bottom: 10px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    <div class="info">マウス/タッチで動かす • デジタル織物</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let mouseX = 0, mouseY = 0;
        let time = 0;

        // 設定
        const config = {
            verticalThreads: 15,    // 縦糸の数
            horizontalThreads: 15,  // 横糸の数
            baseAmplitude: 50,      // 基本振幅
            baseFrequency: 2,       // 基本周波数
            speed: 0.02            // アニメーション速度
        };

        // 色相のオフセット（各スレッドごとに異なる色）
        const hueOffsets = {
            vertical: [],
            horizontal: []
        };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            mouseX = width / 2;
            mouseY = height / 2;

            // 色相オフセットを初期化
            hueOffsets.vertical = [];
            hueOffsets.horizontal = [];
            for (let i = 0; i < config.verticalThreads; i++) {
                hueOffsets.vertical.push((i / config.verticalThreads) * 360);
            }
            for (let i = 0; i < config.horizontalThreads; i++) {
                hueOffsets.horizontal.push((i / config.horizontalThreads) * 360 + 180);
            }
        }

        function getAmplitude() {
            const dx = (mouseX - width / 2) / width;
            return config.baseAmplitude + dx * 50;
        }

        function getFrequency() {
            const dy = (mouseY - height / 2) / height;
            return config.baseFrequency + dy * 2;
        }

        function drawVerticalThreads() {
            const amplitude = getAmplitude();
            const frequency = getFrequency();

            for (let i = 0; i < config.verticalThreads; i++) {
                const x = (width / (config.verticalThreads - 1)) * i;
                const hueOffset = hueOffsets.vertical[i];

                ctx.beginPath();
                ctx.strokeStyle = `hsla(${hueOffset + time * 10}, 70%, 60%, 0.6)`;
                ctx.lineWidth = 1.5;

                for (let y = 0; y < height; y += 2) {
                    const normalizedY = y / height;
                    const offset = Math.sin(normalizedY * Math.PI * frequency + time + i * 0.5) * amplitude;
                    const offsetX = Math.cos(normalizedY * Math.PI * frequency * 1.3 + time * 1.2) * amplitude * 0.5;

                    if (y === 0) {
                        ctx.moveTo(x + offset + offsetX, y);
                    } else {
                        ctx.lineTo(x + offset + offsetX, y);
                    }
                }

                ctx.stroke();
            }
        }

        function drawHorizontalThreads() {
            const amplitude = getAmplitude();
            const frequency = getFrequency();

            for (let i = 0; i < config.horizontalThreads; i++) {
                const y = (height / (config.horizontalThreads - 1)) * i;
                const hueOffset = hueOffsets.horizontal[i];

                ctx.beginPath();
                ctx.strokeStyle = `hsla(${hueOffset + time * 10}, 70%, 60%, 0.6)`;
                ctx.lineWidth = 1.5;

                for (let x = 0; x < width; x += 2) {
                    const normalizedX = x / width;
                    const offset = Math.cos(normalizedX * Math.PI * frequency + time + i * 0.5) * amplitude;
                    const offsetY = Math.sin(normalizedX * Math.PI * frequency * 1.3 + time * 1.2) * amplitude * 0.5;

                    if (x === 0) {
                        ctx.moveTo(x, y + offset + offsetY);
                    } else {
                        ctx.lineTo(x, y + offset + offsetY);
                    }
                }

                ctx.stroke();
            }
        }

        function drawIntersections() {
            const amplitude = getAmplitude();
            const frequency = getFrequency();

            for (let i = 0; i < config.verticalThreads; i++) {
                for (let j = 0; j < config.horizontalThreads; j++) {
                    const baseX = (width / (config.verticalThreads - 1)) * i;
                    const baseY = (height / (config.horizontalThreads - 1)) * j;

                    const normalizedY = baseY / height;
                    const normalizedX = baseX / width;

                    const vx = Math.sin(normalizedY * Math.PI * frequency + time + i * 0.5) * amplitude +
                              Math.cos(normalizedY * Math.PI * frequency * 1.3 + time * 1.2) * amplitude * 0.5;
                    const vy = Math.cos(normalizedX * Math.PI * frequency + time + j * 0.5) * amplitude +
                              Math.sin(normalizedX * Math.PI * frequency * 1.3 + time * 1.2) * amplitude * 0.5;

                    const x = baseX + vx;
                    const y = baseY + vy;

                    const brightness = (Math.sin(time * 2 + i + j) + 1) / 2;
                    const hue = (hueOffsets.vertical[i] + hueOffsets.horizontal[j]) / 2 + time * 20;

                    ctx.beginPath();
                    ctx.fillStyle = `hsla(${hue}, 80%, ${50 + brightness * 40}%, ${0.3 + brightness * 0.7})`;
                    ctx.arc(x, y, 2 + brightness * 2, 0, Math.PI * 2);
                    ctx.fill();

                    // 光る効果
                    if (brightness > 0.7) {
                        ctx.beginPath();
                        ctx.fillStyle = `hsla(${hue}, 100%, 80%, ${0.2 + brightness * 0.3})`;
                        ctx.arc(x, y, 4 + brightness * 4, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
        }

        function animate() {
            // 半透明の黒で上書き（トレイル効果）
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            drawVerticalThreads();
            drawHorizontalThreads();
            drawIntersections();

            time += config.speed;
            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        }, { passive: false });

        // 初期化
        resize();
        animate();
    </script>
</body>
</html>
