<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時空の渦 - Temporal Vortex</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #fff;
            font-size: 14px;
            opacity: 0.7;
            pointer-events: none;
        }

        .title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="title">時空の渦</div>
    <div class="info">時間軸をクリックして加速・減速</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        let timeSpeed = 1;
        let time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        resize();
        window.addEventListener('resize', resize);

        // クリックで時間速度を変更
        canvas.addEventListener('click', () => {
            timeSpeed = timeSpeed === 1 ? 3 : timeSpeed === 3 ? 0.5 : 1;
        });

        // タッチ対応
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            timeSpeed = timeSpeed === 1 ? 3 : timeSpeed === 3 ? 0.5 : 1;
        });

        class VortexRing {
            constructor(radius, speed, colorHue, offset) {
                this.radius = radius;
                this.speed = speed;
                this.colorHue = colorHue;
                this.offset = offset;
            }

            draw(t) {
                const rotation = t * this.speed + this.offset;
                const segments = 120;

                ctx.beginPath();
                for (let i = 0; i <= segments; i++) {
                    const angle = (i / segments) * Math.PI * 2 + rotation;
                    const pulseRadius = this.radius + Math.sin(t * 2 + this.offset) * 20;

                    const x = centerX + Math.cos(angle) * pulseRadius;
                    const y = centerY + Math.sin(angle) * pulseRadius * 0.6;

                    // 時間歪み効果
                    const timeDistortion = Math.sin(angle * 3 + t) * 15;
                    const finalX = x + Math.cos(angle + Math.PI/2) * timeDistortion;
                    const finalY = y + Math.sin(angle + Math.PI/2) * timeDistortion;

                    if (i === 0) {
                        ctx.moveTo(finalX, finalY);
                    } else {
                        ctx.lineTo(finalX, finalY);
                    }
                }

                const hue = (this.colorHue + t * 20) % 360;
                ctx.strokeStyle = `hsla(${hue}, 70%, 60%, 0.6)`;
                ctx.lineWidth = 2;
                ctx.stroke();

                // グロウ効果
                ctx.strokeStyle = `hsla(${hue}, 70%, 60%, 0.2)`;
                ctx.lineWidth = 6;
                ctx.stroke();
            }
        }

        // 渦のリングを作成
        const rings = [];
        for (let i = 0; i < 15; i++) {
            rings.push(new VortexRing(
                50 + i * 25,
                0.02 + i * 0.005,
                i * 20,
                i * 0.3
            ));
        }

        // 粒子システム
        const particles = [];
        for (let i = 0; i < 200; i++) {
            particles.push({
                angle: Math.random() * Math.PI * 2,
                radius: Math.random() * 400 + 50,
                speed: Math.random() * 0.02 + 0.01,
                size: Math.random() * 3 + 1,
                hue: Math.random() * 60 + 180
            });
        }

        function drawParticles(t) {
            particles.forEach(p => {
                const rotation = t * p.speed;
                const x = centerX + Math.cos(p.angle + rotation) * p.radius;
                const y = centerY + Math.sin(p.angle + rotation) * p.radius * 0.6;

                const pulse = Math.sin(t * 3 + p.angle) * 0.5 + 0.5;

                ctx.beginPath();
                ctx.arc(x, y, p.size * pulse + 1, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${p.hue + t * 30}, 80%, 70%, ${pulse * 0.8})`;
                ctx.fill();
            });
        }

        function animate() {
            // 淡い残像効果
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            time += 0.016 * timeSpeed;

            // 渦を描画（外側から）
            for (let i = rings.length - 1; i >= 0; i--) {
                rings[i].draw(time);
            }

            // 粒子を描画
            drawParticles(time);

            // 中心の光
            const centerGlow = Math.sin(time * 2) * 0.3 + 0.7;
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 100);
            gradient.addColorStop(0, `rgba(255, 255, 255, ${centerGlow * 0.3})`);
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(centerX - 100, centerY - 100, 200, 200);

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
