<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>フラクタル四季の木</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #2c3e50 0%, #000 100%);
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      pointer-events: none;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }
    #fullscreen-btn {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
      pointer-events: auto;
    }
    #fullscreen-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }
    #fullscreen-btn:active { transform: scale(0.95); }
    @media (max-width: 600px) {
      #info { font-size: 12px; top: 12px; left: 12px; }
      #fullscreen-btn { padding: 10px 14px; font-size: 13px; bottom: 12px; right: 12px; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="info">タップで季節が変わる 🌸</div>
  <button id="fullscreen-btn">全画面表示</button>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const info = document.getElementById('info');
    const fsBtn = document.getElementById('fullscreen-btn');

    let width, height;
    let time = 0;
    let seasonIndex = 0;
    const seasons = ['春', '夏', '秋', '冬'];
    const seasonEmojis = ['🌸', '🌳', '🍁', '❄️'];

    const seasonParams = {
      '春': {
        leafColor: [0, 80, 85],
        skyTop: [200, 70, 95],
        skyBottom: [330, 80, 90],
        branchColor: '#8B4513',
        angle: 0.45,
        widthRatio: 0.7,
        leafDensity: 0.6,
        windStrength: 0.008
      },
      '夏': {
        leafColor: [120, 70, 45],
        skyTop: [200, 80, 70],
        skyBottom: [180, 60, 95],
        branchColor: '#5D3A1A',
        angle: 0.35,
        widthRatio: 0.65,
        leafDensity: 0.8,
        windStrength: 0.012
      },
      '秋': {
        leafColor: [25, 85, 60],
        skyTop: [25, 60, 90],
        skyBottom: [30, 50, 95],
        branchColor: '#6B4423',
        angle: 0.5,
        widthRatio: 0.75,
        leafDensity: 0.5,
        windStrength: 0.015
      },
      '冬': {
        leafColor: [200, 10, 95],
        skyTop: [210, 40, 25],
        skyBottom: [220, 30, 10],
        branchColor: '#2C1810',
        angle: 0.4,
        widthRatio: 0.6,
        leafDensity: 0.1,
        windStrength: 0.02
      }
    };

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }

    function drawBranch(x, y, len, angle, depth, season) {
      if (depth === 0) {
        const params = seasonParams[season];
        if (Math.random() < params.leafDensity) {
          const leafHue = params.leafColor[0] + Math.sin(time * 0.002 + depth) * 10;
          const leafSize = 3 + Math.random() * 4;
          ctx.fillStyle = `hsl(${leafHue}, ${params.leafColor[1]}%, ${params.leafColor[2]}%)`;
          ctx.beginPath();
          ctx.arc(x, y, leafSize, 0, Math.PI * 2);
          ctx.fill();
        }
        return;
      }

      const params = seasonParams[season];
      const wind = Math.sin(time * params.windStrength + depth) * 0.03 * depth;

      const endX = x + Math.cos(angle + wind) * len;
      const endY = y + Math.sin(angle + wind) * len;

      ctx.strokeStyle = params.branchColor;
      ctx.lineWidth = depth * params.widthRatio;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(endX, endY);
      ctx.stroke();

      const subLen = len * 0.75;
      const leftAngle = angle - params.angle + Math.sin(time * 0.001 + depth) * 0.05;
      const rightAngle = angle + params.angle + Math.cos(time * 0.001 + depth) * 0.05;

      drawBranch(endX, endY, subLen, leftAngle, depth - 1, season);
      drawBranch(endX, endY, subLen, rightAngle, depth - 1, season);
    }

    function draw() {
      const season = seasons[seasonIndex];
      const params = seasonParams[season];

      const gradient = ctx.createLinearGradient(0, 0, 0, height);
      gradient.addColorStop(0, `hsl(${params.skyTop[0]}, ${params.skyTop[1]}%, ${params.skyTop[2]}%)`);
      gradient.addColorStop(1, `hsl(${params.skyBottom[0]}, ${params.skyBottom[1]}%, ${params.skyBottom[2]}%)`);
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      const rootX = width / 2;
      const rootY = height;
      drawBranch(rootX, rootY, Math.min(height * 0.25, 150), -Math.PI / 2, 9, season);

      time += 16;
      requestAnimationFrame(draw);
    }

    function nextSeason() {
      seasonIndex = (seasonIndex + 1) % 4;
      info.textContent = `タップで季節が変わる ${seasonEmojis[seasonIndex]}`;
    }

    canvas.addEventListener('click', nextSeason);
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      nextSeason();
    }, { passive: false });

    fsBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
          if (document.documentElement.webkitRequestFullscreen) {
            document.documentElement.webkitRequestFullscreen();
          }
        });
      } else {
        document.exitFullscreen();
      }
    });

    window.addEventListener('resize', resize);
    resize();
    draw();
  </script>
</body>
</html>
