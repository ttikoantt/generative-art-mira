<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiral Art - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        canvas {
            background: #0a0a0f;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(102, 126, 234, 0.3);
            display: block;
            margin: 0 auto;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 500;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            margin-top: 15px;
            color: #666;
            font-size: 0.8rem;
        }

        #fullscreenBtn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.5rem;
            }

            canvas {
                max-width: 100%;
                height: auto;
            }

            button {
                padding: 10px 20px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌀 Spiral Art</h1>
        <p class="subtitle">美しい螺旋パターンのジェネレーティブアート</p>

        <canvas id="spiralCanvas"></canvas>

        <div class="controls">
            <button onclick="generateNew()">新しい螺旋</button>
            <button onclick="toggleAnimation()">アニメーション切替</button>
            <button id="fullscreenBtn" onclick="toggleFullscreen()">全画面</button>
        </div>

        <p class="info">クリックで新しい螺旋を生成 | 自動で変化し続けます</p>
    </div>

    <script>
        const canvas = document.getElementById('spiralCanvas');
        const ctx = canvas.getContext('2d');

        // キャンバスサイズ設定
        function resizeCanvas() {
            const size = Math.min(window.innerWidth - 40, window.innerHeight - 200, 700);
            canvas.width = size;
            canvas.height = size;
        }

        resizeCanvas();
        window.addEventListener('resize', () => {
            resizeCanvas();
            draw();
        });

        let animationId = null;
        let isAnimating = true;
        let time = 0;
        let spiralParams = generateParams();

        // 螺旋パラメータ生成
        function generateParams() {
            return {
                armCount: Math.floor(Math.random() * 8) + 3,      // 腕の数
                maxRadius: Math.random() * 0.4 + 0.35,            // 最大半径
                turns: Math.floor(Math.random() * 4) + 3,         // 回転数
                colorShift: Math.random() * 360,                  // 色相シフト
                lineWidth: Math.random() * 2 + 1,                 // 線の太さ
                dotSize: Math.random() * 3 + 1,                   // 点のサイズ
                speed: Math.random() * 0.02 + 0.01,               // アニメーション速度
                useDots: Math.random() > 0.5                      // 点を使うか線を使うか
            };
        }

        // 新しい螺旋を生成
        function generateNew() {
            spiralParams = generateParams();
            time = 0;
        }

        // アニメーション切替
        function toggleAnimation() {
            isAnimating = !isAnimating;
            if (isAnimating) {
                animate();
            } else {
                cancelAnimationFrame(animationId);
            }
        }

        // 全画面切替
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 螺旋描画
        function draw() {
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const maxR = Math.min(canvas.width, canvas.height) * spiralParams.maxRadius;

            // 複数の腕を描画
            for (let arm = 0; arm < spiralParams.armCount; arm++) {
                const armOffset = (arm / spiralParams.armCount) * Math.PI * 2;

                for (let i = 0; i < 500; i++) {
                    const t = i / 500;
                    const angle = t * spiralParams.turns * Math.PI * 2 + armOffset + time;
                    const radius = t * maxR;

                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;

                    // 色相計算（時間で変化）
                    const hue = (spiralParams.colorShift + t * 180 + arm * 30 + time * 50) % 360;
                    const saturation = 80;
                    const lightness = 50 + t * 20;

                    ctx.fillStyle = `hsl(${hue}, ${saturation}%, ${lightness}%)`;

                    if (spiralParams.useDots) {
                        const size = spiralParams.dotSize * (0.5 + t * 0.5);
                        ctx.beginPath();
                        ctx.arc(x, y, size, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        const size = spiralParams.lineWidth * (0.5 + t * 0.5);
                        ctx.beginPath();
                        ctx.arc(x, y, size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            // 中心の装飾
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 20);
            gradient.addColorStop(0, `hsl(${(spiralParams.colorShift + time * 50) % 360}, 80%, 70%)`);
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 20, 0, Math.PI * 2);
            ctx.fill();
        }

        // アニメーションループ
        function animate() {
            time += spiralParams.speed;
            draw();
            animationId = requestAnimationFrame(animate);
        }

        // クリックで新しい螺旋
        canvas.addEventListener('click', generateNew);

        // アニメーション開始
        animate();
    </script>
</body>
</html>
