<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Wave Visualizer | Generative Art by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 3rem);
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: clamp(0.8rem, 2vw, 1rem);
            color: #888;
            margin-bottom: 20px;
        }

        #canvas {
            border: 2px solid #00d9ff;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            max-width: 100%;
            height: auto;
            cursor: crosshair;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 217, 255, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 217, 255, 0.5);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .info {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #aaa;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            font-size: 0.9rem;
            background: rgba(0, 217, 255, 0.2);
            border: 1px solid #00d9ff;
            color: #00d9ff;
            border-radius: 20px;
        }

        .visualization-mode {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 8px 16px;
            font-size: 0.85rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #444;
            color: #aaa;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            border-color: transparent;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">🖥️ 全画面</button>

    <div class="container">
        <h1>🎵 Sound Wave Visualizer</h1>
        <p class="subtitle">マイクからの音声をリアルタイムで可視化</p>

        <canvas id="canvas" width="800" height="400"></canvas>

        <div class="controls">
            <button id="startBtn">🎤 開始</button>
            <button id="stopBtn" disabled>⏹️ 停止</button>
            <button id="demoBtn">🎵 デモモード</button>
        </div>

        <div class="visualization-mode">
            <button class="mode-btn active" data-mode="waveform">📊 波形</button>
            <button class="mode-btn" data-mode="frequency">📈 周波数</button>
            <button class="mode-btn" data-mode="circular">🌀 円形</button>
            <button class="mode-btn" data-mode="bars">📊 バー</button>
        </div>

        <p class="info">マイクの使用を許可してください</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const demoBtn = document.getElementById('demoBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const modeBtns = document.querySelectorAll('.mode-btn');
        const info = document.querySelector('.info');

        let audioContext;
        let analyser;
        let microphone;
        let dataArray;
        let bufferLength;
        let animationId;
        let isRunning = false;
        let visualizationMode = 'waveform';
        let demoMode = false;
        let demoTime = 0;

        // キャンバスサイズ調整
        function resizeCanvas() {
            const container = document.querySelector('.container');
            const maxWidth = Math.min(800, container.clientWidth - 40);
            canvas.width = maxWidth;
            canvas.height = maxWidth * 0.5;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 全画面
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // 可視化モード切り替え
        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                modeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                visualizationMode = btn.dataset.mode;
            });
        });

        // マイク開始
        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);

                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);

                isRunning = true;
                demoMode = false;
                startBtn.disabled = true;
                stopBtn.disabled = false;
                demoBtn.disabled = false;
                info.textContent = '🎤 マイクアクティブ';

                visualize();
            } catch (err) {
                console.error(err);
                info.textContent = '❌ マイクアクセスが拒否されました';
                alert('マイクへのアクセスが必要です。ブラウザの設定を確認してください。');
            }
        });

        // 停止
        stopBtn.addEventListener('click', () => {
            if (audioContext) {
                audioContext.close();
                cancelAnimationFrame(animationId);
                isRunning = false;
                demoMode = false;
                startBtn.disabled = false;
                stopBtn.disabled = true;
                info.textContent = '⏹️ 停止中';

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                drawIdleScreen();
            }
        });

        // デモモード
        demoBtn.addEventListener('click', () => {
            if (!isRunning) {
                isRunning = true;
                demoMode = true;
                bufferLength = 1024;
                dataArray = new Uint8Array(bufferLength);
                startBtn.disabled = true;
                stopBtn.disabled = false;
                info.textContent = '🎵 デモモード';
                visualize();
            }
        });

        function visualize() {
            if (!isRunning) return;

            if (demoMode) {
                // デモデータ生成
                for (let i = 0; i < bufferLength; i++) {
                    const wave = Math.sin(demoTime * 0.02 + i * 0.01) * 50 +
                                Math.sin(demoTime * 0.05 + i * 0.02) * 30 +
                                Math.sin(demoTime * 0.1 + i * 0.05) * 20;
                    dataArray[i] = 128 + wave + Math.random() * 20;
                }
                demoTime++;
            } else {
                analyser.getByteTimeDomainData(dataArray);
            }

            ctx.fillStyle = 'rgba(26, 26, 46, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            switch (visualizationMode) {
                case 'waveform':
                    drawWaveform();
                    break;
                case 'frequency':
                    drawFrequency();
                    break;
                case 'circular':
                    drawCircular();
                    break;
                case 'bars':
                    drawBars();
                    break;
            }

            animationId = requestAnimationFrame(visualize);
        }

        function drawWaveform() {
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#00d9ff';
            ctx.shadowColor = '#00d9ff';
            ctx.shadowBlur = 10;

            ctx.beginPath();
            const sliceWidth = canvas.width * 1.0 / bufferLength;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const v = dataArray[i] / 128.0;
                const y = v * canvas.height / 2;

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
                x += sliceWidth;
            }

            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();
        }

        function drawFrequency() {
            if (demoMode) {
                analyser.getByteFrequencyData(dataArray);
            } else {
                analyser.getByteFrequencyData(dataArray);
            }

            const barWidth = (canvas.width / bufferLength) * 2.5;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const barHeight = (dataArray[i] / 255) * canvas.height;

                const hue = (i / bufferLength) * 360;
                ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
                ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
                ctx.shadowBlur = 5;

                ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                x += barWidth + 1;
            }
        }

        function drawCircular() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = Math.min(canvas.width, canvas.height) / 4;

            for (let i = 0; i < bufferLength; i++) {
                const angle = (i / bufferLength) * Math.PI * 2;
                const amplitude = (dataArray[i] / 128.0 - 1) * radius;

                const x1 = centerX + Math.cos(angle) * radius;
                const y1 = centerY + Math.sin(angle) * radius;
                const x2 = centerX + Math.cos(angle) * (radius + amplitude);
                const y2 = centerY + Math.sin(angle) * (radius + amplitude);

                const hue = (i / bufferLength) * 360;
                ctx.strokeStyle = `hsl(${hue}, 100%, 50%)`;
                ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
                ctx.shadowBlur = 5;
                ctx.lineWidth = 2;

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
        }

        function drawBars() {
            if (!demoMode) {
                analyser.getByteFrequencyData(dataArray);
            } else {
                // デモモード用の周波数データ生成
                for (let i = 0; i < bufferLength; i++) {
                    const freq = Math.sin(demoTime * 0.03 + i * 0.02) * 100 +
                               Math.sin(demoTime * 0.07 + i * 0.05) * 50 + 128;
                    dataArray[i] = Math.max(0, Math.min(255, freq));
                }
            }

            const barCount = 64;
            const barWidth = canvas.width / barCount;
            const step = Math.floor(bufferLength / barCount);

            for (let i = 0; i < barCount; i++) {
                const value = dataArray[i * step];
                const barHeight = (value / 255) * canvas.height * 0.8;
                const x = i * barWidth;
                const y = (canvas.height - barHeight) / 2;

                const gradient = ctx.createLinearGradient(x, y, x, y + barHeight);
                gradient.addColorStop(0, '#00d9ff');
                gradient.addColorStop(0.5, '#00ff88');
                gradient.addColorStop(1, '#00d9ff');

                ctx.fillStyle = gradient;
                ctx.shadowColor = '#00d9ff';
                ctx.shadowBlur = 10;

                ctx.fillRect(x + 2, y, barWidth - 4, barHeight);
            }
        }

        function drawIdleScreen() {
            ctx.fillStyle = 'rgba(26, 26, 46, 1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = '#00d9ff';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);

            ctx.beginPath();
            ctx.moveTo(0, canvas.height / 2);
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();

            ctx.setLineDash([]);

            ctx.fillStyle = '#666';
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('「開始」ボタンをクリックしてください', canvas.width / 2, canvas.height / 2 - 20);
        }

        // 初期画面
        drawIdleScreen();
    </script>
</body>
</html>
