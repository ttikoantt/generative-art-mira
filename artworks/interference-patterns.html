<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interference Patterns - 干渉縞ジェネレーター</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        canvas {
            display: block;
            cursor: pointer;
            touch-action: none;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            color: #fff;
            font-size: 12px;
            z-index: 100;
            max-width: 280px;
            border: 1px solid #333;
        }

        .controls h3 {
            margin-bottom: 15px;
            font-size: 16px;
            color: #0ff;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
        }

        .control-group input[type="range"] {
            width: 100%;
            margin-bottom: 5px;
        }

        .control-group .value {
            font-size: 11px;
            color: #0ff;
        }

        .btn {
            background: #0ff;
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            margin-right: 5px;
            margin-bottom: 5px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #0aa;
            color: #fff;
        }

        .btn-fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border-radius: 5px;
            color: #fff;
            font-size: 11px;
            text-align: center;
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <h3>🌊 干渉縞ジェネレーター</h3>

        <div class="control-group">
            <label>波源の数: <span id="sourcesValue" class="value">3</span></label>
            <input type="range" id="sources" min="2" max="8" value="3">
        </div>

        <div class="control-group">
            <label>周波数: <span id="frequencyValue" class="value">5.0</span></label>
            <input type="range" id="frequency" min="1" max="15" value="5" step="0.5">
        </div>

        <div class="control-group">
            <label>回転速度: <span id="rotationValue" class="value">0.5</span></label>
            <input type="range" id="rotation" min="0" max="3" value="0.5" step="0.1">
        </div>

        <div class="control-group">
            <label>波の速度: <span id="speedValue" class="value">1.0</span></label>
            <input type="range" id="speed" min="0.1" max="3" value="1" step="0.1">
        </div>

        <div class="control-group">
            <label>カラー</label>
            <button class="btn" onclick="setColor('rainbow')">🌈 レインボー</button>
            <button class="btn" onclick="setColor('ocean')">🌊 オーシャン</button>
            <button class="btn" onclick="setColor('fire')">🔥 ファイア</button>
            <button class="btn" onclick="setColor('mono')">⚫ モノクロ</button>
        </div>

        <button class="btn" onclick="randomize()">🎲 ランダム</button>
        <button class="btn" onclick="toggleAnimation()">⏯️ 一時停止</button>
    </div>

    <button class="btn btn-fullscreen" onclick="toggleFullscreen()">⛶ 全画面</button>

    <div class="info">
        タップ/クリックで波源を追加 | キャンバス上をスワイプで干渉を変化
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let animationId;
        let isAnimating = true;
        let time = 0;

        // 波源
        let sources = [];

        // パラメータ
        let params = {
            numSources: 3,
            frequency: 5.0,
            rotationSpeed: 0.5,
            waveSpeed: 1.0,
            colorMode: 'rainbow'
        };

        // 初期化
        function init() {
            resize();
            initSources();
            animate();
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function initSources() {
            sources = [];
            const centerX = width / 2;
            const centerY = height / 2;
            const radius = Math.min(width, height) * 0.2;

            for (let i = 0; i < params.numSources; i++) {
                const angle = (i / params.numSources) * Math.PI * 2;
                sources.push({
                    x: centerX + Math.cos(angle) * radius,
                    y: centerY + Math.sin(angle) * radius,
                    phase: i * Math.PI / params.numSources
                });
            }
        }

        function getColor(intensity) {
            intensity = Math.max(0, Math.min(1, intensity));

            switch (params.colorMode) {
                case 'rainbow':
                    const hue = (intensity * 360 + time * 10) % 360;
                    const sat = 80;
                    const light = 30 + intensity * 40;
                    return `hsl(${hue}, ${sat}%, ${light}%)`;

                case 'ocean':
                    const oceanHue = 180 + intensity * 60;
                    const oceanSat = 70 + intensity * 30;
                    const oceanLight = 20 + intensity * 50;
                    return `hsl(${oceanHue}, ${oceanSat}%, ${oceanLight}%)`;

                case 'fire':
                    const fireHue = intensity * 60;
                    const fireSat = 100;
                    const fireLight = intensity * 60;
                    return `hsl(${fireHue}, ${fireSat}%, ${fireLight}%)`;

                case 'mono':
                    const gray = intensity * 255;
                    return `rgb(${gray}, ${gray}, ${gray})`;

                default:
                    return `rgb(${intensity * 255}, ${intensity * 255}, ${intensity * 255})`;
            }
        }

        function draw() {
            const imageData = ctx.createImageData(width, height);
            const data = imageData.data;

            const pixelSize = 4; // パフォーマンスのため、4ピクセルごとに計算

            for (let y = 0; y < height; y += pixelSize) {
                for (let x = 0; x < width; x += pixelSize) {
                    // 波源からの距離の合計を計算
                    let totalAmplitude = 0;

                    for (const source of sources) {
                        const dx = x - source.x;
                        const dy = y - source.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        // 波の重ね合わせ（干渉）
                        const wave = Math.sin(distance * params.frequency * 0.02 - time * params.waveSpeed + source.phase);
                        totalAmplitude += wave;
                    }

                    // 正規化
                    const intensity = (totalAmplitude / sources.length + 1) / 2;

                    // 色を取得
                    const color = getColor(intensity);

                    // RGBをパース
                    const rgbMatch = color.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
                    const hslMatch = color.match(/hsl\((\d+\.?\d*),\s*(\d+)%,\s*(\d+\.?\d*)%\)/);

                    let r, g, b;

                    if (rgbMatch) {
                        r = parseInt(rgbMatch[1]);
                        g = parseInt(rgbMatch[2]);
                        b = parseInt(rgbMatch[3]);
                    } else if (hslMatch) {
                        const h = parseFloat(hslMatch[1]);
                        const s = parseInt(hslMatch[2]);
                        const l = parseFloat(hslMatch[3]);

                        // HSL to RGB conversion
                        const c = (1 - Math.abs(2 * l / 100 - 1)) * s / 100;
                        const x = c * (1 - Math.abs((h / 60) % 2 - 1));
                        const m = l / 100 - c / 2;

                        let r1, g1, b1;
                        if (h < 60) { r1 = c; g1 = x; b1 = 0; }
                        else if (h < 120) { r1 = x; g1 = c; b1 = 0; }
                        else if (h < 180) { r1 = 0; g1 = c; b1 = x; }
                        else if (h < 240) { r1 = 0; g1 = x; b1 = c; }
                        else if (h < 300) { r1 = x; g1 = 0; b1 = c; }
                        else { r1 = c; g1 = 0; b1 = x; }

                        r = Math.round((r1 + m) * 255);
                        g = Math.round((g1 + m) * 255);
                        b = Math.round((b1 + m) * 255);
                    } else {
                        r = g = b = 0;
                    }

                    // ピクセルを埋める（pixelSize x pixelSize）
                    for (let dy = 0; dy < pixelSize && y + dy < height; dy++) {
                        for (let dx = 0; dx < pixelSize && x + dx < width; dx++) {
                            const index = ((y + dy) * width + (x + dx)) * 4;
                            data[index] = r;
                            data[index + 1] = g;
                            data[index + 2] = b;
                            data[index + 3] = 255;
                        }
                    }
                }
            }

            ctx.putImageData(imageData, 0, 0);
        }

        function updateSources() {
            const centerX = width / 2;
            const centerY = height / 2;
            const radius = Math.min(width, height) * 0.25;

            for (let i = 0; i < sources.length; i++) {
                const angle = (i / sources.length) * Math.PI * 2 + time * params.rotationSpeed;
                sources[i].x = centerX + Math.cos(angle) * radius;
                sources[i].y = centerY + Math.sin(angle) * radius;
            }
        }

        function animate() {
            if (!isAnimating) return;

            updateSources();
            draw();
            time += 0.05;

            animationId = requestAnimationFrame(animate);
        }

        function toggleAnimation() {
            isAnimating = !isAnimating;
            if (isAnimating) {
                animate();
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function setColor(mode) {
            params.colorMode = mode;
        }

        function randomize() {
            params.numSources = Math.floor(Math.random() * 6) + 2;
            params.frequency = Math.random() * 10 + 3;
            params.rotationSpeed = Math.random() * 2;
            params.waveSpeed = Math.random() * 2 + 0.5;

            document.getElementById('sources').value = params.numSources;
            document.getElementById('frequency').value = params.frequency;
            document.getElementById('rotation').value = params.rotationSpeed;
            document.getElementById('speed').value = params.waveSpeed;

            updateDisplays();
            initSources();
        }

        function updateDisplays() {
            document.getElementById('sourcesValue').textContent = params.numSources;
            document.getElementById('frequencyValue').textContent = params.frequency.toFixed(1);
            document.getElementById('rotationValue').textContent = params.rotationSpeed.toFixed(1);
            document.getElementById('speedValue').textContent = params.waveSpeed.toFixed(1);
        }

        // イベントリスナー
        window.addEventListener('resize', () => {
            resize();
            initSources();
        });

        // コントロール
        document.getElementById('sources').addEventListener('input', (e) => {
            params.numSources = parseInt(e.target.value);
            updateDisplays();
            initSources();
        });

        document.getElementById('frequency').addEventListener('input', (e) => {
            params.frequency = parseFloat(e.target.value);
            updateDisplays();
        });

        document.getElementById('rotation').addEventListener('input', (e) => {
            params.rotationSpeed = parseFloat(e.target.value);
            updateDisplays();
        });

        document.getElementById('speed').addEventListener('input', (e) => {
            params.waveSpeed = parseFloat(e.target.value);
            updateDisplays();
        });

        // タッチ/クリックで波源を追加
        canvas.addEventListener('click', (e) => {
            if (sources.length < 10) {
                sources.push({
                    x: e.clientX,
                    y: e.clientY,
                    phase: Math.random() * Math.PI * 2
                });
            }
        });

        // タッチ操作
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            if (sources.length < 10) {
                sources.push({
                    x: touch.clientX,
                    y: touch.clientY,
                    phase: Math.random() * Math.PI * 2
                });
            }
        });

        // 初期化
        init();
    </script>
</body>
</html>
