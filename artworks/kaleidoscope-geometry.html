<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万華幾何学 - Kaleidoscope Geometry</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">マウス移動で回転と拡大が変わります</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let mouseX = 0, mouseY = 0;
        let rotation = 0;
        let scale = 1;
        let hue = 0;

        // 対称的な幾何学パターンの設定
        const SEGMENTS = 12;
        const LAYERS = 6;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function drawKaleidoscopeLayer(cx, cy, radius, rotation, hueOffset) {
            const angleStep = (Math.PI * 2) / SEGMENTS;

            for (let i = 0; i < SEGMENTS; i++) {
                const angle = rotation + i * angleStep;
                const nextAngle = rotation + (i + 1) * angleStep;

                const hue1 = (hue + hueOffset + i * 30) % 360;
                const hue2 = (hue + hueOffset + (i + 1) * 30) % 360;

                // 複雑な幾何学シェイプ
                ctx.beginPath();
                ctx.moveTo(cx, cy);

                // 外側のポイント
                for (let j = 0; j <= 20; j++) {
                    const t = j / 20;
                    const a = angle + (nextAngle - angle) * t;
                    const r = radius * (0.5 + 0.5 * Math.sin(t * Math.PI * 4 + rotation * 2));
                    const x = cx + Math.cos(a) * r;
                    const y = cy + Math.sin(a) * r;
                    ctx.lineTo(x, y);
                }

                ctx.closePath();

                // グラデーション
                const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
                gradient.addColorStop(0, `hsla(${hue1}, 80%, 60%, 0.1)`);
                gradient.addColorStop(0.5, `hsla(${hue2}, 80%, 50%, 0.3)`);
                gradient.addColorStop(1, `hsla(${hue1}, 80%, 40%, 0.05)`);

                ctx.fillStyle = gradient;
                ctx.fill();

                // 枠線
                ctx.strokeStyle = `hsla(${hue1}, 90%, 60%, 0.4)`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        function drawConnectingLines(cx, cy, radius, rotation) {
            const angleStep = (Math.PI * 2) / SEGMENTS;

            ctx.beginPath();
            for (let i = 0; i < SEGMENTS; i++) {
                const angle = rotation + i * angleStep;
                const x = cx + Math.cos(angle) * radius;
                const y = cy + Math.sin(angle) * radius;

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.closePath();
            ctx.strokeStyle = `hsla(${hue}, 90%, 70%, 0.2)`;
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function drawCenterPattern(cx, cy, radius) {
            const points = 8;
            const angleStep = (Math.PI * 2) / points;

            for (let i = 0; i < points; i++) {
                const angle = i * angleStep;
                const x = cx + Math.cos(angle) * radius;
                const y = cy + Math.sin(angle) * radius;

                // 小さな円
                ctx.beginPath();
                ctx.arc(x, y, radius * 0.15, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${(hue + i * 45) % 360}, 80%, 60%, 0.5)`;
                ctx.fill();

                // 中心からの線
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(x, y);
                ctx.strokeStyle = `hsla(${(hue + i * 45) % 360}, 70%, 50%, 0.3)`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        function animate() {
            // 半透明の黒でフェード
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            const cx = width / 2;
            const cy = height / 2;
            const maxRadius = Math.min(width, height) * 0.45 * scale;

            // 色相の変化
            hue += 0.5;

            // 回転の更新
            rotation += 0.002 + (mouseX / width) * 0.01;

            // 各レイヤーを描画
            for (let i = 0; i < LAYERS; i++) {
                const layerRadius = maxRadius * ((i + 1) / LAYERS);
                const layerRotation = rotation * (i % 2 === 0 ? 1 : -1) * (1 + i * 0.2);
                const hueOffset = i * 60;

                drawKaleidoscopeLayer(cx, cy, layerRadius, layerRotation, hueOffset);
                drawConnectingLines(cx, cy, layerRadius, layerRotation);
            }

            // 中心のパターン
            drawCenterPattern(cx, cy, maxRadius * 0.15);

            // グロウエフェクト
            const glowGradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxRadius);
            glowGradient.addColorStop(0, `hsla(${hue}, 80%, 50%, 0.1)`);
            glowGradient.addColorStop(0.5, `hsla(${(hue + 180) % 360}, 80%, 40%, 0.05)`);
            glowGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = glowGradient;
            ctx.fillRect(0, 0, width, height);

            requestAnimationFrame(animate);
        }

        // イベントリスナー
        window.addEventListener('resize', resize);

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            scale = 0.5 + (mouseY / height) * 1;
        });

        window.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            scale = 0.5 + (mouseY / height) * 1;
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        resize();
        animate();
    </script>
</body>
</html>
