<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>エイプリルフール・嘘発見器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 1rem;
            margin-bottom: 30px;
        }

        .input-area {
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            resize: vertical;
            min-height: 100px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .analyze-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .analyze-btn:active {
            transform: translateY(0);
        }

        .result-container {
            display: none;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-title {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 15px;
        }

        .result-badge {
            display: inline-block;
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 2rem;
            font-weight: bold;
            margin: 20px 0;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .truth {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .lie {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
        }

        .confidence {
            font-size: 1.1rem;
            color: #666;
            margin-top: 15px;
        }

        .disclaimer {
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 10px;
            font-size: 0.9rem;
            color: #856404;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: float 15s infinite;
            opacity: 0.6;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.3);
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            color: white;
            transition: background 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255,255,255,0.5);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            .result-badge {
                font-size: 1.5rem;
                padding: 15px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🎭 嘘発見器</h1>
        <p class="subtitle">エイプリルフール・スペシャル</p>

        <div class="input-area">
            <textarea id="inputText" placeholder="判定したいテキストを入力してください..."></textarea>
            <button class="analyze-btn" onclick="analyzeText()">🔍 判定する</button>
        </div>

        <div class="result-container" id="resultContainer">
            <div class="result-title">判定結果：</div>
            <div class="result-badge" id="resultBadge">---</div>
            <div class="confidence" id="confidence">信頼度: ---%</div>
            <div class="disclaimer">
                ⚠️ これはエイプリルフールの冗談です。<br>
                結果は完全にランダムです。真に受けないでください！😄
            </div>
        </div>
    </div>

    <script>
        // パーティクル生成
        function createParticles() {
            const container = document.getElementById('particles');
            const colors = ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#4facfe'];

            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                particle.style.width = (5 + Math.random() * 10) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }

        createParticles();

        // テキスト分析（完全にランダム）
        function analyzeText() {
            const input = document.getElementById('inputText').value.trim();

            if (!input) {
                alert('テキストを入力してください！');
                return;
            }

            // ランダム判定
            const isLie = Math.random() > 0.5;
            const confidence = Math.floor(Math.random() * 30) + 70; // 70-99%

            const resultContainer = document.getElementById('resultContainer');
            const resultBadge = document.getElementById('resultBadge');
            const confidenceDiv = document.getElementById('confidence');

            // 結果を設定
            resultContainer.style.display = 'block';

            if (isLie) {
                resultBadge.textContent = '🤥 嘘です！';
                resultBadge.className = 'result-badge lie';
            } else {
                resultBadge.textContent = '✨ 真実です！';
                resultBadge.className = 'result-badge truth';
            }

            confidenceDiv.textContent = `信頼度: ${confidence}%`;

            // コンフェティ効果
            createConfetti();
        }

        // コンフェティ効果
        function createConfetti() {
            const colors = ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#4facfe', '#00f2fe'];

            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.style.cssText = `
                    position: fixed;
                    width: 10px;
                    height: 10px;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                    left: 50%;
                    top: 50%;
                    border-radius: ${Math.random() > 0.5 ? '50%' : '0'};
                    pointer-events: none;
                    z-index: 1000;
                    animation: confetti-fall 2s ease-out forwards;
                `;

                const angle = Math.random() * Math.PI * 2;
                const velocity = 5 + Math.random() * 10;
                const dx = Math.cos(angle) * velocity;
                const dy = Math.sin(angle) * velocity;

                confetti.animate([
                    {
                        transform: 'translate(0, 0) rotate(0deg)',
                        opacity: 1
                    },
                    {
                        transform: `translate(${dx * 50}px, ${dy * 50 + 300}px) rotate(${720}deg)`,
                        opacity: 0
                    }
                ], {
                    duration: 2000,
                    easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
                });

                document.body.appendChild(confetti);

                setTimeout(() => confetti.remove(), 2000);
            }
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
