<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スパイラル・ガーデン | Generative Art by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        .container {
            text-align: center;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1 {
            color: #fff;
            font-size: 1.5rem;
            padding: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            letter-spacing: 0.3em;
        }

        .canvas-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        canvas {
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .info {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            padding: 20px;
            letter-spacing: 0.1em;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
        <h1>🌀 スパイラル・ガーデン</h1>
        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
        <p class="info">画面をタップして新しいガーデンを生成</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let time = 0;
        let spirals = [];
        let mouseX = 0, mouseY = 0;

        function resize() {
            const container = document.querySelector('.canvas-container');
            const maxWidth = Math.min(window.innerWidth - 40, 800);
            const maxHeight = Math.min(window.innerHeight - 200, 600);

            canvas.width = maxWidth;
            canvas.height = maxHeight;
            width = canvas.width;
            height = canvas.height;
        }

        function createSpirals() {
            spirals = [];
            const numSpirals = 5 + Math.floor(Math.random() * 5);

            for (let i = 0; i < numSpirals; i++) {
                spirals.push({
                    offsetX: (Math.random() - 0.5) * width * 0.3,
                    offsetY: (Math.random() - 0.5) * height * 0.3,
                    speed: 0.0005 + Math.random() * 0.001,
                    colorStart: Math.random() * 360,
                    colorRange: 30 + Math.random() * 60,
                    arms: 2 + Math.floor(Math.random() * 5),
                    spacing: 2 + Math.random() * 3,
                    maxPoints: 500 + Math.floor(Math.random() * 500)
                });
            }
        }

        function drawSpiral(spiral, t) {
            const centerX = width / 2 + spiral.offsetX;
            const centerY = height / 2 + spiral.offsetY;

            ctx.save();

            for (let arm = 0; arm < spiral.arms; arm++) {
                const armOffset = (arm / spiral.arms) * Math.PI * 2;
                const rotation = t * spiral.speed * 1000;

                ctx.beginPath();
                for (let i = 0; i < spiral.maxPoints; i++) {
                    const angle = i * 0.1 + armOffset + rotation;
                    const radius = i * spiral.spacing * 0.5;

                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;

                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }

                const hue = (spiral.colorStart + i * 0.1 + t * 50) % 360;
                const saturation = 70 + Math.sin(t * 2) * 20;
                const lightness = 50 + Math.sin(t * 3) * 15;

                ctx.strokeStyle = `hsla(${hue}, ${saturation}%, ${lightness}%, 0.6)`;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }

            ctx.restore();
        }

        function draw() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
            ctx.fillRect(0, 0, width, height);

            spirals.forEach(spiral => {
                drawSpiral(spiral, time);
            });

            time += 0.016;
            requestAnimationFrame(draw);
        }

        function regenerate() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, width, height);
            time = 0;
            createSpirals();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Event listeners
        window.addEventListener('resize', () => {
            resize();
            regenerate();
        });

        canvas.addEventListener('click', regenerate);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            regenerate();
        });

        // Initialize
        resize();
        createSpirals();
        draw();
    </script>
</body>
</html>
