<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>粒子の渦 - Particle Vortex</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            .fullscreen-btn {
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">🌀 粒子の渦 - Particle Vortex</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        let particles = [];
        let mouseX = 0, mouseY = 0;
        let time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.angle = Math.random() * Math.PI * 2;
                this.radius = Math.random() * 100 + 50;
                this.speed = Math.random() * 0.02 + 0.01;
                this.size = Math.random() * 3 + 1;
                this.hue = Math.random() * 60 + 180; // Blue to purple range
                this.alpha = Math.random() * 0.5 + 0.5;
                this.decay = Math.random() * 0.002 + 0.001;
            }

            update() {
                this.angle += this.speed;
                this.radius += Math.sin(time * 0.02 + this.angle) * 0.5;
                this.alpha -= this.decay;

                if (this.alpha <= 0) {
                    this.reset();
                }
            }

            draw() {
                const x = centerX + Math.cos(this.angle) * this.radius;
                const y = centerY + Math.sin(this.angle) * this.radius;

                // Create gradient
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, this.size * 2);
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 60%, ${this.alpha})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 100%, 60%, 0)`);

                ctx.beginPath();
                ctx.arc(x, y, this.size * 2, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            const particleCount = Math.min(300, Math.floor((width * height) / 5000));

            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function drawVortex() {
            // Draw connecting lines between nearby particles
            ctx.lineWidth = 0.5;

            for (let i = 0; i < particles.length; i++) {
                const p1 = particles[i];
                const x1 = centerX + Math.cos(p1.angle) * p1.radius;
                const y1 = centerY + Math.sin(p1.angle) * p1.radius;

                for (let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const x2 = centerX + Math.cos(p2.angle) * p2.radius;
                    const y2 = centerY + Math.sin(p2.angle) * p2.radius;

                    const dist = Math.hypot(x2 - x1, y2 - y1);

                    if (dist < 50) {
                        const alpha = (1 - dist / 50) * 0.3 * Math.min(p1.alpha, p2.alpha);
                        ctx.strokeStyle = `hsla(${(p1.hue + p2.hue) / 2}, 100%, 60%, ${alpha})`;
                        ctx.beginPath();
                        ctx.moveTo(x1, y1);
                        ctx.lineTo(x2, y2);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            time++;

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            drawVortex();

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', () => {
            resize();
            init();
        });

        // Initialize
        resize();
        init();
        animate();
    </script>
</body>
</html>
