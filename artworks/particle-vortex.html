<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Vortex - Interactive Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #fff;
        }

        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .subtitle {
            color: #888;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        #canvas {
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.3),
                        0 0 100px rgba(123, 44, 191, 0.2);
            background: #000;
            cursor: crosshair;
            touch-action: none;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: #fff;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            font-size: 0.9rem;
        }

        .info {
            margin-top: 15px;
            color: #666;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .subtitle {
                font-size: 0.9rem;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }

        .fullscreen-active .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .fullscreen-active h1,
        .fullscreen-active .subtitle,
        .fullscreen-active .controls,
        .fullscreen-active .info {
            display: none;
        }

        .fullscreen-active #canvas {
            height: 100vh;
            border-radius: 0;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>

    <div class="container">
        <h1>✨ Particle Vortex</h1>
        <p class="subtitle">タッチ/マウスで渦に干渉 • Interactive Generative Art</p>

        <canvas id="canvas"></canvas>

        <div class="controls">
            <button onclick="resetParticles()">🔄 リセット</button>
            <button onclick="toggleAttraction()">🌀 吸引反転</button>
            <button onclick="changeColorScheme()">🎨 色変更</button>
        </div>

        <p class="info">💡 タッチ/クリックでパーティクルを吸引 • 長押しで反発</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        let mouseX = 0;
        let mouseY = 0;
        let isMouseDown = false;
        let longPressTimer = null;
        let attractionMode = true;
        let colorScheme = 0;

        const colorSchemes = [
            [{h: 180, s: 100, l: 50}, {h: 280, s: 100, l: 60}], // Cyan to Purple
            [{h: 0, s: 100, l: 50}, {h: 60, s: 100, l: 60}],     // Red to Yellow
            [{h: 120, s: 100, l: 50}, {h: 180, s: 100, l: 60}],  // Green to Cyan
            [{h: 300, s: 100, l: 50}, {h: 360, s: 100, l: 60}]   // Pink to Red
        ];

        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 800);
            const maxHeight = Math.min(window.innerHeight - 200, 600);

            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.angle = Math.random() * Math.PI * 2;
                this.radius = Math.random() * 150 + 50;
                this.angularVelocity = (Math.random() - 0.5) * 0.02;
                this.size = Math.random() * 3 + 1;
                this.hueOffset = Math.random() * 60 - 30;
                this.alpha = Math.random() * 0.5 + 0.5;
                this.targetX = this.x;
                this.targetY = this.y;
            }

            update(time) {
                // 渦を描くように動く
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;

                // 基本の渦運動
                this.angle += this.angularVelocity;

                // 徐々に内側に
                this.radius *= 0.9995;
                if (this.radius < 10) {
                    this.radius = Math.random() * 150 + 50;
                }

                this.targetX = centerX + Math.cos(this.angle) * this.radius;
                this.targetY = centerY + Math.sin(this.angle) * this.radius;

                // マウスの影響
                if (isMouseDown) {
                    const dx = mouseX - this.x;
                    const dy = mouseY - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 200) {
                        const force = (200 - distance) / 200;
                        if (attractionMode) {
                            this.targetX += dx * force * 0.5;
                            this.targetY += dy * force * 0.5;
                        } else {
                            this.targetX -= dx * force * 0.8;
                            this.targetY -= dy * force * 0.8;
                        }
                    }
                }

                // スムーズに移動
                this.x += (this.targetX - this.x) * 0.1;
                this.y += (this.targetY - this.y) * 0.1;
            }

            draw(time) {
                const scheme = colorSchemes[colorScheme];
                const t = (Math.sin(time * 0.001 + this.hueOffset * 0.01) + 1) / 2;
                const h = scheme[0].h + (scheme[1].h - scheme[0].h) * t;
                const s = scheme[0].s;
                const l = scheme[0].l + (scheme[1].l - scheme[0].l) * t;

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${h + this.hueOffset}, ${s}%, ${l}%, ${this.alpha})`;
                ctx.fill();

                // 光る効果
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 2
                );
                gradient.addColorStop(0, `hsla(${h + this.hueOffset}, ${s}%, ${l}%, ${this.alpha * 0.3})`);
                gradient.addColorStop(1, `hsla(${h + this.hueOffset}, ${s}%, ${l}%, 0)`);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const count = Math.min(200, (canvas.width * canvas.height) / 3000);

            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        function resetParticles() {
            particles.forEach(p => p.reset());
        }

        function toggleAttraction() {
            attractionMode = !attractionMode;
        }

        function changeColorScheme() {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
        }

        function animate(time) {
            // 背景を半透明で塗ってトレイル効果
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // パーティクルを描画
            particles.forEach(particle => {
                particle.update(time);
                particle.draw(time);
            });

            // 中心の光る点
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const gradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, 50
            );
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.beginPath();
            ctx.arc(centerX, centerY, 50, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.body.requestFullscreen();
                document.body.classList.add('fullscreen-active');
            } else {
                document.exitFullscreen();
                document.body.classList.remove('fullscreen-active');
            }
        }

        // イベントリスナー
        canvas.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;

            longPressTimer = setTimeout(() => {
                attractionMode = false;
            }, 500);
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
            attractionMode = true;
            clearTimeout(longPressTimer);
        });

        canvas.addEventListener('mouseleave', () => {
            isMouseDown = false;
            attractionMode = true;
            clearTimeout(longPressTimer);
        });

        // タッチ対応
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isMouseDown = true;
            const rect = canvas.getBoundingClientRect();
            mouseX = e.touches[0].clientX - rect.left;
            mouseY = e.touches[0].clientY - rect.top;

            longPressTimer = setTimeout(() => {
                attractionMode = false;
            }, 500);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            mouseX = e.touches[0].clientX - rect.left;
            mouseY = e.touches[0].clientY - rect.top;
        });

        canvas.addEventListener('touchend', () => {
            isMouseDown = false;
            attractionMode = true;
            clearTimeout(longPressTimer);
        });

        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                document.body.classList.remove('fullscreen-active');
            }
        });

        // 初期化
        resizeCanvas();
        initParticles();
        animate(0);
    </script>
</body>
</html>
