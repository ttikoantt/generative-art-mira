<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Flow Art - Interactive Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0e27;
            color: #fff;
            overflow: hidden;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(10, 14, 39, 0.8);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(100, 200, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        .controls h1 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #64c8ff;
        }

        .controls p {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(100, 200, 255, 0.2);
            color: #64c8ff;
            border: 1px solid rgba(100, 200, 255, 0.5);
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(100, 200, 255, 0.4);
            transform: scale(1.05);
        }

        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(10, 14, 39, 0.8);
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid rgba(100, 200, 255, 0.3);
            backdrop-filter: blur(10px);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <h1>✨ Particle Flow Art</h1>
        <p>マウスを動かしてフローを作成</p>
        <p>クリックで色を変更</p>
    </div>

    <div class="stats" id="stats">
        <div>Particles: <span id="particleCount">0</span></div>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">🖥️ 全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let mouseX = width / 2;
        let mouseY = height / 2;
        let isMouseDown = false;
        let hue = 0;

        // Particles
        const particles = [];
        const maxParticles = 3000;
        const trailLength = 0.92; // Lower = longer trails

        // Flow field
        const cellSize = 20;
        let cols, rows;
        let flowField = [];

        // Initialize flow field
        function initFlowField() {
            cols = Math.ceil(width / cellSize);
            rows = Math.ceil(height / cellSize);
            flowField = new Array(cols * rows);

            for (let i = 0; i < flowField.length; i++) {
                const angle = Math.random() * Math.PI * 4 - Math.PI * 2;
                flowField[i] = angle;
            }
        }

        initFlowField();

        class Particle {
            constructor(x, y, hue) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.vx = 0;
                this.vy = 0;
                this.hue = hue || Math.random() * 360;
                this.life = 1;
                this.maxLife = 100 + Math.random() * 100;
                this.age = 0;
            }

            update() {
                // Get flow field angle
                const col = Math.floor(this.x / cellSize);
                const row = Math.floor(this.y / cellSize);
                const index = col + row * cols;

                if (index >= 0 && index < flowField.length) {
                    const angle = flowField[index];
                    this.vx += Math.cos(angle) * 0.5;
                    this.vy += Math.sin(angle) * 0.5;
                }

                // Attract to mouse
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 200) {
                    const force = (200 - dist) / 200;
                    this.vx += dx * force * 0.02;
                    this.vy += dy * force * 0.02;
                }

                // Apply velocity
                this.x += this.vx;
                this.y += this.vy;

                // Damping
                this.vx *= 0.95;
                this.vy *= 0.95;

                // Wrap around edges
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;

                // Age
                this.age++;
                this.life = 1 - (this.age / this.maxLife);
            }

            draw() {
                const alpha = this.life * 0.8;
                const size = 2;

                ctx.beginPath();
                ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${alpha})`;
                ctx.fill();

                // Glow
                ctx.beginPath();
                ctx.arc(this.x, this.y, size * 2, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${alpha * 0.3})`;
                ctx.fill();
            }

            isDead() {
                return this.age >= this.maxLife;
            }
        }

        // Add particles on mouse move
        function addParticles(x, y, count, hue) {
            for (let i = 0; i < count; i++) {
                if (particles.length < maxParticles) {
                    const offsetX = (Math.random() - 0.5) * 50;
                    const offsetY = (Math.random() - 0.5) * 50;
                    particles.push(new Particle(x + offsetX, y + offsetY, hue));
                }
            }
        }

        // Mouse events
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            if (isMouseDown || Math.random() > 0.5) {
                addParticles(mouseX, mouseY, 3, hue);
            }
        });

        canvas.addEventListener('mousedown', () => {
            isMouseDown = true;
            hue = (hue + 45) % 360;
            addParticles(mouseX, mouseY, 20, hue);
        });

        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isMouseDown = false;
        });

        // Touch events
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isMouseDown = true;
            hue = (hue + 45) % 360;
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
            addParticles(mouseX, mouseY, 20, hue);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
            addParticles(mouseX, mouseY, 3, hue);
        });

        canvas.addEventListener('touchend', () => {
            isMouseDown = false;
        });

        // Resize
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initFlowField();
        });

        // Fullscreen
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Animation loop
        function animate() {
            // Trail effect
            ctx.fillStyle = `rgba(10, 14, 39, ${1 - trailLength})`;
            ctx.fillRect(0, 0, width, height);

            // Update and draw particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();

                if (particles[i].isDead()) {
                    particles.splice(i, 1);
                }
            }

            // Update stats
            document.getElementById('particleCount').textContent = particles.length;

            // Cycle hue
            hue = (hue + 0.2) % 360;

            requestAnimationFrame(animate);
        }

        // Start
        animate();

        // Add initial particles
        addParticles(width / 2, height / 2, 100, hue);
    </script>
</body>
</html>
