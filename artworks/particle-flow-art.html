<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Flow Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        canvas {
            display: block;
            cursor: crosshair;
        }
        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
        }
        .btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        .fullscreen {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
        }
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="controls">
        <button class="btn" onclick="reset()">Reset</button>
    </div>
    <div class="fullscreen">
        <button class="btn" onclick="toggleFullscreen()">全画面</button>
    </div>
    <div class="info">
        🖱️ マウスを動かしてパーティクルを操作
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let emitters = [];
        let mouse = { x: 0, y: 0 };

        // 色のパレット
        const palettes = [
            ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3'],
            ['#00d2d3', '#54a0ff', '#5f27cd', '#ff9f43'],
            ['#ee5a6f', '#f2a365', '#ffcdb2', '#b5838d'],
            ['#2ec4b6', '#20a4f3', '#6c5ce7', '#fd79a8'],
        ];

        let currentPalette = palettes[Math.floor(Math.random() * palettes.length)];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 4 + 2;
                this.speedX = (Math.random() - 0.5) * 3;
                this.speedY = (Math.random() - 0.5) * 3;
                this.life = 1;
                this.decay = Math.random() * 0.005 + 0.002;
                this.angle = Math.random() * Math.PI * 2;
                this.spin = (Math.random() - 0.5) * 0.1;
            }

            update() {
                // マウスの影響
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 150) {
                    const force = (150 - dist) / 150;
                    this.angle += force * 0.1;
                    this.speedX -= (dx / dist) * force * 0.5;
                    this.speedY -= (dy / dist) * force * 0.5;
                }

                this.angle += this.spin;
                this.x += Math.cos(this.angle) * Math.abs(this.speedX) + this.speedX * 0.5;
                this.y += Math.sin(this.angle) * Math.abs(this.speedY) + this.speedY * 0.5;

                this.speedX *= 0.99;
                this.speedY *= 0.99;

                this.life -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;

                ctx.beginPath();
                ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        class Emitter {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.color = currentPalette[Math.floor(Math.random() * currentPalette.length)];
                this.angle = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
            }

            update() {
                this.angle += this.rotationSpeed;

                // パーティクルを放出
                for (let i = 0; i < 2; i++) {
                    const offsetX = Math.cos(this.angle) * 30;
                    const offsetY = Math.sin(this.angle) * 30;
                    particles.push(new Particle(this.x + offsetX, this.y + offsetY, this.color));
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                // グロー効果
                ctx.shadowBlur = 30;
                ctx.shadowColor = this.color;

                // 円形のエミッター
                ctx.globalAlpha = 0.8;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(0, 0, 8, 0, Math.PI * 2);
                ctx.fill();

                // 回転するリング
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.globalAlpha = 0.4;
                ctx.beginPath();
                ctx.arc(0, 0, 15, this.angle, this.angle + Math.PI);
                ctx.stroke();

                ctx.restore();
            }
        }

        function init() {
            particles = [];
            emitters = [];

            // 複数のエミッターを配置
            const numEmitters = 4 + Math.floor(Math.random() * 3);
            for (let i = 0; i < numEmitters; i++) {
                const x = width * 0.2 + (width * 0.6 / (numEmitters - 1)) * i;
                const y = height * 0.3 + Math.random() * height * 0.4;
                emitters.push(new Emitter(x, y));
            }
        }

        function reset() {
            currentPalette = palettes[Math.floor(Math.random() * palettes.length)];
            init();
        }

        function animate() {
            // トレイル効果
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // エミッター更新
            emitters.forEach(emitter => {
                emitter.update();
                emitter.draw();
            });

            // パーティクル更新
            particles = particles.filter(p => p.life > 0);
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // パーティクル数制限
            if (particles.length > 2000) {
                particles = particles.slice(-2000);
            }

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        // 初期化
        resize();
        mouse.x = width / 2;
        mouse.y = height / 2;
        init();
        animate();
    </script>
</body>
</html>
