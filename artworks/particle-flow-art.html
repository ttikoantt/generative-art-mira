<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Flow Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff;
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: clamp(24px, 5vw, 48px);
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4, #45b7d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .description {
            font-size: clamp(14px, 2.5vw, 18px);
            color: #aaa;
            margin-bottom: 20px;
        }

        #canvas {
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            background: #0a0a0a;
            touch-action: none;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4);
        }

        .fullscreen-btn:hover {
            box-shadow: 0 6px 20px rgba(240, 147, 251, 0.6);
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ccc;
            font-size: 14px;
        }

        input[type="range"] {
            width: 120px;
            height: 6px;
            border-radius: 3px;
            background: #333;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(102, 126, 234, 0.5);
        }

        .info {
            margin-top: 15px;
            font-size: 12px;
            color: #888;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            button {
                padding: 10px 20px;
                font-size: 14px;
            }

            .slider-group {
                font-size: 12px;
            }

            input[type="range"] {
                width: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌊 Particle Flow Art</h1>
        <p class="description">美しい粒子の流れを楽しむジェネレーティブアート</p>

        <canvas id="canvas"></canvas>

        <div class="controls">
            <button onclick="reset()">🔄 リセット</button>
            <button onclick="togglePause()">⏯️ 一時停止</button>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">📺 全画面</button>

            <div class="slider-group">
                <label>粒子数:</label>
                <input type="range" id="particleCount" min="100" max="500" value="200" onchange="updateParticleCount()">
            </div>

            <div class="slider-group">
                <label>速度:</label>
                <input type="range" id="speed" min="1" max="10" value="5" onchange="updateSpeed()">
            </div>
        </div>

        <p class="info">💡 タッチ・ドラッグで流れを誘導できます</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        let mouse = { x: null, y: null };
        let isPaused = false;
        let particleCount = 200;
        let baseSpeed = 5;

        // キャンバスサイズ設定
        function resizeCanvas() {
            const container = document.querySelector('.container');
            const maxWidth = Math.min(window.innerWidth - 40, 1200);
            const maxHeight = Math.min(window.innerHeight - 300, 600);
            
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }

        // パーティクルクラス
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.baseX = this.x;
                this.baseY = this.y;
                this.density = Math.random() * 30 + 1;
                this.hue = Math.random() * 60 + 180; // 青～紫系
                this.life = Math.random() * 100 + 100;
                this.maxLife = this.life;
            }

            update() {
                this.life--;
                
                if (this.life <= 0) {
                    this.reset();
                }

                // マウスの影響
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                let maxDistance = 150;
                let force = (maxDistance - distance) / maxDistance;
                let directionX = forceDirectionX * force * this.density;
                let directionY = forceDirectionY * force * this.density;

                if (distance < maxDistance && mouse.x !== null) {
                    this.x -= directionX;
                    this.y -= directionY;
                } else {
                    // 自然な動き
                    if (this.x !== this.baseX) {
                        let dx = this.x - this.baseX;
                        this.x -= dx / 20;
                    }
                    if (this.y !== this.baseY) {
                        let dy = this.y - this.baseY;
                        this.y -= dy / 20;
                    }
                }

                // 流れるような動き
                this.baseX += Math.sin(this.y * 0.01 + Date.now() * 0.001) * baseSpeed * 0.3;
                this.baseY += Math.cos(this.x * 0.01 + Date.now() * 0.001) * baseSpeed * 0.2;

                // 画面外に出たらリセット
                if (this.x < -50 || this.x > canvas.width + 50 || 
                    this.y < -50 || this.y > canvas.height + 50) {
                    this.reset();
                }
            }

            draw() {
                const alpha = (this.life / this.maxLife) * 0.8;
                ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 初期化
        function init() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        // アニメーション
        function animate() {
            if (!isPaused) {
                ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                particles.forEach(particle => {
                    particle.update();
                    particle.draw();
                });
            }
            
            requestAnimationFrame(animate);
        }

        // イベントリスナー
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            mouse.x = touch.clientX - rect.left;
            mouse.y = touch.clientY - rect.top;
        }, { passive: false });

        canvas.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        canvas.addEventListener('touchend', () => {
            mouse.x = null;
            mouse.y = null;
        });

        window.addEventListener('resize', () => {
            resizeCanvas();
            init();
        });

        // コントロール関数
        function reset() {
            init();
        }

        function togglePause() {
            isPaused = !isPaused;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                canvas.requestFullscreen().catch(err => {
                    alert('全画面表示に対応していません');
                });
            } else {
                document.exitFullscreen();
            }
        }

        function updateParticleCount() {
            particleCount = parseInt(document.getElementById('particleCount').value);
            init();
        }

        function updateSpeed() {
            baseSpeed = parseInt(document.getElementById('speed').value);
        }

        // 開始
        resizeCanvas();
        init();
        animate();
    </script>
</body>
</html>
