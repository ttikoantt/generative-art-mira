<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Flow Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        #canvas {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: crosshair;
            box-shadow: 0 0 30px rgba(100, 200, 255, 0.2);
        }

        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            pointer-events: none;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls button {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .controls button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .controls button:active {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                top: 10px;
                left: 10px;
            }

            .controls {
                bottom: 10px;
                padding: 0 10px;
            }

            .controls button {
                padding: 10px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="info">
        <div>🎨 Particle Flow Art #859</div>
        <div>マウス/タッチで粒子を誘導</div>
    </div>

    <canvas id="canvas"></canvas>

    <div class="controls">
        <button onclick="changeMode('flow')">フロー</button>
        <button onclick="changeMode('explode')">爆発</button>
        <button onclick="changeMode('vortex')">渦</button>
        <button onclick="resetParticles()">リセット</button>
        <button onclick="toggleFullscreen()">全画面</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Canvas size
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 800);
            const maxHeight = Math.min(window.innerHeight - 160, 600);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Particles
        let particles = [];
        const NUM_PARTICLES = 300;
        let mode = 'flow';

        // Mouse position
        let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
        let isMouseDown = false;

        // Colors
        const colorPalettes = [
            ['#00d4ff', '#0099ff', '#0066ff', '#0033ff'],
            ['#ff006e', '#ff0080', '#ff0099', '#ff00b3'],
            ['#00ff87', '#00ff99', '#00ffbb', '#00ffdd'],
            ['#ffcc00', '#ffdd00', '#ffee00', '#ffff00'],
            ['#ff00ff', '#cc00ff', '#9900ff', '#6600ff']
        ];
        let currentPalette = 0;

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.size = Math.random() * 4 + 1;
                this.color = colorPalettes[currentPalette][Math.floor(Math.random() * 4)];
                this.alpha = Math.random() * 0.5 + 0.5;
                this.life = Math.random() * 100 + 100;
            }

            update() {
                // Apply mode-specific behavior
                switch(mode) {
                    case 'flow':
                        this.flowMode();
                        break;
                    case 'explode':
                        this.explodeMode();
                        break;
                    case 'vortex':
                        this.vortexMode();
                        break;
                }

                // Apply velocity
                this.x += this.vx;
                this.y += this.vy;

                // Friction
                this.vx *= 0.98;
                this.vy *= 0.98;

                // Boundary wrap
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;

                // Decrease life
                this.life--;

                // Reset if dead
                if (this.life <= 0) {
                    this.reset();
                }
            }

            flowMode() {
                if (isMouseDown) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 200) {
                        const force = (200 - dist) / 200;
                        this.vx += (dx / dist) * force * 0.5;
                        this.vy += (dy / dist) * force * 0.5;
                    }
                }
            }

            explodeMode() {
                if (isMouseDown) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        const force = (150 - dist) / 150;
                        this.vx -= (dx / dist) * force * 2;
                        this.vy -= (dy / dist) * force * 2;
                    }
                }
            }

            vortexMode() {
                if (isMouseDown) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 250 && dist > 20) {
                        const angle = Math.atan2(dy, dx);
                        const tangentAngle = angle + Math.PI / 2;
                        const force = (250 - dist) / 250;
                        this.vx += Math.cos(tangentAngle) * force * 0.8;
                        this.vy += Math.sin(tangentAngle) * force * 0.8;
                        // Slight attraction
                        this.vx += Math.cos(angle) * force * 0.2;
                        this.vy += Math.sin(angle) * force * 0.2;
                    }
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // Initialize particles
        function initParticles() {
            particles = [];
            for (let i = 0; i < NUM_PARTICLES; i++) {
                particles.push(new Particle());
            }
        }
        initParticles();

        // Animation loop
        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(15, 15, 30, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update and draw particles
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            requestAnimationFrame(animate);
        }
        animate();

        // Mouse events
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        canvas.addEventListener('mousedown', () => isMouseDown = true);
        canvas.addEventListener('mouseup', () => isMouseDown = false);
        canvas.addEventListener('mouseleave', () => isMouseDown = false);

        // Touch events
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isMouseDown = true;
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.touches[0].clientX - rect.left;
            mouse.y = e.touches[0].clientY - rect.top;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.touches[0].clientX - rect.left;
            mouse.y = e.touches[0].clientY - rect.top;
        });

        canvas.addEventListener('touchend', () => isMouseDown = false);

        // Control functions
        function changeMode(newMode) {
            mode = newMode;
        }

        function resetParticles() {
            currentPalette = (currentPalette + 1) % colorPalettes.length;
            particles.forEach(p => {
                p.reset();
                p.color = colorPalettes[currentPalette][Math.floor(Math.random() * 4)];
            });
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Auto-change palette occasionally
        setInterval(() => {
            if (!isMouseDown) {
                particles.forEach(p => {
                    if (Math.random() < 0.1) {
                        p.color = colorPalettes[currentPalette][Math.floor(Math.random() * 4)];
                    }
                });
            }
        }, 2000);
    </script>
</body>
</html>
