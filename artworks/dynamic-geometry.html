<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Geometry Art | 動的幾何学アート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 255, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 24px;
            font-weight: 300;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0, 255, 255, 0.5);
            z-index: 100;
            opacity: 0.9;
        }

        .info {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            text-align: center;
            z-index: 100;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 18px;
            }
            .btn {
                padding: 10px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="title">✨ Dynamic Geometry Art</div>
    <div class="info">クリック/タップで図形を追加</div>

    <canvas id="canvas"></canvas>

    <div class="controls">
        <button class="btn" onclick="changePattern()">パターン変更</button>
        <button class="btn" onclick="clearCanvas()">クリア</button>
        <button class="btn" onclick="toggleAnimation()">アニメーション切替</button>
        <button class="btn" onclick="changeColorScheme()">配色変更</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let shapes = [];
        let animationEnabled = true;
        let currentPattern = 0;
        let currentColorScheme = 0;
        let mouse = { x: width / 2, y: height / 2 };

        const patterns = [
            { name: 'concentric', draw: drawConcentric },
            { name: 'spiral', draw: drawSpiral },
            { name: 'fractal', draw: drawFractal },
            { name: 'wave', draw: drawWave },
            { name: 'radial', draw: drawRadial }
        ];

        const colorSchemes = [
            ['#00ffff', '#ff00ff', '#ffff00', '#00ff00'],
            ['#ff6b6b', '#4ecdc4', '#45b7d1', '#f9ca24'],
            ['#e74c3c', '#9b59b6', '#3498db', '#1abc9c'],
            ['#ff9ff3', '#feca57', '#ff6b6b', '#48dbfb'],
            ['#ffffff', '#00d2d3', '#ff9f43', '#ee5a6f']
        ];

        class Shape {
            constructor(x, y, pattern, colors) {
                this.x = x;
                this.y = y;
                this.pattern = pattern;
                this.colors = colors;
                this.size = 0;
                this.maxSize = 200 + Math.random() * 100;
                this.growthRate = 2 + Math.random() * 2;
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                this.opacity = 1;
                this.life = 1;
                this.decay = 0.001 + Math.random() * 0.002;
            }

            update() {
                if (this.size < this.maxSize) {
                    this.size += this.growthRate;
                }
                this.rotation += this.rotationSpeed;
                this.life -= this.decay;
                this.opacity = this.life;
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.opacity;

                this.pattern.draw(ctx, this.size, this.colors);

                ctx.restore();
            }

            isDead() {
                return this.life <= 0;
            }
        }

        function drawConcentric(ctx, size, colors) {
            const rings = 8;
            for (let i = rings; i > 0; i--) {
                ctx.beginPath();
                const radius = (size / rings) * i;
                ctx.arc(0, 0, radius, 0, Math.PI * 2);
                ctx.strokeStyle = colors[i % colors.length];
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        function drawSpiral(ctx, size, colors) {
            ctx.beginPath();
            const turns = 5;
            const points = 500;
            for (let i = 0; i < points; i++) {
                const angle = (i / points) * Math.PI * 2 * turns;
                const radius = (i / points) * size;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.strokeStyle = colors[0];
            ctx.lineWidth = 2;
            ctx.stroke();

            for (let i = 1; i < colors.length; i++) {
                ctx.beginPath();
                ctx.arc(0, 0, size * (i / colors.length), 0, Math.PI * 2);
                ctx.strokeStyle = colors[i];
                ctx.globalAlpha = 0.3;
                ctx.stroke();
            }
        }

        function drawFractal(ctx, size, colors) {
            const levels = 4;
            drawFractalBranch(ctx, size, 0, 0, levels, colors);
        }

        function drawFractalBranch(ctx, size, x, y, level, colors) {
            if (level === 0) return;

            const branches = 6;
            const angleStep = (Math.PI * 2) / branches;

            for (let i = 0; i < branches; i++) {
                const angle = angleStep * i;
                const endX = x + Math.cos(angle) * size;
                const endY = y + Math.sin(angle) * size;

                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = colors[level % colors.length];
                ctx.lineWidth = level;
                ctx.stroke();

                drawFractalBranch(ctx, size * 0.5, endX, endY, level - 1, colors);
            }
        }

        function drawWave(ctx, size, colors) {
            const waves = 5;
            for (let w = 0; w < waves; w++) {
                ctx.beginPath();
                const amplitude = size * (1 - w / waves);
                const frequency = 3 + w;

                for (let i = 0; i <= 360; i++) {
                    const angle = (i * Math.PI) / 180;
                    const r = amplitude + Math.sin(angle * frequency) * (size * 0.2);
                    const x = Math.cos(angle) * r;
                    const y = Math.sin(angle) * r;

                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.closePath();
                ctx.strokeStyle = colors[w % colors.length];
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        function drawRadial(ctx, size, colors) {
            const segments = 12;
            for (let i = 0; i < segments; i++) {
                const angle = (Math.PI * 2 / segments) * i;

                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(Math.cos(angle) * size, Math.sin(angle) * size);
                ctx.strokeStyle = colors[i % colors.length];
                ctx.lineWidth = 3;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(Math.cos(angle) * size * 0.7, Math.sin(angle) * size * 0.7, 10, 0, Math.PI * 2);
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
            }
        }

        function createShape(x, y) {
            const pattern = patterns[currentPattern];
            const colors = colorSchemes[currentColorScheme];
            shapes.push(new Shape(x, y, pattern, colors));
        }

        function animate() {
            if (!animationEnabled) return;

            ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
            ctx.fillRect(0, 0, width, height);

            shapes = shapes.filter(shape => !shape.isDead());
            shapes.forEach(shape => {
                shape.update();
                shape.draw(ctx);
            });

            requestAnimationFrame(animate);
        }

        function changePattern() {
            currentPattern = (currentPattern + 1) % patterns.length;
        }

        function clearCanvas() {
            shapes = [];
            ctx.fillStyle = 'rgba(10, 10, 10, 1)';
            ctx.fillRect(0, 0, width, height);
        }

        function toggleAnimation() {
            animationEnabled = !animationEnabled;
            if (animationEnabled) {
                animate();
            }
        }

        function changeColorScheme() {
            currentColorScheme = (currentColorScheme + 1) % colorSchemes.length;
        }

        canvas.addEventListener('click', (e) => {
            createShape(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createShape(touch.clientX, touch.clientY);
        });

        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // 初期図形を作成
        createShape(width / 2, height / 2);
        animate();

        // 全画面表示ボタン
        document.addEventListener('keydown', (e) => {
            if (e.key === 'f' || e.key === 'F') {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    document.exitFullscreen();
                }
            }
        });
    </script>
</body>
</html>
