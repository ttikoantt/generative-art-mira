<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Swirl | Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        canvas {
            display: block;
            touch-action: none;
        }
        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            pointer-events: none;
        }
        .fullscreen-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .fullscreen-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">
        <h2>🌌 Nebula Swirl</h2>
        <p>Touch/click to attract particles</p>
    </div>
    <button class="fullscreen-btn" id="fullscreen">全画面表示</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreen');

        let width, height, centerX, centerY;
        let mouseX, mouseY;
        let particles = [];
        let hue = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * Math.min(width, height) * 0.5 + 100;
                this.x = centerX + Math.cos(angle) * distance;
                this.y = centerY + Math.sin(angle) * distance;
                this.size = Math.random() * 3 + 1;
                this.speed = Math.random() * 0.5 + 0.3;
                this.angle = angle;
                this.spiralSpeed = (Math.random() - 0.5) * 0.02;
                this.hueOffset = Math.random() * 60;
                this.alpha = Math.random() * 0.5 + 0.5;
                this.trail = [];
                this.trailLength = Math.floor(Math.random() * 20) + 10;
            }

            update() {
                // 目標点（マウスまたは中心）
                const targetX = mouseX !== undefined ? mouseX : centerX;
                const targetY = mouseY !== undefined ? mouseY : centerY;

                // 中心への距離
                const dx = targetX - this.x;
                const dy = targetY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                // 渦を巻きながら中心に向かう
                this.angle += this.spiralSpeed;
                this.x += Math.cos(this.angle) * this.speed + dx * 0.01;
                this.y += Math.sin(this.angle) * this.speed + dy * 0.01;

                // トレイルに追加
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.trailLength) {
                    this.trail.shift();
                }

                // 中心に近すぎたらリセット
                if (dist < 10) {
                    this.reset();
                }
            }

            draw() {
                // トレイルを描画
                if (this.trail.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length; i++) {
                        ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                    const trailHue = (hue + this.hueOffset) % 360;
                    ctx.strokeStyle = `hsla(${trailHue}, 70%, 60%, ${this.alpha * 0.3})`;
                    ctx.lineWidth = this.size * 0.5;
                    ctx.stroke();
                }

                // 粒子を描画
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                const particleHue = (hue + this.hueOffset) % 360;
                ctx.fillStyle = `hsla(${particleHue}, 80%, 60%, ${this.alpha})`;
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            const particleCount = Math.min(300, Math.floor((width * height) / 3000));
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            // フェード効果
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            hue += 0.3;
            requestAnimationFrame(animate);
        }

        // マウス/タッチイベント
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            mouseX = undefined;
            mouseY = undefined;
        });

        canvas.addEventListener('mouseleave', () => {
            mouseX = undefined;
            mouseY = undefined;
        });

        // 全画面
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        window.addEventListener('resize', () => {
            resize();
            init();
        });

        // 初期化
        resize();
        init();
        animate();
    </script>
</body>
</html>
