<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光の渦 - Light Vortex</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
        }

        .info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">光の粒子が渦を巻く - Light Vortex</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        let particles = [];
        let time = 0;

        // パラメータ
        const PARTICLE_COUNT = 800;
        const VORTEX_ARMS = 5;
        const VORTEX_TURNS = 3;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.t = Math.random() * Math.PI * 2 * VORTEX_TURNS;
                this.arm = Math.floor(Math.random() * VORTEX_ARMS);
                this.speed = 0.002 + Math.random() * 0.003;
                this.radius = Math.random() * 3 + 1;
                this.baseHue = Math.random() * 60 + 180; // 青〜紫
                this.life = Math.random();
                this.maxLife = 0.5 + Math.random() * 0.5;
            }

            update() {
                this.t += this.speed;
                this.life += 0.01;

                if (this.life > this.maxLife) {
                    this.reset();
                }
            }

            draw() {
                // 渦の形
                const armAngle = (this.arm / VORTEX_ARMS) * Math.PI * 2;
                const r = (this.t / (Math.PI * 2 * VORTEX_TURNS)) * Math.min(width, height) * 0.45;
                const angle = this.t + armAngle + time * 0.2;

                const x = centerX + Math.cos(angle) * r;
                const y = centerY + Math.sin(angle) * r;

                // 明度変化
                const alpha = Math.sin(this.life / this.maxLife * Math.PI) * 0.8;
                const hue = this.baseHue + Math.sin(time * 0.5 + this.t) * 30;

                ctx.beginPath();
                ctx.arc(x, y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue}, 100%, 70%, ${alpha})`;
                ctx.fill();

                // 光る効果
                ctx.beginPath();
                ctx.arc(x, y, this.radius * 2, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue}, 100%, 50%, ${alpha * 0.3})`;
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            // フェード効果
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            time += 0.01;

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', resize);
        resize();
        init();
        animate();
    </script>
</body>
</html>
