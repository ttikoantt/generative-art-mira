<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Wave Particles - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            z-index: 100;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">Wave Particles by Mira | Touch or move mouse to create ripples</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        let mouseX = 0, mouseY = 0;
        let isMouseDown = false;

        const particles = [];
        const ripples = [];

        // Resize
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }
        resize();
        window.addEventListener('resize', resize);

        // Particle class
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.life = 1;
                this.decay = 0.002 + Math.random() * 0.003;
                this.size = 2 + Math.random() * 3;
                this.hue = Math.random() * 60 + 180; // Blue-cyan
            }

            update() {
                // Follow ripples
                for (let ripple of ripples) {
                    const dx = this.x - ripple.x;
                    const dy = this.y - ripple.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const waveHeight = Math.sin(dist * 0.05 - ripple.age * 0.1) * ripple.strength;

                    if (dist < ripple.radius) {
                        const angle = Math.atan2(dy, dx);
                        this.vx += Math.cos(angle) * waveHeight * 0.1;
                        this.vy += Math.sin(angle) * waveHeight * 0.1;
                    }
                }

                // Friction
                this.vx *= 0.98;
                this.vy *= 0.98;

                // Update position
                this.x += this.vx;
                this.y += this.vy;

                // Update life
                this.life -= this.decay;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${this.life * 0.6})`;
                ctx.fill();
            }
        }

        // Ripple class
        class Ripple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = 200 + Math.random() * 100;
                this.strength = 15;
                this.age = 0;
                this.life = 1;
            }

            update() {
                this.radius += 3;
                this.strength *= 0.98;
                this.age++;
                this.life = 1 - (this.radius / this.maxRadius);
            }

            draw() {
                if (this.life <= 0) return;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(100, 200, 255, ${this.life * 0.3})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        // Initialize particles
        function initParticles() {
            const count = Math.min(300, (width * height) / 3000);
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(
                    Math.random() * width,
                    Math.random() * height
                ));
            }
        }

        // Create ripple on click/touch
        function createRipple(x, y) {
            ripples.push(new Ripple(x, y));
            // Limit ripples
            if (ripples.length > 10) {
                ripples.shift();
            }
        }

        // Event listeners
        canvas.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            createRipple(e.clientX, e.clientY);
        });

        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            if (isMouseDown && Math.random() > 0.8) {
                createRipple(mouseX, mouseY);
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createRipple(touch.clientX, touch.clientY);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            if (Math.random() > 0.8) {
                createRipple(touch.clientX, touch.clientY);
            }
        });

        // Fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Animation loop
        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // Update and draw ripples
            for (let i = ripples.length - 1; i >= 0; i--) {
                ripples[i].update();
                ripples[i].draw();
                if (ripples[i].life <= 0) {
                    ripples.splice(i, 1);
                }
            }

            // Update and draw particles
            for (let particle of particles) {
                particle.update();
                particle.draw();
            }

            // Draw connections
            ctx.strokeStyle = 'rgba(100, 200, 255, 0.05)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < particles.length; i += 5) {
                for (let j = i + 1; j < particles.length; j += 10) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 80) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        initParticles();
        animate();
    </script>
</body>
</html>
