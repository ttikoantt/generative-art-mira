<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Fractal Dreams</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
            cursor: move;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .controls button {
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid rgba(0, 255, 255, 0.5);
            color: #0ff;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            transition: all 0.3s;
        }

        .controls button:hover {
            background: rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(0, 255, 255, 0.7);
            font-size: 11px;
            z-index: 100;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid rgba(0, 255, 255, 0.5);
            color: #0ff;
            padding: 8px 15px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            z-index: 100;
        }

        @media (max-width: 768px) {
            .info {
                font-size: 9px;
                top: 10px;
                left: 10px;
            }

            .controls {
                bottom: 10px;
                gap: 5px;
            }

            .controls button {
                padding: 8px 12px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <div>Neon Fractal Dreams #72</div>
        <div>Drag to rotate • Scroll to zoom</div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <div class="controls">
        <button onclick="changePattern()">Change Pattern</button>
        <button onclick="toggleAnimation()">Pause/Play</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let centerX, centerY;
        let isAnimating = true;
        let currentPattern = 0;
        let time = 0;

        // 交互操作
        let isDragging = false;
        let lastX, lastY;
        let rotationX = 0;
        let rotationY = 0;
        let scale = 1;

        // ネオンカラーパレット
        const neonColors = [
            { main: '#ff00ff', glow: '#ff00ff' },
            { main: '#00ffff', glow: '#00ffff' },
            { main: '#00ff00', glow: '#00ff00' },
            { main: '#ffff00', glow: '#ffff00' },
            { main: '#ff0080', glow: '#ff0080' },
            { main: '#80ff00', glow: '#80ff00' },
            { main: '#0080ff', glow: '#0080ff' }
        ];

        // パターン定義
        const patterns = [
            drawTreeFractal,
            drawSierpinski,
            drawKoch,
            drawBarnsley,
            drawMandelbrot
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        function drawTreeFractal(x, y, length, angle, depth) {
            if (depth === 0 || length < 2) return;

            const color = neonColors[depth % neonColors.length];
            const endX = x + Math.cos(angle) * length;
            const endY = y + Math.sin(angle) * length;

            // ネオン効果
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = color.main;
            ctx.lineWidth = depth * 0.5;
            ctx.shadowBlur = 15;
            ctx.shadowColor = color.glow;
            ctx.stroke();

            // 再帰的に分岐
            const timeOffset = Math.sin(time * 0.02 + depth * 0.5) * 0.3;
            const newLength = length * 0.7;

            drawTreeFractal(endX, endY, newLength, angle - 0.5 + timeOffset, depth - 1);
            drawTreeFractal(endX, endY, newLength, angle + 0.5 + timeOffset, depth - 1);
        }

        function drawSierpinski(x, y, size, depth) {
            if (depth === 0) {
                const color = neonColors[Math.floor(Math.random() * neonColors.length)];
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x + size, y);
                ctx.lineTo(x + size / 2, y - size * 0.866);
                ctx.closePath();
                ctx.fillStyle = color.main;
                ctx.shadowBlur = 20;
                ctx.shadowColor = color.glow;
                ctx.fill();
                return;
            }

            const newSize = size / 2;
            const timeOffset = Math.sin(time * 0.01 + depth) * 10;

            drawSierpinski(x, y, newSize, depth - 1);
            drawSierpinski(x + newSize, y, newSize, depth - 1);
            drawSierpinski(x + newSize / 2, y - newSize * 0.866 + timeOffset, newSize, depth - 1);
        }

        function drawKoch(x, y, size, angle, depth) {
            if (depth === 0) {
                const color = neonColors[Math.floor(Math.random() * neonColors.length)];
                const endX = x + Math.cos(angle) * size;
                const endY = y + Math.sin(angle) * size;

                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = color.main;
                ctx.lineWidth = 1;
                ctx.shadowBlur = 10;
                ctx.shadowColor = color.glow;
                ctx.stroke();
                return;
            }

            const newSize = size / 3;
            const timeOffset = Math.sin(time * 0.02 + depth) * 0.1;

            drawKoch(x, y, newSize, angle, depth - 1);
            drawKoch(
                x + Math.cos(angle) * newSize,
                y + Math.sin(angle) * newSize,
                newSize,
                angle - Math.PI / 3 + timeOffset,
                depth - 1
            );
            drawKoch(
                x + Math.cos(angle) * newSize * 1.5 + Math.cos(angle - Math.PI / 3) * newSize * 0.5,
                y + Math.sin(angle) * newSize * 1.5 + Math.sin(angle - Math.PI / 3) * newSize * 0.5,
                newSize,
                angle + Math.PI / 3 + timeOffset,
                depth - 1
            );
            drawKoch(
                x + Math.cos(angle) * newSize * 2,
                y + Math.sin(angle) * newSize * 2,
                newSize,
                angle,
                depth - 1
            );
        }

        function drawBarnsley() {
            const iterations = 50000;
            let x = 0, y = 0;

            for (let i = 0; i < iterations; i++) {
                const nextX = Math.random();
                let newX, newY;

                if (nextX < 0.01) {
                    newX = 0;
                    newY = 0.16 * y;
                } else if (nextX < 0.86) {
                    newX = 0.85 * x + 0.04 * y;
                    newY = -0.04 * x + 0.85 * y + 1.6;
                } else if (nextX < 0.93) {
                    newX = 0.2 * x - 0.26 * y;
                    newY = 0.23 * x + 0.22 * y + 1.6;
                } else {
                    newX = -0.15 * x + 0.28 * y;
                    newY = 0.26 * x + 0.24 * y + 0.44;
                }

                x = newX;
                y = newY;

                const screenX = centerX + (x * 60 - 30) * Math.min(width, height) / 200;
                const screenY = height - (centerY - 100 + y * 60 * Math.min(width, height) / 200);

                const colorIndex = Math.floor((i / iterations) * neonColors.length);
                const color = neonColors[colorIndex % neonColors.length];

                ctx.beginPath();
                ctx.arc(screenX, screenY, 1, 0, Math.PI * 2);
                ctx.fillStyle = color.main;
                ctx.shadowBlur = 5;
                ctx.shadowColor = color.glow;
                ctx.fill();
            }
        }

        function drawMandelbrot() {
            const maxIterations = 100;
            const zoom = 150 + Math.sin(time * 0.01) * 50;

            for (let px = 0; px < width; px += 3) {
                for (let py = 0; py < height; py += 3) {
                    const x0 = (px - width / 2) / zoom - 0.5;
                    const y0 = (py - height / 2) / zoom;

                    let x = 0, y = 0;
                    let iteration = 0;

                    while (x * x + y * y <= 4 && iteration < maxIterations) {
                        const xtemp = x * x - y * y + x0;
                        y = 2 * x * y + y0;
                        x = xtemp;
                        iteration++;
                    }

                    if (iteration < maxIterations) {
                        const color = neonColors[iteration % neonColors.length];
                        ctx.beginPath();
                        ctx.rect(px, py, 3, 3);
                        ctx.fillStyle = color.main;
                        ctx.shadowBlur = 3;
                        ctx.shadowColor = color.glow;
                        ctx.fill();
                    }
                }
            }
        }

        function draw() {
            // 半透明の黒で上書き（トレイル効果）
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(rotationX * 0.01);
            ctx.scale(scale, scale);
            ctx.translate(-centerX, -centerY);

            // 現在のパターンを描画
            const pattern = patterns[currentPattern];

            if (currentPattern === 0) {
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2 + time * 0.005;
                    drawTreeFractal(centerX, centerY, 100 + Math.sin(time * 0.02 + i) * 20, angle, 8);
                }
            } else if (currentPattern === 1) {
                const size = Math.min(width, height) * 0.7;
                drawSierpinski(centerX - size / 2, centerY + size / 3, size, 6);
            } else if (currentPattern === 2) {
                const size = Math.min(width, height) * 0.4;
                for (let i = 0; i < 3; i++) {
                    const angle = (i / 3) * Math.PI * 2;
                    drawKoch(
                        centerX + Math.cos(angle) * size,
                        centerY + Math.sin(angle) * size,
                        size,
                        angle + Math.PI,
                        4
                    );
                }
            } else if (currentPattern === 3) {
                drawBarnsley();
            } else if (currentPattern === 4) {
                drawMandelbrot();
            }

            ctx.restore();

            time++;
        }

        function animate() {
            if (isAnimating) {
                draw();
            }
            requestAnimationFrame(animate);
        }

        function changePattern() {
            currentPattern = (currentPattern + 1) % patterns.length;
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
        }

        function toggleAnimation() {
            isAnimating = !isAnimating;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 交互操作
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                rotationX += e.clientX - lastX;
                rotationY += e.clientY - lastY;
                lastX = e.clientX;
                lastY = e.clientY;
            }
        });

        canvas.addEventListener('mouseup', () => {
            isDragging = false;
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            scale += e.deltaY * -0.001;
            scale = Math.max(0.5, Math.min(3, scale));
        });

        // タッチ操作
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isDragging && e.touches.length === 1) {
                rotationX += e.touches[0].clientX - lastX;
                rotationY += e.touches[0].clientY - lastY;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            }
        });

        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });

        window.addEventListener('resize', resize);

        // 初期化
        resize();
        animate();
    </script>
</body>
</html>
