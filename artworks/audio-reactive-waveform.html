<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Audio Reactive Waveform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }
        
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #fff;
            font-size: 12px;
            z-index: 100;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
            pointer-events: none;
        }
        
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 255, 0.2);
            color: #0ff;
            border: 2px solid #0ff;
            padding: 12px 24px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            z-index: 100;
            transition: all 0.3s;
            border-radius: 4px;
        }
        
        .fullscreen-btn:hover {
            background: rgba(0, 255, 255, 0.4);
            transform: scale(1.05);
        }
        
        .fullscreen-btn:active {
            transform: scale(0.95);
        }
        
        @media (max-width: 768px) {
            .info {
                font-size: 10px;
                bottom: 10px;
                left: 10px;
            }
            
            .fullscreen-btn {
                padding: 10px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">
        Audio Reactive Waveform<br>
        Move mouse/touch to interact
    </div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        
        let mouseX = width / 2;
        let mouseY = height / 2;
        let time = 0;
        
        // Wave parameters
        const waves = [
            {
                amplitude: 50,
                frequency: 0.02,
                speed: 0.03,
                yOffset: 0,
                color: 'rgba(255, 0, 128, 0.8)'
            },
            {
                amplitude: 40,
                frequency: 0.025,
                speed: 0.025,
                yOffset: 20,
                color: 'rgba(0, 255, 255, 0.8)'
            },
            {
                amplitude: 60,
                frequency: 0.015,
                speed: 0.035,
                yOffset: -20,
                color: 'rgba(255, 255, 0, 0.8)'
            },
            {
                amplitude: 45,
                frequency: 0.03,
                speed: 0.02,
                yOffset: 40,
                color: 'rgba(128, 0, 255, 0.8)'
            },
            {
                amplitude: 55,
                frequency: 0.018,
                speed: 0.04,
                yOffset: -40,
                color: 'rgba(0, 255, 128, 0.8)'
            }
        ];
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        function getWaveY(x, wave, time) {
            const baseHeight = height / 2;
            const mouseInfluence = Math.sin(x * 0.01 + time * 0.5) * 
                                   (1 - Math.abs(x - mouseX) / width) * 50;
            const y = baseHeight + 
                     wave.yOffset + 
                     Math.sin(x * wave.frequency + time * wave.speed) * wave.amplitude +
                     Math.sin(x * wave.frequency * 2 + time * wave.speed * 1.5) * (wave.amplitude * 0.5) +
                     mouseInfluence;
            return y;
        }
        
        function drawWave(wave, time) {
            ctx.beginPath();
            ctx.moveTo(0, getWaveY(0, wave, time));
            
            for (let x = 0; x <= width; x += 2) {
                const y = getWaveY(x, wave, time);
                ctx.lineTo(x, y);
            }
            
            ctx.strokeStyle = wave.color;
            ctx.lineWidth = 3;
            ctx.shadowBlur = 15;
            ctx.shadowColor = wave.color;
            ctx.stroke();
            
            ctx.shadowBlur = 0;
        }
        
        function draw() {
            // Fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // Draw all waves
            waves.forEach(wave => drawWave(wave, time));
            
            time += 1;
            requestAnimationFrame(draw);
        }
        
        // Event listeners
        window.addEventListener('resize', resize);
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }
        
        // Start animation
        draw();
    </script>
</body>
</html>
