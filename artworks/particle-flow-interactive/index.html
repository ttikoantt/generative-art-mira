<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Particle Flow - Interactive Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        #canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        #fullscreenBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        #fullscreenBtn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        #fullscreenBtn:active {
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            #fullscreenBtn {
                top: 10px;
                right: 10px;
                padding: 8px 12px;
                font-size: 12px;
            }

            .info {
                font-size: 12px;
                bottom: 15px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <button id="fullscreenBtn">⛶ 全画面</button>
    <div class="info">タッチしてパーティクルを操る</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // パーティクルシステム
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.life = 1;
                this.decay = Math.random() * 0.005 + 0.002;

                // 色相（ランダムに美しい色を選択）
                this.hue = Math.random() * 360;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += 0.02; // 重力
                this.speedX *= 0.99; // 空気抵抗
                this.speedY *= 0.99;
                this.life -= this.decay;
                this.size *= 0.99;
            }

            draw() {
                const alpha = this.life;
                const hue = this.hue;

                // グロー効果
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 2
                );
                gradient.addColorStop(0, `hsla(${hue}, 100%, 70%, ${alpha})`);
                gradient.addColorStop(0.5, `hsla(${hue}, 100%, 50%, ${alpha * 0.5})`);
                gradient.addColorStop(1, `hsla(${hue}, 100%, 50%, 0)`);

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        // パーティクル配列
        let particles = [];
        let mouseX = 0;
        let mouseY = 0;
        let isMouseDown = false;

        // マウス/タッチイベント
        function handleInput(x, y) {
            // パーティクル生成
            for (let i = 0; i < 5; i++) {
                particles.push(new Particle(
                    x + (Math.random() - 0.5) * 20,
                    y + (Math.random() - 0.5) * 20
                ));
            }
        }

        canvas.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            mouseX = e.clientX;
            mouseY = e.clientY;
            handleInput(mouseX, mouseY);
        });

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            if (isMouseDown) {
                handleInput(mouseX, mouseY);
            }
        });

        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
        });

        // タッチイベント
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            isMouseDown = true;
            handleInput(mouseX, mouseY);
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isMouseDown) {
                const touch = e.touches[0];
                mouseX = touch.clientX;
                mouseY = touch.clientY;
                handleInput(mouseX, mouseY);
            }
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            isMouseDown = false;
        });

        // 全画面ボタン
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // リサイズ
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // アニメーション
        function animate() {
            // 半透明の黒で上書き（軌跡効果）
            ctx.fillStyle = 'rgba(10, 10, 15, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // パーティクル更新・描画
            particles = particles.filter(p => p.life > 0 && p.size > 0.5);

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // 自動的に少量のパーティクルを生成
            if (Math.random() < 0.1) {
                particles.push(new Particle(
                    Math.random() * width,
                    Math.random() * height
                ));
            }

            requestAnimationFrame(animate);
        }

        // 開始時に少しパーティクルを生成
        for (let i = 0; i < 20; i++) {
            particles.push(new Particle(
                Math.random() * width,
                Math.random() * height
            ));
        }

        animate();
    </script>
</body>
</html>
