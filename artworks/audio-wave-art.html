<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音声波形アート | Audio Wave Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
        }
        #overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            z-index: 100;
        }
        #startBtn {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border: none;
            color: #fff;
            padding: 20px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.3);
        }
        #startBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(255, 107, 107, 0.5);
        }
        #info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            text-align: center;
        }
        #fullscreenBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        #fullscreenBtn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div id="overlay">
        <button id="startBtn">🎤 音声アートを開始</button>
    </div>
    <canvas id="canvas"></canvas>
    <button id="fullscreenBtn">⛶ 全画面</button>
    <div id="info">マイクに話しかけてみてください</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const overlay = document.getElementById('overlay');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let audioContext;
        let analyser;
        let microphone;
        let dataArray;
        let isRunning = false;
        let time = 0;

        // Canvas size
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Fullscreen
        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // Color palette
        const colors = [
            { h: 340, s: 100, l: 60 },  // Pink
            { h: 200, s: 100, l: 60 },  // Blue
            { h: 160, s: 100, l: 50 },  // Green
            { h: 40, s: 100, l: 60 },   // Gold
            { h: 280, s: 100, l: 60 },  // Purple
        ];

        // Start audio
        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);

                analyser.fftSize = 256;
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);

                overlay.style.display = 'none';
                isRunning = true;
                animate();
            } catch (err) {
                alert('マイクアクセスが許可されていません');
                console.error(err);
            }
        });

        function getWaveY(x, frequencyData, time) {
            const index = Math.floor((x / canvas.width) * frequencyData.length);
            const value = frequencyData[index] / 255;

            const centerY = canvas.height / 2;
            const amplitude = value * canvas.height * 0.3;

            const wave1 = Math.sin(x * 0.01 + time * 2) * amplitude;
            const wave2 = Math.sin(x * 0.02 - time * 1.5) * amplitude * 0.5;
            const wave3 = Math.cos(x * 0.005 + time) * amplitude * 0.3;

            return centerY + wave1 + wave2 + wave3;
        }

        function drawWave(frequencyData, colorIndex, offsetTime, alpha) {
            const color = colors[colorIndex % colors.length];

            ctx.beginPath();
            ctx.moveTo(0, canvas.height / 2);

            for (let x = 0; x < canvas.width; x += 2) {
                const y = getWaveY(x, frequencyData, time + offsetTime);
                ctx.lineTo(x, y);
            }

            ctx.strokeStyle = `hsla(${color.h}, ${color.s}%, ${color.l}%, ${alpha})`;
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function drawParticles(frequencyData) {
            const avgVolume = frequencyData.reduce((a, b) => a + b, 0) / frequencyData.length;
            const particleCount = Math.floor(avgVolume / 10);

            for (let i = 0; i < particleCount; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 3 + 1;
                const colorIndex = Math.floor(Math.random() * colors.length);
                const color = colors[colorIndex];

                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${color.h}, ${color.s}%, ${color.l}%, ${Math.random() * 0.5 + 0.3})`;
                ctx.fill();
            }
        }

        function animate() {
            if (!isRunning) return;

            // Clear with fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            analyser.getByteFrequencyData(dataArray);

            // Calculate average volume
            const avgVolume = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;

            // Draw multiple waves with different offsets
            for (let i = 0; i < 5; i++) {
                const alpha = 0.3 + (avgVolume / 255) * 0.7;
                drawWave(dataArray, i, i * 0.5, alpha);
            }

            // Draw particles when loud
            if (avgVolume > 50) {
                drawParticles(dataArray);
            }

            // Draw center circle based on volume
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = avgVolume * 0.5;

            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius);
            gradient.addColorStop(0, `hsla(${time * 50 % 360}, 100%, 60%, 0.3)`);
            gradient.addColorStop(1, 'transparent');

            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();

            time += 0.016;
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
