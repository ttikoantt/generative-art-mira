<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>インタラクティブ・フラクタルツリー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #fff;
        }

        .header {
            padding: 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            background: linear-gradient(45deg, #00d4ff, #7b2cbf, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        @media (min-width: 768px) {
            .main-container {
                flex-direction: row;
                gap: 20px;
            }
        }

        .canvas-container {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }

        .controls {
            width: 100%;
            max-width: 400px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .control-value {
            background: rgba(0, 212, 255, 0.2);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #00d4ff;
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 120px;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-animate {
            background: linear-gradient(45deg, #00d4ff, #0099cc);
            color: #fff;
        }

        .btn-animate:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        .btn-random {
            background: linear-gradient(45deg, #7b2cbf, #9d4edd);
            color: #fff;
        }

        .btn-random:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(123, 44, 191, 0.4);
        }

        .btn-reset {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-reset:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 212, 255, 0.9);
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 30px rgba(0, 212, 255, 0.5);
        }

        .info {
            margin-top: 15px;
            padding: 12px;
            background: rgba(0, 212, 255, 0.1);
            border-left: 3px solid #00d4ff;
            border-radius: 5px;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        @media (max-width: 767px) {
            h1 {
                font-size: 1.4rem;
            }

            .controls {
                max-width: 100%;
            }

            .fullscreen-btn {
                bottom: 15px;
                right: 15px;
                width: 45px;
                height: 45px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌳 インタラクティブ・フラクタルツリー</h1>
        <p class="subtitle">Interactive Fractal Tree</p>
    </div>

    <div class="main-container">
        <div class="canvas-container">
            <canvas id="canvas" width="600" height="600"></canvas>
        </div>

        <div class="controls">
            <div class="control-group">
                <div class="control-label">
                    <span>枝の角度</span>
                    <span class="control-value" id="angleValue">25°</span>
                </div>
                <input type="range" id="angle" min="5" max="60" value="25">
            </div>

            <div class="control-group">
                <div class="control-label">
                    <span>枝の長さ</span>
                    <span class="control-value" id="lengthValue">120</span>
                </div>
                <input type="range" id="length" min="50" max="180" value="120">
            </div>

            <div class="control-group">
                <div class="control-label">
                    <span>深さ</span>
                    <span class="control-value" id="depthValue">10</span>
                </div>
                <input type="range" id="depth" min="4" max="14" value="10">
            </div>

            <div class="control-group">
                <div class="control-label">
                    <span>分岐率</span>
                    <span class="control-value" id="ratioValue">0.75</span>
                </div>
                <input type="range" id="ratio" min="0.5" max="0.9" step="0.01" value="0.75">
            </div>

            <div class="button-group">
                <button class="btn-animate" onclick="toggleAnimation()">
                    <span id="animateBtn">▶ アニメーション</span>
                </button>
                <button class="btn-random" onclick="randomize()">
                    🎲 ランダム
                </button>
                <button class="btn-reset" onclick="reset()">
                    ↺ リセット
                </button>
            </div>

            <div class="info">
                <strong>🎮 操作方法</strong><br>
                スライダーでパラメータを調整して、フラクタルパターンを変化させましょう。アニメーションで自動的に変化させることもできます。
            </div>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()" title="全画面">
        ⛶
    </button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // パラメータ
        let angle = 25;
        let length = 120;
        let depth = 10;
        let ratio = 0.75;

        // アニメーション
        let animationId = null;
        let animating = false;
        let animAngle = 0;
        let animDirection = 1;

        // 色相
        let hue = 0;

        // 初期化
        function init() {
            draw();
        }

        // フラクタルツリーを描画
        function drawTree(x, y, len, angle, depth, hue) {
            if (depth === 0) return;

            const endX = x + len * Math.sin(angle * Math.PI / 180);
            const endY = y - len * Math.cos(angle * Math.PI / 180);

            // 色の計算
            const hue1 = (hue + depth * 20) % 360;
            const hue2 = (hue + depth * 20 + 30) % 360;
            const gradient = ctx.createLinearGradient(x, y, endX, endY);
            gradient.addColorStop(0, `hsla(${hue1}, 80%, 60%, ${depth / 10})`);
            gradient.addColorStop(1, `hsla(${hue2}, 80%, 60%, ${depth / 10})`);

            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = gradient;
            ctx.lineWidth = depth * 0.8;
            ctx.lineCap = 'round';
            ctx.stroke();

            // 再帰的に枝を描画
            drawTree(endX, endY, len * ratio, angle - angle, depth - 1, hue);
            drawTree(endX, endY, len * ratio, angle + angle, depth - 1, hue);
        }

        // 描画
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const baseX = canvas.width / 2;
            const baseY = canvas.height - 50;

            drawTree(baseX, baseY, length, animAngle, depth, hue);
        }

        // アニメーション
        function animate() {
            if (!animating) return;

            animAngle += animDirection * 0.5;

            if (animAngle > 30 || animAngle < -30) {
                animDirection *= -1;
            }

            hue = (hue + 0.5) % 360;

            draw();
            animationId = requestAnimationFrame(animate);
        }

        // アニメーショントグル
        function toggleAnimation() {
            animating = !animating;
            const btn = document.getElementById('animateBtn');

            if (animating) {
                btn.textContent = '⏸ 停止';
                animate();
            } else {
                btn.textContent = '▶ アニメーション';
                if (animationId) {
                    cancelAnimationFrame(animationId);
                }
            }
        }

        // ランダム化
        function randomize() {
            angle = Math.random() * 55 + 5;
            length = Math.random() * 130 + 50;
            depth = Math.floor(Math.random() * 10) + 4;
            ratio = Math.random() * 0.4 + 0.5;

            updateSliders();
            draw();
        }

        // リセット
        function reset() {
            angle = 25;
            length = 120;
            depth = 10;
            ratio = 0.75;
            animAngle = 0;
            hue = 0;

            if (animating) {
                toggleAnimation();
            }

            // キャンバスをクリア
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            updateSliders();
            draw();
        }

        // スライダー更新
        function updateSliders() {
            document.getElementById('angle').value = angle;
            document.getElementById('length').value = length;
            document.getElementById('depth').value = depth;
            document.getElementById('ratio').value = ratio;

            document.getElementById('angleValue').textContent = Math.round(angle) + '°';
            document.getElementById('lengthValue').textContent = Math.round(length);
            document.getElementById('depthValue').textContent = depth;
            document.getElementById('ratioValue').textContent = ratio.toFixed(2);
        }

        // イベントリスナー
        document.getElementById('angle').addEventListener('input', (e) => {
            angle = parseFloat(e.target.value);
            document.getElementById('angleValue').textContent = angle + '°';
            draw();
        });

        document.getElementById('length').addEventListener('input', (e) => {
            length = parseFloat(e.target.value);
            document.getElementById('lengthValue').textContent = Math.round(length);
            draw();
        });

        document.getElementById('depth').addEventListener('input', (e) => {
            depth = parseInt(e.target.value);
            document.getElementById('depthValue').textContent = depth;
            draw();
        });

        document.getElementById('ratio').addEventListener('input', (e) => {
            ratio = parseFloat(e.target.value);
            document.getElementById('ratioValue').textContent = ratio.toFixed(2);
            draw();
        });

        // 全画面トグル
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        init();
    </script>
</body>
</html>
