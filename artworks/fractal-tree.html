<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Tree Animation - by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        h1 {
            color: #eee;
            margin-bottom: 10px;
            font-size: 2rem;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.1);
        }

        .subtitle {
            color: #888;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        #canvas {
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0f0f1a 100%);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            max-width: 100%;
            height: auto;
            cursor: pointer;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            margin-top: 15px;
            color: #666;
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }
            
            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌳 Fractal Tree Animation</h1>
        <p class="subtitle">by Mira | Click to change color scheme</p>
        
        <canvas id="canvas" width="800" height="600"></canvas>
        
        <div class="controls">
            <button onclick="regenerate()">🔄 New Tree</button>
            <button onclick="toggleAnimation()">⏯️ Play/Pause</button>
            <button onclick="changeDepth()">🌿 Change Depth</button>
        </div>
        
        <p class="info">Recursive fractal tree with wind animation</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let animationId;
        let isAnimating = true;
        let depth = 10;
        let time = 0;
        let colorScheme = 0;

        const colorSchemes = [
            { trunk: '#8B4513', leaves: ['#228B22', '#32CD32', '#90EE90', '#00FF00'] },
            { trunk: '#FF6B6B', leaves: ['#FFE66D', '#FF6B6B', '#FF8E53', '#F7FFF7'] },
            { trunk: '#A8E6CF', leaves: ['#DCEDC1', '#FFD3B6', '#FFAAA5', '#FF8B94'] },
            { trunk: '#C7CEEA', leaves: ['#B8A9C9', '#6C5B7B', '#355C7D', '#C06C84'] },
            { trunk: '#FF8C00', leaves: ['#FFD700', '#FFA500', '#FF6347', '#FFFF00'] }
        ];

        function drawBranch(x, y, length, angle, d) {
            if (d === 0) {
                // Draw leaves at the end
                const colors = colorSchemes[colorScheme].leaves;
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                ctx.beginPath();
                ctx.arc(x, y, 4 + Math.sin(time * 0.05 + d) * 2, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
                return;
            }

            const wind = Math.sin(time * 0.02 + d * 0.5) * 0.05 * d;
            const newAngle = angle + wind;
            
            const endX = x + length * Math.cos(newAngle);
            const endY = y + length * Math.sin(newAngle);

            const gradient = ctx.createLinearGradient(x, y, endX, endY);
            gradient.addColorStop(0, colorSchemes[colorScheme].trunk);
            gradient.addColorStop(1, adjustColor(colorSchemes[colorScheme].trunk, 20));

            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = gradient;
            ctx.lineWidth = d * 1.5;
            ctx.lineCap = 'round';
            ctx.stroke();

            const branchAngle = 0.4 + Math.sin(time * 0.01) * 0.1;
            const lengthRatio = 0.7 + Math.sin(time * 0.005) * 0.05;

            drawBranch(endX, endY, length * lengthRatio, newAngle - branchAngle, d - 1);
            drawBranch(endX, endY, length * lengthRatio, newAngle + branchAngle, d - 1);
        }

        function adjustColor(color, amount) {
            const hex = color.replace('#', '');
            const r = Math.min(255, parseInt(hex.substr(0, 2), 16) + amount);
            const g = Math.min(255, parseInt(hex.substr(2, 2), 16) + amount);
            const b = Math.min(255, parseInt(hex.substr(4, 2), 16) + amount);
            return `rgb(${r}, ${g}, ${b})`;
        }

        function draw() {
            ctx.fillStyle = 'rgba(15, 15, 26, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const startX = canvas.width / 2;
            const startY = canvas.height - 50;

            drawBranch(startX, startY, 100, -Math.PI / 2, depth);

            time++;
            if (isAnimating) {
                animationId = requestAnimationFrame(draw);
            }
        }

        function regenerate() {
            time = 0;
            if (!isAnimating) {
                isAnimating = true;
                draw();
            }
        }

        function toggleAnimation() {
            isAnimating = !isAnimating;
            if (isAnimating) {
                draw();
            } else {
                cancelAnimationFrame(animationId);
            }
        }

        function changeDepth() {
            depth = depth === 10 ? 8 : depth === 8 ? 12 : 10;
            if (!isAnimating) {
                isAnimating = true;
                draw();
            }
        }

        canvas.addEventListener('click', () => {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
            if (!isAnimating) {
                isAnimating = true;
                draw();
            }
        });

        // Handle canvas size for mobile
        function resizeCanvas() {
            const container = document.querySelector('.container');
            const maxWidth = Math.min(800, container.clientWidth - 40);
            const ratio = 600 / 800;
            
            canvas.style.width = maxWidth + 'px';
            canvas.style.height = (maxWidth * ratio) + 'px';
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        draw();
    </script>
</body>
</html>
