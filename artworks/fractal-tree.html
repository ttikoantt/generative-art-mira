<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Tree Art - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow-x: hidden;
        }

        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 1.8rem;
            text-align: center;
        }

        .subtitle {
            color: #888;
            margin-bottom: 20px;
            font-size: 0.9rem;
            text-align: center;
        }

        .canvas-container {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        #treeCanvas {
            display: block;
            cursor: crosshair;
        }

        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 800px;
        }

        .control-group {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-group label {
            color: #fff;
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .control-group input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            -webkit-appearance: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #4CAF50;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .control-group input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: #fff;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #2196F3, #1976D2);
            color: #fff;
        }

        .btn-accent {
            background: linear-gradient(135deg, #FF9800, #F57C00);
            color: #fff;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .fullscreen-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.3s;
            z-index: 10;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .info {
            color: #666;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 15px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.4rem;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            button {
                flex: 1;
                min-width: 120px;
            }
        }
    </style>
</head>
<body>
    <h1>🌳 Fractal Tree Art</h1>
    <p class="subtitle">Click to spawn trees • Drag to paint forest</p>

    <div class="canvas-container">
        <canvas id="treeCanvas"></canvas>
        <button class="fullscreen-btn" id="fullscreenBtn">⛶ Fullscreen</button>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Branch Angle: <span id="angleValue">25</span>°</label>
            <input type="range" id="angle" min="10" max="50" value="25">
        </div>

        <div class="control-group">
            <label>Branch Length: <span id="lengthValue">120</span></label>
            <input type="range" id="length" min="50" max="180" value="120">
        </div>

        <div class="control-group">
            <label>Recursion Depth: <span id="depthValue">10</span></label>
            <input type="range" id="depth" min="5" max="14" value="10">
        </div>

        <div class="control-group">
            <label>Branch Width: <span id="widthValue">10</span></label>
            <input type="range" id="width" min="2" max="20" value="10">
        </div>
    </div>

    <div class="buttons">
        <button class="btn-primary" id="regenerate">🔄 Regenerate</button>
        <button class="btn-secondary" id="random">🎲 Random</button>
        <button class="btn-accent" id="animate">✨ Animate</button>
        <button class="btn-primary" id="clear">🗑️ Clear</button>
    </div>

    <p class="info">🖱️ Click or drag to create trees • Watch them grow organically</p>

    <script>
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');

        // Set canvas size
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = Math.min(800, window.innerWidth - 40);
            canvas.height = Math.min(600, window.innerHeight - 400);
        }
        resizeCanvas();

        // Tree parameters
        let angle = 25;
        let length = 120;
        let depth = 10;
        let branchWidth = 10;

        // Animation
        let isAnimating = false;
        let animationFrame = 0;

        // HSL color for rainbow effect
        function getColor(d, maxD) {
            const hue = (d / maxD) * 60 + 100; // Green to cyan
            const lightness = 70 - (d / maxD) * 30;
            return `hsl(${hue}, 80%, ${lightness}%)`;
        }

        // Draw fractal tree
        function drawTree(x, y, len, angle, branchWidth, currentDepth, maxDepth) {
            if (currentDepth === 0) return;

            const endX = x + len * Math.cos(angle * Math.PI / 180);
            const endY = y - len * Math.sin(angle * Math.PI / 180);

            // Draw branch
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = getColor(currentDepth, maxDepth);
            ctx.lineWidth = branchWidth;
            ctx.lineCap = 'round';
            ctx.stroke();

            // Recursively draw sub-branches
            const newLen = len * 0.75;
            const newWidth = branchWidth * 0.7;
            const angleOffset = document.getElementById('angle').value;

            drawTree(endX, endY, newLen, angle + angleOffset, newWidth, currentDepth - 1, maxDepth);
            drawTree(endX, endY, newLen, angle - angleOffset, newWidth, currentDepth - 1, maxDepth);
        }

        // Draw a single tree
        function drawSingleTree(x, y) {
            const maxDepth = parseInt(document.getElementById('depth').value);
            const startLength = parseInt(document.getElementById('length').value);
            const startWidth = parseInt(document.getElementById('width').value);
            drawTree(x, y, startLength, 90, startWidth, maxDepth, maxDepth);
        }

        // Clear canvas
        function clearCanvas() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Generate initial tree
        function regenerate() {
            clearCanvas();
            drawSingleTree(canvas.width / 2, canvas.height);
        }

        // Random parameters
        function randomize() {
            document.getElementById('angle').value = Math.random() * 40 + 10;
            document.getElementById('length').value = Math.random() * 100 + 60;
            document.getElementById('depth').value = Math.floor(Math.random() * 6) + 7;
            document.getElementById('width').value = Math.random() * 15 + 3;
            updateDisplays();
            regenerate();
        }

        // Animate tree growth
        function animateGrowth() {
            if (isAnimating) {
                isAnimating = false;
                document.getElementById('animate').textContent = '✨ Animate';
                return;
            }

            isAnimating = true;
            document.getElementById('animate').textContent = '⏹️ Stop';
            animationFrame = 0;

            clearCanvas();
            const maxDepth = parseInt(document.getElementById('depth').value);
            const startLength = parseInt(document.getElementById('length').value);
            const startWidth = parseInt(document.getElementById('width').value);

            function animate() {
                if (!isAnimating) {
                    regenerate();
                    return;
                }

                animationFrame++;
                const currentDepth = Math.min(animationFrame, maxDepth);

                clearCanvas();
                drawTree(canvas.width / 2, canvas.height, startLength, 90, startWidth, currentDepth, maxDepth);

                if (currentDepth < maxDepth) {
                    requestAnimationFrame(animate);
                } else {
                    isAnimating = false;
                    document.getElementById('animate').textContent = '✨ Animate';
                }
            }

            animate();
        }

        // Update value displays
        function updateDisplays() {
            document.getElementById('angleValue').textContent = document.getElementById('angle').value;
            document.getElementById('lengthValue').textContent = document.getElementById('length').value;
            document.getElementById('depthValue').textContent = document.getElementById('depth').value;
            document.getElementById('widthValue').textContent = document.getElementById('width').value;
        }

        // Event listeners for sliders
        document.querySelectorAll('input[type="range"]').forEach(input => {
            input.addEventListener('input', () => {
                updateDisplays();
                if (!isAnimating) regenerate();
            });
        });

        // Button events
        document.getElementById('regenerate').addEventListener('click', regenerate);
        document.getElementById('random').addEventListener('click', randomize);
        document.getElementById('animate').addEventListener('click', animateGrowth);
        document.getElementById('clear').addEventListener('click', clearCanvas);

        // Fullscreen
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (canvas.requestFullscreen) {
                canvas.requestFullscreen();
            }
        });

        // Click and drag to draw trees
        let isDrawing = false;

        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            drawSingleTree(x, y);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            drawSingleTree(x, y);
        });

        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mouseleave', () => isDrawing = false);

        // Touch events for mobile
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            drawSingleTree(x, y);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            drawSingleTree(x, y);
        });

        canvas.addEventListener('touchend', () => isDrawing = false);

        // Window resize
        window.addEventListener('resize', () => {
            resizeCanvas();
            regenerate();
        });

        // Initial draw
        regenerate();
        updateDisplays();
    </script>
</body>
</html>
