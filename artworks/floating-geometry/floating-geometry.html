<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Geometry - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
        }

        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            color: white;
            font-size: 14px;
            z-index: 100;
        }

        .controls h3 {
            margin-bottom: 10px;
            font-size: 16px;
        }

        .controls button {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            margin: 5px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .controls button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全画面</button>

    <div class="controls">
        <h3>🔮 Floating Geometry</h3>
        <button onclick="addShapes(10)">＋追加</button>
        <button onclick="clearShapes()">クリア</button>
        <button onclick="toggleGlow()">✨ グロー</button>
    </div>

    <div class="info">
        タップ・マウスで図形を操作
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let shapes = [];
        let mouseX = 0, mouseY = 0;
        let glowEnabled = true;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Shape {
            constructor() {
                this.init();
            }

            init() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 40 + 20;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.type = Math.floor(Math.random() * 3); // 0: circle, 1: triangle, 2: square

                // カラフルな色
                const hue = Math.random() * 60 + 200; // Blue to purple
                this.color = `hsla(${hue}, 80%, 60%, 0.8)`;
                this.glowColor = `hsla(${hue}, 80%, 60%, 0.3)`;
            }

            update() {
                // 浮遊運動
                this.rotation += this.rotationSpeed;
                this.x += this.vx;
                this.y += this.vy;

                // 境界で反転
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;

                // マウスに反応
                const dx = this.x - mouseX;
                const dy = this.y - mouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 150) {
                    const force = (150 - dist) / 150;
                    this.vx += (dx / dist) * force * 0.5;
                    this.vy += (dy / dist) * force * 0.5;
                }

                // 速度制限
                const maxSpeed = 2;
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > maxSpeed) {
                    this.vx = (this.vx / speed) * maxSpeed;
                    this.vy = (this.vy / speed) * maxSpeed;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // グロー効果
                if (glowEnabled) {
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = this.glowColor;
                }

                ctx.fillStyle = this.color;
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 2;

                ctx.beginPath();

                switch(this.type) {
                    case 0: // Circle
                        ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                        break;
                    case 1: // Triangle
                        ctx.moveTo(0, -this.size);
                        ctx.lineTo(this.size * 0.866, this.size * 0.5);
                        ctx.lineTo(-this.size * 0.866, this.size * 0.5);
                        ctx.closePath();
                        break;
                    case 2: // Square
                        ctx.rect(-this.size * 0.7, -this.size * 0.7, this.size * 1.4, this.size * 1.4);
                        break;
                }

                ctx.fill();
                ctx.stroke();

                ctx.restore();
            }
        }

        function addShapes(count) {
            for (let i = 0; i < count; i++) {
                shapes.push(new Shape());
            }
        }

        function clearShapes() {
            shapes = [];
        }

        function toggleGlow() {
            glowEnabled = !glowEnabled;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function animate() {
            // 背景をフェード
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 図形を更新・描画
            shapes.forEach(shape => {
                shape.update();
                shape.draw();
            });

            requestAnimationFrame(animate);
        }

        // イベントリスナー
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        canvas.addEventListener('click', (e) => {
            const shape = new Shape();
            shape.x = e.clientX;
            shape.y = e.clientY;
            shape.size = Math.random() * 30 + 40;
            shapes.push(shape);
        });

        window.addEventListener('resize', resize);

        // 初期化
        resize();
        addShapes(30);
        animate();
    </script>
</body>
</html>
