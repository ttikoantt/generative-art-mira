<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmonic Waves - Interactive Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        #canvas {
            display: block;
            cursor: move;
        }
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        .controls button {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        .controls button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        .info {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 14px;
            opacity: 0.7;
            text-align: center;
            pointer-events: none;
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            backdrop-filter: blur(10px);
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">マウスを動かして波動を変化</div>
    <div class="controls">
        <button onclick="toggleMode()">モード切替</button>
        <button onclick="randomize()">ランダム</button>
        <button onclick="reset()">リセット</button>
    </div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        let mouseX = 0, mouseY = 0;
        let mode = 0;
        let time = 0;

        // 波動パラメータ
        let waves = [];
        const numWaves = 8;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        function initWaves() {
            waves = [];
            for (let i = 0; i < numWaves; i++) {
                waves.push({
                    frequency: 0.02 + i * 0.01,
                    amplitude: 30 + i * 10,
                    phase: i * 0.5,
                    speed: 0.02 + i * 0.005,
                    hue: (i * 360 / numWaves) % 360
                });
            }
        }

        function drawWave(wave, index) {
            ctx.beginPath();
            
            const points = 200;
            for (let i = 0; i <= points; i++) {
                const angle = (i / points) * Math.PI * 2;
                const waveX = centerX + Math.cos(angle) * (50 + mouseX * 0.5);
                const waveY = centerY + Math.sin(angle) * (50 + mouseY * 0.5);
                
                const waveOffset = Math.sin(angle * wave.frequency + time * wave.speed + wave.phase) * wave.amplitude;
                
                const perpX = Math.cos(angle + Math.PI / 2);
                const perpY = Math.sin(angle + Math.PI / 2);
                
                const x = waveX + perpX * waveOffset;
                const y = waveY + perpY * waveOffset;
                
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            
            ctx.closePath();
            
            const hue = (wave.hue + time * 10) % 360;
            ctx.strokeStyle = `hsla(${hue}, 80%, 60%, 0.6)`;
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.fillStyle = `hsla(${hue}, 80%, 60%, 0.05)`;
            ctx.fill();
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            waves.forEach((wave, index) => {
                drawWave(wave, index);
            });

            time++;
            requestAnimationFrame(draw);
        }

        function toggleMode() {
            mode = (mode + 1) % 3;
            if (mode === 0) {
                initWaves();
            } else if (mode === 1) {
                waves.forEach(wave => {
                    wave.frequency *= 2;
                    wave.amplitude *= 0.5;
                });
            } else {
                waves.forEach(wave => {
                    wave.frequency *= 0.5;
                    wave.amplitude *= 2;
                });
            }
        }

        function randomize() {
            waves.forEach(wave => {
                wave.frequency = 0.01 + Math.random() * 0.05;
                wave.amplitude = 20 + Math.random() * 50;
                wave.speed = 0.01 + Math.random() * 0.03;
                wave.hue = Math.random() * 360;
            });
        }

        function reset() {
            mode = 0;
            time = 0;
            initWaves();
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX - centerX;
            mouseY = e.clientY - centerY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX - centerX;
            mouseY = touch.clientY - centerY;
        }, { passive: false });

        window.addEventListener('resize', resize);
        
        resize();
        initWaves();
        draw();
    </script>
</body>
</html>
