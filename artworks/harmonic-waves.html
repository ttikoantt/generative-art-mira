<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmonic Waves - Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
            cursor: pointer;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #0ff;
            font-size: 12px;
            text-shadow: 0 0 10px #0ff;
            pointer-events: none;
            opacity: 0.8;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #0ff;
            color: #0ff;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 20px #0ff;
        }

        @media (max-width: 768px) {
            .info {
                font-size: 10px;
                bottom: 10px;
                left: 10px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">Click to regenerate • Move to disturb</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let time = 0;
        let mouseX = 0;
        let mouseY = 0;
        let waves = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function initWaves() {
            waves = [];
            const numWaves = 7 + Math.floor(Math.random() * 5);

            for (let i = 0; i < numWaves; i++) {
                waves.push({
                    amplitude: 20 + Math.random() * 80,
                    frequency: 0.002 + Math.random() * 0.008,
                    phase: Math.random() * Math.PI * 2,
                    speed: 0.02 + Math.random() * 0.05,
                    color: `hsl(${180 + Math.random() * 60}, 100%, ${50 + Math.random() * 30}%)`,
                    lineWidth: 1 + Math.random() * 3
                });
            }
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            const centerY = height / 2;
            const mouseInfluence = 0.3 + (mouseY / height) * 0.5;

            waves.forEach((wave, index) => {
                ctx.beginPath();
                ctx.strokeStyle = wave.color;
                ctx.lineWidth = wave.lineWidth;

                for (let x = 0; x < width; x += 2) {
                    const distFromMouse = Math.abs(x - mouseX);
                    const mouseEffect = Math.max(0, 1 - distFromMouse / 200);

                    const y = centerY +
                        wave.amplitude * Math.sin(x * wave.frequency + time * wave.speed + wave.phase) +
                        wave.amplitude * 0.3 * Math.sin(x * wave.frequency * 2 + time * wave.speed * 1.5) +
                        (mouseEffect * mouseInfluence * 50 * Math.sin(x * 0.05 + time * 0.1));

                    if (x === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }

                ctx.stroke();
            });

            // Draw center glow
            const gradient = ctx.createRadialGradient(
                width / 2, height / 2, 0,
                width / 2, height / 2, 300
            );
            gradient.addColorStop(0, 'rgba(0, 255, 255, 0.05)');
            gradient.addColorStop(1, 'rgba(0, 255, 255, 0)');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            time += 1;
            requestAnimationFrame(draw);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        canvas.addEventListener('click', initWaves);
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            initWaves();
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        window.addEventListener('resize', resize);
        window.addEventListener('fullscreenchange', resize);

        resize();
        initWaves();
        draw();
    </script>
</body>
</html>
