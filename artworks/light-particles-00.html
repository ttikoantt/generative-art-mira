<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light Particles - インタラクティブ光の粒子</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 1.8rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        #canvas {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(100, 100, 255, 0.3);
            max-width: 100%;
            touch-action: none;
        }

        .info {
            color: rgba(255, 255, 255, 0.5);
            margin-top: 15px;
            font-size: 0.8rem;
        }

        .fullscreen-btn {
            margin-top: 15px;
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.4rem;
            }

            .fullscreen-btn {
                padding: 12px 28px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Light Particles</h1>
        <p class="subtitle">インタラクティブ光の粒子</p>
        <canvas id="canvas" width="600" height="600"></canvas>
        <p class="info">画面をタップ/クリックで光の粒子を召喚</p>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;

        class Particle {
            constructor(x, y, isClick = false) {
                this.x = x || Math.random() * canvas.width;
                this.y = y || Math.random() * canvas.height;
                this.size = Math.random() * 4 + 2;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.hue = Math.random() * 60 + 200; // Blue to purple range
                this.alpha = Math.random() * 0.5 + 0.5;
                this.life = isClick ? 100 : Infinity;
                this.decay = Math.random() * 0.02 + 0.01;
                this.isClick = isClick;
            }

            update() {
                // Attract to mouse
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 150) {
                    const force = (150 - dist) / 150;
                    this.speedX += (dx / dist) * force * 0.5;
                    this.speedY += (dy / dist) * force * 0.5;
                }

                // Apply velocity
                this.x += this.speedX;
                this.y += this.speedY;

                // Damping
                this.speedX *= 0.98;
                this.speedY *= 0.98;

                // Wrap around edges
                if (!this.isClick) {
                    if (this.x < 0) this.x = canvas.width;
                    if (this.x > canvas.width) this.x = 0;
                    if (this.y < 0) this.y = canvas.height;
                    if (this.y > canvas.height) this.y = 0;
                } else {
                    this.life -= this.decay * 10;
                }

                // Color cycling
                this.hue = (this.hue + 0.5) % 360;
            }

            draw() {
                const alpha = this.isClick ? (this.life / 100) * this.alpha : this.alpha;

                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = `hsl(${this.hue}, 100%, 70%)`;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 70%)`;
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // Initialize particles
        for (let i = 0; i < 100; i++) {
            particles.push(new Particle());
        }

        // Mouse move
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouseX = (e.clientX - rect.left) * scaleX;
            mouseY = (e.clientY - rect.top) * scaleY;
        });

        // Click to spawn particles
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;

            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(x, y, true));
            }
        });

        // Touch support
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const touch = e.touches[0];
            mouseX = (touch.clientX - rect.left) * scaleX;
            mouseY = (touch.clientY - rect.top) * scaleY;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const touch = e.touches[0];
            const x = (touch.clientX - rect.left) * scaleX;
            const y = (touch.clientY - rect.top) * scaleY;

            mouseX = x;
            mouseY = y;

            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(x, y, true));
            }
        });

        function animate() {
            // Clear with fade effect
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update and draw particles
            particles = particles.filter(p => !p.isClick || p.life > 0);

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // Draw connections
            particles.forEach((p1, i) => {
                particles.slice(i + 1).forEach(p2 => {
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 100) {
                        ctx.save();
                        ctx.globalAlpha = (1 - dist / 100) * 0.2;
                        ctx.strokeStyle = `hsl(${(p1.hue + p2.hue) / 2}, 100%, 70%)`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                        ctx.restore();
                    }
                });
            });

            requestAnimationFrame(animate);
        }

        // Resize handler
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 600);
            const maxHeight = Math.min(window.innerHeight - 200, 600);
            const size = Math.min(maxWidth, maxHeight);

            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Start animation
        animate();
    </script>
</body>
</html>
