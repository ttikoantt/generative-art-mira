<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lie Detector - April Fools Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a0a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(90deg, #ff0080, #00ffff, #ff0080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer {
            0%, 100% { filter: hue-rotate(0deg); }
            50% { filter: hue-rotate(180deg); }
        }
        .subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 30px;
            text-align: center;
        }
        .input-area {
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #ff0080;
            border-radius: 10px;
            padding: 15px;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            resize: none;
            transition: all 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }
        .analyze-btn {
            width: 100%;
            max-width: 600px;
            padding: 15px 30px;
            background: linear-gradient(135deg, #ff0080, #00ffff);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 30px;
        }
        .analyze-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 0, 128, 0.5);
        }
        .analyze-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .result-area {
            width: 100%;
            max-width: 600px;
            min-height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #333;
            border-radius: 10px;
            padding: 20px;
            display: none;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-area.show {
            display: block;
        }
        .truth-meter {
            width: 100%;
            height: 30px;
            background: linear-gradient(90deg, #ff0000 0%, #ffff00 50%, #00ff00 100%);
            border-radius: 15px;
            position: relative;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .indicator {
            position: absolute;
            top: -5px;
            width: 4px;
            height: 40px;
            background: #fff;
            border-radius: 2px;
            transition: left 1s ease-out;
            box-shadow: 0 0 10px #fff;
        }
        .verdict {
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .verdict.truth {
            color: #00ff00;
            text-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }
        .verdict.lie {
            color: #ff0000;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }
        .verdict.uncertain {
            color: #ffff00;
            text-shadow: 0 0 20px rgba(255, 255, 0, 0.5);
        }
        .explanation {
            font-size: 0.9rem;
            color: #aaa;
            text-align: center;
            line-height: 1.6;
        }
        .brain-waves {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.1;
        }
        .disclaimer {
            font-size: 0.7rem;
            color: #666;
            text-align: center;
            margin-top: 30px;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <canvas class="brain-waves" id="waves"></canvas>
    
    <h1>🔍 Lie Detector</h1>
    <p class="subtitle">エイプリルフール特別企画 - 真実を見抜け！</p>
    
    <div class="input-area">
        <textarea id="statement" placeholder="発言を入力してください...&#10;例: 「今日は誕生日です」「昨日は勉強しました」"></textarea>
    </div>
    
    <button class="analyze-btn" onclick="analyzeStatement()">
        🔬 真偽を分析する
    </button>
    
    <div class="result-area" id="result">
        <div class="truth-meter">
            <div class="indicator" id="indicator"></div>
        </div>
        <div class="verdict" id="verdict"></div>
        <div class="explanation" id="explanation"></div>
    </div>
    
    <p class="disclaimer">
        ⚠️ これはジョークアプリです。実際の真偽判定はできません。
        結果はすべてランダムに生成されます。
    </p>
    
    <script>
        // Brain waves background
        const canvas = document.getElementById('waves');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        let time = 0;
        function drawWaves() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 1;
            
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                for (let x = 0; x < canvas.width; x++) {
                    const y = canvas.height / 2 + 
                        Math.sin((x + time * 50 + i * 100) * 0.01) * 50 +
                        Math.sin((x + time * 30 + i * 50) * 0.02) * 30;
                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }
            time += 0.02;
            requestAnimationFrame(drawWaves);
        }
        drawWaves();
        
        const explanations = {
            truth: [
                "発言のリズムが自然です。心拍数は安定しています。",
                "声のトーンに変動がありません。自信を感じます。",
                "表情筋の動きが一致しています。"
            ],
            lie: [
                "微細な遅れを検出しました。思考の中断を示唆しています。",
                "語彙選択に迷いがあります。説明が長すぎます。",
                "矛盾したパターンを検知しました。"
            ],
            uncertain: [
                "判断が困難です。追加情報が必要です。",
                "データが混在しています。自信を持って言えません。",
                "境界領域に位置しています。"
            ]
        };
        
        function analyzeStatement() {
            const statement = document.getElementById('statement').value.trim();
            if (!statement) {
                alert('発言を入力してください！');
                return;
            }
            
            const btn = document.querySelector('.analyze-btn');
            btn.disabled = true;
            btn.textContent = '🔬 分析中...';
            
            // Simulate analysis
            setTimeout(() => {
                const length = statement.length;
                const score = Math.random();
                let verdict, verdictClass, explanation;
                
                if (score < 0.33) {
                    verdict = '🎭 TRUTH';
                    verdictClass = 'truth';
                    explanation = explanations.truth[Math.floor(Math.random() * explanations.truth.length)];
                } else if (score < 0.66) {
                    verdict = '💔 LIE';
                    verdictClass = 'lie';
                    explanation = explanations.lie[Math.floor(Math.random() * explanations.lie.length)];
                } else {
                    verdict = '❓ UNCERTAIN';
                    verdictClass = 'uncertain';
                    explanation = explanations.uncertain[Math.floor(Math.random() * explanations.uncertain.length)];
                }
                
                const indicatorPos = score * 100;
                
                document.getElementById('indicator').style.left = `calc(${indicatorPos}% - 2px)`;
                const verdictEl = document.getElementById('verdict');
                verdictEl.textContent = verdict;
                verdictEl.className = 'verdict ' + verdictClass;
                document.getElementById('explanation').textContent = explanation;
                document.getElementById('result').classList.add('show');
                
                btn.disabled = false;
                btn.textContent = '🔬 真偽を分析する';
            }, 2000);
        }
    </script>
</body>
</html>
