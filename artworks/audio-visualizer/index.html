<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Reactive Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        button.active {
            background: rgba(0, 255, 136, 0.3);
            border-color: #00ff88;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            z-index: 100;
        }

        #fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .mode-indicator {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            z-index: 100;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        マイクを許可して音楽や音声を再生してください
    </div>

    <div class="mode-indicator" id="modeIndicator"></div>

    <button id="fullscreen">全画面</button>

    <div class="controls">
        <button id="start">開始</button>
        <button id="mode1">波紋</button>
        <button id="mode2">渦巻き</button>
        <button id="mode3">爆発</button>
        <button id="mode4">流星</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let audioContext, analyser, microphone, dataArray;
        let isRunning = false;
        let currentMode = 'mode1';
        let particles = [];
        let time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, size, color, velocity) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.color = color;
                this.velocity = velocity;
                this.life = 1;
                this.decay = 0.01 + Math.random() * 0.02;
            }

            update() {
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.life -= this.decay;
                this.size *= 0.99;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function getRainbowColor(value) {
            const hue = (value * 360 + time) % 360;
            return `hsl(${hue}, 100%, 60%)`;
        }

        async function startAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;

                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);

                dataArray = new Uint8Array(analyser.frequencyBinCount);
                isRunning = true;
                document.getElementById('start').textContent = '停止';
                document.getElementById('start').classList.add('active');
                animate();
            } catch (err) {
                console.error('マイクアクセスエラー:', err);
                alert('マイクへのアクセスが許可されていません');
            }
        }

        function stopAudio() {
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            isRunning = false;
            document.getElementById('start').textContent = '開始';
            document.getElementById('start').classList.remove('active');
        }

        function getAverageFrequency() {
            if (!dataArray) return 0;
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            return sum / dataArray.length;
        }

        function getBassFrequency() {
            if (!dataArray) return 0;
            let sum = 0;
            for (let i = 0; i < 10; i++) {
                sum += dataArray[i];
            }
            return sum / 10;
        }

        // モード1: 波紋
        function drawMode1(avgFreq, bassFreq) {
            const centerX = width / 2;
            const centerY = height / 2;
            const radius = bassFreq * 2;

            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius + i * 50 + Math.sin(time + i) * 20, 0, Math.PI * 2);
                ctx.strokeStyle = getRainbowColor(avgFreq / 255 + i * 0.1);
                ctx.lineWidth = 3;
                ctx.shadowBlur = 20;
                ctx.shadowColor = ctx.strokeStyle;
                ctx.stroke();
            }

            // パーティクル生成
            if (bassFreq > 150) {
                for (let i = 0; i < 5; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 3;
                    particles.push(new Particle(
                        centerX,
                        centerY,
                        3 + bassFreq / 50,
                        getRainbowColor(Math.random()),
                        { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed }
                    ));
                }
            }
        }

        // モード2: 渦巻き
        function drawMode2(avgFreq, bassFreq) {
            const centerX = width / 2;
            const centerY = height / 2;

            for (let i = 0; i < dataArray.length; i++) {
                const angle = (i / dataArray.length) * Math.PI * 4 + time * 0.02;
                const radius = dataArray[i] * 1.5 + 50;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;

                ctx.beginPath();
                ctx.arc(x, y, 3 + dataArray[i] / 30, 0, Math.PI * 2);
                ctx.fillStyle = getRainbowColor(i / dataArray.length);
                ctx.shadowBlur = 15;
                ctx.shadowColor = ctx.fillStyle;
                ctx.fill();
            }

            if (avgFreq > 100) {
                for (let i = 0; i < 3; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 100 + Math.random() * 200;
                    particles.push(new Particle(
                        centerX + Math.cos(angle) * dist,
                        centerY + Math.sin(angle) * dist,
                        4 + avgFreq / 40,
                        getRainbowColor(Math.random()),
                        { x: Math.cos(angle + Math.PI/2) * 2, y: Math.sin(angle + Math.PI/2) * 2 }
                    ));
                }
            }
        }

        // モード3: 爆発
        function drawMode3(avgFreq, bassFreq) {
            const centerX = width / 2;
            const centerY = height / 2;

            // 中央の強い光
            if (bassFreq > 120) {
                const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, bassFreq * 2);
                gradient.addColorStop(0, getRainbowColor(0));
                gradient.addColorStop(0.5, getRainbowColor(0.3));
                gradient.addColorStop(1, 'transparent');

                ctx.beginPath();
                ctx.arc(centerX, centerY, bassFreq * 2, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }

            // 波状の線
            for (let j = 0; j < 5; j++) {
                ctx.beginPath();
                for (let i = 0; i < 100; i++) {
                    const angle = (i / 100) * Math.PI * 2;
                    const wave = Math.sin(angle * 10 + time * 0.1) * (avgFreq / 5);
                    const radius = 150 + j * 50 + wave;
                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;

                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.closePath();
                ctx.strokeStyle = getRainbowColor(j * 0.1);
                ctx.lineWidth = 2;
                ctx.shadowBlur = 10;
                ctx.shadowColor = ctx.strokeStyle;
                ctx.stroke();
            }

            if (bassFreq > 140) {
                for (let i = 0; i < 10; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 5 + Math.random() * 5;
                    particles.push(new Particle(
                        centerX,
                        centerY,
                        5 + bassFreq / 30,
                        getRainbowColor(Math.random()),
                        { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed }
                    ));
                }
            }
        }

        // モード4: 流星
        function drawMode4(avgFreq, bassFreq) {
            // 流星を生成
            if (Math.random() < 0.1) {
                const x = Math.random() * width;
                particles.push(new Particle(
                    x,
                    -10,
                    2 + avgFreq / 50,
                    getRainbowColor(Math.random()),
                    { x: (Math.random() - 0.5) * 2, y: 3 + Math.random() * 3 }
                ));
            }

            // 下部の周波数バー
            const barWidth = width / dataArray.length;
            for (let i = 0; i < dataArray.length; i++) {
                const barHeight = dataArray[i] * 1.5;
                const x = i * barWidth;
                const y = height - barHeight;

                const gradient = ctx.createLinearGradient(x, height, x, y);
                gradient.addColorStop(0, getRainbowColor(i / dataArray.length));
                gradient.addColorStop(1, 'transparent');

                ctx.fillStyle = gradient;
                ctx.fillRect(x, y, barWidth - 1, barHeight);
            }

            if (bassFreq > 130) {
                for (let i = 0; i < 5; i++) {
                    const x = Math.random() * width;
                    particles.push(new Particle(
                        x,
                        height,
                        3 + bassFreq / 50,
                        getRainbowColor(Math.random()),
                        { x: (Math.random() - 0.5) * 4, y: -(3 + Math.random() * 4) }
                    ));
                }
            }
        }

        function animate() {
            if (!isRunning) return;

            analyser.getByteFrequencyData(dataArray);

            // 背景をフェード
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            const avgFreq = getAverageFrequency();
            const bassFreq = getBassFrequency();

            // モードに応じて描画
            switch (currentMode) {
                case 'mode1':
                    drawMode1(avgFreq, bassFreq);
                    break;
                case 'mode2':
                    drawMode2(avgFreq, bassFreq);
                    break;
                case 'mode3':
                    drawMode3(avgFreq, bassFreq);
                    break;
                case 'mode4':
                    drawMode4(avgFreq, bassFreq);
                    break;
            }

            // パーティクルを更新・描画
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            time++;
            requestAnimationFrame(animate);
        }

        // イベントリスナー
        document.getElementById('start').addEventListener('click', () => {
            if (isRunning) {
                stopAudio();
            } else {
                startAudio();
            }
        });

        document.getElementById('mode1').addEventListener('click', () => {
            currentMode = 'mode1';
            updateModeButtons();
            document.getElementById('modeIndicator').textContent = '🌊 波紋モード';
        });

        document.getElementById('mode2').addEventListener('click', () => {
            currentMode = 'mode2';
            updateModeButtons();
            document.getElementById('modeIndicator').textContent = '🌀 渦巻きモード';
        });

        document.getElementById('mode3').addEventListener('click', () => {
            currentMode = 'mode3';
            updateModeButtons();
            document.getElementById('modeIndicator').textContent = '💥 爆発モード';
        });

        document.getElementById('mode4').addEventListener('click', () => {
            currentMode = 'mode4';
            updateModeButtons();
            document.getElementById('modeIndicator').textContent = '☄️ 流星モード';
        });

        function updateModeButtons() {
            ['mode1', 'mode2', 'mode3', 'mode4'].forEach(id => {
                const btn = document.getElementById(id);
                if (id === currentMode) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        document.getElementById('fullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // 初期状態
        updateModeButtons();
        document.getElementById('modeIndicator').textContent = '🌊 波紋モード';
    </script>
</body>
</html>
