<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音声波形ビジュアライザー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 3rem);
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d4ff, #9b59b6, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }

        .subtitle {
            color: #888;
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            margin-bottom: 20px;
            text-align: center;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            background: linear-gradient(45deg, #00d4ff, #9b59b6);
            color: white;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .visualizer-container {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16 / 9;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 8px 16px;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .mode-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .mode-btn.active {
            background: linear-gradient(45deg, #00d4ff, #9b59b6);
            border-color: transparent;
        }

        .status {
            margin-top: 20px;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            text-align: center;
            font-size: 0.95rem;
            color: #aaa;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .visualizer-wrapper {
            position: relative;
            width: 100%;
            max-width: 900px;
        }

        .info {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #666;
            text-align: center;
        }

        @media (max-width: 600px) {
            .controls {
                flex-direction: column;
                width: 100%;
            }

            button {
                width: 100%;
            }

            .mode-selector {
                width: 100%;
            }

            .mode-btn {
                flex: 1;
                min-width: 80px;
            }
        }
    </style>
</head>
<body>
    <h1>🎤 音声波形ビジュアライザー</h1>
    <p class="subtitle">あなたの声を美しいアートに変換</p>

    <div class="controls">
        <button id="startBtn">🎙️ マイクを開始</button>
        <button id="stopBtn" disabled>⏹️ 停止</button>
    </div>

    <div class="mode-selector">
        <button class="mode-btn active" data-mode="waveform">波形</button>
        <button class="mode-btn" data-mode="frequency">周波数</button>
        <button class="mode-btn" data-mode="circular">円形</button>
    </div>

    <div class="visualizer-wrapper">
        <button class="fullscreen-btn" id="fullscreenBtn">⛶ 全画面</button>
        <div class="visualizer-container">
            <canvas id="visualizer"></canvas>
        </div>
    </div>

    <div class="status" id="status">「マイクを開始」をクリックしてください</div>

    <p class="info">💡 ヒント: 音楽を流したり、歌ったり、話しかけたりしてみてください</p>

    <script>
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const status = document.getElementById('status');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const modeBtns = document.querySelectorAll('.mode-btn');

        let audioContext;
        let analyser;
        let microphone;
        let animationId;
        let currentMode = 'waveform';

        // Canvas size
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth * window.devicePixelRatio;
            canvas.height = container.clientHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Start microphone
        async function startMicrophone() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);

                analyser.fftSize = 2048;
                microphone.connect(analyser);

                startBtn.disabled = true;
                stopBtn.disabled = false;
                status.textContent = '🎵 音声をキャプチャ中... 音を発してみてください！';

                visualize();
            } catch (err) {
                console.error('Error accessing microphone:', err);
                status.textContent = '❌ マイクへのアクセスが拒否されました';
            }
        }

        // Stop microphone
        function stopMicrophone() {
            if (audioContext) {
                audioContext.close();
            }
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            startBtn.disabled = false;
            stopBtn.disabled = true;
            status.textContent = '「マイクを開始」をクリックしてください';

            // Clear canvas
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Visualize
        function visualize() {
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function draw() {
                animationId = requestAnimationFrame(draw);

                const width = canvas.width / window.devicePixelRatio;
                const height = canvas.height / window.devicePixelRatio;

                // Fade effect
                ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                ctx.fillRect(0, 0, width, height);

                if (currentMode === 'waveform') {
                    analyser.getByteTimeDomainData(dataArray);
                    drawWaveform(dataArray, width, height);
                } else if (currentMode === 'frequency') {
                    analyser.getByteFrequencyData(dataArray);
                    drawFrequency(dataArray, width, height);
                } else if (currentMode === 'circular') {
                    analyser.getByteFrequencyData(dataArray);
                    drawCircular(dataArray, width, height);
                }
            }

            draw();
        }

        // Waveform
        function drawWaveform(dataArray, width, height) {
            ctx.lineWidth = 2;
            ctx.strokeStyle = 'hsl(' + (Date.now() / 20) + ', 100%, 50%)';
            ctx.beginPath();

            const sliceWidth = width / dataArray.length;
            let x = 0;

            for (let i = 0; i < dataArray.length; i++) {
                const v = dataArray[i] / 128.0;
                const y = (v * height) / 2;

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }

                x += sliceWidth;
            }

            ctx.lineTo(width, height / 2);
            ctx.stroke();
        }

        // Frequency bars
        function drawFrequency(dataArray, width, height) {
            const barCount = 64;
            const barWidth = width / barCount;
            const step = Math.floor(dataArray.length / barCount);

            for (let i = 0; i < barCount; i++) {
                const value = dataArray[i * step];
                const barHeight = (value / 255) * height * 0.8;

                const hue = (i / barCount) * 360 + (Date.now() / 50);
                const gradient = ctx.createLinearGradient(0, height, 0, height - barHeight);
                gradient.addColorStop(0, `hsl(${hue}, 100%, 50%)`);
                gradient.addColorStop(1, `hsl(${hue + 60}, 100%, 70%)`);

                ctx.fillStyle = gradient;
                ctx.fillRect(i * barWidth, height - barHeight, barWidth - 2, barHeight);
            }
        }

        // Circular
        function drawCircular(dataArray, width, height) {
            const centerX = width / 2;
            const centerY = height / 2;
            const radius = Math.min(width, height) * 0.25;

            const barCount = 180;
            const step = Math.floor(dataArray.length / barCount);

            for (let i = 0; i < barCount; i++) {
                const value = dataArray[i * step];
                const barHeight = (value / 255) * radius;

                const angle = (i / barCount) * Math.PI * 2 - Math.PI / 2;
                const x1 = centerX + Math.cos(angle) * radius;
                const y1 = centerY + Math.sin(angle) * radius;
                const x2 = centerX + Math.cos(angle) * (radius + barHeight);
                const y2 = centerY + Math.sin(angle) * (radius + barHeight);

                const hue = (i / barCount) * 360 + (Date.now() / 50);
                ctx.strokeStyle = `hsl(${hue}, 100%, 50%)`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }

            // Center circle
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius);
            gradient.addColorStop(0, 'rgba(0, 212, 255, 0.3)');
            gradient.addColorStop(1, 'rgba(155, 89, 182, 0.1)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fill();
        }

        // Event listeners
        startBtn.addEventListener('click', startMicrophone);
        stopBtn.addEventListener('click', stopMicrophone);

        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                modeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
            });
        });

        fullscreenBtn.addEventListener('click', () => {
            const container = document.querySelector('.visualizer-container');
            if (document.fullscreenElement) {
                document.exitFullscreen();
                fullscreenBtn.textContent = '⛶ 全画面';
            } else {
                container.requestFullscreen();
                fullscreenBtn.textContent = '⛶ 退出';
            }
        });
    </script>
</body>
</html>
