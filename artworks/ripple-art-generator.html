<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波紋アートジェネレーター</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .info h1 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #0ff;
        }

        .info p {
            margin: 5px 0;
            opacity: 0.8;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .clear-btn {
            position: fixed;
            top: 70px;
            right: 20px;
            background: rgba(255, 100, 100, 0.2);
            color: #fff;
            border: 1px solid rgba(255, 100, 100, 0.4);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .clear-btn:hover {
            background: rgba(255, 100, 100, 0.3);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="info">
        <h1>🌊 波紋アートジェネレーター</h1>
        <p>クリック/タップで波紋を生成</p>
        <p>色が時間とともに変化します</p>
    </div>
    
    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>
    <button class="clear-btn" id="clearBtn">クリア</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const clearBtn = document.getElementById('clearBtn');

        let ripples = [];
        let hue = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Ripple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.max(canvas.width, canvas.height) * 0.8;
                this.speed = 3;
                this.hue = hue;
                this.alpha = 1;
                this.lineWidth = 3;
            }

            update() {
                this.radius += this.speed;
                this.alpha = 1 - (this.radius / this.maxRadius);
                this.lineWidth = 3 * this.alpha;
                return this.alpha > 0;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                
                // メインの波紋
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsl(${this.hue}, 100%, 50%)`;
                ctx.lineWidth = this.lineWidth;
                ctx.stroke();

                // 内側の波紋（複数）
                for (let i = 1; i <= 3; i++) {
                    const innerRadius = this.radius - (i * 30);
                    if (innerRadius > 0) {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, innerRadius, 0, Math.PI * 2);
                        ctx.strokeStyle = `hsl(${(this.hue + i * 20) % 360}, 100%, 60%)`;
                        ctx.lineWidth = this.lineWidth * (1 - i * 0.2);
                        ctx.stroke();
                    }
                }

                ctx.restore();
            }
        }

        function createRipple(x, y) {
            ripples.push(new Ripple(x, y));
            hue = (hue + 30) % 360;
        }

        canvas.addEventListener('click', (e) => {
            createRipple(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let touch of e.touches) {
                createRipple(touch.clientX, touch.clientY);
            }
        });

        function animate() {
            // 半透明の黒でフェード効果
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 波紋を更新・描画
            ripples = ripples.filter(ripple => {
                ripple.draw();
                return ripple.update();
            });

            requestAnimationFrame(animate);
        }

        animate();

        // 全画面ボタン
        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // クリアボタン
        clearBtn.addEventListener('click', () => {
            ripples = [];
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        });

        // 自動的に波紋を生成（デモ）
        let autoRipple = setInterval(() => {
            const x = Math.random() * canvas.width;
            const y = Math.random() * canvas.height;
            createRipple(x, y);
        }, 2000);

        // 最初の波紋
        setTimeout(() => {
            createRipple(canvas.width / 2, canvas.height / 2);
        }, 500);
    </script>
</body>
</html>
