<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ripple Waves - 水面の波紋</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            color: white;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #aaa;
            margin-bottom: 20px;
            font-size: 1rem;
        }

        #canvas {
            border: 2px solid rgba(0, 217, 255, 0.3);
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.3);
            cursor: pointer;
            touch-action: none;
            max-width: 100%;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: linear-gradient(45deg, #00d9ff, #00ff88);
            border: none;
            color: #1a1a2e;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            margin-top: 20px;
            color: #888;
            font-size: 0.9rem;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 217, 255, 0.3);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 217, 255, 0.5);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">📺 全画面</button>
    
    <div class="container">
        <h1>🌊 Ripple Waves</h1>
        <p class="subtitle">クリックで波紋を広げよう</p>
        
        <canvas id="canvas"></canvas>
        
        <div class="controls">
            <button onclick="clearAll()">🗑️ クリア</button>
            <button onclick="toggleAuto()">⚡ 自動生成</button>
        </div>
        
        <p class="info">💡 キャンバスをクリックorタップして波紋を作成</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // キャンバスサイズ設定
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 800);
            const maxHeight = Math.min(window.innerHeight - 250, 500);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 波紋クラス
        class Ripple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.random() * 150 + 100;
                this.speed = Math.random() * 2 + 1;
                this.alpha = 1;
                this.hue = Math.random() * 60 + 160; // 水色系
            }

            update() {
                this.radius += this.speed;
                this.alpha = 1 - (this.radius / this.maxRadius);
                return this.alpha > 0;
            }

            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 80%, 60%, ${this.alpha})`;
                ctx.lineWidth = 3;
                ctx.stroke();

                // 2番目の波
                if (this.radius > 20) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius - 20, 0, Math.PI * 2);
                    ctx.strokeStyle = `hsla(${this.hue + 20}, 70%, 50%, ${this.alpha * 0.5})`;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                // 3番目の波
                if (this.radius > 40) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius - 40, 0, Math.PI * 2);
                    ctx.strokeStyle = `hsla(${this.hue + 40}, 60%, 40%, ${this.alpha * 0.3})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
        }

        let ripples = [];
        let autoMode = false;
        let autoInterval = null;

        // アニメーションループ
        function animate() {
            // 背景クリア（少し残す）
            ctx.fillStyle = 'rgba(26, 26, 46, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 波紋更新
            ripples = ripples.filter(ripple => {
                ripple.draw(ctx);
                return ripple.update();
            });

            requestAnimationFrame(animate);
        }
        animate();

        // クリックイベント
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            ripples.push(new Ripple(x, y));
        });

        // タッチイベント
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            for (let touch of e.touches) {
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;
                ripples.push(new Ripple(x, y));
            }
        });

        // クリア
        function clearAll() {
            ripples = [];
            ctx.fillStyle = 'rgba(26, 26, 46, 1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // 自動生成
        function toggleAuto() {
            autoMode = !autoMode;
            if (autoMode) {
                autoInterval = setInterval(() => {
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * canvas.height;
                    ripples.push(new Ripple(x, y));
                }, 500);
            } else {
                clearInterval(autoInterval);
            }
        }

        // 全画面
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期波紋
        setTimeout(() => {
            ripples.push(new Ripple(canvas.width / 2, canvas.height / 2));
        }, 500);
    </script>
</body>
</html>
