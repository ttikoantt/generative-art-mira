<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generative Tree with Seasons</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            transition: background 1s ease;
        }

        .spring { background: linear-gradient(180deg, #87CEEB 0%, #98FB98 100%); }
        .summer { background: linear-gradient(180deg, #4A90D9 0%, #228B22 100%); }
        .autumn { background: linear-gradient(180deg, #FFA500 0%, #8B4513 100%); }
        .winter { background: linear-gradient(180deg, #E0E0E0 0%, #FFFFFF 100%); }

        #canvas {
            display: block;
            cursor: pointer;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .season-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .season-btn:hover {
            transform: scale(1.05);
        }

        .spring-btn { background: #FF69B4; color: white; }
        .summer-btn { background: #228B22; color: white; }
        .autumn-btn { background: #FF8C00; color: white; }
        .winter-btn { background: #4169E1; color: white; }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 14px;
            max-width: 300px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 0, 0, 0.9);
        }

        @media (max-width: 768px) {
            .season-btn {
                padding: 10px 16px;
                font-size: 12px;
            }

            .info {
                font-size: 12px;
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body class="spring">
    <canvas id="canvas"></canvas>

    <div class="controls">
        <button class="season-btn spring-btn" onclick="setSeason('spring')">🌸 春</button>
        <button class="season-btn summer-btn" onclick="setSeason('summer')">☀️ 夏</button>
        <button class="season-btn autumn-btn" onclick="setSeason('autumn')">🍂 秋</button>
        <button class="season-btn winter-btn" onclick="setSeason('winter')">❄️ 冬</button>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="info">
        <strong>Generative Tree</strong><br>
        クリックで新しい木を生成<br>
        季節ボタンで雰囲気を変更
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let currentSeason = 'spring';
        let windAngle = 0;
        let leaves = [];

        const seasonColors = {
            spring: {
                trunk: '#8B4513',
                leaves: ['#FF69B4', '#FFB6C1', '#FFC0CB', '#FF1493', '#DB7093'],
                leafSize: 8,
                leafCount: 150,
                bgClass: 'spring'
            },
            summer: {
                trunk: '#654321',
                leaves: ['#228B22', '#32CD32', '#006400', '#90EE90', '#3CB371'],
                leafSize: 10,
                leafCount: 200,
                bgClass: 'summer'
            },
            autumn: {
                trunk: '#8B4513',
                leaves: ['#FF8C00', '#FF6347', '#FF4500', '#FFD700', '#DC143C'],
                leafSize: 9,
                leafCount: 120,
                bgClass: 'autumn'
            },
            winter: {
                trunk: '#696969',
                leaves: ['#FFFFFF', '#F0F8FF', '#E6E6FA', '#FFFAFA', '#F5F5F5'],
                leafSize: 5,
                leafCount: 80,
                bgClass: 'winter'
            }
        };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function setSeason(season) {
            currentSeason = season;
            document.body.className = seasonColors[season].bgClass;
            generateTree();
        }

        function drawBranch(x, y, length, angle, depth) {
            if (depth === 0) {
                // 葉を描画
                const colors = seasonColors[currentSeason].leaves;
                const color = colors[Math.floor(Math.random() * colors.length)];
                const leafSize = seasonColors[currentSeason].leafSize;

                ctx.beginPath();
                ctx.arc(x, y, leafSize + Math.random() * 3, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();

                leaves.push({
                    x: x,
                    y: y,
                    size: leafSize,
                    color: color,
                    vx: (Math.random() - 0.5) * 2,
                    vy: Math.random() * 2 + 1,
                    rotation: Math.random() * Math.PI * 2
                });

                return;
            }

            const endX = x + length * Math.cos(angle);
            const endY = y + length * Math.sin(angle);

            // 幹を描画
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = seasonColors[currentSeason].trunk;
            ctx.lineWidth = depth * 2;
            ctx.lineCap = 'round';
            ctx.stroke();

            // 風の影響
            const wind = Math.sin(windAngle + depth * 0.5) * 0.05;

            // 再帰的に枝を描画
            const branchCount = 2 + Math.floor(Math.random() * 2);
            for (let i = 0; i < branchCount; i++) {
                const newLength = length * (0.6 + Math.random() * 0.2);
                const newAngle = angle + (Math.random() - 0.5) * Math.PI / 2 + wind;
                drawBranch(endX, endY, newLength, newAngle, depth - 1);
            }
        }

        function generateTree() {
            leaves = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const startX = canvas.width / 2;
            const startY = canvas.height;
            const initialLength = Math.min(canvas.width, canvas.height) * 0.2;
            const initialDepth = 8;

            drawBranch(startX, startY, initialLength, -Math.PI / 2, initialDepth);
        }

        function animate() {
            windAngle += 0.02;

            // 落ち葉アニメーション
            if (leaves.length > 0) {
                leaves.forEach((leaf, index) => {
                    leaf.y += leaf.vy;
                    leaf.x += leaf.vx + Math.sin(windAngle) * 0.5;
                    leaf.rotation += 0.02;

                    ctx.save();
                    ctx.translate(leaf.x, leaf.y);
                    ctx.rotate(leaf.rotation);
                    ctx.beginPath();
                    ctx.ellipse(0, 0, leaf.size, leaf.size / 2, 0, 0, Math.PI * 2);
                    ctx.fillStyle = leaf.color;
                    ctx.globalAlpha = 0.8;
                    ctx.fill();
                    ctx.restore();

                    if (leaf.y > canvas.height) {
                        leaves.splice(index, 1);
                    }
                });
            }

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        canvas.addEventListener('click', (e) => {
            generateTree();
        });

        window.addEventListener('resize', () => {
            resizeCanvas();
            generateTree();
        });

        // 初期化
        resizeCanvas();
        generateTree();
        animate();
    </script>
</body>
</html>
