<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Flow Field</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 20px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 11px;
            z-index: 100;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="info">
        <div>Particle Flow Field</div>
        <div>パーティクルがノイズフィールドに従って流れる</div>
        <div>クリック/ドラッグで影響を与える</div>
    </div>

    <canvas id="canvas"></canvas>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="controls">
        <button onclick="reset()">リセット</button>
        <button onclick="changeColorScheme()">色変更</button>
        <button onclick="toggleTrails()">軌跡: <span id="trailsStatus">ON</span></button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let flowField = [];
        let cols, rows;
        const scale = 20;
        let noiseOffset = 0;
        let showTrails = true;

        // Color schemes
        const colorSchemes = [
            ['#00ffff', '#0080ff', '#8000ff', '#ff00ff', '#ff0080'],
            ['#00ff80', '#00ff00', '#80ff00', '#ffff00', '#ff8000'],
            ['#ff0080', '#ff0040', '#ff4000', '#ff8000', '#ffbf00'],
            ['#00ffff', '#ffffff', '#0080ff', '#8000ff', '#ff00ff'],
            ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff']
        ];
        let currentScheme = 0;

        // Mouse/touch interaction
        let mouse = { x: null, y: null, radius: 150 };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            cols = Math.floor(width / scale) + 1;
            rows = Math.floor(height / scale) + 1;
            initFlowField();
            initParticles();
        }

        // Simplex-like noise
        function noise(x, y, z) {
            const p = [
                [151,160,137,91,90,15,131,13,201,95,96,53,194,233,7,225,140,36,103,30,69,142,8,99,37,240,21,10,23,190,6,148,247,120,234,75,0,26,197,62,94,252,219,203,117,35,11,32,57,177,33,88,237,149,56,87,174,20,125,136,171,168,68,175,74,165,71,134,139,48,27,166,77,146,158,231,83,111,229,122,60,211,133,230,220,105,92,41,55,46,245,40,244,102,143,54,65,25,63,161,1,216,80,73,209,76,132,187,208,89,18,169,200,196,135,130,116,188,159,86,164,100,109,198,173,186,3,64,52,217,226,250,124,123,5,202,38,147,118,126,255,82,85,212,207,206,59,227,47,16,58,17,182,189,28,42,223,183,170,213,119,248,152,2,44,154,163,70,221,153,101,155,167,43,172,9,129,22,39,253,19,98,108,110,79,113,224,232,178,185,112,104,218,246,97,228,251,34,242,193,238,210,144,12,191,179,162,241,81,51,145,235,249,14,239,107,49,192,214,31,181,199,106,157,184,84,204,176,115,121,50,45,127,4,150,254,138,236,205,93,222,114,67,29,24,72,243,141,128,195,78,66,215,61,156,180],
                [23,45,67,89,111,133,155,177,199,221,243,21,43,65,87,109,131,153,175,197,219,241,19,41,63,85,107,129,151,173,195,217,239,25,47,69,91,113,135,157,179,201,223,3,27,49,71,93,115,137,159,181,203,225,7,29,51,73,95,117,139,161,183,205,227,1,33,55,77,99,121,143,165,187,209,231,11,35,57,79,101,123,145,167,189,211,233,9,31,53,75,97,119,141,163,185,207,229,5,39,61,83,105,127,149,171,193,215,237,15,37,59,81,103,125,147,169,191,213,235,13]
            ];

            const X = Math.floor(x) & 255;
            const Y = Math.floor(y) & 255;
            const Z = Math.floor(z) & 255;

            x -= Math.floor(x);
            y -= Math.floor(y);
            z -= Math.floor(z);

            const u = fade(x);
            const v = fade(y);
            const w = fade(z);

            const A = p[0][X] + Y;
            const AA = p[0][A] + Z;
            const AB = p[0][A + 1] + Z;
            const B = p[0][X + 1] + Y;
            const BA = p[0][B] + Z;
            const BB = p[0][B + 1] + Z;

            return lerp(w,
                lerp(v,
                    lerp(u, grad(p[0][AA], x, y, z), grad(p[0][BA], x - 1, y, z)),
                    lerp(u, grad(p[0][AB], x, y - 1, z), grad(p[0][BB], x - 1, y - 1, z))
                ),
                lerp(v,
                    lerp(u, grad(p[0][AA + 1], x, y, z - 1), grad(p[0][BA + 1], x - 1, y, z - 1)),
                    lerp(u, grad(p[0][AB + 1], x, y - 1, z - 1), grad(p[0][BB + 1], x - 1, y - 1, z - 1))
                )
            );
        }

        function fade(t) {
            return t * t * t * (t * (t * 6 - 15) + 10);
        }

        function lerp(t, a, b) {
            return a + t * (b - a);
        }

        function grad(hash, x, y, z) {
            const h = hash & 15;
            const u = h < 8 ? x : y;
            const v = h < 4 ? y : h === 12 || h === 14 ? x : z;
            return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
        }

        function initFlowField() {
            flowField = [];
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const angle = noise(x * 0.1, y * 0.1, noiseOffset) * Math.PI * 4;
                    flowField.push(angle);
                }
            }
        }

        function initParticles() {
            particles = [];
            const particleCount = 1000;

            for (let i = 0; i < particleCount; i++) {
                const scheme = colorSchemes[currentScheme];
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: 0,
                    vy: 0,
                    color: scheme[Math.floor(Math.random() * scheme.length)],
                    size: Math.random() * 2 + 1,
                    alpha: Math.random() * 0.5 + 0.5,
                    life: Math.random() * 100 + 100
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];

                const col = Math.floor(p.x / scale);
                const row = Math.floor(p.y / scale);
                const index = col + row * cols;

                if (index >= 0 && index < flowField.length) {
                    const angle = flowField[index];
                    p.vx += Math.cos(angle) * 0.5;
                    p.vy += Math.sin(angle) * 0.5;
                }

                // Mouse interaction
                if (mouse.x !== null && mouse.y !== null) {
                    const dx = mouse.x - p.x;
                    const dy = mouse.y - p.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < mouse.radius) {
                        const force = (mouse.radius - dist) / mouse.radius;
                        p.vx += (dx / dist) * force * 2;
                        p.vy += (dy / dist) * force * 2;
                    }
                }

                // Limit speed
                const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
                if (speed > 3) {
                    p.vx = (p.vx / speed) * 3;
                    p.vy = (p.vy / speed) * 3;
                }

                p.x += p.vx;
                p.y += p.vy;

                // Wrap around edges
                if (p.x < 0) p.x = width;
                if (p.x > width) p.x = 0;
                if (p.y < 0) p.y = height;
                if (p.y > height) p.y = 0;

                p.vx *= 0.95;
                p.vy *= 0.95;

                p.life--;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    const scheme = colorSchemes[currentScheme];
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        vx: 0,
                        vy: 0,
                        color: scheme[Math.floor(Math.random() * scheme.length)],
                        size: Math.random() * 2 + 1,
                        alpha: Math.random() * 0.5 + 0.5,
                        life: Math.random() * 100 + 100
                    });
                }
            }
        }

        function draw() {
            if (showTrails) {
                ctx.fillStyle = 'rgba(10, 10, 15, 0.05)';
            } else {
                ctx.fillStyle = 'rgba(10, 10, 15, 1)';
            }
            ctx.fillRect(0, 0, width, height);

            for (const p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.alpha;
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            noiseOffset += 0.005;
            initFlowField();
        }

        function animate() {
            updateParticles();
            draw();
            requestAnimationFrame(animate);
        }

        function reset() {
            noiseOffset = Math.random() * 1000;
            initFlowField();
            initParticles();
        }

        function changeColorScheme() {
            currentScheme = (currentScheme + 1) % colorSchemes.length;
            initParticles();
        }

        function toggleTrails() {
            showTrails = !showTrails;
            document.getElementById('trailsStatus').textContent = showTrails ? 'ON' : 'OFF';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Event listeners
        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener('mousedown', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            mouse.radius = 250;
        });

        canvas.addEventListener('mouseup', () => {
            mouse.radius = 150;
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // Touch events
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
            mouse.radius = 250;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', () => {
            mouse.radius = 150;
            setTimeout(() => {
                mouse.x = null;
                mouse.y = null;
            }, 100);
        });

        window.addEventListener('resize', resize);

        // Initialize
        resize();
        animate();
    </script>
</body>
</html>
