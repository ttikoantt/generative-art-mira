<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Flow Field - Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0f;
            color: #fff;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        canvas {
            flex: 1;
            display: block;
            cursor: crosshair;
        }

        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 15, 0.9);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 280px;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .controls h1 {
            font-size: 18px;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .controls p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 15px;
        }

        .control-group {
            margin-bottom: 12px;
        }

        .control-group label {
            display: block;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .control-group input[type="range"] {
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
        }

        .buttons {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }

        .buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .buttons button.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .buttons button.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .buttons button.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .buttons button.secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .stats {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(10, 10, 15, 0.9);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .stats span {
            color: #667eea;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .controls {
                max-width: 240px;
                padding: 15px;
            }

            .controls h1 {
                font-size: 16px;
            }

            .fullscreen-btn {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="canvas"></canvas>

        <div class="controls">
            <h1>🌊 Particle Flow Field</h1>
            <p>マウスで粒子を誘導</p>

            <div class="control-group">
                <label>粒子数: <span id="particleCountValue">2000</span></label>
                <input type="range" id="particleCount" min="500" max="5000" value="2000" step="100">
            </div>

            <div class="control-group">
                <label>ノイズスケール: <span id="noiseScaleValue">0.005</span></label>
                <input type="range" id="noiseScale" min="0.001" max="0.02" value="0.005" step="0.001">
            </div>

            <div class="control-group">
                <label>速度: <span id="speedValue">2.0</span></label>
                <input type="range" id="speed" min="0.5" max="5.0" value="2.0" step="0.1">
            </div>

            <div class="control-group">
                <label>トレイル長さ: <span id="trailValue">0.92</span></label>
                <input type="range" id="trail" min="0.8" max="0.98" value="0.92" step="0.01">
            </div>

            <div class="buttons">
                <button class="primary" id="resetBtn">リセット</button>
                <button class="secondary" id="randomizeBtn">ランダム</button>
            </div>
        </div>

        <button class="fullscreen-btn" id="fullscreenBtn" title="全画面表示">⛶</button>

        <div class="stats">
            粒子: <span id="stats">2000</span> | FPS: <span id="fps">60</span>
        </div>
    </div>

    <script>
        // Canvas setup
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Settings
        let settings = {
            particleCount: 2000,
            noiseScale: 0.005,
            speed: 2.0,
            trail: 0.92
        };

        // Mouse position
        let mouse = { x: null, y: null, radius: 150 };

        // Perlin noise implementation
        class PerlinNoise {
            constructor() {
                this.permutation = [];
                for (let i = 0; i < 256; i++) {
                    this.permutation[i] = i;
                }
                // Shuffle
                for (let i = 255; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.permutation[i], this.permutation[j]] = [this.permutation[j], this.permutation[i]];
                }
                // Duplicate for overflow
                this.permutation = [...this.permutation, ...this.permutation];
            }

            fade(t) {
                return t * t * t * (t * (t * 6 - 15) + 10);
            }

            lerp(a, b, t) {
                return a + t * (b - a);
            }

            grad(hash, x, y) {
                const h = hash & 3;
                const u = h < 2 ? x : y;
                const v = h < 2 ? y : x;
                return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
            }

            noise(x, y) {
                const X = Math.floor(x) & 255;
                const Y = Math.floor(y) & 255;

                x -= Math.floor(x);
                y -= Math.floor(y);

                const u = this.fade(x);
                const v = this.fade(y);

                const A = this.permutation[X] + Y;
                const B = this.permutation[X + 1] + Y;

                return this.lerp(
                    this.lerp(this.grad(this.permutation[A], x, y), this.grad(this.permutation[B], x - 1, y), u),
                    this.lerp(this.grad(this.permutation[A + 1], x, y - 1), this.grad(this.permutation[B + 1], x - 1, y - 1), u),
                    v
                );
            }
        }

        const perlin = new PerlinNoise();

        // Particle class
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = 0;
                this.vy = 0;
                this.hue = Math.random() * 60 + 200; // Blue to purple range
                this.life = Math.random() * 100 + 100;
            }

            update() {
                // Get noise value
                const angle = perlin.noise(this.x * settings.noiseScale, this.y * settings.noiseScale) * Math.PI * 4;

                // Calculate velocity from noise
                this.vx += Math.cos(angle) * 0.1;
                this.vy += Math.sin(angle) * 0.1;

                // Mouse attraction
                if (mouse.x !== null && mouse.y !== null) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < mouse.radius) {
                        const force = (mouse.radius - dist) / mouse.radius;
                        this.vx += (dx / dist) * force * 0.5;
                        this.vy += (dy / dist) * force * 0.5;
                    }
                }

                // Limit speed
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > settings.speed) {
                    this.vx = (this.vx / speed) * settings.speed;
                    this.vy = (this.vy / speed) * settings.speed;
                }

                // Update position
                this.x += this.vx;
                this.y += this.vy;

                // Wrap around edges
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;

                // Update life and hue
                this.life--;
                if (this.life <= 0) {
                    this.reset();
                }
                this.hue = (this.hue + 0.1) % 360;
            }

            draw() {
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                const alpha = Math.min(this.life / 100, 1) * (speed / settings.speed);
                const lightness = 50 + speed * 10;

                ctx.fillStyle = `hsla(${this.hue}, 80%, ${lightness}%, ${alpha})`;
                ctx.fillRect(this.x, this.y, 2, 2);
            }
        }

        // Particles array
        let particles = [];

        // Initialize particles
        function initParticles() {
            particles = [];
            for (let i = 0; i < settings.particleCount; i++) {
                particles.push(new Particle());
            }
        }

        // FPS tracking
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;

        // Animation loop
        function animate() {
            // Calculate FPS
            frameCount++;
            const currentTime = performance.now();
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                document.getElementById('fps').textContent = fps;
            }

            // Trail effect
            ctx.fillStyle = `rgba(10, 10, 15, ${1 - settings.trail})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update and draw particles
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            requestAnimationFrame(animate);
        }

        // Resize canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        // Event listeners
        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // Control listeners
        document.getElementById('particleCount').addEventListener('input', (e) => {
            settings.particleCount = parseInt(e.target.value);
            document.getElementById('particleCountValue').textContent = settings.particleCount;
            initParticles();
            document.getElementById('stats').textContent = settings.particleCount;
        });

        document.getElementById('noiseScale').addEventListener('input', (e) => {
            settings.noiseScale = parseFloat(e.target.value);
            document.getElementById('noiseScaleValue').textContent = settings.noiseScale.toFixed(3);
        });

        document.getElementById('speed').addEventListener('input', (e) => {
            settings.speed = parseFloat(e.target.value);
            document.getElementById('speedValue').textContent = settings.speed.toFixed(1);
        });

        document.getElementById('trail').addEventListener('input', (e) => {
            settings.trail = parseFloat(e.target.value);
            document.getElementById('trailValue').textContent = settings.trail.toFixed(2);
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            initParticles();
        });

        document.getElementById('randomizeBtn').addEventListener('click', () => {
            settings.particleCount = Math.floor(Math.random() * 4000) + 1000;
            settings.noiseScale = Math.random() * 0.015 + 0.002;
            settings.speed = Math.random() * 3.0 + 1.0;
            settings.trail = Math.random() * 0.15 + 0.82;

            document.getElementById('particleCount').value = settings.particleCount;
            document.getElementById('noiseScale').value = settings.noiseScale;
            document.getElementById('speed').value = settings.speed;
            document.getElementById('trail').value = settings.trail;

            document.getElementById('particleCountValue').textContent = settings.particleCount;
            document.getElementById('noiseScaleValue').textContent = settings.noiseScale.toFixed(3);
            document.getElementById('speedValue').textContent = settings.speed.toFixed(1);
            document.getElementById('trailValue').textContent = settings.trail.toFixed(2);

            initParticles();
            document.getElementById('stats').textContent = settings.particleCount;
        });

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Initialize
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        initParticles();
        animate();
    </script>
</body>
</html>
