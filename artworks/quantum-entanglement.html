<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Entanglement - 量子もつれ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #0ff;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        .info h1 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #0ff;
        }

        .info p {
            font-size: 12px;
            color: #0aa;
            line-height: 1.6;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 255, 0.2);
            color: #0ff;
            border: 1px solid #0ff;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 255, 0.4);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <h1>⚛️ Quantum Entanglement</h1>
        <p>量子もつれを視覚化<br>2つの粒子が互いに影響し合う</p>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let entanglementStrength = 0.8;
        let time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, id) {
                this.baseX = x;
                this.baseY = y;
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.id = id;
                this.hue = id === 0 ? 180 : 300; // Cyan and Magenta
                this.size = 15;
                this.trail = [];
                this.maxTrail = 50;
            }

            update(entangledParticle) {
                time += 0.01;

                // Quantum fluctuations
                const fluctuationX = Math.sin(time * 2 + this.id * Math.PI) * 2;
                const fluctuationY = Math.cos(time * 3 + this.id * Math.PI * 2) * 2;

                // Entanglement force - particles influence each other
                const dx = entangledParticle.x - this.x;
                const dy = entangledParticle.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                // Quantum entanglement: synchronize movements
                const syncForce = entanglementStrength * 0.5;
                this.vx += (entangledParticle.vx - this.vx) * syncForce;
                this.vy += (entangledParticle.vy - this.vy) * syncForce;

                // Attraction to maintain entanglement
                const attractionStrength = 0.0003;
                this.vx += dx * attractionStrength;
                this.vy += dy * attractionStrength;

                // Spooky action at a distance
                const spookyStrength = 0.02;
                if (dist > 200) {
                    this.vx -= (dx / dist) * spookyStrength * (dist - 200) * 0.1;
                    this.vy -= (dy / dist) * spookyStrength * (dist - 200) * 0.1;
                }

                // Random quantum tunneling
                if (Math.random() < 0.001) {
                    this.x += (Math.random() - 0.5) * 100;
                    this.y += (Math.random() - 0.5) * 100;
                }

                // Apply velocity with damping
                this.vx *= 0.98;
                this.vy *= 0.98;

                this.x += this.vx + fluctuationX;
                this.y += this.vy + fluctuationY;

                // Boundary wrapping
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;

                // Store trail
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }

                // Pulse size
                this.size = 15 + Math.sin(time * 4 + this.id * Math.PI) * 5;
            }

            draw() {
                // Draw trail
                ctx.beginPath();
                for (let i = 0; i < this.trail.length; i++) {
                    const alpha = i / this.trail.length;
                    const size = this.size * alpha * 0.5;

                    if (i === 0) {
                        ctx.moveTo(this.trail[i].x, this.trail[i].y);
                    } else {
                        ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                }
                ctx.strokeStyle = `hsla(${this.hue}, 100%, 60%, 0.3)`;
                ctx.lineWidth = 2;
                ctx.stroke();

                // Draw particle
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 2
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 70%, 1)`);
                gradient.addColorStop(0.3, `hsla(${this.hue}, 100%, 50%, 0.8)`);
                gradient.addColorStop(1, `hsla(${this.hue}, 100%, 50%, 0)`);

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Core
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            // Create entangled particle pair
            particles.push(new Particle(width * 0.3, height * 0.5, 0));
            particles.push(new Particle(width * 0.7, height * 0.5, 1));
        }

        function drawEntanglement() {
            const p1 = particles[0];
            const p2 = particles[1];

            // Draw entanglement connection
            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            // Multiple entanglement threads
            for (let i = 0; i < 5; i++) {
                const offset = Math.sin(time * 3 + i) * 20;
                const midX = (p1.x + p2.x) / 2 + Math.cos(time * 2 + i) * offset;
                const midY = (p1.y + p2.y) / 2 + Math.sin(time * 2 + i) * offset;

                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.quadraticCurveTo(midX, midY, p2.x, p2.y);

                const hue = (p1.hue + p2.hue) / 2;
                const alpha = 0.3 - i * 0.05;
                ctx.strokeStyle = `hsla(${hue}, 100%, 60%, ${alpha})`;
                ctx.lineWidth = 3 - i * 0.5;
                ctx.stroke();
            }

            // Quantum probability cloud
            const cloudSize = dist * 0.3;
            const cloudX = (p1.x + p2.x) / 2;
            const cloudY = (p1.y + p2.y) / 2;

            for (let i = 0; i < 20; i++) {
                const angle = (i / 20) * Math.PI * 2 + time;
                const radius = cloudSize + Math.sin(time * 5 + i) * 20;
                const x = cloudX + Math.cos(angle) * radius;
                const y = cloudY + Math.sin(angle) * radius;

                ctx.beginPath();
                ctx.arc(x, y, 2, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${(p1.hue + p2.hue) / 2 + i * 10}, 100%, 60%, 0.5)`;
                ctx.fill();
            }
        }

        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // Draw entanglement
            drawEntanglement();

            // Update and draw particles
            particles[0].update(particles[1]);
            particles[1].update(particles[0]);

            particles.forEach(p => p.draw());

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        init();
        animate();

        // Touch interaction
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            particles[0].vx = (Math.random() - 0.5) * 10;
            particles[0].vy = (Math.random() - 0.5) * 10;
            particles[1].vx = (Math.random() - 0.5) * 10;
            particles[1].vy = (Math.random() - 0.5) * 10;
        });

        canvas.addEventListener('click', () => {
            particles[0].vx = (Math.random() - 0.5) * 10;
            particles[0].vy = (Math.random() - 0.5) * 10;
            particles[1].vx = (Math.random() - 0.5) * 10;
            particles[1].vy = (Math.random() - 0.5) * 10;
        });
    </script>
</body>
</html>
