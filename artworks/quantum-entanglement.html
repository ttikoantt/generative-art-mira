<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量子もつれパーティクル | Quantum Entanglement Particles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.7);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">
        タッチ/マウスでエネルギーを注入<br>
        Quantum Entanglement Particles
    </div>
    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let width, height;
        let particles = [];
        let entangledPairs = [];
        let mouse = { x: null, y: null, radius: 150 };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor(x, y, id) {
                this.id = id;
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.baseX = this.x;
                this.baseY = this.y;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = Math.random() * 2 + 1;
                this.hue = Math.random() * 60 + 200; // 青-紫系
                this.entangledWith = null;
                this.phase = Math.random() * Math.PI * 2;
                this.energy = 0;
            }

            update(time) {
                // 量子もつれパートナーがいるなら、連動して動く
                if (this.entangledWith) {
                    const partner = this.entangledWith;
                    const dx = partner.x - this.x;
                    const dy = partner.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist > 200) {
                        this.vx += dx * 0.0001;
                        this.vy += dy * 0.0001;
                    }
                }

                // マウスの影響
                if (mouse.x !== null) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < mouse.radius) {
                        const force = (mouse.radius - dist) / mouse.radius;
                        const angle = Math.atan2(dy, dx);
                        this.vx += Math.cos(angle) * force * 0.5;
                        this.vy += Math.sin(angle) * force * 0.5;
                        this.energy = Math.min(this.energy + 0.1, 1);
                    }
                }

                // 減衰
                this.vx *= 0.99;
                this.vy *= 0.99;
                this.energy *= 0.98;

                // 基本動き（放物線的な動き）
                this.phase += 0.01;
                this.vx += Math.sin(this.phase) * 0.01;
                this.vy += Math.cos(this.phase * 1.3) * 0.01;

                this.x += this.vx;
                this.y += this.vy;

                // 境界処理
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;

                // 色の変化
                this.hue = (this.hue + 0.1) % 360;
            }

            draw() {
                const energyGlow = this.energy * 20;
                const alpha = 0.6 + this.energy * 0.4;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius + energyGlow, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${alpha})`;
                ctx.fill();

                // グロー効果
                if (this.energy > 0.1) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius + energyGlow * 2, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue}, 100%, 70%, ${this.energy * 0.3})`;
                    ctx.fill();
                }
            }
        }

        function init() {
            particles = [];
            entangledPairs = [];
            
            const particleCount = Math.floor((width * height) / 8000);
            
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }

            // 量子もつれペアを作成
            for (let i = 0; i < particles.length - 1; i += 2) {
                const p1 = particles[i];
                const p2 = particles[i + 1];
                p1.entangledWith = p2;
                p2.entangledWith = p1;
                entangledPairs.push([p1, p2]);
            }
        }

        function drawEntanglementLines() {
            entangledPairs.forEach(([p1, p2]) => {
                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 300) {
                    const alpha = (1 - dist / 300) * 0.3;
                    const energy = (p1.energy + p2.energy) / 2;
                    
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    
                    // 曲線を描く
                    const midX = (p1.x + p2.x) / 2;
                    const midY = (p1.y + p2.y) / 2;
                    const offset = Math.sin(Date.now() * 0.001 + p1.phase) * 20;
                    
                    ctx.quadraticCurveTo(
                        midX + offset,
                        midY - offset,
                        p2.x,
                        p2.y
                    );
                    
                    ctx.strokeStyle = `hsla(${(p1.hue + p2.hue) / 2}, 70%, 60%, ${alpha + energy * 0.5})`;
                    ctx.lineWidth = 1 + energy * 2;
                    ctx.stroke();
                }
            });
        }

        function drawConnections() {
            // 近い粒子同士を線で結ぶ
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[j].x - particles[i].x;
                    const dy = particles[j].y - particles[i].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 80) {
                        const alpha = (1 - dist / 80) * 0.15;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `hsla(${(particles[i].hue + particles[j].hue) / 2}, 50%, 50%, ${alpha})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
        }

        let time = 0;
        function animate() {
            time++;
            
            // トレイル効果
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, width, height);

            drawConnections();
            drawEntanglementLines();

            particles.forEach(particle => {
                particle.update(time);
                particle.draw();
            });

            requestAnimationFrame(animate);
        }

        // イベントリスナー
        window.addEventListener('resize', () => {
            resize();
            init();
        });

        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            mouse.x = null;
            mouse.y = null;
        });

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // 初期化
        resize();
        init();
        animate();
    </script>
</body>
</html>
