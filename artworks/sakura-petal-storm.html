<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura Petal Storm - 桜花びらの舞</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
        }

        .title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 8px;
            text-shadow: 0 0 20px rgba(255, 182, 193, 0.5);
            z-index: 10;
            pointer-events: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="title">桜 SAKURA</div>
    <div class="info">Click to create burst</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        const petals = [];
        const PETAL_COUNT = 150;

        // Sakura petal colors
        const colors = [
            'rgba(255, 182, 193, 0.8)',   // Light pink
            'rgba(255, 192, 203, 0.8)',   // Pink
            'rgba(255, 105, 180, 0.7)',   // Deep pink
            'rgba(255, 228, 225, 0.8)',   // Misty rose
            'rgba(255, 240, 245, 0.7)',   // Lavender blush
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Petal {
            constructor(x, y, burst = false) {
                this.reset(x, y, burst);
            }

            reset(x, y, burst = false) {
                this.x = x !== undefined ? x : Math.random() * width;
                this.y = y !== undefined ? y : -20;

                const baseSpeed = burst ? 3 : 1;
                this.vx = (Math.random() - 0.5) * baseSpeed;
                this.vy = (Math.random() * 1.5 + 0.5) * baseSpeed;

                this.size = Math.random() * 12 + 6;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.05;

                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = Math.random() * 0.02 + 0.01;
                this.wobbleAmount = Math.random() * 2 + 1;

                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.opacity = Math.random() * 0.5 + 0.5;
            }

            update() {
                this.wobble += this.wobbleSpeed;

                // Add wobble to horizontal movement
                const wobbleX = Math.sin(this.wobble) * this.wobbleAmount;
                this.x += this.vx + wobbleX;
                this.y += this.vy;
                this.rotation += this.rotationSpeed;

                // Fade in at top
                if (this.y < 50) {
                    this.opacity = Math.min(1, this.y / 50);
                }

                // Reset if off screen
                if (this.y > height + 20) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.opacity;

                // Draw petal shape ( Sakura petal is slightly pointed at top )
                ctx.fillStyle = this.color;
                ctx.beginPath();

                const s = this.size;
                ctx.moveTo(0, -s);
                ctx.bezierCurveTo(s * 0.6, -s * 0.5, s * 0.8, s * 0.3, 0, s);
                ctx.bezierCurveTo(-s * 0.8, s * 0.3, -s * 0.6, -s * 0.5, 0, -s);

                ctx.fill();

                // Add subtle gradient
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, s);
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.restore();
            }
        }

        function init() {
            resize();
            for (let i = 0; i < PETAL_COUNT; i++) {
                const petal = new Petal();
                // Pre-warm: scatter some petals across screen
                petal.y = Math.random() * height;
                petals.push(petal);
            }
        }

        function createBurst(x, y) {
            for (let i = 0; i < 20; i++) {
                petals.push(new Petal(x, y, true));
            }
            // Remove excess petals
            while (petals.length > PETAL_COUNT + 50) {
                petals.shift();
            }
        }

        function animate() {
            // Clear with fade effect for trails
            ctx.fillStyle = 'rgba(26, 26, 46, 0.1)';
            ctx.fillRect(0, 0, width, height);

            petals.forEach(petal => {
                petal.update();
                petal.draw();
            });

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', resize);
        canvas.addEventListener('click', (e) => {
            createBurst(e.clientX, e.clientY);
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createBurst(touch.clientX, touch.clientY);
        });

        init();
        animate();
    </script>
</body>
</html>
