<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Fireflies - 夜空のホタル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #0a0a1a;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
            touch-action: none;
        }
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 14px;
            cursor: pointer;
            border-radius: 5px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 100;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">🌟 Particle Fireflies | Click/Drag to attract</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let fireflies = [];
        const FIREFLY_COUNT = 150;

        // Mouse position
        let mouseX = -1000;
        let mouseY = -1000;
        let isMouseDown = false;

        // Resize handler
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Firefly class
        class Firefly {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.radius = Math.random() * 2 + 1;
                this.glowRadius = Math.random() * 20 + 15;
                
                // Color variations (warm yellows and greens)
                const hue = Math.random() * 30 + 45; // 45-75 (yellow-green range)
                this.color = `hsla(${hue}, 100%, 60%,`;
                
                // Glow pulsing
                this.pulseSpeed = Math.random() * 0.05 + 0.02;
                this.pulseOffset = Math.random() * Math.PI * 2;
                this.time = 0;
            }

            update() {
                this.time += this.pulseSpeed;

                // Attraction to mouse
                if (isMouseDown) {
                    const dx = mouseX - this.x;
                    const dy = mouseY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > 10) {
                        this.vx += (dx / dist) * 0.5;
                        this.vy += (dy / dist) * 0.5;
                    }
                }

                // Random wandering
                this.vx += (Math.random() - 0.5) * 0.2;
                this.vy += (Math.random() - 0.5) * 0.2;

                // Damping
                this.vx *= 0.98;
                this.vy *= 0.98;

                // Limit speed
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > 3) {
                    this.vx = (this.vx / speed) * 3;
                    this.vy = (this.vy / speed) * 3;
                }

                // Move
                this.x += this.vx;
                this.y += this.vy;

                // Wrap around edges
                if (this.x < -50) this.x = width + 50;
                if (this.x > width + 50) this.x = -50;
                if (this.y < -50) this.y = height + 50;
                if (this.y > height + 50) this.y = -50;
            }

            draw() {
                // Pulse intensity
                const pulse = (Math.sin(this.time + this.pulseOffset) + 1) / 2;
                const alpha = 0.3 + pulse * 0.7;

                // Draw glow
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.glowRadius
                );
                gradient.addColorStop(0, this.color + alpha + ')');
                gradient.addColorStop(0.5, this.color + (alpha * 0.3) + ')');
                gradient.addColorStop(1, this.color + '0)');

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.glowRadius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Draw core
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color + alpha + ')';
                ctx.fill();
            }
        }

        // Initialize fireflies
        for (let i = 0; i < FIREFLY_COUNT; i++) {
            fireflies.push(new Firefly());
        }

        // Mouse events
        canvas.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
        });
        canvas.addEventListener('mouseleave', () => {
            isMouseDown = false;
        });

        // Touch events
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isMouseDown = true;
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });
        canvas.addEventListener('touchend', () => {
            isMouseDown = false;
        });

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Background gradient
        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#0a0a2a');
            gradient.addColorStop(0.5, '#0f0f3f');
            gradient.addColorStop(1, '#1a1a2a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // Draw some stars
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            for (let i = 0; i < 50; i++) {
                const x = (i * 137.5) % width;
                const y = (i * 73.7) % height;
                ctx.beginPath();
                ctx.arc(x, y, Math.random() * 1, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Animation loop
        let lastTime = 0;
        function animate(currentTime) {
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            // Clear with fade effect for trails
            drawBackground();

            // Update and draw fireflies
            fireflies.forEach(firefly => {
                firefly.update();
                firefly.draw();
            });

            // Draw connections between nearby fireflies
            ctx.strokeStyle = 'rgba(255, 255, 200, 0.05)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < fireflies.length; i++) {
                for (let j = i + 1; j < fireflies.length; j++) {
                    const dx = fireflies[i].x - fireflies[j].x;
                    const dy = fireflies[i].y - fireflies[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 100) {
                        ctx.beginPath();
                        ctx.moveTo(fireflies[i].x, fireflies[i].y);
                        ctx.lineTo(fireflies[j].x, fireflies[j].y);
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        animate(0);
    </script>
</body>
</html>
