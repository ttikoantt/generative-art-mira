<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitch Neon Grid</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #0ff;
            font-size: 14px;
            text-shadow: 0 0 10px #0ff;
            z-index: 100;
            pointer-events: none;
        }

        .title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #f0f;
            font-size: 24px;
            text-shadow: 0 0 20px #f0f, 0 0 40px #f0f;
            z-index: 100;
            letter-spacing: 4px;
            pointer-events: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 0, 255, 0.2);
            border: 2px solid #f0f;
            color: #f0f;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 0, 255, 0.4);
            box-shadow: 0 0 20px #f0f;
        }
    </style>
</head>
<body>
    <canvas id="glitchCanvas"></canvas>
    <div class="title">GLITCH NEON GRID</div>
    <div class="info">Click to trigger glitch | Space to change color scheme</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">FULLSCREEN</button>

    <script>
        const canvas = document.getElementById('glitchCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let time = 0;
        let glitchIntensity = 0;
        let colorScheme = 0;

        const colorSchemes = [
            { primary: '#0ff', secondary: '#f0f', bg: '#0a0a0a' },
            { primary: '#0f0', secondary: '#ff0', bg: '#000a0a' },
            { primary: '#f00', secondary: '#00f', bg: '#0a0a00' },
            { primary: '#ff8800', secondary: '#00ffff', bg: '#0a000a' }
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        function drawGrid(t) {
            const colors = colorSchemes[colorScheme];
            const gridSize = 40;
            const speed = 2;

            ctx.strokeStyle = colors.primary;
            ctx.lineWidth = 1;
            ctx.shadowBlur = 10;
            ctx.shadowColor = colors.primary;

            // Vertical lines
            for (let x = 0; x < width; x += gridSize) {
                const offsetX = (t * speed) % gridSize;
                const drawX = x - offsetX;

                ctx.beginPath();
                ctx.moveTo(drawX, 0);
                ctx.lineTo(drawX, height);
                ctx.stroke();
            }

            // Horizontal lines
            for (let y = 0; y < height; y += gridSize) {
                const offsetY = (t * speed * 0.5) % gridSize;
                const drawY = y - offsetY;

                ctx.beginPath();
                ctx.moveTo(0, drawY);
                ctx.lineTo(width, drawY);
                ctx.stroke();
            }

            ctx.shadowBlur = 0;
        }

        function drawGlitch() {
            if (glitchIntensity <= 0) return;

            const colors = colorSchemes[colorScheme];
            const numStrips = Math.floor(Math.random() * glitchIntensity * 5) + 1;

            for (let i = 0; i < numStrips; i++) {
                const y = Math.random() * height;
                const stripHeight = Math.random() * 20 + 5;
                const offset = (Math.random() - 0.5) * glitchIntensity * 50;

                ctx.fillStyle = Math.random() > 0.5 ? colors.primary : colors.secondary;
                ctx.globalAlpha = 0.3 + Math.random() * 0.4;

                // Shifted strip
                ctx.save();
                ctx.translate(offset, 0);

                if (Math.random() > 0.5) {
                    // Horizontal strip
                    ctx.fillRect(0, y, width, stripHeight);
                } else {
                    // Vertical strip
                    ctx.fillRect(Math.random() * width, 0, stripHeight, height);
                }

                ctx.restore();
            }

            // RGB split effect
            const splitAmount = glitchIntensity * 10;
            ctx.globalAlpha = 0.5;

            ctx.save();
            ctx.translate(-splitAmount, 0);
            ctx.fillStyle = colors.primary;
            ctx.globalCompositeOperation = 'screen';
            ctx.fillRect(0, 0, width, height);
            ctx.restore();

            ctx.save();
            ctx.translate(splitAmount, 0);
            ctx.fillStyle = colors.secondary;
            ctx.globalCompositeOperation = 'screen';
            ctx.fillRect(0, 0, width, height);
            ctx.restore();

            ctx.globalAlpha = 1;
            ctx.globalCompositeOperation = 'source-over';
        }

        function drawScanlines() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';

            for (let y = 0; y < height; y += 3) {
                ctx.fillRect(0, y, width, 1);
            }
        }

        function drawNoise() {
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;

            for (let i = 0; i < data.length; i += 4) {
                if (Math.random() > 0.995) {
                    const brightness = Math.random() * 255;
                    data[i] = brightness;
                    data[i + 1] = brightness;
                    data[i + 2] = brightness;
                }
            }

            ctx.putImageData(imageData, 0, 0);
        }

        function drawVignette() {
            const gradient = ctx.createRadialGradient(
                width / 2, height / 2, 0,
                width / 2, height / 2, Math.max(width, height) / 1.5
            );

            gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0.7)');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }

        function animate() {
            const colors = colorSchemes[colorScheme];

            // Clear with slight trail effect
            ctx.fillStyle = colors.bg + '20';
            ctx.fillRect(0, 0, width, height);

            time += 0.5;

            // Random glitch trigger
            if (Math.random() > 0.995) {
                glitchIntensity = Math.random() * 2 + 1;
            }

            // Decay glitch
            glitchIntensity *= 0.95;

            drawGrid(time);
            drawGlitch();
            drawScanlines();
            drawNoise();
            drawVignette();

            requestAnimationFrame(animate);
        }

        function triggerGlitch() {
            glitchIntensity = 5;
        }

        function changeColorScheme() {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
        }

        canvas.addEventListener('click', triggerGlitch);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                changeColorScheme();
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        animate();
    </script>
</body>
</html>
