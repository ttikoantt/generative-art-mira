<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Waves - Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            text-align: center;
            width: 100%;
            height: 100vh;
            position: relative;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 20px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        .info h1 {
            font-size: 24px;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #00ff88, #00d4ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .info p {
            font-size: 12px;
            opacity: 0.8;
            line-height: 1.6;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
            z-index: 10;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .info {
                top: 10px;
                left: 10px;
                padding: 10px 15px;
                font-size: 12px;
            }

            .info h1 {
                font-size: 18px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 10px 15px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="info">
            <h1>🌌 Aurora Waves</h1>
            <p>マウスを動かして波を乱そう</p>
        </div>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全画面</button>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let mouseX = 0, mouseY = 0;
        let mouseInfluence = 0;

        // オーロラのウェーブ
        const waves = [];
        const numWaves = 5;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function init() {
            resize();

            waves.length = 0;
            for (let i = 0; i < numWaves; i++) {
                waves.push({
                    amplitude: 30 + Math.random() * 40,
                    frequency: 0.005 + Math.random() * 0.01,
                    phase: Math.random() * Math.PI * 2,
                    speed: 0.003 + Math.random() * 0.005,
                    yOffset: height / 2 + (i - numWaves / 2) * 40,
                    color: i,
                    opacity: 0.6 + Math.random() * 0.4
                });
            }
        }

        function getAuroraColor(index, t) {
            const colors = [
                [0, 255, 136],   // グリーン
                [0, 212, 255],   // シアン
                [255, 0, 255],   // マゼンタ
                [136, 0, 255],   // パープル
                [255, 136, 0]    // オレンジ
            ];

            const colorIndex = index % colors.length;
            const nextColorIndex = (colorIndex + 1) % colors.length;

            const t2 = (Math.sin(t * 0.001) + 1) / 2;

            const r = colors[colorIndex][0] + (colors[nextColorIndex][0] - colors[colorIndex][0]) * t2;
            const g = colors[colorIndex][1] + (colors[nextColorIndex][1] - colors[colorIndex][1]) * t2;
            const b = colors[colorIndex][2] + (colors[nextColorIndex][2] - colors[colorIndex][2]) * t2;

            return { r, g, b };
        }

        function drawWave(wave, time) {
            const color = getAuroraColor(wave.color, time);

            ctx.beginPath();

            for (let x = 0; x <= width; x += 2) {
                const distToMouse = Math.abs(x - mouseX);
                const mouseEffect = Math.max(0, 1 - distToMouse / 300) * mouseInfluence * 50;

                const y = wave.yOffset +
                         Math.sin(x * wave.frequency + wave.phase + time * wave.speed) * wave.amplitude +
                         Math.sin(x * wave.frequency * 2 + wave.phase * 1.5) * wave.amplitude * 0.3 +
                         mouseEffect * Math.sin(x * 0.02);

                if (x === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }

            // グラデーションで埋める
            const gradient = ctx.createLinearGradient(0, wave.yOffset - wave.amplitude, 0, wave.yOffset + wave.amplitude);
            gradient.addColorStop(0, `rgba(${color.r}, ${color.g}, ${color.b}, 0)`);
            gradient.addColorStop(0.5, `rgba(${color.r}, ${color.g}, ${color.b}, ${wave.opacity * 0.3})`);
            gradient.addColorStop(1, `rgba(${color.r}, ${color.g}, ${color.b}, 0)`);

            ctx.strokeStyle = `rgba(${color.r}, ${color.g}, ${color.b}, ${wave.opacity * 0.8})`;
            ctx.lineWidth = 2;
            ctx.stroke();

            // フィル（下側）
            ctx.lineTo(width, height);
            ctx.lineTo(0, height);
            ctx.closePath();
            ctx.fillStyle = gradient;
            ctx.fill();
        }

        let time = 0;

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, width, height);

            time++;

            waves.forEach(wave => {
                drawWave(wave, time);
            });

            // マウスの影響を減衰
            mouseInfluence *= 0.98;

            requestAnimationFrame(animate);
        }

        // マウス操作
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            mouseInfluence = 1;
        });

        // タッチ操作
        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
            mouseInfluence = 1;
        }, { passive: false });

        window.addEventListener('resize', () => {
            resize();
            init();
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        init();
        animate();
    </script>
</body>
</html>
