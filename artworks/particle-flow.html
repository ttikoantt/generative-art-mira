<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Flow - Interactive Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
        }

        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
        }

        @media (max-width: 768px) {
            .info {
                font-size: 10px;
                bottom: 70px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <div>パーティクル数: <span id="particleCount">10000</span></div>
        <div>FPS: <span id="fps">0</span></div>
        <div>マウスを動かしてパーティクルを操作</div>
    </div>

    <div class="controls">
        <button class="btn" onclick="changePattern()">パターン変更</button>
        <button class="btn" onclick="resetParticles()">リセット</button>
    </div>

    <button class="btn fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const PARTICLE_COUNT = 10000;
        const CONNECTION_DISTANCE = 80;

        let particles = [];
        let mouse = { x: null, y: null, radius: 150 };
        let patternIndex = 0;
        let lastTime = 0;
        let frameCount = 0;
        let fps = 0;

        const patterns = ['flow', 'vortex', 'wave', 'explosion'];

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.baseX = this.x;
                this.baseY = this.y;
                this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.hue = Math.random() * 60 + 180; // 青〜紫の範囲
                this.life = 1;
                this.maxLife = Math.random() * 200 + 100;
                this.angle = Math.random() * Math.PI * 2;
                this.radius = Math.random() * 100 + 50;
            }

            update(pattern) {
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                // マウスとのインタラクション
                if (distance < mouse.radius && mouse.x !== null) {
                    const force = (mouse.radius - distance) / mouse.radius;
                    const angle = Math.atan2(dy, dx);

                    switch (pattern) {
                        case 'flow':
                            this.speedX -= Math.cos(angle) * force * 0.5;
                            this.speedY -= Math.sin(angle) * force * 0.5;
                            break;
                        case 'vortex':
                            this.speedX += Math.sin(angle) * force * 2;
                            this.speedY -= Math.cos(angle) * force * 2;
                            break;
                        case 'wave':
                            this.speedY += Math.sin(this.x * 0.01 + Date.now() * 0.001) * force;
                            break;
                        case 'explosion':
                            this.speedX += Math.cos(angle) * force * 3;
                            this.speedY += Math.sin(angle) * force * 3;
                            break;
                    }

                    this.hue = (this.hue + 1) % 360;
                }

                // パターン別の動き
                switch (pattern) {
                    case 'flow':
                        this.x += this.speedX;
                        this.y += this.speedY;
                        this.speedX *= 0.99;
                        this.speedY *= 0.99;
                        break;
                    case 'vortex':
                        this.angle += 0.02;
                        const centerX = width / 2;
                        const centerY = height / 2;
                        this.x = centerX + Math.cos(this.angle) * this.radius;
                        this.y = centerY + Math.sin(this.angle) * this.radius;
                        this.radius += (Math.random() - 0.5) * 2;
                        this.radius = Math.max(50, Math.min(width / 3, this.radius));
                        break;
                    case 'wave':
                        this.x += this.speedX;
                        this.y = this.baseY + Math.sin(this.x * 0.02 + Date.now() * 0.002) * 50;
                        this.speedX *= 0.99;
                        break;
                    case 'explosion':
                        this.x += this.speedX;
                        this.y += this.speedY;
                        this.speedX *= 0.98;
                        this.speedY *= 0.98;
                        break;
                }

                // 境界チェック
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;

                // ライフサイクル
                this.life++;
                if (this.life > this.maxLife) {
                    this.reset();
                }
            }

            draw() {
                const alpha = 1 - (this.life / this.maxLife);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 70%, 60%, ${alpha})`;
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(new Particle());
            }
        }

        function drawConnections() {
            const pattern = patterns[patternIndex];
            if (pattern !== 'flow') return;

            for (let i = 0; i < particles.length; i += 50) {
                for (let j = i + 1; j < particles.length; j += 50) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < CONNECTION_DISTANCE) {
                        const alpha = (1 - distance / CONNECTION_DISTANCE) * 0.3;
                        ctx.beginPath();
                        ctx.strokeStyle = `hsla(${particles[i].hue}, 70%, 60%, ${alpha})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate(currentTime) {
            requestAnimationFrame(animate);

            // FPS計算
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                document.getElementById('fps').textContent = fps;
            }

            // トレイル効果
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            const pattern = patterns[patternIndex];

            particles.forEach(particle => {
                particle.update(pattern);
                particle.draw();
            });

            drawConnections();
        }

        function changePattern() {
            patternIndex = (patternIndex + 1) % patterns.length;
        }

        function resetParticles() {
            particles.forEach(p => p.reset());
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // タッチ対応
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // 初期化
        init();
        animate(0);

        document.getElementById('particleCount').textContent = PARTICLE_COUNT;
    </script>
</body>
</html>
