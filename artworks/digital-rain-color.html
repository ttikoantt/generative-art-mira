<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Rain in Color</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
        }
        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #0f0;
            font-size: 14px;
            text-shadow: 0 0 10px #0f0;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="info">
        🌈 Digital Rain in Color<br>
        <small>Click to change color mode</small>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        // Color modes
        const colorModes = [
            { name: 'rainbow', fn: (i) => `hsl(${(i + Date.now() / 50) % 360}, 100%, 50%)` },
            { name: 'matrix', fn: () => '#0f0' },
            { name: 'ocean', fn: (i) => `hsl(${180 + Math.sin(i / 10) * 40}, 100%, 50%)` },
            { name: 'sunset', fn: (i) => `hsl(${20 + Math.sin(i / 10) * 30}, 100%, 50%)` },
            { name: 'neon', fn: (i) => {
                const colors = ['#ff00ff', '#00ffff', '#ff0080', '#80ff00'];
                return colors[i % colors.length];
            }}
        ];

        let currentMode = 0;

        function getColor(columnIndex) {
            return colorModes[currentMode].fn(columnIndex);
        }

        const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                const x = i * fontSize;
                const y = drops[i] * fontSize;

                // Gradient color for the trail
                const gradient = ctx.createLinearGradient(x, y - fontSize * 20, x, y);
                gradient.addColorStop(0, 'transparent');
                gradient.addColorStop(0.5, getColor(i));
                gradient.addColorStop(1, '#fff');

                ctx.fillStyle = gradient;
                ctx.font = `${fontSize}px monospace`;
                ctx.fillText(text, x, y);

                if (y > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        canvas.addEventListener('click', () => {
            currentMode = (currentMode + 1) % colorModes.length;
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        setInterval(draw, 33);
    </script>
</body>
</html>
