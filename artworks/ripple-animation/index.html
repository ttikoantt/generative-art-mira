<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ripple Animation - 波紋アニメーション</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .instructions {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.5rem;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        .instructions.hidden {
            opacity: 0;
        }

        .ripple {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            animation: rippleEffect 1.5s ease-out forwards;
        }

        @keyframes rippleEffect {
            0% {
                transform: scale(0);
                opacity: 0.8;
            }
            100% {
                transform: scale(20);
                opacity: 0;
            }
        }

        .ripple:nth-child(3n) {
            background: radial-gradient(circle, rgba(255, 107, 107, 0.6) 0%, transparent 70%);
        }

        .ripple:nth-child(3n+1) {
            background: radial-gradient(circle, rgba(78, 205, 196, 0.6) 0%, transparent 70%);
        }

        .ripple:nth-child(3n+2) {
            background: radial-gradient(circle, rgba(255, 230, 109, 0.6) 0%, transparent 70%);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .instructions {
                font-size: 1rem;
            }

            .fullscreen-btn {
                padding: 10px 16px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="instructions">
        クリックして波紋を広げて<br>Click to create ripples
    </div>

    <script>
        let clickCount = 0;
        const instructions = document.querySelector('.instructions');

        document.body.addEventListener('click', (e) => {
            if (e.target.classList.contains('fullscreen-btn')) return;

            // Hide instructions on first click
            if (clickCount === 0) {
                instructions.classList.add('hidden');
            }

            clickCount++;

            const ripple = document.createElement('div');
            ripple.className = 'ripple';

            const size = Math.max(window.innerWidth, window.innerHeight) * 0.1;
            ripple.style.width = size + 'px';
            ripple.style.height = size + 'px';
            ripple.style.left = (e.clientX - size / 2) + 'px';
            ripple.style.top = (e.clientY - size / 2) + 'px';

            document.body.appendChild(ripple);

            setTimeout(() => {
                ripple.remove();
            }, 1500);
        });

        // Touch support for mobile
        document.body.addEventListener('touchstart', (e) => {
            if (e.target.classList.contains('fullscreen-btn')) return;

            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];

                if (clickCount === 0) {
                    instructions.classList.add('hidden');
                }

                clickCount++;

                const ripple = document.createElement('div');
                ripple.className = 'ripple';

                const size = Math.max(window.innerWidth, window.innerHeight) * 0.1;
                ripple.style.width = size + 'px';
                ripple.style.height = size + 'px';
                ripple.style.left = (touch.clientX - size / 2) + 'px';
                ripple.style.top = (touch.clientY - size / 2) + 'px';

                document.body.appendChild(ripple);

                setTimeout(() => {
                    ripple.remove();
                }, 1500);
            }
        }, { passive: true });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
