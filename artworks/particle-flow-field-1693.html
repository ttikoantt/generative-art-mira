<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Particle Flow Field #1693</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 10px;
                bottom: 10px;
                left: 10px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">Particle Flow Field #1693 | Drag to create flow</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let flowField = [];
        let scale = 20;
        let rows, cols;
        let zOff = 0;
        let colorOffset = 0;

        // Mouse interaction
        let mouse = { x: 0, y: 0, active: false };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            cols = Math.floor(width / scale);
            rows = Math.floor(height / scale);
            flowField = new Array(cols * rows);
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = 0;
                this.vy = 0;
                this.history = [];
                this.maxHistory = 10;
                this.speed = Math.random() * 2 + 1;
                this.hue = Math.random() * 60;
            }

            update() {
                let x = Math.floor(this.x / scale);
                let y = Math.floor(this.y / scale);
                let index = x + y * cols;

                if (index >= 0 && index < flowField.length) {
                    let force = flowField[index];
                    if (force) {
                        this.vx += force.x * 0.5;
                        this.vy += force.y * 0.5;
                    }
                }

                // Mouse influence
                if (mouse.active) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        let force = (150 - dist) / 150;
                        this.vx += (dx / dist) * force * 2;
                        this.vy += (dy / dist) * force * 2;
                    }
                }

                // Limit speed
                let speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > this.speed * 2) {
                    this.vx = (this.vx / speed) * this.speed * 2;
                    this.vy = (this.vy / speed) * this.speed * 2;
                }

                this.x += this.vx;
                this.y += this.vy;

                // Wrap around edges
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;

                // Store history
                this.history.push({ x: this.x, y: this.y });
                if (this.history.length > this.maxHistory) {
                    this.history.shift();
                }

                // Friction
                this.vx *= 0.95;
                this.vy *= 0.95;
            }

            draw() {
                if (this.history.length < 2) return;

                ctx.beginPath();
                ctx.moveTo(this.history[0].x, this.history[0].y);
                
                for (let i = 1; i < this.history.length; i++) {
                    ctx.lineTo(this.history[i].x, this.history[i].y);
                }

                let alpha = (this.history.length / this.maxHistory) * 0.8;
                let hue = (this.hue + colorOffset) % 360;
                ctx.strokeStyle = `hsla(${hue}, 80%, 60%, ${alpha})`;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
        }

        function createFlowField() {
            let yOff = 0;
            for (let y = 0; y < rows; y++) {
                let xOff = 0;
                for (let x = 0; x < cols; x++) {
                    let index = x + y * cols;
                    let angle = Math.sin(xOff) * Math.cos(yOff + zOff) * Math.PI * 4;
                    
                    flowField[index] = {
                        x: Math.cos(angle),
                        y: Math.sin(angle)
                    };

                    xOff += 0.1;
                }
                yOff += 0.1;
            }
            zOff += 0.005;
        }

        function init() {
            particles = [];
            for (let i = 0; i < 800; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(10, 10, 15, 0.03)';
            ctx.fillRect(0, 0, width, height);

            createFlowField();

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            colorOffset += 0.2;
            requestAnimationFrame(animate);
        }

        // Event listeners
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousedown', (e) => {
            mouse.active = true;
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (mouse.active) {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            }
        });

        canvas.addEventListener('mouseup', () => {
            mouse.active = false;
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.active = false;
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouse.active = true;
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (mouse.active) {
                mouse.x = e.touches[0].clientX;
                mouse.y = e.touches[0].clientY;
            }
        });

        canvas.addEventListener('touchend', () => {
            mouse.active = false;
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        resize();
        init();
        animate();
    </script>
</body>
</html>
