<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オーディオスペクトラム・ビジュアライザー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f23 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #ffffff;
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 3rem);
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #00d4ff 0%, #9d4edd 50%, #ff006e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .description {
            font-size: clamp(0.875rem, 2.5vw, 1.125rem);
            color: #a0a0a0;
            margin-bottom: 2rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        .start-button {
            background: linear-gradient(135deg, #00d4ff 0%, #9d4edd 100%);
            border: none;
            color: white;
            padding: 1rem 3rem;
            font-size: 1.125rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
            margin-bottom: 1rem;
        }

        .start-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.6);
        }

        .start-button:active {
            transform: translateY(0);
        }

        .canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #visualizer {
            width: 100%;
            height: 100%;
            display: block;
        }

        .info {
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: #666;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.875rem;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .hidden {
            display: none !important;
        }

        .stats {
            margin-top: 1rem;
            font-size: 0.875rem;
            color: #888;
        }

        .stop-button {
            background: linear-gradient(135deg, #ff006e 0%, #9d4edd 100%);
            border: none;
            color: white;
            padding: 0.75rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 0, 110, 0.4);
            margin-top: 1rem;
        }

        .stop-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 110, 0.6);
        }
    </style>
</head>
<body>
    <div class="canvas-container">
        <canvas id="visualizer"></canvas>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>

    <div class="container" id="startScreen">
        <h1>🎵 オーディオスペクトラム・ビジュアライザー</h1>
        <p class="description">
            音楽に合わせて美しい幾何学模様が広がります。<br>
            マイクで音楽をキャプチャし、リアルタイムに可視化します。
        </p>
        <button class="start-button" id="startBtn">🎤 開始</button>
        <p class="info">マイクの使用を許可してください</p>
    </div>

    <div class="container hidden" id="runningScreen">
        <h1>🎵 ビジュアライザー実行中</h1>
        <p class="stats">音声をキャプチャ中...</p>
        <button class="stop-button" id="stopBtn">⏹️ 停止</button>
    </div>

    <script>
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const startScreen = document.getElementById('startScreen');
        const runningScreen = document.getElementById('runningScreen');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let audioContext;
        let analyser;
        let microphone;
        let animationId;
        let particles = [];
        let time = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, size, color, velocityX, velocityY) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.color = color;
                this.velocityX = velocityX;
                this.velocityY = velocityY;
                this.alpha = 1;
                this.decay = 0.01 + Math.random() * 0.02;
            }

            update() {
                this.x += this.velocityX;
                this.y += this.velocityY;
                this.alpha -= this.decay;
                this.size *= 0.98;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        async function start() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 512;

                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);

                startScreen.classList.add('hidden');
                runningScreen.classList.remove('hidden');

                visualize();
            } catch (err) {
                alert('マイクへのアクセスができませんでした: ' + err.message);
            }
        }

        function stop() {
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            if (microphone) {
                microphone.disconnect();
            }
            if (audioContext) {
                audioContext.close();
            }

            startScreen.classList.remove('hidden');
            runningScreen.classList.add('hidden');
            particles = [];

            // Clear canvas
            ctx.fillStyle = 'rgba(10, 10, 10, 1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function visualize() {
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function draw() {
                animationId = requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);

                time += 0.01;

                // Fade effect
                ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;

                // Calculate frequency bands
                const bassEnd = Math.floor(bufferLength * 0.1);
                const midEnd = Math.floor(bufferLength * 0.5);

                let bassSum = 0;
                let midSum = 0;
                let trebleSum = 0;

                for (let i = 0; i < bassEnd; i++) {
                    bassSum += dataArray[i];
                }
                for (let i = bassEnd; i < midEnd; i++) {
                    midSum += dataArray[i];
                }
                for (let i = midEnd; i < bufferLength; i++) {
                    trebleSum += dataArray[i];
                }

                const bassAvg = bassSum / bassEnd;
                const midAvg = midSum / (midEnd - bassEnd);
                const trebleAvg = trebleSum / (bufferLength - midEnd);

                // Draw bass circles (large, slow)
                const bassRadius = 50 + (bassAvg / 255) * 200;
                const bassColor = `hsl(${280 + Math.sin(time) * 30}, 70%, 50%)`;

                ctx.save();
                ctx.globalAlpha = 0.3;
                ctx.strokeStyle = bassColor;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(centerX, centerY, bassRadius, 0, Math.PI * 2);
                ctx.stroke();

                ctx.strokeStyle = `hsl(${280 + Math.sin(time + 1) * 30}, 70%, 40%)`;
                ctx.beginPath();
                ctx.arc(centerX, centerY, bassRadius * 0.7, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();

                // Draw mid waveform (dynamic curves)
                ctx.save();
                ctx.globalAlpha = 0.5;
                ctx.strokeStyle = `hsl(${180 + Math.cos(time * 0.5) * 40}, 80%, 60%)`;
                ctx.lineWidth = 2;
                ctx.beginPath();

                for (let i = 0; i < bufferLength; i++) {
                    const angle = (i / bufferLength) * Math.PI * 2 + time;
                    const radius = 150 + (dataArray[i] / 255) * 150;
                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;

                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }

                ctx.closePath();
                ctx.stroke();
                ctx.restore();

                // Draw treble particles (small, fast)
                if (trebleAvg > 50) {
                    const particleCount = Math.floor((trebleAvg / 255) * 5);
                    for (let i = 0; i < particleCount; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const distance = 200 + Math.random() * 200;
                        const x = centerX + Math.cos(angle) * distance;
                        const y = centerY + Math.sin(angle) * distance;
                        const size = 2 + Math.random() * 4;
                        const color = `hsl(${Math.random() * 60 + 320}, 100%, 60%)`;
                        const velocityX = Math.cos(angle) * (2 + Math.random() * 3);
                        const velocityY = Math.sin(angle) * (2 + Math.random() * 3);

                        particles.push(new Particle(x, y, size, color, velocityX, velocityY));
                    }
                }

                // Update and draw particles
                particles = particles.filter(p => p.alpha > 0);
                particles.forEach(particle => {
                    particle.update();
                    particle.draw(ctx);
                });

                // Draw frequency bars around the circle
                ctx.save();
                for (let i = 0; i < bufferLength; i += 4) {
                    const angle = (i / bufferLength) * Math.PI * 2 - Math.PI / 2;
                    const barHeight = (dataArray[i] / 255) * 100;
                    const hue = (i / bufferLength) * 360;

                    const x1 = centerX + Math.cos(angle) * 300;
                    const y1 = centerY + Math.sin(angle) * 300;
                    const x2 = centerX + Math.cos(angle) * (300 + barHeight);
                    const y2 = centerY + Math.sin(angle) * (300 + barHeight);

                    ctx.strokeStyle = `hsla(${hue}, 80%, 60%, 0.6)`;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                }
                ctx.restore();
            }

            draw();
        }

        startBtn.addEventListener('click', start);
        stopBtn.addEventListener('click', stop);

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });
    </script>
</body>
</html>
