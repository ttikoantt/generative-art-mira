<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Flow Art - 幾何学的フローアート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            color: #e94560;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        .subtitle {
            color: #a2a8d3;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        #artCanvas {
            border: 2px solid rgba(233, 69, 96, 0.3);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            cursor: crosshair;
            touch-action: none;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            margin-top: 15px;
            color: #a2a8d3;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            #artCanvas {
                width: 95vw;
                height: 95vw;
                max-width: 400px;
                max-height: 400px;
            }

            button {
                padding: 10px 18px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔮 Geometric Flow Art</h1>
        <p class="subtitle">幾何学的フローアート - 画面をドラッグして魔法を感じて</p>

        <canvas id="artCanvas" width="600" height="600"></canvas>

        <div class="controls">
            <button onclick="changePattern()">🎨 パターン変更</button>
            <button onclick="toggleAnimation()">⏯️ アニメーション</button>
            <button onclick="clearCanvas()">🗑️ クリア</button>
            <button onclick="saveImage()">💾 保存</button>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">📺 全画面</button>
        </div>

        <div class="info">
            <p>💡 マウスをドラッグまたはタッチして美しい幾何学的パターンを作成</p>
            <p>🎯 各パターンは異なる魅力を持っています</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('artCanvas');
        const ctx = canvas.getContext('2d');

        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let isAnimating = true;
        let animationId = null;
        let currentPattern = 0;
        let hue = 0;

        const patterns = [
            'spiral',      // 渦巻き
            'mandala',     // 曼荼羅
            'wave',        // 波
            'sacred',      // 神聖幾何学
            'fractal'      // フラクタル
        ];

        // パーティクルクラス
        class Particle {
            constructor(x, y, pattern) {
                this.x = x;
                this.y = y;
                this.pattern = pattern;
                this.life = 1;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.hue = hue % 360;
            }

            update() {
                this.life -= 0.005;
                this.x += this.speedX;
                this.y += this.speedY;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;

                switch(this.pattern) {
                    case 'spiral':
                        this.drawSpiral();
                        break;
                    case 'mandala':
                        this.drawMandala();
                        break;
                    case 'wave':
                        this.drawWave();
                        break;
                    case 'sacred':
                        this.drawSacred();
                        break;
                    case 'fractal':
                        this.drawFractal();
                        break;
                }

                ctx.restore();
            }

            drawSpiral() {
                ctx.strokeStyle = `hsl(${this.hue}, 80%, 60%)`;
                ctx.lineWidth = this.size;
                ctx.beginPath();
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const radius = 30 * this.life;
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(
                        this.x + Math.cos(angle) * radius,
                        this.y + Math.sin(angle) * radius
                    );
                }
                ctx.stroke();
            }

            drawMandala() {
                const petals = 12;
                for (let i = 0; i < petals; i++) {
                    const angle = (i / petals) * Math.PI * 2;
                    ctx.fillStyle = `hsl(${(this.hue + i * 30) % 360}, 70%, 60%)`;
                    ctx.beginPath();
                    ctx.ellipse(
                        this.x + Math.cos(angle) * 20 * this.life,
                        this.y + Math.sin(angle) * 20 * this.life,
                        10 * this.life,
                        5 * this.life,
                        angle,
                        0,
                        Math.PI * 2
                    );
                    ctx.fill();
                }
            }

            drawWave() {
                ctx.strokeStyle = `hsl(${this.hue}, 75%, 55%)`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                for (let i = 0; i < 50; i++) {
                    const x = this.x - 50 + i * 2;
                    const y = this.y + Math.sin(x * 0.05 + this.life * 10) * 20 * this.life;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }

            drawSacred() {
                const shapes = 6;
                for (let i = 0; i < shapes; i++) {
                    const angle = (i / shapes) * Math.PI * 2;
                    ctx.strokeStyle = `hsl(${(this.hue + i * 60) % 360}, 80%, 50%)`;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    const radius = 25 * this.life;
                    ctx.arc(
                        this.x + Math.cos(angle) * radius * 0.5,
                        this.y + Math.sin(angle) * radius * 0.5,
                        radius * 0.3,
                        0,
                        Math.PI * 2
                    );
                    ctx.stroke();
                }
            }

            drawFractal() {
                const branches = 5;
                ctx.strokeStyle = `hsl(${this.hue}, 70%, 55%)`;
                ctx.lineWidth = this.size;

                for (let i = 0; i < branches; i++) {
                    const angle = (i / branches) * Math.PI * 2;
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);

                    const length = 40 * this.life;
                    const endX = this.x + Math.cos(angle) * length;
                    const endY = this.y + Math.sin(angle) * length;

                    ctx.lineTo(endX, endY);

                    // サブブランチ
                    for (let j = 0; j < 3; j++) {
                        const subAngle = angle + (j - 1) * 0.4;
                        const subLength = length * 0.5;
                        ctx.moveTo(endX, endY);
                        ctx.lineTo(
                            endX + Math.cos(subAngle) * subLength,
                            endY + Math.sin(subAngle) * subLength
                        );
                    }

                    ctx.stroke();
                }
            }
        }

        let particles = [];

        // イベントリスナー
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        canvas.addEventListener('touchstart', handleTouch);
        canvas.addEventListener('touchmove', handleTouchMove);
        canvas.addEventListener('touchend', stopDrawing);

        function startDrawing(e) {
            isDrawing = true;
            [lastX, lastY] = [e.offsetX, e.offsetY];
        }

        function draw(e) {
            if (!isDrawing) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;

            // パーティクル追加
            for (let i = 0; i < 3; i++) {
                particles.push(new Particle(x, y, patterns[currentPattern]));
            }

            hue = (hue + 2) % 360;

            [lastX, lastY] = [x, y];
        }

        function handleTouch(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            isDrawing = true;
            lastX = (touch.clientX - rect.left) * scaleX;
            lastY = (touch.clientY - rect.top) * scaleY;

            for (let i = 0; i < 3; i++) {
                particles.push(new Particle(lastX, lastY, patterns[currentPattern]));
            }
            hue = (hue + 2) % 360;
        }

        function handleTouchMove(e) {
            e.preventDefault();
            if (!isDrawing) return;

            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const x = (touch.clientX - rect.left) * scaleX;
            const y = (touch.clientY - rect.top) * scaleY;

            for (let i = 0; i < 3; i++) {
                particles.push(new Particle(x, y, patterns[currentPattern]));
            }
            hue = (hue + 2) % 360;
        }

        function stopDrawing() {
            isDrawing = false;
        }

        // アニメーションループ
        function animate() {
            if (!isAnimating) return;

            // 半透明の背景でトレイル効果
            ctx.fillStyle = 'rgba(26, 26, 46, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // パーティクル更新と描画
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            animationId = requestAnimationFrame(animate);
        }

        // コントロール関数
        function changePattern() {
            currentPattern = (currentPattern + 1) % patterns.length;
            const patternNames = {
                'spiral': '🌀 渦巻き',
                'mandala': '🔮 曼荼羅',
                'wave': '🌊 波',
                'sacred': '✨ 神聖幾何学',
                'fractal': '🌿 フラクタル'
            };
            alert(`パターン: ${patternNames[patterns[currentPattern]]}`);
        }

        function toggleAnimation() {
            isAnimating = !isAnimating;
            if (isAnimating) {
                animate();
            } else if (animationId) {
                cancelAnimationFrame(animationId);
            }
        }

        function clearCanvas() {
            particles = [];
            ctx.fillStyle = 'rgba(26, 26, 46, 1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function saveImage() {
            const link = document.createElement('a');
            link.download = 'geometric-flow-art.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        clearCanvas();
        animate();

        // レスポンシブキャンバス
        function resizeCanvas() {
            const container = document.querySelector('.container');
            const maxWidth = Math.min(window.innerWidth - 40, 600);
            const size = maxWidth;

            if (window.innerWidth <= 768) {
                canvas.style.width = size + 'px';
                canvas.style.height = size + 'px';
            }
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>
