<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Bloom - 幾何学的な花</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
        }

        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">Click to regenerate</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        function hexToHsl(hex) {
            let r = parseInt(hex.slice(1, 3), 16) / 255;
            let g = parseInt(hex.slice(3, 5), 16) / 255;
            let b = parseInt(hex.slice(5, 7), 16) / 255;

            let max = Math.max(r, g, b);
            let min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;

            if (max === min) {
                h = s = 0;
            } else {
                let d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }

            return [h * 360, s * 100, l * 100];
        }

        function generatePalette() {
            const palettes = [
                ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7'],
                ['#6C5CE7', '#A29BFE', '#FD79A8', '#FDCB6E', '#00CEC9'],
                ['#FF7675', '#74B9FF', '#55EFC4', '#FDCB6E', '#A29BFE'],
                ['#E17055', '#00B894', '#0984E3', '#6C5CE7', '#FD79A8'],
                ['#00CEC9', '#6C5CE7', '#FD79A8', '#FDCB6E', '#E17055']
            ];

            const palette = palettes[Math.floor(Math.random() * palettes.length)];
            return palette.map(hex => hexToHsl(hex));
        }

        function drawBloom(petals, layers, radius) {
            const palette = generatePalette();
            const baseRotation = Math.random() * Math.PI * 2;

            for (let layer = 0; layer < layers; layer++) {
                const layerRadius = radius * (1 - layer / layers);
                const layerPetals = petals + Math.floor(layer / 2);
                const colorIndex = layer % palette.length;
                const [h, s, l] = palette[colorIndex];

                for (let i = 0; i < layerPetals; i++) {
                    const angle = (i / layerPetals) * Math.PI * 2 + baseRotation + (layer * 0.1);
                    const x = centerX + Math.cos(angle) * layerRadius;
                    const y = centerY + Math.sin(angle) * layerRadius;
                    const petalSize = layerRadius * (0.3 + Math.random() * 0.2);

                    ctx.save();
                    ctx.translate(x, y);
                    ctx.rotate(angle + Math.PI / 2);

                    // Petal shape
                    ctx.beginPath();
                    ctx.moveTo(0, 0);

                    const cp1x = petalSize * 0.5;
                    const cp1y = -petalSize * 0.8;
                    const cp2x = -petalSize * 0.5;
                    const cp2y = -petalSize * 0.8;

                    ctx.quadraticCurveTo(cp1x, cp1y, 0, -petalSize);
                    ctx.quadraticCurveTo(cp2x, cp2y, 0, 0);

                    const alpha = 0.4 + (layer / layers) * 0.4;
                    ctx.fillStyle = `hsla(${h + layer * 10}, ${s}%, ${l}%, ${alpha})`;
                    ctx.fill();

                    ctx.strokeStyle = `hsla(${h + layer * 10}, ${s}%, ${l + 10}%, ${alpha + 0.2})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    ctx.restore();
                }
            }

            // Center glow
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius * 0.3);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 0.3, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
        }

        function drawGeometricPattern() {
            // Background
            const bgGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, Math.max(width, height) / 2);
            bgGradient.addColorStop(0, '#1a1a2e');
            bgGradient.addColorStop(1, '#0a0a0f');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, width, height);

            const petals = Math.floor(Math.random() * 8) + 5;
            const layers = Math.floor(Math.random() * 6) + 5;
            const radius = Math.min(width, height) * 0.35;

            drawBloom(petals, layers, radius);
        }

        function regenerate() {
            ctx.clearRect(0, 0, width, height);
            drawGeometricPattern();
        }

        window.addEventListener('resize', () => {
            resize();
            regenerate();
        });

        canvas.addEventListener('click', regenerate);

        resize();
        regenerate();
    </script>
</body>
</html>
