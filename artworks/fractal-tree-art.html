<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Tree Art | Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .canvas-container {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.3);
        }

        canvas {
            display: block;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3e 100%);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            max-width: 800px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.85rem;
            color: #a0a0a0;
        }

        input[type="range"] {
            width: 150px;
            accent-color: #00d4ff;
        }

        button {
            padding: 10px 20px;
            background: linear-gradient(45deg, #00d4ff, #7c3aed);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        .fullscreen-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 12px;
            font-size: 0.8rem;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .controls {
                flex-direction: column;
                align-items: center;
            }

            input[type="range"] {
                width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌳 Fractal Tree Art</h1>
        <p style="color: #a0a0a0; font-size: 0.9rem;">自然界のフラクタルパターンを探索</p>
    </div>

    <div class="canvas-container">
        <canvas id="canvas" width="800" height="600"></canvas>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>分岐角度: <span id="angleValue">25</span>°</label>
            <input type="range" id="angle" min="10" max="45" value="25">
        </div>

        <div class="control-group">
            <label>枝の長さ: <span id="lengthValue">120</span></label>
            <input type="range" id="length" min="50" max="150" value="120">
        </div>

        <div class="control-group">
            <label>再帰深度: <span id="depthValue">10</span></label>
            <input type="range" id="depth" min="5" max="12" value="10">
        </div>

        <div class="control-group">
            <label>分岐確率: <span id="branchValue">0.8</span></label>
            <input type="range" id="branch" min="0.5" max="1" step="0.05" value="0.8">
        </div>

        <button onclick="generate()">🎲 新しい木</button>
        <button onclick="animate()">🌱 成長アニメーション</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let animationId = null;

        // 色パレット
        const colors = [
            { trunk: '#8B4513', leaf: '#228B22' },
            { trunk: '#654321', leaf: '#FF6B6B' },
            { trunk: '#4A3728', leaf: '#4ECDC4' },
            { trunk: '#3E2723', leaf: '#FFD93D' },
            { trunk: '#5D4037', leaf: '#E056FD' },
            { trunk: '#6D4C41', leaf: '#00D4FF' }
        ];

        let currentColor = colors[0];

        function resize() {
            const container = canvas.parentElement;
            const size = Math.min(container.offsetWidth, 600);
            canvas.width = size;
            canvas.height = size * 0.75;
            generate();
        }

        function drawBranch(x, y, length, angle, depth) {
            if (depth === 0) return;

            const endX = x + Math.cos(angle) * length;
            const endY = y - Math.sin(angle) * length;

            // 枝を描画
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);

            // 深さに応じて色を変化
            const progress = depth / 10;
            ctx.strokeStyle = depth > 3 ? currentColor.trunk : currentColor.leaf;
            ctx.lineWidth = depth * 0.8;
            ctx.stroke();

            // 葉を描画（末端のみ）
            if (depth <= 2) {
                ctx.beginPath();
                ctx.arc(endX, endY, 3, 0, Math.PI * 2);
                ctx.fillStyle = currentColor.leaf;
                ctx.fill();
            }

            // 再帰的に分岐
            const branchProb = parseFloat(document.getElementById('branch').value);
            const angleSpread = parseFloat(document.getElementById('angle').value) * Math.PI / 180;
            const lengthDecay = 0.7;

            if (Math.random() < branchProb) {
                drawBranch(endX, endY, length * lengthDecay, angle + angleSpread, depth - 1);
            }
            if (Math.random() < branchProb) {
                drawBranch(endX, endY, length * lengthDecay, angle - angleSpread, depth - 1);
            }
        }

        function generate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 色をランダムに選択
            currentColor = colors[Math.floor(Math.random() * colors.length)];

            const startX = canvas.width / 2;
            const startY = canvas.height;
            const length = parseFloat(document.getElementById('length').value);
            const depth = parseInt(document.getElementById('depth').value);

            drawBranch(startX, startY, length, Math.PI / 2, depth);
        }

        function animate() {
            if (animationId) {
                cancelAnimationFrame(animationId);
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 色をランダムに選択
            currentColor = colors[Math.floor(Math.random() * colors.length)];

            const startX = canvas.width / 2;
            const startY = canvas.height;
            const length = parseFloat(document.getElementById('length').value);
            const depth = parseInt(document.getElementById('depth').value);
            const angleSpread = parseFloat(document.getElementById('angle').value) * Math.PI / 180;

            let frame = 0;
            const maxFrames = 60;

            function animateFrame() {
                const progress = frame / maxFrames;
                const currentDepth = Math.floor(depth * progress) + 1;

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // 風のエフェクト
                const windOffset = Math.sin(frame * 0.1) * 0.05;

                function drawAnimatedBranch(x, y, length, angle, depth, maxDepth) {
                    if (depth === 0) return;

                    const depthProgress = (maxDepth - depth) / maxDepth;
                    const animatedLength = length * Math.min(1, progress * 2 + depthProgress);

                    const endX = x + Math.cos(angle + windOffset * depthProgress) * animatedLength;
                    const endY = y - Math.sin(angle + windOffset * depthProgress) * animatedLength;

                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(endX, endY);
                    ctx.strokeStyle = depth > 3 ? currentColor.trunk : currentColor.leaf;
                    ctx.lineWidth = depth * 0.8;
                    ctx.stroke();

                    if (depth <= 2 && progress > 0.5) {
                        ctx.beginPath();
                        ctx.arc(endX, endY, 3, 0, Math.PI * 2);
                        ctx.fillStyle = currentColor.leaf;
                        ctx.fill();
                    }

                    if (depth > 1) {
                        const branchProb = parseFloat(document.getElementById('branch').value);
                        if (Math.random() < branchProb) {
                            drawAnimatedBranch(endX, endY, length * 0.7, angle + angleSpread, depth - 1, maxDepth);
                        }
                        if (Math.random() < branchProb) {
                            drawAnimatedBranch(endX, endY, length * 0.7, angle - angleSpread, depth - 1, maxDepth);
                        }
                    }
                }

                drawAnimatedBranch(startX, startY, length, Math.PI / 2, currentDepth, currentDepth);

                frame++;
                if (frame < maxFrames) {
                    animationId = requestAnimationFrame(animateFrame);
                }
            }

            animateFrame();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // スライダーの値表示更新
        document.getElementById('angle').addEventListener('input', (e) => {
            document.getElementById('angleValue').textContent = e.target.value;
        });

        document.getElementById('length').addEventListener('input', (e) => {
            document.getElementById('lengthValue').textContent = e.target.value;
        });

        document.getElementById('depth').addEventListener('input', (e) => {
            document.getElementById('depthValue').textContent = e.target.value;
        });

        document.getElementById('branch').addEventListener('input', (e) => {
            document.getElementById('branchValue').textContent = e.target.value;
        });

        // 初期化
        window.addEventListener('load', () => {
            resize();
            generate();
        });

        window.addEventListener('resize', resize);
    </script>
</body>
</html>
