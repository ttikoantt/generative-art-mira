<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Particles - 音に反応する粒子システム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #0ff;
            font-size: 14px;
            pointer-events: none;
            text-shadow: 0 0 10px #0ff;
        }

        .start-btn {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 18px;
            background: rgba(0, 255, 255, 0.2);
            border: 2px solid #0ff;
            color: #0ff;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }

        .start-btn:hover {
            background: rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 20px #0ff;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #0ff;
            color: #0ff;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="info">
        <div>🎵 Pulse Particles</div>
        <div id="volume">Volume: 0.00</div>
        <div id="particles">Particles: 0</div>
    </div>
    
    <button class="start-btn" id="startBtn">🎵 Start Audio</button>
    <button class="fullscreen-btn" id="fullscreenBtn">⛶ Fullscreen</button>
    
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const volumeDisplay = document.getElementById('volume');
        const particlesDisplay = document.getElementById('particles');

        let width, height;
        let particles = [];
        let audioContext;
        let analyser;
        let dataArray;
        let audioStarted = false;
        let volume = 0;

        // 設定
        const PARTICLE_COUNT = 150;
        const COLORS = [
            '#00ffff', // Cyan
            '#ff00ff', // Magenta
            '#ffff00', // Yellow
            '#00ff00', // Green
            '#ff6600'  // Orange
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.baseSize = Math.random() * 3 + 1;
                this.size = this.baseSize;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                this.alpha = Math.random() * 0.5 + 0.5;
                this.pulsePhase = Math.random() * Math.PI * 2;
            }

            update(volume) {
                // 音量に応じてサイズを変化
                const pulseFactor = 1 + volume * 3;
                this.size = this.baseSize * pulseFactor;

                // 音量に応じて速度を変化
                const speedMultiplier = 1 + volume * 2;
                this.x += this.speedX * speedMultiplier;
                this.y += this.speedY * speedMultiplier;

                // 脈打つアニメーション
                this.pulsePhase += 0.1;
                const pulse = Math.sin(this.pulsePhase) * 0.3 + 1;

                // 画面外に出たら反対側から
                if (this.x < -50) this.x = width + 50;
                if (this.x > width + 50) this.x = -50;
                if (this.y < -50) this.y = height + 50;
                if (this.y > height + 50) this.y = -50;

                return pulse;
            }

            draw(pulse) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * pulse, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.alpha;
                ctx.fill();

                // グロー効果
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * pulse * 2, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * pulse * 2
                );
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.globalAlpha = this.alpha * 0.3;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(new Particle());
            }
        }

        async function startAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                audioStarted = true;
                startBtn.style.display = 'none';
            } catch (err) {
                console.error('Audio error:', err);
                alert('マイクへのアクセスが許可されていません');
            }
        }

        function getVolume() {
            if (!audioStarted || !analyser) return 0;
            
            analyser.getByteFrequencyData(dataArray);
            const sum = dataArray.reduce((a, b) => a + b, 0);
            const avg = sum / dataArray.length;
            return avg / 128; // Normalize to 0-1
        }

        function animate() {
            // 背景をフェード
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 音量を取得
            volume = getVolume();
            
            // 粒子を更新・描画
            ctx.globalAlpha = 1;
            particles.forEach(particle => {
                const pulse = particle.update(volume);
                particle.draw(pulse);
            });

            // 中心の脈打つ円
            if (volume > 0.1) {
                const pulseSize = 100 + volume * 200;
                const gradient = ctx.createRadialGradient(
                    width/2, height/2, 0,
                    width/2, height/2, pulseSize
                );
                gradient.addColorStop(0, `rgba(0, 255, 255, ${volume * 0.3})`);
                gradient.addColorStop(0.5, `rgba(255, 0, 255, ${volume * 0.2})`);
                gradient.addColorStop(1, 'transparent');
                ctx.beginPath();
                ctx.arc(width/2, height/2, pulseSize, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }

            // 情報更新
            volumeDisplay.textContent = `Volume: ${volume.toFixed(2)}`;
            particlesDisplay.textContent = `Particles: ${particles.length}`;

            requestAnimationFrame(animate);
        }

        // 全画面表示
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // 開始ボタン
        startBtn.addEventListener('click', startAudio);

        // 初期化
        resize();
        initParticles();
        animate();

        window.addEventListener('resize', resize);
    </script>
</body>
</html>
