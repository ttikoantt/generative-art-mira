<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>流れる星々の光の軌跡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #000000, #0a0a20, #000030);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: #ffffff;
            padding: 20px;
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 3rem);
            margin-bottom: 1rem;
            text-shadow: 0 0 20px #ffffff, 0 0 40px #ffffff;
            letter-spacing: 0.3em;
        }

        p {
            font-size: clamp(0.8rem, 2vw, 1.2rem);
            opacity: 0.8;
            text-shadow: 0 0 10px #ffffff;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #ffffff;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            touch-action: manipulation;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="content">
        <h1>流れる星々の光の軌跡</h1>
        <p>The Flowing Starlight Trails</p>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let stars = [];
        let trails = [];
        let mouseX = 0, mouseY = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('全画面エラー:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = Math.random() * 0.3 + 0.1;
                this.brightness = Math.random();
                this.color = this.getRandomColor();
                this.trailLength = Math.floor(Math.random() * 20) + 10;
                this.trail = [];
            }

            getRandomColor() {
                const colors = [
                    { r: 255, g: 200, b: 150 },  // 温かい白色
                    { r: 200, g: 220, b: 255 },  // 青みがかった白色
                    { r: 255, g: 180, b: 200 },  // ピンク色
                    { r: 180, g: 200, b: 255 },  // ラベンダー
                    { r: 255, g: 255, b: 200 },  // クリーム色
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                // 現在の位置を軌跡に保存
                this.trail.unshift({ x: this.x, y: this.y, brightness: this.brightness });
                if (this.trail.length > this.trailLength) {
                    this.trail.pop();
                }

                // 移動
                this.x += this.speedX;
                this.y += this.speedY;

                // 明滅
                this.brightness += (Math.random() - 0.5) * 0.05;
                this.brightness = Math.max(0.3, Math.min(1, this.brightness));

                // 画面外に出たらリセット
                if (this.y > height + 10 || this.x < -10 || this.x > width + 10) {
                    this.reset();
                    this.y = -10;
                    this.x = Math.random() * width;
                }
            }

            draw() {
                // 軌跡を描画
                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const alpha = (1 - i / this.trail.length) * t.brightness * 0.6;
                    const size = this.size * (1 - i / this.trail.length * 0.5);

                    ctx.beginPath();
                    ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`;
                    ctx.fill();
                }

                // 星を描画
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.brightness})`;
                ctx.shadowBlur = 15;
                ctx.shadowColor = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 1)`;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        function init() {
            resize();
            stars = [];
            const starCount = Math.floor((width * height) / 8000);
            for (let i = 0; i < starCount; i++) {
                stars.push(new Star());
            }
        }

        function animate() {
            // 背景を暗くして残像効果
            ctx.fillStyle = 'rgba(0, 0, 10, 0.1)';
            ctx.fillRect(0, 0, width, height);

            stars.forEach(star => {
                star.update();
                star.draw();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            resize();
            init();
        });

        init();
        animate();
    </script>
</body>
</html>
