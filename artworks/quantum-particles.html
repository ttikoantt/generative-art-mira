<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Particles - 量子パーティクル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
        }

        .info h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #8b5cf6;
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }

        .info p {
            font-size: 12px;
            line-height: 1.6;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(139, 92, 246, 0.3);
            border: 1px solid rgba(139, 92, 246, 0.5);
            color: #fff;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 10;
        }

        .fullscreen-btn:hover {
            background: rgba(139, 92, 246, 0.5);
        }

        @media (max-width: 768px) {
            .info h1 {
                font-size: 18px;
            }

            .info p {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="info">
        <h1>Quantum Particles</h1>
        <p>量子パーティクルシステム</p>
        <p>マウスに反応して振る舞いが変化</p>
        <p>テレポーテーション・トンネル効果・干渉</p>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let mouse = { x: null, y: null, radius: 150 };
        let waveOffset = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        // マウスイベント
        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // タッチイベント
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', () => {
            mouse.x = null;
            mouse.y = null;
        });

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.baseX = this.x;
                this.baseY = this.y;
                this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.angle = Math.random() * Math.PI * 2;
                this.angleSpeed = (Math.random() - 0.5) * 0.02;
                this.opacity = Math.random() * 0.5 + 0.3;

                // 量子状態
                this.quantumState = Math.random() > 0.7 ? 'entangled' : 'normal';
                this.wavePhase = Math.random() * Math.PI * 2;
                this.tunnelCooldown = 0;

                // 色
                this.hue = Math.random() * 60 + 240; // 紫〜青
            }

            update() {
                // 観測効果（マウスに近づくと振る舞いが変わる）
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const isObserved = distance < mouse.radius;

                if (isObserved) {
                    // 観測されている時：より予測可能な振る舞い
                    const force = (mouse.radius - distance) / mouse.radius;
                    this.speedX -= (dx / distance) * force * 0.5;
                    this.speedY -= (dy / distance) * force * 0.5;
                    this.hue = 280; // 観測時は紫に固定
                } else {
                    // 観測されていない時：量子効果
                    this.wavePhase += 0.05;

                    // 波としての振る舞い
                    this.x += Math.sin(this.wavePhase) * 0.5;
                    this.y += Math.cos(this.wavePhase) * 0.5;

                    // テレポーテーション
                    if (Math.random() < 0.001 && !isObserved) {
                        this.x = Math.random() * width;
                        this.y = Math.random() * height;
                    }

                    // トンネル効果（端を超えて反対側へ）
                    if (this.tunnelCooldown <= 0) {
                        if (this.x < 0) { this.x = width; this.tunnelCooldown = 30; }
                        if (this.x > width) { this.x = 0; this.tunnelCooldown = 30; }
                        if (this.y < 0) { this.y = height; this.tunnelCooldown = 30; }
                        if (this.y > height) { this.y = 0; this.tunnelCooldown = 30; }
                    } else {
                        this.tunnelCooldown--;
                    }

                    this.hue = 250 + Math.sin(this.wavePhase) * 30; // 色が変化
                }

                // 基本的な動き
                this.x += this.speedX;
                this.y += this.speedY;
                this.angle += this.angleSpeed;

                // 速度の減衰
                this.speedX *= 0.99;
                this.speedY *= 0.99;

                // ランダムな量子揺らぎ
                if (!isObserved) {
                    this.speedX += (Math.random() - 0.5) * 0.1;
                    this.speedY += (Math.random() - 0.5) * 0.1;
                }

                // 境界
                if (this.tunnelCooldown <= 0) {
                    if (this.x < 0) this.x = 0;
                    if (this.x > width) this.x = width;
                    if (this.y < 0) this.y = 0;
                    if (this.y > height) this.y = height;
                }
            }

            draw() {
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const isObserved = distance < mouse.radius;

                ctx.save();

                // 発光効果
                const glowSize = isObserved ? 15 : 20;
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, glowSize
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 70%, ${this.opacity})`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 100%, 50%, ${this.opacity * 0.5})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 100%, 30%, 0)`);

                ctx.beginPath();
                ctx.arc(this.x, this.y, glowSize, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // 粒子本体
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 80%, ${this.opacity})`;
                ctx.fill();

                // 量子干渉パターン
                if (this.quantumState === 'entangled' && !isObserved) {
                    const interferenceX = this.x + Math.cos(this.wavePhase) * 10;
                    const interferenceY = this.y + Math.sin(this.wavePhase) * 10;

                    ctx.beginPath();
                    ctx.arc(interferenceX, interferenceY, this.size * 0.5, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue + 30}, 100%, 70%, ${this.opacity * 0.5})`;
                    ctx.fill();
                }

                ctx.restore();
            }
        }

        function init() {
            particles = [];
            const particleCount = Math.min(150, Math.floor((width * height) / 10000));

            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 100) {
                        const opacity = (1 - distance / 100) * 0.15;

                        // 量子もつれ：干渉パターンを描画
                        if (particles[i].quantumState === 'entangled' &&
                            particles[j].quantumState === 'entangled') {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);

                            // 波のような線
                            const midX = (particles[i].x + particles[j].x) / 2;
                            const midY = (particles[i].y + particles[j].y) / 2;
                            const waveAmp = Math.sin(waveOffset + i * 0.1) * 10;

                            ctx.quadraticCurveTo(
                                midX + waveAmp,
                                midY + waveAmp,
                                particles[j].x,
                                particles[j].y
                            );

                            ctx.strokeStyle = `hsla(${260 + Math.sin(waveOffset) * 30}, 100%, 70%, ${opacity * 2})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
            }
            waveOffset += 0.05;
        }

        function animate() {
            // 半透明の黒でフェード
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 接続線を描画
            drawConnections();

            // 粒子を更新・描画
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        init();
        animate();

        // リサイズ時に再初期化
        window.addEventListener('resize', () => {
            setTimeout(() => {
                init();
            }, 100);
        });
    </script>
</body>
</html>
