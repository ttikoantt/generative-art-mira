<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Dots Visualization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
        }

        .info h1 {
            font-size: 18px;
            margin-bottom: 5px;
            color: #0ff;
        }

        .info p {
            font-size: 12px;
            line-height: 1.5;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #0ff;
            color: #0ff;
            font-size: 14px;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="info">
        <h1>Quantum Dots</h1>
        <p>クリックで干渉パターンをリセット</p>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        resize();
        window.addEventListener('resize', resize);

        // 量子ドット
        class QuantumDot {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.phase = Math.random() * Math.PI * 2;
                this.frequency = 0.5 + Math.random() * 2;
                this.amplitude = 30 + Math.random() * 50;
                this.hue = 180 + Math.random() * 60; // Cyan to Blue
            }

            update(time) {
                this.phase += this.frequency * 0.02;
            }

            draw(time) {
                const wave = Math.sin(this.phase) * this.amplitude;
                const alpha = 0.5 + Math.sin(this.phase) * 0.5;
                const size = 3 + Math.sin(this.phase * 2) * 2;

                ctx.beginPath();
                ctx.arc(this.x + wave, this.y, size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${alpha})`;
                ctx.fill();
            }
        }

        // ドットの配置
        const dots = [];
        const gridSize = 50;

        function initDots() {
            dots.length = 0;
            for (let x = gridSize / 2; x < width + gridSize; x += gridSize) {
                for (let y = gridSize / 2; y < height + gridSize; y += gridSize) {
                    dots.push(new QuantumDot(x, y));
                }
            }
        }

        initDots();
        window.addEventListener('resize', initDots);

        // 干渉線
        function drawInterference(dot1, dot2, time) {
            const distance = Math.sqrt((dot2.x - dot1.x) ** 2 + (dot2.y - dot1.y) ** 2);

            if (distance > gridSize * 1.5) return;

            const interference = Math.sin(dot1.phase - dot2.phase);
            const alpha = Math.abs(interference) * 0.3;

            if (alpha < 0.05) return;

            ctx.beginPath();
            ctx.moveTo(dot1.x, dot1.y);
            ctx.lineTo(dot2.x, dot2.y);
            ctx.strokeStyle = `hsla(${(dot1.hue + dot2.hue) / 2}, 100%, 70%, ${alpha})`;
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        let time = 0;

        function animate() {
            // 淡く残す
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            time += 0.016;

            // ドットを更新・描画
            dots.forEach(dot => {
                dot.update(time);
                dot.draw(time);
            });

            // 干渉線を描画
            for (let i = 0; i < dots.length; i++) {
                for (let j = i + 1; j < dots.length; j++) {
                    drawInterference(dots[i], dots[j], time);
                }
            }

            requestAnimationFrame(animate);
        }

        animate();

        // クリックでリセット
        canvas.addEventListener('click', () => {
            initDots();
        });

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // タッチ対応
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            initDots();
        });
    </script>
</body>
</html>
