<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Ripples - 量子波紋</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 10;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .title {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="title">Quantum Ripples</div>
    <canvas id="canvas"></canvas>
    <div class="info">Click or tap to create ripples</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let ripples = [];
        let autoCreateTimer = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Ripple {
            constructor(x, y, auto = false) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.random() * 200 + 150;
                this.speed = Math.random() * 2 + 1;
                this.opacity = 1;
                this.hue = Math.random() * 60 + 180; // Blue to cyan range
                this.lineWidth = Math.random() * 3 + 1;
                this.auto = auto;
                this.phase = Math.random() * Math.PI * 2;
            }

            update() {
                this.radius += this.speed;
                this.opacity = 1 - (this.radius / this.maxRadius);
                this.phase += 0.05;

                return this.opacity > 0;
            }

            draw() {
                const waveCount = 3;
                for (let i = 0; i < waveCount; i++) {
                    const waveRadius = this.radius + i * 30 + Math.sin(this.phase + i) * 10;
                    const waveOpacity = this.opacity * (1 - i / waveCount) * 0.6;

                    if (waveOpacity > 0) {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, waveRadius, 0, Math.PI * 2);

                        const gradient = ctx.createRadialGradient(
                            this.x, this.y, waveRadius * 0.8,
                            this.x, this.y, waveRadius
                        );

                        const hue = (this.hue + i * 20) % 360;
                        gradient.addColorStop(0, `hsla(${hue}, 80%, 60%, 0)`);
                        gradient.addColorStop(0.5, `hsla(${hue}, 80%, 60%, ${waveOpacity})`);
                        gradient.addColorStop(1, `hsla(${hue}, 80%, 60%, 0)`);

                        ctx.strokeStyle = gradient;
                        ctx.lineWidth = this.lineWidth;
                        ctx.stroke();
                    }
                }

                // Inner glow
                const glowRadius = this.radius * 0.3;
                const glowOpacity = this.opacity * 0.3;
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, glowRadius
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 60%, ${glowOpacity})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 80%, 60%, 0)`);

                ctx.beginPath();
                ctx.arc(this.x, this.y, glowRadius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        function createRipple(x, y, auto = false) {
            ripples.push(new Ripple(x, y, auto));
        }

        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // Update and draw ripples
            ripples = ripples.filter(ripple => {
                const alive = ripple.update();
                if (alive) {
                    ripple.draw();
                }
                return alive;
            });

            // Interference pattern enhancement
            ripples.forEach((r1, i) => {
                ripples.slice(i + 1).forEach(r2 => {
                    const dx = r1.x - r2.x;
                    const dy = r1.y - r2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (Math.abs(r1.radius - r2.radius) < 50 && dist < r1.radius + r2.radius) {
                        // Draw interference point
                        const midX = (r1.x + r2.x) / 2;
                        const midY = (r1.y + r2.y) / 2;
                        const intensity = Math.min(r1.opacity, r2.opacity) * 0.5;

                        ctx.beginPath();
                        ctx.arc(midX, midY, 3, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(200, 255, 255, ${intensity})`;
                        ctx.fill();
                    }
                });
            });

            // Auto create ripples
            autoCreateTimer++;
            if (autoCreateTimer > 120) {
                autoCreateTimer = 0;
                createRipple(
                    Math.random() * width,
                    Math.random() * height,
                    true
                );
            }

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Event listeners
        window.addEventListener('resize', resize);

        canvas.addEventListener('click', (e) => {
            createRipple(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createRipple(touch.clientX, touch.clientY);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.95) {
                createRipple(e.clientX, e.clientY);
            }
        });

        // Initialize
        resize();
        animate();

        // Create initial ripples
        setTimeout(() => createRipple(width / 2, height / 2), 500);
        setTimeout(() => createRipple(width / 3, height / 3), 1000);
        setTimeout(() => createRipple(width * 2 / 3, height * 2 / 3), 1500);
    </script>
</body>
</html>
