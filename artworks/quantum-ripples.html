<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quantum Ripples - Interactive Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            .info {
                top: 10px;
                left: 10px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="info">
        <div>🌊 Quantum Ripples</div>
        <div>Tap to create ripples</div>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">Full Screen</button>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let width, height;
        let ripples = [];

        // 設定
        const config = {
            maxRipples: 50,
            baseHue: 180,
            hueRange: 60,
            speed: 2
        };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Ripple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.max(width, height) * 0.4;
                this.hue = (config.baseHue + Math.random() * config.hueRange) % 360;
                this.alpha = 1;
                this.lineWidth = 3;
                this.speed = config.speed + Math.random() * 2;
                this.phase = Math.random() * Math.PI * 2;
            }

            update() {
                this.radius += this.speed;
                this.alpha = 1 - (this.radius / this.maxRadius);
                this.phase += 0.1;
                return this.radius < this.maxRadius;
            }

            draw() {
                const waveCount = 3;
                for (let i = 0; i < waveCount; i++) {
                    const offset = (i / waveCount) * Math.PI * 2;
                    const adjustedRadius = this.radius + Math.sin(this.phase + offset) * 20;
                    const adjustedAlpha = this.alpha * (1 - i / waveCount) * 0.5;

                    ctx.beginPath();
                    ctx.arc(this.x, this.y, Math.max(0, adjustedRadius), 0, Math.PI * 2);

                    const gradient = ctx.createRadialGradient(
                        this.x, this.y, adjustedRadius * 0.8,
                        this.x, this.y, adjustedRadius
                    );
                    gradient.addColorStop(0, `hsla(${this.hue}, 80%, 60%, 0)`);
                    gradient.addColorStop(0.5, `hsla(${this.hue}, 80%, 60%, ${adjustedAlpha})`);
                    gradient.addColorStop(1, `hsla(${this.hue + 30}, 80%, 60%, 0)`);

                    ctx.strokeStyle = gradient;
                    ctx.lineWidth = this.lineWidth;
                    ctx.stroke();
                }

                // 中心の光
                if (this.radius < 100) {
                    const centerAlpha = (1 - this.radius / 100) * 0.3;
                    const gradient = ctx.createRadialGradient(
                        this.x, this.y, 0,
                        this.x, this.y, 30
                    );
                    gradient.addColorStop(0, `hsla(${this.hue}, 100%, 70%, ${centerAlpha})`);
                    gradient.addColorStop(1, `hsla(${this.hue}, 100%, 70%, 0)`);

                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 30, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                }
            }
        }

        function createRipple(x, y) {
            if (ripples.length >= config.maxRipples) {
                ripples.shift();
            }
            ripples.push(new Ripple(x, y));
        }

        function animate() {
            // 背景をフェード
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // リップルを更新・描画
            ripples = ripples.filter(ripple => {
                const alive = ripple.update();
                if (alive) {
                    ripple.draw();
                }
                return alive;
            });

            // デコレーション（浮遊する粒子）
            const time = Date.now() * 0.001;
            for (let i = 0; i < 20; i++) {
                const x = Math.sin(time + i * 0.5) * width * 0.4 + width / 2;
                const y = Math.cos(time * 0.7 + i * 0.3) * height * 0.4 + height / 2;
                const size = Math.sin(time + i) * 2 + 3;

                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${(config.baseHue + i * 10) % 360}, 70%, 50%, 0.3)`;
                ctx.fill();
            }

            requestAnimationFrame(animate);
        }

        // イベントリスナー
        canvas.addEventListener('click', (e) => {
            createRipple(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let touch of e.touches) {
                createRipple(touch.clientX, touch.clientY);
            }
        });

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // 初期化
        resize();
        window.addEventListener('resize', resize);

        // 自動で開始用のリップル
        setTimeout(() => {
            createRipple(width / 2, height / 2);
        }, 500);

        animate();
    </script>
</body>
</html>
