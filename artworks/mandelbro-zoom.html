<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandelbrot Zoom - 拡大する無限の世界</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 3rem);
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4, #45b7d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }

        .subtitle {
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            color: #888;
            margin-bottom: 20px;
            text-align: center;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1;
            margin: 20px 0;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .info {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            font-size: clamp(0.8rem, 2vw, 1rem);
        }

        .info-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .info-label {
            color: #888;
            font-size: 0.8em;
            margin-right: 5px;
        }

        .info-value {
            color: #4ecdc4;
            font-weight: bold;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            font-size: 1.5rem;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 10px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <h1>🌀 Mandelbrot Zoom</h1>
        <p class="subtitle">無限に続くフラクタルの世界を旅しよう</p>

        <div class="canvas-container">
            <canvas id="mandelbrot"></canvas>
        </div>

        <div class="info">
            <div class="info-item">
                <span class="info-label">拡大率:</span>
                <span class="info-value" id="zoom">1x</span>
            </div>
            <div class="info-item">
                <span class="info-label">反復回数:</span>
                <span class="info-value" id="iterations">100</span>
            </div>
            <div class="info-item">
                <span class="info-label">座標:</span>
                <span class="info-value" id="coords">(0, 0)</span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mandelbrot');
        const ctx = canvas.getContext('2d');

        // 高DPI対応
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);

        const width = rect.width;
        const height = rect.height;

        // マンデルブロ集合のパラメータ
        // 興味深い領域を選択
        const targetX = -0.7435669;
        const targetY = 0.1314023;
        
        let centerX = -0.5;
        let centerY = 0;
        let zoom = 1;
        let maxIterations = 100;

        // アニメーション用
        let animationFrame;
        let lastTime = 0;
        const zoomSpeed = 1.02; // ズームスピード

        // 色パレット（美しいグラデーション）
        function getColor(iterations, max) {
            if (iterations === max) return [0, 0, 0];

            const t = iterations / max;
            const r = Math.floor(255 * (0.5 + 0.5 * Math.sin(3.14159 * t * 3 + 0)));
            const g = Math.floor(255 * (0.5 + 0.5 * Math.sin(3.14159 * t * 3 + 2)));
            const b = Math.floor(255 * (0.5 + 0.5 * Math.sin(3.14159 * t * 3 + 4)));
            
            return [r, g, b];
        }

        // マンデルブロ集合を描画
        function drawMandelbrot() {
            const imageData = ctx.createImageData(width, height);
            const data = imageData.data;

            const scale = 4 / zoom;
            const offsetX = centerX - scale / 2;
            const offsetY = centerY - scale / 2;

            for (let py = 0; py < height; py++) {
                for (let px = 0; px < width; px++) {
                    const x0 = offsetX + (px / width) * scale;
                    const y0 = offsetY + (py / height) * scale;

                    let x = 0;
                    let y = 0;
                    let iterations = 0;

                    while (x * x + y * y <= 4 && iterations < maxIterations) {
                        const xTemp = x * x - y * y + x0;
                        y = 2 * x * y + y0;
                        x = xTemp;
                        iterations++;
                    }

                    const [r, g, b] = getColor(iterations, maxIterations);
                    const idx = (py * width + px) * 4;
                    data[idx] = r;
                    data[idx + 1] = g;
                    data[idx + 2] = b;
                    data[idx + 3] = 255;
                }
            }

            ctx.putImageData(imageData, 0, 0);
        }

        // アニメーションループ
        function animate(currentTime) {
            if (currentTime - lastTime >= 16) { // 約60fps
                // ターゲットに向かってズーム
                centerX += (targetX - centerX) * 0.02;
                centerY += (targetY - centerY) * 0.02;
                zoom *= zoomSpeed;

                // ズームに応じて反復回数を増やす
                maxIterations = Math.min(500, 100 + Math.floor(Math.log10(zoom) * 30));

                drawMandelbrot();
                updateInfo();

                lastTime = currentTime;
            }

            // ズームしすぎたらリセット
            if (zoom > 1000000000000) {
                centerX = -0.5;
                centerY = 0;
                zoom = 1;
                maxIterations = 100;
            }

            animationFrame = requestAnimationFrame(animate);
        }

        function updateInfo() {
            document.getElementById('zoom').textContent = zoom < 1000 
                ? zoom.toFixed(1) + 'x' 
                : zoom.toExponential(2) + 'x';
            document.getElementById('iterations').textContent = maxIterations;
            document.getElementById('coords').textContent = 
                `(${centerX.toFixed(7)}, ${centerY.toFixed(7)})`;
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // タッチ操作でリセット
        let lastTap = 0;
        canvas.addEventListener('touchend', (e) => {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 300 && tapLength > 0) {
                // ダブルタップでリセット
                centerX = -0.5;
                centerY = 0;
                zoom = 1;
                maxIterations = 100;
            }
            lastTap = currentTime;
        });

        // 開始
        drawMandelbrot();
        animate(0);
    </script>
</body>
</html>
