<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>April Fools Calendar Art - Generative Art by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            color: #fff;
            font-size: clamp(1.5rem, 5vw, 3rem);
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.8);
            animation: rainbow 3s ease-in-out infinite;
        }

        .subtitle {
            color: #888;
            font-size: clamp(0.8rem, 2vw, 1.2rem);
            margin-bottom: 2rem;
        }

        .date-display {
            color: #ff69b4;
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: bold;
            margin: 1rem 0;
            text-shadow: 0 0 30px rgba(255, 105, 180, 0.6);
            animation: pulse 2s ease-in-out infinite;
        }

        .joke-container {
            background: rgba(255, 105, 180, 0.1);
            border: 2px solid #ff69b4;
            border-radius: 15px;
            padding: 1.5rem;
            margin: 2rem auto;
            max-width: 500px;
            position: relative;
            overflow: hidden;
        }

        .joke-text {
            color: #fff;
            font-size: clamp(0.9rem, 2.5vw, 1.3rem);
            line-height: 1.6;
            position: relative;
            z-index: 2;
        }

        .btn-next {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: #fff;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 1rem;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(255, 105, 180, 0.4);
        }

        .btn-next:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 105, 180, 0.6);
        }

        .btn-fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 105, 180, 0.3);
            color: #fff;
            border: 2px solid #ff69b4;
            padding: 0.8rem 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.3s;
            z-index: 1000;
        }

        .btn-fullscreen:hover {
            background: rgba(255, 105, 180, 0.5);
            transform: scale(1.05);
        }

        canvas#artCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }

        @keyframes rainbow {
            0%, 100% { color: #ff69b4; }
            16% { color: #ff1493; }
            33% { color: #ff69b4; }
            50% { color: #ff6b6b; }
            66% { color: #ffd93d; }
            83% { color: #6bcb77; }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                text-shadow: 0 0 30px rgba(255, 105, 180, 0.6);
            }
            50% {
                transform: scale(1.05);
                text-shadow: 0 0 50px rgba(255, 105, 180, 0.9);
            }
        }

        .emoji-rain {
            position: fixed;
            font-size: 2rem;
            animation: fall linear forwards;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <canvas id="artCanvas"></canvas>

    <button class="btn-fullscreen" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <div class="container">
        <h1>🎭 April Fools Calendar 🎭</h1>
        <div class="subtitle">Generative Art Edition - April 1st Only!</div>

        <div class="date-display">📅 April 1</div>

        <div class="joke-container">
            <div class="joke-text" id="jokeText">
                Why did the calendar go to the doctor?<br><br>
                Because it had too many dates! 🤣
            </div>
            <button class="btn-next" onclick="nextJoke()">😜 Next Joke</button>
        </div>
    </div>

    <script>
        // Canvas setup
        const canvas = document.getElementById('artCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Jokes collection
        const jokes = [
            "Why did the calendar go to the doctor?<br><br>Because it had too many dates! 🤣",
            "What do you call a calendar that's always late?<br><br>A procrastinator's planner! 😂",
            "Why did April 1 break up with March 31?<br><br>Because it needed some space! 💔",
            "What's a calendar's favorite exercise?<br><br>Date lifting! 💪",
            "Why don't calendars ever get lost?<br><br>Because they always have dates! 🗓️",
            "What did one calendar say to the other?<br><br>My days are numbered! 😄",
            "Why did the calendar cross the road?<br><br>To get to the next month! 🐔",
            "What do you call a fake noodle?<br><br>An impasta! 🍝 (April Fools!)"
        ];

        let currentJokeIndex = 0;

        function nextJoke() {
            currentJokeIndex = (currentJokeIndex + 1) % jokes.length;
            const jokeElement = document.getElementById('jokeText');
            jokeElement.style.opacity = 0;
            setTimeout(() => {
                jokeElement.innerHTML = jokes[currentJokeIndex];
                jokeElement.style.opacity = 1;
            }, 300);
            createConfetti();
        }

        // Particle system
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 4 + 2;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.color = this.getRandomColor();
                this.alpha = Math.random() * 0.5 + 0.3;
            }

            getRandomColor() {
                const colors = [
                    '#ff69b4', '#ff1493', '#ff6b6b', '#ffd93d',
                    '#6bcb77', '#4d96ff', '#ff6f91', '#ffa07a'
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x < 0 || this.x > canvas.width ||
                    this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.alpha;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        // Create particles
        const particles = [];
        for (let i = 0; i < 150; i++) {
            particles.push(new Particle());
        }

        // Draw calendar pattern
        function drawCalendarPattern() {
            const gridSize = 80;
            const cols = Math.ceil(canvas.width / gridSize);
            const rows = Math.ceil(canvas.height / gridSize);

            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const x = i * gridSize;
                    const y = j * gridSize;

                    ctx.strokeStyle = `rgba(255, 105, 180, ${Math.random() * 0.1 + 0.05})`;
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x, y, gridSize, gridSize);

                    // Add date number occasionally
                    if (Math.random() > 0.85) {
                        const day = Math.floor(Math.random() * 30) + 1;
                        ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.2 + 0.1})`;
                        ctx.font = `${Math.random() * 10 + 10}px Arial`;
                        ctx.fillText(day.toString(), x + 5, y + 20);
                    }
                }
            }
        }

        // Confetti effect
        function createConfetti() {
            const emojis = ['🎉', '🎊', '😜', '🤪', '😂', '🎭', '✨', '💫'];
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const emoji = document.createElement('div');
                    emoji.className = 'emoji-rain';
                    emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    emoji.style.left = Math.random() * 100 + 'vw';
                    emoji.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(emoji);

                    setTimeout(() => emoji.remove(), 4000);
                }, i * 50);
            }
        }

        // Animation loop
        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawCalendarPattern();

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // Draw connecting lines
            ctx.strokeStyle = 'rgba(255, 105, 180, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 100) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.globalAlpha = 1 - distance / 100;
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initial confetti
        setTimeout(createConfetti, 1000);

        // Start animation
        animate();

        // Add smooth transition to joke text
        document.getElementById('jokeText').style.transition = 'opacity 0.3s ease-in-out';
    </script>
</body>
</html>
