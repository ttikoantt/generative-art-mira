<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Interactive Mandala</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: radial-gradient(circle, #0a0a12 0%, #000000 100%);
      overflow: hidden;
      font-family: sans-serif;
      color: white;
    }
    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 1rem;
    }
    .info {
      text-align: center;
      font-size: 0.9rem;
      opacity: 0.7;
      margin-top: 10px;
    }
    .hint {
      text-align: center;
      font-size: 0.8rem;
      opacity: 0.5;
      margin-bottom: 10px;
    }
    .fullscreen-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 15px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: white;
      font-size: 0.8rem;
      cursor: pointer;
      pointer-events: auto;
      transition: all 0.3s ease;
    }
    .fullscreen-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <canvas id="artCanvas"></canvas>
    <div class="ui-layer">
      <div class="info">🎨 インタラクティブ・マンダラ</div>
      <div class="hint">画面をタップ/クリックして花を咲かせよう</div>
    </div>
    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>
  </div>

  <script>
    const canvas = document.getElementById('artCanvas');
    const ctx = canvas.getContext('2d');
    const fullscreenBtn = document.getElementById('fullscreenBtn');

    let particles = [];
    let hue = 0;
    let width, height;

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    resize();
    window.addEventListener('resize', resize);

    class Particle {
      constructor(x, y, hue, angle, speed, size) {
        this.x = x;
        this.y = y;
        this.hue = hue;
        this.angle = angle;
        this.speed = speed;
        this.size = size;
        this.life = 1.0;
        this.decay = 0.005 + Math.random() * 0.005;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotationSpeed = (Math.random() - 0.5) * 0.05;
      }

      update() {
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;
        this.life -= this.decay;
        this.rotation += this.rotationSpeed;
        this.speed *= 0.99;
        this.size *= 0.99;
      }

      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        
        const petals = 6;
        for (let i = 0; i < petals; i++) {
          const angle = (i / petals) * Math.PI * 2;
          const petalSize = this.size * 2;
          
          ctx.beginPath();
          ctx.fillStyle = `hsla(${this.hue}, 70%, 60%, ${this.life * 0.5})`;
          ctx.ellipse(
            Math.cos(angle) * petalSize,
            Math.sin(angle) * petalSize,
            petalSize * 0.8,
            petalSize * 0.3,
            angle,
            0,
            Math.PI * 2
          );
          ctx.fill();
        }
        
        ctx.beginPath();
        ctx.fillStyle = `hsla(${this.hue}, 80%, 70%, ${this.life})`;
        ctx.arc(0, 0, this.size * 0.5, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.restore();
      }
    }

    function createBurst(x, y) {
      const count = 40 + Math.random() * 20;
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count;
        const speed = 2 + Math.random() * 4;
        const size = 8 + Math.random() * 12;
        const particleHue = hue + Math.random() * 30 - 15;
        particles.push(new Particle(x, y, particleHue, angle, speed, size));
      }
      hue = (hue + 20) % 360;
    }

    function animate() {
      ctx.fillStyle = 'rgba(10, 10, 18, 0.1)';
      ctx.fillRect(0, 0, width, height);

      particles = particles.filter(p => p.life > 0);
      
      particles.forEach(p => {
        p.update();
        p.draw(ctx);
      });

      requestAnimationFrame(animate);
    }

    // Mouse/Touch interaction
    function handleInteraction(e) {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      let clientX, clientY;
      
      if (e.type === 'touchstart' || e.type === 'touchmove') {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      
      const x = clientX - rect.left;
      const y = clientY - rect.top;
      createBurst(x, y);
    }

    canvas.addEventListener('mousedown', handleInteraction);
    canvas.addEventListener('touchstart', handleInteraction);
    canvas.addEventListener('touchmove', handleInteraction);

    // Fullscreen
    fullscreenBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    });

    animate();
  </script>
</body>
</html>
