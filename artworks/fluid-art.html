<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluid Art - 流体アート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
        }

        .info h1 {
            font-size: 24px;
            margin-bottom: 5px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .info p {
            font-size: 12px;
            opacity: 0.8;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 10;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            .info h1 {
                font-size: 18px;
            }
            .info p {
                font-size: 10px;
            }
            .fullscreen-btn {
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="info">
        <h1>Fluid Art</h1>
        <p>マウス/タッチで流体を操る</p>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // パーティクル設定
        const particleCount = 300;
        const particles = [];
        const mouse = { x: width / 2, y: height / 2, active: false };

        // 色のパレット
        const colors = [
            { h: 0, s: 80, l: 60 },    // Red
            { h: 30, s: 90, l: 60 },   // Orange
            { h: 60, s: 90, l: 55 },   // Yellow
            { h: 180, s: 80, l: 50 },  // Cyan
            { h: 210, s: 80, l: 55 },  // Blue
            { h: 280, s: 70, l: 60 },  // Purple
            { h: 320, s: 80, l: 60 }   // Pink
        ];

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = 0;
                this.vy = 0;
                this.radius = Math.random() * 3 + 1;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.hueOffset = Math.random() * 60 - 30;
                this.life = 1;
                this.maxLife = Math.random() * 0.5 + 0.5;
            }

            update(time) {
                // マウスへの引力
                if (mouse.active) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 300) {
                        const force = (300 - dist) / 300;
                        this.vx += (dx / dist) * force * 0.5;
                        this.vy += (dy / dist) * force * 0.5;
                    }
                }

                // 渦運動
                const angle = Math.atan2(this.y - height / 2, this.x - width / 2);
                const dist = Math.sqrt(
                    Math.pow(this.x - width / 2, 2) + 
                    Math.pow(this.y - height / 2, 2)
                );
                const wave = Math.sin(dist * 0.01 - time * 0.002) * 0.02;
                
                this.vx += Math.sin(angle + Math.PI / 2) * (0.01 + wave);
                this.vy -= Math.cos(angle + Math.PI / 2) * (0.01 + wave);

                // ノイズ
                this.vx += (Math.random() - 0.5) * 0.1;
                this.vy += (Math.random() - 0.5) * 0.1;

                // 抵抗
                this.vx *= 0.98;
                this.vy *= 0.98;

                // 速度制限
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > 5) {
                    this.vx = (this.vx / speed) * 5;
                    this.vy = (this.vy / speed) * 5;
                }

                // 移動
                this.x += this.vx;
                this.y += this.vy;

                // 色の変化
                this.hueOffset += 0.1;

                // ライフサイクル
                this.life -= 0.001;
                if (this.life <= 0) {
                    this.reset();
                }

                // 境界チェック
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }

            draw() {
                const alpha = this.life * 0.7;
                const hue = (this.color.h + this.hueOffset) % 360;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue}, ${this.color.s}%, ${this.color.l}%, ${alpha})`;
                ctx.fill();

                // グロー効果
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue}, ${this.color.s}%, ${this.color.l}%, ${alpha * 0.3})`;
                ctx.fill();
            }
        }

        // パーティクル初期化
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        // マウスイベント
        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            mouse.active = true;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
            mouse.active = true;
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
            mouse.active = true;
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            mouse.active = false;
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.active = false;
        });

        // 全画面ボタン
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // リサイズ
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // アニメーション
        let time = 0;
        function animate() {
            // フェード効果
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                p.update(time);
                p.draw();
            });

            // 接続線（近いパーティクル同士）
            ctx.lineWidth = 0.5;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 80) {
                        const alpha = (1 - dist / 80) * 0.2 * particles[i].life * particles[j].life;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                        ctx.stroke();
                    }
                }
            }

            time++;
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
