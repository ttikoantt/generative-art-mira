<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Particle Flow Field</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
        }

        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .fullscreen {
            position: fixed;
            top: 20px;
            right: 80px;
            z-index: 100;
        }

        @media (max-width: 768px) {
            .controls {
                top: auto;
                bottom: 60px;
                right: 20px;
            }

            .fullscreen {
                top: 20px;
                right: 20px;
            }

            .info {
                font-size: 10px;
                bottom: 10px;
                left: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <div id="stats"></div>
        <div>Click or tap to regenerate</div>
    </div>

    <div class="controls">
        <button class="btn" id="resetBtn">Reset</button>
        <button class="btn" id="pauseBtn">Pause</button>
    </div>

    <button class="btn fullscreen" id="fullscreenBtn">⛶</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statsEl = document.getElementById('stats');
        const resetBtn = document.getElementById('resetBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let width, height;
        let particles = [];
        let animationId;
        let paused = false;
        let noiseSeed;
        let hueOffset = 0;

        // Perlin noise implementation (simplified)
        class PerlinNoise {
            constructor(seed = Math.random() * 10000) {
                this.seed = seed;
                this.permutation = [];
                for (let i = 0; i < 256; i++) {
                    this.permutation[i] = i;
                }
                // Shuffle based on seed
                for (let i = 255; i > 0; i--) {
                    const j = Math.floor(this.seededRandom() * (i + 1));
                    [this.permutation[i], this.permutation[j]] = [this.permutation[j], this.permutation[i]];
                }
                this.permutation = [...this.permutation, ...this.permutation];
            }

            seededRandom() {
                this.seed = (this.seed * 9301 + 49297) % 233280;
                return this.seed / 233280;
            }

            fade(t) {
                return t * t * t * (t * (t * 6 - 15) + 10);
            }

            lerp(a, b, t) {
                return a + t * (b - a);
            }

            grad(hash, x, y) {
                const h = hash & 3;
                const u = h < 2 ? x : y;
                const v = h < 2 ? y : x;
                return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
            }

            noise(x, y) {
                const X = Math.floor(x) & 255;
                const Y = Math.floor(y) & 255;

                x -= Math.floor(x);
                y -= Math.floor(y);

                const u = this.fade(x);
                const v = this.fade(y);

                const A = this.permutation[X] + Y;
                const B = this.permutation[X + 1] + Y;

                return this.lerp(
                    this.lerp(this.grad(this.permutation[A], x, y), this.grad(this.permutation[B], x - 1, y), u),
                    this.lerp(this.grad(this.permutation[A + 1], x, y - 1), this.grad(this.permutation[B + 1], x - 1, y - 1), u),
                    v
                );
            }
        }

        let perlin;

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = 0;
                this.vy = 0;
                this.speed = Math.random() * 2 + 1;
                this.hue = Math.random() * 60;
                this.life = Math.random() * 500 + 500;
                this.maxLife = this.life;
                this.size = Math.random() * 1.5 + 0.5;
            }

            update() {
                // Get noise value at current position
                const scale = 0.003;
                const angle = perlin.noise(this.x * scale, this.y * scale) * Math.PI * 4;

                // Update velocity based on noise angle
                this.vx += Math.cos(angle) * 0.1;
                this.vy += Math.sin(angle) * 0.1;

                // Limit speed
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > this.speed) {
                    this.vx = (this.vx / speed) * this.speed;
                    this.vy = (this.vy / speed) * this.speed;
                }

                // Update position
                this.x += this.vx;
                this.y += this.vy;

                // Wrap around edges
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;

                // Update life
                this.life--;
                if (this.life <= 0) {
                    this.reset();
                }
            }

            draw() {
                const alpha = this.life / this.maxLife;
                const hue = (this.hue + hueOffset) % 360;
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue}, 80%, 60%, ${alpha * 0.8})`;
                ctx.fill();

                // Draw trail for faster particles
                if (speed > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x - this.vx * 3, this.y - this.vy * 3);
                    ctx.strokeStyle = `hsla(${hue}, 80%, 60%, ${alpha * 0.3})`;
                    ctx.lineWidth = this.size;
                    ctx.stroke();
                }
            }
        }

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;

            noiseSeed = Math.random() * 10000;
            perlin = new PerlinNoise(noiseSeed);

            particles = [];
            const particleCount = Math.min(2000, (width * height) / 1000);
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }

            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, width, height);
        }

        function animate() {
            if (!paused) {
                // Fade effect for trails
                ctx.fillStyle = 'rgba(10, 10, 15, 0.02)';
                ctx.fillRect(0, 0, width, height);

                // Update and draw particles
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });

                hueOffset += 0.1;

                // Update stats
                statsEl.textContent = `${particles.length} particles | Seed: ${noiseSeed.toFixed(2)}`;
            }

            animationId = requestAnimationFrame(animate);
        }

        function reset() {
            cancelAnimationFrame(animationId);
            init();
            animate();
        }

        // Event listeners
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        canvas.addEventListener('click', reset);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            reset();
        });

        resetBtn.addEventListener('click', reset);
        pauseBtn.addEventListener('click', () => {
            paused = !paused;
            pauseBtn.textContent = paused ? 'Resume' : 'Pause';
        });

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') reset();
            if (e.key === ' ') {
                paused = !paused;
                pauseBtn.textContent = paused ? 'Resume' : 'Pause';
            }
        });

        // Start
        init();
        animate();
    </script>
</body>
</html>
