<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Flow Field</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    <div class="info">タップしてパーティクルを追加</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // パーティクル設定
        const particleCount = 2000;
        const particles = [];
        const mouseRadius = 150;
        let mouse = { x: null, y: null };

        // 時間ベースの色変化用
        let hue = 0;

        // パーリンノイズ風のランダム値生成
        const noiseScale = 0.005;
        const noiseGrid = {};

        function getNoise(x, y) {
            const key = `${Math.floor(x * noiseScale)},${Math.floor(y * noiseScale)}`;
            if (!noiseGrid[key]) {
                noiseGrid[key] = Math.random() * Math.PI * 2;
            }
            return noiseGrid[key];
        }

        class Particle {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = 0;
                this.speedY = 0;
                this.life = 1;
                this.decay = Math.random() * 0.001 + 0.0005;
                this.hueOffset = Math.random() * 60 - 30;
            }

            update() {
                // ノイズから角度を取得
                const angle = getNoise(this.x, this.y);

                // 基本的な流れ
                this.speedX = Math.cos(angle) * 1.5;
                this.speedY = Math.sin(angle) * 1.5;

                // マウスの影響
                if (mouse.x !== null) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < mouseRadius) {
                        const force = (mouseRadius - dist) / mouseRadius;
                        this.speedX += dx * force * 0.05;
                        this.speedY += dy * force * 0.05;
                    }
                }

                this.x += this.speedX;
                this.y += this.speedY;

                // ライフ減少
                this.life -= this.decay;

                // 境界チェック
                if (this.x < 0 || this.x > width ||
                    this.y < 0 || this.y > height ||
                    this.life <= 0) {
                    this.reset();
                }
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.life = 1;
                this.hueOffset = Math.random() * 60 - 30;
            }

            draw() {
                const currentHue = (hue + this.hueOffset) % 360;
                const alpha = this.life * 0.8;

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${currentHue}, 70%, 60%, ${alpha})`;
                ctx.fill();
            }
        }

        // 初期パーティクル
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        // アニメーション
        function animate() {
            // トレイル効果
            ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // 色を時間で変化
            hue = (hue + 0.2) % 360;

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();

        // イベントリスナー
        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouse.x = touch.clientX;
            mouse.y = touch.clientY;

            // タップした場所にパーティクルを追加
            for (let i = 0; i < 30; i++) {
                particles.push(new Particle(touch.clientX, touch.clientY));
            }

            // パーティクルが多すぎたら古いものを削除
            if (particles.length > 3000) {
                particles.splice(0, particles.length - 3000);
            }
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            mouse.x = null;
            mouse.y = null;
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        canvas.addEventListener('click', (e) => {
            // クリックした場所にパーティクルを追加
            for (let i = 0; i < 30; i++) {
                particles.push(new Particle(e.clientX, e.clientY));
            }

            // パーティクルが多すぎたら古いものを削除
            if (particles.length > 3000) {
                particles.splice(0, particles.length - 3000);
            }
        });

        // リサイズ対応
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
