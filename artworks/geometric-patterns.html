<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Patterns - 幾何学的パターン</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #e0e0e0;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #00ff88;
        }
        .info {
            font-size: 0.9rem;
            margin-bottom: 20px;
            color: #888;
        }
        #canvas {
            border: 2px solid #00ff88;
            border-radius: 8px;
            max-width: 100%;
            cursor: pointer;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        button {
            font-family: 'Courier New', monospace;
            padding: 10px 20px;
            font-size: 0.9rem;
            border: 2px solid #00ff88;
            background: #0a0a0a;
            color: #00ff88;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }
        button:hover {
            background: #00ff88;
            color: #0a0a0a;
        }
        button:active {
            transform: scale(0.95);
        }
        .pattern-info {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #666;
            text-align: center;
        }
        @media (max-width: 600px) {
            h1 { font-size: 1.2rem; }
            .info { font-size: 0.8rem; }
            button { padding: 12px 18px; }
        }
    </style>
</head>
<body>
    <h1>🔷 Geometric Patterns</h1>
    <p class="info">クリックで新しいパターン生成 | スペースキーでも生成</p>

    <canvas id="canvas" width="800" height="600"></canvas>

    <div class="controls">
        <button id="btn-sp">Spirograph</button>
        <button id="btn-mandala">Mandala</button>
        <button id="btn-lissajous">Lissajous</button>
        <button id="btn-fractal">Fractal Tree</button>
        <button id="btn-random">Random</button>
        <button id="btn-download">💾 保存</button>
    </div>

    <p class="pattern-info" id="patternInfo">パターン: Spirograph</p>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let currentPattern = 'spirograph';

        // パターン名の日本語表示
        const patternNames = {
            'spirograph': 'Spirograph（スピログラフ）',
            'mandala': 'Mandala（曼荼羅）',
            'lissajous': 'Lissajous（リサージュ図形）',
            'fractal': 'Fractal Tree（フラクタル樹木）',
            'random': 'Random（ランダム）'
        };

        // 色パレット
        const palettes = [
            ['#00ff88', '#00ccff', '#ff00ff', '#ffff00'],
            ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4'],
            ['#667eea', '#764ba2', '#f093fb', '#4facfe'],
            ['#fa709a', '#fee140', '#fa709a', '#30cfd0'],
            ['#00d2ff', '#3a7bd5', '#ff9a9e', '#fecfef']
        ];

        function getRandomPalette() {
            return palettes[Math.floor(Math.random() * palettes.length)];
        }

        function clearCanvas() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSpirograph() {
            clearCanvas();
            const palette = getRandomPalette();
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const R = 150 + Math.random() * 50;
            const r = 30 + Math.random() * 70;
            const d = 20 + Math.random() * 60;

            ctx.lineWidth = 1;

            for (let i = 0; i < 5; i++) {
                ctx.strokeStyle = palette[i % palette.length];
                ctx.beginPath();

                for (let t = 0; t < Math.PI * 20; t += 0.01) {
                    const x = cx + (R - r) * Math.cos(t) + d * Math.cos(((R - r) / r) * t);
                    const y = cy + (R - r) * Math.sin(t) - d * Math.sin(((R - r) / r) * t);

                    if (t === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }

                ctx.stroke();
                r += 10;
            }
        }

        function drawMandala() {
            clearCanvas();
            const palette = getRandomPalette();
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const layers = 5 + Math.floor(Math.random() * 4);
            const segments = 8 + Math.floor(Math.random() * 8);

            for (let layer = layers; layer > 0; layer--) {
                const radius = (layer / layers) * 250;
                const colorIndex = layer % palette.length;

                for (let i = 0; i < segments; i++) {
                    const angle = (i / segments) * Math.PI * 2;
                    const nextAngle = ((i + 1) / segments) * Math.PI * 2;

                    ctx.fillStyle = palette[colorIndex];
                    ctx.globalAlpha = 0.6;

                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.arc(cx, cy, radius, angle, nextAngle);
                    ctx.closePath();
                    ctx.fill();

                    // 装飾
                    ctx.strokeStyle = palette[(colorIndex + 1) % palette.length];
                    ctx.lineWidth = 1;
                    ctx.globalAlpha = 1;
                    ctx.stroke();
                }
            }

            // 中心円
            ctx.beginPath();
            ctx.arc(cx, cy, 30, 0, Math.PI * 2);
            ctx.fillStyle = palette[0];
            ctx.globalAlpha = 0.8;
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        function drawLissajous() {
            clearCanvas();
            const palette = getRandomPalette();
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            for (let set = 0; set < 5; set++) {
                const A = 100 + Math.random() * 150;
                const B = 100 + Math.random() * 150;
                const a = 1 + Math.floor(Math.random() * 5);
                const b = 1 + Math.floor(Math.random() * 5);
                const delta = Math.random() * Math.PI * 2;

                ctx.strokeStyle = palette[set % palette.length];
                ctx.lineWidth = 2;
                ctx.globalAlpha = 0.7;
                ctx.beginPath();

                for (let t = 0; t < Math.PI * 4; t += 0.01) {
                    const x = cx + A * Math.sin(a * t + delta);
                    const y = cy + B * Math.sin(b * t);

                    if (t === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }

                ctx.stroke();
                ctx.globalAlpha = 1;
            }
        }

        function drawFractalTree() {
            clearCanvas();
            const palette = getRandomPalette();

            function drawBranch(x, y, length, angle, depth, paletteIndex) {
                if (depth === 0 || length < 2) return;

                const endX = x + length * Math.cos(angle);
                const endY = y - length * Math.sin(angle);

                ctx.strokeStyle = palette[paletteIndex % palette.length];
                ctx.lineWidth = depth * 0.8;
                ctx.globalAlpha = 0.8;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(endX, endY);
                ctx.stroke();
                ctx.globalAlpha = 1;

                const branches = 2 + Math.floor(Math.random() * 2);
                for (let i = 0; i < branches; i++) {
                    const newAngle = angle + (Math.random() - 0.5) * 1.5;
                    const newLength = length * (0.6 + Math.random() * 0.2);
                    drawBranch(endX, endY, newLength, newAngle, depth - 1, paletteIndex + 1);
                }
            }

            // 複数の木
            for (let i = 0; i < 3; i++) {
                const startX = 150 + i * 250;
                drawBranch(startX, canvas.height - 50, 80 + Math.random() * 40, Math.PI / 2, 10, 0);
            }
        }

        function drawRandom() {
            const patterns = ['spirograph', 'mandala', 'lissajous', 'fractal'];
            const randomPattern = patterns[Math.floor(Math.random() * patterns.length)];

            switch (randomPattern) {
                case 'spirograph': drawSpirograph(); break;
                case 'mandala': drawMandala(); break;
                case 'lissajous': drawLissajous(); break;
                case 'fractal': drawFractalTree(); break;
            }
        }

        function generate() {
            switch (currentPattern) {
                case 'spirograph': drawSpirograph(); break;
                case 'mandala': drawMandala(); break;
                case 'lissajous': drawLissajous(); break;
                case 'fractal': drawFractalTree(); break;
                case 'random': drawRandom(); break;
            }
        }

        // イベントリスナー
        canvas.addEventListener('click', generate);

        document.getElementById('btn-sp').addEventListener('click', () => {
            currentPattern = 'spirograph';
            document.getElementById('patternInfo').textContent = 'パターン: ' + patternNames[currentPattern];
            generate();
        });

        document.getElementById('btn-mandala').addEventListener('click', () => {
            currentPattern = 'mandala';
            document.getElementById('patternInfo').textContent = 'パターン: ' + patternNames[currentPattern];
            generate();
        });

        document.getElementById('btn-lissajous').addEventListener('click', () => {
            currentPattern = 'lissajous';
            document.getElementById('patternInfo').textContent = 'パターン: ' + patternNames[currentPattern];
            generate();
        });

        document.getElementById('btn-fractal').addEventListener('click', () => {
            currentPattern = 'fractal';
            document.getElementById('patternInfo').textContent = 'パターン: ' + patternNames[currentPattern];
            generate();
        });

        document.getElementById('btn-random').addEventListener('click', () => {
            currentPattern = 'random';
            document.getElementById('patternInfo').textContent = 'パターン: ' + patternNames[currentPattern];
            generate();
        });

        document.getElementById('btn-download').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'geometric-pattern.png';
            link.href = canvas.toDataURL();
            link.click();
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                generate();
            }
        });

        // 初期描画
        generate();
    </script>
</body>
</html>
