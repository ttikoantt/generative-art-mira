<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiral Galaxy Art - 螺旋銀河アート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            z-index: 10;
            max-width: 300px;
        }

        .info h1 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #8b5cf6;
        }

        .info p {
            margin: 5px 0;
            line-height: 1.5;
            color: #ccc;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .controls button {
            background: rgba(139, 92, 246, 0.3);
            border: 1px solid #8b5cf6;
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .controls button:hover {
            background: rgba(139, 92, 246, 0.6);
            transform: scale(1.05);
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(139, 92, 246, 0.3);
            border: 1px solid #8b5cf6;
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(139, 92, 246, 0.6);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <h1>🌌 Spiral Galaxy Art</h1>
        <p>螺旋銀河のような美しいパーティクルアート</p>
        <p>• タップ/クリックで新星を追加</p>
        <p>• ドラッグで銀河の回転を制御</p>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="controls">
        <button onclick="resetGalaxy()">🔄 リセット</button>
        <button onclick="toggleTrails()">✨ 軌跡</button>
        <button onclick="changeColorScheme()">🎨 色変更</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let mouseX = 0, mouseY = 0;
        let rotationSpeed = 0.002;
        let showTrails = true;
        let colorScheme = 0;

        const colorSchemes = [
            ['#8b5cf6', '#a78bfa', '#c4b5fd', '#ddd6fe'],  // 紫
            ['#06b6d4', '#22d3ee', '#67e8f9', '#a5f3fc'],  // シアン
            ['#f59e0b', '#fbbf24', '#fcd34d', '#fde68a'],  // オレンジ
            ['#ec4899', '#f472b6', '#f9a8d4', '#fbcfe8'],  // ピンク
            ['#10b981', '#34d399', '#6ee7b7', '#a7f3d0'],  // グリーン
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor(x, y, isStar = false) {
                this.x = x || width / 2;
                this.y = y || height / 2;
                this.isStar = isStar;
                this.reset();
            }

            reset() {
                if (this.isStar) {
                    this.angle = Math.random() * Math.PI * 2;
                    this.radius = 50 + Math.random() * Math.min(width, height) * 0.35;
                    this.speed = 0.0005 + Math.random() * 0.001;
                    this.size = 1 + Math.random() * 2;
                } else {
                    this.angle = Math.random() * Math.PI * 2;
                    this.radius = Math.random() * Math.min(width, height) * 0.4;
                    this.speed = 0.001 + Math.random() * 0.003;
                    this.size = 0.5 + Math.random() * 1.5;
                }

                const colors = colorSchemes[colorScheme];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.alpha = 0.3 + Math.random() * 0.7;
                this.twinkle = Math.random() * Math.PI * 2;
                this.twinkleSpeed = 0.02 + Math.random() * 0.03;
            }

            update() {
                this.angle += this.speed * rotationSpeed;
                this.twinkle += this.twinkleSpeed;
            }

            draw() {
                const x = width / 2 + Math.cos(this.angle) * this.radius;
                const y = height / 2 + Math.sin(this.angle) * this.radius;

                const twinkleAlpha = this.alpha * (0.5 + 0.5 * Math.sin(this.twinkle));

                ctx.beginPath();
                ctx.arc(x, y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = twinkleAlpha;
                ctx.fill();

                if (this.size > 1.5) {
                    // 星の光る効果
                    const gradient = ctx.createRadialGradient(x, y, 0, x, y, this.size * 3);
                    gradient.addColorStop(0, this.color);
                    gradient.addColorStop(1, 'transparent');
                    ctx.beginPath();
                    ctx.arc(x, y, this.size * 3, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.globalAlpha = twinkleAlpha * 0.3;
                    ctx.fill();
                }

                ctx.globalAlpha = 1;
            }
        }

        function initGalaxy() {
            particles = [];

            // 中心の明るい星
            for (let i = 0; i < 30; i++) {
                particles.push(new Particle(width / 2, height / 2, true));
            }

            // 螺旋アームのパーティクル
            const armCount = 2;
            const particlesPerArm = 400;

            for (let arm = 0; arm < armCount; arm++) {
                for (let i = 0; i < particlesPerArm; i++) {
                    const angleOffset = (arm / armCount) * Math.PI * 2;
                    const distance = (i / particlesPerArm) * Math.min(width, height) * 0.4;
                    const angle = angleOffset + (i / particlesPerArm) * Math.PI * 4;

                    const x = width / 2 + Math.cos(angle) * distance;
                    const y = height / 2 + Math.sin(angle) * distance;

                    const particle = new Particle(x, y);
                    particle.angle = angle;
                    particle.radius = distance;
                    particles.push(particle);
                }
            }

            // 背景の散らばった星
            for (let i = 0; i < 300; i++) {
                const particle = new Particle();
                particle.radius = Math.random() * Math.min(width, height) * 0.45;
                particles.push(particle);
            }
        }

        function animate() {
            if (showTrails) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                ctx.fillRect(0, 0, width, height);
            } else {
                ctx.clearRect(0, 0, width, height);
            }

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        function resetGalaxy() {
            initGalaxy();
        }

        function toggleTrails() {
            showTrails = !showTrails;
        }

        function changeColorScheme() {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
            particles.forEach(p => {
                const colors = colorSchemes[colorScheme];
                p.color = colors[Math.floor(Math.random() * colors.length)];
            });
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        canvas.addEventListener('click', (e) => {
            for (let i = 0; i < 5; i++) {
                const particle = new Particle(e.clientX, e.clientY, true);
                particles.push(particle);
            }

            // パーティクル数が多すぎたら古いものを削除
            if (particles.length > 2000) {
                particles = particles.slice(-1500);
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        window.addEventListener('resize', resize);

        // 初期化
        resize();
        initGalaxy();
        animate();
    </script>
</body>
</html>
