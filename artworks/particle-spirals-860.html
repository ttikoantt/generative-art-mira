<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Spirals #860</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            pointer-events: none;
        }

        .info h1 {
            font-size: 18px;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #ff006e, #8338ec, #3a86ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .info p {
            opacity: 0.7;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="info">
        <h1>Particle Spirals #860</h1>
        <p>Click to reset • Drag to rotate</p>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        let particles = [];
        let rotation = 0;
        let isDragging = false;
        let lastX = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        class Particle {
            constructor(spiralIndex, spiralOffset) {
                this.spiralIndex = spiralIndex;
                this.spiralOffset = spiralOffset;
                this.reset();
            }

            reset() {
                this.angle = this.spiralOffset + (this.spiralIndex * Math.PI * 2 / 5);
                this.radius = 0;
                this.speed = 1 + Math.random() * 0.5;
                this.size = 2 + Math.random() * 3;
                this.hue = (this.spiralIndex * 60 + rotation * 50) % 360;
                this.alpha = 1;
                this.decay = 0.002 + Math.random() * 0.003;
            }

            update() {
                this.angle += 0.02;
                this.radius += this.speed;
                this.hue = (this.spiralIndex * 60 + rotation * 50 + this.radius * 0.5) % 360;
                this.alpha -= this.decay;

                if (this.alpha <= 0 || this.radius > Math.max(width, height) * 0.6) {
                    this.reset();
                }
            }

            draw() {
                const x = centerX + Math.cos(this.angle + rotation) * this.radius;
                const y = centerY + Math.sin(this.angle + rotation) * this.radius;

                const gradient = ctx.createRadialGradient(x, y, 0, x, y, this.size);
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 60%, ${this.alpha})`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 100%, 50%, ${this.alpha * 0.5})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 100%, 40%, 0)`);

                ctx.beginPath();
                ctx.arc(x, y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            const particlesPerSpiral = 30;
            const spirals = 5;

            for (let i = 0; i < spirals; i++) {
                for (let j = 0; j < particlesPerSpiral; j++) {
                    const offset = (j / particlesPerSpiral) * Math.PI * 2;
                    particles.push(new Particle(i, offset));
                }
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            rotation += 0.005;

            requestAnimationFrame(animate);
        }

        // Event Listeners
        window.addEventListener('resize', () => {
            resize();
            init();
        });

        canvas.addEventListener('click', () => {
            init();
        });

        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastX = e.clientX;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                rotation += (e.clientX - lastX) * 0.01;
                lastX = e.clientX;
            }
        });

        canvas.addEventListener('mouseup', () => {
            isDragging = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
        });

        // Touch events
        canvas.addEventListener('touchstart', (e) => {
            isDragging = true;
            lastX = e.touches[0].clientX;
        });

        canvas.addEventListener('touchmove', (e) => {
            if (isDragging) {
                e.preventDefault();
                rotation += (e.touches[0].clientX - lastX) * 0.01;
                lastX = e.touches[0].clientX;
            }
        });

        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });

        // Initialize
        resize();
        init();
        animate();
    </script>
</body>
</html>
