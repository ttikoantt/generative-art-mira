<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Particle Dance - 声で踊るパーティクル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        canvas {
            display: block;
        }
        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #start-overlay.hidden {
            display: none;
        }
        .start-content {
            text-align: center;
            color: #fff;
        }
        .start-content h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .start-content p {
            font-size: 1.2em;
            margin-bottom: 30px;
            color: #888;
        }
        .start-btn {
            padding: 15px 40px;
            font-size: 1.2em;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            border-radius: 50px;
            color: #fff;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(78, 205, 196, 0.4);
        }
        #info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 14px;
            z-index: 50;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 10px;
        }
        #info h2 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #4ecdc4;
        }
        #fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 25px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            z-index: 50;
            backdrop-filter: blur(10px);
        }
        #fullscreen-btn:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div id="start-overlay">
        <div class="start-content">
            <h1>🎤 Voice Particle Dance</h1>
            <p>声でパーティクルを踊らせよう！<br>音に合わせて美しい光の粒子が広がります</p>
            <button class="start-btn" id="start-btn">🎵 スタート</button>
        </div>
    </div>
    <div id="info">
        <h2>🎤 Voice Particle Dance</h2>
        <div>音量レベル: <span id="volume">0</span>%</div>
        <div>パーティクル数: <span id="particle-count">0</span></div>
    </div>
    <button id="fullscreen-btn">全画面</button>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const startOverlay = document.getElementById('start-overlay');
        const volumeDisplay = document.getElementById('volume');
        const particleCountDisplay = document.getElementById('particle-count');
        const fullscreenBtn = document.getElementById('fullscreen-btn');

        let width, height;
        let particles = [];
        let audioContext, analyser, microphone, dataArray;
        let isRunning = false;
        let volume = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        class Particle {
            constructor(x, y, volume) {
                this.x = x;
                this.y = y;
                this.baseX = x;
                this.baseY = y;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * volume * 0.3;
                this.speedY = (Math.random() - 0.5) * volume * 0.3;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.005;
                
                // 色の生成（音量に応じて変化）
                const hue = (volume * 2 + Math.random() * 60) % 360;
                this.color = `hsl(${hue}, 100%, 60%)`;
                this.glowColor = `hsl(${hue}, 100%, 40%)`;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += 0.05; // 重力
                this.life -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                
                // グロー効果
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.glowColor;
                
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life * 2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }

        async function initAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                microphone = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                microphone.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                return true;
            } catch (err) {
                console.error('マイクアクセスエラー:', err);
                alert('マイクへのアクセスが必要です');
                return false;
            }
        }

        function getVolume() {
            if (!analyser) return 0;
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            return sum / dataArray.length;
        }

        function createParticles() {
            const centerX = width / 2;
            const centerY = height / 2;
            const particleCount = Math.floor(volume / 5);
            
            for (let i = 0; i < particleCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 100;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;
                particles.push(new Particle(x, y, volume));
            }
        }

        function drawBackground() {
            // 背景のグラデーション
            const gradient = ctx.createRadialGradient(
                width / 2, height / 2, 0,
                width / 2, height / 2, width
            );
            gradient.addColorStop(0, `rgba(20, 20, 40, ${0.1 + volume / 500})`);
            gradient.addColorStop(1, 'rgba(10, 10, 15, 1)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // 中心のグロー
            if (volume > 20) {
                ctx.save();
                const glowSize = volume * 3;
                const gradient2 = ctx.createRadialGradient(
                    width / 2, height / 2, 0,
                    width / 2, height / 2, glowSize
                );
                gradient2.addColorStop(0, `rgba(78, 205, 196, ${volume / 200})`);
                gradient2.addColorStop(1, 'rgba(78, 205, 196, 0)');
                ctx.fillStyle = gradient2;
                ctx.fillRect(0, 0, width, height);
                ctx.restore();
            }
        }

        function animate() {
            if (!isRunning) return;

            volume = getVolume();
            volumeDisplay.textContent = Math.floor(volume);

            drawBackground();

            // 新しいパーティクル生成
            if (volume > 10) {
                createParticles();
            }

            // パーティクル更新と描画
            particles = particles.filter(p => p.life > 0);
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            particleCountDisplay.textContent = particles.length;

            requestAnimationFrame(animate);
        }

        startBtn.addEventListener('click', async () => {
            const success = await initAudio();
            if (success) {
                startOverlay.classList.add('hidden');
                isRunning = true;
                animate();
            }
        });

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // 初期背景描画
        drawBackground();
    </script>
</body>
</html>
