<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Reactive Particles - 音声反応型パーティクル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        canvas {
            display: block;
        }

        .overlay {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            z-index: 100;
            pointer-events: none;
        }

        .title {
            font-size: 14px;
            font-weight: 300;
            opacity: 0.7;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .status {
            font-size: 12px;
            opacity: 0.5;
        }

        .start-button {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            border-radius: 50px;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .start-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%) scale(1.05);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            border-radius: 20px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="overlay">
        <div class="title">AUDIO REACTIVE PARTICLES</div>
        <div class="status" id="status">クリックしてスタート</div>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>
    <button class="start-button" id="startBtn">🎤 音声を開始</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const statusEl = document.getElementById('status');

        let width, height;
        let particles = [];
        let audioContext, analyser, microphone, dataArray;
        let isRunning = false;
        let bassLevel = 0;
        let midLevel = 0;
        let highLevel = 0;

        // リサイズ
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        resize();
        window.addEventListener('resize', resize);

        // パーティクルクラス
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.baseX = this.x;
                this.baseY = this.y;
                this.size = Math.random() * 3 + 1;
                this.baseSize = this.size;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.hue = Math.random() * 60 + 180; // 青〜紫系
                this.angle = Math.random() * Math.PI * 2;
                this.radius = Math.random() * 100 + 50;
            }

            update(bass, mid, high) {
                // 音に反応して動きが激しくなる
                const bassBoost = bass * 5;
                const midBoost = mid * 3;
                const highBoost = high * 2;

                this.angle += 0.02 + midBoost * 0.05;

                // 複雑な動き
                this.x = this.baseX + Math.cos(this.angle) * (this.radius + bassBoost * 50);
                this.y = this.baseY + Math.sin(this.angle) * (this.radius + midBoost * 30);

                // 音に反応してサイズが変わる
                this.size = this.baseSize * (1 + bassBoost * 2);

                // 色が変化
                this.hue = 180 + bassBoost * 60 + highBoost * 60;

                // 画面外に出たらリセット
                if (this.x < -100 || this.x > width + 100 ||
                    this.y < -100 || this.y > height + 100) {
                    this.reset();
                }
            }

            draw() {
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size
                );

                const alpha = Math.min(1, this.size / 5);
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 70%, ${alpha})`);
                gradient.addColorStop(0.5, `hsla(${this.hue + 20}, 100%, 50%, ${alpha * 0.5})`);
                gradient.addColorStop(1, `hsla(${this.hue + 40}, 100%, 30%, 0)`);

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        // パーティクル初期化
        function initParticles() {
            particles = [];
            const count = Math.min(200, (width * height) / 5000);
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        // 音声分析
        function analyzeAudio() {
            if (!analyser) return;

            analyser.getByteFrequencyData(dataArray);

            // 周波数帯域別にレベルを計算
            const bassEnd = Math.floor(dataArray.length * 0.1);
            const midEnd = Math.floor(dataArray.length * 0.5);

            let bassSum = 0, midSum = 0, highSum = 0;

            for (let i = 0; i < dataArray.length; i++) {
                const value = dataArray[i] / 255;
                if (i < bassEnd) {
                    bassSum += value;
                } else if (i < midEnd) {
                    midSum += value;
                } else {
                    highSum += value;
                }
            }

            bassLevel = bassSum / bassEnd;
            midLevel = midSum / (midEnd - bassEnd);
            highLevel = highSum / (dataArray.length - midEnd);
        }

        // 背景
        function drawBackground() {
            // 音に反応して背景も動く
            const gradient = ctx.createRadialGradient(
                width / 2, height / 2, 0,
                width / 2, height / 2, Math.max(width, height)
            );

            const brightness = bassLevel * 20;
            gradient.addColorStop(0, `rgb(${brightness}, ${brightness * 0.5}, ${brightness * 1.5})`);
            gradient.addColorStop(0.5, `rgb(${brightness * 0.3}, ${brightness * 0.2}, ${brightness * 0.5})`);
            gradient.addColorStop(1, '#000');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }

        // アニメーション
        function animate() {
            analyzeAudio();
            drawBackground();

            // パーティクル更新
            particles.forEach(p => {
                p.update(bassLevel, midLevel, highLevel);
                p.draw();
            });

            // 接続線
            drawConnections();

            requestAnimationFrame(animate);
        }

        // 接続線
        function drawConnections() {
            const maxDist = 150 + bassLevel * 50;

            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < maxDist) {
                        const alpha = (1 - dist / maxDist) * 0.3 * (1 + bassLevel);
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `hsla(${particles[i].hue}, 100%, 70%, ${alpha})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }
        }

        // 音声セットアップ
        async function setupAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);

                isRunning = true;
                startBtn.style.display = 'none';
                statusEl.textContent = '音声検出中...';
                statusEl.style.opacity = '0.7';

                initParticles();
                animate();
            } catch (err) {
                console.error('音声取得エラー:', err);
                statusEl.textContent = 'エラー: マイクへのアクセスが許可されていません';
            }
        }

        // 全画面
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // スタート
        startBtn.addEventListener('click', setupAudio);

        // 初期化
        initParticles();

        // 静止画（音声なし）
        function drawStatic() {
            if (isRunning) return;

            drawBackground();

            particles.forEach((p, i) => {
                p.angle = Date.now() * 0.001 + i * 0.1;
                p.update(0.1, 0.1, 0.1);
                p.draw();
            });

            drawConnections();
            requestAnimationFrame(drawStatic);
        }

        drawStatic();
    </script>
</body>
</html>
