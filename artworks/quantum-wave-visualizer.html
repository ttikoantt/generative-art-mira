<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Wave Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        canvas {
            border: 1px solid #333;
            max-width: 100%;
            max-height: 70vh;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        label {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
        }

        input[type="range"] {
            width: 150px;
            accent-color: #0ff;
        }

        .info {
            color: #666;
            font-size: 11px;
            margin-top: 15px;
            text-align: center;
        }

        .title {
            color: #0ff;
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #0ff;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1 class="title">Quantum Wave Visualizer</h1>
    <canvas id="waveCanvas"></canvas>

    <div class="controls">
        <div class="control-group">
            <label>Wave Count: <span id="waveCountValue">5</span></label>
            <input type="range" id="waveCount" min="2" max="10" value="5">
        </div>
        <div class="control-group">
            <label>Speed: <span id="speedValue">1.0</span>x</label>
            <input type="range" id="speed" min="0.1" max="3" step="0.1" value="1">
        </div>
        <div class="control-group">
            <label>Amplitude: <span id="amplitudeValue">50</span></label>
            <input type="range" id="amplitude" min="20" max="100" value="50">
        </div>
        <div class="control-group">
            <label>Interference: <span id="interferenceValue">1.0</span></label>
            <input type="range" id="interference" min="0.1" max="2" step="0.1" value="1">
        </div>
    </div>

    <div class="info">
        複数の波が干渉し合うことで、複雑で美しいパターンが生まれます
    </div>

    <script>
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');

        // Canvas size
        const width = Math.min(800, window.innerWidth - 40);
        const height = Math.min(400, window.innerHeight * 0.6);
        canvas.width = width;
        canvas.height = height;

        // Parameters
        let waveCount = 5;
        let speed = 1.0;
        let amplitude = 50;
        let interference = 1.0;

        // Wave properties
        const waves = [];
        for (let i = 0; i < 10; i++) {
            waves.push({
                frequency: 0.01 + Math.random() * 0.02,
                phase: Math.random() * Math.PI * 2,
                speed: 0.02 + Math.random() * 0.03,
                color: `hsl(${i * 36}, 100%, 50%)`
            });
        }

        let time = 0;
        let hue = 0;

        // Controls
        document.getElementById('waveCount').addEventListener('input', (e) => {
            waveCount = parseInt(e.target.value);
            document.getElementById('waveCountValue').textContent = waveCount;
        });

        document.getElementById('speed').addEventListener('input', (e) => {
            speed = parseFloat(e.target.value);
            document.getElementById('speedValue').textContent = speed.toFixed(1);
        });

        document.getElementById('amplitude').addEventListener('input', (e) => {
            amplitude = parseInt(e.target.value);
            document.getElementById('amplitudeValue').textContent = amplitude;
        });

        document.getElementById('interference').addEventListener('input', (e) => {
            interference = parseFloat(e.target.value);
            document.getElementById('interferenceValue').textContent = interference.toFixed(1);
        });

        function drawWave(wave, offsetX, alpha) {
            ctx.beginPath();
            ctx.strokeStyle = wave.color.replace(')', `, ${alpha})`).replace('hsl', 'hsla');
            ctx.lineWidth = 2;

            for (let x = 0; x < width; x++) {
                const y = height / 2 +
                    Math.sin(x * wave.frequency + wave.phase + time * wave.speed * 5) *
                    amplitude * interference;

                if (x === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }

            ctx.stroke();
        }

        function drawInterference() {
            ctx.beginPath();
            ctx.strokeStyle = `hsl(${hue}, 100%, 70%)`;
            ctx.lineWidth = 3;

            for (let x = 0; x < width; x++) {
                let y = 0;

                for (let i = 0; i < waveCount; i++) {
                    y += Math.sin(x * waves[i].frequency + waves[i].phase + time * waves[i].speed * 5);
                }

                y = (height / 2) + (y / waveCount) * amplitude;

                if (x === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }

            ctx.stroke();
        }

        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // Update phase and hue
            time += 0.016 * speed;
            hue = (hue + 0.5 * speed) % 360;

            // Draw individual waves (faint)
            for (let i = 0; i < waveCount; i++) {
                waves[i].phase += waves[i].speed * speed;
                drawWave(waves[i], 0, 0.2);
            }

            // Draw interference pattern (bright)
            drawInterference();

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
