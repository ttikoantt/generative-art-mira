<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firefly Fields - 光の粒子が踊る夜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #0a0a1a, #1a1a3a);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
        }

        .fullScreenBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .fullScreenBtn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .fullScreenBtn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">クリック・タップで光を放つ</div>
    <button class="fullScreenBtn" onclick="toggleFullScreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const fireflies = [];
        const maxFireflies = 150;

        class Firefly {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.hue = Math.random() * 60 + 30; // 黄色からオレンジ
                this.brightness = Math.random() * 0.5 + 0.5;
                this.pulse = Math.random() * Math.PI * 2;
                this.pulseSpeed = Math.random() * 0.02 + 0.01;
                this.trail = [];
                this.maxTrail = 10;
            }

            update() {
                // 軌跡を保存
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }

                // 動き
                this.x += this.speedX;
                this.y += this.speedY;

                // 画面外で反転
                if (this.x < 0 || this.x > width) this.speedX *= -1;
                if (this.y < 0 || this.y > height) this.speedY *= -1;

                // パルス
                this.pulse += this.pulseSpeed;

                // 少しずつ方向を変える
                this.speedX += (Math.random() - 0.5) * 0.1;
                this.speedY += (Math.random() - 0.5) * 0.1;

                // 速度制限
                const maxSpeed = 2;
                const speed = Math.sqrt(this.speedX ** 2 + this.speedY ** 2);
                if (speed > maxSpeed) {
                    this.speedX = (this.speedX / speed) * maxSpeed;
                    this.speedY = (this.speedY / speed) * maxSpeed;
                }
            }

            draw() {
                const pulseFactor = Math.sin(this.pulse) * 0.5 + 0.5;
                const currentBrightness = this.brightness * pulseFactor;
                const currentSize = this.size * (1 + pulseFactor * 0.5);

                // 軌跡を描画
                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const alpha = (i / this.trail.length) * 0.3;
                    const size = currentSize * (i / this.trail.length);
                    
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue}, 100%, 70%, ${alpha})`;
                    ctx.fill();
                }

                // 本体の輝き
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, currentSize * 3
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 80%, ${currentBrightness})`);
                gradient.addColorStop(0.3, `hsla(${this.hue}, 100%, 60%, ${currentBrightness * 0.5})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 100%, 50%, 0)`);

                ctx.beginPath();
                ctx.arc(this.x, this.y, currentSize * 3, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // 中心の白い点
                ctx.beginPath();
                ctx.arc(this.x, this.y, currentSize, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 90%, ${currentBrightness})`;
                ctx.fill();
            }
        }

        // 初期のホタルを生成
        for (let i = 0; i < 50; i++) {
            fireflies.push(new Firefly());
        }

        // クリックで新しいホタルを追加
        function addFireflies(x, y, count = 5) {
            for (let i = 0; i < count; i++) {
                const offsetX = (Math.random() - 0.5) * 50;
                const offsetY = (Math.random() - 0.5) * 50;
                fireflies.push(new Firefly(x + offsetX, y + offsetY));
            }
            // 最大数を維持
            while (fireflies.length > maxFireflies) {
                fireflies.shift();
            }
        }

        canvas.addEventListener('click', (e) => {
            addFireflies(e.clientX, e.clientY, 10);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            addFireflies(touch.clientX, touch.clientY, 10);
        });

        // 背景の星空
        const stars = [];
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * width,
                y: Math.random() * height,
                size: Math.random() * 1.5,
                twinkle: Math.random() * Math.PI * 2
            });
        }

        function drawStars() {
            stars.forEach(star => {
                star.twinkle += 0.02;
                const brightness = Math.sin(star.twinkle) * 0.3 + 0.7;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${brightness * 0.5})`;
                ctx.fill();
            });
        }

        function animate() {
            // 半透明の黒で上書き（トレイル効果）
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, width, height);

            drawStars();

            fireflies.forEach(firefly => {
                firefly.update();
                firefly.draw();
            });

            // 近いホタル同士を線で繋ぐ
            ctx.strokeStyle = 'rgba(255, 200, 100, 0.1)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < fireflies.length; i++) {
                for (let j = i + 1; j < fireflies.length; j++) {
                    const dx = fireflies[i].x - fireflies[j].x;
                    const dy = fireflies[i].y - fireflies[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 100) {
                        ctx.beginPath();
                        ctx.moveTo(fireflies[i].x, fireflies[i].y);
                        ctx.lineTo(fireflies[j].x, fireflies[j].y);
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        animate();

        // リサイズ対応
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
