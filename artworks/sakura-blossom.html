<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura Blossom - 桜の花びら</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
        }

        .fullscreen-btn {
            background: rgba(255, 182, 193, 0.3);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 182, 193, 0.5);
            color: #ffb6c1;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ ProN', sans-serif;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 182, 193, 0.5);
            transform: scale(1.05);
        }

        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 182, 193, 0.8);
            font-size: 24px;
            font-weight: 300;
            font-family: 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ ProN', sans-serif;
            text-shadow: 0 0 20px rgba(255, 182, 193, 0.5);
            letter-spacing: 8px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="title">桜 SAKURA</div>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let petals = [];
        const PETAL_COUNT = 150;
        let wind = 0;
        let windChange = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Petal {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = -20;
                this.z = Math.random() * 2 + 1;
                this.size = Math.random() * 8 + 4;
                this.speedX = 0;
                this.speedY = Math.random() * 1 + 0.5;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                this.swaySpeed = Math.random() * 0.02 + 0.01;
                this.swayAmount = Math.random() * 2 + 1;
                this.time = Math.random() * Math.PI * 2;

                // 桜色のバリエーション
                const colors = [
                    'rgba(255, 183, 197, ',  // #ffb7c5 light pink
                    'rgba(255, 192, 203, ',  // #ffc0cb pink
                    'rgba(255, 228, 225, ',  // #ffe4e5 misty rose
                    'rgba(255, 240, 245, ',  // #fff0f5 lavender blush
                    'rgba(255, 182, 193, '   // #ffb6c1 light pink
                ];
                this.baseColor = colors[Math.floor(Math.random() * colors.length)];
                this.opacity = Math.random() * 0.5 + 0.5;
            }

            update() {
                this.time += this.swaySpeed;

                // 風の影響
                const windEffect = wind * this.z * 0.5;
                const sway = Math.sin(this.time) * this.swayAmount;

                this.speedX = windEffect + sway * 0.5;
                this.x += this.speedX;
                this.y += this.speedY * this.z;
                this.rotation += this.rotationSpeed;

                // 画面外に出たらリセット
                if (this.y > height + 20) {
                    this.reset();
                }
                if (this.x > width + 20) {
                    this.x = -20;
                } else if (this.x < -20) {
                    this.x = width + 20;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.scale(this.z, this.z);

                // 桜の花びらの形（5枚の花弁）
                ctx.fillStyle = this.baseColor + this.opacity + ')';
                ctx.shadowColor = this.baseColor + '0.5)';
                ctx.shadowBlur = 15;

                for (let i = 0; i < 5; i++) {
                    ctx.save();
                    ctx.rotate((Math.PI * 2 / 5) * i);

                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.quadraticCurveTo(this.size * 0.3, -this.size * 0.5, 0, -this.size);
                    ctx.quadraticCurveTo(-this.size * 0.3, -this.size * 0.5, 0, 0);
                    ctx.fill();

                    ctx.restore();
                }

                // 花の中心
                ctx.beginPath();
                ctx.arc(0, 0, this.size * 0.15, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 200, ' + this.opacity + ')';
                ctx.fill();

                ctx.restore();
            }
        }

        function init() {
            resize();
            petals = [];
            for (let i = 0; i < PETAL_COUNT; i++) {
                const petal = new Petal();
                petal.y = Math.random() * height;
                petals.push(petal);
            }
        }

        function animate() {
            // 風の変化
            windChange += 0.005;
            wind = Math.sin(windChange) * 2;

            // 背景を少し残して描画（トレイル効果）
            ctx.fillStyle = 'rgba(26, 26, 46, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 花びらを更新・描画（奥から手前の順）
            petals.sort((a, b) => a.z - b.z);

            petals.forEach(petal => {
                petal.update();
                petal.draw();
            });

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', () => {
            resize();
        });

        init();
        animate();
    </script>
</body>
</html>
