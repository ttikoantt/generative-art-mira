<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural Patterns</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2em;
            text-align: center;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            font-size: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .canvas-container {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
            background: #000;
        }

        .fullscreen-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 8px 15px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .info {
            margin-top: 15px;
            text-align: center;
            opacity: 0.7;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5em;
            }

            button {
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <h1>🎨 Procedural Patterns</h1>

    <div class="controls">
        <button onclick="generatePattern('spiral')">🌀 Spiral</button>
        <button onclick="generatePattern('flower')">🌸 Flower</button>
        <button onclick="generatePattern('waves')">🌊 Waves</button>
        <button onclick="generatePattern('mandala')">🔮 Mandala</button>
        <button onclick="generatePattern('particles')">✨ Particles</button>
        <button onclick="randomPattern()">🎲 Random</button>
    </div>

    <div class="canvas-container">
        <canvas id="canvas"></canvas>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    </div>

    <div class="info">
        Click buttons to generate different patterns | Drag on canvas to interact
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Set canvas size
        function resizeCanvas() {
            const size = Math.min(window.innerWidth - 40, window.innerHeight - 200, 700);
            canvas.width = size;
            canvas.height = size;
        }

        resizeCanvas();
        window.addEventListener('resize', () => {
            resizeCanvas();
            generatePattern(currentPattern);
        });

        let currentPattern = 'spiral';
        let animationId = null;
        let time = 0;

        // Color palettes
        const palettes = [
            ['#667eea', '#764ba2', '#f093fb', '#f5576c'],
            ['#4facfe', '#00f2fe', '#43e97b', '#38f9d7'],
            ['#fa709a', '#fee140', '#ff6b6b', '#feca57'],
            ['#a8edea', '#fed6e3', '#d299c2', '#fef9d7'],
            ['#ff0844', '#ffb199', '#ff6b95', '#ffc3a0']
        ];

        function getRandomPalette() {
            return palettes[Math.floor(Math.random() * palettes.length)];
        }

        function getRandomColor(palette) {
            return palette[Math.floor(Math.random() * palette.length)];
        }

        // Spiral pattern
        function drawSpiral() {
            const palette = getRandomPalette();
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const arms = Math.floor(Math.random() * 5) + 3;
            const points = 500;

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let arm = 0; arm < arms; arm++) {
                ctx.beginPath();
                for (let i = 0; i < points; i++) {
                    const angle = (i / points) * Math.PI * 2 * (arm + 1) + time;
                    const radius = (i / points) * (canvas.width / 2 - 20);
                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;

                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.strokeStyle = palette[arm % palette.length];
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        // Flower pattern
        function drawFlower() {
            const palette = getRandomPalette();
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const petals = Math.floor(Math.random() * 6) + 5;
            const layers = Math.floor(Math.random() * 4) + 3;

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let layer = 0; layer < layers; layer++) {
                const layerRadius = (layer + 1) * (canvas.width / 2 / layers) * 0.8;

                for (let i = 0; i < petals; i++) {
                    const angle = (i / petals) * Math.PI * 2 + time + (layer * 0.2);

                    ctx.beginPath();
                    ctx.ellipse(
                        centerX + Math.cos(angle) * layerRadius * 0.5,
                        centerY + Math.sin(angle) * layerRadius * 0.5,
                        layerRadius * 0.4,
                        layerRadius * 0.15,
                        angle,
                        0,
                        Math.PI * 2
                    );
                    ctx.fillStyle = palette[layer % palette.length];
                    ctx.globalAlpha = 0.7;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }
        }

        // Waves pattern
        function drawWaves() {
            const palette = getRandomPalette();
            const waves = Math.floor(Math.random() * 5) + 5;

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let w = 0; w < waves; w++) {
                ctx.beginPath();
                ctx.moveTo(0, canvas.height);

                for (let x = 0; x <= canvas.width; x += 5) {
                    const y = canvas.height / 2 +
                        Math.sin(x * 0.02 + time + w * 0.5) * 50 +
                        Math.sin(x * 0.01 + time * 0.5) * 30 +
                        w * 20;
                    ctx.lineTo(x, y);
                }

                ctx.lineTo(canvas.width, canvas.height);
                ctx.closePath();
                ctx.fillStyle = palette[w % palette.length];
                ctx.globalAlpha = 0.5;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        // Mandala pattern
        function drawMandala() {
            const palette = getRandomPalette();
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const segments = Math.floor(Math.random() * 8) + 8;

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let ring = 1; ring <= 8; ring++) {
                const radius = ring * (canvas.width / 2 / 9);

                for (let i = 0; i < segments; i++) {
                    const angle = (i / segments) * Math.PI * 2 + time * 0.1;

                    ctx.beginPath();
                    ctx.arc(
                        centerX + Math.cos(angle) * radius * 0.5,
                        centerY + Math.sin(angle) * radius * 0.5,
                        radius * 0.2,
                        0,
                        Math.PI * 2
                    );
                    ctx.fillStyle = palette[(ring + i) % palette.length];
                    ctx.globalAlpha = 0.7;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }
        }

        // Particles pattern
        let particles = [];

        function initParticles() {
            particles = [];
            const count = 200;

            for (let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    radius: Math.random() * 3 + 1,
                    color: getRandomColor(getRandomPalette())
                });
            }
        }

        function drawParticles() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;

                // Bounce off walls
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

                // Mouse interaction
                if (mousePos.x !== null) {
                    const dx = mousePos.x - p.x;
                    const dy = mousePos.y - p.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 100) {
                        p.vx += dx * 0.001;
                        p.vy += dy * 0.001;
                    }
                }

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
            });

            // Draw connections
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 80) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // Mouse interaction
        let mousePos = { x: null, y: null };

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mousePos.x = e.clientX - rect.left;
            mousePos.y = e.clientY - rect.top;
        });

        canvas.addEventListener('mouseleave', () => {
            mousePos = { x: null, y: null };
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            mousePos.x = touch.clientX - rect.left;
            mousePos.y = touch.clientY - rect.top;
        });

        canvas.addEventListener('touchend', () => {
            mousePos = { x: null, y: null };
        });

        // Animation loop
        function animate() {
            time += 0.02;

            if (currentPattern === 'particles') {
                drawParticles();
            } else if (currentPattern === 'spiral') {
                drawSpiral();
            } else if (currentPattern === 'flower') {
                drawFlower();
            } else if (currentPattern === 'waves') {
                drawWaves();
            } else if (currentPattern === 'mandala') {
                drawMandala();
            }

            animationId = requestAnimationFrame(animate);
        }

        // Generate pattern
        function generatePattern(type) {
            if (animationId) {
                cancelAnimationFrame(animationId);
            }

            currentPattern = type;
            time = 0;

            if (type === 'particles') {
                initParticles();
            }

            animate();
        }

        function randomPattern() {
            const patterns = ['spiral', 'flower', 'waves', 'mandala', 'particles'];
            const random = patterns[Math.floor(Math.random() * patterns.length)];
            generatePattern(random);
        }

        // Fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                canvas.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initial pattern
        generatePattern('spiral');
    </script>
</body>
</html>
