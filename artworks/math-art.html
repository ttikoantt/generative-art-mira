<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathematical Art - 数式から生まれる美</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        #canvas {
            max-width: 100vw;
            max-height: 100vh;
            cursor: pointer;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-radius: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            z-index: 100;
        }

        .controls button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .controls button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }

        .controls button:active {
            transform: scale(0.95);
        }

        .info {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 20px;
            z-index: 100;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="info">🎨 数式アート - タップで新しいパターン</div>
    <canvas id="canvas"></canvas>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
    <div class="controls">
        <button onclick="generateNew()">🔄 新しいパターン</button>
        <button onclick="toggleAnimation()">⏯️ アニメーション</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        let animationId;
        let isAnimating = true;
        let time = 0;
        let params = {};

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        function generateParams() {
            return {
                a: 2 + Math.random() * 5,
                b: 3 + Math.random() * 7,
                m: 5 + Math.floor(Math.random() * 10),
                n1: 1 + Math.random() * 3,
                n2: 1 + Math.random() * 3,
                n3: 1 + Math.random() * 3,
                speed: 0.001 + Math.random() * 0.002,
                colorOffset: Math.random() * 360
            };
        }

        function draw() {
            // 半透明の黒でフェード効果
            ctx.fillStyle = 'rgba(0, 0, 0, 0.02)';
            ctx.fillRect(0, 0, width, height);

            const scale = Math.min(width, height) * 0.4;

            for (let i = 0; i < 5000; i++) {
                const t = (i / 5000) * Math.PI * 2 * params.m + time;

                // 数式に基づいたパターン生成（数式と三角関数の組み合わせ）
                const r = Math.abs(
                    Math.sin(params.n1 * t) +
                    Math.cos(params.n2 * t) +
                    Math.sin(params.n3 * t + time * 0.5)
                ) * scale;

                const x = centerX + r * Math.cos(params.a * t);
                const y = centerY + r * Math.sin(params.b * t);

                // 色の計算
                const hue = (params.colorOffset + i * 0.02 + time * 50) % 360;
                const saturation = 70 + Math.sin(t * 2) * 20;
                const lightness = 50 + Math.sin(t * 3) * 20;

                ctx.beginPath();
                ctx.arc(x, y, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
                ctx.fill();
            }

            time += params.speed;

            if (isAnimating) {
                animationId = requestAnimationFrame(draw);
            }
        }

        function generateNew() {
            params = generateParams();
            time = 0;
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
            if (!isAnimating) {
                draw();
            }
        }

        function toggleAnimation() {
            isAnimating = !isAnimating;
            if (isAnimating) {
                draw();
            } else {
                cancelAnimationFrame(animationId);
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        canvas.addEventListener('click', generateNew);

        window.addEventListener('resize', () => {
            resize();
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
        });

        resize();
        generateNew();
        draw();
    </script>
</body>
</html>
