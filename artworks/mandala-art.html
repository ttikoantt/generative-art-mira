<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandala Art Generator | Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c0015 0%, #1a0a2e 50%, #16082a 100%);
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            height: 100vh;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff006e, #8338ec, #3a86ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }

        .canvas-container {
            position: relative;
            margin: 10px 0;
        }

        canvas {
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(131, 56, 236, 0.5);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        canvas:hover {
            transform: scale(1.02);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-items: center;
            margin-top: 15px;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .control-group label {
            font-size: 0.85rem;
            color: #b8a8d4;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-group input[type="range"] {
            width: 120px;
            height: 6px;
            -webkit-appearance: none;
            background: linear-gradient(90deg, #ff006e, #8338ec);
            border-radius: 3px;
            outline: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(131, 56, 236, 0.8);
        }

        .control-group input[type="color"] {
            width: 50px;
            height: 35px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: transparent;
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff006e, #8338ec);
            color: #fff;
            box-shadow: 0 4px 20px rgba(255, 0, 110, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(255, 0, 110, 0.6);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #3a86ff, #8338ec);
            color: #fff;
            box-shadow: 0 4px 20px rgba(58, 134, 255, 0.4);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(58, 134, 255, 0.6);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(131, 56, 236, 0.8);
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            z-index: 1000;
        }

        .info {
            margin-top: 10px;
            font-size: 0.85rem;
            color: #b8a8d4;
            text-align: center;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.4rem;
            }

            canvas {
                max-width: 90vw;
                max-height: 50vh;
            }

            .controls {
                padding: 10px 15px;
            }

            .control-group input[type="range"] {
                width: 100px;
            }

            .btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全画面</button>

    <div class="container">
        <h1>✨ Mandala Art Generator</h1>

        <div class="canvas-container">
            <canvas id="mandalaCanvas"></canvas>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>セグメント数: <span id="segmentValue">8</span></label>
                <input type="range" id="segments" min="4" max="24" value="8">
            </div>

            <div class="control-group">
                <label>レイヤー数: <span id="layerValue">6</span></label>
                <input type="range" id="layers" min="3" max="12" value="6">
            </div>

            <div class="control-group">
                <label>複雑さ: <span id="complexityValue">5</span></label>
                <input type="range" id="complexity" min="2" max="10" value="5">
            </div>

            <div class="control-group">
                <label>メインカラー</label>
                <input type="color" id="primaryColor" value="#ff006e">
            </div>

            <div class="control-group">
                <label>セカンダリーカラー</label>
                <input type="color" id="secondaryColor" value="#8338ec">
            </div>

            <button class="btn btn-primary" onclick="generateMandala()">✨ 生成</button>
            <button class="btn btn-secondary" onclick="downloadMandala()">💾 保存</button>
        </div>

        <div class="info">
            クリックして新しいマンダラを生成
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mandalaCanvas');
        const ctx = canvas.getContext('2d');

        // Canvas size
        function resizeCanvas() {
            const size = Math.min(window.innerWidth * 0.85, window.innerHeight * 0.55, 600);
            canvas.width = size;
            canvas.height = size;
            generateMandala();
        }

        // Color utilities
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        function interpolateColor(color1, color2, factor) {
            const c1 = hexToRgb(color1);
            const c2 = hexToRgb(color2);
            const r = Math.round(c1.r + (c2.r - c1.r) * factor);
            const g = Math.round(c1.g + (c2.g - c1.g) * factor);
            const b = Math.round(c1.b + (c2.b - c1.b) * factor);
            return `rgb(${r}, ${g}, ${b})`;
        }

        function generateMandala() {
            const segments = parseInt(document.getElementById('segments').value);
            const layers = parseInt(document.getElementById('layers').value);
            const complexity = parseInt(document.getElementById('complexity').value);
            const primaryColor = document.getElementById('primaryColor').value;
            const secondaryColor = document.getElementById('secondaryColor').value;

            // Clear canvas
            ctx.fillStyle = '#0a0015';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const maxRadius = canvas.width / 2 - 20;

            // Draw mandala
            for (let layer = 0; layer < layers; layer++) {
                const layerFactor = layer / layers;
                const color = interpolateColor(primaryColor, secondaryColor, layerFactor);
                const radius = maxRadius * (1 - layerFactor * 0.7);
                const innerRadius = radius * (0.4 + Math.random() * 0.3);

                ctx.strokeStyle = color;
                ctx.fillStyle = color;
                ctx.lineWidth = 1 + Math.random() * 2;

                for (let i = 0; i < segments; i++) {
                    const angle = (i / segments) * Math.PI * 2;
                    const nextAngle = ((i + 1) / segments) * Math.PI * 2;

                    ctx.save();
                    ctx.translate(centerX, centerY);
                    ctx.rotate(angle);

                    // Draw petal-like shapes
                    const petalType = Math.floor(Math.random() * complexity);

                    switch (petalType % 5) {
                        case 0:
                            // Simple curve
                            ctx.beginPath();
                            ctx.moveTo(0, innerRadius);
                            ctx.quadraticCurveTo(radius * 0.3, (innerRadius + radius) / 2, 0, radius);
                            ctx.quadraticCurveTo(-radius * 0.3, (innerRadius + radius) / 2, 0, innerRadius);
                            ctx.stroke();
                            break;

                        case 1:
                            // Filled petal
                            ctx.beginPath();
                            ctx.moveTo(0, innerRadius);
                            ctx.bezierCurveTo(radius * 0.5, innerRadius, radius * 0.5, radius, 0, radius);
                            ctx.bezierCurveTo(-radius * 0.5, radius, -radius * 0.5, innerRadius, 0, innerRadius);
                            ctx.globalAlpha = 0.3;
                            ctx.fill();
                            ctx.globalAlpha = 1;
                            ctx.stroke();
                            break;

                        case 2:
                            // Diamond shape
                            ctx.beginPath();
                            ctx.moveTo(0, innerRadius);
                            ctx.lineTo(radius * 0.3, (innerRadius + radius) / 2);
                            ctx.lineTo(0, radius);
                            ctx.lineTo(-radius * 0.3, (innerRadius + radius) / 2);
                            ctx.closePath();
                            ctx.stroke();
                            break;

                        case 3:
                            // Circle pattern
                            for (let j = 0; j < 3; j++) {
                                const circleRadius = (radius - innerRadius) / 4 * (j + 1);
                                ctx.beginPath();
                                ctx.arc(0, innerRadius + circleRadius, circleRadius * 0.3, 0, Math.PI * 2);
                                ctx.stroke();
                            }
                            break;

                        case 4:
                            // Star pattern
                            ctx.beginPath();
                            for (let j = 0; j < 5; j++) {
                                const starAngle = (j / 5) * Math.PI;
                                const starRadius = innerRadius + (radius - innerRadius) * (j + 1) / 6;
                                const x = Math.sin(starAngle) * starRadius * 0.5;
                                const y = innerRadius + starRadius * 0.8;
                                if (j === 0) {
                                    ctx.moveTo(x, y);
                                } else {
                                    ctx.lineTo(x, y);
                                }
                            }
                            ctx.stroke();
                            break;
                    }

                    // Add decorative dots
                    if (Math.random() > 0.5) {
                        ctx.beginPath();
                        ctx.arc(0, innerRadius + (radius - innerRadius) * Math.random(), 3, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    ctx.restore();
                }

                // Add connecting circles
                if (layer > 0 && Math.random() > 0.3) {
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                    ctx.globalAlpha = 0.2;
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }
            }

            // Center decoration
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, maxRadius * 0.15);
            gradient.addColorStop(0, primaryColor);
            gradient.addColorStop(1, secondaryColor);

            ctx.beginPath();
            ctx.arc(centerX, centerY, maxRadius * 0.12, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();

            // Center pattern
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(
                    centerX + Math.cos(angle) * maxRadius * 0.1,
                    centerY + Math.sin(angle) * maxRadius * 0.1
                );
                ctx.stroke();
            }
        }

        function downloadMandala() {
            const link = document.createElement('a');
            link.download = `mandala-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Event listeners
        canvas.addEventListener('click', generateMandala);

        document.getElementById('segments').addEventListener('input', (e) => {
            document.getElementById('segmentValue').textContent = e.target.value;
        });

        document.getElementById('layers').addEventListener('input', (e) => {
            document.getElementById('layerValue').textContent = e.target.value;
        });

        document.getElementById('complexity').addEventListener('input', (e) => {
            document.getElementById('complexityValue').textContent = e.target.value;
        });

        document.getElementById('primaryColor').addEventListener('change', generateMandala);
        document.getElementById('secondaryColor').addEventListener('change', generateMandala);

        window.addEventListener('resize', resizeCanvas);

        // Initial generation
        resizeCanvas();
    </script>
</body>
</html>
