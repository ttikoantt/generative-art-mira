<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Reactive Waves</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 10, 15, 0.9);
            z-index: 10;
            transition: opacity 0.5s;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .overlay h1 {
            color: #fff;
            font-size: clamp(24px, 5vw, 48px);
            margin-bottom: 20px;
            text-align: center;
            background: linear-gradient(90deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay p {
            color: #888;
            font-size: clamp(14px, 3vw, 18px);
            margin-bottom: 30px;
            text-align: center;
        }

        .start-btn {
            padding: 15px 40px;
            font-size: clamp(16px, 3vw, 20px);
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            border: none;
            border-radius: 50px;
            color: #000;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: bold;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #666;
            font-size: 14px;
            z-index: 5;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 25px;
            cursor: pointer;
            z-index: 5;
            font-size: 14px;
            transition: background 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="overlay" id="overlay">
        <h1>🎵 Audio Reactive Waves</h1>
        <p>マイクの音に反応する美しい波形</p>
        <button class="start-btn" id="startBtn">開始</button>
    </div>

    <div class="info" id="info"></div>
    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('startBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const info = document.getElementById('info');

        let audioContext;
        let analyser;
        let dataArray;
        let bufferLength;
        let microphone;
        let isRunning = false;

        let waves = [];
        const waveCount = 5;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Wave {
            constructor(index, total) {
                this.index = index;
                this.total = total;
                this.reset();
            }

            reset() {
                const centerY = canvas.height / 2;
                const spacing = canvas.height / (this.total + 1);
                this.baseY = centerY + (this.index - this.total / 2) * spacing * 0.8;
                this.amplitude = 30 + Math.random() * 50;
                this.frequency = 0.002 + Math.random() * 0.003;
                this.phase = Math.random() * Math.PI * 2;
                this.speed = 0.02 + Math.random() * 0.02;
                this.hue = (this.index / this.total) * 60 + 180; // Cyan to purple
            }

            draw(audioData) {
                const audioValue = audioData ? audioData[Math.floor(this.index * bufferLength / this.total)] / 255 : 0;
                const reactiveAmp = this.amplitude * (1 + audioValue * 3);

                ctx.beginPath();
                ctx.moveTo(0, this.baseY);

                for (let x = 0; x < canvas.width; x++) {
                    const y = this.baseY +
                        Math.sin(x * this.frequency + this.phase) * reactiveAmp +
                        Math.sin(x * this.frequency * 2 + this.phase * 1.5) * reactiveAmp * 0.5;
                    ctx.lineTo(x, y);
                }

                const alpha = 0.3 + audioValue * 0.7;
                ctx.strokeStyle = `hsla(${this.hue + audioValue * 60}, 100%, 60%, ${alpha})`;
                ctx.lineWidth = 2 + audioValue * 3;
                ctx.stroke();

                this.phase += this.speed + audioValue * 0.05;
            }
        }

        function initWaves() {
            waves = [];
            for (let i = 0; i < waveCount; i++) {
                waves.push(new Wave(i, waveCount));
            }
        }

        async function initAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                microphone = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                microphone.connect(analyser);
                return true;
            } catch (err) {
                console.error('Microphone access denied:', err);
                return false;
            }
        }

        function animate() {
            if (!isRunning) return;

            // Fade effect
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Get audio data
            if (analyser) {
                analyser.getByteFrequencyData(dataArray);

                // Calculate average for display
                let sum = 0;
                for (let i = 0; i < bufferLength; i++) {
                    sum += dataArray[i];
                }
                const average = sum / bufferLength;
                info.textContent = `音量レベル: ${Math.round(average / 255 * 100)}%`;
            }

            // Draw waves
            waves.forEach(wave => wave.draw(dataArray));

            requestAnimationFrame(animate);
        }

        startBtn.addEventListener('click', async () => {
            const success = await initAudio();
            if (success) {
                initWaves();
                overlay.classList.add('hidden');
                isRunning = true;
                animate();
            } else {
                alert('マイクへのアクセスが必要です。ブラウザの設定を確認してください。');
            }
        });

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // Initialize with demo animation
        initWaves();
        function demoAnimate() {
            if (isRunning) return;

            ctx.fillStyle = 'rgba(10, 10, 15, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const time = Date.now() * 0.001;
            waves.forEach((wave, i) => {
                const demoData = new Array(bufferLength).fill(0).map((_, j) =>
                    Math.sin(time * 2 + i + j * 0.1) * 50 + 50
                );
                wave.draw(demoData);
            });

            requestAnimationFrame(demoAnimate);
        }
        demoAnimate();
    </script>
</body>
</html>
