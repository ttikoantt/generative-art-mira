<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光の粒子ダンス - Light Particles Dance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            color: #fff;
            padding: 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00d4ff, #7b2dff, #ff2d92);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .description {
            color: #888;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        #canvas {
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 10px;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a1a 100%);
            max-width: 100%;
            cursor: crosshair;
            touch-action: none;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: linear-gradient(135deg, #00d4ff, #7b2dff);
            color: #fff;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            margin-top: 15px;
            color: #666;
            font-size: 0.85rem;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 0.9rem;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }
            
            #canvas {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>✨ 光の粒子ダンス</h1>
        <p class="description">マウスを動かして光の粒子を踊らせよう</p>

        <canvas id="canvas" width="800" height="500"></canvas>

        <div class="controls">
            <button onclick="resetParticles()">リセット</button>
            <button onclick="changeMode()">モード変更</button>
            <button onclick="addBurst()">爆発</button>
        </div>

        <p class="info">💡 タップやクリックで光の花を咲かせよう</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        let mode = 0; // 0: 追従, 1: 反発, 2: 渦

        const colors = [
            '#00d4ff', '#7b2dff', '#ff2d92', '#00ff88',
            '#ffff00', '#ff8800', '#00ffff', '#ff00ff'
        ];

        class Particle {
            constructor(x, y, color) {
                this.x = x || Math.random() * canvas.width;
                this.y = y || Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.color = color || colors[Math.floor(Math.random() * colors.length)];
                this.speedX = 0;
                this.speedY = 0;
                this.life = 1;
                this.decay = 0.001 + Math.random() * 0.002;
                this.angle = Math.random() * Math.PI * 2;
            }

            update() {
                this.life -= this.decay;

                switch(mode) {
                    case 0: // 追従
                        const dx0 = mouseX - this.x;
                        const dy0 = mouseY - this.y;
                        const dist0 = Math.sqrt(dx0 * dx0 + dy0 * dy0);
                        if (dist0 > 10) {
                            this.speedX += (dx0 / dist0) * 0.3;
                            this.speedY += (dy0 / dist0) * 0.3;
                        }
                        break;
                    case 1: // 反発
                        const dx1 = this.x - mouseX;
                        const dy1 = this.y - mouseY;
                        const dist1 = Math.sqrt(dx1 * dx1 + dy1 * dy1);
                        if (dist1 < 150) {
                            this.speedX += (dx1 / dist1) * 0.5;
                            this.speedY += (dy1 / dist1) * 0.5;
                        }
                        break;
                    case 2: // 渦
                        const dx2 = mouseX - this.x;
                        const dy2 = mouseY - this.y;
                        const dist2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
                        if (dist2 > 5) {
                            const angle = Math.atan2(dy2, dx2);
                            this.speedX += Math.cos(angle + Math.PI / 2) * 0.3;
                            this.speedY += Math.sin(angle + Math.PI / 2) * 0.3;
                            this.speedX += (dx2 / dist2) * 0.1;
                            this.speedY += (dy2 / dist2) * 0.1;
                        }
                        break;
                }

                // 自然な動き
                this.angle += (Math.random() - 0.5) * 0.2;
                this.speedX += Math.cos(this.angle) * 0.05;
                this.speedY += Math.sin(this.angle) * 0.05;

                // 抵抗
                this.speedX *= 0.95;
                this.speedY *= 0.95;

                this.x += this.speedX;
                this.y += this.speedY;

                // 境界処理
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;

                // 光る効果
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 3
                );
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(0.3, this.color + '80');
                gradient.addColorStop(1, 'transparent');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                ctx.fill();

                // 核心
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.5, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < 150; i++) {
                particles.push(new Particle());
            }
        }

        function resetParticles() {
            init();
        }

        function changeMode() {
            mode = (mode + 1) % 3;
            const modes = ['追従モード', '反発モード', '渦モード'];
            alert(`モード: ${modes[mode]}`);
        }

        function addBurst() {
            for (let i = 0; i < 50; i++) {
                const angle = (Math.PI * 2 / 50) * i;
                const p = new Particle(mouseX, mouseY);
                p.speedX = Math.cos(angle) * 5;
                p.speedY = Math.sin(angle) * 5;
                p.size = Math.random() * 4 + 2;
                particles.push(p);
            }
        }

        function animate() {
            // トレイル効果
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles = particles.filter(p => p.life > 0);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // 粒子が少なくなったら追加
            if (particles.length < 100) {
                particles.push(new Particle(
                    Math.random() * canvas.width,
                    Math.random() * canvas.height
                ));
            }

            requestAnimationFrame(animate);
        }

        // マウスイベント
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouseX = (e.clientX - rect.left) * scaleX;
            mouseY = (e.clientY - rect.top) * scaleY;
        });

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const clickX = (e.clientX - rect.left) * scaleX;
            const clickY = (e.clientY - rect.top) * scaleY;

            // 花を咲かせる
            for (let i = 0; i < 30; i++) {
                const angle = (Math.PI * 2 / 30) * i;
                const p = new Particle(clickX, clickY);
                const speed = 2 + Math.random() * 3;
                p.speedX = Math.cos(angle) * speed;
                p.speedY = Math.sin(angle) * speed;
                p.size = Math.random() * 4 + 2;
                p.decay = 0.005;
                particles.push(p);
            }
        });

        // タッチイベント
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const touch = e.touches[0];
            mouseX = (touch.clientX - rect.left) * scaleX;
            mouseY = (touch.clientY - rect.top) * scaleY;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const touch = e.touches[0];
            const clickX = (touch.clientX - rect.left) * scaleX;
            const clickY = (touch.clientY - rect.top) * scaleY;

            for (let i = 0; i < 30; i++) {
                const angle = (Math.PI * 2 / 30) * i;
                const p = new Particle(clickX, clickY);
                const speed = 2 + Math.random() * 3;
                p.speedX = Math.cos(angle) * speed;
                p.speedY = Math.sin(angle) * speed;
                p.size = Math.random() * 4 + 2;
                p.decay = 0.005;
                particles.push(p);
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        init();
        animate();
    </script>
</body>
</html>
