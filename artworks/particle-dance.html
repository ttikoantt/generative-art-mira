<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Dance - パーティクルダンス</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            letter-spacing: 3px;
        }

        .subtitle {
            color: #a0a0a0;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        #canvas {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(100, 100, 255, 0.3);
            background: rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            color: #a0a0a0;
            font-size: 0.9rem;
            margin-top: 15px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            z-index: 1000;
            font-size: 0.9rem;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>✨ Particle Dance ✨</h1>
        <p class="subtitle">音楽に合わせて踊るパーティクル</p>

        <canvas id="canvas"></canvas>

        <div class="controls">
            <button onclick="changePattern()">パターン変更</button>
            <button onclick="changeColors()">カラー変更</button>
            <button onclick="toggleMusic()">音楽 ON/OFF</button>
        </div>

        <p class="info">🎵 クリックでパーティクルを追加</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Canvas size
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 800);
            const maxHeight = Math.min(window.innerHeight - 250, 600);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Audio context for music
        let audioCtx = null;
        let analyser = null;
        let isMusicPlaying = false;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;

                // Create oscillator-based music
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(220, audioCtx.currentTime);

                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);

                oscillator.connect(gainNode);
                gainNode.connect(analyser);
                analyser.connect(audioCtx.destination);

                oscillator.start();

                // Modulate frequency for music effect
                setInterval(() => {
                    const freq = 200 + Math.sin(Date.now() / 1000) * 100;
                    oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
                }, 100);
            }
        }

        function toggleMusic() {
            if (!isMusicPlaying) {
                initAudio();
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                isMusicPlaying = true;
            } else {
                if (audioCtx) {
                    audioCtx.suspend();
                }
                isMusicPlaying = false;
            }
        }

        // Particles
        let particles = [];
        let patternIndex = 0;
        let colorScheme = 0;

        const colorSchemes = [
            ['#667eea', '#764ba2', '#f093fb', '#f5576c'],
            ['#00d2ff', '#3a7bd5', '#00ff87', '#60efff'],
            ['#ff0844', '#ffb199', '#f6d365', '#fda085'],
            ['#a8edea', '#fed6e3', '#ff9a9e', '#fecfef']
        ];

        class Particle {
            constructor(x, y) {
                this.x = x || Math.random() * canvas.width;
                this.y = y || Math.random() * canvas.height;
                this.size = Math.random() * 5 + 2;
                this.baseSize = this.size;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.color = colorSchemes[colorScheme][Math.floor(Math.random() * 4)];
                this.angle = Math.random() * Math.PI * 2;
                this.angleSpeed = (Math.random() - 0.5) * 0.1;
            }

            update(audioData) {
                // Get audio data
                let audioValue = 0;
                if (audioData && audioData.length > 0) {
                    audioValue = audioData[Math.floor(Math.random() * audioData.length)] / 255;
                }

                // Move based on pattern
                if (patternIndex === 0) {
                    // Circular dance
                    this.angle += this.angleSpeed + audioValue * 0.2;
                    this.x += Math.cos(this.angle) * (2 + audioValue * 5);
                    this.y += Math.sin(this.angle) * (2 + audioValue * 5);
                } else if (patternIndex === 1) {
                    // Wave dance
                    this.x += this.speedX + audioValue * 3;
                    this.y += Math.sin(this.x / 50 + Date.now() / 500) * (3 + audioValue * 5);
                } else if (patternIndex === 2) {
                    // Spiral dance
                    const centerX = canvas.width / 2;
                    const centerY = canvas.height / 2;
                    const dx = this.x - centerX;
                    const dy = this.y - centerY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const angle = Math.atan2(dy, dx);

                    this.x = centerX + Math.cos(angle + 0.02 + audioValue * 0.1) * (dist + audioValue * 5);
                    this.y = centerY + Math.sin(angle + 0.02 + audioValue * 0.1) * (dist + audioValue * 5);
                } else if (patternIndex === 3) {
                    // Random dance
                    this.speedX += (Math.random() - 0.5) * 0.5 + audioValue * 0.5;
                    this.speedY += (Math.random() - 0.5) * 0.5 + audioValue * 0.5;
                    this.speedX *= 0.95;
                    this.speedY *= 0.95;
                    this.x += this.speedX;
                    this.y += this.speedY;
                }

                // Pulse with music
                this.size = this.baseSize + audioValue * 10;

                // Bounce off walls
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;

                this.x = Math.max(0, Math.min(canvas.width, this.x));
                this.y = Math.max(0, Math.min(canvas.height, this.y));
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();

                // Glow effect
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // Initialize particles
        function initParticles() {
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle());
            }
        }

        function changePattern() {
            patternIndex = (patternIndex + 1) % 4;
        }

        function changeColors() {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
            particles.forEach(p => {
                p.color = colorSchemes[colorScheme][Math.floor(Math.random() * 4)];
            });
        }

        // Add particles on click
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            for (let i = 0; i < 10; i++) {
                particles.push(new Particle(x, y));
            }

            // Limit total particles
            if (particles.length > 200) {
                particles = particles.slice(-200);
            }
        });

        // Animation loop
        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Get audio data
            let audioData = null;
            if (analyser) {
                const bufferLength = analyser.frequencyBinCount;
                audioData = new Uint8Array(bufferLength);
                analyser.getByteFrequencyData(audioData);
            }

            particles.forEach(particle => {
                particle.update(audioData);
                particle.draw();
            });

            requestAnimationFrame(animate);
        }

        // Fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Start
        initParticles();
        animate();
    </script>
</body>
</html>
