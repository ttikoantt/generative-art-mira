<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Cityscape | Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: 'Courier New', monospace;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            color: #00ffff;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px #00ffff;
        }

        .header p {
            font-size: 12px;
            color: #888;
        }

        .canvas-container {
            position: relative;
            border: 2px solid #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            border-radius: 5px;
            overflow: hidden;
        }

        #cityCanvas {
            display: block;
            background: #0a0a0f;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: transparent;
            border: 1px solid #00ffff;
            color: #00ffff;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            transition: all 0.3s;
            border-radius: 3px;
        }

        button:hover {
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        button:active {
            transform: scale(0.95);
        }

        .info {
            margin-top: 15px;
            font-size: 11px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌃 CYBERPUNK CITYSCAPE</h1>
        <p>Generative City Art</p>
    </div>

    <div class="canvas-container">
        <canvas id="cityCanvas" width="800" height="500"></canvas>
    </div>

    <div class="controls">
        <button onclick="generateCity()">🔄 新しい街を生成</button>
        <button onclick="toggleAnimation()">▶️ アニメーション</button>
        <button onclick="saveImage()">💾 保存</button>
        <button onclick="toggleFullscreen()">📺 全画面</button>
    </div>

    <div class="info">
        <p>クリエイティブ作品 #860 | Created by Mira</p>
    </div>

    <script>
        const canvas = document.getElementById('cityCanvas');
        const ctx = canvas.getContext('2d');
        let buildings = [];
        let vehicles = [];
        let raindrops = [];
        let animationId = null;
        let isAnimating = false;
        let time = 0;

        // サイバーパンクカラー
        const colors = {
            pink: '#ff006e',
            blue: '#00ffff',
            purple: '#8338ec',
            yellow: '#ffbe0b',
            dark: '#0a0a0f',
            building: ['#1a1a2e', '#16213e', '#0f3460', '#1a1a3e']
        };

        function random(min, max) {
            return Math.random() * (max - min) + min;
        }

        function randomColor() {
            return colors.building[Math.floor(Math.random() * colors.building.length)];
        }

        function generateBuildings() {
            buildings = [];
            let x = 0;

            while (x < canvas.width) {
                const width = random(30, 80);
                const height = random(100, 300);
                const building = {
                    x: x,
                    y: canvas.height - height,
                    width: width,
                    height: height,
                    color: randomColor(),
                    windows: [],
                    neon: Math.random() > 0.7
                };

                // 窓を生成
                const windowRows = Math.floor(height / 25);
                const windowCols = Math.floor(width / 20);

                for (let row = 0; row < windowRows; row++) {
                    for (let col = 0; col < windowCols; col++) {
                        if (Math.random() > 0.2) {
                            building.windows.push({
                                x: col * 20 + 5,
                                y: row * 25 + 10,
                                on: Math.random() > 0.3,
                                color: Math.random() > 0.5 ? '#00ffff' : '#ff006e'
                            });
                        }
                    }
                }

                buildings.push(building);
                x += width + random(5, 20);
            }
        }

        function generateVehicles() {
            vehicles = [];
            const numVehicles = 15;

            for (let i = 0; i < numVehicles; i++) {
                vehicles.push({
                    x: random(0, canvas.width),
                    y: random(20, canvas.height - 100),
                    speed: random(2, 8),
                    color: Math.random() > 0.5 ? colors.pink : colors.blue,
                    size: random(3, 6)
                });
            }
        }

        function generateRain() {
            raindrops = [];
            const numDrops = 100;

            for (let i = 0; i < numDrops; i++) {
                raindrops.push({
                    x: random(0, canvas.width),
                    y: random(0, canvas.height),
                    length: random(10, 30),
                    speed: random(5, 15)
                });
            }
        }

        function drawBackground() {
            // グラデーション背景
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a0a0f');
            gradient.addColorStop(0.5, '#1a1a2e');
            gradient.addColorStop(1, '#16213e');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawBuildings() {
            buildings.forEach((building, index) => {
                // ビルの影
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(building.x + 10, building.y, building.width, building.height);

                // ビル本体
                ctx.fillStyle = building.color;
                ctx.fillRect(building.x, building.y, building.width, building.height);

                // ネオン効果
                if (building.neon) {
                    ctx.strokeStyle = index % 2 === 0 ? colors.pink : colors.blue;
                    ctx.lineWidth = 2;
                    ctx.strokeRect(building.x, building.y, building.width, building.height);

                    // ネオンの輝き
                    ctx.shadowColor = index % 2 === 0 ? colors.pink : colors.blue;
                    ctx.shadowBlur = 20;
                    ctx.strokeRect(building.x, building.y, building.width, building.height);
                    ctx.shadowBlur = 0;
                }

                // 窓を描画
                building.windows.forEach(win => {
                    if (win.on) {
                        ctx.fillStyle = win.color;
                        ctx.fillRect(
                            building.x + win.x,
                            building.y + win.y,
                            10,
                            15
                        );

                        // 窓の輝き
                        ctx.shadowColor = win.color;
                        ctx.shadowBlur = 5;
                        ctx.fillRect(
                            building.x + win.x,
                            building.y + win.y,
                            10,
                            15
                        );
                        ctx.shadowBlur = 0;
                    } else {
                        ctx.fillStyle = '#0a0a0f';
                        ctx.fillRect(
                            building.x + win.x,
                            building.y + win.y,
                            10,
                            15
                        );
                    }
                });
            });
        }

        function drawVehicles() {
            vehicles.forEach(vehicle => {
                // 車のライト跡
                ctx.beginPath();
                ctx.moveTo(vehicle.x, vehicle.y);
                ctx.lineTo(vehicle.x - vehicle.speed * 10, vehicle.y);
                ctx.strokeStyle = vehicle.color;
                ctx.lineWidth = vehicle.size;
                ctx.lineCap = 'round';
                ctx.shadowColor = vehicle.color;
                ctx.shadowBlur = 10;
                ctx.stroke();
                ctx.shadowBlur = 0;

                // 車本体
                ctx.fillStyle = vehicle.color;
                ctx.fillRect(vehicle.x, vehicle.y - vehicle.size / 2, vehicle.size * 3, vehicle.size);
            });
        }

        function drawRain() {
            ctx.strokeStyle = 'rgba(174, 194, 224, 0.3)';
            ctx.lineWidth = 1;

            raindrops.forEach(drop => {
                ctx.beginPath();
                ctx.moveTo(drop.x, drop.y);
                ctx.lineTo(drop.x - 2, drop.y + drop.length);
                ctx.stroke();
            });
        }

        function update() {
            if (!isAnimating) return;

            // 車を移動
            vehicles.forEach(vehicle => {
                vehicle.x += vehicle.speed;
                if (vehicle.x > canvas.width + 50) {
                    vehicle.x = -50;
                    vehicle.y = random(20, canvas.height - 100);
                }
            });

            // 雨を更新
            raindrops.forEach(drop => {
                drop.y += drop.speed;
                drop.x -= 1;
                if (drop.y > canvas.height) {
                    drop.y = -drop.length;
                    drop.x = random(0, canvas.width);
                }
            });

            time += 0.01;
        }

        function draw() {
            drawBackground();
            drawBuildings();
            drawVehicles();
            drawRain();
        }

        function animate() {
            if (!isAnimating) return;

            update();
            draw();
            animationId = requestAnimationFrame(animate);
        }

        function generateCity() {
            generateBuildings();
            generateVehicles();
            generateRain();
            draw();
        }

        function toggleAnimation() {
            isAnimating = !isAnimating;

            if (isAnimating) {
                animate();
            } else {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                }
            }
        }

        function saveImage() {
            const link = document.createElement('a');
            link.download = 'cyberpunk-cityscape.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        function toggleFullscreen() {
            if (canvas.requestFullscreen) {
                canvas.requestFullscreen();
            } else if (canvas.webkitRequestFullscreen) {
                canvas.webkitRequestFullscreen();
            } else if (canvas.msRequestFullscreen) {
                canvas.msRequestFullscreen();
            }
        }

        // 初期化
        generateCity();
    </script>
</body>
</html>
