<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流れる星々 - Flowing Stars</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #0a0a1a, #1a1a3a, #0a0a1a);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            letter-spacing: 0.3em;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 20px;
            letter-spacing: 0.2em;
        }

        #canvas {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(100, 150, 255, 0.3);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        #canvas:hover {
            transform: scale(1.02);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(100, 150, 255, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            margin-top: 15px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 15px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2rem;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.5rem;
            }

            #canvas {
                width: 100% !important;
                height: auto !important;
            }

            .controls {
                flex-direction: column;
                align-items: center;
            }

            button {
                width: 80%;
                max-width: 250px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <h1>✨ 流れる星々</h1>
        <p class="subtitle">Flowing Stars</p>
        <canvas id="canvas" width="600" height="400"></canvas>

        <div class="controls">
            <button onclick="changeSpeed('slow')">🐌 ゆっくり</button>
            <button onclick="changeSpeed('normal')">⭐ 普通</button>
            <button onclick="changeSpeed('fast')">💨 速く</button>
            <button onclick="changeSpeed('super')">🌠 超高速</button>
            <button onclick="toggleTrails()">🌟 軌跡: <span id="trailStatus">ON</span></button>
        </div>

        <p class="info">星空を眺めながら一息つきましょう</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let stars = [];
        let shootingStars = [];
        let speed = 1;
        let showTrails = true;
        let time = 0;

        // 星を初期化
        function initStars() {
            stars = [];
            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 0.5 + 0.2,
                    brightness: Math.random(),
                    twinkleSpeed: Math.random() * 0.02 + 0.01
                });
            }
        }

        // 流星を生成
        function createShootingStar() {
            if (Math.random() < 0.02 * speed) {
                shootingStars.push({
                    x: Math.random() * canvas.width,
                    y: 0,
                    length: Math.random() * 80 + 40,
                    speed: Math.random() * 3 + 5,
                    brightness: 1
                });
            }
        }

        // 星を描画
        function drawStars() {
            stars.forEach(star => {
                // 明るさを変化
                star.brightness += Math.sin(time * star.twinkleSpeed) * 0.02;
                star.brightness = Math.max(0.3, Math.min(1, star.brightness));

                // 少し動く
                star.y += star.speed * speed * 0.3;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }

                const alpha = star.brightness;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fill();

                // 光る効果
                if (star.brightness > 0.7) {
                    const glow = ctx.createRadialGradient(
                        star.x, star.y, 0,
                        star.x, star.y, star.size * 4
                    );
                    glow.addColorStop(0, `rgba(200, 220, 255, ${alpha * 0.3})`);
                    glow.addColorStop(1, 'rgba(200, 220, 255, 0)');
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size * 4, 0, Math.PI * 2);
                    ctx.fillStyle = glow;
                    ctx.fill();
                }
            });
        }

        // 流星を描画
        function drawShootingStars() {
            shootingStars = shootingStars.filter(star => {
                // 流星を動かす
                star.x += star.speed * speed;
                star.y += star.speed * speed * 0.7;

                // 軌跡を描画
                if (showTrails) {
                    const gradient = ctx.createLinearGradient(
                        star.x, star.y,
                        star.x - star.length, star.y - star.length * 0.7
                    );
                    gradient.addColorStop(0, `rgba(255, 255, 255, ${star.brightness})`);
                    gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

                    ctx.beginPath();
                    ctx.moveTo(star.x, star.y);
                    ctx.lineTo(star.x - star.length, star.y - star.length * 0.7);
                    ctx.strokeStyle = gradient;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                // 先端の明るさ
                ctx.beginPath();
                ctx.arc(star.x, star.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.brightness})`;
                ctx.fill();

                // 画面外に出たら削除
                return star.x < canvas.width + star.length && star.y < canvas.height + star.length;
            });
        }

        // メインループ
        function animate() {
            // 軌跡効果のために半透明でクリア
            if (showTrails) {
                ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = 'rgba(10, 10, 26, 1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // 背景のグラデーションを少し残す
            const bgGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bgGradient.addColorStop(0, 'rgba(10, 10, 26, 0.05)');
            bgGradient.addColorStop(0.5, 'rgba(26, 26, 58, 0.05)');
            bgGradient.addColorStop(1, 'rgba(10, 10, 26, 0.05)');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawStars();
            createShootingStar();
            drawShootingStars();

            time++;
            requestAnimationFrame(animate);
        }

        function changeSpeed(newSpeed) {
            const speeds = {
                'slow': 0.3,
                'normal': 1,
                'fast': 2,
                'super': 4
            };
            speed = speeds[newSpeed];
        }

        function toggleTrails() {
            showTrails = !showTrails;
            document.getElementById('trailStatus').textContent = showTrails ? 'ON' : 'OFF';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // クリックで流星を生成
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);

            shootingStars.push({
                x: x,
                y: y,
                length: Math.random() * 80 + 40,
                speed: Math.random() * 3 + 5,
                brightness: 1
            });
        });

        // 初期化
        initStars();
        animate();
    </script>
</body>
</html>
