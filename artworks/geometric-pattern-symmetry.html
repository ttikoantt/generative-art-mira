<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Pattern Symmetry</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .controls button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .controls button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }

        .controls button:active {
            transform: translateY(0);
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(102, 126, 234, 0.8);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                padding: 10px;
            }

            .controls {
                bottom: 10px;
                gap: 8px;
            }

            .controls button {
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        📐 対称性: <span id="symmetryDisplay">6</span><br>
        🎨 パターン: <span id="patternDisplay">floral</span><br>
        ✨ クリックでパターン変更
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="controls">
        <button onclick="changeSymmetry()">対称性変更</button>
        <button onclick="changePattern()">パターン変更</button>
        <button onclick="randomize()">ランダム</button>
        <button onclick="saveImage()">保存</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let centerX, centerY;
        let symmetry = 6;
        let patternIndex = 0;
        let time = 0;
        let animationId;
        let currentPattern = 'floral';

        const patterns = ['floral', 'geometric', 'spiral', 'mandala', 'kaleidoscope'];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            centerX = canvas.width / 2;
            centerY = canvas.height / 2;
        }

        function changeSymmetry() {
            symmetry = symmetry === 12 ? 4 : symmetry + 2;
            document.getElementById('symmetryDisplay').textContent = symmetry;
        }

        function changePattern() {
            patternIndex = (patternIndex + 1) % patterns.length;
            currentPattern = patterns[patternIndex];
            document.getElementById('patternDisplay').textContent = currentPattern;
        }

        function randomize() {
            symmetry = Math.floor(Math.random() * 9) * 2 + 4;
            patternIndex = Math.floor(Math.random() * patterns.length);
            currentPattern = patterns[patternIndex];
            document.getElementById('symmetryDisplay').textContent = symmetry;
            document.getElementById('patternDisplay').textContent = currentPattern;
        }

        function drawFloralPattern(t) {
            const layers = 5;
            for (let layer = 0; layer < layers; layer++) {
                const radius = 50 + layer * 60;
                const hue = (t * 20 + layer * 40) % 360;
                const points = symmetry;
                const petalSize = 20 + layer * 8;
                const petalCurve = 1 + Math.sin(t + layer) * 0.5;

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(t * 0.1 + layer * 0.2);

                for (let i = 0; i < points; i++) {
                    const angle = (i / points) * Math.PI * 2;
                    ctx.save();
                    ctx.rotate(angle);
                    ctx.translate(radius, 0);

                    ctx.beginPath();
                    ctx.fillStyle = `hsla(${hue}, 70%, 60%, 0.7)`;
                    ctx.strokeStyle = `hsla(${hue + 30}, 80%, 70%, 0.9)`;
                    ctx.lineWidth = 2;

                    ctx.moveTo(0, 0);
                    ctx.bezierCurveTo(
                        petalSize * petalCurve, -petalSize,
                        petalSize * petalCurve, petalSize,
                        0, 0
                    );

                    ctx.fill();
                    ctx.stroke();

                    ctx.restore();
                }

                ctx.restore();
            }

            // 中心の装飾
            ctx.beginPath();
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 40);
            gradient.addColorStop(0, `hsla(${(t * 30) % 360}, 80%, 70%, 1)`);
            gradient.addColorStop(1, `hsla(${(t * 30 + 60) % 360}, 80%, 60%, 0)`);
            ctx.fillStyle = gradient;
            ctx.arc(centerX, centerY, 40, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawGeometricPattern(t) {
            const layers = 4;
            for (let layer = 0; layer < layers; layer++) {
                const size = 80 + layer * 70;
                const hue = (t * 15 + layer * 50) % 360;
                const rotation = t * (layer % 2 === 0 ? 0.2 : -0.15);

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(rotation);

                for (let i = 0; i < symmetry; i++) {
                    const angle = (i / symmetry) * Math.PI * 2;
                    const x = Math.cos(angle) * size;
                    const y = Math.sin(angle) * size;

                    ctx.beginPath();
                    ctx.strokeStyle = `hsla(${hue}, 70%, 60%, 0.8)`;
                    ctx.lineWidth = 2;

                    // 多角形を描画
                    for (let j = 0; j < symmetry; j++) {
                        const a = (j / symmetry) * Math.PI * 2;
                        const px = x + Math.cos(a) * size * 0.3;
                        const py = y + Math.sin(a) * size * 0.3;

                        if (j === 0) {
                            ctx.moveTo(px, py);
                        } else {
                            ctx.lineTo(px, py);
                        }
                    }

                    ctx.closePath();
                    ctx.stroke();
                    ctx.fillStyle = `hsla(${hue}, 70%, 60%, 0.1)`;
                    ctx.fill();

                    // 頂点の円
                    ctx.beginPath();
                    ctx.arc(x, y, 5 + layer, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${hue}, 80%, 70%, 0.9)`;
                    ctx.fill();
                }

                ctx.restore();
            }
        }

        function drawSpiralPattern(t) {
            const arms = symmetry;
            const pointsPerArm = 50;

            for (let arm = 0; arm < arms; arm++) {
                const hue = (t * 20 + arm * (360 / arms)) % 360;
                ctx.strokeStyle = `hsla(${hue}, 70%, 60%, 0.8)`;
                ctx.lineWidth = 2;
                ctx.beginPath();

                for (let i = 0; i < pointsPerArm; i++) {
                    const progress = i / pointsPerArm;
                    const radius = progress * Math.min(centerX, centerY) * 0.9;
                    const angle = (arm / arms) * Math.PI * 2 + progress * Math.PI * 4 + t * 0.5;
                    const wobble = Math.sin(t * 2 + progress * Math.PI * 2) * 20;

                    const x = centerX + Math.cos(angle) * (radius + wobble);
                    const y = centerY + Math.sin(angle) * (radius + wobble);

                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }

                ctx.stroke();

                // パーティクルを追加
                for (let i = 0; i < 5; i++) {
                    const progress = (i / 5 + t * 0.1) % 1;
                    const radius = progress * Math.min(centerX, centerY) * 0.9;
                    const angle = (arm / arms) * Math.PI * 2 + progress * Math.PI * 4 + t * 0.5;
                    const wobble = Math.sin(t * 2 + progress * Math.PI * 2) * 20;

                    const x = centerX + Math.cos(angle) * (radius + wobble);
                    const y = centerY + Math.sin(angle) * (radius + wobble);

                    ctx.beginPath();
                    ctx.fillStyle = `hsla(${hue + 30}, 80%, 70%, 0.9)`;
                    ctx.arc(x, y, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function drawMandalaPattern(t) {
            const rings = 6;

            for (let ring = 0; ring < rings; ring++) {
                const radius = 60 + ring * 50;
                const hue = (t * 10 + ring * 40) % 360;
                const rotation = t * (ring % 2 === 0 ? 0.15 : -0.1);

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(rotation);

                // 外側の円
                ctx.beginPath();
                ctx.strokeStyle = `hsla(${hue}, 70%, 60%, 0.7)`;
                ctx.lineWidth = 2;
                ctx.arc(0, 0, radius, 0, Math.PI * 2);
                ctx.stroke();

                // 装飾要素
                for (let i = 0; i < symmetry; i++) {
                    const angle = (i / symmetry) * Math.PI * 2;

                    // 円周上の装飾
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;

                    ctx.beginPath();
                    ctx.fillStyle = `hsla(${hue}, 80%, 70%, 0.9)`;
                    const shapeSize = 8 + ring * 2;

                    if (ring % 3 === 0) {
                        ctx.arc(x, y, shapeSize, 0, Math.PI * 2);
                    } else if (ring % 3 === 1) {
                        ctx.rect(x - shapeSize, y - shapeSize, shapeSize * 2, shapeSize * 2);
                    } else {
                        ctx.moveTo(x, y - shapeSize);
                        ctx.lineTo(x + shapeSize, y + shapeSize);
                        ctx.lineTo(x - shapeSize, y + shapeSize);
                        ctx.closePath();
                    }

                    ctx.fill();

                    // 放射線
                    if (ring < rings - 1) {
                        ctx.beginPath();
                        ctx.strokeStyle = `hsla(${hue}, 70%, 60%, 0.3)`;
                        ctx.lineWidth = 1;
                        ctx.moveTo(x, y);
                        const nextRadius = radius + 50;
                        ctx.lineTo(
                            Math.cos(angle) * nextRadius,
                            Math.sin(angle) * nextRadius
                        );
                        ctx.stroke();
                    }
                }

                ctx.restore();
            }
        }

        function drawKaleidoscopePattern(t) {
            const segments = symmetry;
            const segmentAngle = (Math.PI * 2) / segments;

            for (let seg = 0; seg < segments; seg++) {
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(seg * segmentAngle);

                // 各セグメント内のパターン
                for (let i = 0; i < 15; i++) {
                    const distance = 30 + i * 25;
                    const hue = (t * 25 + i * 20 + seg * 30) % 360;
                    const y = distance;
                    const width = 10 + i * 2;

                    ctx.beginPath();
                    ctx.fillStyle = `hsla(${hue}, 80%, 65%, 0.7)`;
                    ctx.strokeStyle = `hsla(${hue}, 80%, 75%, 0.9)`;
                    ctx.lineWidth = 1;

                    // 波のようなシェイプ
                    ctx.moveTo(-width, y);
                    for (let x = -width; x <= width; x += 2) {
                        const waveY = y + Math.sin(t * 2 + x * 0.2 + i) * 10;
                        ctx.lineTo(x, waveY);
                    }
                    ctx.lineTo(width, y);
                    ctx.closePath();

                    ctx.fill();
                    ctx.stroke();

                    // ミラー効果
                    ctx.save();
                    ctx.scale(-1, 1);
                    ctx.beginPath();
                    ctx.moveTo(-width, y);
                    for (let x = -width; x <= width; x += 2) {
                        const waveY = y + Math.sin(t * 2 + x * 0.2 + i) * 10;
                        ctx.lineTo(x, waveY);
                    }
                    ctx.lineTo(width, y);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    ctx.restore();
                }

                ctx.restore();
            }
        }

        function draw() {
            // 背景をフェード
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            time = performance.now() / 1000;

            // パターン描画
            switch (currentPattern) {
                case 'floral':
                    drawFloralPattern(time);
                    break;
                case 'geometric':
                    drawGeometricPattern(time);
                    break;
                case 'spiral':
                    drawSpiralPattern(time);
                    break;
                case 'mandala':
                    drawMandalaPattern(time);
                    break;
                case 'kaleidoscope':
                    drawKaleidoscopePattern(time);
                    break;
            }

            animationId = requestAnimationFrame(draw);
        }

        function saveImage() {
            const link = document.createElement('a');
            link.download = `geometric-pattern-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // クリックでパターン変更
        canvas.addEventListener('click', (e) => {
            if (e.target === canvas) {
                changePattern();
            }
        });

        // 初期化
        window.addEventListener('resize', resize);
        resize();
        draw();
    </script>
</body>
</html>
