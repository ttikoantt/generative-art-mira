<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Orbs - 渦に浮かぶ球体</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 14px;
            opacity: 0.7;
            pointer-events: none;
            z-index: 10;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            border-radius: 5px;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                top: 10px;
                left: 10px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">🌀 Vortex Orbs</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        let orbs = [];
        let time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        class Orb {
            constructor() {
                this.reset();
            }

            reset() {
                this.angle = Math.random() * Math.PI * 2;
                this.radius = Math.random() * 200 + 100;
                this.speed = (Math.random() - 0.5) * 0.02;
                this.size = Math.random() * 8 + 4;
                this.hue = Math.random() * 60 + 200; // Blue-purple range
                this.brightness = Math.random() * 30 + 50;
                this.pulse = Math.random() * Math.PI * 2;
                this.pulseSpeed = Math.random() * 0.02 + 0.01;
            }

            update() {
                this.angle += this.speed;
                this.pulse += this.pulseSpeed;
                this.radius += Math.sin(this.pulse) * 0.5;

                const spiral = Math.sin(time * 0.001) * 50;
                this.currentRadius = this.radius + spiral;

                this.x = centerX + Math.cos(this.angle) * this.currentRadius;
                this.y = centerY + Math.sin(this.angle) * this.currentRadius * 0.6;

                // Trail effect
                this.trail = [];
                for (let i = 0; i < 10; i++) {
                    const trailAngle = this.angle - i * 0.05;
                    const trailRadius = this.currentRadius - i * 5;
                    this.trail.push({
                        x: centerX + Math.cos(trailAngle) * trailRadius,
                        y: centerY + Math.sin(trailAngle) * trailRadius * 0.6,
                        opacity: 1 - i * 0.1
                    });
                }
            }

            draw() {
                // Draw trail
                this.trail.forEach((point, index) => {
                    const size = this.size * (1 - index * 0.08);
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, size, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue}, 70%, ${this.brightness}%, ${point.opacity * 0.3})`;
                    ctx.fill();
                });

                // Draw orb
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 70%, 1)`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 70%, ${this.brightness}%, 0.5)`);
                gradient.addColorStop(1, `hsla(${this.hue}, 60%, ${this.brightness}%, 0)`);

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 1.5, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Glow effect
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 70%, ${this.brightness}%, 0.1)`;
                ctx.fill();
            }
        }

        function init() {
            resize();
            orbs = [];
            for (let i = 0; i < 50; i++) {
                orbs.push(new Orb());
            }
        }

        function drawBackground() {
            // Vortex pattern background
            for (let i = 0; i < 5; i++) {
                const radius = 200 + i * 80 + Math.sin(time * 0.001 + i) * 30;
                const gradient = ctx.createRadialGradient(
                    centerX, centerY, 0,
                    centerX, centerY, radius
                );
                gradient.addColorStop(0, 'rgba(100, 50, 150, 0)');
                gradient.addColorStop(0.5, `rgba(80, 40, 120, ${0.02 - i * 0.003})`);
                gradient.addColorStop(1, 'rgba(60, 30, 90, 0)');

                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            drawBackground();

            orbs.forEach(orb => {
                orb.update();
                orb.draw();
            });

            time++;
            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', resize);
        window.addEventListener('load', () => {
            init();
            animate();
        });
    </script>
</body>
</html>
