<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Rain Matrix - Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #0f0;
            font-size: 14px;
            text-shadow: 0 0 10px #0f0;
            z-index: 10;
        }

        .title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #0f0;
            font-size: 24px;
            text-shadow: 0 0 20px #0f0;
            z-index: 10;
            letter-spacing: 4px;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 18px;
            }
            .info {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="title">DIGITAL RAIN MATRIX</div>
    <canvas id="canvas"></canvas>
    <div class="info">クリックで色相を変更</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // キャンバスサイズ設定
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 設定
        const fontSize = 20;
        const columns = Math.floor(canvas.width / fontSize);
        const drops = [];
        
        // 各列のドロップ位置を初期化
        for (let i = 0; i < columns; i++) {
            drops[i] = Math.random() * canvas.height / fontSize;
        }

        // 色相
        let hue = 120; // 緑色からスタート

        // 文字セット（カタカナ、数字、記号）
        const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';

        // アニメーション
        function draw() {
            // 半透明の黒で上書き（トレイル効果）
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                // ランダムな文字
                const text = chars[Math.floor(Math.random() * chars.length)];

                // 位置によって色を変える（上に行くほど明るく）
                const y = drops[i] * fontSize;
                const brightness = Math.max(0.3, 1 - (y / canvas.height));
                
                ctx.fillStyle = `hsla(${hue}, 100%, ${50 + brightness * 50}%, ${brightness})`;
                
                // 文字を描画
                ctx.fillText(text, i * fontSize, y);

                // 画面の下まで来たらランダムな確率で上に戻る
                if (y > canvas.height && Math.random() > 0.98) {
                    drops[i] = 0;
                }

                // ドロップを下に移動
                drops[i]++;
            }
        }

        // アニメーションループ
        setInterval(draw, 50);

        // クリックで色相を変更
        canvas.addEventListener('click', () => {
            hue = (hue + 60) % 360;
        });

        // タッチ対応
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            hue = (hue + 60) % 360;
        });
    </script>
</body>
</html>
