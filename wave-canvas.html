<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave Canvas - Interactive Waves</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
            position: relative;
            z-index: 10;
        }
        
        h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(138, 43, 226, 0.8);
        }
        
        .subtitle {
            color: #a78bfa;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }
        
        #canvas {
            border: 3px solid rgba(138, 43, 226, 0.6);
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.4);
            cursor: pointer;
            touch-action: none;
        }
        
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .fullscreen-btn {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }
        
        .info {
            color: #a78bfa;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }
            
            #canvas {
                max-width: 95vw;
                max-height: 50vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌊 Wave Canvas</h1>
        <p class="subtitle">インタラクティブな波紋アニメーション</p>
        
        <canvas id="canvas"></canvas>
        
        <div class="controls">
            <button class="btn" onclick="clearCanvas()">クリア</button>
            <button class="btn" onclick="randomWaves()">ランダム生成</button>
            <button class="btn fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
        </div>
        
        <p class="info">💡 クリックまたはタップで波紋を作成</p>
    </div>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Canvasサイズ設定
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 700);
            const maxHeight = Math.min(window.innerHeight - 250, 500);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // 波紋クラス
        class Wave {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.hue = hue;
                this.radius = 0;
                this.maxRadius = Math.max(canvas.width, canvas.height) * 0.4;
                this.alpha = 1;
                this.speed = 2 + Math.random() * 2;
                this.lineWidth = 3 + Math.random() * 3;
            }
            
            update() {
                this.radius += this.speed;
                this.alpha = 1 - (this.radius / this.maxRadius);
                return this.alpha > 0;
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 80%, 60%, ${this.alpha})`;
                ctx.lineWidth = this.lineWidth;
                ctx.stroke();
                
                // 内側の円
                if (this.radius > 10) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius * 0.7, 0, Math.PI * 2);
                    ctx.strokeStyle = `hsla(${this.hue + 30}, 80%, 60%, ${this.alpha * 0.5})`;
                    ctx.lineWidth = this.lineWidth * 0.5;
                    ctx.stroke();
                }
            }
        }
        
        let waves = [];
        let hue = 0;
        let autoWave = null;
        
        // 波紋を追加
        function addWave(x, y) {
            waves.push(new Wave(x, y, hue));
            hue = (hue + 15) % 360;
        }
        
        // クリックイベント
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            addWave(x, y);
        });
        
        // タッチイベント
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            for (let touch of e.touches) {
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;
                addWave(x, y);
            }
        });
        
        // クリア
        function clearCanvas() {
            waves = [];
            ctx.fillStyle = 'rgba(15, 12, 41, 1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        
        // ランダム生成
        function randomWaves() {
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * canvas.height;
                    addWave(x, y);
                }, i * 100);
            }
        }
        
        // 全画面
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        // アニメーション
        function animate() {
            // 半透明の黒で上書き（トレイル効果）
            ctx.fillStyle = 'rgba(15, 12, 41, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 波紋を更新
            waves = waves.filter(wave => {
                wave.draw();
                return wave.update();
            });
            
            requestAnimationFrame(animate);
        }
        
        // 開始
        clearCanvas();
        randomWaves();
        animate();
        
        // 定期的に自動で波紋
        setInterval(() => {
            if (Math.random() < 0.3) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                addWave(x, y);
            }
        }, 2000);
    </script>
</body>
</html>
