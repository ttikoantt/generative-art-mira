<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mandala Generator | 曼荼羅ジェネレーター</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            overflow-x: hidden;
        }

        .header {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .fullscreen-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .canvas-container {
            position: relative;
            margin-bottom: 20px;
        }

        #mandalaCanvas {
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(240, 147, 251, 0.3);
            max-width: 100%;
            height: auto;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: space-between;
        }

        .control-group input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(240, 147, 251, 0.5);
        }

        .color-schemes {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .color-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .color-btn:hover, .color-btn.active {
            transform: scale(1.2);
            border-color: #fff;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .action-btn {
            padding: 12px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .generate-btn {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(240, 147, 251, 0.5);
        }

        .animate-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }

        .animate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }

        .info {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.2rem;
            }

            .controls {
                grid-template-columns: 1fr;
                gap: 12px;
                padding: 15px;
            }

            .action-buttons {
                flex-direction: column;
                align-items: center;
            }

            .action-btn {
                width: 100%;
                max-width: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔮 Mandala Generator</h1>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    </div>

    <div class="container">
        <div class="canvas-container">
            <canvas id="mandalaCanvas" width="500" height="500"></canvas>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>
                    対称性: <span id="symmetryValue">8</span>
                </label>
                <input type="range" id="symmetry" min="4" max="16" value="8">
            </div>

            <div class="control-group">
                <label>
                    複雑さ: <span id="complexityValue">5</span>
                </label>
                <input type="range" id="complexity" min="2" max="10" value="5">
            </div>

            <div class="control-group">
                <label>
                    レイヤー数: <span id="layersValue">4</span>
                </label>
                <input type="range" id="layers" min="1" max="8" value="4">
            </div>

            <div class="control-group">
                <label>カラースキーム:</label>
                <div class="color-schemes">
                    <div class="color-btn active" data-scheme="rainbow" style="background: linear-gradient(135deg, #f093fb, #f5576c);"></div>
                    <div class="color-btn" data-scheme="ocean" style="background: linear-gradient(135deg, #667eea, #764ba2);"></div>
                    <div class="color-btn" data-scheme="fire" style="background: linear-gradient(135deg, #fa709a, #fee140);"></div>
                    <div class="color-btn" data-scheme="nature" style="background: linear-gradient(135deg, #11998e, #38ef7d);"></div>
                    <div class="color-btn" data-scheme="monochrome" style="background: linear-gradient(135deg, #8e9eab, #eef2f3);"></div>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="action-btn generate-btn" onclick="generateMandala()">🎨 新しい曼荼羅</button>
            <button class="action-btn animate-btn" onclick="toggleAnimation()">✨ アニメーション</button>
        </div>

        <p class="info">スライダーを調整して「新しい曼荼羅」をクリック</p>
    </div>

    <script>
        const canvas = document.getElementById('mandalaCanvas');
        const ctx = canvas.getContext('2d');
        let animationId = null;
        let rotationAngle = 0;
        let currentScheme = 'rainbow';

        const colorSchemes = {
            rainbow: ['#f093fb', '#f5576c', '#4facfe', '#00f2fe', '#a8edea', '#fed6e3'],
            ocean: ['#667eea', '#764ba2', '#4facfe', '#00f2fe', '#89f7fe', '#66a6ff'],
            fire: ['#fa709a', '#fee140', '#ff9a9e', '#fecfef', '#ffecd2', '#fcb69f'],
            nature: ['#11998e', '#38ef7d', '#00b09b', '#96c93d', '#56ab2f', '#a8e063'],
            monochrome: ['#8e9eab', '#eef2f3', '#bdc3c7', '#ecf0f1', '#dfe6e9', '#b2bec3']
        };

        // Initialize sliders
        const sliders = {
            symmetry: document.getElementById('symmetry'),
            complexity: document.getElementById('complexity'),
            layers: document.getElementById('layers')
        };

        Object.keys(sliders).forEach(key => {
            sliders[key].addEventListener('input', (e) => {
                document.getElementById(`${key}Value`).textContent = e.target.value;
            });
        });

        // Color scheme selection
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentScheme = btn.dataset.scheme;
                generateMandala();
            });
        });

        function getColors() {
            return colorSchemes[currentScheme];
        }

        function generateMandala() {
            const symmetry = parseInt(sliders.symmetry.value);
            const complexity = parseInt(sliders.complexity.value);
            const layers = parseInt(sliders.layers.value);
            const colors = getColors();

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);

            for (let layer = 0; layer < layers; layer++) {
                const layerRadius = 50 + (layer * (200 / layers));
                const layerColors = colors;
                
                for (let i = 0; i < symmetry; i++) {
                    const angle = (i * 2 * Math.PI) / symmetry;
                    ctx.save();
                    ctx.rotate(angle);

                    // Draw petal-like shapes
                    const petalCount = complexity + Math.floor(Math.random() * 3);
                    for (let j = 0; j < petalCount; j++) {
                        const petalAngle = (j * Math.PI) / petalCount;
                        const petalRadius = layerRadius * (0.3 + Math.random() * 0.5);
                        const petalLength = layerRadius * (0.2 + Math.random() * 0.4);

                        ctx.beginPath();
                        ctx.strokeStyle = layerColors[j % layerColors.length];
                        ctx.fillStyle = layerColors[(j + 1) % layerColors.length] + '40';
                        ctx.lineWidth = 1.5;

                        // Draw petal
                        for (let t = 0; t <= 1; t += 0.1) {
                            const x = petalRadius * Math.cos(petalAngle + t * Math.PI / 2);
                            const y = petalLength * t;
                            if (t === 0) {
                                ctx.moveTo(x, y);
                            } else {
                                ctx.lineTo(x, y);
                            }
                        }
                        
                        ctx.stroke();
                        ctx.fill();

                        // Add dots for decoration
                        if (Math.random() > 0.5) {
                            ctx.beginPath();
                            ctx.fillStyle = layerColors[(j + 2) % layerColors.length];
                            ctx.arc(petalRadius * Math.cos(petalAngle), petalLength * 0.5, 3, 0, 2 * Math.PI);
                            ctx.fill();
                        }
                    }

                    ctx.restore();
                }

                // Add connecting circles
                if (layer < layers - 1) {
                    ctx.beginPath();
                    ctx.strokeStyle = layerColors[layer % layerColors.length] + '60';
                    ctx.lineWidth = 1;
                    ctx.arc(0, 0, layerRadius + 20, 0, 2 * Math.PI);
                    ctx.stroke();
                }
            }

            // Center decoration
            ctx.beginPath();
            const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, 30);
            gradient.addColorStop(0, colors[0]);
            gradient.addColorStop(1, colors[colors.length - 1] + '80');
            ctx.fillStyle = gradient;
            ctx.arc(0, 0, 25, 0, 2 * Math.PI);
            ctx.fill();

            ctx.restore();
        }

        function toggleAnimation() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
                document.querySelector('.animate-btn').textContent = '✨ アニメーション';
            } else {
                document.querySelector('.animate-btn').textContent = '⏸️ 停止';
                animate();
            }
        }

        function animate() {
            rotationAngle += 0.005;
            
            const symmetry = parseInt(sliders.symmetry.value);
            const complexity = parseInt(sliders.complexity.value);
            const layers = parseInt(sliders.layers.value);
            const colors = getColors();

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate(rotationAngle);

            for (let layer = 0; layer < layers; layer++) {
                const layerRadius = 50 + (layer * (200 / layers));
                
                for (let i = 0; i < symmetry; i++) {
                    const angle = (i * 2 * Math.PI) / symmetry;
                    ctx.save();
                    ctx.rotate(angle);

                    const petalCount = complexity + Math.floor(Math.random() * 3);
                    for (let j = 0; j < petalCount; j++) {
                        const petalAngle = (j * Math.PI) / petalCount;
                        const petalRadius = layerRadius * (0.3 + Math.random() * 0.5);
                        const petalLength = layerRadius * (0.2 + Math.random() * 0.4);

                        ctx.beginPath();
                        ctx.strokeStyle = colors[(i + j) % colors.length];
                        ctx.fillStyle = colors[(i + j + 1) % colors.length] + '30';
                        ctx.lineWidth = 1.5;

                        for (let t = 0; t <= 1; t += 0.1) {
                            const x = petalRadius * Math.cos(petalAngle + t * Math.PI / 2);
                            const y = petalLength * t;
                            if (t === 0) {
                                ctx.moveTo(x, y);
                            } else {
                                ctx.lineTo(x, y);
                            }
                        }
                        
                        ctx.stroke();
                        ctx.fill();
                    }

                    ctx.restore();
                }

                if (layer < layers - 1) {
                    ctx.beginPath();
                    ctx.strokeStyle = colors[layer % colors.length] + '40';
                    ctx.lineWidth = 1;
                    ctx.arc(0, 0, layerRadius + 20, 0, 2 * Math.PI);
                    ctx.stroke();
                }
            }

            ctx.beginPath();
            const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, 30);
            gradient.addColorStop(0, colors[0]);
            gradient.addColorStop(1, colors[colors.length - 1] + '80');
            ctx.fillStyle = gradient;
            ctx.arc(0, 0, 25, 0, 2 * Math.PI);
            ctx.fill();

            ctx.restore();

            animationId = requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Generate initial mandala
        generateMandala();
    </script>
</body>
</html>
