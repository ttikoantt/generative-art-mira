<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>春の光と影 | Spring Light and Shadows</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        canvas {
            display: block;
            cursor: move;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 25px;
            color: white;
            font-size: 14px;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 4px;
            z-index: 100;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .info {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            z-index: 100;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="title">春の光と影</div>
    <div class="info">ドラッグして光源を移動</div>
    <div class="controls">
        🌸 春の光と影 | 光源の位置で変化する影のダンス
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let light = { x: 0, y: 0 };
        let isDragging = false;
        let objects = [];
        let sakuraPetals = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            light.x = width * 0.5;
            light.y = height * 0.3;
            initObjects();
        }

        function initObjects() {
            objects = [];
            // 春の枝を作成
            for (let i = 0; i < 5; i++) {
                createBranch(
                    Math.random() * width * 0.3 + width * 0.1,
                    height,
                    -Math.PI / 2 + (Math.random() - 0.5) * 0.5,
                    100 + Math.random() * 50
                );
            }
            for (let i = 0; i < 5; i++) {
                createBranch(
                    Math.random() * width * 0.3 + width * 0.6,
                    height,
                    -Math.PI / 2 + (Math.random() - 0.5) * 0.5,
                    100 + Math.random() * 50
                );
            }
        }

        function createBranch(x, y, angle, length, depth = 0) {
            if (depth > 3 || length < 20) return;

            const endX = x + Math.cos(angle) * length;
            const endY = y + Math.sin(angle) * length;

            objects.push({
                type: 'branch',
                x1: x, y1: y,
                x2: endX, y2: endY,
                width: Math.max(1, 8 - depth * 2)
            });

            // 桜の花を追加
            if (Math.random() > 0.6 && depth > 1) {
                objects.push({
                    type: 'flower',
                    x: endX,
                    y: endY,
                    size: 8 + Math.random() * 6
                });
            }

            // 分岐
            const branches = 2 + Math.floor(Math.random() * 2);
            for (let i = 0; i < branches; i++) {
                const newAngle = angle + (Math.random() - 0.5) * 1.2;
                const newLength = length * (0.6 + Math.random() * 0.2);
                createBranch(endX, endY, newAngle, newLength, depth + 1);
            }
        }

        function createShadow(x, y, lightX, lightY) {
            const dx = x - lightX;
            const dy = y - lightY;
            const dist = Math.sqrt(dx * dx + dy * dy);

            const shadowLength = Math.min(300, 10000 / dist);
            const shadowX = x + (dx / dist) * shadowLength;
            const shadowY = y + (dy / dist) * shadowLength;

            return { x1: x, y1: y, x2: shadowX, y2: shadowY };
        }

        function drawObject(obj, alpha = 1) {
            if (obj.type === 'branch') {
                ctx.strokeStyle = `rgba(80, 50, 30, ${alpha})`;
                ctx.lineWidth = obj.width;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(obj.x1, obj.y1);
                ctx.lineTo(obj.x2, obj.y2);
                ctx.stroke();
            } else if (obj.type === 'flower') {
                const gradient = ctx.createRadialGradient(
                    obj.x, obj.y, 0,
                    obj.x, obj.y, obj.size
                );
                gradient.addColorStop(0, `rgba(255, 182, 193, ${alpha})`);
                gradient.addColorStop(0.5, `rgba(255, 150, 170, ${alpha})`);
                gradient.addColorStop(1, `rgba(255, 130, 150, ${alpha * 0.3})`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(obj.x, obj.y, obj.size, 0, Math.PI * 2);
                ctx.fill();

                // 花びら
                for (let i = 0; i < 5; i++) {
                    const angle = (i / 5) * Math.PI * 2;
                    const px = obj.x + Math.cos(angle) * obj.size * 0.7;
                    const py = obj.y + Math.sin(angle) * obj.size * 0.7;

                    ctx.fillStyle = `rgba(255, 200, 220, ${alpha * 0.8})`;
                    ctx.beginPath();
                    ctx.arc(px, py, obj.size * 0.4, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function drawShadow(obj) {
            if (obj.type === 'flower') {
                const shadow = createShadow(obj.x, obj.y, light.x, light.y);
                const gradient = ctx.createLinearGradient(
                    shadow.x1, shadow.y1, shadow.x2, shadow.y2
                );
                gradient.addColorStop(0, 'rgba(0, 0, 0, 0.3)');
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

                ctx.strokeStyle = gradient;
                ctx.lineWidth = obj.size * 1.5;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(shadow.x1, shadow.y1);
                ctx.lineTo(shadow.x2, shadow.y2);
                ctx.stroke();
            } else if (obj.type === 'branch') {
                const midX = (obj.x1 + obj.x2) / 2;
                const midY = (obj.y1 + obj.y2) / 2;
                const shadow = createShadow(midX, midY, light.x, light.y);
                const gradient = ctx.createLinearGradient(
                    shadow.x1, shadow.y1, shadow.x2, shadow.y2
                );
                gradient.addColorStop(0, 'rgba(0, 0, 0, 0.2)');
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

                ctx.strokeStyle = gradient;
                ctx.lineWidth = obj.width * 1.2;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(shadow.x1, shadow.y1);
                ctx.lineTo(shadow.x2, shadow.y2);
                ctx.stroke();
            }
        }

        function drawLight() {
            const gradient = ctx.createRadialGradient(
                light.x, light.y, 0,
                light.x, light.y, 200
            );
            gradient.addColorStop(0, 'rgba(255, 250, 240, 0.3)');
            gradient.addColorStop(0.3, 'rgba(255, 240, 220, 0.1)');
            gradient.addColorStop(1, 'rgba(255, 240, 220, 0)');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // 光源
            ctx.fillStyle = 'rgba(255, 255, 240, 0.9)';
            ctx.beginPath();
            ctx.arc(light.x, light.y, 15, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'rgba(255, 255, 240, 0.5)';
            ctx.beginPath();
            ctx.arc(light.x, light.y, 25, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawBackground() {
            // 春の夜空
            const skyGradient = ctx.createLinearGradient(0, 0, 0, height);
            skyGradient.addColorStop(0, '#0a1628');
            skyGradient.addColorStop(0.5, '#1a1a3e');
            skyGradient.addColorStop(1, '#2d2d5a');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, width, height);

            // 星
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            for (let i = 0; i < 50; i++) {
                const x = (Math.sin(i * 567) + 1) / 2 * width;
                const y = (Math.cos(i * 321) + 1) / 2 * height * 0.6;
                const size = Math.random() * 2;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function updateSakuraPetals() {
            // 新しい花びらを追加
            if (Math.random() > 0.97 && sakuraPetals.length < 30) {
                sakuraPetals.push({
                    x: Math.random() * width,
                    y: -10,
                    size: 5 + Math.random() * 5,
                    speedX: (Math.random() - 0.5) * 2,
                    speedY: 1 + Math.random() * 1.5,
                    rotation: Math.random() * Math.PI * 2,
                    rotationSpeed: (Math.random() - 0.5) * 0.1,
                    opacity: 0.7 + Math.random() * 0.3
                });
            }

            // 花びらを更新
            sakuraPetals = sakuraPetals.filter(petal => {
                petal.x += petal.speedX + Math.sin(Date.now() / 1000 + petal.rotation) * 0.5;
                petal.y += petal.speedY;
                petal.rotation += petal.rotationSpeed;

                // 光源の影響
                const dx = petal.x - light.x;
                const dy = petal.y - light.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 200) {
                    petal.x += dx / dist * 0.5;
                    petal.y += dy / dist * 0.5;
                }

                return petal.y < height + 10;
            });
        }

        function drawSakuraPetals() {
            sakuraPetals.forEach(petal => {
                ctx.save();
                ctx.translate(petal.x, petal.y);
                ctx.rotate(petal.rotation);

                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, petal.size);
                gradient.addColorStop(0, `rgba(255, 200, 220, ${petal.opacity})`);
                gradient.addColorStop(1, `rgba(255, 150, 180, ${petal.opacity * 0.5})`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.ellipse(0, 0, petal.size, petal.size * 0.6, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            });
        }

        function draw() {
            drawBackground();

            // 影を描画（後ろのオブジェクトから）
            objects.forEach(obj => drawShadow(obj));

            // 光源
            drawLight();

            // オブジェクトを描画
            objects.forEach(obj => drawObject(obj));

            // 桜の花びら
            drawSakuraPetals();

            requestAnimationFrame(draw);
        }

        function update() {
            updateSakuraPetals();
            setTimeout(update, 16);
        }

        // イベントハンドラー
        canvas.addEventListener('mousedown', (e) => {
            const dx = e.clientX - light.x;
            const dy = e.clientY - light.y;
            if (Math.sqrt(dx * dx + dy * dy) < 50) {
                isDragging = true;
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                light.x = e.clientX;
                light.y = e.clientY;
            }
        });

        canvas.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // タッチイベント
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const dx = touch.clientX - light.x;
            const dy = touch.clientY - light.y;
            if (Math.sqrt(dx * dx + dy * dy) < 50) {
                isDragging = true;
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isDragging) {
                const touch = e.touches[0];
                light.x = touch.clientX;
                light.y = touch.clientY;
            }
        });

        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', resize);

        // 初期化
        resize();
        draw();
        update();
    </script>
</body>
</html>
