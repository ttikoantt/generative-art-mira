<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Garden - Interactive Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(100, 200, 255, 0.5);
        }

        .info h1 {
            font-size: 24px;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #64ffda, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .info p {
            font-size: 12px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="info">
        <h1>Quantum Garden</h1>
        <p>Click to plant quantum seeds • Move to interact with particles</p>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let mouseX = width / 2;
        let mouseY = height / 2;
        let time = 0;

        // Quantum particles
        const particles = [];
        const maxParticles = 150;

        // Garden plants
        const plants = [];

        // Color palettes
        const palettes = [
            ['#64ffda', '#a855f7', '#f472b6', '#fbbf24'],
            ['#60a5fa', '#a78bfa', '#f472b6', '#34d399'],
            ['#fbbf24', '#f87171', '#60a5fa', '#a3e635'],
            ['#e879f9', '#22d3ee', '#fbbf24', '#f472b6']
        ];
        let currentPalette = 0;

        class Particle {
            constructor(x, y, isQuantum = false) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.size = Math.random() * 3 + 1;
                this.life = 1;
                this.decay = Math.random() * 0.005 + 0.002;
                this.color = palettes[currentPalette][Math.floor(Math.random() * 4)];
                this.isQuantum = isQuantum;
                this.quantumState = Math.random() * Math.PI * 2;
                this.entangledWith = null;
            }

            update() {
                // Quantum behavior: probability clouds
                if (this.isQuantum) {
                    this.quantumState += 0.05;
                    const uncertainty = Math.sin(this.quantumState) * 0.5;
                    this.vx += uncertainty * 0.1;
                    this.vy += Math.cos(this.quantumState) * 0.1;
                }

                // Mouse interaction
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 150) {
                    const force = (150 - dist) / 150;
                    this.vx -= (dx / dist) * force * 0.3;
                    this.vy -= (dy / dist) * force * 0.3;
                }

                // Apply velocity with damping
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.99;
                this.vy *= 0.99;

                // Boundary behavior
                if (this.x < 0) { this.x = 0; this.vx *= -0.8; }
                if (this.x > width) { this.x = width; this.vx *= -0.8; }
                if (this.y < 0) { this.y = 0; this.vy *= -0.8; }
                if (this.y > height) { this.y = height; this.vy *= -0.8; }

                this.life -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;

                // Quantum glow effect
                if (this.isQuantum) {
                    const glowSize = this.size * (2 + Math.sin(time * 3 + this.quantumState) * 0.5);
                    const gradient = ctx.createRadialGradient(
                        this.x, this.y, 0,
                        this.x, this.y, glowSize * 2
                    );
                    gradient.addColorStop(0, this.color);
                    gradient.addColorStop(0.5, this.color + '80');
                    gradient.addColorStop(1, 'transparent');

                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, glowSize * 2, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Core particle
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        class Plant {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.branches = [];
                this.color = palettes[currentPalette][Math.floor(Math.random() * 4)];
                this.generateStructure();
            }

            generateStructure() {
                const numBranches = Math.floor(Math.random() * 4) + 3;
                for (let i = 0; i < numBranches; i++) {
                    const angle = (Math.PI * 2 / numBranches) * i + Math.random() * 0.3;
                    const length = Math.random() * 80 + 40;
                    this.branches.push({
                        angle,
                        length,
                        width: Math.random() * 3 + 2,
                        subBranches: this.generateSubBranches(length, 0)
                    });
                }
            }

            generateSubBranches(parentLength, depth) {
                if (depth > 3 || parentLength < 10) return [];

                const numSub = Math.floor(Math.random() * 3) + 1;
                const subBranches = [];

                for (let i = 0; i < numSub; i++) {
                    const offsetAngle = (Math.random() - 0.5) * 1.5;
                    const length = parentLength * (0.4 + Math.random() * 0.3);
                    subBranches.push({
                        offsetAngle,
                        length,
                        width: Math.max(0.5, 3 - depth),
                        subBranches: this.generateSubBranches(length, depth + 1)
                    });
                }

                return subBranches;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                for (const branch of this.branches) {
                    this.drawBranch(branch, 0);
                }

                ctx.restore();
            }

            drawBranch(branch, depth) {
                const endX = Math.cos(branch.angle) * branch.length;
                const endY = Math.sin(branch.angle) * branch.length;

                // Draw branch with glow
                ctx.strokeStyle = this.color;
                ctx.lineWidth = branch.width;
                ctx.lineCap = 'round';
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10 + depth * 5;

                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(endX, endY);
                ctx.stroke();

                // Draw sub-branches
                ctx.save();
                ctx.translate(endX, endY);
                ctx.rotate(branch.angle);

                for (const subBranch of branch.subBranches) {
                    ctx.save();
                    ctx.rotate(subBranch.offsetAngle);

                    const subEndX = Math.cos(0) * subBranch.length;
                    const subEndY = Math.sin(0) * subBranch.length;

                    ctx.lineWidth = subBranch.width;
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(subEndX, subEndY);
                    ctx.stroke();

                    // Recursively draw sub-sub-branches
                    const newBranch = { ...subBranch, angle: 0 };
                    this.drawBranch(newBranch, depth + 1);

                    ctx.restore();
                }

                ctx.restore();
            }
        }

        function spawnParticles(x, y, count, isQuantum = false) {
            for (let i = 0; i < count; i++) {
                if (particles.length < maxParticles) {
                    const particle = new Particle(x, y, isQuantum);
                    particles.push(particle);
                }
            }
        }

        function plantSeed(x, y) {
            const plant = new Plant(x, y);
            plants.push(plant);

            // Spawn quantum particles
            spawnParticles(x, y, 30, true);

            // Change palette occasionally
            if (Math.random() > 0.7) {
                currentPalette = (currentPalette + 1) % palettes.length;
            }

            // Limit plants
            if (plants.length > 15) {
                plants.shift();
            }
        }

        function drawBackground() {
            // Create a gradient background with time-based color shift
            const hue = (time * 10) % 360;
            const gradient = ctx.createRadialGradient(
                width / 2, height / 2, 0,
                width / 2, height / 2, Math.max(width, height) / 1.5
            );
            gradient.addColorStop(0, `hsla(${hue}, 30%, 8%, 1)`);
            gradient.addColorStop(0.5, `hsla(${hue + 30}, 25%, 5%, 1)`);
            gradient.addColorStop(1, `hsla(${hue + 60}, 20%, 3%, 1)`);

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // Add subtle grid pattern
            ctx.strokeStyle = 'rgba(100, 200, 255, 0.03)';
            ctx.lineWidth = 1;
            const gridSize = 50;

            for (let x = 0; x < width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }

            for (let y = 0; y < height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
        }

        function drawQuantumField() {
            // Draw subtle quantum field lines
            ctx.strokeStyle = 'rgba(100, 200, 255, 0.02)';
            ctx.lineWidth = 0.5;

            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                for (let x = 0; x < width; x += 10) {
                    const y = height / 2 + Math.sin(x * 0.01 + time + i) * 100 +
                              Math.sin(x * 0.02 - time * 2) * 50;
                    if (x === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.stroke();
            }
        }

        function animate() {
            time += 0.016;

            drawBackground();
            drawQuantumField();

            // Update and draw plants
            for (const plant of plants) {
                plant.draw();
            }

            // Update and draw particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const particle = particles[i];
                particle.update();
                particle.draw();

                if (particle.life <= 0) {
                    particles.splice(i, 1);
                }
            }

            // Auto-spawn ambient particles
            if (Math.random() > 0.97 && particles.length < maxParticles / 2) {
                spawnParticles(
                    Math.random() * width,
                    Math.random() * height,
                    1,
                    true
                );
            }

            requestAnimationFrame(animate);
        }

        // Event listeners
        canvas.addEventListener('click', (e) => {
            plantSeed(e.clientX, e.clientY);
        });

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // Plant initial seed
        setTimeout(() => {
            plantSeed(width / 2, height / 2);
        }, 500);

        // Start animation
        animate();
    </script>
</body>
</html>
