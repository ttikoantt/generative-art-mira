<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brownian Motion Art | Generative Art by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        h1 {
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        #canvas {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(100, 200, 255, 0.2);
            max-width: 95vw;
            max-height: 70vh;
            cursor: crosshair;
        }

        .controls {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            margin-top: 1rem;
            color: #666;
            font-size: 0.85rem;
        }

        .fullscreen-btn {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            font-size: 1.2rem;
            color: white;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.4rem;
            }

            .subtitle {
                font-size: 0.8rem;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()" title="全画面表示">⛶</button>

    <div class="container">
        <h1>🔬 Brownian Motion Art</h1>
        <p class="subtitle">ブラウン運動が描く美しい軌跡</p>

        <canvas id="canvas" width="800" height="600"></canvas>

        <div class="controls">
            <button onclick="reset()">🔄 リセット</button>
            <button onclick="addParticles()">✨ 粒子追加</button>
            <button onclick="togglePause()">⏯️ 一時停止</button>
        </div>

        <p class="info">クリックで新しい粒子を追加 • スペースで一時停止</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        let isPaused = false;
        let animationId;

        // スマホ対応
        function setupCanvas() {
            const maxWidth = Math.min(800, window.innerWidth - 40);
            const maxHeight = Math.min(600, window.innerHeight - 280);

            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }

        setupCanvas();
        window.addEventListener('resize', setupCanvas);

        // 粒子クラス
        class Particle {
            constructor(x, y) {
                this.x = x || Math.random() * canvas.width;
                this.y = y || Math.random() * canvas.height;
                this.baseX = this.x;
                this.baseY = this.y;
                this.hue = Math.random() * 360;
                this.trail = [];
                this.maxTrail = 50;
            }

            update() {
                if (isPaused) return;

                // ブラウン運動：ランダムな移動
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 3 + 1;

                this.x += Math.cos(angle) * distance;
                this.y += Math.sin(angle) * distance;

                // 境界で反射
                if (this.x < 0 || this.x > canvas.width) {
                    this.x = Math.max(0, Math.min(canvas.width, this.x));
                }
                if (this.y < 0 || this.y > canvas.height) {
                    this.y = Math.max(0, Math.min(canvas.height, this.y));
                }

                // 軌跡を記録
                this.trail.push({ x: this.x, y: this.y, hue: this.hue });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }

                // 色相を変化
                this.hue = (this.hue + 0.5) % 360;
            }

            draw() {
                // 軌跡を描画
                for (let i = 0; i < this.trail.length - 1; i++) {
                    const point = this.trail[i];
                    const nextPoint = this.trail[i + 1];
                    const alpha = (i / this.trail.length) * 0.8;
                    const width = (i / this.trail.length) * 3;

                    ctx.beginPath();
                    ctx.strokeStyle = `hsla(${point.hue}, 80%, 60%, ${alpha})`;
                    ctx.lineWidth = width;
                    ctx.lineCap = 'round';
                    ctx.moveTo(point.x, point.y);
                    ctx.lineTo(nextPoint.x, nextPoint.y);
                    ctx.stroke();
                }

                // 現在の位置を描画
                ctx.beginPath();
                ctx.fillStyle = `hsl(${this.hue}, 80%, 60%)`;
                ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
                ctx.fill();

                // 光る効果
                ctx.beginPath();
                ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, 0.3)`;
                ctx.arc(this.x, this.y, 8, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 初期粒子を作成
        function init() {
            particles = [];
            for (let i = 0; i < 8; i++) {
                particles.push(new Particle());
            }
        }

        // アニメーション
        function animate() {
            // 半透明の背景で残像効果
            ctx.fillStyle = 'rgba(10, 10, 15, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            animationId = requestAnimationFrame(animate);
        }

        // リセット
        function reset() {
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            init();
        }

        // 粒子追加
        function addParticles() {
            for (let i = 0; i < 3; i++) {
                particles.push(new Particle());
            }
        }

        // 一時停止
        function togglePause() {
            isPaused = !isPaused;
        }

        // 全画面表示
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // クリックで粒子追加
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            particles.push(new Particle(x, y));
        });

        // タッチ対応
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            particles.push(new Particle(x, y));
        });

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                togglePause();
            }
        });

        // 初期化
        init();
        animate();
    </script>
</body>
</html>
