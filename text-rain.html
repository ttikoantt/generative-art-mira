<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Rain - テキストの雨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #canvas {
            display: block;
            cursor: crosshair;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .controls h2 {
            margin-bottom: 15px;
            font-size: 18px;
            color: #00ff88;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
        }

        .control-group select,
        .control-group input[type="range"] {
            width: 100%;
            padding: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            color: #fff;
            font-size: 14px;
        }

        .control-group select option {
            background: #1a1a2e;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            border: none;
            border-radius: 5px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            color: #fff;
            font-size: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info p {
            margin: 5px 0;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            font-size: 24px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 136, 0.3);
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .controls {
                top: 60px;
                left: 10px;
                right: 10px;
                padding: 15px;
                font-size: 12px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 12px 15px;
                font-size: 20px;
            }

            .info {
                bottom: 10px;
                left: 10px;
                right: 10px;
                padding: 10px 15px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <h2>🌧️ Text Rain</h2>
        <div class="control-group">
            <label>テキストセット</label>
            <select id="textSet">
                <option value="poetry">詩</option>
                <option value="philosophy">哲学</option>
                <option value="code">コード</option>
                <option value="emoji">絵文字</option>
            </select>
        </div>
        <div class="control-group">
            <label>雨の速度: <span id="speedValue">3</span></label>
            <input type="range" id="rainSpeed" min="1" max="10" value="3">
        </div>
        <div class="control-group">
            <label>文字サイズ: <span id="sizeValue">16</span>px</label>
            <input type="range" id="textSize" min="10" max="30" value="16">
        </div>
        <button class="btn" onclick="resetRain()">リセット</button>
    </div>

    <div class="info">
        <p>🖱️ マウスを動かすとテキストが避けます</p>
        <p>クリックで一時停止/再開</p>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // テキストセット
        const textSets = {
            poetry: [
                '雨', '空', '風', '光', '影', '夢', '星', '月',
                '愛', '希望', '美', '静寂', '瞬き', '輝き',
                '儚さ', '永遠', '調和', 'リズム', 'ハーモニー',
                'Azure sky', 'Silent dream', 'Eternal light',
                'Whispering wind', 'Dancing stars', 'Gentle rain',
                'Sweet melody', 'Peaceful moment'
            ],
            philosophy: [
                '存在', '意識', '自由', '真理', '美', '善',
                '時間', '空間', '因果', '運命', '偶然', '必然',
                '思考', '感覚', '理性', '直感', '創造',
                'Being', 'Consciousness', 'Freedom', 'Truth',
                'Wisdom', 'Knowledge', 'Understanding', 'Insight'
            ],
            code: [
                'function', 'const', 'let', 'var', 'if', 'else',
                'for', 'while', 'return', 'class', 'import',
                'export', 'async', 'await', 'Promise', 'Array',
                'Object', 'String', 'Number', 'Boolean', 'null',
                'undefined', 'true', 'false', '=>', '{}', '[]',
                'console.log()', 'addEventListener()', 'querySelector()'
            ],
            emoji: [
                '🌧️', '⛈️', '☔', '💧', '🌊', '✨', '⭐', '🌟',
                '💫', '🌙', '☀️', '🌈', '🎨', '🎭', '🎪', '🎢',
                '🎡', '🎠', '🎡', '🎢', '🎡', '🎠', '🎪', '🎭',
                '💭', '💬', '🗯️', '🔮', '🔭', '🔬', '🔭'
            ]
        };

        // 設定
        let currentTextSet = 'poetry';
        let rainSpeed = 3;
        let textSize = 16;
        let isPaused = false;

        // マウス位置
        let mouseX = -1000;
        let mouseY = -1000;

        // 色相
        let hue = 0;

        // テキスト雨粒
        class TextDrop {
            constructor() {
                this.reset();
            }

            reset() {
                const texts = textSets[currentTextSet];
                this.text = texts[Math.floor(Math.random() * texts.length)];
                this.x = Math.random() * width;
                this.y = Math.random() * -height - 50;
                this.speed = (Math.random() * 2 + rainSpeed - 1) * 0.5;
                this.size = textSize + Math.random() * 5 - 2.5;
                this.hue = Math.random() * 60 + hue;
                this.opacity = Math.random() * 0.5 + 0.5;
                this.rotation = Math.random() * 30 - 15;
            }

            update() {
                this.y += this.speed;
                this.hue += 0.1;

                // マウス回避
                const dx = this.x - mouseX;
                const dy = this.y - mouseY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const avoidRadius = 100;

                if (distance < avoidRadius) {
                    const force = (avoidRadius - distance) / avoidRadius;
                    const angle = Math.atan2(dy, dx);
                    this.x += Math.cos(angle) * force * 3;
                    this.y += Math.sin(angle) * force * 3;
                }

                // 画面外に出たらリセット
                if (this.y > height + 50) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);

                // グロー効果
                ctx.shadowColor = `hsla(${this.hue}, 100%, 50%, 0.8)`;
                ctx.shadowBlur = 10;

                ctx.font = `${this.size}px 'Courier New', monospace`;
                ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${this.opacity})`;
                ctx.fillText(this.text, 0, 0);

                ctx.restore();
            }
        }

        // 雨粒の配列
        let drops = [];
        const dropCount = 150;

        // 初期化
        function init() {
            drops = [];
            for (let i = 0; i < dropCount; i++) {
                drops.push(new TextDrop());
            }
        }

        // アニメーション
        function animate() {
            if (!isPaused) {
                // 背景を少し残す
                ctx.fillStyle = 'rgba(26, 26, 46, 0.1)';
                ctx.fillRect(0, 0, width, height);

                // 色相を更新
                hue = (hue + 0.2) % 360;

                // 雨粒を更新・描画
                drops.forEach(drop => {
                    drop.update();
                    drop.draw();
                });
            }

            requestAnimationFrame(animate);
        }

        // リセット
        function resetRain() {
            currentTextSet = document.getElementById('textSet').value;
            rainSpeed = parseInt(document.getElementById('rainSpeed').value);
            textSize = parseInt(document.getElementById('textSize').value);
            init();
        }

        // 全画面表示
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('mouseleave', () => {
            mouseX = -1000;
            mouseY = -1000;
        });

        canvas.addEventListener('click', () => {
            isPaused = !isPaused;
        });

        document.getElementById('textSet').addEventListener('change', resetRain);

        document.getElementById('rainSpeed').addEventListener('input', (e) => {
            document.getElementById('speedValue').textContent = e.target.value;
            rainSpeed = parseInt(e.target.value);
            drops.forEach(drop => {
                drop.speed = (Math.random() * 2 + rainSpeed - 1) * 0.5;
            });
        });

        document.getElementById('textSize').addEventListener('input', (e) => {
            document.getElementById('sizeValue').textContent = e.target.value;
            textSize = parseInt(e.target.value);
            drops.forEach(drop => {
                drop.size = textSize + Math.random() * 5 - 2.5;
            });
        });

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // タッチ操作
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', () => {
            mouseX = -1000;
            mouseY = -1000;
        });

        // 開始
        init();
        animate();
    </script>
</body>
</html>
