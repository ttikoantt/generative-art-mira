<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ripple Art - 波紋アート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            color: white;
            z-index: 10;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .info {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 1.5rem;
        }

        #canvas {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            cursor: crosshair;
            background: rgba(0,0,0,0.2);
        }

        .controls {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        button:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .fullscreen-btn {
            position: fixed;
            top: 1rem;
            right: 1rem;
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }
            #canvas {
                width: 90vw;
                height: 90vw;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🌊 Ripple Art</h1>
        <p class="info">クリックして波紋を作成</p>
        <canvas id="canvas" width="600" height="600"></canvas>

        <div class="controls">
            <button onclick="clearCanvas()">クリア</button>
            <button onclick="toggleAuto()">自動: <span id="autoStatus">OFF</span></button>
            <button onclick="changeMode()">モード: <span id="modeText">Standard</span></button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const ripples = [];
        let autoMode = false;
        let autoInterval = null;
        let colorMode = 'rainbow';

        const modes = ['rainbow', 'ocean', 'sunset', 'aurora'];
        let currentModeIndex = 0;

        class Ripple {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = 150 + Math.random() * 100;
                this.alpha = 1;
                this.speed = 2 + Math.random() * 2;
                this.color = color;
                this.lineWidth = 3 + Math.random() * 2;
            }

            update() {
                this.radius += this.speed;
                this.alpha = 1 - (this.radius / this.maxRadius);
                return this.alpha > 0;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = this.color.replace('ALPHA', this.alpha);
                ctx.lineWidth = this.lineWidth;
                ctx.stroke();

                // Secondary ring
                if (this.radius > 20) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius - 15, 0, Math.PI * 2);
                    ctx.strokeStyle = this.color.replace('ALPHA', this.alpha * 0.5);
                    ctx.lineWidth = this.lineWidth * 0.5;
                    ctx.stroke();
                }
            }
        }

        function getColor() {
            const mode = modes[currentModeIndex];
            const colors = {
                rainbow: [
                    `hsla(${Math.random() * 360}, 80%, 60%, ALPHA)`,
                    `hsla(${Math.random() * 360}, 90%, 65%, ALPHA)`,
                    `hsla(${Math.random() * 360}, 70%, 55%, ALPHA)`
                ],
                ocean: [
                    `hsla(${200 + Math.random() * 40}, 80%, 60%, ALPHA)`,
                    `hsla(${180 + Math.random() * 60}, 70%, 55%, ALPHA)`,
                    `hsla(${190 + Math.random() * 50}, 75%, 65%, ALPHA)`
                ],
                sunset: [
                    `hsla(${0 + Math.random() * 60}, 90%, 60%, ALPHA)`,
                    `hsla(${30 + Math.random() * 30}, 85%, 55%, ALPHA)`,
                    `hsla(${350 + Math.random() * 40}, 80%, 65%, ALPHA)`
                ],
                aurora: [
                    `hsla(${120 + Math.random() * 60}, 70%, 60%, ALPHA)`,
                    `hsla(${160 + Math.random() * 40}, 80%, 55%, ALPHA)`,
                    `hsla(${140 + Math.random() * 50}, 75%, 65%, ALPHA)`
                ]
            };
            const palette = colors[mode];
            return palette[Math.floor(Math.random() * palette.length)];
        }

        function addRipple(x, y) {
            ripples.push(new Ripple(x, y, getColor()));
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            addRipple(x, y);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            addRipple(x, y);
        });

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = ripples.length - 1; i >= 0; i--) {
                if (!ripples[i].update()) {
                    ripples.splice(i, 1);
                } else {
                    ripples[i].draw();
                }
            }

            requestAnimationFrame(animate);
        }

        function clearCanvas() {
            ripples.length = 0;
            ctx.fillStyle = 'rgba(0, 0, 0, 1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function toggleAuto() {
            autoMode = !autoMode;
            document.getElementById('autoStatus').textContent = autoMode ? 'ON' : 'OFF';

            if (autoMode) {
                autoInterval = setInterval(() => {
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * canvas.height;
                    addRipple(x, y);
                }, 500);
            } else {
                clearInterval(autoInterval);
            }
        }

        function changeMode() {
            currentModeIndex = (currentModeIndex + 1) % modes.length;
            document.getElementById('modeText').textContent = modes[currentModeIndex].charAt(0).toUpperCase() + modes[currentModeIndex].slice(1);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initial setup
        clearCanvas();
        animate();
    </script>
</body>
</html>
