<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フラクタル森 - Fractal Forest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        h1 {
            color: #e94560;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }

        .subtitle {
            color: #a2a8d3;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .canvas-wrapper {
            position: relative;
            display: inline-block;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
            background: linear-gradient(to bottom, #0f0f1e 0%, #1a1a2e 100%);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #e94560, #c73e54);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            margin-top: 20px;
            color: #a2a8d3;
            font-size: 0.9rem;
            max-width: 600px;
            line-height: 1.6;
        }

        .fullscreen-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(233, 69, 96, 0.8);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .fullscreen-btn:hover {
            background: rgba(233, 69, 96, 1);
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            canvas {
                width: 100%;
                height: auto;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌲 フラクタル森 🌲</h1>
        <p class="subtitle">Fractal Forest - 再帰的に生成される美しい森</p>

        <div class="canvas-wrapper">
            <canvas id="fractalCanvas" width="800" height="600"></canvas>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
        </div>

        <div class="controls">
            <button onclick="generateNewForest()">🌳 新しい森を生成</button>
            <button onclick="changeColorScheme()">🎨 色を変える</button>
            <button onclick="toggleAnimation()">✨ アニメーション ON/OFF</button>
        </div>

        <div class="info">
            <p>フラクタル幾何学を使って、再帰的に美しい森を生成します。<br>
            ボタンを押すたびに、新しい形と色の森が現れます。</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('fractalCanvas');
        const ctx = canvas.getContext('2d');

        let colorScheme = 0;
        let isAnimating = true;
        let animationId = null;
        let trees = [];
        let time = 0;

        const colorSchemes = [
            { bg: ['#0f0f1e', '#1a1a2e'], tree: ['#e94560', '#c73e54', '#a32e45'], leaves: ['#00d9ff', '#00b4cc', '#0099aa'] },
            { bg: ['#1a0a0a', '#2a1515'], tree: ['#ff6b6b', '#ee5a6f', '#d64045'], leaves: ['#ffd93d', '#ffcc00', '#e6b800'] },
            { bg: ['#0a1a0a', '#152a15'], tree: ['#6bcb77', '#4ade80', '#22c55e'], leaves: ['#a7f3d0', '#6ee7b7', '#34d399'] },
            { bg: ['#0a0a1a', '#15152a'], tree: ['#a78bfa', '#8b5cf6', '#7c3aed'], leaves: ['#c4b5fd', '#a78bfa', '#8b5cf6'] }
        ];

        function getRandomColor(scheme, type) {
            const colors = scheme[type];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function drawTree(startX, startY, length, angle, depth, scheme, wind = 0) {
            if (depth === 0) return;

            const endX = startX + length * Math.cos(angle);
            const endY = startY + length * Math.sin(angle);

            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(endX, endY);

            const gradient = ctx.createLinearGradient(startX, startY, endX, endY);
            gradient.addColorStop(0, getRandomColor(scheme, 'tree'));
            gradient.addColorStop(1, getRandomColor(scheme, 'tree'));

            ctx.strokeStyle = gradient;
            ctx.lineWidth = depth * 0.8;
            ctx.lineCap = 'round';
            ctx.stroke();

            const newLength = length * (0.7 + Math.random() * 0.1);
            const angleOffset = (0.3 + Math.random() * 0.3) + wind;

            if (depth <= 2) {
                // 葉を描画
                ctx.beginPath();
                ctx.arc(endX, endY, 4 + depth * 2, 0, Math.PI * 2);
                ctx.fillStyle = getRandomColor(scheme, 'leaves');
                ctx.fill();
            }

            drawTree(endX, endY, newLength, angle - angleOffset, depth - 1, scheme, wind);
            drawTree(endX, endY, newLength, angle + angleOffset, depth - 1, scheme, wind);
        }

        function generateForest(scheme) {
            const bgGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bgGradient.addColorStop(0, scheme.bg[0]);
            bgGradient.addColorStop(1, scheme.bg[1]);
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 地面を描画
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);

            trees = [];
            const numTrees = 8 + Math.floor(Math.random() * 5);

            for (let i = 0; i < numTrees; i++) {
                trees.push({
                    x: 50 + Math.random() * (canvas.width - 100),
                    length: 60 + Math.random() * 40,
                    depth: 8 + Math.floor(Math.random() * 3)
                });
            }

            // 奥から順に描画
            trees.sort((a, b) => a.x - b.x);

            trees.forEach((tree, index) => {
                const depthFactor = index / trees.length;
                const wind = isAnimating ? Math.sin(time + index) * 0.05 : 0;
                drawTree(tree.x, canvas.height - 50, tree.length, -Math.PI / 2, tree.depth, scheme, wind);
            });
        }

        function generateNewForest() {
            colorScheme = Math.floor(Math.random() * colorSchemes.length);
            generateForest(colorSchemes[colorScheme]);
        }

        function changeColorScheme() {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
            generateForest(colorSchemes[colorScheme]);
        }

        function toggleAnimation() {
            isAnimating = !isAnimating;
            if (isAnimating) {
                animate();
            } else if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
        }

        function animate() {
            if (!isAnimating) return;

            time += 0.02;
            generateForest(colorSchemes[colorScheme]);
            animationId = requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                canvas.requestFullscreen().catch(err => {
                    alert('全画面表示をサポートしていません');
                });
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        generateForest(colorSchemes[0]);
        animate();
    </script>
</body>
</html>
