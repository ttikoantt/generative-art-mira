<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>グラデーション波 - Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
        }

        .container {
            text-align: center;
        }

        canvas {
            display: block;
            border: 2px solid #333;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        .info {
            color: #fff;
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.7;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 768px) {
            canvas {
                max-width: 95vw;
                max-height: 70vh;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="waveCanvas"></canvas>
        <div class="info">
            色が波のように動くアニメーション
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');

        // キャンバスサイズ設定
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth * 0.9, 800);
            const maxHeight = Math.min(window.innerHeight * 0.7, 600);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 波のパラメータ
        const waves = [
            { frequency: 0.02, amplitude: 80, speed: 0.03, offset: 0 },
            { frequency: 0.015, amplitude: 60, speed: 0.02, offset: Math.PI / 3 },
            { frequency: 0.01, amplitude: 100, speed: 0.025, offset: Math.PI / 2 },
            { frequency: 0.008, amplitude: 70, speed: 0.015, offset: Math.PI }
        ];

        let time = 0;

        // 色を計算（HSL）
        function getColor(y, t) {
            const hue = (y * 0.5 + t * 50) % 360;
            const saturation = 70 + Math.sin(t * 0.5) * 20;
            const lightness = 50 + Math.sin(t * 0.3) * 15;
            return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
        }

        // 描画
        function draw() {
            // 背景をクリア
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 各波を描画
            waves.forEach((wave, index) => {
                ctx.beginPath();

                const baseY = canvas.height / 2;
                let started = false;

                for (let x = 0; x <= canvas.width; x += 2) {
                    // 複数のサイン波を重ねる
                    let y = Math.sin(x * wave.frequency + time * wave.speed + wave.offset) * wave.amplitude;
                    y += Math.sin(x * wave.frequency * 0.5 + time * wave.speed * 0.7) * wave.amplitude * 0.5;

                    const finalY = baseY + y;

                    if (!started) {
                        ctx.moveTo(x, finalY);
                        started = true;
                    } else {
                        ctx.lineTo(x, finalY);
                    }
                }

                // グラデーションを作成
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
                for (let i = 0; i <= 10; i++) {
                    const x = (canvas.width / 10) * i;
                    const color = getColor(x, time + index);
                    gradient.addColorStop(i / 10, color);
                }

                ctx.strokeStyle = gradient;
                ctx.lineWidth = 3;
                ctx.stroke();
            });

            // 粒子を描画
            for (let i = 0; i < 50; i++) {
                const x = (Math.sin(time * 0.5 + i * 0.5) * 0.5 + 0.5) * canvas.width;
                const y = (Math.cos(time * 0.3 + i * 0.7) * 0.5 + 0.5) * canvas.height;
                const size = 2 + Math.sin(time + i) * 1;

                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = getColor(x * 0.1, time);
                ctx.fill();
            }

            time += 0.016;
            requestAnimationFrame(draw);
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // アニメーション開始
        draw();
    </script>
</body>
</html>
