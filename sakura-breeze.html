<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sakura Breeze - 桜の舞</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(180deg, 
                #a8e6cf 0%, 
                #ffd3a5 50%, 
                #ffaaa5 100%);
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        
        #canvas {
            display: block;
            cursor: pointer;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            pointer-events: none;
        }
        
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            font-size: 24px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 100;
        }
        
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(1.1);
        }
        
        .title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: clamp(24px, 8vw, 48px);
            font-weight: 300;
            text-align: center;
            text-shadow: 0 4px 20px rgba(255, 105, 135, 0.3);
            pointer-events: none;
            opacity: 0;
            animation: fadeIn 3s ease-out forwards;
        }
        
        @keyframes fadeIn {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        
        .title.fade {
            animation: fadeOut 2s ease-out forwards;
        }
        
        @keyframes fadeOut {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
    <div class="title">Sakura Breeze<br><span style="font-size: 0.5em;">桜の舞</span></div>
    <div class="info">クリックで風を吹かせる</div>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        
        // 花びらの配列
        const petals = [];
        const petalCount = 150;
        
        // 風の状態
        let wind = { x: 0, y: 0 };
        let targetWind = { x: 0, y: 0 };
        
        // 花びらクラス
        class Petal {
            constructor() {
                this.reset();
                this.y = Math.random() * height; // 初期配置はランダム
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = -20;
                this.size = Math.random() * 15 + 8;
                this.speed = Math.random() * 1 + 0.5;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.05;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = Math.random() * 0.03 + 0.01;
                this.wobbleAmount = Math.random() * 2 + 1;
                
                // 桜の色のバリエーション
                const colors = [
                    { r: 255, g: 192, b: 203 }, // ピンク
                    { r: 255, g: 182, b: 193 }, // ライトピンク
                    { r: 255, g: 209, b: 220 }, // ベージュピンク
                    { r: 255, g: 240, b: 245 }  // ごく薄いピンク
                ];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            
            update() {
                // 風の影響
                this.x += wind.x * this.speed * 2;
                this.y += wind.y * this.speed * 2;
                
                // 自然な落下
                this.y += this.speed;
                
                // 左右の揺れ
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * this.wobbleAmount;
                
                // 回転
                this.rotation += this.rotationSpeed;
                
                // 画面外に出たらリセット
                if (this.y > height + 20 || this.x < -50 || this.x > width + 50) {
                    this.reset();
                }
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                // 花びらの形
                ctx.beginPath();
                ctx.moveTo(0, -this.size / 2);
                ctx.bezierCurveTo(
                    this.size / 2, -this.size / 3,
                    this.size / 2, this.size / 3,
                    0, this.size / 2
                );
                ctx.bezierCurveTo(
                    -this.size / 2, this.size / 3,
                    -this.size / 2, -this.size / 3,
                    0, -this.size / 2
                );
                
                // グラデーション
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
                gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0.9)`);
                gradient.addColorStop(1, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0.6)`);
                
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // 花びらの vein（葉脈）
                ctx.strokeStyle = `rgba(255, 255, 255, 0.3)`;
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(0, -this.size / 2);
                ctx.lineTo(0, this.size / 2);
                ctx.stroke();
                
                ctx.restore();
            }
        }
        
        // 花びらを初期化
        for (let i = 0; i < petalCount; i++) {
            petals.push(new Petal());
        }
        
        // 風をゆっくり収束
        function updateWind() {
            wind.x += (targetWind.x - wind.x) * 0.05;
            wind.y += (targetWind.y - wind.y) * 0.05;
            
            // 自然な風
            targetWind.x += (Math.random() - 0.5) * 0.1;
            targetWind.y += (Math.random() - 0.5) * 0.05;
            
            // 限界
            targetWind.x = Math.max(-3, Math.min(3, targetWind.x));
            targetWind.y = Math.max(-1, Math.min(2, targetWind.y));
        }
        
        // アニメーション
        function animate() {
            // 背景をクリア（トレイル効果なし）
            ctx.clearRect(0, 0, width, height);
            
            // 風を更新
            updateWind();
            
            // 花びらを描画
            petals.forEach(petal => {
                petal.update();
                petal.draw();
            });
            
            requestAnimationFrame(animate);
        }
        
        // クリックで風を吹かせる
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;
            
            // クリック位置から風を発生
            targetWind.x = (clickX - width / 2) / 100;
            targetWind.y = (clickY - height / 2) / 100;
            
            // タイトルをフェードアウト
            const title = document.querySelector('.title');
            if (title && !title.classList.contains('fade')) {
                title.classList.add('fade');
            }
        });
        
        // タッチ対応
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const touchX = touch.clientX - rect.left;
            const touchY = touch.clientY - rect.top;
            
            targetWind.x = (touchX - width / 2) / 100;
            targetWind.y = (touchY - height / 2) / 100;
            
            const title = document.querySelector('.title');
            if (title && !title.classList.contains('fade')) {
                title.classList.add('fade');
            }
        });
        
        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        // ウィンドウリサイズ対応
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
        
        // アニメーション開始
        animate();
    </script>
</body>
</html>
