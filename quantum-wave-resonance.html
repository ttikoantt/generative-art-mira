<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Wave Resonance - 量子波共鳴</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(100, 200, 255, 0.5);
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            pointer-events: all;
        }

        button {
            background: rgba(100, 200, 255, 0.2);
            border: 1px solid rgba(100, 200, 255, 0.5);
            color: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 5px;
        }

        button:hover {
            background: rgba(100, 200, 255, 0.4);
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(100, 200, 255, 0.2);
            border: 1px solid rgba(100, 200, 255, 0.5);
            color: rgba(255, 255, 255, 0.9);
            padding: 10px 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 5px;
            pointer-events: all;
        }

        .fullscreen-btn:hover {
            background: rgba(100, 200, 255, 0.4);
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                top: 10px;
                left: 10px;
            }

            .controls {
                bottom: 10px;
                flex-wrap: wrap;
                justify-content: center;
            }

            button {
                padding: 8px 15px;
                font-size: 11px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 12px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <div>Quantum Wave Resonance</div>
        <div style="font-size: 12px; margin-top: 5px;">クリックで波源を追加</div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="controls">
        <button onclick="resetWaves()">リセット</button>
        <button onclick="toggleAutoWave()">自動生成</button>
        <button onclick="changePattern()">パターン切替</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let waves = [];
        let autoWave = false;
        let patternIndex = 0;
        let time = 0;
        let mouseX = 0, mouseY = 0;
        let isMouseDown = false;

        const patterns = [
            { name: 'Quantum Interference', waveCount: 5, frequency: 0.02 },
            { name: 'Harmonic Resonance', waveCount: 3, frequency: 0.03 },
            { name: 'Chaos Theory', waveCount: 7, frequency: 0.015 }
        ];

        const colors = [
            { r: 100, g: 200, b: 255 },
            { r: 255, g: 100, b: 200 },
            { r: 100, g: 255, b: 200 },
            { r: 255, g: 200, b: 100 },
            { r: 200, g: 100, b: 255 }
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class WaveSource {
            constructor(x, y, frequency = 0.02, amplitude = 50, color = null) {
                this.x = x;
                this.y = y;
                this.frequency = frequency;
                this.amplitude = amplitude;
                this.phase = Math.random() * Math.PI * 2;
                this.color = color || colors[Math.floor(Math.random() * colors.length)];
                this.life = 1;
                this.decay = 0.0003;
            }

            update() {
                this.phase += 0.05;
                this.life -= this.decay;
            }

            getAmplitudeAt(px, py) {
                const distance = Math.sqrt((px - this.x) ** 2 + (py - this.y) ** 2);
                const wave = Math.sin(distance * this.frequency - this.phase);
                return wave * this.amplitude * this.life * Math.exp(-distance * 0.002);
            }
        }

        function initWaves() {
            waves = [];
            const pattern = patterns[patternIndex];
            for (let i = 0; i < pattern.waveCount; i++) {
                const angle = (i / pattern.waveCount) * Math.PI * 2;
                const radius = Math.min(width, height) * 0.25;
                const x = width / 2 + Math.cos(angle) * radius;
                const y = height / 2 + Math.sin(angle) * radius;
                waves.push(new WaveSource(x, y, pattern.frequency, 60, colors[i % colors.length]));
            }
        }

        function addWave(x, y) {
            const pattern = patterns[patternIndex];
            waves.push(new WaveSource(
                x, y,
                pattern.frequency,
                50 + Math.random() * 30,
                colors[Math.floor(Math.random() * colors.length)]
            ));
        }

        function draw() {
            // 半透明の黒でフェード
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;
            const step = 4;

            for (let y = 0; y < height; y += step) {
                for (let x = 0; x < width; x += step) {
                    let totalAmplitude = 0;
                    let totalR = 0, totalG = 0, totalB = 0;
                    let colorWeight = 0;

                    for (const wave of waves) {
                        if (wave.life <= 0) continue;

                        const amp = wave.getAmplitudeAt(x, y);
                        if (Math.abs(amp) > 0.1) {
                            const weight = Math.abs(amp) / 100;
                            totalR += wave.color.r * weight;
                            totalG += wave.color.g * weight;
                            totalB += wave.color.b * weight;
                            colorWeight += weight;
                            totalAmplitude += amp;
                        }
                    }

                    if (colorWeight > 0) {
                        const intensity = Math.min(255, Math.abs(totalAmplitude) * 3);
                        const r = Math.min(255, (totalR / colorWeight) * (intensity / 255));
                        const g = Math.min(255, (totalG / colorWeight) * (intensity / 255));
                        const b = Math.min(255, (totalB / colorWeight) * (intensity / 255));

                        for (let dy = 0; dy < step && y + dy < height; dy++) {
                            for (let dx = 0; dx < step && x + dx < width; dx++) {
                                const idx = ((y + dy) * width + (x + dx)) * 4;
                                data[idx] = Math.max(data[idx], r);
                                data[idx + 1] = Math.max(data[idx + 1], g);
                                data[idx + 2] = Math.max(data[idx + 2], b);
                                data[idx + 3] = 255;
                            }
                        }
                    }
                }
            }

            ctx.putImageData(imageData, 0, 0);

            // 波源の位置を表示
            for (const wave of waves) {
                if (wave.life > 0) {
                    const gradient = ctx.createRadialGradient(
                        wave.x, wave.y, 0,
                        wave.x, wave.y, 20
                    );
                    gradient.addColorStop(0, `rgba(${wave.color.r}, ${wave.color.g}, ${wave.color.b}, ${wave.life})`);
                    gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                    ctx.beginPath();
                    ctx.arc(wave.x, wave.y, 20, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                }
            }
        }

        function update() {
            time++;

            // 波を更新
            for (const wave of waves) {
                wave.update();
            }

            // 死んだ波を削除
            waves = waves.filter(w => w.life > 0);

            // 自動生成
            if (autoWave && time % 60 === 0) {
                const x = Math.random() * width;
                const y = Math.random() * height;
                addWave(x, y);
            }

            // マウスドラッグで波を追加
            if (isMouseDown && time % 3 === 0) {
                addWave(mouseX, mouseY);
            }

            draw();
            requestAnimationFrame(update);
        }

        function resetWaves() {
            waves = [];
            initWaves();
        }

        function toggleAutoWave() {
            autoWave = !autoWave;
        }

        function changePattern() {
            patternIndex = (patternIndex + 1) % patterns.length;
            resetWaves();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        window.addEventListener('resize', () => {
            resize();
            initWaves();
        });

        canvas.addEventListener('click', (e) => {
            addWave(e.clientX, e.clientY);
        });

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('mousedown', () => {
            isMouseDown = true;
        });

        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isMouseDown = false;
        });

        // タッチイベント
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isMouseDown = true;
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            addWave(mouseX, mouseY);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        });

        canvas.addEventListener('touchend', () => {
            isMouseDown = false;
        });

        // 初期化
        resize();
        initWaves();
        update();
    </script>
</body>
</html>
