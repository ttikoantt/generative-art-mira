<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>桜フラクタル - Cherry Blossom Fractal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 25px;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .info h1 {
            font-size: 18px;
            color: #ff69b4;
            margin-bottom: 5px;
        }

        .info p {
            font-size: 12px;
            color: #666;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: #ff69b4;
            color: white;
        }

        @media (max-width: 768px) {
            .info {
                padding: 10px 15px;
            }

            .info h1 {
                font-size: 16px;
            }

            .info p {
                font-size: 11px;
            }

            .fullscreen-btn {
                padding: 10px 15px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    <div class="info">
        <h1>🌸 桜フラクタル</h1>
        <p>風に揺れる桜の木</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let time = 0;
        let petals = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        class Petal {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = -20;
                this.size = Math.random() * 8 + 4;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = Math.random() * 2 + 1;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.opacity = Math.random() * 0.5 + 0.5;
                this.wobble = Math.random() * Math.PI * 2;
            }

            update() {
                this.x += this.speedX + Math.sin(this.wobble) * 0.5;
                this.y += this.speedY;
                this.rotation += this.rotationSpeed;
                this.wobble += 0.05;

                if (this.y > height + 20) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.opacity;

                // 桜の花びら
                ctx.fillStyle = '#ffb7c5';
                ctx.beginPath();
                ctx.ellipse(0, 0, this.size, this.size / 2, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#ff9eb5';
                ctx.beginPath();
                ctx.ellipse(0, 0, this.size * 0.7, this.size / 3, Math.PI / 4, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        function drawBranch(x, y, length, angle, depth) {
            if (depth === 0) {
                // 桜の花を描く
                const flowerSize = Math.random() * 8 + 6;
                ctx.fillStyle = `rgba(255, 183, 197, ${Math.random() * 0.3 + 0.7})`;
                for (let i = 0; i < 5; i++) {
                    const flowerAngle = (Math.PI * 2 / 5) * i;
                    const fx = x + Math.cos(flowerAngle) * flowerSize;
                    const fy = y + Math.sin(flowerAngle) * flowerSize;
                    ctx.beginPath();
                    ctx.arc(fx, fy, flowerSize / 2, 0, Math.PI * 2);
                    ctx.fill();
                }
                return;
            }

            // 風による揺れ
            const sway = Math.sin(time * 0.002 + depth * 0.5) * 0.1 * (6 - depth);
            const adjustedAngle = angle + sway;

            const endX = x + Math.cos(adjustedAngle) * length;
            const endY = y + Math.sin(adjustedAngle) * length;

            // 枝を描く
            ctx.strokeStyle = `rgba(139, 90, 43, ${depth / 6})`;
            ctx.lineWidth = depth * 1.5;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.stroke();

            // 再帰的に枝を描く
            const newLength = length * 0.75;
            const branchCount = depth > 3 ? 2 : 3;

            for (let i = 0; i < branchCount; i++) {
                const branchAngle = adjustedAngle + (i - (branchCount - 1) / 2) * 0.6;
                drawBranch(endX, endY, newLength, branchAngle, depth - 1);
            }
        }

        function init() {
            resize();

            // 花びらを初期化
            for (let i = 0; i < 50; i++) {
                petals.push(new Petal());
            }

            animate();
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);

            // 夕日の背景
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#ffecd2');
            gradient.addColorStop(1, '#fcb69f');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // 太陽
            ctx.fillStyle = '#ffb347';
            ctx.beginPath();
            ctx.arc(width * 0.8, height * 0.2, 40, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'rgba(255, 179, 71, 0.5)';
            ctx.beginPath();
            ctx.arc(width * 0.8, height * 0.2, 50, 0, Math.PI * 2);
            ctx.fill();

            time++;

            // 地面
            ctx.fillStyle = '#8b5a2b';
            ctx.fillRect(0, height * 0.85, width, height * 0.15);

            ctx.fillStyle = '#228b22';
            ctx.fillRect(0, height * 0.83, width, 20);

            // 木を描く（3本）
            drawBranch(width * 0.25, height * 0.85, 120, -Math.PI / 2, 6);
            drawBranch(width * 0.5, height * 0.87, 140, -Math.PI / 2, 7);
            drawBranch(width * 0.75, height * 0.84, 130, -Math.PI / 2, 6);

            // 花びらを描く
            petals.forEach(petal => {
                petal.update();
                petal.draw();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        init();
    </script>
</body>
</html>
