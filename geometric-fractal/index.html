<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Fractal - 幾何学的フラクタル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            padding: 15px 20px;
            background: rgba(20, 20, 20, 0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 1.2em;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .header h1 span {
            color: #00ffcc;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(20, 20, 20, 0.8);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.8em;
            backdrop-filter: blur(10px);
        }

        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                gap: 10px;
            }

            .controls {
                width: 100%;
                justify-content: center;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9em;
            }

            .info {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Geometric <span>Fractal</span></h1>
            <div class="controls">
                <button onclick="generateNew()">新規生成</button>
                <button onclick="changePattern()">パターン変更</button>
                <button onclick="changeColors()">カラー変更</button>
                <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
            </div>
        </div>
        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
        <div class="info">
            <div>Pattern: <span id="patternName">Hexagon Spiral</span></div>
            <div>Depth: <span id="depthDisplay">5</span></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let currentPattern = 0;
        let currentColorScheme = 0;
        let animationId = null;
        let progress = 0;

        const patterns = [
            { name: 'Hexagon Spiral', draw: drawHexagonSpiral },
            { name: 'Triangle Tree', draw: drawTriangleTree },
            { name: 'Circle Mandala', draw: drawCircleMandala },
            { name: 'Square Spiral', draw: drawSquareSpiral }
        ];

        const colorSchemes = [
            ['#00ffcc', '#667eea', '#764ba2', '#f093fb'],
            ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3'],
            ['#a8e6cf', '#dcedc1', '#ffd3a5', '#ffaaa5'],
            ['#667eea', '#764ba2', '#f093fb', '#4facfe'],
            ['#fa709a', '#fee140', '#30cfd0', '#330867']
        ];

        function resizeCanvas() {
            const container = document.querySelector('.canvas-container');
            const size = Math.min(container.clientWidth, container.clientHeight) - 40;
            canvas.width = size;
            canvas.height = size;
        }

        function getCurrentColors() {
            return colorSchemes[currentColorScheme];
        }

        function clearCanvas() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawHexagonSpiral(cx, cy, radius, depth, maxDepth) {
            if (depth > maxDepth || radius < 2) return;

            const colors = getCurrentColors();
            const colorIndex = depth % colors.length;
            ctx.strokeStyle = colors[colorIndex];
            ctx.lineWidth = Math.max(0.5, (maxDepth - depth) * 0.5);

            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI / 3) * i + depth * 0.1;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.stroke();

            const newRadius = radius * 0.6;
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI / 3) * i + depth * 0.1;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                drawHexagonSpiral(x, y, newRadius, depth + 1, maxDepth);
            }
        }

        function drawTriangleTree(cx, cy, size, depth, maxDepth) {
            if (depth > maxDepth || size < 2) return;

            const colors = getCurrentColors();
            const colorIndex = depth % colors.length;
            ctx.strokeStyle = colors[colorIndex];
            ctx.lineWidth = Math.max(0.5, (maxDepth - depth) * 0.5);

            const height = size * Math.sqrt(3) / 2;

            ctx.beginPath();
            ctx.moveTo(cx, cy - height);
            ctx.lineTo(cx - size / 2, cy);
            ctx.lineTo(cx + size / 2, cy);
            ctx.closePath();
            ctx.stroke();

            const newSize = size * 0.5;
            drawTriangleTree(cx - size / 2, cy, newSize, depth + 1, maxDepth);
            drawTriangleTree(cx + size / 2, cy, newSize, depth + 1, maxDepth);
            drawTriangleTree(cx, cy - height, newSize, depth + 1, maxDepth);
        }

        function drawCircleMandala(cx, cy, radius, depth, maxDepth) {
            if (depth > maxDepth || radius < 2) return;

            const colors = getCurrentColors();
            const colorIndex = depth % colors.length;
            ctx.strokeStyle = colors[colorIndex];
            ctx.lineWidth = Math.max(0.5, (maxDepth - depth) * 0.5);

            const petals = 6 + depth * 2;
            for (let i = 0; i < petals; i++) {
                const angle = (Math.PI * 2 / petals) * i + depth * 0.2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);

                ctx.beginPath();
                ctx.arc(x, y, radius * 0.3, 0, Math.PI * 2);
                ctx.stroke();
            }

            ctx.beginPath();
            ctx.arc(cx, cy, radius * 0.5, 0, Math.PI * 2);
            ctx.stroke();

            const newRadius = radius * 0.6;
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI * 2 / 6) * i;
                const x = cx + radius * 0.7 * Math.cos(angle);
                const y = cy + radius * 0.7 * Math.sin(angle);
                drawCircleMandala(x, y, newRadius, depth + 1, maxDepth);
            }
        }

        function drawSquareSpiral(cx, cy, size, depth, maxDepth) {
            if (depth > maxDepth || size < 2) return;

            const colors = getCurrentColors();
            const colorIndex = depth % colors.length;
            ctx.strokeStyle = colors[colorIndex];
            ctx.lineWidth = Math.max(0.5, (maxDepth - depth) * 0.5);

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(depth * 0.15);

            ctx.beginPath();
            ctx.rect(-size / 2, -size / 2, size, size);
            ctx.stroke();

            ctx.restore();

            const newSize = size * 0.6;
            for (let i = 0; i < 4; i++) {
                const angle = (Math.PI / 2) * i + depth * 0.15;
                const x = cx + size * 0.5 * Math.cos(angle);
                const y = cy + size * 0.5 * Math.sin(angle);
                drawSquareSpiral(x, y, newSize, depth + 1, maxDepth);
            }
        }

        function generate() {
            resizeCanvas();
            clearCanvas();

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const size = Math.min(canvas.width, canvas.height) * 0.35;
            const maxDepth = 5;

            patterns[currentPattern].draw(cx, cy, size, 0, maxDepth);

            document.getElementById('patternName').textContent = patterns[currentPattern].name;
            document.getElementById('depthDisplay').textContent = maxDepth;
        }

        function generateNew() {
            progress = 0;
            generate();
        }

        function changePattern() {
            currentPattern = (currentPattern + 1) % patterns.length;
            generate();
        }

        function changeColors() {
            currentColorScheme = (currentColorScheme + 1) % colorSchemes.length;
            generate();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', () => {
            clearTimeout(animationId);
            animationId = setTimeout(generate, 100);
        });

        generate();
    </script>
</body>
</html>
