<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Rain - Matrix Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #0f0;
            font-size: 14px;
            text-shadow: 0 0 10px #0f0;
            pointer-events: none;
            z-index: 10;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .controls button {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #0f0;
            color: #0f0;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-shadow: 0 0 5px #0f0;
        }

        .controls button:hover {
            background: rgba(0, 255, 0, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #0f0;
            color: #0f0;
            padding: 10px 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            cursor: pointer;
            z-index: 10;
            text-shadow: 0 0 5px #0f0;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <div>Digital Rain v1.0</div>
        <div id="stats"></div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <div class="controls">
        <button onclick="changeSpeed(0.5)">Slower</button>
        <button onclick="changeSpeed(2)">Faster</button>
        <button onclick="toggleGlow()">Glow</button>
        <button onclick="resetRain()">Reset</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let columns;
        let drops = [];
        let speed = 1;
        let glowEnabled = true;

        // Matrix characters (Japanese katakana + numbers + symbols)
        const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%^&*()';

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;

            const fontSize = 16;
            columns = Math.floor(width / fontSize);

            // Initialize drops
            drops = [];
            for (let i = 0; i < columns; i++) {
                drops[i] = {
                    y: Math.random() * -100,
                    speed: Math.random() * 2 + 1,
                    length: Math.random() * 20 + 10
                };
            }

            ctx.font = fontSize + 'px monospace';
        }

        function draw() {
            // Semi-transparent black for trail effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            const fontSize = 16;

            for (let i = 0; i < columns; i++) {
                const drop = drops[i];

                // Draw characters in the column
                for (let j = 0; j < drop.length; j++) {
                    const y = (drop.y - j * fontSize) % height;
                    if (y < 0) continue;

                    // First character is brighter (white/green)
                    if (j === 0) {
                        ctx.fillStyle = '#fff';
                    } else if (j < 3) {
                        ctx.fillStyle = '#0f0';
                    } else {
                        // Fade out
                        const alpha = 1 - (j / drop.length);
                        ctx.fillStyle = `rgba(0, 255, 0, ${alpha})`;
                    }

                    if (glowEnabled && j < 5) {
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = '#0f0';
                    } else {
                        ctx.shadowBlur = 0;
                    }

                    const char = chars[Math.floor(Math.random() * chars.length)];
                    ctx.fillText(char, i * fontSize, y);
                }

                // Move drop
                drop.y += drop.speed * speed;

                // Reset if it goes off screen
                if (drop.y - drop.length * fontSize > height) {
                    drops[i] = {
                        y: Math.random() * -100,
                        speed: Math.random() * 2 + 1,
                        length: Math.random() * 20 + 10
                    };
                }
            }

            ctx.shadowBlur = 0;
            requestAnimationFrame(draw);
        }

        function changeSpeed(multiplier) {
            speed *= multiplier;
            // Clamp speed
            if (speed < 0.25) speed = 0.25;
            if (speed > 4) speed = 4;
            updateStats();
        }

        function toggleGlow() {
            glowEnabled = !glowEnabled;
            updateStats();
        }

        function resetRain() {
            for (let i = 0; i < columns; i++) {
                drops[i] = {
                    y: Math.random() * -100,
                    speed: Math.random() * 2 + 1,
                    length: Math.random() * 20 + 10
                };
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function updateStats() {
            const stats = document.getElementById('stats');
            stats.innerHTML = `Speed: ${speed.toFixed(2)}x | Glow: ${glowEnabled ? 'ON' : 'OFF'}`;
        }

        // Initialize
        window.addEventListener('resize', resize);
        resize();
        updateStats();
        draw();

        // Click/tap to add burst
        canvas.addEventListener('click', (e) => {
            const fontSize = 16;
            const clickColumn = Math.floor(e.clientX / fontSize);
            if (drops[clickColumn]) {
                drops[clickColumn].speed = 5;
            }
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const fontSize = 16;
            for (let touch of e.touches) {
                const clickColumn = Math.floor(touch.clientX / fontSize);
                if (drops[clickColumn]) {
                    drops[clickColumn].speed = 5;
                }
            }
        });
    </script>
</body>
</html>
