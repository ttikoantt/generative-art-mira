<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ripple Waves - Interactive Canvas Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            color: #fff;
            z-index: 10;
        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 3rem);
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 217, 255, 0.3);
        }

        .canvas-wrapper {
            position: relative;
            width: min(90vw, 800px);
            height: min(90vw, 600px);
            margin: 20px auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 217, 255, 0.2);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0d1b2a 100%);
            cursor: pointer;
        }

        .info {
            margin-top: 20px;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info p {
            font-size: clamp(0.8rem, 2vw, 1rem);
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            background: rgba(0, 217, 255, 0.2);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 10px;
            color: #00d9ff;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(0, 217, 255, 0.3);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 10px 15px;
                font-size: 0.8rem;
            }

            .canvas-wrapper {
                width: 95vw;
                height: 95vw;
                max-height: 60vh;
            }
        }

        .fullscreen-active .fullscreen-btn {
            display: none;
        }

        .fullscreen-active .canvas-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            max-width: none;
            max-height: none;
            margin: 0;
            border-radius: 0;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌊 Ripple Waves</h1>
        <div class="canvas-wrapper">
            <canvas id="canvas"></canvas>
        </div>
        <div class="info">
            <p>✨ Click or tap to create ripples<br>🎨 Watch waves interact and merge beautifully</p>
        </div>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let width, height;
        let ripples = [];
        let autoRippleTimer = 0;

        // Resize canvas
        function resize() {
            const wrapper = canvas.parentElement;
            width = wrapper.clientWidth;
            height = wrapper.clientHeight;
            canvas.width = width;
            canvas.height = height;
        }

        // Ripple class
        class Ripple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.max(width, height) * 0.4;
                this.speed = 2 + Math.random() * 2;
                this.alpha = 1;
                this.hue = Math.random() * 60 + 160; // Cyan to blue range
            }

            update() {
                this.radius += this.speed;
                this.alpha = 1 - (this.radius / this.maxRadius);
                return this.alpha > 0;
            }

            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 100%, 60%, ${this.alpha * 0.6})`;
                ctx.lineWidth = 3;
                ctx.stroke();

                // Inner glow
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, this.radius * 0.8,
                    this.x, this.y, this.radius
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 60%, 0)`);
                gradient.addColorStop(1, `hsla(${this.hue}, 100%, 60%, ${this.alpha * 0.3})`);

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        // Create ripple
        function createRipple(x, y) {
            ripples.push(new Ripple(x, y));

            // Limit ripples
            if (ripples.length > 20) {
                ripples.shift();
            }
        }

        // Auto create ripple
        function autoRipple() {
            autoRippleTimer++;
            if (autoRippleTimer > 120) { // Every ~2 seconds
                const x = Math.random() * width;
                const y = Math.random() * height;
                createRipple(x, y);
                autoRippleTimer = 0;
            }
        }

        // Animation loop
        function animate() {
            // Clear with fade effect
            ctx.fillStyle = 'rgba(26, 26, 46, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // Update and draw ripples
            ripples = ripples.filter(ripple => {
                ripple.update();
                ripple.draw(ctx);
                return ripple.alpha > 0;
            });

            // Auto ripple
            if (ripples.length < 3) {
                autoRipple();
            }

            requestAnimationFrame(animate);
        }

        // Event listeners
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            createRipple(x, y);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            createRipple(x, y);
        });

        // Fullscreen
        fullscreenBtn.addEventListener('click', () => {
            document.body.classList.toggle('fullscreen-active');
            if (document.body.classList.contains('fullscreen-active')) {
                if (canvas.requestFullscreen) {
                    canvas.requestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });

        // Exit fullscreen on ESC
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                document.body.classList.remove('fullscreen-active');
            }
        });

        // Initialize
        window.addEventListener('resize', resize);
        resize();

        // Create initial ripples
        createRipple(width / 2, height / 2);

        animate();
    </script>
</body>
</html>
