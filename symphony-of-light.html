<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Symphony of Light - 光のシンフォニー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            color: #fff;
            z-index: 100;
            max-width: 280px;
        }

        .controls h2 {
            margin-bottom: 15px;
            font-size: 18px;
            color: #fff;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #aaa;
        }

        .control-group input[type="range"] {
            width: 100%;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
            margin-bottom: 10px;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            border: 2px solid #fff;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 24px;
            z-index: 100;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 100;
        }

        @media (max-width: 768px) {
            .controls {
                display: none;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <h2>🎵 光のシンフォニー</h2>

        <div class="control-group">
            <label>パーティクル数: <span id="particleCountValue">100</span></label>
            <input type="range" id="particleCount" min="20" max="200" value="100">
        </div>

        <div class="control-group">
            <label>トレイル長: <span id="trailLengthValue">30</span></label>
            <input type="range" id="trailLength" min="5" max="100" value="30">
        </div>

        <div class="control-group">
            <label>色変化速度: <span id="colorSpeedValue">5</span></label>
            <input type="range" id="colorSpeed" min="1" max="20" value="5">
        </div>

        <div>
            <button class="btn" onclick="changeMode('wave')">🌊 波</button>
            <button class="btn" onclick="changeMode('spiral')">🌀 螺旋</button>
            <button class="btn" onclick="changeMode('chaos')">⚡ カオス</button>
        </div>

        <div style="margin-top: 15px;">
            <button class="btn" onclick="addParticles()">✨ 粒子追加</button>
            <button class="btn" onclick="clearParticles()">🗑️ クリア</button>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="info">
        クリック/タップで音符パーティクルを生成 ✨
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        let notes = [];
        let width, height;
        let mode = 'wave';
        let hue = 0;
        let frame = 0;

        // Settings
        let particleCount = 100;
        let trailLength = 30;
        let colorSpeed = 5;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        // Particle class
        class Particle {
            constructor(x, y, isNote = false) {
                this.x = x;
                this.y = y;
                this.originX = x;
                this.originY = y;
                this.size = isNote ? Math.random() * 8 + 4 : Math.random() * 4 + 2;
                this.hue = hue;
                this.trail = [];
                this.isNote = isNote;
                this.life = isNote ? 200 : 1000;
                this.maxLife = this.life;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 2 + 1;
                this.waveOffset = Math.random() * Math.PI * 2;
                this.spiralAngle = Math.random() * Math.PI * 2;
                this.spiralRadius = Math.random() * 100 + 50;
            }

            update() {
                // Trail
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > trailLength) {
                    this.trail.shift();
                }

                // Movement based on mode
                switch(mode) {
                    case 'wave':
                        this.waveMode();
                        break;
                    case 'spiral':
                        this.spiralMode();
                        break;
                    case 'chaos':
                        this.chaosMode();
                        break;
                }

                // Color shift
                this.hue += colorSpeed * 0.1;
                if (this.hue > 360) this.hue = 0;

                // Life decay for notes
                if (this.isNote) {
                    this.life--;
                }
            }

            waveMode() {
                this.angle += 0.02;
                this.y = this.originY + Math.sin(frame * 0.05 + this.waveOffset) * 50;
                this.x = this.originX + Math.cos(frame * 0.03 + this.waveOffset) * 30;
            }

            spiralMode() {
                this.spiralAngle += 0.03;
                this.x = this.originX + Math.cos(this.spiralAngle) * this.spiralRadius;
                this.y = this.originY + Math.sin(this.spiralAngle) * this.spiralRadius;
            }

            chaosMode() {
                this.angle += (Math.random() - 0.5) * 0.5;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                // Bounce off edges
                if (this.x < 0 || this.x > width) {
                    this.angle = Math.PI - this.angle;
                    this.x = Math.max(0, Math.min(width, this.x));
                }
                if (this.y < 0 || this.y > height) {
                    this.angle = -this.angle;
                    this.y = Math.max(0, Math.min(height, this.y));
                }
            }

            draw() {
                const alpha = this.isNote ? this.life / this.maxLife : 1;

                // Draw trail
                if (this.trail.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);

                    for (let i = 1; i < this.trail.length; i++) {
                        ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    }

                    ctx.lineTo(this.x, this.y);
                    ctx.strokeStyle = `hsla(${this.hue}, 100%, 60%, ${alpha * 0.3})`;
                    ctx.lineWidth = this.size * 0.5;
                    ctx.stroke();
                }

                // Draw particle
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 2
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 70%, ${alpha})`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 100%, 50%, ${alpha * 0.5})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 100%, 30%, 0)`);

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        // Initialize particles
        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                const x = Math.random() * width;
                const y = Math.random() * height;
                particles.push(new Particle(x, y));
            }
        }

        // Add particles
        function addParticles() {
            for (let i = 0; i < 20; i++) {
                const x = Math.random() * width;
                const y = Math.random() * height;
                particles.push(new Particle(x, y));
            }
        }

        // Clear particles
        function clearParticles() {
            particles = [];
            notes = [];
        }

        // Change mode
        function changeMode(newMode) {
            mode = newMode;
            particles.forEach(p => {
                p.originX = p.x;
                p.originY = p.y;
            });
        }

        // Add note particles on click
        canvas.addEventListener('click', (e) => {
            const count = Math.floor(Math.random() * 10) + 5;
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 / count) * i;
                const x = e.clientX + Math.cos(angle) * 30;
                const y = e.clientY + Math.sin(angle) * 30;
                notes.push(new Particle(x, y, true));
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const count = Math.floor(Math.random() * 10) + 5;
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 / count) * i;
                const x = touch.clientX + Math.cos(angle) * 30;
                const y = touch.clientY + Math.sin(angle) * 30;
                notes.push(new Particle(x, y, true));
            }
        });

        // Controls
        document.getElementById('particleCount').addEventListener('input', (e) => {
            particleCount = parseInt(e.target.value);
            document.getElementById('particleCountValue').textContent = particleCount;
        });

        document.getElementById('trailLength').addEventListener('input', (e) => {
            trailLength = parseInt(e.target.value);
            document.getElementById('trailLengthValue').textContent = trailLength;
        });

        document.getElementById('colorSpeed').addEventListener('input', (e) => {
            colorSpeed = parseInt(e.target.value);
            document.getElementById('colorSpeedValue').textContent = colorSpeed;
        });

        // Fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Animation loop
        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // Update and draw particles
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // Update and draw notes
            notes = notes.filter(n => n.life > 0);
            notes.forEach(n => {
                n.update();
                n.draw();
            });

            // Global hue shift
            hue += colorSpeed * 0.05;
            if (hue > 360) hue = 0;

            frame++;
            requestAnimationFrame(animate);
        }

        // Start
        initParticles();
        animate();
    </script>
</body>
</html>
