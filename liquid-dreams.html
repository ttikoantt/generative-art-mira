<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Dreams - 流体のような夢</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Helvetica', sans-serif;
        }
        canvas {
            display: block;
        }
        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 100;
            touch-action: manipulation;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        .title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 48px;
            font-weight: 300;
            letter-spacing: 20px;
            opacity: 0;
            animation: fadeInOut 3s ease-in-out;
            pointer-events: none;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
        }
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
        @media (max-width: 768px) {
            .title {
                font-size: 24px;
                letter-spacing: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="title">LIQUID DREAMS</div>
    <canvas id="canvas"></canvas>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let mouseX = 0;
        let mouseY = 0;
        let time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = Math.random() * 80 + 40;
                this.baseRadius = this.radius;
                this.hue = Math.random() * 60 + 180; // 青〜紫
                this.alpha = Math.random() * 0.3 + 0.1;
                this.phase = Math.random() * Math.PI * 2;
                this.frequency = Math.random() * 0.5 + 0.5;
            }

            update() {
                // 流体のような動き
                this.phase += 0.01 * this.frequency;

                // マウスの影響
                const dx = this.x - mouseX;
                const dy = this.y - mouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 300) {
                    const force = (300 - dist) / 300;
                    this.vx += dx * force * 0.001;
                    this.vy += dy * force * 0.001;
                    this.radius = this.baseRadius * (1 + force * 0.5);
                } else {
                    this.radius += (this.baseRadius - this.radius) * 0.05;
                }

                // 波のような動き
                this.x += this.vx + Math.sin(this.phase) * 0.3;
                this.y += this.vy + Math.cos(this.phase) * 0.3;

                // 減速
                this.vx *= 0.99;
                this.vy *= 0.99;

                // 色の変化
                this.hue += 0.1;
                if (this.hue > 280) this.hue = 180;

                // 境界チェック
                if (this.x < -100) this.x = width + 100;
                if (this.x > width + 100) this.x = -100;
                if (this.y < -100) this.y = height + 100;
                if (this.y > height + 100) this.y = -100;
            }

            draw() {
                // グラデーション
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 70%, 60%, ${this.alpha})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 70%, 60%, 0)`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            const particleCount = Math.min(50, Math.floor((width * height) / 20000));
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 150) {
                        const alpha = (150 - dist) / 150 * 0.1;
                        ctx.strokeStyle = `hsla(${(particles[i].hue + particles[j].hue) / 2}, 50%, 70%, ${alpha})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            time += 0.01;

            // 背景を少し残す
            ctx.fillStyle = 'rgba(0, 0, 10, 0.05)';
            ctx.fillRect(0, 0, width, height);

            drawConnections();

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        // マウスイベント
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        window.addEventListener('resize', () => {
            resize();
            init();
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('全画面エラー:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        resize();
        init();
        animate();
    </script>
</body>
</html>
