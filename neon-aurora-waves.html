<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Aurora Waves - オーロラの波</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            z-index: 10;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }
        
        .title {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 24px;
            font-weight: bold;
            z-index: 10;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="title">Neon Aurora Waves</div>
    <canvas id="canvas"></canvas>
    <div class="info">クリックで新しい波を生成</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let waves = [];
        let time = 0;
        let mouseX = 0, mouseY = 0;
        
        // Wave class
        class Wave {
            constructor(y, amplitude, frequency, phase, color, speed) {
                this.y = y;
                this.amplitude = amplitude;
                this.frequency = frequency;
                this.phase = phase;
                this.color = color;
                this.speed = speed;
            }
            
            draw(ctx, t) {
                ctx.beginPath();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 3;
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.color;
                
                for (let x = 0; x <= width; x += 2) {
                    const y = this.y + 
                        Math.sin(x * this.frequency + this.phase + t * this.speed) * this.amplitude +
                        Math.sin(x * this.frequency * 2 + this.phase * 1.5 + t * this.speed * 1.3) * this.amplitude * 0.3;
                    
                    if (x === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                
                ctx.stroke();
                
                // Add glow effect
                ctx.strokeStyle = this.color.replace('1)', '0.3)');
                ctx.lineWidth = 10;
                ctx.shadowBlur = 40;
                ctx.stroke();
            }
        }
        
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            createWaves();
        }
        
        function createWaves() {
            waves = [];
            const colors = [
                'rgba(0, 255, 255, 1)',      // Cyan
                'rgba(255, 0, 255, 1)',      // Magenta
                'rgba(255, 255, 0, 1)',      // Yellow
                'rgba(0, 255, 128, 1)',      // Spring Green
                'rgba(255, 128, 0, 1)',      // Orange
                'rgba(128, 0, 255, 1)',      // Purple
                'rgba(0, 128, 255, 1)',      // Sky Blue
            ];
            
            const numWaves = 7 + Math.floor(Math.random() * 5);
            
            for (let i = 0; i < numWaves; i++) {
                const y = (height / (numWaves + 1)) * (i + 1) + (Math.random() - 0.5) * 100;
                const amplitude = 30 + Math.random() * 70;
                const frequency = 0.002 + Math.random() * 0.008;
                const phase = Math.random() * Math.PI * 2;
                const color = colors[Math.floor(Math.random() * colors.length)];
                const speed = 0.5 + Math.random() * 1.5;
                
                waves.push(new Wave(y, amplitude, frequency, phase, color, speed));
            }
        }
        
        function animate() {
            // Semi-transparent black for trail effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            time += 0.02;
            
            // Draw all waves
            waves.forEach(wave => wave.draw(ctx, time));
            
            // Add particles
            if (Math.random() > 0.95) {
                createParticle();
            }
            
            updateParticles();
            
            requestAnimationFrame(animate);
        }
        
        let particles = [];
        
        function createParticle() {
            const x = Math.random() * width;
            const y = Math.random() * height;
            const colors = ['rgba(0, 255, 255, 1)', 'rgba(255, 0, 255, 1)', 'rgba(255, 255, 0, 1)'];
            particles.push({
                x, y,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2,
                life: 1,
                color: colors[Math.floor(Math.random() * colors.length)]
            });
        }
        
        function updateParticles() {
            particles = particles.filter(p => p.life > 0);
            
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.01;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = p.color.replace('1)', `${p.life})`);
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.fill();
            });
        }
        
        // Event listeners
        canvas.addEventListener('click', createWaves);
        
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            createWaves();
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        });
        
        // Initialize and start
        init();
        animate();
    </script>
</body>
</html>
