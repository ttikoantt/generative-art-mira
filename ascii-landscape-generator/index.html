<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII 風景ジェネレーター</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(to bottom, #0a0a1a, #1a1a3a);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #e0e0ff;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            background: linear-gradient(90deg, #00ffff, #ff00ff, #ffff00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            color: #888;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            border: 2px solid #00ffff;
            background: rgba(0, 255, 255, 0.1);
            color: #00ffff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .canvas-container {
            background: rgba(0, 0, 20, 0.8);
            border: 2px solid #333;
            border-radius: 12px;
            padding: 30px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .ascii-art {
            font-size: clamp(0.5rem, 1.5vw, 0.8rem);
            line-height: 1.2;
            white-space: pre;
            color: #00ff88;
            text-shadow: 0 0 5px rgba(0, 255, 136, 0.5);
            overflow-x: auto;
            padding: 10px;
        }

        .info {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #888;
            text-align: center;
        }

        .full-screen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #fff;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            z-index: 1000;
        }

        .full-screen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            .canvas-container {
                padding: 15px;
            }

            .controls {
                gap: 10px;
            }

            button {
                padding: 10px 18px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <button class="full-screen-btn" onclick="toggleFullScreen()">全画面</button>

    <div class="header">
        <h1>🌄 ASCII 風景ジェネレーター</h1>
        <p class="subtitle">美しい風景をASCIIアートで生成</p>
    </div>

    <div class="controls">
        <button onclick="generateLandscape()">🎨 新しい風景</button>
        <button onclick="changeTimeOfDay()">🌙 時間を変える</button>
    </div>

    <div class="canvas-container">
        <pre id="ascii-display" class="ascii-art"></pre>
    </div>

    <p class="info">🌱 ボタンを押して新しい風景を生成しよう</p>

    <script>
        let currentHour = 12;

        const times = [
            { name: '夜', sky: ['*', '.', ' '], mountain: '▲', ground: '_' },
            { name: '朝', sky: ['~', '.', ' '], mountain: '▲', ground: '_' },
            { name: '昼', sky: ['.', ' ', ' '], mountain: '▲', ground: '_' },
            { name: '夕', sky: ['~', '-', ' '], mountain: '▲', ground: '_' }
        ];

        function generateLandscape() {
            const time = times[Math.floor(Math.random() * times.length)];
            const width = 80;
            const height = 25;

            let art = '';

            // 空
            for (let y = 0; y < height * 0.6; y++) {
                for (let x = 0; x < width; x++) {
                    if (Math.random() < 0.05) {
                        art += time.sky[Math.floor(Math.random() * time.sky.length)];
                    } else {
                        art += ' ';
                    }
                }
                art += '\n';
            }

            // 太陽/月
            const sunX = Math.floor(Math.random() * (width - 10)) + 5;
            const sunY = Math.floor(height * 0.15);
            const sunChars = ['☀️', '🌙', '⭐', '🌟'];
            const sunChar = sunChars[Math.floor(Math.random() * sunChars.length)];

            // 山脈
            const mountainRows = Math.floor(height * 0.25);
            let mountainLine = '';
            for (let x = 0; x < width; x++) {
                const height1 = Math.floor(Math.random() * 5) + 2;
                const height2 = Math.floor(Math.random() * 5) + 2;
                const height3 = Math.floor(Math.random() * 5) + 2;

                if (Math.random() < 0.3) {
                    mountainLine += '/\\';
                } else if (Math.random() < 0.5) {
                    mountainLine += '/' + '^'.repeat(Math.floor(Math.random() * 3)) + '\\';
                } else {
                    mountainLine += '_' + time.ground;
                }
            }

            for (let i = 0; i < mountainRows; i++) {
                let line = '';
                for (let x = 0; x < width; x++) {
                    if (Math.random() < 0.4) {
                        line += ['▲', '△', '^', '/'][Math.floor(Math.random() * 4)];
                    } else {
                        line += ' ';
                    }
                }
                art += line + '\n';
            }

            // 地面
            for (let y = 0; y < height * 0.15; y++) {
                let line = '';
                for (let x = 0; x < width; x++) {
                    if (Math.random() < 0.1) {
                        line += ['🌲', '🌳', '🌿', '🌱'][Math.floor(Math.random() * 4)];
                    } else if (Math.random() < 0.3) {
                        line += ['_', '-', '~'][Math.floor(Math.random() * 3)];
                    } else {
                        line += ' ';
                    }
                }
                art += line + '\n';
            }

            // 星や空の装飾を追加
            const skyStars = Math.floor(Math.random() * 10) + 5;
            let modifiedArt = art.split('\n');
            for (let i = 0; i < skyStars && i < Math.floor(height * 0.4); i++) {
                const starRow = Math.floor(Math.random() * Math.floor(height * 0.4));
                const starCol = Math.floor(Math.random() * width);
                if (modifiedArt[starRow]) {
                    const row = modifiedArt[starRow].split('');
                    row[starCol] = ['✨', '⭐', '💫', '·'][Math.floor(Math.random() * 4)];
                    modifiedArt[starRow] = row.join('');
                }
            }

            document.getElementById('ascii-display').textContent = modifiedArt.join('\n');
        }

        function changeTimeOfDay() {
            generateLandscape();
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期生成
        generateLandscape();
    </script>
</body>
</html>
