<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Pulse - 星の脉動</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #0a0a20, #1a1a40);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
            cursor: pointer;
        }

        .info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="info">クリックで新しい星を追加</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let stars = [];
        let mouseX = 0;
        let mouseY = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Star {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.baseSize = Math.random() * 3 + 2;
                this.size = this.baseSize;
                this.pulseSpeed = Math.random() * 0.02 + 0.01;
                this.pulseOffset = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.01;
                this.rotation = 0;
                this.points = Math.floor(Math.random() * 3) + 4;
                this.innerRadius = this.baseSize * 0.4;
                this.hue = Math.random() * 60 + 200; // Blue to purple range
                this.glowIntensity = Math.random() * 0.5 + 0.5;
                this.floatSpeed = Math.random() * 0.5 + 0.2;
                this.floatOffset = Math.random() * Math.PI * 2;
            }

            update(time) {
                // Pulsing effect
                this.size = this.baseSize + Math.sin(time * this.pulseSpeed + this.pulseOffset) * 1.5;

                // Rotation
                this.rotation += this.rotationSpeed;

                // Floating movement
                const floatX = Math.sin(time * 0.001 * this.floatSpeed + this.floatOffset) * 20;
                const floatY = Math.cos(time * 0.001 * this.floatSpeed + this.floatOffset) * 20;

                // Mouse interaction
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const mouseEffect = Math.max(0, 1 - dist / 200);

                this.currentX = this.x + floatX + dx * mouseEffect * 0.1;
                this.currentY = this.y + floatY + dy * mouseEffect * 0.1;
            }

            draw() {
                ctx.save();
                ctx.translate(this.currentX, this.currentY);
                ctx.rotate(this.rotation);

                // Glow effect
                const glowSize = this.size * 3;
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, glowSize);
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 70%, ${0.6 * this.glowIntensity})`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 80%, 60%, ${0.2 * this.glowIntensity})`);
                gradient.addColorStop(1, 'transparent');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(0, 0, glowSize, 0, Math.PI * 2);
                ctx.fill();

                // Draw star shape
                ctx.beginPath();
                for (let i = 0; i < this.points * 2; i++) {
                    const angle = (i * Math.PI) / this.points;
                    const radius = i % 2 === 0 ? this.size : this.innerRadius;
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;

                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.closePath();

                ctx.fillStyle = `hsla(${this.hue}, 70%, 75%, 0.9)`;
                ctx.fill();

                ctx.strokeStyle = `hsla(${this.hue}, 80%, 85%, 0.8)`;
                ctx.lineWidth = 0.5;
                ctx.stroke();

                ctx.restore();
            }
        }

        function init() {
            resize();
            for (let i = 0; i < 15; i++) {
                stars.push(new Star());
            }
        }

        function animate(time) {
            // Clear with fade effect
            ctx.fillStyle = 'rgba(10, 10, 32, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // Update and draw stars
            stars.forEach(star => {
                star.update(time);
                star.draw();
            });

            // Draw connections between nearby stars
            ctx.strokeStyle = 'rgba(100, 150, 255, 0.1)';
            ctx.lineWidth = 1;

            for (let i = 0; i < stars.length; i++) {
                for (let j = i + 1; j < stars.length; j++) {
                    const dx = stars[i].currentX - stars[j].currentX;
                    const dy = stars[i].currentY - stars[j].currentY;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 150) {
                        const alpha = 1 - dist / 150;
                        ctx.strokeStyle = `rgba(150, 200, 255, ${alpha * 0.15})`;
                        ctx.beginPath();
                        ctx.moveTo(stars[i].currentX, stars[i].currentY);
                        ctx.lineTo(stars[j].currentX, stars[j].currentY);
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            stars.push(new Star(x, y));
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        window.addEventListener('resize', resize);

        init();
        animate(0);
    </script>
</body>
</html>
