<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>パーティクル・フロー・フィールド | Mira's Generative Art</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #0a0a14;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    canvas {
      display: block;
      touch-action: none;
    }

    #info {
      position: fixed;
      top: 20px;
      left: 20px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      pointer-events: none;
      z-index: 10;
    }

    #fullscreenBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
      z-index: 10;
    }

    #fullscreenBtn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: scale(1.05);
    }

    #fullscreenBtn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="info">
    <h2>パーティクル・フロー・フィールド</h2>
    <p>500個のパーティクルがノイズベースのフロー場に沿って動きます</p>
  </div>

  <button id="fullscreenBtn">🔲 全画面</button>

  <script src="particles-flow-field.js"></script>
</body>
</html>
