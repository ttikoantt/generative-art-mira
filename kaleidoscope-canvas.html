<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaleidoscope Canvas - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        #canvas {
            display: block;
            cursor: crosshair;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            z-index: 100;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        @media (max-width: 768px) {
            .controls {
                top: 10px;
                left: 10px;
                gap: 8px;
            }

            .control-btn {
                padding: 10px 16px;
                font-size: 12px;
            }

            .info {
                bottom: 10px;
                left: 10px;
                font-size: 12px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <button class="control-btn" id="clearBtn">クリア</button>
        <button class="control-btn" id="segmentsBtn">セグメント: 6</button>
        <button class="control-btn" id="colorBtn">色: レインボー</button>
        <button class="control-btn" id="saveBtn">保存</button>
    </div>

    <button class="control-btn fullscreen-btn" id="fullscreenBtn">全画面</button>

    <div class="info">
        画面をドラッグして描画 | ダブルタップでクリア
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        let isDrawing = false;
        let segments = 6;
        let hue = 0;
        let colorMode = 'rainbow';
        let lastX, lastY;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;

            // 黒い背景
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
        }

        function getSymmetryPoint(x, y, segmentIndex, totalSegments) {
            const dx = x - centerX;
            const dy = y - centerY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            let angle = Math.atan2(dy, dx);

            // 対称的な角度を計算
            const segmentAngle = (2 * Math.PI) / totalSegments;
            angle = angle + (segmentIndex * segmentAngle);

            return {
                x: centerX + Math.cos(angle) * distance,
                y: centerY + Math.sin(angle) * distance
            };
        }

        function drawLine(x1, y1, x2, y2, color) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
        }

        function drawKaleidoscope(x1, y1, x2, y2) {
            let color;

            if (colorMode === 'rainbow') {
                color = `hsl(${hue}, 100%, 60%)`;
                hue = (hue + 1) % 360;
            } else if (colorMode === 'blue') {
                color = `hsl(${200 + Math.random() * 60}, 100%, 60%)`;
            } else if (colorMode === 'pink') {
                color = `hsl(${320 + Math.random() * 40}, 100%, 60%)`;
            } else if (colorMode === 'gold') {
                color = `hsl(${40 + Math.random() * 20}, 100%, 60%)`;
            }

            for (let i = 0; i < segments; i++) {
                const p1 = getSymmetryPoint(x1, y1, i, segments);
                const p2 = getSymmetryPoint(x2, y2, i, segments);
                drawLine(p1.x, p1.y, p2.x, p2.y, color);

                // ミラー対称
                const p1m = getSymmetryPoint(x1, y1, i, segments);
                const p2m = getSymmetryPoint(x2, y2, i, segments);
                drawLine(p1m.x, p1m.y, p2m.x, p2m.y, color);
            }
        }

        // マウスイベント
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            lastX = e.clientX;
            lastY = e.clientY;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            drawKaleidoscope(lastX, lastY, e.clientX, e.clientY);
            lastX = e.clientX;
            lastY = e.clientY;
        });

        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mouseout', () => isDrawing = false);

        // タッチイベント
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            isDrawing = true;
            lastX = touch.clientX;
            lastY = touch.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isDrawing) return;
            const touch = e.touches[0];
            drawKaleidoscope(lastX, lastY, touch.clientX, touch.clientY);
            lastX = touch.clientX;
            lastY = touch.clientY;
        });

        canvas.addEventListener('touchend', () => isDrawing = false);

        // ダブルタップでクリア
        let lastTap = 0;
        canvas.addEventListener('touchend', (e) => {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 300 && tapLength > 0) {
                clearCanvas();
                e.preventDefault();
            }
            lastTap = currentTime;
        });

        // ダブルクリックでクリア
        canvas.addEventListener('dblclick', clearCanvas);

        function clearCanvas() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
        }

        // ボタンイベント
        document.getElementById('clearBtn').addEventListener('click', clearCanvas);

        document.getElementById('segmentsBtn').addEventListener('click', () => {
            segments = segments === 6 ? 8 : segments === 8 ? 12 : segments === 12 ? 4 : 6;
            document.getElementById('segmentsBtn').textContent = `セグメント: ${segments}`;
        });

        document.getElementById('colorBtn').addEventListener('click', () => {
            const modes = ['rainbow', 'blue', 'pink', 'gold'];
            const currentIndex = modes.indexOf(colorMode);
            colorMode = modes[(currentIndex + 1) % modes.length];
            const labels = {
                rainbow: 'レインボー',
                blue: 'ブルー',
                pink: 'ピンク',
                gold: 'ゴールド'
            };
            document.getElementById('colorBtn').textContent = `色: ${labels[colorMode]}`;
        });

        document.getElementById('saveBtn').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'kaleidoscope.png';
            link.href = canvas.toDataURL();
            link.click();
        });

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // 初期化
        resize();
        window.addEventListener('resize', resize);
    </script>
</body>
</html>
