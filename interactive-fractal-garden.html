<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Fractal Garden</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #canvas {
            display: block;
            cursor: pointer;
        }

        #info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            pointer-events: none;
        }

        #fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        #fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            #info {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="info">
        🌱 Click anywhere to plant a seed<br>
        🌿 Watch the fractal garden grow
    </div>
    <button id="fullscreen-btn">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let plants = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Plant {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.angle = -Math.PI / 2;
                this.depth = 0;
                this.maxDepth = 8 + Math.floor(Math.random() * 4);
                this.branches = [];
                this.color = this.randomColor();
                this.growthSpeed = 0.02 + Math.random() * 0.03;
                this.currentDepth = 0;
                this.alpha = 0;
            }

            randomColor() {
                const colors = [
                    { r: 255, g: 107, b: 107 },  // Coral
                    { r: 78, g: 205, b: 196 },   // Turquoise
                    { r: 255, g: 230, b: 109 },  // Yellow
                    { r: 26, g: 83, b: 92 },     // Dark teal
                    { r: 255, g: 159, b: 67 },   // Orange
                    { r: 196, g: 229, b: 100 },  // Light green
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            grow() {
                if (this.currentDepth < this.maxDepth) {
                    this.currentDepth += this.growthSpeed;
                }
                if (this.alpha < 1) {
                    this.alpha += 0.02;
                }
            }

            draw(ctx, x, y, angle, depth, length) {
                if (depth > this.currentDepth || length < 2) return;

                const endX = x + Math.cos(angle) * length;
                const endY = y + Math.sin(angle) * length;

                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha * (1 - depth / this.maxDepth)})`;
                ctx.lineWidth = Math.max(0.5, (this.maxDepth - depth) * 0.5);
                ctx.stroke();

                if (depth < Math.min(this.currentDepth, this.maxDepth)) {
                    const spread = 0.3 + Math.random() * 0.4;
                    const lengthFactor = 0.7 + Math.random() * 0.2;

                    // Left branch
                    this.draw(ctx, endX, endY, angle - spread, depth + 1, length * lengthFactor);
                    // Right branch
                    this.draw(ctx, endX, endY, angle + spread, depth + 1, length * lengthFactor);

                    // Occasionally add a middle branch
                    if (Math.random() > 0.7) {
                        this.draw(ctx, endX, endY, angle, depth + 1, length * lengthFactor * 0.8);
                    }
                }
            }

            update() {
                this.grow();
            }

            render() {
                const startLength = 60 + Math.random() * 40;
                this.draw(ctx, this.x, this.y, this.angle, 0, startLength);
            }
        }

        function addPlant(x, y) {
            plants.push(new Plant(x, y));
            // Limit to 10 plants
            if (plants.length > 10) {
                plants.shift();
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 26, 0.03)';
            ctx.fillRect(0, 0, width, height);

            plants.forEach(plant => {
                plant.update();
                plant.render();
            });

            requestAnimationFrame(animate);
        }

        canvas.addEventListener('click', (e) => {
            addPlant(e.clientX, e.clientY);
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            addPlant(touch.clientX, touch.clientY);
        });

        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        window.addEventListener('resize', resize);

        // Initialize
        resize();
        animate();

        // Add a few initial plants
        setTimeout(() => {
            addPlant(width * 0.3, height * 0.9);
            addPlant(width * 0.5, height * 0.95);
            addPlant(width * 0.7, height * 0.9);
        }, 500);
    </script>
</body>
</html>
