<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Spiral Art - 銀河螺旋アート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 10px;
                bottom: 10px;
                left: 10px;
            }
            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">Galaxy Spiral Art | クリックで新しい銀河を生成</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let particles = [];
        let time = 0;
        let centerX = width / 2;
        let centerY = height / 2;

        const colors = [
            '#FF6B9D', '#C44DFF', '#4D79FF', '#4DFFD4',
            '#FFD94D', '#FF4D6A', '#4DFFFF', '#FF4DFF'
        ];

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.angle = Math.random() * Math.PI * 2;
                this.radius = Math.random() * Math.min(width, height) * 0.4;
                this.size = Math.random() * 3 + 1;
                this.speed = Math.random() * 0.02 + 0.005;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.alpha = Math.random() * 0.8 + 0.2;
                this.spiralOffset = Math.random() * 2;
                this.decay = Math.random() * 0.001 + 0.0005;
            }

            update() {
                this.angle += this.speed;
                this.radius -= this.decay * 100;
                this.alpha -= this.decay;

                const spiralAngle = this.angle + this.spiralOffset * Math.sin(time * 0.001);
                const x = centerX + Math.cos(spiralAngle) * this.radius;
                const y = centerY + Math.sin(spiralAngle) * this.radius * 0.6;

                this.x = x;
                this.y = y;

                if (this.radius < 10 || this.alpha < 0) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();

                // Glow effect
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function init() {
            particles = [];
            const particleCount = Math.min(800, (width * height) / 1000);
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // Central glow
            const gradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, 100
            );
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
            gradient.addColorStop(0.5, 'rgba(100, 100, 255, 0.1)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            time++;
            requestAnimationFrame(animate);
        }

        function regenerate() {
            centerX = Math.random() * width * 0.8 + width * 0.1;
            centerY = Math.random() * height * 0.8 + height * 0.1;
            init();
        }

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
            init();
        });

        canvas.addEventListener('click', regenerate);

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        init();
        animate();
    </script>
</body>
</html>
