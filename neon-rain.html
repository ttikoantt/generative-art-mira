<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Rain - ネオンレイン</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #ffffff;
            font-size: 14px;
            opacity: 0.8;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="info">
        🌧️ Neon Rain
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let raindrops = [];
        let time = 0;

        // ネオン色のパレット
        const neonColors = [
            { r: 255, g: 0, b: 255 },     // マゼンタ
            { r: 0, g: 255, b: 255 },     // シアン
            { r: 255, g: 255, b: 0 },     // イエロー
            { r: 255, g: 0, b: 128 },     // ピンク
            { r: 0, g: 255, b: 128 },     // ライム
            { r: 128, g: 0, b: 255 },     // パープル
            { r: 255, g: 128, b: 0 },     // オレンジ
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Raindrop {
            constructor() {
                this.reset();
                this.y = Math.random() * height; // 初期位置はランダム
            }

            reset() {
                this.x = Math.random() * width;
                this.y = -10;
                this.speed = 2 + Math.random() * 3;
                this.length = 10 + Math.random() * 20;
                this.color = neonColors[Math.floor(Math.random() * neonColors.length)];
                this.width = 1 + Math.random() * 2;
                this.opacity = 0.5 + Math.random() * 0.5;
                this.phase = Math.random() * Math.PI * 2;
            }

            update() {
                this.y += this.speed;
                this.phase += 0.05;

                // 画面下に到達したらリセット
                if (this.y > height + this.length) {
                    this.reset();
                }
            }

            draw() {
                const gradient = ctx.createLinearGradient(
                    this.x, this.y,
                    this.x, this.y - this.length
                );

                // 明滅効果
                const flicker = Math.sin(this.phase) * 0.3 + 0.7;

                gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0)`);
                gradient.addColorStop(0.5, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.opacity * flicker * 0.5})`);
                gradient.addColorStop(1, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.opacity * flicker})`);

                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x, this.y - this.length);
                ctx.strokeStyle = gradient;
                ctx.lineWidth = this.width;
                ctx.lineCap = 'round';
                ctx.stroke();

                // 先端の光
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.width * 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.opacity * flicker * 0.5})`;
                ctx.fill();
            }
        }

        function init() {
            raindrops = [];
            const dropCount = Math.floor(width * height / 8000);
            
            for (let i = 0; i < dropCount; i++) {
                raindrops.push(new Raindrop());
            }
        }

        function drawBackground() {
            // グラデーション背景
            const gradient = ctx.createRadialGradient(
                width / 2, height / 2, 0,
                width / 2, height / 2, Math.max(width, height)
            );
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(0.5, '#16213e');
            gradient.addColorStop(1, '#0a0a0a');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // 光の跡効果
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, width, height);
        }

        function animate() {
            time += 0.01;

            drawBackground();

            raindrops.forEach(drop => {
                drop.update();
                drop.draw();
            });

            // グロー効果
            ctx.globalCompositeOperation = 'lighter';
            ctx.filter = 'blur(2px)';
            raindrops.forEach(drop => {
                if (Math.random() > 0.95) { // 一部の雨滴のみグロー
                    ctx.beginPath();
                    ctx.arc(drop.x, drop.y, drop.width * 5, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${drop.color.r}, ${drop.color.g}, ${drop.color.b}, 0.3)`;
                    ctx.fill();
                }
            });
            ctx.filter = 'none';
            ctx.globalCompositeOperation = 'source-over';

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', () => {
            resize();
            init();
        });

        resize();
        init();
        animate();
    </script>
</body>
</html>
