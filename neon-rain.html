<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Rain Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            pointer-events: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">Click or touch to create rain drops</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let drops = [];
        const neonColors = [
            '#ff006e', // Neon Pink
            '#00f5ff', // Neon Cyan
            '#ffea00', // Neon Yellow
            '#b967ff', // Neon Purple
            '#00ff88', // Neon Green
            '#ff6600', // Neon Orange
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class RainDrop {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || -50;
                this.speed = 2 + Math.random() * 4;
                this.length = 10 + Math.random() * 20;
                this.color = neonColors[Math.floor(Math.random() * neonColors.length)];
                this.opacity = 0.5 + Math.random() * 0.5;
                this.trail = [];
                this.maxTrail = 8;
            }

            update() {
                this.trail.unshift({ x: this.x, y: this.y });
                if (this.trail.length > this.maxTrail) {
                    this.trail.pop();
                }

                this.y += this.speed;

                if (this.y > height) {
                    this.y = -50;
                    this.x = Math.random() * width;
                    this.trail = [];
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;

                // Draw trail
                for (let i = 0; i < this.trail.length; i++) {
                    const point = this.trail[i];
                    const trailOpacity = (1 - i / this.trail.length) * 0.3;
                    ctx.globalAlpha = trailOpacity;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, 2, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Draw main drop with glow
                ctx.globalAlpha = this.opacity;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;

                // Draw drop
                const gradient = ctx.createLinearGradient(
                    this.x, this.y,
                    this.x, this.y + this.length
                );
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, 'transparent');

                ctx.fillStyle = gradient;
                ctx.fillRect(this.x - 1, this.y, 2, this.length);

                ctx.restore();
            }
        }

        function init() {
            drops = [];
            for (let i = 0; i < 100; i++) {
                drops.push(new RainDrop(
                    Math.random() * width,
                    Math.random() * height
                ));
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, width, height);

            drops.forEach(drop => {
                drop.update();
                drop.draw();
            });

            requestAnimationFrame(animate);
        }

        function createDrop(x, y) {
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    drops.push(new RainDrop(
                        x + (Math.random() - 0.5) * 50,
                        y + (Math.random() - 0.5) * 50
                    ));
                    if (drops.length > 200) {
                        drops.shift();
                    }
                }, i * 50);
            }
        }

        // Event listeners
        window.addEventListener('resize', () => {
            resize();
            init();
        });

        canvas.addEventListener('click', (e) => {
            createDrop(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createDrop(touch.clientX, touch.clientY);
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        resize();
        init();
        animate();
    </script>
</body>
</html>
