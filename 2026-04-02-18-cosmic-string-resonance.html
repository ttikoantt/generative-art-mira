<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic String Resonance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1000;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>
    <div class="info">Cosmic String Resonance - 宇宙の弦の共鳴</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let strings = [];
        let time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initStrings();
        }

        class CosmicString {
            constructor(x, baseY, length, segments, color, frequency, amplitude) {
                this.x = x;
                this.baseY = baseY;
                this.length = length;
                this.segments = segments;
                this.points = [];
                this.color = color;
                this.frequency = frequency;
                this.amplitude = amplitude;
                this.phase = Math.random() * Math.PI * 2;
                this.speed = 0.02 + Math.random() * 0.02;

                this.initPoints();
            }

            initPoints() {
                this.points = [];
                for (let i = 0; i <= this.segments; i++) {
                    const ratio = i / this.segments;
                    this.points.push({
                        ratio: ratio,
                        baseX: this.x + (Math.random() - 0.5) * 50,
                        baseY: this.baseY + ratio * this.length,
                        x: 0,
                        y: 0
                    });
                }
            }

            update(t) {
                const wave1 = Math.sin(t * this.frequency + this.phase);
                const wave2 = Math.cos(t * this.frequency * 0.7 + this.phase * 1.3);
                const wave3 = Math.sin(t * this.frequency * 1.5 + this.phase * 0.7);

                for (let i = 0; i < this.points.length; i++) {
                    const p = this.points[i];
                    const distanceFromCenter = Math.abs(p.ratio - 0.5);
                    const amplitudeMod = 1 - distanceFromCenter * 0.8;

                    p.x = p.baseX + Math.sin(t * this.frequency + p.ratio * Math.PI * 3 + this.phase) *
                          this.amplitude * amplitudeMod;
                    p.y = p.baseY + Math.cos(t * this.frequency * 0.8 + p.ratio * Math.PI * 2 + this.phase * 1.2) *
                          this.amplitude * amplitudeMod * 0.5;
                }
            }

            draw(ctx) {
                // メインの弦
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);

                for (let i = 1; i < this.points.length - 1; i++) {
                    const p0 = this.points[i - 1];
                    const p1 = this.points[i];
                    const p2 = this.points[i + 1];

                    const cp1x = (p0.x + p1.x) / 2;
                    const cp1y = (p0.y + p1.y) / 2;
                    const cp2x = (p1.x + p2.x) / 2;
                    const cp2y = (p1.y + p2.y) / 2;

                    ctx.quadraticCurveTo(p1.x, p1.y, cp2x, cp2y);
                }

                const last = this.points[this.points.length - 1];
                ctx.lineTo(last.x, last.y);

                const gradient = ctx.createLinearGradient(
                    this.points[0].x, this.points[0].y,
                    last.x, last.y
                );
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(0.5, this.color);
                gradient.addColorStop(1, this.color);

                ctx.strokeStyle = gradient;
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();

                // グロー効果
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);

                for (let i = 1; i < this.points.length - 1; i++) {
                    const p0 = this.points[i - 1];
                    const p1 = this.points[i];
                    const p2 = this.points[i + 1];

                    const cp2x = (p1.x + p2.x) / 2;
                    const cp2y = (p1.y + p2.y) / 2;

                    ctx.quadraticCurveTo(p1.x, p1.y, cp2x, cp2y);
                }

                ctx.lineTo(last.x, last.y);

                const glowGradient = ctx.createLinearGradient(
                    this.points[0].x, this.points[0].y,
                    last.x, last.y
                );
                glowGradient.addColorStop(0, this.color.replace('1)', '0.3)'));
                glowGradient.addColorStop(0.5, this.color.replace('1)', '0.5)'));
                glowGradient.addColorStop(1, this.color.replace('1)', '0.3)'));

                ctx.strokeStyle = glowGradient;
                ctx.lineWidth = 8;
                ctx.stroke();

                // パーティクルエフェクト（弦の端から）
                this.drawParticles(ctx);
            }

            drawParticles(ctx) {
                const numParticles = 3;
                for (let i = 0; i < numParticles; i++) {
                    const p = this.points[Math.floor(this.points.length * (i + 1) / (numParticles + 1))];
                    const particlePhase = time * 2 + this.phase + i * 0.5;
                    const radius = 2 + Math.sin(particlePhase * 2) * 1;

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.color.replace('1)', '0.8)');
                    ctx.fill();

                    // グロー
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, radius * 3, 0, Math.PI * 2);
                    ctx.fillStyle = this.color.replace('1)', '0.2)');
                    ctx.fill();
                }
            }
        }

        function initStrings() {
            strings = [];

            // 複数の弦を配置
            const stringConfigs = [
                { x: width * 0.2, y: height * 0.1, length: height * 0.8, color: 'rgba(255, 100, 150, 1)', frequency: 0.8, amplitude: 40 },
                { x: width * 0.4, y: height * 0.1, length: height * 0.8, color: 'rgba(100, 200, 255, 1)', frequency: 0.6, amplitude: 50 },
                { x: width * 0.6, y: height * 0.1, length: height * 0.8, color: 'rgba(150, 255, 200, 1)', frequency: 0.7, amplitude: 45 },
                { x: width * 0.8, y: height * 0.1, length: height * 0.8, color: 'rgba(255, 200, 100, 1)', frequency: 0.9, amplitude: 35 }
            ];

            stringConfigs.forEach(config => {
                const string = new CosmicString(
                    config.x,
                    config.y,
                    config.length,
                    30,
                    config.color,
                    config.frequency,
                    config.amplitude
                );
                strings.push(string);
            });
        }

        function animate() {
            // フェードアウト効果
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            time += 0.05;

            // 弦を更新と描画
            strings.forEach(string => {
                string.update(time);
                string.draw(ctx);
            });

            // 背景の星
            drawStars();

            requestAnimationFrame(animate);
        }

        function drawStars() {
            for (let i = 0; i < 50; i++) {
                const x = (Math.sin(i * 123.456 + time * 0.1) * 0.5 + 0.5) * width;
                const y = (Math.cos(i * 789.012 + time * 0.05) * 0.5 + 0.5) * height;
                const size = Math.random() * 1.5;
                const alpha = 0.3 + Math.sin(time + i) * 0.2;

                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fill();
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // タッチサポート
        let touchStartX = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const deltaX = e.touches[0].clientX - touchStartX;
            strings.forEach(string => {
                string.x += deltaX * 0.01;
            });
            touchStartX = e.touches[0].clientX;
        });

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
