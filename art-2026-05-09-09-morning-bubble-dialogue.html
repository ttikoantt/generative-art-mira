<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Morning Bubble Dialogue - 朝の泡の対話</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #e0f7ff 0%, #b3e5fc 50%, #81d4fa 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: -apple-system, sans-serif;
        }
        canvas {
            display: block;
        }
        .info {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0, 50, 80, 0.5);
            text-align: center;
            pointer-events: none;
            z-index: 10;
            font-size: clamp(0.9rem, 3vw, 1.2rem);
        }
        .hope-counter {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0, 50, 80, 0.6);
            font-size: clamp(1rem, 3vw, 1.4rem);
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="info">Morning Bubble Dialogue - 泡をクリックして刺激</div>
    <canvas id="canvas"></canvas>
    <div class="hope-counter">希望: <span id="hope">0</span></div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const hopeEl = document.getElementById('hope');
        let width, height;
        let mouseX = 0, mouseY = 0;
        let isMouseDown = false;
        let hopeCount = 0;

        // 朝の爽やかなカラーパレット
        const morningColors = [
            { h: 195, s: 85, l: 75 }, // 水色
            { h: 180, s: 75, l: 70 }, // シアン
            { h: 350, s: 70, l: 80 }, // 薄いピンク
            { h: 45, s: 90, l: 65 },  // ゴールド
            { h: 160, s: 60, l: 75 }, // 薄いミント
            { h: 220, s: 65, l: 80 }  // 薄い紫
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Perlin Noise の簡易実装（水の揺らめき用）
        class SimpleNoise {
            constructor() {
                this.perm = [];
                for (let i = 0; i < 512; i++) {
                    this.perm[i] = Math.floor(Math.random() * 256);
                }
            }

            noise(x, y) {
                const X = Math.floor(x) & 255;
                const Y = Math.floor(y) & 255;
                const tx = x - Math.floor(x);
                const ty = y - Math.floor(y);

                const fade = t => t * t * t * (t * (t * 6 - 15) + 10);
                const lerp = (a, b, t) => a + t * (b - a);

                const p = this.perm;
                const n00 = Math.sin(p[X + p[Y]] * 12.9898 + 78.233) * 43758.5453 % 1;
                const n01 = Math.sin(p[X + p[Y + 1]] * 12.9898 + 78.233) * 43758.5453 % 1;
                const n10 = Math.sin(p[X + 1 + p[Y]] * 12.9898 + 78.233) * 43758.5453 % 1;
                const n11 = Math.sin(p[X + 1 + p[Y + 1]] * 12.9898 + 78.233) * 43758.5453 % 1;

                const u = fade(tx);
                const v = fade(ty);

                return lerp(lerp(n00, n10, u), lerp(n01, n11, u), v);
            }
        }

        const noise = new SimpleNoise();

        class Bubble {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = height + 50;
                this.radius = Math.random() * 30 + 15;
                this.baseRadius = this.radius;
                this.speed = Math.random() * 1.5 + 0.5;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = Math.random() * 0.02 + 0.01;
                this.color = morningColors[Math.floor(Math.random() * morningColors.length)];
                this.alpha = 0.3 + Math.random() * 0.3;
                this.dialogueRadius = this.radius * 4;
                this.excitement = 0;
                this.noiseOffset = Math.random() * 1000;
                this.age = 0;
                this.lifespan = 300 + Math.random() * 200; // 5-8秒で上へ
            }

            update(time) {
                this.age++;
                this.wobble += this.wobbleSpeed;

                // 水の揺らめき（Perlin Noise）
                const noiseVal = noise.noise(
                    this.x * 0.005 + this.noiseOffset,
                    this.age * 0.01
                ) * 20;

                // 自然な浮上運動
                this.y -= this.speed;
                this.x += Math.sin(this.wobble) * 0.8 + noiseVal * 0.05;

                // 興奮度が高い時は、半径が脈動
                if (this.excitement > 0) {
                    this.radius = this.baseRadius * (1 + this.excitement * 0.3);
                    this.excitement *= 0.98;
                } else {
                    this.radius = this.baseRadius;
                }

                // 画面上部に達したら「希望」として消える
                if (this.y < -this.radius * 2) {
                    this.hope();
                    this.reset();
                }
            }

            hope() {
                hopeCount++;
                hopeEl.textContent = hopeCount;
            }

            stimulate() {
                this.excitement = Math.min(this.excitement + 0.3, 1);
            }

            draw() {
                // 泡の本体
                const gradient = ctx.createRadialGradient(
                    this.x - this.radius * 0.3,
                    this.y - this.radius * 0.3,
                    0,
                    this.x,
                    this.y,
                    this.radius
                );

                const h = this.color.h;
                const s = this.color.s;
                const l = this.color.l + this.excitement * 20;

                gradient.addColorStop(0, `hsla(${h}, ${s}%, ${Math.min(l + 30, 95)}%, ${this.alpha})`);
                gradient.addColorStop(0.5, `hsla(${h}, ${s}%, ${l}%, ${this.alpha * 0.8})`);
                gradient.addColorStop(0.85, `hsla(${h}, ${s}%, ${l - 10}%, ${this.alpha * 0.5})`);
                gradient.addColorStop(1, `hsla(${h}, ${s}%, ${l - 20}%, 0)`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // 泡のハイライト（光の反射）
                const highlightGradient = ctx.createRadialGradient(
                    this.x - this.radius * 0.4,
                    this.y - this.radius * 0.4,
                    0,
                    this.x - this.radius * 0.4,
                    this.y - this.radius * 0.4,
                    this.radius * 0.4
                );
                highlightGradient.addColorStop(0, `rgba(255, 255, 255, ${0.6 + this.excitement * 0.3})`);
                highlightGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

                ctx.fillStyle = highlightGradient;
                ctx.beginPath();
                ctx.arc(this.x - this.radius * 0.3, this.y - this.radius * 0.3, this.radius * 0.3, 0, Math.PI * 2);
                ctx.fill();

                // 興奮している時のグロー
                if (this.excitement > 0.1) {
                    ctx.save();
                    ctx.globalCompositeOperation = 'lighter';
                    const glowGradient = ctx.createRadialGradient(
                        this.x, this.y, 0,
                        this.x, this.y, this.radius * 1.5
                    );
                    glowGradient.addColorStop(0, `hsla(${h}, ${s}%, ${l + 20}%, ${this.excitement * 0.3})`);
                    glowGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

                    ctx.fillStyle = glowGradient;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius * 1.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }
        }

        // 泡の配列
        const bubbles = [];
        const maxBubbles = 35;

        // 初期泡を生成
        for (let i = 0; i < maxBubbles; i++) {
            const bubble = new Bubble();
            bubble.y = Math.random() * height + height * 0.3;
            bubbles.push(bubble);
        }

        // 新しい泡を継続的に生成
        setInterval(() => {
            if (bubbles.length < maxBubbles && Math.random() < 0.4) {
                const bubble = new Bubble();
                bubbles.push(bubble);
            }
        }, 500);

        // アニメーションループ
        let time = 0;
        function animate() {
            time++;

            // 背景グラデーション（朝の光）
            const bgGradient = ctx.createLinearGradient(0, 0, 0, height);
            bgGradient.addColorStop(0, '#e0f7ff');
            bgGradient.addColorStop(0.5, '#b3e5fc');
            bgGradient.addColorStop(1, '#81d4fa');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, width, height);

            // 泡を更新して描画
            bubbles.forEach(bubble => {
                bubble.update(time);
                bubble.draw();
            });

            // 泡同士の対話線を描画
            ctx.save();
            ctx.globalCompositeOperation = 'multiply';
            for (let i = 0; i < bubbles.length; i++) {
                for (let j = i + 1; j < bubbles.length; j++) {
                    const dx = bubbles[i].x - bubbles[j].x;
                    const dy = bubbles[i].y - bubbles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const maxDist = bubbles[i].dialogueRadius + bubbles[j].dialogueRadius;

                    if (dist < maxDist) {
                        const alpha = (1 - dist / maxDist) * 0.15;
                        const avgExcitement = (bubbles[i].excitement + bubbles[j].excitement) / 2;

                        ctx.strokeStyle = `rgba(0, 80, 120, ${alpha + avgExcitement * 0.2})`;
                        ctx.lineWidth = 1.5 + avgExcitement;
                        ctx.beginPath();
                        ctx.moveTo(bubbles[i].x, bubbles[i].y);
                        ctx.lineTo(bubbles[j].x, bubbles[j].y);
                        ctx.stroke();
                    }
                }
            }
            ctx.restore();

            // 画面上部の「希望」の光
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            const hopeGradient = ctx.createLinearGradient(0, 0, 0, 100);
            hopeGradient.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
            hopeGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = hopeGradient;
            ctx.fillRect(0, 0, width, 100);
            ctx.restore();

            requestAnimationFrame(animate);
        }

        // マウス・タッチイベント
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            bubbles.forEach(bubble => {
                const dx = x - bubble.x;
                const dy = y - bubble.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < bubble.radius * 2) {
                    bubble.stimulate();
                }
            });
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;

            bubbles.forEach(bubble => {
                const dx = x - bubble.x;
                const dy = y - bubble.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < bubble.radius * 2) {
                    bubble.stimulate();
                }
            });
        }, { passive: false });

        animate();
    </script>
</body>
</html>
