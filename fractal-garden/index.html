<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fractal Garden - Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(to bottom, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        canvas {
            display: block;
            touch-action: none;
        }
        .controls {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
        }
        .controls h1 {
            color: #e94560;
            font-size: 24px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }
        .controls p {
            color: #a0a0a0;
            font-size: 14px;
        }
        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(233, 69, 96, 0.8);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
        }
        .fullscreen-btn:hover {
            background: rgba(233, 69, 96, 1);
            transform: scale(1.05);
        }
        .clear-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(15, 52, 96, 0.8);
            color: white;
            border: 1px solid rgba(233, 69, 96, 0.5);
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
        }
        .clear-btn:hover {
            background: rgba(15, 52, 96, 1);
        }
    </style>
</head>
<body>
    <div class="controls">
        <h1>🌸 Fractal Garden</h1>
        <p>クリックで植物を植えよう</p>
    </div>
    <canvas id="canvas"></canvas>
    <button class="clear-btn" onclick="clearGarden()">クリア</button>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let plants = [];
        let mouseX = 0, mouseY = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // 植物クラス
        class Plant {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.branches = [];
                this.baseHue = Math.random() * 360;
                this.growth = 0;
                this.targetGrowth = 1;
                this.generate();
            }

            generate() {
                // 再帰的に枝を生成
                this.createBranch(0, 0, 0, 90, 60, 0);
            }

            createBranch(level, x, y, angle, length, depth) {
                if (depth > 8) return;

                const rad = (angle * Math.PI) / 180;
                const endX = x + Math.cos(rad) * length;
                const endY = y - Math.sin(rad) * length;

                const hue = (this.baseHue + depth * 30) % 360;
                const saturation = 70 + depth * 3;
                const lightness = 50 + depth * 2;

                this.branches.push({
                    x: this.x + x,
                    y: this.y + y,
                    endX: this.x + endX,
                    endY: this.y + endY,
                    level: level,
                    depth: depth,
                    hue: hue,
                    saturation: saturation,
                    lightness: lightness,
                    thickness: Math.max(0.5, (9 - depth) * 0.8),
                    swayOffset: Math.random() * Math.PI * 2,
                    swaySpeed: 0.5 + Math.random() * 0.5
                });

                // 子枝を生成
                const branchCount = Math.floor(Math.random() * 2) + 2;
                for (let i = 0; i < branchCount; i++) {
                    const angleOffset = (Math.random() - 0.5) * 60;
                    const lengthFactor = 0.6 + Math.random() * 0.2;
                    this.createBranch(
                        level + 1,
                        endX,
                        endY,
                        angle + angleOffset,
                        length * lengthFactor,
                        depth + 1
                    );
                }
            }

            draw(time) {
                // 成長アニメーション
                if (this.growth < this.targetGrowth) {
                    this.growth += 0.02;
                    if (this.growth > this.targetGrowth) this.growth = this.targetGrowth;
                }

                const growth = this.easeOutCubic(this.growth);

                this.branches.forEach(branch => {
                    // 揺れアニメーション
                    const sway = Math.sin(time * 0.001 * branch.swaySpeed + branch.swayOffset) * 2;

                    ctx.beginPath();
                    ctx.strokeStyle = `hsl(${branch.hue}, ${branch.saturation}%, ${branch.lightness}%)`;
                    ctx.lineWidth = branch.thickness;
                    ctx.lineCap = 'round';

                    const progress = Math.min(1, (growth * 10 - branch.depth));
                    if (progress > 0) {
                        const currentEndX = branch.x + (branch.endX - branch.x) * progress + sway;
                        const currentEndY = branch.y + (branch.endY - branch.y) * progress;

                        ctx.moveTo(branch.x, branch.y);
                        ctx.lineTo(currentEndX, currentEndY);
                        ctx.stroke();

                        // 葉っぱを描く（末端のみ）
                        if (branch.depth >= 6 && progress >= 1) {
                            this.drawLeaf(currentEndX, currentEndY, branch.hue, sway);
                        }
                    }
                });
            }

            drawLeaf(x, y, hue, sway) {
                ctx.beginPath();
                ctx.fillStyle = `hsla(${(hue + 60) % 360}, 80%, 60%, 0.6)`;
                ctx.ellipse(x + sway * 0.5, y, 5, 3, sway * 0.1, 0, Math.PI * 2);
                ctx.fill();
            }

            easeOutCubic(t) {
                return 1 - Math.pow(1 - t, 3);
            }
        }

        // クリックで植物を植える
        function plant(x, y) {
            plants.push(new Plant(x, y));
            // 最大20植物
            if (plants.length > 20) {
                plants.shift();
            }
        }

        function clearGarden() {
            plants = [];
        }

        // マウス/タッチイベント
        canvas.addEventListener('click', (e) => {
            plant(e.clientX, e.clientY);
        });

        // アニメーションループ
        let lastTime = 0;
        function animate(time) {
            const deltaTime = time - lastTime;
            lastTime = time;

            // 背景を少し残す（トレイル効果）
            ctx.fillStyle = 'rgba(26, 10, 46, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 地面を描く
            ctx.fillStyle = '#1a0a2e';
            ctx.fillRect(0, height - 50, width, 50);

            // 草
            ctx.fillStyle = '#0f3460';
            for (let i = 0; i < width; i += 20) {
                const height = 10 + Math.sin(time * 0.002 + i * 0.1) * 5;
                ctx.fillRect(i, height - 50 - height, 3, height);
            }

            // 植物を描く
            plants.forEach(plant => plant.draw(time));

            requestAnimationFrame(animate);
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期植物
        setTimeout(() => {
            plant(width / 2, height - 50);
        }, 500);

        animate(0);
    </script>
</body>
</html>
