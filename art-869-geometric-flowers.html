<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Flowers - Art 869</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        
        canvas {
            display: block;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            text-align: center;
            pointer-events: none;
        }
        
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">Art 869: Geometric Flowers | タップで新しい花を生成</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let flowers = [];
        let time = 0;
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        class GeometricFlower {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.petals = Math.floor(Math.random() * 6) + 5; // 5-10 petals
                this.radius = Math.random() * 50 + 30;
                this.hue = Math.random() * 360;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                this.rotation = Math.random() * Math.PI * 2;
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.pulseSpeed = Math.random() * 0.03 + 0.01;
                this.alpha = 0;
                this.fadeIn = true;
                this.maxAlpha = Math.random() * 0.5 + 0.5;
                this.life = 0;
                this.maxLife = Math.random() * 500 + 500;
                this.layers = Math.floor(Math.random() * 3) + 2; // 2-4 layers
            }
            
            draw() {
                this.life++;
                this.rotation += this.rotationSpeed;
                this.pulsePhase += this.pulseSpeed;
                
                const pulse = Math.sin(this.pulsePhase) * 0.1 + 1;
                
                if (this.fadeIn) {
                    this.alpha += 0.02;
                    if (this.alpha >= this.maxAlpha) {
                        this.alpha = this.maxAlpha;
                        this.fadeIn = false;
                    }
                } else if (this.life > this.maxLife - 100) {
                    this.alpha -= 0.01;
                }
                
                for (let layer = 0; layer < this.layers; layer++) {
                    const layerRadius = this.radius * (1 - layer * 0.2);
                    const layerAlpha = this.alpha * (1 - layer * 0.2);
                    const layerHue = (this.hue + layer * 30) % 360;
                    const layerRotation = this.rotation * (layer % 2 === 0 ? 1 : -1);
                    
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(layerRotation);
                    ctx.globalAlpha = layerAlpha;
                    
                    for (let i = 0; i < this.petals; i++) {
                        const angle = (i / this.petals) * Math.PI * 2;
                        ctx.save();
                        ctx.rotate(angle);
                        
                        // Draw petal
                        ctx.beginPath();
                        ctx.fillStyle = `hsla(${layerHue}, 70%, 60%, ${layerAlpha})`;
                        ctx.strokeStyle = `hsla(${layerHue}, 80%, 70%, ${layerAlpha})`;
                        ctx.lineWidth = 1;
                        
                        // Draw geometric petal shape
                        const petalLength = layerRadius * pulse;
                        const petalWidth = petalLength * 0.4;
                        
                        ctx.moveTo(0, 0);
                        ctx.quadraticCurveTo(petalWidth * 0.5, petalLength * 0.5, 0, petalLength);
                        ctx.quadraticCurveTo(-petalWidth * 0.5, petalLength * 0.5, 0, 0);
                        
                        ctx.fill();
                        ctx.stroke();
                        
                        // Add inner detail
                        ctx.beginPath();
                        ctx.strokeStyle = `hsla(${layerHue + 180}, 50%, 80%, ${layerAlpha * 0.5})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(petalWidth * 0.1, petalLength * 0.2);
                        ctx.lineTo(0, petalLength * 0.8);
                        ctx.lineTo(-petalWidth * 0.1, petalLength * 0.2);
                        ctx.stroke();
                        
                        ctx.restore();
                    }
                    
                    // Center
                    ctx.beginPath();
                    ctx.fillStyle = `hsla(${layerHue + 60}, 80%, 70%, ${layerAlpha})`;
                    ctx.arc(0, 0, layerRadius * 0.15, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.restore();
                }
                
                return this.alpha > 0;
            }
        }
        
        function createFlower(x, y) {
            flowers.push(new GeometricFlower(x, y));
            
            // Limit number of flowers
            if (flowers.length > 20) {
                flowers.shift();
            }
        }
        
        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(10, 10, 15, 0.05)';
            ctx.fillRect(0, 0, width, height);
            
            // Update and draw flowers
            flowers = flowers.filter(flower => flower.draw());
            
            // Add ambient floating particles
            for (let i = 0; i < 3; i++) {
                const px = Math.random() * width;
                const py = Math.random() * height;
                const size = Math.random() * 2 + 1;
                const hue = (time * 10 + i * 30) % 360;
                
                ctx.beginPath();
                ctx.fillStyle = `hsla(${hue}, 70%, 60%, 0.3)`;
                ctx.arc(px, py, size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            time += 0.01;
            requestAnimationFrame(animate);
        }
        
        // Event listeners
        canvas.addEventListener('click', (e) => {
            createFlower(e.clientX, e.clientY);
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createFlower(touch.clientX, touch.clientY);
        });
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        // Initialize
        resize();
        window.addEventListener('resize', resize);
        
        // Create initial flowers
        for (let i = 0; i < 5; i++) {
            setTimeout(() => {
                createFlower(
                    Math.random() * width,
                    Math.random() * height
                );
            }, i * 300);
        }
        
        animate();
    </script>
</body>
</html>
