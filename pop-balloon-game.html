<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pop The Balloon - 風船割りゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        #gameCanvas {
            display: block;
            cursor: pointer;
            touch-action: none;
        }

        .ui-overlay {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }

        .score-panel, .lives-panel, .level-panel {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            pointer-events: auto;
        }

        .score-panel h2, .lives-panel h2, .level-panel h2 {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .score-panel .value, .lives-panel .value, .level-panel .value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #764ba2;
        }

        .lives-panel .value {
            color: #e74c3c;
        }

        .level-panel .value {
            color: #3498db;
        }

        .game-over-screen, .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .game-over-screen.hidden, .start-screen.hidden {
            display: none;
        }

        .game-over-screen h1, .start-screen h1 {
            color: #fff;
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .game-over-screen .final-score, .start-screen .instructions {
            color: #fff;
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        .start-screen .instructions {
            text-align: center;
            line-height: 1.8;
            max-width: 400px;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 1.3rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            pointer-events: auto;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .ui-overlay {
                flex-wrap: wrap;
                gap: 10px;
            }

            .score-panel, .lives-panel, .level-panel {
                padding: 10px 15px;
            }

            .score-panel h2, .lives-panel h2, .level-panel h2 {
                font-size: 0.7rem;
            }

            .score-panel .value, .lives-panel .value, .level-panel .value {
                font-size: 1.3rem;
            }

            .game-over-screen h1, .start-screen h1 {
                font-size: 2rem;
            }

            .game-over-screen .final-score, .start-screen .instructions {
                font-size: 1.2rem;
                padding: 0 20px;
            }

            .start-btn {
                padding: 12px 30px;
                font-size: 1.1rem;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="ui-overlay">
        <div class="score-panel">
            <h2>Score</h2>
            <div class="value" id="score">0</div>
        </div>
        <div class="level-panel">
            <h2>Level</h2>
            <div class="value" id="level">1</div>
        </div>
        <div class="lives-panel">
            <h2>Lives</h2>
            <div class="value" id="lives">❤️❤️❤️</div>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="start-screen" id="startScreen">
        <h1>🎈 Pop The Balloon</h1>
        <div class="instructions">
            風船をタップして割ろう！<br>
            • 赤い風船: +10点<br>
            • 金色の風船: +50点<br>
            • 黒い風船: ライフ-1<br>
            • 風船が逃げたらライフ-1<br>
            • レベルが上がると難しくなる
        </div>
        <button class="start-btn" onclick="startGame()">スタート</button>
    </div>

    <div class="game-over-screen hidden" id="gameOverScreen">
        <h1>Game Over</h1>
        <div class="final-score">スコア: <span id="finalScore">0</span></div>
        <button class="start-btn" onclick="restartGame()">もう一度</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let balloons = [];
        let particles = [];
        let score = 0;
        let lives = 3;
        let level = 1;
        let gameRunning = false;
        let spawnTimer = 0;
        let spawnInterval = 120;

        const balloonColors = [
            { main: '#e74c3c', light: '#ff6b6b', dark: '#c0392b' },  // 赤
            { main: '#3498db', light: '#5dade2', dark: '#2980b9' },  // 青
            { main: '#2ecc71', light: '#58d68d', dark: '#27ae60' },  // 緑
            { main: '#9b59b6', light: '#bb8fce', dark: '#8e44ad' },  // 紫
            { main: '#f39c12', light: '#f5b041', dark: '#e67e22' },  // オレンジ
            { main: '#1abc9c', light: '#48c9b0', dark: '#16a085' }   // ターコイズ
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Balloon {
            constructor() {
                this.radius = Math.random() * 20 + 35;
                this.x = Math.random() * (width - this.radius * 2) + this.radius;
                this.y = height + this.radius;
                this.speed = Math.random() * 2 + 1.5 + (level * 0.3);
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = Math.random() * 0.05 + 0.02;
                this.wobbleAmount = Math.random() * 2 + 1;
                
                // 風船タイプ
                const rand = Math.random();
                if (rand < 0.05 * level) {
                    this.type = 'gold';
                    this.color = { main: '#f1c40f', light: '#f4d03f', dark: '#d4ac0d' };
                    this.points = 50;
                } else if (rand < 0.1 + (level * 0.02)) {
                    this.type = 'bomb';
                    this.color = { main: '#2c3e50', light: '#34495e', dark: '#1a252f' };
                    this.points = -1;
                } else {
                    this.type = 'normal';
                    this.color = balloonColors[Math.floor(Math.random() * balloonColors.length)];
                    this.points = 10;
                }

                this.popped = false;
                this.stringLength = this.radius * 1.5;
            }

            update() {
                this.y -= this.speed;
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * this.wobbleAmount * 0.5;

                // 画面外に出た
                if (this.y < -this.radius * 2 && !this.popped) {
                    if (this.type !== 'bomb') {
                        loseLife();
                    }
                    return true;
                }
                return false;
            }

            draw() {
                if (this.popped) return;

                // 糸
                ctx.beginPath();
                ctx.moveTo(this.x, this.y + this.radius);
                ctx.quadraticCurveTo(
                    this.x + Math.sin(this.wobble * 2) * 10,
                    this.y + this.radius + this.stringLength * 0.5,
                    this.x,
                    this.y + this.radius + this.stringLength
                );
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // 風船本体
                const gradient = ctx.createRadialGradient(
                    this.x - this.radius * 0.3,
                    this.y - this.radius * 0.3,
                    0,
                    this.x,
                    this.y,
                    this.radius
                );
                gradient.addColorStop(0, this.color.light);
                gradient.addColorStop(0.7, this.color.main);
                gradient.addColorStop(1, this.color.dark);

                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.radius, this.radius * 1.15, 0, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // ハイライト
                ctx.beginPath();
                ctx.ellipse(
                    this.x - this.radius * 0.3,
                    this.y - this.radius * 0.4,
                    this.radius * 0.15,
                    this.radius * 0.25,
                    -0.5,
                    0,
                    Math.PI * 2
                );
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.fill();

                // 金風船のキラキラ効果
                if (this.type === 'gold') {
                    ctx.save();
                    ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.01) * 0.3;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius * 1.2, 0, Math.PI * 2);
                    ctx.fillStyle = '#fff';
                    ctx.fill();
                    ctx.restore();
                }

                // 爆弾風印
                if (this.type === 'bomb') {
                    ctx.fillStyle = '#e74c3c';
                    ctx.font = `bold ${this.radius}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('💣', this.x, this.y);
                }
            }

            containsPoint(px, py) {
                const dx = px - this.x;
                const dy = py - this.y;
                return Math.sqrt(dx * dx + dy * dy) < this.radius * 1.15;
            }

            pop() {
                this.popped = true;
                createParticles(this.x, this.y, this.color);

                if (this.type === 'bomb') {
                    loseLife();
                } else {
                    addScore(this.points);
                }
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 4 + 2;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1;
                this.decay = Math.random() * 0.03 + 0.02;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.3;
                this.life -= this.decay;
                return this.life <= 0;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * this.life, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.life})`;
                ctx.fill();
            }
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function addScore(points) {
            score += points;
            updateUI();

            // レベルアップ
            if (score >= level * 100) {
                levelUp();
            }
        }

        function loseLife() {
            lives--;
            updateUI();

            if (lives <= 0) {
                gameOver();
            }
        }

        function levelUp() {
            level++;
            spawnInterval = Math.max(30, 120 - level * 10);
            updateUI();
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lives').textContent = '❤️'.repeat(lives);
        }

        function spawnBalloon() {
            balloons.push(new Balloon());
        }

        function startGame() {
            score = 0;
            lives = 3;
            level = 1;
            balloons = [];
            particles = [];
            spawnTimer = 0;
            spawnInterval = 120;
            gameRunning = true;

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            updateUI();
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        function restartGame() {
            startGame();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function handleClick(x, y) {
            if (!gameRunning) return;

            for (let i = balloons.length - 1; i >= 0; i--) {
                if (balloons[i].containsPoint(x, y)) {
                    balloons[i].pop();
                    balloons.splice(i, 1);
                    return;
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);

            if (gameRunning) {
                spawnTimer++;
                if (spawnTimer >= spawnInterval) {
                    spawnBalloon();
                    spawnTimer = 0;
                }

                balloons = balloons.filter(b => {
                    const remove = b.update();
                    if (!remove) b.draw();
                    return !remove;
                });

                particles = particles.filter(p => {
                    const remove = p.update();
                    if (!remove) p.draw();
                    return !remove;
                });
            }

            requestAnimationFrame(animate);
        }

        // イベントリスナー
        window.addEventListener('resize', resize);

        canvas.addEventListener('click', (e) => {
            handleClick(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleClick(touch.clientX, touch.clientY);
        }, { passive: false });

        resize();
        animate();
    </script>
</body>
</html>
