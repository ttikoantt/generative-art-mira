<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluid Dreams - Viscosity Control</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            cursor: crosshair;
        }
        
        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            z-index: 100;
            min-width: 200px;
        }
        
        .control-group {
            margin-bottom: 15px;
        }
        
        .control-group:last-child {
            margin-bottom: 0;
        }
        
        label {
            display: block;
            color: white;
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            -webkit-appearance: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(0, 212, 255, 0.5);
        }
        
        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 10px rgba(0, 212, 255, 0.5);
        }
        
        .value-display {
            color: #00d4ff;
            font-size: 14px;
            font-weight: bold;
            text-align: right;
            margin-top: 5px;
        }
        
        .title {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 20px rgba(0, 212, 255, 0.5);
            z-index: 100;
        }
        
        .subtitle {
            position: fixed;
            top: 55px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            z-index: 100;
        }
        
        .color-buttons {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        
        .color-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .color-btn:hover {
            transform: scale(1.15);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.3);
        }
        
        .color-btn.active {
            border-color: white;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="title">Fluid Dreams</div>
    <div class="subtitle">Click to add fluid particles</div>
    
    <div class="controls">
        <div class="control-group">
            <label>Viscosity</label>
            <input type="range" id="viscosity" min="0.001" max="0.1" step="0.001" value="0.02">
            <div class="value-display" id="viscosityValue">0.020</div>
        </div>
        
        <div class="control-group">
            <label>Particle Size</label>
            <input type="range" id="particleSize" min="5" max="50" step="1" value="20">
            <div class="value-display" id="particleSizeValue">20px</div>
        </div>
        
        <div class="control-group">
            <label>Gravity</label>
            <input type="range" id="gravity" min="0" max="1" step="0.01" value="0.3">
            <div class="value-display" id="gravityValue">0.30</div>
        </div>
        
        <div class="control-group">
            <label>Fluid Color</label>
            <div class="color-buttons">
                <button class="color-btn active" style="background: linear-gradient(135deg, #ff006e, #ff4d94);" data-color="0"></button>
                <button class="color-btn" style="background: linear-gradient(135deg, #00d4ff, #0099ff);" data-color="1"></button>
                <button class="color-btn" style="background: linear-gradient(135deg, #00ff88, #00cc6a);" data-color="2"></button>
                <button class="color-btn" style="background: linear-gradient(135deg, #ffdd00, #ffaa00);" data-color="3"></button>
                <button class="color-btn" style="background: linear-gradient(135deg, #bb00ff, #9900ff);" data-color="4"></button>
                <button class="color-btn" style="background: linear-gradient(135deg, #ff6600, #ff4400);" data-color="5"></button>
            </div>
        </div>
    </div>
    
    <canvas id="canvas"></canvas>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas size
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Fluid simulation parameters
        let viscosity = 0.02;
        let particleSize = 20;
        let gravity = 0.3;
        let currentColorIndex = 0;
        
        // Color palettes (gradient colors)
        const colorPalettes = [
            ['#ff006e', '#ff4d94', '#ff88b8'], // Pink/Red
            ['#00d4ff', '#0099ff', '#0066cc'], // Blue/Cyan
            ['#00ff88', '#00cc6a', '#009955'], // Green
            ['#ffdd00', '#ffaa00', '#ff8800'], // Yellow/Orange
            ['#bb00ff', '#9900ff', '#7700cc'], // Purple
            ['#ff6600', '#ff4400', '#ff2200']  // Orange/Red
        ];
        
        // Particles array
        const particles = [];
        
        // Particle class
        class Particle {
            constructor(x, y, colorIndex) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.radius = particleSize + (Math.random() - 0.5) * 10;
                this.colorIndex = colorIndex;
                this.color = colorPalettes[colorIndex][Math.floor(Math.random() * 3)];
                this.alpha = 0.8;
                this.life = 1;
                this.decay = 0.001 + Math.random() * 0.002;
            }
            
            update() {
                // Apply gravity
                this.vy += gravity * 0.1;
                
                // Apply viscosity (resistance to movement)
                this.vx *= (1 - viscosity);
                this.vy *= (1 - viscosity);
                
                // Update position
                this.x += this.vx;
                this.y += this.vy;
                
                // Bounce off walls
                if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx *= -0.5;
                }
                if (this.x + this.radius > canvas.width) {
                    this.x = canvas.width - this.radius;
                    this.vx *= -0.5;
                }
                if (this.y - this.radius < 0) {
                    this.y = this.radius;
                    this.vy *= -0.5;
                }
                if (this.y + this.radius > canvas.height) {
                    this.y = canvas.height - this.radius;
                    this.vy *= -0.5;
                }
                
                // Decay
                this.life -= this.decay;
                this.alpha = this.life * 0.8;
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                
                // Create gradient
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius
                );
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(0.5, this.color + '80');
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        // Add particles on click
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // Add multiple particles
            for (let i = 0; i < 15; i++) {
                const offsetX = (Math.random() - 0.5) * 40;
                const offsetY = (Math.random() - 0.5) * 40;
                particles.push(new Particle(x + offsetX, y + offsetY, currentColorIndex));
            }
        });
        
        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            
            for (let i = 0; i < 15; i++) {
                const offsetX = (Math.random() - 0.5) * 40;
                const offsetY = (Math.random() - 0.5) * 40;
                particles.push(new Particle(x + offsetX, y + offsetY, currentColorIndex));
            }
        });
        
        // Control handlers
        document.getElementById('viscosity').addEventListener('input', (e) => {
            viscosity = parseFloat(e.target.value);
            document.getElementById('viscosityValue').textContent = viscosity.toFixed(3);
        });
        
        document.getElementById('particleSize').addEventListener('input', (e) => {
            particleSize = parseInt(e.target.value);
            document.getElementById('particleSizeValue').textContent = particleSize + 'px';
        });
        
        document.getElementById('gravity').addEventListener('input', (e) => {
            gravity = parseFloat(e.target.value);
            document.getElementById('gravityValue').textContent = gravity.toFixed(2);
        });
        
        // Color button handlers
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentColorIndex = parseInt(btn.dataset.color);
            });
        });
        
        // Auto-add particles periodically
        setInterval(() => {
            if (particles.length < 200) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height * 0.3;
                const colorIndex = Math.floor(Math.random() * colorPalettes.length);
                particles.push(new Particle(x, y, colorIndex));
            }
        }, 500);
        
        // Animation loop
        function animate() {
            // Clear with fade effect
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Update and draw particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                
                // Remove dead particles
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            requestAnimationFrame(animate);
        }
        
        animate();
    </script>
</body>
</html>
