<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flowing Ribbons | Generative Art by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        
        canvas {
            display: block;
        }
        
        #fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }
        
        #fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        
        #info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="info">Flowing Ribbons | by Mira</div>
    <button id="fullscreen-btn">全画面表示</button>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let time = 0;
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        class Ribbon {
            constructor(index, total) {
                this.index = index;
                this.total = total;
                this.points = [];
                this.numPoints = 100;
                this.baseY = (index / total) * height;
                
                for (let i = 0; i < this.numPoints; i++) {
                    this.points.push({
                        x: (i / (this.numPoints - 1)) * width,
                        y: this.baseY
                    });
                }
            }
            
            update(t) {
                for (let i = 0; i < this.points.length; i++) {
                    const p = this.points[i];
                    const progress = i / (this.numPoints - 1);
                    
                    // 複数の波を重ねて複雑な動きに
                    const wave1 = Math.sin(progress * Math.PI * 4 + t + this.index * 0.5);
                    const wave2 = Math.sin(progress * Math.PI * 6 - t * 1.3 + this.index * 0.3);
                    const wave3 = Math.cos(progress * Math.PI * 2 + t * 0.7);
                    
                    const amplitude = height * 0.15;
                    p.y = this.baseY + (wave1 + wave2 * 0.5 + wave3 * 0.3) * amplitude;
                }
            }
            
            draw() {
                ctx.beginPath();
                
                // 色のグラデーション
                const hue = (this.index / this.total * 360 + time * 20) % 360;
                const gradient = ctx.createLinearGradient(0, 0, width, 0);
                
                for (let i = 0; i <= 10; i++) {
                    const h = (hue + i * 10) % 360;
                    gradient.addColorStop(i / 10, `hsla(${h}, 80%, 60%, 0.8)`);
                }
                
                ctx.strokeStyle = gradient;
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                // スプライン曲線で滑らかに
                ctx.moveTo(this.points[0].x, this.points[0].y);
                
                for (let i = 1; i < this.points.length - 2; i++) {
                    const p0 = this.points[i - 1];
                    const p1 = this.points[i];
                    const p2 = this.points[i + 1];
                    const p3 = this.points[i + 2];
                    
                    const cp1x = p1.x + (p2.x - p0.x) / 6;
                    const cp1y = p1.y + (p2.y - p0.y) / 6;
                    const cp2x = p2.x - (p3.x - p1.x) / 6;
                    const cp2y = p2.y - (p3.y - p1.y) / 6;
                    
                    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
                }
                
                ctx.stroke();
                
                // グロー効果
                ctx.shadowColor = `hsla(${hue}, 80%, 60%, 0.5)`;
                ctx.shadowBlur = 15;
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }
        
        const ribbons = [];
        const numRibbons = 12;
        
        function init() {
            ribbons.length = 0;
            for (let i = 0; i < numRibbons; i++) {
                ribbons.push(new Ribbon(i, numRibbons));
            }
        }
        
        function animate() {
            // 少し残像を残す
            ctx.fillStyle = 'rgba(10, 10, 15, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            time += 0.008;
            
            ribbons.forEach(ribbon => {
                ribbon.update(time);
                ribbon.draw();
            });
            
            requestAnimationFrame(animate);
        }
        
        window.addEventListener('resize', () => {
            resize();
            init();
        });
        
        // 全画面表示
        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });
        
        resize();
        init();
        animate();
    </script>
</body>
</html>
