<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光の粒子アート - Light Particles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        canvas {
            display: block;
        }
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        .btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        .btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
    <div class="info">
        🎨 マウス/タッチで光を操る<br>
        <span id="particleCount">粒子: 0</span>
    </div>
    <div class="controls">
        <button class="btn" onclick="changeColors()">🌈 色を変える</button>
        <button class="btn" onclick="clearParticles()">✨ 消す</button>
        <button class="btn" onclick="addBurst()">💥 爆発</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let mouse = { x: null, y: null };
        let colorScheme = 0;
        const colorSchemes = [
            ['#00d4ff', '#0099ff', '#0066ff'],
            ['#ff0066', '#ff3399', '#ff66cc'],
            ['#00ff88', '#00ffcc', '#00ffaa'],
            ['#ffaa00', '#ffcc00', '#ffee00'],
            ['#aa00ff', '#cc33ff', '#ee66ff']
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor(x, y, burst = false) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.size = Math.random() * 4 + 2;
                this.baseSize = this.size;
                const speed = burst ? Math.random() * 8 + 4 : Math.random() * 2 + 0.5;
                const angle = Math.random() * Math.PI * 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1;
                this.decay = Math.random() * 0.01 + 0.005;
                this.color = colorSchemes[colorScheme][Math.floor(Math.random() * 3)];
                this.glow = Math.random() * 20 + 10;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // マウスの引力
                if (mouse.x !== null) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        const force = (150 - dist) / 150 * 0.3;
                        this.vx += (dx / dist) * force;
                        this.vy += (dy / dist) * force;
                        this.size = this.baseSize * (1 + force);
                    }
                }

                // 空気抵抗
                this.vx *= 0.99;
                this.vy *= 0.99;

                // 重みを戻す
                this.size += (this.baseSize - this.size) * 0.1;

                // 減衰
                this.life -= this.decay;

                // 境界で反射
                if (this.x < 0 || this.x > width) this.vx *= -0.8;
                if (this.y < 0 || this.y > height) this.vy *= -0.8;
            }

            draw() {
                const alpha = this.life;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.shadowBlur = this.glow;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();

                // グロー効果
                ctx.globalAlpha = alpha * 0.5;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function createParticle(x, y) {
            particles.push(new Particle(x, y));
        }

        function createBurst(x, y) {
            for (let i = 0; i < 50; i++) {
                particles.push(new Particle(x, y, true));
            }
        }

        function addBurst() {
            createBurst(width / 2, height / 2);
        }

        function changeColors() {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
            particles.forEach(p => {
                p.color = colorSchemes[colorScheme][Math.floor(Math.random() * 3)];
            });
        }

        function clearParticles() {
            particles = [];
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // 自動的に追加
            if (particles.length < 100 && Math.random() < 0.1) {
                createParticle();
            }

            document.getElementById('particleCount').textContent = `粒子: ${particles.length}`;

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            if (Math.random() < 0.3) {
                createParticle(e.clientX, e.clientY);
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouse.x = touch.clientX;
            mouse.y = touch.clientY;
            if (Math.random() < 0.3) {
                createParticle(touch.clientX, touch.clientY);
            }
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        canvas.addEventListener('touchend', () => {
            mouse.x = null;
            mouse.y = null;
        });

        canvas.addEventListener('click', (e) => {
            createBurst(e.clientX, e.clientY);
        });

        // 初期化
        resize();
        for (let i = 0; i < 50; i++) {
            createParticle();
        }
        animate();
    </script>
</body>
</html>
