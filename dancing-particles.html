<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>踊るパーティクル・ボール | Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        p {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 2rem;
        }

        #canvas {
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(100, 200, 255, 0.3);
            cursor: pointer;
            touch-action: none;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.9);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            p {
                font-size: 0.9rem;
            }

            .info {
                font-size: 0.8rem;
                padding: 8px 15px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">📺 全画面</button>

    <div class="container">
        <h1>🎨 踊るパーティクル・ボール</h1>
        <p>クリックまたはタップして、色とりどりのパーティクルを飛ばそう！</p>
        <canvas id="canvas"></canvas>
        <div class="info">パーティクル数: <span id="particleCount">0</span></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const particleCountEl = document.getElementById('particleCount');

        // キャンバスサイズ設定
        function resizeCanvas() {
            const size = Math.min(window.innerWidth - 40, 600);
            canvas.width = size;
            canvas.height = size;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // パーティクルクラス
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = Math.random() * 15 + 5;
                this.color = `hsl(${Math.random() * 360}, 80%, 60%)`;
                this.velocityX = (Math.random() - 0.5) * 10;
                this.velocityY = (Math.random() - 0.5) * 10 - 3;
                this.gravity = 0.2;
                this.friction = 0.99;
                this.alpha = 1;
                this.decay = Math.random() * 0.01 + 0.005;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.2;
            }

            update() {
                this.velocityY += this.gravity;
                this.velocityX *= this.friction;
                this.velocityY *= this.friction;

                this.x += this.velocityX;
                this.y += this.velocityY;

                this.rotation += this.rotationSpeed;
                this.alpha -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.alpha;

                // グラデーション
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, 'transparent');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // 光る効果
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.color;
                ctx.fill();

                ctx.restore();
            }
        }

        // パーティクル配列
        let particles = [];
        let autoSpawnTimer = 0;

        // クリックでパーティクル生成
        function createParticles(x, y, count = 20) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y));
            }
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            createParticles(x, y, 30);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            createParticles(x, y, 30);
        });

        // 自動生成（中央）
        function autoSpawn() {
            autoSpawnTimer++;
            if (autoSpawnTimer > 60) {
                const x = canvas.width / 2 + (Math.random() - 0.5) * 100;
                const y = canvas.height / 2 + (Math.random() - 0.5) * 100;
                createParticles(x, y, 5);
                autoSpawnTimer = 0;
            }
        }

        // アニメーション
        function animate() {
            // 半透明でクリア（トレイル効果）
            ctx.fillStyle = 'rgba(26, 26, 46, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // パーティクル更新・描画
            particles = particles.filter(p => p.alpha > 0);

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // 自動生成
            autoSpawn();

            // カウント更新
            particleCountEl.textContent = particles.length;

            requestAnimationFrame(animate);
        }

        // 開始
        animate();

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
