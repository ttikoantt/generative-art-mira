<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星の軌跡 - Star Trails</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #0a0a1a, #1a1a3a);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            }
            to {
                text-shadow: 0 0 30px rgba(255, 255, 255, 0.8), 0 0 40px rgba(200, 200, 255, 0.6);
            }
        }

        .subtitle {
            color: #aaaaaa;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        #canvas-container {
            position: relative;
            width: min(90vw, 800px);
            height: min(90vw, 600px);
            margin: 0 auto;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        canvas {
            display: block;
            background: radial-gradient(ellipse at center, #0a0a2a 0%, #050510 100%);
            cursor: crosshair;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #ffffff;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .stats {
            margin-top: 15px;
            display: flex;
            gap: 30px;
            justify-content: center;
            font-size: 0.9rem;
            color: #aaa;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .fullscreen-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #ffffff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            font-size: 0.9rem;
            color: #aaa;
            max-width: min(90vw, 600px);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            #canvas-container {
                width: 95vw;
                height: 70vw;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ 星の軌跡</h1>
        <p class="subtitle">Star Trails - 夜空に流れる星の軌跡</p>

        <div id="canvas-container">
            <canvas id="starCanvas"></canvas>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
        </div>

        <div class="controls">
            <button onclick="clearTrails()">🌑 軌跡を消す</button>
            <button onclick="addStar()">⭐ 星を追加</button>
            <button onclick="changeColorPalette()">🎨 色を変える</button>
            <button onclick="toggleTrails()">🌀 軌跡ON/OFF</button>
        </div>

        <div class="stats">
            <div class="stat-item">
                <span>⭐ 星の数:</span>
                <span id="starCount">0</span>
            </div>
            <div class="stat-item">
                <span>🌀 軌跡:</span>
                <span id="trailStatus">ON</span>
            </div>
        </div>

        <div class="info">
            💡 <strong>遊び方:</strong> キャンバスをクリック/タップして新しい星を追加できます。<br>
            星は自然な動きで空を漂い、美しい軌跡を描きます。
        </div>
    </div>

    <script>
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');

        let width, height;
        let stars = [];
        let trailsEnabled = true;
        let colorPalette = 0;
        const palettes = [
            ['#ffffff', '#ffffcc', '#ffccff', '#ccffff', '#ccccff'],
            ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff'],
            ['#00ff87', '#60efff', '#ff6b6b', '#feca57', '#a55eea'],
            ['#e17055', '#fdcb6e', '#00cec9', '#6c5ce7', '#fd79a8']
        ];

        function resize() {
            width = container.clientWidth;
            height = container.clientHeight;
            canvas.width = width;
            canvas.height = height;
        }

        class Star {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.angle = Math.random() * Math.PI * 2;
                this.angleSpeed = (Math.random() - 0.5) * 0.02;
                this.color = this.getRandomColor();
                this.alpha = Math.random() * 0.5 + 0.5;
                this.pulseSpeed = Math.random() * 0.02 + 0.01;
                this.pulse = 0;
                this.trail = [];
                this.maxTrailLength = 30;
            }

            getRandomColor() {
                const palette = palettes[colorPalette];
                return palette[Math.floor(Math.random() * palette.length)];
            }

            update() {
                this.angle += this.angleSpeed;

                this.x += Math.cos(this.angle) * 1 + this.speedX;
                this.y += Math.sin(this.angle) * 1 + this.speedY;

                if (trailsEnabled) {
                    this.trail.push({ x: this.x, y: this.y });
                    if (this.trail.length > this.maxTrailLength) {
                        this.trail.shift();
                    }
                }

                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;

                this.pulse += this.pulseSpeed;
                this.alpha = 0.5 + Math.sin(this.pulse) * 0.3;
            }

            draw() {
                if (trailsEnabled && this.trail.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);

                    for (let i = 1; i < this.trail.length; i++) {
                        const point = this.trail[i];
                        const alpha = (i / this.trail.length) * 0.3;
                        ctx.lineTo(point.x, point.y);
                    }

                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = this.size;
                    ctx.globalAlpha = 0.2;
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);

                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 3
                );
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(0.5, this.color + '80');
                gradient.addColorStop(1, 'transparent');

                ctx.fillStyle = gradient;
                ctx.globalAlpha = this.alpha;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function init() {
            resize();
            for (let i = 0; i < 50; i++) {
                stars.push(new Star());
            }
            updateStats();
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 26, 0.05)';
            ctx.fillRect(0, 0, width, height);

            stars.forEach(star => {
                star.update();
                star.draw();
            });

            requestAnimationFrame(animate);
        }

        function clearTrails() {
            stars.forEach(star => {
                star.trail = [];
            });
            ctx.fillStyle = 'rgba(10, 10, 26, 1)';
            ctx.fillRect(0, 0, width, height);
        }

        function addStar() {
            stars.push(new Star(width / 2, height / 2));
            updateStats();
        }

        function changeColorPalette() {
            colorPalette = (colorPalette + 1) % palettes.length;
            stars.forEach(star => {
                star.color = star.getRandomColor();
            });
        }

        function toggleTrails() {
            trailsEnabled = !trailsEnabled;
            document.getElementById('trailStatus').textContent = trailsEnabled ? 'ON' : 'OFF';
            if (!trailsEnabled) {
                stars.forEach(star => {
                    star.trail = [];
                });
            }
        }

        function updateStats() {
            document.getElementById('starCount').textContent = stars.length;
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            stars.push(new Star(x, y));
            updateStats();
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            stars.push(new Star(x, y));
            updateStats();
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                container.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', resize);

        init();
        animate();
    </script>
</body>
</html>
