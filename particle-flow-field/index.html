<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Particle Flow Field - Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        #canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .controls button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .controls button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .controls button:active {
            transform: scale(0.95);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            z-index: 100;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="info">タップでパーティクル追加</div>
    
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
    
    <div class="controls">
        <button onclick="resetFlow()">新規生成</button>
        <button onclick="changeColor()">色変更</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let flowField;
        let rows, cols;
        const scale = 20;
        let colorOffset = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initFlowField();
        }

        function initFlowField() {
            cols = Math.floor(width / scale);
            rows = Math.floor(height / scale);
            flowField = new Array(cols * rows);
        }

        class Particle {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.vx = 0;
                this.vy = 0;
                this.history = [];
                this.maxHistory = 10;
                this.speed = Math.random() * 2 + 1;
                this.hue = (Math.random() * 60 + colorOffset) % 360;
            }

            update() {
                const col = Math.floor(this.x / scale);
                const row = Math.floor(this.y / scale);
                const index = col + row * cols;

                if (index >= 0 && index < flowField.length) {
                    const angle = flowField[index];
                    this.vx += Math.cos(angle) * 0.5;
                    this.vy += Math.sin(angle) * 0.5;

                    // 速度制限
                    const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                    if (speed > this.speed) {
                        this.vx = (this.vx / speed) * this.speed;
                        this.vy = (this.vy / speed) * this.speed;
                    }
                }

                this.x += this.vx;
                this.y += this.vy;

                // 履歴に追加
                this.history.push({ x: this.x, y: this.y });
                if (this.history.length > this.maxHistory) {
                    this.history.shift();
                }

                // 画面外に出たらリセット
                if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.history = [];
                    this.vx = 0;
                    this.vy = 0;
                }
            }

            draw() {
                if (this.history.length < 2) return;

                ctx.beginPath();
                ctx.moveTo(this.history[0].x, this.history[0].y);

                for (let i = 1; i < this.history.length; i++) {
                    ctx.lineTo(this.history[i].x, this.history[i].y);
                }

                ctx.strokeStyle = `hsla(${this.hue}, 70%, 60%, 0.5)`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        function generateFlowField() {
            const noiseScale = 0.01;
            const time = Date.now() * 0.0001;

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const index = x + y * cols;
                    const angle = noise(x * noiseScale, y * noiseScale, time) * Math.PI * 4;
                    flowField[index] = angle;
                }
            }
        }

        // シンプルなノイズ関数
        function noise(x, y, z) {
            const p = [
                151, 160, 137, 91, 90, 15, 131, 13, 201, 95, 96, 53, 194, 233, 7, 225,
                140, 36, 103, 30, 69, 142, 8, 99, 37, 240, 21, 10, 23, 190, 6, 148,
                247, 120, 234, 75, 0, 26, 197, 62, 94, 252, 219, 203, 117, 35, 11, 32,
                57, 177, 33, 88, 237, 149, 56, 87, 174, 20, 125, 136, 171, 168, 68, 175,
                74, 165, 71, 134, 139, 48, 27, 166, 77, 146, 158, 231, 83, 111, 229, 122,
                60, 211, 133, 230, 220, 105, 92, 41, 55, 46, 245, 40, 244, 102, 143, 54,
                65, 25, 63, 161, 1, 216, 80, 73, 209, 76, 132, 187, 208, 89, 18, 169,
                200, 196, 135, 130, 116, 188, 159, 86, 164, 100, 109, 198, 173, 186, 3, 64
            ];

            const xi = Math.floor(x) & 255;
            const yi = Math.floor(y) & 255;
            const zi = Math.floor(z) & 255;

            const xf = x - Math.floor(x);
            const yf = y - Math.floor(y);
            const zf = z - Math.floor(z);

            const u = fade(xf);
            const v = fade(yf);
            const w = fade(zf);

            const aaa = p[p[p[xi] + yi] + zi];
            const aba = p[p[p[xi] + yi + 1] + zi];
            const aab = p[p[p[xi] + yi] + zi + 1];
            const abb = p[p[p[xi] + yi + 1] + zi + 1];
            const baa = p[p[p[xi + 1] + yi] + zi];
            const bba = p[p[p[xi + 1] + yi + 1] + zi];
            const bab = p[p[p[xi + 1] + yi] + zi + 1];
            const bbb = p[p[p[xi + 1] + yi + 1] + zi + 1];

            let x1 = lerp(aaa, baa, u);
            let x2 = lerp(aba, bba, u);
            let y1 = lerp(x1, x2, v);

            x1 = lerp(aab, bab, u);
            x2 = lerp(abb, bbb, u);
            let y2 = lerp(x1, x2, v);

            return lerp(y1, y2, w) * 2 - 1;
        }

        function fade(t) {
            return t * t * t * (t * (t * 6 - 15) + 10);
        }

        function lerp(a, b, t) {
            return a + t * (b - a);
        }

        function init() {
            resize();
            generateFlowField();

            for (let i = 0; i < 500; i++) {
                particles.push(new Particle());
            }
        }

        function resetFlow() {
            particles = [];
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, width, height);
            generateFlowField();

            for (let i = 0; i < 500; i++) {
                particles.push(new Particle());
            }
        }

        function changeColor() {
            colorOffset = (colorOffset + 60) % 360;
            particles.forEach(p => {
                p.hue = (Math.random() * 60 + colorOffset) % 360;
            });
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
            ctx.fillRect(0, 0, width, height);

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // タップでパーティクル追加
        canvas.addEventListener('click', (e) => {
            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(e.clientX, e.clientY));
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(touch.clientX, touch.clientY));
            }
        });

        window.addEventListener('resize', resize);

        init();
        animate();
    </script>
</body>
</html>
