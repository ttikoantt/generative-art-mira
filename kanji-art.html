<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漢字アートジェネレーター</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            background: linear-gradient(45deg, #e94560, #f39c12, #00d9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1rem;
            opacity: 0.7;
            margin-bottom: 20px;
        }

        .canvas-container {
            position: relative;
            margin-bottom: 20px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        #artCanvas {
            display: block;
            background: #000;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: linear-gradient(135deg, #e94560, #f39c12);
            color: #fff;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
        }

        input[type="text"] {
            padding: 12px 20px;
            font-size: 1rem;
            border: 2px solid #e94560;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            outline: none;
            text-align: center;
        }

        input[type="text"]::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .info {
            text-align: center;
            opacity: 0.8;
            font-size: 0.9rem;
            max-width: 600px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }

            #artCanvas {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <h1>🎨 漢字アートジェネレーター</h1>
    <p class="subtitle">美しい漢字アートを自動生成</p>

    <div class="canvas-container">
        <canvas id="artCanvas" width="600" height="600"></canvas>
    </div>

    <div class="input-group">
        <input type="text" id="kanjiInput" placeholder="漢字を入力（最大2文字）" maxlength="2">
    </div>

    <div class="controls">
        <button onclick="generateArt()">🎲 新しいアート</button>
        <button onclick="generateRandom()">🎯 ランダム漢字</button>
        <button onclick="downloadArt()">💾 保存</button>
        <button onclick="toggleFullscreen()">📺 全画面</button>
    </div>

    <p class="info">漢字を入力するか、「ランダム漢字」で美しいアートを生成！</p>

    <script>
        const canvas = document.getElementById('artCanvas');
        const ctx = canvas.getContext('2d');
        const kanjiInput = document.getElementById('kanjiInput');

        const commonKanji = [
            '愛', '夢', '心', '光', '空', '海', '風', '星', '月', '花',
            '山', '川', '森', '火', '水', '土', '金', '龍', '鳳', '虎',
            '神', '仏', '道', '禅', '心', '想', '念', '悟', '覚', '空',
            '美', '静', '動', '生', '死', '天', '地', '人', '和', '敬',
            '清', '明', '智', '慧', '勇', '仁', '義', '礼', '信', '誠'
        ];

        const palettes = [
            ['#e94560', '#f39c12', '#00d9ff', '#a29bfe', '#fd79a8'],
            ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff'],
            ['#fd79a8', '#a29bfe', '#00d9ff', '#f39c12', '#e94560'],
            ['#00b894', '#00cec9', '#0984e3', '#6c5ce7', '#fd79a8'],
            ['#ffeaa7', '#fd79a8', '#a29bfe', '#74b9ff', '#81ecec']
        ];

        let currentKanji = '龍';

        function getRandomElement(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function generateArt() {
            const input = kanjiInput.value.trim();
            if (input) {
                currentKanji = input;
            }

            const palette = getRandomElement(palettes);
            const pattern = Math.floor(Math.random() * 5);

            // 背景グラデーション
            const bgGradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            bgGradient.addColorStop(0, '#1a1a2e');
            bgGradient.addColorStop(0.5, '#16213e');
            bgGradient.addColorStop(1, '#0f3460');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 装飾パターンを描画
            drawPattern(pattern, palette);

            // 漢字を描画
            drawKanji(currentKanji, palette);

            // エフェクトを追加
            addEffect(palette);
        }

        function drawPattern(patternType, palette) {
            ctx.globalAlpha = 0.1;

            switch(patternType) {
                case 0: // 円パターン
                    for (let i = 0; i < 20; i++) {
                        ctx.beginPath();
                        ctx.arc(
                            Math.random() * canvas.width,
                            Math.random() * canvas.height,
                            Math.random() * 100 + 50,
                            0,
                            Math.PI * 2
                        );
                        ctx.strokeStyle = getRandomElement(palette);
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                    break;

                case 1: // 線パターン
                    for (let i = 0; i < 30; i++) {
                        ctx.beginPath();
                        ctx.moveTo(0, Math.random() * canvas.height);
                        ctx.lineTo(canvas.width, Math.random() * canvas.height);
                        ctx.strokeStyle = getRandomElement(palette);
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                    break;

                case 2: // 星パターン
                    for (let i = 0; i < 50; i++) {
                        drawStar(
                            Math.random() * canvas.width,
                            Math.random() * canvas.height,
                            Math.random() * 5 + 2,
                            getRandomElement(palette)
                        );
                    }
                    break;

                case 3: // 螺旋パターン
                    ctx.beginPath();
                    for (let i = 0; i < 100; i++) {
                        const angle = i * 0.2;
                        const radius = i * 3;
                        const x = canvas.width / 2 + Math.cos(angle) * radius;
                        const y = canvas.height / 2 + Math.sin(angle) * radius;
                        if (i === 0) {
                            ctx.moveTo(x, y);
                        } else {
                            ctx.lineTo(x, y);
                        }
                    }
                    ctx.strokeStyle = getRandomElement(palette);
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    break;

                case 4: // ドットパターン
                    for (let i = 0; i < 100; i++) {
                        ctx.beginPath();
                        ctx.arc(
                            Math.random() * canvas.width,
                            Math.random() * canvas.height,
                            Math.random() * 3 + 1,
                            0,
                            Math.PI * 2
                        );
                        ctx.fillStyle = getRandomElement(palette);
                        ctx.fill();
                    }
                    break;
            }

            ctx.globalAlpha = 1;
        }

        function drawStar(x, y, size, color) {
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
                const px = x + Math.cos(angle) * size;
                const py = y + Math.sin(angle) * size;
                if (i === 0) {
                    ctx.moveTo(px, py);
                } else {
                    ctx.lineTo(px, py);
                }
            }
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
        }

        function drawKanji(kanji, palette) {
            const fontSize = 300;
            ctx.font = `bold ${fontSize}px "Noto Sans JP", "Hiragino Sans", sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const x = canvas.width / 2;
            const y = canvas.height / 2;

            // グロー効果
            for (let i = 5; i > 0; i--) {
                ctx.shadowColor = palette[0];
                ctx.shadowBlur = i * 10;
                ctx.fillStyle = palette[Math.floor(i / 2)];
                ctx.fillText(kanji, x, y);
            }

            // メイン文字
            ctx.shadowBlur = 30;
            ctx.shadowColor = palette[1];
            ctx.fillStyle = '#ffffff';
            ctx.fillText(kanji, x, y);

            ctx.shadowBlur = 0;
        }

        function addEffect(palette) {
            // 光の粒子
            for (let i = 0; i < 30; i++) {
                ctx.beginPath();
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const radius = Math.random() * 3 + 1;

                const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
                gradient.addColorStop(0, getRandomElement(palette));
                gradient.addColorStop(1, 'transparent');

                ctx.fillStyle = gradient;
                ctx.globalAlpha = 0.6;
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        function generateRandom() {
            currentKanji = getRandomElement(commonKanji);
            kanjiInput.value = currentKanji;
            generateArt();
        }

        function downloadArt() {
            const link = document.createElement('a');
            link.download = `kanji-art-${currentKanji}-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        }

        // 初期描画
        generateArt();
    </script>
</body>
</html>
