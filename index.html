<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Web - Interactive Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        
        canvas {
            display: block;
            cursor: crosshair;
        }
        
        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #7dd3fc;
            font-size: 12px;
            pointer-events: none;
            opacity: 0.7;
            text-shadow: 0 0 10px rgba(125, 211, 252, 0.5);
        }
        
        .info p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">
        <p>🌌 Cosmic Web</p>
        <p>Move mouse to create gravity wells</p>
        <p>Click to burst particles</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        
        // Configuration
        const PARTICLE_COUNT = 400;
        const CONNECTION_DISTANCE = 100;
        const MOUSE_INFLUENCE = 150;
        const MOUSE_GRAVITY = 0.5;
        
        // Particle class
        class Particle {
            constructor(x, y, isBurst = false) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.radius = Math.random() * 2 + 1;
                this.baseRadius = this.radius;
                this.hue = Math.random() * 60 + 180; // Blue-cyan range
                this.life = 1;
                this.decay = isBurst ? 0.005 : 0;
                this.isBurst = isBurst;
            }
            
            update(mouseX, mouseY, mousePressed) {
                // Mouse attraction
                if (mouseX !== null) {
                    const dx = mouseX - this.x;
                    const dy = mouseY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < MOUSE_INFLUENCE) {
                        const force = (MOUSE_INFLUENCE - dist) / MOUSE_INFLUENCE;
                        this.vx += (dx / dist) * force * MOUSE_GRAVITY * 0.1;
                        this.vy += (dy / dist) * force * MOUSE_GRAVITY * 0.1;
                    }
                }
                
                // Apply velocity
                this.x += this.vx;
                this.y += this.vy;
                
                // Friction
                this.vx *= 0.99;
                this.vy *= 0.99;
                
                // Boundary wrap
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
                
                // Decay for burst particles
                if (this.isBurst) {
                    this.life -= this.decay;
                    this.radius = this.baseRadius * this.life;
                }
                
                // Pulse effect
                this.radius = this.baseRadius + Math.sin(Date.now() * 0.003 + this.x * 0.01) * 0.5;
            }
            
            draw() {
                if (this.life <= 0) return;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, Math.max(0, this.radius), 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${this.life})`;
                ctx.fill();
                
                // Glow
                ctx.shadowBlur = 15;
                ctx.shadowColor = `hsla(${this.hue}, 80%, 60%, 0.5)`;
            }
        }
        
        // Initialize particles
        let particles = [];
        
        function initParticles() {
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(new Particle());
            }
        }
        
        initParticles();
        
        // Mouse tracking
        let mouseX = null;
        let mouseY = null;
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('mouseleave', () => {
            mouseX = null;
            mouseY = null;
        });
        
        canvas.addEventListener('click', (e) => {
            // Create burst of particles
            for (let i = 0; i < 30; i++) {
                const p = new Particle(e.clientX, e.clientY, true);
                p.vx = (Math.random() - 0.5) * 10;
                p.vy = (Math.random() - 0.5) * 10;
                particles.push(p);
            }
            
            // Remove dead particles periodically
            if (particles.length > PARTICLE_COUNT + 100) {
                particles = particles.filter(p => !p.isBurst || p.life > 0);
            }
        });
        
        // Draw connections between nearby particles
        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                const p1 = particles[i];
                if (p1.life <= 0) continue;
                
                for (let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    if (p2.life <= 0) continue;
                    
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < CONNECTION_DISTANCE) {
                        const opacity = (1 - dist / CONNECTION_DISTANCE) * 0.3;
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `hsla(${(p1.hue + p2.hue) / 2}, 70%, 50%, ${opacity * Math.min(p1.life, p2.life)})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }
        }
        
        // Main animation loop
        function animate() {
            // Clear with fade effect for trails
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            ctx.shadowBlur = 0;
            
            // Update and draw particles
            particles.forEach(p => {
                p.update(mouseX, mouseY);
                p.draw();
            });
            
            // Draw connections
            drawConnections();
            
            requestAnimationFrame(animate);
        }
        
        // Handle resize
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
        
        // Start animation
        animate();
        
        // Auto-movement when mouse is idle
        let autoAngle = 0;
        setInterval(() => {
            if (mouseX === null) {
                autoAngle += 0.02;
                mouseX = width / 2 + Math.cos(autoAngle) * 200;
                mouseY = height / 2 + Math.sin(autoAngle * 1.3) * 150;
            }
        }, 16);
    </script>
</body>
</html>
