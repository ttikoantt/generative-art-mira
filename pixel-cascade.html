<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Cascade - Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
            cursor: pointer;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #ffffff;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 15px;
            border-radius: 5px;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">🎨 Pixel Cascade - Click to change colors</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let pixelSize = 8;
        let pixels = [];
        let colorPalette = 0;
        let time = 0;

        const palettes = [
            ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F'],
            ['#FF006E', '#8338EC', '#3A86FF', '#FB5607', '#FFBE0B', '#06FFA5'],
            ['#00F5D4', '#00BBF9', '#F15BB5', '#FEE440', '#9B5DE5', '#00BBF9'],
            ['#FFB5E8', '#B5DEFF', '#BFFCC6', '#FFF5BA', '#DCD3FF', '#FFABAB'],
            ['#2EC4B6', '#E71D36', '#011627', '#FDFFFC', '#FF9F1C', '#CBF3F0']
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Pixel {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.floor(Math.random() * (width / pixelSize)) * pixelSize;
                this.y = -pixelSize;
                this.speed = Math.random() * 3 + 2;
                this.colorIndex = Math.floor(Math.random() * 6);
                this.alpha = Math.random() * 0.5 + 0.5;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = Math.random() * 0.05 + 0.02;
            }

            update() {
                this.y += this.speed;
                this.wobble += this.wobbleSpeed;

                if (this.y > height + pixelSize) {
                    this.reset();
                }
            }

            draw() {
                const palette = palettes[colorPalette];
                const wobbleX = Math.sin(this.wobble) * pixelSize * 0.3;

                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = palette[this.colorIndex];
                ctx.fillRect(
                    this.x + wobbleX,
                    this.y,
                    pixelSize,
                    pixelSize
                );
                ctx.restore();
            }
        }

        function init() {
            pixels = [];
            const numPixels = Math.floor((width * height) / (pixelSize * pixelSize * 10));
            for (let i = 0; i < numPixels; i++) {
                pixels.push(new Pixel());
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            time += 0.01;

            pixels.forEach(pixel => {
                pixel.update();
                pixel.draw();
            });

            requestAnimationFrame(animate);
        }

        function changeColors() {
            colorPalette = (colorPalette + 1) % palettes.length;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        canvas.addEventListener('click', changeColors);

        window.addEventListener('resize', () => {
            resize();
            init();
        });

        resize();
        init();
        animate();
    </script>
</body>
</html>
