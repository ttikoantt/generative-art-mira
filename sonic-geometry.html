<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>音の幾何学 - Sonic Geometry</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            touch-action: manipulation;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .stats {
            position: fixed;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .control-btn {
            background: rgba(102, 126, 234, 0.8);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .control-btn:hover {
            transform: scale(1.05);
            background: rgba(102, 126, 234, 1);
        }

        .start-btn {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            transform: translate(-50%, -50%) scale(1.05);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 0.75rem;
                padding: 0 20px;
            }

            .control-btn {
                padding: 10px 16px;
                font-size: 0.8rem;
            }

            .start-btn {
                padding: 15px 30px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="info">🎵 音に反応して幾何学パターンが広がります</div>
    <div class="stats">Volume: <span id="volumeLevel">0</span>% | Bass: <span id="bassLevel">0</span>% | Mid: <span id="midLevel">0</span>% | Treble: <span id="trebleLevel">0</span>%</div>
    
    <div class="controls">
        <button class="control-btn" id="toggleBtn">🎨 図形切替</button>
        <button class="control-btn" id="colorBtn">🌈 色モード切替</button>
    </div>
    
    <button class="start-btn" id="startBtn">🎤 マイクを開始</button>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const volumeLevelEl = document.getElementById('volumeLevel');
        const bassLevelEl = document.getElementById('bassLevel');
        const midLevelEl = document.getElementById('midLevel');
        const trebleLevelEl = document.getElementById('trebleLevel');
        const startBtn = document.getElementById('startBtn');
        const toggleBtn = document.getElementById('toggleBtn');
        const colorBtn = document.getElementById('colorBtn');

        let width, height;
        let audioCtx = null;
        let analyser = null;
        let microphone = null;
        let dataArray = null;
        let isRunning = false;
        let hueOffset = 0;
        let shapeMode = 0;
        let colorMode = 0;

        const shapeModes = ['circle', 'square', 'triangle', 'hexagon'];
        const colorModes = ['rainbow', 'frequency', 'mono', 'gradient'];

        async function startAudio() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                microphone = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                
                analyser.fftSize = 512;
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                
                microphone.connect(analyser);
                
                isRunning = true;
                startBtn.style.display = 'none';
                animate();
            } catch (err) {
                console.error('マイクアクセスエラー:', err);
                alert('マイクへのアクセスが許可されていません。');
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function getAverageVolume(data, start = 0, end = data.length) {
            let sum = 0;
            for (let i = start; i < end; i++) {
                sum += data[i];
            }
            return sum / (end - start);
        }

        function getFrequencyBands(data) {
            const bass = getAverageVolume(data, 0, Math.floor(data.length * 0.1));
            const mid = getAverageVolume(data, Math.floor(data.length * 0.1), Math.floor(data.length * 0.5));
            const treble = getAverageVolume(data, Math.floor(data.length * 0.5), data.length);
            
            return { bass, mid, treble };
        }

        function getFrequencyColor(bass, mid, treble, mode) {
            switch (mode) {
                case 0: // rainbow
                    return hueOffset;
                    
                case 1: // frequency-based
                    const bassHue = 0;       // Red for bass
                    const midHue = 120;      // Green for mid
                    const trebleHue = 240;   // Blue for treble
                    
                    const total = bass + mid + treble;
                    if (total === 0) return 0;
                    
                    return (bassHue * (bass / total) + 
                           midHue * (mid / total) + 
                           trebleHue * (treble / total));
                    
                case 2: // mono
                    return 200;
                    
                case 3: // gradient
                    return (hueOffset + (bass / 255) * 60) % 360;
                    
                default:
                    return hueOffset;
            }
        }

        function drawShape(x, y, radius, shape, hue, rotation, glowIntensity = 1) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotation);
            
            const alpha = 0.3 + (glowIntensity * 0.5);
            
            // Outer glow
            const outerGradient = ctx.createRadialGradient(0, 0, radius * 0.8, 0, 0, radius * 1.5);
            outerGradient.addColorStop(0, `hsla(${hue}, 100%, 70%, ${alpha * 0.8})`);
            outerGradient.addColorStop(0.5, `hsla(${hue}, 100%, 50%, ${alpha * 0.3})`);
            outerGradient.addColorStop(1, `hsla(${hue}, 100%, 30%, 0)`);
            
            ctx.fillStyle = outerGradient;
            ctx.beginPath();
            ctx.arc(0, 0, radius * 1.5, 0, Math.PI * 2);
            ctx.fill();
            
            // Main shape
            const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, radius);
            gradient.addColorStop(0, `hsla(${hue}, 100%, 80%, ${alpha})`);
            gradient.addColorStop(0.7, `hsla(${hue}, 100%, 60%, ${alpha * 0.6})`);
            gradient.addColorStop(1, `hsla(${hue}, 100%, 40%, ${alpha * 0.3})`);
            
            ctx.fillStyle = gradient;
            ctx.strokeStyle = `hsla(${hue}, 100%, 90%, ${alpha * 0.8})`;
            ctx.lineWidth = 3;
            
            ctx.beginPath();
            
            switch (shape) {
                case 'circle':
                    ctx.arc(0, 0, radius, 0, Math.PI * 2);
                    break;
                    
                case 'square':
                    ctx.rect(-radius, -radius, radius * 2, radius * 2);
                    break;
                    
                case 'triangle':
                    for (let i = 0; i < 3; i++) {
                        const angle = (i * Math.PI * 2 / 3) - Math.PI / 2;
                        const x = Math.cos(angle) * radius;
                        const y = Math.sin(angle) * radius;
                        if (i === 0) {
                            ctx.moveTo(x, y);
                        } else {
                            ctx.lineTo(x, y);
                        }
                    }
                    ctx.closePath();
                    break;
                    
                case 'hexagon':
                    for (let i = 0; i < 6; i++) {
                        const angle = (i * Math.PI * 2 / 6);
                        const x = Math.cos(angle) * radius;
                        const y = Math.sin(angle) * radius;
                        if (i === 0) {
                            ctx.moveTo(x, y);
                        } else {
                            ctx.lineTo(x, y);
                        }
                    }
                    ctx.closePath();
                    break;
            }
            
            ctx.fill();
            ctx.stroke();
            
            ctx.restore();
        }

        function animate() {
            if (!isRunning) return;
            
            requestAnimationFrame(animate);
            
            // Get audio data
            analyser.getByteFrequencyData(dataArray);
            
            const volume = getAverageVolume(dataArray);
            const { bass, mid, treble } = getFrequencyBands(dataArray);
            
            volumeLevelEl.textContent = Math.round((volume / 255) * 100);
            bassLevelEl.textContent = Math.round((bass / 255) * 100);
            midLevelEl.textContent = Math.round((mid / 255) * 100);
            trebleLevelEl.textContent = Math.round((treble / 255) * 100);
            
            // Clear canvas with fade effect
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // Update hue offset
            hueOffset = (hueOffset + 0.5) % 360;
            
            // Get color based on frequency
            const mainHue = getFrequencyColor(bass, mid, treble, colorMode);
            
            // Calculate radius based on frequency bands
            const bassRadius = 50 + (bass / 255) * 150;
            const midRadius = 30 + (mid / 255) * 100;
            const trebleRadius = 20 + (treble / 255) * 80;
            
            // Draw main shape with bass
            const rotation = Date.now() * 0.001;
            drawShape(
                width / 2,
                height / 2,
                bassRadius,
                shapeModes[shapeMode],
                mainHue,
                rotation,
                bass / 255
            );
            
            // Draw mid-range shapes
            const midCount = 4;
            for (let i = 0; i < midCount; i++) {
                const angle = (i / midCount) * Math.PI * 2 + rotation * 1.5;
                const orbitRadius = 100 + (mid / 255) * 80;
                const x = width / 2 + Math.cos(angle) * orbitRadius;
                const y = height / 2 + Math.sin(angle) * orbitRadius;
                const hue = (mainHue + i * 30) % 360;
                
                drawShape(
                    x,
                    y,
                    midRadius,
                    shapeModes[(shapeMode + i) % shapeModes.length],
                    hue,
                    rotation + i * 0.3,
                    mid / 255
                );
            }
            
            // Draw treble shapes
            const trebleCount = 8;
            for (let i = 0; i < trebleCount; i++) {
                const angle = (i / trebleCount) * Math.PI * 2 + rotation * 2;
                const orbitRadius = 200 + (treble / 255) * 60;
                const x = width / 2 + Math.cos(angle) * orbitRadius;
                const y = height / 2 + Math.sin(angle) * orbitRadius;
                const hue = (mainHue + 180 + i * 20) % 360;
                
                drawShape(
                    x,
                    y,
                    trebleRadius,
                    'circle',
                    hue,
                    rotation * 3 + i * 0.2,
                    treble / 255
                );
            }
            
            // Draw frequency bars
            const barCount = 64;
            const barWidth = width / barCount;
            
            for (let i = 0; i < barCount; i++) {
                const barHeight = (dataArray[i] / 255) * 150;
                const barHue = (mainHue + (i / barCount) * 120) % 360;
                
                const gradient = ctx.createLinearGradient(0, height - barHeight, 0, height);
                gradient.addColorStop(0, `hsla(${barHue}, 100%, 70%, 0.8)`);
                gradient.addColorStop(1, `hsla(${barHue}, 100%, 50%, 0.2)`);
                
                ctx.fillStyle = gradient;
                ctx.fillRect(
                    i * barWidth,
                    height - barHeight,
                    barWidth - 2,
                    barHeight
                );
            }
        }

        // Event listeners
        window.addEventListener('resize', resize);
        resize();

        startBtn.addEventListener('click', startAudio);

        toggleBtn.addEventListener('click', () => {
            shapeMode = (shapeMode + 1) % shapeModes.length;
        });

        colorBtn.addEventListener('click', () => {
            colorMode = (colorMode + 1) % colorModes.length;
        });
    </script>
</body>
</html>
