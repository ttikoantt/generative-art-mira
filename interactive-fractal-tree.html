<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Interactive Fractal Tree | Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            touch-action: none;
        }

        canvas {
            display: block;
            background: radial-gradient(circle at bottom, #1a1a2e 0%, #0a0a0f 100%);
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 12px;
            color: #fff;
            font-size: 13px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-item {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .control-item:last-child {
            margin-bottom: 0;
        }

        .control-item label {
            min-width: 80px;
        }

        .control-item input[type="range"] {
            flex: 1;
            max-width: 120px;
        }

        .control-item .value {
            min-width: 50px;
            text-align: right;
            font-family: monospace;
            color: #00ffcc;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 204, 0.2);
            border: 1px solid rgba(0, 255, 204, 0.5);
            color: #00ffcc;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 204, 0.3);
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
        }

        @media (max-width: 600px) {
            .controls {
                top: 10px;
                left: 10px;
                right: 60px;
                padding: 10px;
                font-size: 11px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <div class="control-item">
            <label>角度</label>
            <input type="range" id="angle" min="5" max="60" value="25">
            <span class="value" id="angleValue">25°</span>
        </div>
        <div class="control-item">
            <label>深さ</label>
            <input type="range" id="depth" min="5" max="14" value="10">
            <span class="value" id="depthValue">10</span>
        </div>
        <div class="control-item">
            <label>長さ</label>
            <input type="range" id="length" min="50" max="200" value="120">
            <span class="value" id="lengthValue">120</span>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="info">
        マウス/タッチで制御 | スクロールで拡大
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let mouseX = 0, mouseY = 0;
        let targetAngle = 25;
        let scale = 1;
        let time = 0;

        // 設定
        const config = {
            angle: 25,
            depth: 10,
            length: 120,
            branchRatio: 0.7
        };

        // キャンバスサイズ設定
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        // 色相計算
        function getColor(depth, maxDepth) {
            const hue = (depth / maxDepth) * 60 + time * 20;
            const saturation = 80 + (depth / maxDepth) * 20;
            const lightness = 50 + (depth / maxDepth) * 20;
            return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
        }

        // フラクタルツリー描画
        function drawTree(x, y, len, angle, depth, maxDepth) {
            if (depth === 0) return;

            // 終点計算
            const endX = x + len * Math.sin(angle);
            const endY = y - len * Math.cos(angle);

            // 線を描画
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);

            // 色
            const hue = (depth / maxDepth) * 60 + time * 20;
            const saturation = 80;
            const lightness = 50 + (1 - depth / maxDepth) * 20;
            ctx.strokeStyle = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
            ctx.lineWidth = depth * 0.8 * scale;
            ctx.lineCap = 'round';
            ctx.stroke();

            // マウスの影響
            const dx = endX - mouseX;
            const dy = endY - mouseY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const mouseInfluence = Math.max(0, 1 - dist / 300);

            // 次の分岐
            const newLen = len * config.branchRatio;
            const angleRad = config.angle * Math.PI / 180;
            const sway = Math.sin(time * 2 + depth * 0.5) * 0.05;

            drawTree(endX, endY, newLen, angle - angleRad + sway + mouseInfluence * 0.2, depth - 1, maxDepth);
            drawTree(endX, endY, newLen, angle + angleRad + sway + mouseInfluence * 0.2, depth - 1, maxDepth);
        }

        // メイン描画
        function draw() {
            // 背景をクリア
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 保存
            ctx.save();

            // スケール適用
            ctx.scale(scale, scale);

            // ツリー描画
            drawTree(
                width / 2 / scale,
                height,
                config.length,
                0,
                config.depth,
                config.depth
            );

            // 復元
            ctx.restore();

            time += 0.01;
            requestAnimationFrame(draw);
        }

        // イベントリスナー
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            scale += e.deltaY * -0.001;
            scale = Math.min(Math.max(0.5, scale), 2);
        });

        // コントロール
        document.getElementById('angle').addEventListener('input', (e) => {
            config.angle = parseInt(e.target.value);
            document.getElementById('angleValue').textContent = config.angle + '°';
        });

        document.getElementById('depth').addEventListener('input', (e) => {
            config.depth = parseInt(e.target.value);
            document.getElementById('depthValue').textContent = config.depth;
        });

        document.getElementById('length').addEventListener('input', (e) => {
            config.length = parseInt(e.target.value);
            document.getElementById('lengthValue').textContent = config.length;
        });

        // 全画面
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        resize();
        mouseX = width / 2;
        mouseY = height / 3;
        draw();
    </script>
</body>
</html>
