<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>インタラクティブ フラクタルツリー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }

        #canvas {
            display: block;
            cursor: crosshair;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 280px;
            z-index: 100;
        }

        .controls h2 {
            margin: 0 0 15px 0;
            font-size: 18px;
            color: #333;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #666;
            font-weight: 500;
        }

        .control-group input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        .control-group input[type="color"] {
            width: 100%;
            height: 35px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .value {
            font-size: 11px;
            color: #667eea;
            font-weight: 600;
            margin-top: 3px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 100;
            display: none;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            color: #666;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .controls {
                max-width: none;
                left: 10px;
                right: 10px;
                top: 10px;
                max-height: 50vh;
                overflow-y: auto;
            }

            .controls.hidden {
                display: none;
            }

            .toggle {
                display: block;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls" id="controls">
        <h2>🌳 フラクタルツリー</h2>

        <div class="control-group">
            <label>分岐角度: <span id="angleValue">25</span>°</label>
            <input type="range" id="angle" min="5" max="60" value="25">
        </div>

        <div class="control-group">
            <label>再帰の深さ: <span id="depthValue">10</span></label>
            <input type="range" id="depth" min="3" max="14" value="10">
        </div>

        <div class="control-group">
            <label>枝の長さ: <span id="lengthValue">120</span>px</label>
            <input type="range" id="length" min="50" max="200" value="120">
        </div>

        <div class="control-group">
            <label>枝の比率: <span id="ratioValue">0.75</span></label>
            <input type="range" id="ratio" min="50" max="90" value="75">
        </div>

        <div class="control-group">
            <label>開始色</label>
            <input type="color" id="startColor" value="#ff6b6b">
        </div>

        <div class="control-group">
            <label>終了色</label>
            <input type="color" id="endColor" value="#4ecdc4">
        </div>

        <button class="btn" id="randomize">🎲 ランダム生成</button>
    </div>

    <button class="toggle" id="toggle">⚙️ 設定</button>

    <div class="info">🖱️ クリックで位置を変更</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let angle = 25;
        let depth = 10;
        let length = 120;
        let ratio = 0.75;
        let startColor = '#ff6b6b';
        let endColor = '#4ecdc4';
        let startX = window.innerWidth / 2;
        let startY = window.innerHeight;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            startY = canvas.height;
            startX = canvas.width / 2;
            draw();
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        function lerpColor(color1, color2, t) {
            const c1 = hexToRgb(color1);
            const c2 = hexToRgb(color2);
            const r = Math.round(c1.r + (c2.r - c1.r) * t);
            const g = Math.round(c1.g + (c2.g - c1.g) * t);
            const b = Math.round(c1.b + (c2.b - c1.b) * t);
            return `rgb(${r}, ${g}, ${b})`;
        }

        function drawBranch(x, y, len, angle, currentDepth) {
            if (currentDepth === 0) return;

            const endX = x + len * Math.sin(angle * Math.PI / 180);
            const endY = y - len * Math.cos(angle * Math.PI / 180);

            const t = 1 - currentDepth / depth;
            ctx.strokeStyle = lerpColor(startColor, endColor, t);
            ctx.lineWidth = currentDepth * 0.8;
            ctx.lineCap = 'round';

            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.stroke();

            drawBranch(endX, endY, len * ratio, angle - parseFloat(document.getElementById('angle').value), currentDepth - 1);
            drawBranch(endX, endY, len * ratio, angle + parseFloat(document.getElementById('angle').value), currentDepth - 1);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 背景グラデーション
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(1, '#764ba2');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawBranch(startX, startY, length, 0, depth);
        }

        // コントロールイベント
        document.getElementById('angle').addEventListener('input', (e) => {
            angle = parseFloat(e.target.value);
            document.getElementById('angleValue').textContent = angle;
            draw();
        });

        document.getElementById('depth').addEventListener('input', (e) => {
            depth = parseInt(e.target.value);
            document.getElementById('depthValue').textContent = depth;
            draw();
        });

        document.getElementById('length').addEventListener('input', (e) => {
            length = parseInt(e.target.value);
            document.getElementById('lengthValue').textContent = length;
            draw();
        });

        document.getElementById('ratio').addEventListener('input', (e) => {
            ratio = parseInt(e.target.value) / 100;
            document.getElementById('ratioValue').textContent = ratio.toFixed(2);
            draw();
        });

        document.getElementById('startColor').addEventListener('input', (e) => {
            startColor = e.target.value;
            draw();
        });

        document.getElementById('endColor').addEventListener('input', (e) => {
            endColor = e.target.value;
            draw();
        });

        document.getElementById('randomize').addEventListener('click', () => {
            angle = Math.floor(Math.random() * 50) + 10;
            depth = Math.floor(Math.random() * 6) + 6;
            length = Math.floor(Math.random() * 100) + 80;
            ratio = (Math.floor(Math.random() * 30) + 60) / 100;

            const randomColor = () => '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
            startColor = randomColor();
            endColor = randomColor();

            document.getElementById('angle').value = angle;
            document.getElementById('depth').value = depth;
            document.getElementById('length').value = length;
            document.getElementById('ratio').value = ratio * 100;
            document.getElementById('startColor').value = startColor;
            document.getElementById('endColor').value = endColor;

            document.getElementById('angleValue').textContent = angle;
            document.getElementById('depthValue').textContent = depth;
            document.getElementById('lengthValue').textContent = length;
            document.getElementById('ratioValue').textContent = ratio.toFixed(2);

            draw();
        });

        // キャンバスクリック
        canvas.addEventListener('click', (e) => {
            startX = e.clientX;
            startY = e.clientY;
            draw();
        });

        // モバイル toggle
        const toggle = document.getElementById('toggle');
        const controls = document.getElementById('controls');

        toggle.addEventListener('click', () => {
            controls.classList.toggle('hidden');
        });

        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
