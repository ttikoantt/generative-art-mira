<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Interactive Fractal Tree</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            padding: 10px;
        }
        h1 {
            color: #fff;
            font-size: clamp(1.5rem, 5vw, 3rem);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            letter-spacing: 2px;
        }
        .subtitle {
            color: rgba(255,255,255,0.7);
            font-size: clamp(0.8rem, 2vw, 1rem);
            margin-bottom: 15px;
        }
        canvas {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            max-width: 100%;
            height: auto;
            touch-action: none;
        }
        .controls {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: clamp(0.8rem, 2vw, 1rem);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(102,126,234,0.6);
        }
        .btn:active {
            transform: translateY(0);
        }
        .fullscreen-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        @media (max-width: 768px) {
            .btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌳 Interactive Fractal Tree</h1>
        <p class="subtitle">マウス/タッチで動かして美しいフラクタルを生成</p>
        <canvas id="canvas"></canvas>
        <div class="controls">
            <button class="btn" onclick="randomize()">🎨 ランダム生成</button>
            <button class="btn" onclick="toggleAnimation()">✨ アニメーション</button>
            <button class="btn fullscreen-btn" onclick="toggleFullscreen()">📺 全画面</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let mouseX = 0;
        let mouseY = 0;
        let angle = Math.PI / 4;
        let lengthFactor = 0.7;
        let depth = 10;
        let animating = true;
        let time = 0;
        
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 800);
            const maxHeight = Math.min(window.innerHeight - 250, 500);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        function drawTree(x, y, len, angle, depth, branchWidth) {
            if (depth === 0) return;
            
            const endX = x + len * Math.cos(angle);
            const endY = y + len * Math.sin(angle);
            
            // 色のグラデーション
            const hue = (depth / 10) * 60 + time * 0.5;
            const saturation = 70 + Math.sin(time * 0.02) * 20;
            ctx.strokeStyle = `hsl(${hue}, ${saturation}%, ${50 + depth * 5}%)`;
            ctx.lineWidth = branchWidth;
            ctx.lineCap = 'round';
            
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.stroke();
            
            const newLen = len * lengthFactor;
            const newWidth = branchWidth * 0.7;
            const angleOffset = angle * Math.sin(time * 0.01) * 0.5;
            
            drawTree(endX, endY, newLen, angle - angle + angleOffset, depth - 1, newWidth);
            drawTree(endX, endY, newLen, angle + angle + angleOffset, depth - 1, newWidth);
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const startX = canvas.width / 2;
            const startY = canvas.height;
            const startLength = canvas.height * 0.25;
            
            drawTree(startX, startY, startLength, -Math.PI / 2, depth, 10);
            
            if (animating) {
                time += 0.5;
            }
            
            requestAnimationFrame(draw);
        }
        
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
            
            angle = (mouseX / canvas.width) * Math.PI;
            lengthFactor = 0.5 + (mouseY / canvas.height) * 0.3;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            mouseX = touch.clientX - rect.left;
            mouseY = touch.clientY - rect.top;
            
            angle = (mouseX / canvas.width) * Math.PI;
            lengthFactor = 0.5 + (mouseY / canvas.height) * 0.3;
        });
        
        function randomize() {
            angle = Math.random() * Math.PI;
            lengthFactor = 0.5 + Math.random() * 0.3;
            depth = 8 + Math.floor(Math.random() * 4);
        }
        
        function toggleAnimation() {
            animating = !animating;
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        draw();
    </script>
</body>
</html>
