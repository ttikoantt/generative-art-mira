<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Fractal Tree | Mira's Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        canvas {
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .controls {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-bottom: 10px;
        }

        .control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .control input[type="range"] {
            width: 120px;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }

        .control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        .value {
            color: #667eea;
            font-size: 0.85rem;
            font-weight: 600;
            min-width: 40px;
        }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 0.85rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.2rem;
            }

            .controls-row {
                flex-direction: column;
                align-items: center;
            }

            .control {
                width: 100%;
                justify-content: center;
            }

            .control input[type="range"] {
                width: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌳 Interactive Fractal Tree</h1>
            <p>フラクタルツリー - パラメータを調整して木を成長させよう</p>
        </div>

        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>

        <div class="controls">
            <div class="controls-row">
                <div class="control">
                    <label>深さ:</label>
                    <input type="range" id="depth" min="1" max="12" value="9">
                    <span class="value" id="depthValue">9</span>
                </div>
                <div class="control">
                    <label>角度:</label>
                    <input type="range" id="angle" min="0" max="90" value="25">
                    <span class="value" id="angleValue">25°</span>
                </div>
                <div class="control">
                    <label>長さ:</label>
                    <input type="range" id="length" min="50" max="150" value="100">
                    <span class="value" id="lengthValue">100</span>
                </div>
                <div class="control">
                    <label>太さ:</label>
                    <input type="range" id="width" min="1" max="10" value="4">
                    <span class="value" id="widthValue">4</span>
                </div>
            </div>
            <div class="buttons">
                <button class="btn" onclick="randomize()">🎲 ランダム</button>
                <button class="btn" onclick="animateGrowth()">🌱 成長アニメーション</button>
            </div>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // パラメータ
        let depth = 9;
        let angle = 25;
        let length = 100;
        let width = 4;

        // キャンバスサイズ設定
        function resizeCanvas() {
            const container = document.querySelector('.canvas-container');
            const size = Math.min(container.clientWidth - 40, container.clientHeight - 40, 600);
            canvas.width = size;
            canvas.height = size;
            draw();
        }

        // 色生成（グラデーション）
        function getColor(currentDepth, maxDepth) {
            const hue = 120 + (currentDepth / maxDepth) * 60; // 緑から黄色へ
            const lightness = 30 + (currentDepth / maxDepth) * 40;
            return `hsl(${hue}, 70%, ${lightness}%)`;
        }

        // フラクタルツリー描画
        function drawTree(startX, startY, len, angle, depth, maxDepth) {
            ctx.beginPath();
            ctx.save();

            ctx.translate(startX, startY);
            ctx.rotate(angle * Math.PI / 180);

            // 枝を描画
            const currentWidth = Math.max(1, width * (depth / maxDepth));
            ctx.lineWidth = currentWidth;
            ctx.strokeStyle = getColor(maxDepth - depth, maxDepth);
            ctx.lineCap = 'round';

            ctx.moveTo(0, 0);
            ctx.lineTo(0, -len);
            ctx.stroke();

            if (depth > 0) {
                // 左の枝
                ctx.translate(0, -len);
                ctx.save();
                drawTree(0, 0, len * 0.75, -this.angle, depth - 1, maxDepth);
                ctx.restore();

                // 右の枝
                ctx.save();
                drawTree(0, 0, len * 0.75, this.angle, depth - 1, maxDepth);
                ctx.restore();
            }

            ctx.restore();
        }

        // メイン描画関数
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const startX = canvas.width / 2;
            const startY = canvas.height - 50;
            drawTree(startX, startY, length, 0, depth, depth);
        }

        // 成長アニメーション
        function animateGrowth() {
            let animDepth = 1;
            const animInterval = setInterval(() => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const startX = canvas.width / 2;
                const startY = canvas.height - 50;
                drawTree(startX, startY, length, 0, animDepth, depth);

                animDepth++;
                if (animDepth > depth) {
                    clearInterval(animInterval);
                }
            }, 300);
        }

        // ランダム化
        function randomize() {
            depth = Math.floor(Math.random() * 5) + 7;
            angle = Math.floor(Math.random() * 40) + 15;
            length = Math.floor(Math.random() * 60) + 80;

            document.getElementById('depth').value = depth;
            document.getElementById('angle').value = angle;
            document.getElementById('length').value = length;
            updateValues();
            draw();
        }

        // 値更新
        function updateValues() {
            document.getElementById('depthValue').textContent = depth;
            document.getElementById('angleValue').textContent = angle + '°';
            document.getElementById('lengthValue').textContent = length;
            document.getElementById('widthValue').textContent = width;
        }

        // イベントリスナー
        document.getElementById('depth').addEventListener('input', (e) => {
            depth = parseInt(e.target.value);
            updateValues();
            draw();
        });

        document.getElementById('angle').addEventListener('input', (e) => {
            angle = parseInt(e.target.value);
            updateValues();
            draw();
        });

        document.getElementById('length').addEventListener('input', (e) => {
            length = parseInt(e.target.value);
            updateValues();
            draw();
        });

        document.getElementById('width').addEventListener('input', (e) => {
            width = parseInt(e.target.value);
            updateValues();
            draw();
        });

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>
