<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Spiral Dance - 幾何学的スパイラルの踊り</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            overflow: hidden;
            touch-action: none;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        #controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(20, 20, 20, 0.9);
            padding: 15px;
            border-radius: 12px;
            color: #fff;
            z-index: 100;
            font-size: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 280px;
        }

        #controls h2 {
            margin: 0 0 10px 0;
            font-size: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .control-group {
            margin: 8px 0;
        }

        .control-group label {
            display: block;
            margin-bottom: 3px;
            color: #aaa;
            font-size: 11px;
        }

        .control-group input[type="range"] {
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: #333;
            outline: none;
            -webkit-appearance: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            cursor: pointer;
        }

        .btn {
            padding: 6px 12px;
            margin: 5px 5px 5px 0;
            border: none;
            border-radius: 6px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            cursor: pointer;
            font-size: 11px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: scale(0.95);
        }

        #fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        #info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            z-index: 100;
        }

        .color-palette {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }

        .color-btn {
            width: 24px;
            height: 24px;
            border: 2px solid transparent;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .color-btn:hover {
            transform: scale(1.2);
        }

        .color-btn.active {
            border-color: white;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="controls">
        <h2>🌀 Spiral Dance</h2>
        <div class="control-group">
            <label>螺旋の数: <span id="spiralCountVal">5</span></label>
            <input type="range" id="spiralCount" min="3" max="12" value="5">
        </div>
        <div class="control-group">
            <label>回転速度: <span id="rotationSpeedVal">1.0</span></label>
            <input type="range" id="rotationSpeed" min="0.1" max="3" step="0.1" value="1">
        </div>
        <div class="control-group">
            <label>拡大率: <span id="scaleVal">1.0</span></label>
            <input type="range" id="scale" min="0.5" max="2" step="0.1" value="1">
        </div>
        <div class="control-group">
            <label>線の太さ: <span id="lineWidthVal">2</span></label>
            <input type="range" id="lineWidth" min="1" max="5" step="0.5" value="2">
        </div>
        <div class="control-group">
            <label>カラーパレット</label>
            <div class="color-palette">
                <button class="color-btn active" data-palette="rainbow" style="background: linear-gradient(135deg, #ff0000, #00ff00, #0000ff);"></button>
                <button class="color-btn" data-palette="sunset" style="background: linear-gradient(135deg, #ff6b6b, #feca57);"></button>
                <button class="color-btn" data-palette="ocean" style="background: linear-gradient(135deg, #0652DD, #1289A7);"></button>
                <button class="color-btn" data-palette="aurora" style="background: linear-gradient(135deg, #00ff87, #60efff);"></button>
                <button class="color-btn" data-palette="neon" style="background: linear-gradient(135deg, #ff00ff, #00ffff);"></button>
            </div>
        </div>
        <button class="btn" onclick="toggleAnimation()">一時停止/再生</button>
        <button class="btn" onclick="resetCanvas()">リセット</button>
    </div>

    <button id="fullscreen" class="btn" onclick="toggleFullscreen()">全画面</button>

    <div id="info">マウスを動かすと変化</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        let mouseX = 0, mouseY = 0;
        let isAnimating = true;
        let animationId;
        let time = 0;

        // Settings
        let settings = {
            spiralCount: 5,
            rotationSpeed: 1,
            scale: 1,
            lineWidth: 2,
            palette: 'rainbow'
        };

        // Color palettes
        const palettes = {
            rainbow: (t) => {
                const r = Math.sin(t * 0.3) * 127 + 128;
                const g = Math.sin(t * 0.3 + 2) * 127 + 128;
                const b = Math.sin(t * 0.3 + 4) * 127 + 128;
                return `rgb(${r}, ${g}, ${b})`;
            },
            sunset: (t) => {
                const r = Math.sin(t * 0.2) * 55 + 200;
                const g = Math.sin(t * 0.2 + 1.5) * 55 + 100;
                const b = Math.sin(t * 0.2 + 3) * 55 + 80;
                return `rgb(${r}, ${g}, ${b})`;
            },
            ocean: (t) => {
                const r = Math.sin(t * 0.2) * 30 + 20;
                const g = Math.sin(t * 0.2 + 2) * 50 + 100;
                const b = Math.sin(t * 0.2 + 4) * 55 + 200;
                return `rgb(${r}, ${g}, ${b})`;
            },
            aurora: (t) => {
                const r = Math.sin(t * 0.3) * 50 + 50;
                const g = Math.sin(t * 0.3 + 1) * 100 + 155;
                const b = Math.sin(t * 0.3 + 2) * 55 + 200;
                return `rgb(${r}, ${g}, ${b})`;
            },
            neon: (t) => {
                const r = Math.sin(t * 0.4) * 127 + 128;
                const g = Math.sin(t * 0.4 + Math.PI) * 127 + 128;
                const b = 255;
                return `rgb(${r}, ${g}, ${b})`;
            }
        };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        function drawSpiral(spiralIndex, totalSpirals) {
            const maxRadius = Math.min(width, height) * 0.45 * settings.scale;
            const angleOffset = (Math.PI * 2 / totalSpirals) * spiralIndex;

            ctx.beginPath();
            ctx.lineWidth = settings.lineWidth;

            for (let i = 0; i < 500; i++) {
                const t = i * 0.05;
                const angle = t + angleOffset + time * settings.rotationSpeed * 0.02;

                // Mouse influence
                const mouseInfluence = {
                    x: (mouseX - centerX) * 0.001 * (1 + i * 0.001),
                    y: (mouseY - centerY) * 0.001 * (1 + i * 0.001)
                };

                const radius = (i / 500) * maxRadius;

                // Add some wobble based on mouse
                const wobble = Math.sin(t * 3 + time * 0.05) * 10 * (1 + mouseInfluence.x);

                const x = centerX + Math.cos(angle + mouseInfluence.y) * (radius + wobble);
                const y = centerY + Math.sin(angle + mouseInfluence.y) * (radius + wobble);

                const color = palettes[settings.palette](t + spiralIndex + time * 0.05);

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }

                // Draw point
                ctx.fillStyle = color;
                ctx.fillRect(x - 1, y - 1, 2, 2);
            }

            ctx.strokeStyle = palettes[settings.palette](time * 0.1 + spiralIndex);
            ctx.globalAlpha = 0.6;
            ctx.stroke();
            ctx.globalAlpha = 1;
        }

        function drawCenter() {
            // Draw center glow
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 50);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
            gradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.1)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 50, 0, Math.PI * 2);
            ctx.fill();
        }

        function draw() {
            // Semi-transparent black for trail effect
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, width, height);

            drawCenter();

            for (let i = 0; i < settings.spiralCount; i++) {
                drawSpiral(i, settings.spiralCount);
            }

            time++;

            if (isAnimating) {
                animationId = requestAnimationFrame(draw);
            }
        }

        function toggleAnimation() {
            isAnimating = !isAnimating;
            if (isAnimating) {
                draw();
            }
        }

        function resetCanvas() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, width, height);
            time = 0;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Event listeners
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });

        // Controls
        document.getElementById('spiralCount').addEventListener('input', (e) => {
            settings.spiralCount = parseInt(e.target.value);
            document.getElementById('spiralCountVal').textContent = settings.spiralCount;
        });

        document.getElementById('rotationSpeed').addEventListener('input', (e) => {
            settings.rotationSpeed = parseFloat(e.target.value);
            document.getElementById('rotationSpeedVal').textContent = settings.rotationSpeed.toFixed(1);
        });

        document.getElementById('scale').addEventListener('input', (e) => {
            settings.scale = parseFloat(e.target.value);
            document.getElementById('scaleVal').textContent = settings.scale.toFixed(1);
        });

        document.getElementById('lineWidth').addEventListener('input', (e) => {
            settings.lineWidth = parseFloat(e.target.value);
            document.getElementById('lineWidthVal').textContent = settings.lineWidth;
        });

        // Color palette buttons
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                settings.palette = btn.dataset.palette;
            });
        });

        // Initialize
        resize();
        draw();
    </script>
</body>
</html>
